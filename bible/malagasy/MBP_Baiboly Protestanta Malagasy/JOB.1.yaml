document_id: JOB.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny toetr’i Joba, sy ny fizahan-toetra azy voalohany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NISY lehilahy tany amin’ny tany Oza, Joba no anarany; ary marina sy mahitsy izany lehilahy izany sady natahotra an’Andriamanitra ka nifady ny ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary niteraka fito lahy sy vavy telo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny fananany dia ondry aman-osy fito arivo sy rameva telo arivo sy omby arivo sy borikivavy diman-jato ary mpanompo maro be; ka dia nanan-karena be mihoatra noho ny zanaky ny atsinanana rehetra izany lehilahy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary fanaon’ny zanani-lahy ny nandeha sy nanao fanasana isaky ny an-androny avy isan-tranony; dia naniraka naka ny anabaviny telo mirahavavy izy hiara-mihinana sy misotro aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary isaky ny tapitra nitsingerina ireo andro fanasana ireo, dia naniraka Joba ka nanamasina ireny, ary nifoha maraina koa izy ka nanatitra fanatitra dorana araka ny isan’izy rehetra; fa hoy Joba: Fandrao efa nanota ny zanako ka nandà an’Andriamanitra tao am-pony. Izany no nataon’i Joba mandrakariva.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tamin’ny indray andro nony avy ireo zanak’Andriamanitra hiseho teo anatrehan’i Jehovah, dia mba tonga teo koa Satana tafaharo taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Satana: Avy taiza hianao? Dia namaly an’i Jehovah Satana ka nanao hoe: Avy nizahazaha teny amin’ny tany aho ka nivezivezy teny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Satana: Efa nandinika an’i Joba mpanompoko va hianao? Fa tsy misy tahaka azy eny ambonin’ny tany, fa olona marina sy mahitsy izy sady matahotra an’Andriamanitra ka mifady ny ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Satana dia namaly an’i Jehovah ka nanao hoe: Moa tsy fanantenan-javatra va no atahoran’i Joba an’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy Hianao va no nanao fefy manodidina azy sy manodidina ny tranony ary manodidina izay ananany rehetra? Notahinao ny asan’ny tànany, ka manenika ny tany ny omby aman-ondriny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ahinjiro ange ny tànanao, ka tendreo izay ananany rehetra–raha tsy handa Anao eo imasonao aza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hahafoy Anao mihitsy.
    marker-yv: yv-n
  - type: text
    text: ' izy e! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Satana: Indro, eo an-tànanao izay ananany rehetra; fa ny tenany ihany no aza aninjiranao ny tànanao. Dia nivoaka Satana niala teo anatrehan’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tamin’ny indray andro dia nihinana sy nisotro divay tao an-tranon’ny zokiny lahimatoa ny zanani-lahy sy ny zanani-vavy; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary nisy iraka tonga tany amin’i Joba ka nanao hoe: Ny omby niasa, ary ny borikivavy nandrasana teo anilany, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia namely azy tampoka ny Sabeana ka namabo azy, ary ny ankizilahy dia nasiany tamin’ny lelan-tsabatra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Nisy afon’Andriamanitra latsaka avy tany an-danitra ary nandoro ny ondry aman-osy sy ny ankizilahy ka nandevona azy, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Ny Kaldeana nanao telo toko, dia niroatany ny rameva ka nobaboiny, ary ny ankizilahy dia nasiany tamin’ny lelan-tsabatra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Ny zanakao-lahy sy ny zanakao-vavy dia nihinana sy nisotro divay tao an-tranon’ny zokiny lahimatoa; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary, indro, nisy rivotra mahery avy tany an-efitra ka namely ny zoron-trano efatra, dia nianjera tamin’ny zatovo ny trano, ka maty izy rehetra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nitsangana Joba ka nandriatra ny lambany, ary nanaratra ny lohany, dia niapoka tamin’ny tany ka niankohoka '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'sady nanao hoe: Nitanjaka no nivoahako avy tany an-kibon’ineny, ary mitanjaka no hiverenako any; Jehovah no nanome, ary Jehovah no nanaisotra; isaorana anie ny anaran’i Jehovah'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tamin’izany rehetra izany dia tsy nanota Joba, na nanome tsiny an’Andriamanitra.
