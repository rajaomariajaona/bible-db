document_id: JOB.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny toetr’i Joba, sy ny fizahan-toetra azy voalohany.
  - type: text
    content: NISY lehilahy tany amin’ny tany Oza, Joba no anarany; ary marina sy mahitsy izany lehilahy izany sady natahotra an’Andriamanitra ka nifady ny ratsy.
  '10':
  - type: text
    content: 'Tsy Hianao va no nanao fefy manodidina azy sy manodidina ny tranony ary manodidina izay ananany rehetra? Notahinao ny asan’ny tànany, ka manenika ny tany ny omby aman-ondriny. '
  '11':
  - type: text
    content: Fa ahinjiro ange ny tànanao, ka tendreo izay ananany rehetra–raha tsy handa Anao eo imasonao aza
  - type: note
    content: 'Na: hahafoy Anao mihitsy.'
  - type: text
    content: ' izy e! '
  '12':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Satana: Indro, eo an-tànanao izay ananany rehetra; fa ny tenany ihany no aza aninjiranao ny tànanao. Dia nivoaka Satana niala teo anatrehan’i Jehovah.'
  '13':
  - type: text
    content: 'Ary tamin’ny indray andro dia nihinana sy nisotro divay tao an-tranon’ny zokiny lahimatoa ny zanani-lahy sy ny zanani-vavy; '
  '14':
  - type: text
    content: 'ary nisy iraka tonga tany amin’i Joba ka nanao hoe: Ny omby niasa, ary ny borikivavy nandrasana teo anilany, '
  '15':
  - type: text
    content: dia namely azy tampoka ny Sabeana ka namabo azy, ary ny ankizilahy dia nasiany tamin’ny lelan-tsabatra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
  '16':
  - type: text
    content: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Nisy afon’Andriamanitra latsaka avy tany an-danitra ary nandoro ny ondry aman-osy sy ny ankizilahy ka nandevona azy, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.'
  '17':
  - type: text
    content: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Ny Kaldeana nanao telo toko, dia niroatany ny rameva ka nobaboiny, ary ny ankizilahy dia nasiany tamin’ny lelan-tsabatra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.'
  '18':
  - type: text
    content: 'Raha mbola niteny izy, dia nisy anankiray koa tonga ka nanao hoe: Ny zanakao-lahy sy ny zanakao-vavy dia nihinana sy nisotro divay tao an-tranon’ny zokiny lahimatoa; '
  '19':
  - type: text
    content: ary, indro, nisy rivotra mahery avy tany an-efitra ka namely ny zoron-trano efatra, dia nianjera tamin’ny zatovo ny trano, ka maty izy rehetra, ary izaho dia izaho irery ihany no afa-nandositra hilaza aminao.
  '2':
  - type: text
    content: 'Ary niteraka fito lahy sy vavy telo izy. '
  '20':
  - type: text
    content: 'Dia nitsangana Joba ka nandriatra ny lambany, ary nanaratra ny lohany, dia niapoka tamin’ny tany ka niankohoka '
  '21':
  - type: text
    content: 'sady nanao hoe: Nitanjaka no nivoahako avy tany an-kibon’ineny, ary mitanjaka no hiverenako any; Jehovah no nanome, ary Jehovah no nanaisotra; isaorana anie ny anaran’i Jehovah'
  '22':
  - type: text
    content: Tamin’izany rehetra izany dia tsy nanota Joba, na nanome tsiny an’Andriamanitra.
  '3':
  - type: text
    content: Ary ny fananany dia ondry aman-osy fito arivo sy rameva telo arivo sy omby arivo sy borikivavy diman-jato ary mpanompo maro be; ka dia nanan-karena be mihoatra noho ny zanaky ny atsinanana rehetra izany lehilahy izany.
  '4':
  - type: text
    content: 'Ary fanaon’ny zanani-lahy ny nandeha sy nanao fanasana isaky ny an-androny avy isan-tranony; dia naniraka naka ny anabaviny telo mirahavavy izy hiara-mihinana sy misotro aminy. '
  '5':
  - type: text
    content: 'Ary isaky ny tapitra nitsingerina ireo andro fanasana ireo, dia naniraka Joba ka nanamasina ireny, ary nifoha maraina koa izy ka nanatitra fanatitra dorana araka ny isan’izy rehetra; fa hoy Joba: Fandrao efa nanota ny zanako ka nandà an’Andriamanitra tao am-pony. Izany no nataon’i Joba mandrakariva.'
  '6':
  - type: text
    content: 'Ary tamin’ny indray andro nony avy ireo zanak’Andriamanitra hiseho teo anatrehan’i Jehovah, dia mba tonga teo koa Satana tafaharo taminy. '
  '7':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Satana: Avy taiza hianao? Dia namaly an’i Jehovah Satana ka nanao hoe: Avy nizahazaha teny amin’ny tany aho ka nivezivezy teny.'
  '8':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Satana: Efa nandinika an’i Joba mpanompoko va hianao? Fa tsy misy tahaka azy eny ambonin’ny tany, fa olona marina sy mahitsy izy sady matahotra an’Andriamanitra ka mifady ny ratsy. '
  '9':
  - type: text
    content: 'Ary Satana dia namaly an’i Jehovah ka nanao hoe: Moa tsy fanantenan-javatra va no atahoran’i Joba an’Andriamanitra? '
