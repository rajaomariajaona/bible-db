document_id: ECC.11,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Atsipazo eny ambonin’ny rano ny haninao, fa ho hitanao ihany izy rehefa ela. '
  '10':
  - type: text
    content: Koa esory ao am-ponao ny alahelo, ary avilio tsy hikasika ny nofonao ny ratsy; fa ny fahatanorana sy ny fahatanjahana dia samy zava-poana.
  '2':
  - type: text
    content: Samy omeo anjara ny fito, ary na dia ny valo aza, fa tsy fantatrao izay fahoriana hanjo atỳ ambonin’ny tany.
  '3':
  - type: text
    content: Raha feno ranonorana ny rahona, dia halatsany amin’ny tany izany; ary na mianjera mianatsimo na mianavaratra ny hazo, dia eo amin’izay ianjerany ihany no handriany.
  '4':
  - type: text
    content: Izay fatra-pihevitra ny rivotra tsy hamafy, ary izay manahy
  - type: note
    content: Heb. mijery.
  - type: text
    content: ' ny rahona tsy hijinja.'
  '5':
  - type: text
    content: Toy ny tsy ahafantaranao ny amin’ny alehan’ny rivotra, na ny amin’
  - type: text
    content: ny fitombon’
  - type: text
    content: ' ny taolana ao an-kibon’izay manan-anaka, dia toy izany no tsy ahafantaranao ny asan’Andriamanitra, Mpanao ny zavatra rehetra.'
  '6':
  - type: text
    content: Amin’ny maraina dia afafazo ny voanao, ary amin’ny hariva dia aza atsahatra ny tànanao; fa tsy fantatrao izay ho vanona, na ny teo aloha, na ny teo aoriana, na angamba samy ho vanona avokoa izy roa tonta.
  '7':
  - type: text
    content: 'Mamy tokoa ny mazava, ary mahafinaritra ny maso ny mijery ny masoandro; '
  '8':
  - type: text
    content: 'fa na dia ela velona aza ny olona, dia aoka ho faly amin’ny androny rehetra izy ka hahatsiaro ny andro maizina, fa ho maro ireny: izay rehetra ho avy dia zava-poana.'
  - type: heading
    content: Anatra ho an’ny tanora fanahy mba hanampoizany ny hihavian’ny fahanterana sy ny fahafatesana.
  '9':
  - type: text
    content: MIFALIA, ry zatovo, dieny mbola tanora hianao; ary aoka ny fonao hampifalifaly anao amin’ny andro fahatanoranao; ka mandehana any amin’izay sitraky ny fonao sy izay jeren’ny masonao; nefa aoka ho fantatrao fa ho entin’Andriamanitra hotsaraina hianao amin’izany rehetra izany.
