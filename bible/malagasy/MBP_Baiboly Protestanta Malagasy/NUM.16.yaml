document_id: NUM.16,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niodinan’i Kora sy ny namany, sy ny nanamarinan’i Jehovah ny fisoronan’i Arona.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ARY Kora, zanak’i Jizara, zanak’i Kehata, zanak’i Levy, ary Datana sy Abìrama, zanak’i Eliaba, sy Ona, zanak’i Peleta, izay samy taranak’i Robena, dia nandrendri-
    - type: usfm
      marker: it
      children:
      - type: text
        text: bahoaka,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: naka.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nampanakekeny Azy hianao sy ny rahalahinao taranak’i Levy rehetra miaraka aminao, ary mitady ho mpisorona koa va hianareo? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary noho izany hianao sy ny namanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiangonanao.
      marker-yv: yv-n
    - type: text
      text: ' rehetra dia tafangona hiodina amin’i Jehovah; fa Arona moa no inona, no imonomononanareo?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Mosesy naniraka nampaka an’i Datana sy Abìrama, zanak’i Eliaba; fa hoy izy roa lahy: Tsy hiakatra izahay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moa zavatra kely va ny nitondranao anay niakatra niala tany amin’izay tany tondra-dronono sy tantely hahafaty anay atỳ an-efitra, no dia manao anao ho lehibenay koa hianao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary koa, hianao tsy nitondra anay ho any amin’izay tany tondra-dronono sy tantely tsinona, na nanome anay saha sy tanimboaloboka ho fanananay; hopotsirinao va ny mason’ireto lehilahy ireto? Tsy hiakatra izahay.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia tezitra indrindra Mosesy ka nanao tamin’i Jehovah hoe: Aza mijery ny fanatiny akory Hianao; tsy naka na dia boriky iray akory aza taminy aho, ary tsy nanisy ratsy na dia tamin’ny anankiray aminy akory aza. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia hoy Mosesy tamin’i Kora: Aoka hianao sy ny namanao'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiangonanao.
      marker-yv: yv-n
    - type: text
      text: ' rehetra ho tonga eo anatrehan’i Jehovah rahampitso, dia hianao sy ireo ary Arona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary samia maka ny fitondran-afony avy hianareo rehetra, ka asio ditin-kazo manitra eo anatiny, ary samia mitondra ny fitondran-afony avy hianareo rehetra ho eo anatrehan’i Jehovah, dia fitondran-afo dimam-polo amby roan-jato; dia hianao sy Arona samy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hitondra
    - type: text
      text: ' ny fitondran-afony avy.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary samy naka ny fitondran-afony avy izy rehetra ka nanisy afo teo anatiny, dia nanisy ditin-kazo manitra teo anatiny; ary nijanona teo anoloan’ny varavaran’ny trano-lay fihaonana izy mbamin’i Mosesy sy Arona.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary Kora nanangona ny namany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiangonany.
      marker-yv: yv-n
    - type: text
      text: ' rehetra ho eo anoloan’ny varavaran’ny trano-lay fihaonana hanohitra azy roa lahy; dia niseho tamin’ny fiangonana rehetra ny voninahitr’i Jehovah.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka nitsangana teo anatrehan’i Mosesy izy ireo sy ny Zanak’Isiraely dimam-polo amby roan-jato, izay samy lohan’ny fiangonana avokoa, dia olona voafidin’ny fiangonana sady nanan-daza; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mihataha amin’ity fiangonana ity hianareo handringanako azy amin’ny indray mipì-maso monja.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia niankohoka izy roa lahy ka nanao hoe: Andriamanitra ô, Andriamanitry ny fanahin’ny nofo rehetra, olona iray no nanota, ka ho tezitra amin’ny fiangonana rehetra va Hianao?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mitenena amin’ny fiangonana, ka lazao hoe: Mihataha tsy hanodidina ny lain’i Kora sy Datana ary Abìrama.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia nitsangana Mosesy ka nankeo amin’i Datana sy Abìrama; ary nanaraka azy ny loholon’ny Isiraely. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia niteny tamin’ny fiangonana izy ka nanao hoe: Mialà amin’ny lain’ireo olon-dratsy ireo, ka aza mikasika izay azy akory, fandrao haringana koa hianareo noho ny fahotany rehetra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia nihataka ny olona mba tsy ho eo akaikin’ny lain’i Kora sy Datana ary Abìrama, ary Datana sy Abìrama nivoaka ka nijanona teo anoloan’ny varavaran’ny lainy mbamin’ny vadiny sy ny zanani-lahy ary ny zanany madinika.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy Mosesy: Izao no hahafantaranareo fa Jehovah no naniraka ahy hanao ireny asa rehetra ireny, fa tsy avy tamin’ny saiko izany: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Raha maty toy ny fahafatin’ny olona rehetra ireo olona ireo, na valiana araka ny famaliana ny olona rehetra izy, dia tsy Jehovah no naniraka ahy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'koa niangona hiodina amin’i Mosesy sy Arona ireo ka nanao taminy hoe: Aoka izay hianareo! fa masina avokoa ny fiangonana rehetra, sady Jehovah no eo aminy; koa nahoana no dia manandra-tena ho ambonin’ny fiangonan’i Jehovah hianareo?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Fa raha hanao zavatra vaovao kosa Jehovah, ka hisokatra ny tany ary hitelina azy mbamin’izay azy rehetra, ka ho latsaka velona any amin’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' izy, dia ho fantatrareo fa efa nandà an’i Jehovah ireo lehilahy ireo.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary rehefa tapitra voalazany izany teny rehetra izany, dia nivava ny tany izay teo ambaniny; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'eny, nisokatra ny tany ka nitelina azy sy ny ankohonany mbamin’ny olona rehetra izay an’i Kora ary ny fananany rehetra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia latsaka velona ho any amin’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' izy mbamin’izay azy rehetra; ary ny tany dia nikatona taminy, ka fongotra tsy ho amin’ny fiangonana intsony izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary ny Isiraely rehetra izay nanodidina azy dia nandositra noho ny fidradradradrany; fa hoy izy: Andrao hitelina antsika koa ny tany.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary nisy afo nivoaka avy tamin’i Jehovah ka nandevona ny lehilahy dimam-polo amby roan-jato izay nanatitra ditin-kazo manitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary raha nandre izany Mosesy, dia niankohoka izy '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ka niteny tamin’i Kora sy ny namany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiangonany.
      marker-yv: yv-n
    - type: text
      text: ' rehetra nanao hoe: Rahampitso dia hasehon’i Jehovah izay Azy sy izay masina ka hampanakekeny Azy; dia izay fidiny no hampanakekeny Azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izao no ataovy, ry Kora sy hianareo namany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiangonany.
      marker-yv: yv-n
    - type: text
      text: ' rehetra: Makà fitondran-afo ho anareo rahampitso, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: dia asio afo eo anatiny ka asio ditin-kazo manitra eo aminy eo anatrehan’i Jehovah; ary ny lehilahy izay fidin’i Jehovah, dia izy no ho masina; fa aoka izay hianareo, ry taranak’i Levy!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy koa Mosesy tamin’i Kora: Henoy, ry taranak’i Levy: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Moa ataonareo ho zavatra kely va ny nampisarahan’Andriamanitry ny Isiraely anareo tamin’ny fiangonan’ny Isiraely hitondrany anareo ho akaiky Azy, hanaovanareo ny fanompoam-pivavahana momba ny tabernakelin’i Jehovah sy hitoeranareo eo anatrehan’ny fiangonana hanompo azy? '
