document_id: NUM.16,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niodinan’i Kora sy ny namany, sy ny nanamarinan’i Jehovah ny fisoronan’i Arona.
  - type: text
    content: ARY Kora, zanak’i Jizara, zanak’i Kehata, zanak’i Levy, ary Datana sy Abìrama, zanak’i Eliaba, sy Ona, zanak’i Peleta, izay samy taranak’i Robena, dia nandrendri-
  - type: text
    content: bahoaka,
  - type: note
    content: Heb. naka.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Dia nampanakekeny Azy hianao sy ny rahalahinao taranak’i Levy rehetra miaraka aminao, ary mitady ho mpisorona koa va hianareo? '
  '11':
  - type: text
    content: Ary noho izany hianao sy ny namanao
  - type: note
    content: Heb. fiangonanao.
  - type: text
    content: ' rehetra dia tafangona hiodina amin’i Jehovah; fa Arona moa no inona, no imonomononanareo?'
  '12':
  - type: text
    content: 'Ary Mosesy naniraka nampaka an’i Datana sy Abìrama, zanak’i Eliaba; fa hoy izy roa lahy: Tsy hiakatra izahay. '
  '13':
  - type: text
    content: 'Moa zavatra kely va ny nitondranao anay niakatra niala tany amin’izay tany tondra-dronono sy tantely hahafaty anay atỳ an-efitra, no dia manao anao ho lehibenay koa hianao? '
  '14':
  - type: text
    content: Ary koa, hianao tsy nitondra anay ho any amin’izay tany tondra-dronono sy tantely tsinona, na nanome anay saha sy tanimboaloboka ho fanananay; hopotsirinao va ny mason’ireto lehilahy ireto? Tsy hiakatra izahay.
  '15':
  - type: text
    content: 'Dia tezitra indrindra Mosesy ka nanao tamin’i Jehovah hoe: Aza mijery ny fanatiny akory Hianao; tsy naka na dia boriky iray akory aza taminy aho, ary tsy nanisy ratsy na dia tamin’ny anankiray aminy akory aza. '
  '16':
  - type: text
    content: 'Dia hoy Mosesy tamin’i Kora: Aoka hianao sy ny namanao'
  - type: note
    content: Heb. fiangonanao.
  - type: text
    content: ' rehetra ho tonga eo anatrehan’i Jehovah rahampitso, dia hianao sy ireo ary Arona. '
  '17':
  - type: text
    content: 'Ary samia maka ny fitondran-afony avy hianareo rehetra, ka asio ditin-kazo manitra eo anatiny, ary samia mitondra ny fitondran-afony avy hianareo rehetra ho eo anatrehan’i Jehovah, dia fitondran-afo dimam-polo amby roan-jato; dia hianao sy Arona samy '
  - type: text
    content: hitondra
  - type: text
    content: ' ny fitondran-afony avy.'
  '18':
  - type: text
    content: Ary samy naka ny fitondran-afony avy izy rehetra ka nanisy afo teo anatiny, dia nanisy ditin-kazo manitra teo anatiny; ary nijanona teo anoloan’ny varavaran’ny trano-lay fihaonana izy mbamin’i Mosesy sy Arona.
  '19':
  - type: text
    content: Ary Kora nanangona ny namany
  - type: note
    content: Heb. fiangonany.
  - type: text
    content: ' rehetra ho eo anoloan’ny varavaran’ny trano-lay fihaonana hanohitra azy roa lahy; dia niseho tamin’ny fiangonana rehetra ny voninahitr’i Jehovah.'
  '2':
  - type: text
    content: 'ka nitsangana teo anatrehan’i Mosesy izy ireo sy ny Zanak’Isiraely dimam-polo amby roan-jato, izay samy lohan’ny fiangonana avokoa, dia olona voafidin’ny fiangonana sady nanan-daza; '
  '20':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  '21':
  - type: text
    content: Mihataha amin’ity fiangonana ity hianareo handringanako azy amin’ny indray mipì-maso monja.
  '22':
  - type: text
    content: 'Dia niankohoka izy roa lahy ka nanao hoe: Andriamanitra ô, Andriamanitry ny fanahin’ny nofo rehetra, olona iray no nanota, ka ho tezitra amin’ny fiangonana rehetra va Hianao?'
  '23':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '24':
  - type: text
    content: 'Mitenena amin’ny fiangonana, ka lazao hoe: Mihataha tsy hanodidina ny lain’i Kora sy Datana ary Abìrama.'
  '25':
  - type: text
    content: 'Dia nitsangana Mosesy ka nankeo amin’i Datana sy Abìrama; ary nanaraka azy ny loholon’ny Isiraely. '
  '26':
  - type: text
    content: 'Dia niteny tamin’ny fiangonana izy ka nanao hoe: Mialà amin’ny lain’ireo olon-dratsy ireo, ka aza mikasika izay azy akory, fandrao haringana koa hianareo noho ny fahotany rehetra. '
  '27':
  - type: text
    content: Dia nihataka ny olona mba tsy ho eo akaikin’ny lain’i Kora sy Datana ary Abìrama, ary Datana sy Abìrama nivoaka ka nijanona teo anoloan’ny varavaran’ny lainy mbamin’ny vadiny sy ny zanani-lahy ary ny zanany madinika.
  '28':
  - type: text
    content: 'Dia hoy Mosesy: Izao no hahafantaranareo fa Jehovah no naniraka ahy hanao ireny asa rehetra ireny, fa tsy avy tamin’ny saiko izany: '
  '29':
  - type: text
    content: 'Raha maty toy ny fahafatin’ny olona rehetra ireo olona ireo, na valiana araka ny famaliana ny olona rehetra izy, dia tsy Jehovah no naniraka ahy. '
  '3':
  - type: text
    content: 'koa niangona hiodina amin’i Mosesy sy Arona ireo ka nanao taminy hoe: Aoka izay hianareo! fa masina avokoa ny fiangonana rehetra, sady Jehovah no eo aminy; koa nahoana no dia manandra-tena ho ambonin’ny fiangonan’i Jehovah hianareo?'
  '30':
  - type: text
    content: Fa raha hanao zavatra vaovao kosa Jehovah, ka hisokatra ny tany ary hitelina azy mbamin’izay azy rehetra, ka ho latsaka velona any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' izy, dia ho fantatrareo fa efa nandà an’i Jehovah ireo lehilahy ireo.'
  '31':
  - type: text
    content: 'Ary rehefa tapitra voalazany izany teny rehetra izany, dia nivava ny tany izay teo ambaniny; '
  '32':
  - type: text
    content: 'eny, nisokatra ny tany ka nitelina azy sy ny ankohonany mbamin’ny olona rehetra izay an’i Kora ary ny fananany rehetra. '
  '33':
  - type: text
    content: Dia latsaka velona ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' izy mbamin’izay azy rehetra; ary ny tany dia nikatona taminy, ka fongotra tsy ho amin’ny fiangonana intsony izy. '
  '34':
  - type: text
    content: 'Ary ny Isiraely rehetra izay nanodidina azy dia nandositra noho ny fidradradradrany; fa hoy izy: Andrao hitelina antsika koa ny tany.'
  '35':
  - type: text
    content: Ary nisy afo nivoaka avy tamin’i Jehovah ka nandevona ny lehilahy dimam-polo amby roan-jato izay nanatitra ditin-kazo manitra.
  '4':
  - type: text
    content: 'Ary raha nandre izany Mosesy, dia niankohoka izy '
  '5':
  - type: text
    content: ka niteny tamin’i Kora sy ny namany
  - type: note
    content: Heb. fiangonany.
  - type: text
    content: ' rehetra nanao hoe: Rahampitso dia hasehon’i Jehovah izay Azy sy izay masina ka hampanakekeny Azy; dia izay fidiny no hampanakekeny Azy. '
  '6':
  - type: text
    content: Izao no ataovy, ry Kora sy hianareo namany
  - type: note
    content: Heb. fiangonany.
  - type: text
    content: ' rehetra: Makà fitondran-afo ho anareo rahampitso, '
  '7':
  - type: text
    content: dia asio afo eo anatiny ka asio ditin-kazo manitra eo aminy eo anatrehan’i Jehovah; ary ny lehilahy izay fidin’i Jehovah, dia izy no ho masina; fa aoka izay hianareo, ry taranak’i Levy!
  '8':
  - type: text
    content: 'Dia hoy koa Mosesy tamin’i Kora: Henoy, ry taranak’i Levy: '
  '9':
  - type: text
    content: 'Moa ataonareo ho zavatra kely va ny nampisarahan’Andriamanitry ny Isiraely anareo tamin’ny fiangonan’ny Isiraely hitondrany anareo ho akaiky Azy, hanaovanareo ny fanompoam-pivavahana momba ny tabernakelin’i Jehovah sy hitoeranareo eo anatrehan’ny fiangonana hanompo azy? '
