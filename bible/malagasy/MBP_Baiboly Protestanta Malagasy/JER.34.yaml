document_id: JER.34,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’ny hanjo an’i Zedekia, sy fananarana ny olona noho izy nanandevo indray izay efa novotsorany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah, fony Nebokadnezara, mpanjakan’i Babylona, sy ny miaramilany rehetra ary ny fanjakana rehetra amin’ny tany izay nanjakany mbamin’ny firenena rehetra izay namely an’i Jerosalema sy ny tanànany rehetra, nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ka dia nanaiky ny mpanapaka rehetra sy ny vahoaka rehetra izay nanao ny fanekena, samy handefa ny ankizilahiny sy ny ankizivaviny ho afaka mba tsy hampanompoany azy intsony; eny, nanaiky izy, ka samy nandefa azy ho afaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Kanjo taorian’izany dia nanenina izy, ka naveriny indray ireo ankizilahy sy ankizivavy izay efa nalefany ho afaka ireo, dia nandevoziny ho ankizilahiny sy ho ankizivaviny indray.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary tonga tamin’i Jeremia ny tenin’i Jehovah hoe: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Izaho efa nanao fanekena tamin’ny razanareo tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Egypta hiala tamin’ny trano nahandevozana nanao hoe: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Isam-pito taona samia mandefa ny Hebreo rahalahiny, izay namidy taminao; ka rehefa nanompo anao enin-taona izy, dia alefaso ho afaka; nefa ny razanareo tsy nihaino Ahy ka nanongilana ny sofiny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nibebaka hianareo andro-any ka nanao izay mahitsy eo imasoko tamin’ny niantsoanareo fanafahana, samy handefa ny rahalahiny avy; ary nanao fanekena teo anatrehako hianareo, dia tao amin’ny trano izay efa niantsoana ny anarako; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: kanjo nivadika indray hianareo ka tsy nanamasina ny anarako, fa samy namerina ny ankizilahiny sy ny ankizivaviny, izay efa nalefanareo handeha araka izay tiany, dia nanandevo azy ho ankizilahiny sy ho ankizivaviny indray.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa izao no lazain’i Jehovah: Hianareo tsy nihaino Ahy ka tsy nety nitory fanafahana ho an’ny rahalahinareo sy ny namanareo avy; dia, indro, miantso fanafahana ho anareo kosa Aho, hoy Jehovah, nefa ho an’ny sabatra sy ny areti-mandringana ary ny mosary; ary hatolotro ho mpanjenjena any amin’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho fampangovitana.
      marker-yv: yv-n
    - type: text
      text: ' ny fanjakana rehetra amin’ny tany hianareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hatolotro ny olona izay nivadika ny fanekeko ka tsy nahatana ny tenin’ny fanekena, izay nataony teo anatrehako, fony nosasahiny ny ombilahy kely, ka nandeha teo anelanelan’ny tapany izy,– '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'eny, hatolotro ny mpanapaka ny Joda sy ny mpanapaka any Jerosalema sy ny tandapa sy ny mpisorona ary ny vahoaka rehetra, izay nandeha teo anelanelan’ny tapaky ny ombilahy kely, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Mandehana, lazao amin’i Zedekia, mpanjakan’ny Joda, ka ambarao aminy hoe: Izao no lazain’i Jehovah: Indro, hatolotro eo an-tànan’ny mpanjakan’i Babylona ity tanàna ity, ka hodorany amin’ny afo izy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'dia hatolotro eo an-tànan’ny fahavalony sy eo an-tànan’izay mitady ny ainy; ary ho fihinan’ny voro-manidina sy ny bibi-dia ny fatiny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary Zedekia, mpanjakan’ny Joda, sy ny mpanapaka dia hatolotro eo an-tànan’ny fahavalony sy eo an-tànan’izay mitady ny ainy ary eo an-tànan’ny miaramilan’ny mpanjakan’i Babylona, izay efa lasa niala taminareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Indro, handidy Aho, hoy Jehovah, ary hampivereniko ho amin’ity tanàna ity ireo; ary hasiany ity ka ho afany, dia hodorany amin’ny afo; ary ny tanànan’ny Joda dia hofoanako tsy hisy mponina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ary hianao tsy ho afa-mandositra ny tànany, fa ho voasambotra tokoa ka hatolotra eo an-tànany; ary ny masonao hahita ny mason’ny mpanjakan’i Babylona, dia hiteny mifanatrika aminao izy, sady ho tonga any Babylona hianao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nefa henoy ny tenin’i Jehovah, ry Zedekia, mpanjakan’ny Joda. Izao no lazain’i Jehovah ny aminao: Tsy ho fatin-tsabatra hianao, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'fa amin’ny fiadanana no hahafatesanao, ary handoro zavatra ho fisaonana anao ny olona, tahaka ny nandoroany ho fisaonana ny razanao, dia ireny mpanjaka fahiny tany alohanao, ary hitomany anao ny olona hoe: Indrisy! ry tompoko; fa Izaho no efa nilaza izany, hoy Jehovah.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nolazain’i Jeremia mpaminany tamin’i Zedekia, mpanjakan’ny Joda, tany Jerosalema izany teny rehetra izany, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'fony ny miaramilan’ny mpanjakan’i Babylona mbola namely an’i Jerosalema sy ny tanànan’ny Joda sisa rehetra, dia Lakisy sy Azeka: fa ireo ihany no tanàna mimànda sisa tamin’ny tanànan’ny Joda.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izao no teny tonga tamin’i Jeremia avy tamin’i Jehovah, rehefa nanao fanekena tamin’ny vahoaka rehetra izay tany Jerosalema Zedekia mpanjaka hitory fanafahana aminy, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: mba samy handefa ny ankizilahiny sy ny ankizivaviny, dia izay Hebreolahy sy Hebreovavy, ho afaka, mba tsy hisy hampanompo ny Jiosy rahalahiny intsony.
