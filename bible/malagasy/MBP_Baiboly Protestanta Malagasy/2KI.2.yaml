document_id: 2KI.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nampakarana an’i Elia ho any an-danitra, sy ny fahagagana voalohany nataon’i Elisa.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nony efa hampakarin’i Jehovah ho any an-danitra amin’ny tafio-drivotra Elia, dia niara-nandeha avy tany Gilgala izy sy Elisa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izy: Sarotra ny nangatahinao; kanefa raha mahita ahy misaraka aminao hianao, dia ho anao ihany izany; fa raha tsy izany kosa, dia tsy ho anao izany.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha mbola nandeha sy niresaka izy roa lahy, dia, indro, nisy kalesy afo sy soavaly afo nampisaraka azy roa lahy; ary Elia niakatra tamin’ny tafio-drivotra ho any an-danitra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nahita izany Elisa, dia niantso hoe: Ry ikaky ô, ry ikaky ô, e ny kalesin’ny Isiraely sy ny mpitaingin-tsoavaliny! Dia tsy nahita azy intsony izy. Ary noraisiny ny fitafiany ka notriariny roa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalainy ny kapôtin’i Elia izay latsaka avy teny aminy, dia niverina izy ka nitsangana teo amoron’i Jordana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisin’i Elisa ny kapôtin’i Elia, ilay latsaka avy teny aminy, ka nakapony ny rano, dia hoy izy: Aiza Jehovah, Andriamanitr’i Elia? Eny, Elisa koa nikapoka ny rano, dia nisaraka roa izany, ka dia nita izy.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niverenan’i Elisa nankany Jeriko sy Betela, ary ny fahagagana nataony.
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY raha nahita azy ireo zanaky ny mpaminany izay nanandrify azy teo Jeriko, dia nanao hoe: Ny fanahin’i Elia efa mipetraka amin’i Elisa. Ary nandeha nitsena azy ireo ka niankohoka tamin’ny tany teo anatrehany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy: Indro, misy dimam-polo lahy matanjaka ato amin’ny mpanomponao; masìna hianao, aoka handeha hitady ny tomponao ireo, fandrao naingain’ny Fanahin’i Jehovah izy ka nazerany any an-tendrombohitra anankiray, na any an-dohasaha anankiray. Fa hoy izy: Aza maniraka hianareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nanery azy ireo mandra-pikaodikaodiny, dia hoy izy: Maniraha ary. Dia naniraka dimam-polo lahy izy; ary nitady azy hateloana ireny, fa tsy nahita. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tao aminy indray ireny, raha mbola tao Jeriko ihany izy, dia hoy izy taminy: Tsy nilaza taminareo va aho nanao hoe: Aza mandeha?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mponina tao amin’izany tanàna izany tamin’i Elisa: Masìna hianao, indro, tsara toerana ity tanàna ity, tompoko, araka izao hitanao izao, saingy ratsy rano, ary ny tany tsy mampahavanon-anaka.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy mahavanom-boly.
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Elia tamin’i Elisa: Masìna hianao, mijanòna eto; fa Jehovah efa naniraka ahy hatrany Betela. Fa hoy Elisa: Raha velona koa Jehovah, ary raha velona koa ny ainao, tsy handao anao mihitsy aho. Ka dia nidina nankany Betela izy roa lahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy: Itondray lovia vaovao aho, ka asio sira ao anatiny. Dia nentiny tany aminy izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nivoaka nankany amin’ilay niandohan’ny rano izy, dia nanipy sira tao ka nanao hoe: Izao no lazain’i Jehovah: Efa nahatsara'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nahasitrana.
      marker-yv: yv-n
    - type: text
      text: ' ity rano ity Aho; tsy hisy fahafatesana na tsi-fahavanonan-anaka intsony hiseho eto. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka dia tsara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sitrana.
      marker-yv: yv-n
    - type: text
      text: ' ny rano mandraka andro-any araka ny teny nataon’i Elisa.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia niakatra avy tao izy ka nankany Betela; ary nony niakatra teny an-dàlana izy, dia, indreo, nisy ankizilahy madinika nivoaka avy tao an-tanàna ka nanakora azy hoe: Miakara, ry ilay sola; miakara, ry ilay sola! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nitodika izy ka nahita azy, dia nanozona azy tamin’ny anaran’i Jehovah. Ary dia nisy beravavy roa avy tany an-ala namiravira roa amby efa-polo tamin’ireo ankizilahy madinika ireo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala teo Elisa ka nankany an-tendrombohitra Karmela, ary avy tao no niverenany ho any Samaria.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nivoaka nankany amin’i Elisa ireo zanaky ny mpaminany izay tao Betela ka nanao taminy hoe: Fantatrao va fa anio no hangalan’i Jehovah ny tomponao hiala ho any ambonin’ny lohanao? Dia hoy izy: Eny, fantatro ihany koa izany, fa mangìna hianareo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Elia taminy: Masìna hianao, ry Elisa, mijanòna eto; fa Jehovah efa naniraka ahy ho any Jeriko. Fa hoy Elisa: Raha velona koa Jehovah, ary raha velona koa ny ainao, tsy handao anao mihitsy aho. Ka dia tonga tany Jeriko izy roa lahy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo zanaky ny mpaminany izay tao Jeriko nanatona an’i Elisa ka nanao taminy hoe: Fantatrao va fa anio no hangalan’i Jehovah ny tomponao hiala ho any ambonin’ny lohanao? Ary izy namaly hoe: Eny, fantatro ihany koa izany, fa mangìna hianareo.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Elia taminy: Masìna hianao, mijanòna eto; fa Jehovah efa naniraka ahy ho any Jordana. Fa hoy Elisa: Raha velona koa Jehovah, ary raha velona koa ny ainao, tsy handao anao mihitsy aho. Ary dia lasa nandeha izy roa lahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy dimam-polo lahy, zanaky ny mpaminany, nandeha, dia nijanona tandrifiny teny lavitra eny; fa izy roa lahy kosa nitsangana teo amoron’i Jordana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Elia nandray ny kapôtiny ka namalona azy, dia nikapoka ny rano, ary nisaraka roa ny rano, ka dia nita tamin’ny tany maina izy roa lahy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa tafita izy roa lahy, dia hoy Elia tamin’i Elisa: Angataho izay hataoko ho anao, dieny tsy mbola misaraka aminao aho. Ary hoy Elisa: Masìna hianao, aoka ny anjaran-droa amin’ny fanahinao mba ho ahy. '
