document_id: NUM.27,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanontanian’ny zanakavavin’i Zelofada, sy ny lalàna izay natao ny amin’izany.
  - type: text
    content: 'ARY avy ny zanakavavin’i Zelofada, zanakalahin’i Hefera, zanak’i Gileada, zanak’i Makira, zanak’i Manase, avy tamin’ny fokon’i Manase, zanak i Josefa (ary izao no anarany: Mahala sy Noa sy Hogla sy Milka ary Tirza), '
  '10':
  - type: text
    content: 'Ary raha tsy manan-drahalahy izy, dia ny rahalahin-drainy no homenareo ny zara-taniny. '
  '11':
  - type: text
    content: 'Ary raha tsy manan-drahalahy ny rainy, dia ny havany akaiky azy amin’ny fokony no homenareo ny zara-taniny, ka izy no handova azy: ho lalàna hitondrana ny Zanak’Isiraely izany, araka izay nandidian’i Jehovah an’i Mosesy.'
  - type: heading
    content: Ny amin’ny hahafatesan’i Mosesy, sy ny nanendrena an’i Josoa ho mpandimby azy.
  '12':
  - type: text
    content: 'ARY hoy Jehovah tamin’i Mosesy: Miakara amin’ity tendrombohitra Abarima ity, ka tazano ny tany izay omeko ny Zanak’Isiraely. '
  '13':
  - type: text
    content: 'Ary rehefa hitanao izany, dia hangonina any amin’ny razanao koa hianao, tahaka izay nanangonana an’i Arona rahalahinao; '
  '14':
  - type: text
    content: fa nandà ny teniko hianareo tany an-efitra Zina, tamin’ilay nilan’ny fiangonana ady, ka tsy nanamasina Ahy teo amin’ny rano teo imasony. (Izany no ranon’i Meriba any Kadesy any an-efitra Zina.)
  '15':
  - type: text
    content: 'Ary Mosesy niteny tamin’i Jehovah hoe: '
  '16':
  - type: text
    content: 'Aoka Jehovah, Andriamanitry ny fanahin’ny nofo rehetra, hanendry lehilahy izay hitandrina ny fiangonana '
  '17':
  - type: text
    content: ka hivoaka sy hiditra eo alohany ary hitarika azy hivoaka sy hiditra, mba tsy ho tahaka ny ondry tsy misy mpiandry ny fiangonan’i Jehovah.
  '18':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Mosesy: Alao ho anao Josoa, zanak’i Nona, lehilahy izay manam-panahy, ka ametraho ny tànanao izy; '
  '19':
  - type: text
    content: 'ary asaovy mijoro eo anatrehan’i Eleazara mpisorona sy ny fiangonana rehetra izy, ka mandidia azy eo imasony hianao. '
  '2':
  - type: text
    content: 'dia nitsangana teo anatrehan’i Mosesy sy Eleazara mpisorona ary ny lohan’ny fiangonana sy ny fiangonana rehetra, teo anoloan’ny varavaran’ny trano-lay fihaonana izy ka nanao hoe: '
  '20':
  - type: text
    content: 'Dia anomezo azy ny voninahitrao, mba hihainoan’ny fiangonana, dia ny Zanak’Isiraely rehetra azy. '
  '21':
  - type: text
    content: Ary Josoa hijanona eo anatrehan’i Eleazara mpisorona, izay hanadina amin’ny fitsaran’i Orima eo anatrehan’i Jehovah ho azy; araka ny teniny no hivoahany, ary araka ny teniny no hidirany, dia izy sy ny Zanak’Isiraely rehetra, dia ny fiangonana rehetra.
  '22':
  - type: text
    content: 'Ary nataon’i Mosesy araka izay efa nandidian’i Jehovah azy; dia naka an’i Josoa izy ka nampijoro azy teo anatrehan’i Eleazara mpisorona sy ny fiangonana rehetra '
  '23':
  - type: text
    content: ka nametraka ny tànany taminy ary nandidy azy, araka ny tenin’i Jehovah izay nampitondrainy an’i Mosesy.
  '3':
  - type: text
    content: Ny rainay dia maty tany an-efitra, kanefa tsy mba isan’ny antokon’
  - type: note
    content: 'Heb.: fiangonany.'
  - type: text
    content: ' i Kora izay niangona hiodina tamin’i Jehovah tsy akory; fa matin’ny fahotany ihany izy, nefa tsy nanan-janakalahy. '
  '4':
  - type: text
    content: Nahoana ny rainay no ho fati-maso eo amin’ny fokony, na dia tsy nanan-janakalahy aza izy? mba omeo zara-tany eo amin’ny rahalahin’ny rainay izahay.
  '5':
  - type: text
    content: 'Ary nalahatr’i Mosesy teo anatrehan’i Jehovah ny tenin’ireo. '
  '6':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '7':
  - type: text
    content: 'Marina ny tenin’ny zanakavavin’i Zelofada: omeo zara-tany eo amin’ny rahalahin-drainy tokoa izy; dia ampandovay ny zara-tanin-drainy izy. '
  '8':
  - type: text
    content: 'Ary lazao amin’ny Zanak’Isiraely hoe: Raha misy lehilahy maty ka tsy manan-janakalahy, dia ny zanani-vavy no hampandovainareo ny zara-taniny. '
  '9':
  - type: text
    content: 'Ary raha tsy manan-janakavavy izy, dia ny rahalahiny no homenareo ny zara-taniny. '
