document_id: JHN.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihan-teny.
  - type: text
    content: 'TAMIN’ny voalohany ny Teny, ary ny Teny tao amin’Andriamanitra, ary ny Teny dia Andriamanitra. '
  '10':
  - type: text
    content: 'Teo amin’izao tontolo izao Izy, ary Izy no nanaovana izao tontolo izao, nefa izao tontolo izao tsy nahalala Azy. '
  '11':
  - type: text
    content: 'Tonga tany amin’ny Azy Izy, fa ny Azy tsy nandray Azy. '
  '12':
  - type: text
    content: Fa izay rehetra nandray Azy dia nomeny hery
  - type: note
    content: 'Na: anarana, na fahefana.'
  - type: text
    content: ' ho tonga zanak’Andriamanitra, dia izay mino ny anarany, '
  '13':
  - type: text
    content: dia ireo izay tsy nateraky ny ra, na ny sitrapon’ny nofo, na ny sitrapon’ny olona, fa naterak’Andriamanitra.
  '14':
  - type: text
    content: Ary ny Teny dia tonga nofo ka nonina
  - type: note
    content: Gr. nitoetra an-day.
  - type: text
    content: ' tamintsika; ary hitanay ny voninahiny, dia voninahitra mendrika ho an’ny Lahitokana avy tamin’ny Ray, sady feno fahasoavana sy fahamarinana. '
  '15':
  - type: text
    content: 'Jaona nanambara Azy ka niantso hoe: Izy Ilay nolazaiko hoe: Izay avy ao aoriako dia efa tonga eo alohako, satria talohako Izy. '
  '16':
  - type: text
    content: 'Fa tamin’ny fahafenony no nandraisantsika rehetra, dia fahasoavana anampy fahasoavana. '
  '17':
  - type: text
    content: 'Fa ny lalàna dia nomena tamin’ny alalan’i Mosesy; fa ny fahasoavana sy ny fahamarinana kosa dia tonga tamin’ny alalan’i Jesosy Kristy. '
  '18':
  - type: text
    content: Tsy nisy nahita an’Andriamanitra na oviana na oviana; fa ny Zanakalahy Tokana, Izay ao an-tratran’ny Ray, Izy no nanambara Azy.
  - type: heading
    content: Ny nanambaran’i Jaona Mpanao-batisa an’i Jesosy.
  '19':
  - type: text
    content: 'ARY izao no nambaran’i Jaona, raha ny Jiosy naniraka mpisorona sy Levita avy tany Jerosalema hankany aminy mba hanontany azy hoe: Iza moa hianao? '
  '2':
  - type: text
    content: 'Izy dia tao amin’Andriamanitra tamin’ny voalohany. '
  '20':
  - type: text
    content: 'Ary nilaza marina izy ka tsy nandà, fa hoy ny filàzany: Tsy izaho no Kristy. '
  '21':
  - type: text
    content: 'Ary izy ireo nanontany azy hoe: Ahoana ary? Elia va hianao? Fa hoy izy: Tsy izy aho. Ilay Mpaminany va hianao? Fa izy namaly hoe: Tsia. '
  '22':
  - type: text
    content: 'Dia hoy ireo taminy: Iza ary hianao? mba hitondranay valiny ho any amin’izay naniraka anay. Lazainao ho iza moa ny tenanao? '
  '23':
  - type: text
    content: 'Dia hoy izy: ,,Izaho dia feon’ny miantso mafy any an-efitra hoe: Ataovy mahitsy ny làlan’i Jehovah (Isa. 40.3), araka izay nolazain’Isaia mpaminany.'
  '24':
  - type: text
    content: 'Ary iraka avy tamin’ny Fariseo ireo. '
  '25':
  - type: text
    content: 'Dia nanontany azy ireo ka nanao taminy hoe: Nahoana ary hianao no manao batisa, raha tsy hianao no Kristy, na Elia, na Ilay Mpaminany? '
  '26':
  - type: text
    content: 'Jaona namaly azy ka nanao hoe: Izaho manao batisa amin’ny rano; fa eto aminareo misy Anankiray Izay tsy fantatrareo, '
  '27':
  - type: text
    content: 'dia Ilay avy ao aoriako, ary tsy miendrika hamaha ny fehin-kapany aza aho. '
  '28':
  - type: text
    content: Izany zavatra izany dia natao tany Betania
  - type: note
    content: 'Na: [Betabara].'
  - type: text
    content: ' any an-dafin’i Jordana, izay nanaovan’i Jaona batisa.'
  '29':
  - type: text
    content: 'Nony ampitso dia nahita an’i Jesosy avy manatona azy Jaona, ka dia hoy izy: Indro ny Zanak’ondrin’Andriamanitra, Izay manaisotra'
  - type: note
    content: 'Na: mitondra.'
  - type: text
    content: ' ny fahotan’izao tontolo izao! '
  '3':
  - type: text
    content: 'Izy no nahariana ny zavatra rehetra; ary raha tsy Izy dia tsy nisy nahariana izao zavatra ary izao, na dia iray aza. '
  '30':
  - type: text
    content: 'Izy Ilay nolazaiko hoe: Misy Lehilahy avy ao aoriako Izay efa tonga eo alohako, satria talohako Izy. '
  '31':
  - type: text
    content: Ary izaho tsy nahalala Azy; fa mba haseho amin’ny Isiraely Izy, izany no nihaviako manao batisa amin’ny rano.
  '32':
  - type: text
    content: 'Ary Jaona nanambara ka nanao hoe: Izaho nahita ny Fanahy midina avy any an-danitra tahaka ny voromailala ka nitoetra teo amboniny. '
  '33':
  - type: text
    content: 'Ary izaho tsy nahalala Azy; fa Izay naniraka ahy hanao batisa amin’ny rano no nilaza tamiko hoe: Izay ho hitanao idinan’ny Fanahy sy itoerany, dia Izy no Mpanao batisa amin’ny Fanahy Masina. '
  '34':
  - type: text
    content: Ary nahita aho, ka dia nanambara fa Izy no Zanak’Andriamanitra.
  - type: heading
    content: Ny nahazoan’i Jesosy ny mpianany voalohany.
  '35':
  - type: text
    content: 'NONY ampitson’iny indray dia nijanona Jaona sy ny mpianany roa lahy; '
  '36':
  - type: text
    content: 'ary nijery an’i Jesosy nitsangantsangana izy ka nanao hoe: Indro ny Zanak’ondrin’Andriamanitra! '
  '37':
  - type: text
    content: 'Ary ireo mpianatra roa lahy ireo, rehefa nandre azy niteny, dia nanaraka an’i Jesosy. '
  '38':
  - type: text
    content: 'Ary Jesosy nitodika ka nahita azy manaraka, dia nanao taminy hoe: Inona no tadiavinareo? Ary hoy izy roa lahy taminy: Raby (izay atao hoe, raha adika, Mpampianatra ô), aiza Hianao no mitoetra? '
  '39':
  - type: text
    content: 'Hoy Izy taminy: Avia, fa ho hitanareo. Koa dia nandeha izy ka nahita izay nitoerany ary nitoetra teo aminy tamin’izany andro izany; ary efa tokony ho ora fahafolo tamin’izay.'
  '4':
  - type: text
    content: 'Izy no nisiam-piainana; ary ny fiainana no fanazavana ny olona. '
  '40':
  - type: text
    content: 'Andrea, rahalahin’i Simona Petera, no anankiray tamin’izy roa lahy, izay nandre ny tenin’i Jaona ka nanaraka an’i Jesosy. '
  '41':
  - type: text
    content: 'Izy no nahita an’i Simona rahalahiny aloha, dia hoy izy taminy: Efa nahita ny Mesia izahay (izay atao hoe, raha adika, ny Kristy). '
  '42':
  - type: text
    content: 'Dia nitondra azy ho any amin’i Jesosy izy. Ary nony nijery azy Jesosy, dia hoy Izy: Hianao no Simona, zanak’i Jaona; hianao hatao hoe Kefasy (izay atao hoe, raha adika, Petera'
  - type: note
    content: Petera = Vato.
  - type: text
    content: )
  '43':
  - type: text
    content: 'Nony ampitso dia te-hiala ho any Galilia Jesosy, ary nahita an’i Filipo Izy ka nanao taminy hoe: Manaraha Ahy. '
  '44':
  - type: text
    content: Ary Filipo dia avy any Betsaida, tanànan’i Andrea sy Petera.
  '45':
  - type: text
    content: 'Filipo kosa nahita an’i Natanaela ka nanao taminy hoe: Efa hitanay Ilay nosoratan’i Mosesy tao amin’ ny lalàna, sy nosoratan’ny mpaminany, dia Jesosy, zanak’i Josefa, avy any Nazareta. '
  '46':
  - type: text
    content: 'Ary hoy Natanaela taminy: Moa mba misy zava-tsoa va avy any Nazareta? Dia hoy Filipo taminy: Andeha hizaha.'
  '47':
  - type: text
    content: 'Jesosy nahita an’i Natanaela avy manatona Azy, dia nilaza azy hoe: Indro ny tena Isiraelita tsy misy fitaka. '
  '48':
  - type: text
    content: 'Hoy Natanaela taminy: Ahoana no ahafantaranao ahy? Dia namaly Jesosy ka nanao taminy hoe: Fony tsy mbola niantso anao Filipo, dia hitako teo ambanin’ny aviavy'
  - type: note
    content: aviavimbazaha.
  - type: text
    content: ' hianao. '
  '49':
  - type: text
    content: 'Dia namaly Natanaela ka nanao hoe: Raby ô, Hianao no Zanak’Andriamanitra; Hianao no Mpanjakan’ny Isiraely. '
  '5':
  - type: text
    content: Ary ny mazava dia mamirapiratra ao amin’ny maizina; fa ny maizina tsy nandray azy.
  - type: note
    content: 'Na: tsy nahasakana azy.'
  '50':
  - type: text
    content: 'Jesosy namaly ka nanao taminy hoe: Moa ny nilazako taminao va fa hitako teo ambanin’ny aviavy hianao no inoanao? Hahita zavatra lehibe noho izany hianao. '
  '51':
  - type: text
    content: 'Ary hoy koa Izy taminy: Lazaiko aminareo marina dia marina tokoa: Ho hitanareo ny lanitra misokatra sy ny anjelin’Andriamanitra miakatra sy midina eo ambonin’ny Zanak’olona.'
  '6':
  - type: text
    content: 'Nisy lehilahy nirahin’Andriamanitra, Jaona no anarany. '
  '7':
  - type: text
    content: 'Izy tonga ho vavolombelona hanambara ny Mazava, mba hinoan’ny olona rehetra noho ny teniny. '
  '8':
  - type: text
    content: 'Tsy izy anefa no Ilay Mazava, fa '
  - type: text
    content: tonga
  - type: text
    content: ' ho vavolombelona hanambara ny Mazava ihany izy.'
  '9':
  - type: text
    content: Tao ny tena Mazava
  - type: note
    content: 'Na: Izy no tena Mazava.'
  - type: text
    content: ' Izay mahazava ny olona rehetra tonga amin’izao tontolo izao.'
  - type: note
    content: 'Na: Ny Mazava marina, Izay mahazava ny olona rehetra, dia tonga amin’izao tontolo izao.'
  - type: text
    content: ' '
