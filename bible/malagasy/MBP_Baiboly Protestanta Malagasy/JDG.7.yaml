document_id: JDG.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dia nifoha maraina koa Jerobala (Gideona izany) sy ny vahoaka rehetra teo aminy ka nitoby teo akaikin’ny loharano Haroda;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Haroda = Fangovitana; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: izahao and.3.
      marker-yv: yv-n
    - type: text
      text: ' ary ny tobin’ny Midiana kosa teo avarany, teo an-dohasaha anilan’ny havoana More.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa raha matahotra hidina hianao, dia aoka hidina miaraka aminao ho any amin’ny toby Pora zatovonao; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: dia ho renao izay lazain’ny olona, ary rehefa afaka izany, dia hampaherezina ny tànanao hidinanao any amin’ny toby.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nidina niaraka tamin’i Pora zatovony izy ho any an-tsisin’ny olona efa voaomana hiady, izay teo amin’ny toby. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ny Midiana sy ny Amalekita ary ny zanaky ny atsinanana rehetra dia nandry teny an-dohasaha, tahaka ny valala ny hamarony; ary tsy hita isa ny ramevany, tahaka ny fasika any amoron-dranomasina ny hamarony.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary raha tonga tao Gideona, indro, nisy lehilahy nilaza nofy tamin’ny namany ka nanao hoe: Nanonofy aho, ka, indro, nisy mofo vary hordea nikodiadia ho eo amin’ny tobin’ny Midina ka nankamin’ny lay anankiray, dia nampiongana ka nampivadika azy, ka dia nipetraka teo ny lay. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia namaly ilay namany ka nanao hoe: Tsy zavatra hafa izany, fa ny sabatr’i Gideona, zanak’i Joasy, lehilahy Isiraelita, mihitsy: efa natolotr’Andriamanitra eo an-tànany ny Midiana sy ny toby rehetra.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary rehefa ren’i Gideona ny filàzany ny nofy sy ny heviny, dia nivavaka izy; ary niverina ho any amin’ny tobin’ny Isiraely izy ka nanao hoe: Mitsangàna, fa efa natolotr’i Jehovah eo an-tànanareo ny tobin’ny Midiana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nozarainy telo toko ny telon-jato lahy, ary samy nomeny anjomara iray avy ho eny an-tànany ary siny tsy nisy rano sy fanilo tao anatin’ny siny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy izy taminy: Mijere ahy hianareo, ka manaova araka izay ataoko; ary, indro, raha mankany amin’ny sisin’ny toby aho, dia izay ataoko ihany no mba ataovinareo koa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Raha mitsoka ny anjomara izaho sy izay miaraka amiko, dia mba mitsofa ny anjomara manodidina ny toby rehetra koa hianareo, ka miantsoa hoe: An’i Jehovah sy Gideona!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nankany amin’ny sisin’ny toby tamin’ny fiandohan’ny fiambenana faharoa Gideona sy ny zato lahy izay teo aminy; raha vao nalatsaka ny fiambenana; dia nitsoka ny anjomara ireo sady namaky ny siny teny an-tànany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hoy Jehovah tamin’i Gideona: Maro loatra ny vahoaka eo aminao, ka tsy hanolotra ny Midiana eo an-tànany Aho, fandrao hirehareha amiko ny Isiraely ka hanao hoe: Ny tànako ihany no namonjy ahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia mba nitsoka ny anjomara avokoa ny telo toko sady namaky ny sininy, ka nihazona ny fanilo teny an-tànany ankavia ary ny anjomara teny an-tànany ankavanana mba hotsofiny; dia niantso hoe izy: Ny sabatr’i Jehovah sy Gideona! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary samy nijanona teo amin’ny fitoerany avy manodidina ny toby izy rehetra; dia nihazakazaka ny miaramila rehetra ka ninananana sady nandositra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nitsoka ny anjomara ny telon-jato lahy, ary nampifamelezin’i Jehovah tamin’ny sabatra ny miaramila eran’ny toby rehetra, dia nandositra hatrany Beti-sita izy ka hatrany Zereraha sy hatramin’ny fari-tanin’i Abela-mehola akaiky an’i Tabata. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dia nivory ny lehilahy amin’ny Isiraely avy tamin’ny Naftaly sy ny Asera ary ny Manase rehetra ka nanenjika ny Midiana.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary Gideona naniraka olona hitety ny tany havoan’i Efraima rehetra ka nanao hoe: Midina hisakana ny Midiana, ka vonjeo ny rano eo alohany hatrany Beti-bara sy Jordana. Dia nivory ny lehilahy rehetra amin’ny Efraima ka namonjy ny rano hatrany Beti-bara sy Jordana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nisambotra ny andriana roa lahy amin’ny Midiana izy, dia Oreba sy Zeba, ary Oreba novonoiny teo ambonin’ny vatolampin’i Oreba, ary Zeba novonoiny teo amin’ny famiazam-boalobok’i Zeba, dia nanenjika ny Midiana izy; ary ny lohan’i Oreba sy Zeba dia nentiny tany amin’i Gideona tany an-dafin’i Jordana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa ankehitriny andeha miantso eo anatrehan’ny vahoaka hoe: Na iza na iza no matahotra sy mangovitra, aoka izy hiverina ka hiala amin’ny tany havoan’i Gileada. Dia niverina ny olona roa arivo sy roa alina; fa ny iray alina no sisa.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa hoy Jehovah tamin’i Gideona: Mbola maro ihany ny olona; koa ampidino ho eo amin’ny rano izy, ary eo no hizahako toetra azy ho anao; ary izay holazaiko aminao hoe: Io no hiaraka aminao, dia izy no hiaraka aminao; ary izay rehetra holazaiko aminao hoe: Io no tsy hiaraka aminao, dia izy kosa no tsy hiaraka aminao.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary dia nampidinin’i Gideona ho eo amin’ny rano ny olona; ary hoy Jehovah taminy: Izay rehetra milelaka rano amin’ny lelany tahaka ny filelaky ny amboa dia atokàny, ary izay rehetra mandohalika kosa hisotro dia atokàny koa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary telon-jato lahy no isan’izay nanainga ny tànany tamin’ny vavany ka nilelaka; fa ny olona sisa rehetra dia nandohalika hisotro rano.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary hoy Jehovah tamin’i Gideona: Ny telon-jato lahy izay nilelaka rano no hamonjeko anareo ka hanolorako ny Midiana eo an-tànanao; fa aoka ny olona sisa rehetra samy hody any amin’ny fonenany avy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary ny olona nitondra vatsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary nitondra ny vatsin’ny olona ireo.
      marker-yv: yv-n
    - type: text
      text: ' sy ny anjomarany teny an-tànany; ary ny Isiraely sisa dia nalefany hody samy ho any amin’ny lainy avy, fa ny telon-jato lahy ihany no nohazoniny; ary ny tobin’ny Midiana dia teo ambaniny teo an-dohasaha.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary tamin’izany alina izany dia hoy Jehovah tamin’i Gideona: Mitsangàna, midìna ho any amin’ny toby hianao; fa efa natolotro eo an-tànanao io. '
