document_id: HEB.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa ny lalàna, izay misy aloky ny zava-tsoa ho avy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fa
    - type: text
      text: ' tsy ny tena endrik’izany zavatra izany, dia tsy mba mahatanteraka ny olona manatona amin’izay fanatitra ateriny mandrakariva isan-taona. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Amin’izany sitrapo izany no nanamasinana antsika tamin’ny nanaterana ny tenan’i Jesosy Kristy indray mandeha.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny mpisorona rehetra dia mitsangana isan-andro manao fanompoam-pivavahana sy manatitra ireny fanatitra ireny ihany matetika izay tsy mahaisotra ny ota; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: fa Izy kosa, rehefa nanao fanatitra iray monja ho mandrakizay noho ny ota, dia efa mipetraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: noho ny ota, dia efa mipetraka mandrakizay.
      marker-yv: yv-n
    - type: text
      text: ' eo an-tànana ankavanan’Andriamanitra, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ka hatramin’izao dia miandry Izy mandra-panaony ny fahavalony ho fitoeran-tongony. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ny fanatitra iray ihany no efa nahatanterahany ho mandrakizay izay olona hamasinina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny Fanahy Masina koa manambara izany amintsika; fa rehefa voalazany hoe:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ',,Izao no fanekena hataoko aminy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rehefa afaka izany andro izany, hoy Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ao am-pony ny lalàko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hosoratako ao an-tsainy,’’
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'hoy koa Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Ny fahotany sy ny helony tsy hotsarovako intsony’’ (Jer. 31.33, 34).'
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary rehefa misy famelana ireo, dia tsy misy fanatitra noho ny ota intsony.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Teny famporisihana sy fananarana ho an’izay nihamalaina ka nila hihemotra.
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'KOA amin’izany, ry rahalahy, satria manana fahatokiana hiditra ao amin’ny fitoerana masina isika noho ny ran’i Jesosy, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Raha izany, dia tsy ho nitsahatra va ny nanaterany ireo, satria rehefa nodiovina indray mandeha ny mpivavaka, dia tsy ho nasian’ny fieritreretany ny amin’ny otai ntsony izy? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'amin’izay làlana natokany ho antsika, dia làlana vaovao sady velona, namaky teo amin’ny efitra lamba, dia ny nofony, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: it
      children:
      - type: text
        text: sady manana
    - type: text
      text: ' Mpisorona lehibe mitandrina ny tranon’Andriamanitra, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: dia aoka isika hanatona amin’ny fo marina sy amin’ny fahatokiana be avy amin’ny finoana, manana fo voadio
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voafafy.
      marker-yv: yv-n
    - type: text
      text: ' ho afaka amin’ny fieritreretana ratsy sy tena voasasa tamin’ny rano madio; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'aoka hohazonintsika mafy ny fanekena ny fanantenana mba tsy hihozongozonany (fa mahatoky Ilay efa nanao ny teny fikasana); '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary aoka isika hifampandinika hampandroso ny fitiavana sy ny asa tsara; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: aza mahafoy ny fiarahantsika miangona, tahaka ny fanaon’ny sasany, fa mifananara kosa, mainka satria hitanareo fa mihantomotra ny andro.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa raha minia manota isika rehefa nahazo ny fahalalana tsara ny marina, dia tsy misy fanatitra noho ny ota intsony, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'fa fiandrasana mahatahotra amin’ny fitsarana ary fahatezerana mirehitra izay handany ny fahavalo rehetra kosa. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Izay manohitra ny lalàn’i Mosesy dia maty amin’ny tenin’ny vavolombelona roa na telo ka tsy asiana famindrampo; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'manao ahoana kosa ary no hamafin’ny fampijaliana ataonareo tokony hihatra amin’izay nanitsaka ny Zanak’Andriamanitra ka nanao ny ran’ny fanekena izay nanamasinana azy ho zavatra tsy masina sady naniratsira ny Fanahin’ny fahasoavana? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa amin’ireo dia misy fahatsiarovana ny ota isan-taona. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa fantatsika Izay nanao hoe: ,,Ahy ny famaliana; Izaho no hamaly;’’ ary koa: ,,Jehovah hitsara ny olony’’ (Deo. 32.35, 36). '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Zavatra mahatahotra ny ho azon’ny tànan’Andriamanitra velona.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa tsarovy ny andro fahiny izay naharetanareo ny ady mafy tamin’ny fahoriana, rehefa nohazavaina hianareo; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'indraindray raha natao ho fizaha noho ny fanaratsiana sy ny fampahoriana hianareo, ary indraindray koa raha tonga naman’izay azon’izany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Fa sady niara-niaritra tamin’izay nifatotra hianareo no nifaly raha norobaina ny fanananareo, satria fantatrareo fa hianareo dia manana fananana tsara lavitra sady maharitra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fa hianareo dia manana ny tenanareo ho fananana tsara lavitra sady maharitra.
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Koa aza manary ny fahasahianareo izay misy valiny lehibe. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Fa tokony hanana faharetana hianareo mba hahazoanareo izay lazain’ny teny fikasana, rehefa vitanareo ny sitrapon’Andriamanitra.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Fa ,,Rehefa afaka kelikely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tonga Ilay ho avy, fa tsy hitaredretra’’.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Ary ,,ny oloko marina,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.38 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[ny marina].'
      marker-yv: yv-n
    - type: text
      text: ' dia ho velon’ny finoana;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha mihemotra izy, dia tsy sitraky ny fanahiko’’ (Hab. 2.3, 4).
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Fa isika tsy mba naman’izay mihemotra ho amin’ny fahaverezana, fa naman’izay mino ho amin’ny famonjena ny fanahy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tsy mahaisotra ny ota ny ran’ombilahy sy ny ran’osilahy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa nony niditra tamin’izao fiainana izao Izy, dia nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Ny fanatitra alatsa-dra sy ny fanatitra hohanina tsy mba nilainao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tena no namboarinao ho Ahy;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny fanatitra dorana sy ny fanatitra noho ny ota tsy sitrakao;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy Izaho: Inty Aho tonga–'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny horonam-boky no nanoratana Ahy–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanao ny sitraponao, Andriamanitra ô’’. (Sal. 40.6–8).
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rehefa nolazainy teo hoe: ,,Ny fanatitra alatsa-dra sy ny fanatitra hohanina sy ny fanatitra dorana ary ny fanatitra noho ny ota’’ (dia ireny aterina araka ny lalàna) ,,no tsy ilainao ary tsy sitrakao’’, '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'dia hoy indray Izy: ,,Inty Aho tonga hanao ny sitraponao.’’ Manaisotra ny voalohany Izy mba hampitoerany ny faharoa. '
