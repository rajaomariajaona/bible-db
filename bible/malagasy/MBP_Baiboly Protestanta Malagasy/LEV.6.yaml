document_id: LEV.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Lalnàa ho an’ny mpisorona ny amin’ny fanaterany ny fanatitra samy hafa, sy ny hizarazarana azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandidia an’i Arona sy ireo zanany hoe: Izao no lalàna ny amin’ny fanatitra dorana: Ny fanatitra dorana dia ho eo amin’ny fatana eo an-tampon’ny alitara mandritra ny alina mandra-pahamaraina, ary ny afon’ny alitara hirehitra eo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hiakanjoan’ny mpisorona ny akanjony rongony fotsy, ary ny kalisaoniny rongony fotsy dia hataony manolo-koditra, dia handraoka ny lavenona avy amin’ny fanatitra dorana izay nolevonin’ny afo teo ambonin’ny alitara izy ka hametraka azy eo anilan’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hanala ny fitafiany izy ka hitafy fitafiana hafa, dia hamoaka ny lavenona ho eny ivelan’ny toby amin’izay fitoerana madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny afo eo ambonin’ny alitara hirehitra eo ka tsy havela ho faty, fa hotohofan’ny mpisorona kitay hazo isa-maraina; ary ny fanatitra dorana halahany eo amboniny ka hodorany ho fofona eo ambonin’ny saboran’ny fanati-pihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hisy afo mirehitra mandrakariva eo ambonin’ny alitara ka tsy havela ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izao no lalàna ny amin’ny fanatitra hohanina: Ireo zanak’i Arona no hanatitra azy eo anatrehan’i Jehovah eo anoloan’ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hangalany eran-tànan-ila ny koba tsara toto amin’ny fanatitra hohanina sy ny diloilony mbamin’ny ditin-kazo mani-pofona rehetra izay eo ambonin’ny fanatitra hohanina, dia hodorany ho fofona eo ambonin’ny alitara izany fanati-pahatsiarovana izany ho hanitra ankasitrahana ho an’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izay sisa amin’ireny dia hohanin’i Arona sy ireo zanany, koa hataony mofo tsy misy masirasira, ary eo amin’izay fitoerana masina anankiray no hihinanany azy, dia eo anatin’ny kianjan’ny trano-lay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy hasiana masirasira izany raha hendasina; fa efa nomeko ho anjarany avy amin’ny fanatitra atao amin’ny afo ho Ahy izany; masina dia masina izany tahaka ny fanatitra noho ny ota sy tahaka ny fanati-panonerana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny lehilahy rehetra amin’ny zanak’i Arona no mahazo mihinana izany. Ho anjara mandrakizay ho an’ny taranakareo hatramin’ny fara mandimby avy amin’ny fanatitra atao amin’ny afo ho an’i Jehovah izany; ho masina izay rehetra manendry izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no fanatitr’i Arona sy ireo zanany, izay hateriny ho an’i Jehovah amin’izay andro anosorana azy: Koba tsara toto ampahafolon’ny efaha no hatao fanatitra hohanina isan-andro, ny antsasany maraina, ary ny antsasany hariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Amin’ny lapoely no hanaovana azy ka hasiana diloilo; ary rehefa voaendy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vonto.
    marker-yv: yv-n
  - type: text
    text: ' izy, dia ento; voaendy sady voavakivaky toy ny fanatitra hohanina no hanateranao azy ho hanitra ankasitrahana ho an’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ilay mpisorona avy amin’ny zanany, izay voahosotra handimby azy, no hanao izany; anjara mandrakizay ho an’i Jehovah izany ka hodorana ho fofona avokoa;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lalàna mandrakizay fa hodorana ho fofona avokoa ho an’i Jehovah izany.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fa ny fanatitra hohanina rehetra izay aterin’ny mpisorona dia hodorana avokoa, fa tsy hohanina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mitenena amin’i Arona sy ireo zanany hoe: Izao no lalàna ny amin’ny fanatitra noho ny ota: Eo amin’ny famonoana ny fanatitra dorana no hamonoana ny fanatitra noho ny ota eo anatrehan’i Jehovah; ho masina dia masina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ilay mpisorona manatitra azy noho ny ota no hihinana azy; eo amin’izay fitoerana masina no hihinanany azy, dia eo amin’ny kianjan’ny trano-lay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ho masina izay rehetra manendry ny henany; ary raha misy fitafiana ipitihan’ny rany, dia hosasanao eo amin’izay fitoerana masina izay ipitihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny vilany tany izay nandrahoana azy dia hovakivakina; fa raha vilany varahina kosa no nandrahoana azy, dia hofotsiana sy hosasan-drano izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny lehilahy rehetra amin’ny mpisorona no mahazo mihinana azy; masina dia masina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa ny fanatitra noho ny ota izay angalan-dra ho entina ao amin ny trano-lay fihaonana, hanaovana fanavotana ao amin’ny fitoerana masina, dia tsy hohanina; hodorana amin’ny afo izany.
