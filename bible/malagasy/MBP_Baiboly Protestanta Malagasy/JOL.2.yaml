document_id: JOL.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Filazana ny loza hanjo, sy fiantsoana ny olona hibebaka.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TSOFY ao Ziona ny anjomara!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miantsoa mafy ao an-tendrombohitro masina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hangovitra ny mponina rehetra amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa avy ny andron’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, efa antomotra izany,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia andro maizina sy manjombona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andro mandrahona sy maizim-pito,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny fahazavan’ny maraina miely manerana ny tendrombohitra,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia firenena lehibe sy matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy nisy tahaka azy hatrizay hatrizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy hisy tahaka azy intsony any aoriany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny taonan’ny taranaka fara mandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eo alohany misy afo mandevona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any aoriany misy lelafo mandoro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny saha Edena ny tany eo alohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny any aoriany kosa dia tahaka ny efitra foana,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tsy misy tsy azony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitarehin-tsoavaly ny tarehiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny firiotry ny mpitaingin-tsoavaly ny firiotrany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tahaka ny figorodon’ny kalesy any an-tampon’ny tendrombohitra no figorodon’ny fitsambikimbikiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tahaka ny fipororotry ny lelafo eny amin’ny hain-tanety,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny firenena mahery voalamina hiady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eo anoloany dia raiki-tahotra indrindra ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tarehy rehetra mivaloarika;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tera-mena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitsarapaka tahaka ny lehilahy mahery izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mananika ny mànda tahaka ny mpiady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy mandroso amin’izay hitsiny ka tsy vaky laharana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy mifanosika izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa samy mandroso amin’izay hitsiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia miezaka mamaky ny sabatra aza izy, dia tsy voaratra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voasakana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifamoivoy eran’ny tanàna izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihazakazaka eny amin’ny mànda izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mananika ny trano izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miditra ao am-baravarankely toy ny mpangalatra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eo alohany dia mihorohoro ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihozongozona ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masoandro sy ny volana tonga maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kintana tsy mamirapiratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary Jehovah mahatonga kotroka eo alohan’ny miaramilany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lehibe indrindra ny tobiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahery izay manatanteraka ny teniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lehibe sy mahatahotra indrindra ny andron’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka iza no mahatanty izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa na dia ankehitriny aza, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miverena amiko amin’ny fonareo rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny fifadian-kanina sy ny fitomaniana ary ny fitarainana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny fonareo no triatriaro, fa aza ny fitafianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miverena amin’i Jehovah Andriamanitrareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mamindra fo sy miantra Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahari-po sady be famindrampo ary manenina ny amin’ny loza,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fandrao mba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Iza no mahalala na.
    marker-yv: yv-n
  - type: text
    text: ' hanenina ihany Izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamela fitahiana ao aoriany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia fanatitra hohanina sy fanatitra aidina ho an’i Jehovah Andriamanitrareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsofy ao Ziona ny anjomara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manamasìna andro fifadian-kanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantsoa fivoriana masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Angòny ny vahoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manamasìna fiangonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vorio ny loholona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angòny ny ankizy madinika mbamin’ny zaza minono;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny mpampakatra hiala ao an-efi-tranony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny ampakarina hiala ao an-trano fandriany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eo anelanelan’ny lavarangana fidirana sy ny alitara
- type: usfm
  marker: q1
  children:
  - type: text
    text: No aoka hitomanian’ny mpisorona, mpanao fanompoam-pivavahana ho an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hanao hoe: Iantrao ny olonao, Jehovah ô,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza avela ho latsa ny lovanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hotapahin’ny jentilisa;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hanaovan’ny jentilisa azy ho ambentinteny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa nahoana no hataony any amin’ny firenena hoe: Aiza Izay Andriamaniny?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hitsaharan’ny loza, sy ny hihavian’ny fitahiana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ARY Jehovah dia saro-piaro ny taniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady niantra ny olony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Eny, Jehovah namaly ka nanao amin’ny olony hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hanatitra ny divay sy ny ranom-boaloboka ary ny diloilo ho anareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho vokin’izany hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy havelako ho latsa any amin’ny jentilisa intsony hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ilay avy any avaratra dia hampanalaviriko anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka horoahiko ho any amin’ny tany karankaina sy mariry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny loha-làlany ho any amin’ny ranomasina atsinanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vodi-làlany ho any amin’ny ranomasina andrefana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hamaimboany hiakatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fofon-dratsiny hisondrotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nanao zava-dehibe izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aza matahotra, ry tany fambolena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miravoravoa sy mifalia;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa manao zava-dehibe Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aza matahotra, ry biby any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mihamaitso ny kijana any an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamoa ny hazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary vokatra ny aviavy sy ny voaloboka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary hianareo, ry zanak’i Ziona, miravoravoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mifalia amin’i Jehovah Andriamanitrareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hanome anareo ny loha-orana onony Izy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Homeny mpampianatra ny fahamarinana hianareo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handatsaka ranonorana mivatravatra ho anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny loha orana sy ny fara-orana aloha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia ho feno vary ny famoloana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hihoatra ny vata fanantazana ny divay sy ny diloilo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary honerako ho anareo ilay taona nohanin’ny valala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny koraika sy ny sompanga ary ny kijeja, izay miaramilako betsaka nalefako hamely anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary hihinana hianareo ka ho voky
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hidera ny anaran’i Jehovah Andriamanitrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mahagaga ny fitòndrany anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho menatra mandrakizay ny oloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia ho fantatrareo fa ao afovoan’ny Isiraely Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izaho no Jehovah Andriamanitrareo, fa tsy misy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho menatra mandrakizay ny oloko.
