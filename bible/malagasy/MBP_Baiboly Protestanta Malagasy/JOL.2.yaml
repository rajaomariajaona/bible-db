document_id: JOL.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Filazana ny loza hanjo, sy fiantsoana ny olona hibebaka.
  - type: text
    content: TSOFY ao Ziona ny anjomara!
  - type: text
    content: Ary miantsoa mafy ao an-tendrombohitro masina!
  - type: text
    content: Aoka hangovitra ny mponina rehetra amin’ny tany;
  - type: text
    content: Fa avy ny andron’i Jehovah,
  - type: text
    content: Eny, efa antomotra izany,–
  '10':
  - type: text
    content: Eo alohany dia mihorohoro ny tany,
  - type: text
    content: Ary mihozongozona ny lanitra;
  - type: text
    content: Ny masoandro sy ny volana tonga maizina,
  - type: text
    content: Ary ny kintana tsy mamirapiratra.
  '11':
  - type: text
    content: Ary Jehovah mahatonga kotroka eo alohan’ny miaramilany;
  - type: text
    content: Fa lehibe indrindra ny tobiny,
  - type: text
    content: Ary mahery izay manatanteraka ny teniny;
  - type: text
    content: Fa lehibe sy mahatahotra indrindra ny andron’i Jehovah,
  - type: text
    content: Ka iza no mahatanty izany?
  '12':
  - type: text
    content: Koa na dia ankehitriny aza, hoy Jehovah,
  - type: text
    content: Miverena amiko amin’ny fonareo rehetra
  - type: text
    content: Ary amin’ny fifadian-kanina sy ny fitomaniana ary ny fitarainana.
  '13':
  - type: text
    content: Ary ny fonareo no triatriaro, fa aza ny fitafianareo,
  - type: text
    content: Ary miverena amin’i Jehovah Andriamanitrareo;
  - type: text
    content: Fa mamindra fo sy miantra Izy,
  - type: text
    content: Mahari-po sady be famindrampo ary manenina ny amin’ny loza,–
  '14':
  - type: text
    content: Fandrao mba
  - type: note
    content: Heb. Iza no mahalala na.
  - type: text
    content: ' hanenina ihany Izy'
  - type: text
    content: Ka hamela fitahiana ao aoriany,
  - type: text
    content: Dia fanatitra hohanina sy fanatitra aidina ho an’i Jehovah Andriamanitrareo.
  '15':
  - type: text
    content: Tsofy ao Ziona ny anjomara,
  - type: text
    content: Ka manamasìna andro fifadian-kanina,
  - type: text
    content: Miantsoa fivoriana masina.
  '16':
  - type: text
    content: Angòny ny vahoaka,
  - type: text
    content: Manamasìna fiangonana,
  - type: text
    content: Vorio ny loholona,
  - type: text
    content: Angòny ny ankizy madinika mbamin’ny zaza minono;
  - type: text
    content: Aoka ny mpampakatra hiala ao an-efi-tranony,
  - type: text
    content: Ary aoka ny ampakarina hiala ao an-trano fandriany.
  '17':
  - type: text
    content: Eo anelanelan’ny lavarangana fidirana sy ny alitara
  - type: text
    content: No aoka hitomanian’ny mpisorona, mpanao fanompoam-pivavahana ho an’i Jehovah,
  - type: text
    content: 'Ka hanao hoe: Iantrao ny olonao, Jehovah ô,'
  - type: text
    content: Ary aza avela ho latsa ny lovanao,
  - type: text
    content: Ka hotapahin’ny jentilisa;
  - type: note
    content: 'Na: Hanaovan’ny jentilisa azy ho ambentinteny.'
  - type: text
    content: 'Fa nahoana no hataony any amin’ny firenena hoe: Aiza Izay Andriamaniny?'
  - type: heading
    content: Ny hitsaharan’ny loza, sy ny hihavian’ny fitahiana.
  '18':
  - type: text
    content: ARY Jehovah dia saro-piaro ny taniny
  - type: text
    content: Sady niantra ny olony.
  '19':
  - type: text
    content: 'Eny, Jehovah namaly ka nanao amin’ny olony hoe:'
  - type: text
    content: Indro, hanatitra ny divay sy ny ranom-boaloboka ary ny diloilo ho anareo Aho,
  - type: text
    content: Ka ho vokin’izany hianareo;
  - type: text
    content: Ary tsy havelako ho latsa any amin’ny jentilisa intsony hianareo.
  '2':
  - type: text
    content: Dia andro maizina sy manjombona,
  - type: text
    content: Andro mandrahona sy maizim-pito,
  - type: text
    content: Toy ny fahazavan’ny maraina miely manerana ny tendrombohitra,–
  - type: text
    content: Dia firenena lehibe sy matanjaka,
  - type: text
    content: Ka tsy nisy tahaka azy hatrizay hatrizay,
  - type: text
    content: Sady tsy hisy tahaka azy intsony any aoriany
  - type: text
    content: Hatramin’ny taonan’ny taranaka fara mandimby.
  '20':
  - type: text
    content: Ary ilay avy any avaratra dia hampanalaviriko anareo
  - type: text
    content: Ka horoahiko ho any amin’ny tany karankaina sy mariry;
  - type: text
    content: Ny loha-làlany ho any amin’ny ranomasina atsinanana,
  - type: text
    content: Ary ny vodi-làlany ho any amin’ny ranomasina andrefana;
  - type: text
    content: Ary ny hamaimboany hiakatra,
  - type: text
    content: Ary ny fofon-dratsiny hisondrotra;
  - type: text
    content: Fa efa nanao zava-dehibe izy.
  '21':
  - type: text
    content: Aza matahotra, ry tany fambolena,
  - type: text
    content: Miravoravoa sy mifalia;
  - type: text
    content: Fa manao zava-dehibe Jehovah.
  '22':
  - type: text
    content: Aza matahotra, ry biby any an-tsaha,
  - type: text
    content: Fa mihamaitso ny kijana any an-efitra,
  - type: text
    content: Mamoa ny hazo,
  - type: text
    content: Ary vokatra ny aviavy sy ny voaloboka.
  '23':
  - type: text
    content: Ary hianareo, ry zanak’i Ziona, miravoravoa
  - type: text
    content: Sy mifalia amin’i Jehovah Andriamanitrareo;
  - type: text
    content: Fa hanome anareo ny loha-orana onony Izy,
  - type: note
    content: 'Na: Homeny mpampianatra ny fahamarinana hianareo.'
  - type: text
    content: Dia handatsaka ranonorana mivatravatra ho anareo,
  - type: text
    content: Eny, ny loha orana sy ny fara-orana aloha.
  '24':
  - type: text
    content: Dia ho feno vary ny famoloana,
  - type: text
    content: Ary hihoatra ny vata fanantazana ny divay sy ny diloilo.
  '25':
  - type: text
    content: Ary honerako ho anareo ilay taona nohanin’ny valala,
  - type: text
    content: Dia ny koraika sy ny sompanga ary ny kijeja, izay miaramilako betsaka nalefako hamely anareo.
  '26':
  - type: text
    content: Ary hihinana hianareo ka ho voky
  - type: text
    content: Dia hidera ny anaran’i Jehovah Andriamanitrareo,
  - type: text
    content: Fa mahagaga ny fitòndrany anareo;
  - type: text
    content: Ary tsy ho menatra mandrakizay ny oloko.
  '27':
  - type: text
    content: Dia ho fantatrareo fa ao afovoan’ny Isiraely Aho,
  - type: text
    content: Ary Izaho no Jehovah Andriamanitrareo, fa tsy misy hafa;
  - type: text
    content: Ary tsy ho menatra mandrakizay ny oloko.
  '3':
  - type: text
    content: Eo alohany misy afo mandevona,
  - type: text
    content: Ary any aoriany misy lelafo mandoro;
  - type: text
    content: Tahaka ny saha Edena ny tany eo alohany,
  - type: text
    content: Fa ny any aoriany kosa dia tahaka ny efitra foana,–
  - type: text
    content: Eny, tsy misy tsy azony.
  '4':
  - type: text
    content: Mitarehin-tsoavaly ny tarehiny;
  - type: text
    content: Ary tahaka ny firiotry ny mpitaingin-tsoavaly ny firiotrany.
  '5':
  - type: text
    content: Tahaka ny figorodon’ny kalesy any an-tampon’ny tendrombohitra no figorodon’ny fitsambikimbikiny,
  - type: text
    content: Sy tahaka ny fipororotry ny lelafo eny amin’ny hain-tanety,
  - type: text
    content: Ary tahaka ny firenena mahery voalamina hiady.
  '6':
  - type: text
    content: Eo anoloany dia raiki-tahotra indrindra ny firenena;
  - type: text
    content: Ny tarehy rehetra mivaloarika;
  - type: note
    content: 'Na: tera-mena.'
  '7':
  - type: text
    content: Mitsarapaka tahaka ny lehilahy mahery izy
  - type: text
    content: Ary mananika ny mànda tahaka ny mpiady,
  - type: text
    content: Samy mandroso amin’izay hitsiny ka tsy vaky laharana;
  '8':
  - type: text
    content: Tsy mifanosika izy,
  - type: text
    content: Fa samy mandroso amin’izay hitsiny;
  - type: text
    content: Ary na dia miezaka mamaky ny sabatra aza izy, dia tsy voaratra.
  - type: note
    content: 'Na: voasakana.'
  '9':
  - type: text
    content: Mifamoivoy eran’ny tanàna izy,
  - type: text
    content: Mihazakazaka eny amin’ny mànda izy,
  - type: text
    content: Mananika ny trano izy,
  - type: text
    content: Miditra ao am-baravarankely toy ny mpangalatra izy.
