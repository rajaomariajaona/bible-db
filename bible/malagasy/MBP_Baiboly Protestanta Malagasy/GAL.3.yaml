document_id: GAL.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famonjena sy ny fahafahan’ny mino an’i Kristy ampitahaina amin’ny fahamelohana sy ny fahandevozan’izay miankina amin’ny lalàna.
  - type: text
    content: RY Galatiana adala, iza no nanimba
  - type: note
    content: Gr. namosavy.
  - type: text
    content: ' anareo; kanefa teo imasonareo indrindra no nanehoana marimarina an’i Jesosy Kristy voahombo tamin’ny hazofijaliana? '
  '10':
  - type: text
    content: 'Fa izay rehetra amin’ny asan’ny lalàna dia eo ambanin’ny fanozonana; fa voasoratra hoe: ,,Voaozona izay rehetra tsy maharitra mankatò ny zavatra rehetra voasoratra ao amin’ny bokin’ny lalàna’’ (Deo. 27.26). '
  '11':
  - type: text
    content: Ary hita marimarina fa amin’ny lalàna dia tsy misy olona hamarinina eo anatrehan’Andriamanitra; fa ,,ny marina amin’ny finoana no ho velona
  - type: note
    content: 'Na: ,,ny marina ho velon’ny finoana.’’'
  - type: text
    content: '’’ (Hab. 2.4). '
  '12':
  - type: text
    content: 'Ary ny lalàna tsy araka ny finoana; fa ,,izay mahatandrina izany no ho velona aminy’’ (Lev. 18.5). '
  '13':
  - type: text
    content: 'Kristy nanavotra anay tamin’ny ozon’ny lalàna ,satria tonga voaozona hamonjy anay Izy; fa voasoratra hoe: ,,Voaozona izay rehetra mihantona amin’ny hazo’’ (Deo. 21.23), '
  '14':
  - type: text
    content: mba ho tonga amin’ny jentilisa ny fitahiana an’i Abrahama ao amin’i Kristy Jesosy, ary mba horaisintsika amin’ny finoana ny teny fikasana ny amin’ny Fanahy.
  '15':
  - type: text
    content: Ry rahalahy–miteny araka ny fanaon’ny olona aho–na dia ny fanekena
  - type: note
    content: 'Na: didim-pananana.'
  - type: text
    content: ' ataon’olona ihany aza, rehefa vita mafy, dia tsy fanao ny manatsoaka na manampy izany. '
  '16':
  - type: text
    content: 'Ary tamin’i Abrahama sy ny taranany no nilazana ny teny fikasana. Tsy lazainy hoe: Ary ho an’ny taranaka, toy ny milaza ny maro; fa toy ny milaza ny anankiray, ,,ary ho an’ny taranakao’’ (Gen. 22.18), dia Kristy izany. '
  '17':
  - type: text
    content: 'Ary izao no lazaiko: Ny fanekena izay nataon’Andriamanitra mafy fahiny dia tsy tsoahan’ny lalàna, izay vao natao telo-polo amby efa-jato taona tato aoriana, hahafoana ny teny fikasana. '
  '18':
  - type: text
    content: Fa raha avy amin’ny lalàna ny lova, dia tsy avy amin’ny teny fikasana intsony; nefa tamin’i Abrahama dia teny fikasana no nanomezan’Andriamanitra azy.
  '19':
  - type: text
    content: 'Inona ary ny lalàna? Nanampy noho ny fahadisoana izy ambara-pihavin’ny taranaka izay nomena ny teny fikasana; ary nalahatr’anjely teo an-tànan’ny mpanalalana izany. '
  '2':
  - type: text
    content: 'Izao ihany no tiako holazainareo amiko: Moa ny asan’ny lalàna va no nandraisanareo ny Fanahy, sa ny fitoriana ny finoana?'
  - type: note
    content: 'Na: fandrenesana amin’ny finoana.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Ary ny mpanalalana dia tsy an’ny irery, fa Andriamanitra dia iray ihany.
  '21':
  - type: text
    content: 'Ka moa manohitra ny teny fikasan’Andriamanitra va ny lalàna? Sanatria izany! Fa raha nisy lalàna mahavelona nomena, dia avy tamin’ny lalàna tokoa ny fahamarinana. '
  '22':
  - type: text
    content: 'Fa ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' efa nanidy azy rehetra teo amin’ny fahotana, mba homena ny mino ny teny fikasana noho ny finoana an’i Jesosy Kristy.'
  '23':
  - type: text
    content: 'Fa fony tsy mbola tonga ny finoana, dia voambina tao ambanin’ny lalàna isika ka voahidy ho amin’ny finoana izay efa haseho ato aoriana. '
  '24':
  - type: text
    content: 'Koa ny lalàna dia mpitaiza antsika ho amin’i Kristy, mba hohamarinina noho ny finoana isika. '
  '25':
  - type: text
    content: 'Fa rehefa tonga ny finoana, dia tsy fehezin’izay mpitaiza intsony isika. '
  '26':
  - type: text
    content: 'Fa hianareo rehetra dia zanak’Andriamanitra amin’ny finoana an’i Kristy Jesosy. '
  '27':
  - type: text
    content: 'Fa na iza na iza hianareo no natao batisa ho an’i Kristy dia nitafy an’i Kristy. '
  '28':
  - type: text
    content: 'Tsy misy intsony na Jiosy na Grika, na andevo na tsy andevo, na lahy sy vavy; fa iray ihany hianareo rehetra ao amin’i Kristy Jesosy. '
  '29':
  - type: text
    content: Fa raha an’i Kristy hianareo, dia taranak’i Abrahama sy mpandova araka ny teny fikasana.
  '3':
  - type: text
    content: 'Adala toy izany va hianareo? Rehefa nanomboka tamin’ny Fanahy hianareo, dia hahatanteraka amin’ny nofo va ankehitriny? '
  '4':
  - type: text
    content: 'Moa izany zavatra be izany dia efa niaretanareo foana, raha dia foana tokoa izany? '
  '5':
  - type: text
    content: Ary Izay manome anareo ny Fanahy sy mahavita asa lehibe eo aminareo, moa avy amin’ny asan’ny lalàna va izany, sa avy amin’ny fitoriana ny finoana?
  - type: note
    content: 'Na: fandrenesana amin’ny finoana.'
  '6':
  - type: text
    content: 'Dia tahaka an’i ,,Abrahama nino an’Andriamanitra, ka dia nisaina ho fahamarinany izany’’ (Gen. 15.6). '
  '7':
  - type: text
    content: 'Koa fantaro fa izay amin’ny finoana no zanak’i Abrahama. '
  '8':
  - type: text
    content: 'Ary satria hitan’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' rahateo fa amin’ny finoana no anamarinan’Andriamanitra ny jentilisa, dia nitory ny filazantsara tamin’i Abrahama rahateo izy, nanao hoe: ,,Aminao no hitahiana ny firenena rehetra’’ (Gen. 12.3); '
  '9':
  - type: text
    content: ka dia izay amin’ny finoana notahina mbamin’i Abrahama mpino.
