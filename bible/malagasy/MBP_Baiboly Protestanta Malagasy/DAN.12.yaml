document_id: DAN.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary amin’izany andro izany dia hitsangana Mikaela, andrian-dehibe, izay mitsangana hiaro ny zanaky ny firenenao; ary hisy andro fahoriana, izay tsy nisy tahaka azy hatrizay nisian’ny firenena ka hatramin’izany andro izany; ary amin’izany dia ho afaka ny firenenao, dia izay rehetra hita voasoratra ao amin’ny boky. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Maro no hodiovina sy hofotsiana ary hozahan-toetra; fa ny ratsy fanahy kosa mbola hanao ratsy ihany, ary tsy hisy amin’ny ratsy fanahy hahafantatra, fa ny hendry no hahafantatra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hatramin’ny andro hampitsaharana ny fanatitra isan-andro sy hampidirana ny fahavetavetana mahatonga fandravana dia hisy andro sivi-folo sy roan-jato amby arivo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sambatra izay miandry sy mahatratra ny andro dimy amby telo-polo amby telon-jato sy arivo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa mandehana hianao mandra-pihavin’ny farany; fa hitsahatra hianao ka hitsangana ho ao amin’ny anjaranao amin’ny andro farany
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary maro amin’izay matory ao amin’ny vovoky ny tany no hifoha: ny sasany ho amin’ny fiainana mandrakizay, ary ny sasany ho amin’ny henatra sy ny latsa mandrakizay. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary izay hendry dia hamirapiratra toy ny famirapiratry ny lanitra; ary izay mamerina ny maro ho amin’ny fahamarinana dia ho tahaka ny kintana mandrakizay doria.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Teny farany.
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ARY hianao, ry Daniela, dia ahoroninao ny teny, ka asio tombo-kase ny taratasy mandra-pihavin’ny andro farany; maro no hazoto mandinika,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Heb.
        - type: text
          text: ' hivoivoy.'
      marker-yv: yv-n
    - type: text
      text: ' ka hitombo ny fahalalana.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nijery aho Daniela, ka, indro, nisy roa hafa koa nitsangana, ny anankiray teto amoron’ny ony, ary ny anankiray kosa teroa an-dafiny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy ny anankiray tamin’ilay lehilahy mitafy rongony fotsy, izay teo ambonin’ny rano amin’ny ony: Mandra-pahoviana vao ho tanteraka ny faran’ireo fahagagana ireo? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ilay lehilahy mitafy rongony fotsy, izay teo ambonin’ny rano amin’ny ony, dia nanandratra ny tànany ankavanana sy ny tànany ankavia ho amin’ny lanitra ka reko nianiana tamin’Izay velona mandrakizay izy fa ho fetr’andro iray sy fetr’andro '
    - type: usfm
      marker: it
      children:
      - type: text
        text: roa
    - type: text
      text: ' ary antsasaky ny fetr’andro; ary rehefa vita ny fanamontsamontsanana ny herin’ny olo-masina, dia ho tanteraka ireo rehetra ireo.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nandre izany aho, nefa tsy nahafantatra; dia hoy izaho: Tompoko ô, hanao ahoana no hiafaran’ireo zavatra ireo? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy izy: Andeha, ry Daniela, fa efa voahorona ny teny sady voaisy tombo-kase mandra-pihavin’ny andro farany. '
