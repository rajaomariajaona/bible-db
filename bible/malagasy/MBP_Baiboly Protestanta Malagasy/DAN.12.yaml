document_id: DAN.12,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary amin’izany andro izany dia hitsangana Mikaela, andrian-dehibe, izay mitsangana hiaro ny zanaky ny firenenao; ary hisy andro fahoriana, izay tsy nisy tahaka azy hatrizay nisian’ny firenena ka hatramin’izany andro izany; ary amin’izany dia ho afaka ny firenenao, dia izay rehetra hita voasoratra ao amin’ny boky. '
  '10':
  - type: text
    content: 'Maro no hodiovina sy hofotsiana ary hozahan-toetra; fa ny ratsy fanahy kosa mbola hanao ratsy ihany, ary tsy hisy amin’ny ratsy fanahy hahafantatra, fa ny hendry no hahafantatra. '
  '11':
  - type: text
    content: 'Ary hatramin’ny andro hampitsaharana ny fanatitra isan-andro sy hampidirana ny fahavetavetana mahatonga fandravana dia hisy andro sivi-folo sy roan-jato amby arivo. '
  '12':
  - type: text
    content: 'Sambatra izay miandry sy mahatratra ny andro dimy amby telo-polo amby telon-jato sy arivo. '
  '13':
  - type: text
    content: Fa mandehana hianao mandra-pihavin’ny farany; fa hitsahatra hianao ka hitsangana ho ao amin’ny anjaranao amin’ny andro farany
  '2':
  - type: text
    content: 'Ary maro amin’izay matory ao amin’ny vovoky ny tany no hifoha: ny sasany ho amin’ny fiainana mandrakizay, ary ny sasany ho amin’ny henatra sy ny latsa mandrakizay. '
  '3':
  - type: text
    content: Ary izay hendry dia hamirapiratra toy ny famirapiratry ny lanitra; ary izay mamerina ny maro ho amin’ny fahamarinana dia ho tahaka ny kintana mandrakizay doria.
  - type: heading
    content: Teny farany.
  '4':
  - type: text
    content: ARY hianao, ry Daniela, dia ahoroninao ny teny, ka asio tombo-kase ny taratasy mandra-pihavin’ny andro farany; maro no hazoto mandinika,
  - type: note
    content: Heb. hivoivoy.
  - type: text
    content: ' ka hitombo ny fahalalana.'
  '5':
  - type: text
    content: 'Dia nijery aho Daniela, ka, indro, nisy roa hafa koa nitsangana, ny anankiray teto amoron’ny ony, ary ny anankiray kosa teroa an-dafiny. '
  '6':
  - type: text
    content: 'Ary hoy ny anankiray tamin’ilay lehilahy mitafy rongony fotsy, izay teo ambonin’ny rano amin’ny ony: Mandra-pahoviana vao ho tanteraka ny faran’ireo fahagagana ireo? '
  '7':
  - type: text
    content: 'Ary ilay lehilahy mitafy rongony fotsy, izay teo ambonin’ny rano amin’ny ony, dia nanandratra ny tànany ankavanana sy ny tànany ankavia ho amin’ny lanitra ka reko nianiana tamin’Izay velona mandrakizay izy fa ho fetr’andro iray sy fetr’andro '
  - type: text
    content: roa
  - type: text
    content: ' ary antsasaky ny fetr’andro; ary rehefa vita ny fanamontsamontsanana ny herin’ny olo-masina, dia ho tanteraka ireo rehetra ireo.'
  '8':
  - type: text
    content: 'Ary nandre izany aho, nefa tsy nahafantatra; dia hoy izaho: Tompoko ô, hanao ahoana no hiafaran’ireo zavatra ireo? '
  '9':
  - type: text
    content: 'Dia hoy izy: Andeha, ry Daniela, fa efa voahorona ny teny sady voaisy tombo-kase mandra-pihavin’ny andro farany. '
