document_id: JER.46,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: NY tenin’i Jehovah izay tonga tamin’i Jeremia mpaminany ny amin’ny jentilisa.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’i Egypta.
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izao andro izao dia an’i Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho andro famaliana hamaliany ny fahavalony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sabatra hihinana ka ho voky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho mamon’ny ran’ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny Tompo, dia Jehovah, Tompon’ny maro, no mamono zavatra hatao fanatitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any amin’ny tany avaratra ao amoron’ny ony Eofrata.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miakara any Gileada, ka makà balsama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Egypta zanakavavy virijina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foana ny nanaovanao fanafody maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy manana plasitera hapetaka amin’ny ferinao hianao,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa ren’ny firenena ny henatrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiantsoantsoanao nanenika ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mifandona ny samy mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miara-davo izy roa tonta.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny teny izay noalzain’i Jehovah tamin’i Jeremia mpaminany ny amin’ny hihavian’i Nebokadnezara, mpanjakan’i Babylona, hamely ny tany Egypta.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambaraonareo any Egypta, ary torio any Migdola,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, torio any Memfisa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nofa.
      marker-yv: yv-n
    - type: text
      text: ' sy Tapanesa,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka ataovy hoe: Mijoroa tsara hianao, ka miomàna;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandringana manodidina anao ny sabatra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no voapaoka ny maherinao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nahafahatra izy, satria Jehovah no nandroaka azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nahatafintohina ny maro Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka lavo mifanindry ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hoy ireo: Mitsangàna, ka andeha isika hiverina ho any amin’ny firenentsika'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho any amin’ny tany nahaterahantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho afaka amin’ny sabatra mandoza,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nitaraina tany izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tabataba foana Farao, mpanjakan’i Egypta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nandiso ny fotoana izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha velona koa Aho, hoy ny Mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jehovah, Tompon’ny maro, no anarany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka an’i Tabara amin’ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka an’i Karmela ao amoron-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka izany no hihaviany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Egypta zanakavavy mponina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifeheza entana ho entinao any amin’ny fahababoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho tonga tany lao Memfisa,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nofa.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hodorana izy, ka tsy hisy mponina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin’i Egypta. Ny amin’ny miaramilan’i Farao-neko, mpanjakan’i Egypta, izay teny amoron’ny ony Eofrata, tany Karkemisy, dia ilay resin’i Nebokadnezara, mpanjakan’i Babylona, tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypta dia tahaka ny ombivavy kely tsara tarehy dia tsara tarehy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa injay! tamy, eny, tamy ny fihitra avy any avaratra!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny olona karamaina ao aminy aza, izay tahaka ny ombilahy kely mifahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireny koa dia mihodina ka samy mandositra avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahajanona izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa tonga aminy ny andro hahitany loza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny andro hamaliana azy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feony dia toy ny fikasaotsaoky ny menarana mandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandeha hitondra miaramila izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka avy hamely azy amin’ny famaky
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny mpikapa hazo.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kapainy ny alany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria efa nikirindro loatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa maro noho ny valala izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy tambo isaina.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho afa-baraka Egypta zanakavavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatolotra eo an-tànan’ny olona any avaratra izy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hoy Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hovaliako Amona avy any Nô
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Farao sy Egypta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny andriamaniny sy ny mpanjakany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Farao sy izay rehetra matoky azy;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatolotro eo an-tànan’izay mitady ny ainy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eo an-tànan’i Nebokadnezara, mpanjakan’i Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy eo an-tànan’ny mpanompony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aorian’izany, dia handry fahizay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: honenana indray.
      marker-yv: yv-n
    - type: text
      text: ' toy ny tamin’ny andro fahiny ihany izy, hoy Jehovah.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aza matahotra hianao, ry Jakoba mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mivadi-po, ry Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa, indro, hovonjeko avy any amin’ny lavitra hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranakao avy any amin’ny tany nahababo azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiverina Jakoba ka hiadana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, handry fahizay izy, ka tsy hisy hanaitaitra azy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra hianao, ry Jakoba mpanompoko, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa momba anao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia levoniko aza ny firenena rehetra izay nandroahako anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao tsy mba holevoniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa kosa mba hanariko araka ny antonony ihany hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy dia havelako fotsiny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitaova amin’ny ampinga kely sy ny ampinga lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandrosoa hiady;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fehezo amin’ny kalesy ny soavaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary itaingeno ny soavaly fitaingina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijoroa tsara hianareo, ka samia misatroka fiarovan-doha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fotsio ny lefona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miakanjoa ny akanjo fiarovan-tena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy ny ahitako azy! raiki-tahotra sy miamboho izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny maheriny aza dia efa ripaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady miezaka mandositra izy ka tsy miherika akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy fampangorohoroana manodidina, hoy Jehovah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho afa-mandositra ny haingan-tongotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ho afaka ny mahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any avaratra eo amoron’ny ony Eofrata
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hahatafintohina sy hahalavo azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa izato mizotra tahaka an’i Neily,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny onjany misamboaravoara toy ny renirano?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypta mizotra tahaka an’i Neily,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny onjany misamboaravoara toy ny renirano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary hoy izy: Hizotra aho ka hanafotra ny tany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haringako ny tanàna sy ny mponina ao aminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miakara, hianareo soavaly, ary miriota toy ny adala, hianareo kalesy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hivoaka ny lehilahy mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny Etiopiana sy ny Libyana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pota.
      marker-yv: yv-n
    - type: text
      text: ' izay mitana ampinga,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny Lydiana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Loda.
      marker-yv: yv-n
    - type: text
      text: ' izay mitana sy manenjana tsipìka.'
