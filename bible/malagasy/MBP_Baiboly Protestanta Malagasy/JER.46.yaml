document_id: JER.46,873
type_code: plt
verses:
  '1':
  - type: text
    content: NY tenin’i Jehovah izay tonga tamin’i Jeremia mpaminany ny amin’ny jentilisa.
  - type: heading
    content: Faminaniana ny amin’i Egypta.
  '10':
  - type: text
    content: Fa izao andro izao dia an’i Jehovah, Tompon’ny maro,
  - type: text
    content: Ho andro famaliana hamaliany ny fahavalony;
  - type: text
    content: Ary ny sabatra hihinana ka ho voky
  - type: text
    content: Sy ho mamon’ny ran’ireo;
  - type: text
    content: Fa ny Tompo, dia Jehovah, Tompon’ny maro, no mamono zavatra hatao fanatitra
  - type: text
    content: Any amin’ny tany avaratra ao amoron’ny ony Eofrata.
  '11':
  - type: text
    content: Miakara any Gileada, ka makà balsama,
  - type: text
    content: Ry Egypta zanakavavy virijina;
  - type: text
    content: Foana ny nanaovanao fanafody maro,
  - type: text
    content: Fa tsy manana plasitera hapetaka amin’ny ferinao hianao,
  '12':
  - type: text
    content: Efa ren’ny firenena ny henatrao,
  - type: text
    content: Ary ny fiantsoantsoanao nanenika ny tany;
  - type: text
    content: Fa mifandona ny samy mahery,
  - type: text
    content: Ka miara-davo izy roa tonta.
  '13':
  - type: text
    content: Ny teny izay noalzain’i Jehovah tamin’i Jeremia mpaminany ny amin’ny hihavian’i Nebokadnezara, mpanjakan’i Babylona, hamely ny tany Egypta.
  '14':
  - type: text
    content: Ambaraonareo any Egypta, ary torio any Migdola,
  - type: text
    content: Eny, torio any Memfisa
  - type: note
    content: Heb. Nofa.
  - type: text
    content: ' sy Tapanesa,'
  - type: text
    content: 'Ka ataovy hoe: Mijoroa tsara hianao, ka miomàna;'
  - type: text
    content: Fa mandringana manodidina anao ny sabatra.
  '15':
  - type: text
    content: Nahoana no voapaoka ny maherinao?
  - type: text
    content: Tsy nahafahatra izy, satria Jehovah no nandroaka azy.
  '16':
  - type: text
    content: Efa nahatafintohina ny maro Izy,
  - type: text
    content: Ka lavo mifanindry ireo;
  - type: text
    content: 'Dia hoy ireo: Mitsangàna, ka andeha isika hiverina ho any amin’ny firenentsika'
  - type: text
    content: Sy ho any amin’ny tany nahaterahantsika
  - type: text
    content: Ho afaka amin’ny sabatra mandoza,
  '17':
  - type: text
    content: 'Nitaraina tany izy hoe:'
  - type: text
    content: Tabataba foana Farao, mpanjakan’i Egypta,
  - type: text
    content: Efa nandiso ny fotoana izy.
  '18':
  - type: text
    content: Raha velona koa Aho, hoy ny Mpanjaka,
  - type: text
    content: 'Jehovah, Tompon’ny maro, no anarany:'
  - type: text
    content: Tahaka an’i Tabara amin’ny tendrombohitra,
  - type: text
    content: Sy tahaka an’i Karmela ao amoron-dranomasina,
  - type: text
    content: Dia ho tahaka izany no hihaviany.
  '19':
  - type: text
    content: Ry Egypta zanakavavy mponina,
  - type: text
    content: Mifeheza entana ho entinao any amin’ny fahababoana;
  - type: text
    content: Fa ho tonga tany lao Memfisa,
  - type: note
    content: Heb. Nofa.
  - type: text
    content: Eny, hodorana izy, ka tsy hisy mponina.
  '2':
  - type: text
    content: 'Ny amin’i Egypta. Ny amin’ny miaramilan’i Farao-neko, mpanjakan’i Egypta, izay teny amoron’ny ony Eofrata, tany Karkemisy, dia ilay resin’i Nebokadnezara, mpanjakan’i Babylona, tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda:'
  '20':
  - type: text
    content: Egypta dia tahaka ny ombivavy kely tsara tarehy dia tsara tarehy;
  - type: text
    content: Fa injay! tamy, eny, tamy ny fihitra avy any avaratra!
  '21':
  - type: text
    content: Na dia ny olona karamaina ao aminy aza, izay tahaka ny ombilahy kely mifahy,
  - type: text
    content: Ireny koa dia mihodina ka samy mandositra avokoa;
  - type: text
    content: Tsy mahajanona izy,
  - type: text
    content: Fa efa tonga aminy ny andro hahitany loza,
  - type: text
    content: Dia ny andro hamaliana azy.
  '22':
  - type: text
    content: Ny feony dia toy ny fikasaotsaoky ny menarana mandeha;
  - type: text
    content: Fa mandeha hitondra miaramila izy
  - type: text
    content: Ka avy hamely azy amin’ny famaky
  - type: text
    content: Toy ny mpikapa hazo.
  '23':
  - type: text
    content: Kapainy ny alany, hoy Jehovah,
  - type: text
    content: Satria efa nikirindro loatra;
  - type: text
    content: Fa maro noho ny valala izy
  - type: text
    content: Ka tsy tambo isaina.
  '24':
  - type: text
    content: Ho afa-baraka Egypta zanakavavy,
  - type: text
    content: Hatolotra eo an-tànan’ny olona any avaratra izy.
  '25':
  - type: text
    content: Ary hoy Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely;
  - type: text
    content: Indro, hovaliako Amona avy any Nô
  - type: text
    content: Ary Farao sy Egypta
  - type: text
    content: Mbamin’ny andriamaniny sy ny mpanjakany,
  - type: text
    content: Dia Farao sy izay rehetra matoky azy;
  '26':
  - type: text
    content: Ary hatolotro eo an-tànan’izay mitady ny ainy izy,
  - type: text
    content: Dia eo an-tànan’i Nebokadnezara, mpanjakan’i Babylona,
  - type: text
    content: Sy eo an-tànan’ny mpanompony.
  - type: text
    content: Ary aorian’izany, dia handry fahizay
  - type: note
    content: 'Na: honenana indray.'
  - type: text
    content: ' toy ny tamin’ny andro fahiny ihany izy, hoy Jehovah.'
  '27':
  - type: text
    content: Fa aza matahotra hianao, ry Jakoba mpanompoko,
  - type: text
    content: Ary aza mivadi-po, ry Isiraely;
  - type: text
    content: Fa, indro, hovonjeko avy any amin’ny lavitra hianao,
  - type: text
    content: Ary ny taranakao avy any amin’ny tany nahababo azy;
  - type: text
    content: Dia hiverina Jakoba ka hiadana,
  - type: text
    content: Eny, handry fahizay izy, ka tsy hisy hanaitaitra azy.
  '28':
  - type: text
    content: Aza matahotra hianao, ry Jakoba mpanompoko, hoy Jehovah,
  - type: text
    content: Fa momba anao Aho;
  - type: text
    content: Fa na dia levoniko aza ny firenena rehetra izay nandroahako anao,
  - type: text
    content: Hianao tsy mba holevoniko,
  - type: text
    content: Nefa kosa mba hanariko araka ny antonony ihany hianao,
  - type: text
    content: Fa tsy dia havelako fotsiny.
  '3':
  - type: text
    content: Mitaova amin’ny ampinga kely sy ny ampinga lehibe,
  - type: text
    content: Ka mandrosoa hiady;
  '4':
  - type: text
    content: Fehezo amin’ny kalesy ny soavaly,
  - type: text
    content: Ary itaingeno ny soavaly fitaingina;
  - type: text
    content: Mijoroa tsara hianareo, ka samia misatroka fiarovan-doha;
  - type: text
    content: Fotsio ny lefona,
  - type: text
    content: Miakanjoa ny akanjo fiarovan-tena.
  '5':
  - type: text
    content: Indrisy ny ahitako azy! raiki-tahotra sy miamboho izy,
  - type: text
    content: Ary ny maheriny aza dia efa ripaka,
  - type: text
    content: Sady miezaka mandositra izy ka tsy miherika akory;
  - type: text
    content: Fa misy fampangorohoroana manodidina, hoy Jehovah.
  '6':
  - type: text
    content: Tsy ho afa-mandositra ny haingan-tongotra,
  - type: text
    content: Na ho afaka ny mahery;
  - type: text
    content: Any avaratra eo amoron’ny ony Eofrata
  - type: text
    content: No hahatafintohina sy hahalavo azy.
  '7':
  - type: text
    content: Iza moa izato mizotra tahaka an’i Neily,
  - type: text
    content: Ary ny onjany misamboaravoara toy ny renirano?
  '8':
  - type: text
    content: Egypta mizotra tahaka an’i Neily,
  - type: text
    content: Ary ny onjany misamboaravoara toy ny renirano;
  - type: text
    content: 'Ary hoy izy: Hizotra aho ka hanafotra ny tany;'
  - type: text
    content: Haringako ny tanàna sy ny mponina ao aminy.
  '9':
  - type: text
    content: Miakara, hianareo soavaly, ary miriota toy ny adala, hianareo kalesy;
  - type: text
    content: Ary aoka hivoaka ny lehilahy mahery,
  - type: text
    content: Dia ny Etiopiana sy ny Libyana,
  - type: note
    content: Heb. Pota.
  - type: text
    content: ' izay mitana ampinga,'
  - type: text
    content: Ary ny Lydiana,
  - type: note
    content: Heb. Loda.
  - type: text
    content: ' izay mitana sy manenjana tsipìka.'
