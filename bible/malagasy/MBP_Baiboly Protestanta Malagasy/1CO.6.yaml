document_id: 1CO.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny tsy mahamety ny miady eo anatrehan’ny tsy mino.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'MISY aminareo va, raha manana ady amin’ny namany, sahy handeha hotsarain’ny olona tsy marina, fa tsy eo anatrehan’ny olona masina? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy ny mpangalatra sy ny mpierina sy ny mpimamo sy ny mpanaratsy ary ny mpanao an-keriny dia tsy mba handova ny fanjakan’Andriamanitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary efa mba toy izany ihany ny sasany aminareo, saingy efa voasasa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: efa nanasa tena.
      marker-yv: yv-n
    - type: text
      text: ' hianareo, efa nohamasinina hianareo, efa nohamarinina hianareo, tamin’ny anaran’i Jesosy Kristy Tompo sy tamin’ny Fanahin’Andriamanitsika.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fijangajangana tsy azo atao ho isan’ny zavatra tsy mampaninona, tahaka ny hanina samy hafa.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY zavatra rehetra azoko atao, nefa tsy dia ary mahasoa avokoa ny zavatra rehetra; ny zavatra rehetra azoko atao, nefa izaho tsy mety handevozin-javatra na inona na inona. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hanina dia ho an’ny kibo, ary ny kibo ho an’ny hanina; nefa samy holevonin’Andriamanitra izy roroa. Fa ny tena kosa dia tsy ho an’ny fijangajangana, fa ho an’ny Tompo; ary ny Tompo ho an’ny tena. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra efa nanangana ny Tompo sady hanangana antsika koa amin’ny heriny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy fantatrareo va fa momba ny tenan’i Kristy ny tenanareo? Moa hanala ny momba ny tenan’i Kristy va aho ka hanolotra izany ho momba ny tenan’ny vehivavy janga? Sanatria izany! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tsy fantatrareo va fa izay miray amin’ny vehivavy janga dia tena iray aminy? fa hoy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Andriamanitra:'
    - type: text
      text: ' ,,Ho nofo iray ihany izy roroa’’ (Gen. 2. 24). '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay miray amin’ny Tompo kosa dia fanahy iray aminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandosira ny fijangajangana. Izay fahotana rehetra ataon’ny olona dia eny ivelan’ny tena ihany; fa ny mpijangajanga kosa dia manota mihatra amin’ny tenany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana ary? Moa tsy fantatrareo fa ny tenanareo dia tempolin’ny Fanahy Masina, Izay ao anatinareo sady efa azonareo tamin’Andriamanitra? ka tsy tompon’ny tenanareo hianareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa tsy fantatrareo fa ny olona masina dia hitsara izao tontolo izao? Ary raha hitsara izao tontolo izao hianareo, moa tsy mendrika hitsara izay zavatra madinika indrindra va hianareo? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa olom-boavidy hianareo, koa dia mankalazà an’Andriamanitra amin’ny tenanareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy fantatrareo va fa hitsara anjely isika? mainka fa izay zavatra momba izao fiainana izao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha misy hotsarainareo ny amin’ny momba izao fiainana izao, moa izay ataon’ny fiangonana ho tsinontsinona va no tendrenareo ho mpitsara? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hampahamenatra anareo no itenenako izany. Hay! dia tsy misy olon-kendry aminareo, na dia iray akory aza, izay mahay manamboatra ny adin’ny rahalahiny? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny rahalahy mandeha hiady amin’ny rahalahiny, na dia hotsarain’ny tsy mino aza. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ankehitriny dia kilema aminareo ny anananareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: matiantoka mihitsy ny fanahinareo, raha manana.
      marker-yv: yv-n
    - type: text
      text: ' ady amin’ny namanareo. Nahoana no tsy aleo mandefitra ny tsy rariny aza hianareo? Nahoana no tsy aleo maharitra hambakaina aza hianareo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanjo hianareo indray no manao izay tsy marina ka manambaka na dia ny rahalahinareo aza.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tsy fantatrareo va fa ny olona tsy marina tsy mba handova ny fanjakan’Andriamanitra? Aza mety hofitahina hianareo: fa ny mpijangajanga sy ny mpanompo sampy sy ny mpaka vadin’olona sy ny sodomita'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao Lev. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xviii. 22.
      marker-yv: yv-n
    - type: text
      text: ' '
