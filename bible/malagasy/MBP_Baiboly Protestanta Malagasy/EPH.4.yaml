document_id: EPH.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana azy mba hifanara-tsaina sy haharitra ary handroso tsara.
  - type: text
    content: ARY noho izany izaho, mpifatotra noho ny amin’
  - type: note
    content: Gr. ao amin’.
  - type: text
    content: ' ny Tompo, dia mangataka aminareo mba handeha mendrika ny fiantsoana izay niantsoana anareo, '
  '10':
  - type: text
    content: Izay nidina, dia Izy koa no Ilay niakatra any ambonin’ny lanitra rehetra, hamenoany ny zavatra rehetra.)
  '11':
  - type: text
    content: 'Ary Izy no nanome ny sasany ho Apostoly, ary ny sasany ho mpaminany, ary ny sasany ho evanjelista, ary ny sasany ho mpiandry sy mpampianatra, '
  '12':
  - type: text
    content: ho fanatanterahana ny olona masina, ho amin’ny asan’ny fanompoana amin’ny fiangonana,
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' ho amin’ny fampandrosoana ny tenan’i Kristy, '
  '13':
  - type: text
    content: 'mandra-pahatongantsika rehetra ho amin’ny firaisan’ny finoana sy ny fahalalana tsara ny Zanak’Andriamanitra, ka ho lehilahy lehibe, mahatratra ny ohatry ny halehiben’ny fahafenoan’i Kristy; '
  '14':
  - type: text
    content: 'mba tsy ho zaza intsony isika, ka ahilangilana sy ampitambolimbolenin’ny rivotry ny fampianarana samy hafa rehetra amin’ny saim-petsy ataon’ny olona sy ny fihendreny hahatanteraka ny hevitry ny famitahana; '
  '15':
  - type: text
    content: 'fa mba hanaraka ny marina amin’ny fitiavana ka hitombo amin’ny ny zavatra rehetra ho amin’Izay Loha, dia Kristy; '
  '16':
  - type: text
    content: Izy no itomboan’ny tena rehetra (izay akambana sy ampiraisina tsara) noho ny fifanompoan’ny isan-tonony, araka ny fiàsan’izay rehetra momba azy amin’izay mety ho anjara-asany avy ka hampandrosoany ny tenany amin’ny fitiavana.
  - type: heading
    content: Fananarana enti-mampirisika azy mba hadio fitondrantena, ary tsy hanan-tsiny amin’ny toetry ny tokan-tranony.
  '17':
  - type: text
    content: 'KOA izao no lazaiko sady ambarako ao amin’ny Tompo: ny tsy mba handehananareo intsony tahaka ny fandehan’ny jentilisa amin’ny fahafoanan’ny sainy; '
  '18':
  - type: text
    content: 'fa efa tonga maizin-tsaina sy olon-ko azy amin’ny fiainan’Andriamanitra ireny noho ny tsi-fahalalana ny anatiny, noho ny hamafin’ny fony, '
  '19':
  - type: text
    content: 'dia olona tsy mahalala henatra intsony ka nanolo-tena ho amin’ny fijejojejoana hanao izay fahalotoana rehetra amin’ny fieremana. '
  '2':
  - type: text
    content: 'amin’ny fanetren-tena rehetra sy ny fahalemem-panahy, amin’ny fahari-po mifandefitra amin’ny fitiavana, '
  '20':
  - type: text
    content: 'Fa hianareo kosa, dia tsy mba toy izany no nianaranareo an’i Kristy, '
  '21':
  - type: text
    content: 'raha Izy tokoa no renareo ka tao aminy no nampianarana anareo, araka ny fahamarinana izay ao amin’i Jesosy, '
  '22':
  - type: text
    content: mba hialanareo ny toetrareo
  - type: note
    content: Gr. olonareo.
  - type: text
    content: ' taloha araka ny fitondrantenanareo fahiny, izay mihasimba araka ny filan’ny fitaka; '
  '23':
  - type: text
    content: 'fa mba hohavaozina kosa hianareo amin’ny fanahin’ny sainareo, '
  '24':
  - type: text
    content: ary mba hotafinareo ny toetra
  - type: note
    content: Gr. olona.
  - type: text
    content: ' vaovao, izay noforonina araka an’Andriamanitra amin’ny fahitsiana sy ny fahamasinana momba ny fahamarinana.'
  '25':
  - type: text
    content: 'Koa esory ny lainga, ka samia milaza ny marina amin’ny namany avy hianareo rehetra; fa samy isan’ny momba ny tenan’ny namantsika avokoa isika. '
  '26':
  - type: text
    content: 'Tezera, fa aza manota; ary aoka tsy ho tratry ny masoandro milentika ny fahatezeranareo. '
  '27':
  - type: text
    content: 'Aza manome fitoerana ho an’ny devoly. '
  '28':
  - type: text
    content: 'Aoka izay nangalatra tsy hangalatra intsony; fa aleo hikely aina ka hiasa izay tsara amin’ny tànany, mba hisy homeny izay tsy manana. '
  '29':
  - type: text
    content: 'Aoka tsy haloaky ny vavanareo izay teny maloto, fa izay tsara ho fampandrosoana, araka izay tokony hanaovana, mba hahazoan’ny mihaino fahasoavana. '
  '3':
  - type: text
    content: 'mazoto mitana ny firaisana avy amin’ny Fanahy amin’ny fehim-pihavanana. '
  '30':
  - type: text
    content: Ary aza mampalahelo ny Fanahy Masin’Andriamanitra, Izay nanisiana tombo-kase anareo ho amin’ny andro fanavotana.
  '31':
  - type: text
    content: Esory aminareo ny fo-lentika
  - type: note
    content: Gr. fangidiana.
  - type: text
    content: ' rehetra sy ny fahavinirana sy ny fahatezerana sy ny fitabatabana sy ny fitenenan-dratsy'
  - type: note
    content: Gr. blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' ary ny lolompo rehetra; '
  '32':
  - type: text
    content: ary aoka samy halemy fanahy amin’ny namany avy hianareo, ka hifampiantra sy hifamela heloka, tahaka ny namelan’Andriamanitra ny helokareo ao amin’i Kristy.
  '4':
  - type: text
    content: 'Iray ny tena, ary iray ny Fanahy, dia toy ny niantsoana anareo ho amin’ny fanantenana iray momba ny fiantsoana anareo; '
  '5':
  - type: text
    content: 'iray ny Tompo, iray ny finoana, iray ny batisa, '
  '6':
  - type: text
    content: iray Andriamanitra sady Rain’izy rehetra, Izay ambonin’izy rehetra sy manerana azy rehetra ary ao amin’izy rehetra.
  '7':
  - type: text
    content: 'Fa samy nomena ny fahasoavana araka ny ohatry ny fanomezan’i Kristy avy isika rehetra. '
  '8':
  - type: text
    content: 'Koa izany no ilazany hoe:'
  - type: text
    content: ',,Raha niakatra ho any amin’ny avo Izy, dia nitondra olona maro ho babo'
  - type: text
    content: Ka nanome fanomezana ho an’ny olona’’ (Sal. 68.18).
  - type: text
    content: (
  '9':
  - type: text
    content: Ary ny amin’ny hoe ,niakatra’, inona moa izany, afa-tsy ny efa nidina
  - type: note
    content: 'Na: [nidina aloha].'
  - type: text
    content: ' ho any ambanin’ny tany koa? '
