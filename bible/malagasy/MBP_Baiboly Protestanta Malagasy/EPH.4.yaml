    - type: text
      text: 'mandra-pahatongantsika rehetra ho amin’ny firaisan’ny finoana sy ny fahalalana tsara ny Zanak’Andriamanitra, ka ho lehilahy lehibe, mahatratra ny ohatry ny halehiben’ny fahafenoan’i Kristy; '
