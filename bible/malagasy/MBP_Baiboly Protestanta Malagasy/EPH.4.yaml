  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izy no itomboan’ny tena rehetra (izay akambana sy ampiraisina tsara) noho ny fifanompoan’ny isan-tonony, araka ny fiàsan’izay rehetra momba azy amin’izay mety ho anjara-asany avy ka hampandrosoany ny tenany amin’ny fitiavana.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fananarana enti-mampirisika azy mba hadio fitondrantena, ary tsy hanan-tsiny amin’ny toetry ny tokan-tranony.
    marker-yv: yv-h
