document_id: NAM.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: INJANY! any an-tendrombohitra ny tongotry ny mitondra teny soa mahafaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mitory fiadanana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo ny andro firavoravoanao, ry Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efao ny voadinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy handeha hamaky eo aminao intsony ilay tena ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray ripaka izy rehetra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamaboa volafotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamaboa volamena!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy hita lany ny rakitra soa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny habetsahan’ny fanaka mahafinaritra rehetra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! foana, eny, foana sady lao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kivy ny fo, miady ny lohalika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaintaina ny valahany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivaloarika ny tarehiny rehetra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ilay lavaky ny liona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy firemben’ny liona tanora?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay nandehanan’ny liona sy ny liom-bavy mbamin’ny zana-diona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nisy nanaitaitra azy,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay liona namotipotika izay ampy ho an’ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanenda ho an’ny liom-baviny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nameno haza ny lavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy toha ny fonenany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hamely anao Aho, hoy Jehovah, Tompon’ny maro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holevoniko ho setroka ny kalesinao,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kalesiny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hovonoiko sabatra ny liona tanoranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofonganako amin’ny tany ny hazanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy ho re intsony ny feon’ny irakao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy mpanorotoro miakatra hamely anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambeno ny mànda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tazano ny làlana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatanjaho ny valahanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hetseho mafy ny herinao!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah efa mampody ny voninahitr’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miverina ho amin’ilay reharehany.
      marker-yv: yv-n
    - type: text
      text: ' i Jakoba,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny ampodiany ny voninahitr’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toy ny amin’ny reharehany.
      marker-yv: yv-n
    - type: text
      text: ' Isiraely;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mpandroba efa nandroba azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanimba ny sampam-boalobony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nomenaina ny ampingan’ny lehilahy maheriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitafy jaky ny miaramilany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kalesiny dia misy vy mahery, mamirapiratra toy ny afo, amin’ny andro fiomanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary antsodina ny lefona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampiezahina eny an-dàlambe ny kalesy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mifanaretsadretsaka eny an-kalalahana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny harendrina no fijery azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsoriaka tahaka ny helatra izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsaroany ny lehilahy malazany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tafintohina eny am-pandehanana ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihahakazaka ho any amin’ny mànda ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo efa voatsangana sahady ny hamelezana azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vohana ny vavahadin-drenirano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary reraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miempo.
      marker-yv: yv-n
    - type: text
      text: ' ny lapa.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no voatendry: ampitanjahina izy, dia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hozaba dia nampitanjahina ka.
      marker-yv: yv-n
    - type: text
      text: ' lasan-ko babo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ankizivavy mitoloko azy manao feom-boromailala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady miteha-tratra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Ninive dia tahaka ny farihy hatrizay nisiany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa handositra ihany ireny.–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijanòna, mijanòna e!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy misy miherika.
