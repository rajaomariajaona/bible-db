document_id: NAM.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: INJANY! any an-tendrombohitra ny tongotry ny mitondra teny soa mahafaly
  - type: text
    content: Sady mitory fiadanana!
  - type: text
    content: Tandremo ny andro firavoravoanao, ry Joda,
  - type: text
    content: Efao ny voadinao;
  - type: text
    content: Fa tsy handeha hamaky eo aminao intsony ilay tena ratsy fanahy,
  - type: text
    content: Indray ripaka izy rehetra.
  '10':
  - type: text
    content: Mamaboa volafotsy,
  - type: text
    content: Mamaboa volamena!
  - type: text
    content: Fa tsy hita lany ny rakitra soa,
  - type: text
    content: Dia ny habetsahan’ny fanaka mahafinaritra rehetra.
  '11':
  - type: text
    content: Indrisy! foana, eny, foana sady lao!
  - type: text
    content: Kivy ny fo, miady ny lohalika,
  - type: text
    content: Manaintaina ny valahany rehetra,
  - type: text
    content: Mivaloarika ny tarehiny rehetra.
  '12':
  - type: text
    content: Aiza ilay lavaky ny liona
  - type: text
    content: Sy firemben’ny liona tanora?
  - type: text
    content: Ilay nandehanan’ny liona sy ny liom-bavy mbamin’ny zana-diona,
  - type: text
    content: Ka tsy nisy nanaitaitra azy,
  '13':
  - type: text
    content: Dia ilay liona namotipotika izay ampy ho an’ny zanany
  - type: text
    content: Ary nanenda ho an’ny liom-baviny
  - type: text
    content: Sady nameno haza ny lavany
  - type: text
    content: Sy toha ny fonenany.
  '14':
  - type: text
    content: Indro, hamely anao Aho, hoy Jehovah, Tompon’ny maro;
  - type: text
    content: Holevoniko ho setroka ny kalesinao,
  - type: note
    content: Heb. kalesiny.
  - type: text
    content: Ary hovonoiko sabatra ny liona tanoranao;
  - type: text
    content: Hofonganako amin’ny tany ny hazanao;
  - type: text
    content: Ka tsy ho re intsony ny feon’ny irakao.
  '2':
  - type: text
    content: Misy mpanorotoro miakatra hamely anao
  - type: text
    content: Ambeno ny mànda,
  - type: text
    content: Tazano ny làlana,
  - type: text
    content: Hatanjaho ny valahanao,
  - type: text
    content: Hetseho mafy ny herinao!
  '3':
  - type: text
    content: Fa Jehovah efa mampody ny voninahitr’
  - type: note
    content: 'Na: miverina ho amin’ilay reharehany.'
  - type: text
    content: ' i Jakoba,'
  - type: text
    content: Toy ny ampodiany ny voninahitr’
  - type: note
    content: 'Na: Toy ny amin’ny reharehany.'
  - type: text
    content: ' Isiraely;'
  - type: text
    content: Fa ny mpandroba efa nandroba azy
  - type: text
    content: Ary nanimba ny sampam-boalobony.
  '4':
  - type: text
    content: Nomenaina ny ampingan’ny lehilahy maheriny,
  - type: text
    content: Mitafy jaky ny miaramilany,
  - type: text
    content: Ny kalesiny dia misy vy mahery, mamirapiratra toy ny afo, amin’ny andro fiomanany,
  - type: text
    content: Ary antsodina ny lefona.
  '5':
  - type: text
    content: Ampiezahina eny an-dàlambe ny kalesy
  - type: text
    content: Ka mifanaretsadretsaka eny an-kalalahana;
  - type: text
    content: Tahaka ny harendrina no fijery azy,
  - type: text
    content: Mitsoriaka tahaka ny helatra izy.
  '6':
  - type: text
    content: Tsaroany ny lehilahy malazany,
  - type: text
    content: Kanjo tafintohina eny am-pandehanana ireny;
  - type: text
    content: Mihahakazaka ho any amin’ny mànda ireny,
  - type: text
    content: Kanjo efa voatsangana sahady ny hamelezana azy.
  '7':
  - type: text
    content: Vohana ny vavahadin-drenirano,
  - type: text
    content: Ary reraka
  - type: note
    content: Heb. miempo.
  - type: text
    content: ' ny lapa.'
  '8':
  - type: text
    content: 'Izao no voatendry: ampitanjahina izy, dia'
  - type: note
    content: 'Na: Hozaba dia nampitanjahina ka.'
  - type: text
    content: ' lasan-ko babo,'
  - type: text
    content: Ary ny ankizivavy mitoloko azy manao feom-boromailala
  - type: text
    content: Sady miteha-tratra.
  '9':
  - type: text
    content: Fa Ninive dia tahaka ny farihy hatrizay nisiany;
  - type: text
    content: Nefa handositra ihany ireny.–
  - type: text
    content: Mijanòna, mijanòna e!
  - type: text
    content: Nefa tsy misy miherika.
