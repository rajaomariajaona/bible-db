document_id: 1CH.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lapa nataon’i Davida, sy ny anaran’ny zanany.
  - type: text
    content: ARY Hirama, mpanjakan’i Tyro, naniraka olona tany amin’i Davida sady nampanatitra hazo sedera ary nandefa mpanao trano vato sy mpandrafitra hanao trano ho azy.
  '10':
  - type: text
    content: 'Ary Davida nanontany tamin’Andriamanitra hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tànako va izy? Dia hoy Jehovah taminy: Miakara, fa hatolotro eo an-tànanao izy. '
  '11':
  - type: text
    content: 'Dia niakatra nankao Bala-perazima Davida ka namely azy teo; dia hoy izy: Ny tànako no namakian’Andriamanitra ny fahavaloko hipariaka toy ny rano vaky; koa izany no nanaovany ny anaran’izany tany izany hoe Bala-perazima.'
  - type: note
    content: Bala-perazima = Tany nahavakiana.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Dia nilaozan’ireny teo ireo andriamaniny, ka dia nasain’i Davida nodorana tamin’ny afo.
  '13':
  - type: text
    content: 'Ary tonga indray ny Filistina ka nihahakahaka teny an-dohasaha indray. '
  '14':
  - type: text
    content: 'Dia nanontany tamin’Andriamanitra indray Davida ka novaliany hoe: Aza mandeha hanenjika azy; fa mivilia azy, dia mandehana, fa ho tonga eo aminy hianao eo amin’ny tandrifin’ny hazo balsama. '
  '15':
  - type: text
    content: 'Ary raha toa mahare fingadongadon’olona eny amin’ny tendron’ny hazo balsama hianao, dia miaingà amin’izay hiady; fa amin’izay no efa miainga mialoha anao Andriamanitra hamely ny miaramilan’ny Filistina. '
  '16':
  - type: text
    content: Ary dia nanao araka izay nandidian’Andriamanitra azy Davida, ka dia namely ny miaramilan’ny Filistina hatrany Gibeona ka hatrany Gazera izy.
  '17':
  - type: text
    content: Ary ny lazan’i Davida niely teny amin’ny tany rehetra; ary nataon’i Jehovah nahazo ny firenena rehetra ny tahotra an’i Davida.
  '2':
  - type: text
    content: Dia fantatr’i Davida fa Jehovah efa nampitoetra azy ho mpanjakan’ny Isiraely, ka voasandratra ny fanjakany noho ny amin’ny Isiraely olony.
  '3':
  - type: text
    content: 'Ary Davida nampaka-bady koa tany Jerosalema ka niteraka zazalahy sy zazavavy. '
  '4':
  - type: text
    content: 'Ary izao no anaran’ny zanany naterany tany Jerosalema: Samoa sy Sobaba sy Natana sy Solomona '
  '5':
  - type: text
    content: 'sy Jibara sy Elisoa sy Elipeleta '
  '6':
  - type: text
    content: 'sy Noga sy Nafega sy Jafia '
  '7':
  - type: text
    content: sy Elisama sy Beliada ary Elifeleta.
  - type: heading
    content: Ny nandresen’i Davida ny Filistina.
  '8':
  - type: text
    content: KOA nony ren’ny Filistina fa efa nohosorana ho mpanjakan’ny Isiraely rehetra Davida, dia niakatra hitady azy ny Filistina rehetra. Koa raha ren’i Davida izany, dia nivoaka hiady taminy izy.
  '9':
  - type: text
    content: 'Ary dia tonga ny Filistina ka nihahakahaka teny amin’ny Lohasahan’ny Refaïta. '
