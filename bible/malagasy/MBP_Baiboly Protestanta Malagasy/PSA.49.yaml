document_id: PSA.49,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahafoanan’ny harena amam-boninahitra.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Salamo.
  - type: text
    content: MANDRENESA izao, ry firenena rehetra;
  - type: text
    content: 'Mihainoa, ry mponina rehetra amin’izao tontolo izao:'
  '10':
  - type: text
    content: Fa hita fa maty ihany ny olon-kendry;
  - type: text
    content: Ary ny adala sy ny ketrina samy levona
  - type: text
    content: Ka mamela ny fananany ho an’ny hafa.
  '11':
  - type: text
    content: Araka ny heviny, dia ataony fa ho mandrakizay ny tranony,
  - type: text
    content: Ary ny fonenany hahatratra ny taranaka fara mandimby;
  - type: text
    content: Araka ny anarany no anononany ny taniny.
  - type: note
    content: 'Na: Ankalazaina ny anarany eny amin’ny tany maro.'
  '12':
  - type: text
    content: Nefa na dia manana voninahitra aza ny olona, dia tsy maharitra izy;
  - type: text
    content: Tahaka ny biby izay samy tsy maintsy ho faty izy.
  '13':
  - type: text
    content: Izany no falehan’ny olona adala;
  - type: text
    content: Ary ny taranany mandimby azy mankasitraka ny teniny.
  - type: text
    content: '[Sela.]'
  '14':
  - type: text
    content: Tahaka ny fanangona ondry no fanangona azy any amin’ny fiainan-tsi-hita;
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Ny fahafatesana no mpiandry azy;
  - type: text
    content: Ary hanapaka azy ny mahitsy nony maraina;
  - type: text
    content: Ary ny bikany ho levona any amin’ny fiainan-tsi-hita,
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ka tsy hisy fonenany.'
  '15':
  - type: text
    content: Fa Andriamanitra kosa hamonjy ny aiko amin’ny herin’ny fiainan-tsi-hita,
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Satria handray ahy Izy.
  - type: note
    content: 'Na: Rehefa azony aho.'
  - type: text
    content: '[Sela.]'
  '16':
  - type: text
    content: Aza matahotra hianao, raha misy olona tonga manan-karena,
  - type: text
    content: Ka mitombo ny voninahitry ny tranony;
  '17':
  - type: text
    content: Fa tsy hitondra na inona na inona izy, raha maty;
  - type: text
    content: Tsy mba hidina hanaraka azy ny voninahiny.
  '18':
  - type: text
    content: Na dia miarahaba tena aza izy, raha mbola velona–
  - type: text
    content: Fa hidera anao ny olona, raha manisy soa ny tenanao hianao–
  '19':
  - type: text
    content: Dia hankany amin’ny razany izy,
  - type: text
    content: Tsy hahita ny mazava intsony mandrakizay ireny.
  '2':
  - type: text
    content: Na ny ambany, na ny ambony,
  - type: text
    content: Na ny manan-karena, na ny malahelo.
  '20':
  - type: text
    content: Izay olona manana voninahitra, nefa tsy manan-tsaina,
  - type: text
    content: Dia tahaka ny biby izay samy tsy maintsy ho faty.
  '3':
  - type: text
    content: Ny vavako hiteny fahendrena;
  - type: text
    content: Ary ny fieritreretan’ny foko dia fahalalana.
  '4':
  - type: text
    content: Hanongilana ny sofiko hihaino oha-teny aho,
  - type: text
    content: Ary hanonona teny saro-pantarina ampiarahiko amin-dokanga.
  '5':
  - type: text
    content: Nahoana no hatahotra amin’ny andro fahoriana aho,
  - type: text
    content: Nony manodidina ahy ny haratsian’ny mpamingana ahy,
  '6':
  - type: text
    content: Dia izay matoky ny hareny
  - type: text
    content: Sy mirehareha amin’ny haben’ny fananany?
  '7':
  - type: text
    content: Tsy misy mahavotra ny rahalahiny akory,
  - type: text
    content: Na mahazo manome an’Andriamanitra izay avony
  '8':
  - type: text
    content: (Fa sarotra avotra ny ainy,
  - type: text
    content: Ka tsy azo atao mandrakizay),
  '9':
  - type: text
    content: Mba ho velona mandrakizay izy
  - type: text
    content: Ka tsy ho latsaka ao amin’ny lavaka.
  - type: note
    content: 'Na: ho tratry ny lo.'
