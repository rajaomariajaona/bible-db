document_id: PSA.49,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahafoanan’ny harena amam-boninahitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Salamo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MANDRENESA izao, ry firenena rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mihainoa, ry mponina rehetra amin’izao tontolo izao:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa hita fa maty ihany ny olon-kendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny adala sy ny ketrina samy levona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mamela ny fananany ho an’ny hafa.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Araka ny heviny, dia ataony fa ho mandrakizay ny tranony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fonenany hahatratra ny taranaka fara mandimby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny anarany no anononany ny taniny.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ankalazaina ny anarany eny amin’ny tany maro.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nefa na dia manana voninahitra aza ny olona, dia tsy maharitra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny biby izay samy tsy maintsy ho faty izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izany no falehan’ny olona adala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranany mandimby azy mankasitraka ny teniny.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tahaka ny fanangona ondry no fanangona azy any amin’ny fiainan-tsi-hita;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahafatesana no mpiandry azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanapaka azy ny mahitsy nony maraina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny bikany ho levona any amin’ny fiainan-tsi-hita,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' ka tsy hisy fonenany.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa Andriamanitra kosa hamonjy ny aiko amin’ny herin’ny fiainan-tsi-hita,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria handray ahy Izy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rehefa azony aho.
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Aza matahotra hianao, raha misy olona tonga manan-karena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitombo ny voninahitry ny tranony;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa tsy hitondra na inona na inona izy, raha maty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba hidina hanaraka azy ny voninahiny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Na dia miarahaba tena aza izy, raha mbola velona–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hidera anao ny olona, raha manisy soa ny tenanao hianao–
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia hankany amin’ny razany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hahita ny mazava intsony mandrakizay ireny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Na ny ambany, na ny ambony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny manan-karena, na ny malahelo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Izay olona manana voninahitra, nefa tsy manan-tsaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny biby izay samy tsy maintsy ho faty.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny vavako hiteny fahendrena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fieritreretan’ny foko dia fahalalana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hanongilana ny sofiko hihaino oha-teny aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanonona teny saro-pantarina ampiarahiko amin-dokanga.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nahoana no hatahotra amin’ny andro fahoriana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nony manodidina ahy ny haratsian’ny mpamingana ahy,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dia izay matoky ny hareny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mirehareha amin’ny haben’ny fananany?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy misy mahavotra ny rahalahiny akory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mahazo manome an’Andriamanitra izay avony
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: (Fa sarotra avotra ny ainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy azo atao mandrakizay),
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mba ho velona mandrakizay izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy ho latsaka ao amin’ny lavaka.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho tratry ny lo.
      marker-yv: yv-n
