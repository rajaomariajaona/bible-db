document_id: ISA.66,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny toe-panahin’ny tena Isiraely sy ny fandavana ny tsy izy, ary ny fandrosoan’ny Fiangonana sy ny hamoriana ny firenena rehetra hankany Jerosalema, ary ny handringanana ny ratsy fanahy.
  - type: text
    content: 'IZAO no lazain’i Jehovah:'
  - type: text
    content: Ny lanitra no seza fiandrianako,
  - type: text
    content: Ary ny tany no fitoeran-tongotro;
  - type: text
    content: Trano manao ahoana no hataonareo ho Ahy?
  - type: text
    content: Ary fitoerana manao ahoana no ho fitsaharako?
  '10':
  - type: text
    content: Miaraha mifaly amin’i Jerosalema,
  - type: text
    content: Ary miravoravoa aminy hianareo rehetra izay tia azy;
  - type: text
    content: Aoka hiara-mifaly aminy tokoa
  - type: text
    content: Hianareo rehetra izay malahelo noho ny aminy,
  '11':
  - type: text
    content: Mba hinonoanareo sy hivokisanareo amin’ny nonony mahafaly,
  - type: text
    content: Eny, mba higoka hianareo
  - type: text
    content: Ka hiravoravo amin’ny haben’ny voninahiny.
  '12':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Indro, hitarihako fiadanana tahaka ny ony izy
  - type: text
    content: Ary ny voninahitry ny firenena tahaka ny renirano tondraka,
  - type: text
    content: Ka hinono hianareo;
  - type: text
    content: Ary hosakalehina hianareo sady hohindrahindraina eo ambony lohalika.
  '13':
  - type: text
    content: Tahaka ny olona ampiononin-dreniny
  - type: text
    content: No hampiononako anareo;
  - type: text
    content: Eny, ao Jerosalema no hampiononana anareo.
  '14':
  - type: text
    content: Dia hahita izany hianareo, ka ho faly ny fonareo,
  - type: text
    content: Ary ny taolanareo ho tsara fitombo tahaka ny ahi-matiso;
  - type: text
    content: Ary ny tànan’i Jehovah dia ataony fantatry ny mpanompony,
  - type: text
    content: Fa ho tezitra amin’ny fahavalony kosa Izy.
  '15':
  - type: text
    content: Fa, indro, Jehovah ho avy amin’ny afo,
  - type: text
    content: Ary tahaka ny tadio ny kalesiny
  - type: text
    content: Mba hanao famaliana amin’ny fahatezerany mirehitra
  - type: text
    content: Sy ny fitenenany mafy amin’ny lelafo.
  '16':
  - type: text
    content: Fa ny afo sy ny sabany no ho entin’i Jehovah hifandahatra amin’ny nofo rehetra;
  - type: text
    content: Ary ho maro ny voaringan’i Jehovah.
  '17':
  - type: text
    content: Izay manamasina sy manadio ny tenanyho ao an-tanimboly
  - type: text
    content: Ka manaraka ny iray ao afovoany
  - type: text
    content: Ary mihinana ny henan-kisoa sy ny zava-betaveta ary ny totozy
  - type: text
    content: Dia hiaraka ho levona avokoa, hoy Jehovah.
  '18':
  - type: text
    content: 'Fa Izaho '
  - type: text
    content: dia hamaly
  - type: text
    content: ' '
  - type: note
    content: 'Na: mahalala.'
  - type: text
    content: ny asany sy ny heviny,
  - type: text
    content: Ho avy ny hamoriana ny jentilisa rehetra sy ny samy hafa fiteny;
  - type: text
    content: Dia ho avy ireo ka hahita ny voninahitro.
  '19':
  - type: text
    content: Ary hasiako famantarana eo aminy,
  - type: text
    content: Ary izay afaka mandositra dia hirahiko ho any amin’ny jentilisa,
  - type: text
    content: Dia ho any Tarsisy sy Pola ary Lydia,
  - type: note
    content: Heb. Loda.
  - type: text
    content: ' izay manenjana tsipìka,'
  - type: text
    content: Ary ho any Tobala sy Javana,
  - type: text
    content: Dia ho any amin’ireo nosy lavitra izay tsy mbola nandre ny lazako
  - type: text
    content: Na nahita ny voninahitro,
  - type: text
    content: Ary hitory ny voninahitro any amin’ny jentilisa izy.
  '2':
  - type: text
    content: Fa izao zavatra izao no nataon’ny tànako.
  - type: text
    content: Ka dia ary izao rehetra izao, hoy Jehovah;
  - type: text
    content: Nefa izao no olona hotsinjoviko,
  - type: text
    content: Dia izay malahelo sy torotoro fanahy
  - type: text
    content: Sady mangovitra noho ny teniko.
  '20':
  - type: text
    content: Ary hitondra ny rahalahinareo rehetra izy
  - type: text
    content: Avy any amin’ny jentilisa rehetra ho fanatitra ho an’i Jehovah,
  - type: text
    content: Mitaingin-tsoavaly sy ao anaty kalesy sy filanjana
  - type: text
    content: Ary mitaingina ampondra sy rameva haingam-pandeha–ho any Jerosalema tendrombohitro masina, hoy Jehovah,–
  - type: text
    content: Dia tahaka ny fitondran’ny Zanak’Isiraely ny fanatitra hohanina ao anatin’ny vilia madio ho any an-tranon’i Jehovah;
  '21':
  - type: text
    content: Ary avy amin’ireo aza no hakako ho mpisorona sy Levita, hoy Jehovah.
  '22':
  - type: text
    content: Fa tahaka ny lanitra vaovao sy ny tany vaovao, izay hataoko, no haharitra eo anatrehako, hoy Jehovah,
  - type: text
    content: Dia toy izany ny haharetan’ny taranakareo sy ny anaranareo.
  '23':
  - type: text
    content: Ary isaky ny voaloham-bolana sy isan-tSabata
  - type: text
    content: Dia ho avy ny nofo rehetra hiankohoka eo anatrehako, hoy Jehovah.
  '24':
  - type: text
    content: Ary hivoaka izy ireny ka hijery ny fatin’ny olona izay efa niodina tamiko;
  - type: text
    content: Fa ny kankany tsy ho faty, ary ny afony tsy hovonoina,
  - type: text
    content: Ary hataon’ny nofo rehetra ho fahavetavetana izy.
  '3':
  - type: text
    content: Izay mamono omby dia hoatra ny mamono olona;
  - type: text
    content: Izay mamono ondry hatao fanatitra dia hoatra ny mamolaka ny vozon’alika;
  - type: text
    content: Izay manatitra fanatitra hohanina dia hoatra ny manatitra ran-kisoa;
  - type: text
    content: Izay mandoro ditin-kazo mani-pofona ho fanati-pahatsiarovana dia hoatra ny misaotra ny sampy.
  - type: text
    content: Eny, tahaka ny nifidianan’ireny ny halehany
  - type: text
    content: Sy ny nifalian’ny fanahiny tamin’ny fahavetavetany,
  '4':
  - type: text
    content: Dia tahaka izany kosa no hifidianako ny fampahoriana azy
  - type: text
    content: Sy handatsahako ny fahatahorany ho aminy,
  - type: text
    content: Satria niantso Aho, fa tsy nisy namaly,
  - type: text
    content: Niteny Aho, fa tsy nihaino izy;
  - type: text
    content: Fa nanao izay ratsy eo imasoko,
  - type: text
    content: Ary izay tsy sitrako no nofidiny.
  '5':
  - type: text
    content: Mihainoa ny tenin’i Jehovah,
  - type: text
    content: Hianareo izay mangovitra noho ny teniny!
  - type: text
    content: Hoy ny rahalahinareo izay mankahala anareo
  - type: text
    content: 'Ka mandroaka anareo noho ny amin’ny anarako:'
  - type: text
    content: Hampiseho ny voninahiny anie Jehovah,
  - type: text
    content: Mba ho faly mahita ny fifalianareo izahay!
  - type: text
    content: Kanefa ireny ho menatra kosa.
  '6':
  - type: text
    content: Injany! horakoraka any an-tanàna,
  - type: text
    content: Ary feo ao amin’ny tempoly,
  - type: text
    content: Dia feon’i Jehovah izay mamaly ny ataon’ny fahavalony.
  '7':
  - type: text
    content: Fony mbola tsy nihetsi-jaza aza izy, dia niteraka;
  - type: text
    content: Fony mbola tsy nanaintaina aza izy, dia velon-jazalahy.
  '8':
  - type: text
    content: Iza akory no efa nandre zavatra toy izany?
  - type: text
    content: Iza no efa nahita zavatra toy izany?
  - type: text
    content: Hisy tany hateraka indray andro va,
  - type: text
    content: Na firenena azo atao indray miteraka?
  - type: text
    content: Fa raha vao narary hiteraka Ziona, dia velon-jaza izy.
  '9':
  - type: text
    content: Izaho moa hahatonga ho eo amin’ny fiterahana ka tsy hampiteraka va? hoy Jehovah;
  - type: text
    content: Izaho hampiteraka, nefa hampikombona indray va? hoy Andriamanitrao.
