document_id: ISA.66
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny toe-panahin’ny tena Isiraely sy ny fandavana ny tsy izy, ary ny fandrosoan’ny Fiangonana sy ny hamoriana ny firenena rehetra hankany Jerosalema, ary ny handringanana ny ratsy fanahy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny lanitra no seza fiandrianako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany no fitoeran-tongotro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trano manao ahoana no hataonareo ho Ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fitoerana manao ahoana no ho fitsaharako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa izao zavatra izao no nataon’ny tànako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ary izao rehetra izao, hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa izao no olona hotsinjoviko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay malahelo sy torotoro fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mangovitra noho ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay mamono omby dia hoatra ny mamono olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mamono ondry hatao fanatitra dia hoatra ny mamolaka ny vozon’alika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manatitra fanatitra hohanina dia hoatra ny manatitra ran-kisoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mandoro ditin-kazo mani-pofona ho fanati-pahatsiarovana dia hoatra ny misaotra ny sampy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tahaka ny nifidianan’ireny ny halehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny nifalian’ny fanahiny tamin’ny fahavetavetany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia tahaka izany kosa no hifidianako ny fampahoriana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy handatsahako ny fahatahorany ho aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria niantso Aho, fa tsy nisy namaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niteny Aho, fa tsy nihaino izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nanao izay ratsy eo imasoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay tsy sitrako no nofidiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mihainoa ny tenin’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianareo izay mangovitra noho ny teniny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy ny rahalahinareo izay mankahala anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka mandroaka anareo noho ny amin’ny anarako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampiseho ny voninahiny anie Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho faly mahita ny fifalianareo izahay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa ireny ho menatra kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Injany! horakoraka any an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary feo ao amin’ny tempoly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia feon’i Jehovah izay mamaly ny ataon’ny fahavalony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fony mbola tsy nihetsi-jaza aza izy, dia niteraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fony mbola tsy nanaintaina aza izy, dia velon-jazalahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Iza akory no efa nandre zavatra toy izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no efa nahita zavatra toy izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisy tany hateraka indray andro va,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na firenena azo atao indray miteraka?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha vao narary hiteraka Ziona, dia velon-jaza izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izaho moa hahatonga ho eo amin’ny fiterahana ka tsy hampiteraka va? hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho hampiteraka, nefa hampikombona indray va? hoy Andriamanitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miaraha mifaly amin’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miravoravoa aminy hianareo rehetra izay tia azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hiara-mifaly aminy tokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianareo rehetra izay malahelo noho ny aminy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mba hinonoanareo sy hivokisanareo amin’ny nonony mahafaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mba higoka hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiravoravo amin’ny haben’ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hitarihako fiadanana tahaka ny ony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny voninahitry ny firenena tahaka ny renirano tondraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hinono hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hosakalehina hianareo sady hohindrahindraina eo ambony lohalika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tahaka ny olona ampiononin-dreniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hampiononako anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ao Jerosalema no hampiononana anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hahita izany hianareo, ka ho faly ny fonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taolanareo ho tsara fitombo tahaka ny ahi-matiso;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tànan’i Jehovah dia ataony fantatry ny mpanompony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho tezitra amin’ny fahavalony kosa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa, indro, Jehovah ho avy amin’ny afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny tadio ny kalesiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanao famaliana amin’ny fahatezerany mirehitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fitenenany mafy amin’ny lelafo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa ny afo sy ny sabany no ho entin’i Jehovah hifandahatra amin’ny nofo rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho maro ny voaringan’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay manamasina sy manadio ny tenanyho ao an-tanimboly
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manaraka ny iray ao afovoany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihinana ny henan-kisoa sy ny zava-betaveta ary ny totozy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiaraka ho levona avokoa, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Izaho '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dia hamaly
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: mahalala.'
    marker-yv: yv-n
  - type: text
    text: ny asany sy ny heviny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho avy ny hamoriana ny jentilisa rehetra sy ny samy hafa fiteny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho avy ireo ka hahita ny voninahitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary hasiako famantarana eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay afaka mandositra dia hirahiko ho any amin’ny jentilisa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho any Tarsisy sy Pola ary Lydia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Loda.
    marker-yv: yv-n
  - type: text
    text: ' izay manenjana tsipìka,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho any Tobala sy Javana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho any amin’ireo nosy lavitra izay tsy mbola nandre ny lazako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nahita ny voninahitro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitory ny voninahitro any amin’ny jentilisa izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary hitondra ny rahalahinareo rehetra izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy any amin’ny jentilisa rehetra ho fanatitra ho an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitaingin-tsoavaly sy ao anaty kalesy sy filanjana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitaingina ampondra sy rameva haingam-pandeha–ho any Jerosalema tendrombohitro masina, hoy Jehovah,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ny fitondran’ny Zanak’Isiraely ny fanatitra hohanina ao anatin’ny vilia madio ho any an-tranon’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary avy amin’ireo aza no hakako ho mpisorona sy Levita, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa tahaka ny lanitra vaovao sy ny tany vaovao, izay hataoko, no haharitra eo anatrehako, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny haharetan’ny taranakareo sy ny anaranareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary isaky ny voaloham-bolana sy isan-tSabata
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho avy ny nofo rehetra hiankohoka eo anatrehako, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary hivoaka izy ireny ka hijery ny fatin’ny olona izay efa niodina tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny kankany tsy ho faty, ary ny afony tsy hovonoina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hataon’ny nofo rehetra ho fahavetavetana izy.
