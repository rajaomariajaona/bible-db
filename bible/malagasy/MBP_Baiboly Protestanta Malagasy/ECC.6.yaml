document_id: ECC.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahantran’ny sasany noho ny tsy ahitany soa amin’ny zavatra ananany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'MISY ratsy efa hitako atỳ ambanin’ny masoandro, ary mitambesatra amin’ny olona izany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia olona izay omen’Andriamanitra vola aman-karena sy voninahitra, ka tsy misy tsy ananany na inona na inona iriny, nefa tsy omen’Andriamanitra fahefana hihinana amin’izany izy, fa olon-kafa no homana azy; zava-poana sy ratsy mahory koa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Na dia misy miteraka zaza zato aza sady tratrantitra, ka efa maro ny andro niainany, nefa tsy mba voky soa ny fanahiny, sady tsy mba alevina akory ny fatiny, dia hoy izaho: Ny tsy tonga volana dia tsara kokoa noho izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa toa zava-poana no nihavian’io, ary mandeha ao amin’ny maizina izy, sady ho voasaron’ny aizina ny anarany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary koa, tsy nahita na nahalala ny masoandro akory izy,–mahita fitsaharana bebe kokoa noho ilay teo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny, na dia tratra arivo taona indroa aza izy, nefa tsy nahita soa,–tsy ho any amin’ny fitoerana iray ihany va no alehan’izy rehetra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny fisasarana rehetra ataon’ny olona dia ho an’ny vavany ihany, nefa tsy mety afa-po ny faniriany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa inona no soa azon’ny hendry noho ny adala? Inona no azon’ny malahelo izay mahay mitondra tena eo imason’ny velona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fahitan’ny maso dia mahafinaritra noho ny firenirenin’ny faniriana. Zava-poana sy misambo-drivotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' homan-drivotra.'
    marker-yv: yv-n
  - type: text
    text: ' foana koa izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay efa teo dia voalaza anarana hatry ny fony ela, ary fantatra fa ny olona dia tsy mahazo mifandahatra amin’izay mahery noho izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa maro ny zavatra mahabe ny zava-poana, koa inona no soa azon’ny olona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa iza no mahalala izay mahasoa ny olona amin’izao fiainana izao, dia ny andro vitsy mandalo foana izay lanìny toy ny fihelin’ny aloka? Fa iza no hahalaza amin’ny olona izay zavatra ho avy any aoriany atỳ ambanin’ny masoandro?
