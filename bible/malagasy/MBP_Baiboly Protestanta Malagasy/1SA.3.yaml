document_id: 1SA.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niantsoana an’i Samoela ho mpaminanin’i Jehovah.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Samoela zaza nanao fanompoam-pivavahana tamin’i Jehovah teo anatrehan’i Ely. Ary tamin’izany andro izany efa nahàlana ny tenin’i Jehovah: tsy nisy fahitana niseho loatra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tamin’izany andro izany, raha nandry tao amin’ny fandriany Ely (efa pahina ny masony, ka tsy nahita izy), '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sady tsy mbola maty ny jiron’Andriamanitra, ary Samoela efa nandry tao amin’ny tempolin’i Jehovah, izay nisy ny fiaran’Andriamanitra,– '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia niantso an’i Samoela Jehovah, ary izy namaly hoe: Inty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nihazakazaka nankeo amin’i Ely izy ka nanao hoe: Inty aho, fa niantso ahy hianao. Fa hoy Ely: Tsy niantso aho, andeha mandry ihany. Dia lasa nandry izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Jehovah niantso azy indray hoe: Ry Samoela! Dia nifoha Samoela ka nankao amin’i Ely ary nanao hoe: Inty aho, fa niantso ahy hianao. Fa hoy izy: Tsy niantso aho, anaka; andeha mandry ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary Samoela tsy mbola nahalala an’i Jehovah, sady tsy mbola nanehoana ny tenin’i Jehovah izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Jehovah niantso an’i Samoela indray fanintelony. Dia nifoha izy ka nankao amin’i Ely ary nanao hoe: Inty aho, fa niantso ahy hianao. Dia fantatr’i Ely fa Jehovah no niantso ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Ely tamin’i Samoela: Andeha mandry ihany; ary raha tàhiny miantso anao Izy, dia valio hoe: Mitenena, Jehovah ô; fa mihaino ny mpanomponao. Dia lasa Samoela nandry tao amin’ny fandriany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary avy Jehovah, dia nitsangana ka niantso toy ny teo ihany hoe: Ry Samoela, ry Samoela ô! Dia namaly Samoela hoe: Mitenena, fa mihaino ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Samoela: Indro, Izaho hanao zavatra eo amin’ny Isiraely, ka izay rehetra mandre izany, dia hangintsingintsina ny sofiny roa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amin’izany andro izany dia hotanterahiko amin’i Ely izay zavatra rehetra voalazako ny amin’ny taranany: hatomboko izany, ka dia hotanterahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa efa nambarako taminy fa hotsaraiko mandrakizay ny taranany noho ny heloka izay fantany, satria ny zanany nahatonga ozona ho an’ny tenany, nefa tsy nosakanany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa izany no nianianako ny amin’ny taranak’i Ely fa tsy hisy fanatitra hahafaka ny helony mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nandry Samoela mandra-pahamarain’ny andro, dia namoha ny varavaran’ ny tranon’i Jehovah izy. Ary Samoela natahotra hilaza ny fahitana tamin’i Ely. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa Ely niantso an’i Samoela ka nanao hoe: Ry Samoela, zanako! Dia hoy izy: Inty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy izy: Inona no zavatra nolazain’i Jehovah taminao? masìna hianao, aza afeninao ahy; hataon’Andriamanitra aminao anie izany, eny, mihoatra noho izany aza, raha nisy afeninao ahy ny zavatra rehetra nolazainy taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nambaran’i Samoela azy avokoa ny zavatra rehetra, ka tsy nisy nafeniny azy. Dia hoy Ely: Izy no Jehovah, aoka Izy hanao izay sitraky ny fony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nitombo Samoela, sady nomba azy Jehovah, ka tsy nisy navelany ho raraka an-tany ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny Isiraely rehetra hatrany Dana ka hatrany Beri-sheba nahalala fa efa mpaminanin’i Jehovah tokoa Samoela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia niseho tao Silo indray Jehovah; fa niseho tamin’i Samoela tao Silo Jehovah tamin’ny teniny.
