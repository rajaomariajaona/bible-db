document_id: 1SA.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niantsoana an’i Samoela ho mpaminanin’i Jehovah.
  - type: text
    content: 'ARY Samoela zaza nanao fanompoam-pivavahana tamin’i Jehovah teo anatrehan’i Ely. Ary tamin’izany andro izany efa nahàlana ny tenin’i Jehovah: tsy nisy fahitana niseho loatra.'
  '10':
  - type: text
    content: 'Ary avy Jehovah, dia nitsangana ka niantso toy ny teo ihany hoe: Ry Samoela, ry Samoela ô! Dia namaly Samoela hoe: Mitenena, fa mihaino ny mpanomponao. '
  '11':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Samoela: Indro, Izaho hanao zavatra eo amin’ny Isiraely, ka izay rehetra mandre izany, dia hangintsingintsina ny sofiny roa. '
  '12':
  - type: text
    content: 'Amin’izany andro izany dia hotanterahiko amin’i Ely izay zavatra rehetra voalazako ny amin’ny taranany: hatomboko izany, ka dia hotanterahiko. '
  '13':
  - type: text
    content: 'Fa efa nambarako taminy fa hotsaraiko mandrakizay ny taranany noho ny heloka izay fantany, satria ny zanany nahatonga ozona ho an’ny tenany, nefa tsy nosakanany. '
  '14':
  - type: text
    content: Koa izany no nianianako ny amin’ny taranak’i Ely fa tsy hisy fanatitra hahafaka ny helony mandrakizay.
  '15':
  - type: text
    content: 'Ary nandry Samoela mandra-pahamarain’ny andro, dia namoha ny varavaran’ ny tranon’i Jehovah izy. Ary Samoela natahotra hilaza ny fahitana tamin’i Ely. '
  '16':
  - type: text
    content: 'Fa Ely niantso an’i Samoela ka nanao hoe: Ry Samoela, zanako! Dia hoy izy: Inty aho. '
  '17':
  - type: text
    content: 'Ary hoy izy: Inona no zavatra nolazain’i Jehovah taminao? masìna hianao, aza afeninao ahy; hataon’Andriamanitra aminao anie izany, eny, mihoatra noho izany aza, raha nisy afeninao ahy ny zavatra rehetra nolazainy taminao. '
  '18':
  - type: text
    content: 'Dia nambaran’i Samoela azy avokoa ny zavatra rehetra, ka tsy nisy nafeniny azy. Dia hoy Ely: Izy no Jehovah, aoka Izy hanao izay sitraky ny fony.'
  '19':
  - type: text
    content: 'Ary nitombo Samoela, sady nomba azy Jehovah, ka tsy nisy navelany ho raraka an-tany ny teniny. '
  '2':
  - type: text
    content: 'Ary tamin’izany andro izany, raha nandry tao amin’ny fandriany Ely (efa pahina ny masony, ka tsy nahita izy), '
  '20':
  - type: text
    content: Ary ny Isiraely rehetra hatrany Dana ka hatrany Beri-sheba nahalala fa efa mpaminanin’i Jehovah tokoa Samoela.
  '21':
  - type: text
    content: Dia niseho tao Silo indray Jehovah; fa niseho tamin’i Samoela tao Silo Jehovah tamin’ny teniny.
  '3':
  - type: text
    content: 'sady tsy mbola maty ny jiron’Andriamanitra, ary Samoela efa nandry tao amin’ny tempolin’i Jehovah, izay nisy ny fiaran’Andriamanitra,– '
  '4':
  - type: text
    content: 'dia niantso an’i Samoela Jehovah, ary izy namaly hoe: Inty aho. '
  '5':
  - type: text
    content: 'Dia nihazakazaka nankeo amin’i Ely izy ka nanao hoe: Inty aho, fa niantso ahy hianao. Fa hoy Ely: Tsy niantso aho, andeha mandry ihany. Dia lasa nandry izy.'
  '6':
  - type: text
    content: 'Ary Jehovah niantso azy indray hoe: Ry Samoela! Dia nifoha Samoela ka nankao amin’i Ely ary nanao hoe: Inty aho, fa niantso ahy hianao. Fa hoy izy: Tsy niantso aho, anaka; andeha mandry ihany. '
  '7':
  - type: text
    content: Ary Samoela tsy mbola nahalala an’i Jehovah, sady tsy mbola nanehoana ny tenin’i Jehovah izy.
  '8':
  - type: text
    content: 'Ary Jehovah niantso an’i Samoela indray fanintelony. Dia nifoha izy ka nankao amin’i Ely ary nanao hoe: Inty aho, fa niantso ahy hianao. Dia fantatr’i Ely fa Jehovah no niantso ny zaza. '
  '9':
  - type: text
    content: 'Ary hoy Ely tamin’i Samoela: Andeha mandry ihany; ary raha tàhiny miantso anao Izy, dia valio hoe: Mitenena, Jehovah ô; fa mihaino ny mpanomponao. Dia lasa Samoela nandry tao amin’ny fandriany.'
