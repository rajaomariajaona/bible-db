document_id: MAT.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampianaran’i Jesosy ny mpianany hanetry tena sy hamela ny heloky ny namany, sy ny fanoharana ny amin’ny mpitrosa tsy nanan-kaloa.
  - type: heading
    content: Mar. 9.33-50; Lio. 9.46-50; 15.3-7.
  - type: text
    content: 'TAMIN’izany ora izany dia nankeo amin’i Jesosy ny mpianatra ka nanao hoe: Iza moa no lehibe indrindra ao amin’ny fanjakan’ny lanitra? '
  '10':
  - type: text
    content: 'Mitandrema, fandrao manao tsinontsinona na dia ny iray aza amin’ireny madinika ireny hianareo; fa lazaiko aminareo: Ny anjeliny any an-danitra mahita mandrakariva ny tavan’ny Raiko Izay any an-danitra.'
  - type: note
    content: 'Ampio hoe: [11 Fa tonga ny Zanak’olona hamonjy ny very.]'
  '12':
  - type: text
    content: 'Ahoana no hevitrareo? Raha misy olona manana ondry zato, ka mania ny anankiray, moa tsy hamela ny sivy amby sivi-folo eny an-tendrombohitra va izy ka handeha hitady ilay nania? '
  '13':
  - type: text
    content: 'Ary raha tàhiny hitany izy, dia lazaiko aminareo marina tokoa fa mahafaly azy iny noho ny sivy amby sivifolo izay tsy nania. '
  '14':
  - type: text
    content: Ary tahaka izany, dia tsy sitraky ny Rainareo Izay any an-danitra, raha ho very na dia iray aza amin’ireny madinika ireny.
  '15':
  - type: text
    content: 'Ary raha manota aminao ny rahalahinao, dia mankanesa any aminy, ka rehefa mitokana hianareo roa lahy, dia asehoy azy ny fahadisoany. Raha mihaino anao izy, dia efa azonao ny rahalahinao; '
  '16':
  - type: text
    content: 'fa raha tsy mihaino anao kosa izy, dia ento miaraka aminao ny olona iray na roa, mba ho voaorina mafy avokoa ny teny rehetra amin’ny tenin’ny vavolombelona roa na telo (Deo. 19.15). '
  '17':
  - type: text
    content: Ary raha tsy mety mihaino ireo izy, dia ambarao amin’ny fiangonana;
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' ary raha tsy mety mihaino ny fiangonana'
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' koa izy, dia aoka hataonao ho tahaka ny jentilisa sy ny mpamory hetra izy.'
  '18':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Na inona na inona fehezinareo etỳ ambonin’ny tany dia hofehezina any an-danitra; ary na inona na inona vahanareo etỳ ambonin’ny tany dia hovahana any an-danitra.'
  '19':
  - type: text
    content: 'Ary lazaiko aminareo koa: Raha misy roa aminareo mifanaiky etỳ ambonin’ny tany na amin’inona na amin’inona ka hangataka izany, dia ho azony avy amin’ny Raiko Izay any an-danitra izany. '
  '2':
  - type: text
    content: 'Ary Jesosy niantso zazakely anankiray hankeo aminy, dia nametraka azy teo afovoany '
  '20':
  - type: text
    content: Fa na aiza na aiza no iangonan’ny roa na telo amin’ny anarako, dia ao afovoany Aho.
  '21':
  - type: text
    content: 'Dia nanatona Petera ka nanao taminy hoe: Tompoko, impiry moa no hanotan’ny rahalahiko amiko, ka havelako izy? Hatramin’ny impito va?'
  '22':
  - type: text
    content: 'Fa hoy Jesosy taminy: Tsy lazaiko aminao hoe: Hatramin’ny impito, fa hatramin’ny impito amby fito-polo.'
  - type: note
    content: 'Na: fito-polo impito.'
  '23':
  - type: text
    content: 'Koa amin’izany ny fanjakan’ny lanitra dia tahaka ny mpanjaka anankiray, izay te-hidinika amin’ny mpanompony ny amin’ny volany. '
  '24':
  - type: text
    content: Ary raha vao nidinika izy, dia nisy anankiray nentina teo aminy, izay nitrosa talenta
  - type: note
    content: Anaram-bola; ny talenta volafotsy dia sekely telo arivo.
  - type: text
    content: ' iray alina. '
  '25':
  - type: text
    content: 'Ary satria tsy nanan-kaloa izy, dia nasain’ny tompony hamidy izy sy ny vadiny aman-janany mbamin’ny fananany rehetra handoavana ny trosa. '
  '26':
  - type: text
    content: 'Dia niankohoka teo anatrehany ilay mpanompo ka nanao hoe: Tompoko, omeo andro aho, fa haloako ny anao rehetra. '
  '27':
  - type: text
    content: Ary ny tompon’izany mpanompo izany dia onena azy ka nandefa azy sady namoy ny trosa taminy.
  '28':
  - type: text
    content: Nefa nony nivoaka izany mpanompo izany, dia nahita mpanompo namany anankiray, izay nitrosa denaria
  - type: note
    content: Anaram-bola tokony ho venty no heviny.
  - type: text
    content: ' zato taminy; dia nosamboriny izy ka notraohiny sady nataony hoe: Aloavy izay trosako aminao. '
  '29':
  - type: text
    content: 'Fa niankohoka ilay mpanompo namany ka nifona taminy nanao hoe: Omeo andro aho, fa haloako ny anao. '
  '3':
  - type: text
    content: 'ka nanao hoe: Lazaiko aminareo marina tokoa: Raha tsy miova'
  - type: note
    content: Gr. mitodika.
  - type: text
    content: ' hianareo ka ho tonga tahaka ny zazakely, dia tsy hiditra amin’ny fanjakan’ny lanitra mihitsy hianareo. '
  '30':
  - type: text
    content: 'Nefa tsy nety izy, fa lasa nampanao azy tao an-trano-maizina mandra-pandoany ny trosa. '
  '31':
  - type: text
    content: 'Ary nony hitan’ireo mpanompo namany izay efa natao, dia nalahelo indrindra izy ka nandeha nanambara tsara tamin’ny tompony izany rehetra natao izany. '
  '32':
  - type: text
    content: 'Dia nampanalain’ny tompony ralehilahy ka noteneniny hoe: Ry mpanompo ratsy fanahy, efa nafoiko ilay trosa rehetra taminao, satria nifona tamiko hianao; '
  '33':
  - type: text
    content: 'moa tsy tokony mba ho namindra fo tamin’ny mpanompo namanao koa va hianao tahaka ny namindrako fo taminao? '
  '34':
  - type: text
    content: 'Dia tezitra ny tompony ka nanolotra azy ho amin’ny mpampijaly mandra-pandoany ny trosa rehetra. '
  '35':
  - type: text
    content: Ary tahaka izany koa no hataon’ny Raiko Izay any an-danitra aminareo, raha tsy samy mamela ny rahalahinareo amin’ny fonareo avy hianareo.
  '4':
  - type: text
    content: 'Koa na zovy na zovy no hanetry tena tahaka ity zazakely ity, dia izy no ho lehibe indrindra amin’ny fanjakan’ny lanitra. '
  '5':
  - type: text
    content: 'Ary na zovy na zovy no handray zazakely anankiray aza tahaka itony noho ny anarako, dia mandray Ahy. '
  '6':
  - type: text
    content: Fa na zovy na zovy no hanafintohina na dia iray aza amin’ireny madinika mino Ahy ireny, dia tsara lavitra ho azy raha anantonana vato lehibe
  - type: note
    content: 'Na: ahodim-boriky.'
  - type: text
    content: ' fikosoham-bary ny vozony, ka alentika any amin’ny ranomasina lalina izy.'
  '7':
  - type: text
    content: 'Lozan’izao tontolo izao noho ny fahatafintohinana! fa tsy maintsy ho avy ny fahatafintohinana, nefa lozan’izay olona mahatonga ny fahatafintohinana. '
  '8':
  - type: text
    content: 'Koa raha ny tànanao na ny tongotrao no manafintohina anao, tapaho izy ka ario ho afaka aminao; fa tsara ho anao ny hiditra kilemaina na mandringa any amin’ny fiainana noho ny manana tànana roa sy tongotra roa, nefa hariana any amin’ny afo maharitra mandrakizay. '
  '9':
  - type: text
    content: Ary raha ny masonao no manafintohina anao, esory hiala izy, ka ario ho afaka aminao; fa tsara ho anao ny hiditra toka-maso amin’ny fiainana noho ny manana maso roa, nefa hariana any amin’ny helo mirehitra afo.
