document_id: MAT.18
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampianaran’i Jesosy ny mpianany hanetry tena sy hamela ny heloky ny namany, sy ny fanoharana ny amin’ny mpitrosa tsy nanan-kaloa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 9.33-50; Lio. 9.46-50; 15.3-7.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TAMIN’izany ora izany dia nankeo amin’i Jesosy ny mpianatra ka nanao hoe: Iza moa no lehibe indrindra ao amin’ny fanjakan’ny lanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Jesosy niantso zazakely anankiray hankeo aminy, dia nametraka azy teo afovoany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nanao hoe: Lazaiko aminareo marina tokoa: Raha tsy miova'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mitodika.
    marker-yv: yv-n
  - type: text
    text: ' hianareo ka ho tonga tahaka ny zazakely, dia tsy hiditra amin’ny fanjakan’ny lanitra mihitsy hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa na zovy na zovy no hanetry tena tahaka ity zazakely ity, dia izy no ho lehibe indrindra amin’ny fanjakan’ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary na zovy na zovy no handray zazakely anankiray aza tahaka itony noho ny anarako, dia mandray Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa na zovy na zovy no hanafintohina na dia iray aza amin’ireny madinika mino Ahy ireny, dia tsara lavitra ho azy raha anantonana vato lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahodim-boriky.
    marker-yv: yv-n
  - type: text
    text: ' fikosoham-bary ny vozony, ka alentika any amin’ny ranomasina lalina izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lozan’izao tontolo izao noho ny fahatafintohinana! fa tsy maintsy ho avy ny fahatafintohinana, nefa lozan’izay olona mahatonga ny fahatafintohinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa raha ny tànanao na ny tongotrao no manafintohina anao, tapaho izy ka ario ho afaka aminao; fa tsara ho anao ny hiditra kilemaina na mandringa any amin’ny fiainana noho ny manana tànana roa sy tongotra roa, nefa hariana any amin’ny afo maharitra mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary raha ny masonao no manafintohina anao, esory hiala izy, ka ario ho afaka aminao; fa tsara ho anao ny hiditra toka-maso amin’ny fiainana noho ny manana maso roa, nefa hariana any amin’ny helo mirehitra afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mitandrema, fandrao manao tsinontsinona na dia ny iray aza amin’ireny madinika ireny hianareo; fa lazaiko aminareo: Ny anjeliny any an-danitra mahita mandrakariva ny tavan’ny Raiko Izay any an-danitra.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[11 Fa tonga ny Zanak’olona hamonjy ny very.]'
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ahoana no hevitrareo? Raha misy olona manana ondry zato, ka mania ny anankiray, moa tsy hamela ny sivy amby sivi-folo eny an-tendrombohitra va izy ka handeha hitady ilay nania? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha tàhiny hitany izy, dia lazaiko aminareo marina tokoa fa mahafaly azy iny noho ny sivy amby sivifolo izay tsy nania. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary tahaka izany, dia tsy sitraky ny Rainareo Izay any an-danitra, raha ho very na dia iray aza amin’ireny madinika ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary raha manota aminao ny rahalahinao, dia mankanesa any aminy, ka rehefa mitokana hianareo roa lahy, dia asehoy azy ny fahadisoany. Raha mihaino anao izy, dia efa azonao ny rahalahinao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fa raha tsy mihaino anao kosa izy, dia ento miaraka aminao ny olona iray na roa, mba ho voaorina mafy avokoa ny teny rehetra amin’ny tenin’ny vavolombelona roa na telo (Deo. 19.15). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary raha tsy mety mihaino ireo izy, dia ambarao amin’ny fiangonana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' ary raha tsy mety mihaino ny fiangonana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' koa izy, dia aoka hataonao ho tahaka ny jentilisa sy ny mpamory hetra izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Na inona na inona fehezinareo etỳ ambonin’ny tany dia hofehezina any an-danitra; ary na inona na inona vahanareo etỳ ambonin’ny tany dia hovahana any an-danitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary lazaiko aminareo koa: Raha misy roa aminareo mifanaiky etỳ ambonin’ny tany na amin’inona na amin’inona ka hangataka izany, dia ho azony avy amin’ny Raiko Izay any an-danitra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa na aiza na aiza no iangonan’ny roa na telo amin’ny anarako, dia ao afovoany Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nanatona Petera ka nanao taminy hoe: Tompoko, impiry moa no hanotan’ny rahalahiko amiko, ka havelako izy? Hatramin’ny impito va?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy Jesosy taminy: Tsy lazaiko aminao hoe: Hatramin’ny impito, fa hatramin’ny impito amby fito-polo.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fito-polo impito.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa amin’izany ny fanjakan’ny lanitra dia tahaka ny mpanjaka anankiray, izay te-hidinika amin’ny mpanompony ny amin’ny volany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary raha vao nidinika izy, dia nisy anankiray nentina teo aminy, izay nitrosa talenta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaram-bola; ny talenta volafotsy dia sekely telo arivo.
    marker-yv: yv-n
  - type: text
    text: ' iray alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary satria tsy nanan-kaloa izy, dia nasain’ny tompony hamidy izy sy ny vadiny aman-janany mbamin’ny fananany rehetra handoavana ny trosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niankohoka teo anatrehany ilay mpanompo ka nanao hoe: Tompoko, omeo andro aho, fa haloako ny anao rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ny tompon’izany mpanompo izany dia onena azy ka nandefa azy sady namoy ny trosa taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nefa nony nivoaka izany mpanompo izany, dia nahita mpanompo namany anankiray, izay nitrosa denaria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaram-bola tokony ho venty no heviny.
    marker-yv: yv-n
  - type: text
    text: ' zato taminy; dia nosamboriny izy ka notraohiny sady nataony hoe: Aloavy izay trosako aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa niankohoka ilay mpanompo namany ka nifona taminy nanao hoe: Omeo andro aho, fa haloako ny anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nefa tsy nety izy, fa lasa nampanao azy tao an-trano-maizina mandra-pandoany ny trosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nony hitan’ireo mpanompo namany izay efa natao, dia nalahelo indrindra izy ka nandeha nanambara tsara tamin’ny tompony izany rehetra natao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nampanalain’ny tompony ralehilahy ka noteneniny hoe: Ry mpanompo ratsy fanahy, efa nafoiko ilay trosa rehetra taminao, satria nifona tamiko hianao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'moa tsy tokony mba ho namindra fo tamin’ny mpanompo namanao koa va hianao tahaka ny namindrako fo taminao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia tezitra ny tompony ka nanolotra azy ho amin’ny mpampijaly mandra-pandoany ny trosa rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary tahaka izany koa no hataon’ny Raiko Izay any an-danitra aminareo, raha tsy samy mamela ny rahalahinareo amin’ny fonareo avy hianareo.
