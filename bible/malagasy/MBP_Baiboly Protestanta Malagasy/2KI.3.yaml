document_id: 2KI.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nikambanan’i Jorama, mpanjakan’ny Isiraely, sy Josafata, mpanjakan’ny Joda, hiady tamin’ny Moabita.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jorama, zanak’i Ahaba, vao nanjaka tamin’ny Isiraely tao Samaria tamin’ny fahavalo ambin’ny folo taona nanjakan’i Josafata, mpanjakan’ny Joda, ary nanjaka roa ambin’ny folo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanao izay ratsy eo imason’i Jehovah koa izy, nefa kosa tsy dia tahaka an-drainy, na tahaka an-dreniny; fa nanaisotra ilay tsangam-baton’i Bala izay nataon’drainy izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: nefa izy nikikitra tamin’ny fahotan’i Jeroboama, zanak’i Nebata, izay nampanotany ny Isiraely, fa tsy niala tamin’izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary Mesa, mpanjakan’i Moaba, nanana ondry betsaka; ary nandoa hetra ho an’ny mpanjakan’ny Isiraely izy, dia zanak’ondry iray hetsy sy ny volon’ondrilahy iray hetsy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny volon-janak’ondry iray hetsy sy ondrilahy iray hetsy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa rehefa maty Ahaba, dia niodina tamin’ny mpanjakan’ny Isiraely ny mpanjakan’i Moaba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Jorama mpanjaka nivoaka avy tany Samaria tamin’izany andro izany ka nandamina ny Isiraely rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nandeha izy, dia naniraka tany amin’i Josafata, mpanjakan’ny Joda, ka nanao hoe: Ny mpanjakan’i Moaba efa niodina tamiko: koa mba hiaraka amiko va hianao hiady aminy? Ary hoy izy: Eny, handeha aho, fa tahaka ny tenanao ihany aho, ka ny oloko dia olonao, ary ny soavaliko dia soavalinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy izy: Aiza ary no làlana halehantsika? Ary izy namaly hoe: Ilay mamaky ny efitr’i Edoma.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nandeha ny mpanjakan’ny Isiraely sy ny mpanjakan’ny Joda ary ny mpanjakan’i Edoma; ary nandeha nanodidina làlan-kafitoana izy; ary tsy nisy rano ho an’ny miaramila sy ny biby fiompy izay nentiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny mpanjakan’ny Isiraely: Indrisy! Jehovah efa niantso ireto mpanjaka telo ireto mba hatolony eo an-tànan’i Moaba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Josafata: Tsy misy mpaminanin’i Jehovah va eto hanontaniantsika amin’i Jehovah? Ary nisy anankiray tamin’ny mpanompon’ny mpanjakan’ny Isiraely namaly ka nanao hoe: Ato ihany Elisa, zanak’i Safata, ilay mpanondra-drano ny tànan’i Elia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Josafata: Ao amin’izy io tokoa ny tenin’i Jehovah. Dia nidina nankany amin’i Elisa ny mpanjakan’ny Isiraely sy Josafata ary ny mpanjakan’i Edoma.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Elisa tamin’ny mpanjakan’ny Isiraely: Moa mifaninona akory izaho sy hianao? Mandehana any amin’ny mpaminanin-drainao sy ny mpaminanin-dreninao hianao. Fa hoy ny mpanjakan’ny Isiraely taminy: Tsia, fa Jehovah efa niantso ireto mpanjaka telo ireto mba hatolony eo an-tànan’i Moaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Elisa: Raha velona koa Jehovah, Tompon’ny maro, Izay itsanganako eo anatrehany, raha tsy noho ny fanajako an’i Josafata, mpanjakan’ny Joda, dia tsy hanatrika anao na hijery anao akory aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nefa itondray mpitendry lokanga aho.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary rehefa nitendry ilay mpitendry lokanga, dia nanindry an’i Elisa ny tànan’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy Elisa: Izao no lazain’i Jehovah: Ataovy feno lavaka ity lohasahan-driaka ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy Jehovah: Tsy hahita rivotra na ranonorana akory hianareo; nefa ho feno rano io lohasahan-driaka io, mba hosotroinareo, dia hianareo sy ny ombinareo ary ny biby fiompinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ho zavatra kely ihany eo imason’i Jehovah izany; fa hanolotra ny Moabita eo an-tànanareo koa Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary handrava ny tanàna mimanda rehetra sy ny tanàna soa rehetra hianareo sady hikapa ny hazo tsara rehetra sy hanampina ny loharano rehetra ary hanipy vato amin’ny tany soa rehetra ho fanimbana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nony maraina, tokony ho tamin’ny fotoana fanaterana ny fanatitra, dia, indro, nisy rano tokoa tonga avy tamin’ny làlana mankany Edoma, ka feno rano ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary rehefa ren’ny Moabita rehetra fa avy miakatra hiady aminy ireo mpanjaka ireo, dia nivory izy hatramin’izay rehetra nahatam-piadiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nahasikina.
    marker-yv: yv-n
  - type: text
    text: ' no ho miakatra, ka dia niandry teo amin’ny sisin-taniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nony nifoha maraina koa ny Moabita, sady efa niposaka ny masoandro ka nitaratra tamin’ny rano, dia hitany ny rano tandrifiny fa mena tahaka ny ra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy izy: Ra io! efa nifandringana tokoa ireo mpanjaka ireo, ary efa nifamely izy rehetra; koa mamaboa amin’izao, ry Moaba! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Kanjo nony efa tonga teo an-tobin’ny Isiraely izy, dia nitsangana ny Isiraely ka namely ny Moabita, dia nandositra teo anoloany ireo; fa ny Isiraely niditra hatrany amin’ny tanin’ny Moabita ka mbola namely azy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia nandrava ny tanàna izy–ary samy nanipy vato tamin’ny tany soa rehetra ka nahafeno azy, ary nanampina ny loharano rehetra koa izy sady nikapa ny hazo tsara rehetra–mandra-paha-tsy nisy vato intsony afa-tsy ny tao Kira-haresa ihany; ary na dia io aza dia nohodidinin’ny mpandefa antsamotady ka nasiany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary rehefa hitan’ny mpanjakan’i Moaba fa tsy tohany ny ady, dia nitondra fiton-jato lahy nahay sabatra nomba azy izy mba hanivakivaka hitsin’ny mpanjakan’i Edoma; nefa tsy afaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nalainy ny zanany lahimatoa, izay natao hanjaka handimby azy, ka nateriny ho fanatitra dorana teo ambonin’ny mànda. Dia niharan’ny fahatezerana mafy ny Isiraely, dia niala taminy ary niverina ho any amin’ny taniny izy.
