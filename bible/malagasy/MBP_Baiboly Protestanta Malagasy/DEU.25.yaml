document_id: DEU.25,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny kapoka hatao amin’izay meloka, sy ny fitondran-doloha ny vadin-drahalahy, ary ny tsy hanaovana varo-dratsy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'RAHA misy olona manana ady ka mankeo amin’ny fitsarana ary tsarain’ny mpitsara, dia aoka hohamarininy izay marina ary hohelohiny kosa izay meloka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anaran-dralehilahy dia hatao eo amin’ny Isiraely hoe: Fianakavian’ilay nalan-kapa.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona miady, ary ny vadin’ny anankiray manatona hamonjy ny vadiny amin’ny tànan’izay mamely azy, ary maninjitra ny tànany ka mandray azy an-kasarotana, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hotapahinao ny tanany; tsy hiantra azy ny masonao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hisy vato mahery sy reraka ao an-kitaponao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hisy famarana mihoatra sy latsaka ao an-tranonao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vato feno lanja sady marina ary famarana tonga ohatra sady marina no aoka hotananao, mba ho maro andro hianao any amin’ny tany izay omen’i Jehovah Andriamanitrao anao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa fahavetavetana eo imason’i Jehovah Andriamanitrao izay rehetra manao izany zavatra izany, dia izay rehetra manao ny tsy marina.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny handringanana ny Amalekita.
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'TSAROVY izay nataon’ny Amalekita taminao teny an-dàlana tamin’ny nandehananareo avy tany Egypta, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny nitsenany anao teny an-dàlana sy ny namelezany ny vodi-làlanao, dia izay rehetra tsy afaka teo aorianao, raha reraka sy sasatra hianao; fa tsy natahotra an’Andriamanitra izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa omen’i Jehovah Andriamanitrao fitsaharana amin’ny fahavalonao rehetra manodidina hianao any amin’ny tany izay omen’i Jehovah Andriamanitrao anao ho lovanao, dia hovonoinao ny fahatsiarovana ny Amalekita tsy ho eo ambanin’ny lanitra intsony: aza hadinoinao izany.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tokony hokapohina ny meloka, dia aoka hampandrin’ny mpitsara izy ka hokapohina eo anatrehany, ary hatao araka ny helony no isan’ny kapoka hatao aminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatramin’ny efa-polo no kapoka azo hatao aminy, fa tsy hatao mihoatra; fandrao raha mihoatra noho izany, dia ho toy ny tsinontsinona eo imasonao ny rahalahinao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manakombona ny vavan’ny omby mively vary.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy mpirahalahy miara-monina, ary maty momba ny anankiray, dia aoka tsy hanambady vahiny any ivelany ny vadin’ny maty; fa ny rahalahin’ny vadiny ihany no aoka hanambady azy ka hitondra loloha azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lahimatoa izay haterany dia hitondra ny anaran’ilay rahalahy izay efa maty, mba tsy ho faty maso eo amin’ny Isiraely izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tsy sitra-dralehilahy ny hitondra loloha ny vadin-drahalahiny, dia aoka hankeo amin’ny vavahady ho eo amin’ny loholona ravehivavy ka hanao hoe: Ny rahalahin’ny vadiko tsy mety mamelo-maso ny rahalahiny, fa tsy mety mitondra loloha ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hantsoin’ny loholona amin’ny tanàna ralehilahy ka hadininy; ary raha mikiry izy ka manao hoe: Tsy sitrako ny hanambady azy, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hanatona azy eo anatrehan’ny loholona ny vadin-drahalahiny ka hanala ny kapa amin’ny tongo-dralehilahy, dia handrora amin’ny tavany ka hiteny hoe: Toy izany no hatao amin’izay olona tsy mety mamelo-maso ny rahalahiny. '
