document_id: 2CH.14,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Asa nanao izay tsara sy mahitsy eo imason’i Jehovah Andriamanitra; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Asa nitaraina tamin’i Jehovah Andriamaniny ka nanao hoe: Jehovah ô, tsy misy afa-tsy Hianao no mahavonjy ny tsy manan-kery, raha iadian’ny maro izy,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jehovah ô, mora foana aminao ny hamonjy na ny mahery na izay tsy manan-kery.
      marker-yv: yv-n
    - type: text
      text: ' ka vonjeo izahay, Jehovah Andriamanitray ô, fa Hianao no iankinanay, ary ny anaranao no andehananay hiady amin’ireto olona ireto. Jehovah ô, Hianao no Andriamanitray; aza avela hisy olona haharesy Anao.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah namely ny Etiopiana teo anoloan’i Asa sy ny Joda, ka dia nandositra ireny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Asa sy ny vahoaka teo aminy nanenjika azy hatrany Gerara, ka dia nahafatesana be ny Etiopiana ka tsy naharina intsony; fa voaringana teo anoloan’i Jehovah sy ny miaramilany izy, ka nahazoan’ny Joda babo betsaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namely ny tanàna rehetra manodidina an’i Gerara izy; fa ny fahatahorana an’i Jehovah nahazo ireo, ka nobaboiny ny tanàna rehetra, fa be ny babo tao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary namely ny vala izy ka nahazo babo betsaka, dia ondry aman-osy sy rameva, ary dia niverina ho any Jerosalema izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nandrava ny alitaran’ny firenena hafa sy ny fitoerana avo izy sady nanorotoro ny tsangam-baton’tsampy ary nikapa ny Aseraha. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandidy ny Joda hitady an’i Jehovah, Andriamanitry ny razany, izy ary hankatò ny lalàna sy ny didy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandrava ny fitoerana avo sy ny tsangan-kazo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsangam-bato.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny masoandro teny amin’ny tanànan’ny Joda rehetra izy; dia nandry fahizay ny fanjakana teo anatrehany.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao tanàna mimanda tany Joda izy; ka dia nandry fahizay ny tany, fa tsy nisy ady tamin’izany andro izany; fa Jehovah no nanome azy fiadanana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamin’ny Joda: Andeha hamboarintsika ireto tanàna ireto ka hasiantsika mànda manodidina sy tilikambo ary vavahady mihidy, raha mbola azontsika zakaina ny tany; fa efa nitady an’i Jehovah Andriamanitsika isika; eny, nitady Azy isika, ka nanome antsika fiadanana amin’ny manodidina Izy. Ary dia namboariny avokoa izany ka tontosa tsara.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Asa nanana miaramila, dia telo hetsy mpitana ampinga lehibe sy lefona avy tamin’ny Joda, ary valo alina amby roa hetsy mpitana ampinga sy tsipìka avy amin’ny Benjamina; ireo rehetra ireo dia lehilahy mahery avokoa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Zera Etiopiana nivoaka hiady tamin’ireo ka nitondra miaramila iray tapitrisa sy kalesy telon-jato, ka dia tonga tao Maresa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Asa nivoaka hiady taminy, dia samy nilahatra hiady teo an-dohasaha Zefata akaikin’i Maresa izy.
