document_id: ECC.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ireto dia nalatsako tato am-poko sady nodinihiko avokoa: ny marina sy ny hendry mbamin’ny asany dia samy eo an-tànan’Andriamanitra avokoa; ary koa, na ho fitiavana, na ho fankahalana, dia samy tsy fantatry ny olombelona; fa zavatra mbola ho avy aminy avokoa izany rehetra izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay rehetra azon’ny tànanao atao dia ataovy amin’ny herinao; fa tsy misy asa, na hevitra, na fahalalana, na fahendrena, any amin’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Heb.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Sheola.'
      marker-yv: yv-n
    - type: text
      text: ' izay alehanao.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fihoaran’ny fahendrena noho ny hery.
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY hitako atỳ ambanin’ny masoandro indray fa tsy ho an’ny haingan-tongotra ny fihoarana, ary tsy ho an’ny mahery ny ady, ary tsy ho an’ny hendry ny hanina, ary tsy ho an’ny mazava saina ny harena, ary tsy ho an’ny manam-pahalalana ny fitia; fa ny fotoana sy ny sampona dia samy mahazo azy rehetra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy fantatry ny olona ny androny; fa toy ny hazandrano azon’ny harato fahitan-doza izy, ary toy ny voron-kely izay voan’ny fandrika, dia voafandrika toy izany ny zanak’olombelona amin’ny andro mahory, raha mahavoa azy tampoka izany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao koa no fahendrena efa hitako tatỳ ambanin’ny masoandro, ka dia nataoko ho lehibe izany: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy vohitra kely sady vitsy olona, dia avy ny mpanjaka lehibe anankiray ka namely sy nanao fahirano azy ary nanao mànda lehibe hamelezany azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy lehilahy malahelo hendry hita teo, koa nahavonjy ny tanàna tamin’ny fahendreny ralehilahy, nefa tsy nisy olona mba nahatsiahy ilay malahelo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hoy izaho: Aleo fahendrena toy izay hery; kanjo hamavoina ny fahendren’ny malahelo, ary ny teniny tsy mba henoina.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ohabolana samy hafa ny amin’ny tsi-fitovian’ny fahendrena sy ny fahadalana, ary ny amin’ny fanaovan-tsoa sy ny fahazotoana ary ny fahamarinana.
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY tenin’ny hendry izay re amin’ny mangingina dia mahery noho ny fitreron’izay mpanapaka adala. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aleo fahendrena toy izay fiadiana; ary ny mpanota iray mahasimba ny soa be.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitovy avokoa ny manjo ny olombelona rehetra; eny, zavatra iray ihany no manjo ny marina sy ny meloka, ny tsara fanahy sy ny madio ary ny tsy madio, ny mamono zavatra hatao fanatitra sy ny tsy mamono zavatra hatao fanatitra; mitovy ihany ny amin’ny tsara fanahy sy ny amin’ny mpanota, ary ny amin’ny mianiana sy ny amin’izay tsy sahy hianiana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no fahoriana amin’izay rehetra atao atỳ ambanin’ny masoandro: Zavatra iray ihany no manjo ny olombelona rehetra, sady feno ratsy ny fon’ny zanak’olombelona, ka fahadalana no ao am-pony amin’ny andro iainany, ary nony afaka izany, dia ho any amin’ny maty izy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay rehetra isan’ny velona dia mbola hantenaina;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Fa iza no ho afaka? Ny amin’ny velona rehetra dia mbola misy hantenaina.'
      marker-yv: yv-n
    - type: text
      text: ' fa ny amboa velona no tsara noho ny liona maty. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fantatry ny velona fa ho faty izy; fa ny maty kosa tsy mba mahalala na inona na inona, ary tsy manana valim-pitia intsony izy; fa hadino ny fahatsiarovana azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na ny fitiavany, na ny fankahalany, na ny fialonany, dia samy efa levona ela sady tsy manana anjara intsony mandrakizay amin’izay atao atỳ ambanin’ny masoandro izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandehana, hano amin’ny fifaliana ny haninao, ary sotroy amin’ny fo falifaly ny divainao, fa efa nankasitrahan’Andriamanitra ela ny asanao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho fotsy mandrakariva ny fitafianao, ary aoka tsy ho diso menaka ny lohanao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miravoravoa amin’ny vady malalanao amin’ny andronao rehetra mandalo foana, izay efa nomeny anao atỳ ambanin’ny masoandro, dia ny andronao rehetra mandalo foana; fa izany no anjaranao amin’ny andro iainanao sy amin’ny fisasarana izay isasaranao atỳ ambanin’ny masoandro.
