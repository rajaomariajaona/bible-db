document_id: AMO.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny handravana ny fanjakan’Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: HENOINAREO izao teny izao, izay entiko milaza anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hira fahalahelovana, ry taranak’Isiraely;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lavo Isiraely virijina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hahatsangana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nazera tamin’ny taniny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy misy manangana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tanàna namoaka arivo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia, indreo, zato monja no sisa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay namoaka zato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia, indreo, folo monja no sisa ho an’ny taranak’Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa izao no lazain’i Jehovah amin’ny taranak’Isiraely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tadiavo Aho, dia ho velona hianareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa aza mitady an’i Betela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mankany Gilgala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mandroso ho any Berisheba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho babo tokoa Gilgala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Betela dia ho tonga tsinontsinona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mitadiava an’i Jehovah, dia ho velona hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao hilatsaka toy ny afo mandevona amin’ny taranak’i Josefa Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Betela tsy hanana izay hahafaty ny afo,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia hianareo izay mamadika ny rariny ho zava-mahafaty
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampiongana ny fahamarinana ho eo amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ilay nanao an’Ikotokelimiadilaona sy ny Telonohorefy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampody ny aloky ny fahafatesana ho maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy manamaizina ny andro ho alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Ilay miantso ny rano ao an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka mandatsaka azy amin’ny tany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah no anarany,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia Ilay mampitselatra fandravana hamely ny mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia mihatra amin’ny tanàna mimanda ny fandravana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Halany eo am-bavahady izay mananatra,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Halany izay mananatra eo am-bavahady.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ataony ho fahavetavetana izay miteny ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa noho ny fanitsakitsahanareo ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny nampandoavanareo vary azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mba nanao trano vato voapaika ihany hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy hitoetra ao aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namboly tanimboaloboka mahafinaritra ihany hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy hisotro ny divay avy aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa fantatro fa be ny helokareo, ary fatratra ny fahotanareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampahory ny marina sy mandray kolikoly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avotra.
    marker-yv: yv-n
  - type: text
    text: ' hianareo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamadika ny malahelo eo am-bavahady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa izay manan-tsaina dia hangina amin’izao andro izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa andro mampahory izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny tsara no tadiavo, fa aza ny ratsy, mba ho velona hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia homba anareo Jehovah, Andriamanitry ny maro, araka izay efa nolazainareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankahalao ny ratsy, ka tiavo ny tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoreno eo am-pitsarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: am-bavahady.
    marker-yv: yv-n
  - type: text
    text: ' ny rariny;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angamba Jehovah, Andriamanitry ny maro, hamindra fo amin’izay sisa amin’i Josefa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izao no lazain’i Jehovah Tompo, Andriamanitry ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny an-kalalahana rehetra dia hisy fisaonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary eny an-dàlambe rehetra dia hisy hanao hoe: Indrisy! Indrisy!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiantso ny mpiasa tany hitomany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mahay hira fisaonana dia hantsoiny hanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary any amin’ny tanimboaloboka rehetra dia hisy fisaonana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa handeha hamaky eo aminao Aho, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lozan’izay maniry ny andron’i Jehovah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hataonareo inona moa ny andron’i Jehovah?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia aizina, fa tsy fahazavana,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tahaka ny olona mandositra ny liona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka sendra ny bera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rehefa tafiditra ao an-trano ka mitehin-tànana amin’ny rindrina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia kekerin’ny menarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moa tsy aizina va ny andron’i Jehovah, fa tsy fahazavana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy aizim-pito tsy misy mangirana akory va izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Halako, eny, laviko ny andro firavoravoanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho hanitra ankasitrahana amiko ny fivorianareo masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Na dia ateranareo fanatitra dorana sy fanatitra hohanina aza Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy sitrako izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanak’omby mifahy aterinareo ho fanati-pihavanana dia tsy hojereko akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Atsaharo ny finaonaonan’ny hiranareo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hiranao, lokanganao.
    marker-yv: yv-n
  - type: text
    text: ' fa maharenina Ahy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hihaino ny fanenon’ny lokanganareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hiranao, lokanganao.
    marker-yv: yv-n
  - type: text
    text: ' Aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary aoka ny fitsarana hanalonalona toy ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinana toy ny renirano tsy mety ritra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Moa efa nanatitra fanatitra hohanina sy fanatitra alatsa-dra ho Ahy tany an-efitra efa-polo taona va hianareo, ry taranak’i Isiraely?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsia, fa ny nitondra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dia ho entinareo.
    marker-yv: yv-n
  - type: text
    text: ' ny tabernakelin’ny mpanjakanareo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fipetrahan’ny sampinareo ihany no nataonareo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsia, fa ny mitondra an’i Sikota, mpanjakanareo, sy Kiona, sampinareo, no nataonareo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny kintan’ny andriamanitrareo, izay nataonareo ho anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ka dia ho entiko ho babo any ankoatr’i Damaskosy hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah,–Andriamanitry ny maro no anarany.
