document_id: AMO.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana ny fanjakan’Isiraely.
  - type: text
    content: HENOINAREO izao teny izao, izay entiko milaza anareo,
  - type: text
    content: Dia hira fahalahelovana, ry taranak’Isiraely;
  '10':
  - type: text
    content: Halany eo am-bavahady izay mananatra,
  - type: note
    content: 'Na: Halany izay mananatra eo am-bavahady.'
  - type: text
    content: Ary ataony ho fahavetavetana izay miteny ny marina.
  '11':
  - type: text
    content: Koa noho ny fanitsakitsahanareo ny mahantra
  - type: text
    content: Sy ny nampandoavanareo vary azy,
  - type: text
    content: Dia mba nanao trano vato voapaika ihany hianareo,
  - type: text
    content: Nefa tsy hitoetra ao aminy;
  - type: text
    content: Namboly tanimboaloboka mahafinaritra ihany hianareo,
  - type: text
    content: Nefa tsy hisotro ny divay avy aminy.
  '12':
  - type: text
    content: 'Fa fantatro fa be ny helokareo, ary fatratra ny fahotanareo:'
  - type: text
    content: Mampahory ny marina sy mandray kolikoly
  - type: note
    content: Heb. avotra.
  - type: text
    content: ' hianareo'
  - type: text
    content: Ary mamadika ny malahelo eo am-bavahady.
  '13':
  - type: text
    content: Koa izay manan-tsaina dia hangina amin’izao andro izao,
  - type: text
    content: Fa andro mampahory izao.
  '14':
  - type: text
    content: Ny tsara no tadiavo, fa aza ny ratsy, mba ho velona hianareo;
  - type: text
    content: Ka dia homba anareo Jehovah, Andriamanitry ny maro, araka izay efa nolazainareo.
  '15':
  - type: text
    content: Ankahalao ny ratsy, ka tiavo ny tsara,
  - type: text
    content: Ary aoreno eo am-pitsarana
  - type: note
    content: Heb. am-bavahady.
  - type: text
    content: ' ny rariny;'
  - type: text
    content: Angamba Jehovah, Andriamanitry ny maro, hamindra fo amin’izay sisa amin’i Josefa.
  '16':
  - type: text
    content: 'Koa izao no lazain’i Jehovah Tompo, Andriamanitry ny maro:'
  - type: text
    content: Eny an-kalalahana rehetra dia hisy fisaonana,
  - type: text
    content: 'Ary eny an-dàlambe rehetra dia hisy hanao hoe: Indrisy! Indrisy!'
  - type: text
    content: Ary hiantso ny mpiasa tany hitomany izy,
  - type: text
    content: Ary izay mahay hira fisaonana dia hantsoiny hanao.
  '17':
  - type: text
    content: Ary any amin’ny tanimboaloboka rehetra dia hisy fisaonana;
  - type: text
    content: Fa handeha hamaky eo aminao Aho, hoy Jehovah.
  '18':
  - type: text
    content: Lozan’izay maniry ny andron’i Jehovah!
  - type: text
    content: Hataonareo inona moa ny andron’i Jehovah?
  - type: text
    content: Dia aizina, fa tsy fahazavana,–
  '19':
  - type: text
    content: Tahaka ny olona mandositra ny liona
  - type: text
    content: Ka sendra ny bera,
  - type: text
    content: Ary rehefa tafiditra ao an-trano ka mitehin-tànana amin’ny rindrina,
  - type: text
    content: Dia kekerin’ny menarana.
  '2':
  - type: text
    content: Lavo Isiraely virijina
  - type: text
    content: Ka tsy hahatsangana intsony;
  - type: text
    content: Nazera tamin’ny taniny izy,
  - type: text
    content: Ka tsy misy manangana azy.
  '20':
  - type: text
    content: Moa tsy aizina va ny andron’i Jehovah, fa tsy fahazavana?
  - type: text
    content: Tsy aizim-pito tsy misy mangirana akory va izany?
  '21':
  - type: text
    content: Halako, eny, laviko ny andro firavoravoanareo,
  - type: text
    content: Ary tsy ho hanitra ankasitrahana amiko ny fivorianareo masina.
  '22':
  - type: text
    content: Na dia ateranareo fanatitra dorana sy fanatitra hohanina aza Aho,
  - type: text
    content: Dia tsy sitrako izany;
  - type: text
    content: Ny zanak’omby mifahy aterinareo ho fanati-pihavanana dia tsy hojereko akory.
  '23':
  - type: text
    content: Atsaharo ny finaonaonan’ny hiranareo,
  - type: note
    content: Heb. hiranao, lokanganao.
  - type: text
    content: ' fa maharenina Ahy;'
  - type: text
    content: Fa tsy hihaino ny fanenon’ny lokanganareo
  - type: note
    content: Heb. hiranao, lokanganao.
  - type: text
    content: ' Aho.'
  '24':
  - type: text
    content: Ary aoka ny fitsarana hanalonalona toy ny rano,
  - type: text
    content: Ary ny fahamarinana toy ny renirano tsy mety ritra.
  '25':
  - type: text
    content: Moa efa nanatitra fanatitra hohanina sy fanatitra alatsa-dra ho Ahy tany an-efitra efa-polo taona va hianareo, ry taranak’i Isiraely?
  '26':
  - type: text
    content: Tsia, fa ny nitondra
  - type: note
    content: 'Na: Dia ho entinareo.'
  - type: text
    content: ' ny tabernakelin’ny mpanjakanareo'
  - type: text
    content: Sy ny fipetrahan’ny sampinareo ihany no nataonareo,
  - type: note
    content: 'Na: Tsia, fa ny mitondra an’i Sikota, mpanjakanareo, sy Kiona, sampinareo, no nataonareo.'
  - type: text
    content: Dia ny kintan’ny andriamanitrareo, izay nataonareo ho anareo.
  '27':
  - type: text
    content: Ka dia ho entiko ho babo any ankoatr’i Damaskosy hianareo,
  - type: text
    content: Hoy Jehovah,–Andriamanitry ny maro no anarany.
  '3':
  - type: text
    content: 'Fa izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Izay tanàna namoaka arivo,
  - type: text
    content: 'Dia, indreo, zato monja no sisa:'
  - type: text
    content: Ary izay namoaka zato,
  - type: text
    content: Dia, indreo, folo monja no sisa ho an’ny taranak’Isiraely.
  '4':
  - type: text
    content: Fa izao no lazain’i Jehovah amin’ny taranak’Isiraely;
  - type: text
    content: Tadiavo Aho, dia ho velona hianareo;
  '5':
  - type: text
    content: Fa aza mitady an’i Betela,
  - type: text
    content: Na mankany Gilgala,
  - type: text
    content: Ary aza mandroso ho any Berisheba;
  - type: text
    content: Fa ho babo tokoa Gilgala,
  - type: text
    content: Ary Betela dia ho tonga tsinontsinona.
  '6':
  - type: text
    content: Mitadiava an’i Jehovah, dia ho velona hianareo;
  - type: text
    content: Fandrao hilatsaka toy ny afo mandevona amin’ny taranak’i Josefa Izy,
  - type: text
    content: Ary Betela tsy hanana izay hahafaty ny afo,–
  '7':
  - type: text
    content: Dia hianareo izay mamadika ny rariny ho zava-mahafaty
  - type: text
    content: Ary mampiongana ny fahamarinana ho eo amin’ny tany.
  '8':
  - type: text
    content: Ilay nanao an’Ikotokelimiadilaona sy ny Telonohorefy,
  - type: text
    content: Ary mampody ny aloky ny fahafatesana ho maraina
  - type: text
    content: Sy manamaizina ny andro ho alina,
  - type: text
    content: Dia Ilay miantso ny rano ao an-dranomasina
  - type: text
    content: 'Ka mandatsaka azy amin’ny tany:'
  - type: text
    content: Jehovah no anarany,–
  '9':
  - type: text
    content: Dia Ilay mampitselatra fandravana hamely ny mahery,
  - type: text
    content: Ka dia mihatra amin’ny tanàna mimanda ny fandravana.
