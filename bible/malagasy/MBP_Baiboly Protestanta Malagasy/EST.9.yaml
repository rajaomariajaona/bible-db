document_id: EST.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny naharesen’ny Jiosy ny fahavalony izay nikasa handringana azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’ny andro fahatelo ambin’ny folo tamin’ny volana faharoa ambin’ny folo (volana Adara izany), rehefa akaiky ny andro hanatanterahana ny tenin’ny mpanjaka sy ny didiny, dia ny andro izay efa nantenain’ny fahavalon’ny Jiosy haharesena azy indrindra (kanjo navadika izany, ka ny Jiosy kosa no nanaresy izay nankahala azy), '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia nivory tany an-tanànany avy ny Jiosy, tany amin’ny isan-tokony eran’ny fanjakan’i Ahasoerosy mpanjaka, mba hamely izay nitady hanisy ratsy azy; ary tsy nisy olona nahajanona teo anoloany, fa efa nahazo ny olona rehetra ny fahatahorana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny mpanapaka rehetra isan-tokony tamin’ny fanjakana sy ny solo-mpanjaka sy ny governora mbamin’ny mpanao raharahan’ny mpanjaka dia nanampy ny Jiosy, satria azon’ny fahatahorana an’i Mordekay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa Mordekay dia lehibe tao an-tranon’ny mpanjaka, ary ny lazany niely tany amin’ny isan-tokony eran’ny fanjakana; fa nitombo sy nisandratra ihany io lehilahy Mordekay io.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nasian’ny Jiosy ny fahavalony rehetra ka nokapainy sabatra sy novonoiny ary naringany, fa nahazo nanao araka izay sitraky ny fony tamin’izay nankahala azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tany Sosana renivohitra aza ny Jiosy dia nahavono sy naharingana diman-jato lahy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary Parsandata sy Dalfona sy Aspata '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sy Porata sy Adalia sy Aridata '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'sy Parmasta sy Arisay sy Ariday ary Vaizata, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: izy folo lahy, zanak’i Hamana, zanak’i Hamedota, fahavalon’ny Jiosy, dia novonoiny koa; kanefa ny fananany tsy mba norobainy tsy akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Androtrizay ihany dia nambara tamin’ny mpanjaka ny isan’ny voavono tany Sosana renivohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’i Estera, vadin’ny mpanjaka: Teto Sosana renivohitra aza ny Jiosy efa nahavono sy naharingana diman-jato lahy mbamin’izy folo lahy, zanak’i Hamana; koa nanao ahoana kosa no nataony tamin’ny isan-tokony eran’ny fanjakan’ny mpanjaka! Dia inona koa no angatahinao? Fa hatao izany. Ary inona no mbola tadiavinao? Fa homena izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Estera: Raha sitraky ny mpanjaka, dia aoka ny Jiosy izay eto Sosana havela hanao toy ny natao andro-any ihany koa rahampitso, ary aoka hahantona amin’ny hazo koa izy folo lahy, zanak’i Hamana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nasain’ny mpanjaka natao izany; ary nantsoina tany Sosana ny teny, ka dia nahantona izy folo lahy, zanak’i Hamana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nivory indray ny Jiosy izay tany Sosana tamin’ny andro fahefatra ambin’ny folo tamin’ny volana Adara ka namono olona telon-jato lahy tany Sosana; kanefa ny fananany tsy mba norobainy tsy akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny Jiosy sasany isan-tokony tamin’ny fanjakan’ny mpanjaka dia nivory hiaro ny ainy, ka afaka tamin’ny fahavalony izy, ary dimy arivo amby fito alina no matiny (kanefa ny fananany tsy mba norobainy) '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'tamin’ny andro fahatelo ambin’ny folo tamin’ny volana Adara; ary nitsahatra izy tamin’ny andro fahefatra ambin’ny folo, ka nataony ho andro fanasana sy firavoravoana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ny Jiosy izay tany Sosana kosa nivory tamin’ny andro fahatelo ambin’ny folo tamin’io ihany sy tamin’ny andro fahefatra ambin’ny folo koa; ary nitsahatra tamin’ny andro fahadimy ambin’ny folo izy, ka dia io no nataony andro fanasana sy firavoravoana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa noho izany ny Jiosy tany ambanivohitra, izay nitoetra tamin’ny vohitra madinika, dia nanao ny andro fahefatra ambin’ny folo amin’ny volana Adara ho firavoravoana sy fanasana sy andro mahafaly ary fifanateran-javatra.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanendrena ny andro firavoravoana Porima, sy ny fahalehibiazan’i Mordekay.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ARY Mordekay nanoratra ny amin’izany zavatra izany sady nampitondra taratasy ho any amin’ny Jiosy rehetra izay tany amin’ny isan-tokony eran’ny fanjakan’i Ahasoerosy mpanjaka, na ny akaiky na ny lavitra, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'mba hampitandrina azy ny andro fahefatra ambin’ny folo sy ny fahadimy ambin’ny folo amin’ny volana Adara isan-taona,– '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: dia araka ny andro nahafahan’ny Jiosy tamin’ny fahavalony, sy ny volana izay nampodiana ny alahelony ho fifaliana ary ny fitomaniany ho andro mahafaly, mba hatao ho andro fanasana sy fifaliana sy fifanateran-javatra ary fanomezan-javatra ho an’ny mahantra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny Jiosy nanaiky hanao araka izay vao nataony, dia araka izay efa nosoratan’i Mordekay taminy, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'satria Hamana, zanak’i Hamedota Agagita, fahavalon’ny Jiosy rehetra, efa nihevitra handringana ny Jiosy ka efa nanao pora (filokana izany) handreseny sy handringanany azy; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa raha nankeo anatrehan’ny mpanjaka izany, dia nampanoratra taratasy handidy mba hatsingerina ho eo amin’ny lohany ihany ny hevi-dratsy nokasain’i Hamana hatao amin’ny Jiosy, ary mba hahantona amin’ny hazo izy sy ny zanani-lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izany no nanaovana ireo andro ireo hoe Porima, dia araka ny anarana hoe Pora.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pora = Filokana.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary araka ny teny rehetra tamin’izany taratasy izany sy izay hitany ny amin’izany zavatra efa nanjo azy izany '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'dia nanao lalàna tsy azo ovana ny Jiosy ka nanaiky fa izy sy ny taranany ary izay rehetra miray aminy dia hitandrina izany andro roa izany araka ny voasoratra sy araka ny fotoany isan-taona; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ary mba hotsarovana sy hotandremana ireo andro ireo amin’ny taranany rehetra sy ny fokony rehetra sy ny isan-tokony eran’ny fanjakana rehetra sy amin’ny isan-tanàna; ary mba tsy ho tapaka amin’ny Jiosy ireo andro Porima ireo, ka tsy hitsahatra ny fahatsiarovana izany amin’ny taranany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Estera, vadin’ny mpanjaka, sady zanakavavin’i Abihaila sy Mordekay Jiosy, dia nanoratra tamin’ny fahefana rehetra hanamafy izany taratasy faharoa milaza ny Porima izany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary nampitondra taratasy ho any amin’ny Jiosy rehetra izy, dia ho any amin’ny toko fito amby roa-polo amby zato amin’ny fanjakan’i Ahasoerosy, manao teny fiadanana sy fahamarinana, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'mba hampitandrina azy ireo andro Porima ireo amin’ny fotoany, araka izay nandidian’i Mordekay Jiosy sy Estera, vadin’ny mpanjaka, azy sy araka izay efa nekeny ho an’ny tenany sy ny taranany koa ny amin’ny fifadian-kaniny sy ny fitarainany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ny tenin’i Estera dia nanamafy izany teny milaza ny Porima izany; ary voasoratra tao amin’ny boky izany.
