document_id: JHN.20,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitsanganan’i Jesosy tamin’ny maty, sy ny nisehoany tamin’ny mpianany.
  - type: heading
    content: Mat. 28.1-20; Mar. 16.1-20; Lio. 24.1-53.
  - type: text
    content: 'ARY tamin’ny andro voalohany amin’ny herinandro dia nandeha maraina koa mbola maizimaizina hankany amin’ny fasana Maria Magdalena ka nahita ny vato voaisotra tamin’ny fasana. '
  '10':
  - type: text
    content: Dia lasa indray ny mpianatra nody tany aminy.
  '11':
  - type: text
    content: 'Fa Maria nijanona nitomany teo ivelan’ny fasana; ary raha nitomany izy, dia niondrika nitsirika ny tao am-pasana '
  '12':
  - type: text
    content: 'ka nahita anjely roa nitafy lamba fotsy nipetraka teo, ny anankiray teo an-doha tamin’ilay nandrian’ny fatin’i Jesosy. ary ny anankiray teo an-tongotra. '
  '13':
  - type: text
    content: 'Ary hoy ireo taminy: Ravehivavy, nahoana hianao no mitomany? Dia hoy izy taminy: Satria nalain’olona ny Tompoko, ka tsy fantatro izay nametrahany Azy. '
  '14':
  - type: text
    content: 'Rehefa nilaza izany izy, dia nitodika ka nahita an’i Jesosy nitsangana teo, nefa tsy fantany ho Jesosy. '
  '15':
  - type: text
    content: 'Hoy Jesosy taminy: Ravehivavy, nahoana hianao no mitomany? iza no tadiavinao? Nataony fa mpiandry saha Izy, ka hoy izy taminy: Tompoko, raha Hianao no naka Azy teto, lazao amiko izay nametrahanao Azy, ary izaho dia haka Azy. '
  '16':
  - type: text
    content: 'Hoy Jesosy taminy: Ry Maria! Dia nitodika izy ka niteny taminy nanao teny Hebreo hoe: Rabôny! izany hoe: Mpampianatra ô. '
  '17':
  - type: text
    content: 'Hoy Jesosy taminy: Aza manendry Ahy; fa tsy mbola niakatra tany amin’ny Ray Aho; fa mandehana mankany amin’ny rahalahiko, ka lazao aminy hoe: Miakatra ho any amin’ny Raiko sy ny Rainareo Aho, ary ho any amin’Andriamanitro sy Andriamanitrareo.'
  '18':
  - type: text
    content: 'Dia tonga Maria Magdalena ka nilaza tamin’ny mpianatra hoe: Efa nahita ny Tompo aho, sady izany teny izany no nolazainy taminy.'
  '19':
  - type: text
    content: 'Ary rehefa harivan’ilay andro voalohany amin’ny herinandro, raha voarindrina ny varavaran’izay niangonan’ny mpianatra, noho ny fahatahorany ny Jiosy, dia tonga Jesosy ka nitsangana teo afovoany, dia nanao taminy hoe: Fiadanana ho anareo. '
  '2':
  - type: text
    content: 'Dia nihazakazaka nankany amin’i Simona Petera sy ilay mpianatra tian’i Jesosy izy ka nanao taminy hoe: Nalain’olona tao am-pasana ny Tompo, ka tsy fantatray izay nametrahany Azy.'
  '20':
  - type: text
    content: Ary rehefa nilaza izany Izy, dia nasehony azy ny tànany sy ny lanivoany. Dia faly ny mpianatra, raha nahita ny Tompo.
  '21':
  - type: text
    content: 'Ary hoy indray Jesosy taminy: Fiadanana ho anareo; tahaka ny nanirahan’ny Ray Ahy no anirahako anareo kosa. '
  '22':
  - type: text
    content: 'Ary rehefa nilaza izany Izy, dia nanisy fofonaina, ka hoy Izy taminy; Raiso ny Fanahy Masina; '
  '23':
  - type: text
    content: na helok’iza na helok’iza no avelanareo, dia voavela izany; ary na an’iza na an’iza kosa no tsy avelanareo, dia tsy voavela izany.
  '24':
  - type: text
    content: 'Fa Tomasy, anankiray tamin’ny roa ambin’ny folo lahy, ilay atao hoe Didymo, dia tsy mba teo aminy raha tonga Jesosy. '
  '25':
  - type: text
    content: 'Dia hoy ny mpianatra sasany taminy: Efa nahita ny Tompo izahay. Fa hoy kosa izy taminy: Raha tsy hitako eo amin’ny tànany ny holatry ny nohomboana, ka ataoko eo amin ny holatry ny nohomboana ny rantsan-tànako, ary ataoko eo amin’ny lanivoany koa ny tànako, dia tsy mba hino aho.'
  '26':
  - type: text
    content: 'Ary nony afaka havaloana, dia tafangona teo indray ny mpianany, ary teo koa Tomasy. Dia tonga Jesosy, rehefa voarindrina ny varavarana, ka nitsangana teo afovoany, dia nanao hoe: Fiadanana ho anareo. '
  '27':
  - type: text
    content: 'Ary hoy Izy tamin’i Tomasy: Atehefo eto ny rantsan’tànanao, ka jereo ny tànako; ary atehefo eto koa ny tànanao, ka ataovy amin’ny lanivoako; ary aza ho isan’izay tsy mino, fa minoa. '
  '28':
  - type: text
    content: 'Dia namaly Tomasy ka nanao taminy hoe: Tompoko sy Andriamanitro! '
  '29':
  - type: text
    content: 'Hoy Jesosy taminy: Satria nahita Ahy hianao, dia nino; sambatra kosa izay tsy nahita, nefa nino.'
  '3':
  - type: text
    content: 'Dia nandeha Petera sy ilay mpianatra anankiray ka nankany amin’ny fasana. '
  '30':
  - type: text
    content: 'Ary nisy famantarana maro hafa koa nataon’i Jesosy teo imason’ny mpianatra, izay tsy voasoratra amin’ity boky ity; '
  '31':
  - type: text
    content: fa voasoratra izao, mba hinoanareo fa Jesosy no Kristy, Zanak’Andriamanitra, ary mba hanananareo fiainana amin’ny anarany, raha mino hianareo.
  '4':
  - type: text
    content: 'Ary niara-nihazakazaka izy roa lahy; ary ilay mpianatra anankiray nihazakazaka nihoatra an’i Petera ka tonga taloha tao amin’ny fasana. '
  '5':
  - type: text
    content: 'Ary nony niondrika nitsirika izy, dia nahita ny lambam-paty nipetraka teo, nefa tsy niditra tao izy. '
  '6':
  - type: text
    content: 'Ary avy koa Simona Petera nanaraka azy, dia niditra tao am-pasana ka nijery ny lambam-paty nipetraka teo, '
  '7':
  - type: text
    content: 'ary ny mosara izay nafehy ny lohany tsy mba nipetraka teo amin’ny lambam-paty, fa voavalona mitokana. '
  '8':
  - type: text
    content: 'Ary tamin’izay dia niditra koa ilay mpianatra anankiray izay tonga taloha teo amin’ny fasana, ary nahita ka nino. '
  '9':
  - type: text
    content: 'Fa tsy mbola fantany ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' fa tsy maintsy hitsangana amin’ny maty Jesosy. '
