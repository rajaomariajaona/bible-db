document_id: PSA.38
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fivavak’izay ory dia ory indrindra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Davida. Ho fampahatsiarovana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, aza ny fahatezeranao no ananaranao ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza ny fahaviniranao no amaizanao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa mitsatoka amiko ny zana-tsipìkanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manindry ahy mafy ny tànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy misy fahasalamana ny nofoko noho ny fahatezeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy tsy marary ny taolako noho ny fahotako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ny heloko efa mihoatra ny lohako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny entana mavesatra izy ka tsy zakako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Maimbo sady mihady ny feriko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahadalako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mitanondrika sy mijoretra indrindra aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misaona mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny vaniako henika ny aretina mahamay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy misy fahasalamana ny nofoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Marikoditra aho sady torovana indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradra aho noho ny fitolokon’ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ry Tompo ô, eo anatrehanao ny faniriako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fisentoako tsy mba miafina aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miemponempona ny foko, lany ny heriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahiratan’ny masoko aza efa nandao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny olo-malalako sy ny sakaizako aza efa manalavitra ny fahoriako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny havako mijanona eny lavitra eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mamela-pandrika izay mitady ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mitady hanimba ahy miteny fandozana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy misaim-pitaka mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa izaho dia tahaka ny marenina ka tsy mandre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny moana ka tsy mahaloa-bava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Eny, dia tahaka ny olona tsy mandre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy misy teny havaly eo am-bavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa Hianao no antenaiko, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao no hamaly, ry Tompo Andriamanitro ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy izaho: Sao dia hifalian’izy ireo anie aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha mibolasitra ny tongotro, dia hirehareha amiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa efa ho lavo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fanaintainako dia tsaroako mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa ny heloko no hambarako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matahotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Malahelo.
    marker-yv: yv-n
  - type: text
    text: ' aho noho ny fahotako.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa ny fahavaloko velona ihany sady mahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maro no mandrafy ahy tsy ahoan-tsy ahoana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary mamaly ratsy ny soa izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mandrafy ahy ho valin’ny fanarahako ny tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aza mahafoy ahy, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Andriamanitro ô, aza manalavitra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Faingàna hamonjy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Tompo, Mpamonjy ahy, ô.
