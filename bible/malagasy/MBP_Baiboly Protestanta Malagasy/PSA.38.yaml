document_id: PSA.38,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavak’izay ory dia ory indrindra.
  - type: text
    content: Salamo nataon’i Davida. Ho fampahatsiarovana.
  - type: text
    content: JEHOVAH ô, aza ny fahatezeranao no ananaranao ahy;
  - type: text
    content: Ary aza ny fahaviniranao no amaizanao ahy.
  '10':
  - type: text
    content: Miemponempona ny foko, lany ny heriko;
  - type: text
    content: Ary ny fahiratan’ny masoko aza efa nandao ahy.
  '11':
  - type: text
    content: Ny olo-malalako sy ny sakaizako aza efa manalavitra ny fahoriako;
  - type: text
    content: Ary ny havako mijanona eny lavitra eny.
  '12':
  - type: text
    content: Mamela-pandrika izay mitady ny aiko;
  - type: text
    content: Ary izay mitady hanimba ahy miteny fandozana
  - type: text
    content: Sy misaim-pitaka mandrakariva.
  '13':
  - type: text
    content: Fa izaho dia tahaka ny marenina ka tsy mandre,
  - type: text
    content: Ary tahaka ny moana ka tsy mahaloa-bava;
  '14':
  - type: text
    content: Eny, dia tahaka ny olona tsy mandre,
  - type: text
    content: Sady tsy misy teny havaly eo am-bavany.
  '15':
  - type: text
    content: Fa Hianao no antenaiko, Jehovah ô;
  - type: text
    content: Hianao no hamaly, ry Tompo Andriamanitro ô.
  '16':
  - type: text
    content: 'Fa hoy izaho: Sao dia hifalian’izy ireo anie aho;'
  - type: text
    content: Ary raha mibolasitra ny tongotro, dia hirehareha amiko izy.
  '17':
  - type: text
    content: Fa efa ho lavo aho,
  - type: text
    content: Ary ny fanaintainako dia tsaroako mandrakariva.
  '18':
  - type: text
    content: Fa ny heloko no hambarako;
  - type: text
    content: Matahotra
  - type: note
    content: 'Na: Malahelo.'
  - type: text
    content: ' aho noho ny fahotako.'
  '19':
  - type: text
    content: Fa ny fahavaloko velona ihany sady mahery;
  - type: text
    content: Ary maro no mandrafy ahy tsy ahoan-tsy ahoana;
  '2':
  - type: text
    content: Fa mitsatoka amiko ny zana-tsipìkanao,
  - type: text
    content: Ary manindry ahy mafy ny tànanao.
  '20':
  - type: text
    content: Ary mamaly ratsy ny soa izy ireo
  - type: text
    content: Ka mandrafy ahy ho valin’ny fanarahako ny tsara.
  '21':
  - type: text
    content: Aza mahafoy ahy, Jehovah ô;
  - type: text
    content: Ry Andriamanitro ô, aza manalavitra ahy.
  '22':
  - type: text
    content: Faingàna hamonjy ahy,
  - type: text
    content: Ry Tompo, Mpamonjy ahy, ô.
  '3':
  - type: text
    content: Tsy misy fahasalamana ny nofoko noho ny fahatezeranao;
  - type: text
    content: Tsy misy tsy marary ny taolako noho ny fahotako.
  '4':
  - type: text
    content: Fa ny heloko efa mihoatra ny lohako;
  - type: text
    content: Tahaka ny entana mavesatra izy ka tsy zakako.
  '5':
  - type: text
    content: Maimbo sady mihady ny feriko
  - type: text
    content: Noho ny fahadalako.
  '6':
  - type: text
    content: Mitanondrika sy mijoretra indrindra aho
  - type: text
    content: Ary misaona mandrakariva.
  '7':
  - type: text
    content: Ary ny vaniako henika ny aretina mahamay,
  - type: text
    content: Ka tsy misy fahasalamana ny nofoko.
  '8':
  - type: text
    content: Marikoditra aho sady torovana indrindra
  - type: text
    content: Midradradradra aho noho ny fitolokon’ny foko.
  '9':
  - type: text
    content: Ry Tompo ô, eo anatrehanao ny faniriako rehetra;
  - type: text
    content: Ary ny fisentoako tsy mba miafina aminao.
