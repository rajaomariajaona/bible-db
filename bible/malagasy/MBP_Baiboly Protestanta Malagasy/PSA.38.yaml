document_id: PSA.38,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fivavak’izay ory dia ory indrindra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salamo nataon’i Davida. Ho fampahatsiarovana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, aza ny fahatezeranao no ananaranao ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza ny fahaviniranao no amaizanao ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miemponempona ny foko, lany ny heriko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahiratan’ny masoko aza efa nandao ahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-malalako sy ny sakaizako aza efa manalavitra ny fahoriako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny havako mijanona eny lavitra eny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamela-pandrika izay mitady ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay mitady hanimba ahy miteny fandozana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy misaim-pitaka mandrakariva.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho dia tahaka ny marenina ka tsy mandre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny moana ka tsy mahaloa-bava;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, dia tahaka ny olona tsy mandre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy misy teny havaly eo am-bavany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no antenaiko, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no hamaly, ry Tompo Andriamanitro ô.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy izaho: Sao dia hifalian’izy ireo anie aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha mibolasitra ny tongotro, dia hirehareha amiko izy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa ho lavo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanaintainako dia tsaroako mandrakariva.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny heloko no hambarako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matahotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Malahelo.
      marker-yv: yv-n
    - type: text
      text: ' aho noho ny fahotako.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahavaloko velona ihany sady mahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary maro no mandrafy ahy tsy ahoan-tsy ahoana;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mitsatoka amiko ny zana-tsipìkanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manindry ahy mafy ny tànanao.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamaly ratsy ny soa izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandrafy ahy ho valin’ny fanarahako ny tsara.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mahafoy ahy, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Andriamanitro ô, aza manalavitra ahy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faingàna hamonjy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Tompo, Mpamonjy ahy, ô.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fahasalamana ny nofoko noho ny fahatezeranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy tsy marary ny taolako noho ny fahotako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny heloko efa mihoatra ny lohako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny entana mavesatra izy ka tsy zakako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maimbo sady mihady ny feriko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahadalako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitanondrika sy mijoretra indrindra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary misaona mandrakariva.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vaniako henika ny aretina mahamay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy fahasalamana ny nofoko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marikoditra aho sady torovana indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midradradradra aho noho ny fitolokon’ny foko.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Tompo ô, eo anatrehanao ny faniriako rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fisentoako tsy mba miafina aminao.
