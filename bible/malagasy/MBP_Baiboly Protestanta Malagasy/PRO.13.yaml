document_id: PRO.13,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ny zanaka hendry '
  - type: text
    content: mihaino
  - type: text
    content: ' ny fananaran-drainy;'
  - type: text
    content: Fa ny mpaniratsira tsy mety mihaino, na dia anarina mafy aza.
  '10':
  - type: text
    content: Fifandirana ihany no vokatry ny fiavonavonana;
  - type: text
    content: Fa ao amin’ny mino anatra no misy fahendrena.
  '11':
  - type: text
    content: Ny harena azoazo foana dia mihena làlandava;
  - type: text
    content: Fa izay mahavatra mitsimpona no mampitombo.
  '12':
  - type: text
    content: Ny fanantenana tsy azo vetivety dia mankarary am-bavafo;
  - type: text
    content: Fa hazon’aina ny faniriana tanteraka.
  '13':
  - type: text
    content: Izay manamavo ny teny ho voasingony;
  - type: note
    content: 'Na: mahavery tena.'
  - type: text
    content: Fa izay matahotra ny didy no hahazo valim-pitia.
  '14':
  - type: text
    content: Ny fampianaran’ny hendry dia loharanon’aina
  - type: text
    content: Ka mampivily tsy ho ao amin’ny fandriky ny fahafatesana.
  '15':
  - type: text
    content: Ny fahendrena tsara dia ahazoam-pitia;
  - type: text
    content: Fa sarotra ny làlan’ny mpivadika.
  '16':
  - type: text
    content: Ny mahira-tsaina, rehetra miasa amin’ny fahalalana;
  - type: text
    content: Fa ny adala kosa mampiseho hadalana.
  '17':
  - type: text
    content: Ny iraka ratsy fanahy idiran-doza;
  - type: text
    content: Fa ny iraka mahatoky dia famelombelomana.
  - type: note
    content: 'Na: fanasitranana.'
  '18':
  - type: text
    content: Fahalahelovana sy henatra no ho an’izay mandà famaizana;
  - type: text
    content: Fa izay manaiky anatra no homem-boninahitra.
  '19':
  - type: text
    content: Mamin’ny fo ny faniriana tanteraka;
  - type: note
    content: 'Na: efa mitranga.'
  - type: text
    content: Fa fahavetavetana eo imason’ny adala ny hiala amin’ny ratsy.
  '2':
  - type: text
    content: Ny vokatry ny vavan’ny olona no ahazoany soa;
  - type: text
    content: Fa ny hampidi-doza no mahafaly ny mpivadika.
  '20':
  - type: text
    content: Izay miara-dia amin’ny hendry dia ho hendry;
  - type: text
    content: Fa izay misakaiza amin’ny adala dia hidiran-doza.
  - type: note
    content: 'Na: ho ratsy.'
  '21':
  - type: text
    content: 'Ny mpanota dia enjehin’ny loza:'
  - type: text
    content: Fa hovalian-tsoa ny marina.
  '22':
  - type: text
    content: Ny tsara fanahy mahenina lova ny zafiny;
  - type: text
    content: Fa ny haren’ny mpanota kosa voatahiry ho an’ny marina.
  '23':
  - type: text
    content: Ny tanin’ny malahelo izay voasa dia ahazoana hanina be;
  - type: text
    content: Fa maro no ringana noho ny fanaovany izay tsy rariny.
  '24':
  - type: text
    content: Izay mitsitsy ny tsorakazony dia tsy tia ny zanany;
  - type: text
    content: Fa izay tia zanaka dia manafay azy, raha mbola kely.
  '25':
  - type: text
    content: Ny marina mihinana ka voky tsara;
  - type: text
    content: Fa noana ny kibon’ny ratsy fanahy.
  '3':
  - type: text
    content: Izay mahambim-bava no miaro ny ainy;
  - type: note
    content: 'Na: ny fanahiny.'
  - type: text
    content: Fa izay vavana dia haringana.
  '4':
  - type: text
    content: Ny fanahin’ny kamo maniry, fa tsy mba mahazo;
  - type: text
    content: Fa ny fanahin’ny mazoto hohatavezina.
  '5':
  - type: text
    content: Ny lainga dia halan’ny marina;
  - type: text
    content: Fa ny ratsy fanahy manao izay maharikoriko sy mahamenatra.
  '6':
  - type: text
    content: Ny fahamarinana miaro izay mandeha tsy misy tsiny;
  - type: text
    content: Fa ny haratsiana mamotraka ny mpanota.
  '7':
  - type: text
    content: Misy mihambo ho manan-karena, nefa tsy manana na inona na inona;
  - type: text
    content: Misy kosa mody malahelo, nefa manana harena be.
  '8':
  - type: text
    content: Ny haren’ny olona dia avotry ny ainy;
  - type: text
    content: Fa ny levilevy tsy mampiraika ny malahelo akory.
  '9':
  - type: text
    content: Ny fahazavan’ny marina dia tsara firehitra;
  - type: note
    content: Heb. mifaly.
  - type: text
    content: Fa ny jiron’ny ratsy fanahy ho faty.
