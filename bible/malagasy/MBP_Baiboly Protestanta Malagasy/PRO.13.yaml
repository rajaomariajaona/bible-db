document_id: PRO.13
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny zanaka hendry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mihaino
  - type: text
    text: ' ny fananaran-drainy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny mpaniratsira tsy mety mihaino, na dia anarina mafy aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny vokatry ny vavan’ny olona no ahazoany soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny hampidi-doza no mahafaly ny mpivadika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay mahambim-bava no miaro ny ainy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny fanahiny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay vavana dia haringana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fanahin’ny kamo maniry, fa tsy mba mahazo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fanahin’ny mazoto hohatavezina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny lainga dia halan’ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny ratsy fanahy manao izay maharikoriko sy mahamenatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahamarinana miaro izay mandeha tsy misy tsiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny haratsiana mamotraka ny mpanota.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Misy mihambo ho manan-karena, nefa tsy manana na inona na inona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy kosa mody malahelo, nefa manana harena be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny haren’ny olona dia avotry ny ainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny levilevy tsy mampiraika ny malahelo akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fahazavan’ny marina dia tsara firehitra;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mifaly.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny jiron’ny ratsy fanahy ho faty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fifandirana ihany no vokatry ny fiavonavonana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ao amin’ny mino anatra no misy fahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny harena azoazo foana dia mihena làlandava;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mahavatra mitsimpona no mampitombo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fanantenana tsy azo vetivety dia mankarary am-bavafo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hazon’aina ny faniriana tanteraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay manamavo ny teny ho voasingony;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mahavery tena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay matahotra ny didy no hahazo valim-pitia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fampianaran’ny hendry dia loharanon’aina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mampivily tsy ho ao amin’ny fandriky ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny fahendrena tsara dia ahazoam-pitia;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa sarotra ny làlan’ny mpivadika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny mahira-tsaina, rehetra miasa amin’ny fahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny adala kosa mampiseho hadalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny iraka ratsy fanahy idiran-doza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny iraka mahatoky dia famelombelomana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanasitranana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fahalahelovana sy henatra no ho an’izay mandà famaizana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay manaiky anatra no homem-boninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mamin’ny fo ny faniriana tanteraka;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efa mitranga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fahavetavetana eo imason’ny adala ny hiala amin’ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay miara-dia amin’ny hendry dia ho hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay misakaiza amin’ny adala dia hidiran-doza.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho ratsy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny mpanota dia enjehin’ny loza:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hovalian-tsoa ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny tsara fanahy mahenina lova ny zafiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny haren’ny mpanota kosa voatahiry ho an’ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny tanin’ny malahelo izay voasa dia ahazoana hanina be;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa maro no ringana noho ny fanaovany izay tsy rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay mitsitsy ny tsorakazony dia tsy tia ny zanany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay tia zanaka dia manafay azy, raha mbola kely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny marina mihinana ka voky tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa noana ny kibon’ny ratsy fanahy.
