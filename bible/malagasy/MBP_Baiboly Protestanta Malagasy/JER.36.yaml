document_id: JER.36,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanoratana ny tenin’i Jeremia, sy ny namakiana azy teo an-kianjan’ny tempoly.
  - type: text
    content: 'ARY tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, dia tonga tamin’i Jeremia avy tamin’i Jehovah izao teny izao hoe: '
  '10':
  - type: text
    content: Dia novakin’i Baroka teo anatrehan’ny vahoaka rehetra tao an-tranon’i Jehovah ny tenin’i Jeremia tamin’ny taratasy, dia tao amin’ny efi-tranon’i Gemaria, zanak’i Safana mpanoratra, teo amin’ny kianja ambony, teo anoloan’ny vavahady vaovao amin’ny tranon’i Jehovah.
  '11':
  - type: text
    content: 'Ary nony ren’i Mikaia, zanak’i Gemaria, zanak’i Safana, ny tenin’i Jehovah rehetra tamin’ny boky, '
  '12':
  - type: text
    content: 'dia nidina nankany amin’ny tranon’ny mpanjaka izy ka nankao amin’ny efi-tranon’ny mpanoratra; ary indreo ny mpanapaka rehetra nipetraka teo, dia Elisama mpanoratra sy Delaia, zanak’i Semaia, sy Elnatana, zanak’i Akbora, sy Gemaria, zanak’i Safana, sy Zedekia, zanak’i Hanania, mbamin’ny mpanapaka rehetra. '
  '13':
  - type: text
    content: Dia nambaran’i Mikaia azy ny teny rehetra izay efa reny tamin’ny namakian’i Baroka ny taratasy teo anatrehan’ny vahoaka.
  '14':
  - type: text
    content: 'Dia nirahin’ny mpanapaka rehetra Jehody, zanak’i Netania, zanak’i Selemia, zanak’i Kosy, ho any amin’i Baroka hanao hoe: Ento eny an-tànanao ny horonan-taratasy, ilay novakinao teo anatrehan’ny vahoaka, ka mankanesa atỳ. Dia nentin’i Baroka, zanak’i Neria, teny an-tànany ny horonan-taratasy, ka dia nankany aminy izy. '
  '15':
  - type: text
    content: 'Ary hoy izy ireo taminy: Mipetraha ary, ka vakio eto anatrehanay. Dia novakin’i Baroka teo anatrehany.'
  '16':
  - type: text
    content: 'Ary rehefa reny ny teny rehetra, dia nifampijerijery tamin-tahotra izy, ka hoy izy tamin’i Baroka: Tsy maintsy holazainay amin’ny mpanjaka izany teny rehetra izany. '
  '17':
  - type: text
    content: 'Ary Baroka dia nadininy hoe: Lazao aminay ny nanoratanao izao teny rehetra izao avy tamin’ny vavany. '
  '18':
  - type: text
    content: 'Dia hoy Baroka taminy: Ny vavany no nanonona izany teny rehetra izany tamiko, ka dia nosoratako an-taratasy tamin’ny ranomainty. '
  '19':
  - type: text
    content: 'Dia hoy ny mpanapaka tamin’i Baroka: Mandehana, ka miere hianao sy Jeremia, ary aoka tsy hisy olona hahita izay itoeranareo.'
  '2':
  - type: text
    content: 'Makà horonan-taratasy hianao, ka soraty amin’izany ny teny rehetra izay nolazaiko taminao ny amin’ny Isiraely sy ny Joda ary ny firenena rehetra hatramin’ny andro nilazako taminao, dia hatramin’ny andron’i Josia ka mandraka androany. '
  '20':
  - type: text
    content: 'Dia niditra tao amin’ny mpanjaka tao amin’ny kianja izy ireo (nefa ny horonan-taratasy efa napetrany tao amin’ny efi-tranon’i Elisama mpanoratra), ary nambarany teo anatrehan’ny mpanjaka ny teny rehetra. '
  '21':
  - type: text
    content: 'Ary nirahin’ny mpanjaka Jehody haka ilay horonan-taratasy, dia nalainy tao amin’ny efi-tranon’i Elisama mpanoratra iny. Ary dia novakin’i Jehody teo anatrehan’ny mpanjaka sy ny mpanapaka rehetra izay nitsangana teo anatrehan’ny mpanjaka izany. '
  '22':
  - type: text
    content: 'Ary ny mpanjaka nipetraka tao an-trano ririnina tamin’ny volana fahasivy, sady nisy afo nirehitra teo am-patana teo anoloany. '
  '23':
  - type: text
    content: Ary nony efa namaky toko telo na efatra Jehody, dia notapatapahin’
  - type: text
    content: ny mpanjaka
  - type: text
    content: ' tamin’ny antsipìka ny horonan-taratasy ka natsipitsipiny teo anaty afo teo am-patana, mandra-pahalevon’ny afo azy rehetra teo am-patana.'
  '24':
  - type: text
    content: 'Nefa tsy natahotra akory ireo na nandriatra ny fitafiany, na ny mpanjaka, na ny mpanompony rehetra, izay efa nandre izany teny rehetra izany. '
  '25':
  - type: text
    content: 'Ary na dia efa nifona tamin’ny mpanjaka aza Elnatana sy Delaia ary Gemaria, mba tsy handoro ny horonan-taratasy, dia tsy nety nihaino azy izy. '
  '26':
  - type: text
    content: Ary ny mpanjaka nandidy an’i Jeremela, zanak’andriana, sy Seraia, zanak’i Azriela, ary Selemia, zanak’i Abdela, hisambotra an’i Baroka mpanoratra sy Jeremia mpaminany; fa nafenin’i Jehovah izy roa lahy.
  '27':
  - type: text
    content: 'Dia tonga tamin’i Jeremia ny tenin’i Jehovah, taorian’ny nandoroan’ny mpanjaka ny horonan-taratasy sy ny teny izay nosoratan’i Baroka avy tamin’ny vavan’i Jeremia, nanao hoe: '
  '28':
  - type: text
    content: 'Makà horonan-taratasy hafa koa indray hianao, ka soraty aminy ilay teny rehetra tamin’ny horonan-taratasy teo, dia ilay nodoran’i Joiakima, mpanjakan’ny Joda. '
  '29':
  - type: text
    content: 'Ary ny amin’i Joiakima, mpanjakan’ny Joda, dia holazainao hoe: Izao no lazain’i Jehovah: Hianao efa nandoro iny horonan-taratasy iny ka nanao hoe: Ahoana no nanoratanao tamin’iny hoe: Ho avy tokoa ny mpanjakan’i Babylona ka handrava ity tany ity sy hahalany ritra ny olona mbamin’ny biby eto? '
  '3':
  - type: text
    content: Angamba hoheverin’
  - type: note
    content: Heb. hohenoin’.
  - type: text
    content: ' ny taranak’i Joda ny loza rehetra izay kasaiko hatao aminy, dia samy hiala amin’ny làlany ratsy avy izy, ka havelako ny helony sy ny fahotany.'
  '30':
  - type: text
    content: 'Koa izao no lazain’i Jehovah ny amin’i Joiakima, mpanjakan’ny Joda: Tsy hanana fara handimby eo amin’ny seza fiandrianan’i Davida izy; ary ny fatiny dia hariana ka hasian’ny hainandro amin’ny antoandro ary ny fanala amin’ny alina. '
  '31':
  - type: text
    content: Ary hampijaliko izy mbamin’ny taranany sy ny mpanompony noho ny helony; ary hataoko mihatra aminy sy amin’ny mponina any Jerosalema ary amin’ny lehilahy amin’ny Joda ny loza rehetra izay nolazaiko hatao aminy, fa tsy nohenoiny.
  '32':
  - type: text
    content: Ary Jeremia dia naka horonan-taratasy hafa koa, ka natolony an’i Baroka mpanoratra, zanak’i Neria, ary izy nanoratra tao avy tamin’ny vavan’i Jeremia ny teny rehetra izay tao amin’ilay horonan-taratasy nodoran’i Joiakima, mpanjakan’ny Joda, tamin’ny afo; sady nampiany teny maro tahaka ireny koa aza.
  '4':
  - type: text
    content: Ary Jeremia niantso an’i Baroka, zanak’i Neria; ary dia nosoratan’i Baroka tamin’ny horonan-taratasy ny tenin’i Jehovah rehetra avy tamin’ny vavan’i Jeremia, dia izay efa nolazainy taminy.
  '5':
  - type: text
    content: 'Ary Jeremia nandidy an’i Baroka hoe: Izaho izao dia voahazona ka tsy afaka mankany an-tranon’i Jehovah; '
  '6':
  - type: text
    content: 'fa mandehana hianao, ka vakio eo anatrehan’ny vahoaka ao an-tranon’i Jehovah amin’ny andro fifadian-kanina ny tenin’i Jehovah, izay efa nosoratanao avy tamin’ny vavako; ary vakio eo anatrehan’ny Joda rehetra izay tonga avy any amin’ny tanànany koa. '
  '7':
  - type: text
    content: Fa angamba ny fifonany hoborahina
  - type: note
    content: Heb. hiankohoka.
  - type: text
    content: ' eo anatrehan’i Jehovah, ka dia samy hiala amin’ny làlany ratsy avy izy; fa loza ny fahatezerana sy ny fahavinirana izay nolazain’i Jehovah ny amin’ity firenena ity.'
  '8':
  - type: text
    content: Ary Baroka, zanak’i Neria, dia nanao araka izay rehetra nandidian’i Jeremia mpaminany azy ka namaky ny tenin’i Jehovah tamin’ny taratasy teo an-tranon’i Jehovah.
  '9':
  - type: text
    content: 'Fa tamin’ny volana fahasivy tamin’ny taona fahadimy manjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, dia niantso fifadian-kanina teo anatrehan’i Jehovah izy tamin’ny vahoaka rehetra tany Jerosalema sy tamin’ny olona rehetra izay efa tonga tany Jerosalema avy eny amin’ny tanànan’ny Joda. '
