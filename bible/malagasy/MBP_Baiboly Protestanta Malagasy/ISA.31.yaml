document_id: ISA.31,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampijaliana ny Isiraely noho ny niankinany tamin’i Egypta, sy ny hiarovan’Andriamanitra izay mibebaka, ary ny hanendreny mpanjaka izay hitondra azy amin’ny fahamarinana.
  - type: text
    content: LOZAN’izay midina any Egypta hitady famonjena
  - type: text
    content: Sy miantehitra amin’ny soavaly
  - type: text
    content: Ary matoky ny kalesy, satria maro ireny,
  - type: text
    content: Sy ny mpitaingin-tsoavaly, satria mahery dia mahery ireny,
  - type: text
    content: Fa tsy manandrandra ny Iray Masin’ny Isiraely,
  - type: text
    content: Na mitady an’i Jehovah.
  '2':
  - type: text
    content: Nefa Izy koa dia hendry ka mahatonga loza,
  - type: text
    content: Ary tsy tsoahany ny teniny;
  - type: text
    content: Fa mitsangana Izy hamely ny mpianakavin’ny mpanao ratsy
  - type: text
    content: Sy izay manampy ny mpanao meloka.
  '3':
  - type: text
    content: Fa olona ihany ny Egyptiana, fa tsy Andriamanitra;
  - type: text
    content: Ary nofo ihany ny soavaliny, fa tsy fanahy.
  - type: text
    content: Koa raha ahinjitr’i Jehovah ny tànany,
  - type: text
    content: Dia ho tafintohina izay manampy, ary ho potraka izay ampiana,
  - type: text
    content: Ka samy ho levona avokoa izy roa tonta.
  '4':
  - type: text
    content: 'Fa izao no nolazain’i Jehovah tamiko:'
  - type: text
    content: Tahaka ny fieron’ny liona sy ny liona tanora eo amin’ny rembiny,
  - type: text
    content: Ka na dia voangona aza ny mpiandry ondry betsaka hamely azy,
  - type: text
    content: Tsy matahotra ny feon’ireo izy,
  - type: text
    content: Na mandatsa-dremby noho ny fihorakorahany,–
  - type: text
    content: Dia tahaka izany no hidinan’i Jehovah, Tompon’ny maro,
  - type: text
    content: Hiady ao an-tendrombohitra
  - type: note
    content: 'Na: hamely ny tendrombohitra.'
  - type: text
    content: ' Ziona sy ny havoany.'
  '5':
  - type: text
    content: Tahaka ny vorona manomba no hiarovan’i Jehovah, Tompon’ny maro, an’i Jerosalema,
  - type: text
    content: Fa sady hiaro no hamonjy Izy,
  - type: text
    content: Eny, sady hiantra
  - type: note
    content: Heb. handalo; izahao Eks. xii.13.
  - type: text
    content: ' no hanafaka.'
  '6':
  - type: text
    content: Koa miverena ho amin’Izay efa niodinanareo fatratra,
  - type: text
    content: Ry Zanak’Isiraely ô.
  '7':
  - type: text
    content: Fa amin’izany andro izany dia harian’ny olona rehetra
  - type: text
    content: Ny andriamani-bolafotsiny
  - type: note
    content: Heb. andriamani-tsi-izy.
  - type: text
    content: ' sy ny andriamani-bolamenany,'
  - type: note
    content: Heb. andriamani-tsi-izy.
  - type: text
    content: Izay fahotana nataon’ny tànanareo.
  '8':
  - type: text
    content: Ary ny Asyriana ho lavon’ny sabatra izay tsy mba an’olombelona,
  - type: text
    content: Eny, sabatra izay tsy mba an’olombelona no handringanana azy;
  - type: text
    content: Dia handositra ny sabatra izy,
  - type: text
    content: Ary ny zatovony hampanaovina fanompoana,
  '9':
  - type: text
    content: Ary ny mpanjakany
  - type: note
    content: 'Na: harambatony.'
  - type: text
    content: ' ho lasa noho ny fahatahorana,'
  - type: text
    content: Ary ny mpanapaka azy hivadi-po noho ny faneva,
  - type: text
    content: Hoy Jehovah, Izay manana ny afony ao Ziona
  - type: text
    content: Sy ny fatany fandoroana ao Jerosalema.
