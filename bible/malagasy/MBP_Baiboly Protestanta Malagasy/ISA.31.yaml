document_id: ISA.31,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hampijaliana ny Isiraely noho ny niankinany tamin’i Egypta, sy ny hiarovan’Andriamanitra izay mibebaka, ary ny hanendreny mpanjaka izay hitondra azy amin’ny fahamarinana.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: LOZAN’izay midina any Egypta hitady famonjena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy miantehitra amin’ny soavaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary matoky ny kalesy, satria maro ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny mpitaingin-tsoavaly, satria mahery dia mahery ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy manandrandra ny Iray Masin’ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mitady an’i Jehovah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nefa Izy koa dia hendry ka mahatonga loza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy tsoahany ny teniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mitsangana Izy hamely ny mpianakavin’ny mpanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy izay manampy ny mpanao meloka.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa olona ihany ny Egyptiana, fa tsy Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nofo ihany ny soavaliny, fa tsy fanahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa raha ahinjitr’i Jehovah ny tànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tafintohina izay manampy, ary ho potraka izay ampiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka samy ho levona avokoa izy roa tonta.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa izao no nolazain’i Jehovah tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fieron’ny liona sy ny liona tanora eo amin’ny rembiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka na dia voangona aza ny mpiandry ondry betsaka hamely azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy matahotra ny feon’ireo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mandatsa-dremby noho ny fihorakorahany,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka izany no hidinan’i Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiady ao an-tendrombohitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamely ny tendrombohitra.
      marker-yv: yv-n
    - type: text
      text: ' Ziona sy ny havoany.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tahaka ny vorona manomba no hiarovan’i Jehovah, Tompon’ny maro, an’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa sady hiaro no hamonjy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, sady hiantra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'handalo; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Eks. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xii.13.
      marker-yv: yv-n
    - type: text
      text: ' no hanafaka.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Koa miverena ho amin’Izay efa niodinanareo fatratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Zanak’Isiraely ô.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa amin’izany andro izany dia harian’ny olona rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny andriamani-bolafotsiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: andriamani-tsi-izy.
      marker-yv: yv-n
    - type: text
      text: ' sy ny andriamani-bolamenany,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: andriamani-tsi-izy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay fahotana nataon’ny tànanareo.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary ny Asyriana ho lavon’ny sabatra izay tsy mba an’olombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, sabatra izay tsy mba an’olombelona no handringanana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia handositra ny sabatra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zatovony hampanaovina fanompoana,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary ny mpanjakany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: harambatony.
      marker-yv: yv-n
    - type: text
      text: ' ho lasa noho ny fahatahorana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanapaka azy hivadi-po noho ny faneva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah, Izay manana ny afony ao Ziona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fatany fandoroana ao Jerosalema.
