document_id: PSA.99,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fanomezam-boninahitra an’Andriamanitra noho ny fahalehibiazany sy ny fahamarinany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: JEHOVAH no Mpanjaka, aoka hangovitra ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipetraka amin’ny kerobima Izy, aoka hihorohoro ny tany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lehibe any Ziona Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avo ambonin’ny firenena rehetra Izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aoka hidera ny anaranao lehibe sy mahatahotra ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa masina Jehovah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny herin’ny mpanjaka dia tia rariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampitoerinao ny fahitsiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fitsarana sy fahamarinana no ataonao eo amin’i Jakoba.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Manandrata an’i Jehovah Andriamanitsika hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miankohofa eo amin’ny fitoeran-tongony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa masina Izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mosesy sy Arona tamin’ny mpisorony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Samoela tamin’izay mpiantso ny anarany,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niantso an’i Jehovah ireo, ary namaly azy Izy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Niteny taminy tao anatin’ny andri-rahona Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitandrina ny teni-vavolombelony izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny didy izay efa nomeny azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jehovah Andriamanitray ô, Hianao no namaly ny nataony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Mpamela ny helony Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia namaly azy noho ny nataony aza.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Asandrato Jehovah Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miankohofa eo an-tendrombohiny masina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa masina Jehovah Andriamanitsika.
