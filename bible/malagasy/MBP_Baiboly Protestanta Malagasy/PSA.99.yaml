document_id: PSA.99,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanomezam-boninahitra an’Andriamanitra noho ny fahalehibiazany sy ny fahamarinany.
  - type: text
    content: JEHOVAH no Mpanjaka, aoka hangovitra ny firenena;
  - type: text
    content: Mipetraka amin’ny kerobima Izy, aoka hihorohoro ny tany.
  '2':
  - type: text
    content: Lehibe any Ziona Jehovah;
  - type: text
    content: Ary avo ambonin’ny firenena rehetra Izy.
  '3':
  - type: text
    content: Aoka hidera ny anaranao lehibe sy mahatahotra ireo;
  - type: text
    content: Fa masina Jehovah.
  '4':
  - type: text
    content: Ny herin’ny mpanjaka dia tia rariny;
  - type: text
    content: Ampitoerinao ny fahitsiana;
  - type: text
    content: Fitsarana sy fahamarinana no ataonao eo amin’i Jakoba.
  '5':
  - type: text
    content: Manandrata an’i Jehovah Andriamanitsika hianareo,
  - type: text
    content: Ka miankohofa eo amin’ny fitoeran-tongony;
  - type: text
    content: Fa masina Izy.
  '6':
  - type: text
    content: Mosesy sy Arona tamin’ny mpisorony,
  - type: text
    content: Ary Samoela tamin’izay mpiantso ny anarany,–
  - type: text
    content: Niantso an’i Jehovah ireo, ary namaly azy Izy.
  '7':
  - type: text
    content: Niteny taminy tao anatin’ny andri-rahona Izy;
  - type: text
    content: Nitandrina ny teni-vavolombelony izy ireo,
  - type: text
    content: Dia ny didy izay efa nomeny azy.
  '8':
  - type: text
    content: Jehovah Andriamanitray ô, Hianao no namaly ny nataony;
  - type: text
    content: Andriamanitra, Mpamela ny helony Hianao,
  - type: text
    content: Na dia namaly azy noho ny nataony aza.
  '9':
  - type: text
    content: Asandrato Jehovah Andriamanitsika,
  - type: text
    content: Ary miankohofa eo an-tendrombohiny masina;
  - type: text
    content: Fa masina Jehovah Andriamanitsika.
