document_id: PSA.143
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faniriam-pamindrampo noho ny fahoriana mafy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, henoy ny fivavako, ary atongilano amin’ny fifonako ny sofinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Valio aho araka ny teninao marina sy ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary aza dia mifandahatra amin’ny mpanomponao eo am-pitsarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy misy olombelona ho marina eo anatrehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa nanenjika ny fanahiko ny fahavalo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namely ny aiko ho lavo tamin’ny tany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampitoeriny tao amin’ny maizina aho, toy izay efa maty ela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia reraka ny fanahiko ato anatiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fadiranovana ny foko ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mahatsiaro ny andro fahiny aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misaina ny asanao rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny asan’ny tànanao no eritreretiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mananty tànana aminao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanahiko dia tahaka ny tany mangentana eo anatrehanao.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Faingàna hamaly ahy, Jehovah ô, fa reraka ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manafina ny tavanao amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao ho tahaka izay midina any am-pasana aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ampandreneso ny famindramponao aho nony maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no itokiako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampahalalao ahy izay làlana tokony halehako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aminao no ananganako ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehovah ô, vonjeo amin’ny fahavaloko aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao aminao no iereko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ampianaro hanao ny sitraponao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no Andriamanitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny Fanahinao tsara no hitarihanao ahy amin’izay tany marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho ny anaranao, Jehovah ô, velomy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny fahamarinanao avoahy ny fanahiko ho afaka amin’ny fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary araka ny famindramponao fongory ny fahavaloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka aringano izay rehetra mampahory ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mpanomponao aho.
