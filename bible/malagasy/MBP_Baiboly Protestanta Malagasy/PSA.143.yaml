document_id: PSA.143,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faniriam-pamindrampo noho ny fahoriana mafy.
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, henoy ny fivavako, ary atongilano amin’ny fifonako ny sofinao;
  - type: text
    content: Valio aho araka ny teninao marina sy ny fahamarinanao.
  '10':
  - type: text
    content: Ampianaro hanao ny sitraponao aho;
  - type: text
    content: Fa Hianao no Andriamanitro;
  - type: text
    content: Aoka ny Fanahinao tsara no hitarihanao ahy amin’izay tany marina.
  '11':
  - type: text
    content: Noho ny anaranao, Jehovah ô, velomy aho;
  - type: text
    content: Araka ny fahamarinanao avoahy ny fanahiko ho afaka amin’ny fahoriana.
  '12':
  - type: text
    content: Ary araka ny famindramponao fongory ny fahavaloko,
  - type: text
    content: Ka aringano izay rehetra mampahory ny fanahiko;
  - type: text
    content: Fa mpanomponao aho.
  '2':
  - type: text
    content: Ary aza dia mifandahatra amin’ny mpanomponao eo am-pitsarana;
  - type: text
    content: Fa tsy misy olombelona ho marina eo anatrehanao.
  '3':
  - type: text
    content: Fa nanenjika ny fanahiko ny fahavalo;
  - type: text
    content: Namely ny aiko ho lavo tamin’ny tany izy;
  - type: text
    content: Nampitoeriny tao amin’ny maizina aho, toy izay efa maty ela.
  '4':
  - type: text
    content: Dia reraka ny fanahiko ato anatiko;
  - type: text
    content: Fadiranovana ny foko ato anatiko.
  '5':
  - type: text
    content: Mahatsiaro ny andro fahiny aho
  - type: text
    content: Ary misaina ny asanao rehetra;
  - type: text
    content: Ny asan’ny tànanao no eritreretiko.
  '6':
  - type: text
    content: Mananty tànana aminao aho;
  - type: text
    content: Ny fanahiko dia tahaka ny tany mangentana eo anatrehanao.
  - type: text
    content: '[Sela.]'
  '7':
  - type: text
    content: Faingàna hamaly ahy, Jehovah ô, fa reraka ny fanahiko;
  - type: text
    content: Aza manafina ny tavanao amiko,
  - type: text
    content: Fandrao ho tahaka izay midina any am-pasana aho.
  '8':
  - type: text
    content: Ampandreneso ny famindramponao aho nony maraina,
  - type: text
    content: Fa Hianao no itokiako;
  - type: text
    content: Ampahalalao ahy izay làlana tokony halehako,
  - type: text
    content: Fa aminao no ananganako ny fanahiko.
  '9':
  - type: text
    content: Jehovah ô, vonjeo amin’ny fahavaloko aho;
  - type: text
    content: Ao aminao no iereko.
