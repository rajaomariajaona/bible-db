document_id: ECC.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fatin-dalitra mahamaimbo sy mampamorivory ny menaky ny mpangaroharo zava-manitra; ary toy izany, ny fahadalana kely dia mavesatra noho ny fahendrena sy ny voninahitra.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha dombo ny antsy ka tsy asainy, dia tsy maintsy manao an-teninaina izy; fa ny fahendrena no mahasoa, satria mahalavorary ny raharaha izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha manaikitra ny menarana, satria tsy mbola nasiana ody, dia ahoana no mahatsara ny mpanao ody?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soa ny teny aloaky ny vavan’ny hendry; fa ny molotry ny adala kosa mitelina ny tenany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fiandohan’ny teny aloaky ny vavany dia fahadalana, ary ny fiafaran’ny teniny dia fahavezeran-tsaina mampidi-doza. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maro teny ny adala; nefa tsy misy olona mahalala izay ho avy; ary iza no mahalaza aminy ny ho avy any aoriany? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fisasaran’ny adala mahareraka azy, fa ny làlana mankany an-tanàna aza tsy fantany akory.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lozanao, ry tany, raha zaza no mpanjakanao, ary ny lehibenao homa-maraina! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sambatra kosa hianao, ry tany, raha tena karazan’andriana no mpanjakanao, ary ny lehibenao homana amin’izay fotoana mety, mba hampahatanjaka ny tenany, fa tsy ny hampahamamo azy!
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahalainana be no mampianjera ny lohatrano, ary ny hakamoan’ny tànana no mampitete ny trano.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ataony laolao ny hanina, ary ny divay no maharavoravo ny aina, ary ny vola no hahazoana ny zavatra rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fon’ny hendry dia eo ankavanany; fa ny fon’ny adala kosa dia eo ankaviany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manozona ny mpanjaka na dia amin’ny eritreritrao aza; ary aza manozona ny mpanan-karena na dia ao anatin’ny efi-trano fandrianao aza; fa na dia ny voro-manidina aza anie ka hitondra ny feo, ary na dia ny manana elatra dia hanambara ny teny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary koa, raha mandeha eny an-dàlambe ny adala, dia levona ny fahalalany, ka milaza tena amin’ny olona rehetra izy fa adala.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tezeran’ny mpanapaka hianao, aza miala amin’ny fitoeranao; fa ny fahatsindriam-po mahasakana ny fahadisoana lehibe.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misy ratsy efa hitako atỳ ambanin’ny masoandro, ka toa fahadisoana ataon’ny mpanapaka izany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asandratra ho ambony indrindra ny adala, ary ny mpanan-karena mipetraka eo amin’ny toerana ambany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa hitako ny mpanompo mitaingin-tsoavaly, ary ny mpanapaka kosa mandeha an-tongotra toy ny mpanompo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mihady lavaka no ho latsaka ao, ary izay mandrava fefy vato no hokekerin’ny menarana.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manovoka vato dia haratrany, ary izay mamaky hazo no ho voany.
