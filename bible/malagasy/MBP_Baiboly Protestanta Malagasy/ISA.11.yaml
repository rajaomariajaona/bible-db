document_id: ISA.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny famonjena hataon’Ilay Solofon’i Davida, sy ny hira fiderana hatao amin’izany.
  - type: text
    content: ARY hisy Solofo mitsimoka eo amin’ny fototr’i Jese,
  - type: text
    content: Ary hisy mitrebona avy eo amin’ny fàkany;
  '10':
  - type: text
    content: Ary amin’izany andro izany ny Solofon’i Jese,
  - type: text
    content: Izay hitsangana ho fanevan’ny firenena,
  - type: text
    content: Dia Izy no hotadiavin’ny jentilisa;
  - type: text
    content: Ary ny fitoerany dia ho voninahitra.
  '11':
  - type: text
    content: Ary amin’izany andro izany ny Tompo dia mbola haninjitra ny tànany fanindroany
  - type: text
    content: Hanavotra ny olony, izay mbola sisa, avy any Syria sy Egypta
  - type: text
    content: Sy Patrosa sy Etiopia
  - type: text
    content: Sy Elama sy Sinara sy Hamata
  - type: text
    content: Ary ny avy any amin’ny moron-dranomasina.
  '12':
  - type: text
    content: Dia hanangana faneva ho an’ny jentilisa Izy
  - type: text
    content: Ka hamory ny Isiraely izay voaroaka
  - type: text
    content: Sy hanangona ny Joda izay voaely
  - type: text
    content: Avy any amin’ny vazan-tany efatra.
  '13':
  - type: text
    content: Ary hitsahatra ny fialonan’i Efraima,
  - type: text
    content: Ary hofongorana ny fandrafiana
  - type: note
    content: 'Na: mpandrafy.'
  - type: text
    content: ' an’'
  - type: note
    content: 'Na: ao amin’ny.'
  - type: text
    content: ' i Joda:'
  - type: text
    content: Efraima tsy hialona an’i Joda,
  - type: text
    content: Ary Joda tsy handrafy an’i Efraima.
  '14':
  - type: text
    content: Fa hipaoka ny tanin’ny Filistina any andrefana ireo
  - type: text
    content: Sy hiara-mamabo ny zanaky ny atsinanana;
  - type: text
    content: Amin’i Edoma sy Moaba no haninjirany ny tànany,
  - type: text
    content: Ary ny taranak’i Amona hanoa azy.
  '15':
  - type: text
    content: Ary Jehovah handritra
  - type: note
    content: 'Na: hanao azy ho herema.'
  - type: text
    content: ' ny sakeli-dranomasina Egyptiana'
  - type: text
    content: Ary haninjitra ny tànany amin’ny Ony
  - type: note
    content: Eofrata.
  - type: text
    content: ' ka hamely azy amin’ny rivony mahamay'
  - type: text
    content: Ka hampisaraka azy hisampana fito
  - type: text
    content: Ary haha-tafita ny olona tsy miala kapa.
  '16':
  - type: text
    content: Ary hisy làlana voavoatra halehan’ny olony sisa,
  - type: text
    content: Izay sisa avy any Asyria,
  - type: text
    content: Dia toy ny ho an’ny Isiraely
  - type: text
    content: Tamin’ny andro niakarany avy tany amin’ny tany Egypta.
  '2':
  - type: text
    content: Ary ny Fanahin’i Jehovah hitoetra ao aminy,
  - type: text
    content: Dia ny Fanahin’ny fahendrena sy ny fahazavan-tsaina;
  - type: text
    content: Ny Fanahin’ny fanoloran-tsaina sy ny faherezana;
  - type: text
    content: Ny Fanahin’ny fahalalanasy ny fahatahorana an’i Jehovah;
  '3':
  - type: text
    content: Ary ho hanitra ankasitrahana aminy ny fahatahorana an’i Jehovah,
  - type: text
    content: Ka tsy hitsara araka ny hitan’ny masony Izy,
  - type: text
    content: Na hampiaiky araka ny ren’ny sofiny;
  '4':
  - type: text
    content: Fa hotsarainy amin’ny fahamarinana ny malahelo;
  - type: text
    content: Ary homeny rariny ny mpandefitra amin’ny tany;
  - type: text
    content: Hamely ny tany amin’ny tsorakazon’ny vavany Izy,
  - type: text
    content: Ary ny fofonain’ny molony no hamonoany ny ratsy fanahy.
  '5':
  - type: text
    content: Fahamarinana no ho fisikinany,
  - type: text
    content: Ary fanahy mahatoky no ho fehin-kibony
  '6':
  - type: text
    content: Ary ny amboadia
  - type: note
    content: lopa.
  - type: text
    content: ' hiara-mitoetra amin’ny zanak’ondry;'
  - type: text
    content: Ny leoparda hiara-mandry amin’ny zanak’osy;
  - type: text
    content: Ary ny zanak’omby sy ny liona tanora sy ny ombikely mifahy hiray toerana,
  - type: text
    content: Ary ny zazakely no hiroaka azy.
  '7':
  - type: text
    content: Ary ny ombivavy sy ny bera hiara-komana;
  - type: text
    content: Ny zanany hiara-mandry;
  - type: text
    content: Ary ny liona hihina-mololo tahaka ny omby;
  '8':
  - type: text
    content: Ny zaza minono hilalao amin’ny lavaky ny vipera,
  - type: text
    content: Ary ny zaza mitsaha-nono haninjitra ny tànany ao amin’ny lavaky
  - type: note
    content: 'Na: voamason’.'
  - type: text
    content: ' ny menarana.'
  '9':
  - type: text
    content: Ary tsy handratra na hanimba eran’ny tendrombohitro masina izy;
  - type: text
    content: Fa ny tany ho henika ny fahalalana an’i Jehovah,
  - type: text
    content: Tahaka ny anaronan’ny rano ny fanambanin’ny ranomasina.
