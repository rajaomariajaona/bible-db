document_id: ISA.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny famonjena hataon’Ilay Solofon’i Davida, sy ny hira fiderana hatao amin’izany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY hisy Solofo mitsimoka eo amin’ny fototr’i Jese,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hisy mitrebona avy eo amin’ny fàkany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ny Fanahin’i Jehovah hitoetra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny Fanahin’ny fahendrena sy ny fahazavan-tsaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Fanahin’ny fanoloran-tsaina sy ny faherezana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Fanahin’ny fahalalanasy ny fahatahorana an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ho hanitra ankasitrahana aminy ny fahatahorana an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hitsara araka ny hitan’ny masony Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hampiaiky araka ny ren’ny sofiny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa hotsarainy amin’ny fahamarinana ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary homeny rariny ny mpandefitra amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamely ny tany amin’ny tsorakazon’ny vavany Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fofonain’ny molony no hamonoany ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fahamarinana no ho fisikinany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fanahy mahatoky no ho fehin-kibony
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lopa.
    marker-yv: yv-n
  - type: text
    text: ' hiara-mitoetra amin’ny zanak’ondry;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny leoparda hiara-mandry amin’ny zanak’osy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanak’omby sy ny liona tanora sy ny ombikely mifahy hiray toerana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zazakely no hiroaka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny ombivavy sy ny bera hiara-komana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanany hiara-mandry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny liona hihina-mololo tahaka ny omby;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zaza minono hilalao amin’ny lavaky ny vipera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zaza mitsaha-nono haninjitra ny tànany ao amin’ny lavaky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voamason’.
    marker-yv: yv-n
  - type: text
    text: ' ny menarana.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary tsy handratra na hanimba eran’ny tendrombohitro masina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tany ho henika ny fahalalana an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny anaronan’ny rano ny fanambanin’ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary amin’izany andro izany ny Solofon’i Jese,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hitsangana ho fanevan’ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Izy no hotadiavin’ny jentilisa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fitoerany dia ho voninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary amin’izany andro izany ny Tompo dia mbola haninjitra ny tànany fanindroany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanavotra ny olony, izay mbola sisa, avy any Syria sy Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy Patrosa sy Etiopia
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy Elama sy Sinara sy Hamata
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny avy any amin’ny moron-dranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia hanangana faneva ho an’ny jentilisa Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamory ny Isiraely izay voaroaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanangona ny Joda izay voaely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy any amin’ny vazan-tany efatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary hitsahatra ny fialonan’i Efraima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hofongorana ny fandrafiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpandrafy.
    marker-yv: yv-n
  - type: text
    text: ' an’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ao amin’ny.
    marker-yv: yv-n
  - type: text
    text: ' i Joda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efraima tsy hialona an’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Joda tsy handrafy an’i Efraima.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa hipaoka ny tanin’ny Filistina any andrefana ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hiara-mamabo ny zanaky ny atsinanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’i Edoma sy Moaba no haninjirany ny tànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taranak’i Amona hanoa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary Jehovah handritra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hanao azy ho herema.
    marker-yv: yv-n
  - type: text
    text: ' ny sakeli-dranomasina Egyptiana'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary haninjitra ny tànany amin’ny Ony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
  - type: text
    text: ' ka hamely azy amin’ny rivony mahamay'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampisaraka azy hisampana fito
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary haha-tafita ny olona tsy miala kapa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hisy làlana voavoatra halehan’ny olony sisa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay sisa avy any Asyria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy ny ho an’ny Isiraely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro niakarany avy tany amin’ny tany Egypta.
