document_id: EXO.40
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nananganana ny tabernakely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amin’ny andro voalohany amin’ny volana voalohany dia atsangano ny tabernakelin’ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ataovy ao ny fiaran’ny Vavolombelona; dia ahantòny ny efitra lamba hanakona ny fiara. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ampidiro ny latabatra, ka alaharo izay halahatra eo amboniny; ary ampidiro ny fanaovan-jiro, ka ampireheto
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ataingeno.
    marker-yv: yv-n
  - type: text
    text: ' ny jiro.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lela fanaovan-jirony.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny alitara volamena fandoroana ditin-kazo manitra dia ataovy eo anoloan’ny fiaran’ny Vavolombelona.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didy Folo.
    marker-yv: yv-n
  - type: text
    text: ' ary ny varavarana lamba dia ataovy eo amin’ny varavaran’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny alitara fandoroana ny fanatitra odorana dia apetraho eo anoloan’ny tabernakelin’ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny tavy dia apetraho eo anelanelan’ny trano-lay fihaonana sy ny alitara, ka asio rano eo anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary amboary ny kianja manodidina, ka ahantòny ny vavahady lamba eo amin’ny vavahadin’ny kianja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary alao ny diloilo fanosorana, ka hosory ny tabernakely sy izay rehetra ao, dia hamasino izy mbamin’ny fanaka rehetra momba azy, ka dia ho masina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hosory ny alitara fandoroana ny fanatitra odorana sy ny fanaka rehetra momba azy; ary hamasino ny alitara, dia ho masina indrindra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hosory ny tavy sy ny faladiany, ka hamasino izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ento Arona sy ny zanany hankeo anoloan’ny varavaran’ny trano-lay fihaonana, ka ampandroy amin’ny rano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ampiakanjoy an’i Arona ny fitafiana masina, dia hosory sy hamasino izy, mba ho mpisorona ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ento ny zanany, ka ampiakanjoy azy ny akanjo lava. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hosory izy, tahaka ny nanosoranao ny rainy, mba ho mpisorona ho Ahy; ary ny fanosorana azy dia ho fisoronana mandrakizay ho azy hatramin’ny taranany fara mandimby. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nataon’i Mosesy izany: araka izay rehetra efa nandidian’i Jehovah azy no nataony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary tamin’ny andro voalohany tamin’ny volana voalohany tamin’ny taona faharoa no nananganana ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Mosesy nanangana ny tabernakely, dia nametraka ny faladiany sy nanangana ny zanakazony, ary nampiditra ny barany sy nanangana ny andriny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary namelatra ny lay teo ambonin’ny tabernakely izy, ary ny firakotry ny lay nataony teo amboniny, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nalainy ny Vavolombelona ka napetrany tao anatin’ny fiara, ary ny bao dia nataony teo amin’ny fiara, ary ny rakotra fanaovam-panavotana dia napetrany teo ambonin’ny fiara. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny fiara dia nampidiriny tao amin’ny tabernakely, ka nahantony ny efitra lamba fanakonana hanakona ny fiaran’ny Vavolombelona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didy Folo.
    marker-yv: yv-n
  - type: text
    text: ' dia araka izay efa nandidian’i Jehovah an’i Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny latabatra dia napetrany teo amin’ny trano-lay fihaonana, dia teo amin’ny lafin’ny tabernakely avaratra, teo ivelan’ny efitra lamba. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nandahatra mofo teo amboniny teo anatrehan’i Jehovah izy, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny fanaovan-jiro dia napetrany teo amin’ny trano-lay fihaonana, tandrifin’ny latabatra, teo amin’ny lafin’ny tabernakely atsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nampirehitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanaingina.
    marker-yv: yv-n
  - type: text
    text: ' ny jiro'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lela fanaovan-jiro.
    marker-yv: yv-n
  - type: text
    text: ' teo anatrehan’i Jehovah izy, dia araka izay efa nandidian’i Jehovah an’i Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny alitara volamena dia nataony teo amin’ny trano-lay fihaonana, teo anoloan’ny efitra lamba; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ary nandoro ditin-kazo mani-pofona teo izy, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny varavarana lamba dia nataony teo amin’ny varavaran’ny tabernakely; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ary ny alitara fandoroana ny fanatitra odorana dia napetrany teo anoloan’ny varavaran’ny tabernakelin’ny trano-lay fihaonana; ary nateriny teo amboniny ny fanatitra odorana sy ny fanatitra hohanina, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny tavy dia nataony teo anelanelan’ny trano-lay fihaonana sy ny alitara, ka nasiany rano teo anatiny hanasana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary teo no nanasan’i Mosesy sy Arona ary ny zanany ny tongony aman-tànany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha niditra tao amin’ny trano-lay fihaonana izy, ary raha nanakaiky ny alitara, dia nisasa izy, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary natsangany koa ny kianja manodidina ny tabernakely sy ny alitara; ary ny vavahady lamba dia nataony teo amin’ny vavahadin’ny kianja. Dia vitan’i Mosesy ny asa rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny rahona nanarona ny trano-lay fihaonana, ary ny voninahitr’i Jehovah nameno ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary Mosesy tsy nahazo niditra tao amin’ny trano-lay fihaonana, satria ny rahona nitoetra teo amboniny, ary ny vonihatr’i Jehovah nameno ny tabernakely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary raha niakatra niala tamin’ny tabernakely ny rahona, dia nifindra ny Zanak’Isiraely tamin’ny nandehanany rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'fa raha tsy niakatra ny rahona, dia tsy nifindra izy, mandra-piavin’izay andro hiakarany. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fa ny rahon’i Jehovah dia teo ambonin’ny tabernakely nony andro, ary nisy afo teo aminy nony alina, teo imason’ny taranak’Isiraely rehetra, tamin’ny nandehanany rehetra.
