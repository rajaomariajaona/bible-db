document_id: PSA.128,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hatsaran’ny tokantranon’ny olona matahotra an’Andriamanitra.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: SAMBATRA izay rehetra matahotra an’i Jehovah,
  - type: text
    content: Dia izay mandeha amin’ny làlany.
  '2':
  - type: text
    content: Fa hohaninao tokoa ny asan’ny tànanao;
  - type: text
    content: Sambatra sady ambinina hianao.
  '3':
  - type: text
    content: Ny vadinao dia tahaka ny voaloboka mahavokatra
  - type: text
    content: Ao anatin’ny tranonao;
  - type: text
    content: Ny zanakao dia tahaka ny zanak’oliva
  - type: text
    content: Manodidina ny latabatrao.
  '4':
  - type: text
    content: Indro, fa toy izany no hitahiana
  - type: text
    content: Izay lehilahy matahotra an’i Jehovah.
  '5':
  - type: text
    content: Hitahy anao avy any Ziona anie Jehovah;
  - type: text
    content: Ary ho faly hahita ny fahasoavan’i Jerosalema anie hianao
  - type: text
    content: Amin’ny andro rehetra hiainanao.
  '6':
  - type: text
    content: Eny, hahita ny zafinao anie hianao;
  - type: text
    content: Fiadanana anie ho amin’ny Isiraely.
