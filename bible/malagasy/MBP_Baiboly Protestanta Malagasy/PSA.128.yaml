      - type: text
        text: Fihirana misy hevitra ambaratonga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: SAMBATRA izay rehetra matahotra an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay mandeha amin’ny làlany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa hohaninao tokoa ny asan’ny tànanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra sady ambinina hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny vadinao dia tahaka ny voaloboka mahavokatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao anatin’ny tranonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanakao dia tahaka ny zanak’oliva
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manodidina ny latabatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, fa toy izany no hitahiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay lehilahy matahotra an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hitahy anao avy any Ziona anie Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho faly hahita ny fahasoavan’i Jerosalema anie hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny andro rehetra hiainanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eny, hahita ny zafinao anie hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fiadanana anie ho amin’ny Isiraely.
