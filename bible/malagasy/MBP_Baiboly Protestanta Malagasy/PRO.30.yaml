document_id: PRO.30,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny tenin’i Agora.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY teny mavesa-danja nataon’i Agora, zanak’i Jake,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny tenin’i Agora, zanak’i Jake, avy any Masa.
      marker-yv: yv-n
    - type: text
      text: ' dia ny teny nataon-dralehilahy tamin’Itiela, eny, tamin’Itiela sy Okala:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manendrikendrika ny mpanompo amin’ny tompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao hozoniny hianao ka hahazo heloka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy taranaka izay manozona ny rainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy misaotra ny reniny.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy taranaka manao azy ho madio,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tsy voasasa ho afaka amin’ny fahalotoany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy taranaka, endrey ny fiandrandran’ ny masony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fisondrotry ny hodi-masony!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy taranaka izay toy ny sabatra ny nifiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary toy ny antsy ny vazany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamongotra ny ory tsy ho amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny malahelo tsy ho amin’ny olona.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny dinta manan-janakavavy roa, dia ny hoe: Omeo, Omeo.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy zavatra telo tsy mety voky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, efatra aza no tsy manao hoe: Aoka izay:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' sy ny kibo momba,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tany izay tsy vonton-drano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny afo koa no tsy mba manao hoe: Aoka izay.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny maso izay miandranandrana amin-dray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy mety manaja reny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hotsaingotsaingohin’ny goaika eny an-dohasahan-driaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hohanin’ny zana-boromahery.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy zavatra telo mahagaga ka tsy takatro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, efatra aza no tsy fantatro:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny nalehan’ny voromahery teny amin’ny habakabaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny nalehan’ny bibilava teny amin’ny vatolampy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny nalehan’ny sambo teny amin’ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny nalehan’ny lehilahy tamin’ny tovovavy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia biby,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nanasa-tena aho, Andriamanitra ô, nanasa-tena aho, Andriamanitra ô, ka lany ny heriko fa tahaka ny biby aho.
      marker-yv: yv-n
    - type: text
      text: ' fa tsy olona,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy manan-tsain’olombelona aho.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tahaka izany koa no fanaon’ny vehivavy mpijangajanga:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homana izy, dia mamafa ny vavany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka dia manao hoe: Tsy nanao ratsy aho.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao fitondrana telo izao no tsy mampandry ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, zavatra efatra aza no tsy zakany;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ny andevo no tonga mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ny adala no voky hanina,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ny vehivavy lany zara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ankahalaina.
      marker-yv: yv-n
    - type: text
      text: ' no ampakarina,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha ny ankizivavy no mandova
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mandimby.
      marker-yv: yv-n
    - type: text
      text: ' ny tompovaviny.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao zavatra efatra izao dia kely amin’ny etỳ ambonin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nefa hendry sady mahay:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vitsika dia firenena tsy matanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa manangona ny haniny amin’ny fahavaratra izy;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny biby hyraka dia firenena tsy manan-kery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa manao ny tranony ao amin’ny harambato izy;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny valala tsy manana mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa izy rehetra miainga manao antokony tsara;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny antsiantsy dia mandady amin’ny tànany,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: azonao samborin-tànana.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tonga ao an-tranon’ny mpanjaka izy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy zavatra telo izay tsara famindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, efatra aza no tsara fandeha;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nianatra fahendrena aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na nahazo ny fahalalana ny Iray Masina.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny liona, izay mahery indrindra amin’ny biby
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mihemotra na amin’inona na amin’inona,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny soavaly voaomana hiady
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voafehy kibo.
      marker-yv: yv-n
    - type: text
      text: ' sy ny osilahy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanjaka tsy azo toherina.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: otronin’ny vahoakany.
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha adala ka nanandra-tena hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na efa nisaina hanao ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tampeno ny tànanao ny vavanao.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanontsankontsanana ny ronono no miteraka rononomandry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanolanana ny orona no miteraka ra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanetsiketsehana ny fahatezerana no miteraka ady.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no efa niakatra tany an-danitra sady nidina indray?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nahangona ny rivotra tao an-tànany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nahafono ny rano tamin’ny lambany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no naha-misy ny faran’ny tany rehetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no anarany, ary iza no anaran’ny zanany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa toa fantatrao!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’Andriamanitra dia voadio avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampinga ho an’izay mialoka aminy Izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manampy ny teniny, fandrao hanariny hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho hita fa mpandainga.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zavatra roa loha no angatahiko aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka aza lavinao, dieny tsy mbola maty aho:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampanalaviro ahy ny zava-poana sy ny lainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manome ahy alahelo na harena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahano aho amin’izay anjara-hanina sahaza ho ahy;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao, raha voky aho, dia handa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hanao hoe: Iza moa Jehovah?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary andrao, raha tonga malahelo aho, dia hangalatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanamavo ny anaran’Andriamanitro.
