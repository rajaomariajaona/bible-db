document_id: PRO.30,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tenin’i Agora.
  - type: text
    content: NY teny mavesa-danja nataon’i Agora, zanak’i Jake,
  - type: note
    content: 'Na: Ny tenin’i Agora, zanak’i Jake, avy any Masa.'
  - type: text
    content: ' dia ny teny nataon-dralehilahy tamin’Itiela, eny, tamin’Itiela sy Okala:'
  '10':
  - type: text
    content: Aza manendrikendrika ny mpanompo amin’ny tompony,
  - type: text
    content: Fandrao hozoniny hianao ka hahazo heloka.
  '11':
  - type: text
    content: Misy taranaka izay manozona ny rainy
  - type: text
    content: Sady tsy misaotra ny reniny.
  '12':
  - type: text
    content: Misy taranaka manao azy ho madio,
  - type: text
    content: Kanjo tsy voasasa ho afaka amin’ny fahalotoany.
  '13':
  - type: text
    content: Misy taranaka, endrey ny fiandrandran’ ny masony
  - type: text
    content: Sy ny fisondrotry ny hodi-masony!
  '14':
  - type: text
    content: Misy taranaka izay toy ny sabatra ny nifiny,
  - type: text
    content: Ary toy ny antsy ny vazany,
  - type: text
    content: Hamongotra ny ory tsy ho amin’ny tany
  - type: text
    content: Sy ny malahelo tsy ho amin’ny olona.
  '15':
  - type: text
    content: 'Ny dinta manan-janakavavy roa, dia ny hoe: Omeo, Omeo.'
  - type: text
    content: Misy zavatra telo tsy mety voky,
  - type: text
    content: 'Eny, efatra aza no tsy manao hoe: Aoka izay:'
  '16':
  - type: text
    content: Ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' sy ny kibo momba,'
  - type: text
    content: Ny tany izay tsy vonton-drano,
  - type: text
    content: 'Ary ny afo koa no tsy mba manao hoe: Aoka izay.'
  '17':
  - type: text
    content: Ny maso izay miandranandrana amin-dray
  - type: text
    content: Sady tsy mety manaja reny
  - type: text
    content: Dia hotsaingotsaingohin’ny goaika eny an-dohasahan-driaka
  - type: text
    content: Ary hohanin’ny zana-boromahery.
  '18':
  - type: text
    content: Misy zavatra telo mahagaga ka tsy takatro,
  - type: text
    content: 'Eny, efatra aza no tsy fantatro:'
  '19':
  - type: text
    content: Ny nalehan’ny voromahery teny amin’ny habakabaka,
  - type: text
    content: Ny nalehan’ny bibilava teny amin’ny vatolampy,
  - type: text
    content: Ny nalehan’ny sambo teny amin’ny ranomasina,
  - type: text
    content: Ary ny nalehan’ny lehilahy tamin’ny tovovavy.
  '2':
  - type: text
    content: Izaho dia biby,
  - type: note
    content: 'Na: Nanasa-tena aho, Andriamanitra ô, nanasa-tena aho, Andriamanitra ô, ka lany ny heriko fa tahaka ny biby aho.'
  - type: text
    content: ' fa tsy olona,'
  - type: text
    content: Ary tsy manan-tsain’olombelona aho.
  '20':
  - type: text
    content: 'Tahaka izany koa no fanaon’ny vehivavy mpijangajanga:'
  - type: text
    content: Homana izy, dia mamafa ny vavany,
  - type: text
    content: 'Ka dia manao hoe: Tsy nanao ratsy aho.'
  '21':
  - type: text
    content: Izao fitondrana telo izao no tsy mampandry ny tany,
  - type: text
    content: Eny, zavatra efatra aza no tsy zakany;
  '22':
  - type: text
    content: Raha ny andevo no tonga mpanjaka,
  - type: text
    content: Raha ny adala no voky hanina,
  '23':
  - type: text
    content: Raha ny vehivavy lany zara
  - type: note
    content: Heb. ankahalaina.
  - type: text
    content: ' no ampakarina,'
  - type: text
    content: Ary raha ny ankizivavy no mandova
  - type: note
    content: 'Na: mandimby.'
  - type: text
    content: ' ny tompovaviny.'
  '24':
  - type: text
    content: Izao zavatra efatra izao dia kely amin’ny etỳ ambonin’ny tany,
  - type: text
    content: 'Nefa hendry sady mahay:'
  '25':
  - type: text
    content: Ny vitsika dia firenena tsy matanjaka,
  - type: text
    content: Nefa manangona ny haniny amin’ny fahavaratra izy;
  '26':
  - type: text
    content: Ny biby hyraka dia firenena tsy manan-kery,
  - type: text
    content: Nefa manao ny tranony ao amin’ny harambato izy;
  '27':
  - type: text
    content: Ny valala tsy manana mpanjaka,
  - type: text
    content: Nefa izy rehetra miainga manao antokony tsara;
  '28':
  - type: text
    content: Ny antsiantsy dia mandady amin’ny tànany,
  - type: note
    content: 'Na: azonao samborin-tànana.'
  - type: text
    content: Nefa tonga ao an-tranon’ny mpanjaka izy.
  '29':
  - type: text
    content: Misy zavatra telo izay tsara famindra,
  - type: text
    content: Eny, efatra aza no tsara fandeha;
  '3':
  - type: text
    content: Tsy nianatra fahendrena aho,
  - type: text
    content: Na nahazo ny fahalalana ny Iray Masina.
  '30':
  - type: text
    content: Dia ny liona, izay mahery indrindra amin’ny biby
  - type: text
    content: Ka tsy mihemotra na amin’inona na amin’inona,
  '31':
  - type: text
    content: Ny soavaly voaomana hiady
  - type: note
    content: Heb. voafehy kibo.
  - type: text
    content: ' sy ny osilahy'
  - type: text
    content: Ary ny mpanjaka tsy azo toherina.
  - type: note
    content: 'Na: otronin’ny vahoakany.'
  '32':
  - type: text
    content: Raha adala ka nanandra-tena hianao,
  - type: text
    content: Na efa nisaina hanao ratsy,
  - type: text
    content: Dia tampeno ny tànanao ny vavanao.
  '33':
  - type: text
    content: Ny fanontsankontsanana ny ronono no miteraka rononomandry,
  - type: text
    content: Ny fanolanana ny orona no miteraka ra;
  - type: text
    content: Ary ny fanetsiketsehana ny fahatezerana no miteraka ady.
  '4':
  - type: text
    content: Iza no efa niakatra tany an-danitra sady nidina indray?
  - type: text
    content: Iza no nahangona ny rivotra tao an-tànany?
  - type: text
    content: Iza no nahafono ny rano tamin’ny lambany?
  - type: text
    content: Iza no naha-misy ny faran’ny tany rehetra?
  - type: text
    content: Iza no anarany, ary iza no anaran’ny zanany?
  - type: text
    content: Fa toa fantatrao!
  '5':
  - type: text
    content: Ny tenin’Andriamanitra dia voadio avokoa;
  - type: text
    content: Ampinga ho an’izay mialoka aminy Izy.
  '6':
  - type: text
    content: Aza manampy ny teniny, fandrao hanariny hianao
  - type: text
    content: Ka ho hita fa mpandainga.
  '7':
  - type: text
    content: Zavatra roa loha no angatahiko aminao;
  - type: text
    content: 'Ka aza lavinao, dieny tsy mbola maty aho:'
  '8':
  - type: text
    content: Ampanalaviro ahy ny zava-poana sy ny lainga;
  - type: text
    content: Aza manome ahy alahelo na harena;
  - type: text
    content: Fahano aho amin’izay anjara-hanina sahaza ho ahy;
  '9':
  - type: text
    content: Fandrao, raha voky aho, dia handa
  - type: text
    content: 'Ka hanao hoe: Iza moa Jehovah?'
  - type: text
    content: Ary andrao, raha tonga malahelo aho, dia hangalatra
  - type: text
    content: Ka hanamavo ny anaran’Andriamanitro.
