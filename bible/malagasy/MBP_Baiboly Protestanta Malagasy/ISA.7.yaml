document_id: ISA.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny hahaterahan’Imanoela, sy ny amin’ny handravana ny fanjakan’i Syria sy Efraima.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’ny andron’i Ahaza, zanak’i Jotama, zanak’i Ozia, mpanjakan’ny Joda, no niakaran’i Rezina, mpanjakan’i Syria, sy Peka, zanak’i Remalia, mpanjakan’ny Isiraely, hanafika an’i Jerosalema, nefa tsy nahafaka azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nambara tamin’ny taranak’i Davida hoe: Injao ny Syriana efa mitoby any amin’ny Efraima. Ary niròndròna ny fony sy ny fon’ny vahoakany toy ny firòndrònan’ny hazo any an-ala, raha asian’ny rivotra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Jehovah tamin’Isaia: Mivoaha hianao sy Seara-jasoba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seara-jasoba = Hisy sisa hiverina.
    marker-yv: yv-n
  - type: text
    text: ' zanakao hitsena an’i Ahaza eo amin’ny faran’ny lakan-drano amin’ny kamory ambony, eo amin’ny làlambe mankamin’ny sahan’ny mpamotsy lamba, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka lazao aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitandrema, ka aza taitaitra foana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra, ary aoka tsy ho ketraka ny fonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ireto tapa-porohana roa midonaka ireto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny firehetan’ny fahatezeran-dRezina sy Syria ary ny zanak’i Remalia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Satria efa nanao saina hampidi-doza aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Syria sy Efraima ary ny zanak’i Remalia ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andeha isika hananika an’i Joda ka hampaharaiki-tahotra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanafaka azy ho antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanangana ny zanak’i Tabeala ho mpanjaka ao afovoany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho tanteraka izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hisy izany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny lohan’i Syria dia Damaskosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lohan’i Damaskosy dia Rezina
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Ary ao anatin’ny dimy amby enim-polo taona dia ho rava ny Efraima
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho vanon-ko firenena intsony),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ny lohan’i Efraima dia Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lohan’i Samaria dia ny zanak’i Remalia.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy mety mino hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy ho tafatoetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Jehovah mbola niteny tamin’i Ahaza ihany ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mangataha famantarana amin’i Jehovah Andriamanitrao; eny, mangataha na ho avy amin’ny lalina ambany, na ho avy amin’ny avo ambony. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hoy Ahaza: Tsy hangataka aho, fa tsy haka fanahy an’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Isaia:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mihainoa ary, ny taranak’i Davida:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataonareo ho zavatra kely foana moa ny hanasatra ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No dia hanasatra an’Andriamanitro koa hianareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary noho izany dia ny Tompo no hanome famantarana ho anareo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hanan-anaka ny virijina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zazavavy.
    marker-yv: yv-n
  - type: text
    text: ' ka hiteraka zazalahy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny anarany hataony hoe Imanoela.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Imanoela = Amintsika Andriamanitra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Rehefa mahalala handa ny ratsy sy hifidy ny tsara izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia rononomandry sy tantely no ho fihinany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha tsy mbola mahalala handa ny ratsy sy hifidy ny tsara izany zaza izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho lao ny tanin’ireo mpanjaka roa maharaiki-tahotra anao ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jehovah hahatonga aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny olonao ary ny mpianakavin-drainao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay andro tsy mbola nisy toa azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny andro nialan’i Efraima tamin’ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Dia ny mpanjakan’i Asyria).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary amin’izany andro izany Jehovah hisiaka hiantso ny lalitra, izay any amin’ny faran’ny onin’i Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny renitantely, izay any amin’ny tany Asyria;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia ho avy ireo, ka samy hipetraka amin’ny lohasaha lao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy eny an-tsefatsefaky ny harambato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy eny amin’ny fefy tsilo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eny amin’ny saha fiandrasana rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin’izany andro izany koa ny Tompo hanaratra ny loha sy ny volon-tongotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny hareza nohofana any amoron’ny Ony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Dia ny mpanjakan’i Asyria);
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volom-bava hokakasana amin’iny koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia samy hiompy ombivavy kely sy ondry roa ny olona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary noho ny haben’ny ronono azo avy amin’ireo dia hihinana rononomandry izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa rononomandry sy tantely no ho fihinan’ny olona sisa rehetra ao amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary amin’izany andro izany dia ho rakotry ny hery sy ny tsilo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tany rehetra izay nisy voaloboka arivo nahazo sekely arivo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Zana-tsipìka sy tsipìka no ho entin’izay miditra ao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria rakotry ny hery sy ny tsilo ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny tanety rehetra izay nohevoina tamin’ny angady
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy ho azonao diavina noho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dia tsy halehan’.
    marker-yv: yv-n
  - type: text
    text: ' ny fahatahorana ny hery sy ny tsilo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho falehan’ny omby
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho voahitsakatsiky ny ondry aman-osy izany.
