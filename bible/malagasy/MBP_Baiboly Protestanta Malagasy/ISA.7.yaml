document_id: ISA.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny hahaterahan’Imanoela, sy ny amin’ny handravana ny fanjakan’i Syria sy Efraima.
  - type: text
    content: 'ARY tamin’ny andron’i Ahaza, zanak’i Jotama, zanak’i Ozia, mpanjakan’ny Joda, no niakaran’i Rezina, mpanjakan’i Syria, sy Peka, zanak’i Remalia, mpanjakan’ny Isiraely, hanafika an’i Jerosalema, nefa tsy nahafaka azy izy. '
  '10':
  - type: text
    content: 'Ary Jehovah mbola niteny tamin’i Ahaza ihany ka nanao hoe: '
  '11':
  - type: text
    content: 'Mangataha famantarana amin’i Jehovah Andriamanitrao; eny, mangataha na ho avy amin’ny lalina ambany, na ho avy amin’ny avo ambony. '
  '12':
  - type: text
    content: 'Fa hoy Ahaza: Tsy hangataka aho, fa tsy haka fanahy an’i Jehovah. '
  '13':
  - type: text
    content: 'Dia hoy Isaia:'
  - type: text
    content: 'Mihainoa ary, ny taranak’i Davida:'
  - type: text
    content: Ataonareo ho zavatra kely foana moa ny hanasatra ny olona,
  - type: text
    content: No dia hanasatra an’Andriamanitro koa hianareo?
  '14':
  - type: text
    content: 'Ary noho izany dia ny Tompo no hanome famantarana ho anareo:'
  - type: text
    content: Indro, hanan-anaka ny virijina
  - type: note
    content: 'Na: zazavavy.'
  - type: text
    content: ' ka hiteraka zazalahy;'
  - type: text
    content: Ary ny anarany hataony hoe Imanoela.
  - type: note
    content: 'Na: Imanoela = Amintsika Andriamanitra.'
  '15':
  - type: text
    content: Rehefa mahalala handa ny ratsy sy hifidy ny tsara izy,
  - type: text
    content: Dia rononomandry sy tantely no ho fihinany.
  '16':
  - type: text
    content: Fa raha tsy mbola mahalala handa ny ratsy sy hifidy ny tsara izany zaza izany,
  - type: text
    content: Dia ho lao ny tanin’ireo mpanjaka roa maharaiki-tahotra anao ireo.
  '17':
  - type: text
    content: Jehovah hahatonga aminao
  - type: text
    content: Sy ny olonao ary ny mpianakavin-drainao
  - type: text
    content: Izay andro tsy mbola nisy toa azy
  - type: text
    content: Hatramin’ny andro nialan’i Efraima tamin’ny Joda
  - type: text
    content: (Dia ny mpanjakan’i Asyria).
  '18':
  - type: text
    content: Ary amin’izany andro izany Jehovah hisiaka hiantso ny lalitra, izay any amin’ny faran’ny onin’i Egypta,
  - type: text
    content: Sy ny renitantely, izay any amin’ny tany Asyria;
  '19':
  - type: text
    content: Dia ho avy ireo, ka samy hipetraka amin’ny lohasaha lao,
  - type: text
    content: Sy eny an-tsefatsefaky ny harambato,
  - type: text
    content: Sy eny amin’ny fefy tsilo rehetra,
  - type: text
    content: Ary eny amin’ny saha fiandrasana rehetra.
  '2':
  - type: text
    content: 'Dia nambara tamin’ny taranak’i Davida hoe: Injao ny Syriana efa mitoby any amin’ny Efraima. Ary niròndròna ny fony sy ny fon’ny vahoakany toy ny firòndrònan’ny hazo any an-ala, raha asian’ny rivotra.'
  '20':
  - type: text
    content: Amin’izany andro izany koa ny Tompo hanaratra ny loha sy ny volon-tongotra
  - type: text
    content: Amin’ny hareza nohofana any amoron’ny Ony
  - type: note
    content: Eofrata.
  - type: text
    content: (Dia ny mpanjakan’i Asyria);
  - type: text
    content: Ary ny volom-bava hokakasana amin’iny koa.
  '21':
  - type: text
    content: Ary amin’izany andro izany
  - type: text
    content: Dia samy hiompy ombivavy kely sy ondry roa ny olona;
  '22':
  - type: text
    content: Ary noho ny haben’ny ronono azo avy amin’ireo dia hihinana rononomandry izy;
  - type: text
    content: Fa rononomandry sy tantely no ho fihinan’ny olona sisa rehetra ao amin’ny tany.
  '23':
  - type: text
    content: Ary amin’izany andro izany dia ho rakotry ny hery sy ny tsilo
  - type: text
    content: Ny tany rehetra izay nisy voaloboka arivo nahazo sekely arivo.
  '24':
  - type: text
    content: Zana-tsipìka sy tsipìka no ho entin’izay miditra ao,
  - type: text
    content: Satria rakotry ny hery sy ny tsilo ny tany rehetra.
  '25':
  - type: text
    content: Ary ny tanety rehetra izay nohevoina tamin’ny angady
  - type: text
    content: Dia tsy ho azonao diavina noho
  - type: note
    content: 'Na: Dia tsy halehan’.'
  - type: text
    content: ' ny fahatahorana ny hery sy ny tsilo;'
  - type: text
    content: Fa ho falehan’ny omby
  - type: text
    content: Sy ho voahitsakatsiky ny ondry aman-osy izany.
  '3':
  - type: text
    content: 'Ary hoy Jehovah tamin’Isaia: Mivoaha hianao sy Seara-jasoba'
  - type: note
    content: Seara-jasoba = Hisy sisa hiverina.
  - type: text
    content: ' zanakao hitsena an’i Ahaza eo amin’ny faran’ny lakan-drano amin’ny kamory ambony, eo amin’ny làlambe mankamin’ny sahan’ny mpamotsy lamba, '
  '4':
  - type: text
    content: 'ka lazao aminy hoe:'
  - type: text
    content: Mitandrema, ka aza taitaitra foana;
  - type: text
    content: Aza matahotra, ary aoka tsy ho ketraka ny fonao
  - type: text
    content: Noho ireto tapa-porohana roa midonaka ireto,
  - type: text
    content: Dia ny firehetan’ny fahatezeran-dRezina sy Syria ary ny zanak’i Remalia.
  '5':
  - type: text
    content: Satria efa nanao saina hampidi-doza aminao
  - type: text
    content: 'Syria sy Efraima ary ny zanak’i Remalia ka nanao hoe:'
  '6':
  - type: text
    content: Andeha isika hananika an’i Joda ka hampaharaiki-tahotra azy
  - type: text
    content: Ary hanafaka azy ho antsika
  - type: text
    content: Ka hanangana ny zanak’i Tabeala ho mpanjaka ao afovoany,
  '7':
  - type: text
    content: 'Dia izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Tsy ho tanteraka izany,
  - type: text
    content: Ary tsy hisy izany;
  '8':
  - type: text
    content: Fa ny lohan’i Syria dia Damaskosy,
  - type: text
    content: Ary ny lohan’i Damaskosy dia Rezina
  - type: text
    content: (Ary ao anatin’ny dimy amby enim-polo taona dia ho rava ny Efraima
  - type: text
    content: Ka tsy ho vanon-ko firenena intsony),
  '9':
  - type: text
    content: Ary ny lohan’i Efraima dia Samaria,
  - type: text
    content: Ary ny lohan’i Samaria dia ny zanak’i Remalia.
  - type: text
    content: Raha tsy mety mino hianareo,
  - type: text
    content: Dia tsy ho tafatoetra.
