document_id: HOS.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza nanjo ny Isiraely noho ny fahotany.
  - type: text
    content: RAHA niteny Efraima, dia nampangorohoro,
  - type: text
    content: Ka nisandratra tao amin’ny Isiraely izy.
  - type: text
    content: Dia nanota ny amin’i Bala izy ka maty;
  '10':
  - type: text
    content: Aiza ary izay mpanjakanao,
  - type: text
    content: Mba hamonjy anao ao an-tanànanao rehetra?
  - type: text
    content: 'Ary aiza ireo andriambaventinao, izay nantsoinao hoe:'
  - type: text
    content: Omeo mpanjaka sy mpanapaka aho?
  '11':
  - type: text
    content: Nomeko mpanjaka hianao tamin’ny fahatezerako,
  - type: text
    content: Ary nesoriko izy tamin’ny fahavinirako.
  '12':
  - type: text
    content: Voafehy ny helok’i Efraima,
  - type: text
    content: Voatahiry ny fahotany.
  '13':
  - type: text
    content: Fanaintainana tahaka ny vehivavy raha miteraka no mahazo azy;
  - type: text
    content: Zazalahy tsy hendry izy,
  - type: text
    content: Fa raha tonga ny fotoana, dia tsy mba mandroso ho eo amin’ny fiterahan-jaza izy.
  '14':
  - type: text
    content: Havotako tsy ho azon’ny herin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' izy;'
  - type: text
    content: Hovonjeko ho afaka amin’ny fahafatesana izy;
  - type: text
    content: Ry fahafatesana ô, aiza ny aretina fandripahanao?
  - type: text
    content: Ry fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ô, aiza ny fandringananao?'
  - type: text
    content: Afenina tsy ho hitan’ny masoko ny nenina.
  '15':
  - type: text
    content: Fa Efraima dia hahavokatra eo amin’ny rahalahy;
  - type: text
    content: Nefa ho avy ny rivotra avy any atsinanana,
  - type: text
    content: Dia ny rivotr’i Jehovah miakatra avy any an-efitra,
  - type: text
    content: Ka dia ho ritra ny loharanony,
  - type: text
    content: Ary ho tankina ny fantsakany;
  - type: text
    content: Hobaboina ny rakitra, dia ny fanaka tsara rehetra.
  '2':
  - type: text
    content: ary ankehitriny dia mandroso manota izy,
  - type: text
    content: Fa ny volafotsiny no anaovany sarin-javatra an-idina ho azy,
  - type: text
    content: Dia sampy araka ny fahaizany,
  - type: text
    content: Izay asan’ny mpiasa avokoa;
  - type: text
    content: 'Ireny dia lazainy hoe: Aoka hanoroka ny ombilahy kely izay olona mamono zavatra hatao fanatitra.'
  '3':
  - type: text
    content: Koa ho toy ny rahona maraina izy
  - type: text
    content: Sy ho toy ny ando izay levona, raha mbola maraina ny andro,
  - type: text
    content: Sy ho toy ny akofa izay paohin’ny rivotra hiala amin’ny famoloana,
  - type: text
    content: Ary ho toy ny setroka avy amin’ny varavarana makarakara.
  '4':
  - type: text
    content: Fa Izaho no Jehovah Andriamanitrao hatrany amin’ny tany Egypta,
  - type: text
    content: Ary tsy mahalala Andriamanitra afa-tsy Izaho hianao,
  - type: text
    content: Sady tsy misy mpamonjy afa-tsy Izaho.
  '5':
  - type: text
    content: Izaho dia nahalala anao tany an-efitra,
  - type: text
    content: Dia tany amin’ny tany mampangetaheta.
  '6':
  - type: text
    content: Araka ny ahitra teny aminy no nahavoky azy;
  - type: text
    content: Eny, voky izy, ka niavonavona ny fony;
  - type: text
    content: Koa izany no nanadinoany Ahy.
  '7':
  - type: text
    content: Ka dia tonga toy ny liona aminy Aho,
  - type: text
    content: Toy ny leoparda amoron-dàlana no famitsako.
  '8':
  - type: text
    content: Mamely azy toy ny famelin’ny bera very anaka Aho,
  - type: text
    content: Ka mandriatra ny sarom-pony,
  - type: text
    content: Eny, any no andrapahako azy toy ny fandrapaky ny liom-bavy;
  - type: text
    content: Ny bibi-dia no hamiravira azy.
  '9':
  - type: text
    content: Izao no maharingana anao, ry Isiraely ô;
  - type: text
    content: Manohitra Ahy Izay famonjena anao hianao.
