document_id: HOS.13
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny loza nanjo ny Isiraely noho ny fahotany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: RAHA niteny Efraima, dia nampangorohoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nisandratra tao amin’ny Isiraely izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanota ny amin’i Bala izy ka maty;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary ankehitriny dia mandroso manota izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny volafotsiny no anaovany sarin-javatra an-idina ho azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia sampy araka ny fahaizany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay asan’ny mpiasa avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ireny dia lazainy hoe: Aoka hanoroka ny ombilahy kely izay olona mamono zavatra hatao fanatitra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa ho toy ny rahona maraina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho toy ny ando izay levona, raha mbola maraina ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho toy ny akofa izay paohin’ny rivotra hiala amin’ny famoloana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho toy ny setroka avy amin’ny varavarana makarakara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa Izaho no Jehovah Andriamanitrao hatrany amin’ny tany Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mahalala Andriamanitra afa-tsy Izaho hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy misy mpamonjy afa-tsy Izaho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izaho dia nahalala anao tany an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tany amin’ny tany mampangetaheta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Araka ny ahitra teny aminy no nahavoky azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, voky izy, ka niavonavona ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izany no nanadinoany Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ka dia tonga toy ny liona aminy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny leoparda amoron-dàlana no famitsako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mamely azy toy ny famelin’ny bera very anaka Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mandriatra ny sarom-pony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, any no andrapahako azy toy ny fandrapaky ny liom-bavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny bibi-dia no hamiravira azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izao no maharingana anao, ry Isiraely ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manohitra Ahy Izay famonjena anao hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aiza ary izay mpanjakanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hamonjy anao ao an-tanànanao rehetra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary aiza ireo andriambaventinao, izay nantsoinao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Omeo mpanjaka sy mpanapaka aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nomeko mpanjaka hianao tamin’ny fahatezerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nesoriko izy tamin’ny fahavinirako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Voafehy ny helok’i Efraima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voatahiry ny fahotany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fanaintainana tahaka ny vehivavy raha miteraka no mahazo azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zazalahy tsy hendry izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha tonga ny fotoana, dia tsy mba mandroso ho eo amin’ny fiterahan-jaza izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Havotako tsy ho azon’ny herin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hovonjeko ho afaka amin’ny fahafatesana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry fahafatesana ô, aiza ny aretina fandripahanao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ô, aiza ny fandringananao?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afenina tsy ho hitan’ny masoko ny nenina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa Efraima dia hahavokatra eo amin’ny rahalahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ho avy ny rivotra avy any atsinanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny rivotr’i Jehovah miakatra avy any an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho ritra ny loharanony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tankina ny fantsakany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hobaboina ny rakitra, dia ny fanaka tsara rehetra.
