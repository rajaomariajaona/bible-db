document_id: HOS.13,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny loza nanjo ny Isiraely noho ny fahotany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: RAHA niteny Efraima, dia nampangorohoro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nisandratra tao amin’ny Isiraely izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nanota ny amin’i Bala izy ka maty;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ary izay mpanjakanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hamonjy anao ao an-tanànanao rehetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aiza ireo andriambaventinao, izay nantsoinao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo mpanjaka sy mpanapaka aho?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nomeko mpanjaka hianao tamin’ny fahatezerako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nesoriko izy tamin’ny fahavinirako.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voafehy ny helok’i Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voatahiry ny fahotany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fanaintainana tahaka ny vehivavy raha miteraka no mahazo azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zazalahy tsy hendry izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha tonga ny fotoana, dia tsy mba mandroso ho eo amin’ny fiterahan-jaza izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Havotako tsy ho azon’ny herin’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovonjeko ho afaka amin’ny fahafatesana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry fahafatesana ô, aiza ny aretina fandripahanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' ô, aiza ny fandringananao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afenina tsy ho hitan’ny masoko ny nenina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Efraima dia hahavokatra eo amin’ny rahalahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ho avy ny rivotra avy any atsinanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny rivotr’i Jehovah miakatra avy any an-efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho ritra ny loharanony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho tankina ny fantsakany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hobaboina ny rakitra, dia ny fanaka tsara rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ary ankehitriny dia mandroso manota izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny volafotsiny no anaovany sarin-javatra an-idina ho azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia sampy araka ny fahaizany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay asan’ny mpiasa avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ireny dia lazainy hoe: Aoka hanoroka ny ombilahy kely izay olona mamono zavatra hatao fanatitra.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ho toy ny rahona maraina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho toy ny ando izay levona, raha mbola maraina ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho toy ny akofa izay paohin’ny rivotra hiala amin’ny famoloana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho toy ny setroka avy amin’ny varavarana makarakara.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho no Jehovah Andriamanitrao hatrany amin’ny tany Egypta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mahalala Andriamanitra afa-tsy Izaho hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy misy mpamonjy afa-tsy Izaho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho dia nahalala anao tany an-efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tany amin’ny tany mampangetaheta.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny ahitra teny aminy no nahavoky azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, voky izy, ka niavonavona ny fony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no nanadinoany Ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tonga toy ny liona aminy Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny leoparda amoron-dàlana no famitsako.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamely azy toy ny famelin’ny bera very anaka Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandriatra ny sarom-pony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, any no andrapahako azy toy ny fandrapaky ny liom-bavy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny bibi-dia no hamiravira azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no maharingana anao, ry Isiraely ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manohitra Ahy Izay famonjena anao hianao.
