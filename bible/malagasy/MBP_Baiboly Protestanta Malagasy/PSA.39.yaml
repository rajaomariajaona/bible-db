document_id: PSA.39,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahatsinontsinon’izao fiainana izao.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Ho an’i Jedotona. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'HOY izaho: Hitandrina ny làlako aho ka tsy hanota amin’ny lelako;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hasiako fehim-bava ny vavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mbola eo anatrehako ny ratsy fanahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aoka hitsahatra ny fikapohanao ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reraka aho azon’ny famelin’ny tànanao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Anatra noho ny fahadisoany no ananaranao ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manimba ny hatsaran-tarehiny tahaka ny kalalao Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-poana tokoa ny olona rehetra.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mandrenesa ny fivavako, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihainoa ny fitarainako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mangina amin’ny ranomasoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa vahiny aminao aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mpivahiny tahaka ny razako rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aza atrehinao aho aloha, dia ho miramirana indray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieny aho tsy mbola lasa ka tsy ho eto intsony.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nangina mihitsy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namihim-bava aho ka tsy nilaza na dia ny tsara aza,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: na dia teo anatrehan’ny tsara fanahy aza.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nihetsika mafy ny fanaintainan’ny aretiko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nafana ny foko tato anatiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nieritreritra aho, dia nisy afo nirehitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka niteny tamin’ny lelako aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jehovah ô, ampahafantaro ny farako aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy izay ohatry ny androko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho fantatro fa olon-kandalo aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indro, efa nataonao vodivoam-pelatanana ny androko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiainako toy ny tsinontsinona eo anatrehanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-poana ihany tokoa ny olona rehetra, na dia ny matanjaka aza.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Natao ho zava-poana ihany tokoa ny olona rehetra.
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aloka tokoa no fandehandehan’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-poana tokoa no itabatabany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihary harena izy, nefa tsy fantany izay ho tompon’izany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ankehitriny, inona no andrasako, Tompo ô?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no antenaiko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manafaha ahy amin’ny fahadisoako rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manao ahy ho fanakòran’ny adala.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mangina aho ka tsy miloa-bava;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no nanao izao.
