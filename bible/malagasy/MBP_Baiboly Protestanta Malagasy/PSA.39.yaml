document_id: PSA.39,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatsinontsinon’izao fiainana izao.
  - type: text
    content: Ho an’ny mpiventy hira. Ho an’i Jedotona. Salamo nataon’i Davida.
  - type: text
    content: 'HOY izaho: Hitandrina ny làlako aho ka tsy hanota amin’ny lelako;'
  - type: text
    content: Hasiako fehim-bava ny vavako,
  - type: text
    content: Raha mbola eo anatrehako ny ratsy fanahy.
  '10':
  - type: text
    content: Aoka hitsahatra ny fikapohanao ahy;
  - type: text
    content: Reraka aho azon’ny famelin’ny tànanao.
  '11':
  - type: text
    content: Anatra noho ny fahadisoany no ananaranao ny olona,
  - type: text
    content: Ka manimba ny hatsaran-tarehiny tahaka ny kalalao Hianao;
  - type: text
    content: Zava-poana tokoa ny olona rehetra.
  - type: text
    content: '[Sela.]'
  '12':
  - type: text
    content: Mandrenesa ny fivavako, Jehovah ô;
  - type: text
    content: Ary mihainoa ny fitarainako;
  - type: text
    content: Aza mangina amin’ny ranomasoko;
  - type: text
    content: Fa vahiny aminao aho
  - type: text
    content: Sy mpivahiny tahaka ny razako rehetra.
  '13':
  - type: text
    content: Aza atrehinao aho aloha, dia ho miramirana indray,
  - type: text
    content: Dieny aho tsy mbola lasa ka tsy ho eto intsony.
  '2':
  - type: text
    content: Nangina mihitsy aho,
  - type: text
    content: Namihim-bava aho ka tsy nilaza na dia ny tsara aza,
  - type: note
    content: 'Na: na dia teo anatrehan’ny tsara fanahy aza.'
  - type: text
    content: Dia nihetsika mafy ny fanaintainan’ny aretiko.
  '3':
  - type: text
    content: Nafana ny foko tato anatiko;
  - type: text
    content: Raha nieritreritra aho, dia nisy afo nirehitra,
  - type: text
    content: Ka niteny tamin’ny lelako aho.
  '4':
  - type: text
    content: Jehovah ô, ampahafantaro ny farako aho
  - type: text
    content: Sy izay ohatry ny androko;
  - type: text
    content: Aoka ho fantatro fa olon-kandalo aho.
  '5':
  - type: text
    content: Indro, efa nataonao vodivoam-pelatanana ny androko;
  - type: text
    content: Ary ny fiainako toy ny tsinontsinona eo anatrehanao;
  - type: text
    content: Zava-poana ihany tokoa ny olona rehetra, na dia ny matanjaka aza.
  - type: note
    content: 'Na: Natao ho zava-poana ihany tokoa ny olona rehetra.'
  - type: text
    content: '[Sela.]'
  '6':
  - type: text
    content: Aloka tokoa no fandehandehan’ny olona;
  - type: text
    content: Zava-poana tokoa no itabatabany;
  - type: text
    content: Mihary harena izy, nefa tsy fantany izay ho tompon’izany.
  '7':
  - type: text
    content: Ary ankehitriny, inona no andrasako, Tompo ô?
  - type: text
    content: Hianao no antenaiko.
  '8':
  - type: text
    content: Manafaha ahy amin’ny fahadisoako rehetra;
  - type: text
    content: Aza manao ahy ho fanakòran’ny adala.
  '9':
  - type: text
    content: Mangina aho ka tsy miloa-bava;
  - type: text
    content: Fa Hianao no nanao izao.
