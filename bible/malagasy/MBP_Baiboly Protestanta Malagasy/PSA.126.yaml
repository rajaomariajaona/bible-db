document_id: PSA.126,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fifalian’ny efa nampodin’i Jehovah, sy fifonana ho an’izay mbola babo.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fihirana fiakarana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '126.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fihirana misy hevitra ambaratonga.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FONY Jehovah nampody an’i Ziona avy tamin’ny fahababoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka izay nanonofy isika.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahizay dia feno hehy ny vavantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fihobiana ny lelantsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia natao tany amin’ny jentilisa hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zava-dehibe no nataon’i Jehovah ho an’ireny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, zava-dehibe no nataon’i Jehovah ho antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia faly isika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tanteraho, Jehovah ô, ny hampodiana anay avy amin’ny fahababoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fiverenan’ny riaka any amin’ny tany atsimo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamafy am-pitomaniana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hijinja am-pifaliana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandeha mitomany mitondra ny voa afafiny izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hiverina mitondra ny amboarany amin’ny fihobiana kosa.
