document_id: PSA.126,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifalian’ny efa nampodin’i Jehovah, sy fifonana ho an’izay mbola babo.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: FONY Jehovah nampody an’i Ziona avy tamin’ny fahababoany,
  - type: text
    content: Dia tahaka izay nanonofy isika.
  '2':
  - type: text
    content: Fahizay dia feno hehy ny vavantsika
  - type: text
    content: Sy fihobiana ny lelantsika;
  - type: text
    content: 'Dia natao tany amin’ny jentilisa hoe:'
  - type: text
    content: Zava-dehibe no nataon’i Jehovah ho an’ireny.
  '3':
  - type: text
    content: Eny, zava-dehibe no nataon’i Jehovah ho antsika,
  - type: text
    content: Ka dia faly isika.
  '4':
  - type: text
    content: Tanteraho, Jehovah ô, ny hampodiana anay avy amin’ny fahababoana,
  - type: text
    content: Tahaka ny fiverenan’ny riaka any amin’ny tany atsimo.
  '5':
  - type: text
    content: Izay mamafy am-pitomaniana
  - type: text
    content: Dia hijinja am-pifaliana.
  '6':
  - type: text
    content: Mandeha mitomany mitondra ny voa afafiny izy,
  - type: text
    content: Fa hiverina mitondra ny amboarany amin’ny fihobiana kosa.
