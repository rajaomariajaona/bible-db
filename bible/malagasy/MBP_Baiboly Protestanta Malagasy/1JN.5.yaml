document_id: 1JN.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: Izay rehetra mino fa Jesosy no Kristy dia naterak’Andriamanitra; ary izay rehetra tia Izay niteraka dia tia izay naterany koa.
  '10':
  - type: text
    content: 'Izay mino ny Zanak’Andriamanitra no manana ny fanambarana ao anatiny; izay tsy mino an’Andriamanitra dia efa nampandainga Azy, satria tsy mino ny fanambarana izay nanambaran’Andriamanitra ny Zanany izy. '
  '11':
  - type: text
    content: 'Ary izao no fanambarany: Fiainana mandrakizay no omen’Andriamanitra antsika, ary ao amin’ny Zanany izany fiainana izany. '
  '12':
  - type: text
    content: Izay manana ny Zanaka no manana ny fiainana; izay tsy manana ny Zanak’Andriamanitra no tsy manana ny fiainana.
  - type: heading
    content: Ny amin’ny fivavahana ary ny tsi-fitovian’ny zanak’Andriamanitra amin’ny ratsy fanahy.
  '13':
  - type: text
    content: IZANY no nosoratako aminareo, izay mino ny anaran’ny Zanak’Andriamanitra, mba ho fantatrareo fa manana fiainana mandrakizay hianareo.
  '14':
  - type: text
    content: 'Ary izao no fahasahiana ananantsika eo anatrehany: Raha mangataka zavatra araka ny sitrapony isika, dia mihaino antsika Izy; '
  '15':
  - type: text
    content: ary raha fantatsika fa mihaino antsika Izy, na inona na inona no angatahintsika, dia fantatsika fa azontsika izay angatahintsika aminy.
  '16':
  - type: text
    content: 'Raha misy mahita ny rahalahiny manao ota tsy mahafaty, dia aoka hifona ho azy izy, ary '
  - type: text
    content: Andriamanitra
  - type: text
    content: ' no hanome azy fiainana'
  - type: note
    content: 'Na: ary hanome fiainana ho azy, dia.'
  - type: text
    content: ' ho an’izay manao ota tsy mahafaty.'
  - type: note
    content: Gr. ota tsy ho amin’ny fahafatesana.
  - type: text
    content: ' Misy ota mahafaty;'
  - type: note
    content: Gr. ota ho amin’ny fahafatesana.
  - type: text
    content: ' tsy mba lazaiko fa tokony hangataka ny amin’izany izy. '
  '17':
  - type: text
    content: Ota avokoa ny tsi-fahamarinana rehetra; ary misy ota tsy mahafaty.
  - type: note
    content: Gr. ota tsy ho amin’ny fahafatesana.
  '18':
  - type: text
    content: Fantatsika fa izay rehetra naterak’Andriamanitra dia tsy manota; fa izay naterak’Andriamanitra, dia miaro ny tenany
  - type: note
    content: 'Na: Ilay naterak’Andriamanitra no miaro azy.'
  - type: text
    content: ' ka tsy mikasika azy akory ilay ratsy. '
  '19':
  - type: text
    content: 'Fantatsika fa avy amin’Andriamanitra isika, ary izao tontolo izao kosa dia mipetraka eo amin’ilay ratsy avokoa. '
  '2':
  - type: text
    content: 'Izao no ahafantarantsika fa tia ireo zanak’Andriamanitra isika, dia ny itiavantsika an’Andriamanitra sy ny ankatoavantsika ny didiny. '
  '20':
  - type: text
    content: 'Ary fantatsika fa tonga ny Zanak’Andriamanitra ka efa nanome antsika ny fahazavan-tsaina, mba ho fantatsika Ilay marina; ary isika ao amin’Ilay marina, dia ao amin’i Jesosy Kristy Zanany. Izy no Andriamanitra marina sy fiainana mandrakizay. '
  '21':
  - type: text
    content: Anaka, arovy ny tenanareo amin’ny sampy.
  '3':
  - type: text
    content: Fa izao no fitiavana an’Andriamanitra, dia ny hitandremantsika ny didiny, sady tsy mavesatra ny didiny.
  '4':
  - type: text
    content: 'Fa izay rehetra naterak’Andriamanitra dia maharesy izao tontolo izao; ary ny fandresena izay enti-maharesy izao tontolo izao dia ny finoantsika. '
  '5':
  - type: text
    content: Iza moa no maharesy izao tontolo izao afa-tsy izay mino fa Jesosy no Zanak’Andriamanitra?
  '6':
  - type: text
    content: 'Izy ilay avy tamin’ny rano sy ny ra, dia Jesosy Kristy; tsy tamin’ny rano ihany, fa tamin’ny rano sy ny ra. Ary ny Fanahy no manambara, satria ny Fanahy no fahamarinana. '
  '7':
  - type: text
    content: 'Fa misy telo izay manambara, '
  '8':
  - type: text
    content: 'dia ny Fanahy sy ny rano ary ny ra; ary mifanaraka tsara izy telo. '
  '9':
  - type: text
    content: Raha mandray ny fanambaran’ny olona isika, lehibe lavitra ny fanambaran’Andriamanitra; fa ny fanambaran’Andriamanitra dia ny nanambarany ny Zanany.
