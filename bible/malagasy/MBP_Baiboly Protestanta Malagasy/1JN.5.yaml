document_id: 1JN.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izay rehetra mino fa Jesosy no Kristy dia naterak’Andriamanitra; ary izay rehetra tia Izay niteraka dia tia izay naterany koa.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izay mino ny Zanak’Andriamanitra no manana ny fanambarana ao anatiny; izay tsy mino an’Andriamanitra dia efa nampandainga Azy, satria tsy mino ny fanambarana izay nanambaran’Andriamanitra ny Zanany izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary izao no fanambarany: Fiainana mandrakizay no omen’Andriamanitra antsika, ary ao amin’ny Zanany izany fiainana izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izay manana ny Zanaka no manana ny fiainana; izay tsy manana ny Zanak’Andriamanitra no tsy manana ny fiainana.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fivavahana ary ny tsi-fitovian’ny zanak’Andriamanitra amin’ny ratsy fanahy.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: IZANY no nosoratako aminareo, izay mino ny anaran’ny Zanak’Andriamanitra, mba ho fantatrareo fa manana fiainana mandrakizay hianareo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary izao no fahasahiana ananantsika eo anatrehany: Raha mangataka zavatra araka ny sitrapony isika, dia mihaino antsika Izy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ary raha fantatsika fa mihaino antsika Izy, na inona na inona no angatahintsika, dia fantatsika fa azontsika izay angatahintsika aminy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Raha misy mahita ny rahalahiny manao ota tsy mahafaty, dia aoka hifona ho azy izy, ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra
    - type: text
      text: ' no hanome azy fiainana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ary hanome fiainana ho azy, dia.
      marker-yv: yv-n
    - type: text
      text: ' ho an’izay manao ota tsy mahafaty.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ota tsy ho amin’ny fahafatesana.
      marker-yv: yv-n
    - type: text
      text: ' Misy ota mahafaty;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ota ho amin’ny fahafatesana.
      marker-yv: yv-n
    - type: text
      text: ' tsy mba lazaiko fa tokony hangataka ny amin’izany izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ota avokoa ny tsi-fahamarinana rehetra; ary misy ota tsy mahafaty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ota tsy ho amin’ny fahafatesana.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fantatsika fa izay rehetra naterak’Andriamanitra dia tsy manota; fa izay naterak’Andriamanitra, dia miaro ny tenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ilay naterak’Andriamanitra no miaro azy.
      marker-yv: yv-n
    - type: text
      text: ' ka tsy mikasika azy akory ilay ratsy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fantatsika fa avy amin’Andriamanitra isika, ary izao tontolo izao kosa dia mipetraka eo amin’ilay ratsy avokoa. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao no ahafantarantsika fa tia ireo zanak’Andriamanitra isika, dia ny itiavantsika an’Andriamanitra sy ny ankatoavantsika ny didiny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary fantatsika fa tonga ny Zanak’Andriamanitra ka efa nanome antsika ny fahazavan-tsaina, mba ho fantatsika Ilay marina; ary isika ao amin’Ilay marina, dia ao amin’i Jesosy Kristy Zanany. Izy no Andriamanitra marina sy fiainana mandrakizay. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Anaka, arovy ny tenanareo amin’ny sampy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa izao no fitiavana an’Andriamanitra, dia ny hitandremantsika ny didiny, sady tsy mavesatra ny didiny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa izay rehetra naterak’Andriamanitra dia maharesy izao tontolo izao; ary ny fandresena izay enti-maharesy izao tontolo izao dia ny finoantsika. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Iza moa no maharesy izao tontolo izao afa-tsy izay mino fa Jesosy no Zanak’Andriamanitra?
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izy ilay avy tamin’ny rano sy ny ra, dia Jesosy Kristy; tsy tamin’ny rano ihany, fa tamin’ny rano sy ny ra. Ary ny Fanahy no manambara, satria ny Fanahy no fahamarinana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa misy telo izay manambara, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia ny Fanahy sy ny rano ary ny ra; ary mifanaraka tsara izy telo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha mandray ny fanambaran’ny olona isika, lehibe lavitra ny fanambaran’Andriamanitra; fa ny fanambaran’Andriamanitra dia ny nanambarany ny Zanany.
