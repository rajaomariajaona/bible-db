document_id: JER.17,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny fahotan’ny Joda dia voasoratra tamin’ny vy fanoratana
  - type: text
    content: Sy tamin’ny diamondra fanoratana;
  - type: text
    content: Voasoratra ao am-pony tahaka ny amin’ny vato fisaka
  - type: text
    content: Sy eo amin’ny tandroky ny alitarany
  - type: note
    content: Heb. alitaranareo.
  - type: text
    content: ' izany,'
  '10':
  - type: text
    content: Izaho Jehovah no Mpandinika ny fo
  - type: text
    content: Sy Mpamantatra ny voa,
  - type: text
    content: Mba hanome ny olona rehetra araka ny alehany avy,
  - type: text
    content: Dia araka ny vokatry ny asany.
  '11':
  - type: text
    content: Toy ny tsipoy mikotrika izay tsy atodiny,
  - type: text
    content: 'Dia toy izany izay mahazo harena tsy amin’ny rariny:'
  - type: text
    content: Handao azy amin’ny an-tenatenan’androny izany,
  - type: note
    content: 'Na: Hilaozan’izany eo an-tenatenan’androny izy.'
  - type: text
    content: Ka ho adala no farany.
  '12':
  - type: text
    content: Seza fiandrianana be voninahitra sady avo hatramin’ny voalohany
  - type: text
    content: Ny fitoera-masintsika.
  '13':
  - type: text
    content: Ry Jehovah, Fanantenan’ny Isiraely ô!
  - type: text
    content: Ho menatra izay rehetra mahafoy Anao,
  - type: text
    content: Ary hosoratana amin’ny vovoka izay miala aminao,
  - type: note
    content: Heb. amiko.
  - type: text
    content: Satria izy efa nahafoy an’i Jehovah, loharano velona.
  '14':
  - type: text
    content: Jehovah ô, sitrano aho, dia ho sitrana;
  - type: text
    content: Vonjeo aho, dia ho voavonjy;
  - type: text
    content: Fa Hianao no fidèrako.
  '15':
  - type: text
    content: 'Indro, ireo dia manao amiko hoe:'
  - type: text
    content: Aiza ny tenin’i Jehovah?
  - type: text
    content: Aoka ho tanteraka izany.
  '16':
  - type: text
    content: Fa izaho tsy nihifikifika niala tsy ho mpiandry manaraka Anao;
  - type: text
    content: Ary ny andro hihavian’ny loza dia tsy nohaikaiko,–eny, fantatrao izany;
  - type: text
    content: Izay efa nivoaka tamin’ny molotro dia miharihary eo anatrehanao.
  '17':
  - type: text
    content: Enga anie ka tsy ho fampitahorana ahy Hianao!
  - type: text
    content: Aroko amin’ny andro fahoriana Hianao!
  '18':
  - type: text
    content: Aoka ho menatra izay manenjika ahy,
  - type: text
    content: Fa izaho kosa aoka tsy mba ho menatra;
  - type: text
    content: Aoka hivadi-po ireo,
  - type: text
    content: Fa izaho kosa aoka tsy mba hivadi-po;
  - type: text
    content: Ataovy tonga aminy ny andro fahoriana.
  - type: text
    content: Ary ny fahatorotoroana roa heny no anorotoroy azy.
  - type: heading
    content: Ny amin’ny hanamasinana ny Sabata.
  '19':
  - type: text
    content: 'IZAO no nolazain’i Jehovah tamiko: Mandehana, ka mitsangàna eo amin’ny vavahadim-bahoaka, dia ilay fandehanan’ny mpanjakan’ny Joda miditra sy mivoaka, ary eo amin’ny vavahady rehetra eto Jerosalema '
  '2':
  - type: text
    content: Dia amin’izay hahatsiarovan’ny zanany ny alitarany sy ny Aserahany,
  - type: note
    content: Anaran’andriamani-tsi-izy, na ny sariny.
  - type: text
    content: Akaikin’ny hazo maitso, ambonin’ny havoana andrandraina.
  '20':
  - type: text
    content: 'ka lazao amin’ny olona hoe: Henoinareo, ny tenin’i Jehovah, ry mpanjakan’ny Joda sy ry Joda rehetra ary hianareo mponina rehetra eto Jerosalema, izay miditra amin’ireto vavahady ireto. '
  '21':
  - type: text
    content: 'Izao no lazain’i Jehovah: Tandremo ny fanahinareo, ka aza mitondra entana amin’ny andro Sabata, ary aza mampiditra entana amin’ny vavahadin’i Jerosalema; '
  '22':
  - type: text
    content: 'ary aza mitondra entana mivoaka avy amin’ny tranonareo amin’ny andro Sabata, na manao raharaha akory; fa hamasino ny andro Sabata araka izay efa nandidiako ny razanareo. '
  '23':
  - type: text
    content: Nefa tsy nihevitra izy, na nanongilana ny sofiny, fa nanamafy ny hatony mba tsy hihaino na hino anatra.
  '24':
  - type: text
    content: 'Ary raha mihaino Ahy tokoa hianareo, hoy Jehovah, ka tsy mampiditra entana amin’ny vavahadin’ity tanàna ity amin’ny andro Sabata, ka tsy manao raharaha amin’izany,– '
  '25':
  - type: text
    content: 'izay mpanjaka sy mpanapaka mipetraka eo amin’ny seza fiandrianan’i Davida dia hiditra amin’ny vavahadin’ity tanàna ity mitaingina kalesy sy soavaly, dia izy sy ny mpanapaka sy ny Joda ary ny mponina eto Jerosalema, ka honenana mandrakizay ity tanàna ity. '
  '26':
  - type: text
    content: Ary ho avy ny olona avy amin’ny tanànan’ny Joda sy ny manodidina an’i Jerosalema sy ny tanin’ny Benjamina sy ny tany lemaka amoron-tsiraka
  - type: note
    content: Heb. Sefela.
  - type: text
    content: ' sy ny tany havoana ary ny tany atsimo ka hitondra fanatitra dorana sy fanatitra hafa alatsa-dra ary fanatitra hohanina sy ditin-kazo mani-pofona ary hitondra fanati-pisaorana ho ao an-tranon’i Jehovah.'
  '27':
  - type: text
    content: Fa raha tsy mihaino Ahy kosa hianareo ka tsy manamasina ny andro Sabata, fa mitondra entana miditra amin’ny vavahadin’i Jerosalema ihany amin’ny andro Sabata, dia handrehitra afo tsy mety maty eo am-bavahadiny Aho handevonana ny tranobe eto Jerosalema.
  '3':
  - type: text
    content: Ry tendrombohitro any an-tsaha,
  - type: text
    content: Ny fanananao sy ny rakitrao rehetra dia hatolotro ho babo,
  - type: text
    content: Eny, na dia ny fitoerana avonao koa aza noho ny fahotana tao anatin’ny fari-taninao rehetra.
  '4':
  - type: text
    content: Ary avy amin’ny tenanao ihany no mahatonga ny hamoizanao ny lovanao izay nomeko anao;
  - type: text
    content: Ary hampanompoiko ny fahavalonao any amin’ny tany izay tsy fantatrao hianao;
  - type: text
    content: Fa narehitrareo ny afon’ny fahatezerako,
  - type: note
    content: Heb. Fa misy afo narehitrareo tamin’ny fahatezerako.
  - type: text
    content: Izay hirehitra mandrakizay.
  - type: heading
    content: Ny amin’ny fahatokiana olona sy ny fahatokiana an’Andriamanitra, ary ny vavaka nataon’i Jeremia nangatahany famonjena
  '5':
  - type: text
    content: 'IZAO no lazain’i Jehovah:'
  - type: text
    content: Ho voaozona izay olona matoky olona
  - type: text
    content: Sy manao ny nofo ho sandriny,
  - type: text
    content: Ka miala amin’i Jehovah ny fony.
  '6':
  - type: text
    content: Fa ho tahaka ny olona mahantra any
  - type: note
    content: 'Na: ny anjavidy.'
  - type: text
    content: ' an-tani-hay izy'
  - type: text
    content: Ka tsy mba hahita, na dia avy aza ny soa;
  - type: text
    content: Fa honina any amin’ny tany karankaina any an-efitra,
  - type: text
    content: Dia any amin’ny tany sira izay tsy onenana.
  '7':
  - type: text
    content: Hotahina izay olona matoky an’i Jehovah,
  - type: text
    content: Dia izay manana an’i Jehovah ho tokiny.
  '8':
  - type: text
    content: Fa ho toy ny hazo ambolena eo amoron-drano izy,
  - type: text
    content: Izay mamaka eo anilan’ny rano mandeha;
  - type: text
    content: Ka tsy hatahotra, na dia avy aza ny hainandro,
  - type: text
    content: Sady ho maitso ny raviny,
  - type: text
    content: Ka tsy hanahy izy, na dia mihantona aza ny andro,
  - type: text
    content: Fa tsy hitsahatra ny famoany.
  '9':
  - type: text
    content: Ny fo dia mamitaka mihoatra noho ny zavatra rehetra sady manana aretina tsy azo sitranina;
  - type: text
    content: Iza moa no mahafantatra ny aminy?
