document_id: JER.17
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny fahotan’ny Joda dia voasoratra tamin’ny vy fanoratana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tamin’ny diamondra fanoratana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voasoratra ao am-pony tahaka ny amin’ny vato fisaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy eo amin’ny tandroky ny alitarany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: alitaranareo.
    marker-yv: yv-n
  - type: text
    text: ' izany,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia amin’izay hahatsiarovan’ny zanany ny alitarany sy ny Aserahany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaran’andriamani-tsi-izy, na ny sariny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Akaikin’ny hazo maitso, ambonin’ny havoana andrandraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ry tendrombohitro any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanananao sy ny rakitrao rehetra dia hatolotro ho babo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia ny fitoerana avonao koa aza noho ny fahotana tao anatin’ny fari-taninao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary avy amin’ny tenanao ihany no mahatonga ny hamoizanao ny lovanao izay nomeko anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampanompoiko ny fahavalonao any amin’ny tany izay tsy fantatrao hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa narehitrareo ny afon’ny fahatezerako,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa misy afo narehitrareo tamin’ny fahatezerako.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hirehitra mandrakizay.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fahatokiana olona sy ny fahatokiana an’Andriamanitra, ary ny vavaka nataon’i Jeremia nangatahany famonjena
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'IZAO no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho voaozona izay olona matoky olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy manao ny nofo ho sandriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miala amin’i Jehovah ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ho tahaka ny olona mahantra any
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny anjavidy.
    marker-yv: yv-n
  - type: text
    text: ' an-tani-hay izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mba hahita, na dia avy aza ny soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa honina any amin’ny tany karankaina any an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’ny tany sira izay tsy onenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hotahina izay olona matoky an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay manana an’i Jehovah ho tokiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ho toy ny hazo ambolena eo amoron-drano izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mamaka eo anilan’ny rano mandeha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hatahotra, na dia avy aza ny hainandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ho maitso ny raviny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hanahy izy, na dia mihantona aza ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hitsahatra ny famoany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fo dia mamitaka mihoatra noho ny zavatra rehetra sady manana aretina tsy azo sitranina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza moa no mahafantatra ny aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izaho Jehovah no Mpandinika ny fo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy Mpamantatra ny voa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanome ny olona rehetra araka ny alehany avy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia araka ny vokatry ny asany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Toy ny tsipoy mikotrika izay tsy atodiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia toy izany izay mahazo harena tsy amin’ny rariny:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handao azy amin’ny an-tenatenan’androny izany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hilaozan’izany eo an-tenatenan’androny izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho adala no farany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Seza fiandrianana be voninahitra sady avo hatramin’ny voalohany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fitoera-masintsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ry Jehovah, Fanantenan’ny Isiraely ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho menatra izay rehetra mahafoy Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hosoratana amin’ny vovoka izay miala aminao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amiko.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria izy efa nahafoy an’i Jehovah, loharano velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jehovah ô, sitrano aho, dia ho sitrana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho, dia ho voavonjy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no fidèrako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Indro, ireo dia manao amiko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza ny tenin’i Jehovah?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho tanteraka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa izaho tsy nihifikifika niala tsy ho mpiandry manaraka Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny andro hihavian’ny loza dia tsy nohaikaiko,–eny, fantatrao izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay efa nivoaka tamin’ny molotro dia miharihary eo anatrehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Enga anie ka tsy ho fampitahorana ahy Hianao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aroko amin’ny andro fahoriana Hianao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka ho menatra izay manenjika ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izaho kosa aoka tsy mba ho menatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hivadi-po ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izaho kosa aoka tsy mba hivadi-po;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy tonga aminy ny andro fahoriana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahatorotoroana roa heny no anorotoroy azy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny hanamasinana ny Sabata.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'IZAO no nolazain’i Jehovah tamiko: Mandehana, ka mitsangàna eo amin’ny vavahadim-bahoaka, dia ilay fandehanan’ny mpanjakan’ny Joda miditra sy mivoaka, ary eo amin’ny vavahady rehetra eto Jerosalema '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ka lazao amin’ny olona hoe: Henoinareo, ny tenin’i Jehovah, ry mpanjakan’ny Joda sy ry Joda rehetra ary hianareo mponina rehetra eto Jerosalema, izay miditra amin’ireto vavahady ireto. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izao no lazain’i Jehovah: Tandremo ny fanahinareo, ka aza mitondra entana amin’ny andro Sabata, ary aza mampiditra entana amin’ny vavahadin’i Jerosalema; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary aza mitondra entana mivoaka avy amin’ny tranonareo amin’ny andro Sabata, na manao raharaha akory; fa hamasino ny andro Sabata araka izay efa nandidiako ny razanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nefa tsy nihevitra izy, na nanongilana ny sofiny, fa nanamafy ny hatony mba tsy hihaino na hino anatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary raha mihaino Ahy tokoa hianareo, hoy Jehovah, ka tsy mampiditra entana amin’ny vavahadin’ity tanàna ity amin’ny andro Sabata, ka tsy manao raharaha amin’izany,– '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'izay mpanjaka sy mpanapaka mipetraka eo amin’ny seza fiandrianan’i Davida dia hiditra amin’ny vavahadin’ity tanàna ity mitaingina kalesy sy soavaly, dia izy sy ny mpanapaka sy ny Joda ary ny mponina eto Jerosalema, ka honenana mandrakizay ity tanàna ity. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ho avy ny olona avy amin’ny tanànan’ny Joda sy ny manodidina an’i Jerosalema sy ny tanin’ny Benjamina sy ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sefela.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tany havoana ary ny tany atsimo ka hitondra fanatitra dorana sy fanatitra hafa alatsa-dra ary fanatitra hohanina sy ditin-kazo mani-pofona ary hitondra fanati-pisaorana ho ao an-tranon’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa raha tsy mihaino Ahy kosa hianareo ka tsy manamasina ny andro Sabata, fa mitondra entana miditra amin’ny vavahadin’i Jerosalema ihany amin’ny andro Sabata, dia handrehitra afo tsy mety maty eo am-bavahadiny Aho handevonana ny tranobe eto Jerosalema.
