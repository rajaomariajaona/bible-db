document_id: PSA.20
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vavaka ho an’ny mpanjaka raha mivoaka hanafika.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventry hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: HIHAINO anao anie Jehovah amin’ny andro fahoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitondra anao ho any amin’ny avo anie ny anaran’Andriamanitr’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hahatonga famonjena ho anao avy amin’ny fitoerana masina anie Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanohana anao avy any Ziona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hahatsiaro ny fanatitra hohaninao rehetra anie Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hankasitraka ny fanatitra doranao.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanome anao araka ny fonao anie Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahatanteraka ny fisainanao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka hihoby noho ny famonjena azonao izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny anaran’Andriamanitray no hanangananay faneva;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotanterahin’i Jehovah anie ny angatahinao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ankehitriny dia fantatro fa Jehovah mamonjy ny voahosony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamaly azy avy amin’ny lanitry ny fahamasinany Izy amin’ny herin’ny famonjen’ny tànany ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny sasany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mitoky
  - type: text
    text: ' amin’ny kalesy, ary ny sasany amin’ny soavaly;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha izahay kosa, dia ny anaran’i Jehovah Andriamanitray no hoderainay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ireo dia reraka sady lavo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izahay kosa efa mitsangana sy mijoro,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehovah ô, vonjeo ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamaly anay anie Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jehovah ô, vonjeo! Hamaly anay anie ny Mpanjaka.
    marker-yv: yv-n
  - type: text
    text: ' amin’izay andro iantsoanay Azy.'
