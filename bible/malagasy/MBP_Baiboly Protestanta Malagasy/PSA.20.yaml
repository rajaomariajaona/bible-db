document_id: PSA.20,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ho an’ny mpanjaka raha mivoaka hanafika.
  - type: text
    content: Ho an’ny mpiventry hira. Salamo nataon’i Davida.
  - type: text
    content: HIHAINO anao anie Jehovah amin’ny andro fahoriana;
  - type: text
    content: Hitondra anao ho any amin’ny avo anie ny anaran’Andriamanitr’i Jakoba.
  '2':
  - type: text
    content: Hahatonga famonjena ho anao avy amin’ny fitoerana masina anie Izy
  - type: text
    content: Ary hanohana anao avy any Ziona.
  '3':
  - type: text
    content: Hahatsiaro ny fanatitra hohaninao rehetra anie Izy
  - type: text
    content: Ary hankasitraka ny fanatitra doranao.
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: Hanome anao araka ny fonao anie Izy
  - type: text
    content: Ary hahatanteraka ny fisainanao rehetra.
  '5':
  - type: text
    content: Aoka hihoby noho ny famonjena azonao izahay,
  - type: text
    content: Ary amin’ny anaran’Andriamanitray no hanangananay faneva;
  - type: text
    content: Hotanterahin’i Jehovah anie ny angatahinao rehetra.
  '6':
  - type: text
    content: Ankehitriny dia fantatro fa Jehovah mamonjy ny voahosony;
  - type: text
    content: Hamaly azy avy amin’ny lanitry ny fahamasinany Izy amin’ny herin’ny famonjen’ny tànany ankavanana.
  '7':
  - type: text
    content: 'Ny sasany '
  - type: text
    content: mitoky
  - type: text
    content: ' amin’ny kalesy, ary ny sasany amin’ny soavaly;'
  - type: text
    content: Fa raha izahay kosa, dia ny anaran’i Jehovah Andriamanitray no hoderainay.
  '8':
  - type: text
    content: Ireo dia reraka sady lavo;
  - type: text
    content: Fa izahay kosa efa mitsangana sy mijoro,
  '9':
  - type: text
    content: Jehovah ô, vonjeo ny mpanjaka;
  - type: text
    content: Hamaly anay anie Izy
  - type: note
    content: 'Na: Jehovah ô, vonjeo! Hamaly anay anie ny Mpanjaka.'
  - type: text
    content: ' amin’izay andro iantsoanay Azy.'
