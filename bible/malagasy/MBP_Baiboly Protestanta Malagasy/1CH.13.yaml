document_id: 1CH.13
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namindrana ny fiara niala tao Kiriata-jearima, sy ny nitoerany tao an-tranon’i Obed-edoma.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Davida naka saina tamin’ny mpifehy arivo sy ny mpifehy zato, dia ny mpifehy rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hoy Davida tamin’ny Isiraely rehetra izay tafangona: Raha ataonareo ho mety, sady avy amin’i Jehovah Andriamanitsika izany, dia andeha isika haniraka faingana any amin’ny rahalahintsika rehetra izay sisa amin’ny tanin’ny Isiraely rehetra ary amin’ny mpisorona sy ny Levita koa, izay any amin’ny tanànany sy ny tany manodidina azy, mba hivory atỳ amintsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary aoka ho entintsika atỳ amintsika indray ny fiaran’Andriamanitsika; fa tsy nahoantsika tamin’ny andron’i Saoly izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny olona rehetra izay tafangona dia nanaiky hanao izany, satria marina teo imason’ny olona rehetra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia novorin’i Davida ny Isiraely rehetra hatrany Sihora any Egypta ka hatrany akaikin’i Hamata haka ny fiaran’Andriamanitra avy any Kiriata-jearima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia niakatra Davida sy ny Isiraely rehetra hankany Bala any Joda (Kiriata-jearima izany) hampakatra ny fiaran’i Jehovah Andriamanitra, Izay mipetraka amin’ny kerobima, dia ilay niantsoany ny anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nentiny tamin’ny sariety vaovao niala tao an-tranon’i Abinadaba ny fiaran’Andriamanitra, ary Oza sy Ahio no nampandeha ny sariety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Davida sy ny Isiraely rehetra dia nitsinjaka fatratra teo anatrehan’Andriamanitra tamin’ny hira sy ny lokanga sy ny valiha sy ny ampongatapaka sy ny kipantsona ary ny trompetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony tonga teo amin’ny famoloan’i Kidona izy, dia naninjitra ny tànany hihazona ny fiara Oza, satria nazeran’ny omby izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nirehitra tamin’i Oza ny fahatezeran’i Jehovah, ka namely azy Izy noho ny naninjirany ny tànany tamin’ny fiara, dia maty teo anatrehan’Andriamanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary dia tezitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nalahelo.
    marker-yv: yv-n
  - type: text
    text: ' Davida noho ny namelezan’i Jehovah an’i Oza, ka dia nataony hoe Perez-oza'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perez-oza = Famelezana an’i Oza.
    marker-yv: yv-n
  - type: text
    text: ' no anaran’izany tany izany mandraka andro-any.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Davida natahotra an’Andriamanitra tamin’izany andro izany ka nanao hoe: Nahoana aho no hitondra ny fiaran’Andriamanitra ho atỳ amiko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia tsy nafindran’i Davida ho ao aminy ao an-Tanànan’i Davida ny fiara, fa naviliny ho ao an-tranon’i Obed-edoma Gatita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nipetraka telo volana tao amin’ny ankohonan’i Obed-edoma tao an-tranony ny fiaran’Andriamanitra; ka dia notahin’i Jehovah ny ankohonan’i Obed-edoma sy izay rehetra nananany.
