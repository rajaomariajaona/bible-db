document_id: 1CH.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namindrana ny fiara niala tao Kiriata-jearima, sy ny nitoerany tao an-tranon’i Obed-edoma.
  - type: text
    content: 'ARY Davida naka saina tamin’ny mpifehy arivo sy ny mpifehy zato, dia ny mpifehy rehetra, '
  '10':
  - type: text
    content: 'Dia nirehitra tamin’i Oza ny fahatezeran’i Jehovah, ka namely azy Izy noho ny naninjirany ny tànany tamin’ny fiara, dia maty teo anatrehan’Andriamanitra izy. '
  '11':
  - type: text
    content: Ary dia tezitra
  - type: note
    content: 'Na: nalahelo.'
  - type: text
    content: ' Davida noho ny namelezan’i Jehovah an’i Oza, ka dia nataony hoe Perez-oza'
  - type: note
    content: Perez-oza = Famelezana an’i Oza.
  - type: text
    content: ' no anaran’izany tany izany mandraka andro-any.'
  '12':
  - type: text
    content: 'Ary Davida natahotra an’Andriamanitra tamin’izany andro izany ka nanao hoe: Nahoana aho no hitondra ny fiaran’Andriamanitra ho atỳ amiko? '
  '13':
  - type: text
    content: Dia tsy nafindran’i Davida ho ao aminy ao an-Tanànan’i Davida ny fiara, fa naviliny ho ao an-tranon’i Obed-edoma Gatita.
  '14':
  - type: text
    content: Ary nipetraka telo volana tao amin’ny ankohonan’i Obed-edoma tao an-tranony ny fiaran’Andriamanitra; ka dia notahin’i Jehovah ny ankohonan’i Obed-edoma sy izay rehetra nananany.
  '2':
  - type: text
    content: 'ka hoy Davida tamin’ny Isiraely rehetra izay tafangona: Raha ataonareo ho mety, sady avy amin’i Jehovah Andriamanitsika izany, dia andeha isika haniraka faingana any amin’ny rahalahintsika rehetra izay sisa amin’ny tanin’ny Isiraely rehetra ary amin’ny mpisorona sy ny Levita koa, izay any amin’ny tanànany sy ny tany manodidina azy, mba hivory atỳ amintsika; '
  '3':
  - type: text
    content: 'ary aoka ho entintsika atỳ amintsika indray ny fiaran’Andriamanitsika; fa tsy nahoantsika tamin’ny andron’i Saoly izany. '
  '4':
  - type: text
    content: Ary ny olona rehetra izay tafangona dia nanaiky hanao izany, satria marina teo imason’ny olona rehetra izany.
  '5':
  - type: text
    content: 'Dia novorin’i Davida ny Isiraely rehetra hatrany Sihora any Egypta ka hatrany akaikin’i Hamata haka ny fiaran’Andriamanitra avy any Kiriata-jearima. '
  '6':
  - type: text
    content: Dia niakatra Davida sy ny Isiraely rehetra hankany Bala any Joda (Kiriata-jearima izany) hampakatra ny fiaran’i Jehovah Andriamanitra, Izay mipetraka amin’ny kerobima, dia ilay niantsoany ny anarany.
  '7':
  - type: text
    content: 'Ary nentiny tamin’ny sariety vaovao niala tao an-tranon’i Abinadaba ny fiaran’Andriamanitra, ary Oza sy Ahio no nampandeha ny sariety. '
  '8':
  - type: text
    content: Ary Davida sy ny Isiraely rehetra dia nitsinjaka fatratra teo anatrehan’Andriamanitra tamin’ny hira sy ny lokanga sy ny valiha sy ny ampongatapaka sy ny kipantsona ary ny trompetra.
  '9':
  - type: text
    content: 'Ary nony tonga teo amin’ny famoloan’i Kidona izy, dia naninjitra ny tànany hihazona ny fiara Oza, satria nazeran’ny omby izany. '
