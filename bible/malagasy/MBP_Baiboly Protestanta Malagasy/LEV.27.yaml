document_id: LEV.27,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Lalàna ny amin’ny voady sy ny fahafolon-karena.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tsy hanova na hanakalo izany izy, na ny tsara ho solon’ny ratsy, na ny ratsy ho solon’ny tsara; ary raha biby no atakalony biby, dia samy ho masina izy sy ny takalony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa raha biby maloto izay tsy fanao fanatitra ho an’i Jehovah kosa izany, dia ho entina eo anatrehan’ny mpisorona izy; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary ny mpisorona hanombana azy, na tsara, na ratsy; koa araka izay hataonao mpisorona tombany no izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa raha ta-hanavotra azy ny tompony, dia hampiany ho tonga avy fahenina izay nataonao tombany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary raha misy olona manamasina ny tranony ho an’i Jehovah, dia hotombanan’ny mpisorona ny trano, na tsara, na ratsy; koa araka izay hataon’ny mpisorona tombany no izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary raha tian’ny tompony havotana ny tranony izay nohamasininy, dia hampiany ho tonga avy fahenina ny vola nataonao tombany, dia ho azy ny trano.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary raha misy olona manamasina ho an’ Jehovah ny sasany amin’ny zara-taniny, dia hotombananao izy araka ny voan-javatra famafy eo; ny voam-bary hordea iray homera hotombananao sekely volafotsy dimam-polo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Raha misy manamasina ny taniny, raha vao afaka ny Jobily, dia araka izay hataonao tombany no izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa raha misy manamasina ny taniny ao aorian’ny Jobily, dia holazain’ny mpisorona aminy ny vola araka ny taona sisa, dia hatramin’ny taona Jobily, ary hahena araka izany no hanaovanao ny tombany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary raha tian’ilay nanamasina azy havotana ny tany, dia hampiany ho tonga avy fahenina ny vola nataonao tombany, ka dia ho tapaka ho azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Raha misy olona hanala voady,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hivoady.
      marker-yv: yv-n
    - type: text
      text: ' dia ho an’i Jehovah izy araka izay hataonao tombany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary raha tsy hanavotra ny tany izy, na efa nivarotra azy tamin’olon-kafa, dia tsy ho azo avotana intsony izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa raha afaka amin’ny Jobily ny tany, dia ho masina ho an’i Jehovah tahaka ny saha voatokana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: atao herema.
      marker-yv: yv-n
    - type: text
      text: ' izany; ny mpisorona no ho tompony.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary raha misy manamasina ho an’i Jehovah ny tany novidiny, izay tsy amin’ny zara-taniny, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'dia holazain’ny mpisorona aminy ny hevitry ny ataonao tombany, dia hatramin’ny taona Jobily; ary dia handoa izay nataonao tombany amin’izany andro izany izy ho zava-masina ho an’i Jehovah. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Amin’ny taona Jobily no hodian’ny tany amin’izay nividianana azy, dia ho an’izay tompon-dova.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ny tombany rehetra izay hataonao dia ho araka ny sekely masina: ho gera roa-polo ny sekely iray.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa ny voalohan-teraky ny biby fiompy, dia izay voalohan-teraka ho an’i Jehovah, aoka tsy hisy olona hanamasina izany, na omby, na ondry, na osy, fa an’i Jehovah izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa raha biby maloto kosa, dia havotany araka izay hataonao tombany, ary hampiany ho tonga avy fahenina; fa raha tsy havotana izy, dia hamidy araka izay nataonao tombany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Kanefa ny zavatra rehetra izay atokan’ny olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: atao herema.
      marker-yv: yv-n
    - type: text
      text: ' ho an’i Jehovah amin’izay ananany, na olona, na biby fiompy, na tany izay fananany, dia tsy hamidy, na havotana; masina dia masina ho an’i Jehovah ny zavatra rehetra izay atokana.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: atao herema.
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny olona rehetra izay atokana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hivoady.
      marker-yv: yv-n
    - type: text
      text: ' dia tsy havotana, fa hatao maty tokoa.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ny hataonao tomban’ny lehilahy hatramin’ny roa-polo taona ka hatramin’ny enim-polo taona dia sekely volafotsy dimam-polo araka ny sekely masina; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary ny ampahafolon’ny vokatra rehetra ao amin’ny tany, na avy amin’ny tanimbary, na avy amin’ny saha, dia an’i Jehovah; masina ho an’i Jehovah izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary raha misy tian’ny tompony havotana ny ampahafolon’ny vokatra, dia hampiany ho tonga avy fahenina izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary ny amin’ny ampahafolon’ny omby, na ny ondry, na ny osy, dia ny ampahafolon’izay rehetra mandalo eo ambanin’ny tehin’
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny mpiandry
    - type: text
      text: ', ho masina ho an’i Jehovah. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Tsy hizaha ny tsara na ratsy izy, ary tsy hanakalo azy; ary raha misy takalozany, dia samy ho masina avokoa izy sy ny takalony ka tsy havotana.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ireo no didy izay nandidian’i Jehovah an’i Mosesy ho amin’ny Zanak’Isiraely teo an-tendrombohitra Sinay.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa raha vehivavy, dia sekely telo-polo kosa no hataonao tombany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary raha hatramin’ny dimy taona ka hatramin’ny roa-polo taona izy, dia sekely roa-polo no hataonao tomban’ny lehilahy; ary raha vehivavy, dia sekely folo kosa. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary raha hatramin’ny iray volana ka hatramin’ny dimy taona, dia sekely volafotsy dimy no hataonao tomban’ny zazalahy; ary sekely volafotsy telo kosa no hataonao tomban’ny zazavavy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary raha hatramin’ny enim-polo taona no ho miakatra izy, raha lehilahy, dia ho sekely dimy ambin’ny folo no hataonao tombany; ary raha vehivavy, dia sekely folo kosa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary raha malahelo kosa izy ka tsy mahaloa izay hataonao ho tombany, dia ho entina eo anatrehan’ny mpisorona izy, ary ny mpisorona hanombana azy; araka izay takatry ny ananan’ilay nivoady no hanombanan’ny mpisorona azy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary raha biby fiompy izay fanao fanatitra ho an’i Jehovah, dia ho masina ho an’i Jehovah izay rehetra omena amin’izany. '
