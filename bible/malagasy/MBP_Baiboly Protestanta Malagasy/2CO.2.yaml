document_id: 2CO.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ninia toy izao tato am-poko aho, dia ny tsy hankatỳ aminareo indray amin’alahelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha mampalahelo anareo aho, iza moa no mampifaly ahy, afa-tsy ilay nampalaheloviko ihany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nanoratra izany indrindra aho, fandrao, rehefa tonga aho, dia hahazo alahelo amin’izay tokony hifaliako, satria matoky anareo rehetra aho, fa ny fifaliako dia anareo rehetra koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa tamin’ny haben’ny fahoriana sy ny alahelon’ny foko no nanoratako taminareo tamin’ny ranomaso be, tsy ny hampalahelovana anareo, fa ny mba hahafantaranareo ny fitiavana izay itiavako anareo indrindra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha nisy efa nampalahelo, dia tsy nampalahelo ahy ihany izy (nefa tsy ta-hanao teny mafy loatra aho), fa mba nampalahelo anareo rehetra koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ampy ho amin’izany olona izany ny fampijaliana nataon’ny maro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ka dia aleo mamela heloka sy mampifaly azy kosa hianareo, fandrao dia resin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: atelin’.
    marker-yv: yv-n
  - type: text
    text: ' ny fitomboan’alahelo izany olona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa mananatra anareo aho mba hekenareo horaisina tsara amin’ny fitiavana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izany koa no nanoratako, mba ho fantatro izay toetrareo, na manaiky amin’ny zavatra rehetra hianareo, na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izay avelanareo heloka dia mba avelako heloka koa; ary izaho anefa, raha nisy heloka navelako, dia noho ny aminareo no namelako azy teo imason’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nisolo any.
    marker-yv: yv-n
  - type: text
    text: ' i Kristy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fandrao ho resin’ny fitak’i Satana isika, fa fantatsika ny hafetseny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa tonga tany Troasy hitory ny filazantsaran’i Kristy aho, ka novohana varavarana ao amin’ny Tompo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia tsy tafandry ny fanahiko, satria tsy nahita an’i Titosy rahalahiko aho; fa nanao veloma ny olona aho, dia niala teo nankany Makedonia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa isaorana anie Andriamanitra, Izay mitondra anay mandrakariva ao amin’i Kristy toy ny fanaon’izay avy nandresy, ka dia ampisehoany ny hanitry ny fahalalana Azy eny tontolo eny izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hanitr’i Kristy ho an’Andriamanitra izahay amin’izay hovonjena sy izay ho very: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'amin’ny sasany dia hanitra avy amin’ny fahafatesana ho amin’ny fahafatesana; fa amin’ny sasany kosa dia hanitra avy amin’ny fiainana ho amin’ny fiainana. Koa iza moa no antonona ho amin’izany zavatra izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa tsy mba toy ny maro izay manatsatso ny tenin’Andriamanitra hahazoam-bola izahay; fa toy ny amin’ny fahadiovam-po kosa, dia avy amin’Andriamanitra sady eo anatrehan’Andriamanitra no itenenanay ao amin’i Kristy.
