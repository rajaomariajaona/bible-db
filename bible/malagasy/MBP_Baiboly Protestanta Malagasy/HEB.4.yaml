document_id: HEB.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa na dia mbola misy teny fikasana fa hiditra any amin’ny fitsaharany aza isika, dia aoka isika hatahotra, fandrao mba misy eo aminareo toa tsy mahatratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izany.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa isika koa dia nitoriana filazantsara tahaka ireny ihany; kanefa ny teny izay efa reny dia tsy nahasoa azy, satria tsy niharo finoana tao amin’izay nandre.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: satria tsy nampiraisin’ny finoana tamin’izay nandre izy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa isika izay nino no miditra amin’izany fitsaharana izany, araka ny voalazany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Toy ny nianianako tamin’ny fahatezerako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiditra amin’ny fitsaharako mihitsy izy’’ (Sal. 95.11),
- type: usfm
  marker: m
  children:
  - type: text
    text: 'na dia vita hatramin’ny nanorenana izao tontolo izao aza ny asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa nilaza ny andro fahafito Izy eo amin’ny teny anankiray araka izao: ,,Ary Andriamanitra nitsahatra tamin’ny asany rehetra tamin’ny andro fahafito’’ (Gen. 2.3). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary amin’izao koa:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Tsy hiditra amin’ny fitsaharako mihitsy izy’’ (Sal. 95.11).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa satria mbola hiditra eo ihany ny sasany, ary izay nitoriana filazantsara tamin’ny voalohany dia tsy niditra noho ny tsi-finoana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia mametra andro anankiray indray Izy, na dia efa ela toy izany aza, milaza ao amin’i Davida hoe: ,,Anio,’’ araka ny voalaza teo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Anio, raha hihaino ny feony hianareo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manamafy ny fonareo’’ (Sal. 95.7, 8)
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha Josoa no nanome azy fitsaharana, dia tsy mba ho nilaza andro hafa Izy tao aorian’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa dia mbola misy sabata fitsaharana ho an’ny olon’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izay niditra tao amin’ny fitsaharany, dia Izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izy.
    marker-yv: yv-n
  - type: text
    text: ' koa no nitsahatra tamin’ny asany, tahaka an’Andriamanitra tamin’ny Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa aoka isika hazoto hiditra amin’izany fitsaharana izany, fandrao hisy olona latsaka amin’ny tsi-finoana tahaka izany koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa velona sy mahery ny tenin’Andriamanitra ka maranitra noho ny sabatra roa lela, ka manindrona hatramin’ny fampisarahana ny aina sy ny fanahy ary ny tonona sy ny tsoka, ka mahay mamantatra ny eritreritra sy ny fisainan’ny fo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary tsy misy zavatra ary na inona na inona izay tsy miseho eo anatrehany; fa ny zavatra rehetra dia mihanjahanja sy aharihary eo imason’Izay iafaran’ny ataontsika.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fampitahana an’i Kristy sy ny mpisoronabe.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'KOA satria isika manana Mpisoronabe lehibe, Izay lasa namaky ny lanitra, dia Jesosy, Zanak’Andriamanitra, aoka isika hihazona ilay efa nekentsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa isika tsy manana mpisoronabe izay tsy mahay miara-mitondra ny fahalementsika, fa Izay efa nalaim-panahy tamin’ny zavatra rehetra tahaka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: antsika, kanefa
  - type: text
    text: ' tsy nanana ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa aoka isika hanatona ny seza fiandrianan’ny fahasoavana amin’ny fahasahiana, mba hahazoantsika famindrampo sy hahitantsika fahasoavana ho famonjena amin’izay andro mahory.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tandrfin’izany.
    marker-yv: yv-n
