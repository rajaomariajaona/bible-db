document_id: HEB.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa na dia mbola misy teny fikasana fa hiditra any amin’ny fitsaharany aza isika, dia aoka isika hatahotra, fandrao mba misy eo aminareo toa tsy mahatratra '
  - type: text
    content: izany.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Fa izay niditra tao amin’ny fitsaharany, dia Izy
  - type: note
    content: 'Na: izy.'
  - type: text
    content: ' koa no nitsahatra tamin’ny asany, tahaka an’Andriamanitra tamin’ny Azy. '
  '11':
  - type: text
    content: Koa aoka isika hazoto hiditra amin’izany fitsaharana izany, fandrao hisy olona latsaka amin’ny tsi-finoana tahaka izany koa.
  '12':
  - type: text
    content: 'Fa velona sy mahery ny tenin’Andriamanitra ka maranitra noho ny sabatra roa lela, ka manindrona hatramin’ny fampisarahana ny aina sy ny fanahy ary ny tonona sy ny tsoka, ka mahay mamantatra ny eritreritra sy ny fisainan’ny fo. '
  '13':
  - type: text
    content: Ary tsy misy zavatra ary na inona na inona izay tsy miseho eo anatrehany; fa ny zavatra rehetra dia mihanjahanja sy aharihary eo imason’Izay iafaran’ny ataontsika.
  - type: heading
    content: Fampitahana an’i Kristy sy ny mpisoronabe.
  '14':
  - type: text
    content: 'KOA satria isika manana Mpisoronabe lehibe, Izay lasa namaky ny lanitra, dia Jesosy, Zanak’Andriamanitra, aoka isika hihazona ilay efa nekentsika. '
  '15':
  - type: text
    content: 'Fa isika tsy manana mpisoronabe izay tsy mahay miara-mitondra ny fahalementsika, fa Izay efa nalaim-panahy tamin’ny zavatra rehetra tahaka '
  - type: text
    content: antsika, kanefa
  - type: text
    content: ' tsy nanana ota. '
  '16':
  - type: text
    content: Koa aoka isika hanatona ny seza fiandrianan’ny fahasoavana amin’ny fahasahiana, mba hahazoantsika famindrampo sy hahitantsika fahasoavana ho famonjena amin’izay andro mahory.
  - type: note
    content: Gr. tandrfin’izany.
  '2':
  - type: text
    content: Fa isika koa dia nitoriana filazantsara tahaka ireny ihany; kanefa ny teny izay efa reny dia tsy nahasoa azy, satria tsy niharo finoana tao amin’izay nandre.
  - type: note
    content: 'Na: satria tsy nampiraisin’ny finoana tamin’izay nandre izy.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Fa isika izay nino no miditra amin’izany fitsaharana izany, araka ny voalazany hoe:'
  - type: text
    content: ',,Toy ny nianianako tamin’ny fahatezerako hoe:'
  - type: text
    content: Tsy hiditra amin’ny fitsaharako mihitsy izy’’ (Sal. 95.11),
  - type: text
    content: 'na dia vita hatramin’ny nanorenana izao tontolo izao aza ny asa. '
  '4':
  - type: text
    content: 'Fa nilaza ny andro fahafito Izy eo amin’ny teny anankiray araka izao: ,,Ary Andriamanitra nitsahatra tamin’ny asany rehetra tamin’ny andro fahafito’’ (Gen. 2.3). '
  '5':
  - type: text
    content: 'Ary amin’izao koa:'
  - type: text
    content: ',,Tsy hiditra amin’ny fitsaharako mihitsy izy’’ (Sal. 95.11).'
  '6':
  - type: text
    content: 'Koa satria mbola hiditra eo ihany ny sasany, ary izay nitoriana filazantsara tamin’ny voalohany dia tsy niditra noho ny tsi-finoana, '
  '7':
  - type: text
    content: 'dia mametra andro anankiray indray Izy, na dia efa ela toy izany aza, milaza ao amin’i Davida hoe: ,,Anio,’’ araka ny voalaza teo hoe:'
  - type: text
    content: ',,Anio, raha hihaino ny feony hianareo'
  - type: text
    content: Aza manamafy ny fonareo’’ (Sal. 95.7, 8)
  '8':
  - type: text
    content: 'Fa raha Josoa no nanome azy fitsaharana, dia tsy mba ho nilaza andro hafa Izy tao aorian’izany. '
  '9':
  - type: text
    content: 'Koa dia mbola misy sabata fitsaharana ho an’ny olon’Andriamanitra. '
