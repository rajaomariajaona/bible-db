document_id: JUD.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana ny amin’ny mpampianatra sandoka.
  - type: text
    content: 'JODA, mpanompon’i Jesosy Kristy sady rahalahin’i Jakoba, mamangy izay olona voantso, malala ao amin’Andriamanitra Ray sy voatahiry ho an’i Jesosy Kristy; '
  '10':
  - type: text
    content: 'Fa ireo kosa dia miteny ratsy izay zavatra rehetra tsy fantany akory; ary izay zavatra fantany fotsiny, tahaka '
  - type: text
    content: ny fahalalan’
  - type: text
    content: ' ny biby tsy manan-tsaina kosa, no animbany'
  - type: note
    content: 'Na: andotoany.'
  - type: text
    content: ' ny tenany. '
  '11':
  - type: text
    content: Hahita loza izy! fa efa nandeha tamin’ny làlan’i Kaina, sady efa nimaona fatratra hanaraka ny fahadisoan’i Balama hahazoany tamby, ary efa ringana tamin’ny fiodinan’i Kora izy.
  '12':
  - type: text
    content: Ireo no harambato voasaron-drano
  - type: note
    content: 'Na: Ireo no pentimpentina.'
  - type: text
    content: ' eo amin’ny fanasam-pifankatiavanareo, raha miara-mihinana aminareo izy, dia mpiandry mamahan-tena, nefa tsy matahotra; rahona tsy misy rano, entin’ny rivotra, ireo; hazo fararano, nefa tsy misy voany, indroa maty, voafongotra; '
  '13':
  - type: text
    content: onjan-dranomasina mitopatopa mamorivory ny fahamenarany; kintana mifindrafindra, ka voatahiry ho azy mandrakizay ny fahamaintisan’ny maizina.
  '14':
  - type: text
    content: 'Ary Enoka koa, ilay fahafito nandimby an’i Adama, dia efa naminany ny amin’ireny olona ireny ka nanao hoe: ,,Indro, tonga Jehovah mbamin’ny masiny tsy omby alinalina '
  '15':
  - type: text
    content: hitsara ny olona rehetra sy hampiaiky ny olona ratsy fanahy rehetra ny asan’ny haratsiam-panahy rehetra, izay nataony tamin’ny haratsiam-panahiny sy ny teny sarotra rehetra izay nitenenan’ny mpanota ratsy fanahy hanohitra Azy.’’
  '16':
  - type: text
    content: Ireo dia mpimonomonona sy mpimoimoy, mandeha araka ny filany (ary ny vavany manao teny miavonavona loatra) ka mandoka olona mba hahazoany zavatra.
  '17':
  - type: text
    content: 'Fa tsarovinareo, ry malala, ny teny voalazan’ny Apostolin’i Jesosy Kristy Tompontsika fahiny; '
  '18':
  - type: text
    content: 'fa efa nilaza taminareo hoe izy: Amin’ny andro farany dia hisy mpaniratsira, mandeha araka ny filan’ny haratsiam-panahiny. '
  '19':
  - type: text
    content: Ireo no mahatonga fisarahana, dia olona araka ny nofo ihany, fa tsy mba manana ny Fanahy.
  - type: note
    content: 'Na: tsy mba manana fanahy.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: hampitomboina ho anareo anie ny famindrampo sy ny fiadanana ary ny fitiavana.
  '20':
  - type: text
    content: 'Fa hianareo kosa, ry malala, dia ataovy izay handrosoanareo amin’ny finoanareo masina indrindra, ka mivavaha ao amin’ny Fanahy Masina; '
  '21':
  - type: text
    content: 'ary tehirizo ny tenanareo ao amin’ny fitiavan’Andriamanitra, miandry ny famindrampon’i Jesosy Kristy Tompontsika ho fiainana mandrakizay. '
  '22':
  - type: text
    content: Ary amindrao fo ny sasany izay miahanahana;
  - type: note
    content: 'Na: raha miady aminareo izy.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: ary ny sasany kosa sariho avy amin’ny afo no famonjy azy; ary ny sasany indray amindrao fo amin-tahotra, ka mankahalà na dia ny akanjo voapentimpentin’ny nofo aza.
  '24':
  - type: text
    content: 'Ary ho an’Izay maharo anareo mba tsy ho tafintohina, ary hametraka anareo tsy hanan-tsiny eo anoloan’ny voninahiny amin’ny firavoravoana, '
  '25':
  - type: text
    content: ho an’Andriamanitra tokana, Mpamonjy antsika, amin’ny alalan’i Jesosy Kristy Tompontsika anie, ny voninahitra sy ny fahalehibiazana, ny fanjakana sy ny fahefana hatramin’ny taloha indrindra sy ankehitriny ary mandrakizay. Amena.
  '3':
  - type: text
    content: 'Ry malala, raha manao izay zotom-po rehetra hanoratra aminareo aho hilaza ny amin’ny famonjena iombonantsika, dia nisy nahatery ahy hanoratra aminareo, hananatra mba hiezahanareo mafy hiaro ny finoana izay efa voatolotra indray mandeha monja ho an’ny olona masina. '
  '4':
  - type: text
    content: Fa misy olona sasany efa niditra misokosoko, izay voasoratra fahiny ho amin’izany fahamelohana izany, dia olona ratsy fanahy, izay mamadika ny fahasoavan’Andriamanitsika ho fijejojejoana sady mandà ny Andrian-tokana, dia Jesosy Kristy Tompontsika.
  - type: note
    content: 'Na: mandà ny Andrian-tokana sy Jesosy Kristy Tompontsika.'
  '5':
  - type: text
    content: 'Ary ta-hampahatsiaro anareo aho, na dia efa fantatrareo rahateo aza ny zavatra rehetra, fa rehefa novonjen’ny Tompo ho afaka tany Egypta ny olona, dia naringany ihany tao aorian’izany izay tsy nino. '
  '6':
  - type: text
    content: 'Ary ny anjely izay tsy nitana ny anjara-fanapahany, fa nandao ny fonenany, dia voahazony amin’ny fatorana mandrakizay ao amin’ny maizina ho amin’ny andro fitsarana lehibe. '
  '7':
  - type: text
    content: Ary toy izany koa, Sodoma sy Gomora mbamin’ny tanàna nanodidina azy, izay nijangajanga tahaka azy koa ka lasa nanaraka nofo hafa, dia aseho ho fananarana amin’ny iaretany fijaliana amin’ny afo maharitra mandrakizay.
  '8':
  - type: text
    content: 'Kanefa toy izany koa, ireo dia manonofy ka mandoto ny nofo sady mandà ny '
  - type: text
    content: manana
  - type: text
    content: ' fahalehibiazana ary miteny ratsy'
  - type: note
    content: Gr. manao blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' '
  - type: text
    content: ny manana
  - type: text
    content: ' voninahitra. '
  '9':
  - type: text
    content: 'Fa Mikaela arikanjely aza, raha niady tamin’ny devoly ka nifanditra ny amin’ny fatin’i Mosesy, dia tsy sahy niteny ratsy hahameloka azy, fa hoy izy: ,,Hananatra anao anie Jehovah’’. '
