document_id: JUD.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana ny amin’ny mpampianatra sandoka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'JODA, mpanompon’i Jesosy Kristy sady rahalahin’i Jakoba, mamangy izay olona voantso, malala ao amin’Andriamanitra Ray sy voatahiry ho an’i Jesosy Kristy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: hampitomboina ho anareo anie ny famindrampo sy ny fiadanana ary ny fitiavana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ry malala, raha manao izay zotom-po rehetra hanoratra aminareo aho hilaza ny amin’ny famonjena iombonantsika, dia nisy nahatery ahy hanoratra aminareo, hananatra mba hiezahanareo mafy hiaro ny finoana izay efa voatolotra indray mandeha monja ho an’ny olona masina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa misy olona sasany efa niditra misokosoko, izay voasoratra fahiny ho amin’izany fahamelohana izany, dia olona ratsy fanahy, izay mamadika ny fahasoavan’Andriamanitsika ho fijejojejoana sady mandà ny Andrian-tokana, dia Jesosy Kristy Tompontsika.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mandà ny Andrian-tokana sy Jesosy Kristy Tompontsika.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ta-hampahatsiaro anareo aho, na dia efa fantatrareo rahateo aza ny zavatra rehetra, fa rehefa novonjen’ny Tompo ho afaka tany Egypta ny olona, dia naringany ihany tao aorian’izany izay tsy nino. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny anjely izay tsy nitana ny anjara-fanapahany, fa nandao ny fonenany, dia voahazony amin’ny fatorana mandrakizay ao amin’ny maizina ho amin’ny andro fitsarana lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary toy izany koa, Sodoma sy Gomora mbamin’ny tanàna nanodidina azy, izay nijangajanga tahaka azy koa ka lasa nanaraka nofo hafa, dia aseho ho fananarana amin’ny iaretany fijaliana amin’ny afo maharitra mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanefa toy izany koa, ireo dia manonofy ka mandoto ny nofo sady mandà ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: manana
  - type: text
    text: ' fahalehibiazana ary miteny ratsy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'manao blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny manana
  - type: text
    text: ' voninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa Mikaela arikanjely aza, raha niady tamin’ny devoly ka nifanditra ny amin’ny fatin’i Mosesy, dia tsy sahy niteny ratsy hahameloka azy, fa hoy izy: ,,Hananatra anao anie Jehovah’’. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ireo kosa dia miteny ratsy izay zavatra rehetra tsy fantany akory; ary izay zavatra fantany fotsiny, tahaka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny fahalalan’
  - type: text
    text: ' ny biby tsy manan-tsaina kosa, no animbany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: andotoany.
    marker-yv: yv-n
  - type: text
    text: ' ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hahita loza izy! fa efa nandeha tamin’ny làlan’i Kaina, sady efa nimaona fatratra hanaraka ny fahadisoan’i Balama hahazoany tamby, ary efa ringana tamin’ny fiodinan’i Kora izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ireo no harambato voasaron-drano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ireo no pentimpentina.
    marker-yv: yv-n
  - type: text
    text: ' eo amin’ny fanasam-pifankatiavanareo, raha miara-mihinana aminareo izy, dia mpiandry mamahan-tena, nefa tsy matahotra; rahona tsy misy rano, entin’ny rivotra, ireo; hazo fararano, nefa tsy misy voany, indroa maty, voafongotra; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: onjan-dranomasina mitopatopa mamorivory ny fahamenarany; kintana mifindrafindra, ka voatahiry ho azy mandrakizay ny fahamaintisan’ny maizina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Enoka koa, ilay fahafito nandimby an’i Adama, dia efa naminany ny amin’ireny olona ireny ka nanao hoe: ,,Indro, tonga Jehovah mbamin’ny masiny tsy omby alinalina '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: hitsara ny olona rehetra sy hampiaiky ny olona ratsy fanahy rehetra ny asan’ny haratsiam-panahy rehetra, izay nataony tamin’ny haratsiam-panahiny sy ny teny sarotra rehetra izay nitenenan’ny mpanota ratsy fanahy hanohitra Azy.’’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ireo dia mpimonomonona sy mpimoimoy, mandeha araka ny filany (ary ny vavany manao teny miavonavona loatra) ka mandoka olona mba hahazoany zavatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa tsarovinareo, ry malala, ny teny voalazan’ny Apostolin’i Jesosy Kristy Tompontsika fahiny; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'fa efa nilaza taminareo hoe izy: Amin’ny andro farany dia hisy mpaniratsira, mandeha araka ny filan’ny haratsiam-panahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireo no mahatonga fisarahana, dia olona araka ny nofo ihany, fa tsy mba manana ny Fanahy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy mba manana fanahy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hianareo kosa, ry malala, dia ataovy izay handrosoanareo amin’ny finoanareo masina indrindra, ka mivavaha ao amin’ny Fanahy Masina; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary tehirizo ny tenanareo ao amin’ny fitiavan’Andriamanitra, miandry ny famindrampon’i Jesosy Kristy Tompontsika ho fiainana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary amindrao fo ny sasany izay miahanahana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: raha miady aminareo izy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ary ny sasany kosa sariho avy amin’ny afo no famonjy azy; ary ny sasany indray amindrao fo amin-tahotra, ka mankahalà na dia ny akanjo voapentimpentin’ny nofo aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ho an’Izay maharo anareo mba tsy ho tafintohina, ary hametraka anareo tsy hanan-tsiny eo anoloan’ny voninahiny amin’ny firavoravoana, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ho an’Andriamanitra tokana, Mpamonjy antsika, amin’ny alalan’i Jesosy Kristy Tompontsika anie, ny voninahitra sy ny fahalehibiazana, ny fanjakana sy ny fahefana hatramin’ny taloha indrindra sy ankehitriny ary mandrakizay. Amena.
