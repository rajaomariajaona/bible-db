document_id: 1CH.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny taranak’Isakara sy Benjamina sy Naftaly sy ny antsasaky ny firenen’i Manase sy Efraima ary Asera.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ny zanakalahin’Isakara dia Tola sy Poa sy Jasoba ary Simrona; efatra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny zanakalahin’i Tola dia Ozy sy Refaia sy Jeriela sy Jamay sy Jibsama ary Samoela, samy lohan’ny fianakaviany avy, dia zanak’i Tola sady samy lehilahy mahery tamin’ny fokony avy ireo; enin-jato amby roa arivo sy roa alina no isany tamin’ny andron’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny zanakalahin’i Ozy dia Jizrahia. Ary ny zanakalahin’i Jizrahia dia Mikaela sy Obadia sy Joela ary Jisia; dimy izy; loholona avokoa izy rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nanana miaramila antokotokony izy araka ny fireneny sy ny fianakaviany avy, dia enina arivo amby telo alina; fa maro ny vady aman-janak’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny rahalahiny ao amin’ny fokon’ny Isakara rehetra, izay samy lehilahy mahery, ny isan’izy rehetra araka ny firazanany avy dia fito arivo amby valo alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zanakalahin’
  - type: text
    text: ' i Benjamina dia Bela sy Bakera ary Jediaela; telo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny zanakalahin’i Bela dia Ezbona sy Ozy sy Oziela sy Jerimota ary Iry; dimy izy, ary samy lohan’ny fianakaviany avy sady lehilahy mahery avokoa; ary ny isany araka ny firazanany dia efatra amby telo-polo amby roa arivo sy roa alina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny zanakalahin’i Bakera dia Zemira sy Joasy sy Eliezera sy Elioenay sy Omry sy Jerimota sy Abia sy Anatota ary Alameta. Ireo rehetra ireo no zanakalahin’i Bakera. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny isany araka ny firazanany amin’ny fireneny, izay samy lohan’ny fianakaviany avy sady lehilahy mahery, dia roan-jato sy roa alina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny zanakalahin’i Jediaela dia Bilana; ary ny zanakalahin’i Bilana dia Jeosy sy Benjamina sy Ehoda sy Kenana sy Zetana sy Tarsisy ary Ahisahara. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ireo zanakalahin’i Jediaela rehetra ireo, araka ny lohan’ny fianakaviany, dia roan-jato amby fito arivo sy iray alina no isan’ny lehilahy mahery azo nalefa hanafika. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sopima koa sy Hopima, zanakalahin’Iry, ary Hosima, zanakalahin’i Ahera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zanakalahin’i Naftaly dia Jaziela sy Gony sy Jezera sy Saloma, samy zanakalahin’i Bila ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny zanakalahin’i Manase dia Asriela, izay naterany; fa ilay Syriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aramiana.
    marker-yv: yv-n
  - type: text
    text: ' vaditsindranony kosa no niteraka an’i Makira, rain’i Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Makira naka vady ho an’i Hopima sy Sopima; ny anaran’ny rahavaviny dia Imaka; ary ny anaran’ny manarakaraka dia Zelofada; ary Zelofada nanan-janakavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Imaka, vadin’i Makira, niteraka zazalahy, ka Paresy no nataony anarany; ary Saresy no anaran’ny rahalahiny; ary ny anaran’ny zanani-lahy dia Olama sy Rakema. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny zanakalahin’i Olama dia Bedana. Ireo no zanakalahin’i Gileada, zanakalahin’i Makira, zanakalahin’i Manase. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Hamoleketa anabaviny niteraka an’Isehoda sy Abiezera ary Mahala. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny zanakalahin’i Semida dia Ahiana sy Sekema sy Liky ary Aniama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny zanakalahin’i Efraima dia Sotela (Bareda no zanakalahin’i Sotela, Tahata no zanakalahin’i Bareda, Elada no zanakalahin’i Tahata, Tahata no zanakalahin’i Elada, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Zabada no zanakalahin’i Tahata, Sotela no zanakalahin’i Zabada) ary Ezera sy Elada, izay novonoin’ny tompon-tany tao Gata, satria nidina hangalatra ny ombiny aman-ondriny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Efraima, rainy nisaona azy ela, dia avy ny rahalahiny hampionona azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nony niray tamin’ny vadiny izy, dia nanan-anaka ravehivavy ka niteraka zazalahy, ary ny anarany nataony hoe Beria, satria nisy fahoriana tao an-tranony tamin’izany. (
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny zanani-vavy dia Sera, izay nanorina an’i Beti-horona ambany sy ambony sy Ozena-sera). '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Refa sy Rasefa no zanakalahin’i Beria, Tela no zanakalahin’i Rasefa, Tahana no zanakalahin’i Tela, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ladana no zanakalahin’i Tahana, Amihoda no zanakalahin’i Ladana, Elisama no zanakalahin’i Amihoda. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nona no zanakalahin’i Elisama, Josoa no zanakalahin’i Nona. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny taniny sy ny fonenany dia Betela sy ny zana-bohiny, ary any atsinanana dia Narana, ary any andrefana dia Gazera sy ny zana-bohiny ary Sekema sy ny zana-bohiny hatrany Gaza sy ny zana-bohiny; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ary teo amin’ny sisin-tanin’ny taranak’i Manase dia Beti-sana sy ny zana-bohiny, Tanaka sy ny zana-bohiny, Megido sy ny zana-bohiny, Dora sy ny zana-bohiny Tamin’ireo no nonenan’ny taranak’i Josefa, zanak’Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny zanakalahin’i Asera dia Jimna sy Jisva sy Jisvy sy Beria; ary Sera no anabavin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny zanakalahin’i Beria dia Hebera sy Malkiela, rain’i Birzavita. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Hebera niteraka an’i Jafieta sy Somera sy Hotama; ary Soha no anabavin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny zanakalahin’i Jafieta dia Pasaka sy Bimala ary Asvata. Ireo no zanakalahin’i Jafieta. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny zanakalahin’i Samera dia Ahaia sy Rohaga sy Hoba ary Arama. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny zanakalahin’i Helema rahalahiny dia Zofa sy Jimna sy Selesy ary Amala. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny zanakalahin’i Zofa dia Soha sy Harnefera sy Soala sy Bery sy Jimra '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'sy Bazera sy Hoda sy Sama sy Silsa sy Jitrana ary Bera. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny zanakalahin’i Jatera dia Jefone sy Pispa ary Ara. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny zanakalahin’i Ola dia Ara sy Haniela ary Rizia. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ireo zanakalahin’i Asera rehetra ireo dia samy lohan’ny fianakaviany, olom-boafidy sady mahery ary lehiben’ny loham-pireneny avy. Ary ny nanisana azy, araka ny firazanany, dia enina arivo amby roa alina no isan’ny azo nalefa hanafika.
