document_id: PSA.45,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Tonon-kiram-panambadiana, fiderana ny mpanjaka be voninahitra.
  - type: text
    content: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’ny Koraïta. Maskila. Tonon-kiram-pitiavana.
  - type: text
    content: MAMPIBOIBOIKA teny tsara ny foko;
  - type: text
    content: Miteny aho, ka ny hilaza ny mpanjaka no teny ataoko;
  - type: text
    content: Fanoratan’ny faingan-tsoratra ny lelako.
  '10':
  - type: text
    content: Henoy, razazavavy, dia jereo, ka atongilano ny sofinao,
  - type: text
    content: Ary hadinoy ny firenenao sy ny tranon-drainao;
  '11':
  - type: text
    content: Raha irin’ny mpanjaka ny hatsaran-tarehinao–
  - type: text
    content: Fa izy no tomponao–dia miankohofa eo anatrehany.
  '12':
  - type: text
    content: Ary ny zanakavavin’i Tyro hitondra fanatitra;
  - type: text
    content: Eny, ny manan-karena amin’ny vahoaka hila sitraka aminao.
  '13':
  - type: text
    content: Be voninahitra ny zanakavavin’ny mpanjaka ao anaty trano;
  - type: text
    content: Tenona misy volamena no fitafiany.
  '14':
  - type: text
    content: Mitafy lamba misoratsoratra izy ka entina ho ao amin’ny mpanjaka;
  - type: text
    content: Ny zazavavy sakaizany izay manaraka azy dia entina ao aminao.
  '15':
  - type: text
    content: Entina amin’ny fifaliana sy ny firavoravoana ireny;
  - type: text
    content: Hiditra ao an-dapan’ny mpanjaka izy.
  '16':
  - type: text
    content: Ho solon-drainao ny zanakao,
  - type: text
    content: Hotendrenao ho mpanapaka eny amin’ny tany rehetra izy.
  '17':
  - type: text
    content: Hampahatsiaro ny anaranao hatramin’ny taranaka fara mandimby aho.
  - type: text
    content: Izany rehetra izany no hideran’ny firenena anao mandrakizay doria.
  '2':
  - type: text
    content: Tsara tarehy noho ny zanak’olombelona hianao;
  - type: text
    content: Fahasoavana no naidina tamin’ny molotrao;
  - type: text
    content: Izany no nitahian’Andriamanitra anao mandrakizay.
  '3':
  - type: text
    content: Fehezo eo am-balahanao ny sabatrao, ry ilay mahery,
  - type: text
    content: Dia ny fiandriananao sy ny voninahitrao.
  '4':
  - type: text
    content: Ary mitaingena handroso soa aman-tsara amin’ny voninahitrao,
  - type: text
    content: Noho ny teny marina sy ny fahalemem-panahim-pahamarinana;
  - type: text
    content: Ary hampianatra anao zava-mahatsiravina ny tànanao ankavanana.
  '5':
  - type: text
    content: Ny zana-tsipìkanao dia voaranitra–
  - type: text
    content: Firenena maro no ringana ka hitsakitsahinao–
  - type: text
    content: Ka mitsatoka ao am-pon’ny fahavalon’ny mpanjaka.
  '6':
  - type: text
    content: Ny seza fiandriananao, Andriamanitra ô, dia mandrakizay doria;
  - type: text
    content: Tehim-pahamarinana ny tehim-panjakanao.
  '7':
  - type: text
    content: Tianao ny fahamarinana, fa halanao ny heloka;
  - type: text
    content: Koa Andriamanitra, dia Andriamanitrao, efa nanoso-diloilo fifaliana anao
  - type: text
    content: Mihoatra noho ny namanao.
  '8':
  - type: text
    content: Miora sy hazo manitra
  - type: note
    content: Heb. ahalota.
  - type: text
    content: ' ary kasia ny fitafianao rehetra,'
  - type: text
    content: Zava-maneno avy ao amin’ny lapa ivory no mampifaly anao.
  '9':
  - type: text
    content: Zanakavavin’andriamanjaka no isan’ny malalanao;
  - type: text
    content: Eo ankavananao no itoeran’ny vadin’ny mpanjaka
  - type: text
    content: Miravaka volamena avy any Ofira.
