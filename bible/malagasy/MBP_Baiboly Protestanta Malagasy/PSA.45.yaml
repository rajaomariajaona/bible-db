document_id: PSA.45
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Tonon-kiram-panambadiana, fiderana ny mpanjaka be voninahitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’ny Koraïta. Maskila. Tonon-kiram-pitiavana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: MAMPIBOIBOIKA teny tsara ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miteny aho, ka ny hilaza ny mpanjaka no teny ataoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanoratan’ny faingan-tsoratra ny lelako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsara tarehy noho ny zanak’olombelona hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahasoavana no naidina tamin’ny molotrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no nitahian’Andriamanitra anao mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fehezo eo am-balahanao ny sabatrao, ry ilay mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fiandriananao sy ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary mitaingena handroso soa aman-tsara amin’ny voninahitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny teny marina sy ny fahalemem-panahim-pahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampianatra anao zava-mahatsiravina ny tànanao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny zana-tsipìkanao dia voaranitra–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Firenena maro no ringana ka hitsakitsahinao–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mitsatoka ao am-pon’ny fahavalon’ny mpanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny seza fiandriananao, Andriamanitra ô, dia mandrakizay doria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tehim-pahamarinana ny tehim-panjakanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tianao ny fahamarinana, fa halanao ny heloka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa Andriamanitra, dia Andriamanitrao, efa nanoso-diloilo fifaliana anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihoatra noho ny namanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miora sy hazo manitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahalota.
    marker-yv: yv-n
  - type: text
    text: ' ary kasia ny fitafianao rehetra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zava-maneno avy ao amin’ny lapa ivory no mampifaly anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Zanakavavin’andriamanjaka no isan’ny malalanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo ankavananao no itoeran’ny vadin’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miravaka volamena avy any Ofira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Henoy, razazavavy, dia jereo, ka atongilano ny sofinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hadinoy ny firenenao sy ny tranon-drainao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha irin’ny mpanjaka ny hatsaran-tarehinao–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izy no tomponao–dia miankohofa eo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny zanakavavin’i Tyro hitondra fanatitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny manan-karena amin’ny vahoaka hila sitraka aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Be voninahitra ny zanakavavin’ny mpanjaka ao anaty trano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tenona misy volamena no fitafiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mitafy lamba misoratsoratra izy ka entina ho ao amin’ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zazavavy sakaizany izay manaraka azy dia entina ao aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Entina amin’ny fifaliana sy ny firavoravoana ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiditra ao an-dapan’ny mpanjaka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ho solon-drainao ny zanakao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotendrenao ho mpanapaka eny amin’ny tany rehetra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hampahatsiaro ny anaranao hatramin’ny taranaka fara mandimby aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany rehetra izany no hideran’ny firenena anao mandrakizay doria.
