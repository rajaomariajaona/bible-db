document_id: 2KI.20,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahararian’i Hezekia, sy ny nanaretany, ary ny nampamangian’i Berodaka-baladana, mpanjakan’i Babylona, azy, sy ny nahafatesany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tamin’izany andro izany dia narary saiky maty Hezekia. Ary Isaia mpaminany, zanak’i Amoza, nankao aminy ka nilaza taminy hoe: Izao no lazain’i Jehovah: Hafaro ny ankohonanao, fa ho faty hianao, fa tsy ho velona.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary Hezekia namaly hoe: Mora foana ny handrosoan’ny aloka hàdiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' folo; tsy izany, fa aoka ny aloka hiverina hàdiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' folo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary Isaia mpaminany nitaraina tamin’i Jehovah, ka nampiverina ny aloka hàdiny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' folo Jehovah, dia ilay nidinany teo amin’ny dialin’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' i Ahaza.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tamin’izany andro izany no nampitondran’i Berodaka-baladana, zanak’i Baladana, mpanjakan’i Babylona, taratasy sy fanomezana ho an’i Hezekia; fa efa reny fa narary izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary Hezekia nandray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nihaino.
      marker-yv: yv-n
    - type: text
      text: ' azy ka naneho azy ny trano rehetra fitehirizany zava-tsoa, dia volafotsy sy volamena sy zava-manitra ary menaka tsara, sy ny trano fitehirizana ny fiadiany rehetra mbamin’izay rehetra tao amin’ny firaketany: tsy nisy zavatra tsy nasehon’i Hezekia azy, na ny tao an-tranony, na ny tao amin’ny fanjakany rehetra.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nankany amin’i Hezekia mpanjaka Isaia mpaminany ka nanao taminy hoe: Ahoana no nolazain’ireo olona nankatỳ aminao ireo, ary avy taiza moa izy? Ary hoy Hezekia: Avy tany an-tany lavitra izy, dia avy tany Babylona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy izy: Ka inona avy anefa no hitany tato an-tranonao? Ary hoy Hezekia: Izay rehetra ato an-tranoko dia efa hitany avokoa: tsy misy zavatra tsy nasehoko azy ny ato amin’ny firaketako rehetra.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hoy Isaia tamin’i Hezekia: Henoy ary ny tenin’i Jehovah: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Indro, avy ny andro, ka ho entina ho any Babylona izay rehetra ao an-tranonao sy izay rehetra noharìn ny razanao ka voarakitra mandraka andro-any; eny, tsy hisy sisa hijanona na inona na inona, hoy Jehovah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary na dia ny terakao aza dia hisy ho entiny koa; ka ho tandonaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ionoka.
      marker-yv: yv-n
    - type: text
      text: ' any amin’ny lapan’ny mpanjakan’i Babylona ireo.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy Hezekia tamin’Isaia: Tsara ny tenin’i Jehovah izay nolazainao. Ary hoy koa izy: Eny, tsy izany va, raha misy fiadanana amin’ny androko ka handry fahizay?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nitodika nankany amin’ny rindrina izy ka nivavaka tamin’i Jehovah hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny tantaran’i Hezekia sisa sy ny heriny rehetra mbamin’ny nanaovany ny kamory sy ny lakan-drano nitarihany rano ho ao an-tanàna, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary Hezekia lasa nodi-mandry any amin’ny razany; ary Manase zanany no nanjaka nandimby azy
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jehovah ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin’ny fahamarinana sy tamin’ny foko rehetra ary ny nanaovako izay tsara eo imasonao. Dia nitomany mafy dia mafy izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary raha tsy mbola tafavoaka ny tanàna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kianja.
      marker-yv: yv-n
    - type: text
      text: ' afovoany Isaia, dia tonga taminy ny tenin’i Jehovah nanao hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Miverena, ka lazao amin’i Hezekia, mpanapaka ny oloko, hoe: Izao no lazain’i Jehovah, Andriamanitr’i Davida rainao: Efa nohenoiko ny fitarainanao, ary efa hitako ny ranomasonao; indro, hahasitrana anao Aho, ka raha afaka ampitso dia hiakatra ho ao an-tranon’i Jehovah hianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hampiako dimy ambin’ny folo taona ny andronao; sady hamonjy anao sy ity tanàna ity amin’ny tànan’ny mpanjakan’i Asyria Aho; ary hiaro ity tanàna ity Aho noho ny amin’ny tenako sy Davida mpanompoko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary hoy Isaia: Makà ampempan’aviavy. Ary dia nalainy ka napetany tamin’ny vay, dia sitrana izy.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy Hezekia tamin’i Isaia: Inona no famantarana fa hositranin’i Jehovah aho ka hiakatra any an-tranon’i Jehovah raha afaka ampitso? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy Isaia: Izao no famantarana ho anao avy amin’i Jehovah hahalalanao fa Jehovah hanao izay zavatra nolazainy: handroso hàdiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' folo va ny aloka, sa hiverina hàdiny'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' folo? '
