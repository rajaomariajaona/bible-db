document_id: 2KI.20,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahararian’i Hezekia, sy ny nanaretany, ary ny nampamangian’i Berodaka-baladana, mpanjakan’i Babylona, azy, sy ny nahafatesany.
  - type: text
    content: 'ARY tamin’izany andro izany dia narary saiky maty Hezekia. Ary Isaia mpaminany, zanak’i Amoza, nankao aminy ka nilaza taminy hoe: Izao no lazain’i Jehovah: Hafaro ny ankohonanao, fa ho faty hianao, fa tsy ho velona.'
  '10':
  - type: text
    content: 'Ary Hezekia namaly hoe: Mora foana ny handrosoan’ny aloka hàdiny'
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' folo; tsy izany, fa aoka ny aloka hiverina hàdiny'
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' folo. '
  '11':
  - type: text
    content: Ary Isaia mpaminany nitaraina tamin’i Jehovah, ka nampiverina ny aloka hàdiny
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' folo Jehovah, dia ilay nidinany teo amin’ny dialin’'
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' i Ahaza.'
  '12':
  - type: text
    content: 'Tamin’izany andro izany no nampitondran’i Berodaka-baladana, zanak’i Baladana, mpanjakan’i Babylona, taratasy sy fanomezana ho an’i Hezekia; fa efa reny fa narary izy. '
  '13':
  - type: text
    content: Ary Hezekia nandray
  - type: note
    content: Heb. nihaino.
  - type: text
    content: ' azy ka naneho azy ny trano rehetra fitehirizany zava-tsoa, dia volafotsy sy volamena sy zava-manitra ary menaka tsara, sy ny trano fitehirizana ny fiadiany rehetra mbamin’izay rehetra tao amin’ny firaketany: tsy nisy zavatra tsy nasehon’i Hezekia azy, na ny tao an-tranony, na ny tao amin’ny fanjakany rehetra.'
  '14':
  - type: text
    content: 'Dia nankany amin’i Hezekia mpanjaka Isaia mpaminany ka nanao taminy hoe: Ahoana no nolazain’ireo olona nankatỳ aminao ireo, ary avy taiza moa izy? Ary hoy Hezekia: Avy tany an-tany lavitra izy, dia avy tany Babylona. '
  '15':
  - type: text
    content: 'Dia hoy izy: Ka inona avy anefa no hitany tato an-tranonao? Ary hoy Hezekia: Izay rehetra ato an-tranoko dia efa hitany avokoa: tsy misy zavatra tsy nasehoko azy ny ato amin’ny firaketako rehetra.'
  '16':
  - type: text
    content: 'Ary hoy Isaia tamin’i Hezekia: Henoy ary ny tenin’i Jehovah: '
  '17':
  - type: text
    content: 'Indro, avy ny andro, ka ho entina ho any Babylona izay rehetra ao an-tranonao sy izay rehetra noharìn ny razanao ka voarakitra mandraka andro-any; eny, tsy hisy sisa hijanona na inona na inona, hoy Jehovah. '
  '18':
  - type: text
    content: Ary na dia ny terakao aza dia hisy ho entiny koa; ka ho tandonaka
  - type: note
    content: Heb. ionoka.
  - type: text
    content: ' any amin’ny lapan’ny mpanjakan’i Babylona ireo.'
  '19':
  - type: text
    content: 'Dia hoy Hezekia tamin’Isaia: Tsara ny tenin’i Jehovah izay nolazainao. Ary hoy koa izy: Eny, tsy izany va, raha misy fiadanana amin’ny androko ka handry fahizay?'
  '2':
  - type: text
    content: 'Dia nitodika nankany amin’ny rindrina izy ka nivavaka tamin’i Jehovah hoe: '
  '20':
  - type: text
    content: 'Ary ny tantaran’i Hezekia sisa sy ny heriny rehetra mbamin’ny nanaovany ny kamory sy ny lakan-drano nitarihany rano ho ao an-tanàna, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '21':
  - type: text
    content: Ary Hezekia lasa nodi-mandry any amin’ny razany; ary Manase zanany no nanjaka nandimby azy
  '3':
  - type: text
    content: Jehovah ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin’ny fahamarinana sy tamin’ny foko rehetra ary ny nanaovako izay tsara eo imasonao. Dia nitomany mafy dia mafy izy.
  '4':
  - type: text
    content: Ary raha tsy mbola tafavoaka ny tanàna
  - type: note
    content: 'Na: kianja.'
  - type: text
    content: ' afovoany Isaia, dia tonga taminy ny tenin’i Jehovah nanao hoe: '
  '5':
  - type: text
    content: 'Miverena, ka lazao amin’i Hezekia, mpanapaka ny oloko, hoe: Izao no lazain’i Jehovah, Andriamanitr’i Davida rainao: Efa nohenoiko ny fitarainanao, ary efa hitako ny ranomasonao; indro, hahasitrana anao Aho, ka raha afaka ampitso dia hiakatra ho ao an-tranon’i Jehovah hianao. '
  '6':
  - type: text
    content: 'Ary hampiako dimy ambin’ny folo taona ny andronao; sady hamonjy anao sy ity tanàna ity amin’ny tànan’ny mpanjakan’i Asyria Aho; ary hiaro ity tanàna ity Aho noho ny amin’ny tenako sy Davida mpanompoko. '
  '7':
  - type: text
    content: 'Ary hoy Isaia: Makà ampempan’aviavy. Ary dia nalainy ka napetany tamin’ny vay, dia sitrana izy.'
  '8':
  - type: text
    content: 'Ary hoy Hezekia tamin’i Isaia: Inona no famantarana fa hositranin’i Jehovah aho ka hiakatra any an-tranon’i Jehovah raha afaka ampitso? '
  '9':
  - type: text
    content: 'Dia hoy Isaia: Izao no famantarana ho anao avy amin’i Jehovah hahalalanao fa Jehovah hanao izay zavatra nolazainy: handroso hàdiny'
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' folo va ny aloka, sa hiverina hàdiny'
  - type: note
    content: Heb. ambaratonga.
  - type: text
    content: ' folo? '
