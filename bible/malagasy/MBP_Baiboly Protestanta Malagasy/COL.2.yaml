document_id: COL.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fananaran’i Paoly ny Kolosiana mba haharitra tsara tsy ho voafitaky ny mpampianatra sandoka.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'FA tiako ho fantatrareo ny hamafin’ny fiezahako ho anareo sy izay any Laodikia mbamin’izay rehetra tsy mbola nahita ny tavako amin’ny nofo, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hianareo dia tanteraka ao aminy, sady Izy no Lohan’ny fanapahana sy ny fahefana rehetra, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tao aminy koa no namorana anareo tamin’ny famorana tsy nataon-tànana, tamin’ny fanesorana ny tenan’ny nofo, dia tamin’ny famoran’i Kristy; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa niara-nilevina taminy hianareo tamin’ny batisa, izay niarahanareo natsangana taminy koa noho ny finoana ny asan’Andriamanitra, izay nanangana Azy tamin’ny maty. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hianareo, izay efa matin’ny fahadisoana sy ny tsi-fiforan’ny nofonareo, dia novelominy niaraka tamin’i Kristy, rehefa navelany ny fahadisoantsika rehetra; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary novonoiny ny sora-tànan’ny didy izay niampanga antsika; dia nesoriny tsy ho eo mihitsy izany ka nohomboany tamin’ny hazofijaliana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary nesoriny tsy ho eo amin’ny tenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: noreseny ka nobaboiny.
      marker-yv: yv-n
    - type: text
      text: ' ny fanapahana sy ny fahefana, ary noho ny hazofijaliana dia nasehony miharihary ny fitòndrany ireo toy ny fanaon’izay avy nandresy.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza avela hisy hitsara anareo ny amin’ny fihinana, na ny fisotro, na ny andro firavoravoana, na ny voaloham-bolana, na ny Sabata; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aloky ny zavatra ho avy ireny, fa ny tenany dia an’i Kristy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mety hofitahina tsy hahazoanareo ny loka noho ny fanetren-tena haitraitra sy ny fivavahana amin’ny anjely, ka mitompo amin’ny zavatra efa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[tsy].'
      marker-yv: yv-n
    - type: text
      text: ' hitany sady feno fiavonavonana noho ny fisainan’ny nofony '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka tsy mihazona ny Loha; Izy no itomboan’ny tena rehetra, izay velomina sy ampiraisina tsara amin’ny famavany sy ny ozatra, araka ny fampitomboan’Andriamanitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hampifalina ny fony amin’ny ampiraisana azy amin’ny fitiavana sy ho amin’ny haren’ny fahatokiana be avy amin’ny fahazavan-tsaina, ho amin’ny fahalalana tsara ny zava-miafina izay an’Andriamanitra, dia Kristy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha niara-maty tamin’i Kristy hianareo ka efa afaka tamin’ny abidim-pianaran’izao tontolo izao, nahoana no toa mbola velona amin’izao tontolo izao ihany hianareo ka mety hodidiana hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mandray, aza manandrana, aza manendry– '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'levona amin’ny fanaovana ihany izany rehetra izany–araka ny didy sy ny fampianaran’olona? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany rehetra izany dia ankalazaina ho fahendrena amin’ny fivavahana haitraitra sy ny fanetren-tena ary ny fampahoriana ny tena, nefa tsy manan-kery akory hahasakana ny fampanaranana ny nofo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay iafenan’ny rakitry ny fahendrena sy ny fahalalana rehetra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izany no lazaiko, fandrao hisy hampahadiso hevitra anareo amin’ny teny toa marina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na dia tsy manatrika anareo amin’ny nofo aza aho, dia manatrika anareo ihany amin’ny fanahy ka mifaly sy mijery ny filaminanareo sy ny tsi-fiovan’ny finoanareo an’i Kristy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tahaka ny nandraisanareo an’i Kristy Jesosy Tompo, dia mandehana ao aminy araka izany koa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka mamaka tsara sy miorina mafy ao aminy ary tafatoetra amin’ny finoana, toy ny efa nampianarana anareo, ka mazoto
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[mitombo amin’izany].'
      marker-yv: yv-n
    - type: text
      text: ' amin’ny fisaorana.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandremo fandrao misy mahalasa anareo ho babony amin’ny filosofia sy ny famitahana foana, araka ny fampianarana voatolotry ny razana, araka ny abidim-pianaran’izao tontolo izao, fa tsy araka an’i Kristy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ao amin’ny tenany no itoeran’ny fahafenoan’ny fomban’Andriamanitra rehetra; '
