document_id: JDG.15
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nony afaka kelikely, tamin’ny taom-pijinjana ny vary tritika, dia nitondra zanak’osy Samsona ho entiny mamangy ny vadiny, ka hoy izy: Hiditra ao amin’ny vadiko ao an-efi-trano aho. Nefa tsy namela azy hiditra ny rafozany, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa hoy izy: Nataoko fa halanao mihitsy izy, ka dia nomeko ho an’ny namanao; moa tsy tsara tarehy noho izy va ny zandriny? Masìna hianao, aoka izy halainao ho solony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Samsona taminy: Tsy hanan-tsiny aho izao, na dia hanisy ratsy ny Filistina aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandeha Samsona ka nisambotra amboahaolo telon-jato; dia naka zavatra hatao fanilo izy, ary nampifanendreny ny rambon’ny amboahaolo tsiroaroa avy ka nafehiny teo anelanelan’ny rambony ilay hatao fanilo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary rehefa nampirehetiny ny fanilo, dia nalefany ho any amin’ny varin’ny Filistina ireny, ka nandoro ny amboara sy ny vary mbola mitsangana ary ny voli-oliva koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy ny Filistina: Iza no nanao izany? Ary nisy nanao hoe: Samsona, vinanton’ilay Timnita, satria ny rafozany efa nanome ny vadiny ho an’ny sakaizany. Dia niakatra ny Filistina ka nandoro an-dravehivavy sy ny ankohonan-drainy tamin’ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Samsona taminy: Raha manao tahaka izany hianareo, dia mbola hamaly anareo tokoa aho, koa rehefa afaka izany, vao hitsahatra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia namely azy izy ka nahatapaka ranjo sy fe ary nahafaty be dia be; dia nidina izy ka nitoetra teo an-tsefatsefak’ilay harambato mitresaka any Etama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary niakatra ny Filistina, dia nitoby teo amin’ny Joda ka niely tany Lehy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy ny lehilahy amin’ny Joda: Nahoana no miakatra hamely anay hianareo? Dia hoy izy Hamatotra an’i Samsona no niakaranay, mba hanao aminy tahaka izay efa nataony taminay. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nandeha ny lehilahy telo arivo amin’ny Joda nankany amin’ilay tsefatsefaky ny harambato mitresaka any Etama ka nanao tamin’i Samsona hoe: Tsy fantatrao va fa manapaka antsika ny Filistina? Inona izao nataonao taminay izao? Dia hoy izy taminy: Araka izay nataony tamiko no mba nataoko taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy kosa izy ireo taminy: Hamatotra anao no nidinanay, mba hatolotray ho eo an-tànan’ny Filistina hianao. Dia hoy Samsona taminy: Mianiàna amiko ary fa tsy hamely ahy hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niteny taminy izy ireo ka nanao hoe: Tsia; fa hamatotra anao fotsiny ihany izahay ka hanolotra anao eo an-tànany; fa tsy hamono anao tsy akory izahay. Dia namatotra azy tamin’ny mahazaka roa vaovao izy ka nitondra azy niala tamin’ilay harambato.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha tonga tany Lehy izy, dia nanakora azy ny Filistina; ary ny Fanahin’i Jehovah nilatsaka taminy, dia tonga tahaka ny rongony izay nodorana tamin’ny afo ny mahazaka teny amin’ny sandriny ary afaka tamin’ny tànany ny fatorana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nahita valanoranom-boriky vaovao izy, dia naninjitra ny tànany naka azy, ka iny no namonoany arivo lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy Samsona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tamin’ny valanoranom-boriky '
  - type: usfm
    marker: it
    children:
    - type: text
      text: no nahafatesako
  - type: text
    text: ' ho antontany iray, eny, an-tontany roa;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny valanoranom-boriky no nahafatesako arivo lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary rehefa nitsahatra niteny izy, dia nariany ilay valanoranom-boriky teny an-tànany; ary ny anaran’izany tany izany dia natao hoe Ramata-lehy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ramata-lehy = Havoanan’ny valanorano.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nangetaheta indrindra izy, dia nitaraina tamin’i Jehovah ka nanao hoe: Hianao no nanome izao famonjen-dehibe izao tamin’ny tànan’ny mpanomponao; ary ankehitriny efa ho fatin-ketaheta aho ka hianjera ho eo an-tànan’ny tsy mifora! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nampitresahin’Andriamanitra ilay fitoerana hoboka tany Lehy, ka niboiboika teo ny rano; ary rehefa nisotro izy, dia nody ny ainy, ka velona izy; ka izany no nanaovany ny anarany hoe En-hakore,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En-hakore = Loharanon’ilay niantso.
    marker-yv: yv-n
  - type: text
    text: ' izay any Lehy mandraka andro-any.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nitsara ny Isiraely roa-polo taona tamin’ny andron’ny Filistina izy.
