document_id: JDG.15,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nony afaka kelikely, tamin’ny taom-pijinjana ny vary tritika, dia nitondra zanak’osy Samsona ho entiny mamangy ny vadiny, ka hoy izy: Hiditra ao amin’ny vadiko ao an-efi-trano aho. Nefa tsy namela azy hiditra ny rafozany, '
  '10':
  - type: text
    content: 'Ary hoy ny lehilahy amin’ny Joda: Nahoana no miakatra hamely anay hianareo? Dia hoy izy Hamatotra an’i Samsona no niakaranay, mba hanao aminy tahaka izay efa nataony taminay. '
  '11':
  - type: text
    content: 'Dia nandeha ny lehilahy telo arivo amin’ny Joda nankany amin’ilay tsefatsefaky ny harambato mitresaka any Etama ka nanao tamin’i Samsona hoe: Tsy fantatrao va fa manapaka antsika ny Filistina? Inona izao nataonao taminay izao? Dia hoy izy taminy: Araka izay nataony tamiko no mba nataoko taminy. '
  '12':
  - type: text
    content: 'Dia hoy kosa izy ireo taminy: Hamatotra anao no nidinanay, mba hatolotray ho eo an-tànan’ny Filistina hianao. Dia hoy Samsona taminy: Mianiàna amiko ary fa tsy hamely ahy hianareo. '
  '13':
  - type: text
    content: 'Dia niteny taminy izy ireo ka nanao hoe: Tsia; fa hamatotra anao fotsiny ihany izahay ka hanolotra anao eo an-tànany; fa tsy hamono anao tsy akory izahay. Dia namatotra azy tamin’ny mahazaka roa vaovao izy ka nitondra azy niala tamin’ilay harambato.'
  '14':
  - type: text
    content: 'Ary raha tonga tany Lehy izy, dia nanakora azy ny Filistina; ary ny Fanahin’i Jehovah nilatsaka taminy, dia tonga tahaka ny rongony izay nodorana tamin’ny afo ny mahazaka teny amin’ny sandriny ary afaka tamin’ny tànany ny fatorana. '
  '15':
  - type: text
    content: 'Ary nahita valanoranom-boriky vaovao izy, dia naninjitra ny tànany naka azy, ka iny no namonoany arivo lahy. '
  '16':
  - type: text
    content: 'Ary hoy Samsona:'
  - type: text
    content: 'Tamin’ny valanoranom-boriky '
  - type: text
    content: no nahafatesako
  - type: text
    content: ' ho antontany iray, eny, an-tontany roa;'
  - type: text
    content: Tamin’ny valanoranom-boriky no nahafatesako arivo lahy.
  '17':
  - type: text
    content: Ary rehefa nitsahatra niteny izy, dia nariany ilay valanoranom-boriky teny an-tànany; ary ny anaran’izany tany izany dia natao hoe Ramata-lehy.
  - type: note
    content: Ramata-lehy = Havoanan’ny valanorano.
  '18':
  - type: text
    content: 'Ary nangetaheta indrindra izy, dia nitaraina tamin’i Jehovah ka nanao hoe: Hianao no nanome izao famonjen-dehibe izao tamin’ny tànan’ny mpanomponao; ary ankehitriny efa ho fatin-ketaheta aho ka hianjera ho eo an-tànan’ny tsy mifora! '
  '19':
  - type: text
    content: Dia nampitresahin’Andriamanitra ilay fitoerana hoboka tany Lehy, ka niboiboika teo ny rano; ary rehefa nisotro izy, dia nody ny ainy, ka velona izy; ka izany no nanaovany ny anarany hoe En-hakore,
  - type: note
    content: En-hakore = Loharanon’ilay niantso.
  - type: text
    content: ' izay any Lehy mandraka andro-any.'
  '2':
  - type: text
    content: 'fa hoy izy: Nataoko fa halanao mihitsy izy, ka dia nomeko ho an’ny namanao; moa tsy tsara tarehy noho izy va ny zandriny? Masìna hianao, aoka izy halainao ho solony. '
  '20':
  - type: text
    content: Dia nitsara ny Isiraely roa-polo taona tamin’ny andron’ny Filistina izy.
  '3':
  - type: text
    content: 'Dia hoy Samsona taminy: Tsy hanan-tsiny aho izao, na dia hanisy ratsy ny Filistina aza.'
  '4':
  - type: text
    content: 'Dia nandeha Samsona ka nisambotra amboahaolo telon-jato; dia naka zavatra hatao fanilo izy, ary nampifanendreny ny rambon’ny amboahaolo tsiroaroa avy ka nafehiny teo anelanelan’ny rambony ilay hatao fanilo. '
  '5':
  - type: text
    content: Ary rehefa nampirehetiny ny fanilo, dia nalefany ho any amin’ny varin’ny Filistina ireny, ka nandoro ny amboara sy ny vary mbola mitsangana ary ny voli-oliva koa.
  '6':
  - type: text
    content: 'Ary hoy ny Filistina: Iza no nanao izany? Ary nisy nanao hoe: Samsona, vinanton’ilay Timnita, satria ny rafozany efa nanome ny vadiny ho an’ny sakaizany. Dia niakatra ny Filistina ka nandoro an-dravehivavy sy ny ankohonan-drainy tamin’ny afo. '
  '7':
  - type: text
    content: 'Ary hoy Samsona taminy: Raha manao tahaka izany hianareo, dia mbola hamaly anareo tokoa aho, koa rehefa afaka izany, vao hitsahatra aho. '
  '8':
  - type: text
    content: Dia namely azy izy ka nahatapaka ranjo sy fe ary nahafaty be dia be; dia nidina izy ka nitoetra teo an-tsefatsefak’ilay harambato mitresaka any Etama.
  '9':
  - type: text
    content: 'Ary niakatra ny Filistina, dia nitoby teo amin’ny Joda ka niely tany Lehy. '
