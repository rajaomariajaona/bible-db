document_id: LUK.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanoharana ny amin’ilay mpitondratena nahery nangataka.
  - type: text
    content: 'ARY Jesosy nilaza fanoharana taminy, fa tsy mety raha tsy mivavaka mandrakariva izy ka tsy reraka, '
  '10':
  - type: text
    content: 'Nisy roa lahy niakatra teo an-kianjan’ny tempoly hivavaka; ny anankiray Fariseo, ary ny anankiray mpamory hetra. '
  '11':
  - type: text
    content: 'Ilay Fariseo nitsangana ka nivavaka nitokana hoe: Andriamanitra ô, misaotra Anao aho fa tsy mba tahaka ny olona sasany, izay mpanao an-keriny, tsy marina, mpijangajanga, na tahaka io mpamory hetra io aza. '
  '12':
  - type: text
    content: 'Mifady indroa isan-kerinandro aho; mandoa ny fahafolon-karena amin’izay azoko rehetra aho. '
  '13':
  - type: text
    content: 'Fa ilay mpamory hetra kosa nijanona teny lavitra eny, sady tsy nety niandrandra ny lanitra akory, fa niteha-tratra ka nanao hoe: Andriamanitra ô, mamindrà fo amiko mpanota. '
  '14':
  - type: text
    content: 'Lazaiko aminareo: Izany lehilahy izany nidina tany an-tranony efa nohamarinina noho ny anankiray; fa izay rehetra manandra-tena no haetry, ary izay rehetra manetry tena no hasandratra.'
  - type: heading
    content: Ny nitondrana zazakely ho eo amin’i Jesosy.
  - type: heading
    content: Mat. 19.13-15; Mar. 10.13-16.
  '15':
  - type: text
    content: 'ARY nisy nitondra zazakely koa ho eo amin’i Jesosy mba hotendreny; fa raha vao nahita izany ny mpianatra, dia nandrara azy. '
  '16':
  - type: text
    content: 'Fa Jesosy niantso ireo hankeo aminy ka nanao hoe: Avelao ny zaza hanatona Ahy, ary aza rarana; fa an’ny toa azy ny fanjakan’Andriamanitra. '
  '17':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no tsy handray ny fanjakan’Andriamanitra tahaka ny zaza, dia tsy ho tafiditra aminy akory.'
  - type: heading
    content: Ny namalian’i Jesosy ny fanontanian’ny mpanan-karena anankiray.
  - type: heading
    content: Mat. 19.16-30; Mar. 10.17-31.
  '18':
  - type: text
    content: 'ARY nisy mpanapaka anankiray nanontany Azy hoe: Mpampianatra tsara ô, inona no hataoko handovako fiainana mandrakizay? '
  '19':
  - type: text
    content: 'Fa hoy Jesosy taminy: Nahoana Aho no ataonao tsara? Tsy misy tsara afa-tsy Iray ihany, dia Andriamanitra. '
  '2':
  - type: text
    content: 'dia nanao hoe: Nisy mpitsara tao an-tanàna anankiray, izay tsy natahotra an’Andriamanitra, na mena-maso olona. '
  '20':
  - type: text
    content: 'Fantatrao ny didy hoe: ,,Aza mijangajanga, Aza mamono olona, Aza mangalatra, Aza mety ho vavolombelona mandainga’’, ,,Manajà ny rainao sy ny reninao’’ (Eks. 20.12–16). '
  '21':
  - type: text
    content: 'Ary hoy kosa izy: Izany rehetra izany dia efa notandremako hatry ny fony aho mbola kely.'
  '22':
  - type: text
    content: 'Ary rehefa nandre izany Jesosy, dia hoy Izy taminy: Mbola diso zavatra iray loha hianao: amidio ny fanananao rehetra, ka zarao ho an’ny malahelo, dia hanana rakitra any an-danitra hianao; ary avia, manaraha Ahy. '
  '23':
  - type: text
    content: Ary rehefa nandre izany ralehilahy, dia nalahelo loatra; fa nanan-karena dia nanan-karena izy.
  '24':
  - type: text
    content: 'Ary Jesosy, raha nijery azy, dia nanao hoe: Manao ahoana ny hasarotry ny hidiran’ny manan-karena amin’ny fanjakan’Andriamanitra! '
  '25':
  - type: text
    content: 'Fa ho moramora kokoa ny hidiran’ny rameva amin’ny vodi-fanjaitra noho ny hidiran’ny manan-karena amin’ny fanjakan’Andriamanitra! '
  '26':
  - type: text
    content: 'Ary izay nandre dia nanao hoe: Iza indray moa no azo hovonjena? '
  '27':
  - type: text
    content: 'Fa hoy Jesosy: Izay zavatra tsy hain’ny olona dia hain’Andriamanitra.'
  '28':
  - type: text
    content: 'Dia hoy Petera: Indro, izahay efa nahafoy izay nety ho anay ka nanaraka Anao. '
  '29':
  - type: text
    content: 'Ary hoy Jesosy taminy: Lazaiko aminareo marina tokoa: Tsy misy olona izay efa nahafoy trano, na vady, na rahalahy, na ray, na reny, na zanaka, noho ny fanjakan’Andriamanitra, '
  '3':
  - type: text
    content: 'Ary nisy mpitondratena tao amin’izany tanàna izany, izay nankao aminy matetika ka nanao hoe: Omeo rariny aho amin’ilay manana ady amiko. '
  '30':
  - type: text
    content: izay tsy handray be lavitra amin’izao andro ankehitriny izao, ary amin’ny andro ho avy dia fiainana mandrakizay.
  - type: heading
    content: Ny nilazan’i Jesosy fanintelony ny hiaretany.
  - type: heading
    content: Mat. 20.17-19; Mar. 10.32-34.
  '31':
  - type: text
    content: 'ARY Jesosy naka ny roa ambin’ny folo lahy ka nanao taminy hoe: Indro, miakatra ho any Jerosalema isika, dia ho tanteraka ny zavatra rehetra izay voasoratry ny mpaminany ny amin’ny Zanak’olona. '
  '32':
  - type: text
    content: 'Fa hatolotra ho amin’ny jentilisa Izy, dia hataony fihomehezana sy hisetrasetrany sy hororany '
  '33':
  - type: text
    content: 'ary hokapohiny sy hovonoiny, ary amin’ny andro fahatelo dia hitsangana Izy. '
  '34':
  - type: text
    content: Nefa tsy nisy azony akory izany teny izany, ka dia tsy fantany izay nolazainy (fa nafenina taminy izany teny izany).
  - type: heading
    content: Ny nampahiratan’i Jesosy lehilahy jamba tao akaikin’i Jeriko.
  - type: heading
    content: Mat. 20.29-34; Mar. 10.46-52.
  '35':
  - type: text
    content: 'ARY raha Jesosy nanakaiky an’i Jeriko, dia indro jamba anankiray nipetraka nangataka teo amoron-dàlana. '
  '36':
  - type: text
    content: 'Ary raha nandre ny vahoaka mandalo izy, dia nanontany hoe: Inona izany? '
  '37':
  - type: text
    content: 'Ary hoy ny olona taminy: Jesosy avy any Nazareta no mandalo. '
  '38':
  - type: text
    content: 'Dia niantso mafy ralehilahy ka nanao hoe: Ry Jesosy, Zanak’i Davida ô, mamindrà fo amiko. '
  '39':
  - type: text
    content: 'Ary izay nandeha teny aloha dia niteny mafy azy mba hangina, fa vao mainka niantsoantso izy ka nanao hoe: Ry Zanak’i Davida ô, mamindrà fo amiko. '
  '4':
  - type: text
    content: 'Ary tsy nanaiky izy aloha; fa rehefa afaka izany, dia nanao anakampo hoe izy: Na dia tsy matahotra an’Andriamanitra aza aho sady tsy mena-maso olona, '
  '40':
  - type: text
    content: 'Ary Jesosy nijanona, dia nasainy ho entina eo aminy ralehilahy; ary rehefa mby akaiky izy, dia nanontany azy Jesosy '
  '41':
  - type: text
    content: 'ka nanao hoe: Inona moa no tianao hataoko aminao? Ary hoy izy: Tompoko, ny mba hampahiratina ny masoko. '
  '42':
  - type: text
    content: 'Dia hoy Jesosy taminy: Mahirata ny masonao; ny finoanao no efa nahavonjy anao. '
  '43':
  - type: text
    content: Ary niaraka tamin’izay dia nahiratra ny masony, ka nanaraka an’i Jesosy izy sady nankalaza an’Andriamanitra; ary ny vahoaka rehetra, raha nahita, dia nidera an’Andriamanitra.
  '5':
  - type: text
    content: mba homeko rariny ihany io mpitondratena io, fa manahirana ahy izy, fandrao ho avy mandra-kariva izy ka hampahasosotra ahy.
  '6':
  - type: text
    content: 'Ary hoy ny Tompo: Henoy izay lazain’ilay mpitsara tsy marina. '
  '7':
  - type: text
    content: 'Fa Andriamanitra tsy hanome rariny ny olom-boafidiny va, izay mitaraina aminy andro aman-alina, ary moa hitaredretra va Izy? '
  '8':
  - type: text
    content: Lazaiko aminareo fa homeny rariny faingana izy. Kanefa, raha avy ny Zanak’olona, moa hahita finoana etỳ ambonin’ny tany va Izy?
  - type: heading
    content: Ny fanoharana ny amin’ny Fariseo sy ny mpamory hetra.
  '9':
  - type: text
    content: 'ARY Jesosy nanao ity fanoharana ity tamin’ny sasany izay natoky tena ho marina ka namingavinga ny hafa; '
