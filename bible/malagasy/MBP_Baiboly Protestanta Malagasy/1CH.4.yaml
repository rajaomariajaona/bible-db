document_id: 1CH.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny taranak’i Joda sisa.
  - type: text
    content: 'NY zanakalahin’i Joda dia Fareza sy Hezrona sy Karmy sy Hora ary Sobala. '
  '10':
  - type: text
    content: 'Ary Jabeza niantso an’Andriamanitry ny Isiraely hoe: Enga anie ka hotahinao tokoa aho, ka hohalalahinao ny fari-taniko, ary ho amiko ny tànanao, ka harovanao amin’ny ratsy aho, mba tsy hampahory ahy izany. Ary dia nomen’Andriamanitra azy ny nangatahiny.'
  '11':
  - type: text
    content: 'Ary Keloba, rahalahin’i Soha, niteraka an’i Mehira, rain’i Estona; '
  '12':
  - type: text
    content: 'ary Estona niteraka an’i Betirafa sy Pasea ary Tehina, rain’Ir-nahasa. Ireo dia mponina tao Reka. '
  '13':
  - type: text
    content: 'Ary ny zanakalahin’i Kenaza dia Otniela sy Seraia; ary ny zanakalahin’i Otniela dia Hatata. '
  '14':
  - type: text
    content: 'Ary Meonotahy niteraka an’i Ofra; ary Seraia niteraka an’i Joaba, razamben’ny ao an-dohasahan’ny mpiasa; fa mpiasa ireo. '
  '15':
  - type: text
    content: 'Ary ny zanakalahin’i Kaleba, zanakalahin’i Jefone, dia Iro sy Elaha sy Nama; ary ny zanakalahin’i Elaha dia Kenaza. '
  '16':
  - type: text
    content: 'Ary ny zanakalahin’i Jehalalila dia Zifa sy Zifaha sy Tiria ary Asarela. '
  '17':
  - type: text
    content: 'Ary ny zanakalahin’i Ezra dia Jatera sy Mareda sy Efera ary Jalona; ary izy niteraka an’i Miriama sy Samay ary Jisba, razamben’ny any Estemoa. '
  '18':
  - type: text
    content: 'Ary Jehodia vadiny niteraka an’i Jareda, razamben’ny any Gedora, sy Hebera, razamben’ny any Soko, ary Jakotiela, razamben’ny any Zanoa. Ireo no zanakalahin’i Bitia, zanakavavin’i Farao, izay novadin’i Mareda. '
  '19':
  - type: text
    content: 'Ary ny zanakalahin’i Hodia vadiny, izay anabavin’i Nahama, dia ny razamben’ny an’i Keila Garmita sy Estemoa Makatita. '
  '2':
  - type: text
    content: 'Ary Reaia, zanakalahin’i Sobala, niteraka an’i Jahata; ary Jahata niteraka an’i Ahomay sy Lahada. Ireo no fokon’ny Zoraïta. '
  '20':
  - type: text
    content: Ary ny zanakalahin’i Simona dia Amnona sy Rina sy Ben-hanana ary Tilona. Ary ny zanakalahin’i Jisy dia Zoheta sy Ben-zoheta.
  '21':
  - type: text
    content: 'Ary ny zanakalahin’i Sela, zanak’i Joda, dia Era, rain’i Leka, sy Lada, rain’i Maresa, sy ny fokon’ny mpanao rongony fotsy madinika amin’ny ankohonan’i Asbea; '
  '22':
  - type: text
    content: 'ary Jokima sy ny mponina tao Kozeba ary Joasy sy Sarafa, izay samy nanapaka tany Moaba, ary Jasobi-lehema. Ary efa ela izany zavatra izany. '
  '23':
  - type: text
    content: Ireo no mpanefy vilany sy mponina tany Netaima sy Gadera; tany no nitoerany tamin’ny mpanjaka hanao ny asany.
  - type: heading
    content: Ny taranak’i Simeona sy ny fonenany.
  '24':
  - type: text
    content: 'NY zanakalahin’i Simeona dia Nemoela sy Jamina sy Jariba sy Zera ary Saoly, '
  '25':
  - type: text
    content: 'dia Saloma no zanakalahin’i Saoly, Mibsama no zanakalahin’i Saloma, Misma no zanakalahin’i Mibsama. '
  '26':
  - type: text
    content: 'Ary ny zanakalahin’i Misma dia Hamoela, ary Zakora no zanakalahin’i Hamoela, Simey no zanakalahin’i Zakora. '
  '27':
  - type: text
    content: 'Ary Simey nanan-janaka enina ambin’ny folo lahy sy enim-bavy; fa ny rahalahiny tsy nanan-janaka maro, sady tsy nihamaro tahaka ny taranak’i Joda ny fokony rehetra. '
  '28':
  - type: text
    content: 'Ary izy nonina tao Beri-sheba sy Molada sy Hazara-soala '
  '29':
  - type: text
    content: 'sy Bila sy Ezema sy Tolada '
  '3':
  - type: text
    content: 'Ary izao no avy amin’ny rain’i Etama: Jezirela sy Jisma ary Jidbasy, ary Hazelelpony no anaran’ny anabaviny, '
  '30':
  - type: text
    content: 'sy Betoela sy Horma sy Ziklaga '
  '31':
  - type: text
    content: 'sy Beti-markabota sy Hazora-sosima sy Beti-biry ary Saraima. Ireo no tanàna nonenany mandra-panjakan’i Davida. '
  '32':
  - type: text
    content: 'Ary ny zana-bohiny dia Etama sy Aina sy Rimona sy Tokena ary Asana, tanàna dimy ireo, '
  '33':
  - type: text
    content: ary ny zana-bohiny rehetra koa izay manodidina izany tanàna izany hatrany Bala. Ireo no fonenany sady nanana fitantaram-pirazanana manokana izy.
  '34':
  - type: text
    content: 'Ary Mesobaba sy Jamleka sy Josa, zanak’i Amazia, '
  '35':
  - type: text
    content: 'ary Joela sy Jeho, zanak’i Josibia, zanak’i Seraia, zanak’i Asiela, '
  '36':
  - type: text
    content: 'ary Elioenay sy Jakoba sy Jesohaia sy Asaia sy Adiela sy Jesimiela sy Benaia '
  '37':
  - type: text
    content: 'sy Ziza, zanak’i Sify, zanak’i Alona, zanak’i Jedaia, zanak’i Simry, zanak’i Semaia; '
  '38':
  - type: text
    content: 'ireo voalaza anarana ireo dia samy lohany tamin’ny fokony avy; ary efa nihamaro indrindra ny fianakaviany. '
  '39':
  - type: text
    content: 'Ary nankany amin’ny fidirana ho any Gedora izy, dia hatramin’ny ilany atsinanana amin’ny lohasaha, hitady ahitra ho an’ny ondriny aman-osiny. '
  '4':
  - type: text
    content: 'ary Penoela, rain’i Gedora, sy Ezera, rain’i Hosa. Ireo no zanak’i Hora, lahimatoan’i Efrata, razamben’ny any Betlehema. '
  '40':
  - type: text
    content: 'Ary nahita ahitra maitso sady tasra izy, ary malalaka ny tany sady nandry fahizay; nefa ny taranak’i Hama no nonina tany taloha. '
  '41':
  - type: text
    content: Ary ireo voasoratra anarana ireo dia tonga tao tamin’ny andron’i Hezekia, mpanjakan’ny Joda, ka namely ny lay sy ny fonenana
  - type: note
    content: 'Na: sy ny Meonita.'
  - type: text
    content: ' hitany tao sy nandringana'
  - type: note
    content: Heb. nanao azy ho herema herema.
  - type: text
    content: ' azy rehetra mandraka ankehitriny, dia nonina nisolo azy; fa nisy ahitra ho an’ny ondriny aman-osiny tany.'
  '42':
  - type: text
    content: 'Ary nisy lehilahy dimam-jato tamin’ny taranak’i Simeona nankany amin’ny tendrombohitra Seïra ka nanana an’i Peletia sy Nearia sy Refaia ary Oziela, zanakalahin’i Jisy, ho mpifehy azy. '
  '43':
  - type: text
    content: Ary namely ny sisa afaka tamin’ny Amalekita izy, ka dia monina ao mandraka andro-any.
  '5':
  - type: text
    content: 'Ary Asora, razamben’ny any Tekoa, namporafy, dia Hela sy Nara. '
  '6':
  - type: text
    content: 'Ary Nara niteraka an’i Ahozama sy Hafera sy Temeny ary Hahastary. Ireo no zanakalahin’i Nara. '
  '7':
  - type: text
    content: 'Ary ny zanakalahin’i Hela dia Zareta sy Jizara ary Etnana. '
  '8':
  - type: text
    content: Ary Hakoza niteraka an’i Anoba sy Zobeba ary ny fokon’i Aharela, zanakalahin’i Haroma.
  '9':
  - type: text
    content: 'Ary Jabeza dia nalaza noho ny rahalahiny; ary ny reniny nanao ny anarany hoe Jabeza, fa hoy izy: Ory aho, raha niteraka azy. '
