document_id: NUM.14
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandavan’ny Zanak’Isiraely tsy hiakatra ho eny amin’ny tany Kanana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA nanandratra ny feony ny fiangonana rehetra ka nitaraina; ary nitomany ny olona tamin’iny alina iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nimonomonona tamin’i Mosesy sy Arona ny Zanak’Isiraely rehetra, ka hoy ny fiangonana rehetra taminy: Inay anie isika mba maty tany amin’ny tany Egypta ihany; na inay anie isika mba maty tatỳ amin’ity efitra ity! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nahoana Jehovah no mitondra antsika ho amin’ity tany ity ho lavon-tsabatra, ary ny vadintsika sy ny zanatsika madinika ho babo; tsy aleontsika miverina ho any Egypta va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nifampitaona hoe izy: Andeha hifidy mpitarika isika ka hiverina any Egypta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Mosesy sy Arona dia niankohoka teo anatrehan’ny fivorian’ny fiangonana, dia ny Zanak’Isiraely rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Josoa, zanak’i Nona, sy Kaleba, zanak’i Jefone, izay isan’ny nisafo ny tany, dia nandriatra ny fitafiany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary niteny tamin’ny fiangonona, dia ny Zanak’Isiraely rehetra, izy roa lahy ka nanao hoe: Ny tany izay nalehanay nosafoina dia tany tsara indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha sitrak’i Jehovah isika, dia hitondra antsika ho amin’izany tany izany Izy, ka homeny antsika, dia tany tondra-dronono sy tantely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa aza miodina amin’i Jehovah hianareo, ary aza matahotra ny tompon-tany; fa hanina ho antsika ireo; ny fiarovany efa niala taminy, ary Jehovah momba antsika; koa aza matahotra azy hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy ny fiangonana rehetra: Torahy vato izy roa lahy.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Kanjo ny voninahitr’i Jehovah niseho teo amin’ny trano-lay fihaonana, teo anatrehan’ny Zanak’Isiraely rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Mosesy: Mandra-pahoviana no hamotsifotsian’ity firenena ity Ahy? ary mandra-pahoviana no tsy hinoany Ahy noho ny famantarana rehetra izay nataoko teo aminy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hamely azy amin’ny areti-mandringana Aho ka hamongotra azy, fa hanao anao ho firenena lehibe sy mahery noho izy kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Mosesy tamin’i Jehovah: Dia ho ren’ny Egyptiana izany; fa ny herinao no nitondranao ity firenena ity nivoaka avy teo aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary holazainy amin’ny monina eo amin’ity tany ity izany; ary efa reny fa Hianao Jehovah no eto amin’ity firenena ity, ary Hianao Jehovah no hita mifanatrika, ary ny rahonao mijanona eo amboniny, ary Hianao no mitarika azy eo aloha amin’ny andri-rahona nony andro, ary amin’ny andri-afo nony alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha mahafaty ity firenena ity toy ny olona iray Hianao, dia hiteny ny jentilisa, izay nandre ny lazanao, ka hanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Satria tsy zakan’i Jehovah ny mitondra iny firenena iny ho any amin’ny tany izay nianianany taminy homena azy, dia namono azy tany an-efitra Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ankehitriny, aoka hiseho ny halehiben’ny herin’ny Tompo, araka ilay teninao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mahari-po Jehovah sady be famindrampo, mamela heloka sy fahadisoana, kanefa tsy mety manamarina ny meloka, fa mamaly ny heloky ny ray amin’ny zanaka hatramin’ny zafiafy sy ny zafindohalika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mifona aminao aho, mamelà ny helok’ity firenena ity araka ny halehiben’ny famindramponao, sy araka ny namelanao ny helok’ity firenena ity hatrany Egypta ka mandraka ankehitriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy Jehovah: Efa navelako araka ny teninao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Kanefa raha velona koa Aho, ka ho feno ny voninahitr’i Jehovah ny tany rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ireo lehilahy rehetra ireo, izay nahita ny voninahitro sy ny famantarako izay nataoko tany Egypta sy tany an-efitra, nefa naka fanahy Ahy izao impolo izao, ka tsy nihaino ny feoko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia tsy hahita mihitsy ny tany izay nianianako tamin’ny razany homena azy; eny, izay rehetra namotsifotsy Ahy dia samy tsy hahita izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa ny amin’i Kaleba mpanompoko kosa, satria fanahy hafa no tao aminy, ka tanteraka tamin’ny fanarahana Ahy izy, dia ho entiko ho any amin’ny tany izay nalehany izy, ary ny zanany handova izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny Amalekita sy ny Kananita no mponina eo amin’ny lohasaha; koa rahampitso dia miverena hianareo, ka mankanesa any an-efitra amin’ny làlana mankany amin’ny Ranomasina Mena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mandra-pahoviana no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mbola handeferako amin’
  - type: text
    text: ' izao fiangonana ratsy mimonomonona amiko izao? Efa reko ny fimonomononan’ny Zanak’Isiraely, izay imonomononany amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lazao aminy hoe: Raha velona koa Aho, hoy Jehovah, dia araka izay nolazainareo teo anatrehako no hataoko aminareo: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Etỳ amin’ity efitra ity no hiampatramparan’ny fatinareo; ary hianareo rehetra izay voalamina araka ny nanisana anareo, dia ny hatramin’ny roa-polo taona no ho miakatra, izay efa nimonomonona tamiko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dia tsy ho tonga mihitsy any amin’ny tany izay nananganako tànana hamponenana anareo, afa-tsy Kaleba, zanak’i Jefone, sy Josoa, zanak’i Nona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa ny zanakareo madinika kosa, izay nolazainareo fa ho babo, dia izy no ho entiko miditra, ary izy no hahalala ny tany izay nolavinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa ny aminareo, dia hiampatrampatra amin’ity efitra ity ny fatinareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ary ny zanakareo hirenireny toy ny mpiandry ondry atỳ an-efitra efa-polo taona ka hiharan’ny valin’ny fijangajanganareo, mandra-pahafatinareo rehetra atỳ an-efitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Araka ny isan’ny andro efa-polo izay nisafoanareo ny tany,–ka ny andro iray hosoloana taona iray–no hitondranareo ny helokareo efa-polo taona; ka dia ho fantatrareo ny fahafoizako '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anareo.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Izaho Jehovah efa nilaza fa hataoko tokoa izany amin’izao fiangonana ratsy rehetra izao, izay miangona hiodina amiko; etỳ amin’ity efitra ity no hahalany ritra azy, ary etỳ no hahafatesany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny lehilahy izay nirahin’i Mosesy hisafo ny tany, dia izay niverina ka nampimonomonona ny fiangonana rehetra tamin’i Mosesy, satria nanao laza ratsy ny tany izy,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'dia matin’ny areti-mandringana teo anatrehan’i Jehovah ireny lehilahy nilaza ratsy ny tany ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fa Josoa, zanak’i Nona, sy Kaleba, zanak’i Jefone, kosa, izay isan’ny lehilahy nandeha nisafo ny tany, dia velona ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Dia nolazain’i Mosesy tamin’ny Zanak’Isiraely rehetra izany teny izany; ka dia nanjoretra terỳ ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nifoha maraina koa izy ary niakatra tany an-tampon’ny tendrombohitra ka nanao hoe: Indreto izahay hiakatra ho any amin’ny tany izay nolazain’i Jehovah, fa efa nanota izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia hoy Mosesy: Nahoana no mandika ny didin’i Jehovah hianareo? fa tsy hambinina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Aza miakatra, fa tsy momba anareo Jehovah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: fandrao ho resy eo anoloan’ny fahavalonareo hianareo; fa ny Amalekita sy ny Kananita dia eo anoloanareo, ka ho lavon-tsabatra hianareo; satria niala tamin’ny fanarahana an’i Jehovah hianareo, dia tsy homba anareo Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Kanjo sahisahy foana izy ka niakatra teo an-tampon’ny tendrombohitra ihany; nefa Mosesy sy ny fiaran’ny faneken’i Jehovah tsy niala teo an-toby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Dia nidina ny Amalekita sy ny Kananita, izay nonina teo amin’izany tendrombohitra izany, ka namely azy ary nanorotoro azy hatrany Horma.
