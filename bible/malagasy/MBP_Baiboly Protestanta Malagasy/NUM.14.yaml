document_id: NUM.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandavan’ny Zanak’Isiraely tsy hiakatra ho eny amin’ny tany Kanana.
  - type: text
    content: 'DIA nanandratra ny feony ny fiangonana rehetra ka nitaraina; ary nitomany ny olona tamin’iny alina iny. '
  '10':
  - type: text
    content: 'Fa hoy ny fiangonana rehetra: Torahy vato izy roa lahy.'
  - type: text
    content: Kanjo ny voninahitr’i Jehovah niseho teo amin’ny trano-lay fihaonana, teo anatrehan’ny Zanak’Isiraely rehetra.
  '11':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Mosesy: Mandra-pahoviana no hamotsifotsian’ity firenena ity Ahy? ary mandra-pahoviana no tsy hinoany Ahy noho ny famantarana rehetra izay nataoko teo aminy? '
  '12':
  - type: text
    content: Hamely azy amin’ny areti-mandringana Aho ka hamongotra azy, fa hanao anao ho firenena lehibe sy mahery noho izy kosa.
  '13':
  - type: text
    content: 'Dia hoy Mosesy tamin’i Jehovah: Dia ho ren’ny Egyptiana izany; fa ny herinao no nitondranao ity firenena ity nivoaka avy teo aminy, '
  '14':
  - type: text
    content: 'ary holazainy amin’ny monina eo amin’ity tany ity izany; ary efa reny fa Hianao Jehovah no eto amin’ity firenena ity, ary Hianao Jehovah no hita mifanatrika, ary ny rahonao mijanona eo amboniny, ary Hianao no mitarika azy eo aloha amin’ny andri-rahona nony andro, ary amin’ny andri-afo nony alina. '
  '15':
  - type: text
    content: 'Fa raha mahafaty ity firenena ity toy ny olona iray Hianao, dia hiteny ny jentilisa, izay nandre ny lazanao, ka hanao hoe: '
  '16':
  - type: text
    content: 'Satria tsy zakan’i Jehovah ny mitondra iny firenena iny ho any amin’ny tany izay nianianany taminy homena azy, dia namono azy tany an-efitra Izy. '
  '17':
  - type: text
    content: 'Ary ankehitriny, aoka hiseho ny halehiben’ny herin’ny Tompo, araka ilay teninao hoe: '
  '18':
  - type: text
    content: 'Mahari-po Jehovah sady be famindrampo, mamela heloka sy fahadisoana, kanefa tsy mety manamarina ny meloka, fa mamaly ny heloky ny ray amin’ny zanaka hatramin’ny zafiafy sy ny zafindohalika. '
  '19':
  - type: text
    content: Mifona aminao aho, mamelà ny helok’ity firenena ity araka ny halehiben’ny famindramponao, sy araka ny namelanao ny helok’ity firenena ity hatrany Egypta ka mandraka ankehitriny.
  '2':
  - type: text
    content: 'Dia nimonomonona tamin’i Mosesy sy Arona ny Zanak’Isiraely rehetra, ka hoy ny fiangonana rehetra taminy: Inay anie isika mba maty tany amin’ny tany Egypta ihany; na inay anie isika mba maty tatỳ amin’ity efitra ity! '
  '20':
  - type: text
    content: 'Dia hoy Jehovah: Efa navelako araka ny teninao izany. '
  '21':
  - type: text
    content: 'Kanefa raha velona koa Aho, ka ho feno ny voninahitr’i Jehovah ny tany rehetra, '
  '22':
  - type: text
    content: 'ireo lehilahy rehetra ireo, izay nahita ny voninahitro sy ny famantarako izay nataoko tany Egypta sy tany an-efitra, nefa naka fanahy Ahy izao impolo izao, ka tsy nihaino ny feoko, '
  '23':
  - type: text
    content: 'dia tsy hahita mihitsy ny tany izay nianianako tamin’ny razany homena azy; eny, izay rehetra namotsifotsy Ahy dia samy tsy hahita izany. '
  '24':
  - type: text
    content: 'Fa ny amin’i Kaleba mpanompoko kosa, satria fanahy hafa no tao aminy, ka tanteraka tamin’ny fanarahana Ahy izy, dia ho entiko ho any amin’ny tany izay nalehany izy, ary ny zanany handova izany. '
  '25':
  - type: text
    content: Ary ny Amalekita sy ny Kananita no mponina eo amin’ny lohasaha; koa rahampitso dia miverena hianareo, ka mankanesa any an-efitra amin’ny làlana mankany amin’ny Ranomasina Mena.
  '26':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  '27':
  - type: text
    content: 'Mandra-pahoviana no '
  - type: text
    content: mbola handeferako amin’
  - type: text
    content: ' izao fiangonana ratsy mimonomonona amiko izao? Efa reko ny fimonomononan’ny Zanak’Isiraely, izay imonomononany amiko. '
  '28':
  - type: text
    content: 'Lazao aminy hoe: Raha velona koa Aho, hoy Jehovah, dia araka izay nolazainareo teo anatrehako no hataoko aminareo: '
  '29':
  - type: text
    content: 'Etỳ amin’ity efitra ity no hiampatramparan’ny fatinareo; ary hianareo rehetra izay voalamina araka ny nanisana anareo, dia ny hatramin’ny roa-polo taona no ho miakatra, izay efa nimonomonona tamiko, '
  '3':
  - type: text
    content: 'Ary nahoana Jehovah no mitondra antsika ho amin’ity tany ity ho lavon-tsabatra, ary ny vadintsika sy ny zanatsika madinika ho babo; tsy aleontsika miverina ho any Egypta va? '
  '30':
  - type: text
    content: 'dia tsy ho tonga mihitsy any amin’ny tany izay nananganako tànana hamponenana anareo, afa-tsy Kaleba, zanak’i Jefone, sy Josoa, zanak’i Nona. '
  '31':
  - type: text
    content: 'Fa ny zanakareo madinika kosa, izay nolazainareo fa ho babo, dia izy no ho entiko miditra, ary izy no hahalala ny tany izay nolavinareo. '
  '32':
  - type: text
    content: 'Fa ny aminareo, dia hiampatrampatra amin’ity efitra ity ny fatinareo; '
  '33':
  - type: text
    content: 'ary ny zanakareo hirenireny toy ny mpiandry ondry atỳ an-efitra efa-polo taona ka hiharan’ny valin’ny fijangajanganareo, mandra-pahafatinareo rehetra atỳ an-efitra. '
  '34':
  - type: text
    content: 'Araka ny isan’ny andro efa-polo izay nisafoanareo ny tany,–ka ny andro iray hosoloana taona iray–no hitondranareo ny helokareo efa-polo taona; ka dia ho fantatrareo ny fahafoizako '
  - type: text
    content: anareo.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Izaho Jehovah efa nilaza fa hataoko tokoa izany amin’izao fiangonana ratsy rehetra izao, izay miangona hiodina amiko; etỳ amin’ity efitra ity no hahalany ritra azy, ary etỳ no hahafatesany.
  '36':
  - type: text
    content: 'Ary ny lehilahy izay nirahin’i Mosesy hisafo ny tany, dia izay niverina ka nampimonomonona ny fiangonana rehetra tamin’i Mosesy, satria nanao laza ratsy ny tany izy,– '
  '37':
  - type: text
    content: 'dia matin’ny areti-mandringana teo anatrehan’i Jehovah ireny lehilahy nilaza ratsy ny tany ireny. '
  '38':
  - type: text
    content: Fa Josoa, zanak’i Nona, sy Kaleba, zanak’i Jefone, kosa, izay isan’ny lehilahy nandeha nisafo ny tany, dia velona ihany.
  '39':
  - type: text
    content: Dia nolazain’i Mosesy tamin’ny Zanak’Isiraely rehetra izany teny izany; ka dia nanjoretra terỳ ny olona.
  '4':
  - type: text
    content: 'Dia nifampitaona hoe izy: Andeha hifidy mpitarika isika ka hiverina any Egypta.'
  '40':
  - type: text
    content: 'Dia nifoha maraina koa izy ary niakatra tany an-tampon’ny tendrombohitra ka nanao hoe: Indreto izahay hiakatra ho any amin’ny tany izay nolazain’i Jehovah, fa efa nanota izahay.'
  '41':
  - type: text
    content: 'Dia hoy Mosesy: Nahoana no mandika ny didin’i Jehovah hianareo? fa tsy hambinina izany. '
  '42':
  - type: text
    content: 'Aza miakatra, fa tsy momba anareo Jehovah, '
  '43':
  - type: text
    content: fandrao ho resy eo anoloan’ny fahavalonareo hianareo; fa ny Amalekita sy ny Kananita dia eo anoloanareo, ka ho lavon-tsabatra hianareo; satria niala tamin’ny fanarahana an’i Jehovah hianareo, dia tsy homba anareo Izy.
  '44':
  - type: text
    content: 'Kanjo sahisahy foana izy ka niakatra teo an-tampon’ny tendrombohitra ihany; nefa Mosesy sy ny fiaran’ny faneken’i Jehovah tsy niala teo an-toby. '
  '45':
  - type: text
    content: Dia nidina ny Amalekita sy ny Kananita, izay nonina teo amin’izany tendrombohitra izany, ka namely azy ary nanorotoro azy hatrany Horma.
  '5':
  - type: text
    content: Ary Mosesy sy Arona dia niankohoka teo anatrehan’ny fivorian’ny fiangonana, dia ny Zanak’Isiraely rehetra.
  '6':
  - type: text
    content: 'Ary Josoa, zanak’i Nona, sy Kaleba, zanak’i Jefone, izay isan’ny nisafo ny tany, dia nandriatra ny fitafiany; '
  '7':
  - type: text
    content: 'ary niteny tamin’ny fiangonona, dia ny Zanak’Isiraely rehetra, izy roa lahy ka nanao hoe: Ny tany izay nalehanay nosafoina dia tany tsara indrindra. '
  '8':
  - type: text
    content: 'Raha sitrak’i Jehovah isika, dia hitondra antsika ho amin’izany tany izany Izy, ka homeny antsika, dia tany tondra-dronono sy tantely. '
  '9':
  - type: text
    content: 'Fa aza miodina amin’i Jehovah hianareo, ary aza matahotra ny tompon-tany; fa hanina ho antsika ireo; ny fiarovany efa niala taminy, ary Jehovah momba antsika; koa aza matahotra azy hianareo. '
