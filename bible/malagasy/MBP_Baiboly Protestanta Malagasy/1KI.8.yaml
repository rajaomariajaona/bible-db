document_id: 1KI.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitokanana ny tempoly.
  - type: text
    content: ARY tamin’izany Solomona mpanjaka dia namory ny loholon’ny Isiraely sy ny lohan’ny firenena rehetra, dia ny lohan’ny fianakaviana tamin’ny Zanak’Isiraely, ho ao aminy tany Jerosalema mba hampakatra ny fiaran’ny faneken’i Jehovah avy ao Ziona, Tanànan’i Davida.
  '10':
  - type: text
    content: 'Ary nony nivoaka avy tao amin’ny fitoerana masina ny mpisorona, dia nameno ny tranon’i Jehovah ny rahona; '
  '11':
  - type: text
    content: ka dia tsy nahajanona hanao fanompoam-pivavahana ny mpisorona noho ny rahona, satria ny voninahitr’i Jehovah nameno ny tranon’i Jehovah.
  '12':
  - type: text
    content: 'Dia hoy Solomona: Jehovah efa nilaza fa hitoetra ao amin’ny aizim-pito Izy. '
  '13':
  - type: text
    content: Efa nanao trano hitoeranao tokoa aho, dia fitoerana hitoeranao mandrakizay.
  '14':
  - type: text
    content: 'Ary ny mpanjaka nitodika ka nitso-drano ny fiangonana, dia ny Isiraely rehetra (nitsangana avokoa ny fiangonana, dia ny Isiraely rehetra), '
  '15':
  - type: text
    content: 'ka nanao hoe: Isaorana anie Jehovah, Andriamanitry ny Isiraely, fa ny vavany efa niteny tamin’i Davida raiko, ary ny tànany no nahatanteraka izany taminy, dia ilay hoe: '
  '16':
  - type: text
    content: 'Hatramin’ny andro nitondrako ny Isiraely oloko nivoaka avy tany Egypta dia tsy mbola nisy tanàna nofidiko tamin’ny firenen’Isiraely rehetra hanaovana trano hitoeran’ny anarako; fa nifidy an’i Davida Aho hanapaka ny Isiraely oloko. '
  '17':
  - type: text
    content: 'Ary efa mby tao am-pon’i Davida raiko ny hanao trano ho an’ny anaran’i Jehovah, Andriamanitry ny Isiraely. '
  '18':
  - type: text
    content: 'Nefa hoy Jehovah tamin’i Davida raiko: Satria tao am-ponao ny fikasana hanao trano ho an’ny anarako, dia tsara izany fikasanao izany. '
  '19':
  - type: text
    content: 'Kanefa kosa tsy hianao no hanao ny trano, fa ny zanakao izay haterakao, izy no hanao ny trano ho an’ny anarako. '
  '2':
  - type: text
    content: 'Dia nivory ho any amin’i Solomona mpanjaka ny lehilahy rehetra amin’ny Isiraely tamin’ny andro firavoravoana tamin’ny volana Etanima (volana fahafito izany). '
  '20':
  - type: text
    content: 'Ary Jehovah efa nahatanteraka ny teniny izay nolazainy, koa nitsangana handimby an’i Davida raiko aho ary mipetraka eo amin’ny seza fiandrianan’ny Isiraely tahaka ny efa nolazain’i Jehovah, sady efa nanao ny trano ho an’ny anaran’i Jehovah, Andriamanitry ny Isiraely, aho. '
  '21':
  - type: text
    content: Ary nasiako fitoerana teo ho an’ny fiara izay itoeran’ny faneken’i Jehovah, ilay nataony tamin’ny razantsika fony Izy nitondra azy nivoaka avy tany Egypta.
  '22':
  - type: text
    content: 'Ary Solomona nitsangana teo anoloan’ny alitaran’i Jehovah teo anatrehan’ny fiangonana, dia ny Isiraely rehetra, ka namelatra ny tànany nanandrify ny lanitra '
  '23':
  - type: text
    content: 'ary nanao hoe: Ry Jehovah, Andriamanitry ny Isiraely ô, tsy misy Andriamanitra tahaka Anao na amin’ny lanitra ambony na amin’ny tany ambany, Izay mitandrina ny fanekenao sy ny famindramponao ho an’ny mpanomponao izay mandeha eo anatrehanao amin’ny fony rehetra, '
  '24':
  - type: text
    content: 'sady efa nahatanteraka tamin’i Davida raiko mpanomponao ilay nolazainao taminy; fa nolazain’ny vavanao izany, dia notanterahin’ny tànanao tahaka ny amin’izao anio izao. '
  '25':
  - type: text
    content: 'Koa tanteraho amin’i Davida raiko mpanomponao, Jehovah, Andriamanitry ny Isiraely ô, ilay nolazainao taminy hoe: Tsy ho diso zanakalahy eo anatrehako hianao hipetraka amin’ny seza fiandrianan’ny Isiraely, raha ny zanakao mitandrina ny alehany, handehanany eo anatrehako tahaka ny nandehananao teo anatrehako. '
  '26':
  - type: text
    content: 'Koa ankehitriny, ry Andriamanitry ny Isiraely ô, mifona aminao aho, aoka ho to anie ny teninao, izay nolazainao tamin’i Davida raiko mpanomponao. '
  '27':
  - type: text
    content: 'Andriamanitra va dia honina etỳ an-tany tokoa? He! ny lanitra, ary ny lanitry ny lanitra aza tsy omby Anao, koa mainka fa ity trano nataoko ity! '
  '28':
  - type: text
    content: 'Koa atreho ny fivavaka sy ny fifonan’ny mpanomponao, Jehovah Andriamanitro ô, mba hohenoinao ny fitarainana sy ny fivavaka izay ataon’ny mpanomponao eto anatrehanao anio, '
  '29':
  - type: text
    content: 'mba hihiratan’ny masonao andro aman-alina amin’ity trano ity, dia amin’ny fitoerana nolazainao hoe: Ho ao ny anarako–hihainoanao ny vavaka izay ataon’ny mpanomponao manatrika ity fitoerana ity. '
  '3':
  - type: text
    content: 'Ary tonga ny loholon’ny Isiraely rehetra, ary ny mpisorona no nitondra ny fiara; '
  '30':
  - type: text
    content: Ary henoy ny fifonan’ny mpanomponao sy ny Isiraely olonao, raha mivavaka manatrika ity fitoerana ity izy; dia mihainoa any an-danitra fonenanao Hianao; eny, mihainoa, ka mamelà heloka.
  '31':
  - type: text
    content: 'Raha misy olona manota amin’ny namany, ary ampianianiny, ka tonga hianiana eo anoloan’ny alitaranao amin’ity trano ity izy, '
  '32':
  - type: text
    content: dia mihainoa any an-danitra Hianao, ka manaova, ary mitsarà ny mpanomponao, hanameloka ny ratsy fanahy ka hampitsingerina ny nataony ho amin’ny lohany, ary hanamarina ny marina kosa ka hanome azy araka ny fahamarinany.
  '33':
  - type: text
    content: 'Raha resy eo anoloan’ny fahavalo ny Isiraely olonao noho ny nanotany taminao, ary miverina aminao sy manaiky ny anaranao indray ka mivavaka sy mifona aminao eto amin’ity trano ity izy, '
  '34':
  - type: text
    content: dia mihainoa any an-danitra Hianao, ka mamelà ny fahotan’ny Isiraely olonao, ary ampodio amin’ny tany nomenao ny razany izy.
  '35':
  - type: text
    content: 'Raha mihantona ny andro ka tsy misy ranonorana noho ny nanotan’ny olona taminao, ka mivavaka manatrika ity fitoerana ity izy ka manaiky ny anaranao sady miala amin’ny fahotany, satria ampahorinao, '
  '36':
  - type: text
    content: dia mihainoa any an-danitra Hianao, ka mamelà ny fahotan’ny mpanomponao, dia ny Isiraely olonao, satria atoronao azy ny làlana tsara izay tokony halehany, ary mandatsaha ranonorana amin’ny taninao, izay nomenao ho lovan’ny olonao.
  '37':
  - type: text
    content: 'Raha misy mosary amin’ny tany, na areti-mandringana, na mainan’ny rivotra ny vary, na maty fotsy, na misy valala sy sompanga, na misy fahavalo manao fahirano azy ao amin’ny taniny, dia ao amin’ny tanànany, na inona fahoriana, na inona aretina, '
  '38':
  - type: text
    content: 'izay vavaka rehetra sy fifonana rehetra ataon’olona, na ny Isiraely olonao rehetra, izay samy mahalala ny fahorian’ny fony avy, ka mamelatra ny tànany manatrika ity trano ity izy,– '
  '39':
  - type: text
    content: 'dia mihainoa any an-danitra fonenanao Hianao, ka mamelà heloka, ary manaova, ka omeo ny olonao araka ny alehany rehetra, fa fantatrao ny fony (fa Hianao dia Hianao irery ihany no mahalala ny fon’ny zanak’olombelona rehetra), '
  '4':
  - type: text
    content: 'ary dia nampakariny ny fiaran’i Jehovah sy ny trano-lay fihaonana mbamin’ny fanaka masina rehetra izay tao amin’ny lay. Nampakarin’ny mpisorona sy ny Levita ireo zavatra ireo. '
  '40':
  - type: text
    content: mba hatahorany Anao amin’izay andro rehetra hiainany etỳ amin’ny tany nomenao ny razanay.
  '41':
  - type: text
    content: 'Ary henoy koa ny vahiny izay tsy isan’ny Isiraely olonao, fa tonga avy any amin’ny tany lavitra noho ny amin’ny anaranao izy '
  '42':
  - type: text
    content: '(fa ho reny ny anaranao lehibe sy ny tànanao mahery ary ny sandrinao ahinjitra),– koa raha avy izy ka mivavaka manatrika ity trano ity, '
  '43':
  - type: text
    content: dia mihainoa any an-danitra fonenanao Hianao, ka manaova araka izay rehetra iantsoan’ny vahiny Anao, mba ho fantatry ny firenena rehetra ambonin’ny tany ny anaranao, hatahorany Anao tahaka ny ataon’ny Isiraely olonao ihany, ary mba ho fantany fa ny anaranao no efa nantsoina tamin’ity trano nataoko ity.
  '44':
  - type: text
    content: 'Raha mivoaka hiady amin’ny fahavalony ny olonao, na ho aiza na ho aiza no hanirahanao azy, ka mivavaka amin’i Jehovah manandrify ny tanàna izay nofidinao sy ny trano izay nataoko ho an’ny anaranao izy, '
  '45':
  - type: text
    content: dia henoy any an-danitra ny fivavany sy ny fifonany, ka omeo rariny izy.
  '46':
  - type: text
    content: 'Raha manota aminao izy (fa tsy misy olombelona tsy manota), ka tezitra aminy Hianao ary manolotra azy eo anoloan’ny fahavalony, ka dia ho entin’ny mpamabo ho babo any amin’ny tanin’ny fahavalo izy, na ho lavitra na ho akaiky, '
  '47':
  - type: text
    content: 'ary mahatsiaro any amin’ny tanin’ireo namabo azy ireo izy, ka mibebaka sy mifona aminao any amin’ny tany izay nitondrany azy ho babo ary manao hoe: Efa nanota izahay sady efa nanao meloka sy efa nanao ratsy, '
  '48':
  - type: text
    content: 'ka dia miverina aminao amin’ny fony rehetra sy ny fanahiny rehetra ao amin’ny tanin’ny fahavalony izay namabo azy izy, ary mivavaka aminao manandrify ny taniny izay nomenao ny razany sy ny tanàna izay nofidinao ary ny trano izay nataoko ho an’ny anaranao,– '
  '49':
  - type: text
    content: 'dia henoy any an-danitra fonenanao ny fivavany sy ny fifonany, ka omeo rariny izy; '
  '5':
  - type: text
    content: Ary Solomona mpanjaka sy ny fiangonana, dia ny Isiraely rehetra, izay nivory teo aminy teo anoloan’ny fiara, dia samy namono zavatra hatao fanatitra, dia ondry aman-osy sy omby izay tsy tambo isaina sady tsy hita isa noho ny hamaroany.
  '50':
  - type: text
    content: 'eny, mamelà ny heloky ny olonao izay nanota taminao sy ny fahadisoany rehetra izay nataony taminao, ary ataovy mahazo famindrampo amin’izay mamabo azy izy, dia ny hamindran’ireo fo aminy; '
  '51':
  - type: text
    content: 'fa olonao sy lovanao izy, izay nentinao nivoaka avy tany Egypta, dia avy tao amin’ny memy fandrendreham-by,– '
  '52':
  - type: text
    content: 'mba hihiratan’ny masonao amin’ny fifonan’ny mpanomponao sy ny fifonan’ny Isiraely olonao hihaino azy amin’izay rehetra iantsoany Anao. '
  '53':
  - type: text
    content: Fa Hianao, Jehovah, Tompo ô, no nanavaka azy tamin’ny firenena rehetra ambonin’ny tany ho lovanao, araka izay nampilazainao an’i Mosesy mpanomponao tamin’ny nitondranao ny razanay nivoaka avy tany Egypta.
  '54':
  - type: text
    content: Ary rehefa vita izany vavaka sy fifonana rehetra nataon’i Solomona tamin’i Jehovah izany, dia nitsangana niala teo amin’ny alitaran’i Jehovah izay efa nandohalehan’ny lohaliny sy efa namelarany ny tànany ho amin’ny lanitra izy.
  '55':
  - type: text
    content: 'Ary nitsangana izy ka nitso-drano ny fiangonana, dia ny Isiraely rehetra, tamin’ny feo mahery hoe: '
  '56':
  - type: text
    content: 'Isaorana anie Jehovah, Izay nanome fitsaharana ho an’ny Isiraely olony araka izay rehetra nolazainy; tsy misy latsaka na dia teny iray aza tamin’izay teny soa rehetra nampilazainy an’i Mosesy mpanompony. '
  '57':
  - type: text
    content: 'Jehovah Andriamanitsika anie ho amintsika, tahaka ny tamin’ny razantsika; aoka tsy handao na hahafoy antsika Izy, '
  '58':
  - type: text
    content: 'mba hampanatoniny Azy ny fontsika handehanantsika amin’ny làlany rehetra sy hitandremantsika ny lalàny sy ny didiny ary ny fitsipiny izay nandidiany ny razantsika. '
  '59':
  - type: text
    content: 'Ary aoka izany teny nifonako teto anatrehan’i Jehovah izany ho ao amin’i Jehovah Andriamanitsika andro aman-alina, mba hanomezany rariny ho ahy mpanompony sy ny Isiraely olony araka izay tandrifiny ho azy isan-andro, '
  '6':
  - type: text
    content: 'Ary ny fiaran’ny faneken’i Jehovah dia nampidirin’ny mpisorona ho ao amin’ny fitoerany tao anatin’ny efi-trano anatiny, dia ny fitoerana masina indrindra, teo ambanin’ny elatry ny kerobima; '
  '60':
  - type: text
    content: 'mba ho fantatry ny firenena rehetra ambonin’ny tany fa Jehovah no Andriamanitra, fa tsy misy afa-tsy Izy. '
  '61':
  - type: text
    content: Ary aoka ho marina amin’i Jehovah Andriamanitsika anie ny fonareo, handehananareo amin’ny didiny sy hitandremanareo ny lalàny, tahaka ny amin’izao anio izao.
  '62':
  - type: text
    content: 'Ary ny mpanjaka sy ny Israely rehetra teo aminy dia namono zavatra hatao fanatitra eo anatrehan’i Jehovah. '
  '63':
  - type: text
    content: Ary Solomona namono zavatra hatao fanati-pihavanana, izay nateriny ho an’i Jehovah, dia omby roa arivo amby roa alina sy ondry aman-osy roa alina amby iray hetsy. Toy izany no nitokanan’ny mpanjaka sy ny Zanak’Isiraely rehetra ny tranon’i Jehovah.
  '64':
  - type: text
    content: Ary androtrio ihany no nanamasinan’ny mpanjaka ny afovoan’ny kianja izay teo anoloan’ny tranon’i Jehovah; fa teo no nanaterany fanatitra dorana sy fanatitra hohanina ary ny saboran’ny fanati-pihavanana; fa kely loatra ny alitara varahina izay teo anatrehan’i Jehovah ka tsy omby ny fanatitra dorana sy ny fanatitra hohanina ary ny saboran’ny fanati-pihavanana.
  '65':
  - type: text
    content: 'Ary tamin’izany andro izany Solomona sy ny Israely rehetra teo aminy, dia fiangonana lehibe hatrany akaikin’i Hamata ka hatramin’ny lohasahan-driak’i Egypta, dia nitandrina ny andro firavoravoana teo anatrehan’i Jehovah Andriamanitsika hafitoana indroa, dia efatra ambin’ny folo andro. '
  '66':
  - type: text
    content: Ary nony tamin’ny andro fahavalo dia nampodiny ny olona, ary nisaotra andriana izy, dia lasa nandeha ho any an-dainy avy, sady faly no ravoravo ny fony noho ny soa rehetra nataon’i Jehovah tamin’i Davida mpanompony sy ny Isiraely olony.
  '7':
  - type: text
    content: 'fa nivelatra teo ambonin’ny fitoeran’ny fiara ny elatry ny kerobima ka nanaloka ny fiara sy ny baony. '
  '8':
  - type: text
    content: 'Ary lava ny bao, ka hita ny lohany, raha amin’ny fitoerana masina eo anoloan’ny efitra anatiny, nefa tsy hita raha eny ivelany; ary mbola ao mandraka andro-any izy. '
  '9':
  - type: text
    content: Ary tsy nisy na inona na inona tao anatin’ny fiara afa-tsy ny vato fisaka roa, izay nataon’i Mosesy tao anatiny tany Horeba, fony Jehovah nanao fanekena tamin’ny Zanak’Isiraely tamin’ny nivoahany avy tany amin’ny tany Egypta.
