document_id: NUM.35,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hanomezana tanàna ho an’ny Levita.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy teo Arbota-moaba, amoron’i Jordana tandrifin’i Jeriko, ka nanao hoe: '
  '10':
  - type: text
    content: 'Mitenena amin’ny Zanak’Isiraely hoe: Rehefa tafita an’i Jordana hianareo ka tonga any amin’ny tany Kanana, '
  '11':
  - type: text
    content: 'dia hifidy tanàna hianareo, ho tanàna fandosirana ho anareo, mba handosiran’izay nahafaty olona tsy nahy. '
  '12':
  - type: text
    content: Dia ho fandosirana ho anareo mba tsy ho azon’ny mpamaly ra
  - type: note
    content: Heb. goel.
  - type: text
    content: ' izany tanàna izany, mba tsy ho faty izay nahafaty olona mandra-pisehony hotsaraina eo anatrehan’ny fiangonana. '
  '13':
  - type: text
    content: 'Ary ireo tanàna homenareo ireo dia ho tanàna fandosirana enina ho anareo. '
  '14':
  - type: text
    content: 'Ny tanàna telo dia homenareo etỳ an-dafin’i Jordana etỳ, ary ny tanàna telo kosa homenareo ao amin’ny tany Kanana; ho tanàna fandosirana ireo. '
  '15':
  - type: text
    content: Ireo tanàna enina ireo dia ho fandosirana ho an’ny Zanak’Isiraely sy ny vahiny ary ny mpitoetra ao aminy, mba handosiran’izay rehetra nahafaty olona tsy nahy.
  '16':
  - type: text
    content: 'Kanefa raha misy mamely vy olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona. '
  '17':
  - type: text
    content: 'Ary raha misy mamely vato olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona. '
  '18':
  - type: text
    content: 'Ary raha misy mamely hazo olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona. '
  '19':
  - type: text
    content: Ny mpamaly ra
  - type: note
    content: Heb. goel.
  - type: text
    content: ' no mahazo mamono azy; raha mihaona aminy izy, dia mahazo mamono azy. '
  '2':
  - type: text
    content: 'Mandidia ny Zanak’Isiraely mba hanome tanàna ao amin’ny zara-taniny avy honenan’ny Levita; ary homenareo tany manodidina ny tanàna koa izy. '
  '20':
  - type: text
    content: 'Ary raha misy mamely olona noho ny lolom-po, na mitoraka olona amin’ny fanotrehana, ka mahafaty, '
  '21':
  - type: text
    content: na mamely amin’ny tànany noho ny fandrafiana ka mahafaty, dia hatao maty tokoa ilay namely; nahafaty olona izy; ny mpamaly ra
  - type: note
    content: Heb. goel.
  - type: text
    content: ' no mahazo mamono azy, raha mihaona aminy izy.'
  '22':
  - type: text
    content: 'Fa raha misy mamely olona tsy nahy, ka tsy noho ny fandrafiana, na mitoraka olona na amin’inona na amin’inona, nefa tsy amin’ny fanotrehana, '
  '23':
  - type: text
    content: 'na sendra manjera vato ka mahafaty olona, nefa tsy hitany, sady tsy fahavalony izy, na mitady handratra azy, '
  '24':
  - type: text
    content: dia hotsarain’ny fiangonana ilay namely sy ny mpamaly ra
  - type: note
    content: Heb. goel.
  - type: text
    content: ' araka izany lalàna izany. '
  '25':
  - type: text
    content: Ary hovonjen’ny fiangonana ho afaka amin’ny mpamaly ra
  - type: note
    content: Heb. goel.
  - type: text
    content: ' ilay nahafaty olona, ka hateriny indray ho ao amin’ny tanàna fandosirana izay nalehany tamin’izy nandositra. Ary hitoetra ao izy mandra-pahafatin’ny mpisoronabe izay voahosotra tamin’ny diloilo masina.'
  '26':
  - type: text
    content: 'Fa raha mivoaka ho eo ivelan’ny tanàna fandosirana izay nalehany tamin’izy nandositra ilay nahafaty olona '
  '27':
  - type: text
    content: ka hitan’ny mpamaly ra
  - type: note
    content: Heb. goel.
  - type: text
    content: ' eo ivelan’ny tanàna, dia azony vonoina izy; ary tsy hisy valin-dra amin’izany, '
  '28':
  - type: text
    content: satria tokony ho nitoetra tao an-tanàna fandosirana izy mandra-pahafatin’ny mpisoronabe; fa rehefa maty ny mpisoronabe, dia mahazo mody any amin’ny zara-taniny ihany ilay nahafaty olona.
  '29':
  - type: text
    content: Ary izany zavatra izany dia ho lalàna hitondrana anareo hatramin’ny taranakareo fara mandimby eny amin’izay rehetra onenanareo.
  '3':
  - type: text
    content: 'Koa ny tanàna dia honenany; ary ny tany dia ho an’ny biby fiompiny sy ny fananany mbamin’ny bibiny rehetra. '
  '30':
  - type: text
    content: 'Ny amin’izay rehetra mahafaty olona, dia hatao maty izay mahafaty, araka ny tenin’ny vavolombelona; nefa raha vavolombelona iray monja, dia tsy ampy hanameloka hahafaty olona izany. '
  '31':
  - type: text
    content: 'Ary hianareo tsy handray avotry ny ain’ny nahafaty olona, izay meloka ka tokony ho faty; fa hatao maty tokoa izy. '
  '32':
  - type: text
    content: Ary hianareo tsy handray avotra ho an’izay mandositra ho ao an-tanàna fandosirana, mba hodiany indray hitoetra amin’ny taniny, raha mbola tsy maty ny mpisorona.
  '33':
  - type: text
    content: 'Ary aza mametaveta ny tany izay onenanareo, fa ny ra dia fametavetana ny tany; ary ny tany tsy azo anaovana fanavotana ny amin’ny ra izay nalatsaka teo, afa-tsy amin’ny ran’izay nandatsaka azy ihany. '
  '34':
  - type: text
    content: Ary aza lotoinareo ny tany onenanareo, izay itoerako; fa Izaho Jehovah mitoetra eo amin’ny Zanak’Isiraely.
  '4':
  - type: text
    content: 'Ary ny tany manodidina ny tanàna izay homenareo ny Levita dia izao: Hatramin’ny màndan’ny tanàna ka hatramin’ny faritry ny taniny dia arivo hakiho amin’ny lafiny efatra avy. '
  '5':
  - type: text
    content: Dia handrefy roa arivo hakiho eo ivelan’ny tanàna hianareo amin’ny lafiny atsinanana, ary roa arivo hakiho amin’ny lafiny atsimo, ary roa arivo hakiho amin’ny lafiny andrefana, ary roa arivo hakiho amin’ny lafiny avaratra, ary ny tanàna dia ho eo afovoany; izany no ho taniny manodidina ny tanàna.
  '6':
  - type: text
    content: 'Ary izao no tanàna izay homenareo ny Levita: dia tanàna enina fandosirana, izay homenareo handosiran’izay nahafaty olona, sy tanàna roa amby efa-polo koa. '
  '7':
  - type: text
    content: 'Koa ny tanàna rehetra izay homenareo ny Levita dia valo amby efa-polo mbamin’ny tany manodidina azy. '
  '8':
  - type: text
    content: Ary ny amin’ny tanàna izay homenareo avy amin’ny zara-tanin’
  - type: text
    content: ny firenen’
  - type: text
    content: ' ny Zanak’Isiraely, dia izay be no hanalanareo be, ary izay kely no hanalanareo kely: samy hanome tanàna ho an’ny Levita izy rehetra araka ny zara-taniny avy.'
  - type: heading
    content: Ny hifidianana tanàna handosiran’izay nahafaty olona tsy nahy.
  '9':
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
