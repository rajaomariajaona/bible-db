document_id: LUK.19
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’i Zakaiosy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jesosy niditra ka nandeha namaky an’i Jeriko. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary, indro, nisy lehilahy atao hoe Zakaiosy, izay lehiben’ny mpamory hetra sady nanan-karena. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nitady hahita izay Jesosy izy, kanefa tsy afaka noho ny habetsahan’ny olona nifanety, satria fohy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nihazakazaka nialoha izy ka nananika aviavy hizaha an’i Jesosy; fa efa handalo tamin’izany làlana izany Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary rehefa tonga teo Jesosy, dia niandrandra ka nanao taminy hoe: Ry Zakaiosy, midìna faingana; fa tsy maintsy mitoetra ao an-tranonao Aho anio. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nidina faingana izy ka nampiantrano Azy sady faly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha nahita izany izy rehetra, dia nimonomonona ka nanao hoe: Lasa nandeha hiantrano amin’izay lehilahy mpanota Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa Zakaiosy kosa nitsangana ka nanao tamin’ny Tompo hoe: Indro, Tompoko, ny antsasaky ny fananako omeko ho an’ny malahelo; ary raha misy zavatr’olona nalaiko tamin’ny fanambakana, dia honerako avy efatra heny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Jesosy taminy: Anio no tonga eto amin’ity trano ity ny famonjena, fa izy dia zanak’i Abrahama koa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa efa tonga ny Zanak’olona hitady sy hamonjy ny very.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fanoharana ny amin’ny farantsa folo.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ARY raha mbola nihaino izany ny olona, dia nandroso niteny ihany Jesosy ka nanao fanoharana, satria efa akaiky an’i Jerosalema Izy, ka nataon’ny olona fa hiseho faingana ny fanjakan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Izy: Nisy andriandahy anankiray nandeha nankany an-tany lavitra mba handray fahefana hanjaka, dia hiverina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia niantso folo lahy tamin’ny mpanompony izy ary nanome azy farantsa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mina = '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'drakma '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '100 = '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tokony ho farantsa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.'
    marker-yv: yv-n
  - type: text
    text: ' folo ka nanao taminy hoe: Mandrantoa mandra-pihaviko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ny vahoakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vahoaka namany.
    marker-yv: yv-n
  - type: text
    text: ' nankahala azy, dia nampitondra teny nanaraka azy nanao hoe: Tsy manaiky hanjakan’iny lehilahy iny izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nony tafaverina izy, rehefa nandray fahefana hanjaka, dia nasainy nantsoina hankeo aminy izany mpanompo nomeny ny vola izany mba hahitany izay azony tamin’ny fandrantoana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia tonga ny voalohany ka nanao hoe: Tompoko, ny farantsanao iray efa nahazoana tombony farantsa folo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy izy taminy: Tsara izany, ry mpanompo tsara; satria nahatoky tamin’ny kely indrindra hianao, dia manapaha tanàna folo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia tonga ny anankiray koa ka nanao hoe: Tompoko, ny farantsanao iray efa tonga farantsa dimy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy koa izy tamin’io: Manapaha tanàna dimy koa hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa tonga kosa ny anankiray ka nanao hoe: Tompoko, indry ny farantsanao, izay notehiriziko voafono amin’ny mosara. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa natahotra anao aho, satria olona mila voatsiary hianao ka maka izay tsy napetrakao, ary mijinja izay tsy nafafinao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy ny tompony taminy: Ny vavanao no hitsarako anao, ry mpanompo ratsy fanahy: fantatrao fa izaho dia olona mila voatsiary ka maka izay tsy napetrako, ary mijinja izay tsy nafafiko; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'koa nahoana no tsy napetrakao tamin’ny mpanàna vola ny volako, ka rehefa tonga aho, dia ho nandray ny ahy mban-janany? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy izy tamin’izay nitsangana teo anilany: Alao ny farantsa eny aminy, ka omeo ilay manana farantsa folo ('
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa hoy ireo taminy: Tompoko, efa manana farantsa folo izy). '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lazaiko aminareo: Izay rehetra manana dia homena; fa ny amin’izay tsy manana, na dia izay ananany aza dia halaina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa ireo fahavaloko tsy nanaiky hanjakako ireo, dia ento atỳ, ka vonoy eto anatrehako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary rehefa niteny izany Izy, dia nandeha nialoha hiakatra ho any Jerosalema.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niakaran’i Jesosy tany Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 21.1-11; Mar. 11.1-11; Jao. 12.12-19.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ARY raha nanakaiky an’i Betifaga sy Betania teo an-tendrombohitra atao hoe Oliva Izy, dia naniraka roa lahy tamin’ny mpianatra '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ka nanao hoe: Mankanesa amin’iroa vohitra tandrifinareo iroa; ary raha vao miditra ao hianareo, dia hisy zana-boriky mifatotra ho hitanareo, izay tsy mbola nitaingenan’olona; vahao izy, ka ento etỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary raha misy manontany anareo hoe: Nahoana no vahanareo io? dia izao no holazainareo: Misy raharaha analan’ny Tompo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nony nandeha ireo nirahina, dia nahita araka izay nolazainy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary raha namaha ny zana-boriky izy, dia hoy ny tompony taminy: Nahoana no vahanareo ny zana-boriky? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy izy: Misy raharaha analan’ny Tompo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nitondra azy ho any amin’i Jesosy izy ary nametraka ny lambany teo ambonin’ny zana-boriky, ka nampitaingeniny azy Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary raha nandeha Jesosy, dia namelatra ny lambany teny an-dàlana izy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary rehefa nanakaiky Izy ka tonga teo am-pidinana amin’ny tendrombohitra Oliva, dia nifaly avokoa ny mpianatra maro be ka nidera an’Andriamanitra tamin’ny feo mahery noho ny asa lehibe rehetra izay efa hitany '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ka nanao hoe: Isaorana anie ny Mpanjaka, Izay avy amin’ny anaran’i Jehovah. Fiadanana any an-danitra, ary voninahitra any amin’ny avo indrindra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa ny Fariseo sasany, izay teo amin’ny vahoaka, nanao taminy hoe: Mpampianatra ô, rarao ny mpianatrao. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa Izy namaly ka nanao hoe: Lazaiko aminareo fa raha mangina ireo, dia ny vato no hiantsoantso.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary raha nanakaiky Izy ka nahita ny tanàna, dia nitomany azy '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'ka nanao hoe: Raha mba nahafantatra mantsy hianao na dia amin’ity andro ity aza izay momba ny fiadanana!–fa ankehitriny miafina amin’ny masonao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa ho avy aminao ny andro izay hananganan’ny fahavalonao tovon-tany manodidina anao, dia hanemitra anao izy ka hanidy anao manodidina '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ary hamongotra anao hatramin’ny tany mbamin’ny zanakao ao anatinao, ka tsy havelany hisy vato mifanongoa eo aminao, ho valin’ny tsy nahafantaranao ny andro namangiana anao.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandroahan’i Jesosy ny mpivarotra sy ny nanesorany ny varony hiala teo an-kianjan’ny tempoly.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 21.12-17; Mar. 11.15-19.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'ARY niditra teo an-kianjan’ny tempoly Jesosy, dia nandroaka izay nivarotra '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'ka nanao taminy hoe: Efa voasoratra hoe: ,,Ny tranoko dia trano fivavahana’’ (Isa. 56.7); fa hianareo kosa nanao azy ho ,,zohy fieren’’ ny jiolahy’’ (Jer. 7.11).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary nampianatra isan-andro teo an-kianjan’ny tempoly Izy. Fa ny lohan’ny mpisorona sy ny mpanora-dalàna ary ny loholona nitady hahafaty Azy; '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: nefa tsy hitany izay hataony, satria ny vahoaka rehetra nazoto dia nazoto hihaino Azy.
