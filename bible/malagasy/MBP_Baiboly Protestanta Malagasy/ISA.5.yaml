document_id: ISA.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny Isiraely, tanimboalobok’i Jehovah, sy ny hanjo azy.
  - type: text
    content: AOKA aho hihira ny amin’
  - type: note
    content: 'Na: ho an’.'
  - type: text
    content: ' ny Malalako,'
  - type: text
    content: Dia hiran’ny Malalako ny amin’ny tanimboalobony.
  - type: text
    content: Ny Malalako nanana tanimboaloboka tao an-kavoana lonaka;
  '10':
  - type: text
    content: Ary bata iray monja no ho vokatry ny tanimboaloboka folo zemeda,
  - type: note
    content: Zemeda dia anaram-pandrefesana, tokony ho antsasaky ny akera.
  - type: text
    content: Ary rehefa iray monja no ho vokatry ny voan-javatra eran’ny homera.
  '11':
  - type: text
    content: Lozan’izay mifoha maraina koa ka mitady toaka!
  - type: text
    content: Izay miboboka mandra-paharivan’ny andro
  - type: text
    content: Ka ampirehetin’ny divay!
  '12':
  - type: text
    content: Ary ny lokanga sy ny valiha, ny ampongatapaka sy ny sodina ary ny divay no foto-panasany;
  - type: text
    content: Fa ny asan’i Jehovah tsy mba jereny,
  - type: text
    content: Ary ny ataon’ny tànany tsy mba hitany.
  '13':
  - type: text
    content: Ary noho izany dia ho lasan-ko babo ny oloko noho ny tsi-fahalalany,
  - type: text
    content: Ary ny olona ambony ho mosarena,
  - type: text
    content: Ary ny valalabemandry ho main’ny hetaheta.
  '14':
  - type: text
    content: Koa izany no mampitanatana vava ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: 'Hanao telimoka '
  - type: text
    content: an’i Jerosalema;
  - type: note
    content: Heb. azy.
  - type: text
    content: Ary any no hivarinan’ny voninahiny sy ny fihahohahony
  - type: text
    content: Ary ny tabatabany mbamin’izay mifalifaly ao aminy;
  '15':
  - type: text
    content: Ary ny zanak’olombelona dia hatao mitanondrika,
  - type: text
    content: Ary ny olona haetry,
  - type: text
    content: Ary ny mason’ny miandranandrana dia haidina.
  '16':
  - type: text
    content: Fa Jehovah, Tompon’ny maro, no hisandratra amin’ny fitsarana,
  - type: text
    content: Ary Andriamanitra masina dia hiseho ho masina amin’ny fahamarinana.
  '17':
  - type: text
    content: Ary ny zanak’ondry hikanja toy ny eny amin’ny tany fiandrasana azy ihany;
  - type: text
    content: Ary ny tany foana izay nipetrahan’ny matavy, dia mpirenireny no hiandry ondry ao.
  '18':
  - type: text
    content: Lozan’izay mitari-keloka amin’ny kofehin’ny faharatsiana
  - type: text
    content: Ary mitarika ota toy ny amin’ny mahazakan-tsariety,
  '19':
  - type: text
    content: 'Dia izay manao hoe: Aoka hohafainganiny sy hododonany ny asany, mba ho hitantsika,'
  - type: text
    content: Ary aoka izay kasain’ny Iray Masin’ny Isiraely ho mby akaiky ka ho tanteraka, mba ho fantatsika!
  '2':
  - type: text
    content: Dia nasainy io, ka nesoriny ny vato,
  - type: text
    content: Ary novoleny karazam-boaloboka tsara,
  - type: text
    content: Sady nanao tilikambo teo afovoany Izy
  - type: text
    content: Ary nandavaka famiazam-boaloboka teo;
  - type: text
    content: Dia nanantena azy hamoa voaloboka tsara Izy,
  - type: text
    content: Kanjo namoa voalobo-dratsy.
  '20':
  - type: text
    content: Lozan’izay milaza ny ratsy ho tsara ary ny tsara ho ratsy!
  - type: text
    content: Izay manao ny maizina ho mavaza ary ny mazava ho maizina!
  - type: text
    content: Izay manao ny mangidy ho mamy ary ny mamy ho mangidy!
  '21':
  - type: text
    content: Lozan’izay manao azy ho hendry
  - type: text
    content: Sy manao azy ho mazava saina!
  '22':
  - type: text
    content: Lozan’izay fatratra–nefa amin’ny fisotroan-divay ihany,
  - type: text
    content: Sy izay kanto
  - type: note
    content: Heb. mahery.
  - type: text
    content: ' –nefa amin’ny fampiharoharoana toaka ihany!'
  '23':
  - type: text
    content: Ary izay manamarina ny meloka noho ny kolikoly
  - type: text
    content: Sy manala ny rariny amin’ny marina!
  '24':
  - type: text
    content: Koa toy ny fandevonan’ny lelafo ny mololo,
  - type: text
    content: Ary toy ny fifitsaky ny bozaka midedadeda,
  - type: text
    content: Dia toy izany no hahalovan’ny fàkany
  - type: text
    content: Sy hijofoan’ny voniny hanjary vovoka,
  - type: text
    content: Satria efa nandà ny lalàn’i Jehovah, Tompon’ny maro, izy
  - type: text
    content: Sy nanamavo ny tenin’ny Iray Masin’ny Isiraely.
  '25':
  - type: text
    content: Koa izany no irehetan’ny fahatezeran’i Jehovah amin’ny olony
  - type: text
    content: Sy aninjirany ny tànany aminy ka amelezany azy;
  - type: text
    content: Dia mihorohoro ny tendrombohitra,
  - type: text
    content: Ary ny fatin’ny olona dia tonga tahaka ny diky eny an-dàlambe.
  - type: text
    content: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
  - type: text
    content: Fa mbola mihinjitra ihany ny tànany.
  '26':
  - type: text
    content: Ary hanangana faneva ho amin’ny firenena lavitra Izy
  - type: text
    content: Sady hisiaka hiantso ny iray avy any am-paran’ny tany;
  - type: text
    content: Ary, indro, ho avy faingana dia faingana ireo;
  - type: note
    content: Heb. izy.
  '27':
  - type: text
    content: Tsy hisy reraka na tafintohina ao aminy;
  - type: text
    content: 'Tsy ho rendrehana na hatory izy:'
  - type: text
    content: Tsy hiboraka ny fehin-kibony,
  - type: text
    content: Ary tsy ho tapaka ny fehin-kapany;
  '28':
  - type: text
    content: Maranitra ny zana-tsipìkany,
  - type: text
    content: Ary voahenjana avokoa ny tsipìkany;
  - type: text
    content: Ny kitron-tsoavaliny atao ho tahaka ny afovato;
  - type: text
    content: Ary ny kodiany ho tahaka ny tadio;
  '29':
  - type: text
    content: Ny fierony dia tahaka ny fieron’ny liom-bavy,
  - type: text
    content: Ary mierona tahaka ny liona tanora izy;
  - type: text
    content: Eny, manerona izy ka mandrapaka ny toha,
  - type: text
    content: Dia lasany, ka tsy azo alaina intsony.
  '3':
  - type: text
    content: Koa noho izany, ry mponina any Jerosalema sy ry lehilahy amin’ny Joda,
  - type: text
    content: Masìna hianareo, tsarao Aho sy ny tanimboaloboko.
  '30':
  - type: text
    content: Ary hirohondrohona aminy amin’izany andro izany izy
  - type: text
    content: Tahaka ny firohondrohon’ny ranomasina;
  - type: text
    content: 'Ary raha mijery ny tany ny olona, dia indro aizina '
  - type: text
    content: sy
  - type: text
    content: ' fahoriana;'
  - type: text
    content: Ary ny fahazavana hohamaizinin’ny rahona.
  '4':
  - type: text
    content: Inona moa no mbola azo natao tamin’ny tanimboaloboko,
  - type: text
    content: Ka tsy efa nataoko taminy?
  - type: text
    content: Koa raha nanantena azy hamoa voaloboka tsara Aho,
  - type: text
    content: Nahoana no namoa voalobo-dratsy izy?
  '5':
  - type: text
    content: 'Koa noho izany dia aoka hambarako anareo izay hataoko amin’ny tanimboaloboko:'
  - type: text
    content: Hesoriko ny fefy tsilony, ka dia holevonina izy;
  - type: text
    content: Ary harodako ny fefy vatony, ka dia ho voahitsakitsaka izy;
  '6':
  - type: text
    content: Ary hataoko simba dia simba izy;
  - type: text
    content: Tsy hohetezana ny sakeli-boalobony, ary tsy hohevoina izy,
  - type: text
    content: Fa ho rakotry ny hery sy ny tsilo;
  - type: text
    content: Ary hodidiako ny rahona
  - type: note
    content: Heb. rahona matevina.
  - type: text
    content: ' tsy hampilatsaka ranonorana aminy.'
  '7':
  - type: text
    content: Fa ny taranak’i Isiraely no tanimboalobok’i Jehovah, Tompon’ny maro,
  - type: text
    content: Ary ny lehilahy amin’ny Joda no voly tiany;
  - type: text
    content: Dia nanantena fitsarana marina Izy, kanjo fandatsahan-
  - type: text
    content: dra;
  - type: note
    content: 'Na: fampahoriana.'
  - type: text
    content: Niandry fahamarinana Izy, kanjo, indro, fitarainana.
  '8':
  - type: text
    content: Lozanareo izay mangorona trano lalandava
  - type: text
    content: Sady mampiharo vala ny saha amin’ny saha,
  - type: text
    content: Ambara-paha-tsy hisy hitoeran’ny sasany intsony,
  - type: text
    content: Mba ho tonga mponina manirery eo amin’ny tany hianareo!
  '9':
  - type: text
    content: 'Izao no ren’ny sofiko avy amin’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Marina tokoa fa ho foana ny trano maro,
  - type: text
    content: Eny, na dia izay lehibe sady tsara aza dia tsy hisy mpitoetra.
