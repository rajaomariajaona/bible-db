document_id: ISA.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny Isiraely, tanimboalobok’i Jehovah, sy ny hanjo azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: AOKA aho hihira ny amin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho an’.
    marker-yv: yv-n
  - type: text
    text: ' ny Malalako,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiran’ny Malalako ny amin’ny tanimboalobony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Malalako nanana tanimboaloboka tao an-kavoana lonaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia nasainy io, ka nesoriny ny vato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary novoleny karazam-boaloboka tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nanao tilikambo teo afovoany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nandavaka famiazam-boaloboka teo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanantena azy hamoa voaloboka tsara Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo namoa voalobo-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa noho izany, ry mponina any Jerosalema sy ry lehilahy amin’ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masìna hianareo, tsarao Aho sy ny tanimboaloboko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Inona moa no mbola azo natao tamin’ny tanimboaloboko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy efa nataoko taminy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa raha nanantena azy hamoa voaloboka tsara Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no namoa voalobo-dratsy izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa noho izany dia aoka hambarako anareo izay hataoko amin’ny tanimboaloboko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hesoriko ny fefy tsilony, ka dia holevonina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary harodako ny fefy vatony, ka dia ho voahitsakitsaka izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary hataoko simba dia simba izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hohetezana ny sakeli-boalobony, ary tsy hohevoina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho rakotry ny hery sy ny tsilo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hodidiako ny rahona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rahona matevina.
    marker-yv: yv-n
  - type: text
    text: ' tsy hampilatsaka ranonorana aminy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ny taranak’i Isiraely no tanimboalobok’i Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lehilahy amin’ny Joda no voly tiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanantena fitsarana marina Izy, kanjo fandatsahan-
  - type: usfm
    marker: it
    children:
    - type: text
      text: dra;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fampahoriana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niandry fahamarinana Izy, kanjo, indro, fitarainana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lozanareo izay mangorona trano lalandava
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mampiharo vala ny saha amin’ny saha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambara-paha-tsy hisy hitoeran’ny sasany intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho tonga mponina manirery eo amin’ny tany hianareo!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no ren’ny sofiko avy amin’i Jehovah, Tompon’ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marina tokoa fa ho foana ny trano maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia izay lehibe sady tsara aza dia tsy hisy mpitoetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary bata iray monja no ho vokatry ny tanimboaloboka folo zemeda,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Zemeda '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dia anaram-pandrefesana, tokony ho antsasaky ny akera.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rehefa iray monja no ho vokatry ny voan-javatra eran’ny homera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lozan’izay mifoha maraina koa ka mitady toaka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay miboboka mandra-paharivan’ny andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ampirehetin’ny divay!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny lokanga sy ny valiha, ny ampongatapaka sy ny sodina ary ny divay no foto-panasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny asan’i Jehovah tsy mba jereny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ataon’ny tànany tsy mba hitany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary noho izany dia ho lasan-ko babo ny oloko noho ny tsi-fahalalany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olona ambony ho mosarena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny valalabemandry ho main’ny hetaheta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa izany no mampitanatana vava ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hanao telimoka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an’i Jerosalema;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any no hivarinan’ny voninahiny sy ny fihahohahony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tabatabany mbamin’izay mifalifaly ao aminy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny zanak’olombelona dia hatao mitanondrika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olona haetry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mason’ny miandranandrana dia haidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa Jehovah, Tompon’ny maro, no hisandratra amin’ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Andriamanitra masina dia hiseho ho masina amin’ny fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny zanak’ondry hikanja toy ny eny amin’ny tany fiandrasana azy ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany foana izay nipetrahan’ny matavy, dia mpirenireny no hiandry ondry ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lozan’izay mitari-keloka amin’ny kofehin’ny faharatsiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitarika ota toy ny amin’ny mahazakan-tsariety,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia izay manao hoe: Aoka hohafainganiny sy hododonany ny asany, mba ho hitantsika,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka izay kasain’ny Iray Masin’ny Isiraely ho mby akaiky ka ho tanteraka, mba ho fantatsika!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lozan’izay milaza ny ratsy ho tsara ary ny tsara ho ratsy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manao ny maizina ho mavaza ary ny mazava ho maizina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manao ny mangidy ho mamy ary ny mamy ho mangidy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lozan’izay manao azy ho hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy manao azy ho mazava saina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lozan’izay fatratra–nefa amin’ny fisotroan-divay ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay kanto
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mahery.
    marker-yv: yv-n
  - type: text
    text: ' –nefa amin’ny fampiharoharoana toaka ihany!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary izay manamarina ny meloka noho ny kolikoly
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy manala ny rariny amin’ny marina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa toy ny fandevonan’ny lelafo ny mololo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny fifitsaky ny bozaka midedadeda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany no hahalovan’ny fàkany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hijofoan’ny voniny hanjary vovoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa nandà ny lalàn’i Jehovah, Tompon’ny maro, izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nanamavo ny tenin’ny Iray Masin’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa izany no irehetan’ny fahatezeran’i Jehovah amin’ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy aninjirany ny tànany aminy ka amelezany azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mihorohoro ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fatin’ny olona dia tonga tahaka ny diky eny an-dàlambe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola mihinjitra ihany ny tànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary hanangana faneva ho amin’ny firenena lavitra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hisiaka hiantso ny iray avy any am-paran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary, indro, ho avy faingana dia faingana ireo;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy hisy reraka na tafintohina ao aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tsy ho rendrehana na hatory izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiboraka ny fehin-kibony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho tapaka ny fehin-kapany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Maranitra ny zana-tsipìkany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary voahenjana avokoa ny tsipìkany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny kitron-tsoavaliny atao ho tahaka ny afovato;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kodiany ho tahaka ny tadio;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny fierony dia tahaka ny fieron’ny liom-bavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mierona tahaka ny liona tanora izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manerona izy ka mandrapaka ny toha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia lasany, ka tsy azo alaina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary hirohondrohona aminy amin’izany andro izany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny firohondrohon’ny ranomasina;
- type: usfm
