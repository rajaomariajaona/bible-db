document_id: PSA.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY VOALOHANY
  - type: heading
    content: Ny tsi-fitovian’ny tsara fanahy sy ny ratsy fanahy.
  - type: text
    content: SAMBATRA ny olona
  - type: text
    content: Izay tsy mandeha eo amin’ny fisainan’ny ratsy fanahy,
  - type: text
    content: Ary tsy mijanona eo amin’ny làlana falehan’ny mpanota,
  - type: text
    content: Ary tsy mipetraka eo amin’ny fipetrahan’ny mpaniratsira;
  '2':
  - type: text
    content: Fa ny lalàn’i Jehovah no sitrany;
  - type: text
    content: Eny, ny lalàny no saintsaininy andro aman-alina.
  '3':
  - type: text
    content: Dia tahaka ny hazo ambolena eo amoron’ny rano velona izy,
  - type: text
    content: Izay mamoa amin’ny fotoany,
  - type: text
    content: Ny raviny koa tsy mba malazo;
  - type: text
    content: Ary ny asany rehetra dia ataony lavorary avokoa.
  '4':
  - type: text
    content: Fa tsy mba toy izany ny ratsy fanahy,
  - type: text
    content: Fa toy ny akofa aelin’ny rivotra izy.
  '5':
  - type: text
    content: Ary noho izany ny ratsy fanahy dia tsy hahajanona eo amin’ny fitsarana,
  - type: text
    content: Na ny mpanota eo amin’ny fiangonan’ny marina.
  '6':
  - type: text
    content: Fa fantatr’i Jehovah ny làlan’ny marina,
  - type: text
    content: Fa ny làlan’ny ratsy fanahy kosa dia mankany amin’ny fahaverezana.
