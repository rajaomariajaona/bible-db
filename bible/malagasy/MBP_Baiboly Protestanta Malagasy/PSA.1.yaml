document_id: PSA.1
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: BOKY VOALOHANY
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tsi-fitovian’ny tsara fanahy sy ny ratsy fanahy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: SAMBATRA ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy mandeha eo amin’ny fisainan’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mijanona eo amin’ny làlana falehan’ny mpanota,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mipetraka eo amin’ny fipetrahan’ny mpaniratsira;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny lalàn’i Jehovah no sitrany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny lalàny no saintsaininy andro aman-alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia tahaka ny hazo ambolena eo amoron’ny rano velona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mamoa amin’ny fotoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny raviny koa tsy mba malazo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny asany rehetra dia ataony lavorary avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa tsy mba toy izany ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa toy ny akofa aelin’ny rivotra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary noho izany ny ratsy fanahy dia tsy hahajanona eo amin’ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny mpanota eo amin’ny fiangonan’ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa fantatr’i Jehovah ny làlan’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny làlan’ny ratsy fanahy kosa dia mankany amin’ny fahaverezana.
