document_id: ZEC.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: 'Fahitana fahenina: ny amin ilay horonan-taratasy manidina, sy ravehivavy ao anatin’ny vata famarana.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA natopiko indray ny masoko, ka hitako fa, indro, nisy horonan-taratasy manidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy izy tamiko: Inona moa no hitanao? Dia hoy izaho: Mahita horonan-taratasy manidina aho; roa-polo hakiho ny lavany, ary folo hakiho ny sakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy izy tamiko: Izany no ozona mivoaka ho eny amin’ny tany rehetra; fa izay rehetra mangalatra dia hosorohina araka izany, ary izay rehetra mianiana dia hosorohina araka izany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho entiko mivoaka izany, hoy Jehovah, Tompon’ny maro, ka hiditra ao an-tranon’ny mpangalatra sy ao an-tranon’izay mianian-tsy to amin’ny anarako ary hitoetra ao amin’ny tranony ka handevona azy mbamin’ny hazony sy ny vatony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nivoaka ilay anjely niresaka tamiko ka nanao tamiko hoe: Atopazy ny masonao, ka jereo io mivoaka io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy izaho: Inona moa io? Ary hoy izy: Io ilay vata famarana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efaha.
    marker-yv: yv-n
  - type: text
    text: ' mivoaka. Hoy koa izy: Izao no tarehiny any amin’ny tany rehetra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: (ary, indro, nisy vongam-piraka boribory naingaina); ary io no vehivavy iray mipetraka ao anatin’ny vata famarana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efaha.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy izy: Faharatsiana io. Ka dia natontany tao anatin’ny vata famarana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efaha.
    marker-yv: yv-n
  - type: text
    text: ' io; ary natontany teo am-bavan’io ny vato firaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia natopiko ny masoko, ka hitako fa, indreo, nisy vehivavy roa nivoaka, ary nahazo rivotra ny elany, fa nanana elatra toy ny elatry ny vano izy; ary naingainy ho eo anelanelan’ny tany sy ny lanitra ny vata famarana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efaha.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izaho tamin’ilay anjely niresaka tamiko: Ho aiza no itondran’ireto ny vata famarana.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efaha.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy tamiko: Hanaovana trano ho azy any amin’ny tany Sinara, ary rehefa vita izany, dia hapetraka ao amin’ny fipetrahany izy.'
