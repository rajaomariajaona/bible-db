document_id: ZEC.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana fahenina: ny amin ilay horonan-taratasy manidina, sy ravehivavy ao anatin’ny vata famarana.'
  - type: text
    content: 'DIA natopiko indray ny masoko, ka hitako fa, indro, nisy horonan-taratasy manidina. '
  '10':
  - type: text
    content: 'Dia hoy izaho tamin’ilay anjely niresaka tamiko: Ho aiza no itondran’ireto ny vata famarana.'
  - type: note
    content: Heb. efaha.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Ary hoy izy tamiko: Hanaovana trano ho azy any amin’ny tany Sinara, ary rehefa vita izany, dia hapetraka ao amin’ny fipetrahany izy.'
  '2':
  - type: text
    content: 'Ary hoy izy tamiko: Inona moa no hitanao? Dia hoy izaho: Mahita horonan-taratasy manidina aho; roa-polo hakiho ny lavany, ary folo hakiho ny sakany. '
  '3':
  - type: text
    content: 'Dia hoy izy tamiko: Izany no ozona mivoaka ho eny amin’ny tany rehetra; fa izay rehetra mangalatra dia hosorohina araka izany, ary izay rehetra mianiana dia hosorohina araka izany koa. '
  '4':
  - type: text
    content: Ho entiko mivoaka izany, hoy Jehovah, Tompon’ny maro, ka hiditra ao an-tranon’ny mpangalatra sy ao an-tranon’izay mianian-tsy to amin’ny anarako ary hitoetra ao amin’ny tranony ka handevona azy mbamin’ny hazony sy ny vatony.
  '5':
  - type: text
    content: 'Dia nivoaka ilay anjely niresaka tamiko ka nanao tamiko hoe: Atopazy ny masonao, ka jereo io mivoaka io. '
  '6':
  - type: text
    content: 'Dia hoy izaho: Inona moa io? Ary hoy izy: Io ilay vata famarana'
  - type: note
    content: Heb. efaha.
  - type: text
    content: ' mivoaka. Hoy koa izy: Izao no tarehiny any amin’ny tany rehetra '
  '7':
  - type: text
    content: (ary, indro, nisy vongam-piraka boribory naingaina); ary io no vehivavy iray mipetraka ao anatin’ny vata famarana.
  - type: note
    content: Heb. efaha.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Ary hoy izy: Faharatsiana io. Ka dia natontany tao anatin’ny vata famarana'
  - type: note
    content: Heb. efaha.
  - type: text
    content: ' io; ary natontany teo am-bavan’io ny vato firaka.'
  '9':
  - type: text
    content: Dia natopiko ny masoko, ka hitako fa, indreo, nisy vehivavy roa nivoaka, ary nahazo rivotra ny elany, fa nanana elatra toy ny elatry ny vano izy; ary naingainy ho eo anelanelan’ny tany sy ny lanitra ny vata famarana.
  - type: note
    content: Heb. efaha.
  - type: text
    content: ' '
