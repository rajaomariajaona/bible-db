document_id: 1CH.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny mponina tany Jerosalema talohan’ny namaboana azy.
  - type: text
    content: 'DIA nisaina araka ny firazanany avy ny Isiraely rehetra; ary, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Isiraely izany. Ary ny Joda dia nentina ho babo tany Babylona noho ny fahotany. '
  '10':
  - type: text
    content: 'Ary tamin’ny mpisorona dia Jedaia sy Joiariba sy Jakina '
  '11':
  - type: text
    content: 'sy Azaria, zanak’i Hilkia, zanak’i Mesolama, zanak’i Zadoka, zanak’i Meraiota, zanak’i Ahitoba, mpanapaka ny tranon’Andriamanitra, '
  '12':
  - type: text
    content: 'ary Adaia, zanak’i Jerohama, zanak’i Pasora, zanak’i Malkia, ary Masay, zanak’i Adiela, zanak’i Jazera, zanak’i Mesolama, zanak’i Mesilemita, zanak’Imera. '
  '13':
  - type: text
    content: Ary ny rahalahin’ireo, izay samy lohan’ny fianakaviany avy, dia enim-polo amby fiton-jato amby arivo; lehilahy mahery amin’ny fanaovana ny fanompoana ao an-tranon’Andriamanitra ireo.
  '14':
  - type: text
    content: 'Ary tamin’ny Levita dia Semaia, zanak’i Hasoba, zanak’i Azrikama, zanak’i Hasabia, tamin’ny taranak’i Merary, '
  '15':
  - type: text
    content: 'ary Bakbakara sy Haresy sy Galala sy Matania, zanak’i Mika, zanak’i Zikry, zanak’i Asafa, '
  '16':
  - type: text
    content: ary Obadia, zanak’i Semaia, zanak’i Galala, zanak’i Jedotona, ary Berekia, zanak’i Asa, zanak’i Elkana, izay nonina tamin’ny vohitry ny Netofatita.
  '17':
  - type: text
    content: 'Ary ny mpiandry varavarana dia Saloma sy Akoba sy Talmona sy Ahimana ary ny rahalahiny; fa Saloma no lohany; '
  '18':
  - type: text
    content: ambaraka ankehitriny dia ao amin’ny vavahadin’ny mpanjaka atsinanana izy; ireo no mpiandry varavarana tamin’ny tobin’ny taranak’i Levy.
  '19':
  - type: text
    content: 'Ary Saloma, zanak’i Kore, zanak’i Abiasafa, zanak’i Kora, sy ny Koraïta rahalahiny araka ny fianakaviany avy no mpanao ny fanompoana amin’ny fiandrasana ny varavaran’ny lay; ary ny razany koa dia mpiambina ny vavahady tao amin’ny tobin’i Jehovah. '
  '2':
  - type: text
    content: Ary ny mponina taloha tamin’ny taniny sy ny tanànany avy dia ny Isiraely sy ny mpisorona sy ny Levita ary ny Netinima.
  '20':
  - type: text
    content: 'Ary Finehasa, zanak’i Eleazara, no mpanapaka ireo taloha, ary Jehovah nomba azy. '
  '21':
  - type: text
    content: 'Ary Zakaria, zanak’i Meselemia, no mpiandry ny varavaran’ny trano-lay fihaonana. '
  '22':
  - type: text
    content: Ary ny isan’ireo voafidy ho mpiandry varavarana ireo dia roa ambin’ny folo amby roan-jato. Ireo dia voasoratra araka ny firazanany tany amin’ny vohiny avy; ary notendren’i Davida sy Samoela mpahita izy noho ny fahamarinany.
  '23':
  - type: text
    content: 'Ka dia ireo sy ny taranany no niandry varavarana tao amin’ny tranon’i Jehovah, dia ny trano-lay. '
  '24':
  - type: text
    content: 'Teo amin’ny lafiny efatra no nitoeran’ny mpiandry varavarana, dia teo atsinanana sy andrefana sy avaratra ary atsimo. '
  '25':
  - type: text
    content: 'Ary ny rahalahiny izay nonina teo amin’ny vohiny dia nasaina ho avy isan-kafitoana ho eo aminy. '
  '26':
  - type: text
    content: 'Fa nanao tamin’ny fahamarinany ireo Levita efa-dahy, lohan’ny mpiandry varavarana, ireo, ary tonian’ny efi-trano fitehirizana sy ny rakitry ny tranon’Andriamanitra koa izy ireo. '
  '27':
  - type: text
    content: 'Ary manodidina ny tranon’Andriamanitra no nandriany; fa izy ireo no mpiambina azy sady adidiny ny famohana ny trano isa-maraina. '
  '28':
  - type: text
    content: 'Ary ny sasany aminy nitandrina ny fanaka momba ny fanompoana; fa an-isany no nitondrany azy miditra sy mivoaka. '
  '29':
  - type: text
    content: 'Ary ny sasany aminy koa notendrena hitandrina ny fanaka, dia ny fanaka masina rehetra, sy ny koba tsara toto sy ny divay sy ny diloilo sy ny ditin-kazo manitra ary ny zava-manitra. '
  '3':
  - type: text
    content: 'Ary tany Jerosalema no nonenan’ny sasany amin’ny taranak’i Joda sy Benjamina sy Efraima sy Manase: '
  '30':
  - type: text
    content: 'Ary ny sasany tamin’ny zanaky ny mpisorona nangaroharo ny zava-manitra fanosorana. '
  '31':
  - type: text
    content: 'Ary Matatia, anankiray tamin’ny Levita, lahimatoan’i Saloma Koraïta, no tonian’ny zavatra izay natao tamin’ny fanendasana. '
  '32':
  - type: text
    content: Ary ny sasany tamin’ny rahalahiny, tamin’ny taranaky ny Kehatita, no tonian’ny mofo aseho hamboatra azy isan-tSabata.
  '33':
  - type: text
    content: 'Ary ireo ihany koa no mpihira, lohan’ny fianakaviana amin’ny Levita, izay mitoetra tsy manan-draharaha hafa ao amin’ireo efi-trano; fa tsy maintsy ho amin’izany raharaha izany andro aman-alina izy. '
  '34':
  - type: text
    content: Ireo dia lohan’ny fianakaviana tamin’ny Levita araka ny firazanany avy, dia samy loholona. Ireo no nonina tany Jerosalema.
  - type: heading
    content: Ny amin’ny fianakavian’i Saoly.
  '35':
  - type: text
    content: 'ARY tao Gibeona no nonenan’i Jeiela, razamben’ny an’i Gibeona, ary ny anaran’ny vadiny dia Imaka; '
  '36':
  - type: text
    content: 'ary ny zanany lahimatoa dia Abdona, dia Zora, dia Kisy, dia Bala, dia Nera, dia Nadaba, '
  '37':
  - type: text
    content: 'dia Gedora, dia Ahio, dia Zakaria, dia Miklota. '
  '38':
  - type: text
    content: Ary Miklota niteraka an’i Simeama. Ary ireo koa niara-nonina tamin’ny rahalahiny tany Jerosalema nifanandrify fonenana taminy.
  '39':
  - type: text
    content: 'Ary Nera niteraka an’i Kisy; ary Kisy niteraka an’i Saoly; ary Saoly niteraka an’i Jonatana sy Malkisoa sy Abinadaba ary Esbala. '
  '4':
  - type: text
    content: 'dia Otahy, zanak’i Amihoda, zanak’i Omry, zanak’Imry, zanak’i Bany, avy amin’ny taranak’i Fareza, zanak’i Joda. '
  '40':
  - type: text
    content: 'Ary ny zanakalahin’i Jonatana dia Meribala; ary Meribala niteraka an’i Mika. '
  '41':
  - type: text
    content: 'Ary ny zanakalahin i Mika dia Pitona sy Maleka sy Tarea '
  - type: text
    content: ary Ahaza.
  - type: text
    content: ' '
  - type: note
    content: Izahao viii.35.
  '42':
  - type: text
    content: 'Ary Ahaza niteraka an’i Jara; ary Jara niteraka an’i Alemeta sy Azmaveta ary Zimry; ary Zimry niteraka an’i Moza; '
  '43':
  - type: text
    content: 'ary Moza niteraka an’i Binea; ary Refaia no zanakalahin’i Binea, Elasa no zanakalahin’i Refaia, Azela no zanakalahin’i Elasa. '
  '44':
  - type: text
    content: 'Ary Azela nanana zanaka enina mirahalahy, ka izao no anarany avy: Azrikama sy Bokero sy Isimaela sy Searia sy Obadia ary Hanana; ireo no zanakalahin’i Azela.'
  '5':
  - type: text
    content: 'Ary tamin’ny Silonita dia Asay, lahimatoa, sy ny zanany. '
  '6':
  - type: text
    content: Ary tamin’ny taranak’i Zera dia Jeoela sy ny rahalahiny, dia sivi-folo amby enin-jato.
  '7':
  - type: text
    content: 'Ary tamin’ny taranak’i Benjamina dia Salo, zanak’i Mesolama, zanak’i Hodavia, zanak’i Hasenoa, '
  '8':
  - type: text
    content: 'sy Jibnia, zanak’i Jerohama, sy Elaha, zanak’i Ozy, zanak’i Mikry, sy Mesolama, zanak’i Sefatia, zanak’i Regoela, zanak’i Jibnia; '
  '9':
  - type: text
    content: ary ny isan’ny rahalahiny araka ny firazanany dia enina amby dimam-polo sy sivin-jato. Ireo lehilahy rehetra ireo dia samy lohan’ny fianakaviany avy.
