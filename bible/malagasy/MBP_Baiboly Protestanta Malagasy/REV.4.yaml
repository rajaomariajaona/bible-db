document_id: REV.4
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fideran’ny any an-danitra an’Andriamanitra, Mpanao ny zavatra rehetra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'REHEFA afaka izany, dia hitako fa, indro, nisy varavarana nivoha tany an-danitra; ary ilay feo voalohany izay efa reko dia tahaka ny an’ny trompetra niteny tamiko hoe: Miakara atỳ, dia hasehoko anao izay zavatra tsy maintsy ho avy rahatrizay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary niaraka tamin’izay dia voatsindrin’ny Fanahy aho; ary indro seza fiandrianana nipetraka tany an-danitra, ary nisy Anankiray nipetraka teo ambonin’ny seza fiandrianana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny tarehin’Ilay nipetraka dia tahaka ny vato jaspy sy karneola; ary avana mitarehin’emeralda no nanodidina ny seza fiandrianana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary manodidina ilay seza fiandrianana iray dia nisy seza fiandrianana efatra amby roa-polo; ary teo ambonin’ireo seza fiandrianana ireo dia nisy loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' efatra amby roa-polo nipetraka, nitafy fitafiana fotsy sady nisatroka satroboninahitra volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy helatra sy feo ary kotrokorana nivoaka avy tamin’ny seza fiandrianana; ary nisy jiro fito nirehitra teo anoloan’ny seza fiandrianana, dia Fanahy fiton’Andriamanitra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary teo anoloan’ny seza fiandrianana dia nisy toa ranomasina fitaratra tahaka ny vato krystaly; ary teo afovoan’ny seza fiandrianana sy manodidina azy nisy zava-manan-aina efatra feno maso avokoa ny anoloany sy ny ivohony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny zava-manan-aina voalohany dia tahaka ny liona, ary ny zava-manan-aina faharoa dia tahaka ny zanak’omby, ary ny zava-manan-aina fahatelo dia manana tava tahaka ny tavan’olona, ary ny zava-manan-aina fahefatra dia tahaka ny voromahery manidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny zava-manan-aina efatra dia samy nanana elatra enina avy, sady feno maso ny tenany rehetra manodidina ka hatrao anatiny; ary tsy mitsahatra andro aman-alina izy manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masina, masina, masina ny Tompo Andriamanitra Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay taloha sy ankehitriny ary ho avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha ny zava-manan-aina hanome voninahitra sy haja ary fisaorana ho an’Ilay mipetraka eo ambonin’ny seza fiandrianana, dia Izay velona mandrakizay mandrakizay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia hiankohoka eo anoloan’Izay mipetraka eo ambonin’ny seza fiandrianana ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' efatra amby roa-polo ka hivavaka amin’Izay velona mandrakizay mandrakizay, dia hanipy ny satroboninahiny eo anoloan’ny seza fiandrianana ka hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hianao, Tomponay sy Andriamanitray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No mendrika handray ny voninahitra sy ny haja ary ny hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no nahary ny zavatra rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary noho ny sitraponao no nahanisy sy nahary azy.
