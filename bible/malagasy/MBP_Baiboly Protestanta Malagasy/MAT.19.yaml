document_id: MAT.19,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nankanesan’i Jesosy teny an-dafin’i Jordana, sy ny namaliany ny fanontanian’ny Fariseo ny amin’ny fisaoram-bady.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 10.1-12.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY rehefa vitan’i Jesosy izany teny izany, dia niala tany Galilia Izy ka nihazo ny làlana teny an-dafin’i Jordana, dia tonga tany amin’ny sisin’i Jodia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy ny mpianatra taminy: Raha izany no toetry ny lehilahy amin’ny vadiny, dia aleo tsy manambady. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa hoy Izy taminy: Tsy ny olona rehetra no mahay mandray izany teny izany, fa izay nomena ihany; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: fa misy ionoka, izay teraka ionoka hatrany an-kibon-dreniny; ary misy ionoka, izay nataon’ny olona ionoka; ary misy ionoka, izay nanao ny tenany ionoka noho ny fanjakan’ny lanitra. Aoka handray izany izay mahay mandray.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitondrana zazakely ho eo amin’i Jesosy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 10.13-16; Lio. 18.15-17.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ARY tamin’izany dia nisy zazakely nentina teo amin’i Jesosy mba hametrahany ny tànany sy hivavahany ho azy; fa ny mpianany niteny mafy ireny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nefa Jesosy kosa nanao hoe: Avelao ny zaza, ary aza rarana tsy hanatona Ahy; fa an’ny toa azy ny fanjakan’ny lanitra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary nony nametraka ny tànany taminy Izy, dia niala teo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny namalian’i Jesosy ny fanontanian’ny mpanan-karena anankiray sy ny resaka nataony tamin’ny mpianany, rehefa lasa ralehilahy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 10.17-31; Lio. 18.18-30.
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ARY, indro, nisy anankiray nanatona Azy ka nanao hoe: Mpampianatra ô,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Mpampianatra tsara ô].'
      marker-yv: yv-n
    - type: text
      text: ' inona no tsara hataoko hahazoako fiainana mandrakizay?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa hoy Jesosy taminy: Nahoana Aho no anontanianao ny amin’izay tsara? Iray no tsara;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Nahoana Aho no ataonao tsara? Tsy misy tsara afa-tsy iray ihany, dia Andriamanitra.]'
      marker-yv: yv-n
    - type: text
      text: ' fa raha te-hiditra any amin’ny fiainana hianao, tandremo ny didy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hoy ralehilahy taminy: Inona avy moa? Dia hoy Jesosy: Ny hoe: ,,Aza mamono olona, Aza mijangajanga, Aza mangalatra, Aza mety ho vavolombelona mandainga,’’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ',,Manajà ny rainao sy ny reninao’’ (Eks. 20.12–16), ary: ,,Tiava ny namanao tahaka ny tenanao’’ (Lev. 19.18).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary nisy vahoaka betsaka nanaraka Azy, dia nahasitrana azy teo Izy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hoy ilay zatovo taminy: Izany rehetra izany efa voatandriko avokoa; fa inona no tsy mbola mahatanteraka ahy? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia hoy Jesosy taminy: Raha tia ho tanteraka hianao, mandehana, amidio ny fanananao, ka omeo ny malahelo, dia hanana rakitra any an-danitra hianao; ary avia hanaraka Ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa nony nandre izany teny izany ilay zatovo, dia niala tamin’alahelo izy, satria nanana fananana be.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia hoy Jesosy tamin’ny mpianany: Lazaiko aminareo marina tokoa fa sarotra ny hidiran’ny manan-karena amin’ny fanjakan’ny lanitra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy Izaho aminareo indray: Ho moramora kokoa ny hidiran’ny rameva amin’ny vodi-fanjaitra noho ny hidiran’ny manan-karena amin’ny fanjakan’Andriamanitra.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nony nandre izany ny mpianatra, dia talanjona indrindra ka nanao hoe: Iza indray no azo hovonjena? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary Jesosy nijery azy ka nanao taminy hoe: Tsy hain’ny olona izany, fa hain’Andriamanitra ny zavatra rehetra.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia namaly Petera ka nanao taminy hoe: Indro, izahay efa nahafoy ny zavatra rehetra ka nanaraka Anao; koa inona ary no ho azonay? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa rehefa mby amin’ny fanavaozana,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiteraham-baovao.
      marker-yv: yv-n
    - type: text
      text: ' ka hipetraka amin’ny seza fiandrianan’ny voninahiny ny Zanak’olona, hianareo koa, izay nanaraka Ahy, dia hipetraka amin’ny seza fiandrianana roa ambin’ny folo ka hitsara ny firenen’Isiraely roa ambin’ny folo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary izay rehetra efa nahafoy trano, na rahalahy, na anabavy, na ray, na reny,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[na vady.]'
      marker-yv: yv-n
    - type: text
      text: ' na zanaka, na tany, noho ny anarako, dia handray zato heny ka handova fiainana mandrakizay.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nisy Fariseo nanatona Azy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Ary nanatona Azy ny Fariseo.]'
      marker-yv: yv-n
    - type: text
      text: ' dia naka fanahy Azy hoe: Mahazo misaotra ny vadiny va '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny lehilahy
    - type: text
      text: ' noho izay rehetra entiny iampangany azy na inona na inona?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Nefa maro izay voalohany no ho farany, ary izay farany no ho voalohany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Izy namaly ka nanao hoe: Tsy mbola novakinareo va ny teny, fa Izay nahary azy tamin’ny voalohany dia nahary azy ho lahy sy vavy (Gen. 1.27), ka dia nanao hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ',,Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin’ny vadiny; ary dia ho nofo iray ihany izy roroa’’ (Gen. 2.24)? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ka dia tsy roa itsony izy, fa nofo iray ihany. Koa amin’izany, izay nampiraisin’Andriamanitra dia aoka tsy hampisarahin’olona.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hoy ireo taminy: Nahoana ary Mosesy no nandidy hanome taratasy fisaoram-bady sy hisaotra azy? (Deo. 24.1). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy Jesosy taminy: Ny hamafin’ny fonareo no namelan’i Mosesy anareo hisao-bady; fa tamin’ny voalohany dia tsy mba toy izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa lazaiko aminareo: Na zovy na zovy no misaotra ny vadiny, afa-tsy noho ny fijangajangana ihany, ka mampakatra ny hafa, dia mijangajanga; ary izay mampakatra ny voasaotra dia mijangajanga koa.'
