document_id: JER.20,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Pasora, zanak’i Imera, mpisorona sady mpiandraikitra ny tranon’i Jehovah, raha nandre an’i Jeremia naminany izany zavatra izany, '
  '10':
  - type: text
    content: Fa reko ny endrikendriky ny maro–
  - type: text
    content: Misy fampangorohoroana manodidina–
  - type: text
    content: Torio, eny, hotorintsika koa izy;
  - type: text
    content: Izay rehetra tsara fihavanana amiko dia miandry izay hahalavoako
  - type: text
    content: 'Ka manao hoe:'
  - type: text
    content: ' Angamba ho voataona izy,'
  - type: text
    content: Dia horesentsika sy hovaliantsika.
  '11':
  - type: text
    content: Kanefa Jehovah momba ahy toy ny lehilahy mahery mahatahotra,
  - type: text
    content: Ary noho izany dia ho tafintohina ny mpanenjika ahy ka tsy haharesy;
  - type: text
    content: Ho menatra indrindra izy, satria tsy hendry,–
  - type: note
    content: 'Na: tsy ambinina.'
  - type: text
    content: Fahamenarana mandrakizay izay tsy hohadinoina izany!
  '12':
  - type: text
    content: Fa Hianao, Jehovah, Tompon’ny maro ô,
  - type: text
    content: Izay mamantatra ny marina ka mizaha toetra ny voa sy ny fo–
  - type: text
    content: Ho hitako ny famalianao azy,
  - type: text
    content: Fa aminao no efa nanankinako ny adiko.
  '13':
  - type: text
    content: Mihirà ho an’i Jehovah,
  - type: text
    content: Miderà an’i Jehovah;
  - type: text
    content: Fa Izy namonjy ny fanahin’ny malahelo tamin’ny tànan’ny mpanao ratsy.
  '14':
  - type: text
    content: Ho voaozona anie ny andro izay nahaterahako!
  - type: text
    content: Aoka tsy hotahina anie ny andro izay niterahan’ineny ahy!
  '15':
  - type: text
    content: 'Ho voaozona anie ny olona izay nitondra teny mahafaly tamin’ikaky nanao hoe:'
  - type: text
    content: Tera-dahy hianao!
  - type: text
    content: Ka nahafaly azy indrindra.
  '16':
  - type: text
    content: Aoka izany lehilahy izany ho toy ny tanàna izay noravan’i Jehovah
  - type: text
    content: Ka tsy nanenenany;
  - type: text
    content: Ary aoka izy handre fitarainana nony maraina
  - type: text
    content: Sy akoralava nony mitataovovonana,
  '17':
  - type: text
    content: Satria tsy nahafaty ahy tany an-kibo izy,
  - type: text
    content: Hahatonga an’ineny ho fasako,
  - type: text
    content: Ka hivesatra ahy mandrakariva ny kibony.
  '18':
  - type: text
    content: Nahoana re aho no nivoaka avy tany an-kibo mba hahita fahoriana sy alahelo,
  - type: text
    content: Ka ho lany aman-kenatra ny androko!
  '2':
  - type: text
    content: 'dia namely an’i Jeremia mpaminany sady namatotra azy tamin’ny boloky hazo izay teo am-bavahadin’i Benjamina, dia ilay eo ambony, eo anilan’ny tranon’i Jehovah. '
  '3':
  - type: text
    content: 'Ary nony ampitso, dia nesorin’i Pasora tamin’ny boloky hazo Jeremia. Dia hoy Jeremia taminy: Tsy nataon’i Jehovah hoe Pasora'
  - type: note
    content: Pasora = Fiadanana manodidina (?)
  - type: text
    content: ' ny anaranao, fa Magora-misabiba.'
  - type: note
    content: Magora-misabiba = Fampangorohoroana manodidina.
  '4':
  - type: text
    content: 'Fa izao no lazain’i Jehovah: Indro, hataoko fampangorohoroana ho an’ny tenanao sy ny sakaizanao rehetra hianao, ary ho lavon’ny sabatry ny fahavalony ireo, dia ho hitan’ny masonao izany; ary ny Joda rehetra hatolotro eo an-tànan’ny mpanjakan’i Babylona, dia ho entiny ho babo any Babylona izy ka hovonoiny amin’ny sabatra. '
  '5':
  - type: text
    content: 'Ary ny harena rehetra amin’ity tanàna ity sy ny vokatry ny fisasarany rehetra sy ny zava-tsoany rehetra ary ny rakitry ny mpanjakan’ny Joda rehetra dia samy hatolotro eo an-tànan’ny fahavalony, ka dia hamabo sy haka azy ireny ary hitondra azy ho any Babylona. '
  '6':
  - type: text
    content: Ary hianao, ry Pasora, sy izay rehetra mitoetra ao an-tranonao dia ho lasan-ko babo; ary ho tonga any Babylona hianao, ka any no hahafatesanao, ary any koa no handevenana anao mbamin’ny sakaizanao rehetra izay efa naminanianao lainga.
  - type: heading
    content: Ny fitarainana nataon’i Jeremia
  '7':
  - type: text
    content: JEHOVAH ô, notaominao aho ka voataona;
  - type: text
    content: Nosamborinao aho ka resinao;
  - type: text
    content: Tonga fihomehezana mandritra ny andro aho;
  - type: text
    content: Izy rehetra dia maneso ahy.
  '8':
  - type: text
    content: Fa na oviana na oviana no itenenako, dia tsy maintsy mitaraina aho,
  - type: text
    content: 'Eny, miantso aho hoe: Loza sy fandravana!'
  - type: text
    content: Fa ny tenin’i Jehovah dia atao fanakorana sy fihomehezana ahy isan-andro.
  '9':
  - type: text
    content: 'Dia hoy izaho: Tsy hanonona Azy aho'
  - type: text
    content: Na hiteny intsony amin’ny anarany.
  - type: text
    content: Nefa izany dia tonga toy ny afo mirehitra ato am-poko, voahidy ato amin’ny taolako;
  - type: text
    content: Ary sasatra ny niaritra aho ka tsy mahazaka.
