document_id: JER.20,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Pasora, zanak’i Imera, mpisorona sady mpiandraikitra ny tranon’i Jehovah, raha nandre an’i Jeremia naminany izany zavatra izany, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa reko ny endrikendriky ny maro–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy fampangorohoroana manodidina–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torio, eny, hotorintsika koa izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra tsara fihavanana amiko dia miandry izay hahalavoako
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ka manao hoe:'
    - type: text
      text: ' Angamba ho voataona izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia horesentsika sy hovaliantsika.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Kanefa Jehovah momba ahy toy ny lehilahy mahery mahatahotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary noho izany dia ho tafintohina ny mpanenjika ahy ka tsy haharesy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho menatra indrindra izy, satria tsy hendry,–
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy ambinina.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahamenarana mandrakizay izay tsy hohadinoina izany!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa Hianao, Jehovah, Tompon’ny maro ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamantatra ny marina ka mizaha toetra ny voa sy ny fo–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho hitako ny famalianao azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aminao no efa nanankinako ny adiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mihirà ho an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy namonjy ny fanahin’ny malahelo tamin’ny tànan’ny mpanao ratsy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ho voaozona anie ny andro izay nahaterahako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hotahina anie ny andro izay niterahan’ineny ahy!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ho voaozona anie ny olona izay nitondra teny mahafaly tamin’ikaky nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tera-dahy hianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nahafaly azy indrindra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Aoka izany lehilahy izany ho toy ny tanàna izay noravan’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nanenenany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka izy handre fitarainana nony maraina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy akoralava nony mitataovovonana,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Satria tsy nahafaty ahy tany an-kibo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahatonga an’ineny ho fasako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hivesatra ahy mandrakariva ny kibony.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nahoana re aho no nivoaka avy tany an-kibo mba hahita fahoriana sy alahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho lany aman-kenatra ny androko!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia namely an’i Jeremia mpaminany sady namatotra azy tamin’ny boloky hazo izay teo am-bavahadin’i Benjamina, dia ilay eo ambony, eo anilan’ny tranon’i Jehovah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nony ampitso, dia nesorin’i Pasora tamin’ny boloky hazo Jeremia. Dia hoy Jeremia taminy: Tsy nataon’i Jehovah hoe Pasora'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pasora = Fiadanana manodidina (?)
      marker-yv: yv-n
    - type: text
      text: ' ny anaranao, fa Magora-misabiba.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Magora-misabiba = Fampangorohoroana manodidina.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa izao no lazain’i Jehovah: Indro, hataoko fampangorohoroana ho an’ny tenanao sy ny sakaizanao rehetra hianao, ary ho lavon’ny sabatry ny fahavalony ireo, dia ho hitan’ny masonao izany; ary ny Joda rehetra hatolotro eo an-tànan’ny mpanjakan’i Babylona, dia ho entiny ho babo any Babylona izy ka hovonoiny amin’ny sabatra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny harena rehetra amin’ity tanàna ity sy ny vokatry ny fisasarany rehetra sy ny zava-tsoany rehetra ary ny rakitry ny mpanjakan’ny Joda rehetra dia samy hatolotro eo an-tànan’ny fahavalony, ka dia hamabo sy haka azy ireny ary hitondra azy ho any Babylona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary hianao, ry Pasora, sy izay rehetra mitoetra ao an-tranonao dia ho lasan-ko babo; ary ho tonga any Babylona hianao, ka any no hahafatesanao, ary any koa no handevenana anao mbamin’ny sakaizanao rehetra izay efa naminanianao lainga.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fitarainana nataon’i Jeremia
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: JEHOVAH ô, notaominao aho ka voataona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nosamborinao aho ka resinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga fihomehezana mandritra ny andro aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy rehetra dia maneso ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa na oviana na oviana no itenenako, dia tsy maintsy mitaraina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, miantso aho hoe: Loza sy fandravana!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tenin’i Jehovah dia atao fanakorana sy fihomehezana ahy isan-andro.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy izaho: Tsy hanonona Azy aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hiteny intsony amin’ny anarany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa izany dia tonga toy ny afo mirehitra ato am-poko, voahidy ato amin’ny taolako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary sasatra ny niaritra aho ka tsy mahazaka.
