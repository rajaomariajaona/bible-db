document_id: 1CO.14
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fihoaran’ny fahaizana haminany noho ny fahaizana hanao fiteny tsy fantatra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'MIEZAHA mitady ny fitiavana, nefa maniria fatratra ny zava-panahy koa, indrindra fa ny haminany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa izay miteny amin’ny fiteny tsy fantatra dia tsy miteny amin’olona, fa amin’Andriamanitra; fa amin’ny fanahy no itenenany zava-miafina, ka tsy misy olona mahalala; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa izay maminany kosa miteny amin’olona ho fampandrosoana sy ho famporisihana ary ho fampiononana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay miteny amin’ny fiteny tsy fantatra dia mampandroso ny tenany; fa izay maminany kosa mampandroso ny fiangonana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tiako raha samy hiteny amin’ny fiteny tsy fantatra hianareo rehetra; nefa aleo haminany; fa izay maminany dia lehibe noho izay miteny amin’ny fiteny tsy fantatra, raha tsy mandika teny koa izy hahazoan’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' fampandrosoana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nefa, ry rahalahy, raha mankeo aminareo aho ka miteny amin’ny fiteny tsy fantatra, inona moa no soa ho vitako aminareo amin’izany, raha tsy fanambarana, na fahalalana, na faminaniana, na fampianarana, no hitenenako aminareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny zavatra tsy manana aina, na sodina, na lokanga, na dia maneno aza, raha tsy manao feo samy hafa, ahoana no hahafantarana izay ataony, na amin’ny sodina, na amin’ny lokanga? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha manao feo hafahafa ny trompetra, iza no hiomana hiady? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia toy izany koa hianareo: raha tsy mazava ny teny aloaky ny vavanareo, hatao ahoana no fahafantatra izay lazainareo? Fa raha tsy izany, dia hiteny amin’ny rivotra hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Misy fiteny maro samy hafa amin’izao tontolo izao, ka samy manana ny heviny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa raha tsy mahalala ny hevitry ny fiteny aho, dia ho vaka amin’izay miteny, ary izay miteny ho vaka amiko kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary toy izany ihany koa hianareo: raha fatra-paniry ny zava-panahy, dia izay hampandroso ny fiangonana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' no tadiavo indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa aoka izay miteny amin’ny fiteny tsy fantatra hangataka mba hahay mandika teny koa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha mivavaka amin’ny fiteny tsy fantatra aho, dia ny fanahiko ihany no mivavaka, fa ny saiko kosa tsy mahavanona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ahoana ary no izy? Sady hivavaka am-panahy no hivavaka an-tsaina koa aho; sady hihira am-panahy no hihira an-tsaina koa aho. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha misaotra am-panahy fotsiny ihany hianao, hataon’izay tsy mahay ahoana no hanao ,Amena’, raha misaotra hianao? satria tsy mahalala izay lazainao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hianao dia misaotra tsara ihany, nefa ny hafa kosa tsy mba ampandrosoina. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Misaotra an’Andriamanitra aho fa miteny amin’ny fiteny tsy fantatra mihoatra noho hianareo rehetra aho; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: nefa raha ao am-piangonana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' dia aleoko manao teny dimy fantatry ny saiko mba hampianarako ny sasany koa, toy izay hanao teny iray alina amin’ny fiteny tsy fantatra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ry rahalahy, aza mba ho zaza amin’ny fahalalana; raha amin’ny lolompo dia aoka ho zaza-bodo aza, fa amin’ny fahalalana kosa dia aoka ho lehilahy tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voasoratra amin’ny lalàna hoe: ,,Amin’ny olona hafa fiteny sy amin’ny molotry ny olon-kafa no hitenenako amin’ity firenena ity; fa na dia amin’izany aza dia tsy hihaino Ahy izy, hoy Jehovah’’ (Isa. 28.11, 12). '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa ny fiteny tsy fantatra dia famantarana amin’ny tsy mino, fa tsy amin’ny mino; fa ny faminaniana kosa dia amin’ny mino, fa tsy amin’ny tsy mino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa raha vory ny mpiangona rehetra, ary ny olona rehetra samy miteny amin’ny fiteny tsy fantatra, ary miditra ny tsy mahay, na ny tsy mino, tsy holazainy va fa very saina hianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa raha samy maminany izy rehetra, ary miditra ny tsy mino, na ny tsy mahay, dia ho voan’ny anatra ataon’izy rehetra izy sady hotsarain’izy rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ka dia miseho ny zavatra takona ao am-pony, dia hiankohoka izy ka hivavaka amin’Andriamanitra sady hilaza fa Andriamanitra dia ao aminareo marina tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ahoana ary no izy, ry rahalahy? Raha miangona hianareo, misy ta-hanao hira hianareo, misy ta-hanao fampianarana, misy manana fanambarana, misy manana fiteny tsy fantatra, misy manana fandikan-teny. Aoka ny zavatra rehetra hatao ho fampandrosoana. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha misy miteny amin’ny fiteny tsy fantatra, dia avelao ho roa na telo, fa aza atao mihoatra noho izany, ka ampifanarakarahina; ary avelao hisy iray mandika teny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa raha tsy misy mpandika teny, dia aoka izy hangina eo amin’ny fiangonana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' fa aoka hiteny amin’ny tenany sy amin’Andriamanitra ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary aoka ny mpaminany roa na telo no hiteny, fa aoka ny hafa hamantatra. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa raha misy tsindrian’ny Fanahy ao am-pipetrahana, dia aoka hangina kosa ny voalohany; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'fa mahazo maminany tsirairay hianareo rehetra, mba hianaran’izy rehetra sy hamporisihana azy rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ary ny fanahin’ny mpaminany dia manaiky hozakain’izy mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa Andriamanitra tsy tompon’ny fikotranana, fa tompon’ny fiadanana.
- type: usfm
  marker: p
  children:
  - type: text
    text: Araka ny fanaon’ny fiangonan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' ny olona masina rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia aoka hangina ny vehivavy raha ao am-piangonana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' fa tsy avela hiteny izy, fa aoka hanoa tsara araka ny lazain’ny lalàna koa. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary raha misy tiany hianarana, dia aoka izy hanontany ny lahy raha mby any an-trano; fa mahamenatra raha miteny ao am-piangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' ny vehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Avy aminareo va no nihavian’ny tenin’Andriamanitra, sa ao aminareo ihany no nahatongavany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Raha misy manao azy ho mpaminany, na ho manana fahaizam-panahy, dia aoka ho fantany tsara fa didin’ny Tompo ny teny izay soratako ho aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fa raha misy tsy mahalala, dia avelao tsy hahalala ihany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Koa amin’izany, ry rahalahiko, maniria fatratra ny haminany, ary aza mandrara tsy hiteny amin’ny fiteny tsy fantatra; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: kanefa aoka ny zavatra rehetra hatao amin’ny fahamendrehana sy ny filaminana.
