document_id: PSA.120,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana ataon’ny olona miara-mitoetra amin’izay tia ady.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: JEHOVAH no nitarainako tamin’ny fahoriako dia namaly ahy Izy,
  '2':
  - type: text
    content: Jehovah ô, vonjeo ny fanahiko amin’ny molotra mandainga,
  - type: text
    content: Eny, amin’ny lela mamitaka.
  '3':
  - type: text
    content: Inona no homeny anao, ary inona koa no hataony aminao,
  - type: text
    content: Ry lela mamitaka?
  '4':
  - type: text
    content: Zana-tsipìkan’ny mahery sady voaranitra,
  - type: text
    content: Mbamin’ny vain’afon’anjavidy.
  - type: note
    content: Izahao 1 Mpan. xix. 4.
  '5':
  - type: text
    content: Lozako, fa mivahiny eto amin’ny Maseka aho
  - type: text
    content: Ary mitoetra ato an-dain’ny Kedarita!
  '6':
  - type: text
    content: Ela loatra izay no nitoeran’ny fanahiko
  - type: text
    content: Teo amin’izay tsy tia fihavanana.
  '7':
  - type: text
    content: Raha izaho, dia fihavanana;
  - type: text
    content: Kanjo nony miteny aho, dia mila ady kosa ireny.
