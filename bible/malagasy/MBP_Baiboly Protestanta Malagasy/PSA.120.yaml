document_id: PSA.120
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainana ataon’ny olona miara-mitoetra amin’izay tia ady.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '120.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fihirana misy hevitra ambaratonga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH no nitarainako tamin’ny fahoriako dia namaly ahy Izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jehovah ô, vonjeo ny fanahiko amin’ny molotra mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, amin’ny lela mamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Inona no homeny anao, ary inona koa no hataony aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry lela mamitaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Zana-tsipìkan’ny mahery sady voaranitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny vain’afon’anjavidy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '120.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao 1 Mpan. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xix. 4.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lozako, fa mivahiny eto amin’ny Maseka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitoetra ato an-dain’ny Kedarita!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ela loatra izay no nitoeran’ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teo amin’izay tsy tia fihavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha izaho, dia fihavanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo nony miteny aho, dia mila ady kosa ireny.
