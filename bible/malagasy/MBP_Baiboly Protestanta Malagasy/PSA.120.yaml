      text: JEHOVAH no nitarainako tamin’ny fahoriako dia namaly ahy Izy,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, vonjeo ny fanahiko amin’ny molotra mandainga,
  - type: usfm
    marker: q1
    children:
