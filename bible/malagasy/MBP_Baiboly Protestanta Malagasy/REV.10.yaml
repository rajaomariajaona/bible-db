document_id: REV.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny nentin’ny anjely anankiray, ary ny amin’ny kotrokorana fito sy ny boky kely.
  - type: text
    content: 'ARY hitako fa, indro, nisy anjely mahery anankiray koa, nidina avy tany an-danitra sady nitafy rahona; ary ny avana dia teo amin’ny lohany, ary ny tavany dia tahaka ny masoandro, ary ny tongony tahaka ny andry afo, '
  '10':
  - type: text
    content: Dia noraisiko ilay boky kely teny an-tànan’ny anjely ka nohaniko avokoa; ary raha mbola teo am-bavako izy, dia mamy tahaka ny tantely, kanjo nony voateliko, dia nangidy ny kiboko.
  '11':
  - type: text
    content: 'Ary nisy nilaza tamiko hoe: Tsy maintsy maminany indray hianao ny amin’ny olona maro sy ny firenena maro sy ny fiteny maro ary ny mpanjaka maro.'
  '2':
  - type: text
    content: 'ary nitana boky kely nivelatra teny an-tànany izy; ary nabahany ny tongony, ka ny ankavanany tamin’ny ranomasina, ary ny ankaviany tamin’ny tany; '
  '3':
  - type: text
    content: 'ary niantso tamin’ny feo mahery izy, tahaka ny fieron’ny liona; ary nony niantso izy, dia nikotroka ny kotrokorana fito. '
  '4':
  - type: text
    content: 'Ary rehefa nikotroka ny kotrokorana fito, dia efa hanoratra aho, kanjo nahare feo avy tany an-danitra aho nanao hoe: Asio tombo-kase izay efa notononin’ny kotrokorana fito, fa aza soratana.'
  '5':
  - type: text
    content: 'Ary ny anjely, ilay efa hitako, dia nitsangana teo ambonin’ny ranomasina sy teo ambonin’ny tany, ka nanangana ny tànany ankavanana ho amin’ny lanitra '
  '6':
  - type: text
    content: ary nianiana tamin’Izay velona mandrakizay mandrakizay, dia Ilay nahary ny lanitra sy ny ao aminy ary ny tany sy ny ao aminy ary ny ranomasina sy ny ao aminy fa tsy hisy andro
  - type: note
    content: 'Na: tsy ho ela.'
  - type: text
    content: ' intsony; '
  '7':
  - type: text
    content: fa amin’ny andro hitsofan’ny anjely fahafito, rehefa hitsoka izy, dia ho tanteraka ny zava-miafina izay an’Andriamanitra, araka ny teny soa mahafaly nambarany tamin’ny mpaminany mpanompony.
  '8':
  - type: text
    content: 'Ary ny feo izay efa reko avy tany an-danitra dia niteny tamiko indray hoe: Mandehana, raiso ilay boky mivelatra eny an-tànan’ny anjely mitsangana eo ambonin’ny ranomasina sy eo ambonin’ny tany. '
  '9':
  - type: text
    content: 'Dia nankany amin’ny anjely aho ka nanao taminy hoe: Omeo ahy iny boky kely iny. Ary hoy izy tamiko: Raiso, ka hano avokoa io; dia hampangidy ny kibonao izy, nefa eo am-bavanao dia ho mamy tahaka ny tantely. '
