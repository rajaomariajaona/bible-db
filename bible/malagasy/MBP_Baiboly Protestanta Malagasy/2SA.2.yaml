document_id: 2SA.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Davida tamin’ny Joda, sy ny nanjakan’Isboseta tamin’ny Isiraely, ary ny niadian’izy roa tonta tao Gibeona.
  - type: text
    content: 'ARY rehefa afaka izany, Davida dia nanontany tamin’i Jehovah hoe: Hiakatra ho any amin’ny tanànan’ny Joda anankiray va aho? Dia hoy Jehovah taminy: Miakara. Ary hoy Davida: Any aninona no hiakarako? Dia hoy Izy: Any Hebrona.'
  '10':
  - type: text
    content: 'Ary efa-polo taona no nahaveloman’Isboseta, zanak’i Saoly, fony izy vao nanjaka tamin’ny Isiraely, ary roa taona no nanjakany.) Fa ny firenen’i Joda nomba an’i Davida. '
  '11':
  - type: text
    content: Ary ny andro nanjakan’i Davida tao Hebrona tamin’ny taranak’i Joda dia fito taona sy enim-bolana.
  '12':
  - type: text
    content: 'Ary Abnera, zanak’i Nera, sy ny mpanompon’Isboseta, zanak’i Saoly, niala tao Mahanaima ka nankany Gibeona. '
  '13':
  - type: text
    content: 'Ary Joaba, zanak’i Zeroia, sy ny mpanompon’i Davida nivoaka ka nihaona tamin’ireo teo amoron’ny kamory tao Gibeona; ary samy nipetraka teo amin’ny lafin’ny kamory avy izy. '
  '14':
  - type: text
    content: 'Ary hoy Abnera tamin’i Joaba: Masìna hianao, aoka hitsangana ny zatovo hanao kilalao eto anatrehantsika. Ary hoy Joaba: Aoka ary izy hitsangana.'
  '15':
  - type: text
    content: 'Dia nisy nitsangana ka nita, dia roa ambin’ny folo lahy tamin’ny Benjamina, izay an’Isboseta, zanak’i Saoly, ary roa ambin’ny folo lahy koa tamin’ny mpanompon’i Davida. '
  '16':
  - type: text
    content: Ary izy rehetra samy nifanavika nifampihazon-doha ka nifandefon-tehezana tamin’ny sabatra, dia niara-nikarapoka; koa izany no nanaovana izany fitoerana ao Gibeona izany hoe Helkata-hazorima.
  - type: note
    content: Helkata-hazorima = Tanin’ny sabatra maranitra.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Ary mafy ny ady tamin’izany andro izany; ary dia resy teo anoloan’ny mpanompon’i Davida Abnera sy ny lehilahy amin’ny Isiraely.
  '18':
  - type: text
    content: Ary mba teo koa izy telo lahy zanak’i Zeroia, dia Joaba sy Abisay ary Asahela; ary Asahela dia haingan-tongotra tahaka ny gazela
  - type: note
    content: izahao i.and. 19.
  - type: text
    content: ' any an-efitra. '
  '19':
  - type: text
    content: 'Ary Asahela nanenjika an’i Abnera, ka ny fandehany nanenjika an’i Abnera dia tsy nivily akory na tamin’ny ankavanana na tamin’ny ankavia. '
  '2':
  - type: text
    content: 'Dia niakatra nankany Davida mbamin’ny vadiny roa, dia Ahinoama Jezirelita sy Abigaila, ilay novinadin’i Nabala Karmelita. '
  '20':
  - type: text
    content: 'Ary Abnera niherika ka nanao hoe: Hianao moa izany, ry Asahela? Dia hoy izy: Izaho ity. '
  '21':
  - type: text
    content: 'Dia hoy Abnera taminy: Mivilia hianao, na ho amin’ny ankavanana, na ho amin’ny ankavia, ary zatovo anankiray no sambory, ka baboy ho anao izay eny aminy rehetra. Fa Asahela tsy nety nivily, fa nanenjika azy ihany. '
  '22':
  - type: text
    content: 'Ary hoy indray Abnera tamin’i Asahela: Mivilia hianao, fa aza manenjika ahy; fa hataoko inona moa izay hamely anao hikarapoka amin’ny tany, ary hataoko ahoana no fijery an’i Joaba rahalahinao? '
  '23':
  - type: text
    content: Nefa tsy nety nivily ihany izy, ka dia nasian’i Abnera ny antse-defona ny kibony, ka dia niboroaka teo an-damosiny ny lefona, ary nikarapoka teo izy ka maty niaraka tamin’izay. Ary izay rehetra tonga teo amin’ilay nikarapohan’i Asahela sy nahafatesany dia nijanona.
  '24':
  - type: text
    content: 'Ary Joaba sy Abisay dia nanenjika an’i Abnera; ka nony tonga teo amin’ny havoana Ama izy, izay tandrifin’i Gia amin’ny làlana mankany amin’ny efitr’i Gibeona, dia maty ny masoandro. '
  '25':
  - type: text
    content: 'Ary ny taranak’i Benjamina niangona teo amin’i Abnera ka nifoko ho iray toko ary nijanona teo an-tampon’ny havoana anankiray. '
  '26':
  - type: text
    content: 'Ary Abnera niantso an’i Joaba hoe: Handany mandrakizay va ny sabatra? Tsy fantatrao va fa hangidy ny hiafaran’izany? Koa mandra-pahoviana no tsy hampivereninao ny olona tsy hanenjika ny rahalahiny? '
  '27':
  - type: text
    content: 'Ary hoy Joaba: Raha velona koa Andriamanitra, raha tsy ilay teninao,'
  - type: note
    content: izahao and. 14.
  - type: text
    content: ' dia efa lasa nody any naraina avokoa ny olona ka tsy nanenjika ny rahalahiny akory. '
  '28':
  - type: text
    content: Dia nitsoka ny anjomara Joaba, ka dia nijanona ny olona rehetra, ary tsy nanenjika ny Isiraely intsony na niady taminy intsony izy.
  '29':
  - type: text
    content: Ary Abnera sy ny olony nandeha mandritra ny alina namaky ny tani-hay,
  - type: note
    content: Heb. Arabà.
  - type: text
    content: ' dia nita an’i Jordana sy namaky an’i Bitrona rehetra, ka dia tonga tao Mahanaima izy. '
  '3':
  - type: text
    content: Ary ny olona izay tao amin’i Davida mbamin’ny ankohonan’ireo dia samy nentiny niakatra koa, ka nonina tao amin’ny tanàna momba an’i Hebrona izy ireo.
  '30':
  - type: text
    content: 'Ary rehefa niverina Joaba avy nanenjika an’i Abnera, dia novoriny ny olona rehetra, ary sivy ambin’ny folo lahy ihany mbamin’i Asahela no tsy teo ny mpanompon’i Davida. '
  '31':
  - type: text
    content: 'Fa ny mpanompon’i Davida efa nahafaty enim-polo sy telon-jato lahy tamin’ny Benjamita sy ny olon’i Abnera. '
  '32':
  - type: text
    content: Ary Asahela dia nentiny ka naleviny tao amin’ny fasan-drainy, izay tao Betlehema. Ary Joaba sy ny olony nandeha mandritra ny alina, dia tonga tao Hebrona raha vao nazava ratsy ny andro.
  '4':
  - type: text
    content: Ary dia avy ny lehilahy amin’ny Joda ka nanosotra an’i Davida tao mba ho mpanjaka amin’ny taranak’i Joda.
  - type: text
    content: 'Ary nisy nanambara tamin’i Davida hoe: Ny olona any Jabesi-gileada no nandevina an’i Saoly. '
  '5':
  - type: text
    content: 'Ary Davida dia naniraka olona hankany amin’ny mponina any Jabesi-gileada hanao aminy hoe: Hotahin’i Jehovah anie hianareo noho ny soa nataonareo tamin’i Saoly tomponareo tamin’ny nandevenanareo azy. '
  '6':
  - type: text
    content: 'Koa haneho famindrampo sy fahamarinana aminareo anie Jehovah, sady izaho koa efa manao izao soa izao aminareo noho ny nanaovanareo izany zavatra izany. '
  '7':
  - type: text
    content: Ary ankehitriny, aoka hampaherezina anie ny tànanareo, ary aoka hatanjaka hianareo; fa maty Saoly tomponareo, ary izaho no nohosoran’ny firenen’i Joda ho mpanjakany.
  '8':
  - type: text
    content: 'Fa Abnera, zanak’i Nera, komandin’ny miaramilan’i Saoly, efa naka an’Isboseta, zanakalahin’i Saoly, ka nitondra azy nankany Mahanaima, '
  '9':
  - type: text
    content: dia nampanjaka azy tamin’i Gileada sy ny Asorita
  - type: note
    content: 'Na: [Gesorita].'
  - type: text
    content: ' sy Jezirela sy ny Efraima sy ny Benjamina ary ny Isiraely rehetra. ('
