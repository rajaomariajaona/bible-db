document_id: MRK.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny namoahan’i Jesosy ny demonia maro tamin’ny lehilahy tao amin’ny tanin’ny Gerasena.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 8.28-34; Lio. 8.26-39.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tonga teny am-pitan’ny ranomasina tao amin’ny tanin’ny Gerasena izy ireo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary nifona mafy taminy izy mba tsy horoahiny hiala amin’izany tany izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nisy kisoa maro andiany iray nandrasana teny akaikin’ny tendrombohitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nifona taminy ireo ka nanao hoe: Alefaso izahay ho any anatin’ny kisoa mba hiditra any aminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia neken’i Jesosy. Ary ny fanahy maloto, rehefa nivoaka, dia niditra tao anatin’ny kisoa; ary ireo kisoa andiany ireo nitratrevatreva teny amin’ny hantsana ho any amin’ny ranomasina (tokony ho roa arivo no isany), ka dia maty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kenda.
      marker-yv: yv-n
    - type: text
      text: ' tany amin’ny ranomasina izy.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny mpiandry azy dia nandositra ka nilaza tao an-tanàna sy tany an-tsaha. Dia nandeha ny olona mba hizaha izany zavatra izany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary tonga tany amin’i Jesosy izy ka nahita ilay demoniaka, izay nisy ny legiona, fa indro izy nipetraka nitafy lamba sady ary saina; ka raiki-tahotra ny olona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary izay efa nahita dia nilazalaza tamin’ny olona izay natao tamin’ilay demoniaka sy ny amin’ny kisoa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary nifona tamin’i Jesosy izy mba hiala amin’ny taniny.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary rehefa hiondrana teo an-tsambokely Jesosy, dia nangataka taminy ilay demoniaka mba hanaraka Azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nefa tsy navelan’i Jesosy izy; fa hoy Izy taminy: Modia ihany any an-tranonao ho any amin’ny havanao, ka lazao aminy izay zavatra lehibe nataon’ny Tompo taminao sy ny namindrany fo taminao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nony niala teo an-tsambokely Izy, niaraka tamin’izay dia nisy lehilahy azom-panahy maloto nivoaka avy teny amin’ny fasana ka nifanena taminy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia nandeha izy ka nitory tany Dekapolisy izay zavatra lehibe efa nataon’i Jesosy taminy; ka dia gaga ny olona rehetra.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahasitranan’i Jesosy ilay vehivavy narary roa ambin’ny folo taona, sy ny nananganany ny zanakavavin’i Jaïro tamin’ny maty.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 9.18-26; Lio. 8.40-56.
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ARY rehefa nita an-tsambokely indray Jesosy ka tonga teny am-pita, dia nisy vahoaka betsaka tafangona teo aminy; ary teo amoron-dranomasina Izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia avy ny anankiray tamin’ny mpanapaka ny synagoga, Jaïro no anarany; ary rehefa nahita an’i Jesosy izy, dia niankohoka teo amin’ny tongony '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ka niangavy fatratra taminy hoe: Marary efa ho faty ny zanako-vavy kely; andeha re, mametraha ny tànanao aminy, mba ho sitrana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voavonjy.
      marker-yv: yv-n
    - type: text
      text: ' izy ka ho velona. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia nandeha niaraka taminy Izy; ary nisy vahoaka betsaka nanaraka Azy ka nifanety taminy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nisy vehivavy anankiray izay efa narary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: narary nandeha ra.
      marker-yv: yv-n
    - type: text
      text: ' roa ambin’ny folo taona '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'sady efa niaritra zavatra be tamin’ny mpanao fanafody maro ka nandany ny fananany rehetra, nefa tsy nety sitrana, fa vao mainka nihanarary kokoa aza; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'koa rehefa nahare ny amin’i Jesosy izy, dia nankeo ivohony namaky ny vahoaka ary nanendry ny lambany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa hoy izy: Na dia ny fitafiany ihany aza no voatendriko, dia ho sitrana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voavonjy.
      marker-yv: yv-n
    - type: text
      text: ' aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary niaraka tamin’izay dia ritra ny loharanon’aretiny,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fandehanan’ny rany.
      marker-yv: yv-n
    - type: text
      text: ' ka tsaroany tao amin’ny tenany fa sitrana izy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'fa nitoetra tao amin’ny fasana izy; ary tsy nisy olona nahafatotra azy intsony na dia tamin’ny gadra aza. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary niaraka tamin’izay dia fantatr’i Jesosy fa nisy hery niala taminy, dia nihodina teo afovoan’ny vahoaka Izy ka nanao hoe: Iza izany nanendry ny lambako izany? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa hoy ny mpianany taminy: Hitanao izao vahoaka mifanety aminao izao, ka hoy Hianao va: Iza no nanendry Ahy? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary nijery manodidina Izy hizaha ny vehivavy izay efa nanao izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa raiki-tahotra sady toran-kovitra ravehivavy, satria fantany izay natao taminy, ka dia nankeo aminy izy ka niankohoka teo anatrehany ary nanambara taminy ny marina rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary hoy Izy taminy: Anaka, ny finoanao no nahasitrana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: namonjy.
      marker-yv: yv-n
    - type: text
      text: ' anao: mandehana soa aman-tsara, ary sitràna amin’ny aretinao.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Raha mbola niteny Jesosy, dia nisy tonga avy tany amin’ilay mpanapaka ny synagoga ka nanao hoe: Efa maty ny zanakao-vavy; nahoana hianao no mbola manahirana ny Mpampianatra ihany? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Fa tsy nahoan’i Jesosy izany teny nataony izany, fa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ary nony ren’i Jesosy ny teny nataony, dia.
      marker-yv: yv-n
    - type: text
      text: ' hoy Izy tamin’ilay mpanapaka ny syngoga: Aza matahotra, minoa fotsiny ihany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Ary tsy nisy olona navelany hanaraka Azy afa-tsy Petera sy Jakoba ary Jaona, rahalahin’i Jakoba.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary dia tonga tao an-tranon’ilay mpanapaka ny synagoga izy ireo, ka hitan’i Jesosy ny tabataba, dia ny olona izay nitomany sy ninaonaona be ihany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary rehefa niditra Izy, dia niteny taminy hoe: Nahoana hianareo no mitabataba sy mitomany? Tsy maty razazavavy, fa matory. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa efa nafatony matetika tamin’ny gadra, na ny tànany, na ny tongony; nefa ny gadra tamin’ny tànany notapahiny, ary ny gadra tamin’ny tongony notorotoroiny, ka tsy nisy olona nahafolaka azy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia nihomehy Azy fatratra ny olona. Fa nandroaka azy rehetra Izy, dia nitondra ny ray aman-drenin-drazazavavy mbamin’izay olona teo aminy ka niditra tao amin’izay nisy an-drazazavavy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dia nandray ny tànan-drazazavavy Izy ka niteny taminy hoe: Talita komy, izany hoe, raha adika: Ry zazavavy, hoy Izaho aminao: Mitsangàna. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Dia nitsangana niaraka tamin’izay razazavavy ka afa-nandeha; fa efa roa ambin’ny folo taona izy. Ary niaraka tamin’izay dia talanjona indrindra ny olona. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Ary Jesosy nandrara azy mafy mba tsy ho fantatr’olona izany; ary nasainy nomena hanina razazavavy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary mandrakariva, na andro na alina, dia nitoetra teny amin’ny fasana sy teny an-tendrombohitra izy ka ninananana sady niteti-tena tamin’ny vato. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa nony nahita an’i Jesosy teny lavitra eny izy, dia nihazakazaka ka niankohoka teo anatrehany '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'sady niantso tamin’ny feo mahery hoe: Moa mifaninona akory izaho sy Hianao, ry Jesosy, Zanak’Andriamanitra Avo Indrindra ô? Ampianianiko amin’Andriamanitra Hianao, aza mampijaly ahy,– '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'satria Jesosy efa nanao taminy hoe: Mivoaha amin’ity lehilahy ity, ry fanahy maloto. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nanontany azy Jesosy hoe: Iza moa no anaranao? Ary izy namaly hoe: Legiona no anarako, satria maro izahay. '
