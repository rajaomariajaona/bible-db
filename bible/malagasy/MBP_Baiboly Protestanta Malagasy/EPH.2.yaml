document_id: EPH.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hianareo '
  - type: text
    content: dia efa novelominy,
  - type: text
    content: ' fony mbola matin’ny fahadisoanareo sy ny fahotanareo, '
  '10':
  - type: text
    content: Fa asany isika, voaforona tao amin’i Kristy Jesosy mba hanao asa tsara, izay namboarin’Andriamanitra rahateo mba handehanantsika eo aminy.
  - type: heading
    content: Ny famindrampon’Andriamanitra amin’ny jentilisa amin’ny andraisany azy ho ao amin’ny fiangonana.
  '11':
  - type: text
    content: 'KOA tsarovy fa fahiny hianareo izay jentilisa araka ny nofo, ka nolazain’ny voaforan-tànana, teo amin’ny nofo hoe ,tsy voafora’– '
  '12':
  - type: text
    content: eny, tsarovy
  - type: text
    content: ' fa tamin’izany andro izany dia tsy nanana an’i Kristy hianareo, fa olon-ko azy tamin’ny fanjakan’ny Isiraely ary vahiny tamin’ireo faneken’ny teny fikasana, dia tsy nanana fanantenana sady tsy nanana an’Andriamanitra teo amin’izao tontolo izao; '
  '13':
  - type: text
    content: fa ankehitriny kosa, ao amin’i Kristy Jesosy, hianareo izay lavitra fahiny dia efa nampanakeken’ny ran’i Kristy.
  '14':
  - type: text
    content: 'Fa Izy no fihavanantsika, Izay naha-iray antsika roa tonta ka nandrava ny efitry ny fisarahana, '
  '15':
  - type: text
    content: 'fa tao amin’ny nofony no nandravany ny fandrafiana, dia ny lalàna nisy didy natao hotandremana, mba hanakambanany antsika roa tonta ao amin’ny tenany ho olom-baovao iray, ka hanaovany fihavanana, '
  '16':
  - type: text
    content: 'ary hampihavana antsika roa tonta ho tena iray amin’Andriamanitra noho ny hazofijaliana, izay namonoany ny fandrafiana. '
  '17':
  - type: text
    content: Ary tonga Izy ka nitory teny soa mahafaly milaza fihavanana
  - type: note
    content: 'Na: fiadanana; izahao Isa. 1vii.19.'
  - type: text
    content: ' taminareo izay lavitra ary fihavanana'
  - type: note
    content: 'Na: fiadanana; izahao Isa. 1vii.19.'
  - type: text
    content: ' tamin’izay akaiky koa. '
  '18':
  - type: text
    content: Fa Izy no ananantsika roa tonta fanatonana amin’ny Fanahy iray ho any amin’ny Ray.
  '19':
  - type: text
    content: 'Koa dia tsy mba vahiny sy mpivahiny intsony hianareo, fa tompon-tany, mpiray fanjakana amin’ny olona masina sady ankohonan’Andriamanitra, '
  '2':
  - type: text
    content: 'izay nalehanareo fahiny, araka ny fomban’izao tontolo izao, araka ny mpanapaka ny fanjakana eny amin’ny rivotra, dia ny fanahy izay miasa ankehitriny ao anatin’ny zanaky ny tsi-fanarahana; '
  '20':
  - type: text
    content: 'natsangana teo ambonin’ny fanorenan’ny Apostoly sy ny mpaminany, ary Kristy Jesosy no fehizoro indrindra; '
  '21':
  - type: text
    content: 'ao aminy no irafetan’ny rafitra rehetra, mitombo tsara ho tempoly masina ao amin’ny Tompo. '
  '22':
  - type: text
    content: Ary ao aminy no miaraka aorina koa hianareo ho fonenan’Andriamanitra amin’ny Fanahy.
  '3':
  - type: text
    content: 'teo amin’ireo no nitondrantsika rehetra tena koa fahiny tamin’ny filan’ny nofontsika, ka nanaovantsika ny danin’ny nofo sy ny saina; ary araka ny toetsika dia zanaky ny fahatezerana toy ny sasany koa isika. '
  '4':
  - type: text
    content: 'Fa Andriamanitra, Izay manan-karena amin’ny famindrampo, noho ny halehiben’ny fitiavany izay nitiavany antsika, '
  '5':
  - type: text
    content: 'na dia fony mbola matin’ny fahadisoana aza isika, dia nahavelona antsika niaraka tamin’i Kristy (fahasoavana no namonjena anareo); '
  '6':
  - type: text
    content: 'ary niara-natsangany isika ka niara-napetrany any an-danitra ao amin’i Kristy Jesosy, '
  '7':
  - type: text
    content: mba hasehony amin’ny andro ho avy ny haben’ny haren’ny fahasoavany amin’ny fahamoram-panahiny amintsika ao amin’i Kristy Jesosy.
  '8':
  - type: text
    content: 'Fa fahasoavana no namonjena anareo amin’ny finoana; ary tsy avy aminareo izany, fa fanomezana avy amin’Andriamanitra; '
  '9':
  - type: text
    content: 'tsy avy amin’ny asa, fandrao hisy hirehareha. '
