document_id: EPH.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hianareo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia efa novelominy,
    - type: text
      text: ' fony mbola matin’ny fahadisoanareo sy ny fahotanareo, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa asany isika, voaforona tao amin’i Kristy Jesosy mba hanao asa tsara, izay namboarin’Andriamanitra rahateo mba handehanantsika eo aminy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny famindrampon’Andriamanitra amin’ny jentilisa amin’ny andraisany azy ho ao amin’ny fiangonana.
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'KOA tsarovy fa fahiny hianareo izay jentilisa araka ny nofo, ka nolazain’ny voaforan-tànana, teo amin’ny nofo hoe ,tsy voafora’– '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: it
      children:
      - type: text
        text: eny, tsarovy
    - type: text
      text: ' fa tamin’izany andro izany dia tsy nanana an’i Kristy hianareo, fa olon-ko azy tamin’ny fanjakan’ny Isiraely ary vahiny tamin’ireo faneken’ny teny fikasana, dia tsy nanana fanantenana sady tsy nanana an’Andriamanitra teo amin’izao tontolo izao; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: fa ankehitriny kosa, ao amin’i Kristy Jesosy, hianareo izay lavitra fahiny dia efa nampanakeken’ny ran’i Kristy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa Izy no fihavanantsika, Izay naha-iray antsika roa tonta ka nandrava ny efitry ny fisarahana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'fa tao amin’ny nofony no nandravany ny fandrafiana, dia ny lalàna nisy didy natao hotandremana, mba hanakambanany antsika roa tonta ao amin’ny tenany ho olom-baovao iray, ka hanaovany fihavanana, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary hampihavana antsika roa tonta ho tena iray amin’Andriamanitra noho ny hazofijaliana, izay namonoany ny fandrafiana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary tonga Izy ka nitory teny soa mahafaly milaza fihavanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fiadanana; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Isa. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1vii.19.
      marker-yv: yv-n
    - type: text
      text: ' taminareo izay lavitra ary fihavanana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fiadanana; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Isa. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1vii.19.
      marker-yv: yv-n
    - type: text
      text: ' tamin’izay akaiky koa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa Izy no ananantsika roa tonta fanatonana amin’ny Fanahy iray ho any amin’ny Ray.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa dia tsy mba vahiny sy mpivahiny intsony hianareo, fa tompon-tany, mpiray fanjakana amin’ny olona masina sady ankohonan’Andriamanitra, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'izay nalehanareo fahiny, araka ny fomban’izao tontolo izao, araka ny mpanapaka ny fanjakana eny amin’ny rivotra, dia ny fanahy izay miasa ankehitriny ao anatin’ny zanaky ny tsi-fanarahana; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'natsangana teo ambonin’ny fanorenan’ny Apostoly sy ny mpaminany, ary Kristy Jesosy no fehizoro indrindra; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ao aminy no irafetan’ny rafitra rehetra, mitombo tsara ho tempoly masina ao amin’ny Tompo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary ao aminy no miaraka aorina koa hianareo ho fonenan’Andriamanitra amin’ny Fanahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'teo amin’ireo no nitondrantsika rehetra tena koa fahiny tamin’ny filan’ny nofontsika, ka nanaovantsika ny danin’ny nofo sy ny saina; ary araka ny toetsika dia zanaky ny fahatezerana toy ny sasany koa isika. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa Andriamanitra, Izay manan-karena amin’ny famindrampo, noho ny halehiben’ny fitiavany izay nitiavany antsika, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'na dia fony mbola matin’ny fahadisoana aza isika, dia nahavelona antsika niaraka tamin’i Kristy (fahasoavana no namonjena anareo); '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary niara-natsangany isika ka niara-napetrany any an-danitra ao amin’i Kristy Jesosy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: mba hasehony amin’ny andro ho avy ny haben’ny haren’ny fahasoavany amin’ny fahamoram-panahiny amintsika ao amin’i Kristy Jesosy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa fahasoavana no namonjena anareo amin’ny finoana; ary tsy avy aminareo izany, fa fanomezana avy amin’Andriamanitra; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'tsy avy amin’ny asa, fandrao hisy hirehareha. '
