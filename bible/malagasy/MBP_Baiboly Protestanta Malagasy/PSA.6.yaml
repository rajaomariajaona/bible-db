document_id: PSA.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fivavaky ny olona anarin’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Nampiarahina amin’ny valiha. Al-hasheminith. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, aza ny fahatezeranao no ananaranao ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza ny fahaviniranao no amaizanao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mamindrà fo amiko, Jehovah ô, fa reraka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sitrano aho, Jehovah ô, fa mihozohozo ny taolako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fanahiko koa dia mangovitra loatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao, Jehovah ô, mandra-pahoviana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miverena, Jehovah ô, afaho ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho noho ny famindramponao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tsy misy fahatsiarovana Anao any amin’ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' iza no hidera Anao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa sasatry ny misento aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampitsinkafona ny farafarako isan-alina aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mahampo-dranomaso ny fandriako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lanin’alahelo ny masoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa pahina izy amin’ny ataon’ny mpampahory ahy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mialà amiko, hianareo mpanao ratsy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah efa nandre ny feon’ny fitomaniako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehovah efa nandre ny fangatahako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah no handray ny fivavahako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho menatra sy hangovitra indrindra ny fahavaloko rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihodina izy ka ho menatra tampoka.
