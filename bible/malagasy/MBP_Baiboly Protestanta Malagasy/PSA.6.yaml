document_id: PSA.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavaky ny olona anarin’Andriamanitra.
  - type: text
    content: Ho an’ny mpiventy hira. Nampiarahina amin’ny valiha. Al-hasheminith. Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, aza ny fahatezeranao no ananaranao ahy,
  - type: text
    content: Ary aza ny fahaviniranao no amaizanao ahy.
  '10':
  - type: text
    content: Ho menatra sy hangovitra indrindra ny fahavaloko rehetra;
  - type: text
    content: Hihodina izy ka ho menatra tampoka.
  '2':
  - type: text
    content: Mamindrà fo amiko, Jehovah ô, fa reraka aho;
  - type: text
    content: Sitrano aho, Jehovah ô, fa mihozohozo ny taolako.
  '3':
  - type: text
    content: Ny fanahiko koa dia mangovitra loatra;
  - type: text
    content: Fa Hianao, Jehovah ô, mandra-pahoviana?
  '4':
  - type: text
    content: Miverena, Jehovah ô, afaho ny fanahiko;
  - type: text
    content: Vonjeo aho noho ny famindramponao.
  '5':
  - type: text
    content: Fa tsy misy fahatsiarovana Anao any amin’ny fahafatesana,
  - type: text
    content: Any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' iza no hidera Anao?'
  '6':
  - type: text
    content: Efa sasatry ny misento aho;
  - type: text
    content: Mampitsinkafona ny farafarako isan-alina aho
  - type: text
    content: Sady mahampo-dranomaso ny fandriako.
  '7':
  - type: text
    content: Lanin’alahelo ny masoko;
  - type: text
    content: Efa pahina izy amin’ny ataon’ny mpampahory ahy rehetra.
  '8':
  - type: text
    content: Mialà amiko, hianareo mpanao ratsy rehetra;
  - type: text
    content: Fa Jehovah efa nandre ny feon’ny fitomaniako.
  '9':
  - type: text
    content: Jehovah efa nandre ny fangatahako;
  - type: text
    content: Jehovah no handray ny fivavahako.
