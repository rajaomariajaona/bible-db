document_id: REV.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny lovia fito nisy ny loza fito, izay nentin’ny anjely fito ka naidiny tamin’ny tany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY hitako fa, indro, nisy famantarana iray koa tany an-danitra, sady lehibe no mahagaga, dia anjely fito izay nanana ny loza fito farany, satria ireny no enti-mahatanteraka ny fahatezeran’Andriamanitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nahita aho fa, indro, toa ranomasina fitaratra miharo afo, ary izay naharesy ka afaka tamin’ny bibi-dia sy ny sariny ary ny isan’ny anarany dia nitsangana teo amoron’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tao amin’.
      marker-yv: yv-n
    - type: text
      text: ' ny ranomasina fitaratra, nitana lokangan’Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mihira ny fihiran’i Mosesy, mpanompon’Andriamanitra, sy ny fihiran’ny Zanak’ondry izy manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe sy mahatalanjona ny asanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô, Andriamanitra Tsitoha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahitsy sy marina ny làlanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Mpanjaka mandrakizay.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no tsy hatahotra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no tsy hankalaza ny anaranao, Tompo ô?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao ihany no masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny firenena rehetra ho avy hiankohoka eo anatrehanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa naharihary ny fitsarana marina nataonao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa afaka izany, dia nahita aho fa, indro, novohana ny tempoly, dia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tao amin’.
      marker-yv: yv-n
    - type: text
      text: ' ny tabernakelin’ny vavolombelona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ny Didy Folo.
      marker-yv: yv-n
    - type: text
      text: ' tany an-danitra; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny anjely fito izay nanana ny loza fito dia nivoaka avy tao amin’ny tempoly, ary niravaka vato soa madio sy mamirapiratra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[niakanjo rongony fotsy sady madio no mangatsakatsaka].'
      marker-yv: yv-n
    - type: text
      text: ' izy sady nisikina fisikinam-bolamena teo amin’ny tratrany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anankiray tamin’ny zava-manan-aina efatra nanome ny anjely fito lovia volamena fito, feno ny fahatezeran’Andriamanitra, Izay velona mandrakizay mandrakizay. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tempoly dia feno setroka avy tamin’ny voninahitr’Andriamanitra sy ny heriny, ka tsy nisy nahazo niditra tao amin’ny tempoly mandra-pahatanteraky ny loza fito nentin’ny anjely fito.
