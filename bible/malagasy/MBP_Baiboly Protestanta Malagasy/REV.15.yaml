document_id: REV.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny lovia fito nisy ny loza fito, izay nentin’ny anjely fito ka naidiny tamin’ny tany.
  - type: text
    content: ARY hitako fa, indro, nisy famantarana iray koa tany an-danitra, sady lehibe no mahagaga, dia anjely fito izay nanana ny loza fito farany, satria ireny no enti-mahatanteraka ny fahatezeran’Andriamanitra.
  '2':
  - type: text
    content: Ary nahita aho fa, indro, toa ranomasina fitaratra miharo afo, ary izay naharesy ka afaka tamin’ny bibi-dia sy ny sariny ary ny isan’ny anarany dia nitsangana teo amoron’
  - type: note
    content: 'Na: tao amin’.'
  - type: text
    content: ' ny ranomasina fitaratra, nitana lokangan’Andriamanitra. '
  '3':
  - type: text
    content: 'Ary mihira ny fihiran’i Mosesy, mpanompon’Andriamanitra, sy ny fihiran’ny Zanak’ondry izy manao hoe:'
  - type: text
    content: Lehibe sy mahatalanjona ny asanao,
  - type: text
    content: Tompo ô, Andriamanitra Tsitoha;
  - type: text
    content: Mahitsy sy marina ny làlanao,
  - type: text
    content: Ry Mpanjaka mandrakizay.
  '4':
  - type: text
    content: Iza no tsy hatahotra?
  - type: text
    content: Ary iza no tsy hankalaza ny anaranao, Tompo ô?
  - type: text
    content: Fa Hianao ihany no masina,
  - type: text
    content: Ary ny firenena rehetra ho avy hiankohoka eo anatrehanao;
  - type: text
    content: Fa efa naharihary ny fitsarana marina nataonao.
  '5':
  - type: text
    content: Ary rehefa afaka izany, dia nahita aho fa, indro, novohana ny tempoly, dia
  - type: note
    content: 'Na: tao amin’.'
  - type: text
    content: ' ny tabernakelin’ny vavolombelona'
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' tany an-danitra; '
  '6':
  - type: text
    content: ary ny anjely fito izay nanana ny loza fito dia nivoaka avy tao amin’ny tempoly, ary niravaka vato soa madio sy mamirapiratra
  - type: note
    content: 'Na: [niakanjo rongony fotsy sady madio no mangatsakatsaka].'
  - type: text
    content: ' izy sady nisikina fisikinam-bolamena teo amin’ny tratrany. '
  '7':
  - type: text
    content: 'Ary ny anankiray tamin’ny zava-manan-aina efatra nanome ny anjely fito lovia volamena fito, feno ny fahatezeran’Andriamanitra, Izay velona mandrakizay mandrakizay. '
  '8':
  - type: text
    content: Ary ny tempoly dia feno setroka avy tamin’ny voninahitr’Andriamanitra sy ny heriny, ka tsy nisy nahazo niditra tao amin’ny tempoly mandra-pahatanteraky ny loza fito nentin’ny anjely fito.
