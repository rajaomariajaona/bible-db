document_id: 1SA.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsy nahatanterahan’i Saoly ny tenin’Andriamanitra ny amin’ny handringanana ny Amalekita, sy ny nandavan’Andriamanitra azy tamin’izany.
  - type: text
    content: 'ARY hoy Samoela tamin’i Saoly: Jehovah naniraka ahy hanosotra anao ho mpanjakan’ny Isiraely olony; koa ankehitriny mihainoa ny tenin’i Jehovah hianao. '
  '10':
  - type: text
    content: 'Ary tonga tamin’i Samoela ny tenin’i Jehovah hoe: '
  '11':
  - type: text
    content: Manenina Aho noho ny nanaovako an’i Saoly ho mpanjaka, fa niala tamin’ny fanarahana Ahy izy ka tsy nahatanteraka ny teniko. Dia tezitra Samoela ka nitaraina tamin’i Jehovah mandritra ny alina.
  '12':
  - type: text
    content: 'Ary nifoha maraina koa Samoela hitsena an’i Saoly, dia nisy nilaza tamin’i Samoela hoe: Saoly efa tonga ato Karmela, ary, indro, izy nanorina fahatsiarovana ho azy, dia nihodina ka nandroso nidina ho any Gilgala.'
  '13':
  - type: text
    content: 'Ary Samoela tonga teo amin’i Saoly, dia hoy Saoly taminy: Hotahin’i Jehovah anie hianao; efa nahatanteraka ny tenin’i Jehovah aho. '
  '14':
  - type: text
    content: 'Fa hoy Samoela: Inona anefa izany fibarareoky ny ondry aman’osy ren’ny sofiko izany sy ny fimàmàn’ny omby reko? '
  '15':
  - type: text
    content: 'Ary hoy Saoly: Avy tany amin’ny Amalekita no nitondrany ireny, fa ny olona namela izay ondry aman’osy sy omby tsara indrindra mba hovonoina hatao fanatitra ho an’i Jehovah Andriamanitrao, fa ny sisa dia naringanay'
  - type: note
    content: Heb. nataonay herema.
  - type: text
    content: ' ihany avokoa.'
  '16':
  - type: text
    content: 'Dia hoy Samoela tamin’i Saoly: Aoka izay, fa hambarako aminao izay nolazain’i Jehovah tamiko halina. Ary hoy izy taminy: Ambarao ary. '
  '17':
  - type: text
    content: 'Dia hoy Samoela: Na dia noheverinao ho kely aza ny tenanao, moa tsy tonga lohan’ny firenen’Isiraely va? Ary Jehovah nanosotra anao ho mpanjakan’ny Isiraely; '
  '18':
  - type: text
    content: 'ary Jehovah naniraka anao ka nanao hoe: Mandehana, ka aringano'
  - type: note
    content: Heb. ataovy herema.
  - type: text
    content: ' avokoa ny Amalekita mpanota, ary miadia aminy ambara-paharingany. '
  '19':
  - type: text
    content: Koa nahoana hianao no tsy nihaino ny feon’i Jehovah, fa nanao an-kazakazaka tamin’ny babo ka nanao izay ratsy eo imason’i Jehovah?
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Hovaliako izay nataon’ny Amalekita tamin’ny Isiraely, dia ny nanotrehany azy tany an-dàlana, fony izy niakatra avy tany Egypta. '
  '20':
  - type: text
    content: 'Fa hoy Saoly tamin’i Samoela: Efa nihaino ny feon’i Jehovah ihany aho ka nandeha tamin’izay nanirahan’i Jehovah ahy ary nitondra an’i Agaga, mpanjakan’ny Amalekita, sady nandringana ny Amalekita rehetra. '
  '21':
  - type: text
    content: Nefa nangalan’ny olona ondry aman-osy sy omby ny babo, dia izay soa avy tamin’ny zavatra haringana,
  - type: note
    content: Heb. hatao herema.
  - type: text
    content: ' mba hovonoina hatao fanatitra ho an’i Jehovah Andriamanitrao ao Gilgala.'
  '22':
  - type: text
    content: 'Fa hoy Samoela: Sitrak’i Jehovah moa ny fanatitra dorana sy ny fanatitra hafa alatsa-dra mihoatra noho ny mihaino ny feon’i Jehovah? He! ny manaraka no tsara noho ny fanatitra, ary ny mihaino no tsara noho ny saboran’ondrilahy. '
  '23':
  - type: text
    content: Fa ny miodina dia toy ny heloka amin’ny fankatovana, ary ny ditra dia toy ny manompo sampy sy terafima. Satria nandà ny tenin’i Jehovah hianao, dia nolaviny tsy ho mpanjaka kosa.
  '24':
  - type: text
    content: 'Ary hoy Saoly tamin’i Samoela: Efa nanota aho, fa efa nandika ny tenin’i Jehovah sy ny teninao; fa natahotra ny vahoaka aho ka nihaino ny feony. '
  '25':
  - type: text
    content: 'Koa ankehitriny, masìna hianao, mamelà ny heloko ary miverena amiko indray mba hiankohofako eo anatrehan’i Jehovah. '
  '26':
  - type: text
    content: 'Fa hoy Samoela tamin’i Saoly: Tsy hiverina aminao aho; fa hianao efa nandà ny tenin’i Jehovah, ary Jehovah kosa efa nandà anao tsy ho mpanjakan’ny Isiraely intsony.'
  '27':
  - type: text
    content: 'Ary nony nihodina handeha Samoela, dia nohazonin’i Saoly ny sisin’akanjony ka triatra. '
  '28':
  - type: text
    content: 'Dia hoy Samoela tamin’i Saoly: Efa notriarin’i Jehovah kosa ho afaka aminao andro-any ny fanjakan’Isiraely ka efa nomeny ny namanao izay tsara noho hianao. '
  '29':
  - type: text
    content: Ary koa, ny Tokin’ny Isiraely tsy mba handainga na hanenina, fa tsy olona izy ka hanenina.
  '3':
  - type: text
    content: Koa mandehana ankehitriny, ka mameleza ny Amalekita, ary aringano
  - type: note
    content: Heb. ataovy herema.
  - type: text
    content: ' izay rehetra mety ho azy, ka aza asiana miangana, fa vonoy avokoa, na lahy na vavy, na ankizy madinika, na zaza minono, na omby, na ondry aman-osy, na rameva, na boriky.'
  '30':
  - type: text
    content: 'Fa hoy Saoly: Efa nanota aho izao, kanefa, masìna hianao, mba omeo voninahitra eo anatrehan’ny loholoko sy eo anatrehan’ny Isiraely aho, ary andeha re hiara-miverina amiko indray mba hiankohofako eo anatrehan’i Jehovah Andriamanitrao. '
  '31':
  - type: text
    content: Ary Samoela dia niverina nanaraka an’i Saoly indray ary Saoly niankohoka teo anatrehan’i Jehovah.
  '32':
  - type: text
    content: 'Dia hoy Samoela: Entonareo eto amiko Agaga, mpanjakan’ny Amalekita. Ary Agaga nankeo aminy sady falifaly ka nanao hoe: Lasa tokoa ny fangidian’ny fahafatesana. '
  '33':
  - type: text
    content: 'Fa hoy Samoela: Toy ny tsy nampananan’ny sabatrao zanaka ny vehivavy no tsy hananan’ny reninao zanaka kosa ao amin’ny vehivavy. Dia notetitetehin’i Samoela teo anatrehan’i Jehovah tao Gilgala Agaga.'
  '34':
  - type: text
    content: 'Ary Samoela nankany Rama; fa Saoly kosa niakatra tany amin’ny tranony tao Gibean’i Saoly. '
  '35':
  - type: text
    content: Ary Samoela tsy namangy an’i Saoly intsony ambara-pahafatiny; fa Samoela nalahelo an’i Saoly. Ary Jehovah nanenina noho ny nanaovany an’i Saoly ho mpanjakan’ny Isiraely.
  '4':
  - type: text
    content: 'Ary Saoly namory ny olona ka nandamina azy tao Telaima, dia roa hetsy ny mandeha an-tongotra, ary iray alina ny lehilahy amin’i Joda. '
  '5':
  - type: text
    content: Ary Saoly dia tonga tao an-tanànan’ny Amalekita ka nanotrika tao an-dohasaha.
  '6':
  - type: text
    content: 'Ary hoy Saoly tamin’ny Kenita: Andeha miala hianareo, ka midìna hiala amin’ny Amalekita, fandrao miaraka aringako aminy hianareo, fa hianareo nanisy soa ny Zanak’Isiraely rehetra, fony izy nivoaka avy tany Egypta. Ka dia niala tamin’ny Amalekita ny Kenita.'
  '7':
  - type: text
    content: 'Ary Saoly namely ny Amalekita hatrany Havila amin’ny làlana mankany Sora izay tandrifin’i Egypta. '
  '8':
  - type: text
    content: Ary azony sambo-belona Agaga, mpanjakan’ny Amalekita, fa ny vahoaka rehetra kosa dia naringany
  - type: note
    content: Heb. nataony herema.
  - type: text
    content: ' tamin’ny lelan-tsabatra. '
  '9':
  - type: text
    content: Fa Saoly sy ny olona tsy namono an’i Agaga sy izay tsara indrindra tamin’ny ondry aman-osy sy ny omby sy ny mifahy sy ny zanak’ondry ary izay tsara rehetra, fa tsy foiny ho naringana
  - type: note
    content: Heb. hatao herema.
  - type: text
    content: ' ireny; fa ny ratsy rehetra sy izay tsy tiany kosa dia naringany'
  - type: note
    content: Heb. nataony herema.
  - type: text
    content: ' ihany avokoa.'
