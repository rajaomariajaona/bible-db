document_id: EXO.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Fahadimy: ny aretina tamin’ny biby.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY hoy Jehovah tamin’i Mosesy: Mankanesa ao amin’i Farao hianao, ka lazao aminy hoe: Izao no lazain’i Jehovah, Andriamanitry ny Hebreo: Alefaso ny oloko hanompo Ahy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka lavenona tamin’ny lafaoro lehibe izy roa lahy ka nitsangana teo anatrehan’i Farao; dia natopin’i Mosesy niakatra nanandrify ny lanitra izany, ka dia tonga vay nipoipoitra tamin’ny olona sy tamin’ny biby fiompy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny ombiasy tsy nahajanona teo anatrehan’i Mosesy noho ny vay; fa ny vay dia nahazo ny ombiasy mbamin’ny Egyptiana rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa Jehovah dia nanamafy ny fon’i Farao, ka tsy nihaino azy mirahalahy izy, dia araka izay efa nolazain’ Jehovah tamin’i Mosesy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Fahafito: ny havandra.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY hoy Jehovah tamin’i Mosesy: Mifohaza maraina koa hianao dia mitsangàna eo anatrehan’i Farao, ka lazao aminy hoe: Izao no lazain’i Jehovah, Andriamanitry ny Hebreo: Alefaso ny oloko hanompo Ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny izao dia halefako ny areti-mandringana rehetra avy atỳ amiko hamely ny fonao sy ny mpanomponao ary ny vahoakanao, mba hahafantaranao fa tsy misy tahaka Ahy amin’ny tany rehetra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny, raha izay Aho no naninjitra ny tànako hamely anao sy ny vahoakanao amin’ny areti-mandringana, dia efa fongotra tamin’ny tany hianao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa izao indrindra no nampaharetako anao, dia ny hampahita anao ny heriko mba hambara any amin’ny tany rehetra ny anarako. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola mirehareha amin’ny oloko ihany va hianao ka tsy handefa azy? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, rahampitso toy izao dia hampilatsaka havandra be dia be Aho, izay tsy mbola nisy toy izany teto Egypta hatramin’ny andro nisiany mponina ka mandraka ankehitriny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ankehitriny, maniraha mba hanangona faingana ny bibinao sy izay rehetra anananao any an-tsaha; fa ny olona rehetra sy ny biby fiompy izay ho hita any an-tsaha ka tsy ho enti-mody dia hilatsahan’ny havandra ka ho faty avokoa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mandà ka tsy mandefa azy hianao, fa mbola mihazona azy ihany, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay natahotra ny tenin’i Jehovah teo amin’ny mpanompon’i Farao dia nampody ny mpanompony sy ny bibiny ho any an-trano; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa izay tsy nandatsaka am-po ny tenin’i Jehovah kosa dia namela ny mpanompony sy ny bibiny tany an-tsaha ihany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Ahinjiro manandrify ny lanitra ny tànanao, dia hisy havandra hilatsaka amin’ny tany Egypta rehetra, dia amin’ny olona sy amin’ny biby fiompy ary amin’ny anana rehetra any an-tsaha eran’ny tany Egypta.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nahinjitr’i Mosesy manandrify ny lanitra ny tehiny; ary Jehovah nanisy kotrokorana sy havandra, ary nisy afo nifanaretsadretsaka teny ambonin’ny tany; ary Jehovah nandatsaka havandra tamin’ny tany Egypta. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisy havandra sy afo nifandrambondrambona tanelanelan’ny havandra; dia mafy indrindra izany, ka tsy mbola nisy toy izany tany amin’ny tany Egypta rehetra hatrizay naha-firenena azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny havandra namely izay rehetra tany an-tsaha, na olona na biby fiompy, eran’ny tany Egypta rehetra; ny anana rehetra tany an-tsaha dia nasian’ny havandra koa, ary ny hazo rehetra tany an-tsaha notapatapahiny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tao amin’ny tany Gosena izay nitoeran’ny Zanak’Isiraely ihany no tsy mba nisy havandra.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka Farao nampaka an’i Mosesy sy Arona ka nanao taminy hoe: Efa nanota aho tamin’izao, ka Jehovah no marina, fa izaho sy ny vahoakako no meloka. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mangataha amin’i Jehovah, fa aoka izay ny kotrokorana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: feon’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ' sy ny havandra, dia halefako tsy hitoetra eto intsony hianareo.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy taminy: Raha vao mivoaka amin’ny tanàna aho, dia hamelatra ny tànako amin’i Jehovah; koa dia hitsahatra ny kotrokorana, ary ny havandra dia tsy hisy intsony, mba hahafantaranao fa an’i Jehovah ny tany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia, indro, ny tànan’i Jehovah ho amin’ny bibinao izay any an-tsaha, dia amin’ny soavaly sy amin’ny boriky sy amin’ny rameva sy amin’ny omby ary amin’ny ondry aman-osy, ka hisy areti-mandringana mafy indrindra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa fantatro fa hianao sy ny mpanomponao dia tsy mbola hatahotra an’i Jehovah Andriamanitra ihany.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa naripaka ny rongony sy ny vary hordea; fa efa niteraka ny vary hordea, ary efa namony ny rongony. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny vary tritika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: varimbazaha.
      marker-yv: yv-n
    - type: text
      text: ' sy ny ampemby'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: spelta.
      marker-yv: yv-n
    - type: text
      text: ' no tsy mba naripaka, satria mbola fohy ireny.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mosesy niala teo amin’i Farao ka nankeo ivelan’ny tanàna, dia namelatra ny tànany tamin’i Jehovah, ka dia nitsahatra ny kotrokorana sy ny havandra, ary tsy nisy ranonorana nilatsaka tamin’ny tany intsony. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hitan’i Farao fa nitsahatra ny ranonorana sy ny havandra ary ny kotrokorana, dia mbola nanota ihany indray izy; ary samy nanamafy ny fony izy sy ny mpanompony. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nihamafy ny fon’i Farao ka tsy mba nandefa ny Zanak’Isiraely izy, araka izay efa nampilazain’i Jehovahan’i Mosesy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah dia hanavaka ny bibin’ny Isiraely amin’ny bibin’ny Egyptiana, ka tsy hisy maty izay rehetra an’ny Zanak’Isiraely na dia iray aza. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanendry fotoan’andro Jehovah ka nanao hoe: Rahampitso no hanaovan’i Jehovah izany zavatra izany eto amin’ny tany.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony ampitso dia nataon’i Jehovah izany zavatra izany; ka maty avokoa ny bibin’ny Egyptiana rehetra; fa ny bibin’ny Zanak’Isiraely kosa tsy mba nisy maty na dia iray akory aza. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia naniraka Farao, ka, indro, tsy mba nisy maty ny bibin’ny Zanak’Isiraely na dia iray akory aza. Nefa nihamafy ny fon’i Farao, ka tsy nandefa ny olona izy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Fahenina: ny vay.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY hoy Jehovah tamin’i Mosesy sy Arona: Mangalà lavenona amin’ny tànanao ao amin’ny lafaoro lehibe, ary aoka hatopin’i Mosesy miakatra manandrify ny lanitra eo imason’i Farao izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hitora-jofo eran’ny tany Egypta rehetra izany ka ho tonga vay mipoipoitra amin’ny olona sy amin’ny biby fiompy eran’ny tany Egypta rehetra.
