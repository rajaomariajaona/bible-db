document_id: ISA.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny haneken’ny Etiopiana an’i Jehovah noho ny handrenesany ny nandringanana ny Asiriana.
  - type: text
    content: INDRISY ny tany be fibiziziokan’elatra!
  - type: text
    content: Izay any an-dafin’ny onin’i Etiopia,
  '2':
  - type: text
    content: Izay mampandeha iraka eny ambonin’ny ranomasina,
  - type: text
    content: 'Ao anaty lakan-jozoro ambonin’ny rano, ka manafatra azy hoe:'
  - type: text
    content: Mandehana, ry iraka faingam-pandeha, ho any amin’ny firenena lava tsanganana
  - type: note
    content: 'Na: ela fiainana.'
  - type: text
    content: ' sady mandimandina,'
  - type: text
    content: Any amin’ny olona mahatahotra hatreto ka hatrany hatrany,
  - type: note
    content: 'Na: hatramin’ny niandohany ka mandraka ankehitriny.'
  - type: text
    content: Dia firenena mpanao teny tsy valiana
  - type: note
    content: 'Na: matanjaka indrindra; na: mahery mamaritra tany ho azy.'
  - type: text
    content: ' sady maherisetra,'
  - type: note
    content: Heb. manitsakitsaka.
  - type: text
    content: Izay vakin’ny ony maro ny taniny.
  '3':
  - type: text
    content: Ry mponina rehetra amin’izao tontolo izao
  - type: text
    content: Sy mpitoetra etỳ ambonin’ny tany!
  - type: text
    content: Raha misy faneva atsangana eo an-tampon-tendrombohitra, dia mijere hianareo,–
  - type: text
    content: Ary raha misy anjomara tsofina, dia mihainoa.
  '4':
  - type: text
    content: 'Fa izao no nolazain’i Jehovah tamiko:'
  - type: text
    content: Hangina Aho aloha ka hijery eto amin’ny fitoerako,
  - type: text
    content: Raha mbola mipoaka tsara ny hainandro,
  - type: text
    content: Ary misy
  - type: note
    content: 'Na: Toy ny hainandro mipoaka tsara sy ny.'
  - type: text
    content: ' zavona'
  - type: note
    content: Heb. rahon’ando.
  - type: text
    content: ' amin’ny hainandro fararano.'
  '5':
  - type: text
    content: Fa raha mbola tsy tonga ny fararano, rehefa tapitra ny fitsimohany,
  - type: text
    content: Ka efa mby am-boany ny voniny,
  - type: text
    content: Dia horantsanany amin’ny fanetezam-boaloboka ny rantsany,
  - type: text
    content: Ary hotapahiny sy hesoriny ny sakeliny.
  '6':
  - type: text
    content: Dia hafoy avokoa izy ho an’ny vorona mpihaza eny an-tendrombohitra
  - type: text
    content: Sy ho an’ny biby eny ambonin’ny tany;
  - type: text
    content: Ary ny vorona mpihaza handany fahavaratra any;
  - type: text
    content: Ary ny biby rehetra ambonin’ny tany handany ririnina any.
  '7':
  - type: text
    content: Amin’izany andro izany dia hisy fanomezana ho entina ho an’i Jehovah, Tompon’ny maro,
  - type: text
    content: Dia firenena lava tsanganana
  - type: note
    content: 'Na: ela fiainana.'
  - type: text
    content: ' sady mandimandina,'
  - type: text
    content: Ary avy amin’ny firenena mahatahotra hatreto ka hatrany hatrany,
  - type: note
    content: 'Na: hatramin’ny niandohany ka mandraka ankehitriny.'
  - type: text
    content: Dia firenena mpanao teny tsy valiana
  - type: note
    content: 'Na: matanjaka indrindra; na: mahery mamaritra tany ho azy.'
  - type: text
    content: ' sady maherisetra,'
  - type: note
    content: Heb. manitsakitsaka.
  - type: text
    content: Izay vakin’ny ony maro ny taniny,
  - type: text
    content: Ho ao amin’ny fitoeran’ny anaran’i Jehovah, Tompon’ny maro, dia ny tendrombohitra Ziona.
