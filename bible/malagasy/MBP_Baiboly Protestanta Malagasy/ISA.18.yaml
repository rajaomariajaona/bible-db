document_id: ISA.18
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny haneken’ny Etiopiana an’i Jehovah noho ny handrenesany ny nandringanana ny Asiriana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: INDRISY ny tany be fibiziziokan’elatra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay any an-dafin’ny onin’i Etiopia,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay mampandeha iraka eny ambonin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ao anaty lakan-jozoro ambonin’ny rano, ka manafatra azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandehana, ry iraka faingam-pandeha, ho any amin’ny firenena lava tsanganana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ela fiainana.
    marker-yv: yv-n
  - type: text
    text: ' sady mandimandina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any amin’ny olona mahatahotra hatreto ka hatrany hatrany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hatramin’ny niandohany ka mandraka ankehitriny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia firenena mpanao teny tsy valiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'matanjaka indrindra; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mahery mamaritra tany ho azy.
    marker-yv: yv-n
  - type: text
    text: ' sady maherisetra,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manitsakitsaka.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay vakin’ny ony maro ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ry mponina rehetra amin’izao tontolo izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mpitoetra etỳ ambonin’ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha misy faneva atsangana eo an-tampon-tendrombohitra, dia mijere hianareo,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha misy anjomara tsofina, dia mihainoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no nolazain’i Jehovah tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hangina Aho aloha ka hijery eto amin’ny fitoerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mbola mipoaka tsara ny hainandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toy ny hainandro mipoaka tsara sy ny.
    marker-yv: yv-n
  - type: text
    text: ' zavona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rahon’ando.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny hainandro fararano.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha mbola tsy tonga ny fararano, rehefa tapitra ny fitsimohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa mby am-boany ny voniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia horantsanany amin’ny fanetezam-boaloboka ny rantsany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hotapahiny sy hesoriny ny sakeliny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hafoy avokoa izy ho an’ny vorona mpihaza eny an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho an’ny biby eny ambonin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vorona mpihaza handany fahavaratra any;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny biby rehetra ambonin’ny tany handany ririnina any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’izany andro izany dia hisy fanomezana ho entina ho an’i Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia firenena lava tsanganana
