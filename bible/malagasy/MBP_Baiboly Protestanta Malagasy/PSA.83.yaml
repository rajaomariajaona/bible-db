document_id: PSA.83,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana noho ny nikambanan’ny firenena maro hamely ny Isiraely.
  - type: text
    content: Tonon-kira. Salamo nataon’i Asafa.
  - type: text
    content: ANDRIAMANITRA ô, aza mangina;
  - type: text
    content: Aza mihombom-bava Hianao, ary aza mamitsaka, Andriamanitra ô.
  '10':
  - type: text
    content: Maty tany En-dora ireo;
  - type: text
    content: Tonga zeziky ny tany izy.
  '11':
  - type: text
    content: Ataovy tahaka an’i Oreba sy Zeba ny mpanapaka azy,
  - type: text
    content: Eny, ny andrianany rehetra dia ataovy tahaka an’i Zebaha sy Zalmona,
  '12':
  - type: text
    content: 'Izay nanao hoe: Aoka halaintsika'
  - type: text
    content: Ho antsika ny fonenan’Andriamanitra.
  '13':
  - type: text
    content: Andriamanitro ô, ataovy tahaka ny tadio ireo,
  - type: text
    content: Dia tahaka ny akofa entin’ny rivotra,
  '14':
  - type: text
    content: Tahaka ny afo mandoro ala
  - type: text
    content: Sy tahaka ny lelafo mampirehitra tendrombohitra;
  '15':
  - type: text
    content: Aoka ho toy izany no anafotofotoanao azy amin’ny tadionao,
  - type: text
    content: Sy ampahatahoranao azy amin’ny tafio-drivotrao.
  '16':
  - type: text
    content: Saròny henatra ny tavany,
  - type: text
    content: Mba hitadiavany ny anaranao, Jehovah ô.
  '17':
  - type: text
    content: Aoka ho menatra sy ho azon-tahotra mandrakizay izy;
  - type: text
    content: Eny, aoka hangaihay sy haringana izy.
  '18':
  - type: text
    content: Ary aoka ho fantany fa Hianao irery ihany, Izay atao hoe Jehovah,
  - type: text
    content: No Ilay Avo Indrindra ambonin’ny tany rehetra.
  '2':
  - type: text
    content: Fa, indro, mitabataba ny fahavalonao;
  - type: text
    content: Ary izay mankahala Anao dia manandratra ny lohany.
  '3':
  - type: text
    content: Ny olonao no iokoany amin’ny hafetsena;
  - type: text
    content: Ary miara-misaina hamely izay voàfinao izy.
  '4':
  - type: text
    content: 'Hoy izy: Avia, ka andeha hofongorantsika tsy ho firenena izy,'
  - type: text
    content: Mba tsy hotsarovana intsony ny anaran’Isiraely.
  '5':
  - type: text
    content: Fa efa niray tetika tokoa ireo
  - type: text
    content: Ka nanao fanekena hanohitra Anao,–
  '6':
  - type: text
    content: Dia ny lain’ny Edomita sy ny Isimaelita,
  - type: text
    content: Ny Moabita sy ny Hagarita,
  '7':
  - type: text
    content: Ny Gebalita sy ny Amonita ary ny Amalekita,
  - type: text
    content: Ny Filistina mbamin’ny mponina any Tyro,
  '8':
  - type: text
    content: Ny Asyriana koa nikambana taminy;
  - type: text
    content: Tonga sandrin’ny taranak’i Lota ireo.
  - type: text
    content: '[Sela.]'
  '9':
  - type: text
    content: Ataovy tahaka ny Midiana izy,
  - type: text
    content: Ary tahaka an’i Sisera sy Jabina teo amin’ny ony Kisona;
