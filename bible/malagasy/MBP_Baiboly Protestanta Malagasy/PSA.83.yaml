document_id: PSA.83
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainana noho ny nikambanan’ny firenena maro hamely ny Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tonon-kira. Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA ô, aza mangina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mihombom-bava Hianao, ary aza mamitsaka, Andriamanitra ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa, indro, mitabataba ny fahavalonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mankahala Anao dia manandratra ny lohany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny olonao no iokoany amin’ny hafetsena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miara-misaina hamely izay voàfinao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy izy: Avia, ka andeha hofongorantsika tsy ho firenena izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy hotsarovana intsony ny anaran’Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa efa niray tetika tokoa ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanao fanekena hanohitra Anao,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia ny lain’ny Edomita sy ny Isimaelita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Moabita sy ny Hagarita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny Gebalita sy ny Amonita ary ny Amalekita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Filistina mbamin’ny mponina any Tyro,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny Asyriana koa nikambana taminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga sandrin’ny taranak’i Lota ireo.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ataovy tahaka ny Midiana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka an’i Sisera sy Jabina teo amin’ny ony Kisona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maty tany En-dora ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga zeziky ny tany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ataovy tahaka an’i Oreba sy Zeba ny mpanapaka azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny andrianany rehetra dia ataovy tahaka an’i Zebaha sy Zalmona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izay nanao hoe: Aoka halaintsika'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho antsika ny fonenan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitro ô, ataovy tahaka ny tadio ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ny akofa entin’ny rivotra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tahaka ny afo mandoro ala
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tahaka ny lelafo mampirehitra tendrombohitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka ho toy izany no anafotofotoanao azy amin’ny tadionao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ampahatahoranao azy amin’ny tafio-drivotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Saròny henatra ny tavany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hitadiavany ny anaranao, Jehovah ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka ho menatra sy ho azon-tahotra mandrakizay izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, aoka hangaihay sy haringana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary aoka ho fantany fa Hianao irery ihany, Izay atao hoe Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No Ilay Avo Indrindra ambonin’ny tany rehetra.
