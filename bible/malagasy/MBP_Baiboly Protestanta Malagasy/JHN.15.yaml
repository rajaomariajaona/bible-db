          text: avy amin’.
      marker-yv: yv-n
    - type: text
      text: ' izao tontolo izao hianareo, dia ho tia ny azy izao tontolo izao; fa satria tsy naman’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avy amin’.
      marker-yv: yv-n
    - type: text
      text: ' izao tontolo izao hianareo, fa Izaho efa nifidy anareo tamin’izao tontolo izao, dia halan’izao tontolo izao hianareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny sampany rehetra eo amiko izay tsy mamoa dia esoriny; fa ny sampany rehetra izay mamoa kosa dia amboariny,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dioviny.
      marker-yv: yv-n
    - type: text
      text: ' mba hamoa bebe kokoa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsarovy ny teny izay nolazaiko taminareo hoe: Ny mpanompo tsy lehibe noho ny tompony. Raha nanenjika Ahy izy, dia hanenjika anareo koa; ary raha nitandrina ny teniko izy, dia hitandrina ny anareo koa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izany rehetra izany no hataony aminareo noho ny anarako, satria tsy mahalala Izay naniraka Ahy izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy tonga Aho ka niteny taminy, dia tsy nanan-keloka izy; fa ankehitriny dia tsy misy fialana azony atao ny amin’ny helony. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mankahala Ahy dia mankahala ny Raiko koa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy nataoko teo aminy izay asa tsy nataon’olona, dia tsy nanan-keloka izy; fa ankehitriny efa hitany sady efa halany Aho sy ny Raiko koa; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tonga izany
    - type: text
      text: ' mba hahatanteraka ny teny izay voasoratra ao amin’ny lalàny hoe: ,,Halany foana Aho’’ (Sal. 69.4; 109.3).'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha tonga ny Mpananatra,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xiv.16.
      marker-yv: yv-n
    - type: text
      text: ' Izay hirahiko ho aminareo avy amin’ny Ray, dia ny Fanahin’ny fahamarinana Izay mivoaka avy amin’ny Ray, dia Izy no ho vavolombelona hanambara Ahy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hianareo koa dia vavolombelona hanambara, satria hianareo efa teto amiko hatramin’ny voalohany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa madio rahateo hianareo noho ny teniko, izay nolazaiko taminareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tomoera amiko ary Izaho aminareo. Tahaka ny sampany tsy mahay mamoa ho azy, raha tsy miray amin’ny voaloboka izy, dia toy izany koa hianareo, raha tsy miray amiko. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no voaloboka, hianareo no sampany. Izay miray amiko, ary Izaho aminy, dia mamoa be izy; fa raha misaraka amiko kosa hianareo, dia tsy mahay manao na inona na inona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy tsy miray amiko, dia ariana eny ivelany tahaka ny sampany izy ka malazo; ary angonina izy ka atsipy ao anaty afo, dia ho may. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha miray amiko hianareo, ka mitoetra ao anatinareo ny teniko, dia angataho izay tianareo na inona na inona, fa ho tonga aminareo izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no ankalazana ny Raiko, mba hamoazanareo be ka ho tonga mpianatro hianareo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny nitiavan’ny Ray Ahy no nitiavako anareo; tomoera amin’ny fitiavako hianareo. '
