document_id: JHN.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fanoharana ny amin’ny voaloboka sy ny sampany, ary ny firaisan’i Jesosy sy ny mpianany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'IZAHO no tena voaloboka, ary ny Raiko no mpamboatra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mitandrina ny didiko hianareo, dia hitoetra amin’ny fitiavako, tahaka ny nitandremako ny didin’ny Raiko sy ny itoerako amin’ny fitiavany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany zavatra izany dia efa nolazaiko taminareo, mba ho ao aminareo ny fifaliako, ka ho tanteraka ny fifalianareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no didiko, dia ny mba hifankatiavanareo tahaka ny nitiavako anareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy misy manana fitiavana lehibe noho izao, dia ny manolotra ny ainy hamonjy ny sakaizany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianareo no sakaizako, raha manao araka izay andidiako anareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hataoko hoe mpanompo intsony hianareo, fa ny mpanompo tsy mahalala izay ataon’ny tompony; fa efa nataoko hoe sakaiza hianareo, satria izay rehetra reko tamin’ny Raiko no nambarako taminareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hianareo no nifidy Ahy, fa Izaho no nifidy anareo ka nanendry anareo mba handeha sy hamoa, ary mba haharetan’ny vokatrareo, mba homen’ny Ray anareo izay rehetra hangatahinareo amin’ny anarako na inona na inona.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany zavatra izany no andidiako anareo, mba hifankatiavanareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha halan’izao tontolo izao hianareo, dia aoka ho fantatrareo fa Izaho efa halany talohanareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha naman’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
