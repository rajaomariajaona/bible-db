document_id: JHN.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanoharana ny amin’ny voaloboka sy ny sampany, ary ny firaisan’i Jesosy sy ny mpianany.
  - type: text
    content: 'IZAHO no tena voaloboka, ary ny Raiko no mpamboatra. '
  '10':
  - type: text
    content: Raha mitandrina ny didiko hianareo, dia hitoetra amin’ny fitiavako, tahaka ny nitandremako ny didin’ny Raiko sy ny itoerako amin’ny fitiavany.
  '11':
  - type: text
    content: 'Izany zavatra izany dia efa nolazaiko taminareo, mba ho ao aminareo ny fifaliako, ka ho tanteraka ny fifalianareo. '
  '12':
  - type: text
    content: 'Izao no didiko, dia ny mba hifankatiavanareo tahaka ny nitiavako anareo. '
  '13':
  - type: text
    content: 'Tsy misy manana fitiavana lehibe noho izao, dia ny manolotra ny ainy hamonjy ny sakaizany. '
  '14':
  - type: text
    content: 'Hianareo no sakaizako, raha manao araka izay andidiako anareo. '
  '15':
  - type: text
    content: 'Tsy hataoko hoe mpanompo intsony hianareo, fa ny mpanompo tsy mahalala izay ataon’ny tompony; fa efa nataoko hoe sakaiza hianareo, satria izay rehetra reko tamin’ny Raiko no nambarako taminareo. '
  '16':
  - type: text
    content: Tsy hianareo no nifidy Ahy, fa Izaho no nifidy anareo ka nanendry anareo mba handeha sy hamoa, ary mba haharetan’ny vokatrareo, mba homen’ny Ray anareo izay rehetra hangatahinareo amin’ny anarako na inona na inona.
  '17':
  - type: text
    content: 'Izany zavatra izany no andidiako anareo, mba hifankatiavanareo. '
  '18':
  - type: text
    content: 'Raha halan’izao tontolo izao hianareo, dia aoka ho fantatrareo fa Izaho efa halany talohanareo. '
  '19':
  - type: text
    content: Raha naman’
  - type: note
    content: Gr. avy amin’.
  - type: text
    content: ' izao tontolo izao hianareo, dia ho tia ny azy izao tontolo izao; fa satria tsy naman’'
  - type: note
    content: Gr. avy amin’.
  - type: text
    content: ' izao tontolo izao hianareo, fa Izaho efa nifidy anareo tamin’izao tontolo izao, dia halan’izao tontolo izao hianareo. '
  '2':
  - type: text
    content: Ny sampany rehetra eo amiko izay tsy mamoa dia esoriny; fa ny sampany rehetra izay mamoa kosa dia amboariny,
  - type: note
    content: Gr. dioviny.
  - type: text
    content: ' mba hamoa bebe kokoa. '
  '20':
  - type: text
    content: 'Tsarovy ny teny izay nolazaiko taminareo hoe: Ny mpanompo tsy lehibe noho ny tompony. Raha nanenjika Ahy izy, dia hanenjika anareo koa; ary raha nitandrina ny teniko izy, dia hitandrina ny anareo koa. '
  '21':
  - type: text
    content: 'Fa izany rehetra izany no hataony aminareo noho ny anarako, satria tsy mahalala Izay naniraka Ahy izy. '
  '22':
  - type: text
    content: 'Raha tsy tonga Aho ka niteny taminy, dia tsy nanan-keloka izy; fa ankehitriny dia tsy misy fialana azony atao ny amin’ny helony. '
  '23':
  - type: text
    content: 'Izay mankahala Ahy dia mankahala ny Raiko koa. '
  '24':
  - type: text
    content: 'Raha tsy nataoko teo aminy izay asa tsy nataon’olona, dia tsy nanan-keloka izy; fa ankehitriny efa hitany sady efa halany Aho sy ny Raiko koa; '
  '25':
  - type: text
    content: 'fa '
  - type: text
    content: tonga izany
  - type: text
    content: ' mba hahatanteraka ny teny izay voasoratra ao amin’ny lalàny hoe: ,,Halany foana Aho’’ (Sal. 69.4; 109.3).'
  '26':
  - type: text
    content: Fa raha tonga ny Mpananatra,
  - type: note
    content: Izahao xiv.16.
  - type: text
    content: ' Izay hirahiko ho aminareo avy amin’ny Ray, dia ny Fanahin’ny fahamarinana Izay mivoaka avy amin’ny Ray, dia Izy no ho vavolombelona hanambara Ahy. '
  '27':
  - type: text
    content: Ary hianareo koa dia vavolombelona hanambara, satria hianareo efa teto amiko hatramin’ny voalohany.
  '3':
  - type: text
    content: 'Efa madio rahateo hianareo noho ny teniko, izay nolazaiko taminareo. '
  '4':
  - type: text
    content: 'Tomoera amiko ary Izaho aminareo. Tahaka ny sampany tsy mahay mamoa ho azy, raha tsy miray amin’ny voaloboka izy, dia toy izany koa hianareo, raha tsy miray amiko. '
  '5':
  - type: text
    content: 'Izaho no voaloboka, hianareo no sampany. Izay miray amiko, ary Izaho aminy, dia mamoa be izy; fa raha misaraka amiko kosa hianareo, dia tsy mahay manao na inona na inona. '
  '6':
  - type: text
    content: 'Raha misy tsy miray amiko, dia ariana eny ivelany tahaka ny sampany izy ka malazo; ary angonina izy ka atsipy ao anaty afo, dia ho may. '
  '7':
  - type: text
    content: 'Raha miray amiko hianareo, ka mitoetra ao anatinareo ny teniko, dia angataho izay tianareo na inona na inona, fa ho tonga aminareo izany. '
  '8':
  - type: text
    content: Izany no ankalazana ny Raiko, mba hamoazanareo be ka ho tonga mpianatro hianareo.
  '9':
  - type: text
    content: 'Tahaka ny nitiavan’ny Ray Ahy no nitiavako anareo; tomoera amin’ny fitiavako hianareo. '
