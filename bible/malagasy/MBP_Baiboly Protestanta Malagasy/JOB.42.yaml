document_id: JOB.42,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny farany nataon’i Joba, sy ny nanomezan’Andriamanitra azy fiadanana indray
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Joba dia namaly an’i Jehovah ka nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary Jehovah nampody ny fiadanan’i Joba, raha nivavaka ho an’ny sakaizany izy, ka dia nanome azy indroa toraka izay nananany fahiny Izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia avy ny rahalahiny rehetra sy ny anabaviny rehetra ary ny olona rehetra izay fantany fahiny ka nankao aminy ary niara-nihinana taminy tao an-tranony ary nitsapa alahelo sady nampionona azy noho ny fahoriana rehetra izay efa nahatran’i Jehovah taminy; ary samy nanome azy vakim-bola
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'kesita; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Gen. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxxiii. 19.
      marker-yv: yv-n
    - type: text
      text: ' iray avy sy kavim-bolamena iray avy izy rehetra.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Jehovah nitahy ny niafaran’i Joba mihoatra noho ny voalohany, ka nanana ondry aman-osy efatra arivo amby iray alina sy rameva enina arivo sy omby roa arivo ary borikivavy arivo izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nanan-janaka fito lahy sy vavy telo koa izy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ka ny anaran’ny zokiny nataony hoe Jemima, ary ny anaran’ny manarakaraka Kezia, ary ny anaran’ny faravavy Kerena-hapoka. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary tsy nisy vehivavy tsara tarehy tahaka ny zanakavavin’i Joba hita tany amin’ny tany rehetra; ary niara-nomen-drainy lova tamin’ny anadahiny izy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary mbola velona efa-polo amby zato taona Joba taorian’izany ka nahita ny zanani-lahy sy ny zafiny ka hatramin’ny zafin-dohaliny aza. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia maty Joba, rehefa tratrantitra ka ela niainana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voky andro; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Gen. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxv. 8.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fantatro fa hainao avokoa ny zavatra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy azo ferana ny fisainanao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Iza no mahatakona ny fisainanao amin’ny tsi-fahalalana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa dia nilaza izay tsy fantatro aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia zava-mahagaga loatra amiko, izay tsy takatry ny saiko.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mifona aminao aho, mihainoa, fa hiteny aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanontany Anao aho, ka ampahafantaro.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fandrenesan’ny sofina ihany no nandrenesako Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ankehitriny izao kosa dia ny masoko no mahita Anao;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Koa dia miaiky sy mibebaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eto amin’ny vovoka sy ny lavenona aho.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary rehefa voalazan’i Jehovah tamin’i Joba izany teny izany, dia hoy koa Izy tamin’i Elifaza Temanita: Mirehitra aminao sy ny sakaizanao roa lahy ny fahatezerako, satria tsy mba marina tahaka ny filàzan’i Joba mpanompoko ny filàzanareo Ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa ankehitriny makà vantotr’ombilahy fito sy ondrilahy fito ho anareo, ary mankanesa ao amin’i Joba mpanompoko, ka manatera fanatitra dorana ho anareo; ary Joba mpanompoko no hifona ho anareo, fa izy no hankasitrahako, fandrao hamaly anareo araka ny fahadalanareo Aho, satria tsy marina tahaka ny filàzan’i Joba mpanompoko ny filàzanareo Ahy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia nandeha Elifaza Temanita sy Bildada Sohita ary Zofara Namatita ka nanao araka izay nandidian’i Jehovah azy; ary Jehovah dia nankasitraka an’i Joba.
