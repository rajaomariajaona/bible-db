document_id: ACT.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahatongavan’i Paoly tao Korinto, sy ny nampianarany tao herintoana sy enim-bolana.
  - type: text
    content: 'ARY rehefa afaka izany, dia niala tany Atena Paoly ka nankany Korinto. '
  '10':
  - type: text
    content: 'fa Izaho momba anao, ary tsy hisy olona hihazona anao hanisy ratsy anao; fa manana olona maro amin’ity tanàna ity Aho. '
  '11':
  - type: text
    content: Ary izy nitoetra teo herintaona sy enim-bolana ka nampianatra ny tenin’Andriamanitra teo aminy.
  '12':
  - type: text
    content: 'Fa raha Galio no governora tany Akaia dia niray tetika hisambotra an’i Paoly ny Jiosy, ary nitondra azy nankeo amin’ny fitsarana, '
  '13':
  - type: text
    content: 'ka dia nanao hoe: Ilehio mampanaiky ny olona hivavaka amin’Andriamanitra, nefa tsy araka ny lalàna. '
  '14':
  - type: text
    content: 'Ary raha hiloa-bava Paoly, dia hoy Galio tamin’ny Jiosy: Ry Jiosy, raha misy heloka, na zavatra ratsy natao, dia mety raha mandefitra aminareo aho; '
  '15':
  - type: text
    content: 'fa raha ady hevitra sy anarana ary ny lalànareo kosa, dia ataovinareo ihany; fa izaho tsy te-hitsara izany raharaha izany. '
  '16':
  - type: text
    content: 'Ary nandroaka azy hiala teo anoloan’ny fitsarana izy. '
  '17':
  - type: text
    content: Ary izy rehetra nisambotra an’i Sostena, mpanapaka ny synagoga, dia nikapoka azy teo anoloan’ny fitsarana. Nefa tsy nahoan’i Galio izany zavatra izany.
  - type: heading
    content: Ny niverenan’i Paoly nankany Antiokia, sy ny nandehanany indray namaky an’i Galatia sy Frygia, ary ny nahatongavany tao Efesosy sy ny nampianarany tao.
  '18':
  - type: text
    content: 'ARY Paoly mbola nitoetra teo andro maromaro ihany, ary rehefa nanao veloma ny rahalahy izy, dia niondrana an-tsambo nankany Syria, ary Prisila sy Akoila niaraka taminy koa; ny volon-dohany nohetezany tany Kenkrea, satria efa nivoady izy. '
  '19':
  - type: text
    content: 'Ary tonga tany Efesosy izy, dia nandao azy mivady teo Paoly ka lasa niditra tao amin’ny synagoga ka niady hevitra tamin’ny Jiosy. '
  '2':
  - type: text
    content: 'Ary izy nahita Jiosy anankiray atao hoe Akoila, izay teraka tany Ponto, vao avy tany Italia, ary Prisila vadiny (fa Klaodio efa nandidy ny Jiosy rehetra hiala tany Roma), dia nankeo amin’izy mivady Paoly. '
  '20':
  - type: text
    content: 'Ary nangataka azy hitoetra elaela kokoa ny olona, fa tsy nety izy, '
  '21':
  - type: text
    content: 'fa nanao veloma azy ka nanao hoe: Mbola hiverina hankatỳ aminareo indray aho, raha sitrapon’Andriamanitra. Dia niondrana an-tsambo niala tany Efesosy izy.'
  '22':
  - type: text
    content: Ary rehefa tafatody tany Kaisaria izy, dia niakatra ka niarahaba ny fiangonana vao nidina nankany Antiokia.
  '23':
  - type: text
    content: Ary rehefa nitoetra tao elaela ihany izy, dia lasa nandeha nitety ny tany Galatia sy Frygia ka nampahery ny mpianatra rehetra.
  '24':
  - type: text
    content: 'Ary tonga tany Efesosy ny Jiosy anankiray atao hoe Apolosy, izay teraka tany Aleksandria, lehilahy nahay nandaha-teny sady nahery tamin’ny Soratra '
  - type: text
    content: Masina.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Izany lehilahy izany efa nampianarina ny làlan’ny Tompo; ary nafana fo izy, dia niteny sy nampianatra marimarina ny amin’i Jesosy, kanefa ny batisan’i Jaona ihany no fantany. '
  '26':
  - type: text
    content: 'Ary izy niteny tamin’ny fahasahiana teo amin’ny synagoga; ary rehefa nandre azy Prisila sy Akoila, dia nandray azy hankao aminy ka nampianatra azy marimarina kokoa ny amin’ny làlan’Andriamanitra. '
  '27':
  - type: text
    content: 'Ary rehefa ta-handroso hankany Akaia izy, dia namporisika azy ny rahalahy sady nanoratra taratasy ho any amin’ny mpianatra mba handray azy tsara; ary rehefa tonga izy, dia nampahatanjaka tsara izay efa nino noho ny fahasoavana; '
  '28':
  - type: text
    content: 'fa izy nahery nandresy lahatra ny Jiosy teo imason’ny olona ka naneho marimarina tamin’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' fa Jesosy no Kristy.'
  '3':
  - type: text
    content: 'Ary satria niray raharaha taminy izy, dia nitoetra tao aminy ka niasa; fa ny manao lay no raharahany. '
  '4':
  - type: text
    content: Ary niady hevitra isan-tSabata tao amin’ny synagoga izy ka nampanaiky ny Jiosy sy ny jentilisa.
  '5':
  - type: text
    content: 'Ary rehefa tafidina avy tany Makedonia Silasy sy Timoty, dia voaterin’ny teny Paoly ka nanambara tamin’ny Jiosy fa Jesosy no Kristy. '
  '6':
  - type: text
    content: 'Ary nony nanohitra sy niteny ratsy ireo, dia nanopakopa-damba izy ka nanao taminy hoe: Aoka ho eo an-dohanareo ny ranareo; afaka aho; ary amin’izao sisa izao dia hankany amin’ny jentilisa aho. '
  '7':
  - type: text
    content: 'Ary raha niala teo izy, dia niditra tao an-tranon’ny lehilahy atao hoe Titosy Josto, izay nivavaka tamin’Andriamanitra; ary ny tranony nifanolotra tamin’ny synagoga. '
  '8':
  - type: text
    content: Ary Krispo, mpanapaka ny synagoga, mbamin’ny ankohonany rehetra dia nino ny Tompo; ary maro koa ny Korintiana, raha nandre, dia nino ka natao batisa.
  '9':
  - type: text
    content: 'Ary ny Tompo niteny tamin’i Paoly tamin’ny fahitana nony alina ka nanao hoe: Aza matahotra, fa mitenena ihany, ka aza mangina; '
