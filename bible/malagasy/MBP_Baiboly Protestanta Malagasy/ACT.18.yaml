document_id: ACT.18,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahatongavan’i Paoly tao Korinto, sy ny nampianarany tao herintoana sy enim-bolana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa afaka izany, dia niala tany Atena Paoly ka nankany Korinto. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa Izaho momba anao, ary tsy hisy olona hihazona anao hanisy ratsy anao; fa manana olona maro amin’ity tanàna ity Aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izy nitoetra teo herintaona sy enim-bolana ka nampianatra ny tenin’Andriamanitra teo aminy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha Galio no governora tany Akaia dia niray tetika hisambotra an’i Paoly ny Jiosy, ary nitondra azy nankeo amin’ny fitsarana, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka dia nanao hoe: Ilehio mampanaiky ny olona hivavaka amin’Andriamanitra, nefa tsy araka ny lalàna. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha hiloa-bava Paoly, dia hoy Galio tamin’ny Jiosy: Ry Jiosy, raha misy heloka, na zavatra ratsy natao, dia mety raha mandefitra aminareo aho; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa raha ady hevitra sy anarana ary ny lalànareo kosa, dia ataovinareo ihany; fa izaho tsy te-hitsara izany raharaha izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandroaka azy hiala teo anoloan’ny fitsarana izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izy rehetra nisambotra an’i Sostena, mpanapaka ny synagoga, dia nikapoka azy teo anoloan’ny fitsarana. Nefa tsy nahoan’i Galio izany zavatra izany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niverenan’i Paoly nankany Antiokia, sy ny nandehanany indray namaky an’i Galatia sy Frygia, ary ny nahatongavany tao Efesosy sy ny nampianarany tao.
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Paoly mbola nitoetra teo andro maromaro ihany, ary rehefa nanao veloma ny rahalahy izy, dia niondrana an-tsambo nankany Syria, ary Prisila sy Akoila niaraka taminy koa; ny volon-dohany nohetezany tany Kenkrea, satria efa nivoady izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tany Efesosy izy, dia nandao azy mivady teo Paoly ka lasa niditra tao amin’ny synagoga ka niady hevitra tamin’ny Jiosy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy nahita Jiosy anankiray atao hoe Akoila, izay teraka tany Ponto, vao avy tany Italia, ary Prisila vadiny (fa Klaodio efa nandidy ny Jiosy rehetra hiala tany Roma), dia nankeo amin’izy mivady Paoly. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nangataka azy hitoetra elaela kokoa ny olona, fa tsy nety izy, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nanao veloma azy ka nanao hoe: Mbola hiverina hankatỳ aminareo indray aho, raha sitrapon’Andriamanitra. Dia niondrana an-tsambo niala tany Efesosy izy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa tafatody tany Kaisaria izy, dia niakatra ka niarahaba ny fiangonana vao nidina nankany Antiokia.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nitoetra tao elaela ihany izy, dia lasa nandeha nitety ny tany Galatia sy Frygia ka nampahery ny mpianatra rehetra.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tany Efesosy ny Jiosy anankiray atao hoe Apolosy, izay teraka tany Aleksandria, lehilahy nahay nandaha-teny sady nahery tamin’ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany lehilahy izany efa nampianarina ny làlan’ny Tompo; ary nafana fo izy, dia niteny sy nampianatra marimarina ny amin’i Jesosy, kanefa ny batisan’i Jaona ihany no fantany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy niteny tamin’ny fahasahiana teo amin’ny synagoga; ary rehefa nandre azy Prisila sy Akoila, dia nandray azy hankao aminy ka nampianatra azy marimarina kokoa ny amin’ny làlan’Andriamanitra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa ta-handroso hankany Akaia izy, dia namporisika azy ny rahalahy sady nanoratra taratasy ho any amin’ny mpianatra mba handray azy tsara; ary rehefa tonga izy, dia nampahatanjaka tsara izay efa nino noho ny fahasoavana; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izy nahery nandresy lahatra ny Jiosy teo imason’ny olona ka naneho marimarina tamin’ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' fa Jesosy no Kristy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary satria niray raharaha taminy izy, dia nitoetra tao aminy ka niasa; fa ny manao lay no raharahany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niady hevitra isan-tSabata tao amin’ny synagoga izy ka nampanaiky ny Jiosy sy ny jentilisa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tafidina avy tany Makedonia Silasy sy Timoty, dia voaterin’ny teny Paoly ka nanambara tamin’ny Jiosy fa Jesosy no Kristy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nanohitra sy niteny ratsy ireo, dia nanopakopa-damba izy ka nanao taminy hoe: Aoka ho eo an-dohanareo ny ranareo; afaka aho; ary amin’izao sisa izao dia hankany amin’ny jentilisa aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha niala teo izy, dia niditra tao an-tranon’ny lehilahy atao hoe Titosy Josto, izay nivavaka tamin’Andriamanitra; ary ny tranony nifanolotra tamin’ny synagoga. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Krispo, mpanapaka ny synagoga, mbamin’ny ankohonany rehetra dia nino ny Tompo; ary maro koa ny Korintiana, raha nandre, dia nino ka natao batisa.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Tompo niteny tamin’i Paoly tamin’ny fahitana nony alina ka nanao hoe: Aza matahotra, fa mitenena ihany, ka aza mangina; '
