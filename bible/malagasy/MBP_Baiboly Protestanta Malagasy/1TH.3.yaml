document_id: 1TH.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary amin’izany, raha tsy naharitra intsony izahay, dia nataonay fa mety ny hilaozana hitoetra irery tany Atena, '
  '10':
  - type: text
    content: amin’ny fangatahanay fatratra andro aman-alina hahita ny tavanareo sy hahatanteraka ny tsy ampy amin’ny finoanareo?
  '11':
  - type: text
    content: 'Ary Andriamanitra Raintsika anie sy Jesosy Tompontsika hanitsy ny làlanay ho atỳ aminareo. '
  '12':
  - type: text
    content: 'Ary ny Tompo anie hampitombo sy hampandroso anareo amin’ny fifankatiavana sy ny fitiavana ny olona rehetra, dia tahaka anay aminareo koa, '
  '13':
  - type: text
    content: mba hampiorina ny fonareo tsy hanan-tsiny amin’ny fahamasinana eo anatrehan’Andriamanitra Raintsika amin’ny fihavian’i Jesosy Tompontsika mbamin’ny masiny rehetra.
  '2':
  - type: text
    content: 'ka dia nirahinay Timoty, rahalahinay sady mpanompon’Andriamanitra amin’ny filazantsaran’i Kristy, mba hampahery sy hamporisika anareo amin’ny finoanareo, '
  '3':
  - type: text
    content: 'mba tsy hisy ho taitra amin’izao fahoriana izao; fa ny tenanareo mahalala fa ho amin’izao no nanendrena antsika. '
  '4':
  - type: text
    content: 'Fa fony teo aminareo aza izahay, dia nilaza taminareo rahateo fa tsy maintsy hampahorina isika, dia toy ny efa nanjo ihany ka fantatrareo. '
  '5':
  - type: text
    content: Ary noho izany izaho koa, raha tsy naharitra intsony, dia naniraka hahafantatra ny finoanareo, fandrao sendra naka fanahy anareo ny mpaka-fanahy, ka ho foana ny nikelezanay aina.
  '6':
  - type: text
    content: 'Fa raha vao tonga atỳ aminay ankehitriny Timoty avy tatỳ aminareo ka nilaza teny soa taminay ny amin’ny finoanareo sy ny fitiavanareo ary ny fahatsiarovanareo tsara anay mandrakariva, ka maniry hahita anay indrindra hianareo, tahaka anay aminareo koa,– '
  '7':
  - type: text
    content: 'noho izany, ry rahalahy, dia nampionona anay teo amin’ny fahaterenay sy ny fahorianay rehetra ny finoanareo; '
  '8':
  - type: text
    content: 'fa ankehitriny velona izahay, raha tomoetra tsara ao amin’ny Tompo hianareo. '
  '9':
  - type: text
    content: 'Fa manao ahoana no saotra azonay havaly an’Andriamanitra ny aminareo noho ny fifaliana rehetra izay ifalianay noho ny aminareo eo anatrehan’Andriamanitray, '
