document_id: 1TH.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary amin’izany, raha tsy naharitra intsony izahay, dia nataonay fa mety ny hilaozana hitoetra irery tany Atena, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka dia nirahinay Timoty, rahalahinay sady mpanompon’Andriamanitra amin’ny filazantsaran’i Kristy, mba hampahery sy hamporisika anareo amin’ny finoanareo, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mba tsy hisy ho taitra amin’izao fahoriana izao; fa ny tenanareo mahalala fa ho amin’izao no nanendrena antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa fony teo aminareo aza izahay, dia nilaza taminareo rahateo fa tsy maintsy hampahorina isika, dia toy ny efa nanjo ihany ka fantatrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary noho izany izaho koa, raha tsy naharitra intsony, dia naniraka hahafantatra ny finoanareo, fandrao sendra naka fanahy anareo ny mpaka-fanahy, ka ho foana ny nikelezanay aina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa raha vao tonga atỳ aminay ankehitriny Timoty avy tatỳ aminareo ka nilaza teny soa taminay ny amin’ny finoanareo sy ny fitiavanareo ary ny fahatsiarovanareo tsara anay mandrakariva, ka maniry hahita anay indrindra hianareo, tahaka anay aminareo koa,– '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'noho izany, ry rahalahy, dia nampionona anay teo amin’ny fahaterenay sy ny fahorianay rehetra ny finoanareo; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa ankehitriny velona izahay, raha tomoetra tsara ao amin’ny Tompo hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa manao ahoana no saotra azonay havaly an’Andriamanitra ny aminareo noho ny fifaliana rehetra izay ifalianay noho ny aminareo eo anatrehan’Andriamanitray, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: amin’ny fangatahanay fatratra andro aman-alina hahita ny tavanareo sy hahatanteraka ny tsy ampy amin’ny finoanareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Andriamanitra Raintsika anie sy Jesosy Tompontsika hanitsy ny làlanay ho atỳ aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny Tompo anie hampitombo sy hampandroso anareo amin’ny fifankatiavana sy ny fitiavana ny olona rehetra, dia tahaka anay aminareo koa, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mba hampiorina ny fonareo tsy hanan-tsiny amin’ny fahamasinana eo anatrehan’Andriamanitra Raintsika amin’ny fihavian’i Jesosy Tompontsika mbamin’ny masiny rehetra.
