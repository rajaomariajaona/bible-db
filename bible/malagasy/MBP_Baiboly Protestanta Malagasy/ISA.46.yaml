document_id: ISA.46,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatsinontsinon’ny sampin’i Babylona, sy fanomezan-toky ny Isiraely hifikitra amin’i Jehovah, ary ny hery sy ny fahalalan’i Jehovah.
  - type: text
    content: MANGOZOHOZO Bela, efa miraika Nebo,
  - type: text
    content: Ny sampiny dia nampitondraina ny biby folahina sy ny biby fiompy;
  - type: text
    content: Ny zavatra fitòndranareo dia asampy
  - type: text
    content: 'Ka tonga enta-mavesatra entin’ireo '
  - type: text
    content: biby
  - type: text
    content: ' reraka.'
  '10':
  - type: text
    content: Izay manambara ny farany hatramin’ny voalohany,
  - type: text
    content: Ary nanambara hatramin’ny ela izay tsy mbola natao akory,–
  - type: text
    content: 'Dia Ilay manao hoe: Ho to ny fikasako,'
  - type: text
    content: Ary hefaiko ny sitrapoko rehetra,
  '11':
  - type: text
    content: Izay miantso vorona mpihaza avy any atsinanana,
  - type: text
    content: Dia lehilahy avy any an-tany lavitra hahefa ny fikasako;
  - type: text
    content: Sady efa niteny izany Aho no hahatanteraka azy koa,
  - type: text
    content: Sady nikasa Aho no hahefa azy.
  '12':
  - type: text
    content: Mihainoa Ahy, hianareo madi-po,
  - type: text
    content: 'Izay lavitra ny fahamarinana:'
  '13':
  - type: text
    content: Hampanatoniko ny fahamarinako, ka tsy ho lavitra intsony;
  - type: text
    content: Ary ny famonjeko tsy hitaredretra;
  - type: text
    content: Fa hametraka famonjena ao Ziona Aho
  - type: text
    content: Sy ny voninahitro ho an’ny Isiraely.
  '2':
  - type: text
    content: Miraika sy mangozohozo avokoa izy,
  - type: text
    content: Ka tsy mahavonjy ny entana akory;
  - type: text
    content: Fa na dia ny tenany aza dia lasan-ko babo koa.
  '3':
  - type: text
    content: Mihainoa Ahy, ry taranak’i Jakoba
  - type: text
    content: Sy izay sisa rehetra amin’ny taranak’Isiraely,
  - type: text
    content: Izay nobabena hatrany an-kibo
  - type: text
    content: 'Sy nentina hatrany am-bohoka:'
  '4':
  - type: text
    content: Na dia mandra-pahantitrareo aza, dia tsy miova Aho,
  - type: text
    content: Ary mandra-pahafotsy-volonareo, dia Izaho ihany no hisahirana mitondra anareo.
  - type: text
    content: Izaho no nanao, ka Izaho ihany no hitrotro,
  - type: text
    content: Eny, Izaho no hitondra sy hanafaka.
  '5':
  - type: text
    content: Hampitovinareo amin’iza moa Aho,
  - type: text
    content: Sy amin’iza no hanoharanareo Ahy,
  - type: text
    content: Ary iza no hataonareo ho tahaka Ahy mba hitahany amiko?
  '6':
  - type: text
    content: Izay mandraraka volamena avy ao an-kitapo
  - type: text
    content: Sy mandanja volafotsy amin’ny mizana
  - type: text
    content: Dia manakarama mpanefy volamena mba hanao izany ho andriamanitra,
  - type: text
    content: Hiankohofany sy hivavahany.
  '7':
  - type: text
    content: Dia betainy ho eny an-tsorony iny ka entiny
  - type: text
    content: Ary apetrany eo amin’ny fitoerany iny, ka dia mitoetra eo;
  - type: text
    content: Tsy mahay miala eo amin’ny fitoerany iny;
  - type: text
    content: Ary na dia misy mitaraina aminy aza, dia tsy mahay mamaly izy,
  - type: text
    content: Na mahavonjy azy amin’ny fahoriany.
  '8':
  - type: text
    content: Tsarovy izany, ka mahereza
  - type: note
    content: 'Na: misehoa ho lehilahy.'
  - type: text
    content: ' hianareo;'
  - type: text
    content: Eritrereto tsara izany, ry mpiodina.
  '9':
  - type: text
    content: Tsarovy ny zavatra taloha izay efa lasa ela;
  - type: text
    content: Fa Izaho no Andriamanitra, ka tsy misy hafa;
  - type: text
    content: Izaho no Andriamanitra, ka tsy misy tahaka Ahy,
