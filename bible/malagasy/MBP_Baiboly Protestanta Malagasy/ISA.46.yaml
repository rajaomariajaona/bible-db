document_id: ISA.46
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahatsinontsinon’ny sampin’i Babylona, sy fanomezan-toky ny Isiraely hifikitra amin’i Jehovah, ary ny hery sy ny fahalalan’i Jehovah.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MANGOZOHOZO Bela, efa miraika Nebo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sampiny dia nampitondraina ny biby folahina sy ny biby fiompy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zavatra fitòndranareo dia asampy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka tonga enta-mavesatra entin’ireo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: biby
  - type: text
    text: ' reraka.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miraika sy mangozohozo avokoa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mahavonjy ny entana akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa na dia ny tenany aza dia lasan-ko babo koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mihainoa Ahy, ry taranak’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay sisa rehetra amin’ny taranak’Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nobabena hatrany an-kibo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy nentina hatrany am-bohoka:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Na dia mandra-pahantitrareo aza, dia tsy miova Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mandra-pahafotsy-volonareo, dia Izaho ihany no hisahirana mitondra anareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no nanao, ka Izaho ihany no hitrotro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Izaho no hitondra sy hanafaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hampitovinareo amin’iza moa Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’iza no hanoharanareo Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no hataonareo ho tahaka Ahy mba hitahany amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izay mandraraka volamena avy ao an-kitapo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mandanja volafotsy amin’ny mizana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia manakarama mpanefy volamena mba hanao izany ho andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiankohofany sy hivavahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia betainy ho eny an-tsorony iny ka entiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary apetrany eo amin’ny fitoerany iny, ka dia mitoetra eo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahay miala eo amin’ny fitoerany iny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia misy mitaraina aminy aza, dia tsy mahay mamaly izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mahavonjy azy amin’ny fahoriany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsarovy izany, ka mahereza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: misehoa ho lehilahy.
    marker-yv: yv-n
  - type: text
    text: ' hianareo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eritrereto tsara izany, ry mpiodina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsarovy ny zavatra taloha izay efa lasa ela;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izaho no Andriamanitra, ka tsy misy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no Andriamanitra, ka tsy misy tahaka Ahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay manambara ny farany hatramin’ny voalohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nanambara hatramin’ny ela izay tsy mbola natao akory,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia Ilay manao hoe: Ho to ny fikasako,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hefaiko ny sitrapoko rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay miantso vorona mpihaza avy any atsinanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia lehilahy avy any an-tany lavitra hahefa ny fikasako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady efa niteny izany Aho no hahatanteraka azy koa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nikasa Aho no hahefa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihainoa Ahy, hianareo madi-po,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay lavitra ny fahamarinana:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hampanatoniko ny fahamarinako, ka tsy ho lavitra intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny famonjeko tsy hitaredretra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hametraka famonjena ao Ziona Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny voninahitro ho an’ny Isiraely.
