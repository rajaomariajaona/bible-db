document_id: HAB.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka nangatahan’ny mpaminany famindrampo.
  - type: text
    content: NY fivavak’i Habakoka mpaminany. Araka ny Sigionota.
  '10':
  - type: text
    content: Nahita Anao ny tendrombohitra ka toran-kovitra;
  - type: text
    content: Mirotsaka
  - type: note
    content: Heb. Mandalo.
  - type: text
    content: ' ny ranonorana mivatravatra,'
  - type: text
    content: Mamoa-peo ny lalina
  - type: text
    content: Sady manangan-tànana ho amin’ny avo.
  '11':
  - type: text
    content: Ny masoandro sy ny volana niditra teo amin’ny fitoerany,
  - type: text
    content: Noho ny fahazavan’ny zana-tsipìkanao mitsoriaka
  - type: text
    content: Sy ny fanelatrelatry ny lefonao mamirapiratra.
  '12':
  - type: text
    content: Amin’ny fahatezeranao no anitsahanao ny tany;
  - type: text
    content: Amin’ny fahaviniranao no anosihosenao ny firenena.
  '13':
  - type: text
    content: Mivoaka hamonjy ny olonao Hianao, dia hamonjy ny voahosotrao;
  - type: text
    content: Torotoroinao ny tapenaky ny tranon’
  - type: note
    content: Heb. lohan’.
  - type: text
    content: ' ny ratsy fanahy,'
  - type: text
    content: Ka ahariharinao hatreo an-tenatenany
  - type: note
    content: an-katony.
  - type: text
    content: ' ny fanorenany.'
  - type: text
    content: '[Sela.]'
  '14':
  - type: text
    content: Ny lefony ihany no anaboroahanao ny lohan’ireo miaramilany betsaka,
  - type: text
    content: Izay avy toy ny tadio hanely ahy;
  - type: text
    content: Sady mifaly handany mangingina ny ory izy.
  '15':
  - type: text
    content: Mitety ny ranomasina amin’ny soavalinao Hianao,
  - type: text
    content: Dia eny amin’ny rano be miavovona.
  '16':
  - type: text
    content: Nony mandre aho, dia mandevilevy ny kiboko;
  - type: text
    content: Ny molotro mipararetra noho ny feo;
  - type: text
    content: Azon’ny fahalovana ny taolako, ary mangovitra aho;
  - type: text
    content: Fa tsy maintsy miandry ny andro fahoriana aho,
  - type: text
    content: Dia izay hiakaran’ny mpanao an-diany hamely ny olonao.
  '17':
  - type: text
    content: Fa na dia tsy mamontsina aza ny aviavy,
  - type: text
    content: Ary tsy misy voany ny voaloboka,
  - type: text
    content: Na dia mahadiso fanantenana aza ny oliva,
  - type: text
    content: Ary tsy mahavokatra hohanina ny saha,
  - type: text
    content: Na dia vonoina aza ny ondry ao amin’ny vala,
  - type: text
    content: Ary tsy misy omby ao am-pahitra,–
  '18':
  - type: text
    content: Nefa izaho dia mbola hifaly amin’i Jehovah ihany
  - type: text
    content: Sy hiravoravo amin’Andriamanitry ny famonjena ahy.
  '19':
  - type: text
    content: Jehovah Tompo no tanjako,
  - type: text
    content: Ary manao ny tongotro ho toy ny an’ny dieravavy Izy
  - type: text
    content: Ka mampandeha ahy any amin’ny havoanako.
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha.
  '2':
  - type: text
    content: Jehovah ô, efa reko ny filazana Anao, ka raiki-tahotra aho;
  - type: text
    content: Jehovah ô, velomy ny asanao ao an-tenatenan’ny taona,
  - type: text
    content: Ataovy fantatra ao an-tenatenan’ny taona izany;
  - type: text
    content: Na dia tezitra aza Hianao, tsarovy ny indrafo.
  '3':
  - type: text
    content: Tamy avy any Temana Andriamanitra,
  - type: text
    content: Dia ny Iray Masina avy any an-tendrombohitra Parana.
  - type: text
    content: '[Sela.]'
  - type: text
    content: Manarona ny lanitra ny voninahiny,
  - type: text
    content: Ary manenika ny tany ny fiderana Azy.
  '4':
  - type: text
    content: Misy famirapiratana toy ny mazava,
  - type: text
    content: Ary misy tàna-masoandro avy eo amin’ny tànany;
  - type: note
    content: 'Na: avy eo anilany.'
  - type: text
    content: Ary ao no fieren’ny heriny.
  '5':
  - type: text
    content: Eo alohany no andehanan’ny areti-mandringana,
  - type: text
    content: Ary areti-mandripaka
  - type: note
    content: 'Na: zava-mahamay.'
  - type: text
    content: ' no mivoaka avy eo aoriany.'
  '6':
  - type: text
    content: Mijanona Izy ka manozongozona ny tany;
  - type: text
    content: Mijery Izy ka mampangovitra ny firenena,
  - type: text
    content: Ary torotoro ny tendrombohitra mandrakizay,
  - type: text
    content: Mietry ny havoana fahagola;
  - type: text
    content: Fanaony hatry ny fahagola ny Azy.
  '7':
  - type: text
    content: Mahita ny lain’i Kosana azom-pahoriana aho,
  - type: text
    content: Sady mipararetra ny ambain-dain’ny tany Midiana.
  '8':
  - type: text
    content: Moa amin’ny ony va no irehetan’ny fahatezeran’i Jehovah?
  - type: text
    content: Amin’ny ony va no ahatezeranao,
  - type: text
    content: Na amin’ny ranomasina va no ahasosoranao,
  - type: text
    content: No dia mitaingina ny soavalinao sy ny kalesim-pamonjenao Hianao?
  '9':
  - type: text
    content: Nalan-tsarona ny tsipìkanao;
  - type: text
    content: Efa nianianana ny fikapohan’ny teny.
  - type: note
    content: 'Na: Ny fianianana tamin’ny firenena dia teny.'
  - type: text
    content: '[Sela.]'
  - type: text
    content: Namakivaky ny tany Hianao mba hisy ony.
