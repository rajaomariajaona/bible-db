document_id: HAB.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Vavaka nangatahan’ny mpaminany famindrampo.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY fivavak’i Habakoka mpaminany. Araka ny Sigionota.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nahita Anao ny tendrombohitra ka toran-kovitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mirotsaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mandalo.
      marker-yv: yv-n
    - type: text
      text: ' ny ranonorana mivatravatra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamoa-peo ny lalina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady manangan-tànana ho amin’ny avo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny masoandro sy ny volana niditra teo amin’ny fitoerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahazavan’ny zana-tsipìkanao mitsoriaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fanelatrelatry ny lefonao mamirapiratra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Amin’ny fahatezeranao no anitsahanao ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fahaviniranao no anosihosenao ny firenena.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mivoaka hamonjy ny olonao Hianao, dia hamonjy ny voahosotrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torotoroinao ny tapenaky ny tranon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lohan’.
      marker-yv: yv-n
    - type: text
      text: ' ny ratsy fanahy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ahariharinao hatreo an-tenatenany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: an-katony.
      marker-yv: yv-n
    - type: text
      text: ' ny fanorenany.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Sela.]'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny lefony ihany no anaboroahanao ny lohan’ireo miaramilany betsaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay avy toy ny tadio hanely ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mifaly handany mangingina ny ory izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mitety ny ranomasina amin’ny soavalinao Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eny amin’ny rano be miavovona.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nony mandre aho, dia mandevilevy ny kiboko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny molotro mipararetra noho ny feo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azon’ny fahalovana ny taolako, ary mangovitra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy maintsy miandry ny andro fahoriana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay hiakaran’ny mpanao an-diany hamely ny olonao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa na dia tsy mamontsina aza ny aviavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy voany ny voaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mahadiso fanantenana aza ny oliva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mahavokatra hohanina ny saha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia vonoina aza ny ondry ao amin’ny vala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy omby ao am-pahitra,–
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nefa izaho dia mbola hifaly amin’i Jehovah ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hiravoravo amin’Andriamanitry ny famonjena ahy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Jehovah Tompo no tanjako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manao ny tongotro ho toy ny an’ny dieravavy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mampandeha ahy any amin’ny havoanako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jehovah ô, efa reko ny filazana Anao, ka raiki-tahotra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, velomy ny asanao ao an-tenatenan’ny taona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy fantatra ao an-tenatenan’ny taona izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia tezitra aza Hianao, tsarovy ny indrafo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tamy avy any Temana Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny Iray Masina avy any an-tendrombohitra Parana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Sela.]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manarona ny lanitra ny voninahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manenika ny tany ny fiderana Azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Misy famirapiratana toy ny mazava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary misy tàna-masoandro avy eo amin’ny tànany;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avy eo anilany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ao no fieren’ny heriny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Eo alohany no andehanan’ny areti-mandringana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary areti-mandripaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zava-mahamay.
      marker-yv: yv-n
    - type: text
      text: ' no mivoaka avy eo aoriany.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mijanona Izy ka manozongozona ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijery Izy ka mampangovitra ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary torotoro ny tendrombohitra mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mietry ny havoana fahagola;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fanaony hatry ny fahagola ny Azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mahita ny lain’i Kosana azom-pahoriana aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mipararetra ny ambain-dain’ny tany Midiana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Moa amin’ny ony va no irehetan’ny fahatezeran’i Jehovah?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny ony va no ahatezeranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na amin’ny ranomasina va no ahasosoranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No dia mitaingina ny soavalinao sy ny kalesim-pamonjenao Hianao?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nalan-tsarona ny tsipìkanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nianianana ny fikapohan’ny teny.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fianianana tamin’ny firenena dia teny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Sela.]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namakivaky ny tany Hianao mba hisy ony.
