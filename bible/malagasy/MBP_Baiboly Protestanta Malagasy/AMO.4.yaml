document_id: AMO.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hanjo ny Isiraely noho ny tsi-fetezany hibebaka.
  - type: text
    content: MIHAINOA izao teny izao, hianareo vantotr’ombivavin’i Basana,
  - type: text
    content: Izay eny an-tendrombohitr’i Samaria,
  - type: text
    content: Dia hianareo izay mampahory ny mahantra
  - type: text
    content: Sy manorotoro ny malahelo
  - type: text
    content: Ary manao amin’ny vadinareo
  - type: note
    content: 'Na: ny tomponareo: Heb. tompony, na vadiny.'
  - type: text
    content: ' hoe: Mitondrà hosotrointsika.'
  '10':
  - type: text
    content: Efa naterako areti-mandringana tahaka ny any Egypta hianareo;
  - type: text
    content: Novonoiko sabatra ny zatovonareo
  - type: text
    content: Sady nobaboina koa ny soavalinareo;
  - type: text
    content: Ary nampakariko ho eo am-bavoronareo ny hamaimboan’ny tobinareo;
  - type: text
    content: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
  '11':
  - type: text
    content: Efa nisy noravako teo aminareo tahaka ny nandravan’Andriamanitra an’i Sodoma sy Gomora,
  - type: text
    content: Ka efa tahaka ny forohana nosarihana tamin’ny afo hianareo;
  - type: text
    content: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
  '12':
  - type: text
    content: Koa izao no hataoko aminao, ry Isiraely,–
  - type: text
    content: Satria hanao izany aminao Aho,
  - type: text
    content: Dia miomàna hihaona amin’Andriamanitrao, ry Isiraely ô.
  '13':
  - type: text
    content: Fa indro Ilay mamorona ny tendrombohitra sy manao ny rivotra
  - type: text
    content: Ary mampahafantatra ny olombelona izay heviny,–
  - type: text
    content: Dia Ilay mahatonga ny maraina ho aizina
  - type: text
    content: 'Ary mandia ny fitoerana avo amin’ny tany:'
  - type: text
    content: Jehovah, Andriamanitry ny maro, no anarany.
  '2':
  - type: text
    content: 'Jehovah Tompo efa nianiana tamin’ny fahamasinany hoe:'
  - type: text
    content: Indro, ho avy aminareo ny andro
  - type: text
    content: Hitarihany anareo amin’ny farango sy izay sisa aminareo amin’ny fintana.
  '3':
  - type: text
    content: Ary avy eo amin’ny banga no hivoahanareo,
  - type: text
    content: Samy amin’izay hitsiny avy;
  - type: text
    content: Ary horoahina ho any Harmona
  - type: note
    content: 'Na: an-tranobe.'
  - type: text
    content: ' hianareo,'
  - type: note
    content: 'Na: ary harianareo ny fahefana (?).'
  - type: text
    content: ' hoy Jehovah.'
  '4':
  - type: text
    content: Mankanesa any Betela, ka manotà,
  - type: text
    content: Ary any Gilgala, ka manotà fatratra;
  - type: text
    content: Ento isa-maraina ny fanatitrareo alatsa-dra
  - type: text
    content: Ary isan-kateloana ny fahafolon-karenareo;
  '5':
  - type: text
    content: Mandoroa zavatra misy masirasira ho fanati-pisaorana,
  - type: text
    content: Ary miantsoa fanati-tsitrapo, eny, ambarao izany!
  - type: text
    content: Satria ny toy izany no sitrakareo, ry Zanak’Isiraely, hoy Jehovah Tompo.
  '6':
  - type: text
    content: Fa Izaho dia efa nanome anareo ny mahamavovava tao an-tanànanareo rehetra,
  - type: text
    content: Sy ny tsi-fahampian-kanina tamin’ny fonenanareo rehetra;
  - type: text
    content: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
  '7':
  - type: text
    content: Ary Izaho koa efa nampihantona ny orana tsy ho aminareo,
  - type: text
    content: Raha mbola telo volana sisa tsy ho fararano,
  - type: text
    content: Ka tamin’ny tanàna iny no nampilatsahako orana,
  - type: text
    content: Ary tamin’ny tanàna iray kosa tsy mba nampilatsahako azy;
  - type: text
    content: Ny saha iray nilatsahan’ny orana,
  - type: text
    content: Ary ny saha iray kosa tsy mba nilatsahany ka maina.
  '8':
  - type: text
    content: Dia nivembena ny tanàna roa aman-telo nitady rano tany amin’ny tanàna iray,
  - type: text
    content: Kanjo tsy afa-ketaheta izy;
  - type: text
    content: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
  '9':
  - type: text
    content: Efa nasiako tamin’ny vary main’ny rivotra sy maty fotsy hianareo;
  - type: text
    content: Ny habetsahan’ny tanimbolinareo sy ny tanimboalobokareo
  - type: text
    content: Sy ny aviavinareo sy ny hazo olivanareo
  - type: text
    content: Dia nohanin’ny valala;
  - type: note
    content: 'Na: mpikiky.'
  - type: text
    content: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
