document_id: AMO.4
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hanjo ny Isiraely noho ny tsi-fetezany hibebaka.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIHAINOA izao teny izao, hianareo vantotr’ombivavin’i Basana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay eny an-tendrombohitr’i Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianareo izay mampahory ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy manorotoro ny malahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manao amin’ny vadinareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny tomponareo: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tompony, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vadiny.
    marker-yv: yv-n
  - type: text
    text: ' hoe: Mitondrà hosotrointsika.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jehovah Tompo efa nianiana tamin’ny fahamasinany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, ho avy aminareo ny andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitarihany anareo amin’ny farango sy izay sisa aminareo amin’ny fintana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary avy eo amin’ny banga no hivoahanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy amin’izay hitsiny avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary horoahina ho any Harmona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: an-tranobe.
    marker-yv: yv-n
  - type: text
    text: ' hianareo,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ary harianareo ny fahefana (?).
    marker-yv: yv-n
  - type: text
    text: ' hoy Jehovah.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mankanesa any Betela, ka manotà,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any Gilgala, ka manotà fatratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ento isa-maraina ny fanatitrareo alatsa-dra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary isan-kateloana ny fahafolon-karenareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mandoroa zavatra misy masirasira ho fanati-pisaorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miantsoa fanati-tsitrapo, eny, ambarao izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria ny toy izany no sitrakareo, ry Zanak’Isiraely, hoy Jehovah Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa Izaho dia efa nanome anareo ny mahamavovava tao an-tanànanareo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny tsi-fahampian-kanina tamin’ny fonenanareo rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary Izaho koa efa nampihantona ny orana tsy ho aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mbola telo volana sisa tsy ho fararano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tamin’ny tanàna iny no nampilatsahako orana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tamin’ny tanàna iray kosa tsy mba nampilatsahako azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny saha iray nilatsahan’ny orana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny saha iray kosa tsy mba nilatsahany ka maina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nivembena ny tanàna roa aman-telo nitady rano tany amin’ny tanàna iray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo tsy afa-ketaheta izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa nasiako tamin’ny vary main’ny rivotra sy maty fotsy hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny habetsahan’ny tanimbolinareo sy ny tanimboalobokareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny aviavinareo sy ny hazo olivanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nohanin’ny valala;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpikiky.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efa naterako areti-mandringana tahaka ny any Egypta hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Novonoiko sabatra ny zatovonareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nobaboina koa ny soavalinareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nampakariko ho eo am-bavoronareo ny hamaimboan’ny tobinareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa nisy noravako teo aminareo tahaka ny nandravan’Andriamanitra an’i Sodoma sy Gomora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa tahaka ny forohana nosarihana tamin’ny afo hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy niverina tamiko ihany hianareo, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa izao no hataoko aminao, ry Isiraely,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria hanao izany aminao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia miomàna hihaona amin’Andriamanitrao, ry Isiraely ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa indro Ilay mamorona ny tendrombohitra sy manao ny rivotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampahafantatra ny olombelona izay heviny,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Ilay mahatonga ny maraina ho aizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary mandia ny fitoerana avo amin’ny tany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah, Andriamanitry ny maro, no anarany.
