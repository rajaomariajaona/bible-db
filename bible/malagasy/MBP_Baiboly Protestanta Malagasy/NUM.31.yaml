document_id: NUM.31
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tafika namaliana ny Midianita.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Valio ny Midianita noho ny nataony tamin’ny Zanak’Isiraely; ary rehefa afaka izany, dia hangonina any amin’ny razanao hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niteny tamin’ny olona Mosesy ka nanao hoe: Miomàna ho any an-tafika ny sasany aminareo, ary aoka izy hanafika ny Midianita, hahatanteraka ny famalian’i Jehovah azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Arivo lahy avy isam-pirenena amin’ny firenen’Isiraely no hampandehaninareo ho any an-tafika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia navahana tamin’ny firenen’Isiraely ny arivo isam-pirenena, dia roa arivo amby iray alina, samy voaomana hiady. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary nampandehanin’i Mosesy ho any an-tafika ireo arivo lahy isam-pirenena ireo sy Finehasa, zanak’i Eleazara mpisorona, izay nitondra ny fanaka masina teny an-tànany, dia ny trompetra avo feo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niady tamin’ny Midianita ireo, araka izay efa nandidian’i Jehovah an’i Mosesy; ary namono ny lehilahy rehetra izy; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary ny mpanjakan’i Midiana dimy lahy dia matiny niaraka tamin’ireny koa, dia Evy sy Rekema sy Zora sy Hora ary Reba; ary Balama, zanak’i Beora, koa dia novonoiny tamin’ny sabatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny Zanak’Isiraely namabo ny vehivavy Midianita sy ny zanany madinika; ary nobaboiny avokoa ny biby fiompiny rehetra sy ny omby aman-ondriny rehetra ary ny fananany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny tanànany rehetra izay teo amin’ny fonenany sy ny tobiny rehetra dia nodorany tamin’ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nalainy avokoa ny babo rehetra, na olona na biby fiompy, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia nentiny tany amin’i Mosesy sy Eleazara mpisorona ary ny fiangonan’ny Zanak’Isiraely teo an-toby, teo Arbota-moaba, izay eo amoron’i Jordana tandrifin’i Jeriko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Mosesy sy Eleazara mpisorona ary ny lohan’ny fiangonana rehetra nivoaka hitsena azy teo ivelan’ny toby. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tezitra tamin’ny mpifehy ny miaramila Mosesy, dia tamin’ny mpifehy arivo sy ny mpifehy zato, izay avy tany an-tafiika, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka hoy izy taminy: Nahoana no novelominareo ny vehivavy rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ireo ihany no nampahadiso ny Zanak’Isiraely tamin’i Jehovah ny amin’i Peora, araka ny tenin’i Balama, ka nahazo ny fiangonan’i Jehovah ny areti-mandringana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa ankehitriny, vonoy ny zazalahy madinika rehetra, ary vonoy koa ny vehivavy rehetra izay efa nahalala lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ny zazavavy rehetra izay tsy mbola nahalala lahy dia velomy ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary mitobia eo ivelan’ny toby hafitoana; ary izay nahafaty olona na nikasika faty dia samia manadio ny tenany, na hianareo, na ny sambotrareo amin’ny andro fahatelo sy ny andro fahafito. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny fitafiana rehetra, na ny fanaka hoditra, na ny fanaka volon’osy, na ny fanaka hazo, dia diovy avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Eleazara mpisorona tamin’ny mpanafika, izay efa tany amin’ny ady: Izao no lalàna hotandremana, izay nandidian’i Jehovah’ an i Mosesy: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny volamena sy ny volafotsy sy ny varahina sy ny vy sy ny vifotsy ary ny firaka, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia ny zavatra rehetra izay maharitra afo, dia ataovy ao amin’ny afo, dia hadio, kanefa hodiovina amin’ny rano fanadiovana koa izy; ary izay rehetra tsy maharitra afo kosa dia ataovy ao amin’ny rano ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary sasao ny fitafianareo amin’ny andro fahafito, dia hadio hianareo; ary rehefa afaka izany, dia mahazo miditra eo amin’ny toby hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alaonao sy Eleazara mpisorona sy ny lohan’ny fianakaviana amin’ny fiangonana ny isan’ny babo izay azo, na olona, na biby fiompy; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary sasaho ny babo ho an’izay niady, dia izay efa tany an-tafika, sy ho an’ny fiangonana rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'kanefa makà anjara ho an’i Jehovah avy amin’ny mpanafika izay nivoaka ho any an-tafika, dia iray isan-diman-jato, na olona, na omby, na boriky, na ondry aman-osy; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ny antsasany izay azy no hanalanao izany ka homenao an’i Eleazara mpisorona ho fanatitra alaina ho an’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary ny antsasany an’ny Zanak’Isiraely kosa dia analao iray isan-dimam-polo, na olona, na omby, na boriky, na ondry aman-osy, dia ny biby fiompy rehetra, ka omeo ho an’ny Levita, izay mitandrina ny anjara-raharaha momba ny tabernakelin’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nataon’i Mosesy sy Eleazara mpisorona izany, araka izay efa nandidian’i Jehovah an’i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny babo sisa afa-tsy izay azon’ny mpanafika, dia ondry aman-osy dimy arivo amby fito alina sy enina hetsy, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'sy omby roa arivo amby fito alina, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'sy boriky arivo amby enina alina, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ary olona, dia ny zazavavy izay tsy mbola nahalala lahy, roa arivo amby telo alina. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny antsasany izay anjaran’ny efa tany an-tafika dia izao: ny isan’ny ondry aman-osy dia diman-jato amby fito arivo sy telo alina sy telo hetsy; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ary ny anjaran’i Jehovah avy tamin’ny ondry aman-osy dia dimy amby fito-polo sy enin-jato. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny omby dia enina arivo amby telo alina; ary ny anjaran’i Jehovah avy tamin’ireo dia roa amby fito-polo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny boriky dia diman-jato amby telo alina; ary ny anjaran’i Jehovah avy tamin’ireo dia iraika amby enim-polo. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny zazavavy dia enina arivo amby iray alina; ary ny anjaran’i Jehovah avy tamin’ireo dia roa amby telo-polo. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Dia nomen’i Mosesy an’i Eleazara mpisorona ny anjara izay nalaina ho an’i Jehovah, araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary avy tamin’ny antsasany an’ny Zanak’Isiraely, izay nozarain’i Mosesy avy tamin’ny mpanafika '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '(fa ny antsasany an’ny fiangonana dia ondry aman-osy diman-jato amby fito arivo sy telo alina sy telo hetsy, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'sy omby enina arivo amby telo alina, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'sy boriky diman-jato amby telo alina, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'ary olona enina arivo amby iray alina),– '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ny antsasany an’ny Zanak’Isiraely dia nanalan’i Mosesy iray isan-dimam-polo, na olona, na biby fiompy, ka nomeny ho an’ny Levita mpitandrina ny anjara-raharaha momba ny tabernakelin’i Jehovah izany, araka izay efa nandidian’i Jehovah an’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary ny mpifehy, izay nifehy ny miaramila, dia ny mpifehy arivo sy ny mpifehy zato, dia nanatona an’i Mosesy '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'ka nanao taminy hoe: Ny mpanomponao efa naka ny isan’ny mpanafika izay nofehezinay, ka tsy misy diso isa aminay na dia lehilahy iray akory aza; '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: koa nitondra fanatitra ho an’i Jehovah izahay, dia ny firavaka volamena efa azonay avy, dia fehin-tànana sy haba sy peratra fanombohan-kase sy kavina ary voavola, hanaovana fanavotana ho an’ny ainay eo anatrehan’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Dia noraisin’i Mosesy sy Eleazara mpisorona taminy ny volamena, dia firavaka voatefy avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary ny volamena rehetra tamin’ny fanatitra nalain’ny mpifehy arivo sy ny mpifehy zato ho an’i Jehovah, dia sekely dimam-polo amby fiton-jato sy enina arivo sy iray alina '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: '(fa ny mpanafika samy namabo ho an’ny tenany). '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Dia noraisin’i Mosesy sy Eleazara mpisorona ny volamena nomen’ny mpifehy arivo sy ny mpifehy zato ka nentiny tao amin’ny trano-lay fihaonana ho fahatsiarovana ho an’ny Zanak’Isiraely eo anatrehan’i Jehovah.
