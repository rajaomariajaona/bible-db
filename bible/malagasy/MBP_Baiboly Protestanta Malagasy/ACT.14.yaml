document_id: ACT.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitorian’i Paoly sy Barnabasy teny tany Ikonioma sy Lystra ary Derbe, sy ny niverenany nankany Antiokia indray.
  - type: text
    content: ARY nony tany Ikonioma Paoly sy Barnabasy, dia niara-niditra tao amin’ny synagogan’ny Jiosy izy ka nitori-teny, ka dia olona betsaka no nino, na Jiosy na jentilisa.
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'dia niteny tamin’ny feo mahery hoe: Mijoroa amin’ny tongotrao. Dia niantsambotsambotra ralehilahy ka nitsangantsangana.'
  '11':
  - type: text
    content: 'Ary nony hitan’ny vahoaka betsaka izay zavatra nataon’i Paoly, dia nanandratra ny feony ka nanao tamin’ny fitenin’i Lykaonia hoe: Efa nidina nankatỳ amintsika ny andriamanitra maka ny endrik’olona! '
  '12':
  - type: text
    content: Ary ny anaran’i Barnabasy nataony hoe Jopitera,
  - type: note
    content: Gr. Zeosy.
  - type: text
    content: ' ary Paoly kosa Merkory,'
  - type: note
    content: Gr. Hermesy.
  - type: text
    content: ' satria izy no mpitarika ny teny nalahatra. '
  '13':
  - type: text
    content: 'Ary ny mpisoron’ilay Jopitera teo anoloan’ny tanàna, mbamin’ny vahoaka, dia nitondra ombilahy sy voninkazo natao fihaingoana ho eo am-bavahady ka nikasa hanao fanatitra. '
  '14':
  - type: text
    content: 'Fa nony nahare izany ny Apostoly, dia Barnabasy sy Paoly, dia nandriatra ny fitafiany izy ka nitsarapaka nankeo afovoan’ny olona sady niantso nanao hoe: '
  '15':
  - type: text
    content: 'Raondriana, ahoana no anaovanareo izao? Olona tahaka anareo ihany izahay ary mitory ny filazantsara aminareo, mba hialanareo amin’izao zava-poana izao hanatona an’Andriamanitra velona, Izay nanao ny lanitra sy ny tany ary ny ranomasina mbamin’izay rehetra ao anatiny, '
  '16':
  - type: text
    content: 'Izay namela ny firenena rehetra handeha tamin’ny làlana tiany haleha tamin’ny andro lasa. '
  '17':
  - type: text
    content: 'Kanefa tsy namela ny tenany tsy hanana vavolombelona Izy; fa manao soa Izy, mampilatsaka ny ranonorana avy eny amin’ny lanitra ho anareo sady manome taon-jina ka mahavoky ny fonareo amin’ny hanina sy ny fifaliana. '
  '18':
  - type: text
    content: Nefa na dia nilaza izany aza izy, dia saiky tsy nahasakana ny olona tsy hamono zavatra hatao fanatitra aminy.
  '19':
  - type: text
    content: 'Ary nisy Jiosy tonga avy tany Antiokia sy Ikonioma, izay nitaona ny vahoaka ka nitora-bato an’i Paoly, dia nitarika azy ho eny ivelan’ny tanàna, satria nataony fa efa maty izy. '
  '2':
  - type: text
    content: 'Fa ny Jiosy izay tsy nino dia nampitaitra ny jentilisa ka nanome fo azy hanohitra ny rahalahy. '
  '20':
  - type: text
    content: Fa nony nanodidina azy ny mpianatra, dia nitsangana izy ka lasa niakatra tao an-tanàna.
  - type: text
    content: 'Ary nony ampitso dia niala tao izy sy Barnabasy ka nankany Derbe. '
  '21':
  - type: text
    content: 'Ary rehefa nitory ny filazantsara tamin’izany tanàna izany izy ka nahazo mpianatra maro, dia niverina nankany Lystra sy Ikonioma ary Antiokia indray izy, '
  '22':
  - type: text
    content: 'nampahery ny fanahin’ny mpianatra ka nananatra azy haharitra amin’ny finoana, sady nilaza fa tsy maintsy ho amin’ny fahoriana be no idirantsika amin’ny fanjakan’Andriamanitra. '
  '23':
  - type: text
    content: Ary rehefa nanendry
  - type: note
    content: 'Na: nampanangan-tànana nifidy.'
  - type: text
    content: ' loholona'
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' teo amin’ny isam-piangonana izy, dia nivavaka sady nifady hanina ka dia nanolotra azy ho an’ny Tompo Izay efa ninoany.'
  '24':
  - type: text
    content: 'Ary rehefa nandeha namaky an’i Pisidia izy, dia tonga tany Pamfylia. '
  '25':
  - type: text
    content: 'Ary nony efa nitory ny teny tany Perga izy, dia nidina nankany Atalia. '
  '26':
  - type: text
    content: Dia niondrana an-tsambo niala teo izy hankany Antiokia, izay efa nanolorana azy ho amin’ny fahasoavan’Andriamanitra ho amin’ny asa izay novitainy.
  '27':
  - type: text
    content: 'Ary rehefa tonga tao izy ka namory ny fiangonana, dia nilaza izay rehetra nataon’Andriamanitra tamin’ny nombany azy, sy ny namohany varavaram-pinoana ho an’ny jentilisa. '
  '28':
  - type: text
    content: Dia nitoetra elaela ihany tamin’ny mpianatra izy.
  '3':
  - type: text
    content: Ary nitoetra ela teo izy, dia nitory tamin’ny fahasahiana noho ny fahatokiany ny Tompo, Izay nanome vavolombelona hahamarina ny tenin’ny fahasoavany ka nampanao azy roa lahy famantarana sy fahagagana.
  '4':
  - type: text
    content: 'Fa ny vahoaka tao an-tanàna nisara-tsaina, ny sasany nomba ny Jiosy, fa ny sasany kosa nomba ny Apostoly. '
  '5':
  - type: text
    content: 'Ary raha niray tetika hanisy ratsy sy hitora-bato azy ny jentilisa sy ny Jiosy mbamin’ny loholony, '
  '6':
  - type: text
    content: 'ka fantany izany, dia nandositra nankany Lystra sy Derbe, tanàna any Lykaonia, mbamin’ny tany manodidina, izy, '
  '7':
  - type: text
    content: dia nitory ny filazantsara tany.
  '8':
  - type: text
    content: 'Ary nisy lehilahy anankiray nipetraka tany Lystra nalemy tongotra hatrany an-kibon-dreniny ka tsy afaka namindra; '
  '9':
  - type: text
    content: 'izy nahare an’i Paoly nitori-teny; ary Paoly, nony nibanjina azy mafy ka nahita fa nanam-pinoana hositranina io, '
