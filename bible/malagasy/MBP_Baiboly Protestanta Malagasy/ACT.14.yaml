document_id: ACT.14
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitorian’i Paoly sy Barnabasy teny tany Ikonioma sy Lystra ary Derbe, sy ny niverenany nankany Antiokia indray.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY nony tany Ikonioma Paoly sy Barnabasy, dia niara-niditra tao amin’ny synagogan’ny Jiosy izy ka nitori-teny, ka dia olona betsaka no nino, na Jiosy na jentilisa.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grika.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny Jiosy izay tsy nino dia nampitaitra ny jentilisa ka nanome fo azy hanohitra ny rahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nitoetra ela teo izy, dia nitory tamin’ny fahasahiana noho ny fahatokiany ny Tompo, Izay nanome vavolombelona hahamarina ny tenin’ny fahasoavany ka nampanao azy roa lahy famantarana sy fahagagana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny vahoaka tao an-tanàna nisara-tsaina, ny sasany nomba ny Jiosy, fa ny sasany kosa nomba ny Apostoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha niray tetika hanisy ratsy sy hitora-bato azy ny jentilisa sy ny Jiosy mbamin’ny loholony, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka fantany izany, dia nandositra nankany Lystra sy Derbe, tanàna any Lykaonia, mbamin’ny tany manodidina, izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: dia nitory ny filazantsara tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nisy lehilahy anankiray nipetraka tany Lystra nalemy tongotra hatrany an-kibon-dreniny ka tsy afaka namindra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'izy nahare an’i Paoly nitori-teny; ary Paoly, nony nibanjina azy mafy ka nahita fa nanam-pinoana hositranina io, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia niteny tamin’ny feo mahery hoe: Mijoroa amin’ny tongotrao. Dia niantsambotsambotra ralehilahy ka nitsangantsangana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony hitan’ny vahoaka betsaka izay zavatra nataon’i Paoly, dia nanandratra ny feony ka nanao tamin’ny fitenin’i Lykaonia hoe: Efa nidina nankatỳ amintsika ny andriamanitra maka ny endrik’olona! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny anaran’i Barnabasy nataony hoe Jopitera,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zeosy.
    marker-yv: yv-n
  - type: text
    text: ' ary Paoly kosa Merkory,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hermesy.
    marker-yv: yv-n
  - type: text
    text: ' satria izy no mpitarika ny teny nalahatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny mpisoron’ilay Jopitera teo anoloan’ny tanàna, mbamin’ny vahoaka, dia nitondra ombilahy sy voninkazo natao fihaingoana ho eo am-bavahady ka nikasa hanao fanatitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa nony nahare izany ny Apostoly, dia Barnabasy sy Paoly, dia nandriatra ny fitafiany izy ka nitsarapaka nankeo afovoan’ny olona sady niantso nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raondriana, ahoana no anaovanareo izao? Olona tahaka anareo ihany izahay ary mitory ny filazantsara aminareo, mba hialanareo amin’izao zava-poana izao hanatona an’Andriamanitra velona, Izay nanao ny lanitra sy ny tany ary ny ranomasina mbamin’izay rehetra ao anatiny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay namela ny firenena rehetra handeha tamin’ny làlana tiany haleha tamin’ny andro lasa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Kanefa tsy namela ny tenany tsy hanana vavolombelona Izy; fa manao soa Izy, mampilatsaka ny ranonorana avy eny amin’ny lanitra ho anareo sady manome taon-jina ka mahavoky ny fonareo amin’ny hanina sy ny fifaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nefa na dia nilaza izany aza izy, dia saiky tsy nahasakana ny olona tsy hamono zavatra hatao fanatitra aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nisy Jiosy tonga avy tany Antiokia sy Ikonioma, izay nitaona ny vahoaka ka nitora-bato an’i Paoly, dia nitarika azy ho eny ivelan’ny tanàna, satria nataony fa efa maty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa nony nanodidina azy ny mpianatra, dia nitsangana izy ka lasa niakatra tao an-tanàna.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nony ampitso dia niala tao izy sy Barnabasy ka nankany Derbe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary rehefa nitory ny filazantsara tamin’izany tanàna izany izy ka nahazo mpianatra maro, dia niverina nankany Lystra sy Ikonioma ary Antiokia indray izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'nampahery ny fanahin’ny mpianatra ka nananatra azy haharitra amin’ny finoana, sady nilaza fa tsy maintsy ho amin’ny fahoriana be no idirantsika amin’ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary rehefa nanendry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nampanangan-tànana nifidy.
    marker-yv: yv-n
  - type: text
    text: ' loholona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' teo amin’ny isam-piangonana izy, dia nivavaka sady nifady hanina ka dia nanolotra azy ho an’ny Tompo Izay efa ninoany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa nandeha namaky an’i Pisidia izy, dia tonga tany Pamfylia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony efa nitory ny teny tany Perga izy, dia nidina nankany Atalia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia niondrana an-tsambo niala teo izy hankany Antiokia, izay efa nanolorana azy ho amin’ny fahasoavan’Andriamanitra ho amin’ny asa izay novitainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary rehefa tonga tao izy ka namory ny fiangonana, dia nilaza izay rehetra nataon’Andriamanitra tamin’ny nombany azy, sy ny namohany varavaram-pinoana ho an’ny jentilisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nitoetra elaela ihany tamin’ny mpianatra izy.
