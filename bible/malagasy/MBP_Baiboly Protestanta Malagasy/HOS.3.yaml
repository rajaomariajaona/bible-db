document_id: HOS.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny vehivavy janga anankiray, izay natao tandindon’ny Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA hoy Jehovah tamiko: Mandehana indray, tiava vehivavy izay tian’ny vadiny nefa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tian’ny sakaizany sady.
    marker-yv: yv-n
  - type: text
    text: ' mijangajanga, dia tahaka ny fitiavan’i Jehovah ny Zanak’Isiraely, nefa ireo kosa dia mihodina ho amin’izay andriamani-kafa sady tia ampempam-boaloboka. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka dia novidiko sekely volafotsy dimy ambin’ny folo sy vary hordea homera iray sy tapany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy izaho taminy: Andro maro no hitoeranao miandry ahy; fa tsy havela hijangajanga na hanambady olon-kafa hianao; ary izaho koa dia ho toy izany aminao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa andro maro no hitoeran’ny Zanak’Isiraely tsy hanana mpanjaka, na mpanapaka, na fanatitra, na tsangam-bato, na efoda, na terafima. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa afaka izany, dia hiverina ny Zanak’Isiraely ka hitady an’i Jehovah Andriamaniny sy Davida mpanjakany; ary handeha amin-kovitra hanatona an’i Jehovah sy ny fahasoavany izy, raha mby any am-parany.
