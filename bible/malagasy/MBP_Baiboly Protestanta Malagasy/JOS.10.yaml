document_id: JOS.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandresen’ny Isiraely ny mpanjaka dimy lahy, sy ny nahazoany an’i Kanana Atsimo rehetra.
  - type: text
    content: ARY rehefa ren’i Adoni-zedeka, mpanjakan’i Jerosalema, fa afak’i Josoa Ay ka noravany
  - type: note
    content: Heb. nataony herema.
  - type: text
    content: ' (fa araka izay nataony tamin’i Jeriko sy ny mpanjakany no nataony tamin’i Ay sy ny mpanjakany), sady nanao fihavanana tamin’ny Isiraely ny mponina tany Gibeona ka tomoetra eo aminy, '
  '10':
  - type: text
    content: Ary Jehovah nampifanaritaka ireo teo anoloan’ny Isiraely; ary namely ireo tany Gibeona izy ka nahafaty maro be, sady nanenjika azy tamin’ny fiakarana mankany Beti-horona izy ka namely azy hatrany Azeka ka hatrany Makeda.
  '11':
  - type: text
    content: Ary nony nandositra teo anoloan’ny Isiraely teo am-pidinan’i Beti-horona izy, Jehovah dia nandatsaka havandra vaventy taminy avy tany an-danitra hatrany Azeka ka nahafaty azy; ary be lavitra ny matin’ny havandra noho izay novonoin’ny Zanak’Isiraely tamin’ny sabatra.
  '12':
  - type: text
    content: 'Ary tamin’izany Josoa dia niteny tamin’i Jehovah tamin’ny andro nanoloran’i Jehovah ny Amorita teo anoloan’ny Zanak’Isiraely ka nanao teo imason’ny Zanak’Isiraely hoe:'
  - type: text
    content: Ry masoandro, mijanòna
  - type: note
    content: Heb. mangìna.
  - type: text
    content: ' eo ambonin’i Gibeona;'
  - type: text
    content: Ary, hianao kosa, ry volana, any an-dohasahan’i Aialona.
  '13':
  - type: text
    content: Dia nijanona
  - type: note
    content: Heb. nangina.
  - type: text
    content: ' ny masoandro, ary nijanona koa ny volana,'
  - type: text
    content: Mandra-pamalin’ny olona ny fahavalony.
  - type: text
    content: Tsy efa voasoratra eo amin’ny Bokin’i Jasara
  - type: note
    content: Jasara = Ilay mahitsy.
  - type: text
    content: ' va izany?'
  - type: text
    content: 'Dia nijanona teo afovoan’ny lanitra ny masoandro ka tsy nandroso hilentika tokony ho indray andro maninjitra. '
  '14':
  - type: text
    content: 'Ary tsy nisy andro tahaka izany, na tany alohany, na tato aoriany, izay nihainoan’i Jehovah ny feon’olona; fa Jehovah niady ho an’ny Isiraely. '
  '15':
  - type: text
    content: Ary Josoa sy ny Isiraely rehetra dia niverina nankany an-toby tany Gilgala.
  '16':
  - type: text
    content: 'Ary nandositra ny mpanjaka dimy ka niery tao anatin’ilay zohy any Makeda. '
  '17':
  - type: text
    content: 'Dia nolazaina tamin’i Josoa hoe: Indreo, miery ao anatin’ilay zohy any Makeda ny mpanjaka dimy. '
  '18':
  - type: text
    content: 'Ary hoy Josoa: Manakodiava vato lehibe hatampina ny vavan’ny zohy, ary asio olona eo anoloany hiambina azy; '
  '19':
  - type: text
    content: fa hianareo aza mijanona, fa manenjeha ny fahavalonareo, ka mameleza ny vodi-làlana; aza avela ho tafiditra any an-tanànany ireny, fa efa natolotr’i Jehovah Andriamanitrareo eo an-tànanareo.
  '2':
  - type: text
    content: dia raiki-tahotra indrindra izy, satria tanàna lehibe Gibeona, tahaka ny anankiray amin’ny tanàna misy andriana, sady lehibe noho Ay, ary nahery ny ny lehilahy rehetra teo.
  '20':
  - type: text
    content: 'Ary rehefa voaringan’i Josoa sy ny Zanak’Isiraely mihitsy ireny mandra-pahalany ritrany, ka izay afa-nandositra no lasa niditra tany amin’ny tanàna mimanda, '
  '21':
  - type: text
    content: dia niverina soa aman-tsara ho any amin’i Josoa teo an-toby tany Makeda ny vahoaka rehetra; ary tsy nisy sahy nanao vava ratsy
  - type: note
    content: Heb. nandranitra ny lelany.
  - type: text
    content: ' tamin’ny Zanak’Isiraely intsony.'
  '22':
  - type: text
    content: 'Dia hoy Josoa: Sokafy ny vavan’ny zohy, ka avoahy ao an-johy ireo mpanjaka dimy ireo hankatỳ amiko. '
  '23':
  - type: text
    content: Dia nataon’ny olona izany, ka namoaka ireo mpanjaka dimy ireo avy tao an-johy izy ho eo aminy, dia ny mpanjakan’i Jerosalema, ny mpanjakan’i Hebrona, ny mpanjakan’i Jarmota, ny mpanjakan’i Lakisy, ary ny mpanjakan’i Eglona.
  '24':
  - type: text
    content: 'Ary rehefa navoaka ireo mpanjaka ireo ka nentina ho eo amin’i Josoa, dia niantso ny lehilahy rehetra amin’ny Isiraely Josoa ka nanao tamin’ny mpitarika ny mpiady izay teo aminy hoe: Manatòna, ka ataovy eo amin’ny vozon’ ireto mpanjaka ireto ny tongotrareo. Dia nanatona izy ka nanao ny tongony teo amin’ny vozon’ireo. '
  '25':
  - type: text
    content: 'Ary hoy Josoa taminy: Aza matahotra na mivadi-po; mahereza sy matanjaha; fa toy izao no hataon’i Jehovah amin’ny fahavalonareo rehetra izay iadianareo.'
  '26':
  - type: text
    content: 'Ary rehefa afaka izany, dia namely ireo Josoa ka nahafaty azy, ary nahantony tamin’ny hazo dimy ny fatiny; ka dia nihantona tamin’ny hazo izy mandra-paharivan’ny andro. '
  '27':
  - type: text
    content: Ary tamin’ny nilentehan’ny masoandro dia nasain’i Josoa nesorina tamin’ny hazo izy ireo ka nariana tao anatin’ilay zohy niereny, ary nasiana vato lehibe teo amin’ny vavan’ny zohy, ka mbola ao izany mandraka andro-any.
  '28':
  - type: text
    content: Ary Makeda dia afak’i Josoa tamin’izany andro izany, ka nasiany tamin’ny lelan-tsabatra izy sy ny mpanjakany; ary ny olona rehetra tao dia naringany
  - type: note
    content: Heb. nataony herema; izahao Lev. xxvii. 28.
  - type: text
    content: ' avokoa ka tsy nasiany niangana na dia iray akory aza; ary tahaka izay efa nataony tamin’ny mpanjakan’i Jeriko, no nataony tamin’ny mpanjakan’i Makeda koa.'
  '29':
  - type: text
    content: 'Ary Josoa sy ny Isiraely rehetra teo aminy dia niala tany Makeda ka nankany Libna ary namely azy; '
  '3':
  - type: text
    content: 'Dia naniraka olona Adoni-zedeka, mpanjakan’i Jerosalema, ho any amin’i Hohama, mpanjakan’i Hebrona, sy Pirama, mpanjakan’i Jarmota, sy Jafia, mpanjakan’i Lakisy, ary Debira, mpanjakan’i Eglona, ka nanao hoe: '
  '30':
  - type: text
    content: dia natolotr’i Jehovah teo an-tànan’ny Isiraely koa izy sy ny mpanjakany, ka nasiany tamin’ny lelan-tsabatra izy mbamin’ny olona rehetra tao; tsy nasiany niangana na dia iray akory aza; ary tahaka izay efa nataony tamin’ny mpanjakan’i Jeriko no nataony tamin’ny mpanjakany koa.
  '31':
  - type: text
    content: 'Dia niala tany Libna Josoa sy ny Isiraely rehetra teo aminy ka nankany Lakisy, dia nitoby tandrifiny ka namely azy. '
  '32':
  - type: text
    content: Dia natolotr’i Jehovah teo an-tànan’ny Isiraely koa Lakisy, ka afany tamin’ny andro faharoa izy; dia nasiany tamin’ny lelan-tsabatra izy sy ny olona rehetra tao, tahaka izay rehetra efa nataony tamin’i Libna koa.
  '33':
  - type: text
    content: Dia niakatra Horama, mpanjakan’i Gazera, hamonjy an’i Lakisy; dia nasian’i Josoa izy sy ny vahoakany mandra-paha-tsy nisy niangana.
  '34':
  - type: text
    content: 'Dia niala tany Lakisy Josoa sy ny Isiraely rehetra teo aminy ka nankany Eglona, dia nitoby tandrifiny ka namely azy; '
  '35':
  - type: text
    content: dia afany tamin’izany andro izany koa izy ka nasiany tamin’ny lelan-tsabatra; ary ny olona, rehetra tao dia naringany
  - type: note
    content: Heb. nataony herema; izahao Lev. xxvii. 28.
  - type: text
    content: ' tamin’izany andro izany, tahaka izay rehetra efa nataony tamin’i Lakisy.'
  '36':
  - type: text
    content: 'Dia niakatra niala tany Eglona Josoa sy ny Isiraely rehetra teo aminy ka nankany Hebrona ary namely azy; '
  '37':
  - type: text
    content: dia afany koa izy, ka nasiany tamin’ny lelan-tsabatra izy sy ny mpanjakany sy ny tanànany rehetra ary ny olona rehetra tao; tsy nasiany niangana na dia iray akory aza, tahaka izay rehetra efa nataony tamin’i Eglona; fa naringany
  - type: note
    content: Heb. nataony herema; izahao Lev. xxvii. 28.
  - type: text
    content: ' avokoa izy sy ny olona rehetra tao.'
  '38':
  - type: text
    content: 'Dia niverina Josoa sy ny Isiraely rehetra teo aminy ka nankany Debira ary namely azy; '
  '39':
  - type: text
    content: dia azony koa izy sy ny mpanjakany ary ny tanànany rehetra; ary nasiany tamin’ny lelan-tsabatra izy, ka naringany
  - type: note
    content: Heb. nataony herema; izahao Lev. xxvii. 28.
  - type: text
    content: ' avokoa ny olona rehetra tao; fa tsy nasiany niangana na dia iray akory aza; tahaka izay efa nataony tamin’i Hebrona, dia toy izany koa no nataony tamin’i Debira sy ny mpanjakany, ary tahaka izay efa nataony tamin’i Libna sy ny mpanjakany koa.'
  '4':
  - type: text
    content: 'Miakara atỳ amiko, ka manampia ahy, hamelezantsika an’i Gibeona; fa efa nanao fihavanana tamin’i Josoa sy ny Zanak’Isiraely izy. '
  '40':
  - type: text
    content: Dia nasian’i Josoa ny tany rehetra sy ny mpanjakany rehetra, dia ny tany havoana sy ny tany atsimo sy ny tany lemaka amorontsiraka
  - type: note
    content: Heb. Sefela.
  - type: text
    content: ' ary ny any ambodin’ny tendrombohitra; tsy nasiany niangana ireny, fa naringany'
  - type: note
    content: Heb. nataony herema; izahao Lev. xxvii. 28.
  - type: text
    content: ' avokoa ny olo-miaina rehetra, araka ny didin’i Jehovah, Andriamanitry ny Isiraely. '
  '41':
  - type: text
    content: 'Dia nasian’i Josoa izy hatrany Kadesi-barnea ka hatrany Gaza, ary ny tany Gosena rehetra hatrany Gibeona. '
  '42':
  - type: text
    content: 'Ary ireo mpanjaka rehetra ireo sy ny taniny dia azon’i Josoa indray mandeha, satria Jehovah, Andriamanitry ny Isiraely, no niady ho an’ny Isiraely. '
  '43':
  - type: text
    content: Dia niverina Josoa sy ny Isriaely rehetra teo aminy ho any an-toby tany Gilgala.
  '5':
  - type: text
    content: Dia niangona ireo mpanjaka dimy tamin’ny Amorita ireo, dia ny mpanjakan’i Jerosalema, ny mpanjakan’i Hebrona, ny mpanjakan’i Jarmota, ny mpanjakan’i Lakisy, ary ny mpanjakan’i Eglona, ka niakatra izy sy ny miaramilany rehetra, ary nitoby tandrifin’i Gibeona ka namely azy.
  '6':
  - type: text
    content: 'Ary ny mponina tao Gibeona dia naniraka olona ho any amin’i Josoa teo an-toby tany Gilgala hanao hoe: Aza mampiketraka ny tànanao tsy hamonjy ny mpanomponao; miakara faingana ho atỳ aminay, ary vonjeo sy ampio izahay; fa miangona hamely anay ny mpanjaka rehetra amin’ny Amorita izay monina any amin’ny tany havoana. '
  '7':
  - type: text
    content: Dia niakatra niala tany Gilgala Josoa sy ny mpanafika rehetra teo aminy, dia ny lehilahy mahery rehetra.
  '8':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Josoa: Aza matahotra azy, fa efa natolotra eo an-tànanao izy, ka tsy hisy hahajanona eo anoloanao izy na dia iray akory aza. '
  '9':
  - type: text
    content: 'Ary tonga tampoka tamin’ireo Josoa; fa nanao lava alina avy tany Gilgala izy. '
