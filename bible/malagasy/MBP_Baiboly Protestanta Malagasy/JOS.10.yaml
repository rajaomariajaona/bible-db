          text: xxvii. 28.
      marker-yv: yv-n
    - type: text
      text: ' avokoa ny olo-miaina rehetra, araka ny didin’i Jehovah, Andriamanitry ny Isiraely. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasian’i Josoa izy hatrany Kadesi-barnea ka hatrany Gaza, ary ny tany Gosena rehetra hatrany Gibeona. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo mpanjaka rehetra ireo sy ny taniny dia azon’i Josoa indray mandeha, satria Jehovah, Andriamanitry ny Isiraely, no niady ho an’ny Isiraely. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niverina Josoa sy ny Isriaely rehetra teo aminy ho any an-toby tany Gilgala.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niangona ireo mpanjaka dimy tamin’ny Amorita ireo, dia ny mpanjakan’i Jerosalema, ny mpanjakan’i Hebrona, ny mpanjakan’i Jarmota, ny mpanjakan’i Lakisy, ary ny mpanjakan’i Eglona, ka niakatra izy sy ny miaramilany rehetra, ary nitoby tandrifin’i Gibeona ka namely azy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mponina tao Gibeona dia naniraka olona ho any amin’i Josoa teo an-toby tany Gilgala hanao hoe: Aza mampiketraka ny tànanao tsy hamonjy ny mpanomponao; miakara faingana ho atỳ aminay, ary vonjeo sy ampio izahay; fa miangona hamely anay ny mpanjaka rehetra amin’ny Amorita izay monina any amin’ny tany havoana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niakatra niala tany Gilgala Josoa sy ny mpanafika rehetra teo aminy, dia ny lehilahy mahery rehetra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Josoa: Aza matahotra azy, fa efa natolotra eo an-tànanao izy, ka tsy hisy hahajanona eo anoloanao izy na dia iray akory aza. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tampoka tamin’ireo Josoa; fa nanao lava alina avy tany Gilgala izy. '
