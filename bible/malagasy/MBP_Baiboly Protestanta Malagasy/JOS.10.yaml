document_id: JOS.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandresen’ny Isiraely ny mpanjaka dimy lahy, sy ny nahazoany an’i Kanana Atsimo rehetra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY rehefa ren’i Adoni-zedeka, mpanjakan’i Jerosalema, fa afak’i Josoa Ay ka noravany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nataony herema.
      marker-yv: yv-n
    - type: text
      text: ' (fa araka izay nataony tamin’i Jeriko sy ny mpanjakany no nataony tamin’i Ay sy ny mpanjakany), sady nanao fihavanana tamin’ny Isiraely ny mponina tany Gibeona ka tomoetra eo aminy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jehovah nampifanaritaka ireo teo anoloan’ny Isiraely; ary namely ireo tany Gibeona izy ka nahafaty maro be, sady nanenjika azy tamin’ny fiakarana mankany Beti-horona izy ka namely azy hatrany Azeka ka hatrany Makeda.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony nandositra teo anoloan’ny Isiraely teo am-pidinan’i Beti-horona izy, Jehovah dia nandatsaka havandra vaventy taminy avy tany an-danitra hatrany Azeka ka nahafaty azy; ary be lavitra ny matin’ny havandra noho izay novonoin’ny Zanak’Isiraely tamin’ny sabatra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’izany Josoa dia niteny tamin’i Jehovah tamin’ny andro nanoloran’i Jehovah ny Amorita teo anoloan’ny Zanak’Isiraely ka nanao teo imason’ny Zanak’Isiraely hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry masoandro, mijanòna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mangìna.
      marker-yv: yv-n
    - type: text
      text: ' eo ambonin’i Gibeona;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary, hianao kosa, ry volana, any an-dohasahan’i Aialona.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nijanona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nangina.
      marker-yv: yv-n
    - type: text
      text: ' ny masoandro, ary nijanona koa ny volana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pamalin’ny olona ny fahavalony.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy efa voasoratra eo amin’ny Bokin’i Jasara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jasara = Ilay mahitsy.
      marker-yv: yv-n
    - type: text
      text: ' va izany?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijanona teo afovoan’ny lanitra ny masoandro ka tsy nandroso hilentika tokony ho indray andro maninjitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nisy andro tahaka izany, na tany alohany, na tato aoriany, izay nihainoan’i Jehovah ny feon’olona; fa Jehovah niady ho an’ny Isiraely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Josoa sy ny Isiraely rehetra dia niverina nankany an-toby tany Gilgala.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandositra ny mpanjaka dimy ka niery tao anatin’ilay zohy any Makeda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nolazaina tamin’i Josoa hoe: Indreo, miery ao anatin’ilay zohy any Makeda ny mpanjaka dimy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Josoa: Manakodiava vato lehibe hatampina ny vavan’ny zohy, ary asio olona eo anoloany hiambina azy; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa hianareo aza mijanona, fa manenjeha ny fahavalonareo, ka mameleza ny vodi-làlana; aza avela ho tafiditra any an-tanànany ireny, fa efa natolotr’i Jehovah Andriamanitrareo eo an-tànanareo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia raiki-tahotra indrindra izy, satria tanàna lehibe Gibeona, tahaka ny anankiray amin’ny tanàna misy andriana, sady lehibe noho Ay, ary nahery ny ny lehilahy rehetra teo.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa voaringan’i Josoa sy ny Zanak’Isiraely mihitsy ireny mandra-pahalany ritrany, ka izay afa-nandositra no lasa niditra tany amin’ny tanàna mimanda, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia niverina soa aman-tsara ho any amin’i Josoa teo an-toby tany Makeda ny vahoaka rehetra; ary tsy nisy sahy nanao vava ratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nandranitra ny lelany.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny Zanak’Isiraely intsony.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Josoa: Sokafy ny vavan’ny zohy, ka avoahy ao an-johy ireo mpanjaka dimy ireo hankatỳ amiko. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataon’ny olona izany, ka namoaka ireo mpanjaka dimy ireo avy tao an-johy izy ho eo aminy, dia ny mpanjakan’i Jerosalema, ny mpanjakan’i Hebrona, ny mpanjakan’i Jarmota, ny mpanjakan’i Lakisy, ary ny mpanjakan’i Eglona.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa navoaka ireo mpanjaka ireo ka nentina ho eo amin’i Josoa, dia niantso ny lehilahy rehetra amin’ny Isiraely Josoa ka nanao tamin’ny mpitarika ny mpiady izay teo aminy hoe: Manatòna, ka ataovy eo amin’ny vozon’ ireto mpanjaka ireto ny tongotrareo. Dia nanatona izy ka nanao ny tongony teo amin’ny vozon’ireo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Josoa taminy: Aza matahotra na mivadi-po; mahereza sy matanjaha; fa toy izao no hataon’i Jehovah amin’ny fahavalonareo rehetra izay iadianareo.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka izany, dia namely ireo Josoa ka nahafaty azy, ary nahantony tamin’ny hazo dimy ny fatiny; ka dia nihantona tamin’ny hazo izy mandra-paharivan’ny andro. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tamin’ny nilentehan’ny masoandro dia nasain’i Josoa nesorina tamin’ny hazo izy ireo ka nariana tao anatin’ilay zohy niereny, ary nasiana vato lehibe teo amin’ny vavan’ny zohy, ka mbola ao izany mandraka andro-any.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Makeda dia afak’i Josoa tamin’izany andro izany, ka nasiany tamin’ny lelan-tsabatra izy sy ny mpanjakany; ary ny olona rehetra tao dia naringany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'nataony herema; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Lev. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxvii. 28.
      marker-yv: yv-n
    - type: text
      text: ' avokoa ka tsy nasiany niangana na dia iray akory aza; ary tahaka izay efa nataony tamin’ny mpanjakan’i Jeriko, no nataony tamin’ny mpanjakan’i Makeda koa.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Josoa sy ny Isiraely rehetra teo aminy dia niala tany Makeda ka nankany Libna ary namely azy; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka olona Adoni-zedeka, mpanjakan’i Jerosalema, ho any amin’i Hohama, mpanjakan’i Hebrona, sy Pirama, mpanjakan’i Jarmota, sy Jafia, mpanjakan’i Lakisy, ary Debira, mpanjakan’i Eglona, ka nanao hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia natolotr’i Jehovah teo an-tànan’ny Isiraely koa izy sy ny mpanjakany, ka nasiany tamin’ny lelan-tsabatra izy mbamin’ny olona rehetra tao; tsy nasiany niangana na dia iray akory aza; ary tahaka izay efa nataony tamin’ny mpanjakan’i Jeriko no nataony tamin’ny mpanjakany koa.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala tany Libna Josoa sy ny Isiraely rehetra teo aminy ka nankany Lakisy, dia nitoby tandrifiny ka namely azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia natolotr’i Jehovah teo an-tànan’ny Isiraely koa Lakisy, ka afany tamin’ny andro faharoa izy; dia nasiany tamin’ny lelan-tsabatra izy sy ny olona rehetra tao, tahaka izay rehetra efa nataony tamin’i Libna koa.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niakatra Horama, mpanjakan’i Gazera, hamonjy an’i Lakisy; dia nasian’i Josoa izy sy ny vahoakany mandra-paha-tsy nisy niangana.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala tany Lakisy Josoa sy ny Isiraely rehetra teo aminy ka nankany Eglona, dia nitoby tandrifiny ka namely azy; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia afany tamin’izany andro izany koa izy ka nasiany tamin’ny lelan-tsabatra; ary ny olona, rehetra tao dia naringany
