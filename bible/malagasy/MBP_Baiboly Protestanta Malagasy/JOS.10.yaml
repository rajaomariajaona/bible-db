  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miakara atỳ amiko, ka manampia ahy, hamelezantsika an’i Gibeona; fa efa nanao fihavanana tamin’i Josoa sy ny Zanak’Isiraely izy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nasian’i Josoa ny tany rehetra sy ny mpanjakany rehetra, dia ny tany havoana sy ny tany atsimo sy ny tany lemaka amorontsiraka
    - type: usfm
      marker: f
      children:
      - type: usfm
