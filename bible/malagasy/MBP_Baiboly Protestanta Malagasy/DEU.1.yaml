document_id: DEU.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Teny nataon’i Mosesy ho fampahatsiarovana ny soa nataon’Andriamanitra tamin’ny Isiraely sy ny nitondrany azy hatrany Horeba ka hatrany an-dafy atsinanan’i Jordana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: IZAO no teny izay nolazain’i Mosesy tamin’ny Isiraely rehetra tany an-dafin’i Jordana, tany an-efitra, dia tany amin’ny tani-hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' tandrifin’i Sofa, tanelanelan’i Parana sy Tofela sy Labana sy Hazerota ary Di-zahaba. ( '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Làlana iraika ambin’ny folo andro Kadesi-barnea raha ao Horeba, raha ny làlana mahazo ny tendrombohitra Seïra no aleha.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tamin’ny andro voalohany tamin’ny volana fahiraika ambin’ny folo tamin’ny taona fahefa-polo dia niteny tamin’ny Zanak’Isiraely Mosesy, araka izay rehetra efa nandidian’i Jehovah azy holazainy aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'rehefa namono an’i Sihona, mpanjakan’ny Amorita, ilay nonina tao Hesbona, sy Oga, mpanjakan’i Basana, ilay nonina tao Astarta tany Edrehy, izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tany an-dafin’i Jordana, dia tany amin’ny tany Moaba, no nanombohan’i Mosesy nanazava izao lalàna izao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jehovah Andriamanitsika niteny tamintsika tany Horeba ka nanao hoe: Aoka izay ny itoeranareo amin’ity tendrombohitra ity; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mihodìna hianareo, dia mandehana ka mankanesa any amin’ny tany havoan’ny Amorita sy any amin’izay rehetra ao akaikiny, dia any amin’ny tani-hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tany havoana sy ny tany lemaka amorontsiraka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sefela.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tany atsimo sy ny amoron’ny ranomasina, dia any amin’ny tanin’ny Kananita sy any Libanona ka hatrany amin’ny ony lehibe, dia ny ony Eofrata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Indro, efa natolotro eo anoloanareo ny tany; idiro ka lovao ny tany izay efa nianianan’i Jehovah tamin’ny razanareo, Abrahama sy Isaka ary Jakoba, homena azy sy ny taranany mandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary niteny taminareo tamin’izany andro izany aho ka nanao hoe: Tsy zakako izaho irery ny hitondra anareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jehovah Andriamanitrareo efa nahamaro anareo, ary, indro, efa maro toy ny kintana eny amin’ny lanitra hianareo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(Jehovah, Andriamanitry ny razanareo, anie hampitombo anareo ho arivo toraka izao ka hitahy anareo, araka izay efa nolazainy taminareo!) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hataoko izaho irery ahoana no fitondra ny fahasahirananareo sy ny entanareo ary ny adinareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mifidiana izay lehilahy hendry sy manantsaina ary hita toetra amin’ny firenenareo, ka hataoko ho lehibenareo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia namaly ahy hianareo ka nanao hoe: Tsara ny teny izay nolazainao ka tokony hankatoavina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nalaiko ny lohan’ny firenenareo, dia olona hendry sady hita toetra, ka nataoko mpifehy anareo, dia mpifehy arivo sy mpifehy zato sy mpifehy dimam-polo sy mpifehy folo ary mpitondra vahoaka amin’ny firenenareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nandidy ny mpitsara anareo tamin’izany andro izany aho ka nanao hoe: Henoy ny adin’ny rahalahinareo, ka tsarao marina ny olona, na ny tompon-tany, na ny vahiny eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza mizaha tavan’olona amin’ny fitsarana, fa henoy ny kely toy ny lehibe; aza matahotra olona akory, fa an’Andriamanitra ny fitsarana; ary izay sarotra loatra aminareo dia ento etỳ amiko ka hohenoiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia nandidy anareo tamin’izany andro izany aho ny amin’ny zavatra rehetra izay hataonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nony niala tany Horeba isika, dia nandeha namaky ilay efitra lehibe sy mahatahotra izay hitanareo teny amin’ny làlana mankany amin’ny tany havoan’ny Amorita, araka izay efa nandidian’i Jehovah Andriamanitsika; dia tonga tao Kadesi-barnea isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy izaho taminareo: Hianareo efa tonga eto amin’ny tany havoan’ny Amorita, izay omen’i Jehovah Andriamanitsika ho antsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: indro, efa natolotr’i Jehovah Andriamanitrao eo anoloanao ny tany; iakaro izy ka lovao, araka izay nolazain’i Jehovah, Andriamanitry ny razanao, taminao; aza matahotra na mivadi-po hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nanatona ahy hianareo rehetra ka nanao hoe: Aoka haniraka olona hialoha isika, mba hisafo ny tany ho antsika izy ka hitondra teny amintsika hilaza ny làlana izay halehantsika sy ny tanàna izay hiakarantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary sitrako ny teny ka dia nifidy roa ambin’ny folo lahy teo aminareo aho, iray avy isam-pirenena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary niainga ireo ka niakatra tany amin’ny tany havoana, dia tonga tao amin’ny lohasaha Eskola ka nisafo ny tany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'dia nangalany ny vokatry ny tany ka nentiny nidina tamintsika, dia nilaza tamintsika hoe izy: Tsara ny tany izay omen’i Jehovah Andriamanitsika ho antsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Kanefa tsy nety niakatra hianareo, fa nandà ny tenin’i Jehovah Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nimonomonona tao an-dainareo hianareo ka nanao hoe: Halan’i Jehovah isika, no nitondrany antsika nivoaka avy tany Egypta hanolorany antsika eo an-tànan’ny Amorita handringanana antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ho aiza no hiakarantsika? Ny rahalahintsika efa nanaketraka ny fontsika tamin’ny nanaovany hoe: Lehibe sy lava noho isika ny olona; ary ny tanàna dia lehibe sady misy mànda manakatra ny lanitra; ary efa hitanay teo koa ny taranaky ny Anakita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy izaho taminareo: Aza manahy, ary aza matahotra azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jehovah Andriamanitrareo, Izay mandeha eo anoloanareo, Izy no hiady ho anareo, araka izay rehetra nataony ho anareo tany Egypta teo imasonareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ary tany an-efitra, izay nahitanao ny fitondran’i Jehovah Andriamanitrao anao tahaka ny fitondran’ny olona ny zanany, dia teny amin’ny làlana rehetra izay nalehanareo mandra-pahatonganareo teto amin’ity tany ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Kanefa, na dia nataoko aza izany teny izany, mbola tsy ninoanareo ihany Jehovah Andriamanitrareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izay nandeha tamin’ny làlana teo alohanareo hitady tany ho anareo hitobianareo, ka ny afo nony alina sy ny rahona nony antoandro no nisehoany hanoro izay làlana nety halehanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nandre ny teninareo Jehovah, dia tezitra Izy ka nianiana hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tsy hisy olona mihitsy amin’izao taranaka ratsy fanahy izao hahita ny tany soa izay nianianako homena ny razanareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'afa-tsy Kaleba, zanak’i Jefone; izy no hahita azy, ary izy sy ny zanany no homeko ny tany izay nodiaviny, satria efa tanteraka tamin’ny fanarahana an’i Jehovah izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary izaho koa dia notezeran’i Jehovah noho ny aminareo ka nataony hoe: Hianao koa tsy hiditra any; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'fa Josoa, zanak’i Nona, izay mitsangana eo anatrehanao, izy no hiditra any, koa izy no ampaherezo, fa izy no hampandova ny Zanak’Isiraely ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny zanakareo madinika, izay nolazainareo fa ho babo, ary ny zanakareo izay tsy mahalala ny tsara sy ny ratsy amin’izao andro izao, dia izy no hiditra any, ary izy no homeko ny tany, ary izy no handova azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Fa hianareo kosa dia miverena, ka mandehana any an’efitra, dia any amin’ny làlana mankany amin’ny Ranomasina Mena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia namaly hianareo ka nanao tamiko hoe: Efa nanota tamin’i Jehovah izahay; hiakatra ihany izahay ka hiady, araka izay rehetra nandidian’i Jehovah Andriamanitsika antsika. Dia samy nivonona tamin ny fiadiany avy hianareo rehetra, ka nataonareo ho tsinontsinona ny hiakatra any an-tendrombohitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia hoy Jehovah tamiko: Lazao aminy hoe: Aza miakatra hianareo, ary aza miady, fa tsy eo aminareo Aho; fandrao ho resy eo anoloan’ny fahavalonareo hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia niteny taminareo aho, nefa tsy nihaino ianareo; ary nandà ny tenin’i Jehovah hianareo, dia nanao sahisahy ka niakatra tany an-tendrombohitra ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Dia nivoaka hiady aminareo ny Amorita, izay nonina tamin’izany tendrombohitra izany, ka nanenjika anareo tahaka ny fanenjiky ny reni-tantely, dia nandringana anareo tany Seïra ka hatrany Horma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Dia niverina hianareo ka nitomany teo anatrehan’i Jehovah; nefa tsy nihaino ny feonareo Jehovah, na nanongilana ny sofiny taminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Dia nitoetra ela tao Kadesy hianareo, araka ny andro izay nitoeranareo tao.
