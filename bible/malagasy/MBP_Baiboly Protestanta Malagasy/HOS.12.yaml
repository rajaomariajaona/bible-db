document_id: HOS.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fananarana ny Isiraely noho ny helony.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: EFRAIMA manodidina Ahy amin’ny lainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranak’Isiraely amin’ny fitaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Joda mbola mikarenjy tsy manatona an’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny Iray Masina sy Mahatoky.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nefa Izaho no Jehovah Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatrany amin’ny tany Egypta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mbola hampitoetra anao an-day indray Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny tamin’ny fotoam-pivavahana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Efa niteny tamin’ny mpaminany koa Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady Izaho no nahabetsaka ny fahitana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpaminany dia nampilazaiko ohatra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha tena heloka Gileada,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tonga zava-poana tokoa izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany Gilgala no namonoany omby betsaka ho fanatitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ny alitarany dia ho toy ny korontam-bato eny am-bavasa any an-tsaha.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Jakoba nandositra ho any amin’ny tany Syria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isiraely nanompo hahazoany vady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, ny hahazoany vady no niandrasany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ondry aman-osy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mpaminany no nentin’i Jehovah nitondra ny Isiraely nivoaka avy tany Egypta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mpaminany koa no nentina niahy azy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nanao izay nahatezitra indrindra Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia havelan’ny Tompony ho eo aminy ny rany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatsingeriny aminy ny vava ratsy nataony.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Efraima homan-drivotra sady manenjika ny rivotra avy any atsinanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandritra ny andro dia ataony betsaka ny lainga sy ny fandozana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao fanekena amin’ny Asyriana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary diloilo no entina ho any Egypta.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Manana ady amin’i Joda koa Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy maintsy mamaly an’i Jakoba araka ny alehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hatsingeriny aminy ny nataony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fony mbola tany am-bohoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nihazona ny ombelahin-tongotry ny rahalahiny izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa lehibe izy, dia nitolona tamin’Andriamanitra;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Eny, nitolona tamin’Ilay Anjely izy ka nahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitomany izy sady nifona taminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita azy tao Betela Izy, ary tao no niresahany tamintsika;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Jehovah, Andriamanitry ny maro,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no hahatsiarovana Azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Koa miverena amin’Andriamanitrao hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo ny famindrampo sy ny rariny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miandrasa an’Andriamanitrao mandrakariva.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpandranto izy.
      marker-yv: yv-n
    - type: text
      text: –eny an-tànany misy mizana miangatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny manambaka no tiany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa hoy Efraima: Fiharian-karena ihany no efa nataoko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahazo fananana aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny asako rehetra tsy misy hahatonga fahotana na heloka amiko.
