document_id: HOS.12,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana ny Isiraely noho ny helony.
  - type: text
    content: EFRAIMA manodidina Ahy amin’ny lainga,
  - type: text
    content: Ary ny taranak’Isiraely amin’ny fitaka;
  - type: text
    content: Ary Joda mbola mikarenjy tsy manatona an’Andriamanitra,
  - type: text
    content: Dia ny Iray Masina sy Mahatoky.
  '10':
  - type: text
    content: Nefa Izaho no Jehovah Andriamanitrao
  - type: text
    content: Hatrany amin’ny tany Egypta;
  - type: text
    content: Ary mbola hampitoetra anao an-day indray Aho
  - type: text
    content: Tahaka ny tamin’ny fotoam-pivavahana.
  '11':
  - type: text
    content: Efa niteny tamin’ny mpaminany koa Aho,
  - type: text
    content: Sady Izaho no nahabetsaka ny fahitana,
  - type: text
    content: Ary ny mpaminany dia nampilazaiko ohatra.
  '12':
  - type: text
    content: Raha tena heloka Gileada,
  - type: text
    content: Dia ho tonga zava-poana tokoa izy;
  - type: text
    content: Tany Gilgala no namonoany omby betsaka ho fanatitra,
  - type: text
    content: Koa ny alitarany dia ho toy ny korontam-bato eny am-bavasa any an-tsaha.
  '13':
  - type: text
    content: Jakoba nandositra ho any amin’ny tany Syria,
  - type: text
    content: Isiraely nanompo hahazoany vady,
  - type: text
    content: 'Eny, ny hahazoany vady no niandrasany '
  - type: text
    content: ondry aman-osy.
  '14':
  - type: text
    content: Mpaminany no nentin’i Jehovah nitondra ny Isiraely nivoaka avy tany Egypta,
  - type: text
    content: Ary mpaminany koa no nentina niahy azy.
  '15':
  - type: text
    content: Nanao izay nahatezitra indrindra Efraima,
  - type: text
    content: Ka dia havelan’ny Tompony ho eo aminy ny rany,
  - type: text
    content: Ary hatsingeriny aminy ny vava ratsy nataony.
  '2':
  - type: text
    content: Efraima homan-drivotra sady manenjika ny rivotra avy any atsinanana,
  - type: text
    content: Mandritra ny andro dia ataony betsaka ny lainga sy ny fandozana;
  - type: text
    content: Manao fanekena amin’ny Asyriana izy,
  - type: text
    content: Ary diloilo no entina ho any Egypta.
  '3':
  - type: text
    content: Manana ady amin’i Joda koa Jehovah
  - type: text
    content: Ary tsy maintsy mamaly an’i Jakoba araka ny alehany,
  - type: text
    content: Ka hatsingeriny aminy ny nataony.
  '4':
  - type: text
    content: Fony mbola tany am-bohoka
  - type: text
    content: Dia nihazona ny ombelahin-tongotry ny rahalahiny izy,
  - type: text
    content: Ary rehefa lehibe izy, dia nitolona tamin’Andriamanitra;
  '5':
  - type: text
    content: Eny, nitolona tamin’Ilay Anjely izy ka nahery;
  - type: text
    content: Nitomany izy sady nifona taminy;
  - type: text
    content: Nahita azy tao Betela Izy, ary tao no niresahany tamintsika;
  '6':
  - type: text
    content: Jehovah, Andriamanitry ny maro,–
  - type: text
    content: Jehovah no hahatsiarovana Azy.
  '7':
  - type: text
    content: Koa miverena amin’Andriamanitrao hianao;
  - type: text
    content: Tandremo ny famindrampo sy ny rariny.
  - type: text
    content: Ary miandrasa an’Andriamanitrao mandrakariva.
  '8':
  - type: text
    content: Kanana
  - type: note
    content: 'Na: Mpandranto izy.'
  - type: text
    content: –eny an-tànany misy mizana miangatra,
  - type: text
    content: Ny manambaka no tiany.
  '9':
  - type: text
    content: 'Fa hoy Efraima: Fiharian-karena ihany no efa nataoko,'
  - type: text
    content: Nahazo fananana aho;
  - type: text
    content: Ny asako rehetra tsy misy hahatonga fahotana na heloka amiko.
