document_id: ACT.22
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry rahalahy sy hianareo ray, henoy ny teny halahatro aminareo ankehitriny hanala tsiny ny tenako. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nony ren’ny olona fa teny Hebreo no nitenenany taminy, dia mainka nangina izy; ary hoy Paoly: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izaho lehilahy Jiosy, teraka tany Tarsosy any Kilikia, fa teto amin’ity tanàna ity no nahabe ahy teo anilan’ny tongotr’i Gamaliela, dia nampianarina tsara ny lalàna avy tamin’ny razana aho, ary nazoto indrindra ho an’Andriamanitra tahaka anareo rehetra ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nanenjika izay nanaiky izany fampianarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' izany aho hatramin’ny mahafaty azy aza, dia namatotra azy, na lahy na vavy ka nanolotra azy hatao an-trano-maizina; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary ny mpisoronabe sy ny loholona rehetra no vavolombeloko, sady izy no nandraisako taratasy ho amin’ny rahalahy, dia nankany Damaskosy aho, mba ho entiko am-patorana hankany Jerosalema koa izay hita teo, mba hampijalina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha nandeha aho ka mby teo akaiky an’i Damaskosy, tamin’ilay antoandrobe iny, dia nisy mazava lehibe nanelatrelatra tampoka avy tany an-danitra manodidina ahy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia lavo tamin’ny tany aho ka nandre feo nilaza tamiko hoe: Saoly, Saoly, nahoana hianao no manenjika Ahy? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izaho namaly hoe: Iza moa Hianao, Tompoko? Dia hoy Izy tamiko: Izaho no Jesosy avy any Nazareta, Izay enjehinao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izay niaraka tamiko dia nahita ny mazava; nefa tsy mba nahare ny feon’Izay niteny tamiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy izaho: Tompoko, inona no hataoko? Dia hoy ny Tompo tamiko: Mitsangàna, ka mandehana ho any Damaskosy; fa any no holazaina aminao izay rehetra voatendry hataonao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha tsy nahajery aho noho ny famirapiratan’izany mazava izany, dia notantanan’ireo niaraka tamiko aho, ka dia tonga tany Damaskosy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny lehilahy anankiray atao hoe Ananiasy, mpivavaka manaraka ny lalàna sady tsara laza teo amin’ny Jiosy rehetra izay nonina teo, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia nanatona ahy ary nitsangana ka nanao tamiko hoe: Ry Saoly rahalahy, mahirata. Ary tamin’izany ora izany dia nahiratra aho ka nahita azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy izy: Andriamanitry ny razantsika efa nanendry anao hahafantatra ny sitrapony sy hahita ny Iray Marina ary hihaino ny teny aloaky ny vavany; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa ho vavolombelony amin’ny olona rehetra hianao ny amin’izay efa hitanao sy renao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ankehitriny inona no mampijanona anao? Mitsangàna, miantsoa ny anarany, ary aoka hatao batisa hianao ka hosasana ho afaka amin’ny fahotanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa tonga tany Jerosalema indray aho ka nivavaka teo an-kianjan’ny tempoly, dia azon-tsindrimandry '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ka nahita Azy milaza amiko hoe: Maladia hianao, ka mivoaha faingana an’i Jerosalema; fa tsy handray ny fanambaranao Ahy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy izaho: Tompoko, izy ireo mahalala fa ny mino Anao dia nataoko tao an-trano-maizina sady nokapohiko tao amin’ny synagoga rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary raha nalatsaka ny ran’i Stefana martioranao, izaho koa dia mba nitsangana teo ka nanaiky sady nitandrina ny fitafian’izay namono azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Izy tamiko: Mandehana, fa Izaho haniraka anao handeha lavitra any amin’ny jentilisa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny olona nihaino azy hatramin’izany teny izany, dia nanandratra ny feony ka nanao hoe: Esory amin’ny tany ilehio, fa tsy tokony hovelomina izy! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary raha niantso sy niala lamba ary nanipy vovoka ho amin’ny rivotra izy, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: dia nasain’ny mpifehy arivo ho entina any anati-rova Paoly, ary nasainy hadinina amin’ny kapoka, mba hahafantarany izay fototry ny nanakoran’ny olona azy toy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha namatotra azy tamin’ny kofehy hoditra izy, dia hoy Paoly tamin’ny kapiteny izay nitsangana teo: Mety aminareo va ny mikapoka lehilahy Romana izay tsy mbola nohelohina? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny kapiteny, nony nahare, dia lasa nilaza tamin’ny mpifehy arivo ka nanao hoe: Inona izao hataonao izao? fa Romana io lehilahy io. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nankeo aminy ny mpifehy arivo ka nanao taminy hoe: Lazao amiko: Romana va hianao? Dia hoy izy: Eny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny mpifehy arivo namaly hoe: Vola be no nahazoako izany voninahitra izany. Fa hoy Paoly: Izaho kosa efa nanana izany hatry ny fony vao teraka. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia nandao azy faingana ireo olona efa hanadina azy; ary ny mpifehy arivo natahotra koa, rehefa nahalala azy fa Romana, satria efa nampamatotra azy izy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandaharan’i Paoly teny teo anatrehan’ny Synedriona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ARY nony ampitso, satria ta-hahafantatra marina izay niampangan’ny Jiosy azy ny mpifehy arivo, dia namaha azy, ary nasainy niangona ny lohan’ny mpisorona sy ny Synedriona rehetra, ary Paoly nentiny nidina ka nampitoeriny teo anatrehany.
