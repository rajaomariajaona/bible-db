document_id: JER.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharatsian’ny olona, izay nahatonga ny loza namely azy.
  - type: text
    content: MIVEZIVEZE eny an-dàlamben’i Jerosalema hianareo,
  - type: text
    content: Ka izahao sy fantaro ary tadiavo ao an-kalalahana,
  - type: text
    content: Fa raha mba misy olona hitanareo,
  - type: text
    content: Izay manao ny marina sy mitady ny hitsiny,
  - type: text
    content: Dia havelako ny helok’i Jerosalema.
  '10':
  - type: text
    content: Miakara eo amin’ny màndany hianareo, ka mameleza,
  - type: text
    content: Nefa aza dia levonina avokoa izy;
  - type: text
    content: Esory ny sakeliny,
  - type: text
    content: Satria tsy an’i Jehovah izy.
  '11':
  - type: text
    content: Fa efa nivadika tamiko mihitsy
  - type: text
    content: Ny taranak’Isiraely sy ny taranak’i Joda, hoy Jehovah.
  '12':
  - type: text
    content: Nahafoy an’i Jehovah izy
  - type: text
    content: 'Ka nanao hoe: Tsy Izy no izy;'
  - type: text
    content: Tsy hisy loza hanjo antsika,
  - type: text
    content: Ary tsy hahita sabatra na mosary isika;
  '13':
  - type: text
    content: Ny mpaminany dia hanjary rivotra,
  - type: text
    content: Ary tsy ao am-pony Ilay miteny;
  - type: note
    content: 'Na: ny teny.'
  - type: text
    content: Eny, izany no hanjo azy.
  '14':
  - type: text
    content: Koa izao no lazain’i Jehovah, Andriamanitry ny maro.
  - type: text
    content: Noho ny nanaovanareo izany teny izany,
  - type: text
    content: Indro, hataoko afo ny teniko izay eo am-bavanao,
  - type: text
    content: Ary ity firenena ity ho kitay hazo
  - type: text
    content: Ka holevoniny.
  '15':
  - type: text
    content: Indro, efa hitondra firenena avy lavitra Aho hamely anareo,
  - type: text
    content: Ry taranak’Isiraely, hoy Jehovah,–
  - type: text
    content: Dia firenena mateza hery,
  - type: text
    content: Firenena hatry ny ela,
  - type: text
    content: Firenena izay tsy fantatrao ny fiteniny,
  - type: text
    content: Ka tsy ho azonao izay lazainy.
  '16':
  - type: text
    content: Ny tranon-jana-tsipìkany dia tahaka ny fasana misokatra;
  - type: text
    content: Izy rehetra dia samy lehilahy mahery avokoa.
  '17':
  - type: text
    content: Ary hohaniny ny vokatrao sy ny haninao,
  - type: text
    content: Hohaniny ny zanakao-lahy sy ny zanakao-vavy,
  - type: text
    content: Hohaniny ny ondry aman-osinao sy ny ombinao,
  - type: text
    content: Hohaniny ny voalobokao sy ny aviavinao;
  - type: text
    content: Sady horavany amin’ny sabatra ny tanàna mimànda izay itokianao.
  '18':
  - type: text
    content: Nefa na dia amin’izany andro izany aza, hoy Jehovah,
  - type: text
    content: Tsy dia holevoniko avokoa hianareo.
  '19':
  - type: text
    content: 'Ary raha hoy izy:'
  - type: note
    content: Heb. hianareo.
  - type: text
    content: Nahoana Jehovah Andriamanitsika no dia nanao izany rehetra izany tamintsika?
  - type: text
    content: 'Dia hovalianao hoe:'
  - type: text
    content: Toy ny nahafoizanareo Ahy sy ny nanompoanareo andriamani-kafa teo amin’ny taninareo
  - type: text
    content: No hanompoanareo ny firenen-kafa any amin’ny tany izay tsy anareo.
  '2':
  - type: text
    content: 'Ary na dia misy aza manao hoe: ,Raha velona koa Jehovah,’'
  - type: text
    content: Dia entiny mianian-tsy to izany.
  '20':
  - type: text
    content: Ambarao ao amin’ny taranak’i Jakoba,
  - type: text
    content: 'Ary torio ao amin’ny Joda hoe:'
  '21':
  - type: text
    content: Henoy izao, ry firenena adala sady tsy manan-tsaina,
  - type: text
    content: Izay mana-maso, fa tsy mahita,
  - type: text
    content: 'Ary manan-tsofina, fa tsy mandre:'
  '22':
  - type: text
    content: Izaho va tsy atahoranareo? hoy Jehovah;
  - type: text
    content: Tsy mangovitra va hianareo eo anatrehako,
  - type: text
    content: Izay nanao ny fasika ho fefin’ny ranomasina,
  - type: text
    content: Dia fetra mandrakizay tsy azony hihoarana?
  - type: text
    content: Ka na dia mitopatopa aza ny onjany, dia tsy mahavaky azy,
  - type: text
    content: Ary na dia mirohondrohona aza, dia tsy mahahoatra azy.
  '23':
  - type: text
    content: Fa ity firenena ity dia manana fo maditra sy miodina;
  - type: text
    content: Mihodina izy ka lasa,
  '24':
  - type: text
    content: 'Ary tsy manao anakampo akory hoe:'
  - type: text
    content: Aoka isika hatahotra an’i Jehovah Andriamanitsika,
  - type: text
    content: Izay mandatsaka ranonorana,
  - type: text
    content: Dia ny loha-orana sy ny fara-orana amin’ny fotoany avy;
  - type: text
    content: Ary ireo herinandro voatendry ho amin’ny fararano dia tandremany ho antsika.
  '25':
  - type: text
    content: Ny helokareo no nampiala izany,
  - type: text
    content: Ary ny fahotanareo no misakana ny soa tsy ho azonareo.
  '26':
  - type: text
    content: Fa misy hita fa ratsy fanahy ny oloko;
  - type: text
    content: Mamitsaka sy mijoko toy ny mpamandri-borona izy,
  - type: text
    content: Mamela-pandrika izy, ka olona no azony.
  '27':
  - type: text
    content: Toy ny tranom-borona feno vorona
  - type: text
    content: No mahafeno fitaka ny tranony;
  - type: text
    content: Ary noho izany dia tonga lehibe sy mpanan-karena izy.
  '28':
  - type: text
    content: Efa mihatavy izy ka mandimandina,
  - type: text
    content: Dia mihoa-pampana amin’ny fanaovan-dratsy;
  - type: text
    content: Tsy mety mitsara ady mba hahazoan’ny kamboty ny rariny izy,
  - type: text
    content: Ary ny adin’ny malahelo tsy mba tsarainy.
  '29':
  - type: text
    content: Tsy hovaliako amin’izany va izy? hoy Jehovah;
  - type: text
    content: Tsy hialako fo va ny firenena toy izany?
  '3':
  - type: text
    content: Jehovah ô, tsy mijery ny toe-panahy mahatoky va ny masonao?
  - type: text
    content: Namely azy Hianao, nefa tsy nahatsiaro naharary izy;
  - type: text
    content: Nandany azy Hianao, nefa tsy nety nino anatra izy;
  - type: text
    content: Nohamafisiny mihoatra noho ny harambato ny tarehiny,
  - type: text
    content: Tsy nety niverina izy.
  '30':
  - type: text
    content: Zava-mahagaga sy mahatsiravina no atao eo amin’ny tany;
  '31':
  - type: text
    content: Ny mpaminany maminany lainga,
  - type: text
    content: Ny mpisorona manapaka araka izay atoron’ireny,
  - type: text
    content: Ary ny oloko mankasitraka izany;
  - type: text
    content: Koa hanao ahoana re hianareo any am-parany?
  '4':
  - type: text
    content: 'Ka dia hoy izaho: Olona ambany ireto;'
  - type: text
    content: Adala izy fa tsy mahalala ny làlan’i Jehovah,
  - type: text
    content: Na ny fitsipik’Andriamaniny;
  '5':
  - type: text
    content: Handeha ho any amin’ny lehibe aho lahy ka hiteny aminy;
  - type: text
    content: Fa ireny dia mahalala ny làlan’i Jehovah
  - type: text
    content: Sy ny fitsipik’Andriamaniny;
  - type: text
    content: Kanjo ireny koa aza dia samy efa nanapaka zioga
  - type: text
    content: Sy nanito fatorana.
  '6':
  - type: text
    content: Koa noho izany dia mamely azy ny liona avy any an-ala,
  - type: text
    content: Ary mandringana azy ny amboadia
  - type: note
    content: lopa.
  - type: text
    content: ' avy any an-efitra,'
  - type: text
    content: Ny leoparda miandry hamely ny tanànany,
  - type: text
    content: Ka izay rehetra mivoaka avy ao dia viraviraina;
  - type: text
    content: Fa efa maro ny fahadisoany,
  - type: text
    content: Ary fatratra ny fiodinany.
  '7':
  - type: text
    content: Koa nahoana Aho no hamela ny helokao?
  - type: text
    content: Efa nahafoy Ahy ny zanakao
  - type: text
    content: Ka efa nianiana tamin’izay tsy Andriamanitra;
  - type: text
    content: Efa nampianianiko
  - type: note
    content: 'Na: efa novokisako.'
  - type: text
    content: ' izy, nefa nijangajanga ihany'
  - type: text
    content: Ka nirohitra niditra tao an-tranon’ny vehivavy janga.
  '8':
  - type: text
    content: Tahaka ny soavaly tsara fahana izy ka nikarenjy tamin’izay tiany,
  - type: text
    content: Samy naneno tamin’ny vadin’ny namany avy.
  '9':
  - type: text
    content: Tsy hovaliako va izy amin’izany? hoy Jehovah;
  - type: text
    content: Ary tsy hialako fo va ny firenena toy izany?
