document_id: JER.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny faharatsian’ny olona, izay nahatonga ny loza namely azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIVEZIVEZE eny an-dàlamben’i Jerosalema hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka izahao sy fantaro ary tadiavo ao an-kalalahana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha mba misy olona hitanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manao ny marina sy mitady ny hitsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia havelako ny helok’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary na dia misy aza manao hoe: ,Raha velona koa Jehovah,’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia entiny mianian-tsy to izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jehovah ô, tsy mijery ny toe-panahy mahatoky va ny masonao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Namely azy Hianao, nefa tsy nahatsiaro naharary izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nandany azy Hianao, nefa tsy nety nino anatra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nohamafisiny mihoatra noho ny harambato ny tarehiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nety niverina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka dia hoy izaho: Olona ambany ireto;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Adala izy fa tsy mahalala ny làlan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny fitsipik’Andriamaniny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Handeha ho any amin’ny lehibe aho lahy ka hiteny aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ireny dia mahalala ny làlan’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fitsipik’Andriamaniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo ireny koa aza dia samy efa nanapaka zioga
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nanito fatorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa noho izany dia mamely azy ny liona avy any an-ala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mandringana azy ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lopa.
    marker-yv: yv-n
  - type: text
    text: ' avy any an-efitra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny leoparda miandry hamely ny tanànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka izay rehetra mivoaka avy ao dia viraviraina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa maro ny fahadisoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fatratra ny fiodinany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa nahoana Aho no hamela ny helokao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nahafoy Ahy ny zanakao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa nianiana tamin’izay tsy Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nampianianiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efa novokisako.
    marker-yv: yv-n
  - type: text
    text: ' izy, nefa nijangajanga ihany'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nirohitra niditra tao an-tranon’ny vehivavy janga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tahaka ny soavaly tsara fahana izy ka nikarenjy tamin’izay tiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy naneno tamin’ny vadin’ny namany avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy hovaliako va izy amin’izany? hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hialako fo va ny firenena toy izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miakara eo amin’ny màndany hianareo, ka mameleza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa aza dia levonina avokoa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esory ny sakeliny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy an’i Jehovah izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa efa nivadika tamiko mihitsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny taranak’Isiraely sy ny taranak’i Joda, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahafoy an’i Jehovah izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka nanao hoe: Tsy Izy no izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy loza hanjo antsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hahita sabatra na mosary isika;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny mpaminany dia hanjary rivotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ao am-pony Ilay miteny;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny teny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, izany no hanjo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa izao no lazain’i Jehovah, Andriamanitry ny maro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny nanaovanareo izany teny izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hataoko afo ny teniko izay eo am-bavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ity firenena ity ho kitay hazo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka holevoniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, efa hitondra firenena avy lavitra Aho hamely anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry taranak’Isiraely, hoy Jehovah,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia firenena mateza hery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Firenena hatry ny ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Firenena izay tsy fantatrao ny fiteniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho azonao izay lazainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny tranon-jana-tsipìkany dia tahaka ny fasana misokatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy rehetra dia samy lehilahy mahery avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hohaniny ny vokatrao sy ny haninao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hohaniny ny zanakao-lahy sy ny zanakao-vavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hohaniny ny ondry aman-osinao sy ny ombinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hohaniny ny voalobokao sy ny aviavinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady horavany amin’ny sabatra ny tanàna mimànda izay itokianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nefa na dia amin’izany andro izany aza, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy dia holevoniko avokoa hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha hoy izy:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hianareo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana Jehovah Andriamanitsika no dia nanao izany rehetra izany tamintsika?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia hovalianao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny nahafoizanareo Ahy sy ny nanompoanareo andriamani-kafa teo amin’ny taninareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hanompoanareo ny firenen-kafa any amin’ny tany izay tsy anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ambarao ao amin’ny taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary torio ao amin’ny Joda hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Henoy izao, ry firenena adala sady tsy manan-tsaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mana-maso, fa tsy mahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary manan-tsofina, fa tsy mandre:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izaho va tsy atahoranareo? hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mangovitra va hianareo eo anatrehako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nanao ny fasika ho fefin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia fetra mandrakizay tsy azony hihoarana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka na dia mitopatopa aza ny onjany, dia tsy mahavaky azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia mirohondrohona aza, dia tsy mahahoatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa ity firenena ity dia manana fo maditra sy miodina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihodina izy ka lasa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary tsy manao anakampo akory hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka isika hatahotra an’i Jehovah Andriamanitsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mandatsaka ranonorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny loha-orana sy ny fara-orana amin’ny fotoany avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ireo herinandro voatendry ho amin’ny fararano dia tandremany ho antsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny helokareo no nampiala izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahotanareo no misakana ny soa tsy ho azonareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa misy hita fa ratsy fanahy ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamitsaka sy mijoko toy ny mpamandri-borona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamela-pandrika izy, ka olona no azony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Toy ny tranom-borona feno vorona
- type: usfm
  marker: q1
  children:
  - type: text
    text: No mahafeno fitaka ny tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary noho izany dia tonga lehibe sy mpanan-karena izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Efa mihatavy izy ka mandimandina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mihoa-pampana amin’ny fanaovan-dratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mety mitsara ady mba hahazoan’ny kamboty ny rariny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny adin’ny malahelo tsy mba tsarainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy hovaliako amin’izany va izy? hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hialako fo va ny firenena toy izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Zava-mahagaga sy mahatsiravina no atao eo amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny mpaminany maminany lainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpisorona manapaka araka izay atoron’ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny oloko mankasitraka izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa hanao ahoana re hianareo any am-parany?
