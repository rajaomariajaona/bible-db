document_id: LEV.26,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitahiana sy ozona.
  - type: text
    content: 'AZA manao andriamani-tsi-izy; ary aza manangana sarin-javatra voasokitra, na manao tsangambaton-tsampy na manorina vato soratana hiankohofana eo amin’ny taninareo: fa Izaho no Jehovah Andriamanitrareo.'
  '10':
  - type: text
    content: 'Ary hihinana ny tranainy hianareo, sady hamoaka ny tranainy hasiana ny vao. '
  '11':
  - type: text
    content: 'Ary ny tabernakeliko dia hataoko eo aminareo; ary tsy ho halan’ny fanahiko hianareo. '
  '12':
  - type: text
    content: Ary handeha eo aminareo Aho ka ho Andriamanitrareo; ary hianareo ho oloko.
  '13':
  - type: text
    content: Izaho no Jehovah Andriamanitrareo, Izay nitondra anareo nivoaka avy tany amin’ny tany Egypta, mba tsy ho andevony hianareo; ary nanapaka ny zioga izay teo aminareo Aho ka nampandeha anareo mijoro.
  '14':
  - type: text
    content: 'Fa raha tsy mihaino Ahy kosa hianareo ka tsy mankatò ireo didy rehetra ireo, '
  '15':
  - type: text
    content: 'ary hamavoinareo ny didiko, na halan’ny fanahinareo ny fitsipiko, ka tsy ankatoavinareo ny didiko rehetra, fa ivadihanareo ny fanekeko, '
  '16':
  - type: text
    content: 'Izaho kosa dia hanao izao aminareo: hanisy fampitahorana aminareo Aho, dia areti-maha-sahozanina sy tazo mahamay, izay manimba ny maso sy mandany ny aina; ary hafafinareo foana ny voan-javatrareo, fa ny fahavalonareo no hihinana azy. '
  '17':
  - type: text
    content: Dia hanandrina anareo ny Tavako, ka ho resy eo anoloan’ny fahavalonareo hianareo; ary izay mankahala anareo no hanapaka anareo; dia handositra hianareo, na dia tsy misy manenjika aza.
  '18':
  - type: text
    content: 'Ary raha mbola tsy mihaino Ahy ihany hianareo amin’izany rehetra izany, dia mbola hampijaly anareo impito Aho noho ny fahotanareo. '
  '19':
  - type: text
    content: 'Ary horavako ny reharehan’ny herinareo, ka hataoko toy ny vy ny lanitrareo, ary toy ny varahina ny taninareo; ary ny herinareo ho lany foana; '
  '2':
  - type: text
    content: 'Tandremo ny Sabatako, ary hajao ny fitoerako masina: Izaho no Jehovah.'
  '20':
  - type: text
    content: fa tsy hahavoka-javatra ny taninareo, ary tsy hamoa ny hazo amin’ny tany.
  '21':
  - type: text
    content: 'Ary raha mbola manohitra Ahy ihany hianareo, ka tsy mety mihaino Ahy, dia hasiako kapoka impito koa hianareo araka ny fahotanareo. '
  '22':
  - type: text
    content: Ary hampandehaniko eo aminareo ny bibi-dia, ka handany ny zanakareo sy handringana ny biby fiompinareo ireny ka hahavitsy isa anareo; ary ny làlambenareo ho tonga efitra.
  '23':
  - type: text
    content: 'Ary raha tsy mandray ny anatro amin’izany hianareo, fa mbola manohitra Ahy ihany, '
  '24':
  - type: text
    content: 'Izaho dia Izaho kosa no hamely anareo ka hampijaly anareo impito indray noho ny fahotanareo. '
  '25':
  - type: text
    content: 'Dia hampiditra sabatra aminareo Aho ho valin’ny nivadihanareo ny fanekena; ary rehefa tafangona eo anatin’ny tanànanareo hianareo, dia hanatitra areti-mandringana aminareo Aho; ary hatolotra eo an-tànan’ny fahavalo hianareo. '
  '26':
  - type: text
    content: Raha tapahiko ny vary, izay tohan’ainareo, dia fanendasa-mofo iray ihany no hanendasan’ny vehivavy folo ny mofonareo, ary an-danjany no hizarany azy, dia hihinana hianareo, fa tsy ho voky.
  '27':
  - type: text
    content: 'Ary raha mbola tsy mihaino Ahy amin’izany indray hianareo, fa mbola manohitra Ahy ihany, '
  '28':
  - type: text
    content: 'dia hamely anareo amin’ny fahatezerana kosa Aho; ary Izaho dia Izaho no hampijaly anareo impito indray noho ny fahotanareo. '
  '29':
  - type: text
    content: 'Dia hihinana ny nofon’ny zanakareo-lahy sy ny zanakareo-vavy hianareo. '
  '3':
  - type: text
    content: 'Raha manaraka ny lalàko sy mitandrina ny didiko hianareo ka mankatò izany, '
  '30':
  - type: text
    content: Ary horavako ny fitoerana avonareo, sy hokapaiko ny tsangan-kazonareo
  - type: note
    content: 'Na: tsangam-batonareo.'
  - type: text
    content: ' ho an’ny masoandro, ary ny fatinareo dia hariako eo ambonin’ny fatin’ny sampinareo, ary ho halan’ny fanahiko hianareo. '
  '31':
  - type: text
    content: 'Ary horavako ny tanànanareo, ka hatao lao ny fitoera-masinareo, ary tsy hamboloiko ny hanitrareo ankasitrahana. '
  '32':
  - type: text
    content: 'Ary hataoko lao ny tany, ka ho talanjona amin’izany ny fahavalonareo izay monina eo. '
  '33':
  - type: text
    content: Ary hianareo dia haeliko any amin’ny jentilisa, ary hanatsoaka sabatra ho enti-manenjika anareo Aho; ary ny taninareo ho lao, ary ny tanànanareo ho rava.
  '34':
  - type: text
    content: Ary amin’izany ny tany dia hanonitra
  - type: note
    content: 'Na: hifaly amin’.'
  - type: text
    content: ' ny sabatany amin’ny andro rehetra izay hahafoanany, raha any amin’ny tanin’ny fahavalonareo hianareo; dia hitsahatra ny tany ka hanonitra'
  - type: note
    content: 'Na: hifaly amin’.'
  - type: text
    content: ' ny sabatany; '
  '35':
  - type: text
    content: amin’ny andro hahafoanany rehetra no hitsaharany ho solon’izay tsy nitsaharany tamin’ny sabatanareo, raha mbola nonina teo hianareo.
  '36':
  - type: text
    content: 'Ary ny amin’ny sisa aminareo any amin’ny tanin’ny fahavalony, dia hampiditra faharerahana ao am-pony Aho, ka na dia ny feon’ny ravin-kazo voapaoka aza dia hampandositra azy; ary handositra tahaka ny mandosi-tsabatra izy ka ho lavo, na dia tsy misy manenjika aza. '
  '37':
  - type: text
    content: 'Ary ho lavo mifanindry toy ny mandosi-tsabatra izy, na dia tsy misy manenjika aza; ka dia tsy hahajanona eo anoloan’ny fahavalonareo hianareo. '
  '38':
  - type: text
    content: 'Ary dia ho lany ringana any amin’ny jentilisa hianareo, ary ho lanin’ny tanin’ny fahavalonareo hianareo. '
  '39':
  - type: text
    content: Ary ny sisa eo aminareo dia ho levona any amin’ny tanin’ny fahavalonareo noho ny helony sy ny heloky ny razany koa.
  '4':
  - type: text
    content: 'dia hanome anareo ranonorana amin’ny fotoany Aho, ka hahavoka-javatra ny tany, ary hamoa ny hazo any an-tsaha. '
  '40':
  - type: text
    content: 'Fa raha hiaiky ny helony sy ny heloky ny razany izy–dia ny fahadisoany izay nandisoany tamiko tamin’ny nanoherany Ahy, '
  '41':
  - type: text
    content: 'ary Izaho kosa namely azy ka nitondra azy ho any amin’ny tanin’ny fahavalony–raha hietry amin’izany ny fony tsy voafora, ary hanonitra ny amin’ny helony izy, '
  '42':
  - type: text
    content: 'dia hotsarovako ny fanekeko tamin’i Jakoba sy ny fanekeko tamin’Isaka ary ny fanekeko tamin’i Abrahama; ary hotsarovako koa ny tany. '
  '43':
  - type: text
    content: Ary ny tany hilaozan’ny olona ka hanonitra
  - type: note
    content: 'Na: tsangam-batonareo.'
  - type: text
    content: ' ny sabatany, raha mitoetra foana tsy misy olona izy; ary ny olona hanonitra ny amin’'
  - type: note
    content: 'Na: ary ny olona kosa hifaly hiaiky.'
  - type: text
    content: ' ny helony, satria nandà ny fitsipiko izy, ary halan’ny fanahiny ny didiko.'
  '44':
  - type: text
    content: 'Ary na dia izany rehetra izany aza, raha any amin’ny tanin’ny fahavalony izy, dia tsy holaviko ary tsy ho halako, fandrao lany ringana izy rehetra, ka rava ny fanekeko taminy; fa Izaho no Jehovah Andriamaniny. '
  '45':
  - type: text
    content: 'Fa ny hitahiako azy no hahatsiarovako ny fanekena tamin’ny razany, izay nentiko nivoaka avy tany amin’ny tany Egypta teo imason’ny jentilisa, mba ho Andriamaniny Aho: Izaho no Jehovah.'
  '46':
  - type: text
    content: Ireo no didy sy fitsipika ary lalàna izay nataon’i Jehovah ho aminy sy amin’ny Zanak Isiraely, teo an-tendrombohitra Sinay ka nampilazainy an’i Mosesy.
  '5':
  - type: text
    content: 'Ary ny taom-pivelezanareo dia ho tratry ny taom-piotazam-boaloboka, ary ny taom-piotazam-boaloboka dia ho tratry ny taom-pamafazana; dia hihinana hianareo ka ho voky; ary handry fahizay eo amin’ny taninareo. '
  '6':
  - type: text
    content: 'Ary homeko fiadanana eo amin’ny tany hianareo ka handry fahizay, ary tsy hisy hanaitaitra, fa hofongorako ny biby masiaka amin’ny tany, ary tsy hotetezin-tsabatra ny taninareo. '
  '7':
  - type: text
    content: 'Dia hanenjika ny fahavalonareo hianareo, ka ho lavon-tsabatra eo anoloanareo izy. '
  '8':
  - type: text
    content: Ary ny dimy aminareo hanenjika ny zato, ary ny zato aminareo hanenjika ny iray alina; ary ny fahavalonareo ho lavon-tsabatra eo anoloanareo.
  '9':
  - type: text
    content: 'Ary hijery anareo Aho ka hahamaro ny taranakareo sy hampitombo anareo, ary hanorina ny fanekeko aminareo Aho. '
