document_id: PSA.108
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fahatokiana an’Andriamanitra sy fanantenana ny heriny haharesy ny fahavalo.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tonon-kira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA ô, tafatoetra ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanahiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '108.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny voninahitro.
    marker-yv: yv-n
  - type: text
    text: ' no hihira sy hankalaza.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mifohaza, ry valiha sy lokanga; hifoha maraina koa aho.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '108.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hampifoha ny maraina aho.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hidera Anao eny amin’ny firenena maro aho, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hankalaza Anao eny amin’ny jentilisa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa lehibe mihoatra ny lanitra ny famindramponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mipaka eny amin’ny rahona ny fahamarinanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Misandrata any ambonin’ny lanitra Hianao, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho etỳ ambonin’ny tany rehetra ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mba hahafaka ny malalanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia vonjeo amin’ny tànanao ankavanana aho, ka valio.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Andriamanitra niteny tamin’ny fahamasinany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hifaly Aho ka hizara an’i Sekema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lohasahan’i Sokota horefesiko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ahy Gileada, Ahy Manase;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aron’ny lohako Efraima;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tehim-panjakako Joda;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tavindranoko fanasana Moaba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Edoma no hanipazako ny kapako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny amin’i Filistia no hihobiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza no hitondra ahy ho any an-tanàna mafy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hitarika ahy ho any Edoma?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy Hianao va no efa nanary anay, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy mivoaka miaraka amin’ny miaramilanay, Andriamanitra ô?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vonjeo amin’ny fahavalo izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa zava-poana ny famonjena ataon’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitra no haharezantsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izy no hanitsakitsaka ny fahavalontsika.
