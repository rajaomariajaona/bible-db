document_id: PSA.108,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokiana an’Andriamanitra sy fanantenana ny heriny haharesy ny fahavalo.
  - type: text
    content: Tonon-kira. Salamo nataon’i Davida.
  - type: text
    content: ANDRIAMANITRA ô, tafatoetra ny foko;
  - type: text
    content: Ny fanahiko
  - type: note
    content: Heb. ny voninahitro.
  - type: text
    content: ' no hihira sy hankalaza.'
  '10':
  - type: text
    content: Iza no hitondra ahy ho any an-tanàna mafy?
  - type: text
    content: Iza no hitarika ahy ho any Edoma?
  '11':
  - type: text
    content: Tsy Hianao va no efa nanary anay, Andriamanitra ô,
  - type: text
    content: Sady tsy mivoaka miaraka amin’ny miaramilanay, Andriamanitra ô?
  '12':
  - type: text
    content: Vonjeo amin’ny fahavalo izahay;
  - type: text
    content: Fa zava-poana ny famonjena ataon’ny olona.
  '13':
  - type: text
    content: Andriamanitra no haharezantsika;
  - type: text
    content: Fa Izy no hanitsakitsaka ny fahavalontsika.
  '2':
  - type: text
    content: Mifohaza, ry valiha sy lokanga; hifoha maraina koa aho.
  - type: note
    content: 'Na: hampifoha ny maraina aho.'
  '3':
  - type: text
    content: Hidera Anao eny amin’ny firenena maro aho, Jehovah ô,
  - type: text
    content: Ary hankalaza Anao eny amin’ny jentilisa.
  '4':
  - type: text
    content: Fa lehibe mihoatra ny lanitra ny famindramponao;
  - type: text
    content: Ary mipaka eny amin’ny rahona ny fahamarinanao.
  '5':
  - type: text
    content: Misandrata any ambonin’ny lanitra Hianao, Andriamanitra ô;
  - type: text
    content: Ary aoka ho etỳ ambonin’ny tany rehetra ny voninahitrao.
  '6':
  - type: text
    content: Mba hahafaka ny malalanao,
  - type: text
    content: Dia vonjeo amin’ny tànanao ankavanana aho, ka valio.
  '7':
  - type: text
    content: 'Andriamanitra niteny tamin’ny fahamasinany hoe:'
  - type: text
    content: Hifaly Aho ka hizara an’i Sekema,
  - type: text
    content: Ary ny lohasahan’i Sokota horefesiko;
  '8':
  - type: text
    content: Ahy Gileada, Ahy Manase;
  - type: text
    content: Ary aron’ny lohako Efraima;
  - type: text
    content: Tehim-panjakako Joda;
  '9':
  - type: text
    content: Tavindranoko fanasana Moaba;
  - type: text
    content: Edoma no hanipazako ny kapako;
  - type: text
    content: Noho ny amin’i Filistia no hihobiako.
