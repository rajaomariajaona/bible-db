document_id: MAT.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Aza mitsara, mba tsy hotsaraina hianareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ary raha angatahany hazandrano, no hanome azy menarana? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Koa raha hianareo, na dia ratsy aza, mahalala hanome zava-tsoa ho an’ny zanakareo, tsy mainka va ny Rainareo Izay any an-danitra no hanome zava-tsoa ho an’izay mangataka aminy?
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa amin’izany na inona na inona tianareo hataon’ny olona aminareo, dia mba ataovy aminy kosa tahaka izany; fa izany no lalàna sy mpaminany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Midira amin’ny vavahady èty hianareo; fa lehibe ny vavahady, ary malalaka ny làlana izay mankany amin’ny fahaverezana, ka maro ny miditra any. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa èty ny vavahady, ary tèry ny làlana izay mankany amin’ny fiainana, ka vitsy ny mahita azy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mitandrema hianareo, fandrao ho voafitaky ny mpaminany sandoka, izay mankao aminareo amin’ny fitafian’ny ondry, fa ao anatiny dia amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lopa.
      marker-yv: yv-n
    - type: text
      text: ' mitoha izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny voany no hahafantaranareo azy. Manoty voaloboka amin’ny tsilo va ny olona, na aviavy amin’ny songosongo? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia toy izany, ny hazo tsara rehetra dia mamoa voa tsara; fa ny hazo ratsy rehetra dia mamoa voa ratsy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny hazo tsara tsy mety mamoa voa ratsy, ary ny hazo ratsy tsy mety mamoa voa tsara. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa araka ny fitsarana ataonareo no hitsarana anareo; ary araka ny ohatra ataonareo no hanoharana ho anareo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ka dia ny voany no hahafantaranareo azy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tsy izay rehetra manao amiko hoe: Tompoko, Tompoko, no hiditra amin’ny fanjakan’ny lanitra, fa izay manao ny sitra-pon’ny Raiko Izay any an-danitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Maro no hanao amiko amin’izany andro izany hoe: Tompoko, Tompoko, tsy efa naminany tamin’ny anaranao va izahay? ary tsy efa namoaka demonia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Demonia = fanahy ratsy, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anjely ratsy.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny anaranao va izahay? ary tsy efa nanao asa lehibe maro tamin’ny anaranao va izahay? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary dia hambarako aminy marimarina hoe: Tsy mba fantatro akory hianareo hatrizay hatrizay; mialà amiko, hianareo mpanao meloka.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa amin’izany na zovy na zovy no mandre izany teniko izany ka mankatò azy, dia hoharina amin’ny lehilahy manan-tsaina izy, izay nanorina ny tranony teo ambonin’ny vatolampy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary latsaka ny ranonorana, ka nisy riaka be, sady nifofofofo ny rivotra ka namely izany trano izany; nefa tsy nianjera izy, satria efa naorina teo ambonin’ny vatolampy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa izay rehetra mandre izany teniko izany, nefa tsy mankatò azy, dia hoharina amin’ny lehilahy adala, izay nanorina ny tranony teo ambonin’ny fasika. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary latsaka ny ranonorana, ka nisy riaka be, sady nifofofofo ny rivotra ka namely izany trano izany; dia nianjera izy, ka loza ny fianjerany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary nony efa vitan’i Jesosy izany teny izany, dia talanjona ny vahoaka noho ny fampianarany, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: satria nampianatra azy toy izay manana fahefana Izy, fa tsy tahaka ny mpanora-dalàna teo aminy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nahoana hianao no mijery ny sombin-kazo eo amin’ny mason’ny rahalahinao, fa ny andry eo amin’ny masonao dia tsy mba tsaroanao? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ahoana no hilazanao amin’ny rahalahinao hoe: Aoka aho hanaisotra ny sombin-kazo eo amin’ny masonao; nefa, indro, ny andry eo amin’ny masonao? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ry mpihatsaravelatsihy, esory aloha ny andry eo amin’ny masonao, ary amin’izay vao ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin’ny mason’ny rahalahinao.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aza omena ny alika izay masina; ary aza atsipy eo anoloan’ny kisoa ny vato soanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pèrilanareo.
      marker-yv: yv-n
    - type: text
      text: ', fandrao hanitsaka azy izy, dia hifotitra ka hamiravira anareo.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mangataha, dia homena hianareo; mitadiava, dia hahita hianareo; dòndòny, dia hovohana hianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandòndòna no hovohana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary iza moa aminareo, raha angatahan’ny zanany mofo, no hanome azy vato? '
