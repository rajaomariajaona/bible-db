document_id: REV.14,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny Zanak’ondry sy ny mpanaraka Azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ARY hitako fa, indro, ny Zanak’ondry nitsangana teo an-tendrombohitra Ziona, ary nisy efatra arivo amby efatra alina sy iray hetsy nomba Azy, samy manana ny anarany sy ny anaran’ny Rainy voasoratra eo amin’ny handriny.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'dia izy koa no hisotro ny divain’ny fahatezeran’Andriamanitra, izay naidina tao anatin’ny kapoaky ny fahatezerany tsy miharoharo zavatra, sady hampijalina amin’ny afo sy solifara eo anatrehan’ny anjely masina sy eo anatrehan’ny Zanak’ondry izy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ary ny setroky ny fijaliany dia miakatra mandrakizay mandrakizay; ary tsy manam-pitsaharana na andro na alina izay miankohoka eo anoloan’ny bibi-dia sy ny sariny, na izay mandray ny mariky ny anarany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Indro ny faharetan’ny olona masina, dia izay mitandrina ny didin’Andriamanitra sy ny finoana an’i Jesosy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nahare feo avy tany an-danitra aho nanao hoe: Soraty: Sambatra ny maty, dia izay maty ao amin’ny Tompo hatramin’izao. Eny, hoy ny Fanahy, fa hitsahatra amin’izay nisasarany izy; fa ny asany manaraka azy.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary, indro, nahita rahona fotsy aho, ary nisy tahaka ny Zanak’olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: toa zanak’olona.
      marker-yv: yv-n
    - type: text
      text: ' nipetraka teo ambonin’ny rahona, Izay nisatroka satroboninahitra volamena sady nitana fijinjana maranitra teny an-tànany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nisy anjely iray koa nivoaka avy tao amin’ny tempoly, niantso tamin’ny feo mahery ka nanao tamin’Ilay nipetraka teo ambonin’ny rahona hoe: Arosoy ny fijinjanao, ka mijinjà, satria tonga ny andro'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ora.
      marker-yv: yv-n
    - type: text
      text: ' fijinjana; fa masaka dia masaka ny vokatry ny tany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia naroson’Ilay nipetraka teo ambonin’ny rahona tamin’ny tany ny fijinjany, ka voajinja ny tany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nisy anjely iray koa nivoaka avy tao amin’ny tempoly tany an-danitra, ary izy koa nanana fijinjana maranitra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nisy anjely iray koa nivoaka avy teo amin’ny alitara, ary nanana fahefana tamin’ny afo izy; ary izy niantso ilay nanana ny fijinjana maranitra tamin’ny feo mahery hoe: Arosoy ny fijinjanao maranitra, ka angony ny sampahom-boaloboka eo amin’ny tany; fa masaka tsara ny voalobony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary naroson’ilay anjely tamin’ny tany ny fijinjany, dia nangoniny ny voaloboky ny tany ka nazerany tao amin’ny famiazana lehibe, dia ny fahatezeran’Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nahare feo avy tany an-danitra aho, tahaka ny firohondrohon’ny rano be sy tahaka ny fikotroky ny kotrokorana mafy; ary ny feo izay reko dia tahaka ny an’ny mpitendry lokanga mitendry ny lokangany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary voahitsaka teny ivelan’ny tanàna ny famiazana, ary avy tao amin’ny famiazana dia nisy ra nahadifotra hatramin’ny lamboridin-tsoavaly ka lasa hatramin’ny enin-jato amby arivo stadio.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary mihira toa tonon-kira vaovao eo anoloan’ny seza fiandrianana sy eo anatrehan’ny zava-manan-aina efatra sy ny loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' izy; ary tsy nisy nahay nianatra izany fihirana izany, afa-tsy ny efatra arivo amby efatra alina sy iray hetsy izay navotana niala tamin’ny tany.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ireo no tsy voaloto tamin’ny vehivavy, fa virijina izy. Ireo no manaraka ny Zanak’ondry na aiza na aiza no alehany. Ireo no navotana avy tamin’ny olona ho voaloham-bokatra ho an’Andriamanitra sy ny Zanak’ondry. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary tsy nisy lainga hita teo am-bavany, sady tsy manan-tsiny izy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny anjely telo izay nitory, sy ny fahasambaran’izay maty ao amin’ny Tompo, ary ny andro fijinjana.
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ARY hitako fa, indro, nisy anjely iray koa nanidina teo afovoan’ny lanitra, nanana filazantsara mandrakizay hotorina amin’izay monina ambonin’ny tany sy amin’ny firenena sy ny fokom-pirenena sy ny samy hafa fiteny ary ny olona rehetra, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'nanao tamin’ny feo mahery hoe: Matahora an’Andriamanitra, ka omeo voninahitra Izy; fa tonga ny andro'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ora.
      marker-yv: yv-n
    - type: text
      text: ' fitsarany; ary miankohofa eo anoloan’Izay nanao ny lanitra sy ny tany sy ny ranomasina ary ny loharano.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nisy iray koa, dia anjely faharoa, nanaraka ka nanao hoe: Rava! rava Babylona lehibe! izay nampisotro ny firenena rehetra ny divain ny fahatezerana noho ny fijangajangany.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nisy iray koa, dia anjely fahatelo, nanaraka ireny ka nanao tamin’ny feo mahery hoe: Raha misy miankohoka eo anoloan’ny bibi-dia sy ny sariny ka mandray ny marika eo amin’ny handriny na amin’ny tànany, '
