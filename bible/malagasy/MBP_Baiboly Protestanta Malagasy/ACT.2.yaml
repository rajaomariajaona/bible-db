document_id: ACT.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nilatsahan’ny Fanahy Masina tamin’ny Andro Pentekosta, sy ny tori-teny nataon’i Petera tamin’izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nony tonga ny Andro Pentekosta, dia teo amin’ny fitoerana iray izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy feo tonga tampoka avy tany an-danitra, toy ny rivotra mahery mifofofofo, ka nanenika ilay trano niangonany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy lela maro mitarehin’afo niseho taminy, izay nizarazara; ary nipetraka tamin’izy rehetra isan-olona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary samy feno ny Fanahy Masina izy rehetra, ka dia niteny tamin’ny fiteny maro samy hafa, araka ny nampitenenan’ny Fanahy Masina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy Jiosy, mpivavaka tsara, nitoetra tany Jerosalema, avy tany amin’ny firenena samy hafa rehetra ambanin’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony re izany feo izany, dia niangona ny olona maro ka very hevitra, fa samy nahare azy ireo niteny tamin’ny fiteniny avy izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia talanjona sady gaga izy rehetra ka nanao hoe: Indreo, tsy Galiliana va ireo rehetra miteny ireo? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa ahoana no andrenesantsika amin’ny fitenintsika avy izay nahabe antsika– '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia Partiana sy Mediana sy Elamita, ary mponina any Mesopotamia, sy Jodia sy Kapadokia sy Ponto sy Asia '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sy Frygia sy Pamfylia, sy Egypta sy ny tany Libya izay manodidina an’i Kyrena, ary vahiny avy any Roma, na Jiosy na proselyta. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kretana sy Arabo–koa ahoana no andrenesantsika ireo miteny amin’ny fitenintsika avy ny asa lehibe ataon’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia talanjona izy rehetra ka niahanahana sady niresaka hoe: Ahoana no tokony ho hevitr’izany? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny sasany nihomehy ka nanao hoe: Leon-divay mamy ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa nitsangana Petera sy ny iraika ambin’ny folo lahy, dia nanandra-peo izy ka nanao taminy hoe: Ry lehilahy Jiosy sy izay rehetra monina eto Jerosalema aoka, ho fantatrareo izao, ka henoy ny teniko: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy mamo araka ny hevitrareo tsy akory ireo, fa vao ora faha-telo ihany izao ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izao ilay nampilazaina an’i Joela mpaminany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ',,Ary amin’ny andro farany, hoy Andriamanitra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No handatsahako ny Fanahiko amin’ny nofo rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanakalahinareo sy ny zanakavavinareo haminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zatovonareo hahita fahitana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lahi-antitrareo hanonofy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny mpanompoko, na lahy na vavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handatsahako ny Fanahiko amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia haminany izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary hanisy fahagagana eny amin’ny lanitra ambony Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy famantarana amin’ny tany ambany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ra sy afo ary zavon’ny setroka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny masoandro hampodina ho aizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volana ho ra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alohan’ny hahatongavan’ny andron’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay sady lehibe no malaza;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary na zovy na zovy no hiantso ny anaran’i Jehovah dia hovonjena’’ (Joela 3.1–5).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ry lehilahy Isiraely, mihainoa izao teny izao: Jesosy avy any Nazareta, lehilahy nasehon’Andriamanitra teo aminareo tamin’ny asa lehibe sy ny fahagagana ary ny famantarana izay nampanaovin’Andriamanitra Azy teo aminareo, tahaka ny fantatrareo ihany, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izy efa natolotra araka ny saina niniana sy ny fahalalan’Andriamanitra rahateo, dia nohomboanareo sy novonoinareo tamin’ny tànan’ny olona tsy tan-dalàna; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa Andriamanitra nanangana Azy, rehefa nahafaka ny fanaintainan’ny fahafatesana, satria tsy laitr’izany hohazonina Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa Davida milaza Azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Nijery an’i Jehovah teo anatrehako mandrakariva aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria eo an-kavanako Izy, mba tsy hangozohozo aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia izany no nifalian’ny foko sy niravoravoan’ny lelako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny nofoko koa hitoetra amin’ny fanantenana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa tsy ho foinao ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hadesy.
    marker-yv: yv-n
  - type: text
    text: ' ny aiko;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hamela ny Iray Masinao ho tratry ny lo Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Nampahafantatra ahy ny làlan’aina Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampifaly ahy indrindra amin’ny tavanao’’ (Sal. 16.8–11).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ry rahalahy, aoka aho mba hilaza aminareo marimarina ny amin’i Davida patriarka, fa efa maty izy ka nalevina koa, ary ny fasany eto amintsika mandraka andro-any. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary satria mpaminany izy ka nahalala fa Andriamanitra efa nanao fianianana taminy fa izay hateraky ny kibony no hipetraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hapetrany.
    marker-yv: yv-n
  - type: text
    text: ' eo ambonin’ny seza fiandrianany, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: koa raha nahita rahateo izy, dia nilaza ny fitsanganan’i Kristy, fa tsy nafoy ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hadesy.
    marker-yv: yv-n
  - type: text
    text: ' Izy, ary ny nofony tsy tratry ny lo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izany Jesosy izany dia efa natsangan’Andriamanitra, ary vavolombelon’izany izahay rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary rehefa nasandratry ny tànana ankavanan’Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho eo an-tànana ankavanan’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ' Izy, ary nandray tamin’ny Ray ny Fanahy Masina Izay nokasainy, dia efa nampilatsaka izao hitanareo sy renareo izao Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa tsy Davida no niakatra tany an-danitra; fa hoy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Jehovah nilaza tamin’ny Tompoko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha eo an-tànako ankavanana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao’’ (Sal. 110.1).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Koa aoka ho fantatry ny taranak’Isiraely rehetra marimarina fa iny Jesosy nohomboanareo tamin’ny hazofijaliana iny dia efa nataon’Andriamanitra ho Tompo sy Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary raha nandre izany ny olona, dia voatsindrona tam-pony ka nanao tamin’i Petera sy ny Apostoly namany hoe: Ry rahalahy, inona no hataonay? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary hoy Petera taminy: Mibebaha, ary aoka samy hatao batisa amin’ny anaran’i Jesosy Kristy hianareo rehetra mba hahazo famelana ny helokareo; ary hianareo handray ny fanomezana, dia ny Fanahy Masina; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: fa ny teny fikasana dia ho anareo sy ny zanakareo ary ho an’izay rehetra lavitra, na iza na iza hantsoin’i Jehovah Andriamanitsika hanatona Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nanambara sy nananatra azy tamin’ny teny maro hafa koa izy ka nanao hoe: Aoka hovonjena ho afaka amin’ity taranaka maditra ity hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary izay nandray tsara ny teniny dia natao batisa: ary tokony ho telo arivo no olona vao nanampy ho isany tamin’izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary izy ireo naharitra tamin’ny fampianaran’ny Apostoly sy ny fiombonana sy ny famakiana ny mofo ary ny fivavahana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia raiki-tahotra ny olona rehetra teo, ary fahagagana sy famantarana maro no nataon’ny Apostoly. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary izay rehetra nino dia niray toerana, sady niombonany avokoa ny fananany rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'ary namidiny ny taniny sy ny fananany ka nozarainy tamin’izy rehetra araka izay nilainy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary dia niray saina isan-andro izy ka nazoto nankeo an-kianjan’ny tempoly ary namaky mofo tao an-trano ka nihinan-kanina tamin’ny fifaliana sy ny fahatsoram-po, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: nidera an’Andriamanitra sady nahita fitia tamin’ny vahoaka rehetra. Ary ny olom-bonjena dia nanampin’ny Tompo isan-andro ho isan’ireo.
