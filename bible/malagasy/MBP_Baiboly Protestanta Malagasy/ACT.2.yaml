document_id: ACT.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nilatsahan’ny Fanahy Masina tamin’ny Andro Pentekosta, sy ny tori-teny nataon’i Petera tamin’izany.
  - type: text
    content: 'ARY nony tonga ny Andro Pentekosta, dia teo amin’ny fitoerana iray izy rehetra. '
  '10':
  - type: text
    content: 'sy Frygia sy Pamfylia, sy Egypta sy ny tany Libya izay manodidina an’i Kyrena, ary vahiny avy any Roma, na Jiosy na proselyta. '
  '11':
  - type: text
    content: 'Kretana sy Arabo–koa ahoana no andrenesantsika ireo miteny amin’ny fitenintsika avy ny asa lehibe ataon’Andriamanitra? '
  '12':
  - type: text
    content: 'Dia talanjona izy rehetra ka niahanahana sady niresaka hoe: Ahoana no tokony ho hevitr’izany? '
  '13':
  - type: text
    content: 'Fa ny sasany nihomehy ka nanao hoe: Leon-divay mamy ireo.'
  '14':
  - type: text
    content: 'Fa nitsangana Petera sy ny iraika ambin’ny folo lahy, dia nanandra-peo izy ka nanao taminy hoe: Ry lehilahy Jiosy sy izay rehetra monina eto Jerosalema aoka, ho fantatrareo izao, ka henoy ny teniko: '
  '15':
  - type: text
    content: 'Tsy mamo araka ny hevitrareo tsy akory ireo, fa vao ora faha-telo ihany izao ny andro. '
  '16':
  - type: text
    content: 'Fa izao ilay nampilazaina an’i Joela mpaminany hoe:'
  '17':
  - type: text
    content: ',,Ary amin’ny andro farany, hoy Andriamanitra,'
  - type: text
    content: No handatsahako ny Fanahiko amin’ny nofo rehetra;
  - type: text
    content: Ary ny zanakalahinareo sy ny zanakavavinareo haminany,
  - type: text
    content: Ary ny zatovonareo hahita fahitana,
  - type: text
    content: Ary ny lahi-antitrareo hanonofy;
  '18':
  - type: text
    content: Ary ny mpanompoko, na lahy na vavy,
  - type: text
    content: Dia handatsahako ny Fanahiko amin’izany andro izany,
  - type: text
    content: Ka dia haminany izy;
  '19':
  - type: text
    content: Ary hanisy fahagagana eny amin’ny lanitra ambony Aho
  - type: text
    content: Sy famantarana amin’ny tany ambany,
  - type: text
    content: Dia ra sy afo ary zavon’ny setroka;
  '2':
  - type: text
    content: 'Ary nisy feo tonga tampoka avy tany an-danitra, toy ny rivotra mahery mifofofofo, ka nanenika ilay trano niangonany. '
  '20':
  - type: text
    content: Ny masoandro hampodina ho aizina,
  - type: text
    content: Ary ny volana ho ra,
  - type: text
    content: Alohan’ny hahatongavan’ny andron’i Jehovah,
  - type: text
    content: Dia ilay sady lehibe no malaza;
  '21':
  - type: text
    content: Ary na zovy na zovy no hiantso ny anaran’i Jehovah dia hovonjena’’ (Joela 3.1–5).
  '22':
  - type: text
    content: 'Ry lehilahy Isiraely, mihainoa izao teny izao: Jesosy avy any Nazareta, lehilahy nasehon’Andriamanitra teo aminareo tamin’ny asa lehibe sy ny fahagagana ary ny famantarana izay nampanaovin’Andriamanitra Azy teo aminareo, tahaka ny fantatrareo ihany, '
  '23':
  - type: text
    content: 'Izy efa natolotra araka ny saina niniana sy ny fahalalan’Andriamanitra rahateo, dia nohomboanareo sy novonoinareo tamin’ny tànan’ny olona tsy tan-dalàna; '
  '24':
  - type: text
    content: 'fa Andriamanitra nanangana Azy, rehefa nahafaka ny fanaintainan’ny fahafatesana, satria tsy laitr’izany hohazonina Izy. '
  '25':
  - type: text
    content: 'Fa Davida milaza Azy hoe:'
  - type: text
    content: ',,Nijery an’i Jehovah teo anatrehako mandrakariva aho;'
  - type: text
    content: Satria eo an-kavanako Izy, mba tsy hangozohozo aho,
  '26':
  - type: text
    content: Dia izany no nifalian’ny foko sy niravoravoan’ny lelako;
  - type: text
    content: Ny nofoko koa hitoetra amin’ny fanantenana;
  '27':
  - type: text
    content: Fa tsy ho foinao ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Gr. Hadesy.
  - type: text
    content: ' ny aiko;'
  - type: text
    content: Ary tsy hamela ny Iray Masinao ho tratry ny lo Hianao.
  '28':
  - type: text
    content: Nampahafantatra ahy ny làlan’aina Hianao;
  - type: text
    content: Hampifaly ahy indrindra amin’ny tavanao’’ (Sal. 16.8–11).
  '29':
  - type: text
    content: 'Ry rahalahy, aoka aho mba hilaza aminareo marimarina ny amin’i Davida patriarka, fa efa maty izy ka nalevina koa, ary ny fasany eto amintsika mandraka andro-any. '
  '3':
  - type: text
    content: 'Ary nisy lela maro mitarehin’afo niseho taminy, izay nizarazara; ary nipetraka tamin’izy rehetra isan-olona izany. '
  '30':
  - type: text
    content: Ary satria mpaminany izy ka nahalala fa Andriamanitra efa nanao fianianana taminy fa izay hateraky ny kibony no hipetraka
  - type: note
    content: 'Na: hapetrany.'
  - type: text
    content: ' eo ambonin’ny seza fiandrianany, '
  '31':
  - type: text
    content: koa raha nahita rahateo izy, dia nilaza ny fitsanganan’i Kristy, fa tsy nafoy ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Gr. Hadesy.
  - type: text
    content: ' Izy, ary ny nofony tsy tratry ny lo.'
  '32':
  - type: text
    content: 'Izany Jesosy izany dia efa natsangan’Andriamanitra, ary vavolombelon’izany izahay rehetra. '
  '33':
  - type: text
    content: Ary rehefa nasandratry ny tànana ankavanan’Andriamanitra
  - type: note
    content: 'Na: ho eo an-tànana ankavanan’Andriamanitra.'
  - type: text
    content: ' Izy, ary nandray tamin’ny Ray ny Fanahy Masina Izay nokasainy, dia efa nampilatsaka izao hitanareo sy renareo izao Izy. '
  '34':
  - type: text
    content: Fa tsy Davida no niakatra tany an-danitra; fa hoy izy
  - type: text
    content: ',,Jehovah nilaza tamin’ny Tompoko hoe:'
  - type: text
    content: Mipetraha eo an-tànako ankavanana
  '35':
  - type: text
    content: Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao’’ (Sal. 110.1).
  '36':
  - type: text
    content: Koa aoka ho fantatry ny taranak’Isiraely rehetra marimarina fa iny Jesosy nohomboanareo tamin’ny hazofijaliana iny dia efa nataon’Andriamanitra ho Tompo sy Kristy.
  '37':
  - type: text
    content: 'Ary raha nandre izany ny olona, dia voatsindrona tam-pony ka nanao tamin’i Petera sy ny Apostoly namany hoe: Ry rahalahy, inona no hataonay? '
  '38':
  - type: text
    content: 'Ary hoy Petera taminy: Mibebaha, ary aoka samy hatao batisa amin’ny anaran’i Jesosy Kristy hianareo rehetra mba hahazo famelana ny helokareo; ary hianareo handray ny fanomezana, dia ny Fanahy Masina; '
  '39':
  - type: text
    content: fa ny teny fikasana dia ho anareo sy ny zanakareo ary ho an’izay rehetra lavitra, na iza na iza hantsoin’i Jehovah Andriamanitsika hanatona Azy.
  '4':
  - type: text
    content: Ary samy feno ny Fanahy Masina izy rehetra, ka dia niteny tamin’ny fiteny maro samy hafa, araka ny nampitenenan’ny Fanahy Masina azy.
  '40':
  - type: text
    content: 'Ary nanambara sy nananatra azy tamin’ny teny maro hafa koa izy ka nanao hoe: Aoka hovonjena ho afaka amin’ity taranaka maditra ity hianareo.'
  '41':
  - type: text
    content: 'Ary izay nandray tsara ny teniny dia natao batisa: ary tokony ho telo arivo no olona vao nanampy ho isany tamin’izany andro izany. '
  '42':
  - type: text
    content: Ary izy ireo naharitra tamin’ny fampianaran’ny Apostoly sy ny fiombonana sy ny famakiana ny mofo ary ny fivavahana.
  '43':
  - type: text
    content: 'Dia raiki-tahotra ny olona rehetra teo, ary fahagagana sy famantarana maro no nataon’ny Apostoly. '
  '44':
  - type: text
    content: 'Ary izay rehetra nino dia niray toerana, sady niombonany avokoa ny fananany rehetra, '
  '45':
  - type: text
    content: 'ary namidiny ny taniny sy ny fananany ka nozarainy tamin’izy rehetra araka izay nilainy avy. '
  '46':
  - type: text
    content: 'Ary dia niray saina isan-andro izy ka nazoto nankeo an-kianjan’ny tempoly ary namaky mofo tao an-trano ka nihinan-kanina tamin’ny fifaliana sy ny fahatsoram-po, '
  '47':
  - type: text
    content: nidera an’Andriamanitra sady nahita fitia tamin’ny vahoaka rehetra. Ary ny olom-bonjena dia nanampin’ny Tompo isan-andro ho isan’ireo.
  '5':
  - type: text
    content: 'Ary nisy Jiosy, mpivavaka tsara, nitoetra tany Jerosalema, avy tany amin’ny firenena samy hafa rehetra ambanin’ny lanitra. '
  '6':
  - type: text
    content: 'Ary nony re izany feo izany, dia niangona ny olona maro ka very hevitra, fa samy nahare azy ireo niteny tamin’ny fiteniny avy izy rehetra. '
  '7':
  - type: text
    content: 'Dia talanjona sady gaga izy rehetra ka nanao hoe: Indreo, tsy Galiliana va ireo rehetra miteny ireo? '
  '8':
  - type: text
    content: 'Koa ahoana no andrenesantsika amin’ny fitenintsika avy izay nahabe antsika– '
  '9':
  - type: text
    content: 'dia Partiana sy Mediana sy Elamita, ary mponina any Mesopotamia, sy Jodia sy Kapadokia sy Ponto sy Asia '
