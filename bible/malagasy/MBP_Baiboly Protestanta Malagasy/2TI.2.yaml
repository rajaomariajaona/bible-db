document_id: 2TI.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Famporisihana an’i Timoty haharitra tsara, na dia azom-pahoriana aza.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'KOA hianao, anaka, dia aoka hihahery amin’ny fahasoavana izay ao amin’i Kristy Jesosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izany no iaretako ny zavatra rehetra noho ny amin’ny olom-boafidy, mba hahazoan’ireny koa famonjena, dia ilay ao amin’i Kristy Jesosy, mbamin’ny voninahitra mandrakizay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mahatoky izao teny izao: Fa raha miara-maty aminy isika, dia hiara-belona aminy koa; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'raha miaritra isika, dia hiara-manjaka aminy; raha mandà '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Azy
    - type: text
      text: ' isika, Izy kosa handa antsika; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'fa na dia tsy matoky '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Azy
    - type: text
      text: ' aza isika, dia mbola mahatoky ihany Izy, fa tsy mahazo mandà ny tenany.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny mety hataon’i Timoty noho ny fisian’ny mpampianatra sandoka.
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'IZANY zavatra izany no ampahatsiarovy ny olona, ka anaro mafy eo anatrehan’ny Tompo izy mba tsy hiady teny, satria tsy mahasoa akory izany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fa
    - type: text
      text: ' mamadika ny mpihaino. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mazotoa manolotra ny tenanao amin’Andriamanitra ho olona voazaha toetra, dia mpiasa tsy mahazo henatra, mizara tsara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mamoaka tsara; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mizotra mahitsy amin’.
      marker-yv: yv-n
    - type: text
      text: ' ny teny fahamarinana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa halaviro ny fibedibedena foana; fa mbola handroso amin’ny haratsiam-panahy ihany izy ireny, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ary ny teniny dia handany tahaka ny aretina mihady;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: gangrena.
      marker-yv: yv-n
    - type: text
      text: ' isan’ireny Hymeneo sy Fileto, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: izay nania tamin’ny marina ka milaza fa efa lasa sahady ny fitsanganan’ny maty, dia mamadika ny finoan’ny sasany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Kanefa ny fanorenana mafy nataon’Andriamanitra dia miorina tsara sady manana izao tombo-kase izao: ,,Ny Tompo mahalala ny azy’’, ary koa: ,,Aoka ny olona rehetra izay manonona ny anaran’ny Tompo hiala amin’ny ratsy.’’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary izay zavatra efa renao tamiko teo anatrehan’ny vavolombelona maro dia atolory ny olona mahatoky, izay hahay mampianatra ny sasany kosa.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa ao an-trano lehibe, tsy dia fanaka volamena sy volafotsy ihany no ao, fa fanaka hazo sy tany koa, ny sasany homem-boninahitra, ary ny sasany halam-baraka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Koa raha misy olona manadio ny tenany ho afaka amin’ireny, dia ho fanaka homem-boninahitra izy, efa nohamasinina ka mahasoa ho an’ny Tompo, voavoatra ho amin’ny asa tsara rehetra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa mandosira ny filan’ny tanora fanahy; ary miezaha mitady fahamarinana, finoana, fitiavana, fihavanana amin’izay miantso ny Tompo amin’ny fo madio. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa mandava ny fanontaniana adaladala tsy misy antony, satria fantatrao fa mahatonga ady izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary tsy mety raha miady ny mpanompon’ny Tompo, fa ho malemy fanahy amin’ny olona rehetra, mahay mampianatra, mahalefitra, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'mananatra ny mpanohitra amin’ny fahamoram-panahy; fa angamba Andriamanitra hanome azy fibebahana hahalalany tsara ny marina, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ka hody ny sainy ho afaka amin’ny fandriky ny devoly, izay nanao azy sambo-belona hanao ny sitrapony.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ka hody ny sainy–ho afaka amin’ny fandriky ny devoly izay nanao azy sambo-belona–hanao ny sitrapon’
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Andriamanitra; na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fa ataon’ny mpanompon’ny Tompo sambo-belona izy hanao ny sitrapon’Andriamanitra.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Miaraha miaritra ny mafy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amiko
    - type: text
      text: ' hianao tahaka ny miaramila tsaran’i Kristy Jesosy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny miaramila manafika dia tsy mba misy maningo-tena amin’ny raharahan’izao fiainana izao, mba hahafaly izay efa nifidy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: azy
    - type: text
      text: ' ho miaramila– '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary raha misy manezaka amin’ny filalaovana, dia tsy satrohana satroboninahitra izy, raha tsy manezaka araka ny lalàna. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny mpiasa tany izay misasatra no tokony ho voalohany handray ny vokatra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Diniho izay lazaiko, fa homen’ny Tompo fahazavan-tsaina ny amin’ny zavatra rehetra hianao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsarovy Jesosy Kristy Izay natsangana tamin’ny maty, dia Ilay avy tamin’ny taranak’i Davida, araka ny filazantsarako, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'izay iaretako fahoriana hatramin’ny fatorana aza, hoatra ny mpanao ratsy; nefa ny tenin’Andriamanitra dia tsy mba voafatotra. '
