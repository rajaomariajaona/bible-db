document_id: PSA.17,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavaky ny ory mba hovonjen’Andriamanitra tsy ho azon’ny hery sy ny reharehan’ny fahavalony.
  - type: text
    content: Fivavak’i Davida.
  - type: text
    content: JEHOVAH ô, mihainoa ny rariny, mandrenesa ny fitarainako,
  - type: text
    content: Atongilano ny sofinao amin’ny fivavako avy amin’ny molotra tsy misy fitaka.
  '10':
  - type: text
    content: Efa mihirim-belona izy;
  - type: text
    content: Teny miavonavona no aloaky ny vavany.
  '11':
  - type: text
    content: Manodidina anay
  - type: note
    content: 'Na: ahy.'
  - type: text
    content: ' amin’ny alehanay ankehitriny izy,'
  - type: text
    content: Vandrininy hapotrany amin’ny tany izahay;
  '12':
  - type: text
    content: Ny fijery azy dia tahaka ny liona noana ta-hamiravira,
  - type: text
    content: Sy tahaka ny liona tanora mamitsaka ao am-pierena.
  '13':
  - type: text
    content: Mitsangàna, Jehovah ô, sakano izy, aripaho izy;
  - type: text
    content: Vonjeo amin’ny sabatrao ny fanahiko tsy ho azon’ny ratsy fanahy;
  '14':
  - type: text
    content: Vonjeo amin’ny tànanao aho, Jehovah ô, mba tsy ho azon’ny olon’izao tontolo izao,
  - type: text
    content: Izay manana ny anjarany amin’izao fiainana izao, sady fenoinao ny harenao ny kibony;
  - type: text
    content: Maro anaka izy, dia mamela ny fananany be ho an’ny zanany madinika.
  '15':
  - type: text
    content: Fa izaho kosa, dia aoka hahita ny tavanao amin’ny fahamarinana;
  - type: text
    content: Aoka ny endrikao no hahafa-po ahy, raha mifoha. .
  '2':
  - type: text
    content: Hivoaka avy eo anatrehanao ny fitsarana ahy;
  - type: text
    content: Ny masonao hijery marina.
  '3':
  - type: text
    content: Nizaha toetra ny foko Hianao, namantatra ahy nony alina;
  - type: text
    content: Nizaha toetra ahy tamin’ny memy Hianao, fa tsy nahita na inona na inona;
  - type: text
    content: Ny vavako tsy hafa noho ny eritreritro.
  - type: note
    content: 'Na: fa tsy nahita hevi-dratsy; Tsy ho diso ny vavako na: Mikasa tsy hampanota ny vavako aho.'
  '4':
  - type: text
    content: Ny amin’ny asan’ny olona, dia ny tenin’ny molotrao
  - type: text
    content: No nitandremako tsy ho amin’ny làlan’ny mpanao an-keriny.
  '5':
  - type: text
    content: Ny diako maharitra eo amin’ny làlanao,
  - type: text
    content: Tsy solafaka ny tongotro.
  '6':
  - type: text
    content: Izaho miantso Anao, ka mamaly ahy Hianao, Andriamanitra ô;
  - type: text
    content: Atongilano amiko ny sofinao, ka henoy ny teniko.
  '7':
  - type: text
    content: 'Ataovy mahagaga ny famindramponao, ry Mpamonjy amin’ny tànanao ankavanana izay olona mialoka '
  - type: text
    content: aminao
  - type: text
    content: ','
  - type: text
    content: Mba tsy ho azon’ny fahavalo.
  '8':
  - type: text
    content: Arovy tahaka ny anakandriamaso aho,
  - type: text
    content: Afeno ao ambanin’ny aloky ny elatrao,
  '9':
  - type: text
    content: Mba tsy ho azon’ny ratsy fanahy izay mampahory ahy,
  - type: text
    content: Dia ny fahavaloko masiaka, izay manodidina ahy.
