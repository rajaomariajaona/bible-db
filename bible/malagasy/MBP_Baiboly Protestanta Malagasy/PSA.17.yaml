document_id: PSA.17
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fivavaky ny ory mba hovonjen’Andriamanitra tsy ho azon’ny hery sy ny reharehan’ny fahavalony.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fivavak’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, mihainoa ny rariny, mandrenesa ny fitarainako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atongilano ny sofinao amin’ny fivavako avy amin’ny molotra tsy misy fitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hivoaka avy eo anatrehanao ny fitsarana ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masonao hijery marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nizaha toetra ny foko Hianao, namantatra ahy nony alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nizaha toetra ahy tamin’ny memy Hianao, fa tsy nahita na inona na inona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny vavako tsy hafa noho ny eritreritro.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fa tsy nahita hevi-dratsy; Tsy ho diso ny vavako '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mikasa tsy hampanota ny vavako aho.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny amin’ny asan’ny olona, dia ny tenin’ny molotrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nitandremako tsy ho amin’ny làlan’ny mpanao an-keriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny diako maharitra eo amin’ny làlanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy solafaka ny tongotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izaho miantso Anao, ka mamaly ahy Hianao, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atongilano amiko ny sofinao, ka henoy ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ataovy mahagaga ny famindramponao, ry Mpamonjy amin’ny tànanao ankavanana izay olona mialoka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: aminao
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy ho azon’ny fahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Arovy tahaka ny anakandriamaso aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afeno ao ambanin’ny aloky ny elatrao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mba tsy ho azon’ny ratsy fanahy izay mampahory ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fahavaloko masiaka, izay manodidina ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efa mihirim-belona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teny miavonavona no aloaky ny vavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Manodidina anay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahy.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny alehanay ankehitriny izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vandrininy hapotrany amin’ny tany izahay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny fijery azy dia tahaka ny liona noana ta-hamiravira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tahaka ny liona tanora mamitsaka ao am-pierena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitsangàna, Jehovah ô, sakano izy, aripaho izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo amin’ny sabatrao ny fanahiko tsy ho azon’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vonjeo amin’ny tànanao aho, Jehovah ô, mba tsy ho azon’ny olon’izao tontolo izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manana ny anjarany amin’izao fiainana izao, sady fenoinao ny harenao ny kibony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maro anaka izy, dia mamela ny fananany be ho an’ny zanany madinika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa izaho kosa, dia aoka hahita ny tavanao amin’ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny endrikao no hahafa-po ahy, raha mifoha. .
