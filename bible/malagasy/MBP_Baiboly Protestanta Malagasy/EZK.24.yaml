document_id: EZK.24
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fahitana ny amin’ny vilany fahandroana, ary ny tenin’Andriamanitra ny amin’ny hahafatesan’ny vadin’i Ezekiela.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’ny andro fahafolo tamin’ny volana fahafolo tamin’ny taona fahasivy dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ry zanak’olona, soratinao ny anaran’ny andro, dia izao andro anio izao; ny mpanjakan’i Babylona miantomboka mamely an’i Jerosalema amin’izao andro anio izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary milazà fanoharana amin’ny taranaka maditra, ka ataovy aminy hoe: Izao no lazain’i Jehovah Tompo: Asio vilany eo an-tokoana, eny, ataovy eo an-tokoana, ka asio rano ao anatiny; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary arotsahy ao ny vaingambaingany, dia ny vaingambaingany tsara rehetra, na ny feny na ny sorony; fenoy taolana voafantina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alao ny ondry voafantina, ka tohofy kitay betsaka ao ambaniny koa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hahandroana
  - type: text
    text: ' ny taolana,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ka angony eo ambaniny ny taolana.
    marker-yv: yv-n
  - type: text
    text: ' dia ampangotrahy tsara izy, ka andrahoy ao ny taolany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa izao no lazain’i Jehovah Tompo: Lozan’ny tanàna mpandatsa-dra sy ny vilany izay misy harafesina tsy mety afaka ao anatiny! Loary tsirairay ny vaingambaingany, fa aza anaovana filokana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny rany dia ao aminy; teo ambonin’ny vatolampy mangadihady no nametrahany azy; tsy naidiny tamin’ny tany hosaronan’ny vovoka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mba hampakatra ny fahatezerana hamaliana azy no nametrahako ny rany teo ambonin’ny vatolampy mangadihady mba tsy ho voasarona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa izao no lazain’i Jehovah Tompo: Lozan’ny tanàna mpandatsa-dra; Izaho koa hamory kitay betsaka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Atohofy betsaka ny kitay hazo, ampireheto ny afo, masaho tsara ny hena, ka asio zavatra hahamanitra azy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eny, taneho tsara izy.
    marker-yv: yv-n
  - type: text
    text: ' ary aoka ho may ny taolana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia foàny ny vilany, ka ataovy eo ambonin’ny vainafo hampahafana sy hahamay ny varahiny, ka ho levona eo aminy ny fahalotoany, ary ho afaka ny harafesiny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Efa nanasatra dia nanasatra ny tenany izy, nefa tsy nety afaka ny harafesim-beny; aoka ho eo amin’ny afo ny harafesiny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny fahalotoanao dia misy fahavetavetana; satria nanadio anao Aho, nefa tsy nadio hianao, dia tsy hadio ho afaka amin’ny fahalotoana intsony hianao ambara-pialako fo aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izaho Jehovah no niteny, ka ho tonga izany ary hataoko; tsy hiahotrahotra Aho, na hiantra, na hanenina; araka ny fanaonao sy ny asanao no hitsarana anao, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ry zanak’olona, indro, efa hesoriko amin’ny loza indray mamely monja ilay tian’ny masonao; nefa aza misaona na mitomany na mandatsa-dranomaso akory hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Misentoa malemilemy ihany hianao, fa aza mitomany na misaona ny maty; afehezo aminao ny hamamanao, ary asio kiraro ny tongotrao, ary aza manarona ny saokanao na mihinana ny fahan-kanina aterin’olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony maraina dia niteny tamin’ny olona aho; ary nony hariva dia maty ny vadiko; ary nony maraina indray dia nanao araka ny efa nandidiana ahy aho. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy ny olona tamiko: Moa tsy holazainao aminay va izay hevitra tokony ho azonay amin’izao ataonao izao? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy izaho taminy: Tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lazao amin’ny taranak’Isiraely hoe: Izao no lazain’i Jehovah Tompo: Indro, holotoiko ny fitoerako masina, izay reharehan’ny herinareo, dia ilay tian’ny masonareo sy mahamanina ny fanahinareo; ary ho lavon’ny sabatra ny zanakalahinareo sy ny zanakavavinareo, izay nilaozanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia manaova tahaka ny nataoko hianareo: aza manarona ny saokanareo hianareo, na mihinana ny fahan-kanina aterin’olona; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary aoka ho eo an-dohanareo ny hamamanareo sy ho eo an-tongotrareo ny kiraronareo; aza misaona na mitomany hianareo; fa ho levona noho ny helokareo hianareo ka hifampitoloko. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary Ezekiela dia ho famantarana mahagaga ho anareo; koa araka izay rehetra nataony no mba hataonareo; ary rehefa tonga izany, dia ho fantatrareo fa Izaho no Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hianao, ry zanak’olona, amin’ny andro hanesorako aminy ny heriny sy ny fifalian’ny voninahiny, ilay tian’ny masony sy ilay tian’ny fanahiny, dia ny zanani-lahy sy ny zanani-vavy, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'eny, amin’izany andro izany dia hisy olona handositra ho tonga any aminao mba hampandre ny sofinao izany; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: amin’izany andro izany dia hisokatra miaraka amin’ny an’ilay mandositra ny vavanao, ka dia hiteny hianao, fa tsy ho moana intsony; ary ho famantarana mahagaga aminy hianao; ka dia ho fantany fa Izaho no Jehovah.
