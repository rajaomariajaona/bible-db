document_id: PSA.103,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiderana an’Andriamanitra noho ny fahatsarany sy ny famindrampony.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MISAORA an’i Jehovah, ry fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay rehetra ato anatiko, misaora ny anarany masina.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy mba manao amintsika araka ny fahotantsika Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mamaly antsika araka ny helotsika.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa tahaka ny hahavon’ny lanitra ambonin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No haben’ny famindrampony amin’izay matahotra Azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tahaka ny halavitry ny atsinanana amin’ny andrefana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No halavitry ny anesorany ny fahotantsika amintsika.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tahaka ny fiantràn’ny ray ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No fiantràn’i Jehovah izay matahotra Azy;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa Izy mahalala ny toetsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mahatsiaro fa vovoka isika.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tahaka ny ahitra ny andron’ny zanak’olombelona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny vonin-javatra any an-tsaha ny famoniny,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Satria tsofin’ny rivotra izy ka lasa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mahalala azy intsony ny fitoerany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny famindrampon’i Jehovah dia hatramin’ny taloha indrindra ka ho mandrakizay amin’izay matahotra Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahamarinany mihatra amin’ny taranaka.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia amin’izay mitandrina ny fanekeny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mahatsiaro hankatò ny didiny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Jehovah efa nampitoetra ny seza fiandrianany any an-danitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanjakany manapaka izao tontolo izao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Misaora an’i Jehovah, ry fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza misy hadinoinao ny fitahiany rehetra,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Misaora an’i Jehovah, hianareo anjeliny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hianareo izay mahery indrindra sady mankatò ny didiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihaino ny feon’ny teniny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Misaora an’i Jehovah, ny miaramilany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny mpanompony izay manao ny sitrapony.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Misaora an’i Jehovah, ny asany rehetra eran’ny fanjakany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaora an’i Jehovah, ry fanahiko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izay mamela ny helokao rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manasitrana ny aretinao rehetra,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izay manavotra ny ainao tsy hidina any an-davaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manarona famindrampo sy fiantrana anao,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izay mahavoky soa ny vavanao;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '103.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fanahinao, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahanteranao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatanoranao mody indray toy ny an’ny voromahery.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '103.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho toy ny voromahery.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Jehovah manao fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fitsarana amin’izay rehetra ampahorina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Efa nampahafantatra an’i Mosesy ny làlan-kalehany Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Zanak’Isiraely nampahafantariny ny asany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mamindra fo sy miantra Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahari-po sady be famindrampo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsy mandaha-teny mandrakariva Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mitahiry fahatezerana mandrakizay.
