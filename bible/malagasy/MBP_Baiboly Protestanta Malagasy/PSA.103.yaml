document_id: PSA.103,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny fahatsarany sy ny famindrampony.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: MISAORA an’i Jehovah, ry fanahiko;
  - type: text
    content: Ary izay rehetra ato anatiko, misaora ny anarany masina.
  '10':
  - type: text
    content: Tsy mba manao amintsika araka ny fahotantsika Izy,
  - type: text
    content: Na mamaly antsika araka ny helotsika.
  '11':
  - type: text
    content: Fa tahaka ny hahavon’ny lanitra ambonin’ny tany
  - type: text
    content: No haben’ny famindrampony amin’izay matahotra Azy.
  '12':
  - type: text
    content: Tahaka ny halavitry ny atsinanana amin’ny andrefana
  - type: text
    content: No halavitry ny anesorany ny fahotantsika amintsika.
  '13':
  - type: text
    content: Tahaka ny fiantràn’ny ray ny zanany
  - type: text
    content: No fiantràn’i Jehovah izay matahotra Azy;
  '14':
  - type: text
    content: Fa Izy mahalala ny toetsika
  - type: text
    content: Ka mahatsiaro fa vovoka isika.
  '15':
  - type: text
    content: Tahaka ny ahitra ny andron’ny zanak’olombelona;
  - type: text
    content: Tahaka ny vonin-javatra any an-tsaha ny famoniny,
  '16':
  - type: text
    content: Satria tsofin’ny rivotra izy ka lasa,
  - type: text
    content: Ary tsy mahalala azy intsony ny fitoerany.
  '17':
  - type: text
    content: Fa ny famindrampon’i Jehovah dia hatramin’ny taloha indrindra ka ho mandrakizay amin’izay matahotra Azy
  - type: text
    content: Ary ny fahamarinany mihatra amin’ny taranaka.
  '18':
  - type: text
    content: Dia amin’izay mitandrina ny fanekeny
  - type: text
    content: Sy mahatsiaro hankatò ny didiny.
  '19':
  - type: text
    content: Jehovah efa nampitoetra ny seza fiandrianany any an-danitra;
  - type: text
    content: Ary ny fanjakany manapaka izao tontolo izao.
  '2':
  - type: text
    content: Misaora an’i Jehovah, ry fanahiko;
  - type: text
    content: Ary aza misy hadinoinao ny fitahiany rehetra,
  '20':
  - type: text
    content: Misaora an’i Jehovah, hianareo anjeliny,
  - type: text
    content: Dia hianareo izay mahery indrindra sady mankatò ny didiny
  - type: text
    content: Ary mihaino ny feon’ny teniny.
  '21':
  - type: text
    content: Misaora an’i Jehovah, ny miaramilany rehetra,
  - type: text
    content: Dia ny mpanompony izay manao ny sitrapony.
  '22':
  - type: text
    content: Misaora an’i Jehovah, ny asany rehetra eran’ny fanjakany;
  - type: text
    content: Misaora an’i Jehovah, ry fanahiko.
  '3':
  - type: text
    content: Izay mamela ny helokao rehetra,
  - type: text
    content: Izay manasitrana ny aretinao rehetra,
  '4':
  - type: text
    content: Izay manavotra ny ainao tsy hidina any an-davaka,
  - type: text
    content: Izay manarona famindrampo sy fiantrana anao,
  '5':
  - type: text
    content: Izay mahavoky soa ny vavanao;
  - type: note
    content: 'Na: fanahinao, na fahanteranao.'
  - type: text
    content: Ny fahatanoranao mody indray toy ny an’ny voromahery.
  - type: note
    content: 'Na: ho toy ny voromahery.'
  '6':
  - type: text
    content: Jehovah manao fahamarinana
  - type: text
    content: Sy fitsarana amin’izay rehetra ampahorina.
  '7':
  - type: text
    content: Efa nampahafantatra an’i Mosesy ny làlan-kalehany Izy;
  - type: text
    content: Ny Zanak’Isiraely nampahafantariny ny asany.
  '8':
  - type: text
    content: Mamindra fo sy miantra Jehovah,
  - type: text
    content: Mahari-po sady be famindrampo.
  '9':
  - type: text
    content: Tsy mandaha-teny mandrakariva Izy,
  - type: text
    content: Na mitahiry fahatezerana mandrakizay.
