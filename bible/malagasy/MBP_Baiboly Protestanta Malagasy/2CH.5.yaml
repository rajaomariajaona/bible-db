document_id: 2CH.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Toy izany no nahavitana ny asa rehetra nataon’i Solomona ho amin’ny tranon’i Jehovah; ary nampidirin’i Solomona ny zavatra rehetra izay efa nohamasinin’i Davida rainy, dia ny volafotsy sy ny volamena; ary ny fanaka rehetra dia nataony tao amin’ny rakitry ny tranon’ Andriamanitra.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitokanana ny tempoly.
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary tsy nisy na inona na inona tao anatin’ny fiara afa-tsy ny vato fisaka roa ihany izay nataon’i Mosesy tao anatiny fony tany Horeba, tamin’i Jehovah nanao fanekena tamin’ny Zanak’Isiraely, tamin’ny nivoahany avy tany Egypta.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nony nivoaka avy tao amin’ny fitoerana masina ny mpisorona (fa ny mpisorona rehetra izay teo dia samy efa nanamasina ny tenany, fa tsy mba nifandimby isan-toko tamin’izay), '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary ny Levita mpihira rehetra, dia Asafa sy Hemana sy Jedotona mbamin’ny zanany sy ny rahalahiny, izay nitafy rongony fotsy madinika sady nitondra kipantsona sy valiha ary lokanga, dia nitsangana teo atsinanan’ny alitara, ary teo aminy koa nisy mpisorona roa-polo amby zato nitsoka trompetra; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary efa toy ny feo iray no fandrenesana ny mpitsoka trompetra sy ny mpihira, raha nidera sy nisaotra an’i Jehovah izy; ka nony nanandratra ny feony izy sady nampaneno ny trompetra sy ny kipantsona sy ny zava-maneno isan-karazany ka nidera an’i Jehovah fa tsara Izy, fa mandrakizay ny famindrampony, dia feno rahona ny tranon’i Jehovah; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ka dia tsy nahajanona hanao fanompoam-pivavahana ny mpisorona noho ny rahona; fa feno ny voninahitr’i Jehovah ny tranon’Andriamanitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ARY tamin’izany dia novorin’i Solomona ny loholon’ny Isiraely sy ny lehiben’ny firenena rehetra, dia ny lohan’ny fianakavian’ny Zanak’Isiraely, ho any Jerosalema hampakatra ny fiaran’ny faneken’i Jehovah avy any Ziona, Tanànan’i Davida.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nivory ho any amin’ny mpanjaka ny lehilahy rehetra amin’ny Isiraely tamin’ny andro firavoravoana tamin’ny volana fahafito. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary tonga koa ny loholon’ny Isiraely rehetra, ka ny Levita no nitondra ny fiara, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'dia nampakariny ny fiara sy ny trano-lay fihaonana ary ny fanaka masina rehetra izay tao amin’ny lay. Nampakarin’ny Levita mpisorona ireo zavatra ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary Solomona mpanjaka sy ny fiangonana, dia ny Isiraely rehetra, izay nivory teo aminy teo anoloan’ny fiara, dia samy namono zavatra hatao fanatitra, dia ondry aman-osy sy omby izay tsy tambo isaina sady tsy hita isa noho ny hamaroany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny fiaran’ny faneken’i Jehovah dia nampidirin’ny mpisorona ho ao amin’ny fitoerany tao anatin’ny efi-trano anatiny, dia ny fitoerana masina indrindra, teo ambanin’ny elatry ny kerobima; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'fa nivelatra tambonin’ny fitoeran’ny fiara ny elatry ny kerobima ka nanaloka ny fiara sy ny baony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary lava ny bao, ka hita ny lohany, raha eo amin’ny fiara eo anoloan’ny efitra anatiny, nefa tsy hita eny ivelany; ary mbola ao mandraka andro-any izy.
