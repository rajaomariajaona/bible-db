document_id: JHN.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitan’i Jesosy ny Ranomasin’i Galilia, sy ny nampihinanany ny lehilahy dimy arivo.
  - type: heading
    content: Mat. 14.13-23; Mar. 6.30-46; Lio. 9.10-17.
  - type: text
    content: 'REHEFA afaka izany, dia niala Jesosy ka lasa nita ny Ranomasin’i Galilia, dia ny Ranomasin’i Tiberiasy izany. '
  '10':
  - type: text
    content: 'Fa hoy Jesosy: Asaovy mipetraka ny olona. Ary nisy ahitra be teo. Ka dia nipetraka ny lehilahy, tokony ho dimy arivo no isany. '
  '11':
  - type: text
    content: Dia nandray ny mofo Jesosy; ary rehefa nisaotra, dia nizara izany tamin’izay nipetraka hihinana Izy; ary ny hazandrano koa araka izay nilainy.
  '12':
  - type: text
    content: 'Ary rehefa voky ny olona, dia hoy Jesosy tamin’ny mpianany: Angony ny sisa tsy lany, mba tsy hisy ho very. '
  '13':
  - type: text
    content: Dia nangoniny, ka nahafeno harona roa ambin’ny folo ny sombintsombin’ny mofo vary hordea dimy, izay ambiny tsy lanin’ny nihinana.
  '14':
  - type: text
    content: 'Ary hoy ireny olona ireny, rehefa nahita ny famantarana izay nataon’i Jesosy: Ity tokoa no Ilay Mpaminany Izay ho tonga amin’izao tontolo izao.'
  '15':
  - type: text
    content: Ary rehefa fantatr’i Jesosy fa efa ho avy ny olona haka Azy an-keriny hataony mpanjaka, dia niala ka lasa indray Izy irery nankany an-tendrombohitra.
  - type: heading
    content: Ny nitsangantsanganan’i Jesosy tambonin’ny ranomasina.
  - type: heading
    content: Mat. 14.24-36; Mar. 6.47-56.
  '16':
  - type: text
    content: 'ARY rehefa hariva ny andro, dia nidina ho any amin’ny ranomasina ny mpianany. '
  '17':
  - type: text
    content: 'Ary niondrana an-tsambokely izy, dia nita ny ranomasina nankany Kapernaomy. Ary efa maizina ny andro tamin’izay, nefa Jesosy tsy mbola tonga tany aminy. '
  '18':
  - type: text
    content: 'Ary ny ranomasina nanonja, fa mafy ny fifofofofon’ny rivotra. '
  '19':
  - type: text
    content: Ary rehefa nivoy tokony ho dimy amby roa-polo na telo-polo stadio
  - type: note
    content: 'Na: dimy na enina kilometatra.'
  - type: text
    content: ' izy, dia nahita an’i Jesosy nitsangantsangana eny ambonin’ny ranomasina ka nanakaiky ny sambokely; dia natahotra izy. '
  '2':
  - type: text
    content: 'Ary nisy vahoaka betsaka nanaraka Azy noho ny nahitany ny famantarana izay efa nataony tamin’ny marary. '
  '20':
  - type: text
    content: 'Fa hoy Jesosy taminy: Izaho ihany; aza matahotra. '
  '21':
  - type: text
    content: Dia ta-handray Azy ho eo an-tsambokely izy; ary niaraka tamin’izay ny sambokely dia tonga tamin’ny tany izay nalehany.
  - type: heading
    content: Ny nitorian’i Jesosy ny amin’ny mofon’aina.
  '22':
  - type: text
    content: 'NONY ampitson’iny ny vahoaka izay nijanona teny am-pitan’ny ranomasina dia nahita fa tsy nisy sambokely hafa teo afa-tsy iray ihany, ary Jesosy tsy mba niara-niondrana an-tsambokely tamin’ny mpianany, fa ny mpianany ihany no nandeha, '
  '23':
  - type: text
    content: 'kanefa nisy sambokely hafa avy tany Tiberiasy tonga teo akaikin’ilay tany nihinanany ny mofo, rehefa nisaotra ny Tompo,– '
  '24':
  - type: text
    content: koa nony hitan’ny vahoaka fa tsy teo Jesosy, na ny mpianany, dia niondrana an-tsambokely izy ka nankany Kapernaomy hitady an’i Jesosy.
  '25':
  - type: text
    content: 'Ary rehefa nahita Azy teny am-pitan’ny ranomasina izy, dia hoy izy taminy: Raby ô, oviana no tonga teto Hianao? '
  '26':
  - type: text
    content: 'Jesosy namaly azy hoe: Lazaiko aminareo marina dia marina tokoa: Mitady Ahy hianareo, nefa tsy noho ny nahitanareo famantarana, fa noho ny nihinananareo ny mofo ka voky. '
  '27':
  - type: text
    content: Aza miasa hahazo ny hanina mety ho levona, fa ny hanina izay maharitra ho fiainana mandrakizay, izay homen’ny Zanak’olona anareo; fa Izy no nasian’Andriamanitra Ray tombo-kase.
  '28':
  - type: text
    content: 'Dia hoy ireo taminy: Inona no hataonay mba hiasanay ny asan’Andriamanitra? '
  '29':
  - type: text
    content: 'Jesosy namaly ka nanao taminy hoe: Izao no asan’Andriamanitra, dia ny hinoanareo Izay nirahiny.'
  '3':
  - type: text
    content: 'Ary Jesosy niakatra tao an-tendrombohitra, dia nipetraka tao mbamin’ny mpianany. '
  '30':
  - type: text
    content: 'Dia hoy ireo taminy: Inona ary no famantarana ataonao, mba ho hitanay ka hinoanay Anao? Inona moa no asa ataonao? '
  '31':
  - type: text
    content: 'Ny razantsika nihinana ny mana tany an-efitra, araka ny voasoratra hoe: ,,Mofo avy tany an-danitra no nomeny azy hohaniny (Sal. 78.24)’’. '
  '32':
  - type: text
    content: 'Dia hoy Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Tsy Mosesy no nanome anareo ny mofo avy tany an-danitra; fa ny Raiko no manome anareo ny tena mofo avy any an-danitra. '
  '33':
  - type: text
    content: Fa ny mofon’Andriamanitra dia Ilay midina avy any an-danitra ka manome fiainana ho an’izao tontolo izao.
  '34':
  - type: text
    content: 'Ary hoy ireo taminy: Tompo ô, omeo anay mandrakariva izany mofo izany. '
  '35':
  - type: text
    content: 'Hoy Jesosy taminy: Izaho no mofon’aina; izay manatona Ahy tsy mba ho noana, ary izay mino Ahy tsy mba hangetaheta intsony. '
  '36':
  - type: text
    content: 'Fa efa nolazaiko taminareo fa nahita Ahy ihany hianareo, nefa tsy mino. '
  '37':
  - type: text
    content: 'Izay rehetra omen’ny Raiko Ahy no hanatona Ahy; ary izay manatona Ahy dia tsy mba holaviko mihitsy. '
  '38':
  - type: text
    content: 'Fa tsy nidina avy tany an-danitra Aho mba hanao ny sitrapoko, fa ny sitrapon’Izay naniraka Ahy. '
  '39':
  - type: text
    content: 'Ary izao no sitrapon’Izay naniraka Ahy, dia ny tsy hamelako hisy very izay rehetra nomeny Ahy, fa hatsangako indray amin’ny andro farany izy. '
  '4':
  - type: text
    content: Fa efa akaiky ny Paska, ilay andro firavoravoan’ny Jiosy.
  '40':
  - type: text
    content: Fa izao no sitrapon’ny Raiko, dia ny hahazoan’izay rehetra mijery ny Zanaka ka mino Azy fiainana mandrakizay; ary Izaho hanangana azy amin’ny andro farany.
  '41':
  - type: text
    content: 'Dia nimonomonona tamin’i Jesosy ny Jiosy, satria Izy nanao hoe: Izaho no mofo izay nidina avy tany an-danitra. '
  '42':
  - type: text
    content: 'Dia hoy ireo: Tsy Ilehio va no Jesosy, Zanak’i Josefa, Izay fantatsika ny rainy aman-dreniny? Ahoana no dia anaovany ankehitriny hoe: Izaho nidina avy tany an-danitra?'
  '43':
  - type: text
    content: 'Jesosy namaly ka nanao taminy hoe: Aza mimonomonona hianareo. '
  '44':
  - type: text
    content: 'Tsy misy olona mahay manatona Ahy, raha tsy taomin’ny Ray Izay naniraka Ahy; ary Izaho hanangana azy amin’ny andro farany. '
  '45':
  - type: text
    content: 'Voasoratra ao amin’ny mpaminany hoe: ,,Ary izy rehetra dia hampianarin’Andriamanitra’’ (Isa. 54.13). Izay rehetra mandre ka mianatra amin’ny Ray no manatona Ahy. '
  '46':
  - type: text
    content: 'Nefa tsy nisy nahita ny Ray, afa-tsy Izay avy amin’Andriamanitra: Izy no nahita ny Ray.'
  '47':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Izay mino no manana fiainana mandrakizay. '
  '48':
  - type: text
    content: 'Izaho no mofon’aina. '
  '49':
  - type: text
    content: 'Ny razanareo nihinana ny mana tany an-efitra, nefa maty ihany. '
  '5':
  - type: text
    content: 'Ary Jesosy nanopy ny masony ka nahita fa nisy vahoaka betsaka nanatona Azy, dia hoy Izy tamin’i Filipo: Aiza no hividianantsika mofo hohanin’ireo? '
  '50':
  - type: text
    content: 'Ity no mofo izay midina avy any an-danitra, mba tsy ho faty izay mihinana azy. '
  '51':
  - type: text
    content: Izaho no mofo velona izay nidina avy tany an-danitra; raha misy mihinana ity mofo ity, dia ho velona mandrakizay izy; ary ny mofo izay homeko dia ny nofoko ho fiainan’izao tontolo izao.
  '52':
  - type: text
    content: 'Dia nifanditra ny Jiosy ka nanao hoe: Hataon’Ilehio ahoana re no fanome ny nofony hohanintsika? '
  '53':
  - type: text
    content: 'Fa hoy Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Raha tsy mihinana ny nofon’ny Zanak’olona sy misotro ny rany hianareo, dia tsy manana fiainana ao aminareo. '
  '54':
  - type: text
    content: 'Izay mihinana ny nofoko sy misotro ny rako no manana fiainana mandrakizay; ary Izaho hanangana azy amin’ny andro farany. '
  '55':
  - type: text
    content: 'Fa ny nofoko no tena fihinana, ary ny rako no tena fisotro. '
  '56':
  - type: text
    content: 'Izay mihinana ny nofoko sy misotro ny rako no mitoetra ao amiko, ary Izaho kosa ao aminy. '
  '57':
  - type: text
    content: 'Ary tahaka ny nanirahan’ny Ray velona Ahy, ary Izaho koa velona amin’ny Ray, dia tahaka izany koa izay mihinana Ahy no ho velona amiko. '
  '58':
  - type: text
    content: Ity no mofo izay nidina avy tany an-danitra; tsy tahaka ny razana izay nihinana, nefa maty ihany; fa izay mihinana ity mofo ity dia ho velona mandrakizay.
  '59':
  - type: text
    content: Izany teny izany no nolazainy tao amin’ny synagoga, raha nampianatra tao Kapernaomy Izy.
  '6':
  - type: text
    content: 'Izany no nataony mba hizahany toetra azy; fa Izy nahalala ihany izay efa hataony. '
  '60':
  - type: text
    content: 'Koa maro tamin’ny mpianany, nony nandre, dia nanao hoe: Sarotra izany teny izany, iza no mahahaino izany? '
  '61':
  - type: text
    content: 'Ary fantatr’i Jesosy tao am-pony fa nimonomonona tamin’izany ny mpianany, ka dia hoy Izy taminy: Mahatafintohina anareo va izay? '
  '62':
  - type: text
    content: 'Mainka raha mahita ny Zanak’olona miakatra ho any amin’izay nitoerany taloha hianareo. '
  '63':
  - type: text
    content: 'Ny fanahy no mahavelona; ny nofo tsy mahasoa na inona na inona; ny teny izay nolazaiko taminareo dia fanahy sy fiainana. '
  '64':
  - type: text
    content: Fa misy ny sasany aminareo izay tsy mino.
  - type: text
    content: 'Fa fantatr’i Jesosy hatramin’ny voalohany izay tsy nino sy izay hamadika Azy. '
  '65':
  - type: text
    content: 'Ary hoy Izy: Izany no nilazako taminareo fa tsy misy olona mahay manatona Ahy, raha tsy nomen’ny Ray azy izany.'
  '66':
  - type: text
    content: Hatramin’izany
  - type: note
    content: 'Na: Noho izany.'
  - type: text
    content: ' dia maro tamin’ny mpianany no nihemotra ka tsy niara-nandeha taminy intsony. '
  '67':
  - type: text
    content: 'Dia hoy Jesosy tamin’ny roa ambin’ny folo lahy: Hianareo koa va mba te-hiala? '
  '68':
  - type: text
    content: 'Simona Petera namaly Azy hoe: Tompo ô, hankany amin’iza moa izahay? Hianao no manana ny tenin’ny fiainana mandrakizay. '
  '69':
  - type: text
    content: 'Ary izahay mino ka mahalala fa Hianao no Ilay Masin’Andriamanitra. '
  '7':
  - type: text
    content: 'Filipo namaly Azy hoe: Na dia mofo vidina denaria roan-jato aza tsy ampy azy rehetra hananany kely avy. '
  '70':
  - type: text
    content: 'Jesosy namaly azy hoe: Tsy Izaho va no nifidy anareo roa ambin’ny folo lahy, nefa ny anankiray aminareo aza dia devoly? '
  '71':
  - type: text
    content: 'Fa Izy nilaza an’i Jodasy, '
  - type: text
    content: zanak’
  - type: text
    content: ' i Simona Iskariota; fa izy io no ilay efa hamadika Azy, '
  - type: text
    content: nefa
  - type: text
    content: ' isan’ny roa ambin’ny folo lahy.'
  '8':
  - type: text
    content: 'Ny mpianany anankiray, dia Andrea, rahalahin’i Simona Petera, nilaza taminy hoe: '
  '9':
  - type: text
    content: Misy zazalahy atỳ manana mofo vary hordea dimy sy hazandrano madinika roa, fa ho ampy inona moa izany amin’izao olona betsaka izao?
