document_id: JHN.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitan’i Jesosy ny Ranomasin’i Galilia, sy ny nampihinanany ny lehilahy dimy arivo.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 14.13-23; Mar. 6.30-46; Lio. 9.10-17.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'REHEFA afaka izany, dia niala Jesosy ka lasa nita ny Ranomasin’i Galilia, dia ny Ranomasin’i Tiberiasy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy vahoaka betsaka nanaraka Azy noho ny nahitany ny famantarana izay efa nataony tamin’ny marary. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Jesosy niakatra tao an-tendrombohitra, dia nipetraka tao mbamin’ny mpianany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa efa akaiky ny Paska, ilay andro firavoravoan’ny Jiosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jesosy nanopy ny masony ka nahita fa nisy vahoaka betsaka nanatona Azy, dia hoy Izy tamin’i Filipo: Aiza no hividianantsika mofo hohanin’ireo? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izany no nataony mba hizahany toetra azy; fa Izy nahalala ihany izay efa hataony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Filipo namaly Azy hoe: Na dia mofo vidina denaria roan-jato aza tsy ampy azy rehetra hananany kely avy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny mpianany anankiray, dia Andrea, rahalahin’i Simona Petera, nilaza taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Misy zazalahy atỳ manana mofo vary hordea dimy sy hazandrano madinika roa, fa ho ampy inona moa izany amin’izao olona betsaka izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy Jesosy: Asaovy mipetraka ny olona. Ary nisy ahitra be teo. Ka dia nipetraka ny lehilahy, tokony ho dimy arivo no isany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nandray ny mofo Jesosy; ary rehefa nisaotra, dia nizara izany tamin’izay nipetraka hihinana Izy; ary ny hazandrano koa araka izay nilainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa voky ny olona, dia hoy Jesosy tamin’ny mpianany: Angony ny sisa tsy lany, mba tsy hisy ho very. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nangoniny, ka nahafeno harona roa ambin’ny folo ny sombintsombin’ny mofo vary hordea dimy, izay ambiny tsy lanin’ny nihinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy ireny olona ireny, rehefa nahita ny famantarana izay nataon’i Jesosy: Ity tokoa no Ilay Mpaminany Izay ho tonga amin’izao tontolo izao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary rehefa fantatr’i Jesosy fa efa ho avy ny olona haka Azy an-keriny hataony mpanjaka, dia niala ka lasa indray Izy irery nankany an-tendrombohitra.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitsangantsanganan’i Jesosy tambonin’ny ranomasina.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 14.24-36; Mar. 6.47-56.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ARY rehefa hariva ny andro, dia nidina ho any amin’ny ranomasina ny mpianany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary niondrana an-tsambokely izy, dia nita ny ranomasina nankany Kapernaomy. Ary efa maizina ny andro tamin’izay, nefa Jesosy tsy mbola tonga tany aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny ranomasina nanonja, fa mafy ny fifofofofon’ny rivotra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary rehefa nivoy tokony ho dimy amby roa-polo na telo-polo stadio
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dimy na enina kilometatra.
    marker-yv: yv-n
  - type: text
    text: ' izy, dia nahita an’i Jesosy nitsangantsangana eny ambonin’ny ranomasina ka nanakaiky ny sambokely; dia natahotra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy Jesosy taminy: Izaho ihany; aza matahotra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia ta-handray Azy ho eo an-tsambokely izy; ary niaraka tamin’izay ny sambokely dia tonga tamin’ny tany izay nalehany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitorian’i Jesosy ny amin’ny mofon’aina.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'NONY ampitson’iny ny vahoaka izay nijanona teny am-pitan’ny ranomasina dia nahita fa tsy nisy sambokely hafa teo afa-tsy iray ihany, ary Jesosy tsy mba niara-niondrana an-tsambokely tamin’ny mpianany, fa ny mpianany ihany no nandeha, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'kanefa nisy sambokely hafa avy tany Tiberiasy tonga teo akaikin’ilay tany nihinanany ny mofo, rehefa nisaotra ny Tompo,– '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: koa nony hitan’ny vahoaka fa tsy teo Jesosy, na ny mpianany, dia niondrana an-tsambokely izy ka nankany Kapernaomy hitady an’i Jesosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary rehefa nahita Azy teny am-pitan’ny ranomasina izy, dia hoy izy taminy: Raby ô, oviana no tonga teto Hianao? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jesosy namaly azy hoe: Lazaiko aminareo marina dia marina tokoa: Mitady Ahy hianareo, nefa tsy noho ny nahitanareo famantarana, fa noho ny nihinananareo ny mofo ka voky. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aza miasa hahazo ny hanina mety ho levona, fa ny hanina izay maharitra ho fiainana mandrakizay, izay homen’ny Zanak’olona anareo; fa Izy no nasian’Andriamanitra Ray tombo-kase.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy ireo taminy: Inona no hataonay mba hiasanay ny asan’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jesosy namaly ka nanao taminy hoe: Izao no asan’Andriamanitra, dia ny hinoanareo Izay nirahiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy ireo taminy: Inona ary no famantarana ataonao, mba ho hitanay ka hinoanay Anao? Inona moa no asa ataonao? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny razantsika nihinana ny mana tany an-efitra, araka ny voasoratra hoe: ,,Mofo avy tany an-danitra no nomeny azy hohaniny (Sal. 78.24)’’. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia hoy Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Tsy Mosesy no nanome anareo ny mofo avy tany an-danitra; fa ny Raiko no manome anareo ny tena mofo avy any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa ny mofon’Andriamanitra dia Ilay midina avy any an-danitra ka manome fiainana ho an’izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy ireo taminy: Tompo ô, omeo anay mandrakariva izany mofo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hoy Jesosy taminy: Izaho no mofon’aina; izay manatona Ahy tsy mba ho noana, ary izay mino Ahy tsy mba hangetaheta intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa efa nolazaiko taminareo fa nahita Ahy ihany hianareo, nefa tsy mino. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izay rehetra omen’ny Raiko Ahy no hanatona Ahy; ary izay manatona Ahy dia tsy mba holaviko mihitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa tsy nidina avy tany an-danitra Aho mba hanao ny sitrapoko, fa ny sitrapon’Izay naniraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary izao no sitrapon’Izay naniraka Ahy, dia ny tsy hamelako hisy very izay rehetra nomeny Ahy, fa hatsangako indray amin’ny andro farany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Fa izao no sitrapon’ny Raiko, dia ny hahazoan’izay rehetra mijery ny Zanaka ka mino Azy fiainana mandrakizay; ary Izaho hanangana azy amin’ny andro farany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia nimonomonona tamin’i Jesosy ny Jiosy, satria Izy nanao hoe: Izaho no mofo izay nidina avy tany an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia hoy ireo: Tsy Ilehio va no Jesosy, Zanak’i Josefa, Izay fantatsika ny rainy aman-dreniny? Ahoana no dia anaovany ankehitriny hoe: Izaho nidina avy tany an-danitra?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jesosy namaly ka nanao taminy hoe: Aza mimonomonona hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Tsy misy olona mahay manatona Ahy, raha tsy taomin’ny Ray Izay naniraka Ahy; ary Izaho hanangana azy amin’ny andro farany. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Voasoratra ao amin’ny mpaminany hoe: ,,Ary izy rehetra dia hampianarin’Andriamanitra’’ (Isa. 54.13). Izay rehetra mandre ka mianatra amin’ny Ray no manatona Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Nefa tsy nisy nahita ny Ray, afa-tsy Izay avy amin’Andriamanitra: Izy no nahita ny Ray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Izay mino no manana fiainana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Izaho no mofon’aina. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ny razanareo nihinana ny mana tany an-efitra, nefa maty ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ity no mofo izay midina avy any an-danitra, mba tsy ho faty izay mihinana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Izaho no mofo velona izay nidina avy tany an-danitra; raha misy mihinana ity mofo ity, dia ho velona mandrakizay izy; ary ny mofo izay homeko dia ny nofoko ho fiainan’izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia nifanditra ny Jiosy ka nanao hoe: Hataon’Ilehio ahoana re no fanome ny nofony hohanintsika? '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Fa hoy Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Raha tsy mihinana ny nofon’ny Zanak’olona sy misotro ny rany hianareo, dia tsy manana fiainana ao aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Izay mihinana ny nofoko sy misotro ny rako no manana fiainana mandrakizay; ary Izaho hanangana azy amin’ny andro farany. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Fa ny nofoko no tena fihinana, ary ny rako no tena fisotro. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Izay mihinana ny nofoko sy misotro ny rako no mitoetra ao amiko, ary Izaho kosa ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary tahaka ny nanirahan’ny Ray velona Ahy, ary Izaho koa velona amin’ny Ray, dia tahaka izany koa izay mihinana Ahy no ho velona amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ity no mofo izay nidina avy tany an-danitra; tsy tahaka ny razana izay nihinana, nefa maty ihany; fa izay mihinana ity mofo ity dia ho velona mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Izany teny izany no nolazainy tao amin’ny synagoga, raha nampianatra tao Kapernaomy Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Koa maro tamin’ny mpianany, nony nandre, dia nanao hoe: Sarotra izany teny izany, iza no mahahaino izany? '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary fantatr’i Jesosy tao am-pony fa nimonomonona tamin’izany ny mpianany, ka dia hoy Izy taminy: Mahatafintohina anareo va izay? '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Mainka raha mahita ny Zanak’olona miakatra ho any amin’izay nitoerany taloha hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ny fanahy no mahavelona; ny nofo tsy mahasoa na inona na inona; ny teny izay nolazaiko taminareo dia fanahy sy fiainana. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Fa misy ny sasany aminareo izay tsy mino.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa fantatr’i Jesosy hatramin’ny voalohany izay tsy nino sy izay hamadika Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Ary hoy Izy: Izany no nilazako taminareo fa tsy misy olona mahay manatona Ahy, raha tsy nomen’ny Ray azy izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Hatramin’izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.66 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Noho izany.
    marker-yv: yv-n
  - type: text
    text: ' dia maro tamin’ny mpianany no nihemotra ka tsy niara-nandeha taminy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Dia hoy Jesosy tamin’ny roa ambin’ny folo lahy: Hianareo koa va mba te-hiala? '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Simona Petera namaly Azy hoe: Tompo ô, hankany amin’iza moa izahay? Hianao no manana ny tenin’ny fiainana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Ary izahay mino ka mahalala fa Hianao no Ilay Masin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Jesosy namaly azy hoe: Tsy Izaho va no nifidy anareo roa ambin’ny folo lahy, nefa ny anankiray aminareo aza dia devoly? '
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Fa Izy nilaza an’i Jodasy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zanak’
  - type: text
    text: ' i Simona Iskariota; fa izy io no ilay efa hamadika Azy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nefa
  - type: text
    text: ' isan’ny roa ambin’ny folo lahy.'
