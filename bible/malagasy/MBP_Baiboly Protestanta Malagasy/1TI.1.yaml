document_id: 1TI.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiarahabana sy anatra ny amin’ny mpampianatra sandoka, ary filazana ny amin’ny lalàna sy ny filazantsara, ary ny fahasoavan’Andriamanitra tamin’i Paoly.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'PAOLY, Apostolin’i Kristy Jesosy araka ny didin’Andriamanitra, Mpamonjy antsika, sy Kristy Jesosy fanantenantsika, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny mpijangajanga, ny sodomita, ny mpangalatra olona, ny mpandainga, ny mpianian-tsy to, ary na inona na inona manohitra ny fampianarana tsy misy kilema,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: salama.
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: araka ny filazantsaran’ny voninahitr’Andriamanitra finaritra, izay natolotra ho adidiko.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaotra an’i Kristy Jesosy Tompontsika aho, Izay nampahery ahy, fa nataony mahatoky aho ka notendreny ho amin’ny fanompoana, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia izaho, izay mpiteny ratsy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mpanao blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Mat. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix. 3.
      marker-yv: yv-n
    - type: text
      text: ' fahiny sady mpanenjika sy mpampahory; kanefa nahazo famindrampo aho, satria tamin’ny tsi-fahalalana no nanaovako izany noho ny tsi-finoana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa be indrindra ny fahasoavan’ny Tompontsika tamin’ny finoana sy ny fitiavana, izay ao amin’i Kristy Jesosy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahatoky ka tokony hekena amin’ny fankasitrahana rehetra izao teny izao: tonga tetỳ ambonin’ny tany Kristy Jesosy hamonjy ny mpanota, ary amin’ireny izaho no lohany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa izao no namindrana fo tamiko, dia ny mba hasehon’i Jesosy Kristy eo amiko izay lohany, ny fahari-po rehetra ho fianarana ho an’izay hino Azy hahazoana fiainana mandrakizay.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho an’ny Mpanjaka tsy manan-taloha, tsy mety maty, tsy hita, dia ho an’Andriamanitra tokana ihany anie ny laza sy ny voninahitra mandrakizay mandrakizay. Amena.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao didy izao no omeko anao, ry Timoty zanako, araka ireo faminaniana natao fahiny ny aminao ireo, mba ho entinao miady ny ady tsara ireo, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin’ny itananao ny finoana sy ny fieritreretana tsara, izay efa narian’ny sasany, ka toy ny olona vaky sambo izy ny amin’ny finoana; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mamangy an’i Timoty, tena zanako amin’ny finoana: fahasoavana, famindrampo, fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy Tompontsika.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: naman’ireny Hymeneo sy Aleksandro, izay natolotro ho an’i Satana mba hofaizina tsy hiteny ratsy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'hanao blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Mat. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix. 3.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy ny nangatahako anao hitoetra any Efesosy, rehefa hankany Makedonia aho, mba handidianao ny sasany tsy hanao fampianarana hafahafa, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na hitandrina ny anganongano sy ny tantaram-pirazanana tsy hita lany izay mahatonga ady hevitra, fa tsy mampandroso ny fitondrana araka an’Andriamanitra amin’ny finoana, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia toy izany koa no ataoko ankehitriny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny anton’ny didy dia fitiavana avy amin’ny fo madio sy ny fieritreretana tsara ary ny finoana tsy mihatsaravelatsihy '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay nivilian’ny sasany, ka nania ho amin’ny taria foana izy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia olona izay te-ho mpampiana-dalàna, kanefa tsy fantany akory izay lazainy na izay itompoany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa fantatsika fa tsara ny lalàna, raha entin’ny olona araka izay antony, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka fantany fa tsy ny olona marina no nanaovana ny lalàna, fa ny mpandika lalàna sy ny maditra, dia ny tsy matahotra an’Andriamanitra sy ny mpanota, ny olona tsy manaja izay masina sy ny olona vetaveta, ny mpamono ray sy ny mpamono reny, ny mpamono olona, '
