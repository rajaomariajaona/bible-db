document_id: 1TI.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana sy anatra ny amin’ny mpampianatra sandoka, ary filazana ny amin’ny lalàna sy ny filazantsara, ary ny fahasoavan’Andriamanitra tamin’i Paoly.
  - type: text
    content: 'PAOLY, Apostolin’i Kristy Jesosy araka ny didin’Andriamanitra, Mpamonjy antsika, sy Kristy Jesosy fanantenantsika, '
  '10':
  - type: text
    content: ny mpijangajanga, ny sodomita, ny mpangalatra olona, ny mpandainga, ny mpianian-tsy to, ary na inona na inona manohitra ny fampianarana tsy misy kilema,
  - type: note
    content: Gr. salama.
  - type: text
    content: ' '
  '11':
  - type: text
    content: araka ny filazantsaran’ny voninahitr’Andriamanitra finaritra, izay natolotra ho adidiko.
  '12':
  - type: text
    content: 'Misaotra an’i Kristy Jesosy Tompontsika aho, Izay nampahery ahy, fa nataony mahatoky aho ka notendreny ho amin’ny fanompoana, '
  '13':
  - type: text
    content: dia izaho, izay mpiteny ratsy
  - type: note
    content: Gr. mpanao blasfemia; izahao Mat. ix. 3.
  - type: text
    content: ' fahiny sady mpanenjika sy mpampahory; kanefa nahazo famindrampo aho, satria tamin’ny tsi-fahalalana no nanaovako izany noho ny tsi-finoana. '
  '14':
  - type: text
    content: 'Fa be indrindra ny fahasoavan’ny Tompontsika tamin’ny finoana sy ny fitiavana, izay ao amin’i Kristy Jesosy. '
  '15':
  - type: text
    content: 'Mahatoky ka tokony hekena amin’ny fankasitrahana rehetra izao teny izao: tonga tetỳ ambonin’ny tany Kristy Jesosy hamonjy ny mpanota, ary amin’ireny izaho no lohany. '
  '16':
  - type: text
    content: Kanefa izao no namindrana fo tamiko, dia ny mba hasehon’i Jesosy Kristy eo amiko izay lohany, ny fahari-po rehetra ho fianarana ho an’izay hino Azy hahazoana fiainana mandrakizay.
  '17':
  - type: text
    content: Ary ho an’ny Mpanjaka tsy manan-taloha, tsy mety maty, tsy hita, dia ho an’Andriamanitra tokana ihany anie ny laza sy ny voninahitra mandrakizay mandrakizay. Amena.
  '18':
  - type: text
    content: 'Izao didy izao no omeko anao, ry Timoty zanako, araka ireo faminaniana natao fahiny ny aminao ireo, mba ho entinao miady ny ady tsara ireo, '
  '19':
  - type: text
    content: 'amin’ny itananao ny finoana sy ny fieritreretana tsara, izay efa narian’ny sasany, ka toy ny olona vaky sambo izy ny amin’ny finoana; '
  '2':
  - type: text
    content: 'mamangy an’i Timoty, tena zanako amin’ny finoana: fahasoavana, famindrampo, fiadanana avy amin’Andriamanitra Ray sy Kristy Jesosy Tompontsika.'
  '20':
  - type: text
    content: naman’ireny Hymeneo sy Aleksandro, izay natolotro ho an’i Satana mba hofaizina tsy hiteny ratsy.
  - type: note
    content: Gr. hanao blasfemia; izahao Mat. ix. 3.
  '3':
  - type: text
    content: 'Toy ny nangatahako anao hitoetra any Efesosy, rehefa hankany Makedonia aho, mba handidianao ny sasany tsy hanao fampianarana hafahafa, '
  '4':
  - type: text
    content: 'na hitandrina ny anganongano sy ny tantaram-pirazanana tsy hita lany izay mahatonga ady hevitra, fa tsy mampandroso ny fitondrana araka an’Andriamanitra amin’ny finoana, '
  - type: text
    content: dia toy izany koa no ataoko ankehitriny.
  '5':
  - type: text
    content: 'Fa ny anton’ny didy dia fitiavana avy amin’ny fo madio sy ny fieritreretana tsara ary ny finoana tsy mihatsaravelatsihy '
  '6':
  - type: text
    content: 'izay nivilian’ny sasany, ka nania ho amin’ny taria foana izy, '
  '7':
  - type: text
    content: dia olona izay te-ho mpampiana-dalàna, kanefa tsy fantany akory izay lazainy na izay itompoany.
  '8':
  - type: text
    content: 'Nefa fantatsika fa tsara ny lalàna, raha entin’ny olona araka izay antony, '
  '9':
  - type: text
    content: 'ka fantany fa tsy ny olona marina no nanaovana ny lalàna, fa ny mpandika lalàna sy ny maditra, dia ny tsy matahotra an’Andriamanitra sy ny mpanota, ny olona tsy manaja izay masina sy ny olona vetaveta, ny mpamono ray sy ny mpamono reny, ny mpamono olona, '
