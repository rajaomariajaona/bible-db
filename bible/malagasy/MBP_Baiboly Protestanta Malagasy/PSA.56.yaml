document_id: PSA.56
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fangataham-pamonjena amin’Andriamanitra sy fahatokiana Azy any am-pandosirana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Al-jonath-elem-rehokim. Miktama nataon’i Davida, fony nisambotra azy tany Gata ny Filistina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: MAMINDRÀ fo amiko, Andriamanitra ô, fa misafoaka manenjika ahy ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miady amiko mandrakariva izy ka mampahory ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Misafoaka manenjika mandrakariva ny mpampahory ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maro tokoa no mirehareha miady amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’ny andro atahorako no itokiako Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Andriamanitra no iderako ny teniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra no itokiako, ka tsy mba hatahotra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no hataon’ny nofo amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Manimba ny raharahako mandrakariva ireny;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '56.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mamily ny teniko mandrakariva ireny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny heviny rehetra dia ny hanisy ratsy ahy ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miangona izy, miery izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsongo-dia ahy izy, satria mikendry ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’izany faharatsiany izany moa hisy hahafahany va?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '56.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny faharatsiany no ataony ho famonjena azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aripaho amin’ny fahatezeranao ny firenena, Andriamanitra ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Manisa ny firenireneko Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy ao an-tavoahanginao ny ranomasoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy eo amin’ny bokinao va ireny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’izay dia hiamboho ny fahavaloko amin’ny andro hiantsoako Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izao dia fantatro, fa momba ahy Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Andriamanitra no iderako ny teniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah no iderako ny teniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Andriamanitra no itokiako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mba hatahotra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no hataon’ny olona amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nivoady taminao aho, Andriamanitra ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanatitra fanati-pisaorana ho Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa efa nanafaka ny fanahiko tamin’ny fahafatesana Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nanafaka ny tongotro Hianao mba tsy ho solafaka.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handehanako eo anatrehan’Andriamanitra amin’ny fahazavan’ny velona.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '56.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahazavan’aina.
    marker-yv: yv-n
