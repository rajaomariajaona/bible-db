document_id: PSA.56,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangataham-pamonjena amin’Andriamanitra sy fahatokiana Azy any am-pandosirana.
  - type: text
    content: Ho an’ny mpiventy hira. Al-jonath-elem-rehokim. Miktama nataon’i Davida, fony nisambotra azy tany Gata ny Filistina.
  - type: text
    content: MAMINDRÀ fo amiko, Andriamanitra ô, fa misafoaka manenjika ahy ny olona;
  - type: text
    content: Miady amiko mandrakariva izy ka mampahory ahy.
  '10':
  - type: text
    content: Andriamanitra no iderako ny teniny;
  - type: text
    content: Jehovah no iderako ny teniny.
  '11':
  - type: text
    content: Andriamanitra no itokiako;
  - type: text
    content: Ka tsy mba hatahotra aho;
  - type: text
    content: Inona no hataon’ny olona amiko?
  '12':
  - type: text
    content: Nivoady taminao aho, Andriamanitra ô,
  - type: text
    content: Dia hanatitra fanati-pisaorana ho Anao.
  '13':
  - type: text
    content: Fa efa nanafaka ny fanahiko tamin’ny fahafatesana Hianao;
  - type: text
    content: Eny, nanafaka ny tongotro Hianao mba tsy ho solafaka.
  - type: text
    content: Handehanako eo anatrehan’Andriamanitra amin’ny fahazavan’ny velona.
  - type: note
    content: 'Na: fahazavan’aina.'
  '2':
  - type: text
    content: Misafoaka manenjika mandrakariva ny mpampahory ahy;
  - type: text
    content: Maro tokoa no mirehareha miady amiko.
  '3':
  - type: text
    content: Amin’ny andro atahorako no itokiako Anao.
  '4':
  - type: text
    content: Andriamanitra no iderako ny teniny;
  - type: text
    content: Andriamanitra no itokiako, ka tsy mba hatahotra aho;
  - type: text
    content: Inona no hataon’ny nofo amiko?
  '5':
  - type: text
    content: Manimba ny raharahako mandrakariva ireny;
  - type: note
    content: 'Na: Mamily ny teniko mandrakariva ireny.'
  - type: text
    content: Ny heviny rehetra dia ny hanisy ratsy ahy ihany.
  '6':
  - type: text
    content: Miangona izy, miery izy,
  - type: text
    content: Mitsongo-dia ahy izy, satria mikendry ny aiko.
  '7':
  - type: text
    content: Amin’izany faharatsiany izany moa hisy hahafahany va?
  - type: note
    content: 'Na: Ny faharatsiany no ataony ho famonjena azy.'
  - type: text
    content: Aripaho amin’ny fahatezeranao ny firenena, Andriamanitra ô.
  '8':
  - type: text
    content: Manisa ny firenireneko Hianao;
  - type: text
    content: Ataovy ao an-tavoahanginao ny ranomasoko;
  - type: text
    content: Tsy eo amin’ny bokinao va ireny?
  '9':
  - type: text
    content: Amin’izay dia hiamboho ny fahavaloko amin’ny andro hiantsoako Anao;
  - type: text
    content: Izao dia fantatro, fa momba ahy Andriamanitra.
