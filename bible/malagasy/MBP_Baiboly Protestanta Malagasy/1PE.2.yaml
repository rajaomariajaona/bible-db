document_id: 1PE.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa esory ny lolompo rehetra sy ny fitaka rehetra sy ny fihatsarambelatsihy sy ny fialonana ary ny fanaratsiana rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa tahaka ny zaza vao teraka dia maniria ny rononom-panahy tsy misy fitaka, mba hitomboanareo amin’izany ho amin’ny famonjena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'raha tàhiny ,,nanandrana hianareo fa tsara ny Tompo;’’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay hatoninareo toy ny vato velona, ,,nolavin’ny olona, fa voafidin’Andriamanitra sady soa,’’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka dia atsangana koa hianareo tahaka ny vato velona ho trano fanahy, ho fisoronana masina, hanatitra fanati-panahy sitrak’Andriamanitra amin’ny alalan’i Jesosy Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa misy teny ao amin’ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: ' manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Indro, mametraka fehizoro ao Ziona Aho, dia vato voafidy sady tsara;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mino Azy tsy ho menatra’’ (Isa. 28.16).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa ny fahatsarana dia ho anareo izay mino; fa amin’izay tsy mino kosa
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Ny vato izay nolavin’ny mpanao trano'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No efa tonga fehizoro’’ (Sal. 118.22),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ',,Ary vato mahatafintohina sy vatolampy mahasolafaka’’ (Isa. 8.14);'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'ary satria tsy nanaiky ireo, dia tafintohina tamin’ny teny izy, sady izany koa no nanendrena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa hianareo kosa dia taranaka voafidy, ,,fanjakà-mpisorona, firenena masina’’ (Eks. 19.6), olona nalain’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Andriamanitra
  - type: text
    text: ' ho an’ny tenany, mba hilazanareo ny hatsaran’Ilay niantso anareo hiala tamin’ny maizina ho amin’ny fahazavany mahagaga; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: dia hianareo izay tsy firenena akory fahiny, fa ankehitriny efa olon’Andriamanitra; izay tsy namindrana fo, fa ankehitriny efa namindrana fo (Hos. 2.25).
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana hamporisika mba hadio fitondrantena amin’ny olona rehetra, ary filazana ny mety hataon’ny mpianakavy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'RY malala, mananatra anareo aho, satria vahiny sy mpivahiny hianareo, fadio ny filan’ny nofo, fa miady amin’ny fanahy ireny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary aoka ho tsara ny fitondrantenanareo eo amin’ny jentilisa, mba hankalazany an’Andriamanitra amin’ny andro famangiana noho ny ahitany ny asa tsara ataonareo, dia izay anendrikendrehany anareo ho mpanao ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary noho ny Tompo dia maneke izay rehetra voatendrin’ny olona, na ny mpanjaka, satria ambony izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'na ny mpanapaka, satria nirahiny hamaly izay manao ratsy izy, fa ho mpidera izay manao tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa toy izany no sitrapon’Andriamanitra, hampanginanareo ny tsi-fahalalan’ny olona adala amin’ny fanaovan-tsoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fa olona afaka hianareo, nefa aza mitondra ny fahafahanareo ho fanaronana ny ratsy, fa ho toy ny mpanompon’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Manajà ny olona rehetra. Tiava ny rahalahy. Matahora an’Andriamanitra. Manajà ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hianareo mpanompo, maneke ny tomponareo amin’ny fahatahorana rehetra, tsy ny tsara sy ny malemy fanahy ihany, fa ny saro-po koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa izao no ankasitrahana: raha misy olona mitondra alahelo ka mandefitra ny tsy marina noho ny fieritreretana ny amin’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa inona no laza, raha tàhiny kapohina noho ny fahadisoana hianareo ka mandefitra amin’izany? Fa raha tàhiny manao soa kosa hianareo ka mitondra fahoriana sy mandefitra, dia izany no sitrak’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ho amin’izany no niantsoana anareo; fa Kristy aza efa nijaly hamonjy anareo ka namela fianarana ho anareo, mba hanarahanareo ny diany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ',,Izay tsy nanota akory, sady tsy nisy fitaka teo am-bavany’’ (Isa. 53.9); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'raha notevatevaina Izy, dia tsy mba nanevateva; raha nijaly, dia tsy nandrahona, fa nanolotra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny adiny
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: ny tenany.'
    marker-yv: yv-n
  - type: text
    text: 'ho amin’ny Mpitsara marina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary Izy nitondra ny fahotantsika (Isa. 53.12) tamin’ny tenany teo ambonin’ny hazo, mba ho faty ny amin’ny ota isika, fa ho velona ny amin’ny fahamarinana; ary ,,ny dian-kapoka taminy no nahasitranana anareo’’ (Isa. 53.5). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa efa nania toy ny ondry hianareo (Isa. 53.6), nefa ankehitriny dia efa niverina ho amin’ny Mpiandry sy Mpitandrina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Episkopo.
    marker-yv: yv-n
  - type: text
    text: ' ny fanahinareo.'
