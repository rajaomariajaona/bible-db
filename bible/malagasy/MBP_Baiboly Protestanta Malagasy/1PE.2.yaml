document_id: 1PE.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa esory ny lolompo rehetra sy ny fitaka rehetra sy ny fihatsarambelatsihy sy ny fialonana ary ny fanaratsiana rehetra, '
  '10':
  - type: text
    content: dia hianareo izay tsy firenena akory fahiny, fa ankehitriny efa olon’Andriamanitra; izay tsy namindrana fo, fa ankehitriny efa namindrana fo (Hos. 2.25).
  - type: heading
    content: Fananarana hamporisika mba hadio fitondrantena amin’ny olona rehetra, ary filazana ny mety hataon’ny mpianakavy.
  '11':
  - type: text
    content: 'RY malala, mananatra anareo aho, satria vahiny sy mpivahiny hianareo, fadio ny filan’ny nofo, fa miady amin’ny fanahy ireny; '
  '12':
  - type: text
    content: ary aoka ho tsara ny fitondrantenanareo eo amin’ny jentilisa, mba hankalazany an’Andriamanitra amin’ny andro famangiana noho ny ahitany ny asa tsara ataonareo, dia izay anendrikendrehany anareo ho mpanao ratsy.
  '13':
  - type: text
    content: 'Ary noho ny Tompo dia maneke izay rehetra voatendrin’ny olona, na ny mpanjaka, satria ambony izy, '
  '14':
  - type: text
    content: 'na ny mpanapaka, satria nirahiny hamaly izay manao ratsy izy, fa ho mpidera izay manao tsara. '
  '15':
  - type: text
    content: 'Fa toy izany no sitrapon’Andriamanitra, hampanginanareo ny tsi-fahalalan’ny olona adala amin’ny fanaovan-tsoa; '
  '16':
  - type: text
    content: fa olona afaka hianareo, nefa aza mitondra ny fahafahanareo ho fanaronana ny ratsy, fa ho toy ny mpanompon’Andriamanitra.
  '17':
  - type: text
    content: Manajà ny olona rehetra. Tiava ny rahalahy. Matahora an’Andriamanitra. Manajà ny mpanjaka.
  '18':
  - type: text
    content: 'Hianareo mpanompo, maneke ny tomponareo amin’ny fahatahorana rehetra, tsy ny tsara sy ny malemy fanahy ihany, fa ny saro-po koa. '
  '19':
  - type: text
    content: 'Fa izao no ankasitrahana: raha misy olona mitondra alahelo ka mandefitra ny tsy marina noho ny fieritreretana ny amin’Andriamanitra. '
  '2':
  - type: text
    content: 'fa tahaka ny zaza vao teraka dia maniria ny rononom-panahy tsy misy fitaka, mba hitomboanareo amin’izany ho amin’ny famonjena, '
  '20':
  - type: text
    content: 'Fa inona no laza, raha tàhiny kapohina noho ny fahadisoana hianareo ka mandefitra amin’izany? Fa raha tàhiny manao soa kosa hianareo ka mitondra fahoriana sy mandefitra, dia izany no sitrak’Andriamanitra. '
  '21':
  - type: text
    content: 'Fa ho amin’izany no niantsoana anareo; fa Kristy aza efa nijaly hamonjy anareo ka namela fianarana ho anareo, mba hanarahanareo ny diany; '
  '22':
  - type: text
    content: ',,Izay tsy nanota akory, sady tsy nisy fitaka teo am-bavany’’ (Isa. 53.9); '
  '23':
  - type: text
    content: 'raha notevatevaina Izy, dia tsy mba nanevateva; raha nijaly, dia tsy nandrahona, fa nanolotra '
  - type: text
    content: ny adiny
  - type: text
    content: ' '
  - type: note
    content: 'Na: ny tenany.'
  - type: text
    content: 'ho amin’ny Mpitsara marina; '
  '24':
  - type: text
    content: 'ary Izy nitondra ny fahotantsika (Isa. 53.12) tamin’ny tenany teo ambonin’ny hazo, mba ho faty ny amin’ny ota isika, fa ho velona ny amin’ny fahamarinana; ary ,,ny dian-kapoka taminy no nahasitranana anareo’’ (Isa. 53.5). '
  '25':
  - type: text
    content: Fa efa nania toy ny ondry hianareo (Isa. 53.6), nefa ankehitriny dia efa niverina ho amin’ny Mpiandry sy Mpitandrina
  - type: note
    content: Gr. Episkopo.
  - type: text
    content: ' ny fanahinareo.'
  '3':
  - type: text
    content: 'raha tàhiny ,,nanandrana hianareo fa tsara ny Tompo;’’ '
  '4':
  - type: text
    content: 'Izay hatoninareo toy ny vato velona, ,,nolavin’ny olona, fa voafidin’Andriamanitra sady soa,’’ '
  '5':
  - type: text
    content: 'ka dia atsangana koa hianareo tahaka ny vato velona ho trano fanahy, ho fisoronana masina, hanatitra fanati-panahy sitrak’Andriamanitra amin’ny alalan’i Jesosy Kristy. '
  '6':
  - type: text
    content: 'Fa misy teny ao amin’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' manao hoe:'
  - type: text
    content: ',,Indro, mametraka fehizoro ao Ziona Aho, dia vato voafidy sady tsara;'
  - type: text
    content: Ary izay mino Azy tsy ho menatra’’ (Isa. 28.16).
  '7':
  - type: text
    content: Koa ny fahatsarana dia ho anareo izay mino; fa amin’izay tsy mino kosa
  - type: text
    content: ',,Ny vato izay nolavin’ny mpanao trano'
  - type: text
    content: No efa tonga fehizoro’’ (Sal. 118.22),
  '8':
  - type: text
    content: ',,Ary vato mahatafintohina sy vatolampy mahasolafaka’’ (Isa. 8.14);'
  - type: text
    content: 'ary satria tsy nanaiky ireo, dia tafintohina tamin’ny teny izy, sady izany koa no nanendrena azy. '
  '9':
  - type: text
    content: Fa hianareo kosa dia taranaka voafidy, ,,fanjakà-mpisorona, firenena masina’’ (Eks. 19.6), olona nalain’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' ho an’ny tenany, mba hilazanareo ny hatsaran’Ilay niantso anareo hiala tamin’ny maizina ho amin’ny fahazavany mahagaga; '
