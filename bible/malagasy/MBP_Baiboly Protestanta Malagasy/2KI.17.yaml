document_id: 2KI.17
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Hosea, sy ny naharavan’ny fanjakan’ny Isiraely, ary ny fototry ny nahatonga izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TAMIN’ny taona faharoa ambin’ny folo nanjakan’i Ahaza, mpanjakan’ny Joda, no vao nanjakan’i Hosea, zanak’i Elaha, tamin’ny Isiraely tao Samaria; ary nanjaka sivy taona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nanao izay ratsy eo imason’i Jehovah izy, nefa tsy dia tahaka ny nataon’ny mpanjakan’ny Isiraely teo alohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Niakatra hanafika azy Salmanesera, mpanjakan’i Asyria, ka dia tonga mpanompony nandoa hetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanomezana.
    marker-yv: yv-n
  - type: text
    text: ' ho azy Hosea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny mpanjakan’i Asyria nahita fa niodina Hosea; fa efa naniraka olona tany amin’i So, mpanjakan’i Egypta, izy sady tsy nanatitra hetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanomezana.
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny mpanjakan’i Asyria intsony tahaka ny fanaony isan-taona; koa dia nanidy azy ny mpanjakan’i Asyria sy namatotra azy tao an-trano-maizina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia niakatra ny mpanjakan’i Asyria ka nanenika ny tany; ary niakatra tany Samaria izy ka nanao fahirano azy telo taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary tamin’ny taona fahasivy nanjakan’i Hosea no nahafahan’ny mpanjakan’i Asyria an’i Samaria, dia nentiny ho babo tany Asyria ny Isiraely ka namponeniny tao Hala sy teo amoron’i Habora (dia ny onin’i Gozana izany) ary teny amin’ny tanànan’ny Mediana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny nahatongavan’izany dia noho ny nanotan’ny Zanak’Isiraely tamin’i Jehovah Andriamaniny, Izay nitondra azy nivoaka avy tany amin’ny tany Egypta ho afaka tamin’ny tànan’i Farao, mpanjakan’i Egypta, fa natahotra izay andriamani-kafa izy '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka nandeha araka ny fanaon’ny jentilisa izay noroahin’i Jehovah tsy ho eo anoloan’ny Zanak’Isiraely sy araka ny didy izay nataon’ny mpanjakan’ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny Zanak’Isiraely dia nanao teny tsy marina ho enti-manakona an’i Jehovah Andriamaniny ka nanao fitoerana avo teny amin’ny tanànany rehetra, dia hatramin’ny tilikambon’ny mpiambina ka hatramin’ny tanàna mimànda. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nanangana tsangam-bato-tsampy sy Aseraha ho azy teny amin’ny tendrombohitra avo rehetra sy teny ambanin’ny hazo maitso rehetra izy; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary nandoro ditin-kazo manitra teny amin’ny fitoerana avo rehetra izy, tahaka ny nataon’ny jentilisa izay noroahin’i Jehovah tsy ho eo anoloany, sady nanao zavatra ratsy ka nampaha-tezitra an’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fa nanompo sampy, izay nandraran’i Jehovah azy hoe: Aza manao izany zavatra izany hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nefa ny mpaminany rehetra sy ny mpahita rehetra dia nasain’i Jehovah nananatra ny Isiraely sy ny Joda hoe: Mialà amin’ny làlanareo ratsy, ary tandremo ny lalàko sy ny didiko, araka ny lalàna rehetra izay nandidiako ny razanareo sy izay nanirahako ny mpaminany mpanompoko ho aminareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa tsy nihaino izy, fa nanamafy ny hatony, tahaka ny razany, izay tsy nino an’i Jehovah Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nolaviny ny didiny sy ny fanekeny izay nataony tamin’ny razany mbamin’ny teni-vavolombelony izay nananarany azy; ary nandeha nanaraka ny zava-poana izy, ka dia tonga zava-poana koa ary nanaraka ny jentilisa manodidina azy, izay efa nandraran’i Jehovah azy mba tsy halainy tahaka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nahafoy ny didin’i Jehovah Andriamaniny rehetra izy ka nanao sarin-javatra an-idina ho an’ny tenany, dia ombilahy kely roa, ary nanao Aseraha koa izy sady niankohoka teo anatrehan’izay rehetra eny amin’ny lanitra ary nanompo an’i Bala. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary nampandeha ny zanani-lahy sy ny zanani-vavy hamaky ny afo izy, sady nanao fankatovana sy sikidy ary nivaro-tena hanao izay ratsy eo imason’i Jehovah ka nampahatezitra Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa dia tezitra indrindra tamin’ny Isiraely Jehovah, dia nesoriny tsy ho eo imasony izy, ka tsy nisy sisa afa-tsy ny firenen’i Joda ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny Joda koa aza tsy mba nitandrina ny didin’i Jehovah Andriamaniny, fa nandeha araka izay rehetra nataon’ny Isiraely koa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia narian’i Jehovah ny taranak’Isiraely rehetra ka nampahoriny sy natolony ho eo an-tànan’ny mpamabo azy mandra-panaisony azy tsy ho eo imasony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa nendahany niala tamin’ny taranak’i Davida ny Isiraely; ary ny olona nampanjaka an’i Jeroboama, zanak’i Nebata; ary Jeroboama dia nampiala ny Isiraely tsy hanaraka an’i Jehovah ka nampanota azy indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny Zanak’Isiraely nandeha tamin’ny fahotana rehetra nataon’i Jeroboama, fa tsy niala tamin’izany izy '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mandra-panaisotr’i Jehovah ny Isiraely tsy ho eo anatrehany, araka izay nampilazainy ny mpaminany mpanompony rehetra. Ka dia lasan-ko babo niala tamin’ny taniny ho any Asyria ny Isiraely ka mbola any mandraka andro-any.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nametrahana olona hafa firenena tao amin’ny tany Samaria, sy ny amin’ny fivavahan’ireny.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ARY ny mpanjakan’i Asyria nitondra olona avy tany Babylona sy Kota sy Ava sy Hamata sy Sefarvaima ka namponina azy teny amin’ny tanànan’i Samaria nisolo ny Zanak’Isiraely; dia nahazo an’i Samaria ireny ka nitoetra teny amin’ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary raha vao nonina tao ireny, dia tsy natahotra an’i Jehovah; ary Jehovah kosa nampandeha ny liona hamely azy, ka nahafatesan’ireny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy ny olona tamin’ny mpanjakan’i Asyria: Ny firenena izay nafindranao sy namponeninao eny amin’ny tanànan’i Samaria tsy mahalala izay tokony hatao amin’ny Andriamanitry ny tany any, ka dia nampandeha ny liona hamely azy Izy; ary, indro, nahafatesan’ireny izy noho ny tsi-fahalalany ny fanaon’ny Andriamanitry ny tany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny mpanjakan’i Asyria nandidy hoe: Iraho ho any ny anankiray amin’ny mpisorona izay nentinareo ho babo avy tany, ary aoka handeha izy ka hitoetra any, dia aoka hampianatra azy izay tokony hatao amin’ny Andriamanitry ny tany any izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia tonga ny mpisorona anankiray avy tamin’izay efa nentiny ho babo avy tany Samaria ka nonina tao Betela, dia nampianatra azy izay fahatahorana an’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Kanefa ny isam-pirenena mbola samy nanao ny andriamaniny avy ka nametraka azy tao amin’ny trano eny amin’ny fitoerana avo, izay nataon’ny mponina tao Samaria, eny, ny isam-pirenena dia samy nanao tao amin’ny tanàna nitoerany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa ny olona avy any Babylona dia nanao an’i Sokota-benota; ary ny olona avy any Kota nanao an’i Nergala; ary ny olona avy any Hamata nanao an’i Asima; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ary ny Avita nanao an’i Nibaza sy Tartaka; ary ny Sefarvita nandoro ny zanany tamin’ny afo ho an’i Andrameleka sy Anameleka, andriamanitr’i Sefarvaima.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia natahotra an’i Jehovah ny olona, ary izay avy tamin’ny ankabiazam-bahoaka no notendreny ho mpisorona amin’ny fitoerana avo, ary ireny no nanatitra fanatitra tao amin’ny trano eny amin’ny fitoerana avo nisolo ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Jehovah dia natahorany ihany, kanefa mbola nanompo ny andriamaniny avy koa izy araka ny fanaon’ny firenena izay efa nangalana azy avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mandraka andro-any dia mbola manao araka ny fanaony teo ihany izy: tsy dia matahotra an’i Jehovah, ary tsy dia manao araka ny fomban-drazany, na araka ny lalàna sy ny didy izay nandidian’i Jehovah ny taranak’i Jakoba, izay nataony hoe Isiraely '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'sady nanaovany fanekena sy nodidiany hoe: Aza matahotra izay andriamani-kafa, na miankohoka eo anatrehany, na manompo azy, na mamono zavatra hatao fanatitra ho azy; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'fa Jehovah, Izay nitondra anareo nivoaka avy tany amin’ny tany Egypta tamin’ny hery lehibe sy ny sandry nahinjitra, dia aoka Izy ihany no hatahoranareo, ary ho eo anatrehany no hiankohofanareo, ary ho Azy no hamonoanareo zavatra hatao fanatitra; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ary ny didy sy ny fitsipika sy ny lalàna ary ny teny izay nosoratany ho anareo no aoka hotandremanareo hatao mandrakariva; ary aza matahotra izay andriamani-kafa; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary ny fanekena izay nataoko taminareo dia aza hadinoinareo; ary aza matahotra izay andriamani-kafa hianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'fa Jehovah Andriamanitrareo no aoka hatahoranareo; dia Izy no hamonjy anareo amin’ny tànan’ny fahavalonareo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Nefa tsy nety nihaino izy, fa nanao tahaka ny fanaony taloha ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ka dia natahotra an’i Jehovah ihany ireo firenena ireo, kanefa nanompo ny sarin-javatra voasokitra izy hatramin’ny zanany sy ny zafiny koa aza; tahaka ny fanaon’ny razany ihany no nataon’ireny mandraka andro-any.
