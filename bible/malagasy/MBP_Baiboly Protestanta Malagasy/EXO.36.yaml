document_id: EXO.36
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia hiasa Bezalila sy Oholiaba ary ny olona hendry rehetra, izay nomen’i Jehovah fahendrena sy fahiratan-tsaina, hahaizany hanao ny asa rehetra ho amin’ny fanompoana ao amin’ny fitoerana masina, araka izay rehetra nandidian’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Mosesy dia nampaka an’i Bezalila sy Oholiaba ary ny olona hendry rehetra, izay nasian’i Jehovah fahendrena tao am-pony, dia izay rehetra nampahazotoin’ny fony hankeo amin’ny asa hanao azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary izy ireo dia nandray tamin’i Mosesy ny fanatitra rehetra izay efa nentin’ny Zanak’Isiraely hanaovana ny asa amin’ny fanompoana ao amin’ny fitoerana masina.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary ny olona mbola nitondra fanatitra sitra-po isa-maraina ihany ho eo amin’i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanatona ny olon-kendry rehetra, izay nanao ny asa rehetra amin’ny fitoerana masina, samy niala tamin’ny asany izay nataony avy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka niteny tamin’i Mosesy hoe: Ny olona mitondra mihoatra lavitra noho izay hahavita ny fanompoana amin’ny asa nandidian’i Jehovah hatao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandidy Mosesy ka nandefa teny eran’ny toby rehetra nanao hoe: Aza misy manao zavatra intsony hatao fanatitra ho amin’ny fitoerana masina hianareo, na lahy na vavy. Dia izany no nampitsaharana ny olona tsy hanatitra intsony; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa ny zavatra efa nateriny dia ampy anaovana ny asa rehetra ka nanana amby aza.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanaovana ny tabernakely sy izay rehetra momba azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ARY ny hendry rehetra teo amin’izay nanao ny raharaha dia nanao ny tabernakely: dia ambainy folo amin’ny rongony fotsy madinika voahasina sy manga sy volomparasy ary mena; kerobima, asan’ny mpanenona mahay, no nataony sorany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny halavan’ny ambainy iray dia valo amby roa-polo hakiho; ary ny lambanan’ny ambainy iray dia efatra hakiho: nitovy ohatra ny ambainy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ambainy dimy navitrany ho iray; ary ambainy dimy koa navitrany ho iray. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nanao tadivavarana manga teo an-tsisin’ny ambainy iray izy, dia teo an-tsisin’ny anankiray efa voavitrana; ary nanao toy izany koa tamin’ny ambainy farany izy, dia teo an-tsisin’ny anankiray efa voavitrana koa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tadivavarana dimam-polo no nataony teo amin’ny ambainy iray, ary tadivavarana dimam-polo koa no nataony teo amin’ny sisin’ny ambainy izay amin’ny anankiray efa voavitrana koa; ary nifandray ny tadivavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nanao farango volamena dimam-polo izy, ka nakambany tamin’ny farango ny ambainy, dia voakambana ho iray ny tabernakely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanao ambainy koa tamin’ny volon’osy izy ho lay handrakofana ny tabernakely; dia iraika ambin’ny folo ambainy no nanaovany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny halavan’ny ambainy iray dia telo-polo hakiho, ary ny lambanan’ny ambainy iray dia efatra hakiho; nitovy ohatra ny ambainy iraika ambin’ny folo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary navitrany ny ambainy dimy hikambana, ary ny ambainy enina kosa hikambana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nanao tadivavarana dimam-polo ho eo antsisin’ny ambainy iray izay farany amin’ny efa voavitrana izy; ary tadivavarana dimam-polo koa ho eo an-tsisin’ny ambainy iray amin’ny anankiray koa efa voavitrana. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary nanao farango varahina dimam-polo izy hampikambana ny lay ho iray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary nanao rakotry ny lay tamin’ny hoditr’ondrilahy efa nomenaina izy sy sarona hodi-takasy ho eo amboniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nanao ny zanakazo akasia ho amin’ny tabernakely izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Folo hakiho ny hahavon’ny zanakazo iray, ary iray hakiho sy sasany ny indraben’ny zanakazo iray. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary lahiny roa no amin’ny zanakazo iray, ka nasiany izay hikambanany; izany no nanaovany ny zanakazo rehetra tamin’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nanao ny zanakazo ho amin’ny tabernakely izy, dia zanakazo roa-polo ho eo amin’ny lafiny atsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanao faladia volafotsy efa-polo izy ho ambanin’ny zanakazo roa-polo, dia faladia roa avy ho ambanin’ny isan-janakazo hiorenan’ny lahiny roa. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nanao zana-kazo roa-polo ho eo amin’ny lafiny faharoa amin’ny tabernakely izy, dia ny lafiny avaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nanao faladiany volafotsy efa-polo, izy dia faladia roa avy ho ambanin’ny isan-janakazo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nanao zanakazo enina ho eo amin’ny lafin’ny tabernakely andrefana izy, izay eo ivohony. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nanao zanakazo roa ho eo amin’ny zoron’ny tabernakely tamin’ny lafiny ivoho izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nakambana ho iray izy hatramin’ny ambany ka hatramin’ny ambony, ka nasiana vava vola iray ihany; nataony toy izany avokoa izy roa ho eo amin’ny zorony roa. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary nisy zanakazo valo sy ny faladiany volafotsy; dia faladia enina ambin’ny folo: faladia roa avy ho ambanin’ny isan-janakazo iray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hazo akasia no nataony barany: dia dimy ho amin’ny zanakazo amin’ny lafiny iray amin’ny tabernakely, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'sy barany dimy ho amin’ny zanakazo amin’ny lafiny iray koa amin’ny tabernakely, ary barany dimy ho amin’ny zanakazo amin’ny lafiny andrefana izay ao ivohony. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nanao ny barany afovoany izy, ho afovoan’ny zanakazo ka hahatratra ny farany roa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny zanakazo nopetahany takela-bolamena, ary nataony volamena koa ny vava vola aminy, izay hitoeran’ny barany: ary nopetahany takela-bolamena koa ny barany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny efitra lamba dia nataony manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, ary kerobima, asan’ny mpanenona mahay, no nataony sorany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary nanao andry efatra tamin’ny hazo akasia izy hihantonan’izany, ary nopetahany takela-bolamena ireo, sady nataony volamena koa ny fihantonany; ary nandrendrika faladia volafotsy efatra izy hiorenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nanao varavarana lamba ho eo amin’ny varavaran’ny lay izy, dia tamin’ny manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, asan’ny mahay tenona samy hafa soratra. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary ny andriny dimy sy ny fihantonany dia nataony koa, ary nopetahany takela-bolamena ny lohany sy ny anjaka hitohizany; ary ny faladiany dimy dia nataony varahina.
