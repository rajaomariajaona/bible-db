document_id: ECC.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny manjo ny olona noho ny fampahorian’ny sasany azy, sy ny lolompo, sy ny fitoerany irery, ary ny ataon’ny mpitondra azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: DIA hitako koa ny fampahoriana rehetra atao atỳ ambanin’ny masoandro; ary indro ny ranomason’ny ampahorina, sady tsy nisy mpanony azy; ary loza no ataon’ny tànan’ny mpampahory azy, sady tsy nisy mpanony.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy lavo izy, dia arenin’ny namany; fa mahantra ny lavo izay tsy manana namana hanarina azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary koa, raha miara-mandry ny roa, dia mafana izy; fa hatao ahoana no hampahafana ny irery? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy maharesy ny irery aza, ny roa tsy ho leony tsy akory; ary ny mahazaka telo olana tsy mora tapahina.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aleo zatovo malahelo hendry toy izay mpanjaka antitra adala ka tsy laitra anarina intsony; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa avy ao an-tranomaizina no nivoahany hanjaka, na dia nateraka tamin’alahelo tamin’ny fanjakany aza izy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' fa na dia nateraka tamin’ny fanjakany aza izy, dia tamin’alahelo ihany.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitako ny miaina rehetra izay miriaria atỳ ambanin’ny masoandro manotrona ilay zazalahy dia ilay faharoa izay mitsangana handimby ny teo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hita isa ny olona rehetra, dia izay rehetra anjakany; nefa izay any aoriana tsy mba hifaly aminy; fa zava-poana sy misambo-drivotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' homan-drivotra.'
      marker-yv: yv-n
    - type: text
      text: ' foana koa izany.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny mety hatao amin’Andriamanitra, na amin’ny fivavahana, na amin’ny voady.
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: TANDREMO ny tongotrao, raha mankao an-tranon’Andriamanitra hianao; fa ny manatona hihaino no tsara noho ny fanateran’ny adala fanatitra; fa tsy fantatr’ireny ho manao ratsy izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny maty izay efa maty ela dia nataoko ho sambatra noho ny velona izay mbola velona,– '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nefa tsara indray noho izy roa tonta aza ny tsy ary, izay tsy nahita ny ratsy atao atỳ ambanin’ny masoandro akory.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hitako ny fisasarana rehetra sy ny fahaizan-javatra rehetra, fa avy amin’ny fifampialonan’ny olona izany. Zava-poana sy misambo-drivotra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' homan-drivotra.'
      marker-yv: yv-n
    - type: text
      text: ' foana koa izany.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny adala manohon-tànana ka homana ny tenany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsara ny eran-tànan’ila misy fiadanana noho ny eran-tànan-droa misy fisasarana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' Tsara ny fiadanana eran-tànan’ila noho ny fisasarana, etc.'
      marker-yv: yv-n
    - type: text
      text: ' sady misambo-drivotra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' homan-drivotra.'
      marker-yv: yv-n
    - type: text
      text: ' foana.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao koa no zava-poana hitako atỳ ambanin’ny masoandro: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misy mitoetra irery ka tsy mana-namana, eny, tsy manan-janaka na rahalahy aza, nefa tsy misy farany ny fisasarany rehetra, ary ny masony tsy afa-po amin’ny harena, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'hanaovany hoe:'
    - type: text
      text: ' Ho an’iza no isasarako sy tsy ampananako soa ny fanahiko? Zava-poana sy asa mahareraka koa izany.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsara ny roa noho ny iray; fa misy valiny tsara ny fisasarany. '
