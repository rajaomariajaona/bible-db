document_id: 1CO.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fitsanganan’ny maty.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY ampahafantariko anareo, ry rahalahy, ny filazantsara izay notoriko taminareo sy noraisinareo sady iorenanareo, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fahasoavan’Andriamanitra no nahatoy izao ahy; ary tsy foana ny fahasoavany ato amiko; fa efa niasa fatratra mihoatra noho izy rehetra aho, nefa tsy izaho, fa ny fahasoavan’Andriamanitra no niara-niasa tamiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa na izaho na ry zareo, dia araka izany no fitorinay, ary araka izany koa no ninoanareo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha Kristy no torina fa natsangana tamin’ny maty, ahoana no ilazan’ny sasany eo aminareo fa tsy misy fitsanganan’ny maty? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy misy fitsanganan’ny maty, na dia Kristy aza dia tsy natsangana; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary raha tsy natsangana Kristy, dia foana ny tori-teninay, ary foana koa ny finoanareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia hita ho vavolombelona mandainga ny amin’Andriamanitra izahay, satria efa nilaza fa Andriamanitra no nanangana an’i Kristy; nefa raha tsy hatsangana ny maty, dia tsy mba natsangany Izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy hatsangana ny maty, na dia Kristy koa aza dia tsy natsangana; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary raha tsy natsangana Kristy, dia foana ny finoanareo; ary mbola ao amin’ny fahotanareo ihany hianareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia very koa izay efa nodimandry ao amin’i Kristy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha amin’izao fiainana izao ihany no anantenantsika an’i Kristy, dia mahantra indrindra noho ny olona rehetra isika.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay amonjena anareo koa, raha tananareo tsara araka izay teny notoriko taminareo, raha tsy nino foana hianareo.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy izany, fa efa natsangana tamin’ny maty tokoa Kristy ho santatr’izay efa nodi-mandry. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary satria ny olona iray no nisehoan’ny fahafatesana, dia ny Olona iray kosa no nisehoan’ny fitsanganan’ny maty. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tahaka ny ahafatesan’ny olona rehetra ao amin’i Adama no ahaveloman’ny olona rehetra kosa ao amin’i Kristy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa samy amin’ny filaharany avy: Kristy no santatra; rehefa afaka izany, dia izay an’i Kristy amin’ny fihaviany.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka izany, dia avy ny farany, ka amin’izay dia hatolony ho an’Andriamanitra Ray ny fanjakana, rehefa nofoanany ny fanapahana rehetra sy ny fahefana rehetra ary ny hery rehetra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy maintsy manjaka Izy, mandra-panaony ny fahavalony rehetra ho eo ambanin’ny tongony (Sal. 110.1). '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahafatesana no fahavalo farany horesena. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ,,ny zavatra rehetra efa nampanekeny ho eo ambanin’ny tongony’’ (Sal. 8.6). Fa na dia hataony hoe aza: ,,Ny zavatra rehetra no nampanekena’’, dia fantatra marina fa tsy mba isan’izany Izay nampanaiky ny zavatra rehetra Azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nampanekena Azy ny zavatra rehetra, dia ny tenan’ny Zanaka koa aza no hanaiky Izay nampanaiky ny zavatra rehetra Azy, mba tsy hisy fototra sy antony afa-tsy Andriamanitra ihany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mba ho zavatra rehetra amin’izy rehetra Andriamanitra.
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tsy izany, hanao ahoana izay atao batisa ny amin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nisolo.
      marker-yv: yv-n
    - type: text
      text: ' ny maty? Raha tsy hatsangana mihitsy ny maty, nahoana ireny no atao batisa ny aminy? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa natolotro anareo ho isan’ny zavatra voalohany indrindra ilay noraisiko, dia izao: Kristy maty noho ny fahotantsika araka ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina,
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahoana izahay no manao vy very ny ainay mandrakariva? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lazaiko marina,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mianiana aho.
      marker-yv: yv-n
    - type: text
      text: ' ry rahalahy, amin’ny fireharehako noho ny aminareo, izay ananako ao amin’i Kristy Jesosy Tompontsika, fa maty isan-andro aho. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha araka ny fanaon’olona no niadiako tamin’ny bibi-dia tany Efesosy, inona no soa azoko amin’izany? Raha tsy hatsangana ny maty, dia ,,aoka isika hihinana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: inona no soa azoko, raha tsy atsangana ny maty? Aoka isika hihinana.
      marker-yv: yv-n
    - type: text
      text: ' sy hisotro, fa rahampitso dia ho faty’’ (Isa. 22.13). '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mety hofitahina hianareo; ny fikambanana amin’ny ratsy manimba ny fitondrantena tsara. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifohaza tsara,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mifohaza ho amin’ny fahamarinana.
      marker-yv: yv-n
    - type: text
      text: ' ary aza manota; fa ny sasany tsy manana ny fahalalana an’Andriamanitra; ny hampahamenatra anareo no ilazako izany.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hisy hanao hoe: Hatao ahoana ary no fanangana ny maty? Ary tena manao ahoana no hisehoany? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry adala, izay afafinao tsy hovelomina, raha tsy maty aloha; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary izay afafinao, tsy dia ny tenany izay ho avy no afafinao, fa ny voa fotsiny ihany, na voam-bary,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vary tritika.
      marker-yv: yv-n
    - type: text
      text: ' na voa hafa; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa Andriamanitra manome azy tena araka izay sitraky ny fony, ary ny voany rehetra dia samy omeny ny tenany avy.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mitovy ny nofo rehetra; fa hafa ny an’ny olona, ary hafa ny nofon’ny biby, ary hafa ny nofon’ny vorona, ary hafa ny an’ny hazandrano. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nalevina, ary natsangana tamin’ny andro fahatelo araka ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina;
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary misy tenan’ny any an-danitra, ary misy tenan’ny etỳ an-tany; fa hafa ny voninahitry ny any an-danitra, ary hafa ny an’ny etỳ an-tany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hafa ny voninahitry ny masoandro, ary hafa ny voninahitry ny volana, ary hafa ny voninahitry ny kintana; fa ny kintana anankiray dia hafa voninahitra noho ny kintana anankiray.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia toy izany koa ny fitsanganan’ny maty: Afafy amin’ny fahalòvana izy, atsangana amin’ny tsi-fahalòvana; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afafy amin’ny fahafaham-boninahitra Izy, atsangana amin’ny voninahitra; afafy amin’ny fahalemena izy, atsangana amin’ny hery; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afafy tena araka ny fomban’aina izy, atsangana ho tena araka ny fombam-panahy. Raha misy tena araka ny fomban’aina, dia misy araka ny fombam-panahy koa. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary araka izany koa no voasoratra hoe: ,,Adama voalohan-dahy natao manan-aina’’ (Gen. 2.7); Adama farany natao fanahy mahavelona. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anefa tsy izay amin’ny fanahy no voalohany, fa izay amin’ny manan-aina, dia vao izay amin’ny fanahy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona voalohany avy amin’ny tany, dia tany; ny olona faharoa dia avy any an-danitra. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay amin’ny tany dia tahaka ilay amin’ny tany; ary izay any an-danitra dia tahaka Ilay any an-danitra. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary toy ny nitondrantsika ny endriky ny amin’ny tany no hitondrantsika ny endrik’Ilay any an-danitra koa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary niseho tamin’i Kefasy Izy, dia vao tamin’ny roa ambin’ny folo lahy koa. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazaiko, ry rahalahy: Ny nofo aman-dra tsy mahazo mandova ny fanjakan’Andriamanitra, ary ny fahalòvana tsy mandova ny tsi-fahalòvana. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, zava-miafina no ambarako aminareo: tsy hodi-mandry avokoa isika rehetra, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa vetivety, toy ny indray mipì-maso, rehefa maneno ny trompetra farany, dia hovana isika rehetra; fa hotsofina ny trompetra, ary ny maty hatsangana tsy ho lo intsony, ary isika hovana. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ity mety lo ity tsy maintsy hitafy ny tsi-fahalòvana, ary ity mety maty ity tsy maintsy hitafy ny tsi-fahafatesana.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa mitafy ny tsi-fahalòvana ity mety lo ity, ary mitafy ny tsi-fahafatesana ity mety maty ity, dia ho tanteraka ny teny voasoratra hoe: ,,Ny fahafatesana noresena ka levona’’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.54 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voatelina ka resy.
      marker-yv: yv-n
    - type: text
      text: ' (Isa. 25.8). '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ',,Ry fahafatesana ô, aiza ny fandresenao? Ry fahafatesana ô, aiza ny fanindronanao?’’ (Hos. 13.14.) '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny ota no fanindronan’ny fahafatesana; ary ny lalàna no herin’ny ota. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa isaorana anie Andriamanitra, Izay manome antsika ny fandresena amin’ny alalan’i Jesosy Kristy Tompontsika.
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa amin’izany, ry rahalahy malalako, dia miorena tsara, aza miova, ary mahefà be mandrakariva amin’ny asan’ny Tompo, satria fantatrareo fa tsy foana tsy akory ny fikelezanareo aina ao amin’ny Tompo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka izany, dia niseho tamin’ny rahalahy tsy omby dimam-jato Izy, ny ankamaroan’ireny dia mbola velona mandraka ankehitriny, fa ny sasany efa nodi-mandry. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka izany, dia niseho tamin’i Jakoba Izy, dia tamin’ny Apostoly rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary faran’izy rehetra, izaho, izay toy ny tsy tonga volana aza, dia mba nisehoany koa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izaho dia ambany indrindra amin’ny Apostoly ka tsy mendrika hatao hoe Apostoly, satria efa nanenjika ny fiangonan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' Andriamanitra aho. '
