    children:
    - type: text
      text: '55'
  - type: text
    text: ',,Ry fahafatesana ô, aiza ny fandresenao? Ry fahafatesana ô, aiza ny fanindronanao?’’ (Hos. 13.14.) '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Fa ny ota no fanindronan’ny fahafatesana; ary ny lalàna no herin’ny ota. '
  - type: usfm
    marker: v
