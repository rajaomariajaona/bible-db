      text: '58'
  - type: text
    text: Koa amin’izany, ry rahalahy malalako, dia miorena tsara, aza miova, ary mahefà be mandrakariva amin’ny asan’ny Tompo, satria fantatrareo fa tsy foana tsy akory ny fikelezanareo aina ao amin’ny Tompo.
