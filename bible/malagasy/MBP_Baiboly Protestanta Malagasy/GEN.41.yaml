document_id: GEN.41,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nilazan’i Josefa ny nofin’i Farao, sy ny nanandratana azy ho mpanapaka any Egypta.
  - type: text
    content: 'ARY rehefa afaka roa taona mipaka, dia nanonofy Farao, fa, indro, nitsangana teo amoron’i Neily izy. '
  '10':
  - type: text
    content: 'Farao dia tezitra tamin’ny mpanompony ka nanao ahy tao an-trano-maizina tao anatin’ny tranon’ny mpifehy ny mpiambina, dia izaho sy ilay lehiben’ny mpanao mofo. '
  '11':
  - type: text
    content: 'Ary nanonofy izahay indray alina, dia izaho sy izy; samy nanonofy araka ny hevitry ny nofinay avy izahay. '
  '12':
  - type: text
    content: 'Ary tao aminay dia nisy zatovo Hebreo anankiray, mpanompon’ny mpifehy ny mpiambina; dia nambaranay taminy ny nofinay, ka nolazainy taminay ny heviny; samy nilazany araka ny nofinay avy izahay. '
  '13':
  - type: text
    content: 'Ary samy tonga araka izay efa nolazainy taminay indrindra izany: izaho nampodiny ho ao amin’ilay nipetrahako, fa izy kosa nahantony.'
  '14':
  - type: text
    content: Dia naniraka Farao ka nampaka an’i Josefa, dia nalaina faingana niala tao an-davaka izy; ary nanaratra ny volom-bavany sy niova fitafiana izy, dia nankany amin’i Farao.
  '15':
  - type: text
    content: 'Ary hoy Farao tamin’i Josefa: Nanonofy aho, koa tsy misy mahalaza ny heviny; ary izaho nahare fa hianao, hono, raha mandre nofy, dia mahalaza ny heviny. '
  '16':
  - type: text
    content: 'Ary Josefa dia namaly an’i Farao ka nanao hoe: Tsy ahy izany; Andriamanitra no hilaza izay valiny hiadanan’i Farao.'
  '17':
  - type: text
    content: 'Ary hoy Farao tamin’i Josefa: Nofiko fa indro, hono, nitsangana teo amoron’i Neily aho; '
  '18':
  - type: text
    content: 'koa, indreo, nisy ombivavy fito matavy sady tsara tarehy niakatra avy teo Neily; ary nihinana teny amin’ny bararata ireny. '
  '19':
  - type: text
    content: 'Ary, indreo, nisy ombivavy fito hafa koa niakatra nanaraka ireny, mihozohozo sady ratsy tarehy indrindra no mahia, ka tsy mbola hitako izay ratsy toa azy teto amin’ny tany Egypta rehetra. '
  '2':
  - type: text
    content: 'Koa, indreo, nisy ombivavy fito tsara tarehy sady matavy niakatra avy teo Neily ka nihinana teny amin’ny bararata. '
  '20':
  - type: text
    content: 'Ary ireo ombivavy fito mahia sady ratsy tarehy dia nihinana ireo ombivavy fito matavy izay nialoha azy. '
  '21':
  - type: text
    content: 'Ary rehefa nihinana azy izy, dia tsy fantatra akory fa efa mby ao an-kibony ireny; fa mbola ratsy tarehy tahaka ny tamin’ny fahiny ihany izy. Dia nahatsiaro aho. '
  '22':
  - type: text
    content: 'Ary hitako tamin’ny nofiko indray, ka, indreo nisy salohim-bary fito niseho tamin’ny tahony iray, sady vokatra no tsara; '
  '23':
  - type: text
    content: 'ary, indreo kosa, nisy salohim-bary fito sady malazo no maivam-boa, main’ny rivotra avy any atsinanana, niseho nanaraka ireny; '
  '24':
  - type: text
    content: ary ny salohim-bary maivam-boa dia nitelina ny salohim-bary fito vokatra. Ary nolazaiko tamin’ny ombiasy izany, nefa tsy nisy nahalaza ny heviny tamiko.
  '25':
  - type: text
    content: 'Ary hoy Josefa tamin’i Farao: Ny nofin’i Farao dia iray ihany; izay efa hataon’Andriamanitra no nambarany tamin’i Farao. '
  '26':
  - type: text
    content: 'Ny ombivavy fito tsara tarehy dia fito taona; ary ny salohim-bary fito vokatra koa dia fito taona; iray ihany ny nofy. '
  '27':
  - type: text
    content: 'Ary ny ombivavy fito mahia sady ratsy tarehy, izay niakatra nanaraka ireny, dia fito taona; ary ny salohim-bary fito tsy nisy voa sady main’ny rivotra avy any atsinanana, dia ho fito taona mosarena. '
  '28':
  - type: text
    content: 'Izany dia ilay efa nolazaiko tamin’i Farao teo hoe: Izay efa hataon’Andriamanitra no asehony amin’i Farao. '
  '29':
  - type: text
    content: 'Indro, hisy fito taona zina indrindra eran’ny tany Egypta rehetra; '
  '3':
  - type: text
    content: 'Ary indreo, nisy ombivavy fito hafa kosa ratsy tarehy sady mahia niakatra avy teo Neily nanaraka azy, ka dia nijanona teo anilan’ireo ombivavy teo amoron’i Neily. '
  '30':
  - type: text
    content: 'ary manaraka izany kosa dia hisy fito taona mosarena, ka ho hadino ny fahavokarana be rehetra teo amin’ny tany Egypta ary ho ritry ny mosary ny tany; '
  '31':
  - type: text
    content: 'ary ny fahavokarana eo amin’ny tany tsy ho fantatra noho izany mosary manaraka azy izany; fa ho mafy indrindra izany. '
  '32':
  - type: text
    content: Ary naverina indroa ny nofin’i Farao, satria efa voatendrin’Andriamanitra izany zavatra izany ka hotanterahin’Andriamanitra faingana.
  '33':
  - type: text
    content: 'Koa ankehitriny aoka Farao hizaha lehilahy manan-tsaina sady hendry ka hanendry azy hanapaka ny tany Egypta. '
  '34':
  - type: text
    content: 'Aoka hanao izany Farao, ary aoka izy hanendry mpikarakara hitandrina ny tany sy hamory ny ampahadimin’ny vokatry ny tany Egypta amin’ny taon-jina fito. '
  '35':
  - type: text
    content: 'Ary aoka izy ireo hanangona ny hanina rehetra amin’ireo taona tsara ho avy ireo ka hamory vary be amin’ny anaran’i Farao ho fihinana any amin’ny tanàna maro, ka aoka hitahiry izany izy. '
  '36':
  - type: text
    content: Ary aoka izany hanina izany hotehirizina ao amin’ny tany ho amin’ny fito taona mosarena, izay ho tonga amin’ny tany Egypta, mba tsy ho simban’ny mosary ny tany.
  '37':
  - type: text
    content: 'Ary sitrak’i Farao sy ny mpanompony rehetra izany hevitra izany. '
  '38':
  - type: text
    content: 'Dia hoy Farao tamin’ny mpanompony: Hahita lehilahy tahaka io, izay manana ny Fanahin’Andriamanitra ao anatiny, va isika? '
  '39':
  - type: text
    content: 'Ary hoy koa Farao tamin’i Josefa: Satria efa nampahafantarin’Andriamanitra anao izany rehetra izany, dia tsy misy lehilahy manan-tsaina sady hendry tahaka anao; '
  '4':
  - type: text
    content: Ary ireo ombivavy ratsy tarehy sady mahia nihinana ireo ombivavy fito tsara tarehy sady matavy. Dia nahatsiaro Farao.
  '40':
  - type: text
    content: koa hianao no hanapaka ny ato an-tranoko, ary araka ny teninao no hitondrana ny oloko rehetra; ny seza fiandrianana ihany no hahalehibe ahy noho hianao.
  '41':
  - type: text
    content: 'Ary hoy indray Farao tamin’i Josefa: Indro, efa nanendry anao hanapaka ny tany Egypta rehetra aho. '
  '42':
  - type: text
    content: Dia nesorin’i Farao ny peratra
  - type: note
    content: peratra fanombohan-kase.
  - type: text
    content: ' tamin’ny tànany ka nataony tamin’ny tànan’i Josefa, dia nampitafiny rongony fotsy madinika izy, ary nasiany rojo volamena ny vozony; '
  '43':
  - type: text
    content: 'dia nampitaingeniny teo anatin’ny kalesiny faharoa izy, ary ny vahoaka niantso teo alohany nanao hoe: Mandohaleha;'
  - type: note
    content: Abreka; tokony ho teny Egyptiana izany ka mitovitovy hevitra amin’ny teny Hebreo izay adika hoe Mandohaleha.
  - type: text
    content: ' ary notendreny ho mpanapaka ny tany Egypta rehetra izy. '
  '44':
  - type: text
    content: 'Ary hoy Farao tamin’i Josefa: Izaho no Farao, ary raha tsy teninao, dia tsy hisy olona hanetsika ny tànany na ny tongony eto amin’ny tany Egypta rehetra. '
  '45':
  - type: text
    content: Ary nataon’i Farao hoe Zafenata-panea no anaran’i Josefa; dia nomeny azy Asenata, zanakavavin’i Poti-fera, mpisorona tao Ona, ho vadiny.
  - type: text
    content: 'Ary Josefa nandeha nitety ny tany Egypta. '
  '46':
  - type: text
    content: Ary efa telo-polo taona Josefa, raha niseho teo anatrehan’i Farao, mpanjakan’i Egypta. Dia niala teo anatrehan’i Farao Josefa ka nandeha nitety ny tany Egypta rehetra.
  '47':
  - type: text
    content: 'Ary ny tany dia nahavokatra tsy omby fàmpana tamin’ny taon-jina fito. '
  '48':
  - type: text
    content: 'Dia namory ny hanina rehetra tamin’izany fito taona izany teo amin’ny tany Egypta izy ka nitahiry izany tao amin’ny tanàna rehetra: ny vokatry ny saha manodidina ny isan-tanàna dia notehiriziny tao anatin’ny tanàna. '
  '49':
  - type: text
    content: Ary Josefa namory vary tahaka ny fasika any an-dranomasina, eny, be indrindra, ka tsy nanisa intsony izy, satria efa tsy hita isa.
  '5':
  - type: text
    content: Ary natory indray izy ka nanonofy fanindroany; ary, indro, nisy salohim-bary fito niseho tamin’ny tahony iray, sady vokatra
  - type: note
    content: Heb. matavy.
  - type: text
    content: ' no tsara. '
  '50':
  - type: text
    content: 'Ary nisy zazalahy roa naterak’i Asenata, zanakavavin’i Poti-fera, mpisorona tao Ona, tamin’i Josefa, raha tsy mbola tonga ny taona mosarena. '
  '51':
  - type: text
    content: Ary ny anaran’ny lahimatoa dia nataon’i Josefa hoe Manase;
  - type: note
    content: Manase = Mampanadino.
  - type: text
    content: ' fa '
  - type: text
    content: 'hoy izy:'
  - type: text
    content: ' Andriamanitra efa nampanadino ahy ny fahoriako rehetra sy izay rehetra tao an-tranon’ny raiko. '
  '52':
  - type: text
    content: Ary ny anaran’ny zandriny kosa nataony hoe Efraima;
  - type: note
    content: Efraima = Vokatra be.
  - type: text
    content: ' fa '
  - type: text
    content: 'hoy izy:'
  - type: text
    content: ' Andriamanitra efa nahamaro ahy teto amin’ny tanin’ny fahoriako.'
  '53':
  - type: text
    content: 'Ary tapitra ny taon-jina fito teo amin’ny tany Egypta; '
  '54':
  - type: text
    content: dia niandoha kosa ny fito taona mosarena, araka izay efa nolazain’i Josefa; ary nisy mosary tany amin’ny tany rehetra; nefa eran’ny tany Egypta rehetra dia mbola nisy hanina ihany.
  '55':
  - type: text
    content: 'Ary rehefa mosarena ny tany Egypta rehetra, dia nitaraina nangataka hanina tamin’i Farao ny olona; ary hoy Farao tamin’ny Egyptiana rehetra: Mankanesa any amin’i Josefa; ary izay holazainy aminareo dia ataovy. '
  '56':
  - type: text
    content: 'Ary ny mosary dia tany amin’ny tany rehetra. Ary Josefa namoha ny trano fitehirizam-bary ka nivaro-bary tamin’ny Egyptiana; ary efa mafy ny mosary eran’ny tany Egypta. '
  '57':
  - type: text
    content: Ary ny tany rehetra nankany Egypta ho any amin’i Josefa mba hividy vary; fa efa mafy ny mosary tany amin’ny tany rehetra.
  '6':
  - type: text
    content: 'Ary, indreo kosa, nisy salohim-bary fito maivam-boa sady main’ny rivotra avy any atsinanana, niseho nanaraka ireny. '
  '7':
  - type: text
    content: Ary ny salohim-bary maivam-boa nitelina ny salohim-bary fito vokatra
  - type: note
    content: Heb. matavy.
  - type: text
    content: ' sy be voa. Dia nahatsiaro Farao, koa indro fa nofy ihany izany.'
  '8':
  - type: text
    content: Ary nony maraina, dia nitebiteby ny fanahiny, ka dia naniraka nampaka ny ombiasy rehetra tao Egypta sy ny olon-kendry rehetra tao izy; ary nambaran’i Farao tamin’ireny ny nofiny, kanjo tsy nisy na dia iray aza nahalaza izay heviny tamin’i Farao.
  '9':
  - type: text
    content: 'Dia niteny tamin’i Farao ilay lehiben’ny mpitondra kapoaka ka nanao hoe: Tsaroako izao ny fahadisoako: '
