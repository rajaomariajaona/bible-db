- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, tsy nirehareha ny foko, ary tsy niandranandrana ny masoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nisaintsaina izay zavatra ambony loatra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na izay saro-pantarina tsy takatro.
- type: usfm
