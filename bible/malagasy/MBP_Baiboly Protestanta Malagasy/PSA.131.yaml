document_id: PSA.131,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiononam-po sy fiankinana amin’Andriamanitra.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: ' Nataon’i Davida.'
  - type: text
    content: JEHOVAH ô, tsy nirehareha ny foko, ary tsy niandranandrana ny masoko;
  - type: text
    content: Ary tsy nisaintsaina izay zavatra ambony loatra aho,
  - type: text
    content: Na izay saro-pantarina tsy takatro.
  '2':
  - type: text
    content: Fa nampionona sy nampangina ny fanahiko aho;
  - type: text
    content: Tahaka ny zaza efa maoty eo amin-dreniny,
  - type: text
    content: Dia tahaka izany ny fanahiko ato anatiko.
  '3':
  - type: text
    content: Ry Isiraely ô, manantenà an’i Jehovah
  - type: text
    content: Hatramin’izao ka ho mandrakizay.
