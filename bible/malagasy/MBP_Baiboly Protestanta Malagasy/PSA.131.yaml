      text: '2'
  - type: text
    text: Fa nampionona sy nampangina ny fanahiko aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny zaza efa maoty eo amin-dreniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka izany ny fanahiko ato anatiko.
- type: usfm
