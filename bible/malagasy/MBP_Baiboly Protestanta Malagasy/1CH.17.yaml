document_id: 1CH.17,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanirian’i Davida hanao tempoly, sy ny toky nomen’Andriamanitra azy ny amin’ny haharetan’ny fanjakany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Davida, raha nipetraka tao an-tranony, dia nanao tamin’i Natana mpaminany hoe: Akory izato izaho mitoetra amin’ny trano sedera, nefa ny fiaran’ny faneken’i Jehovah kosa mitoetra ao anaty lay! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: sy tahaka ny hatramin’ny andro nanendreko mpitsara ho mpifehy ny Isiraely oloko. Ary haetriko avokoa ny fahavalonao rehetra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ambarako aminao koa fa Jehovah hanome taranaka anao.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanao trano ho anao.
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary rehefa tapitra ny andronao, ka lasa any amin’ny razanao hianao, dia hatsangako ny zanakao anankiray mandimby anao, izay isan’ny terakao; ary hampitoeriko ny fanjakany; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dia io no hanao trano ho Ahy, ary Izaho kosa hampitoetra ny seza fiandrianany ho mandrakizay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izaho ho rainy, ary izy ho zanako; ary tsy hanaisotra ny famindrampoko aminy Aho, tahaka ny nanesorako izany tamin’ilay nodiasanao; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: fa hampitoeriko ao an-tranoko sy ao amin ny fanjakako mandrakizay izy; ary hampitoerina mandrakizay ny seza fiandrianany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Araka izany teny rehetra izany sy araka izao fahitana izao no nolazain’i Natana tamin’i Davida.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary Davida mpanjaka niditra ka nipetraka teo anatrehan’i Jehovah, dia nanao hoe: Zinona moa aho, Jehovah Andriamanitra ô? Ary zinona moa ny mpianakaviko, no nentinao ambaraka ankehitrny aho? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary mbola nataonao ho zavatra kely ihany aza izany, Andriamanitra ô; fa, indro, efa voalazanao koa ny amin’ny taranaky ny mpanomponao hatramin’ny mbola any aoriana lavitra aza, ary nitsinjo ahy araka ny fanaon’ny olona Hianao, Jehovah Andriamanitra ô, ka nanandratra ahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Inona intsony no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: holazain i
    - type: text
      text: ' Davida aminao ny amin’ny voninahitra omena ny mpanomponao? fa Hianao no mahalala ny mpanomponao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jehovah ô, noho ny amin’ny mpanomponao sy araka ny sitraponao no nanaovanao io zavatra lehibe io, mba hampiharihariana ireo zavatra lehibe rehetra ireo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hoy Natana tamin’i Davida: Ataovy izay rehetra ao am-ponao, fa Andriamanitra no momba anao.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jehovah ô, tsy misy tahaka Anao, ary tsy misy Andriamanitra afa-tsy Hianao, araka izay rehetra ren’ny sofinay. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary aiza moa no misy firenena etỳ an-tany tahaka ny Isiraely olonao, izay nalehan’Andriamanitra havotana ho olony, hanaovanao anarana lehibe sy mahatahotra ho Anao, dia tamin’ny nandroahanao firenena tsy ho eo anoloan’ny olonao, izay navotanao avy tany Egypta? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa ny Isiraely olonao nofidinao ho olonao mandrakizay, ary Hianao, Jehovah ô, no efa tonga Andriamaniny.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ankehitriny, Jehovah ô, ilay teny nolazainao ny amin’ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay, ary ataovy araka izay nolazainao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Eny, aoka hampitoerina izany, ary aoka hohalehibiazina mandrakizay ny anaranao ka hatao hoe: Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely, no Andriamanitry ny Isiraely; ka dia hampitoerina eo anatrehanao ny taranak’i Davida mpanomponao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa Hianao, Andriamanitro ô, efa nanambara tamin’ny mpanomponao fa homenao taranaka izy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanao trano ho azy Hianao.
      marker-yv: yv-n
    - type: text
      text: ' koa izany no nampahasahy ny mpanomponao hivavaka eto anatrehanao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary noho izany, Jehovah ô, satria Hianao no Andriamanitra, ary Hianao efa nilaza izany zava-tsoa izany ny amin’ny mpanomponao, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: dia ho sitrakao ny hitahy ny taranaky ny mpanomponao haharitra mandrakizay eo anatrehanao; fa izay tahinao, Jehovah ô, dia voatahy mandrakizay.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nefa tamin’ny alin’iny ihany dia tonga tamin’i Natana ny tenin’Andriamanitra nanao hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Andeha, lazao amin’i Davida mpanompoko hoe: Izao no lazain’i Jehovah: Tsy hianao no hanao trano hitoerako; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: fa tsy mbola nitoetra an-trano Aho hatramin’ny nitondrako ny Isiraely niakatra ka mandraka andro-any, fa nifindrafindra toby
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lay.
      marker-yv: yv-n
    - type: text
      text: ' sy nifindrafindra toerana.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tabernakely.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary tamin’izay rehetra nifindrafindrako niaraka tamin’ny Isiraely moa nisy nitenenako akory va ny mpitsaran’ny Isiraely, izay notendreko ho mpiandry ny oloko, ka nanaovako hoe: Nahoana no tsy nanao trano sedera ho Ahy hianareo?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa lazao amin’i Davida mpanompoko hoe: Izao no lazain’i Jehovah, Tompon’ny maro: Izaho no naka anao tany an-tsaha, dia avy tamin’ny niandrasanao ondry, mba ho mpanapaka ny Isiraely oloko. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nomba anao tamin’izay rehetra nalehanao Aho, ka naringako tsy ho eo anoloanao ny fahavalonao rehetra, ary homeko anarana tahaka ny anaran’izay lehibe ambonin’ny tany hianao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hifidy tany ho an’ny Isiraely oloko Aho sady hamponina azy, ka dia handry fahizay amin’ny fonenany izy ka tsy hanana ahiahy intsony, ary ny zanaky ny faharatsiana tsy hampahory azy intsony tahaka ny tany aloha '
