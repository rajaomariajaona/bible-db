document_id: EZK.18
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny famalian’Andriamanitra ny olona araka ny asany avy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nahoana no manao izao ohabolana izao ao amin’ny tanin’ny Isiraely hianareo: Ny ray no mihinana voaloboka maharikivy, ka ny nifin’ny zanany no madilo? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha velona koa Aho, hoy Jehovah Tompo, tsy hisy hanaovanareo izany ohabolana izany ao amin’ny Isiraely intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indro, Ahy ny fanahy rehetra: toy ny fanahin’ny ray, dia toy izany koa ny fanahin’ny zanany; samy Ahy ireny; ny fanahy izay manota no ho faty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha marina ny olona ka manao izay marina sy mahitsy, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin’ny sampin’ny taranak’Isiraely, na mandoto ny vadin’ny namany, na manakaiky ny vehivavy izay mararin’ny fadimbolana, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'na mampahory olona, fa mamerina ny natao tsatòka, ary tsy mandroba, fa manome ny haniny ho an’ny noana ary manafy lamba ny mitanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tsy mampanàna vola, na maka tombony akory, fa miaro ny tànany tsy hanao ratsy ary manao fitsarana marina amin’ny miady, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary mandeha araka ny lalàko sy mitandrina ny fitsipiko ka manao izay marina,–dia marina izy ka ho velona tokoa, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha miteraka zazalahy mpanao an-keriny sy mpandatsa-dra izy, ka manao na dia iray ihany amin’ireo zavatra ireo aza iny '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(nefa tsy nanao ireo zavatra ireo akory ny tenany), na mihinana eny an-tendrombohitra, na mandoto ny vadin’ny namany, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'na mampahory ny malahelo sy ny mahantra, na mandroba, na tsy mamerina ny natao tsatòka, na manandratra ny masony ho amin’ny sampy ka manao izay fahavetavetana, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: na mampanàna vola, na maka tombony,–moa ho velona va izy? Tsy ho velona izy; nanao ireo fahavetavetana rehetra ireo izy; ho faty tokoa izy, ary ny rany dia ho aminy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary, indro, raha iny kosa indray miteraka zazalahy, izay mahita ny fahotana rehetra nataon-drainy, nefa nony mahita izany izy, dia tsy mba manao tahaka izany, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin’ny sampin’ny taranak’Isiraely, na mandoto ny vadin’ny namany, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'na mampahory olona, na maka tsatòka, na mandroba, fa manome ny haniny ho an’ny noana ary manafy lamba ny mitanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'miaro ny tànany tsy hampahory ny mahantra, tsy mampanàna vola, na maka tombony, fa manaraka ny fitsipiko sy mandeha araka ny lalàko, dia tsy ho faty noho ny helo-drainy izy; ho velona tokoa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny amin’ny rainy, noho ny nanaovany an-keriny sy ny nandrobany ny rahalahiny ary ny nanaovany izay tsy mety tao amin’ny fireneny, dia, indro, ho faty noho ny helony izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nefa, hoy hianareo: Nahoana moa ny zanaka no tsy mba hitondra ny helo-drainy? Raha ny zanaka manao izay marina sy mahitsy sy mitandrina ny didiko rehetra ka mankatò azy, dia ho velona tokoa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny fanahy izay manota no ho faty. Ny zanaka tsy mba hitondra ny heloky ny rainy, ary ny ray tsy mba hitondra ny heloky ny zanany; ny fahamarinan’ny marina ho aminy ihany, ary ny faharatsian’ny ratsy fanahy kosa ho aminy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha ny ratsy fanahy miala amin’ny fahotana rehetra izay nataony ka mitandrina ny didiko rehetra ary manao izay marina sy mahitsy, dia ho velona tokoa izy, fa tsy ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fahadisoany rehetra izay nataony tsy hotsarovana aminy intsony; ho velona izy noho ny fahamarinana izay nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Moa sitrako akory va ny fahafatesan’ny ratsy fanahy, hoy Jehovah Tompo, fa tsy ny hialany amin’ny alehany mba ho velona izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa raha ny marina no miala amin’ny fahamarinany ka manao meloka ary manaraka ny fahavetavetana rehetra izay nataon’ny ratsy fanahy, ho velona va izy? Ny fahamarinany rehetra izay nataony dia tsy hotsarovana; noho ny fahadisoana izay nandisoany sy ny fahotana izay nanotany dia ho faty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nefa hoy hianareo: Tsy marina ny fitondran’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' ny Tompo. Mihainoa ange, ry taranak’Isiraely: Moa ny fitondrako'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' va no tsy marina? Tsy ny fitondranareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' va no tsy marina? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Raha ny marina miala amin’ny fahamarinany ary manao meloka ka maty amin’izany, dia maty noho ny heloka nataony ihany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha ny ratsy fanahy miala amin’ny faharatsiana nataony ka manao izay marina sy mahitsy, dia hovelominy ny fanahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha mahita izy ka miala amin’ny fahadisoana rehetra izay nataony, dia ho velona tokoa izy, fa tsy ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nefa hoy ny taranak’Isiraely: Tsy marina ny fitondran’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' ny Tompo. Ry taranak’Isiraely, ny fitondrako'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' va no tsy marina? Tsy ny fitondranareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' va no tsy marina? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa samy hotsaraiko araka ny ataonareo avy hianareo, ry taranak’Isiraely, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mitodiha, ka mibebaha amin’ny fahadisoanareo rehetra, dia tsy ho tonga fahatafintohinana mahameloka anareo intsony izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Esory ho afaka aminareo ny fahadisoanareo rehetra izay nataonareo, ka manaova fo vaovao sy fanahy vaovao ho anareo; fa nahoana no ho faty hianareo, ry taranak’Isiraely? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa tsy sitrako ny fahafatesan’izay maty, hoy Jehovah Tompo. Koa mibebaha hianareo mba ho velona.
