document_id: EZK.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famalian’Andriamanitra ny olona araka ny asany avy.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Fa raha miteraka zazalahy mpanao an-keriny sy mpandatsa-dra izy, ka manao na dia iray ihany amin’ireo zavatra ireo aza iny '
  '11':
  - type: text
    content: '(nefa tsy nanao ireo zavatra ireo akory ny tenany), na mihinana eny an-tendrombohitra, na mandoto ny vadin’ny namany, '
  '12':
  - type: text
    content: 'na mampahory ny malahelo sy ny mahantra, na mandroba, na tsy mamerina ny natao tsatòka, na manandratra ny masony ho amin’ny sampy ka manao izay fahavetavetana, '
  '13':
  - type: text
    content: na mampanàna vola, na maka tombony,–moa ho velona va izy? Tsy ho velona izy; nanao ireo fahavetavetana rehetra ireo izy; ho faty tokoa izy, ary ny rany dia ho aminy ihany.
  '14':
  - type: text
    content: 'Ary, indro, raha iny kosa indray miteraka zazalahy, izay mahita ny fahotana rehetra nataon-drainy, nefa nony mahita izany izy, dia tsy mba manao tahaka izany, '
  '15':
  - type: text
    content: 'ka tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin’ny sampin’ny taranak’Isiraely, na mandoto ny vadin’ny namany, '
  '16':
  - type: text
    content: 'na mampahory olona, na maka tsatòka, na mandroba, fa manome ny haniny ho an’ny noana ary manafy lamba ny mitanjaka, '
  '17':
  - type: text
    content: 'miaro ny tànany tsy hampahory ny mahantra, tsy mampanàna vola, na maka tombony, fa manaraka ny fitsipiko sy mandeha araka ny lalàko, dia tsy ho faty noho ny helo-drainy izy; ho velona tokoa izy. '
  '18':
  - type: text
    content: Ny amin’ny rainy, noho ny nanaovany an-keriny sy ny nandrobany ny rahalahiny ary ny nanaovany izay tsy mety tao amin’ny fireneny, dia, indro, ho faty noho ny helony izy.
  '19':
  - type: text
    content: 'Nefa, hoy hianareo: Nahoana moa ny zanaka no tsy mba hitondra ny helo-drainy? Raha ny zanaka manao izay marina sy mahitsy sy mitandrina ny didiko rehetra ka mankatò azy, dia ho velona tokoa izy. '
  '2':
  - type: text
    content: 'Nahoana no manao izao ohabolana izao ao amin’ny tanin’ny Isiraely hianareo: Ny ray no mihinana voaloboka maharikivy, ka ny nifin’ny zanany no madilo? '
  '20':
  - type: text
    content: 'Ny fanahy izay manota no ho faty. Ny zanaka tsy mba hitondra ny heloky ny rainy, ary ny ray tsy mba hitondra ny heloky ny zanany; ny fahamarinan’ny marina ho aminy ihany, ary ny faharatsian’ny ratsy fanahy kosa ho aminy ihany. '
  '21':
  - type: text
    content: 'Fa raha ny ratsy fanahy miala amin’ny fahotana rehetra izay nataony ka mitandrina ny didiko rehetra ary manao izay marina sy mahitsy, dia ho velona tokoa izy, fa tsy ho faty. '
  '22':
  - type: text
    content: Ny fahadisoany rehetra izay nataony tsy hotsarovana aminy intsony; ho velona izy noho ny fahamarinana izay nataony.
  '23':
  - type: text
    content: Moa sitrako akory va ny fahafatesan’ny ratsy fanahy, hoy Jehovah Tompo, fa tsy ny hialany amin’ny alehany mba ho velona izy?
  '24':
  - type: text
    content: Fa raha ny marina no miala amin’ny fahamarinany ka manao meloka ary manaraka ny fahavetavetana rehetra izay nataon’ny ratsy fanahy, ho velona va izy? Ny fahamarinany rehetra izay nataony dia tsy hotsarovana; noho ny fahadisoana izay nandisoany sy ny fahotana izay nanotany dia ho faty izy.
  '25':
  - type: text
    content: 'Nefa hoy hianareo: Tsy marina ny fitondran’'
  - type: note
    content: Heb. làlana.
  - type: text
    content: ' ny Tompo. Mihainoa ange, ry taranak’Isiraely: Moa ny fitondrako'
  - type: note
    content: Heb. làlana.
  - type: text
    content: ' va no tsy marina? Tsy ny fitondranareo'
  - type: note
    content: Heb. làlana.
  - type: text
    content: ' va no tsy marina? '
  '26':
  - type: text
    content: Raha ny marina miala amin’ny fahamarinany ary manao meloka ka maty amin’izany, dia maty noho ny heloka nataony ihany izy.
  '27':
  - type: text
    content: 'Ary raha ny ratsy fanahy miala amin’ny faharatsiana nataony ka manao izay marina sy mahitsy, dia hovelominy ny fanahiny. '
  '28':
  - type: text
    content: Raha mahita izy ka miala amin’ny fahadisoana rehetra izay nataony, dia ho velona tokoa izy, fa tsy ho faty.
  '29':
  - type: text
    content: 'Nefa hoy ny taranak’Isiraely: Tsy marina ny fitondran’'
  - type: note
    content: Heb. làlana.
  - type: text
    content: ' ny Tompo. Ry taranak’Isiraely, ny fitondrako'
  - type: note
    content: Heb. làlana.
  - type: text
    content: ' va no tsy marina? Tsy ny fitondranareo'
  - type: note
    content: Heb. làlana.
  - type: text
    content: ' va no tsy marina? '
  '3':
  - type: text
    content: 'Raha velona koa Aho, hoy Jehovah Tompo, tsy hisy hanaovanareo izany ohabolana izany ao amin’ny Isiraely intsony. '
  '30':
  - type: text
    content: Koa samy hotsaraiko araka ny ataonareo avy hianareo, ry taranak’Isiraely, hoy Jehovah Tompo.
  - type: text
    content: 'Mitodiha, ka mibebaha amin’ny fahadisoanareo rehetra, dia tsy ho tonga fahatafintohinana mahameloka anareo intsony izany. '
  '31':
  - type: text
    content: 'Esory ho afaka aminareo ny fahadisoanareo rehetra izay nataonareo, ka manaova fo vaovao sy fanahy vaovao ho anareo; fa nahoana no ho faty hianareo, ry taranak’Isiraely? '
  '32':
  - type: text
    content: Fa tsy sitrako ny fahafatesan’izay maty, hoy Jehovah Tompo. Koa mibebaha hianareo mba ho velona.
  '4':
  - type: text
    content: 'Indro, Ahy ny fanahy rehetra: toy ny fanahin’ny ray, dia toy izany koa ny fanahin’ny zanany; samy Ahy ireny; ny fanahy izay manota no ho faty.'
  '5':
  - type: text
    content: 'Fa raha marina ny olona ka manao izay marina sy mahitsy, '
  '6':
  - type: text
    content: 'fa tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin’ny sampin’ny taranak’Isiraely, na mandoto ny vadin’ny namany, na manakaiky ny vehivavy izay mararin’ny fadimbolana, '
  '7':
  - type: text
    content: 'na mampahory olona, fa mamerina ny natao tsatòka, ary tsy mandroba, fa manome ny haniny ho an’ny noana ary manafy lamba ny mitanjaka, '
  '8':
  - type: text
    content: 'tsy mampanàna vola, na maka tombony akory, fa miaro ny tànany tsy hanao ratsy ary manao fitsarana marina amin’ny miady, '
  '9':
  - type: text
    content: ary mandeha araka ny lalàko sy mitandrina ny fitsipiko ka manao izay marina,–dia marina izy ka ho velona tokoa, hoy Jehovah Tompo.
