document_id: JOB.29,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia mbola nandroso nanao oha-teny ihany Joba ka nanao hoe:'
  '10':
  - type: text
    content: Tsy sahy niteny ny mpanapaka,
  - type: text
    content: Ary ny lelany niraikitra tamin’ny lanilaniny.
  '11':
  - type: text
    content: Izay sofina nandre dia nanao ahy hoe sambatra;
  - type: text
    content: Ary izay maso nahita dia vavolombelona ho ahy,
  '12':
  - type: text
    content: Satria namonjy ny ory izay nitaraina aho
  - type: text
    content: Sy ny kamboty izay tsy nanan-kamonjy.
  '13':
  - type: text
    content: Ny fisaoran’izay efa ho faty dia tonga tamiko;
  - type: text
    content: Ary ny fon’ny mpitondratena nampifaliko.
  - type: note
    content: Heb. nampihobiko.
  '14':
  - type: text
    content: Nitafy fahamarinana aho, ka mba nitafy ahy kosa izy;
  - type: text
    content: Eny, tahaka ny lamba sy ny hamama ny rariny izay nananako.
  '15':
  - type: text
    content: Efa maso ho an’ny jamba aho
  - type: text
    content: Ary tongotra ho an’ny mandringa.
  '16':
  - type: text
    content: Efa ray ho an’ny malahelo aho,
  - type: text
    content: Ary ny adin’ny olona tsy fantatro aza nodinihiko.
  '17':
  - type: text
    content: Namaky ny nifin’ny ratsy fanahy aho
  - type: text
    content: Ka nandrombaka ny babo teo am-bavany.
  '18':
  - type: text
    content: 'Dia hoy izaho: Eo amin’ny akaniko ihany no hialako aina,'
  - type: text
    content: Ary hanamaro ny androko toy ny fasika aho.
  '19':
  - type: text
    content: Ny fàkako ho azon’ny rano,
  - type: text
    content: Ary ny ando hitoetra amin’ny sampako mandritra ny alina.
  '2':
  - type: text
    content: Enga anie ka ho tahaka ny tamin’ireny volana lasa ireny aho!
  - type: text
    content: Dia tahaka ilay tamin’ny andro niarovan’Andriamanitra ahy!
  '20':
  - type: text
    content: Ho vaovao amiko lalandava ny voninahitro,
  - type: text
    content: Ary ny tsipìkako hihahenjana eny an-tànako.
  '21':
  - type: text
    content: Nihaino ahy ny olona, dia niandry,
  - type: text
    content: Ka nangina tamin’ny fanolorako saina izy.
  '22':
  - type: text
    content: Rehefa niteny aho, dia tsy mba namaly intsony izy;
  - type: text
    content: Ary nitetevan’ny teniko izy.
  '23':
  - type: text
    content: Niandry ahy toy ny fiandry ny ranonorana izy
  - type: text
    content: Ary nitanatana vava toy ny fiandry ny fara-orana.
  '24':
  - type: text
    content: Raha nisy nila ho ketraka, dia mbola niseho miramirana taminy ihany ny tarehiko,
  - type: text
    content: Ary tsy nahamaloka ny fahazavan’ny tavako ireo.
  '25':
  - type: text
    content: Nifidy ny làlan-kalehany aho ka nipetraka ho lohany,
  - type: text
    content: Eny, nitoetra toy ny mpanjaka teo amin’ny miaramila
  - type: text
    content: Sy toy ny mpampionona ny misaona aho.
  '3':
  - type: text
    content: Fony mbola nazava teo ambonin’ny lohako ny jirony,
  - type: text
    content: Ary ny fahazavany no nandehanako tao amin’ny maizina;
  '4':
  - type: text
    content: Eny, tahaka ny toetro fony aho mbola fararano,
  - type: text
    content: Raha niseho teo ambonin’ny laiko ny fisakaizan’Andriamanitra;
  '5':
  - type: text
    content: Fony mbola tao amiko ny Tsitoha,
  - type: text
    content: Ary nanodidina ahy ny zanako;
  - type: note
    content: 'Na: ny ankizilahiko.'
  '6':
  - type: text
    content: Fony mbola nanasa ny tongotro tamin’ny rononomandry aho,
  - type: text
    content: Ary ny vatolampy namoaka renirano diloilo teo amiko.
  '7':
  - type: text
    content: Raha niainga niakatra ho eo amin’ny vavahadin’ny tanàna aho
  - type: text
    content: Ka nametraka ny fipetrahako teo an-kalalahana,
  '8':
  - type: text
    content: Dia nahita ahy ny zatovo ka niampirimpirina;
  - type: text
    content: Ary niainga ny fotsy volo, dia nijoro;
  '9':
  - type: text
    content: Nangina tsy niteny ny lehibe
  - type: text
    content: Ka nitampim-bava;
