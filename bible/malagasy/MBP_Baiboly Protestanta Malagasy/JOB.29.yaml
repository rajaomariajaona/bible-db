document_id: JOB.29
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia mbola nandroso nanao oha-teny ihany Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Enga anie ka ho tahaka ny tamin’ireny volana lasa ireny aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ilay tamin’ny andro niarovan’Andriamanitra ahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fony mbola nazava teo ambonin’ny lohako ny jirony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahazavany no nandehanako tao amin’ny maizina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, tahaka ny toetro fony aho mbola fararano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha niseho teo ambonin’ny laiko ny fisakaizan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fony mbola tao amiko ny Tsitoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nanodidina ahy ny zanako;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny ankizilahiko.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fony mbola nanasa ny tongotro tamin’ny rononomandry aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vatolampy namoaka renirano diloilo teo amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha niainga niakatra ho eo amin’ny vavahadin’ny tanàna aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nametraka ny fipetrahako teo an-kalalahana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nahita ahy ny zatovo ka niampirimpirina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niainga ny fotsy volo, dia nijoro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nangina tsy niteny ny lehibe
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nitampim-bava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy sahy niteny ny mpanapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lelany niraikitra tamin’ny lanilaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay sofina nandre dia nanao ahy hoe sambatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay maso nahita dia vavolombelona ho ahy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Satria namonjy ny ory izay nitaraina aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny kamboty izay tsy nanan-kamonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fisaoran’izay efa ho faty dia tonga tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fon’ny mpitondratena nampifaliko.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nampihobiko.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nitafy fahamarinana aho, ka mba nitafy ahy kosa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tahaka ny lamba sy ny hamama ny rariny izay nananako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Efa maso ho an’ny jamba aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tongotra ho an’ny mandringa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa ray ho an’ny malahelo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny adin’ny olona tsy fantatro aza nodinihiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Namaky ny nifin’ny ratsy fanahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nandrombaka ny babo teo am-bavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy izaho: Eo amin’ny akaniko ihany no hialako aina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanamaro ny androko toy ny fasika aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny fàkako ho azon’ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ando hitoetra amin’ny sampako mandritra ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho vaovao amiko lalandava ny voninahitro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsipìkako hihahenjana eny an-tànako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nihaino ahy ny olona, dia niandry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nangina tamin’ny fanolorako saina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rehefa niteny aho, dia tsy mba namaly intsony izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nitetevan’ny teniko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Niandry ahy toy ny fiandry ny ranonorana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nitanatana vava toy ny fiandry ny fara-orana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha nisy nila ho ketraka, dia mbola niseho miramirana taminy ihany ny tarehiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nahamaloka ny fahazavan’ny tavako ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nifidy ny làlan-kalehany aho ka nipetraka ho lohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nitoetra toy ny mpanjaka teo amin’ny miaramila
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy toy ny mpampionona ny misaona aho.
