document_id: MRK.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Tori-teny nataon’i Jesosy ny amin’ny fanaon-drazana.
  - type: heading
    content: Mat. 15.1-20.
  - type: text
    content: 'ARY niangona teo aminy ny Fariseo sy ny mpanora-dalàna sasany, izay avy tany Jerosalema '
  '10':
  - type: text
    content: 'Fa hoy Mosesy: ,,Manajà ny rainao sy ny reninao’’ (Eks. 20.12), ary koa: ,,Izay miteny ratsy ny rainy sy ny reniny dia hatao maty tokoa’’ (Eks. 21.17). '
  '11':
  - type: text
    content: 'Fa hoy kosa hianareo: Raha misy olona milaza amin’ny rainy na amin’ny reniny hoe: Efa korbana (izany hoe, fanatitra '
  - type: text
    content: ho an’Andriamanitra
  - type: text
    content: ') izay rehetra tokony hahazoanao soa avy amiko, '
  '12':
  - type: text
    content: dia
  - type: note
    content: 'Na: dia voafehin’ny voadiny izy. Ary dia, etc.'
  - type: text
    content: ' tsy avelanareo hanao na inona na inona ho an’ny rainy sy ny reniny intsony izy, '
  '13':
  - type: text
    content: ka dia foananareo ny tenin’Andriamanitra amin’ny fampianarana voatolotra anareo, izay nasainareo hotandremana; ary zavatra maro mifanahatahaka amin’izany koa no ataonareo.
  '14':
  - type: text
    content: 'Ary niantso ny vahoaka hankeo aminy indray Izy ka nanao taminy hoe: Mihainoa Ahy hianareo rehetra, ka mahafantara. '
  '15':
  - type: text
    content: Fa tsy ny zavatra avy eo ivelany izay miditra ao anatin’ny olona no mahaloto azy; fa izay mivoaka avy ao anatin’ny olona no mahaloto azy.
  - type: note
    content: 'Ampio hoe: [16 Raha misy manan-tsofina ho enti-mihaino, aoka izy hihaino.]'
  '17':
  - type: text
    content: 'Ary rehefa niala teo amin’ny vahoaka Izy ka niditra tao an-trano, dia nanontany Azy ny mpianany ny amin’izany fanoharana izany. '
  '18':
  - type: text
    content: 'Ary hoy Izy taminy: Hay! hianareo koa aza mba tsy mahafantatra! Tsy fantatrareo va fa izay rehetra eo ivelan’ny olona ka miditra ao anatiny dia tsy mahaloto azy, '
  '19':
  - type: text
    content: 'satria tsy miditra ao am-pony izany, fa ao an-kibony ihany, ka dia mivoaka ao amin’ny fivoahana; '
  - type: text
    content: izany no nolazainy
  - type: text
    content: ' mba hahadio ny hanina rehetra. '
  '2':
  - type: text
    content: 'ka nahita ny mpianatra sasany fa nihinan-kanina tamin’ny tànana tsy madio, izany hoe, tsy voasasa. ( '
  '20':
  - type: text
    content: 'Ary hoy Izy: Izay mivoaka avy ao amin’ny olona, dia izany no mahaloto azy. '
  '21':
  - type: text
    content: 'Fa avy ao anatin’ny olona, dia avy ao am-pony, no ivoahan’ny sain-dratsy, dia ny fijangajangana, ny halatra, ny vonoan-olona, ny fakam-badin’olona, '
  '22':
  - type: text
    content: ny fieremana, ny lolom-po, ny fitaka, ny fijejojejoana, ny maso ratsy, ny fitenenan-dratsy,
  - type: note
    content: Gr. blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' ny avonavona, ny fahadalana: '
  '23':
  - type: text
    content: izany zava-dratsy rehetra izany no mivoaka avy ao anatin’ny olona ka mahaloto azy.
  - type: heading
    content: Ny nahasitranan’i Jesosy ny zanakavavin’ilay vehivavy Kananita.
  - type: heading
    content: Mat. 15.21-28.
  '24':
  - type: text
    content: 'ARY niala teo Jesosy ka lasa nankany amin’ny sisin-tanin’i Tyro sy Sidona; dia niditra tao an-trano Izy, ary tiany tsy ho fantatry ny olona izany; kanefa tsy nahazo niery Izy. '
  '25':
  - type: text
    content: 'Fa niaraka tamin’izay dia nisy vehivavy anankiray nandre ny aminy (ny zanani-vavy tanora dia azom-panahy maloto), dia nankao ka niankohoka tamin’ny tongony. '
  '26':
  - type: text
    content: 'Ary jentilisa ravehivavy, avy amin’ny firenena Syro-foinika; dia nangataka taminy izy mba hamoaka ny demonia amin’ny zanani-vavy. '
  '27':
  - type: text
    content: 'Fa hoy Jesosy taminy: Aoka ho voky aloha ny zaza; fa tsy mety raha maka ny mofon-jaza ka manipy azy ho an’ny amboakely. '
  '28':
  - type: text
    content: 'Fa ravehivavy namaly ka nanao taminy hoe: Eny, Tompoko; kanefa na dia ny amboakely ao ambanin’ny latabatra aza dia mba mihinana ny sombintsombin’ny mofon-jaza ihany. '
  '29':
  - type: text
    content: 'Dia hoy Jesosy taminy: Noho izany teny izany mandehana hianao; efa nivoaka tamin’ny zanakao-vavy ny demonia. '
  '3':
  - type: text
    content: Fa ny Fariseo sy ny Jiosy rehetra tsy mba mihinana, raha tsy efa manasa tsara
  - type: note
    content: Gr. sasàny amin’ny totohondry.
  - type: text
    content: ' ny tànany, satria mitana ny fampianarana voatolotry ny razana izy. '
  '30':
  - type: text
    content: Ary raha tonga tao an-tranony ravehivavy, dia hitany nandry teo ambonin’ny farafara ny zanani-vavy, ary ny demonia efa nivoaka taminy.
  - type: heading
    content: Ny nahasitranan’i Jesosy ny lehilahy anankiray marenina sady raiki-dela.
  - type: heading
    content: Mat. 15.29-31.
  '31':
  - type: text
    content: ARY Jesosy niala indray tamin’ny sisin-tanin’i Tyro, dia namaky an’i Sidona sy ny tany Dekapolisy ka nankany amoron’ny Ranomasin’i Galilia.
  '32':
  - type: text
    content: 'Ary nisy marenina sady raiki-dela anankiray nentiny tany aminy, ka nangataka taminy ireo mba hametrahany tànana. '
  '33':
  - type: text
    content: 'Ary nitondra an-dralehilahy nitanila niala teo amin’ny vahoaka Izy, dia nangarona ny sofiny tamin’ny rantsan-tànany, dia nandrora ka nanendry ny lelany; '
  '34':
  - type: text
    content: 'ary niandrandra ny lanitra Izy, dia nisento ka nanao taminy hoe: Efata, izany hoe: Maladia. '
  '35':
  - type: text
    content: Dia nalady ny sofiny, sady voavaha ny fatoran’ny lelany, ka dia nahateny tsara izy.
  '36':
  - type: text
    content: 'Ary nandrara ny olona teo Jesosy mba tsy hilazalaza na amin’iza na amin’iza; fa na dia norarany aza izy, dia vao mainka nampiely izany bebe kokoa. '
  '37':
  - type: text
    content: 'Dia talanjona indrindra ny olona ka nanao hoe: Tsara ny nanaovany ny zavatra rehetra; fa sady mampahalady ny marenina Izy no mampiteny ny moana.'
  '4':
  - type: text
    content: Ary raha avy any an-tsena, dia tsy mihinana izy, raha tsy misasa aloha. Ary misy fomba maro koa izay noraisiny hotanana, dia ny manasa kapoaka sy famarana
  - type: note
    content: Gr. sekstaria.
  - type: text
    content: ' mbamin’izay fanaka varahina.'
  - type: note
    content: 'Ampio hoe: [ary farafara].'
  - type: text
    content: )
  '5':
  - type: text
    content: 'Dia nanontany Azy ny Fariseo sy ny mpanora-dalàna hoe: Nahoana ny mpianatrao no tsy manaraka ny fampianarana voatolotry ny razana, fa mihinan-kanina amin’ny tànana tsy misasa izy?'
  '6':
  - type: text
    content: 'Fa Jesosy nanao taminy hoe: Marina ny naminanian’Isaia anareo mpihatsaravelatsihy, araka ny voasoratra hoe:'
  - type: text
    content: ',,Ity firenena ity manaja Ahy amin’ny molony,'
  - type: text
    content: Fa ny fony kosa lavitra Ahy.
  '7':
  - type: text
    content: Koa foana ny ivavahan’ireo amiko,
  - type: text
    content: Raha mampianatra ny didin’olombelona ho fampianarana izy’’ (Isa. 29.13).
  '8':
  - type: text
    content: Mahafoy ny didin’Andriamanitra hianareo ka mitana ny fanaon’ny olona.
  '9':
  - type: text
    content: 'Ary hoy koa Izy taminy: Hay! tsara ny nahafoizanareo ny didin’Andriamanitra mba hitandremanareo ny fampianarana voatolotra anareo! '
