document_id: MRK.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Tori-teny nataon’i Jesosy ny amin’ny fanaon-drazana.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 15.1-20.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY niangona teo aminy ny Fariseo sy ny mpanora-dalàna sasany, izay avy tany Jerosalema '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nahita ny mpianatra sasany fa nihinan-kanina tamin’ny tànana tsy madio, izany hoe, tsy voasasa. ( '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny Fariseo sy ny Jiosy rehetra tsy mba mihinana, raha tsy efa manasa tsara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sasàny amin’ny totohondry.
    marker-yv: yv-n
  - type: text
    text: ' ny tànany, satria mitana ny fampianarana voatolotry ny razana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary raha avy any an-tsena, dia tsy mihinana izy, raha tsy misasa aloha. Ary misy fomba maro koa izay noraisiny hotanana, dia ny manasa kapoaka sy famarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sekstaria.
    marker-yv: yv-n
  - type: text
    text: ' mbamin’izay fanaka varahina.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[ary farafara].'
    marker-yv: yv-n
  - type: text
    text: )
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanontany Azy ny Fariseo sy ny mpanora-dalàna hoe: Nahoana ny mpianatrao no tsy manaraka ny fampianarana voatolotry ny razana, fa mihinan-kanina amin’ny tànana tsy misasa izy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa Jesosy nanao taminy hoe: Marina ny naminanian’Isaia anareo mpihatsaravelatsihy, araka ny voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Ity firenena ity manaja Ahy amin’ny molony,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fony kosa lavitra Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa foana ny ivavahan’ireo amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mampianatra ny didin’olombelona ho fampianarana izy’’ (Isa. 29.13).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mahafoy ny didin’Andriamanitra hianareo ka mitana ny fanaon’ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy koa Izy taminy: Hay! tsara ny nahafoizanareo ny didin’Andriamanitra mba hitandremanareo ny fampianarana voatolotra anareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy Mosesy: ,,Manajà ny rainao sy ny reninao’’ (Eks. 20.12), ary koa: ,,Izay miteny ratsy ny rainy sy ny reniny dia hatao maty tokoa’’ (Eks. 21.17). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy kosa hianareo: Raha misy olona milaza amin’ny rainy na amin’ny reniny hoe: Efa korbana (izany hoe, fanatitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ho an’Andriamanitra
  - type: text
    text: ') izay rehetra tokony hahazoanao soa avy amiko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: dia voafehin’ny voadiny izy. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary dia, etc.
    marker-yv: yv-n
  - type: text
    text: ' tsy avelanareo hanao na inona na inona ho an’ny rainy sy ny reniny intsony izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ka dia foananareo ny tenin’Andriamanitra amin’ny fampianarana voatolotra anareo, izay nasainareo hotandremana; ary zavatra maro mifanahatahaka amin’izany koa no ataonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary niantso ny vahoaka hankeo aminy indray Izy ka nanao taminy hoe: Mihainoa Ahy hianareo rehetra, ka mahafantara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa tsy ny zavatra avy eo ivelany izay miditra ao anatin’ny olona no mahaloto azy; fa izay mivoaka avy ao anatin’ny olona no mahaloto azy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[16 Raha misy manan-tsofina ho enti-mihaino, aoka izy hihaino.]'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa niala teo amin’ny vahoaka Izy ka niditra tao an-trano, dia nanontany Azy ny mpianany ny amin’izany fanoharana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Izy taminy: Hay! hianareo koa aza mba tsy mahafantatra! Tsy fantatrareo va fa izay rehetra eo ivelan’ny olona ka miditra ao anatiny dia tsy mahaloto azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'satria tsy miditra ao am-pony izany, fa ao an-kibony ihany, ka dia mivoaka ao amin’ny fivoahana; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izany no nolazainy
  - type: text
    text: ' mba hahadio ny hanina rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Izy: Izay mivoaka avy ao amin’ny olona, dia izany no mahaloto azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa avy ao anatin’ny olona, dia avy ao am-pony, no ivoahan’ny sain-dratsy, dia ny fijangajangana, ny halatra, ny vonoan-olona, ny fakam-badin’olona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ny fieremana, ny lolom-po, ny fitaka, ny fijejojejoana, ny maso ratsy, ny fitenenan-dratsy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' ny avonavona, ny fahadalana: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: izany zava-dratsy rehetra izany no mivoaka avy ao anatin’ny olona ka mahaloto azy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny zanakavavin’ilay vehivavy Kananita.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 15.21-28.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ARY niala teo Jesosy ka lasa nankany amin’ny sisin-tanin’i Tyro sy Sidona; dia niditra tao an-trano Izy, ary tiany tsy ho fantatry ny olona izany; kanefa tsy nahazo niery Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa niaraka tamin’izay dia nisy vehivavy anankiray nandre ny aminy (ny zanani-vavy tanora dia azom-panahy maloto), dia nankao ka niankohoka tamin’ny tongony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary jentilisa ravehivavy, avy amin’ny firenena Syro-foinika; dia nangataka taminy izy mba hamoaka ny demonia amin’ny zanani-vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy Jesosy taminy: Aoka ho voky aloha ny zaza; fa tsy mety raha maka ny mofon-jaza ka manipy azy ho an’ny amboakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa ravehivavy namaly ka nanao taminy hoe: Eny, Tompoko; kanefa na dia ny amboakely ao ambanin’ny latabatra aza dia mba mihinana ny sombintsombin’ny mofon-jaza ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy Jesosy taminy: Noho izany teny izany mandehana hianao; efa nivoaka tamin’ny zanakao-vavy ny demonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary raha tonga tao an-tranony ravehivavy, dia hitany nandry teo ambonin’ny farafara ny zanani-vavy, ary ny demonia efa nivoaka taminy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny lehilahy anankiray marenina sady raiki-dela.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 15.29-31.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ARY Jesosy niala indray tamin’ny sisin-tanin’i Tyro, dia namaky an’i Sidona sy ny tany Dekapolisy ka nankany amoron’ny Ranomasin’i Galilia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nisy marenina sady raiki-dela anankiray nentiny tany aminy, ka nangataka taminy ireo mba hametrahany tànana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nitondra an-dralehilahy nitanila niala teo amin’ny vahoaka Izy, dia nangarona ny sofiny tamin’ny rantsan-tànany, dia nandrora ka nanendry ny lelany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ary niandrandra ny lanitra Izy, dia nisento ka nanao taminy hoe: Efata, izany hoe: Maladia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Dia nalady ny sofiny, sady voavaha ny fatoran’ny lelany, ka dia nahateny tsara izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary nandrara ny olona teo Jesosy mba tsy hilazalaza na amin’iza na amin’iza; fa na dia norarany aza izy, dia vao mainka nampiely izany bebe kokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia talanjona indrindra ny olona ka nanao hoe: Tsara ny nanaovany ny zavatra rehetra; fa sady mampahalady ny marenina Izy no mampiteny ny moana.'
