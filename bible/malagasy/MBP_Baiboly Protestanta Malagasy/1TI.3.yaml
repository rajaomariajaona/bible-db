      marker-yv: yv-n
    - type: text
      text: ' dia tsy maintsy ho tsy manan-tsiny, manam-bady tokana, mahonon-tena, hendry, tia filaminana, mampiantrano vahiny, mahay mampianatra, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'tsy mpimamo lian-ady, tsy mpikapoka, fa mandefitra, tsy mpila ady, tsy mpitia vola, '
  '4':
  - type: usfm
