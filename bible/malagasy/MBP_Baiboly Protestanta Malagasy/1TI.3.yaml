document_id: 1TI.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny olona miendrika hatao mpitandrina sy diakona.
  - type: text
    content: 'MAHATOKY izao teny izao: Raha misy olona maniry ny asan’ny mpitandrina,'
  - type: note
    content: Gr. episkopo.
  - type: text
    content: ' dia maniry asa tsara izy. '
  '10':
  - type: text
    content: 'Ary aoka hizahan-toetra ireo aloha, dia vao hanao ny asan’ny diakona izy, raha tsy manan-tsiny. '
  '11':
  - type: text
    content: 'Ny vehivavy koa ho toy izany ihany: maotona, tsy mpanendrikendrika, mahonon-tena, mahatoky amin’ny zavatra rehetra. '
  '12':
  - type: text
    content: 'Aoka ny diakona samy hanam-bady tokana sady hanapaka tsara ny zanany sy ny ankohonany. '
  '13':
  - type: text
    content: Fa izay efa mahavatra tsara ny asan’ny diakona dia mahazo toerana tsara ho an’ny tenany sy fahasahiana be amin’ny finoana izay ao amin’i Kristy Jesosy.
  '14':
  - type: text
    content: 'Izany zavatra izany dia soratako aminao, na dia manantena hankatỳ aminao faingana aza aho; '
  '15':
  - type: text
    content: fa raha tratra ela aho, dia ny hahafantaranao izay fitondrantena mety hatao ao an-tranon’Andriamanitra, dia ny fiangonan’
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' Andriamanitra velona, sady andry sy fiorenan’ny fahamarinana. '
  '16':
  - type: text
    content: Ary iaraha-manaiky mihitsy fa lehibe ny zava-miafina ny amin’ny toe-panahy araka an’Andriamanitra, dia Ilay naseho teo amin’ny nofo, nohamarinina tao amin’ny Fanahy; hitan’ny anjely, notorina tany amin’ny jentilisa, ninoana teny amin’izao tontolo izao, nakarina tamin’
  - type: note
    content: Na ho any amin’.
  - type: text
    content: ' ny voninahitra.'
  '2':
  - type: text
    content: Koa ny mpitandrina
  - type: note
    content: Gr. episkopo.
  - type: text
    content: ' dia tsy maintsy ho tsy manan-tsiny, manam-bady tokana, mahonon-tena, hendry, tia filaminana, mampiantrano vahiny, mahay mampianatra, '
  '3':
  - type: text
    content: 'tsy mpimamo lian-ady, tsy mpikapoka, fa mandefitra, tsy mpila ady, tsy mpitia vola, '
  '4':
  - type: text
    content: 'manapaka tsara ny ankohonany, mampanaiky ny zanany amin’ny fahamaotinana tsara ( '
  '5':
  - type: text
    content: fa raha misy olona tsy mahay mitondra ny ankohonany, hataony ahoana no fitandrina ny fiangonan’
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' Andriamanitra?), '
  '6':
  - type: text
    content: 'tsy izay zazavao amin’ny fivavahana, fandrao hieboebo foana izy ka ho latsaka amin’ny fahamelohan’ny devoly. '
  '7':
  - type: text
    content: 'Ary tsy maintsy ho tsara laza koa amin’izay eny ivelany izy, fandrao ho lavo amin’ny fananan-tsiny sy ny fandriky ny devoly. '
  '8':
  - type: text
    content: 'Ny diakona koa toy izany ihany, ho maotona, tsy miroa teny, tsy tia divay be, tsy tia harena maloto, '
  '9':
  - type: text
    content: 'mitandrina tsara ny zava-miafina ny amin’ny finoana amin’ny fieritreretana madio. '
