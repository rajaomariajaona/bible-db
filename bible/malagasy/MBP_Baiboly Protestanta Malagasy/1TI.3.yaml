verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny olona miendrika hatao mpitandrina sy diakona.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'MAHATOKY izao teny izao: Raha misy olona maniry ny asan’ny mpitandrina,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: episkopo.
      marker-yv: yv-n
    - type: text
      text: ' dia maniry asa tsara izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary aoka hizahan-toetra ireo aloha, dia vao hanao ny asan’ny diakona izy, raha tsy manan-tsiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny vehivavy koa ho toy izany ihany: maotona, tsy mpanendrikendrika, mahonon-tena, mahatoky amin’ny zavatra rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Aoka ny diakona samy hanam-bady tokana sady hanapaka tsara ny zanany sy ny ankohonany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa izay efa mahavatra tsara ny asan’ny diakona dia mahazo toerana tsara ho an’ny tenany sy fahasahiana be amin’ny finoana izay ao amin’i Kristy Jesosy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Izany zavatra izany dia soratako aminao, na dia manantena hankatỳ aminao faingana aza aho; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: fa raha tratra ela aho, dia ny hahafantaranao izay fitondrantena mety hatao ao an-tranon’Andriamanitra, dia ny fiangonan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' Andriamanitra velona, sady andry sy fiorenan’ny fahamarinana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary iaraha-manaiky mihitsy fa lehibe ny zava-miafina ny amin’ny toe-panahy araka an’Andriamanitra, dia Ilay naseho teo amin’ny nofo, nohamarinina tao amin’ny Fanahy; hitan’ny anjely, notorina tany amin’ny jentilisa, ninoana teny amin’izao tontolo izao, nakarina tamin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho any amin’.
      marker-yv: yv-n
    - type: text
      text: ' ny voninahitra.'
