      children:
      - type: text
        text: '6'
    - type: text
      text: 'tsy izay zazavao amin’ny fivavahana, fandrao hieboebo foana izy ka ho latsaka amin’ny fahamelohan’ny devoly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary tsy maintsy ho tsara laza koa amin’izay eny ivelany izy, fandrao ho lavo amin’ny fananan-tsiny sy ny fandriky ny devoly. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny diakona koa toy izany ihany, ho maotona, tsy miroa teny, tsy tia divay be, tsy tia harena maloto, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
