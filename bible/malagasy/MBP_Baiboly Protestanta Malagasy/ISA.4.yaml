document_id: ISA.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary amin’izany andro izany dia hisy vehivavy fito hihazona lehilahy iray ka hanao hoe:'
  - type: text
    content: Ny haninay ihany no hohaninay, ary ny lambanay ihany no hotafinay;
  - type: text
    content: 'Fa izao ihany no angatahinay: Aoka hotononina amin’ny anaranao izahay,'
  - type: text
    content: Ka afaho tondromaso.
  '2':
  - type: text
    content: Amin’izany andro izany ny rantsan’
  - type: note
    content: 'Na: solofon’.'
  - type: text
    content: ' i Jehovah dia ho tonga fahatsaran-tarehy sy voninahitra,'
  - type: text
    content: Ary ny vokatry ny tany dia ho rehareha sy firavaka ho an’ny Isiraely sisa afaka;
  '3':
  - type: text
    content: Ary izay sisa any Ziona sy izay mbola mitoetra any Jerosalema dia hatao hoe masina.
  - type: text
    content: Dia izay rehetra voasoratra ho isan’ny velona any Jerosalema,–
  '4':
  - type: text
    content: Rehefa voasasan’ny Tompo ho afaka amin’ny fahalotoany ireo zanakavavin’i Ziona,
  - type: text
    content: Ary rehefa voadion’ny fanahy fitsarana sy ny fanahy fandringanana Jerosalema,
  - type: text
    content: Ho afaka amin’ny ran’olona nalatsany.
  '5':
  - type: text
    content: Ary Jehovah hamorona rahona sy setroka raha antoandro
  - type: text
    content: Sy fahazavan’ny afo midedadeda nony alina
  - type: text
    content: Ho eny ambonin’ny fitoerana rehetra any an-tendrombohitra Ziona
  - type: text
    content: Sy ho eny ambonin’ny fivoriany rehetra;
  - type: text
    content: Ary eny ambonin’ny voninahitra rehetra dia hisy eloelo
  '6':
  - type: text
    content: Ka hisy trano-lay ho fialokalofana amin’ny hainandro raha antoandro
  - type: text
    content: Ary ho fialofana sy fierena amin’ny tafio-drivotra sy ny ranonorana.
