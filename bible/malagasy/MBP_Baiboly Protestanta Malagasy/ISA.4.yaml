document_id: ISA.4
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary amin’izany andro izany dia hisy vehivavy fito hihazona lehilahy iray ka hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny haninay ihany no hohaninay, ary ny lambanay ihany no hotafinay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa izao ihany no angatahinay: Aoka hotononina amin’ny anaranao izahay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka afaho tondromaso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Amin’izany andro izany ny rantsan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: solofon’.
    marker-yv: yv-n
  - type: text
    text: ' i Jehovah dia ho tonga fahatsaran-tarehy sy voninahitra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vokatry ny tany dia ho rehareha sy firavaka ho an’ny Isiraely sisa afaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary izay sisa any Ziona sy izay mbola mitoetra any Jerosalema dia hatao hoe masina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay rehetra voasoratra ho isan’ny velona any Jerosalema,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rehefa voasasan’ny Tompo ho afaka amin’ny fahalotoany ireo zanakavavin’i Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rehefa voadion’ny fanahy fitsarana sy ny fanahy fandringanana Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho afaka amin’ny ran’olona nalatsany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Jehovah hamorona rahona sy setroka raha antoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fahazavan’ny afo midedadeda nony alina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho eny ambonin’ny fitoerana rehetra any an-tendrombohitra Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho eny ambonin’ny fivoriany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eny ambonin’ny voninahitra rehetra dia hisy eloelo
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ka hisy trano-lay ho fialokalofana amin’ny hainandro raha antoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho fialofana sy fierena amin’ny tafio-drivotra sy ny ranonorana.
