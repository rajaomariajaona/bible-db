document_id: JOB.38,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Jehovah an’i Joba.
  - type: text
    content: 'ARY teo anatin’ny tafio-drivotra Jehovah dia namaly an’i Joba ka nanao hoe:'
  '10':
  - type: text
    content: Ary nandidy ny ho fetrany
  - type: text
    content: Sady nanisy hidy sy varavarana
  '11':
  - type: text
    content: 'Ka nanao hoe: Hatreto no azonao androsoana ka tsy hihoatra,'
  - type: text
    content: Ary eto no hampijanonana ny fisafoaky ny onjanao?
  '12':
  - type: text
    content: Hatrizay niainanao moa mba efa nandidy ny maraina va hianao?
  - type: text
    content: Efa notoroanao ny fitoerany va ny fipoak’andro,
  '13':
  - type: text
    content: Mba horaisiny ny sisin’ny tany,
  - type: text
    content: Ka hakopakopany hiala ny ratsy fanahy?
  '14':
  - type: text
    content: Ary hiova tahaka ny tanimanga tombohin-kase ny endriny,
  - type: text
    content: Ka hiseho tahaka ny lamba misoratra
  - type: note
    content: Heb. fitafiana.
  - type: text
    content: ' ny tarehiny,'
  '15':
  - type: text
    content: Ary hosakanana ny fahazavan’ny ratsy fanahy,
  - type: text
    content: Ka ho tapaka ny sandry naingaina.
  '16':
  - type: text
    content: Moa efa niditra hatrany amin’ny loharanon-dranomasina va hianao,
  - type: text
    content: Ary efa nandehandeha tany amin’ny fanambanin’ny lalina?
  '17':
  - type: text
    content: Moa efa naharihary taminao va ny vavahadin’ny fahafatesana?
  - type: text
    content: Ary efa hitanao va ny vavahadin’ny aloky ny fahafatesana?
  '18':
  - type: text
    content: Moa efa voadinikao ny hatrany amin’ny fahalalahan’ny tany?
  - type: text
    content: Ambarao ary, raha fantatrao izany rehetra izany.
  '19':
  - type: text
    content: Aiza ary no làlana ho any amin’ny fonenan’ny mazava?
  - type: text
    content: Ary aiza no fitoeran’ny maizina?
  '2':
  - type: text
    content: Iza moa izato manao izay hahamaizina ny fisainana
  - type: text
    content: Amin’ny teny tsy misy fahalalana?
  '20':
  - type: text
    content: Mba hitondranao izany ho amin’ny faran’ny alehany,
  - type: text
    content: Ary ho fantatrao ny làlana ho any an-tranony.
  '21':
  - type: text
    content: Eny, fantatrao mantsy izany, satria efa teraka hianao tamin’izay,
  - type: text
    content: Ary maro ny isan’ny andronao!
  '22':
  - type: text
    content: Moa efa niditra tany amin’ny firaketana ny orampanala va hianao?
  - type: text
    content: Ary efa hitanao va ny firaketana ny havandra,
  '23':
  - type: text
    content: Izay voatahiriko ho amin’ny andro fahoriana,
  - type: text
    content: Dia ny andro misy ady sy tafika?
  '24':
  - type: text
    content: Aiza moa no làlana izarazarana ny mazava
  - type: text
    content: Sy ielezan’ny rivotra avy any atsinanana ho etỳ ambonin’ny tany?
  '25':
  - type: text
    content: Iza moa no nihady làlan-drano ho an’ny ranonorana mirotsaka be,
  - type: text
    content: Sy làlan-kaleha ho an’ny helatry ny kotrokorana,
  '26':
  - type: text
    content: Handatsaka ranonorana ambonin’ny tany izay tsy itoeran’olona,
  - type: text
    content: Dia any amin’ny efitra tsy misy mponina,
  '27':
  - type: text
    content: Mba hahavonto ny efitra sy ny tany foana,
  - type: text
    content: Ary hampitsimoka ny ahitra vao mitsiry?
  '28':
  - type: text
    content: Manan-dray va ny ranonorana?
  - type: text
    content: Ary iza kosa no miteraka ny ranon’ando?
  '29':
  - type: text
    content: Kibon’iza moa no nihavian’ny ranomandry?
  - type: text
    content: Ary ny vongam-panala avy amin’ny lanitra, iza no niteraka azy?
  '3':
  - type: text
    content: Misikina ary tahaka ny lehilahy;
  - type: text
    content: Fa hanadina anao Aho, ka valio:–
  '30':
  - type: text
    content: Tonga mafy toy ny vato ny rano,
  - type: text
    content: Ary mitambatra ny fanambonin’ny lalina.
  '31':
  - type: text
    content: Mahavòna ny kofehin’ny Ikotokelimiadilaona va hianao,
  - type: text
    content: Ary mahavaha ny Telonohorefy?
  '32':
  - type: text
    content: Mahavoaka ny Mazarota
  - type: note
    content: Anaran-kitana; ny Zôdiaka (?).
  - type: text
    content: ' amin’ny fotoany va hianao?'
  - type: text
    content: Ary mahatondra ny Bera mbamin’ny zanany va hianao?
  '33':
  - type: text
    content: Fantatrao va ny làlan’ny lanitra?
  - type: text
    content: Ary manendry ny fanapahan’ireny ny tany va hianao?
  '34':
  - type: text
    content: Mahasandratra ny feonao ho amin’ny rahona matevina va hianao,
  - type: text
    content: Mba hanafotra anao ny rano mandriaka?
  '35':
  - type: text
    content: Mahay mandefa ny helatra va hianao,
  - type: text
    content: 'Ka ho avy ireo hilaza aminao hoe: Indreto izahay?'
  '36':
  - type: text
    content: Iza moa no nanao ny rahona matevina ho fitoeram-pahendrena,
  - type: text
    content: Ary irerỳ miseho erỳ an-danitra ho fampisehoana ny fahalalana?
  - type: note
    content: Na:Iza no nanisy fahalalana ao am-pon’ny olona? Ary iza no nanome fahalalana ho ao an-tsaina?
  '37':
  - type: text
    content: Iza moa no manam-pahendrena mahisa ny rahom-potsy manify?
  - type: text
    content: Ary iza no mahatankina ny fitoeran-dranon’
  - type: note
    content: Heb. siny hoditra.
  - type: text
    content: ' ny lanitra,'
  '38':
  - type: text
    content: Hitambaran’ny vovoka ho dilatra
  - type: text
    content: Sy hivonganany ho bainga?
  '39':
  - type: text
    content: Mahay mihaza toha ho an’ny liom-bavy va hianao,
  - type: text
    content: Sy mahafaka ny fahalianan’ny liona tanora,
  '4':
  - type: text
    content: Taiza ary hianao, fony Aho nanorina ny tany?
  - type: text
    content: Ambarao, raha hainao.
  '40':
  - type: text
    content: Raha mamitsaka ao amin’ny fitoerany izy
  - type: text
    content: Ary manotrika ao amin’ny kirihitrala?
  '41':
  - type: text
    content: Iza moa no manome hanina ny goaika,
  - type: text
    content: Raha mitaraina amin’Andriamanitra ny zanany
  - type: text
    content: Ka mirenireny tsy mahita hanina?
  '5':
  - type: text
    content: Iza ary no nandidy izay ho refiny, raha fantatrao?
  - type: text
    content: Ary iza no nanenjana ny famolaina teo aminy?
  '6':
  - type: text
    content: Teo amin’inona no nanorenana ny vodi-andriny,
  - type: text
    content: Ary iza no nametraka ny vato fehizorony,
  '7':
  - type: text
    content: Raha niara-nihira ny kintan’ny maraina,
  - type: text
    content: Ary nihoby avokoa ireo zanak’Andriamanitra?
  '8':
  - type: text
    content: 'Ary '
  - type: text
    content: iza no
  - type: text
    content: ' nanao varavarana misakana ny ranomasina,'
  - type: text
    content: Raha nibosesika nivoaka avy tany am-bohoka izy,
  '9':
  - type: text
    content: Raha nanao ny rahona ho fitafiany Aho
  - type: text
    content: Ary ny aizim-pito ho fonony,
