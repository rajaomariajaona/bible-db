document_id: JOB.38
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny navalin’i Jehovah an’i Joba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY teo anatin’ny tafio-drivotra Jehovah dia namaly an’i Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Iza moa izato manao izay hahamaizina ny fisainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny teny tsy misy fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Misikina ary tahaka ny lehilahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hanadina anao Aho, ka valio:–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Taiza ary hianao, fony Aho nanorina ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambarao, raha hainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza ary no nandidy izay ho refiny, raha fantatrao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no nanenjana ny famolaina teo aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Teo amin’inona no nanorenana ny vodi-andriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no nametraka ny vato fehizorony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha niara-nihira ny kintan’ny maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nihoby avokoa ireo zanak’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: iza no
  - type: text
    text: ' nanao varavarana misakana ny ranomasina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha nibosesika nivoaka avy tany am-bohoka izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha nanao ny rahona ho fitafiany Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny aizim-pito ho fonony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nandidy ny ho fetrany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nanisy hidy sy varavarana
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka nanao hoe: Hatreto no azonao androsoana ka tsy hihoatra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eto no hampijanonana ny fisafoaky ny onjanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hatrizay niainanao moa mba efa nandidy ny maraina va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa notoroanao ny fitoerany va ny fipoak’andro,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mba horaisiny ny sisin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hakopakopany hiala ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary hiova tahaka ny tanimanga tombohin-kase ny endriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiseho tahaka ny lamba misoratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fitafiana.
    marker-yv: yv-n
  - type: text
    text: ' ny tarehiny,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary hosakanana ny fahazavan’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho tapaka ny sandry naingaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moa efa niditra hatrany amin’ny loharanon-dranomasina va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa nandehandeha tany amin’ny fanambanin’ny lalina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moa efa naharihary taminao va ny vavahadin’ny fahafatesana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa hitanao va ny vavahadin’ny aloky ny fahafatesana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moa efa voadinikao ny hatrany amin’ny fahalalahan’ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambarao ary, raha fantatrao izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aiza ary no làlana ho any amin’ny fonenan’ny mazava?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza no fitoeran’ny maizina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mba hitondranao izany ho amin’ny faran’ny alehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho fantatrao ny làlana ho any an-tranony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eny, fantatrao mantsy izany, satria efa teraka hianao tamin’izay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maro ny isan’ny andronao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa efa niditra tany amin’ny firaketana ny orampanala va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa hitanao va ny firaketana ny havandra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay voatahiriko ho amin’ny andro fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny andro misy ady sy tafika?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aiza moa no làlana izarazarana ny mazava
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ielezan’ny rivotra avy any atsinanana ho etỳ ambonin’ny tany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Iza moa no nihady làlan-drano ho an’ny ranonorana mirotsaka be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy làlan-kaleha ho an’ny helatry ny kotrokorana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Handatsaka ranonorana ambonin’ny tany izay tsy itoeran’olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’ny efitra tsy misy mponina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mba hahavonto ny efitra sy ny tany foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampitsimoka ny ahitra vao mitsiry?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Manan-dray va ny ranonorana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza kosa no miteraka ny ranon’ando?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kibon’iza moa no nihavian’ny ranomandry?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vongam-panala avy amin’ny lanitra, iza no niteraka azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tonga mafy toy ny vato ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitambatra ny fanambonin’ny lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mahavòna ny kofehin’ny Ikotokelimiadilaona va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahavaha ny Telonohorefy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mahavoaka ny Mazarota
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Anaran-kitana; ny Zôdiaka (?).
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fotoany va hianao?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahatondra ny Bera mbamin’ny zanany va hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fantatrao va ny làlan’ny lanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manendry ny fanapahan’ireny ny tany va hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mahasandratra ny feonao ho amin’ny rahona matevina va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanafotra anao ny rano mandriaka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Mahay mandefa ny helatra va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka ho avy ireo hilaza aminao hoe: Indreto izahay?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Iza moa no nanao ny rahona matevina ho fitoeram-pahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary irerỳ miseho erỳ an-danitra ho fampisehoana ny fahalalana?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Iza no nanisy fahalalana ao am-pon’ny olona? Ary iza no nanome fahalalana ho ao an-tsaina?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Iza moa no manam-pahendrena mahisa ny rahom-potsy manify?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no mahatankina ny fitoeran-dranon’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.37 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: siny hoditra.
    marker-yv: yv-n
  - type: text
    text: ' ny lanitra,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Hitambaran’ny vovoka ho dilatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hivonganany ho bainga?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mahay mihaza toha ho an’ny liom-bavy va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mahafaka ny fahalianan’ny liona tanora,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Raha mamitsaka ao amin’ny fitoerany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manotrika ao amin’ny kirihitrala?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Iza moa no manome hanina ny goaika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mitaraina amin’Andriamanitra ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mirenireny tsy mahita hanina?
