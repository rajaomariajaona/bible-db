document_id: JOB.38,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny navalin’i Jehovah an’i Joba.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY teo anatin’ny tafio-drivotra Jehovah dia namaly an’i Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nandidy ny ho fetrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nanisy hidy sy varavarana
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka nanao hoe: Hatreto no azonao androsoana ka tsy hihoatra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary eto no hampijanonana ny fisafoaky ny onjanao?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatrizay niainanao moa mba efa nandidy ny maraina va hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa notoroanao ny fitoerany va ny fipoak’andro,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba horaisiny ny sisin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hakopakopany hiala ny ratsy fanahy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hiova tahaka ny tanimanga tombohin-kase ny endriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hiseho tahaka ny lamba misoratra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fitafiana.
      marker-yv: yv-n
    - type: text
      text: ' ny tarehiny,'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hosakanana ny fahazavan’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho tapaka ny sandry naingaina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa efa niditra hatrany amin’ny loharanon-dranomasina va hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nandehandeha tany amin’ny fanambanin’ny lalina?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa efa naharihary taminao va ny vavahadin’ny fahafatesana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa hitanao va ny vavahadin’ny aloky ny fahafatesana?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa efa voadinikao ny hatrany amin’ny fahalalahan’ny tany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambarao ary, raha fantatrao izany rehetra izany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ary no làlana ho any amin’ny fonenan’ny mazava?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aiza no fitoeran’ny maizina?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa izato manao izay hahamaizina ny fisainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny teny tsy misy fahalalana?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hitondranao izany ho amin’ny faran’ny alehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho fantatrao ny làlana ho any an-tranony.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, fantatrao mantsy izany, satria efa teraka hianao tamin’izay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary maro ny isan’ny andronao!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa efa niditra tany amin’ny firaketana ny orampanala va hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa hitanao va ny firaketana ny havandra,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay voatahiriko ho amin’ny andro fahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny andro misy ady sy tafika?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza moa no làlana izarazarana ny mazava
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ielezan’ny rivotra avy any atsinanana ho etỳ ambonin’ny tany?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no nihady làlan-drano ho an’ny ranonorana mirotsaka be,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy làlan-kaleha ho an’ny helatry ny kotrokorana,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handatsaka ranonorana ambonin’ny tany izay tsy itoeran’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any amin’ny efitra tsy misy mponina,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hahavonto ny efitra sy ny tany foana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampitsimoka ny ahitra vao mitsiry?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manan-dray va ny ranonorana?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza kosa no miteraka ny ranon’ando?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kibon’iza moa no nihavian’ny ranomandry?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vongam-panala avy amin’ny lanitra, iza no niteraka azy?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misikina ary tahaka ny lehilahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hanadina anao Aho, ka valio:–
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga mafy toy ny vato ny rano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitambatra ny fanambonin’ny lalina.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahavòna ny kofehin’ny Ikotokelimiadilaona va hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahavaha ny Telonohorefy?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahavoaka ny Mazarota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Anaran-kitana; ny Zôdiaka (?).
      marker-yv: yv-n
    - type: text
      text: ' amin’ny fotoany va hianao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahatondra ny Bera mbamin’ny zanany va hianao?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatrao va ny làlan’ny lanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manendry ny fanapahan’ireny ny tany va hianao?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahasandratra ny feonao ho amin’ny rahona matevina va hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hanafotra anao ny rano mandriaka?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahay mandefa ny helatra va hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka ho avy ireo hilaza aminao hoe: Indreto izahay?'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no nanao ny rahona matevina ho fitoeram-pahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary irerỳ miseho erỳ an-danitra ho fampisehoana ny fahalalana?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Iza no nanisy fahalalana ao am-pon’ny olona? Ary iza no nanome fahalalana ho ao an-tsaina?
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no manam-pahendrena mahisa ny rahom-potsy manify?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no mahatankina ny fitoeran-dranon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: siny hoditra.
      marker-yv: yv-n
    - type: text
      text: ' ny lanitra,'
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitambaran’ny vovoka ho dilatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hivonganany ho bainga?
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahay mihaza toha ho an’ny liom-bavy va hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mahafaka ny fahalianan’ny liona tanora,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taiza ary hianao, fony Aho nanorina ny tany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambarao, raha hainao.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mamitsaka ao amin’ny fitoerany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manotrika ao amin’ny kirihitrala?
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no manome hanina ny goaika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitaraina amin’Andriamanitra ny zanany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mirenireny tsy mahita hanina?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza ary no nandidy izay ho refiny, raha fantatrao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no nanenjana ny famolaina teo aminy?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo amin’inona no nanorenana ny vodi-andriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no nametraka ny vato fehizorony,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha niara-nihira ny kintan’ny maraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nihoby avokoa ireo zanak’Andriamanitra?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: iza no
    - type: text
      text: ' nanao varavarana misakana ny ranomasina,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nibosesika nivoaka avy tany am-bohoka izy,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nanao ny rahona ho fitafiany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny aizim-pito ho fonony,
