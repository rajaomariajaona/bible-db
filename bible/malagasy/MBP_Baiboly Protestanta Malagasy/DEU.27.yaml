document_id: DEU.27
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny hanaovana tsangam-bato hanoratana ny lalàna, sy ny hanaovana ny tso-drano sy ny fanozonana ao an-tendrombohitra Gerizima sy Ebala.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Mosesy sy ny loholon’ny Isiraely dia nandidy ny vahoaka ka nanao hoe: Tandremo ny lalàna rehetra izay andidiako anao anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary amin’ny andro izay hitànareo an’i Jordana ho any amin’ny tany izay omen’i Jehovah Andriamanitrao anao, dia manangàna vato lehibe ho anao, ka lalory sokay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia soraty eo aminy ny teny rehetra amin’ity lalàna ity, rehefa tafita hianao mba hiditra ao amin’ny tany izay omen’i Jehovah Andriamanitrao anao, dia tany tondra-dronono sy tantely, araka izay nolazain’i Jehovah, Andriamanitry ny razanao, taminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa tafita an’i Jordana hianareo, dia atsangano ao an-tendrombohitra Ebala ireo vato ireo, izay nandidiako anareo andro-any, ka lalory sokay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary manorena alitara ao ho an’i Jehovah Andriamanitrao; vato no hataonao alitara, nefa aza pehim-by izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vato tsy voapaika no hataonao alitaran’i Jehovah Andriamanitrao; ka manatera fanatitra odorana eo amboniny ho an’i Jehovah Andriamanitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary manatera koa fanati-pihavanana, ka mihinàna eo sy mifalia eo anatrehan’i Jehovah Andriamanitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary soraty amin’ireo vato ireo ny teny rehetra amin’ity lalàna ity, ka ataovy velona tsara ny soratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niteny tamin’ny Isiraely rehetra Mosesy sy ireo Levita mpisorona ka nanao hoe: Mangìna, ka mihainoa, ry Isiraely ô: Andro-any no efa tonga firenen’i Jehovah Andriamanitrao hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa henoy ny feon’i Jehovah Andriamanitrao, ary araho ny didiny sy ny lalàny, izay andidiako anao anio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nandidy ny vahoaka tamin’izany andro izany Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireto no hijanona eo an-tendrombohitra Gerizima hitso-drano ny vahoaka, rehefa tafita an’i Jordana hianareo: dia ny Simeona sy ny Levy sy ny Joda sy ny Isakara sy ny Josefa ary ny Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ireto kosa no hijanona eo an-tendrombohitra Ebala hanozona: dia ny Robena sy ny Gada sy ny Asera sy ny Zebolona sy ny Dana ary ny Naftaly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hiteny ny Levita ka hanao amin’ny Isiraely rehetra amin’ny feo mahery hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hozonina ny olona izay manao sarin-javatra voasokitra na sarin-javatra an-idina, izay fahavetavetana eo imason’i Jehovah, asan’ny tànan’ny mahay tao-zavatra, ka mametraka azy ao amin’ny takona. Dia hamaly ny vahoaka rehetra ka hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hozonina izay manao tsinontsinona ny rainy na ny reniny. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hozonina izay mamindra ny fari-tanin’ny namany. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hozonina izay mampivily làlana ny jamba. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hozonina izay manao fitsarana miangatra amin’ny vahiny sy ny kamboty ary ny mpitondratena. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hozonina izay mandry amin’ny vadin-drainy, fa mandry amin’izay nandrian-drainy izy. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hozonina izay mandry amin’ny biby. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hozonina izay mandry amin’ny anabaviny, dia ny zanakavavin-drainy, na ny zanakavavin-dreniny. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hozonina izay mandry amin’ny rafozani-vavy. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hozonina izay mamely ny namany ao amin’ny takona. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hozonina izay mandray kolikoly hahafaty olo-marina. Ary ny vahoaka rehetra hanao hoe: Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hozonina izay tsy mankatò ny tenin’ity lalàna ity. Ary ny vahoaka rehetra hanao hoe: Amena.'
