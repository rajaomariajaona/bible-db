document_id: 1SA.18,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary rehefa nitsahatra niteny tamin’i Saoly izy, dia raiki-pitia tamin’i Davida ny fanahin’i Jonatana, ka tia azy hoatra ny tenany mihitsy izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nony ampitson’iny dia nisy fanahy ratsy avy tany amin’Andriamanitra nilatsaka tamin’i Saoly, ka dia maola tao an-trano izy; ary Davida nitendry lokanga tamin’ny tànany tahaka ny fanaony isan-andro ihany, ary nisy lefona teny an-tànan’i Saoly. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia natorak’i Saoly ny lefona; fa hoy izy: Hamely an’i Davida aho, ka hataoko miboroaka mihatra amin’ny rindrina. Fa Davida nisoroka indroa teo anatrehany.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Saoly natahotra an’i Davida, satria Jehovah nomba azy, fa Saoly kosa efa nialany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa dia nesorin’i Saoly tsy ho eo aminy Davida, ary nataony mpifehy arivo, dia nitarika ny olona nivoaka sy niditra izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary Davida dia hita fa hendry tamin’izay rehetra nataony, ary Jehovah nomba azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nony hitan’i Saoly fa hendry dia hendry Davida, dia natahotra azy izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa ny Isiraely sy ny Joda rehetra kosa tia an’i Davida, satria nitondra azy nivoaka sy niditra izy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary hoy Saoly tamin’i Davida: Indro homeko ho vadinao Meraba vavimatoako, koa mahereza ho ahy anefa hianao, ary miadia ny adin’i Jehovah. (Fa hoy Saoly: Aoka tsy ny tànako no hamely azy, fa aoka ny tànan’ny Filistina no hamely azy.) '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa hoy Davida tamin’i Saoly: Zinona moa aho, ary manao ahoana no toetry ny mpianakavin’ny raiko ao amin’ny Isiraely, no ho vinanton’ny mpanjaka aho? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Kanjo nony tamin’ny andro tokony ho namoahana an’i Meraba, zanakavavin’i Saoly, ho vadin’i Davida, dia nomena ho vadin’i Adriela Meholatita izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Saoly nandray azy tamin’izany andro izany ka tsy namela azy hody tany amin’ny tranon-drainy intsony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa Mikala, zanakavavin’i Saoly kosa tia an’i Davida; ary nisy nanambara izany tamin’i Saoly, ka sitrak’i Saoly izany. (
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa hoy Saoly: Homeko azy izy, mba ho fandrika aminy ka hamelezan’ny tànan’ny Filistina azy.) Dia hoy Saoly tamin’i Davida: Fanindroan’ny maha-vinantoko anao izao.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izy roa vavy izao dia samy maha-vinantoko anao avokoa.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary Saoly nandidy ny mpanompony hoe: Miresaha mangingina amin’i Davida, ka ataovy hoe: Indro, tian’ny mpanjaka hianao, ary ny mpanompony rehetra tia anao; ka dia maneke ihany ho vinanton’ny mpanjaka hianao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny mpanompon’i Saoly nilaza izany teny izany tamin’i Davida. Fa hoy Davida: Moa ataonareo ho zavatra kely izany ho vinanton’ny mpanjaka? Tsy hitanareo va fa izaho dia olona malahelo sady tsy manan-daza? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ny mpanompon’i Saoly nilaza taminy hoe: Izany no navalin’i Davida. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy Saoly: Izao no holazainareo amin’i Davida: Ny mpanjaka tsy mila harena be ho vodiondry, fa ny mariky ny fahafatesan’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: saron-tsotsoka.
      marker-yv: yv-n
    - type: text
      text: ' ny Filistina zato lahy ihany, mba ho famaliana ny fahavalony. Kanjo hevitr’i Saoly hahafaty an’i Davida amin’ny tànan’ny Filistina izany.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary rehefa nambaran’ny mpanompon’i Saoly tamin’i Davida izany teny izany, dia sitrak’i Davida ny ho vinanton’ny mpanjaka. Ary raha tsy mbola tapitra ny fetr’andro, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: dia niainga Davida, ary nandeha izy sy ny olony ka nahafaty Filistina roan-jato, lahy ary Davida nitondra ny mariky ny fahafatesany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izy roa vavy izao samy maha-vinantoko anao avokoa.
      marker-yv: yv-n
    - type: text
      text: ' ka nanisa azy teo anatrehan’ny mpanjaka mba hahavinanton’ny mpanjaka azy. Dia nomen’i Saoly ho vadin’i Davida Mikala zanani-vavy.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary Saoly nahita sy nahalala fa Jehovah nomba an’i Davida; ary Mikala zanani-vavy tia azy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary dia vao mainka natahotra an’i Davida Saoly; ka dia tonga fahavalon’i Davida mandrakariva izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary Davida sy Jonatana nanao fanekena noho ny fitiavan’i Jonatana azy toy ny tenany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary ireo andrianan’ny Filistina dia nanafika; ary isaky ny nanafika izy, dia Davida no hita fa hendry noho ny mpanompon’i Saoly rehetra, ka dia nisandratra ny anarany,
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary nesorin’i Jonatana ny akanjony ivelany izay teny aminy ka nomeny an’i Davida mbamin’ny akanjo fiadiany sy ny sabany sy ny tsipìkany ary ny fehin-kibony koa aza.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary Davida nanafika ka hita fa hendry tamin’izay rehetra nanirahan’i Saoly azy; ka dia nataon’i Saoly mpifehy ny miaramila izy sady nankasitrahan’ny vahoaka rehetra sy ny mpanompon’i Saoly koa.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary nony tonga ny olona tamin’ny niverenan’i Davida avy namono ilay Filistina, dia nivoaka ny vehivavy avy tamin’ny tanànan’ny Isiraely rehetra ka nihira sy nandihy nitsena an’i Saoly mpanjaka tamin’ny ampongatapaka sy ny fifaliana ary ny kipantsona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: varahina telo zoro.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny vehivavy mpandihy dia nihira hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saoly nahafaty arivoarivo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Davida nahafaty alinalina.
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia tezitra indrindra Saoly, fa tsy sitrany izany teny izany, ka hoy izy: Ny an’i Davida nataony alinalina lahy, fa ny ahy kosa nataony arivoarivo ihany; koa ny fanjakana ihany no sisa tsy mbola azony. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary Saoly hatramin’izany andro izany dia nangarika an’i Davida.
