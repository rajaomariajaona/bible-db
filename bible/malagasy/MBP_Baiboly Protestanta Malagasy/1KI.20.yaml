document_id: 1KI.20
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandresen’i Ahaba indroa an’i Beni-hadada, mpanjakan’i Syria.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY Beni-hadada, mpanjakan’i Syria, namory ny miaramilany rehetra, koa mpanjaka roa amby telo-polo mbamin’ny soavaly sy ny kalesy no niaraka taminy; dia niakatra izy ka nanao fahirano an’i Samaria ary namely azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nandefa iraka ho any amin’i Ahaba, mpanjakan’ny Isiraely, tany an-tanàna izy '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hanao aminy hoe: Izao no lazain’i Beni-hadada: Ny volafotsinao sy ny volamenanao dia ahy; ary ny vadinao aman-janakao, na dia ny tsara tarehy indrindra aza, dia ahy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny mpanjakan’ny Isiraely namaly hoe: Eny, marina ny teninao, ry mpanjaka tompoko ô: anao aho sy izay rehetra ananako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niverina indray ny iraka ka nanao hoe: Izao no tenin’i Beni-hadada: Naniraka taty aminao aho nanao hoe: Ny volafotsinao sy ny volamenanao ary ny vadinao aman-janakao dia omeo ahy; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: koa raha maniraka ny mpanompoko ho atỳ aminao aho rahampitso toy izao, ka savany ny tranonao sy ny tranon’ny mpanomponao, dia horaisin’ny tànany sy ho entiny avokoa izay rehetra mahafinaritra ny masonao na inona na inona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny mpanjakan’ny Isiraely nampaka ny loholona rehetra amin’ny tany ka nanao hoe: Masìna hianareo, fantaro sy izahao fa mila sotasota mihitsy ilehiny; fa efa naniraka tatỳ amiko izy haka ny vadiko aman-janako mbamin’ny volafotsiko sy ny volamenako ka tsy nolaviko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ny loholona sy ny vahoaka rehetra taminy: Aza mihaino na manaiky.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ka dia hoy Ahaba tamin’ny irak’i Beni-hadada: Lazao amin’ny mpanjaka tompoko hoe: Izay rehetra nanirahanao tany amiko mpanomponao tamin’ny voalohany dia hataoko; fa izao zavatra izao kosa tsy azoko ekena. Dia lasa ireo iraka ka nitondra teny niverina tany amin’i Beni-hadada indray; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary izy naniraka tany aminy ka nanao hoe: Hataon’ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha ho ampy eran-tànan-ila akory ny vovok’i Samaria amin’ny isan-olona manaraka ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpanjakan’ny Isiraely namaly hoe: Izao no holazainao aminy: Aoka izay vao misikina tsy mba hirehareha tahaka ny efa mamaha.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa ren’i Beni-hadada izany teny izany, raha mbola nisotro tao an-trano rantsan-kazo izy sy ireo mpanjaka, dia hoy izy tamin’ny mpanompony: Milahara hianareo. Ary dia nilahatra hamely ny tanàna izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary, indro, nisy mpaminany nanatona an’i Ahaba, mpanjakan’ny Isiraely, ka nanao hoe: Izao no lazain’i Jehovah: Hitanao va ireo olona maro be rehetra ireo? Indro, hatolotro eo an-tànanao ireo anio; dia ho fantatrao fa Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Ahaba: Amin’iza? Ary hoy izy: Izao no lazain’i Jehovah: Amin’ny zatovon’ny komandin’ny fanapahana isan-tokony. Dia hoy izy: Iza ary no hamely aloha? Hianao ihany, hoy izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nandamina ny zatovon’ny komandin’ny fanapahana isan-tokony izy, ka roa amby telo-polo amby roan-jato no isany; ary manarakaraka izany, dia nandamina ny olona rehetra izy, dia ny Zanak’Isiraely rehetra, ka fito arivo no isany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nivoaka izy nony nitataovovonana ny andro. Fa Beni-hadada nisotro ho mamo tao an-trano rantsan-kazo, dia izy sy ireo mpanjaka roa amby telo-polo izay nanampy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny zatovon’ny komandin’ny fanapahana isan-tokony nivoaka voalohany; ary Beni-hadada naniraka, ka dia nilazana hoe: Misy olona efa nivoaka avy any Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy: Ataovy sambo-belona izy, na ho avy hihavana, na ho avy hiady.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nivoaka avy tao an-tanàna ireo zatovon’ny komandin’ny fanapahana isan-tokony ireo sy ny miaramila izay nanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary samy nahafaty olona iray avy izy rehetra; dia vaky nandositra ny Syriana, ka nenjehin’ny Isiraely; ary Beni-hadada, mpanjakan’i Syria, nandositra an-tsoavaly mbamin’ny mpitaingin-tsoavaly sasany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny mpanjakan’ny Isiraely nivoaka, dia namely ny an-tsoavaly sy ny an-kalesy, ka nahafatesany be dia be ny Syriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ilay mpaminany nankany amin’ny mpanjakan’ny Isiraely ka nanao taminy hoe: Mahereza tsara, ary fantaro sy izahao izay ataonao; fa raha miherina ny taona, dia hiakatra indray ny mpanjakan’i Syria hiady aminao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy ny mpanompon’ny mpanjakan’i Syria taminy: Andriamanitry ny havoana ny Andriamanitr’izy ireo, koa izany no nahareseny antsika; fa aoka ange isika hiady aminy eny an-tany lemaka, raha tsy ho resintsika izy e! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa izao zavatra izao no ataovy: Esory ny mpanjaka samy hiala amin’ny toerany avy, ka asio mpanapaka hisolo azy; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ary hianao kosa dia makà miaramila ho anao toraka ny miaramilanao izay maty teo ary soavaly ho solon’ny soavaly sy kalesy ho solon’ny kalesy; ary hiady aminy eny an-tany lemaka isika, ka dia hahery noho izy tokoa. Ary nanaiky ny tenin’ireo izy, ka dia nataony izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony niherina ny taona, dia nandamina ny Syriana Beni-hadada ka niakatra nankany Afeka hiady amin’ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ny Zanak’Isiraely rehetra kosa dia nalamina sy novatsiana, ka dia lasa hiady aminy; ary ny Zanak’Isiraely nitoby tandrifiny toy ny osy andiany kely roa toko; fa ny Syriana kosa nanenika ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nanatona ilay lehilahin’Andriamanitra ka nilaza tamin’ny mpanjakan’ny Isiraely hoe: Izao no lazain’i Jehovah: Satria ny Syriana nilaza hoe: Andriamanitry ny havoana ihany Jehovah, fa tsy mba Andriamanitry ny tany lemaka, dia hatolotro eo an-tànanao ireo olona maro be rehetra ireo, ka dia ho fantatrao fa Izaho no Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nitoby mifanandrify hafitoana izy roa tonta. Ary tamin’ny andro fahafito, dia raikitra ny ady; ary ny Zanak’Isiraely nahafaty ny miaramila an-tongotra iray hetsy tamin’ny Syriana indray andro. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa ny sisa dia nandositra nankany an-tanàna Afeka; nefa nianjeran’ny mànda ireny olona sisa ireny, ary fito arivo amby roa alina no isany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary Beni-hadada nandositra nankany an-tanàna ka niditra tao amin’ny efi-trano anatiny.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nitsofotsofoka amin’ny efi-trano.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa hoy ny mpanompony taminy: Indro, efa renay fa mpanjaka mamindra fo ireo mpanjakan’ny taranak’Isiraely. Koa masìna hianao, avelao hosikinanay lamba fisaonana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lamba malailay.
    marker-yv: yv-n
  - type: text
    text: ' ny valahanay, ary hasianay mahazaka ny lohanay, dia hankany amin’ny mpanjakan’ny Isiraely izahay; angamba hovelominy ny ainao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia nosikinany lamba fisaonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Heb.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lamba malailay.
    marker-yv: yv-n
  - type: text
    text: ' ny valahany, ary nasiany mahazaka ny lohany, dia nankany amin’ny mpanjakan’ny Isiraely izy ka nanao hoe: Izao no fitenin’i Beni-hadada mpanomponao: Avelao mba ho velona ny aiko. Ary hoy izy: Moa mbola velona ihany va izy? Rahalahiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary nataon’ireo olona ireo fa zara ho azy izany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanao sikidy.
    marker-yv: yv-n
  - type: text
    text: ' dia namonjy nanantitra ny teniny izy ka nanao hoe: Rahalahinao hoe Beni-hadada. Dia hoy izy: Mandehana, alao izy. Ary Beni-hadada nankany aminy, dia nasainy niakatra ho eo amin’ny kalesiny. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Beni-hadada taminy: Ny tanàna izay nalain’ny raiko tamin’ny rainao dia hampodiko; ary manaova làlambe ho anao any Damaskosy, tahaka ny nataon’ny raiko tany Samaria. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ary hoy Ahaba:'
  - type: text
    text: ' Halefako hianao amin’izany fanekena izany. Dia nanao fanekena taminy izy ka nandefa azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nisy lehilahy anankiray, zanaky ny mpaminany, niteny tamin’ny namany araka ny tenin’i Jehovah ka nanao hoe: Masìna hianao, asio aho. Fa tsy nety namely azy ilay lehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia hoy izy taminy: Satria hianao tsy nihaino ny feon’i Jehovah, indro, fa raha vao miala amiko eto hianao, dia hisy liona hamono anao. Ary raha vao niala teo aminy izy, dia hitan’ny liona ka novonoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nahita lehilahy hafa indray ralehilahy ka nanao hoe: Masìna hianao, asio aho. Ary ilay lehilahy namely azy, dia voa izy ka naratra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia lasa ilay mpaminany ka niandry ny mpanjaka teny an-dàlana, ary nasiany fehi-loha tamin’ny handriny tsy hahafantarany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary nony nandalo ny mpanjaka, dia nitaraina taminy ilay mpaminany ka nanao hoe: Izaho mpanomponao nankany anatin’ny ady; ary, indro, nisy lehilahy anankiray nivily ka nitondra lehilahy tany amiko sady nanao hoe: Hazòny ity lehilahy ity; fa raha tàhiny lasa izy, dia ny ainao no hisolo ny ainy, na handoa talenta volafotsy iray hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Kanjo nony nikeninkenina tetsy sy teroa ny mpanomponao, dia lasa izy. Ary hoy ny mpanjakan’ny Isiraely taminy: Ho tahaka izany ihany no hitsarana anao; ny tenanao no nilaza izany. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary nesoriny haingana ilay fehi-loha tamin’ny handriny; ka dia fantatry ny mpanjakan’ny Isiraely fa isan’ny mpaminany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia hoy izy taminy: Izao no lazain’i Jehovah: Satria nalefanao niala teo an-tànanao ny lehilahy izay nasaiko hovonoina'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.42 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nataoko herema.
    marker-yv: yv-n
  - type: text
    text: ' tokoa, dia ny ainao no hisolo ny ainy, ary ny olonao no hisolo ny olony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary ny mpanjakan’ny Isiraely nandeha ho any an-tranony sady nalahelo no sosotra, dia tonga tany Samaria.
