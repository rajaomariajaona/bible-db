document_id: ISA.61,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny Voahosotr’i Jehovah, Izay hanavotra ny Isiraely sy hampody ny voninahiny.
  - type: text
    content: NY Fanahin’i Jehovah Tompo no ato amiko,
  - type: text
    content: Satria Jehovah efa nanosotra Ahy hitory teny soa mahafaly amin’ny mpandefitra,
  - type: text
    content: Efa naniraka Ahy hahasitrana
  - type: note
    content: Heb. hamehy.
  - type: text
    content: ' ny torotoro fo Izy,'
  - type: text
    content: Ary hitory fanafahana amin’ny babo
  - type: text
    content: Sy hamoaka ny ao an-trano-maizina ho amin’ny mazava,
  '10':
  - type: text
    content: Hifaly dia hifaly amin’i Jehovah aho,
  - type: text
    content: Ny fanahiko ho ravoravo amin’Andriamanitro;
  - type: text
    content: Fa notafiany fitafiana famonjena aho,
  - type: text
    content: Ary nakanjoiny akanjo fahamarinana,
  - type: text
    content: Toy ny mpampakatra misatroka hamama tahaka ny mpisorona,
  - type: text
    content: Ary toy ny ampakarina miravaka ny firàvany.
  '11':
  - type: text
    content: Fa tahaka ny tany mampitsimoka izay ao aminy,
  - type: text
    content: Ary tahaka ny tanimboly mampaniry izay nafafy tao aminy,
  - type: text
    content: Dia toy izany no hampisehoan’i Jehovah Tompo fahamarinana sy fiderana
  - type: text
    content: Eo anatrehan’ny firenena rehetra.
  '2':
  - type: text
    content: Hitory taona ankasitrahan’i Jehovah
  - type: text
    content: Sy andro famalian’Andriamanitsika,
  - type: text
    content: Hampionona ny malahelo rehetra,
  '3':
  - type: text
    content: Hanolotra ho an’ny malahelo ao Ziona,–
  - type: text
    content: Eny, hanome azy namama ho solon’ny lavenona,
  - type: text
    content: Sy diloilo fifaliana ho solon’ny fahalahelovana,
  - type: text
    content: Ary fitafiana fiderana ho solon’ny fanahy reradreraka,
  - type: text
    content: Mba hanaovana azy hoe Hazon’ny fahamarinana,
  - type: text
    content: Nambolen’i Jehovah ho fampisehoam-boninahitra.
  '4':
  - type: text
    content: Koa hatsangana ny efa rava hatry ny fony fahagola,
  - type: text
    content: Ary hamboarina ny efa lao hatramin’ny fahiny,
  - type: text
    content: Dia hohavaozina indray ny tanàna rava,
  - type: text
    content: Izay efa lao hatramin’ny taranaka lasa ela.
  '5':
  - type: text
    content: Ary ny vahiny honina ao ka hiandry ny ondry aman-osinareo,
  - type: text
    content: Ary ny hafa firenena ho mpiasa tany sy ho mpamboatra tanimboaloboka ho anareo,
  '6':
  - type: text
    content: Fa hianareo kosa no hatao hoe mpisoron’i Jehovah,
  - type: text
    content: Mpanao fanompoam-pivavahana ho an’Andriamanitsika no hilazana anareo;
  - type: text
    content: Ho lasanareo
  - type: note
    content: Heb. Hohaninareo.
  - type: text
    content: ' ny haren’ny firenena,'
  - type: text
    content: Ary handimby voninahitra azy hianareo.
  - type: note
    content: 'Na: Ary ho reharehanareo ny voninahiny.'
  '7':
  - type: text
    content: Ny henatrareo hosoloana avy roa heny,
  - type: text
    content: Ary ny tondromaso hosoloana hoby amin’ny anjara-lovany;
  - type: text
    content: Ary noho izany dia hahazo indroa heny ao amin’ny taniny izy,
  - type: text
    content: Fifaliana mandrakizay no ho azy.
  '8':
  - type: text
    content: Fa Izaho Jehovah dia tia rariny;
  - type: text
    content: Halako ny fandrombahana amin’ny faharatsiana;
  - type: note
    content: 'Na: Halako ny halatra atao fanatitra odorana.'
  - type: text
    content: Homeko ny valin’asany amin’ny fahamarinana izy,
  - type: text
    content: Ary fanekena mandrakizay no hataoko aminy.
  '9':
  - type: text
    content: Ny taranany ho fantatra any amin’ny jentilisa
  - type: text
    content: Ary ny terany any amin’ny firenena;
  - type: text
    content: Izay rehetra mahita azy dia hahafantatra azy
  - type: text
    content: Ho taranaka notahin’i Jehovah.
