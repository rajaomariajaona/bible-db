document_id: ISA.61
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny Voahosotr’i Jehovah, Izay hanavotra ny Isiraely sy hampody ny voninahiny.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY Fanahin’i Jehovah Tompo no ato amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria Jehovah efa nanosotra Ahy hitory teny soa mahafaly amin’ny mpandefitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa naniraka Ahy hahasitrana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hamehy.
    marker-yv: yv-n
  - type: text
    text: ' ny torotoro fo Izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitory fanafahana amin’ny babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hamoaka ny ao an-trano-maizina ho amin’ny mazava,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hitory taona ankasitrahan’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy andro famalian’Andriamanitsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampionona ny malahelo rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hanolotra ho an’ny malahelo ao Ziona,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hanome azy namama ho solon’ny lavenona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy diloilo fifaliana ho solon’ny fahalahelovana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fitafiana fiderana ho solon’ny fanahy reradreraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanaovana azy hoe Hazon’ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nambolen’i Jehovah ho fampisehoam-boninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa hatsangana ny efa rava hatry ny fony fahagola,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamboarina ny efa lao hatramin’ny fahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hohavaozina indray ny tanàna rava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay efa lao hatramin’ny taranaka lasa ela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny vahiny honina ao ka hiandry ny ondry aman-osinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hafa firenena ho mpiasa tany sy ho mpamboatra tanimboaloboka ho anareo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa hianareo kosa no hatao hoe mpisoron’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanao fanompoam-pivavahana ho an’Andriamanitsika no hilazana anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lasanareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hohaninareo.
    marker-yv: yv-n
  - type: text
    text: ' ny haren’ny firenena,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary handimby voninahitra azy hianareo.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary ho reharehanareo ny voninahiny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny henatrareo hosoloana avy roa heny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tondromaso hosoloana hoby amin’ny anjara-lovany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary noho izany dia hahazo indroa heny ao amin’ny taniny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fifaliana mandrakizay no ho azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa Izaho Jehovah dia tia rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Halako ny fandrombahana amin’ny faharatsiana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Halako ny halatra atao fanatitra odorana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Homeko ny valin’asany amin’ny fahamarinana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fanekena mandrakizay no hataoko aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny taranany ho fantatra any amin’ny jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny terany any amin’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay rehetra mahita azy dia hahafantatra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho taranaka notahin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hifaly dia hifaly amin’i Jehovah aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanahiko ho ravoravo amin’Andriamanitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa notafiany fitafiana famonjena aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nakanjoiny akanjo fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny mpampakatra misatroka hamama tahaka ny mpisorona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny ampakarina miravaka ny firàvany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tahaka ny tany mampitsimoka izay ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny tanimboly mampaniry izay nafafy tao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany no hampisehoan’i Jehovah Tompo fahamarinana sy fiderana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo anatrehan’ny firenena rehetra.
