document_id: PSA.141,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarainana ataon’izay alaim-panahy sy enjehina.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, mitaraina aminao aho, faingana hankatỳ amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy ny feoko amin’ny fiantsoako Anao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aoka ny ratsy fanahy ho latsaka eo anatin’ny fandriny ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa handalo fotsiny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aoka hankeo anatrehanao mandrakariva toy ny ditin-kazo manitra ny fivavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho toy ny fanatitra hariva ny fanandratako ny tànako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jehovah ô, asio fiambenana eo anoloan’ny vavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hambeno ny varavaran’ny molotro.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Aza avela hirona ho amin’ny zava-dratsy ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiray raharaha amin’ny olona mpanao ratsy hanao izay asa tsy mety;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy hihinana ny zava-piny aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aoka ny marina hamely ahy amin’ny fahalemen-panahy ka hananatra ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa diloilo ahosotra ny lohako izany, ary aoka tsy handa izany ny lohako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny hany heriko dia ny mbola hivavaka ihany noho ny faharatsian’ireny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Havarina amin’ny hantsam-bato ny mpitsara azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hankasitraka ny teniko ny olona.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Toy ny fiasa sy ny fihevo ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No nanelezana ny taolanay teo am-bavan’ny fiainan-tsi-hita.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '141.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa Hianao no andrandrain’ny masoko, Jehovah Tompo ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no ialofako, aza mandatsaka ny aiko.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Arovy aho amin’ny fandrika amandrihany ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny tadivavaran’ny mpanao ratsy.
