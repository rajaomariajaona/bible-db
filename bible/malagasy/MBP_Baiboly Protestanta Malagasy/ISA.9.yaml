document_id: ISA.9,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny olona izay mandeha amin’ny maizina
  - type: text
    content: Dia mahita mazava lehibe;
  - type: text
    content: Izay mitoetra amin’ny tany aloky ny fahafatesana
  - type: text
    content: No iposahan’ny mazava.
  '10':
  - type: text
    content: Ary Jehovah manandratra ny rafilahin-dRezina hihoatra azy
  - type: text
    content: Ary mamporisika ny fahavalony,
  '11':
  - type: text
    content: Dia ny Syriana avy any atsinanana sy ny Filistina avy any andrefana;
  - type: text
    content: Ary misanasana vava mandrapaka ny Isiraely ireo.
  - type: text
    content: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
  - type: text
    content: Fa mbola mihinjitra ihany ny tànany.
  '12':
  - type: text
    content: Fa ny olona tsy miverina amin’Izay mamely azy,
  - type: text
    content: Eny, Jehovah, Tompon’ny maro, tsy mba tadiaviny.
  '13':
  - type: text
    content: Ka dia hofongoran’i Jehovah amin’ny Isiraely indray andro monja
  - type: text
    content: Ny loha sy ny rambo, ny sampan-drofia
  - type: note
    content: palma.
  - type: text
    content: ' sy ny zozoro'
  '14':
  - type: text
    content: (Ny loholona sy ny manan-kaja no loha,
  - type: text
    content: Ary ny mpaminany izay mampianatra lainga no rambo);
  '15':
  - type: text
    content: Fa ny mpitarika ity firenena ity no tonga mpampivily azy,
  - type: text
    content: Ary izay tarihiny dia voatelina.
  '16':
  - type: text
    content: Ary noho izany dia tsy mahafaly an’i Jehovah ny zatovony,
  - type: text
    content: Ary ny kamboty sy ny mpitondratena ao aminy dia tsy iantrany;
  - type: text
    content: Fa samy mpihatsaravelatsihy
  - type: note
    content: 'Na: ratsy fanahy.'
  - type: text
    content: ' sy mpanao ratsy izy,'
  - type: text
    content: Ary ny vava rehetra mamoaka teny fahadalana.
  - type: text
    content: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
  - type: text
    content: Fa mbola mihinjitra ihany ny tànany.
  '17':
  - type: text
    content: Fa ny faharatsiana mandoro tahaka ny afo,
  - type: text
    content: Mandevona ny tsilo sy ny hery
  - type: text
    content: Ary mampirehitra ny ala mikirindro
  - type: text
    content: Ka mitambolimbolina tahaka ny setroka misavoana.
  '18':
  - type: text
    content: Noho ny fahatezeran’i Jehovah, Tompon’ny maro, dia efa maintin’ny afo ny tany,
  - type: text
    content: Ary ny olona dia tahaka ny kitay atohoka amin’ny afo;
  - type: text
    content: Tsy misy olona miantra ny rahalahiny
  '19':
  - type: text
    content: Ary mandripaka eny an-kavanana izy nefa noana ihany;
  - type: text
    content: Ary mandany eny an-kavia izy, nefa tsy voky ihany;
  - type: text
    content: Samy mihinana ny nofon-tsandriny avy izy rehetra,
  '2':
  - type: text
    content: Hamaroinao ity firenena ity,
  - type: text
    content: Ary ampitomboinao ny hafaliany;
  - type: text
    content: Mifaly eo anatrehanao izy tahaka ny hafaliana amin’ny fararano,
  - type: text
    content: Ary tahaka ny fifalin’ny olona, raha mizara babo.
  '20':
  - type: text
    content: Eny, Manase mihinana an’i Efraima, ary Efraima kosa mihinana an’i Manase,
  - type: text
    content: Ary izy roa tonta dia miara-mamely an’i Joda.
  - type: text
    content: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
  - type: text
    content: Fa mbola mihinjitra ihany ny tànany.
  '3':
  - type: text
    content: Fa ny bao fitondran-entany
  - type: text
    content: Sy ny tsorakazo nikapohana ny lamosiny,
  - type: text
    content: Izay tsorakazon’ny mpampiasa azy,
  - type: text
    content: Dia tapahinao tahaka ny tamin’ny andro namelezana ny Midiana.
  '4':
  - type: text
    content: Fa ny kiraron’izay mitrevatreva fandeha eo amin’ny fihorakorahan’ny ady
  - type: text
    content: Sy ny fitafiana mihosin-dra
  - type: text
    content: Dia samy hodoroana, eny, ho kitay hatohoka amin’ny afo izany.
  '5':
  - type: text
    content: Fa Zaza no teraka ho antsika,
  - type: text
    content: Zazalahy no omena antsika;
  - type: text
    content: Ary ny fanapahana dia eo an-tsorony,
  - type: text
    content: Ary ny anarany atao hoe
  - type: text
    content: Mahagaga, Mpanolo-tsaina,
  - type: note
    content: 'Na: Mpanolo-tsaina mahagaga.'
  - type: text
    content: ' Andriamanitra Mahery,'
  - type: text
    content: Rain’ny mandrakizay, Andrian’ny fiadanana.
  '6':
  - type: text
    content: Ny handrosoan’ny fanapahana sy ny fiadanana dia tsy hanam-pahataperana
  - type: text
    content: Eo amin’ny seza fiandrianan’i Davida sy ny fanjakany,
  - type: text
    content: Mba hampiorenana sy hampitoerana azy
  - type: text
    content: Amin’ny rariny sy ny hitsiny
  - type: text
    content: Hatramin’izao ka ho mandrakizay;
  - type: text
    content: Ny fahasaro-piaron’i Jehovah, Tompon’ny maro, no hahatanteraka izany.
  - type: heading
    content: Ny amin’ny aninjiran’i Jehovah ny tànany hampijaly ny olona noho ny ratsy nataony.
  '7':
  - type: text
    content: NY Tompo mandefa teny ho an’i Jakoba,
  - type: text
    content: Ka mihatra amin’ny Isiraely izany.
  '8':
  - type: text
    content: Ary ho fantatr’izy iray firenena izany,
  - type: text
    content: Dia Efraima sy ny mponina any Samaria,
  - type: text
    content: 'Izay miteny amin’ny fiavonavonany sy ny fireharehan’ny fony manao hoe:'
  '9':
  - type: text
    content: Biriky no efa nirodana,
  - type: text
    content: Fa vato voapaika kosa no harafitsika;
  - type: text
    content: Aviavy no voakapa,
  - type: text
    content: Fa sedera kosa no hasolontsika azy.
