document_id: ISA.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny olona izay mandeha amin’ny maizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mahita mazava lehibe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitoetra amin’ny tany aloky ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No iposahan’ny mazava.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary Jehovah manandratra ny rafilahin-dRezina hihoatra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamporisika ny fahavalony,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia ny Syriana avy any atsinanana sy ny Filistina avy any andrefana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary misanasana vava mandrapaka ny Isiraely ireo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mbola mihinjitra ihany ny tànany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa ny olona tsy miverina amin’Izay mamely azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Jehovah, Tompon’ny maro, tsy mba tadiaviny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ka dia hofongoran’i Jehovah amin’ny Isiraely indray andro monja
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny loha sy ny rambo, ny sampan-drofia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: palma.
      marker-yv: yv-n
    - type: text
      text: ' sy ny zozoro'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: (Ny loholona sy ny manan-kaja no loha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpaminany izay mampianatra lainga no rambo);
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa ny mpitarika ity firenena ity no tonga mpampivily azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay tarihiny dia voatelina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary noho izany dia tsy mahafaly an’i Jehovah ny zatovony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny kamboty sy ny mpitondratena ao aminy dia tsy iantrany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa samy mpihatsaravelatsihy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ratsy fanahy.
      marker-yv: yv-n
    - type: text
      text: ' sy mpanao ratsy izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vava rehetra mamoaka teny fahadalana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mbola mihinjitra ihany ny tànany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny faharatsiana mandoro tahaka ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandevona ny tsilo sy ny hery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mampirehitra ny ala mikirindro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitambolimbolina tahaka ny setroka misavoana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Noho ny fahatezeran’i Jehovah, Tompon’ny maro, dia efa maintin’ny afo ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olona dia tahaka ny kitay atohoka amin’ny afo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy olona miantra ny rahalahiny
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary mandripaka eny an-kavanana izy nefa noana ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandany eny an-kavia izy, nefa tsy voky ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy mihinana ny nofon-tsandriny avy izy rehetra,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hamaroinao ity firenena ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ampitomboinao ny hafaliany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifaly eo anatrehanao izy tahaka ny hafaliana amin’ny fararano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny fifalin’ny olona, raha mizara babo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Eny, Manase mihinana an’i Efraima, ary Efraima kosa mihinana an’i Manase,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izy roa tonta dia miara-mamely an’i Joda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mbola mihinjitra ihany ny tànany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ny bao fitondran-entany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny tsorakazo nikapohana ny lamosiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsorakazon’ny mpampiasa azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tapahinao tahaka ny tamin’ny andro namelezana ny Midiana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa ny kiraron’izay mitrevatreva fandeha eo amin’ny fihorakorahan’ny ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fitafiana mihosin-dra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia samy hodoroana, eny, ho kitay hatohoka amin’ny afo izany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa Zaza no teraka ho antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zazalahy no omena antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanapahana dia eo an-tsorony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anarany atao hoe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahagaga, Mpanolo-tsaina,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpanolo-tsaina mahagaga.
      marker-yv: yv-n
    - type: text
      text: ' Andriamanitra Mahery,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rain’ny mandrakizay, Andrian’ny fiadanana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny handrosoan’ny fanapahana sy ny fiadanana dia tsy hanam-pahataperana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo amin’ny seza fiandrianan’i Davida sy ny fanjakany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampiorenana sy hampitoerana azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny rariny sy ny hitsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’izao ka ho mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahasaro-piaron’i Jehovah, Tompon’ny maro, no hahatanteraka izany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny aninjiran’i Jehovah ny tànany hampijaly ny olona noho ny ratsy nataony.
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: NY Tompo mandefa teny ho an’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mihatra amin’ny Isiraely izany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary ho fantatr’izy iray firenena izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Efraima sy ny mponina any Samaria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay miteny amin’ny fiavonavonany sy ny fireharehan’ny fony manao hoe:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Biriky no efa nirodana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa vato voapaika kosa no harafitsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aviavy no voakapa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa sedera kosa no hasolontsika azy.
