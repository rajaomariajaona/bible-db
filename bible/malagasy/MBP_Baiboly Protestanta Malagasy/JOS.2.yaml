document_id: JOS.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanirahana ny mpisafo-tany roa lahy.
  - type: text
    content: 'ARY Josoa, zanak’i Nona, dia naniraka mpisafo roa lahy mangingina avy tany Sitima ka niteny taminy hoe: Mandehana, izahao ny tany, indrindra fa Jeriko.'
  - type: text
    content: 'Dia niainga izy roa lahy ary niditra tao an-tranon’ny vehivavy janga anankiray atao hoe Rahaba, ka nandry tao. '
  '10':
  - type: text
    content: 'Fa efa renay ny nanamainan’i Jehovah ny Ranomasina Mena teo anoloanareo tamin’ny nivoahanareo avy tany Egypta, sy izay nataonareo tamin’ny mpanjaka roa tamin’ny Amorita, izay tany an-dafin’i Jordana, dia Sihona sy Oga, izay novonoinareo. '
  '11':
  - type: text
    content: 'Koa nony efa renay izany, dia ketraka ny fonay, ka very hevitra avokoa izahay noho ny aminareo; fa Jehovah Andriamanitrareo, Izy no Andriamanitra any amin’ny lanitra ambony sy etỳ amin’ny tany ambany. '
  '12':
  - type: text
    content: 'Koa ankehitriny, masìna hianareo, mba ianiano amin’i Jehovah aho fa araka ny namindrako fo taminareo no mba hamindranareo fo amin’ny ankohonan’ny raiko kosa, ka omeo famantarana mahatoky aho '
  '13':
  - type: text
    content: fa hovelominareo ny raiko sy ny reniko sy ny anadahiko sy ny rahavaviko ary izay rehetra mety ho azy; dia hamonjy ny ainay tsy ho faty hianareo.
  '14':
  - type: text
    content: 'Dia hoy izy roa lahy taminy: Ny ainay no ho faty hisolo anareo, raha tsy holazainareo izao raharahanay izao; ary raha omen’i Jehovah anay ny tany, dia hamindra fo sy hanao izay marina aminao izahay.'
  '15':
  - type: text
    content: 'Dia nampidina azy tamin’ny mahazaka avy teo amin’ny varavarankely izy; fa teo amin’ny màndan’ny tanàna ny tranony, ary teo amin’ny mànda no nitoerany. '
  '16':
  - type: text
    content: 'Dia hoy izy taminy: Mandehana any an-tendrombohitra, fandrao hifanena aminareo ny mpanenjika, ka miere any hateloana mandra-piveriny; ary rehefa afaka izany, dia vao mandehana any amin’izay halehanareo.'
  '17':
  - type: text
    content: 'Ary hoy izy roa lahy taminy: Izao no tsy hanananay tsiny ny amin’izany fianianana nampianianinao anay izany: '
  '18':
  - type: text
    content: 'Indro, rehefa tonga eto amin’ny tany izahay, dia hafehinao eo amin’ny varavarankely izay nampidinanao anay io kofehy jaky io; ary ny rainao sy ny reninao sy ny anadahinao mbamin’ny ankohonan’ny rainao rehetra dia hovorinao ho ao an-tranonao; '
  '19':
  - type: text
    content: 'ary izay rehetra mivoaka eo am-baravaran’ny tranonao ho eny ivelany, dia ho eo an-dohany ihany ny rany, ary izahay tsy hanan-tsiny; fa izay rehetra mitoetra ao aminao ao an-trano, dia ho eo an-dohanay kosa ny rany, raha tàhiny misy olona maninona azy akory; '
  '2':
  - type: text
    content: 'Ary nisy nilaza tamin’ny mpanjakan’i Jeriko hoe: Injao, misy olona avy tamin’ny Zanak’Isiraely tonga atỳ izao alina izao hisafo ny tany. '
  '20':
  - type: text
    content: fa raha tàhiny hambarambaranao izao raharahanay izao, dia ho afaka amin’ny fianianana izay nampianianinao anay izahay.
  '21':
  - type: text
    content: 'Dia hoy ravehivavy: Eny ary, fa marina izany. Dia nampandehaniny izy roa lahy, ka lasa izy; ary nafehiny teo amin’ny varavarankely ilay kofehy jaky.'
  '22':
  - type: text
    content: Dia nandeha izy roa lahy ka nankany an-tendrombohitra ary nitoetra tany hateloana mandra-piverin’ny mpanenjika; ary nitady azy tamin’ny làlana rehetra ny mpanenjika, nefa tsy nahita.
  '23':
  - type: text
    content: 'Dia niverina izy roa lahy ka nidina avy tany an-tendrombohitra, dia nita ny ony ary nankany amin’i Josoa, zanak’i Nona, ka nilaza ny zavatra rehetra izay efa nihatra taminy, '
  '24':
  - type: text
    content: 'ka hoy izy tamin’i Josoa: Efa natolotr’i Jehovah eo an-tànantsika tokoa ny tany rehetra; ary efa ketraka ny mponina rehetra amin’ny tany noho ny tahotra antsika.'
  '3':
  - type: text
    content: 'Dia naniraka tao amin’i Rahaba ny mpanjakan’i Jeriko ka nanao hoe: Avoahy ireo lehilahy tonga ato an-tranonao ireo; fa hisafo ny tany no nihaviany.'
  '4':
  - type: text
    content: 'Dia nalain-dravehivavy izy roa lahy ka nafeniny, ary hoy izy: Tonga tatỳ amiko ihany tokoa ireny lehilahy ireny, nefa tsy fantatro izay nihaviany; '
  '5':
  - type: text
    content: 'ary rehefa maizina ny andro, ka hohidiana ny vavahady, dia lasa nivoaka izy, ka tsy fantatro indray izay nalehany; enjeho faingana izy, fa ho tratranareo. '
  '6':
  - type: text
    content: 'Kanjo efa nampiakarin-dravehivavy any an-tampon-trano izy ka nafeniny ao amin’ ny tahon-drongony, izay efa nalahany teo amin’ny tampon-trano. '
  '7':
  - type: text
    content: Ary ireo olona dia nanenjika azy tamin’ny làlana mankany Jordana hatrany amin’ny fitana; ary rehefa lasa nivoaka izay nanenjika azy, dia nohidiana ny vavahady.
  '8':
  - type: text
    content: 'Ary raha mbola tsy natory izy roa lahy, dia niakatra nankao aminy tao an-tampon-trano ravehivavy '
  '9':
  - type: text
    content: 'ka nanao taminy hoe: Fantatro fa efa nomen’i Jehovah anareo ny tany, ary efa latsaka aminay ny fahatahorana anareo, sady efa ketraka ny mponina rehetra amin’ny tany noho ny tahotra anareo. '
