document_id: ISA.57
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maty ny marina, nefa tsy misy misaina izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary alaina ny olona tsara fanahy, nefa tsy misy mihevitra fa ny marina dia alaina tsy ho azon’ny loza hanjo.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: noho ny ratsy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miditra amin’ny fiadanana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandry amin’ny fandriany avy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay rehetra mizotra amin’ny hitsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa hianareo kosa dia mankanesa etỳ, ry zanaky ny mpanandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianareo taranaky ny mpaka vadin’olona sy ny mpijangajanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza no ihomehezanareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no isanasananareo vava sy itrangatranganareo lela?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy taranaky ny fiodinana va hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady taranaky ny lainga?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zanaky ny fijangajangana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hianareo izay mahamaimay ny fonareo amin’ny hazo terebinta
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’ny sampy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny ambanin’ny hazo maitso rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mamono zaza eny an-dohasahan-driaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny ambanin’ny tsefatsefaky ny harambato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ao amin’ny vato kilonjy any an-dohasahan-driaka no anjaranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ireny ihany no anjaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireny koa no nanidinanao fanatitra aidina sy nanateranao fanatitra hohanina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahatsindry fo amin’izany va Aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Teo an-tampon’ny tendrombohitra avo sy manerinerina no nametrahanao ny fandrianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tany no niakaranao hamono zavatra natao fanatitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Teo ivohon’ny varavarana sy ny tolam-baravarana no nametrahanao ny fampahatsiarovana anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lavitra Ahy no nitanjahanao sy niakaranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nataonao malalaka ny fandrianao, ary nanao fanekena ny amin’izay hataon’ireny hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tia ny fandriana aminy hianao ka nizaha toerana ho anao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary nojerenao ny famantarana (
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tànana).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nivezivezy nankany amin’ny mpanjaka hianao nitondra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nihosotra.
    marker-yv: yv-n
  - type: text
    text: ' diloilo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nataonao betsaka ny zava-manitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nampandehanina hatrany lavitra any ny irakao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nidina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nietry.
    marker-yv: yv-n
  - type: text
    text: ' hatrany amin’ny fiainan-tsi-hita'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' hianao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Noho ny halavitry ny nalehanao dia sasatra hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa hianao tsy niteny hoe: Kivy aho izany!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahazo aina ny tànanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy nahatsiaro reraka hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary iza no nahìnao sy natahoranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No dia nandainga hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy nahatsiaro Ahy na nandatsaka am-po?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy efa nangina va Aho hatrizay hatrizay?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy natahotra Ahy hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izaho no hanambara ny fahamarinanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny asanao dia tsy hahasoa anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha mitaraina hianao, dia aoka ireo maronao no hamonjy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa hongahan’ny rivotra avokoa ireo sy ho lasan’ny tso-drivotra malemilemy aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mialoka amiko kosa no hanana ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy handova ny tendrombohitro masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Izy hilaza hoe: Manandrata, eny, manandrata ka manamboara làlana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esory izay mahatafintohina eny amin’ny alehan’ny oloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa izao no lazain’ny Iray avo sy manerinerina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay monina mandrakizay, Masina no anarany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny fitoerana avo sy masina no onenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao amin’ny torotoro fo sy ny manetry tena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamelombelona ny fanahin’ny manetry tena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hamelombelona ny fon’ny torotoro fo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa tsy hifandahatra mandrakariva Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho tezitra mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao ho reraka eo anatrehako ny fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny aina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fofonaina.
    marker-yv: yv-n
  - type: text
    text: ' izay nataoko.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny helony noho ny fieremany no nahatezitra Ahy ka namelezako azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa niery Aho, satria tezitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa niodina izy ka mbola nandroso tamin’ny làlana tian’ny fony ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Efa nahita ny làlany Aho, nefa hahasitrana azy ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hitari-dàlana azy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampody ny fiononana ho aminy sy ho amin’ny malahelo ao aminy,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia Izaho Izay mahary ny vokatry ny molotra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fiadanana, fiadanana ho an’izay lavitra sy ho an’izay akaiky! hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia hahasitrana azy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ny ratsy fanahy dia tahaka ny ranomasina misamboaravoara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tsy mety tafatoetra izy, ka ny ranony dia mamoaka loto sy fotaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy misy fiadanana ho an’ny ratsy fanahy, hoy Andriamanitro.
