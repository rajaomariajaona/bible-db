document_id: ISA.57,873
type_code: plt
verses:
  '1':
  - type: text
    content: Maty ny marina, nefa tsy misy misaina izany,
  - type: text
    content: Ary alaina ny olona tsara fanahy, nefa tsy misy mihevitra fa ny marina dia alaina tsy ho azon’ny loza hanjo.
  - type: note
    content: 'Na: noho ny ratsy.'
  '10':
  - type: text
    content: Noho ny halavitry ny nalehanao dia sasatra hianao,
  - type: text
    content: 'Nefa hianao tsy niteny hoe: Kivy aho izany!'
  - type: text
    content: Nahazo aina ny tànanao,
  - type: text
    content: Ka dia tsy nahatsiaro reraka hianao.
  '11':
  - type: text
    content: Ary iza no nahìnao sy natahoranao,
  - type: text
    content: No dia nandainga hianao
  - type: text
    content: Ka tsy nahatsiaro Ahy na nandatsaka am-po?
  - type: text
    content: Moa tsy efa nangina va Aho hatrizay hatrizay?
  - type: text
    content: Ka dia tsy natahotra Ahy hianao.
  '12':
  - type: text
    content: Izaho no hanambara ny fahamarinanao;
  - type: text
    content: Ary ny asanao dia tsy hahasoa anao.
  '13':
  - type: text
    content: Raha mitaraina hianao, dia aoka ireo maronao no hamonjy anao,
  - type: text
    content: Nefa hongahan’ny rivotra avokoa ireo sy ho lasan’ny tso-drivotra malemilemy aza;
  - type: text
    content: Fa izay mialoka amiko kosa no hanana ny tany
  - type: text
    content: Sy handova ny tendrombohitro masina.
  '14':
  - type: text
    content: 'Ary Izy hilaza hoe: Manandrata, eny, manandrata ka manamboara làlana,'
  - type: text
    content: Esory izay mahatafintohina eny amin’ny alehan’ny oloko.
  '15':
  - type: text
    content: Fa izao no lazain’ny Iray avo sy manerinerina,
  - type: text
    content: 'Izay monina mandrakizay, Masina no anarany:'
  - type: text
    content: Ao amin’ny fitoerana avo sy masina no onenako,
  - type: text
    content: Ary ao amin’ny torotoro fo sy ny manetry tena,
  - type: text
    content: Hamelombelona ny fanahin’ny manetry tena
  - type: text
    content: Sy hamelombelona ny fon’ny torotoro fo;
  '16':
  - type: text
    content: Fa tsy hifandahatra mandrakariva Aho
  - type: text
    content: Ary tsy ho tezitra mandrakizay;
  - type: text
    content: Fandrao ho reraka eo anatrehako ny fanahy,
  - type: text
    content: Dia ny aina
  - type: note
    content: Heb. fofonaina.
  - type: text
    content: ' izay nataoko.'
  '17':
  - type: text
    content: Ny helony noho ny fieremany no nahatezitra Ahy ka namelezako azy;
  - type: text
    content: Fa niery Aho, satria tezitra,
  - type: text
    content: Nefa niodina izy ka mbola nandroso tamin’ny làlana tian’ny fony ihany.
  '18':
  - type: text
    content: Efa nahita ny làlany Aho, nefa hahasitrana azy ihany,
  - type: text
    content: Dia hitari-dàlana azy Aho
  - type: text
    content: Ka hampody ny fiononana ho aminy sy ho amin’ny malahelo ao aminy,–
  '19':
  - type: text
    content: 'Dia Izaho Izay mahary ny vokatry ny molotra:'
  - type: text
    content: Fiadanana, fiadanana ho an’izay lavitra sy ho an’izay akaiky! hoy Jehovah,
  - type: text
    content: Ka dia hahasitrana azy Aho.
  '2':
  - type: text
    content: Miditra amin’ny fiadanana izy,
  - type: text
    content: Mandry amin’ny fandriany avy izy,
  - type: text
    content: Dia izay rehetra mizotra amin’ny hitsiny.
  '20':
  - type: text
    content: Fa ny ratsy fanahy dia tahaka ny ranomasina misamboaravoara,
  - type: text
    content: Eny, tsy mety tafatoetra izy, ka ny ranony dia mamoaka loto sy fotaka.
  '21':
  - type: text
    content: Tsy misy fiadanana ho an’ny ratsy fanahy, hoy Andriamanitro.
  '3':
  - type: text
    content: Fa hianareo kosa dia mankanesa etỳ, ry zanaky ny mpanandro,
  - type: text
    content: Hianareo taranaky ny mpaka vadin’olona sy ny mpijangajanga.
  '4':
  - type: text
    content: Iza no ihomehezanareo?
  - type: text
    content: Iza no isanasananareo vava sy itrangatranganareo lela?
  - type: text
    content: Tsy taranaky ny fiodinana va hianareo
  - type: text
    content: Sady taranaky ny lainga?
  - type: note
    content: 'Na: zanaky ny fijangajangana.'
  '5':
  - type: text
    content: Dia hianareo izay mahamaimay ny fonareo amin’ny hazo terebinta
  - type: note
    content: 'Na: amin’ny sampy.'
  - type: text
    content: Eny ambanin’ny hazo maitso rehetra,
  - type: text
    content: Ka mamono zaza eny an-dohasahan-driaka
  - type: text
    content: Eny ambanin’ny tsefatsefaky ny harambato.
  '6':
  - type: text
    content: Ao amin’ny vato kilonjy any an-dohasahan-driaka no anjaranao,
  - type: text
    content: Eny, ireny ihany no anjaranao;
  - type: text
    content: Ireny koa no nanidinanao fanatitra aidina sy nanateranao fanatitra hohanina.
  - type: text
    content: Hahatsindry fo amin’izany va Aho?
  '7':
  - type: text
    content: Teo an-tampon’ny tendrombohitra avo sy manerinerina no nametrahanao ny fandrianao,
  - type: text
    content: Ka tany no niakaranao hamono zavatra natao fanatitra.
  '8':
  - type: text
    content: Teo ivohon’ny varavarana sy ny tolam-baravarana no nametrahanao ny fampahatsiarovana anao;
  - type: text
    content: Fa lavitra Ahy no nitanjahanao sy niakaranao,
  - type: text
    content: Eny, nataonao malalaka ny fandrianao, ary nanao fanekena ny amin’izay hataon’ireny hianao;
  - type: text
    content: Tia ny fandriana aminy hianao ka nizaha toerana ho anao.
  - type: note
    content: 'Na: Ary nojerenao ny famantarana (Heb. tànana).'
  '9':
  - type: text
    content: Dia nivezivezy nankany amin’ny mpanjaka hianao nitondra
  - type: note
    content: 'Na: nihosotra.'
  - type: text
    content: ' diloilo,'
  - type: text
    content: Ary nataonao betsaka ny zava-manitrao,
  - type: text
    content: Sady nampandehanina hatrany lavitra any ny irakao,
  - type: text
    content: Ka nidina
  - type: note
    content: 'Na: nietry.'
  - type: text
    content: ' hatrany amin’ny fiainan-tsi-hita'
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' hianao.'
