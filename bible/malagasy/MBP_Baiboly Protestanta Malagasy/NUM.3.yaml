document_id: NUM.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandaminana ny firenen’i Levy, sy ny nitobiany, ary ny zavatra hotandremany.
  - type: text
    content: 'ARY izao no taranak’i Arona sy Mosesy tamin’ny andro nitenenan’i Jehovah tamin’i Mosesy teo an-tendrombohitra Sinay. '
  '10':
  - type: text
    content: Ary Arona sy ny zanani-lahy hotendrenao hitandrina ny fisoronany; fa raha olon-kafa no manakaiky, dia hatao maty izy.
  '11':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '12':
  - type: text
    content: 'Indro, Izaho efa naka ny Levita avy tamin’ny Zanak’Isiraely ho solon’ny lahimatoa rehetra izay voalohan-teraka eo amin’ny Zanak’Isiraely: dia Ahy ny Levita '
  '13':
  - type: text
    content: 'satria Ahy ny lahimatoa rehetra; tamin’ilay andro namelezako ny voalohan-teraka rehetra tany amin’ny tany Egypta no nanamasinako ny voalohan-teraka rehetra eo amin’ny Isiraely ho Ahy, na olona, na biby fiompy: Ahy ireo; Izaho no Jehovah.'
  '14':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy tany an-efitr’i Sinay ka nanao hoe: '
  '15':
  - type: text
    content: 'Alamino ny Levita araka ny fianakaviany sy ny fokony; ny lahy rehetra eo aminy hatramin’ny iray volana no ho miakatra no halaminao. '
  '16':
  - type: text
    content: Ary Mosesy nandamina azy araka ny tenin’i Jehovah, araka izay efa nandidiana azy.
  '17':
  - type: text
    content: 'Ary izao no zanakalahin’i Levy, zraka ny anarany: Gersona sy Kehata ary Merary. '
  '18':
  - type: text
    content: 'Ary izao no anaran’ny zanakalahin’i Gersona, araka ny fianakaviany: Libny sy Simey. '
  '19':
  - type: text
    content: 'Ary ny zanakalahin’i Kehata, araka ny fianakaviany, dia Amrama sy Jizara sy Hebrona ary Oziela. '
  '2':
  - type: text
    content: 'Ny anaran’ny zanakalahin’i Arona dia Nadaba lahimatoa sy Abiho ary Eleazara sy Itamara. '
  '20':
  - type: text
    content: Ary ny zanakalahin’i Merary, araka ny fianakaviany, dia Maly sy Mosy. Ireo no fokon’ny Levita, araka ny fianakaviany.
  '21':
  - type: text
    content: 'Avy tamin’i Gersona ny fokon’ny Libnita sy ny Simeita: ireo no fokon’ny Gersonita. '
  '22':
  - type: text
    content: 'Ary izay nalamina, araka ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia diman-jato amby fito arivo. '
  '23':
  - type: text
    content: 'Ny fokon’ny Gersonita dia hitoby eo ivohon’ny tabernakely, dia eo andrefany. '
  '24':
  - type: text
    content: Ary ny lohan’ny fianakavian’ny Gersonita dia Eliasafa, zanak’i Laela.
  '25':
  - type: text
    content: 'Ary ny anjara-raharahan’ny zanak’i Gersona eo amin’ny trano-lay fihaonana dia ny tabernakely sy ny lay sy ny firakony sy ny varavarana lamba amin’ny varavaran’ny trano-lay fihaonana, '
  '26':
  - type: text
    content: ary ny fefi-lamban’ny kianja sy ny vavahady lamba amin’ny vavahadin’ny kianja, izay manodidina ny tabernakely sy ny alitara, ary ny kofehy rehetra momba azy.
  '27':
  - type: text
    content: 'Ary avy tamin’i Kehata ny fokon’ny Amramita sy ny fokon’ny Jizarita sy ny fokon’ny Hebronita ary ny fokon’ny Ozielita; ireo no fokon’ny Kehatita. '
  '28':
  - type: text
    content: 'Ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, izay mpitandrina ny anjara-raharaha momba ny fitoerana masina, dia enin-jato amby valo arivo. '
  '29':
  - type: text
    content: 'Ny fokon’ny zanak’i Kehata dia hitoby eo amin’ny lafiny atsimo amin’ny tabernakely. '
  '3':
  - type: text
    content: Ireo no anaran’ny zanakalahin’i Arona, dia ny mpisorona voahosotra, izay natokana
  - type: note
    content: Heb. nofenoina ny tànany.
  - type: text
    content: ' hanao fisoronana. '
  '30':
  - type: text
    content: Ary ny lohan’ny fianakaviana amin’ny fokon’ny Kehatita dia Elisafana, zanak’i Oziela.
  '31':
  - type: text
    content: Ary ny anjara-raharahany dia ny fiara sy ny latabatra sy ny fanaovan-jiro sy ny alitara roa, ary ny fanaky ny fitoerana masina, izay fanaovana fanompoam-pivavahana, ary ny varavarana lamba mbamin’ny zavatra rehetra fanaovana ny fanompoana momba azy.
  '32':
  - type: text
    content: Ary ny lehiben’ny lohan’ny Levita dia Eleazara, zanak’i Arona mpisorona, izay lehiben’ny mpitandrina ny anjara-raharaha ny amin’ny fitoerana masina.
  '33':
  - type: text
    content: 'Avy tamin’i Merary ny fokon’ny Malita sy ny fokon’ny Mosita; ireo no fokon’i Merary. '
  '34':
  - type: text
    content: 'Ary izay nalamina, araka ny isan’ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia roan-jato amby enina arivo. '
  '35':
  - type: text
    content: Ary ny lohan’ny fianakaviana amin’ny fokon’i Merary dia Zoriela, zanak’i Abihaila; ireo no hitoby eo amin’ny lafiny avaratra amin’ny tabernakely.
  '36':
  - type: text
    content: 'Ary ny anjara-raharahan’ny zanak’i Merary dia ny zanakazo amin’ny tabernakely sy ny barany sy ny andriny ary ny faladiany, ary ny fanaka rehetra momba azy, sy ny zavatra rehetra enti-manao fanompoana ao, '
  '37':
  - type: text
    content: ary ny tsangantsangan’ny kianja manodidina sy ny faladiany sy ny tsimany ary ny kofehiny.
  '38':
  - type: text
    content: Ary ny mitoby eo anoloan’ny tabernakely atsinanany, dia eo anoloan’ny trano-lay fihaonana, tandrifin’ny fiposahan’ny masoandro, dia Mosesy sy Arona ary ny zanany, izay mpitandrina ny anjara-raharaha momba ny fitoerana masina, dia ny anjara-raharahan’ny Zanak’Isiraely; ary raha olon-kafa no manakaiky, dia hatao maty izy.
  '39':
  - type: text
    content: Ny tontalin’izay nalamina avy tamin’ny Levita, dia izay nalamin’i Mosesy sy Arona araka ny didin’i Jehovah, avy tamin’ny fokony, ny lahy rehetra hatramin’ny iray volana no ho miakatra, dia roa arivo amby roa alina.
  '4':
  - type: text
    content: Fa maty teo anatrehan’i Jehovah Nadaba sy Abiho tamin’izy nanatitra afo tsy izy teo anatrehan’i Jehovah tany an-efitr’i Sinay, sady samy tsy nanan-janaka izy mirahalahy; ary Eleazara sy Itamara no nanao fisoronana teo anatrehan’i Arona rainy.
  '40':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Mosesy: Alamino ny lahimatoa rehetra eo amin’ny Zanak’Isiraely hatramin’ny iray volana no ho miakatra, ka alao isa ny anarany. '
  '41':
  - type: text
    content: 'Ary alao ho Ahy ny Levita ho solon’ny lahimatoa rehetra eo amin’ny Zanak’Isiraely: Izaho no Jehovah; ary ny biby fiompin’ny Levita ho solon’ny voalohan-teraka rehetra amin’ny biby fiompin’ny Zanak’Isiraely.'
  '42':
  - type: text
    content: 'Dia nalamin’i Mosesy ny lahimatoa rehetra teo amin’ny Zanak’Isiraely, araka izay efa nandidian’i Jehovah azy. '
  '43':
  - type: text
    content: Ary ny lahimatoa rehetra, araka ny anarany tsirairay hatramin’ny iray volana no ho miakatra,–izay nalamina avy taminy dia telo amby fito-polo sy roan-jato sy roa arivo sy roa alina.
  '44':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '45':
  - type: text
    content: 'Alao ny Levita ho solon’ny lahimatoa rehetra eo amin’ny Zanak’Isiraely; ary ny biby fiompin’ny Levita ho solon’ny biby fiompiny: Ahy ny Levita; Izaho no Jehovah. '
  '46':
  - type: text
    content: 'Ary ny amin’ny avotry ny telo amby fito-polo sy roan-jato amin’ny lahimatoan’ny Zanak’Isiraely, izay mihoatra isa noho ny Levita, '
  '47':
  - type: text
    content: 'dia hangalanao sekely dimy isan-olona; araka ny sekely masina no hangalanao azy (gera roa-polo ny sekely iray). '
  '48':
  - type: text
    content: Dia homenao an’i Arona sy ny zanany ny vola ho avotr’ireo mihoatra isa ireo.
  '49':
  - type: text
    content: 'Ary Mosesy nandray ny vola izay avotry ny nihoatra isa noho ny voàvotry ny Levita; '
  '5':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '50':
  - type: text
    content: 'tamin’ny lahimatoan’ny Zanak’Isiraely no nandraisany ny vola, dia sekely dimy amby enim-polo sy telon-jato sy arivo, araka ny sekely masina; '
  '51':
  - type: text
    content: dia nomen’i Mosesy an’i Arona sy ny zanany izany vola avotra izany, araka ny tenin’i Jehovah, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
  '6':
  - type: text
    content: 'Ento ny firenen’i Levy hanatona, ka ampitoero eo anatrehan’i Arona mpisorona mba hanompo azy. '
  '7':
  - type: text
    content: 'Dia hitandrina ny anjara-raharahan’i Arona sy ny anjara-raharahan’ny finagonana rehetra eo anoloan’ny trano-lay fihaonana izy, ka hanao ny fanompoana ao amin’ny tabernakely. '
  '8':
  - type: text
    content: 'Dia hitandria ny fanaka rehetra momba ny trano-lay fihaonana sy ny anjara-raharahan’ny Zanak’Isiraely izy ka hanao ny fanompoana ao amin’ny tabernakely. '
  '9':
  - type: text
    content: 'Ary homenao an’i Arona sy ny zanani-lahy ny Levita; efa nomena azy mihitsy avy amin’ny Zanak’Isiraely ireo. '
