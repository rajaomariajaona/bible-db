document_id: MAT.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namangian’ny Magy sasany an’i Jesosy.
  - type: text
    content: ARY rehefa teraka Jesosy tao Betlehema an’i Jodia, tamin’ny andron’i Heroda mpanjaka, indreo, nisy Magy
  - type: note
    content: Magy = olon-kendry.
  - type: text
    content: ' avy tany atsinanana tonga tany Jerosalema ka nanao hoe: '
  '10':
  - type: text
    content: Ary nony nahita ny kintana izy, dia nifaly indrindra.
  '11':
  - type: text
    content: 'Ary rehefa tafiditra tao an-trano izy, dia nahita ny Zazakely sy Maria reniny ka niankohoka teo anatrehany; ary nony efa nosokafany ny fitehirizan-drakiny, dia nanolotra zavatra ho Azy izy, dia volamena sy zava-manitra ary miora. '
  '12':
  - type: text
    content: Ary rehefa notoroan’Andriamanitra hevitra tamin’ny nofy izy tsy hiverina any amin’i Heroda, dia làlana hafa no nalehany nody ho any amin’ny fonenany.
  - type: heading
    content: Ny nitondran’i Josefa an’i Jesosy sy Maria nandositra nankany Egypta.
  '13':
  - type: text
    content: 'ARY nony efa lasa nandeha ireo, indro, nisy anjelin’ny Tompo niseho tamin’i Josefa tamin’ny nofy ka nanao hoe: Mifohaza hianao, ka ento ny Zazakely sy ny reniny, dia mandosira any Egypta, ary mitoera any ambara-pilazako aminao; fa Heroda efa hitady ny Zazakely hovonoiny. '
  '14':
  - type: text
    content: 'Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, raha mbola alina, dia lasa nankany Egypta; '
  '15':
  - type: text
    content: 'ary nitoetra tany izy ambara-pahafatin’i Heroda, mba hahatanteraka izay nampilazain’i Jehovah ny mpaminany hoe: ,,Nantsoiko hiala tany Egypta ny zanako’’ (Hos. 11.1).'
  - type: heading
    content: Ny nampamonoan’i Heroda ny zazakely tao Betlehema.
  '16':
  - type: text
    content: ARY nony efa fantatr’i Heroda fa voafitaky ny Magy izy, dia tezitra indrindra izy ka naniraka namono ny zazalahy rehetra hatramin’ny roa taona no ho midina, izay tao Betlehema sy tamin’ny manodidina rehetra, araka ny andro izay nofotorany fatratra tamin’ny Magy.
  '17':
  - type: text
    content: 'Dia tanteraka izay nampilazaina an’i Jeremia mpaminany hoe:'
  '18':
  - type: text
    content: ',,Nisy feo re tao Rama,'
  - type: text
    content: Dia fidradradradrana sy fitomaniana fatratra;
  - type: text
    content: Rahely nitomany ny zanany,
  - type: text
    content: Ary tsy azo nampiononina izy, satria lany ritra ireny’’ (Jer. 31.15).
  - type: heading
    content: Ny nitondran’i Josefa an’i Jesosy sy Maria niverina tao Nazareta.
  - type: heading
    content: Lio. 2.39,40.
  '19':
  - type: text
    content: 'ARY rehefa maty Heroda, indro, nisy anjelin’ny Tompo niseho tamin’i Josefa tany Egypta tamin’ny nofy ka nanao hoe: '
  '2':
  - type: text
    content: Aiza Ilay teraka ho Mpanjakan’ny Jiosy? fa nahita ny kintany teny atsinanana izahay ka tonga mba hiankohoka eo anatrehany.
  '20':
  - type: text
    content: 'Mifohaza hianao, ka ento ny Zazakely sy ny reniny, dia mankanesa any amin’ny tanin’ny Isiraely; fa efa maty izay nitady ny ain’ny Zazakely. '
  '21':
  - type: text
    content: 'Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, dia tonga tany amin’ny tanin’ny Isiraely. '
  '22':
  - type: text
    content: 'Fa rehefa reny fa Arkelaosy no nanjaka tany Jodia nandimby an’i Heroda rainy, dia natahotra hankany izy; ary rehefa notoroan’Andriamanitra hevitra tamin’ny nofy izy, dia lasa nankany amin’ny tany Galilia. '
  '23':
  - type: text
    content: 'Ary nony tonga tany izy, dia nonina tao amin’ny tanàna atao hoe Nazareta, mba hahatanteraka izay nampilazaina ny mpaminany hoe: ,,Hatao hoe Nazarena Izy.’’'
  '3':
  - type: text
    content: 'Ary nony nandre izany Heroda mpanjaka, dia nangorohoro izy mbamin’i Jerosalema rehetra. '
  '4':
  - type: text
    content: 'Dia namory ny lohan’ny mpisorona rehetra sy ny mpanora-dalàna tamin’ny vahoaka izy ka nanontany azy hoe: Aiza moa no hahaterahan’i Kristy? '
  '5':
  - type: text
    content: 'Ary hoy ireo taminy: Ao Betlehema an’i Jodia; fa izao no voasoratry ny mpaminany:'
  '6':
  - type: text
    content: „Ary hianao, ry Betlehema, tanin’ny Joda,
  - type: text
    content: Tsy dia kely indrindra ao amin’ny andrianan’ny Joda hianao tsy akory;
  - type: text
    content: Fa avy ao aminao no hivoahan’Izay anankiray ho Mpanapaka,
  - type: text
    content: Ka Izy no ho Mpiandry ny Isiraely oloko” (Mik. 5.1).
  '7':
  - type: text
    content: 'Dia nampaka ny Magy mangingina Heroda ka namototra fatratra taminy izay andro nisehoan’ilay kintana. '
  '8':
  - type: text
    content: 'Dia naniraka azy hankany Betlehema izy ka nanao hoe: Andeha, fotory tsara ny amin’ilay Zazakely; koa rehefa hitanareo Izy, dia ambarao amiko, mba hankanesako any koa hiankohoka eo anatrehany.'
  '9':
  - type: text
    content: 'Ary rehefa nandre ny tenin’ny mpanjaka izy ireo, dia lasa; ary, indro, ilay kintana hitany teny atsinanana nialoha azy mandra-pijanony teo ambonin’izay nitoeran’ny Zazakely. '
