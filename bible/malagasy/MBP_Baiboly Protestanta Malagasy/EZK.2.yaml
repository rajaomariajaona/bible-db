document_id: EZK.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niantsoana an’i Ezekiela ho mpaminany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY hoy Izy tamiko: Ry zanak’olona, mitsangàna, fa hiteny aminao Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nisy fanahy tonga tao anatiko,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nody ny aiko.
    marker-yv: yv-n
  - type: text
    text: ' raha niteny tamiko Izy, ka nampitsangana ahy, ary reko Izay niteny tamiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Izy tamiko: Ry zanak’olona, maniraka anao ho amin’ny Zanak’Isiraely Aho, eny, ho amin’ireo jentilisa mpiodina, izay efa niodina tamiko; izy sy ny razany dia samy efa nanota tamiko avokoa mandraka andro-any. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ho any amin’ny zanaka mafy handrina sy madi-po no anirahako anao, ary hianao hanao aminy hoe: Izao no lazain’i Jehovah Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary na hihaino izy na tsy hihaino (fa taranaka maditra izy), dia ho fantany fa efa nisy mpaminany teo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary hianao, ry zanak’olona, aza matahotra azy, ary aza matahotra ny teniny, na dia voakasiky ny amiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: maditra.
    marker-yv: yv-n
  - type: text
    text: ' sy ny tsilo aza hianao, ary na dia eo amin’ny maingoka aza no ipetrahanao; eny, aza matahotra ny fiteniny, ary aza mivadi-po noho ny tarehiny, fa taranaka maditra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary holazainao aminy ihany ny teniko, na hihaino izy na tsy hihaino, fa tena maditra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa hianao kosa, ry zanak’olona, mihainoa izay lazaiko aminao; aza maditra tahaka izany taranaka maditra izany hianao; sokafy ny vavanao, ka hano izay afahako anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hitako fa, indro, nisy tànana nahinjitra tamiko, ary, indro, nisy horonan-taratasy teny aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia novelariny teo anatrehako izany, ary nisy soratra teo anatiny sy teo ivohony; ary fitomaniana sy fidradradradrana sy loza no voasoratra teo.
