document_id: EZK.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niantsoana an’i Ezekiela ho mpaminany.
  - type: text
    content: 'ARY hoy Izy tamiko: Ry zanak’olona, mitsangàna, fa hiteny aminao Aho. '
  '10':
  - type: text
    content: Dia novelariny teo anatrehako izany, ary nisy soratra teo anatiny sy teo ivohony; ary fitomaniana sy fidradradradrana sy loza no voasoratra teo.
  '2':
  - type: text
    content: Ary nisy fanahy tonga tao anatiko,
  - type: note
    content: 'Na: nody ny aiko.'
  - type: text
    content: ' raha niteny tamiko Izy, ka nampitsangana ahy, ary reko Izay niteny tamiko.'
  '3':
  - type: text
    content: 'Ary hoy Izy tamiko: Ry zanak’olona, maniraka anao ho amin’ny Zanak’Isiraely Aho, eny, ho amin’ireo jentilisa mpiodina, izay efa niodina tamiko; izy sy ny razany dia samy efa nanota tamiko avokoa mandraka andro-any. '
  '4':
  - type: text
    content: 'Ary ho any amin’ny zanaka mafy handrina sy madi-po no anirahako anao, ary hianao hanao aminy hoe: Izao no lazain’i Jehovah Tompo. '
  '5':
  - type: text
    content: Ary na hihaino izy na tsy hihaino (fa taranaka maditra izy), dia ho fantany fa efa nisy mpaminany teo aminy.
  '6':
  - type: text
    content: Ary hianao, ry zanak’olona, aza matahotra azy, ary aza matahotra ny teniny, na dia voakasiky ny amiana
  - type: note
    content: 'Na: maditra.'
  - type: text
    content: ' sy ny tsilo aza hianao, ary na dia eo amin’ny maingoka aza no ipetrahanao; eny, aza matahotra ny fiteniny, ary aza mivadi-po noho ny tarehiny, fa taranaka maditra izy. '
  '7':
  - type: text
    content: 'Ary holazainao aminy ihany ny teniko, na hihaino izy na tsy hihaino, fa tena maditra izy. '
  '8':
  - type: text
    content: Fa hianao kosa, ry zanak’olona, mihainoa izay lazaiko aminao; aza maditra tahaka izany taranaka maditra izany hianao; sokafy ny vavanao, ka hano izay afahako anao.
  '9':
  - type: text
    content: 'Ary hitako fa, indro, nisy tànana nahinjitra tamiko, ary, indro, nisy horonan-taratasy teny aminy. '
