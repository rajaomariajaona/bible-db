document_id: PRO.23
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Raha mipetraka hiara-komana amin’ny mpanapaka hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hevero tsara izay eo anatrehanao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anoloanao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ka andraso antsy ny tendanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha dia liana loatra hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza mitsiriritra ny hanim-piny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hani-mamitaka izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aza manasa-tena hanan-karena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza entina amin’izany ny fahendrenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moa hampanarahinao azy va ny masonao, nefa tsy ao intsony izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa maniry elatra tokoa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manidina toy ny voromahery ho eny amin’ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza homana ny mofon’izay ratsy fijery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mitsiriritra ny hanim-piny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tahaka ny heviny ao am-pony ihany no toetrany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy izy aminao: Mihinàna, misotroa;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo tsy sitrany hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay sombiny kely voatelinao aza dia mbola haloanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho very foana ny teny mahafinaritra nataonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza miteny amin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: an-tsofin’.
    marker-yv: yv-n
  - type: text
    text: ' ny adala;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hohamavoiny foana ny fahendren’ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza manakisaka ny fari-tany ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza manitatra mankamin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miditra amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny sahan’ny kamboty;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa mahery ny Mpanavotra azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no hisolo vava azy amin’ny adiny aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ampiekeo famaizana ny fonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tenim-pahalalana ny sofinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza tsy manafay zanaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy dia ho faty izy tsy akory na dia asianao ny hazo aza;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa tsy ho faty izy, raha asianao ny hazo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha mamely azy amin’ny hazo hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho voavonjinao tsy ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ny fanahiny.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Anaka, raha hendry ny fonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho faly koa ny foko, dia ny foko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eny, ho ravoravo ny fanahiko,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voako.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha miteny marina ny molotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka tsy hialona ny mpanota ny fonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa matahora an’i Jehovah mandritra ny andro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa raha mbola hisy koa ny farany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy ho foana ny fanantenanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mihainoa hianao, anaka, ka hendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampizory amin’ny làlana ny fonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aza misakaiza amin’izay mpiboboka divay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay fatra-pitia hena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa halahelo izay mpiboboka sy izay fatra-pitia hena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fitiavan-torimaso mampitafy voro-damba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Maneke ny rainao izay niteraka anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza manamavo ny reninao, saingy efa antitra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Vidio ny marina, ka aza amidy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fahendrena sy ny fananarana ary ny fahazavan-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hifaly dia hifaly ny rain’ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay miteraka zaza hendry hanam-pifaliana aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka ho faly ny rainao sy ny reninao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, aoka ho ravoravo ny reninao izay niteraka anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Anaka, atolory ahy ny fonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ny masonao ho faly mijery ny làlako;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary aoka ny masonao handinika ny làlako.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa ny vehivavy jejo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vehivavy tsy vadiny.
    marker-yv: yv-n
  - type: text
    text: ' dia hady lalina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vahiny janga lavaka ety;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny, manotrika toy ny jiolahy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahamaro ny olona mpivadika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: An’iza ny Indrisy? An’iza ny Endrey?
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’iza ny fifandirana? An’iza ny fitolokoana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’iza ny ratra tsy ahoan-tsy ahoana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’iza ny maso mivoara-mena?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manjambena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: An’izay mikikitra amin’ny divay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, an’izay mandeha hanandrana divay voaharoharo zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aza mijery ny divay noho ny hamenany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fanganohanony eo anaty gilasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: kapoaka.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fikoriany mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa amin’ny farany dia hanaikitra toy ny bibilava izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanindrona toy ny menarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Koa ny masonao dia hijery vehivavy jejo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vehivavy tsy vadiny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fonao hieritreri-dratsy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny masonao hahita zavatra hafahafa, Ary ny fonao hiradiredy foana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Eny, ho sahala amin’izay mandry ao amin’ny ranomasina hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ho tahaka izay mandry eo an-tendron’ny andrin-tsambo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nokapohiny aho, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy hianao,
  - type: text
    text: ' fa tsy reko naharary ahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nandalasiny aho, fa tsy tsaroako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana ange aho no hifoha mba hitadiavako azy indray?
