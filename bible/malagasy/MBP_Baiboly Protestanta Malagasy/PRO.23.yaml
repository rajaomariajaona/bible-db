document_id: PRO.23,873
type_code: plt
verses:
  '1':
  - type: text
    content: Raha mipetraka hiara-komana amin’ny mpanapaka hianao,
  - type: text
    content: Dia hevero tsara izay eo anatrehanao,
  - type: note
    content: 'Na: anoloanao.'
  '10':
  - type: text
    content: Aza manakisaka ny fari-tany ela,
  - type: text
    content: Ary aza manitatra mankamin’
  - type: note
    content: Heb. miditra amin’.
  - type: text
    content: ' ny sahan’ny kamboty;'
  '11':
  - type: text
    content: Fa mahery ny Mpanavotra azy,
  - type: text
    content: Izy no hisolo vava azy amin’ny adiny aminao.
  '12':
  - type: text
    content: Ampiekeo famaizana ny fonao,
  - type: text
    content: Sy tenim-pahalalana ny sofinao.
  '13':
  - type: text
    content: Aza tsy manafay zanaka,
  - type: text
    content: Fa tsy dia ho faty izy tsy akory na dia asianao ny hazo aza;
  - type: note
    content: 'Na: Fa tsy ho faty izy, raha asianao ny hazo.'
  '14':
  - type: text
    content: Raha mamely azy amin’ny hazo hianao,
  - type: text
    content: Dia ho voavonjinao tsy ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ny fanahiny.'
  '15':
  - type: text
    content: Anaka, raha hendry ny fonao,
  - type: text
    content: Dia ho faly koa ny foko, dia ny foko;
  '16':
  - type: text
    content: Eny, ho ravoravo ny fanahiko,
  - type: note
    content: Heb. voako.
  - type: text
    content: Raha miteny marina ny molotrao.
  '17':
  - type: text
    content: Aoka tsy hialona ny mpanota ny fonao;
  - type: text
    content: Fa matahora an’i Jehovah mandritra ny andro;
  '18':
  - type: text
    content: Fa raha mbola hisy koa ny farany,
  - type: text
    content: Dia tsy ho foana ny fanantenanao.
  '19':
  - type: text
    content: Mihainoa hianao, anaka, ka hendre,
  - type: text
    content: Ary ampizory amin’ny làlana ny fonao.
  '2':
  - type: text
    content: Ka andraso antsy ny tendanao,
  - type: text
    content: Raha dia liana loatra hianao.
  '20':
  - type: text
    content: Aza misakaiza amin’izay mpiboboka divay
  - type: text
    content: Sy izay fatra-pitia hena;
  '21':
  - type: text
    content: Fa halahelo izay mpiboboka sy izay fatra-pitia hena;
  - type: text
    content: Ary ny fitiavan-torimaso mampitafy voro-damba.
  '22':
  - type: text
    content: Maneke ny rainao izay niteraka anao.
  - type: text
    content: Ary aza manamavo ny reninao, saingy efa antitra izy.
  '23':
  - type: text
    content: Vidio ny marina, ka aza amidy,
  - type: text
    content: Dia ny fahendrena sy ny fananarana ary ny fahazavan-tsaina.
  '24':
  - type: text
    content: Hifaly dia hifaly ny rain’ny marina,
  - type: text
    content: Ary izay miteraka zaza hendry hanam-pifaliana aminy.
  '25':
  - type: text
    content: Aoka ho faly ny rainao sy ny reninao,
  - type: text
    content: Eny, aoka ho ravoravo ny reninao izay niteraka anao.
  '26':
  - type: text
    content: Anaka, atolory ahy ny fonao,
  - type: text
    content: Ary aoka ny masonao ho faly mijery ny làlako;
  - type: note
    content: 'Na: Ary aoka ny masonao handinika ny làlako.'
  '27':
  - type: text
    content: Fa ny vehivavy jejo
  - type: note
    content: Heb. vehivavy tsy vadiny.
  - type: text
    content: ' dia hady lalina,'
  - type: text
    content: Ary ny vahiny janga lavaka ety;
  '28':
  - type: text
    content: Eny, manotrika toy ny jiolahy ireny
  - type: text
    content: Ary mahamaro ny olona mpivadika.
  '29':
  - type: text
    content: An’iza ny Indrisy? An’iza ny Endrey?
  - type: text
    content: An’iza ny fifandirana? An’iza ny fitolokoana?
  - type: text
    content: An’iza ny ratra tsy ahoan-tsy ahoana?
  - type: text
    content: An’iza ny maso mivoara-mena?
  - type: note
    content: 'Na: manjambena.'
  '3':
  - type: text
    content: Aza mitsiriritra ny hanim-piny,
  - type: text
    content: Fa hani-mamitaka izany.
  '30':
  - type: text
    content: An’izay mikikitra amin’ny divay,
  - type: text
    content: Eny, an’izay mandeha hanandrana divay voaharoharo zavatra.
  '31':
  - type: text
    content: Aza mijery ny divay noho ny hamenany
  - type: text
    content: Sy ny fanganohanony eo anaty gilasy
  - type: note
    content: Heb. kapoaka.
  - type: text
    content: Ary ny fikoriany mahafinaritra;
  '32':
  - type: text
    content: Fa amin’ny farany dia hanaikitra toy ny bibilava izy
  - type: text
    content: Ary hanindrona toy ny menarana.
  '33':
  - type: text
    content: Koa ny masonao dia hijery vehivavy jejo,
  - type: note
    content: Heb. vehivavy tsy vadiny.
  - type: text
    content: Ary ny fonao hieritreri-dratsy.
  - type: note
    content: 'Na: Ny masonao hahita zavatra hafahafa, Ary ny fonao hiradiredy foana.'
  '34':
  - type: text
    content: Eny, ho sahala amin’izay mandry ao amin’ny ranomasina hianao
  - type: text
    content: Sady ho tahaka izay mandry eo an-tendron’ny andrin-tsambo.
  '35':
  - type: text
    content: 'Nokapohiny aho, '
  - type: text
    content: hoy hianao,
  - type: text
    content: ' fa tsy reko naharary ahy,'
  - type: text
    content: Nandalasiny aho, fa tsy tsaroako;
  - type: text
    content: Rahoviana ange aho no hifoha mba hitadiavako azy indray?
  '4':
  - type: text
    content: Aza manasa-tena hanan-karena,
  - type: text
    content: Aza entina amin’izany ny fahendrenao.
  '5':
  - type: text
    content: Moa hampanarahinao azy va ny masonao, nefa tsy ao intsony izy?
  - type: text
    content: Fa maniry elatra tokoa izy
  - type: text
    content: Ka manidina toy ny voromahery ho eny amin’ny lanitra.
  '6':
  - type: text
    content: Aza homana ny mofon’izay ratsy fijery,
  - type: text
    content: Ary aza mitsiriritra ny hanim-piny;
  '7':
  - type: text
    content: 'Fa tahaka ny heviny ao am-pony ihany no toetrany:'
  - type: text
    content: 'Hoy izy aminao: Mihinàna, misotroa;'
  - type: text
    content: Kanjo tsy sitrany hianao.
  '8':
  - type: text
    content: Izay sombiny kely voatelinao aza dia mbola haloanao,
  - type: text
    content: Ka ho very foana ny teny mahafinaritra nataonao.
  '9':
  - type: text
    content: Aza miteny amin’
  - type: note
    content: Heb. an-tsofin’.
  - type: text
    content: ' ny adala;'
  - type: text
    content: Fa hohamavoiny foana ny fahendren’ny teninao.
