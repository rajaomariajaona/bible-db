document_id: PSA.104,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra, Mpamorona sy Mpiahy izao rehetra izao.
  - type: text
    content: MISAORA an’i Jehovah, ry fanahiko.
  - type: text
    content: Jehovah Andriamanitro ô, lehibe indrindra Hianao;
  - type: text
    content: Famirapiratana sy voninahitra no fitafinao,
  '10':
  - type: text
    content: Mampandeha loharano eny amin’ny lohasaha Izy;
  - type: text
    content: Eny anelanelan’ny tendrombohitra no alehan’ireny,
  '11':
  - type: text
    content: Ka isotroan’ny bibi-dia rehetra,
  - type: text
    content: Sy analan’ny boriki-dia ny hetahetany;
  '12':
  - type: text
    content: Eo amboniny no itoeran’ny voro-manidina;
  - type: text
    content: Ary eo amin’ny rantsan-kazo no anenoany.
  '13':
  - type: text
    content: Manondra-drano ny tendrombohitra avy amin’ny tranony ambony Izy;
  - type: text
    content: Ny vokatry ny asanao no mahavoky ny tany.
  '14':
  - type: text
    content: Mampaniry ahitra ho an’ny biby fiompy Izy
  - type: text
    content: Sy anana hahasoa ny olona,
  - type: text
    content: Ary mamoaka hanina avy amin’ny tany,
  '15':
  - type: text
    content: Ary divay izay mampifaly ny olona,
  - type: text
    content: Ka mampinendonendo ny tavany mihoatra noho ny diloilo,
  - type: text
    content: Ary mofo hanohanana ny ain’ny olona.
  '16':
  - type: text
    content: Voky ny hazon’i Jehovah,
  - type: text
    content: Dia ny sederan’i Libanona, izay namboleny;
  '17':
  - type: text
    content: Izay anaovan’ny voron-kely ny akaniny;
  - type: text
    content: Ary ny vano, dia ao amin’ny kypreso no anaovany ny tranony.
  '18':
  - type: text
    content: Ny tendrombohitra avo dia ho an’ny osi-dia;
  - type: text
    content: Ny harambato no fiarovana ho an’ny hyraka.
  '19':
  - type: text
    content: Nanao ny volana ho fotoana Izy,
  - type: text
    content: Ary ny masoandro mahalala ny filentehany.
  '2':
  - type: text
    content: Mitafy ny mazava tahaka ny lamba Izy
  - type: text
    content: Ary mamelatra ny lanitra tahaka ny lay,
  '20':
  - type: text
    content: Mahatonga aizina Hianao, dia tonga ny alina.
  - type: text
    content: Ka mivezivezy ny biby rehetra any an-ala;
  '21':
  - type: text
    content: Ny liona tanora mierona maniry toha
  - type: text
    content: Ka mitady ny haniny avy amin’Andriamanitra.
  '22':
  - type: text
    content: Miposaka ny masoandro, dia miverina ireny,
  - type: text
    content: Ary ao an-davany no amitsahany.
  '23':
  - type: text
    content: Fa ny olona kosa mivoaka ho any amin’ny tao-zavany
  - type: text
    content: Sy ny asany mandra-paharivan’ny andro.
  '24':
  - type: text
    content: Endrey ny hamaroan’ny asanao, Jehovah ô!
  - type: text
    content: Fahendrena no nanaovanao azy rehetra;
  - type: text
    content: Henika ny zavatra nataonao
  - type: note
    content: 'Na: ny harenao.'
  - type: text
    content: ' ny tany.'
  '25':
  - type: text
    content: Indro ny ranomasina sady lehibe no malalaka,
  - type: text
    content: Any no misy zava-mihetsiketsika tsy tambo isaina,
  - type: text
    content: Dia zava-miaina, na kely na lehibe.
  '26':
  - type: text
    content: Any no alehan’ny sambo
  - type: text
    content: Sy ny trozona, izay noforoninao hilaolao any.
  - type: note
    content: 'Na: holaolaovinao.'
  '27':
  - type: text
    content: Ireo rehetra ireo miandry Anao,
  - type: text
    content: Mba homenao ny haniny amin’ny fotoany.
  '28':
  - type: text
    content: Manome Hianao, dia manangona izy;
  - type: text
    content: Manokatra ny tànanao Hianao, dia voky ny soa izy;
  '29':
  - type: text
    content: Manafina ny tavanao Hianao, dia raiki-tahotra izy;
  - type: text
    content: Alainao indray ny ainy, dia maty izy
  - type: text
    content: Ka mody any amin’ny vovoka nanalana azy,
  '3':
  - type: text
    content: Ary mametraka ny rairain-drihan’ny tranony amin’ny rano,
  - type: text
    content: Sady manao ny rahona matevina ho kalesiny
  - type: text
    content: Ka mandeha amin’ny elatry ny rivotra,
  '30':
  - type: text
    content: Maniraka ny Fanahinao Hianao, dia ary izy,
  - type: text
    content: Ary manavao ny tarehin’ny tany Hianao.
  '31':
  - type: text
    content: Ho mandrakizay anie ny voninahitr’i Jehovah;
  - type: text
    content: Aoka Jehovah hifaly amin’ny asany.
  '32':
  - type: text
    content: Jereny ny tany, dia mihorohoro;
  - type: text
    content: Tendren’ny tànany ny tendrombohitra, dia midonaka.
  '33':
  - type: text
    content: Hihira ho an’i Jehovah aho, raha mbola velona koa;
  - type: text
    content: Hankalaza an’Andriamanitro aho, raha mbola miaina.
  '34':
  - type: text
    content: Ho maminy anie ny fisainako Azy;
  - type: text
    content: Izaho no hifaly amin’i Jehovah.
  '35':
  - type: text
    content: Ho lany ringana tsy ho etỳ amin’ny tany ny mpanota,
  - type: text
    content: Ary ny ratsy fanahy tsy ho etỳ intsony.
  - type: text
    content: Misaora an’i Jehovah, ry fanahiko.
  - type: text
    content: Haleloia.
  '4':
  - type: text
    content: Ary manao ny rivotra ho irany
  - type: text
    content: Sy ny lelafo ho mpanompony.
  - type: note
    content: 'Na: Manao ny anjeliny ho rivotra Ary ny mpanompony ho lelafo.'
  '5':
  - type: text
    content: Nanorina ny tany tambonin’ny fanorenany Izy,
  - type: text
    content: Mba tsy hihetsehany mandrakizay doria.
  '6':
  - type: text
    content: Ny rano lalina no nasaronao azy tahaka ny lamba;
  - type: text
    content: Nandifotra ny tendrombohitra aza ireny.
  '7':
  - type: text
    content: Noho ny teny mafy nataonao dia nandositra ny tendrombohitra,
  - type: text
    content: Noho ny feon’ny kotrokoranao dia nirifatra izy–
  '8':
  - type: text
    content: Nisondrotra ny tendrombohitra, nietry ny lohasaha–ho any amin’izay namboarinao hitoerany.
  '9':
  - type: text
    content: Efa nasianao fetra tsy hihoarany izy
  - type: text
    content: Mba tsy hiverina hanarona ny tany.
