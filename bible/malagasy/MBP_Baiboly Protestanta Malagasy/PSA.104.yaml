document_id: PSA.104,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiderana an’Andriamanitra, Mpamorona sy Mpiahy izao rehetra izao.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: MISAORA an’i Jehovah, ry fanahiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah Andriamanitro ô, lehibe indrindra Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famirapiratana sy voninahitra no fitafinao,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mampandeha loharano eny amin’ny lohasaha Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny anelanelan’ny tendrombohitra no alehan’ireny,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ka isotroan’ny bibi-dia rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy analan’ny boriki-dia ny hetahetany;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Eo amboniny no itoeran’ny voro-manidina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary eo amin’ny rantsan-kazo no anenoany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Manondra-drano ny tendrombohitra avy amin’ny tranony ambony Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vokatry ny asanao no mahavoky ny tany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mampaniry ahitra ho an’ny biby fiompy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy anana hahasoa ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamoaka hanina avy amin’ny tany,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary divay izay mampifaly ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mampinendonendo ny tavany mihoatra noho ny diloilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mofo hanohanana ny ain’ny olona.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voky ny hazon’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny sederan’i Libanona, izay namboleny;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izay anaovan’ny voron-kely ny akaniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vano, dia ao amin’ny kypreso no anaovany ny tranony.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny tendrombohitra avo dia ho an’ny osi-dia;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny harambato no fiarovana ho an’ny hyraka.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nanao ny volana ho fotoana Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny masoandro mahalala ny filentehany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mitafy ny mazava tahaka ny lamba Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamelatra ny lanitra tahaka ny lay,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mahatonga aizina Hianao, dia tonga ny alina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mivezivezy ny biby rehetra any an-ala;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny liona tanora mierona maniry toha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitady ny haniny avy amin’Andriamanitra.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Miposaka ny masoandro, dia miverina ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ao an-davany no amitsahany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa ny olona kosa mivoaka ho any amin’ny tao-zavany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny asany mandra-paharivan’ny andro.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Endrey ny hamaroan’ny asanao, Jehovah ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahendrena no nanaovanao azy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henika ny zavatra nataonao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny harenao.
      marker-yv: yv-n
    - type: text
      text: ' ny tany.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Indro ny ranomasina sady lehibe no malalaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no misy zava-mihetsiketsika tsy tambo isaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia zava-miaina, na kely na lehibe.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Any no alehan’ny sambo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny trozona, izay noforoninao hilaolao any.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: holaolaovinao.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ireo rehetra ireo miandry Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba homenao ny haniny amin’ny fotoany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Manome Hianao, dia manangona izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manokatra ny tànanao Hianao, dia voky ny soa izy;
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Manafina ny tavanao Hianao, dia raiki-tahotra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alainao indray ny ainy, dia maty izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mody any amin’ny vovoka nanalana azy,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary mametraka ny rairain-drihan’ny tranony amin’ny rano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady manao ny rahona matevina ho kalesiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandeha amin’ny elatry ny rivotra,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Maniraka ny Fanahinao Hianao, dia ary izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manavao ny tarehin’ny tany Hianao.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ho mandrakizay anie ny voninahitr’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka Jehovah hifaly amin’ny asany.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Jereny ny tany, dia mihorohoro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tendren’ny tànany ny tendrombohitra, dia midonaka.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Hihira ho an’i Jehovah aho, raha mbola velona koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hankalaza an’Andriamanitro aho, raha mbola miaina.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ho maminy anie ny fisainako Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no hifaly amin’i Jehovah.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ho lany ringana tsy ho etỳ amin’ny tany ny mpanota,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ratsy fanahy tsy ho etỳ intsony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaora an’i Jehovah, ry fanahiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haleloia.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary manao ny rivotra ho irany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny lelafo ho mpanompony.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manao ny anjeliny ho rivotra Ary ny mpanompony ho lelafo.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nanorina ny tany tambonin’ny fanorenany Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba tsy hihetsehany mandrakizay doria.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny rano lalina no nasaronao azy tahaka ny lamba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandifotra ny tendrombohitra aza ireny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Noho ny teny mafy nataonao dia nandositra ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny feon’ny kotrokoranao dia nirifatra izy–
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nisondrotra ny tendrombohitra, nietry ny lohasaha–ho any amin’izay namboarinao hitoerany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Efa nasianao fetra tsy hihoarany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba tsy hiverina hanarona ny tany.
