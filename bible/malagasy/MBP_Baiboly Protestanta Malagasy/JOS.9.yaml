document_id: JOS.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hafetsena nataon’ny Gibeonita mba tsy handringanana azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY rehefa nandre izany ny mpanjaka rehetra izay etỳ an-dafin’i Jordana, na ny tany amin’ny tany havoana, na ny tany amin’ny tany lemaka amoron-tsiraka,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sefela.
      marker-yv: yv-n
    - type: text
      text: ' na ny tany amoron’ny Ranomasina Lehibe tandrifin’i Libanona, dia ny Hetita, ny Amorita, ny Kananita, ny Perizita, ny Hivita ary ny Jebosita, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izay rehetra nataony tamin’ny mpanjaka roa tamin’ny Amorita, izay tany an-dafin’i Jordana, dia Sihona, mpanjakan’i Hesbona, sy Oga, mpanjakan’i Basana, izay tany Astarta. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny taminay ny loholonay sy ny mponina rehetra amin’ny taninay ka nanao hoe: Mitondrà vatsy eny an-tànanareo ho any amin’ny haleha, dia mandehana hitsena azy, ka lazao aminy hoe: Mpanomponao izahay; koa ankehitriny manaova fanekena aminay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Itony mofonay itony dia vao mafana no nalainay tany an-tranonay ho vatsy tamin’ny andro nivoahanay hankatỳ aminareo; fa ankehitriny, indro, efa maina sy bobongolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: torotoro.
      marker-yv: yv-n
    - type: text
      text: ' izy; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary vaovao ireto siny hoditra misy divay ireto izay nofenoinay; fa, indreo, efa triatra izy; ary efa rovitra ireto lambanay sy kapanay ireto noho ny halavitry ny naleha.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nangalan’ny olona ny vatsin’ireo, nefa tsy nanontany tamin’ny vavan’i Jehovah izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Josoa dia nanao fihavanana taminy ka nanao fanekena taminy mba tsy hamono azy; ary ny lohan’ny fiangonana koa dia nianiana taminy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa afaka hateloana no nanaovany fanekena taminy, dia reny fa mifanakaiky aminy ihany ireo sady mitoetra eo aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga ny Zanak’Isiraely ka tonga tany an-tanànan’ireo tamin’ny andro fahatelo. Ary Gibeona sy Kefira sy Berota ary Kiriata-jearima no tanànany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy namely azy ny Zanak’Isiraely, satria Jehovah, Andriamanitry ny Isiraely, no efa nianianan’ny lohan’ny fiangonana taminy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nimonomonona tamin’ireo loholona ny fiangonana rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny loholona rehetra tamin’ny fiangonana rehetra: Jehovah, Andriamanitry ny Isiraely, no efa nianiananay taminy; koa ankehitriny tsy mahazo mamely azy isika. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia niray hina niangona hiady amin’i Josoa sy ny Isiraely izy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no hataontsika aminy: Havelantsika ho velona ihany izy, fandrao hisy fahatezerana mahatratra antsika noho ny fianianana nataontsika taminy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa ny loholona taminy: Aoka ihany ho velona izy. Dia tonga mpikapa hazo sy mpantsaka rano ho an’ny fiangonana rehetra izy, araka ny teny nataon’ny loholona taminy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso azy ireo Josoa ka nanao taminy hoe: Nahoana no namitaka anay hianareo ka nanao hoe: Lavitra anareo indrindra izahay, kanjo eto aminay ihany no onenanareo? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ankehitriny voaozona hianareo, ary tsy hisy ho afaka, fa ho andevo sy ho mpikapa hazo ary ho mpantsaka rano ho an’ny tranon’Andriamanitro hianareo.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Josoa izy ireo ka nanao hoe: Satria nambara tokoa taminay mpanomponao fa Jehovah Andriamanitrao efa nandidy an’i Mosesy mpanompony hanome anareo ny tany rehetra sy handringana ny mponina rehetra amin’ny tany eo anoloanareo, ary natahotra ny ho faty izahay noho ny aminareo, ka dia nanao izany zavatra izany; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: koa ankehitriny, indreto, eto an-tànanao izahay, koa araka izay ataonao ho tsara sy marina hatao aminay dia ataovy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao izany taminy izy ka namonjy azy tamin’ny tànan’ny Zanak’Isiraely, mba tsy hahafaty azy ireo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia natolotr’i Josoa tamin’izany andro izany ireo ho mpikapa hazo sy ho mpantsaka rano ho an’ny fiangonana sy ho an’ny alitaran’i Jehovah mandraka andro-any, eo amin’ny tany izay hofidiny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mponina tao Gibeona nahare izay nanaovan’i Josoa an’i Jeriko sy Ay, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nanao hafetsena kosa izy ka nandeha, ary nody ho iraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nitondra vatsy.
      marker-yv: yv-n
    - type: text
      text: ' ka nitondra lasaka tonta nasampiny teo amin’ny borikiny sy siny hoditra tonta sady triatra ka nofehipehezina nasiany divay, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary kapa tonta sady nitampintampina teo amin’ny tongony, ary lamba tonta notafiny; ary efa maina sy bobongolo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: torotoro.
      marker-yv: yv-n
    - type: text
      text: ' ny mofo rehetra izay vatsiny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany amin’i Josoa teo an-toby tany Gilgala izy ireo ka niteny taminy sy tamin’ny Israelita nanao hoe: Avy any an-tany lavitra izahay; koa ankehitriny mba manaova fanekena aminay hianareo.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny Israelita tamin’ireo Hivita ireo: Angamba mponina ato aminay ihany hianareo, ka hataonay ahoana no fanao fanekena aminareo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izy tamin’i Josoa: Mpanomponao izahay.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Josoa taminy: Iza moa hianareo, ary avy aiza? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy ireo taminy: Avy tany an-tany lavitra indrindra izahay mpanomponao noho ny anaran’i Jehovah Andriamanitrao; fa efa renay ny lazany sy izay rehetra nataony tany Egypta '
