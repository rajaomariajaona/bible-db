document_id: DEU.33,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tso-drano nataon’i Mosesy tamin’ny firenen’Isiraely.
  - type: text
    content: 'ARY izao no tso-drano nataon’i Mosesy, lehilahin’Andriamanitra, tamin’ny Zanak’Isiraely, rehefa nadiva ho faty izy. '
  '10':
  - type: text
    content: Jakoba no hampianariny ny fitsipikao,
  - type: text
    content: Ary Isiraely ny lalànao;
  - type: text
    content: Hametraka ditin-kazo manitra eo anatrehanao
  - type: note
    content: Heb. eo am-bavoronao.
  - type: text
    content: ' izy'
  - type: text
    content: Sy fanatitra dorana eo ambonin’ny alitaranao.
  '11':
  - type: text
    content: Jehovah ô, tahio ny heriny,
  - type: text
    content: Ary aoka ho sitrakao ny asan’ny tànany;
  - type: text
    content: Asio mafy ny valahan’izay mitsangana hiady aminy,
  - type: text
    content: ka aoka tsy hiarina intsony izay mankahala azy.
  '12':
  - type: text
    content: 'Ary ny amin’i BENJAMIN dia hoy izy:'
  - type: text
    content: Ny malalan’i Jehovah honina fahizay eo aminy,
  - type: text
    content: Dia halofany mandrakariva,
  - type: text
    content: Ary hobabeny eo an-damosiny.
  - type: note
    content: Heb. hitoetra eo anelanelan’ny sorony.
  '13':
  - type: text
    content: Ary ny amin’i JOSEFA dia hoy izy:–
  - type: text
    content: Hotahin’i Jehovah anie ny taniny
  - type: text
    content: Amin’ny zava-tsoan’ny lanitra, dia amin’ny ando,
  - type: text
    content: Ary amin’ny rano lalina mamitsaka any ambany,
  '14':
  - type: text
    content: Ary amin’ny zava-tsoa vokatry ny masoandro
  - type: text
    content: Sy ny voan-javatra soa vokatry ny volana,
  '15':
  - type: text
    content: Ary amin’ny zava-malaza avy amin’ny tendrombohitra fahagola
  - type: text
    content: Sy ny zava-tsoa avy amin’ny havoana mandrakizay
  '16':
  - type: text
    content: Mbamin’ny zava-tsoan’ny tany sy izay rehetra eo aminy
  - type: text
    content: Sy ny fankasitrahan’Izay nitoetra tao amin’ilay roimemy;
  - type: note
    content: Heb. sene; izahao Eks. iii.2.
  - type: text
    content: Ary aoka ho tonga eo an-dohan’i Josefa izany,
  - type: text
    content: Dia eo an-tampon-dohan’ilay nalaza tamin’ny rahalahiny.
  '17':
  - type: text
    content: Ny voalohan-teraky ny ombiny dia malaza,
  - type: text
    content: Tandrok’ombimanga ny tandrony;
  - type: text
    content: Izany no hanotoany ny firenena rehetra,
  - type: text
    content: Dia ny faran’ny tany;
  - type: text
    content: Ireo no alinalin’i Efraima
  - type: text
    content: Sy arivoarivon’i Manase.
  '18':
  - type: text
    content: 'Ary ny amin’i ZEBOLONA dia hoy izy:'
  - type: text
    content: Mifalia, ry Zebolona, amin’izay alehanao,
  - type: text
    content: Ary hianao, ry ISAKARA, ao an-dainao.
  '19':
  - type: text
    content: Firenena no antsoiny hankao an-tendrombohitra,
  - type: text
    content: Ary ao no hamonoany zavatra ho fanati-pahamarinana;
  - type: text
    content: Fa hitsentsitra ny haren’ny ranomasina izy
  - type: text
    content: Sy ny zava-tsoa miafina ao amin’ny fasika.
  '2':
  - type: text
    content: 'Hoy izy:'
  - type: text
    content: Jehovah avy tao Sinay,
  - type: text
    content: Ary niseho taminy avy tany Seïra;
  - type: text
    content: Niposaka namirapiratra avy tany an-tendrombohitra Parana Izy;
  - type: text
    content: Ary avy tao amin’ny masiny tsy omby alinalina;
  - type: text
    content: Ary teo ankavanany nisy lalàn’afo
  - type: note
    content: 'Na: afo manelatselatra.'
  - type: text
    content: ' ho an’ireo.'
  '20':
  - type: text
    content: Ary ny amin’i GADA dia hoy izy;
  - type: text
    content: Isaorana anie Izay manome malalaka ho an’i Gada;
  - type: text
    content: Mamitsaka tahaka ny liombavy izy
  - type: text
    content: Ka mamiravira ny sandry mbamin’ny tampon-doha.
  '21':
  - type: text
    content: Nizaha izay tsara indrindra
  - type: note
    content: Heb. voalohany.
  - type: text
    content: ' ho an’ny tenany izy,'
  - type: text
    content: Fa teo ny anjaran’ny mpanao lalàna no efa voatokana.
  - type: note
    content: Heb. voatahiry.
  - type: text
    content: Niaraka tamin’ny lohan’ny firenena izy,
  - type: text
    content: Ary araka ny fahamarinan’i Jehovah ny nataony,
  - type: text
    content: Sy araka ny fitsipiny izay iombonany amin’ny Isiraely.
  '22':
  - type: text
    content: 'Ary ny amin’i DANA dia hoy izy:'
  - type: text
    content: Dana dia zana-diona;
  - type: text
    content: Miantsampy avy ao Basana izy.
  '23':
  - type: text
    content: 'Ary ny amin’i NAFTALY dia hoy izy:'
  - type: text
    content: Ry Naftaly, voky fankasitrahana
  - type: text
    content: Ka feno ny fitahian’i Jehovah,
  - type: text
    content: Mandovà ny andrefana
  - type: note
    content: 'Na: ranomasina.'
  - type: text
    content: ' sy ny atsimo anie hianao.'
  '24':
  - type: text
    content: 'Ary ny amin’i ASERA dia hoy izy:'
  - type: text
    content: Aoka hotahina mihoatra noho ny zaza maro Asera,
  - type: text
    content: Ary hankasitrahana mihoatra noho
  - type: note
    content: 'Na: hankasitrahan’.'
  - type: text
    content: ' ny rahalahiny izy'
  - type: text
    content: Ka hanoboka ny tongony amin’ny diloilo.
  '25':
  - type: text
    content: Ho vy sy varahina ny hidinao;
  - type: note
    content: 'Na: kiraronao'
  - type: text
    content: Ary hifamatra amin’ny andronao ny fiadananao.
  - type: note
    content: 'Na: Ary ho araka ny andronao ny herinao.'
  '26':
  - type: text
    content: Ry Jesorona,
  - type: note
    content: Jesorona dia anaran’ny Isiraely.
  - type: text
    content: ' tsy misy tahaka an’Andriamanitra,'
  - type: text
    content: Izay mitaingina ny lanitra hamonjy anao,
  - type: text
    content: Sady mandia ny rahona amin’ny voninahiny.
  '27':
  - type: text
    content: Ny Andriamanitra hatrizay hatrizay no fonenana,
  - type: text
    content: Ary ny sandry mandrakizay no eto ambany.
  - type: text
    content: Mandroaka ny fahavalo eo anoloanao Izy
  - type: text
    content: 'Ka manao hoe: Aringano.'
  '28':
  - type: text
    content: Ary mandry fahizay Isiraely,
  - type: text
    content: Mitokana irery ny loharanon’i Jakoba
  - type: text
    content: Ao amin’ny tany be vary sy ranom-boaloboka,
  - type: text
    content: Eny, mampilatsaka ando ny lanitra eo amboniny.
  '29':
  - type: text
    content: Sambatra hianao, ry Isiraely;
  - type: text
    content: Iza no tahaka anao, ry olona voavonjin’i Jehovah,
  - type: text
    content: Ampingan’ny famonjena anao sy sabatry ny voninahitrao!
  - type: text
    content: Hikoy anao ny fahavalonao.
  - type: text
    content: Ary hianao handia ny fitoerany avo.
  '3':
  - type: text
    content: Eny, tia ireo firenena Izy;
  - type: text
    content: Eo an-tànanao avokoa ny masiny rehetra;
  - type: text
    content: Miandry eo anilan’ny tongotrao ireo
  - type: text
    content: Ka samy mandray amin’ny teninao.
  '4':
  - type: text
    content: Lalàna no nandidian’i Mosesy antsika
  - type: text
    content: Ho lovan’ny fiangonan’i Jakoba.
  '5':
  - type: text
    content: Ary tonga mpanjakan’i Jesorona
  - type: note
    content: Jesorona dia anaran’ny Isiraely.
  - type: text
    content: ' Izy,'
  - type: text
    content: Rehefa tafangona ny lehiben’ny vahoaka
  - type: text
    content: Sy ny firenen’Isiraely rehetra.
  '6':
  - type: text
    content: Aoka ho velona ROBENA, fa tsy ho faty,
  - type: text
    content: Nefa aoka ho vitsy olona izy.
  '7':
  - type: text
    content: 'Ary ny amin’i JODA dia izao–hoy izy:'
  - type: text
    content: Jehovah ô, mihainoa ny feon’i Joda,
  - type: text
    content: Ka ento ho amin’ny olony izy.
  - type: text
    content: Ny tànany no hiadiany ho azy,
  - type: note
    content: 'Na: Aoka ho ampy azy ny tànany.'
  - type: text
    content: Ka manampia azy Hianao hamelezany ny mpandrafy azy.
  '8':
  - type: text
    content: 'Ary ny amin’i LEVY dia hoy izy:'
  - type: text
    content: Ny Tomimanao sy ny Orimanao dia amin’ny olonao masina.
  - type: text
    content: Izay nizahanao toetra tao Masa
  - type: text
    content: Sy nifamalianao tao amin’ny ranon’i Meriba,–
  '9':
  - type: text
    content: 'Izay nilaza ny rainy sy ny reniny hoe: Tsy mahita azy aho,'
  - type: text
    content: Sady tsy nahalala izay rahalahiny izy,
  - type: text
    content: Ary izay zanany aza dia tsy fantany;
  - type: text
    content: Fa nitandrina ny teninao izy
  - type: text
    content: Ka nitana ny fanekenao.
