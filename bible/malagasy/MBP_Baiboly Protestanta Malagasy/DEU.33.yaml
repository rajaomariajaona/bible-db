document_id: DEU.33
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tso-drano nataon’i Mosesy tamin’ny firenen’Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY izao no tso-drano nataon’i Mosesy, lehilahin’Andriamanitra, tamin’ny Zanak’Isiraely, rehefa nadiva ho faty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah avy tao Sinay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niseho taminy avy tany Seïra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niposaka namirapiratra avy tany an-tendrombohitra Parana Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary avy tao amin’ny masiny tsy omby alinalina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary teo ankavanany nisy lalàn’afo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: afo manelatselatra.
    marker-yv: yv-n
  - type: text
    text: ' ho an’ireo.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, tia ireo firenena Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo an-tànanao avokoa ny masiny rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miandry eo anilan’ny tongotrao ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka samy mandray amin’ny teninao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lalàna no nandidian’i Mosesy antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lovan’ny fiangonan’i Jakoba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary tonga mpanjakan’i Jesorona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jesorona dia anaran’ny Isiraely.
    marker-yv: yv-n
  - type: text
    text: ' Izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa tafangona ny lehiben’ny vahoaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny firenen’Isiraely rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ho velona ROBENA, fa tsy ho faty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa aoka ho vitsy olona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny amin’i JODA dia izao–hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah ô, mihainoa ny feon’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ento ho amin’ny olony izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànany no hiadiany ho azy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aoka ho ampy azy ny tànany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manampia azy Hianao hamelezany ny mpandrafy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny amin’i LEVY dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Tomimanao sy ny Orimanao dia amin’ny olonao masina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nizahanao toetra tao Masa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nifamalianao tao amin’ny ranon’i Meriba,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay nilaza ny rainy sy ny reniny hoe: Tsy mahita azy aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy nahalala izay rahalahiny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay zanany aza dia tsy fantany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nitandrina ny teninao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nitana ny fanekenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jakoba no hampianariny ny fitsipikao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Isiraely ny lalànao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hametraka ditin-kazo manitra eo anatrehanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eo am-bavoronao.
    marker-yv: yv-n
  - type: text
    text: ' izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fanatitra dorana eo ambonin’ny alitaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah ô, tahio ny heriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho sitrakao ny asan’ny tànany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asio mafy ny valahan’izay mitsangana hiady aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ka aoka tsy hiarina intsony izay mankahala azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny amin’i BENJAMIN dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny malalan’i Jehovah honina fahizay eo aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia halofany mandrakariva,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hobabeny eo an-damosiny.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hitoetra eo anelanelan’ny sorony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny amin’i JOSEFA dia hoy izy:–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotahin’i Jehovah anie ny taniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny zava-tsoan’ny lanitra, dia amin’ny ando,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny rano lalina mamitsaka any ambany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary amin’ny zava-tsoa vokatry ny masoandro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny voan-javatra soa vokatry ny volana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary amin’ny zava-malaza avy amin’ny tendrombohitra fahagola
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny zava-tsoa avy amin’ny havoana mandrakizay
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mbamin’ny zava-tsoan’ny tany sy izay rehetra eo aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fankasitrahan’Izay nitoetra tao amin’ilay roimemy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sene; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Eks. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: iii.2.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho tonga eo an-dohan’i Josefa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eo an-tampon-dohan’ilay nalaza tamin’ny rahalahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny voalohan-teraky ny ombiny dia malaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandrok’ombimanga ny tandrony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no hanotoany ny firenena rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny faran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo no alinalin’i Efraima
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy arivoarivon’i Manase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny amin’i ZEBOLONA dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifalia, ry Zebolona, amin’izay alehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianao, ry ISAKARA, ao an-dainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Firenena no antsoiny hankao an-tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao no hamonoany zavatra ho fanati-pahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hitsentsitra ny haren’ny ranomasina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny zava-tsoa miafina ao amin’ny fasika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny amin’i GADA dia hoy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isaorana anie Izay manome malalaka ho an’i Gada;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamitsaka tahaka ny liombavy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mamiravira ny sandry mbamin’ny tampon-doha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nizaha izay tsara indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voalohany.
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny tenany izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa teo ny anjaran’ny mpanao lalàna no efa voatokana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voatahiry.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niaraka tamin’ny lohan’ny firenena izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary araka ny fahamarinan’i Jehovah ny nataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy araka ny fitsipiny izay iombonany amin’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny amin’i DANA dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dana dia zana-diona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantsampy avy ao Basana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny amin’i NAFTALY dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Naftaly, voky fankasitrahana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka feno ny fitahian’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandovà ny andrefana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ranomasina.
    marker-yv: yv-n
  - type: text
    text: ' sy ny atsimo anie hianao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny amin’i ASERA dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hotahina mihoatra noho ny zaza maro Asera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hankasitrahana mihoatra noho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hankasitrahan’.
    marker-yv: yv-n
  - type: text
    text: ' ny rahalahiny izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanoboka ny tongony amin’ny diloilo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho vy sy varahina ny hidinao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: kiraronao
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hifamatra amin’ny andronao ny fiadananao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary ho araka ny andronao ny herinao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ry Jesorona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Jesorona dia anaran’ny Isiraely.
    marker-yv: yv-n
  - type: text
    text: ' tsy misy tahaka an’Andriamanitra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mitaingina ny lanitra hamonjy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mandia ny rahona amin’ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny Andriamanitra hatrizay hatrizay no fonenana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sandry mandrakizay no eto ambany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandroaka ny fahavalo eo anoloanao Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao hoe: Aringano.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary mandry fahizay Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitokana irery ny loharanon’i Jakoba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny tany be vary sy ranom-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mampilatsaka ando ny lanitra eo amboniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Sambatra hianao, ry Isiraely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no tahaka anao, ry olona voavonjin’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampingan’ny famonjena anao sy sabatry ny voninahitrao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hikoy anao ny fahavalonao.
- type: usfm
  marker: q1
