document_id: EXO.23
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza manangan-tsaho foana. Aza mifandray tànana amin’ny ratsy fanahy ho vavolombelona mampidi-doza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aza manaraka ny maro hanao ratsy; ary aza mamaly ny amin’ny adin’olona hivily hanaraka ny maro hamadika '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'ny rariny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza mandravaka ny tenin’ny malahelo eo amin’ny fandaharan-teniny hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha hitanao mania ny ombin’ny fahavalonao, na ny borikiny, dia avereno any aminy mihitsy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha hitanao ny borikin’izay mankahala anao mihonaka ao ambanin’ny entany, dia aza malaina hamonjy azy hianao, fa manampia ny namanao hamaha azy tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza mamily ny rariny izay ananan’ny malahelo ao aminao, raha manana ady izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manalavira izay teny lainga, ary aza mamono izay tsy manan-tsiny sy izay marina hianao; fa tsy hanamarina ny meloka Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary aza mandray kolikoly, fa ny kolikoly mahajamba ny mason’ny mahiratra sy mamadika ny tenin’ny marina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary aza mampahory vahiny, fa hianareo mahalala ny fon’ny vahiny, satria efa mba vahiny tany amin’ny tany Egypta ihany hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary enin-taona no hamafazanao amin’ny taninao sy hanangonanao ny vokatra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: fa amin’ny taona fahafito kosa dia hatsahatrao tsy hovolena izy, mba hisy hohanin’ny malahelo amin’ny firenenao; ary izay sisan’ireo dia mba hohanin’ny biby any an-tsaha kosa. Toy izany koa no hataonao amin’ny tanimboalobokao sy amin’ny taninolivanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Henemana no hanaovanao ny raharahanao; fa amin’ny andro fahafito dia hitsahatra hianao, mba hialan’ny ombinao sy ny borikinao sasatra, ary mba hakan’ny zanaky ny ankizivavinao sy ny vahiny aina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary tandremo izay rehetra nolazaiko taminareo, ka aza manonona ny anaran’andriamani-kafa akory hianareo; aza avela ho re avy amin’ny vavanao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Intelo isan-kerintaona no hanaovanao andro firavoravoana ho Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tandremo ny andro firavoravoana fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nandidiako anao, amin’ny fotoan’andro amin’ny volana Abiba, fa tamin’izany no nivoahanao avy tany Egypta; ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tandremo koa ny andro firavoravoana amin’ny fijinjana ny voaloham-bokatry ny asanao, izay nafafinao tany an-tsaha, sy ny andro firavoravoana amin’ny fanangonana amin’ny faran’ny taona, raha manangona ny vokatry ny asanao avy any an-tsaha hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia intelo isan-kerintaona no hisehoan’ny lehilahy rehetra aminareo eo anatrehan’i Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aza manatitra ny ran’ny zavatra vonoina hatao fanatitra ho Ahy hianao, raha mbola misy masirasira ao aminao; ary aza avela ho tra-maraina ny saboran’ny zavatra vonoina amin’ny andro firavoravoana ho Ahy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay tsara indrindra amin’ny zavatra vonoina hatao fanatitra ho Ahy.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny santatry ny voaloham-bokatry ny taninao dia ho entinao ao an-tranon’i Jehovah Andriamanitrao. Aza mahandro zanak’osy amin’ny rononon-dreniny.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niantohan’Andriamanitra hiaro ny Zanak’Isiraely sy hamponina azy soa aman-tsara ao amin’ny tany Kanana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'INDRO, Izaho maniraka Anjely eo alohanao hiaro anao any an-dàlana sy hitondra anao ho any amin’ny fitoerana izay namboariko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mitandrema eo anatrehany, ka mihainoa ny feony, ary aza mampahatezitra Azy; fa tsy hamela ny fahotanareo Izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'fa ny anarako no ao aminy. Fa raha hihaino ny feony tokoa hianao ka hanao izay rehetra lazaiko, dia ho fahavalon’ny fahavalonao sy ho rafin’ny rafinao Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa handeha eo alohanao ny Anjeliko ka hitondra anao any amin’ny Amorita sy ny Hetita sy ny Perizita sy ny Kananita sy ny Hivita ary ny Jebosita; ary dia hofongorako ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aza miankohoka eo anatrehan’ny andriamanitr’ireny hianao, na manompo azy, na manao araka ny ataony; fa aringano tokoa izy, ary torotoroy tokoa ny tsangam-baton-tsampiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa manompoa an’i Jehovah Andriamanitrareo, dia hitahy ny haninao sy ny ranonao Izy; ary hesoriko aminao ny aretina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tsy hisy ho afa-jaza na ho momba ao amin’ny taninao; hotanterahiko ny isan’ny andronao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hampandeha ny fahatahorana Ahy eo alohanao Aho ka hampifanaritaka ny firenena rehetra izay alehanao, ary hampiamboho ny fahavalonao rehetra anao Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hampandeha fanenitra eo alohanao Aho, ka handroaka ny Hivita sy ny Kananita ary ny Hetita eo alohanao ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tsy handroaka azy eo alohanao amin’ny taona iray Aho, fandrao ho lao ny tany, ka hihamaro hamely anao ny bibi-dia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsikelikely no handroahako azy eo alohanao mandra-pahamaronao ka handova ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary hatramin’ny Ranomasina Mena ka hatramin’ny ranomasin’ny Filistina no hataoko fari-taninao, ary hatramin’ny efitra ka hatramin’ny Ony;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
  - type: text
    text: ' fa hanolotra ny mponina amin’ny tany ho eo an-tànanareo Aho; ary handroaka azy eo alohanao hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aza manao fanekena aminy na amin’ny andriamaniny hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tsy honina eo amin’ny taninao ireny, fandrao hampanota anao amiko; fa raha manompo ny andriamaniny hianao, dia ho fandrika aminao tokoa izany.
