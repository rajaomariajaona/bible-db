document_id: EXO.23,873
type_code: plt
verses:
  '1':
  - type: text
    content: Aza manangan-tsaho foana. Aza mifandray tànana amin’ny ratsy fanahy ho vavolombelona mampidi-doza.
  '10':
  - type: text
    content: 'Ary enin-taona no hamafazanao amin’ny taninao sy hanangonanao ny vokatra; '
  '11':
  - type: text
    content: fa amin’ny taona fahafito kosa dia hatsahatrao tsy hovolena izy, mba hisy hohanin’ny malahelo amin’ny firenenao; ary izay sisan’ireo dia mba hohanin’ny biby any an-tsaha kosa. Toy izany koa no hataonao amin’ny tanimboalobokao sy amin’ny taninolivanao.
  '12':
  - type: text
    content: Henemana no hanaovanao ny raharahanao; fa amin’ny andro fahafito dia hitsahatra hianao, mba hialan’ny ombinao sy ny borikinao sasatra, ary mba hakan’ny zanaky ny ankizivavinao sy ny vahiny aina.
  '13':
  - type: text
    content: Ary tandremo izay rehetra nolazaiko taminareo, ka aza manonona ny anaran’andriamani-kafa akory hianareo; aza avela ho re avy amin’ny vavanao izany.
  '14':
  - type: text
    content: 'Intelo isan-kerintaona no hanaovanao andro firavoravoana ho Ahy. '
  '15':
  - type: text
    content: 'Tandremo ny andro firavoravoana fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nandidiako anao, amin’ny fotoan’andro amin’ny volana Abiba, fa tamin’izany no nivoahanao avy tany Egypta; ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehako. '
  '16':
  - type: text
    content: 'Ary tandremo koa ny andro firavoravoana amin’ny fijinjana ny voaloham-bokatry ny asanao, izay nafafinao tany an-tsaha, sy ny andro firavoravoana amin’ny fanangonana amin’ny faran’ny taona, raha manangona ny vokatry ny asanao avy any an-tsaha hianao. '
  '17':
  - type: text
    content: Dia intelo isan-kerintaona no hisehoan’ny lehilahy rehetra aminareo eo anatrehan’i Jehovah Tompo.
  '18':
  - type: text
    content: Aza manatitra ny ran’ny zavatra vonoina hatao fanatitra ho Ahy hianao, raha mbola misy masirasira ao aminao; ary aza avela ho tra-maraina ny saboran’ny zavatra vonoina amin’ny andro firavoravoana ho Ahy.
  - type: note
    content: 'Na: izay tsara indrindra amin’ny zavatra vonoina hatao fanatitra ho Ahy.'
  '19':
  - type: text
    content: Ny santatry ny voaloham-bokatry ny taninao dia ho entinao ao an-tranon’i Jehovah Andriamanitrao. Aza mahandro zanak’osy amin’ny rononon-dreniny.
  - type: heading
    content: Ny niantohan’Andriamanitra hiaro ny Zanak’Isiraely sy hamponina azy soa aman-tsara ao amin’ny tany Kanana.
  '2':
  - type: text
    content: 'Aza manaraka ny maro hanao ratsy; ary aza mamaly ny amin’ny adin’olona hivily hanaraka ny maro hamadika '
  - type: text
    content: 'ny rariny. '
  '20':
  - type: text
    content: 'INDRO, Izaho maniraka Anjely eo alohanao hiaro anao any an-dàlana sy hitondra anao ho any amin’ny fitoerana izay namboariko. '
  '21':
  - type: text
    content: 'Mitandrema eo anatrehany, ka mihainoa ny feony, ary aza mampahatezitra Azy; fa tsy hamela ny fahotanareo Izy; '
  '22':
  - type: text
    content: 'fa ny anarako no ao aminy. Fa raha hihaino ny feony tokoa hianao ka hanao izay rehetra lazaiko, dia ho fahavalon’ny fahavalonao sy ho rafin’ny rafinao Aho. '
  '23':
  - type: text
    content: Fa handeha eo alohanao ny Anjeliko ka hitondra anao any amin’ny Amorita sy ny Hetita sy ny Perizita sy ny Kananita sy ny Hivita ary ny Jebosita; ary dia hofongorako ireny.
  '24':
  - type: text
    content: Aza miankohoka eo anatrehan’ny andriamanitr’ireny hianao, na manompo azy, na manao araka ny ataony; fa aringano tokoa izy, ary torotoroy tokoa ny tsangam-baton-tsampiny.
  '25':
  - type: text
    content: Fa manompoa an’i Jehovah Andriamanitrareo, dia hitahy ny haninao sy ny ranonao Izy; ary hesoriko aminao ny aretina.
  '26':
  - type: text
    content: 'Tsy hisy ho afa-jaza na ho momba ao amin’ny taninao; hotanterahiko ny isan’ny andronao. '
  '27':
  - type: text
    content: 'Hampandeha ny fahatahorana Ahy eo alohanao Aho ka hampifanaritaka ny firenena rehetra izay alehanao, ary hampiamboho ny fahavalonao rehetra anao Aho. '
  '28':
  - type: text
    content: 'Ary hampandeha fanenitra eo alohanao Aho, ka handroaka ny Hivita sy ny Kananita ary ny Hetita eo alohanao ireny. '
  '29':
  - type: text
    content: 'Tsy handroaka azy eo alohanao amin’ny taona iray Aho, fandrao ho lao ny tany, ka hihamaro hamely anao ny bibi-dia. '
  '3':
  - type: text
    content: Aza mandravaka ny tenin’ny malahelo eo amin’ny fandaharan-teniny hianao.
  '30':
  - type: text
    content: Tsikelikely no handroahako azy eo alohanao mandra-pahamaronao ka handova ny tany.
  '31':
  - type: text
    content: Ary hatramin’ny Ranomasina Mena ka hatramin’ny ranomasin’ny Filistina no hataoko fari-taninao, ary hatramin’ny efitra ka hatramin’ny Ony;
  - type: note
    content: Eofrata.
  - type: text
    content: ' fa hanolotra ny mponina amin’ny tany ho eo an-tànanareo Aho; ary handroaka azy eo alohanao hianao. '
  '32':
  - type: text
    content: 'Aza manao fanekena aminy na amin’ny andriamaniny hianao. '
  '33':
  - type: text
    content: Tsy honina eo amin’ny taninao ireny, fandrao hampanota anao amiko; fa raha manompo ny andriamaniny hianao, dia ho fandrika aminao tokoa izany.
  '4':
  - type: text
    content: 'Raha hitanao mania ny ombin’ny fahavalonao, na ny borikiny, dia avereno any aminy mihitsy izany. '
  '5':
  - type: text
    content: Raha hitanao ny borikin’izay mankahala anao mihonaka ao ambanin’ny entany, dia aza malaina hamonjy azy hianao, fa manampia ny namanao hamaha azy tokoa.
  '6':
  - type: text
    content: Aza mamily ny rariny izay ananan’ny malahelo ao aminao, raha manana ady izy.
  '7':
  - type: text
    content: Manalavira izay teny lainga, ary aza mamono izay tsy manan-tsiny sy izay marina hianao; fa tsy hanamarina ny meloka Aho.
  '8':
  - type: text
    content: Ary aza mandray kolikoly, fa ny kolikoly mahajamba ny mason’ny mahiratra sy mamadika ny tenin’ny marina.
  '9':
  - type: text
    content: Ary aza mampahory vahiny, fa hianareo mahalala ny fon’ny vahiny, satria efa mba vahiny tany amin’ny tany Egypta ihany hianareo.
