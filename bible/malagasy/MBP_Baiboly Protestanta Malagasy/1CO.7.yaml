document_id: 1CO.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fanambadiana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ny amin’ireo zavatra nosoratanareo, dia tsara amin’ny lehilahy raha tsy mikasi-behivavy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Anefa noho ny fijangajangana dia aoka ny lehilahy rehetra samy hanana ny vadiny avy, ary aoka koa ny vehivavy rehetra samy hanana ny vadiny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka ny lahy hanao izay mety hatao amin’ny vavy; ary mba toy izany koa ny vavy amin’ny lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny vavy tsy manam-pahefana amin’ny tenany, fa ny lahy; ary mba toy izany koa ny lahy tsy manam-pahefana amin’ny tenany, fa ny vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aza misara-pandriana hianareo, raha tsy amin’izay andro sasany ifanekenareo ho andro hivavahana, nefa mbola hiraisanareo fandriana indray, mba tsy hakan’i Satana fanahy anareo noho ny tsi-faharetanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fandeferana anefa no anaovako izany, fa tsy mandidy aho. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa tiako ho tahaka ahy ny olona rehetra; kanefa samy manana izay fanomezam-pahasoavana nomen’Andriamanitra azy avy, ka ny anankiray toy izao, ary ny anankiray toy izao kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy izaho amin’ny tsy manam-bady sy ny mpitondratena kosa: Tsara aminy raha mitoetra tahaka ahy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa raha tsy maharitra izy, dia aoka hanam-bady ihany; fa tsara ny manam-bady noho ny ho maimay. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny manam-bady dia didiako, nefa tsy izaho, fa ny Tompo: Aoka tsy hiala amin’ny lahy ny vavy '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(nefa raha misy efa niala, dia aoka hitoetra tsy manam-bady, na aoka hody amin’ny lahy); ary ny lahy aoka tsy hiala amin’ny vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa amin’ny sisa, dia hoy izaho, fa tsy ny Tompo: Raha misy rahalahy manam-bady tsy mino, ary mety mitoetra aminy ihany ny vavy, dia aoka tsy hialany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha misy vehivavy manam-bady tsy mino, ka mety mitoetra aminy ihany ny lahy, dia aoka tsy hialany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny lahy tsy mino dia efa masina ao amin’ny vavy ary ny vavy tsy mino dia efa masina ao amin’ny rahalahy; raha tsy izany kosa, dia tsy madio ny zanakareo; fa raha izany, dia masina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha ny tsy mino no miala, aoka hiala izy. Na rahalahy na anabavy dia tsy voafehy amin’izany; fa Andriamanitra efa niantso antsika amin’ny fihavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa ahoana moa no ahafantaranao, ravehivavy, na hovonjenao ny vadinao, na tsia? Ary ahoana no ahafantaranao, ralehilahy, na hovonjenao ny vadinao, na tsia?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Kanefa aoka ny olona rehetra samy handeha araka izay anjarany nomen’ny Tompo azy sy araka ny niantsoan’Andriamanitra azy avy. Ary izany no andidiako ao amin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Misy nantsoina voafora va? Aoka izy tsy hovana ho tsy voafora. Misy nantsoina tsy voafora va? Aoka izy tsy hoforana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsinontsinona ny famorana, ary tsinontsinona ny tsi-famorana; fa ny mitandrina ny didin’Andriamanitra no izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aoka ny olona rehetra samy hitoetra eo amin’izay toetra efa niantsoana azy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nantsoina va hianao raha mbola mpanompo? Aoka tsy hampaninona anao izany; nefa raha misy hahafahanao, aleo izany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fa na dia misy hahafahanao aza, dia aleo manaompo ihany.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny andevo izay voantso ao amin’ny Tompo dia olona afaka an’ny Tompo; toy izany koa, ny olona afaka izay voantso dia mpanompon’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa olom-boavidy hianareo, ka aza mety ho andevon’olona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ry rahalahy, aoka ny olona rehetra samy hitoetra amin’Andriamanitra ao amin’izay niantsoana azy avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa ny amin’ny virijina dia tsy manana didy avy amin’ny Tompo aho; nefa ataoko izay hevitro tahaka izay niantran’ny Tompo ahy ho mahatoky. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa izao no ataoko fa tsara amin’ny olona noho ny fahoriana miseho ankehitriny, dia ny mitoetra toy izao ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Manam-bady va hianao? Aza mitady izay hisarahana. Tsy manam-bady va hianao? Aza mitady vady. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nefa na dia hanam-bady aza hianao, dia tsy manota tsy akory; ary na dia hanam-bady aza ny virijina, dia tsy manota izy. Kanefa kosa hanam-pahoriana amin’ny nofo ireny; fa izaho miantra anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa izao no lazaiko, ry rahalahy: Efa fohy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nohafohezina.
    marker-yv: yv-n
  - type: text
    text: ' ny andro, mba ho toy ny tsy manam-bady ny manana amin’izao sisa izao; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ary mba ho toy izay tsy mitomany ny mitomany; ary mba ho toy izay tsy mifaly ny mifaly; ary mba ho toy izay tsy mahazo ny mividy; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ary mba ho toy izay tsy mahavatra izao fiainana izao loatra ny mahavatra azy, fa mandalo ny fanaon’izao fiainana izao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa tiako tsy ho maro ahina hianareo. Izay tsy manam-bady dia miahy ny an’ny Tompo mba hahafaly ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa izay manam-bady kosa miahy ny an’izao fiainana izao mba hahafaly ny vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary tsy mitovy koa ny vehivavy manam-bady sy ny virijina. Ny vehivavy tsy manam-bady mitandrina ny an’ny Tompo, mba ho samy masina avokoa ny tenany sy ny fanahiny; fa izay manam-bady kosa dia mitandrina ny an’izao fiainana izao mba hahafaly ny lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary miteny izany aho mba hahasoa anareo, fa tsy haningotra anareo amin’ny tadivavarana, fa mba hanaovanareo izay mendrika sy hitoeranareo tsara amin’ny Tompo, ka tsy hivezivezen’ny sainareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa raha misy mihevitra fa tsy mety ny fitondrany ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zanani-vavy
  - type: text
    text: ' virijina, satria mihoatra noho ny taona tokony anambadian’ny zanany, ka tsy maintsy hisy izany, dia aoka izy hanao izay sitrapony, tsy manota izy; aoka hanam-bady izy.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aoka hivady ireo.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa raha misy kosa efa mikasa tsara ao am-pony, sady tsy misy mahatery azy, fa mahazo manaraka ny safidiny ka ninia tao am-pony hiaro ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zanani-vavy
  - type: text
    text: ' virijina, dia hanao tsara izy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ka izay manome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny zanani-vavy
  - type: text
    text: ' virijina hampakarina dia manao tsara, ary izay tsy manome azy hampakarina no manao tsaratsara kokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ny vavy voafehin’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny lalàna,
  - type: text
    text: ' raha mbola velona ny lahy; fa raha maty kosa ny lahy, dia afaka hanam-bady izay tiany izy, nefa ao amin’ny Tompo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Nefa raha araka ny hevitro, sambatra kokoa izy raha mitoetra toy izao ihany; ary ataoko fa izaho koa manana ny Fanahin’Andriamanitra.
