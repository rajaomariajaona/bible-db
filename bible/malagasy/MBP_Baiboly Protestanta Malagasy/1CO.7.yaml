document_id: 1CO.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fanambadiana.
  - type: text
    content: 'ARY ny amin’ireo zavatra nosoratanareo, dia tsara amin’ny lehilahy raha tsy mikasi-behivavy akory. '
  '10':
  - type: text
    content: 'Ary ny manam-bady dia didiako, nefa tsy izaho, fa ny Tompo: Aoka tsy hiala amin’ny lahy ny vavy '
  '11':
  - type: text
    content: '(nefa raha misy efa niala, dia aoka hitoetra tsy manam-bady, na aoka hody amin’ny lahy); ary ny lahy aoka tsy hiala amin’ny vavy. '
  '12':
  - type: text
    content: 'Fa amin’ny sisa, dia hoy izaho, fa tsy ny Tompo: Raha misy rahalahy manam-bady tsy mino, ary mety mitoetra aminy ihany ny vavy, dia aoka tsy hialany izy. '
  '13':
  - type: text
    content: 'Ary raha misy vehivavy manam-bady tsy mino, ka mety mitoetra aminy ihany ny lahy, dia aoka tsy hialany izy. '
  '14':
  - type: text
    content: 'Fa ny lahy tsy mino dia efa masina ao amin’ny vavy ary ny vavy tsy mino dia efa masina ao amin’ny rahalahy; raha tsy izany kosa, dia tsy madio ny zanakareo; fa raha izany, dia masina izy. '
  '15':
  - type: text
    content: 'Fa raha ny tsy mino no miala, aoka hiala izy. Na rahalahy na anabavy dia tsy voafehy amin’izany; fa Andriamanitra efa niantso antsika amin’ny fihavanana. '
  '16':
  - type: text
    content: Fa ahoana moa no ahafantaranao, ravehivavy, na hovonjenao ny vadinao, na tsia? Ary ahoana no ahafantaranao, ralehilahy, na hovonjenao ny vadinao, na tsia?
  '17':
  - type: text
    content: Kanefa aoka ny olona rehetra samy handeha araka izay anjarany nomen’ny Tompo azy sy araka ny niantsoan’Andriamanitra azy avy. Ary izany no andidiako ao amin’ny fiangonana
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' rehetra. '
  '18':
  - type: text
    content: 'Misy nantsoina voafora va? Aoka izy tsy hovana ho tsy voafora. Misy nantsoina tsy voafora va? Aoka izy tsy hoforana. '
  '19':
  - type: text
    content: 'Tsinontsinona ny famorana, ary tsinontsinona ny tsi-famorana; fa ny mitandrina ny didin’Andriamanitra no izy. '
  '2':
  - type: text
    content: 'Anefa noho ny fijangajangana dia aoka ny lehilahy rehetra samy hanana ny vadiny avy, ary aoka koa ny vehivavy rehetra samy hanana ny vadiny avy. '
  '20':
  - type: text
    content: 'Aoka ny olona rehetra samy hitoetra eo amin’izay toetra efa niantsoana azy ihany. '
  '21':
  - type: text
    content: Nantsoina va hianao raha mbola mpanompo? Aoka tsy hampaninona anao izany; nefa raha misy hahafahanao, aleo izany.
  - type: note
    content: 'Na: fa na dia misy hahafahanao aza, dia aleo manaompo ihany.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Fa ny andevo izay voantso ao amin’ny Tompo dia olona afaka an’ny Tompo; toy izany koa, ny olona afaka izay voantso dia mpanompon’i Kristy. '
  '23':
  - type: text
    content: 'Fa olom-boavidy hianareo, ka aza mety ho andevon’olona. '
  '24':
  - type: text
    content: Ry rahalahy, aoka ny olona rehetra samy hitoetra amin’Andriamanitra ao amin’izay niantsoana azy avy.
  '25':
  - type: text
    content: 'Fa ny amin’ny virijina dia tsy manana didy avy amin’ny Tompo aho; nefa ataoko izay hevitro tahaka izay niantran’ny Tompo ahy ho mahatoky. '
  '26':
  - type: text
    content: 'Koa izao no ataoko fa tsara amin’ny olona noho ny fahoriana miseho ankehitriny, dia ny mitoetra toy izao ihany. '
  '27':
  - type: text
    content: 'Manam-bady va hianao? Aza mitady izay hisarahana. Tsy manam-bady va hianao? Aza mitady vady. '
  '28':
  - type: text
    content: 'Nefa na dia hanam-bady aza hianao, dia tsy manota tsy akory; ary na dia hanam-bady aza ny virijina, dia tsy manota izy. Kanefa kosa hanam-pahoriana amin’ny nofo ireny; fa izaho miantra anareo. '
  '29':
  - type: text
    content: 'Fa izao no lazaiko, ry rahalahy: Efa fohy'
  - type: note
    content: Gr. nohafohezina.
  - type: text
    content: ' ny andro, mba ho toy ny tsy manam-bady ny manana amin’izao sisa izao; '
  '3':
  - type: text
    content: 'Aoka ny lahy hanao izay mety hatao amin’ny vavy; ary mba toy izany koa ny vavy amin’ny lahy. '
  '30':
  - type: text
    content: 'ary mba ho toy izay tsy mitomany ny mitomany; ary mba ho toy izay tsy mifaly ny mifaly; ary mba ho toy izay tsy mahazo ny mividy; '
  '31':
  - type: text
    content: 'ary mba ho toy izay tsy mahavatra izao fiainana izao loatra ny mahavatra azy, fa mandalo ny fanaon’izao fiainana izao. '
  '32':
  - type: text
    content: 'Fa tiako tsy ho maro ahina hianareo. Izay tsy manam-bady dia miahy ny an’ny Tompo mba hahafaly ny Tompo. '
  '33':
  - type: text
    content: 'Fa izay manam-bady kosa miahy ny an’izao fiainana izao mba hahafaly ny vavy. '
  '34':
  - type: text
    content: 'Ary tsy mitovy koa ny vehivavy manam-bady sy ny virijina. Ny vehivavy tsy manam-bady mitandrina ny an’ny Tompo, mba ho samy masina avokoa ny tenany sy ny fanahiny; fa izay manam-bady kosa dia mitandrina ny an’izao fiainana izao mba hahafaly ny lahy. '
  '35':
  - type: text
    content: Ary miteny izany aho mba hahasoa anareo, fa tsy haningotra anareo amin’ny tadivavarana, fa mba hanaovanareo izay mendrika sy hitoeranareo tsara amin’ny Tompo, ka tsy hivezivezen’ny sainareo.
  '36':
  - type: text
    content: 'Fa raha misy mihevitra fa tsy mety ny fitondrany ny '
  - type: text
    content: zanani-vavy
  - type: text
    content: ' virijina, satria mihoatra noho ny taona tokony anambadian’ny zanany, ka tsy maintsy hisy izany, dia aoka izy hanao izay sitrapony, tsy manota izy; aoka hanam-bady izy.'
  - type: note
    content: Gr. aoka hivady ireo.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Fa raha misy kosa efa mikasa tsara ao am-pony, sady tsy misy mahatery azy, fa mahazo manaraka ny safidiny ka ninia tao am-pony hiaro ny '
  - type: text
    content: zanani-vavy
  - type: text
    content: ' virijina, dia hanao tsara izy. '
  '38':
  - type: text
    content: 'Ka izay manome '
  - type: text
    content: ny zanani-vavy
  - type: text
    content: ' virijina hampakarina dia manao tsara, ary izay tsy manome azy hampakarina no manao tsaratsara kokoa.'
  '39':
  - type: text
    content: Ny vavy voafehin’
  - type: text
    content: ny lalàna,
  - type: text
    content: ' raha mbola velona ny lahy; fa raha maty kosa ny lahy, dia afaka hanam-bady izay tiany izy, nefa ao amin’ny Tompo ihany. '
  '4':
  - type: text
    content: 'Ny vavy tsy manam-pahefana amin’ny tenany, fa ny lahy; ary mba toy izany koa ny lahy tsy manam-pahefana amin’ny tenany, fa ny vavy. '
  '40':
  - type: text
    content: Nefa raha araka ny hevitro, sambatra kokoa izy raha mitoetra toy izao ihany; ary ataoko fa izaho koa manana ny Fanahin’Andriamanitra.
  '5':
  - type: text
    content: 'Aza misara-pandriana hianareo, raha tsy amin’izay andro sasany ifanekenareo ho andro hivavahana, nefa mbola hiraisanareo fandriana indray, mba tsy hakan’i Satana fanahy anareo noho ny tsi-faharetanareo. '
  '6':
  - type: text
    content: 'Fandeferana anefa no anaovako izany, fa tsy mandidy aho. '
  '7':
  - type: text
    content: Fa tiako ho tahaka ahy ny olona rehetra; kanefa samy manana izay fanomezam-pahasoavana nomen’Andriamanitra azy avy, ka ny anankiray toy izao, ary ny anankiray toy izao kosa.
  '8':
  - type: text
    content: 'Fa hoy izaho amin’ny tsy manam-bady sy ny mpitondratena kosa: Tsara aminy raha mitoetra tahaka ahy izy. '
  '9':
  - type: text
    content: 'Nefa raha tsy maharitra izy, dia aoka hanam-bady ihany; fa tsara ny manam-bady noho ny ho maimay. '
