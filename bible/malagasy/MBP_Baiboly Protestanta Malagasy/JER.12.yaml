document_id: JER.12,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitarainana nataon’i Jeremia noho ny nanambinana ny ratsy fanahy, sy ny navalin’i Jehovah azy.
  - type: text
    content: RAHA mifandahatra aminao aho, Jehovah ô, dia Hianao no marina;
  - type: text
    content: 'Nefa kosa aoka ihany mba handahatra aminao aho:'
  - type: text
    content: Nahoana ary no ambinina ny làlan’ny ratsy fanahy?
  - type: text
    content: Nahoana no miadana ny mpiodina rehetra?
  '10':
  - type: text
    content: Mpitondra maro no nanimba ny tanimboaloboko,
  - type: text
    content: Nohitsakitsahiny ny anjarako;
  - type: text
    content: Nataony tany efitra lao ny anjarako mahafinaritra;
  '11':
  - type: text
    content: Nataony lao izany, eny, lao izy ka mitomany amiko;
  - type: text
    content: Nataony lao avokoa ny tany rehetra,
  - type: text
    content: Satria tsy nisy nandatsaka am-po.
  '12':
  - type: text
    content: Ny mpandrava dia tonga any amin’ny tendrombohitra mangadihady rehetra any an-efitra;
  - type: text
    content: Fa misy sabatr’i Jehovah mandringana amin’ny faran’ny tany ka hatramin’ny farany koa,
  - type: text
    content: Ka dia tsy misy fiadanana ho an’ny nofo rehetra.
  '13':
  - type: text
    content: Vary no nafafiny, fa tsilo no nojinjany;
  - type: text
    content: Nanasatra ny tenany izy, kanjo herim-po very foana izany;
  - type: text
    content: Dia hangaihay ny amin’ny zavatra azonareo hianareo
  - type: text
    content: Noho ny firehetan’ny fahatezeran’i Jehovah.
  '14':
  - type: text
    content: 'Izao no lazain’i Jehovah ny amin’ireo ratsy fanahy rehetra mifanakaiky fonenena amiko ireo, dia izay mikasikasika ny tany nomeko ho lovan’ny Isiraely oloko:'
  - type: text
    content: Indro, hongotako tsy ho amin’ny taniny ireo,
  - type: text
    content: Ary ny taranak’i Joda koa dia hongotako tsy ho eo aminy.
  '15':
  - type: text
    content: Nefa nony efa voaongotra izy, dia hamindra fo aminy indray Aho,
  - type: text
    content: Ka samy ho entiko mody any amin’ny lovany sy ny taniny avy indray izy.
  '16':
  - type: text
    content: Koa raha mba gianatra ny fanaon’ny oloko tokoa ireo
  - type: text
    content: 'Ka hianiana amin’ny anarako hoe: ,Raha velona koa Jehovah,’'
  - type: text
    content: Tahaka ny nampianaran’ireo ny oloko hianiana amin’i Bala,
  - type: text
    content: Dia haorina ao amin’ny oloko izy;
  '17':
  - type: text
    content: Fa raha tsy hankatò kosa izy, dia hongotako izany firenena izany,
  - type: text
    content: Eny, hongotako sy haringako izy, hoy Jehovah.
  '2':
  - type: text
    content: Nambolenao izy, ka dia miorim-paka;
  - type: text
    content: Mitombo izy, ka dia mamoa;
  - type: text
    content: Manakaiky Anao amin’ny vavany izy, nefa manalavitra Anao amin’ny fony.
  - type: note
    content: Heb. voany.
  '3':
  - type: text
    content: Fa Hianao, Jehovah ô, mahalala ahy;
  - type: text
    content: Mahita ahy Hianao sady mizaha toetra ny foko ny aminao;
  - type: text
    content: Sariho toy ny ondry hovonoina ireny,
  - type: text
    content: Ary atòkany
  - type: note
    content: Heb. hamasino.
  - type: text
    content: ' ho amin’ny andro hamonoana.'
  '4':
  - type: text
    content: Mandra-pahoviana no hisaonan’ny tany
  - type: text
    content: Sy hahalazoan’ny ahitra any amin’ny saha rehetra?
  - type: text
    content: Noho ny faharatsian’ny mponina any
  - type: text
    content: Dia lany ringana ny biby sy ny vorona;
  - type: text
    content: 'Fa hoy ireo: Tsy mba hahita izay hiafarantsika izy.'
  '5':
  - type: text
    content: Raha niara-nihazakazaka tamin’ny mandeha an-tongotra hianao ka voany,
  - type: text
    content: Dia hataonao ahoana no fihaika ny soavaly?
  - type: text
    content: Ary raha eny amin’ny tany miadana no anananao toky,
  - type: text
    content: Hanao ahoana kosa hianao, raha mby any amin’ny kirihitrala eny amoron’
  - type: note
    content: Heb. ny reharehany.
  - type: text
    content: ' i Jordana?'
  '6':
  - type: text
    content: Fa na dia ny rahalahinao sy ny mpianakavin’ny rainao aza
  - type: text
    content: Dia samy namitaka anao;
  - type: text
    content: Eny, niantso mafy teo aorianao ireo;
  - type: text
    content: Aza mino azy, na dia tsara fiteny aminao aza izy.
  '7':
  - type: text
    content: Nilaozako ny tranoko,
  - type: text
    content: Nafoiko ny lovako;
  - type: text
    content: Ny sombin’aiko dia natolotro ho eo an-tànan’ny fahavalony.
  '8':
  - type: text
    content: Raha amiko, ny lovako dia efa toy ny liona any an-ala;
  - type: text
    content: Mierona amiko izy, ka dia halako.
  '9':
  - type: text
    content: Moa tahaka ny vorona mpihaza hafahafa volo amiko va ny lovako,
  - type: text
    content: No mivory manodidina azy ny vorona mpihaza?
  - type: text
    content: Avia, ka angony ny bibi-dia rehetra,
  - type: text
    content: Ampanatony ireny hihinana.
