document_id: JER.12
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fitarainana nataon’i Jeremia noho ny nanambinana ny ratsy fanahy, sy ny navalin’i Jehovah azy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: RAHA mifandahatra aminao aho, Jehovah ô, dia Hianao no marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa kosa aoka ihany mba handahatra aminao aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana ary no ambinina ny làlan’ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no miadana ny mpiodina rehetra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nambolenao izy, ka dia miorim-paka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitombo izy, ka dia mamoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manakaiky Anao amin’ny vavany izy, nefa manalavitra Anao amin’ny fony.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Hianao, Jehovah ô, mahalala ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahita ahy Hianao sady mizaha toetra ny foko ny aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sariho toy ny ondry hovonoina ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary atòkany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hamasino.
    marker-yv: yv-n
  - type: text
    text: ' ho amin’ny andro hamonoana.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mandra-pahoviana no hisaonan’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hahalazoan’ny ahitra any amin’ny saha rehetra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny faharatsian’ny mponina any
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia lany ringana ny biby sy ny vorona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa hoy ireo: Tsy mba hahita izay hiafarantsika izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha niara-nihazakazaka tamin’ny mandeha an-tongotra hianao ka voany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hataonao ahoana no fihaika ny soavaly?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha eny amin’ny tany miadana no anananao toky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanao ahoana kosa hianao, raha mby any amin’ny kirihitrala eny amoron’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny reharehany.
    marker-yv: yv-n
  - type: text
    text: ' i Jordana?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa na dia ny rahalahinao sy ny mpianakavin’ny rainao aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia samy namitaka anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, niantso mafy teo aorianao ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mino azy, na dia tsara fiteny aminao aza izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nilaozako ny tranoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nafoiko ny lovako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sombin’aiko dia natolotro ho eo an-tànan’ny fahavalony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha amiko, ny lovako dia efa toy ny liona any an-ala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mierona amiko izy, ka dia halako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moa tahaka ny vorona mpihaza hafahafa volo amiko va ny lovako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No mivory manodidina azy ny vorona mpihaza?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia, ka angony ny bibi-dia rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampanatony ireny hihinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mpitondra maro no nanimba ny tanimboaloboko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nohitsakitsahiny ny anjarako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nataony tany efitra lao ny anjarako mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nataony lao izany, eny, lao izy ka mitomany amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nataony lao avokoa ny tany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy nisy nandatsaka am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny mpandrava dia tonga any amin’ny tendrombohitra mangadihady rehetra any an-efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa misy sabatr’i Jehovah mandringana amin’ny faran’ny tany ka hatramin’ny farany koa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy misy fiadanana ho an’ny nofo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vary no nafafiny, fa tsilo no nojinjany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanasatra ny tenany izy, kanjo herim-po very foana izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hangaihay ny amin’ny zavatra azonareo hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny firehetan’ny fahatezeran’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lazain’i Jehovah ny amin’ireo ratsy fanahy rehetra mifanakaiky fonenena amiko ireo, dia izay mikasikasika ny tany nomeko ho lovan’ny Isiraely oloko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hongotako tsy ho amin’ny taniny ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taranak’i Joda koa dia hongotako tsy ho eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nefa nony efa voaongotra izy, dia hamindra fo aminy indray Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka samy ho entiko mody any amin’ny lovany sy ny taniny avy indray izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa raha mba gianatra ny fanaon’ny oloko tokoa ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hianiana amin’ny anarako hoe: ,Raha velona koa Jehovah,’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny nampianaran’ireo ny oloko hianiana amin’i Bala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia haorina ao amin’ny oloko izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa raha tsy hankatò kosa izy, dia hongotako izany firenena izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hongotako sy haringako izy, hoy Jehovah.
