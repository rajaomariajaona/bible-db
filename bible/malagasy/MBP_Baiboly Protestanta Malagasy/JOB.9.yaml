document_id: JOB.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Joba.
  - type: text
    content: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Ary manao zava-dehibe tsy takatry ny saina,
  - type: text
    content: Eny, fahagagana tsy hita isa.
  '11':
  - type: text
    content: Indro, mandalo ahy Izy, nefa tsy hitako;
  - type: text
    content: Ary mihelina Izy, nefa tsy fantatro.
  '12':
  - type: text
    content: Indro, mipaoka Izy, ka iza no mahasakana Azy?
  - type: text
    content: 'Iza no hanao aminy hoe: Inona no ataonao?'
  '13':
  - type: text
    content: Andriamanitra tsy mampitony ny fahatezerany;
  - type: text
    content: Ny mpanampy an-dRahaba
  - type: note
    content: Rahaba = Rehareha.
  - type: text
    content: ' aza dia mitanondrika eo ambaniny.'
  '14':
  - type: text
    content: Mainka fa izaho tsy mahavaly Azy,
  - type: text
    content: Na mahafidy teny hifandaharako aminy;
  '15':
  - type: text
    content: Fa na dia marina aza aho, dia tsy hahavaly tsy akory;
  - type: text
    content: Hifona amin’Ilay manana ady amiko no hany heriko.
  '16':
  - type: text
    content: Raha mba niantso aho, ka namaly ahy aza Izy,
  - type: text
    content: Dia tsy ho nino aho fa hanaiky ny fitarainako Izy.
  '17':
  - type: text
    content: Fa manorotoro ahy amin’ny tafio-drivotra Izy
  - type: text
    content: Ka manamaro ny feriko tsy ahoan-tsy ahoana.
  '18':
  - type: text
    content: Sady tsy avelany haka aina akory aho,
  - type: text
    content: Fa vokisany zava-mangidy.
  '19':
  - type: text
    content: 'Raha ny amin’ny herin’ny mahery, dia: Indro ary!'
  - type: text
    content: 'Ary ny amin’ny fitsarana: Iza no hifandahatra amiko?'
  '2':
  - type: text
    content: Fantatro tokoa fa izany no izy;
  - type: text
    content: Fa aiza no hahamarina ny zanak’olombelona eo anatrehan’Andriamanitra?
  '20':
  - type: text
    content: Na dia marina aza aho, dia hanameloka ahy ihany ny vavako;
  - type: text
    content: Ary na dia tsy manan-tsiny aza aho, dia hanao ahy ho meloka Izy.
  '21':
  - type: text
    content: Marina aho,–ataoko tsinontsinona ny aiko;
  - type: text
    content: Tsy ahoako izay ho velona.
  '22':
  - type: text
    content: 'Tsy misy hafa aminy, ka izany no nanaovako hoe:'
  - type: text
    content: Ny marina sy ny meloka dia samy aringany avokoa.
  '23':
  - type: text
    content: Raha misy loza
  - type: note
    content: Heb. fikapohana.
  - type: text
    content: ' mahafaty tampoka,'
  - type: text
    content: Dia mihomehy ny fizahan-toetra ny marina Izy.
  '24':
  - type: text
    content: Ny tany efa voatolotra ho eo an-tànan’ny ratsy fanahy;
  - type: text
    content: Manarona ny tavan’ny mpitsara eo Izy;
  - type: text
    content: Raha tsy Izy no manao izany, dia iza kosa ary?
  '25':
  - type: text
    content: Ny androko dia faingana noho ny tsimandoa;
  - type: text
    content: Lasa ireny ka tsy nahita soa akory.
  '26':
  - type: text
    content: Mihelina tahaka ny lakana faingam-pandeha
  - type: note
    content: Heb. lakana zozoro.
  - type: text
    content: ' izy,'
  - type: text
    content: Tahaka ny voromahery mipaoka hanina.
  '27':
  - type: text
    content: 'Raha hoy izaho: Hanadino ny alaheloko aho,'
  - type: text
    content: Hitsahatra tsy hanjonitra aho ka ho miramirana,
  '28':
  - type: text
    content: Dia mahatsiravina ahy ny fahoriako rehetra;
  - type: text
    content: Fantatro fa tsy hataonao ho tsy manan-tsiny aho.
  '29':
  - type: text
    content: Tsy maintsy hatao ho meloka ihany aho,
  - type: text
    content: Koa nahoana aho no hanasa-tena foana?
  '3':
  - type: text
    content: Raha te-hifandahatra aminy izy,
  - type: text
    content: Dia tsy mahavaly teny Azy na dia iray amin’ny arivo aza.
  '30':
  - type: text
    content: Na dia mandro amin’ny orampanala aza aho
  - type: text
    content: Ka manadio ny tànako amin’ny ranon-davenona,
  '31':
  - type: text
    content: Dia hanitrika ahy any am-pahitra miaraka amin’izay Hianao,
  - type: text
    content: Ka hataon’ny fitafiako ho zava-betaveta aho.
  '32':
  - type: text
    content: Fa tsy olona tahaka ahy Izy ka ho azoko valiana
  - type: text
    content: Hifanatrehanay amin’ny fitsarana.
  '33':
  - type: text
    content: Tsy misy mpanelanelana anay
  - type: text
    content: Hametraka ny tànany aminay roa tonta.
  '34':
  - type: text
    content: Aoka hanaisotra ny tsorakazony amiko Izy,
  - type: text
    content: Ary aoka tsy hampahatsiravina ahy ny fampitahorany,
  '35':
  - type: text
    content: Dia hiteny aho ka tsy hatahotra Azy;
  - type: text
    content: Fa fantatro fa tsy hatahotra foana aho.
  '4':
  - type: text
    content: Hendry am-po Izy sady matanjaka amin’ny hery;
  - type: text
    content: Iza no nikiry nanohitra Azy ka tsy naninona?
  '5':
  - type: text
    content: Izay mamindra tendrombohitra, nefa ireny tsy mahalala akory,
  - type: text
    content: Izay mamadika azy amin’ny fahatezerany,
  '6':
  - type: text
    content: Ary mampihorohoro ny tany ho afaka amin’ny fitoerany,
  - type: text
    content: Ka mihozongozona ny andriny;
  '7':
  - type: text
    content: Mandidy ny masoandro Izy, ka tsy miposaka iny,
  - type: text
    content: Ary manisy tombo-kase manafina ny kintana;
  '8':
  - type: text
    content: Sady Izy irery ihany no mamelatra ny lanitra
  - type: text
    content: Sy mandia ny onjan-dranomasina;
  '9':
  - type: text
    content: Manao ireo kintana lehibe Izy, dia ny Bera sy ny Telonohorefy ary ny Ikotokelimiadilaona
  - type: text
    content: Sy ireo kintana maro any atsimo,
  - type: note
    content: Heb. ireny efi-trano erỳ atsimo.
