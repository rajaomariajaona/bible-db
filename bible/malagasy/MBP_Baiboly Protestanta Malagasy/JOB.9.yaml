document_id: JOB.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny navalin’i Joba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fantatro tokoa fa izany no izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aiza no hahamarina ny zanak’olombelona eo anatrehan’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha te-hifandahatra aminy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy mahavaly teny Azy na dia iray amin’ny arivo aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hendry am-po Izy sady matanjaka amin’ny hery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nikiry nanohitra Azy ka tsy naninona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay mamindra tendrombohitra, nefa ireny tsy mahalala akory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mamadika azy amin’ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary mampihorohoro ny tany ho afaka amin’ny fitoerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mihozongozona ny andriny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mandidy ny masoandro Izy, ka tsy miposaka iny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manisy tombo-kase manafina ny kintana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sady Izy irery ihany no mamelatra ny lanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mandia ny onjan-dranomasina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manao ireo kintana lehibe Izy, dia ny Bera sy ny Telonohorefy ary ny Ikotokelimiadilaona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ireo kintana maro any atsimo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ireny efi-trano erỳ atsimo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary manao zava-dehibe tsy takatry ny saina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, fahagagana tsy hita isa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, mandalo ahy Izy, nefa tsy hitako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihelina Izy, nefa tsy fantatro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indro, mipaoka Izy, ka iza no mahasakana Azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Iza no hanao aminy hoe: Inona no ataonao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitra tsy mampitony ny fahatezerany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanampy an-dRahaba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rahaba = Rehareha.
    marker-yv: yv-n
  - type: text
    text: ' aza dia mitanondrika eo ambaniny.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mainka fa izaho tsy mahavaly Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mahafidy teny hifandaharako aminy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa na dia marina aza aho, dia tsy hahavaly tsy akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hifona amin’Ilay manana ady amiko no hany heriko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha mba niantso aho, ka namaly ahy aza Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy ho nino aho fa hanaiky ny fitarainako Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa manorotoro ahy amin’ny tafio-drivotra Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manamaro ny feriko tsy ahoan-tsy ahoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sady tsy avelany haka aina akory aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa vokisany zava-mangidy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha ny amin’ny herin’ny mahery, dia: Indro ary!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny amin’ny fitsarana: Iza no hifandahatra amiko?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na dia marina aza aho, dia hanameloka ahy ihany ny vavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia tsy manan-tsiny aza aho, dia hanao ahy ho meloka Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Marina aho,–ataoko tsinontsinona ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ahoako izay ho velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tsy misy hafa aminy, ka izany no nanaovako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny marina sy ny meloka dia samy aringany avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha misy loza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fikapohana.
    marker-yv: yv-n
  - type: text
    text: ' mahafaty tampoka,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mihomehy ny fizahan-toetra ny marina Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny tany efa voatolotra ho eo an-tànan’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manarona ny tavan’ny mpitsara eo Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy Izy no manao izany, dia iza kosa ary?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny androko dia faingana noho ny tsimandoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lasa ireny ka tsy nahita soa akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mihelina tahaka ny lakana faingam-pandeha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lakana zozoro.
    marker-yv: yv-n
  - type: text
    text: ' izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny voromahery mipaoka hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha hoy izaho: Hanadino ny alaheloko aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsahatra tsy hanjonitra aho ka ho miramirana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia mahatsiravina ahy ny fahoriako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fantatro fa tsy hataonao ho tsy manan-tsiny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy maintsy hatao ho meloka ihany aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa nahoana aho no hanasa-tena foana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Na dia mandro amin’ny orampanala aza aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manadio ny tànako amin’ny ranon-davenona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia hanitrika ahy any am-pahitra miaraka amin’izay Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hataon’ny fitafiako ho zava-betaveta aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa tsy olona tahaka ahy Izy ka ho azoko valiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hifanatrehanay amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tsy misy mpanelanelana anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hametraka ny tànany aminay roa tonta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Aoka hanaisotra ny tsorakazony amiko Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy hampahatsiravina ahy ny fampitahorany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Dia hiteny aho ka tsy hatahotra Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fantatro fa tsy hatahotra foana aho.
