document_id: ROM.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahafahan’ny mino an’i Kristy amin’ny herin’ny ota, ary ny fanamasinana azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'INONA ary no holazaintsika? Mbola hitoetra amin’ny ota ihany va isika hitomboan’ny fahasoavana? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa ny amin’ny nahafatesany, dia maty ny amin’ny ota indray mandeha Izy; fa ny amin’ny ahavelomany kosa, dia velona ho an’Andriamanitra Izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary aoka ho tahaka izany koa hianareo, ka ny tenanareo dia ataovy ho efa maty ny amin’ny ota, fa velona ho an’Andriamanitra ao amin’i Kristy Jesosy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa aza avela ny ota hanjaka amin’ny tenanareo mety maty hanarahanareo ny filany; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ary aza manolotra ny momba ny tenanareo ho amin’ny ota ho fiadian’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiasan’.
      marker-yv: yv-n
    - type: text
      text: ' ny tsi-fahamarinana; fa atolory ny tenanareo ho an’Andriamanitra, toy ny efa maty nefa velona, ary ny momba ny tenanareo ho fiadian’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiasan’.
      marker-yv: yv-n
    - type: text
      text: ' ny fahamarinana ho an’Andriamanitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa ny ota ts hanan-kery aminareo; fa tsy mba ambanin’ny lalàna hianareo, fa ambanin’ny fahasoavana.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ahoana ary? hanota va isika, saingy tsy ambanin’ny lalàna, fa ambanin’ny fahasoavana? Sanatria izany! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tsy fantatrareo va fa raha manolo-tena ho mpanompo hianareo na ho an’iza na ho an’iza, dia mpanompon’izay arahinareo, na ny ota ho amin’ny fahafatesana, na ny fanarahana ho amin’ny fahamarinana? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary isaorana anie Andriamanitra, fa na dia efa mpanompon’ny ota aza hianareo, ny fonareo dia efa nanaraka ny fomban’ny fampianarana izay nanolorana anareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary rehefa natao afaka tamin’ny ota hianareo, dia tonga mpanompon’ny fahamarinana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Miteny araka ny fanaon’ny olona aho noho ny fahalemen’ny nofonareo; fa tahaka ny nanoloranareo ny momba ny tenanareo ho mpanompon’ny fahalotoana sy ny tsi-fanarahan-dalàna hahatanteraka ny tsi-fanarahan-dalàna, dia mba atolory ankehitriny toy izany koa ny momba ny tenanareo ho mpanompon’ny fahamarinana hahatanteraka ny fahamasinana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sanatria izany! Hataontsika izay efa maty ny amin’ny ota ahoana no ho velona aminy ihany? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa fony mpanompon’ny ota hianareo, dia afaka tamin’ny fahamarinana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Inona ary no vokatra azonareo fahiny tamin’izay zavatra mahamenatra anareo ankehitriny? fa fahafatesana no hiafaran’izany zavatra izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa ankehitriny, rehefa natao afaka tamin’ny ota hianareo ka efa tonga mpanompon’Andriamanitra, dia manana ny vokatrareo ho amin’ny fahamasinana, ary ny farany dia fiainana mandrakizay. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa fahafatesana no tambin’ny ota; ary fiainana mandrakizay no fanomezam-pahasoavana avy amin’Andriamanitra ao amin’i Kristy Jesosy Tompontsika.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tsy fantatrareo va fa na iza na iza isika no efa natao batisa ho amin’i Kristy Jesosy dia natao batisa ho amin’ny fahafatesany? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa niara-nalevina taminy tamin’ny batisa ho amin’ny fahafatesana isika, mba ho tahaka ny nananganana an’i Kristy tamin’ny maty tamin’ny voninahitry ny Ray no handehanantsika kosa amin’ny fiainam-baovao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa raha nampiraisina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: niara-nambolena.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: taminy
    - type: text
      text: ' tamin’ny endriky ny fahafatesany isika, dia ho tahaka izany koa amin’ny fitsanganany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'fa fantatsika fa ny toetsika taloha dia niaraka nohomboana taminy hanimbana ny tenan’ny ota, mba tsy hanompoantsika ny ota intsony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa izay efa maty dia afaka amin’ny ota.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary raha niara-maty tamin’i Kristy isika, dia mino fa hiara-belona aminy koa isika; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ary fantatsika fa rehefa nitsangana tamin’ny maty Kristy, dia tsy maty intsony Izy; tsy manan-kery aminy intsony ny fahafatesana. '
