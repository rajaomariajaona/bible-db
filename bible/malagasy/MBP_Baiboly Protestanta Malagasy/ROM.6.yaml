document_id: ROM.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahafahan’ny mino an’i Kristy amin’ny herin’ny ota, ary ny fanamasinana azy.
  - type: text
    content: 'INONA ary no holazaintsika? Mbola hitoetra amin’ny ota ihany va isika hitomboan’ny fahasoavana? '
  '10':
  - type: text
    content: 'Fa ny amin’ny nahafatesany, dia maty ny amin’ny ota indray mandeha Izy; fa ny amin’ny ahavelomany kosa, dia velona ho an’Andriamanitra Izy. '
  '11':
  - type: text
    content: 'Ary aoka ho tahaka izany koa hianareo, ka ny tenanareo dia ataovy ho efa maty ny amin’ny ota, fa velona ho an’Andriamanitra ao amin’i Kristy Jesosy. '
  '12':
  - type: text
    content: 'Koa aza avela ny ota hanjaka amin’ny tenanareo mety maty hanarahanareo ny filany; '
  '13':
  - type: text
    content: ary aza manolotra ny momba ny tenanareo ho amin’ny ota ho fiadian’
  - type: note
    content: 'Na: fiasan’.'
  - type: text
    content: ' ny tsi-fahamarinana; fa atolory ny tenanareo ho an’Andriamanitra, toy ny efa maty nefa velona, ary ny momba ny tenanareo ho fiadian’'
  - type: note
    content: 'Na: fiasan’.'
  - type: text
    content: ' ny fahamarinana ho an’Andriamanitra. '
  '14':
  - type: text
    content: Fa ny ota ts hanan-kery aminareo; fa tsy mba ambanin’ny lalàna hianareo, fa ambanin’ny fahasoavana.
  '15':
  - type: text
    content: 'Ahoana ary? hanota va isika, saingy tsy ambanin’ny lalàna, fa ambanin’ny fahasoavana? Sanatria izany! '
  '16':
  - type: text
    content: 'Tsy fantatrareo va fa raha manolo-tena ho mpanompo hianareo na ho an’iza na ho an’iza, dia mpanompon’izay arahinareo, na ny ota ho amin’ny fahafatesana, na ny fanarahana ho amin’ny fahamarinana? '
  '17':
  - type: text
    content: 'Ary isaorana anie Andriamanitra, fa na dia efa mpanompon’ny ota aza hianareo, ny fonareo dia efa nanaraka ny fomban’ny fampianarana izay nanolorana anareo; '
  '18':
  - type: text
    content: 'ary rehefa natao afaka tamin’ny ota hianareo, dia tonga mpanompon’ny fahamarinana. '
  '19':
  - type: text
    content: Miteny araka ny fanaon’ny olona aho noho ny fahalemen’ny nofonareo; fa tahaka ny nanoloranareo ny momba ny tenanareo ho mpanompon’ny fahalotoana sy ny tsi-fanarahan-dalàna hahatanteraka ny tsi-fanarahan-dalàna, dia mba atolory ankehitriny toy izany koa ny momba ny tenanareo ho mpanompon’ny fahamarinana hahatanteraka ny fahamasinana.
  '2':
  - type: text
    content: 'Sanatria izany! Hataontsika izay efa maty ny amin’ny ota ahoana no ho velona aminy ihany? '
  '20':
  - type: text
    content: 'Fa fony mpanompon’ny ota hianareo, dia afaka tamin’ny fahamarinana. '
  '21':
  - type: text
    content: 'Inona ary no vokatra azonareo fahiny tamin’izay zavatra mahamenatra anareo ankehitriny? fa fahafatesana no hiafaran’izany zavatra izany. '
  '22':
  - type: text
    content: 'Fa ankehitriny, rehefa natao afaka tamin’ny ota hianareo ka efa tonga mpanompon’Andriamanitra, dia manana ny vokatrareo ho amin’ny fahamasinana, ary ny farany dia fiainana mandrakizay. '
  '23':
  - type: text
    content: Fa fahafatesana no tambin’ny ota; ary fiainana mandrakizay no fanomezam-pahasoavana avy amin’Andriamanitra ao amin’i Kristy Jesosy Tompontsika.
  '3':
  - type: text
    content: 'Tsy fantatrareo va fa na iza na iza isika no efa natao batisa ho amin’i Kristy Jesosy dia natao batisa ho amin’ny fahafatesany? '
  '4':
  - type: text
    content: 'Koa niara-nalevina taminy tamin’ny batisa ho amin’ny fahafatesana isika, mba ho tahaka ny nananganana an’i Kristy tamin’ny maty tamin’ny voninahitry ny Ray no handehanantsika kosa amin’ny fiainam-baovao. '
  '5':
  - type: text
    content: Fa raha nampiraisina
  - type: note
    content: 'Na: niara-nambolena.'
  - type: text
    content: ' '
  - type: text
    content: taminy
  - type: text
    content: ' tamin’ny endriky ny fahafatesany isika, dia ho tahaka izany koa amin’ny fitsanganany; '
  '6':
  - type: text
    content: 'fa fantatsika fa ny toetsika taloha dia niaraka nohomboana taminy hanimbana ny tenan’ny ota, mba tsy hanompoantsika ny ota intsony. '
  '7':
  - type: text
    content: Fa izay efa maty dia afaka amin’ny ota.
  '8':
  - type: text
    content: 'Ary raha niara-maty tamin’i Kristy isika, dia mino fa hiara-belona aminy koa isika; '
  '9':
  - type: text
    content: 'ary fantatsika fa rehefa nitsangana tamin’ny maty Kristy, dia tsy maty intsony Izy; tsy manan-kery aminy intsony ny fahafatesana. '
