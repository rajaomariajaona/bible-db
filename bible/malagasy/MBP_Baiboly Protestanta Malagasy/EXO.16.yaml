document_id: EXO.16,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tamin’ny andro fahadimy ambin’ny folo tamin’ny volana faharoa taorian’ny nialany tany amin’ny tany Egypta dia nifindra niala tao Elima ny fiangonana, dia ny Zanak’Isiraely rehetra, ka nankany amin’ny efitra Sina, izay eo anelanelan’i Elima sy Sinay.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha Arona mbola niteny tamin’ny fiangonana, dia ny Zanak’Isiraely rehetra, dia nijery nanatrika ny efitra izy ireo, ka, indro, ny voninahitr’i Jehovah niseho teo amin’ny rahona.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa reko ny fimonomononan’ny Zanak’Isiraely, koa mitenena aminy hoe: Anio hariva dia hihinan-kena hianareo, ary rahampitso maraina kosa dia ho voky mofo hianareo, ka dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hariva dia niakatra ny papelika, ka rakotra azy ny toby; ary nony maraina dia nisy ando manodidina ny toby; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nony niala ny ando, dia, indro, nisy zava-madinika boribory teny amin’ny efitra, madinika toy ny fanala amin’ny tany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hitan’ny Zanak’Isiraely izany, dia nifanontany hoe izy: Inona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mana.
      marker-yv: yv-n
    - type: text
      text: ' itony? satria tsy fantany ireny.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Mosesy taminy: Itony no mofo izay nomen’i Jehovah ho fihinanareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no teny izay nandidian’i Jehovah: Samia manangona azy hianareo araka izay tokony ho laninareo avy, dia eran’ny vata omera'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Izahao and. 36.
      marker-yv: yv-n
    - type: text
      text: ' avy ho amin’ny isan-olona, araka ny isanareo; samia mitondra hianareo rehetra ho an’izay ao an-dainy avy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao izany ny Zanak’Isiraely, ka samy nanangona: ny sasany nanangona be, ary ny sasany kosa kely. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha nafatrany tamin’ny vata omera izany, dia tsy nanana amby ny nanangona be, ary ny nanangona kely tsy nanana ny tsy ampy; samy nanangona araka izay fihinany avy izy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy taminy: Aza misy mamela sisa ho tra-maraina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nimonomonona tamin’i Mosesy sy Arona tany an-efitra ny fiangonana, dia ny Zanak’Isiraely rehetra, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa tsy mba nanaraka ny tenin’i Mosesy izy, fa namela sisa ho tra-maraina ihany ny olona sasany, dia niteraka olitra izany ka maimbo; ary dia tezitra tamin’ny olona Mosesy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanangona ny mana isa-maraina ny olona, dia samy araka izay fihinany avy; ary nony nafana ny andro, dia levona ireny.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony tamin’ny andro fahenina dia nanangona avo sasaka noho ny isan-andro ny olona, dia indroan’ny vata omera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Izahao and. 36.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny isan-olona avy; dia avy ny lohan’ny fiangonana ka nanambara tamin’i Mosesy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy taminy: Izao no lazain’i Jehovah: Rahampitso dia tena andro fitsaharana masina ho an’i Jehovah; koa manendasa izay hendasinareo, ary mahandroa izay handrahoinareo, ary izay sisa rehetra dia avelao ho anareo, hotehirizina ho tra-maraina.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namela izany ho tra-maraina izy, araka izay nandidian’i Mosesy; ary tsy mba maimbo na niteraka olitra izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy: Hano ireny anio, fa Sabata ho an’i Jehovah anio, ka anio no tsy hahitanareo azy any an-tsaha. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Henemana no hanangonanareo azy; fa Sabata ny andro fahafito, ka dia tsy hisy amin’izany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tamin’ny andro fahafito dia nisy olona nivoaka hanangona, fa tsy nahita na dia kely akory aza. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Mandra-pahoviana no handavanareo tsy hitandrina ny didiko sy ny lalàko? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saino fa Jehovah no nanome anareo ny Sabata, koa izany no anomezany anareo mofo ampy ho indroa andro amin’ny andro fahenina; samia mitoetra eo amin’ny fitoerany avy hianareo, ka aoka tsy hisy hiala amin’ny fitoerany amin’ny andro fahafito. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe: Inay anie izahay mba matin’ny tànan’i Jehovah tany amin’ny tany Egypta, raha nipetraka teo anilan’ny fahandroan-kena ka nihinan-kanina ho voky; fa nitondra anay nivoaka ho atỳ an-efitra hianareo hahafaty mosary izao fiangonana rehetra izao.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitsahatra ny olona tamin’ny andro fahafito.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anarany dia nataon’ny taranak’Isiraely hoe Mana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Izahao and. 15.
      marker-yv: yv-n
    - type: text
      text: ' ary tahaka ny voan-drafy izy sady fotsy; ary ny fanandramana azy dia tahaka ny mofo misy tantely.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy: Izao no teny izay nandidian’i Jehovah: Analao eran’ny vata omera izy hotehirizina hatramin’ny taranakareo fara mandimby mba ho hitany ny mofo izay nampihinaniko anareo tany an-efitra, raha nitondra anareo nivoaka avy tany amin’ny tany Egypta Aho. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy tamin’i Arona: Makà vilany, ka asio mana eran’ny vata omera ao anatiny, dia apetraho eo anatrehan’i Jehovah mba hotehirizina hatramin’ny taranakareo fara mandimby. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary araka izay nandidian’i Jehovah an’i Mosesy no nametrahan’i Arona izany teo anatrehan’ny Vavolombelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ny Didy Folo.
      marker-yv: yv-n
    - type: text
      text: ' mba hotehirizina.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Zanak’Isiraely nihinana mana mandritra ny efa-polo taona mandra-pahatongany tany amin’izay tany misy monina: eny, mana no nohaniny mandra-pahatongany tany amin’ny sisin’ny tany Kanana. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny omera dia ampahalofon’ny vata efaha.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Efaha dia anaram-pamarana tokony hitovy amin’ny fahatelom-bary.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Indro, Izaho handatsaka mofo avy any an-danitra ho anareo; dia hivoaka ny olona ka hanangona izay sahaza hohaniny isan-andro, hizahako toetra azy, na handeha manaraka ny lalàko izy, na tsia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha mby amin’ny andro fahenina dia hamboariny izay azony; ary hisy indroa toraka izay angoniny isan-andro.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy sy Arona tamin’ny Zanak’Isiraely rehetra: Anio hariva dia ho fantatrareo fa Jehovah no nitondra anareo nivoaka avy tany amin’ny tany Egypta; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rahampitso maraina dia ho hitanareo ny voninahitr’i Jehovah, fa efa reny ny fimonomononanareo tamin’i Jehovah; fa izahay moa no inona, no imonomononanareo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Mosesy; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ho hitanareo izany,
    - type: text
      text: ' raha homen’i Jehovah hena hohanina hianareo anio hariva, ary mofo hahavoky rahampitso maraina; fa efa ren’i Jehovah ny fimonomononanareo, izay nimonomononanareo taminy; fa izahay moa no inona? Tsy izahay no imonomononanareo, fa Jehovah.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy tamin’i Arona: Lazao amin’ny fiangonana, dia ny Zanak’Isiraely rehetra, hoe: Manatòna eo anatrehan’i Jehovah; fa efa reny ny fimonomononanareo. '
