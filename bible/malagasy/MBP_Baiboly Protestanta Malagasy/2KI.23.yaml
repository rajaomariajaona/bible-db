document_id: 2KI.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahazotoan’i Josia handrava ny fivavahana tsy marina sy hanangana indray ny fivavahana amin’i Jehovah, ary ny niadiany tamin’ny Egyptiana, sy ny nahafatesany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nanirahan’ny mpanjaka, ka dia vory tany aminy ny loholon’ny Joda sy Jerosalema rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niakatra ho ao an-tranon’i Jehovah ny mpanjaka, ary nanaraka azy ny lehilahy rehetra amin’ny Joda sy ny mponina rehetra tany Jerosalema mbamin’ny mpisorona sy ny mpaminany ary ny vahoaka rehetra, na kely na lehibe; ary novakiny teo anatrehany ny teny rehetra tamin’ny bokin’ny fanekena izay hita tao an-tranon’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny mpanjaka nitsangana teo amin’ny fitoeran’andriana, dia nanao fanekena teo anatrehan’i Jehovah hanaraka Azy sy hitandrina ny lalàny sy ny teni-vavolombelony ary ny didiny amin’ny fony rehetra sy ny fanahiny rehetra, hankatò ny tenin’ny fanekena sy izay voasoratra ao amin’izany boky izany. Ary ny vahoaka rehetra koa dia mba nanaiky ny fanekena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny mpanjaka nandidy an’i Hilkia mpisoronabe sy ireo mpisorona manarakaraka ary ny mpiandry varavarana hamoaka ny fanaka rehetra izay natao ho an’i Bala sy Astarta ary ho an’izay rehetra eny amin’ny lanitra hiala amin’ny tempolin’i Jehovah; ka nodorany tany ivelan’i Jerosalema teny amin’ny saha amoron’i Kidrona ireny, ary nentiny ho any Betela ny vovony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary natsahany koa ny mpisorona amin’ny andriamani-tsi-izy, izay notendren’ny mpanjakan’ny Joda handoro ditin-kazo manitra eny amin’ny fitoerana avo tany amin’ny tanànan’ny Joda sy tamin’ny manodidina an’i Jerosalema, sy izay nandoro ditin-kazo manitra koa ho an’i Bala, dia ny masoandro, ary ho an’ny volana sy ny kintana amin’ny Zodiaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mazalota; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Joba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxxviii.32.
    marker-yv: yv-n
  - type: text
    text: ' ary ho an’izay rehetra eny amin’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny Aseraha navoakany hiala amin’ny tranon’i Jehovah ho any ivelan’i Jerosalema, ao amin’ny lohasahan-driaka Kidrona; ary nodorany tao io ka notorotoroiny ho vovoka, ary ny vovony nafafiny teny ambonin’ny fasam-bahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary noravany ny tranon’ny olona nanolo-tena hijangajanga ho fanompoan-tsampy izay teo amin’ny tranon’i Jehovah, dia ireo nanenoman’ny vehivavy lay ho an’i Astarta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nampaka ny mpisorona rehetra avy tamin’ny tanànan’ny Joda izy, dia nolotoiny ny fitoerana avo, izay nandoroan’ny mpisorona ditin-kazo manitra, hatrany Geba ka hatrany Beri-sheba ary noravany ny fitoerana avo tao akaikin’ny vavahady, dia ilay teo anoloan’ny vavahadin’i Josoa, komandin’ny tanàna, sy ilay teo an-kavia raha miditra amin’ny vavahadin’ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny mpisorona tamin’ny fitoerana avo tsy navela hanatitra teo ambonin’ny alitaran’i Jehovah any Jerosalema; nefa nahazo niara-nihinana mofo tsy misy masirasira tamin’ny rahalahiny ihany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nolotoiny koa Tofeta, izay eo amin’ny lohasahan’ny taranak’i Hinoma, mba tsy hisy hampandeha ny zanani-lahy na ny zanani-vavy hamaky ny afo ho an’i Moloka intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny soavaly izay nohamasinin’ireo mpanjakan’ny Joda ho an’ny masoandro ka nataony teo amin’ny fidirana ho ao an-tranon’i Jehovah, teo akaikin’ny efi-tranon’i Natana-meleka tandapa,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ionoka.
    marker-yv: yv-n
  - type: text
    text: ' izay tao Parvara,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tokony ho anaran-trano madinika sasany teo an-kianjan’ny tempoly.
    marker-yv: yv-n
  - type: text
    text: ' dia nesoriny; ary ny kalesin’ny masoandro nodorany tamin’ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ireo alitara teo an-tampon-trano ambony amin’ny tranon’i Ahaza, izay nataon’ireo mpanjakan’ny Joda, sy ny alitara izay nataon’i Manase tao anatin’ny kianja roa tamin’ny tranon’i Jehovah, dia noravan’ny mpanjaka ka notorotoroiny, dia nafafiny tany amin’ny lohasahan-driaka Kidrona ny vovony. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nolotoin’ny mpanjaka ireo fitoerana avo izay teo anoloan’i Jerosalema, teo amin’ny ankavanan’ny tendrombohitra nahitan-doza, dia ireo nataon’i Solomona, mpanjakan’ny Isiraely, ho an’i Astarta, fahavetavetan’ny Sidoniana, sy ho an’i Kemosy, fahavetavetan’i Moaba, ary ho an’i Milkoma, fahavetavetan’ny taranak’i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia notorotoroiny ny tsangam-baton-tsampy sady nokapainy koa ny Aseraha, ka nofenoiny taolan’olona ny nitoerany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny alitara izay tao Betela sy ny fitoerana avo izay nataon’i Jeroboama, zanak’i Nebata, ilay nampanota ny Isiraely, dia noravany koa; ary nodorany ny fitoerana avo ka notorotoroiny ho vovoka, ary nodorany koa ny Aseraha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nitodika Josia ka nahita ny fasana teny an-tendrombohitra, dia naniraka naka ny taolana tao am-pasana, ary nodorany teo ambonin’ny alitara ireny nandotoany azy, araka ny tenin’i Jehovah, izay notorin’ilay lehilahin’Andriamanitra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao 1 Mpan. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xiii. 2.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy izy: Tsangam-baton’iza itsy hitako itsy? Ary hoy ny mponina tao an-tanàna taminy: Fasan’ilay lehilahin’Andriamanitra izay avy tany Joda io, dia ilay nitory izao zavatra nataonao tamin’ny alitara eto Betela izao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy: Aoka itsỳ; aza misy manetsika ny taolany akory. Dia tsy nokasihiny ny taolany sy ny taolan’ilay mpaminany avy tany Samaria.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny trano rehetra tamin’ny fitoerana avo, izay teny amin’ny tanànan’i Samaria, izay nataon’ireo mpanjakan’ny Isiraely ka nahatonga fahatezerana, dia noravan’i Josia koa ka nataony araka izay rehetra efa nataony tany Betela. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny mpisorona rehetra izay teo, dia ny mpisorona amin’ny fitoerana avo, novonoiny teo ambonin’ny alitara, sady nandoro taolan’olona teo koa izy, dia niverina nankany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny mpanjaka nandidy ny vahoaka rehetra hoe: Tandremo ny Paskan’i Jehovah Andriamanitrareo, araka ny voasoratra ao amin’ny bokin’ity fanekena ity. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa tsy nisy Paska notandremana toy izany hatramin’ny andron’ny mpitsara izay nitsara ny Isiraely, na tamin’ny andro rehetra nanjakan’ny mpanjakan’ny Isiraely sy ny mpanjakan’ny Joda; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: fa tamin’ny taona fahavalo ambin’ny folo nanjakan’i Josia mpanjaka no nitandremany izany Paska izany ho an’i Jehovah tany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary ny nanao azy ho tsindrian-javatra sy ny mpanao hatsarana sy ny terafima sy ny sampy ary ny fahavetavetana rehetra izay hita tany amin’ny tany Joda sy tany Jerosalema dia nesorin’i Josia koa, mba hanatanterahana ny tenin’ny lalàna voasoratra ao amin’ilay boky hitan’i Hilkia mpisorona tao an-tranon’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary tsy nisy mpanjaka tahaka azy teo alohany, izay niverina ho amin’i Jehovah tamin’ny fony rehetra sy ny fanahiny rehetra sy ny heriny rehetra araka ny lalàn’i Mosesy rehetra; sady tsy nisy tahaka azy intsony niseho tao aoriany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nefa Jehovah tsy nitsahatra tamin’ny firehetan’ny fahatezerany mafy, dia ilay fahatezerana nirehitra tamin’ny Joda noho ny fampahatezerana rehetra izay nampahatezeran’i Manase Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy Jehovah: Hesoriko koa ny Joda hiala eo imasoko, tahaka ny nanesorako ny Isiraely, ary holaviko ity tanàna Jerosalema nofidiko ity sy ny trano izay nolazaiko hoe: Ho ao ny anarako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary ny tantaran’i Josia sisa mbamin’izay rehetra nataony, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin’ny andro nanjakan’i Josia no niakaran’i Farao-neko, mpanjakan’i Egypta, hankany amoron’ny ony Eofrata hiady amin’ny mpanjakan’i Asyria; ary Josia mpanjaka dia nandeha hiady amin’i Farao. Kanjo nony hitany, dia matiny tao Megido izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary ny fatiny dia napetraky ny mpanompony tao anaty kalesy ka nentiny niala tao Megido ho any Jerosalema, dia naleviny tao amin’ny fasany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nalain’ny vahoaka Joahaza, zanak’i Josia, dia nohosorany ka nampanjakainy handimby an-drainy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Joahaza sy Joiakima ary Joiakina.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: TELO amby roa-polo taona Joahaza fony izy vao nanjaka, ary telo volana no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Hamotala, zanakavavin’i Jeremia, avy any Libna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary nanao izay ratsy eo imason’i Jehovah izy tahaka izay rehetra nataon’ny razany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary nafatotr’i Farao-neko tao Ribla any amin’ny tany Hamata izy, mba tsy hanjakany any Jerosslema, sady nampandoaviny sazy talenta volafotsy zato sy talenta volamena iray ny fanjakana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary Farao-neko nanendry an’i Eliakima, zanak’i Josia, ho mpanjaka hisolo an’i Josia rainy; ary ny anarany novany ho Joiakima, fa Joahaza kosa dia nentiny ho any Egypta ka maty tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary ny volafotsy sy ny volamena dia nomen’i Joiakima an’i Farao; kanefa notombanany avokoa ny olona rehetra araka ny didin’i Farao, ary ny vahoaka rehetra dia samy nampandoaviny vola araka ny tombany avy, mba homeny an’i Farao-neko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dimy amby roa-polo taona Joiakima, fony izy vao nanjaka, ary nanjaka iraika ambin’ny folo taona tany Jerosalema izy. Ary ny anaran-dreniny dia Zebida, zanakavavin’i Pedaia, avy any Romaha. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary nanao izay ratsy eo imason’i Jehovah izy tahaka izay nataon’ny razany.
