document_id: JOB.18
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny fanindroany nataon’i Bildada.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Bildada Sohita ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandra-pahoviana no hamandrika teny hianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hendre aloha, dia vao hiteny izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sao ataonareo ho biby anie izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tahaka ny maloto eo imasonareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ry ilay mamiravira tena amin’ny fahatezerana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny aminao va no hahatonga ny tany ho lao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vatolampy hafindra hiala amin’ny fitoerany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy izany, fa ho faty ny jiron’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hilopilopy ny lelafony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny mazava manjary maizina ao amin’ny lainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny jirony eo amboniny dia maty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Etena ny herin’ny diany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fisainany ihany no mandavo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny tongony ihany ny mahatonga azy eo amin’ny fandrika harato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manitsaka eo amin’ny harato izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Azon’ny fandrika ny ombelahin-tongony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary voahazon’ny tadivavarana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miafina ao amin’ny tany ny fandrika haningotra azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny tonta eny an-dàlana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fampitahorana no mampitahotra azy manodidina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mampivadi-po azy eny amin’ny alehany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Liana azy ny loza,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lanin’ny mosary izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fandringanana dia vonona eo anilany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, laniny tsikelikely ny hodiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny momba ny tenany dia lanin’ny lahimatoan’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ongotana hiala amin’ny lainy ny zavatra itokiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy maintsy ho entina ho amin’ilay mpanjaka mampahatahotra indrindra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay tsy taranany no hitoetra ao amin’ny lainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Solifara no hahafy amin’ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maina ny fàkany ao ambany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tapaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: malazo.
    marker-yv: yv-n
  - type: text
    text: ' ny rantsany eo ambony.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fahatsiarovana azy dia very tsy ho eo amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy malaza eny ivelany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Roahina hiala amin’ny mazava ho any amin’ny maizina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary enjehina hiala amin’izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy manana fara mandimby eo amin’ny fireneny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy misy tsy tratry ny loza ny ao amin’ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny manjo azy dia italanjonan’ny any andrefana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny any atsinanana raiki-tahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izany tokoa no anjaran’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izany no manjo ny tsy mahalala an’Andriamanitra.
