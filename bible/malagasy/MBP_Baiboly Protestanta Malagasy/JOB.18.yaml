document_id: JOB.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny fanindroany nataon’i Bildada.
  - type: text
    content: 'DIA namaly Bildada Sohita ka nanao hoe:'
  '10':
  - type: text
    content: Miafina ao amin’ny tany ny fandrika haningotra azy
  - type: text
    content: Sy ny tonta eny an-dàlana.
  '11':
  - type: text
    content: Fampitahorana no mampitahotra azy manodidina
  - type: text
    content: Ka mampivadi-po azy eny amin’ny alehany rehetra.
  '12':
  - type: text
    content: Liana azy ny loza,
  - type: note
    content: 'Na: Lanin’ny mosary izy.'
  - type: text
    content: Ary ny fandringanana dia vonona eo anilany;
  '13':
  - type: text
    content: Eny, laniny tsikelikely ny hodiny;
  - type: text
    content: Ny momba ny tenany dia lanin’ny lahimatoan’ny fahafatesana.
  '14':
  - type: text
    content: Ongotana hiala amin’ny lainy ny zavatra itokiany,
  - type: text
    content: Ka tsy maintsy ho entina ho amin’ilay mpanjaka mampahatahotra indrindra izy.
  '15':
  - type: text
    content: Izay tsy taranany no hitoetra ao amin’ny lainy;
  - type: text
    content: Solifara no hahafy amin’ny fonenany.
  '16':
  - type: text
    content: Maina ny fàkany ao ambany,
  - type: text
    content: Ary tapaka
  - type: note
    content: 'Na: malazo.'
  - type: text
    content: ' ny rantsany eo ambony.'
  '17':
  - type: text
    content: Ny fahatsiarovana azy dia very tsy ho eo amin’ny tany,
  - type: text
    content: Ary tsy malaza eny ivelany izy.
  '18':
  - type: text
    content: Roahina hiala amin’ny mazava ho any amin’ny maizina izy
  - type: text
    content: Ary enjehina hiala amin’izao tontolo izao.
  '19':
  - type: text
    content: Tsy manana fara mandimby eo amin’ny fireneny izy,
  - type: text
    content: Ka tsy misy tsy tratry ny loza ny ao amin’ny fonenany.
  '2':
  - type: text
    content: Mandra-pahoviana no hamandrika teny hianareo?
  - type: text
    content: Mba hendre aloha, dia vao hiteny izahay.
  '20':
  - type: text
    content: Ny manjo azy dia italanjonan’ny any andrefana,
  - type: text
    content: Ary ny any atsinanana raiki-tahotra.
  '21':
  - type: text
    content: Izany tokoa no anjaran’ny ratsy fanahy,
  - type: text
    content: Ary izany no manjo ny tsy mahalala an’Andriamanitra.
  '3':
  - type: text
    content: Sao ataonareo ho biby anie izahay
  - type: text
    content: Ka tahaka ny maloto eo imasonareo?
  '4':
  - type: text
    content: Ry ilay mamiravira tena amin’ny fahatezerana,
  - type: text
    content: Noho ny aminao va no hahatonga ny tany ho lao,
  - type: text
    content: Ary ny vatolampy hafindra hiala amin’ny fitoerany?
  '5':
  - type: text
    content: Tsy izany, fa ho faty ny jiron’ny ratsy fanahy,
  - type: text
    content: Ary hilopilopy ny lelafony;
  '6':
  - type: text
    content: Ny mazava manjary maizina ao amin’ny lainy,
  - type: text
    content: Ary ny jirony eo amboniny dia maty.
  '7':
  - type: text
    content: Etena ny herin’ny diany,
  - type: text
    content: Ary ny fisainany ihany no mandavo azy.
  '8':
  - type: text
    content: Fa ny tongony ihany ny mahatonga azy eo amin’ny fandrika harato,
  - type: text
    content: Ka manitsaka eo amin’ny harato izy;
  '9':
  - type: text
    content: Azon’ny fandrika ny ombelahin-tongony
  - type: text
    content: Ary voahazon’ny tadivavarana;
