document_id: EZK.46
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny mpanjaka sy ny fanatitra hataony sy ny hataon’ny vahoaka, sy ny zavatra homeny ho an’ny zanany sy ny mpanompony, ary ny amin’ny fahandroana ny fanatitra naterin’ny vahoaka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no lazain’i Jehovah Tompo: Ny vavahadin’ny kianja anatiny izay manatrika ny atsinanana dia harindrina mandritra ny henemana fanaovan-draharaha; fa amin’ny Sabata sy amin’ny andro voaloham-bolana kosa no hivoha izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hiditra avy any ivelany amin’ny làlana mankamin’ny lavarangan’ny vavahady ny mpanjaka ka hijanona eo anilan’ny tolam-bavahady, ary ny fanatitra dorany sy ny fanati-pihavanany dia haterin’ny mpisorona, ary ny mpanjaka hiankohoka eo amin’ny tokonam-bavahady, dia hivoaka izy; ary tsy hirindrina ny vavahady, raha tsy efa hariva ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny vahoaka koa hiankohoka eo anatrehan’i Jehovah eo am-bavahady amin’ny Sabata sy amin’ny andro voaloham-bolana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny fanatitra dorana izay haterin’ny mpanjaka ho an’i Jehovah amin’ny andro Sabata dia zanak’ondry enina tsy misy kilema sy ondrilahy iray tsy misy kilema koa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny fanatitra hohanina fanampin’ilay ondrilahy iray dia iray efaha, ary ny fanatitra hohanina fanampin’ireo zanak’ondry dia araka izay tiany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tratry ny ananany.
    marker-yv: yv-n
  - type: text
    text: ' ary ny diloilo iray hina isan-efaha '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary amin’ny andro voaloham-bolana dia vantotr’ombilahy iray tsy misy kilema sy zanak’ondry enina ary ondrilahy iray; samy tsy hisy kilema ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary hanatitra fanatitra hohanina izy, dia iray efaha isam-bantotr’ombilahy sy iray efaha isan-ondrilahy koa; ary ny amin’ny zanak’ondry dia araka izay tiany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tratry ny ananany.
    marker-yv: yv-n
  - type: text
    text: ' ary ny diloilo dia iray hina isan-efaha.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha miditra ny mpanjaka, dia amin’ny làlana mankamin’ny lavarangan’ny vavahady no hidirany, ary amin’ny làlana nalehany ihany koa no hivoahany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa raha ny vahoaka kosa no miditra ho eo anatrehan’i Jehovah amin’ny fotoam-pivavahana, dia izay miditra amin’ny vavahady avaratra hiankohoka dia hivoaka amin’ny vavahady atsimo kosa; ary izay miditra amin’ny vavahady atsimo dia hivoaka amin’ny vavahady avaratra kosa: tsy hiverina amin’ilay vavahady nidirany izy, fa amin’izay tandrifiny ihany no hivoahany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny mpanjaka dia hiara-miditra amin’ireo, ary raha mivoaka ireo, dia hiara-mivoaka aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary amin’ny andro firavoravoana sy ny fotoam-pivavahana dia iray efaha no ho fanatitra hohanina isam-bantotr’ombilahy iray, ary iray efaha isan-ondrilahy iray, ary ny amin’ny zanak’ondry, dia araka izay tiany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tratry ny ananany.
    marker-yv: yv-n
  - type: text
    text: ' ary ny diloilo dia eran’ny hina isan-efaha. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary raha ny mpanjaka no manatitra fanatitra dorana na fanati-pihavanana ho fanatitra sitra-po ho an’i Jehovah, dia hovohana ho azy ny vavahady manatrika ny atsinanana, dia hateriny ny fanatitra dorany sy ny fanati-pihavanany, tahaka izay ataony amin’ny Sabata; ary rehefa tafavoaka izy, dia harindrina ny vavahady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary zanak’ondry anankiray iray taona tsy misy kilema no haterinao isan-andro ho fanatitra dorana ho an’i Jehovah; isa-maraina no hanateranao azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hanatitra fanatitra hohanina ho fanampiny isa-maraina hianao, dia ampahenin’ny efaha sy diloilo ampahatelon’ny hina handemana ny koba tsara toto; fanatitra hohanina ho an’i Jehovah izany: lalàna tsy miova mandrakizay izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary toy izany no anatero ny zanak’ondry sy ny fanatitra hohanina ary ny diloilo isa-maraina ho fanatitra mandrakariva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo: Raha manome zavatra ho an’ny anankiray amin’ny zanany ny mpanjaka, dia ho lovan’ny zanany izany; eny, ho zara-lovany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha manome zavatra avy amin’ny lovany ho an’ny anankiray amin’ny mpanompony kosa izy, dia ho azy mandra-pahatongan’ny taona fanafahana ihany izany; dia hiverina ho amin’ny mpanjaka indray izany ka ho lova ho an’ny zanany ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary tsy haka amin’ny lovan’ny vahoaka hampiala azy amin’ny zara-taniny izy; fa homeny lova avy amin’ny fananany ihany ny zanany, mba tsy hielezan’ny oloko hiala amin’ny zara-taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nentiny niditra tamin’ny fidirana eo anilan’ny vavahady aho ho ao amin’ireo efi-trano masin’ny mpisorona, izay manatrika ny avaratra; ary, indro, nisy fitoerana teo amin’ny faran’ny andrefana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy izy tamiko: Io no fitoerana fahandroan’ny mpisorona ny fanati-panonerana sy ny fanatitra noho ny ota sy hanendasany ny fanatitra hohanina, mba tsy hitondrany azy mivoaka ho any amin’ny kianja ivelany hanamasina ny olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nentiny nivoaka ho any amin’ny kianja ivelany aho ka nampiteteziny ny zorony efatra amin’ny kianja; ary, indro, ao amin’ny isan-joron’ny kianja dia nisy kianja hafa koa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Teny amin’ny zorony efatra amin’ny kianja dia nisy kianja nofefena, efa-polo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hakiho
  - type: text
    text: ' avy ny lavany, ary telo-polo avy ny sakany; mitovy ohatra ireo an-jorony efatra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nisy rafitra teo anatiny manodidina azy, dia manodidina ireo efatra ireo, izay nisy fahandroana ambanin’izany rafitra manodidina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy izy tamiko: Ireto no tranon’ny mpahandro, izay fahandroan’ny mpanao fanompoam-pivavahana eto an-trano ny fanatitra halatsa-dra aterin’ny olona.'
