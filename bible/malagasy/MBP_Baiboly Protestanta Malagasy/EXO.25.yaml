document_id: EXO.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandidian’Andriamanitra an’i Mosesy ny amin’ny hanaovana ny Tabernakely sy ny fanaka momba azy.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary asaovy manao fiara hazo akasia izy: roa hakiho sy sasany ny lavany, ary iray hakiho sy sasany ny sakany, ary iray hakiho sy sasany ny hahavony. '
  '11':
  - type: text
    content: 'Ary petaho takela-bolamena tsara izy: ny atiny sy ny ivelany dia samy hopetahanao takela-bolamena avokoa; ary asio koronosy volamena manodidina eo amboniny. '
  '12':
  - type: text
    content: Ary mandrendreha vava volamena efatra hatao aminy, ka ataovy eo amin’ny tongony
  - type: note
    content: 'Na: zorony.'
  - type: text
    content: ' efatra; dia vava volamena roa eo amin’ny lafiny iray, ary vava volamena roa eo amin’ny lafiny iray koa. '
  '13':
  - type: text
    content: 'Ary manaova bao hazo akasia, ka petaho takela-bolamena. '
  '14':
  - type: text
    content: 'Ary ampidiro ny bao ho eo amin’ny vava volamena, izay eo amin’ny lafin’ny fiara, hilanjana azy. '
  '15':
  - type: text
    content: 'Eo amin’ny vava volan’ny fiara no hitoeran’ny bao, ka tsy hesorina eo izy. '
  '16':
  - type: text
    content: Ary ataovy ao anatin’ny fiara ny Vavolombelona izay homeko anao.
  '17':
  - type: text
    content: 'Ary manaova rakotra fanaovam-panavotana amin’ny volamena tsara: roa hakiho sy sasany ny lavany, ary iray hakiho sy sasany ny sakany. '
  '18':
  - type: text
    content: 'Ary manaova kerobima volamena roa; voasana no hanaovanao azy roa ho eo amin’ny sakany roa amin’ny rakotra fanaovam-panavotana’ '
  '19':
  - type: text
    content: 'Ny kerobima iray ataovy indray mivofy amin’ny sakany anankiray, ary ny kerobima iray kosa amin’ny sakany anankiray: indray mivofy amin’ny rakotra fanaovam-panavotana no hanaovanareo ny kerobima roa, dia amin’ny sakany roa. '
  '2':
  - type: text
    content: 'Mitenena amin’ny Zanak’Isiraely mba hitondra fanatitra ho Ahy izy; dia avy amin’ny olona rehetra izay amporisihin’ny fony no handraisanareo ny fanatitra ho Ahy. '
  '20':
  - type: text
    content: 'Ary aoka hivelatra eo ambony ny elatry ny kerobima, mba hanalofan’ny elany ny rakotra fanaovam-panavotana; ary ny tavany hifanatrika, sady hanatrika ny rakotra fanaovam-panavotana koa izy. '
  '21':
  - type: text
    content: Ary apetraho eo ambonin’ny fiara ny rakotra fanaovam-panavotana; ary ao anatin’ny fiara no asio ny Vavolombelona
  - type: note
    content: Dia ny Didy Folo. Mandra-pitan’.
  - type: text
    content: ' izay homeko anao. '
  '22':
  - type: text
    content: Ary ao no hihaona aminao Aho, ka ao ambonin’ny rakotra fanaovam-panavotana no hitenenako aminao, dia ao anelanelan’ny kerobima roa, izay eo ambonin’ny fiaran’ny Vavolombelona, ka holazaiko izay rehetra handidiako anao holazainao amin’ny Zanak’Isiraely.
  '23':
  - type: text
    content: 'Ary manaova latabatra hazo akasia: roa hakiho ny lavany, ary iray hakiho ny sakany, ary iray hakiho sy sasany ny hahavony. '
  '24':
  - type: text
    content: 'Ary petaho takela-bolamena tsara izy, sady asio koronosy volamena manodidina azy. '
  '25':
  - type: text
    content: 'Ary asio sisiny vodivoam-pela-tànana manodidina azy, ary asio koronosy volamena ny sisiny. manodidina. '
  '26':
  - type: text
    content: 'Ary manaova vava volamena efatra hatao aminy, ka ataovy eo amin’ny zorony efatra izay eo amin’ny tongony efatra ireo: '
  '27':
  - type: text
    content: 'eo akaikin’ny sisiny no hasiana ny vava volamena ho fitoeran’ny bao hilanjana ny latabatra. '
  '28':
  - type: text
    content: 'Ary hazo akasia no anaovy ny bao, ka petaho takela-bolamena; ary amin’ireo no hilanjana ny latabatra. '
  '29':
  - type: text
    content: 'Ary manaova ny loviany sy ny lovia keliny ary ny fitoeran-divainy sy ny kapoakany ho fanidinam-panatitra; volamena tsara no hanaovanao ireo. '
  '3':
  - type: text
    content: 'Ary izao no fanatitra izay horaisinareo aminy: volamena sy volafotsy sy varahina, '
  '30':
  - type: text
    content: Ary asio
  - type: note
    content: 'Na: ataingeno.'
  - type: text
    content: ' mofo aseho eo ambonin’ny latabatra ho eo anatrehako mandrakariva.'
  '31':
  - type: text
    content: 'Ary manaova ny fanaovan-jiro volamena tsara; voasana no hanaovanao ny fanaovan-jiro; hatao indray mivaofy ihany ny faladiany sy ny tahony sy ny vodi-voniny sy ny kiboriny ary ny voniny. '
  '32':
  - type: text
    content: 'Ary hisy sampany enina amin’ny ankilany roa: dia sampany telo amin’ny fanaovan-jiro eo amin’ny ankilany iray, ary sampany telo amin’ny fanaovan-jiro eo amin’ny ankilany iray koa, '
  '33':
  - type: text
    content: 'dia vodi-voniny telo atao tahaka ny vonin’ny amygdala, mbamin’ny kiboriny sy ny voniny, eo amin’ny sampany anankiray; ary vodi-voniny telo koa atao tahaka ny vonin’ny amygdala, mbamin’ny kiboriny sy ny voniny, eo amin’ny sampany anankiray koa; dia toy izany avokoa amin’ny sampany enina izay amin’ny fanaovan-jiro. '
  '34':
  - type: text
    content: 'Ary eo amin’ny fanaovan-jiro dia hisy vodi-voniny efatra atao tahaka ny vonin’ny amygdala, mbamin’ny kiboriny sy ny voniny, '
  '35':
  - type: text
    content: 'dia kiboriny iray eo ambanin’ny sampany roa sady miray aminy, ary kiboriny iray koa eo ambanin’ny sampany roa sady miray aminy, ary kiboriny iray koa eo ambanin’ny sampany roa sady miray aminy; dia amin’ny sampany enina izay miray amin’ny fanaovan-jiro. '
  '36':
  - type: text
    content: 'Ny kiboriny sy ny sampany dia hiray avokoa; hatao indray mivofy aminy amin’ny volamena tsara izy rehetra. '
  '37':
  - type: text
    content: Ary manaova lela fanaovan-jirony fito, ka ampireheto
  - type: note
    content: 'Na: ataingeno.'
  - type: text
    content: ' eo aminy ireo mba hanazava ny anoloany. '
  '38':
  - type: text
    content: 'Ary ny hetin-jirony sy ny fitoeran-davenon-jirony dia ataovy volamena tsara. '
  '39':
  - type: text
    content: 'Volamena tsara talenta iray no hanaovana azy mbamin’ireny fanaka rehetra ireny. '
  '4':
  - type: text
    content: 'sy manga sy volomparasy sy mena sy rongony fotsy madinika sy volon’osy, '
  '40':
  - type: text
    content: Ary tandremo mba hataonao araka ny endriny izay naseho taminao tao an-tendrombohitra izy.
  '5':
  - type: text
    content: sy hoditr’ondrilahy efa nomen-aina sy hodi-takasy
  - type: note
    content: Hoditra voasoka ho menamena, na hodi-biby tsy fantatra.
  - type: text
    content: ' sy hazo akasia,'
  - type: note
    content: Anaran-kazo, naman’ny fano.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'sy diloilo hatao fanazavana sy zava-manitra ho amin’ny diloilo fanosorana sy ho ditin-kazo mani-pofona, '
  '7':
  - type: text
    content: 'sy vato beryla sy vato halatsaka an-tranontranony amin’ny efoda sy amin’ny saron-tratra. '
  '8':
  - type: text
    content: 'Ary asaovy manao fitoerana masina ho Ahy izy, dia honina eo aminy Aho. '
  '9':
  - type: text
    content: Araka izay rehetra asehoko aminao, dia ny endriky ny tabernakely
  - type: note
    content: Heb. miskana = fonenana; izahao and. 8 sy xxix. 43, 46.
  - type: text
    content: ' sy ny endriky ny fanaka rehetra momba azy, dia araka izany no hanaovanao azy.'
