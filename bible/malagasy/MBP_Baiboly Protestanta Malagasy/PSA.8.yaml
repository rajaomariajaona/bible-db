document_id: PSA.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voninahitr’Andriamanitra, sy ny voninahitra nomeny ny olombelona.
  - type: text
    content: Ho an’ny mpiventy hira. Al-hagitith. Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH, Tomponay ô,
  - type: text
    content: Endrey ny voninahitry ny anaranao amin’ny tany rehetra!
  - type: text
    content: Nataonao eny amin’ny lanitra ny voninahitrao.
  '2':
  - type: text
    content: Avy amin’ny vavan’ny ankizy madinika sy ny minono no nanorenanao hery
  - type: text
    content: Noho ny mpandrafy Anao,
  - type: text
    content: Mba hampanginanao ny fahavalo sy izay ta-hamaly ratsy.
  '3':
  - type: text
    content: Raha jereko ny lanitrao, izay asan’ny rantsan-tànanao,
  - type: text
    content: Sy ny volana aman-kintana, izay noforoninao,
  '4':
  - type: text
    content: Inona moa ny olona, no ahatsiarovanao azy?
  - type: text
    content: Ary ny zanak’olombelona, no amangianao azy?
  '5':
  - type: text
    content: Fa efa nataonao ambany kely noho Andriamanitra izy.
  - type: text
    content: Ary efa nosatrohanao voninahitra sy fiandrianana.
  '6':
  - type: text
    content: Efa nampanjakainao amin’ny asan’ny tànanao izy;
  - type: text
    content: Ny zavatra rehetra dia efa nataonao eo ambanin’ny tongony,
  '7':
  - type: text
    content: Dia ny ondry aman-osy sy ny omby rehetra,
  - type: text
    content: Ary ny bibi-dia koa
  '8':
  - type: text
    content: Mbamin’ny voro-manidina sy ny hazandrano any an-dranomasina,
  - type: text
    content: Izay mandeha amin’ny làlan-dranomasina.
  '9':
  - type: text
    content: Jehovah, Tomponay ô,
  - type: text
    content: Endrey ny voninahitry ny anaranao amin’ny tany rehetra!
