document_id: PSA.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny voninahitr’Andriamanitra, sy ny voninahitra nomeny ny olombelona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Al-hagitith. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH, Tomponay ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey ny voninahitry ny anaranao amin’ny tany rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataonao eny amin’ny lanitra ny voninahitrao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Avy amin’ny vavan’ny ankizy madinika sy ny minono no nanorenanao hery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny mpandrafy Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampanginanao ny fahavalo sy izay ta-hamaly ratsy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Raha jereko ny lanitrao, izay asan’ny rantsan-tànanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny volana aman-kintana, izay noforoninao,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Inona moa ny olona, no ahatsiarovanao azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zanak’olombelona, no amangianao azy?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa efa nataonao ambany kely noho Andriamanitra izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nosatrohanao voninahitra sy fiandrianana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Efa nampanjakainao amin’ny asan’ny tànanao izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zavatra rehetra dia efa nataonao eo ambanin’ny tongony,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia ny ondry aman-osy sy ny omby rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny bibi-dia koa
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mbamin’ny voro-manidina sy ny hazandrano any an-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandeha amin’ny làlan-dranomasina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Jehovah, Tomponay ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey ny voninahitry ny anaranao amin’ny tany rehetra!
