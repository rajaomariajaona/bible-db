document_id: DAN.11
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa tamin’ny taona voalohany nanjakan’i Dariosa Mediana dia nitsangana hampahery sy hanatanjaka azy aho.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana koa ny amin’ny zavatra mbola hiseho.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ARY ankehitriny izay tenany tokoa dia haharihariko aminao. Indro, mbola hisy mpanjaka telo koa hitsangana any Persia; ary ny fahefatra hanan-karena be mihoatra noho izy rehetra; koa rehefa mahery izy noho ny hareny, dia hotairiny avokoa ny olona rehetra hamely ny fanjakan’i Grisia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hisy mpanjaka mahery hitsangana, izay hanapaka amin’ny fanapahana lehibe sady hanao araka izay sitrapony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary rehefa mitsangana izy, dia horavana ny fanjakany ka hozaraina ho amin’ny rivotra efatry ny lanitra; fa tsy ho an’ny taranany, na araka ny fanapahany izay nanapahany, fa hongotana ny fanjakany ka ho an’ny hafa, fa tsy ho an’ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary hahery ny mpanjakan’ny atsimo; nefa ny anankiray amin’ny andriandahiny dia hahery noho izy aza ka hanapaka; ary ho fanapahana lehibe ny fanapahany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary rehefa afaka taona vitsivitsy, dia hikambana izy roa lahy ireo; ary ho avy ny zanakavavin’ny mpanjakan’ny atsimo hankany amin’ny mpanjakan’ny avaratra hahatsara ny fihavanana; nefa tsy hahatana ny herin-tsandry izy, ary tsy hahajanona ilay mpanjaka na ny sandriny, fa hatolotra razazavavy sy ireo nitondra azy sy rainy niteraka azy mbamin’izay nampahery azy tamin’izany andro izany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Na:'
      - type: text
        text: ' dia samy amin’ny fotoany avy.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hisy solofony anankiray avy amin’ny fàkany hitsangana handimby azy, ka hihavian’izay ny miaramila, ary hidirany ny fiarovana mafin’ny mpanjakan’ny avaratra, ka hasiany ireo, dia hahery izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny andriamaniny koa mbamin’ny sarin-javatra an-idina sy ny fanaka tsara ananany, na ny volafotsy na ny volamena, dia hobaboiny avokoa; ary hijanona elaela tsy hamely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Na:'
      - type: text
        text: ' haharitra ela noho.'
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjakan’ny avaratra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ho tonga amin’ny fanjakan’ny mpanjakan’ny atsimo izy, nefa hody any amin’ny taniny ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hanomana tafika ny zanany ka hanangona miaramila maro be; dia ho avy tokoa ireo ka hanerana toy ny safotra; rehefa afaka izany, dia hiverina izy, ary hanihiny ihany na dia ny fiarovana mafiny aza. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary dia hisafoaka ny mpanjakan’ny atsimo, ka hivoaka hiady aminy izy, dia amin’ny mpanjakan’ny avaratra, ary izy hanangona maro be; ary ny maro be dia hatolotra ho eo an-tànany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary raha miainga ireo maro be ireo, dia hiavonavona ny fony; ary haharipaka alinalina izy, nefa tsy hahery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hiverina ny mpanjakan’ny avaratra ka hanangona olona maro be mihoatra noho ny teo; ary rehefa afaka ny fe-taona, dia ho avy tokoa izy ka hitondra miaramila maro sy fitaovana betsaka. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary amin’izany andro izany dia maro no hitsangana hamely ny mpanjakan’ny atsimo; ary ireo loza indrindra amin’ny firenenao dia hanandra-tena hahatò ny fahitana; nefa ho lavo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ka dia ho avy ny mpanjakan’ny avaratra hanandratra tovon-tany hanafaka ny tanàna mimànda; ary na ny sandrin’ny atsimo na ny olom-pidiny dia tsy hahomby, ary tsy hisy hery hahombiazany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izay avy hamely azy dia hanao araka izay sitrapony, ka tsy hisy hahajanona eo anatrehany; ary izy hijanona ao amin’ny tany mahafinaritra, ary hisy fandringanana eny an-tànany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hivonona tsara handeha amin’ny herin’ny fanjakany rehetra izy ka hanao izay hahatsara ny fihavanana; ary homeny ny zanakavavin’ny vehivavy izy ka hahatonga loza aminy; ary tsy hahalavorary razazavavy, na hahasoa azy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hitodika mankany amin’ny nosy izy ka hahalasa be; ary hisy mpanapaka hampitsahatra ny latsa ataony, sady hatsingeriny aminy ny latsa ataony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia hitodika hankany, amin’ny fiarovana mafy any amin’ny taniny izy; kanjo ho tafintohina sy ho lavo izy ka tsy ho hita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary hitsangana handimby azy indray ny anankiray izay hampandeha mpampiasa ho any amin’izay tsara indrindra amin’ny fanjakany; fa rehefa afaka andro vitsy, dia ho faty io, nefa tsy amin’ny fahatezerana, na amin’ny ady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hisy olona famingavinga hitsangana handimby io indray, izay tsy homena ny voninahitry ny fanjakana; fa hiditra tsy ampoizina izy ka hahazo ny fanjakana amin’ny fahafetsena, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary ireo miaramila toy ny safotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Heb.
      - type: text
        text: ' sandrin’ny safotra.'
    marker-yv: yv-n
  - type: text
    text: ' no hindaosina hiala eo anatrehany sady ho resiny mbamin’ny andriana vita fanekena aminy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Eny, rehefa mifanaiky aminy io, dia hanao fitaka; fa hiakatra izy ka hahery, na dia vitsy aza ny olona entiny. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hiditra tsy ampoizina amin’ny fari-tany mahavokatra indrindra izy ka hanao izay tsy nataon’ny rainy na ny razany; hahàhany eny amin’ireny ny sambotra sy ny babo ary ny harena; ary hamoron-tsaina izy ka hamely ny fiarovana mandra-pahalanin’ny fotoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hanaitra ny heriny sy ny fony izy hamely ny mpanjakan’ny atsimo amin’ny miaramila maro; ary ny mpanjakan’ny atsimo kosa hanafika mitondra miaramila maro sady mahery indrindra; nefa tsy hahajanona izy, satria hisy hamoron-tsaina hamely azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Eny, izay homana ny hanina avy aminy ihany no hahalavo azy, ary ny miaramilany hanerana toy ny safotra, sady maro ny faty hiampatrampatra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny fon’ireo mpanjaka roa ireo dia samy ta-hanao ratsy, ary eo an-databatra iray no hiresahany lainga; nefa tsy hambinina izany; fa ny farany dia ho amin’ny fotoana ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary hiverina ho any amin’ny taniny mitondra harena be izy; koa ny fony dia hanohitra ny fanekena masina; ary hahefa sy hiverina ho any amin’ny taniny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Amin’ny fotoana dia ho lasa mianatsimo indray izy; nefa ny farany tsy ho toy ny voalohany; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'fa ny sambon’i Kitima ho avy hamely azy, ka dia ho kivy izy ka hiverina ary hisafoaka amin’ny fanekena masina ka hamely; eny, hiverina izy ka hisaina ny amin’ireo efa mahafoy ny fanekena masina. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary hisy miaramila
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Heb.
      - type: text
        text: ' sandry.'
    marker-yv: yv-n
  - type: text
    text: ' hitsangana noho ny teniny ka handoto ny fitoerana masina, dia ny fiarovana mafy, ary hampitsahatra ny fanatitra isan-andro sady hampiditra ny fahavetavetana mahatonga fandravana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary izay mivadika ny fanekena dia hambosiny amin’ny fandroboana; fa ny olona izay mahalala an’Andriamaniny kosa dia hifikitra amin’izany ka hankatò azy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.32 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Na:'
      - type: text
        text: ' dia hahery ka hahefa.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary izay hendry ao amin’ny olona dia hampianatra ny maro; nefa ho lavon’ny sabatra sy ny lelafo sy ny famaboana ary ny fandrobana elaela ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary rehefa lavo izy, dia hahazo famonjena kely; ary maro no hikambana aminy amin’ny fihatsarambelatsihy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary hisy ho lavo koa ny manan-tsaina, mba hizahan-toetra sy hanadiovana ary hamotsiana azy ambara-pahatongan’ny andro farany, fa mbola ho amin’ny fotoana ihany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny mpanjaka hanao araka izay sitrapony; ary hisandratra sy hanandra-tena ho ambonin’ny andriamanitra rehetra izy ka hiteny zavatra mahagaga ny amin’Andriamanitry ny andriamanitra, ary hambinina ihany izy mandra-pahatanteraky ny fahatezerana; fa izay efa voatendry no tsy maintsy hatao. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary tsy hahoany akory ny andriamanitry ny razany, na ny fitiavan’ny vehivavy; eny, tsy hahoany akory izay andriamanitra, fa hanandra-tena noho izy rehetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa ny andriamanitry ny fiarovana mafy no hankalazainy hisolo izany; ary volamena sy volafotsy sy vato soa ary zavatra mahafinaritra no ho entiny mankalaza ny andriamanitra izay tsy fantatry ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Dia homban’ny andriamani-kafa izy ka hamely ny batery mafy indrindra, ary izay manaiky azy dia homeny voninahitra be sady hataony mpanapaka ny maro, ary hozarainy ho azy ny tany ho valim-pitia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary amin’ny faran’ny andro dia hanoto azy ny mpanjakan’ny atsimo; ary ny mpanjakan’ny avaratra koa ho avy hamely azy toy ny tafio-drivotra ka hitondra kalesy sy mpitaingin-tsoavaly ary sambo maro; ary hiditra amin’ny tany izy ka hanerana toy ny safotra. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hiditra ao amin’ny tany mahafinaritra koa izy, ary maro no ho ripaka; fa izao kosa no ho afa-mandositra ny tànany: Edoma sy Moaba ary ireo lohan’ny taranak’i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Haninjitra ny tànany amin’ny tany sasany koa izy; ary ny tany Egypta tsy ho afa-mandositra. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa hahalasa ny rakitra volamena sy volafotsy ary ny zava-tsoan’i Egypta rehetra izy; ary ny Libyana sy ny Etiopiana hanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fa hisy siosion-teny avy any atsinanana sy avy any avaratra haharaiki-tahotra azy, ka dia hivoaka amin’ny fahatezerana be izy handrava sy handringana maro. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary haoriny eo anelanelan’ny ranomasina sy ny tendrombohitra masina mahafinaritra ny trano-lainy izay lapany; nefa ho tonga ao amin’ny hiafarany ihany izy, ka tsy hisy hamonjy azy.
