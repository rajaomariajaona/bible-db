document_id: JOB.14,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny olona tera-behivavy
  - type: text
    content: Dia vitsy andro sady vontom-pahoriana.
  '10':
  - type: text
    content: Fa ny olona kosa maty ka miampatra;
  - type: text
    content: Eny, miala aina ny olona, ary aiza izy?
  '11':
  - type: text
    content: Ny rano miala eo amin’ny kamory,
  - type: text
    content: Ary ny ony mihena ka ritra,
  '12':
  - type: text
    content: Ary toy izany koa ny olona; mandry izy ka tsy hitsangana intsony;
  - type: text
    content: Eny, mandra-paha-tsy hisian’ny lanitra dia tsy hahatsiaro izy
  - type: text
    content: Na hofohazina amin’ny torimasony.
  '13':
  - type: text
    content: Enga anie ka hanafina ahy any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' Hianao'
  - type: text
    content: Ka hampiery ahy mandra-pahafaky ny fahatezeranao!
  - type: text
    content: Ary hanendry fetr’andro ho ahy, dia hahatsiaro ahy
  '14':
  - type: text
    content: Raha maty ny olona, moa ho velona indray va izy?
  - type: text
    content: Raha izany, dia hiandry mandritra ny andro fanafihako aho,
  - type: text
    content: Mandra-pahatongan’ny fahafahako.
  - type: note
    content: 'Na: fiovako.'
  '15':
  - type: text
    content: Dia hiantso Hianao, ary izaho hamaly Anao;
  - type: text
    content: Ary mba halahelo ny asan’ny tànanao Hianao.
  '16':
  - type: text
    content: Fa ankehitriny manisa ny diako Hianao;
  - type: text
    content: Tsy mitsikilo ny fahotako va Hianao?
  '17':
  - type: text
    content: Efa voaisy tombo-kase ny kitapo misy ny fahadisoako;
  - type: text
    content: Ary voazaitranao ny heloko.
  '18':
  - type: text
    content: Kanefa na dia ny tendrombohitra aza, raha mianjera, dia mihalevona;
  - type: text
    content: Ary ny vatolampy dia afindra hiala amin’ny fitoerany;
  '19':
  - type: text
    content: Lanin’ny rano ny vato;
  - type: text
    content: 'Ary indaosin’ny riaka ny vovotany:'
  - type: text
    content: Toy izany no fanimbanao ny fanantenan’ny zanak’olombelona.
  '2':
  - type: text
    content: Mitsimoka tahaka ny voninkazo izy ka jinjana,
  - type: note
    content: 'Na: malazo.'
  - type: text
    content: Ary mihelina tahaka ny aloka izy ka tsy mitoetra.
  '20':
  - type: text
    content: Mandresy azy ho mandrakizay Hianao, ka lasa izy;
  - type: text
    content: Manova ny tarehiny Hianao ka mampandeha azy.
  '21':
  - type: text
    content: Omem-boninahitra ny zanany, nefa tsy fantany;
  - type: text
    content: Ary mietry ireo, nefa tsy hitany.
  '22':
  - type: text
    content: Ny mihatra amin’ny tenany ihany no mampanaintaina azy,
  - type: text
    content: Ary ny mihatra amin’ny tenany ihany no mampalahelo ny fanahiny.
  '3':
  - type: text
    content: Kanefa amin’izay toy izany foana no ampihiratanao ny masonao?
  - type: text
    content: Ka dia izay izaho avy no entinao hifandahatra aminao amin’ny fitsarana!
  - type: note
    content: 'Na: fitsaranao.'
  '4':
  - type: text
    content: Aiza no misy madio ateraky ny tsy madio?
  - type: text
    content: Tsy misy na dia iray akory aza.
  '5':
  - type: text
    content: Raha voafetra ny androny, ary voatendrinao ny isan’ny volana iainany,
  - type: text
    content: Ary asianao fefy tsy azony ihoarana,
  '6':
  - type: text
    content: Dia mihodina tsy hanatrika azy Hianao, mba hitsaharany,
  - type: text
    content: Ka hifaliany amin’
  - type: note
    content: 'Na: hotaperany.'
  - type: text
    content: ' ny androny toy ny mpikarama.'
  '7':
  - type: text
    content: Fa azo antenaina ny hazo,
  - type: text
    content: Satria, na dia kapaina aza izy, dia mbola hitsimoka indray,
  - type: text
    content: Ka tsy maintsy hisy ny solofony;
  '8':
  - type: text
    content: Na dia efa tonga antitra ao amin’ny tany aza ny fàkany,
  - type: text
    content: Ary maty ao amin’ny vovoka ny fotony,
  '9':
  - type: text
    content: Raha mahare ny fofon-drano izy, dia hitsimoka indray,
  - type: text
    content: Ka handrahaka tahaka ny hazo tanora nambolena.
