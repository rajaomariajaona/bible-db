document_id: JOB.14
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny olona tera-behivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia vitsy andro sady vontom-pahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mitsimoka tahaka ny voninkazo izy ka jinjana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: malazo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihelina tahaka ny aloka izy ka tsy mitoetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa amin’izay toy izany foana no ampihiratanao ny masonao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia izay izaho avy no entinao hifandahatra aminao amin’ny fitsarana!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fitsaranao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aiza no misy madio ateraky ny tsy madio?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy na dia iray akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha voafetra ny androny, ary voatendrinao ny isan’ny volana iainany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary asianao fefy tsy azony ihoarana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia mihodina tsy hanatrika azy Hianao, mba hitsaharany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hifaliany amin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hotaperany.
    marker-yv: yv-n
  - type: text
    text: ' ny androny toy ny mpikarama.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa azo antenaina ny hazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria, na dia kapaina aza izy, dia mbola hitsimoka indray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy maintsy hisy ny solofony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Na dia efa tonga antitra ao amin’ny tany aza ny fàkany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maty ao amin’ny vovoka ny fotony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha mahare ny fofon-drano izy, dia hitsimoka indray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka handrahaka tahaka ny hazo tanora nambolena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny olona kosa maty ka miampatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, miala aina ny olona, ary aiza izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny rano miala eo amin’ny kamory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ony mihena ka ritra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary toy izany koa ny olona; mandry izy ka tsy hitsangana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mandra-paha-tsy hisian’ny lanitra dia tsy hahatsiaro izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hofohazina amin’ny torimasony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Enga anie ka hanafina ahy any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' Hianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampiery ahy mandra-pahafaky ny fahatezeranao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanendry fetr’andro ho ahy, dia hahatsiaro ahy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha maty ny olona, moa ho velona indray va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha izany, dia hiandry mandritra ny andro fanafihako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahatongan’ny fahafahako.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiovako.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia hiantso Hianao, ary izaho hamaly Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mba halahelo ny asan’ny tànanao Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa ankehitriny manisa ny diako Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mitsikilo ny fahotako va Hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Efa voaisy tombo-kase ny kitapo misy ny fahadisoako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary voazaitranao ny heloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Kanefa na dia ny tendrombohitra aza, raha mianjera, dia mihalevona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vatolampy dia afindra hiala amin’ny fitoerany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lanin’ny rano ny vato;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary indaosin’ny riaka ny vovotany:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izany no fanimbanao ny fanantenan’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mandresy azy ho mandrakizay Hianao, ka lasa izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manova ny tarehiny Hianao ka mampandeha azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Omem-boninahitra ny zanany, nefa tsy fantany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mietry ireo, nefa tsy hitany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny mihatra amin’ny tenany ihany no mampanaintaina azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mihatra amin’ny tenany ihany no mampalahelo ny fanahiny.
