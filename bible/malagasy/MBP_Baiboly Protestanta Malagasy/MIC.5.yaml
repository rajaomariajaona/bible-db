document_id: MIC.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hahaterahan’ny Mesia, sy ny ho toetry ny fanjakany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: FA hianao, ry Betlehema Efrata,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay kely tsy tokony ho isan’ny arivon’i Joda akory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia avy ao aminao no hivoahan’Izay anankiray ho Mpanapaka ho Ahy ao amin’ny Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatry ny fahagola no efa nivoahany, dia hatrizay hatrizay.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hofoanako ny tanàna amin’ny taninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary harodako ny tanànanao mimanda rehetra;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hofoanako tsy hisy amin’ny tànanao ny fankatovanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hanana mpanandro intsony hianao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hofoanako tsy hisy aminao koa ny sampinao voasokitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny tsangam-baton-tsampinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hiankohoka eo anatrehan’ny asan’ny tànanao intsony hianao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hongotako tsy ho eo aminao ny Aserahanao;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaran’Andriamani-tsy-izy, na ny sariny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary horavako koa ny tanànanao.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: haringako koa ny fahavalonao.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary ny fahatezerana sy ny fahavinirana no hamaliako ny firenena izay tsy mihaino.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Koa dia hatolony ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-pihavin’ny fotoana hiterahan’izay anankiray hiteraka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay sisa amin’ny rahalahiny dia hiverina mbamin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho any.
      marker-yv: yv-n
    - type: text
      text: ' ny Zanak’Isiraely.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hitsangana Izy hiandry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny ondriny
    - type: text
      text: ' amin’ny herin’i Jehovah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny voninahitry ny anaran’i Jehovah Andriamaniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handry fahizay ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izao dia ho lehibe hatrany amin’ny faran’ny tany Izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary Izy no ho fiadanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tonga eto amin’ny tanin-tsika ny Asyriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miditra ao amin’ny tranobentsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanangana mpiandry ondry fito sy mpanapaka valo hisakana azy isika.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary handany ny tany Asyria amin’ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny tanin’i Nimroda ao an-tanànany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: am-bavahadiny.
      marker-yv: yv-n
    - type: text
      text: ' ireo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izy hamonjy amin’ny Asyriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tonga amin’ny tanintsika sady manitsaka ato amin’ny fari-tanintsika ireny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary izay sisa amin’i Jakoba ao amin’ny firenena maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka ny ando avy amin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny ranonorana eny amin’ny ahitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy manantena mpaniraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na miandry zanak’olombelona.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary izay sisa amin’i Jakoba ao amin’ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny firenena maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka ny liona amin’ny biby any an-ala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy ho tahaka ny liona tanora ao amin’ny andian’ny ondry aman-osy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mamaky eo izy, dia manitsakitsaka sy mamiravira, ka tsy misy mahavonjy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aoka haingaina amin’ny rafilahinao ny tànanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho ringana ny fahavalonao rehetra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary amin’izany andro izany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia haringako tsy ho eo aminao intsony ny soavalinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hofonganiko ny kalesinao;
