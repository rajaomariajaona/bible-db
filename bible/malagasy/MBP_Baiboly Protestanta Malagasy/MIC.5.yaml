document_id: MIC.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hahaterahan’ny Mesia, sy ny ho toetry ny fanjakany.
  - type: text
    content: FA hianao, ry Betlehema Efrata,
  - type: text
    content: Izay kely tsy tokony ho isan’ny arivon’i Joda akory,
  - type: text
    content: Dia avy ao aminao no hivoahan’Izay anankiray ho Mpanapaka ho Ahy ao amin’ny Isiraely;
  - type: text
    content: Hatry ny fahagola no efa nivoahany, dia hatrizay hatrizay.
  '10':
  - type: text
    content: Hofoanako ny tanàna amin’ny taninao,
  - type: text
    content: Ary harodako ny tanànanao mimanda rehetra;
  '11':
  - type: text
    content: Hofoanako tsy hisy amin’ny tànanao ny fankatovanao,
  - type: text
    content: Ary tsy hanana mpanandro intsony hianao.
  '12':
  - type: text
    content: Hofoanako tsy hisy aminao koa ny sampinao voasokitra
  - type: text
    content: Sy ny tsangam-baton-tsampinao;
  - type: text
    content: Ary tsy hiankohoka eo anatrehan’ny asan’ny tànanao intsony hianao.
  '13':
  - type: text
    content: Hongotako tsy ho eo aminao ny Aserahanao;
  - type: note
    content: Anaran’Andriamani-tsy-izy, na ny sariny.
  - type: text
    content: Ary horavako koa ny tanànanao.
  - type: note
    content: 'Na: haringako koa ny fahavalonao.'
  '14':
  - type: text
    content: Ary ny fahatezerana sy ny fahavinirana no hamaliako ny firenena izay tsy mihaino.
  '2':
  - type: text
    content: Koa dia hatolony ireny,
  - type: text
    content: Ambara-pihavin’ny fotoana hiterahan’izay anankiray hiteraka;
  - type: text
    content: Ary izay sisa amin’ny rahalahiny dia hiverina mbamin’
  - type: note
    content: 'Na: ho any.'
  - type: text
    content: ' ny Zanak’Isiraely.'
  '3':
  - type: text
    content: 'Ary hitsangana Izy hiandry '
  - type: text
    content: ny ondriny
  - type: text
    content: ' amin’ny herin’i Jehovah,'
  - type: text
    content: Sy amin’ny voninahitry ny anaran’i Jehovah Andriamaniny,
  - type: text
    content: Ka handry fahizay ireny,
  - type: text
    content: Fa izao dia ho lehibe hatrany amin’ny faran’ny tany Izy.
  '4':
  - type: text
    content: Ary Izy no ho fiadanana;
  - type: text
    content: Raha tonga eto amin’ny tanin-tsika ny Asyriana
  - type: text
    content: Ka miditra ao amin’ny tranobentsika,
  - type: text
    content: Dia hanangana mpiandry ondry fito sy mpanapaka valo hisakana azy isika.
  '5':
  - type: text
    content: Ary handany ny tany Asyria amin’ny sabatra
  - type: text
    content: Sy ny tanin’i Nimroda ao an-tanànany
  - type: note
    content: Heb. am-bavahadiny.
  - type: text
    content: ' ireo;'
  - type: text
    content: Ary Izy hamonjy amin’ny Asyriana,
  - type: text
    content: Raha tonga amin’ny tanintsika sady manitsaka ato amin’ny fari-tanintsika ireny.
  '6':
  - type: text
    content: Ary izay sisa amin’i Jakoba ao amin’ny firenena maro
  - type: text
    content: Dia ho tahaka ny ando avy amin’i Jehovah,
  - type: text
    content: Sy tahaka ny ranonorana eny amin’ny ahitra,
  - type: text
    content: Izay tsy manantena mpaniraka,
  - type: text
    content: Na miandry zanak’olombelona.
  '7':
  - type: text
    content: Ary izay sisa amin’i Jakoba ao amin’ny jentilisa,
  - type: text
    content: Ao amin’ny firenena maro,
  - type: text
    content: Dia ho tahaka ny liona amin’ny biby any an-ala,
  - type: text
    content: 'Sy ho tahaka ny liona tanora ao amin’ny andian’ny ondry aman-osy:'
  - type: text
    content: Raha mamaky eo izy, dia manitsakitsaka sy mamiravira, ka tsy misy mahavonjy.
  '8':
  - type: text
    content: Aoka haingaina amin’ny rafilahinao ny tànanao,
  - type: text
    content: Ary aoka ho ringana ny fahavalonao rehetra.
  '9':
  - type: text
    content: Ary amin’izany andro izany, hoy Jehovah,
  - type: text
    content: Dia haringako tsy ho eo aminao intsony ny soavalinao,
  - type: text
    content: Ary hofonganiko ny kalesinao;
