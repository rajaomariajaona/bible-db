document_id: JER.48,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’i Moaba.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY amin’i Moaba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nidiran-doza Nebo, fa rava!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangaihay Kiriataima, fa afaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangaihay Misgaba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny fiarovana avo.
      marker-yv: yv-n
    - type: text
      text: ' sady raiki-tahotra.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ho voaozona anie izay manao tsirambina foana ny asa asain’i Jehovah atao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho voaozona anie izay mihazona ny sabany tsy handatsa-dra!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Moaba nandry fahizay hatry ny fony izy mbola kely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka niotrika tao amin’ny faikany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy naidina nafindrafindra siny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mbola lasan-ko babo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no aharetan’ny tsirony ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tsy iovan’ny fofony.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa, indro, avy ny andro hanirahako mpanohoka ho any aminy, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hanohoka azy ka hahafoana ny fitoeran-divainy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hanorotoro ny sininy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary Moaba ho menatra noho ny amin’i Kemosy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nahamenaran’ny taranak’Isiraely noho ny amin’i Betela tokiny.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ahoana no anaovanareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehilahy matanjaka sady mahery an-ady izahay?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Rava Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tanànany dia efa nanihina,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: efa levon-ko setroka.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zatovony voafantina efa nidina ho any amin’ny famonoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy ny Mpanjaka,–Jehovah, Tompon’ny maro, no anarany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Efa antomotra ny loza hanjo an’i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mimaona ny fahoriany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mitomania azy, hianareo rehetra izay manodidina azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hianareo rehetra izay mahalala ny anarany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, manaova hoe: Indrisy! tapaka ny tehina mafy sy ny tsorakazo tsara tarehy!'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ry Dibona, zanakavavy mponina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midìna miala amin’ny voninahitrao, ka mitoera ao amin’ny tany mangentana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ilay mandringana an’i Moaba dia miakatra mamely anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mandrava ny fiarovanao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ry mponina any Aroera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijanòna eny an-dàlambe, ka mitazàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary izay mandositra, na lehilahy na vehivavy, dia anontanio hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nozoin’inona hianareo?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tsy misy ho reharehan’i Moaba intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tao Hesbona no niheverany hampidi-doza aminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha horavantsika tsy ho firenena izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho ringana koa hianao, ry Madmena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanenjika anao ny sabatra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Afa-baraka Moaba, eny, raiki-tahotra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midradradradrà sy mitaraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ambaraonareo ao Arnona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa rava Moaba.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary ny fitsarana dia miakatra ao amin’ny tany lemaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ao Holona sy Jahaza sy Mefata
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Sy Dibona sy Nebo sy Beti-diblataima
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Sy Kiriataima sy Beti-gamola sy Beti-meona
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Sy Keriota ary Bozra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny tanànan’i Moaba rehetra, na ny lavitra na ny akaiky.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Voakapa ny tandrok’i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tapaka koa ny sandriny, hoy Jehovah.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ataovy leony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa niavonavona tamin’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moaba hihosinkosina amin’ny loany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mba ho tonga fihomehezana kosa.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa tsy efa nataonao ho fihomehezana va ny Isiraely?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa hita fa naman’ny mpangalatra va izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No dia mihifikifika hianao isaky ny milaza azy?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ry mponina any Moaba! ilaozy ny tanàna, ka mitoera ao amin’ny harambato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho tahaka ny voromailala
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manao ny akaniny erỳ am-pitan’ny hantsana hianao.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Efa renay ny fiavonavonan’i Moaba–fatra-piavonavona loatra izy–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fireharehany sy ny fiavonavonany sy ny fiaingitrainginy ary ny avonavon’ny fony.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Injay! misy feo fitarainana ao Horonaima hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandravana sy fandringanana be!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Izaho mahalala ny fihoa-bavany sy ny fibedibediny foana, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsinontsinona ny ataony.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Koa hidradradradra noho ny amin’i Moaba aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hitomany noho ny amin’i Moaba rehetra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hitsetra noho ny amin’ny mponina ao Kira-haresa ny olona.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Mihoatra noho ny fitomanian’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fitomaniana an’.
      marker-yv: yv-n
    - type: text
      text: ' i Jazera no hitomaniako anao, ry voalobok’i Sibma,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tafita ny ranomasina ny rantsanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tonga hatrany amin’ny ranomasin’i Jazera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpandripaka dia tonga handripaka ny voankazonao masaka fahavaratra sy ny voalobokao.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary ny hafaliana sy ny faharavoravoana nesorina tamin’ny saha nahavokatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tamin’ny tany Moaba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nataoko tankina ny divay tamin’ny vata fanantazana ranom-boaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy hihoby amin’ny fanitsakitsahana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fihobiana dia tsy fihobiana akory.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ny fitarainan’i Hesbona, dia re hatrany Elale sy Jahaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatrany Zoara ka hatrany Horonaima sy Eglata-selisia;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ilay ombivavy kely telo taona.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia ny ranon’i Nimrima aza dia ho ritra koa.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary hatsahatro ao Moaba koa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miakatra hanatitra amin’ny fitoerana avo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy izay mandoro ditin-kazo manitra ho an’ny andriamaniny, hoy Jehovah.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ary noho izany ny foko dia mitomany manao feon-tsodina noho ny amin’i Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny foko mitomany manao feon-tsodina noho ny amin’ny mponina ao Kira-haresa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, noho izany dia levona ny harena be izay nohariny.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Fa mibory ny loha rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary voaharatra ny somotra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy tetika amin’ny tanàna rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy lamba fisaonana amin’ny valahana.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Eny, amin’ny tampon-trano rehetra any Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy eny an-kalalahana dia misy fisaonana avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria torotoroiko toy ny fanaka tsy mahafinaritra intsony Moaba, hoy Jehovah.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Indrisy! raiki-tahotra izy! Midradradradrà!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! efa miamboho Moaba, mangaihay izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tonga fihomehezana sy fampitahorana ho an’izay rehetra manodidina azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rava Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny madinika ao dia mamoaka fitarainana.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Fa izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hanidina toy ny voromahery izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hamelatra ny elany hipaoka an’i Moaba.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Afaka ny tanàna,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.41 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Keriota.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka azo ny batery fiarovana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’izany andro izany ny fon’ny lehilahy maherin’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka ny fon’ny vehivavy mihetsi-jaza.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ary horavana tsy ho firenena intsony Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria niavonavona tamin’i Jehovah izy.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Tahotra sy lavaka ary fandrika no mahazo anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mponina any Moaba, hoy Jehovah.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Izay mandositra ny tahotra dia ho latsaka any an-davaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay miakatra avy any an-davaka dia ho voan’ny fandrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hataoko tonga amin’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taona hamaliana azy, hoy Jehovah.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Ao amin’ny alokalok’i Hesbona no ijanonan’ny mpandositra, satria lany hery ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo misy afo mivoaka avy any Hesbona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary lelafo avy any Sihona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandevona ny sisin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.45 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny sisim-bolom-bavany.
      marker-yv: yv-n
    - type: text
      text: ' i Moaba'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny tampon-dohan’ny mpitabataba.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Idiran-doza hianao, ry Moaba!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ringana ny olon’i Kemosy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho babo ny zanakao-lahy, ary ho sambotra ny zanakao-vavy.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Nefa mbola hampodiko avy amin’ny fahababoana ihany Moaba any am-parany, hoy Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatreto ny amin’ny fitsarana an’i Moaba.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa miakatra mitomany lalandava eny amin’ny fiakarana Lohita izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny fidinana mankany Horonaima no andrenesana fitarainana mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fandringanana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mandosira, vonjeo ny ainareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho tahaka ny olona mahantra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny anjavidy.
      marker-yv: yv-n
    - type: text
      text: ' any an-efitra hianareo.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa noho ny nitokianao tamin’ny asanao sy ny rakitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho voasambotra koa hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Kemosy ho lasan-ko babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny mpisorony sy ny mpanapaka rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary ny mpandringana ho tonga ao amin’ny tanàna rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy tanàna tsy ho afaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lohasaha koa ho simba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tany lemaka ho rava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka izay nolazain’i Jehovah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Omeo elatra Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hanidina izy ka ho lasa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho lao ny tanànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy mponina.
