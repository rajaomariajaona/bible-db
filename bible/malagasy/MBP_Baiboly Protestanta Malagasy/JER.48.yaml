document_id: JER.48,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’i Moaba.
  - type: text
    content: NY amin’i Moaba.
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: text
    content: Nidiran-doza Nebo, fa rava!
  - type: text
    content: Mangaihay Kiriataima, fa afaka;
  - type: text
    content: Mangaihay Misgaba
  - type: note
    content: 'Na: ny fiarovana avo.'
  - type: text
    content: ' sady raiki-tahotra.'
  '10':
  - type: text
    content: Ho voaozona anie izay manao tsirambina foana ny asa asain’i Jehovah atao!
  - type: text
    content: Eny, ho voaozona anie izay mihazona ny sabany tsy handatsa-dra!
  '11':
  - type: text
    content: Moaba nandry fahizay hatry ny fony izy mbola kely
  - type: text
    content: Ka niotrika tao amin’ny faikany,
  - type: text
    content: Fa tsy naidina nafindrafindra siny,
  - type: text
    content: Ary tsy mbola lasan-ko babo izy;
  - type: text
    content: Koa izany no aharetan’ny tsirony ao aminy
  - type: text
    content: Sy tsy iovan’ny fofony.
  '12':
  - type: text
    content: Koa, indro, avy ny andro hanirahako mpanohoka ho any aminy, hoy Jehovah,
  - type: text
    content: Izay hanohoka azy ka hahafoana ny fitoeran-divainy
  - type: text
    content: Sady hanorotoro ny sininy.
  '13':
  - type: text
    content: Ary Moaba ho menatra noho ny amin’i Kemosy
  - type: text
    content: Toy ny nahamenaran’ny taranak’Isiraely noho ny amin’i Betela tokiny.
  '14':
  - type: text
    content: 'Ahoana no anaovanareo hoe:'
  - type: text
    content: Lehilahy matanjaka sady mahery an-ady izahay?
  '15':
  - type: text
    content: Rava Moaba,
  - type: text
    content: Fa ny tanànany dia efa nanihina,
  - type: note
    content: 'Na: efa levon-ko setroka.'
  - type: text
    content: Ary ny zatovony voafantina efa nidina ho any amin’ny famonoana,
  - type: text
    content: Hoy ny Mpanjaka,–Jehovah, Tompon’ny maro, no anarany.
  '16':
  - type: text
    content: Efa antomotra ny loza hanjo an’i Moaba,
  - type: text
    content: Ary mimaona ny fahoriany.
  '17':
  - type: text
    content: Mitomania azy, hianareo rehetra izay manodidina azy
  - type: text
    content: Sy hianareo rehetra izay mahalala ny anarany!
  - type: text
    content: 'Eny, manaova hoe: Indrisy! tapaka ny tehina mafy sy ny tsorakazo tsara tarehy!'
  '18':
  - type: text
    content: Ry Dibona, zanakavavy mponina,
  - type: text
    content: Midìna miala amin’ny voninahitrao, ka mitoera ao amin’ny tany mangentana,
  - type: text
    content: Fa ilay mandringana an’i Moaba dia miakatra mamely anao
  - type: text
    content: Sady mandrava ny fiarovanao.
  '19':
  - type: text
    content: Ry mponina any Aroera.
  - type: text
    content: Mijanòna eny an-dàlambe, ka mitazàna,
  - type: text
    content: 'Ary izay mandositra, na lehilahy na vehivavy, dia anontanio hoe:'
  - type: text
    content: Nozoin’inona hianareo?
  '2':
  - type: text
    content: Tsy misy ho reharehan’i Moaba intsony;
  - type: text
    content: 'Tao Hesbona no niheverany hampidi-doza aminy hoe:'
  - type: text
    content: Andeha horavantsika tsy ho firenena izy.
  - type: text
    content: Ho ringana koa hianao, ry Madmena,
  - type: text
    content: Hanenjika anao ny sabatra.
  '20':
  - type: text
    content: Afa-baraka Moaba, eny, raiki-tahotra izy;
  - type: text
    content: Midradradradrà sy mitaraina,
  - type: text
    content: Ka ambaraonareo ao Arnona
  - type: text
    content: Fa rava Moaba.
  '21':
  - type: text
    content: Ary ny fitsarana dia miakatra ao amin’ny tany lemaka,
  - type: text
    content: Dia ao Holona sy Jahaza sy Mefata
  '22':
  - type: text
    content: Sy Dibona sy Nebo sy Beti-diblataima
  '23':
  - type: text
    content: Sy Kiriataima sy Beti-gamola sy Beti-meona
  '24':
  - type: text
    content: Sy Keriota ary Bozra,
  - type: text
    content: Eny, ny tanànan’i Moaba rehetra, na ny lavitra na ny akaiky.
  '25':
  - type: text
    content: Voakapa ny tandrok’i Moaba,
  - type: text
    content: Ary tapaka koa ny sandriny, hoy Jehovah.
  '26':
  - type: text
    content: Ataovy leony izy,
  - type: text
    content: Fa niavonavona tamin’i Jehovah;
  - type: text
    content: Moaba hihosinkosina amin’ny loany
  - type: text
    content: Sady mba ho tonga fihomehezana kosa.
  '27':
  - type: text
    content: Fa tsy efa nataonao ho fihomehezana va ny Isiraely?
  - type: text
    content: Moa hita fa naman’ny mpangalatra va izy,
  - type: text
    content: No dia mihifikifika hianao isaky ny milaza azy?
  '28':
  - type: text
    content: Ry mponina any Moaba! ilaozy ny tanàna, ka mitoera ao amin’ny harambato,
  - type: text
    content: Ary aoka ho tahaka ny voromailala
  - type: text
    content: Izay manao ny akaniny erỳ am-pitan’ny hantsana hianao.
  '29':
  - type: text
    content: Efa renay ny fiavonavonan’i Moaba–fatra-piavonavona loatra izy–
  - type: text
    content: Dia ny fireharehany sy ny fiavonavonany sy ny fiaingitrainginy ary ny avonavon’ny fony.
  '3':
  - type: text
    content: 'Injay! misy feo fitarainana ao Horonaima hoe:'
  - type: text
    content: Fandravana sy fandringanana be!
  '30':
  - type: text
    content: Izaho mahalala ny fihoa-bavany sy ny fibedibediny foana, hoy Jehovah;
  - type: text
    content: Tsinontsinona ny ataony.
  '31':
  - type: text
    content: Koa hidradradradra noho ny amin’i Moaba aho;
  - type: text
    content: Eny, hitomany noho ny amin’i Moaba rehetra aho,
  - type: text
    content: Ary hitsetra noho ny amin’ny mponina ao Kira-haresa ny olona.
  '32':
  - type: text
    content: Mihoatra noho ny fitomanian’
  - type: note
    content: 'Na: fitomaniana an’.'
  - type: text
    content: ' i Jazera no hitomaniako anao, ry voalobok’i Sibma,'
  - type: text
    content: Tafita ny ranomasina ny rantsanao
  - type: text
    content: Ary tonga hatrany amin’ny ranomasin’i Jazera;
  - type: text
    content: Ny mpandripaka dia tonga handripaka ny voankazonao masaka fahavaratra sy ny voalobokao.
  '33':
  - type: text
    content: Ary ny hafaliana sy ny faharavoravoana nesorina tamin’ny saha nahavokatra
  - type: text
    content: Sy tamin’ny tany Moaba;
  - type: text
    content: Ary nataoko tankina ny divay tamin’ny vata fanantazana ranom-boaloboka,
  - type: text
    content: Tsy hisy hihoby amin’ny fanitsakitsahana;
  - type: text
    content: Ny fihobiana dia tsy fihobiana akory.
  '34':
  - type: text
    content: Ny fitarainan’i Hesbona, dia re hatrany Elale sy Jahaza,
  - type: text
    content: Hatrany Zoara ka hatrany Horonaima sy Eglata-selisia;
  - type: note
    content: 'Na: ilay ombivavy kely telo taona.'
  - type: text
    content: Fa na dia ny ranon’i Nimrima aza dia ho ritra koa.
  '35':
  - type: text
    content: Ary hatsahatro ao Moaba koa
  - type: text
    content: Izay miakatra hanatitra amin’ny fitoerana avo
  - type: text
    content: Sy izay mandoro ditin-kazo manitra ho an’ny andriamaniny, hoy Jehovah.
  '36':
  - type: text
    content: Ary noho izany ny foko dia mitomany manao feon-tsodina noho ny amin’i Moaba,
  - type: text
    content: Ary ny foko mitomany manao feon-tsodina noho ny amin’ny mponina ao Kira-haresa,
  - type: text
    content: Eny, noho izany dia levona ny harena be izay nohariny.
  '37':
  - type: text
    content: Fa mibory ny loha rehetra.
  - type: text
    content: Ary voaharatra ny somotra rehetra,
  - type: text
    content: Misy tetika amin’ny tanàna rehetra
  - type: text
    content: Sy lamba fisaonana amin’ny valahana.
  '38':
  - type: text
    content: Eny, amin’ny tampon-trano rehetra any Moaba
  - type: text
    content: Sy eny an-kalalahana dia misy fisaonana avokoa;
  - type: text
    content: Satria torotoroiko toy ny fanaka tsy mahafinaritra intsony Moaba, hoy Jehovah.
  '39':
  - type: text
    content: Indrisy! raiki-tahotra izy! Midradradradrà!
  - type: text
    content: Indrisy! efa miamboho Moaba, mangaihay izy,
  - type: text
    content: Ka dia tonga fihomehezana sy fampitahorana ho an’izay rehetra manodidina azy.
  '4':
  - type: text
    content: Rava Moaba,
  - type: text
    content: Ny madinika ao dia mamoaka fitarainana.
  '40':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Indro, hanidina toy ny voromahery izy
  - type: text
    content: Ka hamelatra ny elany hipaoka an’i Moaba.
  '41':
  - type: text
    content: Afaka ny tanàna,
  - type: note
    content: 'Na: Keriota.'
  - type: text
    content: Ka azo ny batery fiarovana,
  - type: text
    content: Ary amin’izany andro izany ny fon’ny lehilahy maherin’i Moaba
  - type: text
    content: Dia ho tahaka ny fon’ny vehivavy mihetsi-jaza.
  '42':
  - type: text
    content: Ary horavana tsy ho firenena intsony Moaba,
  - type: text
    content: Satria niavonavona tamin’i Jehovah izy.
  '43':
  - type: text
    content: Tahotra sy lavaka ary fandrika no mahazo anao,
  - type: text
    content: Ry mponina any Moaba, hoy Jehovah.
  '44':
  - type: text
    content: Izay mandositra ny tahotra dia ho latsaka any an-davaka;
  - type: text
    content: Ary izay miakatra avy any an-davaka dia ho voan’ny fandrika;
  - type: text
    content: Fa hataoko tonga amin’i Moaba
  - type: text
    content: Ny taona hamaliana azy, hoy Jehovah.
  '45':
  - type: text
    content: Ao amin’ny alokalok’i Hesbona no ijanonan’ny mpandositra, satria lany hery ireny;
  - type: text
    content: Kanjo misy afo mivoaka avy any Hesbona,
  - type: text
    content: Ary lelafo avy any Sihona,
  - type: text
    content: Ka mandevona ny sisin’
  - type: note
    content: 'Na: ny sisim-bolom-bavany.'
  - type: text
    content: ' i Moaba'
  - type: text
    content: Sy ny tampon-dohan’ny mpitabataba.
  '46':
  - type: text
    content: Idiran-doza hianao, ry Moaba!
  - type: text
    content: Ringana ny olon’i Kemosy!
  - type: text
    content: Fa ho babo ny zanakao-lahy, ary ho sambotra ny zanakao-vavy.
  '47':
  - type: text
    content: Nefa mbola hampodiko avy amin’ny fahababoana ihany Moaba any am-parany, hoy Jehovah.
  - type: text
    content: Hatreto ny amin’ny fitsarana an’i Moaba.
  '5':
  - type: text
    content: Fa miakatra mitomany lalandava eny amin’ny fiakarana Lohita izy;
  - type: text
    content: Ary amin’ny fidinana mankany Horonaima no andrenesana fitarainana mafy
  - type: text
    content: Noho ny fandringanana.
  '6':
  - type: text
    content: Mandosira, vonjeo ny ainareo,
  - type: text
    content: Ary aoka ho tahaka ny olona mahantra
  - type: note
    content: 'Na: ny anjavidy.'
  - type: text
    content: ' any an-efitra hianareo.'
  '7':
  - type: text
    content: Fa noho ny nitokianao tamin’ny asanao sy ny rakitrao
  - type: text
    content: Dia ho voasambotra koa hianao;
  - type: text
    content: Ary Kemosy ho lasan-ko babo,
  - type: text
    content: Dia ny mpisorony sy ny mpanapaka rehetra.
  '8':
  - type: text
    content: Ary ny mpandringana ho tonga ao amin’ny tanàna rehetra,
  - type: text
    content: Ka tsy hisy tanàna tsy ho afaka;
  - type: text
    content: Ny lohasaha koa ho simba,
  - type: text
    content: Ary ny tany lemaka ho rava,
  - type: text
    content: Araka izay nolazain’i Jehovah.
  '9':
  - type: text
    content: Omeo elatra Moaba,
  - type: text
    content: Fa hanidina izy ka ho lasa;
  - type: text
    content: Ary ho lao ny tanànany,
  - type: text
    content: Ka tsy hisy mponina.
