document_id: JOS.19
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny loka faharoa dia azon’i Simeona, dia ny firenena taranak’i Simeona isam-pokony; ary ny lovany dia tao anatin’ny lovan’ny taranak’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary izao no azony ho lovany: Beri-sheba, na Seba, sy Molada '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sy Hazara-soala sy Bala sy Azema '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sy Eltolada sy Betola sy Horma '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sy Ziklaga sy Beti-markabota sy Hazara-sosa '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sy Beti-lebaota ary Sarohena: tanàna telo ambin’ny folo sy ny zana-bohiny; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'sy Aina sy Rimona sy Etera sy Asana: tanàna efatra sy ny zana-bohiny; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary ny zana-bohitra rehetra manodidina ireo tanàna ireo hatrany Baleta-bera sy Rama amin’ny tany atsimo. Izany no lovan’ny firenena taranak’i Simeona araka ny fokony. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Avy tamin’ny anjaran’ny taranak’i Joda no nahazoan’ny taranak’i Simeona ny lovany; fa nalalaka loatra taminy ny anjaran’ny taranak’i Joda, ka izany no nahazoan’ny taranak’i Simeona anjara tao anatin’ny azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny loka fahatelo dia azon’ny taranak’i Zebolona isam-pokony; ary ny fari-tanin’ny lovany dia hatrany Sarida, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia niakatra niankandrefana hatrany Marala, dia nahazo an’i Dabeseta ka nihatra tamin’ny lohasahan-driaka tandrifin’i Jokneama, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia nitodika niantsinanana hatrany Sarida ka hatramin’ny fari-tanin’i Kislota-tabara, dia nandroso hatrany Daberata ka niakatra hatrany Jafia, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia nandroso niantsinanana hatrany Gata-hefera sy Ita-kazina ka nandroso hatrany Rimona, izay mipaka an’i Nea, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia niolaka eo avaratr’iny ka nahazo an’i Hanatona, dia nihatra tamin’ny lohasaha Jifta-ela. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Katata sy Nahalola sy Simrona sy Idala sy Betlehema, dia tanàna roa ambin’ny folo sy ny zana-bohiny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izany no lovan’ny taranak’i Zebolona araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny loka fahefatra dia azon’Isakara, dia ny taranak’Isakara isam-pokony. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny fari-taniny dia hatrany Jezirela sy Kesolota sy Sonema '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sy Hafraima sy Siona sy Anaharata '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'sy Rabita sy Kisiona sy Abeza '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'sy Rameta sy Enganima sy En-hada ary Beti-pazeza. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny fari-taniny dia nahazo an’i Tabara sy Sahazoma sy Beti-semesy, ka dia nihatra tany Jordana: tanàna enina ambin’ny folo sy ny zana-bohiny. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izany no lovan’ny firenena taranak’Isakara araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny loka fahadimy dia azon’ny firenena taranak’i Asera isam-pokony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny fari-taniny dia Helkata sy Haly sy Batena sy Aksafa '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'sy Alameleka sy Amada sy Misala, dia nihatra any Karmela eo andrefana sy Sihora-libnata, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'dia nitodika niantsinanana ho any Beti-dagona ka nihatra any Zebolona sy ny lohasaha Jifta-ela any avaratra sy Bet-emeka sy Neiela, ka dia nihatra any Kabola eo ankavia '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary Ebrona sy Rehoba sy Hamona sy Kana ka hatrany Sidona lehibe, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia nitodika hatrany Rama sy Tyro, tanàna mimanda, dia nitodika hatrany Hosa, ka dia nihatra tamin’ny ranomasina teo akaikin’ny tany Akziba '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ary Oma sy Afeka ary Rehoba: tanàna roa amby roa-polo sy ny zana-bohiny. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Izany no lovan’ny firenena taranak’i Asera araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny loka fahenina dia an’ny taranak’i Naftaly isam-pokony. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny fari-taniny dia hatrany Halefa ka hatramin’ny hazo terebinta ao Zananima sy hatrany Adami-hanekeba sy Jabniela ka hatrany Lakoma, ka dia nihatra an’i Jordana, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia nitodika niankandrefana hatrany Aznota-tabara, dia nandroso hatrany Hokoka ary nihatra an’i Zebolona eo atsimo sy Asera eo andrefana ary Joda amoron’i Jordana eo atsinanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny tanàna mimanda dia Zidima sy Zera sy Hamata sy Rakata sy Kinereta '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'sy Adama sy Rama sy Hazora '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'sy Kadesy sy Edrehy sy En-hazora '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'sy Irona sy Migdal-ela sy Horema sy Bet-anata ary Beti-semesy: tanàna sivy ambin’ny folo sy ny zana-bohiny. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Izany no lovan’ny firenena taranak’i Naftaly araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny loka fahafito dia an’ny firenena taranak’i Dana isam-pokony. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary ny fari-tanin’ny lovany dia Zora sy Estaola sy Ira-semesy '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'sy Salabima sy Aialona sy Jitla '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'sy Elona sy Timna sy Ekrona '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'sy Elteke sy Gibetona sy Baleta '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'sy Jehoda sy Bene-beraka sy Gat-rimona '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'sy Me-jarkona sy Rakona ary ny tany tandrifin’i Jopa. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary ny fari-tanin’ny taranak’i Dana dia nandroso nihoatra ireo; fa niakatra ny taranak’i Dana, dia niady tamin’i Lesema ka nahafaka azy ary namely azy tamin’ny lelan-tsabatra ka nahazo azy, dia nitoetra teo; ary ny anaran’i Lesema nataony hoe Dana araka ny anaran’i Dana rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Izany no lovan’ny firenena taranak’i Dana araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia vitany ny nizarana ny tany holovany araka ny fari-taniny, ka dia nomen’ny Zanak’Isiraely lova teo aminy koa Josoa, zanak’i Nona. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Araka ny tenin’i Jehovah dia nomeny azy ny tanàna izay nangatahiny, dia Timnata-sera any amin’ny tany havoan’i Efraima; dia nanamboatra ny tanàna izy ka nitoetra tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Ireo no lova izay nozarain’i Eleazara mpisorona sy Josoa, zanak’i Nona, ary ny lohan’ny fianakaviana tamin’ny firenen’ny Zanak’Isiraely tao Silo teo anatrehan’i Jehovah, dia teo am-baravaran’ny trano-lay fihaonana, araka ny filokana. Dia vitany avokoa ny nizarany ny tany.
