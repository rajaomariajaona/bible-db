  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka izay rehetra efa nandidian’i Jehovah an’i Mosesy, dia toy izany no nanaovan’ny Zanak’Isiraely ny asa rehetra. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nizaha ny asa rehetra Mosesy, ka, indro, efa nataony araka izay nandidian’i Jehovah; dia nisaotra azy Mosesy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fehin-kibo momba ny efoda, izay teo amboniny, dia niray taminy sady nitovy tarehy taminy, ka nataony volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vato beryla nasiany randram-bolamena manodidina, ary dia nosoratany, tahaka ny fanoratana fanombohan-kase, araka ny anaran’ny firenen’ny Zanak’Isiraely. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nataony teo amin’ny soroky ny efoda ny vato, ho vato fahatsiarovana ho an’ny Zanak’Isiraely, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ny saron-tratra tamin’ny asan’ny mpanenona mahay izy, tahaka ny nanaovana ny efoda, dia volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa-joro miforitra roa no nanaovany ny saron-tratra, ary irain-jehy avy ny lafiny efatra, sady niforitra roa izy. '
