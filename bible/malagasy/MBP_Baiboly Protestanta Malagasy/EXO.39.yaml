    - type: text
      text: ' hanaovana fanompoam-pivavahana ao amin’ny fitoerana masina, ary nanao ny fitafiana masina ho an’i Arona izy, dia araka izay efa nandidian’i Jehovah an’i Mosesy.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nasiany vato nalatsaka an-tranontranony izy, dia vato efatra andalana: ny andalana voalaohany dia karnelia sy topaza ary emeralda; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny andalana faharoa dia robina sy safira ary onyksa; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny andalana fahatelo dia opala sy agata ary ametysta; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny andalana fahefatra dia krysolita sy beryla ary jaspy; ary nasiany randram-bolamena manodidina ny fitoerany avy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny vato dia nalahatra araka ny anaran’ny firenen’ny Zanak’Isiraely, dia roa ambin’ny folo araka ny anarany; ary nisy soratra toy ny amin’ny fanombohan-kase ho an’ny firenena roa ambin’ny folo araka ny anarany avy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao olam-bolamena tsara mifanolana toy ny tady ho eo amin’ny saron-tratra izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao randram-bolamena roa sy vava volamena roa izy; ary ny vava vola dia nataony teo amin’ny zorony roa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ambony
    - type: text
      text: ' amin’ny saron-tratra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tady volamena roa dia nataony teo amin’ny vava vola roa izay amin’ny zorony roa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ambany
    - type: text
      text: ' amin’ny saron-tratra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lanin’ny tady roa dia nataony teo amin’ny randram-bolamena roa, dia nataony teo amin’ny soroky ny efoda anoloana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao vava volamena roa izy ka nataony teo amin’ny zorony roa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ambany
    - type: text
      text: ' amin’ny saron-tratra, dia amin’ny sisiny anatiny izay manolotra ny efoda. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ny efoda tamin’ny volamena sy manga sy volomparasy sy mena ary rongony fotsy madinika voahasina izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao vava volamena roa koa izy ka nataony teo amin’ny soroka roa amin’ny efoda, dia ao ambaniny, eo anoloany, akaikin’ny fikambanany, eo ambonin’ny fehin-kibo momba ny efoda. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary kofehy manga no namehezany ny vava volan’ny saron-tratra tamin’ny vava volan’ny efoda, mba ho eo ambonin’ny fehin-kibo momba ny efoda ny saron-tratra ka tsy ho afaka eo, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ny akanjo ivelany misy ny efoda, asan’ny mpanenona, izy, ka nataony manga avokoa. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vozon’ny akanjo ivelany dia teo afovoany tahaka ny vozon’ny akanjo fiarovan-tratra, ary nisy sisiny manodidina ny vozony mba tsy hahatriatra azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary teo amin’ny morontongotry ny akanjo ivelany dia nasiany sarin’ampongabendanitra manga sy volomparasy sy mena voahasina; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nanao famohamandry volamena tsara izy, ary ny famohamandry dia nataony teo anelanelan’ny ampongabendanitra tamin’ny morontongotry ny akanjo ivelany manodidina (dia teo anelanelan’ny ampongabendanitra): '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia famohamandry sy sarin’ampongabendanitra mifanelanelana manodidina eo amin’ny morontongotry ny akanjo ivelany, ho entiny manao ny fanompoam-pivavahana, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny akanjo lava nataony rongony fotsy madinika, asan’ny mpanenona, ho an’i Arona sy ny zanany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny hamama dia nataony rongony fotsy madinika, ary ny satroka tsara tarehy nataony rongony fotsy madinika; ary ny kalisaona fohy dia nataony rongony fotsy madinika voahasina. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fehin-kibo nataony rongony fotsy madinika voahasina sy manga sy volomparasy ary mena, asan’ny mahay tenona samy hafa soratra, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namisaka ny volamena ho takelaka manify izy, dia nandidididy azy ho kofehy volamena, hahasiny amin’ny manga sy ny volomparasy sy ny mena ary ny rongony fotsy madinika, dia asan’ny mpanenona mahay. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny takelaka ho eo amin’ny diadema masina dia nataony volamena tsara, ary nasiany soratra, araka ny fanoratana amin’ny fanombohan-kase, hoe: HAMASININA HO AN’I JEHOVAH. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nasiany kofehy manga hamehezany azy amin’ny hamama eo ambony, dia araka izay efa nandidian’i Jehovah an’i Mosesy.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary vita ny asa rehetra tamin’ny tabernakelin’ny trano-lay fihaonana; fa ny Zanak’Isiraely efa nanao araka izay rehetra nandidian’i Jehovah an’i Mosesy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nentiny teo amin’i Mosesy ny tabernakely; dia ny lay sy ny fanaka rehetra nomba azy, ary ny farangony sy ny zanakazony ary ny barany sy ny andriny ary ny faladiany, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny firakotra hoditr’ondrilahy efa nomenaina sy ny sarona hodi-takasy, ary ny efitra lamba fanakonana, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny fiaran’ny Vavolombelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.35 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ny Didy Folo.
      marker-yv: yv-n
    - type: text
      text: ' sy ny baony ary ny rakotra fanaovam-panavotana, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny latabatra sy ny fanaka rehetra momba azy ary ny mofo aseho, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny fanaovan-jiro tsara sy ny lela fanaovan-jirony, dia ny lela fanaovan-jiro halahatra, sy ny fanaka rehetra momba azy ary ny diloilo hatao fanazavana, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny alitara volamena sy ny diloilo fanosorana sy ny ditin-kazo mani-pofona ary ny varavarana lamba ho eo amin’ny varavaran’ny trano-lay, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny alitara varahina sy ny makarakara varahina ho eo aminy ary ny baony sy ny fanaka rehetra momba azy, ary ny tavy sy ny faladiany, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nataony nisy soroka roa avy amin’ny sisiny roa hampikambanana azy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny fefy lamban’ny kianja sy ny tsangantsangany sy ny faladiany ary ny vavahady lamba eo amin’ny vavahadin’ny kianja ary ny kofehiny sy ny tsimatra, ary ny fiasana rehetra momba ny tabernakelin’ny trano-lay fihaonana, '
  '41':
  - type: usfm
    marker: p
