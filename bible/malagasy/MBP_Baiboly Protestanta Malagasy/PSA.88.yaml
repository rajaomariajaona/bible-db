document_id: PSA.88,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka nataon’izay nasian’ny fahoriana mafy ka toa foin’Andriamanitra.
  - type: text
    content: Tonon-kira. Salamo nataon’ny Koraïta. Ho an’ny mpiventy hira. Al-mahalath-leanoth. Maskila nataon’i Hemana Ezrahita.
  - type: text
    content: JEHOVAH ô, Andriamanitry ny famonjena ahy,
  - type: text
    content: Andro aman-alina no itarainako eo anatrehanao;
  '10':
  - type: text
    content: Haneho fahagagana amin’ny maty va Hianao?
  - type: text
    content: Ny matoatoa va no hitsangana hidera Anao?
  - type: text
    content: '[Sela.]'
  '11':
  - type: text
    content: Hotorina any am-pasana va ny famindramponao,
  - type: text
    content: Ary ny fahamarinanao any amin’ny fandringanana?
  '12':
  - type: text
    content: Ho fantatra ao amin’ny maizina va ny fahagagana ataonao,
  - type: text
    content: Ary ny fahamarinanao ao amin’ny tany fanadinoana?
  '13':
  - type: text
    content: Fa raha izaho, dia Hianao no itarainako, Jehovah ô;
  - type: text
    content: Ary ny fivavako tonga eo anatrehanao nony maraina.
  '14':
  - type: text
    content: Jehovah ô, nahoana no manary ny fanahiko Hianao
  - type: text
    content: Ka manafina ny tavanao amiko?
  '15':
  - type: text
    content: Ory aho ka efa ho faty hatramin’ny fahazazako;
  - type: text
    content: Raha itambesaran’ny fampitahoranao aho, dia very hevitra;
  '16':
  - type: text
    content: Manafotra ahy ny fahatezeranao;
  - type: text
    content: Matin’ny fampitahoranao aho;
  '17':
  - type: text
    content: Mandifotra ahy mandrakariva tahaka ny rano ireny;
  - type: text
    content: Miara-manodidina ahy izy.
  '18':
  - type: text
    content: Efa nampanalavirinao ahy ny olona tia ahy sy ny sakaizako;
  - type: text
    content: Ireo nahazatra ahy–dia fahamaizinana.
  '2':
  - type: text
    content: Aoka ny fivavako ho tonga eo anatrehanao;
  - type: text
    content: Atongilano amin’ny fitarainako ny sofinao;
  '3':
  - type: text
    content: Fa diboka ny fahoriana ny fanahiko;
  - type: text
    content: Ary ny aiko manakaiky ny fiainan-tsi-hita.
  - type: note
    content: Heb. Sheola.
  '4':
  - type: text
    content: Natao ho isan’izay midina any an-davaka aho
  - type: text
    content: Ary efa tahaka izay tsy manan-kery;
  '5':
  - type: text
    content: Efa nafoy ho any amin’ny maty aho,
  - type: note
    content: 'Na: Ny fandriako dia any amin’ny maty.'
  - type: text
    content: Tahaka izay voavono, mandry ao am-pasana,
  - type: text
    content: Izay tsy tsarovanao intsony,
  - type: text
    content: Fa voafongotry ny tànanao.
  '6':
  - type: text
    content: Efa nametraka ahy any an-davaka ambany indrindra Hianao,
  - type: text
    content: Ao amin’ny maizina, dia ao amin’ny lalina.
  '7':
  - type: text
    content: Ny fahatezeranao manindry ahy mafy,
  - type: text
    content: Ary ny alon-dranonao rehetra azeranao amiko.
  - type: text
    content: '[Sela.]'
  '8':
  - type: text
    content: Efa nampanalavirinao ahy ny olona nahazatra ahy;
  - type: text
    content: Efa nataonao fahavetavetana eo imasony aho;
  - type: text
    content: Voahidy aho ka tsy afa-mivoaka.
  '9':
  - type: text
    content: Ny masoko efa pahina noho ny fahoriana;
  - type: text
    content: Jehovah ô, miantso Anao isan-andro aho,
  - type: text
    content: Mamefy tànana aminao aho.
