document_id: PSA.88
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vavaka nataon’izay nasian’ny fahoriana mafy ka toa foin’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tonon-kira. Salamo nataon’ny Koraïta. Ho an’ny mpiventy hira. Al-mahalath-leanoth. Maskila nataon’i Hemana Ezrahita.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, Andriamanitry ny famonjena ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andro aman-alina no itarainako eo anatrehanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka ny fivavako ho tonga eo anatrehanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Atongilano amin’ny fitarainako ny sofinao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa diboka ny fahoriana ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny aiko manakaiky ny fiainan-tsi-hita.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '88.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Natao ho isan’izay midina any an-davaka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa tahaka izay tsy manan-kery;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa nafoy ho any amin’ny maty aho,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '88.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fandriako dia any amin’ny maty.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka izay voavono, mandry ao am-pasana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy tsarovanao intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa voafongotry ny tànanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa nametraka ahy any an-davaka ambany indrindra Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny maizina, dia ao amin’ny lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fahatezeranao manindry ahy mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny alon-dranonao rehetra azeranao amiko.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Efa nampanalavirinao ahy ny olona nahazatra ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nataonao fahavetavetana eo imasony aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voahidy aho ka tsy afa-mivoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny masoko efa pahina noho ny fahoriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah ô, miantso Anao isan-andro aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamefy tànana aminao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Haneho fahagagana amin’ny maty va Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny matoatoa va no hitsangana hidera Anao?
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hotorina any am-pasana va ny famindramponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinanao any amin’ny fandringanana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ho fantatra ao amin’ny maizina va ny fahagagana ataonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinanao ao amin’ny tany fanadinoana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha izaho, dia Hianao no itarainako, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fivavako tonga eo anatrehanao nony maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jehovah ô, nahoana no manary ny fanahiko Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manafina ny tavanao amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ory aho ka efa ho faty hatramin’ny fahazazako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha itambesaran’ny fampitahoranao aho, dia very hevitra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manafotra ahy ny fahatezeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matin’ny fampitahoranao aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mandifotra ahy mandrakariva tahaka ny rano ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miara-manodidina ahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Efa nampanalavirinao ahy ny olona tia ahy sy ny sakaizako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo nahazatra ahy–dia fahamaizinana.
