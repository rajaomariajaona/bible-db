document_id: REV.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny nandravana an’i Babylona, sy ny nisaonan’ny olona azy.
  - type: text
    content: 'REHEFA afaka izany, dia hitako fa, indro, nisy anjely iray koa nidina avy tany an-danitra, nanana fahefana lehibe; ary ny tany nohazavain’ny voninahiny. '
  '10':
  - type: text
    content: 'eny, hijanona eny lavitra eny izy noho ny fahatahorana ny fanaintainany ka hanao hoe: Indrisy! indrisy! Babylona, ilay tanàna lehibe! ry ilay tanàna mafy! fa tamin’ny ora iray monja dia tonga ny fitsarana anao.'
  '11':
  - type: text
    content: 'Ary ny mpandranto amin’ny tany dia hitomany sy hisaona azy; fa tsy hisy mpividy intsony ny entany: '
  '12':
  - type: text
    content: 'dia entana volamena sy volafotsy sy vato soa sy pèrila sy rongony fotsy madinika sy lamba volomparasy sy landy sy jaky sy hazo mani-pofona, sy ny fanaka ivory rehetra mbamin’ny fanaka rehetra amin’ny hazo saro-bidy indrindra sy varahina sy vy ary vato sanga, '
  '13':
  - type: text
    content: sy havozomamy sy zavatra mani-pofona
  - type: note
    content: Gr. amoma.
  - type: text
    content: ' sy ditin-kazo sy menaka manitra sy ditin-kazo mani-pofona,'
  - type: note
    content: lebona; izahao Eks. xxx.34.
  - type: text
    content: ' sy divay sy diloilo sy lafarinina tsara toto sy vary tritika sy omby sy ondry sy soavaly sy kalesy ary tena sy ain’olona. '
  '14':
  - type: text
    content: Ary ny vokatra soa
  - type: note
    content: 'Na: voan-kazo.'
  - type: text
    content: ' nirin’ny fanahinao dia efa niala taminao, ary ny zava-tsoa rehetra sy ny zava-malaza rehetra dia efa levona tsy ho anao, ary tsy ho hita intsony mandrakizay ireo.'
  '15':
  - type: text
    content: 'Ny mpandranto izany zavatra izany, izay efa tonga mpanan-karena taminy, dia hijanona eny lavitra eny noho ny fahatahorana ny fanaintainany ka hitomany sy hisaona '
  '16':
  - type: text
    content: 'ary hanao hoe: Indrisy! indrisy! ilay tanàna lehibe, izay nitafy rongony fotsy madinika sy lamba volomparasy sy jaky ary niravaka volamena sy vato soa ary pèrila! '
  '17':
  - type: text
    content: Fa tamin’ny ora iray monja no nahafoana ny harena be toy izany.
  - type: text
    content: 'Ary ny mpitondra sambo rehetra sy izay rehetra mandeha eny ambonin’ny ranomasina sy ny matilo ary izay rehetra manao raharaha any an-dranomasina dia nijanona teny lavitra eny, '
  '18':
  - type: text
    content: 'ary raha nahita ny setroky ny fandoroana azy, dia niantso nanao hoe: Aiza intsony re no misy tahaka izany tanàna lehibe izany? '
  '19':
  - type: text
    content: 'Ary nanopy vovoka hiraraka tamin’ny lohany izy, dia niantso sady nitomany sy nisaona ka nanao hoe: Indrisy! indrisy! ilay tanàna lehibe, izay nampanan-karena izay rehetra manan-tsambo eny amin’ny ranomasina noho ny zava-tsaro-bidy tao aminy; fa tamin’ny ora iray monja no nahafoana izany.'
  '2':
  - type: text
    content: 'Ary niantso tamin’ny feo mahery izy ka nanao hoe: Rava! rava Babylona lehibe! ka tonga fonenan’ny demonia sy fieren’'
  - type: note
    content: Gr. trano-maizina.
  - type: text
    content: ' ny fanahy maloto rehetra ary akanin’'
  - type: note
    content: Gr. trano-maizina.
  - type: text
    content: ' ny vorona rehetra izay maloto sy ankahalaina. '
  '20':
  - type: text
    content: Mifalia noho izay zavatra nanjo azy hianao, ry lanitra, sy hianareo olona masina, sy hianareo Apostoly, ary hianareo mpaminany; fa Andriamanitra efa nitsara azy ka namaly azy noho ny taminareo.
  '21':
  - type: text
    content: 'Ary nisy anjely mahery anankiray nambeta vato tahaka ny vato lehibe fikosoham-bary, dia nanipy izany tany an-dranomasina ka nanao hoe: Hatsipy mafy toy izany no ho fandrava an’i Babylona, ilay tanàna lehibe, ka tsy ho hita intsony izy. '
  '22':
  - type: text
    content: 'Ary ny feon’ny mpitendry lokanga sy ny mpitsoka mozika sy ny mpitsoka sodina ary ny mpitsoka trompetra dia tsy ho re eo aminao intsony; ary ny mpiasa rehetra mahay zavatra na inona na inona tsy ho hita eo aminao intsony; ary ny feon’ny vato fikosoham-bary tsy ho re eo aminao intsony; '
  '23':
  - type: text
    content: ary ny fahazavan’ny jiro tsy mba hahazava eo aminao intsony; ary ny feon’ny mpampakatra sy ny ampakarina tsy ho re eo aminao intsony; fa lehiben’ny tany ny mpandrantonao; fa ny ody ratsinao no nentinao namitaka ny firenena rehetra.
  '24':
  - type: text
    content: Ary teo anatiny no nahitana ny ran’ny mpaminany sy ny olona masina sy izay rehetra novonoina teny ambonin’ny tany.
  '3':
  - type: text
    content: Fa tamin’ny divain’ny fahatezerana noho ny fijangajangany no nahalavoan’
  - type: note
    content: 'Na: [nisotroan’].'
  - type: text
    content: ' ny firenena rehetra, ary ny mpanjakan’ny tany nijangajanga taminy, ary ny mpandranto amin’ny tany tonga mpanan-karena noho ny hafatratry ny nitiavan’io ny zava-mahafinaritra ny tena.'
  '4':
  - type: text
    content: 'Ary nahare feo iray koa avy tany an-danitra aho nanao hoe: Mialà aminy hianareo, ry oloko, mba tsy hiombonanareo ota aminy, ary mba tsy hisy hahazo anareo ny loza manjo azy. '
  '5':
  - type: text
    content: 'Fa ny fahotany efa nitehika tamin’ny lanitra, ary Andriamanitra efa nahatsiaro ny ratsy nataony. '
  '6':
  - type: text
    content: Mamalia azy araka izay nataony, ka omeo azy indroa heny toy ny nataony izy; ny kapoaka izay nofenoiny,
  - type: note
    content: Gr. noharoharoiny.
  - type: text
    content: ' dia fenoy'
  - type: note
    content: Gr. haroharoy.
  - type: text
    content: ' indroa heny ho azy. '
  '7':
  - type: text
    content: 'Toraka izay niderany tena sy nivelomany tamin’ny zava-mahafinaritra ny tena, dia omeo fanaintainana sy alahelo toraka izany koa izy, satria hoy izy anakampo: Mipetraka ho mpanjakavavy aho, fa tsy mpitondratena, ary tsy mba hahita alahelo mihitsy aho; '
  '8':
  - type: text
    content: koa noho izany dia ho tonga indray andro monja izao loza hanjo azy izao, dia fahafatesana sy fisaonana ary mosary, ary ho levon’ny afo izy; fa mahery ny Tompo Andriamanitra, Izay nitsara azy.
  '9':
  - type: text
    content: 'Ary ny mpanjakan’ny tany, izay nijangajanga taminy sy niara-nanaram-po taminy tamin’ny zava-mahafinaritra ny tena, dia hiteha-tratra sy hitomany azy, raha mahita ny setroky ny fandoroana azy; '
