document_id: JER.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny alahelon’i Jeremia noho ny faharatsian’ny olona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ENGA anie ka hahita fitoerana any an-efitra aho tahaka ny fitoeran’ny mpandeha!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hahafoy ny fireneko aho ka hiala aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria mpijangajanga avokoa izy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mpivadika miray tetika izy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary Jerosalema dia hataoko korontam-bato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fonenan’ny amboadia;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tanànan’ny Joda hataoko lao tsy hisy mponina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Iza no olon-kendry mba hahafantatra izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady efa nitenenan’ny vavan’i Jehovah mba hanambara izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nahoana no noravana ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady may ho toy ny efitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy mandeha mamaky eo aminy?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nahafoy ny lalàko izay nataoko teo anoloany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nankatò izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy nihaino ny feoko,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa nandeha araka ny ditry ny fony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nanaraka ireo Bala araka izay nampianarin’ny razany azy,–
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hofahanako zava-mahafaty ity firenena ity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hampisotroiko rano mangidy;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary haeliko any amin’izay jentilisa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fantany na fantatry ny razany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampanenjehiko azy ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-pandaniko azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihevera tsara, ka antsoy ireny vehivavy mpanao hira fahalahelovana mba ho avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ampanalao ireny vehivavy mahay mba ho tonga;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary asaovy haingana ireny hanandratra fidradradradrana ho antsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampijojy ny ranomasontsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hampivarina ny ranomaso avy amin’ny hodimasontsika.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa misy feo midradradradra re any Ziona hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! rava isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afa-baraka indrindra isika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy maintsy mamoy ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa narodana ny trano nitoerantsika.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nefa mihainoa ny tenin’i Jehovah, hianareo vehivavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hohenoin’ny sofinareo ny tenin’ny vavany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ampianaro fidradradradrana ny zanakavavinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary samia mampianatra hira fahalahelovana ny namany avy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Manenjana ny lelany toy ny fanenjana tsipìka izy mba handefa lainga.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy araka ny marina no mahahery azy etỳ ambonin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandroso amin’ny ratsy ka hatramin’ny ratsy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izaho tsy mba fantany, hoy Jehovah.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa ny fahafatesana efa nananika ny varavarankelintsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka niditra tao an-dapantsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba handringana ny ankizy madinika tsy ho eny an-dalambe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny zatovo tsy ho eny an-kalalahana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ataovy hoe: Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiampatrampatra ny fatin’ny olona ka ho tonga tahaka ny zezika eny an-tsaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny amboara nilaozan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: any aorian’.
      marker-yv: yv-n
    - type: text
      text: ' ny mpijinja,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy misy manangona azy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny tsi-fahatokian-tena, sy ny fahatokiana an’Andriamanitra, Izay mitsara marina.
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'IZAO no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny hendry tsy hirehareha amin’ny fahendreny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny mahery tsy hirehareha amin’ny heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny manan-karena tsy hirehareha amin’ny hareny;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa izay te-hirehareha dia aoka hirehareha amin’izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fahendreny sy ny fahalalany Ahy ho Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manao famindrampo sy fitsarana marina ary fahamarinana etỳ ambonin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izany no sitrako, hoy Jehovah.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Indro, avy ny andro, hoy Jehvoah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hamaliako ny voafora rehetra mbamin’ny tsy voafora koa,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izay toy ny tsy voafora.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dia Egypta sy Joda sy Edoma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny taranak’i Amona ary Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’izay rehetra voahety sisim-bolo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay monina any an-efitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny jentilisa rehetra dia tsy voafora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranak’Isiraely rehetra kosa dia tsy voafora fo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Samia miaro tena amin’ny namany avy hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza misy matoky olona na dia ny rahalahy aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny rahalahy rehetra dia mamingana tokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny namana rehetra mandehandeha manaratsy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izy rehetra samy mamitaka ny namany avy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy miteny marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampianatra ny lelany handainga izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manasa-tena amin’ny fanaovan-dratsy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny fonenanao dia ao anatin’ny fitaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fitaka no nandavany tsy hahalalana Ahy, hoy Jehovah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, handrendrika sy hizaha toetra azy Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ahoana no hataoko noho ny amin’ny oloko zanakavavy?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Zana-tsipìka mahafaty ny lelany ka miteny fitaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha amin’ny vavany, dia miteny fihavanana amin’ny namany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo ao anatiny kosa dia manao otri-po.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsy hovaliako va izy amin’izany zavatra izany? hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hialako fo va ny firenena toy izany?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Noho ny amin’ny tendrombohitra no hitomaniako sy hidradradrako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary noho ny amin’ny kijana any an-efitra no hanaovako hira fahalahelovana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria may izy, ka tsy misy mandeha mamaky eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy fimàmàn’omby re intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na ny voro-manidina na ny bibi-dia samy efa nandositra ka lasa avokoa.
