document_id: JER.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny alahelon’i Jeremia noho ny faharatsian’ny olona.
  - type: text
    content: ENGA anie ka hahita fitoerana any an-efitra aho tahaka ny fitoeran’ny mpandeha!
  - type: text
    content: Dia hahafoy ny fireneko aho ka hiala aminy,
  - type: text
    content: Satria mpijangajanga avokoa izy rehetra,
  - type: text
    content: Eny, mpivadika miray tetika izy.
  '10':
  - type: text
    content: Ary Jerosalema dia hataoko korontam-bato
  - type: text
    content: Sy fonenan’ny amboadia;
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: Ary ny tanànan’ny Joda hataoko lao tsy hisy mponina.
  '11':
  - type: text
    content: Iza no olon-kendry mba hahafantatra izao,
  - type: text
    content: Sady efa nitenenan’ny vavan’i Jehovah mba hanambara izao?
  - type: text
    content: Fa nahoana no noravana ny tany
  - type: text
    content: Sady may ho toy ny efitra,
  - type: text
    content: Ka tsy misy mandeha mamaky eo aminy?
  '12':
  - type: text
    content: 'Ary hoy Jehovah:'
  - type: text
    content: Satria nahafoy ny lalàko izay nataoko teo anoloany izy
  - type: text
    content: Ka tsy nankatò izany
  - type: text
    content: Ary tsy nihaino ny feoko,
  '13':
  - type: text
    content: Fa nandeha araka ny ditry ny fony
  - type: text
    content: Sy nanaraka ireo Bala araka izay nampianarin’ny razany azy,–
  '14':
  - type: text
    content: 'Dia izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: text
    content: Indro, hofahanako zava-mahafaty ity firenena ity
  - type: text
    content: Sy hampisotroiko rano mangidy;
  '15':
  - type: text
    content: Ary haeliko any amin’izay jentilisa
  - type: text
    content: Tsy fantany na fantatry ny razany izy;
  - type: text
    content: Ary hampanenjehiko azy ny sabatra
  - type: text
    content: Ambara-pandaniko azy.
  '16':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Mihevera tsara, ka antsoy ireny vehivavy mpanao hira fahalahelovana mba ho avy;
  - type: text
    content: Eny, ampanalao ireny vehivavy mahay mba ho tonga;
  '17':
  - type: text
    content: Ary asaovy haingana ireny hanandratra fidradradradrana ho antsika,
  - type: text
    content: Mba hampijojy ny ranomasontsika
  - type: text
    content: Sy hampivarina ny ranomaso avy amin’ny hodimasontsika.
  '18':
  - type: text
    content: 'Fa misy feo midradradradra re any Ziona hoe:'
  - type: text
    content: Indrisy! rava isika;
  - type: text
    content: Afa-baraka indrindra isika,
  - type: text
    content: Satria tsy maintsy mamoy ny tany,
  - type: text
    content: Fa efa narodana ny trano nitoerantsika.
  '19':
  - type: text
    content: Nefa mihainoa ny tenin’i Jehovah, hianareo vehivavy,
  - type: text
    content: Ary aoka hohenoin’ny sofinareo ny tenin’ny vavany,
  - type: text
    content: Ka ampianaro fidradradradrana ny zanakavavinareo,
  - type: text
    content: Ary samia mampianatra hira fahalahelovana ny namany avy.
  '2':
  - type: text
    content: Manenjana ny lelany toy ny fanenjana tsipìka izy mba handefa lainga.
  - type: text
    content: Ary tsy araka ny marina no mahahery azy etỳ ambonin’ny tany;
  - type: text
    content: Fa mandroso amin’ny ratsy ka hatramin’ny ratsy izy,
  - type: text
    content: Ary Izaho tsy mba fantany, hoy Jehovah.
  '20':
  - type: text
    content: Fa ny fahafatesana efa nananika ny varavarankelintsika
  - type: text
    content: Ka niditra tao an-dapantsika,
  - type: text
    content: Mba handringana ny ankizy madinika tsy ho eny an-dalambe
  - type: text
    content: Sy ny zatovo tsy ho eny an-kalalahana.
  '21':
  - type: text
    content: 'Ataovy hoe: Izao no lazain’i Jehovah:'
  - type: text
    content: Hiampatrampatra ny fatin’ny olona ka ho tonga tahaka ny zezika eny an-tsaha
  - type: text
    content: Sy tahaka ny amboara nilaozan’
  - type: note
    content: Heb. any aorian’.
  - type: text
    content: ' ny mpijinja,'
  - type: text
    content: Izay tsy misy manangona azy.
  - type: heading
    content: Ny amin’ny tsi-fahatokian-tena, sy ny fahatokiana an’Andriamanitra, Izay mitsara marina.
  '22':
  - type: text
    content: 'IZAO no lazain’i Jehovah:'
  - type: text
    content: Aoka ny hendry tsy hirehareha amin’ny fahendreny,
  - type: text
    content: Ary aoka ny mahery tsy hirehareha amin’ny heriny,
  - type: text
    content: Ary aoka ny manan-karena tsy hirehareha amin’ny hareny;
  '23':
  - type: text
    content: 'Fa izay te-hirehareha dia aoka hirehareha amin’izao:'
  - type: text
    content: Dia ny fahendreny sy ny fahalalany Ahy ho Jehovah,
  - type: text
    content: Izay manao famindrampo sy fitsarana marina ary fahamarinana etỳ ambonin’ny tany;
  - type: text
    content: Fa izany no sitrako, hoy Jehovah.
  '24':
  - type: text
    content: Indro, avy ny andro, hoy Jehvoah,
  - type: text
    content: Izay hamaliako ny voafora rehetra mbamin’ny tsy voafora koa,
  - type: note
    content: 'Na: izay toy ny tsy voafora.'
  '25':
  - type: text
    content: Dia Egypta sy Joda sy Edoma
  - type: text
    content: Sy ny taranak’i Amona ary Moaba
  - type: text
    content: Mbamin’izay rehetra voahety sisim-bolo,
  - type: text
    content: Izay monina any an-efitra;
  - type: text
    content: Fa ny jentilisa rehetra dia tsy voafora,
  - type: text
    content: Ary ny taranak’Isiraely rehetra kosa dia tsy voafora fo.
  '3':
  - type: text
    content: Samia miaro tena amin’ny namany avy hianareo,
  - type: text
    content: Ary aza misy matoky olona na dia ny rahalahy aza;
  - type: text
    content: Fa ny rahalahy rehetra dia mamingana tokoa,
  - type: text
    content: Ary ny namana rehetra mandehandeha manaratsy.
  '4':
  - type: text
    content: Izy rehetra samy mamitaka ny namany avy,
  - type: text
    content: Ka tsy misy miteny marina;
  - type: text
    content: Mampianatra ny lelany handainga izy
  - type: text
    content: Ary manasa-tena amin’ny fanaovan-dratsy.
  '5':
  - type: text
    content: Ny fonenanao dia ao anatin’ny fitaka;
  - type: text
    content: Fitaka no nandavany tsy hahalalana Ahy, hoy Jehovah.
  '6':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Indro, handrendrika sy hizaha toetra azy Aho;
  - type: text
    content: Fa ahoana no hataoko noho ny amin’ny oloko zanakavavy?
  '7':
  - type: text
    content: Zana-tsipìka mahafaty ny lelany ka miteny fitaka;
  - type: text
    content: Raha amin’ny vavany, dia miteny fihavanana amin’ny namany izy,
  - type: text
    content: Kanjo ao anatiny kosa dia manao otri-po.
  '8':
  - type: text
    content: Tsy hovaliako va izy amin’izany zavatra izany? hoy Jehovah;
  - type: text
    content: Tsy hialako fo va ny firenena toy izany?
  '9':
  - type: text
    content: Noho ny amin’ny tendrombohitra no hitomaniako sy hidradradrako,
  - type: text
    content: Ary noho ny amin’ny kijana any an-efitra no hanaovako hira fahalahelovana,
  - type: text
    content: Satria may izy, ka tsy misy mandeha mamaky eo aminy,
  - type: text
    content: Ary tsy misy fimàmàn’omby re intsony,
  - type: text
    content: Ary na ny voro-manidina na ny bibi-dia samy efa nandositra ka lasa avokoa.
