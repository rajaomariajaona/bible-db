document_id: JER.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampietrena ny avonavon’ny Joda.
  - type: text
    content: 'IZAO no nolazain’i Jehovah tamiko: Andeha mividy fehin-kibo rongony ho anao, ka ifehezo ny kibonao, fa aza atao anaty rano. '
  '10':
  - type: text
    content: Ity firenena ratsy ity, izay tsy mety mihaino ny teniko,
  - type: text
    content: Fa mandeha amin’ny ditry ny fony
  - type: text
    content: Ka manaraka andriamani-kafa
  - type: text
    content: Mba hotompoiny sy hiankohofany,
  - type: text
    content: Dia ho tahaka ity fehin-kibo ity, izay tsy azo atao na inona na inona intsony.
  '11':
  - type: text
    content: Fa toy ny firaikitry ny fehin-kibo amin’ny valahan’ny olona
  - type: text
    content: No nampiraiketako ny taranak’Isiraely sy ny taranak’i Joda rehetra tamiko, hoy Jehovah,
  - type: text
    content: Mba ho olona sy anarana
  - type: text
    content: Sy fiderana ary voninahitra ho Ahy ireny
  - type: text
    content: Kanjo tsy nety nihaino izy.
  '12':
  - type: text
    content: 'Ary izao teny izao dia lazao aminy hoe: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Ny tavoara rehetra dia feno divay; ary izy hanao aminao hoe: Moa tsy efa fantatray ihany va fa feno divay ny tavoara rehetra? '
  '13':
  - type: text
    content: 'Dia holazainao aminy hoe: Izao no lazain’i Jehovah:'
  - type: text
    content: Indro, hataoko leony
  - type: note
    content: Heb. feno.
  - type: text
    content: ' ny mponina rehetra amin’ity tany ity,'
  - type: text
    content: Dia ny mpanjaka, izay mipetraka amin’ny seza fiandrianan’i Davida,
  - type: text
    content: Sy ny mpisorona sy ny mpaminany
  - type: text
    content: Ary ny mponina rehetra any Jerosalema.
  '14':
  - type: text
    content: Ary hampifamohiko izy,
  - type: text
    content: Dia ny ray mbamin’ny zanany, hoy Jehovah;
  - type: text
    content: Tsy hiantra Aho, na hitsitsy, na hamindra fo tsy handringana azy.
  '15':
  - type: text
    content: Mandrenesa ka mihainoa,
  - type: text
    content: Aza miavonavona;
  - type: text
    content: Fa Jehovah no miteny.
  '16':
  - type: text
    content: Manomeza voninahitra an’i Jehovah Andriamanitrareo,
  - type: text
    content: Dieny tsy mbola mahatonga ny maizina Izy,
  - type: text
    content: Ary dieny tsy mbola tafintohina amin’ny tendrombohitra maizimaizina ny tongotrareo,
  - type: text
    content: Ka raha miandry ny mazava hianareo,
  - type: text
    content: Dia hataony tonga ho aloky ny fahafatesana,
  - type: text
    content: Ka hampodiny ho aizim-pito.
  '17':
  - type: text
    content: Fa raha tsy hihaino izany hianareo,
  - type: text
    content: Dia hitomany any amin’ny mangingina ny fanahiko, satria misy fiavonavonana;
  - type: text
    content: Eny, ny masoko hamarin-dranomaso hijononoka be,
  - type: text
    content: Satria voababo ny ondrin’i Jehovah.
  '18':
  - type: text
    content: 'Lazao amin’ny andriamanjaka sy ny reniny hoe:'
  - type: text
    content: Mitombena amin’ny tany;
  - type: text
    content: Fa ho afaka ny firavaka eo an-dohanareo,
  - type: text
    content: Dia ny satroboninahitrareo tsara tarehy.
  '19':
  - type: text
    content: Voarindrina ny tanàna any amin’ny tany atsimo,
  - type: text
    content: Ka tsy misy mamoha;
  - type: text
    content: Lasan-ko babo Joda,
  - type: text
    content: Eny, lasan-ko babo avokoa izy rehetra.
  '2':
  - type: text
    content: 'Dia nividy fehin-kibo aho araka ny tenin’i Jehovah ka nifehezako ny kiboko. '
  '20':
  - type: text
    content: Atopazy ny masonareo,
  - type: text
    content: Ka tazano izay avy any avaratra;
  - type: text
    content: Aiza ny ondry andiany izay nomena anao,
  - type: text
    content: Dia ny ondrinao tsara tarehy?
  '21':
  - type: text
    content: Ahoana re no holazainao, raha tendreny hanapaka anao ireny sakaizanao ireny,
  - type: text
    content: Fa hianao ihany no nampianatra azy handrafy anao?
  - type: text
    content: Tsy hahazo anao va ny fanaintainana toy ny vehivavy raha miteraka?
  '22':
  - type: text
    content: Ary raha manao anakampo hianao hoe
  - type: text
    content: Ahoana no nahatonga izao tamiko?
  - type: text
    content: Noho ny haben’ny helokao no nampiaingana ny morontongotr’akanjonao
  - type: text
    content: Sy nandratrana ny ombelahin-tongotrao.
  '23':
  - type: text
    content: Moa mahova ny hodiny va ny Etiopiana,
  - type: text
    content: Ary ny leoparda
  - type: note
    content: Anaram-biby masiaka sady misoratsoratra.
  - type: text
    content: ' va mahova ny sorany?'
  - type: text
    content: Raha izany, dia mahazo manao tsara koa hianareo izay efa zatra nanao ratsy.
  '24':
  - type: text
    content: Koa dia haeliko izy
  - type: text
    content: Toy ny vodivary indaosin’ny rivotra avy any an-efitra.
  '25':
  - type: text
    content: Izany no lokanao,
  - type: text
    content: Dia anjara voarefy ho anao, hoy Jehovah,
  - type: text
    content: Satria nanadino Ahy hianao
  - type: text
    content: Ka nitoky tamin’ny lainga.
  '26':
  - type: text
    content: Ary Izaho kosa dia hampiainga ny morontongotr’akanjonao ho eny amin’ny tavanao,
  - type: text
    content: Mba hisehoan’ny henatrao.
  '27':
  - type: text
    content: Ny fijangajanganao sy ny fanenonao,
  - type: note
    content: Izahao v. 8.
  - type: text
    content: Ny fahavetavetan’ny fijejojejoanao any amin’ny havoana any an-tsaha,–
  - type: text
    content: Eny, samy efa hitako avokoa ireo fahavetavetanao ireo.
  - type: text
    content: Lozanao, ry Jerosalema!
  - type: text
    content: Mandra-pahoviana no mbola tsy hetezanao hanadio ny tenanao?
  '3':
  - type: text
    content: 'Ary tonga tamiko fanindroany ny tenin’i Jehovah hoe: '
  '4':
  - type: text
    content: 'Ento ny fehin-kibo izay novidinao, dia ilay ifehezanao ny kibonao, ka mitsangàna, mankanesa any Eofrata, ary afeno ao an-tsefatsefaky ny harambato izy. '
  '5':
  - type: text
    content: Ka dia nandeha aho, ary nafeniko tao amoron’i Eofrata izy, araka ny nandidian’i Jehovah ahy.
  '6':
  - type: text
    content: 'Ary nony afaka andro maro, dia hoy Jehovah tamiko: Mitsangàna, ka mankanesa any Eofrata, ary alao any ny fehin-kibo, dia ilay nasaiko nafeninao tany. '
  '7':
  - type: text
    content: Dia nankany Eofrata aho ka nihady, ary nalaiko tao amin’ny fitoerana nanafenako azy ilay fehin-kibo; kanjo, indro, simba ny fehin-kibo ka tsy azo natao na inona na inona intsony.
  '8':
  - type: text
    content: 'Dia tonga tamiko ny tenin’i Jehovah hoe:'
  '9':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Tahaka izany no hanimbako ny avonavon’ny Joda
  - type: text
    content: Sy ny haben’ny avonavon’i Jerosalema.
