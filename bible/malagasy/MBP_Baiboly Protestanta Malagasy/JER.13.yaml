document_id: JER.13
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hampietrena ny avonavon’ny Joda.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no nolazain’i Jehovah tamiko: Andeha mividy fehin-kibo rongony ho anao, ka ifehezo ny kibonao, fa aza atao anaty rano. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nividy fehin-kibo aho araka ny tenin’i Jehovah ka nifehezako ny kiboko. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tonga tamiko fanindroany ny tenin’i Jehovah hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ento ny fehin-kibo izay novidinao, dia ilay ifehezanao ny kibonao, ka mitsangàna, mankanesa any Eofrata, ary afeno ao an-tsefatsefaky ny harambato izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ka dia nandeha aho, ary nafeniko tao amoron’i Eofrata izy, araka ny nandidian’i Jehovah ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony afaka andro maro, dia hoy Jehovah tamiko: Mitsangàna, ka mankanesa any Eofrata, ary alao any ny fehin-kibo, dia ilay nasaiko nafeninao tany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nankany Eofrata aho ka nihady, ary nalaiko tao amin’ny fitoerana nanafenako azy ilay fehin-kibo; kanjo, indro, simba ny fehin-kibo ka tsy azo natao na inona na inona intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tonga tamiko ny tenin’i Jehovah hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka izany no hanimbako ny avonavon’ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny haben’ny avonavon’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ity firenena ratsy ity, izay tsy mety mihaino ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mandeha amin’ny ditry ny fony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manaraka andriamani-kafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hotompoiny sy hiankohofany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tahaka ity fehin-kibo ity, izay tsy azo atao na inona na inona intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa toy ny firaikitry ny fehin-kibo amin’ny valahan’ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nampiraiketako ny taranak’Isiraely sy ny taranak’i Joda rehetra tamiko, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho olona sy anarana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fiderana ary voninahitra ho Ahy ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo tsy nety nihaino izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izao teny izao dia lazao aminy hoe: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Ny tavoara rehetra dia feno divay; ary izy hanao aminao hoe: Moa tsy efa fantatray ihany va fa feno divay ny tavoara rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia holazainao aminy hoe: Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hataoko leony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: feno.
    marker-yv: yv-n
  - type: text
    text: ' ny mponina rehetra amin’ity tany ity,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny mpanjaka, izay mipetraka amin’ny seza fiandrianan’i Davida,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny mpisorona sy ny mpaminany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mponina rehetra any Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary hampifamohiko izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny ray mbamin’ny zanany, hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiantra Aho, na hitsitsy, na hamindra fo tsy handringana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mandrenesa ka mihainoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza miavonavona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no miteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manomeza voninahitra an’i Jehovah Andriamanitrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieny tsy mbola mahatonga ny maizina Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary dieny tsy mbola tafintohina amin’ny tendrombohitra maizimaizina ny tongotrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka raha miandry ny mazava hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hataony tonga ho aloky ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampodiny ho aizim-pito.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa raha tsy hihaino izany hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hitomany any amin’ny mangingina ny fanahiko, satria misy fiavonavonana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny masoko hamarin-dranomaso hijononoka be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria voababo ny ondrin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lazao amin’ny andriamanjaka sy ny reniny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitombena amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho afaka ny firavaka eo an-dohanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny satroboninahitrareo tsara tarehy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voarindrina ny tanàna any amin’ny tany atsimo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy misy mamoha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lasan-ko babo Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, lasan-ko babo avokoa izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Atopazy ny masonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tazano izay avy any avaratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza ny ondry andiany izay nomena anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny ondrinao tsara tarehy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ahoana re no holazainao, raha tendreny hanapaka anao ireny sakaizanao ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hianao ihany no nampianatra azy handrafy anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hahazo anao va ny fanaintainana toy ny vehivavy raha miteraka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary raha manao anakampo hianao hoe
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahoana no nahatonga izao tamiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny haben’ny helokao no nampiaingana ny morontongotr’akanjonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nandratrana ny ombelahin-tongotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Moa mahova ny hodiny va ny Etiopiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny leoparda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaram-biby masiaka sady misoratsoratra.
    marker-yv: yv-n
  - type: text
    text: ' va mahova ny sorany?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha izany, dia mahazo manao tsara koa hianareo izay efa zatra nanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa dia haeliko izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny vodivary indaosin’ny rivotra avy any an-efitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izany no lokanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia anjara voarefy ho anao, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nanadino Ahy hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nitoky tamin’ny lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary Izaho kosa dia hampiainga ny morontongotr’akanjonao ho eny amin’ny tavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hisehoan’ny henatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny fijangajanganao sy ny fanenonao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahavetavetan’ny fijejojejoanao any amin’ny havoana any an-tsaha,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, samy efa hitako avokoa ireo fahavetavetanao ireo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozanao, ry Jerosalema!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana no mbola tsy hetezanao hanadio ny tenanao?
