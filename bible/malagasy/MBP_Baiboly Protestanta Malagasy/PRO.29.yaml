document_id: PRO.29,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay olona anarina matetika ka mihamafy hatoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho torotoro tampoka, ka tsy hisy fahasitranana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona mpandatsa-dra mankahala ny tsy misy tsiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mahitsy kosa miahy ny ainy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary mitady ny ain’ny mahitsy.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatezeran’ny adala dia avoakany avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny hendry kosa manindry fo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mihaino lainga ny mpanapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho ratsy fanahy ny mpanompony rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihaona ny malahelo sy ny mpampahory;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpampanàna vola.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no manazava ny mason’izy roa tonta.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mpanjaka mitsara marina ny malahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia haharitra mandrakizay ny seza fiandrianany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tsorakazo sy ny anatra no manome fahendrena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny zaza aranana mampahamenatra ny reniny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha maro ny ratsy fanahy, dia mitombo ny ota;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny marina ho faly mahita ny fahalavoany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faizo ny zanakao, dia ho famelombelomana ny fonao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho fifalian’ny fanahinao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy misy fahitana, dia atondraka hanaram-po amin’izay tsy mety ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha mitandrina ny lalàna kosa izy, dia sambatra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha teny fotsiny ihany, dia tsy ampy hananarana ny mpanompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia fantany aza, tsy hankatoaviny.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy misy valiny.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mihamaro ny marina, dia faly ny vahoaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha ny ratsy fanahy no manapaka, dia misento kosa izy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitanao va ny olona faingam-bava?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny adala aza misy hantenaina kokoa noho izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanompo izay nampihantaina hatry ny fony mbola kely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hihambo ho zanaka any am-parany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona mora tezitra manetsika ady;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olona masiaka dia be fahadisoana.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiavonavonan’ny olona no hampietry azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hahazo voninahitra kosa ny manetry tena.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miray tetika amin’ny mpangalatra dia manary tena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandre ny fampianianana izy, nefa tsy mety milaza.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamandrika ny tahotra olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay matoky an’i Jehovah no hovonjena.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatao amin’ny avo.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maro no mila sitraka amin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mitady ny tavan’.
      marker-yv: yv-n
    - type: text
      text: ' ny mpanapaka;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy amin’i Jehovah ny fitsarana ny olona.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny meloka dia fahavetavetana eo imason’ny marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mahitsy làlana dia mba fahavetavetana eo imason’ny ratsy fanahy kosa.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tia fahendrena no mahafaly ny rainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay misakaiza amin’ny vehivavy janga dia mandany harena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rariny no ampandrian’ny mpanjaka ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay mandray tambitamby
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mampandoa harena.
      marker-yv: yv-n
    - type: text
      text: ' no mandrava azy kosa.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay olona mandrobo ny namany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mamela-pandrika ny tongony.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy fandrika amin’ny heloky ny olon-dratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny marina mihoby sy mifaly.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny marina mihevitra ny adin’ny malahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny ratsy fanahy tsy hahalala fahendrena.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpaniratsira mampihotakotaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mampirehitra.
      marker-yv: yv-n
    - type: text
      text: ' ny tanàna;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny hendry mampionona fahatezerana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha iadian’ny hendry ny adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tezitra sy mihomehy izy, ka tsi hisy fitsaharana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Raha hendry miady amin’adala, na tezitra izy, na mihomehy, dia tsy misy fitsaharana.
      marker-yv: yv-n
