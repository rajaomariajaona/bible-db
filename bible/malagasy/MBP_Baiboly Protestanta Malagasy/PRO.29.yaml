document_id: PRO.29,873
type_code: plt
verses:
  '1':
  - type: text
    content: Izay olona anarina matetika ka mihamafy hatoka
  - type: text
    content: Dia ho torotoro tampoka, ka tsy hisy fahasitranana.
  '10':
  - type: text
    content: Ny olona mpandatsa-dra mankahala ny tsy misy tsiny;
  - type: text
    content: Fa ny mahitsy kosa miahy ny ainy.
  - type: note
    content: 'Na: Ary mitady ny ain’ny mahitsy.'
  '11':
  - type: text
    content: Ny fahatezeran’ny adala dia avoakany avokoa;
  - type: text
    content: Fa ny hendry kosa manindry fo.
  '12':
  - type: text
    content: Raha mihaino lainga ny mpanapaka,
  - type: text
    content: Dia ho ratsy fanahy ny mpanompony rehetra.
  '13':
  - type: text
    content: Mihaona ny malahelo sy ny mpampahory;
  - type: note
    content: 'Na: mpampanàna vola.'
  - type: text
    content: Jehovah no manazava ny mason’izy roa tonta.
  '14':
  - type: text
    content: Izay mpanjaka mitsara marina ny malahelo,
  - type: text
    content: Dia haharitra mandrakizay ny seza fiandrianany.
  '15':
  - type: text
    content: Ny tsorakazo sy ny anatra no manome fahendrena;
  - type: text
    content: Fa ny zaza aranana mampahamenatra ny reniny.
  '16':
  - type: text
    content: Raha maro ny ratsy fanahy, dia mitombo ny ota;
  - type: text
    content: Fa ny marina ho faly mahita ny fahalavoany.
  '17':
  - type: text
    content: Faizo ny zanakao, dia ho famelombelomana ny fonao izy
  - type: text
    content: Sy ho fifalian’ny fanahinao.
  '18':
  - type: text
    content: Raha tsy misy fahitana, dia atondraka hanaram-po amin’izay tsy mety ny olona;
  - type: text
    content: Fa raha mitandrina ny lalàna kosa izy, dia sambatra.
  '19':
  - type: text
    content: Raha teny fotsiny ihany, dia tsy ampy hananarana ny mpanompo;
  - type: text
    content: Fa na dia fantany aza, tsy hankatoaviny.
  - type: note
    content: Heb. tsy misy valiny.
  '2':
  - type: text
    content: Raha mihamaro ny marina, dia faly ny vahoaka;
  - type: text
    content: Fa raha ny ratsy fanahy no manapaka, dia misento kosa izy.
  '20':
  - type: text
    content: Hitanao va ny olona faingam-bava?
  - type: text
    content: Ny adala aza misy hantenaina kokoa noho izy.
  '21':
  - type: text
    content: Ny mpanompo izay nampihantaina hatry ny fony mbola kely
  - type: text
    content: Dia hihambo ho zanaka any am-parany.
  '22':
  - type: text
    content: Ny olona mora tezitra manetsika ady;
  - type: text
    content: Ary ny olona masiaka dia be fahadisoana.
  '23':
  - type: text
    content: Ny fiavonavonan’ny olona no hampietry azy;
  - type: text
    content: Fa hahazo voninahitra kosa ny manetry tena.
  '24':
  - type: text
    content: Izay miray tetika amin’ny mpangalatra dia manary tena;
  - type: text
    content: Mandre ny fampianianana izy, nefa tsy mety milaza.
  '25':
  - type: text
    content: Mamandrika ny tahotra olona;
  - type: text
    content: Fa izay matoky an’i Jehovah no hovonjena.
  - type: note
    content: Heb. hatao amin’ny avo.
  '26':
  - type: text
    content: Maro no mila sitraka amin’
  - type: note
    content: Heb. mitady ny tavan’.
  - type: text
    content: ' ny mpanapaka;'
  - type: text
    content: Fa avy amin’i Jehovah ny fitsarana ny olona.
  '27':
  - type: text
    content: Ny meloka dia fahavetavetana eo imason’ny marina;
  - type: text
    content: Ary ny mahitsy làlana dia mba fahavetavetana eo imason’ny ratsy fanahy kosa.
  '3':
  - type: text
    content: Izay tia fahendrena no mahafaly ny rainy;
  - type: text
    content: Fa izay misakaiza amin’ny vehivavy janga dia mandany harena.
  '4':
  - type: text
    content: Ny rariny no ampandrian’ny mpanjaka ny tany;
  - type: text
    content: Fa izay mandray tambitamby
  - type: note
    content: 'Na: mampandoa harena.'
  - type: text
    content: ' no mandrava azy kosa.'
  '5':
  - type: text
    content: Izay olona mandrobo ny namany
  - type: text
    content: Dia mamela-pandrika ny tongony.
  '6':
  - type: text
    content: Misy fandrika amin’ny heloky ny olon-dratsy;
  - type: text
    content: Fa ny marina mihoby sy mifaly.
  '7':
  - type: text
    content: Ny marina mihevitra ny adin’ny malahelo;
  - type: text
    content: Fa ny ratsy fanahy tsy hahalala fahendrena.
  '8':
  - type: text
    content: Ny mpaniratsira mampihotakotaka
  - type: note
    content: Heb. mampirehitra.
  - type: text
    content: ' ny tanàna;'
  - type: text
    content: Fa ny hendry mampionona fahatezerana.
  '9':
  - type: text
    content: Raha iadian’ny hendry ny adala,
  - type: text
    content: Dia tezitra sy mihomehy izy, ka tsi hisy fitsaharana.
  - type: note
    content: 'Na: Raha hendry miady amin’adala, na tezitra izy, na mihomehy, dia tsy misy fitsaharana.'
