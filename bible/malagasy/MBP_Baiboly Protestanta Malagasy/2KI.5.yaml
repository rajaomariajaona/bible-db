document_id: 2KI.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanasitranana an’i Namàna, sy ny nampijaliana an’i Gehazy noho ny ratsy nataony.
  - type: text
    content: 'ARY Namàna, komandin’ny miaramilan’ny mpanjakan’i Syria, dia olona lehibe teo anatrehan’ny tompony sady nanan-kaja, satria izy no namonjen’i Jehovah an’i Syria; ary lehilahy mahery izy, nefa kosa boka. '
  '10':
  - type: text
    content: 'Ary Elisa naniraka olona tany aminy hilaza hoe: Mandehana, mandroa impito ao Jordana, dia hody aminao indray ny nofonao, ka hadio hianao. '
  '11':
  - type: text
    content: 'Fa tezitra Namàna, dia lasa ka nanao hoe: Indro, nataoko fa hivoaka hankatỳ amiko mihitsy izy ka hitsangana ary hiantso ny anaran’i Jehovah Andriamaniny sady hanevaheva ny tànany eo ambonin’ny aretina ka hahasitrana ny boka. '
  '12':
  - type: text
    content: Tsy tsara noho ny ranon’ny Isiraely rehetra va Abana sy Farpara, onin’i Damaskosy? Tsy mahazo mandro ao amin’ireo va aho ka hadio? Dia nihodina izy ka lasa an-katezerana.
  '13':
  - type: text
    content: 'Dia nanatona ny mpanompony ka niteny taminy hoe: Ry ikaky ô, na dia zavatra lehibe aza no nasain’ny mpaminany ho nataonao, moa tsy mba ho nataonao va izany? koa mainka va, raha hoy izy aminao: Mandroa, dia hadio hianao? '
  '14':
  - type: text
    content: 'Dia nidina izy ka nisitrika tao Jordana impito araka ny tenin’ny lehilahin’Andriamanitra: ary ny nofony dia tonga tahaka ny nofon-jazakely indray, ka nadio izy.'
  '15':
  - type: text
    content: 'Ary niverina nankao amin’ny lehilahin’Andriamanitra izy mbamin’izay rehetra nanaraka azy, dia tonga tao ary nitsangana teo anatrehany ka nanao hoe: Indro, fantatro fa tsy misy Andriamanitra amin’ny tany rehetra, afa-tsy ato amin’ny Isiraely ihany; koa masìna hianao, raiso ny saotra aterin’ny mpanomponao. '
  '16':
  - type: text
    content: 'Fa hoy izy: Raha velona koa Jehovah, Izay itsanganako eo anatrehany, tsy handray mihitsy aho. Ary nanery azy handray izy; fa tsy nety Elisa. '
  '17':
  - type: text
    content: 'Ary hoy Namàna: Masìna hianao, moa tsy homena tany zakan’ny ampondra roa va izaho mpanomponao? fa ny mpanomponao tsy mba hanatitra fanatitra dorana na fanatitra hafa intsony ho an’ny andriamani-kafa, fa ho an’i Jehovah ihany. '
  '18':
  - type: text
    content: 'Nefa ny amin’izao zavatra izao dia aoka havelan’i Jehovah ny heloky ny mpanomponao: raha ny tompoko miditra ao an-tranon-dRimona hiankohoka ao ary mitehina amin’ny tànako, ka mba miankohoka ao an-tranon-dRimona aho, –raha miankohoka ao aho, Jehovah anie hamela ny heloky ny mpanomponao amin’izany zavatra izany. '
  '19':
  - type: text
    content: 'Ary hoy izy taminy: Mandehana soa aman-tsara.'
  - type: text
    content: Ary dia niala taminy izy ka lasa lavidavitra.
  - type: note
    content: Heb. kibra iray, anaram-pandrefesana tokony ho maily iray.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Ary ny Syriana nivoaka nanao an-tokony ka nitondra ny zazavavy kely anankiray babo avy tany amin’ny tanin’ny Isiraely; ary nanompo ny vadin’i Namàna io. '
  '20':
  - type: text
    content: 'Fa hoy Gehazy, zatovon’i Elisa, lehilahin’Andriamanitra: Indro, ny tompoko namela fotsiny ity Namàna Syriana'
  - type: note
    content: Heb. Aramiana.
  - type: text
    content: ' ity ka tsy nandray tamin’ny tànany izay zavatra nentiny; fa raha velona koa Jehovah, dia hihazakazaka hanaraka azy aho ka handray zavatra aminy. '
  '21':
  - type: text
    content: 'Ka dia lasa Gehazy nanaraka an’i Namàna Ary nony tazan’i Namàna avy mihazakazaka manaraka azy izy, dia niala faingana tamin’ny kalesy hitsena azy izy ka nanao hoe: Tsara ihany va? '
  '22':
  - type: text
    content: 'Ary hoy izy: Tsara ihany; kanefa ny tompoko naniraka ahy hilaza hoe: Indro ankehitriny misy zatovo roa lahy amin’ny zanaky ny mpaminany tonga atỳ amiko avy any amin’ny tany havoan’i Efraima; koa masìna hianao, omeo talenta volafotsy sy fitafiana indroa miova izy. '
  '23':
  - type: text
    content: 'Ary hoy Namàna: Aoka handray talenta roa hianao. Ary nanery azy izy sady namehy talenta volafotsy roa tao anaty kitapo roa mbamin’ny fitafiana indroa miova, ka nampitondrainy ny zatovony roa lahy izany; ary nitondra izany teo alohany ireo. '
  '24':
  - type: text
    content: 'Fa nony tonga tao amin’ny havoana izy, dia nalainy teny antànany izany ka napetrany tao an-trano; dia nampandehaniny ireo, ka dia lasa izy. '
  '25':
  - type: text
    content: Fa Gehazy kosa niditra ka nitsangana teo anatrehan’ny tompony.
  - type: text
    content: 'Ary hoy Elisa taminy: Avy taiza hianao, ry Gehazy? Dia hoy izy: Tsy avy taiza tsy avy taiza ny mpanomponao. '
  '26':
  - type: text
    content: 'Fa hoy kosa Elisa taminy: Tsy niaraka taminao ihany va ny foko tamin’ilay nihodina niala tamin’ny kalesy hitsena anao ralehilahy? Moa andro fandraisam-bola, na fandraisana fitafiana, na taninoliva, na tanimboaloboka, na ondry aman-osy, na omby, na ankizilahy, na ankizivavy va izao? '
  '27':
  - type: text
    content: 'Koa ny habokan’i Namàna dia hiraikitra aminao sy ny taranakao mandrakizay. Ary niala teo anatrehany izy ka, indro, boka '
  - type: text
    content: fotsy
  - type: text
    content: ' toy ny orampanala.'
  '3':
  - type: text
    content: 'Ary hoy io tamin’ny tompovaviny: Enga anie ka mba ao amin’ny mpaminany izay any Samaria ny tompoko! dia hahasitrana azy amin’ny habokany izy.'
  '4':
  - type: text
    content: 'Ary niditra Namàna ka nilaza tamin’ny tompony hoe: Izany ka izany no nolazain’ilay zazavavy izay avy tany amin’ny tanin’ny Isiraely. '
  '5':
  - type: text
    content: 'Dia hoy ny mpanjakan’i Syria: Andeha ary mandeha, fa hampitondra taratasy ho any amin’ny mpanjakan’ny Isiraely aho. Dia lasa izy sady nitondra talenta volafotsy folo sy volamena enina arivo sekely ary akanjo impolo miova teny an-tànany. '
  '6':
  - type: text
    content: 'Ary izy nitondra ny taratasy ho any amin’ny mpanjakan’ny Isiraely nanao hoe: Ary raha tonga atỳ aminao ity taratasy ity, dia ho fantatrao fa efa nampandeha an’i Namàna mpanompoko aho hankatỳ aminao, koa sitrano amin’ny habokany izy.'
  '7':
  - type: text
    content: 'Ary nony efa novakin’ny mpanjakan’ny Isiraely ny taratsay, dia nandriatra ny fitafiany izy ka nanao hoe: Andriamanitra va aho ka hahafaty na hahavelona, no anirahan’ilehiny atỳ amiko mba hahasitrana olona amin’ny habokany? Koa masìna hianareo, fantaro sy izahao fa mila ady amiko mihitsy izy.'
  '8':
  - type: text
    content: 'Ary rehefa ren’i Elisa, lehilahin’Andriamanitra, fa nandriatra ny fitafiany ny mpanjakan’ny Isiraely, dia naniraka tany amin’ny mpanjaka izy ka nanao hoe: Nahoana no nandriatra ny fitafianao hianao? Aoka izy hankatỳ amiko, dia ho fantany fa misy mpaminany tokoa ao amin’ny Isiraely.'
  '9':
  - type: text
    content: 'Ary dia nandeha Namàna nitondra ny soavaliny sy ny kalesiny ka nijanona teo am-baravaran’ny tranon’i Elisa. '
