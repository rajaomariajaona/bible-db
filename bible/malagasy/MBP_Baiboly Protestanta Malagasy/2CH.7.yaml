document_id: 2CH.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa vita izany vavak’i Solomona izany, dia nisy afo latsaka avy tany an-danitra ka nandevona ny fanatitra dorana sy ny fanatitra hafa alatsa-dra, ka feno ny voninahitr’i Jehovah ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ny mpisorona tsy nahazo niditra tao an-tranon’i Jehovah, satria feno ny voninahitr’i Jehovah ny tranony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nony hitan’ny Zanak’Isiraely rehetra ny nilatsahan’ny afo sy ny voninahitr’i Jehovah teo ambonin’ny trano, dia niankohoka tamin’ny lampivato izy ka nivavaka sy nidera an’i Jehovah, fa tsara Izy, fa mandrakizay ny famindrampony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny mpanjaka sy ny vahoaka rehetra dia naomono zavatra hatao fanatitra teo anatrehan’i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Solomona mpanjaka namono zavatra hatao fanatitra, dia omby roa arivo amby roa alina sy ondry aman-osy roa alina amby iray hetsy. Toy izany no nitokanan’ny mpanjaka sy ny vahoaka rehetra ny tranon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny mpisorona samy nitsangana hanao ny anjara-raharahany avy; ny Levita koa nanana ny zava-manenon’i Jehovah, izay nataon’i Davida mpanajaka hiderana an’i Jehovah, fa mandrakizay ny famindrampony, raha nasain’i Davida nidera an’Andriamanitra izy; ary ny mpisorona nitsoka ny trompetra teo anoloany, ary ny Isiraely rehetra nitsangana teo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary Solomona nanamasina ny afovoan’ny kianja izay teo anoloan’ny tranon’i Jehovah; fa tao no nanaterany ny fanatitra dorana sy ny saboran’ny fanati-pihavanana; fa ny alitara varahina izay nataon’i Solomona dia tsy omby ny fanatitra dorana sy ny fanatitra hohanina ary ny sabora.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary tamin’izany andro izany Solomona sy ny Isiraely rehetra izay teo aminy, dia fiangonana lehibe hatrany akaikin’i Hamata ka hatramin’ny lohasahan-driak’i Egypta, dia nitandrina ny andro firavoravoana hafitoana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary tamin’ny andro fahavalo dia nanao fara-fivoriana izy; fa hafitoana no nitandremany ny fitokanana ny alitara, ary hafitoana koa ny andro firavoravoana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary nony tamin’ny andro fahatelo amby roa-polo tamin’ny volana fahafito dia nampodiny ho any an-dainy avy ny olona, ary faly sy ravoravo izy noho ny soa nataon’i Jehovah tamin’i Davida sy Solomona ary ny Isiraely olony.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny valin’ny vavaka nataon’i Solomona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: TOY izany no nahavitan’i Solomona ny tranon’i Jehovah sy ny lapan’andriana, ary samy nataon’i Solomona lavorary avokoa izay rehetra efa voaheviny hatao tao an-tranon’i Jehovah sy tao an-dapany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Jehovah niseho tamin’i Solomona nony alina ka nanao taminy hoe: Efa reko ny vavakao, ary efa nofidiko ho Ahy ity fitoerana ity ho trano fanateram-panatitra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa, indro, raha mampihantona ny andro Aho, ka tsy misy ranonorana latsaka, na asaiko mandany ny tany ny valala, na anaterako areti-mandringana ny oloko, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'raha ny oloko izay nantsoina amin’ny anarako ho avy hanetry tena ka hivavaka sy hitady ny tavako ary hiala amin’ny ratsy fanaony, dia hihaino any an-danitra Aho ka hamela ny helony ary hahasitrana ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary izao dia hihiratra ny masoko, ary ny sofiko hihaino ny vavaka izay atao amin’ity fitoerana ity; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fa efa nofidiko sy nohamasiniko ity trano ity mba hitoeran’ny anarako mandrakizay, ary ny masoko sy ny foko ho ao mandrakariva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny aminao, raha handeha eo anatrehako tahaka ny nandehanan’i Davida rainao hianao ka hanao araka izay andidiako anao sy hitandrina ny didiko sy ny fitsipiko, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia hampitoeriko ny seza fiandrianan’ny fanjakanao, araka ny fanekeko tamin’i Davida rainao hoe: Tsy ho diso zanakalahy ho mpanapaka amin’ny Isiraely hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha mivily kosa hianareo ka mahafoy ny didiko sy ny lalàko, izay nataoko teo anoloanareo, ka mandeha manompo andriamani-kafa sy miankohoka eo anatrehany, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: dia hongotako amin’ny tany izay nomeko anareo;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: azy.
    marker-yv: yv-n
  - type: text
    text: ' ary hofongorako tsy ho eo imasoko ity trano nohamasiniko ho an’ny anarako ity sady hataoko ho ohabolana sy ho ambentinteny any amin’ny firenena rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary na dia avo aza ity trano ity, dia ho fitalanjonan’izay rehetra mandalo azy ka hatao hoe: Naninona re no dia nataon’i Jehovah toy izao ity tany sy ity trano ity? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hisy hamaly hoe: Satria nahafoy an’i Jehovah, Andriamanitry ny razany, Izay nitondra azy nivoaka avy tany amin’ny tany Egypta, izy ka nikikitra tamin’andriamani-kafa sady niankohoka teo anatrehany sy nanompo azy, koa izany no nampidirany izao loza rehetra izao taminy.'
