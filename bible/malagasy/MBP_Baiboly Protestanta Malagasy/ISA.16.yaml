document_id: ISA.16,873
type_code: plt
verses:
  '1':
  - type: text
    content: Atero ny zanak’ondrin’ny mpanapaka ny tany,
  - type: text
    content: Dia miala an’i Sela ka mamaky ny efitra
  - type: text
    content: Hatramin’ny tendrombohitr’i Ziona zanakavavy.
  '10':
  - type: text
    content: Ny hafaliana sy ny haravoravoana efa nesorina tamin’ny saha mahavokatra,
  - type: text
    content: Ka tsy hisy hoby na horakoraka ao amin’ny tanimboaloboka;
  - type: text
    content: Ny mpanosihosy tsy hanosihosy divay intsony ao amin’ny famiazana;
  - type: text
    content: Efa natsahatro ny fihobiana amin’ny fararano.
  '11':
  - type: text
    content: Ary noho izany ny tsinaiko dia mitaraina manao feon-dokanga noho ny amin’i Moaba,
  - type: text
    content: Ary ny ato anatiko noho ny amin’i Kira-haresa.
  '12':
  - type: text
    content: Ary rehefa miseho Moaba ka sasatra ao amin’ny fitoerana avo,
  - type: text
    content: Ary mankao amin’ny fitoerany masina mba hivavaka,
  - type: text
    content: Dia tsy hahazo na inona na inona izy.
  '13':
  - type: text
    content: Izany no tenin’i Jehovah nataony fahiny ny amin’i Moaba.
  '14':
  - type: text
    content: 'Ary ankehitriny koa Jehovah miteny hoe:'
  - type: text
    content: Amin’ny telo taona, tahaka ny taonan’ny mpikarama,
  - type: text
    content: Dia ho tsinontsinona ny voninahitr’i Moaba,
  - type: text
    content: Na dia betsaka aza ny vahoakany;
  - type: note
    content: 'Na: ny hareny.'
  - type: text
    content: Ary izay sisa dia ho vitsy, eny, ho vitsy foana, fa tsy ho maro.
  '2':
  - type: text
    content: Ary tahaka ny vorona notairina niala tamin’ny akaniny ka mirenireny foana,
  - type: text
    content: Dia ho toy izany ny zanakavavin’i Moaba ao amin’ny fitana any Arnona.
  '3':
  - type: text
    content: Manolora saina, manomeza rariny,
  - type: text
    content: Ataovy tahaka ny alina ny alokao, na dia amin’ilay andro mitataovovonana iny aza;
  - type: text
    content: Afeno izay voaroaka,
  - type: text
    content: Ary aza aseho izay mandositra!
  '4':
  - type: text
    content: Aoka hitoetra ao aminao izay oloko voaroaka;
  - type: text
    content: Ary aoka ho fieren’i Moaba hianao,
  - type: note
    content: 'Na: Aoka ho fiereny hianao, ry Moaba.'
  - type: text
    content: ' mba tsy ho azon’ny mpandringana izy;'
  - type: text
    content: Fa tsy misy intsony ny mpampahory,
  - type: text
    content: Tapitra ny loza,
  - type: text
    content: Tsy misy amin’ny tany intsony ny mpanosihosy.
  '5':
  - type: text
    content: Ary hisy seza fiandrianana hampitoerina amin’ny famindrampo,
  - type: text
    content: Ka hisy hipetraka eo aminy amin’ny fahamarinana
  - type: text
    content: Ao an-dain’i Davida,
  - type: text
    content: Ary hitsara sy handinika izay marina izy, sady ho faingam-pamoaka ny rariny.
  '6':
  - type: text
    content: Efa renay ny fiavonavonan’i Moaba–fatra-piavonavona loatra izy–
  - type: text
    content: Dia ny fireharehany sy ny fiavonavonany sy ny fihoa-bavany ary ny fibedibediny foana.
  '7':
  - type: text
    content: Ary noho izany dia ho indray midradradradra Moaba,
  - type: text
    content: Eny, samy hidradradradra avokoa izy rehetra;
  - type: text
    content: Fa hitomany ny ampempam-boalobok’
  - type: note
    content: 'Na: faharavany.'
  - type: text
    content: ' i Kira-haresa hianareo ka ho ory indrindra.'
  '8':
  - type: text
    content: Fa malazo avokoa ny sahan’i Hesbona sy ny voalobok’i Sibma,
  - type: text
    content: Norantsanan’ny andrian’ny firenena ny sakeliny,
  - type: note
    content: 'Na: Dia ireo izay nankaleo ny andrianan’ny firenena ny sakeliny.'
  - type: text
    content: Tonga hatrany Jazera sy nisandrahaka tany an-efitra izy,
  - type: text
    content: Ny sampany nandadilady ka tafita ny ranomasina.
  '9':
  - type: text
    content: Koa izany no hitomaniako ny voalobok’i Sibma,
  - type: text
    content: Toy ny fitomanian’
  - type: note
    content: 'Na: fitomaniana an’i.'
  - type: text
    content: ' i Jazera,'
  - type: text
    content: Handena anao amin’ny ranomasoko aho, ry Hesbona sy Elale;
  - type: text
    content: Fa mihatra amin’ny vokatrao lohataona sy ny fararanonao ny fanakorana.
