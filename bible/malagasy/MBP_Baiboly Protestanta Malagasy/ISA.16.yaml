document_id: ISA.16
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Atero ny zanak’ondrin’ny mpanapaka ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia miala an’i Sela ka mamaky ny efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny tendrombohitr’i Ziona zanakavavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary tahaka ny vorona notairina niala tamin’ny akaniny ka mirenireny foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho toy izany ny zanakavavin’i Moaba ao amin’ny fitana any Arnona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Manolora saina, manomeza rariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy tahaka ny alina ny alokao, na dia amin’ilay andro mitataovovonana iny aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afeno izay voaroaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza aseho izay mandositra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka hitoetra ao aminao izay oloko voaroaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho fieren’i Moaba hianao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aoka ho fiereny hianao, ry Moaba.
    marker-yv: yv-n
  - type: text
    text: ' mba tsy ho azon’ny mpandringana izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy misy intsony ny mpampahory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tapitra ny loza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy amin’ny tany intsony ny mpanosihosy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary hisy seza fiandrianana hampitoerina amin’ny famindrampo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hisy hipetraka eo aminy amin’ny fahamarinana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao an-dain’i Davida,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitsara sy handinika izay marina izy, sady ho faingam-pamoaka ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa renay ny fiavonavonan’i Moaba–fatra-piavonavona loatra izy–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fireharehany sy ny fiavonavonany sy ny fihoa-bavany ary ny fibedibediny foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary noho izany dia ho indray midradradradra Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, samy hidradradradra avokoa izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hitomany ny ampempam-boalobok’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: faharavany.
    marker-yv: yv-n
  - type: text
    text: ' i Kira-haresa hianareo ka ho ory indrindra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa malazo avokoa ny sahan’i Hesbona sy ny voalobok’i Sibma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Norantsanan’ny andrian’ny firenena ny sakeliny,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dia ireo izay nankaleo ny andrianan’ny firenena ny sakeliny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga hatrany Jazera sy nisandrahaka tany an-efitra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sampany nandadilady ka tafita ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa izany no hitomaniako ny voalobok’i Sibma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny fitomanian’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fitomaniana an’i.
    marker-yv: yv-n
  - type: text
    text: ' i Jazera,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handena anao amin’ny ranomasoko aho, ry Hesbona sy Elale;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mihatra amin’ny vokatrao lohataona sy ny fararanonao ny fanakorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny hafaliana sy ny haravoravoana efa nesorina tamin’ny saha mahavokatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hisy hoby na horakoraka ao amin’ny tanimboaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanosihosy tsy hanosihosy divay intsony ao amin’ny famiazana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa natsahatro ny fihobiana amin’ny fararano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary noho izany ny tsinaiko dia mitaraina manao feon-dokanga noho ny amin’i Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ato anatiko noho ny amin’i Kira-haresa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary rehefa miseho Moaba ka sasatra ao amin’ny fitoerana avo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mankao amin’ny fitoerany masina mba hivavaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hahazo na inona na inona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izany no tenin’i Jehovah nataony fahiny ny amin’i Moaba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ankehitriny koa Jehovah miteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny telo taona, tahaka ny taonan’ny mpikarama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tsinontsinona ny voninahitr’i Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia betsaka aza ny vahoakany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny hareny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay sisa dia ho vitsy, eny, ho vitsy foana, fa tsy ho maro.
