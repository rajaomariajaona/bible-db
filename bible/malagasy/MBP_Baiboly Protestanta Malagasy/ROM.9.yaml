document_id: ROM.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny nandavan’Andriamanitra ny Jiosy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'MILAZA ny marina ao amin’i Kristy aho, fa tsy mandainga, sady miara-milaza amiko ao amin’ny Fanahy Masina koa ny fieritreretako, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy izany ihany, fa Rebeka koa dia nanan-anaka tamin’ny anankiray, dia tamin’Isaka razantsika; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa raha tsy mbola teraka ireo, ary tsy mbola nanao tsara na ratsy (mba hitoeran’ny fikasan’Andriamanitra araka ny fifidianana, tsy avy amin’ny asa, fa avy amin’Izay miantso), '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nolazaina tamin-dravehivavy hoe: ,,Ny zokiny hanompo ny zandriny’’ (Gen. 25.23); '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny voasoratra hoe: ,,Jakoba no tiako, fa Esao no halako’’ (Mal. 1.2, 3).'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana ary no holazaintsika? Misy tsi-fahamarinana va amin’Andriamanitra? Sanatria izany! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Izy tamin’i Mosesy: ,,Izaho hiantra izay hiantrako, ary hamindra fo amin’izay hamindrako fo’’ (Eks. 33.19). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia tsy avy amin’izay maniry na amin’izay mihazakazaka izany, fa avy amin’Andriamanitra Izay miantra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' tamin’i Farao: ,,Izany no nanandratako anao, mba ho entiko mampiseho ny heriko, ary mba hanambarana ny anarako any amin’ny tany rehetra’’ (Eks. 9.16). '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa izay tiany hamindrana fo no amindrany fo, ary izay tiany hohamafina fo no hamafiny fo.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao ary dia hanao amiko hoe: Koa nahoana Izy no manome tsiny ihany? Fa iza no manohitra ny sitrapony? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa mafy ny alaheloko, ka tsy mety mitsahatra ny fahorian’ny foko. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsia, ralehilahy, fa iza moa hianao, no mamaly an’Andriamanitra? Izay zavatra noforonina va hanao amin’Izay namorona azy hoe: Nahoana Hianao no nanao ahy toy izao? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpanefy vilany va tsy manam-pahefana amin’ny tanimanga, ka ny vongany iray ihany no anaovany zavatra samy hafa, ny iray hohajaina, ary ny iray hatao tsinontsinona? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa ahoana kosa raha Andriamanitra, na dia ta-haneho ny fahatezerany sy hampahafantatra ny heriny aza, dia be fahari-po ka nandefitra tamin’izay fanaky ny fahatezerana voavoatra hosimbana, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hampahafantarina koa ny haren’ny voninahiny amin’izay fanaky ny famindrampo, izay namboariny rahateo hahazo voninahitra, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia isika izay nantsoiny koa, tsy ny avy amin’ny Jiosy ihany, fa ny avy amin’ny jentilisa koa, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka izay lazainy eo amin’i Hosea hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Hiantso ny tsy oloko hoe oloko Aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ilay tsy malala hoe malala’’ (Hos. 2.25);
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Ary any amin’ny tany izay nilazana taminy hoe: Tsy oloko hianareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any no hiantsoana azy hoe zanak’Andriamanitra velona’’ (Hos. 2.1).
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Isaia milaza ny amin’ny Isiraely hoe: ,,Na dia toy ny fasika any amin’ny ranomasina aza ny isan’ny Zanak’Isiraely, dia izay sisa ihany no hovonjena; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa amin’ny fahatanterahana faingana no hanefan’i Jehovah ny teniny ambonin’ny tany’’ (Isa. 10.22, 23); '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary araka izay nolazain’Isaia fahiny hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Raha tsy Jehovah, Tompon’ny maro no namela taranaka ho antsika,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia efa tonga tahaka an’i Sodoma sy tonga tahaka an’i Gomora isika’’ (Isa. 1.9)
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa efa saiky niriko aza ho voaozona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anatema.
      marker-yv: yv-n
    - type: text
      text: ' ho afaka tamin’i Kristy ny tenako mba hahavonjeko ny rahalahiko, havako araka ny nofo, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana ary no holazaintsika? Ny jentilisa, izay tsy nitady fahamarinana, no nahazo fahamarinana, nefa fahamarinana izay avy amin’ny finoana? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Isiraely, izay nitady lalàn’ny fahamarinana kosa, dia tsy nahatratra izany lalàna izany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana moa? Satria tsy tamin’ny finoana, fa toa tamin’ny asa, ka tafintohina tamin’ny vato mahatafintohina izy; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny voasoratra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Indro Aho mametraka vato mahatafintohina'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sy vatolampy mahasolafaka ao Ziona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay mino Azy tsy ho menatra’’ (Isa. 8.14; 28.16).
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay Isiraelita sady manana ny fananganan-anaka sy ny voninahitra sy ny fanekena sy ny fanomezana ny lalàna sy ny fombam-pivavahana ary ny teny fikasana; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: azy koa ny razana, sady avy taminy araka ny nofo Kristy, Izay ambonin’izy rehetra, Andriamanitra isaorana mandrakizay.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avy taminy araka ny nofo Kristy. Isaorana mandrakizay anie Andriamanitra, Izay ambonin izy rehetra.
      marker-yv: yv-n
    - type: text
      text: ' Amena.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tsy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lazaiko fa
    - type: text
      text: ' foana ny tenin’Andriamanitra tsy akory. Fa tsy izay rehetra avy amin’ny Isiraely no Isiraely. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na dia taranak’i Abrahama aza ireo, tsy dia ary zanany avokoa; fa ,,avy amin’Isaka no hantsoina izay taranaka ho anao’’ (Gen. 21.12). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany hoe: Tsy ny zanaky ny nofo no zanak’Andriamanitra; fa ny zanaky ny teny fikasana no isaina ho taranaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no filàzan’ny teny fikasana: ,Raha avy ny taona toy izao, dia ho avy Aho, ary hanana zazalahy Saraha’’ (Gen. 18.10).'
