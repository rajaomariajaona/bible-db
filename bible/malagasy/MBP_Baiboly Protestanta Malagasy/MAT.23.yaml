document_id: MAT.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nilazan’i Jesosy ny faharatsian’ny mpanora-dalàna sy ny Fariseo.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 12.38-40; Lio. 20.45-47.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’izany Jesosy dia niteny tamin’ny vahoaka sy tamin’ny mpianany ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eo amin’ny fipetrahan’i Mosesy no ipetrahan’ny mpanora-dalàna sy ny Fariseo; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'koa amin’izany, izay rehetra lazainy dia ataovy ka tandremo; fa aza mba manao araka ny asany, satria miteny ihany izy, nefa tsy manao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eny, mamehy entana sady mavesatra no sarotra entina izy ka manaingina izany eo amin’ny soroky ny olona, nefa ny tenany tsy mety manetsika izany na dia amin’ny rantsan-tànany anankiray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny asany rehetra dia ataony mba ho hitan’ny olona; fa ataony lehibe ny filakiterany, ary ataony vaventy ny somotraviaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tia ny fitoerana aloha eo amin’ny fanasana izy, sy ny fipetrahana aloha eo amin’ny synagoga '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'sy ny hoharabain’ny olona eny an-tsena ary ny hataon’ny olona hoe: Raby ô! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hianareo kosa aza mba mety hatao hoe: Raby ô; fa iray ihany no Mpampianatra anareo, ary hianareo rehetra dia mpirahalahy avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary aza milaza olona etỳ an-tany ho rainareo; fa iray ihany no Rainareo, dia Izay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary aza mba mety hatao hoe mpitarika hianareo; fa iray ihany no Mpitarika anareo, dia Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izay lehibe aminareo no ho mpanompo anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa izay manandra-tena no haetry; ary izay manetry tena no hasandratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa arindrinareo eo anoloan’ny olona ny fanjakan’ny lanitra; fa hianareo tsy miditra, ary izay miditra dia tsy avelanareo hiditra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[14 Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa laninareo ny tranon’ny mpitondratena, ary dia manao vavaka lavareny mba ho fiolahana hianareo; koa izany no hahazoanareo fahamelohana mafimafy kokoa.]'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa mandeha mitety ny ranomasina sy ny tany maina hianareo mba hahazoanareo na dia iray ihany aza ho proselyta; ary rehefa azonareo izy, dia ataonareo zanaky ny helo mihoatra indroa noho hianareo aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lozanareo, mpitarika jamba izay manao hoe: Raha misy mianiana amin’ny tempoly, dia tsy mampaninona izany; fa raha misy mianiana amin’ny volamena amin’ny tempoly, dia haningo-tena izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ry adala sy jamba! iza no lehibe, ny volamena va, sa ny tempoly izay nahamasina ny volamena? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary koa: Raha misy mianiana amin’ny alitara, dia tsy mampanonina izany; fa raha misy mianiana amin’ny fanatitra eo amboniny, dia haningo-tena izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ry jamba! iza no lehibe, ny fanatitra, sa ny alitara izay mahamasina ny fanatitra? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa amin’izany, izay mianiana amin’ny alitara, dia mianiana aminy mbamin’ny zavatra rehetra izay eo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izay mianiana amin’ny tempoly dia mianiana aminy mbamin’Izay mitoetra ao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary izay mianiana amin’ny lanitra dia mianiana amin’ny seza fiandrianan’Andriamanitra mbamin’Izay mipetraka eo amboniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa mandoa ny fahafolon’ny solila sy ny aneta ary ny komina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaran-java-maniry ireo.
    marker-yv: yv-n
  - type: text
    text: ' hianareo, nefa navelanareo izay lehibe amin’ny lalàna, dia ny rariny sy ny famindrampo ary ny finoana; ireto tokony ho nataonareo, nefa tsy tokony havelanareo ireroana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ry mpitarika jamba! tantavaninareo ny moka, nefa atelinareo ny rameva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa diovinareo ny vohon’ny kapoaka sy ny lovia, nefa ny ao anatiny dia feno rombaka sy tsi-fahononana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ry Fariseo jamba! diovy aloha ny atin’ny kapoaka sy ny lovia, mba ho madio koa ny vohony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa hianareo dia tahaka ny fasana voalalotra fotsy, izay miseho tsara tarehy eo ivelany, nefa ny ao anatiny dia feno taolan’ny maty mbamin’ny fahalotoana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia tahaka izany koa hianareo: raha amin’ny eo ivelany dia miseho amin’ny olona ho marina, nefa ny ao anatinareo dia feno fihatsarambelatsihy sy tsi-fankatoavan-dalàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa manao ny fasan’ny mpaminany hianareo sady manisy haingony ny rarivatom-pasan’ny olona marina, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ka hoy hianareo: Raha niara-belona tamin’ny razanay izahay, dia tsy mba nikambana taminy handatsa-dra ny mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ka dia miampanga tena hianareo fa zanak’izay namono ny mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hianareo koa dia mamenoa ny famaran’ny razanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ry bibilava, taranaky ny menarana, hataonareo ahoana no fandositra ny fanamelohana ho any amin’ny helo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary noho izany, indro, Izaho maniraka mpaminany sy olon-kendry ary mpanora-dalàna ho atỳ aminareo; koa ny sasany hovonoinareo sy hohomboanareo amin’ny hazo fijaliana, ary ny sasany hokapohinareo ao amin’ny synagoganareo sy henjehinareo mitety vohitra,– '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'mba hanody anareo ny ra marina rehetra, izay nalatsaka tambonin’ny tany, hatramin’ny ran’i Abela marina ka hatramin’ny ran’i Zakaria, zanak’i Barakia, izay novonoinareo teo anelanelan’ny tempoly sy ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Hanody ity taranaka ity izany rehetra izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay irahina ho aminao, impiry Aho no ta-hanangona ny zanakao, tahaka ny fanòmban’ny akoho ny zanany ao ambanin’ny elany, fa tsy nety hianareo! '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Indro, avela ho lao ho anareo ny tranonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa lazaiko aminareo: Hatramin’izao dia tsy hahita Ahy tokoa hianareo mandra-pilazanareo hoe: Isaorana anie Izay avy amin’ny anaran’i Jehovah.'
