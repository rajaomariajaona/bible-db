document_id: 2PE.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana, sy fananarana mba hitondra tena miendrika ny Kristiana.
  - type: text
    content: 'SIMONA Petera, mpanompo sy Apostolin’i Jesosy Kristy, mamangy izay efa nahazo finoana soa tahaka ny anay amin’ny fahamarinan’i Jesosy Kristy, Andriamanitsika sy Mpamonjy:'
  - type: note
    content: 'Na: ny fahamarinan’Andriamanitra sy Jesosy Kristy, Mpamonjy antsika.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Ary amin’izany dia mazotoa kokoa, ry rahalahy, hampitoetra ny fiantsoana sy ny fifidianana anareo; fa raha manao izany zavatra izany hianareo, dia tsy ho tafintohina akory mandrakizay; '
  '11':
  - type: text
    content: fa toy izany no hanomezana malalaka ho anareo ny fidirana ho any amin’ny fanjakana mandrakizay, izay an’i Jesosy Kristy, Tompontsika sy Mpamonjy antsika.
  - type: heading
    content: Fananarana mba hiorina tsara amin’ny fampianarana marina.
  '12':
  - type: text
    content: 'KOA hazoto mandrakariva hampahatsiaro anareo ny amin’izany zavatra izany aho, na dia efa fantatrareo aza, ka efa naorina tsara amin’ny fahamarinana izay efa eo '
  - type: text
    content: aminareo.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Fa raha mbola eto amin’ity trano-lay ity aho, dia ataoko fa mety ny hampifoha anareo amin’ny fampahatsiarovana anareo, '
  '14':
  - type: text
    content: 'satria fantatro fa ho avy tampoka ny hanesorana ny trano-laiko, dia toy ny nasehon’i Jesosy Kristy Tompontsika tamiko koa. '
  '15':
  - type: text
    content: Ary dia hataoko izay zakako mba hisy hahatsiarovanareo izany zavatra izany mandrakariva, rehefa maty aho.
  '16':
  - type: text
    content: 'Fa tsy nanaraka izay anganongano noforonin’ny fahafetsen’ny saina izahay, raha nampahafantatra anareo ny hery sy ny fihavian’i Jesosy Kristy Tompontsika; fa efa hitan’ny masonay ny fiandrianany. '
  '17':
  - type: text
    content: 'Fa nahazo laza amam-boninahitra tamin’Andriamanitra Ray Izy, raha tonga teo aminy avy tamin’ny voninahitra lehibe indrindra ilay feo nanao hoe: ,,Ity no Zanako malalako Izay sitrako’’ (Mat. 17.5). '
  '18':
  - type: text
    content: 'Ary renay io feo avy tany an-danitra io, raha niara-nipetraka taminy tany an-tendrombohitra masina izahay. '
  '19':
  - type: text
    content: 'Ary manana ny teny faminaniana atao mafy orina kokoa isika; koa raha mandinika izany hianareo, dia manao tsara, fa toy ny jiro mahazava ao amin’ny fitoerana maizimaizina izany, mandra-pahazavan’ny andro, ka miposaka ao am-ponareo ny fitarik’andro; '
  '2':
  - type: text
    content: hampitomboina ho anareo anie ny fahasoavana sy ny fiadanana amin’ny fahalalana tsara an’Andriamanitra sy Jesosy Tompontsika.
  '20':
  - type: text
    content: 'fa fantatrareo voalohany indrindra fa ny famoahan-kevitry ny faminaniana ao amin’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' dia tsy efan’ny fisainan’ny olona fotsiny ihany; '
  '21':
  - type: text
    content: fa tsy nisy faminaniana avy tamin’ny sitrapon’ny olona tany aloha rehetra; fa avy tamin’Andriamanitra no nitenenan’ny olona araka izay nitondran’ny Fanahy Masina azy.
  '3':
  - type: text
    content: Efa nomen’ny herin’Andriamanitra ho antsika ny zavatra rehetra momba ny fiainana sy ny toe-panahy araka an’Andriamanitra amin’ny fahalalana Ilay niantso antsika tamin’ny voninahiny sy ny fahatsarany;
  - type: note
    content: 'Na: [tamin’ny voninahitra sy ny fahatsarana].'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'ary izany no nahatanterahany amintsika ireo teny fikasana sady soa no lehibe indrindra, mba ho tonga mpiray amin’ny fomban’Andriamanitra amin’izany hianareo, rehefa afa-nandositra ny fahalotoana izay eo amin’izao tontolo izao noho ny filana; '
  '5':
  - type: text
    content: 'koa noho izany dia manaova izay zotom-po rehetra kosa hianareo, ka amin’ny finoanareo dia manehoa fahatanjahan-tsaina, ary amin’ny fahatanjahan-tsainareo dia fahalalana, '
  '6':
  - type: text
    content: 'ary amin’ny fahalalanareo dia fahononam-po, ary amin’ny fahononam-ponareo dia faharetana, ary amin’ny faharetanareo dia toe-panahy araka an’Andriamanitra, '
  '7':
  - type: text
    content: 'ary amin’ ny toe-panahinareo araka an’Andriamanitra dia fitiavana ny rahalahy, ary amin’ny fitiavanareo ny rahalahy dia fitiavana '
  - type: text
    content: ny olona rehetra.
  '8':
  - type: text
    content: 'Fa raha anananareo izany zavatra izany, sady anananareo betsaka, dia tsy avelan’izany ho malaina na tsy hahavokatra hianareo amin’ny fahalalana tsara an’i Jesosy Kristy Tompontsika. '
  '9':
  - type: text
    content: 'Fa izay tsy manana izany zavatra izany kosa dia '
  - type: text
    content: toa
  - type: text
    content: ' jamba ka tsy mahajery lavitra, sady nanadino ny nanadiovana azy tamin’ny fahotany fahiny izy. '
