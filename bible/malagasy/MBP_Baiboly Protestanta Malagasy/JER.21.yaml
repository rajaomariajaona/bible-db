document_id: JER.21
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny hahafahan’ny Kaldeana an’i Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah, fony Zedekia mpanjaka naniraka an’i Pasora, zanak’i Malgia, sy Zefania, zanak’i Mahaseia mpisorona, hankany aminy hanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Masìna hianao, manontania amin’i Jehovah ho anay; fa miady aminay Nebokadnezara, mpanjakan’i Babylona; angamba Jehovah hanao aminay araka ny asany mahagaga rehetra, mba hialan’ireo aminay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Jeremia taminy: Lazaonareo amin’i Zedekia hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Indro, haveriko ny fiadiana eny an-tànanareo, izay entinareo miady eny ivelan’ny mànda amin’ny mpanjakan’i Babylona sy amin’ny Kaldeana, izay manao fahirano anareo, ka hangoniko eto afovoan’ity tanàna ity ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Izaho no hiady aminareo amin’ny tànana ahinjitra sy amin’ny sandry mahery ary amin’ny fahavinirana sy ny fisafoahana ary ny fahatezerana mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hamely ny mponina amin’ity tanàna ity Aho, na olona, na biby: ho fatin’ny aretim-be mandringana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary rehefa afaka izany, hoy Jehovah, Zedekia, mpanjakan’ny Joda, sy ny mpanompony sy ny vahoaka ary izay sisa tsy matin’ny areti-mandringana sy ny sabatra sy ny mosary amin’ity tanàna ity dia hatolotro eo an-tànan’i Nebokadnezara, mpanjakan’i Babylona, sy eo an-tànan’ny fahavalony sy eo an-tànan’izay mitady ny ainy; dia hamely azy amin’ny lelan-tsabatra ireo, fa tsy hitsitsy na hiantra azy, na hamindra fo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ity firenena ity dia hilazanao hoe: Izao no lazain’i Jehovah: Indro, ataoko eo anoloanareo ny làlan’ny fiainana sy ny làlan’ny fahafatesana: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay mbola mitoetra eto amin’ity tanàna ity ihany dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana izay manao fahi-rano anareo kosa dia ho velona, ka ny ainy no ho babony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa efa manandrina ity tanàna ity Aho hahatonga loza aminy, fa tsy soa, hoy Jehovah; hatolotro eo an-tànan’ny mpanjakan’i Babylona ity ka hodoroany amin’ny afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary henoy ny tenin’i Jehovah ny amin’ny taranaky ny mpanjakan’ny Joda sy ny mpianakaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ry taranak’i Davida, izao no lazain’i Jehovah: Mitsarà isa-maraina, afaho amin’ny tànan’ny mpampahory ny olona norobaina, fandrao mivoaka toy ny afo ny fahatezerako ary mirehitra ka tsy hisy hamono noho ny faharatsian’ny ataonareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Indro, hohatoniko hianao, ry mponina an-dohasaha, dia eo amin’ny vatolampy amin’ny tany lemaka, hoy Jehovah, dia hianareo izay manao hoe: Iza moa no sahy hidina hamely anay? Ary iza no sahy hiditra ato amin’ny fonenanay?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa hamaly anareo araka ny vokatry ny asanareo Aho, hoy Jehovah, ary handrehitra afo ao amin’ny alany, ka handevona ny manodidina azy rehetra izany.
