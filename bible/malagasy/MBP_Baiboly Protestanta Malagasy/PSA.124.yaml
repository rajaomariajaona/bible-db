  children:
  - type: text
    text: Fisaorana an’Andriamanitra noho ny nanafahany ny mpanompony saiky tra-doza.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '124.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fihirana misy hevitra ambaratonga.
    marker-yv: yv-n
  - type: text
    text: ' Nataon’i Davida.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: RAHA tsy Jehovah no nomba antsika,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, aoka hataon’ny Isiraely hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha tsy Jehovah no nomba antsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha nitsangana hamely antsika ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nitelina antsika velona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha nirehitra tamintsika ny fahatezerany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia nandifotra antsika ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nanafotra ny fanahintsika ny riaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eny, nanafotra ny fanahintsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny rano misafoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Isaorana anie Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy nanolotra antsika ho rembin’ny nifiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fanahintsika dia efa afaka tahaka ny vorona afaka tamin’ny fandriky ny mpihaza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tapaka ny fandrika, ka afaka isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny famonjena antsika dia amin’ny anaran’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanao ny lanitra sy ny tany.
