document_id: PSA.124,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana an’Andriamanitra noho ny nanafahany ny mpanompony saiky tra-doza.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: ' Nataon’i Davida.'
  - type: text
    content: RAHA tsy Jehovah no nomba antsika,–
  - type: text
    content: 'Eny, aoka hataon’ny Isiraely hoe:'
  '2':
  - type: text
    content: Raha tsy Jehovah no nomba antsika,
  - type: text
    content: Raha nitsangana hamely antsika ny olona.
  '3':
  - type: text
    content: Dia nitelina antsika velona izy,
  - type: text
    content: Raha nirehitra tamintsika ny fahatezerany;
  '4':
  - type: text
    content: Dia nandifotra antsika ny rano,
  - type: text
    content: Ary nanafotra ny fanahintsika ny riaka;
  '5':
  - type: text
    content: Eny, nanafotra ny fanahintsika
  - type: text
    content: Ny rano misafoaka.
  '6':
  - type: text
    content: Isaorana anie Jehovah,
  - type: text
    content: Izay tsy nanolotra antsika ho rembin’ny nifiny.
  '7':
  - type: text
    content: Ny fanahintsika dia efa afaka tahaka ny vorona afaka tamin’ny fandriky ny mpihaza;
  - type: text
    content: Tapaka ny fandrika, ka afaka isika.
  '8':
  - type: text
    content: Ny famonjena antsika dia amin’ny anaran’i Jehovah,
  - type: text
    content: Mpanao ny lanitra sy ny tany.
