document_id: PSA.142,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ataon’izay foin’ny sakaizany sady enjehin’ny fahavalony.
  - type: text
    content: Maskila nataon’i Davida tamin’izy tao anaty lavaka. Fivavahana.
  - type: text
    content: NY feoko no itarainako amin’i Jehovah;
  - type: text
    content: Ny feoko no ifonako amin’i Jehovah.
  '2':
  - type: text
    content: Loarako eo anatrehany ny fitarainako;
  - type: text
    content: Ambarako eo anatrehany ny fahoriako.
  '3':
  - type: text
    content: Raha reraka ato anatiko ny fanahiko, dia fantatro ny alehako;
  - type: text
    content: Eo amin’ny làlana izorako
  - type: text
    content: No nanafenany fandrika hamandrihany ahy.
  '4':
  - type: text
    content: Jereo eo an-kavanana, ka izahao,
  - type: text
    content: Fa tsy misy olona mahalala ahy;
  - type: text
    content: Foana avokoa ny fiarovana ahy;
  - type: text
    content: Tsy misy miahy ny fanahiko.
  '5':
  - type: text
    content: Mitaraina aminao aho, Jehovah ô;
  - type: text
    content: 'Hoy izaho: Hianao no aroko'
  - type: text
    content: Sy anjarako eo amin’ny tanin’ny velona.
  '6':
  - type: text
    content: Henoy ny fitarainako,
  - type: text
    content: Fa reraka indrindra aho;
  - type: text
    content: Vonjeo aho amin’ny mpanenjika ahy,
  - type: text
    content: Fa tsy leoko ireny.
  '7':
  - type: text
    content: Avoahy hiala amin’ny trano-maizina ny fanahiko,
  - type: text
    content: Mba hiderako ny anaranao;
  - type: text
    content: Hanodidina ahy ny marina,
  - type: text
    content: Satria manisy soa ahy Hianao.
