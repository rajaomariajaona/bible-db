document_id: PSA.142
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vavaka ataon’izay foin’ny sakaizany sady enjehin’ny fahavalony.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maskila nataon’i Davida tamin’izy tao anaty lavaka. Fivavahana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY feoko no itarainako amin’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny feoko no ifonako amin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Loarako eo anatrehany ny fitarainako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambarako eo anatrehany ny fahoriako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha reraka ato anatiko ny fanahiko, dia fantatro ny alehako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny làlana izorako
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nanafenany fandrika hamandrihany ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jereo eo an-kavanana, ka izahao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy misy olona mahalala ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foana avokoa ny fiarovana ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy miahy ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mitaraina aminao aho, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy izaho: Hianao no aroko'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy anjarako eo amin’ny tanin’ny velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Henoy ny fitarainako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa reraka indrindra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho amin’ny mpanenjika ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy leoko ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avoahy hiala amin’ny trano-maizina ny fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hiderako ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanodidina ahy ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria manisy soa ahy Hianao.
