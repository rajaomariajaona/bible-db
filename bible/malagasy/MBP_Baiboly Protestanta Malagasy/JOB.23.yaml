document_id: JOB.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny navalin’i Joba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mbola atao ho fikomiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mangidy.
    marker-yv: yv-n
  - type: text
    text: ' ihany ny fitarainako;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànana mamely ahy dia mitambesatra amin’ny fisentoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Enga anie ka ho fantatro izay hahitako Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho tonga any amin’ny fitoerany aza!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia handahatra ny teniko eo anatrehany aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hofenoiko ny teny alahatro ny vavako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary hahalala izay teny havaliny ahy aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hamantatra izay holazainy amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hery lehibe va no handaharany teny amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa Izy indrindra no hihaino ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa amin’izany dia olona marina no ho nifandahatra taminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho nanan-drariny mihitsy aho tamin’ny Mpitsara ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Indro, miantsinanana aho, fa tsy any Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miankandrefana aho, fa tsy hitako Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mianavaratra amin’izay iasany aho, fa tsy tazako Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivily any atsimo Izy, ka tsy hitako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa mahalala ny làlana falehako Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha hizahany toetra aho, dia hivoaka tahaka ny volamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny tongotro nifikitra tamin’ny làlany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny làlany no nizorako tsara, ka tsy nivily aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny didin’ny molony tsy mba nialako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tenin’ny vavany noraketiko mihoatra noho ny faniriako.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anjara-haniko.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nefa tsy miova saina Izy, ka iza no mahasakana Azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa na inona na inona irin’ny fanahiny dia ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Eny, manatanteraka izay voatendry ho ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zavatra maro toy izany no ao aminy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa izany no mampangovitra ahy eo anatrehany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha misaintsaina izany aho, dia matahotra Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa Andriamanitra no mandreraka ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Tsitoha no mampangovitra ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa tsy ny fahamaizinana no maharesy ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny maizim-pito izay manarona ny tavako.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Satria tsy nalaina aho, dieny tsy mbola avy ny maizina, Ary tsy nanafina ny maizim-pitoamin’ny tavako Izy.
    marker-yv: yv-n
