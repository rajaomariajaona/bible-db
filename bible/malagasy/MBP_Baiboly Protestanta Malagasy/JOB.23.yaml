document_id: JOB.23,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny navalin’i Joba.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahalala ny làlana falehako Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha hizahany toetra aho, dia hivoaka tahaka ny volamena.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tongotro nifikitra tamin’ny làlany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny làlany no nizorako tsara, ka tsy nivily aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny didin’ny molony tsy mba nialako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’ny vavany noraketiko mihoatra noho ny faniriako.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anjara-haniko.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy miova saina Izy, ka iza no mahasakana Azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na inona na inona irin’ny fanahiny dia ataony.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manatanteraka izay voatendry ho ahy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary zavatra maro toy izany no ao aminy;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no mampangovitra ahy eo anatrehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misaintsaina izany aho, dia matahotra Azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra no mandreraka ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny Tsitoha no mampangovitra ahy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy ny fahamaizinana no maharesy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny maizim-pito izay manarona ny tavako.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Satria tsy nalaina aho, dieny tsy mbola avy ny maizina, Ary tsy nanafina ny maizim-pitoamin’ny tavako Izy.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola atao ho fikomiana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mangidy.
      marker-yv: yv-n
    - type: text
      text: ' ihany ny fitarainako;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànana mamely ahy dia mitambesatra amin’ny fisentoako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka ho fantatro izay hahitako Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho tonga any amin’ny fitoerany aza!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia handahatra ny teniko eo anatrehany aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hofenoiko ny teny alahatro ny vavako;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hahalala izay teny havaliny ahy aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hamantatra izay holazainy amiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hery lehibe va no handaharany teny amiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, fa Izy indrindra no hihaino ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’izany dia olona marina no ho nifandahatra taminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho nanan-drariny mihitsy aho tamin’ny Mpitsara ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, miantsinanana aho, fa tsy any Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miankandrefana aho, fa tsy hitako Izy;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mianavaratra amin’izay iasany aho, fa tsy tazako Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivily any atsimo Izy, ka tsy hitako.
