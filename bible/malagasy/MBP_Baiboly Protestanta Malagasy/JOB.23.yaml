document_id: JOB.23,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Joba.
  - type: text
    content: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Fa mahalala ny làlana falehako Izy;
  - type: text
    content: Raha hizahany toetra aho, dia hivoaka tahaka ny volamena.
  '11':
  - type: text
    content: Ny tongotro nifikitra tamin’ny làlany;
  - type: text
    content: Eny, ny làlany no nizorako tsara, ka tsy nivily aho.
  '12':
  - type: text
    content: Ny didin’ny molony tsy mba nialako;
  - type: text
    content: Ny tenin’ny vavany noraketiko mihoatra noho ny faniriako.
  - type: note
    content: 'Na: anjara-haniko.'
  '13':
  - type: text
    content: Nefa tsy miova saina Izy, ka iza no mahasakana Azy?
  - type: text
    content: Fa na inona na inona irin’ny fanahiny dia ataony.
  '14':
  - type: text
    content: Eny, manatanteraka izay voatendry ho ahy Izy;
  - type: text
    content: Ary zavatra maro toy izany no ao aminy;
  '15':
  - type: text
    content: Koa izany no mampangovitra ahy eo anatrehany;
  - type: text
    content: Raha misaintsaina izany aho, dia matahotra Azy.
  '16':
  - type: text
    content: Fa Andriamanitra no mandreraka ny foko,
  - type: text
    content: Ary ny Tsitoha no mampangovitra ahy;
  '17':
  - type: text
    content: Fa tsy ny fahamaizinana no maharesy ahy,
  - type: text
    content: Na ny maizim-pito izay manarona ny tavako.
  - type: note
    content: 'Na: Satria tsy nalaina aho, dieny tsy mbola avy ny maizina, Ary tsy nanafina ny maizim-pitoamin’ny tavako Izy.'
  '2':
  - type: text
    content: Mbola atao ho fikomiana
  - type: note
    content: 'Na: mangidy.'
  - type: text
    content: ' ihany ny fitarainako;'
  - type: text
    content: Ny tànana mamely ahy dia mitambesatra amin’ny fisentoako.
  '3':
  - type: text
    content: Enga anie ka ho fantatro izay hahitako Azy
  - type: text
    content: Ka ho tonga any amin’ny fitoerany aza!
  '4':
  - type: text
    content: Dia handahatra ny teniko eo anatrehany aho.
  - type: text
    content: Ka hofenoiko ny teny alahatro ny vavako;
  '5':
  - type: text
    content: Ary hahalala izay teny havaliny ahy aho
  - type: text
    content: Sy hamantatra izay holazainy amiko.
  '6':
  - type: text
    content: Hery lehibe va no handaharany teny amiko?
  - type: text
    content: Tsia, fa Izy indrindra no hihaino ahy.
  '7':
  - type: text
    content: Fa amin’izany dia olona marina no ho nifandahatra taminy;
  - type: text
    content: Ka dia ho nanan-drariny mihitsy aho tamin’ny Mpitsara ahy.
  '8':
  - type: text
    content: Indro, miantsinanana aho, fa tsy any Izy;
  - type: text
    content: Ary miankandrefana aho, fa tsy hitako Izy;
  '9':
  - type: text
    content: Mianavaratra amin’izay iasany aho, fa tsy tazako Izy;
  - type: text
    content: Mivily any atsimo Izy, ka tsy hitako.
