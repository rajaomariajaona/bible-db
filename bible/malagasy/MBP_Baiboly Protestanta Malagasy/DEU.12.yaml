document_id: DEU.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny handravana izay zavatra momba ny fivavahana amin’ny sampy, ary ny amin’ny hivavahana amin’Andriamanitra ao amin’izay tany fidiny.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: IZAO no didy sy fitsipika izay hotandremanareo harahina any amin’ny tany izay omen’i Jehovah, Andriamanitry ny razanao, anao holovana amin’ny andro rehetra hiainanareo ambonin’ny tany:–
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa tafita an’i Jordana hianareo ka monina any amin’ny tany izay omen’i Jehovah Andriamanitrareo anareo holovana, ary homeny fitsaharan’ady amin’ny fahavalonareo rehetra manodidina hianareo ka mandry fahizay, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia eo amin’ny tany izay hofidin’i Jehovah Andriamanitrareo hampitoerany ny anarany no hitondranareo izay rehetra andidiako anareo, dia ny fanatitra odoranareo sy ny fanatitrareo hafa alatsa-dra sy ny fahafolon-karenareo sy ny fanatitra asandratry ny tànanareo, ary izay zavatra tsara ataonareo voady amin’i Jehovah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hifaly eo anatrehan’i Jehovah Andriamanitrareo hianareo sy ny zanakareo-lahy sy ny zanakareo-vavy sy ny ankizilahinareo sy ny ankizivavinareo ary ny Levita izay ao an-tanànanareo; fa ny Levita tsy mba manana anjara na lova eo aminareo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitandrema mba tsy haterinao eny amin’izay tany rehetra tianao ny fanatitra odoranao; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa eo amin’ny tany izay hofidin’i Jehovah ihany amin’ny firenenao anankiray no hanateranao azy, sady eo koa no hanaovanao izay rehetra andidiako anao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mahazo mamono zavatra sy mihinan-kena hianao, araka izay rehetra irinao eny amin’ny tanànanao rehetra, araka ny fitahian’i Jehovah Andriamanitrao izay omeny anao; na ny maloto, na ny madio dia samy mahazo mihinana azy ihany, tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa ny rany no aza hanina, fa aidino amin’ny tany toy ny rano.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy azonao hanina ao an-tanànanao, na ny ampahafolon’ny varinao sy ny ranom-boalobokao sy ny diloilonao, na ny voalohan-teraky ny ombinao sy ny ondry aman’osinao, na ny zavatra rehetra hataonao voady, na ny fanati-tsitraponao, na ny fanatitra asandratry ny tànanao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa eo anatrehan’i Jehovah Andriamanitrao no hihinananao azy, dia eo amin’ny tany izay hofidin’i Jehovah Andriamanitrao,– dia hianao sy ny zanakao-lahy sy ny zanakao-vavy sy ny ankizilahinao sy ny ankizivavinao ary ny Levita izay ao an-tànananao; ary hifaly eo anatrehan’i Jehovah Andriamanitrao hianao amin’izay rehetra harin’ny tànanao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitandrema mba tsy ho foinao ny Levita amin’ny andro rehetra hiainanao amin’ny taninao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Horavanareo mihitsy ny fitoerana rehetra izay nanompoan’ny firenen-tsamy hafa izay horoahinareo ny andriamaniny teny ambonin’ny tendrombohitra avo sy ny havoana ary teny ambanin’ny hazo maitso rehetra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hitarin’i Jehovah Andriamanitrao ny faritaninao, araka izay nolazainy taminao, ka hoy hianao: Hihinan-kena aho– satria maniry hihinan-kena ny fanahinao, dia mahazo mihinan-kena araka izay rehetra irin’ny fanahinao hianao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha lavitra anao loatra ny tany izay hofidin’i Jehovah Andriamanitrao hasiany ny anarany, dia hamonoanao ny ombinao sy ny ondry aman-osinao izay nomen’i Jehovah anao, araka izay efa nandidiako anao, ary hohaninao ao an-tanànanao, araka izay rehetra irin’ny fanahinao izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tahaka ny ahazoanao mihinana ny gazela sy ny diera no hahazoanao mihinana ireny: na ny maloto na ny madio dia samy mahazo mihinana azy.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tandremo tsara mba tsy hohaninao ny ra, fa ny ra no aina, ary tsy mahazo mihinana ny aina amin’ny hena hianao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mihinana azy hianao, fa aidino amin’ny tany toy ny rano izy; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: eny, aza mihinana azy hianao, mba hahita soa hianao sy ny taranakao mandimby anao, raha manao izay mahitsy eo imason’i Jehovah hianao.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ny zava-masinao sy ny zavatra nataonao voady dia ento mankany amin’ ny tany izay hofidin’i Jehovah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary atero eo amin’ny alitaran’i Jehovah Andriamanitrao ny fanatitra odoranao, dia ny henany sy ny rany; ary ny ran’ny fanatitrao hafa dia aidino eo amin’ny alitaran’i Jehovah Andriamanitrao, fa ny henany dia azonao hohanina ihany.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tandremo, ka henoy izao teny rehetra izao, izay andidiako anao, mba hahita soa hianao sy ny taranakao mandimby anao mandrakizay, raha manao izay tsara sy mahitsy eo imason’i Jehovah Andriamanitrao hianao.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa aringan’i Jehovah Andriamanitrao eo anoloanao ny firenen-tsamy hafa, izay alehanao horesenao, ary handresy azy hianao ka honina eo amin’ny taniny, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia horavanareo ny alitarany, ary hotorotoroinareo ny tsangam-baton-tsampiny, ary hodoranareo amin’ny afo ny Aserahany, ary ny sarin-javatra voasokitra, izay andriamaniny, dia hokapainareo, ka dia hofoananareo tsy ho eo amin’izany tany izany intsony ny anarany.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia mitandrema, fandrao voafandrika hanaraka ny fanaony hianao, rehefa voaringana eo anoloanao izy; ary andrao mamotopototra ny amin’ny andriamaniny hianao ka manao hoe: Nanao ahoana no nanompoan’ireny firenena ireny ny andriamaniny? fa izaho koa mba hanao toy izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manao toy izany amin’i Jehovah Andriamanitrao; fa ny fahavetavetana rehetra, izay halan’i Jehovah, no nataony tamin’ny andriamaniny; fa ny zanany lahy sy ny zanany vavy aza dia nodorany tamin’ny afo ho an’ny andriamaniny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manao toy izany amin’i Jehovah Andriamanitrareo hianareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany izay hofidin’i Jehovah Andriamanitrareo amin’ny firenenareo rehetra hasiany ny anarany sy honenany no hohatoninareo sy halehanareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary any no hitondranareo ny fanatitra odoranareo sy ny fanatitrareo hafa alatsa-dra sy ny fahafolon-karenareo sy ny fanatitra asandratry ny tànanareo sy ny fanalam-boadinareo sy ny fanati-tsitraponareo ary ny voalohan-teraky ny ombinareo sy ny ondry aman’osinareo; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary any no hihinananareo sy ny ankohonanareo eo anatrehan’i Jehovah Andriamanitrareo ary hifalianareo amin’izay rehetra harin’ny tànanareo, izay efa nitahian’i Jehovah Andriamanitrao anao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manao araka izay rehetra ataontsika eto ankehitriny intsony ianareo, dia izao samy manao izay mahitsy eo imasony avy izao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hianareo tsy mbola tonga any amin’ny fitsaharana sy ny lova izay omen’i Jehovah Andriamanitrao anao. '
