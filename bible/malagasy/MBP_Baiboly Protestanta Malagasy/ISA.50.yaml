document_id: ISA.50,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny nisaorana ny Isiraely, sy ny amin’ny Mpanompon’i Jehovah.
  - type: text
    content: 'IZAO no lazain’i Jehovah:'
  - type: text
    content: Aiza izay taratasy fisaoram-bady nisaorako an-dreninareo?
  - type: text
    content: Ary iza amin’izay manan-trosa amiko no nivarotako anareo?
  - type: text
    content: Tsia, fa noho ny helokareo ihany no nivarotana anareo,
  - type: text
    content: Ary noho ny fahadisoanareo ihany no nisaorana an-dreninareo.
  '10':
  - type: text
    content: Iza aminareo no matahotra an’i Jehovah
  - type: text
    content: Ka mihaino ny feon’ny Mpanompony?
  - type: text
    content: Na iza na iza mandeha amin’ny maizina
  - type: text
    content: Ka tsy manana fahazavana,
  - type: note
    content: 'Na: Na dia mandeha amin’ny maizina aza izy ka tsy misy famirapiratana.'
  - type: text
    content: Aoka izy hatoky ny anaran’i Jehovah
  - type: text
    content: Sy hiankina amin’Andriamaniny.
  '11':
  - type: text
    content: He! hianareo rehetra izay mampirehitra afo
  - type: text
    content: Sy mifehy kilalaon’afo manodidina anareo,
  - type: text
    content: Mandehana amin’ny lelafonareo
  - type: text
    content: Sy amin’ny zana-tsipìka misy afo, izay narehitrareo.
  - type: text
    content: 'Izao no hanjo anareo avy amin’ny tànako: Handry amin’ny fahoriana hianareo.'
  '2':
  - type: text
    content: Nahoana no tsy nisy olona, fony tonga Aho,
  - type: text
    content: Ary tsy misy namaly, fony niantso Aho?
  - type: text
    content: Moa fohy tokoa va ny tànako ka tsy mahavonjy,
  - type: text
    content: Ary moa tsy manan-kery ho entimanafaka va Aho?
  - type: text
    content: Indro, amin’ny teny mafy ataoko no andritako ny ranomasina
  - type: text
    content: Sy anaovako ny ony ho efitra;
  - type: text
    content: Ary maimbo ny hazandranony noho ny tsi-fisian’ny rano
  - type: text
    content: Sady matin-ketaheta.
  '3':
  - type: text
    content: Tafiako fahamaintisana ny lanitra,
  - type: text
    content: Ary lamba fisaonana no ataoko fisaronany.
  '4':
  - type: text
    content: Jehovah Tompo nanome Ahy ny lelan’ny efa mahay,
  - type: note
    content: Heb. efa nampianarina.
  - type: text
    content: Mba hahaizako manao teny hampahatanjaka izay reraka;
  - type: text
    content: Ampandrenesiny isa-maraina isa-maraina,
  - type: text
    content: Eny, ampandrenesiny ny sofiko hihaino tahaka ny efa mahay.
  - type: note
    content: Heb. efa nampianarina.
  '5':
  - type: text
    content: Jehovah Tompo nanokatra ny sofiko,
  - type: text
    content: Ary Izaho tsy naditra na nihemotra.
  '6':
  - type: text
    content: Ny lamosiko natolotro ho amin’ny mpikapoka,
  - type: text
    content: Ary ny takolako ho amin’izay manongobaoka;
  - type: text
    content: Ny tavako tsy nafeniko tamin’ny henatra sy ny rora.
  '7':
  - type: text
    content: Fa Jehovah Tompo no hamonjy Ahy,
  - type: text
    content: Ka dia tsy resin-kenatra Aho;
  - type: text
    content: Ary efa nohamafisiko ho tahaka ny afovato ny tavako,
  - type: text
    content: Ka fantatro fa tsy ho menatra Aho.
  '8':
  - type: text
    content: 'Efa akaiky Izay manamarina Ahy:'
  - type: text
    content: Iza no hiady amiko?
  - type: text
    content: Andeha hiara-mitsangana isika;
  - type: text
    content: Iza no manana ady amiko?
  - type: text
    content: Aoka izy ho avy amiko.
  '9':
  - type: text
    content: Indro, Jehovah Tompo no hamonjy ahy;
  - type: text
    content: Koa iza no hanameloka ahy?
  - type: text
    content: Indro, izy rehetra ho tonga tahaka ny lamba mangarahara,
  - type: text
    content: Ho lanin’ny kalalao izy.
