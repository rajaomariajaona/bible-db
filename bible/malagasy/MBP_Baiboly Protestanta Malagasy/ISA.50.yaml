document_id: ISA.50
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny nisaorana ny Isiraely, sy ny amin’ny Mpanompon’i Jehovah.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza izay taratasy fisaoram-bady nisaorako an-dreninareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza amin’izay manan-trosa amiko no nivarotako anareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa noho ny helokareo ihany no nivarotana anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary noho ny fahadisoanareo ihany no nisaorana an-dreninareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nahoana no tsy nisy olona, fony tonga Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy namaly, fony niantso Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa fohy tokoa va ny tànako ka tsy mahavonjy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary moa tsy manan-kery ho entimanafaka va Aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, amin’ny teny mafy ataoko no andritako ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy anaovako ny ony ho efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maimbo ny hazandranony noho ny tsi-fisian’ny rano
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady matin-ketaheta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tafiako fahamaintisana ny lanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary lamba fisaonana no ataoko fisaronany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jehovah Tompo nanome Ahy ny lelan’ny efa mahay,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efa nampianarina.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hahaizako manao teny hampahatanjaka izay reraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampandrenesiny isa-maraina isa-maraina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ampandrenesiny ny sofiko hihaino tahaka ny efa mahay.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efa nampianarina.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jehovah Tompo nanokatra ny sofiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izaho tsy naditra na nihemotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny lamosiko natolotro ho amin’ny mpikapoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny takolako ho amin’izay manongobaoka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tavako tsy nafeniko tamin’ny henatra sy ny rora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa Jehovah Tompo no hamonjy Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy resin-kenatra Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa nohamafisiko ho tahaka ny afovato ny tavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka fantatro fa tsy ho menatra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Efa akaiky Izay manamarina Ahy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no hiady amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha hiara-mitsangana isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no manana ady amiko?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izy ho avy amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Indro, Jehovah Tompo no hamonjy ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa iza no hanameloka ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, izy rehetra ho tonga tahaka ny lamba mangarahara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lanin’ny kalalao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza aminareo no matahotra an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mihaino ny feon’ny Mpanompony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na iza na iza mandeha amin’ny maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy manana fahazavana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Na dia mandeha amin’ny maizina aza izy ka tsy misy famirapiratana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izy hatoky ny anaran’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hiankina amin’Andriamaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He! hianareo rehetra izay mampirehitra afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mifehy kilalaon’afo manodidina anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandehana amin’ny lelafonareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny zana-tsipìka misy afo, izay narehitrareo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no hanjo anareo avy amin’ny tànako: Handry amin’ny fahoriana hianareo.'
