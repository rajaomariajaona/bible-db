document_id: 1CH.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahafatesan’i Saoly sy ny zanani-lahy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ny Filistina niady tamin’ny Isiraely, ary nandositra teo anoloan’ny Filistina ny lehilahy amin’ny Isiraely, ka niampatrampatra teny an-tendrombohitra Gilboa ny faty. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ny Filistina nanenjika fatratra an’i Saoly sy ny zanany, ka matin’ny Filistina Jonatana sy Abinadaba sy Malkisoa, zanakalahin’i Saoly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary mafy ny ady tamin’i Saoly, dia nifanehatra tamin’ny mpandefa tsipìka izy; ary raiki-tahotra izy noho ny mpandefa tsipìka. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka hoy Saoly tamin’ny mpitondra ny fiadiany: Tsoahy ny sabatrao, ka tsatohy miboroaka aho; fandrao avy irerỳ tsy mifora irerỳ ka hanao ahy ho fihomehezana. Nefa tsy nety ny mpitondra ny fiadiany, fa natahotra loatra izy. Dia nalain’i Saoly ny sabatra ka nianjerany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary rehefa hitan’ny mpitondra ny fiadiana fa maty Saoly, dia mba nianjera tamin’ny sabany koa izy ka maty. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ka dia niara-maty Saoly sy ny zanany telo lahy ary ny ankohonany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nony hitan’ny lehilahy rehetra amin’ny Isiraely teny amin’ny lohasaha fa nandositra ny olona, ary maty Saoly sy ny zanany, dia niala tamin’ny tanànany izy ka nandositra; ary dia tonga ny Filistina ka nonina tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony ampitso, raha tonga haka ny zavatra teo amin’ny faty ny Filistina, dia nahita an’i Saoly sy ny zanani-lahy niampatrampatra teo an-tendrombohitra Gilboa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nesoriny ny akanjony, ka nentiny ny lohany sy ny fiadiany, ary dia naniraka tany amin’ny tanin’ny Filistina manodidina izy hanambara izany zavatra mahafaly izany tamin’ny sampiny sy ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia napetrany tao an-tranon’ny andriamaniny ny fiadian’i Saoly, ary nohomboany teo amin’ny tempolin’i Dagona ny lohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony ren’ny mponina rehetra tao Jabesi-gileada izay rehetra nataon’ny Filistina tamin’i Saoly, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia niainga ny lehilahy mahery rehetra naka ny fatin’i Saoly sy ny fatin’ny zanany ka nitondra azy ho any Jabesy, ary nandevina ny taolany teo ambanin’ilay hazo terebinta tany Jabesy izy, ary dia nifady hanina hafitoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eny, maty Saoly noho ny nivadihany tamin’i Jehovah, dia noho ny tsy nitandremany ny tenin’i Jehovah sy noho ny nakany saina tamin’izay nanao azy ho tsindrian-javatra '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ary noho ny tsy nanontaniany tamin’i Jehovah; ka dia novonoiny izy, ary nafindrany ho an’i Davida, zanak’i Jese, ny fanjakana.
