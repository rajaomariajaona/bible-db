document_id: LUK.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny Galiliana sasany izay novonoina, sy ny fanoharana ny amin’ny aviavy tsy namoa.
  - type: text
    content: 'ARY tamin’izany andro izany nisy ny sasany teo izay nanambara tamin’i Jesosy ny nanjo ny Galiliana, izay naharoharon’i Pilato tamin’ny fanatiny ny rany. '
  '10':
  - type: text
    content: 'ARY nampianatra tao amin’ny synagoga anankiray Jesosy tamin’ny Sabata. '
  '11':
  - type: text
    content: 'Ary, indro, nisy vehivavy izay nanana fanahy mahafarofy valo ambin’ny folo taona, ary nanjoko izy ka tsy nahatraka akory. '
  '12':
  - type: text
    content: 'Ary rehefa nahita azy Jesosy, dia niantso azy ka nanao taminy hoe: Ravehivavy, afaka amin’ny rofinao hianao. '
  '13':
  - type: text
    content: Dia nametraka ny tànany taminy Izy; ary niaraka tamin’izay dia nitraka ravehivavy sady nankalaza an’Andriamanitra.
  '14':
  - type: text
    content: 'Ary ny mpanapaka ny synagoga dia tezitra, satria Jesosy nahasitrana tamin’ny Sabata, dia namaly ka nanao tamin’ny vahoaka hoe: Henemana no azo anaovan-draharaha; koa avia hositranina amin’izany, fa tsy amin’ny andro Sabata. '
  '15':
  - type: text
    content: 'Fa namaly azy ny Tompo ka nanao hoe: Ry mpihatsaravelatsihy, moa tsy samy mamaha ny ombiny na ny borikiny hiala amin’ny fihinanam-bilona amin’ny Sabata va hianareo ka mitondra azy hisotro rano? '
  '16':
  - type: text
    content: Koa ity vehivavy zanak’i Abrahama ity, izay efa nafatotr’i Satana izao valo ambin’ny folo taona izao, moa tsy tokony hovahana ho afaka amin’izany fatorana izany amin’ny andro Sabata va?
  '17':
  - type: text
    content: Ary raha nilaza izany Izy, dia nangaihay izay rehetra nanohitra Azy; fa ny vahoaka rehetra nifaly noho ny zavatra malaza rehetra nataony.
  - type: heading
    content: Ny fanoharana ny amin’ny voan-tsinapy sy ny masirasira.
  - type: heading
    content: Mat. 13.31-33; Mar. 4.30-32.
  '18':
  - type: text
    content: 'DIA hoy Jesosy: Tahaka ny inona ny fanjakan’Andriamanitra? ary inona no hanoharako azy? '
  '19':
  - type: text
    content: Tahaka ny voan-tsinapy izy, Izay nalain’olona ka namboleny tao an-tanimboly, ary naniry ka tonga hazo; ary ny voro-manidina nitoetra tao amin’ny rantsany.
  '2':
  - type: text
    content: 'Fa Jesosy namaly ka nanao taminy hoe: Ataonareo va fa ireny Galiliana ireny no mpanota mihoatra noho ny Galiliana rehetra, satria nozoin’izany zavatra izany izy? '
  '20':
  - type: text
    content: 'Ary hoy koa Jesosy: Inona no hanoharako ny fanjakan’Andriamanitra? '
  '21':
  - type: text
    content: Tahaka ny masirasira izy, izay nalain’ny vehivavy anankiray ka nataony
  - type: note
    content: Gr. nafeniny.
  - type: text
    content: ' tao amin’ny koba intelon’ny famarana, mandra-pahazon’ny masirasira azy rehetra.'
  - type: heading
    content: Ny nanontaniany an’i Jesosy na ho vitsy ny olona hovonjena, na tsia.
  '22':
  - type: text
    content: ARY Jesosy nandeha nitety ny tanàna sy ny vohitra nampianatra sady nandroso hankany Jerosalema.
  '23':
  - type: text
    content: 'Dia hoy ny anankiray taminy; Tompoko, moa vitsy va no hovonjena? Ary hoy Izy tamin’ny olona: '
  '24':
  - type: text
    content: 'Miseseha hiditra amin’ny varavarana èty hianareo; fa hoy Izaho aminareo: Maro no hitady hiditra, fa tsy ho afaka. '
  '25':
  - type: text
    content: 'Rehefa mitsangana ny tompon-trano ka manidy ny varavarana, ary hianareo mijanona eo ala-trano mandondòna ny varavarana ka manao hoe: Tompoko, vohay izahay, dia hamaly Izy ka hanao aminareo hoe: Tsy fantatro na avy taiza na avy taiza hianareo; '
  '26':
  - type: text
    content: 'ary amin’izay hianareo dia hanao hoe: Nihinana sy nisotro teo anatrehanao izahay, ary nampianatra teny an-dalambenay Hianao. '
  '27':
  - type: text
    content: 'Fa Izy hiteny hoe: Lazaiko aminareo: Tsy fantatro na avy taiza na avy taiza hianareo; mialà amiko, hianareo rehetra mpanao meloka. '
  '28':
  - type: text
    content: 'Any no hisy ny fitomaniana sy ny fikitroha-nify, raha mahita an’i Abrahama sy Isaka sy Jakoba ary ny mpaminany rehetra eo amin’ny fanjakan’Andriamanitra hianareo, fa ny tenanareo kosa dia voaroaka any ivelany. '
  '29':
  - type: text
    content: 'Ary ho tonga avy any atsinanana sy avy any andrefana ary avy any avaratra sy avy any atsimo ireny ka hipetraka hihinana eo amin’ny fanjakan’Andriamanitra. '
  '3':
  - type: text
    content: 'Tsia, hoy Izaho aminareo; fa raha tsy mibebaka hianareo, dia ho ringana tahaka azy koa hianareo rehetra. '
  '30':
  - type: text
    content: Ary, indro, misy ny aoriana ho aloha, ary misy ny aloha ho aoriana.
  - type: heading
    content: Ny nilazan’ny Fariseo tamin’i Jesosy fa Heroda ta-hamono Azy.
  '31':
  - type: text
    content: 'TAMIN’izany ora izany indrindra dia nisy Fariseo sasany nankeo amin’i Jesosy ka nanao taminy hoe: Mandehana Hianao, ka mialà eto; fa ta-hamono Anao Heroda. '
  '32':
  - type: text
    content: 'Fa hoy Izy taminy: Mandehana, lazao amin’izany amboahaolo'
  - type: note
    content: volpa.
  - type: text
    content: ' izany hoe: Indro, mamoaka demonia sy mahasitrana Aho anio sy ampitso, ary raha afaka ampitso dia hotanterahina ny amiko. '
  '33':
  - type: text
    content: Kanefa tsy maintsy mandeha ihany Aho anio sy ampitso sy raha afaka ampitso; fa ny mpaminany tsy azo vonoina, raha tsy any Jerosalema.
  '34':
  - type: text
    content: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay nirahina any aminao, impiry Aho no ta-hanangona ny zanakao tahaka ny fanòmban’ny akoho ny zanany ao ambanin’ny elany, fa tsy nety hianareo! '
  '35':
  - type: text
    content: 'Indro, avela ho anareo ny tranonareo! ary lazaiko aminareo: Tsy hahita Ahy intsony hianareo mandra-pilazanareo hoe: Isaorana anie Izay avy amin’ny anaran’i Jehovah. (Sal. 118.26).'
  '4':
  - type: text
    content: 'Ary ireny valo ambin’ny folo ireny, izay nianjeran’ny tilikambo tao Siloama ka maty, ataonareo va fa mpanota mihoatra noho ny olona rehetra izay monina ao Jerosalema ireny? '
  '5':
  - type: text
    content: Tsia, hoy Izaho aminareo; fa raha tsy mibebaka hianareo, dia ho ringana tahaka azy koa hianareo rehetra.
  '6':
  - type: text
    content: 'Ary nanao ity fanoharana ity Izy hoe: Nisy olona nanana aviavy nambolena teo an-tanimboalobony; dia nankeo izy nitady voa taminy, fa tsy nahita. '
  '7':
  - type: text
    content: 'Ka dia hoy izy tamin’ny mpamboatra ny tanimboaloboka; Indro, efa telo taona izay aho no tonga nitady voa tamin’ity aviavy ity, fa tsy nahita; kapao io; nahoana io no manimba ny tany? '
  '8':
  - type: text
    content: 'Fa ny mpamboatra namaly ka nanao taminy hoe: Tompoko, avelao ihany izy amin’ity taona ity mandra-pihadiko manodidina azy, ka hasiako zezika; '
  '9':
  - type: text
    content: angamba mbola hamoa izy; fa raha tsy izany, dia hokapainao ihany.
  - type: heading
    content: Ny nahasitranan’i Jesosy ilay vehivavy tsy nahatraka, sy ny nanaovany fanoharana ny amin’ny fanaovan-draharaha amin’ny Sabata.
