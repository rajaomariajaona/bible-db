document_id: JER.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana ny olona izay niankina foana tamin’ny tempoly sy ny fombam-pivavahana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitsangàna eo am-bavahadin’ny tranon’i Jehovah, ary torio eo izao teny izao, ka ataovy hoe: Mihainoa ny tenin’i Jehovah hianareo, ry Joda rehetra, izay miditra amin’ireto vavahady ireto mba hiankohoka eo anatrehan’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy tsara ny làlanareo sy ny ataonareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hamponeniko amin’ity tany ity hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza matoky ny teny lainga hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tempolin’i Jehovah, tempolin’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tempolin’i Jehovah ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha ataonareo tsara mihitsy ny làlanareo sy ny ataonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mitsara marina ny adin’olona amin’ny namany hianareo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary tsy mampahory ny vahiny sy ny kamboty sy ny mpitondratena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mandatsaka ra marina amin’ity tany ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy manaraka andriamani-kafa hahatonga loza aminareo,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia hamponeniko amin’ity tany ity ihany hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eto amin’ny tany nomeko ny razanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny ela ka ho mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He! hianareo matoky ny teny lainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy mahasoa tsinona izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hay! hangalatra sy hamono olona sy hijangajanga va hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianian-tsy to sy handoro ditin-kazo manitra ho an’i Bala
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hanaraka andriamani-kafa izay tsy fantatrareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nefa mbola avy miseho eto anatrehako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ity trano izay efa niantsoana ny anarako ity ihany hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao hoe: Efa voavonjy izahay–mba hanaovana ireto fahavetavetana rehetra ireto!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moa ataonareo ho zohy fieren’ny jiolahy va
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ity trano izay efa niantsoana ny anarako ity?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, ny tenako aza dia mahita izany, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa mandehana hianareo any amin’ny fitoerako izay tao Silo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay nasiako ny anarako tany am-boalohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka jereo izay nataoko taminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny haratsian’ny Isiraely oloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa ankehitriny, hoy Jehovah, satria nanao izany zavatra rehetra izany hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niteny taminareo Aho, eny, nifoha maraina koa ka niteny taminareo, nefa tsy nohenoinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niantso anareo Aho, nefa tsy novalianareo,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa dia ho toy ny nataoko tamin’i Silo
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hataoko amin’ny trano izay efa niantsoana ny anarako sady itokianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny fitoerana izay nomeko anareo sy ny razanareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary hesoriko hiala eto anatrehako hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny nanesorako ny rahalahinareo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny taranak’i Efraima rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa aza mivavaka ho an’ity firenena ity hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza manandratra fitarainana sy fivavahana ho azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mifona amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hihaino anao Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy hitanao va ny ataon’ireo any an-tanànan’ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy any an-dàlamben’i Jerosalema?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny zaza manangon-kitay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ray mandrehitra afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vehivavy mametafeta ny koba hatao mofo ho an’ny mpanjakavavin’ny lanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanidinana fanatitra aidina ho an’ny andriamani-kafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hampahasosotra Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moa Izaho va no ampahasosorin’ireo, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy ny tenany ihany mba ho fangaihainy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, ny fahatezerako sy ny fahavinirako haidina amin’ity tany ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’ny olona sy ny biby fiompy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny hazo any an-tsaha
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vokatry ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hirehitra izany ka tsy hovonoina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny fanatitra dorana ho naman’ny fanatitrareo hafa alatsa-dra, ka mihinàna hena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa tsy ny amin’ny fanatitra dorana sy ny fanatitra hafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nitenenako tamin’ny razanareo na nandidiako azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Egypta;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa izao kosa no nandidiako azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henoy ny feoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho Andriamanitrareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianareo ho oloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka handeha amin’ny làlana rehetra nandidiako anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hahitanareo soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kanjo tsy nihaino izy na nanongilana ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nandeha tamin’ny fisainany sy ny ditry ny fo ratsiny ihany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia niamboho, fa tsy mba nanatrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Hatramin’ny andro nivoahan’ny razanareo avy tany amin’ny tany Egypta ka ambaraka andro-any
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nirahiko ho any aminareo ihany ny mpaminany mpanompoko rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nifoha maraina koa isan-andro Aho ka naniraka azy mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nefa tsy nihaino Ahy izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy nanongilana ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nanamafy ny hatony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanao ratsy mihoatra noho ny razany aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary na dia holazainao aminy aza ireo teny rehetra ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hihaino anao izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia antsoinao aza izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hamaly anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa lazao aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ity no firenena tsy mihaino ny feon’i Jehovah Andriamaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy mino anatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Very ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa afaka tamin’ny vavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hetezo ny volonao, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ry Jerosalema,
  - type: text
    text: ' ka ario,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manaova hira fahalahelovana any an-tendrombohitra mangadihady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria lavin’i Jehovah sy afoiny ny taranaka mahatezitra Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa manao izay ratsy eo imasoko ny taranak’i Joda, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mametraka ny fahavetavetany ao amin’ny trano izay efa niantsoana ny anarako izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba handoto azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary izy nanorina ireo fitoerana avo any Tofeta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay ao amin’ny lohasahan’ny taranak’i Hinoma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handoroany ny zanani-lahy sy ny zanani-vavy amin’ny afo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa zavatra tsy mba nandidiako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na tao an-tsaiko akory aza izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Koa, indro, avy ny andro, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy hanaovana azy intsony hoe Tofeta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na Lohasahan’ny taranak’i Hinoma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Lohasaha Famonoana kosa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any Tofeta aza no handevenana noho ny hateren’ny tany
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary ny fatin’ity firenena ity dia ho fihinan’ny voro-manidina sy ny bibi-dia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hisy hanaitaitra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia hatsahatro any an-tanànan’ny Joda sy eny an-dàlamben’i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny feo mifaly sy ny feo miravoravo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny feon’ny mpampakatra sy ny feon’ny ampakarina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho lao ny tany.
