document_id: JER.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana ny olona izay niankina foana tamin’ny tempoly sy ny fombam-pivavahana.
  - type: text
    content: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah: '
  '10':
  - type: text
    content: Nefa mbola avy miseho eto anatrehako
  - type: text
    content: Amin’ity trano izay efa niantsoana ny anarako ity ihany hianareo
  - type: text
    content: 'Ka manao hoe: Efa voavonjy izahay–mba hanaovana ireto fahavetavetana rehetra ireto!'
  '11':
  - type: text
    content: Moa ataonareo ho zohy fieren’ny jiolahy va
  - type: text
    content: Ity trano izay efa niantsoana ny anarako ity?
  - type: text
    content: Indro, ny tenako aza dia mahita izany, hoy Jehovah.
  '12':
  - type: text
    content: Fa mandehana hianareo any amin’ny fitoerako izay tao Silo,
  - type: text
    content: Dia ilay nasiako ny anarako tany am-boalohany,
  - type: text
    content: Ka jereo izay nataoko taminy
  - type: text
    content: Noho ny haratsian’ny Isiraely oloko.
  '13':
  - type: text
    content: Koa ankehitriny, hoy Jehovah, satria nanao izany zavatra rehetra izany hianareo,
  - type: text
    content: Ary niteny taminareo Aho, eny, nifoha maraina koa ka niteny taminareo, nefa tsy nohenoinareo,
  - type: text
    content: Ary niantso anareo Aho, nefa tsy novalianareo,–
  '14':
  - type: text
    content: Koa dia ho toy ny nataoko tamin’i Silo
  - type: text
    content: No hataoko amin’ny trano izay efa niantsoana ny anarako sady itokianareo,
  - type: text
    content: Sy amin’ny fitoerana izay nomeko anareo sy ny razanareo;
  '15':
  - type: text
    content: Ary hesoriko hiala eto anatrehako hianareo
  - type: text
    content: Toy ny nanesorako ny rahalahinareo rehetra,
  - type: text
    content: Dia ny taranak’i Efraima rehetra.
  '16':
  - type: text
    content: Koa aza mivavaka ho an’ity firenena ity hianao,
  - type: text
    content: Ary aza manandratra fitarainana sy fivavahana ho azy
  - type: text
    content: Na mifona amiko;
  - type: text
    content: Fa tsy hihaino anao Aho.
  '17':
  - type: text
    content: Tsy hitanao va ny ataon’ireo any an-tanànan’ny Joda
  - type: text
    content: Sy any an-dàlamben’i Jerosalema?
  '18':
  - type: text
    content: Ny zaza manangon-kitay,
  - type: text
    content: Ny ray mandrehitra afo,
  - type: text
    content: Ary ny vehivavy mametafeta ny koba hatao mofo ho an’ny mpanjakavavin’ny lanitra
  - type: text
    content: Sy hanidinana fanatitra aidina ho an’ny andriamani-kafa
  - type: text
    content: Mba hampahasosotra Ahy.
  '19':
  - type: text
    content: Moa Izaho va no ampahasosorin’ireo, hoy Jehovah,
  - type: text
    content: Fa tsy ny tenany ihany mba ho fangaihainy?
  '2':
  - type: text
    content: 'Mitsangàna eo am-bavahadin’ny tranon’i Jehovah, ary torio eo izao teny izao, ka ataovy hoe: Mihainoa ny tenin’i Jehovah hianareo, ry Joda rehetra, izay miditra amin’ireto vavahady ireto mba hiankohoka eo anatrehan’i Jehovah. '
  '20':
  - type: text
    content: 'Koa izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, ny fahatezerako sy ny fahavinirako haidina amin’ity tany ity,
  - type: text
    content: Dia amin’ny olona sy ny biby fiompy
  - type: text
    content: Sy ny hazo any an-tsaha
  - type: text
    content: Ary ny vokatry ny tany;
  - type: text
    content: Dia hirehitra izany ka tsy hovonoina.
  '21':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: text
    content: Aoka ny fanatitra dorana ho naman’ny fanatitrareo hafa alatsa-dra, ka mihinàna hena.
  '22':
  - type: text
    content: Fa tsy ny amin’ny fanatitra dorana sy ny fanatitra hafa
  - type: text
    content: No nitenenako tamin’ny razanareo na nandidiako azy
  - type: text
    content: Tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Egypta;
  '23':
  - type: text
    content: 'Fa izao kosa no nandidiako azy:'
  - type: text
    content: Henoy ny feoko,
  - type: text
    content: Dia ho Andriamanitrareo Aho,
  - type: text
    content: Ary hianareo ho oloko
  - type: text
    content: Ka handeha amin’ny làlana rehetra nandidiako anareo,
  - type: text
    content: Mba hahitanareo soa.
  '24':
  - type: text
    content: Kanjo tsy nihaino izy na nanongilana ny sofiny,
  - type: text
    content: Fa nandeha tamin’ny fisainany sy ny ditry ny fo ratsiny ihany izy
  - type: text
    content: Dia niamboho, fa tsy mba nanatrika.
  '25':
  - type: text
    content: Hatramin’ny andro nivoahan’ny razanareo avy tany amin’ny tany Egypta ka ambaraka andro-any
  - type: text
    content: Dia nirahiko ho any aminareo ihany ny mpaminany mpanompoko rehetra,
  - type: text
    content: Eny, nifoha maraina koa isan-andro Aho ka naniraka azy mandrakariva.
  '26':
  - type: text
    content: Nefa tsy nihaino Ahy izy ireo
  - type: text
    content: Sady tsy nanongilana ny sofiny,
  - type: text
    content: Fa nanamafy ny hatony
  - type: text
    content: Ka nanao ratsy mihoatra noho ny razany aza.
  '27':
  - type: text
    content: Ary na dia holazainao aminy aza ireo teny rehetra ireo,
  - type: text
    content: Dia tsy hihaino anao izy;
  - type: text
    content: Ary na dia antsoinao aza izy,
  - type: text
    content: Dia tsy hamaly anao.
  '28':
  - type: text
    content: 'Koa lazao aminy hoe:'
  - type: text
    content: Ity no firenena tsy mihaino ny feon’i Jehovah Andriamaniny
  - type: text
    content: Sady tsy mino anatra;
  - type: text
    content: Very ny fahamarinana,
  - type: text
    content: Fa afaka tamin’ny vavany.
  '29':
  - type: text
    content: 'Hetezo ny volonao, '
  - type: text
    content: ry Jerosalema,
  - type: text
    content: ' ka ario,'
  - type: text
    content: Ary manaova hira fahalahelovana any an-tendrombohitra mangadihady,
  - type: text
    content: Satria lavin’i Jehovah sy afoiny ny taranaka mahatezitra Azy.
  '3':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: text
    content: Ataovy tsara ny làlanareo sy ny ataonareo
  - type: text
    content: Dia hamponeniko amin’ity tany ity hianareo.
  '30':
  - type: text
    content: Fa manao izay ratsy eo imasoko ny taranak’i Joda, hoy Jehovah,
  - type: text
    content: Mametraka ny fahavetavetany ao amin’ny trano izay efa niantsoana ny anarako izy
  - type: text
    content: Mba handoto azy.
  '31':
  - type: text
    content: Ary izy nanorina ireo fitoerana avo any Tofeta,
  - type: text
    content: Izay ao amin’ny lohasahan’ny taranak’i Hinoma,
  - type: text
    content: Handoroany ny zanani-lahy sy ny zanani-vavy amin’ny afo;
  - type: text
    content: Nefa zavatra tsy mba nandidiako
  - type: text
    content: Na tao an-tsaiko akory aza izany.
  '32':
  - type: text
    content: Koa, indro, avy ny andro, hoy Jehovah,
  - type: text
    content: Izay tsy hanaovana azy intsony hoe Tofeta,
  - type: text
    content: Na Lohasahan’ny taranak’i Hinoma,
  - type: text
    content: Fa Lohasaha Famonoana kosa;
  - type: text
    content: Ary any Tofeta aza no handevenana noho ny hateren’ny tany
  '33':
  - type: text
    content: Ary ny fatin’ity firenena ity dia ho fihinan’ny voro-manidina sy ny bibi-dia,
  - type: text
    content: Ka tsy hisy hanaitaitra azy.
  '34':
  - type: text
    content: Dia hatsahatro any an-tanànan’ny Joda sy eny an-dàlamben’i Jerosalema
  - type: text
    content: Ny feo mifaly sy ny feo miravoravo,
  - type: text
    content: Dia ny feon’ny mpampakatra sy ny feon’ny ampakarina;
  - type: text
    content: Fa ho lao ny tany.
  '4':
  - type: text
    content: 'Aza matoky ny teny lainga hoe:'
  - type: text
    content: Tempolin’i Jehovah, tempolin’i Jehovah,
  - type: text
    content: Tempolin’i Jehovah ity.
  '5':
  - type: text
    content: Fa raha ataonareo tsara mihitsy ny làlanareo sy ny ataonareo,
  - type: text
    content: Ka mitsara marina ny adin’olona amin’ny namany hianareo,
  '6':
  - type: text
    content: Ary tsy mampahory ny vahiny sy ny kamboty sy ny mpitondratena,
  - type: text
    content: Na mandatsaka ra marina amin’ity tany ity,
  - type: text
    content: Sady tsy manaraka andriamani-kafa hahatonga loza aminareo,–
  '7':
  - type: text
    content: Dia hamponeniko amin’ity tany ity ihany hianareo,
  - type: text
    content: Dia eto amin’ny tany nomeko ny razanareo,
  - type: text
    content: Hatramin’ny ela ka ho mandrakizay.
  '8':
  - type: text
    content: He! hianareo matoky ny teny lainga,
  - type: text
    content: Nefa tsy mahasoa tsinona izany.
  '9':
  - type: text
    content: Hay! hangalatra sy hamono olona sy hijangajanga va hianareo
  - type: text
    content: Ary hianian-tsy to sy handoro ditin-kazo manitra ho an’i Bala
  - type: text
    content: Sady hanaraka andriamani-kafa izay tsy fantatrareo?
