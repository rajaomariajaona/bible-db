document_id: 1CH.22
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy Davida: Eto no ho tranon’i Jehovah Andriamanitra, ary eto no ho alitara fandoroana ny fanatitra dorana ho an’ny Isiraely.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namorian’i Davida ny zavatra ho enti-manao ny tempoly, sy ny hafatra nataony ny amin’ny hanaovana azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ARY nasain’i Davida novorina ny olona hafa firenena izay tany amin’ny tanin’ny Isiraely, ka nanendreny tambato hipai-bato hanaovana ny tranon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Davida nahavonona vy betsaka hatao hombon’ny lela-vavahady sy ny fikambanany, ary varahina betsaka tsy hita lanja '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: sy hazo sedera tsy hita isa; fa ny mponina tany Sidona sy Tyro nitondra hazo sedera betsaka ho any amin’i Davida.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy Davida: Solomona zanako mbola zaza sady tanora fanahy, ary ny trano hatao ho an’i Jehovah dia tsy maintsy ho lehibe indrindra, mba hiely any amin’ny tany rehetra ny lazany sy ny voninahiny, koa hovononiko rahateo ny zavatra ho enti-manao azy. Ka dia nahavonona betsaka Davida, raha mbola velona izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary niantso an’i Solomona zanany izy ka nandidy azy hanao trano ho an’i Jehovah, Andriamanitry ny Isiraely, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary nanao taminy hoe: Anaka, efa mby tato am-poko ny hanao trano ho an’ny anaran’i Jehovah Andriamanitro; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: saingy nisy tenin’i Jehovah tonga tamiko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny amiko.
    marker-yv: yv-n
  - type: text
    text: ' nanao hoe: Be ny ra efa nalatsakao, ary ady lehibe no efa nataonao; koa tsy mahazo manao trano ho an’ny anarako hianao, satria be ny ra efa nalatsakao tamin’ny tany teo imasoko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa, indro, hianao hiteraka zazalahy, izay ho lehilahy miadana, ary hampiadaniko tsy hisy hahazo azy ny fahavalony rehetra manodidina; koa ny anarany dia hatao hoe Solomona;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solomona = Miadana.
    marker-yv: yv-n
  - type: text
    text: ' ary hampiadaniko sy hampandriko fahizay ny Isiraely amin’ny androny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izy no hanao trano ho an’ny anarako; ary izy ho zanako, ary Izaho ho rainy, ary Izaho hampitoetra ny seza fiandrianan’ny fanjakany amin’ny Isiraely mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa ankehitriny, anaka, ho aminao anie Jehovah, ka hambinina anie hianao, fa ataovy ny tranon’i Jehovah Andriamanitrao araka izay nilazany anao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary homen’i Jehovah saina sy fahendrena anie hianao ka hatsangany ho mpanapaka ny Isiraely, mba hitandremanao ny làlan’i Jehovah Andriamanitrao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary amin’izany dia hambinina hianao, raha mitandrina hankatò ny lalàna sy ny fitsipika izay nandidian’i Jehovah an’i Mosesy ho an’ny Isiraely; mahereza sy matanjaha; aza matahotra na mivadi-po.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary, he! fa na dia be fahoriana aza aho, dia nahavory talenta volamena iray hetsy sy talenta volafotsy iray tapitrisa ary varahina sy vy betsaka tsy hita lanja ho enti-manao ny tranon’i Jehovah; ary efa nahavonona hazo sy vato koa aho; ka dia ampionao kosa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary koa, efa manana mpiasa betsaka hianao, dia mpikapa hazo sy tambato sy mpandrafitra ary olona mahay ny asa samy hafa rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny volamena sy ny volafotsy ary ny varahina sy ny vy dia tsy hita isa. Koa mitsangàna hianao, ka manaova, ary homba anao anie Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Davida nandidy ny lehibe rehetra tamin’ny Isiraely hanampy an’i Solomona zanany hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy momba anareo va Jehovah Andriamanitrareo ka efa nampiadana anareo amin’ny manodidina? Fa efa natolony teo an-tànako ny mponina amin’ny tany; ary ny tany efa resy teo anoloan’i Jehovah sy teo anoloan’ny olony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa ankehitriny ampitadiavo an’i Jehovah Andriamanitrareo ny fonareo sy ny fanahinareo, ka mitsangàna, ary manaova ny fitoerana masina ho an’i Jehovah Andriamanitra, hampidirana ny fiaran’ny faneken’i Jehovah sy ny fanaka masin’Andriamanitra ho ao amin’ny trano izay hatao ho an’ny anaran’i Jehovah.
