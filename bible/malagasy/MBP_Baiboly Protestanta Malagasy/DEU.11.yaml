document_id: DEU.11,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tiava an’i Jehovah Andriamanitrao, ka tandremo mandrakariva izay asainy hotandremana, dia ny lalàny sy ny fitsipiny ary ny didiny. '
  '10':
  - type: text
    content: 'Fa ny tany izay efa hidiranao holovana dia tsy mba tahaka ny tany Egypta, izay nivoahanareo, izay namafazanao ny voan-javatrao sy nandeman’ny tongotrao rano azy tahaka ny fambolen-anana. '
  '11':
  - type: text
    content: 'Fa ny tany izay efa halehanareo holovana dia tany be tendrombohitra sy lohasaha sady mifoka rano avy amin’ny ranonoran-danitra, '
  '12':
  - type: text
    content: dia tany Izay tandreman’i Jehovah Andriamanitrao; ny mason’i Jehovah Andriamanitrao mitsinjo azy mandrakariva hatramin’ny fiandohan’ny taona ka hatramin’ny fiafarany.
  '13':
  - type: text
    content: 'Ary raha hihaino tsara ny didiko izay andidiako anareo anio hianareo ka ho tia an’i Jehovah Andriamanitrareo sy hanompo Azy amin’ny fonareo rehetra sy ny fanahinareo rehetra, '
  '14':
  - type: text
    content: 'dia halatsako eo amin’ny taninareo ny ranonorana amin’ny fotoany, dia ny loha-orana sy ny fara-orana, mba hanangonanao ny varinao sy ny ranomboalobokao ary ny diloilonao; '
  '15':
  - type: text
    content: 'ary hampaniriko ahitra ny sahanao ho an’ny blby fiompinao, ary hihinan-kanina hianao ka ho voky. '
  '16':
  - type: text
    content: 'Kanefa mitandrema hianareo, fandrao ho voafitaka ny fonareo, ka hivily hanompo andriamani-kafa sy hiankohoka eo anatrehany hianareo; '
  '17':
  - type: text
    content: ary dia hirehitra aminareo ny fahatezeran’i Jehovah, dia hanampina ny lanitra Izy, ka tsy hisy ranonorana, ary tsy hahavokatra ny tany; dia ho lany ringana faingana hianareo tsy ho eo amin’ny tany soa izay omen’i Jehovah anareo.
  '18':
  - type: text
    content: 'Koa alatsaho ao amin’ny fonareo sy ao amin’ny fanahinareo izao teniko izao, ary fehezo ho famantarana eo amin’ny tànanareo izy, ka aoka ho fehy fampahatsiarovana eo ambonin’ny handrinareo; '
  - type: note
    content: Heb. eo ambonon’ny elanela-masonareo.
  '19':
  - type: text
    content: 'ary ampianaro ny zanakareo izany, ka resaho, na mipetraka ao an-tranonao hianao, na mandeha eny an-dàlana, na mandry, na mifoha; '
  '2':
  - type: text
    content: 'Ary aoka ho fantatrao anio, fa '
  - type: text
    content: izaho
  - type: text
    content: ' tsy '
  - type: text
    content: miteny
  - type: text
    content: ' amin’ny zanakareo izay tsy nahalala na nahita ny famaizan’i Jehovah Andriamanitrareo sy ny fahalehibeazany sy ny tànany mahery sy ny sandriny nahinjitra '
  '20':
  - type: text
    content: 'ary soraty eo amin’ny tolam-baravaran’ny tranonao sy eo amin’ny vavahadinao izy; '
  '21':
  - type: text
    content: mba ho maro ny andronareo sy ny andron’ny taranakareo eo amin’ny tany izay nianianan’i Jehovah tamin’ny razanareo homena azy, toy ny faharetan’ny lanitra ambonin’ny tany.
  '22':
  - type: text
    content: 'Fa raha hitandrina tsara izao lalàna rehetra izao izay andidiako anareo hianareo ka manaraka azy ary ho tia an’i Jehovah Andriamanitrareo sy handeha eo amin’ny làlany rehetra sy hifikitra aminy, '
  '23':
  - type: text
    content: 'dia horoahin’i Jehovah eo anoloanareo ireo firenena rehetra ireo, ary hianareo haharesy firenena maro, izay lehibe sy mahery noho hianareo. '
  '24':
  - type: text
    content: 'Ny tany rehetra izay hodiavin’ny faladian’ny tongotrareo dia ho anareo: hatramin’ny efitra sy Libanona ary hatramin’ny ony Eofrata ka hatramin’ny ranomasina andrefana no ho fari-taninareo. '
  '25':
  - type: text
    content: Tsy hisy olona hahajanona eo anoloanareo, fa hataon’i Jehovah Andriamanitrareo ho azon’ny tahotra sy horohoro anareo ny tany rehetra izay hodiavinareo, araka izay nolazainy taminareo.
  '26':
  - type: text
    content: 'Indro, izaho mametraka fitahiana sy ozona eo anoloanareo anio: '
  '27':
  - type: text
    content: 'fitahiana, raha hohenoinareo ny didin’i Jehovah Andriamanitrareo, izay andidiako anareo anio; '
  '28':
  - type: text
    content: ary ozona kosa, raha tsy hohenoinareo ny didin’i Jehovah Andriamanitrareo, fa hivily hiala amin’ny làlana izay andidiako anareo anio mba haleha hianareo ka hanaraka andriamani-kafa izay tsy fantatrareo.
  '29':
  - type: text
    content: 'Ary rehefa entin’i Jehovah Andriamanitrao hianao ka tafiditra any amin’ny tany izay alehanao holovana, dia ny fitahiana no hotononinao eo an-tendrombohitra Gerizima, ary ny fanozonana kosa eo an-tendrombohitra Ebala. '
  '3':
  - type: text
    content: 'sy ny famantarany sy ny asany, izay nataony tany Egypta tamin’i Farao, mpanjakan’i Egypta, sy ny taniny rehetra, '
  '30':
  - type: text
    content: Tsy any an-dafin’i Jordana va izy roa, any ankoatry ny làlana andrefana, amin’ny tanin’ny Kananita, izay monina eo amin’ny tani-hay
  - type: note
    content: Heb. Arabà.
  - type: text
    content: tandrifin’i Gilgaly, eo anilan’ny hazo terebintan’i More?
  '31':
  - type: text
    content: 'Fa hianareo efa handeha hita an’i Jordana ka hiditra sy handova ny tany izay omen’i Jehovah Andriamanitrareo anareo, ary handova azy hianareo ka honina eo; '
  '32':
  - type: text
    content: koa tandremo mba harahinareo ny didy rehetra sy ny fitsipika izay ataoko eo anoloanareo anio.
  '4':
  - type: text
    content: 'sy izay nataony tamin’ny miaramilan’ny Egyptiana sy ny soavaliny ary ny kalesiny, dia ny nanasaforany azy tao amin’ny Ranomasina Mena, raha nanenjika anareo izy, dia voaringan’i Jehovah mandraka andro-any, '
  '5':
  - type: text
    content: 'ary izay nataony taminareo tany an-efitra, hatramin’ny nahatongavanareo teto amin’ity tany ity, '
  '6':
  - type: text
    content: 'ary izay nataony tamin’i Datana sy Abìrama, zanak’i Eliaba, zanak’i Robena, teo amin’ ny Isiraely rehetra, dia ilay nisokafan’ny tany sy nitelemany azy mbamin’ny ankohonany sy ny lainy ary ny zava-manan-aina izay nomba azy; '
  '7':
  - type: text
    content: fa ny masonareo efa nahita ny asa lehibe rehetra izay nataon’i Jehovah.
  '8':
  - type: text
    content: 'Koa tandremo ny lalàna rehetra izay andidiako anareo anio, mba hahery hianareo, dia hiditra handova ny tany izay efa halehanareo holovana; '
  '9':
  - type: text
    content: ary, mba ho maro andro hianareo amin’ny tany izay nianianan’i Jehovah tamin’ny razanareo homena azy sy ny taranany, dia tany izay tondra-dronono sy tantely.
