document_id: DEU.11
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tiava an’i Jehovah Andriamanitrao, ka tandremo mandrakariva izay asainy hotandremana, dia ny lalàny sy ny fitsipiny ary ny didiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary aoka ho fantatrao anio, fa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izaho
  - type: text
    text: ' tsy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: miteny
  - type: text
    text: ' amin’ny zanakareo izay tsy nahalala na nahita ny famaizan’i Jehovah Andriamanitrareo sy ny fahalehibeazany sy ny tànany mahery sy ny sandriny nahinjitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sy ny famantarany sy ny asany, izay nataony tany Egypta tamin’i Farao, mpanjakan’i Egypta, sy ny taniny rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sy izay nataony tamin’ny miaramilan’ny Egyptiana sy ny soavaliny ary ny kalesiny, dia ny nanasaforany azy tao amin’ny Ranomasina Mena, raha nanenjika anareo izy, dia voaringan’i Jehovah mandraka andro-any, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary izay nataony taminareo tany an-efitra, hatramin’ny nahatongavanareo teto amin’ity tany ity, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary izay nataony tamin’i Datana sy Abìrama, zanak’i Eliaba, zanak’i Robena, teo amin’ ny Isiraely rehetra, dia ilay nisokafan’ny tany sy nitelemany azy mbamin’ny ankohonany sy ny lainy ary ny zava-manan-aina izay nomba azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: fa ny masonareo efa nahita ny asa lehibe rehetra izay nataon’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa tandremo ny lalàna rehetra izay andidiako anareo anio, mba hahery hianareo, dia hiditra handova ny tany izay efa halehanareo holovana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary, mba ho maro andro hianareo amin’ny tany izay nianianan’i Jehovah tamin’ny razanareo homena azy sy ny taranany, dia tany izay tondra-dronono sy tantely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny tany izay efa hidiranao holovana dia tsy mba tahaka ny tany Egypta, izay nivoahanareo, izay namafazanao ny voan-javatrao sy nandeman’ny tongotrao rano azy tahaka ny fambolen-anana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny tany izay efa halehanareo holovana dia tany be tendrombohitra sy lohasaha sady mifoka rano avy amin’ny ranonoran-danitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia tany Izay tandreman’i Jehovah Andriamanitrao; ny mason’i Jehovah Andriamanitrao mitsinjo azy mandrakariva hatramin’ny fiandohan’ny taona ka hatramin’ny fiafarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha hihaino tsara ny didiko izay andidiako anareo anio hianareo ka ho tia an’i Jehovah Andriamanitrareo sy hanompo Azy amin’ny fonareo rehetra sy ny fanahinareo rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia halatsako eo amin’ny taninareo ny ranonorana amin’ny fotoany, dia ny loha-orana sy ny fara-orana, mba hanangonanao ny varinao sy ny ranomboalobokao ary ny diloilonao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary hampaniriko ahitra ny sahanao ho an’ny blby fiompinao, ary hihinan-kanina hianao ka ho voky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa mitandrema hianareo, fandrao ho voafitaka ny fonareo, ka hivily hanompo andriamani-kafa sy hiankohoka eo anatrehany hianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary dia hirehitra aminareo ny fahatezeran’i Jehovah, dia hanampina ny lanitra Izy, ka tsy hisy ranonorana, ary tsy hahavokatra ny tany; dia ho lany ringana faingana hianareo tsy ho eo amin’ny tany soa izay omen’i Jehovah anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa alatsaho ao amin’ny fonareo sy ao amin’ny fanahinareo izao teniko izao, ary fehezo ho famantarana eo amin’ny tànanareo izy, ka aoka ho fehy fampahatsiarovana eo ambonin’ny handrinareo; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eo ambonon’ny elanela-masonareo.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary ampianaro ny zanakareo izany, ka resaho, na mipetraka ao an-tranonao hianao, na mandeha eny an-dàlana, na mandry, na mifoha; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary soraty eo amin’ny tolam-baravaran’ny tranonao sy eo amin’ny vavahadinao izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: mba ho maro ny andronareo sy ny andron’ny taranakareo eo amin’ny tany izay nianianan’i Jehovah tamin’ny razanareo homena azy, toy ny faharetan’ny lanitra ambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha hitandrina tsara izao lalàna rehetra izao izay andidiako anareo hianareo ka manaraka azy ary ho tia an’i Jehovah Andriamanitrareo sy handeha eo amin’ny làlany rehetra sy hifikitra aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia horoahin’i Jehovah eo anoloanareo ireo firenena rehetra ireo, ary hianareo haharesy firenena maro, izay lehibe sy mahery noho hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny tany rehetra izay hodiavin’ny faladian’ny tongotrareo dia ho anareo: hatramin’ny efitra sy Libanona ary hatramin’ny ony Eofrata ka hatramin’ny ranomasina andrefana no ho fari-taninareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy hisy olona hahajanona eo anoloanareo, fa hataon’i Jehovah Andriamanitrareo ho azon’ny tahotra sy horohoro anareo ny tany rehetra izay hodiavinareo, araka izay nolazainy taminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Indro, izaho mametraka fitahiana sy ozona eo anoloanareo anio: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fitahiana, raha hohenoinareo ny didin’i Jehovah Andriamanitrareo, izay andidiako anareo anio; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ary ozona kosa, raha tsy hohenoinareo ny didin’i Jehovah Andriamanitrareo, fa hivily hiala amin’ny làlana izay andidiako anareo anio mba haleha hianareo ka hanaraka andriamani-kafa izay tsy fantatrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary rehefa entin’i Jehovah Andriamanitrao hianao ka tafiditra any amin’ny tany izay alehanao holovana, dia ny fitahiana no hotononinao eo an-tendrombohitra Gerizima, ary ny fanozonana kosa eo an-tendrombohitra Ebala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy any an-dafin’i Jordana va izy roa, any ankoatry ny làlana andrefana, amin’ny tanin’ny Kananita, izay monina eo amin’ny tani-hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: tandrifin’i Gilgaly, eo anilan’ny hazo terebintan’i More?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa hianareo efa handeha hita an’i Jordana ka hiditra sy handova ny tany izay omen’i Jehovah Andriamanitrareo anareo, ary handova azy hianareo ka honina eo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: koa tandremo mba harahinareo ny didy rehetra sy ny fitsipika izay ataoko eo anoloanareo anio.
