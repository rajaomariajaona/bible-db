document_id: EZK.27
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny harena amam-boninahitra nananan’i Tyro, sy fitomaniana noho ny manjo azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hianao, ry zanak’olona, manaova hira fahalahelovana ny amin’i Tyro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka ataovy aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He, ry ilay monina amin’ny vava-ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpandranto ho an’ny firenena ho any ny moron-dranomasina maro samy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He, ry Tyro, hianao efa nanao hoe: Izaho dia tena tsara tarehy!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ao amin’ny ranomasina ny taninao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa tanteraky ny mpandrafitra anao ny hatsaran-tarehinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hazo kypreso avy any Senira no nanaovany ny lampihazonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sedera avy any Libanona no nalainy hatao andrin-tsambonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oka avy any Basana no nanaovany ny fivoinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hazo bokso avy any amin’ny moron-dranomasin’i Kitima no nataony fipetrahan’ny mpivoinao sady nasiany parike ivory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rongony madinika samy hafa soratra avy any Egypta no natao lainao mba ho faneva ho anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lamba manga sy volomparasy avy any amin’ny moron-dranomasin’i Elisa no eloelonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny mponina any Sidona sy Arvada no mpivoinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny olon-kendrinao, ry Tyro, no tao aminao, ka ireo no mpitondra sambonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny zokiolon’i Gebala sy izay hendry tany no tao aminao ho mpanentsin-tsambonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sambo rehetra teny amin’ny ranomasina mbamin’ny matilony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tonga tao aminao hanakalo ny rantonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny avy any Persia sy ny Lydiana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Loda.
    marker-yv: yv-n
  - type: text
    text: ' ary ny Libyana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pota.
    marker-yv: yv-n
  - type: text
    text: ' dia isan’ny miaramila mpiadinao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanantona ampinga sy fiarovan-doha teny aminao ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nahatsara tarehy anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny terak’i Arvada sy ny miaramilanao no teny ambonin’ny màndanao manodidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary lehilahy mahery no tao amin’ny tilikambonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ampingany dia nahantony teny amin’ny màndanao manodidina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo no nahatanteraka ny hatsaran-tarehinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tarsisy no mpandranto nankany aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny haben’ny harena samy hafa rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Volafotsy sy vy sy vifotsy ary firaka no nentiny natakalo ny entanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Javana sy Tobala ary Maseka no mpandranto nankany aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka olona sy fanaka varahina no natakalony ny varotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny terak’i Togarma
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitondra soavaly sy soavaly fitaingina ary ampondra natakalo ny entanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny terak’i Dedana no mpandranto nankany aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny avy amin’ny moron-dranomasina maro no tonga hivarotra tao aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nitondra ivory
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vangy ivory.
    marker-yv: yv-n
  - type: text
    text: ' sy hazomainty natakalo ny entanao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Syria no mpandranto nankany aminao noho ny habetsahan’ny tao-zavatrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka karbonkolo sy lamba volomparasy sy tenona samy hafa soratra sy rongony fotsy madinika sy voahangy ary robina
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nentiny natakalo ny entanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Joda sy ny tanin’ny Isiraely no mpandranto nankany aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka vary tritika avy tany Minita sy zava-mamy sy tantely sy diloilo ary balsama
- type: usfm
  marker: q1
  children:
  - type: text
    text: No natakalony ny varotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Damaskosy no mpandranto nankany aminao noho ny habetsahan’ny tao-zavatrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny haben’ny harenao rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nitondra divay avy any Helbona sy volon’ondry fotsy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vedana koa sy Javana avy any Ozala dia nitondra vy voatefy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vy mamirapiratra.
    marker-yv: yv-n
  - type: text
    text: ' natakalo ny entanao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kasia sy veromanitra no natakalony ny varotrao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vedana sy Javana nitondra foly hatakalo ny varotrao; vy voatefy sy kasia ary veromanitra no isan’ny varotrao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dedana no mpandranto nankany aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitondra lamba fanao lamban-tsoavaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Arabia sy ireo andriandahin’i Kedara rehetra no nandranto tany aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka zanak’ondry sy ondrilahy ary osilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nentiny natao varotra tao aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny mpandranto avy any Sheba sy Rama no mpandranto nankany aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka zava-manitra tsara indrindra sy vato soa samy hafa karazana ary volamena no nentiny natakalo ny entanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Harana sy Kane ary Edena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mpandranto avy any Sheba sy Asyria ary Kilmada no mpandranto nankany aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ireo no mpandranto nankany aminao nitondra ny fitafiana marevaka rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia kapôty manga sy samy hafa soratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary vata sedera mifehy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vata mifehy mafy.
    marker-yv: yv-n
  - type: text
    text: ' misy fitafiana soa'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No natakalony ny varotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny sambon’i Tarsisy no mpitondra ny entanao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia feno sady be voninahitra hianao teo amin’ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nentin’ny mpivoinao teny amin’ny rano be hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nahavaky anao tao amin’ny ranomasina ny rivotra avy any atsinanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny harenao sy ny vidin’entanao, ny varotrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny matilonao sy ny mpitondra sambonao, ny mpanentsin-tsambonao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny mpividy ny entanao ary ny miaramilanao rehetra izay tao aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny olona betsaka tafangona tao aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nilentika tao amin’ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro nandravana anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Noho ny fidradradradran’ny mpitondra sambonao dia mihorohoro ny tany manodidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary samy midina miala amin’ny sambony ny mpivoy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny matilo ary ny mpitondra sambo rehetra eny an-dranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mijanona eny an-tanety;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary manandratra ny feony noho ny nanjo anao izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka midradradradra mafy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mangidy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manopy vovoka hiraraka amin’ny lohany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihosinkosin-davenona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary mibory loha avokoa izy noho ny aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy misikina lamba fisaonana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitomany anao amin’ny fangidiam-panahy izy, dia fisaonana mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary raha midradradradra izy, dia manao hira fahalahelovana ny aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka mitomany anao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza moa no tahaka an’i Tyro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ilay rava ao ampovoan’ny ranomasina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Raha nivoaka avy amin’ny ranomasina ny varotrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nahatretrika firenena maro hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny haben’ny harenao sy ny varotrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nampanan-karena ny mpanjakan’ny tany hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tamin’ny andro nandravan’ny ranomasina anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho any amin’ny rano lalina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia niara-nilentika taminao ny varotrao sy ny olona tafangona tao aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Talanjona anao ny mponina rehetra amin’ny moron-dranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raiki-tahotra ny mpanjakany ka dia mivalomainty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Misitrisitra anao ny mpandranto amin’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tonga fampitahorana hianao ary tsy ho ao intsony mandrakizay.
