document_id: EZK.27,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny harena amam-boninahitra nananan’i Tyro, sy fitomaniana noho ny manjo azy.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: Ny avy any Persia sy ny Lydiana
  - type: note
    content: Heb. Loda.
  - type: text
    content: ' ary ny Libyana'
  - type: note
    content: Heb. Pota.
  - type: text
    content: ' dia isan’ny miaramila mpiadinao;'
  - type: text
    content: Nanantona ampinga sy fiarovan-doha teny aminao ireo
  - type: text
    content: Ka nahatsara tarehy anao.
  '11':
  - type: text
    content: Ny terak’i Arvada sy ny miaramilanao no teny ambonin’ny màndanao manodidina,
  - type: text
    content: Ary lehilahy mahery no tao amin’ny tilikambonao;
  - type: text
    content: Ny ampingany dia nahantony teny amin’ny màndanao manodidina;
  - type: text
    content: Ireo no nahatanteraka ny hatsaran-tarehinao.
  '12':
  - type: text
    content: Tarsisy no mpandranto nankany aminao
  - type: text
    content: Noho ny haben’ny harena samy hafa rehetra;
  - type: text
    content: Volafotsy sy vy sy vifotsy ary firaka no nentiny natakalo ny entanao.
  '13':
  - type: text
    content: Javana sy Tobala ary Maseka no mpandranto nankany aminao,
  - type: text
    content: Ka olona sy fanaka varahina no natakalony ny varotrao.
  '14':
  - type: text
    content: Ny terak’i Togarma
  - type: text
    content: Nitondra soavaly sy soavaly fitaingina ary ampondra natakalo ny entanao.
  '15':
  - type: text
    content: Ny terak’i Dedana no mpandranto nankany aminao;
  - type: text
    content: Ny avy amin’ny moron-dranomasina maro no tonga hivarotra tao aminao
  - type: text
    content: Ka nitondra ivory
  - type: note
    content: Heb. vangy ivory.
  - type: text
    content: ' sy hazomainty natakalo ny entanao.'
  '16':
  - type: text
    content: Syria no mpandranto nankany aminao noho ny habetsahan’ny tao-zavatrao,
  - type: text
    content: Ka karbonkolo sy lamba volomparasy sy tenona samy hafa soratra sy rongony fotsy madinika sy voahangy ary robina
  - type: text
    content: No nentiny natakalo ny entanao.
  '17':
  - type: text
    content: Joda sy ny tanin’ny Isiraely no mpandranto nankany aminao,
  - type: text
    content: Ka vary tritika avy tany Minita sy zava-mamy sy tantely sy diloilo ary balsama
  - type: text
    content: No natakalony ny varotrao.
  '18':
  - type: text
    content: Damaskosy no mpandranto nankany aminao noho ny habetsahan’ny tao-zavatrao,
  - type: text
    content: Dia ny haben’ny harenao rehetra,
  - type: text
    content: Ka nitondra divay avy any Helbona sy volon’ondry fotsy izy.
  '19':
  - type: text
    content: Vedana koa sy Javana avy any Ozala dia nitondra vy voatefy
  - type: note
    content: 'Na: vy mamirapiratra.'
  - type: text
    content: ' natakalo ny entanao;'
  - type: text
    content: Kasia sy veromanitra no natakalony ny varotrao.
  - type: note
    content: 'Na: Vedana sy Javana nitondra foly hatakalo ny varotrao; vy voatefy sy kasia ary veromanitra no isan’ny varotrao.'
  '2':
  - type: text
    content: 'Hianao, ry zanak’olona, manaova hira fahalahelovana ny amin’i Tyro, '
  '20':
  - type: text
    content: Dedana no mpandranto nankany aminao,
  - type: text
    content: Nitondra lamba fanao lamban-tsoavaly.
  '21':
  - type: text
    content: Arabia sy ireo andriandahin’i Kedara rehetra no nandranto tany aminao,
  - type: text
    content: Ka zanak’ondry sy ondrilahy ary osilahy
  - type: text
    content: No nentiny natao varotra tao aminao.
  '22':
  - type: text
    content: Ny mpandranto avy any Sheba sy Rama no mpandranto nankany aminao,
  - type: text
    content: Ka zava-manitra tsara indrindra sy vato soa samy hafa karazana ary volamena no nentiny natakalo ny entanao.
  '23':
  - type: text
    content: Harana sy Kane ary Edena
  - type: text
    content: Sy mpandranto avy any Sheba sy Asyria ary Kilmada no mpandranto nankany aminao.
  '24':
  - type: text
    content: Ireo no mpandranto nankany aminao nitondra ny fitafiana marevaka rehetra,
  - type: text
    content: Dia kapôty manga sy samy hafa soratra
  - type: text
    content: Ary vata sedera mifehy
  - type: note
    content: 'Na: vata mifehy mafy.'
  - type: text
    content: ' misy fitafiana soa'
  - type: text
    content: No natakalony ny varotrao.
  '25':
  - type: text
    content: Ny sambon’i Tarsisy no mpitondra ny entanao.
  - type: text
    content: Dia feno sady be voninahitra hianao teo amin’ny ranomasina.
  '26':
  - type: text
    content: Nentin’ny mpivoinao teny amin’ny rano be hianao,
  - type: text
    content: Dia nahavaky anao tao amin’ny ranomasina ny rivotra avy any atsinanana.
  '27':
  - type: text
    content: Ny harenao sy ny vidin’entanao, ny varotrao,
  - type: text
    content: Ny matilonao sy ny mpitondra sambonao, ny mpanentsin-tsambonao
  - type: text
    content: Sy ny mpividy ny entanao ary ny miaramilanao rehetra izay tao aminao
  - type: text
    content: Mbamin’ny olona betsaka tafangona tao aminao
  - type: text
    content: Dia nilentika tao amin’ny ranomasina
  - type: text
    content: Tamin’ny andro nandravana anao.
  '28':
  - type: text
    content: Noho ny fidradradradran’ny mpitondra sambonao dia mihorohoro ny tany manodidina.
  '29':
  - type: text
    content: Ary samy midina miala amin’ny sambony ny mpivoy rehetra
  - type: text
    content: Sy ny matilo ary ny mpitondra sambo rehetra eny an-dranomasina
  - type: text
    content: Ka mijanona eny an-tanety;
  '3':
  - type: text
    content: 'ka ataovy aminy hoe:'
  - type: text
    content: He, ry ilay monina amin’ny vava-ranomasina,
  - type: text
    content: Mpandranto ho an’ny firenena ho any ny moron-dranomasina maro samy hafa;
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: 'He, ry Tyro, hianao efa nanao hoe: Izaho dia tena tsara tarehy!'
  '30':
  - type: text
    content: Ary manandratra ny feony noho ny nanjo anao izy
  - type: text
    content: Ka midradradradra mafy
  - type: note
    content: Heb. mangidy.
  - type: text
    content: Sady manopy vovoka hiraraka amin’ny lohany
  - type: text
    content: Ary mihosinkosin-davenona;
  '31':
  - type: text
    content: Ary mibory loha avokoa izy noho ny aminao
  - type: text
    content: Sy misikina lamba fisaonana
  - type: text
    content: Ary mitomany anao amin’ny fangidiam-panahy izy, dia fisaonana mafy.
  '32':
  - type: text
    content: Ary raha midradradradra izy, dia manao hira fahalahelovana ny aminao
  - type: text
    content: 'Ka mitomany anao hoe:'
  - type: text
    content: Iza moa no tahaka an’i Tyro,
  - type: text
    content: Dia tahaka ilay rava ao ampovoan’ny ranomasina?
  '33':
  - type: text
    content: Raha nivoaka avy amin’ny ranomasina ny varotrao,
  - type: text
    content: Dia nahatretrika firenena maro hianao;
  - type: text
    content: Tamin’ny haben’ny harenao sy ny varotrao
  - type: text
    content: Dia nampanan-karena ny mpanjakan’ny tany hianao.
  '34':
  - type: text
    content: Tamin’ny andro nandravan’ny ranomasina anao
  - type: text
    content: Ho any amin’ny rano lalina
  - type: text
    content: Dia niara-nilentika taminao ny varotrao sy ny olona tafangona tao aminao.
  '35':
  - type: text
    content: Talanjona anao ny mponina rehetra amin’ny moron-dranomasina,
  - type: text
    content: Ary raiki-tahotra ny mpanjakany ka dia mivalomainty.
  '36':
  - type: text
    content: Misitrisitra anao ny mpandranto amin’ny firenena;
  - type: text
    content: Tonga fampitahorana hianao ary tsy ho ao intsony mandrakizay.
  '4':
  - type: text
    content: Ao amin’ny ranomasina ny taninao,
  - type: text
    content: Efa tanteraky ny mpandrafitra anao ny hatsaran-tarehinao.
  '5':
  - type: text
    content: Hazo kypreso avy any Senira no nanaovany ny lampihazonao;
  - type: text
    content: Sedera avy any Libanona no nalainy hatao andrin-tsambonao.
  '6':
  - type: text
    content: Oka avy any Basana no nanaovany ny fivoinao;
  - type: text
    content: Hazo bokso avy any amin’ny moron-dranomasin’i Kitima no nataony fipetrahan’ny mpivoinao sady nasiany parike ivory.
  '7':
  - type: text
    content: Rongony madinika samy hafa soratra avy any Egypta no natao lainao mba ho faneva ho anao;
  - type: text
    content: Lamba manga sy volomparasy avy any amin’ny moron-dranomasin’i Elisa no eloelonao.
  '8':
  - type: text
    content: Ny mponina any Sidona sy Arvada no mpivoinao;
  - type: text
    content: Ny olon-kendrinao, ry Tyro, no tao aminao, ka ireo no mpitondra sambonao.
  '9':
  - type: text
    content: Ny zokiolon’i Gebala sy izay hendry tany no tao aminao ho mpanentsin-tsambonao;
  - type: text
    content: Ny sambo rehetra teny amin’ny ranomasina mbamin’ny matilony
  - type: text
    content: Dia tonga tao aminao hanakalo ny rantonao.
