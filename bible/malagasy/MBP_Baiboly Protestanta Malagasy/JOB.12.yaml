document_id: JOB.12,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Joba.
  - type: text
    content: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Izay mitana ny ain’ny zava-manan-aina rehetra
  - type: text
    content: Sy ny fofonain’ny olombelona rehetra?
  '11':
  - type: text
    content: Moa tsy ny sofina va no mamantatra ny teny?
  - type: text
    content: Ary tsy ny vava va no manandrana ny hanina?
  '12':
  - type: text
    content: Ao amin’ny fotsy volo ny fahendrena,
  - type: text
    content: Ary ny fahela-velona no ahazoam-pahalalana.
  '13':
  - type: text
    content: Ao amin’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' kosa no misy fahendrena sy hery;'
  - type: text
    content: Izy no manana hevitra sy fahalalana.
  '14':
  - type: text
    content: Indro, mandrava Izy, ka tsy hatsangana intsony;
  - type: text
    content: Manidy ny olona Izy, ka tsy hovohana.
  '15':
  - type: text
    content: Indro, manampina ny rano Izy, ka dia ritra iny;
  - type: text
    content: Ary alefany indray ka mahasimba ny tany.
  '16':
  - type: text
    content: Izy no manana hery sy tena fahendrena;
  - type: text
    content: Samy eo an-tànany avokoa ny voafitaka sy ny mpamitaka.
  '17':
  - type: text
    content: Alàny voninahitra ny mpanolo-tsaina, dia entiny,
  - type: text
    content: Ary asehony ny fahadalan’ny mpitsara.
  '18':
  - type: text
    content: Vahàny ny fifehezan’ny mpanjaka,
  - type: text
    content: Ka feheziny mahazaka ny valahany.
  '19':
  - type: text
    content: Alàny voninahitra ny mpisorona, dia entiny,
  - type: text
    content: Ary ny mafy orina ela dia ravany.
  '2':
  - type: text
    content: Marina ary fa hianareo ihany tokoa no olombelona!
  - type: text
    content: Ary hiara-maty aminareo ny fahendrena!
  '20':
  - type: text
    content: Koroiny ny laha-tenin’ny mahay,
  - type: text
    content: Ary ny fahazavan-tsain’ny anti-panahy dia esoriny.
  '21':
  - type: text
    content: Mandatsaka fanamavoana amin’ny andriandahy Izy,
  - type: text
    content: Ary ketrahiny ny fehin-kibon’ny matanjaka.
  '22':
  - type: text
    content: Manala rakotra izay lalina Izy mba tsy ho maizina
  - type: text
    content: Ary mitondra ny aloky ny fahafatesana ho eo amin’ny mazava.
  '23':
  - type: text
    content: Mahalehibe ny firenena Izy, nefa mandringana azy koa;
  - type: text
    content: Mampihahaka ny firenena Izy, nefa mitondra azy hody indray.
  '24':
  - type: text
    content: Mahavery saina ny loholona amin’ny tany Izy
  - type: text
    content: Ary mampirenireny azy any an-efitra tsy misy làlana;
  '25':
  - type: text
    content: Mitsapatsapa amin’ny maizina tsy misy mavaza ireo;
  - type: text
    content: Ary mampivembena azy tahaka ny olona mamo Izy.
  '3':
  - type: text
    content: Kanefa izaho mba manan-tsaina tahaka anareo ihany koa;
  - type: text
    content: Tsy latsaka noho hianareo aho;
  - type: text
    content: Fa iza moa no tsy nahalala izay zavatra toy izany?
  '4':
  - type: text
    content: Tonga fihomehezan’ny sakaizako aho,
  - type: text
    content: Dia izaho izay niantso an’Andriamanitra ka novaliany;
  - type: text
    content: Eny, tonga fihomehezana ny olona marina tsy manan-tsiny.
  '5':
  - type: text
    content: Endrehin-datsa ny ozoim-pahoriana, raha araka ny hevitry ny miadana,
  - type: text
    content: Eny, vonona ho amin’izay ela mangozohozo ny latsa.
  - type: note
    content: 'Na: Fanilo milopilony ny ozoim-pahoriana, raha araka ny hevitry ny miadana, Ka tandrifiny ho an’izay efa ho tafintohina ihany.'
  '6':
  - type: text
    content: Mandry fahizay ny lain’ny mpitohatoha,
  - type: text
    content: Ary mitoetra tsy manahy izay sahy mampahatezitra an’Andriamanitra,
  - type: text
    content: Dia izay mitondra ny herin’ny tànany ho andriamaniny.
  '7':
  - type: text
    content: Kanefa anontanio ange ny biby, fa hampianatra anao izy,
  - type: text
    content: Ary ny voro-manidina, fa hanambara aminao izy;
  '8':
  - type: text
    content: Ary makà saina
  - type: note
    content: 'Na: Amin’ny hazo madinika.'
  - type: text
    content: ' amin’ny tany, dia hampianatra anao izy.'
  - type: text
    content: Ary ny hazandrano any an-dranomasina hampahalala anao.
  '9':
  - type: text
    content: Iza no tsy mahalala, raha mandinika ireny rehetra ireny,
  - type: note
    content: 'Na: Iza amin’ireny rehetra ireny no tsy mahalala.'
  - type: text
    content: Fa ny nanao izany dia ny tànan’i Jehovah,
