document_id: JOB.12
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny navalin’i Joba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Marina ary fa hianareo ihany tokoa no olombelona!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiara-maty aminareo ny fahendrena!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa izaho mba manan-tsaina tahaka anareo ihany koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy latsaka noho hianareo aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa iza moa no tsy nahalala izay zavatra toy izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tonga fihomehezan’ny sakaizako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izaho izay niantso an’Andriamanitra ka novaliany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tonga fihomehezana ny olona marina tsy manan-tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Endrehin-datsa ny ozoim-pahoriana, raha araka ny hevitry ny miadana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, vonona ho amin’izay ela mangozohozo ny latsa.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fanilo milopilony ny ozoim-pahoriana, raha araka ny hevitry ny miadana, Ka tandrifiny ho an’izay efa ho tafintohina ihany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandry fahizay ny lain’ny mpitohatoha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitoetra tsy manahy izay sahy mampahatezitra an’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay mitondra ny herin’ny tànany ho andriamaniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanefa anontanio ange ny biby, fa hampianatra anao izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny voro-manidina, fa hanambara aminao izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary makà saina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny hazo madinika.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny tany, dia hampianatra anao izy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hazandrano any an-dranomasina hampahalala anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Iza no tsy mahalala, raha mandinika ireny rehetra ireny,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Iza amin’ireny rehetra ireny no tsy mahalala.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny nanao izany dia ny tànan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mitana ny ain’ny zava-manan-aina rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fofonain’ny olombelona rehetra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moa tsy ny sofina va no mamantatra ny teny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ny vava va no manandrana ny hanina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ao amin’ny fotsy volo ny fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahela-velona no ahazoam-pahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ao amin’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Andriamanitra
  - type: text
    text: ' kosa no misy fahendrena sy hery;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no manana hevitra sy fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, mandrava Izy, ka tsy hatsangana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manidy ny olona Izy, ka tsy hovohana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, manampina ny rano Izy, ka dia ritra iny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary alefany indray ka mahasimba ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izy no manana hery sy tena fahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy eo an-tànany avokoa ny voafitaka sy ny mpamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alàny voninahitra ny mpanolo-tsaina, dia entiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary asehony ny fahadalan’ny mpitsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vahàny ny fifehezan’ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka feheziny mahazaka ny valahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Alàny voninahitra ny mpisorona, dia entiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mafy orina ela dia ravany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koroiny ny laha-tenin’ny mahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahazavan-tsain’ny anti-panahy dia esoriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mandatsaka fanamavoana amin’ny andriandahy Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ketrahiny ny fehin-kibon’ny matanjaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manala rakotra izay lalina Izy mba tsy ho maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitondra ny aloky ny fahafatesana ho eo amin’ny mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mahalehibe ny firenena Izy, nefa mandringana azy koa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampihahaka ny firenena Izy, nefa mitondra azy hody indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mahavery saina ny loholona amin’ny tany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampirenireny azy any an-efitra tsy misy làlana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mitsapatsapa amin’ny maizina tsy misy mavaza ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampivembena azy tahaka ny olona mamo Izy.
