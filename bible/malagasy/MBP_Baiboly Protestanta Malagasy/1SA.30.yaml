document_id: 1SA.30,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namalian’i Davida ny Amalekita noho ny nandravany an’i Ziklaga.
  - type: text
    content: 'ARY nony tonga teo Ziklaga Davida sy ny olony tamin’ny andro fahatelo, dia, indro, ny Amalekita efa nanafika ny tany atsimo sy Ziklaga ka namely an’i Ziklaga sy nandoro azy tamin’ny afo; '
  '10':
  - type: text
    content: Ary Davida sy ny efa-jato lahy no nanenjika; fa ny roan-jato lahy kosa, izay reraka ka tsy afaka nita ny renirano Besora, dia nijanona tany aoriana.
  '11':
  - type: text
    content: 'Ary nahita lehilahy Egyptiana tany an-tsaha ny olona, ka nentiny tany amin’i Davida; ary nomeny hanina ralehilahy, ka nihinana izy, ary nampisotroiny rano koa izy. '
  '12':
  - type: text
    content: Ary nomeny ampempan’aviavy iray didy sy voaloboka maina roa sampaho izy; ary rehefa nihinana izy, dia nody indray ny ainy; fa hateloan’andro sy hateloan’alina izy tsy nihinan-kanina na nisotro rano.
  '13':
  - type: text
    content: 'Ary hoy Davida taminy: An’iza moa hianao, ary avy taiza? Ary hoy izy: Zatovo Egyptiana, mpanompon’ny Amalekita anankiray, aho; ary narian’ny tompoko aho, fa narary afaka omaly. '
  '14':
  - type: text
    content: Izahay efa nanafika ny tany atsimo izay an’ny Keretita sy ny an’i Joda ary ny tany atsimo izay an’i Kaleba ary nandoro an’i Ziklaga tamin’ny afo.
  '15':
  - type: text
    content: 'Ary hoy Davida taminy: Hitondra ahy midina ho amin’izany jirika izany va hianao? Ary hoy izy: Mianiàna amiko amin’Andriamanitra fa tsy hamono ahy hianao na hanolotra ahy ho eo an-tànan’ny tompoko, dia hitondra anao midina ho amin’izany jirika izany aho.'
  '16':
  - type: text
    content: 'Ary nony nentiny nidina izy, indreo, miely eran’ny tany izy ka homana sy misotro ary milanona noho ny haben’ny babo rehetra izay azony tamin’ny tanin’ny Filistina sy ny tanin’ny Joda. '
  '17':
  - type: text
    content: Ary Davida namely azy tamin’iny takariva iny ka hatramin’ny ampitso hariva; ary tsy nisy olona afaka, afa-tsy zatovo efa-jato lahy izay nitaingina rameva ka nandositra.
  '18':
  - type: text
    content: 'Dia rarak’i Davida izay rehetra efa nobaboin’ny Amalekita; ary dia azon’i Davida koa ny vadiny roa. '
  '19':
  - type: text
    content: 'Ary tsy nisy zavatra tsy azony, na kely na be, na zazalahy na zazavavy, na inona na inona tamin’izay nobaboin’ireny; izany rehetra izany dia azon’i Davida avokoa. '
  '2':
  - type: text
    content: 'ary efa namabo ny vehivavy sy izay '
  - type: text
    content: rehetra
  - type: text
    content: ' tao izy, na lehibe na kely, nefa tsy nisy novonoiny na dia iray aza; fa nentiny ho babo ireo, ka lasa nandeha izy. '
  '20':
  - type: text
    content: 'Ary Davida naka ny ondry aman-osy sy ny omby rehetra; ary nentiny nialoha ny omby '
  - type: text
    content: hafa
  - type: text
    content: ' ireo, sady nisy niantso hoe: Itony no babon’i Davida.'
  '21':
  - type: text
    content: 'Ary Davida tonga teo amin’ny roan-jato lahy, izay reraka ka tsy afaka nanaraka azy, fa najanony teo amin’ny renirano Besora; ary dia nandeha ireo hitsena an’i Davida sy ny olona nanaraka azy; ary nony tonga teo akaikin’ny olona Davida, dia nanontany izay toeny. '
  '22':
  - type: text
    content: 'Dia niteny ny olona sompatra sy tena ratsy fanahy rehetra avy nanaraka an’i Davida ka nanao hoe: Satria tsy mba niaraka tamintsika ireo, dia tsy hanomezantsika azy ny babo izay azontsika, afa-tsy ny vadiny aman-janany isany avy; fa ireo no aoka ho entiny, dia handeha izy.'
  '23':
  - type: text
    content: 'Fa hoy Davida: Aza manao izany amin’izay nomen’i Jehovah antsika, ry rahalahy; fa niaro antsika Izy, ary natolony teo an-tànantsika ny jirika izay tonga namely antsika. '
  '24':
  - type: text
    content: 'Koa iza no hanaiky anareo amin’izany? Fa tahaka ny anjaran’izay nidina hiady ihany no ho anjaran’izay nitoetra tamin’ny entana: hiara-misalahy izy. '
  '25':
  - type: text
    content: Dia izany no fanao hatramin’izany andro izany, ka dia natao didy sy lalàna tamin’ny Isiraely izany ambaraka andro-any.
  '26':
  - type: text
    content: 'Ary raha tonga tao Ziklaga Davida, dia mba nanaterany ho an’ny loholon’ny Joda sakaizany ny babo ka nataony hoe: Inty izay saotra ho anareo avy amin’ny babo azo tamin’ny fahavalon’i Jehovah, '
  '27':
  - type: text
    content: 'dia ho an’izay ao Betela sy izay any Ramata amin’ny tany atsimo sy ho an’izay ao Jatira '
  '28':
  - type: text
    content: 'sy ho an’izay ao Aroera sy ho an’izay ao Sifmota sy ho an’izay ao Estemoa '
  '29':
  - type: text
    content: 'sy ho an’izay ao Rakala sy ho an’izay any an-tanànan’ny Jeramelita sy ho an’izay any an-tanànan’ny Kenita '
  '3':
  - type: text
    content: Ary Davida sy ny olony tonga tao amin’ny tanàna, ary, indro, efa levon’ny afo ny tanàna; ary ny vadiny mbamin’ny zanani-lahy sy ny zanani-vavy efa lasan-ko babo.
  '30':
  - type: text
    content: 'sy ho an’izay ao Horma sy ho an’izay ao Korasana sy ho an’izay ao Ataka '
  '31':
  - type: text
    content: sy ho an’izay ao Hebrona ary ho an’izay any amin’ny tany rehetra nandehandehanan’i Davida sy ny olony.
  '4':
  - type: text
    content: 'Ary Davida sy ny mpanaraka azy dia nanandratra ny feony nitomany ambara-paha-tsy nahatomany intsony izy. '
  '5':
  - type: text
    content: 'Ary voababo koa izy roa vavy vadin’i Davida, dia Ahinoama Jezirelita sy Abigaila, ilay novinadin’i Nabala Karmelita. '
  '6':
  - type: text
    content: Ary ory indrindra Davida, fa ny olona nifampitaona hitora-bato azy, satria samy nalahelo ny zanani-lahy sy ny zanani-vavy ny olona rehetra; fa Davida kosa nampahery ny tenany tamin’i Jehovah Andriamaniny.
  '7':
  - type: text
    content: 'Ary hoy Davida tamin’i Abiatara mpisorona, zanak’i Ahimeleka: Masìna hianao, ento etỳ amiko ny efoda. Dia nentin’i Abiatara teo amin’i Davida ny efoda. '
  '8':
  - type: text
    content: 'Ary Davida nanontany tamin’i Jehovah hoe: Henjehiko va izany jirika izany? Ho tratro va izy? Dia namaly azy Jehovah hoe: Enjeho izy, fa ho tratrao tokoa ary ho rarakao.'
  '9':
  - type: text
    content: 'Dia lasa Davida sy ny enin-jato lahy izay nanaraka azy ka tonga teo amin’ny renirano Besora, ary teo no nijanonan’ny sasany. '
