document_id: JDG.21
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny lehilahy amin’ny Isiraely efa nianiana tany Mizpa nanao hoe: Aoka tsy hisy amintsika hanome ny zanani-vavy ho vadin’ny Benjamita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nankany Betela ny olona ka nitoetra teo anatrehan’Andriamanitra mandra-paharivan’ny andro, dia nanandratra ny feony ka nitomany mafy dia mafy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nanao hoe: Jehovah, Andriamanitry ny Isiraely ô, nahoana no tonga tamin’ny Isiraely izao ankehitriny, ka fongotra ny firenena iray amin’ny Isiraely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary nony ampitson’iny dia nifoha maraina koa ny olona ka nanorina alitara teo ary nanatitra fanatitra odorana sy fanati-pihavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy ny Zanak’Isiraely: Iza amin’ny firenen’Isiraely rehetra no tsy niakatra teo amin’ny fiangonana hanatona an’i Jehovah? fa efa nisy fianianana lehibe ny amin’izay tsy niakatra ho any amin’i Jehovah tany Mizpa hoe: Hatao maty tokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny Zanak’Isiraely nanenina ny amin’i Benjamina rahalahiny ka nanao hoe: Misy firenena iray voafongotra eo amin’ny Isiraely ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ahoana no hataontsika amin’ireo sisa hahazoany vady; fa isika efa nianiana tamin’i Jehovah tsy hanome vady azy amin’ny zanakavavintsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy izy: Iza amin’ny firenen’Isiraely no tsy mba niakatra ho any amin’i Jehovah tany Mizpa? Ary, indro, tsy nisy olona avy tany Jabesi-gileada na dia iray akory aza nankany an-toby ho ao amin’ny fiangonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa rehefa voalamina ny olona, dia, indro, tsy nisy tao na dia iray akory aza avy tamin’ny tompon-tany tany Jabesi-gileada.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia naniraka lehilahy mahery roa arivo sy iray alin-dahy ny fiangonana ka nandidy azy hoe: Mandehana, ka mameleza ny mponina any Jabesi-gileada amin’ny lelan-tsabatra mbamin’ny zaza amim-behivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izao no hataonareo: Ny lehilahy rehetra sy ny vehivavy rehetra izay efa nahalala lahy dia haringanareo.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hataonareo herema.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nahita zazavavy virijina efa-jato tsy mbola nahalala lahy teo amin’ny mponina tany Jabesi-gileada izy ka nitondra ireo ho any an-toby tany Silo any amin’ny tany Kanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny fiangonana rehetra dia naniraka niteny tamin’ny taranak’i Benjamina, izay tao amin’ny haram-bato tao Rimona, ka niantso azy hihavana aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niverina tamin’izany andro izany ny Benjamita, ka nomeny azy ireo vehivavy efa novelominy tamin’ny vehivavy tao Jabesi-gileada ireo; kanjo mbola tsy nahenina azy ihany ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny olona nanenina noho ny amin’i Benjamina, satria nisy nobangain’i Jehovah ny firenen’Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy ny loholon’ny fiangonana: Ahoana no hataontsika ho an’ireo sisa mba hahazoany vady, fa efa naringana ny vehivavy tamin’ny Benjamita? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy izy: Tsy maintsy mahazo lova ny Benjamita izay afa-nandositra, mba tsy hisy firenena iray fongotra amin’ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa isika tsy mahazo manome azy ny zanakavavintsika ho vadiny, satria efa nianiana ny Zanak’Isiraely ka nanao hoe: Ho voaozona anie izay manome vady ho an’ny Benjamita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy izy: Indro, misy andro firavoravoana isan-taona ho an’i Jehovah any Silo, izay avaratr’i Betela, atsinanan’ny làlambe miakatra avy any Betela hankany Sekema, ary atsimon’i Lebona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nandidy ny taranak’i Benjamina izy ka nanao hoe: Mandehana, ka manotreha any amin’ny tanimboaloboka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ka jereo, ka raha, indreo, mivoaka handihy ny zazavavy avy any Silo, dia mivoaha avy ao amin’ny tanimboaloboka hianareo, ary samia misambotra amin’ny zazavavy avy any Silo ho vadiny avy, ka mandehana any amin’ny tanin’ny Benjamina indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha mankany aminay hitaraina ny rainy na ny anadahiny, dia holazainay aminy hoe: Omeo anay ihany izy, fa izahay tsy mba nahazo vady tany amin’ilay ady teo; fa tsy hianareo no nanome azy; fa raha izany, dia meloka ihany hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nanao izany ny taranak’i Benjamina ka samy naka vady araka ny isany tamin’ny mpandihy izay nosamboriny; dia nandeha izy ka niverina ho any amin’ny lovany ary namboatra ireo tanàna ireo ka nonina tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia samy nandeha niala teo ny Zanak’Isiraely tamin’izany andro izany, samy ho any amin’ny fireneny sy ny fokony avy; dia niala teo ho any amin’ny lovany avy ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy nisy mpanjaka teo amin’ny Isiraely tamin’izany andro izany; fa samy nanao izay nataony ho marina avy izy rehetra.
