document_id: JDG.21,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary ny lehilahy amin’ny Isiraely efa nianiana tany Mizpa nanao hoe: Aoka tsy hisy amintsika hanome ny zanani-vavy ho vadin’ny Benjamita. '
  '10':
  - type: text
    content: 'Dia naniraka lehilahy mahery roa arivo sy iray alin-dahy ny fiangonana ka nandidy azy hoe: Mandehana, ka mameleza ny mponina any Jabesi-gileada amin’ny lelan-tsabatra mbamin’ny zaza amim-behivavy. '
  '11':
  - type: text
    content: 'Ary izao no hataonareo: Ny lehilahy rehetra sy ny vehivavy rehetra izay efa nahalala lahy dia haringanareo.'
  - type: note
    content: Heb. hataonareo herema.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Ary nahita zazavavy virijina efa-jato tsy mbola nahalala lahy teo amin’ny mponina tany Jabesi-gileada izy ka nitondra ireo ho any an-toby tany Silo any amin’ny tany Kanana.
  '13':
  - type: text
    content: 'Ary ny fiangonana rehetra dia naniraka niteny tamin’ny taranak’i Benjamina, izay tao amin’ny haram-bato tao Rimona, ka niantso azy hihavana aminy. '
  '14':
  - type: text
    content: 'Dia niverina tamin’izany andro izany ny Benjamita, ka nomeny azy ireo vehivavy efa novelominy tamin’ny vehivavy tao Jabesi-gileada ireo; kanjo mbola tsy nahenina azy ihany ireo. '
  '15':
  - type: text
    content: Ary ny olona nanenina noho ny amin’i Benjamina, satria nisy nobangain’i Jehovah ny firenen’Isiraely.
  '16':
  - type: text
    content: 'Dia hoy ny loholon’ny fiangonana: Ahoana no hataontsika ho an’ireo sisa mba hahazoany vady, fa efa naringana ny vehivavy tamin’ny Benjamita? '
  '17':
  - type: text
    content: 'Ary hoy izy: Tsy maintsy mahazo lova ny Benjamita izay afa-nandositra, mba tsy hisy firenena iray fongotra amin’ny Isiraely. '
  '18':
  - type: text
    content: 'Nefa isika tsy mahazo manome azy ny zanakavavintsika ho vadiny, satria efa nianiana ny Zanak’Isiraely ka nanao hoe: Ho voaozona anie izay manome vady ho an’ny Benjamita.'
  '19':
  - type: text
    content: 'Dia hoy izy: Indro, misy andro firavoravoana isan-taona ho an’i Jehovah any Silo, izay avaratr’i Betela, atsinanan’ny làlambe miakatra avy any Betela hankany Sekema, ary atsimon’i Lebona. '
  '2':
  - type: text
    content: 'Dia nankany Betela ny olona ka nitoetra teo anatrehan’Andriamanitra mandra-paharivan’ny andro, dia nanandratra ny feony ka nitomany mafy dia mafy '
  '20':
  - type: text
    content: 'Ary nandidy ny taranak’i Benjamina izy ka nanao hoe: Mandehana, ka manotreha any amin’ny tanimboaloboka, '
  '21':
  - type: text
    content: 'ka jereo, ka raha, indreo, mivoaka handihy ny zazavavy avy any Silo, dia mivoaha avy ao amin’ny tanimboaloboka hianareo, ary samia misambotra amin’ny zazavavy avy any Silo ho vadiny avy, ka mandehana any amin’ny tanin’ny Benjamina indray. '
  '22':
  - type: text
    content: 'Ary raha mankany aminay hitaraina ny rainy na ny anadahiny, dia holazainay aminy hoe: Omeo anay ihany izy, fa izahay tsy mba nahazo vady tany amin’ilay ady teo; fa tsy hianareo no nanome azy; fa raha izany, dia meloka ihany hianareo.'
  '23':
  - type: text
    content: Dia nanao izany ny taranak’i Benjamina ka samy naka vady araka ny isany tamin’ny mpandihy izay nosamboriny; dia nandeha izy ka niverina ho any amin’ny lovany ary namboatra ireo tanàna ireo ka nonina tao.
  '24':
  - type: text
    content: Dia samy nandeha niala teo ny Zanak’Isiraely tamin’izany andro izany, samy ho any amin’ny fireneny sy ny fokony avy; dia niala teo ho any amin’ny lovany avy ny olona rehetra.
  '25':
  - type: text
    content: Tsy nisy mpanjaka teo amin’ny Isiraely tamin’izany andro izany; fa samy nanao izay nataony ho marina avy izy rehetra.
  '3':
  - type: text
    content: 'nanao hoe: Jehovah, Andriamanitry ny Isiraely ô, nahoana no tonga tamin’ny Isiraely izao ankehitriny, ka fongotra ny firenena iray amin’ny Isiraely? '
  '4':
  - type: text
    content: Ary nony ampitson’iny dia nifoha maraina koa ny olona ka nanorina alitara teo ary nanatitra fanatitra odorana sy fanati-pihavanana.
  '5':
  - type: text
    content: 'Ary hoy ny Zanak’Isiraely: Iza amin’ny firenen’Isiraely rehetra no tsy niakatra teo amin’ny fiangonana hanatona an’i Jehovah? fa efa nisy fianianana lehibe ny amin’izay tsy niakatra ho any amin’i Jehovah tany Mizpa hoe: Hatao maty tokoa izy. '
  '6':
  - type: text
    content: 'Ary ny Zanak’Isiraely nanenina ny amin’i Benjamina rahalahiny ka nanao hoe: Misy firenena iray voafongotra eo amin’ny Isiraely ankehitriny. '
  '7':
  - type: text
    content: 'Ahoana no hataontsika amin’ireo sisa hahazoany vady; fa isika efa nianiana tamin’i Jehovah tsy hanome vady azy amin’ny zanakavavintsika? '
  '8':
  - type: text
    content: 'Dia hoy izy: Iza amin’ny firenen’Isiraely no tsy mba niakatra ho any amin’i Jehovah tany Mizpa? Ary, indro, tsy nisy olona avy tany Jabesi-gileada na dia iray akory aza nankany an-toby ho ao amin’ny fiangonana. '
  '9':
  - type: text
    content: Fa rehefa voalamina ny olona, dia, indro, tsy nisy tao na dia iray akory aza avy tamin’ny tompon-tany tany Jabesi-gileada.
