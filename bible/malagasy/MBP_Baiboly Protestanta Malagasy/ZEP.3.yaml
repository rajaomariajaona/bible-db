document_id: ZEP.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozan’ny tanàna miodina sady voaloto,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay mampahory!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any an-dafin’ny onin’i Etiopia no hitondrana ny mpivavaka amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny zanakavavin’izay naeliko, ho fanatitra ho Ahy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hitondran’ny mpivavaka amiko . . . . ny fanatitra ho Ahy.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia tsy ho menatra hianao tamin’izay nataonao rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nanotanao tamiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hesoriko aminao ireo mibitaka amim-pireharehana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hiavonavona eo an-tendrombohitro masina intsony hianao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa hamelako olona ory sy malahelo ihany ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anaran’i Jehovah no hialofany,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sisa amin’ny Isiraely dia tsy hanao meloka na handainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy lela mamitaka eo am-bavany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hihinana sy handry izy, ka tsy hisy hanaitaitra azy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia, ry Ziona zanakavavy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova feo fifaliana, ry Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifalia sy miravoravoa amin’ny fonao rehetra, ry Jerosalema zanakavavy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah efa nampitsahatra ny fitsarana anao ka nandroaka ny fahavalonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah, Mpanjakan’ny Isiraely, no ao aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hahita loza intsony hianao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Amin’izany andro izany dia holazaina amin’i Jerosalema hoe: Aza matahotra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza miraviravy tànana, ry Ziona.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah Andriamanitrao no ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahery Izy ka hamonjy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiravoravo anao amin’ny fifaliana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho sondriana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hangina.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny fitiavany Izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hifaly anao amin’ny fihobiana Izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hangoniko izay manina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: efa lavitra.
      marker-yv: yv-n
    - type: text
      text: ' ny fotoam-pivavahana;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy aminao ihany ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary itambesaran’ny latsa izy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary mitambesatra aminy ny fandatsana anao (
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fandatsana azy); '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Avy taminao izay itambesaran’ny latsa ireny.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hasiako amin’izany andro izany izay rehetra nampahory anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovonjeko ny mandringa, ary hovoriko ny noroahina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hataoko ho fiderana sy ho anarana ireny izay efa nitondra henatra tany amin’ny tany rehetra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: any amin’ny tany rehetra izay efa nitondrany henatra.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nihaino ny feo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na nino anatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah tsy nitokiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamaniny tsy nohatoniny.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany no hitondrako anareo miditra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, amin’izany andro izany no hanangonako anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hataoko ho anarana sy ho fiderana any amin’ny firenena rehetra amin’ny tany hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha hampodiko avy amin’ny fahababoana hianareo, ka ho hitan’ny masonareo izany, hoy Jehovah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Liona mierona ao aminy ireo lehibeny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lopa.
      marker-yv: yv-n
    - type: text
      text: ' hariva ny mpitsarany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mamela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy mamela taolana.
      marker-yv: yv-n
    - type: text
      text: ' ho tra-maraina.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vavana sady mpamitaka ny mpaminaniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandoto izay masina ny mpisorony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mamadika ny lalàna izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no marina ao afovoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manao izay tsy marina Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isa-maraina isa-maraina no amoahany ny fitsarany ho amin’ny mazava, ka tsy diso izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tsy marina tsy mba mahalala henatra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nahafongana firenena Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rava ny tilikambo eny amin’ny zorony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nosimbako ny làlany tsy hisy mpandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rava ny tanànany, ka tsy misy olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy misy mponina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy Izaho: Hatahotra Ahy tokoa hianao ka hino anatra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy ho rava ny fonenanao,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fonenany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka izay rehetra voatendriko hamelezana anao;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: azy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa nifoha maraina koa izy ka nanao izay ratsy rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa miandrasa Ahy hianareo, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-pihavin’ny andro hitsanganako haka babo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no kasaiko hatao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamory firenena sy hanangona fanjakana Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanidinako ny fahatezerako amin’ireo, dia ny firehetan’ny fahatezerako rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho levon’ny afon’ny fahasaro-piaroko ny tany rehetra.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny hibebahan’ny jentilisa, sy ny hanomezam-boninahitra ny Isiraely.
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FA amin’izany dia hovako ho madio ny molotry ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiantsoan’izy rehetra ny anaran’i Jehovah, hanompoany Azy amin’ny firaisan-kina.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
