document_id: ZEP.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: Lozan’ny tanàna miodina sady voaloto,
  - type: text
    content: Dia ilay mampahory!
  '10':
  - type: text
    content: Avy any an-dafin’ny onin’i Etiopia no hitondrana ny mpivavaka amiko,
  - type: text
    content: Dia ny zanakavavin’izay naeliko, ho fanatitra ho Ahy.
  - type: note
    content: 'Na: hitondran’ny mpivavaka amiko . . . . ny fanatitra ho Ahy.'
  '11':
  - type: text
    content: Amin’izany andro izany dia tsy ho menatra hianao tamin’izay nataonao rehetra,
  - type: text
    content: Izay nanotanao tamiko;
  - type: text
    content: Ka dia hesoriko aminao ireo mibitaka amim-pireharehana,
  - type: text
    content: Ary tsy hiavonavona eo an-tendrombohitro masina intsony hianao.
  '12':
  - type: text
    content: Nefa hamelako olona ory sy malahelo ihany ao aminao,
  - type: text
    content: Ary ny anaran’i Jehovah no hialofany,
  '13':
  - type: text
    content: Ny sisa amin’ny Isiraely dia tsy hanao meloka na handainga,
  - type: text
    content: Ary tsy hisy lela mamitaka eo am-bavany;
  - type: text
    content: Fa hihinana sy handry izy, ka tsy hisy hanaitaitra azy.
  '14':
  - type: text
    content: Mihobia, ry Ziona zanakavavy;
  - type: text
    content: Manaova feo fifaliana, ry Isiraely;
  - type: text
    content: Mifalia sy miravoravoa amin’ny fonao rehetra, ry Jerosalema zanakavavy.
  '15':
  - type: text
    content: Jehovah efa nampitsahatra ny fitsarana anao ka nandroaka ny fahavalonao;
  - type: text
    content: Jehovah, Mpanjakan’ny Isiraely, no ao aminao;
  - type: text
    content: Tsy hahita loza intsony hianao.
  '16':
  - type: text
    content: 'Amin’izany andro izany dia holazaina amin’i Jerosalema hoe: Aza matahotra'
  - type: text
    content: Ary aza miraviravy tànana, ry Ziona.
  '17':
  - type: text
    content: Jehovah Andriamanitrao no ao aminao,
  - type: text
    content: Mahery Izy ka hamonjy;
  - type: text
    content: Hiravoravo anao amin’ny fifaliana Izy;
  - type: text
    content: Ho sondriana
  - type: note
    content: Heb. hangina.
  - type: text
    content: ' amin’ny fitiavany Izy;'
  - type: text
    content: Hifaly anao amin’ny fihobiana Izy.
  '18':
  - type: text
    content: Hangoniko izay manina
  - type: note
    content: 'Na: efa lavitra.'
  - type: text
    content: ' ny fotoam-pivavahana;'
  - type: text
    content: Avy aminao ihany ireny,
  - type: text
    content: Ary itambesaran’ny latsa izy.
  - type: note
    content: 'Na: Ary mitambesatra aminy ny fandatsana anao (Heb. fandatsana azy); na: Avy taminao izay itambesaran’ny latsa ireny.'
  '19':
  - type: text
    content: Indro, hasiako amin’izany andro izany izay rehetra nampahory anao;
  - type: text
    content: Hovonjeko ny mandringa, ary hovoriko ny noroahina,
  - type: text
    content: Eny, hataoko ho fiderana sy ho anarana ireny izay efa nitondra henatra tany amin’ny tany rehetra.
  - type: note
    content: 'Na: any amin’ny tany rehetra izay efa nitondrany henatra.'
  '2':
  - type: text
    content: Tsy nihaino ny feo izy,
  - type: text
    content: Na nino anatra;
  - type: text
    content: Jehovah tsy nitokiany,
  - type: text
    content: Andriamaniny tsy nohatoniny.
  '20':
  - type: text
    content: Amin’izany andro izany no hitondrako anareo miditra,
  - type: text
    content: Eny, amin’izany andro izany no hanangonako anareo;
  - type: text
    content: Fa hataoko ho anarana sy ho fiderana any amin’ny firenena rehetra amin’ny tany hianareo,
  - type: text
    content: Raha hampodiko avy amin’ny fahababoana hianareo, ka ho hitan’ny masonareo izany, hoy Jehovah.
  '3':
  - type: text
    content: Liona mierona ao aminy ireo lehibeny;
  - type: text
    content: Amboadia
  - type: note
    content: Lopa.
  - type: text
    content: ' hariva ny mpitsarany'
  - type: text
    content: Ka tsy mamela
  - type: note
    content: 'Na: tsy mamela taolana.'
  - type: text
    content: ' ho tra-maraina.'
  '4':
  - type: text
    content: Vavana sady mpamitaka ny mpaminaniny;
  - type: text
    content: Mandoto izay masina ny mpisorony,
  - type: text
    content: Eny, mamadika ny lalàna izy.
  '5':
  - type: text
    content: Jehovah no marina ao afovoany,
  - type: text
    content: Tsy manao izay tsy marina Izy;
  - type: text
    content: Isa-maraina isa-maraina no amoahany ny fitsarany ho amin’ny mazava, ka tsy diso izany;
  - type: text
    content: Fa ny tsy marina tsy mba mahalala henatra.
  '6':
  - type: text
    content: Efa nahafongana firenena Aho,
  - type: text
    content: Rava ny tilikambo eny amin’ny zorony;
  - type: text
    content: Nosimbako ny làlany tsy hisy mpandeha;
  - type: text
    content: Rava ny tanànany, ka tsy misy olona,
  - type: text
    content: Eny, tsy misy mponina.
  '7':
  - type: text
    content: 'Hoy Izaho: Hatahotra Ahy tokoa hianao ka hino anatra,'
  - type: text
    content: Dia tsy ho rava ny fonenanao,
  - type: note
    content: Heb. fonenany.
  - type: text
    content: Araka izay rehetra voatendriko hamelezana anao;
  - type: note
    content: Heb. azy.
  - type: text
    content: Kanefa nifoha maraina koa izy ka nanao izay ratsy rehetra.
  '8':
  - type: text
    content: Koa miandrasa Ahy hianareo, hoy Jehovah,
  - type: text
    content: Ambara-pihavin’ny andro hitsanganako haka babo;
  - type: text
    content: 'Fa izao no kasaiko hatao:'
  - type: text
    content: Hamory firenena sy hanangona fanjakana Aho,
  - type: text
    content: Hanidinako ny fahatezerako amin’ireo, dia ny firehetan’ny fahatezerako rehetra,
  - type: text
    content: Ka ho levon’ny afon’ny fahasaro-piaroko ny tany rehetra.
  - type: heading
    content: Ny amin’ny hibebahan’ny jentilisa, sy ny hanomezam-boninahitra ny Isiraely.
  '9':
  - type: text
    content: FA amin’izany dia hovako ho madio ny molotry ny firenena,
  - type: text
    content: Hiantsoan’izy rehetra ny anaran’i Jehovah, hanompoany Azy amin’ny firaisan-kina.
  - type: note
    content: Heb. soroka iray.
