document_id: 2JN.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra ny amin’ny faharetana amin’ny marina, sy ny tsy handraisana ny mpampianatra sandoka.
  - type: text
    content: IZAHO loholona
  - type: note
    content: Gr. Ny presbytera.
  - type: text
    content: ' mamangy an’itompokovavy'
  - type: note
    content: 'Na: an’i Kyria.'
  - type: text
    content: ' voafidy sy ny zanany, izay tiako amin’ny fahamarinana (ary tsy izaho ihany, fa izay rehetra mahalala ny marina koa) '
  '10':
  - type: text
    content: 'Raha misy olona mankeo aminareo ka tsy mitondra izao fampianarana izao, aza mampiantrano azy na miarahaba azy akory; '
  '11':
  - type: text
    content: fa izay miarahaba azy dia miombona amin’ny ratsy ataony.
  '12':
  - type: text
    content: 'Manana zavatra maro hosoratana aminareo aho, nefa tsy tiako hatao amin’ny taratasy sy ny ranomainty izany; fa manantena ho tonga atỳ aminareo aho ka hiteny mifanatrika, mba ho tanteraka ny fifalianareo. '
  '13':
  - type: text
    content: Ny zanaky ny rahavavinao voafidy manao veloma anao.
  '2':
  - type: text
    content: 'noho ny fahamarinana izay mitoetra ato anatintsika sady ho ato amintsika mandrakizay: '
  '3':
  - type: text
    content: ho amintsika ny fahasoavana sy ny famindrampo ary ny fiadanana avy amin’Andriamanitra Ray sy Jesosy Kristy, Zanaky ny Ray, amin’ny fahamarinana sy ny fitiavana.
  '4':
  - type: text
    content: 'Faly indrindra aho, satria misy hitako ny zanakao sasany mandeha amin’ny fahamarinana araka ny nandraisantsika didy tamin’ny Ray. '
  '5':
  - type: text
    content: Ary mangataka aminao aho ankehitriny, tompokovavy,
  - type: note
    content: 'Na: ry Kyria.'
  - type: text
    content: ' tsy toy ny manoratra didy vaovao aminao, fa ilay nananantsika hatramin’ny voalohany ihany, dia aoka hifankatia isika. '
  '6':
  - type: text
    content: Ary izao no fitiavana, dia ny handehanantsika araka ny didiny. Izany no didy, tahaka ny efa renareo hatramin’ny taloha ihany, dia ny handehananareo aminy.
  '7':
  - type: text
    content: 'Fa maro ny mpamitaka efa lasa any amin’izao tontolo izao, dia ireny tsy manaiky fa efa tonga tamin’ny nofo Jesosy Kristy. Izy no mpamitaka sy antikristy. '
  '8':
  - type: text
    content: 'Mitandrema hianareo, fandrao mahavery izay namonoanay tena, fa mba handraisanareo valim-pitia tanteraka. '
  '9':
  - type: text
    content: 'Izay rehetra mitarika nefa tsy mitoetra ao amin’ny fampianaran’i Kristy, dia tsy manana an’Andriamanitra. Izay mitoetra ao amin’ny fampianarana, dia izy no manana ny Ray sy ny Zanaka. '
