document_id: JER.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahantomotry ny loza voalaza.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HIANAREO, zanak’i Benjamina, mandosira faingana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiala an’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsofy ao Tekoa ny anjomara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manaova tsangan-afo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manangàna famantarana.
      marker-yv: yv-n
    - type: text
      text: ' ao Beti-hakerema;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy loza sy fandringanana be miposaka avy any avaratra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hilazako sy hanariko mba handrenesany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny sofiny dia tsy voafora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mahahaino izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He! tsatsoiny ny tenin’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy ankamaminy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahatezeran’i Jehovah mahafeno ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy zakako tsindriana intsony!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aidino amin’ny ankizy madinika eny an-dàlambe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny fiokoan’ny zatovo izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na lehilahy na vehivavy dia hosamborina avokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anti-panahy mbamin’ny ela niainana koa;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho lasan’ny sasany ny tranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny sahany sy ny vehivavy koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hahinjitro amin’ny mponina amin’ny tany ny tànako, hoy Jehovah.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria izy rehetra, na ny kely na ny lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia samy fatra-pila harena avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny mpaminany na ny mpisorona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia samy mamitaka avokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nataotaony foana ny fanasitranany ny faharatran’ny oloko zanakavavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tamin’ny nanaovany hoe: Fiadanana, fiadanana;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tsy misy fiadanana tsinona!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nomenarina izy noho ny nanaovany fahavetavetana,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy mba menatra akory izy ary tsy mba valahara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ho lavo ao amin’izay lavo izy,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro hamaliako azy dia ho tafintohina izy, hoy Jehovah.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijanòna eo an-dàlana hianareo, ka izahao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary anontanio izay làlana masaka hatry ny ela.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay làlana mankany amin’ny tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka iny no izory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hahita fitsaharana ho an’ny fanahinareo hianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nefa hoy izy: Tsy hizotra izahay.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary nasiako mpitily hianareo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy ny feon’ny anjomara!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nefa hoy hianareo:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izy.
      marker-yv: yv-n
    - type: text
      text: ' Tsy hihaino izahay.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa henoinareo, ry jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho fantatrareo, ry fiangonana, ny hanjo azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henoy, ry tany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Izaho hahatonga loza amin’ity firenena ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny vokatry ny heviny ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy nihaino ny teniko izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nolaviny ny lalàko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ziona zanakavavy dia ampitoviako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fiandrasan-ondry misy ahitra milenodenoka.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aringako ilay tsara tarehy sy mihantahanta, dia Ziona zanakavavy.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no itondrana ditin-kazo mani-pofona avy any Sheba Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy veromanitra avy any amin’ny tany lavitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy sitrako ny fanatitra doranareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mamiko ny zavatra vonoinareo hatao fanatitra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hasiako fahatafintohinana eo amin’ity firenena ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia samy ho tafintohina amin’izany ny ray mbamin’ny zanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho faty ny olona mbamin’ny namany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, misy firenena avy any amin’ny tany avaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia firenena lehibe mitsangana avy any amin’ny faran’ny tany;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsipìka sy lefona no entiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozabe sady tsy mamindra fo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feony dia mirohondrohona toy ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mitaingin-tsoavaly izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary voaomana tahaka ny lehilahy ho amin’ny ady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamelezana anao, ry Ziona zanakavavy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa renay ny lazany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miraviravy tànana izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahoriana no mahazo anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, fanaintainana tahaka ny vehivavy raha miteraka.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mivoaka ho any an-tsaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mandeha amin’ny làlambe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manan-tsabatra ny fahavalo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy fampangorohoroana manodidina.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry oloko zanakavavy, misikìna lamba fisaonana hianao, ary mihosena lavenona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manaova fisaonana toy ny fisaonana zanakalahy tokana, dia fitomaniana fatratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho avy tampoka amintsika ny mpandringana.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho mpizaha toetra ao amin’ny oloko no nanendreko anao, dia ho fiarovana mafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ho fantatrao sy hizahanao toetra ny alehany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tena maditra avokoa izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandehandeha manaratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Varahina sy vy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy mpanao ratsy avokoa izy rehetra.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May ny tafoforana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levon’ny afo ny firaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foana ny nandrendrehan’ny mpandrendrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy voaisotra ny ratsy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao aminy no alehan’ny mpiandry sy ny ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haoriny manodidina azy ny lainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka samy handany ny ao akaikiny avy izy.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataon’ny olona hoe ,Volafotsy tsy lany’ izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy lanin’i Jehovah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitaova hianareo hanao ady masina hamelezana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ka andeha isika hiakatra antoandro.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozantsika! fa lasan-davitra ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka efa mandroso ny aloky ny hariva.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ka andeha isika hanao latsak’alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka horavantsika ny trano-beny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izao no lazain’i Jehovah, Tompon’ny maro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kapao ny hazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manandrata tovon-tany hamelezana an’i Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Io ilay tanàna hovaliana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno fampahoriana ny ao anatiny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny loharano mampiboiboika ny ranony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No ampiboiboihany ny faharatsiany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An-keriny sy fandravana no re ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo anatrehako mandrakariva ny faharariana sy ny faharatrana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Minoa anatra hianao, ry Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao miombotra miala aminao ny fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fandrao hataoko tany lao hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tany tsy honenana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotsimponina fatratra toy ny fitsimpona voaloboka izay sisa amin’ny Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avereno ho amin’ny sakeliny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: harona.
      marker-yv: yv-n
    - type: text
      text: ' ny tànanao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny mpioty voaloboka.
