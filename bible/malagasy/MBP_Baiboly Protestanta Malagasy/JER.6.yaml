document_id: JER.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahantomotry ny loza voalaza.
  - type: text
    content: HIANAREO, zanak’i Benjamina, mandosira faingana
  - type: text
    content: Hiala an’i Jerosalema,
  - type: text
    content: Ary tsofy ao Tekoa ny anjomara,
  - type: text
    content: Ka manaova tsangan-afo
  - type: note
    content: 'Na: manangàna famantarana.'
  - type: text
    content: ' ao Beti-hakerema;'
  - type: text
    content: Fa misy loza sy fandringanana be miposaka avy any avaratra.
  '10':
  - type: text
    content: Iza no hilazako sy hanariko mba handrenesany?
  - type: text
    content: Indro, ny sofiny dia tsy voafora,
  - type: text
    content: Ka tsy mahahaino izy;
  - type: text
    content: He! tsatsoiny ny tenin’i Jehovah
  - type: text
    content: Ka tsy ankamaminy.
  '11':
  - type: text
    content: Fa ny fahatezeran’i Jehovah mahafeno ahy
  - type: text
    content: Ka tsy zakako tsindriana intsony!
  - type: text
    content: Aidino amin’ny ankizy madinika eny an-dàlambe
  - type: text
    content: Sy amin’ny fiokoan’ny zatovo izany;
  - type: text
    content: Fa na lehilahy na vehivavy dia hosamborina avokoa,
  - type: text
    content: Ary ny anti-panahy mbamin’ny ela niainana koa;
  '12':
  - type: text
    content: Ary ho lasan’ny sasany ny tranony
  - type: text
    content: Mbamin’ny sahany sy ny vehivavy koa;
  - type: text
    content: Fa hahinjitro amin’ny mponina amin’ny tany ny tànako, hoy Jehovah.
  '13':
  - type: text
    content: Satria izy rehetra, na ny kely na ny lehibe,
  - type: text
    content: Dia samy fatra-pila harena avokoa;
  - type: text
    content: Na ny mpaminany na ny mpisorona
  - type: text
    content: Dia samy mamitaka avokoa.
  '14':
  - type: text
    content: Fa nataotaony foana ny fanasitranany ny faharatran’ny oloko zanakavavy
  - type: text
    content: 'Tamin’ny nanaovany hoe: Fiadanana, fiadanana;'
  - type: text
    content: Kanjo tsy misy fiadanana tsinona!
  '15':
  - type: text
    content: Nomenarina izy noho ny nanaovany fahavetavetana,–
  - type: text
    content: Nefa tsy mba menatra akory izy ary tsy mba valahara;
  - type: text
    content: Koa ho lavo ao amin’izay lavo izy,–
  - type: text
    content: Amin’ny andro hamaliako azy dia ho tafintohina izy, hoy Jehovah.
  '16':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Mijanòna eo an-dàlana hianareo, ka izahao,
  - type: text
    content: Ary anontanio izay làlana masaka hatry ny ela.
  - type: text
    content: Dia izay làlana mankany amin’ny tsara,
  - type: text
    content: Ka iny no izory,
  - type: text
    content: Dia hahita fitsaharana ho an’ny fanahinareo hianareo;
  - type: text
    content: 'Nefa hoy izy: Tsy hizotra izahay.'
  '17':
  - type: text
    content: 'Ary nasiako mpitily hianareo '
  - type: text
    content: 'hanao hoe:'
  - type: text
    content: Henoy ny feon’ny anjomara!
  - type: text
    content: 'Nefa hoy hianareo:'
  - type: note
    content: Heb. izy.
  - type: text
    content: ' Tsy hihaino izahay.'
  '18':
  - type: text
    content: Koa henoinareo, ry jentilisa,
  - type: text
    content: Ary aoka ho fantatrareo, ry fiangonana, ny hanjo azy.
  '19':
  - type: text
    content: Henoy, ry tany!
  - type: text
    content: Indro, Izaho hahatonga loza amin’ity firenena ity,
  - type: text
    content: Dia ny vokatry ny heviny ihany;
  - type: text
    content: Fa tsy nihaino ny teniko izy,
  - type: text
    content: Ary nolaviny ny lalàko.
  '2':
  - type: text
    content: Ziona zanakavavy dia ampitoviako
  - type: text
    content: Amin’ny fiandrasan-ondry misy ahitra milenodenoka.
  - type: note
    content: 'Na: Aringako ilay tsara tarehy sy mihantahanta, dia Ziona zanakavavy.'
  '20':
  - type: text
    content: Nahoana no itondrana ditin-kazo mani-pofona avy any Sheba Aho
  - type: text
    content: Sy veromanitra avy any amin’ny tany lavitra?
  - type: text
    content: Tsy sitrako ny fanatitra doranareo,
  - type: text
    content: Ary tsy mamiko ny zavatra vonoinareo hatao fanatitra.
  '21':
  - type: text
    content: 'Koa izao no lazain’i Jehovah:'
  - type: text
    content: Indro, hasiako fahatafintohinana eo amin’ity firenena ity,
  - type: text
    content: Ka dia samy ho tafintohina amin’izany ny ray mbamin’ny zanany;
  - type: text
    content: Ho faty ny olona mbamin’ny namany.
  '22':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Indro, misy firenena avy any amin’ny tany avaratra,
  - type: text
    content: Dia firenena lehibe mitsangana avy any amin’ny faran’ny tany;
  '23':
  - type: text
    content: Tsipìka sy lefona no entiny,
  - type: text
    content: Lozabe sady tsy mamindra fo izy;
  - type: text
    content: Ny feony dia mirohondrohona toy ny ranomasina,
  - type: text
    content: Sady mitaingin-tsoavaly izy
  - type: text
    content: Ary voaomana tahaka ny lehilahy ho amin’ny ady,
  - type: text
    content: Hamelezana anao, ry Ziona zanakavavy.
  '24':
  - type: text
    content: Efa renay ny lazany,
  - type: text
    content: Ka miraviravy tànana izahay;
  - type: text
    content: Fahoriana no mahazo anay,
  - type: text
    content: Eny, fanaintainana tahaka ny vehivavy raha miteraka.
  '25':
  - type: text
    content: Aza mivoaka ho any an-tsaha,
  - type: text
    content: Ary aza mandeha amin’ny làlambe;
  - type: text
    content: Fa manan-tsabatra ny fahavalo,
  - type: text
    content: Misy fampangorohoroana manodidina.
  '26':
  - type: text
    content: Ry oloko zanakavavy, misikìna lamba fisaonana hianao, ary mihosena lavenona,
  - type: text
    content: Ka manaova fisaonana toy ny fisaonana zanakalahy tokana, dia fitomaniana fatratra;
  - type: text
    content: Fa ho avy tampoka amintsika ny mpandringana.
  '27':
  - type: text
    content: Ho mpizaha toetra ao amin’ny oloko no nanendreko anao, dia ho fiarovana mafy,
  - type: text
    content: Mba ho fantatrao sy hizahanao toetra ny alehany.
  '28':
  - type: text
    content: Tena maditra avokoa izy rehetra
  - type: text
    content: Ka mandehandeha manaratsy,
  - type: text
    content: Varahina sy vy izy;
  - type: text
    content: Samy mpanao ratsy avokoa izy rehetra.
  '29':
  - type: text
    content: May ny tafoforana,
  - type: text
    content: Levon’ny afo ny firaka,
  - type: text
    content: Foana ny nandrendrehan’ny mpandrendrika,
  - type: text
    content: Fa tsy voaisotra ny ratsy.
  '3':
  - type: text
    content: Ao aminy no alehan’ny mpiandry sy ny ondry;
  - type: text
    content: Haoriny manodidina azy ny lainy,
  - type: text
    content: Ka samy handany ny ao akaikiny avy izy.
  '30':
  - type: text
    content: Ataon’ny olona hoe ,Volafotsy tsy lany’ izy,
  - type: text
    content: Satria tsy lanin’i Jehovah.
  '4':
  - type: text
    content: Mitaova hianareo hanao ady masina hamelezana azy;
  - type: text
    content: Mitsangàna, ka andeha isika hiakatra antoandro.
  - type: text
    content: Lozantsika! fa lasan-davitra ny andro,
  - type: text
    content: Ka efa mandroso ny aloky ny hariva.
  '5':
  - type: text
    content: Mitsangàna, ka andeha isika hanao latsak’alina,
  - type: text
    content: Ary aoka horavantsika ny trano-beny.
  '6':
  - type: text
    content: Fa izao no lazain’i Jehovah, Tompon’ny maro;
  - type: text
    content: Kapao ny hazo,
  - type: text
    content: Ary manandrata tovon-tany hamelezana an’i Jerosalema;
  - type: text
    content: Io ilay tanàna hovaliana,
  - type: text
    content: Feno fampahoriana ny ao anatiny.
  '7':
  - type: text
    content: Toy ny loharano mampiboiboika ny ranony
  - type: text
    content: No ampiboiboihany ny faharatsiany;
  - type: text
    content: An-keriny sy fandravana no re ao aminy;
  - type: text
    content: Eo anatrehako mandrakariva ny faharariana sy ny faharatrana.
  '8':
  - type: text
    content: Minoa anatra hianao, ry Jerosalema,
  - type: text
    content: Fandrao miombotra miala aminao ny fanahiko,
  - type: text
    content: Ary fandrao hataoko tany lao hianao,
  - type: text
    content: Dia tany tsy honenana.
  '9':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Hotsimponina fatratra toy ny fitsimpona voaloboka izay sisa amin’ny Isiraely;
  - type: text
    content: Avereno ho amin’ny sakeliny
  - type: note
    content: 'Na: harona.'
  - type: text
    content: ' ny tànanao'
  - type: text
    content: Toy ny mpioty voaloboka.
