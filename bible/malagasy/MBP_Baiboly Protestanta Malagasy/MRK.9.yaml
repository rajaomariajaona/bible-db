document_id: MRK.9,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy Izy taminy: Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny fanjakan’Andriamanitra tonga amin’ny hery.'
  - type: heading
    content: Ny niovan’i Jesosy tarehy tao an-tendrombohitra.
  - type: heading
    content: Mat. 17.1-13; Lio. 9.28-36.
  '10':
  - type: text
    content: Ary nitana izany teny izany izy ka nifampaka saina ny amin’izay hevitr’izany fitsanganana amin’ny maty izany.
  '11':
  - type: text
    content: 'Dia nanontany an’i Jesosy izy ka nanao hoe: Lazain’'
  - type: note
    content: 'Na: Nahoana no lazain’.'
  - type: text
    content: ' ny mpanora-dalàna fa Elia tsy maintsy ho avy aloha. '
  '12':
  - type: text
    content: 'Ary Izy nanao taminy hoe: Elia dia avy aloha ihany ka mampody ny zavatra rehetra. Ary ahoana kosa no nanoratana ny amin’ny Zanak’olona fa tsy maintsy mijaly mafy Izy ka hatao tsinontsinona? '
  '13':
  - type: text
    content: 'Nefa lazaiko aminareo: Efa tonga Elia, sady nataon’ny olona taminy izay sitraky ny fony araka ny nanoratana azy.'
  - type: heading
    content: Ny nahasitranan’i Jesosy ilay zazalahy nampahorin’ny demonia.
  - type: heading
    content: Mat. 17.14-20; Lio. 9.37-43.
  '14':
  - type: text
    content: 'ARY nony tonga teo amin’ny mpianatra izy, dia nahita vahoaka betsaka manodidina azy sy mpanora-dalàna niady hevitra taminy. '
  '15':
  - type: text
    content: 'Ary niaraka tamin’izay, nony nahita Azy ny vahoaka rehetra, dia talanjona ka nihazakazaka nanatona sy niarahaba Azy. '
  '16':
  - type: text
    content: 'Ary Izy nanontany azy hoe: Inona no iadianareo hevitra amin’ireto? '
  '17':
  - type: text
    content: 'Ary ny anankiray tamin’ny vahoaka namaly ka nanao hoe: Mpampianatra ô, nentiko ho etỳ aminao ny zanako-lahy, izay azom-panahy moana; '
  '18':
  - type: text
    content: ary na aiza na aiza no ahazoany azy, dia ampihinjitrinjiriny izy, ary mandoa vory, dia mikitro-nify sady valaka dia valaka; ary niteny tamin’ny mpianatrao aho mba hamoaka izany; fa tsy hainy.
  '19':
  - type: text
    content: 'Ary Jesosy namaly azy hoe: Ry taranaka tsy mino, mandra-pahoviana no hitoerako aminareo? mandra-pahoviana no handeferako aminareo? Ento etỳ amiko izy. '
  '2':
  - type: text
    content: 'ARY nony afaka henemana, Jesosy dia naka an’i Petera sy Jakoba ary Jaona ka nitondra azy nitokana niakatra ho any an-tendrombohitra avo anankiray; dia niova tarehy teo anatrehany Izy, '
  '20':
  - type: text
    content: 'Dia nentiny teo aminy izy; fa nony nahita an’i Jesosy izy, dia nampifanintontsintona ny tenany niaraka tamin’izay ny fanahy. Dia lavo tamin’ny tany izy sady nitsinkasinkasina sy nandoa vory. '
  '21':
  - type: text
    content: 'Ary Jesosy nanontany an-drainy hoe: Hoatrinona izay no nahatongavan’izao taminy? Ary hoy izy: Hatry ny fony izy mbola zaza. '
  '22':
  - type: text
    content: 'Ary nazerany matetika tao anaty afo sy tao anaty rano izy hamonoany azy; fa raha mba misy hainao, dia mamindrà fo aminay, ka vonjeo izahay. '
  '23':
  - type: text
    content: 'Fa hoy Jesosy taminy: Hainao hoe? Ny zavatra rehetra dia hain’ny mino. '
  '24':
  - type: text
    content: Ary niaraka tamin’izay dia niantso
  - type: note
    content: 'Ampio hoe: [sady nandrotsa-dranomaso].'
  - type: text
    content: ' ny rain-drazazalahy ka nanao hoe: Mino aho; vonjeo aho ho afaka amin’ny tsi-finoako.'
  '25':
  - type: text
    content: 'Ary nony hitan’i Jesosy fa nihazakazaka nanatona azy ny vahoaka, dia niteny mafy ny fanahy maloto Izy ka nanao taminy hoe: Ry fanahy moana sy marenina! Izaho mandidy anao: Mivoaha aminy, ka aza miditra ao anatiny intsony. '
  '26':
  - type: text
    content: 'Ary rehefa ninananana izy sady nampifanintontsintona mafy '
  - type: text
    content: ilay zazalahy,
  - type: text
    content: ' dia nivoaka taminy; ary efa toy ny maty, ka dia nataon’ny maro hoe: Maty. '
  '27':
  - type: text
    content: Fa Jesosy nandray ny tànany ka nanarina azy; dia nitsangana izy.
  '28':
  - type: text
    content: 'Ary rehefa tonga tao an-trano Jesosy, dia nanontany Azy mangingina ny mpianany hoe: Izahay'
  - type: note
    content: 'Na: Nahoana izahay no.'
  - type: text
    content: ' tsy nahavoaka azy. '
  '29':
  - type: text
    content: 'Ary hoy Izy taminy: Iny karazana iny tsy mba azo avoaka na amin’inona na amin’inona, afa-tsy amin’ny fivavahana'
  - type: note
    content: 'Ampio hoe: [sy ny fifadian-kanina].'
  - type: text
    content: ' ihany.'
  - type: heading
    content: Ny nilazan’i Jesosy fanindroany ny hahafatesany sy ny hitsanganany indray.
  - type: heading
    content: Mat. 17.22,23; Lio. 9.43-45.
  '3':
  - type: text
    content: 'ary ny fitafiany niova nanelatrelatra sady fotsy indrindra, ka tsy misy mpamotsy lamba ambonin’ny tany mahafotsy toy izany. '
  '30':
  - type: text
    content: 'DIA niala teo izy ka nizotra namaky an’i Galilia, ary tsy tian’i Jesosy ho fantatry ny olona izany. '
  '31':
  - type: text
    content: 'Fa nampianatra ny mpianany Izy ka nanao taminy hoe: Ny Zanak’olona dia hatolotra eo an-tànan’ny olona ka hovonoiny; ary rehefa voavono Izy, dia hitsangana rehefa afaka hateloana. '
  '32':
  - type: text
    content: Fa izy ireo tsy nahafantatra izany teny izany sady natahotra hanontany Azy.
  - type: heading
    content: Ny nampianaran’i Jesosy ny mpianany hanetry tena sy hifankatia.
  - type: heading
    content: Mat. 18.1-35; Lio. 9.46-50.
  '33':
  - type: text
    content: 'ARY tonga tao Kapernaomy izy; ary rehefa mby tao an-trano Jesosy, dia nanontany ny mpianany hoe: Inona no niadianareo hevitra teny an-dàlana? '
  '34':
  - type: text
    content: Fa tsy nahateny izy satria efa niady hevitra teny an-dàlana izy ny amin’izay lehibe indrindra.
  '35':
  - type: text
    content: 'Ary rehefa tafapetraka Jesosy, dia niantso ny roa ambin’ny folo lahy Izy ka nanao taminy hoe: Raha misy te-ho voalohany, dia hatao farany amin’izy rehetra sy ho mpanompon’izy rehetra izy. '
  '36':
  - type: text
    content: 'Ary nandray zaza Izy ka nametraka azy teo afovoany; ary raha notrotroiny ilay zaza, dia hoy Izy tamin’ny mpianany: '
  '37':
  - type: text
    content: Na zovy na zovy no mandray zaza iray tahaka itony amin’ny anarako, dia mandray Ahy; ary na zovy na zovy no mandray Ahy, dia tsy mandray Ahy, fa Izay naniraka Ahy.
  '38':
  - type: text
    content: 'Ary hoy Jaona taminy: Mpampianatra ô, nahita olona anankiray namoaka demonia tamin’ny anaranao izahay, ka noraranay izy, satria tsy nanaraka antsika. '
  '39':
  - type: text
    content: 'Fa hoy Jesosy: Aza mandrara azy; fa tsy misy olona izay hanao asa lehibe amin’ny anarako ka hahateny ratsy Ahy vetivety. '
  '4':
  - type: text
    content: Ary Elia sy Mosesy niseho taminy ka niresaka tamin’i Jesosy.
  '40':
  - type: text
    content: 'Fa izay tsy manohitra antsika dia momba antsika. '
  '41':
  - type: text
    content: Fa na iza na iza no manome anareo rano eran’ny kapoaka hosotroinareo, satria an’i Kristy hianareo, dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany.
  '42':
  - type: text
    content: 'Ary na iza na iza no mahatafintohina na iray aza amin’ireo madinika mino Ahy ireo, dia tsara ho azy, raha anantonana vato lehibe fikosoham-bary ny vozony, ka hatsipy ao anaty ranomasina izy. '
  '43':
  - type: text
    content: Ary raha ny tànanao no manafintohina anao, tapaho izy; fa tsara ho anao ny hiditra kilemaina any amin’ny fiainana noho ny manana tànana roa, nefa hariana any amin’ny helo,
  - type: note
    content: Gr. Gehena.
  - type: text
    content: ' dia any amin’ny afo tsy azo vonoina.'
  - type: note
    content: 'Ampio hoe: [44 any ny kankany tsy maty, ary ny afo tsy vonoina.]'
  - type: text
    content: ' '
  '45':
  - type: text
    content: Ary raha ny tongotrao no manafintohina anao, tapaho izy; fa tsara ho anao ny hiditra mandringa any amin’ny fiainana noho ny manana tongotra roa, nefa hariana any amin’ny helo.
  - type: note
    content: 'Ampio hoe: [any amin’ny afo tsy azo vonoina; 46 any ny kankany tsy maty, ary ny afo tsy vonoina.]'
  - type: text
    content: ' '
  '47':
  - type: text
    content: Ary raha ny masonao no manafintohina anao, esory hiala izy; fa tsara ho anao ny hiditra toka-maso amin’ny fanjakan’Andriamanitra noho ny manana maso roa, nefa hariana any amin’ny helo;
  - type: note
    content: Gr. Gehena.
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'any ny kankany tsy maty, ary ny afo tsy vonoina. '
  '49':
  - type: text
    content: Fa samy ho voasira amin’ny afo izy rehetra.
  - type: note
    content: 'Ampio hoe: [ary ny fanatitra rehetra samy ho voasira amin’ny fanasina.]'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Ary niteny Petera ka nanao tamin’i Jesosy hoe: Raby ô, tsara raha mitoetra eto isika; ary aoka hanao lay telo izahay: ny anankiray ho Anao, ny anankiray ho an’i Mosesy, ary ny anankiray ho an’i Elia. '
  '50':
  - type: text
    content: Tsara ny sira, fa raha tonga matsatso izy, inona no ho entinareo mampody ny tsirony? Aoka hisy sira ao anatinareo, ka mihavàna tsara hianareo.
  '6':
  - type: text
    content: 'Fa tsy fantany izay havaliny, satria efa raiki-tahotra izy rehetra. '
  '7':
  - type: text
    content: 'Ary nisy rahona niseho nanarona azy; ary dia nisy feo avy tao amin’ny rahona nanao hoe: Ity no Zanako malalako, Izy no henoy. '
  '8':
  - type: text
    content: Ary niaraka tamin’izay, nony nijery manodidina izy ireo, dia tsy nisy hitany intsony na iza na iza afa-tsy Jesosy irery ihany, Izay teo aminy.
  '9':
  - type: text
    content: 'Ary nony nidina avy teo an-tendrombohitra izy, dia nandrara azy Jesosy mba tsy hilazalaza amin’olona izay zavatra efa hitany mandra-pitsangan’ny Zanak’olona amin’ny maty. '
