document_id: JOB.7
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsy mpiantafika va ny zanak’olombelona etỳ ambonin’ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy tahaka ny andron’ny mpikarama va ny androny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toy ny mpanompo maniry alokaloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny mpikarama miandry ny karaman’ny asany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia toy izany no anaovana ahy hahita volana mampahory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary alina mahadisadisa no tendrena ho ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha vao mandry aho, dia mieritreritra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana re no hifoha aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mihalava izany ny alina,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hariva.
    marker-yv: yv-n
  - type: text
    text: ' ary mivadibadika indrindra aho mandra-pahazavan’ny andro.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny nofoko mitafy olitra sy baingan-tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa maina ny hoditro, kanjo mitsiranorano indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Faingana noho ny famahanan-tenona ny androko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka lany tsy misy fanantenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsarovy fa rivotra ny aiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hahita soa intsony ny masoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy hahita ahy intsony ny mason’izay mijery ahy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masonao hizaha ahy, fa tsy ho ao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tahaka ny rahona misava ka levona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka izany koa, izay midina any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' tsy mba hiakatra intsony;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy hiverina any an-tranony intsony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hahalala azy intsony ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary izaho dia tsy hamehy vava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hiteny noho ny fahorian’ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hitaraina noho ny fangidian’ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ranomasina va aho, na trozona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No dia asianao fiambenana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha hoy izaho: Hampionona ahy ny farafarako,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampitony ny fitarainako ny fandriako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia mampitahotra ahy amin’ny nofy Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampihorohoro ahy amin’ny tsindrimandry;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ka dia aleon’ny fanahiko ny hokendaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, aleoko ny fahafatesana aza toy izay izato fitofezako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: taolako.
    marker-yv: yv-n
  - type: text
    text: ' izato;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maharikoriko ahy izao, tsy tiako ny ho velona ela;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilaozy miala aho, fa fofona foana ny androko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Inona moa ny zanak’olombelona, no ekenao ho lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ampandinihinao azy ny fonao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sady fantarinao isa-maraina izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izahanao toetra isaky ny indray mipi-maso?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mandra-pahoviana re vao hihodina tsy hijery ahy Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mba hiala amiko mandrapi-teliko rora?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na dia ho nanota aza aho, nampaninona Anao moa izany, ry Mpandinika ny olombelona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no dia nataonao fikendry aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa tonga enta-mavesatra amiko aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nahoana no tsy mamela ny fahadisoako sy manaisotra ny heloko Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izao dia efa handry any amin’ny vovoka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitady ahy fatratra Hianao, fa tsy ho atỳ intsony aho.
