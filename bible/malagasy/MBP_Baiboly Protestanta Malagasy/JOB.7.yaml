document_id: JOB.7,873
type_code: plt
verses:
  '1':
  - type: text
    content: Tsy mpiantafika va ny zanak’olombelona etỳ ambonin’ny tany?
  - type: text
    content: Ary tsy tahaka ny andron’ny mpikarama va ny androny?
  '10':
  - type: text
    content: Tsy hiverina any an-tranony intsony izy,
  - type: text
    content: Ary tsy hahalala azy intsony ny fonenany.
  '11':
  - type: text
    content: Ary izaho dia tsy hamehy vava,
  - type: text
    content: Fa hiteny noho ny fahorian’ny fanahiko
  - type: text
    content: Sy hitaraina noho ny fangidian’ny aiko.
  '12':
  - type: text
    content: Ranomasina va aho, na trozona,
  - type: text
    content: No dia asianao fiambenana?
  '13':
  - type: text
    content: 'Raha hoy izaho: Hampionona ahy ny farafarako,'
  - type: text
    content: Hampitony ny fitarainako ny fandriako,
  '14':
  - type: text
    content: Dia mampitahotra ahy amin’ny nofy Hianao
  - type: text
    content: Ary mampihorohoro ahy amin’ny tsindrimandry;
  '15':
  - type: text
    content: Ka dia aleon’ny fanahiko ny hokendaina,
  - type: text
    content: Eny, aleoko ny fahafatesana aza toy izay izato fitofezako
  - type: note
    content: Heb. taolako.
  - type: text
    content: ' izato;'
  '16':
  - type: text
    content: Maharikoriko ahy izao, tsy tiako ny ho velona ela;
  - type: text
    content: Ilaozy miala aho, fa fofona foana ny androko.
  '17':
  - type: text
    content: Inona moa ny zanak’olombelona, no ekenao ho lehibe,
  - type: text
    content: Ka ampandinihinao azy ny fonao,
  '18':
  - type: text
    content: Sady fantarinao isa-maraina izy
  - type: text
    content: Sy izahanao toetra isaky ny indray mipi-maso?
  '19':
  - type: text
    content: Mandra-pahoviana re vao hihodina tsy hijery ahy Hianao,
  - type: text
    content: Ka mba hiala amiko mandrapi-teliko rora?
  '2':
  - type: text
    content: Toy ny mpanompo maniry alokaloka,
  - type: text
    content: Ary toy ny mpikarama miandry ny karaman’ny asany,
  '20':
  - type: text
    content: Na dia ho nanota aza aho, nampaninona Anao moa izany, ry Mpandinika ny olombelona?
  - type: text
    content: Nahoana no dia nataonao fikendry aho,
  - type: text
    content: Ka efa tonga enta-mavesatra amiko aho?
  '21':
  - type: text
    content: Ary nahoana no tsy mamela ny fahadisoako sy manaisotra ny heloko Hianao?
  - type: text
    content: Fa izao dia efa handry any amin’ny vovoka aho;
  - type: text
    content: Ary hitady ahy fatratra Hianao, fa tsy ho atỳ intsony aho.
  '3':
  - type: text
    content: Dia toy izany no anaovana ahy hahita volana mampahory,
  - type: text
    content: Ary alina mahadisadisa no tendrena ho ahy.
  '4':
  - type: text
    content: 'Raha vao mandry aho, dia mieritreritra hoe:'
  - type: text
    content: Rahoviana re no hifoha aho?
  - type: text
    content: Fa mihalava izany ny alina,
  - type: note
    content: Heb. hariva.
  - type: text
    content: ' ary mivadibadika indrindra aho mandra-pahazavan’ny andro.'
  '5':
  - type: text
    content: Ny nofoko mitafy olitra sy baingan-tany;
  - type: text
    content: Efa maina ny hoditro, kanjo mitsiranorano indray.
  '6':
  - type: text
    content: Faingana noho ny famahanan-tenona ny androko
  - type: text
    content: Ka lany tsy misy fanantenana.
  '7':
  - type: text
    content: 'Tsarovy fa rivotra ny aiko:'
  - type: text
    content: Ary tsy hahita soa intsony ny masoko.
  '8':
  - type: text
    content: 'Tsy hahita ahy intsony ny mason’izay mijery ahy:'
  - type: text
    content: Ny masonao hizaha ahy, fa tsy ho ao aho.
  '9':
  - type: text
    content: Tahaka ny rahona misava ka levona,
  - type: text
    content: Dia tahaka izany koa, izay midina any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' tsy mba hiakatra intsony;'
