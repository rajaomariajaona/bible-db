document_id: 2CO.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny nentin’i Paoly namaly izay nanohitra sy nanevateva ny fahefany ka nanao azy tsy ho Apostoly marina.
  - type: text
    content: 'ARY ny tenako, izaho Paoly, dia mananatra anareo amin’ny hamoram-panahy sy ny fandeferan’i Kristy, dia izaho, izay manetry tena, '
  - type: text
    content: hono,
  - type: text
    content: ' raha eo anatrehanareo, fa sahy aminareo kosa raha tsy eo. '
  '10':
  - type: text
    content: 'Fa ny epistiliny, hoy izy, dia mavesatra sy mahery; fa malemy kosa ny fanatrehan’ny tenany, ary tsinontsinona ny teniny. '
  '11':
  - type: text
    content: Aoka izany olona izany hihevitra izao, fa tahaka ny fiteninay amin’ny epistily, raha tsy eo izahay, dia ho tahaka izany koa ny asanay, rehefa tonga izahay.
  '12':
  - type: text
    content: 'Fa izahay tsy sahy hanao ny tenanay ho isan’ny sasany izay midera tena, na hampitaha ny tenanay aminy; fa tsy hendry ireny, satria manohatra ny tenany amin’ny tenany sy mampitaha ny tenany amin’ny tenany. '
  '13':
  - type: text
    content: 'Fa izahay tsy mba hirehareha tsy amin’ohatra, fa araka ny ohatry ny voafaritr’Andriamanitra ho anjaranay, dia ohatra mihatra aminareo. '
  '14':
  - type: text
    content: 'Fa tsy toy izay tsy mihatra aminareo izahay ka mihoatra ny faritry ny anjaranay; fa tonga hatrany aminareo aza izahay amin ny filazantsaran’i Kristy; '
  '15':
  - type: text
    content: 'tsy mirehareha tsy amin’ohatra amin’izay nisasaran’ny sasany izahay, fa manana fanantenana izahay fa rehefa mitombo ny finoanareo, dia hohalehibiazina ao aminareo izahay araka ny voafaritra ho anjaranay, sady mbola handroso ihany '
  '16':
  - type: text
    content: 'ka hitory ny filazantsara amin’ny tany any ankoatranareo, ary tsy hirehareha amin’izay efa vonona rahateo ao anatin’ny voafaritra ho an’ny sasany. '
  '17':
  - type: text
    content: 'Fa ,,izay mirehareha, dia aoka Jehovah no ho reharehany’’ (Jer. 9.23). '
  '18':
  - type: text
    content: Fa tsy izay midera tena no ankasitrahana, fa izay derain’ny Tompo.
  '2':
  - type: text
    content: Dia mangataka aho mba tsy ho sahy, rehefa tonga, amin’ny fahatokiana izay kasaiko hahasahiana amin’ny sasany, izay manao anay ho mandeha araka ny nofo.
  '3':
  - type: text
    content: Fa na dia velona amin’ny nofo aza izahay, dia tsy mba miady araka ny nofo (
  '4':
  - type: text
    content: 'fa tsy avy amin’ny nofo ny fiadian’ny tafikay, fa mahery amin’Andriamanitra handrava fiarovana mafy); '
  '5':
  - type: text
    content: 'fa mandrava ny fisainana sy ny zavatra avo rehetra izay atsangana hanohitra ny fahalalana an’Andriamanitra izahay ka mamabo ny hevitra rehetra hanaiky an’i Kristy, '
  '6':
  - type: text
    content: ary vonona hamaly ny tsi-fanarahana rehetra izahay, rehefa tanteraka ny fanarahanareo.
  '7':
  - type: text
    content: Mijery zavatra araka ny fisehony ihany va hianareo?
  - type: note
    content: 'Na: Mijery zavatra araka ny fisehony ihany hianareo.'
  - type: text
    content: ' Raha misy olona matoky ny tenany fa an’i Kristy, aoka izy hisaintsaina izao indray, fa tahaka ny mah’ an’i Kristy azy, no mah’ an’i Kristy anay koa. '
  '8':
  - type: text
    content: 'Fa na dia bebe ihany aza ny fireharehako ny amin’ny fahefany izay nomen’i Kristy anay hananganana, fa tsy handravana anareo, dia tsy hahazo henatra aho, '
  '9':
  - type: text
    content: 'mba tsy hisehoako toy ny ta-hampitahotra anareo amin’ny epistily. '
