document_id: MRK.8
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampihinanan’i Jesosy ny olona efatra arivo, sy ny teny nentiny namaly ny Fariseo izay nitady famantarana avy any an-danitra.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 15.32–16.4.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TAMIN’izany andro izany, nony betsaka indray ny vahoaka teo sady tsy nanan-kohanina izy, dia nantsoin’i Jesosy hanatona Azy ny mpianany ka nilazany hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mahonena Ahy ireo vahoaka, fa hateloana izay no nitoerany tatỳ amiko, sady tsy manan-kohanina izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'koa raha hampodiko ho any an-tranony mbola tsy nihinana izy, dia ho reraka eny an-dàlana, sady avy lavitra ny sasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny mpianany namaly Azy hoe: Aiza no hahazoana mofo atỳ an-efitra hahavoky ireto olona ireto! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Izy nanontany azy hoe: Misy mofo firy any aminareo? Ary hoy ireo: Fito.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nasainy nipetraka tamin’ny tany ny vahoaka; ary dia nandray ny mofo fito Izy, ka rehefa nisaotra, dia novakiny ka natolony ny mpianany mba harosony; dia narosony teny anoloan’ny vahoaka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy hazandrano madinika vitsy tao aminy; ka rehefa nanaovan’i Jesosy fisaorana ireo, dia nasainy naroso teny anoloany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nihinana ny olona, ka dia voky; ary nangoniny ny sombintsombiny sisa tsy lany, ka nisy fito sobiky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary tokony ho efatra arivo ireo. Dia nampodiny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary niaraka tamin’izay dia niondrana an-tsambokely Izy mbamin’ny mpianany ka tonga tany amin’ny fari-tanin’i Dalmanota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny Fariseo nankany, dia niady hevitra taminy ary naka fanahy Azy ka nitady famantarana avy any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nisento mafy am-panahy Jesosy ka nanao hoe: Nahoana ity taranaka ity no mitady famantarana? Lazaiko aminareo marina tokoa fa tsy homena famantarana akory ity taranaka ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nandao azy Izy, dia niondrana indray ka lasa nankeny am-pita.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nananaran’i Jesosy ny mpianany tsy hanaiky ny fampianaran’ny Fariseo.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 16.5-12.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ARY tsy tsaroan’ireo ny hitondra mofo, ka tsy nisy teo an-tsambokely afa-tsy mofo iray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nananatra azy Izy ka nanao hoe: Mihevera, ka mitandrema hianareo, fandrao azon’ny masirasiran’ny Fariseo sy ny masirasiran’i Heroda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary niara-nisaina izy ka nanao hoe: Ny tsy nitondrantsika mofo angaha izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jesosy nahalala izany, dia nanao taminy hoe: Nahoana hianareo no miara-misaina, satria tsy manana mofo? Tsy mbola mahazo an-tsaina na mahafantatra va hianareo? Efa mafy va ny fonareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mana-maso, fa tsy mahita va hianareo? Ary manan-tsofina, fa tsy mandre va hianareo? Ary tsy mahatadidy va hianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha ny mofo dimy no novakiko ho an’ny dimy arivo, firy harona moa no sombintsombiny nangoninareo? Hoy ny mpianany taminy: Roa ambin’ny folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha ny mofo fito ho an’ny efatra arivo, firy sobiky moa no sombintsombiny nangoninareo? Dia hoy ny mpianany: Fito. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Izy taminy: Mbola tsy mahafantatra ihany va hianareo?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampahiratan’i Jesosy ny lehilahy jamba anankiray tany Betsaida.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ARY tonga tany Betsaida izy; ary nisy nitondra lehilahy jamba teo amin’i Jesosy ka nangataka taminy hanendry ilay jamba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nitantana ilay jamba Izy ka nitondra azy teny ivelan’ny tanàna; ary rehefa nororany ny masony, ka napetrany taminy ny tànany, dia nanontaniany hoe izy: Mahita zavatra va hianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niandrandra ralehilahy ka nanao hoe: Mahita ny olona aho: fa toa hazo ny fijeriko azy, saingy mamindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia napetrany tamin’ny masony indray ny tànany, dia nibanjina ralehilahy ka nahiratra tsara, ary hitany miharihary ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Jesosy nampody azy ho any an-tranony ka nanao hoe: Aza mankao an-tanàna.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny naneken’i Petera an’i Jesosy ho Kristy, Zanak’Andriamanitra, ary ny nilazan’i Jesosy voalohany ny amin’ny hahafatesany sy ny hitsanganany amin’ny maty.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 16.13-28; Lio. 9.18-27.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ARY Jesosy sy ny mpianany dia lasa nankeny amin’ireny tanàna momba an’i Kaisaria-filipo; ary nony teny an-dàlana dia nanontany ny mpianany Izy ka nanao taminy hoe: Ataon’ny olona ho iza moa Aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary izy nanao taminy hoe: Jaona Mpanao-batisa; fa hoy ny sasany: Elia; ary hoy ny sasany: Anankiray amin’ny mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Jesosy nanontany azy hoe: Fa hianareo kosa manao Ahy ho iza? Dia namaly Petera ka nanao taminy hoe: Hianao no Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary nandrara azy rehetra Izy mba tsy hilazalaza Azy amin’olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nampianatra azy Izy fa ny Zanak’olona tsy maintsy hijaly mafy ka holavin’ny loholona sy ny lohan’ny mpisorona ary ny mpanora-dalàna, dia hovonoiny, ary rehefa afaka hateloana, dia hitsangana indray Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary naharihariny tsara no filaza izany teny izany.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary Petera nanohina Azy hitanila kely, dia niteny mafy Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa Izy nihodina, dia nijery ny mpianany ka niteny mafy an’i Petera hoe: Mankanesa ato ivohoko, ry Satana, satria tsy misaina izay an’Andriamanitra hianao, fa izay an’ny olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nantsoiny hanatona Azy ny vahoaka mbamin’ny mpianany, dia hoy Izy taminy: Raha misy ta-hanaraka Ahy, dia aoka izy handa ny tenany sy hitondra ny hazo fijaliany ka hanaraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa na iza na iza no ta-hamonjy ny ainy, dia hahavery azy; ary na iza na iza no hahavery ny ainy noho ny amiko sy ny filazantsara, dia hamonjy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa inona no soa azon’ny olona, raha mahazo izao tontolo izao aza, kanefa very ny ainy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa inona no homen’ny olona ho takalon’ny ainy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fa na iza na iza no ho menatra Ahy sy ny teniko amin’ity taranaka sady mijangajanga no manota ity, dia ho menatra azy kosa ny Zanak’olona, raha avy amin’ny voninahitry ny Rainy mbamin’ny anjely masina.
