document_id: MRK.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampihinanan’i Jesosy ny olona efatra arivo, sy ny teny nentiny namaly ny Fariseo izay nitady famantarana avy any an-danitra.
  - type: heading
    content: Mat. 15.32–16.4.
  - type: text
    content: 'TAMIN’izany andro izany, nony betsaka indray ny vahoaka teo sady tsy nanan-kohanina izy, dia nantsoin’i Jesosy hanatona Azy ny mpianany ka nilazany hoe: '
  '10':
  - type: text
    content: Ary niaraka tamin’izay dia niondrana an-tsambokely Izy mbamin’ny mpianany ka tonga tany amin’ny fari-tanin’i Dalmanota.
  '11':
  - type: text
    content: 'Ary ny Fariseo nankany, dia niady hevitra taminy ary naka fanahy Azy ka nitady famantarana avy any an-danitra. '
  '12':
  - type: text
    content: 'Ary nisento mafy am-panahy Jesosy ka nanao hoe: Nahoana ity taranaka ity no mitady famantarana? Lazaiko aminareo marina tokoa fa tsy homena famantarana akory ity taranaka ity. '
  '13':
  - type: text
    content: Ary nandao azy Izy, dia niondrana indray ka lasa nankeny am-pita.
  - type: heading
    content: Ny nananaran’i Jesosy ny mpianany tsy hanaiky ny fampianaran’ny Fariseo.
  - type: heading
    content: Mat. 16.5-12.
  '14':
  - type: text
    content: 'ARY tsy tsaroan’ireo ny hitondra mofo, ka tsy nisy teo an-tsambokely afa-tsy mofo iray ihany. '
  '15':
  - type: text
    content: 'Dia nananatra azy Izy ka nanao hoe: Mihevera, ka mitandrema hianareo, fandrao azon’ny masirasiran’ny Fariseo sy ny masirasiran’i Heroda. '
  '16':
  - type: text
    content: 'Ary niara-nisaina izy ka nanao hoe: Ny tsy nitondrantsika mofo angaha izany. '
  '17':
  - type: text
    content: 'Ary Jesosy nahalala izany, dia nanao taminy hoe: Nahoana hianareo no miara-misaina, satria tsy manana mofo? Tsy mbola mahazo an-tsaina na mahafantatra va hianareo? Efa mafy va ny fonareo? '
  '18':
  - type: text
    content: 'Mana-maso, fa tsy mahita va hianareo? Ary manan-tsofina, fa tsy mandre va hianareo? Ary tsy mahatadidy va hianareo? '
  '19':
  - type: text
    content: 'Raha ny mofo dimy no novakiko ho an’ny dimy arivo, firy harona moa no sombintsombiny nangoninareo? Hoy ny mpianany taminy: Roa ambin’ny folo. '
  '2':
  - type: text
    content: 'Mahonena Ahy ireo vahoaka, fa hateloana izay no nitoerany tatỳ amiko, sady tsy manan-kohanina izy; '
  '20':
  - type: text
    content: 'Ary raha ny mofo fito ho an’ny efatra arivo, firy sobiky moa no sombintsombiny nangoninareo? Dia hoy ny mpianany: Fito. '
  '21':
  - type: text
    content: 'Ary hoy Izy taminy: Mbola tsy mahafantatra ihany va hianareo?'
  - type: heading
    content: Ny nampahiratan’i Jesosy ny lehilahy jamba anankiray tany Betsaida.
  '22':
  - type: text
    content: 'ARY tonga tany Betsaida izy; ary nisy nitondra lehilahy jamba teo amin’i Jesosy ka nangataka taminy hanendry ilay jamba. '
  '23':
  - type: text
    content: 'Ary nitantana ilay jamba Izy ka nitondra azy teny ivelan’ny tanàna; ary rehefa nororany ny masony, ka napetrany taminy ny tànany, dia nanontaniany hoe izy: Mahita zavatra va hianao? '
  '24':
  - type: text
    content: 'Dia niandrandra ralehilahy ka nanao hoe: Mahita ny olona aho: fa toa hazo ny fijeriko azy, saingy mamindra. '
  '25':
  - type: text
    content: 'Dia napetrany tamin’ny masony indray ny tànany, dia nibanjina ralehilahy ka nahiratra tsara, ary hitany miharihary ny zavatra rehetra. '
  '26':
  - type: text
    content: 'Ary Jesosy nampody azy ho any an-tranony ka nanao hoe: Aza mankao an-tanàna.'
  - type: heading
    content: Ny naneken’i Petera an’i Jesosy ho Kristy, Zanak’Andriamanitra, ary ny nilazan’i Jesosy voalohany ny amin’ny hahafatesany sy ny hitsanganany amin’ny maty.
  - type: heading
    content: Mat. 16.13-28; Lio. 9.18-27.
  '27':
  - type: text
    content: 'ARY Jesosy sy ny mpianany dia lasa nankeny amin’ireny tanàna momba an’i Kaisaria-filipo; ary nony teny an-dàlana dia nanontany ny mpianany Izy ka nanao taminy hoe: Ataon’ny olona ho iza moa Aho? '
  '28':
  - type: text
    content: 'Ary izy nanao taminy hoe: Jaona Mpanao-batisa; fa hoy ny sasany: Elia; ary hoy ny sasany: Anankiray amin’ny mpaminany. '
  '29':
  - type: text
    content: 'Ary Jesosy nanontany azy hoe: Fa hianareo kosa manao Ahy ho iza? Dia namaly Petera ka nanao taminy hoe: Hianao no Kristy. '
  '3':
  - type: text
    content: 'koa raha hampodiko ho any an-tranony mbola tsy nihinana izy, dia ho reraka eny an-dàlana, sady avy lavitra ny sasany. '
  '30':
  - type: text
    content: Ary nandrara azy rehetra Izy mba tsy hilazalaza Azy amin’olona.
  '31':
  - type: text
    content: 'Dia nampianatra azy Izy fa ny Zanak’olona tsy maintsy hijaly mafy ka holavin’ny loholona sy ny lohan’ny mpisorona ary ny mpanora-dalàna, dia hovonoiny, ary rehefa afaka hateloana, dia hitsangana indray Izy. '
  '32':
  - type: text
    content: Ary naharihariny tsara no filaza izany teny izany.
  - type: text
    content: 'Ary Petera nanohina Azy hitanila kely, dia niteny mafy Azy. '
  '33':
  - type: text
    content: 'Fa Izy nihodina, dia nijery ny mpianany ka niteny mafy an’i Petera hoe: Mankanesa ato ivohoko, ry Satana, satria tsy misaina izay an’Andriamanitra hianao, fa izay an’ny olona.'
  '34':
  - type: text
    content: 'Ary nantsoiny hanatona Azy ny vahoaka mbamin’ny mpianany, dia hoy Izy taminy: Raha misy ta-hanaraka Ahy, dia aoka izy handa ny tenany sy hitondra ny hazo fijaliany ka hanaraka Ahy. '
  '35':
  - type: text
    content: 'Fa na iza na iza no ta-hamonjy ny ainy, dia hahavery azy; ary na iza na iza no hahavery ny ainy noho ny amiko sy ny filazantsara, dia hamonjy izany. '
  '36':
  - type: text
    content: 'Fa inona no soa azon’ny olona, raha mahazo izao tontolo izao aza, kanefa very ny ainy? '
  '37':
  - type: text
    content: 'Fa inona no homen’ny olona ho takalon’ny ainy? '
  '38':
  - type: text
    content: Fa na iza na iza no ho menatra Ahy sy ny teniko amin’ity taranaka sady mijangajanga no manota ity, dia ho menatra azy kosa ny Zanak’olona, raha avy amin’ny voninahitry ny Rainy mbamin’ny anjely masina.
  '4':
  - type: text
    content: 'Fa ny mpianany namaly Azy hoe: Aiza no hahazoana mofo atỳ an-efitra hahavoky ireto olona ireto! '
  '5':
  - type: text
    content: 'Ary Izy nanontany azy hoe: Misy mofo firy any aminareo? Ary hoy ireo: Fito.'
  '6':
  - type: text
    content: 'Dia nasainy nipetraka tamin’ny tany ny vahoaka; ary dia nandray ny mofo fito Izy, ka rehefa nisaotra, dia novakiny ka natolony ny mpianany mba harosony; dia narosony teny anoloan’ny vahoaka izany. '
  '7':
  - type: text
    content: 'Ary nisy hazandrano madinika vitsy tao aminy; ka rehefa nanaovan’i Jesosy fisaorana ireo, dia nasainy naroso teny anoloany koa. '
  '8':
  - type: text
    content: 'Ary nihinana ny olona, ka dia voky; ary nangoniny ny sombintsombiny sisa tsy lany, ka nisy fito sobiky. '
  '9':
  - type: text
    content: Ary tokony ho efatra arivo ireo. Dia nampodiny izy.
