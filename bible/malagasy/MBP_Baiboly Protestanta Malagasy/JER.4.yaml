document_id: JER.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Raha hiverina hianao, ry Isiraely, hoy Jehovah, dia ho amiko no hiverenanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha hanaisotra ny fahavetavetanao tsy ho eo imasoko hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy hivezivezy foana,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy izaho: Indrisy, Jehovah Tompo ô!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nofitahinao tokoa ity firenena ity sy Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tamin’ny nanaovanao hoe: Hisy fiadanana ho anareo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo mihatra amin’ny aina ny sabatra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Amin’izany andro izany dia holazaina amin’ity firenena ity sy Jerosalema hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisy rivo-mahamay avy any an-tendrombohitra mangadihady any an-efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hankamin’ny oloko zanakavavy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny lalàn’ny oloko zanakavavy dia rivotra mahamay, etc.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy hikororohana na hanadiovana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia ho tonga avy amiko izay rivotra mahery noho ireny;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia ho tonga etỳ amiko ny rivotra mahery izay avy amin’ireny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ankehitriny Izaho kosa hifandahatra aminy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Indro, avy toy ny rahona izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny tadio ny kalesiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faingana noho ny voromahery ny soavaliny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozantsika! fa lany ringana isika.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ry Jerosalema, sasao ny fonao ho afaka amin’ny ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hovonjena hianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no hitoeran’ny hevi-dratsinao ao am-ponao?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa injany! misy feo manambara avy any Dana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy filazam-pahoriana avy amin’ny tany havoan’i Efraima,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lazaonareo amin’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Torio amin’i Jerosalema hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy mpanao fahirano avy any an-tany lavitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manakora hamely ny tanànan’ny Joda.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Manodidina azy ireo toy ny fanaon’ny mpiandry saha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa niodina tamiko izy, hoy Jehovah.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny alehanao sy ny asanao no nahatonga izany taminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany ho faharatsianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mangidy izany sady mihatra amin’ny ainao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Endrey ny kiboko! Endrey izany kiboko!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaintaina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey! mila ho triatra izany ny foko!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Endrey ny rindrin’ny foko!
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitoloko ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mahay mangina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny feon’anjomara sy ny akoran’ady dia renao, ry fanahiko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa hianiana amin’ny hitsiny sy ny rariny ary ny fahamarinana hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha velona koa Jehovah,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Izy no holazain’ny firenena ho fahasambarany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izy no ho reharehany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hanjo ny Joda sy Jerosalema, raha tsy mibebaka izy.
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fandravana mifanontona no ambara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rava ny tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rava tampoka ny laiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, rava indray mipì-maso monja ny ambain-daiko.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mandra-pahoviana re no mbola hijereko ny faneva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy handrenesako ny feon’anjomara?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa adala ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho tsy mba fantany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zaza tsy misy saina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy manam-pahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ny hanao ratsy, dia hendry izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny hanao soa kosa tsy fantany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Nojereko ny tany, ka, indro, tsy nisy endrika izy sady foana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lanitra koa, ka, indro, tsy nanam-pahazavana izy;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Nojereko ny tendrombohitra, ka, indro, nihorohoro izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny havoana rehetra nihozongozona;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Nojereko, ka, indro, tsy nisy olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny voro-manidina rehetra efa nandositra;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Nojereko, ka, indro, ny saha mahavokatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Karmela.
      marker-yv: yv-n
    - type: text
      text: ' aza efa tonga efitra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tanànany rehetra dia rava teo anatrehan’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia teo anoloan’ny firehetan’ny fahatezerany.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lao ny tany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy dia holevoniko avokoa izy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Noho izany dia hisaona ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho tonga mainty ny lanitra ambony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria efa niteny izany Aho, sady efa nikasa izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hanenina na hanatsoaka izany.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Noho ny fihorakoraky ny mpitaingin-tsoavaly sy ny mpandefa tsipìka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia efa mandositra avokoa ny tanàna rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsofoka any anatin’ny kirihitrala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rahona.
      marker-yv: yv-n
    - type: text
      text: ' sy mananika ny vatolampy izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lao avokoa ny tanàna rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy mponina intsony ao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'FA izao no lazain’i Jehovah amin’i Joda sy Jerosalema:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hevoy ny tombamborakareo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Miasà tany vaovao ho anareo.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aza mamafy amin’ny tsilo
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary hanao ahoana hianao, ry ilay rava?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia miakanjo jaky aza hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia miravaka volamena aza hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia hosoranao loko mainty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: antimony.
      marker-yv: yv-n
    - type: text
      text: ' aza ny masonao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foana ny itadiavanao hahatsara tarehy anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanifika anao ireo lehilahy tia anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny ainao aza no hotadiaviny.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa efa nandre feo Aho tahaka ny vehivavy raha miteraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fidridridridriana tahaka ny vehivavy izay vao miteraka ny matoany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny feon’i Ziona zanakavavy, izay misefosefo sady mamelatra ny tànany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka manao hoe: Lozako!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa reraka ny aiko azon’ireo mpamono olona.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Miforà ho an’i Jehovah hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, forao ny fonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Joda sy ry mponina any Jerosalema!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao hiseho toy ny afo ny fahatezerako noho ny faharatsian’ny ataonareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hirehitra, sady tsy hisy hamono azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ambaraonareo ao amin’ny Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary torio ao Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka ataovy hoe: Tsofy ao amin’ny tany ny anjomara;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Miantsoantsoa mafy, ka ataovy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoria hianareo, ka andeha isika hiditra amin’ny tanàna mimànda.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Manangana faneva manandrify an’i Ziona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandosira faingana, aza mijanona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho hahatonga loza sy fandringanana be avy any avaratra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Misy liona miakatra avy any anaty kirihitrala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ilay mpanimba ny firenena dia efa miainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa mivoaka avy amin’ny fitoerany hahafoana ny taninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hahalao ny tanànanao, ka tsy hisy mponina.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary noho izany dia misikìna lamba fisaonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lamba malailay.
      marker-yv: yv-n
    - type: text
      text: ' hianareo, ka mitomania sy midradradradrà;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny firehetan’ny fahatezeran’i Jehovah tsy afaka amintsika.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary amin’izany andro izany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho very hevitra ny mpanjaka sy ny lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho kepoka ny mpisorona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho gaga ny mpaminany.
