document_id: JER.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: Raha hiverina hianao, ry Isiraely, hoy Jehovah, dia ho amiko no hiverenanao,
  - type: text
    content: Ary raha hanaisotra ny fahavetavetanao tsy ho eo imasoko hianao,
  - type: text
    content: Dia tsy hivezivezy foana,
  '10':
  - type: text
    content: 'Dia hoy izaho: Indrisy, Jehovah Tompo ô!'
  - type: text
    content: Efa nofitahinao tokoa ity firenena ity sy Jerosalema
  - type: text
    content: 'Tamin’ny nanaovanao hoe: Hisy fiadanana ho anareo;'
  - type: text
    content: Kanjo mihatra amin’ny aina ny sabatra.
  '11':
  - type: text
    content: 'Amin’izany andro izany dia holazaina amin’ity firenena ity sy Jerosalema hoe:'
  - type: text
    content: Hisy rivo-mahamay avy any an-tendrombohitra mangadihady any an-efitra
  - type: text
    content: Hankamin’ny oloko zanakavavy,
  - type: note
    content: 'Na: Ny lalàn’ny oloko zanakavavy dia rivotra mahamay, etc.'
  - type: text
    content: Kanefa tsy hikororohana na hanadiovana.
  '12':
  - type: text
    content: Dia ho tonga avy amiko izay rivotra mahery noho ireny;
  - type: note
    content: 'Na: Dia ho tonga etỳ amiko ny rivotra mahery izay avy amin’ireny.'
  - type: text
    content: Ary ankehitriny Izaho kosa hifandahatra aminy.
  '13':
  - type: text
    content: Indro, avy toy ny rahona izy,
  - type: text
    content: Ary tahaka ny tadio ny kalesiny,
  - type: text
    content: Faingana noho ny voromahery ny soavaliny.
  - type: text
    content: Lozantsika! fa lany ringana isika.
  '14':
  - type: text
    content: Ry Jerosalema, sasao ny fonao ho afaka amin’ny ratsy,
  - type: text
    content: Mba hovonjena hianao!
  - type: text
    content: Mandra-pahoviana no hitoeran’ny hevi-dratsinao ao am-ponao?
  '15':
  - type: text
    content: Fa injany! misy feo manambara avy any Dana
  - type: text
    content: Sy filazam-pahoriana avy amin’ny tany havoan’i Efraima,
  '16':
  - type: text
    content: Lazaonareo amin’ny firenena,
  - type: text
    content: 'Torio amin’i Jerosalema hoe:'
  - type: text
    content: Misy mpanao fahirano avy any an-tany lavitra
  - type: text
    content: Ka manakora hamely ny tanànan’ny Joda.
  '17':
  - type: text
    content: Manodidina azy ireo toy ny fanaon’ny mpiandry saha,
  - type: text
    content: Fa efa niodina tamiko izy, hoy Jehovah.
  '18':
  - type: text
    content: Ny alehanao sy ny asanao no nahatonga izany taminao;
  - type: text
    content: Izany ho faharatsianao,
  - type: text
    content: Eny, mangidy izany sady mihatra amin’ny ainao.
  '19':
  - type: text
    content: Endrey ny kiboko! Endrey izany kiboko!
  - type: text
    content: Manaintaina aho;
  - type: text
    content: Endrey! mila ho triatra izany ny foko!
  - type: note
    content: Heb. Endrey ny rindrin’ny foko!
  - type: text
    content: Mitoloko ny foko,
  - type: text
    content: Ka tsy mahay mangina aho;
  - type: text
    content: Fa ny feon’anjomara sy ny akoran’ady dia renao, ry fanahiko.
  '2':
  - type: text
    content: 'Fa hianiana amin’ny hitsiny sy ny rariny ary ny fahamarinana hoe:'
  - type: text
    content: Raha velona koa Jehovah,–
  - type: text
    content: Dia Izy no holazain’ny firenena ho fahasambarany,
  - type: text
    content: Ary Izy no ho reharehany.
  - type: heading
    content: Ny hanjo ny Joda sy Jerosalema, raha tsy mibebaka izy.
  '20':
  - type: text
    content: Fandravana mifanontona no ambara,
  - type: text
    content: Rava ny tany rehetra;
  - type: text
    content: Rava tampoka ny laiko,
  - type: text
    content: Eny, rava indray mipì-maso monja ny ambain-daiko.
  '21':
  - type: text
    content: Mandra-pahoviana re no mbola hijereko ny faneva
  - type: text
    content: Sy handrenesako ny feon’anjomara?
  '22':
  - type: text
    content: Fa adala ny oloko,
  - type: text
    content: Izaho tsy mba fantany;
  - type: text
    content: Zaza tsy misy saina izy
  - type: text
    content: Sady tsy manam-pahalalana;
  - type: text
    content: Raha ny hanao ratsy, dia hendry izy;
  - type: text
    content: Fa ny hanao soa kosa tsy fantany.
  '23':
  - type: text
    content: Nojereko ny tany, ka, indro, tsy nisy endrika izy sady foana,
  - type: text
    content: Ary ny lanitra koa, ka, indro, tsy nanam-pahazavana izy;
  '24':
  - type: text
    content: Nojereko ny tendrombohitra, ka, indro, nihorohoro izy,
  - type: text
    content: Ary ny havoana rehetra nihozongozona;
  '25':
  - type: text
    content: Nojereko, ka, indro, tsy nisy olona,
  - type: text
    content: Ary ny voro-manidina rehetra efa nandositra;
  '26':
  - type: text
    content: Nojereko, ka, indro, ny saha mahavokatra
  - type: note
    content: 'Na: Karmela.'
  - type: text
    content: ' aza efa tonga efitra,'
  - type: text
    content: Ary ny tanànany rehetra dia rava teo anatrehan’i Jehovah,
  - type: text
    content: Dia teo anoloan’ny firehetan’ny fahatezerany.
  '27':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Ho lao ny tany rehetra,
  - type: text
    content: Nefa tsy dia holevoniko avokoa izy.
  '28':
  - type: text
    content: Noho izany dia hisaona ny tany,
  - type: text
    content: Ary ho tonga mainty ny lanitra ambony,
  - type: text
    content: Satria efa niteny izany Aho, sady efa nikasa izany
  - type: text
    content: Ka tsy hanenina na hanatsoaka izany.
  '29':
  - type: text
    content: Noho ny fihorakoraky ny mpitaingin-tsoavaly sy ny mpandefa tsipìka
  - type: text
    content: Dia efa mandositra avokoa ny tanàna rehetra;
  - type: text
    content: Mitsofoka any anatin’ny kirihitrala
  - type: note
    content: Heb. rahona.
  - type: text
    content: ' sy mananika ny vatolampy izy;'
  - type: text
    content: Lao avokoa ny tanàna rehetra,
  - type: text
    content: Ka tsy misy mponina intsony ao.
  '3':
  - type: text
    content: 'FA izao no lazain’i Jehovah amin’i Joda sy Jerosalema:'
  - type: text
    content: Hevoy ny tombamborakareo,
  - type: note
    content: 'Na: Miasà tany vaovao ho anareo.'
  - type: text
    content: Fa aza mamafy amin’ny tsilo
  '30':
  - type: text
    content: Ary hanao ahoana hianao, ry ilay rava?
  - type: text
    content: Na dia miakanjo jaky aza hianao,
  - type: text
    content: Na dia miravaka volamena aza hianao,
  - type: text
    content: Na dia hosoranao loko mainty
  - type: note
    content: Heb. antimony.
  - type: text
    content: ' aza ny masonao,'
  - type: text
    content: Foana ny itadiavanao hahatsara tarehy anao;
  - type: text
    content: Hanifika anao ireo lehilahy tia anao,
  - type: text
    content: Ka ny ainao aza no hotadiaviny.
  '31':
  - type: text
    content: Fa efa nandre feo Aho tahaka ny vehivavy raha miteraka
  - type: text
    content: Sy fidridridridriana tahaka ny vehivavy izay vao miteraka ny matoany,
  - type: text
    content: Dia ny feon’i Ziona zanakavavy, izay misefosefo sady mamelatra ny tànany
  - type: text
    content: 'Ka manao hoe: Lozako!'
  - type: text
    content: Fa reraka ny aiko azon’ireo mpamono olona.
  '4':
  - type: text
    content: Miforà ho an’i Jehovah hianareo,
  - type: text
    content: Eny, forao ny fonareo,
  - type: text
    content: Ry Joda sy ry mponina any Jerosalema!
  - type: text
    content: Fandrao hiseho toy ny afo ny fahatezerako noho ny faharatsian’ny ataonareo
  - type: text
    content: Ka hirehitra, sady tsy hisy hamono azy.
  '5':
  - type: text
    content: Ambaraonareo ao amin’ny Joda,
  - type: text
    content: Ary torio ao Jerosalema,
  - type: text
    content: 'Ka ataovy hoe: Tsofy ao amin’ny tany ny anjomara;'
  - type: text
    content: 'Miantsoantsoa mafy, ka ataovy hoe:'
  - type: text
    content: Mivoria hianareo, ka andeha isika hiditra amin’ny tanàna mimànda.
  '6':
  - type: text
    content: Manangana faneva manandrify an’i Ziona;
  - type: text
    content: Mandosira faingana, aza mijanona;
  - type: text
    content: Fa Izaho hahatonga loza sy fandringanana be avy any avaratra.
  '7':
  - type: text
    content: Misy liona miakatra avy any anaty kirihitrala,
  - type: text
    content: Ary ilay mpanimba ny firenena dia efa miainga,
  - type: text
    content: Efa mivoaka avy amin’ny fitoerany hahafoana ny taninao,
  - type: text
    content: Ary hahalao ny tanànanao, ka tsy hisy mponina.
  '8':
  - type: text
    content: Ary noho izany dia misikìna lamba fisaonana
  - type: note
    content: Heb. lamba malailay.
  - type: text
    content: ' hianareo, ka mitomania sy midradradradrà;'
  - type: text
    content: Fa ny firehetan’ny fahatezeran’i Jehovah tsy afaka amintsika.
  '9':
  - type: text
    content: Ary amin’izany andro izany, hoy Jehovah,
  - type: text
    content: Dia ho very hevitra ny mpanjaka sy ny lehibe,
  - type: text
    content: Ary ho kepoka ny mpisorona,
  - type: text
    content: Sy ho gaga ny mpaminany.
