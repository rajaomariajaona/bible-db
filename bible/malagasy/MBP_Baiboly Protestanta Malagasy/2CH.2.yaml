document_id: 2CH.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dia nanisa olona fito alina ho mpitondra entana Solomona ary valo alina ho mpikapa hazo eny an-tendrombohitra ary enin-jato amby telo arivo ho mpifehy azy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy Hirama, mpanjakan’i Tyro, tamin’ny taratsay izay nampanateriny ho any amin’i Solomona: Noho ny fitiavan’i Jehovah ny olony no nanendreny anao ho mpanjakany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy koa Hirama: Isaorana anie Jehovah, Andriamanitry ny Isiraely, Izay nanao ny lanitra sy ny tany, noho ny nanomezany an’i Davida zanaka hendry, izay manana fahendrena sy fahalalana, ka hanao trano ho an’i Jehovah sy lapa ho an’ny tenany izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa ankehitriny, indro, maniraka olona mahay zavatra sady manana fahalalana aho, dia Hiram-aby,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ikaky Hirama.
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'zanaky ny vehivavy Danita sy ny lehilahy Tyriana. Ary izy dia mahay miasa volamena sy volafotsy sy varahina sy vy sy vato sy hazo sy volomparasy sy manga sy rongony fotsy madinika ary jaky; ary mahay misokitra manao sarin-javatra samy hafa sy mahay manao marika amin’izay asa rehetra asaina ataony, ka dia hiara-manao amin’ny olon-kendrinao sy ny olon-kendrin’itompokolahy Davida rainao izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny vary tritika sy ny vary hordea ary ny diloilo sy ny divay, izay nolazainao, tompokolahy, dia aoka hampanaterina ho atỳ aminay mpanomponao; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ary izahay dia hikapa hazo any Libanona araka izay rehetra tadiavinao; ary hofehezinay ka hampandehaninay mitsinkafona amin’ny ranomasina ho any Jopa; ary hianao kosa no hitondra azy miakatra hankany Jerosalema.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary Solomona nanisa ny lehilahy hafa firenena rehetra izay nonina tamin’ny tanin’ny Isiraely araka ny nanisan’i Davida rainy azy, ary ny isany dia enin-jato amby telo arivo amby dimy alina sy iray hetsy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ny fito alina tamin’ireo dia nataony mpitondra entana, ary ny valo alina nataony mpikapa hazo eny an-tendrombohitra, ary ny enin-jato amby telo arivo nataony mpifehy hampiasa ny olona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Solomona naniraka hankany amin’i Hirama, mpanjakan’i Tyro, hanao hoe: Tahaka ny nataonao tamin’i Davida raiko, raha nampanatitra hazo sedera ho azy hanaovany trano hitoerany hianao, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'indro, izaho efa hanao trano ho an’ny anaran’i Jehovah Andriamanitro izay hohamasinina ho Azy ka handoroana ditin-kazo mani-pofona eo anatrehany sy hasiana ny mofo aseho mandrakariva ary handoroana ny fanatitra isa-maraina sy isan-kariva ary amin’ny Sabata sy ny voaloham-bolana ary amin’ny fotoam-pivavahana voatendrin’i Jehovah Andriamanitray; ho adidin’ny Isiraely mandrakizay izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny trano efa hataoko dia lehibe, satria lehibe noho ny andriamanitra rehetra ny Andriamanitray. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nefa iza no mahay manao trano ho Azy? fa ny lanitra ary ny lanitry ny lanitra aza tsy omby Azy. Ka iza moa aho, no hanao trano ho Azy, afa-tsy ny handoroana ditin-kazo manitra eo anatrehany ihany? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa aniraho olon-kendry aho hiasa volamena sy volafotsy sy varahina sy vy sy volomparasy sy jaky ary manga, ary izay mahay misokitra manao sarin-javatra mba hiara-manao amin’ny olo-mahay zavatra izay atỳ amiko atỳ Joda sy Jerosalema, izay efa nomanin’i Davida raiko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary anatero hazo sedera sy kypreso ary almoga avy any Libanona koa aho; fa fantatro fa mahay mikapa hazo any Libanona ny vahoakanao; ary, indro, ny vahoakako hiaraka amin’ny vahoakanao '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'mba hanamboatra hazo betsaka ho ahy; fa ny trano izay efa hataoko dia ho lehibe higagana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary, indro, homeko vary tritika voafotsy sy vary hordea roa alina kora avy ary divay sy diloilo roa alina bata avy ny vahoakanao mpikapa hazo.
