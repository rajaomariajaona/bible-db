document_id: MAT.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niverenan’i Jesosy tany Galilia, sy ny nahasitranany ny lehilahy nararin’ny paralysisa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 2.1-12; Lio. 5.17-26.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY niondrana an-tsambokely Izy, dia nita ka tonga tao an-tanànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary, indro, nisy lehilahy anankiray mararin’ny paralysisa nandry tamin’ny fandriana nentin’ny olona teo aminy; ary Jesosy, nony nahita ny finoan’ireo, dia nanao tamin’ilay mararin’ny paralysisa hoe: Matokia, anaka; voavela ny helokao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary, indreo, ny mpanora-dalàna sasany nanao anakampo hoe: Miteny ratsy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'manao blasfemia, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dia miteny ratsy, indrindra fa ny amin’Andriamanitra, na mihambo hanana izay fomban’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ' ity Lehilahy ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Jesosy nahafantatra ny eritreriny, dia nanao hoe: Nahoana hianareo no mieritreri-dratsy ao am-ponareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa iza moa no moramora kokoa, ny manao hoe va: Voavela ny helokao, sa ny manao hoe: Mitsangàna, ka mandehana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa mba ho fantatrareo fa ny Zanak’olona manana fahefana etỳ ambonin’ny tany hamela heloka (dia hoy Izy tamin’ilay mararin’ny paralysisa): Mitsangàna, betao ny fandrianao, ka modia any an-tranonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nitsangana izy ka lasa nody tany an-tranony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny vahoaka, raha nahita izany, dia raiki-tahotra ka nankalaza an’Andriamanitra, Izay nanome ny olona fahefana toy izany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niantsoana an’i Matio, sy ny fanasana nataony tao an-tranony, ary ny tori-teny nataon’i Jesosy ny amin’ny fifadian-kanina.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 2.13-22; Lio. 5.27-39.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ARY nony niala teo Jesosy, dia nahita lehilahy atao hoe Matio nipetraka teo am-pamorian-ketra,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny hetra sy ny fadintseranana, etc.
    marker-yv: yv-n
  - type: text
    text: ' ka hoy Izy taminy; Andeha hanaraka Ahy. Dia nitsangana Matio ka nanaraka Azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha nipetraka nihinana tao an-trano Izy, indreo, nisy mpanota sy mpamory hetra maro tonga ka niara-nipetraka tamin’i Jesosy mbamin’ny mpianany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny Fariseo, raha nahita izany, dia niteny tamin’ny mpianatra hoe: Nahoana kosa ny Mpampianatra anareo no miara-komana amin’ny mpamory hetra sy ny mpanota? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha nahare izany Jesosy, dia nanao hoe: Tsy ny finaritra no mila mpanao fanafody, fa ny marary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa mandehana ka mianara izay hevitry ny teny hoe: „Famindrampo no sitrako, fa tsy fanatitra alatsa-dra” (Hos. 6.6); fa tsy tonga hiantso ny marina Aho, fa ny mpanota.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nankany amin’i Jesosy ny mpianatr’i Jaona ka nanao hoe: Nahoana izahay sy ny Fariseo no mifady hanina matetika, fa ny mpianatrao kosa tsy mba mifady? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Jesosy taminy: Moa mahay misaona va ny havan’ny mpampakatra, raha mbola ao aminy ny mpampakatra? fa ho avy ny andro izay hanesorana ny mpampakatra hiala aminy, dia amin’izay vao hifady izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tsy misy olona manampina lamba tonta amin’ny tapa-damba tsy mbola voalòna; fa ny vaovao izay natampina dia handrovitra ny lamba, ka hitatra ny triatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary tsy misy manisy divay vaovao ao anaty siny hoditra tonta; raha izany, dia ho triatra ny siny hoditra, ka ho raraka ny divay, sady ho simba ny siny hoditra; fa ny siny hoditra vaovao no asian’ny olona divay vaovao, dia miara-maharitra izy roroa.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ilay vehivavy narary roa ambin’ny folo taona, sy ny nananganany ny zanakavavin’i Jairo tamin’ny maty.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 5.21-43; Lio. 8.40-56.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'RAHA mbola nilaza izany taminy Izy, indro, tonga ny mpanapaka anankiray, dia niankohoka teo anatrehany ka nanao hoe: Maty ankehitriny izao ny zanako-vavy; fa andeha re, mametraha ny tànanao aminy, dia ho velona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nitsangana nanaraka azy Jesosy mbamin’ny mpianany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary, indro, nisy vehivavy anankiray, izay efa narary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: narary nandeha ra.
    marker-yv: yv-n
  - type: text
    text: ' roa ambin’ny folo taona, nankeo ivohony ka nanendry ny somotraviavin-dambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa hoy izy anakampony: Na dia ny lambany ihany aza no ho voatendriko, dia ho sitrana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voavonjy.
    marker-yv: yv-n
  - type: text
    text: ' aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Jesosy nihodina ka nahita azy, dia nanao hoe: Matokia, ry zanako-vavy, ny finoanao no efa nahasitrana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: namonjy.
    marker-yv: yv-n
  - type: text
    text: ' anao. Dia sitrana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voavonjy.
    marker-yv: yv-n
  - type: text
    text: ' ilay vehivavy tamin’izay ora izay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Jesosy, nony niditra tao an-tranon’ilay mpanapaka ka nahita ny mpitsoka sodina sy ny vahoaka nitabataba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia nanao hoe: Mivoaha; fa tsy maty razazavavy, fa matory. Dia nihomehy Azy fatratra ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony efa navoaka ny olona, dia niditra Jesosy ka nandray ny tànan-drazazavavy, dia nitsangana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny lazan’izany dia niely tamin’izany tany rehetra izany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampahiratan’i Jesosy ny jamba roa lahy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ARY nony niala teo Jesosy, dia nisy jamba roa lahy nanaraka Azy sady niantsoantso hoe: Mamindrà fo aminay, ry Zanak’i Davida ô! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary rehefa niditra tao an-trano Izy, dia nanatona Azy ireo jamba; ary hoy Jesosy taminy: Mino va hianareo fa mahay manao izany Aho? Hoy izy taminy: Eny, Tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nanendry ny masony Izy ka nanao hoe: Tongava aminareo araka ny finoanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nahiratra ny masony; ary Jesosy namepetra azy mafy ka nanao hoe: Tandremo mba tsy ho fantatr’olona izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Kanjo nony niala teo izy roa lahy, dia nampiely ny lazany tamin’izany tany rehetra izany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampitenenan’i Jesosy ny lehilahy moana anankiray izay demoniaka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ARY rehefa nivoaka ireo, dia indro, nisy lehilahy moana anankiray izay demoniaka nentin’ny olona tany amin’i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary rehefa navoaka ny demonia, dia niteny ilay moana; ary gaga ny vahoaka ka nanao hoe: Tsy mbola nisy niseho toy izao tamin’ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa ny Fariseo kosa nanao hoe: Ny lohan’ny demonia no amoahany ny demonia.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandehanan’i Jesosy nampianatra tany Galilia, sy ny niantsoany ny Apostoly roa ambin’ny folo lahy, ary ny teny nomeny azy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 3.13-19; 6.7-13; Lio. 6.12-16; 9.1-6.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ARY Jesosy nandeha nitety ny tanàna rehetra sy ny vohitra, nampianatra tao amin’ny synagoga sy nitory ny filazantsaran’ny fanjakana ary nahasitrana ny aretina rehetra mbamin’ny rofy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary nony nahita ny vahoaka Jesosy, dia nahonena Azy ny fijeriny ireo, satria nampahantraina ireo ka nafoy toy ny ondry tsy misy mpiandry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia hoy Izy tamin’ny mpianany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Be ny vokatra, fa ny mpiasa no vitsy; koa amin’izany mangataha amin’ny Tompon’ny vokatra mba hampandehanany mpiasa hamory ny vokatra.
