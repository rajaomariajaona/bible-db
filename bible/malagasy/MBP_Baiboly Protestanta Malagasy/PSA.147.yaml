document_id: PSA.147,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Haleloia ho an’ny Mpanohana izao rehetra izao, Izay nampody ny fahatsaran’i Jerosalema.
  - type: text
    content: HALELOIA;
  - type: text
    content: Fa tsara ny mihira ho an’Andriamanitsika;
  - type: text
    content: Eny, mamy sady mendrika ny fiderana.
  '10':
  - type: text
    content: Tsy ny herin’ny soavaly no mahafinaritra Azy,
  - type: text
    content: Ary tsy ny tongotry ny olona no sitrany.
  '11':
  - type: text
    content: Jehovah mankasitraka izay matahotra Azy,
  - type: text
    content: Dia izay manantena ny famindrampony.
  '12':
  - type: text
    content: Mankalazà an’i Jehovah, ry Jerosalema ô;
  - type: text
    content: Miderà an’Andriamanitrao, ry Ziona ô.
  '13':
  - type: text
    content: Fa manamafy ny hidim-bavahadinao Izy,
  - type: text
    content: Sady mitahy ny zanakao eo afovoanao.
  '14':
  - type: text
    content: Mahatonga ny fari-taninao ho fiadanana Izy;
  - type: text
    content: Vokisany vary tsara indrindra hianao.
  '15':
  - type: text
    content: Mampandeha ny didiny ho amin’ny tany Izy;
  - type: text
    content: Miely faingana dia faingana ny teniny.
  '16':
  - type: text
    content: Mandatsaka orampanala tahaka ny landihazo
  - type: note
    content: Heb. volon’ondry.
  - type: text
    content: ' Izy;'
  - type: text
    content: Mampiely fanala tahaka ny lavenona Izy.
  '17':
  - type: text
    content: Mandatsaka ny havandrany tahaka ny sombintsombin-javatra Izy;
  - type: text
    content: Iza no maharitra ny hatsiakany?
  '18':
  - type: text
    content: Mamoaka ny teniny izy ka mampiempo ireny;
  - type: text
    content: Mampifofofofo ny rivony Izy, dia mandriaka ny rano.
  '19':
  - type: text
    content: Milaza ny teniny amin’i Jakoba Izy
  - type: text
    content: Ary ny didiny sy ny fitsipiny amin’Isiraely.
  '2':
  - type: text
    content: Manangana an’i Jerosalema Jehovah;
  - type: text
    content: Mamory ny Isiraely voaroaka Izy.
  '20':
  - type: text
    content: Tsy nanao toy izany tamin’izay firenena hafa Izy;
  - type: text
    content: Ary ny fitsipiny tsy mba fantatr’ireny.
  - type: text
    content: Haleloia.
  '3':
  - type: text
    content: Mahasitrana ny torotoro fo Izy
  - type: text
    content: Sy mamehy ny feriny.
  '4':
  - type: text
    content: Milaza ny isan’ny kintana Izy;
  - type: text
    content: Samy tononiny amin’ny anarany avy ireny rehetra ireny.
  '5':
  - type: text
    content: Lehibe ny Tompontsika sady be hery;
  - type: text
    content: Tsy hita lany ny fahalalany.
  '6':
  - type: text
    content: Manandratra ny mpandefitra Jehovah,
  - type: text
    content: Fa mampietry ny ratsy fanahy hatramin’ny tany.
  '7':
  - type: text
    content: Mihirà fiderana ho an’i Jehovah;
  - type: text
    content: Mankalazà an’Andriamanitsika amin’ny lokanga,
  '8':
  - type: text
    content: Izay manaron-drahona ny lanitra,
  - type: text
    content: Izay mamboatra ranonorana ho amin’ny tany,
  - type: text
    content: Izay mampaniry ahitra ny tendrombohitra,
  '9':
  - type: text
    content: Manome hanina ho an’ny biby Izy
  - type: text
    content: Sy ho an’ny zana-goaika izay mitaraina.
