document_id: JOS.12
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny anaran’ny mpanjaka izay novonoin’ny Zanak’Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY izao no mpanjakan’ny tany izay resin’ny Zanak’Isiraely, ka lasany ny taniny, teny an-dafy atsinanan’i Jordana hatramin’ny lohasahan-driaka Arnona ka hatramin’ ny tendrombohitra Hermona sy ny ilany atsinanan’ny tani-hay:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: –
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sihona, mpanjakan’ny Amorita, izay nonina tany Hesbona ka nanjaka hatrany Aroera, eo amoron’ny lohasahan-driaka Arnona, ka hatreo afovoan’ny lohasaha sy ny antsasak’i Gileada, dia hatramin’ny lohasahandriaka Jaboka, fari-tanin’ny taranak’i Amona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary ny ilany atsinanan’ny tani-hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' hatramin’ny Ranomasina Kinerota ka hatramin’ny ranomasina amin’ny tani-hay,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' dia ny Ranomasintsira, amin’ny làlana mankany Beti-jesimota, ary hatramin’ny tany atsimo eo am-bodin’i Pisga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary azony koa ny tanin’i Oga, mpanjakan’i Basana, isan’ny Refaïta sisa, izay nitoetra tany Astarta sy Edrehy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sy nanjaka tany an-tendrombohitra Hermona sy tany Saleka ary tany Basana rehetra hatramin’ny fari-tanin’ny Gesorita sy ny Makatita ary ny antsasak’i Gileada, fari-tanin’i Sihona, mpanjakan’i Hesbona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mosesy, mpanompon’i Jehovah, sy ny Zanak’Isiraely no nandresy ireo; ary ny taniny nomen’i Mosesy, mpanompon’i Jehovah, ho lovan, ny Robenita sy ny Gadita ary ny antsasaky ny firenen’i Manase.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izao no mpanjakan’ny tany izay resin’i Josoa sy ny Zanak’Isiraely tany an-dafy andrefan’i Jordana, hatrany Bala-gada, eo an-dohasahan’i Libanona, ka hatramin’ny tendrombohitra mangadihady, izay fiakarana ho any Seïra, ka ny taniny nomen’i Josoa ny firenen’Isiraely araka ny fizarany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia ny any amin’ny tany havoana sy amin’ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sefela.
    marker-yv: yv-n
  - type: text
    text: ' sy amin’ny tani-hay'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' sy amin’ny tany am-bodin’ny tendrombohitra sy any an-efitra ary any amin’ny tany atsimo, dia ny an’ny Hetita sy ny Amorita sy ny Kananita sy ny Perizita sy ny Hivita ary ny Jebosita:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny mpanjakan’i Jeriko, iray; ny mpanjakan’i Ay, izay eo anilan’i Betela, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny mpanjakan’i Jerosalema, iray; ny mpanjakan’i Hebrona, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny mpanjakan’i Jarmota, iray; ny mpanjakan’i Lakisy, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny mpanjakan’i Eglona, iray; ny mpanjakan’i Gazera, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny mpanjakan’i Debira, iray; ny mpanjakan’i Gadera, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny mpanjakan’i Horma, iray; ny mpanjakan’i Arada, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny mpanjakan’i Libna, iray; ny mpanjakan’i Adolama, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny mpanjakan’i Makeda, iray; ny mpanjakan’i Betela, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny mpanjakan’i Tapoa, iray; ny mpanjakan’i Hefera, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny mpanjakan’i Afeka, iray; ny mpanjakan’i Lasarona, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny mpanjakan’i Madona, iray; ny mpanjakan’i Hazora, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny mpanjakan’i Simrona-merona, iray; ny mpanjakan’i Aksafa, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ny mpanjakan’i Tanaka, iray; ny mpanjakan’i Megido, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ny mpanjakan’i Kadesy, iray; ny mpanjakan’i Jokneama any Karmela, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ny mpanjakan’i Dora eo amin’ny havoan’i Dora, iray; ny mpanjakan’ ny firenen-tsamy hafa any Gilgala, iray; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ny mpanjakan’i Tirza, iray. Iraika amby telo-polo no isan’ny mpanjaka rehetra.
