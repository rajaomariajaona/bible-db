document_id: ISA.60,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny ho voninahitr’i Jerosalema amin’ny andro ho avy.
  - type: text
    content: MITSANGÀNA, mihazavà, fa tonga ny fahazavanao,
  - type: text
    content: Ary ny voninahitr’i Jehovah efa miposaka aminao.
  '10':
  - type: text
    content: Ary ny hafa firenena no hanangana ny màndanao,
  - type: text
    content: Ary ny mpanjakany hanompo anao;
  - type: text
    content: Fa tamin’ny fahatezerako no namelezako anao.
  - type: text
    content: Ary amin’ny fitiavako kosa no amindrako fo aminao,
  '11':
  - type: text
    content: Ary hidanadana mandrakariva ny vavahadinao,
  - type: text
    content: Tsy hirindrina izy na andro na alina,
  - type: text
    content: Hampidirana ny haren’ny firenena
  - type: text
    content: Sy ny mpanjakany izay efa voababo ho ao aminao.
  '12':
  - type: text
    content: 'Fa ho levona izay firenena sy fanjakana tsy hanompo anao:'
  - type: text
    content: Eny, ireny firenena ireny hofongorana tokoa.
  '13':
  - type: text
    content: Ny voninahitr’i Libanona ho tonga aminao,
  - type: text
    content: Ny hazo kypreso sy ny pina ary ny bokso koa
  - type: text
    content: Handravahana ny fitoerako masina,
  - type: text
    content: Ary hasiako voninahitra ny fitoeran-tongotro.
  '14':
  - type: text
    content: Ny zanak’izay nampahory anao dia handeha hiondrika eo anatrehanao,
  - type: text
    content: Ary hiankohoka amin’ny faladianao izay rehetra nanamavo anao;
  - type: text
    content: 'Ary izy hanao anao hoe: Tanànan’i Jehovah,'
  - type: text
    content: Zionan’ny Iray Masin’ny Isiraely.
  '15':
  - type: text
    content: Ho solon’ny nahafoizana anao sy ny nankahalana anao
  - type: text
    content: Ary ny tsy nandehanan’olona namaky anao,
  - type: text
    content: Dia hasandratro ho rehareha mandrakizay hianao,
  - type: text
    content: Eny, ho fifaliana hatramin’ny taranaka fara mandimby.
  '16':
  - type: text
    content: Ary hinono amin’ny jentilisa hianao
  - type: text
    content: Sady hinono amin’ny mpanjaka;
  - type: text
    content: Ka dia ho fantatrao fa Izaho Jehovah no Mpamonjy anao,
  - type: text
    content: Ary Ilay Maherin’i Jakoba no Mpanavotra anao.
  '17':
  - type: text
    content: Hahatonga volamena Aho ho solom-barahina,
  - type: text
    content: Ary hahatonga volafotsy ho solom-by,
  - type: text
    content: Ary varahina ho solon-kazo,
  - type: text
    content: Ary vy ho solom-bato;
  - type: text
    content: Ny fiadanana no hataoko fanapahana anao,
  - type: text
    content: Ary ny fahamarinana no ho mpampiasa anao.
  - type: note
    content: 'Na: Hataoko fiadanana ny fanapahana anao ary fahamarinana ny mpampiasa anao.'
  '18':
  - type: text
    content: Ny fampahoriana tsy ho re eo amin’ny taninao intsony,
  - type: text
    content: Na ny fandravana sy ny fandringanana ao anatin’ny fari-taninao;
  - type: text
    content: Ny màndanao dia hataonao hoe Famonjena,
  - type: text
    content: Ary ny vavahadinao hataonao hoe Fiderana.
  '19':
  - type: text
    content: Tsy ny masoandro intsony no ho fanazavana anao nony andro;
  - type: text
    content: Ary tsy ny fangarangaran’ny volana no hanazava anao;
  - type: text
    content: Fa Jehovah no ho fanazavana anao mandrakizay,
  - type: text
    content: Ary Andriamanitrao no ho voninahitrao.
  '2':
  - type: text
    content: Fa, indro, ny aizina manarona ny tany,
  - type: text
    content: Ary ny aizim-pito manarona ny firenena;
  - type: text
    content: Fa aminao kosa no iposahan’i Jehovah, ary aminao no isehoan’ny voninahiny.
  '20':
  - type: text
    content: Tsy hilentika intsony ny masoandronao,
  - type: text
    content: Ary ny volanao tsy hisoka;
  - type: text
    content: Fa Jehovah no ho fanazavana anao mandrakizay,
  - type: text
    content: Ary ho tapitra ny andro fahalahelovanao.
  '21':
  - type: text
    content: Ary ny olonao rehetra ho marina avokoa;
  - type: text
    content: Hanana ny tany ho mandrakizay izy,
  - type: text
    content: Eny, ho voly maitso eo amin’ny sahako,
  - type: text
    content: Asan’ny tànako ho fampisehoam-boninahitra.
  '22':
  - type: text
    content: Ny kely ho tonga arivo,
  - type: text
    content: Ary ny malemy ho tonga firenena mahery;
  - type: text
    content: Izaho Jehovah no hanafaingana izany amin’ny fotoany.
  '3':
  - type: text
    content: Ary ny firenena manatona ny fahazavanao,
  - type: text
    content: Ary ny mpanjaka mankeo amin’ny famirapiratan’ny fiposahanao.
  '4':
  - type: text
    content: Atopazy manodidina ny masonao, ka jereo!
  - type: text
    content: Izy rehetra dia mivory ka mankaty aminao;
  - type: text
    content: Ny zanakao-lahy dia avy lavitra,
  - type: text
    content: Ny zanakao-vavy dia sakelehina.
  '5':
  - type: text
    content: Ary hahita izany hianao ka ho miramirana,
  - type: text
    content: Dia hiemponempona sady hohalehibiazina ny fonao;
  - type: text
    content: Fa ho entina ho anao ny haren’ny ranomasina,
  - type: text
    content: Ary hafindra ho anao ny fananan’ny firenena.
  '6':
  - type: text
    content: Ho feno ny rameva betsaka ao aminao,
  - type: text
    content: Dia ny rameva tanora avy any Midiana sy Efaha,
  - type: text
    content: Samy avy any Sheba izy rehetra;
  - type: text
    content: Volamena sy ditin-kazo mani-pofona no ho entiny.
  - type: text
    content: Ary ny fiderana an’i Jehovah no teny mahafaly hambarany.
  '7':
  - type: text
    content: Ny ondry aman-osy rehetra any Kedara dia hangonina ho ao aminao,
  - type: text
    content: Ary ny ondrilahin’i Nebaiota hanompo anao;
  - type: text
    content: Hiakatra amin’ny fankasitrahana ho eo ambonin’ny alitarako ireo,
  - type: text
    content: Ary hataoko be voninahitra ny tranon’ny voninahitro.
  '8':
  - type: text
    content: Iza moa ireto manidina tahaka ny rahona
  - type: text
    content: Ary tahaka ny voromailala ho amin’ny varavarankeliny?
  '9':
  - type: text
    content: Fa Izaho no andrasan’ny nosy,
  - type: text
    content: Ary ny sambon’i Tarsisy ho loha-làlana,
  - type: text
    content: Hitondra ny zanakao avy lavitra
  - type: text
    content: Mbamin’ny volafotsiny sy ny volamenany,
  - type: text
    content: Ho an’ny anaran’i Jehovah Andriamanitrao
  - type: text
    content: Sy ho an’ny Iray Masin’ny Isiraely,
  - type: text
    content: Satria efa nanome voninahitra anao Izy.
