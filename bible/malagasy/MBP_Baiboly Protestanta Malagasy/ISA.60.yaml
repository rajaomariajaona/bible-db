document_id: ISA.60
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny ho voninahitr’i Jerosalema amin’ny andro ho avy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MITSANGÀNA, mihazavà, fa tonga ny fahazavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny voninahitr’i Jehovah efa miposaka aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa, indro, ny aizina manarona ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny aizim-pito manarona ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aminao kosa no iposahan’i Jehovah, ary aminao no isehoan’ny voninahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny firenena manatona ny fahazavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanjaka mankeo amin’ny famirapiratan’ny fiposahanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Atopazy manodidina ny masonao, ka jereo!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy rehetra dia mivory ka mankaty aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanakao-lahy dia avy lavitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanakao-vavy dia sakelehina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary hahita izany hianao ka ho miramirana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hiemponempona sady hohalehibiazina ny fonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho entina ho anao ny haren’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hafindra ho anao ny fananan’ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ho feno ny rameva betsaka ao aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny rameva tanora avy any Midiana sy Efaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy avy any Sheba izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Volamena sy ditin-kazo mani-pofona no ho entiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fiderana an’i Jehovah no teny mahafaly hambarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny ondry aman-osy rehetra any Kedara dia hangonina ho ao aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ondrilahin’i Nebaiota hanompo anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiakatra amin’ny fankasitrahana ho eo ambonin’ny alitarako ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hataoko be voninahitra ny tranon’ny voninahitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Iza moa ireto manidina tahaka ny rahona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny voromailala ho amin’ny varavarankeliny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa Izaho no andrasan’ny nosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sambon’i Tarsisy ho loha-làlana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitondra ny zanakao avy lavitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny volafotsiny sy ny volamenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho an’ny anaran’i Jehovah Andriamanitrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho an’ny Iray Masin’ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa nanome voninahitra anao Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny hafa firenena no hanangana ny màndanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanjakany hanompo anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tamin’ny fahatezerako no namelezako anao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny fitiavako kosa no amindrako fo aminao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hidanadana mandrakariva ny vavahadinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hirindrina izy na andro na alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampidirana ny haren’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny mpanjakany izay efa voababo ho ao aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ho levona izay firenena sy fanjakana tsy hanompo anao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ireny firenena ireny hofongorana tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny voninahitr’i Libanona ho tonga aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hazo kypreso sy ny pina ary ny bokso koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handravahana ny fitoerako masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hasiako voninahitra ny fitoeran-tongotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny zanak’izay nampahory anao dia handeha hiondrika eo anatrehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiankohoka amin’ny faladianao izay rehetra nanamavo anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary izy hanao anao hoe: Tanànan’i Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zionan’ny Iray Masin’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ho solon’ny nahafoizana anao sy ny nankahalana anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsy nandehanan’olona namaky anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hasandratro ho rehareha mandrakizay hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho fifaliana hatramin’ny taranaka fara mandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hinono amin’ny jentilisa hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hinono amin’ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatrao fa Izaho Jehovah no Mpamonjy anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Ilay Maherin’i Jakoba no Mpanavotra anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hahatonga volamena Aho ho solom-barahina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahatonga volafotsy ho solom-by,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary varahina ho solon-kazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary vy ho solom-bato;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fiadanana no hataoko fanapahana anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinana no ho mpampiasa anao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hataoko fiadanana ny fanapahana anao ary fahamarinana ny mpampiasa anao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fampahoriana tsy ho re eo amin’ny taninao intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny fandravana sy ny fandringanana ao anatin’ny fari-taninao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny màndanao dia hataonao hoe Famonjena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vavahadinao hataonao hoe Fiderana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy ny masoandro intsony no ho fanazavana anao nony andro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ny fangarangaran’ny volana no hanazava anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no ho fanazavana anao mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Andriamanitrao no ho voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy hilentika intsony ny masoandronao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volanao tsy hisoka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no ho fanazavana anao mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tapitra ny andro fahalahelovanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny olonao rehetra ho marina avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanana ny tany ho mandrakizay izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho voly maitso eo amin’ny sahako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asan’ny tànako ho fampisehoam-boninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny kely ho tonga arivo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny malemy ho tonga firenena mahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho Jehovah no hanafaingana izany amin’ny fotoany.
