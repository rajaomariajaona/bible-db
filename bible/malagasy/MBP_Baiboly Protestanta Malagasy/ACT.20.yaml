document_id: ACT.20
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nankanesan’i Paoly tany Grisia indray, sy ny niverenany tany Asia.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa nitsahatra ny tabataba, dia nampaka ny mpianatra Paoly ka nananatra azy sy nanao veloma azy, dia lasa nankany Makedonia izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary rehefa nitety izany tany izany sy nananatra ny olona tamin’ny teny maro izy, dia tonga tany Grisia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony efa nitoetra telo volana teo izy ka efa hiondrana an-tsambo hankany Syria, ary nisy Jiosy nanotrika azy, dia niova hevitra izy ka lasa niverina namaky an’i Makedonia. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary niaraka taminy hatrany Asia Sopatera, zanak’i Pyro, avy any Beria, ary Aristarko sy Sekondo avy any Tesalonika, ary Gaio avy any Derbe, ary Timoty, ary Tykiko sy Trofimo avy any Asia. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ireo dia efa nialoha ka niandry anay tany Troasy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia niondrana an-tsambo niala tany Filipy izahay, rehefa tapitra ny andro fihinanana ny mofo tsy misy masirasira, dia nankany aminy tany Troasy izahay nony afaka hadimiana; ary tany no nitoeranay hafitoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tamin’ny andro voalohany amin’ny herinandro, rehefa niangona hamaky mofo izahay, Paoly dia nitori-teny taminy, fa nikasa handeha maraina izy; dia naharitra nitori-teny mandra-pahamamatonalina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nisy jiro maro teo an-trano ambony izay niangonanay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy zatovo anankiray atao hoe Eotyka nipetraka teo am-baravarankely ka sondrian-tory; ary raha naharitra ela ny tori-tenin’i Paoly, dia niraika noho ny torimaso ilay zatovo ka nianjera tamin’ny tany avy eny amin’ny rihana intelo mifanongoa, ary nony narenina izy, dia indro fa efa maty. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Paoly nidina, dia niankohoka taminy sy nanohona azy ka nanao hoe: Aza mihorikorika hianareo, fa mbola misy aina ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary niakatra Paoly, dia namaky ny mofo, ary rehefa nihinana sy niresaka ela ambara-pahamarain’ny andro izy, dia lasa nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nitondra ilay zatovo efa velona izy ireo ka faly dia faly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary izahay nialoha ho any an-tsambo, dia niondrana nankany Aso, fa eo no handraisana an’i Paoly, satria eo no fotoana nataony, fa nikasa handeha an-tanety
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: handeha tongotra.
    marker-yv: yv-n
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa nihaona taminay tany Aso izy, dia noraisinay, ary dia lasa nankany Mitylena izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary rehefa niondrana an-tsambo niala teo izahay, dia tonga tandrifin’i Kio nony ampitso; ary nony ampitso indray dia niantsona tao Samo; ka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[rehefa nitoetra any Trogylio, dia ].'
    marker-yv: yv-n
  - type: text
    text: ' tonga tany Mileto izahay nony ampitson’iny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa Paoly efa nikasa handeha an-tsambo handalo any Efesosy mba tsy hitoerany ela any Asia; fa maika izy, raha azony hatao, hamonjy ny andro Pentekosta any Jerosalema.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny anatra nataon’i Paoly tamin’ny loholon’ny fiangonana tao Efesosy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ARY raha tany Mileto Paoly, dia naniraka hankany Efesosy izy ka nampaka ny loholon’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' ny fiangonana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' hankeo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony tonga teo aminy ireo, dia hoy izy taminy: Fantatrareo hatramin’ny andro voalohany nahatongavako teto Asia izay toetry ny fitondrantenako taminareo tamin’izany andro rehetra izany, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia ny nanompoako ny Tompo tamin’ny fanetren-tena rehetra sy ny ranomaso ary ny fakam-panahy izay nanjo ahy tamin’ny fanotrehan’ny Jiosy, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ka tsy mba nafeniko izay mahasoa, fa nambarako sy nampianariko anareo teo imason’ny olona ary tao amin’ny isan-trano; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ary nambarako tamin’ny Jiosy sy ny jentilisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grika.
    marker-yv: yv-n
  - type: text
    text: ' koa ny fibebahana amin’Andriamanitra sy ny finoana an’i Jesosy Kristy Tompontsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ankehitriny, indro, tery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mifatotra.
    marker-yv: yv-n
  - type: text
    text: ' am-panahy hankany Jerosalema aho, nefa tsy fantatro izay hanjo ahy any, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'afa-tsy izay ambaran’ny Fanahy Masina amiko amin’ny isan-tanàna, fa hisy famatorana sy fahoriana hanjo ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nefa tsy ataoko ho zavatra akory ny aiko, mba hahavita ny alehako, dia ny fanompoana izay noraisiko tamin’i Jesosy Tompo hanambara ny filazantsaran’ny fahasoavan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary, indro, ankehitriny fantatro fa tsy hahita ny tavako intsony hianareo rehetra izay nalehako nitoriako ny fanjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa manambara aminareo aho anio fa afaka amin’ny ranareo rehetra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa tsy nafeniko anareo, fa notoriko taminareo avokoa ny saina rehetra natolotr’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tandremo ny tenanareo sy ny ondry rehetra izay nanaovan’ny Fanahy Masina anareo ho mpitandrina,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: episkopo.
    marker-yv: yv-n
  - type: text
    text: ' hiandrasanareo ny fiangonan’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesian’.
    marker-yv: yv-n
  - type: text
    text: ' Andriamanitra,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[ny fiangonan’ny Tompo].'
    marker-yv: yv-n
  - type: text
    text: ' izay novidiny tamin’ny rany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fantatro fa rehefa lasa aho dia hisy amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lopa.
    marker-yv: yv-n
  - type: text
    text: ' masiaka hiditra eo aminareo izay tsy hiantra ny ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary avy aminareo no hiposahan’ny olona sasany mitory teny tsy marina hitaona ny mpianatra hanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Koa miambena, ary tsarovy fa telo taona mipaka aho tsy nitsahatra nananatra anareo rehetra andro aman-alina tamin’ny ranomaso.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ankehitriny izaho manolotra anareo ho amin’Andriamanitra sy ho amin’ny tenin’ny fahasoavany, izay mahay mampandroso sy manome lova '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anareo
  - type: text
    text: ' eo amin’izay rehetra nohamasinina. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tsy mba naniry volafotsy na volamena na lamban’olona aho. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa fantatrareo ihany fa ireto tànako ireto no niasa mba hahazoako sy ny niaraka tamiko izay nilainay. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Efa nasehoko anareo tamin’ny zavatra rehetra fa tokony hiasa toy izany koa hianareo, mba hiantra ny mahantra ka hahatsiaro ny tenin’i Jesosy Tompo, izay manao hoe: ,Mahasambatra kokoa ny manome noho ny mandray.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary rehefa niteny izany izy, dia nandohalika teo ka niara-nivavaka tamin’izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nitomany mafy izy rehetra, dia namihina ny vozon’i Paoly ka nanoroka azy, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: sady nalahelo loatra noho ny nilazany fa tsy hahita ny tavany intsony izy. Dia nanatitra azy teny an-tsambo izy.
