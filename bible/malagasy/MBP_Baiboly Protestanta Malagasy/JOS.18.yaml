document_id: JOS.18,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nananganana ny tabernakely tao Silo, sy ny nanoratana ny tany sisa tsy mbola voazara.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: DIA nivory tao Silo ny fiangonana, dia ny Zanak’Isiraely rehetra, ka nanangana ny trano-lay fihaonana tao. Ary ny tany dia resy teo anoloany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Josoa dia nanao filokana ho azy tao Silo teo anatrehan’i Jehovah; ary tao no nizaran’i Josoa ny tany ho an’ny Zanak’Isiraely araka ny fizarany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Ny nizarana ny tany sisa andrefan’i Jordana: Ny anjaran’ny Benjamina, ny Simeona, ny Zebolona, ny Isakara, ny Asera, ny Naftaly sy ny Dana. Ny tany nomena an’i Josoa.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: DIA nahazo ny loka ny firenena taranak’i Benjamina isam-pokony; ary ny faritry ny tany azony dia teo anelanelan’ny taranak’i Joda sy ny taranak’i Josefa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-taniny amin’ny lafiny avaratra dia hatrany Jordana ka niakatra hatramin’ny ilan’i Jeriko amin’ny aravatra, dia niakatra niankandrefana nahazo ny tany havoana, ka dia nihatra tamin’ny efitr’i Betavena, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hatreo dia nandroso hatrany Lozy, hatramin’ny ilany atsimon’i Lozy (Betela izany), dia nidina hatrany Atarot-adara ao amin’ny tendrombohitra atsimon’i Beti-horona ambany, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia niolaka tamin’ny lafiny andrefana ka nianatsimo hatramin’ny tendrombohitra izay eo anoloan’i Beti-horona eo atsimo, ka dia nihatra any Kiriata-bala (Kiriata-jearima izany), tanànan’ny taranak’i Joda; izany no lafiny andrefana.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lafiny atsimo dia hatramin’ny faran’i Kiriata-jearima; ary ny fari-tany dia nandroso niankandrefana ka nihatra tamin’ny loharanon’i Neftoa, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nidina hatramin’ny faran’ny tendrombohitra, izay tandrifin’ny lohasahan’ny taranak’i Hinoma, eo amin’ny Lohasahan’ny Refaïta eo avaratra, ka nidina hatramin’ny lohasahan’i Hinoma, hatramin’ny ilany atsimon’ny Jebosita, ka nidina hatrany En-rogela, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nizotra avy any avaratra ka nandroso hatrany En-semesy sy Gelilota, izay tandrifin’ny fiakarana Adomima, ka nidina hatramin’ ny vaton’i Bohana, zanak’i Robena, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nandroso hatramin’ny ilany avaratra tandrifin’ny tani-hay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Arabà.
      marker-yv: yv-n
    - type: text
      text: ' ka nidina hatrany amin’ny tani-hay,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Arabà.
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia nandroso hatramin’ny ilany avaratr’i Beti-hogla, ka dia nihatra tamin’ny helo-drano avaratra amin’ny Ranomasin-tsira, eo amin’ny farany atsimo amin’i Jordana; izany no lafiny atsimo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy firenena fito tamin’ny Zanak’Isiraely tsy mbola nahazo ny lovany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jordana no fari-taniny atsinanana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no lovan’ny taranak’i Benjamina amin’ny fari-taniny manodidina araka ny fokony. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tanànan’ny firenena taranak’i Benjamina araka ny fokony dia Jeriko sy Beti-hogla ary ny lohasahan’i Keziza '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Bet-arabà sy Zemaraima sy Betela '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Avima sy Para sy Ofra '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Kefara-hamony sy Ofny sy Geba: tanàna roa ambin’ ny folo sy ny zana-bohiny; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Gibeona sy Rama sy Berota '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Mizpa sy Kefira sy Moza '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Rekema sy Iripela sy Tarala '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sy Zela sy Elefa sy ny Jebosita (Jerosalema izany) sy Gibea sy Kiriata
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny havoan’i Kiriata.
      marker-yv: yv-n
    - type: text
      text: ': tanàna efatra ambin’ny folo sy ny zana-bohiny. Izany no lovan’ny taranak’i Benjamina araka ny fokony.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Josoa tamin’ny Zanak’Isiraely: Mandra-pahoviana no hiahotrahoranareo tsy hiditra handova ny tany izay omen’i Jehovah, Andriamanitry ny razanareo, anareo? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandoava telo lahy avy isam-pirenena, dia haniraka azy aho, ary hiainga izy ka handeha hitety ny tany ka hanoratra azy araka ny ho lovany, dia hiverina atỳ amiko. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hizara azy ho fito toko izy; ny Joda hitoetra any amin’ny taniny ao atsimo, ary ny taranak’i Josefa hitoetra any amin’ny taniny ao avaratra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary soratinareo ny tany ka ataovy fito toko; ary ento atỳ amiko ny soratra, dia hanao filokana ho anareo eto anatrehan’i Jehovah Andriamanitsika aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy mba manana anjara eo aminareo ny Levita; fa ny fisoronana amin’i Jehovah no lovany; ary Gada sy Robena sy ny antsasaky ny firenen’i Manase efa nahazo ny lovany any an-dafy atsinanan’i Jordana, izay nomen’i Mosesy, mpanompon’i Jehovah, azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga ireo lehilahy ireo ka nandeha; ary Josoa nandidy izay nandeha hanoratra ny tany ka nanao hoe: Mandehana nitety ny tany, ka soraty izy, dia miverena atỳ amiko, ka eto Silo no hanaovako filokana ho anareo eo anatrehan’i Jehovah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa ireo lehilahy ireo ka nandeha nitety ny tany, dia nanoratra azy tamin’ny taratasy, ka nataony fito toko, araka ny tanàna, ary dia tafaverina tany amin’i Josoa tao an-toby tao Silo izy. '
