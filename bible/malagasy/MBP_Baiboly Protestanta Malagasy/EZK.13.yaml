document_id: EZK.13,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ireo mpaminany sandoka.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny nampiviliany ny oloko tamin’ny nanaovany hoe: Fiadanana, kanjo tsy nisy fiadanana tsinona; ary raha manao ampiantany ny oloko, dia, indreo, izy no mandalotra azy amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feta
    - type: text
      text: ' tsy madity, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa lazao amin’izay mandalotra azy amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feta
    - type: text
      text: ' tsy madity fa hirodana izy; hisy ranonorana mifafy; eny, milatsaha hianareo, ry havandra vaventy; ary mifofofofoa hianareo, ry tafio-drivotra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, raha mirodana ny ampiantany, tsy holazaina aminareo hoe va: Aiza ny lalotra izay nandaloranareo azy?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah Tompo: Hampifofofofo ny tafio-drivotra amin’ny fahatezerako Aho; ary hisy ranonorana mifafy amin’ny fahatezerako sy havandra vaventy amin’ny fahavinirako hahafongana azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia harodako ny ampiantany izay nolalorinareo tamin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feta
    - type: text
      text: ' tsy madity, ka ho fongotra hatramin’ny tany izy, ary hiseho ny fanambaniny; eny, hirodana izy, ka haringana ao anatiny hianareo; ka dia ho fantatrareo fa Izaho no Jehovah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hotanterahiko amin’ny ampiantany sy izay mandalotra azy amin’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feta
    - type: text
      text: ' tsy madity ny fahatezerako, ary holazaiko aminareo hoe: Tsy misy intsony ny mànda sy izay mpandalotra azy, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ny mpaminanin’ny Isiraely izay maminany ny amin’i Jerosalema sy izay mahita fahitana fiadanana ho azy, kanjo tsy misy fiadanana tsinona, hoy Jehovah Tompo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hianao, ry zanak’olona, handrino mafy ny zanakavavin’ny firenenao, izay manao faminaniana araka ny fony, ary maminania ny hamelezana azy, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ataovy hoe: Izao no lazain’i Jehovah Tompo: Lozan’ny vehivavy rehetra izay manjaitra fono ho ao amin’ny famavanin’ny tànana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tànako.
      marker-yv: yv-n
    - type: text
      text: ' rehetra, ary manao fisaronana antonona amin’ny loha samy hafa rehetra mba hihaza fanahy! Ny fanahin’ny oloko dia hazainareo, nefa ny fanahinareo kosa velominareo! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary manamavo Ahy ao amin’ny oloko hianareo noho ny vary hordea eran-tànan-ila sy ny sombi-mofo, mba hahafaty ny fanahy izay tsy tokony ho faty ary hahavelona ny fanahy izay tsy tokony hovelomina, amin’ny andainganareo amin’ny oloko izay mihaino ny lainganareo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak’olona, maminania ny hamelezana ny mpaminanin’ny Isiraely izay maminany, ka lazao amin’izay maminany araka ny fony hoe: Mihainoa ny tenin’i Jehovah hianareo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah Tompo: Indro, hosimbako ny fononareo, izay entinareo hihaza ny fanahy any, mba hahafahan’ireny hanidina, eny, hotriariko hiala amin’ny sandrinareo izy, ka halefako hanidina ny fanahy izay nohazainareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hotriariko koa ny fisaronanareo, ka hovonjeko ho afaka amin’ny tànanareo ny oloko, dia tsy ho azon’ny tànanareo ho haza intsony izy; ka dia ho fantatrareo fa Izaho no Jehovah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria lainga no entinareo mampalahelo ny fon’ny marina, izay tsy nampalaheloviko, sady entinareo manatanjaka ny tànan’ny ratsy fanahy, tsy hialany amin’ny làlan-dratsiny mba hamelomana azy, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia tsy hahita anoano foana na hanao faminaniana intsony hianareo; fa hovonjeko ho afaka amin’ny tànanareo ny oloko; ka dia ho fantatrareo fa Izaho no Jehovah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah Tompo: Lozan’ny mpaminany adala, izay manaraka ny fanahiny sy ny zavatra tsy hitany.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny amboahaolo any an-tanànahaolo ny mpaminaninao, ry Isiraely. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy niakatra ho eo amin’ny banga hianareo, sady tsy nanao mànda hiarovana ny taranak’Isiraely mba hifaharany amin’ny ady amin’ny andron’i Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahita zava-poana sy faminaniana lainga ireo izay manao hoe: Hoy Jehovah,–nefa tsy nirahin’i Jehovah izy tsinona, hahazoany manantena ny hahatovan’ny teny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tsy fahitana tsy izy no hitanareo, ary faminaniana lainga no lazainareo, raha hoy hianareo: Jehovah no nilaza izany; kanefa tsy nilaza izany Aho tsinona?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah Tompo: Noho ny nilazanareo anoano foana sy ny nahitanareo lainga, dia, indro, hamely anareo Aho, hoy Jehovah Tompo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tànako no hamely ny mpaminany izay mahita anoano foana sy maminany lainga; tsy ho isan’ny mpanolo-tsainan’ny oloko na ho voasoratra amin’ny bokin’ny taranak’Isiraely izy sady tsy hiditra ao amin’ny tanin’ny Isiraely; ka dia ho fantatrareo fa Izaho no Jehovah Tompo.
