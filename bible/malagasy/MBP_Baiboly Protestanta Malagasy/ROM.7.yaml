document_id: ROM.7,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tsy fantatrareo, va, ry rahalahy (fa miteny amin’izay mahalala ny lalàna aho), fa ny lalàna dia manapaka ny olona, raha mbola velona izy? '
  '10':
  - type: text
    content: 'Ary ny didy izay natao hahazoana fiainana, dia hitako fa nahatonga fahafatesana tamiko kosa. '
  '11':
  - type: text
    content: Fa io didy io dia nentin’ny ota namitaka sy nahafaty ahy.
  '12':
  - type: text
    content: 'Ka dia masina tokoa ny lalàna, ary masina ny didy sady marina no tsara. '
  '13':
  - type: text
    content: Koa ny tsara va no nahafaty ahy? Sanatria izany! Fa ny ota no nahafaty ahy, mba hiseho ho ota; fa ny tsara no nentiny nahafaty ahy, mba ho tonga ota indrindra ny ota noho ny nataon’ny lalàna.
  '14':
  - type: text
    content: 'Fa fantatsika fa araka ny fanahy ny lalàna; fa izaho kosa nofo, namidy ho andevon’ny ota. '
  '15':
  - type: text
    content: 'Fa izay ataoko dia tsy fantatro; fa tsy izay sitrako no ataoko; fa izay halako no nataoko. '
  '16':
  - type: text
    content: 'Fa raha manao ny tsy sitrako aho, dia manaiky fa tsara ny lalàna. '
  '17':
  - type: text
    content: 'Ary amin’izany tsy izaho intsony no manao izany, fa ny ota izay mitoetra ato anatiko. '
  '18':
  - type: text
    content: 'Fa fantatro fa tsy misy zavatra tsara mitoetra ato amiko, dia ato amin’ny nofoko; fa ato anatiko ihany ny fikasana, saingy ny hahatanteraka ny tsara no tsy ato. '
  '19':
  - type: text
    content: 'Fa tsy ny tsara izay sitrako no ataoko; fa ny ratsy izay tsy sitrako no ataoko. '
  '2':
  - type: text
    content: 'Fa ny vehivavy izay manambady dia fehezin’ny lalàna ho an’ny lahy, raha mbola velona ny lahy; fa raha maty kosa ny lahy, dia afaka amin’ny lalàn’ny lahy izy. '
  '20':
  - type: text
    content: 'Fa raha ny tsy sitrako no ataoko, dia tsy izaho intsony no manao izany, fa ny ota izay mitoetra ato amiko. '
  '21':
  - type: text
    content: 'Koa hitako izao lalàna izao: raha ta-hanao ny marina aho,'
  - type: note
    content: 'Na: Koa hitako fa raha ta-hanaraka ny lalàna aho hanaovako ny marina.'
  - type: text
    content: ' dia ato amiko ihany ny ratsy. '
  '22':
  - type: text
    content: 'Fa mankasitraka ny lalàn’Andriamanitra aho araka ny toetra anaty; '
  '23':
  - type: text
    content: 'nefa mahita lalàna hafa amin’ny momba ny tenako aho, miady amin’ny lalàn’ny saiko ka mamabo ahy ho an’ny lalàn’ny ota izay ao amin’ny momba ny tenako. '
  '24':
  - type: text
    content: 'Indrisy! olo-mahantra aho! Iza no hanafaka ahy amin’ny tenan’ity fahafatesana ity? '
  '25':
  - type: text
    content: Misaotra an’Andriamanitra aho amin’ny alalan’i Jesosy Kristy Tompontsika. Koa raha ny amiko, dia mankatò ny lalàn’Andriamanitra aho amin’ny saiko, fa ny lalàn’ny ota kosa amin’ny nofoko.
  '3':
  - type: text
    content: 'Koa raha mbola velona ny lahy, ka manambady olon-kafa ravehivavy, dia hatao hoe mpijangajanga izy; fa raha maty kosa ny lahy, dia afaka amin’izany lalàna izany izy ka tsy mba mpijangajanga, na dia manambady olon-kafa aza. '
  '4':
  - type: text
    content: Ary amin’izany hianareo koa, ry rahalahiko, dia efa natao maty ny amin’ny lalàna noho ny tenan’i Kristy, mba ho vadìn’ny hafa hianareo, dia Izay natsangana tamin’ny maty, mba hahavokarantsika ho an’Andriamanitra.
  '5':
  - type: text
    content: 'Fa fony tao amin’ny nofo isika, dia ny filan’ny ota, izay nohetsehin’ny lalàna, no niasa tao amin’ny momba ny tenantsika hahavokatra ho amin’ny fahafatesana. '
  '6':
  - type: text
    content: Fa ankehitriny dia efa afaka tamin’ny lalàna isika, satria maty ny amin’izay nihazonana antsika, ka dia manompo amin’ny havaozam-panahy isika, fa tsy amin’ny hahelan-tsoratra.
  '7':
  - type: text
    content: 'Inona ary no holazaintsika? Ota va ny lalàna? Sanatria izany! Kanefa tsy nahalala ny ota aho, raha tsy tamin’ny lalàna, satria tsy fantatro akory ny fitsiriritana, raha tsy ny lalàna no nanao hoe: ,,Aza mitsiriritra’’ (Eks. 20.17). '
  '8':
  - type: text
    content: 'Fa io didy io dia nentin’ny ota nampihetsika ny fitsiriritana rehetra tato anatiko; fa maty ny ota, raha tsy misy lalàna. '
  '9':
  - type: text
    content: 'Ary izaho dia velona tsy manan-dalàna fahiny; fa rehefa tonga kosa ny didy, dia velona indray ny ota, ka dia maty aho. '
