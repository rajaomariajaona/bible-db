document_id: ROM.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsy fantatrareo, va, ry rahalahy (fa miteny amin’izay mahalala ny lalàna aho), fa ny lalàna dia manapaka ny olona, raha mbola velona izy? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny vehivavy izay manambady dia fehezin’ny lalàna ho an’ny lahy, raha mbola velona ny lahy; fa raha maty kosa ny lahy, dia afaka amin’ny lalàn’ny lahy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa raha mbola velona ny lahy, ka manambady olon-kafa ravehivavy, dia hatao hoe mpijangajanga izy; fa raha maty kosa ny lahy, dia afaka amin’izany lalàna izany izy ka tsy mba mpijangajanga, na dia manambady olon-kafa aza. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary amin’izany hianareo koa, ry rahalahiko, dia efa natao maty ny amin’ny lalàna noho ny tenan’i Kristy, mba ho vadìn’ny hafa hianareo, dia Izay natsangana tamin’ny maty, mba hahavokarantsika ho an’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa fony tao amin’ny nofo isika, dia ny filan’ny ota, izay nohetsehin’ny lalàna, no niasa tao amin’ny momba ny tenantsika hahavokatra ho amin’ny fahafatesana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ankehitriny dia efa afaka tamin’ny lalàna isika, satria maty ny amin’izay nihazonana antsika, ka dia manompo amin’ny havaozam-panahy isika, fa tsy amin’ny hahelan-tsoratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Inona ary no holazaintsika? Ota va ny lalàna? Sanatria izany! Kanefa tsy nahalala ny ota aho, raha tsy tamin’ny lalàna, satria tsy fantatro akory ny fitsiriritana, raha tsy ny lalàna no nanao hoe: ,,Aza mitsiriritra’’ (Eks. 20.17). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa io didy io dia nentin’ny ota nampihetsika ny fitsiriritana rehetra tato anatiko; fa maty ny ota, raha tsy misy lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izaho dia velona tsy manan-dalàna fahiny; fa rehefa tonga kosa ny didy, dia velona indray ny ota, ka dia maty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny didy izay natao hahazoana fiainana, dia hitako fa nahatonga fahafatesana tamiko kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa io didy io dia nentin’ny ota namitaka sy nahafaty ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ka dia masina tokoa ny lalàna, ary masina ny didy sady marina no tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa ny tsara va no nahafaty ahy? Sanatria izany! Fa ny ota no nahafaty ahy, mba hiseho ho ota; fa ny tsara no nentiny nahafaty ahy, mba ho tonga ota indrindra ny ota noho ny nataon’ny lalàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa fantatsika fa araka ny fanahy ny lalàna; fa izaho kosa nofo, namidy ho andevon’ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izay ataoko dia tsy fantatro; fa tsy izay sitrako no ataoko; fa izay halako no nataoko. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha manao ny tsy sitrako aho, dia manaiky fa tsara ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary amin’izany tsy izaho intsony no manao izany, fa ny ota izay mitoetra ato anatiko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa fantatro fa tsy misy zavatra tsara mitoetra ato amiko, dia ato amin’ny nofoko; fa ato anatiko ihany ny fikasana, saingy ny hahatanteraka ny tsara no tsy ato. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa tsy ny tsara izay sitrako no ataoko; fa ny ratsy izay tsy sitrako no ataoko. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha ny tsy sitrako no ataoko, dia tsy izaho intsony no manao izany, fa ny ota izay mitoetra ato amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa hitako izao lalàna izao: raha ta-hanao ny marina aho,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Koa hitako fa raha ta-hanaraka ny lalàna aho hanaovako ny marina.
    marker-yv: yv-n
  - type: text
    text: ' dia ato amiko ihany ny ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa mankasitraka ny lalàn’Andriamanitra aho araka ny toetra anaty; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'nefa mahita lalàna hafa amin’ny momba ny tenako aho, miady amin’ny lalàn’ny saiko ka mamabo ahy ho an’ny lalàn’ny ota izay ao amin’ny momba ny tenako. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Indrisy! olo-mahantra aho! Iza no hanafaka ahy amin’ny tenan’ity fahafatesana ity? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Misaotra an’Andriamanitra aho amin’ny alalan’i Jesosy Kristy Tompontsika. Koa raha ny amiko, dia mankatò ny lalàn’Andriamanitra aho amin’ny saiko, fa ny lalàn’ny ota kosa amin’ny nofoko.
