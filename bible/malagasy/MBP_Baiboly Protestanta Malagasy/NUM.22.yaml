document_id: NUM.22,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary ny Zanak’Isiraely nifindra ka nitoby tao Arbota-moaba, tany an-dafin’i Jordana tandrifin’i Jeriko.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nampanalan’i Balaka an’i Balama.
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy Balama tamin’Andriamanitra: Balaka, zanak’i Zipora, mpanjakan’i Moaba, no efa naniraka tamiko hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Indro ny firenena izay nivoaka avy tany Egypta mandrakotra ny tany rehetra; koa mankanesa atỳ ankehitriny ka ozòny ho ahy izy; angamba haharesy azy aho ka haharoaka azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy Andriamanitra tamin’i Balama: Aza mandeha miaraka aminy, na manozona izany firenena izany, fa voatahy izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nifoha maraina koa Balama, ka nanao tamin’ireo andriandahin’i Balaka hoe: Andeha mody any amin’ny taninareo; fa tsy avelan’i Jehovah handeha hiaraka aminareo aho.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary niainga ireo andriandahin’i Moaba, dia tonga tany amin i Balaka ka nanao hoe: Tsy nety nandeha niaraka taminay Balama. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary Balaka naniraka andriandahy maro sady malaza noho ny teo indray. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia tonga tao amin’i Balama ireny ka nanao taminy hoe: Izao no lazain’i Balaka, zanak’i Zipora: Aoka mba tsy ho azon-tsampona ny hankanesanao atỳ amiko; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: fa hanome anao voninahitra lehibe indrindra aho, ary izay rehetra holazainao amiko dia hataoko avokoa; koa masìna hianao, mankanesa atỳ, ozòny ho ahy ity firenena ity.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa namaly Balama ka nanao tamin’ny mpanompon’i Balaka hoe: Na dia homen’i Balaka volafotsy sy volemana eran’ny tranony aza aho, dia tsy mahazo manoatra ny tenin’i Jehovah Andriamanitro aho, na handatsaka, na hampihoatra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nefa, na dia izany aza, mitoera atỳ ihany koa hianareo anio alina, mba ho fantatro izay mbola holazain’i Jehovah amiko koa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ARY Balaka, zanak’i Zipora, nahita izay rehetra efa nataon’ny Isiraely tamin’ny Amorita. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nony alina dia nankao amin’i Balama Andriamanitra ka nanao taminy hoe: Raha haka anao no nahatongavan’ireo olona ireo, dia miaingà ka mandehana ihany miaraka aminy; kanefa ny teny izay holazaiko aminao ihany no hataonao.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nifoha maraina koa Balama ka nanisy lasely ny borikiny, dia nandeha niaraka tamin’ireo andriandahin’i Moaba. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary nirehitra taminy ny fahatezeran’Andriamanitra, satria nandeha izy; ka dia nijanona teo an-dàlana Ilay Anjelin’i Jehovah ho mpisakana azy. Ary Balama nitaingina ny borikiny, ary ny zatovony roa lahy nanaraka azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia hitan’ny boriky nijanona teo an-dàlana Ilay Anjelin’i Jehovah sady nitana ny sabany voatsoaka teny an-tànany; dia nivily làlana ny boriky ka nankany amin’ny saha; dia nikapoka ny boriky Balama mba hampiverina azy ho amin’ny làlana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary Ilay Anjelin’i Jehovah nijanona teo an-kandemponana tanelanelan’ny tanimboaloboka, izay nisy fefy teo an-daniny roa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ny boriky nahita Ilay Anjelin’i Jehovah, dia niampify teo amin’ny fefy ka nanery ny tongotr’i Balama tamin’ny fefy; dia nikapoka azy indray izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary mbola nandroso Ilay Anjelin’i Jehovah ka nijanona teo amin’ny fitoerana èty, izay tsy nisy làlana hiviliana, na ho amin’ny ankavanana, na ho amin’ny ankavia. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary ny boriky nahita Ilay Anjelin’i Jehovah, dia nandry teo ambanin’i Balama; ary nirehitra ny fahatezeran’i Balama ka nikapoka ny boriky tamin’ny tehina izy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nosokafan’i Jehovah ny vavan’ny boriky, ka hoy ny boriky tamin’i Balama: Inona no nataoko taminao no dia nokapohinao intelo aho izao? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia hoy Balama tamin’ny boriky: Satria namazivazy ahy hianao; enga anie ka misy sabatra etỳ an-tànako, dia matiko mihitsy hianao ankehitriny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia raiki-tahotra indrindra ny Moabita noho ny hamaroan’ny olona; ary nangorohoro ny Moabita noho ny Zanak’Isiraely. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary hoy ny boriky tamin’i Balama: Tsy borikinao va aho, izay nitaingenanao hatrizay nanananao ahy ka mandraka andro-any? moa efa fanaoko va ny manao toy izao aminao? Dia hoy izy: Tsia.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Dia nampahiratin’i Jehovah ny mason’i Balama hahita Ilay Anjelin’i Jehovah mijanona eo an-dàlana sady mitana ny sabany voatsoaka eny an-tànany; dia niondrika izy ka niankohoka.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary hoy Ilay Anjelin’i Jehovah taminy: Nahoana no nikapoka ny borikinao intelo hianao izao? indro, Izaho no nivoaka ho mpisakana anao, satria mivarina amin-doza eto anatrehako ny làlanao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Koa nahita Ahy ny boriky ka nivily Ahy intelo izao; raha tsy nivily Ahy izy, dia hianao no nataoko maty mihitsy toy izay, fa izy kosa no novelomiko.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia hoy Balama tamin’Ilay Anjelin’i Jehovah: Efa nanota aho; fa tsy fantatro fa Hianao no nijanona nisakana ahy teo an-dàlana; koa ankehitriny, raha tsy sitrakao izany, dia hiverina aho.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fa hoy Ilay Anjelin’i Jehovah tamin’i Balama: Mandehana ihany miaraka amin’ireo lehilahy ireo, kanefa ny teny izay holazaiko aminao ihany no holazainao. Dia nandeha Balama niaraka tamin’ireo andriandahin’i Balaka.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary nony ren’i Balaka fa tonga Balama, dia nivoaka izy mba hitsena azy teo amin’ny Tanànan’i Moaba, teo amin’ny fari-tanin’i Arnona, izay eo amin’ny sisin’ny fari-tany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary hoy Balaka tamin’i Balama: Tsy naniraka dia naniraka tany aminao va aho nampaka anao? ka nahoana no tsy nankatỳ amiko hianao? tsy haiko tokoa va ny hanome voninahitra anao?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dia hoy Balama tamin’i Balaka: Intỳ aho tonga eto aminao ankehitriny; kanefa mahazo milaza teny akory va aho? ny teny izay hataon’Andriamanitra ao am-bavako, dia izany no holazaiko. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dia nandeha Balama niaraka tamin’i Balaka, ka nankany Kiriata-hozota izy roa lahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy izy tamin’ny loholon’ny Midianita: Ankehitriny dia hiraoka izay rehetra manodidina antsika ireto vahoaka be ireto tahaka ny firaokan’ny omby ny zava-maitso any an-tsaha.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Balaka, zanak’i Zipora, no mpanjakan’i Moaba tamin’izany andro izany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary Balaka namono omby sy ondry aman-osy hatao fanatitra ka nampanatitra ho an’i Balama sy ny andriandahy izay teo aminy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny oha-teny nataon’i Balama.
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'ARY nony maraina Balama dia nalain’i Balaka ka nentiny niakatra ho ao Bamota-bala, ka dia tazany tao ny olona '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hatramin’
    - type: text
      text: ' ny sisin’'
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tobiny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia naniraka olona izy ho any amin’i Balama, zanak’i Beora, any Petora, izay eo amoron’ny Ony, dia eo amin’ny tanin’ny fireneny, mba hampaka azy, ka nanao hoe: Indro, misy firenena nivoaka avy tany Egypta; ary indro, mandrakotra ny tany rehetra izy ka mitoby tandrifiko; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: koa ankehitriny mba mankanesa atỳ, ka ozòny ho ahy ity firenena ity, fa mahery noho izaho izy; angamba hahazo mamely azy isika, ka handroaka azy hiala amin’ny tany aho; satria fantatro fa izay tsofinao rano dia voatahy, ary izay ozoninao dia voaozona.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nandeha ny loholon’ny Moabita sy ny loholon’ny Midianita nitondra ny saran’ny fankatovana teny an-tànany; dia nankany amin’i Balama izy ka nilaza taminy izay tenin’i Balaka. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy Balama taminy: Mandria atỳ anio alina, dia hamaly ny teninareo aho, araka izay holazain’i Jehovah amiko. Dia nitoetra tao amin’i Balama ireo andriandahin’i Moaba.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary Andriamanitra nankao amin’i Balama ka nanao hoe: Iza moa ireo lehilahy ato aminao ireo? '
