document_id: 1KI.13,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanirahan’Andriamanitra ilay mpaminany hananatra an’i Jeroboama noho ny nanaovany ireo sarin’ombilahy kely ireo sy ny nanjo azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY, indro, nisy lehilahin’Andriamanitra avy tany Joda tonga tany Betela noho ny tenin’i Jehovah, raha mbola nitsangana teo anilan’ny alitara handoro ditin-kazo manitra Jeroboama. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandeha tamin’ny làlana hafa izy, fa tsy niverina tamin’ilay nalehany ho any Betela.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy mpaminany antitra anankiray tao Betela; ary tonga ny zanany ka nilaza taminy izay rehetra nataon’ilay lehilahin’Andriamanitra androtriny tao Betela; ary nolazain’ireo tamin-drainy koa ny teny izay nolazain-dralehilahy tamin’ny mpanjaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy rainy taminy: Aiza no làlana nalehany? Fa ny zanany efa nahita ny làlana nalehan’ilay lehilahin’Andriamanitra izay tonga avy tany Joda. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamin’ny zanany: Asio lasely ny boriky hitaingenako. Dia nasiany lasely ny boriky hitaingenany, ka dia nitaingenany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nanaraka ilay lehilahin’Andriamanitra izy ka nahita azy nipetraka teo ambanin’ny hazo terebinta; ka hoy izy taminy: Hianao moa ilay lehilahin’Andriamanitra avy tany Joda? Ary hoy izy: Eny, izaho no izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy taminy: Andeha hiaraka amiko ho any an-tranoko mba hihinan-kanina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa izy: Tsy mahazo miverina hiaraka aminao aho na hiditra any an-tranonao, ary tsy hihinan-kanina na hisotro rano aminao atỳ aho, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria tonga tamiko ny tenin’i Jehovah hoe: Aza mihinan-kanina, na misotro rano any, ary aza miverina amin’ny làlana efa nalehanao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa izy taminy: Izaho koa mba mpaminany tahaka anao ihany; ary nisy anjely nilaza tamiko araka ny tenin’i Jehovah nanao hoe: Ento miverina hiaraka aminao ho any an-tranonao izy hihinan-kanina sy hisotro rano. Kanjo laingany izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niverina niaraka taminy izy ka nihinan-kanina sy nisotro rano tao an-tranony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay lehilahin’Andriamanitra niantso ny alitara araka ny tenin’i Jehovah ka nanao hoe: Ry alitara ô, ry alitara ô! izao no lazain’i Jehovah: Indro, hisy zaza hateraka ho an’ny taranak’i Davida, Josia no ho anarany; ary hovonoiny ka hateriny eo amboninao ny mpisorona amin’ny fitoerana avo izay mandoro ditin-kazo manitra eo amboninao, ary taolan’olona no hodorana eo amboninao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola nipetraka teo amin’ny latabatra izy roa lahy, dia tonga tamin’ilay mpaminany nitondra azy niverina ny tenin’i Jehovah; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izy niteny mafy tamin’ilay lehilahin’Andriamanitra avy tany Joda hoe: Izao no lazain’i Jehovah: Satria nandà ny tenin’i Jehovah hianao ka tsy nitandrina ny didy izay nandidian’i Jehovah Andriamanitrao anao, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa niverina nihinan-kanina sy nisotro rano tany amin’ny tany izay nandraran’i Jehovah anao hoe: Aza mihinan-kanina na misotro rano,–dia tsy ho tonga any am-pasan-drazanao ny fatinao.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa avy nihinana sy nisotro izy, dia nasiany lasely ny boriky hitaingenan’ilay mpaminany naveriny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nandeha izy, dia nisy liona nifanena taminy teny an-dalana ka nahafaty azy; ary ny fatiny dia niampatra teo an-dàlana, ary ny boriky nijanona teo anilany, ary ny liona koa nijanona teo anilan’ny faty. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary, indreo nisy olona nandalo ka nahita ny faty niampatra teo an-dàlana sy ny liona nijanona teo anilan’ny faty, dia lasa nandeha ireo ka nilaza izany tany an-tanàna izay nitoeran’ilay mpaminany antitra.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nandre izany ilay mpaminany izay namerina azy tany an-dàlana, dia hoy izy: Ilay lehilahin’Andriamanitra nandà ny tenin’i Jehovah izay; fa natolotr’i Jehovah ny liona izy ka noviravirainy sy novonoiny araka ny tenin’i Jehovah, izay efa nolazainy taminy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy niteny tamin’ny zanani-lahy hoe: Asio lasely ny boriky hitaingenako. Dia nasiany lasely izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nandeha izy, dia nahita ny fatin-dralehilahy niampatra teo an-dàlana, ary ny boriky sy ny liona samy nijanona teo anilan’ny faty; nefa ny liona tsy nihinana ny faty na namiravira ny boriky. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nobetain’ilay mpaminany ny fatin’ilay lehilahin’Andriamanitra ka nasampiny tamin’ny boriky, dia nentiny niverina; ary tonga tao an-tanàna ilay mpaminany antitra mba hisaona sy handevina azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary naneho fahagagana androtrizay izy nanao hoe: Izao no fahagagana izay nolazain’i Jehovah: Indro, hitresaka ny alitara, ka hikorotsaka ny lavenona izay eo amboniny.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fatin-dralehilahy naleviny tao am-pasany, dia nitomanian’ny olona hoe: Indrisy, ry rahalahiko!'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa voaleviny ralehilahy, dia hoy izy tamin’ny zanany: Rehefa maty aho, dia mba aleveno ao amin’ny fasana izay ilevenan’ilay lehilahin’Andriamanitra, ka ataovy eo anilan’ny taolany ny taolako; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa tsy maintsy ho tanteraka ilay teny nantsoiny noho ny tenin’i Jehovah nilaza ny loza ho tonga amin’ny alitara ao Betela sy amin’ny trano rehetra eny amin’ny fitoerana avo izay any an-tanànan’i Samaria.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa afaka izany, Jeroboama dia tsy mbola niala tamin’ny làlan-dratsiny ihany, fa mbola naka tamin’ny ankabiazam-bahoaka ho mpisorona amin’ny fitoerana avo; koa na iza na iza tia izany dia natokany,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nofenoiny ny tànany.
      marker-yv: yv-n
    - type: text
      text: ' mba ho tonga mpisorona amin’ny fitoerana avo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia tonga fahotan’ny taranak’i Jeroboama izany ka namongorana sy nandringanana azy tsy ho eo ambonin’ny tany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony ren’i Jeroboama mpanjaka ny tenin’ny lehilahin’Andriamanitra izay niantso ny alitara tao Betela, dia naninjitra ny tànany niala tamin’ny alitara izy ka nanao hoe: Hazòny ilehio. Dia maty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: maina.
      marker-yv: yv-n
    - type: text
      text: ' iny tànany nahinjiny nanondro azy iny ka tsy azony noketrahina intsony. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitresaka koa ny alitara, ka nikorotsaka ny lavenona teo amboniny, araka ny fahagagana izay nasehon’ilay lehilahin’Andriamanitra noho ny tenin’i Jehovah.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka namaly ilay lehilahin’Andriamanitra nanao hoe: Mba ifony amin’i Jehovah Andriamanitrao aho, ka mivavaha ho ahy, mba ho azoko ketrahina indray ny tànako. Ary ilay lehilahin’Andriamanitra dia nifona tamin’i Jehovah, ka dia azon’ny mpanjaka noketrahina indray ny tànany ka tonga tahaka ny teo.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’ilay lehilahin’ Andriamanitra: Andeha hiaraka amiko ho any an-trano hianao mba hanao ody am-bavafo kely, sady homeko zavatra hianao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ilay lehilahin’Andriamanitra tamin’ny mpanjaka: Na dia homenao ahy aza ny antsasaky ny ao an-tranonao, tsy hiditra any an-tranonao, na hihinan-kanina, na hisotro rano atỳ aho; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izao no tenin’i Jehovah nandrara ahy: Aza mihinan-kanina, na misotro rano, na miverina amin’izay làlana efa nalehanao. '
