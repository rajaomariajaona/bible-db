document_id: ACT.11,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny namalian’i Petera ny olona izay nanome tsiny azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY ny Apostoly sy ny rahalahy izay tany Jodia dia nahare fa ny jentilisa koa efa nandray ny tenin’Andriamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary intelo no nanaovana izany, dia nosarihana niakatra tany an-danitra indray izany rehetra izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary tamin’izay dia, indreo, nisy telo lahy nijanona teo anoloan’ny trano nitoeranay, izay iraka avy tany Kaisaria hankeo amiko. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nasain’ny Fanahy hiaraka tamin’ireo aho ka tsy hizaha tavan’olona na dia kely akory aza. Ary niaraka tamiko koa ireto rahalahy enina ireto, ka niditra tao an-tranon-dralehilahy izahay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nambarany taminay ny nahitany ny anjely nitsangana tao an-tranony ka nanao hoe: Maniraha ho any Jopa, ka ampanalao Simona, izay atao hoe koa Petera; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'izy hilaza teny aminao, izay hamonjena anao sy ny ankohonanao rehetra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary raha vao niteny aho, dia nilatsaka taminy ny Fanahy Masina tahaka ny tamintsika fahiny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nahatsiaro ny tenin’ny Tompo aho, izay nolazainy hoe: ,Jaona nanao batisa tamin’ny rano, fa hianareo kosa dia hatao batisa amin’ny Fanahy Masina.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Koa raha mba homen’Andriamanitra azy ny fanomezana, tahaka antsika fony isika vao nino an’i Jesosy Kristy Tompo dia iza moa aho no hahasakana an’Andriamanitra?
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary rehefa nandre izany ireo, dia nangina sady nankalaza an’Andriamanitra ka nanao hoe: Efa nomen’Andriamanitra ny jentilisa koa ny fibebahana hahazoany fiainana.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandrosoan’ny tenin’Andriamanitra tao Antiokia, sy ny nampianaran’i Barnabasy sy Saoly tao.
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ARY izay niely noho ny fanenjehana tamin’i Stefana dia nandeha hatrany Foinika sy Kyprosy ary Antiokia, nefa tsy nitori-teny tamin’ny olona izy, afa-tsy tamin’ny Jiosy ihany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nony tafakatra tany Jerosalema Petera, dia nila ady taminy ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mino
    - type: text
      text: ' izay isan’ny voafora '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary ny sasany tamin’ireny, dia lehilahy avy any Kyprosy sy Kyrena izay tonga tany Antiokia, dia niresaka tamin’ny jentilisa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Grika; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Helenista].'
      marker-yv: yv-n
    - type: text
      text: ' koa ka nitory an’i Jesosy Tompo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary ny tànan’ny Tompo nomba azy ireo, ka maro no isan’izay nino sy niverina ho amin’ny Tompo.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ren’ny sofin’ny fiangonana tany Jerosalema ny amin’ireo, dia naniraka an’i Barnabasy izy handeha hatrany Antiokia. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary rehefa tonga izy ka nahita ny fahasoavan’Andriamanitra, dia faly ka nananatra azy rehetra haharitra hiray amin’ny Tompo amin’ny fo minia fatratra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fa lehilahy tsara fanahy izy sady feno ny Fanahy Masina sy finoana; ary maro be ny olona nanampy ho an’ny Tompo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia lasa Barnabasy nankany Tarsosy hitady an’i Saoly. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary rehefa nahita azy izy, dia nitondra azy hankany Antiokia. Ary niara-niasa tao amin’ny fiangonana hatramin’ny herintaona ngarangidina izy roa lahy ka nampianatra olona maro; ary tany Antiokia no voalohany nanaovana ny anaran’ny mpianatra hoe Kristiana.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny naminanian’i Agabo fa hisy mosary.
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'ARY tamin’izany andro izany dia nisy mpaminany sasany avy tany Jerosalema nankany Antiokia. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary nitsangana ny anankiray tamin’ireny, izay atao hoe Agabo, fa voatsindrin’ny Fanahy izy ka nilaza fa hisy mosary be eran’ny tany rehetra. Ary dia tonga izany tamin’ny andron’i Klaodio. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary ny mpianatra ninia hampitondra zavatra araka ny ananany hamonjy ny rahalahy izay nonina tany Jodia. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka nanao hoe: Efa niantrano tany amin’ny olona tsy voafora hianao sady niara-nihinana taminy.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nataony izany, ary ny tànan’i Barnabasy sy Saoly no nampitondrainy izany ho any amin’ny loholona.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Petera dia nitantara izany taminy hatramin’ny niandohany ka nanao hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tany an-tanàna Jopa aho ka nivavaka, ary azon-tsindrimandry aho, dia nahita fahitana, ka, indro, nisy zavatra nidina avy tany an-danitra toa lamba lehibe nampidinina tamin’ny zorony efatra, dia nankeo amiko izany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary raha nijery sy nandinika azy aho, dia hitako ny biby etỳ an-tany, izay manan-tongotra efatra, sy ny bibi-dia sy ny zava-mandady sy mikisaka ary ny voro-manidina koa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nandre feo koa aho nanao tamiko hoe: Mitsangàna, ry Petera, vonoy, ka hano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa hoy izaho: Sanatria, Tompoko! fa tsy mbola niditra tamin’ny vavako izay zava-padina na tsy madio. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nisy feo avy tany an-danitra namaly fanindroany hoe: Izay efa nodiovin’Andriamanitra aza ataonao ho fady. '
