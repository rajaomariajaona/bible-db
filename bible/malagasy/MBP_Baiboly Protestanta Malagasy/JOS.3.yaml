document_id: JOS.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitan’ny Zanak’Isiraely an’i Jordana, sy ny tsangam-bato nataony tao Gilgala, ary ny tahotry ny Amorita sy ny Kananita tamin’izany.
  - type: text
    content: DIA nifoha maraina koa Josoa; ary ny olona dia niala tany Sitima ka nankany Jordana, dia Josoa sy ny Zanak’Isiraely rehetra, ary nitoetra teo izy aloha vao nita.
  '10':
  - type: text
    content: 'Dia hoy Josoa: Izao no hahafantaranareo fa eo aminareo Andriamanitra velona, ka horoahiny eo alohanareo tokoa ny Kananita sy ny Hetita sy ny Hivita sy ny Perizita sy ny Girgasita sy ny Amorita ary ny Jebosita: '
  '11':
  - type: text
    content: 'Indro, ny fiaran’ny faneken’ny Tompon’ny tany rehetra no mandroso eo alohanareo ho eo Jordana; '
  '12':
  - type: text
    content: 'koa ankehitriny mangalà lehilahy roa ambin’ny folo amin’ny firenen’Isiraely ho anareo, dia iray avy isam-pirenena; '
  '13':
  - type: text
    content: ary raha vao mijanona eo amin’ny rano Jordana ny faladian’ny mpisorona izay mitondra ny fiaran’ny faneken’i Jehovah, Tompon’ny tany rehetra, dia ho tapaka ny rano Jordana, dia ny rano izay midina avy any ambony, ka hijanona ho toy ny antontan-javatra.
  '14':
  - type: text
    content: 'Ary raha niala tamin’ny lainy hita an’i Jordana ny olona, ary ny mpisorona nitondra ny fiaran’ny fanekena eo alohan’ny olona, '
  '15':
  - type: text
    content: 'ka tonga teo Jordana izay nitondra ny fiara, ary naroboky ny mpisorona izay nitondra ny fiara tamin’ny sisin-drano ny tongony (fa tondraka mihoatra ny morony rehetra Jordana mandritra ny fararano), '
  '16':
  - type: text
    content: dia nijanona ny rano izay nidina avy tany ambony ka tonga toy ny antontan-javatra terỳ lavitra erỳ, dia terỳ amin’ny tanàna Adama, izay eo anilan’i Zaretana; eny, tapaka tokoa ny rano izay nidina ho any amin’ny ranomasin’ny tani-hay
  - type: note
    content: Heb. Arabà.
  - type: text
    content: ', dia ny Ranomasin-tsira; ary ny olona dia nita tandrifin’i Jeriko. '
  '17':
  - type: text
    content: Ary ny mpisorona izay nitondra ny fiaran’ny faneken’i Jehovah dia nijoro tsara tamin’ny tany maina teo afovoan’i Jordana, ary ny Isiraely rehetra nandeha tamin’ny tany maina mandra-pahatafitan’izy rehetra an’i Jordana.
  '2':
  - type: text
    content: 'Ary rehefa afaka hateloana, dia nandeha namaky ny toby ny mpifehy '
  '3':
  - type: text
    content: 'ka nandidy ny olona hoe: Rehefa hitanareo ny fiaran’ny faneken’i Jehovah Andriamanitrareo ary ny Levita mpisorona mitondra azy, dia mialà amin’ izay itoeranareo, ka manaraha azy '
  '4':
  - type: text
    content: (kanefa asio elanelany, tokony ho roa arivo hakiho, aminareo sy izy, fa aza manakaiky azy), mba ho fantatrareo ny làlana izay mety halehanareo; fa tsy mbola nalehanareo akory izao làlana izao.
  '5':
  - type: text
    content: 'Ary hoy Josoa tamin’ny olona: Manamasìna ny tenanareo: fa rahampitso dia hanao fahagagana eo aminareo Jehovah.'
  '6':
  - type: text
    content: 'Ary niteny tamin’ny mpisorona Josoa ka nanao hoe: Ento ny fiaran’ny fanekena, ka mità eo anoloan’ny olona. Dia nitondra ny fiaran’ny fanekena izy ka nandeha teo anoloan’ny olona.'
  '7':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Josoa: Anio no hanandratako anao eo imason’ny Isiraely rehetra, hahafantarany fa tahaka ny nombako an’i Mosesy no hombako anao koa. '
  '8':
  - type: text
    content: 'Ary mandidia ny mpisorona izay mitondra ny fiaran’ny fanekena, ka ataovy hoe: Rehefa mihatra amin’ny moron’i Jordana hianareo, dia mijanòna eo Jordana ihany.'
  '9':
  - type: text
    content: 'Ary Josoa nanao tamin’ny Zanak’Isiraely hoe: Mankanesa atỳ, ka mihainoa ny tenin’i Jehovah Andriamanitrareo. '
