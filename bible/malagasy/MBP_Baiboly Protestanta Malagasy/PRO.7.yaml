document_id: PRO.7
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anaka, tandremo ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raketo ao aminao ny didiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tandremo ny didiko, dia ho velona hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tandremo toy ny anakandriamasonao ny lalàko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Afehezo eo amin’ny rantsan-tànanao izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soraty ao amin’ny fonao tahaka ny amin’ny vato fisaka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny fahendrena dia ilazao hoe: Anabaviko hianao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny fahafantarana dia antsoy hoe: Sakaiza mahazatra hianao;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mba hiarovana anao amin’ny vehivavy jejo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vehivavy tsy vadinao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’ny vahiny janga izay manao teny mandrobo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa teo amin’ny varavarankelin’ny tranoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia teo amin’ny makarakara, no nitsirihako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ka nahita anankiray tamin’ny kely saina aho,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nandinika ny tovolahy aho ka nahita zazalahy anankiray tsy ampy saina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay nandeha tamin’ny làlana akaikin’ny zoron-tranon’ny vehivavy janga
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nizotra nankany an-tranony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nony takariva ilay somambisamby iny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tamin’ny alina efa maizina dia maizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia, indro, nisy vehivavy nitsena azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manao fitafin’ny janga no mifetsy am-po,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sady vavana no maditra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahajanona ao an-tranony ny tongony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa vetivety mby eny an-dàlambe izy, ary vetivety mby eny an-tsena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamitsaka eny an-joron-trano rehetra eny izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka dia nisavika ilay tovolahy izy ka nanoroka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sady nisolantsolana taminy ka nilaza hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa nivoady hanatitra fanati-pihavanana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary andro-any no nanefako ny voadiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa dia nivoaka hitsena anao aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hitady fatratra ny tarehinao, ka dia nahita anao tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fandriako efa nasiako firakotra tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia lambam-pandriana misoratsoratra voafoly hatrany Egypta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Efa norarahako zava-manitra ny fandriako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia miora sy hazomanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahalima.
    marker-yv: yv-n
  - type: text
    text: ' ary havozo manitra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Andeha, aoka isika hivoky fitia ambara-pahamarain’ny andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho feno fahafinaretana amin’ny fitiavana isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa tsy ao an-trano ny lehilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lasa nivahiny lavitra izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny kitampom-bola dia nentiny any an-tànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mbola hody izy mandra-pahafenon’ny volana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tamin’ny teny maro no nampanekeny azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny fandroboan’ny molony no nitaomany azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ka dia nandeha nanaraka azy niaraka tamin’izay ilay zatovo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Na iza na iza mandeha manaraka azy dia.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny omby entina hovonoina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny adala hogadrana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tahaka ny gadra no famaizana ny adala.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ambara-piboroaky ny lefompohy amin’ny atiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny vorona mipaoka ny fandrika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy fantany hahafaty ny ainy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa mihainoa ahy hianareo, anaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tandremo ny teny aloaky ny vavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka tsy hivily ho any amin’ny làlany ny fonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mania ho amin’ny alehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa betsaka no naripany ka maty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maro be no efa matiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny tranony dia làlana mankany amin’ny fiainan-tsi-hita,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, midina ho any amin’ny efitranon’ny fahafatesana.
