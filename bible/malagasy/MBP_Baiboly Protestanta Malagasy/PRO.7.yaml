document_id: PRO.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, tandremo ny teniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raketo ao aminao ny didiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia, indro, nisy vehivavy nitsena azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady manao fitafin’ny janga no mifetsy am-po,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady vavana no maditra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahajanona ao an-tranony ny tongony;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa vetivety mby eny an-dàlambe izy, ary vetivety mby eny an-tsena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamitsaka eny an-joron-trano rehetra eny izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia nisavika ilay tovolahy izy ka nanoroka azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sady nisolantsolana taminy ka nilaza hoe:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nivoady hanatitra fanati-pihavanana aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary andro-any no nanefako ny voadiko.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa dia nivoaka hitsena anao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hitady fatratra ny tarehinao, ka dia nahita anao tokoa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fandriako efa nasiako firakotra tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia lambam-pandriana misoratsoratra voafoly hatrany Egypta.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa norarahako zava-manitra ny fandriako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia miora sy hazomanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ahalima.
      marker-yv: yv-n
    - type: text
      text: ' ary havozo manitra.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha, aoka isika hivoky fitia ambara-pahamarain’ny andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho feno fahafinaretana amin’ny fitiavana isika.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy ao an-trano ny lehilahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lasa nivahiny lavitra izy;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo ny didiko, dia ho velona hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tandremo toy ny anakandriamasonao ny lalàko.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kitampom-bola dia nentiny any an-tànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mbola hody izy mandra-pahafenon’ny volana.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny teny maro no nampanekeny azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny fandroboan’ny molony no nitaomany azy,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia nandeha nanaraka azy niaraka tamin’izay ilay zatovo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Na iza na iza mandeha manaraka azy dia.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny omby entina hovonoina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny adala hogadrana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tahaka ny gadra no famaizana ny adala.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-piboroaky ny lefompohy amin’ny atiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny vorona mipaoka ny fandrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy fantany hahafaty ny ainy izany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mihainoa ahy hianareo, anaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tandremo ny teny aloaky ny vavako.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hivily ho any amin’ny làlany ny fonareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mania ho amin’ny alehany.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa betsaka no naripany ka maty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary maro be no efa matiny.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tranony dia làlana mankany amin’ny fiainan-tsi-hita,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, midina ho any amin’ny efitranon’ny fahafatesana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afehezo eo amin’ny rantsan-tànanao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soraty ao amin’ny fonao tahaka ny amin’ny vato fisaka izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny fahendrena dia ilazao hoe: Anabaviko hianao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny fahafantarana dia antsoy hoe: Sakaiza mahazatra hianao;'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hiarovana anao amin’ny vehivavy jejo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vehivavy tsy vadinao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’ny vahiny janga izay manao teny mandrobo.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa teo amin’ny varavarankelin’ny tranoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia teo amin’ny makarakara, no nitsirihako,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nahita anankiray tamin’ny kely saina aho,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nandinika ny tovolahy aho ka nahita zazalahy anankiray tsy ampy saina,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nandeha tamin’ny làlana akaikin’ny zoron-tranon’ny vehivavy janga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nizotra nankany an-tranony,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nony takariva ilay somambisamby iny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tamin’ny alina efa maizina dia maizina.
