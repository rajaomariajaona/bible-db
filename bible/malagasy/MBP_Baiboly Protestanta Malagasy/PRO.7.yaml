document_id: PRO.7,873
type_code: plt
verses:
  '1':
  - type: text
    content: Anaka, tandremo ny teniko,
  - type: text
    content: Ary raketo ao aminao ny didiko.
  '10':
  - type: text
    content: Dia, indro, nisy vehivavy nitsena azy
  - type: text
    content: Sady manao fitafin’ny janga no mifetsy am-po,
  '11':
  - type: text
    content: Sady vavana no maditra,
  - type: text
    content: Tsy mahajanona ao an-tranony ny tongony;
  '12':
  - type: text
    content: Fa vetivety mby eny an-dàlambe izy, ary vetivety mby eny an-tsena,
  - type: text
    content: Ary mamitsaka eny an-joron-trano rehetra eny izy.
  '13':
  - type: text
    content: Ka dia nisavika ilay tovolahy izy ka nanoroka azy
  - type: text
    content: 'Sady nisolantsolana taminy ka nilaza hoe:'
  '14':
  - type: text
    content: Efa nivoady hanatitra fanati-pihavanana aho;
  - type: text
    content: Ary andro-any no nanefako ny voadiko.
  '15':
  - type: text
    content: Koa dia nivoaka hitsena anao aho,
  - type: text
    content: Mba hitady fatratra ny tarehinao, ka dia nahita anao tokoa.
  '16':
  - type: text
    content: Ny fandriako efa nasiako firakotra tsara,
  - type: text
    content: Dia lambam-pandriana misoratsoratra voafoly hatrany Egypta.
  '17':
  - type: text
    content: Efa norarahako zava-manitra ny fandriako,
  - type: text
    content: Dia miora sy hazomanitra
  - type: note
    content: Heb. ahalima.
  - type: text
    content: ' ary havozo manitra.'
  '18':
  - type: text
    content: Andeha, aoka isika hivoky fitia ambara-pahamarain’ny andro,
  - type: text
    content: Aoka ho feno fahafinaretana amin’ny fitiavana isika.
  '19':
  - type: text
    content: Fa tsy ao an-trano ny lehilahy,
  - type: text
    content: Fa lasa nivahiny lavitra izy;
  '2':
  - type: text
    content: Tandremo ny didiko, dia ho velona hianao;
  - type: text
    content: Ary tandremo toy ny anakandriamasonao ny lalàko.
  '20':
  - type: text
    content: Ny kitampom-bola dia nentiny any an-tànany,
  - type: text
    content: Ka tsy mbola hody izy mandra-pahafenon’ny volana.
  '21':
  - type: text
    content: Tamin’ny teny maro no nampanekeny azy,
  - type: text
    content: Tamin’ny fandroboan’ny molony no nitaomany azy,
  '22':
  - type: text
    content: Ka dia nandeha nanaraka azy niaraka tamin’izay ilay zatovo,
  - type: note
    content: 'Na: Na iza na iza mandeha manaraka azy dia.'
  - type: text
    content: Tahaka ny omby entina hovonoina,
  - type: text
    content: Ary tahaka ny adala hogadrana,
  - type: note
    content: Heb. tahaka ny gadra no famaizana ny adala.
  '23':
  - type: text
    content: Ambara-piboroaky ny lefompohy amin’ny atiny,
  - type: text
    content: Ary tahaka ny vorona mipaoka ny fandrika,
  - type: text
    content: Fa tsy fantany hahafaty ny ainy izany.
  '24':
  - type: text
    content: Koa mihainoa ahy hianareo, anaka,
  - type: text
    content: Ary tandremo ny teny aloaky ny vavako.
  '25':
  - type: text
    content: Aoka tsy hivily ho any amin’ny làlany ny fonareo,
  - type: text
    content: Ary aza mania ho amin’ny alehany.
  '26':
  - type: text
    content: Fa betsaka no naripany ka maty;
  - type: text
    content: Ary maro be no efa matiny.
  '27':
  - type: text
    content: Ny tranony dia làlana mankany amin’ny fiainan-tsi-hita,
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Eny, midina ho any amin’ny efitranon’ny fahafatesana.
  '3':
  - type: text
    content: Afehezo eo amin’ny rantsan-tànanao izy,
  - type: text
    content: Soraty ao amin’ny fonao tahaka ny amin’ny vato fisaka izy.
  '4':
  - type: text
    content: 'Ny fahendrena dia ilazao hoe: Anabaviko hianao;'
  - type: text
    content: 'Ary ny fahafantarana dia antsoy hoe: Sakaiza mahazatra hianao;'
  '5':
  - type: text
    content: Mba hiarovana anao amin’ny vehivavy jejo,
  - type: note
    content: Heb. vehivavy tsy vadinao.
  - type: text
    content: Dia amin’ny vahiny janga izay manao teny mandrobo.
  '6':
  - type: text
    content: Fa teo amin’ny varavarankelin’ny tranoko,
  - type: text
    content: Dia teo amin’ny makarakara, no nitsirihako,
  '7':
  - type: text
    content: Ka nahita anankiray tamin’ny kely saina aho,–
  - type: text
    content: Eny, nandinika ny tovolahy aho ka nahita zazalahy anankiray tsy ampy saina,
  '8':
  - type: text
    content: Izay nandeha tamin’ny làlana akaikin’ny zoron-tranon’ny vehivavy janga
  - type: text
    content: Sy nizotra nankany an-tranony,
  '9':
  - type: text
    content: Nony takariva ilay somambisamby iny
  - type: text
    content: Sy tamin’ny alina efa maizina dia maizina.
