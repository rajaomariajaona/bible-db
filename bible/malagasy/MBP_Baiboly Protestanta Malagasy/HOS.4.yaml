document_id: HOS.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fananarana ny Isiraely noho ny helony.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MIHAINOA ny tenin’i Jehovah, hianareo Zanak’Isiraely!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah manana ady amin’ny mponina amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy misy fahamarinana, na fitiavana, na fahalalana an’Andriamanitra eo amin’ny tany,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hihinana izy, nefa tsy ho voky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hijangajanga izy, nefa tsy hihabetsaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria Jehovah efa tsy nahoany intsony.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fijangajangana sy divay ary ranom-boaloboka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No mahalasa ny saina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny oloko dia mila saina amin’ny tapa-kazony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tehiny no manambara aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fanahim-pijangajangana no nampania azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary lasan-ko janga izy ka tsy manaiky an’Andriamaniny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-tampon’ny tendrombohitra no amonoany zavatra hatao fanatitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary eny amin’ny havoana no andoroany ditin-kazo manitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eny ambanin’ny hazo ôka sy ny popola ary ny terebinta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsara alokaloka ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no ijejojejoan’ny zanakavavinareo sy ijangajangàn’ny vinantovavinareo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hamaly ny zanakavavinareo Aho, raha mijejojejo izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny vinantovavinareo, raha mijangajanga izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tenanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireny.
      marker-yv: yv-n
    - type: text
      text: ' aza dia miavaka hankamin’ny mpijangajanga'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mamono zavatra hatao fanatitra miaraka amin’ireo vehivavy mpanolo-tena hijangajanga ho fanompoan-tsampy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho lavo ny firenena tsy misaina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia mijangajanga aza hianao, ry Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny Joda tsy mba hanota;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mankany Gilgala na miakatra any Betavena hianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aza mianiana hoe: Raha velona koa Jehovah!'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny Isiraely dia maditra toy ny vantotr’ombivavy maditra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia handrasan’i Jehovah toy ny zanak’ondry eny amin’ny malalaka izy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tafaraikitra amin’ny sampy Efraima;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izy ho eo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa lefy ny divainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahery mijangajanga izy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rehefa mitsahatra ny fibobohany, dia mahery mijangajanga izy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fatra-pitia henatra ireo mpanapaka azy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampingany.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voapaoky ny elatry ny rivotra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho menatra noho ny zavatra novonoiny hatao fanatitra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fianianana sy lainga sy vonoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy halatra sy fijangajangana kosa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manao an-keriny izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa ny fianianana sy ny lainga sy ny vonoana sy ny halatra ary ny fijangajangana no mihabetsaka.
      marker-yv: yv-n
    - type: text
      text: ' ka mifanontona ny fandatsahan-dra.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary noho izany dia mitomany ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary reraka izay rehetra mitoetra ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mbamin’.
      marker-yv: yv-n
    - type: text
      text: ' ny bibi-dia sy ny voro-manidina;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, na dia ny hazandrano any anaty ranomasina aza dia ringana koa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa aza misy mandahatra, na mananatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny oloko dia efa tahaka ny mifanditra amin’ny mpisorona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho tafintohina antoandro hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpaminany hiara-tafintohina aminao koa amin’ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hovonoiko ny reninao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ringana ny oloko noho ny tsi-fisian’ny fahalalana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria hianao efa nandà ny fahalalana, dia mba holaviko kosa tsy ho mpisoroko intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nanadino ny lalàn’Andriamanitrao hianao, ka dia mba hohadinoiko kosa ny zanakao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny nitomboany no nanotany tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hampodiko ho henatra kosa ny voninahiny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanatitra noho ny ota izay aterin’ny oloko dia haniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka satriny ihany ny ho diso ireny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho sahala ihany ny hanjo ny olona sy ny mpisorona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hovaliako izy noho ny làlany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ataony dia hatsingeriko aminy.
