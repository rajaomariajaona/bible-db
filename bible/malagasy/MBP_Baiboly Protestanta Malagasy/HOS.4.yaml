document_id: HOS.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fananarana ny Isiraely noho ny helony.
  - type: text
    content: MIHAINOA ny tenin’i Jehovah, hianareo Zanak’Isiraely!
  - type: text
    content: Fa Jehovah manana ady amin’ny mponina amin’ny tany,
  - type: text
    content: Satria tsy misy fahamarinana, na fitiavana, na fahalalana an’Andriamanitra eo amin’ny tany,
  '10':
  - type: text
    content: Ka dia hihinana izy, nefa tsy ho voky,
  - type: text
    content: Hijangajanga izy, nefa tsy hihabetsaka,
  - type: text
    content: Satria Jehovah efa tsy nahoany intsony.
  '11':
  - type: text
    content: Fijangajangana sy divay ary ranom-boaloboka
  - type: text
    content: No mahalasa ny saina.
  '12':
  - type: text
    content: Ny oloko dia mila saina amin’ny tapa-kazony,
  - type: text
    content: Ary ny tehiny no manambara aminy;
  - type: text
    content: Fa ny fanahim-pijangajangana no nampania azy,
  - type: text
    content: Ary lasan-ko janga izy ka tsy manaiky an’Andriamaniny.
  '13':
  - type: text
    content: Eny an-tampon’ny tendrombohitra no amonoany zavatra hatao fanatitra,
  - type: text
    content: Ary eny amin’ny havoana no andoroany ditin-kazo manitra,
  - type: text
    content: Dia eny ambanin’ny hazo ôka sy ny popola ary ny terebinta,
  - type: text
    content: Satria tsara alokaloka ireny,
  - type: text
    content: Koa izany no ijejojejoan’ny zanakavavinareo sy ijangajangàn’ny vinantovavinareo.
  '14':
  - type: text
    content: Tsy hamaly ny zanakavavinareo Aho, raha mijejojejo izy,
  - type: text
    content: Na ny vinantovavinareo, raha mijangajanga izy,
  - type: text
    content: Fa ny tenanareo
  - type: note
    content: Heb. ireny.
  - type: text
    content: ' aza dia miavaka hankamin’ny mpijangajanga'
  - type: text
    content: Sady mamono zavatra hatao fanatitra miaraka amin’ireo vehivavy mpanolo-tena hijangajanga ho fanompoan-tsampy,
  - type: text
    content: Ka dia ho lavo ny firenena tsy misaina.
  '15':
  - type: text
    content: Na dia mijangajanga aza hianao, ry Isiraely,
  - type: text
    content: Aoka ny Joda tsy mba hanota;
  - type: text
    content: Ary aza mankany Gilgala na miakatra any Betavena hianareo;
  - type: text
    content: 'Ary aza mianiana hoe: Raha velona koa Jehovah!'
  '16':
  - type: text
    content: Fa ny Isiraely dia maditra toy ny vantotr’ombivavy maditra;
  - type: text
    content: Ankehitriny dia handrasan’i Jehovah toy ny zanak’ondry eny amin’ny malalaka izy.
  '17':
  - type: text
    content: Tafaraikitra amin’ny sampy Efraima;
  - type: text
    content: Aoka izy ho eo.
  '18':
  - type: text
    content: Efa lefy ny divainy;
  - type: text
    content: Mahery mijangajanga izy;
  - type: note
    content: 'Na: Rehefa mitsahatra ny fibobohany, dia mahery mijangajanga izy.'
  - type: text
    content: Fatra-pitia henatra ireo mpanapaka azy.
  - type: note
    content: Heb. ampingany.
  '19':
  - type: text
    content: Voapaoky ny elatry ny rivotra izy
  - type: text
    content: Ka ho menatra noho ny zavatra novonoiny hatao fanatitra.
  '2':
  - type: text
    content: Fa fianianana sy lainga sy vonoana
  - type: text
    content: Sy halatra sy fijangajangana kosa,
  - type: text
    content: Eny, manao an-keriny izy
  - type: note
    content: 'Na: Fa ny fianianana sy ny lainga sy ny vonoana sy ny halatra ary ny fijangajangana no mihabetsaka.'
  - type: text
    content: ' ka mifanontona ny fandatsahan-dra.'
  '3':
  - type: text
    content: Ary noho izany dia mitomany ny tany
  - type: text
    content: Ary reraka izay rehetra mitoetra ao aminy,
  - type: text
    content: Dia
  - type: note
    content: 'Na: Mbamin’.'
  - type: text
    content: ' ny bibi-dia sy ny voro-manidina;'
  - type: text
    content: Eny, na dia ny hazandrano any anaty ranomasina aza dia ringana koa.
  '4':
  - type: text
    content: Kanefa aza misy mandahatra, na mananatra;
  - type: text
    content: Fa ny oloko dia efa tahaka ny mifanditra amin’ny mpisorona.
  '5':
  - type: text
    content: Ka dia ho tafintohina antoandro hianao,
  - type: text
    content: Ary ny mpaminany hiara-tafintohina aminao koa amin’ny alina,
  - type: text
    content: Ary hovonoiko ny reninao.
  '6':
  - type: text
    content: Ringana ny oloko noho ny tsi-fisian’ny fahalalana.
  - type: text
    content: Satria hianao efa nandà ny fahalalana, dia mba holaviko kosa tsy ho mpisoroko intsony;
  - type: text
    content: Ary efa nanadino ny lalàn’Andriamanitrao hianao, ka dia mba hohadinoiko kosa ny zanakao.
  '7':
  - type: text
    content: Araka ny nitomboany no nanotany tamiko,
  - type: text
    content: Ka dia hampodiko ho henatra kosa ny voninahiny.
  '8':
  - type: text
    content: Ny fanatitra noho ny ota izay aterin’ny oloko dia haniny,
  - type: text
    content: Ka satriny ihany ny ho diso ireny.
  '9':
  - type: text
    content: Ary ho sahala ihany ny hanjo ny olona sy ny mpisorona;
  - type: text
    content: Dia hovaliako izy noho ny làlany,
  - type: text
    content: Ary ny ataony dia hatsingeriko aminy.
