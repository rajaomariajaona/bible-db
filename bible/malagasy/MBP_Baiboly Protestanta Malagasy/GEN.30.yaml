document_id: GEN.30,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary rehefa hitan-dRahely fa tsy mba niteraka tamin’i Jakoba izy, dia nialona ny rahavaviny izy, ka hoy izy tamin’i Jakoba: Mba omeo zaza aho, fa raha tsy izany, dia ho faty aho. '
  '10':
  - type: text
    content: 'Ary Zilpa, ankizivavin’i Lea, dia niteraka zazalahy tamin’i Jakoba. '
  '11':
  - type: text
    content: 'Ary hoy Lea: Manan-jara re aho! dia nataony hoe Gada'
  - type: note
    content: Gada = Zara.
  - type: text
    content: ' ny anarany.'
  '12':
  - type: text
    content: 'Ary Zilpa, ankizivavin’i Lea, dia niteraka zazalahy faharoany tamin’i Jakoba. '
  '13':
  - type: text
    content: 'Ary hoy Lea: Sambatra aho, fa hataon’ny zanakavavin’ny olona hoe sambatra aho; dia nataony hoe Asera'
  - type: note
    content: Asera = Sambatra.
  - type: text
    content: ' ny anarany.'
  '14':
  - type: text
    content: Ary nivoaka nitsangantsangana Robena tamin’ny andro fijinjam-bary
  - type: note
    content: Tritika, dia varimbazaha.
  - type: text
    content: ' ka nahita dodaima'
  - type: note
    content: Mandragora, dia zava-maniry iray karazana amin’ny ramiary.
  - type: text
    content: ' '
  - type: text
    content: naniry
  - type: text
    content: ' tany an-tsaha, dia nitondra azy ho any amin’i Lea reniny. Ary hoy Rahely tamin’i Lea: Veloma hianao, mba anomezo ahy kely ny dodaiman’ny zanakao. '
  '15':
  - type: text
    content: 'Ary hoy izy taminy: Moa zavatra kely va ny nakanao ny vadiko? dia halainao koa va ny dodaiman’ny zanako? Ary hoy Rahely: Aoka handry aminao ihany ary izy anio alina noho ny dodaiman’ny zanakao. '
  '16':
  - type: text
    content: 'Ary nony hariva, rehefa tonga avy tany an-tsaha Jakoba, dia nivoaka nitsena azy Lea ka nanao hoe: Ho ato amiko no halehanao; fa ny dodaiman’ny zanako no efa nakaramako anao tokoa. Dia nandry taminy izy tamin’iny alina iny.'
  '17':
  - type: text
    content: 'Ary Andriamanitra nihaino an’i Lea, dia nanan-anaka izy ka niteraka zazalahy fahadiminy tamin’i Jakoba. '
  '18':
  - type: text
    content: 'Ary hoy Lea: Efa nomen’Andriamanitra ny karamako, satria nomeko hovadin’ny vadiko ny ankizivaviko; dia nataony hoe Isakara'
  - type: note
    content: Isakara = Misy karama, na mitondra karama.
  - type: text
    content: ' ny anarany.'
  '19':
  - type: text
    content: 'Dia nanan-anaka indray Lea ka niteraka zazalahy faheniny tamin’i Jakoba. '
  '2':
  - type: text
    content: 'Dia nirehitra tamin-dRahely ny fahatezeran’i Jakoba, ka hoy izy: Solon’Andriamanitra, Izay nahamomba anao tsy hiteraka, va aho? '
  '20':
  - type: text
    content: 'Ary hoy Lea: Efa nanome anjara soa ho ahy Andriamanitra; amin’izao vao hitoetra amiko ny vadiko, fa efa niteraka zaza enin-dahy ho azy aho; dia nataony hoe Zebolona'
  - type: note
    content: Zebolona = Fitoerana, na fonenena.
  - type: text
    content: ' ny anarany.'
  '21':
  - type: text
    content: Ary rehefa afaka izany, dia niteraka zazavavy izy, ka nataony hoe Dina ny anarany.
  '22':
  - type: text
    content: 'Ary Andriamanitra nahatsiaro an-dRahely, dia nihaino azy ka nampanan-anaka azy. '
  '23':
  - type: text
    content: 'Ary nanan-anaka izy ka niteraka zazalahy; dia hoy izy: Efa nahafa-tondromaso ahy Andriamanitra. '
  '24':
  - type: text
    content: Dia nataony hoe Josefa
  - type: note
    content: Josefa = Hanampy, na hanaisotra, Izy.
  - type: text
    content: ' ny anarany, ka hoy izy: Jehovah anie mbola hanampy zazalahy iray ho ahy koa.'
  - type: heading
    content: Ny fanekena hafa koa izay nataon’i Labana sy Jakoba.
  '25':
  - type: text
    content: 'ARY rehefa niteraka an’i Josefa Rahely, dia hoy Jakoba tamin’i Labana: Alefaso aho hankany amin’ny fonenako sy ny taniko. '
  '26':
  - type: text
    content: Omeo ahy ny vadiko aman-janako, izay nanompoako anao, dia handeha aho; fa fantatrao ny fanompoana izay nanompoako anao.
  '27':
  - type: text
    content: 'Ary hoy Labana taminy: Masìna hianao, raha nahita fitia eo imasonao aho, '
  - type: text
    content: mitoera eto amiko;
  - type: text
    content: ' efa namantatra'
  - type: note
    content: Heb. efa nanao sikidy.
  - type: text
    content: ' aho, ka fantatro fa avy taminao no nitahian’i Jehovah ahy. '
  '28':
  - type: text
    content: 'Ary hoy koa izy: Tonòny izay ho karamanao, dia homeko anao.'
  '29':
  - type: text
    content: 'Ary hoy Jakoba taminy; Fantatrao ny nanompoako anao sy ny toetry ny omby aman-ondrinao tato amiko. '
  '3':
  - type: text
    content: 'Ary hoy izy: Indro Bila ankizivaviko, vadio izy; dia hiteraka eo am-pofoako izy, mba hahazoako zaza aminy. '
  '30':
  - type: text
    content: Fa kely ny fanananao, fony tsy mbola tonga aho, fa efa nitombo be dia be izy; ary efa nitahy anao Jehovah tamin’ny diako rehetra; ary ankehitriny, rahoviana kosa aho no mba hihary ho an’ny ao an-tranoko?
  '31':
  - type: text
    content: 'Ary hoy izy: Inona ary no homeko anao? Ary hoy Jakoba: Tsy hanome ahy na inona na inona hianao; raha hataonao amiko izao zavatra izao, dia mbola handrasako sy hotandremako ihany ny ondry aman-osinao: '
  '32':
  - type: text
    content: 'Handeha hitety ny ondry aman-osinao rehetra aho anio ka hanavaka ny mara sy ny sada rehetra, ary ny mainty rehetra eo amin’ny ondry ary ny sada sy ny mara eo amin’ny osy; koa ireny no ho karamako. '
  '33':
  - type: text
    content: 'Ny fahamarinako no ho vavolombeloko amin’ny andro ho avy, raha tonga hianao handinika ny karamako: izay rehetra tsy mara ary tsy sada eo amin’ny osy, ary izay tsy mainty eo amin’ny ondry, dia ho halatro izany.'
  '34':
  - type: text
    content: 'Ary hoy Labana: Eny, aoka ho araka ny teninao ary. '
  '35':
  - type: text
    content: 'Dia navahany tamin’izany andro izany ny osilahy sadika sy sada, ary izay osivavy rehetra mara sy sada, dia izay rehetra nisy fotsy, ary ny mainty rehetra teo amin’ny ondry; dia natolony teo an-tànan’ny zanani-lahy ireny. '
  '36':
  - type: text
    content: Ary nasiany làlan-kateloana teo anelanelan’izy sy Jakoba; ary Jakoba niandry ny ondry aman-osin’i Labana sisa.
  '37':
  - type: text
    content: Ary Jakoba dia naka tsora-kazo maro tamin’ny hazo popola maitso sy tamin’ny hazo lozy
  - type: note
    content: Lozy = amygdala (?).
  - type: text
    content: ' sy tamin’ny hazo platana; ka nataony ofy vandana ireny hisehoan’ny fotsy izay teo amin’ny tsora-kazo. '
  '38':
  - type: text
    content: 'Ary ireny tsora-kazo voaofiny ireny dia napetrany teo anoloan’ny ondry aman-osy, teo anatin’ny tavin-drano, dia teo amin’ny fisotroan-drano, izay nalehan’ny ondry aman-osy hisotro, ka nikambana teo ny lahy sy ny vavy, raha avy hisotro rano izy. '
  '39':
  - type: text
    content: 'Dia nikambana tandrifin’ny tsora-kazo ny ondry aman-osy ka niteraka sadika sy mara ary sada. '
  '4':
  - type: text
    content: 'Dia nomeny azy Bila ankizivaviny ho vadiny; ary dia novadin’i Jakoba koa izy. '
  '40':
  - type: text
    content: 'Ary ny zanak’ondry navahan’i Jakoba, ary ny ondry sisa dia nataony manatrika ny sadika sy ny mainty rehetra teo amin’ny ondry aman-osin’i Labana; ary natokany izay ondry aman-osy ho azy ka tsy navelany hiharo tamin’ny ondry aman-osin’i Labana. '
  '41':
  - type: text
    content: 'Ary na oviana na oviana no hikambanan’ny ondry aman-osy matanjaka, dia napetrak’i Jakoba teo anatin’ny tavin-drano teo anoloan’ny mason’ny ondry aman-osy ireny tsora-kazo ireny, mba hikambanany eo anilan’ny tsora-kazo. '
  '42':
  - type: text
    content: Fa raha osaosa kosa ny ondry aman-osy, dia tsy mba napetrany teo ireny; ka dia ny osaosa no an’i Labana, fa ny matanjaka kosa no an’i Jakoba.
  '43':
  - type: text
    content: Dia nitombo harena indrindra ralehilahy ka nanana ondry aman-osy betsaka ary andevovavy sy andevolahy ary rameva sy boriky.
  '5':
  - type: text
    content: 'Dia nanan-anaka Bila ka niteraka zazalahy tamin’i Jakoba. '
  '6':
  - type: text
    content: 'Ary hoy Rahely: Andriamanitra efa nanome ahy ny rariny sady efa nihaino ny feoko, ka nomeny zazalahy aho; izany no nanaovany ny anarany hoe Dana.'
  - type: note
    content: Dana = Mpanome rariny.
  '7':
  - type: text
    content: 'Dia nanan-anaka indray Bila, ankizivavin-dRahely, ka niteraka zazalahy faharoany tamin’i Jakoba. '
  '8':
  - type: text
    content: 'Ary hoy Rahely: Fitolomana mafy dia mafy'
  - type: note
    content: Heb. Fitolomana tamin’Andriamanitra.
  - type: text
    content: ' no nitolomako tamin’ny rahavaviko, ka nahery aho; dia nataony hoe Naftaly'
  - type: note
    content: Naftaly = Fitolomako.
  - type: text
    content: ' ny anarany.'
  '9':
  - type: text
    content: 'Ary rehefa hitan’i Lea fa efa nitsaha-jaza izy, dia naka an’i Zilpa ankizivaviny izy, ka nomeny ho vadin’i Jakoba koa. '
