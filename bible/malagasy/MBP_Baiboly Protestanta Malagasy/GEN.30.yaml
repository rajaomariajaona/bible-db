document_id: GEN.30
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa hitan-dRahely fa tsy mba niteraka tamin’i Jakoba izy, dia nialona ny rahavaviny izy, ka hoy izy tamin’i Jakoba: Mba omeo zaza aho, fa raha tsy izany, dia ho faty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nirehitra tamin-dRahely ny fahatezeran’i Jakoba, ka hoy izy: Solon’Andriamanitra, Izay nahamomba anao tsy hiteraka, va aho? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy izy: Indro Bila ankizivaviko, vadio izy; dia hiteraka eo am-pofoako izy, mba hahazoako zaza aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nomeny azy Bila ankizivaviny ho vadiny; ary dia novadin’i Jakoba koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanan-anaka Bila ka niteraka zazalahy tamin’i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Rahely: Andriamanitra efa nanome ahy ny rariny sady efa nihaino ny feoko, ka nomeny zazalahy aho; izany no nanaovany ny anarany hoe Dana.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dana = Mpanome rariny.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nanan-anaka indray Bila, ankizivavin-dRahely, ka niteraka zazalahy faharoany tamin’i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Rahely: Fitolomana mafy dia mafy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fitolomana tamin’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ' no nitolomako tamin’ny rahavaviko, ka nahery aho; dia nataony hoe Naftaly'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Naftaly = Fitolomako.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa hitan’i Lea fa efa nitsaha-jaza izy, dia naka an’i Zilpa ankizivaviny izy, ka nomeny ho vadin’i Jakoba koa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Zilpa, ankizivavin’i Lea, dia niteraka zazalahy tamin’i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Lea: Manan-jara re aho! dia nataony hoe Gada'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gada = Zara.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Zilpa, ankizivavin’i Lea, dia niteraka zazalahy faharoany tamin’i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Lea: Sambatra aho, fa hataon’ny zanakavavin’ny olona hoe sambatra aho; dia nataony hoe Asera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Asera = Sambatra.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nivoaka nitsangantsangana Robena tamin’ny andro fijinjam-bary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tritika, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dia varimbazaha.
    marker-yv: yv-n
  - type: text
    text: ' ka nahita dodaima'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mandragora, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dia zava-maniry iray karazana amin’ny ramiary.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: naniry
  - type: text
    text: ' tany an-tsaha, dia nitondra azy ho any amin’i Lea reniny. Ary hoy Rahely tamin’i Lea: Veloma hianao, mba anomezo ahy kely ny dodaiman’ny zanakao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy izy taminy: Moa zavatra kely va ny nakanao ny vadiko? dia halainao koa va ny dodaiman’ny zanako? Ary hoy Rahely: Aoka handry aminao ihany ary izy anio alina noho ny dodaiman’ny zanakao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony hariva, rehefa tonga avy tany an-tsaha Jakoba, dia nivoaka nitsena azy Lea ka nanao hoe: Ho ato amiko no halehanao; fa ny dodaiman’ny zanako no efa nakaramako anao tokoa. Dia nandry taminy izy tamin’iny alina iny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Andriamanitra nihaino an’i Lea, dia nanan-anaka izy ka niteraka zazalahy fahadiminy tamin’i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Lea: Efa nomen’Andriamanitra ny karamako, satria nomeko hovadin’ny vadiko ny ankizivaviko; dia nataony hoe Isakara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Isakara = Misy karama, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mitondra karama.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nanan-anaka indray Lea ka niteraka zazalahy faheniny tamin’i Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Lea: Efa nanome anjara soa ho ahy Andriamanitra; amin’izao vao hitoetra amiko ny vadiko, fa efa niteraka zaza enin-dahy ho azy aho; dia nataony hoe Zebolona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Zebolona = Fitoerana, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fonenena.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary rehefa afaka izany, dia niteraka zazavavy izy, ka nataony hoe Dina ny anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Andriamanitra nahatsiaro an-dRahely, dia nihaino azy ka nampanan-anaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nanan-anaka izy ka niteraka zazalahy; dia hoy izy: Efa nahafa-tondromaso ahy Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nataony hoe Josefa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Josefa = Hanampy, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hanaisotra, Izy.
    marker-yv: yv-n
  - type: text
    text: ' ny anarany, ka hoy izy: Jehovah anie mbola hanampy zazalahy iray ho ahy koa.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fanekena hafa koa izay nataon’i Labana sy Jakoba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ARY rehefa niteraka an’i Josefa Rahely, dia hoy Jakoba tamin’i Labana: Alefaso aho hankany amin’ny fonenako sy ny taniko. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Omeo ahy ny vadiko aman-janako, izay nanompoako anao, dia handeha aho; fa fantatrao ny fanompoana izay nanompoako anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy Labana taminy: Masìna hianao, raha nahita fitia eo imasonao aho, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mitoera eto amiko;
  - type: text
    text: ' efa namantatra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efa nanao sikidy.
    marker-yv: yv-n
  - type: text
    text: ' aho, ka fantatro fa avy taminao no nitahian’i Jehovah ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy koa izy: Tonòny izay ho karamanao, dia homeko anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy Jakoba taminy; Fantatrao ny nanompoako anao sy ny toetry ny omby aman-ondrinao tato amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa kely ny fanananao, fony tsy mbola tonga aho, fa efa nitombo be dia be izy; ary efa nitahy anao Jehovah tamin’ny diako rehetra; ary ankehitriny, rahoviana kosa aho no mba hihary ho an’ny ao an-tranoko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy izy: Inona ary no homeko anao? Ary hoy Jakoba: Tsy hanome ahy na inona na inona hianao; raha hataonao amiko izao zavatra izao, dia mbola handrasako sy hotandremako ihany ny ondry aman-osinao: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Handeha hitety ny ondry aman-osinao rehetra aho anio ka hanavaka ny mara sy ny sada rehetra, ary ny mainty rehetra eo amin’ny ondry ary ny sada sy ny mara eo amin’ny osy; koa ireny no ho karamako. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny fahamarinako no ho vavolombeloko amin’ny andro ho avy, raha tonga hianao handinika ny karamako: izay rehetra tsy mara ary tsy sada eo amin’ny osy, ary izay tsy mainty eo amin’ny ondry, dia ho halatro izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Labana: Eny, aoka ho araka ny teninao ary. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia navahany tamin’izany andro izany ny osilahy sadika sy sada, ary izay osivavy rehetra mara sy sada, dia izay rehetra nisy fotsy, ary ny mainty rehetra teo amin’ny ondry; dia natolony teo an-tànan’ny zanani-lahy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary nasiany làlan-kateloana teo anelanelan’izy sy Jakoba; ary Jakoba niandry ny ondry aman-osin’i Labana sisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary Jakoba dia naka tsora-kazo maro tamin’ny hazo popola maitso sy tamin’ny hazo lozy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lozy = amygdala (?).
    marker-yv: yv-n
  - type: text
    text: ' sy tamin’ny hazo platana; ka nataony ofy vandana ireny hisehoan’ny fotsy izay teo amin’ny tsora-kazo. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ireny tsora-kazo voaofiny ireny dia napetrany teo anoloan’ny ondry aman-osy, teo anatin’ny tavin-drano, dia teo amin’ny fisotroan-drano, izay nalehan’ny ondry aman-osy hisotro, ka nikambana teo ny lahy sy ny vavy, raha avy hisotro rano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nikambana tandrifin’ny tsora-kazo ny ondry aman-osy ka niteraka sadika sy mara ary sada. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny zanak’ondry navahan’i Jakoba, ary ny ondry sisa dia nataony manatrika ny sadika sy ny mainty rehetra teo amin’ny ondry aman-osin’i Labana; ary natokany izay ondry aman-osy ho azy ka tsy navelany hiharo tamin’ny ondry aman-osin’i Labana. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary na oviana na oviana no hikambanan’ny ondry aman-osy matanjaka, dia napetrak’i Jakoba teo anatin’ny tavin-drano teo anoloan’ny mason’ny ondry aman-osy ireny tsora-kazo ireny, mba hikambanany eo anilan’ny tsora-kazo. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Fa raha osaosa kosa ny ondry aman-osy, dia tsy mba napetrany teo ireny; ka dia ny osaosa no an’i Labana, fa ny matanjaka kosa no an’i Jakoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Dia nitombo harena indrindra ralehilahy ka nanana ondry aman-osy betsaka ary andevovavy sy andevolahy ary rameva sy boriky.
