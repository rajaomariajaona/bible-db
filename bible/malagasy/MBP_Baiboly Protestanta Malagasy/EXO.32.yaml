document_id: EXO.32
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanaovan’ny Zanak’Isiraely ombilahy kely volamena hiankohofany, sy ny fahatezeran’Andriamnaitra noho izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa hitan’ny olona fa efa ela ka tsy mbola nidina avy tao an-tendrombohitra ihany Mosesy, dia niangona ho eo amin’i Arona izy ka nanao taminy hoe: Mitsangàna, ka anaovy andriamanitra izahay, hitarika antsika eo aloha; fa ilay Mosesy iny, izay lehilahy nitondra antsika niakatra avy tany amin’ny tany Egypta, dia tsy fantatray izay nanjo azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Arona taminy: Romboty ary ny kavim-bolamena, izay eny amin’ny sofin’ny vadinareo sy ny zanakareo-lahy ary ny zanakareo-vavy, ka ento etỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny olona rehetra dia nandrombotra ny kavim-bolamena izay teny amin’ny sofiny ka nitondra azy ho eo amin’i Arona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary izy nandray azy tamin’ny tànan’ny olona, dia namboatra azy tamin’ny fandraka ka nanao azy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nofonosiny tamin’ny kitapo ka nataony.
    marker-yv: yv-n
  - type: text
    text: ' ho ombilahy kely anidina; dia niteny ny olona ka nanao hoe: Io no andriamanitrao, ry Isiraely, izay nitondra anao niakatra avy tany amin’ny tany Egypta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha hitan’i Arona izany, dia nanao alitara teo anoloany izy; ary dia niantso Arona ka nanao hoe: Andro firavoravoana ho an’i Jehovah rahampitso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nifoha maraina koa ny olona ka nanatitra fanatitra odorana sy nitondra fanati-pihavanana; ary nipetraka hihinana sy hisotro ny olona, dia nitsangana hilalao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Mandehana midina hianao; fa efa nanao ratsy ny olonao izay nentinao niakatra avy tany amin’ny tany Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nalaky nivily niala amin’ny làlana izay nasaiko nalehany izy ka efa nanao ombilahy kely an-idina ho azy; ary efa niankohoka teo anatrehany sy namono zavatra hatao fanatitra taminy izy ka nanao hoe: Io no andriamanitrao, ry Isiraely, izay nitondra anao niakatra avy tany amin’ny tany Egypta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Efa hitako io firenena io, fa, indro, firenena mafy hatoka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa ankehitriny avelao hirehitra aminy ny fahatezerako, ka haringako izy; fa hahatonga anao ho firenena lehibe Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Mosesy nifona tamin’i Jehovah Andriamaniny ka nanao hoe: Jehovah ô, nahoana ny fahatezeranao no mirehitra amin’ny olonao, izay nentinao nivoaka avy tany amin’ny tany Egypta tamin’ny hery lehibe sy ny tànana mahery? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nahoana ny Egyptiana no avela hilaza hoe: Mba hahita loza no nitondrany ireny nivoaka, hamonoany azy eny an-tendrombohitra sy handringanany azy tsy ho ambonin’ny tany. Mialà amin’ny fahatezeranao mirehitra, ka manenena ny amin’ny loza izay hanjo ny olonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsarovy Abrahama sy Isaka ary Isiraely mpanomponao, izay nianiananao tamin’ny Tenanao sy nilazanao hoe: Hahamaro ny taranakareo Aho ho tahaka ny kintana eny amin’ny lanitra; ary izany tany rehetra nolazaiko izany dia homeko ny taranakareo, ary izy handova izany mandrakizay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary Jehovah dia nanenina ny amin’ny loza izay nokasainy hamelezana ny olony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary Mosesy nihodina ka nidina avy tao an-tendrombohitra, nitondra ny vato fisaka roa nisy ny Vavolombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didy Folo.
    marker-yv: yv-n
  - type: text
    text: ' teny an-tànany; ny vato fisaka nosoratana teo amin’ny lafiny roa: dia teo anatrehany sy teo am-badika no nisy ny soratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny vato fisaka dia asan’Andriamanitra, ary ny soratra dia soratr’Andriamanitra, voasoratra teo amin’ny vato fisaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa ren’i Josoa ny fitabataban’ny olona izay nihorakoraka, dia hoy izy tamin’i Mosesy: Misy tabataban’ady atsy an-toby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy kosa izy: Tsy feo fihobian’ny mahery na feo fitomanian’ny resy no reko, fa feon’ny mihira.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary raha nanakaiky ny toby izy, dia nahita ny ombilahy kely sy ny dihy; ary nirehitra ny fahatezeran’i Mosesy, dia natontany ny vato fisaka teny an-tànany ka novakivakiny teo am-bodin’ny tendrombohitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nalainy ilay ombilahy kely izay efa nataon’ny olona ka nodorany tamin’ny afo, ary notorotoroiny ho vovoka, dia nafafiny tambonin’ny rano ka nampisotroiny ny Zanak’Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Mosesy tamin’i Arona: Inona no nataon’ity firenena ity taminao, no nitondranao heloka lehibe taminy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy kosa Arona: Aoka tsy hirehitra ny fahatezeranao, tompoko, fa hianao mahalala ny toetry ny olona, fa mpanao ratsy izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary hoy izy tamiko: Manaova andriamanitra ho antsika, hitarika antsika eo aloha; fa ilay Mosesy iny, izay lehilahy nitondra antsika niakatra avy tany amin’ny tany Egypta, dia tsy fantatray izay nanjo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy izaho taminy: Na zovy na zovy manam-bolamena, aoka handrombotra izany izy, ka dia nomeny ahy; ary natsipiko tao anaty afo izany, ka io ombilahy kely io no nivoaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary rehefa hitan’i Mosesy fa natondraka hanaram-po amin’izay tsy mety ny olona, satria efa natondrak’i Arona ho fanakorana eo amin’ny fahavalony izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia nijanona teo amin’ny vavahadin’ny toby Mosesy ka nanao hoe: Izay rehetra an’i Jehovah mankanesa etỳ amiko. Ary ny taranak’i Levy rehetra niangona teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy izy taminy: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Samia manao ny sabany eo am-balahany avy hianareo, dia mandrosoa sy miverimberena amin’isam-bavahadin’ny toby, ary samia mamono ny rahalahiny avy sy ny sakaizany avy ary ny namany avy hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nanao araka ny tenin’i Mosesy ny taranak’i Levy; ary nahafatesana tokony ho telo arivo lahy ny olona tamin’izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa Mosesy efa nilaza hoe: Manokàna ny tenanareo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mamenoa ny tànanareo.
    marker-yv: yv-n
  - type: text
    text: ' ho an’i Jehovah hianareo anio; eny, samia mamono'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fa samy efa namono.
    marker-yv: yv-n
  - type: text
    text: ' ny zanany sy ny rahalahiny avy, mba hahazoanareo fitahiana anio.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nifonan’i Mosesy, sy ny navalin’Andriamanitra azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ARY nony maraina dia hoy Mosesy tamin’ny olona: Efa nanao fahotana lehibe hianareo; ary ankehitriny, dia hiakatra ho ao amin’i Jehovah aho, fa angamba hahazo manao fanavotana ny amin’ny fahotanareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary Mosesy dia niverina ho ao amin’i Jehovah ka nanao hoe: Indrisy! efa nanao fahotana lehibe ity firenena ity ka efa nanao andriamani-bolamena ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ankehitriny, enga anie ka hamela ny fahotany Hianao! fa raha tsy izany, mifona aminao aho, vonoy eo amin’ny bokinao izay nosoratanao ny anarako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa hoy Jehovah tamin’i Mosesy: Na iza na iza nanota tamiko, dia hovonoiko ny anarany eo amin’ny bokiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mandehana ankehitriny, ka ento ny olona ho any amin’izay efa nolazaiko taminao; indro, ny Anjeliko no hitarika anao eo aloha; ary amin’izay andro hamaliako dia hamaly azy noho ny fahotany Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary Jehovah namely ny olona, satria nanao ny ombilahy kely izy, dia ilay nataon’i Arona.
