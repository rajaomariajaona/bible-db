document_id: JER.38,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitoeran’i Jeremia tao an-davaka sy ny fara fihaonany tamin’i Zedekia.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Safatia, zanak’i Matana, sy Gedalia, zanak’i Pasora, sy Jokala, zanak’i Semelia, ary Pasora, zanak’i Malkia, dia nandre ny teny izay efa nolazain’i Jeremia tamin’ny vahoaka rehetra nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny mpanjaka nandidy an’i Ebeda-meleka Etiopiana hoe: Mitondrà telo-polo lahy hiaraka aminao hampakatra an’i Jeremia mpaminany hiala ao anaty lavaka, dieny tsy mbola maty izy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary Ebeda-meleka nitondra ny olona niaraka taminy, ka dia lasa nankany amin’ny tranon’ny mpanjaka eo ambanin’ny trano firaketana, ary naka lamba rovitra sy vorodamba tao izy, ka nampidininy tamin’ny mahazaka ho ao amin’ny lavaka izany ho ao amin’i Jeremia. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy Ebeda-meleka Etiopiana tamin’i Jeremia: Ataovy eo ambanin’ny helikao ireto lamba rovitra sy vorodamba ireto ho efitry ny mahazaka, dia nataon’i Jeremia izany; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ka dia nosintoniny tamin’ny mahazaka Jeremia ka nakariny avy tao anaty lavaka; ary dia nitoetra teo amin’ny kianjan’ny trano fiambenana izy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary Zedekia mpanjaka naniraka naka an’i Jeremia mpaminany hankao aminy tao amin’ny fidirana fahatelo, izay ao an-tranon’i Jehovah. Dia hoy ny mpanjaka tamin’i Jeremia: Hanontany zavatra kely aminao aho, ka aza anafenana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy Jeremia tamin’i Zedekia: Raha ambarako anao, dia tsy hovonoinao tokoa va re aho? Fa na dia omeko saina aza hianao, dia tsy hihaino ahy tsinona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary Zedekia mpanjaka nianiana mangingina tamin’i Jeremia nanao hoe: Raha velona koa Jehovah, Izay nanao izao fanahintsika izao, dia tsy hamono anao tokoa aho, na hanolotra anao eo an-tànan’ireto olona mitady ny ainao ireto.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy Jeremia tamin’i Zedekia: Izao ary no lazain’i Jehovah, Andriamanitry ny maro, Andriamanitry ny Isiraely: Raha mivoaka hanatona ny mpanapaky ny mpanjakan’i Babylona tokoa hianao, dia ho velona ny ainao, sady tsy hodorana amin’ny afo ity tanàna ity, fa ho velona hianao sy ny mpianakavinao; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: fa raha tsy mivoaka hanatona ny mpanapaky ny mpanjakan’i Babylona kosa hianao, dia hatolotra eo an-tànan’ny Kaldeana ity tanàna ity, sady hodorany amin’ny afo izy, ary tsy ho afa-mandositra ny tànany hianao.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy Zedekia mpanjaka tamin’i Jeremia: Matahotra ny Jiosy izay efa nanatona ny Kaldeana aho, fandrao hatolony eo an-tànany aho ka hataony fihomehezana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao no lazain’i Jehovah: Izay mitoetra amin’ity tanàna ity dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana kosa no ho velona; fa ny ainy no ho babony, ka ho velona izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa hoy Jeremia: Tsy hanolotra anao izy tsy akory. Trarantitra hianao, ankatoavy ny tenin’i Jehovah, izay lazaiko aminao, mba hahita soa hianao, ka ho velona ny ainao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa raha tsy mety mivoaka kosa hianao, dia izao no teny efa nasehon’i Jehovah ahy: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Indreo, ny vehivavy rehetra izay sisa ao an-tranon’ny mpanjakan’ny Joda dia ho entina mivoaka ho any amin’ny mpanapaky ny mpanjakan’i Babylona, ary ireo vehivavy ireo dia hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo sakaizanao no nitaona anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady naharesy anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary latsaka tao amin’ny honahona ny tongotrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nilaozany nihemotra hianao.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny vadinao rehetra sy ny zanakao dia ho entina mivoaka ho any amin’ny Kaldeana; ary hianao tsy ho afa-mandositra ny tànany, fa ho azon’ny tànan’ny mpanjakan’i Babylona; ary noho hianao no handoroana ity tanàna ity amin’ny afo.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia hoy Zedekia tamin’i Jeremia: Aoka tsy ho ren’olona ary izany teny izany, mba tsy ho faty hianao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa raha ren’ny mpanapaka fa niresaka taminao aho, ary tonga aminao izy ka manao aminao hoe: Ambarao aminay ankehitriny izay nolazainao tamin’ny mpanjaka, aza afenina anay, fa tsy hamono anao izahay; ary ambarao koa izay nolazain’ny mpanjaka taminao; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'dia ataovy aminy hoe: Noborahina teo anatrehan’ny mpanjaka ny fifonako, mba tsy hamerenany ahy ho faty any amin’ny tranon’i Jonatana.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary nankany amin’i Jeremia ny mpanapaka rehetra ka nanontany azy; dia nolazainy taminy araka izay teny rehetra nandidian’ny mpanjaka azy. Ary tsy niresaka taminy intsony ireo, ka dia tsy re ny raharaha.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary Jeremia nitoetra teo amin’ny kianjan’ny trano fiambenana mandra-pahatongan’ny andro nanafahana an’i Jerosalema.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izao no lazain’i Jehovah: Ity tanàna ity dia hatolotra eo an-tànan’ny miaramilan’ny mpanjakan’i Babylona tokoa ka ho afany.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy ny mpanapaka tamin’ny mpanjaka: Trarantitra hianao, aoka hovonoina ity lehilahy ity; fa mampiraviravy tanàna ny miaramila izay sisa amin’ity tanàna ity mbamin’ny olona rehetra izy noho ny nitenenany taminy araka izany teny izany; fa ity lehilahy ity tsy mba mitady izay hiadanan’ity firenena ity, fa izay hahatonga loza aminy kosa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy Zedekia mpanjaka: Indro, eo an-tànanareo izy; fa ny mpanjaka tsy mahefa na inona na inona hisakana anareo.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary naka an’i Jeremia izy ka nandatsaka azy tao amin’ny lavaka famorian-dranon’i Malkia, zanak’andriana, izay tao amin’ny kianjan’ny trano fiambenana; ary nampidininy tamin’ny mahazaka Jeremia. Ary tsy nisy rano tao amin’ny lavaka, fa fotaka fotsiny ihany, ka dia nilentika tamin’ny fotaka Jeremia.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary Ebeda-meleka Etiopiana, tandapa anankiray tao amin’ny tranon’ny mpanjaka, raha nandre ny nandatsahany an’i Jeremia tao amin’ny lavaka (nipetraka teo amin’ny vavahadin’ny Benjamina ny mpanjaka androtriny),– '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia nivoaka avy tao an-tranon’ny mpanjaka izy ka nanao tamin’ny mpanjaka hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ry tompokolahy mpanjaka, ratsy avokoa izay rehetra nataon’ity firenena ity tamin’i Jeremia mpaminany, fa nataony tao an-davaka izy ka ho faty mosary ao amin’izay itoerany, satria tsy misy mofo intsony ato an-tanàna. '
