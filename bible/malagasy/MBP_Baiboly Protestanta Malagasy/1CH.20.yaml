document_id: 1CH.20
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa niherina ny taona, ka mby amin’ny andro fandehanan’ny mpanjaka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hiady
  - type: text
    text: ', dia nitondra ny miaramila rehetra Joaba ka nandrava ny tanin’ny taranak’i Amona, dia tonga izy ka nanao fahirano an’i Raba; fa Davida kosa nijanona tany Jerosalema ihany. Ary Joaba nahafaka an’i Raba, ka dia nandrava azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia nesorin’i Davida ny satro-boninahitr’ilay mpanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Malkama; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Zef. '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: i.5.
    marker-yv: yv-n
  - type: text
    text: ' teo an-dohany, ka hitany fa talenta volamena iray no lanjany, sady nisy vato soa, ary dia nisatrohan’i Davida. Ary navoakany ny babo azo tao an-tanàna ka be dia be. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary dia navoakany koa ny olona izay tao, ka nasiany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: notsofany.
    marker-yv: yv-n
  - type: text
    text: ' tamin’ny tsofa sy tamin’ny fangao-by lehibe sy ny famaky; toy izany no nataon’i Davida tamin’ny tanànan’ny taranak’i Amona rehetra. Ary Davida sy ny vahoaka rehetra dia niverina nankany Jerosalema.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nataon’ny lehilahy maherin’i Davida tamin’ny niadiany tamin’ny Filistina.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ARY nony afaka izany, dia nisy ady tamin’ny Filistina tao Gazera; tamin’izany no namonoan’i Sibekay Hosatita an’i Sipay, izay isan’ny taranaky ny Refaïta, ka dia naetriny ny Filistina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary dia nisy ady tamin’ny Filistina indray ary Elanana, zanak’i Jaïra, namono an’i Lamy, rahalahin’i Goliata Gatita, izay nanan-jaran-defona tahaka ny vodi-tenon’ny mpanenona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nisy ady indray tao Gata; ary tao nisy lehilahy vaventibe izay enin-drantsana, ka dia efatra amby roa-polo no isan’ny rantsan-tànany sy ny rantsan-tongony; ary izy koa mba isan’ny taranaky ny Refaïta. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nony nihaika ny Isiraely izy, dia nahafaty azy Jonatana, zanak’i Simea, rahalahin’i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ireo no taranaky ny Refaïta tao Gata, ka matin’ny tànan’i Davida sy ny tànan’ny mpanompony ireo.
