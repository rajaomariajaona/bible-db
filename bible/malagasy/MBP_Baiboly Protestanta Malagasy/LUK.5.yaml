document_id: LUK.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampahazoan’i Jesosy an’i Petera hazandrano be.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 4.18-22; Mar. 1.16-20?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY raha nifanizina taminy ny vahoaka mba hihaino ny tenin’Andriamanitra, dia nijanona teo amoron’ny Farihin’i Genesareta Jesosy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary nahita sambokely roa nijanona teo an-tsisin’ny farihy Izy; fa ny mpanarato efa niala taminy ka nanasa ny haratony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary niditra teo amin’ny sambokely anankiray izay an’i Simona Izy, dia nangataka taminy hihataka kely amin’ny tany. Dia nipetraka teo an-tsambokely Izy ka nampianatra ny vaohaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa nitsahatra niteny Jesosy, dia hoy Izy tamin’i Simona: Mandrosoa ho any amin’ny lalina, dia alatsaho ny haratonareo hahazoana hazandrano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Simona namaly ka nanao hoe: Tompoko, mandritra ny alina no efa nikelezanay aina, nefa tsy nahazo na inona na inona; kanefa noho ny teninao, dia halatsako ihany ny harato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa nataony izany, dia nahazo hazandrano be dia be izy, ka efa nisy triatra ny haratony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary izy nanatsika ny namany, izay teo amin’ny sambokely hafa, mba ho avy hanampy azy. Dia avy ireny, ary nofenoiny ny sambokely roa, ka efa saiky nilentika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa hitan’i Simona Petera izany, dia niankohoka tamin’ny tongotr’i Jesosy izy ka nanao hoe: Tompoko, mialà amiko, fa olo-meloka aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa talanjona izy sy izay rehetra teo aminy noho ny haben’ny hazandrano izay azony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary toy izany koa Jakoba sy Jaona, zanak’i Zebedio, izay niombon-draharaha tamin’i Simona. Dia hoy Jesosy tamin’i Simona: Aza matahotra; hatramin’izao ankehitriny izao dia olona kosa no ho azonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary rehefa nampiantsona ny sambokeliny teo an-tanety izy, dia nahafoy ny zavatra rehetra ka nanaraka an’i Jesosy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ilay boka.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 8.1-4; Mar. 1.40-45.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ARY raha tao an-tanàna anankiray Jesosy, indro, nisy lehilahy heniky ny habokana: ary nony nahita Azy io, dia niankohoka ka nitaraina taminy hoe: Tompoko, raha mety Hianao, dia mahay manadio ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Jesosy naninjitra ny tanany, dia nanendry azy ka nanao hoe: Mety Aho; madiova hianao. Ary ny habokany niala taminy niaraka tamin’izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jesosy nandrara azy tsy hilaza amin’olona na dia iray akory aza; fa mandehana, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy Izy,
  - type: text
    text: ' misehoa amin’ny mpisorona, ka manatera ny fanadiovana anao, araka ny nandidian’i Mosesy, ho vavolombelona amin’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa mainka niely bebe kokoa ny lazany, dia niangona ny vahoaka betsaka hihaino Azy sy hositranina tamin’ny aretiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary niala teo Izy, dia nitoetra tany an-efitra ka nivavaka.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny lehilahy anankiray mararin’ny paralyissa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 9.1-8; Mar. 2.1-12.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ARY tamin’ny andro anankiray, raha nampianatra Jesosy, dia nipetraka teo ny Fariseo sasany sy ny mpampiana-dalàna, izay efa niala tamin’ny tanàna rehetra any Galilia sy Jodia ary tany Jerosalema; ary ny herin’ny Tompo dia tao aminy mba hahasitranany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary, indro, nisy nitondra lehilahy tamin’ny fandriana, izay mararin’ny paralysisa, ka nitady izay hampidirany sy hametrahany azy teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary satria tsy nahita izay hampidirany azy izy noho ny habetsahan’ny vahoaka, dia niakatra teo an-tampon-trano ka nanesorany ny tafo tanimanga, dia nampidininy ralehilahy mbamin’ny fandriany ho eo afovoan’ny olona, dia teo anatrehan’i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha hitan’i Jesosy ny finoan’ireo, dia hoy Izy: Ralehilahy, voavela ny helokao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ny mpanora-dalàna sy ny Fariseo niara-nisaina hoe: Iza moa Ity miteny ratsy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'manao blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' Ity? Iza no mahavela heloka, afa-tsy Andriamanitra ihany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Jesosy nahafantatra ny eritreriny, dia namaly ka nanao taminy hoe: Nahoana hianareo no mieritreritra ao am-ponareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Iza moa no moramora kokoa, ny manao hoe va: Voavela ny helokao, sa ny manao hoe: Mitsangàna, ka mandehana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa mba ho fantatrareo fa ny Zanak’olona manana fahefana etỳ ambonin’ny tany hamela heloka–dia hoy Izy tamin’ilay mararin’ny paralysisa: Izaho milaza aminao hoe: Mitsangàna, dia betao ny fandrianao, ary modia any an-tranonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary tamin’izay dia nitsangana teo anatrehan’ny olona izy ka nambeta ny fandriany, dia lasa nody sady nankalaza an’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary talanjona avokoa ny olona rehetra, dia nankalaza an’Andriamanitra sady raiki-tahotra indrindra ka nanao hoe: Efa nahita zavatra mahagaga isika andro-any.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niantsoana an’i Levy (Matio), sy ny fanasana tao an-tranony, ary ny tori-teny nataon’i Jesosy ny amin’ny fifadian-kanina.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 9.9-17; Mar. 2.13-22.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ARY rehefa afaka izany, dia nandeha Jesosy ka nahita mpamory hetra atao hoe Levy, nipetraka teo am-pamorian-ketra;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.9.
    marker-yv: yv-n
  - type: text
    text: ' dia hoy Izy taminy: Manaraha Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary nahafoy ny zavatra rehetra izy ka nitsangana, dia nanaraka Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Levy nanao fanasana lehibe tao an-tranony ho an’i Jesosy; ary nisy mpamory hetra maro sy olon-kafa koa, izay niara-nipetraka nihinana teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny Fariseo sy ny mpanora-dalàna izay teo aminy dia nimonomonona tamin’ny mpianatr’i Jesosy ka nanao hoe: Nahoana hianareo no miara-mihinana sy misotro amin’ny mpamory hetra sy ny mpanota? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Tsy ny finaritra no mila mpanao fanafody, fa ny marary; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: tsy avy hiantso ny marina Aho, fa ny mpanota mba hibebaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary hoy izy ireo taminy: Ny mpianatr’i Jaona mifady hanina matetika sy mivavaka, ary ny an’ny Fariseo koa mba tahaka izany ihany, fa ny Anao kosa mihinana sy misotro ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Jesosy taminy: Mahay mampifady ny havan’ny mpampakatra va hianareo, raha mbola ao aminy ihany ny mpampakatra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa ho avy ny andro; ary rehefa voaisotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny andro izay hanesorana.
    marker-yv: yv-n
  - type: text
    text: ' ny mpampakatra hiala aminy, dia amin’izany andro izany vao hifady izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary Izy nanao fanoharana taminy koa nanao hoe: Tsy misy olona mandriatra lamba vaovao hanalany tapadamba hatampina ny lamba tonta; fa raha izany, dia mahatriatra ny vaovao izy, ary ilay tapa-damba nalaina tamin’ny vaovao dia tsy hifanaraka amin’ny tonta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary tsy misy olona manisy divay vaovao ao anaty siny hoditra tonta; fa raha izany, ny divay vaovao mahatriatra ny siny hoditra, ka ho raraka ny divay, sady ho simba foana ny siny hoditra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'fa ny divay vaovao dia tsy maintsy hatao ao anaty siny hoditra vaovao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tsy misy olona, rehefa nisotro ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: divay
  - type: text
    text: ' ela, no maniry ny vaovao; fa hoy izy: Ny ela no tsara.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.39 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[tsaratsara kokoa].'
    marker-yv: yv-n
