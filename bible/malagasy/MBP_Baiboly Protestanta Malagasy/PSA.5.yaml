document_id: PSA.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Salamo hatao amin’ny maraina, milaza ny amin’ny olona mahazo manatona an’Andriamanitra, sy ny hitsarana ny ratsy fanahy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Hampiarahina amin’ny sodina. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, henoy ny teniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fantaro ny eritreritro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Henoy ny feon’ny fitarainako, ry Mpanjakako sy Andriamanitro ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no ivavahako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jehovah ô, maraina no handrenesanao ny feoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maraina no hivavahako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: handaharako.
    marker-yv: yv-n
  - type: text
    text: ' aminao, ka hanandrandra aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa tsy Andriamanitra mankasitraka izay ratsy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hitoetra aminao ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy hahazo mijanona eo imasonao ny mpirehareha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Halanao ny mpanao ratsy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Haringanao ny mpiteny lainga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny olona mpandatsa-dra sy mpamitaka dia ataon’i Jehovah ho zava-betaveta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa izaho kosa noho ny haben’ny famindramponao dia hiditra ao an-tranonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiankohoka manatrika ny lapanao masina amin’ny fahatahorana Anao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jehovah ô, tariho amin’ny fahamarinanao aho noho ny amin’ny mpampahory ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy marina eo anoloako ny làlanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tsy misy azo itokiana ny aloaky ny vavany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ao anatiny dia tena faharatsiana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lavaka mitanatana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fasana misokatra ny tendany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandambolambo ny lelany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Helohy izy, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho lavon’ny saina ataony izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Roahy izy noho ny haben’ny fahotany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa niodina taminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia hifaly izay rehetra mialoka aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihoby mandrakariva izy, koa miarova azy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho ravoravo aminao izay tia ny anaranao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: a Hianao, Jehovah ô, mitahy ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fankasitrahana no ataonao manodidina azy toy ny ampinga lehibe.
