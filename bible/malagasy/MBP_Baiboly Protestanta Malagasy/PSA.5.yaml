document_id: PSA.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo hatao amin’ny maraina, milaza ny amin’ny olona mahazo manatona an’Andriamanitra, sy ny hitsarana ny ratsy fanahy.
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny sodina. Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, henoy ny teniko;
  - type: text
    content: Fantaro ny eritreritro.
  '10':
  - type: text
    content: Helohy izy, Andriamanitra ô;
  - type: text
    content: Aoka ho lavon’ny saina ataony izy;
  - type: text
    content: Roahy izy noho ny haben’ny fahotany,
  - type: text
    content: Satria efa niodina taminao.
  '11':
  - type: text
    content: Dia hifaly izay rehetra mialoka aminao;
  - type: text
    content: Hihoby mandrakariva izy, koa miarova azy Hianao;
  - type: text
    content: Ka dia ho ravoravo aminao izay tia ny anaranao,
  '12':
  - type: text
    content: a Hianao, Jehovah ô, mitahy ny marina;
  - type: text
    content: Fankasitrahana no ataonao manodidina azy toy ny ampinga lehibe.
  '2':
  - type: text
    content: Henoy ny feon’ny fitarainako, ry Mpanjakako sy Andriamanitro ô;
  - type: text
    content: Fa Hianao no ivavahako.
  '3':
  - type: text
    content: Jehovah ô, maraina no handrenesanao ny feoko;
  - type: text
    content: Maraina no hivavahako
  - type: note
    content: Heb. handaharako.
  - type: text
    content: ' aminao, ka hanandrandra aho.'
  '4':
  - type: text
    content: Fa tsy Andriamanitra mankasitraka izay ratsy Hianao;
  - type: text
    content: Tsy hitoetra aminao ny ratsy.
  '5':
  - type: text
    content: Tsy hahazo mijanona eo imasonao ny mpirehareha;
  - type: text
    content: Halanao ny mpanao ratsy rehetra.
  '6':
  - type: text
    content: Haringanao ny mpiteny lainga;
  - type: text
    content: Ny olona mpandatsa-dra sy mpamitaka dia ataon’i Jehovah ho zava-betaveta.
  '7':
  - type: text
    content: Fa izaho kosa noho ny haben’ny famindramponao dia hiditra ao an-tranonao;
  - type: text
    content: Hiankohoka manatrika ny lapanao masina amin’ny fahatahorana Anao aho.
  '8':
  - type: text
    content: Jehovah ô, tariho amin’ny fahamarinanao aho noho ny amin’ny mpampahory ahy;
  - type: text
    content: Ataovy marina eo anoloako ny làlanao.
  '9':
  - type: text
    content: Fa tsy misy azo itokiana ny aloaky ny vavany;
  - type: text
    content: Ny ao anatiny dia tena faharatsiana;
  - type: note
    content: 'Na: lavaka mitanatana.'
  - type: text
    content: Fasana misokatra ny tendany;
  - type: text
    content: Mandambolambo ny lelany izy.
