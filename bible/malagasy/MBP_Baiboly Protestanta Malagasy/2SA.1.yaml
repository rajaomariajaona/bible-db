document_id: 2SA.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nataon’i Davida, rehefa nahare ny nahafatesan’i Saoly, sy ny hira fisaonana nentiny nisaona azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nony maty Saoly, ary niverina avy namono ny Amalekita Davida, dia nitoetra indroa andro tao Ziklaga izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary tamin’ny andro fahatelo, indro, nisy lehilahy iray tonga avy tany amin’ny miaramilan’i Saoly, triatra ny akanjony sady nihosin-tany ny lohany; ary rehefa tonga teo amin’i Davida izy, dia niankohoka tamin’ny tany ka nitsaoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Davida taminy: Avy taiza moa hianao? Dia hoy izy taminy: Afaka nandositra avy tany amin’ny tobin’ny Isiraely aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Davida taminy: Nanao ahoana izay tany? Masìna hianao, ambarao amiko. Dia hoy izy: Ny olona nandositra tamin’ny ady, ary be koa ny miampatrampatra sy maty, ary maty koa Saoly sy Jonatana zanany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Davida tamin’ilay zatovo niteny taminy: Ahoana no nahafantaranao fa maty Saoly sy Jonatana zanany? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nanambara taminy ilay zatovo nanao hoe: Sendra tao an-tendrombohitra Gilboa aho, ary, indro, Saoly nitehina tamin’ny lefony; ary, indreo, ny kalesy sy ny mpitaingin-tsoavaly nanenjika azy mafy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niherika izy ka nahita ahy; ary niantso ahy izy, ka hoy izaho: Inty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy izy tamiko: Iza moa hianao? Dia hoy izaho taminy: Amalekita aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy indray izy tamiko: Masìna hianao, hatòny kely aho, ka vonoy, fa marary mivonkina ozatra aho; fa mbola ato anatiko ihany ny aiko. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia nanatona azy aho ka namono azy, satria fantatro fa tsy ho velona izy, rehefa resy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lavo.
    marker-yv: yv-n
  - type: text
    text: ' ka dia nalaiko ny satro-boninahiny teo an-dohany sy ny fehin-tànana teo amin’ny sandriny, ka nentiko etỳ amin’ny tompoko izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia noraisin’i Davida ny fitafiany ka notriariny; ary dia mba nanao toy izany koa ny olona rehetra teo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nisaona sy nitomany sy nifady hanina ambara-paharivan’ny andro izy noho ny amin’i Saoly sy Jonatana zanany sy ny olon’i Jehovah ary ny taranak’Isiraely, satria lavon-tsabatra ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Davida tamin’ilay zatovo nanambara taminy: Avy aiza hianao? Ary hoy izy: Zanaky ny vahiny Amalekita aho. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Davida taminy: Nahoana hianao no tsy natahotra haninjitra ny tànanao hamono ny voahosotr’i Jehovah? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niantso zatovo anankiray Davida ka nanaoo hoe: Hatòny io, ka vonoy; dia nasiany izy ka maty. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy Davida taminy: Aoka ny ranao ho eo amin’ny lohanao, satria ny vavanao ihany no efa niampanga anao nanao hoe: Izaho no namono ny voahosotr’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary Davida nisaona an’i Saoly sy Jonatana zanany tamin’izao hira fisaonana izao (
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary nasainy nampianarina ny taranak’i Joda ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hira atao hoe
  - type: text
    text: ' Tsipìka; indro, voasoratra ao amin’ny Bokin’i Jasara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jasara = Ilay mahitsy.
    marker-yv: yv-n
  - type: text
    text: ' izany):'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ilay voninahitrao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'gazelanao, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dia anaram-biby haingan-tongotra.
    marker-yv: yv-n
  - type: text
    text: ' ry Isiraely, no voalefona teo amin’ny havoananao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endrey! lavo ny mahery!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aza ambaranareo any Gata izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza torinareo ho fifaliana any an-dàlamben’i Askelona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao mifaly ny zanakavavin’ny Filistina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao miravoravo ny zanakavavin’ny tsy mifora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hianareo tendrombohitra Gilboa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza misy ando aman-orana intsony eny aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na saha angalana fanatitra asandratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tany no nandotoana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanariana.
    marker-yv: yv-n
  - type: text
    text: ' ny ampingan’ny mahery,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny ampingan’i Saoly, ka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toy ny an’izay.
    marker-yv: yv-n
  - type: text
    text: ' tsy nohosorana diloilo.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny tsipìkan’i Jonatana tsy nihemotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy nahazo ny ran’ny maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny tavin’ny mahery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sabatr’i Saoly tsy mba niverina foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Saoly sy Jonatana, izay tiana sady maha-te-ho-tia fony fahavelony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy nosarahina na dia tamin’ny nahafatesany aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faingana noho ny voromahery izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahery noho ny liona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ry zanakavavin’Isiraely, mitomania an’i Saoly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nahafinaritra ny nampitafiany jaky anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nasiany firava-bolamena ny fitafianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Endrey! lavo teo amin’ny ady ny mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voalefona teo amin’ny havoananao Jonatana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ory noho ny aminao aho, ry Jonatana rahalahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahafinaritra ahy indrindra hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahagaga ny fitiavanao ahy mihoatra noho ny fitiavan’ny vehivavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Endrey! lavo ny mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary levona ny fiadiana!
