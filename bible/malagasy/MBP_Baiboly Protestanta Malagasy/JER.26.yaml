document_id: JER.26
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niampangana an’i Jeremia, sy ny nahafahany tamin’izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TAMIN’ny niandohan’ny nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, no nahatongavan’izao teny izao avy tamin’i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’i Jehovah: Mitsangàna eo an-kianjan’ny tranon’i Jehovah, ka lazao amin’ny tanànan’ny Joda rehetra, izay avy hiankohoka ao an-tranon’i Jehovah, ny teny rehetra izay efa nasaiko hambaranao aminy, ary aza amelana na dia teny iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa angamba hihaino ihany izy, ka samy hiala amin’ny làlany ratsy, dia hanenenako ny loza izay kasaiko hamelezana azy noho ny faharatsian’ny ataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary lazao aminy hoe: Izao no lazain’i Jehovah: Raha tsy mihaino Ahy hianareo ka tsy mandeha araka ny lalàko izay napetrako teo anoloanareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary tsy mihaino ny tenin’ny mpaminany mpanompoko, izay irahiko aminareo,–eny, nifoha maraina koa Aho ka naniraka, nefa tsy mba nihaino hianareo– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia hataoko tahaka an’i Silo ity trano ity, ary hataoko fanozonana ho an’ny firenena rehetra ambonin’ny tany ity tanàna ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny mpisorona sy ny mpaminany mbamin’ny vahoaka rehetra dia nandre an’i Jeremia nanambara ireo teny rehetra ireo tao an-tranon’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa nony efa tapitra voalazan’i Jeremia izay rehetra nasain’i Jehovah nolazaina tamin’ny vahoaka rehetra, dia nosamborin’ny mpisorona sy ny mpaminany mbamin’ny vahoaka rehetra izy ka nataony hoe: Ho faty tokoa hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nahoana hianao no naminany tamin’ny anaran’i Jehovah hoe: Ho tahaka an’i Silo ity tanàna ity, ary ho lao ity tanàna ity, ka tsy hisy mponina? Ary ny vahoaka rehetra dia nitangorona tamin’i Jeremia tao an-tranon’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa nony ren’ny mpanapaka ny Joda izany zavatra izany, dia niakatra avy tany amin’ny tranon’ny mpanjaka nankany amin’ny tranon’i Jehovah izy ka nipetraka teo anoloan’ny vavahady vaovaon’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpisorona sy ny mpaminany nilaza tamin’ny mpanapaka sy ny vahoaka rehetra hoe: Misy heloka tokony hahafaty ity lehilahy ity; fa efa naminany loza ho amin’ity tanàna ity izy araka izay efa ren’ny sofinareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nilaza tamin’ny mpanapaka rehetra sy ny vahoaka rehetra Jeremia hoe: Jehovah no naniraka ahy haminany izay rehetra efa renareo ny amin’ity trano sy ity tanàna ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa ankehitriny ataovy tsara ny làlanareo sy ny ataonareo, ary mihainoa ny feon’i Jehovah Andriamanitrareo; fa hanenenan’i Jehovah ny loza izay efa nolazainy hamelezana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny amiko, dia, indro, efa eto an-tànanareo aho; koa ataovy amiko izay ataonareo ho mety sy marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Kanefa mihevera tsara, fa raha mamono ahy anie hianareo, dia hahatonga ra marina aminareo sy amin’ity tanàna ity ary amin’ny mponina eto, satria Jehovah tokoa no naniraka ahy taminareo hilaza ireo teny rehetra ireo eto anatrehanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy ny mpanapaka sy ny vahoaka rehetra tamin’ny mpisorona sy ny mpaminany: Tsy misy heloka tokony hahafaty ity lehilahy ity, satria tamin’ny anaran’i Jehovah Andriamanitsika no nitenenany tamintsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nisy nitsangana ny loholona ka nanao tamin’ny vahoaka rehetra vory teo hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mika Morastita dia naminany tamin’ny andron’i Hezekia, mpanjakan’ny Joda, ka nanao tamin’ny Joda rehetra hoe: Izao no lazain’i Jehovah, Tompon’ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Ziona dia hasaina toy ny tanimboly,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jerosalema ho tonga korontam-bato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tendrombohitra misy ny trano dia ho tonga toy ny havoana mifono ala’’ (Mik. 3.12).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moa namono azy va Hezekia, mpanjakan’ny Joda, sy ny Joda rehetra? Tsy natahotra an’i Jehovah va izy ka nifona tamin’i Jehovah, ka dia nanenenan’i Jehovah ny loza izay efa nolazainy hamelezany azy? Fa isika kosa izao dia mila hampidi-doza lehibe amin’ny tenantsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nisy lehilahy anankiray koa izay naminany tamin’ny anaran’i Jehovah, dia Oria, zanak’i Semaia, avy any Kiriata-jearima, izay naminany loza ho amin’ity tanàna sy ity tany ity araka izany teny rehetra nataon’i Jeremia izany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nony ren’i Joiakima mpanjaka sy ny lehilahy maheriny rehetra ny teniny, dia nitady hahafaty azy ny mpanjaka; ary nony nandre izany Oria, dia natahotra izy ka nandositra, ary tonga tany Egypta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary Joiakima mpanjaka naniraka olona nankany Egypta, dia Elnatana, zanak’i Akbora, mbamin’ny olona sasany nanaraka azy hankany Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary Oria dia nalain’ireo niala avy tany Egypta ka nentiny teo amin’i Joiakima mpanjaka; ary izy namono azy tamin’ny sabatra, dia nanary ny fatiny teny amin’ny fasam-bahoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nefa ny tànan’i Ahikama, zanak’i Safana, dia nomba an’i Jeremia mba tsy hanolorana azy ho eo an-tànan’ny vahoaka hovonoiny.
