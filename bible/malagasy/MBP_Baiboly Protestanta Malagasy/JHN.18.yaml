document_id: JHN.18,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nankanesan’i Jesosy tao Getsemane, sy ny nisamborana Azy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.30,47-56; Mar. 14.26,43-52; Lio. 22.47-53.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: REHEFA voalazan’i Jesosy izany teny izany, dia nandeha Izy mbamin’ny mpianany ka nita ny lohasahan-driaka Kidrona; ary nisy saha teo, izay nidiran’Izy sy ny mpianany.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary Simona Petera nanana sabatra, dia nanatsoaka azy ka nikapa ny mpanompon’ny mpisoronabe ary nahafaka ny sofiny ankavanana. Ary Malko no anaran’ilay mpanompo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy Jesosy tamin’i Petera: Ampidiro amin’ny tranony ny sabatrao; ny kapoaka nomen’ny Raiko Ahy tsy hosotroiko va?'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitsarana an’i Jesosy teo anatrehan’i Anasy sy Kaiafa, sy ny nandavan’i Petera Azy intelo.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.57-75; Mar. 14.53-72; Lio. 22.54-71.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ARY ny miaramila iray toko sy ny mpifehy arivo ary ny mpiandry raharaha tamin’ny Jiosy dia nisambotra an’i Jesosy ka namatotra Azy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'dia nitondra Azy tany amin’i Anasy aloha, fa izy no rafozan’i Kaiafa, mpisoronabe tamin’izany taona izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary Kaiafa no ilay nanome saina ny Jiosy fa mahatsara raha maty ny olona anankiray hamonjy ny firenena.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary Simona Petera sy ny mpianatra anankiray koa dia nanaraka an’i Jesosy; ary fantatry ny mpisoronabe izany mpianatra izany, dia niara-niditra tamin’i Jesosy ho ao an-kianjan’ny tranon’ny mpisoronabe izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa Petera nijanona teo ala-trano teo am-bavahady. Dia nivoaka ilay mpianatra anankiray, izay fantatry ny mpisoronabe, ka niteny tamin’ny mpiandry vavahady, dia nitondra an’i Petera niditra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary hoy ny ankizivavy mpiandry vavahady tamin’i Petera: Moa hianao mba isan’ny mpianatr’io Lehilahy io? Hoy izy: Tsia. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary ny mpanompo sy ny mpiandry raharaha namelona afon’arina ka nijanona namindro teo, fa nangatsiaka ny andro; ary Petera koa mba nijanona niara-namindro taminy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny mpisoronabe nanadina an’i Jesosy ny amin’ny mpianany sy ny fampianarany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Jodasy koa, ilay namadika Azy, dia nahalala izany tany izany, satria mpankao matetika Jesosy mbamin’ny mpianany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jesosy namaly azy hoe: Izaho niteny miharihary tamin’izao tontolo izao; Izaho nampianatra mandrakariva tao amin’ny synagoga sy ny kianjan’ny tempoly, izay iangonan’ny Jiosy rehetra; ary tsy nisy nolazaiko tao amin’ny takona; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: koa nahoana no manontany Ahy hianao? Ireo nihaino no anontanio izay nolazaiko taminy; fa ireo no mahalala izay nolazaiko.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary rehefa nilaza izany teny izany Izy, ny mpiandry raharaha anankiray izay nitsangana teo dia namely tahamaina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tehina.
      marker-yv: yv-n
    - type: text
      text: ' an’i Jesosy ka nanao hoe: Izany va no famalinao ny mpisoronabe? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jesosy namaly azy hoe: Raha niteny ratsy Aho, ambarao izay ratsy; fa raha tsara ihany kosa, nahoana no dia mamely Ahy hianao? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary dia nasain’i Anasy nentina tamin’ny fatorany ho any amin’i Kaiafa mpisoronabe Izy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary Simona Petera nijanona namindro. Dia nisy nilaza taminy hoe: Moa hianao koa mba isan’ny mpianany? Fa izy nandà ka nanao hoe: Tsia. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hoy ny anankiray tamin’ny mpanompon’ny mpisoronabe havan’ilay nokapain’i Petera ny sofiny: Tsy efa hitako teo aminy tao anaty saha va hianao? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia nandà indray Petera; ary niaraka tamin’izay dia nisy akoho naneno.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitsaran’i Pilato an’i Jesosy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 27.1-26; Mar. 15.1-15; Lio. 23.1-25.
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ARY Jesosy dia nentiny niala tao amin’i Kaiafa ho ao anati-rova;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pretoria.
      marker-yv: yv-n
    - type: text
      text: ' ary maraina koa ny andro tamin’izay; nefa ireo tsy niditra tao anati-rova,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pretoria.
      marker-yv: yv-n
    - type: text
      text: ' fandrao ho voaloto, fa efa hihinana ny Paska izy.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary Pilato nivoaka ho eo aminy teo ivelany ka nanao hoe: Inona moa no iampanganareo io Lehilahy io? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary Jodasy, rehefa nahazo ny miaramila iray toko sy mpiandry raharaha avy tamin’ny lohan’ny mpisorona sy ny Fariseo, dia nankeo nitondra fanilo sy fanala ary fiadiana.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia namaly ireo ka nanao taminy hoe: Raha tsy mpanao ratsy Izy, dia tsy mba natolotray anao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary hoy Pilato taminy: Entonareo Izy, ka tsarao araka ny lalànareo. Hoy ny Jiosy taminy: Izahay tsy manam-pahefana hahafaty olona; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: mba hahatanteraka ny tenin’i Jesosy izay nolazainy nanambara ny fomban’ny fahafatesana izay efa hiaretany.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary niditra tao anati-rova
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pretoria.
      marker-yv: yv-n
    - type: text
      text: ' indray Pilato, dia niantso an’i Jesosy ka nanao taminy hoe: Hianao va no Mpanjakan’ny Jiosy? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jesosy namaly hoe: Hevitrao ihany va no anaovanao izany, sa nisy hafa nilaza Ahy taminao? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Pilato namaly hoe: Moa aho Jiosy? Ny firenenao sy ny mpisoronabe no nanolotra Anao tamiko; inona moa no nataonao?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Jesosy namaly hoe: Ny fanjakako tsy avy amin’izao tontolo izao; fa raha mba avy amin’izao tontolo izao ny fanjakako, dia ho niady ny mpanompoko, mba tsy ho voatolotra tamin’ny Jiosy Aho; nefa ankehitriny tsy avy amin’izany ny fanjakako. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary hoy Pilato taminy: Mpanjaka va ary Hianao? Jesosy namaly hoe: Voalazanao fa mpanjaka Aho. Izao no nahaterahako, ary izao no nihaviako amin’izao tontolo izao, dia ny hanambara ny marina. Izay rehetra avy amin’ny marina dia mihaino ny feoko. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Hoy Pilato taminy: Inona no marina?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nanontany izany izy, dia nivoaka nankeo amin’ny Jiosy indray ka nanao taminy hoe: Tsy hitako izay helony, na dia kely akory aza. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fa misy fanaonareo amin’ny Paska, handefasako anankiray ho anareo; koa tianareo va raha halefako ho anareo ny Mpanjakan’ny Jiosy? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary satria fantatr’i Jesosy izay rehetra hanjo Azy, dia nivoaka Izy ka nanao tamin’ireo hoe: Iza moa no tadiavinareo? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ary ireo niantso indray ka nanao hoe: Tsy Ilehio, fa Barabasy; koanefa jiolahy Barabasy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ireo namaly Azy hoe: Jesosy avy any Nazareta. Hoy Jesosy taminy: Izaho no Izy. Ary teo koa Jodasy, ilay namadika Azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary raha Jesosy vao nilaza taminy hoe: ,Izaho no Izy,’ dia nianotra ireo ka lavo tamin’ny tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary Jesosy nanontany azy indray hoe: Iza moa no tadiavinareo? Dia hoy izy: Jesosy avy any Nazareta. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jesosy namaly hoe: Efa nolazaiko taminareo fa Izaho no Izy; koa raha Izaho no tadiavinareo, dia avelao handeha ireto; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'mba hahatanteraka ny teny izay nataony hoe: ,Tsy nasiako very izay nomenao Ahy.’'
