document_id: EZK.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Filazana ny amin’ny loza hanjo, sy fampanantenana ny famindrampo.
  - type: text
    content: ARY nisy fanahy
  - type: note
    content: 'Na: rivotra.'
  - type: text
    content: ' nanainga ahy koa, dia nitondra ahy ho eo amin’ny vavahady atsinanana amin’ny tranon’i Jehovah, dia ilay manatrika ny atsinanana; ary, indreo, nisy olona dimy amby roa-polo lahy teo anoloan’ny vavahady; dia hitako teo amin’ireo Jazania, zanak’i Azora, sy Pelatia, zanak’i Benaia, lehiben’ny vahoaka.'
  '10':
  - type: text
    content: 'Ho lavon’ny sabatra hianareo; any amin’ny sisin-tanin’ny Isiraely no hitsarako anareo, ka dia ho fantatrareo fa Izaho no Jehovah. '
  '11':
  - type: text
    content: 'Ity '
  - type: text
    content: tanàna
  - type: text
    content: ' ity tsy ho vilaninareo, ary hianareo tsy ho hena ato anatiny; fa any amin’ny sisin-tanin’ny Isiraely no hitsarako anareo, '
  '12':
  - type: text
    content: ka dia ho fantatrareo fa Izaho no Jehovah, satria tsy nandeha araka ny lalàko hianareo na nanaraka ny fitsipiko, fa araka ny fitsipiky ny jentilisa izay manodidina anareo ihany no nataonareo.
  '13':
  - type: text
    content: 'Ary raha mbola naminany aho, dia maty Pelatia, zanak’i Benaia. Dia niankohoka aho ka nitaraina tamin’ny feo mahery nanao hoe: Indrisy! Jehovah Tompo ô, holevoninao va ny hany sisa amin’ny Isiraely?'
  '14':
  - type: text
    content: 'Ary tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '15':
  - type: text
    content: Ry zanak’olona, ny rahalahinao, eny, ny rahalahinao no andraikitrao,
  - type: note
    content: 'Na: iray firazanana aminao.'
  - type: text
    content: ' dia ny taranak’Isiraely rehetra, izay nitenenan’ny mponina any Jerosalema hoe: Manalavira an’i Jehovah; izahay no nomena ity tany ity ho lova.'
  '16':
  - type: text
    content: 'Koa lazao hoe: Izao no lazain’i Jehovah Tompo: Na dia nampandehaniko lavitra any amin’ny jentilisa aza izy ka naeliko tany amin’ny tany maro, dia ho fitoerana masina ho azy vetivety'
  - type: note
    content: 'Na: kely ho azy.'
  - type: text
    content: ' Aho any amin’ny tany izay alehany.'
  '17':
  - type: text
    content: 'Koa lazao hoe: Izao no lazain’i Jehovah Tompo: Hovoriko avy any amin’ny firenena hianareo, ary hangoniko avy any amin’ny tany izay nampielezana anareo, ka homeko ny tanin’ny Isiraely hianareo. '
  '18':
  - type: text
    content: 'Ary ho tonga ao izy ka hanaisotra ny zava-dratsiny rehetra sy ny fahavetavetany rehetra. '
  '19':
  - type: text
    content: 'Dia homeko fo iray izy, ary hasiako fanahy vaovao ao anatinareo; ary hesoriko amin’ny nofony ny fo vato, ka homeko fo nofo izy, '
  '2':
  - type: text
    content: 'Dia hoy Izy tamiko: Ry zanak’olona, ireo no lehilahy izay mamoron-tsain-dratsy sady manolo-tsain-dratsy eto amin’ity tanàna ity, '
  '20':
  - type: text
    content: mba handehanany araka ny didiko sy hitandremany ny fitsipiko ka hanarahany izany, ary izy dia ho oloko, ary Izaho ho Andriamaniny.
  '21':
  - type: text
    content: Fa ny amin’izay manana fo manina ny zava-dratsiny
  - type: note
    content: Heb. manaraka ny fon’ny zava-dratsiny.
  - type: text
    content: ' sy ny fahavetavetany, dia hatsingeriko ho eo an-dohany ihany ny nataony,'
  - type: note
    content: Heb. làlany.
  - type: text
    content: ' hoy Jehovah Tompo.'
  '22':
  - type: text
    content: 'Dia nasandratry ny kerobima ny elany sy ny kodia teo anilany; ary ny voninahitr’Andriamanitry ny Isiraely no teo amboniny. '
  '23':
  - type: text
    content: Ary ny voninahitr’i Jehovah niakatra niala tao amin’ny tanàna ka nijanona teo an-tampon’ny tendrombohitra atsinanan’ny tanàna.
  '24':
  - type: text
    content: Dia nisy fanahy
  - type: note
    content: 'Na: rivotra.'
  - type: text
    content: ' nanainga ahy tamin’ny fahitana, dia tamin’ny Fanahin’Andriamanitra, ka nitondra ahy ho any Kaldea ho any amin’ny babo. Dia niakatra niala tamiko ny fahitana izay efa hitako. '
  '25':
  - type: text
    content: Ary nolazaiko tamin’ny babo ny teny rehetra izay nasehon’i Jehovah ahy.
  '3':
  - type: text
    content: 'dia izay manao hoe: Mbola lavitra ny hanaovana trano; ity '
  - type: text
    content: tanàna
  - type: text
    content: ' ity no vilany, ary isika no hena; '
  '4':
  - type: text
    content: ka dia maminania hamely azy, eny, maminania, ry zanak’olona.
  '5':
  - type: text
    content: 'Ary tonga tao amiko ny Fanahin’i Jehovah, ka hoy Izy tamiko: Lazao hoe: Izao no lazain’i Jehovah: Izany no fiteninareo, ry taranak’Isiraely, ary fantatro izay rehetra ao an-tsainareo.'
  '6':
  - type: text
    content: 'Hianareo efa nahamaro ny voavononareo teto amin’ity tanàna ity, ary ny làlambeny efa nofenoinareo faty. '
  '7':
  - type: text
    content: 'Koa izao no lazain’i Jehovah Tompo: Ny voavononareo, izay nataonareo tao aminy, no hena, ary ity '
  - type: text
    content: tanàna
  - type: text
    content: ' ity no vilany; nefa havoaka avy ao aminy hianareo. '
  '8':
  - type: text
    content: 'Natahotra ny sabatra hianareo; nefa hataoko mahatratra anareo ihany ny sabatra, hoy Jehovah Tompo. '
  '9':
  - type: text
    content: 'Ary havoakako avy ato aminy hianareo ka hatolotro ho eny an-tànan’ny hafa firenena, ary hanao fitsarana aminareo Aho. '
