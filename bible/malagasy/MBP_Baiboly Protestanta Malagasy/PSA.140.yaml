document_id: PSA.140,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangataham-piarovana noho ny ataon’ny olona ratsy fanahy sy fetsy vava.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, vonjeo amin’ny olon-dratsy aho,
  - type: text
    content: Ary arovy amin’ny olon-dozabe,
  '10':
  - type: text
    content: Aoka hisy vain’afo halatsaka aminy;
  - type: text
    content: Aoka hariana any anaty afo izy, na any amin’ny rano lalina, ka tsy hiarina intsony.
  '11':
  - type: text
    content: Tsy hampitoerina amin’ny tany ny olo-mahay vava;
  - type: text
    content: Henjehin-doza ny olon-dozabe ka ho lavo.
  '12':
  - type: text
    content: Fantatro fa Jehovah no handahatra ny tenin’ny mahantra
  - type: text
    content: Sady hanome rariny ho an’ny malahelo.
  '13':
  - type: text
    content: Eny tokoa, ny marina hisaotra ny anaranao;
  - type: text
    content: Hitoetra eo anatrehanao ny mahitsy.
  '2':
  - type: text
    content: Izay mihevitra ratsy ao am-pony
  - type: text
    content: Ka manangana ady isan-andro.
  '3':
  - type: text
    content: Mandranitra ny lelany tahaka ny bibilava izy,
  - type: text
    content: Ny poizin’ny menarana no ao ambanin’ny molony.
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: Jehovah ô, vonjeo amin’ny tànan’ny ratsy fanahy aho,
  - type: text
    content: Ary arovy amin’ny olon-dozabe,
  - type: text
    content: Izay efa nihevitra handronjina ahy ho potraka.
  '5':
  - type: text
    content: Ny mpiavonavona efa nanafina fandrika sy kofehy hamandrihany ahy;
  - type: text
    content: Efa namela-pandrika harato teo amoron-dàlana izy;
  - type: text
    content: Nametraka tadivavarana hahazoany ahy izy.
  - type: text
    content: '[Sela.]'
  '6':
  - type: text
    content: 'Hoy izaho tamin’i Jehovah: Andriamanitro Hianao;'
  - type: text
    content: Henoy ny feon’ny fifonako, Jehovah ô!
  '7':
  - type: text
    content: Jehovah, Tompo ô, ry Herin’ny famonjena ahy,
  - type: text
    content: Manarona ny lohako amin’ny andro fiadiana Hianao.
  '8':
  - type: text
    content: Jehovah ô, aza manome ny irin’ny ratsy fanahy;
  - type: text
    content: Ary aza avela ho tanteraka ny hevi-dratsiny, fandrao hisandratra izy.
  - type: text
    content: '[Sela.]'
  '9':
  - type: text
    content: Ny lohan’izay manemitra ahy
  - type: text
    content: Dia aoka hosaronan’ny ratsy tononin’ny molony.
