document_id: 1KI.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hafatra nataon’i Davida tamin’i Solomona, sy ny nahafatesany.
  - type: text
    content: 'ARY rehefa antomotra ny andro hahafatesan’i Davida, dia nandidy an’i Solomona zanani-lahy izy hoe: '
  '10':
  - type: text
    content: 'Ary Davida dia lasa nodi-mandry any amin’ny razany ka nalevina ao an-Tanànan’i Davida. '
  '11':
  - type: text
    content: Ary ny andro nanjakan’i Davida tamin’ny Isiraely dia efa-polo taona; tao Hebrona no nanjakany fito taona, ary tao Jerosalema no nanjakany telo amby telo-polo taona.
  - type: heading
    content: Ny nataon’i Solomona hampiorina tsara ny fanjakany.
  '12':
  - type: text
    content: ARY Solomona nipetraka teo amin’ny seza fiandrianan’i Davida rainy; ary ny fanjakany dia niorina tsara.
  '13':
  - type: text
    content: 'Ary Adonia, zanakalahin’i Hagita, nankany amin’i Batseba, renin’i Solomona. Ary hoy ravehivavy: Moa fihavanana va no ahatongavanao? Dia hoy izy: Eny, fihavanana. '
  '14':
  - type: text
    content: 'Ary hoy koa izy: Misy teny kely holazaiko aminao. Ary hoy ravehivavy: Lazao ary.'
  '15':
  - type: text
    content: 'Dia hoy izy: Hianao mahalala fa ahy ny fanjakana, ary ny Isiraely rehetra nanandrandra ahy hanjaka, kanjo tafahodina ny fanjakana ka lasan’ny rahalahiko, fa azony avy tamin’i Jehovah. '
  '16':
  - type: text
    content: 'Koa ankehitriny zavatra iray loha no mba angatahiko aminao; ka aza dia lavinao aho. Ary hoy ravehivavy taminy: Lazao ary. '
  '17':
  - type: text
    content: 'Dia hoy izy: Masìna hianao, mitenena amin’i Solomona mpanjaka (fa tsy handa anao izy), mba homeny ho vadiko Abisaga Sonemita. '
  '18':
  - type: text
    content: 'Ary hoy Batseba: Eny ary, fa izaho dia hilaza ny teninao amin’ny mpanjaka.'
  '19':
  - type: text
    content: 'Ary Batseba nankany amin’i Solomona mpanjaka hilaza aminy ny tenin’i Adonia. Ary ny mpanjaka nitsangana hitsena an’i Batseba sady niankohoka teo anatrehany, dia nipetraka teo amin’ny seza fiandrianany, ary nasainy nisy nitondra seza fiandrianana koa ho an’ny renin’ny mpanjaka; ka dia nipetraka teo amin’ny ankavanany izy. '
  '2':
  - type: text
    content: 'Izaho efa handeha amin’ny làlan-kalehan’ny tany rehetra; koa mahereza hianao, ary misehoa ho lehilahy. '
  '20':
  - type: text
    content: 'Ary hoy izy: Misy zavatra kely iray loha mba hangatahiko aminao, ka aza dia lavinao aho. Ary hoy ny mpanjaka: Angataho ary, ry ineny, fa tsy handa anao aho. '
  '21':
  - type: text
    content: 'Dia hoy izy: Aoka Abisaga Sonemita homena ho vadin’i Adonia rahalahinao.'
  '22':
  - type: text
    content: 'Fa Solomona mpanjaka namaly ka nanao tamin-dreniny hoe: Nahoana hianao no mangataka an’i Abisaga Sonemita ho an’i Adonia; angataho ho azy koa ary ny fanjakana, fa izy no zokiko, dia ho azy sy Abiatara mpisorona ary ho an’i Joaba, zanak’i Zeroia.'
  '23':
  - type: text
    content: 'Ary Solomona mpanjaka dia nianiana tamin’i Jehovah hoe: Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hatao maty Adonia noho ny nanaovany izany teny izany. '
  '24':
  - type: text
    content: Koa ankehitriny, raha velona koa Jehovah, Izay nampitoetra sy nametraka ahy teo amin’ny seza fiandrianan’i Davida raiko sady nanome ahy fara handimby
  - type: note
    content: Heb. nanao trano ho ahy.
  - type: text
    content: ' araka izay nolazainy, dia hatao maty anio ihany Adonia. '
  '25':
  - type: text
    content: Ary Solomona mpanjaka naniraka an’i Benaia, zanak’i Joiada; ary izy namely azy ho faty.
  '26':
  - type: text
    content: 'Ary Abiatara mpisorona dia nilazan’ny mpanjaka hoe: Mandehana hianao hankany Anatota ho any an-tambohonao, fa olona tokony hatao maty hianao; nefa tsy hataoko maty amin’izao andro izao, satria nitondra ny fiaran’i Jehovah Tompo teo alohan’i Davida raiko hianao sady niara-nitondra fahoriana tamin’ny raiko tamin’izay rehetra nampahoriana azy. '
  '27':
  - type: text
    content: Ary Solomona dia nanongana an’i Abiatara tsy ho mpisoron’i Jehovah, ka dia nahatanteraka ny tenin’i Jehovah, ilay nolazainy tao Silo ny amin’ny taranak’i Ely, izy.
  '28':
  - type: text
    content: 'Ary ren’i Joaba izany (fa Joaba efa niodina nanaraka an’i Adonia, kanefa tsy niodina nanaraka an’i Absaloma izy), dia nandositra nankao amin’ny trano-lain’i Jehovah izy ka nangia ny tandroky ny alitara. '
  '29':
  - type: text
    content: 'Ary nambara tamin’i Solomona mpanjaka fa Joaba efa lasa nandositra ho ao amin’ny trano-lain’i Jehovah, ka, indro, eo anilan’ny alitara izy. Dia nirahin’i Solomona Benaia, zanak’i Joiada, ka nilazany hoe: Andeha, asio izy. '
  '3':
  - type: text
    content: 'Ary tandremo izay asain’i Jehovah Andriamanitrao hotandremana handehananao amin’ny làlany, hitandremanao ny lalàny sy ny didiny sy ny fitsipiny ary ny teni-vavolombelony, araka ny voasoratra ao amin’ny lalàn’i Mosesy, mba hataonao lavorary avokoa izay rehetra hataonao sy izay rehetra halehanao, '
  '30':
  - type: text
    content: 'Ary Benaia tonga tao amin’ny trano-lain’i Jehovah ka nanao tamin’i Joaba hoe: Izao no lazain’ny mpanjaka: Mivoaha hianao. Fa hoy izy: Tsia, fa eto ihany aho no ho faty. Ary Benaia nitondra teny tany amin’ny mpanjaka indray hoe: Izany no lazain’i Joaba, ary izany no navaliny ahy.'
  '31':
  - type: text
    content: 'Ary hoy ny mpanjaka taminy: Ataovy araka izay nolazainy, ka asio izy, dia aleveno, mba hanesoranao amiko sy amin’ny taranaky ny raiko ny ra marina izay nalatsak’i Joaba. '
  '32':
  - type: text
    content: 'Dia hatsingerin’i Jehovah ho amin’ny lohany ihany ny rany, satria izy namely olona roa lahy izay marina sady tsara noho izy ka namono azy tamin’ny sabatra, dia Abnera, zanak’i Nera, komandin’ny miaramilan’ny Isiraely, sy Amasa, zanak’i Jatera, komandin’ny miaramilan’ny Joda, nefa Davida raiko tsy nahalala izany akory. '
  '33':
  - type: text
    content: Eny, ny ran’izy roa lahy ireo hitsingerina amin’ny lohan’i Joaba sy ny lohan’ny taranany mandrakizay; fa amin’i Davida sy ny taranany sy ny mpianakaviny ary amin’ny seza fiandrianany kosa dia hisy fiadanana mandrakizay avy amin’i Jehovah.
  '34':
  - type: text
    content: 'Dia niakatra Benaia, zanak’i Joiada, ka namely azy ho faty; ary nalevina tao amin’ny fonenany tany an-efitra izy. '
  '35':
  - type: text
    content: Ary Benaia, zanak’i Joiada, no notendren’ny mpanjaka ho solony ho komandin’ny miaramila; ary Zadoka mpisorona no notendren’ny mpanjaka ho solon’i Abiatara.
  '36':
  - type: text
    content: 'Ary ny mpanjaka naniraka naka an’i Simey ka nanao taminy hoe: Manaova trano ato Jerosalema hianao, ka mitoera ao, ary aza miala ao hianao na ho aiza na ho aiza akory. '
  '37':
  - type: text
    content: 'Fa amin’izay andro hivoahanao mita ny lohasahan-driaka Kidrona, dia aoka ho fantatrao marina fa hatao maty tokoa hianao; ny ranao ho amin’ny lohanao ihany. '
  '38':
  - type: text
    content: 'Ary hoy Simey tamin’ny mpanjaka: Tsara izany teny izany; araka izany nolazain’ny mpanjaka tompoko izany no hataon’ny mpanomponao. Ary Simey nitoetra ela tany Jerosalema.'
  '39':
  - type: text
    content: 'Ary nony afaka telo taona mipaka, dia nisy roa lahy, mpanompon’i Simey, nandositra ho any amin’i Akisy, zanak’i Maka mpanjakan’i Gata. Ary nisy nanambara tamin’i Simey hoe: Indreo, any Gata ny mpanomponao. '
  '4':
  - type: text
    content: 'mba hanatanterahan’i Jehovah ny teny izay nilazany ahy hoe: Raha ny taranakao hitandrina ny alehany ka handeha eo anatrehako amin’ny fahamarinana amin’ny fony rehetra sy amin’ny fanahiny rehetra (hoy Izy), dia tsy ho diso zanakalahy ho eo amin’ny seza fiandrianan’ny Isiraely hianao.'
  '40':
  - type: text
    content: Dia nitsangana Simey nanisy lasely ny borikiny ka nankany Gata ho any amin’i Akisy hitady ny mpanompony, dia lasa nody Simey nitondra ny mpanompony avy tany Gata.
  '41':
  - type: text
    content: 'Ary nambara tamin’i Solomona ny nialan’i Simey tany Jerosalema hankany Gata sy ny niverenany indray. '
  '42':
  - type: text
    content: 'Ary ny mpanjaka naniraka naka an’i Simey ka nanao taminy hoe: Tsy efa nampianiana anao tamin’i Jehovah va aho ka nilaza taminao marimarina hoe: Aoka ho fantatrao marina fa amin’izay andro hivoahanao sy handehananao na ho aiza na ho aiza akory dia hatao maty tokoa hianao? Ary hoy hianao tamiko: Tsara izany teny reko izany. '
  '43':
  - type: text
    content: Koa nahoana hianao no tsy nitandrina ny fianianana tamin’i Jehovah sy ny didy izay nandidiako anao?
  '44':
  - type: text
    content: 'Ary hoy koa ny mpanjaka tamin’i Simey: Hianao mahalala ny ratsy rehetra nataonao tamin’i Davida raiko, eny, tsaroan’ny fonao izany; ka dia hatsingerin’i Jehovah amin’ny lohanao ny haratsianao. '
  '45':
  - type: text
    content: 'Fa hotahina kosa Solomona mpanjaka, ary ny seza fiandrianan’i Davida hampitoerina eo anatrehan’i Jehovah mandrakizay. '
  '46':
  - type: text
    content: Ary ny mpanjaka nandidy an’i Benaia, zanak’i Joiada, dia nivoaka izy ka namely an’i Simey ho faty.
  - type: text
    content: Ary ny fanjakana dia naorina teo an-tànan’i Solomona.
  '5':
  - type: text
    content: 'Ary hianao koa mahalala izay nataon’i Joaba, zanak’i Zeroia, tamiko, dia ilay nataony tamin’izy roa lahy komandin’ny miaramilan’ny Isiraely, dia tamin’i Abnera, zanak’i Nera, sy tamin’i Amasa, zanak’i Jatera, izay novonoiny sady nalatsany ra toy ny amin’ny ady, nefa tsy nisy ady tsinona, ka nasiany ra toy ny amin’ny ady ny fehin-kibony teny am-balahany sy ny kapany teny an-tongony. '
  '6':
  - type: text
    content: Koa manaova araka ny fahendrenao, ary aza avela hidina any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' amin’ny fiadanana ny volo fotsiny.'
  '7':
  - type: text
    content: 'Fa ny zanak’i Barzilay Gileadita kosa dia asio soa, ka avelao mba ho isan’izay mihinana eo amin’ny latabatrao izy; fa '
  - type: text
    content: hanao soa
  - type: text
    content: ' toy izany no nankanesan’ireo tany amiko, fony nandositra an’i Absaloma rahalahinao aho.'
  '8':
  - type: text
    content: 'Ary indro fa ao aminao koa Simey, zanak’i Gera, Benjamita avy any Bahorima–loza loatra ny nanozonany ahy tamin’ny andro nankanesako tany Mahanaima,–nefa izy mba nidina hitsena ahy tao Jordana ihany, ary Jehovah no nianianako taminy hoe: Tsy hovonoiko amin’ny sabatra hianao. '
  '9':
  - type: text
    content: Koa aza ataonao afa-tsiny izy; fa lehilahy hendry hianao, ka fantatrao izay tokony hanaovanao azy, ka amin’ny fandatsahan-dra no hampidinanao ny volo fotsiny ho any amin’ny fiainan-tsi-hita.
  - type: note
    content: Heb. Sheola.
