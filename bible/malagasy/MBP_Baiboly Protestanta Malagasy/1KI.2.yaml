document_id: 1KI.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hafatra nataon’i Davida tamin’i Solomona, sy ny nahafatesany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa antomotra ny andro hahafatesan’i Davida, dia nandidy an’i Solomona zanani-lahy izy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izaho efa handeha amin’ny làlan-kalehan’ny tany rehetra; koa mahereza hianao, ary misehoa ho lehilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tandremo izay asain’i Jehovah Andriamanitrao hotandremana handehananao amin’ny làlany, hitandremanao ny lalàny sy ny didiny sy ny fitsipiny ary ny teni-vavolombelony, araka ny voasoratra ao amin’ny lalàn’i Mosesy, mba hataonao lavorary avokoa izay rehetra hataonao sy izay rehetra halehanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mba hanatanterahan’i Jehovah ny teny izay nilazany ahy hoe: Raha ny taranakao hitandrina ny alehany ka handeha eo anatrehako amin’ny fahamarinana amin’ny fony rehetra sy amin’ny fanahiny rehetra (hoy Izy), dia tsy ho diso zanakalahy ho eo amin’ny seza fiandrianan’ny Isiraely hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hianao koa mahalala izay nataon’i Joaba, zanak’i Zeroia, tamiko, dia ilay nataony tamin’izy roa lahy komandin’ny miaramilan’ny Isiraely, dia tamin’i Abnera, zanak’i Nera, sy tamin’i Amasa, zanak’i Jatera, izay novonoiny sady nalatsany ra toy ny amin’ny ady, nefa tsy nisy ady tsinona, ka nasiany ra toy ny amin’ny ady ny fehin-kibony teny am-balahany sy ny kapany teny an-tongony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa manaova araka ny fahendrenao, ary aza avela hidina any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fiadanana ny volo fotsiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny zanak’i Barzilay Gileadita kosa dia asio soa, ka avelao mba ho isan’izay mihinana eo amin’ny latabatrao izy; fa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hanao soa
  - type: text
    text: ' toy izany no nankanesan’ireo tany amiko, fony nandositra an’i Absaloma rahalahinao aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary indro fa ao aminao koa Simey, zanak’i Gera, Benjamita avy any Bahorima–loza loatra ny nanozonany ahy tamin’ny andro nankanesako tany Mahanaima,–nefa izy mba nidina hitsena ahy tao Jordana ihany, ary Jehovah no nianianako taminy hoe: Tsy hovonoiko amin’ny sabatra hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa aza ataonao afa-tsiny izy; fa lehilahy hendry hianao, ka fantatrao izay tokony hanaovanao azy, ka amin’ny fandatsahan-dra no hampidinanao ny volo fotsiny ho any amin’ny fiainan-tsi-hita.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Davida dia lasa nodi-mandry any amin’ny razany ka nalevina ao an-Tanànan’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny andro nanjakan’i Davida tamin’ny Isiraely dia efa-polo taona; tao Hebrona no nanjakany fito taona, ary tao Jerosalema no nanjakany telo amby telo-polo taona.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nataon’i Solomona hampiorina tsara ny fanjakany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ARY Solomona nipetraka teo amin’ny seza fiandrianan’i Davida rainy; ary ny fanjakany dia niorina tsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Adonia, zanakalahin’i Hagita, nankany amin’i Batseba, renin’i Solomona. Ary hoy ravehivavy: Moa fihavanana va no ahatongavanao? Dia hoy izy: Eny, fihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy koa izy: Misy teny kely holazaiko aminao. Ary hoy ravehivavy: Lazao ary.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy izy: Hianao mahalala fa ahy ny fanjakana, ary ny Isiraely rehetra nanandrandra ahy hanjaka, kanjo tafahodina ny fanjakana ka lasan’ny rahalahiko, fa azony avy tamin’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa ankehitriny zavatra iray loha no mba angatahiko aminao; ka aza dia lavinao aho. Ary hoy ravehivavy taminy: Lazao ary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy izy: Masìna hianao, mitenena amin’i Solomona mpanjaka (fa tsy handa anao izy), mba homeny ho vadiko Abisaga Sonemita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Batseba: Eny ary, fa izaho dia hilaza ny teninao amin’ny mpanjaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Batseba nankany amin’i Solomona mpanjaka hilaza aminy ny tenin’i Adonia. Ary ny mpanjaka nitsangana hitsena an’i Batseba sady niankohoka teo anatrehany, dia nipetraka teo amin’ny seza fiandrianany, ary nasainy nisy nitondra seza fiandrianana koa ho an’ny renin’ny mpanjaka; ka dia nipetraka teo amin’ny ankavanany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy izy: Misy zavatra kely iray loha mba hangatahiko aminao, ka aza dia lavinao aho. Ary hoy ny mpanjaka: Angataho ary, ry ineny, fa tsy handa anao aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy izy: Aoka Abisaga Sonemita homena ho vadin’i Adonia rahalahinao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Solomona mpanjaka namaly ka nanao tamin-dreniny hoe: Nahoana hianao no mangataka an’i Abisaga Sonemita ho an’i Adonia; angataho ho azy koa ary ny fanjakana, fa izy no zokiko, dia ho azy sy Abiatara mpisorona ary ho an’i Joaba, zanak’i Zeroia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Solomona mpanjaka dia nianiana tamin’i Jehovah hoe: Hataon’Andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hatao maty Adonia noho ny nanaovany izany teny izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa ankehitriny, raha velona koa Jehovah, Izay nampitoetra sy nametraka ahy teo amin’ny seza fiandrianan’i Davida raiko sady nanome ahy fara handimby
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanao trano ho ahy.
    marker-yv: yv-n
  - type: text
    text: ' araka izay nolazainy, dia hatao maty anio ihany Adonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary Solomona mpanjaka naniraka an’i Benaia, zanak’i Joiada; ary izy namely azy ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Abiatara mpisorona dia nilazan’ny mpanjaka hoe: Mandehana hianao hankany Anatota ho any an-tambohonao, fa olona tokony hatao maty hianao; nefa tsy hataoko maty amin’izao andro izao, satria nitondra ny fiaran’i Jehovah Tompo teo alohan’i Davida raiko hianao sady niara-nitondra fahoriana tamin’ny raiko tamin’izay rehetra nampahoriana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary Solomona dia nanongana an’i Abiatara tsy ho mpisoron’i Jehovah, ka dia nahatanteraka ny tenin’i Jehovah, ilay nolazainy tao Silo ny amin’ny taranak’i Ely, izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ren’i Joaba izany (fa Joaba efa niodina nanaraka an’i Adonia, kanefa tsy niodina nanaraka an’i Absaloma izy), dia nandositra nankao amin’ny trano-lain’i Jehovah izy ka nangia ny tandroky ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nambara tamin’i Solomona mpanjaka fa Joaba efa lasa nandositra ho ao amin’ny trano-lain’i Jehovah, ka, indro, eo anilan’ny alitara izy. Dia nirahin’i Solomona Benaia, zanak’i Joiada, ka nilazany hoe: Andeha, asio izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Benaia tonga tao amin’ny trano-lain’i Jehovah ka nanao tamin’i Joaba hoe: Izao no lazain’ny mpanjaka: Mivoaha hianao. Fa hoy izy: Tsia, fa eto ihany aho no ho faty. Ary Benaia nitondra teny tany amin’ny mpanjaka indray hoe: Izany no lazain’i Joaba, ary izany no navaliny ahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Ataovy araka izay nolazainy, ka asio izy, dia aleveno, mba hanesoranao amiko sy amin’ny taranaky ny raiko ny ra marina izay nalatsak’i Joaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia hatsingerin’i Jehovah ho amin’ny lohany ihany ny rany, satria izy namely olona roa lahy izay marina sady tsara noho izy ka namono azy tamin’ny sabatra, dia Abnera, zanak’i Nera, komandin’ny miaramilan’ny Isiraely, sy Amasa, zanak’i Jatera, komandin’ny miaramilan’ny Joda, nefa Davida raiko tsy nahalala izany akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Eny, ny ran’izy roa lahy ireo hitsingerina amin’ny lohan’i Joaba sy ny lohan’ny taranany mandrakizay; fa amin’i Davida sy ny taranany sy ny mpianakaviny ary amin’ny seza fiandrianany kosa dia hisy fiadanana mandrakizay avy amin’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niakatra Benaia, zanak’i Joiada, ka namely azy ho faty; ary nalevina tao amin’ny fonenany tany an-efitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary Benaia, zanak’i Joiada, no notendren’ny mpanjaka ho solony ho komandin’ny miaramila; ary Zadoka mpisorona no notendren’ny mpanjaka ho solon’i Abiatara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny mpanjaka naniraka naka an’i Simey ka nanao taminy hoe: Manaova trano ato Jerosalema hianao, ka mitoera ao, ary aza miala ao hianao na ho aiza na ho aiza akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa amin’izay andro hivoahanao mita ny lohasahan-driaka Kidrona, dia aoka ho fantatrao marina fa hatao maty tokoa hianao; ny ranao ho amin’ny lohanao ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary hoy Simey tamin’ny mpanjaka: Tsara izany teny izany; araka izany nolazain’ny mpanjaka tompoko izany no hataon’ny mpanomponao. Ary Simey nitoetra ela tany Jerosalema.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary nony afaka telo taona mipaka, dia nisy roa lahy, mpanompon’i Simey, nandositra ho any amin’i Akisy, zanak’i Maka mpanjakan’i Gata. Ary nisy nanambara tamin’i Simey hoe: Indreo, any Gata ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia nitsangana Simey nanisy lasely ny borikiny ka nankany Gata ho any amin’i Akisy hitady ny mpanompony, dia lasa nody Simey nitondra ny mpanompony avy tany Gata.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nambara tamin’i Solomona ny nialan’i Simey tany Jerosalema hankany Gata sy ny niverenany indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ny mpanjaka naniraka naka an’i Simey ka nanao taminy hoe: Tsy efa nampianiana anao tamin’i Jehovah va aho ka nilaza taminao marimarina hoe: Aoka ho fantatrao marina fa amin’izay andro hivoahanao sy handehananao na ho aiza na ho aiza akory dia hatao maty tokoa hianao? Ary hoy hianao tamiko: Tsara izany teny reko izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Koa nahoana hianao no tsy nitandrina ny fianianana tamin’i Jehovah sy ny didy izay nandidiako anao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary hoy koa ny mpanjaka tamin’i Simey: Hianao mahalala ny ratsy rehetra nataonao tamin’i Davida raiko, eny, tsaroan’ny fonao izany; ka dia hatsingerin’i Jehovah amin’ny lohanao ny haratsianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa hotahina kosa Solomona mpanjaka, ary ny seza fiandrianan’i Davida hampitoerina eo anatrehan’i Jehovah mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ary ny mpanjaka nandidy an’i Benaia, zanak’i Joiada, dia nivoaka izy ka namely an’i Simey ho faty.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary ny fanjakana dia naorina teo an-tànan’i Solomona.
