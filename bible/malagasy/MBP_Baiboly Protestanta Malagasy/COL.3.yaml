document_id: COL.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tokony hanariana ny asan’ny nofo sy ny hitondran-tena miendrika ny filazantsara.
  - type: text
    content: 'KOA raha niara-natsangana tamin’i Kristy hianareo, dia katsaho ny zavatra any ambony, any amin’ny itoeran’i Kristy, Izay mipetraka eo an-tànana ankavanan’Andriamanitra. '
  '10':
  - type: text
    content: ary efa notafinareo ny toetra
  - type: note
    content: Gr. olona.
  - type: text
    content: ' vaovao, izay havaozina ho amin’ny fahalalana tsara araka ny endrik’Izay nahary azy. '
  '11':
  - type: text
    content: Fa amin’izany dia tsy misy jentilisa
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' sy Jiosy, na voafora sy tsy voafora, na barbariana sy Skytiana, na andevo sy tsy andevo, fa Kristy no zavatra rehetra sady amin’ny rehetra.'
  '12':
  - type: text
    content: 'Koa mitafia famindrampo sy fiantrana, fahamoram-panahy, fanetren-tena, fahalemem-panahy, fandeferana, araka ny olom-boafidin’Andriamanitra sady masina no malala. '
  '13':
  - type: text
    content: Mifandefera, ka mifamelà heloka hianareo, raha misy manana alahelo amin’ny sasany; tahaka ny namelan’ny Tompo
  - type: note
    content: 'Na: [Kristy].'
  - type: text
    content: ' ny helokareo no aoka mba hamelanareo heloka kosa. '
  '14':
  - type: text
    content: 'Ary aoka ho ambonin’izany rehetra izany ny fitiavana, fa fehin’ny fahatanterahana izany. '
  '15':
  - type: text
    content: Ary aoka hanapaka ao am-ponareo ny fiadanan’i Kristy, fa ho amin’izany no niantsoana anareo ho tena iray; ary aoka ho feno fisaorana hianareo.
  '16':
  - type: text
    content: 'Aoka ny tenin’i Kristy hitoetra betsaka ao aminareo amin’ny fahendrena rehetra, dia mifampianara ka mifananara amin’ny salamo sy ny fihirana ary ny tonon-kiram-panahy, mihira amin’ny fahasoavana ao am-ponareo ho an’Andriamanitra. '
  '17':
  - type: text
    content: 'Ary na inona na inona ataonareo, na amin’ny teny, na amin’ny asa, '
  - type: text
    content: dia ataovy
  - type: text
    content: ' amin’ny anaran’i Jesosy Tompo izany rehetra izany, ka misaora an’Andriamanitra Ray amin’ny alalany.'
  '18':
  - type: text
    content: 'Hianareo vehivavy, maneke ny vadinareo araka izay mety hatao ao amin’ny Tompo. '
  '19':
  - type: text
    content: Hianareo lehilahy, tiava ny vadinareo, ary aza sosotra
  - type: note
    content: Gr. mangidy.
  - type: text
    content: ' aminy.'
  '2':
  - type: text
    content: 'Saino ny zavatra any ambony, fa tsy ny zavatra etỳ an-tany. '
  '20':
  - type: text
    content: 'Hianareo zanaka, maneke ny ray aman-dreninareo amin’ny zavatra rehetra; fa ankasitrahana ao amin’ny Tompo izany. '
  '21':
  - type: text
    content: Hianareo ray, aza mampahasosotra ny zanakareo, fandrao mamoy fo izy.
  '22':
  - type: text
    content: 'Hianareo mpanompo, maneke ny tomponareo araka ny nofo amin’ny zavatra rehetra, tsy amin’ny fanompoana eo imaso, tahaka ny mpila sitraka amin’olona, fa amin’ny fahatsoram-po, matahotra ny Tompo; '
  '23':
  - type: text
    content: 'ary na inona na inona ataonareo, dia ataovy amin’ny fo, tahaka ny ho an’ny Tompo, fa tsy ho an’olona, '
  '24':
  - type: text
    content: 'satria fantatrareo fa ny Tompo no handraisanareo ny lova ho valiny; fa manompo an’i Kristy Tompo hianareo. '
  '25':
  - type: text
    content: Fa izay manao ny tsy marina dia handray araka ny tsy marina nataony; fa tsy misy fizahan-tavan’olona.
  '3':
  - type: text
    content: 'Fa efa maty hianareo, ary ny fiainanareo miara-miafina amin’i Kristy ao amin’Andriamanitra. '
  '4':
  - type: text
    content: Raha hiseho Kristy fiainantsika, dia hiara-miseho aminy koa amin’ny voninahitra hianareo.
  '5':
  - type: text
    content: 'Koa vonoy ny momba ny tenanareo izay etỳ an-tany, dia fijangajangana, fahalotoana, firehetam-po, fanirian-dratsy ary fieremana dia fanompoan-tsampy izany; '
  '6':
  - type: text
    content: 'fa izany zavatra izany no mahatonga ny fahatezeran’Andriamanitra amin’ny zanaky ny tsi-fanarahana; '
  '7':
  - type: text
    content: 'izany koa no nalehanareo fahiny, fony mbola velona taminy hianareo. '
  '8':
  - type: text
    content: 'Fa ankehitriny, esory koa izao rehetra izao, dia fahatezerana, fiafonafonana, lolompo, fitenenan-dratsy, teny mahamenatra avy amin’ny vavanareo. '
  '9':
  - type: text
    content: Aza mifandainga hianareo, fa efa narianareo ny toetra
  - type: note
    content: Gr. olona.
  - type: text
    content: ' taloha mbamin’ny asany; '
