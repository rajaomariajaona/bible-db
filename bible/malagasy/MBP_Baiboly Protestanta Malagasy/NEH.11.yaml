document_id: NEH.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanendrena ny olona honina any Jerosalema sy any amin’ny tanàna sasany.
  - type: text
    content: 'ARY nonina tany Jerosalema ny mpanapaka ny olona; ary ny olona sisa nanao filokana hahatonga ny ampahafolony honina any Jerosalema, tanàna masina, fa ny sivy toko kosa dia any an-tanàna hafa. '
  '10':
  - type: text
    content: 'Ny avy tamin’ny mpisorona dia Jedaia, zanak’i Joariba, ary Jakina. '
  '11':
  - type: text
    content: 'Ary Seraia, zanak’i Hilkia, zanak’i Mesolama, zanak’i Zadoka, zanak’i Meraiota, zanak’i Ahitoba, no mpanapaka ny tranon’Andriamanitra. '
  '12':
  - type: text
    content: 'Ary ny rahalahin’ireo izay mpanao ny raharaha tao an-trano dia roa amby roa-polo amby valon-jato; ary Adaia, zanak’i Jerohama, zanak’i Pelalia, zanak’i Amzy, zanak’i Zakaria, zanak’i Pasora, zanak’i Malkia, '
  '13':
  - type: text
    content: 'ary ny rahalahiny, izay samy lohan’ny fianakaviana, dia roa amby efa-polo amby roan-jato; ary Amasay, zanak’i Azarela, zanak’i Ahazay, zanak’i Mesilemota, zanak’Imera, '
  '14':
  - type: text
    content: mbamin’ny rahalahin’ireo, dia lehilahy mahery valo amby roa-polo amby zato; ary Zabdiela, zanak’i Hagedolima, no mpifehy azy.
  '15':
  - type: text
    content: 'Ary ny avy tamin’ny Levita dia Semaia, zanak’i Hasoba, zanak’i Azrikama, zanak’i Hasabia, zanak’i Bony; '
  '16':
  - type: text
    content: 'ary Sabetahy sy Jozabada, avy tamin’ny lohan’ny Levita, no tonian’ny raharaha teo ivelan’ny tranon’Andriamanitra. '
  '17':
  - type: text
    content: 'Ary Matania, zanak’i Mika, zanak’i Zabdy, zanak’i Asafa, no mpiventy, raha natao ny fisaorana tao am-pivavahana; ary Bakbokia no nanarakaraka teo amin’ny rahalahiny, dia vao Abda, zanak’i Samoa, zanak’i Galala, zanak’i Jedotona. '
  '18':
  - type: text
    content: Ny Levita rehetra tao an-tanàna masina dia efatra amby valo-polo amby roan-jato.
  '19':
  - type: text
    content: Ary ny mpiandry varavarana dia Akoba sy Talmona mbamin’ny rahalahiny izay niambina ny vavahady, dia roa amby fito-polo amby zato.
  '2':
  - type: text
    content: Ary nisaoran’ny olona ny lehilahy rehetra izay nanolo-tena honina any Jerosalema.
  '20':
  - type: text
    content: Ary ny sisa tamin’ny Isiraely sy ny mpisorona sy ny Levita, dia teny an-tanàna rehetra any Joda, samy tao amin’ny zara-taniny avy.
  '21':
  - type: text
    content: 'Fa ny Netinima dia nonina tany Ofela; ary Ziha sy Gispa no nifehy azy. '
  '22':
  - type: text
    content: 'Ary ny mpifehy ny Levita tany Jerosalema amin’ny raharaha momba ny tranon’Andriamanitra dia Ozy, zanak’i Bany, zanak’i Hasabia, zanak’i Matania, zanak’i Mika, isan’ny mpihira, taranak’i Asafa. '
  '23':
  - type: text
    content: Fa ny didin’ny mpanjaka ny amin’ireo mpihira ireo dia ny hahazoany izay anjara tokony ho azy isan-andro.
  '24':
  - type: text
    content: Ary Petahia, zanak’i Mesezabela, isan’ny taranak’i Zera, zanak’i Joda, dia teo anilan’ny mpanjaka hitandrina ny raharaha rehetra ny amin’ny olona.
  '25':
  - type: text
    content: 'Fa ny amin’ny vohitra eny an-tsaha, dia ny sasany tamin’ny taranak’i Joda no nonina tany Kiriat-arba sy ny zana-bohiny, ary tany Dibona sy ny zana-bohiny, ary tany Jekabzela sy ny zana-bohiny, '
  '26':
  - type: text
    content: 'ary tany Jesoa sy Molada sy Beti-paleta '
  '27':
  - type: text
    content: 'sy Hazarasoala ary Beri-sheba sy ny zana-bohiny, '
  '28':
  - type: text
    content: 'ary tany Ziklaga sy Mekona sy ny zana-bohiny, '
  '29':
  - type: text
    content: 'ary tany En-rimona sy Zora sy Jarmota '
  '3':
  - type: text
    content: Ary izao no ben’ny tany izay nonina tany Jerosalema; fa ny tao an-tanànan’ny Joda samy nonina tao amin’ny taniny avy, tao an-tanànany, dia ny Isiraely, ny mpisorona sy ny Levita sy ny Netinima ary ny taranaky ny mpanompon’i Solomona.
  '30':
  - type: text
    content: sy Zanoa sy Adolama sy ny zana-bohiny, sy tany Lakisy sy ny sahany, ary tany Azeka sy ny zana-bohiny. Ary nonina hatrany Beri-sheba ka hatramin’ny lohasahan’i Hinoma izy.
  '31':
  - type: text
    content: 'Ary ny taranak’i Benjamina kosa no hatrany Geba ka hatrany Mikmasy sy Aia sy Betela sy ny zana-bohiny, '
  '32':
  - type: text
    content: 'ary tany Anatota sy Noba sy Anania '
  '33':
  - type: text
    content: 'sy Hazora sy Rama sy Gitaima '
  '34':
  - type: text
    content: 'sy Hadida sy Zeboima sy Nebala '
  '35':
  - type: text
    content: sy Loda sy Ono, lohasahan’ny mahay tao-zavatra.
  '36':
  - type: text
    content: Ary tao amin’ny Benjamina nisy Levita, izay isan’ny antokon’ny Joda.
  '4':
  - type: text
    content: 'Ary tany Jerosalema no nonenan’ny sasany tamin’ny taranak’i Joda sy ny taranak’i Benjamina. Ny avy tamin’ny taranak’i Joda dia Ataia, zanak’i Ozia, zanak’i Zakaria, zanak’i Amaria, zanak’i Sefatia, zanak’i Mahalalila, avy tamin’ny taranak’i Fareza; '
  '5':
  - type: text
    content: 'ary Mahaseia, zanak’i Baroka, zanak’i Kola-hoze, zanak’i Hazaia, zanak’i Adaia, zanak’i Joariba, zanak’i Zakaria, zanak’ilay Silonita. '
  '6':
  - type: text
    content: 'Ny taranak’i Fareza rehetra izay nonina tany Jerosalema dia lehilahy mahery valo amby enim-polo amby efa-jato. '
  '7':
  - type: text
    content: 'Ary izao no taranak’i Benjamina: Salo, zanak’i Mesolama, zanak’i Joeda, zanak’i Pedaia, zanak’i Kolaia, zanak’i Mahaseia, zanak’Itiela, zanak’i Jesaia; '
  '8':
  - type: text
    content: 'ary nanarakaraka azy Gabay sy Salay; dia valo amby roa-polo amby sivin-jato. '
  '9':
  - type: text
    content: Ary Joela, zanak’i Zikry, no mpifehy azy; ary Joda, zanak’i Senoa, no lefitry ny komandin’ny tanàna.
