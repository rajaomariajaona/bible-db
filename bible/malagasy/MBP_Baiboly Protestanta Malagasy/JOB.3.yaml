document_id: JOB.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fitarainan’i Joba noho ny fahoriana nanjo azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'REHEFA afaka izany, dia niloa-bava Joba ka nanozona ny androny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Foàna anie ny andro nahaterahako
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy ny alina izay nanao hoe: Misy zazalahy vao torontoronina!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izany andro izany–dia aoka ho maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy hitady azy Andriamanitra any ambony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy hisy mazava hamirapiratra aminy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka ny aizina sy ny aloky ny fahafatesana hahalasa azy indray;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: handoto azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny rahona hitatao eo amboniny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka izay zavatra mahamaizina ny andro hampahatsiravina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany alina izany–aoka ny aizim-pito hisambotra azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hiara-mifaly amin’ny andron’ny taona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho tonga amin’ny isan’ny volana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro izany alina izany–aoka ho momba izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy ho velona ao ny hoby;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka hanozona azy ny mpanozona andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mahay mamoha ny dragona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka ho maizina ny kintan’ny marainany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hiandry ny mazava izy, nefa tsy hisy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy ho faly mahita ny hodimason’ny maraina izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Satria tsy nanidy ny varavaran’ny kibon’ineny izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy nanafina fahoriana tamin’ny masoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nahoana re aho no tsy maty hatrany am-bohoka e,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy niala aina, fony vao nivoaka avy tany an-kibo e?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahoana no nisy lohalika niandry ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahoana no nisy nono hinonoako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha tsy izany, dia efa nandry aho toy izay ka niadana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, natory aho ka afa-tsasatra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Teo amin’ny mpanjaka sy ny mpanolo-tsaina avy amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: namboatra.
    marker-yv: yv-n
  - type: text
    text: ' ireny tanàna efa rava,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fasana lehibe.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na teo amin’ny andriandahy izay manana volamena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mameno volafotsy ny tranony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Na efa tsy ary toy ny zaza tsy tonga volana aho ka nafenina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy ny zaza izay tsy nahita ny mazava akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Any no itsaharan’ny ratsy fanahy tsy hampitebiteby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any ny reraka no afa-tsasatra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Miara-miadana avokoa ny mpifatotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mandre ny feon’ny mpampiasa izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Samy any ny kely sy ny lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanompo dia afaka amin’ny tompony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nahoana no fahazavana no mba omena ny reraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fiainana ho an’izay latsaka amin’ny fangidiana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay miandry fahafatesana, nefa tsy avy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mitady azy mihoatra noho ny fitady harena nafenina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izay faly indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ravoravo, raha mahita ny fasana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia olona izay mandeha ao amin’ny maizina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady voafefin’Andriamanitra manodidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa mialoha ny haninkaniko ny fitolokoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary migororoana toy ny rano ny fidradradradrako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa izay atahorako no mahazo ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay angovitako no manjo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy mbola nahita fiadanana na fitsaharana na fakana aina akory aza aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tonga indray ny tebiteby.
