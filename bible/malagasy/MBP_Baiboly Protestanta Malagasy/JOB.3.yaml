document_id: JOB.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fitarainan’i Joba noho ny fahoriana nanjo azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'REHEFA afaka izany, dia niloa-bava Joba ka nanozona ny androny '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy nanidy ny varavaran’ny kibon’ineny izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nanafina fahoriana tamin’ny masoko.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana re aho no tsy maty hatrany am-bohoka e,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy niala aina, fony vao nivoaka avy tany an-kibo e?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no nisy lohalika niandry ahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahoana no nisy nono hinonoako?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha tsy izany, dia efa nandry aho toy izay ka niadana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, natory aho ka afa-tsasatra,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo amin’ny mpanjaka sy ny mpanolo-tsaina avy amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: namboatra.
      marker-yv: yv-n
    - type: text
      text: ' ireny tanàna efa rava,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fasana lehibe.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na teo amin’ny andriandahy izay manana volamena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mameno volafotsy ny tranony;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na efa tsy ary toy ny zaza tsy tonga volana aho ka nafenina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy ny zaza izay tsy nahita ny mazava akory.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no itsaharan’ny ratsy fanahy tsy hampitebiteby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary any ny reraka no afa-tsasatra;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miara-miadana avokoa ny mpifatotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mandre ny feon’ny mpampiasa izy;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy any ny kely sy ny lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanompo dia afaka amin’ny tompony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nanao hoe:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no fahazavana no mba omena ny reraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fiainana ho an’izay latsaka amin’ny fangidiana?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miandry fahafatesana, nefa tsy avy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mitady azy mihoatra noho ny fitady harena nafenina;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay faly indrindra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady ravoravo, raha mahita ny fasana,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia olona izay mandeha ao amin’ny maizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady voafefin’Andriamanitra manodidina.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mialoha ny haninkaniko ny fitolokoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary migororoana toy ny rano ny fidradradradrako;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay atahorako no mahazo ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay angovitako no manjo ahy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mbola nahita fiadanana na fitsaharana na fakana aina akory aza aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tonga indray ny tebiteby.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foàna anie ny andro nahaterahako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy ny alina izay nanao hoe: Misy zazalahy vao torontoronina!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany andro izany–dia aoka ho maizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy hitady azy Andriamanitra any ambony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy hisy mazava hamirapiratra aminy;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny aizina sy ny aloky ny fahafatesana hahalasa azy indray;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: handoto azy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny rahona hitatao eo amboniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka izay zavatra mahamaizina ny andro hampahatsiravina azy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany alina izany–aoka ny aizim-pito hisambotra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hiara-mifaly amin’ny andron’ny taona izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy ho tonga amin’ny isan’ny volana;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro izany alina izany–aoka ho momba izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy ho velona ao ny hoby;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hanozona azy ny mpanozona andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mahay mamoha ny dragona;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho maizina ny kintan’ny marainany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiandry ny mazava izy, nefa tsy hisy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy ho faly mahita ny hodimason’ny maraina izy,
