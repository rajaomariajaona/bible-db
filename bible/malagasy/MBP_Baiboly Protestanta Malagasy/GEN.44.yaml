document_id: GEN.44
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampahafantaran’i Josefa ny rahalahiny fa izy no Josefa, sy ny nanirahany haka ny rainy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Josefa nanome teny ny mpikarakara ny tao an-tranony ka nanao hoe: Fenoy hanina ny lasakan’ireo lehilahy ireo, araka izay zakany ho entina, ary ataovy eo am-bavan’ny lasakany avy ny volan’ny isan-dahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary ny kapoakako, dia ilay kapoaka volafotsy, ataovy eo am-bavan’ny lasakan’ilay faralahy mbamin’ny vola hamidiny vary. Dia nataony araka ny teny izay nolazain’i Josefa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha vao nazava ny andro, dia nampandehanina ireo lehilahy ireo, dia izy sy ny borikiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa tafavoaka ny tanàna izy ka tsy mbola lasan-davitra, dia hoy Josefa tamin’ny mpikarakara ny tao an-tranony: Andeha araho ireny lehilahy ireny; ary rehefa tratrao izy, dia ataovy aminy hoe: Nahoana hianareo namaly ratsy ny soa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy iny va no fisotroan’ny tompoko sy famantarany zavatra?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanaovany sikidy.
    marker-yv: yv-n
  - type: text
    text: ' ratsy izao nataonareo izao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nahatratra azy ralehilahy ka nilaza izany teny izany taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy izy ireo taminy: Nahoana itompokolahy no dia miteny toy izany? sanatria amin’ny mpanomponao ny hanao zavatra toy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Indro fa ny vola izay hitanay teo am-bavan’ny lasakanay aza naverinay indray tatỳ aminao avy tany amin’ny tany Kanana; ka hataonay ahoana no fangalatra vola-fotsy na volamena ao amin’ny tranon’ny tomponao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay anankiray amin’ny mpanomponao hahitana izany, dia aoka hovonoina izy, ary izahay kosa dia ho andevon’itompokolahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy: Aoka ary hatao araka ny teninareo: izay hahitana izany dia ho andevoko; fa hianareo tsy hanan-tsiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary samy nampidina faingana ny lasakany tamin’ny tany izy, ka samy nanokatra ny lasakany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nikaroka fatratra ralehilahy, ka tamin’ny lahimatoa no nanombohany, ary tamin’ny faralahy no niafarany, ka tao amin’ny lasakan’i Benjamina no nahitana ilay kapoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary samy nandriatra ny fitafiany izy, dia nanaingina ny entany tamin’ny borikiny avy ka niverina ho any an-tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Joda sy ny rahalahiny niditra tao an-tranon’i Josefa (fa mbola tao izy), dia nidaboka tamin’ny tany teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Josefa taminy: Ahoana izao zavatra nataonareo izao? tsy fantatrareo va fa izay lehilahy tahaka ahy dia mahay mamantatra zavatra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manao sikidy.
    marker-yv: yv-n
  - type: text
    text: ' tokoa?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy Joda: Inona no teny hataonay amin’itompokolahy? inona intsony no holazainay? ary hataonay ahoana no fiala tsiny? Andriamanitra efa nahita ny heloky ny mpanomponao; koa, indreto, samy ho andevon’itompokolahy, na izahay, na ilay nahitana ny kapoaka tao aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa hoy Josefa: Sanatria ahy ny hanao izany! izay lehilahy nahitana ny kapoaka tao aminy ihany no ho andevoko; fa hianareo kosa dia miakara soa aman-tsara ho any amin’ny rainareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nanatona azy Joda ka nanao hoe: Mba henoy kely aho, tompokolahy, aoka ny mpanomponao handaha-teny kely eto anatrehan’itompokolahy, ary aoka tsy mba hirehitra amin’ny mpanomponao ny fahatezeranao; fa tahaka an’i Farao hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Itompokolahy nanontany ny mpanompony hoe: Manan-dray na rahalahy koa va hianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy izahay tamin’itompokolahy: Manan-dray lahy antitra izahay sy zandry faralahy, zanaky ny fahanterany; ary maty ny rahalahiny, fa izy irery ihany no zana-dreniny sisa, ary tian’ny rainy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hianao nanao tamin’ny mpanomponao hoe: Ento mankatỳ amiko izy mba ho hitan’ny masoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy izahay tamin’itompokolahy: Ny zazalahy tsy mahazo misaraka amin-drainy; fa raha misaraka amin-drainy izy, dia ho faty rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy hianao tamin’ny mpanomponao: Raha tsy hiara-midina aminareo ny zandrinareo faralahy, dia tsy hahita ny tavako intsony hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa tafakatra tany amin’ny mpanomponao raiko izahay, dia nambaranay azy ny tenin’itompokolahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy ny rainay: Mandehana indray, mividia hanina kely ho antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy izahay: Tsy sahy hidina izahay; nefa raha hiaraka aminay ny zandrinay faralahy, dia hidina ihany izahay; fa tsy mahazo mahita ny tavan-dralehilahy izahay, raha tsy miaraka aminay ny zandrinay faralahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy ny mpanomponao raiko taminay: Fantatrareo fa ny vadiko efa niteraka roa lahy tamiko; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fa lasa niala tamiko ny anankiray, ka hoy izaho: Voaviraviram-biby tokoa izy; ary tsy mbola hitako mandraka ankehitriny izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ary raha halainareo hiala eto anoloako koa ity, ka hisy loza hanjo azy koa, dia hampidininareo any amin’ny fiainantsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' amim-pahoriana ny volo fotsiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa ankehitriny, raha tonga any amin’ny mpanomponao raiko aho, ka tsy tafaraka aminay ny zaza (fa ny ainy mifamatotra amin’ny ain’ny zaza), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: koa raha hitany fa tsy eo ny zaza, dia ho faty izy; ary ny mpanomponao hampidina ny volo fotsin’ny mpanomponao rainay ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' amin’alahelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa ny mpanomponao efa niantoka ny zaza tamin’ny raiko ka nanao hoe: Raha tsy ho entiko atỳ aminao izy, dia ho meloka amin’ny raiko amin’ny andro rehetra hiainako aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa ankehitriny, trarantitra hianao, aoka ny mpanomponao hitoetra ho andevon’itompokolahy hisolo ny zaza; fa aoka ny zaza hiara-miakatra amin’ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa hataoko ahoana no fiakatra any amin’ny raiko, raha tsy hiaraka amiko ny zaza? fandrao hahita izay loza hanjo ny raiko aho.
