document_id: GEN.44,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampahafantaran’i Josefa ny rahalahiny fa izy no Josefa, sy ny nanirahany haka ny rainy.
  - type: text
    content: 'Ary Josefa nanome teny ny mpikarakara ny tao an-tranony ka nanao hoe: Fenoy hanina ny lasakan’ireo lehilahy ireo, araka izay zakany ho entina, ary ataovy eo am-bavan’ny lasakany avy ny volan’ny isan-dahy; '
  '10':
  - type: text
    content: 'Dia hoy izy: Aoka ary hatao araka ny teninareo: izay hahitana izany dia ho andevoko; fa hianareo tsy hanan-tsiny.'
  '11':
  - type: text
    content: 'Ary samy nampidina faingana ny lasakany tamin’ny tany izy, ka samy nanokatra ny lasakany avy. '
  '12':
  - type: text
    content: Dia nikaroka fatratra ralehilahy, ka tamin’ny lahimatoa no nanombohany, ary tamin’ny faralahy no niafarany, ka tao amin’ny lasakan’i Benjamina no nahitana ilay kapoaka.
  '13':
  - type: text
    content: 'Ary samy nandriatra ny fitafiany izy, dia nanaingina ny entany tamin’ny borikiny avy ka niverina ho any an-tanàna. '
  '14':
  - type: text
    content: 'Ary Joda sy ny rahalahiny niditra tao an-tranon’i Josefa (fa mbola tao izy), dia nidaboka tamin’ny tany teo anatrehany. '
  '15':
  - type: text
    content: 'Ary hoy Josefa taminy: Ahoana izao zavatra nataonareo izao? tsy fantatrareo va fa izay lehilahy tahaka ahy dia mahay mamantatra zavatra'
  - type: note
    content: 'Na: manao sikidy.'
  - type: text
    content: ' tokoa?'
  '16':
  - type: text
    content: 'Ary hoy Joda: Inona no teny hataonay amin’itompokolahy? inona intsony no holazainay? ary hataonay ahoana no fiala tsiny? Andriamanitra efa nahita ny heloky ny mpanomponao; koa, indreto, samy ho andevon’itompokolahy, na izahay, na ilay nahitana ny kapoaka tao aminy.'
  '17':
  - type: text
    content: 'Nefa hoy Josefa: Sanatria ahy ny hanao izany! izay lehilahy nahitana ny kapoaka tao aminy ihany no ho andevoko; fa hianareo kosa dia miakara soa aman-tsara ho any amin’ny rainareo.'
  '18':
  - type: text
    content: 'Dia nanatona azy Joda ka nanao hoe: Mba henoy kely aho, tompokolahy, aoka ny mpanomponao handaha-teny kely eto anatrehan’itompokolahy, ary aoka tsy mba hirehitra amin’ny mpanomponao ny fahatezeranao; fa tahaka an’i Farao hianao. '
  '19':
  - type: text
    content: 'Itompokolahy nanontany ny mpanompony hoe: Manan-dray na rahalahy koa va hianareo? '
  '2':
  - type: text
    content: ary ny kapoakako, dia ilay kapoaka volafotsy, ataovy eo am-bavan’ny lasakan’ilay faralahy mbamin’ny vola hamidiny vary. Dia nataony araka ny teny izay nolazain’i Josefa.
  '20':
  - type: text
    content: 'Ary hoy izahay tamin’itompokolahy: Manan-dray lahy antitra izahay sy zandry faralahy, zanaky ny fahanterany; ary maty ny rahalahiny, fa izy irery ihany no zana-dreniny sisa, ary tian’ny rainy izy. '
  '21':
  - type: text
    content: 'Ary hianao nanao tamin’ny mpanomponao hoe: Ento mankatỳ amiko izy mba ho hitan’ny masoko. '
  '22':
  - type: text
    content: 'Ary hoy izahay tamin’itompokolahy: Ny zazalahy tsy mahazo misaraka amin-drainy; fa raha misaraka amin-drainy izy, dia ho faty rainy. '
  '23':
  - type: text
    content: 'Ary hoy hianao tamin’ny mpanomponao: Raha tsy hiara-midina aminareo ny zandrinareo faralahy, dia tsy hahita ny tavako intsony hianareo. '
  '24':
  - type: text
    content: 'Ary rehefa tafakatra tany amin’ny mpanomponao raiko izahay, dia nambaranay azy ny tenin’itompokolahy. '
  '25':
  - type: text
    content: 'Dia hoy ny rainay: Mandehana indray, mividia hanina kely ho antsika. '
  '26':
  - type: text
    content: 'Ary hoy izahay: Tsy sahy hidina izahay; nefa raha hiaraka aminay ny zandrinay faralahy, dia hidina ihany izahay; fa tsy mahazo mahita ny tavan-dralehilahy izahay, raha tsy miaraka aminay ny zandrinay faralahy. '
  '27':
  - type: text
    content: 'Dia hoy ny mpanomponao raiko taminay: Fantatrareo fa ny vadiko efa niteraka roa lahy tamiko; '
  '28':
  - type: text
    content: 'fa lasa niala tamiko ny anankiray, ka hoy izaho: Voaviraviram-biby tokoa izy; ary tsy mbola hitako mandraka ankehitriny izy; '
  '29':
  - type: text
    content: ary raha halainareo hiala eto anoloako koa ity, ka hisy loza hanjo azy koa, dia hampidininareo any amin’ny fiainantsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' amim-pahoriana ny volo fotsiko. '
  '3':
  - type: text
    content: 'Ary raha vao nazava ny andro, dia nampandehanina ireo lehilahy ireo, dia izy sy ny borikiny. '
  '30':
  - type: text
    content: 'Koa ankehitriny, raha tonga any amin’ny mpanomponao raiko aho, ka tsy tafaraka aminay ny zaza (fa ny ainy mifamatotra amin’ny ain’ny zaza), '
  '31':
  - type: text
    content: koa raha hitany fa tsy eo ny zaza, dia ho faty izy; ary ny mpanomponao hampidina ny volo fotsin’ny mpanomponao rainay ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' amin’alahelo. '
  '32':
  - type: text
    content: 'Fa ny mpanomponao efa niantoka ny zaza tamin’ny raiko ka nanao hoe: Raha tsy ho entiko atỳ aminao izy, dia ho meloka amin’ny raiko amin’ny andro rehetra hiainako aho. '
  '33':
  - type: text
    content: 'Koa ankehitriny, trarantitra hianao, aoka ny mpanomponao hitoetra ho andevon’itompokolahy hisolo ny zaza; fa aoka ny zaza hiara-miakatra amin’ny rahalahiny. '
  '34':
  - type: text
    content: Fa hataoko ahoana no fiakatra any amin’ny raiko, raha tsy hiaraka amiko ny zaza? fandrao hahita izay loza hanjo ny raiko aho.
  '4':
  - type: text
    content: 'Ary rehefa tafavoaka ny tanàna izy ka tsy mbola lasan-davitra, dia hoy Josefa tamin’ny mpikarakara ny tao an-tranony: Andeha araho ireny lehilahy ireny; ary rehefa tratrao izy, dia ataovy aminy hoe: Nahoana hianareo namaly ratsy ny soa? '
  '5':
  - type: text
    content: Tsy iny va no fisotroan’ny tompoko sy famantarany zavatra?
  - type: note
    content: 'Na: fanaovany sikidy.'
  - type: text
    content: ' ratsy izao nataonareo izao.'
  '6':
  - type: text
    content: 'Dia nahatratra azy ralehilahy ka nilaza izany teny izany taminy. '
  '7':
  - type: text
    content: 'Ary hoy izy ireo taminy: Nahoana itompokolahy no dia miteny toy izany? sanatria amin’ny mpanomponao ny hanao zavatra toy izany. '
  '8':
  - type: text
    content: 'Indro fa ny vola izay hitanay teo am-bavan’ny lasakanay aza naverinay indray tatỳ aminao avy tany amin’ny tany Kanana; ka hataonay ahoana no fangalatra vola-fotsy na volamena ao amin’ny tranon’ny tomponao? '
  '9':
  - type: text
    content: Izay anankiray amin’ny mpanomponao hahitana izany, dia aoka hovonoina izy, ary izahay kosa dia ho andevon’itompokolahy.
