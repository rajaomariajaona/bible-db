document_id: PRO.14,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ny vehivavy hendry
  - type: note
    content: Heb. fahendren’ny vehivavy.
  - type: text
    content: ' dia samy manao ny tranony;'
  - type: text
    content: Fa ny adala
  - type: note
    content: Heb. fahadalana.
  - type: text
    content: ' kosa mandrava ny tranony amin’ny tànany.'
  '10':
  - type: text
    content: Ny fo no mahalala ny fangidian’ny alahelony;
  - type: text
    content: Ary tsy raharahan’ny olon-kafa ny hafaliany.
  '11':
  - type: text
    content: Ravana ny tranon’ny ratsy fanahy;
  - type: text
    content: Fa ambinina ny lain’ny marina.
  '12':
  - type: text
    content: Misy làlana ataon’ny olona ho mahitsy,
  - type: text
    content: Kanjo làlana mivarina any amin’ny fahafatesana no iafarany.
  '13':
  - type: text
    content: Na dia mihomehy aza, dia ory ihany ny fo,
  - type: text
    content: Ary ny faran’ny hafaliana dia alahelo.
  '14':
  - type: text
    content: Ny mihemotra am-po dia ho voky ny alehany;
  - type: text
    content: Fa ny tsara fanahy kosa ho voky ny azy ihany.
  '15':
  - type: text
    content: Ny kely saina mino ny teny rehetra;
  - type: text
    content: Fa ny mahira-tsaina mandinika ny diany.
  '16':
  - type: text
    content: Ny hendry matahotra ka mivily tsy ho amin’ny ratsy;
  - type: text
    content: Fa ny adala fatra-pirehareha
  - type: note
    content: 'Na: misafoaka.'
  - type: text
    content: ' ka matokitoky foana.'
  '17':
  - type: text
    content: Izay malaky tezitra dia manao adaladala;
  - type: text
    content: Ary ny olona mamoron-tsain-dratsy dia ankahalaina.
  '18':
  - type: text
    content: Ny kely saina dia handova fahadalana;
  - type: text
    content: Fa ny mahira-tsaina mahazo ny fahalalana ho satroboninahiny.
  - type: note
    content: 'Na: mandray fahalalana.'
  '19':
  - type: text
    content: Ny ratsy fanahy miondrika eo anatrehan’ny tsara fanahy,
  - type: text
    content: Ary ny meloka dia eo am-bavahadin’ny marina.
  '2':
  - type: text
    content: Mandeha mahitsy izay matahotra an’i Jehovah;
  - type: text
    content: Fa mivily làlana kosa izay maniratsira Azy.
  '20':
  - type: text
    content: Ny malahelo dia halan’ny havany aza;
  - type: text
    content: Fa ny manan-karena no tian’ny maro.
  '21':
  - type: text
    content: Izay manao tsinontsinona ny namany dia manota;
  - type: text
    content: Fa endrey ny fahasambaran’izay mamindra fo amin’ny ory!
  '22':
  - type: text
    content: Tsy mivily va izay manao asa
  - type: note
    content: 'Na: misaina ny.'
  - type: text
    content: ' ratsy?'
  - type: text
    content: Fa famindrampo sy fahamarinana no ho an’izay manao asa
  - type: note
    content: 'Na: misaina ny.'
  - type: text
    content: ' tsara.'
  '23':
  - type: text
    content: Ny fisasarana rehetra misy valiny avokoa;
  - type: text
    content: Fa ny molotra mibedibedy foana tsy mba ahazoana na inona na inona.
  '24':
  - type: text
    content: Satroboninahitry ny hendry ny hareny;
  - type: text
    content: Fa ny fahadalan’ny adala dia fahadalana ihany.
  '25':
  - type: text
    content: Ny vavolombelona marina mamonjy ain’olona;
  - type: text
    content: Fa izay mamoaka lainga dia tena fitaka.
  '26':
  - type: text
    content: Ny fahatahorana an’i Jehovah dia fiarovana mahatoky,
  - type: text
    content: Ary ny zanany hahazo fialofana.
  '27':
  - type: text
    content: Ny fahatahorana an’i Jehovah no loharanon’aina,
  - type: text
    content: Hanalavirana ny fandriky ny fahafatesana.
  '28':
  - type: text
    content: Ny fahabetsahan’ny vahoaka no voninahitry ny mpanjaka;
  - type: text
    content: Fa ny havitsiany kosa no fietreny.
  '29':
  - type: text
    content: Be saina izay mahatsindry fo;
  - type: text
    content: Fa ny malaky tezitra mampiseho ny fahadalany.
  '3':
  - type: text
    content: Eo am-bavan’ny adala misy tsorakazon’ny fiavonavonana;
  - type: text
    content: Fa ny molotry ny hendry miaro ny tenany.
  '30':
  - type: text
    content: Ny fo mionona no fiainan’ny nofo;
  - type: text
    content: Fa ny fahamaimaizan-tsaina dia mahalo ny taolana.
  '31':
  - type: text
    content: Izay mampahory ny mahantra dia manala baraka ny Mpanao azy;
  - type: text
    content: Fa ny mamindra fo aminy kosa dia manome voninahitra Azy.
  '32':
  - type: text
    content: Ny ratsy fanahy azera
  - type: note
    content: 'Na: roahina.'
  - type: text
    content: ' noho ny haratsiany;'
  - type: text
    content: Fa ny marina matoky, na dia mby ao amin’ny fahafatesana aza.
  '33':
  - type: text
    content: Mandry tsara ao am-pon’ny manan-tsaina ny fahendrena;
  - type: text
    content: Fa ny an’ny adala kosa dia miharihary.
  '34':
  - type: text
    content: Ny fahamarinana manandratra ny firenena;
  - type: text
    content: Fa ny ota kosa dia fahafaham-baraka amin’ny olona.
  '35':
  - type: text
    content: Ny fankasitrahan’ny mpanjaka dia amin’ny mpanompo hendry;
  - type: text
    content: Fa ny fahatezerany kosa amin’ny manao izay mahamenatra.
  '4':
  - type: text
    content: Raha tsy misy omby, dia foana
  - type: note
    content: Heb. madio.
  - type: text
    content: ' ny fihinanam-bilona;'
  - type: text
    content: Fa be ny fitomboan-karena azo amin’ny herin’ny omby.
  '5':
  - type: text
    content: Ny vavolombelona mahatoky tsy mba mety mandainga;
  - type: text
    content: Fa mamoaka lainga kosa ny vavolombelona tsy mahatoky.
  '6':
  - type: text
    content: Ny mpaniratsira mba mitady fahendrena, fa tsy mahita;
  - type: text
    content: Fa ny manan-tsaina mora mahazo fahalalana.
  '7':
  - type: text
    content: Mialà eo anatrehan’ny olona adala,
  - type: text
    content: 'Fa tsy ho hitanao '
  - type: text
    content: aminy
  - type: text
    content: ' ny molotry ny fahalalana.'
  '8':
  - type: text
    content: Ny mitandrina ny alehany no fahendren’ny mahira-tsaina;
  - type: text
    content: Fa fitaka ny hadalan’ny adala.
  '9':
  - type: text
    content: Ny adala ihomehezan’ny fanati-panonerana;
  - type: note
    content: 'Na: Ihomehezan’ny adala ny heloka.'
  - type: text
    content: Fa ao amin’ny marina no misy fankasitrahana.
