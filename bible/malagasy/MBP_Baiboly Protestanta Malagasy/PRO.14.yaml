document_id: PRO.14,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny vehivavy hendry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahendren’ny vehivavy.
      marker-yv: yv-n
    - type: text
      text: ' dia samy manao ny tranony;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny adala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahadalana.
      marker-yv: yv-n
    - type: text
      text: ' kosa mandrava ny tranony amin’ny tànany.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny fo no mahalala ny fangidian’ny alahelony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy raharahan’ny olon-kafa ny hafaliany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ravana ny tranon’ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ambinina ny lain’ny marina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Misy làlana ataon’ny olona ho mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo làlana mivarina any amin’ny fahafatesana no iafarany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Na dia mihomehy aza, dia ory ihany ny fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny faran’ny hafaliana dia alahelo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny mihemotra am-po dia ho voky ny alehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tsara fanahy kosa ho voky ny azy ihany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny kely saina mino ny teny rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mahira-tsaina mandinika ny diany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny hendry matahotra ka mivily tsy ho amin’ny ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny adala fatra-pirehareha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misafoaka.
      marker-yv: yv-n
    - type: text
      text: ' ka matokitoky foana.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izay malaky tezitra dia manao adaladala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olona mamoron-tsain-dratsy dia ankahalaina.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny kely saina dia handova fahadalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mahira-tsaina mahazo ny fahalalana ho satroboninahiny.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mandray fahalalana.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny ratsy fanahy miondrika eo anatrehan’ny tsara fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny meloka dia eo am-bavahadin’ny marina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mandeha mahitsy izay matahotra an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mivily làlana kosa izay maniratsira Azy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny malahelo dia halan’ny havany aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny manan-karena no tian’ny maro.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izay manao tsinontsinona ny namany dia manota;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa endrey ny fahasambaran’izay mamindra fo amin’ny ory!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy mivily va izay manao asa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misaina ny.
      marker-yv: yv-n
    - type: text
      text: ' ratsy?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa famindrampo sy fahamarinana no ho an’izay manao asa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misaina ny.
      marker-yv: yv-n
    - type: text
      text: ' tsara.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny fisasarana rehetra misy valiny avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny molotra mibedibedy foana tsy mba ahazoana na inona na inona.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Satroboninahitry ny hendry ny hareny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahadalan’ny adala dia fahadalana ihany.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny vavolombelona marina mamonjy ain’olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay mamoaka lainga dia tena fitaka.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny fahatahorana an’i Jehovah dia fiarovana mahatoky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zanany hahazo fialofana.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny fahatahorana an’i Jehovah no loharanon’aina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanalavirana ny fandriky ny fahafatesana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny fahabetsahan’ny vahoaka no voninahitry ny mpanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny havitsiany kosa no fietreny.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Be saina izay mahatsindry fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny malaky tezitra mampiseho ny fahadalany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eo am-bavan’ny adala misy tsorakazon’ny fiavonavonana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny molotry ny hendry miaro ny tenany.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ny fo mionona no fiainan’ny nofo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahamaimaizan-tsaina dia mahalo ny taolana.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Izay mampahory ny mahantra dia manala baraka ny Mpanao azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mamindra fo aminy kosa dia manome voninahitra Azy.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ny ratsy fanahy azera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: roahina.
      marker-yv: yv-n
    - type: text
      text: ' noho ny haratsiany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny marina matoky, na dia mby ao amin’ny fahafatesana aza.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Mandry tsara ao am-pon’ny manan-tsaina ny fahendrena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny an’ny adala kosa dia miharihary.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ny fahamarinana manandratra ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny ota kosa dia fahafaham-baraka amin’ny olona.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ny fankasitrahan’ny mpanjaka dia amin’ny mpanompo hendry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahatezerany kosa amin’ny manao izay mahamenatra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Raha tsy misy omby, dia foana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: madio.
      marker-yv: yv-n
    - type: text
      text: ' ny fihinanam-bilona;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa be ny fitomboan-karena azo amin’ny herin’ny omby.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny vavolombelona mahatoky tsy mba mety mandainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mamoaka lainga kosa ny vavolombelona tsy mahatoky.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny mpaniratsira mba mitady fahendrena, fa tsy mahita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny manan-tsaina mora mahazo fahalalana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mialà eo anatrehan’ny olona adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa tsy ho hitanao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aminy
    - type: text
      text: ' ny molotry ny fahalalana.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny mitandrina ny alehany no fahendren’ny mahira-tsaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fitaka ny hadalan’ny adala.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny adala ihomehezan’ny fanati-panonerana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ihomehezan’ny adala ny heloka.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ao amin’ny marina no misy fankasitrahana.
