document_id: 2CO.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy maintsy mirehareha aho, na dia tsy mahasoa aza izany; fa handroso hilaza fahitana sy fanambaran’ny Tompo aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa dia finaritra aho amin’ny fahalemena, amin’ny fampahoriana, amin’ny fahaterena, amin’ny fanenjehana, amin’ny fahantrana, noho ny amin’i Kristy; fa ny fahalemeko no fahatanjahako.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa tonga adala aho; hianareo no nahatery ahy; fa tokony hoderainareo aho, satria tsy latsaka noho ireo Apostoly ambony indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fatratra loatra.
      marker-yv: yv-n
    - type: text
      text: ' ireo, na dia tsinontsinona aza aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny famantarana mah’Apostoly ahy dia natao teo aminareo tokoa tamin’ny faharetana rehetra, tamin’ny famantarana sy ny fahagagana ary tamin’ny asa lehibe. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa inona moa no nahalatsaka anareo noho ny fiangonana sasany, afa-tsy ny tsy namakiako tratra anareo? Mamelà ahy ary amin’izany fahadisoana izany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, efa fanintelony izao no vonona hankatỳ aminareo aho, nefa tsy hahavaky tratra anareo; fa tsy ny fanananareo no tadiaviko, fa hianareo; fa tsy ny zanaka no tokony hihary ho an’ny ray aman-dreniny, fa ny ray aman-dreniny no tokony hihary ho an’ny zanany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izaho dia faly indrindra handany sy holanina hahasoa ny fanahinareo, na dia araka ny fitombon’ny fitiavako anareo aza no fihenan’ny fitiavanareo ahy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa, na dia izany aza, izaho tsy nahavaky tratra anareo, fa nanao saina, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hono,
    - type: text
      text: ' aho, dia nahazo anareo tamin’ny fihendrena. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa izay nirahiko tany aminareo va nisy nanaovako anareo ho vola aman-karena? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nangataka an’i Titosy aho, sady nirahiko nomba azy ilay rahalahy. Moa Titosy va nanao anareo ho vola aman-karena? Tsy fanahy iray ihany va no nandehananay? Tsy iray ihany va no dianay?
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa ela izay no nanaovanareo anay ho miala tsiny aminareo. Eo anatrehan’Andriamanitra no itenenanay ao amin’i Kristy; fa ny zavatra rehetra, ry malala, dia ho fampandrosoana anareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahalala olona anankiray ao amin’i Kristy aho, tokony ho efatra ambin’ny folo taona lasa izay–na tao amin’ny tena, na tsy tao amin’ny tena, tsy fantatro, Andriamanitra no mahalala– ilay anankiray dia nakarina ho any amin’ny lanitra fahatelo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa matahotra aho, fandrao, rehefa tonga aho, dia hahita anareo ho toy izay tsy tiako, ary ho hitanareo aho ho toy izay tsy tianareo; fandrao hisy fifandirana, fialonana, fiafonafonana, fifampiandaniana, fanaratsiana, fibitsibitsihana, fieboeboana, fikotranana,– '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: eny, fandrao, rehefa tonga indray aho, dia hampietry ahy eo anatrehanareo Andriamanitro, ary izaho hanana alahelo amin’ny maro izay nanota teo aloha ka tsy mbola nibebaka tamin’ny fahalotoana sy ny fijangajangana ary ny fijejojejoana nataony.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mahalala ilay olona anankiray aho–na tao amin’ny tena, na tsy tao amin’ny tena, tsy fantatro, Andriamanitra no mahalala– '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nakarina ho any Paradisa izy ka nandre teny tsy azo tenenina sady tsy tokony holazain’olona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay anankiray no hataoko rehareha; fa ny amin’ny tenako dia tsy hirehareha aho afa-tsy amin’ny fahalemena ihany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na dia te-hirehareha aza aho, dia tsy ho adala, fa hilaza ny marina; nefa tsy manao izany aho, fandrao misy olona mihevitra ahy ho mihoatra noho izay ahitany ahy na izay andrenesany ny teniko.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary fandrao hirehareha noho ny habetsaky ny fanambarana aho, dia nasiana tsilo tamin’ny nofo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: notsatohana hazo maranitra ny nofoko.
      marker-yv: yv-n
    - type: text
      text: ' dia irak’i Satana hamely ahy, fandrao hirehareha aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no nangatahako intelo tamin’ny Tompo, mba hialan’izany amiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy Izy tamiko: Ampy ho anao ny fahasoavako; fa ny heriko dia tanterahina amin’ny fahalemena. Koa mainka sitrako ny hirehareha amin’ny fahalemeko, mba hitoeran’ny herin’i Kristy amiko. '
