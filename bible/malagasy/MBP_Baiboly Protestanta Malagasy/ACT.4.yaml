document_id: ACT.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namatorana an’i Petera sy Jaona, sy ny nataon’ny Synedriona taminy.
  - type: text
    content: 'ARY raha mbola niteny tamin’ny vahoaka izy, dia, indreo, tonga teo aminy ny mpisorona sy ny lehiben’ny mpiambina ny tempoly ary ny Sadoseo; '
  '10':
  - type: text
    content: 'dia aoka ho fantatrareo rehetra sy ny olona Isiraely rehetra fa ny anaran’i Jesosy Kristy avy any Nazareta, Izay nohomboanareo tamin’ny hazofijaliana, fa natsangan’Andriamanitra tamin’ny maty kosa, dia Izy no itsanganan’io lehilahy io finaritra eto imasonareo. '
  '11':
  - type: text
    content: ',,Ity no vato izay nolavinareo mpanao trano, nefa tonga fehizoro’’ (Sal. 118.22). '
  '12':
  - type: text
    content: Ary tsy misy famonjena amin’ny hafa; fa tsy misy anarana hafa ambanin’ny lanitra nomena ny olona izay hahazoantsika famonjena.
  '13':
  - type: text
    content: 'Ary nony nahita ny fahasahisahian’i Petera sy Jaona izy, sady nahalala fa tsy mba mpahay lalàna na nampianarina izy roa lahy, dia gaga izy; ary fantany tsara fa efa niaraka tamin’i Jesosy izy roa lahy. '
  '14':
  - type: text
    content: 'Ary nony nijery ny lehilahy izay efa sitrana nitsangana teo aminy izy, dia tsy hitany izay havaliny. '
  '15':
  - type: text
    content: 'Ary rehefa nasainy niala teo amin’ny Synedriona izy roa lahy, dia niara-nisaina izy '
  '16':
  - type: text
    content: 'ka nanao hoe: Hataontsika ahoana ireo lehilahy ireo? fa efa nanao famantarana malaza tokoa izy, ary fantatry ny mponina rehetra eto Jerosalema izany, ka tsy azontsika lavina. '
  '17':
  - type: text
    content: Fa mba tsy hielezan’izany intsony amin’ny vahoaka, dia aoka horahonantsika izy mba tsy hiteny amin’izany anarana izany intsony na amin’iza na amin’iza.
  '18':
  - type: text
    content: 'Ary niantso azy izy ka nandrara azy tsy hiteny na hampianatra amin’ny anaran’i Jesosy intsony. '
  '19':
  - type: text
    content: 'Fa Petera sy Jaona kosa namaly azy ka nanao hoe: Tsaraonareo na marina eo imason’Andriamanitra, na tsia, ny hanaiky anareo mihoatra noho Andriamanitra. '
  '2':
  - type: text
    content: 'fa sosotra izy noho ny nampianaran’ny Apostoly ny vahoaka sy ny nitoriany tamin’ny alalan’i Jesosy ny fitsanganana amin’ny maty. '
  '20':
  - type: text
    content: Fa izahay tsy maintsy milaza izay zavatra efa hitanay sy renay.
  '21':
  - type: text
    content: 'Ary rehefa norahonany indray izy, dia nalefany; fa tsy hitany izay hampijaliany azy noho ny tahony ny vahoaka; satria izy rehetra nankalaza an’Andriamanitra noho ny amin’ny zavatra efa natao. '
  '22':
  - type: text
    content: Fa efa tsy omby efa-polo taona ralehilahy izay nanaovana izany famantarana nahasitrana azy izany.
  '23':
  - type: text
    content: 'Ary rehefa nalefa izy roa lahy, dia tonga teo amin’ny namany ka nanambara izay rehetra nolazain’ny lohan’ny mpisorona sy ny loholona taminy. '
  '24':
  - type: text
    content: 'Fa rehefa nandre izany izy ireo, dia niara-nanandratra ny feony ho amin’Andriamanitra ka nanao hoe: Tompo ô, Hianao no nanao ny lanitra sy ny tany ary ny ranomasina mbamin’izay rehetra ao anatiny, '
  '25':
  - type: text
    content: 'ary ny Fanahy Masina no nampitenenanao an’i Davida razanay sady mpanomponao hoe:'
  - type: text
    content: ',,Nahoana no mitabataba ny jentilisa,'
  - type: text
    content: Ary misaina anoano foana ny firenena?
  '26':
  - type: text
    content: Ireo mpanjakan’ny tany nitsangana,
  - type: text
    content: Ary ny mpanapaka niangona
  - type: text
    content: Hanohitra an’i Jehovah sy ny Mesiany’’ (Sal. 2.1, 2).
  '27':
  - type: text
    content: Fa efa niangona marina tokoa teto amin’ity tanàna ity Heroda sy Pontio Pilato mbamin’ny jentilisa sy ny olona Isiraely hanohitra ny Mpanomponao
  - type: note
    content: 'Na: ny Zanakao.'
  - type: text
    content: ' Masina, dia Jesosy Izay nohosoranao, '
  '28':
  - type: text
    content: 'mba hanao izay notendren’ny tànanao aman-tsainao rahareo hatao. '
  '29':
  - type: text
    content: 'Koa ankehitriny, Tompo ô, jereo ny fandrahonany; ary omeo anay mpanomponao ny mba hitory ny teninao amin’ny fahasahiana rehetra, '
  '3':
  - type: text
    content: Dia nisambotra azy izy ka nanao azy tao an-trano-maizina ambara-pahamarain’ny andro; fa efa hariva ny andro tamin’izay.
  '30':
  - type: text
    content: omban’ny aninjiranao ny tànanao hahasitrana sy ny anaovana famantarana sy fahagagana amin’ny anaran’i Jesosy, Mpanomponao
  - type: note
    content: 'Na: Zanakao.'
  - type: text
    content: ' Masina.'
  '31':
  - type: text
    content: Ary rehefa nivavaka izy, dia nihovitrovitra ny trano izay niangonany; dia feno ny Fanahy Masina izy rehetra ka nitory ny tenin’Andriamanitra tamin’ny fahasahiana.
  - type: heading
    content: Ny nifankatiavan’ny mpianatra sy ny fahazotoany.
  '32':
  - type: text
    content: 'ARY niray fo sy fanahy ny olona rehetra izay nino; ary tsy nisy nanonona ny fananany ho azy na dia iray aza, fa niombonany avokoa ny zavatra rehetra nananany. '
  '33':
  - type: text
    content: 'Ary tamin’ny hery be no nanambaran’ny Apostoly ny nitsanganan’i Jesosy Tompo; ary fahasoavana be no tao amin’izy rehetra. '
  '34':
  - type: text
    content: 'Fa tsy nisy olona nalahelo teo aminy; fa izay nanana tany na trano, raha nivarotra izany, dia nitondra ny vola vidin’ny zavatra lafo, '
  '35':
  - type: text
    content: ka napetrany teo anoloan’ny tongotry ny Apostoly, dia nozaraina tamin’izy rehetra araka izay nilainy avy.
  '36':
  - type: text
    content: 'Ary Josefa, izay nataon’ny Apostoly hoe koa Barnabasy (izany hoe, raha adika, Zanaky ny fananarana), Levita, avy any Kyprosy no firazanany, '
  '37':
  - type: text
    content: dia nivarotra ny sahany, ary nentiny ny vola vidiny ka napetrany teo anoloan’ny tongotry ny Apostoly.
  '4':
  - type: text
    content: Kanefa maro tamin’izay nandre ny teny no nino, ka dia tonga tokony ho dimy arivo no isan’ny lehilahy.
  '5':
  - type: text
    content: 'Ary nony maraina ny andro, dia niangona tany Jerosalema ny mpanapaka sy ny loholona sy ny mpanora-dalàna '
  '6':
  - type: text
    content: 'sy Anasy mpisoronabe sy Kaiafa sy Jaona sy Aleksandro mbamin’izay rehetra mety ho havan’ny mpisoronabe. '
  '7':
  - type: text
    content: 'Ary rehefa nataony teo ampovoany izy roa lahy, dia nanontaniany hoe: Fahefana manao ahoana, na anarana manao ahoana, no nanaovanareo izany?'
  '8':
  - type: text
    content: 'Ary Petera, feno ny Fanahy Masina, dia nanao taminy hoe: Ry mpanapaka ny vahoaka sy loholona, '
  '9':
  - type: text
    content: 'raha adinina izahay anio ny amin’ny asa tsara natao tamin’ny nahasitranana ilay lehilahy malemy, '
