document_id: AMO.2
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahotana telon’i Moaba, eny, efatra aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy havelako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy hahemotro.
    marker-yv: yv-n
  - type: text
    text: ' izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nodorany ho sokay ny taolan’ny mpanjakan’i Edoma;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa haterako afo ao Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka handevona ny tranoben’i Kiriota izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Moaba ho faty amin’ny tabataba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny akora ary ny fanenon’ny anjomara;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary hofoanako tsy hisy mpitsara ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiaraka hovonoiko izy sy ireo mpanapaka rehetra ao aminy, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahotana telon’i Joda, eny, efatra aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy havelako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy hahemotro.
    marker-yv: yv-n
  - type: text
    text: ' izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nataony tsinontsinona ny lalàn’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny didiny tsy notandremany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nampahadiso azy ny laingany, izay fanaon’ny razany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa haterako afo ao Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka handevona ny tranoben’i Jerosalema izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahotana telon’Isiraely, eny, efatra aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy havelako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy hahemotro.
    marker-yv: yv-n
  - type: text
    text: ' izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria namidiny volafotsy ny olona marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy kapa iray lomisy ny malahelo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary mihanahana mitsiriritra ny vovo-tany eo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho eo.
    marker-yv: yv-n
  - type: text
    text: ' an-dohan’ny malahelo izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mamily ny alehan’ny mpandefitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary olona mianaka dia samy mandry amin’ny zazavavy iray ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba handoto ny anarako masina;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Amin’ny lamba azony tamin’ny tsatòka izy no mitsilailay eny anilan’ny alitara rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misotro divay novidina tamin’ny sazy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: divain’ny voasazy.
    marker-yv: yv-n
  - type: text
    text: ' ao an-tranon’ireo andriamaniny izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nefa Izaho no nandringana ny Amorita teo anoloany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia olona izay lava tsanganana toy ny hazo sedera
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy natanjaka toy ny ôka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nosimbako ny voany teny ambony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fakany tao ambany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary Izaho no nitondra anareo niakatra avy tany amin’ny tany Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nitari-dàlana anareo efa-polo taona tany an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba handovanareo ny tanin’ny Amorita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny zanakalahinareo nisy natsangako ho mpaminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zatovonareo ho Nazirita.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy izany va no izy, ry Zanak’Isiraely? hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kanjo nampisotroinareo divay ny Nazirita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny mpaminany noraranareo hoe: Aza maminany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, Izaho no hitambesatra aminareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izaho dia itambesaranareo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny fitambesatry ny sariety feno amboara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa tsy ho afa-mandositra ny faingam-pandeha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mahery tsy hampiseho hery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lehilahy mahery tsy hahavonjy ny ainy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay mitana tsipìka tsy hahajanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny faingan-tongotra tsy hahavonjy tena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mitaingin-tsoavaly tsy hahavonjy ny ainy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary na dia izay sahy ao amin’ny mahery aza
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handositra mitanjaka amin’izany andro izany, hoy Jehovah.
