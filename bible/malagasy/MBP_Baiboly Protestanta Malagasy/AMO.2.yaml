document_id: AMO.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny fahotana telon’i Moaba, eny, efatra aza,
  - type: text
    content: Dia tsy havelako
  - type: note
    content: Heb. tsy hahemotro.
  - type: text
    content: ' izy,'
  - type: text
    content: Satria nodorany ho sokay ny taolan’ny mpanjakan’i Edoma;
  '10':
  - type: text
    content: Ary Izaho no nitondra anareo niakatra avy tany amin’ny tany Egypta
  - type: text
    content: Sady nitari-dàlana anareo efa-polo taona tany an-efitra,
  - type: text
    content: Mba handovanareo ny tanin’ny Amorita,
  '11':
  - type: text
    content: Ary ny zanakalahinareo nisy natsangako ho mpaminany,
  - type: text
    content: Ary ny zatovonareo ho Nazirita.
  - type: text
    content: Tsy izany va no izy, ry Zanak’Isiraely? hoy Jehovah.
  '12':
  - type: text
    content: Kanjo nampisotroinareo divay ny Nazirita,
  - type: text
    content: 'Ary ny mpaminany noraranareo hoe: Aza maminany.'
  '13':
  - type: text
    content: Indro, Izaho no hitambesatra aminareo
  - type: note
    content: 'Na: Izaho dia itambesaranareo.'
  - type: text
    content: Toy ny fitambesatry ny sariety feno amboara.
  '14':
  - type: text
    content: Koa tsy ho afa-mandositra ny faingam-pandeha,
  - type: text
    content: Ny mahery tsy hampiseho hery,
  - type: text
    content: Ary ny lehilahy mahery tsy hahavonjy ny ainy;
  '15':
  - type: text
    content: Izay mitana tsipìka tsy hahajanona,
  - type: text
    content: Ary ny faingan-tongotra tsy hahavonjy tena,
  - type: text
    content: Izay mitaingin-tsoavaly tsy hahavonjy ny ainy;
  '16':
  - type: text
    content: Ary na dia izay sahy ao amin’ny mahery aza
  - type: text
    content: Dia handositra mitanjaka amin’izany andro izany, hoy Jehovah.
  '2':
  - type: text
    content: Fa haterako afo ao Moaba,
  - type: text
    content: Ka handevona ny tranoben’i Kiriota izany;
  - type: text
    content: Ary Moaba ho faty amin’ny tabataba
  - type: text
    content: Sy amin’ny akora ary ny fanenon’ny anjomara;
  '3':
  - type: text
    content: Ary hofoanako tsy hisy mpitsara ao aminy,
  - type: text
    content: Ary hiaraka hovonoiko izy sy ireo mpanapaka rehetra ao aminy, hoy Jehovah.
  '4':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny fahotana telon’i Joda, eny, efatra aza,
  - type: text
    content: Dia tsy havelako
  - type: note
    content: Heb. tsy hahemotro.
  - type: text
    content: ' izy,'
  - type: text
    content: Satria nataony tsinontsinona ny lalàn’i Jehovah,
  - type: text
    content: Ary ny didiny tsy notandremany,
  - type: text
    content: Ary nampahadiso azy ny laingany, izay fanaon’ny razany;
  '5':
  - type: text
    content: Fa haterako afo ao Joda,
  - type: text
    content: Ka handevona ny tranoben’i Jerosalema izany.
  '6':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny fahotana telon’Isiraely, eny, efatra aza,
  - type: text
    content: Dia tsy havelako
  - type: note
    content: Heb. tsy hahemotro.
  - type: text
    content: ' izy,'
  - type: text
    content: Satria namidiny volafotsy ny olona marina
  - type: text
    content: Sy kapa iray lomisy ny malahelo,
  '7':
  - type: text
    content: Ary mihanahana mitsiriritra ny vovo-tany eo
  - type: note
    content: 'Na: ho eo.'
  - type: text
    content: ' an-dohan’ny malahelo izy'
  - type: text
    content: Sady mamily ny alehan’ny mpandefitra;
  - type: text
    content: Ary olona mianaka dia samy mandry amin’ny zazavavy iray ihany
  - type: text
    content: Mba handoto ny anarako masina;
  '8':
  - type: text
    content: Amin’ny lamba azony tamin’ny tsatòka izy no mitsilailay eny anilan’ny alitara rehetra,
  - type: text
    content: Ary misotro divay novidina tamin’ny sazy
  - type: note
    content: Heb. divain’ny voasazy.
  - type: text
    content: ' ao an-tranon’ireo andriamaniny izy.'
  '9':
  - type: text
    content: Nefa Izaho no nandringana ny Amorita teo anoloany,
  - type: text
    content: Dia olona izay lava tsanganana toy ny hazo sedera
  - type: text
    content: Sy natanjaka toy ny ôka;
  - type: text
    content: Eny, nosimbako ny voany teny ambony
  - type: text
    content: Sy ny fakany tao ambany.
