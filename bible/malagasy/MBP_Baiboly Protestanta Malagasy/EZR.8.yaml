document_id: EZR.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny olona niaraka tamin’i Ezra, sy ny nankanesany ho any Jerosalema.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY izao no lohan’ny fianakaviana sy filazana ny firazanan’ny olona izay niara-niakatra tamiko avy tany Babylona tamin’ny nanjakan’i Artaksersesy mpanjaka:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ny zanak’i Josifia, avy tamin’ny taranak’i Selomita, mbamin’ny namany enim-polo amby zato lahy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Zakaria, zanak’i Bebay, avy tamin’ny taranak’i Bebay, mbamin’ny namany valo amby roa-polo lahy; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Johanana, zanak’i Hakatana, avy tamin’ny taranak’i Azgada, mbamin’ny namany folo amby zato lahy; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary ny avy tamin’ny taranak’i Adonikama, zandriny taoriana ireo, ary izao no anarany: Elifeleta sy Jeiela sy Semaia mbamin’ny namany enim-polo lahy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Otahy sy Zaboda, avy tamin’ny taranak’i Bigvay, mbamin’ny namany fito-polo lahy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary novoriko teo amoron’ny ony mankany Ahava izy, ka nilasy teo hateloana izahay; ary nony nandinika ny olona sy ny mpisorona aho, dia nahita fa tsy nisy taranak’i Levy teo na dia iray akory aza. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ka dia nirahiko Eliezera sy Ariela sy Semaia sy Elnatana sy Jariba sy Elnatana sy Natana sy Zakaria sy Mesolama (samy loholona ireo) ary Joariba sy Elnatana (samy mpampianatra ireo). '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary nampitondraiko teny ho any amin’Ido, loholona any Kasifia, ireo, ka nambarako azy izay teny holazainy amin’Ido sy ny Netinima rahalahiny any Kasifia, mba ho entiny any aminay izay ho mpanao fanompoam-pivavahana ao an-tranon’Andriamanitray.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary araka ny soa nataon’ny tànan’Andriamanitray taminay no nitondrany olon-kendry anankiray
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: an Isi-sekela.
      marker-yv: yv-n
    - type: text
      text: ' ho any aminay avy tamin’ny taranak’i Maly, zanak’i Levy, zanak’Isiraely, ary Serebia, sy ny zanany mbamin’ny rahalahiny, valo ambin’ny folo lahy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary Hasabia sy Jesaia, avy tamin’ny taranak’i Merary, mbamin’ny rahalahiny ary ny zanany roa-polo lahy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Gersoma, avy tamin’ny taranak’i Finehasa; Daniela, avy tamin’ny taranak’Itamara; Hatosy, avy tamin’ny taranak’i Davida; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ary avy tamin’ny Netinima, izay notendren’i Davida sy ny mpanapaka hanompo ny Levita, dia roa-polo amby roan-jato lahy; notononina anarana avokoa ireo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia niantso andro fifadian-kanina aho teo amoron’ny ony Ahava hampahorianay tena eo anatrehan’Andriamanitray, mba hangataka Azy hahalavorary ny dianay sy ny an’ny vady aman-janakay ary ny biby fiompinay rehetra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa nahamenatra ahy ny hangataka miaramila sy mpitaingin-tsoavaly amin’ny mpanjaka hiaro anay amin’ny fahavalonay eny an-dàlana, satria efa niteny tamin’ny mpanjaka izahay ka nanao hoe: Ny tànan’Andriamanitray mahasoa izay rehetra mitady Azy; fa ny heriny sy ny fahatezerany kosa mamely izay rehetra mahafoy Azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary nifady hanina izahay ka nangataka izany tamin’Andriamanitray, dia nihaino anay Izy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary nanokana roa ambin’ny folo lahy tamin’ny lohan’ny mpisorona aho, dia Serebia sy Hasabia ary rahalahiny folo lahy ho namany, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ka nolanjaiko ny volafotsy sy ny volamena horaisiny mbamin’ny fanaka, dia ny fanatitra ho ao an-tranon’Andriamanitray, izay efa naterin’ny mpanjaka sy ireo mpanolo-tsainy sy ireo mpanapaka ary ny Isiraely rehetra izay vory teo; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'eny, nolanjaiko hatolotra azy ny talenta volafotsy dimam-polo amby enin-jato sy fanaka volafotsy, lanjan’ny talenta zato, ary talenta volamena zato '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: sy kapoaka volamena misarona roa-polo, lanjan’ny darika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao 1 Tan. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxix.7.
      marker-yv: yv-n
    - type: text
      text: ' arivo, ary fanaka varahina roa manganohano, tsara toy ny volamena.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary hoy izaho taminy: Hianareo dia masina ho an’i Jehovah, sady masina koa ny fanaka; ary ny volafotsy sy ny volamena dia fanati-tsitrapo ho an’i Jehovah, Andriamanitry ny razanareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Koa miambena hianareo, ka tandremo ireny mandra-pandanianareo azy indray eo anatrehan’ny lohan’ny mpisorona sy ny Levita ary ny lohan’ny fianakaviana amin’ny Isiraely any Jerosalema, dia amin’ny efi-trano ao an-tranon’i Jehovah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Zakaria, avy tamin’ny taranak’i Sekania (avy tamin’ny zanak’i Parosy), mbamin’ny namany dimam-polo amby zato lahy voasoratra araka ny firazanany; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia noraisin’ny mpisorona sy ny Levita izany volafotsy sy volamena ary fanaka voalanja izany mba ho entiny ho any Jerosalema ho ao an-tranon’Andriamanitray.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Dia niala teo amin’ny ony Ahava izahay tamin’ny andro faharoa ambin’ny folo tamin’ny volana voalohany mba hankany Jerosalema; ary ny tànan’Andriamanitray nomba anay, ka Izy no namonjy anay tamin’ny tànan’ny fahavalo sy ny mpanotrika teny an-dàlana.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary nony tonga tany Jerosalema izahay, dia nijanona hateloana aloha. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary tamin’ny andro fahefatra no nandanjana ny volafotsy sy ny volamena ary ny fanaka ho eo an-tànan’i Meremota, zanak’i Oria mpisorona, tao an-tranon’Andriamanitray; ary teo aminy koa Eleazara, zanak’i Finehasa; ary teo amin’izy roa lahy koa Jozabada, zanak’i Jesoa, sy Noadia, zanak’i Binoy; Levita izy roa lahy ireo; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: an-isany sy an-danjany izany rehetra izany; ary voasoratra tamin’izany andro izany ny lanjany rehetra.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary ny olona izay niverina avy tamin’ny fahababoana dia nanatitra fanatitra dorana ho an’Andriamanitry ny Isiraely, dia vantotr’ombilahy roa ambin’ny folo ho an’ny Isiraely rehetra sy ondrilahy enina amby sivi-folo sy zanak’ondry fito amby fito-polo ary osilahy roa ambin’ny folo ho fanatitra noho ny ota: fanatitra dorana ho an’i Jehovah ireo rehetra ireo.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ary ny didin’ny mpanjaka dia natolony tamin’ny solo-mpanjaka sy ny mpanapaka tamin’ny etỳ an-dafin’ny ony etỳ; ary izy ireo nampandroso ny olona sy ny tranon’Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Elihoenay, zanak’i Zerahia, avy tamin’ny taranak’i Pahata-moaba, mbamin’ny namany roan-jato lahy; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ny zanak’i Jahaziela, avy tamin’ny taranak’i Sekania, mbamin’ny namany telon-jato lahy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ebeda, zanak’i Jonatana, avy tamin’ny taranak’i Adina, mbamin’ny namany dimam-polo lahy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Jesaia, zanak’i Atalia, avy tamin’ny taranak’i Elama, mbamin’ny namany fito-polo lahy; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Zebadia, zanak’i Mikaela, avy tamin’ny taranak’i Sefatia, mbamin’ny namany valo-polo lahy; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Obadia, zanak’i Jehiela, avy tamin’ny taranak’i Joaba, mbamin’ny namany valo ambin’ny folo amby roan-jato lahy; '
