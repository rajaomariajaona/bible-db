document_id: 2CH.25
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Amazia.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: DIMY amby roa-polo taona Amazia, fony izy vao nanjaka, ary sivy amby roa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Joadana, avy any Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nanao izay mahitsy eo imason’i Jehovah izy, nefa tsy dia tamin’ny fony rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony tafapetraka tsara tamin’ny fanjakany izy, dia novonoiny ireo mpanompony izay namono ny mpanjaka rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa ny zanak’ireo namono dia tsy mba novonoiny, fa nataony araka izay voasoratra ao amin’ny bokin’ny lalàna, dia ao amin’ny bokin’i Mosesy, izay nandidian’i Jehovah hoe: Ny ray tsy hatao maty amin’ny ataon’ny zanany, ary ny zanaka tsy hatao maty amin’ny ataon’ny rainy, fa samy ho faty amin’ny fahotany avy ny olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary novorin’i Amazia ny Joda, ka nalahany araka ny fianakaviany avy, dia araka ny mpifehy arivo sy ny mpifehy zato avy amin’ny Joda sy ny Benjamina rehetra: dia nisainy ny hatramin’ny roa-polo taona no ho miakatra, ka olona telo hetsy voafantina no hitany, izay azo nalefa hanafika sady nahatan-defona sy ampinga lehibe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nisy lehilahy mahery iray hetsy tamin’ny Isiraely nokaramainy talenta volafotsy zato. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa nisy lehilahin’Andriamanitra tonga tao aminy ka nanao hoe: Ry mpanjaka, aza avela hanaraka anao ny miaramilan’ny Isiraely; fa tsy omban’i Jehovah ny Isiraely, dia ny taranak’i Efraima rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa mandehana ihany hianao, ka manaova, ary mahereza amin’ny ady; fa hataon’Andriamanitra lavo eo anoloan’ny fahavalo hianao; fa Andriamanitra no mahay mamonjy sy mampahalavo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy Amazia tamin’ilay lehilahin’Andriamanitra: Ka hataontsika ahoana ny amin’ny talenta zato nomeko ny miaramilan’ny Isiraely? Ary hoy ilay lehilahin’Andriamanitra taminy: Jehovah mahay manome anao mihoatra lavitra noho izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia navahan’i Amazia ireo miaramila tonga tao aminy avy tamin’ny Efraima ireo mba hody indray; ary nirehitra mafy ny fahatezeran’ireo tamin’ny Joda, dia lasa nody izy sady tezitra indrindra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Amazia nitombo hery, dia nitarika ny vahoakany ka nankany amin’ny Lohasahan-tsira, ary nahafaty iray alina tamin’ny taranak’i Seïra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny iray alina sisa nataon’ny taranak’i Joda sambo-belona, dia nentiny teo an-tampon’ny hantsam-bato ary navariny teo, ka montsamontsana izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ireo miaramila izay nampodin’i Amazia tsy hiara-manafika aminy dia nihahakahaka teny an-tanànan’ny Joda hatrany Samaria ka hatrany Beti-horona ka nahafaty olona telo arivo tany sady nahazo babo betsaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary Amazia, nony niverina avy nanafika ny Edomita, dia nitondra ny andriamanitry ny taranak’i Seïra ka nanangana azy ho andriamaniny; ary niankohoka teo anatrehany izy sady nandoro ditin-kazo manitra ho azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nirehitra tamin’ Amazia ny fahatezeran’i Jehovah, ka naniraka mpaminany anankiray ho any aminy Izy hanontany azy hoe: Nahoana hianao no mitady ny andriamanitry ny firenena, izay tsy naharo ny olony tamin’ny tànanao aza? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha niteny taminy izy, dia novaliany hoe: Moa voatendrinay ho mpanolo-tsaina ny mpanjaka va hianao? Aoka itsỳ ange, fandrao asian’ny olona hianao. Dia nitsahatra ilay mpaminany ka nanao hoe: Fantatro fa Andriamanitra mikasa hahafaty anao satria nanao izany hianao ka tsy nihaino ny anatro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Amazia, mpanjakan’ny Joda, naka hevitra, dia naniraka tany amin’i Joasy, zanak’i Joahaza, zanak’i Jeho, mpanjakan’ny Isiraely, izy hanao hoe: Avia, aoka isika hihaona. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Joasy, mpanjakan’ny Isiraely, naniraka tany amin’i Amazia, mpanjakan’ny Joda, nanao hoe: Ny tsilo izay tany Libanona naniraka tamin’ny hazo sedera izay tany Libanona nanao hoe: Omeo ny zanakolahy ny zanakao-vavy ho vadiny; dia namaky teo ny bibi-dia tany Libanona ka nanosihosy ny tsilo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lazainao fa namely an’i Edoma hianao, ka dia nanesika anao hirehareha ny fonao; mitoera ihany ange ao an-tranonao, fa nahoana no hihaika ny loza hahalavo ny tenanao mbamin’ny Joda koa hianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa tsy nanaiky Amazia, satria avy tamin’Andriamanitra izany, mba hanolorany azy ho eo an-tànan’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny fahavalony
  - type: text
    text: ' noho ny nitadiavany ny andriamanitry ny Edomita. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ka dia niakatra Joasy, mpanjakan’ny Isiraely; ary izy sy Amazia, mpanjakan’ny Joda, nihaona tany Beti-semesy izay an’i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia resy teo anoloan’ny Isiraely ny Joda, ka samy nandositra ho any amin’ny lainy avy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Amazia, mpanjakan’ny Joda, zanak’ Joasy, zanak’i Joahaza, dia nosamborin’i Joasy, mpanjakan’ny Isiraely, tany Beti-semesy ka nentiny nankany Jerosalema; ary nandravan’i Joasy efa-jato hakiho ny màndan’i Jerosalema hatramin’ny vavahadin’i Efraima ka hatramin’ny vavahady an-jorony. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nalainy
  - type: text
    text: ' avokoa ny volamena sy ny volafotsy rehetra ary ny fanaka rehetra izay hita tao an-tranon’Andriamanitra tao amin’i Obed-edoma sy tamin’ny rakitry ny tranon’ny mpanjaka mbamin’ny olona natao antoka koa, ka dia niverina ho any Samaria izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny andro niainan’i Amazia zanak’i Joasy, mpanjakan’ny Joda, taorian’ny nahafatesan’i Joasy, zanak’i Joahaza, mpanjakan’ny Isiraely, dia dimy ambin’ny folo taona. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny tantaran’i Amazia sisa, na ny voalohany na ny farany, indro, tsy efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Joda sy ny Isiraely va izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hatramin’ny andro nihemoran’i Amazia tsy nanaraka an’i Jehovah dia niodina taminy tany Jerosalema ny olona, ka dia nandositra nankany Lakisy izy; fa naniraka nanaraka azy tany ny olona ka namono azy tany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary nasampiny tamin’ny soavaly ny fatiny, dia naleviny tao amin’ny razany tao an-tanànan’ny Joda.
