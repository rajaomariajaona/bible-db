document_id: JER.24,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny aviavy roa sobiky.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'JEHOVAH naneho tamiko, ka, indreo, nisy aviavy roa sobiky voapetraka teo anoloan’ny tempolin’i Jehovah, taorian’ny nitondran’i Nebokadnezara, mpanjakan’i Babylona, an’i Jekonia, zanak’i Joiakima, mpanjakan’ny Joda, sy ny mpanapaka ny Joda mbamin’ny mahay tao-zavatra sy ny mpanefy vy izay tany Jerosalema, ho babo ho any Babylona. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hampameleziko azy ny sabatra sy ny mosary ary ny areti-mandringana ambara-pahalany ritrany tsy ho amin’ny tany izay nomeko azy sy ny razany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sobiky iray dia nisy aviavy tsara dia tsara, dia toy ny aviavy mialintaona; ary ny sobiky anankiray kosa dia nisy aviavy ratsy dia ratsy, izay tsy azo hanina noho ny haratsiny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamiko: Inona no hitanao, ry Jeremia? Ary hoy izaho: Aviavy; koa ny tsara moa dia tsara tokoa, ary ny ratsy kosa dia ratsy tokoa ka tsy azo hanina noho ny haratsiny.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko indray ny tenin’i Jehovah nanao hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Tahaka ireto aviavy tsara ireto no fijeriko ny Joda voababo mba hanasoavako azy, dia ireo noroahiko niala tamin’ity tany ity ho any amin’ny tanin’ny Kaldeana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hojeren’ny masoko izy mba hanasoavako azy ka hampodiko ho amin’ity tany ity; ary haoriko izy, fa tsy horavako; ary hamboleko izy, fa tsy hongotako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary homeko fo hahalalany Ahy ho Jehovah izy; dia ho oloko izy, ary Izaho kosa ho Andriamaniny; fa hiverina amiko amin’ny fony rehetra izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny amin’ny aviavy ratsy izay tsy azo hanina kosa noho ny haratsiny, dia izao no lazain’i Jehovah: Toy izany no hanolorako an’i Zedekia, mpanjakan’ny Joda, sy ny mpanapaka ary izay sisa any Jerosalema, dia izay mbola sisa amin’ity tany ity sy izay mitoetra any amin’ny tany Egypta, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: eny, hatolotro ho mpanjenjena
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho fampangovitana.
      marker-yv: yv-n
    - type: text
      text: ' sy fiharan-doza any amin’ny fanjakana rehetra ambonin’ny tany izy, ho fandatsa sy ohabolana sy ambentinteny ary fanozonana any amin’ny tany rehetra izay handroahako azy. '
