document_id: PSA.34,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Salamo abidy. Fisaorana sy anatra nataon’izay efa novonjena tamin’ny fahoriana nanjo azy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nataon’i Davida tamin’izy nody adala teo anatrehan’i Abimeleka, dia noroahiny ka lasa nandeha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HISAOTRA an’i Jehovah lalandava aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho eo am-bavako mandrakariva ny fiderana Azy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Na dia ny liona tanora aza tsy ampy hanina ka noana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay mitady an’i Jehovah kosa dia tsy ho orin-java-tsoa akory.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Avia, anaka, mihainoa ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatahorana an’i Jehovah no hampianariko anareo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Na iza na iza ianao no maniry fiainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tia andro maro hahitana ny soa,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia arovy ny lelanao amin’ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny molotrao mba tsy hiteny fitaka.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Halaviro ny ratsy, ka manaova soa:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitadiava fihavanana, ka araho izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny mason’i Jehovah dia mitsinjo ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sofiny mihaino ny fitarainany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny tavan’i Jehovah tezitra amin’ny mpanao ratsy kosa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hofongorany tsy ho eo amin’ny tany ny fahatsiarovana azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mitaraina '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny marina,
    - type: text
      text: ' ary mihaino azy Jehovah'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mamonjy azy amin’ny fahoriany rehetra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Akaikin’izay manana fo mangorakoraka Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamonjy izay torotoro fanahy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Maro ny fahorian’ny marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Jehovah manafaka azy amin’izany rehetra izany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jehovah no reharehan’ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahare izany ny mpandefitra ka ho faly.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Miaro ny taolany rehetra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisy ho tapaka ireny na dia iray akory aza.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Hahafaty ny ratsy fanahy ny fahoriana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mankahala ny olo-marina hohelohina.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa Jehovah manavotra ny fanahin’ny mpanompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mba hisy hohelohina izay rehetra mialoka aminy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Miaraha mankalaza an’i Jehovah amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hiara-manandratra ny anarany isika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mitady an’i Jehovah aho, dia mamaly ahy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manafaka ahy amin’ny tahotro rehetra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mijery Azy ireo ka miramirana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy mangaihay ny tavany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ity olo-mahantra ity niantso, dia nihaino Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka namonjy azy tamin’ny fahoriany rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny Anjelin’i Jehovah mitoby manodidina izay matahotra Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mamonjy azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Andramo ka izahao fa tsara Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay olona mialoka aminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Matahora an’i Jehovah, hianareo olony masina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy hanan-java-mahory izay matahotra Azy.
