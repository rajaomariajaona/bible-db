document_id: PSA.34,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fisaorana sy anatra nataon’izay efa novonjena tamin’ny fahoriana nanjo azy.
  - type: text
    content: Nataon’i Davida tamin’izy nody adala teo anatrehan’i Abimeleka, dia noroahiny ka lasa nandeha.
  - type: text
    content: HISAOTRA an’i Jehovah lalandava aho;
  - type: text
    content: Ho eo am-bavako mandrakariva ny fiderana Azy.
  '10':
  - type: text
    content: Na dia ny liona tanora aza tsy ampy hanina ka noana;
  - type: text
    content: Fa izay mitady an’i Jehovah kosa dia tsy ho orin-java-tsoa akory.
  '11':
  - type: text
    content: Avia, anaka, mihainoa ahy;
  - type: text
    content: Ny fahatahorana an’i Jehovah no hampianariko anareo.
  '12':
  - type: text
    content: Na iza na iza ianao no maniry fiainana
  - type: text
    content: Ka tia andro maro hahitana ny soa,
  '13':
  - type: text
    content: Dia arovy ny lelanao amin’ny ratsy
  - type: text
    content: Ary ny molotrao mba tsy hiteny fitaka.
  '14':
  - type: text
    content: 'Halaviro ny ratsy, ka manaova soa:'
  - type: text
    content: Mitadiava fihavanana, ka araho izany.
  '15':
  - type: text
    content: Ny mason’i Jehovah dia mitsinjo ny marina,
  - type: text
    content: Ary ny sofiny mihaino ny fitarainany.
  '16':
  - type: text
    content: Ny tavan’i Jehovah tezitra amin’ny mpanao ratsy kosa,
  - type: text
    content: Mba hofongorany tsy ho eo amin’ny tany ny fahatsiarovana azy.
  '17':
  - type: text
    content: 'Mitaraina '
  - type: text
    content: ny marina,
  - type: text
    content: ' ary mihaino azy Jehovah'
  - type: text
    content: Ka mamonjy azy amin’ny fahoriany rehetra.
  '18':
  - type: text
    content: Akaikin’izay manana fo mangorakoraka Jehovah
  - type: text
    content: Ary mamonjy izay torotoro fanahy.
  '19':
  - type: text
    content: Maro ny fahorian’ny marina;
  - type: text
    content: Nefa Jehovah manafaka azy amin’izany rehetra izany.
  '2':
  - type: text
    content: Jehovah no reharehan’ny fanahiko;
  - type: text
    content: Hahare izany ny mpandefitra ka ho faly.
  '20':
  - type: text
    content: Miaro ny taolany rehetra Izy;
  - type: text
    content: Tsy hisy ho tapaka ireny na dia iray akory aza.
  '21':
  - type: text
    content: Hahafaty ny ratsy fanahy ny fahoriana;
  - type: text
    content: Ary ny mankahala ny olo-marina hohelohina.
  '22':
  - type: text
    content: Fa Jehovah manavotra ny fanahin’ny mpanompony,
  - type: text
    content: Ka tsy mba hisy hohelohina izay rehetra mialoka aminy.
  '3':
  - type: text
    content: Miaraha mankalaza an’i Jehovah amiko;
  - type: text
    content: Ary aoka hiara-manandratra ny anarany isika.
  '4':
  - type: text
    content: Mitady an’i Jehovah aho, dia mamaly ahy Izy
  - type: text
    content: Ka manafaka ahy amin’ny tahotro rehetra.
  '5':
  - type: text
    content: Mijery Azy ireo ka miramirana,
  - type: text
    content: Sady tsy mangaihay ny tavany.
  '6':
  - type: text
    content: Ity olo-mahantra ity niantso, dia nihaino Jehovah
  - type: text
    content: Ka namonjy azy tamin’ny fahoriany rehetra.
  '7':
  - type: text
    content: Ny Anjelin’i Jehovah mitoby manodidina izay matahotra Azy
  - type: text
    content: Ka mamonjy azy.
  '8':
  - type: text
    content: Andramo ka izahao fa tsara Jehovah;
  - type: text
    content: Sambatra izay olona mialoka aminy.
  '9':
  - type: text
    content: Matahora an’i Jehovah, hianareo olony masina;
  - type: text
    content: Fa tsy hanan-java-mahory izay matahotra Azy.
