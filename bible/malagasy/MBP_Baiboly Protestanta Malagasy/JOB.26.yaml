document_id: JOB.26,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Joba.
  - type: text
    content: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Asiany faritra manodidina eny ambonin’ny rano.
  - type: text
    content: Hatramin’izay ihaonan’ny mazava sy ny maizina.
  '11':
  - type: text
    content: Ny andrin’ny lanitra nihozongozona
  - type: text
    content: Sady ankona amin’ny teny mafy ataony.
  '12':
  - type: text
    content: Ny heriny no entiny mampanonja ny ranomasina,
  - type: text
    content: Ary ny fahendreny no anorotoroany an-dRahaba;
  - type: note
    content: Izahao ix. 13.
  '13':
  - type: text
    content: Ny fanahiny no mahatsara tarehy ny lanitra;
  - type: text
    content: Ny tànany no nitomboka ny menarana mandositra.
  '14':
  - type: text
    content: Indro, ireny dia vao ny sisintsisin’ny alehany ihany aza,
  - type: text
    content: Ary siosion-teny mamelovelo no andrenesantsika Azy;
  - type: text
    content: Fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?
  '2':
  - type: text
    content: Endrey! nanohana ny tsy manan-kery hianao
  - type: text
    content: Sy nampahatanjaka ny sandry malemy!
  '3':
  - type: text
    content: Ary nanolo-tsaina ny tsy hendry
  - type: text
    content: Sy nampahafantatra izay fahendrena betsaka!
  '4':
  - type: text
    content: Iza no nandaharanao teny?
  - type: text
    content: Ary fanahin’izay no nivoaka avy tao aminao?
  '5':
  - type: text
    content: Ny matoatoa dia ampanaintainina
  - type: text
    content: Any ambanin’ny rano sy any ambanin’ny mponina any.
  '6':
  - type: text
    content: Ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' miharihary eo anatrehany,'
  - type: text
    content: Ary ny fandringanana dia tsy mirakotra.
  '7':
  - type: text
    content: Mamelatra ny lanitra avaratra ho eny ambonin’ny habakabaka izy
  - type: text
    content: Ary manantona ny tany amin’ny tsy misy.
  '8':
  - type: text
    content: Fonosiny amin’ireo rahony matevina ny rano,
  - type: text
    content: Nefa ny fanambanin’ny rahona tsy mety triatra.
  '9':
  - type: text
    content: Manakona ny seza fiandrianany tsy ho hitantsika Izy
  - type: text
    content: Amin’ny amelarany ny rahony hanarona azy.
