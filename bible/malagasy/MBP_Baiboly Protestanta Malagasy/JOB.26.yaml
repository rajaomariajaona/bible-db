document_id: JOB.26,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny navalin’i Joba.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asiany faritra manodidina eny ambonin’ny rano.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’izay ihaonan’ny mazava sy ny maizina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny andrin’ny lanitra nihozongozona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady ankona amin’ny teny mafy ataony.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny heriny no entiny mampanonja ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahendreny no anorotoroany an-dRahaba;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix. 13.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanahiny no mahatsara tarehy ny lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànany no nitomboka ny menarana mandositra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ireny dia vao ny sisintsisin’ny alehany ihany aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary siosion-teny mamelovelo no andrenesantsika Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey! nanohana ny tsy manan-kery hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nampahatanjaka ny sandry malemy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanolo-tsaina ny tsy hendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nampahafantatra izay fahendrena betsaka!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nandaharanao teny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fanahin’izay no nivoaka avy tao aminao?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny matoatoa dia ampanaintainina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any ambanin’ny rano sy any ambanin’ny mponina any.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' miharihary eo anatrehany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fandringanana dia tsy mirakotra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamelatra ny lanitra avaratra ho eny ambonin’ny habakabaka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manantona ny tany amin’ny tsy misy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fonosiny amin’ireo rahony matevina ny rano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ny fanambanin’ny rahona tsy mety triatra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manakona ny seza fiandrianany tsy ho hitantsika Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny amelarany ny rahony hanarona azy.
