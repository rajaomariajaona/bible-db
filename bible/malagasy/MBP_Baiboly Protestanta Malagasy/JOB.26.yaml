document_id: JOB.26
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny navalin’i Joba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Endrey! nanohana ny tsy manan-kery hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nampahatanjaka ny sandry malemy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nanolo-tsaina ny tsy hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nampahafantatra izay fahendrena betsaka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza no nandaharanao teny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fanahin’izay no nivoaka avy tao aminao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny matoatoa dia ampanaintainina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any ambanin’ny rano sy any ambanin’ny mponina any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' miharihary eo anatrehany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fandringanana dia tsy mirakotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mamelatra ny lanitra avaratra ho eny ambonin’ny habakabaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manantona ny tany amin’ny tsy misy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fonosiny amin’ireo rahony matevina ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ny fanambanin’ny rahona tsy mety triatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manakona ny seza fiandrianany tsy ho hitantsika Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny amelarany ny rahony hanarona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Asiany faritra manodidina eny ambonin’ny rano.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’izay ihaonan’ny mazava sy ny maizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny andrin’ny lanitra nihozongozona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ankona amin’ny teny mafy ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny heriny no entiny mampanonja ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahendreny no anorotoroany an-dRahaba;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix. 13.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fanahiny no mahatsara tarehy ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànany no nitomboka ny menarana mandositra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, ireny dia vao ny sisintsisin’ny alehany ihany aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary siosion-teny mamelovelo no andrenesantsika Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?
