document_id: MRK.11,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niakaran’i Jesosy tany Jerosalema.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 21.1-11; Lio. 19.29-44; Jao. 12.12-19.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY raha nanakaiky any Jerosalema tao Betifaga sy Betania any an-tendrombohitra Oliva izy, dia naniraka roa lahy tamin’ny mpianany Jesosy '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahina anie ny fanjakana izay avy, dia ny an’i Davida raintsika!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hosana any amin’ny avo indrindra (Sal 118.26).
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jesosy niditra tany Jerosalema ka nankeo an-kianjan’ny tempoly; ary rehefa nijerijery ny zavatra rehetra Izy, sady efa hariva ny andro tamin’izay, dia niala Izy mbamin’ny roa ambin’ny folo lahy ka nankany Betania.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanozonan’i Jesosy ny aviavy tsy namoa, sy ny nandroahany ny mpivarotra, ary ny nanesorany ny varony hiala teo an-kianjan’ny tempoly.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 21.12-22; Lio. 19.45-48.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nony ampitson’iny, rehefa niala tany Betania izy, dia noana Jesosy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahatsinjo aviavy anankiray mandravina erỳ lavidavitra Izy, dia nankeo, fa toa hahita voany eo aminy; kanjo nony tonga teo aminy Izy, dia tsy nahita na inona na inona, afa-tsy ravina ihany; fa tsy mbola tonga ny taom-pamoazan’ny aviavy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy namaly ka nanao taminy hoe: Aza misy mihinana voa avy aminao intsony mandrakizay. Ary ny mpianany nahare izany.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tany Jerosalema izy: ary Jesosy niditra teo an-kianjan’ny tempoly, dia nandroaka izay nivarotra sy izay nividy teo an-kianjan’ny tempoly sady nanjera ny latabatry ny mpanakalo vola sy ny fipetrahan’ny mpivarotra ny voromailala; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsy navelany hisy olona hitondra fanaka handeha hamaky ny kianjan’ny tempoly. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampianatra Izy ka nanao taminy hoe: Tsy voasoratra hoe va: „Ny tranoko hatao hoe trano fivavahana ho an’ny firenena rehetra?” (Isa. 56.7); fa hianareo kosa efa nanao azy ho „zohy fieren’ny jiolahy” (Jer. 7.11).'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nahare izany ny lohan’ny mpisorona mbamin’ny mpanora-dalàna, ka dia nitady izay hamonoany Azy; saingy natahotra Azy izy, satria talanjona ny vahoaka rehetra noho ny fampianarany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary isan-kariva dia niala tao an-tanàna Izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe: Mankanesa amin’iroa vohitra tandrifinareo iroa; ary raha vao miditra eo hianareo, miaraka amin’izay dia hahita zana-boriky mifatotra, izay tsy mbola nitaingenan’olona; vahao izy, ka ento etỳ. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony maraina, raha nandalo izy, dia hitany fa efa nalazo hatramin’ny fakany ilay aviavy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Petera nahatsiahy ka nanao taminy hoe: Raby ô, indro fa efa malazo ilay aviavy nozoninao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy namaly ka nanao taminy hoe: Manàna finoana an’Andriamanitra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no hilaza amin’ity tendrombohitra ity hoe: Mifindrà, ka mianjerà any an-dranomasina, ka tsy hiahanahana ao am-pony, fa hino fa ho tonga ny zavatra lazainy, dia ho azony izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa lazaiko aminareo: Na inona na inona tononinareo amin’ny fivavahana sy angatahinareo, dia minoa fa efa nandray hianareo, dia ho azonareo izany.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha mitsangana mivavaka hianareo, ka misy olona anananareo alahelo, dia mamelà ny helony, mba havelan’ny Rainareo Izay any an-danitra kosa ny helokareo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[26 Fa raha hianareo tsy mamela heloka, ny Rainareo Izay any an-danitra kosa tsy hamela ny helokareo.]'
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanontanian’ny lohan’ny mpisorona sy ny loholona an’i Jesosy ny amin’ny fahefany, ary ny fanoharana navalin’i Jesosy azy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 21.23-46; Lio. 20.1-19.
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga tany Jerosalema indray izy; ary raha nitsangatsangana teo an-kianjan’ny tempoly Jesosy, dia nanatona Azy ny lohan’ny mpisorona sy ny mpanora-dalàna ary ny loholona '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe: Fahefana manao ahoana no anaovanao izao zavatra izao? Ary iza no nanome Anao izany fahefana izany hanaovanao izao zavatra izao?'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nanao taminy hoe: Hanontany anareo zavatra iray loha kosa Aho, ka valio Aho; ary dia holazaiko aminareo izay fahefana anaovako izao zavatra izao: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy olona manao aminareo hoe: Ahoana no anaovanareo izao? dia lazao hoe: Misy raharaha analan’ny Tompo azy; dia havelany ho entina etỳ indray miaraka amin’izay izy.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny batisan’i Jaona avy tany an-danitra va, sa avy tamin’ny olona? Valio Aho.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy ireo niara-nisaina ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hataony hoe: Nahoana ary no tsy nino azy hianareo? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha holazaintsika hoe kosa: Avy tamin’ny olona,–natahotra ny olona izy, satria neken’ny olona rehetra fa mpaminany tokoa Jaona. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly an’i Jesosy izy ka nanao hoe: Tsy fantatray. Ary Jesosy nanao taminy hoe: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha izy ka nahita zana-boriky nifatotra teo ala-trano anilan’ny varavarana teo an-dàlana, dia novahany izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona sasany teo nanao taminy hoe: Ahoana no amahanareo ny zana-boriky? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy nilaza taminy araka izay nolazain’i Jesosy taminy, dia navelan’ny olona handeha izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nentiny teo amin’i Jesosy ny zana-boriky, dia nataony teo amboniny ny lambany; ary Jesosy nitaingina azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maro no namelatra ny lambany teny an-dàlana; ary ny sasany kosa nampihahaka rantsan-kazo izay efa nalainy tany an-tsaha. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay nandeha teo alohany sy izay nanaraka teo aoriany dia samy niantso hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hosana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie Izay avy amin’ny anaran’i Jehovah!
