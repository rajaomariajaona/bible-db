document_id: ZEC.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hampaherezana ny Isiraely, sy ny hanamasinana azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: TENY faminaniana avy tamin’i Jehovah ny amin’ny Isiraely.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jehovah, Izay mamelatra ny lanitra sy manao ny fanorenan’ny tany ary mamorona ny fanahin’ny olona ao anatiny: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary haidiko amin’ny taranak’i Davida sy amin’ny mponina any Jerosalema ny fanahin’ny fahasoavana sy ny fifonana, ka hijery Ahy Izay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[ka hijery ilay].'
      marker-yv: yv-n
    - type: text
      text: ' nolefoniny izy, ary hisaona Azy toy ny fisaonana zanakalahy tokana izy sady halahelo Azy toy ny fahalahelovan’ny olona ny lahimatoany.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany dia hisy fisaonana lehibe any Jerosalema toy ny fisaonana tao Hadadrimona eo amin’ny lohasaha Megido. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hisaona mitsitokantokana ny tany, samy isam-pianakaviana avy: ny fianakavian’i Davida mitokana, ary ny vadin’ireo mitokana; ny fianakavian’i Natana mitokana, ary ny vadin’ireo mitokana; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fianakavian’ny taranak’i Levy mitokana, ary ny vadin’ireo mitokana; ny fianakavian’i Simey mitokana, ary ny vadin’ireo mitokana; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny fianakaviana sisa rehetra mitokana isam-pianakaviana, ary ny vadin’ireo mitokana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, Izaho hanao an’i Jerosalema ho kapoaka mampiraikiraiky ho an’ny firenena rehetra manodidina; ary ny Joda koa hiharan’izany ny hanaovana fahirano an’i Jerosalema.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary amin’izany andro izany Jerosalema dia hataoko vato mavesatra ho an’ny ny firenena rehetra, ka haràtra dia haràtra izay rehetra mivesatra azy; ary ho tafangona hamely azy ny firenena rehetra amin’ny tany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’izany andro izany, hoy Jehovah, dia hamely ny soavaly amin’ny fahaverezan-kevitra Aho, ary ny mpitaingina azy amin’ny fahadalana; hampihiratra ny masoko amin’ny taranak’i Joda Aho ary hamely ny soavaly rehetra izay an’ny firenena amin’ny fahajambana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo lohany amin’ny firenen’i Joda dia hanao anakampo hoe: Ny mponina any Jerosalema dia heriko ao amin’i Jehovah, Tompon’ny maro, Andriamaniny.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany ireo lohany amin’ny firenen’i Joda dia hataoko tahaka ny fatana mirehitra eny amin’ny hazo sy tahaka ny fanilo mirehitra eny amin’ny amboara, ka handevona ny firenena rehetra manodidina amin’ny ankavanana sy ny ankavia izy; ary Jerosalema dia mbola hiorina amin’ny fitoerany ihany, dia any Jerosalema. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hovonjen’i Jehovah aloha ny lain’ny Joda, mba tsy hisandratra ambonin’ny Joda intsony ny voninahitry ny taranak’i Davida sy ny voninahitry ny mponina any Jerosalema.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany dia harovan’i Jehovah ny mponina any Jerosalema; ary izay mila ho reraka ao aminy aza amin’izany andro izany dia ho tahaka an’i Davida; ary ny taranak’i Davida ho tahaka an’Andriamanitra, dia tahaka Ilay Anjelin’i Jehovah eo anoloany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin’izany andro izany dia hitady handringana ny jentilisa rehetra izay avy hamely an’i Jerosalema Aho.
