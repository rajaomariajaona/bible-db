document_id: PSA.36,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny maharatsy ny miala amin’Andriamanitra, ary ny mahatsara ny mihavana aminy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Nataon’i Davida, mpanompon’i Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'NY ota milaza ato am-poko ny amin’ny ratsy fanahy hoe:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Misy filazana ny ota ao am-pon’ny ratsy fanahy manao hoe:]'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fahatahorana an’Andriamanitra ao aminy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahareto amin’izay mahalala Anao ny famindramponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahamarinanao amin’ny mahitsy fo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hanitsaka ahy ny tongotry ny mpiavonavona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hampandositra ahy ny tànan’ny ratsy fanahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreo! efa lavo ny mpanao ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naripaka izy ka tsy maharina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa miarahaba tena izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny amin’ny tsy hahitana ny helony ka hankahalana azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’ny vavany dia faharatsiana sy fitaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nihadala izy ka nitsahatra tsy hanao soa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faharatsiana no saintsaininy eo am-pandriany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangana eo amin’ny làlana tsy mety izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ratsy tsy mba laviny akory.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, mipaka amin’ny lanitra ny famindramponao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihatra amin’ny rahona ny fahamarinanao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinanao dia tahaka ny tendrombohitra avo dia avo;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tendrombohitr’Andriamanitra.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitsaranao dia toy ny lalina indrindra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona sy ny biby dia samy vonjenao, Jehovah ô,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey ny hatsaran’ny famindramponao, Andriamanitra ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mialoka eo amin’ny aloky ny elatrao ny zanak’olombelona.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voky ny matavy ao an-tranonao izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ony fampifalianao no ampisotroanao azy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ao aminao no misy loharanon’aina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahazavanao no hahitanay fahazavana.
