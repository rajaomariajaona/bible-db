document_id: PSA.36,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny maharatsy ny miala amin’Andriamanitra, ary ny mahatsara ny mihavana aminy.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’i Davida, mpanompon’i Jehovah.
  - type: text
    content: 'NY ota milaza ato am-poko ny amin’ny ratsy fanahy hoe:'
  - type: note
    content: 'Na: [Misy filazana ny ota ao am-pon’ny ratsy fanahy manao hoe:]'
  - type: text
    content: Tsy misy fahatahorana an’Andriamanitra ao aminy.
  '10':
  - type: text
    content: Ampahareto amin’izay mahalala Anao ny famindramponao,
  - type: text
    content: Ary ny fahamarinanao amin’ny mahitsy fo.
  '11':
  - type: text
    content: Aoka tsy hanitsaka ahy ny tongotry ny mpiavonavona,
  - type: text
    content: Na hampandositra ahy ny tànan’ny ratsy fanahy.
  '12':
  - type: text
    content: Indreo! efa lavo ny mpanao ratsy;
  - type: text
    content: Naripaka izy ka tsy maharina.
  '2':
  - type: text
    content: Fa miarahaba tena izy
  - type: text
    content: Ny amin’ny tsy hahitana ny helony ka hankahalana azy.
  '3':
  - type: text
    content: Ny tenin’ny vavany dia faharatsiana sy fitaka;
  - type: text
    content: Efa nihadala izy ka nitsahatra tsy hanao soa.
  '4':
  - type: text
    content: Faharatsiana no saintsaininy eo am-pandriany;
  - type: text
    content: Mitsangana eo amin’ny làlana tsy mety izy;
  - type: text
    content: Ny ratsy tsy mba laviny akory.
  '5':
  - type: text
    content: Jehovah ô, mipaka amin’ny lanitra ny famindramponao;
  - type: text
    content: Mihatra amin’ny rahona ny fahamarinanao.
  '6':
  - type: text
    content: Ny fahamarinanao dia tahaka ny tendrombohitra avo dia avo;
  - type: note
    content: Heb. tendrombohitr’Andriamanitra.
  - type: text
    content: Ny fitsaranao dia toy ny lalina indrindra;
  - type: text
    content: Ny olona sy ny biby dia samy vonjenao, Jehovah ô,
  '7':
  - type: text
    content: Endrey ny hatsaran’ny famindramponao, Andriamanitra ô!
  - type: text
    content: Ka mialoka eo amin’ny aloky ny elatrao ny zanak’olombelona.
  '8':
  - type: text
    content: Voky ny matavy ao an-tranonao izy;
  - type: text
    content: Ary ny ony fampifalianao no ampisotroanao azy.
  '9':
  - type: text
    content: Fa ao aminao no misy loharanon’aina;
  - type: text
    content: Ny fahazavanao no hahitanay fahazavana.
