document_id: 1CO.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aoka hataon’ny olona ho mpanompon’i Kristy sy mpitandrina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpitandrina fananana.
      marker-yv: yv-n
    - type: text
      text: ' ny zava-miafina izay an’Andriamanitra izahay. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izahay dia adala noho ny amin’i Kristy, fa hianareo no hendry ao amin’i Kristy! izahay malemy, fa hianareo no mahery! hianareo manan-daza, fa izahay mavomavo! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mandraka ankehitriny izao dia noana sy mangetaheta sy tsy manan-kitafy sy asiana totohondry ary tsy manana antom-ponenana izahay; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary misasatra miasa amin’ny tànanay izahay; raha tevatevaina izahay, dia misaotra; raha enjehina, dia miaritra; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: raha tenenina mafy, dia mamaly teny moramora kosa; atao toy ny faditr’izao tontolo izao izahay, dia faikan’ny olona rehetra, mandraka ankehitriny.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tsy ny hahamenatra anareo anefa no anoratako izany zavatra izany, fa mananatra anareo toy ny zanako malalako aho. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa na dia manana mpampianatra iray alina ao amin’i Kristy aza hianareo, dia tsy maro ray hianareo; fa izaho no niteraka anareo ao amin’i Kristy Jesosy tamin’ny filazantsara. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa mananatra anareo aho: manahafa ahy hianareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary noho izany dia nirahiko ho any aminareo Timoty, zanako malalako sy mahatoky ao amin’ny Tompo, ka izy no hampahatsiaro anareo ny fanaoko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: làlako.
      marker-yv: yv-n
    - type: text
      text: ' ao amin’i Kristy, tahaka ny ampianariko ao amin’ny fiangonana rehetra eny tontolo eny.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa ny sasany mirehareha hoatra ilay tsy mikasa ho avy any aminareo iny aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa ho avy any aminareo faingana aho, raha sitrapon’ny Tompo, dia ho fantatro izay herin’ireo mpirehareha ireo, fa tsy ny fiteniny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary raha izany, dia fantatrareo fa ny mpitandrina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpitandrina fananana.
      marker-yv: yv-n
    - type: text
      text: ' dia tokony ho olona mahatoky. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa ny fanjakan’Andriamanitra tsy amin’ny teny, fa amin’ny hery. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Inona ary no tianareo? Ho avy aminareo mitondra tsorakazo va aho, sa amin’ny fitiavana sy ny fahalemem-panahy?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa raha ny amiko, dia ataoko ho zavatra kely foana, na hotsarainareo aho, na hotsarain’olona;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: andron’olona.
      marker-yv: yv-n
    - type: text
      text: ' fa ny tenako aza tsy mitsara ahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa tsy hitako izay tsiniko, nefa tsy mahamarina ahy izany; fa ny Tompo no Mpitsara ahy: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: koa amin’izany aza mitsara na inona na inona alohan’ny fotoana, dia ny fihavian’ny Tompo, Izay hampiharihary ny zavatra takona ao amin’ny maizina ka hampiseho ny fikasan’ny fo; dia samy hahazo izay derany avy amin’Andriamanitra izy rehetra.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Anatra noho ny fiavonavonan’ny Korintiana.
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ARY izany zavatra izany, ry rahalahy, nataoko oha-teny hilaza ahy sy Apolosy noho ny aminareo, mba hianaranareo aminay ny tsy hihoatra noho ny voasoratra, mba tsy hisy hireharehanareo hankalaza ny anankiray, fa hanevateva ny anankiray kosa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa iza no mampihoatra anao? Ary inona no anananao, izay tsy noraisinao? Fa raha nandray ihany hianao, nahoana no mirehareha hoatra ny tsy nandray?
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Efa afa-po sahady hianareo, efa manan-karena sahady hianareo, efa manjaka hianareo; kanefa hay! tsy izahay tsy akory no nahazoanareo izany! Enga anie ka manjaka tokoa hianareo, hiarahanay sy hianareo manjaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa ataoko fa nasehon’Andriamanitra ho faraidina izahay Apostoly, dia toy izay voaheloka hovonoina; fa izahay dia natao ho fizàhan’izao rehetra izao, na anjely na olona. '
