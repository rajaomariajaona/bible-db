verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fanamelohana ny mpanan-karena ratsy fanahy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'HE! hianareo manan-karena, mitomania sy midradradradrà noho ny fahoriana izay efa manjo anareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry rahalahiko, aoka ny mpaminany izay niteny tamin’ny anaran’ny Tompo no halainareo ho fianarana ny fandeferam-pahoriana sy ny faharetana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, ataontsika fa sambatra izay efa naharitra. Efa renareo ny faharetan’i Joba, ary efa hitanareo ny faran’
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny nataon’
    - type: text
      text: ' ny Tompo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: taminy,
    - type: text
      text: ' fa miantra indrindra ny Tompo sady be famindrampo.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa mihoatra noho ny zavatra rehetra, ry rahalahiko, aza mianiana, na amin’ny lanitra, na amin’ny tany, na amin’izay fianianana hafa akory aza; fa aoka ny fanaikinareo ho ,Eny’, ary ny fandanareo ho ,Tisa’, fandrao hiharan’ny fitsarana hianareo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misy azom-pahoriana va eo aminareo? Aoka izy hivavaka. Misy faly va? Aoka izy hihira fiderana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Misy marary va eo aminareo? Aoka izy hampaka ny loholon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: presbytera.
      marker-yv: yv-n
    - type: text
      text: ' ny fiangonana;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' ary aoka hanosotra diloilo azy amin’ny anaran’ny Tompo ireo sady hivavaka eo aminy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny fivavaky ny finoana dia hamonjy ilay marary, fa ny Tompo hanangana azy; ary raha nanota izy, dia havela ny helony.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mifaneke heloka hianareo, ary mifampivavaha, mba ho sitrana hianareo. Ny fiàsan’ny fivavaky ny marina dia mahery indrindra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elia dia olona tahaka antsika ihany, ary izy nahery nivavaka mba tsy hilatsahan’ny ranonorana; dia tsy nilatsaka tamin’ny tany ny ranonorana telo taona sy enim-bolana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nivavaka indray izy, dia nandatsaka ranonorana ny lanitra, ka nahavokatra ny tany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry rahalahiko, raha misy eo aminareo miala amin’ny fahamarinana, ary misy anankiray mampibebaka azy, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny harenareo efa simba, ary ny fitafianareo efa lanin’ny kalalao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: aoka ho fantany fa izay mampibebaka ny mpanota hiala amin’ny làlan’ny fahadisoany dia hamonjy fanahy tsy ho faty sady hanarona heloka be.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny volamena sy ny volafotsinareo dia efa harafesina; ary ny harafesiny dia ho vavolombelona hiampanga anareo sady handany ny nofonareo tahaka ny afo. Efa namory harena amin’ny andro farany hianareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, ny karaman’ny mpiasa nijinja ny taninareo, izay hazoninareo, dia mitaraina; ary ny fitarainan’ny mpijinja dia efa tafiditra amin’ny sofin’ny Tompon’ny maro. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa velona tamin’ny fy tetỳ ambonin’ny tany hianareo sady nanaram-po tamin’ny fahafinaretana; efa namahy ny fonareo tamin’ny andro hamonoana hianareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nanameloka namono ny marina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ilay marina .... Izy.
      marker-yv: yv-n
    - type: text
      text: ' hianareo; fa tsy manohitra anareo izy.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ilay marina .... Izy.
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Toky ho an’ny Kristiana azom-pahoriana, sy anatra samy hafa.
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY amin’izany dia mahareta tsara, ry rahalahy, mandra-pihavin’ny Tompo. Indro, ny mpiasa tany miandry ny voka-tsoa amin’ny tany ka maharitra amin’izany mandra-pahazony ny ranonorana aloha sy aoriana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mahareta koa hianareo, mampahereza ny fonareo, fa efa mby akaiky ny fihavian’ny Tompo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mifampimonomonona, ry rahalahy, fandrao hohelohina hianareo; indro, ny Mpitsara efa mitsangana eo anoloan’ny varavarana. '
