document_id: JAS.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanamelohana ny mpanan-karena ratsy fanahy.
  - type: text
    content: 'HE! hianareo manan-karena, mitomania sy midradradradrà noho ny fahoriana izay efa manjo anareo. '
  '10':
  - type: text
    content: 'Ry rahalahiko, aoka ny mpaminany izay niteny tamin’ny anaran’ny Tompo no halainareo ho fianarana ny fandeferam-pahoriana sy ny faharetana. '
  '11':
  - type: text
    content: Indro, ataontsika fa sambatra izay efa naharitra. Efa renareo ny faharetan’i Joba, ary efa hitanareo ny faran’
  - type: text
    content: ny nataon’
  - type: text
    content: ' ny Tompo '
  - type: text
    content: taminy,
  - type: text
    content: ' fa miantra indrindra ny Tompo sady be famindrampo.'
  '12':
  - type: text
    content: Fa mihoatra noho ny zavatra rehetra, ry rahalahiko, aza mianiana, na amin’ny lanitra, na amin’ny tany, na amin’izay fianianana hafa akory aza; fa aoka ny fanaikinareo ho ,Eny’, ary ny fandanareo ho ,Tisa’, fandrao hiharan’ny fitsarana hianareo.
  '13':
  - type: text
    content: 'Misy azom-pahoriana va eo aminareo? Aoka izy hivavaka. Misy faly va? Aoka izy hihira fiderana. '
  '14':
  - type: text
    content: Misy marary va eo aminareo? Aoka izy hampaka ny loholon’
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' ny fiangonana;'
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' ary aoka hanosotra diloilo azy amin’ny anaran’ny Tompo ireo sady hivavaka eo aminy; '
  '15':
  - type: text
    content: ary ny fivavaky ny finoana dia hamonjy ilay marary, fa ny Tompo hanangana azy; ary raha nanota izy, dia havela ny helony.
  '16':
  - type: text
    content: 'Koa mifaneke heloka hianareo, ary mifampivavaha, mba ho sitrana hianareo. Ny fiàsan’ny fivavaky ny marina dia mahery indrindra. '
  '17':
  - type: text
    content: 'Elia dia olona tahaka antsika ihany, ary izy nahery nivavaka mba tsy hilatsahan’ny ranonorana; dia tsy nilatsaka tamin’ny tany ny ranonorana telo taona sy enim-bolana. '
  '18':
  - type: text
    content: Ary nivavaka indray izy, dia nandatsaka ranonorana ny lanitra, ka nahavokatra ny tany.
  '19':
  - type: text
    content: 'Ry rahalahiko, raha misy eo aminareo miala amin’ny fahamarinana, ary misy anankiray mampibebaka azy, '
  '2':
  - type: text
    content: 'Ny harenareo efa simba, ary ny fitafianareo efa lanin’ny kalalao. '
  '20':
  - type: text
    content: aoka ho fantany fa izay mampibebaka ny mpanota hiala amin’ny làlan’ny fahadisoany dia hamonjy fanahy tsy ho faty sady hanarona heloka be.
  '3':
  - type: text
    content: 'Ny volamena sy ny volafotsinareo dia efa harafesina; ary ny harafesiny dia ho vavolombelona hiampanga anareo sady handany ny nofonareo tahaka ny afo. Efa namory harena amin’ny andro farany hianareo. '
  '4':
  - type: text
    content: 'Indro, ny karaman’ny mpiasa nijinja ny taninareo, izay hazoninareo, dia mitaraina; ary ny fitarainan’ny mpijinja dia efa tafiditra amin’ny sofin’ny Tompon’ny maro. '
  '5':
  - type: text
    content: 'Efa velona tamin’ny fy tetỳ ambonin’ny tany hianareo sady nanaram-po tamin’ny fahafinaretana; efa namahy ny fonareo tamin’ny andro hamonoana hianareo. '
  '6':
  - type: text
    content: Efa nanameloka namono ny marina
  - type: note
    content: 'Na: Ilay marina .... Izy.'
  - type: text
    content: ' hianareo; fa tsy manohitra anareo izy.'
  - type: note
    content: 'Na: Ilay marina .... Izy.'
  - type: heading
    content: Toky ho an’ny Kristiana azom-pahoriana, sy anatra samy hafa.
  '7':
  - type: text
    content: 'ARY amin’izany dia mahareta tsara, ry rahalahy, mandra-pihavin’ny Tompo. Indro, ny mpiasa tany miandry ny voka-tsoa amin’ny tany ka maharitra amin’izany mandra-pahazony ny ranonorana aloha sy aoriana. '
  '8':
  - type: text
    content: Mahareta koa hianareo, mampahereza ny fonareo, fa efa mby akaiky ny fihavian’ny Tompo.
  '9':
  - type: text
    content: 'Aza mifampimonomonona, ry rahalahy, fandrao hohelohina hianareo; indro, ny Mpitsara efa mitsangana eo anoloan’ny varavarana. '
