document_id: PSA.65,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny ataony, fa indrindra noho ny anomezany ny vokatry ny tany.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida. Tonon-kira.
  - type: text
    content: 'HO anao ny fanginana '
  - type: text
    content: sy
  - type: text
    content: ' ny fiderana,'
  - type: note
    content: 'Na: Ny fiononana dia fiderana ankasitrahanao.'
  - type: text
    content: Andriamanitra any Ziona ô,
  - type: text
    content: Ary aminao no anefana ny voady.
  '10':
  - type: text
    content: Mahampoka ny tany voasa Hianao ka mampiravona azy;
  - type: text
    content: Ranonorana mivatravatra no amontosanao azy;
  - type: text
    content: Mitahy ny fitsimohany Hianao.
  '11':
  - type: text
    content: Satrohanao voninahitra ny taona fitahianao;
  - type: text
    content: Ary ny dianao mitete menaka.
  '12':
  - type: text
    content: Vonton-drano ny fiandrasana ondry any an-efitra,
  - type: text
    content: Ary misikina fifaliana ny havoana.
  '13':
  - type: text
    content: Rakotra ondry ny saha;
  - type: text
    content: 'Ary voasarona vary ny lohasaha:'
  - type: text
    content: Mihoby izy, eny, mihira koa.
  '2':
  - type: text
    content: Ry Mpihaino vavaka ô,
  - type: text
    content: Hianao no hohatonin’ny nofo rehetra.
  '3':
  - type: text
    content: Ny zava-mahameloka ahy dia mihoatra noho izay zakako;
  - type: text
    content: Nefa Hianao no mamela ny fahadisoanay.
  '4':
  - type: text
    content: Sambatra izay fidinao ka ampanatoninao hitoetra eo an-kianjanao;
  - type: text
    content: Te-ho voky ny zava-tsoa ao amin’ny tranonao izahay, dia ny zava-masina ao amin’ny tempolinao.
  '5':
  - type: text
    content: Zava-mahatahotra no ataonao amin’ny fahamarinana ho valin’
  - type: text
    content: ny vavakay,
  - type: text
    content: Ry Andriamanitry ny famonjena anay ô,
  - type: text
    content: Ry tokin’ny faran’ny tany rehetra sy ny ranomasina eny lavitra eny.
  '6':
  - type: text
    content: Mampiorina ny tendrombohitra amin’ny heriny Izy,
  - type: text
    content: Misikina fahatanjahana Izy.
  '7':
  - type: text
    content: Mampitsahatra ny firohondrohon’ny onjan-dranomasina Izy
  - type: text
    content: Sy ny fitabataban’ny firenena.
  '8':
  - type: text
    content: Dia matahotra noho ny famantaranao ny mponina any am-paran’ny tany;
  - type: text
    content: Ny any amin’ny fiposahan’ny maraina sy ny hariva no ampihobinao.
  '9':
  - type: text
    content: Mamangy ny tany Hianao ka mahamando azy;
  - type: text
    content: Mampahavokatra azy betsaka Hianao–
  - type: text
    content: Ny onin’Andriamanitra dia tondra-drano–
  - type: text
    content: Mamboatra vary ho an’ny olona Hianao;
  - type: text
    content: Fa izany no famboatrao ny tany.
