document_id: PSA.65
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiderana an’Andriamanitra noho ny ataony, fa indrindra noho ny anomezany ny vokatry ny tany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida. Tonon-kira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'HO anao ny fanginana '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sy
  - type: text
    text: ' ny fiderana,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fiononana dia fiderana ankasitrahanao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra any Ziona ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aminao no anefana ny voady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ry Mpihaino vavaka ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao no hohatonin’ny nofo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny zava-mahameloka ahy dia mihoatra noho izay zakako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa Hianao no mamela ny fahadisoanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sambatra izay fidinao ka ampanatoninao hitoetra eo an-kianjanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te-ho voky ny zava-tsoa ao amin’ny tranonao izahay, dia ny zava-masina ao amin’ny tempolinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Zava-mahatahotra no ataonao amin’ny fahamarinana ho valin’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny vavakay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Andriamanitry ny famonjena anay ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry tokin’ny faran’ny tany rehetra sy ny ranomasina eny lavitra eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mampiorina ny tendrombohitra amin’ny heriny Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misikina fahatanjahana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mampitsahatra ny firohondrohon’ny onjan-dranomasina Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fitabataban’ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia matahotra noho ny famantaranao ny mponina any am-paran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny any amin’ny fiposahan’ny maraina sy ny hariva no ampihobinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mamangy ny tany Hianao ka mahamando azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampahavokatra azy betsaka Hianao–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny onin’Andriamanitra dia tondra-drano–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamboatra vary ho an’ny olona Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izany no famboatrao ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahampoka ny tany voasa Hianao ka mampiravona azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ranonorana mivatravatra no amontosanao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitahy ny fitsimohany Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Satrohanao voninahitra ny taona fitahianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny dianao mitete menaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vonton-drano ny fiandrasana ondry any an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misikina fifaliana ny havoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rakotra ondry ny saha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary voasarona vary ny lohasaha:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihoby izy, eny, mihira koa.
