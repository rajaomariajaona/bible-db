  - type: text
    text: 'Ary hoy Jesosy taminy: Mandehana hianao, ny finoanao no efa namonjy anao. Dia nahiratra niaraka tamin’izay ny masony, ka nanaraka an’i Jesosy teny an-dàlana izy.'
