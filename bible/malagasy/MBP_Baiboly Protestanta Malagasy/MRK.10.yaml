document_id: MRK.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nankanesan’i Jesosy tany an-dafin’i Jordana, sy ny namaliany ny fanontanian’ny Fariseo ny amin’ny fisaoram-bady.
  - type: heading
    content: Mat. 19.1-12.
  - type: text
    content: ARY niainga niala teo Jesosy, dia tonga tany amin’ny sisin-tanin’i Jodia sy tany an-dafin’i Jordana; ary nisy vahoaka betsaka indray niangona teo aminy; koa araka ny fanaony dia nampianatra azy indray Izy.
  '10':
  - type: text
    content: 'Ary nony mby tao an-trano, dia nanontany ny amin’izany koa ny mpianatra. '
  '11':
  - type: text
    content: 'Ary hoy izy taminy: Na zovy na zovy no misao-bady ka mampakatra vehivavy hafa, dia mijangajanga ka manala-baraka ny vadiny.'
  - type: note
    content: 'Na: mijangajanga mandika ny lalàn’ny fanambadiana ny amin’ny vadiny.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Ary raha ravehivavy kosa no misaotra ny lahy ka manambady olon-kafa, dia mijangajanga izy.
  - type: heading
    content: Ny nitondrana zaza ho eo amin’i Jesosy.
  - type: heading
    content: Mat. 19.13-15; Lio. 18.15-17.
  '13':
  - type: text
    content: 'ARY nisy nitondra zazakely ho eo aminy mba hametrahany tànana; fa ny mpianany niteny mafy ireny. '
  '14':
  - type: text
    content: 'Nefa tezitra Jesosy, raha nahita '
  - type: text
    content: izany,
  - type: text
    content: ' ka hoy Izy taminy: Avelao ny zaza hanatona Ahy, ary aza rarana; fa an’ny toa azy ny fanjakan’Andriamanitra. '
  '15':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no tsy handray ny fanjakan’Andriamanitra tahaka ny zaza, dia tsy ho tafiditra aminy akory. '
  '16':
  - type: text
    content: Ary nitrotro azy Izy, dia nametra-tànana taminy ka nitso-drano azy.
  - type: heading
    content: Ny namalian’i Jesosy ny fanontanian’ny mpanan-karena anankiray, sy ny resaka nataony tamin’ny mpianany, rehefa lasa ralehilahy.
  - type: heading
    content: Mat. 19.16-30; Lio. 18.18-30.
  '17':
  - type: text
    content: 'ARY nony vao nivoaka nankeny an-dàlana Jesosy, dia nisy olona anankiray nihazakazaka nanatona ka nandohalika teo anatrehany ary nanontany Azy hoe: Mpampianatra tsara ô, inona no hataoko handovako fiainana mandrakizay? '
  '18':
  - type: text
    content: 'Ary hoy Jesosy taminy: Nahoana Aho no ataonao hoe tsara? Tsy misy tsara afa-tsy Iray ihany, dia Andriamanitra. '
  '19':
  - type: text
    content: 'Fantatrao ny didy hoe: ,,Aza mamono olona, Aza mijangajanga, Aza mangalatra, Aza mety ho vavolombelona mandainga,’’ Aza manambaka, „Manajà ny rainao sy ny reninao” (Eks. 20.12–17). '
  '2':
  - type: text
    content: 'Ary nisy Fariseo nanatona Azy, dia naka fanahy Azy ka nanontany hoe: Mahazo misao-bady va ny lehilahy? '
  '20':
  - type: text
    content: 'Ary hoy izy taminy: Mpampianatra ô, izany rehetra izany efa notandremako hatry ny fony aho mbola kely.'
  '21':
  - type: text
    content: 'Ary Jesosy nijery azy tsara, dia tia azy ka nanao taminy hoe: Diso zavatra iray loha hianao; mandehana, amidio izay rehetra anananao ka omeo ny malahelo, dia hanana rakitra any an-danitra hianao; ary avia hanaraka Ahy. '
  '22':
  - type: text
    content: Dia nanjombona terỳ ny tarehiny tamin’izany teny izany, ka niala tamin’alahelo izy, satria nanana harena be.
  '23':
  - type: text
    content: 'Ary Jesosy nijery manodidina ka nanao tamin’ny mpianany hoe: Manao ahoana ny hasarotry ny hidiran’ny manan-karena amin’ny fanjakan’Andriamanitra! '
  '24':
  - type: text
    content: 'Ary ny mpianatra dia gaga tamin’ny teniny. Fa Jesosy namaly indray ka nanao taminy hoe: Anaka, manao ahoana ny hasarotry ny hidiran’ny matoky ny harena amin’ny fanjakan’Andriamanitra! '
  '25':
  - type: text
    content: 'Moramora kokoa ny hidiran’ny rameva amin’ny vodi-fanjaitra noho ny hidiran’ny manan-karena amin’ny fanjakan’Andriamanitra. '
  '26':
  - type: text
    content: Dia talanjona indrindra izy ka nanao taminy
  - type: note
    content: 'Na: [nifampilaza].'
  - type: text
    content: ' hoe: Iza indray no azo hovonjena? '
  '27':
  - type: text
    content: 'Fa Jesosy nijery azy ka nanao hoe: Raha amin’ny olona, dia zavatra tsy hainy izany; fa tsy mba tahaka izany amin’Andriamanitra; fa ny zavatra rehetra dia hain’Andriamanitra.'
  '28':
  - type: text
    content: 'Ary hoy Petera taminy: Indro, izahay efa nahafoy ny zavatra rehetra ka nanaraka Anao. '
  '29':
  - type: text
    content: 'Hoy Jesosy: Lazaiko aminareo marina tokoa: Tsy misy olona efa nahafoy trano, na rahalahy, na anabavy, na reny, na ray, na zanaka, na tany, noho ny amiko sy ny filazantsara, '
  '3':
  - type: text
    content: 'Ary Izy namaly ka nanao taminy hoe: Ahoana no nandidian’i Mosesy anareo? '
  '30':
  - type: text
    content: 'ka tsy handray zato heny amin’izao andro ankehitriny izao–dia trano sy rahalahy sy anabavy sy reny sy zanaka sy tany mbamin’ny fanenjehana–ary amin’ny andro ho avy dia fiainana mandrakizay. '
  '31':
  - type: text
    content: Nefa maro izay voalohany no ho farany, ary izay farany no ho voalohany.
  - type: heading
    content: Ny nilazan’i Jesosy fanintelony ny hiaretany.
  - type: heading
    content: Mat. 20.17-19; Lio. 18.31-34.
  '32':
  - type: text
    content: ARY Jesosy sy ny mpianany dia teny an-dàlana niakatra ho any Jerosalema, ary Jesosy nandeha eo alohany; dia gaga ny mpianany, ary izay nanaraka Azy dia natahotra.
  - type: text
    content: 'Ary naka ny roa ambin’ny folo lahy indray Izy, dia nilaza taminy izay efa hanjo Azy '
  '33':
  - type: text
    content: 'ka nanao hoe: Indro, miakatra ho any Jerosalema isika; ary ny Zanak’olona hatolotra ho amin’ireo lohan’ny mpisorona sy mpanora-dalàna; ary hohelohiny ho faty Izy ka hatolony amin’ny jentilisa; '
  '34':
  - type: text
    content: ary hanao Azy ho fihomehezana ireny sy handrora Azy sy hikapoka Azy ary hahafaty Azy; fa rehefa afaka hate-loana, dia hitsangana indray Izy.
  - type: heading
    content: Ny fangatahana nataon’i Jakoba sy Jaona, ary ny navalin’i Jesosy azy.
  - type: heading
    content: Mat. 20.20-28.
  '35':
  - type: text
    content: 'ARY Jakoba sy Jaona, zanak’i Zebedio, nanatona an’i Jesosy ka nanao taminy hoe: Mpampianatra ò, tianay mba hataonao aminay izay angatahinay aminao. '
  '36':
  - type: text
    content: 'Ary hoy Izy taminy: Inona moa no tianareo hataoko aminareo? '
  '37':
  - type: text
    content: 'Dia hoy izy mirahalahy taminy: Mba ekeo ny hipetrahanay, ny anankiray ho eo amin’ny an-kavananao, ary ny anankiray ho eo amin’ny an-kavianao, any amin’ny voninahitrao.'
  '38':
  - type: text
    content: 'Fa hoy Jesosy taminy: Tsy fantatrareo izay angatahinareo; hainareo va ny hisotro amin’ny kapoaka izay sotroiko, na ny hatao batisa amin’ny batisa izay anaovana Ahy batisa? '
  '39':
  - type: text
    content: 'Dia hoy izy mirahalahy taminy: Hainay ihany. Ary hoy Jesosy taminy: Raha ny kapoaka izay sotroiko, dia hosotroinareo ihany, ary ny batisa izay anaovana Ahy batisa dia hanaovana anareo ihany; '
  '4':
  - type: text
    content: 'Ary hoy izy: Navelan’i Mosesy hanoratra taratasy fisaoram-bady ny lehilahy ka hisao-bady (Deo. 24.1).'
  '40':
  - type: text
    content: 'fa ny hipetraka eo an-tànako ankavanana na eo an-tànako ankavia kosa, dia tsy Ahy ny hanome izany, fa izay nanamboarana izany '
  - type: text
    content: no homena.
  '41':
  - type: text
    content: 'Ary nony nandre izany izy folo lahy, dia tezitra noho ny nataon’i Jakoba sy Jaona izy. '
  '42':
  - type: text
    content: 'Fa Jesosy niantso azy hanatona Azy ka nanao taminy hoe: Fantatrareo fa izay eken’ny jentilisa ho mpanapaka dia mampanompo azy, ary ny lehibeny dia mifehy azy. '
  '43':
  - type: text
    content: 'Fa tsy mba toy izany aminareo; fa na iza na iza no te-ho lehibe eo aminareo, dia ho mpanompo anareo izy. '
  '44':
  - type: text
    content: 'Ary na iza na iza no te-ho ambony eo aminareo, dia ho mpanompon’izy rehetra. '
  '45':
  - type: text
    content: Fa ny Zanak’olona tsy tonga mba hotompoina, fa mba hanompo ka hanolotra ny ainy ho avotra hisolo ny maro.
  - type: heading
    content: Ny nampahiratan’i Jesosy an’i Bartimeo jamba tao akaikin’i Jeriko.
  - type: heading
    content: Mat. 20.29-34; Lio. 18.35-43.
  '46':
  - type: text
    content: 'ARY tonga tao Jeriko izy; ary raha vao niala tao Jeriko Jesosy mbamin’ny mpianany sy ny vahoaka betsaka, dia nipetraka teo amoron-dàlana Bartimeo jamba mpangataka, zanak’i Timeo. '
  '47':
  - type: text
    content: 'Ary nony reny fa, injay! Jesosy avy any Nazareta, dia niantso izy ka nanao hoe: Ry Jesosy, Zanak’i Davida ô, mamindrà fo amiko! '
  '48':
  - type: text
    content: 'Ary maro no niteny mafy azy mba hangina; fa vao mainka niantsoantso izy ka nanao hoe: Ry Zanak’i Davida ô, mamindrà fo amiko. '
  '49':
  - type: text
    content: 'Ary Jesosy nijanona, dia nanao hoe: Antsoy ilay jamba. Ary ny olona niantso azy ka nanao taminy hoe: Matokia, mitsangàna, miantso anao Izy. '
  '5':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ny hamafin’ny fonareo no nanoratany izany didy izany ho anareo; '
  '50':
  - type: text
    content: 'Dia nanary ny lambany izy ka niantsambotra nankeo amin’i Jesosy. '
  '51':
  - type: text
    content: 'Ary Jesosy namaly azy hoe: Inona no tianao hataoko aminao? Ary hoy ilay jamba taminy: Rabôny ô, ny mba hampahiratina ny masoko. '
  '52':
  - type: text
    content: 'Ary hoy Jesosy taminy: Mandehana hianao, ny finoanao no efa namonjy anao. Dia nahiratra niaraka tamin’izay ny masony, ka nanaraka an’i Jesosy teny an-dàlana izy.'
  '6':
  - type: text
    content: 'fa hatramin’ny fony vao nanaovana izao tontolo izao dia lahy sy vavy no nanaovany ny olona (Gen. 1.27). '
  '7':
  - type: text
    content: ',,Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin’ny vadiny; '
  '8':
  - type: text
    content: 'ary ho nofo iray izy roroa’’ (Gen. 2.24). ka dia tsy ho roa intsony izy, fa ho nofo iray ihany. '
  '9':
  - type: text
    content: Koa izay nakamban’Andriamanitra dia aoka tsy hampisarahin’olona.
