document_id: MRK.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nankanesan’i Jesosy tany an-dafin’i Jordana, sy ny namaliany ny fanontanian’ny Fariseo ny amin’ny fisaoram-bady.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 19.1-12.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY niainga niala teo Jesosy, dia tonga tany amin’ny sisin-tanin’i Jodia sy tany an-dafin’i Jordana; ary nisy vahoaka betsaka indray niangona teo aminy; koa araka ny fanaony dia nampianatra azy indray Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy Fariseo nanatona Azy, dia naka fanahy Azy ka nanontany hoe: Mahazo misao-bady va ny lehilahy? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Izy namaly ka nanao taminy hoe: Ahoana no nandidian’i Mosesy anareo? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy izy: Navelan’i Mosesy hanoratra taratasy fisaoram-bady ny lehilahy ka hisao-bady (Deo. 24.1).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ny hamafin’ny fonareo no nanoratany izany didy izany ho anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa hatramin’ny fony vao nanaovana izao tontolo izao dia lahy sy vavy no nanaovany ny olona (Gen. 1.27). '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ',,Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin’ny vadiny; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary ho nofo iray izy roroa’’ (Gen. 2.24). ka dia tsy ho roa intsony izy, fa ho nofo iray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa izay nakamban’Andriamanitra dia aoka tsy hampisarahin’olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nony mby tao an-trano, dia nanontany ny amin’izany koa ny mpianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy taminy: Na zovy na zovy no misao-bady ka mampakatra vehivavy hafa, dia mijangajanga ka manala-baraka ny vadiny.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mijangajanga mandika ny lalàn’ny fanambadiana ny amin’ny vadiny.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary raha ravehivavy kosa no misaotra ny lahy ka manambady olon-kafa, dia mijangajanga izy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitondrana zaza ho eo amin’i Jesosy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 19.13-15; Lio. 18.15-17.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ARY nisy nitondra zazakely ho eo aminy mba hametrahany tànana; fa ny mpianany niteny mafy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa tezitra Jesosy, raha nahita '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izany,
  - type: text
    text: ' ka hoy Izy taminy: Avelao ny zaza hanatona Ahy, ary aza rarana; fa an’ny toa azy ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no tsy handray ny fanjakan’Andriamanitra tahaka ny zaza, dia tsy ho tafiditra aminy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nitrotro azy Izy, dia nametra-tànana taminy ka nitso-drano azy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namalian’i Jesosy ny fanontanian’ny mpanan-karena anankiray, sy ny resaka nataony tamin’ny mpianany, rehefa lasa ralehilahy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 19.16-30; Lio. 18.18-30.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ARY nony vao nivoaka nankeny an-dàlana Jesosy, dia nisy olona anankiray nihazakazaka nanatona ka nandohalika teo anatrehany ary nanontany Azy hoe: Mpampianatra tsara ô, inona no hataoko handovako fiainana mandrakizay? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Jesosy taminy: Nahoana Aho no ataonao hoe tsara? Tsy misy tsara afa-tsy Iray ihany, dia Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fantatrao ny didy hoe: ,,Aza mamono olona, Aza mijangajanga, Aza mangalatra, Aza mety ho vavolombelona mandainga,’’ Aza manambaka, „Manajà ny rainao sy ny reninao” (Eks. 20.12–17). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy izy taminy: Mpampianatra ô, izany rehetra izany efa notandremako hatry ny fony aho mbola kely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Jesosy nijery azy tsara, dia tia azy ka nanao taminy hoe: Diso zavatra iray loha hianao; mandehana, amidio izay rehetra anananao ka omeo ny malahelo, dia hanana rakitra any an-danitra hianao; ary avia hanaraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nanjombona terỳ ny tarehiny tamin’izany teny izany, ka niala tamin’alahelo izy, satria nanana harena be.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Jesosy nijery manodidina ka nanao tamin’ny mpianany hoe: Manao ahoana ny hasarotry ny hidiran’ny manan-karena amin’ny fanjakan’Andriamanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny mpianatra dia gaga tamin’ny teniny. Fa Jesosy namaly indray ka nanao taminy hoe: Anaka, manao ahoana ny hasarotry ny hidiran’ny matoky ny harena amin’ny fanjakan’Andriamanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moramora kokoa ny hidiran’ny rameva amin’ny vodi-fanjaitra noho ny hidiran’ny manan-karena amin’ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia talanjona indrindra izy ka nanao taminy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[nifampilaza].'
    marker-yv: yv-n
  - type: text
    text: ' hoe: Iza indray no azo hovonjena? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa Jesosy nijery azy ka nanao hoe: Raha amin’ny olona, dia zavatra tsy hainy izany; fa tsy mba tahaka izany amin’Andriamanitra; fa ny zavatra rehetra dia hain’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy Petera taminy: Indro, izahay efa nahafoy ny zavatra rehetra ka nanaraka Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hoy Jesosy: Lazaiko aminareo marina tokoa: Tsy misy olona efa nahafoy trano, na rahalahy, na anabavy, na reny, na ray, na zanaka, na tany, noho ny amiko sy ny filazantsara, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ka tsy handray zato heny amin’izao andro ankehitriny izao–dia trano sy rahalahy sy anabavy sy reny sy zanaka sy tany mbamin’ny fanenjehana–ary amin’ny andro ho avy dia fiainana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nefa maro izay voalohany no ho farany, ary izay farany no ho voalohany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nilazan’i Jesosy fanintelony ny hiaretany.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 20.17-19; Lio. 18.31-34.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ARY Jesosy sy ny mpianany dia teny an-dàlana niakatra ho any Jerosalema, ary Jesosy nandeha eo alohany; dia gaga ny mpianany, ary izay nanaraka Azy dia natahotra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary naka ny roa ambin’ny folo lahy indray Izy, dia nilaza taminy izay efa hanjo Azy '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ka nanao hoe: Indro, miakatra ho any Jerosalema isika; ary ny Zanak’olona hatolotra ho amin’ireo lohan’ny mpisorona sy mpanora-dalàna; ary hohelohiny ho faty Izy ka hatolony amin’ny jentilisa; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ary hanao Azy ho fihomehezana ireny sy handrora Azy sy hikapoka Azy ary hahafaty Azy; fa rehefa afaka hate-loana, dia hitsangana indray Izy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fangatahana nataon’i Jakoba sy Jaona, ary ny navalin’i Jesosy azy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 20.20-28.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ARY Jakoba sy Jaona, zanak’i Zebedio, nanatona an’i Jesosy ka nanao taminy hoe: Mpampianatra ò, tianay mba hataonao aminay izay angatahinay aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy Izy taminy: Inona moa no tianareo hataoko aminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia hoy izy mirahalahy taminy: Mba ekeo ny hipetrahanay, ny anankiray ho eo amin’ny an-kavananao, ary ny anankiray ho eo amin’ny an-kavianao, any amin’ny voninahitrao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa hoy Jesosy taminy: Tsy fantatrareo izay angatahinareo; hainareo va ny hisotro amin’ny kapoaka izay sotroiko, na ny hatao batisa amin’ny batisa izay anaovana Ahy batisa? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hoy izy mirahalahy taminy: Hainay ihany. Ary hoy Jesosy taminy: Raha ny kapoaka izay sotroiko, dia hosotroinareo ihany, ary ny batisa izay anaovana Ahy batisa dia hanaovana anareo ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'fa ny hipetraka eo an-tànako ankavanana na eo an-tànako ankavia kosa, dia tsy Ahy ny hanome izany, fa izay nanamboarana izany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: no homena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nony nandre izany izy folo lahy, dia tezitra noho ny nataon’i Jakoba sy Jaona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa Jesosy niantso azy hanatona Azy ka nanao taminy hoe: Fantatrareo fa izay eken’ny jentilisa ho mpanapaka dia mampanompo azy, ary ny lehibeny dia mifehy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa tsy mba toy izany aminareo; fa na iza na iza no te-ho lehibe eo aminareo, dia ho mpanompo anareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary na iza na iza no te-ho ambony eo aminareo, dia ho mpanompon’izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Fa ny Zanak’olona tsy tonga mba hotompoina, fa mba hanompo ka hanolotra ny ainy ho avotra hisolo ny maro.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampahiratan’i Jesosy an’i Bartimeo jamba tao akaikin’i Jeriko.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 20.29-34; Lio. 18.35-43.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'ARY tonga tao Jeriko izy; ary raha vao niala tao Jeriko Jesosy mbamin’ny mpianany sy ny vahoaka betsaka, dia nipetraka teo amoron-dàlana Bartimeo jamba mpangataka, zanak’i Timeo. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary nony reny fa, injay! Jesosy avy any Nazareta, dia niantso izy ka nanao hoe: Ry Jesosy, Zanak’i Davida ô, mamindrà fo amiko! '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary maro no niteny mafy azy mba hangina; fa vao mainka niantsoantso izy ka nanao hoe: Ry Zanak’i Davida ô, mamindrà fo amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary Jesosy nijanona, dia nanao hoe: Antsoy ilay jamba. Ary ny olona niantso azy ka nanao taminy hoe: Matokia, mitsangàna, miantso anao Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia nanary ny lambany izy ka niantsambotra nankeo amin’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary Jesosy namaly azy hoe: Inona no tianao hataoko aminao? Ary hoy ilay jamba taminy: Rabôny ô, ny mba hampahiratina ny masoko. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
