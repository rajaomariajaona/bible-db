document_id: JER.33,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny anankiray koa ny amin’ny mbola hampodiana ny Isiraely sy ny voninahitra mbola ho azony.
  - type: text
    content: 'ARY tonga fanindroany tamin’i Jeremia ny tenin’i Jehovah, raha mbola voahazona teo an-kianjan’ny trano fiambenana ihany izy, nanao hoe:'
  '10':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Mbola ho re indray eto amin’ity tany ity,
  - type: text
    content: Izay ataonareo hoe Rava, ka tsy misy olona na biby fiompy intsony–
  - type: text
    content: Dia eto amin’ny tanànan’ny Joda sy ao amin’ny làlamben’i Jerosalema izay efa lao,
  - type: text
    content: Ka tsy misy olona na mponina na biby fiompy–
  '11':
  - type: text
    content: Ny feo mifaly sy ny feo miravoravo,
  - type: text
    content: Dia ny feon’ny mpampakatra sy ny feon’ny ampakarina
  - type: text
    content: 'Ary ny feon’izay manao hoe:'
  - type: text
    content: Miderà an’i Jehovah, Tompon’ny maro, fa tsara Izy,
  - type: text
    content: Fa mandrakizay ny famindrampony,
  - type: text
    content: Dia izay mitondra fanati-pisaorana ho ao an-tranon’i Jehovah;
  - type: text
    content: Fa hataoko tonga tahaka ny tany aloha ny fahatsarany,
  - type: note
    content: Heb. hampodiko avy amin’ny fahababoana.
  - type: text
    content: ' hoy Jehovah.'
  '12':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Eto amin’ity tany efa lao tsy misy olona na biby fiompy ity
  - type: text
    content: Sy amin’ny tanànany rehetra
  - type: text
    content: Dia mbola hisy fonenan’ny mpiandry ondry
  - type: text
    content: Hampandriany ny ondry aman-osiny,
  '13':
  - type: text
    content: Dia amin’ny tanàna any amin’ny tany havoana
  - type: text
    content: Sy amin’ny tanàna any amin’ny tany lemaka amoron-tsiraka,
  - type: note
    content: Heb. Sefela.
  - type: text
    content: Ary amin’ny tanàna any amin’ny tany atsimo
  - type: text
    content: Sy amin’ny tanin’i Benjamina
  - type: text
    content: Sy amin’ny manodidina an’i Jerosalema
  - type: text
    content: Ary amin’ny tanànan’ny Joda,
  - type: text
    content: Ary ny ondry aman-osy mbola handroso araka ny fitondran’ny mpanisa azy, hoy Jehovah.
  '14':
  - type: text
    content: Indro, avy ny andro, hoy Jehovah,
  - type: text
    content: Izay hanatanterahako ny teny soa,
  - type: text
    content: Izay nolazaiko ny amin’ny taranak’Isiraely sy ny taranak’i Joda.
  '15':
  - type: text
    content: Amin’izany andro izany sy amin’izany fotoana izany
  - type: text
    content: Dia hampaniry Rantsana
  - type: note
    content: 'Na: Solofo.'
  - type: text
    content: ' marina ho an’i Davida Aho;'
  - type: text
    content: Ary hanao fitsarana sy fahamarinana amin’ny tany Izy.
  '16':
  - type: text
    content: Amin’izany andro izany dia hovonjena ny Joda,
  - type: text
    content: Ary Jerosalema handry fahizay;
  - type: text
    content: 'Ary izao no hanononana azy:'
  - type: text
    content: Jehovah Fahamarinantsika.
  '17':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Davida tsy ho diso zanakalahy
  - type: text
    content: Hipetraka eo amin’ny seza fiandrianan’ny taranak’Isiraely;
  '18':
  - type: text
    content: Ary ny Levita mpisorona tsy ho diso zanakalahy ho eo anatrehako,
  - type: text
    content: Mba hanaterany mandrakariva fanatitra dorana sy fanatitra hohanina
  - type: note
    content: 'Na: sy handoroany fantitra hohanina.'
  - type: text
    content: Ary fanatitra hafa alatsa-dra.
  '19':
  - type: text
    content: 'Ary tonga tamin’i Jeremia ny tenin’i Jehovah nanao hoe:'
  '2':
  - type: text
    content: Izao no lazain’i Jehovah, Mpanao izany,
  - type: text
    content: Dia Jehovah Izay namorona izany mba hampitoetra azy;
  - type: text
    content: Jehovah no anarany;
  '20':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Raha mahafoana ny fanekeko ny amin’ny andro sy ny fanekeko ny amin’ny alina hianareo,
  - type: text
    content: Mba tsy hisy andro sy alina amin’ny fotoany,
  '21':
  - type: text
    content: Dia ho azo foanana koa ny fanekeko tamin’i Davida mpanompoko,
  - type: text
    content: Tsy hananany zanakalahy hanjaka eo amin’ny seza fiandrianany,
  - type: text
    content: Sy ny amin’ny Levita mpisorona, mpanompoko.
  '22':
  - type: text
    content: Toy ny hamaroan’ny kintana eny amin’ny lanitra, izay tsy azo isaina,
  - type: text
    content: Ary toy ny fasika any amin’ny ranomasina, izay tsy azo afatra,
  - type: text
    content: Dia toy izany no hanamaroako ny taranak’i Davida mpanompoko
  - type: text
    content: Sy ny Levita, izay manao fanompoam-pivavahana ho Ahy.
  '23':
  - type: text
    content: 'Ary tonga tamin’i Jeremia ny tenin’i Jehovah nanao hoe:'
  '24':
  - type: text
    content: 'Tsy hitanao va izay nolazain’ity firenena ity hoe:'
  - type: text
    content: Ny fianakaviana roa izay nofidin’i Jehovah dia efa nariany;
  - type: text
    content: Toy izany no anamavoany ny oloko,
  - type: text
    content: Ka dia tsy vanon-ko firenena eo imasony intsony izy.
  '25':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Raha tsy amin’ny andro sy ny alina ny fanekeko,
  - type: text
    content: Ary raha tsy notendreko ny lalàna fitondrana ny lanitra sy ny tany,
  '26':
  - type: text
    content: Dia hariako ny taranak’i Jakoba sy Davida mpanompoko,
  - type: text
    content: Ka ny taranany tsy mba hanalako ho mpanapaka ny taranak’i Abrahama sy Isaka ary Jakoba;
  - type: text
    content: Fa hampodiko avy amin’ny fahababoana izy ka hamindrako fo.
  '3':
  - type: text
    content: Antsoy Aho, dia hovaliako hianao
  - type: text
    content: Ka hampisehoako zavatra lehibe sy saro-pantarina izay tsy fantatrao.
  '4':
  - type: text
    content: Fa izao no lazain’i Jehovah, Andriamanitry ny Isiraely;
  - type: text
    content: Ny amin’ny trano amin’ity tanàna ity
  - type: text
    content: Sy ny amin’ny lapan’ny mpanjakan’ny Joda,
  - type: text
    content: Izay noravana noho ny tovon-tany sy ny sabatra,
  '5':
  - type: text
    content: Raha mandroso hiady amin’ny Kaldeana izy
  - type: text
    content: Ka mameno ny trano amin’ny fatin’olona,
  - type: text
    content: Izay novonoiko tamin’ny fahatezerako sy ny fahavinirako,
  - type: text
    content: Sady nanafenako ny tavako tamin’ity tanàna ity noho ny faharatsiany rehetra.
  '6':
  - type: text
    content: Dia, indro, hotanterahiko tokoa ny fanasitranana azy, eny, hositraniko izy,
  - type: text
    content: Ary hasehoko aminy ny haren’ny fiadanana sy ny fahamarinana.
  '7':
  - type: text
    content: Ary ny Joda sy ny Isiraely dia hampodiko avy amin’ny fahababoany,
  - type: text
    content: Ka haoriko ho toy ny taloha izy.
  '8':
  - type: text
    content: Ary hodioviko ho afaka amin’ny helony rehetra izy,
  - type: text
    content: Izay nanotany tamiko;
  - type: text
    content: Ka havelako ny helony rehetra,
  - type: text
    content: Izay nanotany sy niodinany tamiko.
  '9':
  - type: text
    content: Ary ho anarana mahafaly Ahy izany
  - type: text
    content: Sady ho dera sy voninahitra ho an’ny firenena rehetra ambonin’ny tany,
  - type: text
    content: Izay handre ny soa rehetra ataoko aminy;
  - type: text
    content: Dia hatahotra sy hangovitra izy noho ny soa rehetra
  - type: text
    content: Sy noho ny fiadanana rehetra izay hataoko aminy.
