document_id: JER.33
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Teny anankiray koa ny amin’ny mbola hampodiana ny Isiraely sy ny voninahitra mbola ho azony.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga fanindroany tamin’i Jeremia ny tenin’i Jehovah, raha mbola voahazona teo an-kianjan’ny trano fiambenana ihany izy, nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izao no lazain’i Jehovah, Mpanao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Jehovah Izay namorona izany mba hampitoetra azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah no anarany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Antsoy Aho, dia hovaliako hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampisehoako zavatra lehibe sy saro-pantarina izay tsy fantatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa izao no lazain’i Jehovah, Andriamanitry ny Isiraely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny amin’ny trano amin’ity tanàna ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny amin’ny lapan’ny mpanjakan’ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay noravana noho ny tovon-tany sy ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha mandroso hiady amin’ny Kaldeana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mameno ny trano amin’ny fatin’olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay novonoiko tamin’ny fahatezerako sy ny fahavinirako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nanafenako ny tavako tamin’ity tanàna ity noho ny faharatsiany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia, indro, hotanterahiko tokoa ny fanasitranana azy, eny, hositraniko izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hasehoko aminy ny haren’ny fiadanana sy ny fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny Joda sy ny Isiraely dia hampodiko avy amin’ny fahababoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka haoriko ho toy ny taloha izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary hodioviko ho afaka amin’ny helony rehetra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nanotany tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka havelako ny helony rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nanotany sy niodinany tamiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ho anarana mahafaly Ahy izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ho dera sy voninahitra ho an’ny firenena rehetra ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay handre ny soa rehetra ataoko aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hatahotra sy hangovitra izy noho ny soa rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy noho ny fiadanana rehetra izay hataoko aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola ho re indray eto amin’ity tany ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay ataonareo hoe Rava, ka tsy misy olona na biby fiompy intsony–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eto amin’ny tanànan’ny Joda sy ao amin’ny làlamben’i Jerosalema izay efa lao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy misy olona na mponina na biby fiompy–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny feo mifaly sy ny feo miravoravo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny feon’ny mpampakatra sy ny feon’ny ampakarina
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny feon’izay manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miderà an’i Jehovah, Tompon’ny maro, fa tsara Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mandrakizay ny famindrampony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay mitondra fanati-pisaorana ho ao an-tranon’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hataoko tonga tahaka ny tany aloha ny fahatsarany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hampodiko avy amin’ny fahababoana.
    marker-yv: yv-n
  - type: text
    text: ' hoy Jehovah.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eto amin’ity tany efa lao tsy misy olona na biby fiompy ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny tanànany rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mbola hisy fonenan’ny mpiandry ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampandriany ny ondry aman-osiny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia amin’ny tanàna any amin’ny tany havoana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny tanàna any amin’ny tany lemaka amoron-tsiraka,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sefela.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny tanàna any amin’ny tany atsimo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny tanin’i Benjamina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny manodidina an’i Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny tanànan’ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ondry aman-osy mbola handroso araka ny fitondran’ny mpanisa azy, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, avy ny andro, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hanatanterahako ny teny soa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nolazaiko ny amin’ny taranak’Isiraely sy ny taranak’i Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Amin’izany andro izany sy amin’izany fotoana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hampaniry Rantsana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solofo.
    marker-yv: yv-n
  - type: text
    text: ' marina ho an’i Davida Aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanao fitsarana sy fahamarinana amin’ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Amin’izany andro izany dia hovonjena ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jerosalema handry fahizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary izao no hanononana azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah Fahamarinantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Davida tsy ho diso zanakalahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hipetraka eo amin’ny seza fiandrianan’ny taranak’Isiraely;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny Levita mpisorona tsy ho diso zanakalahy ho eo anatrehako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanaterany mandrakariva fanatitra dorana sy fanatitra hohanina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sy handoroany fantitra hohanina.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fanatitra hafa alatsa-dra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary tonga tamin’i Jeremia ny tenin’i Jehovah nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mahafoana ny fanekeko ny amin’ny andro sy ny fanekeko ny amin’ny alina hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy hisy andro sy alina amin’ny fotoany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia ho azo foanana koa ny fanekeko tamin’i Davida mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hananany zanakalahy hanjaka eo amin’ny seza fiandrianany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny amin’ny Levita mpisorona, mpanompoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Toy ny hamaroan’ny kintana eny amin’ny lanitra, izay tsy azo isaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny fasika any amin’ny ranomasina, izay tsy azo afatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany no hanamaroako ny taranak’i Davida mpanompoko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny Levita, izay manao fanompoam-pivavahana ho Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary tonga tamin’i Jeremia ny tenin’i Jehovah nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsy hitanao va izay nolazain’ity firenena ity hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fianakaviana roa izay nofidin’i Jehovah dia efa nariany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izany no anamavoany ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy vanon-ko firenena eo imasony intsony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy amin’ny andro sy ny alina ny fanekeko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha tsy notendreko ny lalàna fitondrana ny lanitra sy ny tany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia hariako ny taranak’i Jakoba sy Davida mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ny taranany tsy mba hanalako ho mpanapaka ny taranak’i Abrahama sy Isaka ary Jakoba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hampodiko avy amin’ny fahababoana izy ka hamindrako fo.
