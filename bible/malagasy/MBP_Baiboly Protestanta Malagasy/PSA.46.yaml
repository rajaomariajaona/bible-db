document_id: PSA.46
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fahatokiana an’Andriamanitra fiarovana mafy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Al-alamoth. Tonon-kira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA no aro sy hery ho antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamonjy mora azo indrindra amin’ny fahoriana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa izany no tsy hatahorantsika, na dia ho levona aza ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mifindra ho ao anatin’ny ranomasina aza ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Na mirohondrohona sy misamboaravoara aza ny onjany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka mihorohoro ny tendrombohitra noho ny fisafoakany. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misy ony, koa ny sampany dia mampifaly ny tanànan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fonena-masin’ny Avo Indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andriamanitra no eo afovoany, ka tsy mba hihetsika izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitra no hamonjy azy, rehefa madiva ho maraina ny andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nitabataba ny firenen-tsamy hafa, nikotrankotrana ny fanjakana maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanonona ny feony Izy, ka niempo ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jehovah, Tompon’ny maro, no momba antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitr’i Jakoba no fiarovana avo ho antsika.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avia, jereo ny asan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mahatonga faharavana etỳ an-tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mampitsahatra ady hatramin’ny faran’ny tany Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manapaka ny tsipìka sy manito ny lefona Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mandoro ny sariety amin’ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mitsahara, ka aoka ho fantatrareo fa Izaho no Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisandratra amin’ny firenen-tsamy hafa Aho, hisandratra amin’ny tany Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah, Tompon’ny maro, no momba antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andriamanitr’i Jakoba no aro ho antsika.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
