document_id: PSA.46,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokiana an’Andriamanitra fiarovana mafy.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’ny Koraïta. Al-alamoth. Tonon-kira.
  - type: text
    content: ANDRIAMANITRA no aro sy hery ho antsika;
  - type: text
    content: Mpamonjy mora azo indrindra amin’ny fahoriana Izy.
  '10':
  - type: text
    content: Mitsahara, ka aoka ho fantatrareo fa Izaho no Andriamanitra;
  - type: text
    content: Hisandratra amin’ny firenen-tsamy hafa Aho, hisandratra amin’ny tany Aho.
  '11':
  - type: text
    content: Jehovah, Tompon’ny maro, no momba antsika;
  - type: text
    content: Andriamanitr’i Jakoba no aro ho antsika.
  - type: text
    content: '[Sela.]'
  '2':
  - type: text
    content: Koa izany no tsy hatahorantsika, na dia ho levona aza ny tany,
  - type: text
    content: Na mifindra ho ao anatin’ny ranomasina aza ny tendrombohitra,
  '3':
  - type: text
    content: Na mirohondrohona sy misamboaravoara aza ny onjany,
  - type: text
    content: 'Ka mihorohoro ny tendrombohitra noho ny fisafoakany. '
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: Misy ony, koa ny sampany dia mampifaly ny tanànan’Andriamanitra,
  - type: text
    content: Fonena-masin’ny Avo Indrindra.
  '5':
  - type: text
    content: Andriamanitra no eo afovoany, ka tsy mba hihetsika izy;
  - type: text
    content: Andriamanitra no hamonjy azy, rehefa madiva ho maraina ny andro.
  '6':
  - type: text
    content: Nitabataba ny firenen-tsamy hafa, nikotrankotrana ny fanjakana maro;
  - type: text
    content: Nanonona ny feony Izy, ka niempo ny tany.
  '7':
  - type: text
    content: Jehovah, Tompon’ny maro, no momba antsika;
  - type: text
    content: Andriamanitr’i Jakoba no fiarovana avo ho antsika.
  - type: text
    content: '[Sela.]'
  '8':
  - type: text
    content: Avia, jereo ny asan’i Jehovah,
  - type: text
    content: Izay mahatonga faharavana etỳ an-tany.
  '9':
  - type: text
    content: Mampitsahatra ady hatramin’ny faran’ny tany Izy;
  - type: text
    content: Manapaka ny tsipìka sy manito ny lefona Izy
  - type: text
    content: Ary mandoro ny sariety amin’ny afo.
