document_id: 1JN.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahazotoan’ny zanak’Andriamanitra hanao ny sitrapon’ny Rainy sy hifankatia amin’ny namany, ary ny fahatokiana ananany.
  - type: text
    content: ENDREY! manao ahoana ny fitiavana nasehon’
  - type: note
    content: Gr. nomen’.
  - type: text
    content: ' ny Ray ho antsika, dia ny niantsoana antsika hoe zanak’Andriamanitra, sady izany tokoa isika! Koa noho izany dia tsy mahalala antsika izao tontolo izao, satria tsy nahalala Azy izy. '
  '10':
  - type: text
    content: 'Izany no mampiseho miharihary izay Zanak’Andriamanitra sy izay zanaky ny devoly. Tsy mba avy amin’Andriamanitra izay rehetra tsy manao ny marina sy izay tsy tia ny rahalahiny. '
  '11':
  - type: text
    content: 'Fa izao no teny nampitondraina izay efa renareo hatramin’ny voalohany: tsy maintsy mifankatia isika,– '
  '12':
  - type: text
    content: tsy mba tahaka an’i Kaina, izay avy tamin’ilay ratsy ka namono ny rahalahiny. Ary nahoana no namono azy izy? Satria ratsy ny asany, fa marina ny an’ny rahalahiny.
  '13':
  - type: text
    content: 'Aza gaga, ry rahalahy, raha halan’izao tontolo izao hianareo. '
  '14':
  - type: text
    content: 'Fantatsika fa efa tafafindra niala tamin’ny fahafatesana ho amin’ny fiainana isika satria tia ny rahalahy. Izay tsy tia dia mitoetra ao amin’ny fahafatesana ihany. '
  '15':
  - type: text
    content: Izay rehetra mankahala ny rahalahiny dia mpamono olona; ary fantatrareo fa tsy mba misy mpamono olona manana fiainana mandrakizay mitoetra ao anatiny.
  '16':
  - type: text
    content: 'Izao no ahafantarantsika ny fitiavana, satria Izy no nanolotra ny ainy hamonjy antsika; ary isika kosa mba tokony hanolotra ny aintsika hamonjy ny rahalahy. '
  '17':
  - type: text
    content: Ary izay rehetra manam-pananana amin’izao fiainana izao, ary mahita ny fahantran’ny rahalahiny ka mihirim-belona aminy, ahoana no itoeran’ny fitiavana an’Andriamanitra ao anatiny?
  '18':
  - type: text
    content: 'Anaka, aoka tsy ho tia amin’ny teny na amin’ny lela isika, fa amin’ny asa sy amin’ny marina. '
  '19':
  - type: text
    content: 'Izany no hahafantarantsika fa avy amin’ny marina isika sy hampahatokiantsika ny fontsika eo anatrehany, '
  '2':
  - type: text
    content: Ry malala, ankehitriny aza dia zanak’Andriamanitra isika, nefa tsy mbola naseho izay ho toetsika rahatrizay. Fantatsika fa raha hiseho Izy, dia ho tahaka Azy isika, fa ho hitantsika Izy, dia izay tena endriny tokoa.
  '20':
  - type: text
    content: 'na amin’inona na amin’inona no anamelohan’ny fontsika antsika, satria Andriamanitra lehibe noho ny fontsika ka mahalala ny zavatra rehetra. '
  '21':
  - type: text
    content: 'Ry malala, raha tsy mba manameloka antsika ny fontsika, dia manana fahasahiana eo anatrehan’Andriamanitra isika. '
  '22':
  - type: text
    content: 'Ary na inona na inona no angatahintsika dia raisintsika aminy, satria mitandrina ny didiny sy manao izay ankasitrahana eo imasony isika. '
  '23':
  - type: text
    content: 'Ary izao no didiny, dia ny hinoantsika ny anaran’i Jesosy Kristy Zanany sy ny hifankatiavantsika araka ny didy nomeny antsika. '
  '24':
  - type: text
    content: Ary izay mitandrina ny didiny no mitoetra ao aminy, ary Izy kosa ao aminy. Ary izao no ahafantarantsika fa mitoetra ao amintsika Izy, dia ny Fanahy Izay nomeny antsika.
  '3':
  - type: text
    content: 'Ary izay rehetra manana izany fanantenana miorina aminy izany dia manadio ny tenany mba hadio tahaka Azy. '
  '4':
  - type: text
    content: 'Izay rehetra manota no mandika ny lalàna; fa ny ota no fandikana ny lalàna. '
  '5':
  - type: text
    content: Ary fantatrareo fa Izy no naseho hanaisotra
  - type: note
    content: 'Na: hitondra.'
  - type: text
    content: ' ny ota; ary tsy mba misy ota ao aminy. '
  '6':
  - type: text
    content: Izay rehetra mitoetra ao aminy dia tsy manota; izay rehetra manota dia tsy nahita na nahalala Azy.
  '7':
  - type: text
    content: 'Anaka, aza avela hisy hamitaka anareo: izay manao ny marina no marina; eny, marina tahaka Azy. '
  '8':
  - type: text
    content: 'Izay manota dia avy amin’ny devoly, satria ny devoly manota hatramin’ny voalohany. Izao no nisehoan’ny Zanak’Andriamanitra, dia ny handrava ny asan’ny devoly. '
  '9':
  - type: text
    content: Izay rehetra naterak’Andriamanitra no tsy manota, satria ny voany mitoetra ao anatiny, ary tsy mahay manota izy, satria naretak’Andriamanitra.
