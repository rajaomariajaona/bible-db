  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny raharahan’i Eleazara, zanak’i Arona mpisorona, dia ny diloilo hatao fanazavana sy ny ditin-kazo mani-pofona sy ny fanatitra hohanina fanao isan-andro ary ny diloilo fanosorana, dia ny raharaha rehetra amin’ny tabernakely sy izay rehetra ao anatiny amin’ny fitoerana masina sy ny fanaka momba azy.
  '17':
