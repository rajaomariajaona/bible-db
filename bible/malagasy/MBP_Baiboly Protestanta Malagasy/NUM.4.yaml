      children:
      - type: text
        text: volon’ondry
    - type: text
      text: ' manga ka hosaronany sarona hodi-takasy, dia hatainginy eo ambonin’ny filanjana azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanaisotra ny lavenona amin’ny alitara izy ka hamelatra lamba volomparasy eo amboniny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hapetrany eo amboniny avokoa ny fanaka rehetra momba azy, izay fanaovana fanompoan-pivavahana eo, dia ny fitondran-afony sy ny fitrebiny sy ny sotron’afony ary ny loviany famafazana, dia ny fanaka rehetra momba ny alitara; ary hovelarany sarona hodi-takasy eo amboniny izy, dia hataony eo aminy ny baony.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa vitan’i Arona sy ny zanany ny manarona ny fitoerana masina sy ny fanaka rehetra momba azy, ka efa hifindra ny toby, dia vao izay no ho avy ny zanak’i Kehata hitondra azy; fa tsy hikasika ny fitoerana
