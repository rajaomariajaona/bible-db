    children:
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ireo sy ny fanaka rehetra momba azy dia hataony eo anatin’ny sarona hodi-takasy ka hatainginy eo ambonin’ny filanjana azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hamelatra lamba manga eo ambonin’ny alitara volamena izy, dia hosaronany sarona hodi-takasy, ary hataony eo aminy ny baony; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia halainy ny fanaka rehetra enti-manompo, dia izay fanaovany fanompoam-pivavahana ao amin’ny fitoerana masina, ka hataony ao anaty lamba '
    - type: usfm
