    marker: p
    children:
    - type: text
      text: Izany no ho fanompoan’ny fokon’ny Gersonita ny amin’ny trano-lay fihaonana; ary ny ho mpifehy azy amin’izany anjara-raharahany izany dia Itamara, zanak’i Arona mpisorona.
