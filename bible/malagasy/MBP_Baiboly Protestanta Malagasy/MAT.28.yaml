document_id: MAT.28,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitsanganan’i Jesosy tamin’ny maty, sy ny nisehoany tamin’ny mpianany.
  - type: heading
    content: Mar. 16.1-20; Lio. 24.1-11; Jao. 20.1-29.
  - type: text
    content: 'ARY tamin’ny alin’ny Sabata, raha vao nazava ratsy ny andro voalohany amin’ny herinandro, dia avy hizaha ny fasana Maria Magdalena sy ilay Maria anankiray. '
  '10':
  - type: text
    content: 'Dia hoy Jesosy taminy: Aza matahotra; fa mandehana, ka asaovy mankany Galilia ny rahalahiko; fa any no hahitany Ahy.'
  '11':
  - type: text
    content: 'Ary nony nandeha izy ireo, indreny, ny mpiambina sasany nankany an-tanàna ka nilaza tamin’ny lohan’ny mpisorona ny zavatra rehetra izay vao niseho. '
  '12':
  - type: text
    content: 'Ary rehefa niangona izy mbamin’ny loholona, dia niara-nihevitra ka nanome vola be ny miaramila '
  '13':
  - type: text
    content: 'ary nanao hoe: Lazao hoe: Ny mpianany no tonga alina ka nangalatra Azy, raha sendra natory izahay; '
  '14':
  - type: text
    content: 'ary raha misy milaza izany amin’ny governora, izahay dia hampanaiky azy ka hanao izay tsy hampaninona anareo. '
  '15':
  - type: text
    content: Dia nandray ny vola izy ka nanao araka ny teny nomeny azy; ary izany teny izany dia naelin’ny Jiosy mandraka andro-any.
  '16':
  - type: text
    content: 'Ary ny mpianatra iraika ambin’ny folo lahy dia nankany Galilia, ho any amin’ilay tendrombohitra nasain’i Jesosy halehany. '
  '17':
  - type: text
    content: Ary nony nahita Azy izy, dia niankohoka, fa ny sasany niahanahana.
  '18':
  - type: text
    content: 'Ary Jesosy nanatona dia niteny taminy ka nanao hoe: Efa nomena Ahy ny fahefana rehetra any an-danitra sy etỳ an-tany; '
  '19':
  - type: text
    content: 'koa mandehana hianareo, dia ataovy mpianatra ny firenena rehetra, manao batisa azy ho amin’ny anaran’ny Ray sy ny Zanaka ary ny Fanahy Masina '
  '2':
  - type: text
    content: 'Ary indro, nisy horohorontany mafy; fa nisy anjelin’ny Tompo nidina avy tany an-danitra, dia nankeo ka nanakodia ny vato, dia nipetraka teo amboniny. '
  '20':
  - type: text
    content: sady mampianatra azy hitandrina izay rehetra nandidikao anareo; ary, indro, Izaho momba anareo mandrakariva ambara-pahatongan’ny fahataperan’izao tontolo izao.
  '3':
  - type: text
    content: 'Ary ny fijery azy dia tahaka ny helatra, ary ny fitafiany fotsy tahaka ny orampanala; '
  '4':
  - type: text
    content: ary ny mpiambina nivadi-po noho ny fahatahorana azy ka tonga tahaka ny maty.
  '5':
  - type: text
    content: 'Ary ny anjely namaly ka nilaza tamin’ny vehivavy hoe: Aza matahotra hianareo; fa fantatro fa Jesosy, Izay efa nohomboana tamin’ny hazofijaliana, no tadiavinareo. '
  '6':
  - type: text
    content: 'Tsy ato Izy, fa efa nitsangana araka izay nolazainy. Avia, ka jereo, fa tao no nandrian’ny Tompo. '
  '7':
  - type: text
    content: Ary mandehana faingana, ka lazao amin’ny mpianany fa efa nitsangana tamin’ny maty Izy; ary, indro, mialoha anareo ho any Galilia Izy; any no hahitanareo Azy; indro, efa nilaza taminareo aho.
  '8':
  - type: text
    content: 'Dia niala faingana tamin’ny fasana izy ireo sady natahotra no faly indrindra, dia nihazakazaka hilaza tamin’ny mpianatra. '
  '9':
  - type: text
    content: 'Ary, indro, Jesosy nifanena taminy ka nanao hoe: Finaritra. Ary izy ireo nanatona, dia nihazona ny tongony ka niankohoka teo anatrehany. '
