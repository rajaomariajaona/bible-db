document_id: PSA.111
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Salamo abidy. Ny fahatsaran’Andriamanitra, sy ny soa ataony amin’ny olony.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: HALELOIA.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hidera an’i Jehovah amin’ny foko rehetra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny fivorian’ny marina sy ny fiangonan-dehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lehibe ny asan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dinihin’izay rehetra mankasitraka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Madera sady malaza ny asany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinany maharitra mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Manao izay hahatsiarovana ny fahagagana ataony Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantra sy mamindra fo Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nomeny hanina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '111.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toha.
    marker-yv: yv-n
  - type: text
    text: ' izay matahotra Azy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsarovany mandrakizay ny fanekeny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny herin’ny asany nasehony tamin’ny olony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny nanomezany azy ny lovan’ny jentilisa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny asan’ny tànany dia fahamarinana sy fitsarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatoky avokoa ny didiny rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitoetra mafy mandrakizay doria ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa natao tamin’ny fahamarinana sy ny fahitsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manatitra fanavotana ho an’ny olony Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanorina ny fanekeny ho mandrakizay Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masina sy mahatahotra ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fahatahorana an’i Jehovah no fiandoham-pahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahalalana tsara no ananan’izay rehetra mankatò izany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '111.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ireo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maharitra mandrakizay ny fiderana Azy.
