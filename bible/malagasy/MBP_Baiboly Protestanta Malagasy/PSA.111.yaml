document_id: PSA.111,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Ny fahatsaran’Andriamanitra, sy ny soa ataony amin’ny olony.
  - type: text
    content: HALELOIA.
  - type: text
    content: Hidera an’i Jehovah amin’ny foko rehetra aho,
  - type: text
    content: Eo amin’ny fivorian’ny marina sy ny fiangonan-dehibe.
  '10':
  - type: text
    content: Ny fahatahorana an’i Jehovah no fiandoham-pahendrena;
  - type: text
    content: Fahalalana tsara no ananan’izay rehetra mankatò izany;
  - type: note
    content: Heb. ireo.
  - type: text
    content: Maharitra mandrakizay ny fiderana Azy.
  '2':
  - type: text
    content: Lehibe ny asan’i Jehovah,
  - type: text
    content: Ka dinihin’izay rehetra mankasitraka azy.
  '3':
  - type: text
    content: Madera sady malaza ny asany;
  - type: text
    content: Ary ny fahamarinany maharitra mandrakizay.
  '4':
  - type: text
    content: Manao izay hahatsiarovana ny fahagagana ataony Izy;
  - type: text
    content: Miantra sy mamindra fo Jehovah.
  '5':
  - type: text
    content: Nomeny hanina
  - type: note
    content: Heb. toha.
  - type: text
    content: ' izay matahotra Azy;'
  - type: text
    content: Tsarovany mandrakizay ny fanekeny.
  '6':
  - type: text
    content: Ny herin’ny asany nasehony tamin’ny olony,
  - type: text
    content: Tamin’ny nanomezany azy ny lovan’ny jentilisa.
  '7':
  - type: text
    content: Ny asan’ny tànany dia fahamarinana sy fitsarana;
  - type: text
    content: Mahatoky avokoa ny didiny rehetra;
  '8':
  - type: text
    content: Mitoetra mafy mandrakizay doria ireny,
  - type: text
    content: Fa natao tamin’ny fahamarinana sy ny fahitsiana.
  '9':
  - type: text
    content: Manatitra fanavotana ho an’ny olony Izy;
  - type: text
    content: Efa nanorina ny fanekeny ho mandrakizay Izy;
  - type: text
    content: Masina sy mahatahotra ny anarany.
