document_id: ACT.17,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nankanesan’i Paoly sy Silasy tany Tesalonika sy Beria.
  - type: text
    content: 'ARY rehefa nandeha namaky an’i Amfipolia sy Apolonia izy, dia tonga tao Tesalonika, ary nisy synagogan’ny Jiosy tao. '
  '10':
  - type: text
    content: 'Ary Paoly sy Silasy dia nampandehanin’ny rahalahy niaraka tamin’izay nony alina hankany Beria; koa raha tonga tany izy, dia niditra tao amin’ny synagogan’ny Jiosy. '
  '11':
  - type: text
    content: 'Ary ny toe-panahin’ireo dia tsara noho ny tao Tesalonika; satria nandray ny teny tamin’ny zotom-po indrindra ireo ka nandinika ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' isan-andro, na marina izany, na tsia.'
  '12':
  - type: text
    content: Koa maro tamin’ireo no nino, ary tsy vitsy tamin’ny vehivavy jentilisa
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' nanan-kaja sy ny lehilahy. '
  '13':
  - type: text
    content: 'Fa raha ren’ny Jiosy tany Tesalonika fa Paoly nitory ny tenin’Andriamanitra tany Beria, dia nankany izy ka nampikotrana sy nampitabataba ny vahoaka. '
  '14':
  - type: text
    content: 'Ary niaraka tamin’izay dia nasain’ny rahalahy nandeha hatrany amoron-dranomasina Paoly; fa Silasy sy Timoty kosa dia mbola nijanona teo ihany. '
  '15':
  - type: text
    content: Ary izay nanatitra an’i Paoly dia nitondra azy nankany Atena; ary rehefa nahazo teny holazainy amin’i Silasy sy Timoty izy mba hankanesan’izy roa lahy any aminy faingana, dia lasa nandeha ireo.
  - type: heading
    content: Ny nataon’i Paoly tany Atena.
  '16':
  - type: text
    content: 'ARY raha niandry azy tany Atena Paoly, dia taitra tao anatiny ny fanahiny, raha nahita ny tanàna feno sampy izy. '
  '17':
  - type: text
    content: Ary izy niady hevitra tamin’ny Jiosy sy ny proselyta tao amin’ny synagoga sy tamin’izay tafavory tany an-tsena isan-andro.
  '18':
  - type: text
    content: 'Ary ny olon-kendry sasany tamin’ny Epikoreana sy ny Stoika nanohitra azy koa, ka hoy ny sasany: Inona no tian’io mpibedibedy'
  - type: note
    content: Gr. mpitsindroka.
  - type: text
    content: ' io holazaina? Ary hoy kosa ny sasany: Toa mitory andriamani-baovao izy, satria Jesosy sy ny fitsanganan’ny maty no notoriny. '
  '19':
  - type: text
    content: 'Ary ireo naka azy, dia nitondra azy ho any Areopago ka nanao hoe: Moa mba mahazo mahafantatra izany fampianarana vaovao lazainao izany izahay? '
  '2':
  - type: text
    content: 'Ary Paoly dia niditra tao araka ny fanaony; ary Sabata telo no niadiany hevitra avy amin’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' tamin’ny olona tao. '
  '20':
  - type: text
    content: Fa mampandre ny sofinay zavatra hafahafa izay tsy fantatray hianao; koa tianay ho fantatra izay hevitr’izany zavatra izany. (
  '21':
  - type: text
    content: Fa ny Ateniana rehetra sy ny vahiny izay nitoetra teo tsy nandany ny androny tamin’ny zavatra hafa, afa-tsy ny hilaza na hihaino zava-baovao.)
  '22':
  - type: text
    content: 'Ary Paoly nitsangana teo afovoan’i Areopago ka nanao hoe: Ry lehilahy Ateniana, hitako fa amin’ny zavatra rehetra dia fatra-pivavaka amin’ny andriamanitrareo indrindra hianareo. '
  '23':
  - type: text
    content: 'Fa raha nandeha aho ka nandinika izay zavatra ivavahanareo, dia nahita alitara anankiray misy izao soratra izao: '
  - type: heading
    content: ho an’izay andriamanitra tsy fantatra.
  - type: text
    content: ' Koa izay ivavahanareo, kanefa tsy fantatrareo, dia izany no toriko aminareo, '
  '24':
  - type: text
    content: 'dia Andriamanitra Izay nanao izao tontolo izao sy ny eo aminy rehetra, Izy no Tompon’ny lanitra sy ny tany ka tsy mba mitoetra ao anaty tempoly nataon-tànana, '
  '25':
  - type: text
    content: 'sady tsy mba tompoin’ny tànan’olona toa mila zavatra, fa Izy ihany no manome izao rehetra izao aina sy fofon-aina ary ny zavatra rehetra; '
  '26':
  - type: text
    content: 'ary ny firenena rehetra avy amin’ny iray ihany dia namponeniny ambonin’ny tany rehetra, ary efa notendreny ny fotoan’andro sy ny faritry ny fonenany, '
  '27':
  - type: text
    content: 'mba hitady an’Andriamanitra izy, raha tàhiny hahatsapa ka hahita Azy, kanefa tsy mba lavitra antsika rehetra Izy; '
  '28':
  - type: text
    content: 'fa Izy no ivelomantsika sy ihetsehantsika ary iainantsika; araka ny nataon’ny mpanao tonon-kira sasany teo aminareo hoe: ,Fa terany koa isika.’ '
  '29':
  - type: text
    content: 'Ary satria terak’Andriamanitra isika, dia tsy mety raha ny fomban’Andriamanitra no ataontsika ho tahaka ny volamena, na volafotsy, na vato voasoratry ny fahaizana aman-tsain’olombelona. '
  '3':
  - type: text
    content: 'Dia nanambara izy ka naneho marimarina fa tsy maintsy nijaly sy nitsangana tamin’ny maty Kristy; ary Jesosy, Izay toriko aminareo, '
  - type: text
    content: hoy izy,
  - type: text
    content: ' no Kristy. '
  '30':
  - type: text
    content: 'Ary Andriamanitra ninia tsy nijery ny andron’ny tsi-fahalalana; fa ankehitriny Izy mandidy ny olona rehetra amin’izao tontolo izao hibebaka, '
  '31':
  - type: text
    content: satria Izy efa nanendry andro iray, izay hitsarany izao tontolo izao amin’ny fahamarinana amin’ny alalan’ny Lehilahy iray voatendriny, koa efa nanome vavolombelona hampino ny olona rehetra izany Izy tamin’ny nananganany Azy tamin’ny maty.
  '32':
  - type: text
    content: 'Ary raha nahare ny amin’ny fitsanganan’ny maty izy, dia nihomehy ny sasany; ary ny sasany kosa nanao hoe: Mbola hihaino anao indray izahay ny amin’izany zavatra izany. '
  '33':
  - type: text
    content: 'Ary Paoly dia niala teo aminy. '
  '34':
  - type: text
    content: Anefa ny olona sasany niray taminy ka nino; mba naman’izany Dionysio Areopagita sy ny vehivavy anankiray atao hoe Damary ary ny sasany koa.
  '4':
  - type: text
    content: Ary ny sasany tamin’ireo dia nino ka nanampy ho isan’ny mpianatr’i Paoly sy Silasy, ary maro be koa tamin’ny jentilisa
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' izay mpivavaka, ary tsy vitsy tamin’ny vehivavy nanan-kaja.'
  '5':
  - type: text
    content: 'Fa nialona ny Jiosy ka naka olona ratsy fanahy teny an-tsena ary nahavory vahoaka betsaka, dia nampitabataba ny tanàna ka namely ny tranon’i Jasona ary nitady hamoaka azy roa lahy ho ao amin’ny olona. '
  '6':
  - type: text
    content: 'Ary raha tsy nahita azy roa lahy izy, dia nisarika an’i Jasona sy ny rahalahy sasany ho eo amin’ny lehiben’ny tanàna ka niantso mafy hoe: Tonga atỳ koa ireo lehilahy namadika izao tontolo izao ireo; '
  '7':
  - type: text
    content: 'ary efa nampandrosoin’i Jasona izy, ka izy rehetra ireo manohitra ny tenin’i Kaisara, satria izy milaza fa misy mpanjaka hafa, dia Jesosy. '
  '8':
  - type: text
    content: 'Dia taitra ny vahoaka sy ny lehiben’ny tanàna, raha nahare izany. '
  '9':
  - type: text
    content: Ary rehefa nasainy nametraka antoka Jasona sy ny sasany teo aminy, dia navelany handeha izy.
