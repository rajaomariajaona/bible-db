document_id: PHM.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana an’i Filemona, sy fifonana ho an’i Onesimosy, ary fanaovam-beloma.
  - type: text
    content: 'PAOLY, mpifatotra an’i Kristy Jesosy, ary Timoty rahalahy, mamangy an’i Filemona, ilay malalanay sy mpiara-miasa aminay, '
  '10':
  - type: text
    content: Eny, miangavy aminao aho ny amin’ny zanako, izay naterako teto amin’ny fifatorako, dia Onesimosy,
  - type: note
    content: Onesimosy = Mahasoa.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'ilay tsy nahasoa anao fahiny, nefa ankehitriny mahasoa antsika, dia hianao sy izaho; '
  '12':
  - type: text
    content: 'izay nampodiko indray, dia ilay sombin’ny aiko; '
  '13':
  - type: text
    content: 'saiky nohazoniko tatỳ amiko izy hanompo ahy hisolo anao eto amin’ny fifatorako noho ny filazantsara; '
  '14':
  - type: text
    content: 'nefa raha tsy nahalala izay hevitrao aho aloha, dia tsy ta-hanao na inona na inona, mba tsy ho toy ny amin’ny fanerena ny soa ataonao, fa amin’ny sitrapo. '
  '15':
  - type: text
    content: 'Fa izany angaha no nialany vetivety, dia ny mba hanananao azy mandrakizay, '
  '16':
  - type: text
    content: 'tsy toy ny andevo intsony anefa, fa efa mihoatra noho ny andevo, dia rahalahy malala, indrindra fa ho ahy, mainka fa ho anao, na amin’ny nofo na amin’ny Tompo. '
  '17':
  - type: text
    content: 'Koa raha ataonao ho namanao aho, dia raiso toa ahy izy. '
  '18':
  - type: text
    content: 'Nefa raha nanao izay tsy marina taminao izy, na mitrosa, dia ataovy ho ahy izany; '
  '19':
  - type: text
    content: 'izaho Paoly no manoratra izany amin’ny tànako, izaho no handoa izany–nefa tsy lazaiko aminao fa mitrosa ny tenanao amiko aza hianao. '
  '2':
  - type: text
    content: 'ary mamangy an’i Apia anabavinay sy Arkipo, miaramila namantsika, ary ny fiangonana ao an-tranonao: '
  '20':
  - type: text
    content: 'Eny, ry rahalahy, aoka hanana fifaliana avy aminao ao amin’ny Tompo aho; velombelomy ny foko ao amin’i Kristy. '
  '21':
  - type: text
    content: Noho ny fahatokiako fa hanaiky hianao no anoratako aminao, ka fantatro fa hanao mihoatra noho izay lazaiko aza hianao.
  '22':
  - type: text
    content: 'Ary izao koa: Mba anamboary trano hitoerako aho; fa manantena aho fa homena anareo noho ny vavaka ataonareo.'
  '23':
  - type: text
    content: 'Manao veloma anao Epafra, mpifatotra namako ao amin’i Kristy Jesosy, '
  '24':
  - type: text
    content: sy Marka sy Aristarko sy Demasy ary Lioka, mpiara-miasa amiko.
  '25':
  - type: text
    content: Ho amin’ny fanahinareo anie ny fahasoavan’i Jesosy Kristy Tompontsika. Amena.
  '3':
  - type: text
    content: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  '4':
  - type: text
    content: 'Misaotra an’Andriamanitro mandrakariva aho, raha mahatsiaro anao amin’ny fivavahako, '
  '5':
  - type: text
    content: satria reko ny fitiavanao sy ny finoana
  - type: note
    content: 'Na: ny finoanao.'
  - type: text
    content: ' izay anananao ho an’i Jesosy Tompo sy ho an’ny olona masina rehetra, '
  '6':
  - type: text
    content: 'mba hiasa mafy ho an’i Kristy ny fiombonana avy amin’ny finoanao amin’ny fahalalana tsara ny zavatra rehetra izay ao anatinareo. '
  '7':
  - type: text
    content: Fa nanana fifaliana sy fiononana amin’ny fitiavanao aho, satria efa novelombelominao ny fon’ny olona masina, ry rahalahy.
  '8':
  - type: text
    content: 'Koa na dia manana fahasahiana be ao amin’i Kristy handidy anao amin’izay mendrika aza aho, '
  '9':
  - type: text
    content: nefa noho ny fitiavana, izaho Paoly, izay efa anti-panahy
  - type: note
    content: 'Na: ambasadôra.'
  - type: text
    content: ' sady mpifatotra an’i Kristy Jesosy koa ankehitriny, dia miangavy aminao. '
