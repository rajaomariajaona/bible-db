document_id: EZK.23,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fanoharana ny amin’i Ohola sy Oholiba hampiseho ny nijangajangan’i Samaria sy Jerosalema.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ireny no mampiseho ny fitanjahany; ny zanani-lahy sy ny zanani-vavy dia lasan’ireny, ary ny tenany novonoiny tamin’ny sabatra, ka dia tonga ambentinteny tamin’ny vehivavy izy ary efa niharan’ny fitsarana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nony hitan’i Oholiba rahavaviny izany, dia vao mainka nataony manoatra noho ny azy indray ny fahamaimaizany, ary ny fijangajangany manoatra noho ny an’ny rahavaviny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Maimay tamin’ny Asyriana mifanolotra aminy izy, dia ny governora sy ny lefiny, olona mareva-pitafiana sady mpitaingin-tsoavaly, samy tovolahy bikana izy rehetra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hitako fa efa nandoto ny tenany izy, fa làlana iray ihany no nalehan’izy mirahavavy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary mbola nampandrosoiny ihany ny fijangajangany, fa nahita sari-olona voasoratra teo amin’ny rindrina izy sy ny sarin’ny Kaldeana voasoratra tamin’ny loko mena. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Samy nisy fehin-kibo nifehy teo am-balahany sy hamama voanato nisy rambony teo an-dohany; ny fijery azy rehetra dia toy ny fijery zanak’andriana, dia tahaka ny zanakalahin’i Babylona, izay teraka tany amin’ny tany Kaldea. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary raha vao hitan’ny masony ireny, dia maimay taminy izy ka naniraka olona ho any aminy tany Kaldea. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary tonga tany aminy ho ao amin’ny fandriam-pitiavana ireny zanakalahin’i Babylona ka nandoto azy tamin’ny fijangajangany; ary nony efa voaloton’ireny izy, dia niombotra niala taminy kosa ny fanahiny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary rehefa naneho ny fijangajangany sy nampiseho ny fitanjahany izy, dia niombotra niala taminy ny fanahiko, toy ny efa niombotan’ny fanahiko niala tamin’ny rahavaviny ihany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nampitombo ny fijangajangany ihany izy, ka dia nahatsiaro ny andro fahatanorany, izay nijangajangany tany amin’ny tany Egypta. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry zanak’olona, nisy vehivavy mirahavavy iray tam-po; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa izy dia maimay tamin’ireo lehilahiny, izay manana nofo tahaka ny nofom-boriky, ary ny avy aminy dia toy ny avy amin’ny soavaly. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nitady ny fijangajangan’ny fahatanoranao hianao, dia ilay nitsapatsapan’ny Egyptiana ny nononao, satria nonon’ny faha-virijinanao ireo.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Koa izao, ry Oholiba, no lazain’i Jehovah Tompo: Indro, hotairiko hamely anao ireny lehilahinao, izay efa niombotan’ny fanahinao, ka ho entiko avy amin’ny tany manodidina izy mba hamely anao, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: dia ireny zanakalahin’i Babylona mbamin’ny Kaldeana rehetra, mpanapaka sy manan-jo sy andriandahy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pekoda sy Soa ary Koa.
      marker-yv: yv-n
    - type: text
      text: ' ary ny Asyriana rehetra koa miaraka aminy; tovolahy bikana izy rehetra, dia ny governora sy ny lefiny, zanak’andriana sy olom-boafidy, sady mpitaingin-tsoavaly avokoa izy rehetra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ho avy izy mitondra fiadiana sy kalesy sy kodia mbamin’ny firenena betsaka hamely anao, izay hanisy ampinga lehibe sy ampinga kely sy fiarovan-doha manodidina hamelezana anao, ary hatolotro azy ny fitsarana, ka hitsara anao araka ny fitsarany izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ho entiko hamely anao ny fahasaro-piaroko, ka hamely anao amin’ny fahatezerana ireny: hesoriny ny oronao sy ny sofinao, ary izay sisa aminao dia ho lavon’ny sabatra, ka ho lasan-ko babony ny zanakalahinao sy ny zanakavavinao, ary izay sisa aminao holevonin’ny afo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary hendahany ny lambanao, sady hesoriny aminao ny firavakao soa. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary hatsahatro ny fahavetavetanao, dia ny fijangajanganao izay fanaonao hatrany amin’ny tany Egypta, ka tsy handrandrainao aminy intsony ny masonao, sady tsy hotsarovanao intsony Egypta.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa izao no lazain’i Jehovah Tompo: Indro, hatolotro eo an-tànan’izay halanao hianao, dia eo an-tànan’izay efa niombotan’ny fanahinao; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'ary hamely anao amin’ny fankahalana izy, ka hesoriny ny vokatry ny asanao, dia hilaozany mitanjaka sy mihanjahanja hianao, ary hiseho ny fitanjahan’ny fijangajanganao, dia ny fahavetavetanao sy ny fijangajanganao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary nijangajanga tany Egypta izy; tao no nisafosafoana ny tratrany, ary tao no nitsapatsapana ny nonon’ny faha-virijinany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Hatao aminao izany zavatra izany noho ny nijangajanganao nanaraka ny jentilisa sy noho ny nandotoanao tena tamin’ny sampiny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Tamin’ny nalehan’ny rahavavinao no nalehanao koa, ka dia hataoko eo an-tànanao ny kapoakany.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izao no lazain’i Jehovah Tompo: Amin’ny kapoaky ny rahavavinao no hisotroanao, dia ilay lalina àty sady lehibe; ho fihomehezana sy ho fanakorana tsy tanty hianao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ho feno fahamamoana sy alahelo hianao; kapoaka fahatalanjonana sy fandringanana ny kapoak’i Samaria rahavavinao. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Hosotroinao sy hotrohinao izy, ary hokikisanao ny vakivakiny sady handriatanao ny nononao; fa Izaho no niteny izany, hoy Jehovah Tompo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Koa izao no lazain’i Jehovah Tompo: Noho ny nanadinoanao Ahy sy ny nanarianao Ahy teo ivohonao, dia mba zakaonao kosa ny fahavetavetanao sy ny fijangajanganao.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Jehovah niteny tamiko hoe: Ry zanak’olona, tsy hotsarainao va Ohola sy Oholiba? Dia asehoy azy ny fahavetavetany, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'fa efa nijangajanga izy, sady misy ra eny an-tànany, eny, ny sampiny no nijangajangany, ary ny zanani-lahy naterany ho Ahy dia nampamakiny ny afo ho an’ireny mba ho levona. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Izao koa no nataony tamiko: Nandoto ny fitoerako masina izy tamin’izany andro izany sady nandoto ny Sabatako koa. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary nony efa novonoiny ho an’ny sampiny ny zanany, dia nidirany tamin’iny andro iny ihany ny fitoerako masina ka nolotoiny; koa, he! izany no nataony teo anatin’ny tranoko. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny anaran’ny zokiny dia Ohola,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ohola = Lainy.
      marker-yv: yv-n
    - type: text
      text: ' ary ny rahavaviny dia Oholiba;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Oholiba = Ny laiko no ao aminy.
      marker-yv: yv-n
    - type: text
      text: ' ary novadiko izy ka niteraka zazalahy sy zazavavy. Ny amin’ny anarany: Samaria no Ohola, ary Jerosalema no Oholiba.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary koa, naniraka ho any amin’ny olona avy lavitra hianao;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.40 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hianareo.
      marker-yv: yv-n
    - type: text
      text: ' eny, nanirahanao ireo, ka, indreo, tonga izay efa nandroanao sy nanosoranao loko mainty ny masonao sy niravahanao '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'ary nipetrahanao tamin’ny farafara marevaka, sady nisy latabatra voavelatra teo anoloany, izay nametrahanao ny ditin-kazo manitro sy ny diloiloko. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ary teo aminy nisy ny feon’ny maro izay mipetraka tsy manana ahiahy, ary afa-tsy ny ankabiazam-bahoaka dia nisy mpiboboka nentina avy tany an-efitra; ary nasian’ireo haba teny an-tànan’izy mirahavavy sy satroboninahitra tsara tarehy teny an-dohany.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Dia hoy Izaho ny amin’ilay efa tontan’ny fijangajangana ela: Amin’izao dia mbola hisy hijangajanga amin’io ihany va? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Eny, mbola nankao aminy ihany ny olona toy ny ankanesany ao amin’ny vehivavy janga, dia toy ny efa nankanesany tao amin’i Ohola sy Oholiba, vehivavy janga. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Ary olona marina no hitsara azy araka izay fitsara vehivavy mijangajanga sy mandatsa-dra, satria mijangajanga izy, sady misy ra eny an-tànany.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Fa izao no lazain’i Jehovah Tompo: Ho entiko hamely azy ny olona maro, ka hatolotro ho mpanjenjena'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.46 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho fampangovitana.
      marker-yv: yv-n
    - type: text
      text: ' sy ho babo izy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary ireo olona maro ireo dia hitora-bato azy sy hitetitetika azy amin’ny sabatra; hovonoiny ny zanani-lahy sy ny zanani-vavy, ary hodorany amin’ny afo koa ny tranony. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Toy izany no hampitsaharako ny fahavetavetana amin’ny tany, mba hahazo anatra ny vehivavy rehetra tsy hanao araka ny fahavetavetanareo. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Ary hatsingeriny aminareo ny fahavetavetanareo, ary ho entinareo ny heloka noho ny sampinareo; ka dia ho fantatrareo fa Izaho no Jehovah Tompo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary raha mbola vadiko Ohola, dia nijangajanga izy; maimay izy tamin’ireo lehilahiny, dia ny Asyriana mifanolotra aminy, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'izay mitafy mangamanga, dia ny governora sy ny lefiny, tovolahy bikana izy rehetra sady mpitaingin-tsoavaly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nijangajanga tamin’ireny izy, dia tamin’izay tsara indrindra tamin’ny zanakalahin’i Asyria sy tamin’izay rehetra nahamaimay azy; tamin’ny sampiny rehetra no nandotoany tena. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary ny fijangajangana izay fanaony hatrany Egypta dia tsy foiny; fa fony izy mbola tanora dia nandrian’ireny, ary ireny no nitsapatsapa ny tratran’ny fahavirijinany sady nanaram-po nijangajanga taminy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary noho izany dia natolotro ho eo an-tànan’ireo lehilahiny izy, dia eo an-tànan’ny Asyriana izay nahamaimay azy. '
