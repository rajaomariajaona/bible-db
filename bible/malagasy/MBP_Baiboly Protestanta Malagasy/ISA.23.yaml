document_id: ISA.23,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ loza hanjo an’i Tyro.
  - type: text
    content: FAMINANIANA ny amin’ny loza hanjo an’i Tyro.
  - type: text
    content: Midradradradrà hianareo, ry sambon’i Tarsisy ô!
  - type: text
    content: Fa rava Tyro, ka tsy misy trano sady tsy azo idirana intsony ao;
  - type: text
    content: Avy tany amin’ny tany Kitima no nanambarana izany taminy.
  '10':
  - type: text
    content: Ry Tarsisy zanakavavy,
  - type: text
    content: Aoka hianao hanafotra ny taninao tahaka an’i Neily;
  - type: text
    content: Fa tsy misy fifehezana
  - type: note
    content: Heb. fehin-kibo.
  - type: text
    content: ' intsony.'
  '11':
  - type: text
    content: Ny tànan’i Jehovah nahinjiny tambonin’ny ranomasina;
  - type: text
    content: Nampihorohoroiny ny fanjakana;
  - type: text
    content: Jehovah efa nandidy ny amin’i Kanana,
  - type: text
    content: Mba horavana ny fiarovany mafy.
  '12':
  - type: text
    content: 'Ary hoy Izy: Tsy hiravoravo intsony hianao,'
  - type: text
    content: Ry virijina afa-baraka, Sidona zanakavavy;
  - type: text
    content: Miaingà, mità ho any Kitima;
  - type: text
    content: Kanefa na dia any aza tsy hahita fitsaharana tsy akory hianao.
  '13':
  - type: text
    content: Indro ny tanin’ny Kaldeana! Tsy firenena intsony izy,
  - type: text
    content: Fa nataon’ny Asyriana fonenan’ny bibi-dia any an-efitra;
  - type: note
    content: 'Na: Indro ny tanin’ny Kaldeana, Izay tsy mbola firenena fahiny, Fa ny Asyriana no nanorina azy ho an’ny mponina any an-efitra.'
  - type: text
    content: Manao tilikambo fitiliana izy
  - type: text
    content: Ka mandrava ny lapan’ny mpanjaka ao
  - type: text
    content: Ary mampody azy ho korontam-bato.
  '14':
  - type: text
    content: Midradradradrà hianareo, ry sambon’i Tarsisy ô!
  - type: text
    content: Fa rava ny fiarovanareo mafy.
  '15':
  - type: text
    content: Ary amin’izany andro izany dia hohadinoina fito-polo taona Tyro,
  - type: text
    content: Toy ny andron’ny mpanjaka iray;
  - type: text
    content: Ary rehefa afaka fito-polo taona,
  - type: text
    content: 'Tyro dia hiharan’ilay tonon-kalon’ny janga manao hoe:'
  '16':
  - type: text
    content: ',,Makà lokanga, ka miveziveze eran’ny tanàna hianao,'
  - type: text
    content: Ry kala janga hadino;
  - type: text
    content: Mitendre tsara, ka mahereza mivazovazo,
  - type: text
    content: Mba hahatsiarovana anao’’.
  '17':
  - type: text
    content: Ary rehefa afaka fito-polo taona,
  - type: text
    content: Jehovah hamangy an’i Tyro,
  - type: text
    content: Ka dia hiverina amin’ny filan-tangy izy
  - type: text
    content: Sy hijangajanga amin’ny fanjakana rehetra
  - type: text
    content: Manerana izao tontolo izao.
  '18':
  - type: text
    content: Ary ny varony sy ny tangy azony dia hohamasinina ho an’i Jehovah;
  - type: text
    content: Tsy hotehirizina na horaketina izany;
  - type: text
    content: Fa ny varony dia ho an’izay mitoetra eo anatrehan’i Jehovah,
  - type: text
    content: Ho hanina mahavoky sy ho fitafiana mendrika.
  - type: note
    content: 'Na: mateza.'
  '2':
  - type: text
    content: Mangìna, hianareo mponina amoron-tsiraka!
  - type: text
    content: Ny mpandranto avy any Sidona,
  - type: text
    content: Izay mandeha eny ambonin’ny ranomasina, no efa nampanan-karena
  - type: note
    content: Heb. nameno.
  - type: text
    content: ' anao.'
  '3':
  - type: text
    content: Teny amin’ny rano be ny varin’i Sihora,
  - type: text
    content: Dia ny vokatr’i Neily, ka nampiditra harena ho azy;
  - type: text
    content: Ary tonga tsenan’ny firenena izy.
  '4':
  - type: text
    content: Aoka ho menatra hianao, ry Sidona;
  - type: text
    content: 'Fa ny ranomasina, dia ny fiarovana mafy ao an-dranomasina, efa niteny hoe:'
  - type: text
    content: Tsy mbola nihetsi-jaza aho, na niteraka,
  - type: text
    content: Tsy mbola nitaiza zatovo aho, na namelona virijina.
  '5':
  - type: text
    content: Rehefa re tany Egypta izany,
  - type: text
    content: Dia toran-kovitra izy noho ny nanjo an’i Tyro.
  '6':
  - type: text
    content: Mità ho any Tarsisy hianareo;
  - type: text
    content: Midradradradrà, ry mponina amoron-tsiraka.
  '7':
  - type: text
    content: Izao va no manjo anao, ry ilay niravoravo,
  - type: note
    content: 'Na: Izao va no tanàna nao niravoravo?'
  - type: text
    content: Izay efa naorina hatry ny fony fahagola
  - type: text
    content: Sady nentin’ny tongony hivahiny any lavitra any?
  '8':
  - type: text
    content: Iza no nikasa izany hamelezana an’i Tyro, mpanome satroboninahitra, izany?
  - type: text
    content: Mpanapaka ny mpandrantony,
  - type: text
    content: Olo-malaza amin’ny tany ny mpivarony.
  '9':
  - type: text
    content: Jehovah, Tompon’ny maro, no nikasa izany,
  - type: text
    content: Mba hampietreny ny fiavonavonan’ny voninahitra rehetra,
  - type: text
    content: Sy hanalany ny voninahitry ny olo-malaza rehetra amin’ny tany.
