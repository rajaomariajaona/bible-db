document_id: ISA.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’ loza hanjo an’i Tyro.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: FAMINANIANA ny amin’ny loza hanjo an’i Tyro.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradrà hianareo, ry sambon’i Tarsisy ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa rava Tyro, ka tsy misy trano sady tsy azo idirana intsony ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy tany amin’ny tany Kitima no nanambarana izany taminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mangìna, hianareo mponina amoron-tsiraka!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpandranto avy any Sidona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mandeha eny ambonin’ny ranomasina, no efa nampanan-karena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nameno.
    marker-yv: yv-n
  - type: text
    text: ' anao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Teny amin’ny rano be ny varin’i Sihora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny vokatr’i Neily, ka nampiditra harena ho azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tonga tsenan’ny firenena izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka ho menatra hianao, ry Sidona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa ny ranomasina, dia ny fiarovana mafy ao an-dranomasina, efa niteny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mbola nihetsi-jaza aho, na niteraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mbola nitaiza zatovo aho, na namelona virijina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehefa re tany Egypta izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toran-kovitra izy noho ny nanjo an’i Tyro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mità ho any Tarsisy hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midradradradrà, ry mponina amoron-tsiraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izao va no manjo anao, ry ilay niravoravo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Izao va no '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'tanàna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nao niravoravo?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay efa naorina hatry ny fony fahagola
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nentin’ny tongony hivahiny any lavitra any?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Iza no nikasa izany hamelezana an’i Tyro, mpanome satroboninahitra, izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpanapaka ny mpandrantony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Olo-malaza amin’ny tany ny mpivarony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehovah, Tompon’ny maro, no nikasa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hampietreny ny fiavonavonan’ny voninahitra rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanalany ny voninahitry ny olo-malaza rehetra amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ry Tarsisy zanakavavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hianao hanafotra ny taninao tahaka an’i Neily;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy misy fifehezana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fehin-kibo.
    marker-yv: yv-n
  - type: text
    text: ' intsony.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny tànan’i Jehovah nahinjiny tambonin’ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampihorohoroiny ny fanjakana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah efa nandidy ny amin’i Kanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba horavana ny fiarovany mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Izy: Tsy hiravoravo intsony hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry virijina afa-baraka, Sidona zanakavavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miaingà, mità ho any Kitima;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa na dia any aza tsy hahita fitsaharana tsy akory hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro ny tanin’ny Kaldeana! Tsy firenena intsony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nataon’ny Asyriana fonenan’ny bibi-dia any an-efitra;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Indro ny tanin’ny Kaldeana, Izay tsy mbola firenena fahiny, Fa ny Asyriana no nanorina azy ho an’ny mponina any an-efitra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao tilikambo fitiliana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mandrava ny lapan’ny mpanjaka ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampody azy ho korontam-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Midradradradrà hianareo, ry sambon’i Tarsisy ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa rava ny fiarovanareo mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary amin’izany andro izany dia hohadinoina fito-polo taona Tyro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny andron’ny mpanjaka iray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rehefa afaka fito-polo taona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tyro dia hiharan’ilay tonon-kalon’ny janga manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ',,Makà lokanga, ka miveziveze eran’ny tanàna hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry kala janga hadino;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitendre tsara, ka mahereza mivazovazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hahatsiarovana anao’’.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary rehefa afaka fito-polo taona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah hamangy an’i Tyro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia hiverina amin’ny filan-tangy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hijangajanga amin’ny fanjakana rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manerana izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny varony sy ny tangy azony dia hohamasinina ho an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hotehirizina na horaketina izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny varony dia ho an’izay mitoetra eo anatrehan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho hanina mahavoky sy ho fitafiana mendrika.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mateza.
    marker-yv: yv-n
