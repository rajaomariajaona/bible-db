document_id: 2KI.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Atalia, sy ny namonoana azy, ary ny nampanjakana an’i Joasy handimby azy.
  - type: text
    content: 'ARY nony hitan’i Atalia, renin’i Ahazia, fa maty ny zanany dia nitsangana izy ka nandringana ny zanak’andriana rehetra. '
  '10':
  - type: text
    content: 'Ary ny kapiteny nomen’ilay mpisorona ny lefona sy ampingan’i Davida mpanjaka izay tao an-tranon’i Jehovah. '
  '11':
  - type: text
    content: Ary ny mpiambina nitsangana, ka samy nitana ny fiadiany avy hanodidina ny mpanjaka hatramin’ny lafiny ankavanan’ny trano ka hatramin’ny lafiny ankavia, hatramin’ny alitara ka hatramin’ny trano.
  '12':
  - type: text
    content: Dia nentin’i Joiada nivoaka ny zanakalahin’ny mpanjaka ka nosatrohany ny satro-boninahitra izy, dia notolorany ny Vavolombelona;
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' ka dia nampanjakainy sy nohosorany izy, ary ny olona nitehaka ka niantso hoe: Ho ela velona anie ny mpanjaka!'
  '13':
  - type: text
    content: 'Ary nony ren’i Atalia ny tabataban’ny mpiambina sy ny vahoaka, dia mba nankao amin’ny vahoaka tao amin’ny tranon’i Jehovah izy. '
  '14':
  - type: text
    content: 'Ary hitany fa, indro, ny mpanjaka nitsangana teo amin’ny fitoeran’andriana toy ny fanao, ary ny andriandahy sy ny mpitsoka trompetra dia teo anilan’ny mpanjaka; ary ny vahoaka rehetra nifaly sady nampaneno ny trompetra; dia nandriatra ny fitafiany Atalia ka niantso hoe: Fikomiana! fikomiana! '
  '15':
  - type: text
    content: 'Fa Joiada mpisorona nandidy ny kapiteny, mpifehy ny miaramila, ka nanao taminy hoe: Avoahy eny ivelan’ny laharana izy, ary izay manaraka azy dia vonoy amin’ny sabatra. Fa ny mpisorona efa nandrara hoe: Aza vonoina ao an-tranon’i Jehovah izy. '
  '16':
  - type: text
    content: Ary ny olona nisava teo an-daniny roa, dia nandeha tamin’ny làlana fandehanan’ny soavaly ho any an-tranon’ny mpanjaka ravehivavy; dia novonoiny tao izy.
  '17':
  - type: text
    content: Ary Joiada nampanao fanekena ny mpanjaka sy ny vahoaka tamin’i Jehovah, mba ho olon’i Jehovah izy, ary nampifanaiky ny mpanjaka sy ny vahoaka koa.
  '18':
  - type: text
    content: Ary ny vahoaka rehetra niditra tao an-tranon’i Bala ka nandrava azy; ny alitara sy ny endri-javatra teo aminy dia notorotoroiny avokoa, ary Matana, mpisoron’i Bala, novonoiny teo anoloan’ny alitara.
  - type: text
    content: 'Ary ny mpisorona nanendry ny ho mpitandrina ny tranon’i Jehovah. '
  '19':
  - type: text
    content: Ary nalainy ny kapiteny sy ny anjolofo
  - type: note
    content: Heb. Kariana.
  - type: text
    content: ' sy ny mpiambina mbamin’ny vahoaka rehetra ary nentina nidina avy tao an-tranon’i Jehovah ny mpanjaka, ka teo am-bavahadin’ny mpiambina no nalehany hankao an-tranon’ny mpanjaka. Ary nipetraka tamin’ny seza fiandrianan’ny mpanjaka izy. '
  '2':
  - type: text
    content: 'Fa Joseba, zanakavavin’i Jehorama mpanjaka ary anabavin’i Ahazia, dia naka an’i Joasy, zanak’i Ahazia, ka namonjy azy mbamin’ny mpitaiza azy avy teo amin’ny zanaky ny mpanjaka izay novonoina ho ao an-trano fitehirizam-pandriana ary nafeniny an’i Atalia izy, ka dia tsy mba voavono. '
  '20':
  - type: text
    content: Dia nifaly ny vahoaka rehetra, ary nandry fahizay ny tanàna Ary Atalia novonoiny tamin’ny sabatra tao an-tranon’ny mpanjaka.
  '3':
  - type: text
    content: Ary niery enin-taona tao aminy tao an-tranon’i Jehovah izy. Ary Atalia no nanjaka tamin’ny tany.
  '4':
  - type: text
    content: Ary tamin’ny taona fahafito Joiada naniraka haka ny kapiteny, mpifehy ny anjolofo
  - type: note
    content: Heb. Kariana.
  - type: text
    content: ' sy ny mpiambina, dia nampiditra azy tao an-tranon’i Jehovah ary nampanaiky sy nampianiana azy tao an-tranon’i Jehovah, ka nasehony azy ny zanakalahin’ny mpanjaka. '
  '5':
  - type: text
    content: 'Ary izy nandidy azy hoe: Izao no hataonareo: Ny ampahatelony izay milatsaka amin’ny Sabata dia hiambina ny tranon’ny mpanjaka; '
  '6':
  - type: text
    content: 'ary ny ampahatelony ho eo am-bavahady Sora; ary ny ampahatelony ho ao am-bavahady ivohon’ny mpiambina, dia hiambina ny trano hianareo ka hiaro azy. '
  '7':
  - type: text
    content: 'Ary ny roa toko aminareo kosa, dia izay rehetra miala amin’ny andro Sabata, dia hiambina ny tranon’i Jehovah hiarovana ny mpanjaka. '
  '8':
  - type: text
    content: Ary hanemitra manodidina ny mpanjaka hianareo, samy mitana ny fiadiany avy; ka na iza na iza mamaky laharana dia vonoy, ary arahonareo ny mpanjaka, na mivoaka na miditra izy.
  '9':
  - type: text
    content: 'Ary ny kapiteny dia nanao araka izay rehetra nandidian’i Joiada mpisorona, ka samy nitondra ny olom-peheziny izay nilatsaka tamin’ny Sabata sy izay niala tamin’ny Sabata ary nankany amin’i Joiada mpisorona. '
