document_id: PSA.92,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifaliana amin’Andriamanitra noho ny asany sy ny fitsarany marina.
  - type: text
    content: Salamo. Tonon-kira hatao amin’ny andro Sabata.
  - type: text
    content: TSARA ny hidera an’i Jehovah
  - type: text
    content: Sy ny hankalaza ny anaranao, ry Avo Indrindra ô,
  '10':
  - type: text
    content: Fa ny tandroko kosa asandratrao ho tahaka ny an’ny ombimanga;
  - type: text
    content: Mihosotra diloilo vaovao aho.
  '11':
  - type: text
    content: Ary faly ny masoko mahita ny amin’ny fahavaloko,
  - type: text
    content: Ary finaritra ny sofiko mandre ny amin’ny ratsy fanahy izay efa mitsangana hamely ahy.
  '12':
  - type: text
    content: Ny marina hamololona tahaka ny rofia;
  - type: note
    content: palma.
  - type: text
    content: Hisandrahaka
  - type: note
    content: Heb. Ho tonga lehibe.
  - type: text
    content: ' tahaka ny sedera any Libanona izy;'
  '13':
  - type: text
    content: Efa nambolena tao an-tranon’i Jehovah izy
  - type: text
    content: Ka maniry eo an-kianjan’Andriamanitsika;
  '14':
  - type: text
    content: Mbola manorobona ihany izy, na dia efa antitra aza;
  - type: text
    content: Dofodofotra sy maitso izy,
  '15':
  - type: text
    content: Mba hanambara fa mahitsy Jehovah,
  - type: text
    content: Vatolampiko Izay tsy misy tsiny.
  '2':
  - type: text
    content: Ary hanambara ny famindramponao nony maraina
  - type: text
    content: Sy ny fahamarinanao nony alina,
  '3':
  - type: text
    content: Amin’ny valiha tory folo
  - type: text
    content: Sy amin’ny feon-dokanga.
  '4':
  - type: text
    content: Fa ampifalinao amin’ny nataonao aho, Jehovah ô;
  - type: text
    content: Ny asan’ny tànanao no hihobiako.
  '5':
  - type: text
    content: Jehovah ô, akory ny halehiben’ny asanao!
  - type: text
    content: Lalina indrindra ny fisainanao.
  '6':
  - type: text
    content: Ny ketrina tsy mahafantatra izany,
  - type: text
    content: Ary ny adala koa tsy mba mahalala.
  '7':
  - type: text
    content: Raha mitsiry tahaka ny ahitra ny ratsy fanahy,
  - type: text
    content: Ary mamony ny mpanao ratsy rehetra,
  - type: text
    content: Dia izany no ho fandringanana azy mandrakizay;
  '8':
  - type: text
    content: Nefa Hianao, Jehovah ô, dia avo mandrakizay.
  '9':
  - type: text
    content: Fa, indreo, ny fahavalonao, Jehovah ô,
  - type: text
    content: Fa, indreo, ringana ny fahavalonao;
  - type: text
    content: Mihahaka ny mpanao ratsy rehetra.
