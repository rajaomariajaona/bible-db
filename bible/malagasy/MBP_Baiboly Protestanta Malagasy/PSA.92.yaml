document_id: PSA.92
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fifaliana amin’Andriamanitra noho ny asany sy ny fitsarany marina.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo. Tonon-kira hatao amin’ny andro Sabata.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TSARA ny hidera an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny hankalaza ny anaranao, ry Avo Indrindra ô,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary hanambara ny famindramponao nony maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fahamarinanao nony alina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’ny valiha tory folo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny feon-dokanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ampifalinao amin’ny nataonao aho, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny asan’ny tànanao no hihobiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jehovah ô, akory ny halehiben’ny asanao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lalina indrindra ny fisainanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny ketrina tsy mahafantatra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny adala koa tsy mba mahalala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha mitsiry tahaka ny ahitra ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamony ny mpanao ratsy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izany no ho fandringanana azy mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nefa Hianao, Jehovah ô, dia avo mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa, indreo, ny fahavalonao, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa, indreo, ringana ny fahavalonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihahaka ny mpanao ratsy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny tandroko kosa asandratrao ho tahaka ny an’ny ombimanga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihosotra diloilo vaovao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary faly ny masoko mahita ny amin’ny fahavaloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary finaritra ny sofiko mandre ny amin’ny ratsy fanahy izay efa mitsangana hamely ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny marina hamololona tahaka ny rofia;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '92.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: palma.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisandrahaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '92.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ho tonga lehibe.
    marker-yv: yv-n
  - type: text
    text: ' tahaka ny sedera any Libanona izy;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Efa nambolena tao an-tranon’i Jehovah izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka maniry eo an-kianjan’Andriamanitsika;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mbola manorobona ihany izy, na dia efa antitra aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dofodofotra sy maitso izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mba hanambara fa mahitsy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vatolampiko Izay tsy misy tsiny.
