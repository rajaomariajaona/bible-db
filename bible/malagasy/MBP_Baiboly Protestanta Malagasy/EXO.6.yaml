document_id: EXO.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Ankehitriny ho hitanao izay hataoko amin’i Farao; fa ny tàna'
  - type: usfm
    marker: it
    children:
    - type: text
      text: ko
  - type: text
    text: ' mahery no handefasany azy, ary ny tàna'
  - type: usfm
    marker: it
    children:
    - type: text
      text: ko
  - type: text
    text: ' mahery no handroahany azy amin’ny taniny.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namerenan’Andriamanitra ny teniny tamin’i Mosesy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ARY Andriamanitra niteny tamin’i Mosesy ka nanao hoe: Izaho no Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary tamin’ny anarako hoe '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: andriamanitra tsitoha
  - type: text
    text: ' no nisehoaka tamin’i Abrahama sy Isaka ary Jakoba, fa ny anarako hoe '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: jehovah
  - type: text
    text: ' tsy mbola nahafantarany Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary naoriko taminy koa ny fanekeko hanomezako azy ny tany Kanana, dia ny tany fivahiniany izay efa nivahiniany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary koa, Izaho efa nandre ny fitarainan’ny Zanak’Isiraely, izay ampanompoin’ny Egyptiana, ka dia tsaroako ny fanekeko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa lazao amin’ny Zanak’Isiraely hoe: Izaho no Jehovah, ary hitondra anareo hivoaka ho afaka amin’ny fanompoana mafy ampanaovin’ny Egyptiana anareo Aho ka hanafaka anareo amin’ny fanompoana azy; ary sandry ahinjitra sy fitsarana lehibe no hamonjeko anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia halaiko ho Ahy hianareo ho oloko, ary ho Andriamanitrareo Aho; dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo, Izay mitondra anareo mivoaka ho afaka amin’ny fanompoana mafy ampanaovin’ny Egyptiana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Izaho hampiditra anareo any amin’ny tany izay nananganako tànana homena an’i Abrahama sy Isaka ary Jakoba; dia homeko ho lovanareo izany: Izaho no Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary Mosesy nilaza izany tamin’ny Zanak’Isiraely; nefa izy tsy nihaino an’i Mosesy noho ny fahoriam-panahy sy ny fanompoana mafy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mankanesa ao amin’i Farao, mpanjakan’i Egypta, ka mitenena aminy mba handefasany ny Zanak’Isiraely hiala amin’ny taniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Mosesy niteny teo anatrehan’i Jehovah ka nanao hoe: Indro, ny Zanak’Isiraely aza tsy nihaino ahy, ka ahoana no hihainoan’i Farao ahy, fa izaho tsy voafora molotra?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Jehovah niteny tamin’i Mosesy sy Arona ka nanome teny azy ho entiny ho any amin’ny Zanak’Isiraely sy ho amin’i Farao, mpanjakan’i Egypta, mba hitondra ny Zanak’Isiraely hivoaka avy amin’ny tany Egypta.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny firazanan’i Mosesy sy Arona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'IZAO no lohan’ny fianakaviany: –Ny zanakalahin-dRobena, lahimatoan’Isiraely, dia Hanoka sy Palo sy Hezrona sy Karmy; ireo no fokom-pirenen-dRobena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny zanakalahin’i Simeona dia Jemoela sy Jamina sy Ohada sy Jakina sy Zohara ary Saoly, zanakalahin’ny vehivavy Kananita; ireo no fokom-pirenen’i Simeona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izao no anaran’ny zanakalahin’i Levy, araka ny taranany, dia Gersona sy Kehata ary Merary; ary ny andro niainan’i Levy dia fito amby telo-polo amby zato taona. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny zanakalahin’i Hersona dia Libny sy Simey, araka ny fokom-pireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny zanakalahin’i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela; ary ny andro niainan’i Kehata dia telo amby telo-polo amby zato taona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny zanakalahin’i Merary dia Maly sy Mosy. Ireo no fokom-pirenen’ny Levita, araka ny taranany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Amrama naka an’i Jokebeda anabavin-drainy ho vadiny, dia niteraka an’i Arona sy Mosesy taminy izy; ary ny andro niainan’i Amrama dia fito amby telo-polo amby zato taona. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny zanakalahin’i Jizara dia Kora sy Nafega ary Zikry. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny zanakalahin’i Oziela dia Misaela sy Elzafana ary Sitry. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Arona naka an’i Eliseba, zanakavavin’i Aminadaba sady anabavin’i Nasona, ho vadiny; dia niteraka an’i Nadaba sy Abiho sy Eleazara ary Itamara taminy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny zanakalahin’i Kora dia Asira sy Elkana ary Abiasafa; ireo no fokompirenen’ny Koraïta. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary Eleazara, zanakalahin’i Arona, naka vady avy tamin’ny zanakavavin’i Potiela, dia niteraka an’i Finehasa taminy izy. Ireo no lohan’ny fianakavian’ny Levita, araka ny fokom-pireneny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ireo no Arona sy Mosesy, izay nilazan’i Jehovah hoe: Ento ny Zanak’Isiraely hivoaka avy any amin’ny tany Egypta araka ny antokony. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ireo no niteny tamin’i Farao, mpanjakan’i Egypta, mba hitondra ny Zanak’Isiraely hivoaka avy any Egypta; ireo no Mosesy sy Arona.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanirahan’Andriamanitra an’i Mosesy sy Arona hihaona amin’i Farao indray, sy ny famantarana nataon’izy roa lahy teo anatrehany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ARY tamin’ny andro izay nitenenan’i Jehovah tamin’i Mosesy teo amin’ny tany Egypta, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia hoy Jehovah tamin’i Mosesy: Izaho no Jehovah; koa lazao amin’i Farao, mpanjakan’i Egypta, izay rehetra lazaiko aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Mosesy niteny teo anatrehan’i Jehovah ka nanao hoe: Indro, tsy voafora molotra aho, ka aiza no hihainoan’i Farao ahy!'
