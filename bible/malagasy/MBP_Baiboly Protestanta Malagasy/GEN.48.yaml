document_id: GEN.48,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tso-drano nataon’i Jakoba tamin’i Manase sy Efraima, zanakalahin’i Josefa.
  - type: text
    content: 'ARY rehefa afaka izany, dia nisy nilaza tamin’i Josefa, hoe: Indro marary ny rainao. Dia nentiny niaraka taminy Manase sy Efraima, zanany mirahalahy. '
  '10':
  - type: text
    content: 'Ary efa pahina ny mason’Isiraely noho ny fahanterany, ka tsy nahita izy; dia nentin’i Josefa nanatona azy izy mirahalahy; ary Isiraely nanoroka sy namihina azy. '
  '11':
  - type: text
    content: 'Dia hoy Isiraely tamin’i Josefa; Tsy nanampo izay hahita ny tavanao intsony aho; kanjo, indro, Andriamanitra efa nampahita ahy ny zanakao koa aza. '
  '12':
  - type: text
    content: Ary Josefa nampiala azy mirahalahy teo anelanelan’ny lohalik’Isiraely, dia niankohoka tamin’ny tany izy.
  '13':
  - type: text
    content: 'Dia notantanan’i Josefa izy mirahalahy: Efraima tamin’ny ankavanany ho eo amin’ny ankavian’Isiraely, ary Manase tamin’ny ankaviany ho eo amin’ny ankavanan’Isiraely, ka nentiny nanatona azy. '
  '14':
  - type: text
    content: Dia nahinjitr’Isiraely ny tànany ankavanana ka napetrany tamin’ny lohan’i Efraima–nefa izy no zandriny–fa ny tànany ankavia kosa teo amin’ny lohan’i Manase; fa niniany natao toy izany
  - type: note
    content: 'Na: fa nampifandikainy.'
  - type: text
    content: ' ny tànany, nefa Manase no lahimatoa.'
  '15':
  - type: text
    content: 'Dia nitso-drano an’i Josefa izy ka nanao hoe: Andriamanitra, Izay nandehanan’i Abrahama sy Isaka razako teo anatrehany, Andriamanitra, Izay Mpiandry ahy hatr’izay niainako ka mandraka andro-any, '
  '16':
  - type: text
    content: 'ny Anjely Izay Mpamonjy ahy tamin’ny loza rehetra: Izy anie hitahy ireto zaza ireto; ary aoka ny anarako sy ny anaran’i Abrahama sy Isaka raiko no hanononana azy; ary hitombo ho maro dia maro eo amin’ny tany anie izy.'
  '17':
  - type: text
    content: 'Ary rehefa hitan’i Josefa fa ny rainy nametraka ny tanany ankavanana teo amin’ny lohan’i Efraima, dia tsy sitrany izany; ka noraisiny ny tànan’ny rainy, mba hampiala azy amin’ny lohan’i Efraima ho amin’ny lohan’i Manase, '
  '18':
  - type: text
    content: 'ka hoy Josefa tamin’ny rainy: Tsy izao no izy, ry ikaky; fa ity no lahimatoa, ka apetraho eo amin’ny lohany ny tànanao ankavanana. '
  '19':
  - type: text
    content: 'Fa tsy nety ny rainy, fa nanao hoe: Fantatro ihany, anaka, fantatro ihany, izy koa ho tonga firenena, ary izy koa ho lehibe; kanefa ny zandriny ho lehibe noho izy, ary ny taranany ho firenena maro.'
  '2':
  - type: text
    content: 'Ary nisy nilaza tamin’i Jakoba ka nanao hoe: Indro, Josefa zanakao tamy ho etỳ aminao; dia nanatanja-tena Isiraely ka niarina teo ambonin’ny farafara.'
  '20':
  - type: text
    content: 'Dia nitso-drano azy tamin’izany andro izany izy ka nanao hoe: Hianao no hitsofan’ny Isiraely rano hoe: Hataon’Andriamanitra tahaka an’i Efraima sy tahaka an’i Manase anie hianao. Ary Efraima no nataony alohan’i Manase.'
  '21':
  - type: text
    content: 'Ary hoy Isiraely tamin’i Josefa: Indro, ho faty aho, nefa Andriamanitra homba anareo ka hampody anareo indray ho any amin’ny tanin-drazanareo. '
  '22':
  - type: text
    content: Ary izaho manome anao zaratany
  - type: note
    content: 'Na: tany kisolosolo.'
  - type: text
    content: ' iray ho tombon-dahinao amin’ny rahalahinao, izay nalaiko tamin’ny sabatro sy ny tsipìkako teo an-tànan’ny Amorita.'
  '3':
  - type: text
    content: 'Ary hoy Jakoba tamin’i Josefa: Andriamanitra Tsitoha efa niseho tamiko tany Lozy any amin’ny tany Kanana ary nitahy ahy ka nanao tamiko hoe: '
  '4':
  - type: text
    content: Indro, Izaho hahamaro ny taranakao, dia hampitombo anao sy hanao anao ho firenena maro;
  - type: note
    content: Heb. fikambanam-pirenena.
  - type: text
    content: ' dia homeko ny taranakao mandimby anao ity tany ity ho lovany mandrakizay. '
  '5':
  - type: text
    content: 'Ary ankehitriny, ny zanakao mirahalahy, izay efa naterakao tatỳ amin’ny tany Egypta, fony tsy mbola tonga tatỳ aminao eto Egypta aho, dia ho ahy ireo: eny, Efraima sy Manase dia ho ahy, tahaka an’i Robena sy Simeona. '
  '6':
  - type: text
    content: 'Fa ny zanakao izay haterakao aorian’izy mirahalahy dia ho anao kosa, ary ny anarany hatao araka ny an’ny rahalahiny eo amin’ny zara-taniny. '
  '7':
  - type: text
    content: Ary izaho, raha niala tany Mesopotamia
  - type: note
    content: Heb. Padan-arama.
  - type: text
    content: ' aho, dia maty teo anatrehako Rahely tany amin’ny tany Kanana, tany an-dàlana, rehefa kely foana'
  - type: note
    content: Heb. kibra iray; izahao xxxv. 6.
  - type: text
    content: ' no sisa tsy nahatongavana tao Efrata; ary nandevina azy aho teo amoron’ny làlana mankany Efrata (Betlehema izany).'
  '8':
  - type: text
    content: 'Ary rehefa hitan’Isiraely ny zanak’i Josefa, dia hoy izy: Iza moa ireo? '
  '9':
  - type: text
    content: 'Ary hoy Josefa tamin-drainy: Zanako ireto, izay nomen’Andriamanitra ahy tatỳ. Ary hoy izy: Masìna hianao, ento eto amiko izy, dia hotsofiko rano. '
