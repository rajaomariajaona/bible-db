document_id: PSA.35,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana an’Andriamanitra hamaly ny ratsy ataon’ny mpanenjika.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: JEHOVAH ô, mamalia izay manana ady amiko;
  - type: text
    content: Miadia amin’izay mamely ahy.
  '10':
  - type: text
    content: 'Ny taolako rehetra hanao hoe: Jehovah ô, iza no tahaka Anao,'
  - type: text
    content: Izay manafaka ny ory amin’izay tsy tohany,
  - type: text
    content: Eny, ny ory sy ny malahelo amin’izay mamabo azy?
  '11':
  - type: text
    content: Mitsangana ny vavolombelona mampidi-doza;
  - type: text
    content: Ka izay tsy fantatro no anadinany ahy.
  '12':
  - type: text
    content: Mamaly ratsy ahy ho solon’ny soa izy,
  - type: text
    content: Ka mamoy malala ny fanahiko.
  '13':
  - type: text
    content: Ary ny amiko, raha narary izy ireo,
  - type: text
    content: Dia lamba fisaonana no nitafiako;
  - type: text
    content: Nampahory ny tenako tamin’ny fifadian-kanina aho;
  - type: text
    content: Ary ny fivavako nody tao an-tratrako.
  '14':
  - type: text
    content: Toy ny nisy nanjo ny sakaizako na ny rahalahiko no nandehanako;
  - type: text
    content: Nitanondrika tamin’alahelo toy ny fisaona reny aho.
  '15':
  - type: text
    content: Nefa nony ho lavo kosa aho, dia faly izy ireo ka niangona;
  - type: text
    content: Olona faraidina no nitangorona hamely ahy, nefa tsy fantatro;
  - type: note
    content: 'Na: Olona faraidina, izay tsy fantatro, no nitangorona hamely ahy.'
  - type: text
    content: Namiravira izy ka tsy mba nitsahatra;
  '16':
  - type: text
    content: Naman’ny olon-dratsy manendrikendrika ho enti-mila sitraka
  - type: note
    content: 'Heb. hahazoa-mofo; na: tena mpanendrikendrika indrindra.'
  - type: text
    content: ' izy'
  - type: text
    content: Ka nihidy vazana tamiko.
  '17':
  - type: text
    content: Ry Tompo ô, mandra-pahoviana no hijerenao?
  - type: text
    content: Avereno ny fanahiko ho afaka amin’ny fandringanany,
  - type: text
    content: Ny hany malalako ho afaka amin’ny liona tanora.
  '18':
  - type: text
    content: Hisaotra Anao eo amin’ny fiangonana lehibe aho;
  - type: text
    content: Hidera Anao eo afovoan’ny olona maro aho.
  '19':
  - type: text
    content: Aoka tsy hifalian’izay mandrafy ahy foana aho;
  - type: text
    content: Ary aoka tsy hamì-maso izay mankahala ahy tsy ahoan-tsy ahoana.
  '2':
  - type: text
    content: Raiso ny ampinga kely sy ny ampinga lehibe,
  - type: text
    content: Ka mitsangàna hamonjy ahy.
  '20':
  - type: text
    content: Fa tsy fihavanana no lazainy;
  - type: text
    content: Fa mamorom-pitaka izy hamelezany izay mibonaika ambonin’ny tany.
  '21':
  - type: text
    content: Dia mitanatana vava amiko izy
  - type: text
    content: 'Ka manao hoe: Hia! sakoa izay! efa hitan’ny masonay.'
  '22':
  - type: text
    content: Efa hitanao, Jehovah ô, ka aza manentsin-tadiny;
  - type: text
    content: Ry Tompo ô, aza manalavitra ahy.
  '23':
  - type: text
    content: Mahatsiarova, ka mifohaza ho amin’ny fitsarana ahy,
  - type: text
    content: O Andriamanitro sy Tompoko! mifohaza ho amin’ny adiko.
  '24':
  - type: text
    content: Tsarao aho, Jehovah Andriamanitro ô, araka ny fahamarinanao;
  - type: text
    content: Ary aoka tsy hifalian’ireo aho.
  '25':
  - type: text
    content: 'Aoka tsy hanao anakampo hoe izy: Hia! faly izahay!'
  - type: text
    content: 'Aoka tsy hanao hoe izy: Efa natelinay izy.'
  '26':
  - type: text
    content: Aoka ho menatra sy hangaihay avokoa izay mifaly amin’ny manjo ahy;
  - type: text
    content: Aoka hitafy henatra sy fahafaham-baraka izay mirehareha amiko.
  '27':
  - type: text
    content: Aoka hihoby sy hifaly izay mankasitraka ny fahamarinako;
  - type: text
    content: 'Ary aoka izy hanao mandrakariva hoe: Hankalazaina anie Jehovah,'
  - type: text
    content: Izay mankasitraka ny fiadanan’ny mpanompony.
  '28':
  - type: text
    content: Ary ny lelako hilaza ny fahamarinanao;
  - type: text
    content: Ny fiderana Anao no hataoko mandrakariva.
  '3':
  - type: text
    content: Ary raiso ny lefona, ka sakano izay manenjika ahy;
  - type: text
    content: 'Lazao amin’ny fanahiko hoe: Famonjena anao Aho.'
  '4':
  - type: text
    content: Aoka ho menatra sy ho afa-baraka izay mitady ny aiko;
  - type: text
    content: Aoka hiamboho sy hangaihay izay misaina hanisy ratsy ahy.
  '5':
  - type: text
    content: Aoka ho tahaka ny akofa eo alohan’ny rivotra izy.
  - type: text
    content: Ary aoka ny Anjelin’i Jehovah handroaka azy.
  '6':
  - type: text
    content: Aoka ho maizina sy malama ny làlany,
  - type: text
    content: Ary aoka ny Anjelin’i Jehovah hanenjika azy.
  '7':
  - type: text
    content: Fa tsy ahoan-tsy ahoana no nanaovany fandri-totofana hahazoany ahy;
  - type: text
    content: Tsy ahoan-tsy ahoana no nandavahany hamandrihany ny aiko.
  '8':
  - type: text
    content: Aoka ny fandringanana ho tonga tampoka aminy;
  - type: text
    content: Ary aoka hahazo azy ny fandrika harato nafeniny,
  - type: text
    content: Ka ho latsaka ao amin’izany fandringanana izany indrindra izy.
  '9':
  - type: text
    content: Fa ny fanahiko kosa hifaly amin’i Jehovah
  - type: text
    content: Sy ho ravoravo amin’ny famonjeny.
