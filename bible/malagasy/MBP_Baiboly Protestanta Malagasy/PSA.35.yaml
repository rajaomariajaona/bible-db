document_id: PSA.35,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiantsoana an’Andriamanitra hamaly ny ratsy ataon’ny mpanenjika.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, mamalia izay manana ady amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miadia amin’izay mamely ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny taolako rehetra hanao hoe: Jehovah ô, iza no tahaka Anao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manafaka ny ory amin’izay tsy tohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny ory sy ny malahelo amin’izay mamabo azy?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangana ny vavolombelona mampidi-doza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izay tsy fantatro no anadinany ahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamaly ratsy ahy ho solon’ny soa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mamoy malala ny fanahiko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny amiko, raha narary izy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia lamba fisaonana no nitafiako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahory ny tenako tamin’ny fifadian-kanina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fivavako nody tao an-tratrako.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nisy nanjo ny sakaizako na ny rahalahiko no nandehanako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitanondrika tamin’alahelo toy ny fisaona reny aho.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa nony ho lavo kosa aho, dia faly izy ireo ka niangona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Olona faraidina no nitangorona hamely ahy, nefa tsy fantatro;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Olona faraidina, izay tsy fantatro, no nitangorona hamely ahy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namiravira izy ka tsy mba nitsahatra;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naman’ny olon-dratsy manendrikendrika ho enti-mila sitraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'hahazoa-mofo; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tena mpanendrikendrika indrindra.
      marker-yv: yv-n
    - type: text
      text: ' izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nihidy vazana tamiko.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Tompo ô, mandra-pahoviana no hijerenao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avereno ny fanahiko ho afaka amin’ny fandringanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hany malalako ho afaka amin’ny liona tanora.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisaotra Anao eo amin’ny fiangonana lehibe aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera Anao eo afovoan’ny olona maro aho.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hifalian’izay mandrafy ahy foana aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy hamì-maso izay mankahala ahy tsy ahoan-tsy ahoana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raiso ny ampinga kely sy ny ampinga lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitsangàna hamonjy ahy.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy fihavanana no lazainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mamorom-pitaka izy hamelezany izay mibonaika ambonin’ny tany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mitanatana vava amiko izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka manao hoe: Hia! sakoa izay! efa hitan’ny masonay.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa hitanao, Jehovah ô, ka aza manentsin-tadiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Tompo ô, aza manalavitra ahy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsiarova, ka mifohaza ho amin’ny fitsarana ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Andriamanitro sy Tompoko! mifohaza ho amin’ny adiko.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarao aho, Jehovah Andriamanitro ô, araka ny fahamarinanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy hifalian’ireo aho.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka tsy hanao anakampo hoe izy: Hia! faly izahay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka tsy hanao hoe izy: Efa natelinay izy.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra sy hangaihay avokoa izay mifaly amin’ny manjo ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hitafy henatra sy fahafaham-baraka izay mirehareha amiko.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hihoby sy hifaly izay mankasitraka ny fahamarinako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aoka izy hanao mandrakariva hoe: Hankalazaina anie Jehovah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mankasitraka ny fiadanan’ny mpanompony.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lelako hilaza ny fahamarinanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiderana Anao no hataoko mandrakariva.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raiso ny lefona, ka sakano izay manenjika ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lazao amin’ny fanahiko hoe: Famonjena anao Aho.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra sy ho afa-baraka izay mitady ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiamboho sy hangaihay izay misaina hanisy ratsy ahy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho tahaka ny akofa eo alohan’ny rivotra izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny Anjelin’i Jehovah handroaka azy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho maizina sy malama ny làlany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny Anjelin’i Jehovah hanenjika azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy ahoan-tsy ahoana no nanaovany fandri-totofana hahazoany ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ahoan-tsy ahoana no nandavahany hamandrihany ny aiko.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny fandringanana ho tonga tampoka aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hahazo azy ny fandrika harato nafeniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho latsaka ao amin’izany fandringanana izany indrindra izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fanahiko kosa hifaly amin’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho ravoravo amin’ny famonjeny.
