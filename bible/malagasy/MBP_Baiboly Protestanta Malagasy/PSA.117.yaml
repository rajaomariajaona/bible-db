document_id: PSA.117,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana izao firenena rehetra izao hidera an’i Jehovah.
  - type: text
    content: MIDERÀ an’i Jehovah ry firenena rehetra;
  - type: text
    content: Miderà Azy, ry olona rehetra.
  '2':
  - type: text
    content: Fa lehibe ny famindrampony amintsika;
  - type: text
    content: Ary mandrakizay ny fahamarinan’i Jehovah.
  - type: text
    content: Haleloia.
