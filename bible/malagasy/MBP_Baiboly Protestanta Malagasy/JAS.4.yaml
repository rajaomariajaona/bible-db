document_id: JAS.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana ny tia ady sy ny mpisintaka sy ny manendrikendrika ary ny tsy manaiky ny fitondran’Andriamanitra.
  - type: text
    content: 'AVY aiza ny ady, ary avy aiza ny fifandirana eo aminareo? Tsy izao va no ihaviany, dia ny filanareo izay miady ao anatin’ny momba ny tenanareo? '
  '10':
  - type: text
    content: Manetre tena eo anatrehan’ny Tompo, dia hanandratra anareo Izy.
  '11':
  - type: text
    content: 'Aza mifanaratsy, ry rahalahy. Izay manaratsy rahalahy na mitsara ny rahalahiny dia manaratsy ny lalàna sy mitsara ny lalàna; fa raha mitsara ny lalàna hianao, dia tsy mpankatò ny lalàna, fa mpitsara. '
  '12':
  - type: text
    content: Iray ihany no Mpanome lalàna sy Mpitsara, dia Ilay mahavonjy sy mahavery; fa iza moa hianao, no mitsara ny namanao?
  '13':
  - type: text
    content: 'He! hianareo izay manao hoe: Anio na ampitso dia hankany Ananona izahay ary hitoetra any herintaona ka hividy sy hivarotra ary hahazo tombom-barotra, '
  '14':
  - type: text
    content: 'kanefa tsy mahalala ny ho ampitso hianareo. Inona moa ny ainareo? Fa zavona ihany hianareo, izay miseho vetivety, dia levona. '
  '15':
  - type: text
    content: 'Fa aleo manao izao: Raha sitrapon’ny Tompo, ka velona izahay, dia hataonay izao na izany. '
  '16':
  - type: text
    content: 'Fa izao dia mirehareha amin’ny fahasahianareo hianareo; ratsy ny fireharehana rehetra toy izany. '
  '17':
  - type: text
    content: Koa izay mahalala hanao soa, nefa tsy manao, dia heloka ho azy izany.
  '2':
  - type: text
    content: Mila hianareo, nefa tsy manana ihany; mamono sy mitsiriritra
  - type: note
    content: 'Na: mialona.'
  - type: text
    content: ' hianareo, nefa tsy mahazo ihany; mifanditra sy miady hianareo; tsy manana hianareo, satria tsy mangataka. '
  '3':
  - type: text
    content: Mangataka hianareo, nefa tsy mahazo ihany, satria diso fangataka, mba holaninareo amin’ny filanareo.
  '4':
  - type: text
    content: 'Ry mpisintaka mijangajanga, tsy fantatrareo va fa fandrafiana an’Andriamanitra ny fisakaizana amin’izao tontolo izao? Koa na iza na iza te-ho sakaizan’izao tontolo izao, dia fahavalon’Andriamanitra izy. '
  '5':
  - type: text
    content: 'Ary ataonareo va fa miteny foana ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: '? '
  - type: note
    content: 'Na: ny Soratra Masina hoe:'
  - type: text
    content: Ny fanahy, izay nampitoeriny ato anatintsika
  - type: note
    content: 'Na: izay mitoetra ato anatintsiba.'
  - type: text
    content: ' dia iriny amin’ny fahasaro-piaro.'
  - type: note
    content: 'Na: Ny Fanahy, Izay nampitoeriny ato anatintsika, dia maniry amin’ny fahasaro-piaro; na: Ny Fanahy, izay nampitoeriny ato anatintsika, dia maniry amin’ny fialonana.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Nefa manome fahasoavana bebe kokoa Izy. Koa hoy izy: ,,Andriamanitra manohitra ny mpiavonavona, fa manome fahasoavana ho an’ny manetry tena’’ (Oha. 3.34). '
  '7':
  - type: text
    content: 'Ka dia maneke an’Andriamanitra hianareo; ary manohera ny devoly, dia handositra anareo izy. '
  '8':
  - type: text
    content: 'Manatòna an’Andriamanitra, dia hanatona anareo Izy. Diovy ny tànanareo, ry mpanota; ary ataovy madio ny fonareo, ry mpiroa saina. '
  '9':
  - type: text
    content: 'Oria, sy mitomania, ary midradradradrà; aoka hody fitomaniana ny fihomehezanareo, ary hody fanjoretana ny fifalianareo. '
