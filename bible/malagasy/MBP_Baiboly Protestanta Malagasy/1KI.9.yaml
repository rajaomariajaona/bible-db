document_id: 1KI.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny valin’ny vavaka nataon’i Solomona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa vitan’i Solomona ny nanaovany ny tranon’i Jehovah sy ny lapan’ny mpanjaka araka izay rehetra efa niriny hatao, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia niseho tamin’i Solomona indray Jehovah tahaka ilay nisehoany taminy tao Gibeona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Jehovah taminy: Efa reko ny vavakao sy ny fifonanao izay nataonao teo anatrehako; koa efa nohamasiniko ity trano nataonao ity mba hampitoerana ny anarako mandrakizay: ary ho amin’ity mandrakariva ny masoko sy ny foko. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha hianao handeha eo anatrehako tahaka ny nandehanan’i Davida rainao tamin’ny fahitsian’ny fo sy ny fahamarinana ka hanao araka izay rehetra nandidiako anao ary hitandrina ny didiko sy ny fitsipiko, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia hampitoeriko mandrakizay amin’ny Isiraely ny seza fiandrianan’ny fanjakanao, araka ilay nolazaiko tamin’i Davida rainao hoe: Tsy ho diso zanakalahy amin’ny seza fiandrianan’ny Isiraely hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa raha miala amin’ny fanarahana Ahy kosa hianareo na ny zanakareo ka tsy mitandrina ny lalàko sy ny didiko, izay nataoko teo anoloanareo, fa mandeha manompo andriamani-kafa sy miankohoka eo anatrehany, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia hofongorako tsy ho amin’ny tany izay nomeko azy ny Isiraely; ary ity trano izay nohamasiniko ho an’ny anarako ity dia hofongorako tsy ho eo imasoko; ary ny Isiraely ho tonga ohabolana sy ambentinteny any amin’ny firenena rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary na dia avo aza ity trano ity, dia mbola hitalanjonan’izay rehetra mandalo izy sady hisitrisirany ka hanaovany hoe: Naninona re no dia nataon’i Jehovah toy izao ity tany sy ity trano ity? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hisy hamaly hoe: Satria ny olona nahafoy an’i Jehovah Andriamaniny, Izay nitondra ny razany nivoaka avy tany amin’ny tany Egypta, ary nikikitra tamin’andriamani-kafa sy niankohoka teo anatrehany ka nanompo azy, dia izany no nampidiran’i Jehovah izao loza rehetra izao taminy.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny mpiasan’i Solomona sy ny zavatra nentiny nanao ny tempoly.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ARY nony afaka ny roa-polo taona nanaovan’i Solomona ny trano roa, dia ny tranon’i Jehovah sy ny lapan’ny mpanjaka '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(Hirama, mpanjakan’i Tyro, nanome an’i Solomona hazo sedera sy hazo kypreso ary volamena, araka izay rehetra niriny), dia nomen’i Solomona tanàna roa-polo tany amin’ny tany Galilia kosa Hirama. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Hirama niala tany Tyro hizaha ny tanàna izay nomen’i Solomona azy, ka tsy tiany ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy izy: Hatao inona ireo tanàna nomenao ahy ireo, ry rahalahiko? Ary ireny dia natao hoe tany Kabola mandraka andro-any. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary Hirama nampanatitra talenta volamena roa-polo amby zato ho an’ny mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary izao no toetry ny fanompoana nampanaovin’i Solomona mpanjaka ny olona, tamin’ny nanaovany ny tranon’i Jehovah sy ny lapan’andriana ary Milo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiarovana.
    marker-yv: yv-n
  - type: text
    text: ' sy ny màndan’i Jerosalema, sy Hazora sy Megido ary Gazera ('
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fa Farao, mpanjakan’i Egypta, efa niakatra, dia nahafaka an’i Gazera ka nandoro azy tamin’ny afo; ary ny Kananita izay nitoetra tao an-tanàna dia novonoiny, ary ny tanàna dia nomeny ho haren-jazavavy ho an’ny zanani-vavy, vadin’i Solomona), '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary Solomona nanamboatra an’i Gazera sy Beti-horona ambany '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'sy Baleta sy Tadmora any an-efitra, amin’ny tany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hamata
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary ny tanàna fitehirizana rehetra izay nananan’i Solomona sy ny tanàna fitoeran’ny kalesy sy ny tanàna fitoeran’ny mpitaingin-tsoavaly sy izay tian’i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin’ny tany nanjakany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny olona sisa rehetra tamin’ny Amorita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita, izay tsy isan’ny Zanak’Isiraely, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: dia ny taranany izay sisa nandimby azy teo amin’ny tany, izay tsy azon’ny Isiraely naringana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: natao herema.
    marker-yv: yv-n
  - type: text
    text: ' avokoa, no nampanaovin’i Solomona fanompoana mandraka andro-any.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny Zanak’Isiraely dia tsy mba nampanaovin’i Solomona izany; fa izy kosa no miaramila sy mpanompony sy komandy sy mpanafika malaza sy komandin’ny kalesiny sy ny mpitaingin-tsoavaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao no isan’ny mpifehy ny olona voatendry izay nitandrina ny asan’i Solomona: dimam-polo amby dimam-jato lahy no mpifehy ny mpiasa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa niakatra avy any an-Tanànan’i Davida ny zanakavavin’i Farao hankany amin’ny tranony izay nataon’i '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomona
  - type: text
    text: ' ho azy, dia nanao an’i Milo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiarovana.
    marker-yv: yv-n
  - type: text
    text: ' koa izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary intelo isan-taona no nanateran’i Solomona fanatitra dorana sy fanati-pihavanana teo ambonin’ny alitara izay naoriny ho an’i Jehovah, sady nandoro ditin-kazo manitra teo ambonin’ny alitara teo anatrehan’i Jehovah izy. Ka toy izany no nahavitany ny trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Solomona mpanjaka nanao sambo tao Ezion-gebera, izay ao anilan’i Elota, ao amoron’ny Ranomasina Mena, amin’ny tany Edoma. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Hirama nampandeha ny vahoakany tamin’ny sambo, dia matilô izay nahay ranomasina, hiaraka amin’ny vahoakan’i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary nankany Ofira ireo, dia naka talenta volamena roa-polo amby efa-jato, ka nentiny tany amin’i Solomona mpanjaka izany.
