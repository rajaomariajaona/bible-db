document_id: EZK.28,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’ny mpanjakan’i Tyro.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fahafatesan’ny tsy voafora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hahafatesan’ny fahavalo anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho no niteny izany, hoy Jehovah Tompo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin’i Jehovah nanao hoe:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ry zanak’olona, manaova hira fahalahelovana ny amin’ny mpanjakan’i Tyro, ka lazao aminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah Tompo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry ilay mahatanteraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manisy tombon-kase.
      marker-yv: yv-n
    - type: text
      text: ' ny rafitra tsara tarehy tonga marika'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady feno fahendrena no tena tsara tarehy,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany Edena, sahan’Andriamanitra, hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vato soa rehetra ny eloelo teo amboninao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny karneola, ny topaza, ny onyksa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny krysolita, ny beryla, ny jaspy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny safira, ny robina, ny emeralda ary ny volamena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fampanenoana ny ampongatapakao sy ny sodinao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vehivavy.
      marker-yv: yv-n
    - type: text
      text: ' dia tao aminao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny andro namoronana anao dia natao koa ireo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao dia kerobima voahosotra izay manaloka, fa voatendriko hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao an-tendrombohitra masin’Andriamanitra hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao amin’ny vato mirehitra no nitsangantsangananao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nanan-tsiny hianao tamin’ny nalehanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny andro namoronana anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandra-pahita heloka tao aminao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny habetsahan’ny varotra nataonao dia nofenoina loza tao aminao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanota hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia nolotoiko ka nariako niala tamin’ny tendrombohitr’Andriamanitra hianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nosimbako hianao, ry kerobima manaloka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiala tao amin’ny vato mirehitra.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niavonavona ny fonao noho ny hatsaran-tarehinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nahasimba ny fahendrenao mbamin’ny famirapiratanao hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nazerako eny an-tany hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady natolotro ho fitalanjonan’ireo mpanjaka,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny haben’ny helokao tamin’ny tsi-fahamarinan’ny varotrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia voalotonao ny fitoeranao masina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no hamoahako afo avy ao aminao handevona anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko tonga lavenona eny ambonin ny tany hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo imason’izay rehetra mijery anao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenena rehetra izay mahalala anao dia ho gaga anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga fampitahorana hianao ary tsy ho ao intsony mandrakizay.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’i Sidona, sy fanomezan-toky ny Isiraely.
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak’olona, lazao amin’ny mpanjakan’i Tyro hoe: Izao no lazain’i Jehovah Tompo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria miavonavona ny fonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hoy hianao: Mba Andriamanitra koa aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eto amin’ny anankiray amin’ny fipetrahan’Andriamanitra no ipetrahako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eto ampovoan’ny ranomasina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa olona ihany hianao, fa tsy Andriamanitra tsinona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia nataonao toy ny fon’Andriamanitra aza ny fonao,–
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak’olona, manandrifia an’i Sidona, dia maminania ny hamelezana azy, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ataovy hoe: Izao no lazain’i Jehovah Tompo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, efa hamely anao Aho, ry Sidona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hankalazaina ao ampovoanao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho fantatra fa Izaho no Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manatanteraka ny fitsarana azy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miseho ho masina amin’ny ataoko aminy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hahatonga areti-mandringana hamely azy Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ra ho eny an-dàlambeny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiampatrampatra eny aminy ny voatrabaky ny sabatra izay mamely avy eny manodidina eny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho fantatra fa Izaho no Jehovah.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy roy mampangirifiry na tsilo mampanaintaina intsony ho an’ny taranak’Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy amin’ireo manodidina azy, izay manao tsinontsinona azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho fantatra fa Izaho no Jehovah Tompo.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah Tompo: Raha angoniko avy any amin’ny firenena izay nampielezana azy ny taranak’Isiraely, dia hiseho ho masina eo imason’ny firenena Aho amin’ny ataoko aminy, ka honina any amin’ny taniny izay nomeko an’i Jakoba mpanompoko izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia handry fahizay any izy ka hanorina trano sy hanao tanimboaloboka; eny, handry fahizay izy amin’ny anatanterahako ny fitsarana ireo rehetra manodidina azy izay manao tsinontsinona azy; ka dia ho fantatra fa Izaho no Jehovah Andriamaniny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hay! hendry noho Daniela hianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy zava-miafina azo afenina anao izany!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahendrenao sy ny fahalalanao no nahazoanao harena.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, izany no nahazoanao volamena sy volafotsy ho ao amin’ny rakitrao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny haben’ny fahendrenao tamin’ny varotrao no nampitomboanao ny harenao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia miavonavona ny fonao noho ny harenao;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa, indro, izao no lazain’i Jehovah Tompo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria efa nataonao ho toy ny fon’Andriamanitra ny fonao,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia, indro, hitondra olona hafa firenena Aho hamely anao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay masiaka indrindra amin’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hotsoahany ny sabany hamelezany ny fahendrenao tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataony matroka ny famirapiratanao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Havariny ho any an-davaka hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho faty toy ny fahafatesan’izay voatrabaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny ranomasina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moa mbola hitompo teny fantatra va hianao eo imason’izay mamono anao hoe: Mba Andriamanitra koa aho?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa olona ihany hianao, fa tsy Andriamanitra tsinona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mby eo an-tànan’izay manatrabaka anao.
