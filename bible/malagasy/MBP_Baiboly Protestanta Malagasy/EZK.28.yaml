document_id: EZK.28,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny mpanjakan’i Tyro.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: Tahaka ny fahafatesan’ny tsy voafora
  - type: text
    content: No hahafatesan’ny fahavalo anao;
  - type: text
    content: Fa Izaho no niteny izany, hoy Jehovah Tompo.
  '11':
  - type: text
    content: 'Ary tonga tamiko ny tenin’i Jehovah nanao hoe:'
  '12':
  - type: text
    content: 'Ry zanak’olona, manaova hira fahalahelovana ny amin’ny mpanjakan’i Tyro, ka lazao aminy hoe:'
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Ry ilay mahatanteraka
  - type: note
    content: Heb. manisy tombon-kase.
  - type: text
    content: ' ny rafitra tsara tarehy tonga marika'
  - type: text
    content: Sady feno fahendrena no tena tsara tarehy,
  '13':
  - type: text
    content: Tany Edena, sahan’Andriamanitra, hianao;
  - type: text
    content: Ny vato soa rehetra ny eloelo teo amboninao,
  - type: text
    content: Dia ny karneola, ny topaza, ny onyksa,
  - type: text
    content: Ny krysolita, ny beryla, ny jaspy,
  - type: text
    content: Ny safira, ny robina, ny emeralda ary ny volamena;
  - type: text
    content: Ny fampanenoana ny ampongatapakao sy ny sodinao
  - type: note
    content: 'Na: vehivavy.'
  - type: text
    content: ' dia tao aminao,'
  - type: text
    content: Tamin’ny andro namoronana anao dia natao koa ireo.
  '14':
  - type: text
    content: Hianao dia kerobima voahosotra izay manaloka, fa voatendriko hianao;
  - type: text
    content: Tao an-tendrombohitra masin’Andriamanitra hianao;
  - type: text
    content: Tao amin’ny vato mirehitra no nitsangantsangananao.
  '15':
  - type: text
    content: Tsy nanan-tsiny hianao tamin’ny nalehanao
  - type: text
    content: Hatramin’ny andro namoronana anao
  - type: text
    content: Ka mandra-pahita heloka tao aminao.
  '16':
  - type: text
    content: Noho ny habetsahan’ny varotra nataonao dia nofenoina loza tao aminao.
  - type: text
    content: Ka nanota hianao;
  - type: text
    content: Ary dia nolotoiko ka nariako niala tamin’ny tendrombohitr’Andriamanitra hianao.
  - type: text
    content: Ary nosimbako hianao, ry kerobima manaloka,
  - type: text
    content: Hiala tao amin’ny vato mirehitra.
  '17':
  - type: text
    content: Niavonavona ny fonao noho ny hatsaran-tarehinao;
  - type: text
    content: Efa nahasimba ny fahendrenao mbamin’ny famirapiratanao hianao;
  - type: text
    content: Nazerako eny an-tany hianao
  - type: text
    content: Sady natolotro ho fitalanjonan’ireo mpanjaka,
  '18':
  - type: text
    content: Noho ny haben’ny helokao tamin’ny tsi-fahamarinan’ny varotrao,
  - type: text
    content: Dia voalotonao ny fitoeranao masina;
  - type: text
    content: Koa izany no hamoahako afo avy ao aminao handevona anao,
  - type: text
    content: Ary hataoko tonga lavenona eny ambonin ny tany hianao
  - type: text
    content: Eo imason’izay rehetra mijery anao.
  '19':
  - type: text
    content: Ny firenena rehetra izay mahalala anao dia ho gaga anao;
  - type: text
    content: Ho tonga fampitahorana hianao ary tsy ho ao intsony mandrakizay.
  - type: heading
    content: Faminaniana ny amin’i Sidona, sy fanomezan-toky ny Isiraely.
  '2':
  - type: text
    content: 'Ry zanak’olona, lazao amin’ny mpanjakan’i Tyro hoe: Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Satria miavonavona ny fonao
  - type: text
    content: 'Ka hoy hianao: Mba Andriamanitra koa aho;'
  - type: text
    content: Eto amin’ny anankiray amin’ny fipetrahan’Andriamanitra no ipetrahako,
  - type: text
    content: Dia eto ampovoan’ny ranomasina.
  - type: text
    content: Nefa olona ihany hianao, fa tsy Andriamanitra tsinona.
  - type: text
    content: Na dia nataonao toy ny fon’Andriamanitra aza ny fonao,–
  '20':
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '21':
  - type: text
    content: 'Ry zanak’olona, manandrifia an’i Sidona, dia maminania ny hamelezana azy, '
  '22':
  - type: text
    content: 'ka ataovy hoe: Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, efa hamely anao Aho, ry Sidona,
  - type: text
    content: Ary hankalazaina ao ampovoanao Aho;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah,
  - type: text
    content: Raha manatanteraka ny fitsarana azy Aho
  - type: text
    content: Ka miseho ho masina amin’ny ataoko aminy.
  '23':
  - type: text
    content: Fa hahatonga areti-mandringana hamely azy Aho
  - type: text
    content: Ary ra ho eny an-dàlambeny;
  - type: text
    content: Dia hiampatrampatra eny aminy ny voatrabaky ny sabatra izay mamely avy eny manodidina eny;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah.
  '24':
  - type: text
    content: Ary tsy hisy roy mampangirifiry na tsilo mampanaintaina intsony ho an’ny taranak’Isiraely,
  - type: text
    content: Avy amin’ireo manodidina azy, izay manao tsinontsinona azy;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah Tompo.
  '25':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo: Raha angoniko avy any amin’ny firenena izay nampielezana azy ny taranak’Isiraely, dia hiseho ho masina eo imason’ny firenena Aho amin’ny ataoko aminy, ka honina any amin’ny taniny izay nomeko an’i Jakoba mpanompoko izy. '
  '26':
  - type: text
    content: Dia handry fahizay any izy ka hanorina trano sy hanao tanimboaloboka; eny, handry fahizay izy amin’ny anatanterahako ny fitsarana ireo rehetra manodidina azy izay manao tsinontsinona azy; ka dia ho fantatra fa Izaho no Jehovah Andriamaniny.
  '3':
  - type: text
    content: Hay! hendry noho Daniela hianao!
  - type: text
    content: Tsy misy zava-miafina azo afenina anao izany!
  '4':
  - type: text
    content: Ny fahendrenao sy ny fahalalanao no nahazoanao harena.
  - type: text
    content: Eny, izany no nahazoanao volamena sy volafotsy ho ao amin’ny rakitrao.
  '5':
  - type: text
    content: Ny haben’ny fahendrenao tamin’ny varotrao no nampitomboanao ny harenao,
  - type: text
    content: Ka dia miavonavona ny fonao noho ny harenao;
  '6':
  - type: text
    content: 'Koa, indro, izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Satria efa nataonao ho toy ny fon’Andriamanitra ny fonao,
  '7':
  - type: text
    content: Dia, indro, hitondra olona hafa firenena Aho hamely anao.
  - type: text
    content: Dia izay masiaka indrindra amin’ny firenena,
  - type: text
    content: Ka hotsoahany ny sabany hamelezany ny fahendrenao tsara,
  - type: text
    content: Ary hataony matroka ny famirapiratanao.
  '8':
  - type: text
    content: Havariny ho any an-davaka hianao,
  - type: text
    content: Ka ho faty toy ny fahafatesan’izay voatrabaka
  - type: text
    content: Ao amin’ny ranomasina.
  '9':
  - type: text
    content: 'Moa mbola hitompo teny fantatra va hianao eo imason’izay mamono anao hoe: Mba Andriamanitra koa aho?'
  - type: text
    content: Nefa olona ihany hianao, fa tsy Andriamanitra tsinona,
  - type: text
    content: Raha mby eo an-tànan’izay manatrabaka anao.
