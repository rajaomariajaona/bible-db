document_id: AMO.6
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan’ireo miadana ao Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ireo matokitoky foana ao an-tendrombohitr’i Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo malaza eo amin’ny firenena malaza indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hatonin’ny taranak’Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mankanesa any Kalne hianareo, ka mijere,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mandrosoa ihany ho any Hamata lehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary midìna ho any Gatan’ny Filistina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsara noho ireo fanjakana ireo va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa lehibe noho ny tanin’ireo va ny taninareo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hianareo izay mihevitra ny andro mampahory ho mbola lavitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mampanakaiky ny seza fandozana,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia ireo izay mandriandry ao amin’ny farafara ivoriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mitsilailay eo amin’ny fandriandriany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary homana ny zanak’ondry avy amin’ny andian’ny ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny zanak’omby avy ao am-pahitra,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia ireo izay mivòvò foana manaraka ny feon-dokanga
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamorona zava-maneno toy ny nataon’i Davida,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia ireo izay misotro divay amin’ny lovia famafazana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mihosotra diloilo tsara indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy onena ny fahasimban’i Josefa–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa amin’izao dia ho voalohany amin’izay hobaboina ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatsahatro ny hobin’izay mitsilailay foana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jehovah Tompo dia efa nianiana tamin’ny tenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy Jehovah, Andriamanitry ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahavetavetana eo anatrehako ny reharehan’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary halako ny tranobeny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa dia hatolotro ny tanàna mbamin’izay rehetra ao anatiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary raha hisy folo lahy sisa ao an-trano iray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia samy ho faty ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny havan’izay maty, na izay handevina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: handoro.
    marker-yv: yv-n
  - type: text
    text: ' azy, dia hambeta azy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hitondra ny faty hiala ao an-trano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia hiteny amin’izay ao anaty trano hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola misy ihany va ato aminao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary raha hoy izy: Tapitra!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia hovaliana hoe: Mangìna re! fa tsy tokony hotononina ny anaran’i Jehovah.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa, indro, Jehovah no mandidy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka horavana ny trano lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hotresatresahina ny trano madinika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihazakazaka eny amin’ny sola-bato va ny soavaly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy olona mampihosy omby va eny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No efa navadikareo ho zava-mangidy ny rariny, ary ny vokatry ny fahamarinana ho zava-mahafaty?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hianareo izay mifaly amin’ny zava-poana ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy ny herinay va no ahazoanay tandroka ho anay?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa, indro, hanangana firenena hamely anareo Aho, ry taranak’Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Andriamanitry ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hampahory anareo hatrany akaikin’i Hamata izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hatramin’ny lohasahan-driaka any amin’ny tani-hay.
