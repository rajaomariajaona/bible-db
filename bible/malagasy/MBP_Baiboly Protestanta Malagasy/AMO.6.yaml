document_id: AMO.6,873
type_code: plt
verses:
  '1':
  - type: text
    content: Lozan’ireo miadana ao Ziona
  - type: text
    content: Sy ireo matokitoky foana ao an-tendrombohitr’i Samaria,
  - type: text
    content: Dia ireo malaza eo amin’ny firenena malaza indrindra
  - type: text
    content: Sady hatonin’ny taranak’Isiraely.
  '10':
  - type: text
    content: Ary ny havan’izay maty, na izay handevina
  - type: note
    content: Heb. handoro.
  - type: text
    content: ' azy, dia hambeta azy'
  - type: text
    content: Ka hitondra ny faty hiala ao an-trano,
  - type: text
    content: 'Dia hiteny amin’izay ao anaty trano hoe:'
  - type: text
    content: Mbola misy ihany va ato aminao?
  - type: text
    content: 'Ary raha hoy izy: Tapitra!'
  - type: text
    content: 'Dia hovaliana hoe: Mangìna re! fa tsy tokony hotononina ny anaran’i Jehovah.'
  '11':
  - type: text
    content: Fa, indro, Jehovah no mandidy,
  - type: text
    content: Ka horavana ny trano lehibe,
  - type: text
    content: Ary hotresatresahina ny trano madinika.
  '12':
  - type: text
    content: Mihazakazaka eny amin’ny sola-bato va ny soavaly.
  - type: text
    content: Misy olona mampihosy omby va eny,
  - type: text
    content: No efa navadikareo ho zava-mangidy ny rariny, ary ny vokatry ny fahamarinana ho zava-mahafaty?
  '13':
  - type: text
    content: 'Dia hianareo izay mifaly amin’ny zava-poana ka manao hoe:'
  - type: text
    content: Moa tsy ny herinay va no ahazoanay tandroka ho anay?
  '14':
  - type: text
    content: Fa, indro, hanangana firenena hamely anareo Aho, ry taranak’Isiraely,
  - type: text
    content: Hoy Jehovah, Andriamanitry ny maro,
  - type: text
    content: Dia hampahory anareo hatrany akaikin’i Hamata izy
  - type: text
    content: Ka hatramin’ny lohasahan-driaka any amin’ny tani-hay.
  '2':
  - type: text
    content: Mankanesa any Kalne hianareo, ka mijere,
  - type: text
    content: Dia mandrosoa ihany ho any Hamata lehibe;
  - type: text
    content: Ary midìna ho any Gatan’ny Filistina;
  - type: text
    content: Tsara noho ireo fanjakana ireo va izy?
  - type: text
    content: Sa lehibe noho ny tanin’ireo va ny taninareo?
  '3':
  - type: text
    content: Hianareo izay mihevitra ny andro mampahory ho mbola lavitra
  - type: text
    content: Sy mampanakaiky ny seza fandozana,–
  '4':
  - type: text
    content: Dia ireo izay mandriandry ao amin’ny farafara ivoriny
  - type: text
    content: Sy mitsilailay eo amin’ny fandriandriany
  - type: text
    content: Ary homana ny zanak’ondry avy amin’ny andian’ny ondry
  - type: text
    content: Sy ny zanak’omby avy ao am-pahitra,–
  '5':
  - type: text
    content: Dia ireo izay mivòvò foana manaraka ny feon-dokanga
  - type: text
    content: Ary mamorona zava-maneno toy ny nataon’i Davida,
  '6':
  - type: text
    content: Dia ireo izay misotro divay amin’ny lovia famafazana
  - type: text
    content: Sady mihosotra diloilo tsara indrindra,
  - type: text
    content: Nefa tsy onena ny fahasimban’i Josefa–
  '7':
  - type: text
    content: Koa amin’izao dia ho voalohany amin’izay hobaboina ireo,
  - type: text
    content: Ary hatsahatro ny hobin’izay mitsilailay foana.
  '8':
  - type: text
    content: Jehovah Tompo dia efa nianiana tamin’ny tenany,
  - type: text
    content: 'Hoy Jehovah, Andriamanitry ny maro:'
  - type: text
    content: Fahavetavetana eo anatrehako ny reharehan’i Jakoba,
  - type: text
    content: Ary halako ny tranobeny;
  - type: text
    content: Koa dia hatolotro ny tanàna mbamin’izay rehetra ao anatiny.
  '9':
  - type: text
    content: Ary raha hisy folo lahy sisa ao an-trano iray,
  - type: text
    content: Dia samy ho faty ireo.
