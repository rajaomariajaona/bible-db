document_id: JDG.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nisamboran’ny Filistina an’i Samsona sy ny namalian’i Samsona azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Samsona nankany Gaza ka nahita vehivavy janga teo, dia niditra tao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ary nolazaina
  - type: text
    text: ' tamin’ny Gazita hoe: Tonga atỳ Samsona. Dia nanemitra azy izy ary nanotrika mandritra ny alina teo am-bavahadin’ny tanàna ka nangina mandritra ny alina; fa hoy izy: Raha maraina ny andro, dia hovonointsika izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nandry Samsona mandra-pamatonalina, dia nifoha izy nony namatonalina, ka noraisiny ny vavahadin’ny tanàna mbamin’ny tolana roa, dia nongotany izy mbamin’ny hidiny ka nataony teny an-tsorony, dia nentiny ho any an-tampon’ny tendrombohitra izay tandrifin’i Hebrona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa afaka izany, dia tia vehivavy atao hoe Delila tany an-dohasaha Soreka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ireo andrianan’ny Filistina niakatra nankany amin-dravehivavy ka nanao taminy hoe: Kolikoleo izy, ka izahao izay itoeran’ny heriny lehibe sy izay hahazoanay mamatotra azy mba hahafolaka azy; dia samy hanome anao sekely zato amby arivo avy izahay rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy Delila tamin’i Samsona: Masìna hianao, lazao amiko izay itoeran’ny herinao lehibe sy izay hahazoana mamatotra anao hahafolaka anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Samsona taminy: Raha tady vaovao fito izay tsy mbola maina no amatorany ahy, dia ho osa aho ka ho tahaka ny olon-kafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niakatra nankany aminy ireo andrianan’ny Filistina nitondra tady vaovao fito izay tsy mbola maina, dia namatotra azy tamin’ireny ravehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy lehilahy nanotrika ka nitoetra taminy tao an-efi-trano. Dia hoy ravehivavy tamin’i Samsona: Hamely anao ny Filistina, ry Samsona! Dia notosany ny tady, tahaka ny fahamaiton’ny taretra rongony, raha lelafin’ny afo. Dia tsy fantatra ny heriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Delila tamin’i Samsona: Indro, efa namitaka ahy hianao ka nilaza lainga tamiko; ankehitriny, masìna hianao, lazao amiko izay hahazoana mamatotra anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy kosa izy taminy: Raha mahazaka vaovao izay tsy mbola nanaovan-draharaha no amatorany ahy mafy, dia ho osa aho ka ho tahaka ny olon-kafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia naka mahazaka vaovao Delila, ka namatorany azy, dia hoy izy taminy: Hamely anao ny Filistina, ry Samsona!Ary nisy mpanotrika nitoetra tao an-efi-trano. Dia notosan’i Samsona ho afaka amin’ny sandriny ireny tahaka ny fahamaiton’ny taretra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Delila tamin’i Samsona: Mandraka ankehitriny dia mbola namitaka ahy ihany hianao ka nilaza lainga tamiko; lazao amiko izay hahazoana mamatotra anao. Dia hoy kosa izy taminy: Raha tenonima hikambana amin’ny tenona ny foto-bolo fito amin’ny lohako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary notsatohany ny fàntaka izany, dia hoy izy taminy: Hamely anao ny Filistina, ry Samsona! Dia nifoha tamin’ny torimasony izy, ka nongotany ny fàntaka sy ny tenona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy ravehivavy taminy: Nahoana hianao no nanao hoe: Tiako hianao, nefa ny fonao tsy amiko tsinona? Efa namitaka ahy intelo hianao izay, ka tsy mbola nolazainao tamiko ihany izay itoeran’ny herinao lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa nitorikisina taminy isan-andro ravehivavy ka nahasosotsosotra azy, dia tsy nahafinaritra azy intsony ny miaina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary dia nambarany azy ny tao am-pony rehetra, ka hoy izy taminy: Tsy mbola nokasihin-kareza ny lohako, fa Nazirita ho an’Andriamanitra hatrany an-kibon-dreniko aho; koa raha haratana aho, dia hiala amiko ny heriko, ary ho osa aho ka ho tahaka ny olona rehetra,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa hitan’i Delila fa efa nambarany azy ny tao am-pony rehetra, dia naniraka izy nampaka ireo andrianan’ny Filistina nanao hoe: Miakara amin’izao indray mandeha izao, fa efa nambarany ahy ny tao am-pony rehetra. Ary ireo andrianan’ny Filistina niakatra ho any aminy nitondra ny vola teny an-tànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ravehivavy nanondana an’i Samsona hatory teo an-dohaliny dia niantso lehilahy ka nanaratra ny foto-bolo fito amin’ny lohany; dia vao izay no nampietry azy izy, satria niala taminy ny heriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy ravehivavy: Hamely anao ny Filistina, ry Samsona! Dia nifoha tamin’ny torimasony izy ka nanao hoe: Hivoaka tahaka ny teo aloha aho ka hanetsika ny tenako. Kanjo tsy fantany fa Jehovah efa niala taminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nisambotra azy ny Filistina ka namotsitra ny masony, dia nitondra azy nidina nankany Gaza ary namatotra azy tamin’ny gadra varahina; ary nitoto vary tao an-trano famatorana izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary dia naniry indray ny volon-dohany, rehefa voaharatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nivory ireo andrianan’ny Filistina hamono zavatra betsaka hatao fanatitra ho an’i Dagona andriamaniny sy hifaly; fa hoy izy: Efa natolotry ny andriamanitsika eto an-tànantsika Samsona fahavalontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa nahita azy ny vahoaka, dia nidera ny andriamaniny ka nanao hoe: Efa natolotry ny andriamanitsika eto an-tànantsika ilay fahavalontsika, mpanimba ny tanintsika, izay naha-be maty antsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary rehefa faly ny fony, dia hoy izy: Alao Samsona mba hanao laolao ho antsika. Dia nampaka an’i Samsona avy tao an-trano famatorana izy, ka nanao laolao teo anatrehan’ireo Samsona; ary nampitsanganiny teo anelanelan’ny andry izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy Samsona tamin’ny zatavo izay nitantana azy: Avelao kely aho hitsapa ny andry izay manohana ny trano, hiankinako aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary feno lehilahy sy vehivavy ny trano, ary tao ireo andrianan’ny Filistina rehetra, ary teo an-tampon-trano koa nisy lehilahy sy vehivavy tokony ho telo arivo, izay finaritra nijery an’i Samsona nanao laolao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Samsona niantso an’i Jehovah ka nanao hoe: Jehovah Tompo ô, mifona aminao aho, tsarovy aho, ka ampaherezo izao indray mandeha izao monja, ry Andriamanitra ô, hamaliako ny Filistina noho ny anankiray amin’ny masoko roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia notanan’i Samsona ny andry roa teo afovoany izay nanohana ny trano, ny anankiray tamin’ny tànany ankavanana, ary ny anankiray tamin’ny tànany ankavia, ka niankina teo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy Samsona: Aoka hiara-maty amin’ny Filistina aho. Dia nezahiny mafy, ka dia nianjera tamin’ireo andriana sy ny vahoaka rehetra izay teo ny trano. Ary ny maty izay novonoiny teo amin’ny nahafatesany no be lavitra noho izay novonoiny tamin’ny andro niainany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary nidina ny rahalahiny sy ny mpianakavin-drainy rehetra, dia naka ny fatiny ka nitondra azy niakatra, dia nandevina azy teo anelanelan’i Zora sy Estaola tao amin’ny fasan’i Manoa rainy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary izy efa nitsara ny Isiraely roa-polo taona.
