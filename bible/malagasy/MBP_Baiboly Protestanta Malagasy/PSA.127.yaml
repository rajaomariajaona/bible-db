segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahatsinontsinon’ny ataon’ny olona, raha tsy ambinin’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '127.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fihirana misy hevitra ambaratonga.
    marker-yv: yv-n
  - type: text
    text: ' Nataon’i Solomona.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: RAHA tsy Jehovah no manao ny trano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia miasa foana ny mpanao azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy Jehovah no miambina ny tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia miari-tory foana ny mpiambina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Zava-poana ho anareo ny mifoha maraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny alim-pandry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka homana ny hanina azo amin’ny fahasahiranana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany anefa dia omeny ihany ho an’ny malalany, na dia matory aza izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indro, lova avy amin’i Jehovah ny zanaka maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamby ny ateraky ny kibo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tahaka ny zana-tsipìka eo an-tànan’ny mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanaky ny fahatanorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sambatra izay mameno ny tranon-jana-tispìkany amin’ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho menatra ireny, raha mifamaly amin’ny fahavalo eo am-bavahady.
