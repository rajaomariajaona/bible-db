document_id: PSA.127,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatsinontsinon’ny ataon’ny olona, raha tsy ambinin’Andriamanitra.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: ' Nataon’i Solomona.'
  - type: text
    content: RAHA tsy Jehovah no manao ny trano,
  - type: text
    content: Dia miasa foana ny mpanao azy.
  - type: text
    content: Raha tsy Jehovah no miambina ny tanàna,
  - type: text
    content: Dia miari-tory foana ny mpiambina.
  '2':
  - type: text
    content: Zava-poana ho anareo ny mifoha maraina
  - type: text
    content: Sy ny alim-pandry
  - type: text
    content: Ka homana ny hanina azo amin’ny fahasahiranana;
  - type: text
    content: Izany anefa dia omeny ihany ho an’ny malalany, na dia matory aza izy.
  '3':
  - type: text
    content: Indro, lova avy amin’i Jehovah ny zanaka maro;
  - type: text
    content: Tamby ny ateraky ny kibo.
  '4':
  - type: text
    content: Tahaka ny zana-tsipìka eo an-tànan’ny mahery
  - type: text
    content: Ny zanaky ny fahatanorana.
  '5':
  - type: text
    content: Sambatra izay mameno ny tranon-jana-tispìkany amin’ireny;
  - type: text
    content: Tsy ho menatra ireny, raha mifamaly amin’ny fahavalo eo am-bavahady.
