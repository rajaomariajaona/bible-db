document_id: ROM.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa inona ary no tombony ananan’ny Jiosy, ary inona koa no soa avy amin’ny famorana? '
  '10':
  - type: text
    content: 'araka ny voasoratra hoe:'
  - type: text
    content: ',,Tsy misy marina na dia iray akory aza;'
  '11':
  - type: text
    content: Tsy misy izay mahafantatra,
  - type: text
    content: Tsy misy izay mitady an’Andriamanitra.
  '12':
  - type: text
    content: Samy nania avokoa izy rehetra,
  - type: text
    content: Samy tsy mahasoa avokoa izy rehetra;
  - type: text
    content: Tsy misy izay manao ny tsara na dia iray akory aza’’ (Sal. 14.1-3).
  '13':
  - type: text
    content: ',,Fasana misokatra ny tendany;'
  - type: text
    content: Ny lelany no anaovany fitaka’’ (Sal. 5.9);
  - type: text
    content: ',,Ny poizin’ny menarana no ao ambanin’ny molony’’ (Sal. 140.3);'
  '14':
  - type: text
    content: ',,Feno ozona sy fangidiana ny vavany’’ (Sal. 10.7);'
  '15':
  - type: text
    content: ',,Ny tongony mimaona handatsa-dra;'
  '16':
  - type: text
    content: Fandravana sy fandringanana no eo amin’ny alehany;
  '17':
  - type: text
    content: Ary ny lalàn’ny fiadanana dia tsy fantany’’ (Isa. 59.7, 8);
  '18':
  - type: text
    content: ',,Tsy misy fahatahorana an’Andriamanitra eo anoloan’ny masony’’ (Sal. 36.1).'
  '19':
  - type: text
    content: 'Ary fantatsika fa izay zavatra lazain’ny lalàna dia lazainy amin’izay manana ny lalàna, mba ho voatampina avokoa ny vava rehetra, ka hiharan’ny fitsaran’Andriamanitra izao tontolo izao, '
  '2':
  - type: text
    content: 'Be ihany amin’ny zavatra rehetra: voalohany, izy no notolorana ny tenin’Andriamanitra ho adidiny. '
  '20':
  - type: text
    content: satria tsy misy nofo hohamarinina amin’ny asan’ny lalàna eo anatrehany; fa ny lalàna no ahazoana ny fahalalana marina ny amin’ny ota.
  - type: heading
    content: Ny fanamarinan’Andriamanitra maimaimpoana ny mino an’i Kristy.
  '21':
  - type: text
    content: 'FA ankehitriny dia efa naharihary ny fahamarinana avy amin’Andriamanitra, tsy amin’ny lalàna anefa, fa ambaran’ny lalàna sy ny mpaminany, '
  '22':
  - type: text
    content: dia ny fahamarinana avy amin’Andriamanitra amin’ny finoana an’i Jesosy Kristy
  - type: note
    content: 'Ampio hoe: [ho an’ny olona rehetra sy].'
  - type: text
    content: ' ho an’izay rehetra mino; fa tsy misy hafa, '
  '23':
  - type: text
    content: 'fa samy efa nanota izy rehetra ka tsy manana ny voninahitra avy amin’Andriamanitra, '
  '24':
  - type: text
    content: 'nefa hamarinina maimaimpoana amin’ny fahasoavany izy noho ny fanavotana izay ao amin’i Kristy Jesosy, '
  '25':
  - type: text
    content: Izay nasehon’Andriamanitra tamin’ny rany ho fanavotana
  - type: note
    content: 'Na: fanatitra fampiononam-pahatezerana.'
  - type: text
    content: ' amin’ny finoana, hanehoana ny fahamarinany amin’ny tsy namalian’Andriamanitra ny fahotana lasa tamin’ny nandeferany, '
  '26':
  - type: text
    content: mba hanehoana ny fahamarinany ankehitriny, mba ho marina Izy sady hanamarina izay manana finoana an’i Jesosy.
  '27':
  - type: text
    content: 'Aiza ary ny fireharehana? Efa foana izany. Amin’ny lalàna manao ahoana? amin’ny lalàn’ny asa va? Tsia; fa amin’ny lalàn’ny finoana. '
  '28':
  - type: text
    content: 'Koa amin’izany dia ataontsika fa finoana no anamarinana ny olona, fa tsy ny asan’ny lalàna. '
  '29':
  - type: text
    content: 'Andriamanitry ny Jiosy ihany va Izy? fa tsy mba an’ny jentilisa koa? Eny, an’ny jentilisa koa; '
  '3':
  - type: text
    content: 'Fa ahoana kosa ary? Raha tsy nino ny sasany, moa ny tsi-finoanay va hahafoana ny fahamarinan’Andriamanitra? '
  '30':
  - type: text
    content: fa iray ihany Andriamanitra, Izay hanamarina ny voafora noho ny finoana, ary ny tsy voafora amin’ny finoana.
  '31':
  - type: text
    content: Koa mahafoana ny lalàna amin’ny finoana va isika? Sanatria izany! fa mampiorina tsara ny lalàna isika.
  '4':
  - type: text
    content: 'Sanatria izany! Aoka Andriamanitra no ho marina, fa ny olona rehetra kosa ho mpandainga; araka ny voasoratra hoe:'
  - type: text
    content: ',,Mba hohamarinina amin’ny teninao Hianao,'
  - type: text
    content: Ary hahery, rehefa manana ady’’
  - type: note
    content: 'Na: tsaraina.'
  - type: text
    content: ' (Sal. 51.4).'
  '5':
  - type: text
    content: 'Fa raha ny tsi-fahamarinantsika no mampiseho ny fahamarinan’Andriamanitra, ahoana ary no holazaintsika? Tsy marina angaha Andriamanitra Izay mandatsaka ny fahatezerany! –miteny araka ny fanaon’ny olona aho– '
  '6':
  - type: text
    content: Sanatria izany! Fa raha izany, hataon’Andriamanitra ahoana no fitsara izao tontolo izao?
  '7':
  - type: text
    content: 'Fa raha ny fahamarinan’Andriamanitra kosa no nitombo tamin’ny laingako ho voninahiny, nahoana aho no mbola tsaraina ho mpanota indray? '
  '8':
  - type: text
    content: Ary nahoana no tsy hanao ratsy hihavian’ny soa isika,–araka ny anendrikendrehana anay sy ny filazan’ny sasany anay. Marina ny fanamelohana ireny.
  '9':
  - type: text
    content: Ahoana ary? Manan-kavaly
  - type: note
    content: 'Na: Latsaka noho ireny va isika?'
  - type: text
    content: ' va isika? Tsia tsy akory; fa efa voalazantsika rahateo ho mpanota avokoa na ny Jiosy na ny jentilisa;'
  - type: note
    content: Gr. Grika.
  - type: text
    content: ' '
