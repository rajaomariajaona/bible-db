document_id: NUM.34
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny ho faritry ny tany Kanana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandidia ny Zanak’Isiraely hoe: Raha tonga any amin’ny tany Kanana hianareo, dia izao no tany izay ho azonareo ho lova, dia ny tany Kanana araka izay fari-taniny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny lafiny atsimo amin’ny taninareo dia hatramin’ny efitra Zina, izay mifanolotra amin’i Edoma. Ary ny fari-taninareo atsimo dia hatramin’ny faran’ny Ranomasin-tsira any atsinanana, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia miolaka eo atsimon’ny fiakarana Akrabima, dia mandroso hatrany Zina, dia mahazo any atsimon’i Kadesi-barnea, dia mahazo an’i Hazar-adara ka mandroso hatrany Azmona, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary miolaka hatrany Azmona ka hatramin’ny lohasahan-driak’i Egypta, ka dia mihatra amin’ny ranomasina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny amin’ny fari-tany andrefana, dia indro ny Ranomasina Lehibe sy ny amorony, ka hatreo no ho fari-taninareo andrefana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izao no ho fari-taninareo avaratra: hatramin’ny Ranomasina Lehibe dia aoka ny tendrombohitra Hora no hotandrifinareo; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary hatramin’ny tendrombohitra Hora dia aoka ny làlana mankany Hamatra no hotandrifinareo. ary aoka ny fari-tany hahazo an’i Zedada, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: dia hahazo an’i Zifrona, ka dia hihatra an’i Hazar-enana; izany no ho fari-taninareo avaratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny ho fari-taninareo atsinanana dia ampifanitsio amin’i Hazar-enana ka hatrany Sefama, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia hidina hatrany Sefama ka hatrany Ribla any atsinanan’i Aina, dia mbola hidina ihany koa ka hipaka amin’ny Ranomasin’i Kinereta atsinanana, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: dia hidina ihany indray hatrany Jordana, ka dia hihatra amin’ny Ranomasin-tsira.
- type: usfm
  marker: p
  children:
  - type: text
    text: Izany no ho taninareo araka ny fari-taniny manodidina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Mosesy nandidy ny Zanak’Isiraely ka nanao hoe: Izany no tany izay hozarainareo araka ny filokana, dia izay andidian’i Jehovah homena ny firenena sivy sy sasany; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa ny firenena taranak’i Robena araka ny fianakaviany sy ny firenena taranak’i Gada araka ny fianakaviany dia efa nandray ny zara-taniny, ary ny antsasaky ny firenen’i Manase koa dia efa nandray ny zara-taniny; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: dia ny firenena roa sy sasany samy efa nandray ny zara-taniny atỳ an-dafy atsinanan’i Jordana, hitsin’i Jeriko, tandrifin’ny fiposahan’ny masoandro.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny anaran’ny lehilahy roa ambin’ny folo notendrena hizara ny tany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izao no anaran’ny lehilahy izay hizara ny tany ho anareo: Eleazara mpisorona sy Josoa, zanak’i Nona. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary loholona iray avy amin’ny isam-pirenena koa no halainareo hizara ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary izao no anaran’ireo lehilahy ireo: ny avy amin’ny firenen’i Joda dia Kaleba, zanak’i Jefone; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary ny avy amin’ny firenena taranak’i Simeona dia Semoela, zanak’i Amihoda; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary ny avy amin’ny firenen’i Benjamina dia Elidada, zanak’i Kislona; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary ny lohan’ny firenena taranak’i Dana dia Boky, zanak’i Jogly; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary ny avy amin’ny taranak’i Josefa: ny lohan’ny firenena taranak’i Manase dia Haniela, zanak’i Efoda; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary ny lohan’ny firenena taranak’i Efraima dia Kemoela, zanak’i Siftana; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ary ny lohan’ny firenena taranak’i Zebolona dia Elizafana, zanak’i Parnaka; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary ny lohan’ny firenena taranak’Isakara dia Paltiela, zanak’i Azana; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary ny lohan’ny firenena taranak’i Asera dia Ahihoda, zanak’i Selomy; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ary ny lohan’ny firenena taranak’i Naftaly dia Pedahela, zanak’i Amihoda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ireo no nodidian’i Jehovah hizara ny tany Kanana ho an’ny Zanak’Isiraely.
