document_id: HEB.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa na dia ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fanekena
  - type: text
    text: ' voalohany aza dia nisy fitsipika ny amin’ny fanompoam-pivavahana, ary nisy ny fitoerany masina momba ny etỳ an-tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa nisy tabernakely voavoatra: ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: efitra
  - type: text
    text: ' voalohany, ilay atao hoe ,ny fitoerana masina,’ izay nisy ny fanaovan-jiro sy ny latabatra ary ny mofo aseho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ao anatin’ny efitra lamba faharoa no nisy ny tabernakely izay atao hoe ,ny fitoerana masina indrindra,’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: izay nisy lovia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: alitara.
    marker-yv: yv-n
  - type: text
    text: ' volamena fandoroana ditin-kazo manitra sy ny fiaran’ny fanekena, izay voapetaka takela-bolamena avokoa; ary tao anatin’io nisy ny vilany volamena, izay nitoeran’ny mana, sy ny tehin’i Arona izay nitsimoka, ary ny vato fisaky ny fanekena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary teo ambonin’io koa ny kerobima nisy ny voninahitra, izay nanaloka ny rakotra fanaovam-panavotana,–tsy azonay lazaina tsirairay ireo ankehitriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa voavoatra toy izany ireo zavatra ireo, dia miditra mandrakariva eo amin’ny tabernakely voalohany ny mpisorona hanefa ny fanompoam-pivavahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny faharoa kosa no idiran’ny mpisoronabe irery ihany indray mandeha isan-taona; ary izy aza dia tsy miditra, raha tsy mitondra ra, izay ateriny noho ny amin’ny tenany sy ny fahadisoana nataon’ny olona amin’ny tsi-fahalalana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'koa izany no anambaran’ny Fanahy Masina fa tsy mbola voaseho ny làlana mankany amin’ny fitoerana masina '
  - type: usfm
    marker: it
    children:
    - type: text
      text: indrindra,
  - type: text
    text: ' raha mbola ao ihany ny tabernakely voalohany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'fanoharana izany amin’izao andro ankehitriny izao, ary araka izany no anaterana fanomezana sy fanatitra, izay tsy mahatanteraka ny mpivavaka ny amin’ny fieritreretana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: (fa naman’ny zavatra hohanina sy ny zavatra hosotroina sy ny fanasana samy hafa), dia fitsipika araka ny nofo, voatendry hatao mandra-pihavin’ny andro fanovana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Kristy kosa, rehefa tonga ho Mpisoronabe ny amin’ny zavatra tsara ho avy, dia namaky teo amin’ny tabernakely lehibe lavitra sady tsara lavitra, izay tsy nataon-tànana, izany hoe, tsy isan’izao zavatra ary izao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary tsy mba nitondra ran’osilahy sy ran-janak’omby Izy, fa ny ran’ny tenany, dia niditra indray mandeha ho any amin’ny fitoerana masina ka nahazo fanavotana mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha ny ran’osilahy sy ny ran’ombilahy ary ny lavenom-bantotr’ombivavy afafy amin’izay voaloto no manamasina hatramin’ny fanadiovana ny nofo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mainka fa ny ran’i Kristy, Izay nanatitra ny tenany tsy manan-tsiny ho an’Andriamanitra, tamin’ny alalan’ny Fanahy mandrakizay, no hahadio ny fieritreretanareo ho afaka amin’ny asa maty mba hanompoanareo an’Andriamanitra velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary noho izany dia Mpanalalana amin’izay fanekena vaovao Izy, rehefa niaritra fahafatesana ho fanavotana amin’ny fahotana natao tamin’ny fanekena voalohany, mba hahazoan’izay voantso ny teny fikasana, dia ny lova mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha misy didim-pananana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanekena
    marker-yv: yv-n
  - type: text
    text: ' dia teny foana izany, raha tsy efa maty ilay nanao azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa mafy ny didim-pananana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanekena
    marker-yv: yv-n
  - type: text
    text: ' rehefa tonga ny fahafatesana; fa tsy mafy akory izany, raha mbola velona ilay nanao azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa na dia ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fanekena
  - type: text
    text: ' voalohany aza dia tsy nohamasinina raha tsy nisy ra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa rehefa voalazan’i Mosesy tamin’ny vahoaka rehetra ny didy rehetra araka ny lalàna, dia nalainy ny ran-janak’omby sy ny ran’osilahy mbamin’ny rano sy ny volon’ondry jaky sy ny hysopa ka nafafiny tamin’ny boky sy ny vahoaka rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia hoy izy: Ity no ran’ny fanekena izay nandidian’Andriamanitra anareo (Eks. 24.8). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny tabernakely sy ny fanaka rehetra enti-manao fanompoam-pivavahana dia nofafazany ra toy izany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary saiky diovina amin’ny ra avokoa ny zavatra rehetra araka ny lalàna; fa raha tsy misy ra alatsaka, dia tsy misy famelan-keloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa dia tsy maintsy nodiovina tamin’ireny ny tandindon’ny zavatra any an-danitra, fa ny tenan’ny zavatra any an-danitra kosa dia tamin’izay fanatitra tsara noho ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa Kristy tsy mba niditra tao amin’izay fitoerana masina nataon-tànana, izay tandindon ny tena fitoerana masina, fa ho any an-danitra tokoa, mba hiseho eo anatrehan’Andriamanitra ankehitriny ho antsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ary tsy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: niditra Izy
  - type: text
    text: ' mba hanatitra ny tenany matetika, tahaka ny mpisoronabe miditra ao amin’ny fitoerana masina isan-taona mitondra ny ran’ny zavatra hafa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'fa raha izany, dia tsy maintsy ho nijaly matetika Izy hatrizay nanaovana izao tontolo izao; fa ankehitriny dia efa naseho indray mandeha tamin’izao andro farany izao Izy mba hanafaka ny ota tamin’ny nanaterany ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary tahaka ny nanendrena ny olona ny ho faty indray mandeha, ary rehefa afaka izany, dia hisy fitsarana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: dia tahaka izany koa Kristy, rehefa natolotra indray mandeha hitondra ny otan’ny maro, dia hiseho fanindroany, tsy amin’ota, amin’izay miandry Azy, ho famonjena.
