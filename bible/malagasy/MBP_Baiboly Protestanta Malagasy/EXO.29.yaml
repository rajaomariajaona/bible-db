document_id: EXO.29,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny hanokanana ny mpisorona.
  - type: text
    content: 'ARY izao no zavatra hataonao aminy hanamasinana azy ho mpisorona ho Ahy: makà vantotr’ombilahy iray sy ondrilahy roa tsy misy kilema, '
  '10':
  - type: text
    content: 'Ary asaovy entina ho eo anoloan’ny trano-lay fihaonana ny vantotr’ombilahy; ary aoka Arona sy ny zanany hametraka ny tànany amin’ny lohan’ny vantotr’ombilahy; '
  '11':
  - type: text
    content: 'dia vonoy eo anatrehan’i Jehovah ny vantotr’ombilahy, eo anoloan’ny varavaran’ny trano-lay fihaonana; '
  '12':
  - type: text
    content: 'ary analao ny ran’ny vantotr’ombilahy, dia atenteno eo amin’ny tandroky ny alitara amin’ny fanondronao, ary ny ra '
  - type: text
    content: sisa
  - type: text
    content: ' rehetra dia aidino eo am-bodin’ny alitara; '
  '13':
  - type: text
    content: ary alao ny safo-drorohany rehetra sy ny ila-atiny lehibe
  - type: note
    content: 'Na: saron’atiny.'
  - type: text
    content: ' ary ny voany roa mbamin’ny fonom-boany, ka dory ho fofona eo ambonin’ny alitara; '
  '14':
  - type: text
    content: fa ny henan’ny vantotr’ombilahy sy ny hodiny ary ny tain-drorohany dia dory amin’ny afo eny ivelan’ny toby; fanatitra noho ny ota izany.
  '15':
  - type: text
    content: 'Ary alao ny ondrilahy iray; ary aoka Arona sy ny zanany hametraka ny tànany amin’ny lohan’ny ondrilahy; '
  '16':
  - type: text
    content: 'dia vonoy ny ondrilahy, ka tantazo ny rany, dia atopazy manodidina amin’ny lafin’ny alitara; '
  '17':
  - type: text
    content: 'ary rasao tsara ny ondrilahy, dia sasao ny taovany sy ny tongony, ka ataovy eo ambonin’ny voarasa sy ny lohany; '
  '18':
  - type: text
    content: ary dory ho fofona eo ambonin’ny alitara ny tenan’ny ondrilahy; ho fanatitra odorana ho an’i Jehovah izany, dia hanitra ankasitrahana, fanatitra atao amin’ny afo ho an’i Jehovah.
  '19':
  - type: text
    content: 'Ary alao ny ondrilahy iray koa; ary aoka Arona sy ny zanany hametraka ny tànany amin’ny lohan’ny ondrilahy; '
  '2':
  - type: text
    content: ary mofo tsy misy masirasira sy mofo tsy misy masirasira voaharo diloilo ary mofo manify tsy misy masirasira sady voahoso-diloilo; koba
  - type: note
    content: koban-tritika; ny tritika dia varimbazaha.
  - type: text
    content: ' tsara toto no hanaovanao azy. '
  '20':
  - type: text
    content: 'dia vonoy ny ondrilahy ka analao ny rany, dia atenteno amin’ny tendron’ny ravin-tsofina ankavanan’i Arona sy amin’ny tendron’ny ravin-tsofina ankavanan’ny zanany, ary amin’ny ankihiben-tànany ankavanana sy amin’ny ankihiben-tongony ankavanana; ary ny ra '
  - type: text
    content: sisa
  - type: text
    content: ' dia atopazy manodidina amin’ny lafin’ny alitara. '
  '21':
  - type: text
    content: Ary analao ny ra, izay eo ambonin’ny alitara, sy ny diloilo fanosorana, ka afafazo amin’i Arona sy amin’ny fitafiany, ary amin’ny zanany sy amin’ny fitafian’ny zanany koa; dia ho masina izy sy ny fitafiany ary ny zanany sy ny fitafian’ny zanany koa.
  '22':
  - type: text
    content: Ary alao ny saboran’ny ondrilahy sy ny hofany sy ny safo-drorohany sy ny ila-atiny lehibe
  - type: note
    content: 'Na: saron’atiny.'
  - type: text
    content: ' sy ny voany roa mbamin’ny fonom-boany ary ny soroka'
  - type: note
    content: 'Na: fe.'
  - type: text
    content: ' ankavananan; fa ondrilahy fanokanana izy; '
  '23':
  - type: text
    content: 'ary manalà iray amin’ny mofo sy iray amin’ny mofo voaisy diloilo ary iray amin’ny mofo manify izay eo amin’ny harona misy ny mofo tsy misy masirasira, izay eo anatrehan’i Jehovah; '
  '24':
  - type: text
    content: 'ary ataovy eo an-tànan’i Arona sy eo an-tànan’ny zanany izy rehetra, ka ahevahevao izy ho fanatitra ahevaheva eo anatrehan’i Jehovah. '
  '25':
  - type: text
    content: Dia raiso amin’ny tànany izany, ka dory ho fofona eo ambonin’ny alitara, miaraka amin’ny fanatitra odorana, ho hanitra ankasitrahana eo anatrehan’i Jehovah, dia fanatitra atao amin’ny afo ho an’i Jehovah.
  '26':
  - type: text
    content: 'Ary alao ny tratran’ny ondrilahy fanokanana an’i Arona, ka ahevahevao ho fanatitra ahevaheva eo anatrehan’i Jehovah; dia ho anjaranao izany. '
  '27':
  - type: text
    content: Ary hamasino ny tratran’ny fanatitra ahevaheva sy ny soroky
  - type: note
    content: 'Na: fe.'
  - type: text
    content: ' ny fanatitra asandratra, izay ahevaheva sy izay asandratra, avy amin’ny ondrilahy fanokanana, dia izay ho an’i Arona sy izay ho an’ny zanany. '
  '28':
  - type: text
    content: Ary ho anjara mandrakizay ho an’i Arona sy ho an’ny taranany avy amin’ny Zanak’Isiraely izany, fa fanatitra asandratra izany; ary hisy fanatitra asandratra haterin’ny Zanak’Isiraely avy amin’ny fanati-pihavanany rehetra ho fanatitra asandratra ho an’i Jehovah.
  '29':
  - type: text
    content: Ary ny fitafiana masina izay an’i Arona dia ho an’ny zanany mandimby azy koa hanosorana azy zy hanokanana azy.
  - type: note
    content: 'Na: saron’atiny.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Ary ataovy eo anaty harona iray izy, ka ento amin’ny harona; ary ny vantotr’ombilahy sy ny ondrilahy roa dia ento koa.
  '30':
  - type: text
    content: 'Hiakanjo azy hafitoana izay anankiray amin’ny zanany ho mpisorona handimby azy, dia izay miditra amin’ny trano-lay fihaonana hanao fanompoam-pivavahana ao amin’ny fitoerana masina. '
  '31':
  - type: text
    content: 'Ary alao ny ondrilahy fanokanana, ka andrahoy eo amin’izay fitoerana masina ny henany. '
  '32':
  - type: text
    content: 'Ary hohanin’i Arona sy ny zanany eo anoloan’ny varavaran’ny trano-lay fihaonana ny henan’ny ondrilahy sy ny mofo izay eo anatin’ny harona. '
  '33':
  - type: text
    content: Ary izy no hihinana izany zavatra izany, izay nanaovana fanavotana ho azy, mba hanokanana
  - type: note
    content: Heb. hamenoana ny tànany.
  - type: text
    content: ' sy hanamasinana azy; fa ny vahiny tsy mba hihinana, satria masina izany. '
  '34':
  - type: text
    content: 'Ary raha misy sisa tsy lany amin’ny henan’ny fanatitra fanokanana, na amin’ny mofo, ka tra-maraina, dia hodoranao amin’ny afo ny sisa tsy lany: tsy hohanina izany, satria masina.'
  '35':
  - type: text
    content: 'Dia manaova izany amin’i Arona sy ny zanany, araka izay rehetra nandidiako anao; hafitoana no hanokananao azy. '
  '36':
  - type: text
    content: 'Ary vantotr’ombilahy iray no haterinao isan-andro ho fanatitra noho ny ota, hanaovana fanavotana; ary diovy ny alitara, raha manao fanavotana azy hianao; ary hosory izy hanamasina azy. '
  '37':
  - type: text
    content: Hafitoana no hanaovanao fanavotana ho an’ny alitara sy hanamasinanao azy; dia ho masina indrindra ny alitara, ary ho masina izay rehetra manendry azy.
  - type: heading
    content: Ny fanatitra isa-maraina sy isan-kariva.
  '38':
  - type: text
    content: 'ARY izao no haterinao eo ambonin’ny alitara: zanak’ondry roa izay iray taona isan-andro isan-andro '
  '39':
  - type: text
    content: '(ny zanak’ondry iray haterinao nony maraina, ary ny zanak’ondry iray koa haterinao nony hariva), '
  '4':
  - type: text
    content: 'Ary Arona sy ny zanany dia ento hankeo amin’ny varavaran’ny trano-lay fihaonana, ka ampandroy amin’ny rano izy. '
  '40':
  - type: text
    content: 'ary koba tsara toto ampahafolon’ny efaha voaharoharo diloilo voavely ampahefatry ny hina sy divay ampahefatry ny hina, ho fanatitra aidina amin’ny isan-janak’ondry iray. '
  '41':
  - type: text
    content: 'Ary ny zanak’ondry iray koa haterinao nony hariva: ary fanatitra hohanina sy fanatitra aidina tahaka ny natao tamin’ny fanatitra maraina no hampombainao azy, ho hanitra ankasitrahana, dia fanatitra atao amin’ny afo ho an’i Jehovah.'
  '42':
  - type: text
    content: 'Ho fanatitra odorana mandrakariva izany hatramin’ny taranakareo fara mandimby, eo anoloan’ny varavaran’ny trano-lay fihaonana eo anatrehan’i Jehovah, dia ao amin’izay hihaonako aminareo hiteny aminao. '
  '43':
  - type: text
    content: Ary hihaona amin’ny Zanak’Isiraely ao Aho, ka hohamasinin’ny voninahitro izy.
  - type: note
    content: 'Na: ny trano lay.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: Ary hohamasiniko ny trano-lay fihaonana sy ny alitara; ary hohamasiniko koa Arona sy ny zanany mba ho mpisorona ho Ahy.
  '45':
  - type: text
    content: 'Ary honina eo amin’ny Zanak’Isiraely Aho ka ho Andriamaniny. '
  '46':
  - type: text
    content: Ary ho fantany fa Izaho no Jehovah Andriamaniny, Izay nitondra azy nivoaka avy tany amin’ny tany Egypta, mba honina eo aminy Aho; Izaho no Jehovah Andriamaniny.
  '5':
  - type: text
    content: 'Ary alao ny fitafiana, ka ampiakanjoy an’i Arona ny akanjo lava sy ny akanjo ivelany misy ny efoda ary ny efoda sy ny saron-tratra, ary fehezo amin’ny fehin-kibo momba ny efoda izy; '
  '6':
  - type: text
    content: 'ary ny hamama dia ataovy eo amin’ny lohany, ary ny diadema masina dia ataovy eo amin’ny hamama. '
  '7':
  - type: text
    content: Ary alao ny diloilo fanosorana, ka aidino amin’ny lohany, dia manosora azy.
  '8':
  - type: text
    content: 'Ary ny zanany dia ento koa, ka ampiakanjoy akanjo lava. '
  '9':
  - type: text
    content: Ary fehezo amin’ny fehin-kibo izy, dia Arona sy ny zanany, ary fehezo aminy ny satroka boribory; ary ho azy ny fisoronana ho lalàna mandrakizay. Dia toy izany no hanokananao
  - type: note
    content: Heb. hamenoanao ny tànany.
  - type: text
    content: ' an’i Arona sy ny zanany.'
