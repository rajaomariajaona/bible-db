    children:
    - type: text
      text: Ny amin’ny hanokanana ny mpisorona.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY izao no zavatra hataonao aminy hanamasinana azy ho mpisorona ho Ahy: makà vantotr’ombilahy iray sy ondrilahy roa tsy misy kilema, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary asaovy entina ho eo anoloan’ny trano-lay fihaonana ny vantotr’ombilahy; ary aoka Arona sy ny zanany hametraka ny tànany amin’ny lohan’ny vantotr’ombilahy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia vonoy eo anatrehan’i Jehovah ny vantotr’ombilahy, eo anoloan’ny varavaran’ny trano-lay fihaonana; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary analao ny ran’ny vantotr’ombilahy, dia atenteno eo amin’ny tandroky ny alitara amin’ny fanondronao, ary ny ra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sisa
    - type: text
      text: ' rehetra dia aidino eo am-bodin’ny alitara; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary alao ny safo-drorohany rehetra sy ny ila-atiny lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: saron’atiny.
      marker-yv: yv-n
    - type: text
      text: ' ary ny voany roa mbamin’ny fonom-boany, ka dory ho fofona eo ambonin’ny alitara; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny henan’ny vantotr’ombilahy sy ny hodiny ary ny tain-drorohany dia dory amin’ny afo eny ivelan’ny toby; fanatitra noho ny ota izany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary alao ny ondrilahy iray; ary aoka Arona sy ny zanany hametraka ny tànany amin’ny lohan’ny ondrilahy; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia vonoy ny ondrilahy, ka tantazo ny rany, dia atopazy manodidina amin’ny lafin’ny alitara; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rasao tsara ny ondrilahy, dia sasao ny taovany sy ny tongony, ka ataovy eo ambonin’ny voarasa sy ny lohany; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary dory ho fofona eo ambonin’ny alitara ny tenan’ny ondrilahy; ho fanatitra odorana ho an’i Jehovah izany, dia hanitra ankasitrahana, fanatitra atao amin’ny afo ho an’i Jehovah.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary alao ny ondrilahy iray koa; ary aoka Arona sy ny zanany hametraka ny tànany amin’ny lohan’ny ondrilahy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary mofo tsy misy masirasira sy mofo tsy misy masirasira voaharo diloilo ary mofo manify tsy misy masirasira sady voahoso-diloilo; koba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'koban-tritika; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny tritika dia varimbazaha.
      marker-yv: yv-n
    - type: text
      text: ' tsara toto no hanaovanao azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia vonoy ny ondrilahy ka analao ny rany, dia atenteno amin’ny tendron’ny ravin-tsofina ankavanan’i Arona sy amin’ny tendron’ny ravin-tsofina ankavanan’ny zanany, ary amin’ny ankihiben-tànany ankavanana sy amin’ny ankihiben-tongony ankavanana; ary ny ra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sisa
    - type: text
      text: ' dia atopazy manodidina amin’ny lafin’ny alitara. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary analao ny ra, izay eo ambonin’ny alitara, sy ny diloilo fanosorana, ka afafazo amin’i Arona sy amin’ny fitafiany, ary amin’ny zanany sy amin’ny fitafian’ny zanany koa; dia ho masina izy sy ny fitafiany ary ny zanany sy ny fitafian’ny zanany koa.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary alao ny saboran’ny ondrilahy sy ny hofany sy ny safo-drorohany sy ny ila-atiny lehibe
    - type: usfm
