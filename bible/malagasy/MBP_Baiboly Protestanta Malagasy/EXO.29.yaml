      - type: usfm
        marker: ft
        children:
        - type: text
          text: saron’atiny.
      marker-yv: yv-n
    - type: text
      text: ' sy ny voany roa mbamin’ny fonom-boany ary ny soroka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
