        children:
        - type: text
          text: fe.
      marker-yv: yv-n
    - type: text
      text: ' ankavananan; fa ondrilahy fanokanana izy; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary manalà iray amin’ny mofo sy iray amin’ny mofo voaisy diloilo ary iray amin’ny mofo manify izay eo amin’ny harona misy ny mofo tsy misy masirasira, izay eo anatrehan’i Jehovah; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ataovy eo an-tànan’i Arona sy eo an-tànan’ny zanany izy rehetra, ka ahevahevao izy ho fanatitra ahevaheva eo anatrehan’i Jehovah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia raiso amin’ny tànany izany, ka dory ho fofona eo ambonin’ny alitara, miaraka amin’ny fanatitra odorana, ho hanitra ankasitrahana eo anatrehan’i Jehovah, dia fanatitra atao amin’ny afo ho an’i Jehovah.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary alao ny tratran’ny ondrilahy fanokanana an’i Arona, ka ahevahevao ho fanatitra ahevaheva eo anatrehan’i Jehovah; dia ho anjaranao izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hamasino ny tratran’ny fanatitra ahevaheva sy ny soroky
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fe.
      marker-yv: yv-n
    - type: text
      text: ' ny fanatitra asandratra, izay ahevaheva sy izay asandratra, avy amin’ny ondrilahy fanokanana, dia izay ho an’i Arona sy izay ho an’ny zanany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho anjara mandrakizay ho an’i Arona sy ho an’ny taranany avy amin’ny Zanak’Isiraely izany, fa fanatitra asandratra izany; ary hisy fanatitra asandratra haterin’ny Zanak’Isiraely avy amin’ny fanati-pihavanany rehetra ho fanatitra asandratra ho an’i Jehovah.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fitafiana masina izay an’i Arona dia ho an’ny zanany mandimby azy koa hanosorana azy zy hanokanana azy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: saron’atiny.
      marker-yv: yv-n
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ataovy eo anaty harona iray izy, ka ento amin’ny harona; ary ny vantotr’ombilahy sy ny ondrilahy roa dia ento koa.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hiakanjo azy hafitoana izay anankiray amin’ny zanany ho mpisorona handimby azy, dia izay miditra amin’ny trano-lay fihaonana hanao fanompoam-pivavahana ao amin’ny fitoerana masina. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary alao ny ondrilahy fanokanana, ka andrahoy eo amin’izay fitoerana masina ny henany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hohanin’i Arona sy ny zanany eo anoloan’ny varavaran’ny trano-lay fihaonana ny henan’ny ondrilahy sy ny mofo izay eo anatin’ny harona. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izy no hihinana izany zavatra izany, izay nanaovana fanavotana ho azy, mba hanokanana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamenoana ny tànany.
      marker-yv: yv-n
    - type: text
      text: ' sy hanamasinana azy; fa ny vahiny tsy mba hihinana, satria masina izany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy sisa tsy lany amin’ny henan’ny fanatitra fanokanana, na amin’ny mofo, ka tra-maraina, dia hodoranao amin’ny afo ny sisa tsy lany: tsy hohanina izany, satria masina.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia manaova izany amin’i Arona sy ny zanany, araka izay rehetra nandidiako anao; hafitoana no hanokananao azy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary vantotr’ombilahy iray no haterinao isan-andro ho fanatitra noho ny ota, hanaovana fanavotana; ary diovy ny alitara, raha manao fanavotana azy hianao; ary hosory izy hanamasina azy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hafitoana no hanaovanao fanavotana ho an’ny alitara sy hanamasinanao azy; dia ho masina indrindra ny alitara, ary ho masina izay rehetra manendry azy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fanatitra isa-maraina sy isan-kariva.
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY izao no haterinao eo ambonin’ny alitara: zanak’ondry roa izay iray taona isan-andro isan-andro '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(ny zanak’ondry iray haterinao nony maraina, ary ny zanak’ondry iray koa haterinao nony hariva), '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Arona sy ny zanany dia ento hankeo amin’ny varavaran’ny trano-lay fihaonana, ka ampandroy amin’ny rano izy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary koba tsara toto ampahafolon’ny efaha voaharoharo diloilo voavely ampahefatry ny hina sy divay ampahefatry ny hina, ho fanatitra aidina amin’ny isan-janak’ondry iray. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanak’ondry iray koa haterinao nony hariva: ary fanatitra hohanina sy fanatitra aidina tahaka ny natao tamin’ny fanatitra maraina no hampombainao azy, ho hanitra ankasitrahana, dia fanatitra atao amin’ny afo ho an’i Jehovah.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho fanatitra odorana mandrakariva izany hatramin’ny taranakareo fara mandimby, eo anoloan’ny varavaran’ny trano-lay fihaonana eo anatrehan’i Jehovah, dia ao amin’izay hihaonako aminareo hiteny aminao. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hihaona amin’ny Zanak’Isiraely ao Aho, ka hohamasinin’ny voninahitro izy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.43 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny trano lay.
      marker-yv: yv-n
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hohamasiniko ny trano-lay fihaonana sy ny alitara; ary hohamasiniko koa Arona sy ny zanany mba ho mpisorona ho Ahy.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary honina eo amin’ny Zanak’Isiraely Aho ka ho Andriamaniny. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho fantany fa Izaho no Jehovah Andriamaniny, Izay nitondra azy nivoaka avy tany amin’ny tany Egypta, mba honina eo aminy Aho; Izaho no Jehovah Andriamaniny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary alao ny fitafiana, ka ampiakanjoy an’i Arona ny akanjo lava sy ny akanjo ivelany misy ny efoda ary ny efoda sy ny saron-tratra, ary fehezo amin’ny fehin-kibo momba ny efoda izy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny hamama dia ataovy eo amin’ny lohany, ary ny diadema masina dia ataovy eo amin’ny hamama. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary alao ny diloilo fanosorana, ka aidino amin’ny lohany, dia manosora azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanany dia ento koa, ka ampiakanjoy akanjo lava. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary fehezo amin’ny fehin-kibo izy, dia Arona sy ny zanany, ary fehezo aminy ny satroka boribory; ary ho azy ny fisoronana ho lalàna mandrakizay. Dia toy izany no hanokananao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamenoanao ny tànany.
      marker-yv: yv-n
    - type: text
      text: ' an’i Arona sy ny zanany.'
