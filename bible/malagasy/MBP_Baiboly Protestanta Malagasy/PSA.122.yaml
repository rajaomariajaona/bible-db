document_id: PSA.122,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fifaliana ny amin’i Jerosalema sy fangatahan-tsoa ho azy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fihirana fiakarana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '122.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fihirana misy hevitra ambaratonga.
      marker-yv: yv-n
    - type: text
      text: ' Nataon’i Davida.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'FALY aho, raha hoy izy ireo tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha isika ho any an-tranon’i Jehovah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny tongotray efa mijoro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo anatin’ny vavahadinao, ry Jerosalema ô,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia hianao, ry Jerosalema, izay efa vita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny tanàna efa voalamina tsara;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Any no iakaran’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ireo firenen’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Lalàna amin’ny Isiraely izany),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hisaotra ny anaran’i Jehovah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa any no misy seza fitsarana mipetraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny seza fiandrianan’ny mpianakavin’i Davida.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mangataha fiadanana ho an’i Jerosalema;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hambinina anie izay tia anao;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fiadanana anie ho ao anatin’ny mandanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fanambinana anie ho ao an-dapanao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Noho ny rahalahiko sy ny namako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No hanaovako hoe: Fiadanana anie ho ao anatinao.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Noho ny tranon’i Jehovah Andriamanitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitady izay hahatsara anao aho.
