document_id: PSA.122,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifaliana ny amin’i Jerosalema sy fangatahan-tsoa ho azy.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: ' Nataon’i Davida.'
  - type: text
    content: 'FALY aho, raha hoy izy ireo tamiko:'
  - type: text
    content: Andeha isika ho any an-tranon’i Jehovah.
  '2':
  - type: text
    content: Ny tongotray efa mijoro
  - type: text
    content: Eo anatin’ny vavahadinao, ry Jerosalema ô,
  '3':
  - type: text
    content: Dia hianao, ry Jerosalema, izay efa vita
  - type: text
    content: Tahaka ny tanàna efa voalamina tsara;
  '4':
  - type: text
    content: Any no iakaran’ny firenena,
  - type: text
    content: Dia ireo firenen’i Jehovah
  - type: text
    content: (Lalàna amin’ny Isiraely izany),
  - type: text
    content: Mba hisaotra ny anaran’i Jehovah.
  '5':
  - type: text
    content: Fa any no misy seza fitsarana mipetraka,
  - type: text
    content: Dia ny seza fiandrianan’ny mpianakavin’i Davida.
  '6':
  - type: text
    content: Mangataha fiadanana ho an’i Jerosalema;
  - type: text
    content: Hambinina anie izay tia anao;
  '7':
  - type: text
    content: Fiadanana anie ho ao anatin’ny mandanao;
  - type: text
    content: Fanambinana anie ho ao an-dapanao.
  '8':
  - type: text
    content: Noho ny rahalahiko sy ny namako
  - type: text
    content: 'No hanaovako hoe: Fiadanana anie ho ao anatinao.'
  '9':
  - type: text
    content: Noho ny tranon’i Jehovah Andriamanitsika
  - type: text
    content: Dia hitady izay hahatsara anao aho.
