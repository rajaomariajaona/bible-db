document_id: PSA.105,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanomezam-boninahitra an’Andriamanitra noho ny asany mahagaga tamin’ny nitondrany ny Isiraely nivoaka avy tany Egypta.
  - type: text
    content: MIDERÀ an’i Jehovah, miantsoa ny anarany;
  - type: text
    content: Ataovy fantatra any amin’ny firenena ny asany.
  '10':
  - type: text
    content: Izay naoriny ho lalàna ho an’i Jakoba
  - type: text
    content: Sy ho fanekena mandrakizay ho an’Isiraely,
  '11':
  - type: text
    content: 'Ka nataony hoe: Homeko anao ny tany Kanana'
  - type: text
    content: Ho lovanareo voazara amin’ny famolaina,
  '12':
  - type: text
    content: Fony mbola olom-bitsy izy,
  - type: text
    content: Eny, vitsy sady vahiny tao,
  '13':
  - type: text
    content: Ary nifindrafindra tany amin’ny firenena
  - type: text
    content: Sy nifindrafindra fanjakana ho amin’ny firenen-kafa.
  '14':
  - type: text
    content: Tsy nisy navelany hampahory azy.
  - type: text
    content: 'Ary nananatra mpanjaka Izy noho ny amin’ireo hoe:'
  '15':
  - type: text
    content: Aza manendry ireo voahosotro,
  - type: text
    content: Ary aza manisy ratsy ireo mpaminaniko.
  '16':
  - type: text
    content: Dia niantso ny mosary ho amin’ny tany Izy;
  - type: text
    content: Notapahiny avokoa ny mofo rehetra, izay tohan’aina;
  '17':
  - type: text
    content: Naniraka lehilahy hialoha azy Izy;
  - type: text
    content: Josefa namidy ho andevo;
  '18':
  - type: text
    content: Nampijaliany tamin’ny fatorana ny tongony;
  - type: text
    content: Nogadrany vy izy,
  '19':
  - type: text
    content: Mandra-pahatongan’ny fotoana hahatanterahan’ny teniny;
  - type: text
    content: Nizaha toetra azy ny tenin’i Jehovah.
  '2':
  - type: text
    content: Mihirà ho Azy, mankalazà Azy;
  - type: text
    content: Saintsaino ny fahagagana rehetra ataony.
  '20':
  - type: text
    content: Naniraka ny mpanjaka hamaha azy,
  - type: text
    content: Eny, ny mpanapaka ny vahoaka, mba handefa azy.
  '21':
  - type: text
    content: Nanao azy ho tompon’ny tranony izy
  - type: text
    content: Sy ho mpanapaka ny fananany rehetra,
  '22':
  - type: text
    content: Mba hamatotra ny mpanapaka araka ny sitrapony,
  - type: text
    content: Sy hampianatra fahendrena ny loholony.
  '23':
  - type: text
    content: Ary Isiraely nankany Egypta;
  - type: text
    content: Eny, Jakoba nivahiny tany amin’ny tanin’i Hama.
  '24':
  - type: text
    content: Dia nahamaro ny taranaky ny olony ho be indrindra Izy
  - type: text
    content: Ka nampahery azy noho ny fahavalony.
  '25':
  - type: text
    content: Nampiova ny fon’ireny hankahala ny olony Izy
  - type: text
    content: Sy hihendry ny mpanompony.
  '26':
  - type: text
    content: Naniraka an’i Mosesy mpanompony
  - type: text
    content: Sy Arona izay nofidiny Izy.
  '27':
  - type: text
    content: Ary izy ireo nanao ny famantarany teo aminy
  - type: text
    content: Sy fahagagana tany amin’ny tanin’i Hama.
  '28':
  - type: text
    content: Nahatonga aizina Izy ka nahamaizina;
  - type: text
    content: Ary tsy nandà ny teniny izy ireo.
  '29':
  - type: text
    content: Nahatonga ny ranony ho ra Izy
  - type: text
    content: Ka nahafaty ny hazandranony.
  '3':
  - type: text
    content: Ataovy ho reharehanareo ny anarany masina;
  - type: text
    content: Aoka hifaly ny fon’izay mitady an’i Jehovah.
  '30':
  - type: text
    content: Nisy sahona betsaka ny taniny,
  - type: text
    content: Eny, na dia hatrao an-trano fandrian’ny mpanjakany aza.
  '31':
  - type: text
    content: Niteny Izy, dia tonga ny lalitra betsaka
  - type: note
    content: 'Na: fihitra, na kalalao.'
  - type: text
    content: Sy ny moka teny amin’ny faritaniny rehetra.
  '32':
  - type: text
    content: Nahatonga havandra ho solon’ny ranonorana Izy
  - type: text
    content: Sy afo midedadeda teny amin’ny taniny.
  '33':
  - type: text
    content: Namely ny voalobony sy ny aviaviny Izy
  - type: text
    content: Ka nanapatapaka ny hazo teo amin’ny taniny.
  '34':
  - type: text
    content: Niteny Izy, dia tonga ny valala
  - type: text
    content: Sy ny sompanga tsy hita isa;
  '35':
  - type: text
    content: Dia nihinana ny zava-maitso rehetra teny amin’ny taniny ireny
  - type: text
    content: Ka nandany ny vokatry ny taniny.
  '36':
  - type: text
    content: Ary namely ny lahimatoa rehetra tany amin’ny taniny Izy,
  - type: text
    content: Dia ny voalohan’ainy rehetra.
  '37':
  - type: text
    content: Ary dia nitondra ny olony nivoaka Izy sady nampahazo azy volafotsy sy volamena;
  - type: text
    content: Ary tsy nisy nangozohozo na dia iray akory aza tamin’ny fireneny.
  '38':
  - type: text
    content: Faly Egypta tamin’ny nahalasanany;
  - type: text
    content: Fa efa nahazo azy ny fahatahorana ireo.
  '39':
  - type: text
    content: Namelatra rahona ho fialokalofana Izy
  - type: text
    content: Ary afo ho fanazavana nony alina.
  '4':
  - type: text
    content: Mitadiava an’i Jehovah sy ny heriny;
  - type: text
    content: Katsaho mandrakariva ny tavany.
  '40':
  - type: text
    content: Nangataka izy ireo, dia nahatonga papelika Izy,
  - type: text
    content: Ary mofon-danitra no namokisany azy.
  '41':
  - type: text
    content: Nanokatra ny vatolampy Izy, dia nigororoana ny rano
  - type: text
    content: Ka nandriaka tamin’ny tany maina ho renirano.
  '42':
  - type: text
    content: Fa nahatsiaro ny teniny masina
  - type: text
    content: Sy Abrahama mpanompony Izy,
  '43':
  - type: text
    content: Dia nitondra ny olony nivoaka tamin’ny fifaliana Izy
  - type: text
    content: Ary ny voafidiny tamin’ny fihobiana;
  '44':
  - type: text
    content: Ka dia nanome azy ny tanin’ny jentilisa Izy;
  - type: text
    content: Ary nandova ny vitan’ny firenena maro ireny,
  '45':
  - type: text
    content: Mba hitandremany ny didiny,
  - type: text
    content: Sy hankatoavany ny lalàny.
  - type: text
    content: Haleloia.
  '5':
  - type: text
    content: Tsarovy ny asa mahagaga nataony,
  - type: text
    content: Dia ny fahagagany sy ny fitsaran’ny vavany,
  '6':
  - type: text
    content: Ry taranak’i Abrahama mpanompony,
  - type: text
    content: Dia hianareo olom-boafidiny, taranak’i Jakoba.
  '7':
  - type: text
    content: Jehovah, Izy no Andriamanitsika;
  - type: text
    content: Manerana ny tany rehetra ny fitsarany.
  '8':
  - type: text
    content: Mahatsiaro ny fanekeny mandrakizay Izy,
  - type: text
    content: Dia ilay teny izay voadidiny ho an’ny taranaka arivo mandimby,
  '9':
  - type: text
    content: Eny, ilay nataony tamin’i Abrahama,
  - type: text
    content: Sy ny fianianany tamin’Isaka;
