document_id: PSA.22
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainana mafy noho ny fahoriana, ary fisaorana noho ny fahafahana, sy filazana ny handrosoan’ny fanjakan’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Alaieleth-hasahara. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRO ô, Andriamanitro ô, nahoana no dia mahafoy ahy Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lavitra ny famonjena ahy ny tenin’ny fitarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andriamanitro ô, miantso aho nony andro, nefa tsy mamaly Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nony alina, nefa tsy mahita fiononana aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa masina Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry mipetraka eo ambonin’ny fideran’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hianao no nitokian’ny razanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Natoky izy, ka namonjy azy Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hianao no nitarainany, ka afaka izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao no nitokiany, ka tsy menatra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary izaho dia olitra, fa tsy olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandàtsan’olona sy fanevatevam-bahoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay rehetra mahita ahy dia manaraby ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Manondro molotra izy sady mihifikifi-doha '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ankino amin’i Jehovah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Efa niankina tamin’i Jehovah izy.
    marker-yv: yv-n
  - type: text
    text: ' dia aoka Izy hamonjy azy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, aoka Izy hanafaka azy, raha mankasitraka azy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa Hianao no nampivoaka ahy avy tao an-kibo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampandry ahy fahizay Hianao, fony aho mbola nampinonoin’ny reniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nankinina taminao hatrany am-bohoka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatrany an-kibon-dreniko dia Andriamanitro Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza manalavitra ahy Hianao, fa akaiky ny fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy misy mpamonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mitangorona amiko ireo ombilahy be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny maherin’i Basana manemitra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Misanasana vava amiko izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, liona mamiravira sy mierona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa rano aidina aho, ka mivaha ny taolako rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tahaka ny savoka ny foko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miempo ato anatiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Maina tahaka ny tavim-bilany ny heriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lelako miraikitra amin’ny lanilaniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny vovoky ny fahafatesana no ametrahanao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa mitangorona amiko ny amboa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fiangonan’ny rasty fanahy manemitra ahy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manindrona ny tongotro aman-tànako izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manodidina ny tongotro aman-tànako hoatra ny liona izy.
    marker-yv: yv-n
  - type: text
    text: ' –'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mahisa ny taolako rehetra aho–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo dia mibanjina sady mangarika ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mizara ny fitafiako ho azy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny akanjoko ilokany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa Hianao, Jehovah ô, aza manalavitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Heriko ô, faingàna hamonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vonjeo amin’ny sabatra ny fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny hany malalako amin’ny herin’ny amboa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Vonjeo amin’ny vavan’ny liona aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary valio ho afaka amin’ny tandroky ny ombimanga.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Teo amin’ny tandroky ny ombimanga dia novalianao aho.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Hitory ny anaranao amin’ny rahalahiko aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny fiangonana no hiderako Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hianareo izay matahotra an’i Jehovah, miderà Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry taranak’i Jakoba rehetra, manomeza voninahitra Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary matahora Azy, ry Zanak’Isiraely rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa tsy manao tsinontsinona na marikorikon’ny fahorian’ny ory Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mba manafina ny tavany aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha mitaraina aminy ireny, dia mihaino Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Avy aminao no ahazoako manao fiderana eo amin’ny fiangonan-dehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny voadiko dia hefaiko eo anatrehan’izay matahotra an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hihinana ny mpandefitra ka ho voky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hidera an’i Jehovah izay mitady Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho velona mandrakizay anie ny fonareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hahatsiaro ka hiverina ho amin’i Jehovah ny faran’ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiankohoka eo anatrehanao ny fokon’ny firenen-tsamy hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa an’i Jehovah ny fanjakana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manapaka amin’ny firenen-tsamy hafa Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hihinana sy hiankohoka ny mpanefohefo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: matavy.
    marker-yv: yv-n
  - type: text
    text: ' rehetra ambonin’ny tany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo anatrehany no hiondrehan’izay rehetra efa hidina any amin’ny vovoka ka tsy mahavelona ny ainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hisy taranaka hanompo Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Tompo dia holazaina amin’ny taranaka ho avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Hisy ho avy ka hanambara ny fahamarinany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny olona izay mbola hateraka, fa Izy no nanao izany.
