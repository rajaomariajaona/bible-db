document_id: PSA.22,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana mafy noho ny fahoriana, ary fisaorana noho ny fahafahana, sy filazana ny handrosoan’ny fanjakan’Andriamanitra.
  - type: text
    content: Ho an’ny mpiventy hira. Alaieleth-hasahara. Salamo nataon’i Davida.
  - type: text
    content: ANDRIAMANITRO ô, Andriamanitro ô, nahoana no dia mahafoy ahy Hianao?
  - type: text
    content: Lavitra ny famonjena ahy ny tenin’ny fitarainako.
  '10':
  - type: text
    content: Nankinina taminao hatrany am-bohoka aho;
  - type: text
    content: Hatrany an-kibon-dreniko dia Andriamanitro Hianao.
  '11':
  - type: text
    content: Aza manalavitra ahy Hianao, fa akaiky ny fahoriana,
  - type: text
    content: Sady tsy misy mpamonjy.
  '12':
  - type: text
    content: Mitangorona amiko ireo ombilahy be,
  - type: text
    content: Ny maherin’i Basana manemitra ahy.
  '13':
  - type: text
    content: Misanasana vava amiko izy;
  - type: text
    content: Eny, liona mamiravira sy mierona izy.
  '14':
  - type: text
    content: Efa rano aidina aho, ka mivaha ny taolako rehetra;
  - type: text
    content: 'Tahaka ny savoka ny foko:'
  - type: text
    content: Miempo ato anatiko izy.
  '15':
  - type: text
    content: Maina tahaka ny tavim-bilany ny heriko;
  - type: text
    content: Ary ny lelako miraikitra amin’ny lanilaniko;
  - type: text
    content: Ao amin’ny vovoky ny fahafatesana no ametrahanao ahy.
  '16':
  - type: text
    content: Fa mitangorona amiko ny amboa,
  - type: text
    content: Ny fiangonan’ny rasty fanahy manemitra ahy.
  - type: text
    content: Manindrona ny tongotro aman-tànako izy
  - type: note
    content: 'Na: Manodidina ny tongotro aman-tànako hoatra ny liona izy.'
  - type: text
    content: ' –'
  '17':
  - type: text
    content: Mahisa ny taolako rehetra aho–
  - type: text
    content: Ireo dia mibanjina sady mangarika ahy.
  '18':
  - type: text
    content: Mizara ny fitafiako ho azy izy,
  - type: text
    content: Ary ny akanjoko ilokany.
  '19':
  - type: text
    content: Fa Hianao, Jehovah ô, aza manalavitra;
  - type: text
    content: Ry Heriko ô, faingàna hamonjy ahy.
  '2':
  - type: text
    content: Andriamanitro ô, miantso aho nony andro, nefa tsy mamaly Hianao;
  - type: text
    content: Ary nony alina, nefa tsy mahita fiononana aho.
  '20':
  - type: text
    content: Vonjeo amin’ny sabatra ny fanahiko,
  - type: text
    content: Dia ny hany malalako amin’ny herin’ny amboa.
  '21':
  - type: text
    content: Vonjeo amin’ny vavan’ny liona aho;
  - type: text
    content: Ary valio ho afaka amin’ny tandroky ny ombimanga.
  - type: note
    content: 'Na: Teo amin’ny tandroky ny ombimanga dia novalianao aho.'
  '22':
  - type: text
    content: Hitory ny anaranao amin’ny rahalahiko aho;
  - type: text
    content: Eo amin’ny fiangonana no hiderako Anao.
  '23':
  - type: text
    content: Hianareo izay matahotra an’i Jehovah, miderà Azy;
  - type: text
    content: Ry taranak’i Jakoba rehetra, manomeza voninahitra Azy;
  - type: text
    content: Ary matahora Azy, ry Zanak’Isiraely rehetra.
  '24':
  - type: text
    content: Fa tsy manao tsinontsinona na marikorikon’ny fahorian’ny ory Izy,
  - type: text
    content: Ary tsy mba manafina ny tavany aminy;
  - type: text
    content: Fa raha mitaraina aminy ireny, dia mihaino Izy.
  '25':
  - type: text
    content: Avy aminao no ahazoako manao fiderana eo amin’ny fiangonan-dehibe;
  - type: text
    content: Ny voadiko dia hefaiko eo anatrehan’izay matahotra an’i Jehovah.
  '26':
  - type: text
    content: Hihinana ny mpandefitra ka ho voky;
  - type: text
    content: Hidera an’i Jehovah izay mitady Azy;
  - type: text
    content: Ho velona mandrakizay anie ny fonareo.
  '27':
  - type: text
    content: Hahatsiaro ka hiverina ho amin’i Jehovah ny faran’ny tany rehetra;
  - type: text
    content: Ary hiankohoka eo anatrehanao ny fokon’ny firenen-tsamy hafa.
  '28':
  - type: text
    content: Fa an’i Jehovah ny fanjakana;
  - type: text
    content: Ary manapaka amin’ny firenen-tsamy hafa Izy.
  '29':
  - type: text
    content: Hihinana sy hiankohoka ny mpanefohefo
  - type: note
    content: Heb. matavy.
  - type: text
    content: ' rehetra ambonin’ny tany;'
  - type: text
    content: Eo anatrehany no hiondrehan’izay rehetra efa hidina any amin’ny vovoka ka tsy mahavelona ny ainy.
  '3':
  - type: text
    content: Kanefa masina Hianao,
  - type: text
    content: Ry mipetraka eo ambonin’ny fideran’ny Isiraely.
  '30':
  - type: text
    content: Hisy taranaka hanompo Azy;
  - type: text
    content: Ary ny Tompo dia holazaina amin’ny taranaka ho avy.
  '31':
  - type: text
    content: Hisy ho avy ka hanambara ny fahamarinany
  - type: text
    content: Amin’ny olona izay mbola hateraka, fa Izy no nanao izany.
  '4':
  - type: text
    content: Hianao no nitokian’ny razanay;
  - type: text
    content: Natoky izy, ka namonjy azy Hianao.
  '5':
  - type: text
    content: Hianao no nitarainany, ka afaka izy;
  - type: text
    content: Hianao no nitokiany, ka tsy menatra izy.
  '6':
  - type: text
    content: Ary izaho dia olitra, fa tsy olona,
  - type: text
    content: Fandàtsan’olona sy fanevatevam-bahoaka.
  '7':
  - type: text
    content: Izay rehetra mahita ahy dia manaraby ahy;
  - type: text
    content: 'Manondro molotra izy sady mihifikifi-doha '
  - type: text
    content: 'ka manao hoe:'
  '8':
  - type: text
    content: Ankino amin’i Jehovah,
  - type: note
    content: 'Na: Efa niankina tamin’i Jehovah izy.'
  - type: text
    content: ' dia aoka Izy hamonjy azy;'
  - type: text
    content: Eny, aoka Izy hanafaka azy, raha mankasitraka azy Izy.
  '9':
  - type: text
    content: Fa Hianao no nampivoaka ahy avy tao an-kibo;
  - type: text
    content: Nampandry ahy fahizay Hianao, fony aho mbola nampinonoin’ny reniko.
