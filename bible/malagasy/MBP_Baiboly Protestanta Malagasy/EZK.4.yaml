document_id: EZK.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hianao, ry zanak’olona, makà kapila tanimanga, ary apetraho eo anoloanao, dia manorata sarin-tanàna eo aminy, dia sarin’i Jerosalema; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary an-danjany no hihinananao ny haninao, dia roa-polo sekely isan-andro; asio elanelany ny fihinanao azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary rano afàtra no hosotroinao, dia ampahenin’ny hina; asio elanelany koa ny fisotronao azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary hatao toy ny mofo vary hordea no ho fihinanao azy, ary diky no hataonao kitay hanendasanao azy eo imasony.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy Jehovah: Toy izany no hihinanan’ny Zanak’Isiraely ny mofony voaloto any amin’ny firenena izay handroahako azy.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy izaho: Indrisy! Jehovah Tompo ô, indro, tsy voaloto ny fanahiko; fa hatry ny fony aho mbola tanora ka mandraka ankehitriny dia tsy mba nihinana izay fatin-javatra na izay noviraviraim-biby akory aho; ary tsy mbola nikasika ny vavako akory izay nofo fahavetavetana.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia hoy Izy tamiko: Indro, tain’omby no omeko anao hisolo ny diky, ka izany no hataonao kitay hanendasanao ny mofonao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hoy koa Izy tamiko: Ry zanak’olona, indro, hotapahiko any Jerosalema ny mofo, tohan’aina, ka an-danjany amin’ny fanahiana no hihinanany mofo; ary rano afàtra no hosotroiny amin’ny fahatahorana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ka dia ho mosare-mofo sy rano izy, ary samy ho raiki-tahotra sady hihalevona noho ny helony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary ataovy fahirano izy, ka manaova tilikambo hamelezana azy, ary manandrata tovon-tany manodidina azy; ary asio toby hamelezana azy, ary asio lohondry vy fandravana manodidina azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary makà lapoely, ka ataovy mànda vy eo anelanelanao sy ny tanàna, dia banjino tsara io, ary aoka hatao fahirano, eny, aoka hataonao fahirano io. Famantarana ho amin’ny taranak’Isiraely izany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ataovy ambany mandry ny ilanao ankavia, ka ataovy eo aminy ny fahotan’ny taranak’Isiraely; koa araka ny isan’ny andro handrianao toy izany no hitondranao ny helony. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa Izaho dia manao fetr’andro ho anao mitovy amin’ny taonan’ny helony, dia sivi-folo amby telon-jato andro, ka ho entinao ny heloky ny taranak’Isiraely. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary rehefa tapitrao ireo, dia ataovy ambany mandry kosa ny ilanao ankavanana, ary aoka hitondra ny heloky ny taranak’i Joda efa-polo andro hianao; ny indray andro no nataoko solon’ny herintaona ho anao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia banjino tsara io fahirano an’i Jerosalema io, ary aoka hiseho sandry hianao ka haminany hamely azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary, indro, hafatotro hianao ka tsy hahavadi-mandry ambara-pahatapitrao ny andron’ny fahiranonao.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary mangalà vary tritika sy vary hordea sy tsaramaso sy voanemba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: erva lenta.
      marker-yv: yv-n
    - type: text
      text: ' sy ampemby sy spelta hianao, ary ataovy am-bilia iray ireo, ka anaovy mofo ho anao; araka ny isan’ny andro izay handrianao amin’ny ilanao, dia sivi-folo amby telon-jato andro, no hihinananao azy. '
