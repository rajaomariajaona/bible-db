document_id: ACT.23,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Paoly dia nibanjina ny Synedriona ka nanao hoe: Ry rahalahy, izaho nanompo an’Andriamanitra tamin’ny fieritreretana tsara mandraka andro-any. '
  '10':
  - type: text
    content: Ary rehefa nitabataba be ihany izy, dia natahotra ny mpifehy arivo, fandrao hifandroritan’ny olona Paoly ka ho samatsamaka, dia nasainy nidina ny miaramila mba haka azy an-keriny hiala teo ampovoany ary mba hitondra azy ho any anati-rova.
  '11':
  - type: text
    content: 'Ary ny Tompo nitsangana teo anilany tamin’iny alina iny ka nanao hoe: Matokia, fa tahaka ny nanambaranao Ahy tany Jerosalema no mbola hanambaranao Ahy any Roma koa.'
  - type: heading
    content: Ny namindrana an’i Paoly nankany Kaisaria mba tsy ho azon’izay efa nianiana hahafaty azy.
  '12':
  - type: text
    content: 'ARY nony maraina dia niray tetika ny Jiosy ka niozona sy nianiana fa tsy hihinana na hisotro izy ambara-pamonony an’i Paoly. '
  '13':
  - type: text
    content: 'Ary tsy omby efa-polo no niray tetika nanao izany. '
  '14':
  - type: text
    content: 'Ary izy nankany amin’ny mpisoronabe sy ny loholona ka nanao hoe: Efa niozona sy nianiana izahay fa tsy hanandran-javatra na inona na inona ambara-pamononay an’i Paoly. '
  '15':
  - type: text
    content: Koa ankehitriny dia milazà amin’ny mpifehy arivo hianareo sy ny Synedriona mba hampidina azy hankatỳ aminareo, mody ta-hamototra azy marimarina kokoa ny amin’izay nataony; ary izahay kosa dia efa vonona hamono azy, dieny tsy mbola mby akaiky izy.
  '16':
  - type: text
    content: 'Ary nony ren’ny zanak’anabavin’i Paoly ny fanotrehana, dia lasa nankany anati-rova izy ka nilaza tamin’i Paoly. '
  '17':
  - type: text
    content: 'Ary Paoly niantso ny kapiteny anankiray hankeo aminy ka nanao hoe: Ento mankany amin’ny mpifehy arivo ity zatovo ity, fa manan-teny holazaina aminy izy. '
  '18':
  - type: text
    content: 'Koa dia nandray azy ilay kapiteny ka nitondra azy ho any amin’ny mpifehy arivo, dia nanao hoe: Paoly mpifatotra niantso ahy hankeo aminy ka nangataka ahy hitondra ity zatovo ity hanketo aminao, fa manan-teny holazaina aminao, hono, izy. '
  '19':
  - type: text
    content: 'Ary ny mpifehy arivo nitantana azy, ary nony efa nitokana tao amin’ny mangingina izy, dia nanontaniany hoe: Inona moa no teny holazainao amiko? '
  '2':
  - type: text
    content: 'Ary Ananiasy mpisoronabe nandidy izay nitsangana teo hamely ny vavany. '
  '20':
  - type: text
    content: 'Dia hoy ilay zatovo: Ny Jiosy efa nifanaiky hangataka aminao hampidina an’i Paoly ho any amin’ny Synedriona rahampitso, mody ta-hanadina azy marimarina kokoa. '
  '21':
  - type: text
    content: 'Koa aza manaiky azy hianao, fa misy tsy omby efa-polo lahy izy manotrika hisambotra an’i Paoly ka efa niozona sy nianiana izy fa tsy hihinana na hisotro ambara-pamonony azy; ary efa vonona izy ankehitriny ka miandry ny teny avy atỳ aminao. '
  '22':
  - type: text
    content: 'Ary ny mpifehy arivo nampandeha ilay zatovo ka nandidy azy hoe: Aza milaza amin’olona fa efa nilaza izany tamiko hianao.'
  '23':
  - type: text
    content: 'Ary niantso kapiteny roa lahy hankeo aminy izy ka nanao hoe: Manomàna miaramila roan-jato lahy sy an-tsoavaly fito-polo ary mpiloka lefona roan-jato hankany Kaisaria anio alina amin’ny ora fahatelo; '
  '24':
  - type: text
    content: ary itondray biby koa hitaingenan’i Paoly hitondra azy soa aman-tsara ho any amin’i Feliksa mpanapaka.
  '25':
  - type: text
    content: 'Ary izy nanoratra taratasy nisy izao teny izao: '
  '26':
  - type: text
    content: ',,Klaodio Lysia miarahaba an’i Feliksa, mpanapaka tsara indrindra. '
  '27':
  - type: text
    content: 'Ity lehilahy ity dia nosamborin’ny Jiosy ka efa saiky novonoiny; fa nony fantatro fa Romana izy, dia nitondra ny miaramila aho ka namonjy azy. '
  '28':
  - type: text
    content: 'Ary satria ta-hahalala tsara izay niampangany azy aho, dia nentiko nidina ho eo amin’ny Synedriona izy; '
  '29':
  - type: text
    content: 'dia hitako fa ady hevitra ny amin’ny lalàny no niampangany azy, fa tsy nisy niampangany azy izay tokony hahafaty na hamatorana azy. '
  '3':
  - type: text
    content: 'Ary hoy Paoly taminy: Andriamanitra mba hamely anao, ry rafi-bato voalalotra fotsy; fa hianao va mipetraka hitsara ahy araka ny lalàna, nefa asainao kapohina tsy araka ny lalàna aho? '
  '30':
  - type: text
    content: Ary rehefa voalaza tamiko fa nisy nikasa hanotrika hisambotra an-dralehilahy, dia naniraka faingana hitondra azy atỳ aminao aho, ary ny mpiampanga koa nasaiko hilaza atỳ anatrehanao izay iampangany azy.’’
  - type: note
    content: 'Ampio hoe: [Veloma].'
  '31':
  - type: text
    content: 'Dia nalain’ny miaramila Paoly araka ny nandidiana azy ka nentiny tamin’iny alina iny ho any Antipatria. '
  '32':
  - type: text
    content: 'Ary nony ampitso dia navelany handeha hiaraka aminy ny an-tsoavaly, fa izy kosa niverina ho any anati-rova. '
  '33':
  - type: text
    content: 'Rehefa tonga tany Kaisaria ireo, dia nanolotra ny taratasy tamin’ny mpanapaka sady nanolotra an’i Paoly ho eo anatrehany koa. '
  '34':
  - type: text
    content: 'Ary rehefa novakiny ilay taratasy, dia nanontany izay zara-fanapahana nihaviany izy; ary rehefa fantany fa avy tany Kilikia izy, '
  '35':
  - type: text
    content: 'dia hoy izy: Hihaino tsara ny teninao aho, rehefa tonga atỳ ny mpiampanga anao. Dia nasainy nambenana tao an-dapan’i'
  - type: note
    content: Gr. pretoria.
  - type: text
    content: ' Heroda izy.'
  '4':
  - type: text
    content: 'Ary izay nitsangana teo dia nanao hoe: Tevatevainao va ny mpisoronaben’Andriamanitra? '
  '5':
  - type: text
    content: 'Ary hoy Paoly: Tsy fantatro fa mpisoronabe izy, ry rahalahy; fa voasoratra hoe: ,,Aza miteny ratsy ny mpanapaka ny firenenao’’ (Eks. 22.27).'
  '6':
  - type: text
    content: 'Ary rehefa fantatr’i Paoly fa Sadoseo ny sasany, ary ny sasany kosa Fariseo, dia niantso teo amin’ny Synedriona izy ka nanao hoe: Ry rahalahy, izaho dia Fariseo, zanaky ny Fariseo; ny amin’ny fanantenana sy ny fitsanganan’ny maty no itsarana ahy. '
  '7':
  - type: text
    content: 'Ary rehefa nilaza izany izy, dia nifanditra ny Fariseo sy ny Sadoseo, ka nizara roa toko ny olona maro. '
  '8':
  - type: text
    content: 'Fa ny Sadoseo manao hoe: Tsy misy fitsanganan’ny maty, sady tsy misy anjely na fanahy; fa ny Fariseo kosa manaiky izany avokoa. '
  '9':
  - type: text
    content: 'Ary nisy antsoantso maharenina teo, ary ny mpanora-dalàna sasany, izay isan’ny antoko atao hoe Fariseo, nitsangana dia niady hevitra ka nanao hoe: Tsy hitanay izay helok’io lehilahy io; fa sao fanahy na anjely no niteny taminy.'
