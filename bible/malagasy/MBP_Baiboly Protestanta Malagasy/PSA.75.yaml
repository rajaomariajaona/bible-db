document_id: PSA.75,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahakaikin’ny Mpitsara, sy ny kapoaky ny fahatezerany.
  - type: text
    content: Ho an’ny mpiventy hira. Al-tasheth. Salamo nataon’i Asafa. Tonon-kira.
  - type: text
    content: HISAORANAY Hianao, Andriamanitra ô; eny, hisaoranay Hianao;
  - type: text
    content: Fa akaiky ny anaranao;
  - type: text
    content: Mitory ny fahagagana ataonao ny olona.
  '10':
  - type: text
    content: Ary ny tandroky ny ratsy fanahy rehetra hotapahiko;
  - type: text
    content: Fa ny tandroky ny marina kosa no hasandratra.
  '2':
  - type: text
    content: Fa ho avy tokoa amin’ny fotoana Aho;
  - type: text
    content: Eny, Izaho no hitsara marina.
  '3':
  - type: text
    content: Mihorohoro ny tany sy ny mponina rehetra eo aminy,
  - type: text
    content: Nefa Izaho no nanorina ny andriny.
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: 'Hoy izaho tamin’ny mpirehareha: Aza mirehareha,'
  - type: note
    content: 'Na: Hoy izaho tamin’ny adala: Aza manao adala.'
  - type: text
    content: 'Ary tamin’ny ratsy fanahy: Aza manandra-tandroka;'
  '5':
  - type: text
    content: Aza manandratra ny tandrokareo ho avo;
  - type: text
    content: Ary aza miteny sahisahy amin’ny fahamafian-katoka.
  '6':
  - type: text
    content: Fa tsy avy any atsinanana, na avy any andrefana,
  - type: text
    content: Na avy any atsimo, ny fisandratana.
  - type: note
    content: 'Na: Na avy amin’ny efitry ny tendrombohitra no ihavian’ny fitsarana.'
  '7':
  - type: text
    content: Fa Andriamanitra no Mpitsara;
  - type: text
    content: Mampietry ny anankiray Izy ary manandratra ny anankiray kosa.
  '8':
  - type: text
    content: Fa misy kapoaka eo an-tànan’i Jehovah,
  - type: text
    content: Feno divay mandroatra
  - type: note
    content: 'Na: mena.'
  - type: text
    content: ' miharoharo zavatra iny, ka ampisotroany;'
  - type: text
    content: Eny, ny ratsy fanahy rehetra amin’ny tany dia hitroka ny faikany.
  '9':
  - type: text
    content: Fa izaho hanambara izany mandrakizay
  - type: text
    content: Ka hankalaza an’Andriamanitr’i Jakoba.
