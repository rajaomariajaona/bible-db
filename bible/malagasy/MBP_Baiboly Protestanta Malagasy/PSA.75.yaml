document_id: PSA.75,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahakaikin’ny Mpitsara, sy ny kapoaky ny fahatezerany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-tasheth. Salamo nataon’i Asafa. Tonon-kira.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HISAORANAY Hianao, Andriamanitra ô; eny, hisaoranay Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa akaiky ny anaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitory ny fahagagana ataonao ny olona.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tandroky ny ratsy fanahy rehetra hotapahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tandroky ny marina kosa no hasandratra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho avy tokoa amin’ny fotoana Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Izaho no hitsara marina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihorohoro ny tany sy ny mponina rehetra eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Izaho no nanorina ny andriny.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy izaho tamin’ny mpirehareha: Aza mirehareha,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '75.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hoy izaho tamin’ny adala: Aza manao adala.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary tamin’ny ratsy fanahy: Aza manandra-tandroka;'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manandratra ny tandrokareo ho avo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza miteny sahisahy amin’ny fahamafian-katoka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy avy any atsinanana, na avy any andrefana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na avy any atsimo, ny fisandratana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '75.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Na avy amin’ny efitry ny tendrombohitra '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: no ihavian’ny fitsarana.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra no Mpitsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampietry ny anankiray Izy ary manandratra ny anankiray kosa.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy kapoaka eo an-tànan’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno divay mandroatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '75.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mena.
      marker-yv: yv-n
    - type: text
      text: ' miharoharo zavatra iny, ka ampisotroany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny ratsy fanahy rehetra amin’ny tany dia hitroka ny faikany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho hanambara izany mandrakizay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hankalaza an’Andriamanitr’i Jakoba.
