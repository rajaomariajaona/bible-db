document_id: NEH.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanaovana ny màndan’i Jerosalema sy ny vavahadiny.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA nitsangana Eliasiba mpisoronabe sy ny mpisorona rahalahiny ka nandrafitra ny vavahadin’ondry; dia nanamasina azy izy ka nandatsaka ny lela-vavahadiny; hatramin’ny tilikambo Hamea ka hatramin’ny tilikambo Hananela no nohamasininy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary manarakaraka ireo dia nandrafitra koa ny mponina tany Jeriko. Ary manarakaraka ireo indray dia nandrafitra koa Zakora, zanak’Imry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny vavahadin-kazandrano dia narafitry ny zanak’i Hasena, izy no nandatsaka ny rairainy sy ny lela-vavahadiny mbamin’ny hidiny sy ny vavombiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary manarakaraka ireo dia namboatra koa Meremota, zanak’i Oria, zanak’i Hakoza. Ary manarakaraka io dia namboatra koa Mesolama, zanak’i Berekia, zanak’i Mesezabela. Ary manarakaraka io dia namboatra koa Zadoka, zanak’i Bana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary manarakaraka io dia namboatra koa ny Tekoita; nefa ny olona ambonimbony teo aminy dia tsy nety nampiondrika ny vozony ho amin’ny fanompoana ny Tompony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny vavahady taloha dia namboarin’i Joiada, zanak’i Pasea, sy Mesolama, zanak’i Besodia; izy roa lahy no nandatsaka ny rairainy sy ny lela-vavahadiny mbamin’ny hidiny sy ny vavombiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary manarakaraka ireo dia namboatra koa Melatia Gibeonita sy Jadona Meronotita mbamin’ny mponina tany Gibeona sy Mizpa, hatramin’ny seza fiandrianan’ny governora etỳ an-dafin’ny ony etỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Manarakaraka ireo dia namboatra koa Oziela, zanak’i Haraia, isan’ny mpanefy volamena. Manarakaraka io dia namboatra koa Hanania, isan’ny mpangaroharo zava-manitra; ary nanamafy an’i Jerosalema izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nisy nolalovany teo Jerosalema.
    marker-yv: yv-n
  - type: text
    text: ' hatramin’ny mànda lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary manarakaraka io dia namboatra koa Refaia, zanak’i Hora, komandin’ny antsasaky ny fehin’i Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary manarakaraka io dia namboatra koa Jedaia, zanak’i Haromafa, dia ny teo amin’ny tandrifin’ny tranony ihany. Ary manarakaraka io dia namboatra koa Hatosy, zanak’i Hasabnia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny sasany koa mbamin’ny tilikambo misy ny fatana fandoroana dia namboarin’i Malkia, zanak’i Harima, sy Hasoba, zanak’i Pahata-moaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary manarakaraka ireo dia namboatra koa Saloma, zanak’i Halohesy, komandin’ny antsasaky ny fehin’i Jerosalema, dia izy sy ny zanani-vavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny vavahady mankamin’ny lohasaha dia namboarin’i Hanona sy ny mponina tany Zanoa; ireo no nandrafitra izany sy nandatsaka ny lela-vavahadiny mbamin’ny hidiny sy ny vavombiny, ary narafiny koa ny arivo hakiho amin’ny mànda hatramin’ny vavahadin-jezika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny vavahadin-jezika dia namboarin’i Malkia, zanak’i Rekaba, komandin’ny fehin’i Beti-hakerema; izy no nandrafitra izany sy nandatsaka ny lela-vavahadiny mbamin’ny hidiny sy ny vavombiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny vavahadin-doharano dia namboarin’i Saloma, zanak’i Kola-hoze, komandin’ny fehin’i Mizpa; izy no nandrafitra sy nanafo izany ary nandatsaka ny lela-vavahadiny mbamin’ny hidiny sy ny vavombiny, ary narafiny koa ny màndan’ny farihy Siloa, teo anilan’ny sahan’ny mpanjaka, ka hatramin’ny ambaratonga midina avy any an-Tanànan’i Davida.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary manarakaraka io dia namboatra koa Nehemia, zanak’i Azboka, komandin’ny antsasaky ny fehin’i Beti-zora, hatramin’ny teo amin’ny tandrifin’ireo fasan’i Davida ka hatramin’ny farihy izay natao ary hatramin’ny tranon’ny lehilahy mahery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Manarakaraka io dia namboatra koa ny Levita, dia Rehoma, zanak’i Bany. Manarakaraka ireo dia namboatra koa Hasabia, komandin’ny antsasaky ny fehin’i Keila, ho an’ny fehiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Manarakaraka io dia namboatra koa ireo rahalahiny, dia Bavay, zanak’i Henadada, komandin’ny antsasaky ny fehin’i Keila. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary manarakaraka ireo dia nisy namboarin’i Ezera, zanak’i Jesoa, komandin’i Mizpa, teo amin’ny tandrifin’ny fiakarana ho any amin’ny trano fitehirizam-piadiana eo amin’ny fiolahana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Manarakaraka io koa dia Baroka, zanak’i Zabay, no nazoto namboatra ny sasany hatramin’ny fiolahana ka hatramin’ny varavaran’ny tranon’i Eliasiba mpisoronabe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manarakaraka io koa dia nisy namboarin’i Meremota, zanak’i Oria, zanak’i Hakoza, hatramin’ny varavaran’ny tranon’i Eliasiba ka hatramin’ny faran’ny tranon’i Eliasiba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary manarakaraka io dia namboatra koa ny mpisorona, dia ireo avy tany amin’ny tany lemaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Manarakaraka ireo dia namboatra koa Benjamina sy Hasoba teo amin’ny tandrifin’ny tranony ihany. Manarakaraka ireo dia namboatra koa Azaria, zanak’i Mahaseia, zanak’i Anania, teo anilan’ny tranony ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Manarakaraka io koa, dia nisy namboarin’i Binoy, zanak’i Henadada, hatramin’ny tranon’i Azaria ka hatramin’ny fiolahana eo amin’ny zorony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Palala, zanak’i Ozay, koa, dia ny teo amin’ny tandrifin’ny fiolahana sy izay mandroso eo amin’ny tilikambo ambony, eo amin’ny tranon’ny mpanjaka, eo akaikin’ny tokotanin’ny trano-maizina. Manarakaraka io koa dia Pedaia, zanak’i Parosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny Netinima dia nonina tany Ofela hatreo amin’ny tandrifin’ny vavahadin-drano atsinanana sy ny mandroso eo amin’ny tilikambo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary manarakaraka ireo koa dia nisy namboarin’ny Tekoita, teo amin’ny tandrifin’ny mandroso eo amin’ny tilikambo lehibe ka hatramin’ny màndan’i Ofela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hatreo ambonin’ny vavahadin-tsoavaly dia namboarin’ny mpisorona, dia samy ny teo amin’ny tandrifin’ny tranony avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Manarakaraka ireo dia namboatra koa Zadoka, zanak’Imera, dia ny teo amin’ny tandrifin’ny tranony ihany. Ary manarakaraka io dia namboatra koa Semaia, zanak’i Sekania, mpiandry ny vavahady atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Manarakaraka io koa dia nisy namboarin’i Hanania, zanak’i Selemia, sy Hanona, fahenin’ny zanak’i Zalafa. Manarakaraka ireo dia namboatra koa Mesolama, zanak’i Berekia, dia ny teo amin’ny tandrifin’ny efi-tranony ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Manarakaraka io dia namboatra koa Malkia, isan’ny mpanefy volamena, hatramin’ny tranon’ny Netinima sy ny mpandranto, dia ny teo amin’ny tandrifin’ ny vavahady Mifikada ka hatramin’ny trano ambony teo an-jorony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ny teo anelanelan’ny trano ambony teo an-jorony sy ny vavahadin’ondry no namboarin’ny mpanefy volamena sy ny mpandranto.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nataon’ny fahavalon’ny Jiosy hisakana azy tsy hanao ny asa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ARY rehefa ren’i Sanbala fa nataonay ny mànda, dia tezitra sady sosotra loatra izy ka nihomehy ny Jiosy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'dia niteny teo anatrehan’ny namany sy ny miaramilan’i Samaria hoe: Inona no ataon’ireo Jiosy osa ireo? Hahaleo tena va ireo?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moa havelany hanao va ireo?
    marker-yv: yv-n
  - type: text
    text: ' Hahavono zavatra hatao fanatitra va ireo? Hahatsangana indray andro va ireo? Hahatsangana ny vato avy amin’ny lavenona miavosa va ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary Tobia Amonita dia teo anilan’i Sanbala ka niteny hoe: Na dia amboa-haolo aza miakatra eo amin’izay atsangany, dia haharava ny mànda vato ataony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mihainoa, ry Andriamanitray ô, fa atao tsinontsinona izahay; koa atsingereno ho eo an-dohany ihany ny latsa ataony, ary aoka ho babo any amin’ny tany izay ahababoany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Aza manarona ny helony, ary aza vonoina tsy ho eo anatrehanao ny fahotany; fa efa nampahatezitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Anao
  - type: text
    text: ' teo anatrehan’ireo mandrafitra izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ka dia narafitray ihany ny mànda ka tafakambana avokoa hatramin’ny antsasany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: miakatra
  - type: text
    text: ; fa nazoto niasa ny olona.
