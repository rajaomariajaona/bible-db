document_id: JOB.39,873
type_code: plt
verses:
  '1':
  - type: text
    content: Fantatrao va ny fotoana fiterahan’ny osi-dia any amin’ny harambato?
  - type: text
    content: Voahevitrao va ny fiterahan’ny dieravavy?
  '10':
  - type: text
    content: Mahafatotra ny ombimanga amin’ny mahazaka ho ao am-bavasanao va hianao?
  - type: text
    content: Na mety manaraka anao handravona bainga any an-dohasaha va izy?
  '11':
  - type: text
    content: Azonao itokiana va izy, satria lehibe ny heriny?
  - type: text
    content: Ary havelanao hataony va ny asanao?
  '12':
  - type: text
    content: Azonao itokiana hitondra ny varinao mody va izy
  - type: text
    content: Sy hanangona izany ho eo am-pamoloanao?
  '13':
  - type: text
    content: Mikopakopaka noho ny hafaliana ny elatry ny ostritsa;
  - type: text
    content: Nefa mahalemy fanahy azy va ny elany sy ny volony?
  '14':
  - type: text
    content: Tsia, fa mandao ny atodiny ao amin’ny tany izy
  - type: text
    content: Ka mamela azy ho afanain’ny vovoka,
  '15':
  - type: text
    content: Ary tsy ahìny izay ho voaporitry ny tongotra ireo,
  - type: text
    content: Na ho voahitsaky ny bibi-dia.
  '16':
  - type: text
    content: Tsy tia ny zanany izy, fa ataony hoatra ny tsy azy ireny;
  - type: text
    content: Efa very foana izay nisasarany, nefa tsy ahoany akory izany;
  '17':
  - type: text
    content: Fa efa nampanadinoin’Andriamanitra ny fahendrena izy,
  - type: text
    content: Ary tsy nomeny anjara-fahalalana.
  '18':
  - type: text
    content: Raha mikopakopaka elatra toa hanidina izy,
  - type: text
    content: Dia ihomehezany ny soavaly sy ny mpitaingina azy.
  '19':
  - type: text
    content: Moa manome hery ny soavaly va hianao,
  - type: text
    content: Na manarona vombo mihofahofa ny vozony?
  '2':
  - type: text
    content: Mahisa ny andro ahatanterahany
  - type: note
    content: Heb. ny volana taperiny.
  - type: text
    content: ' va hianao?'
  - type: text
    content: Ary fantatrao va ny fotoana fiterahany?
  '20':
  - type: text
    content: Mahay mampitsipika azy tahaka ny valala va hianao?
  - type: text
    content: Mahatsiravina ny hamafin’ny fiefonefony!
  '21':
  - type: text
    content: Mihehy ao amin’ny lohasaha izy ka mifalifaly noho ny heriny;
  - type: text
    content: Mandroso hanetra ny ady
  - type: note
    content: Heb. fiadiana.
  - type: text
    content: ' izy.'
  '22':
  - type: text
    content: Mihomehy ny tahotra izy, fa tsy mety mivadi-po
  - type: text
    content: Ary tsy mianotra amin’ny sabatra.
  '23':
  - type: text
    content: Mifioka eny amboniny ny zana-tsipìka
  - type: note
    content: Heb. tranon-jana-tsipìka.
  - type: text
    content: Sy ny lefona manelatselatra ary ny lefompohy.
  '24':
  - type: text
    content: Miriotra mafy
  - type: note
    content: Heb. Mitelina ny tany.
  - type: text
    content: ' amin’ny fahavinirana sy ny fahatezerana izy'
  - type: text
    content: Ka tsy mety mijanona intsony, rehefa maneno ny anjomara.
  - type: note
    content: 'Na: Tsy mino izy fa feon’ny anjomara izany.'
  '25':
  - type: text
    content: Na oviana na oviana no anenoan’ny anjomara dia mihiaka izy.
  - type: text
    content: Ary manimbolo ny ady izy, raha mbola lavitra,
  - type: text
    content: Dia ny akoralava sy ny fitabataban’ny manamboninahitra.
  '26':
  - type: text
    content: Ny fahendrenao va no mampanidina ny hitsikitsika
  - type: text
    content: Sy mampamelatra ny elany hianatsimo?
  '27':
  - type: text
    content: Noho ny didinao va no iakaran’ny voro-mahery
  - type: text
    content: Sy anaovany ny akaniny eny an-dringiringy?
  '28':
  - type: text
    content: Eny amin’ny harambato no itoerany sy anaovany ny akaniny,
  - type: text
    content: Dia eo an-tampon’ny harambato sy ao amin’ny fiarovana;
  '29':
  - type: text
    content: Any no itazanany remby;
  - type: text
    content: Mahatsinjo lavitra ny masony.
  '3':
  - type: text
    content: Miondrika izy ka teraka,
  - type: text
    content: Sady alefany ny faharariany.
  '30':
  - type: text
    content: Mitsentsitra ra ny zanany,
  - type: text
    content: Ary izay itoeran’ny faty, dia any izy.
  '4':
  - type: text
    content: Donga ny zanany, mihalehibe any an-efitra ireny;
  - type: text
    content: Mivoaka izy ka tsy mety miverina intsony.
  '5':
  - type: text
    content: Iza moa no nandefa ny boriki-dia ho karenjy?
  - type: text
    content: Ary iza no efa namaha ny fatoran’ny boriki-dia,
  '6':
  - type: text
    content: Izay nomeko ny tani-hay ho fitoerany
  - type: text
    content: Ary ny tanin-tsira ho fonenany?
  '7':
  - type: text
    content: Ihomehezany ny fitabatabana ao an-tanàna;
  - type: text
    content: Tsy ahoany akory ny fiantsoantson’ny mpampandeha;
  '8':
  - type: text
    content: Any an-tendrombohitra rehetra any no fihinanany,
  - type: text
    content: Ary mitady ny zava-maitso rehetra izy.
  '9':
  - type: text
    content: Mba mety manompo anao va ny ombimanga,
  - type: text
    content: Na handry ao am-pahitrao amin’ny alina?
