document_id: JOB.39
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fantatrao va ny fotoana fiterahan’ny osi-dia any amin’ny harambato?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voahevitrao va ny fiterahan’ny dieravavy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mahisa ny andro ahatanterahany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny volana taperiny.
    marker-yv: yv-n
  - type: text
    text: ' va hianao?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fantatrao va ny fotoana fiterahany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Miondrika izy ka teraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady alefany ny faharariany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Donga ny zanany, mihalehibe any an-efitra ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoaka izy ka tsy mety miverina intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza moa no nandefa ny boriki-dia ho karenjy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no efa namaha ny fatoran’ny boriki-dia,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izay nomeko ny tani-hay ho fitoerany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tanin-tsira ho fonenany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ihomehezany ny fitabatabana ao an-tanàna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ahoany akory ny fiantsoantson’ny mpampandeha;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Any an-tendrombohitra rehetra any no fihinanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitady ny zava-maitso rehetra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mba mety manompo anao va ny ombimanga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na handry ao am-pahitrao amin’ny alina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahafatotra ny ombimanga amin’ny mahazaka ho ao am-bavasanao va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mety manaraka anao handravona bainga any an-dohasaha va izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Azonao itokiana va izy, satria lehibe ny heriny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary havelanao hataony va ny asanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Azonao itokiana hitondra ny varinao mody va izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanangona izany ho eo am-pamoloanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mikopakopaka noho ny hafaliana ny elatry ny ostritsa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa mahalemy fanahy azy va ny elany sy ny volony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsia, fa mandao ny atodiny ao amin’ny tany izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mamela azy ho afanain’ny vovoka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary tsy ahìny izay ho voaporitry ny tongotra ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ho voahitsaky ny bibi-dia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy tia ny zanany izy, fa ataony hoatra ny tsy azy ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa very foana izay nisasarany, nefa tsy ahoany akory izany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa efa nampanadinoin’Andriamanitra ny fahendrena izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nomeny anjara-fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha mikopakopaka elatra toa hanidina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ihomehezany ny soavaly sy ny mpitaingina azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moa manome hery ny soavaly va hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na manarona vombo mihofahofa ny vozony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mahay mampitsipika azy tahaka ny valala va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatsiravina ny hamafin’ny fiefonefony!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mihehy ao amin’ny lohasaha izy ka mifalifaly noho ny heriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandroso hanetra ny ady
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiadiana.
    marker-yv: yv-n
  - type: text
    text: ' izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mihomehy ny tahotra izy, fa tsy mety mivadi-po
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mianotra amin’ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mifioka eny amboniny ny zana-tsipìka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tranon-jana-tsipìka.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny lefona manelatselatra ary ny lefompohy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Miriotra mafy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mitelina ny tany.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fahavinirana sy ny fahatezerana izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mety mijanona intsony, rehefa maneno ny anjomara.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy mino izy fa feon’ny anjomara izany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Na oviana na oviana no anenoan’ny anjomara dia mihiaka izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manimbolo ny ady izy, raha mbola lavitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny akoralava sy ny fitabataban’ny manamboninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny fahendrenao va no mampanidina ny hitsikitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mampamelatra ny elany hianatsimo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Noho ny didinao va no iakaran’ny voro-mahery
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy anaovany ny akaniny eny an-dringiringy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny amin’ny harambato no itoerany sy anaovany ny akaniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eo an-tampon’ny harambato sy ao amin’ny fiarovana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Any no itazanany remby;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatsinjo lavitra ny masony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mitsentsitra ra ny zanany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay itoeran’ny faty, dia any izy.
