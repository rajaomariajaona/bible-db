document_id: JOB.39,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantatrao va ny fotoana fiterahan’ny osi-dia any amin’ny harambato?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voahevitrao va ny fiterahan’ny dieravavy?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahafatotra ny ombimanga amin’ny mahazaka ho ao am-bavasanao va hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mety manaraka anao handravona bainga any an-dohasaha va izy?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azonao itokiana va izy, satria lehibe ny heriny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary havelanao hataony va ny asanao?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azonao itokiana hitondra ny varinao mody va izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanangona izany ho eo am-pamoloanao?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mikopakopaka noho ny hafaliana ny elatry ny ostritsa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa mahalemy fanahy azy va ny elany sy ny volony?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, fa mandao ny atodiny ao amin’ny tany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mamela azy ho afanain’ny vovoka,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy ahìny izay ho voaporitry ny tongotra ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ho voahitsaky ny bibi-dia.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy tia ny zanany izy, fa ataony hoatra ny tsy azy ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa very foana izay nisasarany, nefa tsy ahoany akory izany;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nampanadinoin’Andriamanitra ny fahendrena izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy nomeny anjara-fahalalana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mikopakopaka elatra toa hanidina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ihomehezany ny soavaly sy ny mpitaingina azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa manome hery ny soavaly va hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na manarona vombo mihofahofa ny vozony?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahisa ny andro ahatanterahany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny volana taperiny.
      marker-yv: yv-n
    - type: text
      text: ' va hianao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fantatrao va ny fotoana fiterahany?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahay mampitsipika azy tahaka ny valala va hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsiravina ny hamafin’ny fiefonefony!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihehy ao amin’ny lohasaha izy ka mifalifaly noho ny heriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandroso hanetra ny ady
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiadiana.
      marker-yv: yv-n
    - type: text
      text: ' izy.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihomehy ny tahotra izy, fa tsy mety mivadi-po
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mianotra amin’ny sabatra.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifioka eny amboniny ny zana-tsipìka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tranon-jana-tsipìka.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny lefona manelatselatra ary ny lefompohy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miriotra mafy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mitelina ny tany.
      marker-yv: yv-n
    - type: text
      text: ' amin’ny fahavinirana sy ny fahatezerana izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mety mijanona intsony, rehefa maneno ny anjomara.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy mino izy fa feon’ny anjomara izany.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na oviana na oviana no anenoan’ny anjomara dia mihiaka izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manimbolo ny ady izy, raha mbola lavitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny akoralava sy ny fitabataban’ny manamboninahitra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahendrenao va no mampanidina ny hitsikitsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mampamelatra ny elany hianatsimo?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny didinao va no iakaran’ny voro-mahery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy anaovany ny akaniny eny an-dringiringy?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny amin’ny harambato no itoerany sy anaovany ny akaniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eo an-tampon’ny harambato sy ao amin’ny fiarovana;
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no itazanany remby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsinjo lavitra ny masony.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miondrika izy ka teraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady alefany ny faharariany.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsentsitra ra ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay itoeran’ny faty, dia any izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donga ny zanany, mihalehibe any an-efitra ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivoaka izy ka tsy mety miverina intsony.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no nandefa ny boriki-dia ho karenjy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no efa namaha ny fatoran’ny boriki-dia,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nomeko ny tani-hay ho fitoerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tanin-tsira ho fonenany?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ihomehezany ny fitabatabana ao an-tanàna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ahoany akory ny fiantsoantson’ny mpampandeha;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any an-tendrombohitra rehetra any no fihinanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitady ny zava-maitso rehetra izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba mety manompo anao va ny ombimanga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na handry ao am-pahitrao amin’ny alina?
