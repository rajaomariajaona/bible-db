document_id: GEN.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namoronan’Andriamanitra izao tontolo izao.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TAMIN’ny voalohany Andriamanitra nahary sy ny lanitra sy ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary ny tany dia tsy nisy endrika sady foana; ary aizina no tambonin’ny lalina. Ary ny Fanahin’Andriamanitra nanomba tambonin’ny rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Andriamanitra nanao hoe: Misia mazava; dia nisy mazava. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hitan’Andriamanitra fa tsara ny mazava; ary nampisarahin’Andriamanitra ny mazava sy ny maizina. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Andriamanitra nanao ny mazava hoe ,andro’; ary ny maizina nataony hoe ,alina’. Dia nisy hariva, ary nisy maraina,–andro voalohany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Andriamanitra nanao hoe: Misia habakabaka eo anelanelan’ny rano; ary aoka hampisaraka ny rano amin’ny rano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Andriamanitra nanao ny habakabaka ka nampisaraka ny rano ambanin’ny habakabaka tamin’ny rano ambonin’ny habakabaka; dia nisy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Andriamanitra nanao ny habakabaka hoe ,lanitra’. Dia nisy hariva, ary nisy maraina,– andro faharoa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Andriamanitra nanao hoe; Aoka hiangona ny rano eny ambanin’ny lanitra ho eo amin’ny fitoerana iray, ary aoka hiseho ny maina; dia nisy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary Andriamanitra nanao ny maina hoe ,tany’; ary ny rano tafangona nataony hoe ,ranomasina.’ Ary hitan’Andriamanitra fa tsara izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Andriamanitra nanao hoe: Aoka ny tany haniry ahitra sy anana mamoa ary hazo fihinam-boa izay mamoa, samy araka ny karazany avy, ka manam-boa ao aminy, eny ambonin’ny tany; dia nisy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny tany naniry ahitra sy anana mamoa, samy araka ny karazany avy, ary hazo mamoa izay manam-boa ao aminy, samy araka ny karazany avy. Ary hitan’Andriamanitra fa tsara izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nisy hariva, ary nisy maraina,– andro fahatelo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Andriamanitra nanao hoe: Misia fanazavana eny amin’ny habakabaky ny lanitra hampisaraka ny andro sy ny alina; ary aoka ho famantarana sy ho fotoana ary ho andro sy taona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary aoka ho fanazavana eny amin’ny habakabaky ny lanitra izy hanazava eny ambonin’ny tany; dia nisy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Andriamanitra nanao ny fanazavana roa lehibe–dia ny fanazavana lehibe ho mpanapaka ny andro ary ny fanazavana kely ho mpanapaka ny alina–sy ny kintana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Andriamanitra nametraka azy eny amin’ny habakabaky ny lanitra hanazava eny ambonin’ny tany, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'sy ho mpanapaka ny andro sy ny alina, ary hampisaraka ny mazava sy ny maizina. Ary hitan’Andriamanitra fa tsara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia nisy hariva, ary nisy maraina,–andro fahefatra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Andriamanitra nanao hoe: Aoka ny rano ho be zava-manan-aina; ary aoka hisy vorona hanidina ambonin’ny tany eny amin’ny habakabaky ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Andriamanitra nahary ny biby vaventy anaty rano sy ny zava-manan-aina mihetsiketsika rehetra, izay efa betsaka ao amin’ny rano, samy araka ny karazany avy, ary ny voro-manidina rehetra samy araka ny karazany avy. Ary hitan’Andriamanitra fa tsara izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Andriamanitra nitso-drano azy hoe: Maroa anaka sy mihabetsaha ary mamenoa ny rano ao amin’ny ranomasina; ary aoka ny vorona hihamaro eny ambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia nisy hariva, ary nisy maraina,–andro fahadimy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Andriamanitra nanao hoe: Aoka ny tany hamoaka zava-mananaina, samy araka ny karazany avy, dia biby fiompy sy biby mandady na mikisaka ary bibi-dia, samy araka ny karazany avy; dia nisy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary Andriamanitra nanao ny bibi-dia, samy araka ny karazany avy, sy ny biby fiompy, samy araka ny karazany avy, ary ny biby rehetra izay mandady na mikisaka amin’ny tany, samy araka ny karazany avy. Ary hitan’Andriamanitra fa tsara izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Andriamanitra nanao hoe: Andeha Isika hamorona olona tahaka ny endritsika, araka ny tarehintsika; ary aoka izy hanjaka amin’ny hazandrano ao amin’ny ranomasina sy ny voro-manidina sy ny biby fiompy sy ny tany rehetra ary ny biby rehetra izay mandady na mikisaka amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary Andriamanitra nahary ny olona tahaka ny endriny; tahaka ny endrik’Andriamanitra no namoronany azy; lahy sy vavy no namoronany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Andriamanitra nitso-drano azy hoe: Maroa fara sy mihabetsaha ary mamenoa ny tany, ka mampanompoa azy; ary manjakà amin’ny hazandrano ao amin’ny ranomasina sy ny voro-manidina ary ny biby rehetra izay mihetsiketsika ambonin’ny tany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Andriamanitra nanao hoe: Indro, efa nomeko anareo ny anana manintsam-boa rehetra izay ambonin’ny tany rehetra ary ny hazo rehetra izay misy voa sady manintsam-boa; dia ho fihinana ho anareo ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary ny amin’ny bibi-dia rehetra sy ny voro-manidina rehetra ary ny zava-manan-aina rehetra izay mandady na mikisaka amin’ny tany, dia efa nomeko azy ny zava-maitso rehetra ho fihinany; dia nisy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary hitan’Andriamanitra izay rehetra nataony, ary, indro, tsara indrindra izany. Dia nisy hariva, ary nisy maraina,–andro fahenina izany.
