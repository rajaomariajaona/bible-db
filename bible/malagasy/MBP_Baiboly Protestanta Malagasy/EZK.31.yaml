document_id: EZK.31
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanetrena an’i Asyria atao fananarana an’i Egypta.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’ny andro voalohany tamin’ny volana fahatelo tamin’ ny taona fahiraika ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak’olona, ataovy amin’i Farao, mpanjakan’i Egypta, sy amin’ny vahoakany maro be hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka an’iza moa hianao amin’ny fahalehibiazanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indro, Asyria dia sedera tsara rantsana any Libanona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misandrahaka manalokaloka sady mijoroaka avo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mitehika amin’ny rahona matevina ny tendrony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny rano no nahalehibe azy,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny rano lalina no nampijoroaka azy, ary ny ranovelona no nandeha manodidina ny tany nambolena azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nampandeha ny lakan-dranony hankamin’ny hazo rehetra any an-tsaha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa dia nijoroaka ho avo noho ny hazo rehetra any an-tsaha izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nihamaro ny sampany sady nihalava ny rantsany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny habetsahan’ny rano tamin’ny fisandrahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Teo amin’ny sampany no nanaovan’ny voro-manidina rehetra akany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary teo ambanin’ny rantsany no niterahan’ny bibi-dia rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady teo amin’ny alokalony no nitoeran’ny firenena malaza rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ka dia tsara tarehy tamin’ny fahalehibiazany sy ny halavan’ny sampany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tany amin’ny rano maro ny fàkany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy nahatakona azy ny sedera tao amin’ny sahan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba nahatoraka ny sampany ny hazo kypreso,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba nanana rantsana tahaka azy ny hazo platana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nisy tsara tarehy tahaka azy ny hazo rehetra tany amin’ny sahan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nohatsaraiko tamin’ny haben’ny rantsany ny tarehiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia nialona azy ny hazo rehetra tany Edena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo tany amin’ny sahan’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa izany no nanaovan’i Jehovah Tompo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nijoroaka avo izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hianao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanandratra ny lohany teo amin’ny rahona matevina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nirehareha ny fony noho ny hahavony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia hatolotro eo an-tànan’ilay mahery amin’ny firenena izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamely azy tokoa io;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny faharatsiany no nandroahako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary izay fahavalo masiaka indrindra amin’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nanapaka azy sady nanary azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teny an-tendrombohitra sy teny amin’ny lohasaha rehetra no nihahafan’ny sampany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary notapatapahina teny amoron’ny ony rehetra amin’ny tany ny rantsany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nidina niala tamin’ny alokalony ny firenena rehetra ka nahafoy azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mipetraka eo amin’ny vatany nianjera ny voro-manidina rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eny amin’ny sampany ny bibi-dia rehetra,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mba tsy hisy hiavonavona intsony noho ny hahavony ny hazo rehetra eny amoron’ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hanandratra ny lohany ho eo amin’ny rahona matevina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy hisy hitoky amin’ny hahavony intsony ny hazo mifo-drano rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa voatolotra ho faty izy rehetra ho any ambanin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho ao amin’ny zanak’olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’izay midina any an-davaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro nidinany ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' dia nampanao fisaonana Aho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanarona ny rano lalina noho ny aminy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nanampina ny ony avy aminy, ka dia najanona ny rano maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nampisaoniko Libanona noho ny aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nalazo noho izany ny hazo rehetra tany an-tsaha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tamin’ny fiezinezin’ny fianjerany dia nampihorohoroiko ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha nampidiniko ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho naman’izay midina any an-davaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hazo rehetra any Edena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny nojobonina sady soa indrindra any Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay mifo-drano rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy nampionona ny tenany any ambanin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ireo koa dia niara-nidina taminy ho any amin’ny fiainan-tsi-hita,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho any amin’izay voatrabaky ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ireo izay efa sandriny teo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nipetraka teo ambanin’ny alokalony teo amin’ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tahaka an’iza amin’ny hazo any Edena moa hianao amin’izao voninahitra sy fahalehibiazana izao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampidinina ho any ambanin’ny tany miaraka amin’ny hazo any Edena hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo amin’ny tsy voafora no hiamparanao, dia eo amin’izay voatrabaky ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Farao sy ny vahoakany marobe rehetra izany, hoy Jehovah Tompo.
