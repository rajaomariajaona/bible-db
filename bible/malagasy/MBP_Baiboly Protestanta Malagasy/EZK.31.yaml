document_id: EZK.31,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanetrena an’i Asyria atao fananarana an’i Egypta.
  - type: text
    content: 'ARY tamin’ny andro voalohany tamin’ny volana fahatelo tamin’ ny taona fahiraika ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Koa izany no nanaovan’i Jehovah Tompo hoe:'
  - type: text
    content: Satria nijoroaka avo izy
  - type: note
    content: Heb. hianao.
  - type: text
    content: Ka nanandratra ny lohany teo amin’ny rahona matevina,
  - type: text
    content: Ary nirehareha ny fony noho ny hahavony,
  '11':
  - type: text
    content: Dia hatolotro eo an-tànan’ilay mahery amin’ny firenena izy;
  - type: text
    content: Hamely azy tokoa io;
  - type: text
    content: Noho ny faharatsiany no nandroahako azy.
  '12':
  - type: text
    content: Ary izay fahavalo masiaka indrindra amin’ny firenena
  - type: text
    content: No nanapaka azy sady nanary azy;
  - type: text
    content: Teny an-tendrombohitra sy teny amin’ny lohasaha rehetra no nihahafan’ny sampany,
  - type: text
    content: Ary notapatapahina teny amoron’ny ony rehetra amin’ny tany ny rantsany;
  - type: text
    content: Ary nidina niala tamin’ny alokalony ny firenena rehetra ka nahafoy azy.
  '13':
  - type: text
    content: Mipetraka eo amin’ny vatany nianjera ny voro-manidina rehetra,
  - type: text
    content: Ary eny amin’ny sampany ny bibi-dia rehetra,–
  '14':
  - type: text
    content: Mba tsy hisy hiavonavona intsony noho ny hahavony ny hazo rehetra eny amoron’ny rano,
  - type: text
    content: Na hanandratra ny lohany ho eo amin’ny rahona matevina,
  - type: text
    content: Sady tsy hisy hitoky amin’ny hahavony intsony ny hazo mifo-drano rehetra;
  - type: text
    content: Fa voatolotra ho faty izy rehetra ho any ambanin’ny tany,
  - type: text
    content: Ho ao amin’ny zanak’olombelona,
  - type: text
    content: Dia any amin’izay midina any an-davaka.
  '15':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Tamin’ny andro nidinany ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' dia nampanao fisaonana Aho:'
  - type: text
    content: Nanarona ny rano lalina noho ny aminy Aho
  - type: text
    content: Sady nanampina ny ony avy aminy, ka dia najanona ny rano maro;
  - type: text
    content: Nampisaoniko Libanona noho ny aminy,
  - type: text
    content: Ka nalazo noho izany ny hazo rehetra tany an-tsaha.
  '16':
  - type: text
    content: Tamin’ny fiezinezin’ny fianjerany dia nampihorohoroiko ny firenena,
  - type: text
    content: Raha nampidiniko ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' izy,'
  - type: text
    content: Ho naman’izay midina any an-davaka;
  - type: text
    content: Ary ny hazo rehetra any Edena,
  - type: text
    content: Dia ny nojobonina sady soa indrindra any Libanona,
  - type: text
    content: Dia izay mifo-drano rehetra,
  - type: text
    content: Samy nampionona ny tenany any ambanin’ny tany.
  '17':
  - type: text
    content: Ireo koa dia niara-nidina taminy ho any amin’ny fiainan-tsi-hita,
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Ho any amin’izay voatrabaky ny sabatra,
  - type: text
    content: Mbamin’ireo izay efa sandriny teo,
  - type: text
    content: Ka nipetraka teo ambanin’ny alokalony teo amin’ny firenena.
  '18':
  - type: text
    content: Tahaka an’iza amin’ny hazo any Edena moa hianao amin’izao voninahitra sy fahalehibiazana izao?
  - type: text
    content: Hampidinina ho any ambanin’ny tany miaraka amin’ny hazo any Edena hianao;
  - type: text
    content: Eo amin’ny tsy voafora no hiamparanao, dia eo amin’izay voatrabaky ny sabatra.
  - type: text
    content: Farao sy ny vahoakany marobe rehetra izany, hoy Jehovah Tompo.
  '2':
  - type: text
    content: 'Ry zanak’olona, ataovy amin’i Farao, mpanjakan’i Egypta, sy amin’ny vahoakany maro be hoe:'
  - type: text
    content: Tahaka an’iza moa hianao amin’ny fahalehibiazanao?
  '3':
  - type: text
    content: Indro, Asyria dia sedera tsara rantsana any Libanona
  - type: text
    content: Ary misandrahaka manalokaloka sady mijoroaka avo,
  - type: text
    content: Ka mitehika amin’ny rahona matevina ny tendrony.
  '4':
  - type: text
    content: Ny rano no nahalehibe azy,–
  - type: text
    content: Eny, ny rano lalina no nampijoroaka azy, ary ny ranovelona no nandeha manodidina ny tany nambolena azy
  - type: text
    content: Ka nampandeha ny lakan-dranony hankamin’ny hazo rehetra any an-tsaha.
  '5':
  - type: text
    content: Koa dia nijoroaka ho avo noho ny hazo rehetra any an-tsaha izy,
  - type: text
    content: Ary nihamaro ny sampany sady nihalava ny rantsany
  - type: text
    content: Noho ny habetsahan’ny rano tamin’ny fisandrahany.
  '6':
  - type: text
    content: Teo amin’ny sampany no nanaovan’ny voro-manidina rehetra akany;
  - type: text
    content: Ary teo ambanin’ny rantsany no niterahan’ny bibi-dia rehetra;
  - type: text
    content: Sady teo amin’ny alokalony no nitoeran’ny firenena malaza rehetra.
  '7':
  - type: text
    content: Ka dia tsara tarehy tamin’ny fahalehibiazany sy ny halavan’ny sampany izy;
  - type: text
    content: Fa tany amin’ny rano maro ny fàkany.
  '8':
  - type: text
    content: Tsy nahatakona azy ny sedera tao amin’ny sahan’Andriamanitra;
  - type: text
    content: Tsy mba nahatoraka ny sampany ny hazo kypreso,
  - type: text
    content: Tsy mba nanana rantsana tahaka azy ny hazo platana;
  - type: text
    content: Ary tsy nisy tsara tarehy tahaka azy ny hazo rehetra tany amin’ny sahan’Andriamanitra.
  '9':
  - type: text
    content: Nohatsaraiko tamin’ny haben’ny rantsany ny tarehiny;
  - type: text
    content: Ka dia nialona azy ny hazo rehetra tany Edena,
  - type: text
    content: Dia ireo tany amin’ny sahan’Andriamanitra.
