document_id: 2TI.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fihemorana any am-parany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'FA aoka ho fantatrao izao: fa any am-parany any dia hisy andro mahory. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'FA hianao kosa dia efa nanaraka tsara ny fampianarako, ny fitondrantenako, ny fisainako, ny finoako, ny fandeferako, ny fitiavako, ny faharetako, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny nanenjehana ahy, ny fahoriana izay nanjo ahy tany Antiokia, tany Ikonioma, tany Lystra, dia ny fanenjehana izay niaretako; ary ny Tompo nahafaka ahy tamin’izany rehetra izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, izay rehetra te-ho velona amin’ny toe-panahy araka an’Andriamanitra, izay ao amin’i Kristy Jesosy, dia henjehina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny ratsy fanahy sy ny mpanoloky kosa dia handroso hiharatsiratsy kokoa sady mamitaka no fitahina.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hianao kosa dia mahareta amin’izay zavatra nianaranao sy nampinoana anao, satria fantatrao izay nampianatra anao izany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hatry ny fony vao zaza hianao dia efa nahalala ny Soratra Masina, izay mampahahendry anao ho amin’ny famonjena amin’ny finoana izay ao amin’i Kristy Jesosy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay soratra rehetra nomen’ny tsindrimandrin’Andriamanitra dia mahasoa koa ho fampianarana, ho fandresen-dahatra, ho fanitsiana izay diso, ho fitaizana amin’ny fahamarinana, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba ho tanteraka ny olon’Andriamanitra, ho vonona tsara ho amin’ny asa tsara rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny olona ho tia tena, ho tia vola, ho mpandoka tena, mpiavonavona, miteny ratsy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'manao blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Mat. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix.3.
      marker-yv: yv-n
    - type: text
      text: ' tsy manoa ray sy reny, tsy misaotra, tsy manaja izay masina, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy manam-pitiavana, mpanontolo fo, mpanendrikendrika, tsy mahonom-po, lozabe, tsy tia ny tsara, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mpamadika, kirina, mpieboebo, tia ny fahafinaretana mihoatra noho ny fitiavany an’Andriamanitra, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'manana ny endriky ny toe-panahy araka an’Andriamanitra, nefa nandà ny heriny; ireny koa dia halaviro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa isan’ireny izay misokosoko miditra any an-tranon’ny sasany ka mahalasa ho babo ny vehivavy adaladala, vesaran’ny fahotana, entin’ny filana maro, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mianatra mandrakariva, nefa tsy mahatratra ny fahalalana ny marina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tahaka ny nanoheran’i Jana sy Jambra an’i Mosesy no anoheran’ireo koa ny fahamarinana, dia olona maloto saina sady tsy manam-pinoana marina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa tsy handroso intsony izy; fa ny hadalany dia haseho amin’ny olona rehetra, tahaka ny an’ireo koa.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Famporisihana an’i Timoty handroso tsara araka ny efa nataony ihany.
    marker-yv: yv-h
