document_id: NUM.23,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy Balama tamin’i Balaka: Manorena alitara fito eto ho ahy, ka manamboara vantotr’ombilahy fito sy ondrilahy fito. '
  '10':
  - type: text
    content: Iza no mahisa ny vovok’i Jakoba,
  - type: text
    content: Na ny isan’ny ampahefatry ny Isiraely?
  - type: text
    content: Aoka ho tahaka ny fahafatesan’ny olo-marina ny fahafatesako,
  - type: text
    content: Ary aoka ny hiafarako ho tahaka ny azy!
  '11':
  - type: text
    content: 'Dia hoy Balaka tamin’i Balama: Ahoana izao nataonao tamiko izao? Hanozona ny fahavaloko no nangalako anao, kanjo nitso-drano dia nitso-drano azy kosa hianao. '
  '12':
  - type: text
    content: 'Dia namaly izy ka nanao hoe: Tsy hotandremako va ny hilaza izay ataon’i Jehovah eto ambavako?'
  '13':
  - type: text
    content: 'Dia hoy Balaka taminy: Andeha mba hiaraka amiko ho any amin’ny tany hafa izay hahitanao azy; kanefa ny sisiny ihany no ho hitanao eo, fa tsy ho hitanao avokoa izy rehetra; ka ozòny ho ahy ao izy. '
  '14':
  - type: text
    content: 'Dia nitondra azy tao an-tsaha Zofima izy, tao an-tampon’i Pisga; ary nanorina alitara fito izy ka nanatitra vantotr’ombilahy sy ondrilahy iray avy teo ambonin’ny isan-alitara. '
  '15':
  - type: text
    content: 'Dia hoy izy tamin’i Balaka: Mitoera eto anilan’ny fanatitra doranao, fa izaho hankerỳ hihaona '
  - type: text
    content: amin’i Jehovah.
  '16':
  - type: text
    content: 'Ary Jehovah nihaona tamin’i Balama, dia nanisy teny teo am-bavany ka nanao hoe: Miverena mankeo amin’i Balaka, ary izany no holazainao.'
  '17':
  - type: text
    content: 'Ary nony tonga tany aminy izy, dia, indreo, teo anilan’ny fanatitra dorany izy sy ireo andriandahin’i Moaba izay teo aminy. Dia hoy Balaka taminy: Ahoana no nolazain’i Jehovah? '
  '18':
  - type: text
    content: 'Dia nanao oha-teny Balama ka nilaza hoe:'
  - type: text
    content: Mitsangàna, ry Balaka, ka mandrenesa;
  - type: text
    content: Atongilano amiko ny sofinao, ry zanak’i Zipora;
  '19':
  - type: text
    content: Andriamanitra tsy mba olona ka handainga,
  - type: text
    content: Na zanak’olombelona ka hanenina;
  - type: text
    content: Moa efa nilaza va Izy, ka tsy hefainy?
  - type: text
    content: Na efa niteny va Izy, ka tsy hotoviny?
  '2':
  - type: text
    content: Dia narahin’i Balaka izay efa nolazain’i Balama; ary Balaka sy Balama nanatitra vantotr’ombilahy sy ondrilahy iray avy teo ambonin’ny isan-alitara.
  '20':
  - type: text
    content: Indro, ny hitahy no efa azoko;
  - type: text
    content: Ary efa nitahy Izy, ka tsy mahova izany aho.
  '21':
  - type: text
    content: Tsy mijery faharatsiana eo amin’i Jakoba Izy.
  - type: text
    content: Ary tsy mahita fahoriana eo amin’ny Isiraely;
  - type: text
    content: Jehovah Andriamaniny no nomba azy,
  - type: text
    content: Ary hoby fanao amin’andriana no re eo aminy.
  '22':
  - type: text
    content: Nentin’Andriamanitra nivoaka avy tany Egypta izy,
  - type: text
    content: Ary manan-kery
  - type: note
    content: 'Na: tandroka.'
  - type: text
    content: ' toy ny ombimanga.'
  '23':
  - type: text
    content: Fa tsy misy fisikidianana eo amin’i Jakoba,
  - type: text
    content: Ary tsy misy fankatovana eo amin’Isiraely.
  - type: note
    content: 'Na: Fa tsy leon-tsikidy Jakoba ary tsy leom-pankatovana Isiraely.'
  - type: text
    content: Fa amin’ny fotoana no hilazana amin’i Jakoba sy Isiraely izay efa nataon’i Jehovah.
  '24':
  - type: text
    content: Indro, firenena mitsangana toy ny liom-bavy
  - type: text
    content: Sy miarina toy ny liona;
  - type: text
    content: Tsy handry izy mandra-pihinany toha
  - type: text
    content: Sy mandra-pisotrony ny ran’ny voavono.
  '25':
  - type: text
    content: 'Dia hoy Balaka tamin’i Balama: Aza manozona na mitso-drano azy akory. '
  '26':
  - type: text
    content: 'Fa namaly kosa Balama ka nanao tamin’i Balaka hoe: Tsy efa nilaza taminao va aho ka nanao hoe: Izay rehetra holazain’i Jehovah, izany no hataoko?'
  '27':
  - type: text
    content: 'Dia hoy Balaka tamin’i Balama: Andeha ho entiko any amin’izay tany hafa hianao; angamba ho sitrak’Andriamanitra ny hanozonanao azy any ho ahy. '
  '28':
  - type: text
    content: 'Ary Balama dia nentin’i Balaka ho ao an-tampon’i Peora, izay manatrika ny efitra. '
  '29':
  - type: text
    content: 'Dia hoy Balama tamin’i Balaka: Manorena alitara fito eto ho ahy, ka manamboara vantotr’ombilahy fito sy ondrilahy fito. '
  '3':
  - type: text
    content: 'Dia hoy Balama tamin’i Balaka: Mitoera eto anilan’ny fanatitra doranao, fa izaho kosa handeha; angamba ho avy hihaona amiko Jehovah; ary izay hasehony amiko dia hambarako aminao. Ary lasa nankany amin’ny tendrombohitra anankiray mangadihady izy.'
  '30':
  - type: text
    content: Ary Balaka dia nanao araka izay efa nolazain’i Balama ka nanatitra vantotr’ombilahy, sy ondrilahy iray avy teo ambonin’ny isan-alitara.
  '4':
  - type: text
    content: 'Ary Andriamanitra dia nihaona tamin’i Balama; ary hoy Balama taminy: Ny alitara fito dia efa namboariko, ary efa nanatitra vantotr’ombilahy sy ondrilahy iray avy teo ambonin’ny isan-alitara aho. '
  '5':
  - type: text
    content: 'Ary Jehovah nanisy teny teo am-bavan’i Balama ka nanao hoe: Miverena any amin’i Balaka, ary izany no holazainao.'
  '6':
  - type: text
    content: 'Dia niverina tany amin’i Balaka izy, ary, indreo, teo anilan’ny fanatitra dorany izy sy ireo andriandahin’i Moaba rehetra. '
  '7':
  - type: text
    content: 'Dia nanao oha-teny Balama ka nilaza hoe:'
  - type: text
    content: Balaka nampaka ahy avy tany Arama,
  - type: text
    content: 'Ny mpanjakan’i Moaba nampaka ahy avy tany amin’ny tendrombohitra atsinanana:'
  - type: text
    content: Avia, ka ozòny ho ahy Jakoba;
  - type: text
    content: Ary mankanesa atỳ, ka sahatoy ny Isiraely.
  '8':
  - type: text
    content: Hataoko ahoana no fanozona izay tsy nozonin’Andriamanitra?
  - type: text
    content: Ary hataoko ahoana no fisahato izay tsy nosahatoin’i Jehovah?
  '9':
  - type: text
    content: Fa eto an-tampon’ny vatolampy no ahitako azy,
  - type: text
    content: Ary eto amin’ny havoana no itazanako azy;
  - type: text
    content: Indro, firenena mitoka-monina izy,
  - type: text
    content: Ary tsy hatao ho isan’ny jentilisa.
