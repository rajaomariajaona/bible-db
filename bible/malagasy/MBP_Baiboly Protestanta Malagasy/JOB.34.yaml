document_id: JOB.34
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandrenesa ny teniko, hianareo olon-kendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihainoa ahy, hianareo manam-pahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny sofina no mamantatra teny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vava
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lanilany.
    marker-yv: yv-n
  - type: text
    text: ' no manandrana hanina.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa aoka izay rariny no hodinihintsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hiara-mamantatra izay tsara isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Joba efa nanao hoe: Marina aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saingy nesorin’Andriamanitra tamiko ny rariny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Marina ny ahy, nefa ampandaingainy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahafaty ny zana-tsipìka mitsatoka amiko, na dia tsy manam-pahadisoana aza aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aiza moa no misy lehilahy tahaka an’i Joba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manarampo amin’ny famingavingana toy ny fisotro rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary tonga naman’ny mpanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady miara-mandeha amin’ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy izy: Tsy mahasoa ny olona'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mihavana amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa amin’izany mihainoa ahy, hianareo manam-panahy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lavitra an’Andriamanitra ny hanao ratsy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary lavitra ny Tsitoha ny hanao meloka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny nataon’ny olona ihany no ampanodiaviny azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mamaly ny olona rehetra araka ny làlany avy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny tokoa, Andriamanitra tsy manao ratsy mihitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Tsitoha tsy mba mamadika ny rariny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Iza moa no nanendry Azy ho Mpiadidy ny tany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no nanorina izao tontolo izao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha tàhiny ny tenany ihany no heveriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hangoniny ho ao aminy ny fanahiny sy ny fofonainy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia hiala avokoa ny ain’ny nofo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiverina amin’ny vovoka ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha manam-pahalalana hianao, dia mandrenesa izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka mihainoa ny teniko:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moa mahay mifehy va izay tsy tia rariny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Ilay marina sady mahery va no hohelohinao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '(Mety va ny miteny amin’ny mpanjaka hoe: Olom-poana hianao!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’ny zanak’andriana: Ry ilay ratsy!),–'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia Ilay tsy mizaha ny tavan’ny lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy manaja ny ambony mihoatra noho ny ambany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria samy asan’ny tànany avokoa izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Maty amin’ny indray mipì-maso monja amin’ny mamatonalina ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ringana ny olona ka tsy ao intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mahery dia lasa tsy esorin-tànana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny mason’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Andriamanitra
  - type: text
    text: ' dia mijery ny alehan’ny olona,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahita ny diany rehetra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy misy aizina na alim-pito,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hieren’ny mpanao ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa Andriamanitra tsy mba miandry aloha vao mandinika ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tonga hotsaraina eo anatrehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Manorotoro ny olona mahery Izy, na dia tsy manadina aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manangana olon-kafa hisolo azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa hita amin’izany fa fantany ny asan’ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia mamono azy amin’ny alina ho torotoro Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tehafiny tànana tahaka ny fanao amin’ny ratsy fanahy ireo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mamely azy toy ny famely ny ratsy fanahy Izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo imason’ny vahoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izao no nialan’ireo tamin’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy nitandremany ny làlany akory,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia ny mba hahatonga ny fitarainan’ny malahelo eo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampandre Azy ny fitarainan’ny ory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mangina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manome fiadanana.
    marker-yv: yv-n
  - type: text
    text: ' Izy, ka iza no mahay manameloka?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manafin-tava Izy (ka iza no mahajery Azy?),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na amin’ny firenena, na amin’ny olona tsirairay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mba tsy hanjakan’ny ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho voafandrika ny vahoaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa moa mba efa nisy niteny tamin’Andriamanitra va nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanandra-tena
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nijaly.
    marker-yv: yv-n
  - type: text
    text: ' aho ka tsy hanao ratsy intsony;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izay tsy hitako mba ampianaro ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha nanao ratsy aho, dia tsy hanao intsony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Moa araka ny hevitrao va no hamaliany ny ataon’ny olona, no efa nandà hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hianao no mifidy, fa tsy izaho,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moa araka ny hevitrao va no hamaliany ny olona? Fa efa nandà hianao, ka dia hianao no tsy maintsy mifidy, fa tsy izaho.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izay fantatrao no ambarao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny olona manam-panahy hilaza amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny olon-kendry izay mihaino ahy hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Miteny tsy amim-pahalalana Joba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny teniny tsy amim-pahendrena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Enga anie ka hizahan-toetra mandrakariva Joba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny famaliana ataony araka ny fanaon’ny ratsy fanahy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa ampiany fihaikana koa ny fahotany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miteha-tànana eto amintsika izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manao teny maro ho enti-miady amin’Andriamanitra.
