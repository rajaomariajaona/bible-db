document_id: JOB.34,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
  '10':
  - type: text
    content: 'Koa amin’izany mihainoa ahy, hianareo manam-panahy:'
  - type: text
    content: Lavitra an’Andriamanitra ny hanao ratsy!
  - type: text
    content: Ary lavitra ny Tsitoha ny hanao meloka!
  '11':
  - type: text
    content: Fa ny nataon’ny olona ihany no ampanodiaviny azy,
  - type: text
    content: Ka mamaly ny olona rehetra araka ny làlany avy Izy.
  '12':
  - type: text
    content: Eny tokoa, Andriamanitra tsy manao ratsy mihitsy,
  - type: text
    content: Ary ny Tsitoha tsy mba mamadika ny rariny.
  '13':
  - type: text
    content: Iza moa no nanendry Azy ho Mpiadidy ny tany?
  - type: text
    content: Ary iza no nanorina izao tontolo izao?
  '14':
  - type: text
    content: Raha tàhiny ny tenany ihany no heveriny,
  - type: text
    content: Ka hangoniny ho ao aminy ny fanahiny sy ny fofonainy,
  '15':
  - type: text
    content: Dia hiala avokoa ny ain’ny nofo rehetra,
  - type: text
    content: Ary hiverina amin’ny vovoka ny olona.
  '16':
  - type: text
    content: Raha manam-pahalalana hianao, dia mandrenesa izao,
  - type: text
    content: 'Ka mihainoa ny teniko:'
  '17':
  - type: text
    content: Moa mahay mifehy va izay tsy tia rariny?
  - type: text
    content: Ary Ilay marina sady mahery va no hohelohinao?
  '18':
  - type: text
    content: '(Mety va ny miteny amin’ny mpanjaka hoe: Olom-poana hianao!'
  - type: text
    content: 'Ary amin’ny zanak’andriana: Ry ilay ratsy!),–'
  '19':
  - type: text
    content: Dia Ilay tsy mizaha ny tavan’ny lehibe,
  - type: text
    content: Ary tsy manaja ny ambony mihoatra noho ny ambany,
  - type: text
    content: Satria samy asan’ny tànany avokoa izy rehetra.
  '2':
  - type: text
    content: Mandrenesa ny teniko, hianareo olon-kendry;
  - type: text
    content: Ary mihainoa ahy, hianareo manam-pahalalana.
  '20':
  - type: text
    content: Maty amin’ny indray mipì-maso monja amin’ny mamatonalina ireny;
  - type: text
    content: Eny, ringana ny olona ka tsy ao intsony;
  - type: text
    content: Ary ny mahery dia lasa tsy esorin-tànana.
  '21':
  - type: text
    content: Fa ny mason’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' dia mijery ny alehan’ny olona,'
  - type: text
    content: Ary mahita ny diany rehetra Izy.
  '22':
  - type: text
    content: Tsy misy aizina na alim-pito,
  - type: text
    content: Izay hieren’ny mpanao ratsy.
  '23':
  - type: text
    content: Fa Andriamanitra tsy mba miandry aloha vao mandinika ny olona
  - type: text
    content: Izay tonga hotsaraina eo anatrehany.
  '24':
  - type: text
    content: Manorotoro ny olona mahery Izy, na dia tsy manadina aza,
  - type: text
    content: Ka manangana olon-kafa hisolo azy.
  '25':
  - type: text
    content: Koa hita amin’izany fa fantany ny asan’ireo,
  - type: text
    content: Ka dia mamono azy amin’ny alina ho torotoro Izy.
  '26':
  - type: text
    content: Tehafiny tànana tahaka ny fanao amin’ny ratsy fanahy ireo
  - type: note
    content: 'Na: Mamely azy toy ny famely ny ratsy fanahy Izy.'
  - type: text
    content: Eo imason’ny vahoaka.
  '27':
  - type: text
    content: Izao no nialan’ireo tamin’Andriamanitra
  - type: text
    content: Ka tsy nitandremany ny làlany akory,
  '28':
  - type: text
    content: Dia ny mba hahatonga ny fitarainan’ny malahelo eo anatrehany
  - type: text
    content: Ka hampandre Azy ny fitarainan’ny ory.
  '29':
  - type: text
    content: Mangina
  - type: note
    content: 'Na: Manome fiadanana.'
  - type: text
    content: ' Izy, ka iza no mahay manameloka?'
  - type: text
    content: Ary manafin-tava Izy (ka iza no mahajery Azy?),
  - type: text
    content: Na amin’ny firenena, na amin’ny olona tsirairay,
  '3':
  - type: text
    content: Fa ny sofina no mamantatra teny,
  - type: text
    content: Ary ny vava
  - type: note
    content: Heb. lanilany.
  - type: text
    content: ' no manandrana hanina.'
  '30':
  - type: text
    content: Mba tsy hanjakan’ny ratsy fanahy,
  - type: text
    content: Ary tsy ho voafandrika ny vahoaka.
  '31':
  - type: text
    content: 'Fa moa mba efa nisy niteny tamin’Andriamanitra va nanao hoe:'
  - type: text
    content: Efa nanandra-tena
  - type: note
    content: 'Na: nijaly.'
  - type: text
    content: ' aho ka tsy hanao ratsy intsony;'
  '32':
  - type: text
    content: Izay tsy hitako mba ampianaro ahy;
  - type: text
    content: Raha nanao ratsy aho, dia tsy hanao intsony?
  '33':
  - type: text
    content: Moa araka ny hevitrao va no hamaliany ny ataon’ny olona, no efa nandà hianao?
  - type: text
    content: Fa hianao no mifidy, fa tsy izaho,
  - type: note
    content: 'Na: Moa araka ny hevitrao va no hamaliany ny olona? Fa efa nandà hianao, ka dia hianao no tsy maintsy mifidy, fa tsy izaho.'
  - type: text
    content: Koa izay fantatrao no ambarao.
  '34':
  - type: text
    content: Ny olona manam-panahy hilaza amiko,
  - type: text
    content: 'Ary ny olon-kendry izay mihaino ahy hanao hoe:'
  '35':
  - type: text
    content: Miteny tsy amim-pahalalana Joba,
  - type: text
    content: Ary ny teniny tsy amim-pahendrena.
  '36':
  - type: text
    content: Enga anie ka hizahan-toetra mandrakariva Joba
  - type: text
    content: Noho ny famaliana ataony araka ny fanaon’ny ratsy fanahy!
  '37':
  - type: text
    content: Fa ampiany fihaikana koa ny fahotany;
  - type: text
    content: Miteha-tànana eto amintsika izy
  - type: text
    content: Ka manao teny maro ho enti-miady amin’Andriamanitra.
  '4':
  - type: text
    content: Koa aoka izay rariny no hodinihintsika,
  - type: text
    content: Ary aoka hiara-mamantatra izay tsara isika.
  '5':
  - type: text
    content: 'Fa Joba efa nanao hoe: Marina aho,'
  - type: text
    content: Saingy nesorin’Andriamanitra tamiko ny rariny;
  '6':
  - type: text
    content: Marina ny ahy, nefa ampandaingainy aho;
  - type: text
    content: Mahafaty ny zana-tsipìka mitsatoka amiko, na dia tsy manam-pahadisoana aza aho.
  '7':
  - type: text
    content: Aiza moa no misy lehilahy tahaka an’i Joba,
  - type: text
    content: Izay manarampo amin’ny famingavingana toy ny fisotro rano.
  '8':
  - type: text
    content: Ary tonga naman’ny mpanao ratsy
  - type: text
    content: Sady miara-mandeha amin’ny ratsy fanahy?
  '9':
  - type: text
    content: 'Fa hoy izy: Tsy mahasoa ny olona'
  - type: text
    content: Ny mihavana amin’Andriamanitra.
