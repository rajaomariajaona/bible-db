document_id: NUM.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny trompetra volafotsy.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary amin’ny andro fifalianareo, sy amin’ny fotoam-pivavahanareo, ary amin’ny voaloham-bolanareo no hitsofanareo ny trompetra, raha manao ny fanatitra doranareo sy ny fanati-pihavananareo; dia ho fahatsiarovana ho anareo izany eo anatrehan’Andriamanitrareo: Izaho Jehovah no Andriamanitrareo.'
  - type: heading
    content: Ny niaingan’ny Zanak’Isiraely niala tany an-efitr’i Sinay, sy ny teny nataon’i Mosesy tamin’i Hobaba.
  '11':
  - type: text
    content: ARY tamin’ny andro faharoa-polo tamin’ny volana faharoa, tamin’ny taona faharoa, no niakaran’ny rahona niala teo ambonin’ny tabernakelin’ny Vavolombelona.
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Dia niainga tany an-efitr’i Sinay ny Zanak’Isiraely ka nandroso, ary ny rahona nijanona tany an-efitra Parana. '
  '13':
  - type: text
    content: Dia izany no niaingany voalohany araka ny didin’i Jehovah izay nampitondrainy an’i Mosesy.
  '14':
  - type: text
    content: 'Ary ny fanevan’ny tobin’ny taranak’i Joda no niainga voalohany araka ny antokony, ary Nasona, zanak’i Aminadaba, no mpifehy ny antokony. '
  '15':
  - type: text
    content: 'Ary Netanela, zanak’i Zoara, no mpifehy ny antokon’ny firenena taranak’Isakara. '
  '16':
  - type: text
    content: Ary Eliaba, zanak’i Helona, no mpifehy ny antokon’ny firenena taranak’i Zebolona.
  '17':
  - type: text
    content: Dia nahorona ny tabernakely, ka niainga ny taranak’i Gersona sy ny taranak’i Merary, nitondra ny tabernakely.
  '18':
  - type: text
    content: 'Dia niainga ny fanevan’ny tobin’i Robena araka ny antokony; ary Elizora, zanak’i Sedeora, no mpifehy ny antokony. '
  '19':
  - type: text
    content: 'Ary Selomiela, zanak’i Zorisaday, no mpifehy ny antokon’ny firenena taranak’i Simeona. '
  '2':
  - type: text
    content: 'Manaova trompetra volafotsy roa ho anao; voasana no hanaovanao azy; dia ho fiantsoanao ny fiangonana sy ho fampiainganao ny toby ireo. '
  '20':
  - type: text
    content: Ary Eliasafa, zanak’i Doela, no mpifehy ny antokon’ny firenena taranak’i Gada.
  '21':
  - type: text
    content: Dia niainga ny Kehatita, nitondra ny zava-masina; ary nisy nanangana ny tabernakely mandra-pihaviny.
  '22':
  - type: text
    content: 'Dia niainga ny fanevan’ny tobin’ny taranak’i Efraima, araka ny antokony; ary Elisama, zanak’i Amihoda, no mpifehy ny antokony. '
  '23':
  - type: text
    content: 'Ary Gamaliela, zanak’i Pedazora, no mpifehy ny antokon’ny firenena taranak’i Manase. '
  '24':
  - type: text
    content: Ary Abidana, zanak’i Gideony, no mpifehy ny firenena taranak’i Benjamina.
  '25':
  - type: text
    content: 'Dia niainga ny fanevan’ny tobin’ny taranak’i Dana, izay vodi-làlan’ny toby rehetra, araka ny antokony; ary Ahiezera, zanak’i Amisaday, no mpifehy ny antokony. '
  '26':
  - type: text
    content: 'Ary Pagiela, zanak’i Okrana, no mpifehy ny antokon’ny firenena taranak’i Asera. '
  '27':
  - type: text
    content: Ary Ahira, zanak’i Enana, no mpifehy ny antokon’ny firenena taranak’i Naftaly.
  '28':
  - type: text
    content: Izany no fandehan’ny Zanak’Isiraely, araka ny antokony avy, raha niainga izy.
  '29':
  - type: text
    content: 'Dia hoy Mosesy tamin’i Hobaba, zanak’i Regoela Midianita, rafozan’i Mosesy: Izahay izao dia mandeha hankany amin’ny tany izay nolazain’i Jehovah hoe: Homeko anareo izy; andeha hiaraka aminay hianao, dia hasianay soa; fa Jehovah efa nilaza soa ny amin’ny Isiraely. '
  '3':
  - type: text
    content: 'Ary raha tsofina avokoa ireo, dia hivory eo aminao, eo anoloan’ny varavaran’ny trano-lay fihaonana, ny fiangonana rehetra. '
  '30':
  - type: text
    content: 'Fa hoy kosa izy taminy: Tsy handeha aho; fa hody any amin’ny taniko sy ny havako.'
  '31':
  - type: text
    content: 'Dia hoy Mosesy: Aza dia ilaozanao izahay; fa fantatrao izay tokony hitobianay atỳ an-efitra, ka dia ho masonay hianao. '
  '32':
  - type: text
    content: Ary raha hiaraka aminay hianao, dia izay soa hataon’i Jehovah aminay no mba hataonay aminao kosa.
  '33':
  - type: text
    content: 'Dia niainga niala tany an-tendrombohitr’i Jehovah làlan-kateloana izy; ary ny fiaran’ny faneken’i Jehovah nandroso nialoha azy làlan-kateloana hitady fialan-tsasatra ho an’ny olona. '
  '34':
  - type: text
    content: Ary ny rahon’i Jehovah dia teo amboniny nony andro tamin’ny niaingany niala tamin’ny nitobiany.
  '35':
  - type: text
    content: 'Ary raha niainga ny fiara, dia hoy Mosesy: Mitsangàna, Jehovah ô, ka aoka hiely ny fahavalonao; ary aoka handositra ny tavanao izay mankahala Anao. '
  '36':
  - type: text
    content: 'Ary raha nijanona kosa ny fiara, dia hoy izy: Miverena, Jehovah ô, ho amin’ny Isiraely tsy omby alinalina.'
  '4':
  - type: text
    content: 'Fa raha ny iray ihany no tsofina, dia ny lohan’ny firenena, izay mpifehy arivo amin’ny Isiraely, ihany no hivory eo aminao. '
  '5':
  - type: text
    content: 'Fa raha mitsoka ho fampitairana hianareo, dia hiainga ny toby izay mitoetra eo atsinanana. '
  '6':
  - type: text
    content: 'Ary raha mitsoka ho fampitairana fanindroany hianareo, dia hiainga ny toby izay mitoetra eo atsimo; fampitairana no hatao fiaingany. '
  '7':
  - type: text
    content: Fa raha hampivory ny fiangonana kosa hianareo, dia hitsoka fotsiny, fa tsy hanao fampitairana.
  '8':
  - type: text
    content: 'Ary ireo mpisorona, zanak’i Arona, no hitsoka ny trompetra; dia ho lalàna mandrakizay ho anareo hatramin’ny taranakareo fara mandimby izany. '
  '9':
  - type: text
    content: 'Ary raha misy ady eo amin’ny taninareo, ka mandeha hiady amin’ny fahavalo izay mampahory anareo hianareo, dia hitsoka ireo trompetra ireo ho fampitairana, dia hotsarovana eo anatrehan’i Jehovah Andriamanitrareo hianareo ka hovonjena amin’ny fahavalonareo. '
