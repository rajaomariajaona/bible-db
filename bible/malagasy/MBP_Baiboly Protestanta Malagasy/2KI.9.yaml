document_id: 2KI.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanosorana an’i Jeho ho mpanjaka, sy ny namonoan’i Jeho an’i Jorama sy Ahazia ary Jezebela.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Elisa mpaminany niantso ny anankiray tamin’ny zanakalahin’ny mpaminany ka nanao taminy hoe: Misikìna, dia ento eny an-tànanao ity tavoara feno diloilo ity, ka mankanesa any Ramota-gileada; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary Jezebela hohanin’ny alika ao amin’ny tany Jezirela, ka tsy hisy handevina azy. Dia namoha ny varavarana ilay zatovo ka lasa nandositra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jeho nivoaka nankao amin’ny mpanompon’ny tompony ary nanontaniany hoe: Raharaha tsara ihany va? Inona no nalehan’iny ilay adala iny tao aminao? Ary hoy izy taminy: Hianareo mahalala ihany an-dralehilahy sy ny heviny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ireo: Lainga foana izany; fa ambarao aminay. Dia hoy izy: Izao ka izao no nolazainy tamiko: Izao ny lazain’i Jehovah: Efa nanosotra anao ho mpanjakan’ny Isiraely Aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia samy nandray faingana ny lambany avy izy ireo ka namelatra azy hitoeran’i Jeho teo amin’ny ambaratonga, ary nitsoka ny anjomara izy ka niantso hoe: Jeho no mpanjaka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jeho, zanak’i Josafata, zanak’i Nimsy, nikomy tamin’i Jorama (fa Jorama mbamin’ny Isiraely rehetra niaro an’i Ramota-gileada noho ny fananihan’i Hazaela, mpanjakan’i Syria, azy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa Jorama mpanjaka efa niverina hotsaboina tao Jezirela amin’ny feriny tamin’ny nahavoazan’ny Syriana azy, fony izy niady tamin’i Hazaela, mpanjakan’i Syria), ka dia hoy Jeho: Raha izany ary no sitrakareo, aza avela hisy hiala eto an-tanàna handeha hilaza izany any Jezirela. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niakatra teo amin’ny kalesy Jeho ka nankany Jezirela, fa tany no nitoeran’i Jorama. Ary Ahazia, mpanjakan’ny Joda, efa nidina hamangy an’i Jorama.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpitily mitsangana teo an-tampon’ny tilikambo teo Jezirela ka nahatazana fa indrerỳ olona betsaka tamy niaraka amin’i Jeho, ary hoy izy: Mahita olona betsaka aho. Ary hoy Jorama: Makà mpitaingin-tsoavaly, ka maniraha hitsena azy, ary asaovy manao hoe: Fihavanana va? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha ny mpitaingin-tsoavaly anankiray hitsena azy ka nanao taminy hoe: Izao no tenin’ny mpanjaka: Fihavanana va? Ary hoy Jeho: Ahoanao izay fihavanana? fa mankanesa ato aoriako hianao. Ary ny mpitily nilaza hoe: Ny iraka dia tonga teny aminy, nefa tsy niverina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka mpitaingin-tsoavaly fanindroany Jorama, ary nony tonga teny koa izy, dia nanao hoe: Izao no tenin’ny mpanjaka: Fihavanana va? Ary Jeho namaly hoe: Ahoanao izay fihavanana? fa mankanesa ato aoriako hianao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rehefa mby any hianao, dia izahao Jeho, zanak’i Josafata, zanak’i Nimsy, ary midira, ka manaingà azy hiala amin’ny namany, ary ento any amin’ny efi-trano anatiny izy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpitily nilaza indray hoe: Tonga teny aminy koa iny, fa tsy niverina; ary ny fampiriotrany dia hoatra ny fampiriotran’i Jeho, zanak’i Nimsy; fa mampiriotra hoatra ny olona adala izy.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jorama: Ampiomany. Dia nampiomaniny ny kalesiny. Dia nivoaka Jorama, mpanjakan’ny Isiraely, sy Ahazia, mpanjakan’ny Joda, samy nitsangana teo amin’ny kalesiny avy ka nandeha hitsena an’i Jeho, ary nifanena taminy teo amin’ny tanin’i Nabota Jezirelita izy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jorama, nony nahita an’i Jeho, dia nanao hoe: Fihavanana va, ry Jeho? Fa izy namaly hoe: Aiza no hisy fihavanana, raha mbola ao ihany ny fijangajangan’i Jezebela reninao sy ny fankatovana betsaka ataony? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jorama nampihodina ka nandositra sady niteny tamin’i Ahazia hoe: Misy fitaka, ry Ahazia. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nohenjanin’i Jeho mafy ny tsipìka teny an-tànany, dia nitifitra an’i Jorama izy ka nahavoa azy teo anelanelan’ny sorony, ary ny zana-tsipìka niboroaka tamin’ny fony, ka dia nampianjera azy tao anatin’ny kalesiny.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jeho tamin’i Bidkara lefiny: Betao izy, ka atsipazo ao amin’ny sahan’i Nabota Jezirelita; fa tsarovy fa fony izaho sy hianao samy nitaingina kalesy nanaraka an’i Ahaba rainy, dia nolazain’i Jehovah fa hihatra aminy izao loza voalaza izao hoe: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa hitako tokoa omaly ny ran’i Nabota sy ny ran’ny zanany, hoy Jehovah, ary Izaho hamaly anao eto amin’ity tany ity, hoy Jehovah. Koa betao izy, ka atsipazo amin’io tany io araka ny tenin’i Jehovah.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hitan’i Ahazia, mpanjakan’ny Joda, izany, dia nandositra tamin’ny làlana mankamin’ny trano ao anatin’ny saha izy. Ary Jeho nanaraka azy ka nanao hoe: Indry, asio koa iny; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dia nasiany
    - type: text
      text: ' teo anatin’ny kalesìny teo amin’ny fiakarana ho any Gora, izay eo anilan’i Jibleama, izy. Ary nandositra nankany Megido Ahazia ka maty teo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanompony nitondra azy tamin’ny kalesiny ho any Jerosalema ka nandevina azy tao am-pasany ao amin’ny razany tao an-Tanànan’i Davida. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tamin’ny taona fahiraika ambin’ny folo nanjakan’i Jorama, zanak’i Ahaba, no vao nanjakan’i Ahazia tamin’ny tany Joda.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary raiso ny tavoara feno diloilo, ka aidino amin’ny lohany, dia lazao hoe: Izao no lazain’i Jehovah: Efa nanosotra anao ho mpanjakan’ny Isiraely Aho. Dia vohay ny varavarana, ka mandosira, fa aza mijanona.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tonga tany Jezirela Jeho; ary nony nandre izany Jezebela, dia nohosorany loko mainty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: antimony.
      marker-yv: yv-n
    - type: text
      text: ' ny masony, sady noravahany ny lohany, dia nitsidika teo am-baravarankely izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niditra teo am-bavahady Jeho, dia hoy Jezebela: Fihavanana va, ry Zimry, mpamono tompo? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niandrandra ny varavarankely Jeho ka nanao hoe: Iza aminareo ireo no momba ahy? Iza? Ary nisy tandapa roa na telo teo nitsirika azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy: Azerao io vehivavy io. Dia nazerany izy; ka nisy nipitipitika tamin’ny rindrin-trano sy ny soavaly ny rany; ka dia nohitsahin’i Jeho izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra tao an-trano Jeho ka nihinana sy nisotro, ary dia nilaza hoe: Mandehana, izahao ilay vehivavy voaozona, ka aleveno, fa zanakavavin’ny mpanjaka izy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia lasa ireo handevina azy; nefa tsy nisy tratrany teo afa-tsy ny karandohany sy ny tongony ary ny fela-tànany ihany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niverina ireo ka nanambara taminy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jeho: Araka ny tenin’i Jehovah izany, dia ilay nampilazainy an’i Elia Tisbita mpanompony hoe: Ao amin’ny tany Jezirela no hihinanan’ny alika ny nofon’i Jezebela, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny fatiny ho toy ny zezika any an-tsaha, any amin’ny tany Jezirela, ka tsy hisy hahazo milaza hoe Jezebela ity.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandeha ilay zatovo, dia ilay zatovon’ny mpaminany,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ilay zatovo mpaminany.
      marker-yv: yv-n
    - type: text
      text: ' nankany Ramota-gileada. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony mby tany izy, indreo, nipetraka teo ny mpifehy ny miaramila; ary hoy izy: Ry komandy ô, mitondra teny ho aminao aho. Ary hoy Jeho: Amin’iza aminay ireto moa? Ary hoy izy: Aminao, ry komandy ô. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsangana izy ka niditra tao an-trano, dia naidiny tamin’ny lohany ny diloilo; ary hoy izy taminy: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Efa nanosotra anao Aho ho mpanjakan’ny Isiraely oloko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hamely ny tamingan’i Ahaba tomponao hianao, mba hampanodiaviko an’i Jezebela ny ran’ny mpaminany mpanompoko sy ny ran’ny mpanompon’i Jehovah rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, ho fongotra ny taranak’i Ahaba rehetra; ary haringako avokoa ny lehilahy rehetra amin’ny tamingany, na ny voahazona na ny afaka eo amin’ny Isiraely; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny taranak’i Ahaba hataoko tahaka ny taranak’i Jeroboama, zanak’i Nebata, sy tahaka ny taranak’i Basa, zanak’i Ahia; '
