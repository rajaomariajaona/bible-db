document_id: 2KI.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanosorana an’i Jeho ho mpanjaka, sy ny namonoan’i Jeho an’i Jorama sy Ahazia ary Jezebela.
  - type: text
    content: 'ARY Elisa mpaminany niantso ny anankiray tamin’ny zanakalahin’ny mpaminany ka nanao taminy hoe: Misikìna, dia ento eny an-tànanao ity tavoara feno diloilo ity, ka mankanesa any Ramota-gileada; '
  '10':
  - type: text
    content: ary Jezebela hohanin’ny alika ao amin’ny tany Jezirela, ka tsy hisy handevina azy. Dia namoha ny varavarana ilay zatovo ka lasa nandositra.
  '11':
  - type: text
    content: 'Ary Jeho nivoaka nankao amin’ny mpanompon’ny tompony ary nanontaniany hoe: Raharaha tsara ihany va? Inona no nalehan’iny ilay adala iny tao aminao? Ary hoy izy taminy: Hianareo mahalala ihany an-dralehilahy sy ny heviny. '
  '12':
  - type: text
    content: 'Fa hoy ireo: Lainga foana izany; fa ambarao aminay. Dia hoy izy: Izao ka izao no nolazainy tamiko: Izao ny lazain’i Jehovah: Efa nanosotra anao ho mpanjakan’ny Isiraely Aho. '
  '13':
  - type: text
    content: 'Dia samy nandray faingana ny lambany avy izy ireo ka namelatra azy hitoeran’i Jeho teo amin’ny ambaratonga, ary nitsoka ny anjomara izy ka niantso hoe: Jeho no mpanjaka. '
  '14':
  - type: text
    content: 'Ary Jeho, zanak’i Josafata, zanak’i Nimsy, nikomy tamin’i Jorama (fa Jorama mbamin’ny Isiraely rehetra niaro an’i Ramota-gileada noho ny fananihan’i Hazaela, mpanjakan’i Syria, azy; '
  '15':
  - type: text
    content: 'nefa Jorama mpanjaka efa niverina hotsaboina tao Jezirela amin’ny feriny tamin’ny nahavoazan’ny Syriana azy, fony izy niady tamin’i Hazaela, mpanjakan’i Syria), ka dia hoy Jeho: Raha izany ary no sitrakareo, aza avela hisy hiala eto an-tanàna handeha hilaza izany any Jezirela. '
  '16':
  - type: text
    content: Dia niakatra teo amin’ny kalesy Jeho ka nankany Jezirela, fa tany no nitoeran’i Jorama. Ary Ahazia, mpanjakan’ny Joda, efa nidina hamangy an’i Jorama.
  '17':
  - type: text
    content: 'Ary ny mpitily mitsangana teo an-tampon’ny tilikambo teo Jezirela ka nahatazana fa indrerỳ olona betsaka tamy niaraka amin’i Jeho, ary hoy izy: Mahita olona betsaka aho. Ary hoy Jorama: Makà mpitaingin-tsoavaly, ka maniraha hitsena azy, ary asaovy manao hoe: Fihavanana va? '
  '18':
  - type: text
    content: 'Dia nandeha ny mpitaingin-tsoavaly anankiray hitsena azy ka nanao taminy hoe: Izao no tenin’ny mpanjaka: Fihavanana va? Ary hoy Jeho: Ahoanao izay fihavanana? fa mankanesa ato aoriako hianao. Ary ny mpitily nilaza hoe: Ny iraka dia tonga teny aminy, nefa tsy niverina. '
  '19':
  - type: text
    content: 'Dia naniraka mpitaingin-tsoavaly fanindroany Jorama, ary nony tonga teny koa izy, dia nanao hoe: Izao no tenin’ny mpanjaka: Fihavanana va? Ary Jeho namaly hoe: Ahoanao izay fihavanana? fa mankanesa ato aoriako hianao. '
  '2':
  - type: text
    content: 'ary rehefa mby any hianao, dia izahao Jeho, zanak’i Josafata, zanak’i Nimsy, ary midira, ka manaingà azy hiala amin’ny namany, ary ento any amin’ny efi-trano anatiny izy; '
  '20':
  - type: text
    content: 'Ary ny mpitily nilaza indray hoe: Tonga teny aminy koa iny, fa tsy niverina; ary ny fampiriotrany dia hoatra ny fampiriotran’i Jeho, zanak’i Nimsy; fa mampiriotra hoatra ny olona adala izy.'
  '21':
  - type: text
    content: 'Ary hoy Jorama: Ampiomany. Dia nampiomaniny ny kalesiny. Dia nivoaka Jorama, mpanjakan’ny Isiraely, sy Ahazia, mpanjakan’ny Joda, samy nitsangana teo amin’ny kalesiny avy ka nandeha hitsena an’i Jeho, ary nifanena taminy teo amin’ny tanin’i Nabota Jezirelita izy.'
  '22':
  - type: text
    content: 'Ary Jorama, nony nahita an’i Jeho, dia nanao hoe: Fihavanana va, ry Jeho? Fa izy namaly hoe: Aiza no hisy fihavanana, raha mbola ao ihany ny fijangajangan’i Jezebela reninao sy ny fankatovana betsaka ataony? '
  '23':
  - type: text
    content: 'Ary Jorama nampihodina ka nandositra sady niteny tamin’i Ahazia hoe: Misy fitaka, ry Ahazia. '
  '24':
  - type: text
    content: Ary nohenjanin’i Jeho mafy ny tsipìka teny an-tànany, dia nitifitra an’i Jorama izy ka nahavoa azy teo anelanelan’ny sorony, ary ny zana-tsipìka niboroaka tamin’ny fony, ka dia nampianjera azy tao anatin’ny kalesiny.
  '25':
  - type: text
    content: 'Ary hoy Jeho tamin’i Bidkara lefiny: Betao izy, ka atsipazo ao amin’ny sahan’i Nabota Jezirelita; fa tsarovy fa fony izaho sy hianao samy nitaingina kalesy nanaraka an’i Ahaba rainy, dia nolazain’i Jehovah fa hihatra aminy izao loza voalaza izao hoe: '
  '26':
  - type: text
    content: Efa hitako tokoa omaly ny ran’i Nabota sy ny ran’ny zanany, hoy Jehovah, ary Izaho hamaly anao eto amin’ity tany ity, hoy Jehovah. Koa betao izy, ka atsipazo amin’io tany io araka ny tenin’i Jehovah.
  '27':
  - type: text
    content: 'Ary nony hitan’i Ahazia, mpanjakan’ny Joda, izany, dia nandositra tamin’ny làlana mankamin’ny trano ao anatin’ny saha izy. Ary Jeho nanaraka azy ka nanao hoe: Indry, asio koa iny; '
  - type: text
    content: dia nasiany
  - type: text
    content: ' teo anatin’ny kalesìny teo amin’ny fiakarana ho any Gora, izay eo anilan’i Jibleama, izy. Ary nandositra nankany Megido Ahazia ka maty teo. '
  '28':
  - type: text
    content: 'Ary ny mpanompony nitondra azy tamin’ny kalesiny ho any Jerosalema ka nandevina azy tao am-pasany ao amin’ny razany tao an-Tanànan’i Davida. '
  '29':
  - type: text
    content: Ary tamin’ny taona fahiraika ambin’ny folo nanjakan’i Jorama, zanak’i Ahaba, no vao nanjakan’i Ahazia tamin’ny tany Joda.
  '3':
  - type: text
    content: 'ary raiso ny tavoara feno diloilo, ka aidino amin’ny lohany, dia lazao hoe: Izao no lazain’i Jehovah: Efa nanosotra anao ho mpanjakan’ny Isiraely Aho. Dia vohay ny varavarana, ka mandosira, fa aza mijanona.'
  '30':
  - type: text
    content: Dia tonga tany Jezirela Jeho; ary nony nandre izany Jezebela, dia nohosorany loko mainty
  - type: note
    content: Heb. antimony.
  - type: text
    content: ' ny masony, sady noravahany ny lohany, dia nitsidika teo am-baravarankely izy. '
  '31':
  - type: text
    content: 'Ary nony niditra teo am-bavahady Jeho, dia hoy Jezebela: Fihavanana va, ry Zimry, mpamono tompo? '
  '32':
  - type: text
    content: 'Ary niandrandra ny varavarankely Jeho ka nanao hoe: Iza aminareo ireo no momba ahy? Iza? Ary nisy tandapa roa na telo teo nitsirika azy. '
  '33':
  - type: text
    content: 'Ary hoy izy: Azerao io vehivavy io. Dia nazerany izy; ka nisy nipitipitika tamin’ny rindrin-trano sy ny soavaly ny rany; ka dia nohitsahin’i Jeho izy. '
  '34':
  - type: text
    content: 'Dia niditra tao an-trano Jeho ka nihinana sy nisotro, ary dia nilaza hoe: Mandehana, izahao ilay vehivavy voaozona, ka aleveno, fa zanakavavin’ny mpanjaka izy. '
  '35':
  - type: text
    content: 'Koa dia lasa ireo handevina azy; nefa tsy nisy tratrany teo afa-tsy ny karandohany sy ny tongony ary ny fela-tànany ihany. '
  '36':
  - type: text
    content: Ary niverina ireo ka nanambara taminy.
  - type: text
    content: 'Ary hoy Jeho: Araka ny tenin’i Jehovah izany, dia ilay nampilazainy an’i Elia Tisbita mpanompony hoe: Ao amin’ny tany Jezirela no hihinanan’ny alika ny nofon’i Jezebela, '
  '37':
  - type: text
    content: ary ny fatiny ho toy ny zezika any an-tsaha, any amin’ny tany Jezirela, ka tsy hisy hahazo milaza hoe Jezebela ity.
  '4':
  - type: text
    content: Ary nandeha ilay zatovo, dia ilay zatovon’ny mpaminany,
  - type: note
    content: 'Na: ilay zatovo mpaminany.'
  - type: text
    content: ' nankany Ramota-gileada. '
  '5':
  - type: text
    content: 'Ary nony mby tany izy, indreo, nipetraka teo ny mpifehy ny miaramila; ary hoy izy: Ry komandy ô, mitondra teny ho aminao aho. Ary hoy Jeho: Amin’iza aminay ireto moa? Ary hoy izy: Aminao, ry komandy ô. '
  '6':
  - type: text
    content: 'Ary nitsangana izy ka niditra tao an-trano, dia naidiny tamin’ny lohany ny diloilo; ary hoy izy taminy: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Efa nanosotra anao Aho ho mpanjakan’ny Isiraely oloko. '
  '7':
  - type: text
    content: 'Ary hamely ny tamingan’i Ahaba tomponao hianao, mba hampanodiaviko an’i Jezebela ny ran’ny mpaminany mpanompoko sy ny ran’ny mpanompon’i Jehovah rehetra. '
  '8':
  - type: text
    content: 'Eny, ho fongotra ny taranak’i Ahaba rehetra; ary haringako avokoa ny lehilahy rehetra amin’ny tamingany, na ny voahazona na ny afaka eo amin’ny Isiraely; '
  '9':
  - type: text
    content: 'ary ny taranak’i Ahaba hataoko tahaka ny taranak’i Jeroboama, zanak’i Nebata, sy tahaka ny taranak’i Basa, zanak’i Ahia; '
