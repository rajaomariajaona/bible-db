document_id: EZK.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny firenena mifanila fonenana amin’ny Isiraely, dia ny Amonita, ny Moabita, ny Edomita ary ny Filistina.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: Ho an’ny zanaky ny atsinanana koa tahaka ny taranak’i Amona ihany,
  - type: text
    content: Eny, hatolotro ho fananan’ireny izy,
  - type: text
    content: Mba tsy hotsarovana ao amin’ny firenena intsony ny taranak’i Amona.
  '11':
  - type: text
    content: Ary hotanterahiko ny fitsarana an’i Moaba;
  - type: text
    content: Ka dia ho fantany fa Izaho no Jehovah.
  '12':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Noho ny namelezan’i Edoma ny taranak’i Joda tamin’ny namaliany azy
  - type: text
    content: Ary ny nanotany indrindra sy ny namaliany azy,
  '13':
  - type: text
    content: 'Dia izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Hahinjitro amin’i Edoma ny tànako,
  - type: text
    content: Ka haringako ny olona sy ny biby ao aminy;
  - type: text
    content: Ary hataoko lao hatrany Temana izy
  - type: text
    content: Sy ho lavon’ny sabatra hatrany Dedana.
  '14':
  - type: text
    content: Ary ny tànan’ny Isiraely oloko no ho entiko mamaly an’i Edoma,
  - type: text
    content: Ka hanao aminy araka ny fahatezerako sy ny fahavinirako ireo;
  - type: text
    content: Ka dia ho fantany ny famaliako, hoy Jehovah Tompo.
  '15':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Noho ny famaliana nataon’ny Filistina,
  - type: text
    content: Eny, noho ny namaliany ratsy tamin’ny nanaovany tsinontsinona azy,
  - type: text
    content: Ka nandringana noho ny fandrafiany hatry ny fony ela,
  '16':
  - type: text
    content: 'Dia izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, hahinjitro amin’ny Filistina ny tànako,
  - type: text
    content: Ka haringako ny Keretita,
  - type: text
    content: Ary horavako izay sisa any amoron-dranomasina;
  '17':
  - type: text
    content: Ary famaizana mirehitra no ho entiko manao famaliana lehibe aminy;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah,
  - type: text
    content: Rehefa hataoko mihatra aminy ny famaliako.
  '2':
  - type: text
    content: 'Ry zanak’olona, manandrifia ny Amonita, ary maminania ny hamelezana azy, '
  '3':
  - type: text
    content: 'ka ataovy aminy hoe:'
  - type: text
    content: 'Mihainoa ny tenin’i Jehovah Tompo:'
  - type: text
    content: Izao no lazain’i Jehovah Tompo;
  - type: text
    content: 'Noho ny nanaovanao hoe: Hia! sakoa izay! raha nolotoina ny fitoerako masina,'
  - type: text
    content: Ary noravana ny tanin’ny Isiraely,
  - type: text
    content: Sady lasan-ko babo ny taranak’i Joda,
  '4':
  - type: text
    content: Dia indro kosa, hatolotro ho fananan’ny zanaky ny atsinanana hianao,
  - type: text
    content: Ka haoriny ao aminao ny tobiny,
  - type: text
    content: Ary hataony ao aminao ny fonenany;
  - type: text
    content: Ireny no hihinana ny vokatrao
  - type: text
    content: Sy hisotro ny ronononao.
  '5':
  - type: text
    content: Ary Raba dia hataoko tany fitoeran’ny rameva,
  - type: text
    content: Ary ny taranak’i Amona ho tany fandrian’ny ondry aman-osy;
  - type: text
    content: Ka dia ho fantatrareo fa Izaho no Jehovah.
  '6':
  - type: text
    content: 'Fa izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Noho ny nitehafanao tànana
  - type: text
    content: Sy ny nitotoanao tamin’ny tongotrao
  - type: text
    content: Ary ny nifalian’ny fonao tamin’ny fanaovana tsinontsinona ny tanin’ny Isiraely,
  '7':
  - type: text
    content: Dia, indro, hahinjitro aminao ny tànako,
  - type: text
    content: Ka hatolotro ho babon’ny jentilisa hianao;
  - type: text
    content: Ary hofongorako tsy ho vanon-ko firenena intsony hianao,
  - type: text
    content: Ka hataoko lany ritra tsy ho amin’ny tany;
  - type: text
    content: Eny, haringako hianao,
  - type: text
    content: Ka dia ho fantatrao fa Izaho no Jehovah.
  '8':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: 'Noho ny nanaovan’i Moaba sy Seïra hoe:'
  - type: text
    content: Indro, ny taranak’i Joda efa tonga tahaka ny firenena rehetra izao,
  '9':
  - type: text
    content: Dia, indro, hotatahako kosa ny tanin’ny Moaba,
  - type: text
    content: Hatrany amin’ny tanànany rehetra,
  - type: text
    content: Izay ravaky ny tany, dia Betijesimota sy Bala-meona ary Kiriataima,
