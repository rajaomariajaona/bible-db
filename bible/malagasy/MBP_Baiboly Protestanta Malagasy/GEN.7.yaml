document_id: GEN.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Noa: Midira ao anatin’ny sambo-fiara hianao mbamin’ny ankohonanao rehetra, satria hianao no hitako fa marina eo anatrehako amin’izao olona miara-belona aminao izao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny biby madio rehetra isan-karazany dia hanalanao ho ao aminao fito avy, lahy sy vavy; ary ny biby tsy madio isan-karazany roa avy, lahy sy vavy; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary ny voro-manidina koa isan-karazany fito avy, lahy sy vavy; mba tsy ho lany taranaka ambonin’ny tany rehetra ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa raha afaka hafitoana, Izaho hampilatsaka ranonorana ambonin’ny tany efa-polo andro sy efa-polo alina; ary ny zavatra velona rehetra izay nataoko dia haringako tsy ho ambonin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Noa nanao araka izay rehetra nandidian’i Jehovah azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary efa enin-jato taona Noa, raha tonga tambonin’ny tany ny safo-drano. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Noa sy ny vadiny aman-janany mbamin’ny vinantoni-vavy niaraka taminy dia niditra tao anatin’ny sambo-fiara mba tsy ho tratry ny safo-drano. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny biby madio sy ny biby izay tsy madio sy ny vorona mbamin’izay rehetra mandady na mikisaka amin’ny tany, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia nisy niditra tsiroa-roa ho ao amin’i Noa tao anatin’ny sambo-fiara, dia lahy sy vavy, araka izay nandidian’Andriamanitra an’i Noa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary rehefa afaka hafitoana, dia tonga tambonin’ny tany ny safo-drano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tamin’ny andro fahafito ambin’ny folo tamin’ny volana faharoa tamin’ny fahenin-jato taona niainan’i Noa, tamin’izany andro izany dia nipoitra ny loharano rehetra amin’ny lalina lehibe, ary nivoha ny varavaran’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nisy ranonorana nivatravatra tamin’ny tany efa-polo andro sy efa-polo alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Androtrizay indrindra dia efa tafiditra tao anatin’ny sambo-fiara Noa, sy Sema sy Hama ary Jafeta, zanakalahin’i Noa, mbamin’ny vadin’i Noa ary ny vinantony telo vavy niaraka taminy; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia izy ireo sy ny bibi-dia rehetra, samy araka ny karazany avy, sy ny biby fiompy rehetra, samy araka ny karazany avy, ary ny biby rehetra izay mandady na mikisaka amin’ny tany, samy araka ny karazany avy, ary ny vorona rehetra, samy araka ny karazany avy, dia ny voronkely sy ny manana elatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niditra tao amin’i Noa tao anatin’ny sambo-fiara ireo, dia tsiroaroa avy tamin’ny nofo rehetra izay manam-pofonaina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary izay niditra tao dia lahy sy vavy, avy tamin’ny nofo rehetra, araka izay nandidian’Andriamanitra an’i Noa; ary narindrin’i Jehovah tao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary naharitra efa-polo andro tambonin’ny tany ny safo-drano, dia tonga betsaka ny rano ka nanainga ny sambo-fiara, dia nitsinkafona ho akafa amin’ny tany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nahery ny rano ka tonga betsaka indrindra tambonin’ny tany, dia nandeha teny ambonin’ny rano ny sambo-fiara. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nahery dia nahery indrindra ny rano teny ambonin’ny tany, ka voasarona ny tendrombohitra avo rehetra izay tambanin’ny lanitra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dimy ambin’ny folo hakiho no nihoaran’ny rano, ka voasarona ny tendrombohitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia maty ny nofo rehetra izay nihetsiketsika tambonin’ny tany, dia ny vorona sy ny biby fiompy sy ny bibi-dia sy ny biby rehetra izay mandady na mikisaka amin’ny tany ary ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izay rehetra nanam-pofonaina teo am-bavorony, avy tamin’izay rehetra teo amin’ny tany maina, dia maty avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary naringana ny zavatra velona rehetra izay tambonin’ny tany, hatramin’ny olona ka hatramin’ny biby fiompy sy ny zava-mandady na mikisaka ary ny voro-manidina; dia naringana tsy ho amin’ny tany ireny; ary Noa sy izay niara-nitoetra taminy tao anatin’ny sambo-fiara ihany no sisa velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary nahery tambonin’ny tany dimam-polo amby zato andro ny rano.
