document_id: PSA.98,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fifaliana amin’Andriamanitra noho ny nanehoany ny famonjeny sy ny fahamarinany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fihirana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MIHIRÀ fihiram-baovao ho an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nanao fahagagana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànany ankavanana sy ny sandriny masina no nahavitany famonjena.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jehovah efa nampahafantatra ny famonjeny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo imason’ny jentilisa no nanehoany ny fahamarinany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Efa nahatsiaro ny famindrampony sy ny fahamarinany tamin’ny taranak’i Isiraely Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nahita ny famonjen’Andriamanitsika ny vazan-tany rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mihobia ho an’i Jehovah, ry tany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Velomy ny hoby, ka mihirà.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mankalazà an’i Jehovah amin’ny lokanga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’ny lokanga sy ny feo fihirana,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Amin’ny trompetra sy ny fitsofana ny anjomara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mihobia eo anatrehan’i Jehovah Mpanjaka.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao rehetra izao sy ny mponina eo aminy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aoka hiteha-tànana ny riaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiara-mihoby aminy koa ny tendrombohitra
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Eo anatrehan’i Jehovah, fa avy hitsara ny tany Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsara izao rehetra izao amin’ny fahamarinana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny firenena amin’ny fahitsiana.
