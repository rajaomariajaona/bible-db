document_id: PSA.129,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hiafaran’ny mpandrafy an’i Ziona.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: MAFY no nampahoriany ahy hatry ny fony aho mbola tanora,–
  - type: text
    content: 'Eny, aoka hataon’ny Isiraely hoe:'
  '2':
  - type: text
    content: Mafy no nampahoriany ahy hatry ny fony aho mbola tanora;
  - type: text
    content: Nefa tsy naharesy ahy izy.
  '3':
  - type: text
    content: Ny mpiasa dia niasa ny lamosiko;
  - type: text
    content: Efa nanalava ny vavasany izy.
  '4':
  - type: text
    content: Marina Jehovah;
  - type: text
    content: Efa nanapaka ny famatorana nataon’ny ratsy fanahy Izy.
  '5':
  - type: text
    content: Aoka ho menatra sy hiamboho
  - type: text
    content: Izay rehetra mandrafy an’i Ziona
  '6':
  - type: text
    content: Ka ho tahaka ny ahitra eo an-tampon-trano,
  - type: text
    content: Izay malazo, na dia tsy misy manongotra azy aza;
  '7':
  - type: text
    content: Tsy misy mpijinja mameno tànana
  - type: text
    content: Na mpamehy amboara mameno tratra amin’izany;
  '8':
  - type: text
    content: 'Ka dia tsy hisy mpandalo hanao hoe:'
  - type: text
    content: Hotahin’i Jehovah anie hianareo;
  - type: text
    content: Eny, ny anaran’i Jehovah no itsofanay rano anareo.
