document_id: ACT.25
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hevitra nataon’ny Jiosy hahafaty an’i Paoly, sy ny nangatahan’i Paoly hotsarain’i Kaisara.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Festosy, nony tonga teo amin’ny zara-fanapahany, dia niala tany Kaisaria hiakatra any Jerosalema, rehefa afaka hateloana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny lohan’ny mpisorona sy ny olona manan-kaja tamin’ny Jiosy nanambara taminy izay niampangany an’i Paoly sady niangavy taminy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nangataka azy hohelohina, mba hampanalainy hankany Jerosalema; fa nikasa hanotrika eny amoron-dàlana izy hamonoany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Festosy namaly fa Paoly dia ambenana any Kaisaria, sady izy koa efa hankany faingana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa izay manam-pahefana eo aminareo, hoy izy, no aoka hiara-midina amiko ka hiampanga an-dralehilahy, raha manan-keloka izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa nitoetra teo aminy tsy mihoatra noho ny havaloana na hafoloana izy, dia nidina nankany Kaisaria; ary nony ampitso dia nipetraka teo amin’ny fitsarana izy, ka nasainy halaina Paoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nony tonga izy, dia nitsangana manodidina azy ny Jiosy izay nidina avy tany Jerosalema, ka zavatra maro sady lehibe, izay tsy azony nohamarinina akory, no niampangany azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa Paoly nandaha-teny hanala tsiny ny tenany hoe: Tsy nanao ratsy aho, na tamin’ny lalàn’ny Jiosy, na tamin’ny tempoly, na tamin’i Kaisara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa Festosy ta-hahazo sitraka tamin’ny Jiosy, dia namaly an’i Paoly ka nanao hoe: Tianao va hiakatra any Jerosalema hotsaraina eo anatrehako any ny amin’izany zavatra izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy Paoly: Eto amin’ny fitsaran’i Kaisara, izay tokony hitsarana ahy, no itsanganako. Tsy nanisy ratsy ny Jiosy akory aho, ary na hianao aza dia mahafantatra izany marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa raha mpanao ratsy aho, na nanao izay tokony hahafaty ahy, dia tsy mandà tsy ho faty aho; fa raha tsy marina kosa izay zavatra iampangan’ireo ahy, dia tsy misy olona mahazo manolotra ahy ho amin’ny sitrapony. Handahatra eo anatrehan’i Kaisara aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa niresaka tamin’ny mpanolo-tsaina Festosy, dia namaly hoe: Efa nifidy ny handahatra any anatrehan’i Kaisara hianao, ka dia ho any amin’i Kaisara ihany hianao.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandaharan’i Paoly teny teo anatrehan’i Agripa sy Berenika.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ARY rehefa afaka andro vitsivitsy, dia tonga tany Kaisaria Agripa mpanjaka sy Berenika hiarahaba an’i Festosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa nitoetra teo andro maro izy, dia nambaran’i Festosy tamin’ny mpanjaka ny amin’i Paoly, ka hoy izy: Misy mpifatotra anankiray ato navelan’i Feliksa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'koa tamin’izaho tany Jerosalema ny mpisorona sy ny loholon’ny Jiosy niampanga azy ka nangataka izay hanamelohana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa namaly azy kosa aho hoe: Tsy fanaon’ny Romana ny manolotra olona, raha tsy mbola mifanatrika ny ampangaina sy ny mpiampanga, ka mahazo mandahatra hanala tsiny ny tenany ny amin’izay niampangan’ireo azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha tonga tatỳ izy, dia tsy mba nijanonjanona aho, fa nony ampitso dia nipetraka teo amin’ny fitsarana, ka nasaiko nalaina ralehilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehefa nitsangana ireo mpiampanga ireo, dia tsy mba niampanga azy araka izay zavatra ratsy nampoiziko izy tsy akory, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fa nanana ady hevitra taminy ny amin’ny fivavahany sy ny amin’Izay Jesosy anankiray efa maty, nefa nolazain’i Paoly ho velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary satria variana ny hevitro ny amin’ny hitsarana izany zavatra izany, dia nanontany aho na tian-dralehilahy ny hankany Jerosalema hotsaraina any ny amin’izany zavatra izany, na tsia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary rehefa nangataka hambenana hotsarain’ny mpanjaka Paoly, dia nasaiko nambenana mandra-pandefako azy ho any amin’i Kaisara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy
  - type: text
    text: ' Agripa tamin’i Festosy: Izaho koa mba ta-handre izay lehilahy izay. Ary hoy izy: Rahampitso ary dia handre azy ihany hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nony ampitso, dia tonga Agripa sy Berenika niseho tamin’ny voninahitry ny fiandrianany ka niditra teo amin’ny trano fihaonana niaraka tamin’ny mpifehy arivo sy ny lehibe tao an-tanàna, dia nentina nankeo Paoly araka ny didin’i Festosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy Festosy: Ry Agripa mpanjaka sy izay rehetra eto amintsika, hitanareo io lehilahy io, izay notarainin’ny Jiosy rehetra tamiko, na tany Jerosalema na teto koa, ka nataony antso avo hoe: Tsy tokony hovelomina intsony ilehio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nefa nony hitako fa tsy nisy zavatra nataony izay tokony hahafaty azy, saingy izy ihany no ta-handahatra amin’ny mpanjaka, dia nanaiky hampanatitra azy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny amin’io lehilahy io tsy hitako izay teny marina hosoratako amin’ny tompoko, koa dia nentiko eto anatrehanareo izy, indrindra fa eto anatrehanao, ry Agripa mpanjaka, mba hadinina izy, ka dia ho hitako izay hosoratako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa ataoko fa tsy mety ny mampanatitra mpifatotra, nefa tsy milaza izay zavatra iampangana azy.
