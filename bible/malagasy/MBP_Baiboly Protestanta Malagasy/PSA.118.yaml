document_id: PSA.118
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiderana an’Andriamanitra noho ny famindrampony, indrindra noho ny namaliany ny vavaka nataon’ny mpanompony sy ny namonjeny azy tamin’ny fahavalony.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIDERÀ an’i Jehovah, fa tsara Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aoka ny Isiraely hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka ny taranak’i Arona hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aoka izay matahotra an’i Jehovah hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrakizay ny famindrampony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tao an-katerena no niantsoako an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia namaly ahy Jehovah ka nampahalalaka ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jehovah no miandany amiko, ka tsy hatahotra aho.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no azon’ny olona atao amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jehovah no miandany amiko, sady mamonjy ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izaho ho faly hahita ny amin’izay mankahala ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsara ny mialoka amin’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny mialoka amin’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsara ny matoky an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny matoky ny mpanapaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny firenena rehetra nanodidina ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny anaran’i Jehovah no handringanako azy tokoa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nitangorona tamiko ireny, eny, nitangorona tamiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny anaran’i Jehovah no handringanako azy tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nanodidina ahy tahaka ny renitantely izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voavono tahaka ny afon-tsilo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny anaran’i Jehovah no handringanako azy tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nanosika ahy mafy hahalavo ahy ianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no namonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jehovah no heriko sy fidèrako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa famonjena ahy Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ao an-dain’ny marina ny feo mihoby noho ny famonjena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànana ankavanan’i Jehovah mampiseho hery;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny tànana ankavanan’i Jehovah dia misandratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànana ankavanan’i Jehovah mampiseho hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy ho faty aho, fa ho velona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hitory ny asan’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nofaizan’i Jehovah mafy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy natolony ho amin’ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vohay ny vavahadin’ny fahamarinana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiditra eo aho ka hidera an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ity no vavahadin’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny marina no hiditra eo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hidera Anao aho, fa efa namaly ahy Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa famonjena ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny vato izay nolavin’ny mpanao trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: No efa tonga fehizoro indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Avy tamin’i Jehovah izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mahagaga eo imasontsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ity no andro nataon’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hifaly sy ho ravoravo amin’izao isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mifona aminao aho, Jehovah ô, vonjeo è!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifona aminao aho, Jehovah ô, ambino è!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hotahina anie izay avy amin’ny anaran’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy ao an-tranon’i Jehovah no itsofanay rano anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Andriamanitra Jehovah ka nampahazava antsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rohizo kofehy ny fanati-piravoravoana na dia hatreo amin’ny tandroky ny alitara aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Andriamanitro Hianao, ka hidera Anao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Andriamanitro, ka hanandratra Anao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Miderà an’i Jehovah, fa tsara Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mandrakizay ny famindrampony.
