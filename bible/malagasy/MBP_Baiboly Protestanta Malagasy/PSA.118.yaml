document_id: PSA.118,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny famindrampony, indrindra noho ny namaliany ny vavaka nataon’ny mpanompony sy ny namonjeny azy tamin’ny fahavalony.
  - type: text
    content: MIDERÀ an’i Jehovah, fa tsara Izy;
  - type: text
    content: Eny, mandrakizay ny famindrampony.
  '10':
  - type: text
    content: Ny firenena rehetra nanodidina ahy;
  - type: text
    content: Fa ny anaran’i Jehovah no handringanako azy tokoa;
  '11':
  - type: text
    content: Nitangorona tamiko ireny, eny, nitangorona tamiko;
  - type: text
    content: Fa ny anaran’i Jehovah no handringanako azy tokoa.
  '12':
  - type: text
    content: Nanodidina ahy tahaka ny renitantely izy;
  - type: text
    content: Voavono tahaka ny afon-tsilo izy;
  - type: text
    content: Fa ny anaran’i Jehovah no handringanako azy tokoa.
  '13':
  - type: text
    content: Nanosika ahy mafy hahalavo ahy ianao;
  - type: text
    content: Fa Jehovah no namonjy ahy.
  '14':
  - type: text
    content: Jehovah no heriko sy fidèrako.
  - type: text
    content: Fa efa famonjena ahy Izy.
  '15':
  - type: text
    content: Ao an-dain’ny marina ny feo mihoby noho ny famonjena;
  - type: text
    content: Ny tànana ankavanan’i Jehovah mampiseho hery;
  '16':
  - type: text
    content: Ny tànana ankavanan’i Jehovah dia misandratra;
  - type: text
    content: Ny tànana ankavanan’i Jehovah mampiseho hery.
  '17':
  - type: text
    content: Tsy ho faty aho, fa ho velona
  - type: text
    content: Ka hitory ny asan’i Jehovah.
  '18':
  - type: text
    content: Nofaizan’i Jehovah mafy aho,
  - type: text
    content: Nefa tsy natolony ho amin’ny fahafatesana.
  '19':
  - type: text
    content: Vohay ny vavahadin’ny fahamarinana aho;
  - type: text
    content: Hiditra eo aho ka hidera an’i Jehovah.
  '2':
  - type: text
    content: 'Aoka ny Isiraely hanao hoe:'
  - type: text
    content: Mandrakizay ny famindrampony.
  '20':
  - type: text
    content: Ity no vavahadin’i Jehovah;
  - type: text
    content: Ny marina no hiditra eo.
  '21':
  - type: text
    content: Hidera Anao aho, fa efa namaly ahy Hianao
  - type: text
    content: Ka efa famonjena ahy.
  '22':
  - type: text
    content: Ny vato izay nolavin’ny mpanao trano
  - type: text
    content: No efa tonga fehizoro indrindra.
  '23':
  - type: text
    content: Avy tamin’i Jehovah izany
  - type: text
    content: Ka mahagaga eo imasontsika.
  '24':
  - type: text
    content: Ity no andro nataon’i Jehovah;
  - type: text
    content: Hifaly sy ho ravoravo amin’izao isika.
  '25':
  - type: text
    content: Mifona aminao aho, Jehovah ô, vonjeo è!
  - type: text
    content: Mifona aminao aho, Jehovah ô, ambino è!
  '26':
  - type: text
    content: Hotahina anie izay avy amin’ny anaran’i Jehovah;
  - type: text
    content: Avy ao an-tranon’i Jehovah no itsofanay rano anareo.
  '27':
  - type: text
    content: Andriamanitra Jehovah ka nampahazava antsika;
  - type: text
    content: Rohizo kofehy ny fanati-piravoravoana na dia hatreo amin’ny tandroky ny alitara aza.
  '28':
  - type: text
    content: Andriamanitro Hianao, ka hidera Anao aho;
  - type: text
    content: Eny, Andriamanitro, ka hanandratra Anao aho.
  '29':
  - type: text
    content: Miderà an’i Jehovah, fa tsara Izy;
  - type: text
    content: Eny, mandrakizay ny famindrampony.
  '3':
  - type: text
    content: 'Aoka ny taranak’i Arona hanao hoe:'
  - type: text
    content: Mandrakizay ny famindrampony.
  '4':
  - type: text
    content: 'Aoka izay matahotra an’i Jehovah hanao hoe:'
  - type: text
    content: Mandrakizay ny famindrampony.
  '5':
  - type: text
    content: Tao an-katerena no niantsoako an’i Jehovah;
  - type: text
    content: Dia namaly ahy Jehovah ka nampahalalaka ahy.
  '6':
  - type: text
    content: Jehovah no miandany amiko, ka tsy hatahotra aho.
  - type: text
    content: Inona no azon’ny olona atao amiko?
  '7':
  - type: text
    content: Jehovah no miandany amiko, sady mamonjy ahy;
  - type: text
    content: Ary izaho ho faly hahita ny amin’izay mankahala ahy.
  '8':
  - type: text
    content: Tsara ny mialoka amin’i Jehovah
  - type: text
    content: Noho ny mialoka amin’ny olona.
  '9':
  - type: text
    content: Tsara ny matoky an’i Jehovah
  - type: text
    content: Noho ny matoky ny mpanapaka.
