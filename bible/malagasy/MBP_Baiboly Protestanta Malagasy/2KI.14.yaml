document_id: 2KI.14,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanjakan’i Amazia tamin’ny Joda.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'TAMIN’ny taona faharoa nanjakan’i Joasy, zanak’i Joahaza, mpanjakan’ny Isiraely, no vao nanjakan’i Amazia, zanak’i Joasy, mpanjakan’ny Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Efa namely an’i Edoma tokoa hianao, ka dia nirehareha ny fonao; aoka hahafa-po anao ary izany voninahitra izany, ka mitoera ao an-tranonao ihany; fa nahoana no hihaika ny loza hahalavo ny tenanao mbamin’ny Joda koa hianao?
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa tsy nanaiky Amazia. Koa dia niakatra Joasy, mpanjakan’ny Isiraely; ary izy sy Amazia, mpanjakan’ny Joda, nihaona tany Beti-semesy izay any Joda. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia resy teo anoloan’ny Isiraely ny Joda, ka samy nandositra ho any amin’ny lainy avy izy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary Amazia, mpanjakan’ny Joda, zanak’i Joasy, zanak’i Ahazia, nosamborin’i Joasy, mpanjakan’ny Isiraely. tany Beti-semesy; ary dia nankany Jerosalema Joasy, ka nandravany efa-jato hakiho ny màndany hatramin’ny vavahadin’i Efraima ka hatramin’ny vavahady an-jorony. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary nalainy avokoa ny volamena sy ny volafotsy rehetra ary ny fanaka rehetra izay hita tao an-tranon’i Jehovah sy tamin’ny rakitry ny tranon’ny mpanjaka mbamin’ny olona natao antoka, ka dia niverina ho any Samaria izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny tantaran’i Joasy sisa mbamin’ny heriny sy ny niadiany tamin’i Amazia, mpanjakan’ny Joda, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Isiraely va izany? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary Joasy lasa nodi-mandry any amin’ny razany, dia nalevina tany Samaria tao amin’ny mpanjakan’ny Isiraely izy; ary Jeroboama zanany no nanjaka nandimby azy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny andro niainan’i Amazia, zanak’i Joasy, mpanjakan’ny Joda, taorian’ny nahafatesan’i Joasy, zanak’i Joahada, mpanjakan’ny Isiraely, dia dimy ambin’ny folo taona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary ny tantaran’i Amazia sisa, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany?
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny olona niodina taminy tany Jerosalema, dia nandositra nankany Lakisy izy; fa ny olona nampanaraka namono azy tany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dimy amby roa-polo taona izy, fony vao nanjaka, ary sivy amby roa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Joadana, avy any Jerosalema.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary nasampiny tamin’ny soavaly ny fatiny, dia nalevina tany Jerosalema tao amin’ny razany tao an-Tanànan’i Davida izy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny vahoaka rehetra tamin’ny Joda naka an’i Azaria, izay vao enina ambin’ny folo taona tamin’izay, ka nampanjaka azy handimby an’i Amazia rainy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Izy no nanamboatra an’i Elota ka nampody azy ho an’ny Joda, rehefa lasa nodi-mandry any amin’ny razany ny mpanjaka.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanjakan’i Jeroboama II. tamin’ny Isiraely sy ny nampodiany ny voninahitry ny fanjakana ho tahaka ny teo.
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: TAMIN’ny taona fahadimy ambin’ny folo nanjakan’i Amazia, zanak’i Joasy, mpanjakan’ny Joda, no vao nanjakan’i Jeroboama, zanak’i Joasy, mpanjakan’ny Isiraely, tany Samaria, ary nanjaka iraika amby efa-polo taona izy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary nanao izay ratsy eo imason’i Jehovah izy, fa tsy niala tamin’ny fahotana rehetra izay nataon’i Jeroboama, zanak’i Nebata, sady nampanotany ny Isiraely.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Izy no nampody ny sisin-tanin’ny Isiraely ka azony hatrany akaikin’i Hamata ka hatramin’ny ranomasin’ny tani-hay,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Arabà.
      marker-yv: yv-n
    - type: text
      text: ' araka ny tenin’i Jehovah, Andriamanitry ny Isiraely, izay nampilazainy ny mpanompony, dia Jona, zanak’i Amitahy, mpaminany tany Gata-hefera. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa efa hitan’i Jehovah fa nangidy indrindra ny fahorian’ny Isiraely; ary tsy nisy sisa, na ny voahazona na ny afaka, sady tsy nisy namonjy ny Isiraely akory. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa tsy mba nolazain’i Jehovah fa hovonoiny tsy ho eo ambanin’ny lanitra ny anaran’ny Isiraely; fa ny tànan’i Jeroboama, zanak’i Joasy, no nentiny namonjy azy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary ny tantaran’i Jeroboama sisa mbamin’izay nataony sy ny hery izay niadiany ary ny nampodiany an’i Damaskosy sy Hamata, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: izay an’
    - type: text
      text: ' ny Joda '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fahiny
    - type: text
      text: ', ho an’ny Isiraely, tsy efa voasoratra ao amin’ny tantaran’ny mpanjakan’ny Isiraely va izany? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary Jeroboama lasa nodi-mandry any amin’ny razany, dia tao amin’ny mpanjakan’ny Isiraely; ary Zakaria zanany no nanjaka nandimby azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nanao izay mahitsy eo imason’i Jehovah izy, nefa tsy dia tahaka an’i Davida rainy; fa tahaka izay rehetra nataon’i Joasy rainy ihany no nataony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Kanefa ny fitoerana avo tsy mba noravana; fa mbola namono zavatra hatao fanatitra sady nandoro ditin-kazo manitra teny amin’ny fitoerana avo ihany ny olona.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nony tafapetraka tsara teo an-tànany ny fanjakany, dia novonoiny ireo mpanompony izay namono ny mpanjaka rainy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa ny zanak’ireo namono kosa dia tsy mba novonoiny, fa nataony araka izay voasoratra ao amin’ny bokin’ny lalàn’i Mosesy, izay nandidian’i Jehovah hoe: Ny ray tsy hatao maty amin’ny ataon’ny zanany, ary ny zanaka tsy hatao maty amin’ny ataon’ny rainy; fa samy hatao maty amin’ny fahotany avy ny olona.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Izy no nahafaty ny Edomita iray alina tao amin’ny Lohasahan-tsira sady nahafaka an’i Sela tamin’ny ady ary nanao azy hoe Joktela, izay mbola anarany mandraka androany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tamin’izany Amazia dia naniraka olona tany amin’i Joasy, zanak’i Joahaza, zanak’i Jeho, mpanjakan’ny Isiraely, nanao hoe: Avia, aoka isika hihaona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa Joasy mpanjakan’ny Isiraely, naniraka tany amin’i Amazia, mpanjakan’ny Joda, nanao hoe: Ny tsilo izay tany Libanona naniraka tamin’ny hazo sedera izay tany Libanona nanao hoe: Omeo ny zanako-lahy ny zanakao-vavy ho vadiny; ary dia namaky teo ny bibi-dia tany Libanona ka nanosihosy ny tsilo. '
