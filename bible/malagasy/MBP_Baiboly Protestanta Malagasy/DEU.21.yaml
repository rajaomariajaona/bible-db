document_id: DEU.21,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fanesoran-keloka, raha misy faty hita, nefa tsy fantatra izay nahafaty azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'RAHA tàhiny misy maty novonoin’olona hita miampatra any an-tsaha amin’ny tany izay omen’i Jehovah Andriamanitrao anao holovana, ary tsy fantatra izay nahafaty azy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'RAHA mivoaka hanafika ny fahavalonao hianao, ary atolotr’i Jehovah Andriamanitrao eo an-tànanao izy ka voababonao, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary misy vehivavy tsara tarehy hitanao eo amin’ny babo ka tianao hovadina, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ento ho ao an-tranonao izy, ka asaovy haratany ny lohany sy alàny ny hohony, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary asaovy esoriny koa ny fitafiany tamin’ny nahababo azy, dia aoka hitoetra ao an-tranonao andro iray volana izy hitomany ny ray aman-dreniny; ary rehefa afaka izany, dia vao mahazo mandry aminy hianao ka ho tompom-bady azy, ary ho vadinao izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha tsy tianao intsony ravehivavy, dia alefaso handeha araka izay sitrapony izy; fa aza mivarotra azy hatao vola aman-karena na manandevo azy, satria efa nampietry azy hianao.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny lovan’ny lahimatoa.
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'RAHA misy lehilahy mamporafy, ka ny anankiray tiany, fa ny anankiray kosa tsy tiany, ary samy miteraka zaza aminy izy roa vavy, na ny tiany na ny tsy tiany, ary zanak’ilay tsy tiany no lahimatoa: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin’ny andro handidiany fananana ho an’ny zanani-lahy dia tsy azo atao lahimatoa ny zanaky ny tiany, raha mbola eo ihany ny zanaky ny tsy tiany, izay tena lahimatoany; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny lahimatoa, zanak’ilay tsy tiany ihany, no hekeny ka homeny anjaran-droa amin’izay rehetra ananany; fa voalohan’ainy izy, ka azy ny fizokiana.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fanao amin’ny zanaka maditra tsy zaka anarina.
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'RAHA misy olona manana zanakalahy maditra sy manohitra ka tsy mety mihaino ny feon’ny rainy, na ny feon’ny reniny, ka tsy zakany anarina, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hosamborin’ny rainy sy ny reniny izy ka ho entiny amin’ny loholona amin’ny tanànany, eo amin’ny vavahadin’ny tanàna onenany, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hivoaka ny loholonao sy ny mpitsaranao ka horefesiny hatreo amin’ny faty ka hatramin’izay tanàna manodidina azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hiteny amin’ny loholona amin’ny tanànany izy mivady hoe: Ity zanakay ity dia maditra sy manohitra ka tsy mihaino ny feonay, fa mpandany sy fileony. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hitora-bato azy ho faty ny mponina rehetra ao an-tanànany; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy; ary ny Isiraely rehetra dia handre izany ka hatahotra.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fandevenana ny fatin’ny meloka izay efa nahantona tamin’ny hazo.
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY raha misy olona manao fahotana izay tokony hahafaty azy ka atao maty ary ahantona amin’ny hazo, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia tsy havela hiloaka alina eo amin’ny hazo ny fatiny, fa tsy maintsy halevinao androtriny ihany izy (fa voaozon’Andriamanitra ny mihantona '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amin’ny hazo
    - type: text
      text: ); koa aza lotoina ny taninao, izay omen’i Jehovah Andriamanitrao anao ho lovanao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loholona amin’ny tanàna izay akaikin’ny faty indrindra dia haka ombivavy kely izay tsy mbola nampiasaina na nasiana zioga hitarihany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay ombivavy kely dia ho entin’ny loholona amin’izany tanàna izany midina any amin’izay lohasaha tsy voasa na voafafy sady misy renirano tsy mety ritra, dia hofolahiny any an-dohasaha ny vozony. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo mpisorona, taranak’i Levy, dia hanatona, fa izy no nofidin’i Jehovah Andriamanitrao hanao fanompoam-pivavahana aminy sy hitso-drano amin’ny anaran’i Jehovah; koa araka ny teniny no hanefana ny ady rehetra sy ny vonoana rehetra; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny loholona rehetra amin’izany tanàna akaikin’ny faty izany dia hanasa ny tànany eo ambonin’ilay ombivavy kely izay efa voafolaka tany an-dohasaha ny vozony; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hiloa-bava ireo ka hanao hoe: Tsy ny tànanay no nandatsaka ity ra ity, sady tsy nahita izany ny masonay. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah ô, mamelà ny heloky ny Isiraely olonao izay navotanao, ka aza atao ho heloky ny Isiraely olonao ny ra marina! Dia ho afa-keloka ny amin’izany ra izany izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka dia hesorinao ho afaka aminao ny ra marina, raha hanao izay mahitsy eo imason’i Jehovah hianao.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny vehivavy babo hovadin’izay nahazo azy.
    marker-yv: yv-h
