document_id: DEU.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fanesoran-keloka, raha misy faty hita, nefa tsy fantatra izay nahafaty azy.
  - type: text
    content: 'RAHA tàhiny misy maty novonoin’olona hita miampatra any an-tsaha amin’ny tany izay omen’i Jehovah Andriamanitrao anao holovana, ary tsy fantatra izay nahafaty azy, '
  '10':
  - type: text
    content: 'RAHA mivoaka hanafika ny fahavalonao hianao, ary atolotr’i Jehovah Andriamanitrao eo an-tànanao izy ka voababonao, '
  '11':
  - type: text
    content: 'ary misy vehivavy tsara tarehy hitanao eo amin’ny babo ka tianao hovadina, '
  '12':
  - type: text
    content: 'dia ento ho ao an-tranonao izy, ka asaovy haratany ny lohany sy alàny ny hohony, '
  '13':
  - type: text
    content: 'ary asaovy esoriny koa ny fitafiany tamin’ny nahababo azy, dia aoka hitoetra ao an-tranonao andro iray volana izy hitomany ny ray aman-dreniny; ary rehefa afaka izany, dia vao mahazo mandry aminy hianao ka ho tompom-bady azy, ary ho vadinao izy. '
  '14':
  - type: text
    content: Fa raha tsy tianao intsony ravehivavy, dia alefaso handeha araka izay sitrapony izy; fa aza mivarotra azy hatao vola aman-karena na manandevo azy, satria efa nampietry azy hianao.
  - type: heading
    content: Ny amin’ny lovan’ny lahimatoa.
  '15':
  - type: text
    content: 'RAHA misy lehilahy mamporafy, ka ny anankiray tiany, fa ny anankiray kosa tsy tiany, ary samy miteraka zaza aminy izy roa vavy, na ny tiany na ny tsy tiany, ary zanak’ilay tsy tiany no lahimatoa: '
  '16':
  - type: text
    content: 'amin’ny andro handidiany fananana ho an’ny zanani-lahy dia tsy azo atao lahimatoa ny zanaky ny tiany, raha mbola eo ihany ny zanaky ny tsy tiany, izay tena lahimatoany; '
  '17':
  - type: text
    content: fa ny lahimatoa, zanak’ilay tsy tiany ihany, no hekeny ka homeny anjaran-droa amin’izay rehetra ananany; fa voalohan’ainy izy, ka azy ny fizokiana.
  - type: heading
    content: Ny fanao amin’ny zanaka maditra tsy zaka anarina.
  '18':
  - type: text
    content: 'RAHA misy olona manana zanakalahy maditra sy manohitra ka tsy mety mihaino ny feon’ny rainy, na ny feon’ny reniny, ka tsy zakany anarina, '
  '19':
  - type: text
    content: 'dia hosamborin’ny rainy sy ny reniny izy ka ho entiny amin’ny loholona amin’ny tanànany, eo amin’ny vavahadin’ny tanàna onenany, '
  '2':
  - type: text
    content: 'dia hivoaka ny loholonao sy ny mpitsaranao ka horefesiny hatreo amin’ny faty ka hatramin’izay tanàna manodidina azy. '
  '20':
  - type: text
    content: 'dia hiteny amin’ny loholona amin’ny tanànany izy mivady hoe: Ity zanakay ity dia maditra sy manohitra ka tsy mihaino ny feonay, fa mpandany sy fileony. '
  '21':
  - type: text
    content: Dia hitora-bato azy ho faty ny mponina rehetra ao an-tanànany; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy; ary ny Isiraely rehetra dia handre izany ka hatahotra.
  - type: heading
    content: Ny amin’ny fandevenana ny fatin’ny meloka izay efa nahantona tamin’ny hazo.
  '22':
  - type: text
    content: 'ARY raha misy olona manao fahotana izay tokony hahafaty azy ka atao maty ary ahantona amin’ny hazo, '
  '23':
  - type: text
    content: 'dia tsy havela hiloaka alina eo amin’ny hazo ny fatiny, fa tsy maintsy halevinao androtriny ihany izy (fa voaozon’Andriamanitra ny mihantona '
  - type: text
    content: amin’ny hazo
  - type: text
    content: ); koa aza lotoina ny taninao, izay omen’i Jehovah Andriamanitrao anao ho lovanao.
  '3':
  - type: text
    content: 'Ary ny loholona amin’ny tanàna izay akaikin’ny faty indrindra dia haka ombivavy kely izay tsy mbola nampiasaina na nasiana zioga hitarihany. '
  '4':
  - type: text
    content: 'Ary ilay ombivavy kely dia ho entin’ny loholona amin’izany tanàna izany midina any amin’izay lohasaha tsy voasa na voafafy sady misy renirano tsy mety ritra, dia hofolahiny any an-dohasaha ny vozony. '
  '5':
  - type: text
    content: 'Ary ireo mpisorona, taranak’i Levy, dia hanatona, fa izy no nofidin’i Jehovah Andriamanitrao hanao fanompoam-pivavahana aminy sy hitso-drano amin’ny anaran’i Jehovah; koa araka ny teniny no hanefana ny ady rehetra sy ny vonoana rehetra; '
  '6':
  - type: text
    content: 'ary ny loholona rehetra amin’izany tanàna akaikin’ny faty izany dia hanasa ny tànany eo ambonin’ilay ombivavy kely izay efa voafolaka tany an-dohasaha ny vozony; '
  '7':
  - type: text
    content: 'dia hiloa-bava ireo ka hanao hoe: Tsy ny tànanay no nandatsaka ity ra ity, sady tsy nahita izany ny masonay. '
  '8':
  - type: text
    content: 'Jehovah ô, mamelà ny heloky ny Isiraely olonao izay navotanao, ka aza atao ho heloky ny Isiraely olonao ny ra marina! Dia ho afa-keloka ny amin’izany ra izany izy. '
  '9':
  - type: text
    content: Ka dia hesorinao ho afaka aminao ny ra marina, raha hanao izay mahitsy eo imason’i Jehovah hianao.
  - type: heading
    content: Ny amin’ny vehivavy babo hovadin’izay nahazo azy.
