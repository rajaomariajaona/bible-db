document_id: PSA.37,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Ny tsi-faharetan’ny fanambinana ny ratsy fanahy, ary ny fahatezan’ny fitahiana azon’ny tsara fanahy.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: AOKA tsy hirehitra ny fahatezeranao noho ny amin’ny mpanao ratsy;
  - type: text
    content: Ary aza mialona ny mpanao meloka;
  '10':
  - type: text
    content: Fa rehefa afaka kelikely, dia tsy hisy ny ratsy fanahy;
  - type: text
    content: Handinika ny fonenany hianao, fa tsy ho hita izy.
  '11':
  - type: text
    content: Fa ny mpandefitra kosa no handova ny tany
  - type: text
    content: Ka hiravoravo amin’ny haben’ny fiadanana.
  '12':
  - type: text
    content: Ny ratsy fanahy manao hevi-dratsy hamelezany ny marina
  - type: text
    content: Ka mihidy vazana aminy.
  '13':
  - type: text
    content: Ny Tompo mihomehy azy,
  - type: text
    content: Satria hitany fa ho tonga ny androny.
  '14':
  - type: text
    content: Ny ratsy fanahy nampitsoaka ny sabany ka nanenjana ny tsipìkany
  - type: text
    content: Mba hampikarapoka ny ory sy ny malahelo
  - type: text
    content: Ary hamono ny mahitsy làlana.
  '15':
  - type: text
    content: Ny sabany hitsatoka amin’ny fony ihany,
  - type: text
    content: Ary ny tsipìkany ho tapatapaka.
  '16':
  - type: text
    content: Tsara lavitra ny kely ananan’ny olo-marina anankiray
  - type: text
    content: Noho ny be ananan’ny ratsy fanahy maro.
  '17':
  - type: text
    content: Fa ny sandrin’ny ratsy fanahy ho tapatapaka;
  - type: text
    content: Fa Jehovah manohana ny marina.
  '18':
  - type: text
    content: Fantatr’i Jehovah ny andron’ny mahitsy;
  - type: text
    content: Ary ny lovany ho mandrakizay.
  '19':
  - type: text
    content: Tsy mba ho menatra amin’ny andro fahoriana ireny;
  - type: text
    content: Ary amin’ny taona mosarena dia ho voky izy.
  '2':
  - type: text
    content: Fa hojinjana faingana tahaka ny ahitra izy
  - type: text
    content: Ka halazo tahaka ny ahi-maitso.
  '20':
  - type: text
    content: Fa ny ratsy fanahy haringana,
  - type: text
    content: Ary ny fahavalon’i Jehovah ho tahaka ny voninahitry ny saha;
  - type: text
    content: Ho levona izy, eny, ho levon-ko setroka izy.
  '21':
  - type: text
    content: Misambotra ny ratsy fanahy, nefa tsy manonitra;
  - type: note
    content: 'Na: tsy mahonitra.'
  - type: text
    content: Fa ny marina kosa mamindra fo ka manome.
  '22':
  - type: text
    content: Fa izay tahìny no handova ny tany;
  - type: text
    content: Ary izay ozoniny kosa no hofongorana.
  '23':
  - type: text
    content: Avy amin’i Jehovah no mahalavorary ny dian’ny olona,
  - type: text
    content: Ka Izy no mankasitraka ny làlany.
  '24':
  - type: text
    content: Na dia lavo aza izy, tsy dia mikarapoka,
  - type: text
    content: Fa Jehovah no mitantana azy.
  '25':
  - type: text
    content: Efa mba tanora ihany aho, ary efa antitra ankehitriny;
  - type: text
    content: Fa tsy mbola hitako izay marina nafoy, na ny zanany mangataka hanina.
  '26':
  - type: text
    content: Miantra mandrakariva ireny ka mampisambotra;
  - type: text
    content: Ary ny taranany hotahina.
  '27':
  - type: text
    content: Halaviro ny ratsy, ka manaova soa,
  - type: text
    content: Dia honina mandrakizay hianao.
  '28':
  - type: text
    content: Fa Jehovah tia rariny sady tsy hahafoy ny olony masina;
  - type: text
    content: Harovana mandrakizay ireo;
  - type: text
    content: Fa ny taranaky ny ratsy fanahy hofongorana.
  '29':
  - type: text
    content: Ny marina handova ny tany
  - type: text
    content: Ka honina eo aminy mandrakizay.
  '3':
  - type: text
    content: Matokia an’i Jehovah hianao, ka manaova soa,
  - type: text
    content: Dia honina amin’ny tany hianao ka ho faly amin’ny fahamarinana.
  '30':
  - type: text
    content: Ny vavan’ny marina miresaka fahendrena,
  - type: text
    content: Ary ny lelany manambara ny rariny.
  '31':
  - type: text
    content: Ny lalàn’Andriamaniny no ao am-pony;
  - type: text
    content: Tsy mba ho solafaka ny diany.
  '32':
  - type: text
    content: Mitsikilo ny marina ny ratsy fanahy
  - type: text
    content: Ka mitady hahafaty azy.
  '33':
  - type: text
    content: Jehovah tsy hahafoy azy ho eo an-tànany.
  - type: text
    content: Na hanameloka azy, raha tsaraina izy.
  '34':
  - type: text
    content: Miandrasa an’i Jehovah, ka tandremo ny làlany,
  - type: text
    content: Dia hanandratra anao handova ny tany Izy;
  - type: text
    content: Ho faly hahita ny hamongorana ny ratsy fanahy hianao.
  '35':
  - type: text
    content: Efa hitako ny ratsy fanahy, fa loza loatra izy
  - type: text
    content: Ary nandrahaka tahaka ny hazo maitso naniry ho azy;
  '36':
  - type: text
    content: Kanjo nandalo izy ka, indro, tsy teo intsony;
  - type: text
    content: Ary nitady azy aho, fa tsy hita izy.
  '37':
  - type: text
    content: Diniho ny mahitsy, ka jereo ny marina;
  - type: text
    content: Fa misy farany
  - type: note
    content: 'Na: taranaka.'
  - type: text
    content: ' ho an’ny olona tia fihavanana.'
  - type: note
    content: 'Na: Fa fiadanana no faran’izany olona izany.'
  '38':
  - type: text
    content: Fa ny mpanota haringana avokoa;
  - type: text
    content: Ny hiafaran’ny ratsy fanahy ho fongotra.
  '39':
  - type: text
    content: Fa ny famonjena ny marina dia avy amin’i Jehovah;
  - type: text
    content: Fiarovana mafy ho azy amin’ny andro fahoriana Izy.
  '4':
  - type: text
    content: Ary miravoravoa amin’i Jehovah hianao,
  - type: text
    content: Dia homeny anao izay irin’ny fonao.
  '40':
  - type: text
    content: Ary Jehovah mamonjy azy sy manafaka azy;
  - type: text
    content: Eny, manafaka azy amin’ny ratsy fanahy Izy ka mamonjy azy,
  - type: text
    content: Satria nialoka taminy izy.
  '5':
  - type: text
    content: Ankino amin’i Jehovah ny làlanao,
  - type: text
    content: Ary matokia Azy, fa hataony tanteraka.
  '6':
  - type: text
    content: Ary hampiseho ny fahamarinanao tahaka ny mazava Izy,
  - type: text
    content: Ary ny rariny ho anao tahaka ny mitataovovonana.
  '7':
  - type: text
    content: Miantombena tsara miandry an’i Jehovah hianao ka manantenà Azy;
  - type: text
    content: Aza tezitra amin’izay ambinina amin’ny làlany,
  - type: text
    content: Dia amin’izay olona manao sain-dratsy.
  '8':
  - type: text
    content: Mitsahara amin’ny fahatezerana, ary mahafoiza ny fahavinirana;
  - type: text
    content: Aoka tsy hirehitra ny fahatezeranao, fa ratsy no hiafaran’izany.
  '9':
  - type: text
    content: Fa ny mpanao ratsy hofongorana;
  - type: text
    content: Ary izay miandry an’i Jehovah no handova ny tany.
