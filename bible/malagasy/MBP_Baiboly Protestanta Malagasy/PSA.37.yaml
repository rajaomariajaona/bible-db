document_id: PSA.37,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Salamo abidy. Ny tsi-faharetan’ny fanambinana ny ratsy fanahy, ary ny fahatezan’ny fitahiana azon’ny tsara fanahy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: AOKA tsy hirehitra ny fahatezeranao noho ny amin’ny mpanao ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mialona ny mpanao meloka;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa rehefa afaka kelikely, dia tsy hisy ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handinika ny fonenany hianao, fa tsy ho hita izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ny mpandefitra kosa no handova ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hiravoravo amin’ny haben’ny fiadanana.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny ratsy fanahy manao hevi-dratsy hamelezany ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mihidy vazana aminy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny Tompo mihomehy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria hitany fa ho tonga ny androny.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny ratsy fanahy nampitsoaka ny sabany ka nanenjana ny tsipìkany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampikarapoka ny ory sy ny malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamono ny mahitsy làlana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny sabany hitsatoka amin’ny fony ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tsipìkany ho tapatapaka.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsara lavitra ny kely ananan’ny olo-marina anankiray
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny be ananan’ny ratsy fanahy maro.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny sandrin’ny ratsy fanahy ho tapatapaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah manohana ny marina.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fantatr’i Jehovah ny andron’ny mahitsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lovany ho mandrakizay.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy mba ho menatra amin’ny andro fahoriana ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny taona mosarena dia ho voky izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa hojinjana faingana tahaka ny ahitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka halazo tahaka ny ahi-maitso.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa ny ratsy fanahy haringana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahavalon’i Jehovah ho tahaka ny voninahitry ny saha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho levona izy, eny, ho levon-ko setroka izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Misambotra ny ratsy fanahy, nefa tsy manonitra;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy mahonitra.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny marina kosa mamindra fo ka manome.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa izay tahìny no handova ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay ozoniny kosa no hofongorana.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Avy amin’i Jehovah no mahalavorary ny dian’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka Izy no mankasitraka ny làlany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Na dia lavo aza izy, tsy dia mikarapoka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no mitantana azy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Efa mba tanora ihany aho, ary efa antitra ankehitriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mbola hitako izay marina nafoy, na ny zanany mangataka hanina.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Miantra mandrakariva ireny ka mampisambotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranany hotahina.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Halaviro ny ratsy, ka manaova soa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia honina mandrakizay hianao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa Jehovah tia rariny sady tsy hahafoy ny olony masina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harovana mandrakizay ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny taranaky ny ratsy fanahy hofongorana.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny marina handova ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka honina eo aminy mandrakizay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Matokia an’i Jehovah hianao, ka manaova soa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia honina amin’ny tany hianao ka ho faly amin’ny fahamarinana.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ny vavan’ny marina miresaka fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lelany manambara ny rariny.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ny lalàn’Andriamaniny no ao am-pony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba ho solafaka ny diany.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Mitsikilo ny marina ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mitady hahafaty azy.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Jehovah tsy hahafoy azy ho eo an-tànany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hanameloka azy, raha tsaraina izy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Miandrasa an’i Jehovah, ka tandremo ny làlany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanandratra anao handova ny tany Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho faly hahita ny hamongorana ny ratsy fanahy hianao.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Efa hitako ny ratsy fanahy, fa loza loatra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nandrahaka tahaka ny hazo maitso naniry ho azy;
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Kanjo nandalo izy ka, indro, tsy teo intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nitady azy aho, fa tsy hita izy.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Diniho ny mahitsy, ka jereo ny marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy farany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: taranaka.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny olona tia fihavanana.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.37 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa fiadanana no faran’izany olona izany.
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Fa ny mpanota haringana avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hiafaran’ny ratsy fanahy ho fongotra.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Fa ny famonjena ny marina dia avy amin’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fiarovana mafy ho azy amin’ny andro fahoriana Izy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary miravoravoa amin’i Jehovah hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia homeny anao izay irin’ny fonao.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary Jehovah mamonjy azy sy manafaka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manafaka azy amin’ny ratsy fanahy Izy ka mamonjy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nialoka taminy izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ankino amin’i Jehovah ny làlanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary matokia Azy, fa hataony tanteraka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary hampiseho ny fahamarinanao tahaka ny mazava Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny rariny ho anao tahaka ny mitataovovonana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Miantombena tsara miandry an’i Jehovah hianao ka manantenà Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza tezitra amin’izay ambinina amin’ny làlany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’izay olona manao sain-dratsy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mitsahara amin’ny fahatezerana, ary mahafoiza ny fahavinirana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hirehitra ny fahatezeranao, fa ratsy no hiafaran’izany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa ny mpanao ratsy hofongorana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay miandry an’i Jehovah no handova ny tany.
