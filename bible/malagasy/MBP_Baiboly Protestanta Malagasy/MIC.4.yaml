document_id: MIC.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampodian’i Jehovah ny voninahitr’i Ziona, rehefa avy nampahorina izy.
  - type: text
    content: 'ARY izao no ho tonga any am-parany:'
  - type: text
    content: Ny tendrombohitra misy ny tranon’i Jehovah dia haorina eo an-tampon’ny tendrombohitra
  - type: text
    content: Ary hasandratra ho avo noho ny havoana;
  - type: text
    content: Ary ny firenena hitanjozotra hankany.
  '10':
  - type: text
    content: Ry Ziona zanakavavy, mararia, ka manezaha,
  - type: text
    content: Toy ny vehivavy raha miteraka!
  - type: text
    content: Fa ankehitriny dia hivoaka avy any an-tanàna hianao
  - type: text
    content: Ka hipetraka any an-tsaha,
  - type: text
    content: Ary dia ho tonga hatrany Babylona aza;
  - type: text
    content: Any no hamonjena anao,
  - type: text
    content: Eny, any no hanavotan’i Jehovah anao ho afaka amin’ny tànan’ny fahavalonao.
  '11':
  - type: text
    content: Ary ankehitriny dia tafangona hamely anao ny firenena maro,
  - type: text
    content: 'Izay manao hoe: Aoka halam-baraka'
  - type: note
    content: Heb. holotoina.
  - type: text
    content: ' Ziona,'
  - type: text
    content: Ary aoka ny masontsika ho faly mijery azy.
  '12':
  - type: text
    content: Kanjo tsy fantatr’ireny ny hevitr’i Jehovah,
  - type: text
    content: Na azony ny fisainany;
  - type: text
    content: Fa efa nanangona azy toy ny amboara ho ao am-pamoloana Izy.
  '13':
  - type: text
    content: Mitsangàna, ka miveleza, ry Ziona zanakavavy,
  - type: text
    content: Fa ny tandrokao hataoko vy,
  - type: text
    content: Ary ny kitronao hataoko varahina,
  - type: text
    content: Ka hanorotoro firenena maro hianao;
  - type: text
    content: Dia hatolotrao
  - type: note
    content: Heb. hataoko herema.
  - type: text
    content: ' ho an’i Jehovah ny hareny,'
  - type: text
    content: Ary ho an’ny Tompon’ny tany rehetra ny fananany.
  '14':
  - type: text
    content: Koa mivory ho andiany hianao, ry zanakavavin’ny andiany!
  - type: text
    content: Manao fahirano antsika izy,
  - type: text
    content: Mamely tsorakazo ny takolaky ny mpitsaran’ny Isiraely izy.
  '2':
  - type: text
    content: 'Eny, maro ny jentilisa no hiainga ka hanao hoe:'
  - type: text
    content: Andeha isika hiakatra any an-tendrombohitr’i Jehovah,
  - type: text
    content: Ho any an-tranon’Andriamanitr’i Jakoba,
  - type: text
    content: Mba hampianarany antsika ny amin’ny làlany,
  - type: text
    content: Ka handehanantsika amin’ny atorony;
  - type: text
    content: Fa avy any Ziona no hivoahan’ny lalàna,
  - type: text
    content: Ary avy any Jerosalema ny tenin’i Jehovah.
  '3':
  - type: text
    content: Ary hitsara ny adin’ny firenena maro Izy
  - type: text
    content: Ka hampiaiky ny firenena mahery hatrany amin’ny lavitra;
  - type: text
    content: Dia hanefy ny sabany ho fangady ireny
  - type: text
    content: Ary ny lefony ho fanetezam-boaloboka;
  - type: text
    content: Ny firenena tsy hanainga sabatra hifamely;
  - type: text
    content: Na hianatra ady intsony.
  '4':
  - type: text
    content: Fa samy hipetraka eny ambanin’ny voalobony sy ny aviaviny izy,
  - type: text
    content: Ary tsy hisy hanaitaitra azy;
  - type: text
    content: Fa ny vavan’i Jehovah, Tompon’ny maro, no efa niteny.
  '5':
  - type: text
    content: Fa ny firenena rehetra samy mandeha amin’ny anaran’ny andriamaniny avy;
  - type: text
    content: Fa isika kosa handeha amin’ny anaran’i Jehovah Andriamanitsika mandrakizay doria.
  '6':
  - type: text
    content: Amin’izany andro izany, hoy Jehovah,
  - type: text
    content: No hanangonako ny mandringa
  - type: text
    content: Sy hamoriako izay noroahina
  - type: text
    content: Mbamin’izay nampahoriko;
  '7':
  - type: text
    content: Ary ny mandringa no hapetrako ho sisa,
  - type: text
    content: Ary izay noroahina lavitra ho firenena mahery;
  - type: text
    content: Ary Jehovah hanjaka aminy ao an-tendrombohitra Ziona
  - type: text
    content: Hatramin’izany ka ho mandrakizay.
  '8':
  - type: text
    content: Ary hianao, ry tilikambon’ny andiany.
  - type: note
    content: 'Na: tilikambon’i Edera.'
  - type: text
    content: Tendrombohitr’i Ziona
  - type: note
    content: 'Na: Ofelan’i Ziona.'
  - type: text
    content: ' zanakavavy,'
  - type: text
    content: Aminao no ho tonga izany, eny, ho tonga ny fanapahana voalohany,
  - type: text
    content: Dia ny fanjakan’
  - type: note
    content: 'Na: hanjakana aminy.'
  - type: text
    content: ' i Jerosalema zanakavavy.'
  '9':
  - type: text
    content: Koa nahoana no mitaraina mafy hianao?
  - type: text
    content: Moa tsy misy mpanjaka va ao aminao,
  - type: text
    content: Sa lany ringana avokoa ny mpanolo-tsainao,
  - type: text
    content: No dia azon’ny fanaintainana hianao, toy ny vehivavy raha miteraka?
