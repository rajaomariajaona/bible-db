document_id: MIC.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hampodian’i Jehovah ny voninahitr’i Ziona, rehefa avy nampahorina izy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ARY izao no ho tonga any am-parany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra misy ny tranon’i Jehovah dia haorina eo an-tampon’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hasandratra ho avo noho ny havoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny firenena hitanjozotra hankany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Ziona zanakavavy, mararia, ka manezaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny vehivavy raha miteraka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ankehitriny dia hivoaka avy any an-tanàna hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hipetraka any an-tsaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia ho tonga hatrany Babylona aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no hamonjena anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, any no hanavotan’i Jehovah anao ho afaka amin’ny tànan’ny fahavalonao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ankehitriny dia tafangona hamely anao ny firenena maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay manao hoe: Aoka halam-baraka'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: holotoina.
      marker-yv: yv-n
    - type: text
      text: ' Ziona,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny masontsika ho faly mijery azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo tsy fantatr’ireny ny hevitr’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na azony ny fisainany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nanangona azy toy ny amboara ho ao am-pamoloana Izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ka miveleza, ry Ziona zanakavavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tandrokao hataoko vy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny kitronao hataoko varahina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanorotoro firenena maro hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hatolotrao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hataoko herema.
      marker-yv: yv-n
    - type: text
      text: ' ho an’i Jehovah ny hareny,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho an’ny Tompon’ny tany rehetra ny fananany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mivory ho andiany hianao, ry zanakavavin’ny andiany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao fahirano antsika izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamely tsorakazo ny takolaky ny mpitsaran’ny Isiraely izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, maro ny jentilisa no hiainga ka hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha isika hiakatra any an-tendrombohitr’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any an-tranon’Andriamanitr’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampianarany antsika ny amin’ny làlany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handehanantsika amin’ny atorony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy any Ziona no hivoahan’ny lalàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avy any Jerosalema ny tenin’i Jehovah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hitsara ny adin’ny firenena maro Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampiaiky ny firenena mahery hatrany amin’ny lavitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanefy ny sabany ho fangady ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lefony ho fanetezam-boaloboka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenena tsy hanainga sabatra hifamely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hianatra ady intsony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa samy hipetraka eny ambanin’ny voalobony sy ny aviaviny izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy hanaitaitra azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny vavan’i Jehovah, Tompon’ny maro, no efa niteny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny firenena rehetra samy mandeha amin’ny anaran’ny andriamaniny avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa isika kosa handeha amin’ny anaran’i Jehovah Andriamanitsika mandrakizay doria.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hanangonako ny mandringa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hamoriako izay noroahina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’izay nampahoriko;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mandringa no hapetrako ho sisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay noroahina lavitra ho firenena mahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jehovah hanjaka aminy ao an-tendrombohitra Ziona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’izany ka ho mandrakizay.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao, ry tilikambon’ny andiany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tilikambon’i Edera.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tendrombohitr’i Ziona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ofelan’i Ziona.
      marker-yv: yv-n
    - type: text
      text: ' zanakavavy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aminao no ho tonga izany, eny, ho tonga ny fanapahana voalohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fanjakan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanjakana aminy.
      marker-yv: yv-n
    - type: text
      text: ' i Jerosalema zanakavavy.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa nahoana no mitaraina mafy hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy misy mpanjaka va ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa lany ringana avokoa ny mpanolo-tsainao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No dia azon’ny fanaintainana hianao, toy ny vehivavy raha miteraka?
