segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hovaliana Samaria noho ny helony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa niodina tamin’Andriamaniny izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho lavon-tsabatra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanany madinika hotorotoroina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay bevohoka eo aminy hotatahana.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hamindran’i Jehovah fo amin’ny Isiraely, rehefa mibebaka.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: RY Isiraely ô, miverena amin’i Jehovah Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lavon-keloka hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mitondrà teny hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, miverena amin’i Jehovah, ka manaova aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamelà ny heloka rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raiso izay tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia haterinay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: haloanay.
    marker-yv: yv-n
  - type: text
    text: ' ho fanatitra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vantotr’ombilahy.
    marker-yv: yv-n
  - type: text
    text: ' ny molotray.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Asyria tsy hamonjy anay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hitaingin-tsoavaly izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sady tsy hiteny amin’ny asan’ny tanànay intsony hoe: Ry Andriamanitray ô;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ao aminao no ahitan’ny kamboty famindrampo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hositraniko ny fiodinany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tia azy tsy vozonana Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa niala taminy ny fahatezerako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ho tahaka ny ando Aho amin’ny Isiraely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamony tahaka ny lilia izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamaka tahaka an’i Libanona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hisandrahaka ny rantsany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tahaka ny an’ny hazo oliva ny hatsaran-tarehiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tahaka ny an’i Libanona ny hanitra avy aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mipetraka ao ambanin’ny alokalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hampahavokatra vary indray,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho velombelominao indray toy ny vary izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary haniry tahaka ny voaloboka izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny lazany ho tahaka ny an’ny divay avy any Libanona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ry Efraima ô, hataoko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Efraima hanao hoe: Hataoko.'
    marker-yv: yv-n
  - type: text
    text: ' inona intsony izay sampy?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho dia efa nihaino ka nitsinjo anao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny hazo kypreso maitso Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy amiko no hahazoana ny vokatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza no hendry mba hahafantatra izany zavatra izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na manan-tsaina mba hahalala izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mahitsy ny làlan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny marina no mizotra eny aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny mpanota kosa dia tafintohina eny aminy.
