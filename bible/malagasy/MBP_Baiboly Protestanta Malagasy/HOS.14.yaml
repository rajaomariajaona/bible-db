document_id: HOS.14,873
type_code: plt
verses:
  '1':
  - type: text
    content: Hovaliana Samaria noho ny helony,
  - type: text
    content: Fa niodina tamin’Andriamaniny izy;
  - type: text
    content: Ho lavon-tsabatra izy,
  - type: text
    content: Ny zanany madinika hotorotoroina,
  - type: text
    content: Ary izay bevohoka eo aminy hotatahana.
  - type: heading
    content: Ny hamindran’i Jehovah fo amin’ny Isiraely, rehefa mibebaka.
  '10':
  - type: text
    content: Iza no hendry mba hahafantatra izany zavatra izany?
  - type: text
    content: Na manan-tsaina mba hahalala izany?
  - type: text
    content: Fa mahitsy ny làlan’i Jehovah,
  - type: text
    content: Ary ny marina no mizotra eny aminy;
  - type: text
    content: Fa ny mpanota kosa dia tafintohina eny aminy.
  '2':
  - type: text
    content: RY Isiraely ô, miverena amin’i Jehovah Andriamanitrao,
  - type: text
    content: Fa lavon-keloka hianao.
  '3':
  - type: text
    content: Mitondrà teny hianareo,
  - type: text
    content: 'Eny, miverena amin’i Jehovah, ka manaova aminy hoe:'
  - type: text
    content: Mamelà ny heloka rehetra,
  - type: text
    content: Ary raiso izay tsara,
  - type: text
    content: Ka dia haterinay
  - type: note
    content: Heb. haloanay.
  - type: text
    content: ' ho fanatitra'
  - type: note
    content: Heb. vantotr’ombilahy.
  - type: text
    content: ' ny molotray.'
  '4':
  - type: text
    content: Asyria tsy hamonjy anay,
  - type: text
    content: Tsy hitaingin-tsoavaly izahay
  - type: text
    content: 'Sady tsy hiteny amin’ny asan’ny tanànay intsony hoe: Ry Andriamanitray ô;'
  - type: text
    content: Fa ao aminao no ahitan’ny kamboty famindrampo.
  '5':
  - type: text
    content: Hositraniko ny fiodinany,
  - type: text
    content: Ho tia azy tsy vozonana Aho;
  - type: text
    content: Fa efa niala taminy ny fahatezerako.
  '6':
  - type: text
    content: Ho tahaka ny ando Aho amin’ny Isiraely;
  - type: text
    content: Hamony tahaka ny lilia izy
  - type: text
    content: Ary hamaka tahaka an’i Libanona.
  '7':
  - type: text
    content: Hisandrahaka ny rantsany,
  - type: text
    content: Ho tahaka ny an’ny hazo oliva ny hatsaran-tarehiny,
  - type: text
    content: Ary ho tahaka ny an’i Libanona ny hanitra avy aminy.
  '8':
  - type: text
    content: Izay mipetraka ao ambanin’ny alokalony
  - type: text
    content: Dia hampahavokatra vary indray,
  - type: note
    content: 'Na: ho velombelominao indray toy ny vary izy.'
  - type: text
    content: Ary haniry tahaka ny voaloboka izy;
  - type: text
    content: Ny lazany ho tahaka ny an’ny divay avy any Libanona.
  '9':
  - type: text
    content: Ry Efraima ô, hataoko
  - type: note
    content: 'Na: Efraima hanao hoe: Hataoko.'
  - type: text
    content: ' inona intsony izay sampy?'
  - type: text
    content: Izaho dia efa nihaino ka nitsinjo anao;
  - type: note
    content: Heb. azy.
  - type: text
    content: Tahaka ny hazo kypreso maitso Aho,
  - type: text
    content: Avy amiko no hahazoana ny vokatrao.
