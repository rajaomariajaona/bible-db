document_id: AMO.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hamaliana ny Isiraely noho ny fahotany.
  - type: text
    content: 'HENOY izao teny izao, izay lazain’i Jehovah ny aminareo, ry Zanak’Isiraely, dia ny amin’io taranaka rehetra nentiko niakatra avy tany amin’ny tany Egypta io:'
  '10':
  - type: text
    content: Fa tsy mahalala hanao ny marina izy ireo, hoy Jehovah,
  - type: text
    content: Dia ireo izay mitahiry fandozana sy roba ao an-tranobeny.
  '11':
  - type: text
    content: 'Koa izao no lazain’i Jehovah Tompo:'
  - type: text
    content: He, misy fahavalo manodidina ny tany!
  - type: text
    content: Hazerany ho afaka aminao ny herinao,
  - type: text
    content: Ary hobaboina ny tranobenao.
  '12':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Toy ny famonjin’ny mpiandry ondry ny tongotr’ondry roa na ny sombin-tsofina eny am-bavan’ny liona,
  - type: text
    content: Dia toy izany no ho famonjy ny Zanak’Isiraely, izay mipetraka ao Samaria,
  - type: text
    content: Eo an-jorom-parafara sy eo amin’ny lamba fandriandriana avy any Damaskosy.
  '13':
  - type: text
    content: Henoinareo, ka ambarao hamelezana ny taranak’i Jakoba,
  - type: text
    content: 'Hoy ny Tompo, Jehovah, Andriamanitry ny maro:'
  '14':
  - type: text
    content: Amin’ny andro hamaliako ny Isiraely noho ny fahotana ao aminy
  - type: text
    content: No hamaliako ny alitara ao Betela
  - type: text
    content: Dia hokapaina ny tandroky ny alitara ka hianjera amin’ny tany.
  '15':
  - type: text
    content: Hamely ny trano ririnina sy ny trano fahavaratra Aho;
  - type: text
    content: Ary ho rava ny trano ivory,
  - type: text
    content: Sady ho fongana ny trano maro, hoy Jehovah.
  '2':
  - type: text
    content: Hianareo ihany no fantatro tamin’ny firenena rehetra ambonin’ny tany,
  - type: text
    content: Koa noho izany dia hovaliako hianareo noho ny helokareo rehetra.
  '3':
  - type: text
    content: Ho tafara-dàlana va ny roa, raha tsy efa nifanaiky?
  '4':
  - type: text
    content: Mierona any an-ala va ny liona, raha tsy mahita toha?
  - type: text
    content: Manerona ao an-davany va ny liona tanora, raha tsy mahazo zavatra?
  '5':
  - type: text
    content: Voan’ny fandrika etỳ an-tany va ny vorona, raha tsy nisy tadivavarana?
  - type: text
    content: Mikatona va ny fandrika, raha tsy mahavoa zavatra?
  '6':
  - type: text
    content: Tsofina ao an-tanàna ny anjomara, ka tsy hatahotra ny vahoaka?
  - type: text
    content: Misy loza ao an-tanàna va, raha tsy Jehovah no nahatonga izany?
  '7':
  - type: text
    content: Tsy manao na inona na inona tokoa Jehovah Tompo,
  - type: text
    content: Raha tsy milaza ny heviny amin’ny mpaminany mpanompony.
  '8':
  - type: text
    content: Ny liona no mierona, ka iza no tsy hatahotra?
  - type: text
    content: Jehovah Tompo no miteny, ka iza no tsy haminany?
  '9':
  - type: text
    content: Ambarao ao an-tranoben’i Asdoda
  - type: text
    content: Sy ao an-tranobe any amin’ny tany Egypta,
  - type: text
    content: 'Ka ataovy hoe: Miangòna any an-tendrombohitr’i Samaria hianareo,'
  - type: text
    content: Ary jereo ny tabataba be ao aminy
  - type: text
    content: Sy ny fampahoriana
  - type: note
    content: 'Na: ny ampahorina.'
  - type: text
    content: ' ao anatiny.'
