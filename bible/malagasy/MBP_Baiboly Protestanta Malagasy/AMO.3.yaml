document_id: AMO.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hamaliana ny Isiraely noho ny fahotany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'HENOY izao teny izao, izay lazain’i Jehovah ny aminareo, ry Zanak’Isiraely, dia ny amin’io taranaka rehetra nentiko niakatra avy tany amin’ny tany Egypta io:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hianareo ihany no fantatro tamin’ny firenena rehetra ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa noho izany dia hovaliako hianareo noho ny helokareo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho tafara-dàlana va ny roa, raha tsy efa nifanaiky?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mierona any an-ala va ny liona, raha tsy mahita toha?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manerona ao an-davany va ny liona tanora, raha tsy mahazo zavatra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voan’ny fandrika etỳ an-tany va ny vorona, raha tsy nisy tadivavarana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mikatona va ny fandrika, raha tsy mahavoa zavatra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsofina ao an-tanàna ny anjomara, ka tsy hatahotra ny vahoaka?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy loza ao an-tanàna va, raha tsy Jehovah no nahatonga izany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy manao na inona na inona tokoa Jehovah Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy milaza ny heviny amin’ny mpaminany mpanompony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny liona no mierona, ka iza no tsy hatahotra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah Tompo no miteny, ka iza no tsy haminany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ambarao ao an-tranoben’i Asdoda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ao an-tranobe any amin’ny tany Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka ataovy hoe: Miangòna any an-tendrombohitr’i Samaria hianareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary jereo ny tabataba be ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fampahoriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny ampahorina.
    marker-yv: yv-n
  - type: text
    text: ' ao anatiny.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa tsy mahalala hanao ny marina izy ireo, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo izay mitahiry fandozana sy roba ao an-tranobeny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He, misy fahavalo manodidina ny tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hazerany ho afaka aminao ny herinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hobaboina ny tranobenao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny famonjin’ny mpiandry ondry ny tongotr’ondry roa na ny sombin-tsofina eny am-bavan’ny liona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany no ho famonjy ny Zanak’Isiraely, izay mipetraka ao Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo an-jorom-parafara sy eo amin’ny lamba fandriandriana avy any Damaskosy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Henoinareo, ka ambarao hamelezana ny taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy ny Tompo, Jehovah, Andriamanitry ny maro:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Amin’ny andro hamaliako ny Isiraely noho ny fahotana ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hamaliako ny alitara ao Betela
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hokapaina ny tandroky ny alitara ka hianjera amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hamely ny trano ririnina sy ny trano fahavaratra Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho rava ny trano ivory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ho fongana ny trano maro, hoy Jehovah.
