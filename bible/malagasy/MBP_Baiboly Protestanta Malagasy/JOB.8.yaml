document_id: JOB.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny voalohany nataon’i Bildada.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA namaly Bildada Sohita ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ireny va no hampianatra anao ka hilaza aminao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamoaka teny avy ao am-pony?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haniry va ny zozoro, raha tsy eny amin’ny fotaka?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitrebona va ny harefo, raha tsy misy rano?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola maitso izy sady tsy voajinja,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa malazo alohan’ny zava-maitso rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izany no làlan’izay rehetra manadino an’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho very ny fanantenan’ny mpihatsaravelatsihy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ratsy fanahy.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho maito ny fanantenany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho tranon-kala ny tokiny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miankina amin’ny tranony izy, kanjo tsy maharitra iny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihazona azy mafy izy, kanjo tsy mahazaka azy iny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsimoka tsara tandrifin’ny masoandro izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny rantsany misandrahaka eo amin’ny tanimboliny;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifelipelika mifaniditra eo amin’ny korontam-bato ny fàkany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahazo any anelanelany;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo nony fongorany hiala amin’ny fitoerany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia handa azy izany ka hanao hoe: Tsy mbola nahita anao akory aho.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, izany ihany no fifalian’ny làlan-kalehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy hafa indray mitrebona avy amin’ny vovoka.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no hiteny toy izany hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho rivotra mahery ny teny aloaky ny vavanao?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Andriamanitra tsy hanary ny olona tsy manan-tsiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hitantana ny mpanao ratsy;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola hofenoiny hehy ny vavanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hoby ny molotrao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mankahala anao hitafy henatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy intsony ny lain’ny ratsy fanahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra va hamadika ny fitsarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny Tsitoha hamadika ny rariny?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nanota taminy ny zanakao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia efa nampanodiaviny azy ny fahadisoany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha hianao kosa mandroso mitady an’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mifona amin’ny Tsitoha.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha madio sy mahitsy hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hifoha hamonjy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hiambina.
      marker-yv: yv-n
    - type: text
      text: ' anao tokoa Izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampiadana indray ny fonenan’ny fahamarinanao,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka na dia kely aza no niandohanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho lehibe indrindra no hiafaranao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa masìna hianao, anontanio ange ny ntaolo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka fantaro ny hevitra hitan’ny razany
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa vao omaly isika ka tsy mba mahalala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aloka ihany ny androntsika etỳ ambonin’ny tany);
