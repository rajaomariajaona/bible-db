document_id: JOB.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny voalohany nataon’i Bildada.
  - type: text
    content: 'DIA namaly Bildada Sohita ka nanao hoe:'
  '10':
  - type: text
    content: Tsy ireny va no hampianatra anao ka hilaza aminao
  - type: text
    content: Ary hamoaka teny avy ao am-pony?
  '11':
  - type: text
    content: Haniry va ny zozoro, raha tsy eny amin’ny fotaka?
  - type: text
    content: Hitrebona va ny harefo, raha tsy misy rano?
  '12':
  - type: text
    content: Mbola maitso izy sady tsy voajinja,
  - type: text
    content: Kanefa malazo alohan’ny zava-maitso rehetra.
  '13':
  - type: text
    content: Toy izany no làlan’izay rehetra manadino an’Andriamanitra;
  - type: text
    content: Ary ho very ny fanantenan’ny mpihatsaravelatsihy,
  - type: note
    content: 'Na: ratsy fanahy.'
  '14':
  - type: text
    content: Fa ho maito ny fanantenany,
  - type: text
    content: Eny, ho tranon-kala ny tokiny.
  '15':
  - type: text
    content: Miankina amin’ny tranony izy, kanjo tsy maharitra iny;
  - type: text
    content: Mihazona azy mafy izy, kanjo tsy mahazaka azy iny.
  '16':
  - type: text
    content: Mitsimoka tsara tandrifin’ny masoandro izy,
  - type: text
    content: Ary ny rantsany misandrahaka eo amin’ny tanimboliny;
  '17':
  - type: text
    content: Mifelipelika mifaniditra eo amin’ny korontam-bato ny fàkany
  - type: text
    content: Ary mahazo any anelanelany;
  '18':
  - type: text
    content: Kanjo nony fongorany hiala amin’ny fitoerany izy,
  - type: text
    content: 'Dia handa azy izany ka hanao hoe: Tsy mbola nahita anao akory aho.'
  '19':
  - type: text
    content: Indro, izany ihany no fifalian’ny làlan-kalehany;
  - type: text
    content: Ary hisy hafa indray mitrebona avy amin’ny vovoka.
  '2':
  - type: text
    content: Mandra-pahoviana no hiteny toy izany hianao,
  - type: text
    content: Ka ho rivotra mahery ny teny aloaky ny vavanao?
  '20':
  - type: text
    content: Indro, Andriamanitra tsy hanary ny olona tsy manan-tsiny
  - type: text
    content: Ary tsy hitantana ny mpanao ratsy;
  '21':
  - type: text
    content: Mbola hofenoiny hehy ny vavanao
  - type: text
    content: Sy hoby ny molotrao.
  '22':
  - type: text
    content: Izay mankahala anao hitafy henatra;
  - type: text
    content: Ary tsy hisy intsony ny lain’ny ratsy fanahy.
  '3':
  - type: text
    content: Andriamanitra va hamadika ny fitsarana,
  - type: text
    content: Na ny Tsitoha hamadika ny rariny?
  '4':
  - type: text
    content: Raha nanota taminy ny zanakao,
  - type: text
    content: Dia efa nampanodiaviny azy ny fahadisoany.
  '5':
  - type: text
    content: Fa raha hianao kosa mandroso mitady an’Andriamanitra
  - type: text
    content: Ka mifona amin’ny Tsitoha.
  '6':
  - type: text
    content: Ary raha madio sy mahitsy hianao,
  - type: text
    content: Dia hifoha hamonjy
  - type: note
    content: 'Na: hiambina.'
  - type: text
    content: ' anao tokoa Izy'
  - type: text
    content: Ary hampiadana indray ny fonenan’ny fahamarinanao,
  '7':
  - type: text
    content: Ka na dia kely aza no niandohanao,
  - type: text
    content: Dia ho lehibe indrindra no hiafaranao.
  '8':
  - type: text
    content: Fa masìna hianao, anontanio ange ny ntaolo,
  - type: text
    content: Ka fantaro ny hevitra hitan’ny razany
  '9':
  - type: text
    content: (Fa vao omaly isika ka tsy mba mahalala,
  - type: text
    content: Fa aloka ihany ny androntsika etỳ ambonin’ny tany);
