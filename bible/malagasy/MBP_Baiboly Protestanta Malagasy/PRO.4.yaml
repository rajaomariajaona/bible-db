document_id: PRO.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana hikatsaka ny fahendrena ary tsy hikambana amin’ny mpanao ratsy.
  - type: text
    content: RY zanaka, henoy ny anatry ny ray,
  - type: text
    content: Ary tandremo mba hahazoanareo ny fahalalana tsara.
  '10':
  - type: text
    content: Anaka, mihainoa, ka raiso ny teniko;
  - type: text
    content: Dia hihamaro ny taona hiainanao.
  '11':
  - type: text
    content: Làlam-pahendrena no atoroko anao;
  - type: text
    content: Eny, mitarika anao amin’ny làlana mahitsy aho.
  '12':
  - type: text
    content: Raha mandeha hianao, dia tsy ho ety ny làlanao;
  - type: text
    content: Ary raha mihazakazaka hianao, dia tsy ho tafintohina.
  '13':
  - type: text
    content: Tano mafy ny fananarana, ka aza avela hiala;
  - type: text
    content: Hazony izy, fa ainao.
  '14':
  - type: text
    content: Aza mankany amin’ny alehan’ny ratsy fanahy,
  - type: text
    content: Ary aza mizotra amin’ny làlan’ny ratsy.
  '15':
  - type: text
    content: Manalavira azy; aza mandalo eo akory;
  - type: text
    content: Mivilia azy, ka mizora.
  '16':
  - type: text
    content: Fa tsy matory ireny, raha tsy efa nanao ratsy;
  - type: text
    content: Ary tsy mahita torimaso izy, raha tsy efa nanafintohina ny sasany.
  '17':
  - type: text
    content: Fa mihinana ny mofon’ny faharatsiana izy,
  - type: text
    content: Sy misotro ny divain’ny fahalozana.
  '18':
  - type: text
    content: Fa ny làlan’ny marina dia toy ny fipoak’andro maraina,
  - type: text
    content: Izay mihamazava mandra-pitataovovonan’ny andro.
  '19':
  - type: text
    content: Ny alehan’ny ratsy fanahy dia toy ny aizim-pito;
  - type: text
    content: Tsy fantany akory izay manafintohina azy.
  '2':
  - type: text
    content: Fa anatra tsara no omeko anareo;
  - type: text
    content: Aza mahafoy ny lalàko.
  '20':
  - type: text
    content: Anaka, tandremo ny teniko;
  - type: text
    content: Atongilano ny sofinao hihaino ny filazako.
  '21':
  - type: text
    content: Aza avela hiala eo imasonao izy,
  - type: text
    content: Fa raketo ao am-ponao.
  '22':
  - type: text
    content: Fa aina ho an’ny mahazo azy izy
  - type: text
    content: Ary fahasalamana ho an’ny nofony rehetra.
  '23':
  - type: text
    content: Tandremo ny fonao mihoatra noho izay rehetra tokony hotandremana;
  - type: text
    content: Fa avy ao aminy no ihavian’
  - type: note
    content: Heb. fivoahan’.
  - type: text
    content: ' ny aina.'
  '24':
  - type: text
    content: Esory aminao ny vava mandainga,
  - type: text
    content: Ary ampanalaviro anao ny molotra mamitaka.
  '25':
  - type: text
    content: Aoka ny masonao hijery mahitsy,
  - type: text
    content: Ary ny hodimasonao hibanjina eo anoloanao.
  '26':
  - type: text
    content: Ataovy marina ny
  - type: note
    content: 'Na: Saino tsara izay.'
  - type: text
    content: ' alehan’ny tongotrao,'
  - type: text
    content: Dia ho voalamina ny alehanao rehetra;
  '27':
  - type: text
    content: Aza mivily, na ho amin’ny ankavanana, na ho amin’ny ankavia;
  - type: text
    content: Esory amin’ny ratsy ny tongotrao.
  '3':
  - type: text
    content: Fa zanak’ikaky aho,
  - type: text
    content: Sady tiana
  - type: note
    content: Heb. malemilemy.
  - type: text
    content: ' no hany malala teo imason’ineny.'
  '4':
  - type: text
    content: 'Ary nampianatra ahy izy ka nanao tamiko hoe:'
  - type: text
    content: Aoka ny fonao hitana ny teniko;
  - type: text
    content: Tandremo ny didiko, dia ho velona hianao.
  '5':
  - type: text
    content: Mahazoa fahendrena, mahazoa fahalalana;
  - type: text
    content: Fa aza hadinoina na ihemorana ny teny aloaky ny vavako.
  '6':
  - type: text
    content: 'Aza mahafoy azy, fa hiaro anao izy:'
  - type: text
    content: Tiavo izy, dia hitandrina anao.
  '7':
  - type: text
    content: 'Ny voaloham-pahendrena dia izao:'
  - type: note
    content: 'Na: Fahendrena no ambony indrindra.'
  - type: text
    content: ' Mahazoa fahendrena;'
  - type: text
    content: Eny, lanio ny fanananao rehetra hamidy fahalalana tsara.
  '8':
  - type: text
    content: Asandrato izy, dia hanandratra anao kosa.
  - type: text
    content: Eny, hanome voninahitra anao izy, raha tànanao.
  '9':
  - type: text
    content: Dia hasiany fehiloha mahafinaritra ny lohanao;
  - type: text
    content: Eny, satroboninahitra tsara tarehy no homeny anao.
