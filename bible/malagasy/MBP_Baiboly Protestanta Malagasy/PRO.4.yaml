document_id: PRO.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fananarana hikatsaka ny fahendrena ary tsy hikambana amin’ny mpanao ratsy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: RY zanaka, henoy ny anatry ny ray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tandremo mba hahazoanareo ny fahalalana tsara.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, mihainoa, ka raiso ny teniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hihamaro ny taona hiainanao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Làlam-pahendrena no atoroko anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mitarika anao amin’ny làlana mahitsy aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mandeha hianao, dia tsy ho ety ny làlanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha mihazakazaka hianao, dia tsy ho tafintohina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tano mafy ny fananarana, ka aza avela hiala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hazony izy, fa ainao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mankany amin’ny alehan’ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mizotra amin’ny làlan’ny ratsy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manalavira azy; aza mandalo eo akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivilia azy, ka mizora.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy matory ireny, raha tsy efa nanao ratsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mahita torimaso izy, raha tsy efa nanafintohina ny sasany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mihinana ny mofon’ny faharatsiana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy misotro ny divain’ny fahalozana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny làlan’ny marina dia toy ny fipoak’andro maraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mihamazava mandra-pitataovovonan’ny andro.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny alehan’ny ratsy fanahy dia toy ny aizim-pito;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fantany akory izay manafintohina azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa anatra tsara no omeko anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mahafoy ny lalàko.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, tandremo ny teniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinao hihaino ny filazako.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza avela hiala eo imasonao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raketo ao am-ponao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aina ho an’ny mahazo azy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fahasalamana ho an’ny nofony rehetra.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo ny fonao mihoatra noho izay rehetra tokony hotandremana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy ao aminy no ihavian’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fivoahan’.
      marker-yv: yv-n
    - type: text
      text: ' ny aina.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esory aminao ny vava mandainga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ampanalaviro anao ny molotra mamitaka.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny masonao hijery mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hodimasonao hibanjina eo anoloanao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy marina ny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Saino tsara izay.
      marker-yv: yv-n
    - type: text
      text: ' alehan’ny tongotrao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho voalamina ny alehanao rehetra;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mivily, na ho amin’ny ankavanana, na ho amin’ny ankavia;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esory amin’ny ratsy ny tongotrao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa zanak’ikaky aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tiana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: malemilemy.
      marker-yv: yv-n
    - type: text
      text: ' no hany malala teo imason’ineny.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary nampianatra ahy izy ka nanao tamiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny fonao hitana ny teniko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandremo ny didiko, dia ho velona hianao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahazoa fahendrena, mahazoa fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aza hadinoina na ihemorana ny teny aloaky ny vavako.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aza mahafoy azy, fa hiaro anao izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tiavo izy, dia hitandrina anao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny voaloham-pahendrena dia izao:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fahendrena no ambony indrindra.
      marker-yv: yv-n
    - type: text
      text: ' Mahazoa fahendrena;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, lanio ny fanananao rehetra hamidy fahalalana tsara.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato izy, dia hanandratra anao kosa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hanome voninahitra anao izy, raha tànanao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hasiany fehiloha mahafinaritra ny lohanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, satroboninahitra tsara tarehy no homeny anao.
