document_id: ISA.39,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandraisan’i Hezekia ny iraky ny mpanjakan’i Babylona, sy ny teny nolazain’Isaia noho izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'TAMIN’izany andro izany no nampitondran’i Merodakabaladana, zanak’i Baladana, mpanjakan’i Babylona, taratasy sy fanomezana ho an’i Hezekia; fa efa reny fa narary izy ka sitrana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia faly Hezekia noho izany ka nampiseho azy ny trano fitehirizany zava-tsoa, dia volafotsy sy volamena sy zava-manitra ary menaka tsara, sy ny trano fitehirizana ny fiadiany rehetra mbamin’izay rehetra tao amin’ny firaketany; tsy nisy zavatra tsy nasehon’i Hezekia azy, na ny tao an-tranony, na ny tao amin’ny fanjakany rehetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany amin’i Hezekia mpanjaka Isaia mpaminany ka nanao taminy hoe: Ahoana no nolazain’ireo olona ireo, ary avy taiza no nihaviany hankaty aminao? Ary hoy Hezekia: Nankaty amiko avy tany an-tany lavitra izy, dia avy tany Babylona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy: Ka inona avy anefa no hitany tato an-tranonao? Ary hoy Hezekia: Izay rehetra ato an-tranoko dia efa hitany avokoa; tsy nisy zavatra tsy nasehoko azy ny ao amin’ny firekatako rehetra.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Isaia tamin’i Hezekia: Henoy ary ny tenin’i Jehovah, Tompon’ny maro: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, avy ny andro, ka ho entina ho any Babylona izay rehetra ao an-tranonao sy izay rehetra noharin’ny razanao ka voatahiry mandraka andro-any; eny, tsy hisy sisa hijanona na inona na inona, hoy Jehovah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na dia ny terakao aza dia hisy ho entiny koa, ka ho tandonaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ionoka.
      marker-yv: yv-n
    - type: text
      text: ' any amin’ny lapan’ny mpanjakan’i Babylona ireo.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Hezekia tamin’Isaia: Tsara ny tenin’i Jehovah izay nolazainao. Ary hoy koa izy: Eny, hisy fiadanana amin’ny androko ka handry fahizay.'
