document_id: PSA.64
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiantsoana an’Andriamanitra hanafaka amin’ny fandrika amam-pitaka ataon’ny olona, sy fanambarana ny havaliny ireny.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: HENOY ny feoko, raha mitaraina aho, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arovy ny aiko amin’ny tahotro ny fahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Afeno aho tsy ho azon’ny firaisan-tetiky ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fitabataban’ny mpanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay mandranitra ny lelany ho tahaka ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mikendry handefa ny zana-tsipìkany, dia teny mangidy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mba hitifitra mangingina ny mahitsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitifitra azy tampoka izy ka tsy matahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hamafiny ny hevi-dratsiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifampitaona hanao fandri-totofana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao hoe: Iza no hahita izany?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manao saim-petsy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Omaniny tsara ny sain-dalina voaheviny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lalina ny ao anatin’ny olombelona, dia ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitifitra azy Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tampoka toy ny fiantefan’ny zana-tsipìka no fahavoazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Apotrany izy ka voasingotry ny lelany ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandositra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mihifikifi-doha.
    marker-yv: yv-n
  - type: text
    text: ' izay rehetra mahita azy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia matahotra ny olona rehetra ka manambara ny ataon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mandinika tsara ny asany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mifaly amin’i Jehovah ny marina ka mialoka aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mifaly tena ny mahitsy fo rehetra.
