document_id: PSA.64,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana an’Andriamanitra hanafaka amin’ny fandrika amam-pitaka ataon’ny olona, sy fanambarana ny havaliny ireny.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: HENOY ny feoko, raha mitaraina aho, Andriamanitra ô;
  - type: text
    content: Arovy ny aiko amin’ny tahotro ny fahavalo.
  '10':
  - type: text
    content: Mifaly amin’i Jehovah ny marina ka mialoka aminy;
  - type: text
    content: Eny, mifaly tena ny mahitsy fo rehetra.
  '2':
  - type: text
    content: Afeno aho tsy ho azon’ny firaisan-tetiky ny ratsy fanahy
  - type: text
    content: Sy ny fitabataban’ny mpanao ratsy,
  '3':
  - type: text
    content: Izay mandranitra ny lelany ho tahaka ny sabatra,
  - type: text
    content: Ka mikendry handefa ny zana-tsipìkany, dia teny mangidy,
  '4':
  - type: text
    content: Mba hitifitra mangingina ny mahitsy;
  - type: text
    content: Mitifitra azy tampoka izy ka tsy matahotra.
  '5':
  - type: text
    content: Hamafiny ny hevi-dratsiny;
  - type: text
    content: Mifampitaona hanao fandri-totofana izy
  - type: text
    content: 'Ka manao hoe: Iza no hahita izany?'
  '6':
  - type: text
    content: Manao saim-petsy izy;
  - type: text
    content: Omaniny tsara ny sain-dalina voaheviny;
  - type: text
    content: Lalina ny ao anatin’ny olombelona, dia ny fony.
  '7':
  - type: text
    content: Mitifitra azy Andriamanitra;
  - type: text
    content: Tampoka toy ny fiantefan’ny zana-tsipìka no fahavoazany.
  '8':
  - type: text
    content: Apotrany izy ka voasingotry ny lelany ihany;
  - type: text
    content: Mandositra
  - type: note
    content: 'Na: Mihifikifi-doha.'
  - type: text
    content: ' izay rehetra mahita azy.'
  '9':
  - type: text
    content: Dia matahotra ny olona rehetra ka manambara ny ataon’Andriamanitra
  - type: text
    content: Sady mandinika tsara ny asany.
