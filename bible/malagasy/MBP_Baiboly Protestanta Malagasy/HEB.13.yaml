document_id: HEB.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra sy fanaovam-beloma.
  - type: text
    content: 'AOKA haharitra ny fitiavana ny rahalahy. '
  '10':
  - type: text
    content: 'Isika manana alitara, izay tsy ananan’ny mpanompo ny tabernakely fahefana hihinanana. '
  '11':
  - type: text
    content: 'Fa rehefa nentin’ny mpisoronabe niditra ho ao amin’ny fitoerana masina ho fanatitra noho ny ota ny ran’ny biby, dia nodorana teny ivelan’ny toby ny fatiny. '
  '12':
  - type: text
    content: 'Ary amin’izany Jesosy koa dia niaritra teny ivelan’ny vavahady mba hahamasina ny olona amin’ny rany. '
  '13':
  - type: text
    content: 'Koa aoka isika hivoaka hankeo aminy eo ivelan’ny toby, mitondra ny latsa izay nentiny. '
  '14':
  - type: text
    content: 'Fa etỳ isika tsy manana tanàna maharitra, fa mitady ny ho avy. '
  '15':
  - type: text
    content: 'Koa aoka isika hanatitra ny fanati-piderana amin’ny alalany ho an’Andriamanitra mandrakariva, dia ny vokatry ny molotra izay manaiky ny anarany. '
  '16':
  - type: text
    content: Fa aza manadino hanao soa sy hiantra; fa fanatitra toy izany no sitrak’Andriamanitra.
  '17':
  - type: text
    content: Manekè ny mpitondra anareo, ka manoava azy; fa izy miambina ny fanahinareo araka izay tokony hataon’ny olona mbola hampamoahina, mba hanaovany izany amin’ny fifaliana, fa tsy amin’ny fisentoana; fa tsy hahasoa anareo izany.
  '18':
  - type: text
    content: 'Mivavaha ho anay; fa matoky izahay fa manana fieritreretana tsara ka te-hitondra tena tsara amin’ny zavatra rehetra. '
  '19':
  - type: text
    content: 'Nefa mainka mangataka '
  - type: text
    content: anareo
  - type: text
    content: ' hanao izany aho, mba hampodina faingampaingana kokoa ho aminareo.'
  '2':
  - type: text
    content: Aza manadino ny fampiantranoam-bahiny; fa tamin’izany dia nampiantrano anjely ny sasany, nefa tsy fantany.
  '20':
  - type: text
    content: Ary Andriamanitry ny fiadanana, Izay nitondra an’i Jesosy Tompontsika, Mpiandry ondry lehibe, hiala amin’ny maty, mitondra ny ran’ny fanekena mandrakizay,
  - type: note
    content: 'Na: Mpiandry ondry lehibe amin’ny ran’ny fanekena mandrakizay hiala amin’ny maty.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Izy anie hahatanteraka anareo amin’ny tsara
  - type: note
    content: 'Na: [asa tsara].'
  - type: text
    content: ' rehetra hanao ny sitrapony ka hiasa ao anatinareo'
  - type: note
    content: 'Na: [anatintsika].'
  - type: text
    content: ' izay ankasitrahana eo imasony amin’ny alalan’i Jesosy Kristy; ho Azy anie ny voninahitra mandrakizay mandrakizay. Amena.'
  '22':
  - type: text
    content: Ary mangataka aminareo aho, ry rahalahy, zakao ny teny fananarana; fa efa nanoratra epistily fohifohy ihany ho aminareo aho.
  '23':
  - type: text
    content: Aoka ho fantatrareo fa efa afaka Timoty rahalahintsika; koa raha tàhiny handeha faingana izy, dia hiaraka aminy hamangy anareo aho.
  '24':
  - type: text
    content: Manaova veloma amin’izay rehetra mpitondra anareo sy ny olona masina rehetra. Izay an’Italia dia manao veloma anareo.
  '25':
  - type: text
    content: Ho aminareo rehetra anie ny fahasoavana. Amena.
  '3':
  - type: text
    content: Tsarovy izay mifatotra, ho toy ny miara-mifatotra aminy hianareo, ary izay ampahorina, satria mbola eo amin’ny tena koa hianareo.
  '4':
  - type: text
    content: Aoka hanan-kaja amin’ny olona rehetra ny fanambadiana, ary aoka tsy ho voaloto ny fandriana; fa ny mpijangajanga sy ny mpaka vadin’olona dia hohelohin’Andriamanitra.
  '5':
  - type: text
    content: 'Aoka tsy ho amin’ny fitiavam-bola ny toe-tsainareo, fa mianina amin’izay anananareo; fa hoy Izy: ,,Izaho tsy handao anao mihitsy na hahafoy anao akory’’ (Jos. 1.5). '
  '6':
  - type: text
    content: 'Ka dia sahy manao hoe isika:'
  - type: text
    content: ',,Jehovah no Mpamonjy ahy, ka tsy hatahotra aho;'
  - type: text
    content: Inona no azon’ny olona atao amiko?’’ (Sal. 118.6).
  '7':
  - type: text
    content: 'Tsarovy ny mpitondra anareo, izay efa nitory ny tenin’Andriamanitra taminareo; hevero ny niafaran’ny fiainany, ka araho ny finoany. '
  '8':
  - type: text
    content: 'Jesosy Kristy no tsy miova omaly sy anio ary mandrakizay. '
  '9':
  - type: text
    content: 'Aza mety havilin’izay fampianarana maro hafahafa hianareo. Fa tsara raha ampiorenina amin’ny fahasoavana ny fo, fa tsy amin’ny hanina, izay tsy mahasoa ny mahavatra azy. '
