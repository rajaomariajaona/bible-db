document_id: PRO.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny soa hitan’izay mandray ny fahendrena.
  - type: text
    content: ANAKA, raha raisinao ny teniko,
  - type: text
    content: Ary raketinao ao am-ponao ny didiko,
  '10':
  - type: text
    content: Raha latsaka ao am-ponao ny fahendrena,
  - type: text
    content: Ary
  - type: note
    content: 'Na: Fa ho tafiditra ao am-ponao ny fahendrena, Ka ho.'
  - type: text
    content: ' mamin’ny fanahinao ny fahalalana,'
  '11':
  - type: text
    content: Dia hiaro anao ny fisainana mazava,
  - type: text
    content: Ary hiambina anao ny fahalalana,
  '12':
  - type: text
    content: Ka hamonjy anao amin’ny làlan-dratsy
  - type: text
    content: Sy amin’ny lehilahy izay miteny fitaka,
  '13':
  - type: text
    content: Izay mahafoy ny làlan’ny fahamarinana
  - type: text
    content: Mba hizorany amin’ny làlan’ny fahamaizinana,
  '14':
  - type: text
    content: Dia izay faly hanao ratsy
  - type: text
    content: Sy finaritra amin’ny fitaky ny ratsy,
  '15':
  - type: text
    content: Dia izay melo-dàlana
  - type: text
    content: Sy maniasia amin’ny alehany;
  '16':
  - type: text
    content: Ary hamonjy anao amin’ny vehivavy jejo
  - type: note
    content: Heb. vehivavy tsy vadinao.
  - type: text
    content: ' koa izany,'
  - type: text
    content: Dia amin’ny vahiny janga izay mandrobo amin’ny teniny,
  '17':
  - type: text
    content: Izay mahafoy ny vadin’
  - type: note
    content: Heb. sakaizan’.
  - type: text
    content: ' ny fahatanorany'
  - type: text
    content: Sy manadino ny fanekeny teo amin’Andriamaniny.
  '18':
  - type: text
    content: Fa ny tranony milentika ho amin’ny fahafatesana,
  - type: text
    content: Ary ny alehany mankany amin’ny maty.
  '19':
  - type: text
    content: Tsy misy afa-miverina izay mankany aminy,
  - type: text
    content: Na mihazo amin’ny làlan’aina, –
  '2':
  - type: text
    content: Ka atongilanao amin’ny fahendrena ny sofinao,
  - type: text
    content: Ary ampitandremanao fahalalana ny fonao;
  '20':
  - type: text
    content: Handehananao amin’ny làlan’ny tsara fanahy
  - type: text
    content: Sy hitandremanao ny alehan’ny marina.
  '21':
  - type: text
    content: Fa ny olona mahitsy no honina amin’ny tany,
  - type: text
    content: Ary ny tsy manan-tsiny ihany no ho sisa mitoetra ao;
  '22':
  - type: text
    content: Fa ny ratsy fanahy kosa hofongorana amin’ny tany,
  - type: text
    content: Ary ny mpivadika hongotana.
  '3':
  - type: text
    content: Eny, raha miantso ny fahalalana hianao
  - type: text
    content: Ary manandratra ny feonao hahazo saina,
  '4':
  - type: text
    content: Raha mitady azy toy ny fitady volafotsy hianao
  - type: text
    content: 'Ary mikatsaka azy toy ny fikatsaka harena afenina:'
  '5':
  - type: text
    content: Dia ho fantatrao marina ny fahatahorana an’i Jehovah,
  - type: text
    content: Ary ho hitanao ny fahalalana an’Andriamanitra.
  '6':
  - type: text
    content: Fa Jehovah no manome fahendrena;
  - type: text
    content: Avy amin’ny vavany no ihavian’ny fahalalana sy ny fahazavan-tsaina.
  '7':
  - type: text
    content: Izy mitahiry fanambinana
  - type: note
    content: 'Na: tena fahendrena.'
  - type: text
    content: ' ho an’ny mahitsy'
  - type: text
    content: Sady ampingan’izay mandeha tsy misy tsiny;
  '8':
  - type: text
    content: Ka dia mitandrina ny làlan’ny fahamarinana Izy
  - type: text
    content: Ary miambina ny làlan’ny olony masina.
  '9':
  - type: text
    content: Ary amin’izay dia ho fantatrao ny fahamarinana sy ny rariny
  - type: text
    content: Ary ny hitsiny, dia ny làlana tsara rehetra.
