document_id: PRO.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny soa hitan’izay mandray ny fahendrena.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ANAKA, raha raisinao ny teniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raketinao ao am-ponao ny didiko,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha latsaka ao am-ponao ny fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa ho tafiditra ao am-ponao ny fahendrena, Ka ho.
      marker-yv: yv-n
    - type: text
      text: ' mamin’ny fanahinao ny fahalalana,'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia hiaro anao ny fisainana mazava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hiambina anao ny fahalalana,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ka hamonjy anao amin’ny làlan-dratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny lehilahy izay miteny fitaka,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izay mahafoy ny làlan’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hizorany amin’ny làlan’ny fahamaizinana,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia izay faly hanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy finaritra amin’ny fitaky ny ratsy,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia izay melo-dàlana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy maniasia amin’ny alehany;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary hamonjy anao amin’ny vehivavy jejo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vehivavy tsy vadinao.
      marker-yv: yv-n
    - type: text
      text: ' koa izany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’ny vahiny janga izay mandrobo amin’ny teniny,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izay mahafoy ny vadin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sakaizan’.
      marker-yv: yv-n
    - type: text
      text: ' ny fahatanorany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy manadino ny fanekeny teo amin’Andriamaniny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa ny tranony milentika ho amin’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny alehany mankany amin’ny maty.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy misy afa-miverina izay mankany aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mihazo amin’ny làlan’aina, –
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ka atongilanao amin’ny fahendrena ny sofinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ampitandremanao fahalalana ny fonao;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Handehananao amin’ny làlan’ny tsara fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hitandremanao ny alehan’ny marina.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa ny olona mahitsy no honina amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tsy manan-tsiny ihany no ho sisa mitoetra ao;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa ny ratsy fanahy kosa hofongorana amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpivadika hongotana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eny, raha miantso ny fahalalana hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manandratra ny feonao hahazo saina,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Raha mitady azy toy ny fitady volafotsy hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary mikatsaka azy toy ny fikatsaka harena afenina:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia ho fantatrao marina ny fahatahorana an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho hitanao ny fahalalana an’Andriamanitra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa Jehovah no manome fahendrena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy amin’ny vavany no ihavian’ny fahalalana sy ny fahazavan-tsaina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Izy mitahiry fanambinana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tena fahendrena.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny mahitsy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady ampingan’izay mandeha tsy misy tsiny;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ka dia mitandrina ny làlan’ny fahamarinana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miambina ny làlan’ny olony masina.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary amin’izay dia ho fantatrao ny fahamarinana sy ny rariny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hitsiny, dia ny làlana tsara rehetra.
