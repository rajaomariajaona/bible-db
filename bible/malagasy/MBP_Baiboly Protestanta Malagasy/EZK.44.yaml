document_id: EZK.44
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Lalàna ny amin’ny mpanjaka sy ny mpisorona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA nentiny niverina aho tamin’ny làlana mankamin’ny vavahady ivelany amin’ny fitoerana masina, dia ilay manatrika ny atsinanana; ka, indro, nirindrina io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy Jehovah tamiko: Ity vavahady ity dia hirindrina ka tsy hovohana ary tsy hidiran’olona; fa efa nidiran’i Jehovah, Andriamanitry ny Isiraely, io, ka izany no hirindrinany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa kosa ny mpanjaka no mahazo mipetraka ao hihinan-kanina eo anatrehan’i Jehovah, satria mpanjaka izy; amin’ny làlana mankamin’ny lavarangan’ny vavahady no hidirany, ary amin’ny làlana nalehany ihany koa no hivoahany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia nentiny nankamin’ny vavahady avaratra ho eo anoloan’ny trano koa aho, dia hitako fa, indro, feno ny voninahitr’i Jehovah ny tranon’i Jehovah; ka dia nikarapoka nihohoka aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Jehovah tamiko: Ry zanak’olona, mandiniha tsara, ka mijere amin’ny masonao, ary aoka hohenoin’ny sofinao izay rehetra lazaiko aminao ny amin’ny didy sy ny lalàna rehetra amin’ny tranon’i Jehovah; ary diniho tsara ny fidirana amin’ny trano sy ny fivoahana rehetra avy ao amin’ny fitoerana masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary lazao amin’ireo maditra, dia ny taranak’Isiraely hoe: Izao no lazain’i Jehovah Tompo: Aoka izay ny fahavetavetanareo, ry taranak’Isiraely! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia ny nitondranareo vahiny tsy mifora fo na nofo hitoetra ao amin’ny fitoerako masina mba handoto ny tranoko tamin’ny nanateranareo ny haniko, dia ny sabora sy ny ra, ka dia nivadika ny fanekeko ireo ho fanampin’ny fahavetavetanareo rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary tsy nitandrina ny anjara-raharaha ny amin’ny fitoerako masina hianareo, fa efa nanendry izay ho mpitandrina ny anjara-raharaha ao amin’ny fitoerana masina hisolo anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo: Ny vahiny tsy mifora fo sy nofo rehetra izay ao amin’ny Zanak’Isiraely dia tsy misy hahazo miditra ao amin’ny fitoerako masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary na dia ny Levita aza, izay nanalavitra Ahy tamin’ny nivilian’ny Isiraely, izay nivily niala tamiko ka nanaraka ny sampiny, dia hitondra ny helony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ho mpanao fanompoam-pivavahana ao amin’ny fitoerako masina izy, dia ho mpiadidy ny amin’ny fiandrasana ny vavahadin’ny tempoly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: trano.
    marker-yv: yv-n
  - type: text
    text: ' sy ho mpanao fanompoam-pivavahana ao amin’ny tempoly;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: trano.
    marker-yv: yv-n
  - type: text
    text: ' hisolo ny olona hamono ny fanatitra dorana sy ny fanatitra hafa izy ary hitoetra eo anatrehany hanao fanompoam-pivavahana ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Satria nanao fanompoam-pivavahana ho azy teo anatrehan’ny sampiny izy ka tonga fahatafintohinana nahameloka ny taranak’Isiraely, dia izany no nananganako tànana hamely azy ka nilazako fa hitondra ny helony izy, hoy Jehovah Tompo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary tsy hanatona Ahy ho mpisoroko izy, na hanakaiky izay zavatra masina na inona na inona, dia izay zavatra masina indrindra; fa hitambesaran’ny fahamenarany sy ny fahavetavetana nataony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary hotendreko ho mpitandrina ny anjara-raharaha ny amin’ny trano izy, dia ny fanompoana rehetra sy ny zavatra rehetra atao ao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ny Levita mpisorona, taranak’i Zadoka kosa, izay nitandrina ny anjara-raharaha ny amin’ny fitoerako masina, tamin’ny nivilian’ny Zanak’Isiraely niala tamiko, dia izy no hanatona Ahy hanao fanompoam-pivavahana ho Ahy, ary izy no ho eo anatrehako hanatitra ho Ahy ny sabora sy ny ra, hoy Jehovah Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eny, izy no hiditra ao amin’ny fitoerako masina sy hanatona ny latabatro hanao fanompoam-pivavahana ho Ahy ary hitandrina izay nasaiko hotandremana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha miditra any amin’ny vavahadin’ny kianja anatiny izy, dia hiakanjo rongony fotsy fa tsy hisy volon’ondry eny aminy, raha manao fanompoam-pivavahana ao am-bavahadin’ny kianja anatiny sy ao anatiny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Satroka rongony no ho eo an-dohany, ary kalisaona fohy rongony fotsy no ho eo am-balahany, ary tsy hifehy zavatra mahatsemboka azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary raha mivoaka ho any amin’ny kianja ivelany hankany amin’ny olona izy, dia hesoriny ilay fitafiana nentiny nanao fanompoam-pivavahana, ka havelany ao amin’ny efi-trano masina, ary hitafy fitafiana hafa izy, fa tsy hanamasina ny olona amin’ireny fitafiany ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy hanaratra ny lohany izy, nefa kosa tsy hanao lava volo, fa hataony tsara hety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny divay dia tsy hosotroin’izay mpisorona, raha miditra any amin’ny kianja anatiny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary tsy hanambady vehivavy efa maty vady na izay efa nisaorana izy; fa virijina avy amin’ny taranak’Isiraely, na izay novinadin’ny mpisorona efa maty, no hovadiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hampianatra ny oloko ny tsi-fitovian’ny masina sy ny tsy masina izy ary hampahafantatra azy ny tsi-fitovian’ny tsy madio sy ny madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary raha misy mifanditra, dia ireo no hitsangana hitsara, ka araka ny fitsipiko no hitsarany azy; ary ny lalàko sy ny didiko dia hotandremany amin’ny fotoam-pivavahana rehetra voatendriko, ary ny Sabatako dia hohamasininy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary tsy hiditra am-paty handoto ny tenany izy ireny; kanefa raha rainy, na reniny, na zanani-lahy, na zanani-vavy, na rahalahiny, na anabaviny tsy manam-bady, dia mahazo miditra am-paty ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary rehefa voadio aza izy, dia mbola hampiandrasina hafitoana aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary amin’ny andro hidirany ao amin’ny fitoerana masina, dia any amin’ny kianja anatiny, hanao fanompoam-pivavahana ao amin’ny fitoerana masina, dia hanatitra ny fanatiny noho ny ota izy, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hisy lova ho azy, dia Izaho no lovany; ary tsy homenareo zara-tany eo amin’ny Isiraely izy, fa Izaho no anjarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ny fanatitra hohanina sy ny fanatitra noho ny ota ary ny fanati-panonerana no hohaniny; ary ny zavatra rehetra izay voatokana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: herema.
    marker-yv: yv-n
  - type: text
    text: ' eo amin’ny Isiraely dia ho azy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny santatry ny voaloham-bokatra rehetra avy amin’ny zavatra rehetra sy ny fanatitra rehetra izay alaina amin’ny zavatra atao fanatitra dia ho an’ny mpisorona; ary ny santatry ny kobanareo voafetafeta dia homenareo ny mpisorona koa, mba hampitoerana fitahiana ao an-tranonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny zavatra maty ho azy sy izay noviraviraim-biby, na vorona na biby, dia samy tsy hohanin’ny mpisorona.
