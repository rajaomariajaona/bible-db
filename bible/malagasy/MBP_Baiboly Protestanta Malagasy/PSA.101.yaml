document_id: PSA.101
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fikasan’ny mpanjaka ny amin’ny hitondrany marina ny fanjakany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: FAMINDRAMPO sy fitsarana no hankalazaiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao, Jehovah ô, no hoderaiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hitandrina ny làlana marina aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rahoviana no ho tonga atỳ amiko Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handeha amin’ny fahitsian’ny foko ao anatin’ny tranoko aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy hampitoetra zava-dratsy eo anoloan’ny masoko aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Halako ny mivadika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hikambana amiko izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fo maditra hiala amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hankasitraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '101.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hahalala.
    marker-yv: yv-n
  - type: text
    text: ' izay ratsy aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay manendrikendrika ny namany mangingina dia hofongorako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy tohako izay miandranandrana sy miavonavona am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny masoko hijery izay olo-mahatoky amin’ny tany mba hitoerany ato amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mandeha amin’ny làlana marina no hanompo ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy mba hitoetra ao anatin’ny tranoko izay manao fitaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba hijanona eo anoloan’ny masoko izay milaza lainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Haringako isa-maraina ny ratsy fanahy rehetra amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hofongorako ny mpanao ratsy rehetra tsy ho ao an-tanànan’i Jehovah.
