document_id: PSA.101,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fikasan’ny mpanjaka ny amin’ny hitondrany marina ny fanjakany.
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: FAMINDRAMPO sy fitsarana no hankalazaiko;
  - type: text
    content: Hianao, Jehovah ô, no hoderaiko.
  '2':
  - type: text
    content: Hitandrina ny làlana marina aho;
  - type: text
    content: Rahoviana no ho tonga atỳ amiko Hianao?
  - type: text
    content: Handeha amin’ny fahitsian’ny foko ao anatin’ny tranoko aho.
  '3':
  - type: text
    content: Tsy hampitoetra zava-dratsy eo anoloan’ny masoko aho;
  - type: text
    content: Halako ny mivadika,
  - type: text
    content: Tsy hikambana amiko izany.
  '4':
  - type: text
    content: Ny fo maditra hiala amiko;
  - type: text
    content: Tsy hankasitraka
  - type: note
    content: Heb. hahalala.
  - type: text
    content: ' izay ratsy aho.'
  '5':
  - type: text
    content: Izay manendrikendrika ny namany mangingina dia hofongorako;
  - type: text
    content: Tsy tohako izay miandranandrana sy miavonavona am-po.
  '6':
  - type: text
    content: Ny masoko hijery izay olo-mahatoky amin’ny tany mba hitoerany ato amiko;
  - type: text
    content: Izay mandeha amin’ny làlana marina no hanompo ahy.
  '7':
  - type: text
    content: Tsy mba hitoetra ao anatin’ny tranoko izay manao fitaka;
  - type: text
    content: Tsy mba hijanona eo anoloan’ny masoko izay milaza lainga.
  '8':
  - type: text
    content: Haringako isa-maraina ny ratsy fanahy rehetra amin’ny tany,
  - type: text
    content: Mba hofongorako ny mpanao ratsy rehetra tsy ho ao an-tanànan’i Jehovah.
