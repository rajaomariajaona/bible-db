document_id: 2CH.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niodinan’ny firenena folo tsy hanaiky an-dRehoboama.
  - type: text
    content: ARY Rehoboama nankany Sekema, fa tany no efa nalehan’ny Isiraely rehetra hampanjaka azy.
  '10':
  - type: text
    content: 'Ary ireo tovolahy indray nihira taminy nanao taminy hoe: Izao no lazao amin’ny vahoaka izay niteny taminao hoe: Rainao nampitondra zioga mavesatra anay; fa inty kosa mby aminao, ka mba hamaivano aminay izany,–izao no lazao aminy Ny ankihikeliko dia lehibe noho ny valahan’ny raiko; '
  '11':
  - type: text
    content: koa raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa dia mainka hanampy ny zioga ho entinareo; kotopia no namaizan’ny raiko anareo, fa maingoka fikapohana kosa no hamaizako anareo.
  '12':
  - type: text
    content: 'Ary Jeroboama sy ny vahoaka rehetra dia nankany amin-dRehoboama tamin’ny andro fahatelo, araka ilay nolazain’ny mpanjaka hoe: Mankanesa atỳ amiko indray amin’ny andro fahatelo. '
  '13':
  - type: text
    content: 'Ary Rehoboama mpanjaka nanao teny mafy tamin’ny olona, fa nandà ny hevitra nomen’ireo zoki-olona azy izy '
  '14':
  - type: text
    content: 'ka niteny taminy araka ny hevitra nomen’ireo tovolahy hoe: Nampitondra zioga mavesatra anareo ny raiko, fa izaho kosa mainka hanampy izany; kotopia no namaizan’ny raiko anareo, fa maingoka fikapohana kosa no hamaizako anareo.'
  '15':
  - type: text
    content: Ka dia tsy nihaino ny olona ny mpanjaka, fa avy tamin’Andriamanitra izany zavatra izany hahatanteraka ny teniny izay nampilazainy an’i Ahia Silonita tamin’i Jeroboama, zanak’i Nebata.
  '16':
  - type: text
    content: 'Ary nony hitan’ny Isiraely rehetra fa tsy nihaino azy ny mpanjaka, dia namaly ny mpanjaka ny vahoaka ka nanao hoe: Inona moa no anjaranay amin’i Davida? Tsy manana lova amin’ny zanak’i Jese izahay. Samia mody any an-dainy avy, ry Isiraely e! ankehitriny tandremo ny taranakao, ry Davida ô. Dia samy nody ho any an-dainy avy ny Isiraely rehetra. '
  '17':
  - type: text
    content: Fa ny Zanak’Isiraely izay nonina tany an-tanànan’ny Joda ihany no nanjakan-dRehoboama.
  '18':
  - type: text
    content: 'Ary dia naniraka an’i Adorama, komandin’ny mpanao fanompoana, Rehoboama mpanjaka, nefa ny Zanak’Isiraely nitora-bato azy, ka maty izy. Dia niezaka faingana nankeo amin’ny kalesiny Rehoboama mpanjaka handositra ho any Jerosalema. '
  '19':
  - type: text
    content: Ka dia niodina tamin’ny taranak’i Davida ny Isiraely mandraka andro-any.
  '2':
  - type: text
    content: 'Koa raha nandre izany Jeroboama, zanak’i Nebata, izay efa nandositra nankany Egypta niala teo anatrehan’i Solomona mpanjaka, dia niverina avy tany Egypta izy. '
  '3':
  - type: text
    content: Ary naniraka naka azy ny olona.
  - type: text
    content: 'Dia tonga Jeroboama sy ny Isiraely rehetra ka niteny tamin-dRehoboama hoe: '
  '4':
  - type: text
    content: 'Rainao dia nampitondra zioga mavesatra anay; fa inty kosa mby aminao ka mba hamaivano ny fanompoana mafy tamin-drainao sy ny zioga mavesatra izay nataony taminay, dia hanompo anao izahay. '
  '5':
  - type: text
    content: 'Fa hoy kosa izy taminy: Rehefa afaka hateloana, dia mankanesa atỳ amiko indray. Dia lasa ny olona.'
  '6':
  - type: text
    content: 'Ary Rehoboama mpanjaka naka saina tamin’ny zoki-olona izay nitoetra teo anatrehan’i Solomona rainy fony fahavelony ka nanao hoe: Ahoana no hevitra omenareo havaly ny vahoaka? '
  '7':
  - type: text
    content: 'Dia hoy ireo taminy: Raha ho mora amin’ny vahoaka hianao ka hankasitraka azy sy hanao teny mora aminy, dia ho mpanomponao mandrakizay izy.'
  '8':
  - type: text
    content: 'Nefa nolavin-dRehoboama ny saina nomen’ireo zoki-olona azy, dia naka hevitra tamin’ny tovolahy izay indray nihira taminy sady efa nitoetra teo anatrehany izy ka nanao taminy hoe: '
  '9':
  - type: text
    content: 'Ahoana kosa no mba hevitra omenareo havalintsika ny vahoaka izay niteny tamiko hoe: Hamaivano ny zioga izay nataon-drainao taminay? '
