document_id: HEB.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa ny mpisoronabe rehetra dia alaina amin’ny olona ka tendrena ho solon’ny olona hanao ny raharahan’Andriamanitra, hanatitra fanomezana sy fanatitra hanafaka ota, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: fa notononin’Andriamanitra hoe Mpisoronabe ,,araka ny fanaon’i Melkizedeka.’’
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Anatra sy famporisihana hampandroso tsara ny olona.
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'NY amin’izany dia manana teny maro izahay sady sarotra ambara, satria lalodalovana ny sofinareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa na dia tokony ho efa mpampianatra aza hianareo noho ny fahelan’ny andro, dia mbola mila izay hampianatra anareo ny abidim-pianaran’ny tenin’Andriamanitra indray; ary efa toy izay tokony homen-dronono hianareo, fa tsy ventin-kanina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa izay rehetra mivelona amin’ny ronono dia tsy zatra amin’ny tenin’ny fahamarinana, satria mbola zaza-bodo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa ho an’izay efa lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tanteraka.
      marker-yv: yv-n
    - type: text
      text: ' ny ventin-kanina, dia ho an’izay manana ny saina efa zatra nampiasaina tsara ka mahay manavaka ny tsara sy ny ratsy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia olona izay mahay mitondra mora ny tsy mahalala sy ny mania, satria ny tenany koa dia mba hodidinin’ny fahalemena ihany; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ary noho izany dia tsy maintsy hanao fanatitra hanafaka ota ho an’ny tenany koa izy, toy ny ataony ho an’ny olona ihany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary tsy misy maka izany voninahitra izany ho an’ny tenany afa-tsy izay antsoin’Andriamanitra, tahaka an’i Arona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia toy izany koa Kristy: tsy Izy no nanandratra ny tenany ho Mpisoronabe, fa Ilay nanao taminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Zanako Hianao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho niteraka Anao andro-any’’ (Sal. 2.7);
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary toy ny lazainy eo amin’ny teny hafa koa hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Hianao no Mpisorona mandrakizay'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny fanaon’i Melkizedeka’’ (Sal. 110.4).
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tamin’ny andron’ny nofony, raha nanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nanatitra.
      marker-yv: yv-n
    - type: text
      text: ' fivavahana sy fangatahana nomban’ny fitarainana mafy sy ny ranomaso be tamin’Izay nahavonjy Azy tamin’ny fahafatesana Izy, sady voahaino noho ny fahatahorany an’Andriamanitra,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voahaino ka afaka tamin’ny fahatahorany.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia nianatra fanarahana tamin’izay fahoriana nentiny Izy, na dia Zanaka aza; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ary rehefa natao tanteraka Izy, dia tonga loharanon’ny famonjena mandrakizay ho an’izay rehetra manaraka Azy, '
