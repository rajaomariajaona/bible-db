document_id: ACT.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihan-teny sy filazana ny nanafaran’i Jesosy ny mpianany, sy ny nisarahany taminy, raha niakatra ho any an-danitra.
  - type: text
    content: 'RY Teofilo, ilay boky voalohany dia nosoratako ny amin’izay nataon’i Jesosy sy nampianariny, '
  '10':
  - type: text
    content: 'Ary raha mbola nandinika ny lanitra izy ireo tamin’ny nandehanan’i Jesosy, indreo, nisy roa lahy teo anilany niakanjo akanjo fotsy, '
  '11':
  - type: text
    content: 'izay nanao hoe: Ry lehilahy Galiliana, nahoana no mijanona eto mijery ny lanitra hianareo? Iny Jesosy Izay nampiakarina niala taminareo ho any an-danitra iny dia mbola ho avy tahaka ny nahitanareo Azy niakatra ho any an-danitra.'
  '12':
  - type: text
    content: 'Ary izy ireo niverina tany Jerosalema, rehefa avy teo amin’ny tendrombohitra atao hoe Oliva, izay akaikin’i Jerosalema (araka izay mety haleha amin’ny Sabata). '
  '13':
  - type: text
    content: 'Ary rehefa tafiditra izy, dia niakatra ho any an-trano ambony, izay fitoerany,–dia Petera sy Jaona sy Jakoba sy Andrea, Filipo sy Tomasy, Bartolomeo sy Matio. Jakoba '
  - type: text
    content: zanak’i
  - type: text
    content: ' Alfeo, sy Simona Zelota ary Jodasy, '
  - type: text
    content: zanak’
  - type: text
    content: ' '
  - type: note
    content: 'Na: rahalahin’.'
  - type: text
    content: 'i Jakoba. '
  '14':
  - type: text
    content: Ireo rehetra ireo niray saina naharitra nivavaka mbamin’ny vehivavy sy Maria, renin’i Jesosy, ary ny rahalahiny.
  - type: heading
    content: Ny nifidianan’ny Apostoly ny anankiray ho namany hisolo an’i Jodasy.
  '15':
  - type: text
    content: ARY tamin’izany andro izany dia nitsangana teo afovoan’ny rahalahy Petera (tokony ho roa-polo amby zato no isan’ny olona
  - type: note
    content: Gr. anarana.
  - type: text
    content: ' vory teo) ka nanao hoe: '
  '16':
  - type: text
    content: 'Ry rahalahy, tsy maintsy notanterahina ilay tenin’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' nampilazain’ny Fanahy Masina rahateo an’i Davida ny amin’i Jodasy, izay tonga mpitarika ny olona nisambotra an’i Jesosy; '
  '17':
  - type: text
    content: 'fa izy dia isantsika ihany ka nahazo anjara tamin’izao fanompoana izao koa. '
  '18':
  - type: text
    content: 'Koa izany lehilahy izany dia nahazo saha tamin’ny tambin’ny fahotany; ary potraka niankohoka izy, dia vaky ny kibony ka nipoaka sady nivaroraka avokoa ny tsinainy. '
  '19':
  - type: text
    content: 'Ary fantatr’izay rehetra monina eto Jerosalema izany, ka ny anaran’izany saha izany amin’ny fiteniny dia atao hoe Akeldama, izany hoe Sahan-dra. '
  '2':
  - type: text
    content: 'hatramin’ny andro nampiakarana Azy, rehefa nodidiany tamin’ny Fanahy Masina ny Apostoly izay nofidiny, '
  '20':
  - type: text
    content: 'Fa voasoratra eo amin’ny Bokin’ny Salamo hoe:'
  - type: text
    content: ',,Aoka ho lao ny fonenany,'
  - type: text
    content: Ary aoka tsy hisy olona honina ao’’ (Sal. 69.25);
  - type: text
    content: 'ary koa:'
  - type: text
    content: ',,Aoka ho lasan’olon-kafa ny anjara-raharahany’’ (Sal. 109.8).'
  '21':
  - type: text
    content: 'Koa amin’ireo lehilahy niaraka teto amintsika mandrakariva ireo, raha niditra sy nivoaka tamintsika Jesosy Tompo, '
  '22':
  - type: text
    content: hatramin’ny batisan’i Jaona ka hatramin’ny andro nampiakarana Azy niala tamintsika, dia tokony hisy anankiray ho namantsika mba ho vavolombelon’ny nitsanganany.
  '23':
  - type: text
    content: 'Ary nanokana roa lahy izy, dia Josefa, atao hoe Barsabasy, izay atao hoe koa Josto, ary Matia. '
  '24':
  - type: text
    content: 'Dia nivavaka izy ka nanao hoe: Hianao, Tompo ô, Izay mahalala ny fon’ny olona rehetra, asehoy izay nofidinao amin’izy roa lahy ireto, '
  '25':
  - type: text
    content: 'mba hahazoany anjara amin’izao fanompoana sy ny mah’Apostoly izao, izay nialan’i Jodasy hankanesany any amin’ny fitoerany. '
  '26':
  - type: text
    content: Dia nanao filokana ho azy izy, ka latsaka tamin’i Matia ny filokana; ary izy no lany ho isan’ny Apostoly iraika ambin’ny folo lahy.
  '3':
  - type: text
    content: sady niseho koa tamin’ny famantarana maro taorian’ny nijaliany fa velona Izy, ka niseho taminy efa-polo andro Izy ary nilaza ny amin’ny fanjakan’Andriamanitra.
  '4':
  - type: text
    content: Ary raha niara-niangona
  - type: note
    content: 'Na: niara-nihinana.'
  - type: text
    content: ' teo aminy Jesosy, dia namepetra azy tsy hiala an’i Jerosalema, fa hiandry ny teny fikasan’ny Ray, izay efa renareo tamiko, '
  - type: text
    content: hoy Izy;
  - type: text
    content: ' '
  '5':
  - type: text
    content: fa Jaona nanao batisa tamin’ny rano; fa hianareo kosa hatao batisa amin’ny Fanahy Masina, rehefa afaka andro vitsivitsy.
  '6':
  - type: text
    content: 'Koa izay tafangona teo dia nanontany Azy hoe: Tompoko, amin’izao va no hampodianao ny fanjakana ho amin’ny Isiraely? '
  '7':
  - type: text
    content: 'Fa hoy kosa Izy taminy: Tsy anareo ny hahalala ny andro na ny fotoana izay efa notendren’ny Ray amin’ny fahefany ihany.'
  - type: note
    content: 'Na: izay nataon’ny Ray ho adidin’ny tenany ihany.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Fa hahazo hery hianareo amin’ny hilatsahan’ny Fanahy Masina aminareo, ary ho vavolombeloko any Jerosalema sy eran’i Jodia sy Samaria ary hatramin’ny faran’ny tany.
  '9':
  - type: text
    content: 'Ary rehefa nilaza izany Jesosy, dia nakarina Izy, raha mbola nijery izy ireo; ary nisy rahona nitondra Azy, ka tsy hitan’ny masony intsony Izy. '
