document_id: ACT.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarihan-teny sy filazana ny nanafaran’i Jesosy ny mpianany, sy ny nisarahany taminy, raha niakatra ho any an-danitra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'RY Teofilo, ilay boky voalohany dia nosoratako ny amin’izay nataon’i Jesosy sy nampianariny, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary raha mbola nandinika ny lanitra izy ireo tamin’ny nandehanan’i Jesosy, indreo, nisy roa lahy teo anilany niakanjo akanjo fotsy, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'izay nanao hoe: Ry lehilahy Galiliana, nahoana no mijanona eto mijery ny lanitra hianareo? Iny Jesosy Izay nampiakarina niala taminareo ho any an-danitra iny dia mbola ho avy tahaka ny nahitanareo Azy niakatra ho any an-danitra.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary izy ireo niverina tany Jerosalema, rehefa avy teo amin’ny tendrombohitra atao hoe Oliva, izay akaikin’i Jerosalema (araka izay mety haleha amin’ny Sabata). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary rehefa tafiditra izy, dia niakatra ho any an-trano ambony, izay fitoerany,–dia Petera sy Jaona sy Jakoba sy Andrea, Filipo sy Tomasy, Bartolomeo sy Matio. Jakoba '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zanak’i
    - type: text
      text: ' Alfeo, sy Simona Zelota ary Jodasy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zanak’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: rahalahin’.'
      marker-yv: yv-n
    - type: text
      text: 'i Jakoba. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ireo rehetra ireo niray saina naharitra nivavaka mbamin’ny vehivavy sy Maria, renin’i Jesosy, ary ny rahalahiny.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nifidianan’ny Apostoly ny anankiray ho namany hisolo an’i Jodasy.
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ARY tamin’izany andro izany dia nitsangana teo afovoan’ny rahalahy Petera (tokony ho roa-polo amby zato no isan’ny olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anarana.
      marker-yv: yv-n
    - type: text
      text: ' vory teo) ka nanao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ry rahalahy, tsy maintsy notanterahina ilay tenin’ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' nampilazain’ny Fanahy Masina rahateo an’i Davida ny amin’i Jodasy, izay tonga mpitarika ny olona nisambotra an’i Jesosy; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'fa izy dia isantsika ihany ka nahazo anjara tamin’izao fanompoana izao koa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa izany lehilahy izany dia nahazo saha tamin’ny tambin’ny fahotany; ary potraka niankohoka izy, dia vaky ny kibony ka nipoaka sady nivaroraka avokoa ny tsinainy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary fantatr’izay rehetra monina eto Jerosalema izany, ka ny anaran’izany saha izany amin’ny fiteniny dia atao hoe Akeldama, izany hoe Sahan-dra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'hatramin’ny andro nampiakarana Azy, rehefa nodidiany tamin’ny Fanahy Masina ny Apostoly izay nofidiny, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa voasoratra eo amin’ny Bokin’ny Salamo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Aoka ho lao ny fonenany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka tsy hisy olona honina ao’’ (Sal. 69.25);
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ary koa:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Aoka ho lasan’olon-kafa ny anjara-raharahany’’ (Sal. 109.8).'
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Koa amin’ireo lehilahy niaraka teto amintsika mandrakariva ireo, raha niditra sy nivoaka tamintsika Jesosy Tompo, '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: hatramin’ny batisan’i Jaona ka hatramin’ny andro nampiakarana Azy niala tamintsika, dia tokony hisy anankiray ho namantsika mba ho vavolombelon’ny nitsanganany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nanokana roa lahy izy, dia Josefa, atao hoe Barsabasy, izay atao hoe koa Josto, ary Matia. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nivavaka izy ka nanao hoe: Hianao, Tompo ô, Izay mahalala ny fon’ny olona rehetra, asehoy izay nofidinao amin’izy roa lahy ireto, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'mba hahazoany anjara amin’izao fanompoana sy ny mah’Apostoly izao, izay nialan’i Jodasy hankanesany any amin’ny fitoerany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia nanao filokana ho azy izy, ka latsaka tamin’i Matia ny filokana; ary izy no lany ho isan’ny Apostoly iraika ambin’ny folo lahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: sady niseho koa tamin’ny famantarana maro taorian’ny nijaliany fa velona Izy, ka niseho taminy efa-polo andro Izy ary nilaza ny amin’ny fanjakan’Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary raha niara-niangona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: niara-nihinana.
      marker-yv: yv-n
    - type: text
      text: ' teo aminy Jesosy, dia namepetra azy tsy hiala an’i Jerosalema, fa hiandry ny teny fikasan’ny Ray, izay efa renareo tamiko, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hoy Izy;
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: fa Jaona nanao batisa tamin’ny rano; fa hianareo kosa hatao batisa amin’ny Fanahy Masina, rehefa afaka andro vitsivitsy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa izay tafangona teo dia nanontany Azy hoe: Tompoko, amin’izao va no hampodianao ny fanjakana ho amin’ny Isiraely? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa hoy kosa Izy taminy: Tsy anareo ny hahalala ny andro na ny fotoana izay efa notendren’ny Ray amin’ny fahefany ihany.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izay nataon’ny Ray ho adidin’ny tenany ihany.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa hahazo hery hianareo amin’ny hilatsahan’ny Fanahy Masina aminareo, ary ho vavolombeloko any Jerosalema sy eran’i Jodia sy Samaria ary hatramin’ny faran’ny tany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary rehefa nilaza izany Jesosy, dia nakarina Izy, raha mbola nijery izy ireo; ary nisy rahona nitondra Azy, ka tsy hitan’ny masony intsony Izy. '
