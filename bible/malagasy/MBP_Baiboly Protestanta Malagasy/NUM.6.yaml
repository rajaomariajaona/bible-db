document_id: NUM.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny lalàna ny amin’ny mivoady ho Nazirita.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ary amin’ny andro fahavalo dia hitondra domohina roa na zana-boromailala roa ho eo amin’ny mpisorona, eo anoloan’ny varavaran’ny trano-lay fihaonana izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny mpisorona dia hanatitra ny anankiray ho fanatitra noho ny ota, ary ny anankiray kosa ho fanatitra dorana, dia hanao fanavotana ho azy, satria nanota ny amin’ny faty izy; ary hanamasina ny lohany amin’izany andro izany izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia hanokana ho an’i Jehovah ny androny fitokanany izy ka hitondra ondrilahy iray izay iray taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatramin’ny iray taona no ho midina.
      marker-yv: yv-n
    - type: text
      text: ' ho fanati-panonerana; fa ho very ny andro teo aloha, satria voaloto ny fitokanany'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary izao no lalàna ny amin’ny Nazirita: Rehefa tapitra ny andro fitokanany, dia ho entina ho eo anoloan’ny varavaran’ny trano-lay fihaonana izy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ary hanatitra ny fanatiny ho an’i Jehovah izy, dia ondrilahy iray izay iray taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatramin’ny iray taona no ho midina.
      marker-yv: yv-n
    - type: text
      text: ' tsy misy kilema ho fanatitra dorana, ary ondrivavy iray izay iray taona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatramin’ny iray taona no ho midina.
      marker-yv: yv-n
    - type: text
      text: ' tsy misy kilema ho fanatitra noho ny ota, ary ondrilahy iray tsy misy kilema ho fanati-pihavanana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary mofo tsy misy masirasira iray harona, dia mofo atao amin’ny koba tsara toto voaharo diloilo sy mofo manify tsy misy masirasira sady voahoso-diloilo, mbamin’ny fanatitra hohanina sy ny fanatitra aidina momba azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia haterin’ny mpisorona eo anatrehan’i Jehovah ireo; ary hateriny koa ny fanatiny noho ny ota sy ny fanatitra dorany; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: dia hateriny ny ondrilahy ho fanati-pihavanana ho an’i Jehovah mbamin’ny mofo tsy misy masirasira iray harona; ary haterin’ny mpisorona koa ny fanatitra hohaniny sy ny fanatitra aidiny.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary ny Nazirita hanaratra, ny lohany izay fitokanany eo anoloan’ny varavaran’ny trano-lay fihaonana, ary horaisiny ny volon-dohany fitokanany ka hataony eo amin’ny afo izay eo ambanin’ny fanati-pihavanana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia halain’ny mpisorona ny sorok’ondrilahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fe.
      marker-yv: yv-n
    - type: text
      text: ' izay efa masaka sy mofo iray tsy misy masirasira avy amin ny harona ary mofo manify iray tsy misy masirasira ka hataony eo amin’ny tànan’ny Nazirita, rehefa voaharatra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny lohany
    - type: text
      text: ' izay fitokanany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Raha misy lehilahy na vehivavy mivoady hitokana ho Nazirita mba hitokana ho an’i Jehovah, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia hahevahevan’ny mpisorona ireo ho fanatitra ahevaheva eo anatrehan’i Jehovah; ho masina izany ho an’ny mpisorona ho fanampin’ny tratra ahevaheva sy ny soroka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fe.
      marker-yv: yv-n
    - type: text
      text: ' asandratra; ary rehefa afaka izany, dia vao mahazo misotro divay ny Nazirita.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izany no lalàna ny amin’ny Nazirita, izay mivoady hitondra fanatitra ho an’i Jehovah noho ny fitokanany, afa-tsy izay zavatra hafa tratry ny ananany; araka ny voady izay nivoadiany no hataony, araka ny lalàna ny amin’ny fitokanany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny tso-drano fanaon’ny mpisorona.
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mitenena amin’i Arona sy ny zanany hoe: Izao no teny ho entinareo mitso-drano ny Zanak’Isiraely:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Hitahy anao anie Jehovah ka hiaro anao;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hampamirapiratra ny tavany aminao anie Jehovah ka hamindra fo aminao;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Hanandratra ny tavany aminao anie Jehovah ka hanome anao fiadanana.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia hametraka ny anarako amin’ny Zanak’Isiraely izy; ary Izaho hitahy azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'dia hifady divay sy toaka izy; tsy hisotro divay efa maharikivy na toaka efa maharikivy izy, ary tsy hisotro ranom-boaloboka izy, na hihinana voaloboka akory, na ny lena, na ny maina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Amin ny andro fitokanany rehetra dia tsy hihinana izay atao amin’ny voaloboka hatramin’ny voany ka hatramin’ny hodiny izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Amin’ny andro rehetra izay nivoadiany hitokana dia tsy hokasihin-kareza ny lohany; mandra-pahatapitry ny andro izay nitokanany ho an’i Jehovah dia ho masina izy, ka havelany haniry ny volon-dohany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Amin’ny andro rehetra izay itokanany ho an’i Jehovah dia tsy hiditra am-paty izy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'aoka tsy handoto tena izy na dia amin’ny rainy, na ny reniny, na ny rahalahiny, na ny anabaviny aza, raha maty ireo, satria eo amin’ny lohany ny fitokanana ho an’Andriamaniny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Amin’ny andro fitokanany rehetra dia ho masina ho an’i Jehovah izy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary raha misy olona maty tampoka eo anilany ka mandoto ny lohany izay fitokanany dia hanaratra ny lohany amin’ny andro fanadiovana azy izy, dia amin’ny andro fahafito no hanaratany azy; '
