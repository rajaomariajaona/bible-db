document_id: JHN.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampahiratan’i Jesosy an-dralehilahy teraka jamba.
  - type: text
    content: 'ARY raha nandalo Jesosy, dia nahita lehilahy jamba hatry ny fony vao teraka. '
  '10':
  - type: text
    content: 'Dia hoy ny olona taminy: Ahoana no nahiratan’ny masonao? '
  '11':
  - type: text
    content: 'Ary izy namaly ka nanao hoe: Ilay Lehilahy atao hoe Jesosy no nanao feta, dia nanosotra ny masoko ka nanao tamiko hoe: Mankanesa any Siloama, ka sasao '
  - type: text
    content: ny masonao;
  - type: text
    content: ' koa nandeha aho, dia nanasa '
  - type: text
    content: azy,
  - type: text
    content: ' ka dia nahiratra. '
  '12':
  - type: text
    content: 'Ary hoy ny olona taminy: Aiza moa izany Lehilahy izany? Hoy ralehilahy: Tsy fantatro.'
  '13':
  - type: text
    content: 'Ary ilay jamba taloha dia nentiny tany amin’ny Fariseo. '
  '14':
  - type: text
    content: 'Ary tamin’ny andro Sabata no nanaovan’i Jesosy ny feta sy nampahiratany ny mason-dralehilahy. '
  '15':
  - type: text
    content: 'Ary ny Fariseo koa nanontany azy izay nahiratan’ny masony. Dia hoy izy taminy: Nasiany feta ny masoko, dia nosasako, ka nahiratra aho. '
  '16':
  - type: text
    content: 'Ary hoy ny Fariseo sasany: Tsy avy amin’Andriamanitra izany Lehilahy izany, satria tsy mitandrina ny Sabata Izy. Hoy ny sasany: Hataon’ny lehilahy mpanota ahoana no fahay manao fahagagana toy izany? Dia nisara-tsaina izy. '
  '17':
  - type: text
    content: 'Ary hoy indray izy tamin’ilay jamba: Ahoana no ilazanao Azy, fa nampahiratra ny masonao Izy? Dia hoy izy: Mpaminany Izy.'
  '18':
  - type: text
    content: 'Ary amin’izany ny Jiosy tsy nino azy ho efa jamba ka nahiratra, ambara-piantsony ny ray aman-drenin’ilay nahiratra '
  '19':
  - type: text
    content: 'ka nanontaniany hoe: Zanakareo moa ity, izay lazainareo fa teraka jamba? Koa nanao ahoana ary no nahiratany izao? '
  '2':
  - type: text
    content: 'Ary ny mpianany nanontany Azy hoe: Raby ô, iza moa no nanota, io lehilahy io va, sa ny ray aman-dreniny, no dia teraka jamba izy? '
  '20':
  - type: text
    content: 'Ny ray aman-dreniny namaly ka nanao hoe: Fantatray fa zanakay ity sady teraka jamba; '
  '21':
  - type: text
    content: 'fa tsy fantatray izay nahiratany izao; ary tsy fantatray izay nampahiratra ny masony; izy ihany no anontanio; efa lehibe izy, aoka izy no hilaza ny amin’ny tenany. '
  '22':
  - type: text
    content: 'Izany teny izany no nolazain’ny ray aman-dreniny, satria natahotra ny Jiosy izy; fa efa nifanaiky rahateo ny Jiosy fa raha misy manaiky Azy ho Kristy, dia horoahina hiala amin’ny synagoga. '
  '23':
  - type: text
    content: 'Izany no nilazan’ny ray aman-dreniny hoe: Efa lehibe izy, koa izy no anontanio.'
  '24':
  - type: text
    content: 'Dia niantso ilay jamba teo aloha indray izy ka nanao taminy hoe: Omeo voninahitra Andriamanitra; izahay mahalala fa mpanota izany Lehilahy izany. '
  '25':
  - type: text
    content: 'Fa izy namaly hoe: Tsy fantatro na mpanota Izy, na tsia; zavatra iray loha ihany no fantatro: jamba aho teo aloha, fa mahiratra aho izao.'
  '26':
  - type: text
    content: 'Dia hoy izy taminy: Inona no nataony taminao? Nanao ahoana ange no nampahiratany ny masonao? '
  '27':
  - type: text
    content: 'Dia namaly azy hoe izy: Efa voalazako taminareo rahateo, fa tsy nihaino hianareo; nahoana no te-hihaino indray hianareo? Moa te-ho mpianany koa va hianareo? '
  '28':
  - type: text
    content: 'Dia nanevateva azy izy ka nanao hoe: Ialahy no mpianany; fa izahay mpianatr’i Mosesy. '
  '29':
  - type: text
    content: Izahay mahalala fa Mosesy no nitenenan’Andriamanitra; fa ny amin’izany Lehilahy izany, dia tsy fantatray izay nihaviany.
  '3':
  - type: text
    content: 'Jesosy namaly hoe: Tsy io lehilahy io no nanota, na ny ray aman-dreniny, fa ny hanehoana ny asan’Andriamanitra eo aminy. '
  '30':
  - type: text
    content: 'Ralehilahy namaly azy hoe: Mba mahagaga tokoa lahy izany! fa tsy fantatrareo izay nihaviany, nefa nampahiratra ny masoko Izy. '
  '31':
  - type: text
    content: 'Fantatsika fa Andriamanitra tsy mihaino ny mpanota; fa izay mivavaka aminy sy manao ny sitrapony no henoiny. '
  '32':
  - type: text
    content: 'Hatrizay hatrizay dia tsy mbola re fa nisy nampahiratra ny mason’izay teraka jamba. '
  '33':
  - type: text
    content: 'Raha tsy avy amin’Andriamanitra izany Lehilahy izany, dia tsy mahefa na inona na inona Izy. '
  '34':
  - type: text
    content: 'Ary namaly ireo ka nanao taminy hoe: Tena teraka tamin’ny ota ialahy, ka ialahy indray va mampianatra anay? Dia noroahiny izy.'
  '35':
  - type: text
    content: 'Jesosy nandre fa efa noroahiny ralehilahy; ary rehefa nahita azy Izy, dia nanao hoe: Mino ny Zanak’Andriamanitra va hianao? '
  '36':
  - type: text
    content: 'Ralehilahy namaly ka nanao hoe: Iza moa no Izy, Tompoko, mba hinoako Azy? '
  '37':
  - type: text
    content: 'Hoy Jesosy taminy: Efa nahita Azy hianao, sady Izay miresaka aminao izao no Izy. '
  '38':
  - type: text
    content: 'Ary hoy izy: Tompoko, mino aho. Dia niankohoka teo anatrehany izy.'
  '39':
  - type: text
    content: 'Ary hoy Jesosy: Ho fitsarana no nahatongavako amin’izao tontolo izao, mba hahiratra ny tsy mahiratra, ary mba ho tonga jamba kosa ny mahiratra.'
  '4':
  - type: text
    content: 'Isika tsy maintsy manao ny asan’Izay naniraka Ahy, raha mbola antoandro; avy ny alina, ka tsy mahazo miasa ny olona. '
  '40':
  - type: text
    content: 'Ary ny Fariseo sasany izay teo aminy, nony nandre izany, dia nanao taminy hoe: Izahay koa va mba jamba? '
  '41':
  - type: text
    content: 'Hoy Jesosy taminy: Raha jamba hianareo, dia tsy ho nanan-keloka; nefa hoy hianareo ankehitriny: Mahiratra izahay; dia tsy afaka ny helokareo.'
  '5':
  - type: text
    content: Raha amin’izao tontolo izao Aho, dia fahazavan’izao tontolo izao.
  '6':
  - type: text
    content: 'Rehefa nilaza izany Izy, dia nandrora tamin’ny tany ka nanao feta tamin’ny rora, dia nahosony ny mason’ilay jamba. '
  '7':
  - type: text
    content: 'Ary hoy Izy taminy: Andeha, sasao '
  - type: text
    content: ny masonao
  - type: text
    content: ' any amin’ny farihy Siloama (izay atao hoe, raha adika, Nirahina). Dia lasa izy ka nanasa, dia niverina nahiratra.'
  '8':
  - type: text
    content: 'Koa izay nifanolotra taminy sy izay nahita azy fa mpangataka izy taloha dia nanao hoe: Tsy ity va ilay nipetraka nangataka? '
  '9':
  - type: text
    content: 'Hoy ny sasany: Izy ity, fa hoy ny sasany: Tsia, fa tahaka azy ihany; ary hoy kosa izy: Izaho no izy. '
