document_id: LAM.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Alahelo noho ny nanjo ny Joda sy Jerosalema.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: INDRISY, mitoetra manirery izao ilay tanàna feno olona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tonga toy ny mpitondratena izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay nalaza tamin’ny firenena sy andriambavy tamin’ny tany samy hafa dia efa miankin-doha kosa izao!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahavalo naninjitra ny tànany naka ny zava-tsoany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny jentilisa, izay noraranao tsy hiditra amin’ny fiangonanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitany tafiditra ao amin’ny fitoerany masina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misento ny olony rehetra, mitady hanina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, atakalony hanina ny zava-tsoany hamelombelona ny ainy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, jereo ka diniho, fa vingavingaina aho.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy mampaninona anareo va, ry mpandalo rehetra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo sy izahao raha mba misy fahoriana toy ny fahoriako, izay namelezany ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay nampahorian’i Jehovah ahy tamin’ny andro firehetan’ny fahatezerany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy tany amin’ny avo no nandatsahany afo ho amin’ny taolako handoroany azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namela-pandrika harato haningorana ny tongotro Izy ka nampihemotra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahalao sy nampahareraka ahy mandritra ny andro Izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ziogan’ny fahotako nofehezin’ny tànany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voaolana ireny ka tonga eo an-katoko; noketrahiny ny heriko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Natolotry ny Tompo ho eo an-tànan izay tsy leoko aho.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataon’ny Tompo tsinontsinona ny maheriko rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanendry fotoana hamelezana ahy Izy, handringanana ny zatovoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Tompo nanosihosy an’i Joda zanakavavy virijina toy ny eo amin’ny famiazam-boaloboka.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany zavatra izany no mampitomany ahy; e! ny masoko, ny masoko mamarin-dranomaso,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lavitra ahy ny mpampionona izay tokony hamelombelona ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ringana ny zanako, fa mahery ny fahavalo.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ziona mananty tànana, nefa tsy misy mampionona azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah nandidy ny amin’i Jakoba mba ho tonga fahavalony ny manodidina azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerosalema dia tonga fahavetavetana eo afovoan’ireo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina Jehovah, fa efa nandà ny teniny aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry firenena rehetra, masina hianareo, mba jereo ny fahoriako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasan-ko babo ny virijinako sy ny zatovoko.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nantsoiko ireo tia ahy, fa nofitahiny aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpisoroko sy ny loholoko niala aina tao an-tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny nitadiavany hanina hamelombelona ny ainy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitomany dia mitomany izy nony alina, ary ny ranomasony dia eny an-takolany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra tia azy dia tsy misy mampionona azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sakaizany rehetra efa nivadika taminy ka tonga fahavalony.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izahao, Jehovah ô, fa azom-pahoriana aho, mandevilevy ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miontana ato anatiko ny foko, fa naditra dia naditra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny ivelany dia ny sabatra no mahafoana anaka, ary ao an-trano dia toa misy fahafatesana kosa.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reny fa misento aho; tsy misy mampionona ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahavaloko rehetra nandre ny fahoriako, ka faly izy, satria Hianao no nanao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahatonga izay andro nantsoinao Hianao, ka dia ho tonga tahaka ahy koa ireo.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho tonga eo anatrehanao ny faharatsiany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mba ataovy aminy kosa tahaka izay nataonao tamiko noho ny fahotako rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa imbetsaka ny fisentoako, ka reraka ny foko.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lasan-ko babo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lasa nivahiny.
      marker-yv: yv-n
    - type: text
      text: ' ny Joda noho ny fahoriana sy ny haben’ny fanompoana;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipetraka ao amin’ny jentilisa izy, nefa tsy mahita fitsaharana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra nanenjika azy dia nahatratra azy teo an-ketena.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ireo làlana mankany Ziona dia mitomany, satria tsy misy miakatra ho amin’ny fotoam-pivavahana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rava.
      marker-yv: yv-n
    - type: text
      text: ' ny vavahadiny rehetra, misento ny mpisorony;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ory ny virijinany, ary Ziona dia efa azon’ny fahoriana mangidy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rafiny no mpanapaka,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: loha.
      marker-yv: yv-n
    - type: text
      text: ' ny fahavalony no miadana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria Jehovah no efa nampahory azy noho ny hamaroan’ny fahotany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanany madinika dia lasan-ko babo eo anoloan’ny fahavalony,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny voninahitr’i Ziona zanakavavy rehetra dia efa tsy ananany intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpanapaka azy dia toy ny diera tsy mahita ahitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandeha reraka eo anoloan’ny mpanenjika azy izy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsaroan’i Jerosalema amin’ny andro fahoriany sy fanjenjenany ny zava-tsoa rehetra izay nananany hatry ny ela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nony naripaky ny fahavalo ny olony, ka tsy nisy namonjy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nahita azy ny fahavalo ka nihomehy ny faharavany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fitsaharany.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanota dia nanota Jerosalema, ka izany no nahatonga azy ho fahavetavetana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra nanaja azy dia mamingavinga azy, satria efa nahita ny fitanjahany ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, na ny tenany aza dia miferinaina sady miamboho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lotony dia teo amin’ny moro-ntongotr’akanjony, tsy nitsapa farany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mahagaga ny fietreny, tsy misy mampionona azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, jereo ny fahoriako, fa mirehareha ny fahavalo.
