document_id: EZK.33,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananterana ny nanendrena an’i Ezekiela ho mpaminany.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Ary hianao, ry zanak’olona, mitenena amin’ny taranak’Isiraely hoe: Izao no fiteninareo: Eto aminay ny fahadisoanay sy ny fahotanay, ka mihalevona amin’izany izahay, dia nahoana no mbola velona izahay? '
  '11':
  - type: text
    content: 'Lazao aminy hoe: Raha velona koa Aho, hoy Jehovah Tompo, dia tsy sitrako ny hahafatesan’ny ratsy fanahy, fa ny hialan’ny ratsy fanahy amin’ny làlany, mba ho velona izy. Mialà, mialà amin’ny làlan-dratsinareo, fa nahoana moa no te-ho faty hianareo, ry taranak’Isiraely?'
  '12':
  - type: text
    content: 'Ary hianao, ry zanak’olona’ lazao amin’ny zanaky ny firenenao hoe: Ny fahamarinan’ny marina tsy hahavonjy azy, raha mby amin’ny andro ahadisoany; ary ny faharatsian’ny ratsy fanahy tsy hahavoa azy, raha mby amin’ny andro ialany amin’ny faharatsiany; ary ny marina tsy ho velona noho ny fahamarinany, raha mby amin’ny andro anotany. '
  '13':
  - type: text
    content: 'Raha lazaiko amin’ny marina hoe: Ho velona tokoa hianao,'
  - type: note
    content: Heb. izy.
  - type: text
    content: ' nefa izy mitoky amin’ny fahamarinany ka manao meloka, dia tsy hotsarovana ny fahamarinana rehetra izay nataony, fa ny heloka nataony no hahafaty azy. '
  '14':
  - type: text
    content: 'Ary koa, raha hoy Izaho kosa amin’ny ratsy fanahy: Ho faty tokoa hianao,'
  - type: note
    content: Heb. hananatra.
  - type: text
    content: ' nefa miala amin’ny fahotany izy sady manao izay marina sy mahitsy '
  '15':
  - type: text
    content: 'ka mamerina ny natao tsatòka sady mampody izay nangalariny ary mandeha araka ny didy mahavelona ka tsy manao meloka, dia ho velona tokoa izy, fa tsy ho faty. '
  '16':
  - type: text
    content: Ny fahotana rehetra izay nataony dia tsy hotsarovana aminy intsony; manao izay marina sy mahitsy izy, ka dia ho velona tokoa.
  '17':
  - type: text
    content: 'Kanefa, hoy ny zanaky ny firenenao: Tsy marina ny fitondran’'
  - type: note
    content: Heb. làlan’.
  - type: text
    content: ' ny Tompo; nefa ny fitondran’'
  - type: note
    content: Heb. làlan’.
  - type: text
    content: ' ny tenany no tsy marina. '
  '18':
  - type: text
    content: 'Raha ny marina miala amin’ny fahamarinany ka manao meloka, dia ho faty amin’izany izy. '
  '19':
  - type: text
    content: 'Ary raha ny ratsy fanahy miala amin’ny faharatsiany ka manao izay marina sy mahitsy, dia ho velona amin’izany izy. '
  '2':
  - type: text
    content: 'Ry zanak’olona, mitenena amin’ny zanaky ny firenenao, ka lazao aminy hoe: Raha mahatonga sabatra amin’ny tany anankiray Aho, ary ny tompon-tany maka lehilahy anankiray ao aminy ka manendry azy ho mpitily, '
  '20':
  - type: text
    content: 'Kanefa, hoy hianareo: Tsy marina ny fitondran’'
  - type: note
    content: Heb. làlan’.
  - type: text
    content: ' ny Tompo. He! ry taranak’Isiraely, samy hotsaraiko araka ny alehany avy hianareo.'
  - type: heading
    content: Ny nisokafan’ny vavan’i Ezekiela taorian’ny nandravana an’i Jerosalema haminany izay mbola hanjo ny Isiraely noho ny tsi-fibebahany.
  '21':
  - type: text
    content: 'ARY nony tamin’ny andro fahadimy tamin’ny volana fahafolo tamin’ny taona faharoa ambin’ny folo taorian’ny namaboana antsika, dia nisy olona efa nandositra avy tany Jerosalema tonga tao amiko ka nanao hoe: Afaka ny tanàna. '
  '22':
  - type: text
    content: Dia efa tonga tamiko ny tànan’i Jehovah tamin’ny omaly harivan’ny andro nahatongavan’ilay nandositra izay tonga tao amiko, ka nosokafany ny vavako mandra-pahatongan’ilay nandositra, izay tonga tao amiko nony maraina; dia efa nisokatra ny vavako, ka tsy moana intsony aho.
  '23':
  - type: text
    content: 'Dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '24':
  - type: text
    content: 'Ry zanak’olona, ny monina amin’ireny rava amin’ny tanin’ny Isiraely ireny dia manao hoe: Irery ihany Abrahama, nefa nandova ny tany izy; fa isika kosa dia maro, ary omena antsika ny tany ho lovantsika. '
  '25':
  - type: text
    content: 'Koa lazao aminy hoe: Izao no lazain’i Jehovah Tompo: Homan-javatra misy ra sady miandrandra ny sampinareo hianareo ary mandatsa-dra,–moa hahazo handova ny tany va hianareo? '
  '26':
  - type: text
    content: 'Mitoky amin’ny sabatrareo hianareo sady manao fahavetavetana, ka samy mandoto ny vadin’ny namany avy; koa hahazo handova ny tany va hianareo? '
  '27':
  - type: text
    content: 'Izao no holazainao aminy: Izao no lazain’i Jehovah Tompo: Raha velona koa Aho, dia tsy maintsy ho lavon’ny sabatra izay ao amin’ny tanàna rava, ary izay any an-tsaha dia homeko ho rembin’ny bibi-dia, ary izay ao amin’ny harambato'
  - type: note
    content: Heb. fiarovana.
  - type: text
    content: ' sy amin’ny lava-tany dia ho fatin’ny areti-mandringana. '
  '28':
  - type: text
    content: 'Fa hataoko rava sy lao ny tany, ary hitsahatra ny fiavonavonan’ny heriny; ho lao ny tendrombohitry ny Isiraely, ka tsy hisy mpandia azy. '
  '29':
  - type: text
    content: Dia ho fantany fa Izaho no Jehovah, raha hataoko rava sy lao ny tany noho ny fahavetavetana nataony.
  '3':
  - type: text
    content: ary hitan-dralehilahy fa, indro, avy ny sabatra, ka mitsoka ny anjomara hampitaitra
  - type: note
    content: Heb. hananatra.
  - type: text
    content: ' ny olona izy, '
  '30':
  - type: text
    content: 'Ary hianao, ry zanak’olona, ny zanaky ny firenenao dia miresaka anao eny am-bodi-rindrina sy eo am-baravaran’ny tranony, ka samy manao amin’ny rahalahiny hoe: Andeha isika, ary aoka handre izay teny avy amin’i Jehovah. '
  '31':
  - type: text
    content: Dia mankao aminao tahaka ny fihavin’ny olona izy ka mipetraka eo anatrehanao toa oloko ary mahare ny teninao, nefa tsy mety mankatò azy; fa, indro, teny mamy no lazain’ny vavany,
  - type: note
    content: 'Na: izay mamy am-bavany no lazainy; na: kalokalo no ataon’ny vavany.'
  - type: text
    content: ' nefa ny fony dia lasa manaraka ny filan-karena. '
  '32':
  - type: text
    content: Koa, indro, hianao dia ataony ho tahaka ny mpanao hira mahafinaritra,
  - type: note
    content: 'Na: kalokalo.'
  - type: text
    content: ' izay tsara feo sady mahay mitendry; fa mandre ny teninao izy, nefa tsy mety mankatò azy. '
  '33':
  - type: text
    content: Ary nony tanteraka izany (indro, efa ho tanteraka ihany), dia ho fantany fa efa nisy mpaminany tokoa tao aminy.
  '4':
  - type: text
    content: 'nefa tsy mety taitra izay mandre ny feon’ny anjomara, dia tonga ny sabatra ka mandripaka azy,–dia ho eo an-dohany ihany ny rany. '
  '5':
  - type: text
    content: Nandre ny feon’ny anjomara ihany izy, nefa tsy nety taitra;
  - type: note
    content: Heb. tsy nino anatra.
  - type: text
    content: ' ho ao aminy ihany ny rany; fa raha nety taitra izy, dia ho nahavonjy ny ainy ihany. '
  '6':
  - type: text
    content: Fa raha hitan’ilay mpitily kosa fa, indro, avy ny sabatra, nefa tsy nitsoka ny anjomara izy, ka tsy notairina ny olona, ary tonga ny sabatra ka mandringana olona ao aminy, dia matin’ny helony ihany iny; nefa ny rany dia hadiniko amin’ny tànan’ilay mpitily.
  '7':
  - type: text
    content: 'Koa hianao, ry zanak’olona, dia efa notendreko ho mpitily ho an’ny taranak’Isiraely, ka raha mandre ny teny aloaky ny vavako hianao, dia izany no ho entinao mananatra azy. '
  '8':
  - type: text
    content: 'Raha hoy Izaho amin’ny ratsy fanahy: He! ry ilay ratsy fanahy, ho faty tokoa hianao! nefa tsy mety mananatra azy hianao hiala amin’ny alehany, dia ho fatin’ny helony ihany izany ratsy fanahy izany, fa ny rany dia hadiniko amin’ny tànanao. '
  '9':
  - type: text
    content: Fa raha mananatra ny ratsy fanahy ihany kosa hianao hiala amin’ny làlany ratsy; fa izy no tsy mety miala amin’izany, dia ho fatin’ny helony ihany izy, nefa voavonjinao ny ainao.
