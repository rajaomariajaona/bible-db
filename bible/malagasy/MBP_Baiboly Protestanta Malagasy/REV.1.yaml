document_id: REV.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarihan-teny.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'NY Fanambaran’i Jesosy Kristy, izay nomen’Andriamanitra Azy, mba hasehony amin’ny mpanompony izay zavatra tsy maintsy ho tonga faingana; ary naniraka ny anjeliny Izy hanambara amin’i Jaona mpanompony, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: izay nanambara ny tenin’Andriamanitra sy ny filazana an’i Jesosy Kristy, dia ny zavatra rehetra izay efa hitany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sambatra izay mamaky sy ny mihaino ny tenin’ity faminaniana ity ka mitandrina izay voasoratra ato anatiny; fa antomotra ny andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jaona mamangy ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' fito any Asia: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Ilay ankehitriny sy taloha ary ho avy; ary avy amin’ny Fanahy fito izay eo anoloan’ny seza fiandrianany; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary avy amin’i Jesosy Kristy, Vavolombelona marina sy Lahimatoa amin’ny maty ary Lehiben’ny mpanjaka amin’ny tany.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ho an’Izay tia antsika ka namaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[nanasa].'
    marker-yv: yv-n
  - type: text
    text: ' antsika ho afaka amin’ny fahotantsika tamin’ny rany, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: sady efa nanao antsika ho fanjakana, dia mpisorona ho an’Andriamanitra Rainy,–ho Azy anie ny voninahitra sy ny fanjakana mandrakizay mandrakizay. Amena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro Izy avy amin’ny rahona; ary ny maso rehetra hahita Azy, na dia izay nandefona Azy aza; ary hitomany Azy ny firenena rehetra ambonin’ny tany. Eny, Amena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izaho no Alfa sy Omega, hoy ny Tompo Andriamanitra, Ilay ankehitriny sy taloha ary ho avy, dia ny Tsitoha.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fisehoan’ny voninahitr’i Kristy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'IZAHO Jaona, rahalahinareo sy namanareo amin’ny fahoriana ary amin’ny fanjakana sy ny faharetana ao amin’i Jesosy, dia tao amin’ny nosy atao hoe Patmo noho ny tenin’Andriamanitra sy ny filazana an’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voatsindrin’ny Fanahy tamin’ny Andron’ny Tompo aho ka nahare feo mahery teo ivohoko, toy ny feon’ny trompetra, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'nanao hoe: Izay zavatra hitanao dia soraty eo amin’ny boky, ka ampitondray ho any amin’ny fiangonana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' fito, dia ho any Efesosy sy Smyrna sy Pergamosy sy Tyatira sy Sardisy sy Filadelfia ary Laodikia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nitodika aho nizaha ilay feo niteny tamiko. Koa rehefa nitodika aho, dia nahita fanaovan-jiro volamena fito; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary teo afovoan’ny fanaovan-jiro dia nisy Anankiray tahaka ny Zanak’olona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toa zanak’olona.
    marker-yv: yv-n
  - type: text
    text: ' niakanjo akanjo lava hatrany an-tongony sady nisikina fisikinam-bolamena teo amin’ny tratrany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny lohany sy ny volony dia fotsy tahaka ny volon’ondry fotsy, dia tahaka ny orampanala, ary ny masony tahaka ny lelafo; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary ny tongony tahaka ny varahina manganohano, hoatra ilay voadio teo amin’ny fandrendrehana iny; ary ny feony toy ny firohondrohon’ny rano be. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nitana kintana fito teny an-tànany ankavanana Izy; ary nisy sabatra maranitra roa lela nivoaka avy teo am-bavany; ary ny tarehiny dia tahaka ny masoandro mamirapiratra amin’ny heriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha nahita Azy aho, dia lavo niankohoka tahaka ny maty teo anoloan’ny tongony. Fa Izy nanendry ahy tamin’ny tànany ankavanana ka nanao hoe: Aza matahotra; Izaho no Voalohany sy Farany, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia Ilay velona; efa maty Aho, nefa, indro, velona mandrakizay mandrakizay sady manana ny fanalahidin’ny fahafatesana sy ny fiainan-tsi-hita.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hadesy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa soraty izay zavatra efa hitanao, na izay zavatra ankehitriny, na izay zavatra mbola ho avy rahatrizay, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: dia ny zava-miafina ny amin’ny kintana fito izay efa hitanao teny an-tànako ankavanana sy ny fanaovan-jiro volamena fito. Ny kintana fito dia ny anjelin’ny fiangonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' fito: ary ny fanaovan-jiro fito dia fiangonana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' fito.'
