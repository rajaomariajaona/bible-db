document_id: HAB.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nilazan’i Jehovah tamin’ny mpaminany ny amin’ny handringanana ny Kaldeana.
  - type: text
    content: HITSANGANA eo ambonin’ny fitazanako aho
  - type: text
    content: Ary hijoro eo ambonin’ny mànda,
  - type: text
    content: Hiandry hahitako izay holazainy amiko
  - type: text
    content: Sy izay havaliko amin’ny fitarainako.
  '10':
  - type: text
    content: Efa namoron-tsaina izay hahatonga henatra ho an’ny taranakao hianao,
  - type: text
    content: Dia ny handringanana firenena maro;
  - type: text
    content: Ary nankahà-doza hihatra amin’ny ainao hianao.
  '11':
  - type: text
    content: Fa hitaraina ny vato ao amin’ny rindrina,
  - type: text
    content: Ary ny sakamandimby ao amin’ny trano
  - type: note
    content: Heb. hazo.
  - type: text
    content: ' no hamaly azy.'
  '12':
  - type: text
    content: Lozan’izay manao vohitra amin’ny fandatsahan-dra
  - type: text
    content: Sy manorina tanàna amin’ny heloka!
  '13':
  - type: text
    content: Indro, tsy avy amin’i Jehovah, Tompon’ny maro, va
  - type: text
    content: No hiasan’ny olona ho an’ny afo,
  - type: text
    content: Sy hisasaran’ny firenena noho ny zava-poana?
  '14':
  - type: text
    content: Fa ny tany ho feno ny fahalalana ny voninahitr’i Jehovah,
  - type: text
    content: Toy ny fanaron’ny rano ny fanambanin’ny ranomasina.
  '15':
  - type: text
    content: Lozan’izay mampisotro divay ny namany–
  - type: text
    content: Dia hianao izay manampy fahatezerana–ka mampahamano azy,
  - type: text
    content: Mba hijery ny fitanjahany;
  '16':
  - type: text
    content: Efa feno henatra hianao, fa tsy voninahitra;
  - type: text
    content: Mba sotroy koa, ka mitanjaha;
  - type: note
    content: 'Na: aoka ho hita fa tsy voafora hianao.'
  - type: text
    content: Hatolotra anao ny kapoaka eny an-tànana ankavanan’i Jehovah,
  - type: text
    content: Ary fahamenarana no ho amin’ny voninahitrao.
  '17':
  - type: text
    content: Fa hanody anao ny loza natao tamin’i Libanona
  - type: text
    content: Sy ny fandringanana mahatahotra namelezana ny biby,–
  - type: text
    content: Noho ny ran’ny olona sy ny loza natao tamin’ny tany,
  - type: text
    content: Dia tamin’ny tanàna sy ny mponina rehetra ao aminy.
  '18':
  - type: text
    content: Mahasoa inona ny sarin-javatra voasokitra,
  - type: text
    content: No misokitra azy ny mpanao azy?
  - type: text
    content: Na ny sarin-javatra an-idina sy ny mpampianatra lainga,
  - type: text
    content: No matoky azy izay namorona azy
  - type: text
    content: Tamin’ny nanaovany sampy moana?
  '19':
  - type: text
    content: 'Lozan’izay manao amin’ny hazo hoe: Mifohaza!'
  - type: text
    content: 'Ary amin’ny vato moana hoe: Mitsangàna!'
  - type: text
    content: Hampianatra va ireo? He! voapetaka takela-bolamena sy volafotsy ihany izy,
  - type: text
    content: Nefa tsy misy fanahy akory ao anatiny.
  '2':
  - type: text
    content: 'Dia namaly ahy Jehovah ka nanao hoe:'
  - type: text
    content: Soraty ny fahitana, ka ataovy velona tsara ny soratra eo amin’ny fàfana,
  - type: text
    content: Mba ho azon’ny mihazakazaka hovakina aza.
  - type: note
    content: 'Na: Mba hihazakazahan’izay mamaky azy.'
  '20':
  - type: text
    content: Jehovah dia ao amin’ny tempoliny masina;
  - type: text
    content: Mangìna eo anatrehany, ry tany rehetra!
  '3':
  - type: text
    content: Fa ny fahitana dia mbola ho amin’ny fotoan’andro,
  - type: text
    content: Ary mikendry ny farany izy ka tsy ho diso;
  - type: text
    content: Eny, na dia mitaredretra aza izy, andraso ihany,
  - type: text
    content: Fa ho avy tokoa izy ka tsy hijanona.
  '4':
  - type: text
    content: Indro, feno avonavona ny fanahin’ireny, fa tsy mahitsy ao anatiny,
  - type: text
    content: Fa ny marina ho velon’ny finoany.
  - type: note
    content: 'Na: Fa ny marina amin’ny finoana no ho velona.'
  '5':
  - type: text
    content: Ary koa, mamitaka ny divay;
  - type: text
    content: Ny olona miavonavona tsy mba mahatoetra,
  - type: text
    content: Dia ilay mitanatana vava tahaka ny fiainan-tsi-hita,
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Eny, toy ny fahafatesana, ka tsy mety voky,
  - type: text
    content: Fa manangona ny firenena rehetra ho ao aminy
  - type: text
    content: Sy mamory ny olona rehetra ho ao aminy.
  '6':
  - type: text
    content: Tsy hanao oha-teny hamelezana azy va ireto rehetra ireto?
  - type: text
    content: Tsy hanao eson-teny sy fitenenana
  - type: note
    content: Heb. fampanonona.
  - type: text
    content: ' hanoherana azy va izy ka hanao hoe:'
  - type: text
    content: Lozan’izay mahery mandroaka ny tsy azy!
  - type: text
    content: Mandra-pahoviana!–dia ilay mivesatra ny zavatra nalaina ho tsatòka.
  '7':
  - type: text
    content: Tsy hitsangana tampoka va izay hanaikitra anao,
  - type: text
    content: Ary tsy hifoha va izay hanaitaitra anao,
  - type: text
    content: Ka ho babony hianao?
  '8':
  - type: text
    content: Fa efa namabo firenena maro hianao,
  - type: text
    content: Ka dia mba hobaboin’ny sisa rehetra amin’ny firenena kosa,
  - type: text
    content: Noho ny ran’ny olona sy ny fandozana natao tamin’ny tany,
  - type: text
    content: Dia tamin’ny tanàna sy ny mponina rehetra ao aminy.
  '9':
  - type: text
    content: Lozan’izay fatra-pila harena amin’ny tsy marina ho an’ny taranany,
  - type: text
    content: Hanaovany ny akaniny any amin’ny avo,
  - type: text
    content: Mba tsy ho tratry ny tànan’ny loza.
