document_id: HAB.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nilazan’i Jehovah tamin’ny mpaminany ny amin’ny handringanana ny Kaldeana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: HITSANGANA eo ambonin’ny fitazanako aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hijoro eo ambonin’ny mànda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiandry hahitako izay holazainy amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay havaliko amin’ny fitarainako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia namaly ahy Jehovah ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soraty ny fahitana, ka ataovy velona tsara ny soratra eo amin’ny fàfana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho azon’ny mihazakazaka hovakina aza.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mba hihazakazahan’izay mamaky azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny fahitana dia mbola ho amin’ny fotoan’andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mikendry ny farany izy ka tsy ho diso;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia mitaredretra aza izy, andraso ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho avy tokoa izy ka tsy hijanona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, feno avonavona ny fanahin’ireny, fa tsy mahitsy ao anatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny marina ho velon’ny finoany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa ny marina amin’ny finoana no ho velona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary koa, mamitaka ny divay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny olona miavonavona tsy mba mahatoetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay mitanatana vava tahaka ny fiainan-tsi-hita,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, toy ny fahafatesana, ka tsy mety voky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa manangona ny firenena rehetra ho ao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mamory ny olona rehetra ho ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy hanao oha-teny hamelezana azy va ireto rehetra ireto?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hanao eson-teny sy fitenenana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fampanonona.
    marker-yv: yv-n
  - type: text
    text: ' hanoherana azy va izy ka hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lozan’izay mahery mandroaka ny tsy azy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pahoviana!–dia ilay mivesatra ny zavatra nalaina ho tsatòka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy hitsangana tampoka va izay hanaikitra anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hifoha va izay hanaitaitra anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho babony hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa efa namabo firenena maro hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia mba hobaboin’ny sisa rehetra amin’ny firenena kosa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny ran’ny olona sy ny fandozana natao tamin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tamin’ny tanàna sy ny mponina rehetra ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lozan’izay fatra-pila harena amin’ny tsy marina ho an’ny taranany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanaovany ny akaniny any amin’ny avo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy ho tratry ny tànan’ny loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efa namoron-tsaina izay hahatonga henatra ho an’ny taranakao hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny handringanana firenena maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nankahà-doza hihatra amin’ny ainao hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa hitaraina ny vato ao amin’ny rindrina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sakamandimby ao amin’ny trano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hazo.
    marker-yv: yv-n
  - type: text
    text: ' no hamaly azy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lozan’izay manao vohitra amin’ny fandatsahan-dra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy manorina tanàna amin’ny heloka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, tsy avy amin’i Jehovah, Tompon’ny maro, va
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hiasan’ny olona ho an’ny afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hisasaran’ny firenena noho ny zava-poana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ny tany ho feno ny fahalalana ny voninahitr’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny fanaron’ny rano ny fanambanin’ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lozan’izay mampisotro divay ny namany–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianao izay manampy fahatezerana–ka mampahamano azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hijery ny fitanjahany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa feno henatra hianao, fa tsy voninahitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba sotroy koa, ka mitanjaha;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aoka ho hita fa tsy voafora hianao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatolotra anao ny kapoaka eny an-tànana ankavanan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahamenarana no ho amin’ny voninahitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa hanody anao ny loza natao tamin’i Libanona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fandringanana mahatahotra namelezana ny biby,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny ran’ny olona sy ny loza natao tamin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tamin’ny tanàna sy ny mponina rehetra ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mahasoa inona ny sarin-javatra voasokitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No misokitra azy ny mpanao azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny sarin-javatra an-idina sy ny mpampianatra lainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No matoky azy izay namorona azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny nanaovany sampy moana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lozan’izay manao amin’ny hazo hoe: Mifohaza!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’ny vato moana hoe: Mitsangàna!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampianatra va ireo? He! voapetaka takela-bolamena sy volafotsy ihany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy misy fanahy akory ao anatiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jehovah dia ao amin’ny tempoliny masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangìna eo anatrehany, ry tany rehetra!
