document_id: JDG.17,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanaovan’i Mika sarin-javatra hivavahana.
  - type: text
    content: 'NISY lehilahy tany amin’ny tany havoan’i Efraima, Mika no anarany. '
  '10':
  - type: text
    content: 'Dia hoy Mika taminy: Mitoera atỳ amiko hianao, ary aoka ho raiko sy ho mpisoroko, dia homeko sekely folo volafotsy isan-taona sy fitafiana ary hanina. Dia niditra ilay Levita. '
  '11':
  - type: text
    content: 'Ary nanaiky hitoetra tao amin-dralehilahy ilay Levita, ka dia tonga tahaka ny zanany izy. '
  '12':
  - type: text
    content: Dia natokan’
  - type: note
    content: Heb. nofenoiny ny tànany.
  - type: text
    content: ' i Mika ilay Levita, ka dia tonga mpisorony izy ary nitoetra tao an-tranon’i Mika. '
  '13':
  - type: text
    content: 'Dia hoy Mika: Fantatro izao fa hanisy soa ahy Jehovah, satria manana ity Levita ity ho mpisoroko aho.'
  '2':
  - type: text
    content: 'Ary hoy izy tamin’ny reniny: Ilay sekely volafotsy zato amby arivo nalaina taminao, izay nasianao ozona sady nolazainao teo anatrehako, indro, ato amiko ny vola; izaho no naka azy. Dia hoy ny reniny: Hotahin’i Jehovah anie ny zanako. '
  '3':
  - type: text
    content: 'Ary rehefa naveriny tamin’ny reniny ny sekely volafotsy zato amby arivo, dia hoy reniny: Atokako'
  - type: note
    content: 'Na: Efa natokako.'
  - type: text
    content: ' ho an’i Jehovah mihitsy ity vola avy amin’ny tànako ity ka hatolotro ho anao, ry zanako, hanaovana sarin-javatra voasokitra sy sarin-javatra an-idina, ary ankehitriny dia averiko ho aminao izy. '
  '4':
  - type: text
    content: 'Ary rehefa naveriny tamin-dreniny ny volafotsy, dia naka volafotsy roan-jato ny reniny, ka nomeny ny mpanao an-idina hataony sarin-javatra voasokitra sy sarin-javatra an-idina; dia natao tao an-tranon’i Mika izany. '
  '5':
  - type: text
    content: Ary nanana tranon’andriamanitra Mika sady efa nanao efoda sy terafima; ary ny zanany anankiray no natokany
  - type: note
    content: Heb. nofenoiny ny tànany.
  - type: text
    content: ' ka tonga mpisorony.'
  '6':
  - type: text
    content: 'Tamin’izany andro izany tsy nisy mpanjaka tamin’ny Isiraely: fa samy nanao izay nataony ho marina avy ny olona rehetra. '
  '7':
  - type: text
    content: 'Ary nisy zatovo avy any Betlehema-joda, tamin’ny fokon’i Joda, ary Levita izy sady nivahiny tao. '
  '8':
  - type: text
    content: 'Ary ralehilahy niala tao an-tanàna Betlehema-joda hivahiny any amin’izay azony hitoerana; ary nony nandeha izy, dia tonga tany amin’ny tany havoan’i Efraima tao an-tranon’i Mika. '
  '9':
  - type: text
    content: 'Ary hoy Mika taminy: Avy aiza moa hianao? Dia hoy kosa izy taminy: Levita avy any Betlehema-joda aho ka mandeha hivahiny eny amin’izay azoko hitoerena. '
