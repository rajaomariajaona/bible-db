document_id: JDG.17
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanaovan’i Mika sarin-javatra hivavahana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'NISY lehilahy tany amin’ny tany havoan’i Efraima, Mika no anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy izy tamin’ny reniny: Ilay sekely volafotsy zato amby arivo nalaina taminao, izay nasianao ozona sady nolazainao teo anatrehako, indro, ato amiko ny vola; izaho no naka azy. Dia hoy ny reniny: Hotahin’i Jehovah anie ny zanako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa naveriny tamin’ny reniny ny sekely volafotsy zato amby arivo, dia hoy reniny: Atokako'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Efa natokako.
    marker-yv: yv-n
  - type: text
    text: ' ho an’i Jehovah mihitsy ity vola avy amin’ny tànako ity ka hatolotro ho anao, ry zanako, hanaovana sarin-javatra voasokitra sy sarin-javatra an-idina, ary ankehitriny dia averiko ho aminao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa naveriny tamin-dreniny ny volafotsy, dia naka volafotsy roan-jato ny reniny, ka nomeny ny mpanao an-idina hataony sarin-javatra voasokitra sy sarin-javatra an-idina; dia natao tao an-tranon’i Mika izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary nanana tranon’andriamanitra Mika sady efa nanao efoda sy terafima; ary ny zanany anankiray no natokany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nofenoiny ny tànany.
    marker-yv: yv-n
  - type: text
    text: ' ka tonga mpisorony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tamin’izany andro izany tsy nisy mpanjaka tamin’ny Isiraely: fa samy nanao izay nataony ho marina avy ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy zatovo avy any Betlehema-joda, tamin’ny fokon’i Joda, ary Levita izy sady nivahiny tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ralehilahy niala tao an-tanàna Betlehema-joda hivahiny any amin’izay azony hitoerana; ary nony nandeha izy, dia tonga tany amin’ny tany havoan’i Efraima tao an-tranon’i Mika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Mika taminy: Avy aiza moa hianao? Dia hoy kosa izy taminy: Levita avy any Betlehema-joda aho ka mandeha hivahiny eny amin’izay azoko hitoerena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Mika taminy: Mitoera atỳ amiko hianao, ary aoka ho raiko sy ho mpisoroko, dia homeko sekely folo volafotsy isan-taona sy fitafiana ary hanina. Dia niditra ilay Levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nanaiky hitoetra tao amin-dralehilahy ilay Levita, ka dia tonga tahaka ny zanany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia natokan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nofenoiny ny tànany.
    marker-yv: yv-n
  - type: text
    text: ' i Mika ilay Levita, ka dia tonga mpisorony izy ary nitoetra tao an-tranon’i Mika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Mika: Fantatro izao fa hanisy soa ahy Jehovah, satria manana ity Levita ity ho mpisoroko aho.'
