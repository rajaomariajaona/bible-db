document_id: PSA.31
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainana nataon’izay tra-panenjehana mafy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH ô, Hianao no ialofako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy ho menatra akory mandrakizay aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo amin’ny fahamarinanao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Atongilano amiko ny sofinao; faingàna hamonjy ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho vatolampiko fiarovana mafy Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy batery fiarovana hamonjena ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa harambatoko sy batery fiarovana ho ahy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary noho ny anaranao no hitondranao sy hitarihanao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanafaka ahy amin’ny fandrika harato izay nafeniny hamandrihany ahy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no fiarovana mafy ho ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eo an-tànanao no atolotro ny fanahiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nanavotra ahy Hianao, Jehovah ô, Andriamanitry ny fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Halako izay mivavaka amin’ny sampy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zava-poana mandainga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah kosa no itokiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hifaly sy ho ravoravo amin’ny famindramponao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nahita ny fahantrako Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nahafantatra ny fahorian’ny fanahiko
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary tsy mba nangeja ahy teo an-tànan’ny fahavalo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nampitoetra ny tongotro eo amin’ny malalaka Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mamindrà fo amiko, Jehovah ô, fa azom-pahoriana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Simban’alahelo ny masoko sy ny fanahiko ary ny tenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa lanin’alahelo ny aiko, sady lanim-pisentoana ny taonako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manan-kery aho noho ny heloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa lany ny taolako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Noho ny ataon’ny fahavaloko rehetra dia efa tonga fandatsa aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia amin’ny namako aza, sady atahoran’ny olom-pantatro aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mahita ahy eny ivelany mandositra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Efa hadino tahaka ny olona maty izay tsy tsaroana intsony aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny vilany ariana aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa mandre ny endrikendriky ny maro aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy fampangorohoroana manodidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha miara-mioko hamely ahy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miray tetika hahafaty ny aiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nefa izaho matoky Anao, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy izaho: Andriamanitro Hianao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eo an-tànanao ny androko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho tsy ho azon’ny tànan’ny fahavaloko sy izay manenjika ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ampamirapirato amin’ny mpanomponao ny tavanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo amin’ny famindramponao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka tsy ho menatra aho, Jehovah ô, satria miantso Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aoka kosa ho menatra ny ratsy fanahy ka hangina any amin’ny fiainan-tsi-hita.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka hangina ny molotra mandainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay miteny sahisahy hanohitra ny marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny avonavona sy ny fanamavoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Akory re ny haben’ny zava-tsoanao voarakitrao ho an’ny matahotra Anao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay nataonao teo anatrehan’ny zanak’olombelona ho an’izay mialoka aminao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hanafina azy ao amin’ny fiafenana eo anatrehanao Hianao, mba tsy ho tratry ny teti-dratsy ataon’ny olona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampiery azy ao an-tranonao Hianao, mba tsy ho azon’ny lela mifanditra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Isaorana anie Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nataony mahagaga ny famindrampony tamiko tao an-tanàna mimànda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa hoy izaho tamin’ny fahatairako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voafongotra tsy ho eo imasonao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo nihaino ny feon’ny fifonako ihany Hianao, raha nitaraina taminao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tiava an’i Jehovah, ry olony masina rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miaro ny marina Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamaly dia mamaly ny mpiavonavona Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mahereza, ary aoka hatanjaka ny fonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianareo rehetra izay manantena an’i Jehovah.
