document_id: PSA.31,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana nataon’izay tra-panenjehana mafy.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: JEHOVAH ô, Hianao no ialofako;
  - type: text
    content: Aoka tsy ho menatra akory mandrakizay aho;
  - type: text
    content: Vonjeo amin’ny fahamarinanao aho.
  '10':
  - type: text
    content: Fa lanin’alahelo ny aiko, sady lanim-pisentoana ny taonako;
  - type: text
    content: Tsy manan-kery aho noho ny heloko,
  - type: text
    content: Ary efa lany ny taolako.
  '11':
  - type: text
    content: Noho ny ataon’ny fahavaloko rehetra dia efa tonga fandatsa aho,
  - type: text
    content: Eny, na dia amin’ny namako aza, sady atahoran’ny olom-pantatro aho;
  - type: text
    content: Izay mahita ahy eny ivelany mandositra ahy.
  '12':
  - type: text
    content: Efa hadino tahaka ny olona maty izay tsy tsaroana intsony aho;
  - type: text
    content: Tahaka ny vilany ariana aho.
  '13':
  - type: text
    content: Fa mandre ny endrikendriky ny maro aho;
  - type: text
    content: Misy fampangorohoroana manodidina,
  - type: text
    content: Raha miara-mioko hamely ahy izy
  - type: text
    content: Ka miray tetika hahafaty ny aiko.
  '14':
  - type: text
    content: Nefa izaho matoky Anao, Jehovah ô;
  - type: text
    content: 'Hoy izaho: Andriamanitro Hianao.'
  '15':
  - type: text
    content: Eo an-tànanao ny androko;
  - type: text
    content: Vonjeo aho tsy ho azon’ny tànan’ny fahavaloko sy izay manenjika ahy.
  '16':
  - type: text
    content: Ampamirapirato amin’ny mpanomponao ny tavanao;
  - type: text
    content: Vonjeo amin’ny famindramponao aho.
  '17':
  - type: text
    content: Aoka tsy ho menatra aho, Jehovah ô, satria miantso Anao;
  - type: text
    content: Fa aoka kosa ho menatra ny ratsy fanahy ka hangina any amin’ny fiainan-tsi-hita.
  - type: note
    content: Heb. Sheola.
  '18':
  - type: text
    content: Aoka hangina ny molotra mandainga,
  - type: text
    content: Izay miteny sahisahy hanohitra ny marina
  - type: text
    content: Amin’ny avonavona sy ny fanamavoana.
  '19':
  - type: text
    content: Akory re ny haben’ny zava-tsoanao voarakitrao ho an’ny matahotra Anao!
  - type: text
    content: Dia izay nataonao teo anatrehan’ny zanak’olombelona ho an’izay mialoka aminao!
  '2':
  - type: text
    content: Atongilano amiko ny sofinao; faingàna hamonjy ahy;
  - type: text
    content: Aoka ho vatolampiko fiarovana mafy Hianao
  - type: text
    content: Sy batery fiarovana hamonjena ahy.
  '20':
  - type: text
    content: Hanafina azy ao amin’ny fiafenana eo anatrehanao Hianao, mba tsy ho tratry ny teti-dratsy ataon’ny olona izy;
  - type: text
    content: Hampiery azy ao an-tranonao Hianao, mba tsy ho azon’ny lela mifanditra izy.
  '21':
  - type: text
    content: Isaorana anie Jehovah;
  - type: text
    content: Fa nataony mahagaga ny famindrampony tamiko tao an-tanàna mimànda.
  '22':
  - type: text
    content: Fa hoy izaho tamin’ny fahatairako;
  - type: text
    content: Voafongotra tsy ho eo imasonao aho;
  - type: text
    content: Kanjo nihaino ny feon’ny fifonako ihany Hianao, raha nitaraina taminao aho.
  '23':
  - type: text
    content: Tiava an’i Jehovah, ry olony masina rehetra;
  - type: text
    content: Miaro ny marina Jehovah,
  - type: text
    content: Ary mamaly dia mamaly ny mpiavonavona Izy.
  '24':
  - type: text
    content: Mahereza, ary aoka hatanjaka ny fonareo,
  - type: text
    content: Dia hianareo rehetra izay manantena an’i Jehovah.
  '3':
  - type: text
    content: Fa harambatoko sy batery fiarovana ho ahy Hianao;
  - type: text
    content: Ary noho ny anaranao no hitondranao sy hitarihanao ahy.
  '4':
  - type: text
    content: Hanafaka ahy amin’ny fandrika harato izay nafeniny hamandrihany ahy Hianao;
  - type: text
    content: Fa Hianao no fiarovana mafy ho ahy.
  '5':
  - type: text
    content: Eo an-tànanao no atolotro ny fanahiko;
  - type: text
    content: Fa efa nanavotra ahy Hianao, Jehovah ô, Andriamanitry ny fahamarinana.
  '6':
  - type: text
    content: Halako izay mivavaka amin’ny sampy;
  - type: note
    content: Heb. zava-poana mandainga.
  - type: text
    content: Fa Jehovah kosa no itokiako.
  '7':
  - type: text
    content: Hifaly sy ho ravoravo amin’ny famindramponao aho;
  - type: text
    content: Fa nahita ny fahantrako Hianao
  - type: text
    content: Ka nahafantatra ny fahorian’ny fanahiko
  '8':
  - type: text
    content: Ary tsy mba nangeja ahy teo an-tànan’ny fahavalo;
  - type: text
    content: Fa efa nampitoetra ny tongotro eo amin’ny malalaka Hianao.
  '9':
  - type: text
    content: Mamindrà fo amiko, Jehovah ô, fa azom-pahoriana aho;
  - type: text
    content: Simban’alahelo ny masoko sy ny fanahiko ary ny tenako.
