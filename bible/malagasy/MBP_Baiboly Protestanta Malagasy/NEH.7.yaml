document_id: NEH.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nataon’i Nehemia ny amin’ny fiambenana ny tanàna.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nony vita ny mànda, ka voalatsako ny lela-vavahady, sady voatendry ny mpiandry varavarana sy ny mpihira ary ny Levita, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia notendreko Hanany rahalahiko sy Hanania, lehiben’ny tao an-dapa, hitandrina an’i Jerosalema, fa lehilahy mahatoky izy sady matahotra an’Andriamanitra mihoatra noho ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa hoy izaho tamin’ireo: Aza avela hovohana ny vavahadin’i Jerosalema mandra-pahafanan’ny andro; ary raha mbola mijanona eo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny mpiambina
  - type: text
    text: ', dia aoka harindriny ny varavarana, ka hidionareo; ary manendre mpiambina avy amin’izay monina ato Jerosalema ihany samy ho eo amin’ny fiambenany avy, dia samy ho eo amin’ny tandrifin’ny tranony avy.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny anaran’ny Jiosy izay nentin’i Zerobabela avy tany Babylona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ARY malalaka sy lehibe ny tanàna, nefa vitsy olona, sady tsy mbola vita ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nomen’Andriamanitro hevitra aho hamory ny manan-kaja sy ny mpanapaka mbamin’ny vahoaka, mba halaina isa araka ny firazanany avy ireo. Ary hitako ny taratasy filazana ny firazanan’izay niakatra voalohany, ka izao no hitako voasoratra tao:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lehilahy amin’izany tany izany, izay niakatra avy tamin’ny fahababoana, dia ireo nobaboin’i Nebokadnezara, mpanjakan’i Babylona, fa niverina tany Jerosalema sy Joda izy, samy ho any an-tanànany avy, – '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia ny olona izay niaraka tamin’i Zerobabela sy Jesoa sy Nehemia sy Azaria sy Ramia sy Nahanany sy Mordekay sy Bilsana sy Mispereta sy Bigvay sy Nehoma ary Bana:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary ny isan’ny lehilahy tamin’ny Isiraely dia izao: –'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny taranak’i Parosy dia roa amby fito-polo amby zato sy roa arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny taranak’i Sefatia dia roa amby fito-polo amby telon-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny taranak’i Ara dia roa amby dimam-polo amby enin-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny taranak’i Pahata-moaba, dia avy tamin’ny zanak’i Jesoa sy Joaba, dia valo ambin’ny folo amby valon-jato sy roa arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny taranak’i Elama dia efatra amby dimam-polo amby roan-jato sy arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny taranak’i Zato dia dimy amby efa-polo amby valon-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny taranak’i Zakay dia enim-polo amby fiton-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny taranak’i Binoy dia valo amby efa-polo amby enin-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny taranak’i Bebay dia valo amby roa-polo amby enin-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny taranak’ Azgada dia roa amby roa-polo amby telon-jato amby roa arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny zanak’i Adonikama dia fito amby enim-polo amby enin-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny taranak’i Bigvay dia fito amby enim-polo sy roa arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny taranak’i Adina dia dimy amby dimam-polo amby enin-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ny taranak’i Atera, avy tamin’i Hezekia, dia valo amby sivi-folo; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ny taranak’i Hasoma dia valo amby roa-polo amby telon-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ny taranak’i Bezay dia efatra amby roa-polo amby telon-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ny taranak’i Harifa dia roa ambin’ny folo amby zato; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny taranak’i Gibeona dia dimy amby sivi-folo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny mponina tany Betlehema sy Netofa dia valo amby valo-polo amby zato; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ny mponina tany Anatota dia valo amby roa-polo amby zato; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ny mponina tany Bet-azmaveta dia roa amby efa-polo; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ny mponina tany Kiriata-jearima sy Kefira ary Berota dia telo amby efa-polo amby fiton-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ny mponina tany Rama sy Geva dia iraika amby roa-polo amby enin-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ny mponina tany Mikmasy dia roa amby roa-polo amby zato; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ny mponina tany Betela sy Ay dia telo amby roa-polo amby zato; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ny mponina tany amin’ilay Nebo anankiray dia roa amby dimam-polo; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ny zanak’ilay Elama anankiray dia efatra amby dimam-polo amby roan-jato sy arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ny zanak’i Harima dia roa-polo amby telon-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ny zanak’i Jeriko dia dimy amby efa-polo amby telon-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ny zanak’i Loda sy Hadida ary Ono dia iraika amby roa-polo amby fiton-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ny zanak’i Sena dia telo-polo amby sivin-jato sy telo arivo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny mpisorona koa dia izao: Ny taranak’i Jedaia, avy tamin’ny mpianakavin’i Jesoa, dia telo amby fito-polo amby sivin-jato; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'ny taranak’Imera, dia roa amby dimam-polo amby arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ny taranak’i Pasora dia fito amby efa-polo amby roan-jato sy arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ny taranak’i Harima dia fito ambin’ny folo sy arivo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary ny Levita koa dia izao: Ny zanak’i Jesoa sy Kadmiela, avy tamin’ny zanak’i Hodavia, dia efatra amby fito-polo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary ny mpihira koa dia izao: Ny taranak’i Asafa dia valo amby efa-polo amby zato.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary ny mpiandry varavarana koa dia izao: Ny taranak’i Saloma, ny taranak’i Atera, ny taranak’i Talmona, ny taranak’i Akoba, ny taranak’i Hatita, ny taranak’i Sobay, dia valo amby telo-polo amby zato.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary ny Netinima koa dia izao: Ny taranak’i Ziha, ny taranak’i Hasofa, ny taranak’i Tabaota, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'ny taranak’i Kerosa, ny taranak’i Sia, ny taranak’i Padona, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ny taranak’i Lebana, ny taranak’i Hagaba, ny taranak’i Salmay, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'ny taranak’i Hanana, ny taranak’i Gidela, ny taranak’i Gahara, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'ny taranak’i Reaia, ny taranak’i Rezina, ny taranak’i Nekoda, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'ny taranak’i Gazama, ny taranak’i Oza, ny taranak’i Pasea, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'ny taranak’i Besay, ny taranaky ny Meonita, ny taranaky ny Nefisita, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'ny taranak’i Bakboka, ny taranak’i Hakafa, ny taranak’i Harora, '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'ny taranak’i Bazlita, ny taranak’i Mehida, ny taranak’i Harsa, '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'ny taranak’i Barkosa, ny taranak’i Sisera, ny taranak’i Tema, '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ny taranak’i Nezia, ny taranak’i Hatifa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary ny taranaky ny mpanompon’i Solomona koa dia izao: Ny taranak’i Sotahy, ny taranak’i Sofereta, ny zanak’i Perida, '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'ny taranak’i Jala, ny taranak’i Darkona, ny taranak’i Gidela, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: ny taranak’i Sefatia, ny taranak’i Hatila, ny taranak’i Pokereta-hazebaima, ny taranak’i Amona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Ny Netinima rehetra sy ny taranaky ny mpanompon’i Solomona dia roa amby sivifolo amby telon-jato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary izao no niakatra avy tany Tela-mela sy Tela-harsa sy Kerofa sy Adona ary Imera (fa tsy nahalaza ny fianakaviany sy ny firazanany, na avy tamin’ny Isiraely na tsia, izy): '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: ny taranak’i Delaia, ny taranak’i Tobia, ny taranak’i Nekoda, roa amby efa-polo amby enin-jato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary ny avy tamin’ny mpisorona dia izao: Ny taranak’i Hobaia, ny taranak’i Hakoza, ny taranak’i Barzilay; nampaka-bady avy tamin’ny zanakavavin’i Barzilay Gileadita io ka notononina araka ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ireo dia nitady ny soratra filazana ny razany, fa tsy hita izany; dia natao ho tsy madio izy ka nesorina tamin’ny fisoronana. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Ary ny governora nilaza fa tsy mahazo mihinana ny zava-masina indrindra izy mandra-pitsangan’izay mpisorona anankiray mitondra ny Orima sy Tomima.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ny tontalin’ny olona rehetra dia enim-polo amby telon-jato amby roa arivo sy efatra alina, '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
