document_id: NEH.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nataon’i Nehemia ny amin’ny fiambenana ny tanàna.
  - type: text
    content: 'ARY nony vita ny mànda, ka voalatsako ny lela-vavahady, sady voatendry ny mpiandry varavarana sy ny mpihira ary ny Levita, '
  '10':
  - type: text
    content: 'ny taranak’i Ara dia roa amby dimam-polo amby enin-jato; '
  '11':
  - type: text
    content: 'ny taranak’i Pahata-moaba, dia avy tamin’ny zanak’i Jesoa sy Joaba, dia valo ambin’ny folo amby valon-jato sy roa arivo; '
  '12':
  - type: text
    content: 'ny taranak’i Elama dia efatra amby dimam-polo amby roan-jato sy arivo; '
  '13':
  - type: text
    content: 'ny taranak’i Zato dia dimy amby efa-polo amby valon-jato; '
  '14':
  - type: text
    content: 'ny taranak’i Zakay dia enim-polo amby fiton-jato; '
  '15':
  - type: text
    content: 'ny taranak’i Binoy dia valo amby efa-polo amby enin-jato; '
  '16':
  - type: text
    content: 'ny taranak’i Bebay dia valo amby roa-polo amby enin-jato; '
  '17':
  - type: text
    content: 'ny taranak’ Azgada dia roa amby roa-polo amby telon-jato amby roa arivo; '
  '18':
  - type: text
    content: 'ny zanak’i Adonikama dia fito amby enim-polo amby enin-jato; '
  '19':
  - type: text
    content: 'ny taranak’i Bigvay dia fito amby enim-polo sy roa arivo; '
  '2':
  - type: text
    content: 'dia notendreko Hanany rahalahiko sy Hanania, lehiben’ny tao an-dapa, hitandrina an’i Jerosalema, fa lehilahy mahatoky izy sady matahotra an’Andriamanitra mihoatra noho ny maro. '
  '20':
  - type: text
    content: 'ny taranak’i Adina dia dimy amby dimam-polo amby enin-jato; '
  '21':
  - type: text
    content: 'ny taranak’i Atera, avy tamin’i Hezekia, dia valo amby sivi-folo; '
  '22':
  - type: text
    content: 'ny taranak’i Hasoma dia valo amby roa-polo amby telon-jato; '
  '23':
  - type: text
    content: 'ny taranak’i Bezay dia efatra amby roa-polo amby telon-jato; '
  '24':
  - type: text
    content: 'ny taranak’i Harifa dia roa ambin’ny folo amby zato; '
  '25':
  - type: text
    content: 'ny taranak’i Gibeona dia dimy amby sivi-folo. '
  '26':
  - type: text
    content: 'Ny mponina tany Betlehema sy Netofa dia valo amby valo-polo amby zato; '
  '27':
  - type: text
    content: 'ny mponina tany Anatota dia valo amby roa-polo amby zato; '
  '28':
  - type: text
    content: 'ny mponina tany Bet-azmaveta dia roa amby efa-polo; '
  '29':
  - type: text
    content: 'ny mponina tany Kiriata-jearima sy Kefira ary Berota dia telo amby efa-polo amby fiton-jato; '
  '3':
  - type: text
    content: 'Koa hoy izaho tamin’ireo: Aza avela hovohana ny vavahadin’i Jerosalema mandra-pahafanan’ny andro; ary raha mbola mijanona eo '
  - type: text
    content: ny mpiambina
  - type: text
    content: ', dia aoka harindriny ny varavarana, ka hidionareo; ary manendre mpiambina avy amin’izay monina ato Jerosalema ihany samy ho eo amin’ny fiambenany avy, dia samy ho eo amin’ny tandrifin’ny tranony avy.'
  - type: heading
    content: Ny anaran’ny Jiosy izay nentin’i Zerobabela avy tany Babylona.
  '30':
  - type: text
    content: 'ny mponina tany Rama sy Geva dia iraika amby roa-polo amby enin-jato; '
  '31':
  - type: text
    content: 'ny mponina tany Mikmasy dia roa amby roa-polo amby zato; '
  '32':
  - type: text
    content: 'ny mponina tany Betela sy Ay dia telo amby roa-polo amby zato; '
  '33':
  - type: text
    content: 'ny mponina tany amin’ilay Nebo anankiray dia roa amby dimam-polo; '
  '34':
  - type: text
    content: 'ny zanak’ilay Elama anankiray dia efatra amby dimam-polo amby roan-jato sy arivo; '
  '35':
  - type: text
    content: 'ny zanak’i Harima dia roa-polo amby telon-jato; '
  '36':
  - type: text
    content: 'ny zanak’i Jeriko dia dimy amby efa-polo amby telon-jato; '
  '37':
  - type: text
    content: 'ny zanak’i Loda sy Hadida ary Ono dia iraika amby roa-polo amby fiton-jato; '
  '38':
  - type: text
    content: ny zanak’i Sena dia telo-polo amby sivin-jato sy telo arivo.
  '39':
  - type: text
    content: 'Ary ny mpisorona koa dia izao: Ny taranak’i Jedaia, avy tamin’ny mpianakavin’i Jesoa, dia telo amby fito-polo amby sivin-jato; '
  '4':
  - type: text
    content: 'ARY malalaka sy lehibe ny tanàna, nefa vitsy olona, sady tsy mbola vita ny trano. '
  '40':
  - type: text
    content: 'ny taranak’Imera, dia roa amby dimam-polo amby arivo; '
  '41':
  - type: text
    content: 'ny taranak’i Pasora dia fito amby efa-polo amby roan-jato sy arivo; '
  '42':
  - type: text
    content: ny taranak’i Harima dia fito ambin’ny folo sy arivo.
  '43':
  - type: text
    content: 'Ary ny Levita koa dia izao: Ny zanak’i Jesoa sy Kadmiela, avy tamin’ny zanak’i Hodavia, dia efatra amby fito-polo.'
  '44':
  - type: text
    content: 'Ary ny mpihira koa dia izao: Ny taranak’i Asafa dia valo amby efa-polo amby zato.'
  '45':
  - type: text
    content: 'Ary ny mpiandry varavarana koa dia izao: Ny taranak’i Saloma, ny taranak’i Atera, ny taranak’i Talmona, ny taranak’i Akoba, ny taranak’i Hatita, ny taranak’i Sobay, dia valo amby telo-polo amby zato.'
  '46':
  - type: text
    content: 'Ary ny Netinima koa dia izao: Ny taranak’i Ziha, ny taranak’i Hasofa, ny taranak’i Tabaota, '
  '47':
  - type: text
    content: 'ny taranak’i Kerosa, ny taranak’i Sia, ny taranak’i Padona, '
  '48':
  - type: text
    content: 'ny taranak’i Lebana, ny taranak’i Hagaba, ny taranak’i Salmay, '
  '49':
  - type: text
    content: 'ny taranak’i Hanana, ny taranak’i Gidela, ny taranak’i Gahara, '
  '5':
  - type: text
    content: 'Ary nomen’Andriamanitro hevitra aho hamory ny manan-kaja sy ny mpanapaka mbamin’ny vahoaka, mba halaina isa araka ny firazanany avy ireo. Ary hitako ny taratasy filazana ny firazanan’izay niakatra voalohany, ka izao no hitako voasoratra tao:'
  '50':
  - type: text
    content: 'ny taranak’i Reaia, ny taranak’i Rezina, ny taranak’i Nekoda, '
  '51':
  - type: text
    content: 'ny taranak’i Gazama, ny taranak’i Oza, ny taranak’i Pasea, '
  '52':
  - type: text
    content: 'ny taranak’i Besay, ny taranaky ny Meonita, ny taranaky ny Nefisita, '
  '53':
  - type: text
    content: 'ny taranak’i Bakboka, ny taranak’i Hakafa, ny taranak’i Harora, '
  '54':
  - type: text
    content: 'ny taranak’i Bazlita, ny taranak’i Mehida, ny taranak’i Harsa, '
  '55':
  - type: text
    content: 'ny taranak’i Barkosa, ny taranak’i Sisera, ny taranak’i Tema, '
  '56':
  - type: text
    content: ny taranak’i Nezia, ny taranak’i Hatifa.
  '57':
  - type: text
    content: 'Ary ny taranaky ny mpanompon’i Solomona koa dia izao: Ny taranak’i Sotahy, ny taranak’i Sofereta, ny zanak’i Perida, '
  '58':
  - type: text
    content: 'ny taranak’i Jala, ny taranak’i Darkona, ny taranak’i Gidela, '
  '59':
  - type: text
    content: ny taranak’i Sefatia, ny taranak’i Hatila, ny taranak’i Pokereta-hazebaima, ny taranak’i Amona.
  '6':
  - type: text
    content: 'Izao no lehilahy amin’izany tany izany, izay niakatra avy tamin’ny fahababoana, dia ireo nobaboin’i Nebokadnezara, mpanjakan’i Babylona, fa niverina tany Jerosalema sy Joda izy, samy ho any an-tanànany avy, – '
  '60':
  - type: text
    content: Ny Netinima rehetra sy ny taranaky ny mpanompon’i Solomona dia roa amby sivifolo amby telon-jato.
  '61':
  - type: text
    content: 'Ary izao no niakatra avy tany Tela-mela sy Tela-harsa sy Kerofa sy Adona ary Imera (fa tsy nahalaza ny fianakaviany sy ny firazanany, na avy tamin’ny Isiraely na tsia, izy): '
  '62':
  - type: text
    content: ny taranak’i Delaia, ny taranak’i Tobia, ny taranak’i Nekoda, roa amby efa-polo amby enin-jato.
  '63':
  - type: text
    content: 'Ary ny avy tamin’ny mpisorona dia izao: Ny taranak’i Hobaia, ny taranak’i Hakoza, ny taranak’i Barzilay; nampaka-bady avy tamin’ny zanakavavin’i Barzilay Gileadita io ka notononina araka ny anarany. '
  '64':
  - type: text
    content: 'Ireo dia nitady ny soratra filazana ny razany, fa tsy hita izany; dia natao ho tsy madio izy ka nesorina tamin’ny fisoronana. '
  '65':
  - type: text
    content: Ary ny governora nilaza fa tsy mahazo mihinana ny zava-masina indrindra izy mandra-pitsangan’izay mpisorona anankiray mitondra ny Orima sy Tomima.
  '66':
  - type: text
    content: 'Ny tontalin’ny olona rehetra dia enim-polo amby telon-jato amby roa arivo sy efatra alina, '
  '67':
  - type: text
    content: 'afa-tsy ny ankizilahiny sy ny ankizivaviny fito amby telo-polo amby telon-jato sy fito arivo; ary nanana mpihiralahy sy mpihiravavy dimy amby efa-polo amby roan-jato izy; '
  '68':
  - type: text
    content: 'ny soavaliny dia enina amby telo-polo amby fiton-jato; ny ampondrany dia dimy amby efa-polo amby roan-jato; '
  '69':
  - type: text
    content: ny ramevany dia dimy amby telo-polo amby efa-jato; ny borikiny dia roa-polo amby fiton-jato sy enina arivo.
  '7':
  - type: text
    content: 'dia ny olona izay niaraka tamin’i Zerobabela sy Jesoa sy Nehemia sy Azaria sy Ramia sy Nahanany sy Mordekay sy Bilsana sy Mispereta sy Bigvay sy Nehoma ary Bana:'
  - type: text
    content: 'Ary ny isan’ny lehilahy tamin’ny Isiraely dia izao: –'
  '70':
  - type: text
    content: Ary ny sasany tamin ny lohan’ny fianakaviana dia nahafoy hanaovana ny asa. Ny governora nanome darika
  - type: note
    content: Izahao 1 Tan. xxix.7.
  - type: text
    content: ' volamena arivo sy lovia famafazana dimam-polo sy akanjo-mpisorona telo-polo amby dimam-jato ho ao amin’ny rakitra. '
  '71':
  - type: text
    content: Ary ny sasany tamin’ny lohan’ny fianakaviana dia nanome darika
  - type: note
    content: Izahao 1 Tan. xxix.7.
  - type: text
    content: ' volamena roa alina sy mane volafotsy roan-jato sy roa arivo ho ao amin’ny rakitra hanaovana ny asa. '
  '72':
  - type: text
    content: Ary izay nomen’ny olona sisa dia darika
  - type: note
    content: Izahao 1 Tan. xxix.7.
  - type: text
    content: ' volamena roa alina sy mane volafotsy roa arivo ary akanjo-mpisorona fito amby enim-polo.'
  '73':
  - type: text
    content: Ary samy tafapetraka teny an-tanànany avy ny mpisorona sy ny Levita sy ny mpiandry varavarana sy ny mpihira sy ny sasany amin’ny vahoaka ary ny Netinima, dia ny Isiraely rehetra.
  - type: heading
    content: Ny namakiana ny lalàna teo anatrehan’ny vahoaka rehetra, sy ny nitandremana ny andro firavoravoana Tabernakely.
  - type: text
    content: ARY rehefa tonga ny volana fahafito, dia samy tany an-tanànany avy ny Zanak’Isiraely.
  '8':
  - type: text
    content: 'Ny taranak’i Parosy dia roa amby fito-polo amby zato sy roa arivo; '
  '9':
  - type: text
    content: 'ny taranak’i Sefatia dia roa amby fito-polo amby telon-jato; '
