document_id: MIC.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny faharatsian’ny Isiraely, sy ny hanjo azy, ary ny hibebahany, sy ny hamindran’Andriamanitra fo aminy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: LOZAKO! fa efa tonga toy ny fiotazam-boankazo aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy toy ny fitsimponam-boaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy salohy hohanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na aviavy mialintaona, izay irin’ny fanahiko,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia hahita izany ilay fahavaloko ka hosaronan-kenatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia ilay nanao tamiko hoe: Aiza Izay Jehovah Andriamanitrao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho faly mahita azy ny masoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia ho fanitsakitsaka toy ny fotaka eny an-dàlambe izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He ny andro hananganana ny màndanao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany dia hitarina ny faritra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho lavitra ny didy.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Amin’izany andro izany koa dia hanatona anao ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy any Asyria sy avy any amin’ny tanànan’i Egypta,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mazora.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hatrany Egypta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mazora.
      marker-yv: yv-n
    - type: text
      text: ' ka hatramin’ny Ony,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eofrata.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatramin’ny ranomasina ka hatramin’ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatramin’ny tendrombohitra ka hatramin’ny tendrombohitra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nefa ho lao ny tany noho ny amin’ny mponina eo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia noho ny vokatry ny asany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny tehinao no ento miandry ny olonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny ondry lovanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay monina mitokana, dia any an-ala ao an-tampon’i Karmela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka handrasana any Basana sy Gileada ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny tamin’ny andro taloha ela.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Toy ny tamin’ny andro nivoahanao avy tany amin’ny tany Egypta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hanehoako azy zava-mahagaga.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hahita izany ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hahamenatra azy ny heriny rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitampim-bava izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga marenina ny sofiny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hilelaka ny vovoka toy ny menarana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiala amin-kovitra avy ao amin’ny fiarovany mafy tahaka ny biby mikisaka amin’ny tany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah Andriamanitsika dia hohatoniny amin-kovitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hatahotra Anao izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Iza no Andriamanitra tahaka Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamela heloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mandalo ny fahadisoan’ny sisa amin’ny lovany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mitana ny fahatezerany ho mandrakizay Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tia famindrampo.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hamindra fo amintsika indray Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanitsakitsaka ny fahotantsika,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, harianao ho any amin’ny ranomasina lalina ny fahotany rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lany tsy misy amin’ny tany intsony ny tsara fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy misy olo-marina ao amin’ny olombelona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy manotrika handatsa-dra avokoa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mihaza ny rahalahiny amin’ny harato izy rehetra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hanefa fahamarinana ho an’i Jakoba Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy famindrampo ho an’i Abrahama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay nianiananao tamin’ny razanay hatramin’ny andro taloha ela.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Vonona hanao ratsy ny tànany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mila ny mpanapaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azon-kolikoly ny mpitsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lehibe milaza ny fitsiriritan’ny fanahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no entiny mandrarirary azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Na dia ny tsara indrindra ao aminy aza dia toy ny roy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia ny mahitsy indrindra ao aminy aza dia ratsy noho ny fefy tsilo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy ny andron’ny tilinao, izay hamaliana anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany dia vao ho very hevitra hianao.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izy.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aza matoky namana hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mahazo am-po izay sakaiza mahazatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ambeno ny varavaran’ny vavanao na dia amin’izay andefimandrinao aza.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ny zanakalahy manamavo ny rainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanakavavy mitsangan-kanohitra ny reniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vinantovavy hanohitra ny rafozani-vavy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ankohonan’ny olona ihany no fahavalony.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa izaho kosa dia hanandrandra an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hiandry an’Andriamanitry ny famonjena ahy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro no hihaino ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aza mifaly ahy, ry fahavaloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia lavo aza aho, mbola hiarina ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitoetra ao amin’ny maizina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Jehovah no fahazavana ho ahy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny fahatezeran’i Jehovah dia hiaretako ihany–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nanota taminy aho–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-pandahany ny teniko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanomezany rariny ho ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamoaka ahy ho amin’ny mazava Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho faly aho mahita ny fahamarinany.
