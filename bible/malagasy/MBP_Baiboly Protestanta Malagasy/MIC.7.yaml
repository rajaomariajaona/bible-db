document_id: MIC.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharatsian’ny Isiraely, sy ny hanjo azy, ary ny hibebahany, sy ny hamindran’Andriamanitra fo aminy.
  - type: text
    content: LOZAKO! fa efa tonga toy ny fiotazam-boankazo aho
  - type: text
    content: Sy toy ny fitsimponam-boaloboka,
  - type: text
    content: Tsy misy salohy hohanina,
  - type: text
    content: Na aviavy mialintaona, izay irin’ny fanahiko,
  '10':
  - type: text
    content: Dia hahita izany ilay fahavaloko ka hosaronan-kenatra,
  - type: text
    content: 'Dia ilay nanao tamiko hoe: Aiza Izay Jehovah Andriamanitrao?'
  - type: text
    content: Ho faly mahita azy ny masoko;
  - type: text
    content: Ankehitriny dia ho fanitsakitsaka toy ny fotaka eny an-dàlambe izy.
  '11':
  - type: text
    content: He ny andro hananganana ny màndanao!
  - type: text
    content: Amin’izany andro izany dia hitarina ny faritra.
  - type: note
    content: 'Na: ho lavitra ny didy.'
  '12':
  - type: text
    content: Amin’izany andro izany koa dia hanatona anao ny olona
  - type: text
    content: Avy any Asyria sy avy any amin’ny tanànan’i Egypta,
  - type: note
    content: Heb. Mazora.
  - type: text
    content: Eny, hatrany Egypta
  - type: note
    content: Heb. Mazora.
  - type: text
    content: ' ka hatramin’ny Ony,'
  - type: note
    content: Eofrata.
  - type: text
    content: Ary hatramin’ny ranomasina ka hatramin’ny ranomasina,
  - type: text
    content: Ary hatramin’ny tendrombohitra ka hatramin’ny tendrombohitra.
  '13':
  - type: text
    content: Nefa ho lao ny tany noho ny amin’ny mponina eo aminy,
  - type: text
    content: Dia noho ny vokatry ny asany.
  '14':
  - type: text
    content: Ny tehinao no ento miandry ny olonao,
  - type: text
    content: Dia ny ondry lovanao,
  - type: text
    content: Izay monina mitokana, dia any an-ala ao an-tampon’i Karmela;
  - type: text
    content: Aoka handrasana any Basana sy Gileada ireny
  - type: text
    content: Toy ny tamin’ny andro taloha ela.
  '15':
  - type: text
    content: Toy ny tamin’ny andro nivoahanao avy tany amin’ny tany Egypta
  - type: text
    content: No hanehoako azy zava-mahagaga.
  '16':
  - type: text
    content: Hahita izany ny jentilisa,
  - type: text
    content: Ka hahamenatra azy ny heriny rehetra;
  - type: text
    content: Hitampim-bava izy,
  - type: text
    content: Ho tonga marenina ny sofiny.
  '17':
  - type: text
    content: Hilelaka ny vovoka toy ny menarana izy;
  - type: text
    content: Hiala amin-kovitra avy ao amin’ny fiarovany mafy tahaka ny biby mikisaka amin’ny tany izy;
  - type: text
    content: Jehovah Andriamanitsika dia hohatoniny amin-kovitra,
  - type: text
    content: Eny, hatahotra Anao izy.
  '18':
  - type: text
    content: Iza no Andriamanitra tahaka Anao,
  - type: text
    content: Izay mamela heloka
  - type: text
    content: Sady mandalo ny fahadisoan’ny sisa amin’ny lovany?
  - type: text
    content: Tsy mitana ny fahatezerany ho mandrakizay Izy,
  - type: text
    content: Fa tia famindrampo.
  '19':
  - type: text
    content: Hamindra fo amintsika indray Izy
  - type: text
    content: Ka hanitsakitsaka ny fahotantsika,–
  - type: text
    content: Eny, harianao ho any amin’ny ranomasina lalina ny fahotany rehetra.
  '2':
  - type: text
    content: Lany tsy misy amin’ny tany intsony ny tsara fanahy;
  - type: text
    content: Eny, tsy misy olo-marina ao amin’ny olombelona;
  - type: text
    content: Samy manotrika handatsa-dra avokoa izy,
  - type: text
    content: Eny, mihaza ny rahalahiny amin’ny harato izy rehetra.
  '20':
  - type: text
    content: Hanefa fahamarinana ho an’i Jakoba Hianao
  - type: text
    content: Sy famindrampo ho an’i Abrahama,
  - type: text
    content: Dia ilay nianiananao tamin’ny razanay hatramin’ny andro taloha ela.
  '3':
  - type: text
    content: Vonona hanao ratsy ny tànany;
  - type: text
    content: Mila ny mpanapaka,
  - type: text
    content: Azon-kolikoly ny mpitsara,
  - type: text
    content: Ary ny lehibe milaza ny fitsiriritan’ny fanahiny,
  - type: text
    content: Koa izany no entiny mandrarirary azy.
  '4':
  - type: text
    content: Na dia ny tsara indrindra ao aminy aza dia toy ny roy,
  - type: text
    content: Ary na dia ny mahitsy indrindra ao aminy aza dia ratsy noho ny fefy tsilo;
  - type: text
    content: Avy ny andron’ny tilinao, izay hamaliana anao;
  - type: text
    content: Amin’izany dia vao ho very hevitra hianao.
  - type: note
    content: Heb. izy.
  '5':
  - type: text
    content: Aza matoky namana hianareo,
  - type: text
    content: Aza mahazo am-po izay sakaiza mahazatra;
  - type: text
    content: Fa ambeno ny varavaran’ny vavanao na dia amin’izay andefimandrinao aza.
  '6':
  - type: text
    content: Fa ny zanakalahy manamavo ny rainy,
  - type: text
    content: Ny zanakavavy mitsangan-kanohitra ny reniny,
  - type: text
    content: Ary ny vinantovavy hanohitra ny rafozani-vavy;
  - type: text
    content: Ary ny ankohonan’ny olona ihany no fahavalony.
  '7':
  - type: text
    content: Fa izaho kosa dia hanandrandra an’i Jehovah,
  - type: text
    content: Eny, hiandry an’Andriamanitry ny famonjena ahy aho;
  - type: text
    content: Andriamanitro no hihaino ahy.
  '8':
  - type: text
    content: Aza mifaly ahy, ry fahavaloko,
  - type: text
    content: Fa na dia lavo aza aho, mbola hiarina ihany;
  - type: text
    content: Raha mitoetra ao amin’ny maizina aho,
  - type: text
    content: Dia Jehovah no fahazavana ho ahy.
  '9':
  - type: text
    content: Ny fahatezeran’i Jehovah dia hiaretako ihany–
  - type: text
    content: Fa efa nanota taminy aho–
  - type: text
    content: Ambara-pandahany ny teniko
  - type: text
    content: Sy hanomezany rariny ho ahy;
  - type: text
    content: Hamoaka ahy ho amin’ny mazava Izy,
  - type: text
    content: Ka ho faly aho mahita ny fahamarinany.
