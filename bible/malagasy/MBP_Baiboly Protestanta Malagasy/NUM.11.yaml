document_id: NUM.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nimonomononan’ny Zanak’Isiraely tao Tabera sy Kibrota-hatava.
  - type: text
    content: ARY dia nitaraim-pahoriana
  - type: note
    content: 'Na: nanao fitarainan-dratsy.'
  - type: text
    content: ' teo anatrehan’i Jehovah ny olona, ary nony ren’i Jehovah izany, dia nirehitra ny fahatezerany, ary ny afon’i Jehovah nandoro azy, ka may ny teo an-tsisin’ny toby.'
  '10':
  - type: text
    content: Ary Mosesy nandre ny olona nitomany tamin’ny isam-pianakaviany, samy teo amin’ny varavaran’ny lainy avy; dia nirehitra fatratra ny fahatezeran’i Jehovah; ary tsy sitrak’i Mosesy koa izany.
  '11':
  - type: text
    content: 'Dia hoy Mosesy tamin’i Jehovah: Nahoana no dia nasianao ratsy ny mpanomponao? ary nahoana no tsy nahita fitia eo imasonao aho ka nampitondrainao enta-mavesatra, dia ity firenena rehetra ity? '
  '12':
  - type: text
    content: 'Izaho va no torontoronina an’ity firenena rehetra ity? ary izaho va no niteraka azy, no ilazanao hoe: Trotroinao izy–tahaka ny ray mpitaiza mitondra ny zaza minono – ho any amin’ny tany izay nianiananao tamin’ny razany homena azy? '
  '13':
  - type: text
    content: 'Avy aiza no hahazoako hena homena ity firenena rehetra ity, no dia mitomany amiko izy manao hoe: Omeo hena izahay hohaninay? '
  '14':
  - type: text
    content: 'Tsy zakako izaho irery ny mitondra ity firenena rehetra ity, fa mavesatra amiko loatra. '
  '15':
  - type: text
    content: Koa raha izao no ataonao amiko, masìna Hianao, vonoy mihitsy aho, raha nahita fitia eo imasonao; fa aza avela hahita ny fahoriako aho.
  '16':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Mosesy: Manangòna fito-polo lahy amin’ny loholon’ny Isiraely ho etỳ amiko, dia izay fantatrao ho loholona amin’ny fireneny sy mpifehy azy; ary ento miaraka aminao ho ao amin’ny trano-lay fihaonana izy. '
  '17':
  - type: text
    content: 'Dia hidina Aho ka hiteny aminao eo; ary Izaho haka amin’ny Fanahy Izay ao aminao ka hametraka izany ao amin’ireo, ary hiara-mitondra ity firenena ity aminao ireo, fa tsy hianao irery intsony no hitondra azy. '
  '18':
  - type: text
    content: 'Koa lazao amin’ny olona hoe: Manamasìna ny tenanareo ho amin’ny ampitso, dia hihinan-kena hianareo; fa nitomany teo anatrehan’i Jehovah hianareo ka nanao hoe: Enga anie ka hisy hanome hena hohaninay! fa soa no hitanay tany Egypta; dia homen’i Jehovah hena hianareo, ka hohaninareo. '
  '19':
  - type: text
    content: 'Tsy indray andro no hihinananareo na indroa andro, na hadimiana, na hafoloana, na roa-polo andro aza, '
  '2':
  - type: text
    content: Dia nitaraina tamin’i Mosesy ny olona; ary Mosesy nifona tamin’i Jehovah, dia maty ny afo.
  '20':
  - type: text
    content: 'fa hatramin’ny iray volana mipaka, dia mandra-pivoakany amin’ny vavoronareo ka haharikoriko anareo; satria nolavinareo Jehovah, Izay eo aminareo, ka nitomany teo anatrehany hianareo nanao hoe: Nahoana re no nivoaka avy tany Egypta izahay?'
  '21':
  - type: text
    content: 'Dia hoy Mosesy: Ny olona izay itoerako dia lehilahy enina hetsy izay mahalia làlana; ary hoy Hianao: Homeko hena izy mba hohaniny mandritra ny iray volana. '
  '22':
  - type: text
    content: Moa ondry aman-osy sy omby va no hovonoina ho azy hahavoky azy? sa ny hazandrano rehetra ao amin’ny ranomasina no hangonina ho azy hahavoky azy?
  '23':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Mosesy: Nihafohy va ny tànan’i Jehovah? ankehitriny dia ho hitanao na ho tanteraka aminao ny teniko, na tsia.'
  '24':
  - type: text
    content: Dia nivoaka Mosesy ka nilaza ny tenin’i Jehovah tamin’ny olona; dia nanangona fito-polo lahy tamin’ny loholon’ny firenena izy ka nampitoetra azy manodidina ny trano-lay.
  '25':
  - type: text
    content: Ary nidina teo amin’ny rahona Jehovah ka niteny taminy, dia nangalany ny Fanahy Izay tao amin’i Mosesy ka napetrany tao amin’ny loholona fito-polo lahy; ary raha mbola nitoetra tao aminy ny Fanahy, dia naminany izy, nefa tsy nanao intsony.
  '26':
  - type: text
    content: 'Fa nisy roa lahy nijanona teo an-toby, Eldada no anaran’ny anankiray, ary Medada no anaran’ny anankiray; ary ny Fanahy nitoetra tao aminy; ary isan’izay voasoratra izy roa lahy, nefa tsy mba nankeo amin’ny trano-lay; dia naminany teo an-toby izy roa lahy. '
  '27':
  - type: text
    content: 'Ary nisy zatovo nihazakazaka, dia nilaza tamin’i Mosesy ka nanao hoe: Eldada sy Medada maminany etsy an-toby.'
  '28':
  - type: text
    content: Dia namaly Josoa, zanak’i Nona, izay nanompo an’i Mosesy hatry ny fony tanora,
  - type: note
    content: 'Na: anankiray tamin’ny zatovony.'
  - type: text
    content: ' ka nanao hoe: Ry Mosesy, tompoko, rarao izy roa lahy. '
  '29':
  - type: text
    content: 'Fa hoy Mosesy taminy: Izaho va no ialonanao? enga anie ka ho mpaminany avokoa ny olon’i Jehovah rehetra, ka halatsak’i Jehovah aminy ny Fanahiny!'
  '3':
  - type: text
    content: Ary ny anaran’izany tany izany dia nataony hoe Tabera,
  - type: note
    content: Tabera = Fandoroana.
  - type: text
    content: ' satria nandoro azy ny afon’i Jehovah.'
  '30':
  - type: text
    content: Dia nankeo an-toby Mosesy sy ny loholon’ny Isiraely.
  '31':
  - type: text
    content: Ary nisy rivotra nivoaka avy tamin’i Jehovah ka nitondra papelika avy tany amin’ny ranomasina ary nampihahakahaka azy teny amin’ny toby, ka tokony ho làlana indray andro manodidina ny toby no nisy azy, ary tokony ho roa hakiho ambonin’ny tany izy.
  '32':
  - type: text
    content: 'Dia nitsangana ny olona nandritra izany andro izany sy nandritra ny alina sy ny ampitson’iny koa ka nanangona ny papelika; ary izay kely fanangona no folo homera; ary nahahiny ho maina ireny manodidina ny toby. '
  '33':
  - type: text
    content: Fa raha mbola teo am-bavany ny hena ka tsy mbola lany, dia nirehitra tamin’ny olona ny fahatezeran’i Jehovah, ary namely ny olona tamin’ny kapoka mafy indrindra Izy.
  '34':
  - type: text
    content: 'Ary ny anaran’izany tany izany nataony hoe: Kibrota-hatava,'
  - type: note
    content: Kibrota-hatava = Fasam-paniriana.
  - type: text
    content: ' satria teo no nandevenana ny olona izay liana.'
  '35':
  - type: text
    content: Ary niala tao Kibrota-hatava
  - type: note
    content: Kibrota-hatava = Fasam-paniriana.
  - type: text
    content: ' ny olona ka nifindra nankany Hazerota; dia nitoetra tany Hazerota izy.'
  '4':
  - type: text
    content: 'Ary ny olona hafa firenena izay niharo taminy dia liana, ary ny Zanak’Isiraely koa dia nitomany indray hoe: Enga anie ka hisy hanome hena hohaninay! '
  '5':
  - type: text
    content: Tsaroanay ny hazandrano izay nohaninay, maimaimpoana tany Egypta mbamin’ny voatango
  - type: note
    content: Voantango roa karazana no lazain’ny teny Hebreo, dia ny voantango sy ny voantangom-bazaha.
  - type: text
    content: ' sy tongolo'
  - type: note
    content: Tongolo telo karazana no lazain’ny teny Hebreo, dia ny tongolo pora (Allium porrum) sy ny tongolom-bazaha ary ny tongolo Malagasy.
  - type: text
    content: ' samy hafa karazana. '
  '6':
  - type: text
    content: 'Fa izao dia maina ny ainay: tsy misy na inona na inona eto imasonay afa-tsy ny mana ihany.'
  '7':
  - type: text
    content: 'Ary ny mana dia toy ny voan-drafy, ary ny tarehiny dia tahaka ny tarehin’ny bedola. '
  '8':
  - type: text
    content: 'Nandehandeha ny olona ka nanangona azy, dia nitoto azy tamin’ny fikosoham-bary na tamin’ny laona, ary nahandro azy tamin’ny vilany, dia nanao mofo azy; ary ny fanandramana azy dia tahaka ny fanandramana mofo misy diloilo. '
  '9':
  - type: text
    content: Ary raha nilatsaka tamin’ny toby ny ando nony alina, dia nilatsaka koa niaraka taminy ny mana.
