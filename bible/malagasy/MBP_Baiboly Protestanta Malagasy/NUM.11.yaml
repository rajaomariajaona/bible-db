document_id: NUM.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nimonomononan’ny Zanak’Isiraely tao Tabera sy Kibrota-hatava.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY dia nitaraim-pahoriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanao fitarainan-dratsy.
    marker-yv: yv-n
  - type: text
    text: ' teo anatrehan’i Jehovah ny olona, ary nony ren’i Jehovah izany, dia nirehitra ny fahatezerany, ary ny afon’i Jehovah nandoro azy, ka may ny teo an-tsisin’ny toby.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia nitaraina tamin’i Mosesy ny olona; ary Mosesy nifona tamin’i Jehovah, dia maty ny afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny anaran’izany tany izany dia nataony hoe Tabera,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tabera = Fandoroana.
    marker-yv: yv-n
  - type: text
    text: ' satria nandoro azy ny afon’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny olona hafa firenena izay niharo taminy dia liana, ary ny Zanak’Isiraely koa dia nitomany indray hoe: Enga anie ka hisy hanome hena hohaninay! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsaroanay ny hazandrano izay nohaninay, maimaimpoana tany Egypta mbamin’ny voatango
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Voantango roa karazana no lazain’ny teny Hebreo, dia ny voantango sy ny voantangom-bazaha.
    marker-yv: yv-n
  - type: text
    text: ' sy tongolo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tongolo telo karazana no lazain’ny teny Hebreo, dia ny tongolo pora (Allium porrum) sy ny tongolom-bazaha ary ny tongolo Malagasy.
    marker-yv: yv-n
  - type: text
    text: ' samy hafa karazana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao dia maina ny ainay: tsy misy na inona na inona eto imasonay afa-tsy ny mana ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny mana dia toy ny voan-drafy, ary ny tarehiny dia tahaka ny tarehin’ny bedola. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nandehandeha ny olona ka nanangona azy, dia nitoto azy tamin’ny fikosoham-bary na tamin’ny laona, ary nahandro azy tamin’ny vilany, dia nanao mofo azy; ary ny fanandramana azy dia tahaka ny fanandramana mofo misy diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary raha nilatsaka tamin’ny toby ny ando nony alina, dia nilatsaka koa niaraka taminy ny mana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary Mosesy nandre ny olona nitomany tamin’ny isam-pianakaviany, samy teo amin’ny varavaran’ny lainy avy; dia nirehitra fatratra ny fahatezeran’i Jehovah; ary tsy sitrak’i Mosesy koa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Mosesy tamin’i Jehovah: Nahoana no dia nasianao ratsy ny mpanomponao? ary nahoana no tsy nahita fitia eo imasonao aho ka nampitondrainao enta-mavesatra, dia ity firenena rehetra ity? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izaho va no torontoronina an’ity firenena rehetra ity? ary izaho va no niteraka azy, no ilazanao hoe: Trotroinao izy–tahaka ny ray mpitaiza mitondra ny zaza minono – ho any amin’ny tany izay nianiananao tamin’ny razany homena azy? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Avy aiza no hahazoako hena homena ity firenena rehetra ity, no dia mitomany amiko izy manao hoe: Omeo hena izahay hohaninay? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy zakako izaho irery ny mitondra ity firenena rehetra ity, fa mavesatra amiko loatra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa raha izao no ataonao amiko, masìna Hianao, vonoy mihitsy aho, raha nahita fitia eo imasonao; fa aza avela hahita ny fahoriako aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Mosesy: Manangòna fito-polo lahy amin’ny loholon’ny Isiraely ho etỳ amiko, dia izay fantatrao ho loholona amin’ny fireneny sy mpifehy azy; ary ento miaraka aminao ho ao amin’ny trano-lay fihaonana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hidina Aho ka hiteny aminao eo; ary Izaho haka amin’ny Fanahy Izay ao aminao ka hametraka izany ao amin’ireo, ary hiara-mitondra ity firenena ity aminao ireo, fa tsy hianao irery intsony no hitondra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa lazao amin’ny olona hoe: Manamasìna ny tenanareo ho amin’ny ampitso, dia hihinan-kena hianareo; fa nitomany teo anatrehan’i Jehovah hianareo ka nanao hoe: Enga anie ka hisy hanome hena hohaninay! fa soa no hitanay tany Egypta; dia homen’i Jehovah hena hianareo, ka hohaninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy indray andro no hihinananareo na indroa andro, na hadimiana, na hafoloana, na roa-polo andro aza, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa hatramin’ny iray volana mipaka, dia mandra-pivoakany amin’ny vavoronareo ka haharikoriko anareo; satria nolavinareo Jehovah, Izay eo aminareo, ka nitomany teo anatrehany hianareo nanao hoe: Nahoana re no nivoaka avy tany Egypta izahay?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Mosesy: Ny olona izay itoerako dia lehilahy enina hetsy izay mahalia làlana; ary hoy Hianao: Homeko hena izy mba hohaniny mandritra ny iray volana. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa ondry aman-osy sy omby va no hovonoina ho azy hahavoky azy? sa ny hazandrano rehetra ao amin’ny ranomasina no hangonina ho azy hahavoky azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Mosesy: Nihafohy va ny tànan’i Jehovah? ankehitriny dia ho hitanao na ho tanteraka aminao ny teniko, na tsia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia nivoaka Mosesy ka nilaza ny tenin’i Jehovah tamin’ny olona; dia nanangona fito-polo lahy tamin’ny loholon’ny firenena izy ka nampitoetra azy manodidina ny trano-lay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nidina teo amin’ny rahona Jehovah ka niteny taminy, dia nangalany ny Fanahy Izay tao amin’i Mosesy ka napetrany tao amin’ny loholona fito-polo lahy; ary raha mbola nitoetra tao aminy ny Fanahy, dia naminany izy, nefa tsy nanao intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa nisy roa lahy nijanona teo an-toby, Eldada no anaran’ny anankiray, ary Medada no anaran’ny anankiray; ary ny Fanahy nitoetra tao aminy; ary isan’izay voasoratra izy roa lahy, nefa tsy mba nankeo amin’ny trano-lay; dia naminany teo an-toby izy roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nisy zatovo nihazakazaka, dia nilaza tamin’i Mosesy ka nanao hoe: Eldada sy Medada maminany etsy an-toby.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia namaly Josoa, zanak’i Nona, izay nanompo an’i Mosesy hatry ny fony tanora,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anankiray tamin’ny zatovony.
    marker-yv: yv-n
  - type: text
    text: ' ka nanao hoe: Ry Mosesy, tompoko, rarao izy roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hoy Mosesy taminy: Izaho va no ialonanao? enga anie ka ho mpaminany avokoa ny olon’i Jehovah rehetra, ka halatsak’i Jehovah aminy ny Fanahiny!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia nankeo an-toby Mosesy sy ny loholon’ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary nisy rivotra nivoaka avy tamin’i Jehovah ka nitondra papelika avy tany amin’ny ranomasina ary nampihahakahaka azy teny amin’ny toby, ka tokony ho làlana indray andro manodidina ny toby no nisy azy, ary tokony ho roa hakiho ambonin’ny tany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nitsangana ny olona nandritra izany andro izany sy nandritra ny alina sy ny ampitson’iny koa ka nanangona ny papelika; ary izay kely fanangona no folo homera; ary nahahiny ho maina ireny manodidina ny toby. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa raha mbola teo am-bavany ny hena ka tsy mbola lany, dia nirehitra tamin’ny olona ny fahatezeran’i Jehovah, ary namely ny olona tamin’ny kapoka mafy indrindra Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny anaran’izany tany izany nataony hoe: Kibrota-hatava,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Kibrota-hatava = Fasam-paniriana.
    marker-yv: yv-n
  - type: text
    text: ' satria teo no nandevenana ny olona izay liana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary niala tao Kibrota-hatava
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Kibrota-hatava = Fasam-paniriana.
    marker-yv: yv-n
  - type: text
    text: ' ny olona ka nifindra nankany Hazerota; dia nitoetra tany Hazerota izy.'
