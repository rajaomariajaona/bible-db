document_id: JHN.10,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitorian’i Jesosy ny amin’ny mpiandry ondry, sy ny nilazany ny tenany ho Mpiandry Tsara.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'LAZAIKO aminareo marina dia marina tokoa fa izay tsy miditra amin’ny vavahady ho amin’ny valan’ondry, fa mananika ny fefy, dia mpangalatra sy jiolahy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpangalatra tsy avy raha tsy hangalatra sy hamono ary handringana; Izaho avy mba hananany fiainana, sady hananany be dia be.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no Mpiandry Tsara; ny Mpiandry Tsara manolotra ny ainy hamonjy ny ondry. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mpikarama, satria tsy mpiandry na tompon’ny ondry izy, koa raha mahita ny amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lopa.
      marker-yv: yv-n
    - type: text
      text: ' avy, dia mandao ny ondry ka mandositra, ary ny amboadia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lopa.
      marker-yv: yv-n
    - type: text
      text: ' misambotra ny ondry ka mampihahaka azy; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: mandositra izy
    - type: text
      text: ', satria mpikarama ka tsy mitandrina ny ondry. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no Mpiandry Tsara; ary fantatro ny Ahy, sady fantany Aho, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia tahaka ny ahafantaran’ny Ray Ahy sy ny ahafantarako ny Ray; ary Izaho manolotra ny aiko hamonjy ny ondry. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manana ondry hafa izay tsy amin’ity vala ity Aho; ary ireny koa dia tsy maintsy ho entiko ka hihaino ny feoko; ary ho tonga andiany iray izy, sady iray ihany ny Mpiandry. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izany no itiavan’ny Raiko Ahy, satria Izaho manolotra ny aiko mba handraisako azy indray. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy misy manaisotra ny aiko amiko, fa ny tenako ihany no manolotra azy. Manana fahefana hanolotra azy Aho, ary manana fahefana haka azy indray. Izany didy izany dia azoko tamin’ny Raiko.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy fisarahana indray tao amin’ny Jiosy noho izany teny izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay miditra amin’ny vavahady no mpiandry ny ondry. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maro tamin’ireo no nanao hoe: Manana demonia Izy ka efa very saina; nahoana no mihaino Azy hianareo? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy kosa ny sasany: Tsy mba tenin’ny demoniaka izany; moa ny demonia va mahay mampahiratra ny mason’ny jamba?'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny nataon’i Jesosy tany Jerosalema tamin’ny andro firavoravoana noho ny nanadiovana ny tempoly, sy ny nanoheran’ny Jiosy Azy, ary ny nankanesany tany an-dafin’i Jordana.
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga ny andro firavoravoana tany Jerosalema, dia ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: atao hoe
    - type: text
      text: ' Fitokanana, ary efa ririnina ny andro. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jesosy nitsangantsangana teo an-kianjan’ny tempoly teo amin’ny Fialofan’i Solomona.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitangoronan’ny Jiosy Izy ka nanontaniany hoe: Ambara-pahoviana no hampisalasalanao anay? Raha Hianao no Kristy, dia lazao marimarina aminay. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesosy namaly azy hoe: Efa nilaza taminareo ihany Aho, nefa tsy mino hianareo; ny asa izay ataoko amin’ny anaran’ny Raiko no manambara Ahy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa hianareo tsy mino, satria tsy mba isan’ny ondriko. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ondriko mihaino ny feoko, ary Izaho mahalala azy, ary izy manaraka Ahy, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Izaho manome azy fiainana mandrakizay, ka tsy ho very izy mandrakizay, ary tsy hisy handrombaka azy amin’ny tànako. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Raiko Izay nanome Ahy dia lehibe noho izy rehetra; ary tsy misy mahay mandrombaka amin’ny tànan’ny Ray. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy no vohan’ny mpiandry vavahady; ary ny ondry mihaino ny feony; ary izay ondriny tokoa dia antsoiny amin’ny anarany avy ka entiny mivoaka. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho sy ny Ray dia iray ihany.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka vato indray ny Jiosy hitoraka Azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesosy namaly azy hoe: Maro ny asa tsara nasehoko taminareo avy tamin’ny Ray; koa ny asa manao ahoana amin’ireny moa no itorahanareo vato Ahy? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Jiosy namaly Azy hoe: Tsy asa tsara no itorahanay vato Anao, fa fitenenan-dratsy,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Mat. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix.3.
      marker-yv: yv-n
    - type: text
      text: ' satria olona ihany Hianao, nefa manao ny tenanao ho Andriamanitra.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesosy namaly azy hoe: Tsy voasoratra ao amin’ny lalànareo va hoe: ,,Hoy Izaho: Andriamanitra hianareo’’? (Sal. 82.6). '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ireny izay nanaovana izany tenin’Andriamanitra izany no natao hoe ,andriamanitra’ (ary ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' tsy azo foanana), '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'moa Izay nohasinin’ny Ray ka nirahiny ho amin’izao tontolo izao va no ataonareo hoe: Miteny ratsy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'manao blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao and. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '33.'
      marker-yv: yv-n
    - type: text
      text: ' Hianao, satria hoy Izaho: Zanak’Andriamanitra Aho? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy manao ny asan’ny Raiko Aho, dia aza mino Ahy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha manao ihany kosa Aho, na dia tsy mino Ahy aza hianareo, dia minoa ny asa, mba ho fantatrareo sy hekenareo fa ny Ray no ato amiko, ary Izaho ao amin’ny Ray. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitady hisambotra Azy indray ny Jiosy; fa nandositra azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny tànany.
      marker-yv: yv-n
    - type: text
      text: ' Izy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa mamoaka ireo rehetra ireo izy, dia mialoha azy; ary ny ondriny manaraka azy, satria mahalala ny feony ireo. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa nankany an-dafin’i Jordana indray Jesosy ho any amin’ilay tany nanaovan’i Jaona batisa voalohany, ka nitoetra tany Izy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maro no nankeo aminy ka nanao hoe: Jaona tsy mba nanao famantarana, nefa izay rehetra nolazainy ny amin ity Lehilahy ity dia marina avokoa. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary maro no nino Azy teo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahiny tsy harahiny, fa handosirany, satria tsy fantany ny feon’ny vahiny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany fanoharana izany no nolazain’i Jesosy taminy, nefa tsy azony izay zavatra nolazainy taminy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy indray Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Izaho no vavahadin’ondry. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpangalatra sy jiolahy izay rehetra tonga talohako; fa tsy nihaino azy ny ondry. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no vavahady; raha Izaho no hidiran’ny olona, dia hovonjena izy ka hiditra sy hivoaka sady hahazo hanina. '
