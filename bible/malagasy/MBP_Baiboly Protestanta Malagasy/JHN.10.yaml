document_id: JHN.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitorian’i Jesosy ny amin’ny mpiandry ondry, sy ny nilazany ny tenany ho Mpiandry Tsara.
  - type: text
    content: 'LAZAIKO aminareo marina dia marina tokoa fa izay tsy miditra amin’ny vavahady ho amin’ny valan’ondry, fa mananika ny fefy, dia mpangalatra sy jiolahy. '
  '10':
  - type: text
    content: Ny mpangalatra tsy avy raha tsy hangalatra sy hamono ary handringana; Izaho avy mba hananany fiainana, sady hananany be dia be.
  '11':
  - type: text
    content: 'Izaho no Mpiandry Tsara; ny Mpiandry Tsara manolotra ny ainy hamonjy ny ondry. '
  '12':
  - type: text
    content: Ary ny mpikarama, satria tsy mpiandry na tompon’ny ondry izy, koa raha mahita ny amboadia
  - type: note
    content: lopa.
  - type: text
    content: ' avy, dia mandao ny ondry ka mandositra, ary ny amboadia'
  - type: note
    content: lopa.
  - type: text
    content: ' misambotra ny ondry ka mampihahaka azy; '
  '13':
  - type: text
    content: mandositra izy
  - type: text
    content: ', satria mpikarama ka tsy mitandrina ny ondry. '
  '14':
  - type: text
    content: 'Izaho no Mpiandry Tsara; ary fantatro ny Ahy, sady fantany Aho, '
  '15':
  - type: text
    content: 'dia tahaka ny ahafantaran’ny Ray Ahy sy ny ahafantarako ny Ray; ary Izaho manolotra ny aiko hamonjy ny ondry. '
  '16':
  - type: text
    content: 'Manana ondry hafa izay tsy amin’ity vala ity Aho; ary ireny koa dia tsy maintsy ho entiko ka hihaino ny feoko; ary ho tonga andiany iray izy, sady iray ihany ny Mpiandry. '
  '17':
  - type: text
    content: 'Ary izany no itiavan’ny Raiko Ahy, satria Izaho manolotra ny aiko mba handraisako azy indray. '
  '18':
  - type: text
    content: Tsy misy manaisotra ny aiko amiko, fa ny tenako ihany no manolotra azy. Manana fahefana hanolotra azy Aho, ary manana fahefana haka azy indray. Izany didy izany dia azoko tamin’ny Raiko.
  '19':
  - type: text
    content: 'Ary nisy fisarahana indray tao amin’ny Jiosy noho izany teny izany. '
  '2':
  - type: text
    content: 'Fa izay miditra amin’ny vavahady no mpiandry ny ondry. '
  '20':
  - type: text
    content: 'Ary maro tamin’ireo no nanao hoe: Manana demonia Izy ka efa very saina; nahoana no mihaino Azy hianareo? '
  '21':
  - type: text
    content: 'Hoy kosa ny sasany: Tsy mba tenin’ny demoniaka izany; moa ny demonia va mahay mampahiratra ny mason’ny jamba?'
  - type: heading
    content: Ny teny nataon’i Jesosy tany Jerosalema tamin’ny andro firavoravoana noho ny nanadiovana ny tempoly, sy ny nanoheran’ny Jiosy Azy, ary ny nankanesany tany an-dafin’i Jordana.
  '22':
  - type: text
    content: 'ARY tonga ny andro firavoravoana tany Jerosalema, dia ilay '
  - type: text
    content: atao hoe
  - type: text
    content: ' Fitokanana, ary efa ririnina ny andro. '
  '23':
  - type: text
    content: Ary Jesosy nitsangantsangana teo an-kianjan’ny tempoly teo amin’ny Fialofan’i Solomona.
  '24':
  - type: text
    content: 'Dia nitangoronan’ny Jiosy Izy ka nanontaniany hoe: Ambara-pahoviana no hampisalasalanao anay? Raha Hianao no Kristy, dia lazao marimarina aminay. '
  '25':
  - type: text
    content: 'Jesosy namaly azy hoe: Efa nilaza taminareo ihany Aho, nefa tsy mino hianareo; ny asa izay ataoko amin’ny anaran’ny Raiko no manambara Ahy. '
  '26':
  - type: text
    content: 'Kanefa hianareo tsy mino, satria tsy mba isan’ny ondriko. '
  '27':
  - type: text
    content: 'Ny ondriko mihaino ny feoko, ary Izaho mahalala azy, ary izy manaraka Ahy, '
  '28':
  - type: text
    content: 'ary Izaho manome azy fiainana mandrakizay, ka tsy ho very izy mandrakizay, ary tsy hisy handrombaka azy amin’ny tànako. '
  '29':
  - type: text
    content: 'Ny Raiko Izay nanome Ahy dia lehibe noho izy rehetra; ary tsy misy mahay mandrombaka amin’ny tànan’ny Ray. '
  '3':
  - type: text
    content: 'Ary izy no vohan’ny mpiandry vavahady; ary ny ondry mihaino ny feony; ary izay ondriny tokoa dia antsoiny amin’ny anarany avy ka entiny mivoaka. '
  '30':
  - type: text
    content: Izaho sy ny Ray dia iray ihany.
  '31':
  - type: text
    content: 'Dia naka vato indray ny Jiosy hitoraka Azy. '
  '32':
  - type: text
    content: 'Jesosy namaly azy hoe: Maro ny asa tsara nasehoko taminareo avy tamin’ny Ray; koa ny asa manao ahoana amin’ireny moa no itorahanareo vato Ahy? '
  '33':
  - type: text
    content: 'Ny Jiosy namaly Azy hoe: Tsy asa tsara no itorahanay vato Anao, fa fitenenan-dratsy,'
  - type: note
    content: Gr. blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' satria olona ihany Hianao, nefa manao ny tenanao ho Andriamanitra.'
  '34':
  - type: text
    content: 'Jesosy namaly azy hoe: Tsy voasoratra ao amin’ny lalànareo va hoe: ,,Hoy Izaho: Andriamanitra hianareo’’? (Sal. 82.6). '
  '35':
  - type: text
    content: 'Raha ireny izay nanaovana izany tenin’Andriamanitra izany no natao hoe ,andriamanitra’ (ary ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' tsy azo foanana), '
  '36':
  - type: text
    content: 'moa Izay nohasinin’ny Ray ka nirahiny ho amin’izao tontolo izao va no ataonareo hoe: Miteny ratsy'
  - type: note
    content: Gr. manao blasfemia; izahao and. 33.
  - type: text
    content: ' Hianao, satria hoy Izaho: Zanak’Andriamanitra Aho? '
  '37':
  - type: text
    content: 'Raha tsy manao ny asan’ny Raiko Aho, dia aza mino Ahy. '
  '38':
  - type: text
    content: 'Fa raha manao ihany kosa Aho, na dia tsy mino Ahy aza hianareo, dia minoa ny asa, mba ho fantatrareo sy hekenareo fa ny Ray no ato amiko, ary Izaho ao amin’ny Ray. '
  '39':
  - type: text
    content: Dia nitady hisambotra Azy indray ny Jiosy; fa nandositra azy
  - type: note
    content: Gr. ny tànany.
  - type: text
    content: ' Izy.'
  '4':
  - type: text
    content: 'Ary rehefa mamoaka ireo rehetra ireo izy, dia mialoha azy; ary ny ondriny manaraka azy, satria mahalala ny feony ireo. '
  '40':
  - type: text
    content: 'Dia lasa nankany an-dafin’i Jordana indray Jesosy ho any amin’ilay tany nanaovan’i Jaona batisa voalohany, ka nitoetra tany Izy. '
  '41':
  - type: text
    content: 'Ary maro no nankeo aminy ka nanao hoe: Jaona tsy mba nanao famantarana, nefa izay rehetra nolazainy ny amin ity Lehilahy ity dia marina avokoa. '
  '42':
  - type: text
    content: Ary maro no nino Azy teo.
  '5':
  - type: text
    content: 'Ary ny vahiny tsy harahiny, fa handosirany, satria tsy fantany ny feon’ny vahiny. '
  '6':
  - type: text
    content: Izany fanoharana izany no nolazain’i Jesosy taminy, nefa tsy azony izay zavatra nolazainy taminy.
  '7':
  - type: text
    content: 'Dia hoy indray Jesosy taminy: Lazaiko aminareo marina dia marina tokoa: Izaho no vavahadin’ondry. '
  '8':
  - type: text
    content: 'Mpangalatra sy jiolahy izay rehetra tonga talohako; fa tsy nihaino azy ny ondry. '
  '9':
  - type: text
    content: 'Izaho no vavahady; raha Izaho no hidiran’ny olona, dia hovonjena izy ka hiditra sy hivoaka sady hahazo hanina. '
