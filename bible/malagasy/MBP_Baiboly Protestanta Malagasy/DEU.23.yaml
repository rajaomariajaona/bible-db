document_id: DEU.23,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tsy mahazo maka ny vadin-drainy ny olona, na mandry amin’izay nandrian-drainy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Didy maro samy hafa.
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha mivoaka hiady amin’ny fahavalonao ny tafikao, dia mifadia ny ratsy rehetra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Raha misy olona eo aminao, izay tsy madio noho izay nanjo azy tamin’ny alina, dia hivoaka eny ivelan’ny toby izy, fa tsy hiditra ao anatiny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa rehefa hariva, dia aoka handro amin’ny rano izy; ary nony tokony ho maty masoandro, dia mahazo miverina eo amin’ny toby indray izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary aoka hisy tany voafaritrao any ivelan’ny toby ho fivoahanao; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary mitondrà fàntaka miaraka amin’ny fiadianao, ka raha hipetraka eny ivelany hianao, dia mihadia lavaka amin’ny fàntaka, ka totofy ny fivalananao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa Jehovah Andriamanitrao mandeha eo afovoan’ny tobinao hamonjy anao sy hanolotra ny fahavalonao eo anoloanao; ka dia ho masina ny tobinao, mba tsy hahita zavatra maloto eo aminao Izy ka tsy hiala aminao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aza atolotrao amin’ny tompony intsony ny andevo izay mandositra mamonjy tena ho eo aminao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Eo aminao no hitoerany, dia eo amin’ny tanàna izay tiany sy izay sitraky ny fony; fa aza mampahory azy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Aoka tsy hisy zanakavavy na zanakalahin’ny Isiraely hanolo-tena hijangajanga ho fanompoan-tsampy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aza mitondra ny tangin’ny vehivavy janga na ny karaman’alika, ho ao an-tranon’i Jehovah Andriamanitra, hanefana voady; fa fahavetavetana eo imason’i Jehovah Andriamanitrao ireo zavatra roa ireo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: TSY mahazo miditra amin’ny fiangonan’i Jehovah izay torotoro vihina, na izay voatapaka ny filahiany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Aza mampanàna zavatra amin’ny rahalahinao, na vola, na hanina, na zavatra hafa mety hampananaina. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny olona hafa firenena ihany no hampanananao zavatra; fa ny rahalahinao kosa dia tsy hampanananao; mba hotahin’i Jehovah Andriamanitrao hianao amin’izay rehetra ataon’ny tànanao eo amin’ny tany izay efa hidiranao holovana.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha mivoady amin’i Jehovah Andriamanitrao hianao, dia aza ela fanefa; fa hadinin’i Jehovah Andriamanitrao aminao tokoa izany ka ho fahotana aminao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa raha tsy mivoady hianao, dia tsy fahotana aminao izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Izay aloaky ny vavanao dia tandremo hotanterahinao, araka ny sitraponao nivoadianao tamin’i Jehovah ihany, dia izay nolazain’ny vavanao.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Raha mankany amin’ny tanimboaloboky ny namanao hianao, dia mahazo manaram-po mihinam-boaloboka hahavoky anao; fa aza mitondra mody.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Raha mankany amin’ny tanimbarin’ny namanao hianao, dia mahazo mioty salohim-bary ny tànanao; fa aza jinjanao antsy ny varin’ny namanao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny zazasary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zanaka tamin’ny olom-pady.
      marker-yv: yv-n
    - type: text
      text: ' tsy mahazo miditra amin’ny fiangonan’i Jehovah: na dia hatramin’ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin’ny fiangonan’i Jehovah.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny Amonita sy ny Moabita tsy mahazo miditra amin’ny fiangonan’i Jehovah: na dia hatramin’ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin’ny fiangonan’i Jehovah hatramin’ny mandrakizay ireny, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'satria tsy nitsena hanina sy rano anareo teny an-dàlana izy, raha nivoaka avy tany Egypta hianareo, ary satria nanamby an’i Balama, zanak’i Beora, avy any Petora any Mesopotamia, hanozona anao izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Kanefa Jehovah Andriamanitrao tsy nety nihaino an’i Balama, fa nampody ny fanozonana ho fitahiana anao Izy noho ny fitiavany anao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aza mitady izay hiadanany na izay hahasoa azy amin’ny andronao rehetra mandrakizay.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aza atao ho fahavetavetana ny Edomita, fa rahalahinao izy, na ny Egyptiana, fa efa mba vahiny tany amin’ny taniny hianao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny zafiafin’ireo dia hahazo miditra amin’ny fiangonan’i Jehovah.
