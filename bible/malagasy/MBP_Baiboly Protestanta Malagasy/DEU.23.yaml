document_id: DEU.23,873
type_code: plt
verses:
  '1':
  - type: text
    content: Tsy mahazo maka ny vadin-drainy ny olona, na mandry amin’izay nandrian-drainy.
  - type: heading
    content: Didy maro samy hafa.
  '10':
  - type: text
    content: 'Raha mivoaka hiady amin’ny fahavalonao ny tafikao, dia mifadia ny ratsy rehetra. '
  '11':
  - type: text
    content: 'Raha misy olona eo aminao, izay tsy madio noho izay nanjo azy tamin’ny alina, dia hivoaka eny ivelan’ny toby izy, fa tsy hiditra ao anatiny. '
  '12':
  - type: text
    content: 'Fa rehefa hariva, dia aoka handro amin’ny rano izy; ary nony tokony ho maty masoandro, dia mahazo miverina eo amin’ny toby indray izy. '
  '13':
  - type: text
    content: 'Ary aoka hisy tany voafaritrao any ivelan’ny toby ho fivoahanao; '
  '14':
  - type: text
    content: 'ary mitondrà fàntaka miaraka amin’ny fiadianao, ka raha hipetraka eny ivelany hianao, dia mihadia lavaka amin’ny fàntaka, ka totofy ny fivalananao. '
  '15':
  - type: text
    content: Fa Jehovah Andriamanitrao mandeha eo afovoan’ny tobinao hamonjy anao sy hanolotra ny fahavalonao eo anoloanao; ka dia ho masina ny tobinao, mba tsy hahita zavatra maloto eo aminao Izy ka tsy hiala aminao.
  '16':
  - type: text
    content: 'Aza atolotrao amin’ny tompony intsony ny andevo izay mandositra mamonjy tena ho eo aminao. '
  '17':
  - type: text
    content: Eo aminao no hitoerany, dia eo amin’ny tanàna izay tiany sy izay sitraky ny fony; fa aza mampahory azy.
  '18':
  - type: text
    content: 'Aoka tsy hisy zanakavavy na zanakalahin’ny Isiraely hanolo-tena hijangajanga ho fanompoan-tsampy. '
  '19':
  - type: text
    content: Aza mitondra ny tangin’ny vehivavy janga na ny karaman’alika, ho ao an-tranon’i Jehovah Andriamanitra, hanefana voady; fa fahavetavetana eo imason’i Jehovah Andriamanitrao ireo zavatra roa ireo.
  '2':
  - type: text
    content: TSY mahazo miditra amin’ny fiangonan’i Jehovah izay torotoro vihina, na izay voatapaka ny filahiany.
  '20':
  - type: text
    content: 'Aza mampanàna zavatra amin’ny rahalahinao, na vola, na hanina, na zavatra hafa mety hampananaina. '
  '21':
  - type: text
    content: Ny olona hafa firenena ihany no hampanananao zavatra; fa ny rahalahinao kosa dia tsy hampanananao; mba hotahin’i Jehovah Andriamanitrao hianao amin’izay rehetra ataon’ny tànanao eo amin’ny tany izay efa hidiranao holovana.
  '22':
  - type: text
    content: 'Raha mivoady amin’i Jehovah Andriamanitrao hianao, dia aza ela fanefa; fa hadinin’i Jehovah Andriamanitrao aminao tokoa izany ka ho fahotana aminao. '
  '23':
  - type: text
    content: 'Fa raha tsy mivoady hianao, dia tsy fahotana aminao izany. '
  '24':
  - type: text
    content: Izay aloaky ny vavanao dia tandremo hotanterahinao, araka ny sitraponao nivoadianao tamin’i Jehovah ihany, dia izay nolazain’ny vavanao.
  '25':
  - type: text
    content: Raha mankany amin’ny tanimboaloboky ny namanao hianao, dia mahazo manaram-po mihinam-boaloboka hahavoky anao; fa aza mitondra mody.
  '26':
  - type: text
    content: Raha mankany amin’ny tanimbarin’ny namanao hianao, dia mahazo mioty salohim-bary ny tànanao; fa aza jinjanao antsy ny varin’ny namanao.
  '3':
  - type: text
    content: Ny zazasary
  - type: note
    content: 'Na: zanaka tamin’ny olom-pady.'
  - type: text
    content: ' tsy mahazo miditra amin’ny fiangonan’i Jehovah: na dia hatramin’ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin’ny fiangonan’i Jehovah.'
  '4':
  - type: text
    content: 'Ny Amonita sy ny Moabita tsy mahazo miditra amin’ny fiangonan’i Jehovah: na dia hatramin’ny taranany fahafolo mandimby aza dia tsy hahazo miditra amin’ny fiangonan’i Jehovah hatramin’ny mandrakizay ireny, '
  '5':
  - type: text
    content: 'satria tsy nitsena hanina sy rano anareo teny an-dàlana izy, raha nivoaka avy tany Egypta hianareo, ary satria nanamby an’i Balama, zanak’i Beora, avy any Petora any Mesopotamia, hanozona anao izy. '
  '6':
  - type: text
    content: 'Kanefa Jehovah Andriamanitrao tsy nety nihaino an’i Balama, fa nampody ny fanozonana ho fitahiana anao Izy noho ny fitiavany anao. '
  '7':
  - type: text
    content: Aza mitady izay hiadanany na izay hahasoa azy amin’ny andronao rehetra mandrakizay.
  '8':
  - type: text
    content: 'Aza atao ho fahavetavetana ny Edomita, fa rahalahinao izy, na ny Egyptiana, fa efa mba vahiny tany amin’ny taniny hianao. '
  '9':
  - type: text
    content: Ny zafiafin’ireo dia hahazo miditra amin’ny fiangonan’i Jehovah.
