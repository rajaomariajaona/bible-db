document_id: JOB.16,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Joba.
  - type: text
    content: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Nisanasana vava tamiko ny olona;
  - type: text
    content: Latsa no nentiny namely ny takolako;
  - type: text
    content: Mitambatra hamely ahy izy.
  '11':
  - type: text
    content: Efa voatolotr’Andriamanitra ho amin’ny ratsy fanahy aho,
  - type: text
    content: Ary natsipiny ho eo an-tànan’ny mpanota.
  '12':
  - type: text
    content: Tamin’ilay izaho tsy nanana ahiahy iny, dia nanorotoro ahy Izy;
  - type: text
    content: Nosamboriny tamin’ny hatoko aho ka nomontsaniny,
  - type: text
    content: Sady natsangany ho marika hokendreny.
  '13':
  - type: text
    content: Manodidina ahy ny mpandefa zana-tsipìkany;
  - type: text
    content: Mamaky ny voako Izy ka tsy miantra
  - type: text
    content: Ary manidina ny aferoko ho amin’ny tany.
  '14':
  - type: text
    content: Bangabangainy lalandava aho,
  - type: text
    content: Ka miroatra hamely ahy tahaka ny lehilahy mahery Izy.
  '15':
  - type: text
    content: Lamba fisaonana
  - type: note
    content: Heb. lamba malailay.
  - type: text
    content: ' no voazaitrako hanarona ny hoditro,'
  - type: text
    content: Ary nalàko baraka tamin’ny vovoka ny tandroko.
  '16':
  - type: text
    content: Ny tavako tera-menan’ny fitomaniana,
  - type: text
    content: Ary eo amin’ny hodi-masoko ny aloky ny fahafatesana;
  '17':
  - type: text
    content: Kanefa tsy misy eto an-tànako izay mba nalaina an-keriny;
  - type: text
    content: Ary madio ny fivavako.
  '18':
  - type: text
    content: Ry tany ô, aza manarona ny rako,
  - type: text
    content: Ary aoka tsy ho voahazona ny fitarainako!
  '19':
  - type: text
    content: Fa na dia ankehitriny aza, indro, any an-danitra ny Vavolombeloko,
  - type: text
    content: Eny, ny Vavolombeloko dia any amin’ny avo.
  '2':
  - type: text
    content: Efa nandre zavatra maro toy izany aho;
  - type: text
    content: Mpampionona mahasorisorena foana hianareo rehetra.
  '20':
  - type: text
    content: Na dia mihomehy ahy aza ny sakaizako,
  - type: text
    content: Dia mamarin-dranomaso eo anatrehan’Andriamanitra kosa aho,
  '21':
  - type: text
    content: Mba hanamarina ahy olombelona eo anatrehany Izy
  - type: text
    content: Sy hanafa-tsiny ahy zanak’olombelona amin’ny sakaizako.
  - type: note
    content: Heb. sakaizany.
  '22':
  - type: text
    content: Fa rehefa lasa ny taona vitsy,
  - type: text
    content: Dia handeha any amin’ny làlana izay tsy hiverenako intsony aho.
  '3':
  - type: text
    content: Efa tapitra va izay ny bedibedy foana?
  - type: text
    content: Sa mbola misy manesika anao hamaly ahy ihany?
  '4':
  - type: text
    content: Izaho kosa mba mahazo miteny tahaka anareo,
  - type: text
    content: Raha mba tonga tahaka ahy hianareo;
  - type: text
    content: Eny, mahazo manamboatra teny ho enti-mamely anareo aho
  - type: text
    content: Ary mahazo mihifikifi-doha aminareo;
  '5':
  - type: text
    content: Mahazo mampahery anareo amin’ny vavako aho,
  - type: text
    content: Ary mahazo mampitony ny alahelonareo ny fampiononana ataon’ny molotro.
  '6':
  - type: text
    content: Na dia miteny aza aho, dia tsy mitsahatra ny alaheloko;
  - type: text
    content: Ary na dia mangina aza aho, dia tsy misy mihena izany.
  '7':
  - type: text
    content: Fa ankehitriny efa nandreraka ahy Izy;
  - type: text
    content: Naringanao ny ankohonako rehetra.
  '8':
  - type: text
    content: Ary efa nampifezaka ny tenako Hianao,
  - type: note
    content: 'Na: nosamborinao aho.'
  - type: text
    content: ' ka dia vavolombelona amiko izany.'
  - type: text
    content: Ary mitsangana hiampanga ahy ny fahahiazako, ka dia tondromaso akaiky izany.
  '9':
  - type: text
    content: Amin’ny fahatezerany no amiravirany sy andrafiany ahy,
  - type: text
    content: Mihidy vazana amiko Izy;
  - type: text
    content: Eny, miseho ho fahavaloko Izy ka mampivandravandra ny masony amiko;
