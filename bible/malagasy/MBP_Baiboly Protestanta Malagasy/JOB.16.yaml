document_id: JOB.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny navalin’i Joba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Joba ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Efa nandre zavatra maro toy izany aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpampionona mahasorisorena foana hianareo rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa tapitra va izay ny bedibedy foana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa mbola misy manesika anao hamaly ahy ihany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izaho kosa mba mahazo miteny tahaka anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mba tonga tahaka ahy hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mahazo manamboatra teny ho enti-mamely anareo aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahazo mihifikifi-doha aminareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mahazo mampahery anareo amin’ny vavako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahazo mampitony ny alahelonareo ny fampiononana ataon’ny molotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na dia miteny aza aho, dia tsy mitsahatra ny alaheloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia mangina aza aho, dia tsy misy mihena izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ankehitriny efa nandreraka ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naringanao ny ankohonako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary efa nampifezaka ny tenako Hianao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nosamborinao aho.
    marker-yv: yv-n
  - type: text
    text: ' ka dia vavolombelona amiko izany.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitsangana hiampanga ahy ny fahahiazako, ka dia tondromaso akaiky izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’ny fahatezerany no amiravirany sy andrafiany ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihidy vazana amiko Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, miseho ho fahavaloko Izy ka mampivandravandra ny masony amiko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nisanasana vava tamiko ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Latsa no nentiny namely ny takolako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitambatra hamely ahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa voatolotr’Andriamanitra ho amin’ny ratsy fanahy aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary natsipiny ho eo an-tànan’ny mpanota.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tamin’ilay izaho tsy nanana ahiahy iny, dia nanorotoro ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nosamboriny tamin’ny hatoko aho ka nomontsaniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady natsangany ho marika hokendreny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manodidina ahy ny mpandefa zana-tsipìkany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamaky ny voako Izy ka tsy miantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manidina ny aferoko ho amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Bangabangainy lalandava aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miroatra hamely ahy tahaka ny lehilahy mahery Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lamba fisaonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lamba malailay.
    marker-yv: yv-n
  - type: text
    text: ' no voazaitrako hanarona ny hoditro,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nalàko baraka tamin’ny vovoka ny tandroko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny tavako tera-menan’ny fitomaniana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo amin’ny hodi-masoko ny aloky ny fahafatesana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Kanefa tsy misy eto an-tànako izay mba nalaina an-keriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary madio ny fivavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ry tany ô, aza manarona ny rako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy ho voahazona ny fitarainako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa na dia ankehitriny aza, indro, any an-danitra ny Vavolombeloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny Vavolombeloko dia any amin’ny avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na dia mihomehy ahy aza ny sakaizako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mamarin-dranomaso eo anatrehan’Andriamanitra kosa aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mba hanamarina ahy olombelona eo anatrehany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanafa-tsiny ahy zanak’olombelona amin’ny sakaizako.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sakaizany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa rehefa lasa ny taona vitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handeha any amin’ny làlana izay tsy hiverenako intsony aho.
