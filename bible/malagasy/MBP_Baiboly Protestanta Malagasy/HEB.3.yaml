document_id: HEB.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fampitahana an’i Kristy sy Mosesy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'KOA amin’izany, ry rahalahy masina, mpiombona ny fiantsoana avy any an-danitra, hevero ny Apostoly sy Mpisoronabe Izay ekentsika, dia Jesosy, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tezitra tamin’izany taranaka izany Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka nanao hoe: Ireo dia maniasia amin’ny fony mandrakariva'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nahalala ny làlako;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary araka izany no nianianako tamin’ny fahatezerako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hiditra amin’ny fitsaharako mihitsy izy’’ (Sal. 95.7–11).
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tandremo, ry rahalahy, fandrao hisy aminareo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hanana
    - type: text
      text: ' fo ratsy tsy mino ka hiala amin’Andriamanitra velona; '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'fa mifananara isan-andro, raha mbola atao hoe ,,Anio’’; fandrao hisy aminareo ho tonga mafy fo noho ny famitahan’ny ota. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Fa efa tonga mpiombona amin’i Kristy isika, raha mihazona mafy ny fiandohan’ny fahatokiantsika hatramin’ny farany; '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'raha atao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Anio, raha hihaino ny feony hianareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manamafy ny fonareo tahaka ny tamin’ny fahasosorana’ Sal. 95.7, 8).
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa iza moa no nahatezitra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Azy,
    - type: text
      text: ' rehefa nandre? Tsy izay rehetra nentin’i Mosesy niala tany Egypta va? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary iza no nahatezitra Azy efa-polo taona? Tsy izay nanota va, ka dia niampatrampatra tany an-efitra ny fatiny? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary iza no nianianany fa tsy hiditra any amin’ny fitsaharany, afa-tsy izay tsy nanaiky? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka dia hitantsika fa tsy nahazo niditra izy ireo noho ny tsi-finoany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mahatoky ny nanendry Azy, tahaka an’i Mosesy koa tao amin’ny tranon’
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra
    - type: text
      text: ' rehetra.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao Nom. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xii.7.
      marker-yv: yv-n
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Izy dia natao miendrika hanam-boninahitra noho Mosesy, araka ny ananan’ny mpanao trano voninahitra bebe kokoa noho ny trano nataony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny trano rehetra dia samy nisy mpanao azy; fa Izay nanao ny zavatra rehetra kosa dia Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Mosesy dia mpanompo nahatoky tao amin’ny tranon’
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra
    - type: text
      text: ' rehetra, ho fanambarana izay zavatra mbola holazaina; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa Kristy kosa dia Zanaka manapaka ny tranon’
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andriamanitra;
    - type: text
      text: ' ary isika no tranony, raha hazonintsika mafy hatramin’ny farany ny fahasahiana sy ny firavoravoana momba ny fanantenana.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa araka izay lazain’ny Fanahy Masina hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Anio, raha hihaino ny feony hianareo,'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manamafy ny fonareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny tamin’ny fahasosorana, tamin’ny andro fakam-panahy tany an-efitra,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay nakan’ny razanareo fanahy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahy
    - type: text
      text: ' tamin’ny nizahany toetra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahita ny asako efa-polo taona izy.
