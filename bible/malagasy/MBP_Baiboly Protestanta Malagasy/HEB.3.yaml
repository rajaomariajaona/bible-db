document_id: HEB.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitahana an’i Kristy sy Mosesy.
  - type: text
    content: 'KOA amin’izany, ry rahalahy masina, mpiombona ny fiantsoana avy any an-danitra, hevero ny Apostoly sy Mpisoronabe Izay ekentsika, dia Jesosy, '
  '10':
  - type: text
    content: Koa tezitra tamin’izany taranaka izany Aho
  - type: text
    content: 'Ka nanao hoe: Ireo dia maniasia amin’ny fony mandrakariva'
  - type: text
    content: Ka tsy nahalala ny làlako;
  '11':
  - type: text
    content: 'Ary araka izany no nianianako tamin’ny fahatezerako hoe:'
  - type: text
    content: Tsy hiditra amin’ny fitsaharako mihitsy izy’’ (Sal. 95.7–11).
  '12':
  - type: text
    content: 'Tandremo, ry rahalahy, fandrao hisy aminareo '
  - type: text
    content: hanana
  - type: text
    content: ' fo ratsy tsy mino ka hiala amin’Andriamanitra velona; '
  '13':
  - type: text
    content: 'fa mifananara isan-andro, raha mbola atao hoe ,,Anio’’; fandrao hisy aminareo ho tonga mafy fo noho ny famitahan’ny ota. '
  '14':
  - type: text
    content: 'Fa efa tonga mpiombona amin’i Kristy isika, raha mihazona mafy ny fiandohan’ny fahatokiantsika hatramin’ny farany; '
  '15':
  - type: text
    content: 'raha atao hoe:'
  - type: text
    content: ',,Anio, raha hihaino ny feony hianareo,'
  - type: text
    content: Aza manamafy ny fonareo tahaka ny tamin’ny fahasosorana’ Sal. 95.7, 8).
  '16':
  - type: text
    content: 'Fa iza moa no nahatezitra '
  - type: text
    content: Azy,
  - type: text
    content: ' rehefa nandre? Tsy izay rehetra nentin’i Mosesy niala tany Egypta va? '
  '17':
  - type: text
    content: 'Ary iza no nahatezitra Azy efa-polo taona? Tsy izay nanota va, ka dia niampatrampatra tany an-efitra ny fatiny? '
  '18':
  - type: text
    content: 'Ary iza no nianianany fa tsy hiditra any amin’ny fitsaharany, afa-tsy izay tsy nanaiky? '
  '19':
  - type: text
    content: Ka dia hitantsika fa tsy nahazo niditra izy ireo noho ny tsi-finoany.
  '2':
  - type: text
    content: Izay mahatoky ny nanendry Azy, tahaka an’i Mosesy koa tao amin’ny tranon’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' rehetra.'
  - type: note
    content: Izahao Nom. xii.7.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Fa Izy dia natao miendrika hanam-boninahitra noho Mosesy, araka ny ananan’ny mpanao trano voninahitra bebe kokoa noho ny trano nataony. '
  '4':
  - type: text
    content: 'Fa ny trano rehetra dia samy nisy mpanao azy; fa Izay nanao ny zavatra rehetra kosa dia Andriamanitra. '
  '5':
  - type: text
    content: Ary Mosesy dia mpanompo nahatoky tao amin’ny tranon’
  - type: text
    content: Andriamanitra
  - type: text
    content: ' rehetra, ho fanambarana izay zavatra mbola holazaina; '
  '6':
  - type: text
    content: fa Kristy kosa dia Zanaka manapaka ny tranon’
  - type: text
    content: Andriamanitra;
  - type: text
    content: ' ary isika no tranony, raha hazonintsika mafy hatramin’ny farany ny fahasahiana sy ny firavoravoana momba ny fanantenana.'
  '7':
  - type: text
    content: 'Koa araka izay lazain’ny Fanahy Masina hoe:'
  - type: text
    content: ',,Anio, raha hihaino ny feony hianareo,'
  '8':
  - type: text
    content: Aza manamafy ny fonareo
  - type: text
    content: Tahaka ny tamin’ny fahasosorana, tamin’ny andro fakam-panahy tany an-efitra,
  '9':
  - type: text
    content: 'Izay nakan’ny razanareo fanahy '
  - type: text
    content: Ahy
  - type: text
    content: ' tamin’ny nizahany toetra '
  - type: text
    content: Ahy,
  - type: text
    content: Ary nahita ny asako efa-polo taona izy.
