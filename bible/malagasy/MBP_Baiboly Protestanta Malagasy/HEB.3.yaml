document_id: HEB.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fampitahana an’i Kristy sy Mosesy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'KOA amin’izany, ry rahalahy masina, mpiombona ny fiantsoana avy any an-danitra, hevero ny Apostoly sy Mpisoronabe Izay ekentsika, dia Jesosy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay mahatoky ny nanendry Azy, tahaka an’i Mosesy koa tao amin’ny tranon’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Andriamanitra
  - type: text
    text: ' rehetra.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Izahao Nom. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xii.7.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Izy dia natao miendrika hanam-boninahitra noho Mosesy, araka ny ananan’ny mpanao trano voninahitra bebe kokoa noho ny trano nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny trano rehetra dia samy nisy mpanao azy; fa Izay nanao ny zavatra rehetra kosa dia Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Mosesy dia mpanompo nahatoky tao amin’ny tranon’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Andriamanitra
  - type: text
    text: ' rehetra, ho fanambarana izay zavatra mbola holazaina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: fa Kristy kosa dia Zanaka manapaka ny tranon’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Andriamanitra;
  - type: text
    text: ' ary isika no tranony, raha hazonintsika mafy hatramin’ny farany ny fahasahiana sy ny firavoravoana momba ny fanantenana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa araka izay lazain’ny Fanahy Masina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Anio, raha hihaino ny feony hianareo,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza manamafy ny fonareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny tamin’ny fahasosorana, tamin’ny andro fakam-panahy tany an-efitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay nakan’ny razanareo fanahy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahy
  - type: text
    text: ' tamin’ny nizahany toetra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahita ny asako efa-polo taona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa tezitra tamin’izany taranaka izany Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka nanao hoe: Ireo dia maniasia amin’ny fony mandrakariva'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy nahalala ny làlako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary araka izany no nianianako tamin’ny fahatezerako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiditra amin’ny fitsaharako mihitsy izy’’ (Sal. 95.7–11).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tandremo, ry rahalahy, fandrao hisy aminareo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hanana
  - type: text
    text: ' fo ratsy tsy mino ka hiala amin’Andriamanitra velona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa mifananara isan-andro, raha mbola atao hoe ,,Anio’’; fandrao hisy aminareo ho tonga mafy fo noho ny famitahan’ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa efa tonga mpiombona amin’i Kristy isika, raha mihazona mafy ny fiandohan’ny fahatokiantsika hatramin’ny farany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'raha atao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Anio, raha hihaino ny feony hianareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manamafy ny fonareo tahaka ny tamin’ny fahasosorana’ Sal. 95.7, 8).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa iza moa no nahatezitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Azy,
  - type: text
    text: ' rehefa nandre? Tsy izay rehetra nentin’i Mosesy niala tany Egypta va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary iza no nahatezitra Azy efa-polo taona? Tsy izay nanota va, ka dia niampatrampatra tany an-efitra ny fatiny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary iza no nianianany fa tsy hiditra any amin’ny fitsaharany, afa-tsy izay tsy nanaiky? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ka dia hitantsika fa tsy nahazo niditra izy ireo noho ny tsi-finoany.
