document_id: 1PE.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana ny loholona mba ho malemy fanahy sy ho mahatoky, ary fananarana ny olona rehetra mba hanetry tena sy hitandrina. Vavaka farany sy fanaovam-beloma.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: KOA ny amin’ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' izay eo aminareo, izaho, izay naman’ny loholona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' sy vavolombelon’ny fijalian’i Kristy ary mpiombona ny voninahitra efa haseho koa, dia mananatra azy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Andraso ny ondrin’Andriamanitra izay eo aminareo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay andraikitrareo.
    marker-yv: yv-n
  - type: text
    text: ' mitandrina azy tsy an-tery, fa amin’ny sitrapo [araka an’Andriamanitra]; tsy amin’ny fitiavana harena maloto, fa amin’ny zotom-panahy; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy ho mpanjakazaka amin’ny anjara-fiandrasana, fa ho fianaran’ny ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary rehefa miseho ny Lohan’ny mpiandry, dia hahazo ny satroboninahitra tsy mety simba hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary hianareo izay mbola tanora fanahy kosa, dia maneke ny loholona.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' Eny, samia misikina fanetren-tena hianareo ka mifanompoa; fa ,,Andriamanitra manohitra ny miavonavona, fa manome fahasoavana ho an’ny manetry tena’’ (Oha. 3.34). '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa amin’izany manetre tena ambanin’ny tàna-maherin’Andriamanitra, mba hanandratany anareo amin’ny fotoan’andro; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary apetraho aminy ny fanahianareo rehetra; fa Izy no miahy anareo (Sal. 55.22). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mahonòna tena, miambena: fa ny devoly fahavalonareo mandehandeha tahaka ny liona mierona mitady izay harapany; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: tohero izy, ka miorena tsara amin’ny finoana hianareo, satria fantatrereo fa izany fahoriana izany dia manjo ny rahalahinareo rehetra eran’izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Andriamanitry ny fahasoavana rehetra, Izay efa niantso anareo ho any amin’ny voninahiny mandrakizay ao amin’i Kristy, rehefa niaritra fahoriana vetivety hianareo, dia Izy no hahatanteraka sy hampiorina ary hampitoetra anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ho Azy anie ny fanjakana mandrakizay mandrakizay. Amena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Efa manoratra teny fohifohy ho aminareo aho hampitondraina an’i Silasy, izay ataoko ho rahalahy mahatoky, dia mananatra anareo aho ka manambara fa izany no tena fahasoavan’Andriamanitra,–tomoera tsara amin’izany hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izay any Babylona, voafidy ho namanareo, manao veloma anareo, ary Marka zanako koa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mifanaova veloma amin’ny fanoroham-pitiavana.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ho aminareo rehetra izay ao amin’i Kristy anie ny fiadanana.
