document_id: JOB.33,873
type_code: plt
verses:
  '1':
  - type: text
    content: Kanefa, masìna hianao, ry Joba, mihainoa ny alahatro,
  - type: text
    content: Ary mandrenesa ny teniko rehetra.
  '10':
  - type: text
    content: He! mitady izay handrafiany ahy Andriamanitra,
  - type: text
    content: Ary ataony fahavalony aho;
  '11':
  - type: text
    content: Mampiditra ny tongotro eo amin’ny boloky hazo Izy
  - type: text
    content: Ary mitsikilo ny diako rehetra.
  '12':
  - type: text
    content: He! izany no tsy mahamarina anao, hoy izaho;
  - type: text
    content: Fa Andriamanitra dia lehibe loatra ka tsy leon’ny zanak’olombelona.
  '13':
  - type: text
    content: Koa nahoana no manome tsiny Azy hianao
  - type: text
    content: Noho ny tsy nampisehoany izay antony amin’ny ataony?
  - type: note
    content: 'Na: Noho ny tsy amaliany ny tenin’olombelona?'
  '14':
  - type: text
    content: Kanefa misy fanao iray itenenan’Andriamanitra,
  - type: text
    content: Eny, fanao roa aza, nefa tsy tandreman’ny olona izany,
  '15':
  - type: text
    content: Dia ny nofy sy ny tsindrimandry amin’ny alina,
  - type: text
    content: Raha sondrian-tory ny olona
  - type: text
    content: Ka renoka eo am-pandriana,
  '16':
  - type: text
    content: Dia manokatra ny sofin’ny olona Izy
  - type: text
    content: Ka manisy tombo-kase ny fananarany azy,
  '17':
  - type: text
    content: Mba hampiala ny olona amin’ny fanaony,
  - type: text
    content: Sy hampifady azy ny fireharehana.
  '18':
  - type: text
    content: Miaro ny fanahiny tsy ho any an-davaka Izy,
  - type: text
    content: Ary ny ainy mba tsy ho voan’ny fiadiana.
  '19':
  - type: text
    content: Anarina amin’ny fanaintainana eo am-pandriany koa izy
  - type: text
    content: Sy amin’ny fikotrankotran’ny taolany lalandava;
  '2':
  - type: text
    content: Indro, fa efa niloa-bava aho,
  - type: text
    content: Miteny ato am-bavako ny lelako.
  '20':
  - type: text
    content: Ary ny ainy marikorikon-kanina,
  - type: text
    content: Eny, na dia ny hanim-py aza tsy tian’ny fanahiny.
  '21':
  - type: text
    content: Mihena ny nofony ka tsy hita,
  - type: text
    content: Ary mitranitrany ny taolany izay tsy hita teo;
  '22':
  - type: text
    content: Dia manakaiky ny lavaka ny fanahiny,
  - type: text
    content: Ary ny ainy manatona ny mpaka aina.
  '23':
  - type: text
    content: Raha misy Anjely ho Mpanalalana ho azy,
  - type: text
    content: Iray amin’ny arivo,
  - type: text
    content: Hanoro izay tokony halehan’ny olona,
  '24':
  - type: text
    content: Ary
  - type: note
    content: 'Na: Dia.'
  - type: text
    content: ' hamindra fo aminy ka nanao hoe:'
  - type: text
    content: Vonjeo izy mba tsy hidina any an-davaka,
  - type: text
    content: Fa efa nahita avotra Aho.
  '25':
  - type: text
    content: Dia ho tsara noho ny an’ny tanora ny nofony,
  - type: text
    content: Hody ho toy ny tamin’ny andro nahatanorany izy;
  '26':
  - type: text
    content: Hivavaka amin’Andriamanitra izy ka hankasitrahany
  - type: text
    content: Ary hahita ny tavany amin’ny hafaliana,
  - type: text
    content: Fa hampodiny amin’ny zanak’olombelona ny fahamarinany.
  - type: note
    content: 'Na: hamaly ny olona araka ny fahamarinany Izy.'
  '27':
  - type: text
    content: 'Dia hihira izy hilaza amin’ny olona hoe:'
  - type: text
    content: Efa nanota aho, fa nanao ny rariny ho heloka,
  - type: text
    content: Kanefa tsy novaliana araka ny nataoko;
  '28':
  - type: text
    content: Fa navotany ny fanahiko mba tsy hivarina any an-davaka,
  - type: text
    content: Ary mifaly ny aiko amin’ny fahitana ny mazava.
  '29':
  - type: text
    content: Indro, izany rehetra izany no ataon’Andriamanitra
  - type: text
    content: Indroa amin’ny olona, eny, intelo aza,
  '3':
  - type: text
    content: Ny hitsim-poko no hiseho amin’ny teniko;
  - type: text
    content: Ary ny fahalalan’ny molotro no holazaina tsy hasiana fitaka.
  '30':
  - type: text
    content: Mba hamerina ny fanahiny tsy ho
  - type: note
    content: 'Na: hiala.'
  - type: text
    content: ' any an-davaka,'
  - type: text
    content: Mba hihazavany amin’ny fahazavan’aina.
  '31':
  - type: text
    content: Tandremo, ry Joba, ka mihainoa ahy;
  - type: text
    content: Mangìna kely aloha hianao, fa izaho mbola hiteny.
  '32':
  - type: text
    content: Raha manan-kavaly hianao, dia mamalia ahy ihany;
  - type: text
    content: Mitenena, fa ta-hanamarina anao aho;
  '33':
  - type: text
    content: Fa raha tsy manan-kavaly hianao, dia mihainoa ahy kosa;
  - type: text
    content: Mangìna tsara, fa hampianariko fahendrena hianao.
  '4':
  - type: text
    content: Ny Fanahin’Andriamanitra no efa nanao ahy,
  - type: text
    content: Ary ny fofonain’ny Tsitoha no mamelona ahy.
  '5':
  - type: text
    content: Raha hainao, valio ary aho,
  - type: text
    content: Miomàna hianao, ka miatreha tsara.
  '6':
  - type: text
    content: Indro, izaho koa mba an’Andriamanitra tahaka anao ihany;
  - type: text
    content: Eny, izaho koa mba nosombinana avy tamin’ny tanimanga.
  '7':
  - type: text
    content: Indro, ny fampahatahorako tsy dia hampahatahotra anao,
  - type: text
    content: Ary ny vesatra avy amiko tsy dia hitambesatra aminao.
  '8':
  - type: text
    content: Efa nilaza teo anatrehako mihitsy hianao,
  - type: text
    content: 'Ary efa reko ihany ny feon’ny teninao hoe:'
  '9':
  - type: text
    content: Madio tsy manam-pahadisoana aho,
  - type: text
    content: Ary tsy manan-tsiny aman-keloka;
