document_id: JOB.33
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Kanefa, masìna hianao, ry Joba, mihainoa ny alahatro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mandrenesa ny teniko rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indro, fa efa niloa-bava aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miteny ato am-bavako ny lelako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny hitsim-poko no hiseho amin’ny teniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahalalan’ny molotro no holazaina tsy hasiana fitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny Fanahin’Andriamanitra no efa nanao ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fofonain’ny Tsitoha no mamelona ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha hainao, valio ary aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miomàna hianao, ka miatreha tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indro, izaho koa mba an’Andriamanitra tahaka anao ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, izaho koa mba nosombinana avy tamin’ny tanimanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro, ny fampahatahorako tsy dia hampahatahotra anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vesatra avy amiko tsy dia hitambesatra aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Efa nilaza teo anatrehako mihitsy hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary efa reko ihany ny feon’ny teninao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Madio tsy manam-pahadisoana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy manan-tsiny aman-keloka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He! mitady izay handrafiany ahy Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ataony fahavalony aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mampiditra ny tongotro eo amin’ny boloky hazo Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitsikilo ny diako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He! izany no tsy mahamarina anao, hoy izaho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Andriamanitra dia lehibe loatra ka tsy leon’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa nahoana no manome tsiny Azy hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny tsy nampisehoany izay antony amin’ny ataony?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Noho ny tsy amaliany ny tenin’olombelona?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Kanefa misy fanao iray itenenan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, fanao roa aza, nefa tsy tandreman’ny olona izany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia ny nofy sy ny tsindrimandry amin’ny alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha sondrian-tory ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka renoka eo am-pandriana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia manokatra ny sofin’ny olona Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manisy tombo-kase ny fananarany azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mba hampiala ny olona amin’ny fanaony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hampifady azy ny fireharehana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Miaro ny fanahiny tsy ho any an-davaka Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ainy mba tsy ho voan’ny fiadiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Anarina amin’ny fanaintainana eo am-pandriany koa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny fikotrankotran’ny taolany lalandava;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny ainy marikorikon-kanina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, na dia ny hanim-py aza tsy tian’ny fanahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mihena ny nofony ka tsy hita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitranitrany ny taolany izay tsy hita teo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia manakaiky ny lavaka ny fanahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ainy manatona ny mpaka aina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha misy Anjely ho Mpanalalana ho azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iray amin’ny arivo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanoro izay tokony halehan’ny olona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dia.
    marker-yv: yv-n
  - type: text
    text: ' hamindra fo aminy ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo izy mba tsy hidina any an-davaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nahita avotra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia ho tsara noho ny an’ny tanora ny nofony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hody ho toy ny tamin’ny andro nahatanorany izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hivavaka amin’Andriamanitra izy ka hankasitrahany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahita ny tavany amin’ny hafaliana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hampodiny amin’ny zanak’olombelona ny fahamarinany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hamaly ny olona araka ny fahamarinany Izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hihira izy hilaza amin’ny olona hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanota aho, fa nanao ny rariny ho heloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa tsy novaliana araka ny nataoko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa navotany ny fanahiko mba tsy hivarina any an-davaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mifaly ny aiko amin’ny fahitana ny mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Indro, izany rehetra izany no ataon’Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indroa amin’ny olona, eny, intelo aza,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mba hamerina ny fanahiny tsy ho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hiala.
    marker-yv: yv-n
  - type: text
    text: ' any an-davaka,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hihazavany amin’ny fahazavan’aina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tandremo, ry Joba, ka mihainoa ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangìna kely aloha hianao, fa izaho mbola hiteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha manan-kavaly hianao, dia mamalia ahy ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitenena, fa ta-hanamarina anao aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa raha tsy manan-kavaly hianao, dia mihainoa ahy kosa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangìna tsara, fa hampianariko fahendrena hianao.
