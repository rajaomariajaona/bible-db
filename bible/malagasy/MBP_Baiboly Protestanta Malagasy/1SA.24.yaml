document_id: 1SA.24,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny tsy netezan’i Davida hahafaty an’i Saoly, na dia azony tao an-johy aza.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Davida niakatra niala teo ka nitoetra tao amin’ny batery fiarovana tany En-jedy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Davida tamin’i Saoly: Nahoana hianao no maka vavan’olona hoe: Indro, Davida mitady hanisy ratsy anao? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, hitan’ny masonao andro-any ny nanoloran’i Jehovah anao ho eo an-tànako tao an-johy; ary nisy nilaza hevitra hamonoana anao, saingy niantra anao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny masoko
    - type: text
      text: ', ka hoy izaho: Tsy haninjitra ny tànako amin’ny tompoko aho, fa voahosotr’i Jehovah izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary koa, ry ikaky ô, jereo dia jereo ange ny sisin’ny kapôtinao etỳ an-tànako; fa raha nanapaka ny sisin’ny kapôtinao aho, fa tsy nahafaty anao, dia izahao ka fantaro fa tsy misy faharatsiana na fahadisoana amin’ny tànako, ary tsy nanota taminao aho, nefa hianao kosa mihaza ny aiko mba hahafaty azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah no hitsara ahy sy hianao, ary Jehovah no hamaly anao noho ny amiko, fa ny tànako tsy mba haninona anao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny lazain’ny ohabolan’ny ntaolo hoe: ,Avy amin’ny ratsy fanahy no ivoahan’ny ratsy, nefa ny tànako tsy haninona anao.’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitady an’iza no nivoahan’ny mpanjakan’ny Isiraely? Iza no enjehinao? Amboa maty; parasy iray. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka Jehovah no ho mpitsara, ka dia hitsara ahy sy hianao ary hijery sy handahatra ho ahy ka hanafaka ahy amin’ny tànanao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony vita izany teny nataon’i Davida tamin’i Saoly izany, dia hoy Saoly: Feonao va izany, ry Davida zanako ô? Ary Saoly nanandratra ny feony ka nitomany; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hoy izy tamin’i Davida: Marina noho izaho hianao; fa hianao dia nanisy soa ahy, fa izaho kosa namaly ratsy anao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hianao dia naneho andro-any ny nanaovanao soa tamiko, fa na dia natolotr’i Jehovah teo an-tànanao aza aho, dia tsy nahafaty ahy hianao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa niverina avy nanenjika ny Filistina Saoly, dia nisy nanambara taminy hoe: Indro, Davida any an-efitr’i En-jedy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa moa raha misy olona mahazo ny fahavalony, havelany handeha soa aman-tsara va izy? Koa hovalian’i Jehovah soa anie hianao noho ny nataonao tamiko andro-any. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, ankehitriny fantatro fa ho mpanjaka tokoa hianao, ary ny fanjakan’ny Isiraely ho tafatoetra tsara eo an-tànanao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mianiàna amiko amin’i Jehovah hianao ankehitriny fa tsy handringana ny taranako mandimby ahy hianao, ary tsy hovonoinao amin’ny mpianakavin’ny raiko ny anarako. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Davida dia nianiana tamin’i Saoly; ary dia lasa nody Saoly, fa Davida sy ny olony kosa niakatra nankany amin’ny batery fiarovana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Saoly naka telo arivo lahy voafantina tamin’ny Isiraely rehetra ka lasa nitady an’i Davida sy ny olony tany amin’ny vatolampin’ny osi-dia.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga teo amin’ny valan’ondry tamoron-dàlana izay nisy zohy izy, ka niditra tao Saoly mba hiavela; nefa Davida sy ny olony efa nipetraka tao anatin’ny zohy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny olon’i Davida taminy: Izao no andro nolazain’i Jehovah taminao hoe: Indro, hatolotro eo an-tànanao ny fahavalonao hataonao araka izay sitrakao. Dia nitsangana Davida ka nitsaitsaika nanapaka ny sisin’ny kapôtin’i Saoly. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa nony efa vita izany, dia namely an’i Davida ny eritreriny noho ny nanapahany ny sisin’ny kapôtin’i Saoly, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy izy tamin’ny olony: Sanatria amiko eo anatrehan’i Jehovah, raha hanao izany zavatra izany amin’ny tompoko izay voahosotr’i Jehovah ka haninjitra ny tànako aminy, fa voahosotr’i Jehovah izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nampijanona ny mpanompony tamin’izany teny izany Davida ka tsy namela azy hitsangana hamely an’i Saoly.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Saoly nitsangana ka niala tao an-johy, dia nandeha tamin’izay nalehany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka izany, dia mba nitsangana koa Davida ka niala tao an-johy koa, dia niantso an’i Saoly ka nanao hoe: Ry mpanjaka tompoko ô! Ary nony nitodika azy Saoly, dia niondrika tamin’ny tany Davida ka niankohoka.'
