verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiomanana handray ny Mpanjakan’ny voninahitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: AN’i Jehovah ny tany sy izay rehetra eo aminy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao rehetra izao sy ny mponina eo aminy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza ary izao Mpanjakan’ny voninahitra izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no Mpanjakan’ny voninahitra.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no nanorina azy tambonin’ny ranomasina.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tambonin’ny rano no nampitoerany azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hiakatra any an-tendrombohitr’i Jehovah?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no hitoetra ao amin’ny fitoerany masina?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay madio tànana sy mahitsy fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy manandratra ny fanahiny ho amin’ny lainga, na mianiana hamitaka.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handray fitahiana avy amin’i Jehovah izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fahamarinana avy amin’Andriamanitry ny famonjena azy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no taranaka mitady Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitady ny tavanao,–dia Jakoba.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.6 '
      - type: usfm
