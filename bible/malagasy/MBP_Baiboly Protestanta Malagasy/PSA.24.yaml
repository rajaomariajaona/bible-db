document_id: PSA.24,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiomanana handray ny Mpanjakan’ny voninahitra.
  - type: text
    content: Salamo nataon’i Davida.
  - type: text
    content: AN’i Jehovah ny tany sy izay rehetra eo aminy.
  - type: text
    content: Izao rehetra izao sy ny mponina eo aminy.
  '10':
  - type: text
    content: Iza ary izao Mpanjakan’ny voninahitra izao?
  - type: text
    content: Jehovah, Tompon’ny maro,
  - type: text
    content: Izy no Mpanjakan’ny voninahitra.
  - type: text
    content: '[Sela.]'
  '2':
  - type: text
    content: Fa Izy no nanorina azy tambonin’ny ranomasina.
  - type: text
    content: Tambonin’ny rano no nampitoerany azy.
  '3':
  - type: text
    content: Iza no hiakatra any an-tendrombohitr’i Jehovah?
  - type: text
    content: Ary iza no hitoetra ao amin’ny fitoerany masina?
  '4':
  - type: text
    content: Izay madio tànana sy mahitsy fo,
  - type: text
    content: Izay tsy manandratra ny fanahiny ho amin’ny lainga, na mianiana hamitaka.
  '5':
  - type: text
    content: Handray fitahiana avy amin’i Jehovah izy.
  - type: text
    content: Ary fahamarinana avy amin’Andriamanitry ny famonjena azy.
  '6':
  - type: text
    content: Izany no taranaka mitady Azy,
  - type: text
    content: Izay mitady ny tavanao,–dia Jakoba.
  - type: note
    content: 'Na: Izay mitady ny tavanao, ry Andriamanitr’i Jakoba.'
  - type: text
    content: '[Sela.]'
  '7':
  - type: text
    content: Asandrato ny lohanareo, ry vavahady,
  - type: text
    content: Ary misandrata hianareo, ry varavarana fahagola,
  - type: note
    content: 'Na: mandrakizay.'
  - type: text
    content: Mba hidiran’ny Mpanjakan’ny voninahitra.
  '8':
  - type: text
    content: Iza izao Mpanjakan’ny voninahitra izao?
  - type: text
    content: Jehovah mahery tsi-toha,
  - type: text
    content: Jehovah mpiady mahery.
  '9':
  - type: text
    content: Asandrato ny lohanareo, ry vavahady;
  - type: text
    content: Ary manandrata ny lohanareo, ry varavarana fahagola,
  - type: note
    content: 'Na: mandrakizay.'
  - type: text
    content: Mba hidiran’ny Mpanjakan’ny voninahitra.
