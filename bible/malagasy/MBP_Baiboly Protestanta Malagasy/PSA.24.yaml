          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Izay mitady ny tavanao, ry '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Andriamanitr’i '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jakoba.
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato ny lohanareo, ry vavahady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary misandrata hianareo, ry varavarana fahagola,
    - type: usfm
      marker: f
