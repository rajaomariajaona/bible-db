  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: AN’i Jehovah ny tany sy izay rehetra eo aminy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izao rehetra izao sy ny mponina eo aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa Izy no nanorina azy tambonin’ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tambonin’ny rano no nampitoerany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Iza no hiakatra any an-tendrombohitr’i Jehovah?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no hitoetra ao amin’ny fitoerany masina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay madio tànana sy mahitsy fo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy manandratra ny fanahiny ho amin’ny lainga, na mianiana hamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Handray fitahiana avy amin’i Jehovah izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahamarinana avy amin’Andriamanitry ny famonjena azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany no taranaka mitady Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mitady ny tavanao,–dia Jakoba.
