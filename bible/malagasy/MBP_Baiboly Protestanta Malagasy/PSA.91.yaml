document_id: PSA.91
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahatokian’ny olo-marina an’Andriamanitra, na dia manakaiky azy aza ny manjo ny sasany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY mitoetra ao amin’ny fierena izay an’ny Avo Indrindra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia monina eo ambanin’ny aloky ny Tsitoha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izaho hilaza an’i Jehovah hoe: Fialofako sy batery fiarovana ho ahy Izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Andriamanitro, Izay hitokiako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Izy no hanafaka anao amin’ny fandriky ny mpihaza sy ny areti-mandoza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny volon’elany no anaronany anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao ambanin’ny elany no hialofanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho ampinga kely sy ampinga lehibe ny fahamarinany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy hatahotra ny horohoro nony alina hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny zana-tsipìka manidina nony andro,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na ny areti-mandringana mandeha amin’ny maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny fandringanana mandripaka amin’ny mitataovovonana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Na dia hisy arivo aza lavo eo anilanao sy iray alina eo an-kavananao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hihatra aminao izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hijery maso fotsiny hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho hitanao ny hamaliana ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satria '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'hoy hianao:'
  - type: text
    text: ' Jehovah ô, Hianao no aroko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nataonao ho fonenanao ny Avo Indrindra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia tsy hisy loza hanjo anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na aretina hanakaiky ny lainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa Izy handidy ny anjeliny ny aminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hiaro anao eny amin’izay rehetra halehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny an-tànany no hitondran’ireo anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao ho tafintohina amin’ny vato ny tongotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny liona masiaka sy ny vipera hodiavinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny liona tanora sy ny menarana no hohitsahinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Satria Izaho no niraiketan’ny fitiavany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hamonjy azy Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanandratra azy ho any amin’ny avo Aho, satria mahalala ny anarako izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hiantso Ahy izy, dia hamaly azy Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho eo aminy Aho, raha ory izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamonjy sy hanome voninahitra azy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hovokisako fahela-velona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hasehoko azy ny famonjeko.
