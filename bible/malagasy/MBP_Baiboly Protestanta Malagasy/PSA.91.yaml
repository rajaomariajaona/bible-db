document_id: PSA.91,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatokian’ny olo-marina an’Andriamanitra, na dia manakaiky azy aza ny manjo ny sasany.
  - type: text
    content: NY mitoetra ao amin’ny fierena izay an’ny Avo Indrindra
  - type: text
    content: Dia monina eo ambanin’ny aloky ny Tsitoha.
  '10':
  - type: text
    content: Dia tsy hisy loza hanjo anao,
  - type: text
    content: Na aretina hanakaiky ny lainao.
  '11':
  - type: text
    content: Fa Izy handidy ny anjeliny ny aminao
  - type: text
    content: Mba hiaro anao eny amin’izay rehetra halehanao.
  '12':
  - type: text
    content: Eny an-tànany no hitondran’ireo anao,
  - type: text
    content: Fandrao ho tafintohina amin’ny vato ny tongotrao.
  '13':
  - type: text
    content: Ny liona masiaka sy ny vipera hodiavinao;
  - type: text
    content: Ny liona tanora sy ny menarana no hohitsahinao.
  '14':
  - type: text
    content: Satria Izaho no niraiketan’ny fitiavany,
  - type: text
    content: Dia hamonjy azy Aho;
  - type: text
    content: Hanandratra azy ho any amin’ny avo Aho, satria mahalala ny anarako izy.
  '15':
  - type: text
    content: Hiantso Ahy izy, dia hamaly azy Aho;
  - type: text
    content: Ho eo aminy Aho, raha ory izy;
  - type: text
    content: Hamonjy sy hanome voninahitra azy Aho.
  '16':
  - type: text
    content: Hovokisako fahela-velona izy;
  - type: text
    content: Ary hasehoko azy ny famonjeko.
  '2':
  - type: text
    content: 'Izaho hilaza an’i Jehovah hoe: Fialofako sy batery fiarovana ho ahy Izy'
  - type: text
    content: Ary Andriamanitro, Izay hitokiako.
  '3':
  - type: text
    content: Fa Izy no hanafaka anao amin’ny fandriky ny mpihaza sy ny areti-mandoza.
  '4':
  - type: text
    content: Ny volon’elany no anaronany anao,
  - type: text
    content: Ary ao ambanin’ny elany no hialofanao;
  - type: text
    content: Ho ampinga kely sy ampinga lehibe ny fahamarinany.
  '5':
  - type: text
    content: Tsy hatahotra ny horohoro nony alina hianao,
  - type: text
    content: Na ny zana-tsipìka manidina nony andro,
  '6':
  - type: text
    content: Na ny areti-mandringana mandeha amin’ny maizina,
  - type: text
    content: Na ny fandringanana mandripaka amin’ny mitataovovonana.
  '7':
  - type: text
    content: Na dia hisy arivo aza lavo eo anilanao sy iray alina eo an-kavananao,
  - type: text
    content: Dia tsy hihatra aminao izany.
  '8':
  - type: text
    content: Hijery maso fotsiny hianao,
  - type: text
    content: Ka ho hitanao ny hamaliana ny ratsy fanahy.
  '9':
  - type: text
    content: 'Satria '
  - type: text
    content: 'hoy hianao:'
  - type: text
    content: ' Jehovah ô, Hianao no aroko,'
  - type: text
    content: Sady nataonao ho fonenanao ny Avo Indrindra,
