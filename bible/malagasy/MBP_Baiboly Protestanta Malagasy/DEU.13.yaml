document_id: DEU.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izay rehetra andidiako anareo dia tandremo mba harahina; aza ampianao izany, ary aza anesoranao.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fampijaliana izay mivavaka amin’ny sampy na mitaona ny sasany hivavaka aminy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'RAHA tàhiny misy mpaminany na mpanonofy eo aminareo izay milaza famantarana na fahagagana aminao '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sady manao hoe Andeha isika hanaraka andriamani-kafa (izay tsy fantatrao), ka aoka hanompo azy isika,–na dia tanteraka aza ny famantarana na fahagagana izay nolazainy taminao, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia aza mihaino ny tenin’izany mpaminany na mpanonofy izany; fa mizaha toetra anareo Jehovah Andriamanitrareo, hahalalany na miorina amin’ny fitiavana an’i Jehovah Andriamanitrareo amin’ny fonareo rehetra sy ny fanahinareo rehetra hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Manaraha an’i Jehovah Andriamanitrareo, ka aoka Izy no hatahoranareo, ary ny didiny no hotandremanareo, ary ny feony no hohenoinareo, ary aoka Izy no hotompoinareo sy hifikiranareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa izany mpaminany na mpanonofy izany dia hatao maty satria efa nanao teny fampiodinana amin’i Jehovah Andriamanitrareo (Izay nitondra anareo nivoaka avy tany amin’ny tany Egypta ka nanavotra anao tamin’ny trano nahandevozana), mba hitaona anao hiala amin’ny làlana izay nasain’i Jehovah Andriamanitrao halehanao. Ka dia hofongoranao tsy ho eo aminao ny fanao ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha mitaona anao mangingina ny rahalahinao, zanaky ny reninao, na ny zanakao-lahy, na ny zanakao-vavy, na ny vady andefimandrinao na ny sakaizanao izay toy ny ainao, ka manao hoe: Andeha isika hanompo andriamani-kafa (izay tsy fantatrao, na ny razanao), '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia ny andriamanitry ny firenena izay manodidina anareo, na ny akaikinao, na ny lavitra anao, hatramin’ ny faran’ny tany rehetra), '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia aza manaiky azy na mihaino azy hianao; ary aza mba iantran’ny masonao izy, na amindranao fo, na afeninao; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa vonoy ho faty izy; ny tànanao no ho voalohany hamono azy, dia vao ny tànan’ny vahoaka rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary torahy vato ho faty izy, satria izy efa nitady hitaona anao hiala amin’i Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin’ny tany Egypta, tamin’ny trano nahandevozana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny Isiraely rehetra handre izany, dia hatahotra ka tsy hanao ratsy toy izany intsony eo aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha mandre teny hianao ny amin’ny tanànanao anankiray izay nomen’i Jehovah Andriamanitrao anao honenana manao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nisy olona tena ratsy fanahy nivoaka avy teo aminao ka nitaona ny mponina ao an-tanànany nanao hoe: Andeha isika hanompo andriamani-kafa (izay tsy fantatrareo), '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia diniho sy fotory ary adino tsara, ka raha, indro fa nisy marina tokoa izany zavatra izany, ka natao teo aminao izany fahavetavetana izany, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: dia asio ny lelan-tsabatra mihitsy ny mponina amin’izany tanàna izany, ka levòny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Izahao Lev. xxvii.28.
    marker-yv: yv-n
  - type: text
    text: ' ny tanàna sy izay rehetra eo aminy, ary ny biby fiompy dia aringano amin’ny lelan-tsabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny entana nobaboina rehetra eo dia angony eo afovoan’ny kianja, ka doroy amin’ny afo avokoa ny tanàna sy ny entana rehetra ao ho an’i Jehovah Andriamanitrao, ary aoka ho tananaolo mandrakizay izany tanàna izany ka tsy haorina intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary aoka tsy hisy hiraikitra amin’ny tànanao akory ny zavatra efa natolotra holevonina,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Izahao Lev. xxvii.28.
    marker-yv: yv-n
  - type: text
    text: ' mba hitsaharan’i Jehovah amin’ ny fahatezerany mirehitra hamindrany fo aminao sy hiantrany anao, ary hahamaroany anao araka izay nianianany tamin’ny razanao, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: raha hohenoinao ny feon’i Jehovah Andriamanitrao ka hotandremanao ny didiny rehetra izay andidiako anao anio, mba hanaovana izay mahitsy eo imason’i Jehovah Andriamanitrao.
