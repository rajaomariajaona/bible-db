document_id: DEU.13,873
type_code: plt
verses:
  '1':
  - type: text
    content: Izay rehetra andidiako anareo dia tandremo mba harahina; aza ampianao izany, ary aza anesoranao.
  - type: heading
    content: Ny amin’ny fampijaliana izay mivavaka amin’ny sampy na mitaona ny sasany hivavaka aminy.
  '10':
  - type: text
    content: 'fa vonoy ho faty izy; ny tànanao no ho voalohany hamono azy, dia vao ny tànan’ny vahoaka rehetra. '
  '11':
  - type: text
    content: 'Ary torahy vato ho faty izy, satria izy efa nitady hitaona anao hiala amin’i Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin’ny tany Egypta, tamin’ny trano nahandevozana. '
  '12':
  - type: text
    content: Ary ny Isiraely rehetra handre izany, dia hatahotra ka tsy hanao ratsy toy izany intsony eo aminao.
  '13':
  - type: text
    content: 'Raha mandre teny hianao ny amin’ny tanànanao anankiray izay nomen’i Jehovah Andriamanitrao anao honenana manao hoe: '
  '14':
  - type: text
    content: 'Nisy olona tena ratsy fanahy nivoaka avy teo aminao ka nitaona ny mponina ao an-tanànany nanao hoe: Andeha isika hanompo andriamani-kafa (izay tsy fantatrareo), '
  '15':
  - type: text
    content: 'dia diniho sy fotory ary adino tsara, ka raha, indro fa nisy marina tokoa izany zavatra izany, ka natao teo aminao izany fahavetavetana izany, '
  '16':
  - type: text
    content: dia asio ny lelan-tsabatra mihitsy ny mponina amin’izany tanàna izany, ka levòny
  - type: note
    content: Izahao Lev. xxvii.28.
  - type: text
    content: ' ny tanàna sy izay rehetra eo aminy, ary ny biby fiompy dia aringano amin’ny lelan-tsabatra. '
  '17':
  - type: text
    content: 'Ary ny entana nobaboina rehetra eo dia angony eo afovoan’ny kianja, ka doroy amin’ny afo avokoa ny tanàna sy ny entana rehetra ao ho an’i Jehovah Andriamanitrao, ary aoka ho tananaolo mandrakizay izany tanàna izany ka tsy haorina intsony. '
  '18':
  - type: text
    content: Ary aoka tsy hisy hiraikitra amin’ny tànanao akory ny zavatra efa natolotra holevonina,
  - type: note
    content: Izahao Lev. xxvii.28.
  - type: text
    content: ' mba hitsaharan’i Jehovah amin’ ny fahatezerany mirehitra hamindrany fo aminao sy hiantrany anao, ary hahamaroany anao araka izay nianianany tamin’ny razanao, '
  '19':
  - type: text
    content: raha hohenoinao ny feon’i Jehovah Andriamanitrao ka hotandremanao ny didiny rehetra izay andidiako anao anio, mba hanaovana izay mahitsy eo imason’i Jehovah Andriamanitrao.
  '2':
  - type: text
    content: 'RAHA tàhiny misy mpaminany na mpanonofy eo aminareo izay milaza famantarana na fahagagana aminao '
  '3':
  - type: text
    content: 'sady manao hoe Andeha isika hanaraka andriamani-kafa (izay tsy fantatrao), ka aoka hanompo azy isika,–na dia tanteraka aza ny famantarana na fahagagana izay nolazainy taminao, '
  '4':
  - type: text
    content: 'dia aza mihaino ny tenin’izany mpaminany na mpanonofy izany; fa mizaha toetra anareo Jehovah Andriamanitrareo, hahalalany na miorina amin’ny fitiavana an’i Jehovah Andriamanitrareo amin’ny fonareo rehetra sy ny fanahinareo rehetra hianareo. '
  '5':
  - type: text
    content: 'Manaraha an’i Jehovah Andriamanitrareo, ka aoka Izy no hatahoranareo, ary ny didiny no hotandremanareo, ary ny feony no hohenoinareo, ary aoka Izy no hotompoinareo sy hifikiranareo. '
  '6':
  - type: text
    content: Fa izany mpaminany na mpanonofy izany dia hatao maty satria efa nanao teny fampiodinana amin’i Jehovah Andriamanitrareo (Izay nitondra anareo nivoaka avy tany amin’ny tany Egypta ka nanavotra anao tamin’ny trano nahandevozana), mba hitaona anao hiala amin’ny làlana izay nasain’i Jehovah Andriamanitrao halehanao. Ka dia hofongoranao tsy ho eo aminao ny fanao ratsy.
  '7':
  - type: text
    content: 'Raha mitaona anao mangingina ny rahalahinao, zanaky ny reninao, na ny zanakao-lahy, na ny zanakao-vavy, na ny vady andefimandrinao na ny sakaizanao izay toy ny ainao, ka manao hoe: Andeha isika hanompo andriamani-kafa (izay tsy fantatrao, na ny razanao), '
  '8':
  - type: text
    content: 'dia ny andriamanitry ny firenena izay manodidina anareo, na ny akaikinao, na ny lavitra anao, hatramin’ ny faran’ny tany rehetra), '
  '9':
  - type: text
    content: 'dia aza manaiky azy na mihaino azy hianao; ary aza mba iantran’ny masonao izy, na amindranao fo, na afeninao; '
