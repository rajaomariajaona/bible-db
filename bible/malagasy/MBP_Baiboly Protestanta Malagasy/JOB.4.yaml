document_id: JOB.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny voalohany nataon’i Elifaza.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA namaly Elifaza Temanita ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feon’ny liona, eny, ny feon’ny liona masiaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny nifin’ny liona tanora dia ombotana;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mirenireny ny lion-dahy noho ny tsi-fahitany remby,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miely ny zanaky ny liom-bavy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisy teny tonga tamiko mangingina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sofiko nahare siosio avy taminy,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny eritreritra avy amin’ny tsindrimandry alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha sondrian-tory ny olona,–
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia azon-tahotra sy hovotra aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampihorohoro ny taolako rehetra izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nisy Fanahy nandalo teo anatrehako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampitsangam-bolo ny tenako.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nijanona izy, nefa tsy nahafantatra ny tarehiny aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisy endri-javatra teo anoloan’ny masoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nisy fanginana, dia nandre feo aho nanao hoe:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho marina noho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eo anatrehan’.
      marker-yv: yv-n
    - type: text
      text: ' Andriamanitra va ny zanak’olombelona?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho madio noho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eo anatrehan’.
      marker-yv: yv-n
    - type: text
      text: ' ny Mpanao azy va ny olona?'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, tsy matoky ireo mpanompony aza Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny anjeliny aza ataony ho tsy tonga ohatra,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mainka izay mitoetra ao an-trano tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady avy tamin’ny vovoka no nihaviany,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ao amin’ny vovoka fiorenany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mora poritra noho ny kalalao izy;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misy sahy miteny aminao, dia ho sosotra va hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha ny mamehy vava kosa, iza moa no mahazaka izany?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indray andro monja dia montsana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy misaina azy, na dia levona mandrakaziy aza izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy voaongotra va ny kofehin-dainy ao aminy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maty izy, nefa tsy mbola nanam-pahendrena.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, efa nananatra ny maro hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tànana miraviravy efa nampaherezinao;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny teninao efa nanohana izay efa saiky lavo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lohalika malemy efa nampahatanjahinao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ankehitriny mba manjo anao kosa izany, ka dia kivy hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihatra aminao izany, ka raiki-tahotra hianao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ny fivavahanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahatahoranao.
      marker-yv: yv-n
    - type: text
      text: ' va no tokinao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy fanantenanao va ny fahitsian’ny làlanao?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Masìna hianao, tsarovy fa iza moa no very tsy nanan-tsiny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary taiza no nisy olo-mahitsy naringana?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka izay efa hitako, dia izay miasa heloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mamafy fahoriana no mijinja izany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fofonain’Andriamanitra no andringanana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny fofonain’ny fahatezerany no mahalevona azy.
