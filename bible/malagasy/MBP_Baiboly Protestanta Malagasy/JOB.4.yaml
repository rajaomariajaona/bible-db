document_id: JOB.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny voalohany nataon’i Elifaza.
  - type: text
    content: 'DIA namaly Elifaza Temanita ka nanao hoe:'
  '10':
  - type: text
    content: Ny feon’ny liona, eny, ny feon’ny liona masiaka,
  - type: text
    content: Ary ny nifin’ny liona tanora dia ombotana;
  '11':
  - type: text
    content: Mirenireny ny lion-dahy noho ny tsi-fahitany remby,
  - type: text
    content: Ary miely ny zanaky ny liom-bavy.
  '12':
  - type: text
    content: Nisy teny tonga tamiko mangingina,
  - type: text
    content: Ary ny sofiko nahare siosio avy taminy,
  '13':
  - type: text
    content: Tamin’ny eritreritra avy amin’ny tsindrimandry alina,
  - type: text
    content: Raha sondrian-tory ny olona,–
  '14':
  - type: text
    content: Dia azon-tahotra sy hovotra aho,
  - type: text
    content: Ka nampihorohoro ny taolako rehetra izany.
  '15':
  - type: text
    content: Ary nisy Fanahy nandalo teo anatrehako
  - type: text
    content: Ka nampitsangam-bolo ny tenako.
  '16':
  - type: text
    content: Nijanona izy, nefa tsy nahafantatra ny tarehiny aho;
  - type: text
    content: Nisy endri-javatra teo anoloan’ny masoko;
  - type: text
    content: 'Nisy fanginana, dia nandre feo aho nanao hoe:'
  '17':
  - type: text
    content: Ho marina noho
  - type: note
    content: 'Na: eo anatrehan’.'
  - type: text
    content: ' Andriamanitra va ny zanak’olombelona?'
  - type: text
    content: Ho madio noho
  - type: note
    content: 'Na: eo anatrehan’.'
  - type: text
    content: ' ny Mpanao azy va ny olona?'
  '18':
  - type: text
    content: Indro, tsy matoky ireo mpanompony aza Izy,
  - type: text
    content: Eny, ny anjeliny aza ataony ho tsy tonga ohatra,
  '19':
  - type: text
    content: Koa mainka izay mitoetra ao an-trano tany,
  - type: text
    content: Sady avy tamin’ny vovoka no nihaviany,
  - type: note
    content: Heb. ao amin’ny vovoka fiorenany.
  - type: text
    content: Ary mora poritra noho ny kalalao izy;
  '2':
  - type: text
    content: Raha misy sahy miteny aminao, dia ho sosotra va hianao?
  - type: text
    content: Fa raha ny mamehy vava kosa, iza moa no mahazaka izany?
  '20':
  - type: text
    content: Indray andro monja dia montsana izy;
  - type: text
    content: Tsy misy misaina azy, na dia levona mandrakaziy aza izy.
  '21':
  - type: text
    content: Tsy voaongotra va ny kofehin-dainy ao aminy?
  - type: text
    content: Maty izy, nefa tsy mbola nanam-pahendrena.
  '3':
  - type: text
    content: Indro, efa nananatra ny maro hianao,
  - type: text
    content: Ary ny tànana miraviravy efa nampaherezinao;
  '4':
  - type: text
    content: Ny teninao efa nanohana izay efa saiky lavo,
  - type: text
    content: Ary ny lohalika malemy efa nampahatanjahinao.
  '5':
  - type: text
    content: Nefa ankehitriny mba manjo anao kosa izany, ka dia kivy hianao,
  - type: text
    content: Mihatra aminao izany, ka raiki-tahotra hianao.
  '6':
  - type: text
    content: Tsy ny fivavahanao
  - type: note
    content: Heb. fahatahoranao.
  - type: text
    content: ' va no tokinao?'
  - type: text
    content: Ary tsy fanantenanao va ny fahitsian’ny làlanao?
  '7':
  - type: text
    content: Masìna hianao, tsarovy fa iza moa no very tsy nanan-tsiny?
  - type: text
    content: Ary taiza no nisy olo-mahitsy naringana?
  '8':
  - type: text
    content: Araka izay efa hitako, dia izay miasa heloka
  - type: text
    content: Sy mamafy fahoriana no mijinja izany.
  '9':
  - type: text
    content: Ny fofonain’Andriamanitra no andringanana azy,
  - type: text
    content: Eny, ny fofonain’ny fahatezerany no mahalevona azy.
