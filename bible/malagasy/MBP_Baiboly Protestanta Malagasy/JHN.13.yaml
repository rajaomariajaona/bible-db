document_id: JHN.13,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanasan’i Jesosy ny tongotry ny mpianany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY talohan’ny andro firavoravoana tamin’ny Paska, satria fantatr’i Jesosy fa tonga ny fotoana hialany amin’izao tontolo izao ho any amin’ny Ray, ary efa tia ny Azy izay amin’izao tontolo izao Izy, dia tia azy hatramin’ny farany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa hoy Jesosy taminy: Izay efa nandro tsy mila hosasana, afa-tsy ny tongotra ihany, fa efa madio avokoa; ary hianareo dia madio, nefa tsy hianareo rehetra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa fantany ilay efa hamadika Azy; koa izany no nilazany hoe: Tsy madio avokoa hianareo rehetra.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary rehefa voasasany ny tongony, dia nandray ny lambany Izy ka nipetraka indray, dia nanao taminy hoe: Fantatrareo va izay nataoko taminareo? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hianareo manao Ahy hoe Mpampianatra sy Tompo; ary marina ny filazanareo, fa izany tokoa Aho. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa raha Izaho, Tompo sy Mpampianatra aza, no nanasa ny tongotrareo, hianareo kosa mba tokony hifanasa tongotra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fianarana no nomeko anareo, mba hanaovanareo araka izay nataoko taminareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lazaiko aminareo marina dia marina tokoa: Ny andevo tsy lehibe noho ny tompony, na ny iraka noho ny maniraka azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Raha fantatrareo izany, dia sambatra hianareo, raha manao izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tsy milaza anareo rehetra Aho; fa fantatro izay nofidiko; fa mba hahatanteraka ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' hoe: ,,Izay homana ny mofoko'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[miara-komana amiko].'
      marker-yv: yv-n
    - type: text
      text: ' no nanangana ny ombelahin-tongony hamely Ahy’’ (Sal. 41.9). '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hatramin’izao dia milaza aminareo Aho, raha tsy mbola tonga izany, mba hinoanareo, rehefa tonga, fa Izaho no Izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary raha mbola teo amin’ny fisakafoana hariva, ary Jodasy Iskariota, zanak’i Simona, efa nomen’ny devoly saina rahateo mba hamadika Azy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Lazaiko aminareo marina dia marina tokoa: Izay mandray izay hirahiko dia mandray Ahy; ary izay mandray Ahy dia mandray izay naniraka Ahy.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanondroan’i Jesosy izay hamadika Azy, sy ny nialan’i Jodasy.
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'REHEFA nilaza izany Jesosy, dia nangorohoro ny fanahiny, ka nanambara hoe Izy: Lazaiko aminareo marina dia marina tokoa fa ny anankiray aminareo no hamadika Ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nifampijerijery ny mpianatra ka nieritreritra izay iray nolazainy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nisy mpianatra anankiray nipetraka nihinana teo anilan’i Jesosy, dia ilay tian’i Jesosy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Simona Petera nanatsika azy ka nanao taminy hoe: Lazao izay izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary raha mbola nipetraka tahaka izany izy, dia niraika ho amin’ny tratran’i Jesosy ka nanao taminy hoe: Tompoko, iza moa izany? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia namaly Jesosy ka nanao hoe: Ilay homeko ny sombin-kanina lemako no izy. Ary rehefa nolemany ny sombin-kanina, dia noraisiny ka nomeny an’i Jodasy, zanak’i Simona Iskariota. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary manaraka izany no nidiran’i Satana tao aminy, ka hoy Jesosy taminy: Izay ataonao dia ataovy faingana.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa tsy nisy tamin’izay nipetraka nihinana nahalala ny anton’ny nilazany izany taminy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa nataon’ny sasany fa satria Jodasy no nitondra ny kitapo, no nilazan’i Jesosy taminy hoe: Vidio ny zavatra ilaintsika amin’ny andro firavoravoana, na mba hanome zavatra ho an’ny malahelo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'sady fantatr’i Jesosy koa fa ny Ray efa nanolotra ny zavatra rehetra ho eo an-tànany, ary Andriamanitra no nihaviany, sady Andriamanitra koa no hiverenany, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary rehefa nandray ny sombin-kanina izy, dia nivoaka niaraka tamin’izay; ary efa alina ny andro.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary tamin’izay, nony efa nivoaka izy, dia hoy Jesosy: Ankehitriny dia efa ankalazaina ny Zanak’olona; ary Andriamanitra no ankalazaina eo aminy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary Andriamanitra kosa hankalaza Azy amin’ny tenany; eny, hankalaza Azy miaraka amin’izay Izy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Anaka, vetivety foana no sisa hitoerako eto aminareo. Hitady Ahy hianareo, ary araka ny voalazako tamin’ny Jiosy hoe: ,Izay alehako tsy azonareo haleha,’ dia toy izany koa no lazaiko aminareo ankehitriny.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Didy vaovao no omeko anareo, dia ny mba hifankatiavanareo; eny, aoka ho tahaka ny nitiavako anareo no mba hifankatiavanareo kosa. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Izany no hahafantaran’ny olona rehetra fa mpianatro hianareo, raha mifankatia.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Hoy Simona Petera taminy: Tompoko, hankaiza moa Hianao? Jesosy namaly hoe: Izay alehako, dia tsy azonao anarahana Ahy ankehitriny fa hanaraka Ahy ihany hianao rahatrizay. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Hoy Petera taminy: Tompoko, nahoana no tsy mahazo manaraka Anao ankehitriny aho? Na ny aiko aza dia hafoiko noho ny aminao. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jesosy namaly hoe: Ny ainao va no hafoinao noho ny amiko? Lazaiko aminao marina dia marina tokoa: Tsy mbola hisy akoho haneno mandra-pandànao Ahy intelo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'dia nitsangana niala teo am-pihinanana Izy ka nametraka ny lambany ary naka lamba famaohana, ka nisikinany; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ary rehefa vita izany, dia nampidina rano tamin’ny tavy Izy ka nanomboka nanasa ny tongotry ny mpianatra sy namaoka azy tamin’ny lamba famaohana izay nisikinany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nankeo amin’i Simona Petera Izy; fa hoy Petera taminy: Tompoko, Hianao va hanasa ny tongotro? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Jesosy namaly ka nanao taminy hoe: Izay ataoko dia tsy fantatrao ankehitriny, fa ho fantatrao rahatrizay. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa hoy Petera taminy: Sanatria raha hanasa ny tongotro Hianao. Jesosy namaly azy hoe: Raha tsy hosasako hianao, dia tsy manana anjara amiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy Simona Petera taminy: Tompoko, tsy ny tongotro ihany ary, fa ny tànako sy ny lohako koa. '
