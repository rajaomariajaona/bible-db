document_id: REV.20
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny namatorana an’i Satana, sy ny amin’ny fitsanganana voalohany, ary ny arivo taona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY hitako fa, indro, nisy anjely nidina avy tany an-danitra, nanana ny fanalahidin’ny lavaka tsy hita noanoa sy gadra lehibe eny an-tànany; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nisambotra ilay dragona izy (dia ilay menarana ela, ny devoly sy Satana izany) ka namatotra azy arivo taona, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia nanipy azy ho amin’ny lavaka tsy hita noanoa ka nanidy izany, dia nanisy tombo-kase teo amboniny, mba tsy hamitahany ny firenena maro intsony mandra-pahatapitry ny arivo taona; ary rehefa afaka izany, dia tsy maintsy hovahana kelikely aloha izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nahita seza fiandrianana maro aho, ary nisy nipetraka teo amboniny, ary nomena fahefana hitsara izy; ary hitako koa ny fanahin’izay notapahin-doha noho ny filazana an’i Jesosy sy ny tenin’Andriamanitra sy izay rehetra tsy niankohoka teo anoloan’ny bibi-dia na teo anoloan’ny sariny ary tsy nandray ny marika ho eo amin’ny handriny na ho eo amin’ny tànany; ary velona izy ka niara-nanjaka tamin’i Kristy arivo taona. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa ny sisa amin’ny maty dia tsy mbola velona mandra-pahatapitry ny arivo taona. Izany no fitsanganana voalohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sambatra sy masina izay manana anjara amin’ny fitsanganana voalohany; ireo tsy mba ananan’ny fahafatesana faharoa fahefana, fa ho mpisoron’Andriamanitra sy Kristy ireo ka hiara-manjaka aminy arivo taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa tapitra ny arivo taona, dia hovahana Satana ho afaka ao amin’ny trano-maizina nitoerany '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka hivoaka hamitaka ny firenena eny amin’ny vazan-tany efatra, dia Goga sy Magoga, mba hanangona azy ho any amin’ny ady; tahaka ny fasiky ny ranomasina ny isany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary niakatra namaky ny tany izy, dia nanodidina ny tobin’ny olona masina sy ny tanàna malala; ary nisy afo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[afo avy amin’Andriamanitra].'
    marker-yv: yv-n
  - type: text
    text: ' nidina avy tany an-danitra ka nandany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny devoly izay namitaka azy dia natsipy tany amin’ny farihy afo sy solifara, izay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: misy
  - type: text
    text: ' ilay bibi-dia sy ilay mpaminany sandoka koa, ary hampijalina andro amin-alina mandrakizay mandrakizay ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hitako fa, indro, nisy seza fiandrianana fotsy lehibe sy Ilay mipetraka eo amboniny; ny tany sy ny lanitra nandositra ny tavany, ka tsy nisy hitoerany intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nahita ny maty aho, na ny lehibe na ny kely, nitsangana teo anoloan’ny seza fiandrianana; ary novelarina ny boky; ary nisy boky iray koa novelarina, dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny bokin’
  - type: text
    text: ' ny fiainana izany; ary ny maty dia notsaraina araka izay zavatra voasoratra teo anatin’ny boky, araka ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny ranomasina dia namoaka ny maty tao anatiny; ary ny fahafatesana sy ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hadesy.
    marker-yv: yv-n
  - type: text
    text: ' namoaka ny maty tao aminy; dia samy notsaraina araka ny asany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny fahafatesana sy ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hadesy.
    marker-yv: yv-n
  - type: text
    text: ' dia natsipy tany amin’ny farihy afo. Izany no fahafatesana faharoa, dia ny farihy afo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary raha nisy tsy hita voasoratra teo anatin’ny bokin’ny fiainana, dia natsipy tany amin’ny farihy afo izy.
