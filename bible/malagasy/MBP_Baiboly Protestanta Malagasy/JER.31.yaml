document_id: JER.31,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny famindrampo ho an’ny firenen’Isiraely, sy ny fanekena hatao aminy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: AMIN’izany andro izany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho Andriamanitry ny isam-pianakavian’ny Isiraely Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izy ho oloko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mihainoa ny tenin’i Jehovah, hianareo jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary torio any amin’ny tany amoron-tsiraka any lavitra any izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka ataovy hoe: Izay nampiely ny Isiraely no hanangona azy indray'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hitandrina azy toy ny fitandrin’ny mpiandry ondry ny ondriny.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa Jehovah efa nanavotra an’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy efa nanafaka azy tamin’ny tànan’ny mahery noho izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ka dia ho avy ireny ka hihoby ao amin’ny havoan’i Ziona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitanjozotra ho any amin’ny zava-tsoan’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny vary sy ny ranom-boaloboka sy ny diloilo sy ny zanak’ondry ary ny zanak’omby;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanahiny ho toy ny tanimboly vonton-drano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hihamalazo intsony.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary amin’izany dia ho faly amin’ny fandihizana ny virijina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny zatovo sy ny antitra koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hampodiko ho fifaliana ny fitomaniany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampiononiko sy hampifaliko izy ho afaka alahelo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia hovokisako zava-matavy ny fanahin’ny mpisorona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny oloko ho voky ny zava-tsoako, hoy Jehovah.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisy feo re tao Rama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fidradradradrana sy fitomaniana fatratra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahely nitomany ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy azo nampiononina izy noho ny amin’ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria lany ritra ireny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atsaharo ny fitomanianao sy ny fandatsahanao ranomaso;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hisy valiny tokoa ny ataonao, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hody avy any amin’ny tanin’ny fahavalo ireny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary misy fanantenana ho anao any am-parany, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny zaza dia hiverina ho any amin’ny taniny indray.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Efa reko tokoa Efraima nitomany ny tenany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofaizanao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nofaizana toy ny ombilahy kely tsy voalofaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avereno aho, dia ho tafaverina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no Jehovah Andriamanitro.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nony efa niverina tokoa aho, dia vao nahalala fanenenana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa nampahafantarina ny toe-tenako aho, dia niteha-tratra;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: niteha-pe.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Menatra sady mangaihay aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa latsain’ny tsinin’ny fahatanorako.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nahita.
      marker-yv: yv-n
    - type: text
      text: ' fitia any an-efitra ny olona izay sisa tsy matin’ny sabatra;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha Aho ka hanome
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nandeha Aho ka nanome.
      marker-yv: yv-n
    - type: text
      text: ' fitsaharana ho an’ny Isiraely.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Zanako mahafinaritra va Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zaza malalako va izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No dia fatra-pahatsiaro azy isaky ny mitezitra azy Aho?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izany dia onena azy ny foko;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'maneno ny tsinaiko; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Isa. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xvi. 11.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamindra fo aminy tokoa Aho, hoy Jehovah.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Manangàna famantaran-dàlana ho anao hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manorena tsangam-bato;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saino tsara ny làlana efa voavoatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay làlana efa nalehanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena indray, ry Isiraely virijina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena indray ho amin’ireto tanànanao ireto.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mandra-pahoviana no hirioriovanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry zanakavavy mpiodina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa Jehovah efa namorona zava-baovao amin’ny tany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vehivavy no hanodidina lehilahy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbola holazaina indray ao amin’ny tanin’ny Joda sy ao amin’ny tanànany izao teny izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha hampodiko avy amin’ny fahababoany izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahin’i Jehovah anie hianao, ry fonenan’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ry tendrombohitry ny fahamasinana!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary Joda sy ny tanànany rehetra dia hiara-monina ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho mpiasa tany sy ho mpilasy mitondra ny andian’ny ondry aman-osiny.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa ny fanahy ana dia hampisotroiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanahy mihaosa rehetra dia hovokisako.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary tamin’izay dia nahatsiaro aho ka nahita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamiko ny torimasoko.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Indro, avy ny andro, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hafafiko eo amin’ny taranak’Isiraely sy ny taranak’i Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny taranak’olombelona sy ny taranaky ny biby fiompy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary toy ny niambenako azy hongotana sy hazera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy harodana sy horavana ary hampahorina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho toy izany no hiambenako azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haorina sy hambolena kosa, hoy Jehovah.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Amin’izany andro izany izy dia tsy hanao intsony hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ray no nihinana voaloboka maharikivy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny nifin’ny zanany no madilo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tany lavitra any
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tamin’ny fahiny.
      marker-yv: yv-n
    - type: text
      text: ' no nisehoan’i Jehovah tamiko '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fitiavana mandrakizay no nitiavako anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no nampaharetako famindrampo ho anao.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Fa ny olona rehetra samy ho fatin’ny helony avy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra homana ny voaloboka maharikivy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izy ihany no hadilo nify.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Indro, avy ny andro, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hanaovako fanekena vaovao amin’ny taranak’Isiraely sy ny taranak’i Joda,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Nefa tsy araka ny fanekena nataoko tamin’ny razany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny andro nitantànako azy nitondra azy nivoaka avy tany amin’ny tany Egypta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izy ireny dia nivadika ny fanekeko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Izaho no vadiny,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tompony.
      marker-yv: yv-n
    - type: text
      text: ' hoy Jehovah.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa izao no fanekena hataoko amin’ny taranak’Isiraely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rehefa afaka izany andro izany, hoy Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hataoko ao an-tsainy ny lalàko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hosoratako ao am-pony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izaho ho Andriamaniny, ary izy ho oloko.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary samy tsy hampianatra ny namany sy ny rahalahiny avy intsony izy hoe: Mahalalà an’i Jehovah;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa samy hahalala Ahy avokoa izy rehetra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa havelako ny helony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hotsarovako intsony ny fahotany.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Izao no lazain’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manome ny masoandro ho fahazavana amin’ny antoandro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny filahatry ny volana sy ny kintana ho fahazavana amin’ny alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mampanonja ny ranomasina, ka dia mirohondrohona ny onjany,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jehovah, Tompon’ny maro, no anarany:'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Raha miova eo anoloako izany filahatra izany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitsahatra tsy ho firenena eo anatrehako mandrakizay kosa ny taranak’Isiraely.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misy maharefy ny lanitra ambony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mahafantatra ny fanorenan’ny tany ambany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Izaho kosa hanary ny taranak’Isiraely rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho izay rehetra nataony, hoy Jehovah.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Indro, avy ny andro, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hanorenana ity tanàna ity indray ho an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny tilikambon’i Hananela ka hatramin’ny vavahady an-jorony.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Ary ny famolaina dia mbola hohenjaniko mahitsy hatreo an-tampon’ny tendrombohitra Gareba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hasangodina ho any Goa;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mbola hanorina anao indray Aho, ka dia hiorina hianao, ry Isiraely virijina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mbola hiravaka mitondra ny ampongatapakao hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hivoaka amin’ny dihin’ny mifaly.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary ny lohasaham-paty sy lavenona rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny saha rehetra hatramin’ny Lohasahan-driaka Kidrona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hatramin’ny zoron’ny vavahadin-tsoavaly atsinanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho masina ho an’i Jehovah; tsy hongotana na horavana intsony izy mandrakizay.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mbola hanao tanimboaloboka ao amin’ny tendrombohitr’i Samaria hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpamboly dia hamboly sady hihinana ny vokatra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa mbola hisy andro hiantsoan’ny mpitazana any amin’ny tany havoan’i Efraima hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna hianareo, ka andeha isika hiakatra any Ziona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any amin’i Jehovah Andriamanitsika.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia amin’ny fifaliana noho ny amin’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mifalia noho ny amin’ny lohan’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Torionareo, deraonareo, ka ataovy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, vonjeo ny olonao, dia ny sisa amin’ny Isiraely.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Indro, hitondra azy avy any amin’ny tany avaratra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanangona azy avy any amin’ny faran’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia samy ho eny aminy avokoa na ny jamba na ny mandringa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na izay manan-anaka na izay mihetsi-jaza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Irai-dia marenina no hiverina atỳ.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Amin’ny fitomaniana no hihaviany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny fifonany no hitondrako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho entiko ho eny amoron’ny renirano izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny làlana mahitsy izay tsy hahatafintohina azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Rain’Isiraely Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Efraima no lahimatoako.
