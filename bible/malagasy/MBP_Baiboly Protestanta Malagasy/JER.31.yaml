document_id: JER.31,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny famindrampo ho an’ny firenen’Isiraely, sy ny fanekena hatao aminy.
  - type: text
    content: AMIN’izany andro izany, hoy Jehovah,
  - type: text
    content: Dia ho Andriamanitry ny isam-pianakavian’ny Isiraely Aho,
  - type: text
    content: Ary izy ho oloko.
  '10':
  - type: text
    content: Mihainoa ny tenin’i Jehovah, hianareo jentilisa,
  - type: text
    content: Ary torio any amin’ny tany amoron-tsiraka any lavitra any izany,
  - type: text
    content: 'Ka ataovy hoe: Izay nampiely ny Isiraely no hanangona azy indray'
  - type: text
    content: Sady hitandrina azy toy ny fitandrin’ny mpiandry ondry ny ondriny.
  '11':
  - type: text
    content: Fa Jehovah efa nanavotra an’i Jakoba
  - type: text
    content: Sy efa nanafaka azy tamin’ny tànan’ny mahery noho izy.
  '12':
  - type: text
    content: Ka dia ho avy ireny ka hihoby ao amin’ny havoan’i Ziona,
  - type: text
    content: Dia hitanjozotra ho any amin’ny zava-tsoan’i Jehovah,
  - type: text
    content: Dia ny vary sy ny ranom-boaloboka sy ny diloilo sy ny zanak’ondry ary ny zanak’omby;
  - type: text
    content: Ary ny fanahiny ho toy ny tanimboly vonton-drano,
  - type: text
    content: Ka tsy hihamalazo intsony.
  '13':
  - type: text
    content: Ary amin’izany dia ho faly amin’ny fandihizana ny virijina
  - type: text
    content: Mbamin’ny zatovo sy ny antitra koa;
  - type: text
    content: Fa hampodiko ho fifaliana ny fitomaniany,
  - type: text
    content: Ka hampiononiko sy hampifaliko izy ho afaka alahelo.
  '14':
  - type: text
    content: Dia hovokisako zava-matavy ny fanahin’ny mpisorona,
  - type: text
    content: Ary ny oloko ho voky ny zava-tsoako, hoy Jehovah.
  '15':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Nisy feo re tao Rama,
  - type: text
    content: Dia fidradradradrana sy fitomaniana fatratra;
  - type: text
    content: Rahely nitomany ny zanany,
  - type: text
    content: Ary tsy azo nampiononina izy noho ny amin’ny zanany,
  - type: text
    content: Satria lany ritra ireny.
  '16':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Atsaharo ny fitomanianao sy ny fandatsahanao ranomaso;
  - type: text
    content: Fa hisy valiny tokoa ny ataonao, hoy Jehovah,
  - type: text
    content: Ary hody avy any amin’ny tanin’ny fahavalo ireny.
  '17':
  - type: text
    content: Ary misy fanantenana ho anao any am-parany, hoy Jehovah;
  - type: text
    content: Fa ny zaza dia hiverina ho any amin’ny taniny indray.
  '18':
  - type: text
    content: 'Efa reko tokoa Efraima nitomany ny tenany hoe:'
  - type: text
    content: Nofaizanao aho,
  - type: text
    content: Eny, nofaizana toy ny ombilahy kely tsy voalofaka;
  - type: text
    content: Avereno aho, dia ho tafaverina,
  - type: text
    content: Fa Hianao no Jehovah Andriamanitro.
  '19':
  - type: text
    content: Nony efa niverina tokoa aho, dia vao nahalala fanenenana;
  - type: text
    content: Ary rehefa nampahafantarina ny toe-tenako aho, dia niteha-tratra;
  - type: note
    content: Heb. niteha-pe.
  - type: text
    content: Menatra sady mangaihay aho,
  - type: text
    content: Fa latsain’ny tsinin’ny fahatanorako.
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Hahita
  - type: note
    content: 'Na: Nahita.'
  - type: text
    content: ' fitia any an-efitra ny olona izay sisa tsy matin’ny sabatra;'
  - type: text
    content: Handeha Aho ka hanome
  - type: note
    content: 'Na: Nandeha Aho ka nanome.'
  - type: text
    content: ' fitsaharana ho an’ny Isiraely.'
  '20':
  - type: text
    content: Zanako mahafinaritra va Efraima,
  - type: text
    content: Zaza malalako va izy,
  - type: text
    content: No dia fatra-pahatsiaro azy isaky ny mitezitra azy Aho?
  - type: text
    content: Noho izany dia onena azy ny foko;
  - type: note
    content: Heb. maneno ny tsinaiko; izahao Isa. xvi. 11.
  - type: text
    content: Hamindra fo aminy tokoa Aho, hoy Jehovah.
  '21':
  - type: text
    content: Manangàna famantaran-dàlana ho anao hianao,
  - type: text
    content: Manorena tsangam-bato;
  - type: text
    content: Saino tsara ny làlana efa voavoatra,
  - type: text
    content: Dia ilay làlana efa nalehanao;
  - type: text
    content: Miverena indray, ry Isiraely virijina,
  - type: text
    content: Miverena indray ho amin’ireto tanànanao ireto.
  '22':
  - type: text
    content: Mandra-pahoviana no hirioriovanao,
  - type: text
    content: Ry zanakavavy mpiodina?
  - type: text
    content: 'Fa Jehovah efa namorona zava-baovao amin’ny tany:'
  - type: text
    content: Vehivavy no hanodidina lehilahy.
  '23':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: text
    content: Mbola holazaina indray ao amin’ny tanin’ny Joda sy ao amin’ny tanànany izao teny izao,
  - type: text
    content: 'Raha hampodiko avy amin’ny fahababoany izy:'
  - type: text
    content: Hotahin’i Jehovah anie hianao, ry fonenan’ny fahamarinana,
  - type: text
    content: Sy ry tendrombohitry ny fahamasinana!
  '24':
  - type: text
    content: Ary Joda sy ny tanànany rehetra dia hiara-monina ao aminy
  - type: text
    content: Ho mpiasa tany sy ho mpilasy mitondra ny andian’ny ondry aman-osiny.
  '25':
  - type: text
    content: Fa ny fanahy ana dia hampisotroiko,
  - type: text
    content: Ary ny fanahy mihaosa rehetra dia hovokisako.
  '26':
  - type: text
    content: Ary tamin’izay dia nahatsiaro aho ka nahita;
  - type: text
    content: Ary mamiko ny torimasoko.
  '27':
  - type: text
    content: Indro, avy ny andro, hoy Jehovah,
  - type: text
    content: Ka hafafiko eo amin’ny taranak’Isiraely sy ny taranak’i Joda
  - type: text
    content: Ny taranak’olombelona sy ny taranaky ny biby fiompy.
  '28':
  - type: text
    content: Ary toy ny niambenako azy hongotana sy hazera
  - type: text
    content: Sy harodana sy horavana ary hampahorina,
  - type: text
    content: Dia ho toy izany no hiambenako azy
  - type: text
    content: Haorina sy hambolena kosa, hoy Jehovah.
  '29':
  - type: text
    content: 'Amin’izany andro izany izy dia tsy hanao intsony hoe:'
  - type: text
    content: Ny ray no nihinana voaloboka maharikivy,
  - type: text
    content: Ka ny nifin’ny zanany no madilo.
  '3':
  - type: text
    content: Tany lavitra any
  - type: note
    content: 'Na: Tamin’ny fahiny.'
  - type: text
    content: ' no nisehoan’i Jehovah tamiko '
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: Fitiavana mandrakizay no nitiavako anao,
  - type: text
    content: Koa izany no nampaharetako famindrampo ho anao.
  '30':
  - type: text
    content: Fa ny olona rehetra samy ho fatin’ny helony avy;
  - type: text
    content: Izay rehetra homana ny voaloboka maharikivy,
  - type: text
    content: Dia izy ihany no hadilo nify.
  '31':
  - type: text
    content: Indro, avy ny andro, hoy Jehovah,
  - type: text
    content: Izay hanaovako fanekena vaovao amin’ny taranak’Isiraely sy ny taranak’i Joda,
  '32':
  - type: text
    content: Nefa tsy araka ny fanekena nataoko tamin’ny razany
  - type: text
    content: Tamin’ny andro nitantànako azy nitondra azy nivoaka avy tany amin’ny tany Egypta;
  - type: text
    content: Fa izy ireny dia nivadika ny fanekeko,
  - type: text
    content: Nefa Izaho no vadiny,
  - type: note
    content: 'Na: tompony.'
  - type: text
    content: ' hoy Jehovah.'
  '33':
  - type: text
    content: Fa izao no fanekena hataoko amin’ny taranak’Isiraely.
  - type: text
    content: 'Rehefa afaka izany andro izany, hoy Jehovah:'
  - type: text
    content: Dia hataoko ao an-tsainy ny lalàko
  - type: text
    content: Sady hosoratako ao am-pony;
  - type: text
    content: Ary Izaho ho Andriamaniny, ary izy ho oloko.
  '34':
  - type: text
    content: 'Ary samy tsy hampianatra ny namany sy ny rahalahiny avy intsony izy hoe: Mahalalà an’i Jehovah;'
  - type: text
    content: Fa samy hahalala Ahy avokoa izy rehetra.
  - type: text
    content: Hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra, hoy Jehovah;
  - type: text
    content: Fa havelako ny helony,
  - type: text
    content: Ary tsy hotsarovako intsony ny fahotany.
  '35':
  - type: text
    content: Izao no lazain’i Jehovah,
  - type: text
    content: Izay manome ny masoandro ho fahazavana amin’ny antoandro
  - type: text
    content: Ary ny filahatry ny volana sy ny kintana ho fahazavana amin’ny alina,
  - type: text
    content: Izay mampanonja ny ranomasina, ka dia mirohondrohona ny onjany,–
  - type: text
    content: 'Jehovah, Tompon’ny maro, no anarany:'
  '36':
  - type: text
    content: Raha miova eo anoloako izany filahatra izany, hoy Jehovah,
  - type: text
    content: Dia hitsahatra tsy ho firenena eo anatrehako mandrakizay kosa ny taranak’Isiraely.
  '37':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Raha misy maharefy ny lanitra ambony,
  - type: text
    content: Na mahafantatra ny fanorenan’ny tany ambany,
  - type: text
    content: Dia Izaho kosa hanary ny taranak’Isiraely rehetra
  - type: text
    content: Noho izay rehetra nataony, hoy Jehovah.
  '38':
  - type: text
    content: Indro, avy ny andro, hoy Jehovah,
  - type: text
    content: Izay hanorenana ity tanàna ity indray ho an’i Jehovah
  - type: text
    content: Hatramin’ny tilikambon’i Hananela ka hatramin’ny vavahady an-jorony.
  '39':
  - type: text
    content: Ary ny famolaina dia mbola hohenjaniko mahitsy hatreo an-tampon’ny tendrombohitra Gareba,
  - type: text
    content: Dia hasangodina ho any Goa;
  '4':
  - type: text
    content: Mbola hanorina anao indray Aho, ka dia hiorina hianao, ry Isiraely virijina!
  - type: text
    content: Ary mbola hiravaka mitondra ny ampongatapakao hianao
  - type: text
    content: Ka hivoaka amin’ny dihin’ny mifaly.
  '40':
  - type: text
    content: Ary ny lohasaham-paty sy lavenona rehetra
  - type: text
    content: Sy ny saha rehetra hatramin’ny Lohasahan-driaka Kidrona
  - type: text
    content: Ka hatramin’ny zoron’ny vavahadin-tsoavaly atsinanana
  - type: text
    content: Dia ho masina ho an’i Jehovah; tsy hongotana na horavana intsony izy mandrakizay.
  '5':
  - type: text
    content: Mbola hanao tanimboaloboka ao amin’ny tendrombohitr’i Samaria hianao;
  - type: text
    content: Ny mpamboly dia hamboly sady hihinana ny vokatra.
  '6':
  - type: text
    content: 'Fa mbola hisy andro hiantsoan’ny mpitazana any amin’ny tany havoan’i Efraima hoe:'
  - type: text
    content: Mitsangàna hianareo, ka andeha isika hiakatra any Ziona,
  - type: text
    content: Ho any amin’i Jehovah Andriamanitsika.
  '7':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Mihobia amin’ny fifaliana noho ny amin’i Jakoba,
  - type: text
    content: Ary mifalia noho ny amin’ny lohan’ny firenena,
  - type: text
    content: 'Torionareo, deraonareo, ka ataovy hoe:'
  - type: text
    content: Jehovah ô, vonjeo ny olonao, dia ny sisa amin’ny Isiraely.
  '8':
  - type: text
    content: Indro, hitondra azy avy any amin’ny tany avaratra Aho
  - type: text
    content: Sy hanangona azy avy any amin’ny faran’ny tany,
  - type: text
    content: Ka dia samy ho eny aminy avokoa na ny jamba na ny mandringa,
  - type: text
    content: Na izay manan-anaka na izay mihetsi-jaza;
  - type: text
    content: Irai-dia marenina no hiverina atỳ.
  '9':
  - type: text
    content: Amin’ny fitomaniana no hihaviany,
  - type: text
    content: Ary amin’ny fifonany no hitondrako azy;
  - type: text
    content: Ary ho entiko ho eny amoron’ny renirano izy,
  - type: text
    content: Amin’ny làlana mahitsy izay tsy hahatafintohina azy;
  - type: text
    content: Fa Rain’Isiraely Aho,
  - type: text
    content: Ary Efraima no lahimatoako.
