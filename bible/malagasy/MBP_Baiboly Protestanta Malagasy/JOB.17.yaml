document_id: JOB.17,873
type_code: plt
verses:
  '1':
  - type: text
    content: Efa ho ritra ny aiko;
  - type: text
    content: Efa milopilopy ny androko;
  - type: text
    content: Efa miandry ahy ny fasana.
  '10':
  - type: text
    content: Avia avokoa indray ary hianareo rehetra–
  - type: text
    content: Tsy mahita izay olon-kendry eo aminareo aho.
  '11':
  - type: text
    content: Mihelina ny androko, voaongotra ny fikasako.
  - type: text
    content: Dia izay hevitra fikirin’ny foko indrindra;
  '12':
  - type: text
    content: Ny alina ataon’ireny ho antoandro,
  - type: text
    content: Ary ny mazava ho efa akaiky, nefa tamy ihany ny maizina.
  '13':
  - type: text
    content: Raha mbola misy antenaiko, dia ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' fonenako ihany;'
  - type: text
    content: Ao amin’ny maizina no hamelarako ny fandriako.
  '14':
  - type: text
    content: Ny fasana
  - type: note
    content: 'Na: Ny fahalovana.'
  - type: text
    content: ' no nantsoiko hoe: Raiko hianao;'
  - type: text
    content: 'Ary ny kankana: Reniko sy anabaviko hianao.'
  '15':
  - type: text
    content: Fa aiza ary ny fanantenako?
  - type: text
    content: Ary iza no mahita azy?
  '16':
  - type: text
    content: Midina any amin’ny vavahadin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' izany,'
  - type: text
    content: Raha mba hahita fitsaharana ao amin’ny vovoka aho.
  '2':
  - type: text
    content: Eny, fanesoana tokoa no manodidina ahy,
  - type: text
    content: Ary tsy maintsy mijery ny filany ady amiko aho.
  '3':
  - type: text
    content: Masìna Hianao, aoka ny tenanao ihany no hiantoka ahy aminao;
  - type: text
    content: Fa iza moa no hety hiantoka ahy?
  '4':
  - type: text
    content: Fa ny fon’ireto dia voahidinao tsy hidiran’ny fahalalana;
  - type: text
    content: Koa izany no tsy hanandratanao azy.
  '5':
  - type: text
    content: Izay manolotra ny sakaizany ho babo,
  - type: text
    content: Dia ho pahina kosa ny mason’ny zanany.
  '6':
  - type: text
    content: Ary efa nanao ahy ho ambentinteny amin’ny firenena Izy,
  - type: text
    content: Ka rorany mandrakariva ny tavako.
  '7':
  - type: text
    content: Efa pahina ny masoko noho ny alahelo;
  - type: text
    content: Ary efa toy ny aloka ny momba ny tenako rehetra.
  '8':
  - type: text
    content: Ankona noho izany ny olona mahitsy,
  - type: text
    content: Ary ny tsy manan-tsiny mihendratra mahita ny mpihatsaravela-tsihy.
  - type: note
    content: 'Na: ratsy fanahy.'
  '9':
  - type: text
    content: Fa ny marina mifikitra tsara amin’ny halehany,
  - type: text
    content: Ary izay madio tànana no hitombo hery.
