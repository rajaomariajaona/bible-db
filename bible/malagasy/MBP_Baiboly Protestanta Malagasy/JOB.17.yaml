document_id: JOB.17,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa ho ritra ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa milopilopy ny androko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa miandry ahy ny fasana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia avokoa indray ary hianareo rehetra–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahita izay olon-kendry eo aminareo aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihelina ny androko, voaongotra ny fikasako.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay hevitra fikirin’ny foko indrindra;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny alina ataon’ireny ho antoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mazava ho efa akaiky, nefa tamy ihany ny maizina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mbola misy antenaiko, dia ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' fonenako ihany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny maizina no hamelarako ny fandriako.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fasana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny fahalovana.
      marker-yv: yv-n
    - type: text
      text: ' no nantsoiko hoe: Raiko hianao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny kankana: Reniko sy anabaviko hianao.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aiza ary ny fanantenako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no mahita azy?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midina any amin’ny vavahadin’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' izany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mba hahita fitsaharana ao amin’ny vovoka aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, fanesoana tokoa no manodidina ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy maintsy mijery ny filany ady amiko aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Masìna Hianao, aoka ny tenanao ihany no hiantoka ahy aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza moa no hety hiantoka ahy?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fon’ireto dia voahidinao tsy hidiran’ny fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no tsy hanandratanao azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manolotra ny sakaizany ho babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho pahina kosa ny mason’ny zanany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nanao ahy ho ambentinteny amin’ny firenena Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka rorany mandrakariva ny tavako.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa pahina ny masoko noho ny alahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa toy ny aloka ny momba ny tenako rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankona noho izany ny olona mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tsy manan-tsiny mihendratra mahita ny mpihatsaravela-tsihy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ratsy fanahy.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny marina mifikitra tsara amin’ny halehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay madio tànana no hitombo hery.
