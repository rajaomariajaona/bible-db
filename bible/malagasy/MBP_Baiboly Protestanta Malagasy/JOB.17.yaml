document_id: JOB.17
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa ho ritra ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa milopilopy ny androko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa miandry ahy ny fasana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eny, fanesoana tokoa no manodidina ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy maintsy mijery ny filany ady amiko aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Masìna Hianao, aoka ny tenanao ihany no hiantoka ahy aminao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa iza moa no hety hiantoka ahy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ny fon’ireto dia voahidinao tsy hidiran’ny fahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izany no tsy hanandratanao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay manolotra ny sakaizany ho babo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho pahina kosa ny mason’ny zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary efa nanao ahy ho ambentinteny amin’ny firenena Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka rorany mandrakariva ny tavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa pahina ny masoko noho ny alahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa toy ny aloka ny momba ny tenako rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ankona noho izany ny olona mahitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsy manan-tsiny mihendratra mahita ny mpihatsaravela-tsihy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ratsy fanahy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny marina mifikitra tsara amin’ny halehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay madio tànana no hitombo hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Avia avokoa indray ary hianareo rehetra–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahita izay olon-kendry eo aminareo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mihelina ny androko, voaongotra ny fikasako.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay hevitra fikirin’ny foko indrindra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny alina ataon’ireny ho antoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mazava ho efa akaiky, nefa tamy ihany ny maizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha mbola misy antenaiko, dia ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' fonenako ihany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny maizina no hamelarako ny fandriako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fasana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ny fahalovana.
    marker-yv: yv-n
  - type: text
    text: ' no nantsoiko hoe: Raiko hianao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny kankana: Reniko sy anabaviko hianao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa aiza ary ny fanantenako?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no mahita azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Midina any amin’ny vavahadin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mba hahita fitsaharana ao amin’ny vovoka aho.
