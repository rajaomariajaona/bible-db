document_id: LUK.20,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanontanian’ny lohan’ny mpisorona sy ny loholona an’i Jesosy ny amin’ny fahefany, ary ny fanoharana navalin’i Jesosy azy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 21.23-46; Mar. 11.27; 12.12.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’ny andro anankiray, raha nampianatra ny olona teo an-kianjan’ny tempoly Jesosy ka nitory ny filazantsara, dia nanatona ny lohan’ny mpisorona sy ny mpanora-dalàna ary ny Loholona '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny fotoana dia naniraka mpanompo hankany amin’ny mpiasa tany izy mba handray amin’ny vokatry ny tanimboaloboka; fa ny mpiasa tany nikapoka iny ka nampandeha azy maina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka mpanompo anankiray koa izy; ary nokapohiny mafy koa iny sady nalany baraka ka nampandehaniny maina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka anankiray koa izy; ary iny koa dia nataony naratra ka noroahiny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny tompon’ny tanimboaloboka: Inona re no hataoko? Haniraka ny zanako malalako aho; angamba hanaja azy izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha nahita iny ny mpiasa tany, dia niara-nisaina izy ka nanao hoe: Ity no mpandova; andeha hovonointsika io, mba ho antsika ny lova. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namoaka azy tany ivelan’ny tanimboaloboka izy ka namono azy. Hataon’ny tompon’ny tanimboaloboka ahoana moa izy amin’izany? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hankany izy, dia hamono ireo mpiasa tany ireo, ka homeny olon-kafa ny tanimboaloboka.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nahare izany ireo, dia hoy izy: Sanatria izany! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nijery azy ka nanao hoe: Ahoana moa izao voasoratra izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: „Ny vato izay nolavin’ny mpanao trano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izy no efa natao fehizaro”? (Sal. 118.22).
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Izay rehetra potraka amin’izany vato izany dia ho torotoro; fa na iza na iza no ianjerany dia ho mongomongo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanontaniana an’i Jesosy ny amin’ny mandoa vola hetra ho an’i Kaisara.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 22.15-22; Mar. 12.13-17.
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY tamin’izany ora izany dia nitady hisambotra Azy ny mpanora-dalàna sy ny lohan’ny mpisorona; nefa natahotra ny olona izy, satria fantany fa izy no nolazainy tamin’izany fanoharana izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niteny taminy hoe: Lazao aminay: Fahefana manao ahoana no anaovanao izao zavatra izao? ary iza no nanome Anao izany fahefana izany?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nizaha taratra an’i Jesosy izy ka naniraka mpitsikilo, izay nody ho marina, mba hamandrika Azy amin’ny teniny, hanolorany Azy ho amin’ny hery sy ny fahefan’ny governora. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo nanontany Azy ka nanao hoe: Mpampianatra ô, fantatray fa miteny sy mampianatra marina Hianao ka tsy mizaha tavan’olona, fa mampianatra marina ny làlan’Andriamanitra: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mety va raha mandoa vola hetra ho an’i Kaisara izahay, sa tsia?
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy nahafantatra ny fihendreny ka nanao taminy hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mampisehoa denaria amiko. An’iza moa io sary sy soratra eo aminy io? Hoy ireo: An’i Kaisara. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara ary izay an’i Kaisara, ary ho an’Andriamanitra izay an’Andriamanitra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy sahiny nitanana Azy teo anatrehan’ny olona izany teny izany, sady gaga izy noho ny famaliny ka nangina.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanontanian’ny Sadoseo an’i Jesosy ny amin’ny hitsanganan’ny maty.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 22.23-33; Mar. 12.18-27.
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY ny sasany tamin’ny Sadoseo, izay milaza fa tsy misy fitsanganan’ny maty, dia nanatona ka nanontany Azy hoe: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpampianatra ô, Mosesy nanoratra ho antsika hoe: Raha misy manan-drahalahy maty momba, ka mbola velona ny vadin’ny maty, dia aoka ny rahalahiny hampakatra an-dravehivavy ka hiteraka hamelo-maso ny rahalahiny (Deo. 25.5). '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nisy fito mirahalahy; ary ny zokiny nampaka-bady, dia maty momba. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy namaly ka nanao taminy hoe: Izaho kosa mba hanontany anareo zavatra iray loha, ka lazao amiko: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny faharoa '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy ny fahatelo koa nampakatra azy; ary tahaka izany avokoa no nataon’izy fito mirahalahy; nefa maty momba avokoa izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary farany dia maty koa ravehivavy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa amin’ny fitsanganan’ny maty ho vadin’iza moa ravehivavy? fa samy efa nanambady azy avokoa izy fito mirahalahy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nanao taminy hoe: Ny zanak’izao fiainana izao dia mampaka-bady sady avoaka hampakarina; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izay atao mendrika hahazo izany fiainana izany sy ny fitsanganana amin’ny maty kosa dia tsy mba mampaka-bady, na avoaka hampakarina; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsy mety maty intsony izy, fa mitovy amin’ny anjely sady zanak’Andriamanitra, satria zanaky ny fitsanganana amin’ny maty. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Mosesy aza nanambara teo amin’
    - type: usfm
      marker: it
      children:
      - type: text
        text: ilay teny milaza
    - type: text
      text: ' ny Voaroy fa hatsangana ny maty, raha nilaza an’i Jehovah hoe ,,Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba’’ (Eks. 3.6). '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Izy tsy mba Andriamanitry ny maty, fa an’ny velona; fa velona ho an’Andriamanitra avokoa izy rehetra.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanora-dalàna sasany namaly ka nanao hoe: Mpampianatra ô, marina izay nolazainao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny batisan’i Jaona avy tany an-danitra va, sa avy tamin’ny olona? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy nisy sahy nanontany Azy intsony ireo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanontanian’i Jesosy ny Fariseo ny amin’izay maha-Zanak’i Davida ny Mesia.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 22.41-46; Mar. 12.35-37.
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY hoy Jesosy taminy: Ahoana no lazaina fa Kristy no Zanak’i Davida? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Davida ihany no milaza eo amin’ny bokin’ny Salamo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Jehovah nilaza tamin’ny Tompoko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipetraha eo an-tànako ankavanana
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-panaoko ny fahavalonao ho fitoeran’ny tongotrao (Sal. 110.1).
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Davida amin’izany manao Azy hoe Tompo; koa ahoana no maha-Zanany Azy?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nilazan’i Jesosy ny faharatsian’ny mpanora-dalana sy ny Fariseo.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 23.1-39; Mar. 12.38-40.
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY hoy Jesosy tamin’ny mpianany teo anatrehan’ny olona rehetra: '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitandrema ny amin’ny mpanora-dalàna, izay mazoto mandehandeha miakanjo akanjo lava, ary te-hoharabain’ny olona eny an-tsena, sady tia ny fipetrehana aloha eo amin’ny synagoga sy ny fitoerana aloha eo amin’ny fanasana, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary mandany ny tranon’ny mpitondratena sy manao vavaka lavareny mba ho fiolahana; ireo dia hahazo fahamelohana mafimafy kokoa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niara-nisaina izy ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hataony hoe: Nahoana no tsy nino azy hianareo? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha holazaintsika hoe kosa: Avy tamin’ny olona, dia hitora-bato antsika ny vahoaka rehetra, satria inoany ho mpaminany Jaona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ireo fa tsy fantany izay nihaviany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nanao taminy hoe: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilaza izao fanoharana izao tamin’ny olona Izy ka nanao hoe: Nisy lehilahy anankiray nanao tanimboaloboka, ka nahofany tamin’olona mpiasa tany izany, dia nandeha nitoetra ela tany an-tany hafa izy. '
