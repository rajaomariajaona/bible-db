document_id: ISA.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny voninahitra marina voatendry ho an’ny Isiraely, sy ny hanafoanana ny voninahiny tsy izy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY teny izay hitan’Isaia, zanak’i Amoza, ny amin’ny Joda sy Jerosalema.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Midira ao amin’ny vatolampy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miere ao amin’ny vovoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny tahotra avy amin’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny voninahitry ny fahalehibiazany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny fiandranandran’ny mason’ny zanak’olombelona dia haetry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiavonavonan’ny olona hatao mitanondrika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah ihany no hisandratra amin’izany andro izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa misy andron’i Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsarana izay avo sy ambony toetra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay misandratra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia haetry ireny,–
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia ny sedera rehetra any Libanona, izay avy sady andrandraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny hazo ôka rehetra any Basana
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Sy ny tendrombohitra avo rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny havoana andrandraina
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Sy ny tilikambo miringiringy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny mànda mafy rehetra
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Sy ny sambon’i Tarsisy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny tao-zavatra tsara tarehy rehetra;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ny fireharehan’ny zanak’olombelona hatao mitanondrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiavonavonan’ny olona haetry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah ihany no hisandratra amin’izany andro izany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary ny andriamani-tsi-izy dia ho foana avokoa.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary hiditra ao amin’ny zohy sy ny lava-bato ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny tahotra avy amin’i Jeyovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny voninahitry ny fahalehibiazany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa mitsangana hampihorohoro ny tany Izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary izao no ho tonga any am-parany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra misy ny tranon’i Jehovah dia haorina eo an-tampon’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hasandratra ho avo noho ny havoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny jentilisa rehetra hitanjozotra hankany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Amin’izany andro izany dia harian’ny olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny voalavo sy ny manavy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny andriamani-bolafotsiny sy ny andriamani-bolamenany–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nataony hiankohofany eo anatrehany–
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mba hidirany eo amin’ny fitriatry ny vatolampy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy eo an-tsefatsefaky ny harambato
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny tahotra avy amin’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny voninahitry ny fahalehibiazany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa mitsangana hampihorohoro ny tany Izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mitsahara, fa aza mitoky amin’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fofonaina foana no eo am-bavorony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hatao zinona izy?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Eny, maro ny firenena no hiainga ka hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha isika hiakatra any an-tendrombohitr’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any an-tranon’Andriamanitr’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampianarany antsika ny amin’ny làlany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handehanantsika amin’ny atorony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy any Ziona no hivoahan’ny lalàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avy any Jerosalema ny tenin’i Jehovah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary hitsara ny adin’ny jentilisa Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampiaiky firenena maro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hanefy ny sabany ho fangady ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lefony ho fanetezam-boaloboka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenena tsy hanainga sabatra hifamely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hianatra ady intsony.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ry taranak’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia, ary aoka isika handeha amin’ny fahazavan’i Jehovah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa efa nanary ny taranak’i Jakoba olonao Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Satria feno ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fanao
    - type: text
      text: ' avy any atsinanana izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa mpanandro tahaka ny Filistina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady efa be
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sady efa nanao fanekena tamin’ny.
      marker-yv: yv-n
    - type: text
      text: ' zana-bahiny.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ny taniny dia feno volafotsy sy volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy hita lany ny hareny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taniny dia feno soavaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy hita isa ny kalesiny;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny taniny dia feno andriamani-tsi-izy koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo anatrehan’ny asan’ny tànany no iankohofany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay nataon’ny rantsan-tanany;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa ny zanak’olombelona hatao mitanondrika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olona haetry,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mamela ny helony Hianao!
