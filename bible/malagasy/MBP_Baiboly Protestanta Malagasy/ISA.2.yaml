document_id: ISA.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voninahitra marina voatendry ho an’ny Isiraely, sy ny hanafoanana ny voninahiny tsy izy.
  - type: text
    content: NY teny izay hitan’Isaia, zanak’i Amoza, ny amin’ny Joda sy Jerosalema.
  '10':
  - type: text
    content: Midira ao amin’ny vatolampy,
  - type: text
    content: Ary miere ao amin’ny vovoka
  - type: text
    content: Noho ny tahotra avy amin’i Jehovah
  - type: text
    content: Sy ny voninahitry ny fahalehibiazany.
  '11':
  - type: text
    content: Ny fiandranandran’ny mason’ny zanak’olombelona dia haetry,
  - type: text
    content: Ary ny fiavonavonan’ny olona hatao mitanondrika;
  - type: text
    content: Fa Jehovah ihany no hisandratra amin’izany andro izany.
  '12':
  - type: text
    content: Fa misy andron’i Jehovah, Tompon’ny maro,
  - type: text
    content: Hitsarana izay avo sy ambony toetra rehetra
  - type: text
    content: Ary izay misandratra rehetra,
  - type: text
    content: Ka dia haetry ireny,–
  '13':
  - type: text
    content: Dia ny sedera rehetra any Libanona, izay avy sady andrandraina,
  - type: text
    content: Sy ny hazo ôka rehetra any Basana
  '14':
  - type: text
    content: Sy ny tendrombohitra avo rehetra
  - type: text
    content: Sy ny havoana andrandraina
  '15':
  - type: text
    content: Sy ny tilikambo miringiringy rehetra
  - type: text
    content: Sy ny mànda mafy rehetra
  '16':
  - type: text
    content: Sy ny sambon’i Tarsisy rehetra
  - type: text
    content: Sy ny tao-zavatra tsara tarehy rehetra;
  '17':
  - type: text
    content: Ary ny fireharehan’ny zanak’olombelona hatao mitanondrika,
  - type: text
    content: Ary ny fiavonavonan’ny olona haetry;
  - type: text
    content: Fa Jehovah ihany no hisandratra amin’izany andro izany.
  '18':
  - type: text
    content: Ary ny andriamani-tsi-izy dia ho foana avokoa.
  '19':
  - type: text
    content: Ary hiditra ao amin’ny zohy sy ny lava-bato ny olona
  - type: text
    content: Noho ny tahotra avy amin’i Jeyovah
  - type: text
    content: Sy ny voninahitry ny fahalehibiazany,
  - type: text
    content: Rehefa mitsangana hampihorohoro ny tany Izy.
  '2':
  - type: text
    content: 'Ary izao no ho tonga any am-parany:'
  - type: text
    content: Ny tendrombohitra misy ny tranon’i Jehovah dia haorina eo an-tampon’ny tendrombohitra
  - type: text
    content: Ary hasandratra ho avo noho ny havoana;
  - type: text
    content: Ary ny jentilisa rehetra hitanjozotra hankany.
  '20':
  - type: text
    content: Amin’izany andro izany dia harian’ny olona
  - type: text
    content: Ho an’ny voalavo sy ny manavy
  - type: text
    content: Ny andriamani-bolafotsiny sy ny andriamani-bolamenany–
  - type: text
    content: Izay nataony hiankohofany eo anatrehany–
  '21':
  - type: text
    content: Mba hidirany eo amin’ny fitriatry ny vatolampy
  - type: text
    content: Sy eo an-tsefatsefaky ny harambato
  - type: text
    content: Noho ny tahotra avy amin’i Jehovah
  - type: text
    content: Sy ny voninahitry ny fahalehibiazany,
  - type: text
    content: Rehefa mitsangana hampihorohoro ny tany Izy.
  '22':
  - type: text
    content: Mitsahara, fa aza mitoky amin’ny olona;
  - type: text
    content: Fa fofonaina foana no eo am-bavorony,
  - type: text
    content: Ka hatao zinona izy?
  '3':
  - type: text
    content: 'Eny, maro ny firenena no hiainga ka hanao hoe:'
  - type: text
    content: Andeha isika hiakatra any an-tendrombohitr’i Jehovah,
  - type: text
    content: Ho any an-tranon’Andriamanitr’i Jakoba,
  - type: text
    content: Mba hampianarany antsika ny amin’ny làlany,
  - type: text
    content: Ka handehanantsika amin’ny atorony;
  - type: text
    content: Fa avy any Ziona no hivoahan’ny lalàna,
  - type: text
    content: Ary avy any Jerosalema ny tenin’i Jehovah.
  '4':
  - type: text
    content: Ary hitsara ny adin’ny jentilisa Izy
  - type: text
    content: Ka hampiaiky firenena maro;
  - type: text
    content: Dia hanefy ny sabany ho fangady ireny,
  - type: text
    content: Ary ny lefony ho fanetezam-boaloboka;
  - type: text
    content: Ny firenena tsy hanainga sabatra hifamely
  - type: text
    content: Na hianatra ady intsony.
  '5':
  - type: text
    content: Ry taranak’i Jakoba,
  - type: text
    content: Avia, ary aoka isika handeha amin’ny fahazavan’i Jehovah.
  '6':
  - type: text
    content: Fa efa nanary ny taranak’i Jakoba olonao Hianao,
  - type: text
    content: 'Satria feno ny '
  - type: text
    content: fanao
  - type: text
    content: ' avy any atsinanana izy'
  - type: text
    content: Ary efa mpanandro tahaka ny Filistina
  - type: text
    content: Sady efa be
  - type: note
    content: 'Na: Sady efa nanao fanekena tamin’ny.'
  - type: text
    content: ' zana-bahiny.'
  '7':
  - type: text
    content: Ary ny taniny dia feno volafotsy sy volamena,
  - type: text
    content: Sady tsy hita lany ny hareny;
  - type: text
    content: Ary ny taniny dia feno soavaly,
  - type: text
    content: Sady tsy hita isa ny kalesiny;
  '8':
  - type: text
    content: Ny taniny dia feno andriamani-tsi-izy koa;
  - type: text
    content: Eo anatrehan’ny asan’ny tànany no iankohofany,
  - type: text
    content: Dia izay nataon’ny rantsan-tanany;
  '9':
  - type: text
    content: Koa ny zanak’olombelona hatao mitanondrika,
  - type: text
    content: Ary ny olona haetry,–
  - type: text
    content: Ary aza mamela ny helony Hianao!
