document_id: LEV.24
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fanamboarana ny jiro sy ny fanaovana ny mofo aseho.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandidia ny Zanak’Isiraely hitondra aminao diloilon’oliva tsara voavely hatao fanazavana, hampirehetana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hanaingenana.
    marker-yv: yv-n
  - type: text
    text: ' jiro mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eo ivelan’ny efitra lamba izay manakona ny Vavolombelona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didy Folo.
    marker-yv: yv-n
  - type: text
    text: ' dia eo amin’ny trano-lay fihaonana, no handaharan’i Arona azy, hatramin’ny hariva ka hatramin’ny maraina, eo anatrehan’i Jehovah mandrakariva; ho lalàna mandrakizay amin’ny taranakareo hatramin’ny fara mandimby izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eo amin’ny fanaovan-jiro '
  - type: usfm
    marker: it
    children:
    - type: text
      text: volamena
  - type: text
    text: ' tsara no handaharany ny lela fanaovan-jiro mandrakariva eo anatrehan’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary makà koba tsara toto, ka endaso ho mofo roa ambin’ny folo; roa ampahafolon’ny efaha no hatao mofo iray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary mandahara ireo eo ambonin’ny latabatra tsara eo anatrehan’i Jehovah, ka ataovy roa toerana, dia enina avy no iray toerana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary asio ditin-kazo mani-pofona madio ny isan-toerana, ka aoka ho eo amin’ny mofo izany ho fanati-pahatsiarovana, dia fanatitra atao amin’ny afo ho an’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Isan-tSabata no handaharany ireo mandrakariva eo anatrehan’i Jehovah; ho avy amin’ny Zanak’Isiraely izany, dia fanekena mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ho an’i Arona sy ny zanany izany ka hohaniny eo amin’izay fitoerana masina; fa masina dia masina ho an’ny mpisorona izany avy amin’ny fanatitra atao amin’ny afo: lalàna mandrakizay izany.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny fampijaliana izay miteny ratsy ny anaran’i Jehovah mbamin’ny valin’ny famonoana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ARY nisy lehilahy anankiray nivoaka nankeo amin’ny Zanak’Isiraely–vehivavy Isiraelita no reniny, fa lehilahy Egyptiana no rainy; ary niady teo an-toby io zanaky ny vehivavy Isiraelita io sy ny lehilahy Isiraelita anankiray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary niteny ratsy ny Anarana ilay zanaky ny vehivavy Isiraelita ka nanozona dia nentina tany amin’i Mosesy izy (Selomita no anaran-dreniny, zanakavavin’i Dibry avy tamin’ny firenen’i Dana izy); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ary nambenany izy, mandra-paha-fantany izay ho didin’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avoahy ho eny ivelan’ny toby ilay nanozona, ary aoka izay rehetra nandre azy hametraka ny tànany amin’ny lohany, ary aoka ny fiangonana rehetra’ hitora-bato azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary mitenena amin’ny Zanak Isiraely hoe: Na iza na iza no mimangavinga an’Andriamaniny dia ho meloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa izay miteny ratsy ny anaran’i Jehovah dia hatao maty mihitsy; hitora-bato azy tokoa ny fiangonana rehetra; na vahiny na tompon-tany, raha miteny ratsy ny Anarana, dia hatao maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izay mahafaty olona dia hatao maty tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izay mahafaty biby fiompy dia hanonitra azy: biby solon’ny biby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha misy olona manakilema ny namany, dia toy izay nataony no hatao aminy kosa: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'tapaka solon’ny tapaka, maso solon’ny maso, nify solon’ny nify; tahaka ny kilema nataony tamin’ny olona no hatao aminy kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izay mahafaty biby fiompy dia hanonitra azy; fa izay mahafaty olona kosa dia hatao maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fitsipika iray no hitondrana anareo, na vahiny na tompon-tany; fa Izaho no Jehovah Andriamanitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary Mosesy niteny tamin’ny Zanak’Isiraely, dia navoakany teny ivelan’ny toby ilay nanozona ka notorahany vato. Ary ny Zanak’Isiraely dia nanao araka izay efa nandidian’i Jehovah an’i Mosesy.
