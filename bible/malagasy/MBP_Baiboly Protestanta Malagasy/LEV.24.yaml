document_id: LEV.24,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fanamboarana ny jiro sy ny fanaovana ny mofo aseho.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'ARY nisy lehilahy anankiray nivoaka nankeo amin’ny Zanak’Isiraely–vehivavy Isiraelita no reniny, fa lehilahy Egyptiana no rainy; ary niady teo an-toby io zanaky ny vehivavy Isiraelita io sy ny lehilahy Isiraelita anankiray. '
  '11':
  - type: text
    content: 'Ary niteny ratsy ny Anarana ilay zanaky ny vehivavy Isiraelita ka nanozona dia nentina tany amin’i Mosesy izy (Selomita no anaran-dreniny, zanakavavin’i Dibry avy tamin’ny firenen’i Dana izy); '
  '12':
  - type: text
    content: ary nambenany izy, mandra-paha-fantany izay ho didin’i Jehovah.
  '13':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '14':
  - type: text
    content: 'Avoahy ho eny ivelan’ny toby ilay nanozona, ary aoka izay rehetra nandre azy hametraka ny tànany amin’ny lohany, ary aoka ny fiangonana rehetra’ hitora-bato azy. '
  '15':
  - type: text
    content: 'Ary mitenena amin’ny Zanak Isiraely hoe: Na iza na iza no mimangavinga an’Andriamaniny dia ho meloka. '
  '16':
  - type: text
    content: Fa izay miteny ratsy ny anaran’i Jehovah dia hatao maty mihitsy; hitora-bato azy tokoa ny fiangonana rehetra; na vahiny na tompon-tany, raha miteny ratsy ny Anarana, dia hatao maty izy.
  '17':
  - type: text
    content: 'Ary izay mahafaty olona dia hatao maty tokoa. '
  '18':
  - type: text
    content: 'Fa izay mahafaty biby fiompy dia hanonitra azy: biby solon’ny biby. '
  '19':
  - type: text
    content: 'Ary raha misy olona manakilema ny namany, dia toy izay nataony no hatao aminy kosa: '
  '2':
  - type: text
    content: Mandidia ny Zanak’Isiraely hitondra aminao diloilon’oliva tsara voavely hatao fanazavana, hampirehetana
  - type: note
    content: 'Na: hanaingenana.'
  - type: text
    content: ' jiro mandrakariva. '
  '20':
  - type: text
    content: 'tapaka solon’ny tapaka, maso solon’ny maso, nify solon’ny nify; tahaka ny kilema nataony tamin’ny olona no hatao aminy kosa. '
  '21':
  - type: text
    content: 'Ary izay mahafaty biby fiompy dia hanonitra azy; fa izay mahafaty olona kosa dia hatao maty. '
  '22':
  - type: text
    content: Fitsipika iray no hitondrana anareo, na vahiny na tompon-tany; fa Izaho no Jehovah Andriamanitrareo.
  '23':
  - type: text
    content: Ary Mosesy niteny tamin’ny Zanak’Isiraely, dia navoakany teny ivelan’ny toby ilay nanozona ka notorahany vato. Ary ny Zanak’Isiraely dia nanao araka izay efa nandidian’i Jehovah an’i Mosesy.
  '3':
  - type: text
    content: Eo ivelan’ny efitra lamba izay manakona ny Vavolombelona,
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' dia eo amin’ny trano-lay fihaonana, no handaharan’i Arona azy, hatramin’ny hariva ka hatramin’ny maraina, eo anatrehan’i Jehovah mandrakariva; ho lalàna mandrakizay amin’ny taranakareo hatramin’ny fara mandimby izany. '
  '4':
  - type: text
    content: 'Eo amin’ny fanaovan-jiro '
  - type: text
    content: volamena
  - type: text
    content: ' tsara no handaharany ny lela fanaovan-jiro mandrakariva eo anatrehan’i Jehovah.'
  '5':
  - type: text
    content: 'Ary makà koba tsara toto, ka endaso ho mofo roa ambin’ny folo; roa ampahafolon’ny efaha no hatao mofo iray. '
  '6':
  - type: text
    content: 'Ary mandahara ireo eo ambonin’ny latabatra tsara eo anatrehan’i Jehovah, ka ataovy roa toerana, dia enina avy no iray toerana. '
  '7':
  - type: text
    content: 'Ary asio ditin-kazo mani-pofona madio ny isan-toerana, ka aoka ho eo amin’ny mofo izany ho fanati-pahatsiarovana, dia fanatitra atao amin’ny afo ho an’i Jehovah. '
  '8':
  - type: text
    content: 'Isan-tSabata no handaharany ireo mandrakariva eo anatrehan’i Jehovah; ho avy amin’ny Zanak’Isiraely izany, dia fanekena mandrakizay. '
  '9':
  - type: text
    content: 'Ary ho an’i Arona sy ny zanany izany ka hohaniny eo amin’izay fitoerana masina; fa masina dia masina ho an’ny mpisorona izany avy amin’ny fanatitra atao amin’ny afo: lalàna mandrakizay izany.'
  - type: heading
    content: Ny amin’ny fampijaliana izay miteny ratsy ny anaran’i Jehovah mbamin’ny valin’ny famonoana.
