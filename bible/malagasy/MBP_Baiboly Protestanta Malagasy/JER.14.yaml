document_id: JER.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsy hahafahan’ny olona amin’ny loza, na dia efa nifonan’i Jeremia tamin’Andriamanitra aza izy.
  - type: text
    content: NY tenin’i Jehovah izay tonga tamin’i Jeremia ny amin’ny mosary.
  '10':
  - type: text
    content: 'Izao no lazain’i Jehovah amin’ity firenena ity:'
  - type: text
    content: Te-hirenireny toy izao izy,
  - type: text
    content: Ka tsy mahajanona ny tongony;
  - type: text
    content: Tsy sitrak’i Jehovah izy,
  - type: text
    content: Ankehitriny dia tsaroany ny helony,
  - type: text
    content: Ary valiany ny fahotany.
  '11':
  - type: text
    content: 'Dia hoy Jehovah tamiko:'
  - type: text
    content: Aza mivavaka ho an’ity firenena ity hahasoa azy.
  '12':
  - type: text
    content: Fa na dia mifady hanina aza izy, dia tsy hihaino ny fitarainany Aho;
  - type: text
    content: Ary na dia manatitra fanatitra dorana sy fanatitra hohanina aza izy, dia tsy hankasitraka azy Aho,
  - type: text
    content: Fa haripako amin’ny sabatra sy ny mosary ary ny areti-mandringana izy.
  '13':
  - type: text
    content: 'Dia hoy izaho:'
  - type: text
    content: Indrisy, Jehovah Tompo ô!
  - type: text
    content: 'Indreo ny mpaminany manao aminy hoe:'
  - type: text
    content: Tsy hiharan’ny sabatra hianareo,
  - type: text
    content: Ary tsy ho mosarena;
  - type: text
    content: Fa homeko fiadanana maharitra eto amin’ity tany ity hianareo.
  '14':
  - type: text
    content: 'Dia hoy Jehovah tamiko: Ireo mpaminany ireo dia maminany lainga amin’ny anarako;'
  - type: text
    content: Tsy naniraka azy Aho,
  - type: text
    content: Na nandidy azy, na niteny taminy;
  - type: text
    content: Fa fahitana mandainga sy faminaniana tsy marina
  - type: text
    content: Ary tsinontsinona sy fitaky ny fony no aminaniany aminareo.
  '15':
  - type: text
    content: 'Koa izao no lazain’i Jehovah ny amin’ireo mpaminany izay maminany amin’ny anarako ireo–nefa tsy nirahiko tsinona–ka milaza fa tsy hisy sabatra sy mosary eto amin’ity tany ity:'
  - type: text
    content: Ny sabatra sy ny mosary indrindra no nandringanana ireo mpaminany ireo.
  '16':
  - type: text
    content: Ary ny firenena izay aminanian’ireo koa dia hiely faty eny an-dàlamben’i Jerosalema
  - type: text
    content: Noho ny mosary sy ny sabatra,
  - type: text
    content: Ka tsy hisy mpandevina ireny,
  - type: text
    content: Na ny tenany, na ny vadiny, na ny zanani-lahy, na ny zanani-vavy,–
  - type: text
    content: Fa haidiko ao aminy ny faharatsiany.
  '17':
  - type: text
    content: 'Koa lazao aminy izao teny izao: Ny ranomasoko hijononoka andro aman-alina ka tsy hitsahatra;'
  - type: text
    content: Fa ny oloko, zanakavavy virijina, naratra mafy dia mafy
  - type: text
    content: Tamin’ny kapoka maharary indrindra.
  '18':
  - type: text
    content: Raha mivoaka any an-tsaha aho,
  - type: text
    content: Dia indreny ny matin-tsabatra!
  - type: text
    content: Ary raha miditra ao an-tanàna kosa aho,
  - type: text
    content: Dia indreo ny anan’ny mosary!
  - type: text
    content: Eny, ny mpaminany sy ny mpisorona dia mirenireny mankamin’ny tany tsy fantany.
  - type: note
    content: 'Na: ka tsy mahalala.'
  '19':
  - type: text
    content: Efa narianao tokoa va Joda?
  - type: text
    content: Efa naharikoriko ny fanahinao va Ziona?
  - type: text
    content: Nahoana no dia mamely anay Hianao, ka efa tsy mety sitrana izahay?
  - type: text
    content: Nanantena fiadanana izahay, kanjo tsy nahita soa,
  - type: text
    content: Ary andro fanasitranana,
  - type: note
    content: 'Na: fahafinaretana.'
  - type: text
    content: ' fa indro fampitahorana.'
  '2':
  - type: text
    content: Misaona ny Joda,
  - type: text
    content: Ary mitanondrika ny vavahadiny;
  - type: text
    content: Mitafy lamba fioriana izy ka mipetraka amin’ny tany;
  - type: text
    content: Ary miakatra ny fitarainan’i Jerosalema.
  '20':
  - type: text
    content: Jehovah ô, tsaroanay ny faharatsianay sy ny heloky ny razanay;
  - type: text
    content: Fa efa nanota taminao izahay.
  '21':
  - type: text
    content: Noho ny amin’ny anaranao dia aza arianao izahay;
  - type: text
    content: Aza atao ho tsinontsinona ny seza fiandrianan’ny voninahitrao;
  - type: text
    content: Tsarovy, ka aza tsoahanao ny fanekenao taminay.
  '22':
  - type: text
    content: Mba misy mahalatsaka ranonorana va ireny sampin’
  - type: note
    content: Heb. zava-poanan’.
  - type: text
    content: ' ny jentilisa ireny?'
  - type: text
    content: Na mahay mandatsaka ranonorana mivatravatra va ny lanitra?
  - type: text
    content: Fa tsy Hianao ihany va no Izy, ry Jehovah Andriamanitray ô?
  - type: text
    content: Koa manantena Anao izahay,
  - type: text
    content: Satria Hianao no nanao ireo zavatra rehetra ireo.
  '3':
  - type: text
    content: Ny lehibeny maniraka ny madinika hantsaka rano;
  - type: text
    content: Dia tonga any amin’ny lavaka famorian-drano ireny, nefa tsy mahita rano
  - type: text
    content: Ka miverina mitondra loha mody;
  - type: text
    content: Menatra sy mangaihay izy ka misaron-doha.
  '4':
  - type: text
    content: Noho ny fangentan’
  - type: note
    content: 'Na: Satria tora-kovitra.'
  - type: text
    content: ' ny tany'
  - type: text
    content: Noho ny tsy nilatsahan’ny ranonorana taminy,
  - type: text
    content: Dia menatra ny mpiasa ka misaron-doha.
  '5':
  - type: text
    content: Ary na dia ny dieravavy any an-tsaha aza, raha miteraka, dia mahafoy
  - type: text
    content: Noho ny tsi-fisian’ny ahi-maitso.
  '6':
  - type: text
    content: Ary ny boriki-dia mijanona eny an-tendrombohitra mangadihady,
  - type: text
    content: Mihanahana maniry ny rivotra toy ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: ' izy;'
  - type: text
    content: Manjambena ny masony noho ny tsi-fisian’ny ahitra.
  '7':
  - type: text
    content: Ry Jehovah ô, na dia miampanga anay aza ny helokay,
  - type: text
    content: Miasà ihany Hianao noho ny anaranao;
  - type: text
    content: Fa be ny fiodinanay,
  - type: text
    content: Taminao no nanotanay.
  '8':
  - type: text
    content: Ry Fanantenan’ny Isiraely ô,
  - type: text
    content: Mpamonjy azy amin’ny andro fahoriana!
  - type: text
    content: Nahoana Hianao no dia toy ny vahiny amin’ny tany
  - type: text
    content: Ary toy ny mpandeha izay manorin-day handry indray alina monja?
  '9':
  - type: text
    content: Nahoana Hianao no dia toy ny olona ankona
  - type: text
    content: Ary toy ny lehilahy mahery tsy mahavonjy?
  - type: text
    content: Nefa mbola ato aminay ihany Hianao, Jehovah ô,
  - type: text
    content: Ary ny anaranao dia efa nantsoina taminay;
  - type: text
    content: Aza dia mandao anay.
