document_id: JER.14,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny tsy hahafahan’ny olona amin’ny loza, na dia efa nifonan’i Jeremia tamin’Andriamanitra aza izy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY tenin’i Jehovah izay tonga tamin’i Jeremia ny amin’ny mosary.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izao no lazain’i Jehovah amin’ity firenena ity:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te-hirenireny toy izao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mahajanona ny tongony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy sitrak’i Jehovah izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia tsaroany ny helony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary valiany ny fahotany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hoy Jehovah tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mivavaka ho an’ity firenena ity hahasoa azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa na dia mifady hanina aza izy, dia tsy hihaino ny fitarainany Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia manatitra fanatitra dorana sy fanatitra hohanina aza izy, dia tsy hankasitraka azy Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa haripako amin’ny sabatra sy ny mosary ary ny areti-mandringana izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy izaho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy, Jehovah Tompo ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indreo ny mpaminany manao aminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hiharan’ny sabatra hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy ho mosarena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa homeko fiadanana maharitra eto amin’ity tany ity hianareo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy Jehovah tamiko: Ireo mpaminany ireo dia maminany lainga amin’ny anarako;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy naniraka azy Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na nandidy azy, na niteny taminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fahitana mandainga sy faminaniana tsy marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsinontsinona sy fitaky ny fony no aminaniany aminareo.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa izao no lazain’i Jehovah ny amin’ireo mpaminany izay maminany amin’ny anarako ireo–nefa tsy nirahiko tsinona–ka milaza fa tsy hisy sabatra sy mosary eto amin’ity tany ity:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sabatra sy ny mosary indrindra no nandringanana ireo mpaminany ireo.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary ny firenena izay aminanian’ireo koa dia hiely faty eny an-dàlamben’i Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny mosary sy ny sabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy mpandevina ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny tenany, na ny vadiny, na ny zanani-lahy, na ny zanani-vavy,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa haidiko ao aminy ny faharatsiany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa lazao aminy izao teny izao: Ny ranomasoko hijononoka andro aman-alina ka tsy hitsahatra;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny oloko, zanakavavy virijina, naratra mafy dia mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny kapoka maharary indrindra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha mivoaka any an-tsaha aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia indreny ny matin-tsabatra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha miditra ao an-tanàna kosa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia indreo ny anan’ny mosary!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny mpaminany sy ny mpisorona dia mirenireny mankamin’ny tany tsy fantany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ka tsy mahalala.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Efa narianao tokoa va Joda?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa naharikoriko ny fanahinao va Ziona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no dia mamely anay Hianao, ka efa tsy mety sitrana izahay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanantena fiadanana izahay, kanjo tsy nahita soa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary andro fanasitranana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahafinaretana.
      marker-yv: yv-n
    - type: text
      text: ' fa indro fampitahorana.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Misaona ny Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitanondrika ny vavahadiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitafy lamba fioriana izy ka mipetraka amin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miakatra ny fitarainan’i Jerosalema.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Jehovah ô, tsaroanay ny faharatsianay sy ny heloky ny razanay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nanota taminao izahay.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Noho ny amin’ny anaranao dia aza arianao izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza atao ho tsinontsinona ny seza fiandrianan’ny voninahitrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy, ka aza tsoahanao ny fanekenao taminay.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mba misy mahalatsaka ranonorana va ireny sampin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zava-poanan’.
      marker-yv: yv-n
    - type: text
      text: ' ny jentilisa ireny?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mahay mandatsaka ranonorana mivatravatra va ny lanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy Hianao ihany va no Izy, ry Jehovah Andriamanitray ô?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa manantena Anao izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria Hianao no nanao ireo zavatra rehetra ireo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny lehibeny maniraka ny madinika hantsaka rano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tonga any amin’ny lavaka famorian-drano ireny, nefa tsy mahita rano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miverina mitondra loha mody;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Menatra sy mangaihay izy ka misaron-doha.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Noho ny fangentan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Satria tora-kovitra.
      marker-yv: yv-n
    - type: text
      text: ' ny tany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny tsy nilatsahan’ny ranonorana taminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia menatra ny mpiasa ka misaron-doha.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary na dia ny dieravavy any an-tsaha aza, raha miteraka, dia mahafoy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny tsi-fisian’ny ahi-maitso.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary ny boriki-dia mijanona eny an-tendrombohitra mangadihady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihanahana maniry ny rivotra toy ny amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
    - type: text
      text: ' izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manjambena ny masony noho ny tsi-fisian’ny ahitra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ry Jehovah ô, na dia miampanga anay aza ny helokay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miasà ihany Hianao noho ny anaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa be ny fiodinanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taminao no nanotanay.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ry Fanantenan’ny Isiraely ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpamonjy azy amin’ny andro fahoriana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana Hianao no dia toy ny vahiny amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary toy ny mpandeha izay manorin-day handry indray alina monja?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nahoana Hianao no dia toy ny olona ankona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary toy ny lehilahy mahery tsy mahavonjy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa mbola ato aminay ihany Hianao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anaranao dia efa nantsoina taminay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza dia mandao anay.
