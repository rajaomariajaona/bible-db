document_id: MRK.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fanoharana nataon’i Jesosy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 13.1-52; Lio. 8.4-18; 13.18-21.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY nampianatra teo amoron’ny ranomasina indray Jesosy; ary nisy vahoaka betsaka nanatona Azy, dia niditra teo an-tsambokely Izy ka nipetraka teo amin’ny ranomasina; ary ny vahoaka rehetra dia teny an-tanety amoron-dranomasina.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tao amin’ny mangingina Izy, dia nanontany Azy ny amin’ny fanoharana ireo nomba Azy mbamin’ny roa ambin’ny folo lahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Hianareo no efa nomena ny zava-miafina ny amin’ny fanjakan’Andriamanitra; fa amin’ireny izay any ivelany kosa ny zavatra rehetra dia atao amin’ny fanoharana; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ',,mba hijery mandrakariva ihany izy, fa tsy hahita; ary mba handre mandrakariva ihany izy, fa tsy hahafantatra; fandrao hibebaka izy, ka havela ny helony’’ (Isa. 6. 9, 10). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Tsy azonareo va ilay fanoharana teo? koa hataonareo ahoana no fahafantatra ny fanoharana rehetra? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpamafy dia mamafy ny teny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireto no ilay teo amoron-dàlana, dia izay amafazana ny teny, fa rehefa nandre izy, dia avy miaraka amin’izay Satana ka manaisotra ny teny izay nafafy tao aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tahaka izany koa, ireto no ilay voafafy teny amin’ny tany marivo ambony vatolampy, dia izay mandre ny teny ka malaky mandray izany amin’ny hafaliana; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa tsy manam-paka ao anatiny ireny, fa maharitra vetivety foana; koa rehefa afaka izany, ka tonga izay fahoriana na fanenjehana noho ny teny, dia tafintohina miaraka amin’izay izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary misy hafa koa izay voafafy teny amin’ny tsilo, dia ireo no ilay nandre ny teny, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny fiahiahiana izao fiainana izao sy ny fitaky ny harena ary ny filana ny zavatra hafa miditra, dia mangeja ny teny, ka tsy mamoa izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampianatra azy zavatra maro tamin’ny fanoharana Izy ka nilaza tamin’ny fampianarany azy hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireto no ilay voafafy teny amin’ny tany tsara, dia izay mandre ny teny ka mandray azy dia mamoa: ny sasany avy telo-polo heny, ny sasany avy enim-polo heny, ary ny sasany avy zato heny.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Moa entina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avy.
      marker-yv: yv-n
    - type: text
      text: ' va ny jiro mba hosaronan’ny vata famarana, na hatao ao ambanin’ny farafara? Tsy hatao eo amin’ny fanaovan-jiro va izy? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy misy takona izay tsy ho hita, na miafina izay tsy haseho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy olona manan-tsofina ho enti-mihaino, aoka izy hihaino.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Diniho izay teny renareo; araka ny ohatra anoharanareo ihany no hanoharana ho anareo, ary homena mihoatra aza hianareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izay manana no homena; ary ny amin’izay tsy manana, na dia izay ananany aza dia halaina aminy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Toy izao ny fanjakan’Andriamanitra: tahaka ny lehilahy mamafy voa amin’ny tany '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka matory sy mahatsiaro isan-alina sy isan-andro; ary ny voa dia mitsimoka ka maniry, nefa tsy fantany ny faniriny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany mahavokatra ho azy: voalohany misy tahony, dia teraka, ary rehefa izany, dia feno voa. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa rehefa azo jinjana izy, dia jinjany miaraka amin’izay, fa efa tonga ny fararano.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihainoa: Indro, nivoaka ny mpamafy mba hamafy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Ahoana no hanoharantsika ny fanjakan’Andriamanitra, ary inona no fanoharana hanoharantsika azy? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny voan-tsinapy izy, izay kely noho ny voa rehetra, raha vao afafy amin’ny tany; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa rehefa voafafy kosa izy, dia maniry ka tonga lehibe noho ny anana rehetra, ary mandrantsana vaventy, ka azon’ny voro-manidina itoerana ny alokalony.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary fanoharana maro toy izany no nanambarany ny teny taminy, araka izay hainy hohenoina. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha tsy tamin’ny fanoharana dia tsy niteny taminy Izy; ary tamin’ny mangingina no nilazany tamin’ny mpianany ny hevitr’ireo rehetra ireo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nampitsaharan’i Jesosy ny tafio-drivotra.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 8.23-27; Lio. 8.22-25.
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY androtrizay ihany, rehefa hariva ny andro, dia hoy Izy taminy: Andeha isika hita ho eny am-pita. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nampodin’
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny mpianany
    - type: text
      text: ' ny vahoaka, dia nentiny tamin’io sambokely io tamin’izao ihany Jesosy. Ary nisy sambokely sasany koa niaraka taminy.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy tafio-drivotra mahery, ary nianjerazeran’ny alondrano ny sambokely ka nila ho feno rano. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy natory teo am-bodin’ny sambokely tambonin’ny ondana; ary namoha Azy izy ireo ka nanao taminy hoe: Mpampianatra ô, tsy mampaninona Anao va izao hahafatesanay izao? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifoha Izy, dia niteny mafy ny rivotra sady nilaza tamin’ny ranomasina hoe: Mangìna, mitsahara. Ary dia nitsahatra ny rivotra, ka tony tsara ny andro. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha namafy izy, ny sasany dia voafafy teny amoron-dàlana, dia avy ny vorona ka nandany izany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Nahoana no saro-tahotra hianareo? Tsy mbola manam-pinoana va hianareo? '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary natahotra indrindra izy ireo ka niresaka hoe: Iza moa Ity, fa ny rivotra sy ny ranomasina aza manaiky Azy?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sasany dia voafafy teny amin’ny tany marivo ambony vatolampy; dia nalaky nitrebona ireny, satria tsy nisy tany lalina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa niposaka ny masoandro, dia nalazo ireny; ary satria tsy nanam-paka, dia maty izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sasany dia voafafy teny amin’ny tsilo; ary ny tsilo naniry ka nangeja azy, dia tsy namoa izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sasany dia voafafy teny amin’ny tany tsara, ary raha naniry sy namoa, dia vokatra, fa namoa: ny sasany avy telo-polo heny, ary ny sasany avy enim-polo heny, ary ny sasany avy zato heny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.'
