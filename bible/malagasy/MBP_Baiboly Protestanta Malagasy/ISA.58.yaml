document_id: ISA.58,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fivavahana marina sy ny fivavahana tsy izy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: EZAHO ny fiantsonao, fa aza atao malemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato ny feonao ho tahaka ny an’ny anjomara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ambarao amin’ny oloko ny fahadisoany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny taranak’i Jakoba ny fahotany;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary afoinao ho an’ny noana izay hanina tianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mahavoky ny ory hianao,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiposaka ao amin’ny maizina ny fahazavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny aizim-pitonao ho tahaka ny mitataovovonana;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary Jehovah hitari-dàlana anao mandrakariva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hahavoky ny fanahinao ao amin’ny tany karankaina aza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hampahatanjaka ny taolanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka ny saha vonton-drano hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho tahaka ny loharanao miboiboika izay tsy mety ritra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary izay taranakao no hanangana ny efa rava ela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny naorina hatry ny fony fahagola no hamboarinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao dia hatao hoe Mpamboatra ny rava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mpamelon-dàlana honenana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amin’ny tany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Raha miaro ny tongotrao amin’ny Sabata hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy manao izay tianao amin’ny androko masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manao ny Sabata hoe Fahafinaretana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny nohamasinin’i Jehovah hoe mendrika hohajaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manome voninahitra azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Azy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mandeha amin’ny làlanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na manao izay tianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na miteniteny foana,–
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia hiravoravo amin’i Jehovah hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hasandratro ao amin’ny havoana amin’ny tany hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hofahanako amin’ny lovan’i Jakoba rainao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny vavan’i Jehovah no efa niteny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nefa Izaho mbola tadiaviny ihany isan-andro isan-andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hahalala ny làlako no sitrany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny firenena efa nanao ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nahafoy ny fitsipik’Andriamaniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No fanontaniany amiko ny fitsipiky ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy aniriany ny hihavian’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sy fifaliany hanakaiky an’.
      marker-yv: yv-n
    - type: text
      text: ' Andriamanitra.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nahoana izahay no mifady, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hoy izy,
    - type: text
      text: ' nefa tsy hitanao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahoana izahay no mampahory ny tenanay, nefa tsy ahoanao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro fa amin’ny andro fifadianareo aza dia mbola ny tianareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hitanareo.
      marker-yv: yv-n
    - type: text
      text: ' ihany no ataonareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpiasa rehetra ao aminareo dia ampahorinareo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary mbola arosonareo fatratra ihany ny asanareo.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Indro, ny hiady sy ny hifanditra no anton’ny ifadianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hamely amin’ny totohondrin’ny faharatsiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao fifadianareo izao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy andrenesana ny feonareo any amin’ny avo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Moa fifadiana toy izany va no ankasitrahako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia andro hampahorian’ny olona tena?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hampiondrika ny lohany tahaka ny zozoro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny hamelatra lamba fisaonana rarahan-davenona ho fandriany,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa izany va no ataonao hoe fifadiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy andro ankasitrahan’i Jehovah?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tsy izao va no fifadiana izay ankasitrahako:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny hamaha ny famatoran’ny faharatsiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanaboraka ny fehin’ny zioga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy handefa ny ampahorina ho afaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanapatapaka ny zioga rehetra?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Moa tsy ny hizara ny mofonao ho an’ny noana va,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny hampiantrano ny ory manjenjena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mba hanafianao izay hitanao mitanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hihirimbelona amin’ny namanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hiery ny nofonao.
      marker-yv: yv-n
    - type: text
      text: ' hianao?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa raha izany, dia hiposaka tahaka ny fahazavan’ny maraina ny fahazavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho tonga faingana ny fahasitrananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinanao ho loha-làlanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny voninahitr’i Jehovah ho vodi-làlanao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary amin’izany dia hiantso hianao, ary Jehovah hamaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, hanandratra ny feonao hianao, ary Izy hanao hoe: Inty Aho.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha esorinao tsy ho eo aminao ny zioga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fanondroan’ny fanondro sy ny fitenenan-dratsy,
