document_id: ISA.58,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fivavahana marina sy ny fivavahana tsy izy.
  - type: text
    content: EZAHO ny fiantsonao, fa aza atao malemy,
  - type: text
    content: Asandrato ny feonao ho tahaka ny an’ny anjomara,
  - type: text
    content: Ka ambarao amin’ny oloko ny fahadisoany
  - type: text
    content: Ary amin’ny taranak’i Jakoba ny fahotany;
  '10':
  - type: text
    content: Ary afoinao ho an’ny noana izay hanina tianao,
  - type: text
    content: Ka mahavoky ny ory hianao,–
  - type: text
    content: Dia hiposaka ao amin’ny maizina ny fahazavanao,
  - type: text
    content: Ary ny aizim-pitonao ho tahaka ny mitataovovonana;
  '11':
  - type: text
    content: Ary Jehovah hitari-dàlana anao mandrakariva
  - type: text
    content: Sady hahavoky ny fanahinao ao amin’ny tany karankaina aza
  - type: text
    content: Sy hampahatanjaka ny taolanao;
  - type: text
    content: Dia ho tahaka ny saha vonton-drano hianao
  - type: text
    content: Sy ho tahaka ny loharanao miboiboika izay tsy mety ritra.
  '12':
  - type: text
    content: Ary izay taranakao no hanangana ny efa rava ela,
  - type: text
    content: Ary ny naorina hatry ny fony fahagola no hamboarinao;
  - type: text
    content: Ary hianao dia hatao hoe Mpamboatra ny rava,
  - type: text
    content: 'Mpamelon-dàlana honenana '
  - type: text
    content: amin’ny tany.
  '13':
  - type: text
    content: Raha miaro ny tongotrao amin’ny Sabata hianao
  - type: text
    content: Ka tsy manao izay tianao amin’ny androko masina,
  - type: text
    content: Ary manao ny Sabata hoe Fahafinaretana,
  - type: text
    content: Ary ny nohamasinin’i Jehovah hoe mendrika hohajaina,
  - type: text
    content: Ka manome voninahitra azy
  - type: note
    content: 'Na: Azy.'
  - type: text
    content: Ary tsy mandeha amin’ny làlanao,
  - type: text
    content: Na manao izay tianao,
  - type: text
    content: Na miteniteny foana,–
  '14':
  - type: text
    content: Dia hiravoravo amin’i Jehovah hianao,
  - type: text
    content: Ary hasandratro ao amin’ny havoana amin’ny tany hianao,
  - type: text
    content: Sy hofahanako amin’ny lovan’i Jakoba rainao;
  - type: text
    content: Fa ny vavan’i Jehovah no efa niteny.
  '2':
  - type: text
    content: Nefa Izaho mbola tadiaviny ihany isan-andro isan-andro,
  - type: text
    content: Ary ny hahalala ny làlako no sitrany.
  - type: text
    content: Tahaka ny firenena efa nanao ny marina
  - type: text
    content: Ka tsy nahafoy ny fitsipik’Andriamaniny
  - type: text
    content: No fanontaniany amiko ny fitsipiky ny fahamarinana,
  - type: text
    content: Sy aniriany ny hihavian’
  - type: note
    content: 'Na: Sy fifaliany hanakaiky an’.'
  - type: text
    content: ' Andriamanitra.'
  '3':
  - type: text
    content: 'Nahoana izahay no mifady, '
  - type: text
    content: hoy izy,
  - type: text
    content: ' nefa tsy hitanao?'
  - type: text
    content: Ary nahoana izahay no mampahory ny tenanay, nefa tsy ahoanao?
  - type: text
    content: Indro fa amin’ny andro fifadianareo aza dia mbola ny tianareo
  - type: note
    content: Heb. hitanareo.
  - type: text
    content: ' ihany no ataonareo,'
  - type: text
    content: Ary ny mpiasa rehetra ao aminareo dia ampahorinareo.
  - type: note
    content: 'Na: Ary mbola arosonareo fatratra ihany ny asanareo.'
  '4':
  - type: text
    content: Indro, ny hiady sy ny hifanditra no anton’ny ifadianareo
  - type: text
    content: Ary ny hamely amin’ny totohondrin’ny faharatsiana;
  - type: text
    content: Izao fifadianareo izao
  - type: text
    content: Dia tsy andrenesana ny feonareo any amin’ny avo.
  '5':
  - type: text
    content: Moa fifadiana toy izany va no ankasitrahako?
  - type: text
    content: Dia andro hampahorian’ny olona tena?
  - type: text
    content: Ny hampiondrika ny lohany tahaka ny zozoro
  - type: text
    content: Sy ny hamelatra lamba fisaonana rarahan-davenona ho fandriany,–
  - type: text
    content: Moa izany va no ataonao hoe fifadiana
  - type: text
    content: Sy andro ankasitrahan’i Jehovah?
  '6':
  - type: text
    content: 'Tsy izao va no fifadiana izay ankasitrahako:'
  - type: text
    content: Dia ny hamaha ny famatoran’ny faharatsiana,
  - type: text
    content: Sy hanaboraka ny fehin’ny zioga,
  - type: text
    content: Sy handefa ny ampahorina ho afaka,
  - type: text
    content: Ary hanapatapaka ny zioga rehetra?
  '7':
  - type: text
    content: Moa tsy ny hizara ny mofonao ho an’ny noana va,
  - type: text
    content: Sy ny hampiantrano ny ory manjenjena,
  - type: text
    content: Ary mba hanafianao izay hitanao mitanjaka,
  - type: text
    content: Ka tsy hihirimbelona amin’ny namanao
  - type: note
    content: Heb. hiery ny nofonao.
  - type: text
    content: ' hianao?'
  '8':
  - type: text
    content: Fa raha izany, dia hiposaka tahaka ny fahazavan’ny maraina ny fahazavanao,
  - type: text
    content: Ary ho tonga faingana ny fahasitrananao;
  - type: text
    content: Ny fahamarinanao ho loha-làlanao,
  - type: text
    content: Ary ny voninahitr’i Jehovah ho vodi-làlanao.
  '9':
  - type: text
    content: Ary amin’izany dia hiantso hianao, ary Jehovah hamaly;
  - type: text
    content: 'Eny, hanandratra ny feonao hianao, ary Izy hanao hoe: Inty Aho.'
  - type: text
    content: Raha esorinao tsy ho eo aminao ny zioga
  - type: text
    content: Sy ny fanondroan’ny fanondro sy ny fitenenan-dratsy,
