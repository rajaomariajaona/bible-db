document_id: JDG.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny firenena navelan’i Jehovah ho entiny mizaha toetra ny Isiraely dia izay rehetra tsy mba nahita ny ady rehetra tany Kanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba ho fantatry ny taranaky ny Zanak’Isiraely izany amin’ny hampianarany azy hiady, indrindra fa izay tsy mbola nahalala izany akory teo aloha; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia ireo andriana dimy tamin’ny Filistina sy ny Kananita rehetra sy ny Sidoniana ary ny Hivita, izay nonina tany an-tendrombohitra Libanona, hatrao akaikin’i Bala-hermona ka hatramin’ny làlana mankany Hamata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary nentina hizaha toetra ny Isiraely ireo mba hahalalana na hihaino ny didin’i Jehovah, izay nasainy nandidian’i Mosesy ny razany, izy, na tsia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny Zanak’Isiraely nonina teo amin’ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary naka ny zanakavavin’ireny ho vadiny izy sady nanome ny zanani-vavy ho vadin’ny zanakalahin’ireny ka nanompo ny andriamaniny.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny ratsy nataon’ny Isiraely, sy ny nanirahan’Andriamanitra mpitsara hamonjy azy. Ny tantaran’i Otniela sy Ehoda ary Samgara.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ARY nanao izay ratsy eo imason’i Jehovah ny Zanak’Isiraely ka nanadino an’i Jehovah Andriamaniny ary nanompo ireo Bala sy Aseraha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaran’andriamani-tsi-izy, na ny sariny.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nirehitra tamin’ny Isiraely ny fahatezeran’i Jehovah, ka nivarotra azy ho eo an-tànan’i Kosan-risataima, mpanjakan’i Mesopotamia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arama-naharaima.
    marker-yv: yv-n
  - type: text
    text: ', Izy; dia nanompo an’i Kosan-risataima valo taona ny Zanak’Isiraely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nitaraina tamin’i Jehovah ny Zanak’Isiraely, ary Jehovah nanangana mpamonjy ho an’ny Zanak’Isiraely, izay namonjy azy, dia Otniela, zanakalahin’i Kenaza, zandrin’i Kaleba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny Fanahin’i Jehovah no tao aminy, dia nitsara ny Isiraely izy sady nivoaka hiady; ary Kosan-risataima, mpanjakan’i Mesopotamia, dia natolotr’i Jehovah teo an-tànany; ary nahery ny tànany ka namely an’i Kosan-risataima.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nandry ny tany efa-polo taona. Ary maty Otniela, zanak’i Kenaza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa nanao izay ratsy eo imason’i Jehovah indray ny Zanak’Isiraely, ary Jehovah nampahery an’i Eglona, mpanjakan’i Moaba, hiady amin’ny Isiraely, satria nanao izay ratsy eo imason’i Jehovah izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nampiangona ny taranak’i Amona sy Amaleka ho any aminy izy, ary nandeha izy ireo ka namely ny Isiraely, dia nahafaka ny tanàna be rofia.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: palma.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nanompo an’i Eglona, mpanjakan’i Moaba, valo ambin’ny folo taona ny Zanak’Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nitaraina tamin’i Jehovah izy, dia nanangana mpamonjy ho azy Jehovah, dia Ehoda, zanak’i Gera, avy amin’ny taranak’i Benjamina, lehilahy kavia; dia nampitondra azy fanomezana ho an’i Eglona, mpanjakan’i Moaba, ny Zanak’Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nanao sabatra roa lela Ehoda, hakiho ny halavany; dia nataony tao amin’ny fehin-kibony ambanin’ny akanjo fiadiany izany, teny am-balahany ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nitondra ny fanomezana ho an’i Eglona, mpanjakan’i Moaba, izy; ary lehilahy matavibe Eglona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa vitany ny nanolorana ny fanomezana, dia nampodiny ny olona izay nitondra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa nony tonga teo amin’ny fihadiam-bato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sarin-javatra voasokitra.
    marker-yv: yv-n
  - type: text
    text: ' izay any Gilgala kosa izy, dia niverina ka nanao hoe: Misy teny holazaiko mangingina aminao, ry mpanjaka ô. Dia hoy kosa izy: Mialà kely hianareo, rizareo. Ary izay rehetra nitsangana teo anoloany dia niala teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Ehoda nanatona azy, raha nipetraka irery tao an-tilikambony fihatsiatsiahana izy. Dia hoy Ehoda: Misy teny avy amin’Andriamanitra holazaiko aminao. Dia nitsangana niala tamin’ny seza fiandrianana Eglona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary naninjitra ny tànany ankavia Ehoda ka nandray ny sabatra teny am-balahany ankavanana, dia natsatony tamin’ny kibon’i Eglona izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary difotra mbamin’ny zarany, ka voasaron’ny taviny ny lelan-tsabatra, ka dia tsy nanatsoaka ny sabatra tamin’ny kibony izy; ary niboroaka teo amin’ny vodiny izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nivoaka teo amin’ny lavarangana Ehoda ka nandrindrina ny varavaran’ny trano ka nanidy azy tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa nivoaka izy, dia tonga teo kosa ny mpanompon’i Eglona; ary raha hitany fa, indro, voahidy ny varavaran’ny tilikambo, dia hoy izy: Miavela ato an-tilikambo fihatsiahana izy angaloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niandry mandra-pahaveri-heviny izy ireo, kanjo tsy namoha ny varavaran’ny trano izy; ka dia naka ny fanalahidy izy ireo ka namoha azy; ary, indro, maty niampatra tamin’ny rihana ny tompony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa Ehoda efa nandositra, raha mbola nitaredretra izy ireo, ka efa nihoatra ny fihadiam-bato,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sarin-javatra voasokitra.
    marker-yv: yv-n
  - type: text
    text: ' dia nandositra ho any Seirata.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary rehefa tonga teo izy, dia nitsoka ny anjomara tany amin’ny tany havoan’i Efraima, dia nidina nanaraka azy avy tany amin’ny tany havoana ny Zanak’Isiraely, ary izy no nitarika azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy izy taminy: Manaraha ahy, fa efa natolotr’i Jehovah eo an-tànanareo ny Moabita fahavalonareo. Dia nidina nanaraka azy ny olona, ka azony ny fitana any Jordana hankany Moaba, ary tsy nisy navelany hita na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia namono ny Moabita tokony ho iray alin-dahy tamin’izany andro izany izy, samy olona vaventy sady mahery izy rehetra; ary tsy nisy afaka nandositra na dia iray akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia resin’ny tànan’ny Isiraely ny Moabita tamin’izany andro izany. Ary nandry valo-polo taona ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary nanarakaraka azy Samgara, zanak’i Anata, izay namely ny Filistina enin-jato lahy tamin’ny fanindronan-omby; dia namonjy ny Isiraely koa izy.
