document_id: JDG.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary ny firenena navelan’i Jehovah ho entiny mizaha toetra ny Isiraely dia izay rehetra tsy mba nahita ny ady rehetra tany Kanana, '
  '10':
  - type: text
    content: Ary ny Fanahin’i Jehovah no tao aminy, dia nitsara ny Isiraely izy sady nivoaka hiady; ary Kosan-risataima, mpanjakan’i Mesopotamia, dia natolotr’i Jehovah teo an-tànany; ary nahery ny tànany ka namely an’i Kosan-risataima.
  '11':
  - type: text
    content: Dia nandry ny tany efa-polo taona. Ary maty Otniela, zanak’i Kenaza.
  '12':
  - type: text
    content: 'Fa nanao izay ratsy eo imason’i Jehovah indray ny Zanak’Isiraely, ary Jehovah nampahery an’i Eglona, mpanjakan’i Moaba, hiady amin’ny Isiraely, satria nanao izay ratsy eo imason’i Jehovah izy. '
  '13':
  - type: text
    content: Dia nampiangona ny taranak’i Amona sy Amaleka ho any aminy izy, ary nandeha izy ireo ka namely ny Isiraely, dia nahafaka ny tanàna be rofia.
  - type: note
    content: palma.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Dia nanompo an’i Eglona, mpanjakan’i Moaba, valo ambin’ny folo taona ny Zanak’Isiraely.
  '15':
  - type: text
    content: 'Ary nitaraina tamin’i Jehovah izy, dia nanangana mpamonjy ho azy Jehovah, dia Ehoda, zanak’i Gera, avy amin’ny taranak’i Benjamina, lehilahy kavia; dia nampitondra azy fanomezana ho an’i Eglona, mpanjakan’i Moaba, ny Zanak’Isiraely. '
  '16':
  - type: text
    content: 'Ary nanao sabatra roa lela Ehoda, hakiho ny halavany; dia nataony tao amin’ny fehin-kibony ambanin’ny akanjo fiadiany izany, teny am-balahany ankavanana. '
  '17':
  - type: text
    content: 'Dia nitondra ny fanomezana ho an’i Eglona, mpanjakan’i Moaba, izy; ary lehilahy matavibe Eglona. '
  '18':
  - type: text
    content: 'Ary rehefa vitany ny nanolorana ny fanomezana, dia nampodiny ny olona izay nitondra izany. '
  '19':
  - type: text
    content: Fa nony tonga teo amin’ny fihadiam-bato
  - type: note
    content: 'Na: sarin-javatra voasokitra.'
  - type: text
    content: ' izay any Gilgala kosa izy, dia niverina ka nanao hoe: Misy teny holazaiko mangingina aminao, ry mpanjaka ô. Dia hoy kosa izy: Mialà kely hianareo, rizareo. Ary izay rehetra nitsangana teo anoloany dia niala teo aminy. '
  '2':
  - type: text
    content: 'mba ho fantatry ny taranaky ny Zanak’Isiraely izany amin’ny hampianarany azy hiady, indrindra fa izay tsy mbola nahalala izany akory teo aloha; '
  '20':
  - type: text
    content: 'Ary Ehoda nanatona azy, raha nipetraka irery tao an-tilikambony fihatsiatsiahana izy. Dia hoy Ehoda: Misy teny avy amin’Andriamanitra holazaiko aminao. Dia nitsangana niala tamin’ny seza fiandrianana Eglona. '
  '21':
  - type: text
    content: 'Ary naninjitra ny tànany ankavia Ehoda ka nandray ny sabatra teny am-balahany ankavanana, dia natsatony tamin’ny kibon’i Eglona izany; '
  '22':
  - type: text
    content: 'ary difotra mbamin’ny zarany, ka voasaron’ny taviny ny lelan-tsabatra, ka dia tsy nanatsoaka ny sabatra tamin’ny kibony izy; ary niboroaka teo amin’ny vodiny izany. '
  '23':
  - type: text
    content: 'Dia nivoaka teo amin’ny lavarangana Ehoda ka nandrindrina ny varavaran’ny trano ka nanidy azy tao. '
  '24':
  - type: text
    content: 'Ary rehefa nivoaka izy, dia tonga teo kosa ny mpanompon’i Eglona; ary raha hitany fa, indro, voahidy ny varavaran’ny tilikambo, dia hoy izy: Miavela ato an-tilikambo fihatsiahana izy angaloha. '
  '25':
  - type: text
    content: 'Dia niandry mandra-pahaveri-heviny izy ireo, kanjo tsy namoha ny varavaran’ny trano izy; ka dia naka ny fanalahidy izy ireo ka namoha azy; ary, indro, maty niampatra tamin’ny rihana ny tompony '
  '26':
  - type: text
    content: Fa Ehoda efa nandositra, raha mbola nitaredretra izy ireo, ka efa nihoatra ny fihadiam-bato,
  - type: note
    content: 'Na: sarin-javatra voasokitra.'
  - type: text
    content: ' dia nandositra ho any Seirata.'
  '27':
  - type: text
    content: 'Ary rehefa tonga teo izy, dia nitsoka ny anjomara tany amin’ny tany havoan’i Efraima, dia nidina nanaraka azy avy tany amin’ny tany havoana ny Zanak’Isiraely, ary izy no nitarika azy. '
  '28':
  - type: text
    content: 'Ary hoy izy taminy: Manaraha ahy, fa efa natolotr’i Jehovah eo an-tànanareo ny Moabita fahavalonareo. Dia nidina nanaraka azy ny olona, ka azony ny fitana any Jordana hankany Moaba, ary tsy nisy navelany hita na dia iray akory aza. '
  '29':
  - type: text
    content: Dia namono ny Moabita tokony ho iray alin-dahy tamin’izany andro izany izy, samy olona vaventy sady mahery izy rehetra; ary tsy nisy afaka nandositra na dia iray akory aza.
  '3':
  - type: text
    content: 'dia ireo andriana dimy tamin’ny Filistina sy ny Kananita rehetra sy ny Sidoniana ary ny Hivita, izay nonina tany an-tendrombohitra Libanona, hatrao akaikin’i Bala-hermona ka hatramin’ny làlana mankany Hamata. '
  '30':
  - type: text
    content: Dia resin’ny tànan’ny Isiraely ny Moabita tamin’izany andro izany. Ary nandry valo-polo taona ny tany.
  '31':
  - type: text
    content: Ary nanarakaraka azy Samgara, zanak’i Anata, izay namely ny Filistina enin-jato lahy tamin’ny fanindronan-omby; dia namonjy ny Isiraely koa izy.
  '4':
  - type: text
    content: Ary nentina hizaha toetra ny Isiraely ireo mba hahalalana na hihaino ny didin’i Jehovah, izay nasainy nandidian’i Mosesy ny razany, izy, na tsia.
  '5':
  - type: text
    content: 'Ary ny Zanak’Isiraely nonina teo amin’ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita. '
  '6':
  - type: text
    content: Ary naka ny zanakavavin’ireny ho vadiny izy sady nanome ny zanani-vavy ho vadin’ny zanakalahin’ireny ka nanompo ny andriamaniny.
  - type: heading
    content: Ny ratsy nataon’ny Isiraely, sy ny nanirahan’Andriamanitra mpitsara hamonjy azy. Ny tantaran’i Otniela sy Ehoda ary Samgara.
  '7':
  - type: text
    content: ARY nanao izay ratsy eo imason’i Jehovah ny Zanak’Isiraely ka nanadino an’i Jehovah Andriamaniny ary nanompo ireo Bala sy Aseraha
  - type: note
    content: Anaran’andriamani-tsi-izy, na ny sariny.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Dia nirehitra tamin’ny Isiraely ny fahatezeran’i Jehovah, ka nivarotra azy ho eo an-tànan’i Kosan-risataima, mpanjakan’i Mesopotamia
  - type: note
    content: Arama-naharaima.
  - type: text
    content: ', Izy; dia nanompo an’i Kosan-risataima valo taona ny Zanak’Isiraely.'
  '9':
  - type: text
    content: 'Dia nitaraina tamin’i Jehovah ny Zanak’Isiraely, ary Jehovah nanangana mpamonjy ho an’ny Zanak’Isiraely, izay namonjy azy, dia Otniela, zanakalahin’i Kenaza, zandrin’i Kaleba. '
