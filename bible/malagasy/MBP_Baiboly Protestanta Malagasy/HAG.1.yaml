document_id: HAG.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Famporisihana ny olona hanao ny tempoly.
  - type: text
    content: 'TAMIN’ny andro voalohany tamin’ny volana fahenina tamin’ny taona faharoa nanjakan’i Dariosa mpanjaka no nahatongavan’ny tenin’i Jehovah nentin’i Hagay mpaminany tamin’i Zerobabela, zanak’i Sealtiela, governora tany Joda, sy tamin’i Josoa, zanak’i Jozadaka, mpisoronabe, nanao hoe: '
  '10':
  - type: text
    content: 'Ary noho izany dia ny aminareo no nitsaharan’ny lanitra tsy hampilatsaka ando sy nitsaharan’ny tany tsy hahavokatra. '
  '11':
  - type: text
    content: Ary niantso ny fahamainana Aho hamely ny tany sy ny tendrombohitra sy ny vary sy ny ranom-boaloboka sy ny diloilo sy izay vokatry ny tany ary ny olona sy ny biby fiompy mbamin’izay rehetra efa nisasaran’ny tànana.
  '12':
  - type: text
    content: Ary Zerobabela, zanak’i Sealtiela, sy Josoa, zanak’i Jozadaka, mpisoronabe, mbamin’ny sisa rehetra amin’ny vahoaka, dia nihaino ny feon’i Jehovah Andriamaniny sy ny tenin’i Hagay mpaminany, araka ny efa nanirahan’i Jehovah Andriamaniny azy, ary natahotra teo anatrehan’i Jehovah ny olona.
  '13':
  - type: text
    content: 'Ary nambaran’i Hagay, irak’i Jehovah, ny teny nampitondrain’i Jehovah ho amin’ny olona nanao hoe: Izaho no momba anareo, hoy Jehovah.'
  '14':
  - type: text
    content: 'Dia notairin’i Jehovah ny fanahin’i Zerobabela, zanak’i Sealtiela, governora any Joda, sy ny fanahin’i Josoa, zanak’i Jozadaka mpisoronabe, sy ny fanahin’ny sisa rehetra amin’ny vahoaka; ary dia avy izy ka nandrafitra ny tranon’i Jehovah, Tompon’ny maro, Andriamaniny, '
  '15':
  - type: text
    content: tamin’ny andro fahefatra amby roa-polo tamin’ny volana fahenina tamin’ny taona faharoa nanjakan’i Dariosa.
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Ity firenena ity nanao hoe: Tsy mbola tonga ny andro tokony hihaviana hanaovana ny tranon’i Jehovah.'
  '3':
  - type: text
    content: 'Dia tonga ny tenin’i Jehovah nentin’i Hagay mpaminany nanao hoe: '
  '4':
  - type: text
    content: 'Moa andro tokony hitoeran’ny tenanareo ao amin’ny tranonareo misy valin-drihana va izao, kanefa rava ity trano ity? '
  '5':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Tompon’ny maro: Hevero ny làlanareo. '
  '6':
  - type: text
    content: 'Efa namafy be hianareo, nefa kely no taomina: mihinana hianareo, nefa tsy voky; misotro hianareo, nefa tsy afa-po; mitafy hianareo, nefa tsy misy mafana; ary izay mahazo karama dia mahazo karama hatao an-kitapo loaka.'
  '7':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro: Hevero ny làlanareo. '
  '8':
  - type: text
    content: Miakara any an-tendrombohitra,
  - type: note
    content: 'Na: amin’ny tany havoana.'
  - type: text
    content: ' ka makà hazo, ary ataovy ny trano, dia hankasitrahako izany, sady hankalazaina Aho, hoy Jehovah.'
  '9':
  - type: text
    content: 'Nanampo be hianareo, kanjo indro, kely monja; ary nony notaominareo, dia notsofiko. Nahoana? hoy Jehovah, Tompon’ny maro. Satria efa rava ny tranoko, nefa hianareo samy mihazakazaka hanao ny tranonareo avy. '
