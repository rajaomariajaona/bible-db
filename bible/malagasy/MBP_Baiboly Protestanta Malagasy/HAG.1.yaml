document_id: HAG.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Famporisihana ny olona hanao ny tempoly.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'TAMIN’ny andro voalohany tamin’ny volana fahenina tamin’ny taona faharoa nanjakan’i Dariosa mpanjaka no nahatongavan’ny tenin’i Jehovah nentin’i Hagay mpaminany tamin’i Zerobabela, zanak’i Sealtiela, governora tany Joda, sy tamin’i Josoa, zanak’i Jozadaka, mpisoronabe, nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho izany dia ny aminareo no nitsaharan’ny lanitra tsy hampilatsaka ando sy nitsaharan’ny tany tsy hahavokatra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niantso ny fahamainana Aho hamely ny tany sy ny tendrombohitra sy ny vary sy ny ranom-boaloboka sy ny diloilo sy izay vokatry ny tany ary ny olona sy ny biby fiompy mbamin’izay rehetra efa nisasaran’ny tànana.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Zerobabela, zanak’i Sealtiela, sy Josoa, zanak’i Jozadaka, mpisoronabe, mbamin’ny sisa rehetra amin’ny vahoaka, dia nihaino ny feon’i Jehovah Andriamaniny sy ny tenin’i Hagay mpaminany, araka ny efa nanirahan’i Jehovah Andriamaniny azy, ary natahotra teo anatrehan’i Jehovah ny olona.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nambaran’i Hagay, irak’i Jehovah, ny teny nampitondrain’i Jehovah ho amin’ny olona nanao hoe: Izaho no momba anareo, hoy Jehovah.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notairin’i Jehovah ny fanahin’i Zerobabela, zanak’i Sealtiela, governora any Joda, sy ny fanahin’i Josoa, zanak’i Jozadaka mpisoronabe, sy ny fanahin’ny sisa rehetra amin’ny vahoaka; ary dia avy izy ka nandrafitra ny tranon’i Jehovah, Tompon’ny maro, Andriamaniny, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tamin’ny andro fahefatra amby roa-polo tamin’ny volana fahenina tamin’ny taona faharoa nanjakan’i Dariosa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro: Ity firenena ity nanao hoe: Tsy mbola tonga ny andro tokony hihaviana hanaovana ny tranon’i Jehovah.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga ny tenin’i Jehovah nentin’i Hagay mpaminany nanao hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa andro tokony hitoeran’ny tenanareo ao amin’ny tranonareo misy valin-drihana va izao, kanefa rava ity trano ity? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah, Tompon’ny maro: Hevero ny làlanareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa namafy be hianareo, nefa kely no taomina: mihinana hianareo, nefa tsy voky; misotro hianareo, nefa tsy afa-po; mitafy hianareo, nefa tsy misy mafana; ary izay mahazo karama dia mahazo karama hatao an-kitapo loaka.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro: Hevero ny làlanareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miakara any an-tendrombohitra,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: amin’ny tany havoana.
      marker-yv: yv-n
    - type: text
      text: ' ka makà hazo, ary ataovy ny trano, dia hankasitrahako izany, sady hankalazaina Aho, hoy Jehovah.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanampo be hianareo, kanjo indro, kely monja; ary nony notaominareo, dia notsofiko. Nahoana? hoy Jehovah, Tompon’ny maro. Satria efa rava ny tranoko, nefa hianareo samy mihazakazaka hanao ny tranonareo avy. '
