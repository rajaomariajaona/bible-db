    - type: usfm
      marker: ft
      children:
      - type: text
        text: salama.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny finoana, amin’ny fitiavana, amin’ny faharetana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny vehivavy anti-panahy koa anaro hitondra tena toy izay mendrika ny olona masina, tsy ho mpanendrikendrika, tsy ho andevozin’ny divay be, ho mpampianatra ny zavatra tsara, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mba hampianarany ny vehivavy tanora fanahy ho tia ny vadiny, ho tia ny zanany, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: hahonon-tena, ho madio toe-panahy, hiasa ao an-tranony, ho tsara fanahy, hanaiky ny vadiny, mba tsy hitenenana ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hanaovana blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' ny tenin’Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny lehilahy tanora fanahy koa anaro hahonon-tena; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka amin’ny zavatra rehetra dia asehoy ny tenanao ho fianarana ny asa tsara, amin’ny fampianaranao '
  - type: usfm
    marker: it
    children:
    - type: text
      text: maneho
  - type: text
    text: ' ny tsi-faharatsiana, ny fahamaotinana, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ny teny tsy misy kilema,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: salama.
    marker-yv: yv-n
  - type: text
    text: ' izay tsy azo tsinina, mba ho menatra izay manohitra, satria tsy hisy ratsy hitenenany anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny mpanompo koa dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anaro
  - type: text
    text: ' hanaiky ny tompony ka hanao izay sitrapony amin’ny zavatra rehetra, fa tsy hamalivaly, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: tsy hangala-tety, fa haneho izay toe-panahy mahatoky indrindra, mba hampahamendrika ny fampianaran’Andriamanitra, Mpamonjy antsika, amin’ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa efa miseho ny fahasoavan’Andriamanitra, izay famonjena ny olona rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'mampianatra antsika handa izay toe-panahy tsy araka an’Andriamanitra sy ny filan’izao tontolo izao ary ho velona amin’ny onony sy ny marina ary ny toe-panahy araka an’Andriamanitra amin’izao fiainana ankehitriny izao, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: miandry ny fanantenana mahafinaritra sy ny fisehoan’ny voninahitr’Andriamanitra lehibe sady Mpamonjy antsika, dia Jesosy Kristy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Andriamanitra lehibe sy Jesosy Kristy, Mpamonjy antsika.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay nanolotra ny tenany hamonjy antsika, mba hanavotany antsika ho afaka amin’ny ota rehetra, sy hanadiovany izay olona ho an’ny tenany, sady ho mazoto indrindra amin’ny asa tsara izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izany no lazao sy ananaro ary andrarao amin’ny fahefana rehetra. Aza avela hisy hanao tsinontsinona anao.
