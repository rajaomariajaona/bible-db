    children:
    - type: text
      text: '2'
  - type: text
    text: ny lehilahy anti-panahy anaro hahonon-tena, ho maotona, ho hendry, hatanjaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
