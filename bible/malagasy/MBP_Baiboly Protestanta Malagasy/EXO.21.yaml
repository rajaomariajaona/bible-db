document_id: EXO.21
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Lalàna nasain’Andriamanitra hotandreman’ny Zanak’Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY izao no lalàna izay hataonao eo anatrehany: –'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha mividy andevo Hebreo hianao, dia enin-taona no hanompoany, ary amin’ny taona iahafito dia hiala ho afaka fotsiny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha izy irery ihany no miditra, dia izy irery hany no hiala; fa raha manam-bady izy, dia hiala hiaraka aminy koa ny vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha manome vady azy ny tompony, ka miteraka zazalahy na zazavavy aminy izy, dia ho an’ny tompony ihany ny vadiny sy ny zanany, fa izy irery ihany no hiala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha milaza marimarina ilay andevo ka manao hoe: Tsy foiko ny tompoko sy ny vadiko ary ny zanako, ka tsy te-ho afaka aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: dia ho entin’ny tompony ho eo anatrehan’Andriamanitra izy, ary dia ho entiny ho eo amin’ny varavarana, na ho eo amin’ny tolam-baravarana, ka hotevehin’ny tompony amin’ny haolo ny sofiny; dia hanompo azy mandrakizay izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha misy mivaro-janakavavy ho vaditsindranon’olona, dia tsy mba ho tahaka ny fiàlan’ny andevolahy ho afaka no fiàlany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa raha tsy ankasitrahan’ny tompony, izay nikasa hanambady azy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ka tsy tiany hovadina izy.
    marker-yv: yv-n
  - type: text
    text: ' ravehivavy, dia havelany havotana ihany izy; tsy hahazo mivarotra azy ho any amin’ny firenena hafa izy, satria efa namitaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha mamofo azy ho vadin’ny zanani-lahy izy, dia araka ny fitondra zanakavavy no hataony aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha maka vehivavy hafa ho vadiny izy, dia tsy hahenany ny fihinany sy ny fitafiany ary ny fombam-panambadiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary raha tsy hataony aminy izany zavatra telo loha izany, dia hiala ho afaka fotsiny ravehivavy, fa tsy handoa vola.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izay mamely olona ka mahafaty azy dia hatao maty tokoa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa izay tsy manotrika, fa Andriamanitra no manolotra azy eo an-tànany, dia hanendry ho anareo fitoerana izay handosirany Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary raha misy olona avy sahisahy amin’ny namany hamono azy amin’ny fahafetsena, dia halainao izy, na dia eo amin’ny alitarako aza, mba hovonoina ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary izay mamely ny rainy na ny reniny dia hatao maty tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary izay mangalatra olona, na efa namidiny, na mbola hita eo an-tànany ihany ilay nangalariny, dia hatao maty tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary izay manozona ny rainy na ny reniny dia hatao maty tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha misy olona mifanditra, ka ny anankiray mamely ny namany amin’ny vato, na amin’ny totohondry, koa tsy maty izy, fa marary ambany tsihy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: raha afa-mitsangana indray ka mandehandeha mitehina eny ala-trano izy, dia ho afa-tsiny ilay namely azy; kanefa handoa ny hevitr’andro tsy nanaovany zavatra izy sady hitsabo azy mandra-pahasitrany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha misy olona mikapoka ny andevolahiny na ny andevovaviny amin’ny tsora-kazo ka mahafaty azy eo am-pikapohana, dia hovaliana tokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Kanefa raha mbola velona maharitra indray andro na indroa andro izy, dia tsy hovaliana ilay tompony; fa hareny ihany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha misy olona mifanditra ka mandratra vehivavy manan-anaka, ka teraka tsy tonga volana ny zanany, kanefa tsy misy maninona, dia hosazina tokoa ilay olona araka izay hanaovan’ny vadin-dravehivavy azy; ary handoa araka izay handidian’ny mpitsara izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha misy maninona kosa, dia hanome aina solon’ny aina hianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'maso solon’ny maso, nify solon’ny nify, tànana solon’ny tànana, tongotra solon’ny tongotra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: may solon’ny may, ratra solon’ny ratra, mivatra solon’ny mivatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha misy olona mamely ny mason’ny andevolahiny na ny mason’ny andevovaviny ka mahasimba azy, dia halefany ho afaka izy noho ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary raha ny nifin’ny andevolahy na ny andevovavy no afany, dia halefany ho afaka koa izy noho ny nifiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary raha misy omby manoto lehilahy na vehivavy ka mahafaty azy, dia hotoraham-bato tokoa ny omby, ary tsy hohanina ny henany; ary ny tompon’ilay omby dia ho afa-tsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa raha omby efa zatra nanoto hatramin’ny teo aloha iny, sady efa nambara tamin’ny tompony izany, nefa izy no tsy niaro azy, koa nahafaty lehilahy na vehivavy ny omby, dia hotoraham-bato ny omby, ary ny tompony koa hovonoina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha sazina izy, dia handoa vidin’aina araka izay sazy atao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha manoto zazalahy na zazavavy ny omby, dia araka izany lalàna izany koa no hanaovana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha manoto andevolahy na andevovavy izy, dia homena sekely volafotsy telo-polo ny tompon’andevo, ary ny omby hotoraham-bato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary raha misy olona manokatra lavaka, na raha misy olona mihady lavaka, ka tsy rakofany, ary misy omby na boriky latsaka ao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia hanonitra azy ny tompon-davaka, ka vola no haloany ho an’ny tompony; ary ny maty dia ho azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary raha misy ombin’olona mandratra ny ombin’ny namany ka mahafaty azy, dia hamidiny ny omby velona, ka hozarainy ny vola vidiny; ary ny maty koa hozarainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Kanefa raha fantatra fa omby zatra nanoto hatramin’ny teo aloha iny, koa tsy niaro azy ny tompony, dia hanonitra omby ho solon’ny omby tokoa izy; ary ny maty dia ho azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Raha misy olona mangalatra omby, na ondry, na osy, ka mamono azy, na mivarotra azy, dia hanonitra omby dimy ho solon’ny omby iray izy ary ondry na osy efatra ho solon’ny ondry na osy iray.
