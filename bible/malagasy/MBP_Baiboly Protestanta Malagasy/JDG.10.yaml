document_id: JDG.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tantaran’i Tola sy Jaïra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY taorian’i Abimeleka dia nitsangana hamonjy ny Isiraely Tola, zanak’i Dodo, lehilahy avy tamin’ny Isakara; ary mponina tao Samira any amin’ny tany havoan’i Efraima izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nitsara ny Isiraely telo amby roa-polo taona izy, dia maty ka nalevina tao Samira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nitsangana nandimby azy Jaïra Gileadita ka nitsara ny Isiraely roa amby roa-polo taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary nanana zanakalahy telo-polo izay nitaingina zana-boriky telo-polo izy, ary izy ireo nanana tanàna telo-polo any amin’ny tany Gileada; ary atao hoe Havota-jaïra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Havota-jaïra = Tanàna madinika an’i Jaïra.
    marker-yv: yv-n
  - type: text
    text: ' mandraka andro-any ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia maty Jaïra ka nalevina tany Kamona.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nihemoran’ny Isiraely indray, sy ny namalian’Andriamanitra azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ARY ny Zanak’Isiraely dia nanao izay ratsy eo imason’i Jehovah indray ka nanompo ireo Bala sy Astarta sy ny andriamanitr’i Syria sy ny andriamanitr’i Sidona sy ny andriamanitr’i Moaba sy ny andriamanitry ny taranak’i Amona ary ny andriamanitry ny Filistina, dia nahafoy an’i Jehovah izy ka tsy nanompo Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nirehitra tamin’ny Isiraely ny fahatezeran’i Jehovah, ka nivarotra azy ho eo an-tànan’ny Filistina sy ho eo an-tànan’ny taranak’i Amona Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nampahory sy nanorotoro ny Zanak’Isiraely ireo tamin’izany taona izany: valo ambin’ny folo taona '
  - type: usfm
    marker: it
    children:
    - type: text
      text: no nampahoriany
  - type: text
    text: ' ny Zanak’Isiraely rehetra, izay tany an-dafin’i Jordana, tany amin’ny tanin’ny Amorita any Gileada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nita an’i Jordana ny taranak’i Amona mba hiady koa amin’ny Joda sy ny Benjamina ary ny taranak’i Efraima; ka dia nahantra indrindra ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nitaraina tamin’i Jehovah ny Zanak’Isiraely ka nanao hoe: Efa nanota taminao izahay, satria efa nahafoy an’Andriamanitray ka nanompo ireo Bala.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Jehovah tamin’ny Zanak’Isiraely: Moa tsy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: efa namonjy anareo
  - type: text
    text: ' tamin’ny tànan’ny Egyptiana sy ny Amorita sy ny taranak’i Amona ary ny Filistina '
  - type: usfm
    marker: it
    children:
    - type: text
      text: va Aho
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nampahory anareo koa ny Sidoniana sy ny Amalekita ary ny Maonita, ka nitaraina tamiko hianareo, dia novonjeko tamin’ny tànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nefa hianareo nahafoy Ahy ka nanompo andriamani-kafa; koa izany kosa no tsy hamonjeko anareo intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mandehana, ka mitaraina amin’ ireo andriamanitra efa nofidinareo; aoka ireo no hamonjy anareo amin’ny andron’ny fahantranareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy ny Zanak’Isiraely tamin’i Jehovah: Efa nanota izahay; ataovy aminay izay rehetra sitrakao; kanefa mba vonjeo ihany izahay anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia nanary ireo andriamani-kafa tao aminy izy ka nanompo an’i Jehovah; dia tsy nahatsindry ny fanahiny intsony Jehovah noho ny fahantran’ny Isiraely.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tantaran’i Jefta, sy ny nandreseny ny Amonita.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'DIA nivory ny taranak’i Amona ka nitoby tany Gileada. Ary nivory kosa ny Zanak’Isiraely ka nitoby tany Mizpa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nifampiera ny olona, dia ireo andrianan’i Gileada, hoe: Iza no lehilahy handeha voalohany hiady amin’ny taranak’i Amona? dia ho lohany amin’ny mponina rehetra any Gileada izy.'
