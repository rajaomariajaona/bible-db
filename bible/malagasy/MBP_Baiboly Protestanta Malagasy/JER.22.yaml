document_id: JER.22,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra mafy noho ny faharatsian’ny mpanjakan’ny Joda.
  - type: text
    content: 'IZAO no lazain’i Jehovah: Midìna any amin’ny tranon’ny mpanjakan’ny Joda, ka lazao any izao teny izao hoe: '
  '10':
  - type: text
    content: Aza mitomany ny maty hianareo,
  - type: text
    content: Na misaona azy;
  - type: text
    content: Mitomania dia mitomania noho ilay efa lasan-ko babo;
  - type: text
    content: Fa tsy hiverina intsony izy,
  - type: text
    content: Na hahita ny tany nahaterahany.
  '11':
  - type: text
    content: 'Fa izao no lazain’i Jehovah ny amin’i Saloma, zanak’i Josia, mpanjakan’ny Joda, dia ilay nanjaka nandimby an’i Josia rainy, saingy efa niala tamin’ity tany ity:'
  - type: text
    content: Tsy hiverina atỳ intsony izy,
  '12':
  - type: text
    content: Fa ho faty any amin’ny tany izay nitondrana azy ho babo
  - type: text
    content: Ka tsy hahita ity tany ity intsony.
  '13':
  - type: text
    content: Lozan’izay manorina ny tranony amin’ny tsy rariny
  - type: text
    content: Sy ny ati-tranony ambony amin’ny fitaka
  - type: text
    content: Ka mampiasa maina ny namany,
  - type: text
    content: Fa tsy mandoa ny karamany,
  '14':
  - type: text
    content: 'Sady manao hoe: Hanao trano lehibe ho ahy aho'
  - type: text
    content: Sy ati-trano ambony malalaka,
  - type: text
    content: Ary holoahany hisy varavarankely
  - type: text
    content: Sady hasiany valin-drihana sedera
  - type: text
    content: Sy hohosorana loko mena.
  '15':
  - type: text
    content: Moa dia ho mpanjaka hianao, saingy ataonao be sedera noho ny an’ny sasany ny tranonao?
  - type: text
    content: Tsy efa nihinana sy nisotro va rainao
  - type: text
    content: Sady nanao fitsarana sy fahamarinana?
  - type: text
    content: Tamin’izany dia nambinina izy.
  '16':
  - type: text
    content: Nitsara ny tenin’ny ory sy ny malahelo izy;
  - type: text
    content: Tamin’izany dia nambinina izy.
  - type: text
    content: Tsy izany va no fahalalana Ahy? hoy Jehovah.
  '17':
  - type: text
    content: Nefa tsy misy alehan’ny masonao sy ny eritreritrao afa-tsy ny filan-karena ihany
  - type: text
    content: Sy ny fandatsahana ra marina
  - type: text
    content: Ary ny fampahoriana sy ny fanaovana an-keriny.
  '18':
  - type: text
    content: 'Ary noho izany dia izao no lazain’i Jehovah ny amin’i Joiakima, zanak’i Josia, mpanjakan’ny Joda:'
  - type: text
    content: 'Ny olona tsy hisaona azy hoe:'
  - type: text
    content: 'Indrisy, tompokolahy! na: Indrisy, tompokovavy!'
  - type: text
    content: 'Ny olona tsy hitomany azy hoe:'
  - type: text
    content: 'Indrisy, tompoko! na: Indrisy ny voninahiny!'
  '19':
  - type: text
    content: Halevina toy ny fandevina boriky izy,
  - type: text
    content: Ka hotaritarihina sy hariana any ivelan’ny vavahadin’i Jerosalema.
  '2':
  - type: text
    content: 'Henoy ny tenin’i Jehovah, ry mpanjakan’ny Joda, izay mipetraka amin’ny seza fiandrianan’i Davida, dia hianao sy ny mpanomponao ary ny vahoakanao izay miditra amin’ireto vavahady ireto: '
  '20':
  - type: text
    content: Miakara any Libanona, ka mitaraina;
  - type: text
    content: Dia asandrato any Basana ny feonao,
  - type: text
    content: Ary mitaraina any Abarima;
  - type: text
    content: Fa ringana avokoa ireo tia anao.
  '21':
  - type: text
    content: Efa niteny taminao Aho, fony hianao mbola nipetraka tsy nanana ahiahy;
  - type: text
    content: 'Nefa hoy hianao: Izaho tsy hihaino.'
  - type: text
    content: Fanaonao hatry ny fony hianao mbola tanora ny tsy mihaino ny teniko.
  '22':
  - type: text
    content: Ny mpitondra
  - type: note
    content: Heb. mpiandry ondry.
  - type: text
    content: ' anao rehetra hopaohin’ny rivotra,'
  - type: text
    content: Ary ireo tia anao ho lasan-ko babo,
  - type: text
    content: Eny, ho menatra sy hangaihay tokoa hianao noho ny haratsianao rehetra.
  '23':
  - type: text
    content: Ry ilay mponina any Libanona,
  - type: text
    content: Izay manao ny akaninao eny amin’ny sedera,
  - type: text
    content: Indrisy ny fisentoanao,
  - type: note
    content: 'Na: fahantranao.'
  - type: text
    content: ' raha iharan’ny faharariana hianao,'
  - type: text
    content: Toy ny fanaintainan’ny vehivavy raha miteraka!
  '24':
  - type: text
    content: Raha velona koa Aho, hoy Jehovah,
  - type: text
    content: Na dia ho peratra fanombohan-kase amin’ny tànako ankavanana aza hianao,
  - type: text
    content: Ry Jekonia, zanak’i Joiakima, mpanjakan’ny Joda,
  - type: text
    content: Dia hotsoahako hiala eo hianao,
  '25':
  - type: text
    content: Ka hatolotro eo an-tànan’izay mitady ny ainao
  - type: text
    content: Sy eo an-tànan’izay atahoranao,
  - type: text
    content: Dia eo an-tànan’i Nebokadnezara, mpanjakan’i Babylona,
  - type: text
    content: Sy eo amin’ny tànan’ny Kaldeana.
  '26':
  - type: text
    content: Ary hianao sy ny reninao niteraka anao dia hariako
  - type: text
    content: Any an-tany hafa izay tsy nahaterahanareo,
  - type: text
    content: Ka any no hahafatesanareo.
  '27':
  - type: text
    content: Fa ny tany iriny hiverenana
  - type: text
    content: Dia tsy hiverenany.
  '28':
  - type: text
    content: Moa ity lehilahy Jekonia ity dia vilany vingavingaina sy efa hotorotoroina
  - type: text
    content: Ary fanaka tsy mahafinaritra va?
  - type: text
    content: Koa nahoana no nariana izy sy ny taranany
  - type: text
    content: Ka natsipy any amin’ny tany tsy fantany?
  '29':
  - type: text
    content: Ry tany! ry tany! ry tany!
  - type: text
    content: Henoy ny tenin’i Jehovah.
  '3':
  - type: text
    content: 'Izao no lazain’i Jehovah: Manaova fitsarana sy fahamarinana hianareo, ka afaho amin’ny tànan’ny mpampahory ny olona voaroba; ary aza mampahory na mampidi-doza amin’ny vahiny sy ny kamboty ary ny mpitondratena, ary aza mandatsaka ra marina amin’ity fitoerana ity. '
  '30':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Soratinareo ho tsy manam-para ity lehilahy ity,
  - type: text
    content: Dia lehilahy tsy hambinina amin’ny androny;
  - type: text
    content: Fa tsy hisy amin’ny taranany izay hambinina
  - type: text
    content: Hipetraka eo amin’ny seza fiandrianan’i Davida,
  - type: text
    content: Na hanapaka ao amin’ny Joda intsony.
  '4':
  - type: text
    content: 'Fa raha mankatò izany teny izany tokoa hianareo, dia hisy mpanjaka mipetraka eo amin’ny seza fiandrianan’i Davida hiditra amin’ity vavahady ity mitaingin-kalesy sy soavaly, dia izy sy ny mpanompony ary ny vahoakany. '
  '5':
  - type: text
    content: Fa raha tsy hihaino izany teny izany kosa hianareo, dia ny tenako no ianianako, hoy Jehovah, fa ho lao tokoa ity trano ity.
  '6':
  - type: text
    content: 'Fa izao no lazain’i Jehvoah ny amin’ny mpanjakan’ny Joda sy ny mpianakaviny:'
  - type: text
    content: Tahaka an’i Gileada sy ny tampon’i Libanona amiko hianao,
  - type: text
    content: Nefa hataoko tonga efitra sy tanàna tsy onenana.
  '7':
  - type: text
    content: Ary hanendry
  - type: note
    content: Heb. hanamasina.
  - type: text
    content: ' mpandrava hamely anao Aho,'
  - type: text
    content: Izay samy hitondra ny fiadiany avy;
  - type: text
    content: Dia hokapain’ireo ny sederanao voafantina
  - type: text
    content: Ka hariany ao anaty afo.
  '8':
  - type: text
    content: Ary firenena maro no handalo ity tanàna ity,
  - type: text
    content: 'Ka samy hanao amin’ny namany avy hoe:'
  - type: text
    content: Nahoana Jehovah no dia nanao izao tamin’ity tanàna lehibe ity?
  '9':
  - type: text
    content: 'Dia hovaliana hoe:'
  - type: text
    content: Noho ny nahafoizany ny faneken’i Jehovah Andriamaniny
  - type: text
    content: Sy ny nivavahany tamin’andriamani-kafa sy ny nanompoany ireny.
