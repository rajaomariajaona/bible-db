document_id: JER.22
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Anatra mafy noho ny faharatsian’ny mpanjakan’ny Joda.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no lazain’i Jehovah: Midìna any amin’ny tranon’ny mpanjakan’ny Joda, ka lazao any izao teny izao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Henoy ny tenin’i Jehovah, ry mpanjakan’ny Joda, izay mipetraka amin’ny seza fiandrianan’i Davida, dia hianao sy ny mpanomponao ary ny vahoakanao izay miditra amin’ireto vavahady ireto: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’i Jehovah: Manaova fitsarana sy fahamarinana hianareo, ka afaho amin’ny tànan’ny mpampahory ny olona voaroba; ary aza mampahory na mampidi-doza amin’ny vahiny sy ny kamboty ary ny mpitondratena, ary aza mandatsaka ra marina amin’ity fitoerana ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha mankatò izany teny izany tokoa hianareo, dia hisy mpanjaka mipetraka eo amin’ny seza fiandrianan’i Davida hiditra amin’ity vavahady ity mitaingin-kalesy sy soavaly, dia izy sy ny mpanompony ary ny vahoakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha tsy hihaino izany teny izany kosa hianareo, dia ny tenako no ianianako, hoy Jehovah, fa ho lao tokoa ity trano ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao no lazain’i Jehvoah ny amin’ny mpanjakan’ny Joda sy ny mpianakaviny:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka an’i Gileada sy ny tampon’i Libanona amiko hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa hataoko tonga efitra sy tanàna tsy onenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary hanendry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hanamasina.
    marker-yv: yv-n
  - type: text
    text: ' mpandrava hamely anao Aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay samy hitondra ny fiadiany avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hokapain’ireo ny sederanao voafantina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hariany ao anaty afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary firenena maro no handalo ity tanàna ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka samy hanao amin’ny namany avy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana Jehovah no dia nanao izao tamin’ity tanàna lehibe ity?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hovaliana hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny nahafoizany ny faneken’i Jehovah Andriamaniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny nivavahany tamin’andriamani-kafa sy ny nanompoany ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza mitomany ny maty hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na misaona azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitomania dia mitomania noho ilay efa lasan-ko babo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hiverina intsony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hahita ny tany nahaterahany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao no lazain’i Jehovah ny amin’i Saloma, zanak’i Josia, mpanjakan’ny Joda, dia ilay nanjaka nandimby an’i Josia rainy, saingy efa niala tamin’ity tany ity:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiverina atỳ intsony izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa ho faty any amin’ny tany izay nitondrana azy ho babo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hahita ity tany ity intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lozan’izay manorina ny tranony amin’ny tsy rariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny ati-tranony ambony amin’ny fitaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mampiasa maina ny namany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy mandoa ny karamany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sady manao hoe: Hanao trano lehibe ho ahy aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ati-trano ambony malalaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary holoahany hisy varavarankely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hasiany valin-drihana sedera
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hohosorana loko mena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Moa dia ho mpanjaka hianao, saingy ataonao be sedera noho ny an’ny sasany ny tranonao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy efa nihinana sy nisotro va rainao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nanao fitsarana sy fahamarinana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’izany dia nambinina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nitsara ny tenin’ny ory sy ny malahelo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’izany dia nambinina izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy izany va no fahalalana Ahy? hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nefa tsy misy alehan’ny masonao sy ny eritreritrao afa-tsy ny filan-karena ihany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fandatsahana ra marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fampahoriana sy ny fanaovana an-keriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary noho izany dia izao no lazain’i Jehovah ny amin’i Joiakima, zanak’i Josia, mpanjakan’ny Joda:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny olona tsy hisaona azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indrisy, tompokolahy! na: Indrisy, tompokovavy!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ny olona tsy hitomany azy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indrisy, tompoko! na: Indrisy ny voninahiny!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Halevina toy ny fandevina boriky izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hotaritarihina sy hariana any ivelan’ny vavahadin’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Miakara any Libanona, ka mitaraina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia asandrato any Basana ny feonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitaraina any Abarima;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ringana avokoa ireo tia anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Efa niteny taminao Aho, fony hianao mbola nipetraka tsy nanana ahiahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa hoy hianao: Izaho tsy hihaino.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fanaonao hatry ny fony hianao mbola tanora ny tsy mihaino ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny mpitondra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpiandry ondry.
    marker-yv: yv-n
  - type: text
    text: ' anao rehetra hopaohin’ny rivotra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ireo tia anao ho lasan-ko babo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho menatra sy hangaihay tokoa hianao noho ny haratsianao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ry ilay mponina any Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manao ny akaninao eny amin’ny sedera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy ny fisentoanao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahantranao.
    marker-yv: yv-n
  - type: text
    text: ' raha iharan’ny faharariana hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny fanaintainan’ny vehivavy raha miteraka!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha velona koa Aho, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia ho peratra fanombohan-kase amin’ny tànako ankavanana aza hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Jekonia, zanak’i Joiakima, mpanjakan’ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hotsoahako hiala eo hianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ka hatolotro eo an-tànan’izay mitady ny ainao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy eo an-tànan’izay atahoranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eo an-tànan’i Nebokadnezara, mpanjakan’i Babylona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy eo amin’ny tànan’ny Kaldeana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary hianao sy ny reninao niteraka anao dia hariako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any an-tany hafa izay tsy nahaterahanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka any no hahafatesanareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa ny tany iriny hiverenana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hiverenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Moa ity lehilahy Jekonia ity dia vilany vingavingaina sy efa hotorotoroina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fanaka tsy mahafinaritra va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa nahoana no nariana izy sy ny taranany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka natsipy any amin’ny tany tsy fantany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ry tany! ry tany! ry tany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henoy ny tenin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soratinareo ho tsy manam-para ity lehilahy ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia lehilahy tsy hambinina amin’ny androny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hisy amin’ny taranany izay hambinina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hipetraka eo amin’ny seza fiandrianan’i Davida,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hanapaka ao amin’ny Joda intsony.
