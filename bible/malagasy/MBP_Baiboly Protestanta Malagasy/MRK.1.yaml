document_id: MRK.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’i Jaona Mpanao-batisa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 3.1-12; Lio. 3.1-18.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY niandohan’ny filazantsaran’i Jesosy Kristy, Zanak’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Araka izay voasoratra ao amin’Isaia mpaminany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[ao amin’ny mpaminany].'
    marker-yv: yv-n
  - type: text
    text: ' hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Indro, Izaho maniraka ny irako hialoha Anao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hamboatra ny làlanao’’ (Mal. 3.1);
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ',,Injany! misy feon’ny miantso mafy any an-efitra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amboary ny làlan’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy mahitsy ny làlan-kalehany’’ (Isa. 40.3),
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia niseho Jaona, izay nanao batisa tany an-efitra ka nitory ny batisan’ny fibebahana ho famelan-keloka. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nandeha nanatona azy ny tany Jodia rehetra sy ny mponina rehetra tany Jerosalema, ka nataony batisa tao amin’ny ony Jordana ireny, rehefa niaiky ny fahotany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Jaona nitafy lamba volon-drameva; ary fehin-kibo hoditra no tamin’ny valahany, ary ny fihinany dia valala sy tantely remby. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nitory izy ka nanao hoe: Avy ao aoriako Ilay mahery noho izaho, ka tsy mendrika hiondrika hamaha ny fehin-kapany aza aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izaho efa nanao batisa anareo tamin’ny rano, fa Izy kosa hanao batisa anareo amin’ny Fanahy Masina.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanaovana batisa an’i Jesosy, sy ny nakan’i Satana fanahy Azy, ary ny nankanesany tany Galilia.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 3.13–4.17; Lio. 3.21,22; 4.1-15.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ARY tamin’izany andro izany dia tonga avy tany Nazareta any Galilia Jesosy ka nataon’i Jaona batisa tao Jordana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha vao niakatra avy teo amin’ny rano Izy, dia hitany ny lanitra nisokatra, ary ny Fanahy nidina tahaka ny voromailala ka nankeo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy feo avy tany an-danitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'nanao hoe:'
  - type: text
    text: ' Hianao no Zanako malalako, Hianao no sitrako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary niaraka tamin’izay dia nampandehanin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: noroahin’.
    marker-yv: yv-n
  - type: text
    text: ' ny Fanahy ho any an-efitra Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary tany an-efitra efa-polo andro Izy ka nalain’i Satana fanahy; ary teo amin’ny bibi-dia Izy, ary ny anjely nanompo Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa voasambotra Jaona, dia nankany Galilia Jesosy nitory ny filazantsaran’Andriamanitra '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka nanao hoe: Efa tonga ny fotoana, ka efa akaiky ny fanjakan’Andriamanitra; mibebaha hianareo ka minoa ny filazantsara.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niantsoan’i Jesosy an’i Petera sy Andrea ary Jakoba sy Jaona.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 4.18-22; Lio. 5.1-11?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ARY nony nandalo teny amoron’ny Ranomasin’i Galilia Izy, dia nahita an’i Simona sy Andrea, rahalahin’i Simona, nanarato teo amin’ny ranomasina; fa mpanarato izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy Jesosy taminy: Andeha hanaraka Ahy, fa hataoko mpanarato olona hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia nandao ny harato niaraka tamin’izay izy ka nanaraka Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa nandroso kelikely Izy, dia nahita an’i Jakoba, zanak’i Zebedio, sy Jaona rahalahiny, izay teo an-tsambokely koa namboatra ny haratony. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia niantso azy niaraka tamin’izay Izy; ary izy mirahalahy nandao an’i Zebedio rainy teo an-tsambokely mbamin’ny olona nokaramainy, ka dia nanaraka an’i Jesosy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampianaran’i Jesosy tao Kapernaomy, sy ny nahasitranany ny demoniaka anankiray.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio. 4.31-37.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ARY nankany Kapernaomy izy ireo; ary nony tamin’ny Sabata, dia niditra tao amin’ny synagoga niaraka tamin’izay Jesosy ka nampianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia talanjona ny olona tamin’ny fampianarany, satria nampianatra azy tahaka izay manana fahefana Izy, fa tsy mba tahaka ny mpanora-dalàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary niaraka tamin’izay dia nisy olona teo amin’ny synagogany, izay azon’ny fanahy maloto; ary niantso mafy ralehilahy '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ka nanao hoe: Moa mifaninona akory izahay sy Hianao, ry Jesosy avy any Nazareta? Avy handringana anay va Hianao? Fantatro fa Ilay Masin’Andriamanitra Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Jesosy niteny mafy azy ka nanao hoe: Mangìna hianao ka mivoaha aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny fanahy maloto nampifanintontsintona ny tenan’ilay marary, dia niantso tamin’ny feo mahery ka niala taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia gaga ny olona rehetra ka nifanontany hoe: Manao ahoana re izao zavatra izao? Fampianarana vaovao misy fahefana izao! fa ny fanahy maloto aza no didiany, ka dia manaiky Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary ny lazany dia niely niaraka tamin’izay teny tontolo eny tamin’ny tany rehetra eran’i Galilia.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny rafozambavin’i Petera mbamin’ny olona maro koa.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 8.14-17; Lio. 4.38-41.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ARY niaraka tamin’izay, raha nivoaka avy tao amin’ny synagoga izy, dia niditra tao an-tranon’i Simona sy Andrea Jesosy ary Jakoba sy Jaona. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny rafozambavin’i Simona nandry teo nanavin’ny tazo; ary niaraka tamin’izay dia nilaza azy taminy izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia nanatona Jesosy ka nandray ny tànany ary nanarina azy; dia afaka ny tazony, ka dia nanompo azy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nony hariva ny andro, ka nilentika ny masoandro, dia nentina tany aminy ny marary rehetra sy ny demoniaka. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny tao an-tanàna rehetra dia tafangona teo anoloan’ny varavarana avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nahasitrana olona maro izay nararin’ny aretina samy hafa Izy sady namoaka demonia maro; ary tsy navelany hiteny ny demonia, satria nahafantatra Azy ireny.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nankanesan’i Jesosy tany an-tany foana, sy ny nandehanany nitety vohitra tany Galilia.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio. 4.42-44.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ARY nifoha maraina alina koa Izy, dia nivoaka nankany an-tany foana ka nivavaka tany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary dia nandeha nitady Azy Simona sy ny namany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nahita Azy izy, dia nanao taminy hoe: Ny olona rehetra mitady Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa hoy kosa Izy taminy: Andeha isika hiala hankany amin’ny tanàna akaiky, mba hitoriako teny any koa; fa izay no nahatongavako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Dia nandeha Izy ka nitori-teny tao amin’ny synagogan’ny olona eran’i Galilia sady namoaka ny demonia.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ilay boka.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 8.1-4; Lio. 5.12-16.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'ARY nisy boka nanatona Azy ka nitaraina taminy sady nandohalika teo anatrehany ka nanao taminy hoe: Raha mety Hianao, dia mahay manadio ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary Jesosy dia onena azy ka naninjitra ny tànany, dia nanendry azy ka nanao taminy hoe: Mety Aho; madiova hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary niaraka tamin’izay dia niala taminy ny habokany, ka dia nadio izy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary namepetra azy mafy Jesosy, dia nampandeha azy niaraka tamin’izay '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'ka nanao taminy hoe: Tandremo tsara mba tsy hisy holazainao na amin’iza na amin’iza; fa mandehana, misehoa amin’ny mpisorona, ka manatera ny fanadiovana anao, izay nandidian’i Mosesy, ho vavolombelona amin’ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Nefa lasa ralehilahy ka nilazalaza sy nampiely izany zavatra izany, ka dia tsy nahazo niditra miharihary tao an-tanàna intsony Jesosy; fa nitoetra tany ivelany tamin’ny tany foana Izy, dia nanatona Azy ny olona avy eny tontolo eny.
