document_id: MRK.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’i Jaona Mpanao-batisa.
  - type: heading
    content: Mat. 3.1-12; Lio. 3.1-18.
  - type: text
    content: NY niandohan’ny filazantsaran’i Jesosy Kristy, Zanak’Andriamanitra.
  '10':
  - type: text
    content: 'Ary raha vao niakatra avy teo amin’ny rano Izy, dia hitany ny lanitra nisokatra, ary ny Fanahy nidina tahaka ny voromailala ka nankeo amboniny. '
  '11':
  - type: text
    content: 'Ary nisy feo avy tany an-danitra '
  - type: text
    content: 'nanao hoe:'
  - type: text
    content: ' Hianao no Zanako malalako, Hianao no sitrako.'
  '12':
  - type: text
    content: Ary niaraka tamin’izay dia nampandehanin’
  - type: note
    content: Gr. noroahin’.
  - type: text
    content: ' ny Fanahy ho any an-efitra Izy. '
  '13':
  - type: text
    content: Ary tany an-efitra efa-polo andro Izy ka nalain’i Satana fanahy; ary teo amin’ny bibi-dia Izy, ary ny anjely nanompo Azy.
  '14':
  - type: text
    content: 'Ary rehefa voasambotra Jaona, dia nankany Galilia Jesosy nitory ny filazantsaran’Andriamanitra '
  '15':
  - type: text
    content: 'ka nanao hoe: Efa tonga ny fotoana, ka efa akaiky ny fanjakan’Andriamanitra; mibebaha hianareo ka minoa ny filazantsara.'
  - type: heading
    content: Ny niantsoan’i Jesosy an’i Petera sy Andrea ary Jakoba sy Jaona.
  - type: heading
    content: Mat. 4.18-22; Lio. 5.1-11?
  '16':
  - type: text
    content: 'ARY nony nandalo teny amoron’ny Ranomasin’i Galilia Izy, dia nahita an’i Simona sy Andrea, rahalahin’i Simona, nanarato teo amin’ny ranomasina; fa mpanarato izy. '
  '17':
  - type: text
    content: 'Ary hoy Jesosy taminy: Andeha hanaraka Ahy, fa hataoko mpanarato olona hianareo. '
  '18':
  - type: text
    content: Dia nandao ny harato niaraka tamin’izay izy ka nanaraka Azy.
  '19':
  - type: text
    content: 'Ary rehefa nandroso kelikely Izy, dia nahita an’i Jakoba, zanak’i Zebedio, sy Jaona rahalahiny, izay teo an-tsambokely koa namboatra ny haratony. '
  '2':
  - type: text
    content: Araka izay voasoratra ao amin’Isaia mpaminany
  - type: note
    content: 'Na: [ao amin’ny mpaminany].'
  - type: text
    content: ' hoe:'
  - type: text
    content: ',,Indro, Izaho maniraka ny irako hialoha Anao,'
  - type: text
    content: Izay hamboatra ny làlanao’’ (Mal. 3.1);
  '20':
  - type: text
    content: Dia niantso azy niaraka tamin’izay Izy; ary izy mirahalahy nandao an’i Zebedio rainy teo an-tsambokely mbamin’ny olona nokaramainy, ka dia nanaraka an’i Jesosy.
  - type: heading
    content: Ny nampianaran’i Jesosy tao Kapernaomy, sy ny nahasitranany ny demoniaka anankiray.
  - type: heading
    content: Lio. 4.31-37.
  '21':
  - type: text
    content: 'ARY nankany Kapernaomy izy ireo; ary nony tamin’ny Sabata, dia niditra tao amin’ny synagoga niaraka tamin’izay Jesosy ka nampianatra. '
  '22':
  - type: text
    content: Dia talanjona ny olona tamin’ny fampianarany, satria nampianatra azy tahaka izay manana fahefana Izy, fa tsy mba tahaka ny mpanora-dalàna.
  '23':
  - type: text
    content: 'Ary niaraka tamin’izay dia nisy olona teo amin’ny synagogany, izay azon’ny fanahy maloto; ary niantso mafy ralehilahy '
  '24':
  - type: text
    content: 'ka nanao hoe: Moa mifaninona akory izahay sy Hianao, ry Jesosy avy any Nazareta? Avy handringana anay va Hianao? Fantatro fa Ilay Masin’Andriamanitra Hianao. '
  '25':
  - type: text
    content: 'Ary Jesosy niteny mafy azy ka nanao hoe: Mangìna hianao ka mivoaha aminy. '
  '26':
  - type: text
    content: Ary ny fanahy maloto nampifanintontsintona ny tenan’ilay marary, dia niantso tamin’ny feo mahery ka niala taminy.
  '27':
  - type: text
    content: 'Dia gaga ny olona rehetra ka nifanontany hoe: Manao ahoana re izao zavatra izao? Fampianarana vaovao misy fahefana izao! fa ny fanahy maloto aza no didiany, ka dia manaiky Azy. '
  '28':
  - type: text
    content: Ary ny lazany dia niely niaraka tamin’izay teny tontolo eny tamin’ny tany rehetra eran’i Galilia.
  - type: heading
    content: Ny nahasitranan’i Jesosy ny rafozambavin’i Petera mbamin’ny olona maro koa.
  - type: heading
    content: Mat. 8.14-17; Lio. 4.38-41.
  '29':
  - type: text
    content: 'ARY niaraka tamin’izay, raha nivoaka avy tao amin’ny synagoga izy, dia niditra tao an-tranon’i Simona sy Andrea Jesosy ary Jakoba sy Jaona. '
  '3':
  - type: text
    content: ',,Injany! misy feon’ny miantso mafy any an-efitra hoe:'
  - type: text
    content: Amboary ny làlan’i Jehovah.
  - type: text
    content: Ataovy mahitsy ny làlan-kalehany’’ (Isa. 40.3),
  '30':
  - type: text
    content: 'Ary ny rafozambavin’i Simona nandry teo nanavin’ny tazo; ary niaraka tamin’izay dia nilaza azy taminy izy ireo. '
  '31':
  - type: text
    content: Dia nanatona Jesosy ka nandray ny tànany ary nanarina azy; dia afaka ny tazony, ka dia nanompo azy izy.
  '32':
  - type: text
    content: 'Ary nony hariva ny andro, ka nilentika ny masoandro, dia nentina tany aminy ny marary rehetra sy ny demoniaka. '
  '33':
  - type: text
    content: 'Ary ny tao an-tanàna rehetra dia tafangona teo anoloan’ny varavarana avokoa. '
  '34':
  - type: text
    content: Ary nahasitrana olona maro izay nararin’ny aretina samy hafa Izy sady namoaka demonia maro; ary tsy navelany hiteny ny demonia, satria nahafantatra Azy ireny.
  - type: heading
    content: Ny nankanesan’i Jesosy tany an-tany foana, sy ny nandehanany nitety vohitra tany Galilia.
  - type: heading
    content: Lio. 4.42-44.
  '35':
  - type: text
    content: 'ARY nifoha maraina alina koa Izy, dia nivoaka nankany an-tany foana ka nivavaka tany. '
  '36':
  - type: text
    content: 'Ary dia nandeha nitady Azy Simona sy ny namany. '
  '37':
  - type: text
    content: 'Ary nahita Azy izy, dia nanao taminy hoe: Ny olona rehetra mitady Anao. '
  '38':
  - type: text
    content: 'Fa hoy kosa Izy taminy: Andeha isika hiala hankany amin’ny tanàna akaiky, mba hitoriako teny any koa; fa izay no nahatongavako.'
  '39':
  - type: text
    content: Dia nandeha Izy ka nitori-teny tao amin’ny synagogan’ny olona eran’i Galilia sady namoaka ny demonia.
  - type: heading
    content: Ny nahasitranan’i Jesosy ilay boka.
  - type: heading
    content: Mat. 8.1-4; Lio. 5.12-16.
  '4':
  - type: text
    content: 'dia niseho Jaona, izay nanao batisa tany an-efitra ka nitory ny batisan’ny fibebahana ho famelan-keloka. '
  '40':
  - type: text
    content: 'ARY nisy boka nanatona Azy ka nitaraina taminy sady nandohalika teo anatrehany ka nanao taminy hoe: Raha mety Hianao, dia mahay manadio ahy. '
  '41':
  - type: text
    content: 'Ary Jesosy dia onena azy ka naninjitra ny tànany, dia nanendry azy ka nanao taminy hoe: Mety Aho; madiova hianao. '
  '42':
  - type: text
    content: 'Ary niaraka tamin’izay dia niala taminy ny habokany, ka dia nadio izy. '
  '43':
  - type: text
    content: 'Ary namepetra azy mafy Jesosy, dia nampandeha azy niaraka tamin’izay '
  '44':
  - type: text
    content: 'ka nanao taminy hoe: Tandremo tsara mba tsy hisy holazainao na amin’iza na amin’iza; fa mandehana, misehoa amin’ny mpisorona, ka manatera ny fanadiovana anao, izay nandidian’i Mosesy, ho vavolombelona amin’ireo. '
  '45':
  - type: text
    content: Nefa lasa ralehilahy ka nilazalaza sy nampiely izany zavatra izany, ka dia tsy nahazo niditra miharihary tao an-tanàna intsony Jesosy; fa nitoetra tany ivelany tamin’ny tany foana Izy, dia nanatona Azy ny olona avy eny tontolo eny.
  '5':
  - type: text
    content: Dia nandeha nanatona azy ny tany Jodia rehetra sy ny mponina rehetra tany Jerosalema, ka nataony batisa tao amin’ny ony Jordana ireny, rehefa niaiky ny fahotany.
  '6':
  - type: text
    content: 'Ary Jaona nitafy lamba volon-drameva; ary fehin-kibo hoditra no tamin’ny valahany, ary ny fihinany dia valala sy tantely remby. '
  '7':
  - type: text
    content: 'Ary nitory izy ka nanao hoe: Avy ao aoriako Ilay mahery noho izaho, ka tsy mendrika hiondrika hamaha ny fehin-kapany aza aho. '
  '8':
  - type: text
    content: Izaho efa nanao batisa anareo tamin’ny rano, fa Izy kosa hanao batisa anareo amin’ny Fanahy Masina.
  - type: heading
    content: Ny nanaovana batisa an’i Jesosy, sy ny nakan’i Satana fanahy Azy, ary ny nankanesany tany Galilia.
  - type: heading
    content: Mat. 3.13–4.17; Lio. 3.21,22; 4.1-15.
  '9':
  - type: text
    content: 'ARY tamin’izany andro izany dia tonga avy tany Nazareta any Galilia Jesosy ka nataon’i Jaona batisa tao Jordana. '
