document_id: EST.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanonganana an’i Hamana, sy ny namonoana azy.
  - type: text
    content: 'ARY ny mpanjaka sy Hamana dia nankao amin’i Estera, vadin’ny mpanjaka, ho ao amin’ny fanasana. '
  '10':
  - type: text
    content: Ary Hamana dia nahantony tamin’ilay hazo efa natsangany hanantonana an’i Mordekay. Dia vao izay no nionona ny fahatezeran’ny mpanjaka.
  '2':
  - type: text
    content: 'Ary hoy indray ny mpanjaka tamin’i Estera teo am-pisotroan-divay tamin’ny andro faharoa: Inona no angatahinao, ry Estera, vadin’ny mpanjaka? Fa homena anao izany. Ary inona ange no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakana aza dia hotovina izany.'
  '3':
  - type: text
    content: 'Dia namaly Estera, vadin’ny mpanjaka, ka nanao hoe: Raha mahita fitia eto imasonao ary aho, ry mpanjaka, ka sitraky ny mpanjaka, dia aoka homena ahy ny aiko araka ny fifonako ary ny fireneko araka ny fangatahako; '
  '4':
  - type: text
    content: 'fa namidy izahay, dia izaho sy ny fireneko, mba haringana sy hovonoina ary haripaka; fa raha tàhiny namidy ho andevolahy sy ho andevovavy izahay, dia ho nangina ihany aho; kanefa anie tsy mahonitra ny fatiantoky ny mpanjaka tsinona ilay fahavalo e. '
  '5':
  - type: text
    content: 'Dia namaly Ahasoerosy mpanjaka ka nanao tamin’i Estera, vadin’ny mpanjaka, hoe: Iza moa izany, ary aiza no hisy hasesiky ny fony hanao izany akory? '
  '6':
  - type: text
    content: 'Fa hoy Estera: Io Hamana ratsy fanahy io no rafilahy sy fahavalo!'
  - type: text
    content: 'Dia raiki-tahotra teo anatrehan’ny mpanjaka sy ny vadin’ny mpanjaka Hamana. '
  '7':
  - type: text
    content: 'Ary tezitra dia tezitra ny mpanjaka, dia nitsangana niala teo am-pisotroan-divay ho eny an-tanimbolin’ny trano; ary Hamana kosa nitsangana hangataka ny ainy tamin’i Estera, vadin’ny mpanjaka, satria hitany fa misy loza hamelin’ny mpanjaka azy. '
  '8':
  - type: text
    content: 'Ary ny mpanjaka niverina avy teo an-tanimbolin’ny trano ho ao amin’ilay efa nisotroany divay teo, ary Hamana sendra niapoka tamin’ny farafara nandriandrian’i Estera. Dia hoy ny mpanjaka: Moa hisavika ny vadin’ny mpanjaka eto anatrehako eto an-trano va io? Raha vantany vao naloaky ny vavan’ny mpanjaka izany teny izany, dia nisy nanarona ny tavan’i Hamana.'
  '9':
  - type: text
    content: Ary Harbona, tsindranolahy
  - type: note
    content: Heb. ionoka.
  - type: text
    content: ' anankiray, izay teo anatrehan’ny mpanjaka, dia nilaza hoe: Indro miorina eo akaikin’ny tranon’i Hamana ny hazo, dimam-polo hakiho ny hahavony, izay nataon’i Hamana hanantonany an’i Mordekay, ilay niteny soa ho an’ny mpanjaka. Dia hoy ny mpanjaka: Ahantòny amin’io izy. '
