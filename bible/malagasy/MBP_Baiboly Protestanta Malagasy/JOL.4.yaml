document_id: JOL.4
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa, indro, amin’ireo andro ireo sy amin’izany fotoana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha hampodiko ny Joda sy Jerosalema avy amin’ny fahababoany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia hangoniko ny jentilisa rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho entiko midina ao amin’ny Lohasahan’i Josafata,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Josafata = Jehovah no mitsara.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao no hifandaharako aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny amin’ny Isiraely, oloko sy lovako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay naeliny tany amin’ny jentilisa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nozarazarainy ny taniko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sady nanaovany loka ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia zazalahy no nataony takalon’ny vehivavy janga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zazavavy no namidiny divay ka nosotroiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hianareo koa, ry Tyro sy Sidona, sy ry tany Filistia rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa mampaninona Ahy akory hianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamaly Ahy va hianareo, sa hanahoana Ahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faingana dia faingana no hanatsingerenako ny nataonareo ho eo an-dohanareo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho ny nakanareo ny volafotsiko sy ny volamenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny nitondranareo ny zava-tsoako mahafinaritra ho ao amin’ny tempolinareo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny zanak’i Joda sy ny zanak’i Jerosalema dia namidinareo tamin’ny zanaky ny Grika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamindranareo azy hanalavitra ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro, hofohaziko izy hiala any amin’ny tany izay nahaverezany noho ny nahalafosanareo azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatsingeriko ho eo an-dohanareo ny nataonareo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ka hamidiko ho lasan’ny zanak’i Joda kosa ny zanakalahinareo sy ny zanakavavinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamidiny amin’ny Sabeana kosa ireny, dia ho an’izay firenena lavitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no efa niteny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Antsoy any amin’ny jentilisa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miantsoa hanao ady masina, fohazy ny lehilahy mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka handroso ny mpiady rehetra ka hiakatra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tefeo ho sabatra ny fangadinareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lefona ny antsinareo fanetezam-boaloboka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aoka izay kelikely aina hihiaka hoe: Mahery aho!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avia faingana, hianareo jentilisa rehetra avy eny manodidina eny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ento midina ao ny maherinao, Jehovah ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hifoha ny jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiakatra ho ao amin’ny Lohasahan’i Josafata;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Josafata = Jehovah no mitsara.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ao no hipetrahako hitsara ny jentilisa rehetra avy eny manodidina eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Arosoy ny fijinjana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa masaka ny vokatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia hianareo, ka manosihose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa feno ny famiazam-boaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihoatra ny vata fanantazana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa be ny faharatsiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He izany vahoaka mireondreona ao amin’ny lohasaha fitsarana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa antomotra ny andron’i Jehovah ao amin’ny lohasaha fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny masoandro sy ny volana ho tonga maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kintana tsy hamirapiratra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jehovah mierona ao Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampikotroka ao Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hihorohoro ny tany aman-danitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no fialofan’ny olony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fiarovana mafy ho an’ny Zanak’Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay monina ao Ziona, tendrombohitro masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho masina Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hafa firenena tsy mba handeha hamaky eo intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Amin’izany andro izany dia hipoipoitra ranom-boaloboka ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handriaka ronono ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho feno rano ny lohasahan-driak’i Joda rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hisy loharano hivoaka avy ao an-tranon’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka handena ny lohasahan-driak’i Sitima.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Egypta kosa ho tonga tany lao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Edoma ho efitra foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fampahoriana ny taranak’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny nandatsahany ra marina teo amin’ny taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa Joda honenana mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jerosalema hatramin’ny taranaka fara mandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary hamaly ny ra marina izay tsy mbola novaliako Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah monina ao Ziona.
