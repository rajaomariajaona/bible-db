document_id: JOL.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: Fa, indro, amin’ireo andro ireo sy amin’izany fotoana izany,
  - type: text
    content: Raha hampodiko ny Joda sy Jerosalema avy amin’ny fahababoany,
  '10':
  - type: text
    content: Tefeo ho sabatra ny fangadinareo,
  - type: text
    content: Ary ho lefona ny antsinareo fanetezam-boaloboka;
  - type: text
    content: 'Aoka izay kelikely aina hihiaka hoe: Mahery aho!'
  '11':
  - type: text
    content: Avia faingana, hianareo jentilisa rehetra avy eny manodidina eny,
  - type: text
    content: Dia ento midina ao ny maherinao, Jehovah ô.
  '12':
  - type: text
    content: Hifoha ny jentilisa
  - type: text
    content: Ka hiakatra ho ao amin’ny Lohasahan’i Josafata;
  - type: note
    content: Josafata = Jehovah no mitsara.
  - type: text
    content: Fa ao no hipetrahako hitsara ny jentilisa rehetra avy eny manodidina eny.
  '13':
  - type: text
    content: Arosoy ny fijinjana,
  - type: text
    content: Fa masaka ny vokatra;
  - type: text
    content: Avia hianareo, ka manosihose,
  - type: text
    content: Fa feno ny famiazam-boaloboka,
  - type: text
    content: Mihoatra ny vata fanantazana,
  - type: text
    content: Fa be ny faharatsiany.
  '14':
  - type: text
    content: He izany vahoaka mireondreona ao amin’ny lohasaha fitsarana!
  - type: text
    content: Fa efa antomotra ny andron’i Jehovah ao amin’ny lohasaha fitsarana.
  '15':
  - type: text
    content: Ny masoandro sy ny volana ho tonga maizina,
  - type: text
    content: Ary ny kintana tsy hamirapiratra,
  '16':
  - type: text
    content: Jehovah mierona ao Ziona,
  - type: text
    content: Ary mampikotroka ao Jerosalema,
  - type: text
    content: Ka hihorohoro ny tany aman-danitra;
  - type: text
    content: Fa Jehovah no fialofan’ny olony
  - type: text
    content: Sy fiarovana mafy ho an’ny Zanak’Isiraely.
  '17':
  - type: text
    content: Ary dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo,
  - type: text
    content: Izay monina ao Ziona, tendrombohitro masina;
  - type: text
    content: Dia ho masina Jerosalema,
  - type: text
    content: Ary ny hafa firenena tsy mba handeha hamaky eo intsony.
  '18':
  - type: text
    content: Amin’izany andro izany dia hipoipoitra ranom-boaloboka ny tendrombohitra,
  - type: text
    content: Handriaka ronono ny havoana,
  - type: text
    content: Ho feno rano ny lohasahan-driak’i Joda rehetra,
  - type: text
    content: Ary hisy loharano hivoaka avy ao an-tranon’i Jehovah
  - type: text
    content: Ka handena ny lohasahan-driak’i Sitima.
  '19':
  - type: text
    content: Egypta kosa ho tonga tany lao,
  - type: text
    content: Ary Edoma ho efitra foana,
  - type: text
    content: Noho ny fampahoriana ny taranak’i Joda,
  - type: text
    content: Dia ny nandatsahany ra marina teo amin’ny taniny.
  '2':
  - type: text
    content: Dia hangoniko ny jentilisa rehetra
  - type: text
    content: Ka ho entiko midina ao amin’ny Lohasahan’i Josafata,
  - type: note
    content: Josafata = Jehovah no mitsara.
  - type: text
    content: Ary ao no hifandaharako aminy
  - type: text
    content: Noho ny amin’ny Isiraely, oloko sy lovako,
  - type: text
    content: Izay naeliny tany amin’ny jentilisa;
  - type: text
    content: Ary nozarazarainy ny taniko,
  '20':
  - type: text
    content: Fa Joda honenana mandrakizay,
  - type: text
    content: Ary Jerosalema hatramin’ny taranaka fara mandimby.
  '21':
  - type: text
    content: Ary hamaly ny ra marina izay tsy mbola novaliako Aho;
  - type: text
    content: Fa Jehovah monina ao Ziona.
  '3':
  - type: text
    content: Sady nanaovany loka ny oloko,
  - type: text
    content: Dia zazalahy no nataony takalon’ny vehivavy janga,
  - type: text
    content: Ary zazavavy no namidiny divay ka nosotroiny.
  '4':
  - type: text
    content: Ary hianareo koa, ry Tyro sy Sidona, sy ry tany Filistia rehetra,
  - type: text
    content: Moa mampaninona Ahy akory hianareo?
  - type: text
    content: Hamaly Ahy va hianareo, sa hanahoana Ahy?
  - type: text
    content: Faingana dia faingana no hanatsingerenako ny nataonareo ho eo an-dohanareo,
  '5':
  - type: text
    content: Noho ny nakanareo ny volafotsiko sy ny volamenako,
  - type: text
    content: Sy ny nitondranareo ny zava-tsoako mahafinaritra ho ao amin’ny tempolinareo;
  '6':
  - type: text
    content: Ary ny zanak’i Joda sy ny zanak’i Jerosalema dia namidinareo tamin’ny zanaky ny Grika,
  - type: text
    content: Hamindranareo azy hanalavitra ny taniny.
  '7':
  - type: text
    content: Indro, hofohaziko izy hiala any amin’ny tany izay nahaverezany noho ny nahalafosanareo azy,
  - type: text
    content: Ary hatsingeriko ho eo an-dohanareo ny nataonareo,
  '8':
  - type: text
    content: Ka hamidiko ho lasan’ny zanak’i Joda kosa ny zanakalahinareo sy ny zanakavavinareo,
  - type: text
    content: Ary hamidiny amin’ny Sabeana kosa ireny, dia ho an’izay firenena lavitra;
  - type: text
    content: Fa Jehovah no efa niteny.
  '9':
  - type: text
    content: Antsoy any amin’ny jentilisa izany,
  - type: text
    content: Miantsoa hanao ady masina, fohazy ny lehilahy mahery,
  - type: text
    content: Aoka handroso ny mpiady rehetra ka hiakatra;
