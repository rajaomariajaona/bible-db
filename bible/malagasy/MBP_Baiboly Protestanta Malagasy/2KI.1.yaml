document_id: 2KI.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahararian’i Ahazia, sy ny nilazan’i Elia fa ho faty izy.
  - type: text
    content: ARY Moaba niodina tamin’ny Isiraely, rehefa maty Ahaba.
  '10':
  - type: text
    content: 'Fa Elia namaly ka nanao tamin’ny mpifehy dimam-polo hoe: Raha lehilahin’Andriamanitra tokoa aho, dia aoka hisy afo milatsaka avy any an-danitra handevona anao sy ny dimam-polo fehinao. Ary dia nisy afo nilatsaka avy tany an-danitra ka nandevona azy mbamin’ny dimam-polo fehiny.'
  '11':
  - type: text
    content: 'Dia naniraka mpifehy dimam-polo anankiray mbamin’ny dimam-polo fehiny hankany aminy koa ny mpanjaka. Dia niteny izy ka nanao taminy hoe: Ry lehilahin’Andriamanitra ô, midìna faingana hianao, antsoin’ny mpanjaka. '
  '12':
  - type: text
    content: 'Fa namaly Elia ka nanao taminy hoe: Raha lehilahin’Andriamanitra tokoa aho, dia aoka hisy afo milatsaka avy any an-danitra ka handevona anao mbamin’ny dimam-polo fehinao. Ary dia nisy afon’Andriamanitra nilatsaka avy tany an-danitra ka nandevona azy mbamin’ny dimam-polo fehiny.'
  '13':
  - type: text
    content: 'Ary dia naniraka mpifehy dimam-polo anankiray koa indray mbamin’ny dimam-polo fehiny izy. Dia niakatra ilay mpifehy dimam-polo ka tonga, ary nandohalika teo anatrehan’i Elia ka nifona taminy nanao hoe: Masìna hianao, ry lehilahin’Andriamanitra ô, aoka ho zava-tsoa eo imasonao ny aiko sy ny ain’ireto mpanomponao dimam-polo ireto. '
  '14':
  - type: text
    content: 'Indro, efa nisy afo nilatsaka avy tany an-danitra ka nandevona ireo roa lahy mpifehy dimam-polo ireo mbamin’ny dimam-polo fehiny avy; fa aoka kosa ho zava-tsoa eo imasonao ny aiko ankehitriny. '
  '15':
  - type: text
    content: 'Ary hoy Ilay Anjelin’i Jehovah tamin’i Elia: Midìna ihany hiaraka aminy hianao; fa aza matahotra azy.'
  - type: text
    content: 'Ary dia niainga izy ka nidina niaraka taminy ho any amin’ny mpanjaka. '
  '16':
  - type: text
    content: 'Ary hoy izy tamin’ny mpanjaka: Izao no lazain’i Jehovah: Satria naniraka olona hanontany amin’i Bala-zeboba, andriamanitr’i Ekrona, hianao, hoatra ny tsy misy Andriamanitra eo amin’ny Isiraely, dia tsy hidina hiala amin’ny farafara izay niakaranao hianao fa ho faty tokoa.'
  '17':
  - type: text
    content: Ka dia maty izy araka ny tenin’i Jehovah izay nolazain’i Elia. Ary satria tsy nanan-janaka izy, dia Jorama no nanjaka nandimby azy tamin’ny taona faharoa nanjakan’i Jehorama, zanak’i Josafata, mpanjakan’ny Joda.
  '18':
  - type: text
    content: Ary ny asan’i Ahazia sisa izay nataony, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Isiraely va izany?
  '2':
  - type: text
    content: 'Ary Ahazia nianjera avy teo amin’ny makarakara teo amin’ny efi-trano ambony tao Samaria ka narary; dia naniraka olona izy ka nanao taminy hoe: Mandehana, anontanio amin’i Bala-zeboba, andriamanitr’i Ekrona, na ho sitrana ihany aho amin’ity aretiko ity, na tsia.'
  '3':
  - type: text
    content: 'Ary Ilay Anjelin’i Jehovah niteny tamin’i Elia Tisbita hoe: Miaingà, miakara hihaona amin’ny iraky ny mpanjakan’i Samaria, ka manaova aminy hoe: Izao no lazain’i Jehovah: Moa ataonareo fa tsy misy Andriamanitra eo amin’ny Isiraely va, no mandeha hanontany amin’i Bala-zeboba, andriamanitr’i Ekrona, hianareo? '
  '4':
  - type: text
    content: Koa noho izany dia tsy hidina hiala amin’ny farafara izay niakaranao hianao, fa ho faty tokoa. Ary dia lasa Elia.
  '5':
  - type: text
    content: 'Dia niverina tany amin’ny mpanjaka ny iraka, ka hoy izy taminy: Nahoana re no niverina hianareo? '
  '6':
  - type: text
    content: 'Ary hoy ireo taminy: Nisy lehilahy niakatra nitsena anay ka nanao taminay hoe: Mandehana miverina any amin’ny mpanjaka izay naniraka anareo, ka lazao aminy hoe: Izao no lazain’i Jehovah: Moa ataonareo fa tsy misy Andriamanitra eo amin’ny Isiraely va, no maniraka hanontany amin’i Bala-zeboba, andriamanitr’i Ekrona, hianareo? Koa noho izany dia tsy hidina hiala amin’ny farafara izay niakaranao hianao, fa ho faty tokoa. '
  '7':
  - type: text
    content: 'Ary hoy izy taminy: Lehilahy toy inona izay niakatra nitsena anareo izay ka nilaza izany teny izany taminareo? '
  '8':
  - type: text
    content: 'Ary ireo namaly azy hoe: Lehilahy mitafy volom-biby izy, sady nisy fehin-kibo hoditra tamin’ny valahany. Dia hoy izy: Elia Tisbita izay.'
  '9':
  - type: text
    content: 'Ary ny mpanjaka naniraka mpifehy dimam-polo anankiray mbamin’ny dimam-polo fehiny hankany aminy. Dia niakatra tany aminy izy; ka indro izy nipetraka teo an-tampon’ny tendrombohitra; ary niteny taminy ralehilahy hoe: Ry lehilahin’Andriamanitra ô, midìna hianao, antsoin’ny mpanjaka. '
