document_id: NEH.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanaovan’ny olona fanekena mafy hanaraka ny lalàn’Andriamanitra sy hanome izay ilaina ho enti-manatanteraka ny fanompoam-pivavahana tao amin’ny tempoly.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY noho izany rehetra izany dia manao fanekena mafy izahay, ka soratanay izany ary manisy tombo-kase eo aminy ny mpanapaka anay sy ny Levitanay ary ny mpisoronay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny nanisy tombo-kase dia Nehemia governora, zanak’i Hakalia, sy Zedekia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary Seraia, Azaria, Jeremia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pasora, Amaria, Malkia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hatosy, Sebanaia, Maloka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Harima, Meremota, Obadia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Daniela, Ginetona, Baroka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mesolama, Abia, Miamina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mazia, Bilgay, Semaia; samy mpisorona ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny Levita kosa dia Jesoa, zanak’i Azania, Binoy isan’ny zanak’i Henadada, ary Kadmiela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary ny rahalahin’ireo dia Sebania, Hodia, Kelita, Pelaia, Hanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mika, Rehoba, Hasabia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Zakora, Serebia, Sebania, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hodia, Bany Benino.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny loholona kosa dia Parosy, Pahata-moaba, Elama, Zato, Bany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Bony, Azgada, Bebay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Adonia, Bigvay, Adina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Atera, Hezekia, Azora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hodia, Hasoma, Bezay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Harifa, Anatota, Nebay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Magpiasy, Mesolama, Hezira, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mesezabela, Zadoka, Jadoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pelatia, Hanana, Anaia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hosea, Hanania, Hasoba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Halohesy, Pila, Sobeka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehoma, Hasabna, Mahaseia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ahia, Hanana, Anana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Maloka, Harima, Bana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny olona sisa, dia ny mpisorona sy ny Levita sy ny mpiandry varavarana sy ny mpihira sy ny Netinima, ary izay rehetra efa niavaka tamin’ny tompon-tany hanaraka ny lalàn’Andriamanitra mbamin’ny vadin’ireo sy ny zanani-lahy ary ny zanani-vavy, izay rehetra efa nahahaino, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dia samy nikambana tsara tamin’ny andriandahy rahalahiny ka niozona sy nianiana hanaraka ny lalàn’Andriamanitra, izay nampilazaina an’i Mosesy, mpanompon’Andriamanitra, ary hitandrina sy hankatò ny didy rehetra izay nataon’i Jehovah Tompontsika mbamin’ny fitsipika sy ny lalàny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ary tsy hanome ny zanakai-vavy ho vadin’ny tompon-tany, na haka ny zanani-vavy ho vadin’ny zanakai-lahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ary tsy hividy zavatra amin’ny andro Sabata, na amin’izay andro masina, raha misy entana na vary entin’ny tompon-tany hamidy amin’ny andro Sabata, ary tsy hamboly zavatra amin’ny taona fahafito sady hamoy izay trosa rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nanao lalàna ho anay koa izahay handoa ny ampahatelon-tsekely isan-taona hanaovana ny fanompoana momba ny tranon’Andriamanitsika: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia ho amin’ny mofo aseho sy ny fanatitra hohanina mandrakariva sy ny fanatitra dorana mandrakariva, ary ho amin’ny Sabata sy ny voaloham-bolana sy ny fotoam-pivavahana, ary ho amin’ny zava-masina sy ny fanatitra noho ny ota hanaovana fanavotana ho an’ny Isiraely, dia hanaovana ny raharaha rehetra momba ny tranon’Andriamanitsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nanao filokana izahay ny amin’ny hanateran’ny mpisorona sy ny Levita sy ny olona ny kitay hazo, hitondranay azy ho ao an-tranon’Andriamanitsika araka ny fianakavianay avy amin’ny fotoan’andro isan-taona, handoroana eo ambonin’ny alitaran’i Jehovah Andriamanitsika araka izay voasoratra ao amin’ny lalàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary mba hitondranay ny voaloham-bokatry ny taninay sy ny voaloham-bokatry ny hazo mamoa rehetra ho ao an-tranon’i Jehovah isan-taona isan-taona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ary ny lahimatoanay sy ny voalohan-teraky ny biby fiompinay, araka izay voasoratra ao amin’ny lalàna, ary ny voalohan-teraky ny ombinay sy ny ondry aman-osinay dia nekenay ho entina ho ao an-tranon’Andriamanitsika, ho an’ny mpisorona izay manao fanompoam-pivavahana ao an-tranon’Andriamanitsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary mba hitondranay ho an’ny mpisorona koa ny voalohan’ny kobanay voafetafeta sy ny fanatitra asandratray sy ny voaloham-bokatry ny hazo rehetra sy ny ranom-boaloboka ary ny diloilo ho amin’ny efi-trano ao an-tranon’Andriamanitsika, ary ny ampahafolon’ny vokatry ny taninay ho an’ny Levita; fa ny Levita no mpandray ny fahafolon-karena eny an-tanàna rehetra akaikin’ny fambolenay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hisy mpisorona anankiray, taranak’i Arona, hiaraka amin’ny Levita, raha mandray ny fahafolon-karena izy; ary ny ampahafolon’ny fahafolon-karena dia ho entin’ny Levita miakatra ho ao an-tranon’Andriamanitsika, ho ao amin’ny efi-trano ao an-trano fitehirizan-drakitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Fa ho ao amin’ireo efi-trano ireo no hitondran’ny Zanak’Isiraely sy ny Levita ny fanatitra asandratra, dia vary sy ranom-boaloboka ary diloilo, dia ho ao amin’ilay itoeran’ny fanaky ny fitoerana masina sy ny mpisorona izay manao fanompoam-pivavahana sy ny mpiandry varavarana ary ny mpihira; ary tsy hahafoy ny tranon’Andriamanitsika izahay.
