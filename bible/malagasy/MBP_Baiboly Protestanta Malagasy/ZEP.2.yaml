document_id: ZEP.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Anatra ho fampibebahana ny olona, dieny mbola tsy mihatra ny loza.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MIANGÒNA, eny, mivoria hianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry firenena tsy manan-kenatra,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy manina.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no ho valin’ny avonavony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nandatsa ny olon’i Jehovah, Tompon’ny maro, sy nirehareha taminy izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahatsiravina azy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria hahamosarena ireo andriamanitra rehetra ambonin’ny tany Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hiankohofan’ny any amoron-tsiraky ny jentilisa rehetra eo anatrehan’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy any amin’ny fitoerany avy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo Etiopiana koa,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voatrabaky ny sabatro hianareo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izy.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary haninjitra ny tànany hamely ny avaratra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handringana an’i Asyria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hahalao an’i Ninive ho karankaina tahaka ny efitra Izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy andiany handry ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fivorian’ny karazam-biby samy hafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sama sy ny sokina hitoetra ao amin’ny kapitaliny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feo mikiririoka no ho re ao am-baravarankely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fandravana no ho eo an-tokonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hendahany ny rafitra sedera.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no tanàna niravoravo sady nandry fahizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay nanao anakampo hoe: Izaho no izy, ary tsy misy hafa;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey! efa tonga lao izy, eny, fandrian’ny biby!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mandalo azy dia hisitrisitra sy hanondro tànana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieny tsy mbola mihatra ny didy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Mihelina toy ny akofa ny andro!),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieny tsy mbola tonga aminareo ny fahatezerana mafin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, dieny tsy mbola tonga aminareo ny andro firehetan’ny fahatezeran’i Jehovah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitadiava an’i Jehovah, hianareo mpandefitra rehetra amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay efa nanaraka ny fitsipiny:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tadiavo ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tadiavo ny fandeferana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Angamba ho voafina hianareo amin’ny andro fahatezeran’i Jehovah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hafoy Gaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho lao Askelona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Horoahiny mitataovovonana Asdoda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hofongorana Ekrona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozan’ny mponina any amoron-tsiraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny firenen’ny Keretita!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihatra aminareo ny tenin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Kanana, tanin’ny Filistina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haringako tsy hisy mponina eo aminao,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny any amoron-tsiraka dia ho tonga tany fiandrasana ondry, izay misy zohy fialofan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: trano-bongon’.
      marker-yv: yv-n
    - type: text
      text: ' ny mpiandry ondry,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho valan’ondry aman-osy,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho tanin’ny sisa amin’ny taranak’i Joda izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka any no hiandrasany ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tranon’i Askelona no handriany amin’ny hariva;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah Andriamaniny no hamangy azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampody azy avy amin’ny fahababoany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa reko ny fandatsàn’i Moaba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fanaratsian’ny taranak’i Amona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nandatsany ny oloko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nireharehany teny amin’ny sisin-taniny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa raha velona koa Aho, hoy Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitry ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka an’i Sodoma tokoa Moaba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranak’i Amona ho tahaka an’i Gomora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho alan’amiana sy lava-tsira ary tany lao mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sisa amin’ny oloko no hamabo azy, ary ny sisa amin’ny oloko no hahalasa azy.
