document_id: ZEP.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra ho fampibebahana ny olona, dieny mbola tsy mihatra ny loza.
  - type: text
    content: MIANGÒNA, eny, mivoria hianareo
  - type: text
    content: Ry firenena tsy manan-kenatra,
  - type: note
    content: 'Na: tsy manina.'
  '10':
  - type: text
    content: Izany no ho valin’ny avonavony,
  - type: text
    content: Satria nandatsa ny olon’i Jehovah, Tompon’ny maro, sy nirehareha taminy izy.
  '11':
  - type: text
    content: Hahatsiravina azy Jehovah,
  - type: text
    content: Satria hahamosarena ireo andriamanitra rehetra ambonin’ny tany Izy,
  - type: text
    content: Mba hiankohofan’ny any amoron-tsiraky ny jentilisa rehetra eo anatrehan’i Jehovah,
  - type: text
    content: Samy any amin’ny fitoerany avy.
  '12':
  - type: text
    content: Hianareo Etiopiana koa,–
  - type: text
    content: Ho voatrabaky ny sabatro hianareo.
  - type: note
    content: Heb. izy.
  '13':
  - type: text
    content: Ary haninjitra ny tànany hamely ny avaratra Izy
  - type: text
    content: Ka handringana an’i Asyria;
  - type: text
    content: Ary hahalao an’i Ninive ho karankaina tahaka ny efitra Izy.
  '14':
  - type: text
    content: Ary hisy andiany handry ao aminy,
  - type: text
    content: Dia fivorian’ny karazam-biby samy hafa,
  - type: text
    content: Ny sama sy ny sokina hitoetra ao amin’ny kapitaliny;
  - type: text
    content: Feo mikiririoka no ho re ao am-baravarankely,
  - type: text
    content: Ary fandravana no ho eo an-tokonana,
  - type: text
    content: Fa hendahany ny rafitra sedera.
  '15':
  - type: text
    content: Izany no tanàna niravoravo sady nandry fahizay,
  - type: text
    content: 'Izay nanao anakampo hoe: Izaho no izy, ary tsy misy hafa;'
  - type: text
    content: Endrey! efa tonga lao izy, eny, fandrian’ny biby!
  - type: text
    content: Izay rehetra mandalo azy dia hisitrisitra sy hanondro tànana.
  '2':
  - type: text
    content: Dieny tsy mbola mihatra ny didy
  - type: text
    content: (Mihelina toy ny akofa ny andro!),
  - type: text
    content: Dieny tsy mbola tonga aminareo ny fahatezerana mafin’i Jehovah,
  - type: text
    content: Eny, dieny tsy mbola tonga aminareo ny andro firehetan’ny fahatezeran’i Jehovah.
  '3':
  - type: text
    content: Mitadiava an’i Jehovah, hianareo mpandefitra rehetra amin’ny tany,
  - type: text
    content: 'Izay efa nanaraka ny fitsipiny:'
  - type: text
    content: Tadiavo ny fahamarinana,
  - type: text
    content: Tadiavo ny fandeferana;
  - type: text
    content: Angamba ho voafina hianareo amin’ny andro fahatezeran’i Jehovah.
  '4':
  - type: text
    content: Fa hafoy Gaza,
  - type: text
    content: Ary ho lao Askelona;
  - type: text
    content: Horoahiny mitataovovonana Asdoda,
  - type: text
    content: Ary hofongorana Ekrona.
  '5':
  - type: text
    content: Lozan’ny mponina any amoron-tsiraka,
  - type: text
    content: Dia ny firenen’ny Keretita!
  - type: text
    content: Mihatra aminareo ny tenin’i Jehovah,
  - type: text
    content: Ry Kanana, tanin’ny Filistina!
  - type: text
    content: Haringako tsy hisy mponina eo aminao,
  '6':
  - type: text
    content: Ary ny any amoron-tsiraka dia ho tonga tany fiandrasana ondry, izay misy zohy fialofan’
  - type: note
    content: 'Na: trano-bongon’.'
  - type: text
    content: ' ny mpiandry ondry,'
  - type: text
    content: Sy ho valan’ondry aman-osy,
  '7':
  - type: text
    content: Ary ho tanin’ny sisa amin’ny taranak’i Joda izany,
  - type: text
    content: Ka any no hiandrasany ondry;
  - type: text
    content: Ny tranon’i Askelona no handriany amin’ny hariva;
  - type: text
    content: Fa Jehovah Andriamaniny no hamangy azy
  - type: text
    content: Ka hampody azy avy amin’ny fahababoany.
  '8':
  - type: text
    content: Efa reko ny fandatsàn’i Moaba
  - type: text
    content: Sy ny fanaratsian’ny taranak’i Amona,
  - type: text
    content: Izay nandatsany ny oloko
  - type: text
    content: Sy nireharehany teny amin’ny sisin-taniny.
  '9':
  - type: text
    content: Koa raha velona koa Aho, hoy Jehovah, Tompon’ny maro,
  - type: text
    content: Andriamanitry ny Isiraely,
  - type: text
    content: Dia ho tahaka an’i Sodoma tokoa Moaba,
  - type: text
    content: Ary ny taranak’i Amona ho tahaka an’i Gomora,
  - type: text
    content: Dia ho alan’amiana sy lava-tsira ary tany lao mandrakizay;
  - type: text
    content: Ny sisa amin’ny oloko no hamabo azy, ary ny sisa amin’ny oloko no hahalasa azy.
