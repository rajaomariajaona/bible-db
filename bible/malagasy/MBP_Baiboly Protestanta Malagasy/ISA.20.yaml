document_id: ISA.20
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fanoharana ny amin’ny handravana an’i Etiopia sy Egypta.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TAMIN’ny taona nankanesan’i Tartana tany Asdoda, raha nirahin’i Sargona, mpanjakan’i Asyria, izy ka namely an’i Asdoda ary nahafaka azy,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tamin’izany andro izany no nampitondran’i Jehovah teny an’Isaia, zanak’i Amoza, hoe: Andeha, borahy ny lamba fisaonana ho afaka amin’ny valahanao, ary esory ny kiraronao hiala amin’ny tongotrao. Dia nanao izany izy ka nandeha tsy nitafy sady tsy nikiraro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Jehovah: Tahaka ny nandehanan’Isaia mpanompoko telo taona sady tsy nitafy no tsy nikiraro mba ho famantarana sy ho fahagagana ny amin’i Egypta sy Etiopia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia ho toy izany no hitondran’ny mpanjakan’i Asyria ny Egyptiana ho babo sy ny Etiopiana ho sambotra, na tanora na antitra, samy tsy hitafy sady tsy hikiraro no tsy hisarom-pe, ho henatr’i Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ho raiki-tahotra sy ho menatra ny Isiraely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izy.
    marker-yv: yv-n
  - type: text
    text: ' noho ny amin’i Etiopia fanantenany sy Egypta reharehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary amin’izany andro izany ny mponina etỳ amoron-dranomasina dia hanao hoe: He! ity manjo ilay nantenaintsika sady nandosirantsika ho famonjena antsika ho afaka amin’ny mpanjakan’i Asyria! Aiza intsony re no handosirantsika?'
