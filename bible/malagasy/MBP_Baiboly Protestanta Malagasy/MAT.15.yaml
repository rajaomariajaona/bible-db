document_id: MAT.15
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Tori-teny nataon’i Jesosy ny amin’ny fanaon-drazana.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 7.1-23.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA nankeo amin’i Jesosy ny Fariseo sy ny mpanora-dalàna sasany avy tany Jerosalema ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nahoana ny mpianatrao no mandika ny fampianarana voatolotry ny razana? fa tsy mba manasa tànana izy, raha hihinan-kanina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Izy namaly ka nanao taminy hoe: Nahoana kosa hianareo no mandika ny didin’Andriamanitra noho ny fampianarana voatolotra anareo? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Andriamanitra efa nanao hoe: „Manajà ny rainao sy ny reninao” (Eks. 20.12), ary koa: „Izay miteny ratsy ny rainy na ny reniny dia hatao maty tokoa” (Eks. 21.17). '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy kosa hianareo: Na zovy na zovy no hilaza amin’ny rainy na ny reniny hoe: ,Efa fanatitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ho an’Andriamanitra
  - type: text
    text: ' izay rehetra tokony hahazoanao soa avy amiko,’ dia tsy mba hanaja ny rainy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[ny rainy na ny reniny].'
    marker-yv: yv-n
  - type: text
    text: ' akory izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa dia foananareo ny tenin’Andriamanitra noho ny fampianarana voatolotra anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ry mpihatsaravelatsihy, marina ny naminanian’Isaia anareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: „Ity firenena ity manaja Ahy amin’ny molony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fony kosa lavitra Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa foana ny ivavahan’ireo amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mampianatra ny didin’olombelona ho fampianarana izy” (Isa. 29.13).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary niantso ny vahoaka hankeo aminy Izy ka nanao taminy hoe: Mihainoa ka mahafantara: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: tsy izay miditra amin’ny vava no mahaloto ny olona; fa izay mivoaka avy amin’ny vava, izany no mahaloto ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nankeo aminy ny mpianatra ka nanao taminy hoe: Fantatrao va fa tafintohina ny Fariseo, raha nandre izany teny izany? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Izy namaly ka nanao hoe: Ny zavatra rehetra izay tsy nambolen’ny Raiko Izay any an-danitra dia hongotana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avelao izy; mpitarika jamba izy; ary raha ny jamba no mitarika ny jamba, dia samy ho latsaka any an-kady izy roa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Petera namaly ka nanao taminy hoe: Lazao aminay ny hevitr’izany fanoharana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy Jesosy: Hianareo koa va mbola tsy mahafantatra ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy fantatrareo va fa izay rehetra miditra amin’ny vava dia mankao an-kibo ka avoaka ao amin’ny fivoahana? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izay mivoaka avy amin’ny vava kosa dia avy amin’ny fo, ka izany no mahaloto ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa avy amin’ny fo no ivoahan’ny sain-dratsy, dia ny vonoan-olona, ny fakam-badin’olona, ny fijangajangana, ny halatra, ny ampanga lainga, ny fitenenan-dratsy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: izany no mahaloto ny olona; fa ny mihinana amin’ny tànana tsy misasa tsy mba mahaloto ny olona.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny zanakavavin’ilay vehivavy Kananita.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 7.24-30.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'DIA niala teo Jesosy ka nankany amin’ny fari-tanin’i Tyro sy Sidona. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary, indro, nisy vehivavy Kananita anankiray nivoaka avy tamin’izany tany izany ka niantso nanao hoe: Mamindrà fo amiko, Tompoko, Zanak’i Davida ô! ny zanako-vavy ampahorin’ny demonia loatra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa Izy tsy namaly teny azy. Dia nanatona ny mpianany ka nangataka taminy nanao hoe: Roahy izy, fa miantso mafy ato aoriantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Izy namaly ka nanao hoe: Tsy nirahina Aho afa-tsy ho amin’ny ondry very amin’ny taranak’Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa nanatona ihany ravehivavy, dia niankohoka teo anatrehany ka nanao hoe: Tompoko ô, vonjeo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa Izy namaly ka nanao hoe: Tsy mety raha maka ny mofon-jaza ka manipy azy ho an’ny amboakely. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy ravehivavy: Marina izany, Tompoko; fa na dia ny amboakely aza mba mihinana izay sombintsombiny latsaka avy amin’ny latabatry ny tompony ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia namaly Jesosy ka nanao taminy hoe: Ravehivavy, lehibe ny finoanao; tongava aminao araka izay irinao. Dia sitrana ny zanani-vavy tamin’izay ora izay.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny marary maro, sy ny nampihinanany ny olona tsy omby efatra arivo, ary ny nitadiavan’ny Fariseo sy ny Sadoseo famantarana avy any an-danitra.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mar. 7.31–8.13.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ARY raha niala teo Jesosy, dia nankany amoron’ny Ranomasin’i Galilia Izy; ary niakatra nankeo an-tendrombohitra Izy ka nipetraka teo; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ary nisy vahoaka betsaka nankeo aminy nitondra ny mandringa, ny jamba, ny moana, ny kilemaina, ary ny maro hafa koa, ka nametraka azy teo akaikin’ny tongotr’i Jesosy; dia nahasitrana azy Izy; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ka dia talanjona ny vahoaka, raha nahita ny moana miteny, ny kilemaina sitrana, ny mandringa afaka, ary ny jamba mahiratra; dia nankalaza an’Andriamanitry ny Isiraely izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Jesosy niantso ny mpianany hankeo aminy ka nanao hoe: Mahonena Ahy ny vahoaka, fa efa nitoetra hateloana taty amiko izy izao ka tsy manan-ko hanina; ary tsy tiako ny hampody azy tsy mihinana, fandrao reraka eny an-dàlana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa hoy ny mpianatra taminy: Aiza no hahitanay mofo atỳ an-efitra ampy hahavoky izao vahoaka betsaka izao! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Jesosy taminy: Misy mofo firy any aminareo? Ary hoy izy: Fito sy hazandrano madinika vitsy foana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary Izy nandidy ny vahoaka betsaka hipetraka amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia nandray ny mofo fito mbamin’ny hazandrano Izy, ary rehefa nisaotra, dia namaky ka nanolotra azy ho an’ny mpianatra, ary ny mpianatra kosa nanolotra ho an’ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nihinana avokoa izy rehetra, ka dia voky; ary nangoniny ny sombintsombiny sisa tsy lany, ka dia nahafeno sobiky fito. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary izay nihinana dia efatra arivo lahy, afa-tsy ny zaza amim-behivavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ary nony efa nampody ny vahoaka Izy, dia niondrana an-tsambokely ka nankany amin’ny sisin-tanin’i Magadana.
