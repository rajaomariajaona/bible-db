document_id: EZR.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin’izany Dariosy mpanjaka dia nandidy, ka nizahana ny trano fitehirizan-taratasy, izay nitehirizana ny rakitra tany Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia tao Akmeta, tao an-dapa izay any amin’ny tanin’ny Mediana, no nahitana horonan-taratasy anankiray, ka voasoratra teo izao tantara izao:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin’ny taona voalohany nanjakan’i Kyrosy dia nandidy izy nanao hoe: Ny amin’ny tranon’Andriamanitra any Jerosalema, dia aoka hatao mihitsy izany ho fanateran’ny olona fanatitra, ary aoka hatao mafy ny fanorenany, ka enim-polo hakiho ny hahavony, ary enim-polo hakiho koa ny sakany, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia vato vaventy telo andalana sy hazo vaovao iray andalana; ary aoka haloa avy amin’ny tranon’ny mpanjaka izay lany; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary ny fanaky ny tranon’Andriamanitra, na ny volamena na ny volafotsy, izay nalain’i Nebokadnezara tao amin’ny tempoly tany Jerosalema ka nentiny ho any Babylona, dia aoka haverina ho any amin’ny tempoly any Jerosalema indray ireo, samy ho amin’ny fitoerany avy, ka aoka hapetraka ao an-tranon’Andriamanitra avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa amin’izany, ry Tatenay, governora any an-dafin’ny ony, sy ry Setara-bozenay mbamin’ny Afarsakita namanareo, izay any an-dafin’ny ony, mihataha hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza misakana ny fanaovana io tranon’Andriamanitra io; aoka ny mpanapaka ny Jiosy sy ny loholon’ny Jiosy hanao io tranon’Andriamanitra io eo amin’ilay efa niorenany ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izaho manao didy ny amin’ny hataonareo amin’ny loholon’ireo Jiosy ireo hanaovany izany tranon’Andriamanitra izany: aoka ny haren’ny mpanjaka, dia ny hetra avy amin’ny any an-dafin’ny ony, no handoavana marina izay lany ho an’ireo lehilahy ireo, mba tsy ho azon-tsampona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izay zavatra ilainy, na zanak’omby, na ondrilahy, na zanak’ondry, ho fanatitra dorana ho an’Andriamanitry ny lanitra, na vary tritika na sira, na divay sy diloilo, araka izay andidian’ny mpisorona any Jerosalema, dia aoka homena azy isan’andro isan’andro tsy tapaka izany, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mba hanaterany fanatitra ho hanitra ankasitrahana ho an’Andriamanitry ny lanitra sy hivavahany mba ho ela velona ny mpanjaka mbamin’ny zanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izaho manao didy fa na iza na iza no mandika izao teny izao, dia aoka hangalana hazo avy amin’ny tranony, ary haorina, dia hahantona eo ny tenany; ary aoka hatao firinga ny tranony noho izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary Andriamanitra, Izay efa nampitoetra ny anarany teo, anie handringana ny mpanjaka sy ny vahoaka rehetra, izay maninjitra ny tànany handika ny didiko ka handrava izany tranon’Andriamanitra any Jerosalema izany. Izaho Dariosy no nanao ny didy; aoka hotovina marina tokoa izany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahavitana ny tempoly, sy ny nitokanana azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ARY tamin’izany Tatenay, governora amin’ny etỳ an-dafin’ny ony etỳ, sy Setara-bozenay mbamin’ny namany dia nankatò marina izany teny efa nampitondrain’i Dariosy ho any aminy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nanao ny trano ny loholon’ny Jiosy ka nambinina noho ny faminanian’i Hagay mpaminany sy Zakaria, zanak’Ido. Ary nanao ny trano izy ka nahavita azy, araka ny didin’Andriamanitry ny Isiraely sy araka ny didin’i Kyrosy sy Dariosy ary Artaksersesy, mpanjakan’i Persia. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia vita io trano io tamin’ny andro fahatelo tamin’ny volana Adara tamin’ny taona fahenina nanjakan’i Dariosy mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny Zanak’Isiraely, na ny mpisorona, na ny Levita, na ny olona sisa izay nody avy tamin’ny fahababoana, dia nitokana io tranon’Andriamanitra io tamin’ny fifaliana; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary ny nateriny hitokanana io tranon’Andriamanitra io dia omby zato sy ondrilahy roan-jato sy zanak’ondry efa-jato; ary ny ho fanatitra noho ny ota kosa ho an’ny Isiraely rehetra dia osilahy roa ambin’ny folo, araka ny isan’ny firenen’Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia nanendry ny mpisorona ho amin’ny firazanany avy sy ny Levita ho amin’ny antokony avy izy, hanao ny fanompoana an’Andriamanitra izay any Jerosalema, araka izay voasoratra ao amin’ny bokin’i Mosesy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny olona izay efa nody avy tamin’ny fahababoana dia nitandrina ny Paska tamin’ny andro fahefatra ambin’ny folo tamin’ny volana voalohany; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa ny mpisorona sy ny Levita samy efa nanadio ny tenany rahateo, dia nadio izy rehetra ka namono ny Paska ho an’izay rehetra efa nody avy tamin’ny fahababoana sy ho an’ny mpisorona rahalahiny ary ho an’ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nihinana izany ny Zanak’Isiraely izay efa nody avy tamin’ny fahababoana mbamin’izay rehetra niavaka ho namany ka niala tamin’ny fahalotoan’ny firenena tompon-tany hitady an’i Jehovah, Andriamanitry ny Isiraely, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ka dia nitandrina ny andro firavoravoana fihinanana ny mofo tsy misy masirasira hafitoana tamin’ny fifaliana izy; fa Jehovah efa nampifaly azy ary efa nampiova ny fon’ny mpanjakan’i Asyria hamindra fo aminy ka hampahery ny tànany tamin’ny nanaovany ny tranon’Andriamanitra, dia Andriamanitry ny Isiraely.
