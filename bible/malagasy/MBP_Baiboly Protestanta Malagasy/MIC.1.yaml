document_id: MIC.1,873
type_code: plt
verses:
  '1':
  - type: text
    content: NY tenin’i Jehovah izay tonga tamin’i Mika Morastita tamin’ny andro nanjakan’i Jotama sy Ahaza ary Hezekia, mpanjakan’ny Joda,–dia ilay hitany ny amin’i Samaria sy Jerosalema.
  - type: heading
    content: Ny loza hanjo an’i Samaria sy Joda.
  '10':
  - type: text
    content: Aza ambaranareo any Gata izany,
  - type: text
    content: Aza mitomany akory!
  - type: text
    content: Mihosinkosina
  - type: note
    content: 'Na: Mihosinkosena . . . .hianao.'
  - type: text
    content: ' vovoka ao Betile-afra'
  - type: note
    content: Beti-le-afra = Fitoeram-bovoka.
  - type: text
    content: ' aho.'
  '11':
  - type: text
    content: Mandehana mitanjaka mitondra henatra, ry mponina ao Safira;
  - type: note
    content: Safira = Tsara tarehy.
  - type: text
    content: Tsy mivoaka ny mponina ao Zanana;
  - type: text
    content: Ny fisaonan’i Beti-haezela no misakana anareo tsy hijanona ao.
  '12':
  - type: text
    content: Fa malahelo
  - type: note
    content: Heb. manaintaina.
  - type: text
    content: ' ny soa ny mponina ao Marota,'
  - type: note
    content: Marota = Fangidiana.
  - type: text
    content: Satria loza no efa nidina avy tamin’i Jehovah ho ao am-bavahadin’i Jerosalema.
  '13':
  - type: text
    content: Fehezo amin’ny soavaly haingam-pandeha ny kalesy, ry mponina ao Lakisy;
  - type: text
    content: Niandohan’ny fahotan’i Ziona zanakavavy iny,
  - type: text
    content: Fa tao aminao no nahitana ny fahadisoan’Isiraely.
  '14':
  - type: text
    content: Koa izany no hanomezanao taratasy fisaorana ho an’i Moresetagata;
  - type: text
    content: Ranotrambo ho an’ny mpanjakan’ny Isiraely ireo tranon’i Akziba.
  - type: note
    content: Akziba = Ranotrambo.
  '15':
  - type: text
    content: Mbola hitondrako olon-kandova hianao.
  - type: text
    content: Ry mponina ao Maresa;
  - type: note
    content: Maresa = Lova.
  - type: text
    content: Ho tonga hatrany Adolama aza ny voninahitr’Isiraely.
  '16':
  - type: text
    content: Miheteza sy mikakasa
  - type: text
    content: Noho ny zanakao nahafinaritra;
  - type: text
    content: Halehibiazo ny solanao ho toy ny an’ny volitora,
  - type: note
    content: Karazam-borona lehibe izay sola.
  - type: text
    content: Fa lasan-ko babo niala taminao izy.
  '2':
  - type: text
    content: SAMIA mihaino hianareo, ry firenena rehetra;
  - type: text
    content: Atongilano ny sofinareo, ry tany sy izay zavatra rehetra eo aminy;
  - type: text
    content: Ary aoka Jehovah Tompo no ho vavolombelona hanameloka anareo,
  - type: text
    content: Dia Jehovah avy ao amin’ny tempoliny masina.
  '3':
  - type: text
    content: Fa, indro, Jehovah mivoaka avy ao amin’ny fitoerany
  - type: text
    content: Ary midina ka mandia ny havoana amin’ny tany.
  '4':
  - type: text
    content: Miempo ao ambaniny ny tendrombohitra,
  - type: text
    content: Ary mivava ny lohasaha,
  - type: text
    content: Tahaka ny savoka taninin’ny afo,
  - type: text
    content: Sy tahaka ny rano akorotsaka eny amin’ny hantsana.
  '5':
  - type: text
    content: Noho ny fahadisoan’i Jakoba sy ny fahotan’ny taranak’Isiraely no isian’izany rehetra izany.
  - type: text
    content: Iza no nahadiso an’i Jakoba?
  - type: text
    content: Tsy Samaria va?
  - type: text
    content: Ary iza no fitoerana avon’i Joda?
  - type: text
    content: Tsy Jerosalema va?
  '6':
  - type: text
    content: Koa Samaria dia hataoko korontam-bato any an-tsaha
  - type: text
    content: Sy tany fambolem-boaloboka;
  - type: text
    content: Ary hakorotsako ho any an-dohasaha ny vatony,
  - type: text
    content: Ka haharihariko ny fanorenany.
  '7':
  - type: text
    content: Hotorotoroina ny sampiny voasokitra rehetra,
  - type: text
    content: Ary hodorana amin’ny afo ny tanginy rehetra,
  - type: text
    content: Sady hofoanako ny sampiny rehetra;
  - type: text
    content: Tangin’ny vehivavy janga no nanangonany ireny,
  - type: text
    content: Ary hody ho tangin’ny vehivavy janga indray izy.
  '8':
  - type: text
    content: Koa izany no hitomaniako sy hidradradradrako,
  - type: text
    content: Ka handeha sady horobaina no mitanjaka aho;
  - type: text
    content: Hikaonkaona
  - type: note
    content: Heb. hisaona.
  - type: text
    content: ' toy ny amboadia'
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: ' aho'
  - type: text
    content: Ary hikiakiaka
  - type: note
    content: Heb. hitomany.
  - type: text
    content: ' toy ny ostritsa.'
  '9':
  - type: text
    content: Fa tsy azo sitranina ny ferin’i Samaria;
  - type: note
    content: Heb. ny feriny.
  - type: text
    content: Fa mihatra amin’i Joda izany,
  - type: text
    content: Ary mahatratra ny vavahadin’ny oloko aza, dia any Jerosalema.
