document_id: MIC.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY tenin’i Jehovah izay tonga tamin’i Mika Morastita tamin’ny andro nanjakan’i Jotama sy Ahaza ary Hezekia, mpanjakan’ny Joda,–dia ilay hitany ny amin’i Samaria sy Jerosalema.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny loza hanjo an’i Samaria sy Joda.
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aza ambaranareo any Gata izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mitomany akory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihosinkosina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mihosinkosena . . . .hianao.
      marker-yv: yv-n
    - type: text
      text: ' vovoka ao Betile-afra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Beti-le-afra = Fitoeram-bovoka.
      marker-yv: yv-n
    - type: text
      text: ' aho.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mandehana mitanjaka mitondra henatra, ry mponina ao Safira;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Safira = Tsara tarehy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mivoaka ny mponina ao Zanana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fisaonan’i Beti-haezela no misakana anareo tsy hijanona ao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa malahelo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manaintaina.
      marker-yv: yv-n
    - type: text
      text: ' ny soa ny mponina ao Marota,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Marota = Fangidiana.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria loza no efa nidina avy tamin’i Jehovah ho ao am-bavahadin’i Jerosalema.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fehezo amin’ny soavaly haingam-pandeha ny kalesy, ry mponina ao Lakisy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niandohan’ny fahotan’i Ziona zanakavavy iny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tao aminao no nahitana ny fahadisoan’Isiraely.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Koa izany no hanomezanao taratasy fisaorana ho an’i Moresetagata;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ranotrambo ho an’ny mpanjakan’ny Isiraely ireo tranon’i Akziba.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Akziba = Ranotrambo.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mbola hitondrako olon-kandova hianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mponina ao Maresa;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Maresa = Lova.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tonga hatrany Adolama aza ny voninahitr’Isiraely.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Miheteza sy mikakasa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny zanakao nahafinaritra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halehibiazo ny solanao ho toy ny an’ny volitora,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Karazam-borona lehibe izay sola.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lasan-ko babo niala taminao izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: SAMIA mihaino hianareo, ry firenena rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinareo, ry tany sy izay zavatra rehetra eo aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka Jehovah Tompo no ho vavolombelona hanameloka anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Jehovah avy ao amin’ny tempoliny masina.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa, indro, Jehovah mivoaka avy ao amin’ny fitoerany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary midina ka mandia ny havoana amin’ny tany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Miempo ao ambaniny ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mivava ny lohasaha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny savoka taninin’ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny rano akorotsaka eny amin’ny hantsana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Noho ny fahadisoan’i Jakoba sy ny fahotan’ny taranak’Isiraely no isian’izany rehetra izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nahadiso an’i Jakoba?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Samaria va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no fitoerana avon’i Joda?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Jerosalema va?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Koa Samaria dia hataoko korontam-bato any an-tsaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tany fambolem-boaloboka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hakorotsako ho any an-dohasaha ny vatony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka haharihariko ny fanorenany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hotorotoroina ny sampiny voasokitra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hodorana amin’ny afo ny tanginy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hofoanako ny sampiny rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tangin’ny vehivavy janga no nanangonany ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hody ho tangin’ny vehivavy janga indray izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa izany no hitomaniako sy hidradradradrako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handeha sady horobaina no mitanjaka aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hikaonkaona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hisaona.
      marker-yv: yv-n
    - type: text
      text: ' toy ny amboadia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
    - type: text
      text: ' aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hikiakiaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hitomany.
      marker-yv: yv-n
    - type: text
      text: ' toy ny ostritsa.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa tsy azo sitranina ny ferin’i Samaria;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny feriny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mihatra amin’i Joda izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahatratra ny vavahadin’ny oloko aza, dia any Jerosalema.
