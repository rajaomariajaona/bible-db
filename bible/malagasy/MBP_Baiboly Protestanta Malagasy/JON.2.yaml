document_id: JON.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namonjena an’i Jona, sy ny vavaka aman-tsaotra nataony.
  - type: text
    content: 'ARY Jehovah nanomana hazandrano lehibe hitelina an’i Jona. Ary Jona dia tao an-kibon’ilay hazandrano hateloan’ andro sy hateloan’alina. '
  '10':
  - type: text
    content: Fa izaho, dia feo midera no entiko mamono zavatra hatao fanatitra ho Anao,
  - type: text
    content: Ary izay nivoadiako dia hefaiko;
  - type: text
    content: An’i Jehovah ny famonjena.
  '11':
  - type: text
    content: Ary Jehovah nandidy ilay hazandrano, ka dia naloany ho eny amin’ny tany maina Jona.
  '2':
  - type: text
    content: 'Dia nivavaka tamin’i Jehovah Andriamaniny tao an-kibon’ny hazandrano Jona '
  '3':
  - type: text
    content: 'ka nanao hoe:'
  - type: text
    content: Niantso an’i Jehovah tamin’ny fahoriako aho,
  - type: text
    content: Ka dia namaly ahy Izy;
  - type: text
    content: Tao anatin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' no nitarainako,'
  - type: text
    content: Dia nihaino ny feoko Hianao.
  '4':
  - type: text
    content: Fa efa natsipinao tao amin’ny lalina aho,
  - type: text
    content: Dia tao amin’ny ranomasina,
  - type: text
    content: Ka voasafotry ny riaka aho;
  - type: text
    content: Nanarona ahy ny alon-dranonao sy ny onjanao rehetra.
  '5':
  - type: text
    content: 'Dia hoy izaho: Voaroaka tsy ho eo anatrehanao aho,'
  - type: text
    content: Nefa mbola nanatrika ny tempolinao masina ihany.
  '6':
  - type: text
    content: Ny rano nanarona ahy hatramin’ny aiko,
  - type: text
    content: Ny lalina namefy ahy manodidina;
  - type: text
    content: Ny zava-maniry any an-dranomasina nisingotra manodidina ny lohako.
  '7':
  - type: text
    content: Tafalatsaka tany amin’ny fanambanin’ny tendrombohitra aho;
  - type: text
    content: Ny hidin’ny tany nanidy ahy mandrakizay;
  - type: text
    content: Nefa nampiakatra ny aiko avy tao an-davaka Hianao, Jehovah Andriamanitro ô.
  '8':
  - type: text
    content: Raha reraka tato anatiko ny fanahiko,
  - type: text
    content: Dia nahatsiaro an’i Jehovah aho;
  - type: text
    content: Ka tonga tao aminao ny fivavako,
  - type: text
    content: Dia tao amin’ny tempolinao masina.
  '9':
  - type: text
    content: Izay mivavaka amin’ny sampy
  - type: note
    content: Heb. zava-poana mandainga.
  - type: text
    content: Dia mahafoy Izay Mpamindra fo aminy;
  - type: note
    content: Heb. ny famindrampony.
