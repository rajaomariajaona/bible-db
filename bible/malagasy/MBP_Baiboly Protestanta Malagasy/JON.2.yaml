document_id: JON.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namonjena an’i Jona, sy ny vavaka aman-tsaotra nataony.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah nanomana hazandrano lehibe hitelina an’i Jona. Ary Jona dia tao an-kibon’ilay hazandrano hateloan’ andro sy hateloan’alina. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nivavaka tamin’i Jehovah Andriamaniny tao an-kibon’ny hazandrano Jona '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niantso an’i Jehovah tamin’ny fahoriako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia namaly ahy Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao anatin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' no nitarainako,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nihaino ny feoko Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa efa natsipinao tao amin’ny lalina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tao amin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka voasafotry ny riaka aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanarona ahy ny alon-dranonao sy ny onjanao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izaho: Voaroaka tsy ho eo anatrehanao aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa mbola nanatrika ny tempolinao masina ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny rano nanarona ahy hatramin’ny aiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny lalina namefy ahy manodidina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zava-maniry any an-dranomasina nisingotra manodidina ny lohako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tafalatsaka tany amin’ny fanambanin’ny tendrombohitra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hidin’ny tany nanidy ahy mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa nampiakatra ny aiko avy tao an-davaka Hianao, Jehovah Andriamanitro ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha reraka tato anatiko ny fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nahatsiaro an’i Jehovah aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tonga tao aminao ny fivavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tao amin’ny tempolinao masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mivavaka amin’ny sampy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zava-poana mandainga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mahafoy Izay Mpamindra fo aminy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny famindrampony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izaho, dia feo midera no entiko mamono zavatra hatao fanatitra ho Anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay nivoadiako dia hefaiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: An’i Jehovah ny famonjena.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary Jehovah nandidy ilay hazandrano, ka dia naloany ho eny amin’ny tany maina Jona.
