document_id: GEN.47,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahazoan’Isiraely sy ny ankohonany fonenana tsara tao Gosena, ary ny nanjo ny Egyptiana noho ny hamafin’ny mosary.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Josefa nankao amin’i Farao ka nilaza taminy hoe: Ny raiko sy ny rahalahiko ary ny ondry aman-osiny sy ny ombiny mbamin’izay rehetra ananany dia efa tonga avy tany amin’ny tany Kanana; ka, indreo, ao amin’ny tany Gosena izy.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jakoba, rehefa nisaotra an’i Farao, dia lasa niala teo anatrehany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namponenin’i Josefa ny rainy sy ny rahalahiny ka nomeny zara-tany tao amin’ny tany Egypta, dia tao amin’ny tany tsara indrindra, tao amin’ny tany Ramesesa, araka izay efa nandidian’i Farao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia novelomin’i Josefa tamin’ny hanina ny rainy sy ny rahalahiny mbamin’ny ankohonan’ny rainy rehetra, araka ny isan’ny zanany avy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nisy hanina teo amin’ny tany rehetra; fa mafy indrindra ny mosary, ka efa reraka ny tany Egypta sy ny tany Kanana noho ny mosary. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nangonin’i Josefa ny vola rehetra izay hita tany amin’ny tany Egypta sy tany amin’ny tany Kanana, dia izay vidin’ny vary novidin’ny olona, ka nampidirin’i Josefa tao an-tranon’i Farao ny vola.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa lany avokoa ny vola tany amin’ny tany Egypta sy tany amin’ny tany Kanana, dia nankeo amin’i Josefa ny Egyptiana rehetra ka nanao hoe: Omeo hanina izahay; fa nahoana no dia ho faty eto anatrehanao izahay? fa efa lany avokoa ny vola. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy kosa Josefa: Omeo ny omby aman-ondrinareo hotakalozako, raha lany ny vola. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentiny tany amin’i Josefa ny omby aman-ondriny, ka notakalozan’i Josefa hanina ny soavaliny sy ny ondry aman-osiny ary ny ombiny sy ny borikiny; dia nomeny hanina izy tamin’izany taona izany ho takalon’ny bibiny rehetra.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tapitra izany taona izany, dia nankeo aminy indray ny olona tamin’ny taona faharoa ka nanao taminy hoe: Tsy azonay afenina amin’itompokolahy fa efa lany ny vola, ary efa lasan’itompokolahy avokoa ny biby fiompy; tsy misy na inona na inona intsony eto imason’itompokolahy afa-tsy ny tenanay sy ny taninay; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nahoana no dia ho faty izahay eto anatrehanao, dia izahay sy ny taninay? Takalozy hanina ny tenanay sy ny taninay, dia ho mpanompon’i Farao izahay sy ny taninay: ary omeo voa hafafy izahay, mba ho velona, fa tsy ho faty, ary mba tsy ho lao ny tany.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny dimy lahy tamin’ny rahalahiny no nalainy ka nentiny teo anatrehan’i Farao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia notakalozan’i Josefa ho an’i Farao ny tany Egypta rehetra; fa ny Egyptiana samy nanakalo ny sahany avy, satria resy mosary izy; ary dia lasan’i Farao ny tany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona dia nafindrany ho ao amin’ny tanàna hatramin’ny faran’ny faritr’i Egypta rehetra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tanin’ny mpisorona ihany no tsy mba natakalony; fa nanana anjara tamin’i Farao ny mpisorona ka nihinana ny anjara izay nomen’i Farao azy; izany no tsy nanakalozany ny taniny.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Josefa tamin’ny olona: Indro, efa voavidiko andro-any hianareo sy ny taninareo ho an’i Farao; koa indreny ny voa hafafinareo, dia hofafazanareo ny tany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa misy vokatra, dia haterinareo ho an’i Farao ny ampahadiminy; ary ho anareo kosa ny efa-toko, ho voa hafafy any an-tsaha sy hohaninareo mbamin’izay ao an-tranonareo ary hohanin’ny zanakareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy: Efa namonjy ny ainay hianao; aoka mba hahita fitia eto imason’itompokolahy izahay, dia ho mpanompon’i Farao.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataon’i Josefa ho lalàna tany amin ny tany Egypta mandraka androany izany; fa ho an’i Farao ny ampahadiminy; fa ny tanin’ny mpisorona ihany no tsy mba lasan’i Farao.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nonina tao amin’ny tany Egypta ny Isiraely, dia tao amin’ny tany Gosena; ary nahazo zara-tany tao izy, dia nihamaro anaka ka nihabetsaka indrindra.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny andro niainan’i Jakoba tao amin’ny tany Egypta dia fito ambin’ny folo taona; koa ny andro rehetra niainan’i Jakoba dia fito amby efa-polo amby zato taona.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa antomotra ny andro hahafatesan’Isiraely, dia nampaka an’i Josefa zanany izy ka nanao taminy hoe: Raha mba nahita fitia eo imasonao aho, masìna hianao, ataovy ato ambanin’ny feko ny tànanao, ka ataovy amiko izay soa sy izay marina; masìna hianao aza alevina atỳ Egypta aho. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Farao tamin’ireo rahalahin’i Josefa: Inona moa no raharaha fanaonareo? Dia hoy izy tamin’i Farao: Mpiandry ondry izahay mpanomponao hatramin’ny razanay. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa lasa mody mandry any amin’ny razako aho, dia ho entinao hiala atỳ Egypta ka halevinao ao amin’ny fasany. Dia hoy Josefa: Hanao araka ny teninao aho. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jakoba: Mianiàna ary amiko. Dia nianiana taminy izy. Dia niankohoka teo an-dohan’ny farafara Isiraely.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa izy tamin’i Farao: Mba hivahiny eto amin’ity tany ity no nihavianay; fa tsy misy ahitra ho an’ny ondry aman-osin’ny mpanomponao, fa mafy ny mosary any amin’ny tany Kanana; koa ankehitriny, trarantitra hianao, aoka mba honina ao amin’ny tany Gosena ny mpanomponao.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Farao dia niteny tamin’i Josefa ka nanao hoe: Ny rainao sy ny rahalahinao efa tonga atỳ aminao; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny tany Egypta dia eo anoloanao; koa amin’izay tany tsara indrindra no amponeno ny rainao sy ny rahalahinao; aoka honina ao amin’ny tany Gosena izy ary raha fantatrao fa misy lehilahy mahay eo aminy, tendreo izy ho lehiben’ny mpiandry ny omby aman-ondriko.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentin’i Josefa ho eo anatrehan’i Farao Jakoba rainy; ary Jakoba dia nisaotra an’i Farao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Farao tamin’i Jakoba: Firy taona moa no andro niainanao? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jakoba tamin’i Farao: Telo-polo amby zato taona no andro nivahiniako; sady vitsy no ratsy ny andro niainako ka tsy nahatratra ny andro niainan’ny razako tamin’ny andro nivahiniany. '
