document_id: PRO.28
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny ratsy fanahy mandositra, na dia tsy misy manenjika aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny marina kosa dia matoky toy ny liona tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fahotan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fikomian’.
    marker-yv: yv-n
  - type: text
    text: ' ny tany mahamaro mpanapaka;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fisian’ny olona manan-tsaina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manan-tsaina sady mahalala rariny.
    marker-yv: yv-n
  - type: text
    text: ' kosa no mampahateza ny fanjakana.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa noho ny manan-tsaina no haharetan’ny fahamarinana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny malahelo izay mampahory ny mahantra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy ny ranonorana izay manindao ka tsy maha-misy hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay mahafoy ny lalàna dia mandoka ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mitandrina ny lalàna dia mirehitra amin’ny fanoherana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny ratsy fanahy dia tsy mahalala rariny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mitady an’i Jehovah no mahalala ny zavatra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny malahelo izay mandeha amin’ny fahitsiany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsara noho ny manan-karena izay mivadika ka mandeha amin’ny làlana miolikolika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay mitandrina ny lalàna no zanaka hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay misakaiza amin’ny mpandany harena dia manome henatra ny rainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mampitombo ny fananany amin’ny zana-bola sy ny tombony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mamory ho an’izay miantra ny malahelo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay manentsin-tadìny tsy hihaino ny lalàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny fivavahany aza dia fahavetavetana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mampivily ny mahitsy ho amin’ny làlan-dratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho lavo amin’ny lavaka nataony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tsy misy tsiny no handova ny soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny manan-karena manao azy ho hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny malahelo izay manan-tsaina dia hizaha toetra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha ravoravo ny marina, dia be ny famirapiratana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha misandratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mitsangana.
    marker-yv: yv-n
  - type: text
    text: ' kosa ny ratsy fanahy, dia miery ny vahoaka.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay manafina ny fahotany tsy hambinina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mitsotra ka mahafoy azy no hahazo famindrampo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sambatra izay olona matahotra mandrakariva;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay manamafy ny fony no hidiran-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Liona mierona sy bera miremby
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanapaka ratsy fanahy amin’ny olona reraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny mpanapaka tsy ampy saina dia mahery mampahory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mankahala ny fieremana no ho ela velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay itambesaran-keloka noho ny fandatsahan-dra dia handositra hatrany an-davaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hisy hihazona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay mandeha tsy misy tsiny no ho voavonjy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mivadika ka mandeha amin’ny làlana miolikolika no ho lavo tampoka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay miasa ny taniny dia ho voky hanina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay manaraka ny olom-poana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny zava-poana.
    marker-yv: yv-n
  - type: text
    text: ' ho voky alahelo kosa.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay olona mahatoky tokoa dia ho be fitahiana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay maimay ta-hanan-karena dia tsy maintsy hohelohina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy mety raha mizaha tavan’olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa na dia amin’ny sombin-kanina ihany aza dia sahin’ny olona hanotana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny mpialona dia maimay ta-hanan-karena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy fantany fa hanjo azy ny alahelo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay mananatra olona no hahazo fitia be rahatrizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho izay mandrobo amin’ny lelany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Izay mandroba ray sy reny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao hoe: Tsy heloka izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia naman’ny mpanimba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay mierina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miavonavona am-po.
    marker-yv: yv-n
  - type: text
    text: ' manetsika ady;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay matoky an’i Jehovah dia hohatavezina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay matoky ny fony dia adala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mandeha amin’ny fahendrena no ho afa-miala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay manome ny malahelo tsy hanan-java-mahory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay mitampi-maso hahazo ozona be;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha misandratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mitsangana.
    marker-yv: yv-n
  - type: text
    text: ' ny ratsy fanahy, dia miery ny vahoaka;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha ringana kosa izy, dia mihamaro ny marina.
