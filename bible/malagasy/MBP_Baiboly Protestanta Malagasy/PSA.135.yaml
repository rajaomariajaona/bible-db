document_id: PSA.135,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny heriny sy ny nitondrany ny Isiraely, ary filazana ny mahatsinontsinona ny sampy.
  - type: text
    content: HALELOIA.
  - type: text
    content: Miderà ny anaran’i Jehovah;
  - type: text
    content: Miderà, hianareo mpanompon’i Jehovah,–
  '10':
  - type: text
    content: Dia Ilay namely ny jentilisa maro
  - type: text
    content: Ka nahafaty mpanjaka mahery,
  '11':
  - type: text
    content: Dia Sihona, mpanjakan’ny Amorita,
  - type: text
    content: Sy Oga, mpanjakan’i Basana,
  - type: text
    content: Ary ny fanjakan’i Kanana rehetra;
  '12':
  - type: text
    content: Ary ny taniny nomeny ho lova,
  - type: text
    content: Eny, ho lovan’ny Isiraely olony.
  '13':
  - type: text
    content: Jehovah ô, mandrakizay ny anaranao;
  - type: text
    content: Jehovah ô, hihatra amin’ny taranaka fara mandimby ny fahatsiarovana Anao.
  '14':
  - type: text
    content: Fa hanome rariny ny olony Izy
  - type: text
    content: Ary hanenina ny amin’ny mpanompony.
  '15':
  - type: text
    content: Ny sampin’ny jentilisa dia volafotsy sy volamena,
  - type: text
    content: Asan’ny tànan’olona;
  '16':
  - type: text
    content: Manam-bava izy, fa tsy miteny;
  - type: text
    content: Mana-maso izy, fa tsy mahita;
  '17':
  - type: text
    content: Manan-tsofina izy, fa tsy mandre;
  - type: text
    content: Ary tsy misy fofonaina ao am-bavany.
  '18':
  - type: text
    content: Ho tahaka azy izay manao azy
  - type: text
    content: Sy izay rehetra matoky azy.
  '19':
  - type: text
    content: Misaora an’i Jehovah, ry taranak’Isiraely;
  - type: text
    content: Misaora an’i Jehovah, ry taranak’i Arona;
  '2':
  - type: text
    content: Hianareo izay mpitoetra ao an-tranon’i Jehovah,
  - type: text
    content: Eo anatin’ny kianjan’ny tranon’Andriamanitsika.
  '20':
  - type: text
    content: Misaora an’i Jehovah, ry taranak’i Levy;
  - type: text
    content: Hianareo izay matahotra an’i Jehovah,
  - type: text
    content: Misaora an’i Jehovah.
  '21':
  - type: text
    content: Isaorana avy any Ziona anie Jehovah,
  - type: text
    content: Izay mitoetra any Jerosalema.
  - type: text
    content: Haleloia.
  '3':
  - type: text
    content: Miderà an’i Jehovah, fa tsara Izy;
  - type: text
    content: Mankalazà ny anarany, fa mahafinaritra izany.
  '4':
  - type: text
    content: Fa Jakoba nofidin’i Jehovah ho Azy,
  - type: text
    content: Ary Isiraely ho rakitra soa ho Azy.
  '5':
  - type: text
    content: Fa fantatro fa lehibe Jehovah,
  - type: text
    content: Ary ambonin’ny andriamanitra rehetra ny Tompontsika.
  '6':
  - type: text
    content: Manao izay sitrapony rehetra Jehovah,
  - type: text
    content: Na any amin’ny lanitra, na etỳ ambonin’ny tany,
  - type: text
    content: Na any amin’ny ranomasina sy ny rano lalina rehetra.
  '7':
  - type: text
    content: Mampiakatra zavona avy amin’ny faran’ny tany Izy;
  - type: text
    content: Manao helatra arahin-dranonorana Izy;
  - type: text
    content: Mamoaka ny rivotra avy ao an-trano fitehirizany Izy,
  '8':
  - type: text
    content: Dia Ilay namely ny voalohan-terak’i Egypta,
  - type: text
    content: Na olona, na biby.
  '9':
  - type: text
    content: Nanatitra famantarana sy fahagagana teo aminao Izy, ry Egypta ô,
  - type: text
    content: Eny, tamin’i Farao sy ny mpanompony rehetra,
