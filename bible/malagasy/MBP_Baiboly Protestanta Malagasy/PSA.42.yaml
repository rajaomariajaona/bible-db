document_id: PSA.42,873
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHAROA
  - type: heading
    content: Faniriana an’Andriamanitra raha lavitra an’i Ziona.
  - type: text
    content: Ho an’ny mpiventy hira. Maskila. Nataon’ny Koraïta.
  - type: text
    content: TAHAKA ny diera mihanahana maniry ny rano an-ony
  - type: text
    content: No anirian’ny fanahiko Anao, Andriamanitra ô.
  '10':
  - type: text
    content: Toy ny zavatra mahatorotoro ny taolako no fandàtsan’ny fahavaloko ahy,
  - type: text
    content: 'Ka hoy izy isan-andro: Aiza izay Andriamanitrao?'
  '11':
  - type: text
    content: Nahoana no mitanondrika hianao, ry fanahiko? ary nahoana no mitoloko ato anatiko hianao?
  - type: text
    content: Manantenà an’Andriamanitra, fa mbola hidera Azy ihany aho,
  - type: text
    content: Izy no famonjena ny tavako sady Andriamanitro.
  '2':
  - type: text
    content: Mangetaheta an’Andriamanitra ny fanahiko, dia Andriamanitra velona;
  - type: text
    content: Rahoviana no ho tonga aho ka hiseho eo anatrehan’Andriamanitra?
  '3':
  - type: text
    content: Ny ranomasoko no fiahiko andro aman-alina,
  - type: text
    content: 'Amin’ny anaovany ahy mandrakariva hoe: Aiza izay Andriamanitrao?'
  '4':
  - type: text
    content: Izao zavatra izao no hotsarovako, ka haidiko ato anatiko ny fanahiko,
  - type: text
    content: Dia ny nandrosoako niaraka tamin’ny maro, sy ny nitarihako azy ho any an-tranon’Andriamanitra,
  - type: text
    content: Nanao feo mihoby sy midera, dia olona maro izay nitandrina ny andro firavoravoana.
  '5':
  - type: text
    content: Nahoana no mitanondrika hianao, ry fanahiko, ka mitoloko ato anatiko?
  - type: text
    content: Manantenà an’Andriamanitra hianao, fa mbola hidera Azy ihany aho
  - type: text
    content: Noho ny famonjen’ny tavany.
  '6':
  - type: text
    content: Andriamanitro ô, mitanondrika ato anatiko ny fanahiko;
  - type: text
    content: Izany no ahatsiarovako Anao eo amin’ny tanin’i Jordana
  - type: text
    content: Sy amin’ireo Hermona ary amin’ny tendrombohitra Mizara.
  '7':
  - type: text
    content: Ny lalina miantso ny lalina noho ny firohondrohon’ny riananao;
  - type: text
    content: Ny onjanao rehetra sy ny alon-dranonao efa nanafotra ahy.
  '8':
  - type: text
    content: Jehovah handidy ny famindrampony nony andro,
  - type: text
    content: Ary ho amiko nony alina ny fihirana Azy, dia vavaka amin’Andriamanitry ny aiko.
  '9':
  - type: text
    content: 'Hoy izaho amin’Andriamanitra Vatolampiko: Nahoana no nanadino ahy Hianao?'
  - type: text
    content: Nahoana no mandeha mijoretra aho noho ny fampahorian’ny fahavaloko?
