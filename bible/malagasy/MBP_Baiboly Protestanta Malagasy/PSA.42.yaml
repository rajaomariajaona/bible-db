document_id: PSA.42,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOKY FAHAROA
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faniriana an’Andriamanitra raha lavitra an’i Ziona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Maskila. Nataon’ny Koraïta.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TAHAKA ny diera mihanahana maniry ny rano an-ony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No anirian’ny fanahiko Anao, Andriamanitra ô.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toy ny zavatra mahatorotoro ny taolako no fandàtsan’ny fahavaloko ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hoy izy isan-andro: Aiza izay Andriamanitrao?'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nahoana no mitanondrika hianao, ry fanahiko? ary nahoana no mitoloko ato anatiko hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manantenà an’Andriamanitra, fa mbola hidera Azy ihany aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no famonjena ny tavako sady Andriamanitro.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mangetaheta an’Andriamanitra ny fanahiko, dia Andriamanitra velona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rahoviana no ho tonga aho ka hiseho eo anatrehan’Andriamanitra?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny ranomasoko no fiahiko andro aman-alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Amin’ny anaovany ahy mandrakariva hoe: Aiza izay Andriamanitrao?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izao zavatra izao no hotsarovako, ka haidiko ato anatiko ny fanahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny nandrosoako niaraka tamin’ny maro, sy ny nitarihako azy ho any an-tranon’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanao feo mihoby sy midera, dia olona maro izay nitandrina ny andro firavoravoana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nahoana no mitanondrika hianao, ry fanahiko, ka mitoloko ato anatiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manantenà an’Andriamanitra hianao, fa mbola hidera Azy ihany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny famonjen’ny tavany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Andriamanitro ô, mitanondrika ato anatiko ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no ahatsiarovako Anao eo amin’ny tanin’i Jordana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ireo Hermona ary amin’ny tendrombohitra Mizara.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny lalina miantso ny lalina noho ny firohondrohon’ny riananao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny onjanao rehetra sy ny alon-dranonao efa nanafotra ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jehovah handidy ny famindrampony nony andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho amiko nony alina ny fihirana Azy, dia vavaka amin’Andriamanitry ny aiko.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hoy izaho amin’Andriamanitra Vatolampiko: Nahoana no nanadino ahy Hianao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mandeha mijoretra aho noho ny fampahorian’ny fahavaloko?
