document_id: 1SA.12
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny anatra nataon’i Samoela tamin’ny Isiraely noho ny nangatahany mpanjaka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY hoy Samoela tamin’ny Isiraely rehetra: Indro, efa nihaino ny teninareo aho tamin’izay rehetra nolazainareo tamiko ka efa nanendry mpanjaka hanjaka aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ankehitriny, indro, ny mpanjaka mandeha eo anatrehanareo; fa izaho efa antitra sy fotsy volo; koa, indreo, eo aminareo ny zanako, ary izaho efa nandeha teo anatrehanareo hatry ny fony vao zaza ka mandraka andro-any. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa inty aho; tondroy maso eto anatrehan’i Jehovah sy ny voahosony aho: ombin’iza moa no nalaiko? na borikin’iza no nalaiko? na an’iza no nanaovako ankeriny? na iza no nampahoriko? na teo an-tànan’iza no nandraisako kolikoly hahatampina ny masoko?–fa honerako aminareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ireo: Hianao tsy nanao an-keriny taminay, na nampahory anay, na naka zavatra teny an-tànan’olona na dia iray akory aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy Samoela taminy: Vavolombelona aminareo anio Jehovah, ary vavolombelona koa ny voahosony, fa tsy nisy zavatra hitanareo teo an-tànako na inona na inona. Dia hoy ireo: Eny, vavolombelona Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Samoela tamin’ny olona: Jehovah no nanendry an’i Mosesy sy Arona, ary nitondra ny razanareo niakatra avy tany amin’ny tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ankehitriny avia hianareo, fa hifandahatra aminareo eto anatrehan’i Jehovah aho ny amin’ny asa marina rehetra izay nataon’i Jehovah taminareo sy ny razanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehefa tonga tany Egypta Jakoba, ka nitaraina tamin’i Jehovah ny razanareo, Jehovah dia naniraka an’i Mosesy sy Arona, ka ireo no nitondra ny razanareo nivoaka avy tany Egypta ary namponina azy teto amin’ity tany ity. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa raha nanadino an’i Jehovah Andriamaniny izy, dia namidiny ho eo an-tànan’i Sisera, komandin’ny miaramilan’i Hazora, sy ho eo an-tànan’ny Filistina ary ho eo an-tànan’ny mpanjakan’i Moaba, ka niadian’ireo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nitaraina tamin’i Jehovah izy ka nanao hoe: Efa nanota izahay, fa efa nahafoy an’i Jehovah ka nanompo ireo Bala sy Astarta, nefa ankehitriny vonjeo amin’ny tànan’ny fahavalonay izahay, dia hanompo Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary Jehovah efa naniraka an’i Jerobala sy Bedana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Baraka].'
    marker-yv: yv-n
  - type: text
    text: ' sy Jefta ary Samoela, ka namonjy anareo tamin’ ny tànan’ny fahavalonareo manodidina Izy, dia nandry fahizay hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanjo nony hitanareo fa avy hiady taminareo Nahasy, mpanjakan’ny Amonita, dia hoy hianareo tamiko: Tsia, fa aoka hisy mpanjaka hanjaka aminay; kanefa Jehovah Andriamanitrareo no mpanjakanareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa ankehitriny, indro ny mpanjaka izay nofidinareo sy nangatahinareo; ary indro fa Jehovah nanome mpanjaka hanjaka aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Enga anie ka hatahotra an’i Jehovah sy hanompo Azy ary hihaino ny feony ka tsy handà ny didiny hianareo, fa samy hanaraka an’i Jehovah Andriamanitrareo hianareo sy ny mpanjaka izay manjaka aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha tsy mihaino ny tenin’i Jehovah kosa hianareo, fa mandà ny didiny, dia hamely anareo ny tànan’i Jehovah tahaka ny namelezany ny razanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa mitsangàna ankehitriny, ka jereo izao zavatra lehibe hataon’i Jehovah eto imasonareo izao: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moa tsy taom-pijinjana vary tritika va izao? Hiantso an’i Jehovah aho, ary hahatonga kotrokorana sy orana Izy, dia ho hitanareo sy ho fantatrareo fa lehibe ny ratsy nataonareo teo imason’i Jehovah, satria nangataka mpanjaka hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Samoela niantso an’i Jehovah, ary Jehovah nahatonga kotrokorana sy orana tamin’izany andro izany; ary ny vahoaka rehetra dia natahotra an’i Jehovah sy Samoela indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ny vahoaka rehetra tamin’i Samoela: Mangataha amin’i Jehovah Andriamanitrao ho an’ny mpanomponao, fandrao maty izahay! fa efa nanao izao ratsy izao izahay ho fanampin’ny fahotanay rehetra, satria nangataka mpanjaka ho anay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Samoela tamin’ny vahoaka: Aza matahotra; efa nanao izany ratsy rehetra izany tokoa hianareo; kanefa aza mivily tsy hanaraka an’i Jehovah; fa manompoa Azy amin’ny fonareo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Eny, aza mivily; fa manaraka ireo zava-poana hianareo, izay tsy mahasoa na mahavonjy; fa zava-poana ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Jehovah tsy hahafoy ny olony noho ny anarany lehibe, satria sitrak’i Jehovah ny nanaovany anareo ho olony. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny amiko, sanatria raha hanota amin’i Jehovah aho ka hitsahatra tsy hangataka ho anareo; fa izaho hanoro anareo izay làlana tsara sy mahitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Kanefa matahora an’i Jehovah hianareo, ka manompoa Azy marina amin’ny fonareo rehetra; fa eritrereto izao zavatra lehibe nataony ho anareo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa raha mbola manao ratsy ihany hianareo, dia haringana hianareo sy ny mpanjakanareo koa.
