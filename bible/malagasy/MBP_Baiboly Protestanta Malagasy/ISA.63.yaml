document_id: ISA.63,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hamaliana an’i Edoma sy ny jentilisa sasany koa.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: IZA moa Ity avy any Edoma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia avy any Bozra, ka mena mangatrakatraka ny fitafiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Ity Izay mareva-pitafiana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy miandranandrana amin’ny haben’ny heriny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho Izay mitory fahamarinana sady manan-kery hamonjy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ireo kosa dia niodina ka nanome alahelo ny Fanahy Masiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tonga fahavalony Izy ka niady taminy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olony dia nahatsiaro ny andro taloha ela, dia ny tamin’i Mosesy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza Ilay nitondra azy mbamin’ny mpiandry ondriny niakatra avy tamin’ny ranomasina?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza Ilay nametraka ny Fanahy Masiny tao aminy,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Ilay nampandeha ny sandriny be voninahitra teo ankavanan’i Mosesy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampisaraka ny ranomasina teo anoloany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hanaovany anarana mandrakizay ho Azy,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Ilay nitondra azy nita ny rano lalina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fandehan’ny soavaly eny an-tany lemaka, ka tsy tafintohina izy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fidinan’ny biby fiompy ho any an-dohasaha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No nanomezan’ny Fanahin’i Jehovah fitsaharana ho azy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka izany no nitondranao ny olonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hanaovana anarana be voninahitra ho Anao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsinjova eny an-danitra, ary mijere eny amin’ny fonenan’ny fahamasinanao sy ny voninahitrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ny fahasaro-piaronao sy ny asanao lehibe?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fandevilevin’ny kibonao sy ny famindramponao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia voasakana tsy ho amiko.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa Hianao no Rainay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Abrahama tsy mahalala anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Isiraely tsy mahafantatra anay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, Hianao no Rainay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Mpanavotra anay no anaranao hatrizay hatraizay.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, nahoana no nampiala anay tamin’ny làlanao Hianao ka nampaniasia anay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nanamafy ny fonay tsy hatahotra Anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miverena noho ny amin’ny mpanomponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny firenena lovanao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vetivety foana no nananan’ny olonao masina '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahavalonay efa nanitsaka ny fitoeranao masina.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tonga hoatra izay tsy notapahinao hatrizay hatrizay izahay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy mba nantsoina tamin’ny anaranao akory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka hotriarinao ny lanitra mba hidinanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hihorohoro
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hiempo.
      marker-yv: yv-n
    - type: text
      text: ' eo anoloanao ny tendrombohitra–'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mena ny fitafianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny akanjonao no tahaka ny an’izay manosihosy ny famiazam-boaloboka?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanosihosy ny famiazam-boaloboka irery Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mba nisy niaraka tamiko ny avy tamin’ny firenena na dia iray akory aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanitsaka ireny tamin’ny fahatezerako Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nanosihosy azy tamin’ny fahavinirako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nipitipitihan’ny rany ny fitafiako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka voalotoko ny akanjoko rehetra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa ato am-poko ny andro hamaliako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tonga ny taonan’ny voàvotro.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nitsinjo Aho, nefa tsy nisy hamonjy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary talanjona Aho, satria tsy nisy hanohana,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ny sandriko ihany no nanao famonjena ho Ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahavinirako no nanohana Ahy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanitsaka firenena tamin’ny fahatezerako Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nampahaleony azy tamin’ny fahavinirako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nandatsaka ny rany tamin’ny tany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fivavahana sy fiaiken-keloka ary fiderana noho ny famonjen’Andriamanitra hatramin’ny taloha.
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY famindrampon’i Jehovah no hambarako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fiderana an’i Jehovah araka izay rehetra nataony tamintsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny haben’ny fahasoavana tamin’ny taranak’Isiraely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nomeny azy araka ny fiantrany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy araka ny haben’ny famindrampony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy Izy: Oloko tokoa ireo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia zanaka tsy mba handainga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tonga Mpamonjy azy Izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny fahoriany rehetra dia niory koa Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Ilay Anjelin’ny tavany no namonjy ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitiavany sy ny famindrampony no nanavotany azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nivimbinany azy ary nitondrany azy tamin’ny andro taloha ela rehetra.
