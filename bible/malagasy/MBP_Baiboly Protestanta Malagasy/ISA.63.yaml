document_id: ISA.63,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hamaliana an’i Edoma sy ny jentilisa sasany koa.
  - type: text
    content: IZA moa Ity avy any Edoma,
  - type: text
    content: Dia avy any Bozra, ka mena mangatrakatraka ny fitafiany,
  - type: text
    content: Dia Ity Izay mareva-pitafiana
  - type: text
    content: Sy miandranandrana amin’ny haben’ny heriny?
  - type: text
    content: Izaho Izay mitory fahamarinana sady manan-kery hamonjy.
  '10':
  - type: text
    content: Fa ireo kosa dia niodina ka nanome alahelo ny Fanahy Masiny;
  - type: text
    content: Dia tonga fahavalony Izy ka niady taminy.
  '11':
  - type: text
    content: Ary ny olony dia nahatsiaro ny andro taloha ela, dia ny tamin’i Mosesy.
  - type: text
    content: Aiza Ilay nitondra azy mbamin’ny mpiandry ondriny niakatra avy tamin’ny ranomasina?
  - type: text
    content: Aiza Ilay nametraka ny Fanahy Masiny tao aminy,
  '12':
  - type: text
    content: Dia Ilay nampandeha ny sandriny be voninahitra teo ankavanan’i Mosesy
  - type: text
    content: Ka nampisaraka ny ranomasina teo anoloany,
  - type: text
    content: Mba hanaovany anarana mandrakizay ho Azy,
  '13':
  - type: text
    content: Dia Ilay nitondra azy nita ny rano lalina,
  - type: text
    content: Tahaka ny fandehan’ny soavaly eny an-tany lemaka, ka tsy tafintohina izy?
  '14':
  - type: text
    content: Tahaka ny fidinan’ny biby fiompy ho any an-dohasaha
  - type: text
    content: 'No nanomezan’ny Fanahin’i Jehovah fitsaharana ho azy:'
  - type: text
    content: Tahaka izany no nitondranao ny olonao,
  - type: text
    content: Mba hanaovana anarana be voninahitra ho Anao.
  '15':
  - type: text
    content: Mitsinjova eny an-danitra, ary mijere eny amin’ny fonenan’ny fahamasinanao sy ny voninahitrao;
  - type: text
    content: Aiza ny fahasaro-piaronao sy ny asanao lehibe?
  - type: text
    content: Ny fandevilevin’ny kibonao sy ny famindramponao
  - type: text
    content: Dia voasakana tsy ho amiko.
  '16':
  - type: text
    content: Kanefa Hianao no Rainay,
  - type: text
    content: Fa Abrahama tsy mahalala anay,
  - type: text
    content: Ary Isiraely tsy mahafantatra anay,
  - type: text
    content: Jehovah ô, Hianao no Rainay,
  - type: text
    content: Ary Mpanavotra anay no anaranao hatrizay hatraizay.
  '17':
  - type: text
    content: Jehovah ô, nahoana no nampiala anay tamin’ny làlanao Hianao ka nampaniasia anay
  - type: text
    content: Sady nanamafy ny fonay tsy hatahotra Anao?
  - type: text
    content: Miverena noho ny amin’ny mpanomponao,
  - type: text
    content: Dia ny firenena lovanao.
  '18':
  - type: text
    content: 'Vetivety foana no nananan’ny olonao masina '
  - type: text
    content: ny tany;
  - type: text
    content: Ny fahavalonay efa nanitsaka ny fitoeranao masina.
  '19':
  - type: text
    content: Efa tonga hoatra izay tsy notapahinao hatrizay hatrizay izahay
  - type: text
    content: Sady tsy mba nantsoina tamin’ny anaranao akory.
  - type: text
    content: Enga anie ka hotriarinao ny lanitra mba hidinanao,
  - type: text
    content: Ka hihorohoro
  - type: note
    content: 'Na: hiempo.'
  - type: text
    content: ' eo anoloanao ny tendrombohitra–'
  '2':
  - type: text
    content: Nahoana no mena ny fitafianao,
  - type: text
    content: Ary ny akanjonao no tahaka ny an’izay manosihosy ny famiazam-boaloboka?
  '3':
  - type: text
    content: Nanosihosy ny famiazam-boaloboka irery Aho;
  - type: text
    content: Fa tsy mba nisy niaraka tamiko ny avy tamin’ny firenena na dia iray akory aza;
  - type: text
    content: Nanitsaka ireny tamin’ny fahatezerako Aho
  - type: text
    content: Sy nanosihosy azy tamin’ny fahavinirako,
  - type: text
    content: Dia nipitipitihan’ny rany ny fitafiako,
  - type: text
    content: Ka voalotoko ny akanjoko rehetra.
  '4':
  - type: text
    content: Fa efa ato am-poko ny andro hamaliako,
  - type: text
    content: Ary tonga ny taonan’ny voàvotro.
  '5':
  - type: text
    content: Nitsinjo Aho, nefa tsy nisy hamonjy,
  - type: text
    content: Ary talanjona Aho, satria tsy nisy hanohana,–
  - type: text
    content: Ka dia ny sandriko ihany no nanao famonjena ho Ahy,
  - type: text
    content: Ary ny fahavinirako no nanohana Ahy.
  '6':
  - type: text
    content: Nanitsaka firenena tamin’ny fahatezerako Aho
  - type: text
    content: Sady nampahaleony azy tamin’ny fahavinirako
  - type: text
    content: Ary nandatsaka ny rany tamin’ny tany.
  - type: heading
    content: Fivavahana sy fiaiken-keloka ary fiderana noho ny famonjen’Andriamanitra hatramin’ny taloha.
  '7':
  - type: text
    content: NY famindrampon’i Jehovah no hambarako,
  - type: text
    content: Dia ny fiderana an’i Jehovah araka izay rehetra nataony tamintsika
  - type: text
    content: Sy ny haben’ny fahasoavana tamin’ny taranak’Isiraely.
  - type: text
    content: Izay nomeny azy araka ny fiantrany
  - type: text
    content: Sy araka ny haben’ny famindrampony.
  '8':
  - type: text
    content: 'Fa hoy Izy: Oloko tokoa ireo,'
  - type: text
    content: Dia zanaka tsy mba handainga;
  - type: text
    content: Ka dia tonga Mpamonjy azy Izy.
  '9':
  - type: text
    content: Tamin’ny fahoriany rehetra dia niory koa Izy,
  - type: text
    content: Ary Ilay Anjelin’ny tavany no namonjy ireo;
  - type: text
    content: Ny fitiavany sy ny famindrampony no nanavotany azy
  - type: text
    content: Sy nivimbinany azy ary nitondrany azy tamin’ny andro taloha ela rehetra.
