document_id: JOB.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny fanintelony nataon’i Bildada.
  - type: text
    content: 'DIA namaly Bildada Sohita ka nanao hoe:'
  '2':
  - type: text
    content: Fanapahana sy fampahatahorana no ao aminy,
  - type: text
    content: Manao fihavanana any amin’ny avo Izy.
  '3':
  - type: text
    content: Azo isaina va ny miaramilany?
  - type: text
    content: Ary fahazavan’iza no tsy ihoaran’ny Azy?
  - type: note
    content: 'Na: Amin’iza no tsy iposahan’ny fahazavany?'
  '4':
  - type: text
    content: Ary aiza no hahamarina ny zanak’olombelona eo anatrehan’Andriamanitra?
  - type: text
    content: Ary aiza no hadio izay tera-behivavy?
  '5':
  - type: text
    content: Indro, ny volana aza tsy mangarangarana,
  - type: text
    content: Ary ny kintana aza tsy madio eo imasony;
  '6':
  - type: text
    content: Koa mainka fa ny olombelona, izay kankana,
  - type: text
    content: Ary ny zanak’olombelona, izay olitra.
