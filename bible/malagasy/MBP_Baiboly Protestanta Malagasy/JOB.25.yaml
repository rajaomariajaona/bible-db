document_id: JOB.25
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny fanintelony nataon’i Bildada.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Bildada Sohita ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fanapahana sy fampahatahorana no ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao fihavanana any amin’ny avo Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Azo isaina va ny miaramilany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahazavan’iza no tsy ihoaran’ny Azy?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’iza no tsy iposahan’ny fahazavany?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary aiza no hahamarina ny zanak’olombelona eo anatrehan’Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aiza no hadio izay tera-behivavy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, ny volana aza tsy mangarangarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kintana aza tsy madio eo imasony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa mainka fa ny olombelona, izay kankana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanak’olombelona, izay olitra.
