document_id: PRO.8
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fiantsoan’ny fahendrena, sy ny fahatsarany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TSY miantso va ny fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy manandra-peo va ny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eo an-tampon’ny fitoerana avo amoron-dàlana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy eo an-tsampanan-dàlana no ijoroany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eo anilan’ny vavahady, amin’ny fidirana ho ao an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy eo anaty vavahady no iantsoany mafy hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hianareo no antsoiko, ry olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny feoko ho amin’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fantaro ny fahendrena, ry kely saina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fantaro ny fahalalana, ry adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Henoy, fa hilaza zava-tsoa aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hilaza ny mahitsy no isokafan’ny molotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ny marina ihany no holazain’ny vavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ratsy dia fahavetavetana, raha amin’ny molotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Marina ny teny rehetra aloaky ny vavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy fiolakolahana na fitaka ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miharihary avokoa izy, raha amin’ny mazava saina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahitsy, raha amin’ny efa nahazo fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza ny volafotsy no raisina, fa ny anatro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aleo ny fahalalana toy izay ny volamena voafantina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny fahendrena dia tsara noho ny voahangy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: perla.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zavatra irina rehetra tsy azo ampitahaina aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izaho fahendrena dia miara-monina amin-tsaina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitan’ny fahalalako ny fisainana mazava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fankahalana ny ratsy no fahatahorana an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fiavonavonana sy ny fireharehana sy ny làlana ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vava fandainga dia samy halako avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ahy ny fisainana sy ny fanambinana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tena fahendrena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no fahalalana, izaho no manan-kery;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izaho no anjakan’ny mpanjaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy andidian’ny mpanapaka araka ny rariny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izaho no anapahan’ny andriandahy sy ny lehibe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny mpitsara rehetra amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tiako izay tia ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay fatra-pitady ahy dia hahita ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ato amiko ny harena sy ny voninahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny harena mateza sy ny fahamarinana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny vokatro dia tsara noho ny volamena, eny, noho ny tena volamena aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fitomboan’ny hareko mihoatra noho ny volafotsy voafantina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin’ny alehan’ny fahamarinana no izorako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ao amin’ny làlan’ny fitsarana marina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mba hampandovako harena izay tia ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hamenoako ny firaketany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Jehovah nahary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nahazo.
    marker-yv: yv-n
  - type: text
    text: ' ahy ho fiandohan’ny alehany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho voalohany amin’ny asany hatramin’ny taloha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izaho notendreny hatramin’ny fahagola,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hatramin’ny voalohany indrindra, dia fony tsy mbola ary ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fony tsy mbola ary ny lalina, no efa teraka aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fony tsy mbola ary ny loharano miboiboika be,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fony tsy mbola naorina ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fony tsy mbola nisy havoana, no efa teraka aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fony tsy mbola natao ny tany, na ny saha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny voalohan’ny vovo-tany ambonin’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Raha namorona ny lanitra Izy, dia tany aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha namaritra ny habakabaka tambonin’ny lalina Izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha nampitoetra ny rahona eny ambony Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha niboiboika fatratra ny loharanon’ny lalina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha nanisy faritra ho an’ny ranomasina Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy hahazoan’ny rano mihoatra ny fetrany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nandidy ny amin’ny fanorenan’ny tany,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia mpità-marika
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: notezaina.
    marker-yv: yv-n
  - type: text
    text: ' teo anilany aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ravoravo isan-andro isan-andro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nilalao mandrakariva teo anatrehany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Eny, nahafaly ahy ny tany nataony honenana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary naharavoravo ahy ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Koa mihainoa ahy hianareo, anaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa sambatra izay manaraka ny diako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Minoa anatra, ka hendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aza mandà.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Sambatra izay olona mihaino ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miari-tory mandrakariva eo am-bavahadiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miandry eo amin’ny tolam-baravarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa izay mahita ahy dia mahita fiainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mahazo sitraka amin’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa izay diso ahy kosa mampidi-doza amin’ny fanahiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay rehetra mankahala ahy tia fahafatesana.
