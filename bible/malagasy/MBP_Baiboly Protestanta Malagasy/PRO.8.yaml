document_id: PRO.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiantsoan’ny fahendrena, sy ny fahatsarany.
  - type: text
    content: TSY miantso va ny fahendrena,
  - type: text
    content: Ary tsy manandra-peo va ny fahalalana?
  '10':
  - type: text
    content: Aza ny volafotsy no raisina, fa ny anatro,
  - type: text
    content: Ary aleo ny fahalalana toy izay ny volamena voafantina.
  '11':
  - type: text
    content: Fa ny fahendrena dia tsara noho ny voahangy;
  - type: note
    content: 'Na: perla.'
  - type: text
    content: Ary ny zavatra irina rehetra tsy azo ampitahaina aminy.
  '12':
  - type: text
    content: Izaho fahendrena dia miara-monina amin-tsaina,
  - type: text
    content: Ary hitan’ny fahalalako ny fisainana mazava.
  '13':
  - type: text
    content: Ny fankahalana ny ratsy no fahatahorana an’i Jehovah.
  - type: text
    content: Ny fiavonavonana sy ny fireharehana sy ny làlana ratsy
  - type: text
    content: Ary ny vava fandainga dia samy halako avokoa.
  '14':
  - type: text
    content: Ahy ny fisainana sy ny fanambinana;
  - type: note
    content: 'Na: tena fahendrena.'
  - type: text
    content: Izaho no fahalalana, izaho no manan-kery;
  '15':
  - type: text
    content: Izaho no anjakan’ny mpanjaka
  - type: text
    content: Sy andidian’ny mpanapaka araka ny rariny;
  '16':
  - type: text
    content: Izaho no anapahan’ny andriandahy sy ny lehibe,
  - type: text
    content: Dia ny mpitsara rehetra amin’ny tany.
  '17':
  - type: text
    content: Tiako izay tia ahy;
  - type: text
    content: Ary izay fatra-pitady ahy dia hahita ahy.
  '18':
  - type: text
    content: Ato amiko ny harena sy ny voninahitra,
  - type: text
    content: Eny, ny harena mateza sy ny fahamarinana.
  '19':
  - type: text
    content: Ny vokatro dia tsara noho ny volamena, eny, noho ny tena volamena aza,
  - type: text
    content: Ary ny fitomboan’ny hareko mihoatra noho ny volafotsy voafantina.
  '2':
  - type: text
    content: Eo an-tampon’ny fitoerana avo amoron-dàlana
  - type: text
    content: Sy eo an-tsampanan-dàlana no ijoroany.
  '20':
  - type: text
    content: Amin’ny alehan’ny fahamarinana no izorako,
  - type: text
    content: Dia ao amin’ny làlan’ny fitsarana marina,
  '21':
  - type: text
    content: Mba hampandovako harena izay tia ahy,
  - type: text
    content: Sy hamenoako ny firaketany.
  '22':
  - type: text
    content: Jehovah nahary
  - type: note
    content: 'Na: nahazo.'
  - type: text
    content: ' ahy ho fiandohan’ny alehany,'
  - type: text
    content: Ho voalohany amin’ny asany hatramin’ny taloha.
  '23':
  - type: text
    content: Izaho notendreny hatramin’ny fahagola,
  - type: text
    content: Eny, hatramin’ny voalohany indrindra, dia fony tsy mbola ary ny tany.
  '24':
  - type: text
    content: Fony tsy mbola ary ny lalina, no efa teraka aho,
  - type: text
    content: Fony tsy mbola ary ny loharano miboiboika be,
  '25':
  - type: text
    content: Fony tsy mbola naorina ny tendrombohitra,
  - type: text
    content: Fony tsy mbola nisy havoana, no efa teraka aho,
  '26':
  - type: text
    content: Fony tsy mbola natao ny tany, na ny saha,
  - type: text
    content: Na ny voalohan’ny vovo-tany ambonin’izao rehetra izao.
  '27':
  - type: text
    content: Raha namorona ny lanitra Izy, dia tany aho,
  - type: text
    content: Raha namaritra ny habakabaka tambonin’ny lalina Izy,
  '28':
  - type: text
    content: Raha nampitoetra ny rahona eny ambony Izy,
  - type: text
    content: Raha niboiboika fatratra ny loharanon’ny lalina,
  '29':
  - type: text
    content: Raha nanisy faritra ho an’ny ranomasina Izy,
  - type: text
    content: Mba tsy hahazoan’ny rano mihoatra ny fetrany,
  - type: text
    content: Ary nandidy ny amin’ny fanorenan’ny tany,–
  '3':
  - type: text
    content: Eo anilan’ny vavahady, amin’ny fidirana ho ao an-tanàna,
  - type: text
    content: 'Sy eo anaty vavahady no iantsoany mafy hoe:'
  '30':
  - type: text
    content: Dia mpità-marika
  - type: note
    content: 'Na: notezaina.'
  - type: text
    content: ' teo anilany aho'
  - type: text
    content: Sady ravoravo isan-andro isan-andro
  - type: text
    content: Ka nilalao mandrakariva teo anatrehany;
  '31':
  - type: text
    content: Eny, nahafaly ahy ny tany nataony honenana,
  - type: text
    content: Ary naharavoravo ahy ny zanak’olombelona.
  '32':
  - type: text
    content: Koa mihainoa ahy hianareo, anaka;
  - type: text
    content: Fa sambatra izay manaraka ny diako;
  '33':
  - type: text
    content: Minoa anatra, ka hendre,
  - type: text
    content: Fa aza mandà.
  '34':
  - type: text
    content: Sambatra izay olona mihaino ahy
  - type: text
    content: Ka miari-tory mandrakariva eo am-bavahadiko,
  - type: text
    content: Ary miandry eo amin’ny tolam-baravarako.
  '35':
  - type: text
    content: Fa izay mahita ahy dia mahita fiainana
  - type: text
    content: Sady mahazo sitraka amin’i Jehovah;
  '36':
  - type: text
    content: Fa izay diso ahy kosa mampidi-doza amin’ny fanahiny;
  - type: text
    content: Ary izay rehetra mankahala ahy tia fahafatesana.
  '4':
  - type: text
    content: Hianareo no antsoiko, ry olona;
  - type: text
    content: Ary ny feoko ho amin’ny zanak’olombelona.
  '5':
  - type: text
    content: Fantaro ny fahendrena, ry kely saina;
  - type: text
    content: Ary fantaro ny fahalalana, ry adala.
  '6':
  - type: text
    content: Henoy, fa hilaza zava-tsoa aho;
  - type: text
    content: Ary ny hilaza ny mahitsy no isokafan’ny molotro.
  '7':
  - type: text
    content: Fa ny marina ihany no holazain’ny vavako;
  - type: text
    content: Ary ny ratsy dia fahavetavetana, raha amin’ny molotro.
  '8':
  - type: text
    content: Marina ny teny rehetra aloaky ny vavako;
  - type: text
    content: Tsy misy fiolakolahana na fitaka ao aminy.
  '9':
  - type: text
    content: Miharihary avokoa izy, raha amin’ny mazava saina,
  - type: text
    content: Ary mahitsy, raha amin’ny efa nahazo fahalalana.
