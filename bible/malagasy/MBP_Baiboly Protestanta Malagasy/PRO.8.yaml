document_id: PRO.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fiantsoan’ny fahendrena, sy ny fahatsarany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: TSY miantso va ny fahendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy manandra-peo va ny fahalalana?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aza ny volafotsy no raisina, fa ny anatro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aleo ny fahalalana toy izay ny volamena voafantina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ny fahendrena dia tsara noho ny voahangy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: perla.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zavatra irina rehetra tsy azo ampitahaina aminy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izaho fahendrena dia miara-monina amin-tsaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hitan’ny fahalalako ny fisainana mazava.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny fankahalana ny ratsy no fahatahorana an’i Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiavonavonana sy ny fireharehana sy ny làlana ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vava fandainga dia samy halako avokoa.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ahy ny fisainana sy ny fanambinana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tena fahendrena.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no fahalalana, izaho no manan-kery;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Izaho no anjakan’ny mpanjaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy andidian’ny mpanapaka araka ny rariny;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izaho no anapahan’ny andriandahy sy ny lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny mpitsara rehetra amin’ny tany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tiako izay tia ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay fatra-pitady ahy dia hahita ahy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ato amiko ny harena sy ny voninahitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny harena mateza sy ny fahamarinana.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny vokatro dia tsara noho ny volamena, eny, noho ny tena volamena aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fitomboan’ny hareko mihoatra noho ny volafotsy voafantina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eo an-tampon’ny fitoerana avo amoron-dàlana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy eo an-tsampanan-dàlana no ijoroany.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Amin’ny alehan’ny fahamarinana no izorako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ao amin’ny làlan’ny fitsarana marina,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mba hampandovako harena izay tia ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hamenoako ny firaketany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Jehovah nahary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nahazo.
      marker-yv: yv-n
    - type: text
      text: ' ahy ho fiandohan’ny alehany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voalohany amin’ny asany hatramin’ny taloha.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Izaho notendreny hatramin’ny fahagola,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hatramin’ny voalohany indrindra, dia fony tsy mbola ary ny tany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fony tsy mbola ary ny lalina, no efa teraka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony tsy mbola ary ny loharano miboiboika be,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fony tsy mbola naorina ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony tsy mbola nisy havoana, no efa teraka aho,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fony tsy mbola natao ny tany, na ny saha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny voalohan’ny vovo-tany ambonin’izao rehetra izao.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Raha namorona ny lanitra Izy, dia tany aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha namaritra ny habakabaka tambonin’ny lalina Izy,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Raha nampitoetra ny rahona eny ambony Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha niboiboika fatratra ny loharanon’ny lalina,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Raha nanisy faritra ho an’ny ranomasina Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba tsy hahazoan’ny rano mihoatra ny fetrany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nandidy ny amin’ny fanorenan’ny tany,–
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eo anilan’ny vavahady, amin’ny fidirana ho ao an-tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy eo anaty vavahady no iantsoany mafy hoe:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia mpità-marika
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: notezaina.
      marker-yv: yv-n
    - type: text
      text: ' teo anilany aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady ravoravo isan-andro isan-andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nilalao mandrakariva teo anatrehany;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Eny, nahafaly ahy ny tany nataony honenana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary naharavoravo ahy ny zanak’olombelona.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Koa mihainoa ahy hianareo, anaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa sambatra izay manaraka ny diako;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Minoa anatra, ka hendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aza mandà.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Sambatra izay olona mihaino ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miari-tory mandrakariva eo am-bavahadiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miandry eo amin’ny tolam-baravarako.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Fa izay mahita ahy dia mahita fiainana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mahazo sitraka amin’i Jehovah;
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Fa izay diso ahy kosa mampidi-doza amin’ny fanahiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay rehetra mankahala ahy tia fahafatesana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hianareo no antsoiko, ry olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny feoko ho amin’ny zanak’olombelona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fantaro ny fahendrena, ry kely saina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fantaro ny fahalalana, ry adala.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Henoy, fa hilaza zava-tsoa aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hilaza ny mahitsy no isokafan’ny molotro.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ny marina ihany no holazain’ny vavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ratsy dia fahavetavetana, raha amin’ny molotro.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Marina ny teny rehetra aloaky ny vavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fiolakolahana na fitaka ao aminy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Miharihary avokoa izy, raha amin’ny mazava saina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahitsy, raha amin’ny efa nahazo fahalalana.
