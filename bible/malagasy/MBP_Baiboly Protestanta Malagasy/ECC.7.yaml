document_id: ECC.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ohabolana samy hafa ny amin’ny mahasoa ny olombelona.
  - type: text
    content: TSARA ny laza soa noho ny menaka manitra; ary ny andro ahaterahana tsy mahaleo ny andro ahafatesana.
  '10':
  - type: text
    content: 'Aza manao hoe: Ahoana no nahatsara ny andro taloha noho ny ankehitriny? fa tsy avy amin ny fahendrena no anontanianao izany.'
  '11':
  - type: text
    content: 'Tsara tahaka ny lova ny fahendrena, sady zava-mahasoa ho an’izay mahita masoandro izany. '
  '12':
  - type: text
    content: 'Fa fialokalofana ny fahendrena, ary fialokalofana ny vola; ary ny mahatsara ny fahalalana dia izao: Maharo ny ain’ny manana azy ny fahendrena.'
  '13':
  - type: text
    content: Saino ny asan’Andriamanitra; fa iza moa no mahahitsy izay nataony ho meloka?
  '14':
  - type: text
    content: Amin’ny andro mahafaly dia mifalia; ary amin’ny andro mahory mieritrereta; fa nampifanandrifin’Andriamanitra ireo, mba tsy hahitan’ny olona akory izay ho avy any aoriany.
  '15':
  - type: text
    content: 'Izao rehetra izao dia efa hitako tamin’ny androko mandalo foana: misy marina maty amin’ny hamarinany; ary misy meloka ela velona amin’ny haratsiany.'
  '16':
  - type: text
    content: 'Aza marina loatra, ary aza miseho ho hendry loatra; nahoana noho simbanao ny tenanao? '
  '17':
  - type: text
    content: Aza ratsy loatra hianao, ary aza adala; nahoana no ho faty hianao, raha tsy efa tonga ny andronao?
  '18':
  - type: text
    content: Tsara raha mitana iroa hianao, nefa aza mampiala ny tànanao amin’itsy; fa izay matahotra an’Andriamanitra dia ho afaka amin’izany rehetra izany.
  '19':
  - type: text
    content: Ny fahendrena no maharo ny hendry mihoatra noho ny mpanapaka folo ao an-tanàna.
  '2':
  - type: text
    content: Tsara ny mankamin’ny trano misy fisaonana noho ny mankamin’ny trano misy fanasana; fa ho amin’iny no hiafaran’ny olombelona rehetra, ary ny velona handatsaka am-po izany.
  '20':
  - type: text
    content: Fa tsy misy olona marina ambonin’ny tany izay manao tsara ka tsy manota.
  '21':
  - type: text
    content: 'Aza mihainohaino ny teny rehetra tenenina, fandrao handre ny mpanomponao manozona anao hianao; '
  '22':
  - type: text
    content: fa fantatry ny fonao fa na dia ny tenanao aza dia mba efa nanozona ny sasany matetika ihany koa.
  '23':
  - type: text
    content: 'Izany rehetra izany dia notsapaiko tamin’ny fahendrena. Hoy izaho: Ho hendry aho; kanjo lavitra ahy izany. '
  '24':
  - type: text
    content: Eny, izay rehetra lavitra sady lalina dia lalina,–iza no mahatakatra azy?
  '25':
  - type: text
    content: 'Nitodika aho, ka nampiasaiko ny foko hahalala sy handinika ary hitady fahendrena sy izay anton-javatra ary hahafantatra ny faharatsiana ho fahadalana, ary ny fahadalana ho fahaverezan-tsaina; '
  '26':
  - type: text
    content: ka hitako fa mangidy noho ny fahafatesana ny vehivavy, izay fandrika sy harato ny fony, sady famatorana ny tànany; nefa izay ankasitrahan’Andriamanitra dia ho afa-mandositra azy, fa ny mpanota ihany no ho azony.
  '27':
  - type: text
    content: 'Indro, izany no hitako, hoy Mpitoriteny, raha '
  - type: text
    content: nandinidinika
  - type: text
    content: ' ny zavatra tsirairay aho mba hahitana izay antony. '
  '28':
  - type: text
    content: 'Izay notadiaviko koa, fa tsy hitako, dia izao: lehilahy iray no hitako '
  - type: text
    content: ho marina
  - type: text
    content: ' tao amin’ny arivo; fa tao amin’ny vehivavy arivo'
  - type: note
    content: Heb. teo amin’ireo dia tsy nisy vehivavy hitako, etc.
  - type: text
    content: ' dia tsy nisy hitako na dia iray akory aza. '
  '29':
  - type: text
    content: 'Indro, izao ihany no hitako: nataon’Andriamanitra mahitsy ny olona, kanjo namorona sain-kafa maro izy.'
  '3':
  - type: text
    content: Tsara ny alahelo noho ny hehy; fa na dia malahelo aza ny tarehy, mety tsara
  - type: note
    content: 'Na: faly.'
  - type: text
    content: ' ihany ny fo. '
  '4':
  - type: text
    content: Ny fon’ny hendry dia ao amin’ny trano misy fisaonana; fa ny fon’ny adala kosa dia ao amin’ny trano misy fifaliana.
  '5':
  - type: text
    content: 'Tsara ny mihaino ny anatra mafy ataon’ny hendry noho ny mihaino ny hiran’ny adala. '
  '6':
  - type: text
    content: Toy ny firefodrefotry ny tsilo eo ambanin’ny vilany, dia tahaka izany ny fihomehezan’ny adala; zava-poana koa izany.
  '7':
  - type: text
    content: Fa ny fampahoriana dia mahavery saina ny hendry; ary ny kolikoly mahasimba ny fo.
  '8':
  - type: text
    content: Tsara ny iafaran’ny raharaha noho ny iandohany; tsara ny mahari-po noho ny miavonavom-panahy.
  '9':
  - type: text
    content: Aoka tsy halaky tezitra ny fanahinao; fa ny fahatezerana mitoetra ao an-tratran’ny adala.
