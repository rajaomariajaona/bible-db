document_id: GEN.20
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nivahinianan’i Abrahama tao Gerara.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA nifindra niala teo Abrahama nankany amin’ny tany atsimo ka nitoetra teo anelanelan’i Kadesy sy Sora, ary nivahiny tao Gerara izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy ny filàzan’i Abrahama an’i Saraha vadiny: Anabaviko izy; dia naniraka Abimeleka, mpanjakan’i Gerara, ka nampaka an’i Saraha.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Andriamanitra nankeo amin’i Abimeleka, tamin’ny nofy nony alina, ka nanao taminy hoe: lndro, fa ho faty hianao noho ny vehivavy izay nalainao, fa vadin’olona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Abimeleka anefa tsy mbola nanakaiky azy, ka hoy izy: Tompo ô, hovonoinao koa va izay firenena marina? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy ralehilahy va no nilaza tamiko hoe: Anabaviko izy? ary ravehivavy koa nanao hoe: Anadahiko izy; koa tamin’ny fahatsoran’ny foko sy ny fahadiovan’ny tànako no nanaovako izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Andriamanitra taminy, tamin’ny nofy: Eny ary, fantatro ihany fa tamin’ny fahatsoran’ny fonao no nanaovanao izany; ary Izaho kosa dia niaro anao mba tsy hanota amiko; koa izany no tsy namelako anao hanendry azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ankehitriny avereno ny vadin-dralehilahy, fa mpaminany izy ka hifona ho anao, dia ho velona hianao; fa raha tsy averinao izy, aoka ho fantatrao fa ho faty tokoa hianao, dia hianao mbamin’izay rehetra mety ho anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nifoha maraina koa Abimeleka ka niantso ny mpanompony rehetra ary nanambara izany rehetra izany teo anatrehany; ka dia raiki-tahotra indrindra ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Abimeleka dia nampaka an’i Abrahama ka nanao taminy hoe: Inona izao nataonao taminay izao? ary inona izao ratsy nataoko taminao izao, no dia nahatonga heloka lehibe tamiko sy tamin’ny fanjakako hianao? zavatra izay tsy tokony hatao no nataonao tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy koa Abimeleka tamin’i Abrahama: Inona no hitanao, no nanao izany zavatra izany hianao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Abrahama: Satria hoy izaho: Tsy misy fahatahorana an’Andriamanitra tokoa amin’ity tany ity, ka hovonoin’ny olona aho noho ny amin’ny vadiko. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa anabaviko ihany tokoa izy, satria zanakavavin’ny raiko, fa tsy mba zanakavavin’ny reniko; ka dia nanambady azy aho. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha nampifindrafindra ahy hiala tamin’ny tranon’ny raiko Andriamanitra, dia hoy izaho tamin’ny vadiko: Izao no soa hataonao amiko any amin’izay tany rehetra halehantsika dia lazao aho hoe: Anadahiko izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Abimeleka naka ondry sy omby sy ankizilahy ary ankizivavy, ka nomeny an’i Abrahama ireny; ary Saraha vadiny dia naveriny teo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Abimeleka: Indro, eo anoloanao ny taniko; mitoera eo amin’izay tianao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy kosa izy tamin’i Saraha: Indro, efa nomeko sekely volafotsy arivo ny anadahinao; indro, ho fanampena-maso aminao izany,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia izy ho fisalobonana aminao.
    marker-yv: yv-n
  - type: text
    text: ' dia amin’izay rehetra momba anao: ka dia efa nahazo ny rariny'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efa voànatra.
    marker-yv: yv-n
  - type: text
    text: ' hianao ny amin’izany rehetra izany.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'eo anatrehan’ny olona rehetra; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin izay rehetra momba anao sy ny olona rehetra koa; dia efa nahazo ny rariny hianao.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Abrahama dia nifona tamin’Andriamanitra; ary Andriamanitra nahasitrana an’i Abimeleka sy ny vadiny mbamin’ny mpanompovaviny; dia niteraka izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa Jehovah efa nahamomba tokoa ny vehivavy rehetra tamin’ny ankohonan’i Abimeleka noho ny amin’i Saraha, vadin’i Abrahama.
