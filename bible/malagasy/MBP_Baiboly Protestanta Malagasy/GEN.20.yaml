document_id: GEN.20,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nivahinianan’i Abrahama tao Gerara.
  - type: text
    content: 'DIA nifindra niala teo Abrahama nankany amin’ny tany atsimo ka nitoetra teo anelanelan’i Kadesy sy Sora, ary nivahiny tao Gerara izy. '
  '10':
  - type: text
    content: 'Ary hoy koa Abimeleka tamin’i Abrahama: Inona no hitanao, no nanao izany zavatra izany hianao?'
  '11':
  - type: text
    content: 'Dia hoy Abrahama: Satria hoy izaho: Tsy misy fahatahorana an’Andriamanitra tokoa amin’ity tany ity, ka hovonoin’ny olona aho noho ny amin’ny vadiko. '
  '12':
  - type: text
    content: 'Nefa anabaviko ihany tokoa izy, satria zanakavavin’ny raiko, fa tsy mba zanakavavin’ny reniko; ka dia nanambady azy aho. '
  '13':
  - type: text
    content: 'Ary raha nampifindrafindra ahy hiala tamin’ny tranon’ny raiko Andriamanitra, dia hoy izaho tamin’ny vadiko: Izao no soa hataonao amiko any amin’izay tany rehetra halehantsika dia lazao aho hoe: Anadahiko izy.'
  '14':
  - type: text
    content: 'Ary Abimeleka naka ondry sy omby sy ankizilahy ary ankizivavy, ka nomeny an’i Abrahama ireny; ary Saraha vadiny dia naveriny teo aminy. '
  '15':
  - type: text
    content: 'Ary hoy Abimeleka: Indro, eo anoloanao ny taniko; mitoera eo amin’izay tianao. '
  '16':
  - type: text
    content: 'Ary hoy kosa izy tamin’i Saraha: Indro, efa nomeko sekely volafotsy arivo ny anadahinao; indro, ho fanampena-maso aminao izany,'
  - type: note
    content: 'Na: dia izy ho fisalobonana aminao.'
  - type: text
    content: ' dia amin’izay rehetra momba anao: ka dia efa nahazo ny rariny'
  - type: note
    content: 'Na: efa voànatra.'
  - type: text
    content: ' hianao ny amin’izany rehetra izany.'
  - type: note
    content: 'Na: eo anatrehan’ny olona rehetra; na: amin izay rehetra momba anao sy ny olona rehetra koa; dia efa nahazo ny rariny hianao.'
  '17':
  - type: text
    content: 'Ary Abrahama dia nifona tamin’Andriamanitra; ary Andriamanitra nahasitrana an’i Abimeleka sy ny vadiny mbamin’ny mpanompovaviny; dia niteraka izy ireo. '
  '18':
  - type: text
    content: Fa Jehovah efa nahamomba tokoa ny vehivavy rehetra tamin’ny ankohonan’i Abimeleka noho ny amin’i Saraha, vadin’i Abrahama.
  '2':
  - type: text
    content: 'Ary hoy ny filàzan’i Abrahama an’i Saraha vadiny: Anabaviko izy; dia naniraka Abimeleka, mpanjakan’i Gerara, ka nampaka an’i Saraha.'
  '3':
  - type: text
    content: 'Fa Andriamanitra nankeo amin’i Abimeleka, tamin’ny nofy nony alina, ka nanao taminy hoe: lndro, fa ho faty hianao noho ny vehivavy izay nalainao, fa vadin’olona izy. '
  '4':
  - type: text
    content: 'Fa Abimeleka anefa tsy mbola nanakaiky azy, ka hoy izy: Tompo ô, hovonoinao koa va izay firenena marina? '
  '5':
  - type: text
    content: 'Tsy ralehilahy va no nilaza tamiko hoe: Anabaviko izy? ary ravehivavy koa nanao hoe: Anadahiko izy; koa tamin’ny fahatsoran’ny foko sy ny fahadiovan’ny tànako no nanaovako izany.'
  '6':
  - type: text
    content: 'Ary hoy Andriamanitra taminy, tamin’ny nofy: Eny ary, fantatro ihany fa tamin’ny fahatsoran’ny fonao no nanaovanao izany; ary Izaho kosa dia niaro anao mba tsy hanota amiko; koa izany no tsy namelako anao hanendry azy. '
  '7':
  - type: text
    content: Ary ankehitriny avereno ny vadin-dralehilahy, fa mpaminany izy ka hifona ho anao, dia ho velona hianao; fa raha tsy averinao izy, aoka ho fantatrao fa ho faty tokoa hianao, dia hianao mbamin’izay rehetra mety ho anao.
  '8':
  - type: text
    content: Dia nifoha maraina koa Abimeleka ka niantso ny mpanompony rehetra ary nanambara izany rehetra izany teo anatrehany; ka dia raiki-tahotra indrindra ny olona.
  '9':
  - type: text
    content: 'Ary Abimeleka dia nampaka an’i Abrahama ka nanao taminy hoe: Inona izao nataonao taminay izao? ary inona izao ratsy nataoko taminao izao, no dia nahatonga heloka lehibe tamiko sy tamin’ny fanjakako hianao? zavatra izay tsy tokony hatao no nataonao tamiko. '
