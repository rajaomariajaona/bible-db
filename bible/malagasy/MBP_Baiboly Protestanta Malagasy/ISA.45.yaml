document_id: ISA.45,873
type_code: plt
verses:
  '1':
  - type: text
    content: Izao no lazain’i Jehovah amin’ny voahosony, dia Kyrosy,
  - type: text
    content: Izay notantanako tamin’ny tànany ankavanana,
  - type: text
    content: Mba handreseko firenena eo anoloany
  - type: text
    content: Sy hamahako ny fehin-kibon’ny mpanjaka,
  - type: text
    content: Mba hamohako varavarana eo anoloany,
  - type: text
    content: 'Ka tsy hirindrina intsony ny vavahady:'
  '10':
  - type: text
    content: 'Lozan’izay miteny amin-drainy hoe: Inona no aterakao?'
  - type: text
    content: Na amin-dreniny
  - type: note
    content: Heb. ny vehivavy.
  - type: text
    content: ' hoe: Inona no aloaky ny kibonao?'
  '11':
  - type: text
    content: 'Izao no lazain’i Jehovah, ny Iray Masin’ny Isiraely, dia ny namorona azy:'
  - type: text
    content: Ny amin’ny zavatra ho avy no anontanio Ahy;
  - type: text
    content: Ary ny zanako sy ny asan’ny tànako dia aoka ho adidiko ihany.
  '12':
  - type: text
    content: Izaho no nanao ny tany
  - type: text
    content: Sy nahary ny olona eo amboniny;
  - type: text
    content: Ny tànako ihany no namelatra ny lanitra
  - type: text
    content: Sy nandahatra
  - type: note
    content: Heb. nandidy.
  - type: text
    content: ' ny eny aminy rehetra.'
  '13':
  - type: text
    content: Izaho no nanaitra azy io tamin’ny fahamarinana,
  - type: text
    content: Ary ny làlany rehetra dia haravoko avokoa;
  - type: text
    content: Izy no hanao ny tanànako, ary ny oloko voababo dia halefany,
  - type: text
    content: Nefa tsy amim-bola amin-karena,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro.
  '14':
  - type: text
    content: Izao no lazain’i Jehovah;
  - type: text
    content: Ny vokatry ny fisasaran’i Egypta sy ny tombom-barotr’i Etiopia
  - type: text
    content: Sy ny Sabeana, olona lava tsanganana,
  - type: text
    content: Hafindra ao aminao, ka ho anao izany;
  - type: text
    content: Ary hanaraka anao ireo;
  - type: text
    content: Avy aman-gadra izy
  - type: text
    content: Ary hiankohoka handady eo anatrehanao,
  - type: text
    content: 'Dia hifona aminao hoe:'
  - type: text
    content: Ato aminao tokoa Andriamanitra;
  - type: text
    content: Ary tsy misy Andriamanitra afa-tsy Izy ihany.
  '15':
  - type: text
    content: Marina tokoa fa Hianao dia Andriamanitra miafina,
  - type: text
    content: Ry Andriamanitry ny Isiraely sady Mpamonjy ô.
  '16':
  - type: text
    content: Ho menatra sy hangaihay izy rehetra;
  - type: text
    content: Eny, handeha aman-kenatra avokoa ny mpamorona sarin-javatra,
  '17':
  - type: text
    content: Fa ny Isiraely kosa ho voavonjin’i Jehovah
  - type: text
    content: Amin’ny famonjena mandrakizay;
  - type: text
    content: Tsy ho menatra na hangaihay mandrakizay mandrakizay hianareo.
  '18':
  - type: text
    content: Fa izao no lazain’i Jehovah, Izay nahary ny lanitra
  - type: text
    content: (Izy no Andriamanitra) sady namorona ny tany sy nahavita azy
  - type: text
    content: (Izy no nandamina azy;
  - type: text
    content: Tsy ho tany tsy misy endrika tsy akory no namoronany azy,
  - type: text
    content: 'Fa nataony honenana):'
  - type: text
    content: Izaho no Jehovah, ary tsy misy hafa.
  '19':
  - type: text
    content: Tsy tao amin’ny mangingina,
  - type: text
    content: Dia tao amin’ny fitoera-maizina amin’ny tany, no nitenenako;
  - type: text
    content: Izaho tsy niantso ny taranak’i Jakoba hitady Ahy foana;
  - type: text
    content: Izaho Jehovah no miteny ny marina
  - type: text
    content: Sy manambara ny mahitsy.
  '2':
  - type: text
    content: Handroso eo alohanao Aho
  - type: text
    content: Ary handravona ny mikitoantoana
  - type: text
    content: Sy hanorotoro ny varavarana varahina
  - type: text
    content: Ary hanapatapaka ny hidy vy;
  '20':
  - type: text
    content: Mivoria, ka avia, ary miaraha manatona,
  - type: text
    content: Hianareo jentilisa sisa afaka.
  - type: text
    content: Tsy manam-pahalalana izay mitondra ny hazo nataony sarin-javatra voasokitra
  - type: text
    content: Ka mivavaka amin’izay andriamanitra tsy mahavonjy.
  '21':
  - type: text
    content: Alaharo, ka asehoy mazava;
  - type: text
    content: 'Eny, aoka hiara-misaina izy:'
  - type: text
    content: Iza no efa nanambara izany hatrizay hatrizay?
  - type: text
    content: Iza no efa nilaza izany hatramin’ny fahiny?
  - type: text
    content: Tsy Izaho Jehovah va?
  - type: text
    content: Fa tsy misy Andriamanitra afa-tsy Izaho,
  - type: text
    content: Dia Andriamanitra marina sady Mpamonjy;
  - type: text
    content: Eny, tsy misy afa-tsy Izaho.
  '22':
  - type: text
    content: Mijere Ahy, dia ho voavonjy hianareo,
  - type: text
    content: Ry vazan-tany rehetra!
  - type: text
    content: Fa Izaho no Andriamanitra, ka tsy misy hafa.
  '23':
  - type: text
    content: Ny tenako no nianianako,
  - type: text
    content: Nisy teny efa naloaky ny vavako tamin’ny fahamarinana
  - type: note
    content: 'Na: Nisy teny naloaky ny vavan’ny fahamarinana.'
  - type: text
    content: ' ka tsy hitsoaka:'
  - type: text
    content: Izaho no handohalehan’ny lohalika rehetra,
  - type: text
    content: 'Sy hianianan’ny lela rehetra hoe:'
  '24':
  - type: text
    content: Ao amin’i Jehovah ihany no misy fahamarinana be sy hery,
  - type: text
    content: Ka Izy ihany no hohatonin’ny olona,
  - type: text
    content: Ary ho menatra izay rehetra tezitra aminy.
  '25':
  - type: text
    content: Ao amin’i Jehovah no hanamarinana ny taranak’Isiraely rehetra
  - type: text
    content: Sy hananany rehareha.
  '3':
  - type: text
    content: Dia homeko anao ny rakitra ao amin’ny maizina
  - type: text
    content: Sy ny harena nafenina ao amin’ny mangingina,
  - type: text
    content: Mba hahafantaranao fa Izaho no Jehovah Izay miantso anao amin’ny anaranao,
  - type: text
    content: Dia Andriamanitry ny Isiraely.
  '4':
  - type: text
    content: Noho ny amin’i Jakoba mpanompoko sy Isiraely voafidiko
  - type: text
    content: No niantsoako anao tamin’ny anaranao
  - type: text
    content: Sy nanomezako anarana malaza ho anao, na dia tsy nahafantatra Ahy aza hianao.
  '5':
  - type: text
    content: 'Izaho no Jehovah, fa tsy misy hafa:'
  - type: text
    content: Tsy misy Andriamanitra afa-tsy Izaho;
  - type: text
    content: Izaho efa nampisikina anao, kanefa tsy nahafantatra Ahy hianao,
  '6':
  - type: text
    content: Mba hahafantarana hatrany amin’ny fiposahan’ny masoandro ka hatrany amin’ny filentehany
  - type: text
    content: 'Fa tsy misy afa-tsy Izaho:'
  - type: text
    content: Izaho no Jehovah, fa tsy misy hafa,
  '7':
  - type: text
    content: Dia Izaho Izay mamorona ny mazava sy mahary ny maizina,
  - type: text
    content: Manao ny fiadanana sy mahary ny loza;
  - type: text
    content: Izaho Jehovah no manao izany rehetra izany.
  '8':
  - type: text
    content: Manateteva avy any ambony, ry lanitra,
  - type: text
    content: Ary aoka ny habakabaka hampilatsaka fahamarinana;
  - type: text
    content: Aoka ny tany hisokatra,
  - type: text
    content: Ary aoka ho vokatra avy amin’ireo ny famonjena;
  - type: text
    content: Ary aoka hitsimoka miaraka amin’izay ny fahamarinana.
  - type: text
    content: Izaho Jehovah no efa nahatonga izany.
  '9':
  - type: text
    content: Lozan’izay miady amin’ny namorona azy!
  - type: text
    content: Tavim-bilany isan’ny tavim-bilany amin’ny tany ihany ireny!
  - type: text
    content: 'Ny tanimanga va hilaza amin’ny mpanefy azy hoe: Inona no ataonao?'
  - type: text
    content: 'Na ny asanao va hanao hoe: Tsy manan-tànana izy?'
