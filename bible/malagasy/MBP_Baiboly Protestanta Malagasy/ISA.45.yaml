document_id: ISA.45,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izao no lazain’i Jehovah amin’ny voahosony, dia Kyrosy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay notantanako tamin’ny tànany ankavanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba handreseko firenena eo anoloany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hamahako ny fehin-kibon’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hamohako varavarana eo anoloany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka tsy hirindrina intsony ny vavahady:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Lozan’izay miteny amin-drainy hoe: Inona no aterakao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na amin-dreniny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny vehivavy.
      marker-yv: yv-n
    - type: text
      text: ' hoe: Inona no aloaky ny kibonao?'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izao no lazain’i Jehovah, ny Iray Masin’ny Isiraely, dia ny namorona azy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny amin’ny zavatra ho avy no anontanio Ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zanako sy ny asan’ny tànako dia aoka ho adidiko ihany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Izaho no nanao ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nahary ny olona eo amboniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànako ihany no namelatra ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nandahatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nandidy.
      marker-yv: yv-n
    - type: text
      text: ' ny eny aminy rehetra.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izaho no nanaitra azy io tamin’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny làlany rehetra dia haravoko avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no hanao ny tanànako, ary ny oloko voababo dia halefany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy amim-bola amin-karena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah, Tompon’ny maro.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izao no lazain’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vokatry ny fisasaran’i Egypta sy ny tombom-barotr’i Etiopia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny Sabeana, olona lava tsanganana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hafindra ao aminao, ka ho anao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanaraka anao ireo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy aman-gadra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hiankohoka handady eo anatrehanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hifona aminao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ato aminao tokoa Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy Andriamanitra afa-tsy Izy ihany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Marina tokoa fa Hianao dia Andriamanitra miafina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Andriamanitry ny Isiraely sady Mpamonjy ô.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ho menatra sy hangaihay izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, handeha aman-kenatra avokoa ny mpamorona sarin-javatra,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny Isiraely kosa ho voavonjin’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny famonjena mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho menatra na hangaihay mandrakizay mandrakizay hianareo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa izao no lazain’i Jehovah, Izay nahary ny lanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Izy no Andriamanitra) sady namorona ny tany sy nahavita azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Izy no nandamina azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho tany tsy misy endrika tsy akory no namoronany azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa nataony honenana):'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no Jehovah, ary tsy misy hafa.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy tao amin’ny mangingina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tao amin’ny fitoera-maizina amin’ny tany, no nitenenako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho tsy niantso ny taranak’i Jakoba hitady Ahy foana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho Jehovah no miteny ny marina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy manambara ny mahitsy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Handroso eo alohanao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary handravona ny mikitoantoana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanorotoro ny varavarana varahina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanapatapaka ny hidy vy;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mivoria, ka avia, ary miaraha manatona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo jentilisa sisa afaka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manam-pahalalana izay mitondra ny hazo nataony sarin-javatra voasokitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mivavaka amin’izay andriamanitra tsy mahavonjy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Alaharo, ka asehoy mazava;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, aoka hiara-misaina izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no efa nanambara izany hatrizay hatrizay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no efa nilaza izany hatramin’ny fahiny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Izaho Jehovah va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy misy Andriamanitra afa-tsy Izaho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Andriamanitra marina sady Mpamonjy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy misy afa-tsy Izaho.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mijere Ahy, dia ho voavonjy hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry vazan-tany rehetra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izaho no Andriamanitra, ka tsy misy hafa.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny tenako no nianianako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nisy teny efa naloaky ny vavako tamin’ny fahamarinana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nisy teny naloaky ny vavan’ny fahamarinana.
      marker-yv: yv-n
    - type: text
      text: ' ka tsy hitsoaka:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no handohalehan’ny lohalika rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy hianianan’ny lela rehetra hoe:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ao amin’i Jehovah ihany no misy fahamarinana be sy hery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka Izy ihany no hohatonin’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho menatra izay rehetra tezitra aminy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ao amin’i Jehovah no hanamarinana ny taranak’Isiraely rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hananany rehareha.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia homeko anao ny rakitra ao amin’ny maizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny harena nafenina ao amin’ny mangingina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hahafantaranao fa Izaho no Jehovah Izay miantso anao amin’ny anaranao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Andriamanitry ny Isiraely.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Noho ny amin’i Jakoba mpanompoko sy Isiraely voafidiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No niantsoako anao tamin’ny anaranao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nanomezako anarana malaza ho anao, na dia tsy nahafantatra Ahy aza hianao.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izaho no Jehovah, fa tsy misy hafa:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy Andriamanitra afa-tsy Izaho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho efa nampisikina anao, kanefa tsy nahafantatra Ahy hianao,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mba hahafantarana hatrany amin’ny fiposahan’ny masoandro ka hatrany amin’ny filentehany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa tsy misy afa-tsy Izaho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no Jehovah, fa tsy misy hafa,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia Izaho Izay mamorona ny mazava sy mahary ny maizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao ny fiadanana sy mahary ny loza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho Jehovah no manao izany rehetra izany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manateteva avy any ambony, ry lanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny habakabaka hampilatsaka fahamarinana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny tany hisokatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho vokatra avy amin’ireo ny famonjena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hitsimoka miaraka amin’izay ny fahamarinana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho Jehovah no efa nahatonga izany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Lozan’izay miady amin’ny namorona azy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tavim-bilany isan’ny tavim-bilany amin’ny tany ihany ireny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny tanimanga va hilaza amin’ny mpanefy azy hoe: Inona no ataonao?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na ny asanao va hanao hoe: Tsy manan-tànana izy?'
