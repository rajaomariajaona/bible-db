document_id: ISA.36
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanafihan’i Sankeriba an’i Joda, sy ny teny nampitondrainy ho any amin’i Hezekia, ary ny fitarainan’i Hezekia sy ny teny nasain’Andriamanitra nolazain’Isaia taminy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY tamin’ny taona fahefatra ambin’ny folo nanjakan’i Hezekia mpanjaka dia niakatra Sankeriba, mpanjakan’i Asyria, hamely ny tanàna mimanda rehetra any Joda ka nahafaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny mpanjakan’i Asyria naniraka an-dRabsake mbamin’ny miaramila betsaka avy teo Lakisy hankany Jerosalema ho any amin’i Hezekia mpanjaka. Dia nitsangana teo anilan’ny lakan-drano amin’ny kamory ambony izy, teo an-dàlambe mankamin’ny sahan’ny mpamotsy lamba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak’i Asafa, mpitadidy ny raharaham-panjakana, dia nivoaka ho ao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy Rabsake tamin’ireo: Andeha, lazao amin’i Hezekia hoe: Izao no lazain’ny mpanjaka lehibe, dia ny mpanjakan’i Asyria: Inona moa izato itokianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy izaho: Teny foana ny hoe: Manana saina sy hery hiady aho. Fa iza no itokianao, no miodina amiko hianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indro, hianao matoky io tehina volotara torotoro io, dia Egypta, nefa raha itehenan’olona io, dia manindrona ny tànany miboroaka; eny, tahaka izany Farao, mpanjakan’i Egypta, amin’izay rehetra matoky azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha hoy hianao amiko: Jehovah Andriamanitray no itokianay,–moa tsy Azy va ny fitoerana avo aman-alitara izay noravan’i Hezekia, izay nilaza tamin’ny Joda sy Jerosalema hoe: Eto anoloan’ity alitara ity no hiankohofanareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa aoka hifaninana hianao sy ny tompoko, mpanjakan’i Asyria, fa homeko soavaly roa arivo hianao, raha tàhiny manana olona hitaingina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hataonao ahoana no fampiamboho ny komandy iray amin’ny mpanompon’ny tompoko, na dia izay kely indrindra aminy aza, nefa matoky an’i Egypta hianao hahazoanao kalesy sy mpitaingin-tsoavaly? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa moa haitraitro va izao niakarako izao? Tsia, fa Jehovah no naniraka ahy handrava ity tany ity ka nanao hoe: Miakara ho amin’izany tany izany, ka ravao izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Eliakima sy Sebna ary Joa tamin-dRabsake: Masìna hianao, teny Syriana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aramiana.
    marker-yv: yv-n
  - type: text
    text: ' no ataovy amin’ny mpanomponao, fa fantatray ihany izany; fa aza manao teny Jiosy ho ren’ny olona eny ambonin’ny mànda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hoy Rabsake: Moa ho amin’ny tomponao sy hianao va no nanirahan’ny tompoko ahy hilaza izany teny izany, fa tsy ho amin’ny olona izay mipetraka eny ambonin’ny mànda, hihinanany izay tsy fihinany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny tainy.
    marker-yv: yv-n
  - type: text
    text: ' sy hisotroany izay tsy fisotrony'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny amaniny.
    marker-yv: yv-n
  - type: text
    text: ' miaraka aminareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nijoro teo Rabsake ka niantso tamin’ny feo mahery tamin’ny teny Jiosy hoe: Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lazain’ny mpanjaka: Aza mety hofitahin’i Hezekia hianareo; fa tsy hahavonjy anareo izy tsy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary aza mety hampahatokin’i Hezekia an’i Jehovah hianareo amin’ny anaovany hoe: Jehovah no hamonjy antsika tokoa; ary tsy hatolotra eo an-tànan’ny mpanjakan’i Asyria tsy akory ity tanàna ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza mihaino an’i Hezekia hianareo; fa izao no lazain’ny mpanjakan’i Asyria: Manaova fanekena amiko hiadananareo, ka mankanesa atỳ amiko, ary samia homana ny voalobony sy ny aviaviny, ary samia misotro ny rano avy amin’ny lavaka famorian-dranony avy hianareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'mandra-pihaviko hitondra anareo ho any amin’izay tany tahaka ny taninareo, dia tany misy vary sy ranom-boaloboka, tany misy mofo sy tanimboaloboka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aza mety homen’i Hezekia vohony hianareo amin’ny anaovany hoe: Jehovah no hamonjy antsika. Moa nisy nahavonjy ny taniny tamin’ny tànan’ny mpanjakan’i Asyria va ireo andriamanitry ny firenena ireo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aiza moa ny andriamanitr’i Hamata sy Arpada? Ary aiza koa ny andriamanitr’i Sefarvaima? Nahavonjy an’i Samaria tamin’ny tànako va ireo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: andriamaniny
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Iza moa amin’ny andriamanitra rehetra amin’ireo tany ireo no efa nahavonjy ny taniny tamin’ny tànako, koa aiza no hahavonjen’i Jehovah an’i Jerosalema amin’ny tànako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nefa nangina ny olona, ka tsy nisy namaly azy na dia teny indraim-bava akory aza, satria ny mpanjaka efa nandidy hoe: Aza misy mamaly azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak’i Asafa, mpitadidy ny raharaham-panjakana, dia niditra nankao amin’i Hezekia, sady voatriatra ny fitafiany, ary nilaza taminy ny tenin-dRabsake izy.
