document_id: 2CO.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny famoriam-bola ho an’ny Kristiana malahelo tany Jodia.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY ampahafantarinay anareo, ry rahalahy, ny fahasoavan’Andriamanitra izay nomena tao amin’ny fiangonana any Makedonia; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary dia ambarako izay hevitro ny amin’izany, fa mahatsara anareo izany, satria tsy ny fanaovana ihany, fa ny fikasana koa aza dia efa natombokareo teo alohan’
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny sasany
    - type: text
      text: ' hatry ny taon-itsỳ. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ataovy tanteraka ary izany, ka tahaka ny nahazotoanareo fony nikasa, dia aoka ho tahaka izany koa ny hahatanterahanareo azy araka izay ananareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa raha misy ny fahazotoana, dia araka izay ananany no ankasitrahana, fa tsy araka izay tsy ananany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Kanefa tsy ny hahatonga fitsaharana amin’ny sasany ary fahoriana aminareo no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anaovako izany,
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa ny mba hisy fitoviana, ka amin’izao ankehitriny izao ny haben’ny harenareo '
    - type: usfm
      marker: it
      children:
      - type: text
        text: no hahafaka
    - type: text
      text: ' ny alahelon’ireo, ary ny haben’ny haren’ireo kosa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: no hahafaka
    - type: text
      text: ' ny alahelonareo, mba hisy fitoviana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'araka ny voasoratra hoe: ,,'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny nanangona
    - type: text
      text: ' be tsy nanana amby, ary ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nanangona
    - type: text
      text: ' kely tsy nanana ny tsy ampy’’ (Eks. 16.18).'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa isaorana anie Andriamanitra, Izay manome fahazotoana ho ao am-pon’i Titosy ho anareo mitovy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amin’ny ahy.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa nanaiky ny fangatahanay ihany izy nefa nazoto rahateo, ka sitrapony ihany no nandehanany nankany aminareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary ilay rahalahy izay nalaza amin’ny filazantsara any amin’ny fiangonana rehetra no nirahinay hiaraka aminy; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ary tsy izany ihany, fa efa notendren’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nofidina tamin’ny fananganan-tànana.
      marker-yv: yv-n
    - type: text
      text: ' ny fiangonana koa izy ho namanay hiara-mandeha aminay hitondra izao fahasoavana izao, izay angoninay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ataonay amin’ny fanompoanay.
      marker-yv: yv-n
    - type: text
      text: ' ho voninahitry ny Tompo sy ho vavolombelon’ny fahazotoanay. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: fa tamin’ny fahoriana be nizahan-toetra azy no nitomboan’ny hafaliany, ary ny hamafin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: halalin’
      marker-yv: yv-n
    - type: text
      text: ' ny fahantrany no nampitombo ny haren’ny hitsim-pony.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahafoizany.
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary mitandrina izahay mba tsy hisy hanome tsiny anay amin’izao harena be angoninay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ataonay amin’ny fanompoanay.
      marker-yv: yv-n
    - type: text
      text: ' izao; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'fa miomana hanao izay mahamendrika izahay, tsy eo imason’ny Tompo ihany, fa eny imason’ny olona koa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary nirahinay niaraka tamin’ireo ilay rahalahinay izay efa hitanay mazoto matetika amin’ny zavatra maro; fa ankehitriny mazoto kokoa izy noho ny haben’ny fahatokiany anareo.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Raha ny amin’i Titosy, dia namako izy sady mpiara-miasa amiko ho anareo; ary ireo rahalahinay, dia iraky
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: apostoly.
      marker-yv: yv-n
    - type: text
      text: ' ny fiangonana izy sady voninahitr’i Kristy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Koa amin’izany asehoy aminy eo imason’ny fiangonana ny famantarana mahamarina ny fitiavanareo sy ny reharehanay ny aminareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa vavolombelona aho fa araka ny zakany, eny, mihoatra noho ny zakany aza, sady araka ny sitrapony ihany, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: no nanomezany,
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'sady nangataka mafy taminay koa izy mba havelanay hikambana amin’izany fanompoana ho an’ny olona masina izany; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ary tsy araka ny nantenainay, fa ny tenany no natolony ho an’ny Tompo aloha, dia vao ho anay koa noho ny sitrapon’Andriamanitra; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ka dia nangataka an’i Titosy izahay mba hahatanteraka izany fahasoavana izany eo aminareo koa, araka ny efa nanombohany azy teo aloha.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa araka ny itomboanareo amin’ny zavatra rehetra, na amin’ny finoana, na amin’ny teny, na amin’ny fahalalana, na amin’ny fahazotoana rehetra, na amin’ny fitiavanareo anay, dia aoka ho araka izany koa no hitomboanareo amin’izao fahasoavana izao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsy milaza izany ho didy aho, fa noho ny zotom-pon’ny sasany, mba hizaha toetra ny hamarinan’ny fitiavanareo koa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa fantatrareo ny fahasoavan’i Jesosy Kristy Tompontsika, fa na dia nanan-karena aza Izy, dia tonga malahelo noho ny aminareo, mba hampanan-karena anareo ny alahelony. '
