document_id: 2CO.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny famoriam-bola ho an’ny Kristiana malahelo tany Jodia.
  - type: text
    content: 'ARY ampahafantarinay anareo, ry rahalahy, ny fahasoavan’Andriamanitra izay nomena tao amin’ny fiangonana any Makedonia; '
  '10':
  - type: text
    content: Ary dia ambarako izay hevitro ny amin’izany, fa mahatsara anareo izany, satria tsy ny fanaovana ihany, fa ny fikasana koa aza dia efa natombokareo teo alohan’
  - type: text
    content: ny sasany
  - type: text
    content: ' hatry ny taon-itsỳ. '
  '11':
  - type: text
    content: 'Ataovy tanteraka ary izany, ka tahaka ny nahazotoanareo fony nikasa, dia aoka ho tahaka izany koa ny hahatanterahanareo azy araka izay ananareo. '
  '12':
  - type: text
    content: Fa raha misy ny fahazotoana, dia araka izay ananany no ankasitrahana, fa tsy araka izay tsy ananany.
  '13':
  - type: text
    content: 'Kanefa tsy ny hahatonga fitsaharana amin’ny sasany ary fahoriana aminareo no '
  - type: text
    content: anaovako izany,
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'fa ny mba hisy fitoviana, ka amin’izao ankehitriny izao ny haben’ny harenareo '
  - type: text
    content: no hahafaka
  - type: text
    content: ' ny alahelon’ireo, ary ny haben’ny haren’ireo kosa '
  - type: text
    content: no hahafaka
  - type: text
    content: ' ny alahelonareo, mba hisy fitoviana, '
  '15':
  - type: text
    content: 'araka ny voasoratra hoe: ,,'
  - type: text
    content: Ny nanangona
  - type: text
    content: ' be tsy nanana amby, ary ny '
  - type: text
    content: nanangona
  - type: text
    content: ' kely tsy nanana ny tsy ampy’’ (Eks. 16.18).'
  '16':
  - type: text
    content: 'Fa isaorana anie Andriamanitra, Izay manome fahazotoana ho ao am-pon’i Titosy ho anareo mitovy '
  - type: text
    content: amin’ny ahy.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Fa nanaiky ny fangatahanay ihany izy nefa nazoto rahateo, ka sitrapony ihany no nandehanany nankany aminareo. '
  '18':
  - type: text
    content: 'Ary ilay rahalahy izay nalaza amin’ny filazantsara any amin’ny fiangonana rehetra no nirahinay hiaraka aminy; '
  '19':
  - type: text
    content: ary tsy izany ihany, fa efa notendren’
  - type: note
    content: 'Na: nofidina tamin’ny fananganan-tànana.'
  - type: text
    content: ' ny fiangonana koa izy ho namanay hiara-mandeha aminay hitondra izao fahasoavana izao, izay angoninay'
  - type: note
    content: Gr. ataonay amin’ny fanompoanay.
  - type: text
    content: ' ho voninahitry ny Tompo sy ho vavolombelon’ny fahazotoanay. '
  '2':
  - type: text
    content: fa tamin’ny fahoriana be nizahan-toetra azy no nitomboan’ny hafaliany, ary ny hamafin’
  - type: note
    content: Gr. halalin’
  - type: text
    content: ' ny fahantrany no nampitombo ny haren’ny hitsim-pony.'
  - type: note
    content: 'Na: fahafoizany.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Ary mitandrina izahay mba tsy hisy hanome tsiny anay amin’izao harena be angoninay
  - type: note
    content: Gr. ataonay amin’ny fanompoanay.
  - type: text
    content: ' izao; '
  '21':
  - type: text
    content: 'fa miomana hanao izay mahamendrika izahay, tsy eo imason’ny Tompo ihany, fa eny imason’ny olona koa. '
  '22':
  - type: text
    content: Ary nirahinay niaraka tamin’ireo ilay rahalahinay izay efa hitanay mazoto matetika amin’ny zavatra maro; fa ankehitriny mazoto kokoa izy noho ny haben’ny fahatokiany anareo.
  '23':
  - type: text
    content: Raha ny amin’i Titosy, dia namako izy sady mpiara-miasa amiko ho anareo; ary ireo rahalahinay, dia iraky
  - type: note
    content: Gr. apostoly.
  - type: text
    content: ' ny fiangonana izy sady voninahitr’i Kristy. '
  '24':
  - type: text
    content: Koa amin’izany asehoy aminy eo imason’ny fiangonana ny famantarana mahamarina ny fitiavanareo sy ny reharehanay ny aminareo.
  '3':
  - type: text
    content: 'Koa vavolombelona aho fa araka ny zakany, eny, mihoatra noho ny zakany aza, sady araka ny sitrapony ihany, '
  - type: text
    content: no nanomezany,
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'sady nangataka mafy taminay koa izy mba havelanay hikambana amin’izany fanompoana ho an’ny olona masina izany; '
  '5':
  - type: text
    content: 'ary tsy araka ny nantenainay, fa ny tenany no natolony ho an’ny Tompo aloha, dia vao ho anay koa noho ny sitrapon’Andriamanitra; '
  '6':
  - type: text
    content: ka dia nangataka an’i Titosy izahay mba hahatanteraka izany fahasoavana izany eo aminareo koa, araka ny efa nanombohany azy teo aloha.
  '7':
  - type: text
    content: 'Fa araka ny itomboanareo amin’ny zavatra rehetra, na amin’ny finoana, na amin’ny teny, na amin’ny fahalalana, na amin’ny fahazotoana rehetra, na amin’ny fitiavanareo anay, dia aoka ho araka izany koa no hitomboanareo amin’izao fahasoavana izao. '
  '8':
  - type: text
    content: 'Tsy milaza izany ho didy aho, fa noho ny zotom-pon’ny sasany, mba hizaha toetra ny hamarinan’ny fitiavanareo koa. '
  '9':
  - type: text
    content: 'Fa fantatrareo ny fahasoavan’i Jesosy Kristy Tompontsika, fa na dia nanan-karena aza Izy, dia tonga malahelo noho ny aminareo, mba hampanan-karena anareo ny alahelony. '
