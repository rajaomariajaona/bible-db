document_id: EZK.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fanoharana mampiseho ny toetr’i Jerosalema.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak’olona, inona no ihoaran’ny tahom-boaloboka noho ny hazo rehetra, dia ny sakeli-boaloboka izay isan’ny hazo any an-ala? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa mba fangalan-kazo hatao zavatra akory va izy, na mba fangalana fihantonan-javatra? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, hatsipy any anaty afo hataina izy; ny laniny roa ho levon’ny afo, ary ny tenatenany ho may. Ka moa azo atao zavatra akory va izy? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, fony izy tsy mbola nahafahana aza, dia tsy azo natao zavatra, koa mainka fa rehefa levon’ny afo sy may izy?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah Tompo: Toy ny tahom-boaloboka amin’ny hazo any an-ala, izay natolotro hataina, dia toy izany no hanolorako ny mponina any Jerosalema. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hanandrina azy ny tavako; hiala avy amin’ny afo izy, nefa ho levon’ny afo hafa indray; ka dia ho fantatrareo fa Izaho no Jehovah, raha manandrina azy ny tavako. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hataoko lao ny tany noho ny nivadihany tamiko, hoy Jehovah Tompo.
