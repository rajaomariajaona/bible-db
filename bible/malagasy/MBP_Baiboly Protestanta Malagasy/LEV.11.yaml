document_id: LEV.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny lalàna ny amin’ny biby madio sy maloto.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy sy Arona ka nanao taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’ny Zanak’Isiraely hoe: Izao no ho fihinanareo amin’ny biby rehetra ambonin’ny tany: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izay biby rehetra mivaky kitro, ka misaraka tsara ny kitrony, sady mandinika izy, no ho fihinanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Kanefa amin’izay mandinika sy mivaky kitro dia izao kosa no tsy ho fihinanareo: Ny rameva, satria mandinika ihany izy, nefa tsy mba mivaky kitro: maloto aminareo izy; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary ny hyraka, satria mandinika ihany izy, nefa tsy mba mivaky kitro: maloto aminareo izy; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary ny rabitro, satria mandinika ihany izy, nefa tsy mba mivaky kitro; maloto aminareo izy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary ny kisoa, satria mivaky kitro ihany izy ka misaraka tsara ny kitrony, nefa tsy mba mandinika izy: maloto aminareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny henan’ireny tsy ho fihinanareo, ary ny fatiny tsy hokasihinareo akory; zava-maloto aminareo ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary amin’izay rehetra ao anatin’ny rano dia izao no ho fihinanareo: Izay rehetra misy vombony sy kirany ao anaty rano, na ao anatin’ny rano-masina, na ao anatin’ny ony, no ho fihinanareo; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa izay rehetra tsy misy vombony sy kirany kosa, na ao anatin’ny ranomasina, na ao anatin’ny ony, na amin’izay rehetra mihetsiketsika ao anaty rano sy amin’ny zava-mananaina izay ao anaty rano; fahavetavetana aminareo ireny; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'eny, ho fahavetavetana aminareo ireny; tsy ho fihinanareo ny nofony, ary hataonareo ho zava-betaveta ny fatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izay rehetra tsy misy vombony na kirany ao anaty rano dia ho zava-betaveta aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izao no ho zava-betaveta aminareo amin’ny vorona ka tsy ho fihinanareo, fa zava-betaveta izy: ny voltora sy ny gypa sy ny ankoay '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary ny papango sy ny voromahery, isan-karazany, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary ny goaika rehetra, isan-karazany, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary ny ostritsa sy ny tararaka sy ny vorondriaka sy ny hitsikitsika, isan-karazany, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary ny vorondolo sy ny manarana sy ny vorondolo lehibe '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary ny ibisa sy ny sama ary ny voltora madinika '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: sy ny vano sy ny vanobe isan-karazany, ary ny takidara sy ny manavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zava-mandady rehetra izay manana elatra sady mandia tongotra efatra dia ho zava-betaveta aminareo; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'nefa izao kosa no ho fihinanareo amin’ny zava-mandady izay manana elatra sady mandia tongotra efatra, dia izay manam-pingotra ambonin’ny faladiany hitsipihany eo amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Amin’ireny dia izao no ho fihinanareo; ny valala, isan-karazany, ny solama,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tokony ho naman’ny valala ireo.
    marker-yv: yv-n
  - type: text
    text: ' isan-karazany, ary ny hargola,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tokony ho naman’ny valala ireo.
    marker-yv: yv-n
  - type: text
    text: ' isan-karazany, ary ny hagaba,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tokony ho naman’ny valala ireo.
    marker-yv: yv-n
  - type: text
    text: ' isan-karazany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ny zava-mandady rehetra izay manana elatra sady mandia tongotra efatra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: afa-tsy ireo
  - type: text
    text: ' dia ho zava-betaveta aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia ireo no ho zava-maloto aminareo; ary izay rehetra mikasika ny fatiny dia haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary izay rehetra mitondra ny fatiny dia hanasa ny fitafiany ary haloto mandra-paharivan’ny andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny biby rehetra izay mivaky kitro, nefa tsy mba misara-kitro tsara sady tsy mandinika, dia ho zava-maloto aminareo; haloto izay rehetra mikasika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary izay rehetra mandeha amin’ny faladiany, amin’ny biby rehetra izay mandia tongotra efatra, dia zava-maloto aminareo; haloto mandra-paharivan’ny andro izay rehetra mikasika ny fatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary izay mitondra ny fatiny dia hanasa ny fitafiany ka haloto mandra-paharivan’ny andro; ho zava-maloto aminareo ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary izao no haloto aminareo amin’ny biby izay mandady na mikisaka amin’ny tany: ny kionkiona sy ny totozy ary ny sitry, isan-karazany, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ary ny anakà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tokony ho naman’ny androngo sy ny sitry ireo.
    marker-yv: yv-n
  - type: text
    text: ' sy ny koaha'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tokony ho naman’ny androngo sy ny sitry ireo.
    marker-yv: yv-n
  - type: text
    text: sy ny letaha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tokony ho naman’ny androngo sy ny sitry ireo.
    marker-yv: yv-n
  - type: text
    text: ' sy ny hometa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Tokony ho naman’ny androngo sy ny sitry ireo.
    marker-yv: yv-n
  - type: text
    text: ' ary ny tana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ireo no maloto aminareo amin’ny biby rehetra izay mandady na mikisaka; izay rehetra mikasika ny fatin’ireo dia haloto mandra-paharivan’ny andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary izay zavatra rehetra ilatsahan’ny fatin’ireo, na fanaka hazo, na fitafiana, na hoditra, na lasaka, izay mety ho fanaovan-javatra na inona na inona, dia haloto, ka tsy maintsy hatao anaty rano izany, ary haloto mandra-paharivan’ny andro izy vao hadio. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny amin’ny vilany tany rehetra izay ilatsahan’ny fatin’ireo, dia haloto izay ao anatiny na inona na inona, ary ny vilany dia hovakinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny hanina fihinana rehetra, izay asian-drano, sy ny fisotro rehetra izay sotroina dia haloto koa, na tamin’ny fanaka inona na tamin’ny fanaka inona. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary haloto izay zavatra rehetra ilatsahan’ny fatin’ireo, na fanendasana, na vilany mirakotra, dia hovakivakina izany; fa maloto ireny, ary ho zava-maloto aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Kanefa ny loharano na ny lavaka famorian-drano izay misy rano be dia hadio ihany; fa izay mikasika ny fatin-javatra eo no haloto. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary raha misy fatin’ireo latsaka amin’ny voan-javatra famafy, izay efa hafafy, dia hadio ihany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fa raha misy voan-javatra nalona tamin’ny rano ka ilatsahan’ny fatiny, dia ho zava-maloto aminareo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary raha misy maty izay biby fihinanareo, dia haloto mandra-paharivan’ny andro izay mikasika ny fatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary izay mihinana amin’ny fatiny dia hanasa ny fitafiany, ary haloto mandra-paharivan’ny andro; ary izay mitondra ny fatiny dia hanasa ny fitafiany sady haloto mandra-paharivan’ny andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary ny zavatra rehetra izay mandady na mikisaka amin’ny tany dia ho zava-betaveta aminareo ka tsy ho fihinana. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Izay rehetra mandady amin’ny kibony sy izay rehetra mandia tongotra efatra ary izay rehetra maro tongotra, dia ny biby rehetra izay mandady na mikisaka amin’ny tany, dia tsy ho fihinanareo, fa zava-betaveta ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Aza mametaveta ny tenanareo amin’izay biby mandady na mikisaka; ary aza mandoto ny tenanareo aminy, mba tsy hahaloto anareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fa Izaho no Jehovah Andriamanitrareo, dia manamasìna ny tenanareo, ka dia ho masina hianareo, satria masina Aho; ary aza mandoto ny tenanareo amin’izay zavatra mandady na mikisaka amin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Fa Izaho no Jehovah Izay nitondra anareo niakatra avy tany amin’ny tany Egypta, mba ho Andriamanitrareo, ka dia ho masina hianareo, satria masina Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Izany no lalàna ny amin’ny biby sy ny vorona sy ny zava-manan-aina rehetra izay mihetsiketsika ao anaty rano ary ny zava-manan-aina rehetra izay mandady na mikisaka amin’ny tany, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: mba hanavahana ny maloto sy ny madio, ary ny biby izay ho fihinana sy ny biby izay tsy ho fihinana.
