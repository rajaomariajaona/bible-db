document_id: ROM.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny tsi-fahamarinan’ny Jiosy sy ny tsy ahazoany fahamarinana avy amin’ny lalàna.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: KOA amin’izany dia tsy manan-kalahatra hianao, ralehilahy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: olona.
    marker-yv: yv-n
  - type: text
    text: ' na zovy na zovy hianao izay mitsara; fa izay itsaranao ny sasany no anamelohanao ny tenanao koa, fa hianao izay mitsara aza dia mba manao izany ihany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nefa fantatsika fa ny fitsaran’Andriamanitra dia araka ny marina amin’izay manao toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary hianao, ralehilahy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: olona.
    marker-yv: yv-n
  - type: text
    text: ' izay mitsara ny manao izany, kanefa manao izany koa ny tenanao, moa ataonao va fa ho afa-mandositra ny fitsaran’Andriamanitra hianao? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sa hamavoinao ny haren’ny fahamoram-panahiny sy ny fandeferany ary ny fahari-pony, satria tsy fantatrao fa ny fahamoram-panahin’Andriamanitra dia mitaona anao hibebaka? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny ditranao sy ny fonao tsy mibebaka no irakatenao fahatezerana ho anao amin’ny andro fahatezerana sy fampisehoana ny fitsarana marin’Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay hamaly ny olona rehetra araka ny asany avy: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ho an’izay maharitra manao soa mandrakariva ka mitady voninahitra sy laza ary tsi-fahafatesana, dia fiainana mandrakizay; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa ho an’izay mitady ny ho an’ny tenany ihany kosa sady tsy manaraka ny marina, fa manaraka ny tsy marina, dia fahavinirana sy fahatezerana, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'eny, fahoriana sy fahantrana ho an’ny fanahin’ny olona rehetra izay manao ratsy, amin’ny Jiosy aloha, dia vao amin’ny jentilisa koa; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa voninahitra sy laza ary fiadanana kosa ho an’ny olona rehetra izay manao ny tsara, amin’ny Jiosy aloha, dia vao amin’ny jentilisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grika.
    marker-yv: yv-n
  - type: text
    text: ' koa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tsy misy fizahan-tavan’olona amin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izay nanota tsy nanana ny lalàna dia ho very tsy manana ny lalàna; fa izay nanota nanana ny lalàna kosa dia hotsaraina araka ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa tsy ny mpandre ny lalàna no marina eo anatrehan’Andriamanitra, fa ny mpankatò ny lalàna no hohamarinina; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa na oviana na oviana ireo jentilisa tsy manana ny lalàna ireo no misy manao izay nandidian’ny lalàna araka ny nahim-pony, na dia tsy manana ny lalàna aza ireo, dia lalàn-tenany ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa ireo maneho ny asan’ny lalàna ho voasoratra ao am-pony, sady ny fieritreretany no vavolombelony, ary ny fisainany mifampiampanga, nefa mba mifanafaka ihany koa aza,– '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: amin’ny andro izay hitsaran’Andriamanitra ny zavatra takona ataon’ny olona, araka ny filazantsarako amin’ny alalan’i Jesosy Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha saingy atao hoe Jiosy hianao ka mitoky amin’ny lalàna sy manao an’Andriamanitra ho reharehanao '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary mahalala ny sitrapony sady mamantatra ny zavatra tsara indrindra,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: samy hafa.
    marker-yv: yv-n
  - type: text
    text: ' satria efa nampianarina ny lalàna hianao '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary matoky ny tenanao ho mpitarika ny jamba, fanazavana ny ao amin’ny maizina, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'mpananatra ny adala, mpampianatra ny bodo, satria hianao manana ny lalàna ho mariky ny fahalalana sy ny fahamarinana: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ka moa hianao izay mampianatra ny sasany, tsy mba mampianatra ny tenanao koa va? Hianao izay mitory hoe: Aza mangalatra, mba mangalatra ihany va hianao? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hianao izay manao hoe: Aza mijangajanga, mba mijangajanga ihany va hianao? Hianao izay mametaveta ny sampy, mba mandroba tempoly ihany va hianao? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hianao izay manao ny lalàna ho reharehanao, mba manala voninahitra an’Andriamanitra ihany va hianao amin’ny andikanao ny lalàna? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa araka ny voasoratra, dia hianareo no itenenana ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'anaovana blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’Andriamanitra any amin’ny jentilisa (Isa. 52.5).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa ny famorana mahasoa tokoa, raha mankatò ny lalàna hianao; fa raha mpandika ny lalàna kosa hianao, dia efa tonga toy ny tsy voafora, na dia efa voafora aza. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha mankatò ny fitsipiky ny lalàna ny tsy voafora, tsy hatao ho isan’ny voafora va izy, na dia tsy voafora aza? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary tsy hohelohin’ny tsy mifora izay mankatò ny lalàna va hianao, izay mpandika ny lalàna, na dia manana ny soratra sy ny famorana aza hianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa tsy izay araka ny miseho no Jiosy, ary tsy izay miseho eo amin’ny nofo no famorana; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'fa izay araka ny miafina no Jiosy, ary ny famorana dia amin’ny fo, amin’ny fanahy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fa
  - type: text
    text: ' tsy amin’ny soratra; ny fiderana ireny tsy avy amin’ny olona, fa avy amin’Andriamanitra.'
