document_id: NUM.17,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: Mialà amin’io fiangonana io handringanako azy amin’ny indray mipì-maso monja. Dia niankohoka izy roa lahy.
  '11':
  - type: text
    content: 'Ary hoy Mosesy tamin’i Arona: Alao ny fitondran-afo, ka asio afo avy eo ambonin’ny alitara izy, dia asio ditin-kazo manitra, ka ento faingana eo amin’ny fiangonana, ka manaova fanavotana ho azy; fa efa mivoaka avy tamin’i Jehovah ny fahatezerana, ary efa miantomboka ny areti-mandringana. '
  '12':
  - type: text
    content: 'Dia nalain’i Arona izany, araka izay nandidian’i Mosesy, ka nihazakazaka ho eo afovoan’ny fiangonana izy; ary, indro, efa niantomboka teo amin’ny olona ny areti-mandringana; ary nandoro ny ditin-kazo manitra teo izy ka nanao fanavotana ho an’ny olona. '
  '13':
  - type: text
    content: Dia nijanona teo anelanelan’ny maty sy ny velona izy, ka dia nitsahatra ny areti-mandringana.
  '14':
  - type: text
    content: Ary izay efa matin’ny areti-mandringana dia fiton-jato amby efatra arivo sy iray alina, afa-tsy izay efa maty noho ny amin’i Kora.
  '15':
  - type: text
    content: Ary Arona niverina ho eo amin’i Mosesy teo anoloan’ny varavaran’ny trano-lay fihaonana; ary ny areti-mandringana dia nitsahatra.
  '16':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '17':
  - type: text
    content: 'Mitenena amin’ny Zanak’Isiraely, ka analao tehina iray avy araka ny fianakaviany izy, ka ny lohan’ny fireneny rehetra araka ny fianakaviany avy no hanalana azy, dia tehina roa ambin’ny folo; ary samy soraty eo amin’ny tehiny avy ny anaran’izy rehetra. '
  '18':
  - type: text
    content: 'Fa ny anaran’i Arona no hosoratanao amin’ny tehin’i Levy; fa tehina iray avy no ho an’ny lohan’ny fianakaviany. '
  '19':
  - type: text
    content: Dia hataonao ao amin’ny trano-lay fihaonana ireo, dia eo anoloan’ny Vavolombelona,
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' izay ihaonako aminareo. '
  '2':
  - type: text
    content: 'Mitenena amin’i Eleazara, zanak’i Arona mpisorona, mba hotsimponiny eo anatin’ny may ny fitondran-afo, ary ny afo dia aelezo lavitra; fa masina ireny: '
  '20':
  - type: text
    content: Ary ny tehin’ny lehilahy izay hofidiko dia hitsimoka; ka dia hampanginiko ny fimonomononan’ny Zanak’Isiraely amiko, izay imonomononany aminareo.
  '21':
  - type: text
    content: 'Ary Mosesy dia niteny tamin’ny Zanak’Isiraely, ka ny lohan’ny firenena dia samy nanatitra tehina iray avy teo aminy araka ny fianakaviany, dia tehina roa ambin’ny folo; ary ny tehin’i Arona dia teo afovoan’ireo tehiny ireo. '
  '22':
  - type: text
    content: Dia napetrak’i Mosesy teo anatrehan’i Jehovah, tao amin’ny trano-lain’ny Vavolombelona
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' ireo tehina ireo.'
  '23':
  - type: text
    content: Ary nony ampitso dia niditra tao amin’ny trano-lain’ny Vavolombelona
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' Mosesy, ary indro fa nitsimoka ny tehin’i Arona, izay ho an’ny taranak’i Levy, dia nanaroka sy namony ka namoa amygdala. '
  '24':
  - type: text
    content: Dia nentin’i Mosesy nivoaka hiala eo anatrehan’i Jehovah ny tehina rehetra, ho eo amin’ny Zanak’Isiraely rehetra; dia nijery izy, ka samy nandray ny tehiny avy.
  '25':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Mosesy: Avereno ny tehin’i Arona ho eo anoloan’ny Vavolombelona,'
  - type: note
    content: Dia ny Didy Folo.
  - type: text
    content: ' hotehirizina ho famantarana ho an’ny mpiodina, ka dia hatsahatrao hiala amiko ny fimonomononany, mba tsy ho faty izy. '
  '26':
  - type: text
    content: Dia nataon’i Mosesy izany; araka izay efa nandidian’i Jehovah azy no nataony.
  '27':
  - type: text
    content: 'Dia niteny tamin’i Mosesy ny Zanak’Isiraely ka nanao hoe: Indro, maty izahay, ringana izahay, eny, ringana avokoa izahay rehetra. '
  '28':
  - type: text
    content: Ho faty izay rehetra manakaiky, dia izay manakaiky ny tabernakelin’i Jehovah; ho lany maty va izahay?
  '3':
  - type: text
    content: ary ny fitondran-afon’ireo mpanota nanimba tena ireo dia aoka hatao takelaka manify hapetaka amin’ny alitara; fa nateriny teo anatrehan’i Jehovah ireny ka masina; ary ho famantarana ho an’ny Zanak’Isiraely ireny.
  '4':
  - type: text
    content: 'Ary nalain’i Eleazara mpisorona ny fitondran-afo varahina, izay efa nanateran’ireo olona may ireo, ka nofisahiny ho takelaka hapetaka amin’ny alitara '
  '5':
  - type: text
    content: ho fahatsiarovana ho an’ny Zanak’Isiraely, mba tsy hisy olon-kafa afa-tsy ny taranak’i Arona ihany no hahazo manakaiky handoro ditin-kazo manitra eo anatrehan’i Jehovah; fandrao ho tahaka an’i Kora sy ny namany
  - type: note
    content: Heb. fiangonany.
  - type: text
    content: ' izy,–dia araka ny tenin’i Jehovah izay nampitondrainy an’i Mosesy.'
  '6':
  - type: text
    content: 'Ary nony ampitso dia nimonomonona tamin’i Mosesy sy Arona ny fiangonana, dia ny Zanak’Isiraely rehetra, ka nanao hoe: Hianareo efa nahafaty ny olon’i Jehovah.'
  '7':
  - type: text
    content: 'Ary raha niangona hanome tsiny an’i Mosesy sy Arona ny fiangonana, dia nijery ny trano-lay fihaonana izy, ka, indro, nanarona azy ny rahona, ary niseho ny voninahitr’i Jehovah. '
  '8':
  - type: text
    content: Ary Mosesy sy Arona dia nankeo anoloan’ny trano-lay fihaonana.
  '9':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
