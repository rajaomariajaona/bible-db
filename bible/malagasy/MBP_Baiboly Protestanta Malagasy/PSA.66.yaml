document_id: PSA.66,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana izao rehetra izao hisaotra an’Andriamanitra noho ny nataony ho an’ny mpanompony.
  - type: text
    content: Ho an’ny mpiventy hira. Tonon-kira. Salamo.
  - type: text
    content: MIHOBIA ho an’Andriamanitra, ry tany rehetra;
  '10':
  - type: text
    content: Fa efa nizaha toetra anay Hianao, Andriamanitra ô;
  - type: text
    content: Efa nanadio anay Hianao, tahaka ny fanadio volafotsy amin’ny memy.
  '11':
  - type: text
    content: Efa nampiditra anay tamin’ny fandrika Hianao;
  - type: text
    content: Efa nanisy enta-mavesatra teo am-balahanay Hianao.
  '12':
  - type: text
    content: Efa nampandeha ny olona hanitsaka ny lohanay Hianao;
  - type: text
    content: Nandeha namaky ny afo sy ny rano izahay;
  - type: text
    content: Fa nitondra anay nivoaka ho amin’ny fitahiana mahatretrika Hianao.
  '13':
  - type: text
    content: Hiditra ao an-tranonao mitondra fanatitra dorana aho;
  - type: text
    content: Hefaiko aminao ny voadiko,
  '14':
  - type: text
    content: Izay notononin’ny molotro
  - type: text
    content: Sy naloaky ny vavako, fony aho azom-pahoriana.
  '15':
  - type: text
    content: Hateriko aminao ho fanatitra dorana ny matavy
  - type: text
    content: Mbamin’ny setroky ny ondrilahy;
  - type: text
    content: Hanatitra omby sy osilahy aho.
  - type: text
    content: '[Sela.]'
  '16':
  - type: text
    content: Avia, mihainoa hianareo rehetra izay matahotra an’Andriamanitra,
  - type: text
    content: Fa holazaiko izay nataony ho an’ny fanahiko.
  '17':
  - type: text
    content: Izy no nantsoin’ny vavako;
  - type: text
    content: Ary ny fanandratana Azy no teo ambanin’ny lelako.
  '18':
  - type: text
    content: Raha nankasitraka
  - type: note
    content: Heb. nijery.
  - type: text
    content: ' ota tao am-poko aho,'
  - type: text
    content: Dia tsy mba hihaino ny Tompo;
  '19':
  - type: text
    content: Kanefa efa nihaino tokoa Andriamanitra;
  - type: text
    content: Efa nihaino ny feon’ny fivavako Izy.
  '2':
  - type: text
    content: Mankalazà ny voninahitry ny anarany;
  - type: text
    content: Omeo voninahitra Izy ho fiderana Azy.
  '20':
  - type: text
    content: Isaorana anie Andriamanitra,
  - type: text
    content: Izay tsy nandà ny fivavako,
  - type: text
    content: Na nanaisotra ny famindrampony tamiko.
  '3':
  - type: text
    content: 'Lazao amin’Andriamanitra hoe: Endrey, mahatahotra ny asanao!'
  - type: text
    content: Ny fahalehibiazan’ny herinao no hikoizan’ny fahavalonao Anao.
  '4':
  - type: text
    content: Ny tany rehetra hiankohoka eo anatrehanao ka hankalaza Anao;
  - type: text
    content: Eny, hankalaza ny anaranao izy.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Avia, ka jereo ny asan’Andriamanitra,
  - type: text
    content: Mahatahotra ny zavatra ataony amin’ny zanak’olombelona.
  '6':
  - type: text
    content: Efa nampody ny ranomasina ho tany maina Izy;
  - type: text
    content: Nandeha an-tongotra nita ny ony ny olona;
  - type: text
    content: Tao no nifaliantsika tamin’
  - type: note
    content: 'Na: Ao no aoka hifaliantsika amin’.'
  - type: text
    content: Andriamanitra.
  '7':
  - type: text
    content: Manjaka mandrakizay amin’ny heriny Izy,
  - type: text
    content: Ary ny masony mandinika ny firenen-tsamy hafa;
  - type: text
    content: Aoka tsy hanandra-tena ny maditra.
  - type: text
    content: '[Sela.]'
  '8':
  - type: text
    content: Misaora an’Andriamanitsika, ry firenena;
  - type: text
    content: Ary asandrato ny feo fiderana Azy,
  '9':
  - type: text
    content: Izay mampitoetra ny fanahintsika amin’ny fiainana
  - type: text
    content: Ka tsy mamela ny tongotsika hangozohozo.
