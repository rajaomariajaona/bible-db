document_id: PSA.66
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiantsoana izao rehetra izao hisaotra an’Andriamanitra noho ny nataony ho an’ny mpanompony.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Tonon-kira. Salamo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: MIHOBIA ho an’Andriamanitra, ry tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mankalazà ny voninahitry ny anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Omeo voninahitra Izy ho fiderana Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lazao amin’Andriamanitra hoe: Endrey, mahatahotra ny asanao!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahalehibiazan’ny herinao no hikoizan’ny fahavalonao Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny tany rehetra hiankohoka eo anatrehanao ka hankalaza Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hankalaza ny anaranao izy.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avia, ka jereo ny asan’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatahotra ny zavatra ataony amin’ny zanak’olombelona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa nampody ny ranomasina ho tany maina Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nandeha an-tongotra nita ny ony ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tao no nifaliantsika tamin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ao no aoka hifaliantsika amin’.
    marker-yv: yv-n
  - type: text
    text: Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manjaka mandrakizay amin’ny heriny Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny masony mandinika ny firenen-tsamy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hanandra-tena ny maditra.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Misaora an’Andriamanitsika, ry firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary asandrato ny feo fiderana Azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay mampitoetra ny fanahintsika amin’ny fiainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mamela ny tongotsika hangozohozo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa efa nizaha toetra anay Hianao, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanadio anay Hianao, tahaka ny fanadio volafotsy amin’ny memy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa nampiditra anay tamin’ny fandrika Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nanisy enta-mavesatra teo am-balahanay Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Efa nampandeha ny olona hanitsaka ny lohanay Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nandeha namaky ny afo sy ny rano izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nitondra anay nivoaka ho amin’ny fitahiana mahatretrika Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hiditra ao an-tranonao mitondra fanatitra dorana aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hefaiko aminao ny voadiko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay notononin’ny molotro
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy naloaky ny vavako, fony aho azom-pahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hateriko aminao ho fanatitra dorana ny matavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny setroky ny ondrilahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanatitra omby sy osilahy aho.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Avia, mihainoa hianareo rehetra izay matahotra an’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa holazaiko izay nataony ho an’ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izy no nantsoin’ny vavako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fanandratana Azy no teo ambanin’ny lelako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha nankasitraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nijery.
    marker-yv: yv-n
  - type: text
    text: ' ota tao am-poko aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy mba hihaino ny Tompo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Kanefa efa nihaino tokoa Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nihaino ny feon’ny fivavako Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Isaorana anie Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy nandà ny fivavako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nanaisotra ny famindrampony tamiko.
