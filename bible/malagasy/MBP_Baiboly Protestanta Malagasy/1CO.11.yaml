document_id: 1CO.11,873
type_code: plt
verses:
  '1':
  - type: text
    content: Aoka hanahaka ahy hianareo, dia tahaka ny anahafako an’i Kristy.
  - type: heading
    content: Ny amin’ny tokony hisaronan’ny vehivavy loha ao am-piangonana.
  '10':
  - type: text
    content: Izany no mahamety ny vehivavy hisaron-doha
  - type: note
    content: Gr. hanana fahefana eo amin’ny lohany.
  - type: text
    content: ' noho ny amin’ny anjely. '
  '11':
  - type: text
    content: 'Kanefa ao amin’ny Tompo tsy misy vehivavy raha tsy misy lehilahy, ary tsy misy lehilahy raha tsy misy vehivavy. '
  '12':
  - type: text
    content: 'Fa toy ny nihavian’ny vehivavy avy tamin’ny lehilahy, dia toy izany koa no nihavian’ny lehilahy avy tamin’ny vehivavy; fa Andriamanitra kosa no ihavian’ny zavatra rehetra. '
  '13':
  - type: text
    content: 'Hevero ao am-ponareo: Mendrika va raha mivavaka amin’Andriamanitra ka tsy misaron-doha ny vehivavy? '
  '14':
  - type: text
    content: 'Tsy mampianatra anareo va izao fomban’ny zavatra rehetra izao fa raha lava volo ny lehilahy, dia mahafa-boninahitra azy izany? '
  '15':
  - type: text
    content: Fa raha lava volo kosa ny vehivavy, dia voninahitra ho azy izany fa ny volo no nomena azy ho fisaronana.
  '16':
  - type: text
    content: Fa raha misy olona toa tia ady, dia tsy manana izany fanao izany isika, na ny fiangonan’
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' Andriamanitra.'
  - type: heading
    content: Ny amin’ny Fanasan’ny Tompo.
  '17':
  - type: text
    content: 'ARY raha manao izao didy izao aho, dia tsy midera anareo tsy akory, satria tsy miangona hihatsara hianareo, fa hiharatsy. '
  '18':
  - type: text
    content: 'Fa voalohany indrindra, raha miangona ao am-piangonana hianareo, dia reko fa misy fisarahana eo aminareo; ary mba misy inoako ihany izany. '
  '19':
  - type: text
    content: Fa tsy maintsy misy fitokoana eo aminareo, mba haseho eo aminareo izay olona ankasitrahana.
  '2':
  - type: text
    content: 'ARY midera anareo aho, satria mahatsiaro ahy amin’ny zavatra rehetra hianareo sady mitana tsara ny fampianarana natolotra, araka ny nanolorako azy taminareo. '
  '20':
  - type: text
    content: 'Koa raha miangona hianareo, dia tsy misy hihinanana ny Fanasan’ny Tompo akory. '
  '21':
  - type: text
    content: 'Fa raha mihinana hianareo, dia samy homana ny sakafony avy aloha hianareo; koa ny anankiray dia noana, fa ny anankiray kosa mamo. '
  '22':
  - type: text
    content: Moa tsy manan-trano hihinanana sy hisotroana va hianareo? Sa manao tsinontsinona ny fiangonan’
  - type: note
    content: Gr. eklesia.
  - type: text
    content: ' Andriamanitra ka manome henatra ny tsy manana? Inona no holazaiko aminareo? Hidera anareo va aho? Tsy hidera anareo amin’izany aho.'
  '23':
  - type: text
    content: 'Fa izaho efa nandray tamin’ny Tompo izay natolotro anareo kosa, fa Jesosy Tompo tamin’iny alina iny izay namadihana Azy, dia nandray mofo, '
  '24':
  - type: text
    content: 'ary rehefa nisaotra Izy, dia novakiny, ka hoy Izy: Ity no tenako'
  - type: note
    content: 'Ampio hoe: [izay vakina].'
  - type: text
    content: ' ho anareo; izao no ataovy ho fahatsiarovana Ahy. '
  '25':
  - type: text
    content: 'Dia araka izany koa ny kapoaka, rehefa nihinana, dia hoy Izy: Ity kapoaka ity no ilay fanekena vaovao amin’ny rako; izao no ataovy ho fahatsiarovana Ahy, na oviana na oviana no misotro hianareo. '
  '26':
  - type: text
    content: Fa na oviana na oviana hianareo no mihinana itony mofo itony sy misotro amin’ny kapoaka, dia manambara ny fahafatesan’ny Tompo hianareo mandra-pihaviny.
  '27':
  - type: text
    content: 'Koa na zovy na zovy no mihinana ny mofo sy misotro amin’ny kapoaky ny Tompo amin’ny fanahy tsy mendrika, dia ho meloka ny amin’ny tena sy ny ran’ny Tompo izy. '
  '28':
  - type: text
    content: 'Fa aoka ny olona hamantatra ny tenany, dia aoka izy hihinana ny mofo sy hisotro amin’ny kapoaka. '
  '29':
  - type: text
    content: 'Fa izay rehetra mihinana sy misotro dia mihinana sy misotro fanamelohana ho an’ny tenany, raha tsy mamantatra ny tena izy. '
  '3':
  - type: text
    content: 'Ary tiako ho fantatrareo fa Kristy no lohan’ny lehilahy rehetra; ary ny lehilahy kosa no lohan’ny vehivavy; ary Andriamanitra no lohan’i Kristy. '
  '30':
  - type: text
    content: 'Noho izany dia betsaka no marary sy marofy eo aminareo, ary maro ihany no efa nodi-mandry. '
  '31':
  - type: text
    content: 'Fa raha mba mamantatra ny tenantsika isika, dia tsy mba hotsaraina. '
  '32':
  - type: text
    content: 'Fa raha tsaraina isika, dia faizan’ny Tompo mba tsy hohelohina miaraka amin’izao tontolo izao. '
  '33':
  - type: text
    content: Koa raha miangona hihinana hianareo, ry rahalahy, dia mifampiandrasa.
  - type: note
    content: 'Na: mifampizarà.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: Ary raha misy olona noana, aoka izy hihinana ao an-tranony, mba tsy hiangonanareo ho fahamelohana. Ary ny zavatra sisa dia halahatro, rehefa tonga aho.
  '4':
  - type: text
    content: 'Ny lehilahy rehetra, raha mivavaka na maminany ka misaron-doha, dia mahafa-boninahitra ny lohany. '
  '5':
  - type: text
    content: 'Fa ny vehivavy rehetra kosa, raha mivavaka na maminany ka tsy misaron-doha, dia mahafa-boninahitra ny lohany, satria toy ny voaharatra izy. '
  '6':
  - type: text
    content: 'Fa raha tsy misaron-doha ny vehivavy, dia aoka hohetezana izy; fa raha mahamenatra ny vehivavy ny hohetezana na ny hoharatana, dia aoka hisaron-doha izy. '
  '7':
  - type: text
    content: 'Ny lehilahy dia tokony tsy hisaron-doha, satria endrika sy voninahitr’Andriamanitra izy; fa ny vehivavy kosa no voninahitry ny lehilahy. '
  '8':
  - type: text
    content: 'Fa tsy ny vehivavy no nihavian’ny lehilahy; fa ny lehilahy no nihavian’ny vehivavy. '
  '9':
  - type: text
    content: 'Fa tsy ny lehilahy no natao ho an’ny vehivavy, fa ny vehivavy no ho an’ny lehilahy. '
