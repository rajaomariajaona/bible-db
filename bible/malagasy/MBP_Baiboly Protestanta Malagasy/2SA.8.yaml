document_id: 2SA.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandresen’i Davida ny fahavalony.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ARY nony afaka izany, dia nandresy ny Filistina Davida ka nampietry azy; ary ny fanapahana ny renivohitra dia nesorin’i Davida tamin’ny tànan’ny Filistina.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'dia nirahin’i Toy Jorama zanany hankany amin’i Davida mpanjaka hiarahaba azy sy hisaotra azy noho ny niadiany tamin’i Hadadezera sy ny nandreseny azy (fa Hadadezera dia fahavalon’i Toy); ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jorama
    - type: text
      text: ' nitondra fanaka volafotsy sy fanaka volamena ary fanaka varahina; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'dia nohamasinin’i Davida mpanjaka ho an’i Jehovah koa izany mbamin’ny volafotsy sy ny volamena izay nohamasininy avy tamin’ny firenena rehetra izay efa resiny, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: dia tamin’i Syria sy Moaba sy ny taranak’i Amona sy ny Filistina sy ny Amalekita ary ny babo azony tamin’i Hadadezera, zanak’i Rehoba, mpanjakan’i Zoba.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary Davida nahazo laza nony niverina avy nandresy ny Syriana valo arivo sy iray alina teo amin’ny Lohasahan-tsira. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary nametrahany miaramila tany Edoma; eny, nametrahany miaramila avokoa Edoma rehetra, ary ny mponina rehetra tany Edoma dia tonga mpanompon’i Davida. Ary Jehovah nampahery an’i Davida teny amin’izay rehetra nalehany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny mpanao raharaham-panjakana tamin’i Davida.
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ARY Davida nanjaka tamin’ny Isiraely rehetra ka nitsara sy nitondra marina ny vahoakany rehetra.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary Joaba, zanak’i Zeroia, no komandin’ny miaramila; ary Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary Zadoka, zanak’i Ahitoba, sy Ahimeleka, zanak’i Abiatara, no mpisorona; ary Seraia no mpanoratra; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ary Benaia, zanak’i Joiada, no mpifehy ny mpiambina andriana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Heb. Keretita sy Peletita.
      marker-yv: yv-n
    - type: text
      text: ' ary ny zanak’i Davida no mpanolo-tsaina.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpisorona.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary nandresy ny Moabita koa izy, dia nampandriny tamin’ny tany ireo ary nohariny tamin’ny kofehy, ka izay indroan’ny kofehy novonoiny, fa ny erany kosa novelominy; ka dia tonga mpanompon’i Davida ny Moabita ka nandoa hetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia resin’i Davida koa Hadadezera, zanak’i Rehoba, mpanjakan’i Zoba, tamin’izy lasa nampody ny fanjakany teo amoron’ny ony Eofrata. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary Davida nahazo babo taminy, dia miaramila an-tsoavaly fiton-jato amby arivo sy miaramila an-tongotra roa alina; ary notraingotraingoin’i Davida avokoa ny soavalin-kalesy rehetra, fa ny tokony ho amin’ny kalesy zato ihany no navelany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary tonga ny Syriana avy tany Damaskosy hanampy an’i Hadadezera, mpanjakan’i Zoba; dia nahafatesan’i Davida olona roa arivo sy roa alina koa ny Syriana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nametrahan’i Davida miaramila tany Syria momba an’i Damaskosy; dia tonga mpanompon’i Davida ny Syriana ka nandoa hetra. Fa Jehovah nampahery an’i Davida teny amin’izay rehetra nalehany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nalain’i Davida ny ampinga volamena izay teny amin’ny mpanompon’i Hadadezera ka nentiny nankany Jerosalema. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary teo Beta sy Berotahy, tanànan’i Hadadezera, no nahazoan’i Davida mpanjaka babo varahina be dia be.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nony ren’i Toy, mpanjakan’i Hamata, fa efa naharesy ny miaramilan’i Hadadezera rehetra Davida, '
