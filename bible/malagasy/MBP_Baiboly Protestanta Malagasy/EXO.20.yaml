document_id: EXO.20
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanomezan’Andriamanitra ny Didy Folo.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA nilaza izao teny rehetra izao Andriamanitra ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izaho no Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin’ny tany Egypta, tamin’ny trano nahandevozana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza manana andriamani-kafa, fa Izaho ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza manao sarin-javatra voasokitra ho anao, na ny mety ho endriky ny zavatra izay eny amin’ny lanitra ambony, na izay etỳ amin’ny tany ambany, na izay any amin’ny rano ambanin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aza miankohoka eo anatrehany, ary aza manompo azy; fa Izaho, Jehovah Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin’ny zanaka hatramin’ny zafiafy sy ny zafindohalika, dia amin’izay mankahala Ahy; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: nefa kosa mamindra fo amin’ny olona arivo mandimby izay tia Ahy ka mitandrina ny didiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza manonona foana ny anaran’i Jehovah Andriamanitrao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aza manonona ny anaran’i Jehovah Andriamanitrao ho enti-mandainga.
    marker-yv: yv-n
  - type: text
    text: ' fa tsy hataon’i Jehovah ho tsy manan-tsiny izay manonona foana ny anarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mahatsiarova ny andro Sabata hanamasina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa Sabatan’i Jehovah Andriamanitrao ny andro fahafito; koa aza manao raharaha akory hianao amin’izany, na ny zanakao-lahy, na ny zanakao-vavy, na ny ankizilahinao, na ny ankizivavinao na ny biby fiompinao, na ny vahininao izay tafiditra eo am-bavahadinao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa henemana no nanaovan’i Jehovah ny lanitra sy ny tany sy ny ranomasina mbamin’izay rehetra ao aminy, dia nitsahatra Izy tamin’ny andro fahafito; izany no nitahian’i Jehovah ny andro Sabata sy nanamasinany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manajà ny rainao sy ny reninao mba ho maro andro hianao ao amin’ny tany izay omen’i Jehovah Andriamanitrao ho anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza mamono olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza mijangajanga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza mangalatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aza mety ho vavolombelona mandaiga hanameloka ny namanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza mitsiriritra ny tranon’ny namanao; aza mitsiriritra ny vadin’ny namanao, na ny ankizilahiny, na ny ankizivaviny, na ny ombiny, na ny borikiny, na izay mety ho an’ny namanao akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny olona rehetra nandre ny kotrokorana sy ny feon’ny anjomara ary nahita ny helatra sy ny tendrombohitra nivoa-tsetroka, ary nony nahita izany ny olona, dia tora-kovitra izy ka nijanona teny lavitra eny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy izy tamin’i Mosesy: Aoka ihany hianao no hiteny aminay, dia hihaino izahay; fa aza Andriamanitra no miteny aminay, fandrao maty izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy Mosesy tamin’ny olona: Aza matahotra; fa tonga Andriamanitra mba hizaha toetra anareo, ary mba ho eo anatrehan’ny tavanareo ny fahatahorana Azy, mba tsy hanotanareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nijanona teny lavitra eny ny olona, fa Mosesy kosa nanakaiky ny aizim-pito, izay nitoeran’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Izao no lazaonao amin’ny Zanak’Isiraely: Hianareo efa nahita fa tany an-danitra no nitenenako taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa aza manao andriamanitra volafotsy na andriamanitra volamena ho anareo ho fanampiko. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Alitara tany no hataonao ho Ahy, ka haterinao eo amboniny ny fanatitra odoranao sy ny fanati-pihavananao, dia ny ondry aman-osinao sy ny ombinao; eo amin’ny fitoerana rehetra izay ampahatsiarovako ny anarako no hanatonako anao sy hitahiako anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha alitara vato no hataonao ho Ahy, dia aza ny vato voapaika no hanaovanao azy; fa raha manainga ny fandrakao ho aminy hianao, dia handoto azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary aza asiana ambaratonga hiakaranao ho eo amin’ny alitarako, mba tsy ho hita eo ny fitanjahanao.
