document_id: ACT.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niovan’i Saoly ho Kristiana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Saoly mbola nifofofofo fandrahonana sy famonoana tamin’ny mpianatry ny Tompo ihany, dia nankao amin’ny mpisoronabe izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ka nangataka taratasy taminy ho any amin’ny synagoga any Damaskosy, mba ho entiny mifatotra ho any Jerosalema izay rehetra hitany momba izany fampianarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' izany, na lahy an vavy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha nandeha izy, dia tonga teo akaikin’i Damaskosy; ary nisy mazava avy tany an-danitra nanelatrelatra tampoka manodidina azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia lavo tamin’ny tany izy ka nandre feo nanao taminy hoe: Saoly, Saoly, nahoana hianao no manenjika Ahy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy izy: Iza moa hianao, Tompoko? Dia hoy Izy: Izaho no Jesosy Izay enjehinao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: fa mitsangàna, ka mankanesa ho any an-tanàna, dia holazaina aminao izay mety hataonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny olona izay nomba azy tamin’ny nalehany dia nitsangana tsy nahateny, ary nandre ny feo izy, nefa tsy nahita olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Saoly nitsangana tamin’ny tany, ary rehefa nahirany ny masony, dia tsy nahita na inona na inona izy; ary ireo nitantana azy ka nitondra azy ho any Damaskosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary tsy nahita izy hateloana sady tsy nihinana na nisotro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nisy mpianatra anankiray tany Damaskosy, atao hoe Ananiasy; ary hoy ny Tompo taminy tamin’ny fahitana: Ry Ananiasy. Dia hoy izy: Inty aho, Tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy ny Tompo taminy: Mitsangàna, ka mandehana any amin’ny làlana atao hoe Imahitsy, ka izahao ao an-tranon’i Jodasy izay lehilahy atao hoe Saoly avy any Tarsosy; fa, indro, efa mivavaka izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary izy efa nahita lehilahy atao hoe Ananiasy niditra ka nametra-tànana taminy, mba hahiratra indray ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Ananiasy namaly hoe: Tompoko, efa reko tamin’ny maro ny haben’ny ratsy nataon’izany lehilahy izany tamin’ny olonao masina tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary manana fahefana atỳ koa avy tamin’ny mpisoronabe izy hamatotra izay rehetra miantso ny anaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy ny Tompo taminy: Mandehana, fa fanaka voafidy izy ho fitondrana ny anarako eo anatrehan’ny jentilisa sy ny mpanjaka ary ny Zanak’Isiraely; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: fa hasehoko azy ny habetsahan’izay tsy maintsy hiaretany ho voninahitry ny anarako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nandeha Ananiasy ka niditra tao an-trano, dia nametra-tànana taminy ka nanao hoe: Ry Saoly rahalahy, ny Tompo, dia Jesosy Izay niseho taminao teo amin’ny làlana nalehanao, no efa naniraka ahy, mba hahiratan’ny masonao, ary mba ho feno ny Fanahy Masina hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niaraka tamin’izay dia nisy zavatra toy ny kiran’ny hazandrano niala avy tamin’ny masony, dia nahiratra izy ka nitsangana, dia natao batisa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary nihinan-kanina izy ka dia natanjaka.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitorian’i Saoly teny tany Damaskosy sy Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'ARY Saoly nitoetra andro vitsivitsy teo amin’ny mpianatra tany Damaskosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary niaraka tamin’izay dia nitory teo amin’ny synagoga izy ka nilaza an’i Jesosy fa Zanak’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary talanjona izay rehetra nandre ka nanao hoe: Tsy ity va ilay nandringana izay niantso izany anarana izany tany Jerosalema? ary tonga atỳ koa izy mba hitondra azy mifatotra ho any amin’ny mpisoronabe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Saoly mainka nihahery, dia nandresy lahatra ny Jiosy izay nonina tany Damaskosy ka naneho marimarina fa Jesosy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ity.
    marker-yv: yv-n
  - type: text
    text: ' no Kristy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary rehefa afaka andro maromaro, dia nihendry hamono azy ny Jiosy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'nefa fantatr’i Saoly ny fihendreny. Ary izy ireo niambina ny vavahady andro aman-alina hamonoany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa ny mpianany naka azy nony alina ka nampidina azy tamin’ny sobiky avy eo amin’ny mànda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary rehefa tonga tany Jerosalema Saoly, dia nitady hiray tamin’ny mpianatra; fa izy rehetra natahotra azy ka tsy nino azy ho mpianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa Barnabasy naka azy ka nitondra azy ho any amin’ny Apostoly, dia nanambara taminy ny nahitany ny Tompo sy ny nitenenany taminy teny an-dàlana ary ny fahasahiany nitory ny anaran’i Jesosy tany Damaskosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary izy niara-niditra sy nivoaka tamin’ireo tany Jerosalema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'sady nitory tamin’ny anaran’ny Tompo tamin’ny fahasahiana ary niresaka sy niady hevitra tamin’ny Helenista; fa ireo nitady hahafaty azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary rehefa fantatry ny rahalahy izany, dia nentiny nidina nankany Kaisaria izy ka nampandehaniny ho any Tarsosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia nanam-piadanana ny fiangonana eran’i Jodia sy Galilia ary Samaria rehetra, sady nandroso tsara sy nandeha tamin’ny fahatahorana ny Tompo sy ny famporisihan’ny Fanahy ka nihamaro.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandehanan’i Petera nitety tany, sy ny nananganany an’i Dorkasy tamin’ny maty.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ARY raha nandeha nitety ny tany rehetra Petera, dia nidina ho any amin’ny olona masina nonina tany Lyda koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary izy nahita lehilahy anankiray teo, atao hoe Enea, izay efa nandry valo taona teo am-parafara, fa nararin’ny Paralysisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Petera taminy: Ry Enea, manasitrana anao Jesosy Kristy; mitsangàna, ka amboary ny fandrianao. Dia nitsangana niaraka tamin’izay izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary nahita azy izay rehetra nonina tany Lyda sy Sarôna, ka dia niverina ho amin’ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary tany Jopa nisy vehivavy mpianatra atao hoe Tabita, izany hoe, raha adika, Dorkasy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dorkasy = Gazela; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao 2 Sam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ii.18.
    marker-yv: yv-n
  - type: text
    text: ' ary be ny asa soa sy ny fiantrana izay nataon’izany vehivavy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary narary izy tamin’izany andro izany, ka dia maty; ary rehefa nampandroiny ny faty, dia napetrany tao an-trano ambony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary satria Lyda akaikin’i Jopa, ary ny mpianatra nandre fa efa tonga ao Petera, dia naniraka roa lahy izy hangataka azy hoe: Aza misalasala hankatỳ aminay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nitsangana Petera ka nandeha niaraka taminy. Ary nony tonga izy, dia nentiny tany an-trano ambony; ary ny mpitondratena rehetra nitsangana teo anilany ka nitomany sady nampiseho ny akanjo sy lamba izay nozairin’i Dorkasy fony fahavelony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary navoak’i Petera avokoa izy rehetra, dia nandohalika izy ka nivavaka; ary nitodika nanatrika ny faty izy ka nanao hoe: Ry Tabita, mitsangàna. Dia nahirany ny masony; ary raha nahita an’i Petera izy, dia niarina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary Petera nanolo-tànana azy ka nanangana azy; ary rehefa niantso ny olona masina sy ny mpitondratena izy, dia nanolotra azy velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary dia fantatra eran’i Jopa izany, ka maro no nino ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary Petera nitoetra andro maromaro tany Jopa tao amin’i Simona mpandon-koditra.
