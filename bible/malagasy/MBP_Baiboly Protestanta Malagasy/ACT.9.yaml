document_id: ACT.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niovan’i Saoly ho Kristiana.
  - type: text
    content: 'ARY Saoly mbola nifofofofo fandrahonana sy famonoana tamin’ny mpianatry ny Tompo ihany, dia nankao amin’ny mpisoronabe izy '
  '10':
  - type: text
    content: 'Ary nisy mpianatra anankiray tany Damaskosy, atao hoe Ananiasy; ary hoy ny Tompo taminy tamin’ny fahitana: Ry Ananiasy. Dia hoy izy: Inty aho, Tompoko. '
  '11':
  - type: text
    content: 'Ary hoy ny Tompo taminy: Mitsangàna, ka mandehana any amin’ny làlana atao hoe Imahitsy, ka izahao ao an-tranon’i Jodasy izay lehilahy atao hoe Saoly avy any Tarsosy; fa, indro, efa mivavaka izy; '
  '12':
  - type: text
    content: 'ary izy efa nahita lehilahy atao hoe Ananiasy niditra ka nametra-tànana taminy, mba hahiratra indray ny masony. '
  '13':
  - type: text
    content: 'Ary Ananiasy namaly hoe: Tompoko, efa reko tamin’ny maro ny haben’ny ratsy nataon’izany lehilahy izany tamin’ny olonao masina tany Jerosalema. '
  '14':
  - type: text
    content: 'Ary manana fahefana atỳ koa avy tamin’ny mpisoronabe izy hamatotra izay rehetra miantso ny anaranao. '
  '15':
  - type: text
    content: 'Fa hoy ny Tompo taminy: Mandehana, fa fanaka voafidy izy ho fitondrana ny anarako eo anatrehan’ny jentilisa sy ny mpanjaka ary ny Zanak’Isiraely; '
  '16':
  - type: text
    content: fa hasehoko azy ny habetsahan’izay tsy maintsy hiaretany ho voninahitry ny anarako.
  '17':
  - type: text
    content: 'Ary nandeha Ananiasy ka niditra tao an-trano, dia nametra-tànana taminy ka nanao hoe: Ry Saoly rahalahy, ny Tompo, dia Jesosy Izay niseho taminao teo amin’ny làlana nalehanao, no efa naniraka ahy, mba hahiratan’ny masonao, ary mba ho feno ny Fanahy Masina hianao. '
  '18':
  - type: text
    content: 'Ary niaraka tamin’izay dia nisy zavatra toy ny kiran’ny hazandrano niala avy tamin’ny masony, dia nahiratra izy ka nitsangana, dia natao batisa; '
  '19':
  - type: text
    content: ary nihinan-kanina izy ka dia natanjaka.
  - type: heading
    content: Ny nitorian’i Saoly teny tany Damaskosy sy Jerosalema.
  - type: text
    content: 'ARY Saoly nitoetra andro vitsivitsy teo amin’ny mpianatra tany Damaskosy. '
  '2':
  - type: text
    content: ka nangataka taratasy taminy ho any amin’ny synagoga any Damaskosy, mba ho entiny mifatotra ho any Jerosalema izay rehetra hitany momba izany fampianarana
  - type: note
    content: Gr. làlana.
  - type: text
    content: ' izany, na lahy an vavy.'
  '20':
  - type: text
    content: 'Ary niaraka tamin’izay dia nitory teo amin’ny synagoga izy ka nilaza an’i Jesosy fa Zanak’Andriamanitra. '
  '21':
  - type: text
    content: 'Ary talanjona izay rehetra nandre ka nanao hoe: Tsy ity va ilay nandringana izay niantso izany anarana izany tany Jerosalema? ary tonga atỳ koa izy mba hitondra azy mifatotra ho any amin’ny mpisoronabe. '
  '22':
  - type: text
    content: Ary Saoly mainka nihahery, dia nandresy lahatra ny Jiosy izay nonina tany Damaskosy ka naneho marimarina fa Jesosy
  - type: note
    content: Gr. Ity.
  - type: text
    content: ' no Kristy.'
  '23':
  - type: text
    content: 'Ary rehefa afaka andro maromaro, dia nihendry hamono azy ny Jiosy; '
  '24':
  - type: text
    content: 'nefa fantatr’i Saoly ny fihendreny. Ary izy ireo niambina ny vavahady andro aman-alina hamonoany azy. '
  '25':
  - type: text
    content: Fa ny mpianany naka azy nony alina ka nampidina azy tamin’ny sobiky avy eo amin’ny mànda.
  '26':
  - type: text
    content: 'Ary rehefa tonga tany Jerosalema Saoly, dia nitady hiray tamin’ny mpianatra; fa izy rehetra natahotra azy ka tsy nino azy ho mpianatra. '
  '27':
  - type: text
    content: Fa Barnabasy naka azy ka nitondra azy ho any amin’ny Apostoly, dia nanambara taminy ny nahitany ny Tompo sy ny nitenenany taminy teny an-dàlana ary ny fahasahiany nitory ny anaran’i Jesosy tany Damaskosy.
  '28':
  - type: text
    content: 'Ary izy niara-niditra sy nivoaka tamin’ireo tany Jerosalema, '
  '29':
  - type: text
    content: 'sady nitory tamin’ny anaran’ny Tompo tamin’ny fahasahiana ary niresaka sy niady hevitra tamin’ny Helenista; fa ireo nitady hahafaty azy. '
  '3':
  - type: text
    content: 'Ary raha nandeha izy, dia tonga teo akaikin’i Damaskosy; ary nisy mazava avy tany an-danitra nanelatrelatra tampoka manodidina azy; '
  '30':
  - type: text
    content: Ary rehefa fantatry ny rahalahy izany, dia nentiny nidina nankany Kaisaria izy ka nampandehaniny ho any Tarsosy.
  '31':
  - type: text
    content: Dia nanam-piadanana ny fiangonana eran’i Jodia sy Galilia ary Samaria rehetra, sady nandroso tsara sy nandeha tamin’ny fahatahorana ny Tompo sy ny famporisihan’ny Fanahy ka nihamaro.
  - type: heading
    content: Ny nandehanan’i Petera nitety tany, sy ny nananganany an’i Dorkasy tamin’ny maty.
  '32':
  - type: text
    content: 'ARY raha nandeha nitety ny tany rehetra Petera, dia nidina ho any amin’ny olona masina nonina tany Lyda koa. '
  '33':
  - type: text
    content: 'Ary izy nahita lehilahy anankiray teo, atao hoe Enea, izay efa nandry valo taona teo am-parafara, fa nararin’ny Paralysisa. '
  '34':
  - type: text
    content: 'Ary hoy Petera taminy: Ry Enea, manasitrana anao Jesosy Kristy; mitsangàna, ka amboary ny fandrianao. Dia nitsangana niaraka tamin’izay izy. '
  '35':
  - type: text
    content: Ary nahita azy izay rehetra nonina tany Lyda sy Sarôna, ka dia niverina ho amin’ny Tompo.
  '36':
  - type: text
    content: Ary tany Jopa nisy vehivavy mpianatra atao hoe Tabita, izany hoe, raha adika, Dorkasy;
  - type: note
    content: Dorkasy = Gazela; izahao 2 Sam. ii.18.
  - type: text
    content: ' ary be ny asa soa sy ny fiantrana izay nataon’izany vehivavy izany. '
  '37':
  - type: text
    content: 'Ary narary izy tamin’izany andro izany, ka dia maty; ary rehefa nampandroiny ny faty, dia napetrany tao an-trano ambony. '
  '38':
  - type: text
    content: 'Ary satria Lyda akaikin’i Jopa, ary ny mpianatra nandre fa efa tonga ao Petera, dia naniraka roa lahy izy hangataka azy hoe: Aza misalasala hankatỳ aminay.'
  '39':
  - type: text
    content: 'Dia nitsangana Petera ka nandeha niaraka taminy. Ary nony tonga izy, dia nentiny tany an-trano ambony; ary ny mpitondratena rehetra nitsangana teo anilany ka nitomany sady nampiseho ny akanjo sy lamba izay nozairin’i Dorkasy fony fahavelony. '
  '4':
  - type: text
    content: 'dia lavo tamin’ny tany izy ka nandre feo nanao taminy hoe: Saoly, Saoly, nahoana hianao no manenjika Ahy? '
  '40':
  - type: text
    content: 'Ary navoak’i Petera avokoa izy rehetra, dia nandohalika izy ka nivavaka; ary nitodika nanatrika ny faty izy ka nanao hoe: Ry Tabita, mitsangàna. Dia nahirany ny masony; ary raha nahita an’i Petera izy, dia niarina. '
  '41':
  - type: text
    content: 'Ary Petera nanolo-tànana azy ka nanangana azy; ary rehefa niantso ny olona masina sy ny mpitondratena izy, dia nanolotra azy velona. '
  '42':
  - type: text
    content: 'Ary dia fantatra eran’i Jopa izany, ka maro no nino ny Tompo. '
  '43':
  - type: text
    content: Ary Petera nitoetra andro maromaro tany Jopa tao amin’i Simona mpandon-koditra.
  '5':
  - type: text
    content: 'Ary hoy izy: Iza moa hianao, Tompoko? Dia hoy Izy: Izaho no Jesosy Izay enjehinao; '
  '6':
  - type: text
    content: fa mitsangàna, ka mankanesa ho any an-tanàna, dia holazaina aminao izay mety hataonao.
  '7':
  - type: text
    content: 'Ary ny olona izay nomba azy tamin’ny nalehany dia nitsangana tsy nahateny, ary nandre ny feo izy, nefa tsy nahita olona. '
  '8':
  - type: text
    content: 'Ary Saoly nitsangana tamin’ny tany, ary rehefa nahirany ny masony, dia tsy nahita na inona na inona izy; ary ireo nitantana azy ka nitondra azy ho any Damaskosy. '
  '9':
  - type: text
    content: Ary tsy nahita izy hateloana sady tsy nihinana na nisotro.
