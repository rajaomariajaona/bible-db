document_id: PSA.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahatokian’izay manana an’Andriamanitra ho Mpiaro, na dia be aza ny fahavalony.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Salamo nataon’i Davida, fony izy nandositra an’i Absaloma zanany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, akory izato hamaroan’ny mampahory ahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maro no mitsangana hanohitra ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Maro no milaza ny fanahiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy manam-pamonjena amin’Andriamanitra izy.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Kanjo Hianao, Jehovah ô, no ampinga manodidina ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voninahitro sy mpanandratra ny lohako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Amin’ny feoko no iantsoako an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary any an-tendrombohiny masina no mamaly ahy Izy.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izaho nandry ka natory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nifoha aho, satria Jehovah no manohana ahy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy hatahotra olona alinalina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay milahatra manodidina hamely ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mitsangàna, Jehovah ô; vonjeo aho, Andriamanitro ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa namely ny takolaky ny fahavaloko rehetra Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny nifin’ny ratsy fanahy novakivakinao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: n’i Jehovah ny famonjena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho amin’ny olonao anie ny fitahianao.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ho amin’ny olonao ny fitahianao.
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
