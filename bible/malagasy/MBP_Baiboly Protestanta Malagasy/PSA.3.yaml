document_id: PSA.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatokian’izay manana an’Andriamanitra ho Mpiaro, na dia be aza ny fahavalony.
  - type: text
    content: Salamo nataon’i Davida, fony izy nandositra an’i Absaloma zanany.
  - type: text
    content: JEHOVAH ô, akory izato hamaroan’ny mampahory ahy!
  - type: text
    content: Maro no mitsangana hanohitra ahy.
  '2':
  - type: text
    content: 'Maro no milaza ny fanahiko hoe:'
  - type: text
    content: Tsy manam-pamonjena amin’Andriamanitra izy.
  - type: text
    content: '[Sela.]'
  '3':
  - type: text
    content: Kanjo Hianao, Jehovah ô, no ampinga manodidina ahy,
  - type: text
    content: Voninahitro sy mpanandratra ny lohako.
  '4':
  - type: text
    content: Amin’ny feoko no iantsoako an’i Jehovah,
  - type: text
    content: Ary any an-tendrombohiny masina no mamaly ahy Izy.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Izaho nandry ka natory;
  - type: text
    content: Nifoha aho, satria Jehovah no manohana ahy.
  '6':
  - type: text
    content: Tsy hatahotra olona alinalina aho,
  - type: text
    content: Izay milahatra manodidina hamely ahy.
  '7':
  - type: text
    content: Mitsangàna, Jehovah ô; vonjeo aho, Andriamanitro ô!
  - type: text
    content: Fa efa namely ny takolaky ny fahavaloko rehetra Hianao;
  - type: text
    content: Ny nifin’ny ratsy fanahy novakivakinao.
  '8':
  - type: text
    content: n’i Jehovah ny famonjena;
  - type: text
    content: Ho amin’ny olonao anie ny fitahianao.
  - type: note
    content: 'Na: Ho amin’ny olonao ny fitahianao.'
  - type: text
    content: '[Sela.]'
