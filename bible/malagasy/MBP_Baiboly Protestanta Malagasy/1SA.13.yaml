document_id: 1SA.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niadian’ny Isiraely indray tamin’ny Filistina, sy ny nahadiso an’i Saoly, ary ny nandavan’Andriamanitra azy.
  - type: text
    content: ' '
  - type: text
    content: TELO-POLO
  - type: text
    content: ' taona Saoly, raha vao nanjaka; ary nanjaka roa taona tamin’ny Isiraely izy. '
  '10':
  - type: text
    content: 'Ary rehefa vita ny nanaterany ny fanatitra dorana, indro, tamy Samoela, ary nivoaka hitsena azy Saoly mba hiarahaba azy. '
  '11':
  - type: text
    content: 'Dia hoy Samoela: Inona no nataonao? Ary hoy Saoly: Raha hitako fa niely nandao ahy ny olona, sady tsy tonga tamin’ny fotoana hianao, ary tafangona tany Mikmasy ny Filistina, '
  '12':
  - type: text
    content: 'dia hoy izaho: Hidina amin’izao ny Filistina hamely ahy atỳ Gilgala, nefa tsy mbola nanao fifonana tamin’i Jehovah aho; dia sahy ihany aho ka nanatitra ny fanatitra dorana.'
  '13':
  - type: text
    content: 'Ary hoy Samoela tamin’i Saoly: Nanao adala hianao; tsy nitandrina ny didin’i Jehovah Andriamanitrao izay nandidiany anao hianao; fa raha tsy izany, ankehitriny Jehovah dia ho nampitoetra ny fanjakanao amin’ny Isiraely ho mandrakizay. '
  '14':
  - type: text
    content: 'Koa izao dia tsy haharitra ny fanjakanao; Jehovah efa nitady lehilahy ho Azy araka ny fony, ary izay no voatendrin’i Jehovah ho mpanapaka ny olony, satria tsy nitandrina izay nandidian’i Jehovah anao hianao. '
  '15':
  - type: text
    content: Dia niainga Samoela ka niala tany Gilgala hankany Gibean’ny Benjamina. Ary Saoly nandamina ny olona zay teo aminy, dia tokony ho enin-jato lahy ireny.
  - type: heading
    content: Ny nampahorian’ny Filistina ny Isiraely, sy ny nahasahian’i Jonatana namely azy.
  '16':
  - type: text
    content: 'ARY raha mbola nitoetra tany Gibean’ny Benjamina Saoly sy Jonatana zanany sy ny vahoaka teo amin’izy roa lahy, ary ny Filistina kosa nitoby, tany Mikmasy. '
  '17':
  - type: text
    content: 'dia nivoaka nanao telo toko ny mpandrava avy teo amin’ny tobin’ny Filistina: ny iray toko nizotra tamin’ny làlana mankany Ofra ho any amin’ny tany Solala; '
  '18':
  - type: text
    content: ary ny iray toko nizotra ho any amin’ny làlana mankany Beti-horona; ary ny iray toko kosa nizotra ho any amin’ny làlana mankany amin’ny fari-tany manatrika ny lohasaha Zeboima tandrifin’ny efitra.
  '19':
  - type: text
    content: 'Ary teny amin’ny tanin’ny Isiraely rehetra tsy nisy mpanefy; fa hoy ny Filistina: Andrao manefy sabatra na lefona ny Hebreo. '
  '2':
  - type: text
    content: Ary Saoly nifantina telo arivo lahy tamin’ny Isiraely, ka ny roa arivo lahy nitoetra teo aminy tany Mikmasy sy tany amin’ny tany havoan’i Betela, ary ny arivo lahy nitoetra teo amin’i Jonatana tany Gibean’ny Benjamina; fa ny olona sisa kosa samy nampodiny ho any an-dainy avy.
  '20':
  - type: text
    content: 'Ka dia samy nidina ho any amin’ny Filistina ny Isiraely rehetra hanasa ny fangadiny sy ny fiasàny sy ny famakiny ary ny fihadian-taniny. '
  '21':
  - type: text
    content: 'Nefa nanana tsofa ihany izy handranitany ny fihadian-tany sy ny fiasàna sy ny telorantsana sy ny famaky ary handranitany ny fanindronan-omby. '
  '22':
  - type: text
    content: Ary tamin’ny andro niadiana dia tsy nisy sabatra na lefona hita teny an-tànan’ny vahoaka rehetra izay teo amin’i Saoly sy Jonatana; fa tamin’i Saoly sy Jonatana zanany ihany no nisy.
  '23':
  - type: text
    content: Ary ny avy tao amin’ny miaramilan’ny Filistina nivoaka ho ao amin’ny hadilanana mankany Mikmasy.
  '3':
  - type: text
    content: 'Ary Jonatana namely ny miaramilan’ny Filistina, izay tany Geba, ary ren’ny Filistina izany. Ary Saoly nampitsoka anjomara teny amin’ny tany rehetra ka nanao hoe: Aoka handre ny Hebreo. '
  '4':
  - type: text
    content: Dia ren’ny Isiraely rehetra fa efa namely ny miaramilan’ ny Filistina Saoly, ka dia halan’ny Filistina ny Isiraely. Dia nivory ny olona hanaraka an’i Saoly ho any Gilgala.
  '5':
  - type: text
    content: Ary ny Filistina telo alina an-kalesy sy enina arivo an-tsoavaly ary vahoaka betsaka tahaka ny fasika eny amoron-dranomasina dia nivory hiady tamin’ny Isiraely; dia nandeha izy ka nitoby tany Mikmasy atsinanan’i Betavena.
  '6':
  - type: text
    content: 'Ary nony hitan’ny lehilahy amin’ny Isiraely fa poritra izy (fa efa ory indrindra ny olona), dia niery tany an-johy sy tany amin’ny kirihitrala sy tany amin’ny harambato sy tany amin’ny fierena ary tany amin’ny lavaka famorian-drano izy. '
  '7':
  - type: text
    content: 'Ary ny Hebreo sasany dia lasa nita an’i Jordana nankany amin’ny tany Gada sy Gileada. Fa Saoly mbola tany Gilgala ihany, ary ny vahoaka rehetra nanaraka azy, nefa toran-kovitra be ihany. '
  '8':
  - type: text
    content: 'Ary niandry hafitoana izy araka ny fotoana '
  - type: text
    content: nataon’i
  - type: text
    content: ' Samoela; fa Samoela tsy mbola tonga tany Gilgala; ary ny olona niely nandao an’i Saoly. '
  '9':
  - type: text
    content: 'Ary hoy Saoly: Ento etỳ amiko ny fanatitra dorana sy ny fanati-pihavanana; ka dia nanatitra ny fanatitra dorana izy.'
