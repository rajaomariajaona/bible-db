document_id: JON.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nimonomononan’i Jona, sy ny nananaran’Andriamanitra azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'FA tsy sitrak’i Jona indrindra izany, ka nirehitra ny fahatezerany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah: Hianao malahelo ny tanantanamanga izay tsy nisasaranao na nampanirinao, dia ilay naniry indray alina monja ary maty indray alina koa; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka moa Izaho tsy mba halahelo an’i Ninive, ilay tanàna lehibe va, izay misy olona tsy omby roa alina sy iray hetsy, izay tsy mahafantatra ny havanany sy ny haviany, sady be biby fiompy koa?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivavaka tamin’i Jehovah izy ka nanao hoe: Mifona aminao aho, Jehovah ô, tsy izao ihany va no efa nolazaiko fony aho mbola tany amin’ny taniko? Fa ny andrao hisy toy izao no nandosirako ho any Tarsisy, satria fantatro fa Hianao dia Andriamanitra mamindra fo sy miantra, mahari-po sady be famindrampo ary manenina ny amin’ny loza. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa mifona aminao aho ankehitriny, Jehovah ô, esory ny aiko; fa aleoko ho faty toy izay ho velona.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jehovah: Moa mety va izao firehitry ny fahatezeranao izao?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nivoaka ny tanàna Jona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary Jona efa nivoaka ny tanàna.
      marker-yv: yv-n
    - type: text
      text: ' ka nipetraka teo atsinanan-tanàna; ary nanao trano rantsan-kazo ho azy teo izy ka nipetraka teo ambanin’ny alokalony ambara-pahitany izay hiafaran’ny tanàna. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jehovah Andriamanitra nanomana tanantanamanga, ka nampaniriny hanalokaloka an’i Jona izany ho alokaloky ny lohany, hanafaka ny alahelony. Ka dia nahafaly an’i Jona indrindra ny tanantanamanga.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nony ampitso maraina dia nanomana fositra koa Andriamanitra, ka namely ilay tanantanamanga iny, dia nalazo io. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niposaka ny masoandro, Andriamanitra dia nanomana rivotra mahamay avy any atsinanana, ary dia namely ny lohan’i Jona ny masoandro, dia ana izy ka nangataka ny ho faty, nanao hoe: Aleoko ho faty toy izay ho velona.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Andriamanitra tamin’i Jona: Moa mety va izao firehitry ny fahatezeranao ny amin’ny tanantanamanga izao? Ary hoy izy: Mety ny hahatezerako na dia mandra-pahafatiko aza.'
