document_id: 2CH.15,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nananaran’i Azaria mpaminany an’i Asa, ary ny fahazotoan’i Asa handrava ny fivavahana tsy marina sy hanangana indray ny fivavahana amin’i Jehovah.
  - type: text
    content: 'ARY ny Fahahin’Andriamanitra tonga tamin’i Azaria, zanak’i Odeda; '
  '10':
  - type: text
    content: 'Ary nivory tany Jerosalema ireo tamin’ny volana fahatelo tamin’ny taona fahadimy ambin’ny folo nanjakan’i Asa. '
  '11':
  - type: text
    content: 'Ary androtrizay no nanaterany fanatitra ho an’i Jehovah tamin’ny babo izay nentiny, dia omby fiton-jato sy ondry aman-osy fito arivo. '
  '12':
  - type: text
    content: 'Ary nanao fanekena hitady an’i Jehovah, Andriamanitry ny razany, tamin’ny fony rehetra sy ny fanahiny rehetra izy, '
  '13':
  - type: text
    content: 'ka na iza na iza tsy mety mitady an’i Jehovah Andriamanitry ny Isiraely, dia hatao maty, na kely na lehibe, na lahy na vavy. '
  '14':
  - type: text
    content: 'Ary nianiana ho an’i Jehovah tamin’ny feo mahery sy ny fihobiana ary tamin’ny trompetra sy ny anjomara izy. '
  '15':
  - type: text
    content: Ary ny Joda rehetra’ nifaly noho ny fianianana, fa efa nianiana tamin’ny fony rehetra izy sady nazoto nitady an’i Jehovah indrindra, ka dia nahita Azy; ary Jehovah dia nanome azy fiadanana tamin’ny manodidina fahizay.
  '16':
  - type: text
    content: 'Ary na dia Imaka, renin’i Asa mpanjaka, aza dia naetriny tsy ho andriambavy, satria efa nanao sampy ho an’ny Aseraha izy; ary Asa nikapa ny sampiny, dia nanorotoro ka nandoro azy tao amin’ny lohasahan-driaka Kidrona. '
  '17':
  - type: text
    content: 'Fa ny fitoerana avo tsy mba noravana tamin’ny Isiraely; nefa nahitsy ny fon’i Asa tamin’ny androny rehetra. '
  '18':
  - type: text
    content: Ary nampidiriny ho ao an-tranon’i Jehovah ny zavatra izay nohamasinin-drainy mbamin’izay nohamasinin’ny tenany, dia volafotsy sy volamena ary fanaka.
  '19':
  - type: text
    content: Ary tsy nisy ady intsony hatramin’ny taona fahadimy amby telo-polo nanjakan’i Asa.
  '2':
  - type: text
    content: 'ary dia nivoaka hitsena an’i Asa izy ka nanao taminy hoe: Mihainoa ahy, ry Asa mbamin’ny Joda sy ny Benjamina rehetra: Jehovah momba anareo, raha hianareo momba Azy; ary raha mitady Azy kosa hianareo, dia hahita Azy; fa raha mahafoy Azy hianareo, dia hahafoy anareo Izy. '
  '3':
  - type: text
    content: 'Ary efa ela ny Isiraely no tsy nanana an’Andriamanitra marina, na mpisorona mampianatra, na lalàna. '
  '4':
  - type: text
    content: 'Fa raha niverina tamin’ Jehovah, Andriamanitry ny Isiraely, izy nony azom-pahoriana, ka nitady Azy, dia nahita Azy. '
  '5':
  - type: text
    content: 'Ary tamin’izany dia tsy nisy fiadanana ho an’izay nivoaka na izay niditra; fa horohoro be no nahazo ny mponina rehetra tamin’ny tany. '
  '6':
  - type: text
    content: 'Ary nifandringana ny firenena sy ny tanàna, fa Andriamanitra nampangorohoro azy tamin’ny fahoriana rehetra. '
  '7':
  - type: text
    content: Koa mahereza hianareo, fa aza miraviravy tànana; fa hisy valim-pitia tokoa ny ataonareo.
  '8':
  - type: text
    content: Ary raha ren’i Asa izany teny izany sy ny faminanian’i Odeda mpaminany, dia niezaka izy ka nanaisotra ny sampy fahavetavetana tamin’ny tanin’ny Joda sy ny Benjamina rehetra ary tamin’ny tanàna izay azony tany amin’ny tany havoan’i Efraima, sady nanavao ny alitaran’i Jehovah izay teo anoloan’ny lavarangana fidirana amin’ny tranon’i Jehovah.
  '9':
  - type: text
    content: 'Ary novoriny ny Joda sy ny Benjamina rehetra sy ny vahiny teo aminy izay avy tany amin’ny Efraima sy ny Manase ary ny Simeona; fa betsaka no nanatona azy avy tamin’ny Isiraely, raha hitany fa Jehovah Andriamaniny no teo aminy. '
