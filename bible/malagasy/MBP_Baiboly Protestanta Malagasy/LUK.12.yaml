  - type: text
    text: 'Fa raha miara-mandeha amin’ny manana ady aminao hianao hanatrika ny mpanapaka, raha mbola any an-dàlana dia mazotoa manao izay hahafahanao aminy, fandrao hitondra anao any amin’ny mpitsara izy, ary ny mpitsara hanolotra anao amin’ny mpamatotra, ary ny mpamatotra hanao anao ao an-trano-maizina. '
