document_id: LUK.12
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nananaran’i Jesosy ny mpianany tsy hatahotra olona, ary tsy hiteny ratsy ny Fanahy Masina.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’izany, raha niangona ny vahoaka betsaka tsy hita isa ka nifanitsaka, Jesosy dia niteny tamin’ny mpianany aloha ka nanao hoe: Mitandrema'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'niteny tamin’ny mpianany ka nanao hoe: Ambony indrindra, mitandrema.'
    marker-yv: yv-n
  - type: text
    text: ' hianareo, fandrao azon’ny masirasiran’ny Fariseo, dia ny fihatsarambelatsihy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa tsy misy nafenina izay tsy haseho, na takona izay tsy ho fantatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa na inona na inona teneninareo ao amin’ny maizina dia ho re eo amin’ny mazava; ary izay bitsihinareo mangingina ao amin’ny efi-trano dia hotorina eo amin’ny tampon-trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary lazaiko aminareo sakaizako hoe: Aza matahotra izay mamono ny tena, nefa nony afaka izany, dia tsy mahay manao mihoatra noho izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hasehoko anareo izay hatahoranareo: Matahora Izay manam-pahefana hanary any amin’ny helo,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gehena.
    marker-yv: yv-n
  - type: text
    text: ' rehefa novonoiny; eny, hoy Izaho aminareo: Matahora Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy eranambatry va no vidin’ny tsintsina dimy? nefa tsy misy hadinoina eo anatrehan’Andriamanitra ireny na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa na dia ny volon-dohanareo aza dia voaisa avokoa. Aza matahotra; fa mihoatra noho ny tsintsina maro hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa lazaiko aminareo: Na zovy na zovy no manaiky Ahy eo anatrehan’ny olona, dia heken’ny Zanak’olona kosa izy eo anatrehan’ny anjelin’Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: fa izay mandà Ahy eo anatrehan’ny olona, dia holavina kosa izy eo anatrehan’ny anjelin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa na zovy na zovy no hanao teny hanohitra ny Zanak’olona dia hahazo famelan-keloka; fa izay miteny ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'manao blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix, 3.
    marker-yv: yv-n
  - type: text
    text: ' ny Fanahy Masina dia tsy mba hahazo famelan-keloka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha mitondra anareo ho ao amin’ny synagoga sy ny mpanapaka ary ny manam-pahefana izy, dia aza manahy izay havalinareo, na izay holazainareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: fa ny Fanahy Masina no hampianatra anareo amin’izany ora izany izay mety holazainareo.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namalian’i Jesosy ny lehilahy anankiray izay nangataka Azy hananatra ny rahalahiny, ary ny nilazany ny tsy mahamety ny fieremana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ARY nisy anankiray teo amin’ny vahoaka nanao tamin’i Jesosy hoe: Mpampianatra ô, teneno ny rahalahiko mba hizara lova amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy Izy taminy: Ralehilahy, iza no nanendry Ahy ho mpitsara na mpizara ao aminareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Izy tamin’ny olona: Mitandrema, ka miarova tena mba tsy ho azon’ny fieremana hianareo; fa ny ain’ny olona tsy miankina amin’ny habetsahan’ny zavatra ananany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nanao fanoharana taminy Izy ka nanao hoe: Ny tanin’ny lehilahy manan-karena anankiray nahavokatra be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izy nihevitra tao am-pony hoe: Ahoana no hataoko, fa tsy manana fitoerana hamoriako ny vokatro aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy: Izao no hataoko: handrava ny trano fitehirizako aho ka hanao izay lehibebe kokoa, ary ao no hamoriako ny variko rehetra sy ny fananako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hilaza amin’ny fanahiko hoe aho: Ry fanahy ô, manana fananana be voatahiry ho amin’ny taona maro hianao; mitsahara, mihinàna, misotroa, mifalia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa Andriamanitra kosa nanao taminy hoe: Ry adala, anio alina no halaina aminao ny fanahinao, ka ho an’iza izay zavatra noharìnao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Toy izany izay mihary harena ho an’ny tenany ihany, nefa tsy mba manan-karena ny amin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy Jesosy tamin’ny mpianany: Noho izany dia lazaiko aminareo hoe: Aza manahy ny amin’ny ainareo, izay hohaninareo, na ny amin’ny tenanareo, izay hotafinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ny aina mihoatra noho ny hanina, ary ny tena noho ny fitafiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hevero ny goaika; fa tsy mba mamafy na mijinja ireny; ary tsy manana fitoeran-javatra na trano fitehirizana, nefa Andriamanitra mamelona azy; tsy mihoatra lavitra noho ny vorona va hianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary iza moa ao aminareo, na dia manahy aza, no mahay manampy ny andro iainany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny halavan’ny tenany.
    marker-yv: yv-n
  - type: text
    text: ' na dia kely monja'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hakiho iray.
    marker-yv: yv-n
  - type: text
    text: ' aza? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa raha ny kely indrindra aza tsy hainareo, nahoana hianareo no manahy ny amin’ny sisa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hevero ny fanirin’ny vonin-kazo;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Karazan’ny lilia.
    marker-yv: yv-n
  - type: text
    text: ' tsy mba miasa na mamoly ireny; nefa lazaiko aminareo: Na dia Solomona teo amin’ny voninahiny rehetra aza tsy mba nitafy tahaka ny anankiray amin’ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary raha ny ahitra izay any an-tsaha anio, nefa hatao ao am-patana rahampitso, no ampitafin’Andriamanitra toy izany, tsy mainka va hianareo ry kely finoana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Koa aza mitady izay hohaninareo na izay hosotroinareo hianareo, ary aza miahanahana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aza aingaingain’ny fanantenana foana.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny jentilisa amin’izao tontolo izao dia fatra-pitady izany rehetra izany; fa ny Rainareo mahalala fa tokony ho anareo izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Kanefa katsaho ny fanjakany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[ny fanjakan’Andriamanitra].'
    marker-yv: yv-n
  - type: text
    text: ' dia hanampy ho anareo izany zavatra izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aza matahotra, ry ondry vitsy, fa efa sitraky ny Rainareo ny hanome anareo ny fanjakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Amidio ny fanananareo, ka manaova fiantrana; manaova kitapom-bola tsy mety ho tonta ho anareo, dia harena any an-danitra tsy mety ho lany, izay tsy azon’ny mpangalatra, sady tsy misy kalalao manimba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa izay itoeran’ny harenareo, dia ho any koa ny fonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aoka hisikina ny valahanareo sy hirehitra ny jironareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary aoka hianareo ho tahaka ny olona izay miandry ny tompony, raha mody avy amin’ny fampakaram-bady izy, ka nony tonga sy mandondòna izy, dia vohany miaraka amin’izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Sambatra ny mpanompo izay ho hitan’ny tompony miambina, raha avy izy. Lazaiko aminareo marina tokoa fa hisikina '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny tompony,
  - type: text
    text: ' dia hampipetraka azy hihinana, dia ho avy ka hanompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary na avy amin’ny fiambenana faharoa amin’ny alina izy, na avy amin’ny fiambenana fahatelo, ka mahita toy izany, dia sambatra ireo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mpanompo
  - type: text
    text: ' ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary fantaro izao, fa raha fantatry ny tompon-trano izay ora hihavian’ny mpangalatra, dia ho niambina izy ka tsy namela ny tranony hotamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia miomàna koa hianareo; fa ho avy ny Zanak’olona amin’izay ora tsy ampoizinareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary hoy Petera: Tompoko, izahay va no ilazanao izany fanoharana izany, sa ny olona rehetra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary hoy ny Tompo: Iza moa no mpitandrin-draharaha mahatoky sy manan-tsaina, izay hotendren’ny tompony hifehy ny mpanompony mba hanome azy anjara hanina amin’ny fotoana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Sambatra ny mpanompo izay ho hitan’ny tompony fa, indreo, manao toy izany, raha avy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Lazaiko aminareo marina fa hotendreny ho mpanapaka ny fananany rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa raha manao anakampo kosa izany mpanompo izany hoe: Maharitra ela ny tompoko vao ho avy, ka dia mikapoka ny ankizilahy sy ny ankizivavy izy sady mihinana sy misotro ka mamo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: dia ho avy ny tompon’izany mpanompo izany amin’ny andro izay tsy ampoiziny sy amin’ny ora izay tsy fantany, dia hotapahiny roa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.46 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hokapohiny mafy.
    marker-yv: yv-n
  - type: text
    text: ' izy ka homeny anjara any amin’ny tsy mahatoky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Fa ilay mpanompo izay mahalala ny sitrapon’ny tompony ihany ka tsy miomana na manao izay sitraky ny fony dia hokapohina be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Fa izay tsy nahalala kosa ka nanao izay zavatra tokony hikapohana azy dia hokapohina kely. Fa izay nomena be, dia be no hotadiavina aminy; ary izay nampitehirizina be, dia bebe kokoa no hadinina aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Tonga hanipy afo etỳ ambonin’ny tany Aho, ka manao ahoana ny faniriako mba hirehetan’izany sahady?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.49 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ary inona intsony no iriko, raha mirehitra sahady izany?
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary manana batisa hanaovana Ahy batisa Aho, ka manao ahoana ny fahoriako ambara-pahatanterany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ataonareo va fa tonga hanome fihavanana ambonin’ny tany Aho? Tsia, hoy Izaho aminareo, fa fampisarahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Fa hatramin’izao dia hisy dimy hisara-tsaina ao an-trano iray, ny telo hanohitra ny roa, ary ny roa hanohitra ny telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Hisara-tsaina ireo, ka ny ray hanohitra ny zanani-lahy, ary ny zanakalahy hanohitra ny rainy; ny reny hanohitra ny zanani-vavy, ary ny zanakavavy hanohitra ny reniny; ny rafozambavy hanohitra ny vinantoni-vavy, ary ny vinantovavy hanohitra ny rafozani-vavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary hoy Jesosy tamin’ny vahoaka: Raha mahita rahona miposaka any andrefana hianareo, miaraka amin’izay dia hoy hianareo: Ho avy ny ranonorana; dia tonga izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary raha avy any atsimo ny rivotra, dia hoy hianareo: Hafana ny andro; dia tonga izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Hianareo mpihatsaravelatsihy, ny tarehin’ny tany sy ny lanitra dia hainareo fantarina; fa ahoana kosa no tsy ahaizanareo mamantatra izao andro izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Nahoana hianareo no tsy mahalala mitsara araka ny marina?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.57 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nahoana hianareo no tsy mahay mitsara marina avy ao am-ponareo ihany?
    marker-yv: yv-n
  - type: text
