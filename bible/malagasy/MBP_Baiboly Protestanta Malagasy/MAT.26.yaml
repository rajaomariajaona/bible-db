document_id: MAT.26,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nihendren’ny loholona sy ny lohan’ny mpisorona hamono an’i Jesosy.
  - type: heading
    content: Mar. 14.1,2; Lio. 22.1,2.
  - type: text
    content: 'ARY rehefa vitan’i Jesosy izany teny rehetra izany, dia nilaza tamin’ny mpianany hoe Izy: '
  '10':
  - type: text
    content: 'Ary fantatr’i Jesosy izay nataon’ireo, ka dia hoy Izy taminy: Nahoana hianareo no mampalahelo an-dravehivavy? fa asa soa no nataony tamiko. '
  '11':
  - type: text
    content: 'Fa ny malahelo dia eto aminareo mandra-kariva, fa Izaho tsy mba ho eto aminareo mandrakariva. '
  '12':
  - type: text
    content: 'Fa izy no nampidina izany menaka manitra izany tamin’ny tenako, dia ny hamboatra Ahy halevina no nanaovany izany. '
  '13':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Na aiza na aiza amin’izao tontolo izao no hitoriana ity filazantsara ity, dia holazaina koa izay nataon-dravehivavy mba ho fahatsiarovana azy.'
  - type: heading
    content: Ny naneken’i Jodasy hamadika an’i Jesosy.
  - type: heading
    content: Mar. 14.10,11; Lio. 22.3-6.
  '14':
  - type: text
    content: 'ARY ny anankiray tamin’ny roa ambin’ny folo lahy, atao hoe Jodasy Iskariota, dia nankao amin’ny lohan’ny mpisorona '
  '15':
  - type: text
    content: 'ka nanao hoe: Homenareo hoatrinona aho hanolorako Azy aminareo? Ary izy nandanja sekely volafotsy telo-polo homena azy. '
  '16':
  - type: text
    content: Ary hatramin’izay no nitadiavany izay andro hahazoany mamadika Azy.
  - type: heading
    content: Ny niarahan’i Jesosy sy ny mpianany nihinana ny Paska.
  - type: heading
    content: Mar. 14.12-25; Lio. 22.7-23.
  '17':
  - type: text
    content: 'ARY tamin’ny voalohan’ny andro fihinanana ny mofo tsy misy masirasira dia nankeo amin’i Jesosy ny mpianatra ka nanao hoe: Aiza no tianao hamboarinay hihinananao ny Paska? '
  '18':
  - type: text
    content: 'Ary hoy Izy: Mankanesa any an-tanàna ho any amin-dralehilahy, ka lazao aminy hoe: Hoy ny Mpampianatra: Efa akaiky ny fotoako; koa ato aminao Aho sy ny mpianatro no hitandrina ny Paska.'
  '19':
  - type: text
    content: Ary ny mpianatra dia nanao araka ny nasain’i Jesosy nataony ka namboatra ny Paska.
  '2':
  - type: text
    content: 'Fantatrareo fa raha afaka indroa andro, dia ho tonga ny Paska, koa ny Zanak’olona dia hatolotra hohomboana amin’ny hazofijaliana. '
  '20':
  - type: text
    content: Ary nony hariva ny andro, dia nipetraka nihinana Izy mbamin’ny mpianatra roa ambin’ny folo lahy.
  - type: note
    content: 'Na: [mbamin’ny roa ambin’ny folo lahy.]'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Ary raha mbola nihinana izy, dia hoy Jesosy: Lazaiko aminareo marina tokoa fa ny anankiray aminareo hamadika Ahy. '
  '22':
  - type: text
    content: 'Dia nalahelo indrindra izy rehetra, ka samy nanontany Azy hoe: Moa izaho va izany, Tompoko? '
  '23':
  - type: text
    content: 'Ary Izy namaly ka nanao hoe: Izay niara-nanatsoboka ny tànany tamiko tao anatin’ ny lovia, izy no hamadika Ahy. '
  '24':
  - type: text
    content: 'Ny Zanak’olona dia mandeha tokoa araka izay nanoratana Azy, nefa lozan’izay olona hahazoana ny Zanak’olona hatolotra! tsara ho an’izany olona izany raha tsy ary akory. '
  '25':
  - type: text
    content: 'Ary Jodasy, izay namadika Azy, dia namaly ka nanao hoe: Izaho va izany, Raby ô? Dia hoy Izy taminy: Voalazanao.'
  '26':
  - type: text
    content: 'Ary raha mbola nihinana izy, dia nandray mofo Jesosy, ka nony efa nisaotra Izy, dia novakiny ka natolony ny mpianatra, ary hoy Izy: Raiso, hano, ity no tenako. '
  '27':
  - type: text
    content: Ary nandray kapoaka
  - type: note
    content: 'Na: [ny kapoaka].'
  - type: text
    content: ' Izy, ka nony efa nisaotra, dia natolony azy ka nataony hoe: Sotroinareo rehetra ity; '
  '28':
  - type: text
    content: fa ity no rako, dia ny amin’ny fanekena,
  - type: note
    content: 'Na: [ny fanekena vaovao].'
  - type: text
    content: ' izay alatsaka ho an’ny maro ho famelan-keloka. '
  '29':
  - type: text
    content: Ary lazaiko aminareo fa hatramin’izao dia tsy mba hisotro itony vokatry ny voaloboka, itony intsony Aho mandra-pihavin’ny andro hiarahako misotro izay vaovao aminareo any amin’ny fanjakan’ny Raiko.
  - type: heading
    content: Ny resaka nataon’i Jesosy sy ny mpianany teny an-dàlana, raha nankany amin’ny tendrombohitra Oliva.
  - type: heading
    content: Mar. 14.26-31; Lio. 22.31-38; Jao. 13.36-38?
  '3':
  - type: text
    content: 'Ary tamin’izany dia nivory ny lohan’ny mpisorona sy ny loholona tao an-kianjan’ny tranon’ny mpisoronabe atao hoe Kaiafa. '
  '30':
  - type: text
    content: ARY rehefa nihira fiderana izy, dia lasa nankany amin’ny tendrombohitra Oliva.
  '31':
  - type: text
    content: 'Ary tamin’izany dia hoy Jesosy taminy: Hianareo rehetra dia ho tafintohina noho ny amiko anio alina; fa voasoratra hoe: ,,Hamely ny mpiandry Aho, dia hihahaka ny ondry andrasana’’ (Zak. 13.7). '
  '32':
  - type: text
    content: Fa rehefa atsangana Aho, dia hialoha anareo ho any Galilia.
  '33':
  - type: text
    content: 'Fa Petera namaly ka nanao taminy hoe: Na dia ho tafintohina noho ny aminao aza ny olona rehetra, izaho tsy mba ho tafintohina mandrakizay. '
  '34':
  - type: text
    content: 'Hoy Jesosy taminy: Lazaiko aminao marina tokoa fa anio alina, raha tsy mbola misy akoho maneno, dia handa Ahy intelo hianao. '
  '35':
  - type: text
    content: 'Hoy Petera taminy: Na dia hiara-maty aminao aza aho, tsy mba handa Anao tokoa aho. Ary toy izany koa no nolazain’ny mpianatra rehetra.'
  - type: heading
    content: Jesosy tao Getsemane.
  - type: heading
    content: Mar. 14.32-42; Lio. 22.39-46.
  '36':
  - type: text
    content: 'ARY Jesosy mbamin’ny mpianany dia tonga tao amin’ny saha anankiray atao hoe Getsemane, ary hoy Izy tamin’ny mpianany: Mipetraha eto aloha hianareo, raha mbola mankeroa hivavaka Aho.'
  '37':
  - type: text
    content: 'Ary nitondra an’i Petera mbamin’izy roa lahy zanak’i Zebedio Izy, dia nalahelo am-po sy ory indrindra. '
  '38':
  - type: text
    content: 'Dia hoy Izy taminy: Fadiranovana loatra ny fanahiko, toy ny efa ho faty; mitoera eto, ka miaraha miari-tory amiko. '
  '39':
  - type: text
    content: 'Ary nony nandroso kelikely Izy, dia niankohoka ka nivavaka hoe: Raiko ô, raha azo atao, dia aoka hesorina amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao, fa ny Anao.'
  '4':
  - type: text
    content: 'Ary niara-nihevitra izy hisambotra an’i Jesosy amin’ny fitaka ka hamono Azy; '
  '40':
  - type: text
    content: 'Ary nankeo amin’ny mpianatra Izy ka nahita azy matory; dia hoy Izy tamin’i Petera: Hay! tsy mahazaka ny miara-miari-tory amiko na dia ora iray ihany aza hianareo! '
  '41':
  - type: text
    content: Miareta tory sy mivavaha hianareo, mba tsy hidiranareo amin’ny fakam-panahy; mety ihany ny fanahy, fa ny nofo no tsy manan-kery.
  '42':
  - type: text
    content: 'Dia nandeha fanindroany Izy ka nivavaka hoe: Raiko ô, raha tsy azo esorina ity, fa tsy maintsy hosotroiko, dia aoka ny sitraponao no hatao. '
  '43':
  - type: text
    content: 'Ary nony tonga Izy, dia nahita azy matory indray; fa efa nilondolondo ny masony. '
  '44':
  - type: text
    content: Ary rehefa nandao azy Izy ka lasa indray, dia nivavaka fanintelony ka nanao izany teny izany ihany.
  '45':
  - type: text
    content: 'Dia nankeo amin’ny mpianatra Izy ka nanao taminy hoe: Matoria ary ankehitriny, ka mialà sasatra hianareo;'
  - type: note
    content: 'Na: Mbola matory ihany va hianareo ka miala sasatra?'
  - type: text
    content: ' indro, efa akaiky ny ora, ary ny Zanak’olona hatolotra eo an-tànan’ny mpanota. '
  '46':
  - type: text
    content: Mitsangàna, andeha isika; indro fa efa akaiky ilay mamadika Ahy.
  - type: heading
    content: Ny nisamborana an’i Jesosy.
  - type: heading
    content: Mar. 14.43-52; Lio. 22.47-53; Jao. 18.1-11.
  '47':
  - type: text
    content: 'ARY raha mbola niteny Jesosy, indro, avy Jodasy, izay isan’ny roa ambin’ny folo lahy, mbamin’ny vahoaka betsaka niaraka taminy, nitondra sabatra sy langilangy, nirahin’ny lohan’ny mpisorona sy ny loholona. '
  '48':
  - type: text
    content: 'Ary ilay namadika Azy nanome famantarana ny olona ka nanao hoe: Izay horohako no Izy; sambory Izy. '
  '49':
  - type: text
    content: 'Ary niaraka tamin’izay dia nanatona an’i Jesosy izy ka nanao hoe: Finaritra, Raby! dia nanoroka Azy. '
  '5':
  - type: text
    content: 'kanefa hoy izy: Tsy amin’ny andro firavoravoana, fandrao hisy tabataba amin’ny olona.'
  - type: heading
    content: Ny nanosoran-dravehivavy ny tongotr’i Jesosy tao an-tranon’i Simona boka.
  - type: heading
    content: Mar. 14.3-9; Jao. 12.1-11.
  '50':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ry sakaiza, '
  - type: text
    content: ataovy
  - type: text
    content: ' izay nalehanao eto.'
  - type: note
    content: 'Na: haninona eto hianao?'
  - type: text
    content: ' Dia nanatona ny olona ka nisambotra an’i Jesosy ary nitana Azy.'
  '51':
  - type: text
    content: 'Ary, indro, ny anankiray tamin’izay nomba an’i Jesosy naninjitra ny tànany, dia nanatsoaka ny sabany ka nikapa ny mpanompon’ny mpisorona-be ary nahafaka ny sofiny. '
  '52':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ampidiro amin’ny tranony ny sabatrao; fa izay rehetra mandray sabatra no hovonoina amin’ny sabatra. '
  '53':
  - type: text
    content: 'Ary ataonao va fa tsy mahazo mangataka amin’ny Raiko Aho, dia haniraka anjely tsy omby roa ambin’ny folo legiona ho etỳ amiko Izy ankehitriny? '
  '54':
  - type: text
    content: 'Raha izany, dia hatao ahoana no hahatanteraka ny Soratra '
  - type: text
    content: Masina,
  - type: text
    content: ' izay milaza fa tsy maintsy ho tonga izany?'
  '55':
  - type: text
    content: 'Ary tamin’izany ora izany dia niteny tamin’ny vahoaka Jesosy ka nanao hoe: Mivoaka mitondra sabatra sy langilangy hisambotra Ahy toy ny hisambotra jiolahy va hianareo? Isan-andro dia nipetraka nampianatra teo an-kianjan’ny tempoly Aho, nefa tsy nisambotra Ahy hianareo. '
  '56':
  - type: text
    content: Fa izany rehetra izany dia tonga mba hahatanteraka izay voasoratry ny mpaminany.
  - type: text
    content: Ary tamin’izany dia nandao Azy ny mpianatra rehetra ka nandositra.
  - type: heading
    content: Ny nitsarana an’i Jesosy teo anatrehan’i Kaiafa, sy ny nandavan’i Petera Azy intelo.
  - type: heading
    content: Mar. 14.53-72; Lio. 22.54-71; Jao. 18.12-27.
  '57':
  - type: text
    content: ARY izay efa nisambotra an’i Jesosy dia nitondra Azy ho any amin’i Kaiafa mpisoronabe, izay nivorian’ny mpanora-dalàna sy ny loholona.
  '58':
  - type: text
    content: Ary Petera nanaraka Azy teny lavidavitra eny hatrany amin’ny kianjan’ny tranon’ny mpisoronabe; ary niditra izy, dia niara-nipetraka tao amin’ny mpiandry raharaha mba hahita izay hiafarany.
  '59':
  - type: text
    content: 'Ary ny lohan’ny mpisorona mbamin’ny Synedriona rehetra nitady teny ho entiny hiampanga lainga an’i Jesosy mba hamonoany Azy; '
  '6':
  - type: text
    content: 'ARY nony tany Betania Jesosy, tao an-tranon’i Simona boka, '
  '60':
  - type: text
    content: 'fa tsy nahita izy, na dia maro aza ny vavolombelona mandainga tonga teo. Ary nony farany dia nisy roa lahy tonga teo, izay nanao hoe: '
  '61':
  - type: text
    content: 'Ilehity nanao hoe: Mahay mandrava ny tempolin’Andriamanitra Aho sy manangana azy amin’ny hateloana.'
  '62':
  - type: text
    content: 'Dia nitsangana ny mpisoronabe ka nanao tamin’i Jesosy hoe: Tsy mety mamaly akory va Hianao? Inona no iampangan’ireto Anao? '
  '63':
  - type: text
    content: 'Nefa tsy niteny Jesosy. Dia hoy ny mpisoronabe taminy: Ampianianiko amin’Andriamanitra velona Hianao hilaza aminay, raha Hianao no Kristy, Zanak’Andriamanitra. '
  '64':
  - type: text
    content: 'Hoy Jesosy taminy: Voalazanao; ary koa, lazaiko aminareo: Hatramin’izao dia ho hitanareo ny Zanak’olona mipetraka eo amin’ny tànana ankavanan’ny Hery sy avy eo amin’ny rahon’ny lanitra. '
  '65':
  - type: text
    content: 'Ary tamin’izany ny mpisoronabe dia nandriatra ny fitafiany ka nanao hoe: Efa niteny ratsy'
  - type: note
    content: Gr. blasfemia; izahao ix.3.
  - type: text
    content: ' Izy; ahoana no mbola ilantsika vavolombelona indray? indro, efa renareo izao fitenenan-dratsy'
  - type: note
    content: Gr. blasfemia; izahao ix.3.
  - type: text
    content: ' izao. '
  '66':
  - type: text
    content: 'Ahoana no hevitrareo? Ary ireo namaly ka nanao hoe: Mendrika hohelohina ho faty Izy.'
  '67':
  - type: text
    content: 'Dia nororany ny tavany, ka nasiany totohondry Izy; ary ny sasany namely tahamaina Azy '
  '68':
  - type: text
    content: 'ka nanao hoe: Maminania aminay, ry Kristy, iza no namely Anao?'
  '69':
  - type: text
    content: 'Ary Petera nipetraka teo ivelany, teo an-kianja, dia nanatona azy ny ankizivavy anankiray ka nanao hoe: Hianao koa nomba an’i Jesosy, ilay Galiliana. '
  '7':
  - type: text
    content: 'dia nanatona Azy ny vehivavy anankiray nitondra tavoara alabastara feno menaka manitra saro-bidy loatra, ka naidiny tamin’ny lohany izany, raha nipetraka nihinana Izy. '
  '70':
  - type: text
    content: 'Fa izy nandà teo anatrehan’izy rehetra ka nanao hoe: Tsy azoko izay lazainao. '
  '71':
  - type: text
    content: 'Ary nony niala ho eo am-bavahady izy, dia nahita azy ny '
  - type: text
    content: ankizivavy
  - type: text
    content: ' anankiray koa ka nilaza tamin’izay teo hoe: Ity koa nomba an’i Jesosy avy any Nazareta. '
  '72':
  - type: text
    content: 'Ary nandà indray tamin’ny fianianana izy ka nanao hoe: Tsy fantatro izany Lehilahy izany. '
  '73':
  - type: text
    content: 'Ary nony afaka kelikely, dia nanatona izay nijanona teo ka nanao tamin’i Petera hoe: Marina tokoa fa naman’ireny hianao; fa ny fiteninao miampanga anao. '
  '74':
  - type: text
    content: 'Dia vao niozona sy nianiana izy ka nanao hoe: Tsy fantatro izany Lehilahy izany; ary niaraka tamin’izay dia nisy akoho naneno. '
  '75':
  - type: text
    content: 'Ary Petera nahatsiaro ny tenin’i Jesosy, izay nolazainy hoe: Raha tsy mbola misy akoho maneno, dia handa Ahy intelo hianao. Ary rehefa nivoaka teny ivelany izy, dia nitomany fatratra.'
  '8':
  - type: text
    content: 'Fa nony nahita izany ny mpianatra, dia tezitra ka nanao hoe: Inona no anton’izao fandaniam-poana izao? '
  '9':
  - type: text
    content: 'Fa azo namidy ho lafo be iny ka homena ny malahelo. '
