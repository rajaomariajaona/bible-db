document_id: SNG.3
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Teo am-pandriako nony alina dia mazàna nitady ilay tian’ny fanahiko aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitady azy aho, fa tsy nahita azy–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Dia hoy izaho:'
  - type: text
    text: ' Hifoha aho ka handehandeha eo an-tanàna,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eny an-dàlambe sy eny an-kalalahana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitady ilay tian’ny fanahiko–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nitady azy aho, nefa tsy nahita azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hitan’ny antily izay mandehandeha eny an-tanàna aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Dia hoy izaho:'
  - type: text
    text: ' Sao mba hitanareo lahy ilay tian’ny fanahiko iny?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nony vao nandalo ireo vetivety foana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hitako ilay tian’ny fanahiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nohazoniko izy, fa tsy navelako handeha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pitondrako azy ho any an-tranon’ineny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’ny efi-tranon’ilay niteraka ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mampianiana anareo amin’ny gazela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaram-biby haingan-tongotra.
    marker-yv: yv-n
  - type: text
    text: ' na amin’ny dieravavy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaram-biby haingan-tongotra.
    marker-yv: yv-n
  - type: text
    text: ' any an-tsaha aho, ry zanakavavin’i Jerosalema;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny nampakarana an-dravehivavy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: IZA moa irỳ vehivavy miakatra avy any an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny setroka mitankosina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsara fofona amin’ny miora sy ny ditin-kazo mani-pofona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny vovoka manitra samy hafa entin’ny mpandranto?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro ny filanjan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: farafara.
    marker-yv: yv-n
  - type: text
    text: ' i Solomona!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lehilahy enim-polo, mahery avokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy amin’ny lehilahy mahery amin’ny Isiraely, no manotrona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: An-tsabatra avokoa izy rehetra sady mahay miady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy mitondra ny sabany eo am-balahany avy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny tahotra amin’ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nanao filanjana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: farafara.
    marker-yv: yv-n
  - type: text
    text: ' ho azy Solomona mpanjaka'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tamin’ny hazo avy any Libanona:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Volafotsy no nataony andriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary volamena ny fiankinana, volomparasy ny ondany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ao anatiny voaravaka amin’ny fanomezam-pitiavana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy tamin’ny zanakavavin’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mivoaha, ry zanakavavin’i Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mijere an’i Solomona mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misatroka ilay satroboninahitra nasatro-dreniny azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro nampakarany vady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tamin’ny andro nifalian’ny fony.
