document_id: SNG.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: Teo am-pandriako nony alina dia mazàna nitady ilay tian’ny fanahiko aho;
  - type: text
    content: Nitady azy aho, fa tsy nahita azy–
  '10':
  - type: text
    content: Volafotsy no nataony andriny,
  - type: text
    content: Ary volamena ny fiankinana, volomparasy ny ondany,
  - type: text
    content: Ny ao anatiny voaravaka amin’ny fanomezam-pitiavana
  - type: text
    content: Avy tamin’ny zanakavavin’i Jerosalema.
  '11':
  - type: text
    content: Mivoaha, ry zanakavavin’i Ziona,
  - type: text
    content: Ka mijere an’i Solomona mpanjaka,
  - type: text
    content: Misatroka ilay satroboninahitra nasatro-dreniny azy
  - type: text
    content: Tamin’ny andro nampakarany vady,
  - type: text
    content: Dia tamin’ny andro nifalian’ny fony.
  '2':
  - type: text
    content: ' '
  - type: text
    content: 'Dia hoy izaho:'
  - type: text
    content: ' Hifoha aho ka handehandeha eo an-tanàna,'
  - type: text
    content: Dia eny an-dàlambe sy eny an-kalalahana,
  - type: text
    content: Hitady ilay tian’ny fanahiko–
  - type: text
    content: Eny, nitady azy aho, nefa tsy nahita azy.
  '3':
  - type: text
    content: Hitan’ny antily izay mandehandeha eny an-tanàna aho;
  - type: text
    content: 'Dia hoy izaho:'
  - type: text
    content: ' Sao mba hitanareo lahy ilay tian’ny fanahiko iny?'
  '4':
  - type: text
    content: Nony vao nandalo ireo vetivety foana aho,
  - type: text
    content: Dia hitako ilay tian’ny fanahiko,
  - type: text
    content: Ka nohazoniko izy, fa tsy navelako handeha,
  - type: text
    content: Mandra-pitondrako azy ho any an-tranon’ineny,
  - type: text
    content: Dia any amin’ny efi-tranon’ilay niteraka ahy.
  '5':
  - type: text
    content: Mampianiana anareo amin’ny gazela
  - type: note
    content: Anaram-biby haingan-tongotra.
  - type: text
    content: ' na amin’ny dieravavy'
  - type: note
    content: Anaram-biby haingan-tongotra.
  - type: text
    content: ' any an-tsaha aho, ry zanakavavin’i Jerosalema;'
  - type: text
    content: Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony.
  - type: heading
    content: Ny amin’ny nampakarana an-dravehivavy.
  '6':
  - type: text
    content: IZA moa irỳ vehivavy miakatra avy any an-efitra,
  - type: text
    content: Tahaka ny setroka mitankosina,
  - type: text
    content: Sady tsara fofona amin’ny miora sy ny ditin-kazo mani-pofona
  - type: text
    content: Mbamin’ny vovoka manitra samy hafa entin’ny mpandranto?
  '7':
  - type: text
    content: Indro ny filanjan’
  - type: note
    content: Heb. farafara.
  - type: text
    content: ' i Solomona!'
  - type: text
    content: Lehilahy enim-polo, mahery avokoa,
  - type: text
    content: Avy amin’ny lehilahy mahery amin’ny Isiraely, no manotrona azy.
  '8':
  - type: text
    content: An-tsabatra avokoa izy rehetra sady mahay miady,
  - type: text
    content: Samy mitondra ny sabany eo am-balahany avy
  - type: text
    content: Noho ny tahotra amin’ny alina.
  '9':
  - type: text
    content: Nanao filanjana
  - type: note
    content: Heb. farafara.
  - type: text
    content: ' ho azy Solomona mpanjaka'
  - type: text
    content: 'Tamin’ny hazo avy any Libanona:'
