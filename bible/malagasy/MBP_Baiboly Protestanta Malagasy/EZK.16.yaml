document_id: EZK.16,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nivadihan’i Jerosalema, sy ny nahafoizany an’i Jehovah, ary ny hamaliany azy amin’izany.
  - type: text
    content: 'TONGA tamiko indray ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: Notafiako lamba misoratsoratra koa hianao sy nokiraroako hodi-takasy,
  - type: note
    content: Hoditra voasoka ho menamena, na hodi-biby tsy fantatra.
  - type: text
    content: ' ary nampisikiniko rongony fotsy madinika sy notafiako amparasily. '
  '11':
  - type: text
    content: 'Noravahako firavaka koa hianao, ka nasiako haba ny tànanao ary rojo ny vozonao. '
  '12':
  - type: text
    content: 'Ary nasiako kavina ny oronao sy ny sofinao ary satroboninahitra tsara tarehy ny lohanao, '
  '13':
  - type: text
    content: 'ka dia niravaka volamena sy volafotsy hianao, ary rongony fotsy madinika sy amparasily ary lamba misoratsoratra no fitafianao; koba tsara toto sy tantely ary diloilo no fihinanao; ary efa nihatsara tarehy dia nihatsara tarehy hianao sady nambinina ho miendrik’andriana. '
  '14':
  - type: text
    content: Ary dia niely tany amin’ny jentilisa aza ny lazanao noho ny hatsaran-tarehinao; fa tanteraka izany noho ny voninahitro izay nataoko taminao, hoy Jehovah Tompo.
  '15':
  - type: text
    content: Kanjo natoky ny hatsaran-tarehinao hianao ka nijangajanga noho ny lazanao
  - type: note
    content: Heb. anaranao.
  - type: text
    content: ' sady nanaram-po nijangajanga tamin’ny mpandalo rehetra, ka nafoy ho azy izany. '
  '16':
  - type: text
    content: 'Ary nangalanao ny fitafianao, dia nanaovanao fitoerana avo ho anao ka noravahanao sora-damba, ka nijangajanga teo aminy hianao; dia zavatra izay tsy tokony hiseho na hisy akory. '
  '17':
  - type: text
    content: 'Ary nalainao koa ny firavakao tamin’ny volamenako sy ny volafotsiko, izay nomeko anao, dia nataonao sarin-dehilahy ho anao ka nijangajanganao; '
  '18':
  - type: text
    content: 'dia nalainao koa ny fitafianao misoratsoratra ka natafinao ireo; ary ny diloiloko sy ny ditin-kazo manitro dia napetrakao teo anoloany. '
  '19':
  - type: text
    content: Ary ny haniko izay nomeko anao koa, dia ny koba tsara toto sy ny diloilo ary ny tantely, izay nafahako anao, dia napetrakao teo anoloan’ireo ho hanitra ankasitrahana; teo tokoa izany, hoy Jehovah Tompo.
  '2':
  - type: text
    content: 'Ry zanak’olona, ampahafantaro an’i Jerosalema ny fahavetavetany, '
  '20':
  - type: text
    content: 'Ary nentinao ny zanakao-lahy sy ny zanakao-vavy, izay naterakao ho Ahy, dia novonoinao ho fanatitra ho an’ireo mba hohaniny. Moa zavatra kely va izany fijangajanganao izany? '
  '21':
  - type: text
    content: 'Ary novonoinao ny zanako, fa natolotrao ka nampandehaninao namaky ny afo ho an’ireo. '
  '22':
  - type: text
    content: 'Ary tamin’ny fahavetavetanao sy ny fijangajanganao rehetra dia tsy nahatsiaro ny andro fahakelezanao hianao, fony hianao nitanjaka sy nihanjahanja sady nihosinkosina teo amin’ny ranao. '
  '23':
  - type: text
    content: 'Ary rehefa vitanao izany faharatsianao rehetra izany (lozanao! lozanao! hoy Jehovah Tompo), '
  '24':
  - type: text
    content: 'dia nanao trano fijangajangana ho anao hianao sady nanao fitoerana avo ho anao teny an-kalalahana rehetra teny. '
  '25':
  - type: text
    content: Ary teny an-tsampanan-dàlana rehetra no nanaovanao ny fitoerana avonao, ary novetavetainao ny hatsaran-tarehinao, ka nabahanao ho amin’ny mpandalo rehetra ny tongotrao, ary nampitomboinao ny fijangajanganao.
  '26':
  - type: text
    content: 'Hianao efa nijangajanga tamin’ny zanak’i Egypta be nofo izay mifanila fonenana aminao; ary nampitomboinao ny fijangajanganao ka nampahatezitra Ahy. '
  '27':
  - type: text
    content: 'Ary, indro, nahinjitro taminao ny tànako, ka nahenako ny anjara-haninao, ary natolotro ho amin’ny sitrapon’izay mankahala anao hianao, dia ny zanakavavin’ny Filistina, izay menatra noho ny fahavetavetana fanaonao. '
  '28':
  - type: text
    content: 'Ary nijangajanga tamin’ny zanak’i Asyria koa hianao noho ny tsi-fahafaham-ponao; eny, nijangajanga taminy hianao, nefa mbola tsy afa-po ihany. '
  '29':
  - type: text
    content: Ary mbola nampandrosoinao ihany ny fijangajanganao hatrany amin’ny tanin’ny mpandranto,
  - type: note
    content: Heb. tany Kanana; izahao xvii. 4.
  - type: text
    content: ' dia hatrany Kaldea; fa na dia tamin’izany aza dia mbola tsy afa-po ihany hianao. '
  '3':
  - type: text
    content: 'ka ataovy hoe: Izao no lazain’i Jehovah Tompo amin’i Jerosalema: Ny tany Kanana no nahaterahanao sy nahabe anao; Amorita no rainao, ary Hetita no reninao. '
  '30':
  - type: text
    content: 'Akory ny fahamaimain’ny fonao! hoy Jehovah Tompo, tamin’ny nanaovanao ireo rehetra ireo, dia ny fanaon’ny janga tsivalahara! '
  '31':
  - type: text
    content: 'Tamin’ny nanaovanao ny trano fijangajanganao teny an-tsampanan-dàlana rehetra sy ny nanaovanao ny fitoerana avonao teny an-kalalahana rehetra dia tsy mba tahaka ny vehivavy janga hianao, satria tsy nahoanao akory izay tangy. '
  '32':
  - type: text
    content: 'Ny vadin’olona mijangajanga dia maka olon-kafa ho solon’ny vadiny! '
  '33':
  - type: text
    content: 'Ny vehivavy janga rehetra dia omen-tangy; fa hianao kosa manangy ireo lehilahinao rehetra sady manome azy fanambatambazana hanatonan’ny manodidina rehetra anao mba hijangajangany aminao. '
  '34':
  - type: text
    content: Ary hafa noho ny an’ny vehivavy sasany mihitsy ny fanaonao tamin’ny fijangajanganao, fa tsy nisy nanaraka anao hijangajanga taminao; eny, satria nanome tangy hianao, fa tsy mba nomena, dia izany indrindra no mahahafa anao.
  '35':
  - type: text
    content: 'Koa mihainoa ny tenin’i Jehovah, ry kala janga: '
  '36':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo: Noho ny nandanianao vola be'
  - type: note
    content: Heb. nanidinanao varahina.
  - type: text
    content: ' sy ny nampisehoana ny fitanjahanao tamin’ny nijangajanganao tamin’ireny lehilahinao sy ny sampinao rehetra, izay fahavetavetanao, ary noho ny ran’ny zanakao izay naterinao ho an’ireo, '
  '37':
  - type: text
    content: 'dia, indro, hovoriko ireny lehilahinao rehetra ireny, izay mankamamy anao sy izay tianao rehetra mbamin’ireny rehetra izay halanao koa, eny, hovoriko avy amin’ny manodidina ireny mba hamely anao, ka hampisehoiko aminy ny fitanjahanao, dia hahita ny fitanjahanao rehetra izy; '
  '38':
  - type: text
    content: 'ary hotsaraiko hianao araka ny fitsara vehivavy mijangajanga sy izay mandatsa-dra, ka halatsako ny ranao noho ny fahatezerana sy ny fahasaro-piaro. '
  '39':
  - type: text
    content: 'Dia hatolotro ho eny an-tànan’ireny hianao, ka harodany ny trano fijangajanganao, ary horavany ny fitoerana avonao; dia hendahany koa ny fitafianao, ary hesoriny ny firavakao soa, ka havelany hitanjaka sy hiboridana hianao. '
  '4':
  - type: text
    content: 'Ary ny amin’ny nahaterahanao, dia tsy voatapaka akory ny tadim-poitrao tamin’ny andro nahaterahanao, ary tsy voampandro tamin’ny rano hianao, na voahosotra sira, na voahodidina lamban-jaza akory. '
  '40':
  - type: text
    content: 'Dia hitondra vahoaka maro be hiakatra hamely anao koa izy ka hotorahany vato sady hotetitetehiny amin’ny sabany hianao. '
  '41':
  - type: text
    content: Ary hodorany amin’ny afo ny tranonao, ka hotanterahiny eo imason’ny vehivavy maro ny famaliana anao; ary hatsahatro tsy hijangajanga hianao ka tsy hanangy intsony.
  '42':
  - type: text
    content: 'Toy izany no hialako fo aminao, ary ho afaka ny fahasaro-piaroko aminao, dia hionona Aho ka tsy ho tezitra intsony. '
  '43':
  - type: text
    content: Noho ny tsy nahatsiarovanao ny andro fahakelezanao, fa niempo nanohitra Ahy tamin’ireo rehetra ireo hianao, dia, indro, ny nataonao
  - type: note
    content: Heb. làlanao.
  - type: text
    content: ' ihany no hatsingeriko ho eo an-dohanao, hoy Jehovah Tompo. Ary tsy nanao izany ratsy izany ho fanampin’ny fahavetavetanao rehetra va hianao?'
  - type: note
    content: 'Na: Fa raha tsy izany, dia Izaho indray no hanao ratsy mihoatra noho ny fahavetavetanareo rehetra.'
  '44':
  - type: text
    content: 'Indro, ny mpanao ohabolana rehetra dia hamely anao amin’izao ohabolana izao hoe: ,Manahaka an-dreniny ihany ny zanani-vavy.’ '
  '45':
  - type: text
    content: 'Hianao dia zanakavavin-dreninao, izay mahafoy ny vadiny aman-janany; ary hianao dia rahavavin’ireo rahavavinao, izay nahafoy ny vadiny aman-janany; Hetita no reninareo, ary Amorita no rainareo. '
  '46':
  - type: text
    content: 'Samaria no zokinao-vavy, dia izy sy ny zanani-vavy izay monina eo an-kavianao; ary ny zandrinao-vavy, izay monina amin’ny an-kavananao, dia Sodoma sy ny zanani-vavy. '
  '47':
  - type: text
    content: Nefa tsy araka ny alehan’ireo ihany no nalehanao, ary tsy araka ny fahavetavetan’ireo ihany no nataonao; fa hoatra ny zavatra kely loatra izany, ka dia nanao ratsy mihoatra noho ireo indray hianao tamin’ny nalehanao rehetra.
  '48':
  - type: text
    content: 'Raha velona koa Aho, hoy Jehovah Tompo, na dia Sodoma rahavavinao sy ny zanani-vavy aza tsy mba nanao tahaka ny nataonao sy ny zanakao-vavy. '
  '49':
  - type: text
    content: 'Indro, izao no helok’i Sodoma rahavavinao: Avonavona sy fahabetsahan-kanina ary fahatokiam-poana no tao aminy sy tao amin’ny zanani-vavy, ary tsy mba nitantana ny malahelo sy ny mahantra izy. '
  '5':
  - type: text
    content: Tsy nisy maso niantra anao hanao izany aminao, na dia iray akory amin’ireo zavatra ireo aza, mba hamindra fo aminao; fa nariana tany an-tsaha hianao, satria natao ho zava-maharikoriko hianao tamin’ny andro nahaterahanao.
  '50':
  - type: text
    content: Niavonavona izy ka nanao fahavetavetana teo anatrehako; ary nony nahita izany Aho, dia nanaisotra azy.
  '51':
  - type: text
    content: 'Ary tsy ampy antsasaky ny fahotanao ny nataon’i Samaria; fa hianao efa nampitombo ny fahavetavetanao mihoatra noho izy, ary nampiseho ny rahavavinao ho toa marina indray tamin’ny fahavetavetanao rehetra izay nataonao. '
  '52':
  - type: text
    content: Hianao koa dia aoka hitondra ny henatrao araka ny efa nitsaranao ny rahavavinao. Noho ny fahotanao izay nahatonga anao ho vetaveta mihoatra noho ireo, ka dia miseho ho toa marina noho hianao izy,–eny, menara koa hianao, ka mitondrà ny henatrao noho ny nampisehoanao ny rahavavinao ho toa marina.
  '53':
  - type: text
    content: 'Ary hampodiko avy amin’ny fahababoana ireny, dia Sodoma sy ny zanani-vavy, ary Samaria sy ny zanani-vavy mbamin’izay olonao voababo, '
  '54':
  - type: text
    content: mba hitondranao ny henatrao sy hangaihaizanao noho izay rehetra nataonao amin’ny hampiononanao azy.
  - type: note
    content: 'Na: tamin’ny nampiononanao azy.'
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'Ary ny rahavavinao, dia Sodoma sy ny zanani-vavy, dia hody amin’ny toetrany taloha, ary Samaria sy ny zanani-vavy dia hody amin’ny toetrany taloha, ary hianao sy ny zanakao-vavy dia hody amin’ny toetrareo taloha koa. '
  '56':
  - type: text
    content: 'Nefa tsy mbola mba notononin’ny vavanao akory ny nanjo an’i Sodoma rahavavinao tamin’ny andro niavonavonanao, '
  '57':
  - type: text
    content: 'fony tsy mbola niseho ny faharatsianao, toy ny tamin’ny andro nandatsan’ny zanakavavin’i Syria sy izay rehetra manodidina azy ary ny zanakavavin’ny Filistina, izay namingavinga anao manodidina. '
  '58':
  - type: text
    content: Ny faharatsianao sy ny fahavetavetanao no ho entinao, hoy Jehovah.
  '59':
  - type: text
    content: 'Fa izao no lazain’i Jehovah Tompo: Araka ny nataonao ihany no hataoko aminao, izay namingavinga ny fianianana ka nivadika ny fanekena. '
  '6':
  - type: text
    content: 'Ary raha nandalo Aho ka nahita anao nihosinkosina teo amin’ny ranao, dia hoy Izaho taminao, raha mbola tamin’ny ranao hianao: Ho velona anie hianao; eny, hoy Izaho taminao, raha mbola tamin’ny ranao hianao: Ho velona anie hianao. '
  '60':
  - type: text
    content: 'Nefa hotsarovako ny fanekena nataoko taminao, tamin’ny andro fahakelezanao, ka hanorina fanekena mandrakizay aminao Aho. '
  '61':
  - type: text
    content: 'Dia hotsarovanao ny nalehanao, ka ho menatra hianao, raha mandray ireo rahavavinao, dia ny zokinao sy ny zandrinao; ka homeko ho zanakao-vavy ireo, na dia tsy mba isan’ilay nanaovako fanekena taminao aza. '
  '62':
  - type: text
    content: 'Izaho hanorina ny fanekeko aminao, ka dia ho fantatrao fa Izaho no Jehovah, '
  '63':
  - type: text
    content: mba hahatsiarovanao sy hangaihaizanao ary tsy hiloahanao vava intsony noho ny henatrao, raha mamela ny helokao ny amin’ny nataonao rehetra Aho, hoy Jehovah Tompo.
  '7':
  - type: text
    content: 'Efa nataoko alinalina, toy ny zava-maniry any an-tsaha, ny isanao, ka nitombo sy nihalehibe ary tonga tsara tarehy tokoa hianao; naniry nono hianao sady naniry volo, nefa mbola nitanjaka sy nihanjahanja ihany. '
  '8':
  - type: text
    content: Ary raha nandalo Aho ka nijery anao, dia hitako fa izay no fotoanao, dia ny fotoam-pitiavana; ary narakotro anao ny lambako, ka nosaronako ny fitanjahanao; eny, nianina taminao Aho ka nanao fanekena taminao, hoy Jehovah Tompo, ka dia efa Ahy hianao.
  '9':
  - type: text
    content: 'Dia nampandroiko rano hianao, eny, nosasako tsara ho afaka tamin’ny ranao, dia nohosorako diloilo. '
