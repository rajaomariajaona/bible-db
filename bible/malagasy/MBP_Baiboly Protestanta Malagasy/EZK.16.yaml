document_id: EZK.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nivadihan’i Jerosalema, sy ny nahafoizany an’i Jehovah, ary ny hamaliany azy amin’izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TONGA tamiko indray ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak’olona, ampahafantaro an’i Jerosalema ny fahavetavetany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka ataovy hoe: Izao no lazain’i Jehovah Tompo amin’i Jerosalema: Ny tany Kanana no nahaterahanao sy nahabe anao; Amorita no rainao, ary Hetita no reninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny amin’ny nahaterahanao, dia tsy voatapaka akory ny tadim-poitrao tamin’ny andro nahaterahanao, ary tsy voampandro tamin’ny rano hianao, na voahosotra sira, na voahodidina lamban-jaza akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy nisy maso niantra anao hanao izany aminao, na dia iray akory amin’ireo zavatra ireo aza, mba hamindra fo aminao; fa nariana tany an-tsaha hianao, satria natao ho zava-maharikoriko hianao tamin’ny andro nahaterahanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha nandalo Aho ka nahita anao nihosinkosina teo amin’ny ranao, dia hoy Izaho taminao, raha mbola tamin’ny ranao hianao: Ho velona anie hianao; eny, hoy Izaho taminao, raha mbola tamin’ny ranao hianao: Ho velona anie hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa nataoko alinalina, toy ny zava-maniry any an-tsaha, ny isanao, ka nitombo sy nihalehibe ary tonga tsara tarehy tokoa hianao; naniry nono hianao sady naniry volo, nefa mbola nitanjaka sy nihanjahanja ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary raha nandalo Aho ka nijery anao, dia hitako fa izay no fotoanao, dia ny fotoam-pitiavana; ary narakotro anao ny lambako, ka nosaronako ny fitanjahanao; eny, nianina taminao Aho ka nanao fanekena taminao, hoy Jehovah Tompo, ka dia efa Ahy hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nampandroiko rano hianao, eny, nosasako tsara ho afaka tamin’ny ranao, dia nohosorako diloilo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Notafiako lamba misoratsoratra koa hianao sy nokiraroako hodi-takasy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Hoditra voasoka ho menamena, na hodi-biby tsy fantatra.
    marker-yv: yv-n
  - type: text
    text: ' ary nampisikiniko rongony fotsy madinika sy notafiako amparasily. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Noravahako firavaka koa hianao, ka nasiako haba ny tànanao ary rojo ny vozonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nasiako kavina ny oronao sy ny sofinao ary satroboninahitra tsara tarehy ny lohanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ka dia niravaka volamena sy volafotsy hianao, ary rongony fotsy madinika sy amparasily ary lamba misoratsoratra no fitafianao; koba tsara toto sy tantely ary diloilo no fihinanao; ary efa nihatsara tarehy dia nihatsara tarehy hianao sady nambinina ho miendrik’andriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary dia niely tany amin’ny jentilisa aza ny lazanao noho ny hatsaran-tarehinao; fa tanteraka izany noho ny voninahitro izay nataoko taminao, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Kanjo natoky ny hatsaran-tarehinao hianao ka nijangajanga noho ny lazanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anaranao.
    marker-yv: yv-n
  - type: text
    text: ' sady nanaram-po nijangajanga tamin’ny mpandalo rehetra, ka nafoy ho azy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nangalanao ny fitafianao, dia nanaovanao fitoerana avo ho anao ka noravahanao sora-damba, ka nijangajanga teo aminy hianao; dia zavatra izay tsy tokony hiseho na hisy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nalainao koa ny firavakao tamin’ny volamenako sy ny volafotsiko, izay nomeko anao, dia nataonao sarin-dehilahy ho anao ka nijangajanganao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia nalainao koa ny fitafianao misoratsoratra ka natafinao ireo; ary ny diloiloko sy ny ditin-kazo manitro dia napetrakao teo anoloany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny haniko izay nomeko anao koa, dia ny koba tsara toto sy ny diloilo ary ny tantely, izay nafahako anao, dia napetrakao teo anoloan’ireo ho hanitra ankasitrahana; teo tokoa izany, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nentinao ny zanakao-lahy sy ny zanakao-vavy, izay naterakao ho Ahy, dia novonoinao ho fanatitra ho an’ireo mba hohaniny. Moa zavatra kely va izany fijangajanganao izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary novonoinao ny zanako, fa natolotrao ka nampandehaninao namaky ny afo ho an’ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tamin’ny fahavetavetanao sy ny fijangajanganao rehetra dia tsy nahatsiaro ny andro fahakelezanao hianao, fony hianao nitanjaka sy nihanjahanja sady nihosinkosina teo amin’ny ranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary rehefa vitanao izany faharatsianao rehetra izany (lozanao! lozanao! hoy Jehovah Tompo), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia nanao trano fijangajangana ho anao hianao sady nanao fitoerana avo ho anao teny an-kalalahana rehetra teny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary teny an-tsampanan-dàlana rehetra no nanaovanao ny fitoerana avonao, ary novetavetainao ny hatsaran-tarehinao, ka nabahanao ho amin’ny mpandalo rehetra ny tongotrao, ary nampitomboinao ny fijangajanganao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hianao efa nijangajanga tamin’ny zanak’i Egypta be nofo izay mifanila fonenana aminao; ary nampitomboinao ny fijangajanganao ka nampahatezitra Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary, indro, nahinjitro taminao ny tànako, ka nahenako ny anjara-haninao, ary natolotro ho amin’ny sitrapon’izay mankahala anao hianao, dia ny zanakavavin’ny Filistina, izay menatra noho ny fahavetavetana fanaonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nijangajanga tamin’ny zanak’i Asyria koa hianao noho ny tsi-fahafaham-ponao; eny, nijangajanga taminy hianao, nefa mbola tsy afa-po ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary mbola nampandrosoinao ihany ny fijangajanganao hatrany amin’ny tanin’ny mpandranto,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tany Kanana; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xvii. 4.
    marker-yv: yv-n
  - type: text
    text: ' dia hatrany Kaldea; fa na dia tamin’izany aza dia mbola tsy afa-po ihany hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Akory ny fahamaimain’ny fonao! hoy Jehovah Tompo, tamin’ny nanaovanao ireo rehetra ireo, dia ny fanaon’ny janga tsivalahara! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin’ny nanaovanao ny trano fijangajanganao teny an-tsampanan-dàlana rehetra sy ny nanaovanao ny fitoerana avonao teny an-kalalahana rehetra dia tsy mba tahaka ny vehivavy janga hianao, satria tsy nahoanao akory izay tangy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny vadin’olona mijangajanga dia maka olon-kafa ho solon’ny vadiny! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny vehivavy janga rehetra dia omen-tangy; fa hianao kosa manangy ireo lehilahinao rehetra sady manome azy fanambatambazana hanatonan’ny manodidina rehetra anao mba hijangajangany aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary hafa noho ny an’ny vehivavy sasany mihitsy ny fanaonao tamin’ny fijangajanganao, fa tsy nisy nanaraka anao hijangajanga taminao; eny, satria nanome tangy hianao, fa tsy mba nomena, dia izany indrindra no mahahafa anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa mihainoa ny tenin’i Jehovah, ry kala janga: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo: Noho ny nandanianao vola be'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanidinanao varahina.
    marker-yv: yv-n
  - type: text
    text: ' sy ny nampisehoana ny fitanjahanao tamin’ny nijangajanganao tamin’ireny lehilahinao sy ny sampinao rehetra, izay fahavetavetanao, ary noho ny ran’ny zanakao izay naterinao ho an’ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'dia, indro, hovoriko ireny lehilahinao rehetra ireny, izay mankamamy anao sy izay tianao rehetra mbamin’ireny rehetra izay halanao koa, eny, hovoriko avy amin’ny manodidina ireny mba hamely anao, ka hampisehoiko aminy ny fitanjahanao, dia hahita ny fitanjahanao rehetra izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary hotsaraiko hianao araka ny fitsara vehivavy mijangajanga sy izay mandatsa-dra, ka halatsako ny ranao noho ny fahatezerana sy ny fahasaro-piaro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hatolotro ho eny an-tànan’ireny hianao, ka harodany ny trano fijangajanganao, ary horavany ny fitoerana avonao; dia hendahany koa ny fitafianao, ary hesoriny ny firavakao soa, ka havelany hitanjaka sy hiboridana hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia hitondra vahoaka maro be hiakatra hamely anao koa izy ka hotorahany vato sady hotetitetehiny amin’ny sabany hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary hodorany amin’ny afo ny tranonao, ka hotanterahiny eo imason’ny vehivavy maro ny famaliana anao; ary hatsahatro tsy hijangajanga hianao ka tsy hanangy intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Toy izany no hialako fo aminao, ary ho afaka ny fahasaro-piaroko aminao, dia hionona Aho ka tsy ho tezitra intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Noho ny tsy nahatsiarovanao ny andro fahakelezanao, fa niempo nanohitra Ahy tamin’ireo rehetra ireo hianao, dia, indro, ny nataonao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.43 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlanao.
    marker-yv: yv-n
  - type: text
    text: ' ihany no hatsingeriko ho eo an-dohanao, hoy Jehovah Tompo. Ary tsy nanao izany ratsy izany ho fanampin’ny fahavetavetanao rehetra va hianao?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.43 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Fa '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'raha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy izany, dia Izaho indray no hanao ratsy mihoatra noho ny fahavetavetanareo rehetra.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Indro, ny mpanao ohabolana rehetra dia hamely anao amin’izao ohabolana izao hoe: ,Manahaka an-dreniny ihany ny zanani-vavy.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Hianao dia zanakavavin-dreninao, izay mahafoy ny vadiny aman-janany; ary hianao dia rahavavin’ireo rahavavinao, izay nahafoy ny vadiny aman-janany; Hetita no reninareo, ary Amorita no rainareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Samaria no zokinao-vavy, dia izy sy ny zanani-vavy izay monina eo an-kavianao; ary ny zandrinao-vavy, izay monina amin’ny an-kavananao, dia Sodoma sy ny zanani-vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Nefa tsy araka ny alehan’ireo ihany no nalehanao, ary tsy araka ny fahavetavetan’ireo ihany no nataonao; fa hoatra ny zavatra kely loatra izany, ka dia nanao ratsy mihoatra noho ireo indray hianao tamin’ny nalehanao rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Raha velona koa Aho, hoy Jehovah Tompo, na dia Sodoma rahavavinao sy ny zanani-vavy aza tsy mba nanao tahaka ny nataonao sy ny zanakao-vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Indro, izao no helok’i Sodoma rahavavinao: Avonavona sy fahabetsahan-kanina ary fahatokiam-poana no tao aminy sy tao amin’ny zanani-vavy, ary tsy mba nitantana ny malahelo sy ny mahantra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Niavonavona izy ka nanao fahavetavetana teo anatrehako; ary nony nahita izany Aho, dia nanaisotra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary tsy ampy antsasaky ny fahotanao ny nataon’i Samaria; fa hianao efa nampitombo ny fahavetavetanao mihoatra noho izy, ary nampiseho ny rahavavinao ho toa marina indray tamin’ny fahavetavetanao rehetra izay nataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Hianao koa dia aoka hitondra ny henatrao araka ny efa nitsaranao ny rahavavinao. Noho ny fahotanao izay nahatonga anao ho vetaveta mihoatra noho ireo, ka dia miseho ho toa marina noho hianao izy,–eny, menara koa hianao, ka mitondrà ny henatrao noho ny nampisehoanao ny rahavavinao ho toa marina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary hampodiko avy amin’ny fahababoana ireny, dia Sodoma sy ny zanani-vavy, ary Samaria sy ny zanani-vavy mbamin’izay olonao voababo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: mba hitondranao ny henatrao sy hangaihaizanao noho izay rehetra nataonao amin’ny hampiononanao azy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.54 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tamin’ny nampiononanao azy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary ny rahavavinao, dia Sodoma sy ny zanani-vavy, dia hody amin’ny toetrany taloha, ary Samaria sy ny zanani-vavy dia hody amin’ny toetrany taloha, ary hianao sy ny zanakao-vavy dia hody amin’ny toetrareo taloha koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Nefa tsy mbola mba notononin’ny vavanao akory ny nanjo an’i Sodoma rahavavinao tamin’ny andro niavonavonanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'fony tsy mbola niseho ny faharatsianao, toy ny tamin’ny andro nandatsan’ny zanakavavin’i Syria sy izay rehetra manodidina azy ary ny zanakavavin’ny Filistina, izay namingavinga anao manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ny faharatsianao sy ny fahavetavetanao no ho entinao, hoy Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Fa izao no lazain’i Jehovah Tompo: Araka ny nataonao ihany no hataoko aminao, izay namingavinga ny fianianana ka nivadika ny fanekena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Nefa hotsarovako ny fanekena nataoko taminao, tamin’ny andro fahakelezanao, ka hanorina fanekena mandrakizay aminao Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Dia hotsarovanao ny nalehanao, ka ho menatra hianao, raha mandray ireo rahavavinao, dia ny zokinao sy ny zandrinao; ka homeko ho zanakao-vavy ireo, na dia tsy mba isan’ilay nanaovako fanekena taminao aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Izaho hanorina ny fanekeko aminao, ka dia ho fantatrao fa Izaho no Jehovah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: mba hahatsiarovanao sy hangaihaizanao ary tsy hiloahanao vava intsony noho ny henatrao, raha mamela ny helokao ny amin’ny nataonao rehetra Aho, hoy Jehovah Tompo.
