document_id: PSA.82
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fitsaran’Andriamanitra ny mpitsara ety an-tany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA dia eo amin’ny fiangonan’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo amin’ireo andriamanitra no itsarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandra-pahoviana no hitsaranareo tsy marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ihenaranareo maso ny ratsy fanahy?
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alaharo ny tenin’ny mahantra sy ny kamboty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Omeo rariny ny ory sy ny malahelo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vonjeo ny mahantra sy ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afaho amin’ny tànan’ny ratsy fanahy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy mahalala na mahazo an-tsaina ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny maizina no andehanany; mihorohoro ny fanambanin’ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy izaho: Andriamanitra hianareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zanaky ny Avo Indrindra hianareo rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: kanjo ho faty tahaka ny olona ihany hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary samy ho lavo tahaka ny anankiray amin’ny lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitsangàna, Andriamanitra ô, tsarao ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no handova ny firenena rehetra.
