document_id: PSA.82,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fitsaran’Andriamanitra ny mpitsara ety an-tany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salamo nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ANDRIAMANITRA dia eo amin’ny fiangonan’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary eo amin’ireo andriamanitra no itsarany.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no hitsaranareo tsy marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ihenaranareo maso ny ratsy fanahy?
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alaharo ny tenin’ny mahantra sy ny kamboty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo rariny ny ory sy ny malahelo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo ny mahantra sy ny malahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho amin’ny tànan’ny ratsy fanahy izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahalala na mahazo an-tsaina ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny maizina no andehanany; mihorohoro ny fanambanin’ny tany rehetra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy izaho: Andriamanitra hianareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary zanaky ny Avo Indrindra hianareo rehetra;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kanjo ho faty tahaka ny olona ihany hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary samy ho lavo tahaka ny anankiray amin’ny lehibe.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, Andriamanitra ô, tsarao ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no handova ny firenena rehetra.
