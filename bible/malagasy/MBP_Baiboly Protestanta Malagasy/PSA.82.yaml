document_id: PSA.82,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsaran’Andriamanitra ny mpitsara ety an-tany.
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: ANDRIAMANITRA dia eo amin’ny fiangonan’Andriamanitra;
  - type: text
    content: Ary eo amin’ireo andriamanitra no itsarany.
  '2':
  - type: text
    content: Mandra-pahoviana no hitsaranareo tsy marina,
  - type: text
    content: Ka ihenaranareo maso ny ratsy fanahy?
  - type: text
    content: '[Sela.]'
  '3':
  - type: text
    content: Alaharo ny tenin’ny mahantra sy ny kamboty;
  - type: text
    content: Omeo rariny ny ory sy ny malahelo.
  '4':
  - type: text
    content: Vonjeo ny mahantra sy ny malahelo;
  - type: text
    content: Afaho amin’ny tànan’ny ratsy fanahy izy.
  '5':
  - type: text
    content: Tsy mahalala na mahazo an-tsaina ireny;
  - type: text
    content: Ao amin’ny maizina no andehanany; mihorohoro ny fanambanin’ny tany rehetra.
  '6':
  - type: text
    content: 'Hoy izaho: Andriamanitra hianareo,'
  - type: text
    content: Ary zanaky ny Avo Indrindra hianareo rehetra;
  '7':
  - type: text
    content: kanjo ho faty tahaka ny olona ihany hianareo,
  - type: text
    content: Ary samy ho lavo tahaka ny anankiray amin’ny lehibe.
  '8':
  - type: text
    content: Mitsangàna, Andriamanitra ô, tsarao ny tany;
  - type: text
    content: Fa Hianao no handova ny firenena rehetra.
