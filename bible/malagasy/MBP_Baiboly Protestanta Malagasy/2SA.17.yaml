document_id: 2SA.17,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy Ahitofela tamin’i Absaloma: Aoka aho hifantina lehilahy roa arivo amby iray alina ka hiainga hanenjika an’i Davida anio alina; '
  '10':
  - type: text
    content: 'ary na dia izay mahery ka manana fo tahaka ny fon’ny liona aza dia ho ketraka tokoa; fa fantatry ny Isiraely rehetra fa lehilahy mahery rainao, sady lehilahy mahery koa ireny manaraka azy ireny. '
  '11':
  - type: text
    content: 'Koa izao kosa no mba hevitro: Aoka hovorina ho eto aminao avokoa ny Isiraely rehetra hatrany Dana ka hatrany Beri-sheba, toy ny fasika amoron-dranomasina no hamarony; ka dia ny tenanao no hankany an-tafika. '
  '12':
  - type: text
    content: 'Dia ho tonga ao aminy amin’izay fitoerana anankiray hahitana azy isika, ka dia hilatsaka aminy toy ny filatsaky ny ando amin’ny tany, ka tsy hasiantsika miangana na dia iray akory aza izy mbamin’izay olona rehetra manaraka azy. '
  '13':
  - type: text
    content: 'Fa raha miditra an-tanàna izy, dia hitondran’ny Isiraely rehetra mahazaka izany tanàna izany, ka dia hotarihintsika ho any amin’ny ony izany ambara-paha-tsy hisy na dia vato kely iray aza hita ao. '
  '14':
  - type: text
    content: 'Ary hoy Absaloma sy ny lehilahy rehetra amin’ny Isiraely: Tsara noho ny hevitra nataon’i Ahitofela ny nataon’i Hosay Arkita. Fa efa notendren’i Jehovah ho foana ny sain-dalina nataon’i Ahitofela, hampidiran’i Jehovah loza amin’i Absaloma.'
  '15':
  - type: text
    content: 'Dia hoy Hosay tamin’i Zadoka sy Abiatara mpisorona: Izany ka izany no hevitra nomen’i Ahitofela an’i Absaloma sy ny loholon’ny Isiraely; ary izao ka izao kosa no hevitra nomeko azy. '
  '16':
  - type: text
    content: 'Koa maniraha haingana izao, ary ambarao amin’i Davida hoe: Aza mitoetra any amin’ny fitana'
  - type: note
    content: 'Na: tani-hay.'
  - type: text
    content: ' any amin’ny efitra anio alina, fa mità faingana tokoa, fandrao ho levona na ny mpanjaka na ny olona rehetra any aminy. '
  '17':
  - type: text
    content: 'Ary Jonatana sy Ahimaza nitoetra tao En-rogela; fa tsy sahy niseho tao an-tanàna izy; ary nisy ankizivavy anankiray nivoivoy nanambara taminy; dia lasa nandeha nanambara tany amin’i Davida mpanjaka kosa izy roa lahy. '
  '18':
  - type: text
    content: 'Fa nisy zazalahy iray nahita azy ka nanambara tamin’i Absaloma; nefa lasa faingana izy roa lahy ka tonga tao an-tranon’olona tao Bahorima, izay nisy lavaka fantsakana tao an-tokotaniny, dia nidina tao izy roa lahy. '
  '19':
  - type: text
    content: 'Ary nalain’ny vadin-dralehilahy ny rakotra ka narakony teo am-bavan’ny lavaka fantsakana, ary dia nanahy koba teo amboniny izy, ka tsy nisy nahalala. '
  '2':
  - type: text
    content: 'ary ho tonga ao aminy aho amin’ilay izy mbola sasatra sy reraka iny, ka dia hotairiko; dia handositra ny vahoaka rehetra izay any aminy, ary ny mpanjaka ihany no hasiako; '
  '20':
  - type: text
    content: 'Ary nony tonga tao amin-dravehivavy tao an-trano ny mpanompon’i Absaloma, dia nanao hoe: Aiza Ahimaza sy Jonatana teto? Fa hoy ravehivavy taminy: Tafita ny renirano kely izy izay. Ary nony efa nitady azy ireo ka tsy nahita, dia niverina nankany Jerosalema. '
  '21':
  - type: text
    content: 'Ary nony efa lasa ireo, dia niakatra avy ao amin’ny lavaka fantsakana izy roa lahy, ka lasa nandeha izy, dia nanambara tamin’i Davida mpanjaka hoe: Miaingà, ka mità faingana ny rano; fa izany no hevitra nataon’i Ahitofela hamelezana anareo.'
  '22':
  - type: text
    content: Dia niainga Davida sy ny olona nanaraka azy, ka nita an’i Jordana izy; ary nony maraina ny andro, dia tsy nisy tsy tafita an’i Jordana na dia olona iray aza.
  '23':
  - type: text
    content: Ary nony hitan’i Ahitofela fa tsy narahina ny hevitra nataony, dia nasiany lasely ny borikiny, dia niainga izy ka nody tany an-tranony tany an-tanànany; ary nanafatra ny ankohonany izy, dia nananton-tena, ka dia maty ary nalevina tao amin’ny fasan-drainy.
  - type: heading
    content: Ny nandresena an’i Absaloma, sy ny nahafatesany.
  '24':
  - type: text
    content: 'ARY Davida tonga tao Mahanaima. Ary Absaloma nita an’i Jordana, dia izy sy ny lehilahy rehetra amin’ny Isiraely izay nanaraka azy. '
  '25':
  - type: text
    content: Ary Amasa no notendren’i Absaloma ho komandin’ny miaramilany ho solon’i Joaba; ary Amasa dia zanak’ilay Isiraelita
  - type: note
    content: 'Na: Ismaelita; izahao 1 Tan. ii.17.'
  - type: text
    content: ' atao hoe Jitra, ilay nandry tamin’i Abigaila, zanakavavin’i Nahasy sady rahavavin’i Zeroia, renin’i Joaba. '
  '26':
  - type: text
    content: Ary ny Isiraely sy Absaloma nitoby tany amin’ny tany Gileada.
  '27':
  - type: text
    content: 'Ary nony tonga tao Mahanaima Davida, dia, indreo, tamy Soby, zanak’i Nahasy; avy any Raban’ny taranak’i Amona, sy Makira, zanak’i Amiela, avy any Lo-debara, ary Barzilay Gileadita, avy any Rogelima, '
  '28':
  - type: text
    content: avy mitondra fandriana sy bakoly sy vilany tany sy vary tritika sy vary hordea sy koba sy lango sy tsaramaso sy voanemba
  - type: note
    content: erva lenta.
  - type: text
    content: ' ary '
  - type: text
    content: voanemba
  - type: text
    content: ' voaendy '
  '29':
  - type: text
    content: sy tantely sy rononomandry sy ondry ary zanak’omby
  - type: note
    content: 'Na: rononomandrin’omby.'
  - type: text
    content: ' ho an’i Davida sy ny olona nanaraka azy; fa hoy izy: Noana sy sasatra ary mangetaheta atỳ an-efitra ny vahoaka.'
  '3':
  - type: text
    content: 'dia haveriko ho etỳ aminao ny vahoaka rehetra – miankina amin’io lehilahy tadiavinareo io ny hiverenan’ny vahoaka rehetra, – ka dia hiadana ny olona rehetra. '
  '4':
  - type: text
    content: Ary sitrak’i Absaloma sy ny loholon’ny Isiraely rehetra izany.
  '5':
  - type: text
    content: 'Kanefa hoy Absaloma: Mba antsoy kosa Hosay Arkita, ary aoka ho rentsika koa izay teniny. '
  '6':
  - type: text
    content: 'Ary nony tonga teo amin’i Absaloma Hosay dia hoy Absaloma taminy: Izao no hevitr’i Ahitofela; ka hanao araka ny teniny va isika? Sa ahoana kosa no hevitrao? '
  '7':
  - type: text
    content: 'Ary hoy Hosay tamin’i Absaloma: Tsy mety ny hevitra nataon’i Ahitofela tamin’ity. '
  '8':
  - type: text
    content: 'Ary hoy kosa Hosay: Hianao mahalala ny rainao sy ny olony, fa olona mahery izy sady masiaka tahaka ny bera very anaka any an-tsaha; ary lehilahy mpiady rainao ka tsy miara-mitoetra amin’ny vahoaka raha alina. '
  '9':
  - type: text
    content: 'Fa, indro, miery any an-davaka anankiray izy izao, na ao amin’ny fitoerana hafa; ka raha misy resiny amin’ny voalohany, izay mandre izany dia hanao hoe: Nahafatesana ny olona manaraka an’i Absaloma, '
