document_id: 2SA.17,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Ahitofela tamin’i Absaloma: Aoka aho hifantina lehilahy roa arivo amby iray alina ka hiainga hanenjika an’i Davida anio alina; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary na dia izay mahery ka manana fo tahaka ny fon’ny liona aza dia ho ketraka tokoa; fa fantatry ny Isiraely rehetra fa lehilahy mahery rainao, sady lehilahy mahery koa ireny manaraka azy ireny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao kosa no mba hevitro: Aoka hovorina ho eto aminao avokoa ny Isiraely rehetra hatrany Dana ka hatrany Beri-sheba, toy ny fasika amoron-dranomasina no hamarony; ka dia ny tenanao no hankany an-tafika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ho tonga ao aminy amin’izay fitoerana anankiray hahitana azy isika, ka dia hilatsaka aminy toy ny filatsaky ny ando amin’ny tany, ka tsy hasiantsika miangana na dia iray akory aza izy mbamin’izay olona rehetra manaraka azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha miditra an-tanàna izy, dia hitondran’ny Isiraely rehetra mahazaka izany tanàna izany, ka dia hotarihintsika ho any amin’ny ony izany ambara-paha-tsy hisy na dia vato kely iray aza hita ao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Absaloma sy ny lehilahy rehetra amin’ny Isiraely: Tsara noho ny hevitra nataon’i Ahitofela ny nataon’i Hosay Arkita. Fa efa notendren’i Jehovah ho foana ny sain-dalina nataon’i Ahitofela, hampidiran’i Jehovah loza amin’i Absaloma.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Hosay tamin’i Zadoka sy Abiatara mpisorona: Izany ka izany no hevitra nomen’i Ahitofela an’i Absaloma sy ny loholon’ny Isiraely; ary izao ka izao kosa no hevitra nomeko azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa maniraha haingana izao, ary ambarao amin’i Davida hoe: Aza mitoetra any amin’ny fitana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tani-hay.
      marker-yv: yv-n
    - type: text
      text: ' any amin’ny efitra anio alina, fa mità faingana tokoa, fandrao ho levona na ny mpanjaka na ny olona rehetra any aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jonatana sy Ahimaza nitoetra tao En-rogela; fa tsy sahy niseho tao an-tanàna izy; ary nisy ankizivavy anankiray nivoivoy nanambara taminy; dia lasa nandeha nanambara tany amin’i Davida mpanjaka kosa izy roa lahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy zazalahy iray nahita azy ka nanambara tamin’i Absaloma; nefa lasa faingana izy roa lahy ka tonga tao an-tranon’olona tao Bahorima, izay nisy lavaka fantsakana tao an-tokotaniny, dia nidina tao izy roa lahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalain’ny vadin-dralehilahy ny rakotra ka narakony teo am-bavan’ny lavaka fantsakana, ary dia nanahy koba teo amboniny izy, ka tsy nisy nahalala. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ho tonga ao aminy aho amin’ilay izy mbola sasatra sy reraka iny, ka dia hotairiko; dia handositra ny vahoaka rehetra izay any aminy, ary ny mpanjaka ihany no hasiako; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga tao amin-dravehivavy tao an-trano ny mpanompon’i Absaloma, dia nanao hoe: Aiza Ahimaza sy Jonatana teto? Fa hoy ravehivavy taminy: Tafita ny renirano kely izy izay. Ary nony efa nitady azy ireo ka tsy nahita, dia niverina nankany Jerosalema. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa lasa ireo, dia niakatra avy ao amin’ny lavaka fantsakana izy roa lahy, ka lasa nandeha izy, dia nanambara tamin’i Davida mpanjaka hoe: Miaingà, ka mità faingana ny rano; fa izany no hevitra nataon’i Ahitofela hamelezana anareo.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga Davida sy ny olona nanaraka azy, ka nita an’i Jordana izy; ary nony maraina ny andro, dia tsy nisy tsy tafita an’i Jordana na dia olona iray aza.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony hitan’i Ahitofela fa tsy narahina ny hevitra nataony, dia nasiany lasely ny borikiny, dia niainga izy ka nody tany an-tranony tany an-tanànany; ary nanafatra ny ankohonany izy, dia nananton-tena, ka dia maty ary nalevina tao amin’ny fasan-drainy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandresena an’i Absaloma, sy ny nahafatesany.
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Davida tonga tao Mahanaima. Ary Absaloma nita an’i Jordana, dia izy sy ny lehilahy rehetra amin’ny Isiraely izay nanaraka azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Amasa no notendren’i Absaloma ho komandin’ny miaramilany ho solon’i Joaba; ary Amasa dia zanak’ilay Isiraelita
    - type: usfm
      marker: f
