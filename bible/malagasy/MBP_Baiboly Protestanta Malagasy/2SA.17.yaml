      marker-yv: yv-n
    - type: text
      text: ' ho an’i Davida sy ny olona nanaraka azy; fa hoy izy: Noana sy sasatra ary mangetaheta atỳ an-efitra ny vahoaka.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia haveriko ho etỳ aminao ny vahoaka rehetra – miankina amin’io lehilahy tadiavinareo io ny hiverenan’ny vahoaka rehetra, – ka dia hiadana ny olona rehetra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary sitrak’i Absaloma sy ny loholon’ny Isiraely rehetra izany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa hoy Absaloma: Mba antsoy kosa Hosay Arkita, ary aoka ho rentsika koa izay teniny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga teo amin’i Absaloma Hosay dia hoy Absaloma taminy: Izao no hevitr’i Ahitofela; ka hanao araka ny teniny va isika? Sa ahoana kosa no hevitrao? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Hosay tamin’i Absaloma: Tsy mety ny hevitra nataon’i Ahitofela tamin’ity. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy kosa Hosay: Hianao mahalala ny rainao sy ny olony, fa olona mahery izy sady masiaka tahaka ny bera very anaka any an-tsaha; ary lehilahy mpiady rainao ka tsy miara-mitoetra amin’ny vahoaka raha alina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa, indro, miery any an-davaka anankiray izy izao, na ao amin’ny fitoerana hafa; ka raha misy resiny amin’ny voalohany, izay mandre izany dia hanao hoe: Nahafatesana ny olona manaraka an’i Absaloma, '
