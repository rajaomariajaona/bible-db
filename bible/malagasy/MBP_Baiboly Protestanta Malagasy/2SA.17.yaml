      marker-yv: yv-n
    - type: text
      text: ' atao hoe Jitra, ilay nandry tamin’i Abigaila, zanakavavin’i Nahasy sady rahavavin’i Zeroia, renin’i Joaba. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Isiraely sy Absaloma nitoby tany amin’ny tany Gileada.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga tao Mahanaima Davida, dia, indreo, tamy Soby, zanak’i Nahasy; avy any Raban’ny taranak’i Amona, sy Makira, zanak’i Amiela, avy any Lo-debara, ary Barzilay Gileadita, avy any Rogelima, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: avy mitondra fandriana sy bakoly sy vilany tany sy vary tritika sy vary hordea sy koba sy lango sy tsaramaso sy voanemba
    - type: usfm
