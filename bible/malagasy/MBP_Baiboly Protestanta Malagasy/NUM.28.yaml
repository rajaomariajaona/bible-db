      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary osilahy iray koa hatao fanatitra noho ny ota ho an’i Jehovah; ho fanampin’ny fanatitra dorana mandrakariva no hanaterana azy sy ny fanatitra aidina momba azy.
  '16':
