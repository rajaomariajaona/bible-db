document_id: NUM.28,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fandaharana ny fanatitra atao isan-andro sy amin’izay fotoana hafa voatendrin’Andriamanitra.
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: Fanatitra dorana amin’ny isan-tSabata izany, ho fanampin’ny fanatitra dorana mandrakariva sy ny fanatitra aidina momba azy.
  '11':
  - type: text
    content: 'Ary izao no atero amin’ny voaloham-bolanareo ho fanatitra dorana ho an’i Jehovah: vantotr’ombilahy roa sy ondrilahy iray ary zanak’ondry fito, izay iray taona'
  - type: note
    content: 'Na: hatramin’ny iray taona no ho midina.'
  - type: text
    content: ' sady tsy misy kilema, '
  '12':
  - type: text
    content: 'ary koba tsara toto telo ampahafolon’ny efaha voaharo diloilo ho fanatitra hohanina amin’ny isam-bantotr’ombilahy iray, ary koba tsara toto roa ampahafolon’ny efaha voaharo diloilo, ho fanatitra hohanina amin’ny isan-ondrilahy iray, '
  '13':
  - type: text
    content: 'ary koba tsara toto ampahafolon’ny efaha voaharo diloilo, ho fanatitra hohanina amin’ny isan-janak’ondry iray; ho fanatitra dorana izany, dia hanitra ankasitrahana, fanatitra atao amin’ny afo ho an’i Jehovah. '
  '14':
  - type: text
    content: 'Ary ny fanatitra aidina momba izany dia divay antsasaky ny hina amin’ny isam-bantotr’ombilahy iray, ary ampahatelon’ny hina ho amin’ny isan-ondrilahy iray, ary ampahefatry ny hina ho amin’ny isan-janak’ondry iray. Izany no fanatitra dorana amin’ny isam-bolana, araka ny volana amin’ny taona. '
  '15':
  - type: text
    content: Ary osilahy iray koa hatao fanatitra noho ny ota ho an’i Jehovah; ho fanampin’ny fanatitra dorana mandrakariva no hanaterana azy sy ny fanatitra aidina momba azy.
  '16':
  - type: text
    content: 'Ary ny andro fahefatra ambin’ny folo amin ny volana voalohany dia Paskan’i Jehovah. '
  '17':
  - type: text
    content: 'Ary ny andro fahadimy ambin’ny folo amin’izany volana izany dia andro firavoravoana; hafitoana no hihinanana mofo tsy misy masirasira. '
  '18':
  - type: text
    content: 'Amin’ny andro voalohany dia hisy fivoriana masina; aza manao tao-zavatra akory; '
  '19':
  - type: text
    content: 'fa izao no atero ho fanatitra atao amin’ny afo, dia fanatitra dorana ho an’i Jehovah: vantotr’ombilahy roa sy ondrilahy iray ary zanak’ondry fito izay iray taona'
  - type: note
    content: 'Na: hatramin’ny iray taona no ho midina.'
  - type: text
    content: ' (izay tsy misy kilema no haterinareo), '
  '2':
  - type: text
    content: 'Mandidia ny Zanak’Isiraely hoe: Ny fanatitra ho Ahy, dia ny haniko, izay fanatitra atao amin’ny afo ho hanitra ankasitrahana ho Ahy, dia aoka hotandremanareo ny hanaterana izany ho Ahy amin’ny fotoany avy.'
  '20':
  - type: text
    content: 'ary koba tsara toto voaharo diloilo ho fanatitra hohanina momba izany (telo ampahafolon’ny efaha no hiaraka haterinareo amin’ny isam-bantotr’ombilahy iray, ary roa ampahafolon’ny efaha amin’ny isan-ondrilahy iray, '
  '21':
  - type: text
    content: 'ary ampahafolon’ny efaha no hiaraka haterinao amin’ny isan-janak’ondry, dia ny zanak’ondry fito), '
  '22':
  - type: text
    content: 'ary osilahy iray ho fanatitra noho ny ota, hanaovana fanavotana ho anareo. '
  '23':
  - type: text
    content: 'Atero ireo ho fanampin’ny fanatitra dorana isa-maraina, izay atao fanatitra dorana mandrakariva. '
  '24':
  - type: text
    content: 'Araka izany no hanateranareo isan-andro amin’ny hafitoana, ho hanina ho an’i Jehovah, dia fanatitra atao amin’ny afo ho hanitra ankasitrahana ho Azy; ho fanampin’ny fanatitra dorana mandrakariva no hanaterana azy sy ny fanatitra aidina momba azy. '
  '25':
  - type: text
    content: Ary amin’ny andro fahafito dia hisy fivoriana masina ho anareo; aza manao tao-zavatra akory.
  '26':
  - type: text
    content: Ary amin’ny andro fanaterana ny voaloham-bokatra, raha manatitra fanatitra hohanina vaovao ho an’i Jehovah hianareo, rehefa afaka ireo herinandronareo,
  - type: note
    content: Izahao Eks. xxxiv.22.
  - type: text
    content: ' dia hisy fivoriana masina ho anareo; aza manao tao-zavatra akory; '
  '27':
  - type: text
    content: 'ary izao no atero ho fanatitra dorana ho hanitra ankasitrahana ho an’i Jehovah: vantotr’ombilahy roa sy ondrilahy iray sy zanak’ondry fito, izay iray taona'
  - type: note
    content: 'Na: hatramin’ny iray taona no ho midina.'
  - type: text
    content: ' avy, '
  '28':
  - type: text
    content: 'ary koba tsara toto voaharo diloilo ho fanatitra hohanina momba azy (telo ampahafolon’ny efaha amin’ny isam-bantotr’ombilahy iray, roa ampahafolon’ny efaha amin’ny isan-ondrilahy iray, '
  '29':
  - type: text
    content: 'ary ampahafolon’ny efaha amin’ny isan-janak’ondry iray, dia amin’ny zanak’ondry fito) '
  '3':
  - type: text
    content: 'Ary lazao aminy hoe : Izao no fanatitra atao amin’ny afo, izay haterinareo ho an’i Jehovah: zanak’ondry roa isan-andro izay iray taona'
  - type: note
    content: 'Na: hatramin’ny iray taona no ho midina.'
  - type: text
    content: ' sady tsy misy kilema, ho fanatitra dorana mandrakariva '
  '30':
  - type: text
    content: 'ary osilahy iray, hanaovana fanavotana ho anareo. '
  '31':
  - type: text
    content: 'Dia haterinareo '
  - type: text
    content: ireo
  - type: text
    content: ' sy ny fanatitra aidina momba azy ho fanampin’ny fanatitra dorana mandrakariva sy ny fanatitra hohanina momba azy; izay tsy misy kilema no haterinareo.'
  '4':
  - type: text
    content: '(ny zanak’ondry iray haterinao nony maraina, ary ny zanak’ondry iray koa haterinao nony hariva), '
  '5':
  - type: text
    content: 'ary koba tsara toto ampahafolon’ny efaha, voaharo diloilo voavely ampahefatry ny hina, ho fanatitra hohanina. '
  '6':
  - type: text
    content: 'Fanatitra dorana mandrakariva izany, izay voatendry tao an-tendrombohitra Sinay ho hanitra ankasitrahana, dia fanatitra atao amin’ny afo ho an’i Jehovah. '
  '7':
  - type: text
    content: 'Ary ny fanatitra aidina momba azy dia ampahefatry ny hina amin’ny isan-janak’ondry iray; ao amin’ny fitoerana masina no hanidinanao divay ho an’i Jehovah ho fanatitra aidina. '
  '8':
  - type: text
    content: Ary ny zanak’ondry iray koa haterinao nony hariva; ary fanatitra hohanina sy fanatitra aidina tahaka ny natao tamin’ny fanatitra maraina no hampombainao azy ho fanatitra atao amin’ny afo, ho hanitra ankasitrahana ho an’i Jehovah.
  '9':
  - type: text
    content: 'Ary amin’ny andro Sabata kosa dia izao no atero: zanak’ondry roa izay iray taona'
  - type: note
    content: 'Na: hatramin’ny iray taona no ho midina.'
  - type: text
    content: ' sady tsy misy kilema, ary koba tsara toto roa ampahafolon’ny efaha voaharo diloilo ho fanatitra hohanina ary ny fanatitra aidina momba azy. '
