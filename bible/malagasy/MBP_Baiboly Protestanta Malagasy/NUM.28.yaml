      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary koba tsara toto telo ampahafolon’ny efaha voaharo diloilo ho fanatitra hohanina amin’ny isam-bantotr’ombilahy iray, ary koba tsara toto roa ampahafolon’ny efaha voaharo diloilo, ho fanatitra hohanina amin’ny isan-ondrilahy iray, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary koba tsara toto ampahafolon’ny efaha voaharo diloilo, ho fanatitra hohanina amin’ny isan-janak’ondry iray; ho fanatitra dorana izany, dia hanitra ankasitrahana, fanatitra atao amin’ny afo ho an’i Jehovah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny fanatitra aidina momba izany dia divay antsasaky ny hina amin’ny isam-bantotr’ombilahy iray, ary ampahatelon’ny hina ho amin’ny isan-ondrilahy iray, ary ampahefatry ny hina ho amin’ny isan-janak’ondry iray. Izany no fanatitra dorana amin’ny isam-bolana, araka ny volana amin’ny taona. '
  '15':
  - type: usfm
