document_id: GAL.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nony afaka efatra ambin’ny folo taona, dia niakatra tany Jerosalema indray izaho sy Barnabasy, ary Titosy dia nentiko niaraka tamiko koa. '
  '10':
  - type: text
    content: 'Izao ihany '
  - type: text
    content: no tiany,
  - type: text
    content: ' dia ny mba hahatsiarovanay ny malahelo, sady nahazoto ahy indrindra rahateo ny hanao izany.'
  '11':
  - type: text
    content: 'Ary nony tonga tany Antiokia Kefasy, dia nanohitra azy nifanatrika aho, satria hita fa nanan-tsiny izy. '
  '12':
  - type: text
    content: 'Fa fony tsy mbola tonga ny sasany avy tany amin’i Jakoba, dia niara-nihinana tamin’ny jentilisa ihany izy; fa nony tonga ireo, dia nihatakataka izy ka niala, satria natahotra ny momba ny famorana izy. '
  '13':
  - type: text
    content: 'Ary ny Jiosy sasany koa niara-nihatsaravelatsihy taminy, ka Barnabasy avy aza mba voataonan’ny fihatsarambelatsihiny koa. '
  '14':
  - type: text
    content: 'Fa rehefa hitako fa tsy nandeha mahitsy araka ny fahamarinan’ny filazantsara ireo, dia hoy izaho tamin’i Kefasy teo anatrehan’ny olona rehetra: Raha hianao izay tena Jiosy aza no manao tahaka ny fanaon’ny jentilisa, fa tsy tahaka ny fanaon’ny Jiosy, nahoana ny jentilisa no terenao hanao tahaka ny fanaon’ny Jiosy? '
  '15':
  - type: text
    content: 'Taranaky ny Jiosy isika, fa tsy mba mpanota avy amin’ny jentilisa, '
  '16':
  - type: text
    content: 'nefa nony fantatsika fa tsy hamarinina amin’ny asan’ny lalàna ny olona, fa amin’ny finoana an’i Jesosy Kristy, dia nino an’i Kristy Jesosy koa isika mba hohamarinina amin’ny finoana an’i Kristy, fa tsy amin’ny asan’ny lalàna, satria tsy misy nofo hohamarinina amin’ny asan’ny lalàna. '
  '17':
  - type: text
    content: 'Fa raha mitady hohamarinina ao amin’i Kristy isika, nefa ny tenantsika no hita fa mpanota, moa mpanompo ny ota va Kristy? Sanatria izany! '
  '18':
  - type: text
    content: 'Fa raha ny zavatra efa noravako no atsangako indray, dia mampiseho ny tenako fa diso aho. '
  '19':
  - type: text
    content: 'Fa raha izaho, dia tamin’ny lalàna no nahafatesako ny amin’ny lalàna, mba ho velona ho an’Andriamanitra aho. '
  '2':
  - type: text
    content: 'Ary niakatra araka ny fanambarana aho, ka nambarako taminy ny filazantsara izay toriko any amin’ny jentilisa, nefa nangingina ihany tamin’izay manan-daza, fandrao ho mihazakazaka foana aho, na efa nihazakazaka foana. '
  '20':
  - type: text
    content: 'Voahombo miaraka amin’i Kristy amin’ny hazofijaliana aho, ary tsy izaho intsony no velona, fa Kristy no velona ato anatiko; fa izay ivelomako ankehitriny eo amin’ ny nofo dia ivelomako amin’ny finoana ny Zanak’Andriamanitra, Izay efa tia ahy ka nanolotra ny tenany hamonjy ahy. '
  '21':
  - type: text
    content: Tsy mahafoana ny fahasoavan’Andriamanitra aho; fa raha avy amin’ny lalàna ny fahamarinana, dia maty foana Kristy.
  '3':
  - type: text
    content: 'Kanefa na dia Titosy izay niaraka tamiko aza, dia tsy mba noterena hoforana, na dia Grika aza izy, '
  '4':
  - type: text
    content: 'dia noho ny rahalahy sandoka nampidirina misokosoko, izay niditra mangingina hisafo ny fahafahantsika, izay ananantsika ao amin’i Kristy Jesosy, mba hanandevozany antsika; '
  '5':
  - type: text
    content: 'fa tsy nety nikoy ireo izahay na dia ora iray monja aza, mba hitoeran’ny fahamarinan’ny filazantsara aminareo. '
  '6':
  - type: text
    content: 'Fa ny amin’ny olona atao ho manan-daza (na nanao ahoana na nanao ahoana izy dia tsy mampaninona ahy; Andriamanitra tsy mizaha tavan’olona), izaho tsy nomen’ireo manan-daza ireo saina na tamin’inona na tamin’inona. '
  '7':
  - type: text
    content: 'Fa hafa kosa '
  - type: text
    content: no nataony,
  - type: text
    content: ' fa nony hitany fa notolorana ny filazantsara ho adidiko ho an’ny tsy voafora aho, tahaka an’i Petera ho an’ny voafora ('
  '8':
  - type: text
    content: 'fa Izay niasa ho an’i Petera hah’Apostoly azy ho an’ny voafora no niasa ho ahy koa ho an’ny jentilisa), '
  '9':
  - type: text
    content: 'ary nony fantatr’i Jakoba sy Kefasy ary Jaona, izay natao ho andry, ny fahasoavana nomena ahy, dia notolorany ny tànana ankavanan’ny fihavanana izaho sy Barnabasy, mba hankany amin’ny jentilisa izahay, fa izy kosa ho any amin’ny voafora. '
