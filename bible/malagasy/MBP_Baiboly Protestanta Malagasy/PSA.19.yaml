document_id: PSA.19,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanehoana ny voninahitr’Andriamanitra, na amin’ny asan’ny tànany, na amin’ny lalàna nomeny.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: text
    content: NY lanitra mitory ny voninahitr’Andriamanitra;
  - type: text
    content: Ary ny habakabaka manambara ny asan’ny tànany.
  '10':
  - type: text
    content: Irina noho ny volamena ireny,
  - type: text
    content: Eny, noho ny tena volamena betsaka aza;
  - type: text
    content: Ary mamy noho ny tantely,
  - type: text
    content: Eny, noho ny tantely mitete avy amin’ny tohotra.
  '11':
  - type: text
    content: Ary ny mpanomponao dia hazavain’ireny;
  - type: text
    content: Amin’ny fitandremana azy misy valiny lehibe.
  '12':
  - type: text
    content: Raha ny fahatsontsana, dia iza re no mahalala izany?
  - type: text
    content: 'Ataovy tsy manan-tsiny aho ny amin’izay '
  - type: text
    content: ota
  - type: text
    content: ' tsy fantatra.'
  '13':
  - type: text
    content: 'Arovy ny mpanomponao tsy ho azon’ny '
  - type: text
    content: ota
  - type: text
    content: ' sahisahy;'
  - type: text
    content: Aoka tsy hanapaka ahy izany;
  - type: text
    content: Dia ho marina tokoa aho ka tsy hanan-tsiny ny amin’izay fahadisoana lehibe.
  '14':
  - type: text
    content: Aoka ny tenin’ny vavako sy ny fisainan’ny foko samy hankasitrahana eo imasonao, Jehovah ô,
  - type: text
    content: Vatolampiko sy Mpanavotra ahy.
  '2':
  - type: text
    content: Ny andro samy miteny amin’ny andro mandimby azy.
  - type: text
    content: Ary ny alina samy manolo-pahalalana amin’ny alina mandimby azy.
  '3':
  - type: text
    content: Tsy misy teny na fiteny anefa;
  - type: text
    content: Tsy re izay feony.
  - type: note
    content: 'Na: Izay tsy andrenesana ny feony; na: Izay tsy re ny feony.'
  '4':
  - type: text
    content: Efa nivoaka ho any amin’ny tany rehetra ny famolainany,
  - type: note
    content: 'Na: feony.'
  - type: text
    content: Ary ny teniny dia mihatra amin’ny faran’izao rehetra izao.
  - type: text
    content: Trano-lay ho an’ny masoandro no nataony teo aminy;
  '5':
  - type: text
    content: Ary ny masoandro dia tahaka ny mpampaka-bady mivoaka avy ao an-trano fandriany;
  - type: text
    content: Sady mifaly tahaka ny lehilahy matanjaka mihazakazaka amin’ny alehany izy.
  '6':
  - type: text
    content: Any amin’ny faravodilanitra ny fiposahany,
  - type: text
    content: Ary ny alehany dia hatramin’ny farany koa,
  - type: text
    content: Ka tsy misy takona amin’ny hafanany.
  '7':
  - type: text
    content: Tsy misy tsiny ny lalàn’i Jehovah, mamelombelona ny fanahy;
  - type: text
    content: Mahatoky ny teni-vavolombelon’i Jehovah, mahahendry ny kely saina.
  '8':
  - type: text
    content: Mahitsy ny fandidian’i Jehovah, mahafaly ny fo;
  - type: text
    content: Madio ny didin’i Jehovah, mampahazava ny maso.
  '9':
  - type: text
    content: Madio ny fahatahorana an’i Jehovah, maharitra mandrakizay;
  - type: text
    content: Marina ny fitsipik’i Jehovah, eny, mahitsy avokoa.
