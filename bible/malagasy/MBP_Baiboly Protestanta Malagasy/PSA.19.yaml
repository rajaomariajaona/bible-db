document_id: PSA.19
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fanehoana ny voninahitr’Andriamanitra, na amin’ny asan’ny tànany, na amin’ny lalàna nomeny.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: NY lanitra mitory ny voninahitr’Andriamanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny habakabaka manambara ny asan’ny tànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny andro samy miteny amin’ny andro mandimby azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny alina samy manolo-pahalalana amin’ny alina mandimby azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy misy teny na fiteny anefa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy re izay feony.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Izay tsy andrenesana ny feony; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izay tsy re ny feony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Efa nivoaka ho any amin’ny tany rehetra ny famolainany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: feony.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny teniny dia mihatra amin’ny faran’izao rehetra izao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trano-lay ho an’ny masoandro no nataony teo aminy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny masoandro dia tahaka ny mpampaka-bady mivoaka avy ao an-trano fandriany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mifaly tahaka ny lehilahy matanjaka mihazakazaka amin’ny alehany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Any amin’ny faravodilanitra ny fiposahany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny alehany dia hatramin’ny farany koa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy misy takona amin’ny hafanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy misy tsiny ny lalàn’i Jehovah, mamelombelona ny fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatoky ny teni-vavolombelon’i Jehovah, mahahendry ny kely saina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mahitsy ny fandidian’i Jehovah, mahafaly ny fo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Madio ny didin’i Jehovah, mampahazava ny maso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Madio ny fahatahorana an’i Jehovah, maharitra mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marina ny fitsipik’i Jehovah, eny, mahitsy avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Irina noho ny volamena ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, noho ny tena volamena betsaka aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamy noho ny tantely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, noho ny tantely mitete avy amin’ny tohotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny mpanomponao dia hazavain’ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny fitandremana azy misy valiny lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha ny fahatsontsana, dia iza re no mahalala izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ataovy tsy manan-tsiny aho ny amin’izay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ota
  - type: text
    text: ' tsy fantatra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Arovy ny mpanomponao tsy ho azon’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ota
  - type: text
    text: ' sahisahy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hanapaka ahy izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho marina tokoa aho ka tsy hanan-tsiny ny amin’izay fahadisoana lehibe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aoka ny tenin’ny vavako sy ny fisainan’ny foko samy hankasitrahana eo imasonao, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vatolampiko sy Mpanavotra ahy.
