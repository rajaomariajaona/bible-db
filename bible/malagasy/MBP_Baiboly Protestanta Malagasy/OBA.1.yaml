document_id: OBA.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahitan’i Obadia ny amin’ny handravana an’i Edoma mbamin’ny jentilisa sasany noho ny ratsy nataony tamin’ny Isiraely, ary ny hampiorenana ny fanjakan’i Jehovah any Ziona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY fahitan’i Obadia.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no lazain’i Jehovah Tompo ny amin’i Edoma:–Nahare filazana avy tamin’i Jehovah izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary nisy iraka nalefa ho any amin’ny jentilisa hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, aoka isika hitsangana hanafika azy!–
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Noho ny fampahoriana an’i Jakoba rahalahinao dia ho voasaron-kenatra hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho fongotra mandrakizay.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tamin’ilay andro namitsahanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nijanonanao.
      marker-yv: yv-n
    - type: text
      text: ' teny am-pita,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny andro namaboan’ny vahiny ny fananany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nidiran’ny hafa firenena teo amin’ny vavahadiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanaovany loka an’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mba toy ny anankiray tamin’ireny koa hianao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aza finaritra mijery ny andron’ny rahalahinao amin’ny andro ahitany loza izay tsy misy toa izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mifaly ny amin’ny taranak’i Joda amin’ny andro andringanana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza manao teny miavonavona amin’ny andro fahoriana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aza miditra amin’ny vavahadin’ny oloko amin’ny andro ahitany loza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza finaritra mijery ny fahantrany amin’ny andro ahitany loza hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza maninji-tànana haka ny fananany amin’ny andro ahitany loza.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aza mamitsaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mijanona.
      marker-yv: yv-n
    - type: text
      text: ' eo amin’ny sampanan-dàlana hamono izay afa-nandositra hianao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza manolotra izay sisa aminy amin’ny andro fahoriana.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa efa antomotra amin’ny jentilisa rehetra ny andron’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nataonao no mba hatao aminao kosa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hitsingerina ho eo an-dohanao ny nataonao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa toy ny nisotroanareo teo an-tendrombohitra masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany koa no hisotroan’ny firenena rehetra mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hisotro izy ka hitelina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho toy ny tsy ary izy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ao an-tendrombohitra Ziona dia hisy izay sisa afaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho masina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranak’i Jakoba hahalasa ny fananany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny taranak’i Jakoba ho afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranak’i Josefa ho lelafo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny taranak’i Esao kosa ho vodivary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary harehitr’ireny izy ka holevoniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy sisa afaka ny taranak’i Esao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no efa niteny.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny any amin’ny tany atsimo no hahalasa ny tendrombohitr’i Esao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny any amin’ny tany lemaka amoron-tsiraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sefela.
      marker-yv: yv-n
    - type: text
      text: ' no hahalasa ny Filistina;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahalasa ny tanin’ny Efraima sy ny tany Samaria izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Benjamina hahalasa an’i Gileada.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Indro, hataoko tsinontsinona eo amin’ny firenena hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho fanazimbazimba indrindra hianao.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny babo amin’izao Zanak’Isiraely maro be izao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hahalasa
    - type: text
      text: ' ny Kananita hatrany Zarefata,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny babo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'marobe izao, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izay any amin’ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny Kananita hatrany Zarefata, sy ny babo, etc.
      marker-yv: yv-n
    - type: text
      text: ' tany Jerosalema, izay any Sefarada, dia hahalasa ny tanàna any amin’ny tany atsimo.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary hisy mpamonjy miakatra ho ao an-tendrombohitra Ziona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsara ny tendrombohitr’i Esao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho an’i Jehovah ny fanjakana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny avonavon’ny fonao no namitaka anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry ilay monina ao an-tsefatsefaky ny harambato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any amin’ny fonenana avo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sady manao anakampo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hampivarina ahy ho eny an-tany?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Na dia miakatra tahaka ny voromahery aza hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mametraka ny akaninao eny amin’ny kintana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia havariko avy eny hianao, hoy Jehovah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha, tàhiny misy mpangalatra, na jiolahy alina, tonga ao aminao–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Indrisy, fongotra hianao!)–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy izay hahafa-po azy ihany va no hangalariny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny misy mpioty voaloboka tonga ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy hamela voaloboka sisa hotsimponina va izy?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Endrey ny fitady ny an’i Esao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endrey ny fikatsaka ny hareny miafina!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny olona rehetra izay vita fanekena taminao no nampandeha anao hatramin’ny sisin-tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsara fihavanana aminao no namitaka ka naharesy anao;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Izay mihinana
    - type: text
      text: ' ny haninao no namela-pandrika ao ambaninao–'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy fahalalana ao aminy;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Moa tsy amin’izany andro izany va, hoy Jehovah, no hamongorako ny olon-kendry ao Edoma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny manan-tsaina ao an-tendrombohitr’i Esao?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary ho raiki-tahotra ny lehilahy maherinao, ry Temana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba haringana amin’ny vonoana ho foana ny any an-tendrombohitr’i Esao.
