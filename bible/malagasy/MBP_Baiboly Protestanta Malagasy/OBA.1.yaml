document_id: OBA.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitan’i Obadia ny amin’ny handravana an’i Edoma mbamin’ny jentilisa sasany noho ny ratsy nataony tamin’ny Isiraely, ary ny hampiorenana ny fanjakan’i Jehovah any Ziona.
  - type: text
    content: NY fahitan’i Obadia.
  - type: text
    content: Izao no lazain’i Jehovah Tompo ny amin’i Edoma:–Nahare filazana avy tamin’i Jehovah izahay,
  - type: text
    content: 'Ary nisy iraka nalefa ho any amin’ny jentilisa hanao hoe:'
  - type: text
    content: Mitsangàna, aoka isika hitsangana hanafika azy!–
  '10':
  - type: text
    content: Noho ny fampahoriana an’i Jakoba rahalahinao dia ho voasaron-kenatra hianao
  - type: text
    content: Ka ho fongotra mandrakizay.
  '11':
  - type: text
    content: Tamin’ilay andro namitsahanao
  - type: note
    content: Heb. nijanonanao.
  - type: text
    content: ' teny am-pita,'
  - type: text
    content: Tamin’ny andro namaboan’ny vahiny ny fananany,
  - type: text
    content: Sy nidiran’ny hafa firenena teo amin’ny vavahadiny,
  - type: text
    content: Ary nanaovany loka an’i Jerosalema,
  - type: text
    content: Dia mba toy ny anankiray tamin’ireny koa hianao.
  '12':
  - type: text
    content: Aza finaritra mijery ny andron’ny rahalahinao amin’ny andro ahitany loza izay tsy misy toa izany;
  - type: text
    content: Ary aza mifaly ny amin’ny taranak’i Joda amin’ny andro andringanana azy;
  - type: text
    content: Ary aza manao teny miavonavona amin’ny andro fahoriana.
  '13':
  - type: text
    content: Aza miditra amin’ny vavahadin’ny oloko amin’ny andro ahitany loza;
  - type: text
    content: Aza finaritra mijery ny fahantrany amin’ny andro ahitany loza hianao,
  - type: text
    content: Ary aza maninji-tànana haka ny fananany amin’ny andro ahitany loza.
  '14':
  - type: text
    content: Aza mamitsaka
  - type: note
    content: Heb. mijanona.
  - type: text
    content: ' eo amin’ny sampanan-dàlana hamono izay afa-nandositra hianao;'
  - type: text
    content: Ary aza manolotra izay sisa aminy amin’ny andro fahoriana.
  '15':
  - type: text
    content: Fa efa antomotra amin’ny jentilisa rehetra ny andron’i Jehovah;
  - type: text
    content: Toy ny nataonao no mba hatao aminao kosa;
  - type: text
    content: Eny, hitsingerina ho eo an-dohanao ny nataonao.
  '16':
  - type: text
    content: Fa toy ny nisotroanareo teo an-tendrombohitra masina,
  - type: text
    content: Dia toy izany koa no hisotroan’ny firenena rehetra mandrakariva,
  - type: text
    content: Eny, hisotro izy ka hitelina,
  - type: text
    content: Ary ho toy ny tsy ary izy.
  '17':
  - type: text
    content: Fa ao an-tendrombohitra Ziona dia hisy izay sisa afaka,
  - type: text
    content: Ary ho masina izy;
  - type: text
    content: Ary ny taranak’i Jakoba hahalasa ny fananany.
  '18':
  - type: text
    content: Ny taranak’i Jakoba ho afo,
  - type: text
    content: Ary ny taranak’i Josefa ho lelafo,
  - type: text
    content: Fa ny taranak’i Esao kosa ho vodivary,
  - type: text
    content: Ary harehitr’ireny izy ka holevoniny;
  - type: text
    content: Ary tsy hisy sisa afaka ny taranak’i Esao,
  - type: text
    content: Fa Jehovah no efa niteny.
  '19':
  - type: text
    content: Ny any amin’ny tany atsimo no hahalasa ny tendrombohitr’i Esao;
  - type: text
    content: Ary ny any amin’ny tany lemaka amoron-tsiraka
  - type: note
    content: Heb. Sefela.
  - type: text
    content: ' no hahalasa ny Filistina;'
  - type: text
    content: Hahalasa ny tanin’ny Efraima sy ny tany Samaria izy;
  - type: text
    content: Ary Benjamina hahalasa an’i Gileada.
  '2':
  - type: text
    content: Indro, hataoko tsinontsinona eo amin’ny firenena hianao,
  - type: text
    content: Eny, ho fanazimbazimba indrindra hianao.
  '20':
  - type: text
    content: 'Ary ny babo amin’izao Zanak’Isiraely maro be izao '
  - type: text
    content: hahalasa
  - type: text
    content: ' ny Kananita hatrany Zarefata,'
  - type: text
    content: Ary ny babo
  - type: note
    content: 'Na: marobe izao, izay any amin’ ny Kananita hatrany Zarefata, sy ny babo, etc.'
  - type: text
    content: ' tany Jerosalema, izay any Sefarada, dia hahalasa ny tanàna any amin’ny tany atsimo.'
  '21':
  - type: text
    content: Ary hisy mpamonjy miakatra ho ao an-tendrombohitra Ziona
  - type: text
    content: Hitsara ny tendrombohitr’i Esao;
  - type: text
    content: Ary ho an’i Jehovah ny fanjakana.
  '3':
  - type: text
    content: Ny avonavon’ny fonao no namitaka anao,
  - type: text
    content: Ry ilay monina ao an-tsefatsefaky ny harambato,
  - type: text
    content: Any amin’ny fonenana avo,
  - type: text
    content: 'Sady manao anakampo hoe:'
  - type: text
    content: Iza no hampivarina ahy ho eny an-tany?
  '4':
  - type: text
    content: Na dia miakatra tahaka ny voromahery aza hianao
  - type: text
    content: Ka mametraka ny akaninao eny amin’ny kintana,
  - type: text
    content: Dia havariko avy eny hianao, hoy Jehovah.
  '5':
  - type: text
    content: Raha, tàhiny misy mpangalatra, na jiolahy alina, tonga ao aminao–
  - type: text
    content: (Indrisy, fongotra hianao!)–
  - type: text
    content: Moa tsy izay hahafa-po azy ihany va no hangalariny?
  - type: text
    content: Raha tàhiny misy mpioty voaloboka tonga ao aminao,
  - type: text
    content: Moa tsy hamela voaloboka sisa hotsimponina va izy?
  '6':
  - type: text
    content: Endrey ny fitady ny an’i Esao!
  - type: text
    content: Endrey ny fikatsaka ny hareny miafina!
  '7':
  - type: text
    content: Ny olona rehetra izay vita fanekena taminao no nampandeha anao hatramin’ny sisin-tany;
  - type: text
    content: Izay tsara fihavanana aminao no namitaka ka naharesy anao;
  - type: text
    content: Izay mihinana
  - type: text
    content: ' ny haninao no namela-pandrika ao ambaninao–'
  - type: text
    content: Tsy misy fahalalana ao aminy;
  '8':
  - type: text
    content: Moa tsy amin’izany andro izany va, hoy Jehovah, no hamongorako ny olon-kendry ao Edoma,
  - type: text
    content: Sy ny manan-tsaina ao an-tendrombohitr’i Esao?
  '9':
  - type: text
    content: Ary ho raiki-tahotra ny lehilahy maherinao, ry Temana,
  - type: text
    content: Mba haringana amin’ny vonoana ho foana ny any an-tendrombohitr’i Esao.
