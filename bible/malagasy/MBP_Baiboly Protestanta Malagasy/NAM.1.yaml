document_id: NAM.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny handravana an’i Ninive noho ny fandozany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FAMINANIANA ny amin’ny loza hanjo an’i Ninive, dia ny bokin’ny fahitan’i Nahoma Elkosita.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia miforiporitra toy ny tsilo aza ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady vonton’ny divay mahery fibobohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho levona tokoa toy ny vodivary maina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia ho levona toy ny vodivary karankaina.
      marker-yv: yv-n
    - type: text
      text: ' izy.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy tao aminao no nivoahan’ny anankiray izay misain-dratsy ho enti-manohitra an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mamoron-kevi-dratsy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia tsy latsaka isa ka mbola maro aza ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hofongorana ihany izy ka ho levona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nampahory anao Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hampahory anao intsony.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ankehitriny hotapahiko ny ziogany ho afaka aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hotosako ny famatorana anao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary Jehovah efa nandidy ny aminao hoe :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho velo-maso intsony ny anaranao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko tapaka tsy ho ao an-tranon’ny andriamanitrao ny sarin-javatra voasokitra sy ny sarin-javatra an-idina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanao ny fasana ho anjaranao Aho, satria hita fa latsa-danja hianao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra saro-piaro sy mamaly heloka Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah dia Mpamaly heloka sady be fahatezerana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah dia Mpamaly ny rafilahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitahiry fahatezerana hamelezany ny fahavalony.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahari-po Jehovah sady be hery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mety manamarina ny meloka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny tadio sy ny tafio-drivotra no làlan’i Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rahona no vovoky ny tongony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miteny mafy ny ranomasina izy ka mahatankina azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandritra ny ony rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malazo Basana sy Karmela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary malazo koa ny vonin’i Libanona.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihorohoro eo anatrehany ny tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady miempo ny havoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mientanentana eo anatrehany ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny tany onenana sy ny mponina rehetra ao aminy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no mahatoetra eo anoloan’ny fahavinirany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no mahatanty ny firehitry ny fahatezerany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aidina toy ny afo ny fahatezerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mirodana eo anoloany ny vatolampy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsara Jehovah, fiarovana mafy amin’ny andro fahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mahalala izay mialoka aminy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’ny riaka manafotra no anafoanany ny fitoerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahavalony dia henjehiny ho any amin’ny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'henjehin’ny; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: henjehiny amin’ny.
      marker-yv: yv-n
    - type: text
      text: ' maizina.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no heverinareo ho enti-manohitra an’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ahoana no hevitrareo ny amin’i.
      marker-yv: yv-n
    - type: text
      text: ' i Jehovah?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahafonganana no hataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hiverina fanindroany ny fahoriana.
