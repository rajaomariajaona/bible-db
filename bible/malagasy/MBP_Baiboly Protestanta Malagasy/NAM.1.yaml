document_id: NAM.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana an’i Ninive noho ny fandozany.
  - type: text
    content: FAMINANIANA ny amin’ny loza hanjo an’i Ninive, dia ny bokin’ny fahitan’i Nahoma Elkosita.
  '10':
  - type: text
    content: Fa na dia miforiporitra toy ny tsilo aza ireny
  - type: text
    content: Sady vonton’ny divay mahery fibobohany,
  - type: text
    content: Dia ho levona tokoa toy ny vodivary maina
  - type: note
    content: 'Na: Dia ho levona toy ny vodivary karankaina.'
  - type: text
    content: ' izy.'
  '11':
  - type: text
    content: Avy tao aminao no nivoahan’ny anankiray izay misain-dratsy ho enti-manohitra an’i Jehovah
  - type: text
    content: Sady mamoron-kevi-dratsy.
  '12':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Na dia tsy latsaka isa ka mbola maro aza ireny,
  - type: text
    content: Dia hofongorana ihany izy ka ho levona
  - type: text
    content: Fa efa nampahory anao Aho,
  - type: text
    content: Ka tsy hampahory anao intsony.
  '13':
  - type: text
    content: Fa ankehitriny hotapahiko ny ziogany ho afaka aminao,
  - type: text
    content: Ary hotosako ny famatorana anao.
  '14':
  - type: text
    content: 'Ary Jehovah efa nandidy ny aminao hoe :'
  - type: text
    content: Tsy ho velo-maso intsony ny anaranao;
  - type: text
    content: Hataoko tapaka tsy ho ao an-tranon’ny andriamanitrao ny sarin-javatra voasokitra sy ny sarin-javatra an-idina;
  - type: text
    content: Hanao ny fasana ho anjaranao Aho, satria hita fa latsa-danja hianao.
  '2':
  - type: text
    content: Andriamanitra saro-piaro sy mamaly heloka Jehovah;
  - type: text
    content: Jehovah dia Mpamaly heloka sady be fahatezerana;
  - type: text
    content: Jehovah dia Mpamaly ny rafilahiny
  - type: text
    content: Ary mitahiry fahatezerana hamelezany ny fahavalony.
  '3':
  - type: text
    content: Mahari-po Jehovah sady be hery
  - type: text
    content: Ary tsy mety manamarina ny meloka;
  - type: text
    content: Amin’ny tadio sy ny tafio-drivotra no làlan’i Jehovah.
  - type: text
    content: Ary rahona no vovoky ny tongony.
  '4':
  - type: text
    content: Miteny mafy ny ranomasina izy ka mahatankina azy
  - type: text
    content: Ary mandritra ny ony rehetra;
  - type: text
    content: Malazo Basana sy Karmela,
  - type: text
    content: Ary malazo koa ny vonin’i Libanona.
  '5':
  - type: text
    content: Mihorohoro eo anatrehany ny tendrombohitra,
  - type: text
    content: Sady miempo ny havoana,
  - type: text
    content: Ary mientanentana eo anatrehany ny tany,
  - type: text
    content: Dia ny tany onenana sy ny mponina rehetra ao aminy.
  '6':
  - type: text
    content: Iza no mahatoetra eo anoloan’ny fahavinirany?
  - type: text
    content: Ary iza no mahatanty ny firehitry ny fahatezerany?
  - type: text
    content: Aidina toy ny afo ny fahatezerany,
  - type: text
    content: Ary mirodana eo anoloany ny vatolampy.
  '7':
  - type: text
    content: Tsara Jehovah, fiarovana mafy amin’ny andro fahoriana,
  - type: text
    content: Ka mahalala izay mialoka aminy.
  '8':
  - type: text
    content: Fa amin’ny riaka manafotra no anafoanany ny fitoerany,
  - type: text
    content: Ary ny fahavalony dia henjehiny ho any amin’ny
  - type: note
    content: 'Na: henjehin’ny; na: henjehiny amin’ny.'
  - type: text
    content: ' maizina.'
  '9':
  - type: text
    content: Inona no heverinareo ho enti-manohitra an’
  - type: note
    content: 'Na: Ahoana no hevitrareo ny amin’i.'
  - type: text
    content: ' i Jehovah?'
  - type: text
    content: Fahafonganana no hataony,
  - type: text
    content: Tsy hiverina fanindroany ny fahoriana.
