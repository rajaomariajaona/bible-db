document_id: LUK.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nataon’i Jaona Mpanao-batisa, ary ny nampamatoran’i Heroda azy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 3.1-12; 14.3-5; Mar. 1.1-8; 6.17-20.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tamin’ny taona fahadimy ambin’ny folo nanjakan’i Tiberio Kaisara, fony Pontio Pilato no governora tany Jodia, ary Heroda no mpanapaka tany Galilia, ary Filipo rahalahiny no mpanapaka ny tany Itoria sy Trakonitisy, ary Lysania no mpanapaka tany Abilena, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny vahoaka nanontany an’i Jaona hoe: Inona ary no hataonay? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary namaly izy ka nanao taminy hoe: Izay manana akanjo roa dia aoka hanome ho an’ny tsy manana; ary izay manan-kanina, dia aoka hanao toy izany koa izy.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia avy koa ny mpamory hetra sasany mba hataony batisa ka nanao taminy hoe: Mpampianatra ô, inona no hataonay? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy izy taminy: Aza mampandoa mihoatra noho izay notendrena halainareo.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nisy miaramila koa nanontany azy ka nanao hoe: Ary inona kosa no mba hataonay? Dia hoy izy taminy: Aza mitohatoha foana amin’olona, ary aza miampanga lainga, ary mianìna amin’ny karamanareo.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa raha mbola niandry ny olona, ka samy nisaina an’i Jaona tam-pony, na izy no Kristy, na tsia, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia namaly Jaona ka nanao tamin’izy rehetra hoe: Izaho manao batisa anareo amin’ny rano, fa avy Izay mahery noho izaho, ka tsy mendrika hamaha ny fehin-kapany aza aho; Izy no hanao batisa anareo amin’ny Fanahy Masina sy ny afo; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'eny an-tànany ny fikororohany hanadiovany tsara ny ao am-pamoloany ka hanangonany ny vary ho any amin’ny sompiny; fa ny akofa sy ny mololo hodorany amin’ny afo tsy azo vonoina. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary fananarana maro hafa koa no notoriny tamin’ny olona.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa Heroda mpanapaka, nony nanarin’i Jaona noho ny amin’i Herodiasy, vadin-drahalahiny, sy noho ny ratsy rehetra izay nataony, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ary Anasy sy Kaiafa no mpisoronabe,–dia tonga tamin’i Jaona, zanak’i Zakaria, tany an’efitra ny tenin’Andriamanitra.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: dia nanidy an’i Jaona tao an-tranomaizina ho fanampin’izany rehetra izany koa.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanaovan’i Jaona batisa an’i Jesosy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 3.13-17; Mar. 1.9-11.
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ARY rehefa natao batisa ny vahoaka rehetra, ary Jesosy koa efa natao batisa sy nivavaka, dia nisokatra ny lanitra; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ary ny Fanahy Masina nidina teo amboniny, ka ny endriny dia tahaka ny voromailala; ary nisy feo avy tany an-danitra nanao hoe: Hianao no Zanako malalako; Hianao no sitrako.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny filazana ny razan’i Jesosy Kristy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 1.1-17.
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ARY tokony ho efa telo-polo taona Jesosy, raha vao nanomboka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny raharahany,
    - type: text
      text: ' ka natao ho zanak’i Josefa, izay zanak’i Hely, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'zanak’i Matata, zanak’i Levy, zanak’i Melky, zanak’i Janay, zanak’i Josefa, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'zanak’i Matitia, zanak’i Amosa, zanak’i Nahoma, zanak’i Esly, zanak’i Nagay, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'zanak’i Mata, zanak’i Matatia, zanak’i Semey, zanak’i Joseka, zanak’i Joda, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: zanak’i Joanana, zanak’i Resa, zanak’i Zerobabela, zanak’i Sealtiela,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Salatiela.
      marker-yv: yv-n
    - type: text
      text: ' zanak’i Nery, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'zanak’i Melky, zanak’i Ady, zanak’i Kosama, zanak’i Elmadama, zanak’i Era, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'zanak’i Jesosy, zanak’i Eliezera, zanak’i Joreima, zanak’i Matata, zanak’i Levy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nankany amin’ny tany rehetra any amoron’i Jordana izy nitory ny batisan’ny fibebahana ho famelan-keloka; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'zanak’i Simeona, zanak’i Joda, zanak’i Josefa, zanak’i Jonama, zanak’i Eliakima, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'zanak’i Melea, zanak’i Mena, zanak’i Matata, zanak’i Natana, zanak’i Davida, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'zanak’i Jese, zanak’i Obeda, zanak’i Boaza, zanak’i Salmona, zanak’i Nahasona, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: zanak’i Aminadaba, zanak’i Arny,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Arama].'
      marker-yv: yv-n
    - type: text
      text: ' zanak’i Hezrona, zanak’i Fareza, zanak’i Joda, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'zanak’i Jakoba, zanak’Isaka, zanak’i Abrahama, zanak’i Tera, zanak’i Nahora, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'zanak’i Seroga, zanak’i Reo, zanak’i Palega, zanak’i Ebera, zanak’i Sela, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'zanak’i Kenana, zanak’i Arpaksada, zanak’i Sema, zanak’i Noa, zanak’i Lameka, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'zanak’i Metosela, zanak’i Enoka, zanak’i Jareda, zanak’i Mahalalila, zanak’i Kenana, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: zanak’i Enosa, zanak’i Seta zanak’i Adama, zanak’Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'araka ny voasoratra ao amin’ny bokin’ny tenin’Isaia mpaminany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ',,Injany! misy feon’ny miantso mafy any an-efitra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboary ny làlan’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy mahitsy ny làlan-kalehany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny lohasaha rehetra hototofana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tendrombohitra sy ny havoana rehetra haetry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny meloka hahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny làlana mikitoantoana hohamarinina;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary ny nofo rehetra hahita ny famonjen’Andriamanitra’ (Isa. 40.3–5).
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy izy tamin’ny vahoaka izay nankeo aminy mba hataony batisa: Ry taranaky ny menarana, iza no nanoro hevitra anareo handositra ny fahatezerana ho avy? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa mamoaza voa mendrika ny fibebahana; ary aza manao anakampo hoe: Manana an’i Abrahama ho rainay izahay; fa lazaiko aminareo fa Andriamanitra mahay manangana zanaka ho an’i Abrahama avy amin’ireto vato ireto. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary, indro, efa mipetraka ao amin’ny fototry ny hazo sahady ny famaky; koa ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo.
