document_id: GEN.13
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nisarahan’i Abrama sy Lota, ary ny teny fikasana nataon’Andriamanitra tamin’i Abrama.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Abrama dia niakatra niala tany Egypta, dia izy sy ny vadiny mbamin’ny fananany rehetra, ary Lota koa niaraka taminy, ho any amin’ny tany atsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Abrama nanana harena be, dia omby aman-ondry sy volafotsy ary volamena. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary mbola nandeha ihany izy ka nifindrafindra hatrany amin’ny tany atsimo ka hatrany Betela, izay niorenan’ny lainy tamin’ny voalohany, teo anelanelan’i Betela sy Ay, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: dia teo amin’ny tany izay nisy ilay alitara nataony tamin’ny voalohany; ary dia niantso ny anaran’i Jehovah teo Abrama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Lota koa, izay niara-nandeha tamin’i Abrama, dia mba nanana ondry sy omby sy lay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary tsy omby azy roa lahy ny tany hiraisany monina; fa efa be ny fananay, ka tsy nahazo niray monina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niady ny mpiandry ombin’i Abrama sy ny mpiandry ombin’i Lota; ary ny Kananita sy ny Perizita no tompon-tany tao Kanana fahizay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Abrama tamin’i Lota: Aoka re mba tsy hisy ady amintsika roa lahy, na amin’ny mpiandry ombiko sy ny mpiandry ombinao, fa mpirahalahy isika. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moa tsy eo anoloanao va ny tany rehetra? Masìna hianao, aoka hisaraka amiko hianao; raha hianavaratra hianao, dia hianatsimo aho; fa raha hianatsimo hianao, dia hianavaratra kosa aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Lota nanopy ny masony ka nitazana ny tany rehetra teny amoron’i Jordana hatrany akaikin’i Zoara, fa azon-drano avokoa izy rehetra (talohan’ny nandravan’i Jehovah an’i Sodoma sy Gomora izany), tahaka ny sahan’i Jehovah sy tahaka ny tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nofidin’i Lota ho azy ny tany rehetra amoron’i Jordana, ka nifindra niantsinanana izy; ka dia nisaraka izy roa lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Abrama nonina tao amin’ny tany Kanana, fa Lota kosa nonina tao an-tanàna amin’ny tany amoron’i Jordana ka nifindrafindra toby hatrany Sodoma. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny mponina tao Sodoma dia tena ratsy fanahy sady mpanota indrindra tamin’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Abrama taorian’ny nisarahan’i Lota taminy ka nanao hoe: Atopazy ny masonao, ka hatramin’ity tany itoeranao ity dia mitazàna mianavaratra sy mianatsimo ary miantsinanana sy miankandrefana; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa ny tany rehetra izay tazanao dia homeko anao sy ny taranakao mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hataoko maro tahaka ny vovo-tany ny taranakao; koa raha misy olona mahisa ny vovo-tany, dia ho azo isaina koa ny taranakao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Miaingà hianao, mandehana mitety ny tany, dia any amin’ny lavany sy any amin’ny sakany; fa homeko anao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Abrama nifindrafindra toby, dia nandeha ka nonina teo an-kazo terebintan’i Mamre, izay any Hebrona, ary nanorina alitara teo ho an’i Jehovah izy.
