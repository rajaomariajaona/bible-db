document_id: GEN.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nisarahan’i Abrama sy Lota, ary ny teny fikasana nataon’Andriamanitra tamin’i Abrama.
  - type: text
    content: 'ARY Abrama dia niakatra niala tany Egypta, dia izy sy ny vadiny mbamin’ny fananany rehetra, ary Lota koa niaraka taminy, ho any amin’ny tany atsimo. '
  '10':
  - type: text
    content: 'Ary Lota nanopy ny masony ka nitazana ny tany rehetra teny amoron’i Jordana hatrany akaikin’i Zoara, fa azon-drano avokoa izy rehetra (talohan’ny nandravan’i Jehovah an’i Sodoma sy Gomora izany), tahaka ny sahan’i Jehovah sy tahaka ny tany Egypta. '
  '11':
  - type: text
    content: 'Dia nofidin’i Lota ho azy ny tany rehetra amoron’i Jordana, ka nifindra niantsinanana izy; ka dia nisaraka izy roa lahy. '
  '12':
  - type: text
    content: 'Ary Abrama nonina tao amin’ny tany Kanana, fa Lota kosa nonina tao an-tanàna amin’ny tany amoron’i Jordana ka nifindrafindra toby hatrany Sodoma. '
  '13':
  - type: text
    content: Ary ny mponina tao Sodoma dia tena ratsy fanahy sady mpanota indrindra tamin’i Jehovah.
  '14':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Abrama taorian’ny nisarahan’i Lota taminy ka nanao hoe: Atopazy ny masonao, ka hatramin’ity tany itoeranao ity dia mitazàna mianavaratra sy mianatsimo ary miantsinanana sy miankandrefana; '
  '15':
  - type: text
    content: 'fa ny tany rehetra izay tazanao dia homeko anao sy ny taranakao mandrakizay. '
  '16':
  - type: text
    content: 'Ary hataoko maro tahaka ny vovo-tany ny taranakao; koa raha misy olona mahisa ny vovo-tany, dia ho azo isaina koa ny taranakao. '
  '17':
  - type: text
    content: Miaingà hianao, mandehana mitety ny tany, dia any amin’ny lavany sy any amin’ny sakany; fa homeko anao izy.
  '18':
  - type: text
    content: Ary Abrama nifindrafindra toby, dia nandeha ka nonina teo an-kazo terebintan’i Mamre, izay any Hebrona, ary nanorina alitara teo ho an’i Jehovah izy.
  '2':
  - type: text
    content: 'Ary Abrama nanana harena be, dia omby aman-ondry sy volafotsy ary volamena. '
  '3':
  - type: text
    content: 'Ary mbola nandeha ihany izy ka nifindrafindra hatrany amin’ny tany atsimo ka hatrany Betela, izay niorenan’ny lainy tamin’ny voalohany, teo anelanelan’i Betela sy Ay, '
  '4':
  - type: text
    content: dia teo amin’ny tany izay nisy ilay alitara nataony tamin’ny voalohany; ary dia niantso ny anaran’i Jehovah teo Abrama.
  '5':
  - type: text
    content: 'Ary Lota koa, izay niara-nandeha tamin’i Abrama, dia mba nanana ondry sy omby sy lay. '
  '6':
  - type: text
    content: Ary tsy omby azy roa lahy ny tany hiraisany monina; fa efa be ny fananay, ka tsy nahazo niray monina izy.
  '7':
  - type: text
    content: 'Dia niady ny mpiandry ombin’i Abrama sy ny mpiandry ombin’i Lota; ary ny Kananita sy ny Perizita no tompon-tany tao Kanana fahizay. '
  '8':
  - type: text
    content: 'Ary hoy Abrama tamin’i Lota: Aoka re mba tsy hisy ady amintsika roa lahy, na amin’ny mpiandry ombiko sy ny mpiandry ombinao, fa mpirahalahy isika. '
  '9':
  - type: text
    content: Moa tsy eo anoloanao va ny tany rehetra? Masìna hianao, aoka hisaraka amiko hianao; raha hianavaratra hianao, dia hianatsimo aho; fa raha hianatsimo hianao, dia hianavaratra kosa aho.
