document_id: MRK.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitsaran’i Pilato an’i Jesosy, sy ny nanolorany Azy hohomboana tamin’ny hazo fijaliana.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 27.1-26; Lio. 23.1-25; Jao. 18.28-40.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY niaraka tamin’izay raha vao maraina ny andro, ny lohan’ny mpisorona sy ny loholona sy ny mpanora-dalàna mbamin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: dia.'
      marker-yv: yv-n
    - type: text
      text: ' ny Synedriona rehetra dia niara-nisaina ary namatotra an’i Jesosy ka nitondra Azy, dia nanolotra Azy teo amin’i Pilato. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fantany fa fialonana no nanoloran’ny lohan’ny mpisorona Azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny lohan’ny mpisorona nanome fo ny vahoaka, fa aleo Barabasy no halefan’i Pilato ho azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Pilato namaly ka nanao taminy indray hoe: Ka inona ary no hataoko amin’ilay ataonareo hoe: Mpanjakan’ny Jiosy? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka niantso indray hoe: Homboy amin’ny hazofijaliana Izy! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Pilato taminy: Fa inona moa no ratsy nataony? Nefa vao mainka niantsoantso izy ka nanao hoe: Homboy amin’ny hazofijaliana Izy! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Pilato ta-hahazo sitraka tamin’ny vahoaka, ka dia nandefa an’i Barabasy ho azy; fa Jesosy nasainy nokapohina,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao Mat. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxvii.36.
      marker-yv: yv-n
    - type: text
      text: ' dia natolony azy mba hohomboana amin’ny hazofijaliana.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanomboana an’i Jesosy tamin’ny hazo fijaliana.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 27.27-56; Lio. 23.26-49; Jao. 19.1-37.
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY ny miaramila nitondra an’i Jesosy ho eo an-kianja, dia ao anati-rova,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pretoria.
      marker-yv: yv-n
    - type: text
      text: ' sady nanangona ny miaramila namany rehetra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nampitafy Azy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lamba
    - type: text
      text: ' volomparasy izy, sady nandrandrana satroka tsilo, ka nasatrony ny lohany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia niarahaba Azy hoe izy: Arahaba, ry Mpanjakan’ny Jiosy! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nikapoka ny lohany tamin’ny volotara izy sady nandrora Azy, dia nandohalika sy niankohoka teo anatrehany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Pilato nanontany Azy hoe: Hianao va no Mpanjakan’ny Jiosy? Ary Izy namaly ka nanao taminy hoe: Voalazanao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nanao Azy ho fihomehezana izy, dia nanala ilay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lamba
    - type: text
      text: ' volomparasy teny aminy, ka nampitafiny Azy indray ny fitafiany; ary dia nentiny hohomboany amin’ny hazofijaliana Izy.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Simona Kyreniana (rain’i Aleksandro sy Rofosy), izay nandalo avy tany an-tsaha, no notereny hitondra ny hazofijalian’i Jesosy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy dia nentiny teo amin’ny tany Golgota, izany hoe, raha adika, Fitoeran-karan-doha. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia notolorany divay miharo miora Izy; nefa tsy nety nisotro Izy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa voahombony tamin’ny hazo fijaliana Izy, dia nanaovany loka ny fizara ny fitafiany, hahitany izay ho azony avy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tamin’ny ora fahatelo no nanomboany Azy tamin’ny hazofijaliana.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny soratra milaza ny nanamelohana Azy dia voasoratra teo amboniny hoe: '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: mpanjakan’ny jiosy
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy jiolahy roa nohomboany tamin’ny hazofijaliana koa, ny anankiray teo amin’ny ankavanany, ary ny anankiray teo amin’ny ankaviany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[28 Dia tanteraka ny Soratra '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Masina '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'izay manao hoe: ,,Ary natao ho isan’ny mpanota Izy’’ (Isa. Liii.12).]'
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay nandalo dia niteny ratsy Azy sady nihifikifi-doha ka nanao hoe: Hià! ry Ilay maharava ny tempoly sy mahatsangana azy amin’ny hateloana, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lohan’ny mpisorona niampanga Azy zavatra maro. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vonjeo ny tenanao, ka midìna hiala amin’ny hazo fijaliana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy izany koa no faneson’ny lohan’ny mpisorona, fa niresaka izy sy ny mpanora-dalàna nanao hoe: Namonjy ny sasany Izy, fa ny tenany tsy hainy vonjena. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka Kristy, Mpanjakan’ny Isiraely, hidina hiala amin’ny hazo fijaliana ankehitriny mba ho hitantsika ka hinoantsika. Ary ireo niaraka nohomboana taminy tamin’ny hazofijaliana dia naneso Azy, koa.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tamin’ny ora fahenina, dia tonga maizina ny tany rehetra, ka naharitra hatramin’ny ora fahasivy izany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny ora fahasivy Jesosy dia niantso tamin’ny feo mahery ka nanao hoe: Eloy, Eloy, lamà sabaktany! izany hoe, raha adika: ,,Andriamanitro ô, Andriamanitro ô, nahoana no dia mahafoy Ahy Hianao’’ (Sal. 22.2).'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sasany izay nijanona teo, raha nandre izany, dia nanao hoe: Indro, miantso an’i Elia Izy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anankiray nihazakazaka, dia nanatsoboka sipaonjy tamin’ny vinaingitra, ka notohiziny tamin’ny volotara, dia natohony hotsentsefin’i Jesosy, fa hoy izy: Aoka hoe hizahantsika na ho avy hampidina Azy Elia, na tsia.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jesosy niantso tamin’ny feo mahery, dia afaka ny ainy.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny efitra lamba tao amin’ny tempoly dia triatra nizara roa hatrany ambony ka hatrany ambany.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny kapiteny izay nijanona tandrifiny, raha nahita fa afaka toy izany ny ainy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[nahita Azy niantso toy izany, sady afaka ny ainy].'
      marker-yv: yv-n
    - type: text
      text: ' dia nanao hoe: Marina tokoa fa Zanak’Andriamanitra io Lehilahy io.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Pilato dia nanontany Azy indray hoe: Tsy mety mamaly akory va Hianao? He! izao hamaroan’ny zavatra iampangany Anao izao! '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy vehivavy koa nitsinjo teny lavidavitra eny, ary isan’ireny Maria Magdalena sy Salome ary Maria, renin’i Jakoba kely sy Josesy, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay nanaraka Azy ka nanompo Azy, fony Izy tany Galilia, mbamin’ny vehivavy maro koa izay niaraka taminy niakatra tany Jerosalema.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandevenana an’i Jesosy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 27.57-66; Lio. 23.50-56; Jao. 19.38-42.
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nony hariva (satria andro fiomanana ny andro, dia ny andro alohan’ny Sabata), '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia avy Josefa avy any Arimatia, lehilahy manan-kaja, izay isan’ny Synedriona sady niandry ny fanjakan’Andriamanitra koa; ary sahy niditra tao amin’i Pilato izy ka nangataka ny fatin’i Jesosy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary gaga Pilato raha maty sahady Jesosy, ka dia niantso ny kapiteny hankao aminy izy ka nanontaniany azy na efa maty ela Izy, na tsia. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nahare tamin’ny kapiteny izy, dia nomeny an’i Josefa ny faty. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy nividy hariry madinika, dia nampidininy ny fatin’i Jesosy ka nofonosiny hariry madinika, ary naleviny tao amin’ny fasana, izay nolavahana tamin’ny vatolampy, dia nanakodia vato ho eo amin’ny varavaran’ny fasana izy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Maria Magdalena sy Maria, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: renin’i
    - type: text
      text: ' Josesy, dia nijery izay nametrahany Azy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Jesosy tsy namaly intsony, na dia indraim-bava akory aza, ka dia gaga Pilato.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary isaky ny avy ny andro firavoravoana dia fanaony ny mandefa mpifatotra iray izay angatahin’ny vahoaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anankiray, ilay atao hoe Barabasy, nifatotra tao mbamin’ny mpikomy sasany, izay efa nahafaty olona tamin’ny fikomiana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka niakatra ka nangataka azy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hanao
    - type: text
      text: ' araka izay fanaony aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Pilato namaly azy ka nanao hoe: Tianareo va raha ny Mpanjakan’ny Jiosy no halefako ho anareo? '
