document_id: PSA.94,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarainana amin’Andriamanitra noho ny fampahoriana ataon’ny lozabe.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH, Andriamanitra Mpamaly ny natao, ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra, Mpamaly ny natao, ô, mamirapirata.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Mpampianatra ny jentilisa va tsy hananatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Izay mampianatra fahalalana ny olona?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no mahalala ny hevitry ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa zava-poana izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay olona anarinao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady ampianarinao avy amin’ny lalànao,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba homenao fitsaharana amin’ny andro fahoriana izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pihady lavaka ho an’ny ratsy fanahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah tsy mba hanary ny olony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lovany tsy hafoiny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fitsarana hiverina ho amin’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanaraka izany ny mahitsy fo rehetra
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hitsangana ho ahy hisakana ny mpanao ratsy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hiseho ho ahy hisakana ny mpanao meloka?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy Jehovah no Mpamonjy ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia efa saiky nalaky nitoetra tao amin’ny mangingina ny fanahiko.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fony aho nanao hoe: Mangozohozo ny tongotro,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny famindramponao, Jehovah ô, no nanohana ahy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha be ny ahiahy ato anatiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mampifaly ny fanahiko ny fampiononanao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misandrata, ry Mpitsara ny tany, ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamalia ny mpiavonavona.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hikambana aminao va ny seza fiandrianan’ny ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay misaina fampahoriana manohitra ny lalàna?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '94.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izay misaina fampahoriana araka ny lalàny.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao andiany hamely ny fanahin’ny marina ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manameloka ny ra marina.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tonga fiarovana avo ho ahy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary vatolampy fialofako Andriamanitro.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ampanodiaviny azy ireo ny helony ka aringany noho ny faharatsiany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, aringan’i Jehovah Andriamanitsika izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana re ny ratsy fanahy, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana re no mbola hifalifaly ny ratsy fanahy?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mirezadrezatra sy miteny sahisahy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mirehareha ny mpanao ratsy rehetra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olonao, Jehovah ô, torotoroiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lovanao ampahoriny;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpitondratena sy ny vahiny vonoiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny kamboty dia matiny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa hoy izy: Tsy mijery Jehovah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mandinika Andriamanitr’i Jakoba.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahalalà hianareo olona ketrina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianareo adala, rahoviana re no mba ho hendry hianareo?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Mpanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '94.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpamboly.
      marker-yv: yv-n
    - type: text
      text: ' ny sofina va tsy handre?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Mpamorona ny maso va tsy hahita?
