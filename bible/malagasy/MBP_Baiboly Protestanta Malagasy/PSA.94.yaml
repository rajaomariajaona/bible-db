document_id: PSA.94,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana amin’Andriamanitra noho ny fampahoriana ataon’ny lozabe.
  - type: text
    content: JEHOVAH, Andriamanitra Mpamaly ny natao, ô,
  - type: text
    content: Andriamanitra, Mpamaly ny natao, ô, mamirapirata.
  '10':
  - type: text
    content: Ny Mpampianatra ny jentilisa va tsy hananatra,
  - type: text
    content: Dia Izay mampianatra fahalalana ny olona?
  '11':
  - type: text
    content: Jehovah no mahalala ny hevitry ny olona,
  - type: text
    content: Fa zava-poana izany.
  '12':
  - type: text
    content: Sambatra izay olona anarinao, Jehovah ô,
  - type: text
    content: Sady ampianarinao avy amin’ny lalànao,
  '13':
  - type: text
    content: Mba homenao fitsaharana amin’ny andro fahoriana izy,
  - type: text
    content: Mandra-pihady lavaka ho an’ny ratsy fanahy.
  '14':
  - type: text
    content: Fa Jehovah tsy mba hanary ny olony,
  - type: text
    content: Ary ny lovany tsy hafoiny.
  '15':
  - type: text
    content: Fa ny fitsarana hiverina ho amin’ny fahamarinana,
  - type: text
    content: Ary hanaraka izany ny mahitsy fo rehetra
  '16':
  - type: text
    content: Iza no hitsangana ho ahy hisakana ny mpanao ratsy?
  - type: text
    content: Iza no hiseho ho ahy hisakana ny mpanao meloka?
  '17':
  - type: text
    content: Raha tsy Jehovah no Mpamonjy ahy,
  - type: text
    content: Dia efa saiky nalaky nitoetra tao amin’ny mangingina ny fanahiko.
  '18':
  - type: text
    content: 'Fony aho nanao hoe: Mangozohozo ny tongotro,'
  - type: text
    content: Dia ny famindramponao, Jehovah ô, no nanohana ahy.
  '19':
  - type: text
    content: Raha be ny ahiahy ato anatiko,
  - type: text
    content: Dia mampifaly ny fanahiko ny fampiononanao.
  '2':
  - type: text
    content: Misandrata, ry Mpitsara ny tany, ô;
  - type: text
    content: Mamalia ny mpiavonavona.
  '20':
  - type: text
    content: Hikambana aminao va ny seza fiandrianan’ny ratsy,
  - type: text
    content: Izay misaina fampahoriana manohitra ny lalàna?
  - type: note
    content: 'Na: Izay misaina fampahoriana araka ny lalàny.'
  '21':
  - type: text
    content: Manao andiany hamely ny fanahin’ny marina ireo
  - type: text
    content: Ka manameloka ny ra marina.
  '22':
  - type: text
    content: Fa tonga fiarovana avo ho ahy Jehovah;
  - type: text
    content: Ary vatolampy fialofako Andriamanitro.
  '23':
  - type: text
    content: Dia ampanodiaviny azy ireo ny helony ka aringany noho ny faharatsiany izy;
  - type: text
    content: Eny, aringan’i Jehovah Andriamanitsika izy.
  '3':
  - type: text
    content: Mandra-pahoviana re ny ratsy fanahy, Jehovah ô,
  - type: text
    content: Mandra-pahoviana re no mbola hifalifaly ny ratsy fanahy?
  '4':
  - type: text
    content: Mirezadrezatra sy miteny sahisahy izy;
  - type: text
    content: Mirehareha ny mpanao ratsy rehetra.
  '5':
  - type: text
    content: Ny olonao, Jehovah ô, torotoroiny,
  - type: text
    content: Ary ny lovanao ampahoriny;
  '6':
  - type: text
    content: Ny mpitondratena sy ny vahiny vonoiny,
  - type: text
    content: Ary ny kamboty dia matiny.
  '7':
  - type: text
    content: 'Fa hoy izy: Tsy mijery Jehovah,'
  - type: text
    content: Ary tsy mandinika Andriamanitr’i Jakoba.
  '8':
  - type: text
    content: Mahalalà hianareo olona ketrina;
  - type: text
    content: Ary hianareo adala, rahoviana re no mba ho hendry hianareo?
  '9':
  - type: text
    content: Ny Mpanao
  - type: note
    content: Heb. Mpamboly.
  - type: text
    content: ' ny sofina va tsy handre?'
  - type: text
    content: Ny Mpamorona ny maso va tsy hahita?
