document_id: GEN.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny taranak’i Adama tamin’i Seta ka hatramin’i Noa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ITY no boky milaza ny taranak’i Adama: Tamin’ny andro namoronan’Andriamanitra ny olona dia tahaka ny tarehin’Andriamanitra no nanaovany azy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: lahy sy vavy no namoronany azy; dia nitahy azy Izy ka nanao ny anarany hoe Adama tamin’ny andro namoronany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa telo-polo amby zato taona ny andro niainan’i Adama, dia niteraka tahaka ny tarehiny, araka ny endriny, izy; ary ny anarany nataony hoe Seta. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny andron’i Adama taorian’ny niterahany an’i Seta dia valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny andro rehetra niainan’i Adama dia telo-polo amby sivin-jato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa dimy amby zato taona ny andro niainan’i Seta, dia niteraka an’i Enosy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny andro niainan’i Seta taorian’ny niterahany an’i Enosy dia fito amby valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny andro rehetra niainan’i Seta dia roa ambin’ny folo amby sivin-jato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa sivi-folo taona ny andro niainan’i Enosy, dia niteraka an’i Kenana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny andro niainan’i Enosy taorian’ny niterahany an’i Kenana dia dimy ambin’ny folo amby valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny andro rehetra niainan’i Enosy dia dimy amby sivin-jato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa fito-polo taona ny andro niainan’i Kenana, dia niteraka an’i Mahalalila izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny andro niainan’i Kenana taorian’ny niterahany an’i Mahalalila dia efa-polo amby valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny andro rehetra nianian’i Kenana dia folo amby sivin-jato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa dimy amby enim-polo taona ny andro niainan’i Mahalalila, dia niteraka an’i Jareda izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny andro niainan’i Mahalalila taorian’ny niterahany an’i Jareda dia telo-polo amby valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny andro rehetra niainan’i Mahalalila dia dimy amby sivi-folo amby valon-jato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa roa amby enim-polo amby zato taona ny andro niainan’i Jareda, dia niteraka an’i Enoka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny andro niainan’i Jareda taorian’ny niterahany an’i Enoka dia valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny andro rehetra niainan’i Jareda dia roa amby enim-polo amby sivin-jato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary rehefa dimy amby enim-polo taona ny andro niainan’i Enoka, dia niteraka an’i Metosela izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary niara-nandeha tamin’Andriamanitra telon-jato taona Enoka taorian’ny niterahany an’i Metosela; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny andro rehetra niainan’i Enoka dia dimy amby enim-polo amby telon-jato taona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary niara-nandeha tamin’Andriamanitra Enoka; ka tsy hita izy, fa nentin’Adnriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary rehefa fito amby valo-polo amby zato taona ny andro niainan’i Metosela, dia niteraka an’i Lameka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny andro niainan’i Metosela taorian’ny niterahany an’i Lameka dia roa amby valo-polo amby fiton-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ny andro rehetra niainan’i Metosela dia sivy amby enim-polo amby sivin-jato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary rehefa roa amby valo-polo amby zato taona ny andro niainan’i Lameka, dia niteraka zazalahy izy; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ary ny anarany nataony hoe Noa,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Noa = Fitsaharana.
    marker-yv: yv-n
  - type: text
    text: ' fa hoy izy: Ity no hampionona antsika amin’ny asantsika sy ny fisasaran’ny tànantsika noho ny tany izay voaozon’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny andro niainan’i Lameka taorian’ny niterahany an’i Noa dia dimy amby sivi-folo amby diman-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary ny andro rehetra niainan’i Lameka dia fito amby fito-polo amby fiton-jato taona; dia maty izy.
- type: usfm
  marker: p
  children:
  - type: usfm
