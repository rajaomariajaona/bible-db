document_id: 3JN.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fisaorana an’i Gaio noho ny nandraisany vahiny, sy filazana ny amin’i Diotrefa sy Demetrio.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: IZAHO loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny presbytera.
      marker-yv: yv-n
    - type: text
      text: ' mamangy an’i Gaio, ilay malala, izay tiako amin’ny fahamarinana.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa amin’izany, raha tonga aho, dia hotsarovako izay asa ataony, fa mibedibedy foana manaratsy anay izy; ary tsy afa-po amin’izany ihany, fa ny tenany dia tsy mandray ireo rahalahy ireo, ary izay ta-handray azy dia rarany sy roahiny hiala amin’ny fiangonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ry malala, aza ny ratsy no alain-tahaka, fa ny tsara. Izay manao ny tsara no avy amin’Andriamanitra; fa izay manao ny ratsy tsy mba nahita an’Andriamanitra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Demetrio dia tsara laza amin’ny olona rehetra sy amin’ny fahamarinana koa; ary izahay koa manambara izany, ary fantatrao fa marina ny fanambaranay.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nanana zavatra maro hosoratana aho, nefa tsy tiako hosoratana aminao amin’ny ranomainty sy ny penina;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: volotara.
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: fa manantena hahita anao faingana ihany aho, dia hiteny mifanatrika isika.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho aminao anie ny fiadanana. Ny sakaiza '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aty
    - type: text
      text: ' manao veloma anao. Veloma amin’ny sakaiza tsirairay araka ny anarany avy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry malala, mangataka aho mba hambinina sy ho salama amin’ny zavatra rehetra anie hianao, tahaka izay anambinana ny fanahinao ihany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa faly indrindra aho, fony nisy rahalahy tonga ka nanambara ny fahamarinanao, dia toy ny andehananao araka ny fahamarinana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy manana fifaliana mihoatra noho izao aho, dia ny andrenesako fa mandeha araka ny fahamarinana ny zanako.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ry malala, manao asa mahatoky hianao na amin’inona na amin’inona ataonao amin’ireo rahalahy ireo, na dia vahiny aza izy, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: izay nanambara ny fitiavanao teo anatrehan’ny fiangonana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' dia ho soa no ataonao, raha mamoaka azy koa araka izay mendrika hatao noho ny amin’Andriamanitra hianao; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'fa noho ny Anarana no niaingany, ka tsy naka na inona na inona tamin’ny jentilisa izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa isika dia tokony handray tsara izay toy izany, mba ho mpiara-miasa aminy amin’ny fahamarinana.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nanoratra tamin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' ihany aho; nefa Diotrefa, izay te-ho lohany, dia tsy mba mandray anay. '
