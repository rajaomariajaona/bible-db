document_id: PSA.144,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny nanambinany ny mpanjaka, ary filazana ny mahatsinontsinona ny olombelona sy ny soa hitan’ny mpanompon’Andriamanitra.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: ISAORANA anie Jehovah Vatolampiko,
  - type: text
    content: Izay mampianatra ny tanako hamely
  - type: text
    content: Sy ny rantsan-tànako hiady,
  '10':
  - type: text
    content: Izay manome famonjena ho an’ireo mpanjaka,
  - type: text
    content: Sady mamonjy an’i Davida mpanompony tsy ho voan’ny sabatra mandratra.
  '11':
  - type: text
    content: Afaho aho, ka vonjeo amin’ny tànan’ny hafa firenena,
  - type: text
    content: Izay miteny zava-poana amin’ny vavany,
  - type: text
    content: Ary ny tànany ankavanana dia tànana ankavanana mamitaka;
  '12':
  - type: text
    content: Mba ho tahaka ny zava-maniry maroroka ny zanakai-lahy,
  - type: text
    content: Ary ho tahaka ny vato fehizoro voasoratra tsara toy ny fomban’ny lapan’andriana ny zanakai-vavy.
  '13':
  - type: text
    content: Ho feno ny trano fitehirizanay, ka hisy vokatra betsaka samy hafa karazana;
  - type: text
    content: Hiteraka arivoarivo sy alinalina ny ondrinay any an-tsahanay;
  '14':
  - type: text
    content: Hahazaka be ny ombinay,
  - type: text
    content: Ary tsy hisy ho rava, na ho lasan-ko babo,
  - type: text
    content: Sady tsy hisy fitarainana any an-dàlambenay.
  '15':
  - type: text
    content: Sambatra ny firenena izay tahaka izany;
  - type: text
    content: Eny, sambatra ny firenena izay manana an’i Jehovah ho Andriamaniny.
  '2':
  - type: text
    content: Izay Mpiantra sy batery fiarovana ho ahy sady fiarovana avo sy Mpanafaka ahy,
  - type: text
    content: Ary ampingako sy fialofako,
  - type: text
    content: Izay mahafolaka ny vahoakako hanoa ahy
  '3':
  - type: text
    content: Jehovah ô, inona ny olona, no iahianao
  - type: note
    content: Heb. ahafantaranao.
  - type: text
    content: ' azy?'
  - type: text
    content: Ary ny zanak’olombelona, no iheveranao azy?
  '4':
  - type: text
    content: Ny olona dia tahaka ny zava-poana,
  - type: text
    content: Ny androny dia tahaka ny aloka mihelina.
  '5':
  - type: text
    content: Jehovah ô, aondreho ny lanitrao, ka midìna;
  - type: text
    content: Tendreo ny tendrombohitra, dia hidonaka ireny.
  '6':
  - type: text
    content: Ampitselatselaro ny helatra, ka ampielezo ireo;
  - type: text
    content: Alefao ny zana-tsipìkanao, ka ampifanaritaho ireo;
  '7':
  - type: text
    content: Ahinjiro avy any ambony ny tànanao;
  - type: text
    content: Afaho aho, ka vonjeo amin’ny rano be,
  - type: text
    content: Dia amin’ny tànan’ny hafa firenena,
  '8':
  - type: text
    content: Izay miteny zava-poana amin’ny vavany,
  - type: text
    content: Ary ny tànany ankavanana dia tànana ankavanana mamitaka.
  '9':
  - type: text
    content: Andriamanitra ô, hihira fihiram-baovao ho Anao aho;
  - type: text
    content: Amin’ny valiha tory folo no hankalazako Anao,
