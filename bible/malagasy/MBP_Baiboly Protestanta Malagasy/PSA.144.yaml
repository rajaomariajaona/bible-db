document_id: PSA.144
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiderana an’Andriamanitra noho ny nanambinany ny mpanjaka, ary filazana ny mahatsinontsinona ny olombelona sy ny soa hitan’ny mpanompon’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ISAORANA anie Jehovah Vatolampiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mampianatra ny tanako hamely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny rantsan-tànako hiady,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay Mpiantra sy batery fiarovana ho ahy sady fiarovana avo sy Mpanafaka ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampingako sy fialofako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mahafolaka ny vahoakako hanoa ahy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jehovah ô, inona ny olona, no iahianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '144.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahafantaranao.
    marker-yv: yv-n
  - type: text
    text: ' azy?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanak’olombelona, no iheveranao azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny olona dia tahaka ny zava-poana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny androny dia tahaka ny aloka mihelina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jehovah ô, aondreho ny lanitrao, ka midìna;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tendreo ny tendrombohitra, dia hidonaka ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ampitselatselaro ny helatra, ka ampielezo ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alefao ny zana-tsipìkanao, ka ampifanaritaho ireo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ahinjiro avy any ambony ny tànanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afaho aho, ka vonjeo amin’ny rano be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’ny tànan’ny hafa firenena,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay miteny zava-poana amin’ny vavany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tànany ankavanana dia tànana ankavanana mamitaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Andriamanitra ô, hihira fihiram-baovao ho Anao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny valiha tory folo no hankalazako Anao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay manome famonjena ho an’ireo mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mamonjy an’i Davida mpanompony tsy ho voan’ny sabatra mandratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Afaho aho, ka vonjeo amin’ny tànan’ny hafa firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay miteny zava-poana amin’ny vavany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tànany ankavanana dia tànana ankavanana mamitaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mba ho tahaka ny zava-maniry maroroka ny zanakai-lahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tahaka ny vato fehizoro voasoratra tsara toy ny fomban’ny lapan’andriana ny zanakai-vavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ho feno ny trano fitehirizanay, ka hisy vokatra betsaka samy hafa karazana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiteraka arivoarivo sy alinalina ny ondrinay any an-tsahanay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hahazaka be ny ombinay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hisy ho rava, na ho lasan-ko babo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy hisy fitarainana any an-dàlambenay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sambatra ny firenena izay tahaka izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, sambatra ny firenena izay manana an’i Jehovah ho Andriamaniny.
