document_id: JER.25,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny handravan’i Babylona ny Joda sy ny firenena manodidina, ary ny loza hamelezana an’i Babylona sy ny firenena hafa rehetra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'IZAO no teny tonga tamin’i Jeremia ny amin’ny Joda rehetra tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda–dia ny taona voalohany nanjakan’i Nebokadnezara, mpanjakan’i Babylona– '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hatsahatro eo aminy ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny feon’ny ampakarina, ny feon’ny vato fikosoham-bary ary ny fahazavan’ny jiro. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ity tany rehetra ity dia ho foana sy lao, ary ireto firenena rehetra ireto hanompo ny mpanjakan’i Babylona fito-polo taona.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tapitra ny fito-polo taona, hoy Jehovah, dia hovaliako kosa ny mpanjakan’i Babylona sy izany firenena izany noho ny helony, ary ny tanin’ny Kaldeana koa dia hataoko rava mandrakizay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hotoviko amin’izany tany izany ny teniko rehetra, izay efa nambarako hamelezana azy, dia izay rehetra voasoratra ato amin’ity boky ity, izay novinanin’i Jeremia hamely ny firenena rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ireo kosa indray dia hampanompoin’ny firenena maro sy ny mpanjaka lehibe; ary hovaliako araka ny ataony sy araka ny asan’ny tànany avy izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no nolazain’i Jehovah, Andriamanitry ny Isiraely, tamiko: Raiso etỳ an-tànako ity kapoaky ny divay fahatezerana mirehitra ity, ka ampisotroy ny firenena rehetra izay anirahako anao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hisotro izy ka hirepirepy sy ho very saina noho ny sabatra izay hampameleziko azy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisiko ny kapoaka teny an-tànan’i Jehovah, ka nampisotroako ny firenena rehetra izay nanirahan’i Jehovah ahy, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia Jerosalema sy ny tanànan’ny Joda sy ny mpanjakany ary ny mpanapaka, mba hanao azy ho tany lao sy ho figagana sy zavatra mampisitrisitra ary fanozonana tahaka ny amin’izao anio izao; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Farao, mpanjakan’i Egypta, sy ny mpanompony sy ny mpanapaka mbamin’ny vahoakany rehetra, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izay nolazain’i Jeremia mpaminany tamin’ny Joda rehetra sy tamin’ny mponina rehetra tany Jerosalema hoe:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny olona samy hafa firenena rehetra sy ny mpanjaka rehetra amin’ny tany Oza sy ny mpanjaka rehetra amin’ny tanin’ny Filistina sy Askelona sy Gaza sy Ekrona ary ny sisa any Asdoda; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Edoma sy Moaba sy ny taranak’i Amona, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny mpanjaka rehetra any Tyro sy ny mpanjaka rehetra any Sidona ary ny mpanjakan’ny nosy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: amoron-tsiraka.
      marker-yv: yv-n
    - type: text
      text: ' any an-dafin’ny ranomasina; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Dedana sy Tema sy Boza ary izay rehetra voahety sisim-bolo, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny mpanjaka rehetra any Arabia sy ny mpanjaka rehetra amin’ny firenena maro samy hafa izay monina any an-efitra; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny mpanjaka rehetra any Zimry sy ny mpanjaka rehetra any Elama ary ny mpanjaka rehetra any Media, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny mpanjaka rehetra any avaratra, na ny lavitra na ny akaiky, na iza na iza, ary ny fanjakana rehetra amin’izao tontolo izao, izay etỳ ambonin’ny tany; ary ny mpanjakan’i Sesaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sesaka = Babela.
      marker-yv: yv-n
    - type: text
      text: ' koa dia hisotro manaraka ireo.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa lazao aminy hoe: Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Misotroa hianareo, ka mimamoa, sy mandoava, ary mianjerà, ka aza miarina intsony–noho ny sabatra izay hampameleziko anareo.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tsy mety mandray ny kapoaka eny an-tànanao hosotroiny izy, dia ataovy aminy hoe: Izao no lazain’i Jehovah, Tompon’ny maro: Tsy maintsy misotro hianareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa, indro, ao amin’ny tanàna izay efa niantsoana ny anarako aza no nanombohako ny fahatongavana loza, ka ho afaka va hianareo? Tsy ho afaka mihitsy hianareo; fa hiantso sabatra Aho hamelezana ny mponina rehetra amin’ny tany, hoy Jehovah, Tompon’ny maro. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatramin’ny taona fahatelo ambin’ny folo nanjakan’i Josia, zanak’i Amona, mpanjakan’ny Joda, ka mandraka andro-any, dia mandritra ny telo amby roa-polo taona izao, no nahatongavan’ny tenin’i Jehovah tamiko, ary nolazaiko taminareo, eny, nifoha maraina koa aho ka nilaza; nefa tsy nihaino hianareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa maninania aminy hianao araka izao teny rehetra izao, ka ataovy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah hierona any ambony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanandratra ny feony any amin’ny fitoerany masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hierona mafy amin’ny sahany fiandrasan-ondry Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanakora toy ny mpanosihosy voaloboka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamelezana ny mponina rehetra amin’ny tany.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihatra amin’ny faran’ny tany ny fihorakorahana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah manana ady amin’ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifandahatra amin ny nofo rehetra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny ratsy fanahy dia atolony ho an ny sabatra, hoy Jehovah.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hisy loza hivoaka hitety ny firenena samy hafa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy tafio-drivotra mahery hiposaka any amin’ny faran’ny tany;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny voavonon’i Jehovah, dia hiampatrampatra hatramin’ny faran’ny tany anankiray ka hatramin’ny farany koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hisaonana, na hangonina, na halevina ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho zezika eny ambonin’ny tany.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Midradradradrà, hianareo mpiandry ondry, ary mitaraina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mihosinkosena, hianareo zokiny amin’ny ondry!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tonga ny andro hamonoana anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampieleziko hianareo ka hianjera toy ny fanaka tsara.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpiandry ondry tsy hanam-pandosirana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zokiny amin’ny ondry tsy hanam-pahafahana.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany! misy feo fitarainan’ny mpiandry ondry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fidradradradran’ny zokiny aminy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria efa nosimban’i Jehovah ny saha fiandrasana azy;
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa tonga lao ny kijana niadanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny firehetan’ny fahatezeran’i Jehovah.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandao ny fiereny toy ny liona tanora izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa lao ny taniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahasiahan’ny mpampahory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy noho ny firehetan’ny fahatezerany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah naniraka ny mpaminany mpanompony rehetra ho any aminareo, eny, nifoha maraina koa Izy ka naniraka–nefa tsy nihaino hianareo, na nanongilan-tsofina hihaino–hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samia miala amin’ny làlan-dratsinareo avy hianareo sy amin’ny ratsy fanaonareo, ka dia honina any amin’ny tany izay nomen’i Jehovah anareo sy ny razanareo hatrizay ka ho mandrakizay. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aza manaraka andriamani-kafa hanompo azy sy hiankohoka eo anatrehany, ary aza mampahatezitra Ahy amin’ny asan’ny tànanareo, fandrao hahatonga loza aminareo Aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa tsy nihaino Ahy hianareo, hoy Jehovah, mba hampahatezeranareo Ahy tamin’ny asan’ny tànanareo hahitanareo loza.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah, Tompon’ny maro: Noho ny tsy nihainoanareo ny teniko, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia, indro, hampanalaiko ny firenena rehetra any avaratra sy Nebokadnezara, mpanjakan’i Babylona, mpanompoko, hoy Jehovah ary ho entiko hamely ity tany ity sy ny mponina eto mbamin’ireto firenena manodidina rehetra ireto izy, ary haringako tokoa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hataoko herema.
      marker-yv: yv-n
    - type: text
      text: ' ireo ka hataoko ho figagana sy zavatra mampisitrisitra sady ho rava mandrakizay. '
