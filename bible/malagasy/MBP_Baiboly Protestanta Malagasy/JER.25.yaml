document_id: JER.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravan’i Babylona ny Joda sy ny firenena manodidina, ary ny loza hamelezana an’i Babylona sy ny firenena hafa rehetra.
  - type: text
    content: 'IZAO no teny tonga tamin’i Jeremia ny amin’ny Joda rehetra tamin’ny taona fahefatra nanjakan’i Joiakima, zanak’i Josia, mpanjakan’ny Joda–dia ny taona voalohany nanjakan’i Nebokadnezara, mpanjakan’i Babylona– '
  '10':
  - type: text
    content: 'Ary hatsahatro eo aminy ny feo mifaly sy ny feo miravoravo, dia ny feon’ny mpampakatra sy ny feon’ny ampakarina, ny feon’ny vato fikosoham-bary ary ny fahazavan’ny jiro. '
  '11':
  - type: text
    content: Ary ity tany rehetra ity dia ho foana sy lao, ary ireto firenena rehetra ireto hanompo ny mpanjakan’i Babylona fito-polo taona.
  '12':
  - type: text
    content: 'Ary rehefa tapitra ny fito-polo taona, hoy Jehovah, dia hovaliako kosa ny mpanjakan’i Babylona sy izany firenena izany noho ny helony, ary ny tanin’ny Kaldeana koa dia hataoko rava mandrakizay. '
  '13':
  - type: text
    content: 'Ary hotoviko amin’izany tany izany ny teniko rehetra, izay efa nambarako hamelezana azy, dia izay rehetra voasoratra ato amin’ity boky ity, izay novinanin’i Jeremia hamely ny firenena rehetra. '
  '14':
  - type: text
    content: Fa ireo kosa indray dia hampanompoin’ny firenena maro sy ny mpanjaka lehibe; ary hovaliako araka ny ataony sy araka ny asan’ny tànany avy izy.
  '15':
  - type: text
    content: 'Fa izao no nolazain’i Jehovah, Andriamanitry ny Isiraely, tamiko: Raiso etỳ an-tànako ity kapoaky ny divay fahatezerana mirehitra ity, ka ampisotroy ny firenena rehetra izay anirahako anao. '
  '16':
  - type: text
    content: Ary hisotro izy ka hirepirepy sy ho very saina noho ny sabatra izay hampameleziko azy.
  '17':
  - type: text
    content: 'Dia noraisiko ny kapoaka teny an-tànan’i Jehovah, ka nampisotroako ny firenena rehetra izay nanirahan’i Jehovah ahy, '
  '18':
  - type: text
    content: 'dia Jerosalema sy ny tanànan’ny Joda sy ny mpanjakany ary ny mpanapaka, mba hanao azy ho tany lao sy ho figagana sy zavatra mampisitrisitra ary fanozonana tahaka ny amin’izao anio izao; '
  '19':
  - type: text
    content: 'ary Farao, mpanjakan’i Egypta, sy ny mpanompony sy ny mpanapaka mbamin’ny vahoakany rehetra, '
  '2':
  - type: text
    content: 'dia izay nolazain’i Jeremia mpaminany tamin’ny Joda rehetra sy tamin’ny mponina rehetra tany Jerosalema hoe:'
  '20':
  - type: text
    content: 'ary ny olona samy hafa firenena rehetra sy ny mpanjaka rehetra amin’ny tany Oza sy ny mpanjaka rehetra amin’ny tanin’ny Filistina sy Askelona sy Gaza sy Ekrona ary ny sisa any Asdoda; '
  '21':
  - type: text
    content: 'ary Edoma sy Moaba sy ny taranak’i Amona, '
  '22':
  - type: text
    content: ary ny mpanjaka rehetra any Tyro sy ny mpanjaka rehetra any Sidona ary ny mpanjakan’ny nosy
  - type: note
    content: 'Na: amoron-tsiraka.'
  - type: text
    content: ' any an-dafin’ny ranomasina; '
  '23':
  - type: text
    content: 'ary Dedana sy Tema sy Boza ary izay rehetra voahety sisim-bolo, '
  '24':
  - type: text
    content: 'ary ny mpanjaka rehetra any Arabia sy ny mpanjaka rehetra amin’ny firenena maro samy hafa izay monina any an-efitra; '
  '25':
  - type: text
    content: 'ary ny mpanjaka rehetra any Zimry sy ny mpanjaka rehetra any Elama ary ny mpanjaka rehetra any Media, '
  '26':
  - type: text
    content: ary ny mpanjaka rehetra any avaratra, na ny lavitra na ny akaiky, na iza na iza, ary ny fanjakana rehetra amin’izao tontolo izao, izay etỳ ambonin’ny tany; ary ny mpanjakan’i Sesaka
  - type: note
    content: Sesaka = Babela.
  - type: text
    content: ' koa dia hisotro manaraka ireo.'
  '27':
  - type: text
    content: 'Koa lazao aminy hoe: Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Misotroa hianareo, ka mimamoa, sy mandoava, ary mianjerà, ka aza miarina intsony–noho ny sabatra izay hampameleziko anareo.'
  '28':
  - type: text
    content: 'Ary raha tsy mety mandray ny kapoaka eny an-tànanao hosotroiny izy, dia ataovy aminy hoe: Izao no lazain’i Jehovah, Tompon’ny maro: Tsy maintsy misotro hianareo. '
  '29':
  - type: text
    content: 'Fa, indro, ao amin’ny tanàna izay efa niantsoana ny anarako aza no nanombohako ny fahatongavana loza, ka ho afaka va hianareo? Tsy ho afaka mihitsy hianareo; fa hiantso sabatra Aho hamelezana ny mponina rehetra amin’ny tany, hoy Jehovah, Tompon’ny maro. '
  '3':
  - type: text
    content: 'Hatramin’ny taona fahatelo ambin’ny folo nanjakan’i Josia, zanak’i Amona, mpanjakan’ny Joda, ka mandraka andro-any, dia mandritra ny telo amby roa-polo taona izao, no nahatongavan’ny tenin’i Jehovah tamiko, ary nolazaiko taminareo, eny, nifoha maraina koa aho ka nilaza; nefa tsy nihaino hianareo. '
  '30':
  - type: text
    content: 'Koa maninania aminy hianao araka izao teny rehetra izao, ka ataovy hoe:'
  - type: text
    content: Jehovah hierona any ambony
  - type: text
    content: Ary hanandratra ny feony any amin’ny fitoerany masina,
  - type: text
    content: Eny, hierona mafy amin’ny sahany fiandrasan-ondry Izy
  - type: text
    content: Ka hanakora toy ny mpanosihosy voaloboka,
  - type: text
    content: Hamelezana ny mponina rehetra amin’ny tany.
  '31':
  - type: text
    content: Mihatra amin’ny faran’ny tany ny fihorakorahana;
  - type: text
    content: Fa Jehovah manana ady amin’ny firenena;
  - type: text
    content: Mifandahatra amin ny nofo rehetra Izy,
  - type: text
    content: Ka ny ratsy fanahy dia atolony ho an ny sabatra, hoy Jehovah.
  '32':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Indro, hisy loza hivoaka hitety ny firenena samy hafa,
  - type: text
    content: Ary hisy tafio-drivotra mahery hiposaka any amin’ny faran’ny tany;
  '33':
  - type: text
    content: Ary amin’izany andro izany
  - type: text
    content: Ny voavonon’i Jehovah, dia hiampatrampatra hatramin’ny faran’ny tany anankiray ka hatramin’ny farany koa;
  - type: text
    content: Tsy hisaonana, na hangonina, na halevina ireny,
  - type: text
    content: Fa ho zezika eny ambonin’ny tany.
  '34':
  - type: text
    content: Midradradradrà, hianareo mpiandry ondry, ary mitaraina;
  - type: text
    content: Eny, mihosinkosena, hianareo zokiny amin’ny ondry!
  - type: text
    content: Fa tonga ny andro hamonoana anareo;
  - type: text
    content: Ary hampieleziko hianareo ka hianjera toy ny fanaka tsara.
  '35':
  - type: text
    content: Ny mpiandry ondry tsy hanam-pandosirana,
  - type: text
    content: Ary ny zokiny amin’ny ondry tsy hanam-pahafahana.
  '36':
  - type: text
    content: Injany! misy feo fitarainan’ny mpiandry ondry
  - type: text
    content: Sy fidradradradran’ny zokiny aminy!
  - type: text
    content: Satria efa nosimban’i Jehovah ny saha fiandrasana azy;
  '37':
  - type: text
    content: Ary efa tonga lao ny kijana niadanana
  - type: text
    content: Noho ny firehetan’ny fahatezeran’i Jehovah.
  '38':
  - type: text
    content: Nandao ny fiereny toy ny liona tanora izy;
  - type: text
    content: Fa efa lao ny taniny
  - type: text
    content: Noho ny fahasiahan’ny mpampahory
  - type: text
    content: Sy noho ny firehetan’ny fahatezerany.
  '4':
  - type: text
    content: 'Ary Jehovah naniraka ny mpaminany mpanompony rehetra ho any aminareo, eny, nifoha maraina koa Izy ka naniraka–nefa tsy nihaino hianareo, na nanongilan-tsofina hihaino–hoe: '
  '5':
  - type: text
    content: 'Samia miala amin’ny làlan-dratsinareo avy hianareo sy amin’ny ratsy fanaonareo, ka dia honina any amin’ny tany izay nomen’i Jehovah anareo sy ny razanareo hatrizay ka ho mandrakizay. '
  '6':
  - type: text
    content: 'Ary aza manaraka andriamani-kafa hanompo azy sy hiankohoka eo anatrehany, ary aza mampahatezitra Ahy amin’ny asan’ny tànanareo, fandrao hahatonga loza aminareo Aho. '
  '7':
  - type: text
    content: Nefa tsy nihaino Ahy hianareo, hoy Jehovah, mba hampahatezeranareo Ahy tamin’ny asan’ny tànanareo hahitanareo loza.
  '8':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Tompon’ny maro: Noho ny tsy nihainoanareo ny teniko, '
  '9':
  - type: text
    content: dia, indro, hampanalaiko ny firenena rehetra any avaratra sy Nebokadnezara, mpanjakan’i Babylona, mpanompoko, hoy Jehovah ary ho entiko hamely ity tany ity sy ny mponina eto mbamin’ireto firenena manodidina rehetra ireto izy, ary haringako tokoa
  - type: note
    content: Heb. hataoko herema.
  - type: text
    content: ' ireo ka hataoko ho figagana sy zavatra mampisitrisitra sady ho rava mandrakizay. '
