document_id: SNG.2,873
type_code: plt
verses:
  '1':
  - type: text
    content: Izaho dia voninkazo eny an-tanety
  - type: note
    content: 'Na: any Sarôna.'
  - type: text
    content: ' ihany'
  - type: text
    content: Sy lilia eny an-dohasaha.
  '10':
  - type: text
    content: 'Niteny ny malalako ka nanao tamiko hoe:'
  - type: text
    content: Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary!
  '11':
  - type: text
    content: Fa, indro, lasa ny ririnina,
  - type: text
    content: Ritra tsy misy intsony ny ranonorana;
  '12':
  - type: text
    content: Miposaka eo amin’ny tany ny voninkazo;
  - type: text
    content: Tonga ny taona fanaovam-peo fifaliana,
  - type: text
    content: Ary re atỳ amin’ny tanintsika ny feon’ny domohina.
  '13':
  - type: text
    content: Ny aviavy
  - type: note
    content: aviavimbazaha.
  - type: text
    content: ' mahamanitra ny voany tanora,'
  - type: text
    content: Mamony ny voaloboka ka mamerovero tsara.
  - type: text
    content: Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary!
  '14':
  - type: text
    content: E, ry voromailalako ao amin’ny tsefatsefaky ny harambato,
  - type: text
    content: Dia ao amin’ny fialokalofana amin’ny fiakarana mideza,
  - type: text
    content: Aoka hahita ny endrikao
  - type: text
    content: Sy handre ny feonao aho;
  - type: text
    content: Fa mamy ny feonao, sady mahafinaritra ny endrikao.
  '15':
  - type: text
    content: Sambory ny amboahaolo, dia ireo amboahaolo madinika
  - type: text
    content: Izay manimba ny tanimboaloboka;
  - type: text
    content: Fa efa mamony izao ny voalobotsika.
  '16':
  - type: text
    content: Ahy ny malalako, ary azy aho,
  - type: text
    content: Dia ilay miandry ny ondriny eny amin’ny lilia.
  '17':
  - type: text
    content: Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro,
  - type: note
    content: Heb. mandositra ny aloka.
  - type: text
    content: Mitodiha, ry ilay malalako, ary aoka ho tahaka ny gazela
  - type: note
    content: Anaram-biby haingan-tongotra.
  - type: text
    content: ' na ny diera'
  - type: note
    content: Anaram-biby haingan-tongotra.
  - type: text
    content: ' tanora'
  - type: text
    content: Eny an-tendrombohitra be hantsana
  - type: note
    content: 'Na: tendrombohitra manelanelana.'
  - type: text
    content: ' hianao.'
  '2':
  - type: text
    content: Toy ny lilia eo amin’ny tsilo,
  - type: text
    content: Dia toy izany tompokovavy havako eo amin’ny zazavavy.
  '3':
  - type: text
    content: Toy ny hazo poma amin’ny hazo any an-ala,
  - type: text
    content: Dia toy izany ny malalako eo amin’ny zatovo.
  - type: text
    content: Mahafinaritra ahy indrindra ny mipetraka eo ambanin’ny alokalony,
  - type: text
    content: Sady mamy ao am-bavako ny voany.
  '4':
  - type: text
    content: Nentiny ho ao an-tranon-divay aho,
  - type: text
    content: Ary ny fanevany eo amboniko dia fitiavana.
  '5':
  - type: text
    content: Hatanjaho amin’ampempam-boaloboka aho,
  - type: text
    content: Ary velombelomy amin’ny poma aho,
  - type: text
    content: Fa mararim-pitia.
  '6':
  - type: text
    content: Aoka ny tànany ankavia hanondana ahy,
  - type: text
    content: Ary aoka ny tànany ankavanana hanohona ahy.
  '7':
  - type: text
    content: Mampianiana anareo amin’ny gazela
  - type: note
    content: Anaram-biby haingan-tongotra.
  - type: text
    content: ' na amin’ny dieravavy'
  - type: note
    content: Anaram-biby haingan-tongotra.
  - type: text
    content: ' any an-tsaha aho, ry zanakavavin’i Jerosalema:'
  - type: text
    content: Aza manaitra na mamoha ny fitiavana raha tsy efa sitrapony.
  - type: heading
    content: Tenin’ny ampakarina, raha nitoetra irery izy.
  '8':
  - type: text
    content: INJAY, ny feon’ilay malalako! Indro, tamy izy
  - type: text
    content: Ka miantsambotsambotra eny an-tendrombohitra
  - type: text
    content: Ary mitsambikimbikina eny amin’ny havoana.
  '9':
  - type: text
    content: Ny malalako dia tahaka ny gazela
  - type: note
    content: Anaram-biby haingan-tongotra.
  - type: text
    content: ' na ny diera'
  - type: note
    content: Anaram-biby haingan-tongotra.
  - type: text
    content: ' tanora;'
  - type: text
    content: Indro, mijanona eo ala-tranonay
  - type: note
    content: Heb. ivelan ny rindrinay
  - type: text
    content: ' izy,'
  - type: text
    content: Mitsidika eo am-baravarankely,
  - type: text
    content: Manarangarana eo amin’ny makarakara.
