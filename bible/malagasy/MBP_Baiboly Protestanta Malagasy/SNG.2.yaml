verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izaho dia voninkazo eny an-tanety
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: any Sarôna.
      marker-yv: yv-n
    - type: text
      text: ' ihany'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy lilia eny an-dohasaha.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Niteny ny malalako ka nanao tamiko hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa, indro, lasa ny ririnina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ritra tsy misy intsony ny ranonorana;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Miposaka eo amin’ny tany ny voninkazo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga ny taona fanaovam-peo fifaliana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary re atỳ amin’ny tanintsika ny feon’ny domohina.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny aviavy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aviavimbazaha.
      marker-yv: yv-n
    - type: text
      text: ' mahamanitra ny voany tanora,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamony ny voaloboka ka mamerovero tsara.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: E, ry voromailalako ao amin’ny tsefatsefaky ny harambato,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ao amin’ny fialokalofana amin’ny fiakarana mideza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hahita ny endrikao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy handre ny feonao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mamy ny feonao, sady mahafinaritra ny endrikao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Sambory ny amboahaolo, dia ireo amboahaolo madinika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manimba ny tanimboaloboka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa mamony izao ny voalobotsika.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ahy ny malalako, ary azy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay miandry ny ondriny eny amin’ny lilia.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mandositra ny aloka.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitodiha, ry ilay malalako, ary aoka ho tahaka ny gazela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaram-biby haingan-tongotra.
      marker-yv: yv-n
    - type: text
      text: ' na ny diera'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaram-biby haingan-tongotra.
      marker-yv: yv-n
    - type: text
      text: ' tanora'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-tendrombohitra be hantsana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tendrombohitra manelanelana.
      marker-yv: yv-n
    - type: text
      text: ' hianao.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Toy ny lilia eo amin’ny tsilo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany tompokovavy havako eo amin’ny zazavavy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Toy ny hazo poma amin’ny hazo any an-ala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany ny malalako eo amin’ny zatovo.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahafinaritra ahy indrindra ny mipetraka eo ambanin’ny alokalony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mamy ao am-bavako ny voany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nentiny ho ao an-tranon-divay aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanevany eo amboniko dia fitiavana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hatanjaho amin’ampempam-boaloboka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary velombelomy amin’ny poma aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mararim-pitia.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aoka ny tànany ankavia hanondana ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny tànany ankavanana hanohona ahy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mampianiana anareo amin’ny gazela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaram-biby haingan-tongotra.
      marker-yv: yv-n
    - type: text
      text: ' na amin’ny dieravavy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaram-biby haingan-tongotra.
      marker-yv: yv-n
    - type: text
      text: ' any an-tsaha aho, ry zanakavavin’i Jerosalema:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manaitra na mamoha ny fitiavana raha tsy efa sitrapony.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Tenin’ny ampakarina, raha nitoetra irery izy.
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: INJAY, ny feon’ilay malalako! Indro, tamy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miantsambotsambotra eny an-tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitsambikimbikina eny amin’ny havoana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny malalako dia tahaka ny gazela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaram-biby haingan-tongotra.
      marker-yv: yv-n
    - type: text
      text: ' na ny diera'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaram-biby haingan-tongotra.
      marker-yv: yv-n
    - type: text
      text: ' tanora;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, mijanona eo ala-tranonay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ivelan ny rindrinay
      marker-yv: yv-n
    - type: text
      text: ' izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsidika eo am-baravarankely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manarangarana eo amin’ny makarakara.
