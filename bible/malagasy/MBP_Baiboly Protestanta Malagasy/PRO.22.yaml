document_id: PRO.22,873
type_code: plt
verses:
  '1':
  - type: text
    content: Aleo ho tsara laza toy izay ho be harena,
  - type: text
    content: Ary tsara ny fitia noho ny volafotsy sy ny volamena.
  '10':
  - type: text
    content: Roahy ny mpaniratsira, dia ho afaka ny fifandirana,
  - type: text
    content: Eny, hitsahatra ny ady sy ny fahafaham-baraka.
  '11':
  - type: text
    content: Izay tia fahadiovam-po, dia milaza soa ny molony.
  - type: text
    content: Sady sakaizan’ny mpanjaka izy.
  '12':
  - type: text
    content: 'Ny mason’i Jehovah miaro ny '
  - type: text
    content: manam
  - type: text
    content: -pahalalana;
  - type: text
    content: Fa ny tenin’ny mpivadika dia foanany.
  '13':
  - type: text
    content: 'Hoy ny malaina: Misy liona any ivelany;'
  - type: text
    content: Ho fatin’ny sasany any an-dàlambe aho.
  '14':
  - type: text
    content: Ny vavan’ny vehivavy jejo
  - type: note
    content: Heb. vehivavy tsy vadiny.
  - type: text
    content: ' dia lavaka lalina;'
  - type: text
    content: Izay voaozon’i Jehovah no ho latsaka ao.
  '15':
  - type: text
    content: Miraikitra amin’ny fon’ny zaza ny hadalana;
  - type: text
    content: Fa ny tsorakazo famaizana no hampanalavitra izany aminy.
  '16':
  - type: text
    content: Izay mampahory ny malahelo dia mampitombo ny hareny;
  - type: text
    content: Fa izay manome ho an’ny manana kosa dia mampihena ny hareny.
  - type: heading
    content: Ohabolana ny amin’ny fahamarinana sy ny fitondrantenan’ny hendry.
  '17':
  - type: text
    content: ATONGILANO ny sofinao, ka henoy ny tenin’ny hendry,
  - type: text
    content: Ary ampitandremo ny fahalalako ny fonao;
  '18':
  - type: text
    content: Fa mahafinaritra raha voatahirinao ao an-kibonao izany,
  - type: text
    content: Koa aoka samy ho eo amin’ny molotrao.
  '19':
  - type: text
    content: Hianao dia hianao no nampahafantariko izany,
  - type: text
    content: Mba hitokianao amin’i Jehovah.
  '2':
  - type: text
    content: Mihaona ny manan-karena sy ny malahelo;
  - type: text
    content: Fa Jehovah no Mpanao azy roa tonta.
  '20':
  - type: text
    content: Tsy efa nanoratra zava-tsoa ho anao va aho,
  - type: text
    content: Izay misy hevitra tsara sy fahalalana,
  '21':
  - type: text
    content: Mba hampahafantariko ny fahamarinan’ny teny mahatoky hianao,
  - type: text
    content: Sy hahazoanao teny holazaina amin’izay naniraka anao?
  '22':
  - type: text
    content: Aza manosihosy ny malahelo, saingy malahelo izy;
  - type: text
    content: Ary aza dia manifakifa ny ory eo am-bavahady;
  '23':
  - type: text
    content: Fa Jehovah anie ka hisolo vava azy amin’ny adiny.
  - type: text
    content: Ary hanimba ny ain’izay manimba azy.
  '24':
  - type: text
    content: Aza misakaiza amin’ny olona mora tezitra,
  - type: text
    content: Ary aza miara-dia amin’ny olona foizina,
  '25':
  - type: text
    content: Fandrao hianao mianatra ny fanaony
  - type: text
    content: Ka mahazo fandrika ho an’ny ainao.
  '26':
  - type: text
    content: Aza mety ho isan’ny mifandray tànana,
  - type: text
    content: Na izay mianto-trosa;
  '27':
  - type: text
    content: Raha tsy manan-kaloa hianao,
  - type: text
    content: Nahoana no dia halainy ny lafika andrianao?
  '28':
  - type: text
    content: Aza manakisaka ny fari-tany ela,
  - type: text
    content: Izay naorin’ny razanao.
  '29':
  - type: text
    content: Mahita olona mailaka amin’ny raharahany va hianao?
  - type: text
    content: Eo anatrehan’ny mpanjaka no hitsanganany,
  - type: text
    content: Fa tsy hitsangana eo anatrehan’ny olona ambany izy.
  '3':
  - type: text
    content: Ny mahira-tsaina mahatsinjo ny loza ka miery;
  - type: text
    content: Fa ny kely saina kosa mandroso ka voa.
  '4':
  - type: text
    content: Ny valin’ny fanetren-tena sy ny fahatahorana an’i Jehovah
  - type: text
    content: Dia harena sy voninahitra ary fiainana.
  '5':
  - type: text
    content: Tsilo sy fandrika no amin’ny alehan’ ny maditra;
  - type: text
    content: Fa izay te-hiaro ny ainy dia manalavitra izany.
  '6':
  - type: text
    content: Zaro amin’izay làlana tokony halehany ny zaza,
  - type: text
    content: Ka na rehefa antitra aza izy, dia tsy hiala amin’izany.
  '7':
  - type: text
    content: Ny manan-karena dia manapaka ny malahelo,
  - type: text
    content: Ary izay misambotra dia mpanompon’ny mampisambotra.
  '8':
  - type: text
    content: Izay mamafy heloka dia hijinja fahoriana,
  - type: text
    content: Ary ho levona ny tsorakazon’ny fahatezerany.
  '9':
  - type: text
    content: Izay manana maso miantra hotahina,
  - type: text
    content: Satria anomezany ho an’ny malahelo ny haniny.
