document_id: PRO.22
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aleo ho tsara laza toy izay ho be harena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsara ny fitia noho ny volafotsy sy ny volamena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihaona ny manan-karena sy ny malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no Mpanao azy roa tonta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny mahira-tsaina mahatsinjo ny loza ka miery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny kely saina kosa mandroso ka voa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny valin’ny fanetren-tena sy ny fahatahorana an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia harena sy voninahitra ary fiainana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsilo sy fandrika no amin’ny alehan’ ny maditra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay te-hiaro ny ainy dia manalavitra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Zaro amin’izay làlana tokony halehany ny zaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka na rehefa antitra aza izy, dia tsy hiala amin’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny manan-karena dia manapaka ny malahelo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay misambotra dia mpanompon’ny mampisambotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mamafy heloka dia hijinja fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho levona ny tsorakazon’ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay manana maso miantra hotahina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria anomezany ho an’ny malahelo ny haniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Roahy ny mpaniratsira, dia ho afaka ny fifandirana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hitsahatra ny ady sy ny fahafaham-baraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay tia fahadiovam-po, dia milaza soa ny molony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady sakaizan’ny mpanjaka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny mason’i Jehovah miaro ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: manam
  - type: text
    text: -pahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tenin’ny mpivadika dia foanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy ny malaina: Misy liona any ivelany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho fatin’ny sasany any an-dàlambe aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny vavan’ny vehivavy jejo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vehivavy tsy vadiny.
    marker-yv: yv-n
  - type: text
    text: ' dia lavaka lalina;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay voaozon’i Jehovah no ho latsaka ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Miraikitra amin’ny fon’ny zaza ny hadalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tsorakazo famaizana no hampanalavitra izany aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay mampahory ny malahelo dia mampitombo ny hareny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay manome ho an’ny manana kosa dia mampihena ny hareny.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ohabolana ny amin’ny fahamarinana sy ny fitondrantenan’ny hendry.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ATONGILANO ny sofinao, ka henoy ny tenin’ny hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampitandremo ny fahalalako ny fonao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa mahafinaritra raha voatahirinao ao an-kibonao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa aoka samy ho eo amin’ny molotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hianao dia hianao no nampahafantariko izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hitokianao amin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy efa nanoratra zava-tsoa ho anao va aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay misy hevitra tsara sy fahalalana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mba hampahafantariko ny fahamarinan’ny teny mahatoky hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hahazoanao teny holazaina amin’izay naniraka anao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aza manosihosy ny malahelo, saingy malahelo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza dia manifakifa ny ory eo am-bavahady;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa Jehovah anie ka hisolo vava azy amin’ny adiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanimba ny ain’izay manimba azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aza misakaiza amin’ny olona mora tezitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza miara-dia amin’ny olona foizina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fandrao hianao mianatra ny fanaony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mahazo fandrika ho an’ny ainao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Aza mety ho isan’ny mifandray tànana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na izay mianto-trosa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Raha tsy manan-kaloa hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana no dia halainy ny lafika andrianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aza manakisaka ny fari-tany ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay naorin’ny razanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mahita olona mailaka amin’ny raharahany va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo anatrehan’ny mpanjaka no hitsanganany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hitsangana eo anatrehan’ny olona ambany izy.
