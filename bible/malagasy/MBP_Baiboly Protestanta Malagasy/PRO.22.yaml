document_id: PRO.22,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo ho tsara laza toy izay ho be harena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsara ny fitia noho ny volafotsy sy ny volamena.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roahy ny mpaniratsira, dia ho afaka ny fifandirana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hitsahatra ny ady sy ny fahafaham-baraka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tia fahadiovam-po, dia milaza soa ny molony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady sakaizan’ny mpanjaka izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny mason’i Jehovah miaro ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manam
    - type: text
      text: -pahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tenin’ny mpivadika dia foanany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy ny malaina: Misy liona any ivelany;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fatin’ny sasany any an-dàlambe aho.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavan’ny vehivavy jejo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vehivavy tsy vadiny.
      marker-yv: yv-n
    - type: text
      text: ' dia lavaka lalina;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay voaozon’i Jehovah no ho latsaka ao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miraikitra amin’ny fon’ny zaza ny hadalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tsorakazo famaizana no hampanalavitra izany aminy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mampahory ny malahelo dia mampitombo ny hareny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay manome ho an’ny manana kosa dia mampihena ny hareny.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ohabolana ny amin’ny fahamarinana sy ny fitondrantenan’ny hendry.
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ATONGILANO ny sofinao, ka henoy ny tenin’ny hendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ampitandremo ny fahalalako ny fonao;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahafinaritra raha voatahirinao ao an-kibonao izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa aoka samy ho eo amin’ny molotrao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao dia hianao no nampahafantariko izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hitokianao amin’i Jehovah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihaona ny manan-karena sy ny malahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no Mpanao azy roa tonta.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy efa nanoratra zava-tsoa ho anao va aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay misy hevitra tsara sy fahalalana,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampahafantariko ny fahamarinan’ny teny mahatoky hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hahazoanao teny holazaina amin’izay naniraka anao?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manosihosy ny malahelo, saingy malahelo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza dia manifakifa ny ory eo am-bavahady;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah anie ka hisolo vava azy amin’ny adiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanimba ny ain’izay manimba azy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza misakaiza amin’ny olona mora tezitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza miara-dia amin’ny olona foizina,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao hianao mianatra ny fanaony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mahazo fandrika ho an’ny ainao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mety ho isan’ny mifandray tànana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na izay mianto-trosa;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy manan-kaloa hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no dia halainy ny lafika andrianao?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manakisaka ny fari-tany ela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay naorin’ny razanao.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahita olona mailaka amin’ny raharahany va hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo anatrehan’ny mpanjaka no hitsanganany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy hitsangana eo anatrehan’ny olona ambany izy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mahira-tsaina mahatsinjo ny loza ka miery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny kely saina kosa mandroso ka voa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny valin’ny fanetren-tena sy ny fahatahorana an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia harena sy voninahitra ary fiainana.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsilo sy fandrika no amin’ny alehan’ ny maditra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay te-hiaro ny ainy dia manalavitra izany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zaro amin’izay làlana tokony halehany ny zaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka na rehefa antitra aza izy, dia tsy hiala amin’izany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny manan-karena dia manapaka ny malahelo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay misambotra dia mpanompon’ny mampisambotra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamafy heloka dia hijinja fahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho levona ny tsorakazon’ny fahatezerany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manana maso miantra hotahina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria anomezany ho an’ny malahelo ny haniny.
