document_id: PSA.96
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Hira fifaliana noho ny hihavian’ny fanjakan’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIHIRÀ fihiram-baovao ho an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihirà ho an’i Jehovah, ry tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihirà ho an’i Jehovah, misaora ny anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lazao isan-andro isan-andro ny famonjeny mahafaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ambarao any amin’ny jentilisa ny voninahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any amin’ny firenena rehetra ny fahagagana ataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa lehibe Jehovah ka mendrika hoderaina indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mahatahotra, fa ambonin’ny andriamanitra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa ny andriamanitry ny firenena dia tsinontsinona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no nanao ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Famirapiratana sy voninahitra no eo anatrehany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hery sy fahatsaran-tarehy no ao amin’ny fitoerany masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ry firenena, manomeza an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manomeza voninahitra sy hery ho an’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Manomeza an’i Jehovah ny voninahitry ny anarany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitondrà fanatitra, ka mankanesa eo an-kianjany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miankohofa eo anatrehan’i Jehovah amin’ny fihaingoana masina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangovita eo anatrehany, ry tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lazao any amin’ny jentilisa fa Jehovah no Mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izao rehetra izao voaorina ka tsy hihetsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsara ny olona amin’ny fahamarinana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka ho faly ny lanitra, ary ho ravoravo ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka ho faly ny saha sy izay rehetra eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hihoby amin’izay ny hazo rehetra any an-ala
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eo anatrehan’i Jehovah, fa avy Izy,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, avy hitsara ny tany Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsara izao tontolo izao araka ny rariny Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny firenena amin’ny fahamarinany.
