document_id: PSA.96,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fifaliana noho ny hihavian’ny fanjakan’Andriamanitra.
  - type: text
    content: MIHIRÀ fihiram-baovao ho an’i Jehovah;
  - type: text
    content: Mihirà ho an’i Jehovah, ry tany rehetra.
  '10':
  - type: text
    content: Lazao any amin’ny jentilisa fa Jehovah no Mpanjaka;
  - type: text
    content: Ary izao rehetra izao voaorina ka tsy hihetsika;
  - type: text
    content: Hitsara ny olona amin’ny fahamarinana Izy.
  '11':
  - type: text
    content: Aoka ho faly ny lanitra, ary ho ravoravo ny tany;
  - type: text
    content: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy.
  '12':
  - type: text
    content: Aoka ho faly ny saha sy izay rehetra eo aminy;
  - type: text
    content: Dia hihoby amin’izay ny hazo rehetra any an-ala
  '13':
  - type: text
    content: Eo anatrehan’i Jehovah, fa avy Izy,–
  - type: text
    content: Eny, avy hitsara ny tany Izy;
  - type: text
    content: Hitsara izao tontolo izao araka ny rariny Izy
  - type: text
    content: Ary ny firenena amin’ny fahamarinany.
  '2':
  - type: text
    content: Mihirà ho an’i Jehovah, misaora ny anarany;
  - type: text
    content: Lazao isan-andro isan-andro ny famonjeny mahafaly.
  '3':
  - type: text
    content: Ambarao any amin’ny jentilisa ny voninahiny,
  - type: text
    content: Ary any amin’ny firenena rehetra ny fahagagana ataony.
  '4':
  - type: text
    content: Fa lehibe Jehovah ka mendrika hoderaina indrindra,
  - type: text
    content: Sady mahatahotra, fa ambonin’ny andriamanitra rehetra.
  '5':
  - type: text
    content: Fa ny andriamanitry ny firenena dia tsinontsinona;
  - type: text
    content: Fa Jehovah no nanao ny lanitra.
  '6':
  - type: text
    content: Famirapiratana sy voninahitra no eo anatrehany;
  - type: text
    content: Hery sy fahatsaran-tarehy no ao amin’ny fitoerany masina.
  '7':
  - type: text
    content: Ry firenena, manomeza an’i Jehovah,
  - type: text
    content: Eny, manomeza voninahitra sy hery ho an’i Jehovah.
  '8':
  - type: text
    content: Manomeza an’i Jehovah ny voninahitry ny anarany;
  - type: text
    content: Mitondrà fanatitra, ka mankanesa eo an-kianjany.
  '9':
  - type: text
    content: Miankohofa eo anatrehan’i Jehovah amin’ny fihaingoana masina;
  - type: text
    content: Mangovita eo anatrehany, ry tany rehetra.
