document_id: TIT.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mampahatsiarova azy hanaiky izay manapaka sy manam-pahefana, hanoa tsara, ho vonona ho amin’ny asa tsara rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: tsy hiteny ratsy olona, tsy ho mpila ady, fa ho mpandefitra, maneho ny halemem-panahy rehetra amin’ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa isika koa dia adala fahiny, tsy nanaiky, voafitaka, dia andevon’ny filana sy ny fahafinaretana maro, ary velona teo amin’ny lolompo sy ny fialonana, sady hala no nifankahala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa rehefa niseho ny fahamoram-panahin’Andriamanitra, Mpamonjy antsika, sy ny fitiavany ny olona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia tsy avy tamin’ny asa amin’ny fahamarinana izay nataontsika, fa araka ny famindrampo kosa no namonjeny antsika, tamin’ny fanasan’ny fiterahana indray sy ny fanavaozan’ny Fanahy Masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay naidiny betsaka tamintsika tamin’ny alalan’i Jesosy Kristy, Mpamonjy antsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mba hohamarinina amin’ny fahasoavany isika ka ho tonga mpandova araka ny fanantenana ny fiainana mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mahatoky izany teny izany, ary izany zavatra izany dia tiako hitompoanao mafy, mba hotandreman’izay efa mino an’Andriamanitra ny hanao asa tsara. Sady tsara no mahasoa ny olona izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa halaviro ny fanontaniana adala sy ny tantaram-pirazanana sy ny fifandirana sy ny ady teny ny amin’ny lalàna; fa tsy mahasoa sady zava-poana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mpanao hevi-diso,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: olona mitokana ho azy.
    marker-yv: yv-n
  - type: text
    text: ' rehefa nanarinao indray maka na indroa, dia ialao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: satria fantatrao fa voavadika izay manao izany ka sady manota no manamelo-tena koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rehefa maniraka an’i Artema na Tykiko ho atỳ aminao aho, dia mazotoa hankany amiko any Nikopolia hianao, fa mikasa handany ny ririnina any aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mazotoa hamoaka an’i Zena mpahay lalàna sy Apolosy, mba tsy hisy zavatra hilainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary aoka ny antsika koa hianatra hanao asa tsara hahazoany izay ilainy, fandrao tsy hisy vokatra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Manao veloma anao izay rehetra atỳ amiko. Manaova veloma izay rehetra tia anay amin’ny finoana.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ho aminareo rehetra anie ny fahasoavana.
