document_id: ZEC.10,873
type_code: plt
verses:
  '1':
  - type: text
    content: Mangataha ranonorana amin’i Jehovah hianareo amin’ny andro fara-orana,
  - type: text
    content: Dia amin’i Jehovah, Izay manao ny helatra;
  - type: text
    content: Ranonorana mivatravatra no homeny azy,
  - type: text
    content: Eny, samy homeny ny zava-maitso any an-tsaha ireny.
  '10':
  - type: text
    content: Dia hampody azy avy any amin’ny tany Egypta Aho
  - type: text
    content: Sy hanangona azy avy any Asyria;
  - type: text
    content: Ary ho any amin’ny tany Gileada sy Libanona no hitondrako azy,
  - type: text
    content: Ka tsy ho omby azy izany.
  '11':
  - type: text
    content: Dia hamaky ny ranomasim-pahoriana izy
  - type: text
    content: Ka hamely ny onjan-dranomasina,
  - type: text
    content: Ho ritra ny rano lalin’i Neily rehetra,
  - type: text
    content: Haetry ny avonavon’i Asyria,
  - type: text
    content: Ary hiala ny tehina fanapahan’i Egypta.
  '12':
  - type: text
    content: Dia hampahereziko ao amin’i Jehovah izy,
  - type: text
    content: Ka ny anarany no handehanany, hoy Jehovah.
  '2':
  - type: text
    content: Fa ny sampy
  - type: note
    content: Heb. terafima.
  - type: text
    content: ' niteny zava-poana,'
  - type: text
    content: Ary ny mpanao fankatovana nahita lainga
  - type: text
    content: Ka nilaza nofy lainga,
  - type: text
    content: Foana ny nampiononany;
  - type: text
    content: Koa izany no naniavany toy ny ondry
  - type: text
    content: Ory izy, satria tsy misy mpiandry.
  '3':
  - type: text
    content: Amin’ny mpiandry ondry no irehetan’ny fahatezerako,
  - type: text
    content: Ary ireo osilahy no hovaliako;
  - type: text
    content: Fa Jehovah, Tompon’ny maro, efa namangy ny taranak’i Joda ondriny
  - type: text
    content: Ka manao azy toy ny soavaliny miravaka eo amin’ny ady.
  '4':
  - type: text
    content: Avy ao aminy no hihavian’ny fehizoro,
  - type: text
    content: Avy ao aminy no hihavian’ny fihantonan-javatra,
  - type: text
    content: Avy ao aminy no hihavian’ny tsipìka fiadiana,
  - type: text
    content: Avy ao aminy no hihavian’ny mpampahory rehetra.
  '5':
  - type: text
    content: Ary ho toy ny lehilahy mahery ireo,
  - type: text
    content: Izay manitsaka ny fotaka eny an-dàlana amin’ny ady,
  - type: text
    content: Hiady izy, satria Jehovah no momba azy;
  - type: text
    content: Ary homenarina ny mpitaingin-tsoavaly.
  '6':
  - type: text
    content: Hampahery ny taranak’i Joda Aho,
  - type: text
    content: Ary ny taranak’i Josefa hovonjeko ka hampodiko,
  - type: note
    content: 'Na: hamponeniko.'
  - type: text
    content: Satria mamindra fo aminy Aho,
  - type: text
    content: Ka ho toy izay tsy nariako izy;
  - type: text
    content: Fa Izaho no Jehovah Andriamaniny ka hihaino azy.
  '7':
  - type: text
    content: Ho toy ny lehilahy mahery Efraima,
  - type: text
    content: Ary hifaly toy ny azon’ny divay ny fony;
  - type: text
    content: Ny zanany hahita ka ho faly;
  - type: text
    content: Hifaly amin’i Jehovah ny fony.
  '8':
  - type: text
    content: Hisiaka hiantso azy Aho ka hanangona azy,
  - type: text
    content: Fa efa nanavotra azy Aho;
  - type: text
    content: Ka dia mbola hihamaro toy ny efa nihamaroany ihany izy.
  '9':
  - type: text
    content: Ary hafafiko any amin’ny firenena izy,
  - type: text
    content: Ka any amin’ny tany lavitra no hahatsiarovany Ahy;
  - type: note
    content: 'Na: Ary na dia hafafiko any amin’ny firenena aza izy, dia hahatsiaro Ahy any amin’ny tany lavitra.'
  - type: text
    content: Ary samy ho velona izy mbamin’ny zanany ka hiverina.
