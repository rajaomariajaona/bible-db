document_id: ZEC.10
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mangataha ranonorana amin’i Jehovah hianareo amin’ny andro fara-orana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’i Jehovah, Izay manao ny helatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ranonorana mivatravatra no homeny azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, samy homeny ny zava-maitso any an-tsaha ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny sampy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terafima.
    marker-yv: yv-n
  - type: text
    text: ' niteny zava-poana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanao fankatovana nahita lainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nilaza nofy lainga,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foana ny nampiononany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izany no naniavany toy ny ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ory izy, satria tsy misy mpiandry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amin’ny mpiandry ondry no irehetan’ny fahatezerako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ireo osilahy no hovaliako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah, Tompon’ny maro, efa namangy ny taranak’i Joda ondriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manao azy toy ny soavaliny miravaka eo amin’ny ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Avy ao aminy no hihavian’ny fehizoro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy ao aminy no hihavian’ny fihantonan-javatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy ao aminy no hihavian’ny tsipìka fiadiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy ao aminy no hihavian’ny mpampahory rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ho toy ny lehilahy mahery ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manitsaka ny fotaka eny an-dàlana amin’ny ady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiady izy, satria Jehovah no momba azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary homenarina ny mpitaingin-tsoavaly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hampahery ny taranak’i Joda Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taranak’i Josefa hovonjeko ka hampodiko,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hamponeniko.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria mamindra fo aminy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho toy izay tsy nariako izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izaho no Jehovah Andriamaniny ka hihaino azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho toy ny lehilahy mahery Efraima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hifaly toy ny azon’ny divay ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanany hahita ka ho faly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hifaly amin’i Jehovah ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hisiaka hiantso azy Aho ka hanangona azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nanavotra azy Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia mbola hihamaro toy ny efa nihamaroany ihany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary hafafiko any amin’ny firenena izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka any amin’ny tany lavitra no hahatsiarovany Ahy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary na dia hafafiko any amin’ny firenena aza izy, dia hahatsiaro Ahy any amin’ny tany lavitra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary samy ho velona izy mbamin’ny zanany ka hiverina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia hampody azy avy any amin’ny tany Egypta Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanangona azy avy any Asyria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho any amin’ny tany Gileada sy Libanona no hitondrako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho omby azy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia hamaky ny ranomasim-pahoriana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamely ny onjan-dranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho ritra ny rano lalin’i Neily rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haetry ny avonavon’i Asyria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiala ny tehina fanapahan’i Egypta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia hampahereziko ao amin’i Jehovah izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ny anarany no handehanany, hoy Jehovah.
