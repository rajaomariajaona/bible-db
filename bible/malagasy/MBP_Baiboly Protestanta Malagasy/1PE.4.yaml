document_id: 1PE.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: Koa satria niaritra tamin’ny nofo Kristy, dia alao mba ho fiadianareo koa izany saina izany; fa izay niaritra tamin’ny nofo dia efa afaka
  - type: note
    content: Gr. nampitsaharina.
  - type: text
    content: ' amin’ny ota; '
  '10':
  - type: text
    content: 'Samia mifanompo araka ny fanomezam-pahasoavana izay noraisinareo, dia tahaka ny mpitandrina tsara ny fahasoavana maro samy hafa izay an’Andriamanitra. '
  '11':
  - type: text
    content: 'Raha misy olona miteny, dia '
  - type: text
    content: aoka izy hiteny
  - type: text
    content: ' toy ny milaza tenin’Andriamanitra; raha misy olona manompo, dia '
  - type: text
    content: aoka izy hanao izany
  - type: text
    content: ' araka ny hery izay omen’Andriamanitra '
  - type: text
    content: azy;
  - type: text
    content: ' mba hankalazana an’Andriamanitra amin’ny zavatra rehetra amin’ny alalan’i Jesosy Kristy; fa Azy ny voninahitra sy ny fanjakana mandrakizay mandrakizay. Amena.'
  - type: heading
    content: Fananarana mba hiaritra, raha enjehina noho ny fahamarinana.
  '12':
  - type: text
    content: 'RY malala, aza gaga noho ny fizahan-toetra mahamay izay mahazo anareo ho fitsapan-toetra, ary aza atao ho zavatra mahagaga manjo anareo izany; '
  '13':
  - type: text
    content: fa araka ny iombonanareo fijaliana amin’i Kristy dia mifalia, mba hiravoravoanareo indrindra amin’ny fisehoan’ny voninahiny koa.
  '14':
  - type: text
    content: 'Sambatra hianareo, raha haratsina noho ny anaran’i Kristy; fa ny Fanahin’ny voninahitra, dia ny Fanahin’Andriamanitra, mipetraka ao aminareo. '
  '15':
  - type: text
    content: 'Fa aoka tsy hisy eo aminareo hijaly satria mpamono olona, na mpangalatra, na mpanao ratsy, na mpiraharaha ny an’olona. '
  '16':
  - type: text
    content: 'Fa raha '
  - type: text
    content: misy mijaly
  - type: text
    content: ' satria Kristiana, dia aoka tsy ho menatra izy; fa aoka hankalaza an’Andriamanitra amin’izany anarana izany izy.'
  '17':
  - type: text
    content: Fa tonga ny andro hiantombohan’ny fitsarana hatrao amin’ny ankohonan’
  - type: note
    content: Gr. trano.
  - type: text
    content: ' Andriamanitra; ary raha miantomboka amintsika izany, dia hanao ahoana kosa no hiafaran’izay tsy manaiky ny filazantsaran’Andriamanitra? '
  '18':
  - type: text
    content: 'Ary ,,raha saiky tsy voavonjy ny marina, aiza no hisehoan’ny ratsy fanahy sy ny mpanota?’’ (Oha. 11.31). '
  '19':
  - type: text
    content: Koa izay mitondra fahoriana araka ny sitrapon’Andriamanitra, dia aoka ny fanaovan-tsoa no hanolorany ny fanahiny ho an’Ilay mahatoky, dia ny Mpanao azy.
  '2':
  - type: text
    content: 'mba tsy handanianareo ny andro sisa iainanareo amin’ny nofo araka ny filan’ny olona intsony, fa araka ny sitrapon’Andriamanitra. '
  '3':
  - type: text
    content: 'Fa ampy izay ny andro lasa ho nanaovana ny fanaon’ny jentilisa tamin’ny nandehanana tamin’ny fijejojejoana sy ny fanirian-dratsy sy ny fimamoana sy ny filalaovan-dratsy sy ny fisotroan-toaka ary ny fanompoan-tsampy izay fady indrindra; '
  '4':
  - type: text
    content: 'ary amin’izany dia gaga izy ireo, satria tsy miara-mihazakazaka aminy hianareo amin’izany fanaranam-po amin’ny ratsy izany, ka dia teneniny ratsy; '
  '5':
  - type: text
    content: 'nefa hampamoahin’Ilay efa vonona hitsara ny velona sy ny maty izy. '
  '6':
  - type: text
    content: 'Fa noho izao no nitoriana ny filazantsara tamin’izay maty aza: mba hotsaraina araka ny olona amin’ny nofo izy, fa ho velona araka an’Andriamanitra amin’ny fanahy.'
  '7':
  - type: text
    content: 'Fa antomotra ny faran’ny zavatra rehetra; koa hendre ka mahonona tena ho amin’ny fivavahana. '
  '8':
  - type: text
    content: 'Ary mihoatra noho ny zavatra rehetra, mifankatiava tsara: fa ,,ny fitiavana manarona fahotana maro’’ (Oha. 10.12). '
  '9':
  - type: text
    content: Mifampiantranoa, ka aza mimonomonona.
