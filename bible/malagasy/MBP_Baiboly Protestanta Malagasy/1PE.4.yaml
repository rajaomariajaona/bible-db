document_id: 1PE.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Koa satria niaritra tamin’ny nofo Kristy, dia alao mba ho fiadianareo koa izany saina izany; fa izay niaritra tamin’ny nofo dia efa afaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nampitsaharina.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny ota; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba tsy handanianareo ny andro sisa iainanareo amin’ny nofo araka ny filan’ny olona intsony, fa araka ny sitrapon’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ampy izay ny andro lasa ho nanaovana ny fanaon’ny jentilisa tamin’ny nandehanana tamin’ny fijejojejoana sy ny fanirian-dratsy sy ny fimamoana sy ny filalaovan-dratsy sy ny fisotroan-toaka ary ny fanompoan-tsampy izay fady indrindra; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary amin’izany dia gaga izy ireo, satria tsy miara-mihazakazaka aminy hianareo amin’izany fanaranam-po amin’ny ratsy izany, ka dia teneniny ratsy; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'nefa hampamoahin’Ilay efa vonona hitsara ny velona sy ny maty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa noho izao no nitoriana ny filazantsara tamin’izay maty aza: mba hotsaraina araka ny olona amin’ny nofo izy, fa ho velona araka an’Andriamanitra amin’ny fanahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa antomotra ny faran’ny zavatra rehetra; koa hendre ka mahonona tena ho amin’ny fivavahana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary mihoatra noho ny zavatra rehetra, mifankatiava tsara: fa ,,ny fitiavana manarona fahotana maro’’ (Oha. 10.12). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifampiantranoa, ka aza mimonomonona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Samia mifanompo araka ny fanomezam-pahasoavana izay noraisinareo, dia tahaka ny mpitandrina tsara ny fahasoavana maro samy hafa izay an’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha misy olona miteny, dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: aoka izy hiteny
  - type: text
    text: ' toy ny milaza tenin’Andriamanitra; raha misy olona manompo, dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: aoka izy hanao izany
  - type: text
    text: ' araka ny hery izay omen’Andriamanitra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: azy;
  - type: text
    text: ' mba hankalazana an’Andriamanitra amin’ny zavatra rehetra amin’ny alalan’i Jesosy Kristy; fa Azy ny voninahitra sy ny fanjakana mandrakizay mandrakizay. Amena.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana mba hiaritra, raha enjehina noho ny fahamarinana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'RY malala, aza gaga noho ny fizahan-toetra mahamay izay mahazo anareo ho fitsapan-toetra, ary aza atao ho zavatra mahagaga manjo anareo izany; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: fa araka ny iombonanareo fijaliana amin’i Kristy dia mifalia, mba hiravoravoanareo indrindra amin’ny fisehoan’ny voninahiny koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sambatra hianareo, raha haratsina noho ny anaran’i Kristy; fa ny Fanahin’ny voninahitra, dia ny Fanahin’Andriamanitra, mipetraka ao aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa aoka tsy hisy eo aminareo hijaly satria mpamono olona, na mpangalatra, na mpanao ratsy, na mpiraharaha ny an’olona. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha '
  - type: usfm
    marker: it
    children:
    - type: text
      text: misy mijaly
  - type: text
    text: ' satria Kristiana, dia aoka tsy ho menatra izy; fa aoka hankalaza an’Andriamanitra amin’izany anarana izany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa tonga ny andro hiantombohan’ny fitsarana hatrao amin’ny ankohonan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: trano.
    marker-yv: yv-n
  - type: text
    text: ' Andriamanitra; ary raha miantomboka amintsika izany, dia hanao ahoana kosa no hiafaran’izay tsy manaiky ny filazantsaran’Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ,,raha saiky tsy voavonjy ny marina, aiza no hisehoan’ny ratsy fanahy sy ny mpanota?’’ (Oha. 11.31). '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa izay mitondra fahoriana araka ny sitrapon’Andriamanitra, dia aoka ny fanaovan-tsoa no hanolorany ny fanahiny ho an’Ilay mahatoky, dia ny Mpanao azy.
