document_id: PSA.95,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana hivavaka amin’Andriamanitra sy hankatò ny teniny.
  - type: text
    content: AVIA, aoka isika hihoby ho an’i Jehovah;
  - type: text
    content: Aoka isika hanao feo fifaliana ho an’ny Vatolampy famonjena antsika.
  '10':
  - type: text
    content: Efa-polo taona no nahamonamonaina Ahy tamin’
  - type: text
    content: izany
  - type: text
    content: ' taranaka '
  - type: text
    content: izany,
  - type: text
    content: 'Ka hoy Izaho: Olona maniasia amin’ny fony izy'
  - type: text
    content: Ka tsy mahalala ny làlako;
  '11':
  - type: text
    content: 'Ka dia nianiana tamin’ny fahatezerako Aho hoe:'
  - type: text
    content: Tsy hiditra amin’ny fitsaharako mihitsy izy.
  '2':
  - type: text
    content: Aoka hankeo anatrehany amin’ny fiderana isika;
  - type: text
    content: Aoka hanao feo fifaliana ho Azy amin’ny fihirana isika.
  '3':
  - type: text
    content: Fa Andriamanitra lehibe Jehovah,
  - type: text
    content: Ary Mpanjaka lehibe ambonin’ny andriamanitra rehetra Izy.
  '4':
  - type: text
    content: Eo an-tànany ny fitoerana lalina amin’ny tany;
  - type: text
    content: Ary Azy ny tendrombohitra avo.
  '5':
  - type: text
    content: Azy ny ranomasina, fa Izy no nanao azy;
  - type: text
    content: Ary ny tany maina dia noforonin’ny tànany.
  '6':
  - type: text
    content: Avia, ka aoka hiondrika sy hiankohoka isika;
  - type: text
    content: Aoka isika handohalika eo anatrehan’i Jehovah, Mpanao antsika;
  '7':
  - type: text
    content: Fa Izy no Andriamanitsika;
  - type: text
    content: Ary olona fiandriny sy ondry tandremany isika.
  - type: text
    content: 'Enga anie ka hohenoinareo anio ny feony manao hoe:'
  '8':
  - type: text
    content: Aza
  - type: note
    content: 'Na: Anio, raha hihaino ny feony hianareo, dia aza.'
  - type: text
    content: ' manamafy ny fonareo tahaka ny tao Meriba,'
  - type: text
    content: Sy tahaka ny tamin’ny andro tao Masa, fony tany an-efitra,
  '9':
  - type: text
    content: Izay nakan’ny razanareo fanahy Ahy,
  - type: text
    content: Sy nizahany toetra Ahy, na dia efa hitany aza ny asako.
