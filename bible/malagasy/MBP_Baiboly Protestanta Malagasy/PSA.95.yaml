document_id: PSA.95
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiantsoana hivavaka amin’Andriamanitra sy hankatò ny teniny.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: AVIA, aoka isika hihoby ho an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka isika hanao feo fifaliana ho an’ny Vatolampy famonjena antsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka hankeo anatrehany amin’ny fiderana isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hanao feo fifaliana ho Azy amin’ny fihirana isika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Andriamanitra lehibe Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Mpanjaka lehibe ambonin’ny andriamanitra rehetra Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eo an-tànany ny fitoerana lalina amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Azy ny tendrombohitra avo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Azy ny ranomasina, fa Izy no nanao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany maina dia noforonin’ny tànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avia, ka aoka hiondrika sy hiankohoka isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka isika handohalika eo anatrehan’i Jehovah, Mpanao antsika;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa Izy no Andriamanitsika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary olona fiandriny sy ondry tandremany isika.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Enga anie ka hohenoinareo anio ny feony manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Anio, raha hihaino ny feony hianareo, dia aza.
    marker-yv: yv-n
  - type: text
    text: ' manamafy ny fonareo tahaka ny tao Meriba,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tahaka ny tamin’ny andro tao Masa, fony tany an-efitra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay nakan’ny razanareo fanahy Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nizahany toetra Ahy, na dia efa hitany aza ny asako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Efa-polo taona no nahamonamonaina Ahy tamin’
  - type: usfm
    marker: it
    children:
    - type: text
      text: izany
  - type: text
    text: ' taranaka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hoy Izaho: Olona maniasia amin’ny fony izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mahalala ny làlako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka dia nianiana tamin’ny fahatezerako Aho hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hiditra amin’ny fitsaharako mihitsy izy.
