document_id: EZK.43,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nidiran’ny voninahitr’i Jehovah ho ao amin’ny tempoly, sy ny teny nampitondrainy tamin’izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nentiny ho any amin’ny vavahady aho, dia ilay vavahady manatrika ny atsinanana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao, ry zanak’olona, asehoy amin’ny taranak’Isiraely ny trano mba hahamenatra azy ny amin’ny helony, ka dia horefesiny ny mari-trano. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha menatra ny amin’izay rehetra efa nataony izy, dia asehoy azy ny endriky ny trano mbamin’ny fombafombany sy ny fivoahana avy ao aminy sy ny fidirana ho ao aminy ary ny endriny rehetra sy ny didy rehetra aminy, eny, ny endriny rehetra ary ny lalàna rehetra aminy; koa soraty eo imasony izany, hitandremany ny endriny rehetra sy ny lalàny rehetra ka hanatanterahany izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lalàna amin’ny trano: Ho masina dia ho masina avokoa izay rehetra voafaritra ho azy eo an-tampon’ny tendrombohitra. Eny, izany no lalàna amin’ny trano.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny alitaran’ny fanatitra odorana sy ny fanokanana azy.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY izao no mariky ny alitara araka ny hakiho, nefa isaky ny hakiho iray dia mihoatra vodivoam-pelatànana noho ny fanao: Ny fara-vodiny dia iray hakiho, ary iray hakiho koa ny sakany, ary ny koronosiny manodidina dia irain-jehy; ireo no fiorenan’ny alitara. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hatramin’ny fara-vodiny eo amin’ny tany ka hatramin’ny rindriny ambany dia roa hakiho, ary ny sakany dia iray hakiho; ary hatramin’ny rindriny iva ka hatramin’ny rindriny avo dia efatra hakiho; ary ny sakany dia iray hakiho. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fanambonin’ny alitara
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Harela = tendrombohitr’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ' dia ho efatra hakiho, ary eo ambonin’ny fatana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ariela = fatan’Andriamanitra, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'lionan’Andriamanitra, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ka tokony ho anaran’ny momba ny fanambonin’ny alitara ireo.
      marker-yv: yv-n
    - type: text
      text: ' dia hisy tandroka efatra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Roa ambin’ny folo hakiho ny lavan’ny fatana,
