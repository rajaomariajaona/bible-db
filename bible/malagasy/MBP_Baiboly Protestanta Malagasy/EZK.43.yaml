document_id: EZK.43,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nidiran’ny voninahitr’i Jehovah ho ao amin’ny tempoly, sy ny teny nampitondrainy tamin’izany.
  - type: text
    content: 'ARY nentiny ho any amin’ny vavahady aho, dia ilay vavahady manatrika ny atsinanana. '
  '10':
  - type: text
    content: 'Hianao, ry zanak’olona, asehoy amin’ny taranak’Isiraely ny trano mba hahamenatra azy ny amin’ny helony, ka dia horefesiny ny mari-trano. '
  '11':
  - type: text
    content: 'Ary raha menatra ny amin’izay rehetra efa nataony izy, dia asehoy azy ny endriky ny trano mbamin’ny fombafombany sy ny fivoahana avy ao aminy sy ny fidirana ho ao aminy ary ny endriny rehetra sy ny didy rehetra aminy, eny, ny endriny rehetra ary ny lalàna rehetra aminy; koa soraty eo imasony izany, hitandremany ny endriny rehetra sy ny lalàny rehetra ka hanatanterahany izany. '
  '12':
  - type: text
    content: 'Izao no lalàna amin’ny trano: Ho masina dia ho masina avokoa izay rehetra voafaritra ho azy eo an-tampon’ny tendrombohitra. Eny, izany no lalàna amin’ny trano.'
  - type: heading
    content: Ny amin’ny alitaran’ny fanatitra odorana sy ny fanokanana azy.
  '13':
  - type: text
    content: 'ARY izao no mariky ny alitara araka ny hakiho, nefa isaky ny hakiho iray dia mihoatra vodivoam-pelatànana noho ny fanao: Ny fara-vodiny dia iray hakiho, ary iray hakiho koa ny sakany, ary ny koronosiny manodidina dia irain-jehy; ireo no fiorenan’ny alitara. '
  '14':
  - type: text
    content: 'Ary hatramin’ny fara-vodiny eo amin’ny tany ka hatramin’ny rindriny ambany dia roa hakiho, ary ny sakany dia iray hakiho; ary hatramin’ny rindriny iva ka hatramin’ny rindriny avo dia efatra hakiho; ary ny sakany dia iray hakiho. '
  '15':
  - type: text
    content: Ary ny fanambonin’ny alitara
  - type: note
    content: Heb. Harela = tendrombohitr’Andriamanitra.
  - type: text
    content: ' dia ho efatra hakiho, ary eo ambonin’ny fatana'
  - type: note
    content: Heb. Ariela = fatan’Andriamanitra, na lionan’Andriamanitra, ka tokony ho anaran’ny momba ny fanambonin’ny alitara ireo.
  - type: text
    content: ' dia hisy tandroka efatra. '
  '16':
  - type: text
    content: Roa ambin’ny folo hakiho ny lavan’ny fatana,
  - type: note
    content: Heb. Ariela = fatan’Andriamanitra, na lionan’Andriamanitra, ka tokony ho anaran’ny momba ny fanambonin’ny alitara ireo.
  - type: text
    content: ' ary roa ambin’ny folo hakiho koa ny sakany, ary efa-joro sokera izy. '
  '17':
  - type: text
    content: Ary ny rindriny dia efatra ambin’ny folo hakiho ny lavany, sy efatra ambin’ny folo hakiho koa ny sakany, amin’ny lafiny efatra; ary ny koronosiny manodidina dia antsasaky ny hakiho; ary ny fara-vodiny dia iray hakiho manodidina; ary ny ambaratongany dia manatrika ny atsinanana.
  '18':
  - type: text
    content: 'Ary hoy izy tamiko: Ry zanak’olona, izao no lazain’i Jehovah Tompo: Izao no didy ny amin’ny alitara amin’izay andro hanaovana azy, hanaterana fanatitra dorana sy hanopazana ra aminy: '
  '19':
  - type: text
    content: 'Ny Levita mpisorona, taranak’i Zadoka, izay manatona Ahy hanao fanompoam-pivavahana ho Ahy, dia homenao vantotr’ombilahy iray hatao fanatitra noho ny ota, hoy Jehovah Tompo. '
  '2':
  - type: text
    content: 'Ary, indro, tamy ny voninahitr’Andriamanitry ny Isiraely avy tany atsinanana; ary ny feony dia tahaka ny firohondrohon’ny rano be; ary ny tany dia namirapiratra azon’ny voninahiny. '
  '20':
  - type: text
    content: Dia hangalanao ny rany ka hatentinao amin’ny tandrony efatra sy amin’ny zorony efatra amin’ny rindriny ary amin’ny koronosiny manodidina; izany no hanadiovanao
  - type: note
    content: Ny dikan’ny teny Hebreo amin’ireo dia ny manafaka ota azy; izahao Lev. viii.15.
  - type: text
    content: ' azy sy hanaovanao fanavotana ho azy. '
  '21':
  - type: text
    content: 'Halainao koa ny vantotr’ombilahy hatao fanatitra noho ny ota ka hodorana ao amin’ny fitoerana voatendry ao amin’ny trano ivelan’ny fitoerana masina. '
  '22':
  - type: text
    content: Ary amin’ny andro faharoa no hanateranao osilahy tsy misy kilema hatao fanatitra noho ny ota; ary hodioviny
  - type: note
    content: Ny dikan’ny teny Hebreo amin’ireo dia ny manafaka ota azy; izahao Lev. viii.15.
  - type: text
    content: ' ny alitara tahaka ny nanadiovany'
  - type: note
    content: Ny dikan’ny teny Hebreo amin’ireo dia ny manafaka ota azy; izahao Lev. viii.15.
  - type: text
    content: ' azy tamin’ny vantotr’ombilahy. '
  '23':
  - type: text
    content: Ary rehefa vita ny anadiovanao
  - type: note
    content: Ny dikan’ny teny Hebreo amin’ireo dia ny manafaka ota azy; izahao Lev. viii.15.
  - type: text
    content: ' azy, dia hanatitra vantotr’ombilahy tsy misy kilema sy ondrilahy tsy misy kilema hianao. '
  '24':
  - type: text
    content: 'Ary haterinao eo anatrehan’i Jehovah ireo, ary ny mpisorona handraraka sira eo aminy, dia hanatitra azy ho fanatitra odorana ho an’i Jehovah. '
  '25':
  - type: text
    content: 'Hafitoana no hanateranao osilahy isan-andro hatao fanatitra noho ny ota sy vantotr’ombilahy sy ondrilahy izay tsy misy kilema. '
  '26':
  - type: text
    content: Hafitoana no hanaovany fanavotana ho an’ny alitara sy hanadiovany azy ary hanokanany
  - type: note
    content: Heb. hamenoana ny tànany.
  - type: text
    content: ' azy. '
  '27':
  - type: text
    content: Ary rehefa tapitra izany andro izany, dia hiantomboka amin’ny andro fahavalo ny hanateran’ny mpisorona ny fanatitra doranareo ao amin’ny alitara sy ny fanati-pihavananareo; ary dia hankasitrahako hianareo, hoy Jehovah Tompo.
  '3':
  - type: text
    content: 'Ary ny tarehin’ny zavatra hitako dia tahaka ny an’ilay efa hitako, fony aho tonga handrava ny tanàna; ary nisy tahaka ny tarehin’ilay efa hitako teo amoron’ny ony Kebara ihany; ka dia nikarapoka nihohoka aho. '
  '4':
  - type: text
    content: 'Ary ny voninahitr’i Jehovah dia niditra tamin’ny vavahady manatrika ny atsinanana ho ao an-trano. '
  '5':
  - type: text
    content: Dia nisy fanahy
  - type: note
    content: 'Na: rivotra.'
  - type: text
    content: ' nanainga ahy ka nitondra ahy niditra ho ao amin’ny kianja anatiny; ary, indro, feno ny voninahitr’i Jehovah ny trano.'
  '6':
  - type: text
    content: 'Dia reko fa nisy niteny tamiko tao an-trano; ary nisy lehilahy nitsangana teo anilako. '
  '7':
  - type: text
    content: 'Dia hoy Izy tamiko: Ry zanak’olona, eto no hitoeran’ny seza fiandrianako sy hitoeran’ny faladiako, izay honenako mandrakizay eto amin’ny Zanak’Isiraely; ary tsy holotoin’ny taranak’Isiraely, na izy na ny mpanjakany, amin’ny fijangajangany sy amin’ny sampin’'
  - type: note
    content: Heb. fatin’.
  - type: text
    content: ' ny mpanjakany ao amin’ny fitoerany avo intsony ny anarako masina,– '
  '8':
  - type: text
    content: 'tamin’ny nametrahany ny tokonam-baravaran’ireny teo anilan’ny tokonam-baravarako sy ny tolan’ireny teo anilan’ny tolako, ka rindrina ihany no teo anelanelako sy ireny, dia nolotoiny tamin’ny fahavetavetana nataony ny anarako masina; ka dia nahalany ringana azy tamin’ny fahatezerako Aho. '
  '9':
  - type: text
    content: Fa amin’izao kosa dia aoka hariany lavitra Ahy ny fijangajangany sy ny sampin’
  - type: note
    content: Heb. fatin’.
  - type: text
    content: ' ny mpanjakany, ka dia honina ao aminy mandrakizay Aho.'
