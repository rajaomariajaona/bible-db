        children:
        - type: text
          text: viii.15.
      marker-yv: yv-n
    - type: text
      text: ' azy tamin’ny vantotr’ombilahy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa vita ny anadiovanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny dikan’ny teny Hebreo amin’ireo dia ny manafaka ota azy; izahao Lev. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: viii.15.
      marker-yv: yv-n
    - type: text
      text: ' azy, dia hanatitra vantotr’ombilahy tsy misy kilema sy ondrilahy tsy misy kilema hianao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary haterinao eo anatrehan’i Jehovah ireo, ary ny mpisorona handraraka sira eo aminy, dia hanatitra azy ho fanatitra odorana ho an’i Jehovah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hafitoana no hanateranao osilahy isan-andro hatao fanatitra noho ny ota sy vantotr’ombilahy sy ondrilahy izay tsy misy kilema. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hafitoana no hanaovany fanavotana ho an’ny alitara sy hanadiovany azy ary hanokanany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hamenoana ny tànany.
      marker-yv: yv-n
    - type: text
      text: ' azy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa tapitra izany andro izany, dia hiantomboka amin’ny andro fahavalo ny hanateran’ny mpisorona ny fanatitra doranareo ao amin’ny alitara sy ny fanati-pihavananareo; ary dia hankasitrahako hianareo, hoy Jehovah Tompo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tarehin’ny zavatra hitako dia tahaka ny an’ilay efa hitako, fony aho tonga handrava ny tanàna; ary nisy tahaka ny tarehin’ilay efa hitako teo amoron’ny ony Kebara ihany; ka dia nikarapoka nihohoka aho. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny voninahitr’i Jehovah dia niditra tamin’ny vavahady manatrika ny atsinanana ho ao an-trano. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nisy fanahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rivotra.
      marker-yv: yv-n
    - type: text
      text: ' nanainga ahy ka nitondra ahy niditra ho ao amin’ny kianja anatiny; ary, indro, feno ny voninahitr’i Jehovah ny trano.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia reko fa nisy niteny tamiko tao an-trano; ary nisy lehilahy nitsangana teo anilako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy tamiko: Ry zanak’olona, eto no hitoeran’ny seza fiandrianako sy hitoeran’ny faladiako, izay honenako mandrakizay eto amin’ny Zanak’Isiraely; ary tsy holotoin’ny taranak’Isiraely, na izy na ny mpanjakany, amin’ny fijangajangany sy amin’ny sampin’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fatin’.
      marker-yv: yv-n
    - type: text
      text: ' ny mpanjakany ao amin’ny fitoerany avo intsony ny anarako masina,– '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tamin’ny nametrahany ny tokonam-baravaran’ireny teo anilan’ny tokonam-baravarako sy ny tolan’ireny teo anilan’ny tolako, ka rindrina ihany no teo anelanelako sy ireny, dia nolotoiny tamin’ny fahavetavetana nataony ny anarako masina; ka dia nahalany ringana azy tamin’ny fahatezerako Aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa amin’izao kosa dia aoka hariany lavitra Ahy ny fijangajangany sy ny sampin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
