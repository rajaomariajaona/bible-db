      marker-yv: yv-n
    - type: text
      text: ' ary roa ambin’ny folo hakiho koa ny sakany, ary efa-joro sokera izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny rindriny dia efatra ambin’ny folo hakiho ny lavany, sy efatra ambin’ny folo hakiho koa ny sakany, amin’ny lafiny efatra; ary ny koronosiny manodidina dia antsasaky ny hakiho; ary ny fara-vodiny dia iray hakiho manodidina; ary ny ambaratongany dia manatrika ny atsinanana.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamiko: Ry zanak’olona, izao no lazain’i Jehovah Tompo: Izao no didy ny amin’ny alitara amin’izay andro hanaovana azy, hanaterana fanatitra dorana sy hanopazana ra aminy: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Levita mpisorona, taranak’i Zadoka, izay manatona Ahy hanao fanompoam-pivavahana ho Ahy, dia homenao vantotr’ombilahy iray hatao fanatitra noho ny ota, hoy Jehovah Tompo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, tamy ny voninahitr’Andriamanitry ny Isiraely avy tany atsinanana; ary ny feony dia tahaka ny firohondrohon’ny rano be; ary ny tany dia namirapiratra azon’ny voninahiny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hangalanao ny rany ka hatentinao amin’ny tandrony efatra sy amin’ny zorony efatra amin’ny rindriny ary amin’ny koronosiny manodidina; izany no hanadiovanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny dikan’ny teny Hebreo amin’ireo dia ny manafaka ota azy; izahao Lev. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: viii.15.
      marker-yv: yv-n
    - type: text
      text: ' azy sy hanaovanao fanavotana ho azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Halainao koa ny vantotr’ombilahy hatao fanatitra noho ny ota ka hodorana ao amin’ny fitoerana voatendry ao amin’ny trano ivelan’ny fitoerana masina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary amin’ny andro faharoa no hanateranao osilahy tsy misy kilema hatao fanatitra noho ny ota; ary hodioviny
    - type: usfm
      marker: f
      children:
      - type: usfm
