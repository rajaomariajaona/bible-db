document_id: ACT.12,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny nanenjehana ny fiangonana, sy ny nanafahana an’i Petera tao an-trano-maizina.
  - type: text
    content: 'ARY tamin’izany andro izany Heroda mpanjaka naninjitra ny tànany hampahory ny sasany tamin’ny fiangonana. '
  '10':
  - type: text
    content: Fa rehefa nandalo ny fiambenana voalohany sy faharoa izy, dia tonga teo amin’ny vavahady vy izay mahazo ny làlana ho any an-tanàna; ary nivoha ho azy io mba halehany; ary nony nivoaka izy, dia nandroso tamin’ny làlana iray; ary niaraka tamin’izay dia nandao azy ilay anjely.
  '11':
  - type: text
    content: 'Ary rehefa nahatsiaro fanahy Petera, dia nanao hoe: Ankehitriny fantatro marina tokoa fa ny Tompo efa naniraka ny anjeliny ka namonjy ahy tamin’ny tànan’i Heroda sy ny fanantenan’ny Jiosy rehetra. '
  '12':
  - type: text
    content: 'Ary rehefa fantany tsara izany, dia nankany an-tranon’i Maria, renin’i Jaona, izay atao hoe koa Marka, izy; ary nisy olona maro niangona nivavaka tao. '
  '13':
  - type: text
    content: 'Ary raha nandòndòna ny vavahady Petera, dia nisy ankizivavy atao hoe Roda nankeo hihaino. '
  '14':
  - type: text
    content: 'Ary rehefa nahalala ny feon’i Petera izy, dia tsy namoha ny vavahady noho ny hafaliany, fa lasa nihazakazaka ary niditra ka nilaza fa Petera no mijanona eo am-bavahady. '
  '15':
  - type: text
    content: 'Fa hoy ny olona taminy: Very saina hianao. Fa izy nitompo rariny fa izany tokoa. Dia hoy indray ny olona: Anjeliny izany. '
  '16':
  - type: text
    content: 'Fa Petera naharitra nandòndòna ihany, ary rehefa novohany, dia nahita azy ireo ka talanjona. '
  '17':
  - type: text
    content: 'Fa izy nanofa tànana azy mba hangina, dia nanambara taminy izay namoahan’ny Tompo azy avy tao an-trano-maizina. Ary dia hoy izy: Ambarao amin’i Jakoba sy ny rahalahy izany zavatra izany. Dia niala izy ka lasa nankany amin’ny fitoerana hafa.'
  '18':
  - type: text
    content: 'Ary rehefa nazava ny andro, dia nifanaritaka be ihany ny miaramila ka nanao hoe: Nankaiza Petera? '
  '19':
  - type: text
    content: Ary rehefa nitady azy fatratra Heroda, fa tsy nahita, dia nadininy ny mpiambina ka nasainy novonoina. Ary Heroda nidina niala tany Jodia hankany Kaisaria, dia nitoetra tany.
  '2':
  - type: text
    content: Ary izy namono an’i Jakoba, rahalahin’i Jaona, tamin’ny sabatra.
  '20':
  - type: text
    content: Ary Heroda tezitra loatra tamin’ny Tyriana sy ny Sidoniana; fa niray saina kosa ireo ka nankany aminy, ary rehefa nahazo an’i Blasto, mpitandrina ny trano fandrian’ny mpanjaka, ho sakaizany, dia nangataka fihavanana, satria ny taniny nivelona tamin’ny tanin’i Heroda.
  - type: note
    content: Gr. ny mpanjaka.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Ary tamin’ny andro voatendry dia niakanjo akanjom-panjakana Heroda ka nipetraka teo ambonin’ny seza fiandrianany, dia nikabary tamin’ny vahoaka. '
  '22':
  - type: text
    content: 'Ary ny vahoaka niantso hoe: Feon’Andriamanitra izany, fa tsy an’olona! '
  '23':
  - type: text
    content: Ary niaraka tamin’izay dia nisy anjelin’ny Tompo namely azy, satria tsy nanome voninahitra an’Andriamanitra izy; ka dia nohanin’ny kankana izy ka maty.
  '24':
  - type: text
    content: Ary nandroso sy niely ny tenin’Andriamanitra.
  '25':
  - type: text
    content: Ary Barnabasy sy Saoly niverina avy tany
  - type: note
    content: 'Na: [niverina tany].'
  - type: text
    content: ' Jerosalema, rehefa vita ny fanompoany, dia nitondra an’i Jaona, izay atao hoe Marka, hiaraka aminy.'
  '3':
  - type: text
    content: 'Ary rehefa hitany fa sitraky ny Jiosy izany, dia nandroso nisambotra an’i Petera koa izy. (Efa mby tamin’ny andro fihinanana ny mofo tsy misy masirasira tamin’izany.) '
  '4':
  - type: text
    content: Ary rehefa nosamboriny izy, dia nataony tao an-trano-maizina ka natolony tamin’ny miaramila enina ambin’ny folo
  - type: note
    content: Gr. miaramila efatra katernia; ny katernia iray dia miaramila efa-dahy.
  - type: text
    content: 'hambenany; dia nikasa hamoaka azy ho eo amin’ny vahoaka izy, rehefa afaka ny Paska. '
  '5':
  - type: text
    content: Ary Petera nambenana tao an-trano-maizina; ary ny fiangonana nahery nangataka tamin’Andriamanitra ho azy.
  '6':
  - type: text
    content: 'Ary nony efa hamoaka azy Heroda, dia natory teo anelanelan’ny miaramila roa lahy Petera tamin’iny alina iny, sady voafatotra tamin’ny gadra roa izy; ary nisy mpiambina niambina ny trano-maizina teo am-baravarana. '
  '7':
  - type: text
    content: 'Ary, indro, nisy anjelin’ny Tompo tonga teo, sady nisy mazava namirapiratra tao an-trano; ary izy nanohina ny tehezan’i Petera, dia namoha azy ka nanao hoe: Mitsangàna faingana. Dia niala tamin’ny tànany ny gadra. '
  '8':
  - type: text
    content: 'Ary hoy ilay anjely taminy: Misikìna, ary fehezo ny kapanao. Dia nataony izany. Ary hoy koa izy taminy: Tafio ny lambanao, ka manaraha ahy. '
  '9':
  - type: text
    content: 'Dia nivoaka izy ka nanaraka azy; ary tsy fantany ho marina izay nataon’ny anjely, fa nataony ho nahita fahitana ihany izy. '
