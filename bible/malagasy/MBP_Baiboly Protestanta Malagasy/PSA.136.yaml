document_id: PSA.136,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fankalazana an’Andriamanitra noho ny nanaovany izao rehetra izao sy ny nanavotany ny olony.
  - type: text
    content: MIDERÀ an’i Jehovah, fa tsara Izy;
  - type: text
    content: Fa mandrakizay ny famindrampony.
  '10':
  - type: text
    content: Izay namely ny voalohan-terak’i Egypta,
  - type: text
    content: (Fa mandrakizay ny famindrampony)
  '11':
  - type: text
    content: Ka nitondra ny Isiraely nivoaka avy teo aminy
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '12':
  - type: text
    content: Tamin’ny tànana mahery sy ny sandry nahinjitra
  - type: text
    content: (Fa mandrakizay ny famindrampony),–
  '13':
  - type: text
    content: Izay nampisaraka ny Ranomasina Mena
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '14':
  - type: text
    content: Ka nampandeha ny Isiraely namaky teo afovoany
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '15':
  - type: text
    content: Fa nanary an’i Farao sy ny miaramilany tao anatin’ny Ranomasina Mena
  - type: text
    content: (Fa mandrakizay ny famindrampony),–
  '16':
  - type: text
    content: Izay nitondra ny olony nitety ny efitra
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '17':
  - type: text
    content: Izay namely mpanjaka lehibe
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '18':
  - type: text
    content: Ka nahafaty mpanjaka malaza
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '19':
  - type: text
    content: Dia Sihona, mpanjakan’ny Amorita
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '2':
  - type: text
    content: Miderà an’Andriamanitra Avo Indrindra;
  - type: note
    content: Heb. Andriamanitry ny andriamanitra.
  - type: text
    content: Fa mandrakizay ny famindrampony.
  '20':
  - type: text
    content: Sy Oga, mpanjakan’i Basana
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '21':
  - type: text
    content: Ary ny taniny nomeny ho lova
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '22':
  - type: text
    content: Dia ho lovan’ny Isiraely mpanompony
  - type: text
    content: (Fa mandrakizay ny famindrampony),–
  '23':
  - type: text
    content: Izay nahatsiaro antsika fony isika ambany toetra
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '24':
  - type: text
    content: Ka naneho hery namonjy antsika ho afaka tamin’ny fahavalontsika
  - type: text
    content: (Fa mandrakizay ny famindrampony),–
  '25':
  - type: text
    content: Izay manome hanina ny nofo rehetra
  - type: text
    content: (Fa mandrakizay ny famindrampony);
  '26':
  - type: text
    content: Miderà an’Andriamanitry ny lanitra;
  - type: text
    content: Fa mandrakizay ny famindrampony.
  '3':
  - type: text
    content: Miderà ny Tompon’ny tompo;
  - type: text
    content: Fa mandrakizay ny famindrampony;
  '4':
  - type: text
    content: Izy irery no Mpanao fahagagan-dehibe
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '5':
  - type: text
    content: Izay nanao ny lanitra tamin’ny fahendrena
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '6':
  - type: text
    content: Izay namelatra ny tany ho ambonin’ny rano,
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '7':
  - type: text
    content: Izay nanao ireo fanazavana lehibe
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '8':
  - type: text
    content: Dia ny masoandro ho mpanapaka ny andro
  - type: text
    content: (Fa mandrakizay ny famindrampony),
  '9':
  - type: text
    content: Ary ny volana sy ny kintana ho mpanapaka ny alina
  - type: text
    content: (Fa mandrakizay ny famindrampony),–
