document_id: PSA.136,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fankalazana an’Andriamanitra noho ny nanaovany izao rehetra izao sy ny nanavotany ny olony.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MIDERÀ an’i Jehovah, fa tsara Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandrakizay ny famindrampony.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay namely ny voalohan-terak’i Egypta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony)
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nitondra ny Isiraely nivoaka avy teo aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny tànana mahery sy ny sandry nahinjitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),–
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nampisaraka ny Ranomasina Mena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampandeha ny Isiraely namaky teo afovoany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nanary an’i Farao sy ny miaramilany tao anatin’ny Ranomasina Mena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),–
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nitondra ny olony nitety ny efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay namely mpanjaka lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nahafaty mpanjaka malaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Sihona, mpanjakan’ny Amorita
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà an’Andriamanitra Avo Indrindra;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '136.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Andriamanitry ny andriamanitra.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandrakizay ny famindrampony.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy Oga, mpanjakan’i Basana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taniny nomeny ho lova
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho lovan’ny Isiraely mpanompony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),–
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nahatsiaro antsika fony isika ambany toetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka naneho hery namonjy antsika ho afaka tamin’ny fahavalontsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),–
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manome hanina ny nofo rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony);
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà an’Andriamanitry ny lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandrakizay ny famindrampony.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà ny Tompon’ny tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandrakizay ny famindrampony;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy irery no Mpanao fahagagan-dehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nanao ny lanitra tamin’ny fahendrena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay namelatra ny tany ho ambonin’ny rano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nanao ireo fanazavana lehibe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny masoandro ho mpanapaka ny andro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny volana sy ny kintana ho mpanapaka ny alina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Fa mandrakizay ny famindrampony),–
