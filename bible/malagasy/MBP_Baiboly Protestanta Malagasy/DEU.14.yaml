document_id: DEU.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny hifadiana izay fanao vetaveta na izay zavatra tsy fihinana.
  - type: text
    content: ZANAK’i Jehovah Andriamanitrareo hianareo, koa aza mitetika ny tenanareo, na manaratra ny eo ambonin’ny handrinareo
  - type: note
    content: Heb. ambonin’ny elanela-masonareo.
  - type: text
    content: 'noho ny amin’ny maty. '
  '10':
  - type: text
    content: fa izay rehetra tsy misy vombony sy kirany kosa dia tsy ho fihinanareo; maloto aminareo izy.
  '11':
  - type: text
    content: 'Ny vorona madio rehetra no ho fihinanareo. '
  '12':
  - type: text
    content: 'Nefa izao kosa no tsy ho fihinanareo: ny voltora sy ny gypa sy ny ankoay '
  '13':
  - type: text
    content: 'ary ny papango sy ny voromahery sy ny papango mainty, samy araka ny karazany, avy '
  '14':
  - type: text
    content: 'ary ny goaika rehetra, samy araka ny karazany avy, '
  '15':
  - type: text
    content: 'ary ny ostritsa sy ny tararaka sy ny vorondriaka ary ny hitsikitsika, samy araka ny karazany avy, '
  '16':
  - type: text
    content: 'ary ny vorondolo sy ny vorondolo lehibe sy ny ibisa '
  '17':
  - type: text
    content: 'ary ny sama sy ny voltora madinika sy ny manarana ary ny vano sy ny vanobe, '
  '18':
  - type: text
    content: 'samy araka ny karazany avy, ary ny takidara sy ny manavy. '
  '19':
  - type: text
    content: 'Ary ny zava-mandady rehetra izay manana elatra dia haloto aminareo ka tsy ho fihinanareo. '
  '2':
  - type: text
    content: Fa firenena masina ho an’i Jehovah Andriamanitrao hianao ka voafidiny ho rakitra soa ho Azy mihoatra noho ny firenena rehetra ambonin’ny tany.
  '20':
  - type: text
    content: Ny zava-manana elatra izay madio no ho fihinanareo.
  '21':
  - type: text
    content: Aza homana izay maty ho azy, fa omeo ho an’ny vahiny izay ao an-tanànanao izany mba hohaniny, na amidio amin’ny olona hafa firenena; fa firenena masina ho an’i Jehovah Andriamanitrao hianao. Aza mahandro zanak’osy amin’ny rononon-dreniny.
  - type: heading
    content: Ny amin’ny fandoavana ny fahafolon-karena.
  '22':
  - type: text
    content: 'ALOAVY tsara ny ampahafolon’ny vokatra rehetra avy amin’ny voa nafafinao, dia ny vokatra ny an-tsaha isan-taona; '
  '23':
  - type: text
    content: dia aoka ho eo anatrehan’i Jehovah Andriamanitrao eo amin’ny tany izany hofidiny hampitoerany ny anarany no hihinananao ny ampahafolon’ny varinao sy ny ranom-boalobokao sy ny diloilonao ary ny voalohan-teraky ny ombinao sy ny ondry aman-osinao, mba hianaranao hatahotra an’i Jehovah Andriamanitrao mandrakariva.
  '24':
  - type: text
    content: 'Fa raha lavitra loatra ny làlana halehanao ka tsy mahatondra izany zavatra izany hianao, satria lavitra anao loatra ny tany izay hofidin’i Jehovah Andriamanitrao hampitoerany ny anarany, raha notahin’i Jehovah Andriamanitrao hianao, '
  '25':
  - type: text
    content: 'dia hamidinao vola izany, ary hofonosinao ny vola ka ho entinao eo an-tànanao hankany amin’ny tany izay hofidin’i Jehovah Andriamanitrao; '
  '26':
  - type: text
    content: 'ary ny vola dia amidio izay rehetra tian’ny fanahinao, na omby, na ondry, na osy, na divay, na toaka, na izay zavatra hafa tian’ny fanahinao; ary aoka ho eo anatrehan’i Jehovah Andriamanitrao no hihinananao izany sy hifalianao mbamin’ ny ankohonanao; '
  '27':
  - type: text
    content: ary ny Levita izay ao an-tanànanao dia aza foinao; fa tsy manana anjara na lova eo aminao izy.
  '28':
  - type: text
    content: 'Ary isan-telo taona dia alao ny ampahafolon’ny vokatrao rehetra amin’izany taona izany, ka ataovy ao an-tanànanao; '
  '29':
  - type: text
    content: ary dia aoka ho avy ny Levita (satria tsy mba manana anjara na lova eo aminao izy) sy ny vahiny sy ny kamboty ary ny mpitondratena izay ao an-tanànanao, dia hihinana izy ka ho voky, mba hotahin’i Jehovah Andriamanitrao hianao amin’ny asan-tànanao rehetra izay ataonao.
  '3':
  - type: text
    content: 'Aza mihinana izay fahavetavetana. '
  '4':
  - type: text
    content: 'Izao no biby izay ho fihinanareo: Ny omby sy ny ondry sy ny osy '
  '5':
  - type: text
    content: 'sy ny diera, ny gazela, ny kapreola, ny osi-dia, ny pygarga, ny antilopa ary ny ropikapra: '
  '6':
  - type: text
    content: 'izay biby rehetra mivaky kitro, ka misaraka tsara ny kitrony sady mandinika, no ho fihinanareo. '
  '7':
  - type: text
    content: 'Nefa amin’izay mandinika na mivaky kitro dia izao ihany kosa no tsy ho fihinanareo: Ny rameva sy ny rabitro ary ny hyraka, satria mandinika ihany izy, fa tsy mivaky kitro; maloto aminareo izy; '
  '8':
  - type: text
    content: ary ny kisoa koa, satria mivaky kitro izy, fa tsy mandinika, maloto aminareo izy; ny henan’ireny tsy ho fihinanareo, ary ny fatiny tsy hokasihinareo.
  '9':
  - type: text
    content: 'Ary amin’izay rehetra ao anatin’ny rano dia izao no ho fihinanareo: izay rehetra misy vombony sy kirany no ho fihinanareo; '
