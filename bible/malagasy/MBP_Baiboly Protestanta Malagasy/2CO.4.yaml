document_id: 2CO.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary amin’izany, satria manana izany fanompoana izany izahay, araka ny nahazoanay famindrampo, dia tsy ketraka. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa efa nolavinay ny zavatra takona mahamenatra, ka tsy mandeha amin’ny fihendrena, na manatsatso ny tenin’Andriamanitra izahay; fa amin’ny fanehoana ny marina no ideranay tena amin’ny fieritreretan’ny olona rehetra eo imason’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa raha miafina ny filazantsaranay, dia miafina amin’izay ho very izany, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'izay nohajambain’ny andriamanitr’izao tontolo izao, dia ny sain’ny tsy mino, mba tsy hiposahan’ny fahazavan’ny filazantsaran’ny voninahitr’i Kristy, Izay endrik’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa tsy ny tenanay no torinay, fa Kristy Jesosy Tompo, ary izahay dia mpanomponareo noho ny amin’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa Andriamanitra, Izay nandidy hoe: Aoka ny mazava hahazava ao amin’ny maizina, no nampahazava ny fonay ho amin’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hampisehoana.
    marker-yv: yv-n
  - type: text
    text: ' ny fahazavan’ny fahalalana ny voninahitr’Andriamanitra eo amin’ny tavan’i Jesosy Kristy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa manana izao rakitra izao amin’ny vilany tany izahay, mba ho an’Andriamanitra ny halehiben’ny hery, fa tsy ho avy aminay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voageja manodidina izahay, nefa tsy tery; very hevitra, nefa tsy mamoy fo; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'enjehina, nefa tsy nafoy; potraka, nefa tsy maty; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: mitondra ny fahafatesan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny famonoana an’.
    marker-yv: yv-n
  - type: text
    text: ' i Jesosy mandrakariva ao amin’ny tena izahay, mba haseho ao amin’ny tenanay koa ny fiainan’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa izahay izay velona dia atolotra ho amin’ny fahafatesana mandrakariva noho ny amin’i Jesosy, mba haseho ao amin’ny nofonay mety maty koa ny fiainan’i Jesosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa ny fahafatesana no miasa ao aminay, fa ny fiainana kosa ao aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary satria manana izany fanahin’ny finoana izany indrindra izahay, araka ny voasoratra hoe: ,,Nino aho, ka dia niteny’’ (Sal. 116.10), dia mino koa izahay ka miteny; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa fantatray fa Izay nanangana an’i Jesosy Tompo no hanangana anay koa miaraka amin’i Jesosy ka hanolotra anay miaraka aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ny zavatra rehetra dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: natao
  - type: text
    text: ' noho ny aminareo, mba hitomboan’ny fisaorana ho voninahitr’Andriamanitra noho ny fitombon’ny fahasoavana amin’ny maro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary tsy ketraka izahay; fa na dia mihalevona aza ny toetray
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: olonay.
    marker-yv: yv-n
  - type: text
    text: ' ivelany, dia havaozina isan-andro isan-andro kosa ny toetray'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: olonay.
    marker-yv: yv-n
  - type: text
    text: ' anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny fahorianay maivana, izay vetivety foana, dia mainka miasa fatratra indrindra ka mahatanteraka voninahitra mavesatra maharitra mandrakizay ho anay, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: raha tsy mijery ny hita izahay, fa ny tsy hita; fa ny hita dia ho vetivety foana, fa ny tsy hita no haharitra mandrakizay.
