document_id: 2CH.28
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Ahaza.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ROA-POLO taona Ahaza, fony izy vao nanjaka, ary enina ambin’ny folo taona no nanjakany tany Jerosalema; ary tsy mba nanao izay mahitsy eo imason’i Jehovah tahaka an’i Davida rainy izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa nandeha tamin’ny làlan’ny mpanjakan’ny Isiraely izy sady nanao sarin-javatra an-idina ho an’ireo Bala koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nandoro ditin-kazo manitra tao amin’ny lohasahan’ny taranak’i Hinoma koa izy, ary ny zanany dia nodorany tamin’ny afo, araka ny fahavetavetan’ny jentilisa izay noroahin’i Jehovah tsy ho eo anoloan’ny Zanak’Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary namono zavatra hatao fanatitra izy sady nandoro ditin-kazo manitra teny amin’ny fitoerana avo koa sy teny an-tampon’ny havoana ary teny ambanin’ny hazo maitso rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa dia natolotr’i Jehovah Andriamaniny ho eo an-tànan’ny mpanjakan’i Syria izy; dia namely azy ireo, ka betsaka no lasany ho babo ka nentiny tany Damaskosy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary natolony ho eo an-tànan’ny mpanjakan’ny Isiraely koa izy, dia namely mafy ka naharesy azy koa ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa Peka, zanak’i Remalia, nahafaty olona roa alina sy iray hetsy indray andro tamin’ny Joda, dia lehilahy mahery avokoa, noho ny nahafoizan’ireny an’i Jehovah, Andriamanitry ny razany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Zikry, lehilahy mahery tamin’ny Efraima, namono an’i Mahaseia, zanaky ny mpanjaka, sy Azrikama, mpanapaka ny trano, ary Elkana, izay nanarakaraka ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny Zanak’Isiraely nahazo sambo-belona roa hetsy tamin’ireo havany, dia vehivavy sy zazalahy sy zazavavy, ary nahazo babo betsaka taminy koa izy, dia nentiny tany Samaria ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy mpaminanin’i Jehovah tao, Odeda no anarany, izay nivoaka hitsena ny miaramila, raha nankany Samaria, izy ka nanao taminy hoe: He! ny nahatezeran’i Jehovah, Andriamanitry ny razanareo, tamin’ny Joda no nanolorany azy ho eo an-tànanareo, dia novonoinareo ireny tamin’ny fahatezerana manakatra ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ankehitriny ny taranak’i Joda sy Jerosalema dia kasainareo handevozina ho andevolahinareo sy ho andevovavinareo; ka moa hianareo ireo va tsy mba manan-keloka amin’i Jehovah Andriamanitrareo koa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ankehitriny mihainoa ahy, koa alefaso ny babo izay efa nentinareo avy tamin’ny rahalahinareo; fa mirehitra aminareo ny fahatezeran’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nitsangana ny loholona sasany avy amin’ny taranak’i Efraima, dia Azaria, zanak’i Johanana, sy Berekia, zanak’i Mesilemota, sy Jehizkia, zanak’i Saloma, ary Amasa, zanak’i Hadlay, ka nanohitra izay vao avy tany an-tafika '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'nanao taminy hoe: Tsy mahazo mampiditra ny babo eto hianareo; fa mikasa hanampy ny fahotantsika sy ny fahadisoantsika hianareo mba hahameloka antsika amin’i Jehovah; fa efa be ny fahadisoantsika, ka iharan’ny fahatezerana mirehitra ny Isiraely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nalefan’ny miaramila teo anatrehan’ny mpanapaka sy ny fiangonana rehetra izay sambo-belona sy babo azony, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ka ireo olona voalaza anarana ireo dia nitsangana ka naka ny sambo-belona, ary izay rehetra tsy nitafy no nampiakanjoiny tamin’ny zavatra nentiny; eny, nampiakanjoiny sy nokiraroiny izy ary nampihinaniny sy nampisotroiny ary nohosorany, sady nampitaingeniny boriky izay rehetra osaosa, ka nentiny tany Jeriko, tanàna be rofia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: palma.
    marker-yv: yv-n
  - type: text
    text: ' ho any amin’ny rahalahiny; dia niverina tany Samaria izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin’izany andro izany Ahaza mpanjaka naniraka tany amin’ny mpanjakan’i Asyria nangataka ny any hanampy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny Edomita dia tonga indray ka namely ny Joda ary namabo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny Filistina koa nanafika ny tanàna eny amin’ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sefela.
    marker-yv: yv-n
  - type: text
    text: ' sy eny amin’ny tany atsimo momba an’i Joda, dia nahafaka an’i Beti-semesy sy Aialona sy Gederota sy Soko mbamin’ny zana-bohiny ary Timna sy ny zana-bohiny ary Gimzo koa sy ny zana-bohiny; ary nonina tao izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa Jehovah nampietry ny Joda noho Ahaza, mpanjakan’ny Isiraely, satria Ahaza efa nanaram-po nanao ratsy teo amin’ny Joda ka nivadika tamin’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Tiglato-pilesera, mpanjakan’i Asyria, tonga tao aminy, nefa nampahory azy fa tsy nampahery azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa efa nalain’i Ahaza ny zavatra tao an-tranon’i Jehovah sy tao an-tranon’ny mpanjaka sy ny an’ny mpanapaka, ary efa nomeny ny mpanjakan’i Asyria, nefa tsy nahasoa azy akory izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tamin’ny andro nampahoriana azy dia mbola nanao izay nahadiso amin’i Jehovah ihany io Ahaza mpanjaka io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary namono zavatra hatao fanatitra ho an’ireo andriamanitr’i Damaskosy, izay namely azy, izy ka nanao hoe: Ireo andriamanitry ny mpanjakan’i Asyria, izay nanampy azy, no hamonoako zavatra hatao fanatitra mba hanampiany ahy. Kanjo tonga fandravana azy sy ny Isiraely rehetra ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Ahaza nanangona ny fanaky ny tranon’Andriamanitra ka namakivaky azy ary nandrindrina ny varavaran’ny tranon’i Jehovah sady nanao alitara teny amin’ny zoron-dàlana rehetra tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary teny amin’ny tanànan’ny Joda rehetra dia nanaovany fitoerana avo handoroana ditin-kazo manitra ho an’ny andriamani-kafa, ka dia nahatezitra an’i Jehovah, Andriamanitry ny razany, izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny tantarany sisa sy ny fanaony rehetra, na ny voalohany na ny farany, indreo, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Joda sy ny Isiraely izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary Ahaza lasa nodi-mandry any amin’ny razany, dia nalevina tao an-tanàna Jerosalema izy, fa tsy mba natao tao amin’ny fasan’ny mpanjakan’ny Isiraely. Ary Hezekia zanany no nanjaka nandimby azy.
