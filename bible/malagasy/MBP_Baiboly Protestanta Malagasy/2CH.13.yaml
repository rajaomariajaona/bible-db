document_id: 2CH.13,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Abia.
  - type: text
    content: 'ARY tamin’ny taona fahavalo ambin’ny folo nanjakan’i Jeroboama mpanjaka no vao nanjakan’i Abia tamin’ny Joda. '
  '10':
  - type: text
    content: 'Fa ny aminay kosa, dia Jehovah no Andriamanitray, ka tsy mba nahafoy Azy izahay; ary ny mpisorona izay manao fanompoam-pivavahana ho an’i Jehovah, dia ny taranak’i Arona; ary ny Levita koa manao ny raharahany; '
  '11':
  - type: text
    content: 'ary mandoro fanatitra dorana sy ditin-kazo manitra ho an’i Jehovah isa-maraina sy isan-kariva izy, ary ny mofo aseho koa alahany eo amin’ny latabatra tsara, ary ny jiro koa ampirehetiny isan-kariva ao amin’ny fanaovan-jiro volamena sy ny lela fanaovan-jirony; fa izahay mitandrina izay nasain’i Jehovah Andriamanitray hotandremana; fa hianareo kosa nahafoy Azy. '
  '12':
  - type: text
    content: Ary, indro, ato aminay Andriamanitra ho mpitarika anay, ary ny mpisorony sy ny trompetra avo faneno hotsofina mafy hamelezana anareo. Ry Zanak’Isiraely ô, aza miady amin’i Jehovah, Andriamanitry ny razanareo; fa tsy hambinina hianareo.
  '13':
  - type: text
    content: 'Fa nasain’i Jeroboama nanompirana no fandehan’ny otrika mba ho tonga ao aoriany, ka dia izy teo anoloan’ny Joda, ary ny otrika teo ivohony. '
  '14':
  - type: text
    content: 'Ary nony nitodika ny Joda, ka, indreo, teo alohany sy teo aoriany ny fahavalo, dia nitaraina tamin’i Jehovah izy, ary ny mpisorona nitsoka ny trompetra. '
  '15':
  - type: text
    content: 'Dia nihoby ny lehilahy amin’ny Joda; ary raha nihoby izy, Andriamanitra dia namely an’i Jeroboama sy ny Isiraely rehetra teo anoloan’i Abia sy ny Joda. '
  '16':
  - type: text
    content: 'Ary ny Zanak’Isiraely nandositra niala teo anoloan’ny Joda; ary Andriamanitra nanolotra azy ho eo an-tànany, '
  '17':
  - type: text
    content: ka nahafatesan’i Abia sy ny vahoakany be dia be izy; ary niampatrampatra ny fatin’ny Isiraely, dia lehilahy dimy hetsy voafantina.
  '18':
  - type: text
    content: Toy izany no nampietrena ny Zanak’Isiraely fahizay; ary ny taranak’i Joda no nahery, satria niankina tamin’i Jehovah, Andriamanitry ny razany, izy.
  '19':
  - type: text
    content: Ary Abia nanenjika an’i Jeroboama ka nahazo ny tanànany, dia Betela mbamin’ny zana-bohiny sy Jesana mbamin’ny zana-bohiny ary Efrona
  - type: note
    content: 'Na: Efraima.'
  - type: text
    content: ' mbamin’ny zana-bohiny. '
  '2':
  - type: text
    content: Telo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Mikaia, zanakavavin’i Oriela, avy any Gibea.
  - type: text
    content: 'Ary niady Abia sy Jeroboama. '
  '20':
  - type: text
    content: Ary Jeroboama tsy naharina intsony tamin’ny andron’i Abia; ary Jehovah namely azy, ka dia maty izy.
  '21':
  - type: text
    content: Ary Abia nitombo hery, ary nanam-bady efatra ambin’ny folo izy ka niteraka lahy roa amby roa-polo sy vavy enina ambin’ny folo.
  '22':
  - type: text
    content: Ary ny tantaran’i Abia sisa mbamin’ny nataony sy ny teniny dia efa voasoratra ao amin’ny bokin’Ido mpaminany.
  - type: heading
    content: Ny niandohan’ny nanjakan’i Asa, sy ny nandravany fombam-pivavahana tsy marina, ary ny nandreseny ny Etiopiana.
  '23':
  - type: text
    content: ARY Abia lasa nodi-mandry any amin’ny razany, dia nalevina tao an-Tanànan’i Davida izy; ary Asa zanany no nanjaka nandimby azy. Ary tamin’ny andron’i Asa dia nandry folo taona ny tany.
  '3':
  - type: text
    content: Ary Abia niantomboka niady ka nitondra miaramila mahery, dia lehilahy efatra hetsy voafantina; ary Jeroboama kosa nandahatra ny azy hiady aminy, dia lehilahy valo hetsy voafantina, samy mahery avokoa.
  '4':
  - type: text
    content: 'Ary Abia nijoro teo an-tendrombohitra Zemaraima, izay any amin’ny tany havoan’i Efraima, ka nanao hoe: Mihainoa ahy, ry Jeroboama sy ry Isiraely rehetra: '
  '5':
  - type: text
    content: 'Moa tsy tokony ho fantatrareo va fa nomen’i Jehovah, Andriamanitry ny Isiraely, ho an’i Davida mandrakizay ny fanjakan’ny Isiraely? dia ho azy sy ny taranany amin’ny fanekena nasian-tsira. '
  '6':
  - type: text
    content: 'Nefa kosa Jeroboama, zanak’i Nebata, mpanompon’i Solomona, zanak’i Davida, nitsangana ka niodina tamin’ny tompony. '
  '7':
  - type: text
    content: 'Ary koa, nisy olom-poana, tena ratsy fanahy, niangona tao aminy ka nampahery ny tenany hanohitra an-dRehoboama, zanak’ Solomona, raha mbola zaza sy tanora fanahy izy ka tsy nahatohitra azy. '
  '8':
  - type: text
    content: Ary ankehitriny hianareo mikasa hanohitra ny fanjakan’i Jehovah, izay eo an-tànan’ny taranak’i Davida; ary hianareo dia maro be, sady misy ombilahy kely volamena ao aminareo, izay nataon’i Jeroboama ho andriamanitrareo.
  '9':
  - type: text
    content: 'Tsy efa noroahinareo va ny mpisoron’i Jehovah, dia ny taranak’i Arona, sy ny Levita, ka nanendry mpisorona ho anareo tahaka ny fanaon’ny firenena amin’ny tany hafa hianareo? ka na zovy na zovy mitondra vantotr’ombilahy sy ondrilahy fito hanokanana ny tenany, dia izy no tonga mpisorona amin’ireo tsi-Andrimanitra. '
