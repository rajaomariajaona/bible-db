document_id: PRO.18,873
type_code: plt
verses:
  '1':
  - type: text
    content: Izay mitokana ho azy dia mitady ny mahafinaritra ny tenany ihany,
  - type: text
    content: Misafoaka manohitra izay hevitra mahasoa rehetra izy.
  '10':
  - type: text
    content: Ny anaran’i Jehovah dia tilikambo mafy;
  - type: text
    content: Ny marina miezaka ho ao aminy ka voavonjy.
  - type: note
    content: Heb. atao amin’ny avo.
  '11':
  - type: text
    content: Ny haren’ny manan-karena no vohiny mafy,
  - type: text
    content: Ary raha araka ny fiheviny, dia toa mànda avo izany.
  '12':
  - type: text
    content: Ny fireharehan’ny fon’ny olona mialoha ny fahasimbana;
  - type: text
    content: Fa ny fanetren-tena kosa mialoha ny voninahitra.
  '13':
  - type: text
    content: Izay mamaly teny mbola tsy re,
  - type: text
    content: Dia hadalana sy henatra ho azy izany.
  '14':
  - type: text
    content: Ny faharariany dia zakan’ny fanahin’ny olona ihany;
  - type: text
    content: Fa ny fanahy kivy, iza no mahazaka izany?
  '15':
  - type: text
    content: Ny fon’ny manan-tsaina mahazo fahalalana;
  - type: text
    content: Ary ny sofin’ny hendry mitady izany.
  '16':
  - type: text
    content: Ny fanomezan’ny olona dia mahalalaka ny alehany,
  - type: text
    content: Hahatonga azy eo anatrehan’ ny lehibe.
  '17':
  - type: text
    content: Izay mandahatra aloha no toa marina;
  - type: text
    content: Fa nony avy kosa ny an-daniny, dia mamaly ny teniny.
  '18':
  - type: text
    content: Ny filokana mampitsahatra ady
  - type: text
    content: Ary mampisaraka ny samy mahery.
  '19':
  - type: text
    content: 'Ny '
  - type: text
    content: mampionona
  - type: text
    content: ' ny rahalahy voaisy ratsy dia '
  - type: text
    content: sarotra
  - type: text
    content: ' noho ny '
  - type: text
    content: manafaka
  - type: text
    content: ' vohitra mafy,'
  - type: text
    content: 'Ary ny fifandirana '
  - type: text
    content: aminy
  - type: text
    content: ' dia tahaka ny hidin’ny lapan’ny mpanjaka.'
  '2':
  - type: text
    content: Ny adala tsy mba finaritra amin’ny fahalalana,
  - type: text
    content: Fa ta-haneho izay ao am-pony.
  '20':
  - type: text
    content: Ny vokatry ny vavan’ny olona no mahavoky soa azy;
  - type: text
    content: Eny, ny vokatry ny molony no mahavoky azy.
  '21':
  - type: text
    content: Ny mahafaty sy ny mahavelona samy hain’ny lela,
  - type: text
    content: Koa izay manarana azy dia hihinana ny vokany.
  '22':
  - type: text
    content: Izay lehilahy mahazo vady dia mahazo zava-tsoa
  - type: text
    content: Sady mahita sitraka amin’i Jehovah.
  '23':
  - type: text
    content: Fitarainana no ataon’ny malahelo;
  - type: text
    content: Nefa ny manan-karena kosa dia mamaly mahery.
  '24':
  - type: text
    content: Izay maro sakaiza tsy maintsy tra-pahoriana;
  - type: note
    content: 'Na: tsy maintsy hita fa ratsy.'
  - type: text
    content: Fa misy sakaiza tia, izay mifikitra noho ny rahalahy aza.
  '3':
  - type: text
    content: Raha avy ny ratsy fanahy, dia avy ny fanamavoana;
  - type: text
    content: Ary miaraka amin’ny fahafaham-baraka ny henatra.
  '4':
  - type: text
    content: Rano lalina ny teny aloaky ny vavan’ny olona,
  - type: text
    content: Ary rano miboiboika ny loharanon’ny fahendrena,
  '5':
  - type: text
    content: Tsy mety raha manohana ny ratsy fanahy
  - type: text
    content: Handresy ny marina amin’ny fitsarana.
  '6':
  - type: text
    content: Ny molotry ny adala manatona ny fifandirana,
  - type: text
    content: Ary ny vavany mihantsy kapoka.
  '7':
  - type: text
    content: Ny vavan’ny adala no fandringanana azy,
  - type: text
    content: Ary ny molony ihany no fandriky ny fanahiny.
  '8':
  - type: text
    content: Ny tenin’ny mpifosafosa dia toy ny hanim-py
  - type: text
    content: Ka mikorotsaka ao anaty kibo indrindra.
  '9':
  - type: text
    content: Ary izay malaina amin’ny asany
  - type: text
    content: Dia rahalahin’ny mpanimba.
