document_id: PRO.18,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitokana ho azy dia mitady ny mahafinaritra ny tenany ihany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misafoaka manohitra izay hevitra mahasoa rehetra izy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny anaran’i Jehovah dia tilikambo mafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny marina miezaka ho ao aminy ka voavonjy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: atao amin’ny avo.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny haren’ny manan-karena no vohiny mafy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha araka ny fiheviny, dia toa mànda avo izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fireharehan’ny fon’ny olona mialoha ny fahasimbana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fanetren-tena kosa mialoha ny voninahitra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamaly teny mbola tsy re,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hadalana sy henatra ho azy izany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny faharariany dia zakan’ny fanahin’ny olona ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fanahy kivy, iza no mahazaka izany?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fon’ny manan-tsaina mahazo fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sofin’ny hendry mitady izany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanomezan’ny olona dia mahalalaka ny alehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahatonga azy eo anatrehan’ ny lehibe.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandahatra aloha no toa marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nony avy kosa ny an-daniny, dia mamaly ny teniny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny filokana mampitsahatra ady
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mampisaraka ny samy mahery.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mampionona
    - type: text
      text: ' ny rahalahy voaisy ratsy dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sarotra
    - type: text
      text: ' noho ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manafaka
    - type: text
      text: ' vohitra mafy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny fifandirana '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aminy
    - type: text
      text: ' dia tahaka ny hidin’ny lapan’ny mpanjaka.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny adala tsy mba finaritra amin’ny fahalalana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ta-haneho izay ao am-pony.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vokatry ny vavan’ny olona no mahavoky soa azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny vokatry ny molony no mahavoky azy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mahafaty sy ny mahavelona samy hain’ny lela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izay manarana azy dia hihinana ny vokany.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay lehilahy mahazo vady dia mahazo zava-tsoa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mahita sitraka amin’i Jehovah.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fitarainana no ataon’ny malahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ny manan-karena kosa dia mamaly mahery.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay maro sakaiza tsy maintsy tra-pahoriana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy maintsy hita fa ratsy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy sakaiza tia, izay mifikitra noho ny rahalahy aza.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha avy ny ratsy fanahy, dia avy ny fanamavoana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miaraka amin’ny fahafaham-baraka ny henatra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rano lalina ny teny aloaky ny vavan’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rano miboiboika ny loharanon’ny fahendrena,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mety raha manohana ny ratsy fanahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handresy ny marina amin’ny fitsarana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny molotry ny adala manatona ny fifandirana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vavany mihantsy kapoka.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavan’ny adala no fandringanana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny molony ihany no fandriky ny fanahiny.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’ny mpifosafosa dia toy ny hanim-py
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mikorotsaka ao anaty kibo indrindra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay malaina amin’ny asany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia rahalahin’ny mpanimba.
