document_id: PRO.24
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza mialona ny olona ratsy fanahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na maniry ho namany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa fandravana no saintsainin’ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fampahoriana no tenenin’ny molony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fahendrena no anaovana trano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahalalinan-tsaina no mampaharitra azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sady fahalalana no hamenoana ny efi-trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’izay harena soa sy mahafinaritra rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Be hery ny lehilahy hendry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mitombo hery ny olona manam-pahalalana;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny fahaizana mandamina tsara no entonao miady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha maro ny mpanolo-tsaina, dia misy famonjena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avo tsy takatry ny adala ny fahendrena,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ataon’ny adala ho haingohaingo foana ny fahendrena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba mahaloa-bava eo am-bavahady izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay misaintsaina hanao ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia atao hoe mpamoron-tsain-dratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ota ny fikasan’ny hadalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahavetavetana eo imason’ny olona ny mpaniratsira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha reraka amin’ny andro fahoriana hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia kely ny herinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vonjeo izay entina hovonoina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary enga anie ka mba harovanao izay mangozohozo efa ho mby eo am-pamonoana!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha hoy hianao: Tsia, tsy mahalala izany'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: io.
    marker-yv: yv-n
  - type: text
    text: ' izahay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa Izay mandanja ny fo tsy hihevitra izany va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izay mandinika ny fanahinao tsy hahalala izany va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hovaliany araka ny ataony avy ny olona rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Anaka, homàna tantely, fa tsara izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny toho-tantely, fa ho mamy eo am-bavanao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lanilaninao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary aoka ho toy izany no hianaranao fahendrena ho an’ny fanahinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha azonao izany, dia hisy hiafarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho foana ny fanantenanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza manotrika ao akaikin’ny tranon’ny marina hianao, ry ilay ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza ravanao ny fonenany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa potraka impito ny marina, nefa tafarina ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ratsy fanahy kosa solafaka, raha azom-pahoriana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ka idiran-doza.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza faly, raha lavo ny fahavalonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza ravoravo ny fonao, raha tafintohina izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fandrao hitan’i Jehovah izany ka ataony ho ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampialainy aminy ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aoka tsy hirehitra ny fahatezeranao noho ny amin’ny mpanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mialona ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa tsy hisy fanantenana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: farany.
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny ratsy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho faty ny jiron’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Anaka, matahora an’i Jehovah sy ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mikambana amin’izay miovaova;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hafa saina noho izany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ho tampoka no hitrangan’izay hanjo ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no mahalala izay loza hiseho amin’ny androny?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: taonany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao koa no tenin’ny hendry:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mety raha mizaha tavan’olona amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay manao amin’ny meloka hoe: Marina hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hozonin’ny olona sady ho halan’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa izay mitsara marina kosa no hahita soa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hahazo fitahiana tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay mahavoa tsara amin’ny famaliana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia manoroka ny molotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Amboary ny asanao any ivelany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ataovy lavorary ny any an-tsaha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka rehefa vita izany, dia mahazo manao ny tranonao hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aza mety ho vavolombelona foana hanameloka ny namanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa hamitaka amin’ny molotrao va hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aza manao hoe: Araka izay nataony tamiko no mba hataoko aminy kosa,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hovaliako ny olona araka izay nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nandalo ny sahan’ny kamo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny tanimboaloboky ny tsy ampy saina aho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary, indro, feno sampivato izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady voasaron’ny amiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nirodana ny ampiantany vatony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia nojereko ka noheveriko tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hitako ka nahazoako anatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Mbola hatory kely ihany, mbola ho renoka kely ihany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola hanohon-tànana kely hatory;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia ho tonga toy ny mimaona hamely ny alahelonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahantranao ho toy ny jiolahy.
