document_id: PRO.24,873
type_code: plt
verses:
  '1':
  - type: text
    content: Aza mialona ny olona ratsy fanahy,
  - type: text
    content: Na maniry ho namany;
  '10':
  - type: text
    content: Raha reraka amin’ny andro fahoriana hianao,
  - type: text
    content: Dia kely ny herinao.
  '11':
  - type: text
    content: Vonjeo izay entina hovonoina,
  - type: text
    content: Ary enga anie ka mba harovanao izay mangozohozo efa ho mby eo am-pamonoana!
  '12':
  - type: text
    content: 'Raha hoy hianao: Tsia, tsy mahalala izany'
  - type: note
    content: 'Na: io.'
  - type: text
    content: ' izahay,'
  - type: text
    content: Moa Izay mandanja ny fo tsy hihevitra izany va?
  - type: text
    content: Ary Izay mandinika ny fanahinao tsy hahalala izany va?
  - type: text
    content: Eny, hovaliany araka ny ataony avy ny olona rehetra.
  '13':
  - type: text
    content: Anaka, homàna tantely, fa tsara izany,
  - type: text
    content: Ary ny toho-tantely, fa ho mamy eo am-bavanao;
  - type: note
    content: Heb. lanilaninao.
  '14':
  - type: text
    content: Ary aoka ho toy izany no hianaranao fahendrena ho an’ny fanahinao;
  - type: text
    content: Fa raha azonao izany, dia hisy hiafarana,
  - type: text
    content: Ka tsy ho foana ny fanantenanao.
  '15':
  - type: text
    content: Aza manotrika ao akaikin’ny tranon’ny marina hianao, ry ilay ratsy,
  - type: text
    content: Aza ravanao ny fonenany;
  '16':
  - type: text
    content: Fa potraka impito ny marina, nefa tafarina ihany;
  - type: text
    content: Ary ny ratsy fanahy kosa solafaka, raha azom-pahoriana.
  - type: note
    content: 'Na: ka idiran-doza.'
  '17':
  - type: text
    content: Aza faly, raha lavo ny fahavalonao,
  - type: text
    content: Ary aza ravoravo ny fonao, raha tafintohina izy;
  '18':
  - type: text
    content: Fandrao hitan’i Jehovah izany ka ataony ho ratsy,
  - type: text
    content: Ary ampialainy aminy ny fahatezerany.
  '19':
  - type: text
    content: Aoka tsy hirehitra ny fahatezeranao noho ny amin’ny mpanao ratsy,
  - type: text
    content: Ary aza mialona ny ratsy fanahy;
  '2':
  - type: text
    content: Fa fandravana no saintsainin’ny fony,
  - type: text
    content: Ary fampahoriana no tenenin’ny molony.
  '20':
  - type: text
    content: Fa tsy hisy fanantenana
  - type: note
    content: Heb. farany.
  - type: text
    content: ' ho an’ny ratsy;'
  - type: text
    content: Eny, ho faty ny jiron’ny ratsy fanahy.
  '21':
  - type: text
    content: Anaka, matahora an’i Jehovah sy ny mpanjaka;
  - type: text
    content: Ary aza mikambana amin’izay miovaova;
  - type: note
    content: 'Na: hafa saina noho izany.'
  '22':
  - type: text
    content: Fa ho tampoka no hitrangan’izay hanjo ireny;
  - type: text
    content: Ary iza no mahalala izay loza hiseho amin’ny androny?
  - type: note
    content: Heb. taonany.
  '23':
  - type: text
    content: 'Izao koa no tenin’ny hendry:'
  - type: text
    content: Tsy mety raha mizaha tavan’olona amin’ny fitsarana.
  '24':
  - type: text
    content: 'Izay manao amin’ny meloka hoe: Marina hianao,'
  - type: text
    content: Dia hozonin’ny olona sady ho halan’ny firenena;
  '25':
  - type: text
    content: Fa izay mitsara marina kosa no hahita soa
  - type: text
    content: Sy hahazo fitahiana tsara.
  '26':
  - type: text
    content: Izay mahavoa tsara amin’ny famaliana
  - type: text
    content: Dia manoroka ny molotra.
  '27':
  - type: text
    content: Amboary ny asanao any ivelany,
  - type: text
    content: Ary ataovy lavorary ny any an-tsaha;
  - type: text
    content: Ka rehefa vita izany, dia mahazo manao ny tranonao hianao.
  '28':
  - type: text
    content: Aza mety ho vavolombelona foana hanameloka ny namanao;
  - type: text
    content: Moa hamitaka amin’ny molotrao va hianao?
  '29':
  - type: text
    content: 'Aza manao hoe: Araka izay nataony tamiko no mba hataoko aminy kosa,'
  - type: text
    content: Hovaliako ny olona araka izay nataony.
  '3':
  - type: text
    content: Fahendrena no anaovana trano;
  - type: text
    content: Ary fahalalinan-tsaina no mampaharitra azy;
  '30':
  - type: text
    content: Nandalo ny sahan’ny kamo
  - type: text
    content: Sy ny tanimboaloboky ny tsy ampy saina aho;
  '31':
  - type: text
    content: Ary, indro, feno sampivato izy
  - type: text
    content: Sady voasaron’ny amiana,
  - type: text
    content: Ary nirodana ny ampiantany vatony.
  '32':
  - type: text
    content: Dia nojereko ka noheveriko tsara,
  - type: text
    content: Eny, hitako ka nahazoako anatra.
  '33':
  - type: text
    content: Mbola hatory kely ihany, mbola ho renoka kely ihany.
  - type: text
    content: Mbola hanohon-tànana kely hatory;
  '34':
  - type: text
    content: Dia ho tonga toy ny mimaona hamely ny alahelonao,
  - type: text
    content: Ary ny fahantranao ho toy ny jiolahy.
  '4':
  - type: text
    content: Sady fahalalana no hamenoana ny efi-trano
  - type: text
    content: Amin’izay harena soa sy mahafinaritra rehetra.
  '5':
  - type: text
    content: Be hery ny lehilahy hendry,
  - type: text
    content: Eny, mitombo hery ny olona manam-pahalalana;
  '6':
  - type: text
    content: Fa ny fahaizana mandamina tsara no entonao miady,
  - type: text
    content: Ary raha maro ny mpanolo-tsaina, dia misy famonjena.
  '7':
  - type: text
    content: Avo tsy takatry ny adala ny fahendrena,
  - type: note
    content: 'Na: Ataon’ny adala ho haingohaingo foana ny fahendrena.'
  - type: text
    content: Tsy mba mahaloa-bava eo am-bavahady izy.
  '8':
  - type: text
    content: Izay misaintsaina hanao ratsy
  - type: text
    content: Dia atao hoe mpamoron-tsain-dratsy.
  '9':
  - type: text
    content: Ota ny fikasan’ny hadalana;
  - type: text
    content: Ary fahavetavetana eo imason’ny olona ny mpaniratsira.
