document_id: PSA.77,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fahatsiarovana ny amin’ny taon-dasa ho enti-mampionona ny fo, raha mila ho reraka.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Al-jedotona. Salamo natoan’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NY feoko dia mankany amin’Andriamanitra, ka mitaraina aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny feoko mankany amin’Andriamanitra, ka mihaino ahy Izy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy izaho: Izao no mahararirary ny foko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny niovan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: Nefa tsarovako '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny taonan’.
      marker-yv: yv-n
    - type: text
      text: ' ny tànana ankavanan’ny Avo Indrindra.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hampahatsiaro ny asan’i Jehovah aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ta-hahatsiaro ny fahagagana nataonao fony taloha;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Eny, hisaina ny asanao rehetra aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hihevitra ny nataonao.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Andriamanitra ô, amin’ny fitoerana masina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: amin’ny fahamasinana.
      marker-yv: yv-n
    - type: text
      text: ' ny làlanao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no andriamani-dehibe tahaka an’Andriamanitra?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hianao no Andriamanitra Izay manao fahagagana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nampahalala ny herinao teny amin’ny firenena Hianao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Navotan’ny sandrinao ny olonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny taranak’i Jakoba sy Josefa.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny rano be nahita Anao, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rano be nahita Anao ka toran-kovitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nanonjanonja ny lalina.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nandatsaka ranonorana ny rahona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nikotrokotroka ny lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nifanaretsaka koa ny zana-tsipìkanao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fikotrokotroky ny kotrokorana dia teo amin’ny tadio;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.18 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia nikodiadia.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahazava izao rehetra izao ny helatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nihovotrovotra sy nihorohoro ny tany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tany amin’ny ranomasina ny làlanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny nalehanao dia tany amin’ny rano mandriaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy fantatra ny dian-tongotrao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tamin’ny andro fahoriako no nitadiavako ny Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànako nasandratra nony alina ka tsy vizana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanahiko tsy nety nampiononina.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny tànan’i Mosesy sy Arona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No nitondranao ny olonao toy ny ondry.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ta-hahatsiaro an’Andriamanitra aho, ka dia nisento;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te-hieritreritra aho, ka dia reraka ny fanahiko.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mampiari-tory ny masoko Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitebiteby aho ka tsy mahateny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nihevitra ny andro fahiny aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny taon-dasa ela.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ta-hahatsiaro ny nitendreko valiha tamin’ny alina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te-hidinidinika amin’ny foko aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny fanahiko nanontany mafy hoe:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hanary mandrakizay va ny Tompo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hankasitraka intsony va Izy?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Efa nitsahatra mandrakizay va ny famindrampony?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tapitra mandrakizay va ny teniny?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Efa nanadino hamindra fo va Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nohidiany an-katezerana va ny fiantrany?
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
