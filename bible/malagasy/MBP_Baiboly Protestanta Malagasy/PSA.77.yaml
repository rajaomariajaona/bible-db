document_id: PSA.77,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatsiarovana ny amin’ny taon-dasa ho enti-mampionona ny fo, raha mila ho reraka.
  - type: text
    content: Ho an’ny mpiventy hira. Al-jedotona. Salamo natoan’i Asafa.
  - type: text
    content: NY feoko dia mankany amin’Andriamanitra, ka mitaraina aho,
  - type: text
    content: Eny, ny feoko mankany amin’Andriamanitra, ka mihaino ahy Izy.
  '10':
  - type: text
    content: 'Ary hoy izaho: Izao no mahararirary ny foko,'
  - type: text
    content: Dia ny niovan’
  - type: note
    content: 'Na: Nefa tsarovako ny taonan’.'
  - type: text
    content: ' ny tànana ankavanan’ny Avo Indrindra.'
  '11':
  - type: text
    content: Hampahatsiaro ny asan’i Jehovah aho,
  - type: text
    content: Fa ta-hahatsiaro ny fahagagana nataonao fony taloha;
  '12':
  - type: text
    content: Eny, hisaina ny asanao rehetra aho
  - type: text
    content: Ary hihevitra ny nataonao.
  '13':
  - type: text
    content: Andriamanitra ô, amin’ny fitoerana masina
  - type: note
    content: 'Na: amin’ny fahamasinana.'
  - type: text
    content: ' ny làlanao;'
  - type: text
    content: Iza no andriamani-dehibe tahaka an’Andriamanitra?
  '14':
  - type: text
    content: Hianao no Andriamanitra Izay manao fahagagana;
  - type: text
    content: Efa nampahalala ny herinao teny amin’ny firenena Hianao.
  '15':
  - type: text
    content: Navotan’ny sandrinao ny olonao,
  - type: text
    content: Dia ny taranak’i Jakoba sy Josefa.
  - type: text
    content: '[Sela.]'
  '16':
  - type: text
    content: Ny rano be nahita Anao, Andriamanitra ô;
  - type: text
    content: Ny rano be nahita Anao ka toran-kovitra;
  - type: text
    content: Eny, nanonjanonja ny lalina.
  '17':
  - type: text
    content: Nandatsaka ranonorana ny rahona;
  - type: text
    content: Nikotrokotroka ny lanitra;
  - type: text
    content: Nifanaretsaka koa ny zana-tsipìkanao.
  '18':
  - type: text
    content: Ny fikotrokotroky ny kotrokorana dia teo amin’ny tadio;
  - type: note
    content: 'Na: dia nikodiadia.'
  - type: text
    content: Nahazava izao rehetra izao ny helatra;
  - type: text
    content: Nihovotrovotra sy nihorohoro ny tany.
  '19':
  - type: text
    content: Tany amin’ny ranomasina ny làlanao,
  - type: text
    content: Ary ny nalehanao dia tany amin’ny rano mandriaka,
  - type: text
    content: Ka tsy fantatra ny dian-tongotrao.
  '2':
  - type: text
    content: Tamin’ny andro fahoriako no nitadiavako ny Tompo;
  - type: text
    content: Ny tànako nasandratra nony alina ka tsy vizana;
  - type: text
    content: Ny fanahiko tsy nety nampiononina.
  '20':
  - type: text
    content: Ny tànan’i Mosesy sy Arona
  - type: text
    content: No nitondranao ny olonao toy ny ondry.
  '3':
  - type: text
    content: Ta-hahatsiaro an’Andriamanitra aho, ka dia nisento;
  - type: text
    content: Te-hieritreritra aho, ka dia reraka ny fanahiko.
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: Mampiari-tory ny masoko Hianao;
  - type: text
    content: Mitebiteby aho ka tsy mahateny.
  '5':
  - type: text
    content: Nihevitra ny andro fahiny aho,
  - type: text
    content: Dia ny taon-dasa ela.
  '6':
  - type: text
    content: Ta-hahatsiaro ny nitendreko valiha tamin’ny alina aho;
  - type: text
    content: Te-hidinidinika amin’ny foko aho,
  - type: text
    content: 'Ary ny fanahiko nanontany mafy hoe:'
  '7':
  - type: text
    content: Hanary mandrakizay va ny Tompo?
  - type: text
    content: Tsy hankasitraka intsony va Izy?
  '8':
  - type: text
    content: Efa nitsahatra mandrakizay va ny famindrampony?
  - type: text
    content: Efa tapitra mandrakizay va ny teniny?
  '9':
  - type: text
    content: Efa nanadino hamindra fo va Andriamanitra?
  - type: text
    content: Efa nohidiany an-katezerana va ny fiantrany?
  - type: text
    content: '[Sela.]'
