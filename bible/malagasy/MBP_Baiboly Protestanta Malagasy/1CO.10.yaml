document_id: 1CO.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana fandrao misy manaram-po araka ny nofo ka tratry ny loza.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'FA tsy tiako tsy ho fantatrareo, ry rahalahy, fa ny razantsika rehetra dia tambanin’ny rahona, ary izy rehetra namaky ny ranomasina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary izy rehetra dia natao batisa ho amin’i Mosesy tao amin’ny rahona sy ny ranomasina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary izy rehetra nihinana ny fihinam-panahy iray ihany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary izy rehetra nisotro ny fisotrom-panahy iray ihany; fa nisotro tamin’ny vatolampy fanahy izay nanaraka azy izy, ary Kristy izany vatolampy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nefa ny ankabiazany dia tsy sitrak’Andriamanitra, fa naringana tany an-efitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izany zavatra izany dia tonga anatra ho antsika, mba tsy ho mpila zava-dratsy isika toy ny nilan’ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary aoka tsy ho mpanompo sampy hianareo tahaka ny sasany tamin ireny, araka ny voasoratra hoe: ,,Ny olona nipetraka hihinana sy hisotro, dia nitsangana hilalao.’’ (Eks. 32.6). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary aoka tsy hijangajanga isika tahaka ny sasany tamin’ireny, ka telo arivo amby roa alina no ringana indray andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary aoka tsy haka fanahy ny Tompo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[an i Kristy].'
    marker-yv: yv-n
  - type: text
    text: ' isika, tahaka ny nakan’ny sasany tamin’ireny fanahy Azy, ka matin’ny menarana ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary aoka tsy himonomonona hianareo tahaka ny sasany tamin’ireny, izay matin’ny mpandringana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izany dia nanjo azy mba ho anatra, sady voasoratra izany ho fananarana antsika izay niharan’ny faran’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa izay manao azy fa efa mijoro tsara, dia aoka izy hitandrina, fandrao ho lavo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy misy fakam-panahy nahazo anareo afa-tsy izay zakan’ny olombelona; nefa mahatoky Andriamanitra ka tsy hamela anareo halaim-panahy mihoatra noho izay zakanareo; fa momba ny fakam-panahy dia hasiany làlana hahafahanareo koa mba hahazakanareo izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa amin’izany, ry malala, mandosira ny fanompoan-tsampy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Miteny toy ny amin’ny olo-manan-tsaina aho; heveronareo izay lazaiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny kapoaky ny fisaorana izay isaorantsika, tsy firaisana amin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiombonana.
    marker-yv: yv-n
  - type: text
    text: ' ny ran’i Kristy va izany? Ny mofo izay vakintsika, tsy firaisina amin’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiombonana.
    marker-yv: yv-n
  - type: text
    text: ' ny tenan’i Kristy va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Satria iray ihany ny mofo, dia tena iray ihany isika na dia maro aza; fa isika rehetra dia samy mandray amin’izany mofo iray izany avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indreo ny Isiraely araka ny nofo; moa izay mihinana ny fanatitra tsy mpiombona amin’ny alitara va?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Inona ary no holazaiko? Mety ho zavatra va ny hena aterina amin’ny sampy, na mety ho zavatra va ny sampy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsia, fa izay zavatra aterin’ny jentilisa ho fanatitra, dia ateriny amin’ny demonia, fa tsy amin’Andriamanitra (Deo. 32.17); koa tsy tiako ho mpiombona amin’ny demonia hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy mahazo misotro amin’ny kapoaky ny Tompo sy ny kapoaky ny demonia hianareo; tsy mahazo mihinana amin’ny latabatry ny Tompo sy ny latabatry ny demonia hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mampahasaro-piaro ny Tompo va isika? Mahery noho Izy va isika?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny zavatra rehetra azo atao, nefa tsy ny zavatra rehetra no mahasoa; ny zavatra rehetra azo atao, nefa tsy ny zavatra rehetra no mampandroso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aoka tsy hisy olona hitady ny hahasoa ny tenany, fa ny hahasoa ny namany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izay hena rehetra amidy eny an-tsena dia hano, fa aza manontany akory noho ny fieritreretana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'fa ,,an’i Jehovah ny tany sy izay rehetra eo aminy’’ (Sal. 24.1). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha misy amin’ny tsy mino manasa anareo, ka ta-handeha hianareo, dia hano izay arosony eo anoloanareo, fa aza manontany akory noho ny fieritreretana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa raha misy manao aminareo hoe: Hena naterina tamin’ny sampy io, dia aza homana noho ny amin’ilay nilaza sy ny fieritreretana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fieritreretana, hoy izaho, tsy ny an’ny tenanao, fa ny an’ny olon-kafa; fa nahoana ny fahafahako no dia tsarain’ny fieritreretan’ny olon-kafa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa raha amin’ny fisaorana no andraisako izany, nahoana aho no tenenina ratsy amin’izay anaovako fisaorana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Koa amin’izany, na mihinana na misotro hianareo, na inona na inona ataonareo, dia ataovy ho voninahitr’Andriamanitra izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Aza manao izay hahatafintohina ny Jiosy na ny jentilisa na ny fiangonan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: dia tahaka ahy koa manao izay hahafinaritra ny olona rehetra amin’ny zavatra rehetra ka tsy mitady ny mahasoa ahy ihany, fa ny mahasoa ny maro mba hovonjena izy.
