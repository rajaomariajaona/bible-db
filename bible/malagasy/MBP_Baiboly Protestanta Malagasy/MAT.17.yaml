document_id: MAT.17,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niovan’i Jesosy tarehy tao an-tendrombohitra.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 9.2-13; Lio. 9.28-36.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nony afaka henemana, Jesosy dia naka an’i Petera sy Jakoba ary Jaona rahalahiny ka nitondra azy niakatra ho any an-tendrombohitra avo mba hitokana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpianany nanontany Azy ka nanao hoe: Nahoana ary no ilazan’ny mpanora-dalàna fa Elia tsy maintsy ho avy aloha? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy namaly ka nanao hoe: Elia dia avy ihany ka hampody ny zavatra rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa lazaiko aminareo: Efa tonga sahady Elia; nefa ny olona tsy nahafantatra azy, fa nanao izay sitraky ny fony taminy. Dia tahaka izany koa no hampiaretany ny Zanak’olona. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia fantatry ny mpianatra fa Jaona Mpanao-batisa no nolazainy taminy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahasitranan’i Jesosy ilay zazalahy nampahorin’ny demonia.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 9.14-29; Lio. 9.37-43.
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa tonga teo amin’ny vahoaka izy ireo, nisy lehilahy anankiray nanatona an’i Jesosy, dia nandohalika teo anatrehany ka nanao hoe: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tompoko, mamindrà fo amin’ny zanako-lahy, fa mararin’ny androbe izy ka mahantra tokoa; fa matetika izy no mianjera ao amin’ny afo, ary matetika ao amin’ny rano. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitondra azy tamin’ny mpianatrao aho, fa tsy nahay nahasitrana azy izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy namaly ka nanao hoe: Ry taranaka tsy mino sady efa nivadika, mandra-pahoviana no hitoerako aminareo? mandra-pahoviana no handeferako aminareo? Ento atỳ amiko izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niteny mafy azy Jesosy, dia nivoaka taminy ny demonia, ka sitrana ilay zazalahy tamin’izay ora izay.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankao amin’i Jesosy mangingina ny mpianatra ka nanao hoe: Nahoana izahay no tsy nahavoaka azy? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niova tarehy teo anatrehany Izy, ka ny tavany namirapiratra tahaka ny masoandro, ary ny fitafiany tonga fotsy tahaka ny mazava. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy taminy: Noho ny fahakelezan’ny finoanareo ihany; fa lazaiko aminareo marina tokoa: Raha manana finoana hoatra ny voan-tsinapy iray aza hianareo ka hiteny amin’io tendrombohitra io hoe: Mifindrà erỳ, dia hifindra izy; ary tsy hisy tsy ho hainareo hatao.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ampio hoe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[21 Kanefa iny karazana iny tsy mivoaka raha tsy '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'avoaka '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: amin’ny fivavahana sy ny fifadian-kanina.]
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nilazan’i Jesosy fanindroany ny hahafatesany sy ny hitsanganany indray.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 9.30-32; Lio. 9.43-45.
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY raha nitoetra tany Galilia izy, Jesosy dia nilaza tamin’ny mpianany hoe: Ny Zanak’olona efa hatolotra ho eo an-tànan’ny olona '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka hovonoiny, nefa amin’ny andro fahatelo dia hatsangana indray Izy. Ary dia nalahelo indrindra ireo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nampandoavan’i Jesosy an’i Petera ny antsasaky ny sekely.
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY nony tonga tao Kapernaomy izy, dia nankeo amin’i Petera ny mpandray ny antsasaky ny sekely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: didrakma.
      marker-yv: yv-n
    - type: text
      text: ' ka nanao hoe: Moa ny mpampianatra anareo tsy mba mandoa ny antsasaky ny sekely'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: didrakma.
      marker-yv: yv-n
    - type: text
      text: ' va? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Petera: Mandoa ihany Izy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha vao tafiditra tao an-trano Petera, dia nosakanan’i Jesosy teny izy ka nataony hoe: Ahoana no hevitrao, ry Simona? Avy amin’iza moa no andraisan’ny mpanjaka etỳ an-tany fadintseranana sy vola hetra? Avy amin’ny zanany va, sa avy amin’ny olon-kafa? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hoy Petera taminy: Avy amin’ny olon-kafa, dia hoy kosa Jesosy: Dia afaka ary ny zanaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa andrao isika manafintohina azy, dia mankanesa ao amin’ny ranomasina hianao, ka manjonoa; ary raiso izay hazandrano azo voalohany, ka rehefa sokafanao ny vavany, dia hahita vola sekely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: statera.
      marker-yv: yv-n
    - type: text
      text: eo hianao; dia raiso izany, ka omeo azy ho avy amiko sy hianao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary, indreo, niseho tamin’ny mpianatra Mosesy sy Elia, niresaka tamin’i Jesosy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny Petera ka nanao tamin’i Jesosy hoe: Tompoko, tsara raha mitoetra eto isika; koa raha sitrakao, aoka aho hanao lay telo eto: ny anankiray ho Anao, ny anankiray ho an’i Mosesy, ary ny anankiray ho an’i Elia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola niteny izy, indro, nisy rahona mazava nanarona azy ireo; ary, injao, nisy feo avy tao amin’ny rahona nanao hoe: Ity no Zanako malalako Izay sitrako; Izy no henoy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nandre izany ny mpianatra, dia lavo niankohoka sady natahotra indrindra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nankeo aminy, dia nanendry azy ka nanao hoe; Mitsangàna, fa aza matahotra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony niandrandra izy ireo, dia tsy nahita olona, afa-tsy Jesosy irery ihany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nidina avy tao an-tendrombohitra izy, dia nandrara azy Jesosy ka nanao hoe: Aza milaza amin’olona ny fahitana, mandra-pitsangan’ny Zanak’olona amin’ny maty.'
