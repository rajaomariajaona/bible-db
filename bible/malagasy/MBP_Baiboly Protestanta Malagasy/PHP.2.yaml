document_id: PHP.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra hamporisika ny Filipiana hitondra tena tsara sy hanetry tena tahaka an’i Jesosy Kristy.
  - type: text
    content: 'KOA raha misy famporisihana ao amin’i Kristy, raha misy fampiononana avy amin’ny fitiavana, raha misy firaisana amin’ny Fanahy, raha misy famindrampo sy fiantrana, '
  '10':
  - type: text
    content: 'mba ho amin’ny anaran’i Jesosy no handohalehan’ny lohalika rehetra, na ny any an-danitra, na ny etỳ an-tany, na ny any ambanin’ny tany, '
  '11':
  - type: text
    content: sy haneken’ny lela rehetra fa Jesosy Kristy no Tompo ho voninahitr’Andriamanitra Ray.
  '12':
  - type: text
    content: 'Koa amin’izany, ry malalako, tahaka ny nanekenareo mandrakariva, tsy fony teo aminareo ihany aho, fa ankehitriny dia bebe kokoa aza raha tsy eo aho, miasà amin’ny tahotra sy ny hovitra hahatanteraka ny famonjena anareo. '
  '13':
  - type: text
    content: 'Fa Andriamanitra no miasa ao anatinareo na ny fikasana na ny fanaovana hahatanteraka ny sitrapony. '
  '14':
  - type: text
    content: 'Ataovy ny zavatra rehetra amin’ny tsi-fimonomononana sy ny tsi-fisalasalana, '
  '15':
  - type: text
    content: 'mba ho tsy manan-tsiny sady tsy misy fitaka hianareo, dia zanak’Andriamanitra tsy manana adidy eo amin’ny firenena meloka sy maditra, izay isehoanareo tahaka ny fanazavana eo amin’izao tontolo izao, '
  '16':
  - type: text
    content: 'mitana ny tenin’ny fiainana, mba hisy ho reharehako amin’ny andron’i Kristy, ka tsy ho nihazakazaka foana aho na nisasatra foana. '
  '17':
  - type: text
    content: 'Eny, na dia haidina ho fanatitra aidina eo amin’ny fanatitra sy fisoronan’ny finoanareo aza aho, dia faly ka miara-mifaly aminareo rehetra. '
  '18':
  - type: text
    content: Ary aoka izany no hampifaly anareo koa, ary miaraha mifaly amiko.
  - type: heading
    content: Ny amin’i Timoty sy Epafrodito.
  '19':
  - type: text
    content: 'NEFA manantena ao amin’i Jesosy Tompo aho fa haniraka an’i Timoty faingana ho atỳ aminareo, mba hifaliako koa, rehefa fantatro ny toetrareo. '
  '2':
  - type: text
    content: 'dia tanteraho ny fifaliako, mba hiraisanareo saina, miray fitiavana, miray fo, miray hevitra, '
  '20':
  - type: text
    content: Fa tsy manana olona mitovy fanahy amiko
  - type: note
    content: 'Na: aminy.'
  - type: text
    content: ' aho na dia iray akory aza, izay hazoto hiahy anareo. '
  '21':
  - type: text
    content: 'Fa izy rehetra dia samy mitady ny azy avy, fa tsy ny an’i Jesosy Kristy; '
  '22':
  - type: text
    content: 'izy kosa dia fantatrareo fa lehilahy voazaha toetra, fa efa niara-nanompo tamiko teo amin’ny filazantsara, tahaka ny zanaka manompo ny rainy. '
  '23':
  - type: text
    content: 'Ary izy no antenaiko hirahina faingana, rehefa hitako izay ho toetro. '
  '24':
  - type: text
    content: Fa matoky ao amin’ny Tompo aho fa ny tenako dia mbola ho avy faingana koa.
  '25':
  - type: text
    content: Nefa nihevitra aho fa tokony hampandehaniko hankatỳ aminareo Epafrodito, rahalahiko sady mpiray asa amiko no miaramila namako ary irakareo
  - type: note
    content: Gr. apostolinareo.
  - type: text
    content: ' sy mpanompo hanome izay nilaiko. '
  '26':
  - type: text
    content: 'Fa manina anareo rehetra izy ka difotra alahelo, satria efa renareo fa narary izy. '
  '27':
  - type: text
    content: 'Eny, fa narary saiky maty tokoa izy; nefa Andriamanitra namindra fo taminy, ary tsy taminy ihany, fa tamiko koa, fandrao hanana alahelo mifanontona aho. '
  '28':
  - type: text
    content: 'Koa nazoto kokoa haniraka azy aho, mba hifalianareo, rehefa hitanareo indray izy, ary mba ho afaka alahelo kokoa aho. '
  '29':
  - type: text
    content: 'Koa raiso ao amin’ny Tompo izy amin’ny fifaliana indrindra, ary omeo voninahitra izay olona tahaka izany; '
  '3':
  - type: text
    content: 'tsy manao na inona na inona amin’ny fifampiandaniana, na mandrani-tena foana fa amin’ny fanetren-tena dia aoka samy hanao ny namany ho mihoatra noho ny tenany. '
  '30':
  - type: text
    content: fa saiky maty izy noho ny asan’i Kristy sady nanao ny ainy tsy ho zavatra mba hanefa izay tsy vitanareo tamin’ny fanompoana ahy.
  '4':
  - type: text
    content: Aza samy mihevitra ny azy ihany, fa samy ny an’ny namany koa.
  '5':
  - type: text
    content: 'Aoka ho ao aminareo izao saina izao, izay tao amin’i Kristy Jesosy koa, '
  '6':
  - type: text
    content: 'Izay, na dia nanana ny endrik’Andriamanitra aza, dia tsy nataony ho zavatra hofikiriny mafy ny fitoviana amin’Andriamanitra, '
  '7':
  - type: text
    content: 'fa nofoanany ny tenany tamin’ny nakany ny endriky ny mpanompo sy ny nahatongavany ho manam-pitoviana amin’ny olona; '
  '8':
  - type: text
    content: 'ary rehefa hita fa nanan-tarehy ho olona Izy, dia nanetry tena ka nanaiky hatramin’ny fahafatesana, dia ilay fahafatesana tamin’ny hazofijaliana. '
  '9':
  - type: text
    content: 'Koa izany no nanandratan’Andriamanitra Azy indrindra sy nanomezany Azy ny anarana izay ambony noho ny anarana rehetra, '
