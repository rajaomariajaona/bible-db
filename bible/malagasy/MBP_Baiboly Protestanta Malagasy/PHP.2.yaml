document_id: PHP.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Anatra hamporisika ny Filipiana hitondra tena tsara sy hanetry tena tahaka an’i Jesosy Kristy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'KOA raha misy famporisihana ao amin’i Kristy, raha misy fampiononana avy amin’ny fitiavana, raha misy firaisana amin’ny Fanahy, raha misy famindrampo sy fiantrana, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho amin’ny anaran’i Jesosy no handohalehan’ny lohalika rehetra, na ny any an-danitra, na ny etỳ an-tany, na ny any ambanin’ny tany, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sy haneken’ny lela rehetra fa Jesosy Kristy no Tompo ho voninahitr’Andriamanitra Ray.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin’izany, ry malalako, tahaka ny nanekenareo mandrakariva, tsy fony teo aminareo ihany aho, fa ankehitriny dia bebe kokoa aza raha tsy eo aho, miasà amin’ny tahotra sy ny hovitra hahatanteraka ny famonjena anareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Andriamanitra no miasa ao anatinareo na ny fikasana na ny fanaovana hahatanteraka ny sitrapony. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ataovy ny zavatra rehetra amin’ny tsi-fimonomononana sy ny tsi-fisalasalana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho tsy manan-tsiny sady tsy misy fitaka hianareo, dia zanak’Andriamanitra tsy manana adidy eo amin’ny firenena meloka sy maditra, izay isehoanareo tahaka ny fanazavana eo amin’izao tontolo izao, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mitana ny tenin’ny fiainana, mba hisy ho reharehako amin’ny andron’i Kristy, ka tsy ho nihazakazaka foana aho na nisasatra foana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, na dia haidina ho fanatitra aidina eo amin’ny fanatitra sy fisoronan’ny finoanareo aza aho, dia faly ka miara-mifaly aminareo rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aoka izany no hampifaly anareo koa, ary miaraha mifaly amiko.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’i Timoty sy Epafrodito.
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NEFA manantena ao amin’i Jesosy Tompo aho fa haniraka an’i Timoty faingana ho atỳ aminareo, mba hifaliako koa, rehefa fantatro ny toetrareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia tanteraho ny fifaliako, mba hiraisanareo saina, miray fitiavana, miray fo, miray hevitra, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy manana olona mitovy fanahy amiko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aminy.
      marker-yv: yv-n
    - type: text
      text: ' aho na dia iray akory aza, izay hazoto hiahy anareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izy rehetra dia samy mitady ny azy avy, fa tsy ny an’i Jesosy Kristy; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izy kosa dia fantatrareo fa lehilahy voazaha toetra, fa efa niara-nanompo tamiko teo amin’ny filazantsara, tahaka ny zanaka manompo ny rainy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy no antenaiko hirahina faingana, rehefa hitako izay ho toetro. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa matoky ao amin’ny Tompo aho fa ny tenako dia mbola ho avy faingana koa.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa nihevitra aho fa tokony hampandehaniko hankatỳ aminareo Epafrodito, rahalahiko sady mpiray asa amiko no miaramila namako ary irakareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: apostolinareo.
      marker-yv: yv-n
    - type: text
      text: ' sy mpanompo hanome izay nilaiko. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa manina anareo rehetra izy ka difotra alahelo, satria efa renareo fa narary izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, fa narary saiky maty tokoa izy; nefa Andriamanitra namindra fo taminy, ary tsy taminy ihany, fa tamiko koa, fandrao hanana alahelo mifanontona aho. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nazoto kokoa haniraka azy aho, mba hifalianareo, rehefa hitanareo indray izy, ary mba ho afaka alahelo kokoa aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raiso ao amin’ny Tompo izy amin’ny fifaliana indrindra, ary omeo voninahitra izay olona tahaka izany; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy manao na inona na inona amin’ny fifampiandaniana, na mandrani-tena foana fa amin’ny fanetren-tena dia aoka samy hanao ny namany ho mihoatra noho ny tenany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa saiky maty izy noho ny asan’i Kristy sady nanao ny ainy tsy ho zavatra mba hanefa izay tsy vitanareo tamin’ny fanompoana ahy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza samy mihevitra ny azy ihany, fa samy ny an’ny namany koa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho ao aminareo izao saina izao, izay tao amin’i Kristy Jesosy koa, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay, na dia nanana ny endrik’Andriamanitra aza, dia tsy nataony ho zavatra hofikiriny mafy ny fitoviana amin’Andriamanitra, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nofoanany ny tenany tamin’ny nakany ny endriky ny mpanompo sy ny nahatongavany ho manam-pitoviana amin’ny olona; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rehefa hita fa nanan-tarehy ho olona Izy, dia nanetry tena ka nanaiky hatramin’ny fahafatesana, dia ilay fahafatesana tamin’ny hazofijaliana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izany no nanandratan’Andriamanitra Azy indrindra sy nanomezany Azy ny anarana izay ambony noho ny anarana rehetra, '
