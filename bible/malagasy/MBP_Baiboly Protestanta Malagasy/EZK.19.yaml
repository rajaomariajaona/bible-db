document_id: EZK.19
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Hira fahalahelovana ny amin’ireo lehiben’ny Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY manaova hira fahalahelovana ny amin’ireo andrianan’ny Isiraely hianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka ataovy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahoana ny liom-bavy reninareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: No namitsaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Inona moa reninareo? Liom-bavi-izy. Namitsaka.
    marker-yv: yv-n
  - type: text
    text: ' tao amin’ny liom-bavy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nitaiza ny zanany tao amin’ny liona tanora?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nahalehibe ny zanany anankiray izy, dia tonga liona tanora io
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nianatra hamiravira haza sady nihinana olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nahare ny lazany ny firenena, dia namandrika azy tamin’ny lavaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nasiany masom-by ny orony, dia nentiny ho any amin’ny tany Egypta izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary nony hitan’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny liom-bavy
  - type: text
    text: ' fa foana sy levona ny fanantenany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nangalany indray ny zanany ka notezainy ho tonga liona tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary nivoivoy teny amin’ny liom-bavy iny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tonga liona tanora
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nianatra hamiravira haza sady nihinana olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nisavika ny mpitondratenan’ireny izy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary fantany ny lapan’ireny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nandrava ny tanànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka lao ny tany mbamin’izay rehetra tao aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny feon’ny fierony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny jentilisa manodidina, izay avy any amin’ny fanjakana samy hafa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanamboatra sy namelatra ny fandrika haratony taminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia voafandrika tamin’ny lavaka izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nataony tamin’ny vata izy, sady nasiany masom-by ny orony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nentiny ho any amin’ny mpanjakan’i Babylona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nentiny ho ao amin’ny fiarovana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy ho re eny amin’ny tendrombohitry ny Isiraely intsony ny feony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny reninao dia tahaka ny voaloboka voavoly teo amoron-drano
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tamin’ny andro niadananao:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Fony tamin’ny ranao hianao; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'xvi. 6; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eny, tahaka ny tenanao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vokatra sady nanaroka izy azon’ny rano be,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ka nisy rantsany mafy azo natao tehim-panjakana ho an’izay manapaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tonga avo izy ka nitehika tamin’ny rahona matevina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niseho tamin’ny hahavony izy noho ny hamaroan’ny rantsany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nefa nongotana tamin’ny fahavinirana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nazera ho amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny rivotra avy any atsinanana no nahamaina ny voany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny rantsany mafy dia tapaka ka maina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Levon’ny afo ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ankehitriny voavoly any an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ao amin’ny tany maina karankaina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary afo no mivoaka avy amin’ny sampany misy tehina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mandevona ny voany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy misy rantsany mafy azo atao tehim-panjakana ho fanapahana intsony izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hira fahalahelovana izany sady mbola ho hira fahalahelovana ihany.
