document_id: EZK.19,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fahalahelovana ny amin’ireo lehiben’ny Isiraely.
  - type: text
    content: 'ARY manaova hira fahalahelovana ny amin’ireo andrianan’ny Isiraely hianao, '
  '10':
  - type: text
    content: Ny reninao dia tahaka ny voaloboka voavoly teo amoron-drano
  - type: text
    content: 'Tamin’ny andro niadananao:'
  - type: note
    content: 'Na: Fony tamin’ny ranao hianao; izahao xvi. 6; na: Eny, tahaka ny tenanao.'
  - type: text
    content: Vokatra sady nanaroka izy azon’ny rano be,
  '11':
  - type: text
    content: Ka nisy rantsany mafy azo natao tehim-panjakana ho an’izay manapaka,
  - type: text
    content: Dia tonga avo izy ka nitehika tamin’ny rahona matevina,
  - type: text
    content: Ary niseho tamin’ny hahavony izy noho ny hamaroan’ny rantsany.
  '12':
  - type: text
    content: Nefa nongotana tamin’ny fahavinirana izy
  - type: text
    content: Ka nazera ho amin’ny tany,
  - type: text
    content: Ary ny rivotra avy any atsinanana no nahamaina ny voany;
  - type: text
    content: Ny rantsany mafy dia tapaka ka maina;
  - type: text
    content: Levon’ny afo ireny.
  '13':
  - type: text
    content: Ary ankehitriny voavoly any an-efitra,
  - type: text
    content: Dia ao amin’ny tany maina karankaina izy.
  '14':
  - type: text
    content: Ary afo no mivoaka avy amin’ny sampany misy tehina
  - type: text
    content: Ka mandevona ny voany,
  - type: text
    content: Dia tsy misy rantsany mafy azo atao tehim-panjakana ho fanapahana intsony izy.
  - type: text
    content: Hira fahalahelovana izany sady mbola ho hira fahalahelovana ihany.
  '2':
  - type: text
    content: 'ka ataovy hoe:'
  - type: text
    content: Nahoana ny liom-bavy reninareo
  - type: text
    content: No namitsaka
  - type: note
    content: 'Na: Inona moa reninareo? Liom-bavi-izy. Namitsaka.'
  - type: text
    content: ' tao amin’ny liom-bavy'
  - type: text
    content: Ary nitaiza ny zanany tao amin’ny liona tanora?
  '3':
  - type: text
    content: Ary nahalehibe ny zanany anankiray izy, dia tonga liona tanora io
  - type: text
    content: Ka nianatra hamiravira haza sady nihinana olona.
  '4':
  - type: text
    content: Nahare ny lazany ny firenena, dia namandrika azy tamin’ny lavaka,
  - type: text
    content: Ka nasiany masom-by ny orony, dia nentiny ho any amin’ny tany Egypta izy.
  '5':
  - type: text
    content: Ary nony hitan’
  - type: text
    content: ny liom-bavy
  - type: text
    content: ' fa foana sy levona ny fanantenany,'
  - type: text
    content: Dia nangalany indray ny zanany ka notezainy ho tonga liona tanora.
  '6':
  - type: text
    content: Ary nivoivoy teny amin’ny liom-bavy iny,
  - type: text
    content: Dia tonga liona tanora
  - type: text
    content: Ka nianatra hamiravira haza sady nihinana olona.
  '7':
  - type: text
    content: Ary nisavika ny mpitondratenan’ireny izy
  - type: note
    content: 'Na: Ary fantany ny lapan’ireny.'
  - type: text
    content: Sady nandrava ny tanànany,
  - type: text
    content: Ka lao ny tany mbamin’izay rehetra tao aminy
  - type: text
    content: Noho ny feon’ny fierony.
  '8':
  - type: text
    content: Ary ny jentilisa manodidina, izay avy any amin’ny fanjakana samy hafa,
  - type: text
    content: Dia nanamboatra sy namelatra ny fandrika haratony taminy,
  - type: text
    content: Ka dia voafandrika tamin’ny lavaka izy.
  '9':
  - type: text
    content: Ary nataony tamin’ny vata izy, sady nasiany masom-by ny orony,
  - type: text
    content: Ka nentiny ho any amin’ny mpanjakan’i Babylona izy,
  - type: text
    content: Nentiny ho ao amin’ny fiarovana izy,
  - type: text
    content: Mba tsy ho re eny amin’ny tendrombohitry ny Isiraely intsony ny feony.
