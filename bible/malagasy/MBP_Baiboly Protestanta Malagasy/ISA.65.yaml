document_id: ISA.65
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fandavan’i Jehovah ny maro noho ny fanao tsy marina narahiny, sy ny fitahiana kasainy ho amin’ny mibebaka.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NOTADIAVIN’izay tsy naniry Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hitan’izay tsy nitady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy Izaho tamin’ny firenena izay tsy nantsoina tamin’ny anarako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inty Aho! Inty Aho!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Namelatra ny tànako mandritra ny andro Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny firenena miodina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mandeha amin’ny làlana tsy tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny fisainany ihany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia firenena izay nahatezitra Ahy mandrakariva na dia eo imasoko aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mamono zavatra hatao fanatitra eo amin’ny tanimboly
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mandoro ditin-kazo manitra eny ambonin’ny tanimanga,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia izay mipetraka any amin’ny fasana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitoetra mandritra ny alina ao am-pierena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mihinana henan-kisoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ron’ny hena fahavetavetana no ao amin’ny loviany,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay manao hoe: Mihataha, fa aza manakaiky ahy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izaho no masina, fa tsy hianao,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireny dia setroka ao am-bavoroko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, afo mirehitra mandritra ny andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indro, izao no voasoratra eo anatrehako:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hangina Aho mandra-pamaliko anareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mandra-pamaliko ho ao an-tratranareo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tratrany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny helokareo sy ny heloky ny razanareo koa, hoy Jehovah,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay olona nandoro ditin-kazo manitra teny an-tendrombohitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nihaika Ahy teny amin’ny havoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hamatra ny valin’ny asany ho ao an-tratrany Aho aloha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny ranom-boaloboka hita ao an-tsampahony
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka ataon’ny olona hoe: Aza simbana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa misy fitahiana ao anatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany no hataoko noho ny amin’ny mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hanimba azy rehetra Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hahatonga taranaka avy amin’i Jakoba Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mpandova ny tendrombohitro avy amin’i Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ireo voafidiko no handova azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny mpanompoko no honina ao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sarôna ho tonga fiandrasana ondry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lohasaha Akora ho fandrian’omby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho an’ny oloko izay nitady Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny aminareo izay mahafoy an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy manadino ny tendrombohitro masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mamelatra latabatra ho an’i Gada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gada = Zara, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Menỳ = Vintana; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: samy anaran’andriamani-tsi-izy ireo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mampidina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mameno.
    marker-yv: yv-n
  - type: text
    text: ' divay noharoharoan-javatra ho an’i Menỳ,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gada = Zara, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'ary '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Menỳ = Vintana; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: samy anaran’andriamani-tsi-izy ireo.
    marker-yv: yv-n
  - type: text
    text: ' –'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia hotendreko ho voan’ny sabatra hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hankohofina hovonoina avokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria niantso Aho, fa tsy namaly hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niteny Aho, fa tsy nihaino hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nanao izay ratsy eo imasoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay tsy sitrako no nofidinareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lndro, ny mpanompoko hihinana, fa hianareo kosa ho mosarena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, ny mpanompoko hisotro, fa hianareo kosa ho main-tenda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, ny mpanompoko hifaly, fa hianareo kosa ho menatra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, ny mpanompoko hihoby noho ny faharavoam-po,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hianareo kosa hitoloko noho ny alahelom-po
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanaintainam-po.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hidradradradra noho ny fahoriam-panahy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahatorotoroam-panahy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary hamela ny anaranareo ho fiozonana amin’ireo voafidiko hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahafaty anao Jehovah Tompo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny mpanompony kosa dia homeny anaram-baovao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ka izay miarahaba tena etỳ ambonin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanao izany amin’ny anaran’Andriamanitry ny Amena;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amena = fahamarinana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mianiana etỳ ambonin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianiana amin’Andriamanitry ny Amena,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amena = fahamarinana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa hadino ny fahoriana taloha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady voàfina izany ka tsy hitan’ny masoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa, indro, Izaho mahary lanitra vaovao sy tany vaovao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy hotsarovana intsony ny taloha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ho mby ao an-tsaina akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa mifalia kosa sy miravoravoa mandrakizay, satria mahary izany Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa, indro, mahary an’i Jerosalema ho fifaliana Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olony ho firavoravoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia ho faly amin’i Jerosalema Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho ravoravo amin’ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny feo mitomany tsy ho re any intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny feo mitaraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary na dia ny zaza minono any aza dia tsy ho fohy andro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hisy anti-panahy izay tsy nahatapitra ny androny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola zatovo ihany izay maty na dia efa zato taona aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanota aza, dia hahatratra zato taona vao hozonina.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary ny mpanota izay mahatratra zato taona ihany dia hatao ho voaozona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hanao trano ny olona ka hitoetra ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanao tanimboaloboka ny olona ka hihinana ny vokatra aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy hanao trano hitoeran’olon-kafa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hamboly zavatra hohanin’olon-kafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho tahaka ny andron’ny hazo ny andron’ny oloko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ireo voafidiko dia hanaram-po amin’ny asan’ny tànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tsy hisasatra foana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hitera-jaza ho tratry ny loza tampoka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa taranak’izay notahin’i Jehovah ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary terany ho ao aminy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mbamin’ny terany koa.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha tsy mbola miantso aza izy dia hamaly Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha mbola miteny izy, dia hihaino Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lopa.
    marker-yv: yv-n
  - type: text
    text: ' sy ny zanak’ondry hiara-komana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny liona hihina-mololo tahaka ny omby,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny menarana, dia vovoka no ho fihinany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy handratra na hanimba eran’ny tendrombohitro masina izy, hoy Jehovah.
