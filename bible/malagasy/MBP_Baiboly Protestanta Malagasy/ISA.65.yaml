document_id: ISA.65,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fandavan’i Jehovah ny maro noho ny fanao tsy marina narahiny, sy ny fitahiana kasainy ho amin’ny mibebaka.
  - type: text
    content: NOTADIAVIN’izay tsy naniry Aho
  - type: text
    content: Sy hitan’izay tsy nitady;
  - type: text
    content: 'Hoy Izaho tamin’ny firenena izay tsy nantsoina tamin’ny anarako:'
  - type: text
    content: Inty Aho! Inty Aho!
  '10':
  - type: text
    content: Sarôna ho tonga fiandrasana ondry,
  - type: text
    content: Ary ny lohasaha Akora ho fandrian’omby,
  - type: text
    content: Ho an’ny oloko izay nitady Ahy.
  '11':
  - type: text
    content: Fa ny aminareo izay mahafoy an’i Jehovah
  - type: text
    content: Sy manadino ny tendrombohitro masina,
  - type: text
    content: Sady mamelatra latabatra ho an’i Gada
  - type: note
    content: Gada = Zara, ary Menỳ = Vintana; samy anaran’andriamani-tsi-izy ireo.
  - type: text
    content: Sy mampidina
  - type: note
    content: Heb. mameno.
  - type: text
    content: ' divay noharoharoan-javatra ho an’i Menỳ,'
  - type: note
    content: Gada = Zara, ary Menỳ = Vintana; samy anaran’andriamani-tsi-izy ireo.
  - type: text
    content: ' –'
  '12':
  - type: text
    content: Dia hotendreko ho voan’ny sabatra hianareo
  - type: text
    content: Ka hankohofina hovonoina avokoa,
  - type: text
    content: Satria niantso Aho, fa tsy namaly hianareo,
  - type: text
    content: Niteny Aho, fa tsy nihaino hianareo,
  - type: text
    content: Fa nanao izay ratsy eo imasoko,
  - type: text
    content: Ary izay tsy sitrako no nofidinareo.
  '13':
  - type: text
    content: 'Koa izao no lazain’i Jehovah Tompo:'
  - type: text
    content: lndro, ny mpanompoko hihinana, fa hianareo kosa ho mosarena;
  - type: text
    content: Indro, ny mpanompoko hisotro, fa hianareo kosa ho main-tenda;
  - type: text
    content: Indro, ny mpanompoko hifaly, fa hianareo kosa ho menatra;
  '14':
  - type: text
    content: Indro, ny mpanompoko hihoby noho ny faharavoam-po,
  - type: text
    content: Fa hianareo kosa hitoloko noho ny alahelom-po
  - type: note
    content: Heb. fanaintainam-po.
  - type: text
    content: Sy hidradradradra noho ny fahoriam-panahy.
  - type: note
    content: Heb. fahatorotoroam-panahy.
  '15':
  - type: text
    content: Ary hamela ny anaranareo ho fiozonana amin’ireo voafidiko hianareo,
  - type: text
    content: Ary hahafaty anao Jehovah Tompo;
  - type: text
    content: Fa ny mpanompony kosa dia homeny anaram-baovao;
  '16':
  - type: text
    content: Ka izay miarahaba tena etỳ ambonin’ny tany
  - type: text
    content: Dia hanao izany amin’ny anaran’Andriamanitry ny Amena;
  - type: note
    content: Amena = fahamarinana.
  - type: text
    content: Ary izay mianiana etỳ ambonin’ny tany
  - type: text
    content: Dia hianiana amin’Andriamanitry ny Amena,
  - type: note
    content: Amena = fahamarinana.
  - type: text
    content: Satria efa hadino ny fahoriana taloha,
  - type: text
    content: Sady voàfina izany ka tsy hitan’ny masoko.
  '17':
  - type: text
    content: Fa, indro, Izaho mahary lanitra vaovao sy tany vaovao,
  - type: text
    content: Ka dia tsy hotsarovana intsony ny taloha,
  - type: text
    content: Na ho mby ao an-tsaina akory aza.
  '18':
  - type: text
    content: Fa mifalia kosa sy miravoravoa mandrakizay, satria mahary izany Aho;
  - type: text
    content: Fa, indro, mahary an’i Jerosalema ho fifaliana Aho
  - type: text
    content: Ary ny olony ho firavoravoana.
  '19':
  - type: text
    content: Dia ho faly amin’i Jerosalema Aho
  - type: text
    content: Sy ho ravoravo amin’ny oloko;
  - type: text
    content: Ary ny feo mitomany tsy ho re any intsony,
  - type: text
    content: Na ny feo mitaraina.
  '2':
  - type: text
    content: Namelatra ny tànako mandritra ny andro Aho
  - type: text
    content: Tamin’ny firenena miodina,
  - type: text
    content: Izay mandeha amin’ny làlana tsy tsara
  - type: text
    content: Araka ny fisainany ihany,
  '20':
  - type: text
    content: Ary na dia ny zaza minono any aza dia tsy ho fohy andro,
  - type: text
    content: Ary tsy hisy anti-panahy izay tsy nahatapitra ny androny;
  - type: text
    content: Fa mbola zatovo ihany izay maty na dia efa zato taona aza,
  - type: text
    content: Ary ny mpanota aza, dia hahatratra zato taona vao hozonina.
  - type: note
    content: 'Na: Ary ny mpanota izay mahatratra zato taona ihany dia hatao ho voaozona.'
  '21':
  - type: text
    content: Hanao trano ny olona ka hitoetra ao;
  - type: text
    content: Ary hanao tanimboaloboka ny olona ka hihinana ny vokatra aminy.
  '22':
  - type: text
    content: Tsy hanao trano hitoeran’olon-kafa izy,
  - type: text
    content: Na hamboly zavatra hohanin’olon-kafa;
  - type: text
    content: Fa ho tahaka ny andron’ny hazo ny andron’ny oloko,
  - type: text
    content: Ary ireo voafidiko dia hanaram-po amin’ny asan’ny tànany.
  '23':
  - type: text
    content: Tsy hisasatra foana izy,
  - type: text
    content: Na hitera-jaza ho tratry ny loza tampoka;
  - type: text
    content: Fa taranak’izay notahin’i Jehovah ireo,
  - type: text
    content: Ary terany ho ao aminy.
  - type: note
    content: 'Na: Mbamin’ny terany koa.'
  '24':
  - type: text
    content: Raha tsy mbola miantso aza izy dia hamaly Aho;
  - type: text
    content: Ary raha mbola miteny izy, dia hihaino Aho.
  '25':
  - type: text
    content: Ny amboadia
  - type: note
    content: lopa.
  - type: text
    content: ' sy ny zanak’ondry hiara-komana,'
  - type: text
    content: Ary ny liona hihina-mololo tahaka ny omby,
  - type: text
    content: Ary ny menarana, dia vovoka no ho fihinany;
  - type: text
    content: Ary tsy handratra na hanimba eran’ny tendrombohitro masina izy, hoy Jehovah.
  '3':
  - type: text
    content: Dia firenena izay nahatezitra Ahy mandrakariva na dia eo imasoko aza,
  - type: text
    content: Izay mamono zavatra hatao fanatitra eo amin’ny tanimboly
  - type: text
    content: Ary mandoro ditin-kazo manitra eny ambonin’ny tanimanga,–
  '4':
  - type: text
    content: Dia izay mipetraka any amin’ny fasana
  - type: text
    content: Ary mitoetra mandritra ny alina ao am-pierena,
  - type: text
    content: Sady mihinana henan-kisoa,
  - type: text
    content: Ary ny ron’ny hena fahavetavetana no ao amin’ny loviany,–
  '5':
  - type: text
    content: 'Izay manao hoe: Mihataha, fa aza manakaiky ahy,'
  - type: text
    content: Fa izaho no masina, fa tsy hianao,–
  - type: text
    content: Ireny dia setroka ao am-bavoroko,
  - type: text
    content: Eny, afo mirehitra mandritra ny andro.
  '6':
  - type: text
    content: 'Indro, izao no voasoratra eo anatrehako:'
  - type: text
    content: Tsy hangina Aho mandra-pamaliko anareo
  - type: note
    content: Heb. azy.
  - type: text
    content: Eny, mandra-pamaliko ho ao an-tratranareo
  - type: note
    content: Heb. tratrany.
  '7':
  - type: text
    content: Ny helokareo sy ny heloky ny razanareo koa, hoy Jehovah,–
  - type: text
    content: Dia izay olona nandoro ditin-kazo manitra teny an-tendrombohitra
  - type: text
    content: Ary nihaika Ahy teny amin’ny havoana;
  - type: text
    content: Eny, hamatra ny valin’ny asany ho ao an-tratrany Aho aloha.
  '8':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Tahaka ny ranom-boaloboka hita ao an-tsampahony
  - type: text
    content: 'Ka ataon’ny olona hoe: Aza simbana,'
  - type: text
    content: Fa misy fitahiana ao anatiny,
  - type: text
    content: Dia toy izany no hataoko noho ny amin’ny mpanompoko,
  - type: text
    content: Ka tsy hanimba azy rehetra Aho.
  '9':
  - type: text
    content: Hahatonga taranaka avy amin’i Jakoba Aho
  - type: text
    content: Sy mpandova ny tendrombohitro avy amin’i Joda;
  - type: text
    content: Ary ireo voafidiko no handova azy,
  - type: text
    content: Eny, ny mpanompoko no honina ao.
