document_id: DEU.34,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahafatesan’i Mosesy, sy ny nandevenana azy.
  - type: text
    content: 'DIA niakatra niala teo Arbota-moaba Mosesy ka nankany an-tendrombohitra Nebo, ao an-tampon’i Pisga, izay tandrifin’i Jeriko. Ary nasehon’i Jehovah azy ny tany Gileada rehetra hatrany Dana '
  '10':
  - type: text
    content: 'Ary tsy nisy mpaminany intsony niseho teo amin’ny Isiraely tahaka an’i Mosesy, izay fantatr’i Jehovah nifanatrika '
  '11':
  - type: text
    content: 'tamin’ny famantarana rehetra sy ny fahagagana, izay nanirahan’i Jehovah azy mba hataony tany Egypta tamin’i Farao sy ny mpanompony rehetra ary ny taniny rehetra '
  '12':
  - type: text
    content: ary tamin’ny herin-tànana rehetra sy ny fampahatahorana lehibe rehetra, izay nasehon’i Mosesy teo imason’ny Isiraely rehetra.
  '2':
  - type: text
    content: 'sy Naftaly rehetra sy ny tanin’ny Efraima sy ny Manase sy ny tanin’ny Joda rehetra hatramin’ny ranomasina andrefana '
  '3':
  - type: text
    content: ary ny tany atsimo sy ny ao amin’ny lohasahan’i Jeriko, tanàna be rofia,
  - type: note
    content: palma.
  - type: text
    content: ' hatrany Zoara. '
  '4':
  - type: text
    content: 'Dia hoy Jehovah taminy: Io no tany izay nianianako tamin’i Abrahama sy Isaka ary Jakoba hoe: Homeko ny taranakao izy; nataoko mahita azy ny masonao, nefa tsy ho tafita ho tonga eny hianao.'
  '5':
  - type: text
    content: 'Ary Mosesy, mpanompon’i Jehovah, dia maty teo amin’ny tany Moaba araka ny tenin’i Jehovah. '
  '6':
  - type: text
    content: Ary naleviny
  - type: note
    content: nalevina.
  - type: text
    content: ' tao an-dohasaha tao amin’ny tany Moaba, tandrifin’i Beti-peora, izy; ka tsy misy olona mahalala ny fasany mandraka andro-any.'
  '7':
  - type: text
    content: 'Efa roa-polo amby zato taona Mosesy vao maty; ary tsy pahina ny masony, na nihena ny heriny. '
  '8':
  - type: text
    content: Ary ny Zanak’Isiraely nisaona an’i Mosesy telo-polo andro teo Arbota-moaba; dia tapitra ny andro fitomaniana nisaonana an’i Mosesy.
  '9':
  - type: text
    content: Ary Josoa, zanak’i Nona, dia feno ny fanahim-pahendrena, fa efa nametrahan’i Mosesy tànana izy; dia nihaino azy ny Zanak’Isiraely ka nanao araka izay nandidian’i Jehovah an’i Mosesy.
