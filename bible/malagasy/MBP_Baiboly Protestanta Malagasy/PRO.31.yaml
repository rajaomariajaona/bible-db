document_id: PRO.31,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny tokony ho toetry ny mpanjaka.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY tenin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny teny ho an’.
      marker-yv: yv-n
    - type: text
      text: ' i Lemoela mpanjaka, dia ny teny mavesa-danja izay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lemoela, mpanjakan’i Masa, dia ilay.
      marker-yv: yv-n
    - type: text
      text: ' nananaran-dreniny azy.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: IZA no mahita vehivavy tsara?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mahay.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tombany dia mihoatra lavitra noho ny voahangy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: perla.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Matoky azy ny fon’ny lahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mitsahatra ny fanambinana azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Soa no ataon-dravehivavy aminy, fa tsy ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro rehetra iainany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mizaha volon’ondry sy rongony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mazoto miasa amin’ny tànany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Toy ny sambon’ny mpandranto izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka avy any amin’ny lavitra no itondrany ny haniny.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mifoha izy, raha mbola alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manome hanina ho an’ny ankohonany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy anjara ho an’ny ankizivaviny.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mihevitra saha izy ka mahazo azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vokatry ny tànany no anaovany tanimboaloboka.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Misikina hery izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hatanjahiny ny sandriny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hitany fa tsara ny tombom-barony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy maty jiro mandritra ny alina izy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mandray ny fihazonam-bohavoha izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tànany mihazona ny ampela.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ahoana, anaka? Ary ahoana, ry zanako naterako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ahoana, ry zanaky ny voadiko?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Manatsotra ny tànany amin’ny ory izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mamelatra ny tànany amin’ny mahantra.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tsy manahy ny orampanala ho amin’ny ankohonany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny ankohonany rehetra samy voatafy volon’ondry mena avokoa.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Manao firakotra ho azy izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitafiany dia rongony fotsy madinika sy lamba volomparasy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny lahy dia hajaina eo am-bavahady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha miara-mipetraka eo amin’ny loholona.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Manao akanjo hariry madinika ravehivavy ka mivarotra izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fehin-kibo no amidiny amin’ny mpandranto.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Kananita.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Hery sy voninahitra no fitafiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny andro ho avy dia ihomehezany.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Manokatra ny vavany amin’ny fahendrena izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lalàn’ny famindrampo no eo amin’ny lelany.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Mitandrina tsara ny ataon’ny ankohonany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy homana ny mofon’ny fahalainana.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny zanany mitsangana ka midera azy hoe sambatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny lahy koa mitsangana ka midera azy hoe:'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Maro no zazavavy nanao soa,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nahavory harena.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hianao manoatra noho izy rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aza omena ny vehivavy ny herinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny fombam-piainanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: làlanao.
      marker-yv: yv-n
    - type: text
      text: ' ho an’izay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izay zavatra.
      marker-yv: yv-n
    - type: text
      text: ' manimba mpanjaka.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Fitaka ny fahatsaram-bika, ary zava-poana ny fahatsaran-tarehy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny vehivavy matahotra an’i Jehovah ihany no hoderaina.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Omeo azy ny avy amin’ny vokatry ny tànany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny asany hidera azy eo am-bavahady.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy mety amin’ny mpanjaka, ry Lemoela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy mety amin’ny mpanjaka ny misotro divay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na amin’ny mpanapaka ny ho fatra-paniry toaka;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fandrao, raha misotro izy, dia manadino ny lalàna
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mamily ny fitsarana ny zanaky ny fahoriana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Omeo toaka izay efa ho faty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, divay ho an’izay malahelo azon’ny fangidiam-panahy;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aoka hisotro izy mba hanadinoany ny alahelony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hahatsiarovany ny fahoriany intsony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Sokafy ny vavanao hisolo ny moana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahazoan’ny kamboty ny rariny;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Sokafy ny vavanao, ka tsarao marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary omeo rariny ny ory sy ny malahelo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fankalazana ny vehivavy izay sady tsara no mazoto.
    marker-yv: yv-h
