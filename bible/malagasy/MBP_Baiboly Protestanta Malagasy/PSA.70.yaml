document_id: PSA.70
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fangataham-pamonjena.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’i Davida. Ho fampahatsiarovana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA ô, faingàna hanafaka ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah ô, faingàna hamonjy ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka ho menatra sy hangaihay izay mitady ny aiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hiamboho sy ho afa-baraka izay faly amin’ny manjo ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka hiamboho noho ny fahamenarany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay manao hoe: Hia! sakoa izay!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka hifaly sy ho ravoravo aminao izay rehetra mitady Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary aoka izay tia ny famonjenao hanao mandrakariva hoe: Hankalazaina anie Andriamanitra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa izaho dia ory sy malahelo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faingàna hankatỳ amiko, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamonjy sy Mpanafaka ahy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza ela, Jehovah ô.
