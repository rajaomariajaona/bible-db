document_id: PSA.70,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangataham-pamonjena.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’i Davida. Ho fampahatsiarovana.
  - type: text
    content: ANDRIAMANITRA ô, faingàna hanafaka ahy;
  - type: text
    content: Jehovah ô, faingàna hamonjy ahy.
  '2':
  - type: text
    content: Aoka ho menatra sy hangaihay izay mitady ny aiko;
  - type: text
    content: Aoka hiamboho sy ho afa-baraka izay faly amin’ny manjo ahy;
  '3':
  - type: text
    content: Aoka hiamboho noho ny fahamenarany
  - type: text
    content: 'Izay manao hoe: Hia! sakoa izay!'
  '4':
  - type: text
    content: Aoka hifaly sy ho ravoravo aminao izay rehetra mitady Anao;
  - type: text
    content: 'Ary aoka izay tia ny famonjenao hanao mandrakariva hoe: Hankalazaina anie Andriamanitra.'
  '5':
  - type: text
    content: Fa izaho dia ory sy malahelo;
  - type: text
    content: Faingàna hankatỳ amiko, Andriamanitra ô;
  - type: text
    content: Mpamonjy sy Mpanafaka ahy Hianao;
  - type: text
    content: Aza ela, Jehovah ô.
