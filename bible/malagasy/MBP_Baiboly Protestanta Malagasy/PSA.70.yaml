document_id: PSA.70,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fangataham-pamonjena.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Nataon’i Davida. Ho fampahatsiarovana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ANDRIAMANITRA ô, faingàna hanafaka ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, faingàna hamonjy ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra sy hangaihay izay mitady ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiamboho sy ho afa-baraka izay faly amin’ny manjo ahy;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiamboho noho ny fahamenarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay manao hoe: Hia! sakoa izay!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hifaly sy ho ravoravo aminao izay rehetra mitady Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aoka izay tia ny famonjenao hanao mandrakariva hoe: Hankalazaina anie Andriamanitra.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho dia ory sy malahelo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faingàna hankatỳ amiko, Andriamanitra ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpamonjy sy Mpanafaka ahy Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza ela, Jehovah ô.
