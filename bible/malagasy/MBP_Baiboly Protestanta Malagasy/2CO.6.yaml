document_id: 2CO.6,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary izahay mpiara-miasa aminy dia mangataka aminareo koa mba tsy handraisanareo foana ny fahasoavan’Andriamanitra. '
  '10':
  - type: text
    content: tahaka ny ampalahelovina, nefa faly mandrakariva; tahaka ny malahelo, nefa mampanan-karena ny maro; tahaka ny tsy manana na dia kely akory aza, nefa manana ny zavatra rehetra.
  - type: heading
    content: Fananarana ny Kristiana tao Korinto mba tsy hikambana amin’ny ratsy, sy filazana ny hafalian’i Paoly noho ny nibebahan’ireo, rehefa nahazo ny epistily nampitondrainy.
  '11':
  - type: text
    content: 'RY Korintiana, ny vavanay misokatra aminareo, ny fonay malalaka. '
  '12':
  - type: text
    content: 'Tsy tery aminay hianareo, fa tery ao am-ponareo ihany. '
  '13':
  - type: text
    content: Ary mba ho valiny toraka izany (izaho miteny toy ny amin’ny zanako), dia mba mihalalaha kosa hianareo.
  '14':
  - type: text
    content: 'Aza mety hasiana zioga tsy antonona anareo hikambanana amin’ny tsy mino. Fa inona no iraisan’ny fahamarinana sy ny fahotana? Ary inona no iombonan’ny mazava sy ny maizina? '
  '15':
  - type: text
    content: 'Ary inona no ifanarahan’i Kristy sy Beliala? Ary inona no iraisan’ny anjaran’ny mino sy ny tsy mino? '
  '16':
  - type: text
    content: 'Ary inona no ikambanan’ny tempolin’Andriamanitra amin’ny sampy? Fa isika no tempolin’Andriamanitra velona, araka ny nataon’Andriamanitra hoe: ,,Honina eo aminy Aho sy handeha eo aminy; ary ho Andriamaniny Aho, ary izy ho oloko’’ (Lev. 26.11, 12).'
  '17':
  - type: text
    content: ',,Koa mivoaha eo aminy hianareo, ka misaraha aminy, hoy Jehovah,'
  - type: text
    content: Ary aza manendry izay zavatra tsy madio;
  - type: text
    content: Ary Izaho dia handray anareo.
  '18':
  - type: text
    content: Ary ho Rainareo Aho,
  - type: text
    content: Ary hianareo ho zanako-lahy sy ho zanako-vavy, hoy Jehovah Tsitoha’’ (Isa. 52.11, 12).
  '2':
  - type: text
    content: 'Fa hoy Izy:'
  - type: text
    content: ',,Tamin’ny taona fankasitrahana no nihainoako anao,'
  - type: text
    content: Ary tamin’ny andro famonjena no namonjeko anao’’ (Isa. 49.8);
  - type: text
    content: 'indro, ankehitriny no andro fankasitrahana; indro, ankehitriny no andro famonjena; '
  '3':
  - type: text
    content: 'fa tsy manao izay mahatafintohina izahay na amin’inona na amin’inona, mba tsy homen-tsiny ny fanompoana; '
  '4':
  - type: text
    content: 'fa amin’ny zavatra rehetra dia mampiseho ny tenanay ho mpanompon’Andriamanitra izahay, dia amin’ny faharetana be, amin’ny fahoriana, amin’ny fahaterena, amin’ny fahantrana, '
  '5':
  - type: text
    content: 'amin’ny kapoka, amin’ny fatorana, amin’ny tabataba, amin’ny fisasarana, amin’ny tsy fahitan-tory, amin’ny fifadian-kanina, '
  '6':
  - type: text
    content: 'amin’ny fahadiovana, amin’ny fahalalana, amin’ny fahari-po, amin’ny fahamoram-panahy, amin’ny Fanahy Masina, amin’ny fitiavana tsy mihatsaravelatsihy, '
  '7':
  - type: text
    content: 'amin’ny teny fahamarinana, amin’ny herin’Andriamanitra, amin’ny fiadian’ny fahamarinana, na amin’ny ankavanana na amin’ny ankavia, '
  '8':
  - type: text
    content: 'amin’ny voninahitra sy ny fahafaham-boninahitra, amin’ny laza ratsy sy ny laza soa; tahaka ny mpamitaka, nefa marina ihany; '
  '9':
  - type: text
    content: 'tahaka ny tsy fantatra, nefa fantatra tsara ihany; tahaka ny efa ho faty, nefa, indro, velona ihany; tahaka ny faizana, nefa tsy atao maty; '
