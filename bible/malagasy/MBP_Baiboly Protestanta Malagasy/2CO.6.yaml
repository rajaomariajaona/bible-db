document_id: 2CO.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izahay mpiara-miasa aminy dia mangataka aminareo koa mba tsy handraisanareo foana ny fahasoavan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Tamin’ny taona fankasitrahana no nihainoako anao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tamin’ny andro famonjena no namonjeko anao’’ (Isa. 49.8);
- type: usfm
  marker: m
  children:
  - type: text
    text: 'indro, ankehitriny no andro fankasitrahana; indro, ankehitriny no andro famonjena; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa tsy manao izay mahatafintohina izahay na amin’inona na amin’inona, mba tsy homen-tsiny ny fanompoana; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa amin’ny zavatra rehetra dia mampiseho ny tenanay ho mpanompon’Andriamanitra izahay, dia amin’ny faharetana be, amin’ny fahoriana, amin’ny fahaterena, amin’ny fahantrana, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'amin’ny kapoka, amin’ny fatorana, amin’ny tabataba, amin’ny fisasarana, amin’ny tsy fahitan-tory, amin’ny fifadian-kanina, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'amin’ny fahadiovana, amin’ny fahalalana, amin’ny fahari-po, amin’ny fahamoram-panahy, amin’ny Fanahy Masina, amin’ny fitiavana tsy mihatsaravelatsihy, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'amin’ny teny fahamarinana, amin’ny herin’Andriamanitra, amin’ny fiadian’ny fahamarinana, na amin’ny ankavanana na amin’ny ankavia, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'amin’ny voninahitra sy ny fahafaham-boninahitra, amin’ny laza ratsy sy ny laza soa; tahaka ny mpamitaka, nefa marina ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tahaka ny tsy fantatra, nefa fantatra tsara ihany; tahaka ny efa ho faty, nefa, indro, velona ihany; tahaka ny faizana, nefa tsy atao maty; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: tahaka ny ampalahelovina, nefa faly mandrakariva; tahaka ny malahelo, nefa mampanan-karena ny maro; tahaka ny tsy manana na dia kely akory aza, nefa manana ny zavatra rehetra.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana ny Kristiana tao Korinto mba tsy hikambana amin’ny ratsy, sy filazana ny hafalian’i Paoly noho ny nibebahan’ireo, rehefa nahazo ny epistily nampitondrainy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'RY Korintiana, ny vavanay misokatra aminareo, ny fonay malalaka. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy tery aminay hianareo, fa tery ao am-ponareo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary mba ho valiny toraka izany (izaho miteny toy ny amin’ny zanako), dia mba mihalalaha kosa hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Aza mety hasiana zioga tsy antonona anareo hikambanana amin’ny tsy mino. Fa inona no iraisan’ny fahamarinana sy ny fahotana? Ary inona no iombonan’ny mazava sy ny maizina? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary inona no ifanarahan’i Kristy sy Beliala? Ary inona no iraisan’ny anjaran’ny mino sy ny tsy mino? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary inona no ikambanan’ny tempolin’Andriamanitra amin’ny sampy? Fa isika no tempolin’Andriamanitra velona, araka ny nataon’Andriamanitra hoe: ,,Honina eo aminy Aho sy handeha eo aminy; ary ho Andriamaniny Aho, ary izy ho oloko’’ (Lev. 26.11, 12).'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ',,Koa mivoaha eo aminy hianareo, ka misaraha aminy, hoy Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza manendry izay zavatra tsy madio;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izaho dia handray anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ho Rainareo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianareo ho zanako-lahy sy ho zanako-vavy, hoy Jehovah Tsitoha’’ (Isa. 52.11, 12).
