document_id: ISA.33,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hampijaliana an’i Asyria, sy ny soa ho hitan’i Ziona kosa.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: LOZANAO, ry ilay mandroba, nefa tsy norobaina hianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamitaka, nefa tsy nofitahina hianao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa mitsahatra ny mandrava hianao, dia vao horavana kosa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa mitsahatra ny mamitaka hianao, dia vao hofitahina kosa.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia hitsangana Aho, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia ho any amin’ny avo Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia hisandratra Aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torontoronina bozaka hianareo ka miteraka vodivary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fofonainareo dia tahaka ny afo handevona anareo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny firenena ho tahaka ny fandoroan-tsokay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ho tahaka ny tsilo notombohina izay mirehitra amin’ny afo izy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ny amin’izay efa nataoko, hianareo izay lavitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hahafantatra ny heriko hianareo izay akaiky.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raiki-tahotra ny mpanota ao Ziona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Horohoro no nahazo ny mpihatsaravelatsihy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ratsy fanahy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza amintsika no hahatoetra amin’ny afo mandevona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza amintsika moa no hahatoetra amin’ny lelafo mandrakizay?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mandeha amin’ny fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady miteny zava-mahitsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy mety mandray harena amin’ny fanaovana an-keriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manifikifika ny tànany mba tsy handray kolikoly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manentsin-tadìny mba tsy handrenesany ny amin’ny fandatsahan-dra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady manakimpy ny masony mba tsy hahita ny ratsy;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no honina ao amin’ny avo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fitoerana avony dia ny fiarovana any amin’ny harambato;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hohaniny dia homena azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny rano hosotroiny tsy ho diso.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonao hahita ny mpanjaka amin’ny hatsaran-tarehiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hahatsinjo tany malalaka dia malalaka.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hotsaroan’ny fonao ilay nahatahotra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ny mpanoratra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ny mpandanja?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza ny mpanisa ny tilikambo?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenena misetaseta dia tsy ho hitanao intsony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay olona miboediboedi-piteny ka tsy fantatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny lela mikodedidedy ka tsy azo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, mamindrà fo aminay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no antenainay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho sandrinay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sandriny.
      marker-yv: yv-n
    - type: text
      text: ' isa-maraina Hianao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho famonjena anay amin’ny andro fahoriana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsinjovy Ziona, dia ilay tanàna fihaonantsika tamin’ny fotoam-pivavahana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonao hahita an’i Jerosalema ho fonenana mandry fahizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia lay izay tsy hafindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tsimatra aminy tsy hongotana mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hisy hotapahina ny kofehiny.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah dia mahery ho antsika any,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany be ony sy lahin-drano lehibe any,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy halehan’ny sambo voizina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na hovakin’ny sambo lehibe.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no Mpitsara antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no Mpanome lalàna antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no Mpanjakantsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no hamonjy antsika.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivaha ny mahazakan-tsambonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahahazona mafy ny fiorenan’andry izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mahavelatra ny lay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’izay kosa dia hozaraina ny zavatra be voababo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny mandringa aza dia mba hahazo babo ihany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tsy hisy amin’ny mponina ao hilaza hoe: Marary aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona izay mitoetra ao dia voavela heloka.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feon’ny fitabatabana no mampandositra ny firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha misandratra Hianao, dia mipariaka ny jentilisa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ireny handevona ny babonareo tahaka ny fandevon’ny valala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fifanaretsaky ny kalalao no fifanaretsany eo aminy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manerinerina Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mitoetra any amin’ny avo Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofenoiny rariny sy fahamarinana Ziona.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy andro tsy manam-piovana ho anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, haren’ny famonjena sy ny fahendrena ary ny fahalalana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatahorana an’i Jehovah no rakitrao.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rakiny.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreo, ny lehilahy maheriny mitaraina eny ivelany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny iraka nitady fihavanana dia mitomany mafy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maty ny làlambe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy ny mpandeha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofoanany ny fanekena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nalany baraka ny tanàna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nanaja olona izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaona ny tany ka milofika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Menatra Libanona ka malazo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tonga tahaka ny tani-hay Sarôna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manintsana Basana sy Karmela.
