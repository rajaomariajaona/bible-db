document_id: ISA.33,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampijaliana an’i Asyria, sy ny soa ho hitan’i Ziona kosa.
  - type: text
    content: LOZANAO, ry ilay mandroba, nefa tsy norobaina hianao!
  - type: text
    content: Ary mamitaka, nefa tsy nofitahina hianao!
  - type: text
    content: Rehefa mitsahatra ny mandrava hianao, dia vao horavana kosa;
  - type: text
    content: Ary rehefa mitsahatra ny mamitaka hianao, dia vao hofitahina kosa.
  '10':
  - type: text
    content: Ankehitriny dia hitsangana Aho, hoy Jehovah;
  - type: text
    content: Ankehitriny dia ho any amin’ny avo Aho;
  - type: text
    content: Ankehitriny dia hisandratra Aho.
  '11':
  - type: text
    content: Torontoronina bozaka hianareo ka miteraka vodivary;
  - type: text
    content: Ny fofonainareo dia tahaka ny afo handevona anareo.
  '12':
  - type: text
    content: Ary ny firenena ho tahaka ny fandoroan-tsokay,
  - type: text
    content: Eny, ho tahaka ny tsilo notombohina izay mirehitra amin’ny afo izy.
  '13':
  - type: text
    content: Mihainoa ny amin’izay efa nataoko, hianareo izay lavitra,
  - type: text
    content: Ary aoka hahafantatra ny heriko hianareo izay akaiky.
  '14':
  - type: text
    content: Raiki-tahotra ny mpanota ao Ziona;
  - type: text
    content: Horohoro no nahazo ny mpihatsaravelatsihy.
  - type: note
    content: 'Na: ratsy fanahy.'
  - type: text
    content: Iza amintsika no hahatoetra amin’ny afo mandevona?
  - type: text
    content: Iza amintsika moa no hahatoetra amin’ny lelafo mandrakizay?
  '15':
  - type: text
    content: Izay mandeha amin’ny fahamarinana
  - type: text
    content: Sady miteny zava-mahitsy,
  - type: text
    content: Izay tsy mety mandray harena amin’ny fanaovana an-keriny
  - type: text
    content: Fa manifikifika ny tànany mba tsy handray kolikoly,
  - type: text
    content: Izay manentsin-tadìny mba tsy handrenesany ny amin’ny fandatsahan-dra
  - type: text
    content: Sady manakimpy ny masony mba tsy hahita ny ratsy;
  '16':
  - type: text
    content: Izy no honina ao amin’ny avo;
  - type: text
    content: Ny fitoerana avony dia ny fiarovana any amin’ny harambato;
  - type: text
    content: Izay hohaniny dia homena azy,
  - type: text
    content: Ary ny rano hosotroiny tsy ho diso.
  '17':
  - type: text
    content: Ny masonao hahita ny mpanjaka amin’ny hatsaran-tarehiny
  - type: text
    content: Sady hahatsinjo tany malalaka dia malalaka.
  '18':
  - type: text
    content: 'Hotsaroan’ny fonao ilay nahatahotra:'
  - type: text
    content: Aiza ny mpanoratra?
  - type: text
    content: Aiza ny mpandanja?
  - type: text
    content: Aiza ny mpanisa ny tilikambo?
  '19':
  - type: text
    content: Ny firenena misetaseta dia tsy ho hitanao intsony,
  - type: text
    content: Dia ilay olona miboediboedi-piteny ka tsy fantatra,
  - type: text
    content: Na ny lela mikodedidedy ka tsy azo.
  '2':
  - type: text
    content: Jehovah ô, mamindrà fo aminay;
  - type: text
    content: Hianao no antenainay;
  - type: text
    content: Aoka ho sandrinay
  - type: note
    content: Heb. sandriny.
  - type: text
    content: ' isa-maraina Hianao'
  - type: text
    content: Sy ho famonjena anay amin’ny andro fahoriana.
  '20':
  - type: text
    content: Tsinjovy Ziona, dia ilay tanàna fihaonantsika tamin’ny fotoam-pivavahana;
  - type: text
    content: Ny masonao hahita an’i Jerosalema ho fonenana mandry fahizay,
  - type: text
    content: Dia lay izay tsy hafindra,
  - type: text
    content: Ny tsimatra aminy tsy hongotana mandrakizay,
  - type: text
    content: Ary tsy hisy hotapahina ny kofehiny.
  '21':
  - type: text
    content: Fa Jehovah dia mahery ho antsika any,
  - type: text
    content: Tany be ony sy lahin-drano lehibe any,
  - type: text
    content: Nefa tsy halehan’ny sambo voizina,
  - type: text
    content: Na hovakin’ny sambo lehibe.
  '22':
  - type: text
    content: Fa Jehovah no Mpitsara antsika;
  - type: text
    content: Jehovah no Mpanome lalàna antsika;
  - type: text
    content: Jehovah no Mpanjakantsika;
  - type: text
    content: Izy no hamonjy antsika.
  '23':
  - type: text
    content: Mivaha ny mahazakan-tsambonao;
  - type: text
    content: Tsy mahahazona mafy ny fiorenan’andry izy,
  - type: text
    content: Na mahavelatra ny lay;
  - type: text
    content: Fa amin’izay kosa dia hozaraina ny zavatra be voababo;
  - type: text
    content: Na dia ny mandringa aza dia mba hahazo babo ihany.
  '24':
  - type: text
    content: 'Tsy hisy amin’ny mponina ao hilaza hoe: Marary aho;'
  - type: text
    content: Ny olona izay mitoetra ao dia voavela heloka.
  '3':
  - type: text
    content: Ny feon’ny fitabatabana no mampandositra ny firenena;
  - type: text
    content: Raha misandratra Hianao, dia mipariaka ny jentilisa.
  '4':
  - type: text
    content: Ary ireny handevona ny babonareo tahaka ny fandevon’ny valala,
  - type: text
    content: Tahaka ny fifanaretsaky ny kalalao no fifanaretsany eo aminy.
  '5':
  - type: text
    content: Manerinerina Jehovah,
  - type: text
    content: Fa mitoetra any amin’ny avo Izy;
  - type: text
    content: Nofenoiny rariny sy fahamarinana Ziona.
  '6':
  - type: text
    content: Ary hisy andro tsy manam-piovana ho anao,
  - type: text
    content: Eny, haren’ny famonjena sy ny fahendrena ary ny fahalalana;
  - type: text
    content: Ny fahatahorana an’i Jehovah no rakitrao.
  - type: note
    content: Heb. rakiny.
  '7':
  - type: text
    content: Indreo, ny lehilahy maheriny mitaraina eny ivelany;
  - type: text
    content: Ny iraka nitady fihavanana dia mitomany mafy.
  '8':
  - type: text
    content: Maty ny làlambe;
  - type: text
    content: Tsy misy ny mpandeha;
  - type: text
    content: Nofoanany ny fanekena;
  - type: text
    content: Nalany baraka ny tanàna;
  - type: text
    content: Tsy nanaja olona izy.
  '9':
  - type: text
    content: Misaona ny tany ka milofika;
  - type: text
    content: Menatra Libanona ka malazo;
  - type: text
    content: Efa tonga tahaka ny tani-hay Sarôna,
  - type: text
    content: Ary manintsana Basana sy Karmela.
