document_id: 2SA.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanosorana an’i Davida ho mpanjakan’ny Isiraely rehetra, sy ny nahazoany an’i Jerosalema ho renivohitry ny fanjakany.
  - type: text
    content: 'DIA tonga tao amin’i Davida tao Hebrona ny firenen’Isiraely rehetra ka nanao hoe: Indreto izahay, fa taolanao sy nofonao. '
  '10':
  - type: text
    content: Koa dia nandroso sy nihalehibe Davida, fa Jehovah, Andriamanitry ny maro, no nomba azy.
  - type: heading
    content: Ny amin’ny lapan’i Davida, sy ny vadiny aman-janany.
  '11':
  - type: text
    content: ARY Hirama, mpanjakan’i Tyro, naniraka olona tany amin’i Davida nampanatitra hazo sedera ary nandefa mpandrafitra sy tambato; dia nanao trano ho an’i Davida ireo.
  '12':
  - type: text
    content: Dia fantatr’i Davida fa Jehovah efa nampitoetra azy ho mpanjakan’ny Isiraely ka nanandratra ny fanjakany noho ny amin’ny Isiraely olony.
  '13':
  - type: text
    content: 'Ary Davida mbola naka vaditsindrano sy vady koa tany Jerosalema, rehefa tonga avy tany Hebrona izy; ary dia nisy zanakalahy sy zanakavavy koa naterak’i Davida. '
  '14':
  - type: text
    content: 'Ary izao no anaran’ny naterany tany Jerosalema: Samoa sy Sobaba sy Natana sy Solomona '
  '15':
  - type: text
    content: 'sy Jibara sy Elisoa sy Nafega sy Jafia '
  '16':
  - type: text
    content: sy Elisama sy Eliada ary Elifeleta.
  - type: heading
    content: Ny nandresen’i Davida ny Filistina.
  '17':
  - type: text
    content: KOA nony ren’ny Filistina fa efa nohosoran’ny olona ho mpanjakan’ny Isiraely Davida, dia niakatra hitady azy ny Filistina rehetra; fa raha ren’i Davida izany dia nidina tao amin’ny batery fiarovana izy.
  '18':
  - type: text
    content: 'Ary dia tonga ny Filistina ka nihahakahaka teny amin’ny Lohasahan’ny Refaïta. '
  '19':
  - type: text
    content: 'Ary Davida nanontany tamin’i Jehovah hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tànako va izy? Dia hoy Jehovah tamin’i Davida: Miakara, fa hatolotro eo an-tànanao tokoa ny Filistina. '
  '2':
  - type: text
    content: 'Fa hatry ny fony fahiny ihany koa, raha mbola nanjaka taminay aza Saoly, dia hianao no mpitarika ny Isiraely nivoaka sy niditra; ary Jehovah efa nilaza taminao hoe: Hianao no ho mpiandry ny Isiraely oloko, ary hianao no ho mpanapaka azy. '
  '20':
  - type: text
    content: Ary Davida tonga tao Bala-perazima
  - type: note
    content: Bala-perazima = Tany nahavakiana.
  - type: text
    content: ' ka namely ireo tao, dia hoy izy: Jehovah efa namaky ny fahavaloko teo anoloako hipariaka toy ny rano vaky, koa izany no nanaovany ny anaran’izany tany izany hoe Bala-perazima.'
  - type: note
    content: Bala-perazima = Tany nahavakiana.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Ary nilaozany tao ny sampiny, ka dia lasan’i Davida sy ny olony ireny.
  '22':
  - type: text
    content: 'Ary niakatra indray ny Filistina ka nihahakahaka teny amin’ny Lohasahan’ny Refaïta. '
  '23':
  - type: text
    content: 'Ary nanontany tamin’i Jehovah Davida, ka novaliany hoe: Aza mandeha; fa hodidino avy eo aoriana izy, ka ho tonga eo aminy hianao eo amin’ny tandrifin’ny hazo balsama. '
  '24':
  - type: text
    content: 'Ary raha toa mahare fingadongadon’olona eny amin’ny tendron’ny hazo balsama hianao, dia faingàna; fa amin’izay no efa miainga mialoha anao Jehovah hamely ny miaramilan’ny Filistina. '
  '25':
  - type: text
    content: Ary dia nanao araka ny nandidian’i Jehovah azy Davida ka dia namely ny Filistina hatrany Geba ka hatrao akaikin’i Gazera izy.
  '3':
  - type: text
    content: Eny, tonga tao amin’ny mpanjaka tao Hebrona ny loholon’ny Isiraely rehetra, ary Davida mpanjaka nanao fanekena taminy tao Hebrona teo anatrehan’i Jehovah; ary dia nanosotra an’i Davida ho mpanjakan’ny Isiraely izy.
  '4':
  - type: text
    content: 'Telo-polo taona Davida fony izy vao nanjaka, ary nanjaka efa-polo taona izy. '
  '5':
  - type: text
    content: Tao Hebrona no nanjakany tamin’ny Joda fito taona sy enim-bolana; ary tany Jerosalema no nanjakany tamin’ny Isiraely sy ny Joda rehetra telo amby telo-polo taona.
  '6':
  - type: text
    content: 'Ary ny mpanjaka sy ny olony nankany Jerosalema hiady amin’ny Jebosita tompon-tany, ary hoy izy ireo tamin’i Davida: Tsy ho tafiditra eto hianao; fa na dia ny jamba sy ny mandringa aza dia hahasakana anao ka hanao hoe:'
  - type: note
    content: 'Na: ary ny heviny tamin’izany dia toy ny manao hoe:'
  - type: text
    content: ' Tsy ho tafiditra eto Davida. '
  '7':
  - type: text
    content: 'Kanjo afak’i Davida ihany ny batery fiarovana, dia Ziona (Tanànan’i Davida izany). '
  '8':
  - type: text
    content: 'Ary hoy Davida tamin’izany andro izany: Izay mamely ny Jebosita, dia aoka hananika ho eo amin’ny riana '
  - type: text
    content: ka hamely
  - type: text
    content: ' ,ny mandringa sy ny jamba’ izay halan’ny fon’i Davida. Koa dia mby am-pitenenana hoe: ,Izay jamba sy mandringa tsy ho tafiditra ao an-trano.’'
  '9':
  - type: text
    content: Dia nitoetra tao anatin’ny batery fiarovana Davida, ary ny anarany nataony hoe ,Tanànan’i Davida.’ Ary narafitr’i Davida ny manodidina hatrany Milo
  - type: note
    content: Heb. fiarovana.
  - type: text
    content: ' mbamin’ny ao anatiny. '
