document_id: ZEC.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Amin’izany andro izany dia hisy loharano voasokatra ho an’ny taranak’i Davida sy ho an’ny mponina any Jerosalema hanafaka fahotana sy fahalotoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary amin’izany andro izany, hoy Jehovah, Tompon’ny maro, dia hofoanako ny anaran-tsampy amin’ny tany, ka tsy hotsarovana intsony ireny; ary hesoriko amin’ny tany ny mpaminany sy ny fanahim-pahalotoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha mbola hisy haminany, ny ray aman-dreniny izay niteraka azy dia hanao aminy hoe: Tsy ho velona hianao, satria miteny lainga amin’ny anaran’i Jehovah; ary ny ray aman-dreniny izay niteraka azy dia handefona azy, raha maminany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary amin’izany andro izany ny mpaminany dia samy hahazo henatra noho ny fahitany avy, raha maminany; ary tsy hikapôty volom-biby hamitahana izy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa hanao hoe: Tsy mpaminany aho, fa mpiasa tany, satria nisy nanandevo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nividy.
    marker-yv: yv-n
  - type: text
    text: ' ahy, fony aho mbola kely. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hisy hanao aminy hoe: Ka inona itony ratra amin’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anelanelan’.
    marker-yv: yv-n
  - type: text
    text: ' ny tànanao itony? Dia hovaliany hoe: Naratra tao an-tranon’ny sakaizako ireny.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hanadiovana ny Isiraely, sy ny ho voninahiny any am-parany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'MIFOHAZA, ry sabatra, hamely ny mpiandriko sy ny lehilahy namako, hoy Jehovah, Tompon’ny maro. Asio ny mpiandry, dia hihahaka ny ondry, ary hamerina ny tànako ho amin’ny madinika Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary amin’ny tany rehetra, hoy Jehovah, ny androatokony dia haringana ho faty ao; fa ny ampahatelony sisa no havela ao kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ho entiko miditra amin’ny afo ny ampahatelony, ary harendrika toy ny fandrendrika volafotsy izy, ary hizahako toetra toy ny fizaha toetra ny volamena izy; hiantso ny anarako izy, ary Izaho hamaly azy; Izaho hanao hoe: Oloko izy ary izy hanao hoe: Jehovah no Andriamanitro.'
