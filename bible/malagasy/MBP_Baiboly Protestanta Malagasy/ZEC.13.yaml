document_id: ZEC.13,873
type_code: plt
verses:
  '1':
  - type: text
    content: Amin’izany andro izany dia hisy loharano voasokatra ho an’ny taranak’i Davida sy ho an’ny mponina any Jerosalema hanafaka fahotana sy fahalotoana.
  '2':
  - type: text
    content: Ary amin’izany andro izany, hoy Jehovah, Tompon’ny maro, dia hofoanako ny anaran-tsampy amin’ny tany, ka tsy hotsarovana intsony ireny; ary hesoriko amin’ny tany ny mpaminany sy ny fanahim-pahalotoana.
  '3':
  - type: text
    content: 'Ary raha mbola hisy haminany, ny ray aman-dreniny izay niteraka azy dia hanao aminy hoe: Tsy ho velona hianao, satria miteny lainga amin’ny anaran’i Jehovah; ary ny ray aman-dreniny izay niteraka azy dia handefona azy, raha maminany izy.'
  '4':
  - type: text
    content: 'Ary amin’izany andro izany ny mpaminany dia samy hahazo henatra noho ny fahitany avy, raha maminany; ary tsy hikapôty volom-biby hamitahana izy, '
  '5':
  - type: text
    content: 'fa hanao hoe: Tsy mpaminany aho, fa mpiasa tany, satria nisy nanandevo'
  - type: note
    content: 'Na: nividy.'
  - type: text
    content: ' ahy, fony aho mbola kely. '
  '6':
  - type: text
    content: 'Dia hisy hanao aminy hoe: Ka inona itony ratra amin’'
  - type: note
    content: Heb. anelanelan’.
  - type: text
    content: ' ny tànanao itony? Dia hovaliany hoe: Naratra tao an-tranon’ny sakaizako ireny.'
  - type: heading
    content: Ny hanadiovana ny Isiraely, sy ny ho voninahiny any am-parany.
  '7':
  - type: text
    content: 'MIFOHAZA, ry sabatra, hamely ny mpiandriko sy ny lehilahy namako, hoy Jehovah, Tompon’ny maro. Asio ny mpiandry, dia hihahaka ny ondry, ary hamerina ny tànako ho amin’ny madinika Aho. '
  '8':
  - type: text
    content: 'Ary amin’ny tany rehetra, hoy Jehovah, ny androatokony dia haringana ho faty ao; fa ny ampahatelony sisa no havela ao kosa. '
  '9':
  - type: text
    content: 'Ary ho entiko miditra amin’ny afo ny ampahatelony, ary harendrika toy ny fandrendrika volafotsy izy, ary hizahako toetra toy ny fizaha toetra ny volamena izy; hiantso ny anarako izy, ary Izaho hamaly azy; Izaho hanao hoe: Oloko izy ary izy hanao hoe: Jehovah no Andriamanitro.'
