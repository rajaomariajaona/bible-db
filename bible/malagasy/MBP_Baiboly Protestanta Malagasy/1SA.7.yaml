document_id: 1SA.7,873
type_code: plt
verses:
  '1':
  - type: text
    content: Dia tonga teo ny mponina tao Kiriata-jearima ka nitondra ny fiaran’i Jehovah niakatra, dia nitondra azy ho ao an-tranon’i Abinadaba teo an-kavoana,
  - type: note
    content: 'Na: Gibea.'
  - type: text
    content: ' ary nanamasina an’i Eleazara zanany mba hitandrina ny fiaran’i Jehovah izy.'
  - type: heading
    content: Ny nampibebahan’i Samoela ny Isiraely, sy ny nandreseny ny Filistina, ary ny nitsaran’i Samoela ny Isiraely.
  '10':
  - type: text
    content: 'Ary raha mbola nanatitra ny fanatitra dorana Samoela, dia nanatona ny Filistina hiady amin’ny Isiraely; fa Jehovah nampikotrokorana mafy tamin’ny Filistina tamin’izany andro izany ka nampifanaritaka azy, dia resy teo anoloan’ny Isiraely izy. '
  '11':
  - type: text
    content: Ary ny lehilahy amin’ny Isiraely niala tany Mizpa, dia nanenjika ny Filistina ka namely azy mandra-pahatongany teo ambanin’i Beti-kara.
  '12':
  - type: text
    content: Ary Samoela naka vato ka nanorina azy teo anelanelan’i Mizpa sy Sena, ary ny anarany nataony hoe Ebenezera;
  - type: note
    content: Ebenezera = Vato famonjena.
  - type: text
    content: ' fa hoy izy: Efa novonjen’i Jehovah isika hatramin’izao.'
  '13':
  - type: text
    content: 'Dia resy ny Filistina ka tsy tafiditra teo anatin’ny fari-tanin’ny Isiraely intsony; ary ny tànan’i Jehovah namely ny Filistina tamin’ ny andro rehetra niainan’i Samoela. '
  '14':
  - type: text
    content: Ary ny tanàna izay efa nalain’ny Filistina tamin’ny Isiraely dia azon’ny Isiraely indray, hatrany Ekrona ka hatrany Gata; ary ny fari-tanin’ireo dia nalain’ny Isiraely tamin’ny tànan’ny Filistina koa.
  - type: text
    content: Ary nihavana ny Isiraely sy ny Amorita.
  '15':
  - type: text
    content: 'Ary Samoela nitsara ny Isiraely tamin’ny andro rehetra niainany. '
  '16':
  - type: text
    content: 'Ary nandeha isan-taona isan-taona izy nitety any Betela sy Gilgala ary Mizpa ka nitsara ny Isiraely teo amin’ireo tanàna rehetra ireo. '
  '17':
  - type: text
    content: Dia niverina ho any Rama indray izy, fa tao ny tranony; ary nitsara ny Isiraely tao izy sady nanorina alitara tao ho an’i Jehovah.
  '2':
  - type: text
    content: ARY hatramin’izany andro izany dia nitoetra ela tany Kiriata-jearima ny fiaran’i Jehovah, dia roa-polo–taona; ary ny taranak’Isiraely rehetra nalahelo an’i Jehovah.
  - type: note
    content: 'Na: nivory ho eo amin’i Jehovah.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Ary hoy Samoela tamin’ny taranak’Isiraely rehetra: Raha miverina amin’i Jehovah amin’ny fonareo rehetra tokoa ary hianareo, dia ario hiala aminareo ny andrimani-kafa sy ireo Astarta, ka ampiomany ny fonareo ho an’i Jehovah, ary aoka Izy ihany no hotompoinareo, dia hamonjy anareo amin’ny tànan’ny Filistina Izy. '
  '4':
  - type: text
    content: Dia nanary ireo Bala sy Astarta ny Zanak’Isiraely ka nanompo an’i Jehovah irery ihany.
  '5':
  - type: text
    content: 'Ary hoy Samoela: Vorio ny Isiraely rehetra ho any Mizpa, dia hivavaka amin’i Jehovah ho anareo aho. '
  '6':
  - type: text
    content: 'Dia nivory tany Mizpa izy ary nanovo rano ka nandraraka izany teo anatrehan’i Jehovah, sady nifady hanina tamin’izany andro izany izy ka nanao hoe: Efa nanota tamin’i Jehovah isika.'
  - type: text
    content: Ary Samoela nitsara ny Zanak’Isiraely tany Mizpa.
  '7':
  - type: text
    content: Ary rehefa ren’ny Filistina fa efa vory tany Mizpa ny Zanak’Isiraely, dia niakatra hamely azy ireo andrianan’ny Filistina. Ary nony nandre izany ny Zanak’Isiraely, dia raiki-tahotra izy noho ny Filistina.
  '8':
  - type: text
    content: 'Dia hoy ny Zanak’Isiraely tamin’i Samoela: Aza mitsahatra mitaraina amin’i Jehovah Andriamanitsika ho anay hianao, mba hamonjeny anay amin’ny tànan’ny Filistina. '
  '9':
  - type: text
    content: Dia naka zanak’ondry mbola minono Samoela ka nanatitra azy ho fanatitra dorana ho an’i Jehovah; dia nitaraina tamin’i Jehovah ho an’ny Isiraely Samoela, ary nihaino azy Jehovah.
