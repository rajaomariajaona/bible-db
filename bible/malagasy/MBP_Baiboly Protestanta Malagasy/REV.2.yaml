verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny Epistily ho an’ny fiangonana fito tany Asia.
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (1) Efesosy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: SORATY ho amin’ny anjelin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' any Efesosy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Ilay mihazona ny kintana fito eny an-tànany ankavanana sady mandeha eo afovoan’ny fanaovan-jiro volamena fito: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza matahotra izay efa hiaretanao; indro, ny devoly efa hanao ny sasany aminareo ao an-trano-maizina, mba ho voazaha toetra hianareo, ary hanam-pahoriana hafoloana. Aoka ho mahatoky hatramin’ny fahafatesana hianao, dia homeko anao ny satroboninahitra fiainana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' Izay maharesy dia tsy hosimban’ny fahafatesana faharoa.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (3) Pergamosy.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary soraty ho amin’ny anjelin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' any Pergamosy:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Ilay manana ny sabatra roa lela maranitra: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatro izay onenanao, dia ao amin’ny itoeran’ny seza fiandrianan’i Satana; ary mitana mafy ny anarako hianao ka tsy nandà ny finoana Ahy, na dia tamin’ny andron’i Antipasy martiorako aza, izay lehilahy nahatoky Ahy, dia ilay novonoina teo aminareo, teo amin’izay onenan’i Satana.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa manan-teny kely aminao Aho, fa misy eo aminao izay mitana ny fampianaran’i Balama, ilay nanome fo an’i Balaka hanisy fahatafintohinana teo anoloan’ny Zanak’Isiraely, hihinana hena naterina tamin’ny sampy sy hijangajanga. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy izany koa, misy eo aminao izay mitana ny fampianaran’ny Nikolaita tahaka ny an’ireny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa dia mibebaha; fa raha tsy izany, dia ho avy aminao faingana Aho ka hamely ireo amin’ny sabatry ny vavako.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' Izay maharesy dia homeko mana miafina sady homeko vato fotsy, ary eo amin’ny vato dia misy anaram-baovao voasoratra, izay tsy fantatr’olona afa-tsy izay mandray azy ihany.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (4) Tyatira.
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary soraty ho amin’ny anjelin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fk
