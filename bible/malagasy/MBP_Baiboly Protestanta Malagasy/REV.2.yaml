      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' any Tyatira:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny Zanak’Andriamanitra, Izay manana maso toy ny lelafo, ary ny tongony tahaka ny varahina manganohano: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatro ny asanao sy ny fitiavanao sy ny finoanao sy ny fanompoanao ary ny faharetanao, ary ny asanao farany dia be noho ny voalohany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro ny asanao sy ny fikelezanao aina sy ny faharetanao ary ny tsi-fahazakanao izay mpanao ratsy; ary hianao efa nizaha toetra izay milaza ny tenany ho Apostoly, kanjo tsy izy, ary hitanao fa mpandainga izy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa manan-teny aminao Aho, satria hianao mandefitra amin’ilay vehivavy Jezebela, izay milaza ny tenany ho mpaminanivavy ka mampianatra sady manoloky ny mpanompoko hijangajanga sy hihinana hena naterina tamin’ny sampy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomeko andro hibebahany izy, nefa tsy mety mibebaka amin’ny fijangajangany izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, hampandamahiko eo am-pandriana izy, ary izay mijangajanga aminy dia hataoko ao amin’ny fahoriana lehibe, raha tsy hibebaka amin’ny asan-dravehivavy izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hovonoiko amin’ny fahafatesana ny zanany; ary ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' rehetra hahalala fa Izaho no mandinika ny voa sy ny fo; ary homeko araka ny asanareo avy hianareo rehetra.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa aminareo izay sisa any Tyatira, dia izay tsy manana izany fampianarana izany sady tsy mba mahalala ny ataon’ireo hoe ,sain-dalin’i Satana,’ dia izao no lazaiko: tsy hovesarako entana hafa hianareo; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: kanefa izay anananareo dia tano mafy mandra-pihaviko.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay maharesy ka mitandrina ny asako hatramin’ny farany dia homeko fahefana amin’ny jentilisa; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hiandry azy amin’ny tehim-by izy ka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hanorotoro
    - type: text
      text: ' azy toy ny fanorotoro vilany tany, dia araka izay efa noraisiko tamin’ny Raiko. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary homeko azy ny kintana fitarika andro. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary manana faharetana hianao ka niaritra noho ny anarako sady tsy reraka.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa manan-teny aminao Aho, satria efa niala tamin’ny fitiavanao voalohany hianao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tsarovy izay nitoeranao fony tsy mbola lavo, dia mibebaha, ka manaova ny asa voalohany; fa raha tsy izany, dia ho avy aminao Aho ka hamindra ny fanaovan-jironao hiala amin’ny fitoerany, raha tsy mibebaka hianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa izao no toetranao:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anananao.
      marker-yv: yv-n
    - type: text
      text: ' halanao ny asan’ny Nikolaita, izay halako koa.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' Izay maharesy dia havelako hihinana ny avy amin’ny hazon’aina, izay eo amin’ny Paradisan’Andriamanitra.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (2) Smyrna.
    marker-yv: yv-h
  '8':
