  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny Voalohany sy ny Farany, Izay efa maty, nefa velona indray: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatro ny fahorianao sy ny fahantranao (nefa manan-karena hianao), ary ny fitenenan-dratsy
