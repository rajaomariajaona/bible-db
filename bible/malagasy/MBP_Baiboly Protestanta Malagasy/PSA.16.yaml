document_id: PSA.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahatokiana an’Andriamanitra, Izay fototry ny soa, na dia tonga aza ny fahoriana sy ny fahafatesana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miktama nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: AROVY aho, Andriamanitra ô, fa mialoka aminao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy izaho ny amin’i Jehovah: Tompoko Hianao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy soa ananako azo oharina aminao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny amin’ny olona masina ambonin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireo no olona tsara laza izay sitrako indrindra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: Dia izaho '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sy ny olona masina ambonin’ny tany, Ary ny olona tsara laza izay sitrako indrindra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ho be ny fahorian’izay manova '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an’Andriamanitra
  - type: text
    text: ' hatakalony ny hafa.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba hanatitra ny fanati-dra aidiny aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mba hotononin’ny molotro ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jehovah no anjara lovako sy kapoakako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao no mampaharitra ny anjarako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny voafaritra ho anjarako dia eo amin’ny tany mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manan-dova tsara aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hisaotra an’i Jehovah Izay manome saina ahy aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na amin’ny alina aza dia mananatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mamporisika.
    marker-yv: yv-n
  - type: text
    text: ' ahy ny foko.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voako.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ataoko eo anatrehako mandra-kariva Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa eo an-kavanako Izy, ka dia tsy hangozohozo aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izany no ifalian’ny foko sy iravoravoan’ny fanahiko;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voninahitro.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny nofoko aza hitoetra tsy manana ahiahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa tsy ho foinao ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ny aiko;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hamela ny Iray Masinao ho latsaka ao amin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hahita.
    marker-yv: yv-n
  - type: text
    text: ' ny lavaka'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho tratry ny lo.
    marker-yv: yv-n
  - type: text
    text: ' Hianao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hampahafantatra ahy ny làlan’aina Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fahavokisam-pifaliana no eo anatrehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahafinaretana no eo an-tànanao ankavanana mandrakizay.
