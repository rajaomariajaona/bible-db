document_id: PSA.16,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatokiana an’Andriamanitra, Izay fototry ny soa, na dia tonga aza ny fahoriana sy ny fahafatesana.
  - type: text
    content: Miktama nataon’i Davida.
  - type: text
    content: AROVY aho, Andriamanitra ô, fa mialoka aminao aho.
  '10':
  - type: text
    content: Fa tsy ho foinao ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ny aiko;'
  - type: text
    content: Tsy hamela ny Iray Masinao ho latsaka ao amin’
  - type: note
    content: Heb. hahita.
  - type: text
    content: ' ny lavaka'
  - type: note
    content: 'Na: ho tratry ny lo.'
  - type: text
    content: ' Hianao.'
  '11':
  - type: text
    content: Hampahafantatra ahy ny làlan’aina Hianao;
  - type: text
    content: Fahavokisam-pifaliana no eo anatrehanao,
  - type: text
    content: Ary fahafinaretana no eo an-tànanao ankavanana mandrakizay.
  '2':
  - type: text
    content: 'Hoy izaho ny amin’i Jehovah: Tompoko Hianao;'
  - type: text
    content: Tsy misy soa ananako azo oharina aminao;
  '3':
  - type: text
    content: Ary ny amin’ny olona masina ambonin’ny tany,
  - type: text
    content: Ireo no olona tsara laza izay sitrako indrindra.
  - type: note
    content: 'Na: Dia izaho sy ny olona masina ambonin’ny tany, Ary ny olona tsara laza izay sitrako indrindra.'
  '4':
  - type: text
    content: 'Ho be ny fahorian’izay manova '
  - type: text
    content: an’Andriamanitra
  - type: text
    content: ' hatakalony ny hafa.'
  - type: text
    content: Tsy mba hanatitra ny fanati-dra aidiny aho,
  - type: text
    content: Ary tsy mba hotononin’ny molotro ny anarany.
  '5':
  - type: text
    content: Jehovah no anjara lovako sy kapoakako;
  - type: text
    content: Hianao no mampaharitra ny anjarako.
  '6':
  - type: text
    content: Ny voafaritra ho anjarako dia eo amin’ny tany mahafinaritra;
  - type: text
    content: Eny, manan-dova tsara aho.
  '7':
  - type: text
    content: Hisaotra an’i Jehovah Izay manome saina ahy aho;
  - type: text
    content: Ary na amin’ny alina aza dia mananatra
  - type: note
    content: 'Na: mamporisika.'
  - type: text
    content: ' ahy ny foko.'
  - type: note
    content: Heb. voako.
  '8':
  - type: text
    content: Ataoko eo anatrehako mandra-kariva Jehovah,
  - type: text
    content: Fa eo an-kavanako Izy, ka dia tsy hangozohozo aho.
  '9':
  - type: text
    content: Izany no ifalian’ny foko sy iravoravoan’ny fanahiko;
  - type: note
    content: Heb. voninahitro.
  - type: text
    content: Eny, ny nofoko aza hitoetra tsy manana ahiahy.
