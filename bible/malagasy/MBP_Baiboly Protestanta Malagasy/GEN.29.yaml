document_id: GEN.29,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanompoan’i Jakoba an’i Labana hahazoany an’i Lea sy Rahely ho vadiny, sy ny nahaterahan’ny zanany.
  - type: text
    content: 'DIA niainga Jakoba ka nankany amin’ny tanin’ny zanaky ny atsinanana. '
  '10':
  - type: text
    content: 'Ary rehefa hitan’i Jakoba Rahely, zanakavavin’i Labana anadahin-dreniny, sy ny ondry aman-osin’i Labana anadahin-dreniny, dia nanatona izy ka nanakodia ny vato hiala tamin’ny vavan’ny lavaka fantsakana, dia nampisotro ny ondry aman-osin’i Labana anadahin-dreniny izy. '
  '11':
  - type: text
    content: 'Ary Jakoba nanoroka an-dRahely, dia nanandrata ny feony ka nitomany. '
  '12':
  - type: text
    content: Dia nambaran’i Jakoba tamin-dRahely fa havan-drainy sy zana-dRebeka izy; dia nihazakazaka Rahely nanambara izany tamin’-drainy.
  '13':
  - type: text
    content: 'Ary rehefa ren’i Labana ny filazàny an’i Jakoba, zanak’anabaviny, dia nihazakazaka nitsena azy izy ka namihina azy sy nanoroka azy ary nitondra azy ho any an-tranony. Dia nambaran’i Jakoba tamin’i Labana izany rehetra izany. '
  '14':
  - type: text
    content: 'Ary hoy Labana taminy: Taolako sy nofoko tokoa hianao.'
  - type: text
    content: 'Ary rehefa nitoetra tao aminy andro iray volana Jakoba, '
  '15':
  - type: text
    content: 'dia hoy Labana taminy: Moa na dia rahalahiko aza hianao, dia hanompo ahy maina va? Lazao amiko izay ho karamanao. '
  '16':
  - type: text
    content: 'Ary Labana nanan-janaka roa vavy: Lea no anaran’ny zokiny, ary Rahely no anaran’ny zandriny. '
  '17':
  - type: text
    content: 'Ary Lea nalemy maso; fa Rahely bikana sady tsara tarehy. '
  '18':
  - type: text
    content: 'Ary Jakoba tia an-dRahely ka nanao hoe: Hanompo anao fito taona aho hahazoako an-dRahely, zanakao faravavy. '
  '19':
  - type: text
    content: 'Ary hoy Labana: Aleoko homena anao izy, toy izay homena lehilahy hafa; tomoera eto amiko.'
  '2':
  - type: text
    content: 'Dia nijery izy, ka, indro, nisy lavaka fantsakana tany an-tsaha, ary, indro, nisy ondry aman-osy telo-dia nandry teo anilany; fa teo amin’izany lavaka fantsakana izany no fampisotroan’ny olona ny andian’ny ondry aman-osy; ary lehibe ny vato teo am-bavan’ny fantsakana. '
  '20':
  - type: text
    content: Dia nanompo an’i Labana fito taona Jakoba hahazoany an-dRahely; ary toa andro vitsy foana teo imasony izany noho ny fitiavany azy.
  '21':
  - type: text
    content: 'Ary hoy Jakoba tamin’i Labana: Aiza ny vadiko, mba hanambadiako azy? fa efa tapitra ny fetr’androko. '
  '22':
  - type: text
    content: 'Ary nampamory ny tompon-tany rehetra Labana ka nanao fanasana. '
  '23':
  - type: text
    content: 'Kanjo nony hariva dia naka an’i Lea zanani-vavy izy ka nitondra azy ho any amin’i Jakoba; dia nanambady azy Jakoba. '
  '24':
  - type: text
    content: 'Ary nomen’i Labana an’i Lea zanani-vavy Zilpa ankizivaviny hanompo azy. '
  '25':
  - type: text
    content: 'Ary nony efa maraina ny andro, indro fa Lea izy; dia hoy Jakoba tamin’i Labana: Ahoana izao nataonao tamiko izao? Moa tsy Rahely va no nanompoako anao? ka nahoana no nofitahinao aho? '
  '26':
  - type: text
    content: 'Dia hoy Labana: Tsy fanao atỳ amin’ny taninay ny mamoaka ny zandriny alohan’ny zokiny. '
  '27':
  - type: text
    content: Tanteraho ny herinandron’ity anankiray ity, dia homenay anao koa ny anankiray noho ny fanompoana izay mbola hanompoanao ahy fito taona indray.
  '28':
  - type: text
    content: 'Dia nataon’i Jakoba izany, ka notanterahiny ny herinandrony; dia nomen’i Labana azy koa Rahely zananivavy ho vadiny. '
  '29':
  - type: text
    content: 'Ary nomen’i Labana an-dRahely zanani-vavy kosa Bila ankizivaviny hanompo azy. '
  '3':
  - type: text
    content: Ary nangonina teo ny andian’ny ondry aman-osy rehetra, dia nakodian’ny olona ny vato hiala amin’ny vavan’ny lavaka fantsakana, ka nampisotroiny ny ondry aman-osy; ary dia naveriny indray ny vato ho eo am-bavan’ny lavaka fantsakana ho amin’ny fitoerany.
  '30':
  - type: text
    content: Dia novadin’i Jakoba koa Rahely; ary izy no tiany mihoatra noho Lea; dia nanompo an’i Labana fito taona indray izy.
  '31':
  - type: text
    content: 'Ary rehefa hitan’i Jehovah fa nankahalaina Lea, dia nampanan-anaka azy Izy; fa momba kosa Rahely. '
  '32':
  - type: text
    content: Dia nanan-anaka Lea ka niteraka zazalahy, ary ny anarany dia nataony hoe Robena;
  - type: note
    content: Robena = Indro zanakalahy.
  - type: text
    content: ' fa hoy izy: Efa nitsinjo ny fahoriako Jehovah, fa ankehitriny dia ho tian’ny vadiko aho.'
  '33':
  - type: text
    content: 'Dia nanan-anaka indray izy ka niteraka zazalahy; ary hoy izy: Satria ren’i Jehovah fa efa nankahalaina aho, dia nomeny ahy koa ity; dia nataony hoe Simeona'
  - type: note
    content: Simeona = Fihainoana.
  - type: text
    content: ' ny anarany.'
  '34':
  - type: text
    content: 'Dia nanan-anaka indray izy ka niteraka zazalahy; ary hoy izy: Ankehitriny izao dia hikambana amiko ny vadiko, fa efa niteraka zazalahy telo ho azy aho; izany no nanaovana ny anarany hoe Levy.'
  - type: note
    content: Levy = Fikambanana.
  '35':
  - type: text
    content: 'Dia nanan-anaka indray izy ka niteraka zazalahy; ary hoy izy: Ankehitriny dia hidera an’i Jehovah aho; izany no nanaovany ny anarany hoe Joda;'
  - type: note
    content: 'Joda = Hoderaina; na: Izay hiderana an’i Jehovah.'
  - type: text
    content: ' dia nitsaha-jaza izy.'
  '4':
  - type: text
    content: 'Ary hoy Jakoba tamin’ny olona: Ry rahalahiko, avy aiza moa hianareo? Ary hoy ireo: Avy any Harana izahay. '
  '5':
  - type: text
    content: 'Ary hoy izy taminy: Moa mba fantatrareo va Labana, zanakalahin’i Nahora? Dia hoy izy: Fantatray ihany. '
  '6':
  - type: text
    content: 'Ary hoy izy taminy: Tsara ihany va izy? Dia hoy izy: Tsara ihany izy; ary, indro, tamy Rahely zanani-vavy mitondra ny ondry aman-osy.'
  '7':
  - type: text
    content: 'Ary hoy izy: Indro, mbola antoandrobe ny andro, ka tsy mbola mby amin’ny fotoana famoriana ny omby aman-ondry; ampisotroy ny ondry aman-osy, dia andeha, andraso. '
  '8':
  - type: text
    content: 'Dia hoy izy: Tsy azonay hatao izany, raha tsy efa tafangona avokoa ny andian’ny ondry aman-osy rehetra, ka hakodian’ny olona ny vato hiala amin’ny vavan’ny lavaka fantsakana; dia vao hampisotro ny ondry aman-osy izahay.'
  '9':
  - type: text
    content: 'Raha mbola niteny taminy izy; dia, indro, tamy Rahely nitondra ny ondry aman-osin-drainy; fa mpiandry ondry izy. '
