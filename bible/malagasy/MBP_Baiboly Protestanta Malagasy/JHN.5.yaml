document_id: JHN.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niakaran’i Jesosy tany Jerosalema, sy ny nahasitranany ilay narary teo anilan’ny farihy Betesda, ary ny teny navaliny ny Jiosy izay nanome tsiny Azy.
  - type: text
    content: REHEFA afaka izany, dia nisy andro firavoravoan’ny Jiosy, ary Jesosy niakatra tany Jerosalema.
  '10':
  - type: text
    content: 'Dia hoy ny Jiosy tamin’ilay efa sitrana: Sabata ny andro, ka tsy mety raha mitondra ny fandrianao hianao. '
  '11':
  - type: text
    content: 'Fa ralehilahy namaly azy hoe: Ilay nahasitrana ahy no nanao tamiko hoe: Ento ny fandrianao, ka mandehana. '
  '12':
  - type: text
    content: 'Ary ireo nanontany azy hoe: Iza moa izany Lehilahy izany Izay nanao taminao hoe: Ento '
  - type: text
    content: ny fandrianao,
  - type: text
    content: ' ka mandehana? '
  '13':
  - type: text
    content: Fa ilay sitrana tsy nahalala Azy; fa niala teo Jesosy, satria nisy vahoaka betsaka teo.
  '14':
  - type: text
    content: 'Rehefa afaka izany, dia hitan’i Jesosy teo an-kianjan’ny tempoly ralehilahy, ka hoy Izy taminy: Indro, efa sitrana hianao; aza manota intsony, fandrao hanjo anao izay ratsy noho ny teo. '
  '15':
  - type: text
    content: 'Dia lasa ralehilahy ka nanambara tamin’ny Jiosy fa Jesosy no nahasitrana azy. '
  '16':
  - type: text
    content: Ary noho izany ny Jiosy dia nanenjika an’i Jesosy, satria nanao izany zavatra izany tamin’ny Sabata Izy.
  '17':
  - type: text
    content: 'Fa Jesosy namaly azy hoe: Ny Raiko miasa mandraka ankehitriny, ary Izaho koa miasa. '
  '18':
  - type: text
    content: Nefa vao mainka nitady hamono Azy ny Jiosy, tsy noho ny namahany ny amin’ny Sabata ihany, fa noho ny nilazany koa fa Andriamanitra no Rainy, ka nanao ny tenany ho mitovy amin’Andriamanitra Izy.
  '19':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Lazaiko aminareo marina dia marina tokoa: Ny Zanaka tsy mahazo manao na inona na inona ho Azy, afa-tsy izay hitany ataon’ny Ray; fa na inona na inona no ataon’ny Ray dia toy izany koa no ataon’ny Zanaka. '
  '2':
  - type: text
    content: 'Ary misy farihy any Jerosalema, eo akaikin’ny '
  - type: text
    content: vavahadin’
  - type: text
    content: ' ondry, izay atao amin’ny teny Hebreo hoe Betesda, misy fialofana dimy. '
  '20':
  - type: text
    content: 'Fa ny Ray tia ny Zanaka ka maneho Azy ny zavatra rehetra izay ataon’ny tenany; ary asa lehibe noho ireny no hasehony Azy, mba ho gaga hianareo. '
  '21':
  - type: text
    content: 'Fa toy ny Ray manangana sy mamelona ny maty, dia tahaka izany koa no ameloman’ny Zanaka izay tiany. '
  '22':
  - type: text
    content: 'Fa ny Ray aza tsy mitsara olona, fa ny fitsarana rehetra dia nomeny ny Zanaka, '
  '23':
  - type: text
    content: mba hanajan’ny olona rehetra ny Zanaka, tahaka ny fanajany ny Ray. Izay tsy manaja ny Zanaka dia tsy manaja ny Ray, Izay naniraka Azy.
  '24':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Izay mandre ny teniko ka mino Izay naniraka Ahy no manana fiainana mandrakizay ka tsy hohelohina;'
  - type: note
    content: Gr. hotsaraina.
  - type: text
    content: ' fa tafafindra niala tamin’ny fahafatesana ho amin’ny fiainana izy. '
  '25':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Avy ny andro'
  - type: note
    content: Gr. ora.
  - type: text
    content: ' ary tonga ankehitriny, izay handrenesan’ny maty ny feon’ny Zanak’Andriamanitra; ary izay mandre dia ho velona. '
  '26':
  - type: text
    content: 'Fa tahaka ny Ray manana fiainana ho Azy, dia tahaka izany koa ny Zanaka nomeny hanana fiainana ho Azy; '
  '27':
  - type: text
    content: 'ary nomeny fahefana hitsara Izy, satria Zanak’olona. '
  '28':
  - type: text
    content: Aza gaga amin’izany; fa avy ny andro
  - type: note
    content: Gr. ora.
  - type: text
    content: ' izay handrenesan’ny olona rehetra any am-pasana ny feony; '
  '29':
  - type: text
    content: 'dia hivoaka izy: izay nanao tsara dia ho any amin’ny fitsanganana ho fiainana; fa izay nanao ratsy kosa dia ho any amin’ny fitsanganana ho fahamelohana.'
  - type: note
    content: Gr. ho fitsarana.
  '3':
  - type: text
    content: Tao no nandrian’ny marary maro, ny jamba, ny mandringa, ny mati-ila.
  - type: note
    content: 'Gr. efa maina, na malazo. Ampio hoe: [miandry ny fihetsehan’ny rano. 4 Fa nisy anjely nidina tany amin’ny farihy indraindray ka nampihetsika ny rano; koa izay iray niroboka aloha, rehefa nihetsika ny rano, dia sitrana, na inona na inona no aretina nanjo azy.]'
  '30':
  - type: text
    content: 'Raha Izaho ihany, dia tsy mahay manao na inona na inona; araka izay reko no itsarako; ary marina ny fitsarako; fa tsy mitady ny sitrapoko Aho, fa ny sitrapon’Izay naniraka Ahy. '
  '31':
  - type: text
    content: Raha Izaho no manambara ny tenako, dia tsy marina ny fanambarako.
  '32':
  - type: text
    content: 'Misy Anankiray Izay manambara Ahy, ary fantatro fa marina ny fanambarana izay anambarany Ahy. '
  '33':
  - type: text
    content: 'Hianareo naniraka tany amin’i Jaona, ary nanambara ny marina izy. '
  '34':
  - type: text
    content: 'Fa Izaho tsy mandray ny fanambarana avy amin’olona; fa milaza izany zavatra izany Aho mba ho voavonjy hianareo. '
  '35':
  - type: text
    content: Izy dia jiro nirehitra ka nazava; ary nahafinaritra anareo ny nifalianareo vetivety
  - type: note
    content: Gr. ora iray.
  - type: text
    content: ' tamin’ny fahazavany.'
  '36':
  - type: text
    content: 'Fa Izaho kosa manana fanambarana lehibe noho Jaona; fa ny asa nomen’ny Ray Ahy hovitaiko, dia izany asa ataoko izany no manambara Ahy fa nirahin’ny Ray. '
  '37':
  - type: text
    content: 'Ary ny Ray Izay naniraka Ahy, Izy no nanambara Ahy. Tsy mba renareo ny feony, na hitanareo akory aza ny endriny, '
  '38':
  - type: text
    content: ary ny teniny tsy mba mitoetra ao anatinareo, satria tsy mino Izay nirahiny hianareo.
  '39':
  - type: text
    content: Dinihinareo
  - type: note
    content: 'Na: Diniho.'
  - type: text
    content: ' ny Soratra '
  - type: text
    content: Masina,
  - type: text
    content: ' satria ataonareo fa ao aminy no anananareo fiainana mandrakizay, ary ireny no manambara Ahy. '
  '40':
  - type: text
    content: Kanefa tsy mety manatona Ahy hianareo hanananareo fiainana.
  '41':
  - type: text
    content: 'Tsy mandray laza avy amin’olona Aho. '
  '42':
  - type: text
    content: 'Fa fantatro hianareo, fa tsy misy fitiavana an’Andriamanitra ao am-ponareo. '
  '43':
  - type: text
    content: 'Izaho dia avy amin’ny anaran’ny Raiko, nefa tsy raisinareo; raha misy hafa avy amin’ny anaran’ny tenany, dia horaisinareo ihany izy. '
  '44':
  - type: text
    content: Hataonareo izay mifampitady laza ahoana no fino, nefa ny laza avy amin’ny Andriamanitra Tokana kosa dia tsy tadiavinareo?
  '45':
  - type: text
    content: 'Aza ataonareo fa Izaho no hiampanga anareo amin’ny Ray; misy ny mpiampanga anareo, dia Mosesy izay itokianareo. '
  '46':
  - type: text
    content: 'Fa raha mba nino an’i Mosesy hianareo, dia hino Ahy, satria nanoratra nilaza Ahy izy. '
  '47':
  - type: text
    content: Fa raha tsy mino izay nosoratany hianareo, hataonareo ahoana no fino ny teniko?
  '5':
  - type: text
    content: 'Ary nisy lehilahy anankiray teo, izay efa narary valo amby telo-polo taona. '
  '6':
  - type: text
    content: 'Raha nahita azy mandry Jesosy ka nahalala fa efa toy izany ela izy, dia hoy Izy taminy: Te-ho sitrana va hianao? '
  '7':
  - type: text
    content: 'Ilay marary namaly Azy hoe: Tompoko, raha hetsehina ny rano, dia tsy mba misy olona handroboka ahy eto amin’ny farihy; nefa raha mandeha aho, dia misy olon-kafa misosoka eo alohako. '
  '8':
  - type: text
    content: 'Hoy Jesosy taminy: Mitsangàna, ento ny fandrianao, ka mandehana. '
  '9':
  - type: text
    content: Ary niaraka tamin’izay dia sitrana ralehilahy ka nitondra ny fandriany, dia lasa nandeha. Ary Sabata izay andro izay.
