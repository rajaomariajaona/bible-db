document_id: 2CH.27,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Jotama.
  - type: text
    content: DIMY amby roa-polo taona Jotama, fony izy vao nanjaka, ary enina ambin’ny folo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jerosa, zanakavavin’i Zadoka.
  '2':
  - type: text
    content: Ary nanao izay mahitsy eo imason’i Jehovah izy, tahaka izay nataon’i Ozia rainy; nefa kosa tsy mba niditra tao amin’ny tempolin’i Jehovah izy. Ary ny vahoaka rehetra mbola nanao ratsy ihany.
  '3':
  - type: text
    content: 'Izy no nanamboatra ny vavahady ambony amin’ny tranon’i Jehovah sady nandrafitra be tamin’ny màndan’i Ofela koa. '
  '4':
  - type: text
    content: Ary nanao tanàna teny amin’ny tany havoan’i Joda sy trano fiarovana ary tilikambo tany an-ala koa izy.
  '5':
  - type: text
    content: 'Ary niady tamin’ny mpanjakan’ny taranak’i Amona koa izy ka naharesy azy. Ary tamin’izany taona izany ny taranak’i Amona nanome azy talenta volafotsy zato ary vary tritika sy vary hordea iray alina kora avy; izany no naloan’ny taranak’i Amona ho azy tamin’ny taona faharoa sy fahatelo koa. '
  '6':
  - type: text
    content: Ary dia nitombo hery Jotama, satria nizotra tsara teo anatrehan’i Jehovah Andriamaniny izy.
  '7':
  - type: text
    content: 'Ary ny tantaran’i Jotama sisa mbamin’ny adiny rehetra sy ny fanaony, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Isiraely sy ny Joda izany. '
  '8':
  - type: text
    content: 'Dimy amby roa-polo taona izy, fony vao nanjaka, ary enina ambin’ny folo taona no nanjakany tany Jerosalema. '
  '9':
  - type: text
    content: Ary Jotama lasa nodi-mandry any amin’ny razany, dia nalevina tany an-Tanànan’i Davida izy; ary Ahaza zanany no nanjaka nandimby azy.
