document_id: 2CH.27
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Jotama.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: DIMY amby roa-polo taona Jotama, fony izy vao nanjaka, ary enina ambin’ny folo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jerosa, zanakavavin’i Zadoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nanao izay mahitsy eo imason’i Jehovah izy, tahaka izay nataon’i Ozia rainy; nefa kosa tsy mba niditra tao amin’ny tempolin’i Jehovah izy. Ary ny vahoaka rehetra mbola nanao ratsy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izy no nanamboatra ny vavahady ambony amin’ny tranon’i Jehovah sady nandrafitra be tamin’ny màndan’i Ofela koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary nanao tanàna teny amin’ny tany havoan’i Joda sy trano fiarovana ary tilikambo tany an-ala koa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary niady tamin’ny mpanjakan’ny taranak’i Amona koa izy ka naharesy azy. Ary tamin’izany taona izany ny taranak’i Amona nanome azy talenta volafotsy zato ary vary tritika sy vary hordea iray alina kora avy; izany no naloan’ny taranak’i Amona ho azy tamin’ny taona faharoa sy fahatelo koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary dia nitombo hery Jotama, satria nizotra tsara teo anatrehan’i Jehovah Andriamaniny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny tantaran’i Jotama sisa mbamin’ny adiny rehetra sy ny fanaony, indro, efa voasoratra ao amin’ny bokin’ny mpanjakan’ny Isiraely sy ny Joda izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dimy amby roa-polo taona izy, fony vao nanjaka, ary enina ambin’ny folo taona no nanjakany tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary Jotama lasa nodi-mandry any amin’ny razany, dia nalevina tany an-Tanànan’i Davida izy; ary Ahaza zanany no nanjaka nandimby azy.
