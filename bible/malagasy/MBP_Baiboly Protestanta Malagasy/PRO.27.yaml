document_id: PRO.27,873
type_code: plt
verses:
  '1':
  - type: text
    content: Aza mirehareha ny amin’ny ho ampitso hianao;
  - type: text
    content: Fa na dia ny havoaky ny anio aza tsy fantatrao.
  '10':
  - type: text
    content: Aza mahafoy ny sakaizanao, na ny sakaizan-drainao,
  - type: text
    content: Ary aza mankany amin’ny tranon’ny rahalahinao amin’ny andro fahorianao;
  - type: text
    content: Fa tsara ny namana akaiky noho ny rahalahy lavitra.
  '11':
  - type: text
    content: Anaka, hendre, ary ampifalio ny foko,
  - type: text
    content: Mba hamaliako izay miteny ratsy ahy.
  '12':
  - type: text
    content: Ny mahira-tsaina mahatazana ny loza ka miery;
  - type: text
    content: Fa ny kely saina kosa mandroso ka voa.
  '13':
  - type: text
    content: Alao ny lambany, fa efa niantoka olon-kafa izy,
  - type: text
    content: Ary tano ho solon’ny vahiny janga niantohany izy.
  '14':
  - type: text
    content: Izay mifoha maraina koa ka misaotra ny sakaizany amin’ny feo mahery,
  - type: text
    content: Dia isaina ho fanozonana izany.
  '15':
  - type: text
    content: Tahaka ny fijononoky ny ranonorana be
  - type: text
    content: Ny vehivavy tia ady.
  '16':
  - type: text
    content: Izay misakana azy dia toy ny misakana ny rivotra,
  - type: text
    content: Sady toy ny mamihina
  - type: note
    content: 'Na: mihatra amin’ny.'
  - type: text
    content: ' diloilo ny tànany ankavanana.'
  '17':
  - type: text
    content: Ny vy maharanitra ny vy,
  - type: text
    content: Toy izany, ny olona maharanitra ny tarehin’ny sakaizany.
  '18':
  - type: text
    content: Izay miaro aviavy dia hihinana ny voany;
  - type: text
    content: Ary izay miambin-tompo dia homem-boninahitra.
  '19':
  - type: text
    content: Toy ny tandindona eny anaty rano mifanahaka amin’ny tarehy,
  - type: text
    content: Dia toy izany no ifanahafan’ny fon’ny olona amin’ny an’olona.
  '2':
  - type: text
    content: Aoka ny olon-kafa no hidera anao, fa tsy ny vavanao,
  - type: text
    content: Eny, ny vahiny, fa tsy ny molotrao.
  '20':
  - type: text
    content: Ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' sy ny fandringanana tsy mety voky,'
  - type: text
    content: Dia toy izany no tsy ahamamoan’ny mason’ny olona.
  '21':
  - type: text
    content: Ny memy ho an’ny volafotsy,
  - type: text
    content: Ny fandrendrehana ho an’ny volamena,
  - type: text
    content: Ary ny toetry ny olona dia tsy maintsy ho araka izay zavatra derainy.
  '22':
  - type: text
    content: Na dia miara-totoinao ny fanoto amin’ny vary eo an-daona aza ny adala,
  - type: text
    content: Dia tsy mba hiala aminy tsy akory ny fahadalany.
  '23':
  - type: text
    content: Fantaro tsara ny tarehin’ny ondry aman-osinao,
  - type: text
    content: Ary miahia tsara ny andian’ny bibinao;
  '24':
  - type: text
    content: Fa ny harena tsy ho mandrakizay;
  - type: text
    content: Ary moa haharitra ho amin’ny taranaka rehetra va ny satroboninahitra?
  '25':
  - type: text
    content: Na dia lany aza ny ahitra, ka mitsiry ny solofony,
  - type: text
    content: Ary voataona ny zava-maniry any an-tendrombohitra,
  '26':
  - type: text
    content: Ny zanak’ondry dia hahazoanao fitafiana,
  - type: text
    content: Ary ny osy hamidinao tany;
  '27':
  - type: text
    content: Ary ho ampy hosotroinao ny rononon’osy
  - type: text
    content: Sy ho an’ny ankohonanao,
  - type: text
    content: Ary hisy hiveloman’ny ankizivavinao.
  '3':
  - type: text
    content: Mavesatra ny vato, ary mavesa-danja ny fasika;
  - type: text
    content: Fa ny fahasosoran’ny adala dia manoatra noho izy roa tonta.
  '4':
  - type: text
    content: Masiaka ny fahavinirana, ary misafoaka ny fahatezerana;
  - type: text
    content: Fa iza no mahajanona eo anatrehan’ny fahasaro-piaro?
  '5':
  - type: text
    content: Aleo anatra imaso
  - type: text
    content: Toy izay fitia afenina.
  '6':
  - type: text
    content: Azo itokiana hahasoa ny fery ataon’ny sakaiza;
  - type: text
    content: Fa tena fitaka ny fanorohan’ny fahavalo.
  '7':
  - type: text
    content: Hitsakitsahin’ny voky na dia ny toho-tantely aza;
  - type: text
    content: Fa mamin’ny noana na dia ny zava-mangidy rehetra aza.
  '8':
  - type: text
    content: Toy ny voron-kely miala amin’ny akaniny ka mirenireny,
  - type: text
    content: Dia toy izany ny olona izay mirenireny miala amin’ny fonenany.
  '9':
  - type: text
    content: Ny diloilo sy ny zava-manitra mahafaly ny fo,
  - type: text
    content: Ary ny hamamin’ny sakaiza dia avy amin’ny ana-panahy ataony.
