document_id: PRO.27,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mirehareha ny amin’ny ho ampitso hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na dia ny havoaky ny anio aza tsy fantatrao.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mahafoy ny sakaizanao, na ny sakaizan-drainao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mankany amin’ny tranon’ny rahalahinao amin’ny andro fahorianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsara ny namana akaiky noho ny rahalahy lavitra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaka, hendre, ary ampifalio ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hamaliako izay miteny ratsy ahy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mahira-tsaina mahatazana ny loza ka miery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny kely saina kosa mandroso ka voa.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alao ny lambany, fa efa niantoka olon-kafa izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tano ho solon’ny vahiny janga niantohany izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mifoha maraina koa ka misaotra ny sakaizany amin’ny feo mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia isaina ho fanozonana izany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fijononoky ny ranonorana be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vehivavy tia ady.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay misakana azy dia toy ny misakana ny rivotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady toy ny mamihina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mihatra amin’ny.
      marker-yv: yv-n
    - type: text
      text: ' diloilo ny tànany ankavanana.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vy maharanitra ny vy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izany, ny olona maharanitra ny tarehin’ny sakaizany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay miaro aviavy dia hihinana ny voany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay miambin-tompo dia homem-boninahitra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny tandindona eny anaty rano mifanahaka amin’ny tarehy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany no ifanahafan’ny fon’ny olona amin’ny an’olona.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny olon-kafa no hidera anao, fa tsy ny vavanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny vahiny, fa tsy ny molotrao.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' sy ny fandringanana tsy mety voky,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany no tsy ahamamoan’ny mason’ny olona.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny memy ho an’ny volafotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fandrendrehana ho an’ny volamena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny toetry ny olona dia tsy maintsy ho araka izay zavatra derainy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia miara-totoinao ny fanoto amin’ny vary eo an-daona aza ny adala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy mba hiala aminy tsy akory ny fahadalany.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fantaro tsara ny tarehin’ny ondry aman-osinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miahia tsara ny andian’ny bibinao;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny harena tsy ho mandrakizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary moa haharitra ho amin’ny taranaka rehetra va ny satroboninahitra?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia lany aza ny ahitra, ka mitsiry ny solofony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary voataona ny zava-maniry any an-tendrombohitra,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanak’ondry dia hahazoanao fitafiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny osy hamidinao tany;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho ampy hosotroinao ny rononon’osy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho an’ny ankohonanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy hiveloman’ny ankizivavinao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mavesatra ny vato, ary mavesa-danja ny fasika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahasosoran’ny adala dia manoatra noho izy roa tonta.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Masiaka ny fahavinirana, ary misafoaka ny fahatezerana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza no mahajanona eo anatrehan’ny fahasaro-piaro?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo anatra imaso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izay fitia afenina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Azo itokiana hahasoa ny fery ataon’ny sakaiza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tena fitaka ny fanorohan’ny fahavalo.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsakitsahin’ny voky na dia ny toho-tantely aza;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mamin’ny noana na dia ny zava-mangidy rehetra aza.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny voron-kely miala amin’ny akaniny ka mirenireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany ny olona izay mirenireny miala amin’ny fonenany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny diloilo sy ny zava-manitra mahafaly ny fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hamamin’ny sakaiza dia avy amin’ny ana-panahy ataony.
