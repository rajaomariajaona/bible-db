document_id: ISA.28,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hitsarana an’i Samaria sy Jerosalema, sy fanoharana mahamarina ny fitondran’Andriamanitra.
  - type: text
    content: LOZAN’ny satroboninahitra, izay reharehan’ny mpimamo any Efraima,
  - type: text
    content: Sy ny voninkazo mihamalazo amin’ny firàvany tsara tarehy,
  - type: text
    content: Izay eo an-dohan’ny lohasaha lonaky
  - type: note
    content: Heb. matavy.
  - type: text
    content: ' ny fileon-divay.'
  '10':
  - type: text
    content: Fa didy anampy didy, didy anampy didy;
  - type: text
    content: Fitsipika anampy fitsipika, fitsipika anampy fitsipika;
  - type: text
    content: Kely etỳ, ary kely erỳ;
  '11':
  - type: text
    content: Eny, amin’ny molotra miambakambaka
  - type: text
    content: Sy amin’ny fiteny baiko no hitenenany amin’ity firenena ity,
  '12':
  - type: text
    content: Izay nilazany
  - type: note
    content: 'Na: Dia Izy Izay nilaza taminy.'
  - type: text
    content: ' hoe: Ity no fitsaharana,'
  - type: text
    content: Ampitsaharo ny reraka,
  - type: text
    content: Ary ity no famelombelomana;
  - type: text
    content: Nefa tsy nety nihaino ireo.
  '13':
  - type: text
    content: Ary ny tenin’i Jehovah dia ho tonga didy anampy didy aminy tokoa, eny, didy anampy didy,
  - type: text
    content: Fitsipika anampy fitsipika, fitsipika anampy fitsipika;
  - type: text
    content: Kely etỳ, ary kely erỳ,
  - type: text
    content: Mba hanaovany dia mianotra, ka ho torotoro izy
  - type: text
    content: Sy hofandrihana ary hosamborina.
  '14':
  - type: text
    content: Koa mihainoa ny tenin’i Jehovah hianareo, ry mpaniratsira,
  - type: text
    content: Izay manapaka ity firenena eto Jerosalema ity.
  '15':
  - type: text
    content: 'Satria hianareo manao hoe: Efa nanao fanekena tamin’ny fahafatesana izahay'
  - type: text
    content: Ary efa nanao fifanarahana tamin’ny fiainan-tsi-hita,
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Ka na dia ho avy aza ny loza
  - type: note
    content: Heb. kotopia.
  - type: text
    content: ' manafotra, dia tsy hihatra aminay izany,'
  - type: text
    content: Fa ny lainga no nataonay ho fiarovana,
  - type: text
    content: Ary ny fitaka ho fierena,–
  '16':
  - type: text
    content: 'Dia izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, Izaho no efa nametraka vato ao Ziona,
  - type: text
    content: Dia vato voazaha toetra, vato tsara izay fehizoro voaorina ho fanorenana mafy,
  - type: text
    content: Ka tsy mba ho taitra izay mino.
  '17':
  - type: text
    content: Ny fitsarana no hataoko ho fitsipika,
  - type: text
    content: Ary ny fahamarinana ho pilao;
  - type: text
    content: Hopaohin’ny havandra ny lainga fiarovana,
  - type: text
    content: Ary hindaosin’ny rano ny fierena.
  '18':
  - type: text
    content: Hofoanana ny fanekenareo amin’ny fahafatesana,
  - type: text
    content: Ary tsy haharitra ny fifanarahanareo amin’ny fiainan-tsi-hita;
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Raha ho avy ny loza
  - type: note
    content: Heb. kotopia.
  - type: text
    content: ' manafotra,'
  - type: text
    content: Dia ho tonga fanitsakitsany hianareo.
  '19':
  - type: text
    content: Ary na oviana na oviana no ihaviany, dia hahatratra anareo izany;
  - type: text
    content: Fa isa-maraina isa-maraina no hihaviany,
  - type: text
    content: Na andro na alina;
  - type: text
    content: Ary ny vokatry ny fahafantarana izany fianarana izany dia fangovitana ihany.
  '2':
  - type: text
    content: Indro, ny Tompo manana izay mahery sady matanjaka,
  - type: text
    content: Tahaka ny rivo-kavandra sy ny tafio-drivotra mandoza;
  - type: text
    content: Koa tahaka ny fandriaky ny rano be manafotra
  - type: text
    content: No hanjerany azy mafy ho amin’ny tany.
  '20':
  - type: text
    content: Fa fohy loatra ny farafara ka tsy azon’ny olona ilamparana;
  - type: text
    content: Ary kely ny firakotra ka tsy maharakotra, raha misy te-hirakotra azy.
  '21':
  - type: text
    content: Fa Jehovah hitsangana tahaka ny teo amin’ny tendrombohitra Perazima,
  - type: text
    content: Ho tezitra tahaka ny teo amin’ny lohasahan’i Gibeona Izy,
  - type: text
    content: Mba hanaovany ny asany–tsy ilay fanaony mandrakariva anefa,
  - type: text
    content: Ary hahavitany ny ataony–tsy ilay vitainy mandrakariva anefa.
  '22':
  - type: text
    content: Koa dia aza maniratsira intsony hianareo,
  - type: text
    content: Fandrao atao mafy ny famatorana anareo;
  - type: text
    content: Fa fahafonganana voatendry no efa reko tamin’i Jehovah, Tompon’ny maro,
  - type: text
    content: Hamelezana ny tany rehetra.
  '23':
  - type: text
    content: Mihainoa hianareo, ka mandrenesa ny feoko;
  - type: text
    content: Mitandrema, ka mandrenesa ny teniko.
  '24':
  - type: text
    content: Moa ny mpiasa tany va miasa mba hamafy,
  - type: text
    content: Na mitombo-doha sy mandravona ny taniny mandrakariva?
  '25':
  - type: text
    content: Rehefa voaravony tsara ny tany, moa tsy afafiny amin’izay va ny voan’ny nigela,
  - type: text
    content: Ary tsy apariakany va ny komina,
  - type: text
    content: Ary tsy alahany mitandahatra tsara va ny vary tritika
  - type: text
    content: Sy ny vary hordea amin’ny tany voafaritra ho azy
  - type: text
    content: Ary ny ampemby
  - type: note
    content: 'Na: spelta.'
  - type: text
    content: ' kosa eny an-tsisiny?'
  '26':
  - type: text
    content: Fa Andriamaniny no manoro azy izay mety hataony,
  - type: text
    content: Eny, Izy no mampianatra azy.
  - type: note
    content: 'Na: samy ataony araka izay tandrifiny ho azy avy; Fa Andriamaniny no mampianatra azy'
  '27':
  - type: text
    content: Fa tsy ny kodia vy no ivelezana ny nigela,
  - type: text
    content: Ary tsy ny kodian’ny sariety no akodiadia amin’ny komina;
  - type: text
    content: Fa ny nigela dia velezina amin’ny fàntaka,
  - type: text
    content: Ary ny komina amin’ny tehina.
  '28':
  - type: text
    content: Moa mongomongoiny va ny vary hatao mofo?
  - type: text
    content: Tsia, fa tsy veleziny na hampandehanany ny kodian’ny sarietiny sy ny soavaliny lalandava izy;
  - type: text
    content: Tsy mongomongoiny tsy akory izy.
  '29':
  - type: text
    content: Izany koa dia avy amin’i Jehovah, Tompon’ny maro;
  - type: text
    content: Fa mahagaga amin’ny fisainana Izy
  - type: text
    content: Ary mahatalanjona amin’ny fahendrena.
  '3':
  - type: text
    content: Dia hohitsahin’ny tongotra ny satroboninahitra,
  - type: text
    content: Izay reharehan’ny mpimamo any Efraima.
  '4':
  - type: text
    content: Ary ny voninkazo mihamalazo amin’ny firàvany tsara tarehy,
  - type: text
    content: Izay eo an-dohan’ny lohasaha lonaka,
  - type: note
    content: Heb. matavy.
  - type: text
    content: Dia ho tahaka ny voan’aviavy mialintaona, raha tsy mbola tonga ny fahavaratra,
  - type: text
    content: Koa izay mahita azy dia mijery,
  - type: text
    content: Ary raha vao raisiny, dia arapany.
  '5':
  - type: text
    content: Ary amin’izany andro izany Jehovah, Tompon’ny maro, dia ho satroboninahitra tsara tarehy
  - type: text
    content: Sy ho fehiloha firavaka ho an’ny olony sisa,
  '6':
  - type: text
    content: Ary ho fanahy fitsarana ho an’izay mipetraka eo amin’ny fitsarana,
  - type: text
    content: Sy ho hery ho an’izay mampiverina ny ady hatreo am-bavahady.
  '7':
  - type: text
    content: Nefa ireo koa dia miraingiraingy azon’ny divay
  - type: text
    content: Ary mivembena azon’ny toaka;
  - type: text
    content: Ny mpisorona sy ny mpaminany miraingiraingy azon’ny toaka;
  - type: text
    content: Resin’ny divay ireo;
  - type: text
    content: Mivembena azon’ny toaka izy;
  - type: text
    content: Miraingiraingy amin’ny fahitana izy
  - type: text
    content: Ary midoladola eo amin’ny fitsarana.
  '8':
  - type: text
    content: Fa feno loa sy loto ny latabatra rehetra,
  - type: text
    content: Ka efa tsy misy madio hitoerana.
  '9':
  - type: text
    content: Iza no hampianariny fahalalana?
  - type: text
    content: Ary iza no hampahafantariny fianarana?
  - type: text
    content: Zaza vao notazana va?
  - type: text
    content: Ny vao nitsaha-nono va?
