document_id: ISA.28
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hitsarana an’i Samaria sy Jerosalema, sy fanoharana mahamarina ny fitondran’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: LOZAN’ny satroboninahitra, izay reharehan’ny mpimamo any Efraima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny voninkazo mihamalazo amin’ny firàvany tsara tarehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay eo an-dohan’ny lohasaha lonaky
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: matavy.
    marker-yv: yv-n
  - type: text
    text: ' ny fileon-divay.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indro, ny Tompo manana izay mahery sady matanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny rivo-kavandra sy ny tafio-drivotra mandoza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa tahaka ny fandriaky ny rano be manafotra
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hanjerany azy mafy ho amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia hohitsahin’ny tongotra ny satroboninahitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay reharehan’ny mpimamo any Efraima.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny voninkazo mihamalazo amin’ny firàvany tsara tarehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay eo an-dohan’ny lohasaha lonaka,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: matavy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tahaka ny voan’aviavy mialintaona, raha tsy mbola tonga ny fahavaratra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa izay mahita azy dia mijery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha vao raisiny, dia arapany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary amin’izany andro izany Jehovah, Tompon’ny maro, dia ho satroboninahitra tsara tarehy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho fehiloha firavaka ho an’ny olony sisa,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ho fanahy fitsarana ho an’izay mipetraka eo amin’ny fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho hery ho an’izay mampiverina ny ady hatreo am-bavahady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nefa ireo koa dia miraingiraingy azon’ny divay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mivembena azon’ny toaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpisorona sy ny mpaminany miraingiraingy azon’ny toaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Resin’ny divay ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivembena azon’ny toaka izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miraingiraingy amin’ny fahitana izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary midoladola eo amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa feno loa sy loto ny latabatra rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka efa tsy misy madio hitoerana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Iza no hampianariny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no hampahafantariny fianarana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zaza vao notazana va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny vao nitsaha-nono va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa didy anampy didy, didy anampy didy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fitsipika anampy fitsipika, fitsipika anampy fitsipika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kely etỳ, ary kely erỳ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eny, amin’ny molotra miambakambaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny fiteny baiko no hitenenany amin’ity firenena ity,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izay nilazany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dia Izy Izay nilaza taminy.
    marker-yv: yv-n
  - type: text
    text: ' hoe: Ity no fitsaharana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampitsaharo ny reraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ity no famelombelomana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy nety nihaino ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny tenin’i Jehovah dia ho tonga didy anampy didy aminy tokoa, eny, didy anampy didy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fitsipika anampy fitsipika, fitsipika anampy fitsipika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kely etỳ, ary kely erỳ,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanaovany dia mianotra, ka ho torotoro izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hofandrihana ary hosamborina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa mihainoa ny tenin’i Jehovah hianareo, ry mpaniratsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manapaka ity firenena eto Jerosalema ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Satria hianareo manao hoe: Efa nanao fanekena tamin’ny fahafatesana izahay'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa nanao fifanarahana tamin’ny fiainan-tsi-hita,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka na dia ho avy aza ny loza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: kotopia.
    marker-yv: yv-n
  - type: text
    text: ' manafotra, dia tsy hihatra aminay izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny lainga no nataonay ho fiarovana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fitaka ho fierena,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, Izaho no efa nametraka vato ao Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia vato voazaha toetra, vato tsara izay fehizoro voaorina ho fanorenana mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mba ho taitra izay mino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fitsarana no hataoko ho fitsipika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinana ho pilao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hopaohin’ny havandra ny lainga fiarovana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hindaosin’ny rano ny fierena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hofoanana ny fanekenareo amin’ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy haharitra ny fifanarahanareo amin’ny fiainan-tsi-hita;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha ho avy ny loza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: kotopia.
    marker-yv: yv-n
  - type: text
    text: ' manafotra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tonga fanitsakitsany hianareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary na oviana na oviana no ihaviany, dia hahatratra anareo izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa isa-maraina isa-maraina no hihaviany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na andro na alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vokatry ny fahafantarana izany fianarana izany dia fangovitana ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa fohy loatra ny farafara ka tsy azon’ny olona ilamparana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary kely ny firakotra ka tsy maharakotra, raha misy te-hirakotra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa Jehovah hitsangana tahaka ny teo amin’ny tendrombohitra Perazima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tezitra tahaka ny teo amin’ny lohasahan’i Gibeona Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanaovany ny asany–tsy ilay fanaony mandrakariva anefa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahavitany ny ataony–tsy ilay vitainy mandrakariva anefa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa dia aza maniratsira intsony hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao atao mafy ny famatorana anareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fahafonganana voatendry no efa reko tamin’i Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamelezana ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mihainoa hianareo, ka mandrenesa ny feoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitandrema, ka mandrenesa ny teniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moa ny mpiasa tany va miasa mba hamafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mitombo-doha sy mandravona ny taniny mandrakariva?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rehefa voaravony tsara ny tany, moa tsy afafiny amin’izay va ny voan’ny nigela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy apariakany va ny komina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy alahany mitandahatra tsara va ny vary tritika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny vary hordea amin’ny tany voafaritra ho azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ampemby
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: spelta.
    marker-yv: yv-n
  - type: text
    text: ' kosa eny an-tsisiny?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa Andriamaniny no manoro azy izay mety hataony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Izy no mampianatra azy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.26 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: samy ataony araka izay tandrifiny ho azy avy; Fa Andriamaniny no mampianatra azy
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa tsy ny kodia vy no ivelezana ny nigela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ny kodian’ny sariety no akodiadia amin’ny komina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny nigela dia velezina amin’ny fàntaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny komina amin’ny tehina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Moa mongomongoiny va ny vary hatao mofo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia, fa tsy veleziny na hampandehanany ny kodian’ny sarietiny sy ny soavaliny lalandava izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mongomongoiny tsy akory izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izany koa dia avy amin’i Jehovah, Tompon’ny maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mahagaga amin’ny fisainana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahatalanjona amin’ny fahendrena.
