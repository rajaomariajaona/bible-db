document_id: MAT.24,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanambaran’i Jesosy ny handravana an’i Jerosalema sy ny hihaviany indray.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mar. 13.1-37; Lio. 21.5-36.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY nony niala teo an-kianjan’ny tempoly Jesosy, dia lasa nandeha; ary ny mpianany nanatona Azy hampizaha Azy ny rafitry ny tempoly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary amin’izany andro izany dia ho tafintohina ny maro, ary hifampiampanga sy hifankahala izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hisy mpaminany sandoka maro hitsangana ka hamitaka ny maro. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary noho ny haben’ny tsi-fankatoavan-dalàna dia hihamangatsiaka ny fitiavan’ny maro. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa izay maharitra hatramin’ny farany no hovonjena. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary hotorina amin’izao tontolo izao ity filazantsaran’ny fanjakana ity ho vavolombelona amin’ny firenena rehetra, dia vao ho tonga ny farany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa raha hitanareo mitsangana ao amin’izay fitoerana masina ,,ny fahavetavetan’ny fandravana,’’ izay nampilazaina an’i Daniela mpaminany (Dan. 12.11; 9.27) (aoka hisaina izay mamaky izany), '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia aoka izay olona any Jodia handositra ho any an-tendrombohitra; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary izay ao an-tampon-trano aoka tsy hidina haka ny ao an-tranony; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ary izay any an-tsaha aoka tsy hiverina haka ny lambany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary lozan’ny bevohoka sy ny mampinono amin’ireo andro ireo! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa Izy namaly ka nanao taminy hoe: Tsy hitanareo va ireo rehetra ireo?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy hitanareo izany rehetra izany.
      marker-yv: yv-n
    - type: text
      text: ' Lazaiko aminareo marina tokoa: Tsy havela hisy vato hifanongoa eto ka tsy horavana.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa mivavaha hianareo mba tsy ho amin’ny ririnina na ho amin’ny Sabata no handosiranareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa amin’izany andro izany dia hisy fahoriana lehibe, izay tsy mbola nisy toa azy hatrizay niandohan’izao tontolo izao ka mandraka ankehitriny, sady tsy hisy intsony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary raha tsy efa nohafohezina izany andro izany, dia tsy nisy nofo hovonjena; fa noho ny olom-boafidy dia hohafohezina izany andro izany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Koa raha misy manao aminareo hoe: Indro, atỳ Kristy, na: Indro, arỳ; aza mino hianareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa hisy Kristy sandoka sy mpaminany sandoka hitsangana ka haneho famantarana lehibe sy fahagagana, ary raha azo atao, na dia ny olom-boafidy aza dia hofitahiny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Indro, voalazako aminareo rahateo izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary amin’izany, raha misy manao aminareo hoe: Indro, any an-efitra Izy, aza mankany hianareo; Indro, ao amin’ny efi-trano Izy, aza mino. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa tahaka ny helatra avy any atsinanana ka hita hatrany andrefana, dia ho tahaka izany ny fihavian’ny Zanak’olona. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa izay itoeran’ny faty, dia any no hiangonan’ny voromahery.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary raha vao afaka ny fahoriana amin’ireo andro ireo, ny masoandro dia hohamaizinina, ary ny volana tsy hahazava; ny kintana hiraraka avy any an-danitra, ary ny herin’ny lanitra hohozongozonina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nipetraka teo an-tendrombohitra Oliva Izy, dia nanatona Azy mangingina ny mpianany ka nanao hoe: Lazao aminay izay andro hahatongavan’izany, ary izay ho famantarana ny fihavianao sy ny fahataperan’izao tontolo izao.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary amin’izany andro izany dia hiseho eo amin’ny lanitra ny famantarana ny Zanak’olona, ka dia hitomany ny firenena rehetra ambonin’ny tany, ary hahita ny Zanak’olona avy amin-kery sy voninahitra lehibe eo amin’ny rahon’ny lanitra izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary amin’ny ampanenoana mafy ny trompetra dia haniraka ny anjeliny Izy, ary hangonin’ireo ny olom-boafidy avy amin’ny vazan-tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rivotra.
      marker-yv: yv-n
    - type: text
      text: efatra hatramin’ny faravodilanitra rehetra.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary mianara ny fanoharana ny amin’ny aviavy:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aviavimbazaha.
      marker-yv: yv-n
    - type: text
      text: ' Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny lohataona. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia tahaka izany koa hianareo, raha vao hitanareo izany rehetra izany, dia aoka ho fantatrareo fa efa akaiky mby eo am-baravarana Izy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany.
      marker-yv: yv-n
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Tsy mba ho lany izao taranaka izao mandra-pahatongan’izany rehetra izany. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Fa ny amin’izany andro sy ora izany dia tsy misy mahalala, na dia ny anjelin’ny lanitra aza, [ary na ny Zanaka aza,] afa-tsy ny Ray ihany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa tahaka ny andron’i Noa, dia ho tahaka izany koa ny fihavian’ny Zanak’olona. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Fa tahaka ny tamin’ny andro fony tsy mbola tonga ny Safo-drano, ka nihinana sy nisotro ny olona ary nampaka-bady sy namoaka ny ampakarina, mandra-pihavin’ny andro izay nidiran’i Noa tao amin’ny sambo-fiara, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'ary tsy fantany mandra-pihavin’ny Safo-drano izay nandringana ny olona rehetra, dia ho tahaka izany ny fihavian’ny Zanak’olona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Jesosy namaly ka nanao taminy hoe: Mitandrema, fandrao hisy hamitaka anareo. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ary amin’izany hisy roa lahy any an-tsaha; ny anankiray horaisina, ary ny anankiray havela. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Ary hisy roa vavy manodina ny fikosoham-bary; ny anankiray horaisina, ary ny anankiray havela.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Koa amin’izany miambena hianareo; fa tsy fantatrareo izay andro hihavian’ny Tomponareo. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Nefa aoka ho fantatrareo izao: Raha fantatry ny tompon-trano ny fiambenana amin’ny alina izay hihavian’ny mpangalatra, dia ho niambina izy ka tsy namela ny tranony hotamina. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Koa miomàna kosa hianareo; fa amin’izay ora tsy ampoizinareo no hihavian’ny Zanak’olona.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Iza moa no mpanompo mahatoky sy manan-tsaina, izay notendren’ny tompony hifehy ny mpanompony mba hanome azy hanina amin’ny fotoana? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Sambatra izany mpanompo izany, raha avy ny tompony ka hahita azy manao izany. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Hotendreny ho mpanapaka ny fananany rehetra izy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Fa raha manao anakampo izany mpanompo ratsy fanahy izany hoe: Maharitra ela ny tompoko, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'ka dia mikapoka ny mpanompo namany izy ary mihinana sy misotro amin’ny mpimamo, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa maro no ho avy amin’ny anarako hanao hoe: Izaho no Kristy, ka maro no ho voafitany. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'dia ho avy ny tompon’izany mpanompo izany amin’ny andro izay tsy ampoiziny sy amin’ny ora izay tsy fantany, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: dia hotapahiny roa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.51 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hokapohiny mafy.
      marker-yv: yv-n
    - type: text
      text: ' izy ka homeny anjara any amin’ny mpihatsaravelatsihy; any no hisy ny fitomaniana sy ny fikitroha-nify.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary handre ady sy filazana ady hianareo; koa mitandrema, aza matahotra; fa tsy maintsy ho tonga izany; nefa tsy mbola tonga ny farany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana; ary hisy mosary sy horohorontany amin’ny tany samy hafa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa izany rehetra izany no fiandohan’ny fahoriana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'faharariam-piterahana; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'zahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xix.28.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary dia hatolony ho amin’ny fahoriana hianareo ka hovonoiny; ary ho halan’ny firenena rehetra hianareo noho ny anarako. '
