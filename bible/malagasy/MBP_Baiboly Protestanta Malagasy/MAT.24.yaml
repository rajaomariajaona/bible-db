document_id: MAT.24,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanambaran’i Jesosy ny handravana an’i Jerosalema sy ny hihaviany indray.
  - type: heading
    content: Mar. 13.1-37; Lio. 21.5-36.
  - type: text
    content: 'ARY nony niala teo an-kianjan’ny tempoly Jesosy, dia lasa nandeha; ary ny mpianany nanatona Azy hampizaha Azy ny rafitry ny tempoly. '
  '10':
  - type: text
    content: 'Ary amin’izany andro izany dia ho tafintohina ny maro, ary hifampiampanga sy hifankahala izy. '
  '11':
  - type: text
    content: 'Ary hisy mpaminany sandoka maro hitsangana ka hamitaka ny maro. '
  '12':
  - type: text
    content: 'Ary noho ny haben’ny tsi-fankatoavan-dalàna dia hihamangatsiaka ny fitiavan’ny maro. '
  '13':
  - type: text
    content: 'Fa izay maharitra hatramin’ny farany no hovonjena. '
  '14':
  - type: text
    content: Ary hotorina amin’izao tontolo izao ity filazantsaran’ny fanjakana ity ho vavolombelona amin’ny firenena rehetra, dia vao ho tonga ny farany.
  '15':
  - type: text
    content: 'Koa raha hitanareo mitsangana ao amin’izay fitoerana masina ,,ny fahavetavetan’ny fandravana,’’ izay nampilazaina an’i Daniela mpaminany (Dan. 12.11; 9.27) (aoka hisaina izay mamaky izany), '
  '16':
  - type: text
    content: 'dia aoka izay olona any Jodia handositra ho any an-tendrombohitra; '
  '17':
  - type: text
    content: 'ary izay ao an-tampon-trano aoka tsy hidina haka ny ao an-tranony; '
  '18':
  - type: text
    content: ary izay any an-tsaha aoka tsy hiverina haka ny lambany.
  '19':
  - type: text
    content: 'Ary lozan’ny bevohoka sy ny mampinono amin’ireo andro ireo! '
  '2':
  - type: text
    content: 'Fa Izy namaly ka nanao taminy hoe: Tsy hitanareo va ireo rehetra ireo?'
  - type: note
    content: 'Na: Tsy hitanareo izany rehetra izany.'
  - type: text
    content: ' Lazaiko aminareo marina tokoa: Tsy havela hisy vato hifanongoa eto ka tsy horavana.'
  '20':
  - type: text
    content: 'Fa mivavaha hianareo mba tsy ho amin’ny ririnina na ho amin’ny Sabata no handosiranareo. '
  '21':
  - type: text
    content: 'Fa amin’izany andro izany dia hisy fahoriana lehibe, izay tsy mbola nisy toa azy hatrizay niandohan’izao tontolo izao ka mandraka ankehitriny, sady tsy hisy intsony. '
  '22':
  - type: text
    content: Ary raha tsy efa nohafohezina izany andro izany, dia tsy nisy nofo hovonjena; fa noho ny olom-boafidy dia hohafohezina izany andro izany.
  '23':
  - type: text
    content: 'Koa raha misy manao aminareo hoe: Indro, atỳ Kristy, na: Indro, arỳ; aza mino hianareo. '
  '24':
  - type: text
    content: 'Fa hisy Kristy sandoka sy mpaminany sandoka hitsangana ka haneho famantarana lehibe sy fahagagana, ary raha azo atao, na dia ny olom-boafidy aza dia hofitahiny. '
  '25':
  - type: text
    content: 'Indro, voalazako aminareo rahateo izany. '
  '26':
  - type: text
    content: 'Ary amin’izany, raha misy manao aminareo hoe: Indro, any an-efitra Izy, aza mankany hianareo; Indro, ao amin’ny efi-trano Izy, aza mino. '
  '27':
  - type: text
    content: 'Fa tahaka ny helatra avy any atsinanana ka hita hatrany andrefana, dia ho tahaka izany ny fihavian’ny Zanak’olona. '
  '28':
  - type: text
    content: Fa izay itoeran’ny faty, dia any no hiangonan’ny voromahery.
  '29':
  - type: text
    content: 'Ary raha vao afaka ny fahoriana amin’ireo andro ireo, ny masoandro dia hohamaizinina, ary ny volana tsy hahazava; ny kintana hiraraka avy any an-danitra, ary ny herin’ny lanitra hohozongozonina. '
  '3':
  - type: text
    content: 'Ary nipetraka teo an-tendrombohitra Oliva Izy, dia nanatona Azy mangingina ny mpianany ka nanao hoe: Lazao aminay izay andro hahatongavan’izany, ary izay ho famantarana ny fihavianao sy ny fahataperan’izao tontolo izao.'
  '30':
  - type: text
    content: 'Ary amin’izany andro izany dia hiseho eo amin’ny lanitra ny famantarana ny Zanak’olona, ka dia hitomany ny firenena rehetra ambonin’ny tany, ary hahita ny Zanak’olona avy amin-kery sy voninahitra lehibe eo amin’ny rahon’ny lanitra izy. '
  '31':
  - type: text
    content: Ary amin’ny ampanenoana mafy ny trompetra dia haniraka ny anjeliny Izy, ary hangonin’ireo ny olom-boafidy avy amin’ny vazan-tany
  - type: note
    content: Gr. rivotra.
  - type: text
    content: efatra hatramin’ny faravodilanitra rehetra.
  '32':
  - type: text
    content: 'Ary mianara ny fanoharana ny amin’ny aviavy:'
  - type: note
    content: aviavimbazaha.
  - type: text
    content: ' Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny lohataona. '
  '33':
  - type: text
    content: Dia tahaka izany koa hianareo, raha vao hitanareo izany rehetra izany, dia aoka ho fantatrareo fa efa akaiky mby eo am-baravarana Izy.
  - type: note
    content: 'Na: izany.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Tsy mba ho lany izao taranaka izao mandra-pahatongan’izany rehetra izany. '
  '35':
  - type: text
    content: Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona.
  '36':
  - type: text
    content: 'Fa ny amin’izany andro sy ora izany dia tsy misy mahalala, na dia ny anjelin’ny lanitra aza, [ary na ny Zanaka aza,] afa-tsy ny Ray ihany. '
  '37':
  - type: text
    content: 'Fa tahaka ny andron’i Noa, dia ho tahaka izany koa ny fihavian’ny Zanak’olona. '
  '38':
  - type: text
    content: 'Fa tahaka ny tamin’ny andro fony tsy mbola tonga ny Safo-drano, ka nihinana sy nisotro ny olona ary nampaka-bady sy namoaka ny ampakarina, mandra-pihavin’ny andro izay nidiran’i Noa tao amin’ny sambo-fiara, '
  '39':
  - type: text
    content: 'ary tsy fantany mandra-pihavin’ny Safo-drano izay nandringana ny olona rehetra, dia ho tahaka izany ny fihavian’ny Zanak’olona. '
  '4':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Mitandrema, fandrao hisy hamitaka anareo. '
  '40':
  - type: text
    content: 'Ary amin’izany hisy roa lahy any an-tsaha; ny anankiray horaisina, ary ny anankiray havela. '
  '41':
  - type: text
    content: Ary hisy roa vavy manodina ny fikosoham-bary; ny anankiray horaisina, ary ny anankiray havela.
  '42':
  - type: text
    content: 'Koa amin’izany miambena hianareo; fa tsy fantatrareo izay andro hihavian’ny Tomponareo. '
  '43':
  - type: text
    content: 'Nefa aoka ho fantatrareo izao: Raha fantatry ny tompon-trano ny fiambenana amin’ny alina izay hihavian’ny mpangalatra, dia ho niambina izy ka tsy namela ny tranony hotamina. '
  '44':
  - type: text
    content: Koa miomàna kosa hianareo; fa amin’izay ora tsy ampoizinareo no hihavian’ny Zanak’olona.
  '45':
  - type: text
    content: 'Iza moa no mpanompo mahatoky sy manan-tsaina, izay notendren’ny tompony hifehy ny mpanompony mba hanome azy hanina amin’ny fotoana? '
  '46':
  - type: text
    content: 'Sambatra izany mpanompo izany, raha avy ny tompony ka hahita azy manao izany. '
  '47':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Hotendreny ho mpanapaka ny fananany rehetra izy. '
  '48':
  - type: text
    content: 'Fa raha manao anakampo izany mpanompo ratsy fanahy izany hoe: Maharitra ela ny tompoko, '
  '49':
  - type: text
    content: 'ka dia mikapoka ny mpanompo namany izy ary mihinana sy misotro amin’ny mpimamo, '
  '5':
  - type: text
    content: 'Fa maro no ho avy amin’ny anarako hanao hoe: Izaho no Kristy, ka maro no ho voafitany. '
  '50':
  - type: text
    content: 'dia ho avy ny tompon’izany mpanompo izany amin’ny andro izay tsy ampoiziny sy amin’ny ora izay tsy fantany, '
  '51':
  - type: text
    content: dia hotapahiny roa
  - type: note
    content: 'Na: hokapohiny mafy.'
  - type: text
    content: ' izy ka homeny anjara any amin’ny mpihatsaravelatsihy; any no hisy ny fitomaniana sy ny fikitroha-nify.'
  '6':
  - type: text
    content: 'Ary handre ady sy filazana ady hianareo; koa mitandrema, aza matahotra; fa tsy maintsy ho tonga izany; nefa tsy mbola tonga ny farany. '
  '7':
  - type: text
    content: 'Fa hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana; ary hisy mosary sy horohorontany amin’ny tany samy hafa. '
  '8':
  - type: text
    content: Fa izany rehetra izany no fiandohan’ny fahoriana.
  - type: note
    content: Gr. faharariam-piterahana; zahao xix.28.
  '9':
  - type: text
    content: 'Ary dia hatolony ho amin’ny fahoriana hianareo ka hovonoiny; ary ho halan’ny firenena rehetra hianareo noho ny anarako. '
