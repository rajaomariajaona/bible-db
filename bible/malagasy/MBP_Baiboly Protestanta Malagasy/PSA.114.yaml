document_id: PSA.114,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny horohoron’ny tany aman-danitra tamin’ny nanavotan’Andriamanitra ny olony tany Egypta.
  - type: text
    content: FONY nivoaka avy tany Egypta ny Isiraely,
  - type: text
    content: Dia ny taranak’i Jakoba avy tany amin’ny firenena hafa fiteny,
  '2':
  - type: text
    content: Joda no fitoerany masina,
  - type: text
    content: Isiraely no fanjakany.
  '3':
  - type: text
    content: Ny ranomasina nahita ka nandositra;
  - type: text
    content: Ary niorika Jordana.
  '4':
  - type: text
    content: Ny tendrombohitra dia nifalihavanja tahaka ny ondrilahy,
  - type: text
    content: Ary ny havoana tahaka ny zanak’ondry.
  '5':
  - type: text
    content: Inona izato mahazo anao, ry ranomasina, no mandositra hianao?
  - type: text
    content: Ary hianao, ry Jordana, no miorika hianao?
  '6':
  - type: text
    content: Ary hianareo tendrombohitra, no mifalihavanja tahaka ny ondrilahy;
  - type: text
    content: Ary hianareo havoana, tahaka ny zanak’ondry?
  '7':
  - type: text
    content: Mihorohoroa eo anatrehan’ny Tompo, ry tany,
  - type: text
    content: Dia eo anatrehan’Andriamanitr’i Jakoba,
  '8':
  - type: text
    content: Izay mampody ny vatolampy ho rano monina
  - type: text
    content: Ary ny afovato ho loharano.
