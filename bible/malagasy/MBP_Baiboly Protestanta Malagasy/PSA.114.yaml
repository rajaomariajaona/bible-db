document_id: PSA.114
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny horohoron’ny tany aman-danitra tamin’ny nanavotan’Andriamanitra ny olony tany Egypta.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: FONY nivoaka avy tany Egypta ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny taranak’i Jakoba avy tany amin’ny firenena hafa fiteny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Joda no fitoerany masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isiraely no fanjakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny ranomasina nahita ka nandositra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niorika Jordana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny tendrombohitra dia nifalihavanja tahaka ny ondrilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny havoana tahaka ny zanak’ondry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Inona izato mahazo anao, ry ranomasina, no mandositra hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianao, ry Jordana, no miorika hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary hianareo tendrombohitra, no mifalihavanja tahaka ny ondrilahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianareo havoana, tahaka ny zanak’ondry?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mihorohoroa eo anatrehan’ny Tompo, ry tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia eo anatrehan’Andriamanitr’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mampody ny vatolampy ho rano monina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny afovato ho loharano.
