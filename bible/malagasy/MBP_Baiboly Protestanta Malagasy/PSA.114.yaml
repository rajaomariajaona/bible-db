document_id: PSA.114,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny horohoron’ny tany aman-danitra tamin’ny nanavotan’Andriamanitra ny olony tany Egypta.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FONY nivoaka avy tany Egypta ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny taranak’i Jakoba avy tany amin’ny firenena hafa fiteny,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joda no fitoerany masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isiraely no fanjakany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ranomasina nahita ka nandositra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary niorika Jordana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra dia nifalihavanja tahaka ny ondrilahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny havoana tahaka ny zanak’ondry.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona izato mahazo anao, ry ranomasina, no mandositra hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao, ry Jordana, no miorika hianao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianareo tendrombohitra, no mifalihavanja tahaka ny ondrilahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianareo havoana, tahaka ny zanak’ondry?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihorohoroa eo anatrehan’ny Tompo, ry tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eo anatrehan’Andriamanitr’i Jakoba,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mampody ny vatolampy ho rano monina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny afovato ho loharano.
