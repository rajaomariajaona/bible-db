document_id: 1TI.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny fivavahana ho an’ny olona rehetra, ary ny fitondrantena sy ny fitafiana miendrika ny vehivavy Kristiana.
  - type: text
    content: 'KOA mananatra voalohany indrindra aho mba hatao izay fangatahana, fivavahana, fifonana, fisaorana, ho an’ny olona rehetra, '
  '10':
  - type: text
    content: 'fa amin’ny asa tsara, araka izay mahamendrika ny vehivavy manaiky ny fivavahana amin’Andriamanitra. '
  '11':
  - type: text
    content: 'Aoka ny vehivavy hianatra mangingina ka hanaiky tsara. '
  '12':
  - type: text
    content: 'Fa ny vehivavy tsy avelako hampianatra na hanapaka ny lehilahy, fa hangina ihany. '
  '13':
  - type: text
    content: 'Fa Adama no natao voalohany, vao Eva. '
  '14':
  - type: text
    content: 'Ary tsy Adama no voafitaka, fa ny vehivavy no voafitaka, ka dia tonga mpanota. '
  '15':
  - type: text
    content: Nefa hovonjena ihany izy amin’ny fiterahan-jaza, raha maharitra amin’ny finoana sy ny fitiavana ary ny fahamasinana mbamin’ny fahononan-tena.
  '2':
  - type: text
    content: 'ho an’ny mpanjaka mbamin’izay rehetra manana fahefana, mba hiainantsika miadana sy mandry fahizay amin’ny toe-panahy araka an’Andriamanitra sy ny fahamaotinana rehetra. '
  '3':
  - type: text
    content: 'Izany no tsara ka ankasitrahana eo imason’Andriamanitra, Mpamonjy antsika, '
  '4':
  - type: text
    content: 'Izay tia ny olona rehetra hovonjena ka ho tonga amin’ny fahalalana ny marina. '
  '5':
  - type: text
    content: 'Fa iray no Andriamanitra, ary iray no Mpanalalana amin’Andriamanitra sy ny olona, dia Kristy Jesosy, Izay olona, '
  '6':
  - type: text
    content: 'sady nanolotra ny tenany ho avotra hisolo ny olona rehetra, dia zavatra ho fitory amin’izao androny izao. '
  '7':
  - type: text
    content: Mba hanao izany no nanendrena ahy ho mpitory sy Apostoly (milaza ny marina aho, fa tsy mandainga), ho mpampianatra ny jentilisa amin’ny finoana sy ny fahamarinana.
  '8':
  - type: text
    content: 'Koa tiako ny lehilahy hivavaka eny tontolo eny manandra-tànana masina, tsy amin’ny fahatezerana na amin’ny fifandirana. '
  '9':
  - type: text
    content: Ary toy izany koa ny vehivavy, hiravaka amin’ny fitafiana mahamendrika mbamin’ny fahamaotinana sy ny fahononan-tena, fa tsy amin’ny volo mirandrana sy ny volamena, na vato soa,
  - type: note
    content: Gr. pèrila.
  - type: text
    content: ' na fitafiana saro-bidy, '
