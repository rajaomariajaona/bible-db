document_id: 1TI.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fivavahana ho an’ny olona rehetra, ary ny fitondrantena sy ny fitafiana miendrika ny vehivavy Kristiana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'KOA mananatra voalohany indrindra aho mba hatao izay fangatahana, fivavahana, fifonana, fisaorana, ho an’ny olona rehetra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa amin’ny asa tsara, araka izay mahamendrika ny vehivavy manaiky ny fivavahana amin’Andriamanitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ny vehivavy hianatra mangingina ka hanaiky tsara. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny vehivavy tsy avelako hampianatra na hanapaka ny lehilahy, fa hangina ihany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Adama no natao voalohany, vao Eva. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy Adama no voafitaka, fa ny vehivavy no voafitaka, ka dia tonga mpanota. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa hovonjena ihany izy amin’ny fiterahan-jaza, raha maharitra amin’ny finoana sy ny fitiavana ary ny fahamasinana mbamin’ny fahononan-tena.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ho an’ny mpanjaka mbamin’izay rehetra manana fahefana, mba hiainantsika miadana sy mandry fahizay amin’ny toe-panahy araka an’Andriamanitra sy ny fahamaotinana rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no tsara ka ankasitrahana eo imason’Andriamanitra, Mpamonjy antsika, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay tia ny olona rehetra hovonjena ka ho tonga amin’ny fahalalana ny marina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa iray no Andriamanitra, ary iray no Mpanalalana amin’Andriamanitra sy ny olona, dia Kristy Jesosy, Izay olona, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nanolotra ny tenany ho avotra hisolo ny olona rehetra, dia zavatra ho fitory amin’izao androny izao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hanao izany no nanendrena ahy ho mpitory sy Apostoly (milaza ny marina aho, fa tsy mandainga), ho mpampianatra ny jentilisa amin’ny finoana sy ny fahamarinana.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tiako ny lehilahy hivavaka eny tontolo eny manandra-tànana masina, tsy amin’ny fahatezerana na amin’ny fifandirana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary toy izany koa ny vehivavy, hiravaka amin’ny fitafiana mahamendrika mbamin’ny fahamaotinana sy ny fahononan-tena, fa tsy amin’ny volo mirandrana sy ny volamena, na vato soa,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pèrila.
      marker-yv: yv-n
    - type: text
      text: ' na fitafiana saro-bidy, '
