document_id: NUM.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nijangajangan’ny Isiraely tamin’ny zanakavavin’ny Moabita.
  - type: text
    content: 'ARY nitoetra tao Sitima ny Isiraely, dia niantomboka nijangajanga tamin’ny zanakavavin’ny Moabita izy. '
  '10':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '11':
  - type: text
    content: 'Finehasa, zanak’i Eleazara, zanak’i Arona mpisorona, nampiala ny fahatezerako tamin’ny Zanak’Isiraely, raha nirehitra noho ny fitiavany Ahy izy; ka dia tsy nataoko lany ringana ny Zanak’Isiraely tamin’ny firehetan’ny fahatezerako. '
  '12':
  - type: text
    content: 'Ary noho izany dia lazao hoe: Indro, omeko azy ny faneken’ny fihavanako; '
  '13':
  - type: text
    content: ary izy sy ny zanany mandimby azy no hanana izany ho faneken’ny fisoronana mandrakizay, satria nirehitra noho ny fitiavany an’Andriamaniny izy ka nanao fanavotana ho an’ny Zanak’Isiraely.
  '14':
  - type: text
    content: 'Ary ny anaran’ilay lehilahy Israelita novonoina, izay niaraka novonoina tamin-dravehivavy Midianita, dia Zimry, zanak’i Salo, lohan’ny fianakaviana tamin’ny Simeonita. '
  '15':
  - type: text
    content: Ary ny anaran’ny vehivavy Midianita izay novonoina dia Kosby, zanak’i Zora, lohan’ny fianakaviana tamin’ny Midianita.
  '16':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '17':
  - type: text
    content: 'Rafeso ny Midianita, ka iadio; '
  '18':
  - type: text
    content: fa izy nandrafy anareo tamin’ny fanangoleny, izay nanangoleny anareo tamin ny an’i Peora sy Kosby anabaviny, zanakavavin’ny andriandahy Midianita anankiray, izay novonoina tamin’ny andron’ny areti-mandringana noho ny an’i Peora.
  '2':
  - type: text
    content: 'Fa ireo nanasa ny olona hihinana tamin’ny zavatra novonoiny ho fanatitra ho an’ny andriamaniny, ka nihinana ny olona sady niankohoka tamin’ny andriamaniny. '
  '3':
  - type: text
    content: 'Dia niray tamin’i Bala-peora ny Isiraely, ka nirehitra taminy ny fahatezeran’i Jehovah. '
  '4':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Mosesy: Alao ny loholona rehetra, ary ahantòny tandrifin’ny masoandro eo anatrehan’i Jehovah ireo nijangajanga ireo, mba hitsaharan’ny firehetan’ny fahatezeran’i Jehovah amin’ny Isiraely. '
  '5':
  - type: text
    content: 'Dia hoy Mosesy tamin’ny mpitsara ny Isiraely: Samia hianareo mamono ny olom-peheziny, izay niray tamin’i Bala-peora.'
  '6':
  - type: text
    content: 'Ary, indro, avy ny anankiray tamin’ny Zanak’Isiraely nitondra vehivavy Midianita teo amin’ny rahalahiny, teo imason’i Mosesy sy ny fiangonana, dia ny Zanak’Isiraely rehetra, izay nitomany teo amin’ny varavaran’ny trano-lay fihaonana. '
  '7':
  - type: text
    content: 'Ary raha nahita izany Finehasa, zanak’i Eleazara, zanak’i Arona mpisorona, dia nitsangana niala teo amin’ny fiangonana izy ka nitondra lefona teny an-tànany; '
  '8':
  - type: text
    content: 'dia nandeha nanaraka ilay lehilahy Isiraelita tao an-day izy, ary nataony indray nandefona izy roroa, dia ny lehilahy Isiraelita sy ny vehivavy, '
  - type: text
    content: ka voagorobaka
  - type: text
    content: ' hatrany amin’ny kibon-dravehivavy. Dia natsahatra ny areti-mandringana teo amin’ny Zanak’Isiraely. '
  '9':
  - type: text
    content: Ary izay maty tamin’ny areti-mandringana dia efatra arivo amby roa alina.
