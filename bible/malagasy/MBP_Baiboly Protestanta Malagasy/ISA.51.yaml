document_id: ISA.51
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fiposahan’ny famonjena, sy ny fanesorana ny kapoaky ny fahatezeran’i Jehovah.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIHAINOA Ahy, hianareo izay miezaka mitady fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia izay mitady an’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsarovy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo.
    marker-yv: yv-n
  - type: text
    text: ' ny vatolampy izay nakana anareo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny ati-lavaka izay nihadiana anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eny, tsarovy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jereo.
    marker-yv: yv-n
  - type: text
    text: ' Abrahama rainareo sy Saraha, izay niteraka anareo;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fony mbola tokana izy, dia nantsoiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy notahiko ary nohamaroiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Jehovah mampionona an’i Ziona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mampionona izay rava rehetra ao Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manao ny efitra ao ho tahaka an’i Edena.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany foana ao ho tahaka ny sahan’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hafaliana sy haravoana no hita ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny fisaorana sy ny feo fiderana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihainoa Ahy, ry vahoakako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary atongilano amiko ny sofinareo, ry oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hisy lalàna hivoaka avy amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fitsipiko dia hampitoeriko ho fanazavana ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Akaiky ny fahamarinako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nivoaka ny famonjeko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sandriko no hitsara ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no hantenain’ny nosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny sandriko no handrasany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andrandrao ho amin’ny lanitra ny masonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary jereo ny tany ambany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny lanitra ho levona tahaka ny setroka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany ho tahaka ny lamba mangarahara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mponina ao dia ho faty tampoka;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tahaka ny fahafatin’ny moka.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny famonjeko kosa haharitra mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamarinako tsy mba ho rava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mihainoa Ahy, hianareo izay mahalala ny fahamarinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianao, ry firenena izay manana ny lalàko ao am-ponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra ny latsa ataon’ny zanak’olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na manahy noho ny fanaratsiany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny kalalao hihinana azy tahaka ny fihinan-damba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lolofotsy hihinana azy tahaka ny fihinam-bolon’ondry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fahamarinako haharitra mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny famonjeko hihatra amin’ny taranaka fara mandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifohaza, mifohaza, ry sandrin’i Jehovah, mitafia hery!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mifohaza tahaka ny tamin’ny andro fahiny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tamin’ny taranaka lasa ela.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy Hianao va Ilay nitetitetika an-dRahaba sy nitomboka ny dragona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mamba; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Ezek. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xxix.3.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy Hianao va Ilay nahamaina ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny rano ao amin’ny lalina indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanao ny ranomasina lalina ho làlana halehan’ny navotana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eny, ny navotan’i Jeyovah hiverina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hankany Ziona amin’ny fihobiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fifaliana mandrakizay no ho eny an-dohany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahazo fifaliana sy faharavoravoana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia handositra ny alahelo sy ny fisentoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izaho dia Izaho no mpampionona anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa nahoana hianao no dia matahotra ny zanak’olombelona mety maty
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny zanak’olona izay hatao tahaka ny ahitra
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka manadino an’i Jehovah, Mpanao anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay namelatra ny lanitra sy nanorina ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady matahotra lalandava mandritra ny andro hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahatezeran’ny mpampahory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mikendry hamono izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aiza intsony izay fahatezeran’ny mpampahory?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay mitanondrika dia ho afaka faingana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho faty havarina ao an-davaka izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy ho diso hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa Izaho Jehovah no Andriamanitrao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mampanonja ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia mirohondrohona ny onjany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izay mampitsahatra ny rano, raha mirohondrohona ny onjany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah, Tompon’ny maro, no anarako.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anarany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nataoko eo am-bavanao ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao amin’ny aloky ny tànako no nanaronako anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hamboly.
    marker-yv: yv-n
  - type: text
    text: ' ny lanitra sy hanorina ny tany Aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary hanao an’i Ziona hoe: Oloko hianao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mifohaza, mifohaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna, ry Jerosalema ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay efa nisotro ny kapoaky ny fahatezerana avy tamin’ny tànan’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny kapoaka gobilia mampiraikiraiky dia efa nisotroanao, ka notrohinao mbamin’ny faikany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy misy mitondra azy ny zananilahy rehetra izay naterany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy mitantana azy ny zananilahy rehetra izay notezainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izao zavatra roa izao no hanjo anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: '(Iza no hanony ny alahelonao?):'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandravana sy fandringanana ary mosary sy sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa hataoko ahoana no fampionona anao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanakao-lahy efa reraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miapokapoka eny an-joron-dàlambe rehetra eny izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny diera ao anatin’ny fandrika harato
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tahaka ny olona rakotry ny fahatezeran’i Jehovah sy ny teny mafy ataon’Andriamanitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa mihainoa izao, hianao ry ilay ory
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sady mamo tsy amin-divay:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izao no lazain’i Jehovah Tomponao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia Andriamanitrao, Izay mandaha-teny ho an’ny olony:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, esoriko eny an-tànanao ny kapoaka mampiraikiraiky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny kapoaka gobilian’ny fahatezerako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisotroanao intsony iny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa hataoko eo an-tànan’izay mampahory anao kosa,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia izay efa nilaza taminao hoe: Miankohofa mba hohitsahinay,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia nataonao ho tahaka ny tany ny tenanao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho tahaka ny làlambe ho an’izay mandeha eo.
