document_id: ISA.51,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiposahan’ny famonjena, sy ny fanesorana ny kapoaky ny fahatezeran’i Jehovah.
  - type: text
    content: MIHAINOA Ahy, hianareo izay miezaka mitady fahamarinana,
  - type: text
    content: 'Dia izay mitady an’i Jehovah:'
  - type: text
    content: Tsarovy
  - type: note
    content: Heb. Jereo.
  - type: text
    content: ' ny vatolampy izay nakana anareo'
  - type: text
    content: Sy ny ati-lavaka izay nihadiana anareo.
  '10':
  - type: text
    content: Tsy Hianao va Ilay nahamaina ny ranomasina,
  - type: text
    content: Dia ny rano ao amin’ny lalina indrindra,
  - type: text
    content: Ka nanao ny ranomasina lalina ho làlana halehan’ny navotana?
  '11':
  - type: text
    content: Eny, ny navotan’i Jeyovah hiverina
  - type: text
    content: Ka hankany Ziona amin’ny fihobiana,
  - type: text
    content: Ary ny fifaliana mandrakizay no ho eny an-dohany;
  - type: text
    content: Hahazo fifaliana sy faharavoravoana izy,
  - type: text
    content: Ka dia handositra ny alahelo sy ny fisentoana.
  '12':
  - type: text
    content: Izaho dia Izaho no mpampionona anareo,
  - type: text
    content: Koa nahoana hianao no dia matahotra ny zanak’olombelona mety maty
  - type: text
    content: Sy ny zanak’olona izay hatao tahaka ny ahitra
  '13':
  - type: text
    content: Ka manadino an’i Jehovah, Mpanao anao,
  - type: text
    content: Izay namelatra ny lanitra sy nanorina ny tany,
  - type: text
    content: Sady matahotra lalandava mandritra ny andro hianao
  - type: text
    content: Noho ny fahatezeran’ny mpampahory,
  - type: text
    content: Raha mikendry hamono izy?
  - type: text
    content: Fa aiza intsony izay fahatezeran’ny mpampahory?
  '14':
  - type: text
    content: Izay mitanondrika dia ho afaka faingana;
  - type: text
    content: Tsy ho faty havarina ao an-davaka izy
  - type: text
    content: Ary tsy ho diso hanina.
  '15':
  - type: text
    content: Fa Izaho Jehovah no Andriamanitrao,
  - type: text
    content: Izay mampanonja ny ranomasina,
  - type: text
    content: Ka dia mirohondrohona ny onjany;
  - type: note
    content: 'Na: Izay mampitsahatra ny rano, raha mirohondrohona ny onjany.'
  - type: text
    content: Jehovah, Tompon’ny maro, no anarako.
  - type: note
    content: Heb. anarany.
  '16':
  - type: text
    content: Ary nataoko eo am-bavanao ny teniko,
  - type: text
    content: Ary ao amin’ny aloky ny tànako no nanaronako anao,
  - type: text
    content: Hanao
  - type: note
    content: Heb. Hamboly.
  - type: text
    content: ' ny lanitra sy hanorina ny tany Aho'
  - type: text
    content: 'Ary hanao an’i Ziona hoe: Oloko hianao.'
  '17':
  - type: text
    content: Mifohaza, mifohaza,
  - type: text
    content: Mitsangàna, ry Jerosalema ô,
  - type: text
    content: Izay efa nisotro ny kapoaky ny fahatezerana avy tamin’ny tànan’i Jehovah;
  - type: text
    content: Eny, ny kapoaka gobilia mampiraikiraiky dia efa nisotroanao, ka notrohinao mbamin’ny faikany.
  '18':
  - type: text
    content: Tsy misy mitondra azy ny zananilahy rehetra izay naterany;
  - type: text
    content: Ary tsy misy mitantana azy ny zananilahy rehetra izay notezainy.
  '19':
  - type: text
    content: Izao zavatra roa izao no hanjo anao
  - type: text
    content: '(Iza no hanony ny alahelonao?):'
  - type: text
    content: Fandravana sy fandringanana ary mosary sy sabatra,
  - type: text
    content: Koa hataoko ahoana no fampionona anao?
  '2':
  - type: text
    content: Eny, tsarovy
  - type: note
    content: Heb. Jereo.
  - type: text
    content: ' Abrahama rainareo sy Saraha, izay niteraka anareo;'
  - type: text
    content: Fa fony mbola tokana izy, dia nantsoiko
  - type: text
    content: Sy notahiko ary nohamaroiko.
  '20':
  - type: text
    content: Ny zanakao-lahy efa reraka,
  - type: text
    content: Ka miapokapoka eny an-joron-dàlambe rehetra eny izy,
  - type: text
    content: Tahaka ny diera ao anatin’ny fandrika harato
  - type: text
    content: Eny, tahaka ny olona rakotry ny fahatezeran’i Jehovah sy ny teny mafy ataon’Andriamanitrao.
  '21':
  - type: text
    content: Koa mihainoa izao, hianao ry ilay ory
  - type: text
    content: 'Sady mamo tsy amin-divay:'
  '22':
  - type: text
    content: Izao no lazain’i Jehovah Tomponao,
  - type: text
    content: 'Dia Andriamanitrao, Izay mandaha-teny ho an’ny olony:'
  - type: text
    content: Indro, esoriko eny an-tànanao ny kapoaka mampiraikiraiky,
  - type: text
    content: Dia ny kapoaka gobilian’ny fahatezerako;
  - type: text
    content: Tsy hisotroanao intsony iny,
  '23':
  - type: text
    content: Fa hataoko eo an-tànan’izay mampahory anao kosa,–
  - type: text
    content: 'Dia izay efa nilaza taminao hoe: Miankohofa mba hohitsahinay,'
  - type: text
    content: Ka dia nataonao ho tahaka ny tany ny tenanao
  - type: text
    content: Sy ho tahaka ny làlambe ho an’izay mandeha eo.
  '3':
  - type: text
    content: Fa Jehovah mampionona an’i Ziona;
  - type: text
    content: Eny, mampionona izay rava rehetra ao Izy
  - type: text
    content: Ka manao ny efitra ao ho tahaka an’i Edena.
  - type: text
    content: Ary ny tany foana ao ho tahaka ny sahan’i Jehovah;
  - type: text
    content: Hafaliana sy haravoana no hita ao
  - type: text
    content: Mbamin’ny fisaorana sy ny feo fiderana.
  '4':
  - type: text
    content: Mihainoa Ahy, ry vahoakako,
  - type: text
    content: Ary atongilano amiko ny sofinareo, ry oloko;
  - type: text
    content: Fa hisy lalàna hivoaka avy amiko,
  - type: text
    content: Ary ny fitsipiko dia hampitoeriko ho fanazavana ny firenena.
  '5':
  - type: text
    content: Akaiky ny fahamarinako,
  - type: text
    content: Efa nivoaka ny famonjeko,
  - type: text
    content: Ary ny sandriko no hitsara ny firenena;
  - type: text
    content: Izaho no hantenain’ny nosy,
  - type: text
    content: Ary ny sandriko no handrasany.
  '6':
  - type: text
    content: Andrandrao ho amin’ny lanitra ny masonareo,
  - type: text
    content: Ary jereo ny tany ambany;
  - type: text
    content: Fa ny lanitra ho levona tahaka ny setroka,
  - type: text
    content: Ary ny tany ho tahaka ny lamba mangarahara,
  - type: text
    content: Ary ny mponina ao dia ho faty tampoka;
  - type: note
    content: 'Na: tahaka ny fahafatin’ny moka.'
  - type: text
    content: Fa ny famonjeko kosa haharitra mandrakizay,
  - type: text
    content: Ary ny fahamarinako tsy mba ho rava.
  '7':
  - type: text
    content: Mihainoa Ahy, hianareo izay mahalala ny fahamarinana,
  - type: text
    content: Dia hianao, ry firenena izay manana ny lalàko ao am-ponao;
  - type: text
    content: Aza matahotra ny latsa ataon’ny zanak’olombelona,
  - type: text
    content: Na manahy noho ny fanaratsiany.
  '8':
  - type: text
    content: Fa ny kalalao hihinana azy tahaka ny fihinan-damba,
  - type: text
    content: Ary ny lolofotsy hihinana azy tahaka ny fihinam-bolon’ondry;
  - type: text
    content: Fa ny fahamarinako haharitra mandrakizay,
  - type: text
    content: Ary ny famonjeko hihatra amin’ny taranaka fara mandimby.
  '9':
  - type: text
    content: Mifohaza, mifohaza, ry sandrin’i Jehovah, mitafia hery!
  - type: text
    content: Mifohaza tahaka ny tamin’ny andro fahiny!
  - type: text
    content: Dia tamin’ny taranaka lasa ela.
  - type: text
    content: Tsy Hianao va Ilay nitetitetika an-dRahaba sy nitomboka ny dragona
  - type: note
    content: 'Na: mamba; izahao Ezek. xxix.3.'
  - type: text
    content: '?'
