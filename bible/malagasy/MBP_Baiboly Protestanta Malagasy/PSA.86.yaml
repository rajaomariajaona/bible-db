document_id: PSA.86,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka nataon’ny mpanompon’Andriamanitra, fony nenjehin’ny mpirehareha izy.
  - type: text
    content: Fivavak’i Davida.
  - type: text
    content: ATONGILANO ny sofinao, Jehovah ô, ka valio aho,
  - type: text
    content: Fa ory sy malahelo.
  '10':
  - type: text
    content: Fa lehibe Hianao ka manao zava-mahagaga;
  - type: text
    content: Hianao irery ihany no Andriamanitra.
  '11':
  - type: text
    content: Ampianaro ny làlanao aho, Jehovah ô,
  - type: text
    content: Dia handeha amin’ny fahamarinanao aho;
  - type: text
    content: Ampiraiso ny foko hatahotra ny anaranao.
  '12':
  - type: text
    content: Hidera Anao amin’ny foko rehetra aho, Andriamanitro Tompo ô;
  - type: text
    content: Hanome voninahitra ny anaranao mandrakizay aho.
  '13':
  - type: text
    content: Fa lehibe ny famindramponao amiko;
  - type: text
    content: Ary efa novonjenao ny fanahiko tsy ho any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ambany indrindra.'
  '14':
  - type: text
    content: Andriamanitra ô, ny mpirehareha mitsangana hanohitra ahy,
  - type: text
    content: Ary ny antokon’ny lozabe mitady ny aiko;
  - type: text
    content: Ary tsy mba heveriny fa eo anatrehany Hianao.
  '15':
  - type: text
    content: Fa Hianao, Tompo ô, dia Andriamanitra mamindra fo sy miantra,
  - type: text
    content: Mahari-po sady be famindrampo sy fahamarinana.
  '16':
  - type: text
    content: Todiho aho ka amindrao fo;
  - type: text
    content: Omeo ny herinao ny mpanomponao,
  - type: text
    content: Ary vonjeo ny zanaky ny ankizivavinao.
  '17':
  - type: text
    content: Anehoy famantarana ny ho soa aho,
  - type: text
    content: Mba ho hitan’izay mankahala ahy, ka ho menatra izy;
  - type: text
    content: Fa Hianao, Jehovah ô, no namonjy sy nampionona ahy.
  '2':
  - type: text
    content: Arovy ny fanahiko, fa masina aho;
  - type: text
    content: Andriamanitro ô, vonjeo ny mpanomponao,
  - type: text
    content: Izay matoky Anao.
  '3':
  - type: text
    content: Tompo ô, mamindrà fo amiko;
  - type: text
    content: Fa Hianao no itarainako mandrakariva.
  '4':
  - type: text
    content: Ampifalio ny fanahin’ny mpanomponao;
  - type: text
    content: Fa Hianao, Tompo ô, no ananganako ny fanahiko.
  '5':
  - type: text
    content: Fa Hianao, Tompo ô, no tsara sady mamela heloka
  - type: text
    content: Ary be famindrampo amin’izay rehetra miantso Anao.
  '6':
  - type: text
    content: Mandrenesa ny fivavako, Jehovah ô,
  - type: text
    content: Ary henoy ny feon’ny fifonako.
  '7':
  - type: text
    content: Amin’ny andro fahoriako dia miantso Anao aho,
  - type: text
    content: Fa mamaly ahy Hianao.
  '8':
  - type: text
    content: Tsy misy tahaka Anao, Tompo ô, amin’ireo andriamanitra;
  - type: text
    content: Ary tsy misy tahaka ny asanao.
  '9':
  - type: text
    content: Ny firenena rehetra nataonao dia ho avy hiankohoka eo anatrehanao, Tompo ô,
  - type: text
    content: Ka hanome voninahitra ny anaranao.
