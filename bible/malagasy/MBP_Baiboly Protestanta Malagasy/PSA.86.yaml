document_id: PSA.86,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Vavaka nataon’ny mpanompon’Andriamanitra, fony nenjehin’ny mpirehareha izy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fivavak’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ATONGILANO ny sofinao, Jehovah ô, ka valio aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ory sy malahelo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa lehibe Hianao ka manao zava-mahagaga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao irery ihany no Andriamanitra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ampianaro ny làlanao aho, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia handeha amin’ny fahamarinanao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampiraiso ny foko hatahotra ny anaranao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hidera Anao amin’ny foko rehetra aho, Andriamanitro Tompo ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanome voninahitra ny anaranao mandrakizay aho.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa lehibe ny famindramponao amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa novonjenao ny fanahiko tsy ho any amin’ny fiainan-tsi-hita
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '86.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheola.
      marker-yv: yv-n
    - type: text
      text: ' ambany indrindra.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Andriamanitra ô, ny mpirehareha mitsangana hanohitra ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny antokon’ny lozabe mitady ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mba heveriny fa eo anatrehany Hianao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa Hianao, Tompo ô, dia Andriamanitra mamindra fo sy miantra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahari-po sady be famindrampo sy fahamarinana.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Todiho aho ka amindrao fo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo ny herinao ny mpanomponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary vonjeo ny zanaky ny ankizivavinao.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Anehoy famantarana ny ho soa aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ho hitan’izay mankahala ahy, ka ho menatra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao, Jehovah ô, no namonjy sy nampionona ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Arovy ny fanahiko, fa masina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro ô, vonjeo ny mpanomponao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay matoky Anao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tompo ô, mamindrà fo amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no itarainako mandrakariva.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ampifalio ny fanahin’ny mpanomponao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao, Tompo ô, no ananganako ny fanahiko.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa Hianao, Tompo ô, no tsara sady mamela heloka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary be famindrampo amin’izay rehetra miantso Anao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mandrenesa ny fivavako, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary henoy ny feon’ny fifonako.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Amin’ny andro fahoriako dia miantso Anao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mamaly ahy Hianao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tsy misy tahaka Anao, Tompo ô, amin’ireo andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy tahaka ny asanao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny firenena rehetra nataonao dia ho avy hiankohoka eo anatrehanao, Tompo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanome voninahitra ny anaranao.
