document_id: ISA.56,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra ny amin’ny fitanana ny marina sy ny fitandremana ny Sabata, ary toky ho an’ny proselyta sy ny ionoka.
  - type: text
    content: 'IZAO no lazain’i Jehovah:'
  - type: text
    content: Tandremo ny rariny, ary manaova ny marina,
  - type: text
    content: Fa efa madiva ho tonga ny famonjeko,
  - type: text
    content: Ary efa hiseho ny fahamarinako.
  '10':
  - type: text
    content: Jamba ny mpitiliny, samy tsy mahalala izy rehetra,
  - type: text
    content: Amboa moana avokoa, izy rehetra, ka tsy mahavòvò,
  - type: text
    content: Manonofy izy, eny, mandry ka tia torimaso.
  '11':
  - type: text
    content: Lian-kanina ireny amboa ireny ka tsy mahalala voky,
  - type: text
    content: Sady mpiandry tsy mahafantatra ireny;
  - type: text
    content: Samy efa nivily ho amin’ny làlany avy izy rehetra,
  - type: text
    content: Samy mankamin’ny filàny harena avokoa izy rehetra.
  '12':
  - type: text
    content: 'Avia, hianareo, '
  - type: text
    content: hoy ireny
  - type: text
    content: ', fa haka divay aho,'
  - type: text
    content: Ary aoka hiboboka toaka isika;
  - type: text
    content: Ary rahampitso dia ho tahaka ny anio ihany,
  - type: text
    content: Eny, hanoatra lavitra aza
  '2':
  - type: text
    content: Sambatra ny zanak’olombelona izay manao izany,
  - type: text
    content: Ary ny zanak’olona izay mitana izany,
  - type: text
    content: Dia izay mitandrina ny Sabata ka tsy manao azy ho tsy masina
  - type: text
    content: Sady miaro ny tànany tsy hanao izay ratsy akory.
  '3':
  - type: text
    content: 'Ary aoka ny hafa firenena izay efa manaiky ho an’i Jehovah tsy hanao hoe:'
  - type: text
    content: Hesorin’i Jehovah tsy ho isan’ny olony tokoa aho;
  - type: text
    content: 'Ary aoka ny ionoka tsy hanao hoe:'
  - type: text
    content: Indro, hazo maina aho.
  '4':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Ny amin’ny ionoka izay mitandrina ny Sabatako
  - type: text
    content: Sy mifidy izay sitrako
  - type: text
    content: Ary mitana ny fanekeko,
  '5':
  - type: text
    content: Dia hanaovako fahatsiarovana sy anarana ao an-tranoko sy ao anatin’ny màndako izy,
  - type: text
    content: Izay tsara lavitra noho ny an’ny zanakalahy sy ny zanakavavy;
  - type: text
    content: Dia anarana mandrakizay izay tsy hesorina no homeko azy.
  '6':
  - type: text
    content: Ary ny hafa firenena izay efa manaiky ho an’i Jehovah mba hanompo Azy
  - type: text
    content: Sy ho tia ny anaran’i Jehovah mba ho mpanompony–
  - type: text
    content: Dia izay rehetra mitandrina ny Sabata ka tsy manao azy ho tsy masina
  - type: text
    content: Sady mitana ny fanekeko–
  '7':
  - type: text
    content: Dia ho entiko ho any an-tendrombohitro masina,
  - type: text
    content: Ka hampifaliko ao an-tranoko fivavahana;
  - type: text
    content: Ny fanatitra dorany sy ny fanatitra hafa alatsa-dra dia hankasitrahana eo ambonin’ny alitarako,
  - type: text
    content: Fa ny tranoko hatao hoe
  - type: text
    content: Trano fivavahana ho an’ny firenena rehetra.
  '8':
  - type: text
    content: Izao no lazain’i Jehovah Tompo,
  - type: text
    content: 'Izay mamory ny Isiraely voaroaka:'
  - type: text
    content: Mbola hamory ny sasany koa ho eo aminy Aho,
  - type: text
    content: Hanampy izay efa voavory eo aminy.
  - type: heading
    content: Ny nahadiso ny lehiben’ny Isiraely, sy ny nataon’ny olona koa.
  '9':
  - type: text
    content: HE, hianareo bibi-dia rehetra!
  - type: text
    content: Avia hihinana, hianareo biby rehetra any an-ala.
  - type: note
    content: 'Na: He, hianareo bibi-dia rehetra, Avia hihinana ny biy rehetra any an-ala.'
