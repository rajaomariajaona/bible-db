document_id: ISA.56
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Anatra ny amin’ny fitanana ny marina sy ny fitandremana ny Sabata, ary toky ho an’ny proselyta sy ny ionoka.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandremo ny rariny, ary manaova ny marina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa madiva ho tonga ny famonjeko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa hiseho ny fahamarinako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sambatra ny zanak’olombelona izay manao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanak’olona izay mitana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay mitandrina ny Sabata ka tsy manao azy ho tsy masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady miaro ny tànany tsy hanao izay ratsy akory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary aoka ny hafa firenena izay efa manaiky ho an’i Jehovah tsy hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hesorin’i Jehovah tsy ho isan’ny olony tokoa aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary aoka ny ionoka tsy hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hazo maina aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny amin’ny ionoka izay mitandrina ny Sabatako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mifidy izay sitrako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitana ny fanekeko,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hanaovako fahatsiarovana sy anarana ao an-tranoko sy ao anatin’ny màndako izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsara lavitra noho ny an’ny zanakalahy sy ny zanakavavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia anarana mandrakizay izay tsy hesorina no homeko azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny hafa firenena izay efa manaiky ho an’i Jehovah mba hanompo Azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho tia ny anaran’i Jehovah mba ho mpanompony–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay rehetra mitandrina ny Sabata ka tsy manao azy ho tsy masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mitana ny fanekeko–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia ho entiko ho any an-tendrombohitro masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampifaliko ao an-tranoko fivavahana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanatitra dorany sy ny fanatitra hafa alatsa-dra dia hankasitrahana eo ambonin’ny alitarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tranoko hatao hoe
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trano fivavahana ho an’ny firenena rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izao no lazain’i Jehovah Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay mamory ny Isiraely voaroaka:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola hamory ny sasany koa ho eo aminy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanampy izay efa voavory eo aminy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahadiso ny lehiben’ny Isiraely, sy ny nataon’ny olona koa.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: HE, hianareo bibi-dia rehetra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avia hihinana, hianareo biby rehetra any an-ala.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '56.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: He, hianareo bibi-dia rehetra, Avia hihinana ny biy rehetra any an-ala.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jamba ny mpitiliny, samy tsy mahalala izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amboa moana avokoa, izy rehetra, ka tsy mahavòvò,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manonofy izy, eny, mandry ka tia torimaso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lian-kanina ireny amboa ireny ka tsy mahalala voky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mpiandry tsy mahafantatra ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy efa nivily ho amin’ny làlany avy izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy mankamin’ny filàny harena avokoa izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avia, hianareo, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy ireny
  - type: text
    text: ', fa haka divay aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hiboboka toaka isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rahampitso dia ho tahaka ny anio ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hanoatra lavitra aza
