document_id: JER.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mahatsinontsinona ny sampy, ary ny fampisehoana ny voninahitr’i Jehovah sy ny fahatezerany.
  - type: text
    content: HENOY ny teny izay lazain’i Jehovah aminareo, ry taranak’Isiraely!
  '10':
  - type: text
    content: Fa Jehovah no Andriamanitra tokoa,
  - type: text
    content: Eny, Izy no Andriamanitra velona sy Mpanjaka mandrakizay,
  - type: text
    content: Izay mampihorohoro ny tany amin’ny fahatezerany,
  - type: text
    content: Ka tsy tantin’ny firenena ny fahavinirany–
  '11':
  - type: text
    content: '(Izao no holazainareo amin’ireny:'
  - type: text
    content: Ny amin’ny andriamanitra izay tsy mba nanao ny lanitra sy ny tany,
  - type: text
    content: Dia ho levona tsy ho amin’ny tany na ho atỳ ambanin’ny lanitra ireny)–
  '12':
  - type: text
    content: Dia Ilay nanao ny tany tamin’ny heriny
  - type: text
    content: Sy nampiorina izao tontolo izao tamin’ny fahendreny
  - type: text
    content: Ary namelatra ny lanitra tamin’ny fisainany.
  '13':
  - type: text
    content: Raha mampirohondrohona ny rano any an-danitra Izy,
  - type: text
    content: Dia mampiakatra fofona avy any amin’ny faran’ny tany;
  - type: text
    content: Manao ny helatra ho amin’ny ranonorana Izy
  - type: text
    content: Sady mamoaka ny rivotra avy amin’ny firaketany.
  '14':
  - type: text
    content: Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana;
  - type: text
    content: Menarina noho ny sarin-javatra voasokitra ny mpanefy volamena rehetra;
  - type: text
    content: Fa fitaka ny sarin-javatra an-idina,
  - type: text
    content: Sady tsy misy fofon’aina ao aminy.
  '15':
  - type: text
    content: Zava-poana ireny, dia asa mahatsikaiky foana;
  - type: text
    content: Amin’ny andro hamaliana azy dia ho levona izy.
  '16':
  - type: text
    content: Tsy mba tahaka ireo ny Anjaran’i Jakoba;
  - type: text
    content: Fa Mpamorona ny zavatra rehetra Izy;
  - type: text
    content: Ary ny Isiraely no firenena lovany;
  - type: text
    content: Jehovah, Tompon’ny maro, no anarany.
  '17':
  - type: text
    content: Angony ny korontan’entanao, ka ento hiala amin’ny tany,
  - type: text
    content: Ry ilay mipetraka ao amin’ny haterena!
  '18':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Indro, hatorako ho indray misidina toy ny vaton’antsamotady ny mponina amin’ny tany,
  - type: text
    content: Ary hataoko tery izy mba hahitany.
  '19':
  - type: text
    content: Mahita loza aho, fa torotoro!
  - type: text
    content: Tsy azo sitranina ny feriko;
  - type: text
    content: 'Nefa hoy izaho: Anjara-fahoriako izao, ka dia hozakaiko ihany.'
  '2':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Aza mianatra ny fanaon’
  - type: note
    content: Heb. didin’.
  - type: text
    content: ' ny jentilisa;'
  - type: text
    content: Ary aza matahotra ireo famantarana eny amin’ny lanitra;
  - type: text
    content: Fa ny jentilisa no matahotra izany.
  '20':
  - type: text
    content: Rava ny laiko,
  - type: text
    content: Ary tapaka avokoa ny kofehin-daiko;
  - type: text
    content: Lasa ny zanako, ka tsy misy intsony,
  - type: text
    content: Eny, tsy misy hamelatra ny laiko intsony
  - type: text
    content: Na hanantona ny ambain-daiko.
  '21':
  - type: text
    content: Fa efa ketrina ny mpiandry ondry
  - type: text
    content: Ka tsy mitady an’i Jehovah;
  - type: text
    content: Izany no tsy mahahendry azy,
  - type: text
    content: Ka dia miely ny ondry andrasany rehetra.
  '22':
  - type: text
    content: 'Injany! misy siosion-teny hoe: Indro, tamy izy'
  - type: text
    content: Amin’ny fihorakorahana be avy any amin’ny tany avaratra
  - type: text
    content: Mba hahatonga ny tanànan’ny Joda ho lao
  - type: text
    content: Sy ho fonenan’ny amboadia.
  - type: note
    content: 'Na: jakala.'
  '23':
  - type: text
    content: Jehovah ô, fantatro fa tsy an’ny olombelona ny làlan-kalehany,
  - type: text
    content: Na an’ny mpandeha ny hahalavorary ny diany.
  '24':
  - type: text
    content: Jehovah ô, anaro aho, nefa araka ny antonony ihany,
  - type: text
    content: Fa tsy amin’ny fahatezeranao, fandrao hataonao tonga tsinontsinona aho.
  '25':
  - type: text
    content: Aidino amin’ny jentilisa izay tsy mahalala Anao ny fahatezeranao,
  - type: text
    content: Dia amin’ny taranaka izay tsy miantso ny anaranao;
  - type: text
    content: Fa efa nihinana an’i Jakoba ireo,
  - type: text
    content: Eny, nihinana sy nahalevona azy–
  - type: text
    content: Ary nahalao ny fonenany.
  '3':
  - type: text
    content: Fa ny fanaon’ny firenena dia zava-poana;
  - type: text
    content: Fa hazo nokapaina tany an-ala ireny,
  - type: text
    content: Dia asan-tànan’ny mpiasa amin’ny famaky;
  '4':
  - type: text
    content: Volafotsy sy volamena no an-dravahany azy,
  - type: text
    content: Ary hombo sy tantanana no entiny manamafy azy,
  - type: text
    content: Mba tsy hihetsiketsehany.
  '5':
  - type: text
    content: Toy ny hazo voasana ho sari-drofia
  - type: note
    content: palma.
  - type: text
    content: ' izy,'
  - type: text
    content: Fa tsy mahateny;
  - type: text
    content: Ary entina ihany izy, fa tsy mba afa-mandeha;
  - type: text
    content: Aza matahotra azy, fa tsy mahatonga loza izy
  - type: text
    content: Sady tsy mahay manisy soa.
  '6':
  - type: text
    content: Tsy misy tokoa izay tahaka Anao, Jehovah ô;
  - type: text
    content: Lehibe Hianao, ary lehibe amin’ny hery ny anaranao.
  '7':
  - type: text
    content: Iza no tsy hatahotra Anao, ry Mpanjakan’ny firenena!
  - type: text
    content: Fa Hianao no iendrehan’izany,
  - type: text
    content: Eny, amin’ny hendry rehetra amin’ny firenena
  - type: text
    content: Sy amin’ny fanjakany rehetra dia tsy misy tahaka Anao.
  '8':
  - type: text
    content: Fa ketrina sy adala avokoa izy rehetra;
  - type: text
    content: He! fananaram-poana! fa tapakazo ihany.
  '9':
  - type: text
    content: Volafotsy voafisaka nalaina avy tany Tarsisy
  - type: text
    content: Sy volamena avy tany Ofaza izany,
  - type: text
    content: Asan-tànan’ny mpiasa sy ny mpanefy volamena;
  - type: text
    content: Lamba manga sy volomparasy ny fitafiany;
  - type: text
    content: Asan’ny mahay zavatra izy rehetra.
