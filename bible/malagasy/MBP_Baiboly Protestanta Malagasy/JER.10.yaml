document_id: JER.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny mahatsinontsinona ny sampy, ary ny fampisehoana ny voninahitr’i Jehovah sy ny fahatezerany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: HENOY ny teny izay lazain’i Jehovah aminareo, ry taranak’Isiraely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mianatra ny fanaon’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: didin’.
    marker-yv: yv-n
  - type: text
    text: ' ny jentilisa;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza matahotra ireo famantarana eny amin’ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny jentilisa no matahotra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny fanaon’ny firenena dia zava-poana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hazo nokapaina tany an-ala ireny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia asan-tànan’ny mpiasa amin’ny famaky;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Volafotsy sy volamena no an-dravahany azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hombo sy tantanana no entiny manamafy azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy hihetsiketsehany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny hazo voasana ho sari-drofia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: palma.
    marker-yv: yv-n
  - type: text
    text: ' izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy mahateny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary entina ihany izy, fa tsy mba afa-mandeha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza matahotra azy, fa tsy mahatonga loza izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy mahay manisy soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy misy tokoa izay tahaka Anao, Jehovah ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lehibe Hianao, ary lehibe amin’ny hery ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Iza no tsy hatahotra Anao, ry Mpanjakan’ny firenena!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Hianao no iendrehan’izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, amin’ny hendry rehetra amin’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny fanjakany rehetra dia tsy misy tahaka Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ketrina sy adala avokoa izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He! fananaram-poana! fa tapakazo ihany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Volafotsy voafisaka nalaina avy tany Tarsisy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy volamena avy tany Ofaza izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asan-tànan’ny mpiasa sy ny mpanefy volamena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lamba manga sy volomparasy ny fitafiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asan’ny mahay zavatra izy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa Jehovah no Andriamanitra tokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Izy no Andriamanitra velona sy Mpanjaka mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mampihorohoro ny tany amin’ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy tantin’ny firenena ny fahavinirany–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(Izao no holazainareo amin’ireny:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny amin’ny andriamanitra izay tsy mba nanao ny lanitra sy ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho levona tsy ho amin’ny tany na ho atỳ ambanin’ny lanitra ireny)–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia Ilay nanao ny tany tamin’ny heriny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy nampiorina izao tontolo izao tamin’ny fahendreny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary namelatra ny lanitra tamin’ny fisainany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha mampirohondrohona ny rano any an-danitra Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mampiakatra fofona avy any amin’ny faran’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao ny helatra ho amin’ny ranonorana Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mamoaka ny rivotra avy amin’ny firaketany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Menarina noho ny sarin-javatra voasokitra ny mpanefy volamena rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fitaka ny sarin-javatra an-idina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy misy fofon’aina ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zava-poana ireny, dia asa mahatsikaiky foana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny andro hamaliana azy dia ho levona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy mba tahaka ireo ny Anjaran’i Jakoba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Mpamorona ny zavatra rehetra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Isiraely no firenena lovany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah, Tompon’ny maro, no anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Angony ny korontan’entanao, ka ento hiala amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry ilay mipetraka ao amin’ny haterena!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hatorako ho indray misidina toy ny vaton’antsamotady ny mponina amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hataoko tery izy mba hahitany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mahita loza aho, fa torotoro!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy azo sitranina ny feriko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa hoy izaho: Anjara-fahoriako izao, ka dia hozakaiko ihany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rava ny laiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tapaka avokoa ny kofehin-daiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lasa ny zanako, ka tsy misy intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tsy misy hamelatra ny laiko intsony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hanantona ny ambain-daiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa efa ketrina ny mpiandry ondry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mitady an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no tsy mahahendry azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia miely ny ondry andrasany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Injany! misy siosion-teny hoe: Indro, tamy izy'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny fihorakorahana be avy any amin’ny tany avaratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hahatonga ny tanànan’ny Joda ho lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho fonenan’ny amboadia.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jakala.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jehovah ô, fantatro fa tsy an’ny olombelona ny làlan-kalehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na an’ny mpandeha ny hahalavorary ny diany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Jehovah ô, anaro aho, nefa araka ny antonony ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy amin’ny fahatezeranao, fandrao hataonao tonga tsinontsinona aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aidino amin’ny jentilisa izay tsy mahalala Anao ny fahatezeranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia amin’ny taranaka izay tsy miantso ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nihinana an’i Jakoba ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nihinana sy nahalevona azy–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nahalao ny fonenany.
