document_id: 2SA.24,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanisana ny olona, sy ny aretimbe nanjo azy tamin’izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY ny fahatezeran’i Jehovah nirehitra indray tamin’ny Isiraely, ka dia nanome saina an’i Davida Izy hanao izay hahatonga loza amin’ny vahoakany hoe: Mandehana, isao ny Isiraely sy ny Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny eritreritr’i Davida namely azy, rehefa voaisany ny olona. Ka dia hoy Davida tamin’i Jehovah: Efa nanota indrindra aho tamin’izao nataoko izao; koa ankehitriny, mifona aminao aho, Jehovah ô, esory ny heloky ny mpanomponao, fa efa nanao fahadalana lehibe aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary raha nifoha maraina Davida, dia tonga tamin’i Gada mpaminany, mpahitan’i Davida, ny tenin’i Jehovah nanao hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mandehana, ka lazao amin’i Davida hoe: Izao no lazain’i Jehovah: Zavatra telo no apetrako eto anoloanao, koa fidio izay iray hataoko aminao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary Gada nankany amin’i Davida dia nanambara izany taminy ka nanao hoe: Mosary fito taona va no tianao ho tonga aminao eto amin’ny taninao? Sa handositra telo volana eo anoloan’ny fahavalonao hianao, fa henjehiny? Sa areti-mandringana hateloana eto amin’ny taninao? Koa saino sy hevero izay valiny ho entiko miverina any amin’Izay naniraka ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy Davida tamin’i Gada: Indrisy! poritra loatra aho! aleontsika ho azon’ny tànan’i Jehovah, –fa lehibe ny famindrampony– toy izay ho azon’izay tànan’olona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ka dia nasian’i Jehovah areti-mandringana ny Isiraely nony maraina ka hatramin’ilay fotoana; ary dia nahafatesana fito alina ny olona hatrany Dana ka hatrany Beri-sheba. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary naninjitra ny tànany tany Jerosalema Ilay Anjely handringana ny any; fa Jehovah nanenina ny amin’ny loza ka nanao tamin’Ilay Anjely Izay nandringana ny olona hoe: Aoka izay, atsaharo ny tànanao ankehitriny. Ary Ilay Anjelin’i Jehovah dia teo amin’ny famoloan’i Araona Jebosita. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nony hitan’i Davida Ilay Anjely namely ny olona, dia niteny tamin’i Jehovah izy nanao hoe: Indro, izaho no efa nanota, ary izaho no efa nanao ratsy; fa ireo ondry ireo kosa, inona moa no mba nataony? Koa mifona aminao re aho, aoka ny tànanao hamely ahy sy ny mpianakavin’ny raiko.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary Gada nankany amin’i Davida tamin’izany andro izany ka nanao taminy hoe: Miakara, ka manangàna alitara ho an’i Jehovah ao amin’ny famoloan’i Araona Jebosita. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa dia niakatra Davida araka ny tenin’i Gada, araka izay nandidian’i Jehovah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hoy ny mpanjaka tamin’i Joaba, komandin’ny miaramila, izay teo aminy: Mandehana mitety ny firenen’Isiraely rehetra hatrany Dana ka hatrany Beri-sheba, ary alaminonareo ny vahoaka mba ho fantatro ny isany.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Araona nitsirika ka nahita ny mpanjaka sy ny mpanompony manatona azy, dia nivoaka izy ka niankohoka tamin’ny tany teo anatrehan’ny mpanjaka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy Araona: Ahoana no ahatongavan’ny mpanjaka tompoko atỳ amin’ny mpanompony? Dia hoy Davida: Hividy ny famoloana aminao mba hanorenako alitara ho an’i Jehovah hitsaharan’ny areti-mandringana tsy hamely ny olona intsony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa hoy Araona tamin’i Davida: Aoka ny mpanjaka tompoko haka izay sitrany ka hanatitra izany. Indreo ny omby ho fanatitra dorana ary ny fivelezam-bary sy ny hazo amin’ny omby hatao kitay. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izany rehetra izany, ry mpanjaka, dia omen’i Araona ny mpanjaka. Ary hoy Araona tamin’ny mpanjaka: Jehovah Andriamanitrao anie hankasitraka anao.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Araona: Tsia, fa hovidiko aminao mihitsy araka izay tokom-bidiny ireo; fa tsy hanatitra fanatitra dorana ho an’i Jehovah Andriamanitro amin’izay azoko fotsiny aho. Ka dia novidin’i Davida sekely volafotsy dimam-polo ny famoloana sy ny omby. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary Davida nanao alitara teo ho an’i Jehovah ka nanatitra fanatitra dorana sy fanati-pihavanana. Ka dia neken’i Jehovah ny fifonana natao ho an’ny tany, ka nitsahatra tsy namely ny Isiraely intsony ilay areti-mandringana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa hoy Joaba tamin’ny mpanjaka: Jehovah Andriamanitrao anie hampi-tombo ny vahoaka ho injato toy izao, na firy na firy izy, ka ho hitan’ny mason’ny mpanjaka tompoko izany; fa ahoana no itiavan’ny mpanjaka tompoko hanao izany zavatra izany?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nefa tsy azon’i Joaba sy ny komandin’ny miaramila nolavina ny tenin’ny mpanjaka. Ary Joaba sy ny komandin’ny miaramila nivoaka avy teo anatrehan’ny mpanjaka handamina ny lehilahy amin’ny Isiraely. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nita an’i Jordana izy ireo ka nitoby tao Aroera eo ankavanan’ilay tanàna afovoan’ny lohasahan-driak’i Gada, dia nankany Jazera. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dia tonga tany Gileada izy, tany amin’ny tanin’i Tatima-hodsy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tany amin’ny tany lemaka vao azo.
      marker-yv: yv-n
    - type: text
      text: ' dia tonga tany Dana-jana izy, ka nanodidina hatrany Sidona, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ary tonga tao Tyro, tanàna mimanda, sy tany amin’ny tanànan’ny Hivita sy ny Kananita rehetra, ary dia nankany amin’ny tany atsimo izay an’ny Joda hatrany Beri-sheba izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nony efa nitety ny tany rehetra izy, dia tonga tany Jeroselama, rehefa afaka sivy volana sy roa-polo andro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia natolotr’i Joaba ny mpanjaka ny isan’ny vahoaka voalamina, ka nisy valo hetsy ny lehilahy mahery nahatan-tsabatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpanatsoaka sabatra.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny Isiraely, ary dimy hetsy ny lehilahy tamin’ny Joda.'
