document_id: NEH.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fivorian’ny olona rehetra hanetry tena noho ny fahotany sy hanao fanekena hanaraka ny lalàn’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY tamin’ny andro fahefatra amby roa-polo tamin’izany volana izany dia niangona ny Zanak’Isiraely, sady nifady hanina no samy nitafy lamba fisaonana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Heb.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lamba malailay.
    marker-yv: yv-n
  - type: text
    text: ' sy nihosin-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niavaka tamin’ny olona hafa firenena rehetra ny taranak’Isiraely ary nitsangana ka niaiky ny fahotany sy ny heloky ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nitsangana teo amin’ny fitoerany avy izy, dia namaky ny teny tao amin’ny bokin’ny lalàn’i Jehovah Andriamaniny tamin’ny ampahefatry ny andro; ary tamin’ny ampahefatry ny andro koa dia nitsotra sy niankohoka teo anatrehan’i Jehovah Andriamaniny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Jesoa sy Bany sy Kadmiela sy Sebania sy Bony sy Serebia sy Bany ary Kenany dia nitsangana teo ambonin’ny lampihazon’ny Levita ka nitaraina mafy tamin’i Jehovah Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy ny Levita, dia Jesoa sy Kadmiela sy Bany sy Hasabnia sy Serebia sy Hodia sy Sebania ary Petahia: Mitsangàna, ka misaora an’i Jehovah Andriamanitrareo mandrakizay mandrakizay. Ary isaorana anie ny anaranao malaza, izay voasandratra ambonin’ny fisaorana sy ny fiderana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hianao dia Hianao irery ihany no Jehovah; Hianao no nanao ny lanitra, dia ny lanitry ny lanitra, mbamin’izay rehetra any aminy, ny tany sy izay rehetra eo aminy, ny ranomasina sy izay rehetra ao aminy, ary Hianao no mamelona azy rehetra; ary ireo maro any an-danitra samy miankohoka eo anatrehanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hianao no Jehovah Andriamanitra, Izay nifidy an’i Abrama ka nitondra azy nivoaka avy tany Oran’ny Kaldeana sady nanao ny anarany hoe Abrahama; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary Hianao nahita ny fony fa nahatoky teo anatrehanao, ka dia nanao ilay fanekena taminy hanome ny tanin’ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Jebosita ary ny Girgasita ho an’ny taranany; ary efa nahatanteraka ny teninao Hianao, satria marina Hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nahita ny fahorian’ny razanay tany Egypta koa Hianao sady nandre ny fitarainany teo amoron’ny Ranomasina Mena, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia nanao famantarana sy fahagagana tamin’i Farao sy ny mpanompony rehetra sy tamin’ny olona rehetra tany amin’ny taniny Hianao; fa fantatrao fa nirehareha taminy ireo; dia nanao anarana ho Anao Hianao tahaka ny amin’izao anio izao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny ranomasina dia nosarahinao teo anoloany, ka nandeha namaky teo afovoan’ny ranomasina nandia ny tany maina izy; ary ireo nanenjika azy dia natsipinao hilentika amin’ny lalina tahaka ny vato amin’ny rano manonja. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Andri-rahona no nitondranao azy raha antoandro, ary andri-afo nony alina, mba hampahazava azy hahitany izay làlana tokony halehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Efa nidina tao ambonin’ny tendrombohitra Sinay Hianao, dia niteny taminy tany an-danitra ka nanome azy fitsipika mahitsy sy lalàna marina ary fomba sy didy tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nampahalala azy ny Sabatanao masina Hianao, ary Mosesy mpanomponao nampilazainao didy sy fomba ary lalàna taminy; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary mofo avy tany an-danitra no nomenao azy, raha noana izy; ary rano avy tamin’ny vatolampy no navoakanao hosotroiny, raha nangetaheta izy; ary nilaza taminy Hianao fa hiditra ka handova ny tany izay nanangananao tànana homena azy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa niavonavona ireny razanay ireny, dia nanamafy ny hatony ka tsy nihaino ny didinao, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary nandà tsy nety nanaraka izany izy sady tsy nahatsiaro ny fahagagana izay nataonao teo aminy; fa nanamafy ny hatony izy ka niodina, dia nanendry mpitarika mba hiverenany ho any amin’ny fahandevozany; fa Andriamanitry ny famelan-keloka Hianao ka miantra sy mamindra fo, mahari-po sady be famindrampo, ka dia tsy nahafoy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Eny, nanao ilay ombilahy kely an-idina izy ka nanao hoe: Io no andriamanitrao izay nitondra anao hiakatra avy tany Egypta, dia nampahasosotra indrindra izy; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: kanefa noho ny haben’ny famindramponao dia tsy mba nahafoy azy tany an-efitra Hianao; ny andri-rahona, izay nitondra azy teny an-dàlana, dia tsy niala taminy raha antoandro, na ny andri-afo, izay nampahazava azy nony alina, hahitany izay làlana tokony halehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny Fanahinao tsara dia nomenao azy koa hampianatra azy, ary tsy niaro ny mananao tamin’ny vavany Hianao sady nanome azy rano, raha nangetaheta izy; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: eny, efa-polo taona no namelomanao azy tany an-efitra, ka tsy nanan-java-mahory akory izy; tsy rovitra ny fitafiany, ary tsy nivonto ny tongony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nanome azy fanjakana sy firenena maro Hianao, ka voazaranao araka ny fari-taniny avy ireny; ka dia nahazo ny tanin’i Sihona sy ny tanin’ny mpanjakan’i Hesbona ary ny tanin’i Oga, mpanjakan’i Basana, izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny zanany dia nohamaroinao ho tahaka ny kintana eny amin’ny lanitra, sady nentinao ho amin’ny tany izay nolazainao tamin’ny razany fa hidirany holovana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niditra ny zanany ka nandova ny tany, ary nampietrenao teo anoloany ny Kananita tompon-tany, dia natolotrao ho eo an-tànany ireo mbamin’ny mpanjakany sy ny vahoakany hanaovany azy araka ny sitrapony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nahazo tanàna mimànda sy tany lonaka izy ary trano feno zava-tsoa rehetra sy lavaka famorian-drano voahady sy tany voavoly voaloboka sy oliva ary hazo fihinam-boa betsaka; dia nihinana izy ka voky ary nihanatavy ka nifalifaly tamin’ny fahatsaranao lehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Kanefa nandà izy sady niodina taminao ary nanary ny lalànao teo ivohony, dia namono ny mpaminaninao, izay nananatra azy mafy hampiverenana azy ho aminao, ka nanao izay nampahasosotra indrindra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa dia natolotrao ho eo an-tànan’ny fahavalony izy, ka nampahory azy ireny; nefa tamin’ny andro fahoriany dia nitaraina taminao izy, ka nihaino azy tany an-danitra Hianao, ary araka ny haben’ny fiantranao dia nomenao mpamonjy izy, ka namonjy azy tamin’ny tànan’ny fahavalony ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Kanjo rehefa niadana izy, dia nanao ratsy teo anatrehanao indray; dia nafoinao ho eo an-tànan’ny fahavalony kosa izy, ka nanapaka azy ireny; fa nitaraina taminao indray izy, ary Hianao nihaino azy tany an-danitra ka namonjy azy matetika araka ny haben’ny fiantranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nananatra azy mafy Hianao hampiverenanao azy ho amin’ny lalànao; kanefa mbola niavonavona ihany izy ka tsy nihaino ny didinao, fa nanota ny fitsipikao (izay mahavelona ny olona mankatò azy) ka nampihemotra ny sorony sy nanamafy ny hatony ary tsy nety nihaino. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nefa nandefitra taona maro taminy Hianao, ary ny Fanahinao, Izay tao amin’ny mpaminaninao, no nentinao nananatra azy mafy; fa tsy nety hinaino ihany izy, ka dia natolotrao ho eo an-tanàn’ny firenena amin’ny tany hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nefa noho ny haben’ny fiantranao dia tsy navelanao ho lany ringana izy ary tsy nafoinao, satria Andriamanitra mamindra fo sy miantra Hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa ankehitriny, ry Andriamanitray ô, Andriamanitra lehibe sady mahery no mahatahotra, Izay mitandrina ny fanekenao sy ny famindramponao, aoka tsy ho kely eo imasonao ny fahoriana rehetra izay nanjo anay, dia ny mpanjakanay sy ny mpanapaka anay sy ny mpisoronay sy ny mpaminaninay ary ny razanay, dia ny olonao rehetra, hatramin’ny andron’ireo mpanjakan’i Asyria ka mandraka andro-any. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hianao no marina tamin’izay rehetra nanjo anay, fa marina ny nataonao; fa izahay no nanao ratsy; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ary ny mpanjakanay sy ny mpanapaka anay sy ny mpisoronay ary ny razanay dia samy tsy nankatò ny lalànao, na nihaino ny didinao sy ny teni-vavolombelonao, izay nananaranao azy mafy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa tsy nanompo Anao teo amin’ny fanjakany izy sy teo amin’ny haben’ny zava-tsoa nomenao azy ary teo amin’ny tany malalaka sy lonaka izay nomenao ho eo anoloany, sady tsy niala tamin’ny ratsy fanaony izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Koa, indreto, andevo izahay izao, ary ny amin’ny tany izay nomenao ny razanay hihinanany ny vokatra sy ny soa avy aminy, indreto, andevo eto izahay; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ary mahavokatra be izy, kanefa ho an’ireo mpanjaka izay notendrenao hanapaka anay noho ny fahotanay ihany izany; eny, manapaka ny tenanay sy ny biby fiompinay araka ny sitrapony izy, ka ozoim-pahoriana mafy izahay.
