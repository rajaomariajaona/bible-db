document_id: ISA.41,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahalehibiazan’i Jehovah, izay miseho amin’ny fitondrany ny firenena sy ny fiarovany ny Isiraely, ary ny fanambarany rahateo ny zavatra mbola ho avy.
  - type: text
    content: MANGÌNA hihaino Ahy hianareo, ry nosy,
  - type: text
    content: Ary aoka handroso hery ny firenena;
  - type: text
    content: Aoka hanatona izy, ka dia hiteny;
  - type: text
    content: Andeha isika hifanatona eo amin’ny fitsarana.
  '10':
  - type: text
    content: Aza matahotra hianao, fa momba anao Aho;
  - type: text
    content: Ary aza miherikerika foana, fa Izaho no Andriamanitrao;
  - type: text
    content: Mampahery anao Aho sady mamonjy anao;
  - type: text
    content: Eny, mitantana anao amin’ny tànana ankavanan’ny fahamarinako Aho.
  '11':
  - type: text
    content: Indro, ho menatra sy hangaihay izay rehetra tezitra aminao,
  - type: text
    content: Ho tsinontsinona izy;
  - type: text
    content: Eny, ho levona izay miady aminao.
  '12':
  - type: text
    content: Hotadiavinao izay mifanditra aminao, fa tsy ho hitanao,
  - type: text
    content: Ary ho tahaka ny tsinontsinona sy ny zava-poana izay miady aminao.
  '13':
  - type: text
    content: Fa Izaho Jehovah Andriamanitrao no mitantana ny tànanao ankavanana,
  - type: text
    content: 'Dia Ilay manao aminao hoe: Aza matahotra, Izaho no hamonjy anao.'
  '14':
  - type: text
    content: Aza matahotra hianao, ry Jakoba kankana,
  - type: text
    content: Dia hianareo, ry Isiraely olom-bitsy,
  - type: text
    content: Izaho no hamonjy anao, hoy Jehovah,
  - type: text
    content: Ary ny Iray Masin’ny Isiraely no Mpanavotra anao.
  '15':
  - type: text
    content: Indro, ataoko kodia vy vaovao misy nify maranitra hianao;
  - type: text
    content: Hively ny tendrombohitra hianao ka hanorotoro azy ho vovoka
  - type: text
    content: Ary hanao ny havoana ho tahaka ny akofa.
  '16':
  - type: text
    content: Hikororoka azy hianao, ka hopaohin’ny rivotra izy,
  - type: text
    content: Ary ny tafio-drivotra hanely azy;
  - type: text
    content: Fa hianao kosa dia hiravoravo amin’i Jehovah,
  - type: text
    content: Ary ny Iray Masin’ny Isiraely no ho reharehanao.
  '17':
  - type: text
    content: Ny ory sy ny malahelo mitady rano, fa tsy mahita,
  - type: text
    content: Ary ny lelany mainan’ny hetaheta;
  - type: text
    content: Izaho Jehovah no hihaino azy,
  - type: text
    content: Izaho, Andriamanitry ny Isiraely, tsy hahafoy azy;
  '18':
  - type: text
    content: Hampiboika renirano ao amin’ny tendrombohitra mangadihady Aho
  - type: text
    content: Ary loharano ao amin’ny lohasaha;
  - type: text
    content: Hanao ny efitra ho farihy Aho
  - type: text
    content: Ary ny tany karankaina no loharano miboiboika.
  '19':
  - type: text
    content: Hampaniry hazo sedera sy akasia sy rotra
  - type: note
    content: myrta.
  - type: text
    content: ' ary oliva'
  - type: note
    content: Heb. oliva maniry ho azy.
  - type: text
    content: ' any an-efitra Aho'
  - type: text
    content: Ary kypreso sy pina sy bokso eny an-tani-hay,
  '2':
  - type: text
    content: Iza no nanaitra avy any atsinanana
  - type: text
    content: Ilay nomban’ny fahamarinana tamin’ny diany rehetra,
  - type: note
    content: 'Na: nantsoin’ny fahamarinana hanaraka azy.'
  - type: text
    content: Ary nanolotra ny firenena ho eo anatrehany, ka nampanapahiny ireo mpanjaka izy?
  - type: text
    content: Iza no nanao ny sabany ho tahaka ny vovoka,
  - type: text
    content: Ary ny tsipìkany ho tahaka ny vodivary voapaoka?
  '20':
  - type: text
    content: Mba ho hitany sy ho fantany sy hoheveriny ary ho azony an-tsaina
  - type: text
    content: Fa ny tànan’i Jehovah no nanao izany,
  - type: text
    content: Ary ny Iray Masin’ny Isiraely no nahary izany.
  '21':
  - type: text
    content: Alaharo eto ny teninareo, hoy Jehovah;
  - type: text
    content: Asehoy izay mahamarina ny anareo,
  - type: note
    content: Heb. fiarovana mafy.
  - type: text
    content: ' hoy ny Mpanjakan’i Jakoba.'
  '22':
  - type: text
    content: Aoka hampanatoniny ka hasehony amintsika izay zavatra mbola ho avy;
  - type: text
    content: Ambarao izay zavatra taloha,
  - type: note
    content: Heb. zavatra voalohany
  - type: text
    content: Mba hoheverinay ka ho fantatray izay hiafarany,
  - type: text
    content: Na ilazao izay zavatra ho avy izahay.
  '23':
  - type: text
    content: Ambarao anay izay zavatra ho avy rahatrizay,
  - type: text
    content: Mba ho fantatray fa andriamanitra hianareo;
  - type: text
    content: Eny, manaova soa, na manaova ratsy,
  - type: text
    content: Mba hitaha isika, ka samy hahita.
  '24':
  - type: text
    content: Indro, hianareo dia naman’ny tsinontsinona,
  - type: text
    content: Ary ny asanareo dia naman’ny zava-poana;
  - type: text
    content: Vetaveta izay mifidy anareo.
  '25':
  - type: text
    content: Nanaitra ny anankiray avy tany avaratra Aho, ka tonga izy.
  - type: text
    content: Dia ny anankiray avy any amin’ny fiposahan’ny masoandro, izay hiantso ny anarako,
  - type: text
    content: Ary hanosihosy ny mpanapaka tahaka ny fanosihosy feta izy,
  - type: text
    content: Ary tahaka ny mpanefy vilany mihosy tanimanga.
  '26':
  - type: text
    content: Iza no nitory izany hatramin’ny voalohany, mba ho fantatray?
  - type: text
    content: 'Ary hatry ny fony taloha, mba hataonay hoe: Marina?'
  - type: text
    content: Tsy nisy nanambara,
  - type: text
    content: Eny, tsy nisy nitory;
  - type: text
    content: Ary tsy nisy nandre ny teninareo.
  '27':
  - type: text
    content: ' '
  - type: text
    content: Izaho
  - type: text
    content: ' no voalohany, '
  - type: text
    content: Izay milaza amin’i
  - type: text
    content: ' Ziona hoe: Indreo, indreo izy,'
  - type: text
    content: Sady manome mpitondra teny soa mahafaly ho an’i Jerosalema.
  '28':
  - type: text
    content: Dia nijery Aho, kanjo tsy nisy olona,
  - type: text
    content: Eny, nojereko ireny, kanjo tsy nisy mpanolo-tsaina
  - type: text
    content: Hamaly Ahy, raha manontany azy Aho.
  '29':
  - type: text
    content: Indro, zava-poana avokoa izy rehetra;
  - type: text
    content: Tsinontsinona ny asany;
  - type: text
    content: Rivotra sy zava-poana ny sampiny an-idina.
  '3':
  - type: text
    content: Mipaoka ireo izy ka mandroso soa aman-tsara
  - type: text
    content: Any amin’izay làlana tsy mbola nodiavin’ny tongony.
  '4':
  - type: text
    content: Iza moa no nanao sy nahavita izany,
  - type: text
    content: Sady miantso ny taranaka maro hatramin’ny taloha?
  - type: text
    content: Izaho Jehovah no voalohany,
  - type: text
    content: Ary hatramin’ny farany dia mbola Izaho ihany no Izy.
  '5':
  - type: text
    content: Ny nosy nahita ka raiki-tahotra;
  - type: text
    content: Toran-kovitra ny vazan-tany,
  - type: text
    content: Dia nanatona izy ka tonga.
  '6':
  - type: text
    content: Samy nanampy ny namany avy izy rehetra,
  - type: text
    content: 'Ary samy nilaza tamin’ny rahalahiny avy hoe: Matokia.'
  '7':
  - type: text
    content: Koa ny mpandrafitra dia nampahery ny mpanefy volamena,
  - type: text
    content: Ary izay nandama tamin’ny tantanana nampahery izay nively teo amin’ny riandriana,
  - type: text
    content: 'Ka hoy izy, miantso ny solohoto: Tsara ity,'
  - type: text
    content: Dia nohomboany mafy tamin’ny hombo izy mba tsy hihozongozona.
  '8':
  - type: text
    content: Fa hianao kosa, ry Isiraely mpanompoko,
  - type: text
    content: Sy Jakoba, izay nofidiko,
  - type: text
    content: Taranak’i Abrahama sakaizako,
  '9':
  - type: text
    content: Hianao izay efa notantanako avy tany amin’ny faran’ny tany
  - type: text
    content: Ary nantsoiko avy tany an-tsisiny
  - type: text
    content: 'Ka nilazako hoe: Mpanompoko hianao,'
  - type: text
    content: 'Efa nofidiko ka tsy mba nariako:'
