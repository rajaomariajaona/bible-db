document_id: ISA.41
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahalehibiazan’i Jehovah, izay miseho amin’ny fitondrany ny firenena sy ny fiarovany ny Isiraely, ary ny fanambarany rahateo ny zavatra mbola ho avy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MANGÌNA hihaino Ahy hianareo, ry nosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka handroso hery ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hanatona izy, ka dia hiteny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Andeha isika hifanatona eo amin’ny fitsarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Iza no nanaitra avy any atsinanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay nomban’ny fahamarinana tamin’ny diany rehetra,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nantsoin’ny fahamarinana hanaraka azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nanolotra ny firenena ho eo anatrehany, ka nampanapahiny ireo mpanjaka izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nanao ny sabany ho tahaka ny vovoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsipìkany ho tahaka ny vodivary voapaoka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mipaoka ireo izy ka mandroso soa aman-tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any amin’izay làlana tsy mbola nodiavin’ny tongony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza moa no nanao sy nahavita izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady miantso ny taranaka maro hatramin’ny taloha?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho Jehovah no voalohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatramin’ny farany dia mbola Izaho ihany no Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny nosy nahita ka raiki-tahotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toran-kovitra ny vazan-tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanatona izy ka tonga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Samy nanampy ny namany avy izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary samy nilaza tamin’ny rahalahiny avy hoe: Matokia.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa ny mpandrafitra dia nampahery ny mpanefy volamena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay nandama tamin’ny tantanana nampahery izay nively teo amin’ny riandriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hoy izy, miantso ny solohoto: Tsara ity,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nohomboany mafy tamin’ny hombo izy mba tsy hihozongozona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa hianao kosa, ry Isiraely mpanompoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy Jakoba, izay nofidiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Taranak’i Abrahama sakaizako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hianao izay efa notantanako avy tany amin’ny faran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nantsoiko avy tany an-tsisiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka nilazako hoe: Mpanompoko hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Efa nofidiko ka tsy mba nariako:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza matahotra hianao, fa momba anao Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza miherikerika foana, fa Izaho no Andriamanitrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampahery anao Aho sady mamonjy anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mitantana anao amin’ny tànana ankavanan’ny fahamarinako Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, ho menatra sy hangaihay izay rehetra tezitra aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tsinontsinona izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho levona izay miady aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hotadiavinao izay mifanditra aminao, fa tsy ho hitanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tahaka ny tsinontsinona sy ny zava-poana izay miady aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa Izaho Jehovah Andriamanitrao no mitantana ny tànanao ankavanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia Ilay manao aminao hoe: Aza matahotra, Izaho no hamonjy anao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aza matahotra hianao, ry Jakoba kankana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianareo, ry Isiraely olom-bitsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no hamonjy anao, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Iray Masin’ny Isiraely no Mpanavotra anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, ataoko kodia vy vaovao misy nify maranitra hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hively ny tendrombohitra hianao ka hanorotoro azy ho vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanao ny havoana ho tahaka ny akofa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hikororoka azy hianao, ka hopaohin’ny rivotra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tafio-drivotra hanely azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hianao kosa dia hiravoravo amin’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Iray Masin’ny Isiraely no ho reharehanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny ory sy ny malahelo mitady rano, fa tsy mahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lelany mainan’ny hetaheta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho Jehovah no hihaino azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho, Andriamanitry ny Isiraely, tsy hahafoy azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hampiboika renirano ao amin’ny tendrombohitra mangadihady Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary loharano ao amin’ny lohasaha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanao ny efitra ho farihy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany karankaina no loharano miboiboika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hampaniry hazo sedera sy akasia sy rotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: myrta.
    marker-yv: yv-n
  - type: text
    text: ' ary oliva'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: oliva maniry ho azy.
    marker-yv: yv-n
  - type: text
    text: ' any an-efitra Aho'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary kypreso sy pina sy bokso eny an-tani-hay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mba ho hitany sy ho fantany sy hoheveriny ary ho azony an-tsaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny tànan’i Jehovah no nanao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Iray Masin’ny Isiraely no nahary izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Alaharo eto ny teninareo, hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asehoy izay mahamarina ny anareo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiarovana mafy.
    marker-yv: yv-n
  - type: text
    text: ' hoy ny Mpanjakan’i Jakoba.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aoka hampanatoniny ka hasehony amintsika izay zavatra mbola ho avy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambarao izay zavatra taloha,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zavatra voalohany
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hoheverinay ka ho fantatray izay hiafarany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ilazao izay zavatra ho avy izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ambarao anay izay zavatra ho avy rahatrizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho fantatray fa andriamanitra hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, manaova soa, na manaova ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hitaha isika, ka samy hahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Indro, hianareo dia naman’ny tsinontsinona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny asanareo dia naman’ny zava-poana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vetaveta izay mifidy anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nanaitra ny anankiray avy tany avaratra Aho, ka tonga izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny anankiray avy any amin’ny fiposahan’ny masoandro, izay hiantso ny anarako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanosihosy ny mpanapaka tahaka ny fanosihosy feta izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny mpanefy vilany mihosy tanimanga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Iza no nitory izany hatramin’ny voalohany, mba ho fantatray?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary hatry ny fony taloha, mba hataonay hoe: Marina?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nisy nanambara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tsy nisy nitory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nisy nandre ny teninareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Izaho
  - type: text
    text: ' no voalohany, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Izay milaza amin’i
  - type: text
    text: ' Ziona hoe: Indreo, indreo izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manome mpitondra teny soa mahafaly ho an’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nijery Aho, kanjo tsy nisy olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nojereko ireny, kanjo tsy nisy mpanolo-tsaina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamaly Ahy, raha manontany azy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Indro, zava-poana avokoa izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsinontsinona ny asany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rivotra sy zava-poana ny sampiny an-idina.
