document_id: HOS.1,873
type_code: plt
verses:
  '1':
  - type: text
    content: NY tenin’i Jehovah, izay tonga tamin’i Hosea, zanak’i Bery, tamin’ny andro nanjakan’i Ozia sy Jotama sy Ahaza ary Hezekia, mpanjakan’ny Joda, sy tamin’ny andron’i Jeroboama, zanak’i Joasy, mpanjakan’ny Isiraely.
  - type: heading
    content: Ny amin’ny vehivavy janga anankiray sy ny zanany, izay natao tandindon’ny Isiraely.
  '2':
  - type: text
    content: 'TAMIN’ny niandohan’ny nitenenan’i Jehovah tamin’i Hosea dia hoy Jehovah taminy: Andeha hianao maka vady izay efa tena janga sy zanaky ny fijangajangana; fa fatra-pijangajanga miala amin’i Jehovah ny tany.'
  '3':
  - type: text
    content: 'Dia lasa izy naka an’i Gomera, zanakavavin’i Diblaima; ary dia nanan-anaka ravehivavy ka nitera-dahy taminy. '
  '4':
  - type: text
    content: 'Ary hoy Jehovah taminy: Ataovy Jezirela no anarany; fa vetivety dia hovaliako ny taranak’i Jeho noho ny ra nalatsaka tao Jezirela, ary hatsahatro ny fanjakan’ny taranak’Isiraely. '
  '5':
  - type: text
    content: Ary amin’izany andro izany dia hotapahiko ao amin’ny tany lemaka Jezirela ny tsipìkan’Isiraely.
  '6':
  - type: text
    content: 'Ary nanan-anaka indray ravehivavy ka nitera-bavy. Dia hoy Jehovah taminy: Ataovy Lô-rohama'
  - type: note
    content: Lô-rohama = Tsy namindrana fo.
  - type: text
    content: ' no anarany; fa tsy hamindra fo amin’ny taranak’Isiraely intsony Aho, eny, tsy havelako mihitsy ny helony.'
  - type: note
    content: 'Na: hofoanako avokoa ny ananany.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: Fa ny taranak’i Joda no hamindrako fo, ary Izaho Jehovah Andriamaniny no hamonjy azy, nefa tsy amin’ny tsipìka, na amin’ny sabatra, na amin’ny ady, na amin’ny soavaly, na amin’ny mpitaingin-tsoavaly.
  '8':
  - type: text
    content: 'Ary rehefa notazana Lô-rohama, dia nanan-anaka indray reniny ka nitera-dahy. '
  '9':
  - type: text
    content: 'Dia hoy Jehovah: Ataovy Lô-amy'
  - type: note
    content: Lô-amỳ = Tsy oloko.
  - type: text
    content: ' no anarany; fa hianareo tsy oloko, ary Izaho tsy ho Andriamanitrareo.'
  - type: note
    content: Heb. tsy ho anareo.
