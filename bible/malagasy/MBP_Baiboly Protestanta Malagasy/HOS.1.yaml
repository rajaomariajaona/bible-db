document_id: HOS.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: NY tenin’i Jehovah, izay tonga tamin’i Hosea, zanak’i Bery, tamin’ny andro nanjakan’i Ozia sy Jotama sy Ahaza ary Hezekia, mpanjakan’ny Joda, sy tamin’ny andron’i Jeroboama, zanak’i Joasy, mpanjakan’ny Isiraely.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny vehivavy janga anankiray sy ny zanany, izay natao tandindon’ny Isiraely.
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'TAMIN’ny niandohan’ny nitenenan’i Jehovah tamin’i Hosea dia hoy Jehovah taminy: Andeha hianao maka vady izay efa tena janga sy zanaky ny fijangajangana; fa fatra-pijangajanga miala amin’i Jehovah ny tany.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia lasa izy naka an’i Gomera, zanakavavin’i Diblaima; ary dia nanan-anaka ravehivavy ka nitera-dahy taminy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hoy Jehovah taminy: Ataovy Jezirela no anarany; fa vetivety dia hovaliako ny taranak’i Jeho noho ny ra nalatsaka tao Jezirela, ary hatsahatro ny fanjakan’ny taranak’Isiraely. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary amin’izany andro izany dia hotapahiko ao amin’ny tany lemaka Jezirela ny tsipìkan’Isiraely.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nanan-anaka indray ravehivavy ka nitera-bavy. Dia hoy Jehovah taminy: Ataovy Lô-rohama'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lô-rohama = Tsy namindrana fo.
      marker-yv: yv-n
    - type: text
      text: ' no anarany; fa tsy hamindra fo amin’ny taranak’Isiraely intsony Aho, eny, tsy havelako mihitsy ny helony.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hofoanako avokoa ny ananany.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ny taranak’i Joda no hamindrako fo, ary Izaho Jehovah Andriamaniny no hamonjy azy, nefa tsy amin’ny tsipìka, na amin’ny sabatra, na amin’ny ady, na amin’ny soavaly, na amin’ny mpitaingin-tsoavaly.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary rehefa notazana Lô-rohama, dia nanan-anaka indray reniny ka nitera-dahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy Jehovah: Ataovy Lô-amy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lô-amỳ = Tsy oloko.
      marker-yv: yv-n
    - type: text
      text: ' no anarany; fa hianareo tsy oloko, ary Izaho tsy ho Andriamanitrareo.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy ho anareo.
      marker-yv: yv-n
