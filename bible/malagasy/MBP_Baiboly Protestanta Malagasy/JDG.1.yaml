document_id: JDG.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niadian’ny Zanak’Isiraely tamin’ny Kananita taorian’ny nahafatesan’i Josoa.
  - type: text
    content: 'ARY rehefa maty Josoa, dia nanontany tamin’i Jehovah ny Zanak’Isiraely hoe: Iza no hiakatra voalohany hiady amin’ny Kananita ho anay? '
  '10':
  - type: text
    content: 'Dia nandeha Joda hiady amin’ny Kananita, izay nonina tany Hebrona (Kiriat-arba no anaran’i Hebrona taloha), ka namono an’i Sesay sy Ahimana ary Talmay. '
  '11':
  - type: text
    content: Dia niala tao izy ka nandeha hiady amin’ny mponina any Debira (Kiriata-sefera no anaran’i Debira taloha).
  '12':
  - type: text
    content: 'Ary hoy Kaleba: Izay mamely an’i Kiriata-sefera ka mahafaka azy dia homeko azy Aksa zanako-vavy ho vadiny. '
  '13':
  - type: text
    content: 'Ary Otniela, zanakalahin’i Kenaza, zandrin’i Kaleba, no nahafaka azy; ka dia nomeny azy Aksa zanani-vavy ho vadiny. '
  '14':
  - type: text
    content: 'Ary rehefa voampakatra ravehivavy, dia nanome vava ny lahy hangataka saha tamin-drainy; dia niala faingana tamin’ny borikiny izy, ka hoy Kaleba taminy: Inona moa no ilainao? '
  '15':
  - type: text
    content: 'Ary hoy izy: Omeo tso-drano aho; fa tany tsy misy rano no nomenao ahy, ka mba omeo loharano koa aho. Dia nomen’i Kaleba azy ny loharano ambony sy ny loharano ambany.'
  '16':
  - type: text
    content: Ary ny taranak’ilay Kenita, zao-dahin’
  - type: note
    content: 'Na: rafozan’.'
  - type: text
    content: ' i Mosesy, dia niara-niakatra tamin’ny taranak’i Joda niala tao amin’ny tanàna be rofia'
  - type: note
    content: palma.
  - type: text
    content: ' hankany an-efitr’i Joda, atsimon’i Arada; nandeha ireo ka nonina teo amin’ny Isiraely.'
  '17':
  - type: text
    content: Ary Joda nandeha niaraka tamin’i Simeona rahalahiny, dia namely ny Kananita, izay nonina tany Zefata, ka nataony ringana
  - type: note
    content: Heb. herema.
  - type: text
    content: ' ireo, ary ny anaran’ny tanàna nataony hoe Horma'
  - type: note
    content: Horma=Herema.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Dia afak’i Joda Gaza sy ny sisin-taniny ary Askelona sy ny sisin-taniny ary Ekrona sy ny sisin-taniny. '
  '19':
  - type: text
    content: Ary Jehovah nomba an’i Joda, ka dia azony ny tany havoana; nefa tsy naharoaka ny mponina teny amin’ny tany lemaka izy, satria nanana kalesy vy ireny.
  '2':
  - type: text
    content: 'Dia hoy Jehovah: Joda no hiakatra; indro, efa nanolotra ny tany ho eo an-tànany Aho.'
  '20':
  - type: text
    content: Ary Hebrona dia nomeny an’i Kaleba, araka izay efa nolazain’i Mosesy, ka noroahin’i Kaleba niala tao izy telo lahy, taranaky ny Anakita.
  '21':
  - type: text
    content: Ary ny taranak’i Benjamina tsy nandroaka ny Jebosita, izay mponina any Jerosalema; fa ny Jebosita dia miara-monina amin’ny taranak’i Benjamina any Jerosalema ihany mandraka andro-any.
  '22':
  - type: text
    content: 'Ary ny taranak’i Josefa dia niakatra koa hamely an’i Betela; ary Jehovah nomba azy. '
  '23':
  - type: text
    content: 'Dia naniraka hisafo an’i Betela ny taranak’i Josefa (Lozy no anaran’ny tanàna taloha); '
  '24':
  - type: text
    content: 'ary nahita lehilahy anankiray nivoaka avy tao an-tanàna ny mpisafo ka nanao taminy hoe: Mba atoroy kely anay ny fidirana mankao an-tanàna, dia hamindra fo aminao izahay. '
  '25':
  - type: text
    content: 'Dia natoron-dralehilahy azy ny fidirana mankao an-tanàna, ka dia nasiany tamin’ny lelan-tsabatra ny tanàna; fa ralehilahy sy ny mpianakaviny rehetra dia navelany handeha. '
  '26':
  - type: text
    content: Ary nandeha ho any amin’ny tanin’ny Hetita ralehilahy, ka nanorina tanàna izy, ary ny anarany dia nataony hoe Lozy, ary mbola izany ihany no anarany mandraka andro-any.
  '27':
  - type: text
    content: 'Ary Manase tsy nahafaka an’i Beti-sana sy ny zana-bohiny, na Tanaka sy ny zana-bohiny, sady tsy naharoaka ny mponina tany Dora sy ny zana-bohiny, na ny mponina tany Ibleama sy ny zana-bohiny, na ny mponina tany Megido sy ny zana-bohiny, satria tian’ny Kananita hitoerana indrindra izany tany izany. '
  '28':
  - type: text
    content: Fa rehefa nihahery kosa ny Isiraely, dia nampanaoviny fanompoana ny Kananita, fa tsy nandroaka azy rehetra izy.
  '29':
  - type: text
    content: Ary Efraima tsy nandroaka ny Kananita, izay nonina tany Gazera; fa nonina teo aminy tany Gazera ny Kananita.
  '3':
  - type: text
    content: 'Ary hoy Joda tamin’i Simeona rahalahiny: Andeha hiara-miakatra amiko hianao ho any amin’ny lovako, ka aoka isika hiady amin’ny Kananita; ary izaho kosa dia handeha hiaraka aminao ho any amin’ny lovanao. Ary Simeona dia nandeha niaraka taminy.'
  '30':
  - type: text
    content: Zebolona tsy nandroaka ny mponina tany Kitrona, na ny mponina tany Nahalola; fa nonina teo aminy ny Kananita ka nampanaovina fanompoana.
  '31':
  - type: text
    content: 'Asera tsy nandroaka ny mponina tany Ako, na ny mponina tany Sidona, na ny tany Alaba, na ny tany Akziba, na ny tany Helba na ny tany Afika, na ny tany Rehoba; '
  '32':
  - type: text
    content: fa nonina teo amin’ny Kananita tompon-tany ny taranak’i Asera, fa tsy nandroaka azy.
  '33':
  - type: text
    content: Naftaly tsy nandroaka ny mponina tany Beti-semesy, na ny mponina tany Bet-anata; fa nonina teo amin’ny Kananita tompon-tany izy, kanefa nampanaoviny fanompoana ny mponina tany Beti-semesy sy Bet-anata.
  '34':
  - type: text
    content: 'Ary ny Amorita nanesika ny taranak’i Dana ho any amin’ny tany havoana, fa tsy namela azy hidina ho any amin’ny tany lemaka, '
  '35':
  - type: text
    content: 'fa tian’ny Amorita hitoerana indrindra ny tendrombohitra Heresa sy ny tany Aialona sy Salbima; nefa nahery ny tànan’ny taranak’i Josefa, ka dia nampanaovina fanompoana ireo. '
  '36':
  - type: text
    content: Ary ny fari-tanin’ny Amorita dia hatramin’ny fiakarana Akrabima ka hatramin’ilay harambato no ho mankany.
  '4':
  - type: text
    content: 'Dia niakatra Joda, ary natolotr’i Jehovah teo an-tànany ny Kananita sy ny Perizita, ka nahafaty iray alin-dahy tany Bezeka izy. '
  '5':
  - type: text
    content: 'Ary nahita an’i Adoni-bezeka tany Bezeka izy, dia niady taminy ka naharesy ny Kananita sy ny Perizita. '
  '6':
  - type: text
    content: 'Nefa nandositra Adoni-bezeka; ary nanenjika azy izy ireo ka nisambotra azy, dia nanapaka ny ankihiben-tànany sy ny ankihiben-tongony. '
  '7':
  - type: text
    content: 'Ary hoy Adony-bezeka: Mpanjaka fito-polo voatapaka ny ankihiben-tànany sy ny ankihiben-tongony no nitsondrika hanina teo ambanin’ny latabatro; ka mba tahaka ny nataoko ihany lahy ity no navalin’Andriamanitra ahy! Ary nentin’ireo ho any Jeroselama izy ka maty tany.'
  '8':
  - type: text
    content: Ary namely an’i Jerosalema ny taranak’i Joda, ka nahafaka azy, dia namely azy tamin’ny lelan-tsabatra ka nandoro ny tanàna.
  '9':
  - type: text
    content: Ary rehefa afaka izany, dia nidina ny taranak’i Joda hiady amin’ny Kananita izay nonina tany amin’ny tany havoana sy tany amin’ny tany atsimo ary tany amin’ny tany lemaka amoron-tsiraka
  - type: note
    content: Heb. Sefela.
