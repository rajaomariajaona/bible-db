document_id: JOB.22,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny fanintelony nataon’i Elifaza.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'DIA namaly Elifaza Temanita ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Koa noho izany dia misy fandrika manodidina anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahatahorana dia mampihorohoro anao tampoka;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Moa tsy hitanao va ny maizina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny rano mandriaka mandifotra anao?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tsy avo tahaka ny lanitra va Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny hahavon’ny kintana, endrey ny hahavony!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nefa hoy hianao: Ataon’Andriamanitra ahoana no fahafantatra?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahay mitsara arỳ ankoatry ny rahona maizina va Izy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny rahona matevina manakona Azy, ka tsy mahita Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandehandeha eny amin’ny lanitra Izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Moa hizotra amin’ny làlana izay nalehan’ny olona fahagola va hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay nalehan’ny olona ratsy fanahy,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izay nesorina alohan’ny androny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nindaosin’ny riaka ny fanorenany,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia ireo izay manao tamin’Andriamanitra hoe: Mialà aminay!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary inona no azon’ny Tsitoha atao ho anay?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: azy.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Kanefa Izy no efa nameno zava-tsoa ny tranony–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lavitra ahy anie ny fisainan’ny ratsy fanahy!–
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny marina mahita ka mifaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny tsy manan-tsiny mihomehy ireny hoe:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mahasoa an’Andriamanitra va ny olona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, fa mahasoa ny tenany ihany ny olon-kendry.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Marina tokoa fa efa rava ny fahavalontsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hareny betsaka efa levon’ny afo.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mifankazara amin’ny Tsitoha hianao, dia hiadana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no hahatongavan’ny soa aminao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Masìna hianao, mandraisa fampianarana avy amin’ny vavany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary alatsaho ao am-ponao ny teniny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Raha miverina aminy hianao, dia haorina tsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, raha ampanalavirinao ny lainao ny heloka.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ario eny amin’ny vovoka ny akoram-bolamena sy ny akoram-bolafotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, ario eny amin’ny vato eny an-dohasahan-driaka ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: volamena avy any
    - type: text
      text: ' Ofira;'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa ny Tsitoha no ho akoram-bolamenanao sy akoram-bolafotsinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho volafotsy mamirapiratra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tsara, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: azo amin’ny fisasarana.
      marker-yv: yv-n
    - type: text
      text: ' ho anao.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fa amin’izany dia hiravoravo amin’ny Tsitoha hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanandratra ny tavanao amin’Andriamanitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Raha mifona aminy hianao, dia hihaino anao Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny voadinao dia hefainao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary raha misy kasainao hatao, dia hotanterahina aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamirapiratra amin’ny làlanao ny mazava.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Raha misy mietry,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Raha mietry izy.
      marker-yv: yv-n
    - type: text
      text: ' dia hataonao hoe: Misandrata;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny manetry tena hovonjeny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mampaninona ny Tsitoha moa, raha marina hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa misy tombony ho Azy, raha ataonao tsy misy diso ny alehanao?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Hanafaka ny olona meloka Izy,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny fahadiovan’ny tànanao no hamonjena azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moa ny fahatahoranao Azy va no ananarany anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ifanatrehany aminao amin’ny fitsarana?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy be va ny faharatsianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy hita isa ny helokao?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa efa naka tsatòka tsy ahoan-tsy ahoana tamin’ny rahalahinao hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanendaka ny akanjon’ny mahantra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mitanjaka.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy nanome rano hosotroin’ny mangetaheta hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy nahafoy hanina ho an’ny noana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa ny olona sandriana ihany no nanana ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny manan-kaja ihany no nitoetra teo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Efa nampialainao maina ny mpitondratena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tapahina ny sandrin’ny kamboty.
