document_id: JOB.22,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny fanintelony nataon’i Elifaza.
  - type: text
    content: 'DIA namaly Elifaza Temanita ka nanao hoe:'
  '10':
  - type: text
    content: Koa noho izany dia misy fandrika manodidina anao,
  - type: text
    content: Ary ny fahatahorana dia mampihorohoro anao tampoka;
  '11':
  - type: text
    content: Moa tsy hitanao va ny maizina
  - type: text
    content: Sy ny rano mandriaka mandifotra anao?
  '12':
  - type: text
    content: Tsy avo tahaka ny lanitra va Andriamanitra?
  - type: text
    content: Jereo ny hahavon’ny kintana, endrey ny hahavony!
  '13':
  - type: text
    content: 'Nefa hoy hianao: Ataon’Andriamanitra ahoana no fahafantatra?'
  - type: text
    content: Mahay mitsara arỳ ankoatry ny rahona maizina va Izy?
  '14':
  - type: text
    content: Ny rahona matevina manakona Azy, ka tsy mahita Izy;
  - type: text
    content: Ary mandehandeha eny amin’ny lanitra Izy.
  '15':
  - type: text
    content: Moa hizotra amin’ny làlana izay nalehan’ny olona fahagola va hianao?
  - type: text
    content: Dia ilay nalehan’ny olona ratsy fanahy,
  '16':
  - type: text
    content: Izay nesorina alohan’ny androny,
  - type: text
    content: Ka nindaosin’ny riaka ny fanorenany,
  '17':
  - type: text
    content: 'Dia ireo izay manao tamin’Andriamanitra hoe: Mialà aminay!'
  - type: text
    content: Ary inona no azon’ny Tsitoha atao ho anay?
  - type: note
    content: Heb. azy.
  '18':
  - type: text
    content: Kanefa Izy no efa nameno zava-tsoa ny tranony–
  - type: text
    content: Ho lavitra ahy anie ny fisainan’ny ratsy fanahy!–
  '19':
  - type: text
    content: Ny marina mahita ka mifaly,
  - type: text
    content: 'Ary ny tsy manan-tsiny mihomehy ireny hoe:'
  '2':
  - type: text
    content: Mahasoa an’Andriamanitra va ny olona?
  - type: text
    content: Tsia, fa mahasoa ny tenany ihany ny olon-kendry.
  '20':
  - type: text
    content: Marina tokoa fa efa rava ny fahavalontsika,
  - type: text
    content: Ary ny hareny betsaka efa levon’ny afo.
  '21':
  - type: text
    content: Mifankazara amin’ny Tsitoha hianao, dia hiadana;
  - type: text
    content: Izany no hahatongavan’ny soa aminao.
  '22':
  - type: text
    content: Masìna hianao, mandraisa fampianarana avy amin’ny vavany,
  - type: text
    content: Ary alatsaho ao am-ponao ny teniny.
  '23':
  - type: text
    content: Raha miverina aminy hianao, dia haorina tsara,
  - type: text
    content: Eny, raha ampanalavirinao ny lainao ny heloka.
  '24':
  - type: text
    content: Ario eny amin’ny vovoka ny akoram-bolamena sy ny akoram-bolafotsy,
  - type: text
    content: 'Eny, ario eny amin’ny vato eny an-dohasahan-driaka ny '
  - type: text
    content: volamena avy any
  - type: text
    content: ' Ofira;'
  '25':
  - type: text
    content: Fa ny Tsitoha no ho akoram-bolamenanao sy akoram-bolafotsinao,
  - type: text
    content: Ary ho volafotsy mamirapiratra
  - type: note
    content: 'Na: tsara, na azo amin’ny fisasarana.'
  - type: text
    content: ' ho anao.'
  '26':
  - type: text
    content: Fa amin’izany dia hiravoravo amin’ny Tsitoha hianao
  - type: text
    content: Ka hanandratra ny tavanao amin’Andriamanitra.
  '27':
  - type: text
    content: Raha mifona aminy hianao, dia hihaino anao Izy;
  - type: text
    content: Ary ny voadinao dia hefainao.
  '28':
  - type: text
    content: Ary raha misy kasainao hatao, dia hotanterahina aminao,
  - type: text
    content: Ary hamirapiratra amin’ny làlanao ny mazava.
  '29':
  - type: text
    content: Raha misy mietry,
  - type: note
    content: 'Na: Raha mietry izy.'
  - type: text
    content: ' dia hataonao hoe: Misandrata;'
  - type: text
    content: Fa ny manetry tena hovonjeny.
  '3':
  - type: text
    content: Mampaninona ny Tsitoha moa, raha marina hianao,
  - type: text
    content: Sa misy tombony ho Azy, raha ataonao tsy misy diso ny alehanao?
  '30':
  - type: text
    content: Hanafaka ny olona meloka Izy,–
  - type: text
    content: Eny, ny fahadiovan’ny tànanao no hamonjena azy.
  '4':
  - type: text
    content: Moa ny fahatahoranao Azy va no ananarany anao,
  - type: text
    content: Sy ifanatrehany aminao amin’ny fitsarana?
  '5':
  - type: text
    content: Tsy be va ny faharatsianao,
  - type: text
    content: Sady tsy hita isa ny helokao?
  '6':
  - type: text
    content: Fa efa naka tsatòka tsy ahoan-tsy ahoana tamin’ny rahalahinao hianao
  - type: text
    content: Ka nanendaka ny akanjon’ny mahantra.
  - type: note
    content: Heb. mitanjaka.
  '7':
  - type: text
    content: Tsy nanome rano hosotroin’ny mangetaheta hianao
  - type: text
    content: Sady tsy nahafoy hanina ho an’ny noana.
  '8':
  - type: text
    content: Fa ny olona sandriana ihany no nanana ny tany;
  - type: text
    content: Ary ny manan-kaja ihany no nitoetra teo.
  '9':
  - type: text
    content: Efa nampialainao maina ny mpitondratena,
  - type: text
    content: Ary tapahina ny sandrin’ny kamboty.
