document_id: PSA.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fangatahana fiarovana sy fitarihana.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: AMINAO, Jehovah ô, no anandratako ny fanahiko.
  '10':
  - type: text
    content: Ny làlan’i Jehovah rehetra dia famindrampo sy fahamarinana
  - type: text
    content: Amin’izay mitandrina ny fanekeny sy ny teni-vavolombelony.
  '11':
  - type: text
    content: Noho ny anaranao, Jehovah ô, dia mamelà ny heloko,
  - type: text
    content: Fa lehibe izany.
  '12':
  - type: text
    content: Iza no lehilahy matahotra an’i Jehovah?
  - type: text
    content: Izy no hampianariny izay làlana tokony hofidiny.
  '13':
  - type: text
    content: Ny fanahiny hitoetra amin’ny soa;
  - type: text
    content: Ary ny taranany handova ny tany.
  '14':
  - type: text
    content: Ny fisainan’i Jehovah asehony amin’izay matahotra Azy,
  - type: text
    content: Ary ny fanekeny no hampahafantariny azy.
  '15':
  - type: text
    content: Ny masoko mijery an’i Jehovah mandrakariva;
  - type: text
    content: Fa Izy no nanafaka ny tongotro tamin’ny fandrika harato.
  '16':
  - type: text
    content: Todiho aho, ka amindrao fo,
  - type: text
    content: Fa irery aho ka mahantra.
  '17':
  - type: text
    content: Ny fahorian’ny foko efa mihalehibe;
  - type: text
    content: Afaho amin’ny fahatereko aho.
  '18':
  - type: text
    content: Jereo ny fahoriako sy ny mavesatra amiko,
  - type: text
    content: Ka mamelà ny fahotako rehetra.
  '19':
  - type: text
    content: Jereo ny fahavaloko, fa maro izy;
  - type: text
    content: Ary loza ny fankahalany ahy.
  '2':
  - type: text
    content: Andriamanitro ô, Hianao no itokiako, aoka tsy ho menatra aho;
  - type: text
    content: Aoka tsy hifalian’ny fahavaloko aho.
  '20':
  - type: text
    content: Arovy ny fanahiko, ka vonjeo aho;
  - type: text
    content: Aoka tsy ho menatra aho, fa mialoka aminao.
  '21':
  - type: text
    content: Aoka ny tsi-fisian-tsiny sy ny fahitsiana no hiaro ahy;
  - type: text
    content: Fa miandry Anao aho.
  '22':
  - type: text
    content: Andriamanitra ô, afaho ny Isiraely
  - type: text
    content: Amin’ny fahoriany rehetra.
  '3':
  - type: text
    content: Eny, tsy hisy ho menatra izay rehetra miandry Anao;
  - type: text
    content: Fa izay mivadika foana no ho menatra.
  '4':
  - type: text
    content: Ampahafantaro ny làlanao aho, Jehovah ô;
  - type: text
    content: Ampianaro ny sitrakao aho.
  '5':
  - type: text
    content: Tariho amin’ny fahamarinanao aho, ka ampianaro;
  - type: text
    content: Fa Hianao no Andriamanitry ny famonjena ahy;
  - type: text
    content: Hianao no andrasako mandritra ny andro.
  '6':
  - type: text
    content: Tsarovy ny antranao sy ny indrafonao, Jehovah ô,
  - type: text
    content: Fa hatrizay hatrizay ireny.
  '7':
  - type: text
    content: Aza ny fahotan’ny fahatanorako, na ny ratsy nataoko, no tsarovanao;
  - type: text
    content: Fa aoka ho araka ny famindramponao no hahatsiarovanao ahy,
  - type: text
    content: Noho ny fahasoavanao Jehovah ô.
  '8':
  - type: text
    content: Tsara sy mahitsy Jehovah,
  - type: text
    content: Ka izany no ampianarany ny mpanota ny làlana.
  '9':
  - type: text
    content: Mitarika ny mpandefitra amin’ny marina Izy
  - type: text
    content: Ary mampianatra ny mpandefitra ny làlany.
