document_id: PSA.25,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Salamo abidy. Fangatahana fiarovana sy fitarihana.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: AMINAO, Jehovah ô, no anandratako ny fanahiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny làlan’i Jehovah rehetra dia famindrampo sy fahamarinana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izay mitandrina ny fanekeny sy ny teni-vavolombelony.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny anaranao, Jehovah ô, dia mamelà ny heloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lehibe izany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no lehilahy matahotra an’i Jehovah?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no hampianariny izay làlana tokony hofidiny.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanahiny hitoetra amin’ny soa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taranany handova ny tany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fisainan’i Jehovah asehony amin’izay matahotra Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fanekeny no hampahafantariny azy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masoko mijery an’i Jehovah mandrakariva;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no nanafaka ny tongotro tamin’ny fandrika harato.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Todiho aho, ka amindrao fo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa irery aho ka mahantra.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahorian’ny foko efa mihalehibe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afaho amin’ny fahatereko aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny fahoriako sy ny mavesatra amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mamelà ny fahotako rehetra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo ny fahavaloko, fa maro izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary loza ny fankahalany ahy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro ô, Hianao no itokiako, aoka tsy ho menatra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hifalian’ny fahavaloko aho.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arovy ny fanahiko, ka vonjeo aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy ho menatra aho, fa mialoka aminao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny tsi-fisian-tsiny sy ny fahitsiana no hiaro ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa miandry Anao aho.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, afaho ny Isiraely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fahoriany rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy hisy ho menatra izay rehetra miandry Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay mivadika foana no ho menatra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahafantaro ny làlanao aho, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampianaro ny sitrakao aho.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tariho amin’ny fahamarinanao aho, ka ampianaro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no Andriamanitry ny famonjena ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no andrasako mandritra ny andro.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy ny antranao sy ny indrafonao, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hatrizay hatrizay ireny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza ny fahotan’ny fahatanorako, na ny ratsy nataoko, no tsarovanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aoka ho araka ny famindramponao no hahatsiarovanao ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahasoavanao Jehovah ô.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsara sy mahitsy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izany no ampianarany ny mpanota ny làlana.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitarika ny mpandefitra amin’ny marina Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mampianatra ny mpandefitra ny làlany.
