  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary nony niala tao Mitka izy, dia nitoby tao Hasmona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Niala tao Ramesesa izy tamin’ny volana voalohany, dia tamin’ny andro fahadimy ambin’ny folo tamin’ny volana voalohany; nony ampitson’ny Paska no nivoahan’ny Zanak’Isiraely tamin’ny tànana avo teo imason’ny Egyptiana rehetra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary nony niala tao Hasmona izy, dia nitoby tao Moserota.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary nony niala tao Moserota izy, dia nitoby tao Bene-jakana.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary nony niala tao Bene-jakana izy, dia nitoby tao Hora-hagidgada.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary nony niala tao Hora-hagidgada izy, dia nitoby tao Jotbata.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ary nony niala tao Jotbata izy, dia nitoby tao Abrona.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary nony niala tao Abrona izy, dia nitoby tao Ezion-gebera.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ary nony niala tao Ezion-gebera izy, dia nitoby tany an-efitra Zina (Kadesy izany).
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary nony niala tao Kadesy izy, dia nitoby tao an-tendrombohitra Hora, tao an-tsisin’ny tany Edoma. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary Arona mpisorona niakatra tao an-tendrombohitra Hora, araka ny didin’i Jehovah, dia maty tao izy tamin’ny fahefa-polo taona taorian’ny nivoahan’ny Zanak’Isiraely avy tany amin’ny tany Egypta, tamin’ny andro voalohany tamin’ny volana fahadimy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary efa telo amby roa-polo amby zato taona Arona, raha maty tao an-tendrombohitra Hora izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa ny Egyptiana mbola nandevina izay efa novonoin’i Jehovah teo aminy, dia ny lahimatoa rehetra; ary ny andriamaniny dia notsarain’i Jehovah.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary ren’ilay Kananita, mpanjakan’i Arada, izay nonina teo amin’ny tany atsimo amin’ny tany Kanana, fa avy ny Zanak’Isiraely.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Ary nony niala tao an-tendrombohitra Hora izy, dia nitoby tao Zalmona.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ary nony niala tao Zalmona izy, dia nitoby tao Ponona.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Ary nony niala tao Ponona izy, dia nitoby tao Obota.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Ary nony niala tao Obota izy, dia nitoby tao Ie-abarima tao amin’ny faritanin’i Moaba.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Ary nony niala tao Ie izy, dia nitoby tao Dibon-gada.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Ary nony niala tao Dibon-gada izy, dia nitoby tao Almon-diblataima.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Ary nony niala tao Almon-diblataima izy, dia nitoby tao amin’ny tendrombohitra Abarima, tandrifin’i Nebo.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Ary nony niala tamin’ny tendrombohitra Abarima izy, dia nitoby tao Arbota-moaba, teo amoron’i Jordana tandrifin’i Jeriko. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Ary nitoby teo amoron’i Jordana izy hatrany Beti-jesimota ka hatrany Abela-sitima, tao Arbota-moaba.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary nony niala tao Ramesesa ny Zanak’Isiraely, dia nitoby tao Sokota.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy teo Arbota-moaba, teo amoron’i Jordana tandrifin’i Jeriko, ka nanao hoe: '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Rehefa tafita an’i Jordana ka tonga any amin’ny tany Kanana hianareo, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'dia horoahinareo eo alohanareo ny mponina rehetra amin’ny tany, ary horavanareo ny vato soratany rehetra, ary hosimbanareo ny sarin-javany an-idina rehetra, ary horavanareo ny fitoerana avony rehetra; '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'dia halainareo ny tany, ka hitoetra eo hianareo; fa hianareo no nomeko ny tany ho zara-taninareo. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Ary filokana no hizaranareo ny tany araka ny fokonareo avy: ny maro isa homenareo zara-tany bebe kokoa, ary ny vitsy isa homenareo kelikely kokoa; samy ao amin’izay ivoahan’ny filokana ho azy no ho '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anjarany
    - type: text
      text: ; araka ny firenen’ny razanareo no hahazoanareo zara-tany.
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Fa raha tsy roahinareo eo alohanareo ny mponina amin’ny tany, dia ho lay amin’ny masonareo sy ho tsilo amin’ny tehezanareo izay avelanareo hitoetra eo, ka handrafy anareo eo amin’ny tany izay onenanareo izy; '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: ary hataoko aminareo izay nokasaiko hatao aminy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary nony niala tao Sokota izy, dia nitoby tao Etama, izay teo an-tsisin’ny efitra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary nony niala tao Etama izy, dia nivily nankao Pi-hahirota, izay tandrifin’i Bala-zefona, ka nitoby tandrifin’i Migdola.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary nony niala tandrifin’i Hahirota izy, dia nandeha nita teo afovoan’ny ranomasina ho any an-efitra, dia nandeha làlan-kateloana tany an-efitra Etama izy ka nitoby tao Mara.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary nony niala tao Mara izy, dia nankany Elima; ary tao Elima dia nisy loharano roa ambin’ny folo sy hazo rofia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: palma.
      marker-yv: yv-n
    - type: text
      text: ' fito-polo, dia nitoby teo izy.'
