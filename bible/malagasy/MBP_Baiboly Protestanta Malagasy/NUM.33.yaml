    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY izao no nandehanan’ny Zanak’Isiraely, izay nentin’i Mosesy sy Arona nivoaka avy tany amin’ny tany Egypta araka ny antokony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
