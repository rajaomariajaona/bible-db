document_id: REV.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandraisan’ny Mpanavotra ny boky izay nisy tombo-kase fito, sy ny hira natao ho fiderana Azy.
  - type: text
    content: 'ARY hitako fa, indro, nisy boky voasoratra tao anatiny sy teo ivohony, voapetaka mafy tamin’ny tombo-kase fito, teo an-tànana ankavanan’Ilay nipetraka teo ambonin’ny seza fiandrianana. '
  '10':
  - type: text
    content: Ary efa nataonao fanjakana sy mpisorona ho an’Andriamanitsika ireo;
  - type: text
    content: Ary manjaka ambonin’ny tany izy.
  '11':
  - type: text
    content: Ary nahita aho sady nandre feon’anjely maro manodidina ny seza fiandrianana sy ny zava-manan-aina ary ny loholona,
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' ary ny isany dia alinalina sy arivoarivo, '
  '12':
  - type: text
    content: 'nanao tamin’ny feo mahery hoe:'
  - type: text
    content: Ny Zanak’ondry, Izay novonoina,
  - type: text
    content: Dia mendrika handray hery sy harena sy fahendrena
  - type: text
    content: Sy faherezana sy haja sy voninahitra ary saotra.
  '13':
  - type: text
    content: 'Ary izao zavatra ary rehetra izao, na izay any an-danitra, na izay etỳ ambonin’ny tany sy any ambanin’ny tany, na izay any an-dranomasina mbamin’izay rehetra ao anatiny, dia reko samy nanao hoe:'
  - type: text
    content: Ho an’Ilay mipetraka eo ambonin’ny seza fiandrianana
  - type: text
    content: Sy ho an’ny Zanak’ondry anie
  - type: text
    content: Ny saotra sy ny haja sy ny voninahitra ary ny fanjakana
  - type: text
    content: Mandrakizay mandrakizay.
  '14':
  - type: text
    content: 'Ary ny zava-manan-aina efatra nanao hoe: Amena. Ary ny loholona'
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' dia niankohoka ka nivavaka.'
  '2':
  - type: text
    content: 'Ary hitako fa, indro, nisy anjely mahery niantso tamin’ny feo mafy hoe: Iza no mendrika hanokatra ny boky sy hamaha ny tombo-kaseny? '
  '3':
  - type: text
    content: 'Ary tsy nisy tany an-danitra, na tetỳ an-tany, na tany ambanin’ny tany, nahasokatra ny boky na nahajery azy. '
  '4':
  - type: text
    content: 'Ary nitomany mafy aho, satria tsy nisy hita mendrika hanokatra ny boky na hijery azy. '
  '5':
  - type: text
    content: Ary ny anankiray tamin’ny loholona
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' nanao tamiko hoe: Aza mitomany; indro, ny Liona avy amin’ny firenen’i Joda, dia ny Solofon’i Davida, no efa naharesy ka hanokatra ny boky sy hamaha ny tombo-kaseny fito.'
  '6':
  - type: text
    content: Ary hitako fa, indro, teo afovoan’ny seza fiandrianana sy ny zava-manan-aina efatra ary teo afovoan’ny loholona
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' dia nisy Zanak’ondry nitsangana tahaka ny efa voavono, nanan-tandroka fito sy maso fito, dia ny Fanahy fiton’Andriamanitra nirahina hankany amin’ny tany rehetra. '
  '7':
  - type: text
    content: 'Ary tonga Izy ka nandray '
  - type: text
    content: ny boky
  - type: text
    content: ' teo an-tànana ankavanan’Ilay nipetraka teo ambonin’ny seza fiandrianana. '
  '8':
  - type: text
    content: Ary rehefa nandray ny boky Izy, ny zava-manana-aina efatra sy ny loholona
  - type: note
    content: Gr. presbytera.
  - type: text
    content: ' efatra amby roa-polo dia niankohoka teo anatrehan’ny Zanak’ondry, sady samy nanana lokanga sy lovia volamena feno ditin-kazo manitra izy, dia vavaka ataon’ny olona masina izany. '
  '9':
  - type: text
    content: 'Ary nihira fihiram-baovao izy ka nanao hoe:'
  - type: text
    content: Hianao no mendrika haka ny boky sy hamaha ny tombo-kaseny;
  - type: text
    content: Fa voavono Hianao,
  - type: text
    content: Ary ny ranao no nanavotanao
  - type: note
    content: Gr. nividiananao.
  - type: text
    content: ' ho an’Andriamanitra'
  - type: text
    content: Olona avy tamin’ny fokom-pirenena rehetra sy ny samy hafa fiteny
  - type: text
    content: Sy ny olona ary ny firenena rehetra;
