document_id: REV.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandraisan’ny Mpanavotra ny boky izay nisy tombo-kase fito, sy ny hira natao ho fiderana Azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY hitako fa, indro, nisy boky voasoratra tao anatiny sy teo ivohony, voapetaka mafy tamin’ny tombo-kase fito, teo an-tànana ankavanan’Ilay nipetraka teo ambonin’ny seza fiandrianana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitako fa, indro, nisy anjely mahery niantso tamin’ny feo mafy hoe: Iza no mendrika hanokatra ny boky sy hamaha ny tombo-kaseny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tsy nisy tany an-danitra, na tetỳ an-tany, na tany ambanin’ny tany, nahasokatra ny boky na nahajery azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nitomany mafy aho, satria tsy nisy hita mendrika hanokatra ny boky na hijery azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny anankiray tamin’ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' nanao tamiko hoe: Aza mitomany; indro, ny Liona avy amin’ny firenen’i Joda, dia ny Solofon’i Davida, no efa naharesy ka hanokatra ny boky sy hamaha ny tombo-kaseny fito.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary hitako fa, indro, teo afovoan’ny seza fiandrianana sy ny zava-manan-aina efatra ary teo afovoan’ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' dia nisy Zanak’ondry nitsangana tahaka ny efa voavono, nanan-tandroka fito sy maso fito, dia ny Fanahy fiton’Andriamanitra nirahina hankany amin’ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tonga Izy ka nandray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny boky
  - type: text
    text: ' teo an-tànana ankavanan’Ilay nipetraka teo ambonin’ny seza fiandrianana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary rehefa nandray ny boky Izy, ny zava-manana-aina efatra sy ny loholona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' efatra amby roa-polo dia niankohoka teo anatrehan’ny Zanak’ondry, sady samy nanana lokanga sy lovia volamena feno ditin-kazo manitra izy, dia vavaka ataon’ny olona masina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nihira fihiram-baovao izy ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao no mendrika haka ny boky sy hamaha ny tombo-kaseny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa voavono Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ranao no nanavotanao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nividiananao.
    marker-yv: yv-n
  - type: text
    text: ' ho an’Andriamanitra'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Olona avy tamin’ny fokom-pirenena rehetra sy ny samy hafa fiteny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny olona ary ny firenena rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary efa nataonao fanjakana sy mpisorona ho an’Andriamanitsika ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manjaka ambonin’ny tany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nahita aho sady nandre feon’anjely maro manodidina ny seza fiandrianana sy ny zava-manan-aina ary ny loholona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' ary ny isany dia alinalina sy arivoarivo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'nanao tamin’ny feo mahery hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Zanak’ondry, Izay novonoina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mendrika handray hery sy harena sy fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy faherezana sy haja sy voninahitra ary saotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izao zavatra ary rehetra izao, na izay any an-danitra, na izay etỳ ambonin’ny tany sy any ambanin’ny tany, na izay any an-dranomasina mbamin’izay rehetra ao anatiny, dia reko samy nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho an’Ilay mipetraka eo ambonin’ny seza fiandrianana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho an’ny Zanak’ondry anie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny saotra sy ny haja sy ny voninahitra ary ny fanjakana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrakizay mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny zava-manan-aina efatra nanao hoe: Amena. Ary ny loholona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: presbytera.
    marker-yv: yv-n
  - type: text
    text: ' dia niankohoka ka nivavaka.'
