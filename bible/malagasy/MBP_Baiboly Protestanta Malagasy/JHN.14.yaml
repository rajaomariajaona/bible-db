document_id: JHN.14,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nampiononan’i Jesosy ny fon’ny mpianatra, sy ny nilazany ny amin’ny Fanahy Masina.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: AZA malahelo ny fonareo; minoa an’Andriamanitra, ary minoa Ahy koa.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mino an’Andriamanitra hianareo, dia minoa Ahy koa.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mino va hianao fa Izaho ao amin’ny Ray, ary ny Ray ato amiko? Ny teny izay lazaiko aminareo, dia tsy avy amiko izany lazaiko izany; fa ny Ray mitoetra ato amiko no manao ny asa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Minoa Ahy fa Izaho ao amin’ny Ray, ary ny Ray ato amiko; fa raha tsy izany, dia minoa Ahy noho ny asa ihany aza.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina dia marina tokoa: Izay mino Ahy, ny asa ataoko no hataony koa; ary hanao asa lehibe noho izany aza izy, satria Izaho mankany amin’ny Ray. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na inona na inona no hangatahinareo amin’ny anarako, dia hataoko izany, mba hankalazana ny Ray eo amin’ny Zanaka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mangataka zavatra amiko amin’ny anarako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[mangataka zavatra amin’ny anarako].'
      marker-yv: yv-n
    - type: text
      text: ' hianareo, dia hataoko izany.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tia Ahy hianareo, dia hitandrina ny didiko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Izaho hangataka amin’ny Ray, ary Izy hanome anareo Mpananatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Parakleto, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mpanampy, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mpampahery, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Solovava.
      marker-yv: yv-n
    - type: text
      text: ' hafa mba ho eo aminareo mandrakizay, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ny Fanahin’ny fahamarinana, Izay tsy azon’izao tontolo izao horaisina, satria tsy hitany na fantany; fa hianareo no mahafantatra Azy, satria mitoetra eo aminareo Izy, ary ho ao anatinareo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hamela anareo ho kamboty Aho; hankatỳ aminareo Aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vetivety foana dia tsy hahita Ahy intsony izao tontolo izao; fa hianareo no hahita Ahy; satria velona Aho dia ho velona koa hianareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao an-tranon’ny Raiko misy fitoerana maro; raha tsy izany, dia efa nilaza taminareo Aho; fa handeha hamboatra fitoerana ho anareo Aho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’izany andro izany dia ho fantatrareo fa Izaho ao amin’ny Raiko, ary hianareo ato amiko, ary Izaho ao aminareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manana ny didiko ka mitandrina izany, dia izy no tia Ahy; ary izay tia Ahy no ho tian’ny Raiko, ary Izaho ho tia azy ka hiseho aminy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jodasy (tsy Iskariota) taminy: Tompoko, nahoana no aminay ihany no hisehoanao, fa tsy amin’izao tontolo izao koa? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesosy namaly ka nanao taminy hoe: Raha misy tia Ahy, dia hitandrina ny teniko izy; ary ny Raiko ho tia azy, ary hankao aminy Izahay ka honina ao aminy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay tsy tia Ahy dia tsy mitandrina ny teniko; ary ny teny izay renareo dia tsy Ahy, fa an’ny Ray Izay naniraka Ahy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany teny izany dia efa voalazako taminareo raha mbola mitoetra eto aminareo Aho; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny Mpananatra,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Parakleto, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'dia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mpanampy, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mpampahery, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Solovava.
      marker-yv: yv-n
    - type: text
      text: ' dia ny Fanahy Masina, Izay hirahin’ny Ray amin’ny anarako. Izy no hampianatra anareo ny zavatra rehetra sy hampahatsiaro anareo ny zavatra rehetra izay nolazaiko taminareo.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fiadanana no avelako ho anareo, ny fiadanako no omeko anareo; tsy tahaka ny fanomen’izao tontolo izao no fanomeko anareo. Aza malahelo na matahotra ny fonareo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa renareo fa Izaho nilaza taminareo hoe: Handeha Aho, nefa ho avy aminareo indray. Raha tia Ahy hianareo, dia ho faly, satria mankany amin’ny Ray Aho; fa ny Ray dia lehibe noho Izaho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny efa nilaza taminareo Aho, dieny tsy mbola tonga izany, mba hinoanareo, rehefa tonga. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha handeha hamboatra fitoerana ho anareo Aho, dia ho avy indray ka handray anareo ho any amiko, ka izay itoerako no hitoeranareo koa. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hilaza zavatra maro aminareo intsony Aho; fa avy ny andrianan’izao tontolo izao, nefa tsy manana na inona na inona ato amiko izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa mba ho fantatr’izao tontolo izao fa tiako ny Ray, ary araka izay nandidian’ny Ray Ahy, dia izany no hataoko.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitsangàna, andeha isika hiala eto.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary fantatrareo koa ny làlana ho any amin’izay halehako.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[ary izay alehako dia fantatrareo, ary fantatrareo koa ny làlana.]'
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Tomasy taminy: Tompoko, tsy fantatray izay alehanao; ka hataonay ahoana no fahafantatra ny làlana? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jesosy taminy: Izaho no làlana sy fahamarinana ary fiainana; tsy misy olona mankany amin’ny Ray, afa-tsy amin’ny alalako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha nahafantatra Ahy hianareo, dia ho nahafantatra ny Raiko koa; ary hatramin’izao dia mahafantatra Azy hianareo sady efa nahita Azy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Filipo taminy: Tompoko, asehoy anay ny Ray, dia ampy ho anay izay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jesosy taminy: Izay ela izay no efa nitoerako teto aminareo, ka tsy mbola fantatrao ihany va Aho, ry Filipo? Izay nahita Ahy dia nahita ny Ray; koa ahoana no anaovanareo hoe: Asehoy anay ny Ray? '
