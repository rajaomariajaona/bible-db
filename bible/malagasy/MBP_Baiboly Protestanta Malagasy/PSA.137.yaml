document_id: PSA.137,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fahatsiarovana ny alahelon’ny babo tany Babylona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: TEO amoron’ny onin’i Babylona no nipetrahanay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nitomanianay, raha nahatsiaro an’i Ziona.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo amin’ny hazomalahelo teo afovoan’i Babylona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No nanantonanay ny lokanganay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa teo dia nangataka anay hihira izay namabo anay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary izay nampahory anay nangataka anay hanao fifaliana ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova hiran’i Ziona eto anatrehanay.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ho nataontsika ahoana no fihira ny fihiran’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany an-tany nivahiniana?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manadino anao aho, ry Jerosalema ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka kosa ny tànako ankavanana mba hanadino.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy mahatsiaro anao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny lelako hiraikitra amin’ny lanilaniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy Jerosalema no ataoko ambony indrindra amin’ny fifaliako rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, tsarovy amin’ny taranak’i Edoma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny andron’i Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia ireo izay nanao hoe: Ravao, ravao izy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny fanorenany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Babylona zanakavavy izay efa resy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '137.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho resy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay mamaly anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka izay nataonao taminay.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay maka ny zanakao madinika ka manjera azy ho torotoro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny harambato.
