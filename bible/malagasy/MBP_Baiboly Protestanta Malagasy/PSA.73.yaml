document_id: PSA.73,873
type_code: plt
verses:
  '1':
  - type: heading
    content: BOKY FAHATELO
  - type: heading
    content: Ny amin’ny tsy hahaketraka ny olon’Andriamanitra, raha mahita ny ratsy fanahy ambinina.
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: ANDRIAMANITRA mahasoa ny Isiraely tokoa,
  - type: text
    content: Dia ny madio fo.
  '10':
  - type: text
    content: Izany no itodihan’ny olony hankany aminy;
  - type: text
    content: Ary rano be no gohin’ireny;
  '11':
  - type: text
    content: 'Ka hoy izy: Hataon’Andriamanitra ahoana no fahalala?'
  - type: text
    content: Ary manam-pahalalana va ny Avo Indrindra?
  '12':
  - type: text
    content: Indro, ireny dia olona ratsy fanahy;
  - type: text
    content: Miadana mandrakariva izy ka mitombo harena.
  '13':
  - type: text
    content: Foana mihitsy ny nanadiovako ny foko
  - type: text
    content: Sy ny nanasako ny tànako tamin’ny fahamarinana.
  '14':
  - type: text
    content: Azom-pahoriana mandritra ny andro aho,
  - type: text
    content: Ary faizana isa-maraina.
  '15':
  - type: text
    content: 'Raha tàhiny aho nanao hoe: Hiteny izany aho,'
  - type: text
    content: Dia ho namitaka ireo zanakao.
  '16':
  - type: text
    content: Dia nieritreritra ta-hahalala izany zavatra izany aho,
  - type: text
    content: Kanjo sarotra teo imasoko izany,
  '17':
  - type: text
    content: Mandra-piditro tao amin’ny fitoera-masin’Andriamanitra
  - type: text
    content: Ka nihevitra izay ho farany.
  '18':
  - type: text
    content: Eo amin’izay mahasolafaka tokoa no ametrahanao azy,
  - type: text
    content: Ary aripakao ho ringana izy.
  '19':
  - type: text
    content: Hià! rava indray mipì-maso izy!
  - type: text
    content: Levona izy, matin-java-mahatahotra izy!
  '2':
  - type: text
    content: Fa izaho, dia saiky nibolasitra ny tongotro;
  - type: text
    content: Saiky solafaka ny diako,
  '20':
  - type: text
    content: Tahaka ny anaovan’ny olona ny nofiny ho tsinontsinona,
  - type: text
    content: Dia tahaka izany, Tompo ô, no anaovanao ny endrik’ireny ho tsinontsinona, raha mifoha Hianao.
  '21':
  - type: text
    content: Raha lotika ny foko,
  - type: text
    content: Ka voatsindrona ny voako,
  '22':
  - type: text
    content: Dia ketrina aho ka tsy nahalala;
  - type: text
    content: Eny, biby
  - type: note
    content: 'Na: hipopotamosy.'
  - type: text
    content: ' teo anatrehanao aho.'
  '23':
  - type: text
    content: Nefa izaho dia eo aminao ihany mandrakariva,
  - type: text
    content: Mihazona ny tànako ankavanana Hianao.
  '24':
  - type: text
    content: Ny saina omenao no hitondranao ahy,
  - type: text
    content: Ary rehefa afaka izany, dia horaisinao ho amin’ny voninahitra aho.
  '25':
  - type: text
    content: Iza no ahy any an-danitra?
  - type: text
    content: Ary tsy misy etỳ ambonin’ny tany iriko tahaka Anao.
  '26':
  - type: text
    content: Na dia levona aza ny nofoko sy ny foko,
  - type: text
    content: Dia mbola vatolampin’ny foko sy anjarako mandrakizay Andriamanitra.
  '27':
  - type: text
    content: Fa, indro, very izay lavitra Anao;
  - type: text
    content: Aringanao izay rehetra mijangajanga mahafoy Anao.
  '28':
  - type: text
    content: Fa, izaho, dia ny ho akaikin’Andriamanitra no mahatsara ahy;
  - type: text
    content: Hianao, Jehovah Tompo ô, no nataoko aroko,
  - type: text
    content: Mba hilaza ny asanao rehetra aho.
  '3':
  - type: text
    content: Satria nialona ny mpirehareha aho,
  - type: text
    content: Raha nahita ny fiadanan’ny ratsy fanahy.
  '4':
  - type: text
    content: Fa tsy misy fanaintainana amin’ny fahafatesany,
  - type: text
    content: Ary fatratra ny heriny.
  '5':
  - type: text
    content: Tsy mba misy manavesatra azy, tahaka ny olona sasany,
  - type: text
    content: Ary tsy mba azom-pahoriana tahaka ny olon-kafa izy.
  '6':
  - type: text
    content: Dia izany no iambozonany rehareha toy ny rojo,
  - type: text
    content: Sy itafiany fahalozana tahaka ny lamba.
  '7':
  - type: text
    content: Bongon-tavy ny masony;
  - type: text
    content: Miloatra ny hevitry ny fony.
  '8':
  - type: text
    content: Manazimbazimba izy ka miresaka fampahoriana an-dolompo;
  - type: text
    content: Avo vava izy.
  '9':
  - type: text
    content: Manao vava manakatra ny lanitra izy,
  - type: text
    content: Ary ny lelany mandeha mitety ny tany.
