document_id: PSA.73,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOKY FAHATELO
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny tsy hahaketraka ny olon’Andriamanitra, raha mahita ny ratsy fanahy ambinina.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Salamo nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ANDRIAMANITRA mahasoa ny Isiraely tokoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny madio fo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Izany no itodihan’ny olony hankany aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rano be no gohin’ireny;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ka hoy izy: Hataon’Andriamanitra ahoana no fahalala?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manam-pahalalana va ny Avo Indrindra?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Indro, ireny dia olona ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miadana mandrakariva izy ka mitombo harena.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Foana mihitsy ny nanadiovako ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny nanasako ny tànako tamin’ny fahamarinana.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Azom-pahoriana mandritra ny andro aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary faizana isa-maraina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Raha tàhiny aho nanao hoe: Hiteny izany aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho namitaka ireo zanakao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia nieritreritra ta-hahalala izany zavatra izany aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo sarotra teo imasoko izany,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mandra-piditro tao amin’ny fitoera-masin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nihevitra izay ho farany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Eo amin’izay mahasolafaka tokoa no ametrahanao azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aripakao ho ringana izy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hià! rava indray mipì-maso izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levona izy, matin-java-mahatahotra izy!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa izaho, dia saiky nibolasitra ny tongotro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saiky solafaka ny diako,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tahaka ny anaovan’ny olona ny nofiny ho tsinontsinona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka izany, Tompo ô, no anaovanao ny endrik’ireny ho tsinontsinona, raha mifoha Hianao.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Raha lotika ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka voatsindrona ny voako,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia ketrina aho ka tsy nahalala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, biby
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '73.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hipopotamosy.
      marker-yv: yv-n
    - type: text
      text: ' teo anatrehanao aho.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Nefa izaho dia eo aminao ihany mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihazona ny tànako ankavanana Hianao.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny saina omenao no hitondranao ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa afaka izany, dia horaisinao ho amin’ny voninahitra aho.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Iza no ahy any an-danitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy etỳ ambonin’ny tany iriko tahaka Anao.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Na dia levona aza ny nofoko sy ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mbola vatolampin’ny foko sy anjarako mandrakizay Andriamanitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa, indro, very izay lavitra Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aringanao izay rehetra mijangajanga mahafoy Anao.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa, izaho, dia ny ho akaikin’Andriamanitra no mahatsara ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao, Jehovah Tompo ô, no nataoko aroko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hilaza ny asanao rehetra aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Satria nialona ny mpirehareha aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nahita ny fiadanan’ny ratsy fanahy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tsy misy fanaintainana amin’ny fahafatesany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fatratra ny heriny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy mba misy manavesatra azy, tahaka ny olona sasany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mba azom-pahoriana tahaka ny olon-kafa izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dia izany no iambozonany rehareha toy ny rojo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy itafiany fahalozana tahaka ny lamba.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Bongon-tavy ny masony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miloatra ny hevitry ny fony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Manazimbazimba izy ka miresaka fampahoriana an-dolompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avo vava izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Manao vava manakatra ny lanitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lelany mandeha mitety ny tany.
