document_id: ACT.19,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'ARY raha mbola tany Korinto Apolosy, dia nitety ny tany ambony Paoly ka tonga tany Efesosy, dia nahita mpianatra sasany teo izy '
  '10':
  - type: text
    content: Ary naharitra roa taona ngarangidina izany, ka dia nandre ny tenin’ny Tompo izay rehetra nonina tany Asia, na Jiosy na jentilisa.
  - type: note
    content: Gr. Grika.
  '11':
  - type: text
    content: 'Ary ny tànan’i Paoly no nanaovan’Andriamanitra fahagagana lehibe maro, '
  '12':
  - type: text
    content: ka dia ny mosara sy ny fiaron’akanjo teny aminy no nentina hatao amin’ny marary, dia sitrana ny aretiny, ary nivoaka ny fanahy ratsy.
  '13':
  - type: text
    content: 'Ary nisy Jiosy sasany, mpiriorio mamoaka fanahy ratsy, izay ninia nanonona ny anaran’i Jesosy Tompo koa teo ambonin’ny manana fanahy ratsy ka nanao hoe: Mampianiana anareo amin’i Jesosy Izay torin’i Paoly aho. '
  '14':
  - type: text
    content: 'Ary nisy fito mirahalahy, zanak’i Skeva, Jiosy, lohan’ny mpisorona, izay nanao izany. '
  '15':
  - type: text
    content: 'Ary ny fanahy ratsy namaly ka nanao taminy hoe: Fantatro Jesosy, ary fantatro koa Paoly; fa mba iza kosa moa hianareo? '
  '16':
  - type: text
    content: Ary ny lehilahy izay nanana ny fanahy ratsy dia niantsambotra tamin’ireo ary nahery ka naharesy azy roa lahy, dia nandositra niala tamin’izany trano izany ireo sady nitanjaka no voaratra.
  '17':
  - type: text
    content: 'Ary fantatry ny Jiosy sy ny jentilisa rehetra izay nonina tany Efesosy izany; dia raiki-tahotra ny olona rehetra ka nankalaza ny anaran’i Jesosy Tompo. '
  '18':
  - type: text
    content: 'Ary maro izay nino dia tonga ka niaiky sy nilaza ny asany. '
  '19':
  - type: text
    content: 'Ary maro ny mpanao ody no nanangona ny bokiny ka nandoro azy teo imason’ny olona rehetra; ary nony voatontaly ny tokom-bidiny, dia hita fa volafotsy dimy alina izany '
  '2':
  - type: text
    content: 'ka nanao taminy hoe: Efa noraisinareo va ny Fanahy Masina, fony vao nino hianareo? Fa ireo nanao taminy hoe: Tsy renay akory fa efa '
  - type: text
    content: nomena
  - type: text
    content: ' ny Fanahy Masina. '
  '20':
  - type: text
    content: Fatratra toy izany no fandroson’ny tenin’Andriamanitra sy ny heriny.
  '21':
  - type: text
    content: 'Ary rehefa vita izany zavatra izany, Paoly dia nikasa tao am-pony handeha hamaky an’i Makedonia sy Akaia aloha vao hankany Jerosalema ka nanao hoe: Rehefa tonga any aho, dia tsy maintsy hahita an’i Roma koa. '
  '22':
  - type: text
    content: Ary ny roa lahy tamin’izay nanompo azy, dia Timoty sy Erasto, no nirahiny nankany Makedonia; fa izy mbola nitoetra tany Asia andro vitsivitsy kosa.
  - type: heading
    content: Ny tabataba nataon’i Demetrio sy ny namany tao Efesosy.
  '23':
  - type: text
    content: ARY tamin’izany andro izany dia nisy tabataba be ihany ny amin’izany fampianarana
  - type: note
    content: Gr. làlana.
  - type: text
    content: ' izany. '
  '24':
  - type: text
    content: Fa nisy lehilahy anankiray atao hoe Demetrio, mpanefy volafotsy, izay nanao sarin’ny tempolin’i Diana
  - type: note
    content: Gr. Artemisy.
  - type: text
    content: ' tamin’ny volafotsy, dia nampahazo harena be ny mpanefy; '
  '25':
  - type: text
    content: 'ireny mbamin’ny mpanao zavatra hafa koa toy izany dia nantsoiny hiangona ka nilazany hoe: Tompokolahy, fantatrareo fa amin’izao tao-zavatra izao no ahazoantsika harena. '
  '26':
  - type: text
    content: 'Ary hitanareo sy renareo fa tsy eto Efesosy ihany, fa saiky manerana an’i Asia rehetra dia mitaona olona betsaka izany Paoly izany ka mampivily ny sainy manao hoe: Tsy Andriamanitra izay zavatra nataon-tànana. '
  '27':
  - type: text
    content: Ka dia tsy izao raharahantsika izao ihany no ahina hatao ho zava-poana; fa ny tempolin’i Diana, andriamani-bavy lehibe, dia hatao tsinontsinona koa aza, ka ho afa-boninahitra ilay ivavahan’i Asia rehetra sy izao tontolo izao.
  '28':
  - type: text
    content: 'Ary rehefa nandre izany izy ireo, dia tezitra loatra ka niantso hoe: Lehibe Dianan’ny Efesiana! '
  '29':
  - type: text
    content: 'Ary nanerana ny tanàna ny tabataba; ary rehefa nisarika an’i Gaio sy Aristarko, lehilahy Makedoniana niara-dia tamin’i Paoly, izy, dia niray saina niriotra ho ao an-trano filalaovana. '
  '3':
  - type: text
    content: 'Ary hoy Paoly: Ho amin’inona ary no nanaovana batisa anareo? Dia hoy ireo: Ho amin’ny batisan’i Jaona. '
  '30':
  - type: text
    content: 'Ary raha te-hiditra ho any amin’ny olona Paoly, dia tsy navelan’ny mpianatra. '
  '31':
  - type: text
    content: Ary ny lehibe sasany tany Asia,
  - type: note
    content: Gr. Asiarka.
  - type: text
    content: ' izay sakaizany, dia nampitondra teny nananatra azy mba tsy ho sahy hiditra ao an-trano filalaovana. '
  '32':
  - type: text
    content: 'Ary ny sasany niantso zavatra iray, ary ny sasany kosa zavatra hafa; fa nihorikorika ny olona vory; koa ny ankamaroany tsy nahalala izay anton’ny niangonany teo. '
  '33':
  - type: text
    content: 'Ary nisy nisarika an’i Aleksandro avy teo amin’ny vahoaka, fa ny Jiosy nanesika azy handroso. Ary Aleksandro nanofa tànana, fa ta-handaha-teny hiala tsiny tamin’ny olona. '
  '34':
  - type: text
    content: 'Fa rehefa fantatry ny olona fa Jiosy izy, dia niredona niantso tokony ho ora roa izy rehetra hoe: Lehibe Dianan’ny Efesiana!'
  '35':
  - type: text
    content: 'Ary ny mpitahiry ny didy dia nampangina ny olona ka nanao hoe: Ry lehilahy Efesiana, iza no olona tsy mahalala fa ny tanànan’ny Efesiana no mpitahiry an’i Diana lehibe sy '
  - type: text
    content: ny sarin-javatra
  - type: text
    content: ' izay latsaka avy tamin’i Jopitera?'
  - type: note
    content: Gr. Zeosy.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Ary satria tsy azo toherina izany, dia tokony hangina hianareo ka tsy hanao na inona na inona an-kamehana. '
  '37':
  - type: text
    content: 'Fa nentinareo etỳ ireo lehilahy ireo, izay tsy nandroba tempoly, na niteny ratsy ny andriamanitsika. '
  '38':
  - type: text
    content: 'Koa raha manan-teny hifamaliana amin’olona Demetrio sy ny mpanefy izay momba azy, aoka hifandahatra izy, fa misy ihany ny andro hitsarana, ary ao ihany koa ireo governora. '
  '39':
  - type: text
    content: 'Fa raha mitady zavatra hafa kosa hianareo, dia hotsaraina amin’izay fivoriana voatendrin’ny lalàna. '
  '4':
  - type: text
    content: 'Fa hoy Paoly: Jaona nanao ny batisan’ny fibebahana ka nilaza tamin’ny olona hino Izay ho avy manaraka azy, dia Jesosy. '
  '40':
  - type: text
    content: 'Fa andrao ampangaina isika noho ny tabataba tsy misy antony izay niseho andro-any, ka tsy hita izay hilazantsika izao fampitairana izao. '
  '41':
  - type: text
    content: Ary rehefa nilaza izany izy, dia nampirava ny olona vory teo.
  '5':
  - type: text
    content: 'Ary raha nahare izany izy, dia natao batisa ho amin’ny anaran’i Jesosy Tompo. '
  '6':
  - type: text
    content: 'Ary rehefa nametrahan’i Paoly tànana izy, dia nilatsaka taminy ny Fanahy Masina; ary niteny tamin’ny teny tsy fantatra izy sady naminany. '
  '7':
  - type: text
    content: Ary tokony ho roa ambin’ny folo lahy no isan’izy rehetra.
  '8':
  - type: text
    content: 'Ary Paoly niditra tao amin’ny synagoga ka niteny tamin’ny fahasahiana, dia niady hevitra telo volana ka nampanaiky ny amin’ny fanjakan’Andriamanitra. '
  '9':
  - type: text
    content: Fa raha nikiribiby ny sasany ka tsy nanaiky, fa niteny ratsy izany fampianarana
  - type: note
    content: Gr. làlana.
  - type: text
    content: ' izany teo imason’ny olona maro, dia niala tamin’ireo izy ka nitondra ny mpianatra nitokana, dia niady hevitra isan-andro tao amin’ny trano fampianaran’i Tyrano. '
