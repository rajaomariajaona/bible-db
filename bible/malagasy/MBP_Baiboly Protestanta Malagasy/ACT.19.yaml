document_id: ACT.19
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY raha mbola tany Korinto Apolosy, dia nitety ny tany ambony Paoly ka tonga tany Efesosy, dia nahita mpianatra sasany teo izy '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nanao taminy hoe: Efa noraisinareo va ny Fanahy Masina, fony vao nino hianareo? Fa ireo nanao taminy hoe: Tsy renay akory fa efa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nomena
  - type: text
    text: ' ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Paoly: Ho amin’inona ary no nanaovana batisa anareo? Dia hoy ireo: Ho amin’ny batisan’i Jaona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hoy Paoly: Jaona nanao ny batisan’ny fibebahana ka nilaza tamin’ny olona hino Izay ho avy manaraka azy, dia Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha nahare izany izy, dia natao batisa ho amin’ny anaran’i Jesosy Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa nametrahan’i Paoly tànana izy, dia nilatsaka taminy ny Fanahy Masina; ary niteny tamin’ny teny tsy fantatra izy sady naminany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary tokony ho roa ambin’ny folo lahy no isan’izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Paoly niditra tao amin’ny synagoga ka niteny tamin’ny fahasahiana, dia niady hevitra telo volana ka nampanaiky ny amin’ny fanjakan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha nikiribiby ny sasany ka tsy nanaiky, fa niteny ratsy izany fampianarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' izany teo imason’ny olona maro, dia niala tamin’ireo izy ka nitondra ny mpianatra nitokana, dia niady hevitra isan-andro tao amin’ny trano fampianaran’i Tyrano. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary naharitra roa taona ngarangidina izany, ka dia nandre ny tenin’ny Tompo izay rehetra nonina tany Asia, na Jiosy na jentilisa.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grika.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny tànan’i Paoly no nanaovan’Andriamanitra fahagagana lehibe maro, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ka dia ny mosara sy ny fiaron’akanjo teny aminy no nentina hatao amin’ny marary, dia sitrana ny aretiny, ary nivoaka ny fanahy ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nisy Jiosy sasany, mpiriorio mamoaka fanahy ratsy, izay ninia nanonona ny anaran’i Jesosy Tompo koa teo ambonin’ny manana fanahy ratsy ka nanao hoe: Mampianiana anareo amin’i Jesosy Izay torin’i Paoly aho. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nisy fito mirahalahy, zanak’i Skeva, Jiosy, lohan’ny mpisorona, izay nanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny fanahy ratsy namaly ka nanao taminy hoe: Fantatro Jesosy, ary fantatro koa Paoly; fa mba iza kosa moa hianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny lehilahy izay nanana ny fanahy ratsy dia niantsambotra tamin’ireo ary nahery ka naharesy azy roa lahy, dia nandositra niala tamin’izany trano izany ireo sady nitanjaka no voaratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary fantatry ny Jiosy sy ny jentilisa rehetra izay nonina tany Efesosy izany; dia raiki-tahotra ny olona rehetra ka nankalaza ny anaran’i Jesosy Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary maro izay nino dia tonga ka niaiky sy nilaza ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary maro ny mpanao ody no nanangona ny bokiny ka nandoro azy teo imason’ny olona rehetra; ary nony voatontaly ny tokom-bidiny, dia hita fa volafotsy dimy alina izany '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fatratra toy izany no fandroson’ny tenin’Andriamanitra sy ny heriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary rehefa vita izany zavatra izany, Paoly dia nikasa tao am-pony handeha hamaky an’i Makedonia sy Akaia aloha vao hankany Jerosalema ka nanao hoe: Rehefa tonga any aho, dia tsy maintsy hahita an’i Roma koa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ny roa lahy tamin’izay nanompo azy, dia Timoty sy Erasto, no nirahiny nankany Makedonia; fa izy mbola nitoetra tany Asia andro vitsivitsy kosa.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tabataba nataon’i Demetrio sy ny namany tao Efesosy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ARY tamin’izany andro izany dia nisy tabataba be ihany ny amin’izany fampianarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: làlana.
    marker-yv: yv-n
  - type: text
    text: ' izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa nisy lehilahy anankiray atao hoe Demetrio, mpanefy volafotsy, izay nanao sarin’ny tempolin’i Diana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Artemisy.
    marker-yv: yv-n
  - type: text
    text: ' tamin’ny volafotsy, dia nampahazo harena be ny mpanefy; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ireny mbamin’ny mpanao zavatra hafa koa toy izany dia nantsoiny hiangona ka nilazany hoe: Tompokolahy, fantatrareo fa amin’izao tao-zavatra izao no ahazoantsika harena. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hitanareo sy renareo fa tsy eto Efesosy ihany, fa saiky manerana an’i Asia rehetra dia mitaona olona betsaka izany Paoly izany ka mampivily ny sainy manao hoe: Tsy Andriamanitra izay zavatra nataon-tànana. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ka dia tsy izao raharahantsika izao ihany no ahina hatao ho zava-poana; fa ny tempolin’i Diana, andriamani-bavy lehibe, dia hatao tsinontsinona koa aza, ka ho afa-boninahitra ilay ivavahan’i Asia rehetra sy izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary rehefa nandre izany izy ireo, dia tezitra loatra ka niantso hoe: Lehibe Dianan’ny Efesiana! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nanerana ny tanàna ny tabataba; ary rehefa nisarika an’i Gaio sy Aristarko, lehilahy Makedoniana niara-dia tamin’i Paoly, izy, dia niray saina niriotra ho ao an-trano filalaovana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary raha te-hiditra ho any amin’ny olona Paoly, dia tsy navelan’ny mpianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary ny lehibe sasany tany Asia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Asiarka.
    marker-yv: yv-n
  - type: text
    text: ' izay sakaizany, dia nampitondra teny nananatra azy mba tsy ho sahy hiditra ao an-trano filalaovana. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny sasany niantso zavatra iray, ary ny sasany kosa zavatra hafa; fa nihorikorika ny olona vory; koa ny ankamaroany tsy nahalala izay anton’ny niangonany teo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nisy nisarika an’i Aleksandro avy teo amin’ny vahoaka, fa ny Jiosy nanesika azy handroso. Ary Aleksandro nanofa tànana, fa ta-handaha-teny hiala tsiny tamin’ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa rehefa fantatry ny olona fa Jiosy izy, dia niredona niantso tokony ho ora roa izy rehetra hoe: Lehibe Dianan’ny Efesiana!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny mpitahiry ny didy dia nampangina ny olona ka nanao hoe: Ry lehilahy Efesiana, iza no olona tsy mahalala fa ny tanànan’ny Efesiana no mpitahiry an’i Diana lehibe sy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny sarin-javatra
  - type: text
    text: ' izay latsaka avy tamin’i Jopitera?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.35 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zeosy.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary satria tsy azo toherina izany, dia tokony hangina hianareo ka tsy hanao na inona na inona an-kamehana. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa nentinareo etỳ ireo lehilahy ireo, izay tsy nandroba tempoly, na niteny ratsy ny andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Koa raha manan-teny hifamaliana amin’olona Demetrio sy ny mpanefy izay momba azy, aoka hifandahatra izy, fa misy ihany ny andro hitsarana, ary ao ihany koa ireo governora. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa raha mitady zavatra hafa kosa hianareo, dia hotsaraina amin’izay fivoriana voatendrin’ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa andrao ampangaina isika noho ny tabataba tsy misy antony izay niseho andro-any, ka tsy hita izay hilazantsika izao fampitairana izao. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary rehefa nilaza izany izy, dia nampirava ny olona vory teo.
