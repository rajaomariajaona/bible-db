document_id: DEU.30
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa tonga aminao izany zavatra rehetra izany, dia ny fitahiana sy ny fanozonana izay nataoko teo anoloanao, ary mahatsiaro izany ao am-ponao any amin’ny firenena rehetra izay androahan’i Jehovah Andriamanitrao anao hianao, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka miverina amin’i Jehovah Andriamanitrao sy mihaino ny feony amin’ny fonao rehetra sy ny fanahinao rehetra, araka izay rehetra andidiako anao sy ny zanakao anio, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia hampodin’i Jehovah Andriamanitrao avy amin’ny fahababoanao hianao, ary hamindra fo aminao izy ka hanangona anao indray avy any amin’ny firenena rehetra izay nampielezan’i Jehovah Andriamanitrao anao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha misy aminao voaroaka any amin’ny faravodilanitra, dia avy any no hanangonan’i Jehovah Andriamanitrao anao, ary avy any indray no hanalany anao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hampidirin’i Jehovah Andriamanitrao ao amin’ny tany izay nolovan’ny razanao hianao, ka holovanao izany; ary hanisy soa anao Izy sy hahamaro anao mihoatra noho ny razanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoforan’i Jehovah Andriamanitrao ny fonao sy ny fon’ny taranakao hitiavanao an’i Jehovah Andriamanitrao amin’ny fonao rehetra sy ny fanahinao rehetra, mba ho velona hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hataon’i Jehovah Andriamanitrao amin’ny fahavalonao sy ny mankahala anao izay nanenjika anao ireny fanozonana rehetra ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hihaino ny feon’i Jehovah indray hianao ka hanaraka ny didiny rehetra, izay andidiako anao anio. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hataon’i Jehovah Andriamanitrao manana amby ampy hianao amin’izay hahasoa anao, dia amin’ny asan’ny tànanao sy ny ateraky ny kibonao sy ny ateraky ny biby fiompinao ary ny vokatry ny taninao; fa ho faly aminao indray Jehovah ka hahasoa anao, araka izay nahafaliany tamin’ny razanao, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: raha mihaino ny feon’i Jehovah Andriamanitrao hianao, hitandremanao ny didiny sy ny lalàny, izay voasoratra amin’ity bokin’ny lalàna ity, ka miverina amin’i Jehovah Andriamanitrao amin’ny fonao rehetra sy ny fanahinao rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao lalàna izao, izay andidiako anao anio, tsy dia saro-pantarina aminao, ary tsy lavitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy any an-danitra izany ka hanaovanao hoe: Iza no hiakatra any an-danitra haka azy ho antsika, mba hohenointsika ka harahintsika? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tsy any an-dafin’ny ranomasina izany ka hanaovanao hoe: Iza no hankany an-dafin’ny ranomasina haka azy ho antsika mba hohenointsika ka harahintsika? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa eo akaikinao indrindra ny teny, dia eo ambavanao sy ao am-ponao, mba harahinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Indro efa nataoko teo anoloanao andro-any ny fiainana sy ny soa ary ny fahafatesana sy ny loza, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'tamin’ny nandidiako anao andro-any ho tia an’i Jehovah Andriamanitrao ka handeha amin’ny làlany ary hitandrina ny didiny sy ny lalàny ary ny fitsipiny, mba ho velona hianao ka hihamaro, ary mba hitahian’i Jehovah Andriamanitrao anao any amin’ny tany izay efa hidiranao holovana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha mivily kosa ny fonao, ka tsy mihaino hianao, fa voataona hiankokoha eo anatrehan’izay andriamani-kafa sy hanompo azy, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia lazaiko aminareo anio fa ho ringana tokoa hianareo, ary tsy ho maro andro eo amin’ny tany izay efa hidiranao holovana, rehefa tafita an’i Jordana hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Miantso ny lanitra sy ny tany aho anio ho vavolombelona aminareo fa efa nataoko teo anoloanao ny fiainana sy ny fahafatesana ary ny fitahiana sy ny fanozonana; koa mifidiana ny fiainana, mba ho velona hianao sy ny taranakao, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: dia ny ho tia an’i Jehovah Andriamanitrao hianao ka hihaino ny feony sy hifikitra aminy; fa izany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izy.
    marker-yv: yv-n
  - type: text
    text: ' no fiainanao sy fahamaroan’ny andronao, mba honenanao eo amin’ny tany izay nianianan’i Jehovah tamin’i Abrahama sy Isaka ary Jakoba razanao, homena azy.'
