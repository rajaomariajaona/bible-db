document_id: DEU.30,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary rehefa tonga aminao izany zavatra rehetra izany, dia ny fitahiana sy ny fanozonana izay nataoko teo anoloanao, ary mahatsiaro izany ao am-ponao any amin’ny firenena rehetra izay androahan’i Jehovah Andriamanitrao anao hianao, '
  '10':
  - type: text
    content: raha mihaino ny feon’i Jehovah Andriamanitrao hianao, hitandremanao ny didiny sy ny lalàny, izay voasoratra amin’ity bokin’ny lalàna ity, ka miverina amin’i Jehovah Andriamanitrao amin’ny fonao rehetra sy ny fanahinao rehetra.
  '11':
  - type: text
    content: 'Fa izao lalàna izao, izay andidiako anao anio, tsy dia saro-pantarina aminao, ary tsy lavitra. '
  '12':
  - type: text
    content: 'Tsy any an-danitra izany ka hanaovanao hoe: Iza no hiakatra any an-danitra haka azy ho antsika, mba hohenointsika ka harahintsika? '
  '13':
  - type: text
    content: 'Ary tsy any an-dafin’ny ranomasina izany ka hanaovanao hoe: Iza no hankany an-dafin’ny ranomasina haka azy ho antsika mba hohenointsika ka harahintsika? '
  '14':
  - type: text
    content: Fa eo akaikinao indrindra ny teny, dia eo ambavanao sy ao am-ponao, mba harahinao.
  '15':
  - type: text
    content: 'Indro efa nataoko teo anoloanao andro-any ny fiainana sy ny soa ary ny fahafatesana sy ny loza, '
  '16':
  - type: text
    content: 'tamin’ny nandidiako anao andro-any ho tia an’i Jehovah Andriamanitrao ka handeha amin’ny làlany ary hitandrina ny didiny sy ny lalàny ary ny fitsipiny, mba ho velona hianao ka hihamaro, ary mba hitahian’i Jehovah Andriamanitrao anao any amin’ny tany izay efa hidiranao holovana. '
  '17':
  - type: text
    content: 'Fa raha mivily kosa ny fonao, ka tsy mihaino hianao, fa voataona hiankokoha eo anatrehan’izay andriamani-kafa sy hanompo azy, '
  '18':
  - type: text
    content: dia lazaiko aminareo anio fa ho ringana tokoa hianareo, ary tsy ho maro andro eo amin’ny tany izay efa hidiranao holovana, rehefa tafita an’i Jordana hianareo.
  '19':
  - type: text
    content: 'Miantso ny lanitra sy ny tany aho anio ho vavolombelona aminareo fa efa nataoko teo anoloanao ny fiainana sy ny fahafatesana ary ny fitahiana sy ny fanozonana; koa mifidiana ny fiainana, mba ho velona hianao sy ny taranakao, '
  '2':
  - type: text
    content: 'ka miverina amin’i Jehovah Andriamanitrao sy mihaino ny feony amin’ny fonao rehetra sy ny fanahinao rehetra, araka izay rehetra andidiako anao sy ny zanakao anio, '
  '20':
  - type: text
    content: dia ny ho tia an’i Jehovah Andriamanitrao hianao ka hihaino ny feony sy hifikitra aminy; fa izany
  - type: note
    content: 'Na: izy.'
  - type: text
    content: ' no fiainanao sy fahamaroan’ny andronao, mba honenanao eo amin’ny tany izay nianianan’i Jehovah tamin’i Abrahama sy Isaka ary Jakoba razanao, homena azy.'
  '3':
  - type: text
    content: 'dia hampodin’i Jehovah Andriamanitrao avy amin’ny fahababoanao hianao, ary hamindra fo aminao izy ka hanangona anao indray avy any amin’ny firenena rehetra izay nampielezan’i Jehovah Andriamanitrao anao. '
  '4':
  - type: text
    content: 'Raha misy aminao voaroaka any amin’ny faravodilanitra, dia avy any no hanangonan’i Jehovah Andriamanitrao anao, ary avy any indray no hanalany anao. '
  '5':
  - type: text
    content: 'Dia hampidirin’i Jehovah Andriamanitrao ao amin’ny tany izay nolovan’ny razanao hianao, ka holovanao izany; ary hanisy soa anao Izy sy hahamaro anao mihoatra noho ny razanao. '
  '6':
  - type: text
    content: 'Dia hoforan’i Jehovah Andriamanitrao ny fonao sy ny fon’ny taranakao hitiavanao an’i Jehovah Andriamanitrao amin’ny fonao rehetra sy ny fanahinao rehetra, mba ho velona hianao. '
  '7':
  - type: text
    content: 'Ary hataon’i Jehovah Andriamanitrao amin’ny fahavalonao sy ny mankahala anao izay nanenjika anao ireny fanozonana rehetra ireny. '
  '8':
  - type: text
    content: 'Dia hihaino ny feon’i Jehovah indray hianao ka hanaraka ny didiny rehetra, izay andidiako anao anio. '
  '9':
  - type: text
    content: 'Ary hataon’i Jehovah Andriamanitrao manana amby ampy hianao amin’izay hahasoa anao, dia amin’ny asan’ny tànanao sy ny ateraky ny kibonao sy ny ateraky ny biby fiompinao ary ny vokatry ny taninao; fa ho faly aminao indray Jehovah ka hahasoa anao, araka izay nahafaliany tamin’ny razanao, '
