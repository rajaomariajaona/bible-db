document_id: 1CH.16,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampiditra ny fiaran’Andriamanitra ny olona ka nametraka azy tao afovoan’ny lay izay naorin’i Davida ho azy; ary nanatitra fanatitra dorana sy fanati-pihavanana teo anatrehan’Andriamanitra izy. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ataovy ho reharehanareo ny anarany masina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hifaly ny fon’izay mitady an’i Jehovah.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitadiava an’i Jehovah sy ny heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Katsaho mandrakariva ny tavany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsiarova ny asa mahagaga izay nataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fahagagany sy ny fitsaran’ny vavany,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo taranak’Isiraely mpanompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo olom-boafidiny, taranak’i Jakoba.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah, Izy no Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manerana ny tany rehetra ny fitsarany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy mandrakizay ny fanekeny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay teny voadidiny ho an’ny taranaka arivo mandimby,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, dia ilay nataony tamin’i Abrahama
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fianianany tamin’Isaka,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay naoriny ho lalàna ho an’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho fanekena mandrakizay ho an’Isiraely,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka nataony hoe: Homeko anao ny tany Kanana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lovanareo voazara amin’ny famolaina;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fony mbola olom-bitsy hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, vitsy sady vahiny tao,
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony voatitr’i Davida ny fanatitra odorana sy ny fanati-pihavanana, dia nitso-drano ny olona tamin’ny anaran’i Jehovah izy. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nifindrafindra tany amin’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nifindrafindra fanjakana ho amin’ny firenen-kafa,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nisy navelany hampahory azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary nananatra mpanjaka Izy noho ny amin’ireo hoe:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manendry ireo voahosotro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza manisy ratsy ireo mpaminaniko.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà ho an’i Jehovah, ry tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lazao isan-andro isan-andro ny famonjeny mahafaly.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambarao any amin’ny jentilisa ny voninahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary any amin’ny firenena rehetra ny fahagagana ataony.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa lehibe Jehovah ka mendrika hoderaina indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mahatahotra, fa ambonin’ny andriamanitra rehetra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny andriamanitry ny firenena rehetra dia tsinontsinona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no nanao ny lanitra.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famirapiratana sy voninahitra no eo anatrehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hery sy hafaliana no ao amin’ny fitoerany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry firenena, manomeza an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manomeza voninahitra sy hery ho an’i Jehovah.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manomeza an’i Jehovah ny voninahitry ny anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitondrà fanatitra, ka mankanesa eo anatrehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miankohofa eo anatrehan’i Jehovah amin’ny fihaingoana masina
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nizara mofo iray avy sy hena iray didy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: divay eran’ny kapoaka.
      marker-yv: yv-n
    - type: text
      text: ' ary ampempam-boaloboka ho an’ny Isiraely rehetra na lahy na vavy izy.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nandaminan’i Davida ny fanompoam-pivavahana, sy ny salamo natao ho fisaorana an’i Jehovah.
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangovita eo anatrehany, ry tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao rehetra izao voaorina ka tsy hihetsika.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho faly ny lanitra ary ho ravo ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary aoka holazaina any amin’ny firenena hoe: Jehovah no Mpanjaka.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho faly ny saha sy izay rehetra ao aminy.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hihoby eo anatrehan’i Jehovah amin’izay ny hazo an’ala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa avy hitsara ny tany Izy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Miderà an’i Jehovah, fa tsara Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandrakizay ny famindrampony.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary manaova hoe: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary angony izahay, ka vonjeo tsy ho azon’ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hisaoranay ny anaranao masina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho reharehanay ny fiderana Anao.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie Jehovah, Andriamanitry ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny taloha indrindra ka ho mandrakizay.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona rehetra nanao hoe: Amena, sady nidera an’i Jehovah.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Asafa sy ny rahalahiny dia navelan’i Davida teo anoloan’ny fiaran’ny faneken’i Jehovah hanao fanompoam-pivavahana ao mandrakariva araka ny raharaha tokony hatao isan-andro,– '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary Obed-edoma sy ny rahalahiny valo amby enim-polo sy Obed-edoma, zanak’i Jedotona, ary Hosa ho mpiandry varavarana kosa.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Zadoka mpisorona sy ny mpisorona rahalahiny dia navelany teo anoloan’ny tabernakelin’i Jehovah teo amin’ny fitoerana avo any Gibeona, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY ny Levita sasany notendren’i Davida ho mpanao fanompoam-pivavahana eo anatrehan’ny fiaran’i Jehovah mba hankalaza sy hisaotra ary hidera an’i Jehovah, Andriamanitry ny Isiraely: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hanatitra fanatitra dorana ho an’i Jehvoah marain-tsy hariva eo amin’ny alitara fandoroana ny fanatitra dorana mandrakariva, ary hanao araka izay rehetra voasoratra ao amin’ny lalàn’i Jehovah, izay nandidiany ny Isiraely,– '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary naman’ireo koa Hemana sy Jedotona ary ny sisa amin’ny olona voafidy izay voatonona anarana hidera an’i Jehovah, fa mandrakizay ny famindrampony. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tao amin’i Hemana sy Jedotona nisy trompetra sy kipantsona ho an’izay mampaneno ary ny fomban’ny zava-manenon’Andriamanitra. Ary ny zanak’i Jedotona no mpiandry varavarana.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia samy nody tany an-tranony avy ny olona rehetra, ary Davida koa lasa nody mba hitso-drano ny ankohonany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asafa no lohany, ary Zakaria no nanarakaraka, dia Jeiela sy Semiramota sy Jehiela sy Matitia sy Eliaba sy Benaia sy Obed-edoma ary Jeiela no nitendry ny valiha sy ny lokanga; fa Asafa no nampaneno ny kipantsona; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaia sy Jahaziela mpisorona kosa no mpitsoka ny trompetra mandrakariva eo anoloan’ny fiaran’ny faneken’Andriamanitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izay andro izay no voalohan’ny nanendren’i Davida an’i Asafa sy ny rahalahiny hidera an’i Jehovah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà an’i Jehovah, miantsoa ny anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampahafantaro ny firenena ny asany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà ho Azy, mankalazà Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saintsaino ny fahagagana rehetra ataony.
