document_id: 1CH.16,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nampiditra ny fiaran’Andriamanitra ny olona ka nametraka azy tao afovoan’ny lay izay naorin’i Davida ho azy; ary nanatitra fanatitra dorana sy fanati-pihavanana teo anatrehan’Andriamanitra izy. '
  '10':
  - type: text
    content: Ataovy ho reharehanareo ny anarany masina;
  - type: text
    content: Aoka hifaly ny fon’izay mitady an’i Jehovah.
  '11':
  - type: text
    content: Mitadiava an’i Jehovah sy ny heriny,
  - type: text
    content: Katsaho mandrakariva ny tavany.
  '12':
  - type: text
    content: Mahatsiarova ny asa mahagaga izay nataony,
  - type: text
    content: Dia ny fahagagany sy ny fitsaran’ny vavany,
  '13':
  - type: text
    content: Hianareo taranak’Isiraely mpanompony,
  - type: text
    content: Hianareo olom-boafidiny, taranak’i Jakoba.
  '14':
  - type: text
    content: Jehovah, Izy no Andriamanitsika,
  - type: text
    content: Manerana ny tany rehetra ny fitsarany.
  '15':
  - type: text
    content: Tsarovy mandrakizay ny fanekeny.
  - type: text
    content: Dia ilay teny voadidiny ho an’ny taranaka arivo mandimby,
  '16':
  - type: text
    content: Eny, dia ilay nataony tamin’i Abrahama
  - type: text
    content: Sy ny fianianany tamin’Isaka,
  '17':
  - type: text
    content: Izay naoriny ho lalàna ho an’i Jakoba
  - type: text
    content: Sy ho fanekena mandrakizay ho an’Isiraely,
  '18':
  - type: text
    content: 'Ka nataony hoe: Homeko anao ny tany Kanana'
  - type: text
    content: Ho lovanareo voazara amin’ny famolaina;
  '19':
  - type: text
    content: Fony mbola olom-bitsy hianareo,
  - type: text
    content: Eny, vitsy sady vahiny tao,
  '2':
  - type: text
    content: 'Ary nony voatitr’i Davida ny fanatitra odorana sy ny fanati-pihavanana, dia nitso-drano ny olona tamin’ny anaran’i Jehovah izy. '
  '20':
  - type: text
    content: Ary nifindrafindra tany amin’ny firenena,
  - type: text
    content: Sy nifindrafindra fanjakana ho amin’ny firenen-kafa,
  '21':
  - type: text
    content: Tsy nisy navelany hampahory azy;
  - type: text
    content: 'Ary nananatra mpanjaka Izy noho ny amin’ireo hoe:'
  '22':
  - type: text
    content: Aza manendry ireo voahosotro,
  - type: text
    content: Ary aza manisy ratsy ireo mpaminaniko.
  '23':
  - type: text
    content: Mihirà ho an’i Jehovah, ry tany rehetra;
  - type: text
    content: Lazao isan-andro isan-andro ny famonjeny mahafaly.
  '24':
  - type: text
    content: Ambarao any amin’ny jentilisa ny voninahiny,
  - type: text
    content: Ary any amin’ny firenena rehetra ny fahagagana ataony.
  '25':
  - type: text
    content: Fa lehibe Jehovah ka mendrika hoderaina indrindra,
  - type: text
    content: Sady mahatahotra, fa ambonin’ny andriamanitra rehetra.
  '26':
  - type: text
    content: Fa ny andriamanitry ny firenena rehetra dia tsinontsinona,
  - type: text
    content: Fa Jehovah no nanao ny lanitra.
  '27':
  - type: text
    content: Famirapiratana sy voninahitra no eo anatrehany,
  - type: text
    content: Hery sy hafaliana no ao amin’ny fitoerany.
  '28':
  - type: text
    content: Ry firenena, manomeza an’i Jehovah,
  - type: text
    content: Eny, manomeza voninahitra sy hery ho an’i Jehovah.
  '29':
  - type: text
    content: Manomeza an’i Jehovah ny voninahitry ny anarany;
  - type: text
    content: Mitondrà fanatitra, ka mankanesa eo anatrehany;
  - type: text
    content: Miankohofa eo anatrehan’i Jehovah amin’ny fihaingoana masina
  '3':
  - type: text
    content: Dia nizara mofo iray avy sy hena iray didy
  - type: note
    content: 'Na: divay eran’ny kapoaka.'
  - type: text
    content: ' ary ampempam-boaloboka ho an’ny Isiraely rehetra na lahy na vavy izy.'
  - type: heading
    content: Ny nandaminan’i Davida ny fanompoam-pivavahana, sy ny salamo natao ho fisaorana an’i Jehovah.
  '30':
  - type: text
    content: Mangovita eo anatrehany, ry tany rehetra;
  - type: text
    content: Izao rehetra izao voaorina ka tsy hihetsika.
  '31':
  - type: text
    content: Aoka ho faly ny lanitra ary ho ravo ny tany;
  - type: text
    content: 'Ary aoka holazaina any amin’ny firenena hoe: Jehovah no Mpanjaka.'
  '32':
  - type: text
    content: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy;
  - type: text
    content: Aoka ho faly ny saha sy izay rehetra ao aminy.
  '33':
  - type: text
    content: Dia hihoby eo anatrehan’i Jehovah amin’izay ny hazo an’ala;
  - type: text
    content: Fa avy hitsara ny tany Izy.
  '34':
  - type: text
    content: 'Miderà an’i Jehovah, fa tsara Izy:'
  - type: text
    content: Fa mandrakizay ny famindrampony.
  '35':
  - type: text
    content: 'Ary manaova hoe: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô,'
  - type: text
    content: Ary angony izahay, ka vonjeo tsy ho azon’ny jentilisa,
  - type: text
    content: Mba hisaoranay ny anaranao masina,
  - type: text
    content: Ka ho reharehanay ny fiderana Anao.
  '36':
  - type: text
    content: Isaorana anie Jehovah, Andriamanitry ny Isiraely,
  - type: text
    content: Hatramin’ny taloha indrindra ka ho mandrakizay.
  - type: text
    content: 'Ary ny olona rehetra nanao hoe: Amena, sady nidera an’i Jehovah.'
  '37':
  - type: text
    content: 'Ary Asafa sy ny rahalahiny dia navelan’i Davida teo anoloan’ny fiaran’ny faneken’i Jehovah hanao fanompoam-pivavahana ao mandrakariva araka ny raharaha tokony hatao isan-andro,– '
  '38':
  - type: text
    content: ary Obed-edoma sy ny rahalahiny valo amby enim-polo sy Obed-edoma, zanak’i Jedotona, ary Hosa ho mpiandry varavarana kosa.
  '39':
  - type: text
    content: 'Ary Zadoka mpisorona sy ny mpisorona rahalahiny dia navelany teo anoloan’ny tabernakelin’i Jehovah teo amin’ny fitoerana avo any Gibeona, '
  '4':
  - type: text
    content: 'ARY ny Levita sasany notendren’i Davida ho mpanao fanompoam-pivavahana eo anatrehan’ny fiaran’i Jehovah mba hankalaza sy hisaotra ary hidera an’i Jehovah, Andriamanitry ny Isiraely: '
  '40':
  - type: text
    content: 'hanatitra fanatitra dorana ho an’i Jehvoah marain-tsy hariva eo amin’ny alitara fandoroana ny fanatitra dorana mandrakariva, ary hanao araka izay rehetra voasoratra ao amin’ny lalàn’i Jehovah, izay nandidiany ny Isiraely,– '
  '41':
  - type: text
    content: 'ary naman’ireo koa Hemana sy Jedotona ary ny sisa amin’ny olona voafidy izay voatonona anarana hidera an’i Jehovah, fa mandrakizay ny famindrampony. '
  '42':
  - type: text
    content: Ary tao amin’i Hemana sy Jedotona nisy trompetra sy kipantsona ho an’izay mampaneno ary ny fomban’ny zava-manenon’Andriamanitra. Ary ny zanak’i Jedotona no mpiandry varavarana.
  '43':
  - type: text
    content: Ary dia samy nody tany an-tranony avy ny olona rehetra, ary Davida koa lasa nody mba hitso-drano ny ankohonany.
  '5':
  - type: text
    content: 'Asafa no lohany, ary Zakaria no nanarakaraka, dia Jeiela sy Semiramota sy Jehiela sy Matitia sy Eliaba sy Benaia sy Obed-edoma ary Jeiela no nitendry ny valiha sy ny lokanga; fa Asafa no nampaneno ny kipantsona; '
  '6':
  - type: text
    content: 'Benaia sy Jahaziela mpisorona kosa no mpitsoka ny trompetra mandrakariva eo anoloan’ny fiaran’ny faneken’Andriamanitra. '
  '7':
  - type: text
    content: Tamin’izay andro izay no voalohan’ny nanendren’i Davida an’i Asafa sy ny rahalahiny hidera an’i Jehovah.
  '8':
  - type: text
    content: Miderà an’i Jehovah, miantsoa ny anarany;
  - type: text
    content: Ampahafantaro ny firenena ny asany.
  '9':
  - type: text
    content: Mihirà ho Azy, mankalazà Azy;
  - type: text
    content: Saintsaino ny fahagagana rehetra ataony.
