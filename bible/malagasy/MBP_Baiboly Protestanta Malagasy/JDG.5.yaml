document_id: JDG.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fihirana nataon’i Debora noho ny nandresena an’i Sisera.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Debora sy Baraka, zanak’i Abinoama, dia nihira tamin’izany andro izany ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo izay mitaingina borikivavy fotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo izay mipetraka amin’ny lamba fitoerana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianareo koa izay mandeha amin’ny làlana, samia milaza.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lavitra ny feon’ny mpandefa zana-tsipìka, dia eo amin’ny fantsakan-drano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hiresahany ny asa marina nataon’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fahamarinany tmain’ny tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tamin’ny fitondrany ny.
      marker-yv: yv-n
    - type: text
      text: ' Isiraely;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’zany dia nidina ny olon’i Jehovah ho any am-bavahady.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza, mifohaza, ry Debora;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza, mifohaza, ka mihirà!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, ry Baraka; ento ny babonao, ry zanakalahin’i Abinoama.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’izany dia nidina izay olo-malaza sisa mbamin’ny vahoaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah nidina homba ahy koa hamely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho isan’.
      marker-yv: yv-n
    - type: text
      text: ' ny olo-mahery.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny avy amin’i Efraima, izay miorina amin’i Amaleka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nomba anao teo amin’ny firenenao, ry Benjamina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy tany Makira no nidinan’ny mpanao lalàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avy tamin’i Zebolona ireo mitana ny tehin’ny mpifehy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpanoratra.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny andrianan’Isakara niaraka tamin’i Debora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Isakara sy Baraka koa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampandehanina nanaraka azy any an-dohasaha izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe ny fiheverana am-po teny amin’ny sakeli-dranon’i Robena!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana hianao no nitoetra teo anelanelan’ny vala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihainoanao ny feon-tsodina any amin’ny ondry?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehibe ny fiheverana am-po teny amin’ny sakeli-dranon’i Robena!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gileada nitoetra tany an-dafin’i Jordana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nahoana Dana no nitoetra tany an-tsambo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asera nitoetra tany amoron-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary teny amin’ny fitodiany no nipetrahany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zebolona dia firenena nanao tsinontsinona ny ainy, na dia ho faty aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Naftaly koa teo amin’ny fitoerana avo any an-tsaha.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga ireo mpanjaka ka niady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, niady tao Tanaka ireo mpanjakan’i Kanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia teo anilan’ny ranon’i Megido;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nisy volafotsy azony ho babo.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fitarihan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fitombandahin’.
      marker-yv: yv-n
    - type: text
      text: ' ny lehibe tamin’ny Isiraely'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fahazotoan’ny vahoaka nanolo-tena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia miderà an’i Jehovah.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Avy tany an-danitra no nisy ady:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny kintana tamin’ny nalehany niady tamin’i Sisera.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny ony Kisona nipaoka azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany ony ela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ony be ady.
      marker-yv: yv-n
    - type: text
      text: ' izany, dia ny ony Kisona.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrosoa amin-kery hianao, ry fanahiko!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’izany dia nikatrokatroka ny kitron-tsoavaly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fihazakazaka, dia ny fihazakazaky ny maheriny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ozòny Meroza, hoy Ilay Anjelin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ozòny dia ozòny ny mponina ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy mba tonga hanampy an’i Jehovah izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy nanampy an’i Jehovah hamely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho isan’.
      marker-yv: yv-n
    - type: text
      text: ' ny mahery.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hotahina mihoatra noho ny vehivavy anie Jaela, vadin’i Hebera Kenita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hotahina mihoatra noho ny vehivavy mitoetra an-day anie izy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rano no nangatahin-dralehilahy, fa ronono aza no nomeny azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo an-dovian’andriana no nitondrany rononomandry.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tànany nandray ny tsima-day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tànany ankavanana nandray ny tantanan’ny mpiasa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia namely an’i Sisera tamin’ny tantanana izy ka nahavoa ny lohany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Namely mafy izy, dia nahaboroaka ny fihirifany.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo amin’ny tongo-dravehivavy no niondrehany–nahalavoany–niamparany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, teo amin’ny tongony no niondrehany–nahalavoany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo amin’izay niondrehany no niamparan’ny fatiny.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao amin’ny varavarankely no nitsirihan’ny renin’i Sisera ka niantsoantsoany mafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, niantso tao amin’ny makarakara izy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no ela izato kalesiny vao tonga?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no mitaredratra ny kodian’ny kalesiny?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hendry tamin’ny andriambaviny no namaly azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, ny tenany aza namaly hoe:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrenesa hianareo, ry mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa hianareo, ry mpanapaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho indrindra no hihira ho an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hankalaza an’i Jehovah, Andriamanitry ny Isiraely, aho.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy efa mahita va izy? Tsy mizara babo va izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia zazavavy iray na roa ho an’ny isan-dahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary lamba samy hafa volo ho babon’i Sisera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lamba roa samy hafa soratra ho eo am-bozon’ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nahazo
    - type: text
      text: ' babo.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho levona tahaka izany anie ny fahavalonao rehetra, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aoka izay tia Azy, kosa ho tahaka ny masoandro, raha miposaka amin’ny heriny izy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandry ny tany efa-polo taona.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, fony nivoaka avy tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tamin’ny saha.
      marker-yv: yv-n
    - type: text
      text: ' Seïra Hianao'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nandeha avy tany amin’ny tany Edoma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nihorohoro ny tany, ary ny lanitra koa nitete;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny rahona matevina nitete rano.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tendrombohitra niempo teo anatrehan’i Jehovah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, na dia irỳ Sinay irỳ aza teo anatrehan’i Jehovah, Andriamanitry ny Isiraely.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny andron’i Samgara, zanak’i Anata,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tamin’ny andron’i Jaela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy nodiavina ny làlambe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny sakeli-dàlana mivilivily no nalehan’ny mpandeha.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lao ny tany an-tsaha; eny, lao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tsy nisy mpanapaka; eny nitsahatra.
      marker-yv: yv-n
    - type: text
      text: ' tamin’ny Isiraely izany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pitsangako, izaho Debora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mandra-pitsangako ho reny teo amin’ny Isiraely.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nifidy andriamani-baovao ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tamin’izay dia nisy ady hatrany am-bavahady.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa nisy ampinga na lefona na dia iray akory aza hita va
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teo amin’ny olona efatra alina tamin’ny Isiraely?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny foko mankasitraka ny mpanapaka amin’ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nazoto nanolo-tena teo amin’ny vahoaka,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà an’i Jehovah hianareo.
