document_id: JDG.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fihirana nataon’i Debora noho ny nandresena an’i Sisera.
  - type: text
    content: 'ARY Debora sy Baraka, zanak’i Abinoama, dia nihira tamin’izany andro izany ka nanao hoe:'
  '10':
  - type: text
    content: Hianareo izay mitaingina borikivavy fotsy,
  - type: text
    content: Hianareo izay mipetraka amin’ny lamba fitoerana,
  - type: text
    content: Ary hianareo koa izay mandeha amin’ny làlana, samia milaza.
  '11':
  - type: text
    content: Lavitra ny feon’ny mpandefa zana-tsipìka, dia eo amin’ny fantsakan-drano,
  - type: text
    content: No hiresahany ny asa marina nataon’i Jehovah,
  - type: text
    content: Dia ny fahamarinany tmain’ny tany
  - type: note
    content: 'Na: tamin’ny fitondrany ny.'
  - type: text
    content: ' Isiraely;'
  - type: text
    content: Tamin’zany dia nidina ny olon’i Jehovah ho any am-bavahady.
  '12':
  - type: text
    content: Mifohaza, mifohaza, ry Debora;
  - type: text
    content: Mifohaza, mifohaza, ka mihirà!
  - type: text
    content: Mitsangàna, ry Baraka; ento ny babonao, ry zanakalahin’i Abinoama.
  '13':
  - type: text
    content: Tamin’izany dia nidina izay olo-malaza sisa mbamin’ny vahoaka,
  - type: text
    content: Jehovah nidina homba ahy koa hamely
  - type: note
    content: 'Na: ho isan’.'
  - type: text
    content: ' ny olo-mahery.'
  '14':
  - type: text
    content: Ny avy amin’i Efraima, izay miorina amin’i Amaleka,
  - type: text
    content: Dia nomba anao teo amin’ny firenenao, ry Benjamina;
  - type: text
    content: Avy tany Makira no nidinan’ny mpanao lalàna,
  - type: text
    content: Ary avy tamin’i Zebolona ireo mitana ny tehin’ny mpifehy.
  - type: note
    content: 'Na: mpanoratra.'
  '15':
  - type: text
    content: Ary ny andrianan’Isakara niaraka tamin’i Debora,
  - type: text
    content: Dia Isakara sy Baraka koa;
  - type: text
    content: Nampandehanina nanaraka azy any an-dohasaha izy.
  - type: text
    content: Lehibe ny fiheverana am-po teny amin’ny sakeli-dranon’i Robena!
  '16':
  - type: text
    content: Nahoana hianao no nitoetra teo anelanelan’ny vala,
  - type: text
    content: Hihainoanao ny feon-tsodina any amin’ny ondry?
  - type: text
    content: Lehibe ny fiheverana am-po teny amin’ny sakeli-dranon’i Robena!
  '17':
  - type: text
    content: Gileada nitoetra tany an-dafin’i Jordana;
  - type: text
    content: Ary nahoana Dana no nitoetra tany an-tsambo?
  - type: text
    content: Asera nitoetra tany amoron-dranomasina,
  - type: text
    content: Ary teny amin’ny fitodiany no nipetrahany.
  '18':
  - type: text
    content: Zebolona dia firenena nanao tsinontsinona ny ainy, na dia ho faty aza,
  - type: text
    content: Ary Naftaly koa teo amin’ny fitoerana avo any an-tsaha.
  '19':
  - type: text
    content: Tonga ireo mpanjaka ka niady,
  - type: text
    content: Eny, niady tao Tanaka ireo mpanjakan’i Kanana,
  - type: text
    content: Dia teo anilan’ny ranon’i Megido;
  - type: text
    content: Tsy nisy volafotsy azony ho babo.
  '2':
  - type: text
    content: Noho ny fitarihan’
  - type: note
    content: 'Na: fitombandahin’.'
  - type: text
    content: ' ny lehibe tamin’ny Isiraely'
  - type: text
    content: Sy ny fahazotoan’ny vahoaka nanolo-tena,
  - type: text
    content: Dia miderà an’i Jehovah.
  '20':
  - type: text
    content: 'Avy tany an-danitra no nisy ady:'
  - type: text
    content: Ny kintana tamin’ny nalehany niady tamin’i Sisera.
  '21':
  - type: text
    content: Ny ony Kisona nipaoka azy,
  - type: text
    content: Izany ony ela
  - type: note
    content: 'Na: ony be ady.'
  - type: text
    content: ' izany, dia ny ony Kisona.'
  - type: text
    content: Mandrosoa amin-kery hianao, ry fanahiko!
  '22':
  - type: text
    content: Tamin’izany dia nikatrokatroka ny kitron-tsoavaly
  - type: text
    content: Noho ny fihazakazaka, dia ny fihazakazaky ny maheriny.
  '23':
  - type: text
    content: Ozòny Meroza, hoy Ilay Anjelin’i Jehovah,
  - type: text
    content: Ozòny dia ozòny ny mponina ao,
  - type: text
    content: Satria tsy mba tonga hanampy an’i Jehovah izy,
  - type: text
    content: Eny, tsy nanampy an’i Jehovah hamely
  - type: note
    content: 'Na: ho isan’.'
  - type: text
    content: ' ny mahery.'
  '24':
  - type: text
    content: Hotahina mihoatra noho ny vehivavy anie Jaela, vadin’i Hebera Kenita;
  - type: text
    content: Eny, hotahina mihoatra noho ny vehivavy mitoetra an-day anie izy.
  '25':
  - type: text
    content: Rano no nangatahin-dralehilahy, fa ronono aza no nomeny azy;
  - type: text
    content: Teo an-dovian’andriana no nitondrany rononomandry.
  '26':
  - type: text
    content: Ny tànany nandray ny tsima-day,
  - type: text
    content: Ary ny tànany ankavanana nandray ny tantanan’ny mpiasa,
  - type: text
    content: Dia namely an’i Sisera tamin’ny tantanana izy ka nahavoa ny lohany;
  - type: text
    content: Namely mafy izy, dia nahaboroaka ny fihirifany.
  '27':
  - type: text
    content: Teo amin’ny tongo-dravehivavy no niondrehany–nahalavoany–niamparany,
  - type: text
    content: Eny, teo amin’ny tongony no niondrehany–nahalavoany;
  - type: text
    content: Teo amin’izay niondrehany no niamparan’ny fatiny.
  '28':
  - type: text
    content: Tao amin’ny varavarankely no nitsirihan’ny renin’i Sisera ka niantsoantsoany mafy;
  - type: text
    content: 'Eny, niantso tao amin’ny makarakara izy hoe:'
  - type: text
    content: Nahoana no ela izato kalesiny vao tonga?
  - type: text
    content: Nahoana no mitaredratra ny kodian’ny kalesiny?
  '29':
  - type: text
    content: Izay hendry tamin’ny andriambaviny no namaly azy,
  - type: text
    content: 'Eny, ny tenany aza namaly hoe:'
  '3':
  - type: text
    content: Mandrenesa hianareo, ry mpanjaka,
  - type: text
    content: Mihainoa hianareo, ry mpanapaka!
  - type: text
    content: Izaho indrindra no hihira ho an’i Jehovah;
  - type: text
    content: Hankalaza an’i Jehovah, Andriamanitry ny Isiraely, aho.
  '30':
  - type: text
    content: Tsy efa mahita va izy? Tsy mizara babo va izy?
  - type: text
    content: Dia zazavavy iray na roa ho an’ny isan-dahy,
  - type: text
    content: Ary lamba samy hafa volo ho babon’i Sisera,
  - type: text
    content: 'Lamba roa samy hafa soratra ho eo am-bozon’ny '
  - type: text
    content: nahazo
  - type: text
    content: ' babo.'
  '31':
  - type: text
    content: Ho levona tahaka izany anie ny fahavalonao rehetra, Jehovah ô;
  - type: text
    content: Fa aoka izay tia Azy, kosa ho tahaka ny masoandro, raha miposaka amin’ny heriny izy.
  - type: text
    content: Dia nandry ny tany efa-polo taona.
  '4':
  - type: text
    content: Jehovah ô, fony nivoaka avy tany
  - type: note
    content: Heb. tamin’ny saha.
  - type: text
    content: ' Seïra Hianao'
  - type: text
    content: Ary nandeha avy tany amin’ny tany Edoma,
  - type: text
    content: Dia nihorohoro ny tany, ary ny lanitra koa nitete;
  - type: text
    content: Eny, ny rahona matevina nitete rano.
  '5':
  - type: text
    content: Ny tendrombohitra niempo teo anatrehan’i Jehovah.
  - type: text
    content: Eny, na dia irỳ Sinay irỳ aza teo anatrehan’i Jehovah, Andriamanitry ny Isiraely.
  '6':
  - type: text
    content: Tamin’ny andron’i Samgara, zanak’i Anata,
  - type: text
    content: Sy tamin’ny andron’i Jaela
  - type: text
    content: Dia tsy nodiavina ny làlambe,
  - type: text
    content: Fa ny sakeli-dàlana mivilivily no nalehan’ny mpandeha.
  '7':
  - type: text
    content: Lao ny tany an-tsaha; eny, lao
  - type: note
    content: 'Na: Tsy nisy mpanapaka; eny nitsahatra.'
  - type: text
    content: ' tamin’ny Isiraely izany,'
  - type: text
    content: Mandra-pitsangako, izaho Debora,
  - type: text
    content: Eny, mandra-pitsangako ho reny teo amin’ny Isiraely.
  '8':
  - type: text
    content: Nifidy andriamani-baovao ny olona,
  - type: text
    content: Ary tamin’izay dia nisy ady hatrany am-bavahady.
  - type: text
    content: Moa nisy ampinga na lefona na dia iray akory aza hita va
  - type: text
    content: Teo amin’ny olona efatra alina tamin’ny Isiraely?
  '9':
  - type: text
    content: Ny foko mankasitraka ny mpanapaka amin’ny Isiraely,
  - type: text
    content: Izay nazoto nanolo-tena teo amin’ny vahoaka,–
  - type: text
    content: Miderà an’i Jehovah hianareo.
