document_id: EST.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny naneken’ny mpanjaka ny tenin’i Estera, sy ny fahasosoran’i Hamana tamin’i Mordekay.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nony tamin’ny andro fahatelo, dia niakanjo akanjo fiandrianana Estera ka nitsangana teo amin’ny kianja anatiny amin’ny tranon’ny mpanjaka, dia teo anoloan’ny tranon’ny mpanjaka, ary ny mpanjaka nipetraka teo ambonin’ny seza fiandrianan’ny fanjakana tao an-dapa, tandrifin’ny vavahadin’ny trano. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa nanindry fo ihany Hamana ka lasa nody tany an-tranony aloha; dia naniraka naka ny sakaizany sy Zaresy vadiny izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nambaran’i Hamana tamin’ireo ny voninahitry ny hareny sy ny hamaroan’ny zanany mbamin’izay voninahitra rehetra nomen’ny mpanjaka azy sy ny nanandratany azy ho ambony noho ny mpanapaka sy ny mpanompon’ny mpanjaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Hamana: He! Estera, vadin’ny mpanjaka, aza tsy naka olona afa-tsy izaho ihany hiaraka amin’ny mpanjaka ho amin’ny fanasana izay efa namboariny; fa nasainy hiaraka amin’ny mpanjaka aho koa rahampitso. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa na dia izany rehetra izany aza, dia tsy mbola mahafa-po ahy ihany, raha mbola mahita an’i Mordekay Jiosy mipetraka eo am-bavahadin’ny mpanjaka aho.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Zaresy vadiny sy ny sakaizany rehetra taminy: Aoka hanaovana hazo, dimam-polo hakiho ny hahavony, ary raha maraina dia lazao amin’ny mpanjaka mba hahantona eo Mordekay; fa mandehana miaraka amin’ny mpanjaka amin’ny hafaliana ho any amin’ny fanasana hianao. Ary sitrak’i Hamana izany zavatra izany, ka dia nampanao ilay hazo izy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hitan’ny mpanjaka fa, indro, Estera, vadin’ny mpanjaka, nitsangana teo an-kianja, dia nahita fitia teo imasony izy; ary ny mpanjaka nanondro an’i Estera tamin’ny tehim-bolamena izay teny an-tànany. Dia nanatona kosa Estera ka nanendry ny lohan-tehina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka taminy: Inona na angatahinao, ry Estera, vadin’ny mpanjaka, ary inona no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakana aza, dia homena anao izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Estera ka nanao hoe: Raha sitraky ny mpanjaka aoka, ny mpanjaka sy Hamana hankao anio amin’ny fanasana izay efa namboariko ho azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka: Asaovy avy faingana Hamana mba hanao araka ny tenin’i Estera.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka sy Hamana dia nankeo amin’ny fanasana izay efa namboarin’i Estera. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin’i Estera teo am-pisotroan-divay: Inona no angatahinao? Fa homena anao izany. Ary inona no tadiavinao? Fa na dia hatramin’ny antsasaky ny fanjakana aza, dia homena izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Estera ka nanao hoe: Izao no angatahiko sy tadiaviko: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mahita fitia eto imason’ny mpanjaka aho, ka sitraky ny mpanjaka ny hanome izay angatahiko sy hanome izay tadiaviko, dia aoka ny mpanjaka sy Hamana hankao amin’ny fanasana izay hamboariko ho azy indray; ary rahampitso dia hanao araka ny tenin’ny mpanjaka ihany aho.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka tamin’izany andro izany Hamana, sady faly sy ravoravo ny fony; fa raha nahita an’i Mordekay teo am-bavahadin’ny mpanjaka izy, fa, indro, tsy mba nitsangana na nihetsika hitsaoka azy akory, dia feno fahatezerana taminy izy. '
