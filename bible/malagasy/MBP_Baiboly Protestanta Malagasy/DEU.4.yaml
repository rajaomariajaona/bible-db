document_id: DEU.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Famporisihan’i Mosesy ny Isiraely mba hazoto mitandrina ny lalàna.
  - type: text
    content: 'ARY ankehetriny, ry Isiraely, mihainoa ny didy sy ny fitsipika izay ampianariko anareo harahinareo, mba ho velona hianareo ka hiditra sy handova ny tany izay omen’i Jehovah, Andriamanitry ny razanareo, anareo. '
  '10':
  - type: text
    content: 'dia '
  - type: text
    content: izay hitanao
  - type: text
    content: ' tamin’ny andro izay nitsangananao teo anatrehan’i Jehovah Andriamanitrao tany Horeba, fony Jehovah nilaza tamiko hoe: Angony etỳ amiko ny olona, dia hampandrenesiko azy ny teniko, izay hianarany mba hatahotra Ahy amin’ny andro rehetra hiainany ambonin’ny tany sady hampianariny ny zanany koa. '
  '11':
  - type: text
    content: 'Dia nanakaiky hianareo ka nitsangana teo am-bodin’ny tendrombohitra; ary ny tendrombohitra nirehitra afo manakatra ny lanitra, sady nisy haizina sy rahona ary haizim-pito. '
  '12':
  - type: text
    content: 'Dia niteny taminareo teo amin’ny afo Jehovah; ny teny ihany no renareo, fa tsy nahita endrika akory hianareo. '
  '13':
  - type: text
    content: Dia nambarany taminareo ny fanekeny, izay nandidiany anareo harahina, dia ny Didy Folo;
  - type: note
    content: Heb. ny Teny Folo.
  - type: text
    content: ' ary nosoratany teo amin’ny vato fisaka roa ireo. '
  '14':
  - type: text
    content: Ary izaho nodidian’i Jehovah tamin’izany andro izany hampianatra anareo didy sy fitsipika, mba harahinareo any amin’ny tany izay efa hidiranareo holovana.
  '15':
  - type: text
    content: 'Dia tandremo tsara ny fanahinareo; fa tsy nahita endrika akory hianareo tamin’ny andro izay nitenenan’i Jehovah taminareo tao amin’ny afo tany Horeba; '
  '16':
  - type: text
    content: 'fandrao manao ratsy hianareo ka manao sarin-javatra voasokitra ho anareo, araka izay endri-javatra na inona na inona, dia sarin-dehilahy, na sarim-behivavy, '
  '17':
  - type: text
    content: 'na sarim-biby izay etỳ ambonin’ny tany, na sarim-borona manana elatra izay manidina eny amin’ny habakabaka, '
  '18':
  - type: text
    content: 'na sarim-biby mandady na mikisaka amin’ny tany, na sarin-kazandrano izay ao amin’ny rano ambanin’ny tany. '
  '19':
  - type: text
    content: 'Ary andrao raha miandrandra ny lanitra hianao ka mahita ny masoandro sy ny volana ary ny kintana, dia izay rehetra eny amin’ny lanitra, dia ho voataona hianao hiankokoha eo anatrehany sy hanompo azy, izay nataon’i Jehovah Andriamanitrao ho anjaran’ny firenena rehetra ambanin’ny lanitra. '
  '2':
  - type: text
    content: Aza ampianareo ny teny izay andidiako anareo, ary aza anesoranareo, fa tandremo ny didin’i Jehovah Andriamanitrareo izay andidiako anareo.
  '20':
  - type: text
    content: Fa hianareo no nalain’i Jehovah ka nentiny nivoaka avy tao amin’ny memy fandrendreham-by (dia avy tany Egypta) mba ho firenena ho Azy tahaka ny amin’izao anio izao.
  '21':
  - type: text
    content: 'Ary Jehovah dia tezitra tamiko noho ny aminareo ka nianiana fa tsy hita an’i Jordana aho, na hiditra any amin’ny tany soa izay omen’i Jehovah Andriamanitrao ho lovanao. '
  '22':
  - type: text
    content: Fa izaho ho faty amin’ity tany ity, fa tsy hita an’i Jordana; fa hianareo kosa no hita ka handova izany tany soa izany.
  '23':
  - type: text
    content: 'Mitandrema hianareo, fandrao manadino ny faneken’i Jehovah Andriamanitrareo izay nataony taminareo ka manao sarin-javatra voasokitra ho anareo, araka ny endriky ny zavatra izay efa nandraran’i Jehovah Andriamanitrao anao. '
  '24':
  - type: text
    content: Fa Jehovah Andriamanitrao dia afo mandevona; eny, Andriamanitra saro-piaro Izy.
  '25':
  - type: text
    content: 'Raha miteraka sy ho loa-jafy koa hianao, ka efa nitoetra ela teo amin’ny tany hianareo ary manao ratsy ka manao sarin-javatra voasokitra, araka izay endriky ny zavatra na inona na inona, sy manao ratsy eo imason’i Jehovah Andriamanitrao ary mampahatezitra Azy, '
  '26':
  - type: text
    content: 'dia miantso ny lanitra sy ny tany ho vavolombelona aho anio fa vetivety foana dia ho fongotra tokoa hianareo tsy ho eo amin’ny tany izay alehanareo hita an’i Jordana holovana; tsy ho maro andro eo hianareo, fa haringana tokoa. '
  '27':
  - type: text
    content: 'Ary Jehovah hampiely anareo any amin’ny firenen-tsamy hafa; ary ho tonga olom-bitsy izay sisa aminareo any amin’ny firenen-tsamy hafa izay hitondran’i Jehovah anareo. '
  '28':
  - type: text
    content: Ary any no hanompoanareo andriamanitra asan’ny tànan’olona, dia vato aman-kazo, izay tsy mahita, na mandre, na mihinana, na manimbolo.
  '29':
  - type: text
    content: 'Kanefa any hianao no hitady an’i Jehovah Andriamanitrao ka hahita Azy, raha mitady Azy amin’ny fonao rehetra sy ny fanahinao rehetra. '
  '3':
  - type: text
    content: 'Ny masonareo efa nahita izay nataon’i Jehovah noho ny tamin’i Bala-peora; fa ny olona rehetra izay nanaraka an’i Bala-peroa dia naringan’i Jehovah Andriamanitrao tsy ho eo aminao. '
  '30':
  - type: text
    content: 'Raha azom-pahoriana hianao, fa manjo anao ireo zavatra rehetra ireo, dia hiverina amin’i Jehovah Andriamanitrao hianao any am-parany ka hihaino ny feony; '
  '31':
  - type: text
    content: fa Andriamanitra mamindra fo Jehovah Andriamanitrao ka tsy hahafoy anao, na handringana anao, na hanadino ny fanekena tamin’ny razanao, izay efa nianianany taminy.
  '32':
  - type: text
    content: 'Fa anontanio ange ny andro lasa, izay teo alohanao hatramin’ny andro izay namoronan’Andriamanitra olombelona tetỳ ambonin’ny tany ary hatramin’ny faravodilanitra manodidina, raha mba nisy zavatra lehibe tahaka izany, na mba efa nisy re tahaka izany. '
  '33':
  - type: text
    content: 'Moa efa nisy firenena nandre ny, feon’Andriamanitra niteny tao amin’ny afo, tahaka ny efa renao, ka velona ihany? '
  '34':
  - type: text
    content: 'Moa efa nanandrana handeha haka firenena ho Azy avy amin’ny firenena hafa va Andriamanitra amin’ny fizahan-toetra sy ny famantarana sy ny fahagagana sy ny ady sy ny tànana mahery sy ny sandry nahinjitra ary ny fampahatahorana lehibe, araka izay rehetra nataon’i Jehovah Andriamanitrareo ho anareo tany Egypta teo imasonao? '
  '35':
  - type: text
    content: 'Hianao no nampahitainy izany, mba hahafantaranao fa Jehovah no Andriamanitra, fa tsy misy afa-tsy Izy. '
  '36':
  - type: text
    content: 'Avy tany an-danitra no nampandrenesany anao ny feony hananarany anao; ary teo ambonin’ny tany no nanehoany anao ny afony lehibe; ary ny teniny efa renao avy tao afovoan’ny afo. '
  '37':
  - type: text
    content: 'Ary satria tia ny razanao Izy ka nifidy ny zanany mandimby azy, dia Izy no nitondra anao nivoaka avy tany Egypta tamin’ny heriny lehibe, '
  '38':
  - type: text
    content: handroahany eo anoloanao firenena maro izay lehibe sy mahery noho hianao, mba hampidirany anao sy hanomezany anao ny taniny ho lova, tahaka ny amin’izao anio izao.
  '39':
  - type: text
    content: 'Koa aoka ho fantatrao anio, ka tsarovy ao am-ponao, fa Jehovah no Andriamanitra any amin’ny lanitra ambony sy etỳ amin’ny tany ambany, ka tsy misy afa-tsy Izy. '
  '4':
  - type: text
    content: Fa hianareo izay nifikitra tamin’i Jehovah Andriamanitrareo kosa dia samy velona avokoa izao anio izao.
  '40':
  - type: text
    content: Dia tandremo ny lalàny sy ny didiny izay andidiako anao anio, mba hahita soa hianao sy ny taranakao mandimby anao, ary mba ho maro andro hianao any amin’ny tany, izay omen’i Jehovah Andriamanitrao ho anao mandrakizay.
  - type: heading
    content: Ny nanendrena tanàna telo handosiran’izay nahafaty olona tsy nahy.
  '41':
  - type: text
    content: 'ARY tamin’izay Mosesy dia nanokana tanàna telo any andafy atsinanan’i Jordana, '
  '42':
  - type: text
    content: 'mba handosiran’izay nahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha, dia ho velona izy raha mandositra ao amin’ny anankiray amin’ireo tanàna ireo: '
  '43':
  - type: text
    content: dia Bazera any an-efitra, amin’ny tany lemaka, an’ny Robenita; ary Ramota-gileada an’ny Gadita; ary Golana any Basana an’ny Manasita.
  - type: heading
    content: Fitarihan-teny nataon’i Mosesy ny amin’ny lalàna.
  '44':
  - type: text
    content: 'ARY izao no lalàna izay nalahatr’i Mosesy teo anatrehan’ny Zanak’Isiraely. '
  '45':
  - type: text
    content: 'Izao no teni-vavolombelona sy didy ary fitsipika, izay nambaran’i Mosesy tamin’ny Zanak’Isiraely, rehefa nivoaka avy tany Egypta izy, '
  '46':
  - type: text
    content: 'tany an-dafin’i Jordana, tao an-dohasaha tandrifin’i Beti-peora, tao amin’ny tanin’i Sihona, ilay mpanjakan’ny Amorita nonina tao Hesbona, dia ilay noresen’i Mosesy sy ny Zanak’Isiraely, rehefa nivoaka avy tany Egypta izy, '
  '47':
  - type: text
    content: 'ka dia azony ny tanin’i Sihona sy ny tanin’i Oga, mpanjakan’i Basana, dia ny mpanjaka roa tamin’ny Amorita, izay tany an-dafy atsinanan’i Jordana, '
  '48':
  - type: text
    content: 'hatrany Aroera, izay ao amoron’ny lohasahan-driaka Arnona, ka hatramin’ny tendrombohitra Siona (Hermona izany), '
  '49':
  - type: text
    content: dia ny tani-hay
  - type: note
    content: Heb. Arabà.
  - type: text
    content: ' rehetra any an-dafy atsinanan’i Jordana ka hatramin’ny ranomasina amin’ny tani-hay'
  - type: note
    content: Heb. Arabà.
  - type: text
    content: ' eo am-bodin’i Pisga.'
  '5':
  - type: text
    content: 'Indro, efa nampianariko didy sy fitsipika hianareo, araka izay nandidian’i Jehovah Andriamanitro ahy, mba harahinareo any amin’ny tany izay efa hidiranareo holovana. '
  '6':
  - type: text
    content: 'Koa tandremo ary ataovy izany, fa izany no ho fahendrenareo sy ho fanananareo saina eny imason’ny firenen-tsamy hafa; fa handre izany lalàna rehetra izany izy ka hanao hoe: Olona hendry sy manan-tsaina tokoa io firenena io. '
  '7':
  - type: text
    content: 'Fa iza no firenena, na dia lehibe aza, no mba manana andriamanitra akaiky azy tahaka an’i Jehovah Andriamanitra amin’izay rehetra iantsoantsika Azy? '
  '8':
  - type: text
    content: Ary iza no firenena, na dia lehibe aza, no mba manana didy sy fitsipika marina tahaka izao lalàna rehetra izao, izay ataoko eo anatrehanareo anio?
  '9':
  - type: text
    content: 'Kanefa kosa mitandrema hianao, ka tandremo tsara ny fanahinao, fandrao hadinoinao ny zavatra izay efa hitan’ny masonao, ary andrao miala amin’ny fonao izany, amin’ny andro rehetra hiainanao, fa ampahafantaro ny zanakao sy ny zafinao izany, '
