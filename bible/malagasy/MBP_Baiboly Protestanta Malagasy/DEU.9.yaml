document_id: DEU.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Anatra ny amin’ny tsi-fanamarinan-tena.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'MIHAINOA, ry Isiraely ô: hianao izao dia efa hita an’i Jordana hiditra eo amin’ny tany ka handresy firenen-tsamy hafa, izay lehibe sy mahery noho hianao, sy hahafaka tanàna lehibe izay misy mànda manakatra ny lanitra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'dia nomen’i Jehovah ahy ny vato fisaka roa, voasoratry ny fanondron’Andriamanitra; ary teo aminy no nisy ilay teny rehetra nolazain’i Jehovah taminareo tao an-tendrombohitra tao amin’ny andro nivoriana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nony tapitra ny efa-polo andro sy efa-polo alina, dia nomen’i Jehovah ahy ny vato fisaka roa, dia ilay nisy ny fanekena. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy Jehovah tamiko: Miaingà, ka midina faingana hiala etỳ hianao; fa efa nanao ratsy ny olonao izay nentinao nivoaka avy tany Egypta; efa nalaky nivily niala tamin’ny làlana izay efa nasaiko nalehany izy ka nanao sarin-javatra an-idina ho azy.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy koa Jehovah tamiko: Efa hitako ity firenena ity, fa, indro, olona mafy hatoka izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Avelao Aho handringana azy, ka hovonoiko ny anarany tsy ho eny ambanin’ny lanitra, ary dia hataoko firenena mahery sy lehibe noho izy hianao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nihodina aho ka nidina niala tamin’ny tendrombohitra, raha mbola nirehitra afo izy; ary ny vato fisaka roa nisy ny fanekena dia teny an-tànako roa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nijery aho, ka, indro, efa nanota tamin’i Jehovah Andriamanitrareo hianareo ka nanao ombilahy kely an-idina ho anareo; nalaky nivily hianareo niala tamin’ny làlana izay efa nasain’i Jehovah nalehanareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia noraisiko ny vatofisaka roa ka nazerako avy teny an-tànako roa ho vakivaky teo imasonareo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary niankohoka teo anatrehan’i Jehovah efa-polo andro sy efa-polo alina tahaka ilay teo ihany aho ka tsy nihinan-kanina, na nisotro rano, noho ny fahotanareo rehetra, izay nataonareo tamin’ny nanaovanareo izay ratsy eo imason’i Jehovah, ka nampahatezeranareo Azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa natahotra ny fahavinirana sy ny fahatezerana aho, izay nahatezeran’i Jehovah taminareo handringanana anareo. Dia nihaino ahy indray Jehovah tamin’izany andro izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia firenena lehibe sady olona lava, dia taranaky ny Anakita izay fantatrao, sady efa renao ny lazany hoe: Iza no mahajanona eo anoloan’ny taranak’i Anàka? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Jehovah dia tezitra indrindra tamin’i Arona ka saiky nandevona azy; dia nifona ho an’i Arona koa aho tamin’izany andro izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary noraisiko ny fahotanareo, dia ilay ombilahy kely izay nataonareo, ka nodorako tamin’ny afo, dia notorotoroiko sy nomontsamontsaniko mandra-pahatongany ho madinika toy ny vovoka; ary ny vovony dia nariako teo amin’ny renirano izay midina avy amin’ny tendrombohitra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary tao Tabera sy Masa ary Kibrota-hatava no nampahatezeranareo an’i Jehovah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary raha nampandehanin’i Jehovah niala tao Kadesy-barnea hianareo ka nataony hoe: Miakara, ka lovao ny tany izay nomeko anareo, dia nandà ny tenin’i Jehovah Andriamanitrareo hianareo, fa tsy nino Azy, na nihaino ny feony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Eny, niodina tamin’i Jehovah ihany hianareo hatramin’ny andro nahalalako anareo no ho mankatỳ. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary niankohoka teo anatrehan’i Jehovah aho nandritra izany efa-polo andro sy efa-polo alina izany, satria efa nolazain’i Jehovah fa handringana anareo Izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nifona tamin’i Jehovah aho ka nanao hoe: Jehovah Tompo ô, aza mandringana ny firenenao sy ny lovanao, izay navotanao tamin’ny fahalehibiazanao ka nentinao nivoaka avy tany Egypta tamin’ny tànanao mahery. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tsarovy ny mpanomponao, dia Abrahama sy Isaka ary Jakoba; fa aza mijery ny ditran’ity firenena ity, na ny haratsiam-panahiny, na ny fahotany, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'fandrao izay monina amin’ny tany nitondranao anay nivoaka avy tany hanao hoe: Satria tsy hain’i Jehovah ny hitondra azy ho any amin’ny tany izay nolazainy taminy, ary satria nankahala azy Izy, dia izany no nitondrany azy nivoaka hahafaty azy atỳ an-efitra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Kanefa ireo dia firenenao sy lovanao, izay nentinao nivoaka tamin’ny herinao lehibe sy ny sandrinao nahinjitra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa aoka ho fantatrao anio fa Jehovah Andriamanitrao no efa handeha hita eo alohanao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'tahaka '
    - type: text
      text: ny afo mandevona, ka Izy no handringana azy sy hampietry azy eo anoloanao; dia handroaka azy hianao ka handringana azy faingana, araka izay nolazain’i Jehovah taminao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary rehefa voaroak’i Jehovah Andriamanitrao eo anoloanao izy, dia aza manao anakampo hoe: Ny fahamarinako no nitondran’i Jehovah ahy niditra handova ity tany ity; fa ny haratsiam-panahin’ireo firenena ireo no androahan’i Jehovah azy eo anoloanao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tsy ny fahamarinanao, na ny hitsim-ponao, no andehananao handova ny taniny; fa ny haratsiam-panahin’ireo firenena ireo no androahan’i Jehovah Andriamanitrao azy eo anoloanao hahato ny teny izay nianianan’i Jehovah tamin’i Abrahama sy i Isaka ary i Jakoba razanao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Koa aoka ho fantatrao fa tsy ny fahamarinanao no anomezan’i Jehovah Andriamanitrao izany tany soa izany ho lovanao; fa firenena mafy hatoka hianao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tsarovy ka aza hadinoinao ny nampahatezeranao an’i Jehovah Andriamanitrao tany an’efitra: eny, hatramin’ny andro nialanao tany amin’ny tany Egypta ka hatramin’ny nahatongavanareo teto amin’ity tany ity dia mbola niodina tamin’i Jehovah ihany hianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Na dia tany Horeba aza dia nampahatezitra an’i Jehovah hianareo, dia tezitra taminareo Izy ka saiky nandringana anareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Raha niakatra tao an-tendrombohitra aho handray ny vato fisaka, dia ny vato fisaka izay nisy ny fanekena nataon’i Jehovah taminareo, ka nitoetra efa-polo andro sy efa-polo alina tao an-tendrombohitra sady tsy nihinan-kanina na nisotro rano, '
