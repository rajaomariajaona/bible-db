    children:
    - type: text
      text: 'dia habokana efa ela teo amin’ny hoditry ny nofony izany, ka hataon’ny mpisorona hoe maloto izy; tsy hatokany toerana akory izy, fa efa maloto. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mipoipoitra mihitsy eo amin’ny hoditra ny habokana, ary manenika ny hoditr’ilay marary hatramin’ny lohany ka hatramin’ny tongony, na aiza na aiza zahan’ny mpisorona, '
  '13':
  - type: usfm
