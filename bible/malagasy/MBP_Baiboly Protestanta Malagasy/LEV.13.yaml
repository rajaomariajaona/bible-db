    children:
    - type: text
      text: 'ary zahan’ny mpisorona, ka hitany fa manenika ny tenany rehetra ny habokana, dia hataony hoe madio ilay marary; fa efa niova ho fotsy avokoa izy, ka dia madio. '
  '14':
