      text: ' ka tonga fotsy, dia hankeo amin’ny mpisorona izy; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary raha zahan’ny mpisorona ilay marary, ka hitany fa tonga fotsy ny aretina, dia hataon’ny mpisorona hoe madio izy, fa efa madio.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy fery sitrana eo amin’ny hoditry ny nofo, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary misy fotsy mamontsina eo amin’ny holatry ny fery, na misy hola-mena, dia hiseho amin’ny mpisorona izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy mamontsina eo amin’ny hoditry ny nofon’ny olona, na misy manako-pery na misy mifaritra mangirana, ka eo amin’ny hoditry ny nofony tahaka ny habokana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Ny hevitry ny teny Hebreo adika hoe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'habokana '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'matetika amin’ity toko ity sy amin’ny toko manaraka dia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'kapoka '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: famely.
      marker-yv: yv-n
    - type: text
      text: ' izany, dia ho entina ho eo amin’i Arona mpisorona izy, na ho eo amin’izay iray amin’ny mpisorona, zanak’i Arona; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha zahan’ny mpisorona izy, ka lalina noho ny hoditra no fijeriny azy, ary efa niova ho fotsy ny volony, dia hataon’ny mpisorona hoe maloto izy: habokana efa mipoipoitra eo amin’ny fery izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha zahan’ny mpisorona izy, ka hitany fa tsy misy volo fotsy eo, ary tsy lalina noho ny hoditra izy sady matromatroka ihany, dia hatokan’ny mpisorona toerana hafitoana izy; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary raha nanitatra mihitsy teo amin’ny hoditra izany, dia hataon’ny mpisorona hoe maloto izy: habokana izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha tsy mitombo ny mifaritra mangirana, ka tsy manitatra, dia fahamaimaizana eo amin’ny fery izany; ary hataon’ny mpisorona hoe madio.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha misy main’ny afo eo amin’ny hoditry ny nofo, ary hita ny may, fa mitarehin-kola-mena,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mifaritra fotsy mangirana sady teramena.
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary zahan’ny mpisorona ka hitany fa efa niova ho fotsy ny volo eo amin’ny itoeran’ny mifaritra mangirana, ary lalina noho ny hoditra no fijeriny azy, dia habokana efa mipoipoitra eo amin’ny may izany, ka hataon’ny mpisorona hoe maloto: habokana izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha zahan’ny mpisorona izy, ka hitany fa tsy misy volo fotsy eo amin’ny mifaritra mangirana, ary tsy lalina noho ny hoditra izy sady matromatroka ihany, dia hatokan’ny mpisorona toerana hafitoana izy; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary raha zahan’ny mpisorona amin’ny andro fahafito izy, ka nanitatra mihitsy teo amin’ny hoditra izany, dia hataony hoe maloto: habokana izany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha tsy mitombo ny mifaritra fotsy mangirana ka tsy nanitatra teo amin’ny hoditra, fa matromatroka ihany, dia mamontsina eo amin’ny may izany; ary hataon’ny mpisorona hoe madio izy, fa fahamaimaizana ihany izany.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy lehilahy na vehivavy manana aretina eo amin’ny lohany na eo amin’ny saokany, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa raha zahan’ny mpisorona ny aretina eo amin’ny hoditry ny nofo, ka efa niova ho fotsy ny volo eo amin’ny aretina, ary efa lalina noho ny hoditry ny nofo no fijeriny ny aretina, dia habokana izany; ary raha zahan’ny mpisorona izy, dia hataony hoe maloto. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary zahan’ny mpisorona ny aretina, ka lalina noho ny hoditra ny fijeriny azy, ary misy volo madinika tomamotamo eo, dia hataon’ny mpisorona hoe maloto izy: olona kongonina izany, dia habokana eo amin’ny loha na eo amin’ny saoka izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha zahan’ny mpisorona ny kongonina, ka tsy lalina noho ny hoditra no fijeriny azy, nefa tsy misy volo mainty eo, dia hatokany toerana hafitoana ilay olona kongonina. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha zahan’ny mpisorona ny aretina amin’ny andro fahafito, ka hitany fa tsy nanitatra ny aretina, ary tsy misy volo tomamotamo eo, ary tsy lalina noho ny hoditra no fijeriny azy, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hiharatra izy, fa ny misy ny aretina tsy hoharatany; ary hatokan’ny mpisorona toerana hafitoana indray ilay olona kongonina. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha zahan’ny mpisorona amin’ny andro fahafito ny kongonina, ka hitany fa tsy nanitatra teo amin’ny hoditra ny aretiny, ary tsy lalina noho ny hoditra no fijeriny azy, dia hataon’ny mpisorona hoe madio izy; ary hanasa ny fitafiany izy, dia hadio. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha nanitatra teo amin’ny hoditra mihitsy ny aretiny, rehefa natao hoe madio izy, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hozahan’ny mpisorona izy, ka raha hitany fa nanitatra teo amin’ny hoditra ny aretina, dia tsy hitady ny volo tomamotamo intsony ny mpisorona: efa maloto izy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa raha hitany fa tsy mitombo ny aretina, ka misy volo mainty maniry eo, dia sitrana ny kongonina, ka madio izy; ary hataon’ny mpisorona hoe madio.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy lehilahy na vehivavy misy mifaritra mangirana eo amin’ny hoditry ny nofony, dia mifaritra fotsy mangirana, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary zahan’ny mpisorona, ka hitany fa misy mifaritra fotsy eo amin’ny hoditry ny nofony mangirana, nefa matromatroka, dia aretina mamentimpentina fotsy mipoipoitra eo amin’ny hoditra izany: madio izany.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy mifaritra fotsy mangirana kosa eo amin’ny hoditry ny nofony, nefa tsy lalina noho ny hoditra no fijeriny azy, ary tsy niova ho fotsy ny volony, dia hatokan’ny mpisorona toerana hafitoana ilay marary. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny amin’ny lehilahy mihintsam-bolon-doha, dia sola ihany izy ka madio. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mihintsana ny volony eo ambonin’ny handriny, dia mazavaray ihany izy ka madio. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy aretina teramena sady fotsy, na eo amin’ny loha sola, na eo amin’ny mazavaray, dia boka mipoipoitra amin’ny loha sola, na amin’ny mazavaray, izany. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha zahan’ny mpisorona izy, ka hitany fa teramena somary fotsy no famontsin’ny aretina eo amin’ny loha sola, na eo amin’ny mazavaray, tahaka ny fisehon’ny habokana eo amin’ny hoditry ny nofo, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia lehilahy boka izy ka maloto; hataon’ny mpisorona hoe maloto tokoa izy: eo amin’ny lohany ny aretiny.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny amin’izay efa boka mihitsy, dia lamba triatra no ho fitafiany, ary hirakaraka ny volony, dia hisarom-bava izy sady hiantsoantso hoe: Maloto e! maloto e! '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny andro rehetra izay haharariany amin’izany aretina izany dia haloto izy: eny, maloto izy, dia hitoetra mitokana, ka eny ivelan’ny toby no hitoerany.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin’ny fitafiana izay misy habokana, na fitafiana volon’ondry, na fitafiana rongony, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy izay ho tenany, na izay ho fahany, na rongony, na volon’ondry, ary ny hoditra, na izay zavatra natao tamin’ny hoditra:– '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha maitsomaitso na menamena eo amin’ny fitafiana ny aretina, na eo amin’ny hoditra, na eo amin’izay ho tenany, na izay ho fahany, na eo amin’izay zavatra natao tamin’ny hoditra, dia habokana izany ka haseho amin’ny mpisorona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha zahan’ny mpisorona amin’ny andro fahafito izy, ka hitany fa tsy mitombo ny aretina sady tsy manitatra eo amin’ny hoditra, dia hatokany toerana hafitoana indray izy; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hozahan’ny mpisorona ny aretina ka hatokany toerana hafitoana ilay zavatra misy azy. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha zahany ny aretina amin’ny andro fahafito, ka nanitatra teo amin’ny fitafiana ny aretina, na teo amin’izay ho tenany, na izay ho fahany, na teo amin’izay zavatra natao tamin’ny hoditra, dia habokana mafy izany, ka dia maloto. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hodorana ny fitafiana, na izay ho tenany, na izay ho fahany, na volon’ondry, na rongony, na izay zavatra natao tamin’ny hoditra, izay misy ny aretina; fa habokana mafy izany, ka dia hodorana amin’ny afo.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mizaha azy ny mpisorona, ka hitany fa ny aretina tsy nanitatra teo amin’ny fitafiana, na teo amin’izay ho tenany, na izay ho fahany, na teo amin’izay zavatra natao tamin’ny hoditra, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hasain’ny mpisorona hosasana izay misy izany, ary hatokany toerana hafitoana indray izy; '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rehefa voasasa izy, dia hozahan’ny mpisorona indray ny aretina; ka raha hitany fa tsy niova tarehy ny aretina, na dia tsy nanitatra aza, dia maloto izy ka hodoranao amin’ny afo; aretina mafy izany, na amin’ny atiny, na amin’ny ivelany. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mizaha azy ny mpisorona, ka hitany fa matromatroka ny aretina, rehefa voasasa izy, dia hesoriny ho afaka amin’ny fitafiana ny misy izany, na ho afaka amin’ny hoditra, na ho afaka amin’izay ho tenany, na izay ho fahany. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola misy miseho eo amin’ny fitafiana indray izy, na eo amin’izay ho tenany, na izay ho fahany, na eo amin’izay zavatra natao tamin’ny hoditra, dia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aretina
    - type: text
      text: ' mipoipoitra izany, ka hodoranao amin’ny afo izay misy izany. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fitafiana, na izay ho tenany, na izay ho fahany, na izay zavatra natao tamin’ny hoditra, izay hosasanao, raha afaka taminy ny aretina, dia hosasana fanindroany izy ka dia hadio.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no lalàna ny amin’ny habokana eo amin’ny fitafiana volon’ondry na rongony, na eo amin’izay ho tenany, na izay ho fahany, na eo amin’izay zavatra natao tamin’ny hoditra, hanaovana azy hoe madio, na hanaovana azy hoe maloto.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary raha zahan’ny mpisorona indray amin’ny andro fahafito izy, ka hitany fa matromatroka ny aretina sady tsy manitatra eo amin’ny hoditra, dia hataony hoe madio izy: manako-pery ihany izany, ka hanasa ny fitafiany izy, dia hadio. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha nanitatra teo amin’ny hodiny kosa ny manako-pery, taorian’ny nisehoany tamin’ny mpisorona ny amin’ny fanadiovana azy, dia hiseho amin’ny mpisorona indray izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha zahan’ny mpisorona izy, ka hitany fa manitatra eo amin’ny hoditra ny manako-pery, dia hataony hoe maloto izy: habokana izany.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy habokana amin’ny olona, dia ho entina any amin’ny mpisorona izy; '
