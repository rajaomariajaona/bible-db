document_id: 2CH.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan-dRehoboama.
  - type: text
    content: 'ARY nony tonga tany Jerosalema Rehoboama, dia novoriny ny taranak’i Joda sy Benjamina, dia miaramila valo alina amby iray hetsy voafantina, hiady amin’ny Isiraely hampody ny fanjakana ho an-dRehoboama. '
  '10':
  - type: text
    content: 'sy Zora sy Aialona ary Hebrona, izay tanàna mimanda ao amin’ny Joda sy ny Benjamina. '
  '11':
  - type: text
    content: 'Ary nanamafy ny tanàna mimanda izy sady nametraka mpanapaka tao aminy ary nanisy hanina sy diloilo ary divay betsaka. '
  '12':
  - type: text
    content: Ary tamin’ny isam-bohitra dia nasiany ampinga lehibe sy lefona avokoa, sady nohamafiny dia nohamafiny ny vohitra; ary ny Joda sy ny Benjamina no nomba azy.
  '13':
  - type: text
    content: 'Ary ny mpisorona sy ny Levita izay teo amin’ny Isiraely rehetra dia nanatona azy avy tany amin’ny fari-taniny avy. '
  '14':
  - type: text
    content: 'Fa ny Levita nandao ny tanànany sy ny tany manodidina azy ka nankany Joda sy Jerosalema (fa Jeroboama sy ny zanany efa nanaisotra azy tsy ho mpisorona ho an’i Jehovah, '
  '15':
  - type: text
    content: fa nanendry mpisorona ho amin’ny fitoerana avo sy ho an’ny Seïrima
  - type: note
    content: Heb. osilahy; anaran’andriamani-tsi-izy.
  - type: text
    content: ' ary ho an’ny ombilahy kely izay nataony). '
  '16':
  - type: text
    content: Ary na iza na iza tamin’ny firenen’Isiraely rehetra no nanolotra ny fony hitady an’i Jehovah, Andriamanitry ny Isiraely, dia nanaraka ireo nankany Jerosalema hamono zavatra hatao fanatitra ho an’i Jehovah, Andriamanitry ny razany.
  '17':
  - type: text
    content: Ka dia nampahery ny fanjakan’ny Joda izy sady nampahavitrika an-dRehoboama, zanak’i Solomona, telo taona; fa nandeha tamin’ny làlan’i Davida sy Solomona telo taona izy.
  '18':
  - type: text
    content: 'Ary Rehoboama naka an’i Mahalota, zanakavavin’i Jerimota, zanak’i Davida, sy Abihaila, zanakavavin’i Eliaba, zanak’i Jese, ho vadiny, '
  '19':
  - type: text
    content: 'izay nahazoany zaza, dia Jeosy sy Semaria ary Zahama. '
  '2':
  - type: text
    content: 'Kanjo kosa ny tenin’i Jehovah tonga tamin’i Semaia, lehilahin’Andriamanitra, ka nanao hoe: '
  '20':
  - type: text
    content: 'Ary nanarakaraka azy, dia nalainy koa Imaka, zanakavavin’i Absaloma, izay niteraka an’i Abia sy Atahy sy Ziza ary Selomita taminy. '
  '21':
  - type: text
    content: 'Ary Rehoboama tia an’Imaka, zanakavavin’i Absaloma, mihoatra noho ny vadiny sy ny vaditsindranony rehetra (fa naka vady valo ambin’ny folo sy vaditsindrano enim-polo izy ka niteraka lahy valo amby roa-polo sy vavy enim-polo). '
  '22':
  - type: text
    content: 'Ary Abia, zanakalahin’Imaka, no nataon-dRehoboama lohany ho mpanapaka ny rahalahiny; fa izy no efa nokasainy hampanjakaina. '
  '23':
  - type: text
    content: Ary hendry izy ka nampiely ny zanany eran’ny tanin’ny Joda sy ny Benjamina rehetra, dia tany amin’ny tanàna mimanda rehetra, ka nomeny hanina betsaka sady nitadiavany vady maro.
  '3':
  - type: text
    content: 'Mitenena amin-dRehoboama, zanak’i Solomona, mpanjakan’ny Joda, sy amin’ny Isiraely rehetra amin’ny Joda sy ny Benjamina hoe: '
  '4':
  - type: text
    content: 'Izao no lazain’i Jehovah: Aza mandeha hiady amin’ny rahalahinareo, fa samia mody any an-tranony avy hianareo; fa avy amiko izao zavatra izao. Ary nihaino ny tenin’i Jehovah ny olona, ka dia samy lasa nody, fa tsy nandeha hamely an’i Jeroboama.'
  '5':
  - type: text
    content: 'Ary Rehoboama nitoetra tany Jerosalema ka nanamboatra tanàna mimanda tany Joda. '
  '6':
  - type: text
    content: 'Ny namboariny dia izao: Betlehema sy Etama sy Tekoa '
  '7':
  - type: text
    content: 'sy Beti-zora sy Soko sy Adolama '
  '8':
  - type: text
    content: 'sy Gata sy Maresa sy Zifa '
  '9':
  - type: text
    content: 'sy Adoraima sy Lakisy sy Azeka '
