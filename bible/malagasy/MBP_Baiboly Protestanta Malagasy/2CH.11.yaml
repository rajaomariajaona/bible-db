document_id: 2CH.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan-dRehoboama.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nony tonga tany Jerosalema Rehoboama, dia novoriny ny taranak’i Joda sy Benjamina, dia miaramila valo alina amby iray hetsy voafantina, hiady amin’ny Isiraely hampody ny fanjakana ho an-dRehoboama. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Kanjo kosa ny tenin’i Jehovah tonga tamin’i Semaia, lehilahin’Andriamanitra, ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mitenena amin-dRehoboama, zanak’i Solomona, mpanjakan’ny Joda, sy amin’ny Isiraely rehetra amin’ny Joda sy ny Benjamina hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain’i Jehovah: Aza mandeha hiady amin’ny rahalahinareo, fa samia mody any an-tranony avy hianareo; fa avy amiko izao zavatra izao. Ary nihaino ny tenin’i Jehovah ny olona, ka dia samy lasa nody, fa tsy nandeha hamely an’i Jeroboama.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Rehoboama nitoetra tany Jerosalema ka nanamboatra tanàna mimanda tany Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny namboariny dia izao: Betlehema sy Etama sy Tekoa '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'sy Beti-zora sy Soko sy Adolama '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sy Gata sy Maresa sy Zifa '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'sy Adoraima sy Lakisy sy Azeka '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sy Zora sy Aialona ary Hebrona, izay tanàna mimanda ao amin’ny Joda sy ny Benjamina. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nanamafy ny tanàna mimanda izy sady nametraka mpanapaka tao aminy ary nanisy hanina sy diloilo ary divay betsaka. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary tamin’ny isam-bohitra dia nasiany ampinga lehibe sy lefona avokoa, sady nohamafiny dia nohamafiny ny vohitra; ary ny Joda sy ny Benjamina no nomba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny mpisorona sy ny Levita izay teo amin’ny Isiraely rehetra dia nanatona azy avy tany amin’ny fari-taniny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny Levita nandao ny tanànany sy ny tany manodidina azy ka nankany Joda sy Jerosalema (fa Jeroboama sy ny zanany efa nanaisotra azy tsy ho mpisorona ho an’i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: fa nanendry mpisorona ho amin’ny fitoerana avo sy ho an’ny Seïrima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'osilahy; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: anaran’andriamani-tsi-izy.
    marker-yv: yv-n
  - type: text
    text: ' ary ho an’ny ombilahy kely izay nataony). '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary na iza na iza tamin’ny firenen’Isiraely rehetra no nanolotra ny fony hitady an’i Jehovah, Andriamanitry ny Isiraely, dia nanaraka ireo nankany Jerosalema hamono zavatra hatao fanatitra ho an’i Jehovah, Andriamanitry ny razany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ka dia nampahery ny fanjakan’ny Joda izy sady nampahavitrika an-dRehoboama, zanak’i Solomona, telo taona; fa nandeha tamin’ny làlan’i Davida sy Solomona telo taona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Rehoboama naka an’i Mahalota, zanakavavin’i Jerimota, zanak’i Davida, sy Abihaila, zanakavavin’i Eliaba, zanak’i Jese, ho vadiny, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'izay nahazoany zaza, dia Jeosy sy Semaria ary Zahama. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nanarakaraka azy, dia nalainy koa Imaka, zanakavavin’i Absaloma, izay niteraka an’i Abia sy Atahy sy Ziza ary Selomita taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Rehoboama tia an’Imaka, zanakavavin’i Absaloma, mihoatra noho ny vadiny sy ny vaditsindranony rehetra (fa naka vady valo ambin’ny folo sy vaditsindrano enim-polo izy ka niteraka lahy valo amby roa-polo sy vavy enim-polo). '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Abia, zanakalahin’Imaka, no nataon-dRehoboama lohany ho mpanapaka ny rahalahiny; fa izy no efa nokasainy hampanjakaina. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary hendry izy ka nampiely ny zanany eran’ny tanin’ny Joda sy ny Benjamina rehetra, dia tany amin’ny tanàna mimanda rehetra, ka nomeny hanina betsaka sady nitadiavany vady maro.
