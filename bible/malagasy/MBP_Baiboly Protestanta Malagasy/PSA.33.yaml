document_id: PSA.33,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiderana an’Andriamanitra Mpitondra izao rehetra izao sy Mpiaro ny olona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MIHOBIA ho an’i Jehovah hianareo, ry olo-marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mendrika hataon’ny olo-mahitsy ny fiderana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah mahafoana ny fisainan’ny firenen-tsamy hafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsinontsinona ny hevitry ny olona Izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fisainan’i Jehovah maharitra mandrakizay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hevitry ny fony mahatratra ny taranaka fara mandimby.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny firenena izay manana an’i Jehovah ho Andriamaniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny olona nofidiny ho lovany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-danitra no itsinjovan’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mijery ny zanak’olombelona rehetra Izy;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo amin’ny fonenany no ijereny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mponina rehetra ambonin’ny tany,–
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Izy Mpamorona ny fon’izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy Mpamantatra ny asany rehetra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy mpanjaka voavonjin’ny hamaroan’ny miaramilany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-mahery tsy voavonjin’ny haben’ny heriny.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny soavaly tsy azo itokiana ho famonjena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mahavonjy ny haben’ny heriny.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny mason’i Jehovah mitsinjo izay matahotra Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay manantena ny famindrampony,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hanafaka ny fanahiny amin’ny fahafatesana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hamelona azy, raha misy mosary.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miderà an’i Jehovah amin’ny lokanga;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mankalazà Azy amin’ny valiha tory folo.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanahintsika miandry an’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Famonjena antsika sy ampingantsika Izy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no ifalian’ny fontsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria ny anarany masina no itokiantsika.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, aoka ny famindramponao hitoetra aminay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny anantenanay Anao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihirà fihiram-baovao ho Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitendre tsara amin’ny feo fifaliana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mahitsy ny tenin’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny asany rehetra dia mahatoky avokoa.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tia fahamarinana sy rariny Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Henika ny famindrampon’i Jehovah ny tany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’i Jehovah no nanaovana ny lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fofonain’ny vavany no nanaovana ny hamaroany rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampiavosa ny rano ao an-dranomasina ho toy ny antontan-javatra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitahiry ny rano lalina ao an-trano fitehirizana Izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hatahotra an’i Jehovah ny tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hangovitra eo anatrehany ny mponina rehetra amin’izao tontolo izao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no niteny, dia ary izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no nandidy, dia nitoetra mafy izany.
