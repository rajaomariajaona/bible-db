document_id: PSA.33
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiderana an’Andriamanitra Mpitondra izao rehetra izao sy Mpiaro ny olona.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIHOBIA ho an’i Jehovah hianareo, ry olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mendrika hataon’ny olo-mahitsy ny fiderana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Miderà an’i Jehovah amin’ny lokanga;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mankalazà Azy amin’ny valiha tory folo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mihirà fihiram-baovao ho Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitendre tsara amin’ny feo fifaliana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa mahitsy ny tenin’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny asany rehetra dia mahatoky avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tia fahamarinana sy rariny Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henika ny famindrampon’i Jehovah ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tenin’i Jehovah no nanaovana ny lanitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fofonain’ny vavany no nanaovana ny hamaroany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mampiavosa ny rano ao an-dranomasina ho toy ny antontan-javatra Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitahiry ny rano lalina ao an-trano fitehirizana Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka hatahotra an’i Jehovah ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hangovitra eo anatrehany ny mponina rehetra amin’izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa Izy no niteny, dia ary izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no nandidy, dia nitoetra mafy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jehovah mahafoana ny fisainan’ny firenen-tsamy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahatsinontsinona ny hevitry ny olona Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fisainan’i Jehovah maharitra mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hevitry ny fony mahatratra ny taranaka fara mandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sambatra ny firenena izay manana an’i Jehovah ho Andriamaniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny olona nofidiny ho lovany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny an-danitra no itsinjovan’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijery ny zanak’olombelona rehetra Izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Eo amin’ny fonenany no ijereny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mponina rehetra ambonin’ny tany,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia Izy Mpamorona ny fon’izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy Mpamantatra ny asany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy misy mpanjaka voavonjin’ny hamaroan’ny miaramilany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny olo-mahery tsy voavonjin’ny haben’ny heriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny soavaly tsy azo itokiana ho famonjena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy mahavonjy ny haben’ny heriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indro, ny mason’i Jehovah mitsinjo izay matahotra Azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay manantena ny famindrampony,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mba hanafaka ny fanahiny amin’ny fahafatesana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hamelona azy, raha misy mosary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny fanahintsika miandry an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Famonjena antsika sy ampingantsika Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa Izy no ifalian’ny fontsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria ny anarany masina no itokiantsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Jehovah ô, aoka ny famindramponao hitoetra aminay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny anantenanay Anao.
