document_id: PSA.33,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra Mpitondra izao rehetra izao sy Mpiaro ny olona.
  - type: text
    content: MIHOBIA ho an’i Jehovah hianareo, ry olo-marina;
  - type: text
    content: Fa mendrika hataon’ny olo-mahitsy ny fiderana.
  '10':
  - type: text
    content: Jehovah mahafoana ny fisainan’ny firenen-tsamy hafa;
  - type: text
    content: Mahatsinontsinona ny hevitry ny olona Izy.
  '11':
  - type: text
    content: Ny fisainan’i Jehovah maharitra mandrakizay,
  - type: text
    content: Ny hevitry ny fony mahatratra ny taranaka fara mandimby.
  '12':
  - type: text
    content: Sambatra ny firenena izay manana an’i Jehovah ho Andriamaniny,
  - type: text
    content: Dia ny olona nofidiny ho lovany.
  '13':
  - type: text
    content: Eny an-danitra no itsinjovan’i Jehovah;
  - type: text
    content: Mijery ny zanak’olombelona rehetra Izy;
  '14':
  - type: text
    content: Eo amin’ny fonenany no ijereny
  - type: text
    content: Ny mponina rehetra ambonin’ny tany,–
  '15':
  - type: text
    content: Dia Izy Mpamorona ny fon’izy rehetra
  - type: text
    content: Sy Mpamantatra ny asany rehetra.
  '16':
  - type: text
    content: Tsy misy mpanjaka voavonjin’ny hamaroan’ny miaramilany;
  - type: text
    content: Ny olo-mahery tsy voavonjin’ny haben’ny heriny.
  '17':
  - type: text
    content: Ny soavaly tsy azo itokiana ho famonjena,
  - type: text
    content: Ary tsy mahavonjy ny haben’ny heriny.
  '18':
  - type: text
    content: Indro, ny mason’i Jehovah mitsinjo izay matahotra Azy,
  - type: text
    content: Dia izay manantena ny famindrampony,
  '19':
  - type: text
    content: Mba hanafaka ny fanahiny amin’ny fahafatesana
  - type: text
    content: Sy hamelona azy, raha misy mosary.
  '2':
  - type: text
    content: Miderà an’i Jehovah amin’ny lokanga;
  - type: text
    content: Mankalazà Azy amin’ny valiha tory folo.
  '20':
  - type: text
    content: Ny fanahintsika miandry an’i Jehovah;
  - type: text
    content: Famonjena antsika sy ampingantsika Izy.
  '21':
  - type: text
    content: Fa Izy no ifalian’ny fontsika,
  - type: text
    content: Satria ny anarany masina no itokiantsika.
  '22':
  - type: text
    content: Jehovah ô, aoka ny famindramponao hitoetra aminay
  - type: text
    content: Araka ny anantenanay Anao.
  '3':
  - type: text
    content: Mihirà fihiram-baovao ho Azy;
  - type: text
    content: Mitendre tsara amin’ny feo fifaliana.
  '4':
  - type: text
    content: Fa mahitsy ny tenin’i Jehovah;
  - type: text
    content: Ary ny asany rehetra dia mahatoky avokoa.
  '5':
  - type: text
    content: Tia fahamarinana sy rariny Izy;
  - type: text
    content: Henika ny famindrampon’i Jehovah ny tany.
  '6':
  - type: text
    content: Ny tenin’i Jehovah no nanaovana ny lanitra;
  - type: text
    content: Ary ny fofonain’ny vavany no nanaovana ny hamaroany rehetra.
  '7':
  - type: text
    content: Mampiavosa ny rano ao an-dranomasina ho toy ny antontan-javatra Izy;
  - type: text
    content: Mitahiry ny rano lalina ao an-trano fitehirizana Izy.
  '8':
  - type: text
    content: Aoka hatahotra an’i Jehovah ny tany rehetra;
  - type: text
    content: Aoka hangovitra eo anatrehany ny mponina rehetra amin’izao tontolo izao.
  '9':
  - type: text
    content: Fa Izy no niteny, dia ary izany;
  - type: text
    content: Izy no nandidy, dia nitoetra mafy izany.
