document_id: 1KI.10,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namangian’ny mpanjakavavin’i Sheba an’i Solomona.
  - type: text
    content: 'ARY ny mpanjakavavin’i Sheba, rehefa nahare ny lazan’i Solomona ny amin’ny anaran’i Jehovah, dia avy hizaha toetra azy amin’ny fanontaniana sarotra, '
  '10':
  - type: text
    content: Ary izy nanome talenta volamena roa-polo amby zato sy zava-manitra sesehena ary vato soa ho an’ny mpanjaka; tsy nisy intsony zava-manitra be indrindra tonga tahaka ilay nomen’ny mpanjakavavin’i Sheba ho an’i Solomona mpanjaka.
  '11':
  - type: text
    content: 'Ary ny sambon’i Hirama koa, izay naka volamena avy any Ofira, dia nitondra hazo almoga be indrindra sy vato soa avy any Ofira. '
  '12':
  - type: text
    content: Ary ny hazo almoga dia nataon’ny mpanjaka arofanina tamin’ny tranon’i Jehovah sy ny lapan’andriana ary nataony lokanga sy valiha ho an’ny mpihira kosa; tsy nisy hazo almoga tonga tany na hita toy izany intsony mandraka andro-any.
  '13':
  - type: text
    content: Ary Solomona mpanjaka nanome ny mpanjakavavin’i Sheba kosa izay rehetra niriny, na inona na inona nangatahiny, afa-tsy izay nomeny azy araka ny fanomen’i Solomona mpanjaka; ka dia niverina izy, ary lasa nody tany amin’ny taniny izy mbamin’ny mpanompony.
  - type: heading
    content: Ny varotra nataon’i Solomona mbamin’ny hareny sy ny voninahiny.
  '14':
  - type: text
    content: 'ARY ny lanjan’ny volamena izay tonga tao amin’i Solomona isan-taona dia talenta volamena enina amby enim-polo amby enin-jato, '
  '15':
  - type: text
    content: afa-tsy izay azony tamin’ny mpandranto sy ny tamin’ny varotry ny mpivarotra ary tamin’ny mpanjakan’ny firenena samy hafa rehetra sy tamin’ny mpanapaka ny tany.
  '16':
  - type: text
    content: 'Ary Solomona mpanjaka nanao ampinga volamena lehibe roan-jato tamin’ny volamena voafisaka, ka takela-bolamena sekely enin-jato no napetaka tamin’ny ampinga lehibe iray. '
  '17':
  - type: text
    content: Ary nanao ampinga volamena telon-jato koa izy tamin’ny volamena voafisaka, ka takela-bolamena telo mane no napetaka tamin’ny ampinga iray. Dia napetraky ny mpanjaka tao amin’ny trano Alan’i Libanona ireo.
  '18':
  - type: text
    content: 'Ary ny mpanjaka dia nanao seza fiandrianana ivory lehibe, ka nopetahany takela-bolamena tsara indrindra. '
  '19':
  - type: text
    content: 'Nisy ambaratonga enina tamin’ny seza fiandrianana; ary ny lohan’ny seza fiandrianana, dia boribory ny eo an-damosiny; ary nisy fitehenan-tànana teo an-daniny roa amin’ny fipetrahana; ary nisy sarin-diona roa teo an-danin’ny fitehenan-tànana. '
  '2':
  - type: text
    content: 'ka tonga tany Jerosalema izy mbamin’ny mpanaraka maro be sy ny rameva izay nitondra zava-manitra sy volamena sesehena ary vato soa; ary rehefa tonga tany amin’i Solomona izy, dia nilaza taminy izay rehetra tao am-pony. '
  '20':
  - type: text
    content: Ary nisy sarin-diona roa ambin’ny folo teo an-daniny roa teo amin’ny ambaratonga enina. Tsy nisy natao tahaka izany tany amin’ny fanjakana rehetra.
  '21':
  - type: text
    content: 'Ary ny fisotroan’i Solomona mpanjaka dia volamena, ary ny fanaka rehetra tao amin’ny trano Alan’i Libanona koa dia volamena tsara avokoa; tsy nisy volafotsy ireo; fa nataony toy ny tsinontsinona izany tamin’ny andron’i Solomona. '
  '22':
  - type: text
    content: Fa ny mpanjaka nanana sambon’i Tarsisy mbamin’ny sambon’i Hirama teny ambonin’ny ranomasina; ary indray mandeha amin’ny telo taona no nihavian’ny sambon’i Tarsisy nitondra volamena sy volafotsy sy ivory sy rajako ary vorombola.
  - type: note
    content: pavo.
  '23':
  - type: text
    content: 'Ary Solomona mpanjaka dia nanan-karena sady hendry noho ny mpanjaka rehetra ambonin’ny tany. '
  '24':
  - type: text
    content: 'Ary ny tany rehetra nitady hahita ny tavan’i Solomona mba hihaino ny fahendrena izay nataon’Andriamanitra tao am-pony. '
  '25':
  - type: text
    content: Ary izy rehetra dia samy nahatonga ny anjarany avy isan-taona, dia fanaka volafotsy sy fanaka volamena sy fitafiana sy fiadiana sy zava-manitra sy soavaly ary ampondra.
  '26':
  - type: text
    content: Ary Solomona nanangona kalesy sy mpitaingin-tsoavaly; ary nanana kalesy efa-jato amby arivo izy sy mpitaingin-tsoavaly roa arivo amby iray alina, izay nataony tao amin’ireo tanàna fitoeran’ny kalesy sy tao amin’ny mpanjaka tany Jerosalema.
  '27':
  - type: text
    content: Ary nataon’ny mpanjaka tahaka ny vato ny habetsaky ny volafotsy tany Jerosalema, ary ny hazo sedera nataony toy ny aviavy eny amin’ny tany lemaka amoron-tsiraka.
  - type: note
    content: Heb. Sefela.
  '28':
  - type: text
    content: 'Ary avy tany Egypta no nahazoan’i Solomona soavaly; ary ny iray toko tamin’ny mpandranton’ny mpanjaka dia naka ny andiany iray araka izay vidiny voatendry. '
  '29':
  - type: text
    content: Ary ny vidin’ny kalesy iray nentiny niakatra avy tany Egypta dia sekely volafotsy enin-jato, ary ny soavaly dia dimam-polo amby zato avy; ary toy izany kosa no nitondrany ho an’ny mpanjakan’ny Hetita sy ny mpanjakan’ny Syriana.
  '3':
  - type: text
    content: Ary voavalin’i Solomona izy tamin’izay rehetra nanontaniany azy; tsy nisy zavatra niafina tamin’ny mpanjaka, ka dia nambarany azy avokoa.
  '4':
  - type: text
    content: 'Ary rehefa hitan’ilay mpanjakavavin’i Sheba ny fahendren’i Solomona rehetra sy ny trano izay nataony '
  '5':
  - type: text
    content: sy ny fihinany teo amin’ny latabany sy ny fipetrahan’ny tandapany sy ny fitoeran’ny mpanompony mbamin’ny fitafian’ireo sy ny mpitondra kapoakany ary ny ambaratonga izay niakarany ho ao
  - type: note
    content: 'Na: ny fanatitra odorany izay nateriny tao.'
  - type: text
    content: ' an-tranon’i Jehovah, dia talanjona terỳ izy. '
  '6':
  - type: text
    content: 'Ka hoy izy tamin’ny mpanjaka: Marina ny teny efa reko tany amin’ny taniko ny amin’ny teninao sy ny fahendrenao. '
  '7':
  - type: text
    content: 'Kanefa tsy nino ny filazana aho, raha tsy tonga atỳ, ka ny masoko no mahita, kanjo hay! na dia ny antsasany aza tsy voalaza tamiko akory: fa, indro, ny fahendrenao sy ny voninahitrao dia mihoatra lavitra noho izay laza efa reko. '
  '8':
  - type: text
    content: 'Sambatra lahy ny olonao, ary sambatra ireto tandapanao ireto, izay mijanona eto anatrehanao mandra-kariva ka mandre ny fahendrenao! '
  '9':
  - type: text
    content: Isaorana anie Jehovah Andriamanitrao, Izay tia anao ka nametraka anao amin’ny seza fiandrianan’ny Isiraely; fa noho ny fitiavan’i Jehovah, izay itiavany ny Isiraely mandrakizay, no nanaovany anao ho mpanjaka mba hanao fitsarana sy fahamarinana.
