document_id: JER.23,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny mpiandry tsara, indrindra fa ny Rantsan’i Davida.
  - type: text
    content: 'LOZAN’ireo mpiandry izay manimba sy mampihahaka ny ondry fiandriko, hoy Jehovah. '
  '10':
  - type: text
    content: Fa feno mpijangajanga ny tany;
  - type: text
    content: Ary noho ny ozona no isaonan’ny tany,
  - type: text
    content: Efa maina ny kijana any an-efitra;
  - type: text
    content: Ary efa ratsy ny fanaon’
  - type: note
    content: Heb. lalan’.
  - type: text
    content: ny olona,
  - type: text
    content: Sady ny tsi-fahamarinana no heriny.
  '11':
  - type: text
    content: Fa na mpaminany na mpisorona dia samy mpihatsaravelatsihy
  - type: note
    content: 'Na: ratsy fanahy.'
  - type: text
    content: ' avokoa;'
  - type: text
    content: Na dia tao an-tranoko aza dia mbola hitako ihany ny haratsiany, hoy Jehovah.
  '12':
  - type: text
    content: Koa dia ho toy ny làla-malama amin’ny aizim-pito ny làlany;
  - type: text
    content: Haronjina izy, ka dia ho potraka ao;
  - type: text
    content: Fa hahatonga loza aminy Aho amin’ny taona hamaliana azy, hoy Jehovah.
  '13':
  - type: text
    content: 'Ary tamin’ny mpaminanin’i Samaria no nahitako zavatra mahaloiloy:'
  - type: text
    content: Naminany tamin’i Bala izy
  - type: text
    content: Ka nampivily ny Isiraely oloko;
  '14':
  - type: text
    content: Ary tamin’ny mpaminanin’i Jerosalema koa no nahitako zavatra mahatsiravina;
  - type: text
    content: Mijangajanga sy mandeha araka ny lainga izy
  - type: text
    content: Sady mampahery ny tànan’ny mpanao ratsy,
  - type: text
    content: Ka samy tsy miala amin’ny faharatsiany;
  - type: text
    content: Eny, izy rehetra dia tonga tahaka an’i Sodoma raha amiko,
  - type: text
    content: Ary ny mponina ao dia tonga tahaka an’i Gomora.
  '15':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Tompon’ny maro, ny amin’ireo mpaminany ireo:'
  - type: text
    content: Indro, hofahanako zava-mahafaty izy
  - type: text
    content: Sy hampisotroiko rano mangidy,
  - type: text
    content: Satria avy tamin’ny mpaminanin’i Jerosalema no nivoahan’ny faharatsiana ho any amin’ny tany rehetra.
  '16':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Aza mihaino ny tenin’ny mpaminany izay maminany aminareo,
  - type: text
    content: Fa manadala anareo ireo;
  - type: text
    content: Ny fahitana avy ao am-pony ihany no lazainy,
  - type: text
    content: Fa tsy izay aloaky ny vavan’i Jehovah.
  '17':
  - type: text
    content: 'Milaza mandrakariva amin’izay manamavo Ahy izy hoe:'
  - type: text
    content: 'Jehovah nanao hoe: Hahita fiadanana hianareo,–'
  - type: text
    content: 'Ary amin’izay rehetra mandeha araka ny ditry ny fony hoe:'
  - type: text
    content: Tsy hisy loza hanjo anareo.
  '18':
  - type: text
    content: Fa iza moa no efa isan’ny mpihevitra teo amin’i Jehovah
  - type: text
    content: Ka nahita sy nandre ny teniny?
  - type: text
    content: Iza no nanongilana ny sofiny taminy ka nihaino ny teniny?
  '19':
  - type: text
    content: He! ny tadion’i Jehovah!
  - type: text
    content: Mivoaka ny fahatezerana
  - type: text
    content: Sy ny tadio mitambolimbolina
  - type: text
    content: Ka miantonta amin’ny lohan’ny ratsy fanahy.
  '2':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Andriamanitry ny Isiraely, ny amin’ireo mpiandry izay miandry ny oloko:'
  - type: text
    content: Hianareo efa nampihahaka ny ondriko sy nandronjindronjina azy,
  - type: text
    content: Fa tsy nanolokolo azy;
  - type: text
    content: Koa, indro, hovaliako hianareo noho ny faharatsian’ny ataonareo, hoy Jehovah.
  '20':
  - type: text
    content: Ny fahatezeran’i Jehovah tsy ho afaka
  - type: text
    content: Ambara-panefany sy ambara-panatanterany ny hevitry ny fony;
  - type: text
    content: Mbola ho fantatrareo marimarina izany any am-parany.
  '21':
  - type: text
    content: Tsy naniraka ireo mpaminany ireo Aho,
  - type: text
    content: Kanefa nidodododo ihany izy;
  - type: text
    content: Tsy niteny taminy Aho,
  - type: text
    content: Kanefa naminany ihany izy.
  '22':
  - type: text
    content: Fa raha isan’ny mpihevitra teo amiko izy,
  - type: text
    content: Dia ho nitory ny teniko tamin’ny oloko izy
  - type: text
    content: Ka namerina azy hiala tamin’ny làlany ratsy
  - type: text
    content: Sy tamin’ny faharatsian’ny nataony.
  '23':
  - type: text
    content: Moa Andriamanitra etỳ akaiky ihany va Aho? hoy Jehovah,
  - type: text
    content: Fa tsy Andriamanitra any lavitra any koa?
  '24':
  - type: text
    content: Moa misy olona mahafin-tena ao amin’ny fierena va
  - type: text
    content: Ka tsy ho hitako? hoy Jehovah
  - type: text
    content: Tsy manerana ny lanitra sy ny tany va Aho? hoy Jehovah.
  '25':
  - type: text
    content: Efa reko ny nolazain’ny mpaminany,
  - type: text
    content: 'Izay naminany lainga tamin’ny anarako hoe:'
  - type: text
    content: Nanonofy aho, nanonofy aho.
  '26':
  - type: text
    content: Mandra-pahoviana? Moa ao am-pon’ireo mpaminany izay maminany lainga
  - type: text
    content: Sy maminany araka ny fitaky ny fony va
  '27':
  - type: text
    content: Ny hampanadino ny oloko ny anarako
  - type: text
    content: Amin’ny nofiny izay lazainy amin’ny namany avy,
  - type: text
    content: Toy ny nanadinoan’ny razany ny anarako noho ny amin’i Bala?
  '28':
  - type: text
    content: Ny mpaminany izay manonofy dia aoka hilaza nofy,
  - type: text
    content: Ary izay manana ny teniko dia aoka hanambara marina ny teniko.
  - type: text
    content: Fa moa inona izay mololo, raha oharina amin’ny vary? hoy Jehovah.
  '29':
  - type: text
    content: Tsy tahaka ny afo va ny teniko? hoy Jehovah,
  - type: text
    content: Ary tsy tahaka ny kanonta manorotoro ny vatolampy va?
  '3':
  - type: text
    content: Ary Izaho hanangona ny ondriko sisa
  - type: text
    content: Avy any amin’ny tany rehetra izay nandroahako azy,
  - type: text
    content: Ka hampodiko ho any amin’ny saha niandrasana azy,
  - type: text
    content: Dia hitombo sy hihamaro izy.
  '30':
  - type: text
    content: Koa, indro, fa hasiako ny mpaminany, hoy Jehovah,
  - type: text
    content: Izay samy mangalatra ny teniko amin’ny namany avy.
  '31':
  - type: text
    content: Indro, hoy Jehovah, hasiako ny mpaminany,
  - type: text
    content: 'Izay mampiteny ny lelany hoe: Hoy Izy.'
  '32':
  - type: text
    content: Indro, hasiako izay maminany nofy lainga, hoy Jehovah,
  - type: text
    content: Ary milaza izany ka mampivily ny oloko
  - type: text
    content: Amin’ny laingany sy ny fandokafany tena;
  - type: text
    content: Nefa Izaho tsy naniraka azy na nandidy azy tsinona,
  - type: text
    content: Ka dia tsy mahasoa ity firenena ity akory izy, hoy Jehovah.
  '33':
  - type: text
    content: Ary raha manontany anao ity firenena ity, na ny mpaminany, na ny mpisorona,
  - type: text
    content: 'Ka manao hoe: Inona no entan’'
  - type: note
    content: 'Na: faminaniana ny loza.'
  - type: text
    content: ' i Jehovah?'
  - type: text
    content: 'Dia ataovy aminy hoe: Ny amin’ny entana'
  - type: note
    content: 'Na: faminaniana ny loza.'
  - type: text
    content: ' –'
  - type: text
    content: Hariako hianareo, hoy Jehovah.
  '34':
  - type: text
    content: Ary ny mpaminany sy ny mpisorona mbamin’ny vahoaka,
  - type: text
    content: 'Izay manao hoe: Ny entan’i Jehovah,–'
  - type: text
    content: Dia hovaliako izany olona izany mbamin’ny ankohonany.
  '35':
  - type: text
    content: 'Samia manontany amin’ny namany sy ny rahalahiny avy hianareo hoe:'
  - type: text
    content: Ahoana no navalin’i Jehovah?
  - type: text
    content: Ary ahoana no nolazain’i Jehovah?
  '36':
  - type: text
    content: Fa ny hoe ,Ny entan’i Jehovah’ dia tsy hotononinareo intsony;
  - type: text
    content: Fa ny tenin’ny olona avy ihany no ho entan’
  - type: note
    content: 'Na: faminaniana ny loza.'
  - type: text
    content: ' ny tenany,'
  - type: text
    content: Satria efa navadikareo ny tenin’Andriamanitra velona,
  - type: text
    content: Dia Jehovah, Tompon’ny maro, Andriamanitsika.
  '37':
  - type: text
    content: Izao no hanontanianareo
  - type: note
    content: Heb. hanontanianao.
  - type: text
    content: ' amin’ny mpaminany;'
  - type: text
    content: Ahoana no navalin’i Jehovah anao?
  - type: text
    content: Ary ahoana no nolazain’i Jehovah?
  '38':
  - type: text
    content: 'Fa raha hoy hianareo: ,Entan’i Jehovah’, dia izao no lazain’i Jehovah:'
  - type: text
    content: Noho ny nilazanareo ny teny hoe ,Ny entan’i Jehovah,’
  - type: text
    content: 'Nefa efa nanirahako ihany hianareo nataoko hoe:'
  - type: text
    content: 'Aza manao hoe: ,Ny entan’i Jehovah’,'
  '39':
  - type: text
    content: Dia, indro, hanadino anareo tokoa Aho
  - type: text
    content: Sady hanary anareo
  - type: text
    content: Mbamin’ny tanàna izay nomeko anareo sy ny razanareo
  - type: text
    content: Tsy ho eo anatrehako;
  '4':
  - type: text
    content: Ary hanendry mpiandry ho azy Aho,
  - type: text
    content: Ka dia hiandry azy ireo;
  - type: text
    content: Ka tsy hatahotra na hivadi-po intsony izy,
  - type: text
    content: Sady tsy hisy tsy ho voavory, hoy Jehovah.
  '40':
  - type: text
    content: Ary hataoko mihatra aminareo ny fahafaham-baraka mandrakizay
  - type: text
    content: Sy ny fahamenarana mandrakizay izay tsy hohadinoina.
  '5':
  - type: text
    content: Indro, avy ny andro, hoy Jehovah, izay hananganako Rantsana
  - type: note
    content: 'Na: Solofo.'
  - type: text
    content: ' marina ho an’i Davida,'
  - type: text
    content: Ka hanjaka Izy sady ho hendry
  - type: text
    content: Ary hanao fitsarana sy fahamarinana amin’ny tany.
  '6':
  - type: text
    content: Amin’ny androny no hamonjena ny Joda,
  - type: text
    content: Sy handrian’ny Isiraely fahizay,
  - type: text
    content: 'Ary izao no anarany izay hanononana Azy:'
  - type: text
    content: JEHOVAH FAHAMARINANTSIKA.
  '7':
  - type: text
    content: Koa, indro, avy ny andro, hoy Jehovah,
  - type: text
    content: 'Izay tsy hanaovana intsony hoe: Raha velona koa Jehovah,'
  - type: text
    content: Izay nitondra ny Zanak’Isiraely niakatra avy tany amin’ny tany Egypta;
  '8':
  - type: text
    content: 'Fa izao kosa: Raha velona koa Jehovah,'
  - type: text
    content: Izay nitondra ny taranak’Isiraely niakatra sady nitarika azy avy tany amin’ny tany avaratra
  - type: text
    content: Sy avy tany amin’ny tany rehetra izay nandroahako azy;
  - type: text
    content: Dia honina ao amin’ny taniny izy.
  - type: heading
    content: Faminaniana ny amin’ny mpaminany sandoka
  '9':
  - type: text
    content: NY amin’ireo mpaminany.
  - type: text
    content: Montsamontsana ato anatiko ny foko,
  - type: text
    content: Mangozohozo ny taolako rehetra,
  - type: text
    content: Toy ny olona mamo aho,
  - type: text
    content: Ary toy ny lehilahy leon-divay,
  - type: text
    content: Noho ny amin’i Jehovah
  - type: text
    content: Sy noho ny teniny masina.
