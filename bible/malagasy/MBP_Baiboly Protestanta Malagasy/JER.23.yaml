document_id: JER.23
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’ny mpiandry tsara, indrindra fa ny Rantsan’i Davida.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'LOZAN’ireo mpiandry izay manimba sy mampihahaka ny ondry fiandriko, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa izao no lazain’i Jehovah, Andriamanitry ny Isiraely, ny amin’ireo mpiandry izay miandry ny oloko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianareo efa nampihahaka ny ondriko sy nandronjindronjina azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy nanolokolo azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa, indro, hovaliako hianareo noho ny faharatsian’ny ataonareo, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary Izaho hanangona ny ondriko sisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avy any amin’ny tany rehetra izay nandroahako azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampodiko ho any amin’ny saha niandrasana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hitombo sy hihamaro izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hanendry mpiandry ho azy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia hiandry azy ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hatahotra na hivadi-po intsony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy hisy tsy ho voavory, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, avy ny andro, hoy Jehovah, izay hananganako Rantsana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solofo.
    marker-yv: yv-n
  - type: text
    text: ' marina ho an’i Davida,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanjaka Izy sady ho hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanao fitsarana sy fahamarinana amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’ny androny no hamonjena ny Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy handrian’ny Isiraely fahizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary izao no anarany izay hanononana Azy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH FAHAMARINANTSIKA.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa, indro, avy ny andro, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay tsy hanaovana intsony hoe: Raha velona koa Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nitondra ny Zanak’Isiraely niakatra avy tany amin’ny tany Egypta;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa izao kosa: Raha velona koa Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nitondra ny taranak’Isiraely niakatra sady nitarika azy avy tany amin’ny tany avaratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy avy tany amin’ny tany rehetra izay nandroahako azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia honina ao amin’ny taniny izy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’ny mpaminany sandoka
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: NY amin’ireo mpaminany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montsamontsana ato anatiko ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangozohozo ny taolako rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny olona mamo aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny lehilahy leon-divay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny amin’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy noho ny teniny masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa feno mpijangajanga ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary noho ny ozona no isaonan’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa maina ny kijana any an-efitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa ratsy ny fanaon’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lalan’.
    marker-yv: yv-n
  - type: text
    text: ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ny tsi-fahamarinana no heriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa na mpaminany na mpisorona dia samy mpihatsaravelatsihy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ratsy fanahy.
    marker-yv: yv-n
  - type: text
    text: ' avokoa;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia tao an-tranoko aza dia mbola hitako ihany ny haratsiany, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa dia ho toy ny làla-malama amin’ny aizim-pito ny làlany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haronjina izy, ka dia ho potraka ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hahatonga loza aminy Aho amin’ny taona hamaliana azy, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tamin’ny mpaminanin’i Samaria no nahitako zavatra mahaloiloy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naminany tamin’i Bala izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nampivily ny Isiraely oloko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary tamin’ny mpaminanin’i Jerosalema koa no nahitako zavatra mahatsiravina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijangajanga sy mandeha araka ny lainga izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mampahery ny tànan’ny mpanao ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka samy tsy miala amin’ny faharatsiany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, izy rehetra dia tonga tahaka an’i Sodoma raha amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mponina ao dia tonga tahaka an’i Gomora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa izao no lazain’i Jehovah, Tompon’ny maro, ny amin’ireo mpaminany ireo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hofahanako zava-mahafaty izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hampisotroiko rano mangidy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria avy tamin’ny mpaminanin’i Jerosalema no nivoahan’ny faharatsiana ho any amin’ny tany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mihaino ny tenin’ny mpaminany izay maminany aminareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa manadala anareo ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahitana avy ao am-pony ihany no lazainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy izay aloaky ny vavan’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Milaza mandrakariva amin’izay manamavo Ahy izy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Jehovah nanao hoe: Hahita fiadanana hianareo,–'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’izay rehetra mandeha araka ny ditry ny fony hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy loza hanjo anareo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa iza moa no efa isan’ny mpihevitra teo amin’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nahita sy nandre ny teniny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza no nanongilana ny sofiny taminy ka nihaino ny teniny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He! ny tadion’i Jehovah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoaka ny fahatezerana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny tadio mitambolimbolina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miantonta amin’ny lohan’ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny fahatezeran’i Jehovah tsy ho afaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambara-panefany sy ambara-panatanterany ny hevitry ny fony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbola ho fantatrareo marimarina izany any am-parany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy naniraka ireo mpaminany ireo Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa nidodododo ihany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy niteny taminy Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa naminany ihany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa raha isan’ny mpihevitra teo amiko izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho nitory ny teniko tamin’ny oloko izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka namerina azy hiala tamin’ny làlany ratsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tamin’ny faharatsian’ny nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Moa Andriamanitra etỳ akaiky ihany va Aho? hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy Andriamanitra any lavitra any koa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moa misy olona mahafin-tena ao amin’ny fierena va
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho hitako? hoy Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy manerana ny lanitra sy ny tany va Aho? hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Efa reko ny nolazain’ny mpaminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay naminany lainga tamin’ny anarako hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanonofy aho, nanonofy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mandra-pahoviana? Moa ao am-pon’ireo mpaminany izay maminany lainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy maminany araka ny fitaky ny fony va
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny hampanadino ny oloko ny anarako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny nofiny izay lazainy amin’ny namany avy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny nanadinoan’ny razany ny anarako noho ny amin’i Bala?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny mpaminany izay manonofy dia aoka hilaza nofy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay manana ny teniko dia aoka hanambara marina ny teniko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa moa inona izay mololo, raha oharina amin’ny vary? hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy tahaka ny afo va ny teniko? hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy tahaka ny kanonta manorotoro ny vatolampy va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Koa, indro, fa hasiako ny mpaminany, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay samy mangalatra ny teniko amin’ny namany avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Indro, hoy Jehovah, hasiako ny mpaminany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay mampiteny ny lelany hoe: Hoy Izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Indro, hasiako izay maminany nofy lainga, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary milaza izany ka mampivily ny oloko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny laingany sy ny fandokafany tena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa Izaho tsy naniraka azy na nandidy azy tsinona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy mahasoa ity firenena ity akory izy, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary raha manontany anao ity firenena ity, na ny mpaminany, na ny mpisorona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao hoe: Inona no entan’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: faminaniana ny loza.
    marker-yv: yv-n
  - type: text
    text: ' i Jehovah?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia ataovy aminy hoe: Ny amin’ny entana'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: faminaniana ny loza.
    marker-yv: yv-n
  - type: text
    text: ' –'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hariako hianareo, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary ny mpaminany sy ny mpisorona mbamin’ny vahoaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay manao hoe: Ny entan’i Jehovah,–'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hovaliako izany olona izany mbamin’ny ankohonany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Samia manontany amin’ny namany sy ny rahalahiny avy hianareo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahoana no navalin’i Jehovah?
- type: usfm
  marker: q1
  children:
  - type: text
