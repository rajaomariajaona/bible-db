document_id: PSA.28,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana an’Andriamanitra hanafaka ny olony sy hanameloka ny ratsy fanahy.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: HIANAO no antsoiko, Jehovah ô,
  - type: text
    content: Ry Vatolampiko ô, aza manentsin-tadìny amiko;
  - type: text
    content: Fandrao, raha mangina amiko Hianao,
  - type: text
    content: Dia ho tahaka izay midina any an-davaka aho.
  '2':
  - type: text
    content: Mihainoa ny feon’ny fifonako, raha mitaraina aminao aho,
  - type: text
    content: Raha manandratra ny tànako ho amin’ny fitoeranao masina indrindra aho.
  '3':
  - type: text
    content: Aza atao indray manakipaka amin’ny ratsy fanahy sy ny mpanao meloka aho,
  - type: text
    content: Fa ireny dia milaza fihavanana amin’ny namany,
  - type: text
    content: Kanjo ratsy no ao am-pony.
  '4':
  - type: text
    content: Manomeza azy araka ny asany sy ny faharatsian’ny ataony;
  - type: text
    content: Eny, manomeza azy araka ny vitan’ny tànany,
  - type: text
    content: Valio izy araka izay iendrehany.
  '5':
  - type: text
    content: Fa tsy mihevitra ny asan’i Jehovah, na ny vitan’ny tànany, izy,
  - type: text
    content: Dia horavan’i Jehovah izy, fa tsy haoriny.
  '6':
  - type: text
    content: Isaorana anie Jehovah,
  - type: text
    content: Fa efa nihaino ny feon’ny fifonako Izy.
  '7':
  - type: text
    content: Jehovah no heriko sy ampingako;
  - type: text
    content: Izy no nitokian’ny foko, ka voavonjy aho;
  - type: text
    content: Dia mifaly ny foko, ka ny hirako no hiderako Azy.
  '8':
  - type: text
    content: Jehovah no heriny,
  - type: text
    content: Ary Izy no fiarovana mafy hamonjena ny voahosony.
  '9':
  - type: text
    content: Vonjeo ny olonao,
  - type: text
    content: Ary tahio ny lovanao;
  - type: text
    content: Andraso izy, ka tezao
  - type: note
    content: Heb. ento.
  - type: text
    content: ' mandrakizay.'
