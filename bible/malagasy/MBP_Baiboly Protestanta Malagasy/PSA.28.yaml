document_id: PSA.28,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiantsoana an’Andriamanitra hanafaka ny olony sy hanameloka ny ratsy fanahy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HIANAO no antsoiko, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Vatolampiko ô, aza manentsin-tadìny amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao, raha mangina amiko Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho tahaka izay midina any an-davaka aho.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihainoa ny feon’ny fifonako, raha mitaraina aminao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha manandratra ny tànako ho amin’ny fitoeranao masina indrindra aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza atao indray manakipaka amin’ny ratsy fanahy sy ny mpanao meloka aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ireny dia milaza fihavanana amin’ny namany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo ratsy no ao am-pony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manomeza azy araka ny asany sy ny faharatsian’ny ataony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, manomeza azy araka ny vitan’ny tànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Valio izy araka izay iendrehany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mihevitra ny asan’i Jehovah, na ny vitan’ny tànany, izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia horavan’i Jehovah izy, fa tsy haoriny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isaorana anie Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nihaino ny feon’ny fifonako Izy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no heriko sy ampingako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no nitokian’ny foko, ka voavonjy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mifaly ny foko, ka ny hirako no hiderako Azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izy no fiarovana mafy hamonjena ny voahosony.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo ny olonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahio ny lovanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andraso izy, ka tezao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ento.
      marker-yv: yv-n
    - type: text
      text: ' mandrakizay.'
