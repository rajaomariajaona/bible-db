document_id: 2TH.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fanitsiana ny hadisoan-kevitry ny sasany ny amin ny andron’ny Tompo.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY mangataka aminareo izahay, ry rahalahy, ny amin’ny fihavian’i Jesosy Kristy Tompontsika sy ny hanangonana antsika ho eo aminy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny famitahana momba ny tsi-fahamarinana amin’izay ho very, satria tsy nandray ny fitiavana ny fahamarinana izay hamonjena azy izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izany no ampanateran’Andriamanitra fiàsan’ny fahadisoan-kevitra aminy hinoany ny lainga, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hohelohina avokoa izay rehetra tsy nino ny marina, fa nankasitraka ny tsy marina.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fananarana sy fanaovam-beloma.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'FA izahay tsy maintsy misaotra an’Andriamanitra mandrakariva ny aminareo, ry rahalahy malalan’ny Tompo, satria Andriamanitra efa nifidy anareo hatramin’ny voalohany hahazo famonjena amin’ny fanamasinan’ny Fanahy sy ny finoana ny marina, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sady ho amin’izany koa no niantsoany anareo tamin’ny filazantsaranay hahazoanareo ny voninahitr’i Jesosy Kristy Tompontsika.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tomoera tsara, ry rahalahy, ka hazòny ny fampianarana natolotra izay nampianarina anareo, na tamin’ny teninay, na tamin’ny epistilinay.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy Kristy Tompontsika sy Andriamanitra Raintsika, Izay efa tia antsika ka nanome antsika fampiononana mandrakizay sy fanantenana tsara amin’ny fahasoavana, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: no hampionona ny fonareo anie sy hampahery anareo amin’ny asa sy ny teny tsara rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba tsy halaky hohetsiketsehina amin’ny saina na hampitahorina hianareo, na amin’ny fanahy, na amin’ny teny, na amin’ny epistily izay toa avy aminay, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: milaza
    - type: text
      text: ' fa efa miandoha ny andron’ny Tompo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mety hofitahin’olona akory hianareo; fa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy ho avy izany,
    - type: text
      text: ' raha tsy efa tonga aloha ny fihemorana, ka hiseho ilay lehilahin’ota, dia ilay zanaky ny fahaverezana, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ilay manohitra ka manandra-tena ho ambony noho izay rehetra atao hoe Andriamanitra, na izay ivavahana, ka dia mipetraka eo amin’ny tempolin’Andriamanitra izy ka manao ny tenany ho Andriamanitra.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy tsaroanareo va fa fony mbola teo aminareo ihany aho, dia efa nilaza izany zavatra izany taminareo? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny fantatrareo ny zavatra misakana, mba hampisehoana azy amin’ny fotoan’androny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa miasa sahady ny zava-miafina, dia ny tsi-fankatoavan-dalàna, kanefa mandra-panaisotra ilay misakana ankehitriny ihany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kanefa ao ihany ilay misakana mandra-panaisotra azy.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia haseho ilay tena mpandika lalàna, izay holevonin’i Jesosy Tompo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[holevonin’ny Tompo].'
      marker-yv: yv-n
    - type: text
      text: ' amin’ny fofonain’ny vavany ary hofoanany amin’ny fisehoan’ny fihaviany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny fihavin’ilehiny dia araka ny fiàsan’i Satana amin’ny hery sy ny famantarana sy ny fahagagana mandainga rehetra '
