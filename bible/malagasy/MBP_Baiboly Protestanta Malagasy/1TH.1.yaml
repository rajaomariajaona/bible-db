document_id: 1TH.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiarahabana ny Tesaloniana, sy fisaorana an’Andriamanitra noho ny nandraisan’ireo ny filazantsara sy ny nandrosoany tamin’ny finoana sy ny fitiavana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'PAOLY sy Silasy ary Timoty mamangy ny fiangonan’ny Tesaloniana, izay ao amin’Andriamanitra Ray sy Jesosy Kristy Tompo: ho aminareo anie ny fahasoavana sy ny fiadanana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Misaotra an’Andriamanitra mandrakariva izahay ny aminareo rehetra ka manonona anareo amin’ny fivavahanay, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sady tsy mitsahatra mahatsiaro ny asanareo amin’ny finoana sy ny fikelezanareo aina amin’ny fitiavana ary ny faharetanareo amin’ny fanantenana an’i Jesosy Kristy Tompontsika eo imason’Andriamanitra Raintsika; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa fantatray, ry rahalahy malalan’Andriamanitra, ny fifidianana anareo, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa ny filazantsaranay tsy tonga teo aminareo tamin’ny teny ihany, fa tamin’ny hery koa sy ny Fanahy Masina ary ny fahatokiana be, araka ny ahafantaranareo izay toetry ny fitondrantenanay teo aminareo noho ny aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hianareo efa nanahaka anay sy ny Tompo, satria nandray ny teny tamin’ny fahoriana be mbamin’ny hafaliana avy amin’ny Fanahy Masina '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka dia tonga fianarana ho an’ny mino rehetra any Makedonia sy Akaia hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa avy taminareo no nanenoan’ny tenin’ny Tompo, tsy tany Makedonia sy Akaia ihany, fa teny tontolo eny no nielezan’ny lazan’ny finoanareo an’Andriamanitra, ka dia tsy misy holazainay intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ireny ihany no milaza ny aminay, dia izay fidirana azonay ho atỳ aminareo sy ny nialanareo tamin’ny sampy hiverenana amin’Andriamanitra mba hanompo an’Andriamanitra velona sy marina, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ary mba hiandry ny Zanany avy any an-danitra, Izay natsangany tamin’ny maty, dia Jesosy, Izay Mpanafaka antsika amin’ny fahatezerana ho avy.
