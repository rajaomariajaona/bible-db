document_id: HAB.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fandozana nataon’ny Kaldeana ary ny fitarainan’ny mpaminany noho izany.
  - type: text
    content: FAMINANIANA ny loza hanjo, izay hitan’i Habakoka mpaminany.
  '10':
  - type: text
    content: Izy manakora ny mpanjaka,
  - type: text
    content: Ary ihomehezany ny mpanapaka;
  - type: text
    content: Ny tanàna mimanda rehetra dia ihomehezany,
  - type: text
    content: Ka dia manandratra tovon-tany
  - type: note
    content: Heb. vovoka.
  - type: text
    content: ' izy ka mahafaka azy.'
  '11':
  - type: text
    content: Dia mihelina toy ny rivotra izy
  - type: text
    content: Ary mandroso ka mahazo heloka.
  - type: text
    content: Izany heriny izany no andriamaniny!
  '12':
  - type: text
    content: Tsy hatrizay hatrizay va Hianao,
  - type: text
    content: Jehovah Andriamanitro, Iray Masiko?
  - type: text
    content: Tsy ho faty izahay;
  - type: text
    content: Ry Jehovah ô, ho famaizana no nanendrenao ireny,
  - type: text
    content: Ry Vatolampy ô, ho fananarana no nanangananao azy.
  '13':
  - type: text
    content: Hianao, Izay madio maso ka tsy te-hitsinjo ny ratsy
  - type: text
    content: Ary tsy mahajery fahoriana,
  - type: text
    content: Nahoana Hianao no mijery izay mamitaka
  - type: text
    content: Ary mangina, raha ny ratsy fanahy mandrapaka ny marina noho izy,
  '14':
  - type: text
    content: Ary manao ny olona ho toy ny hazandrano any an-dranomasina,
  - type: text
    content: Sy ho toy ny biby mandady sy mikisaka, izay tsy mana-mpanapaka?
  '15':
  - type: text
    content: Aingainy amin’ny fintana izy rehetra,
  - type: text
    content: Samboriny amin’ny haratony
  - type: text
    content: Ary sarihany amin’ny harato tarihiny,
  - type: text
    content: Ka dia faly sy ravoravo izy.
  '16':
  - type: text
    content: Koa izany no amonoany zavatra hatao fanatitra ho an’ny haratony
  - type: text
    content: Sy andoroany ditin-kazo manitra ho an’ny harato tarihiny;
  - type: text
    content: Fa ireo no ahazoany hanina matsiro sy anjara matavy.
  '17':
  - type: text
    content: Koa noho izany dia hanaisotra ny ao amin’ny tandrohony va izy
  - type: text
    content: Ary hamono firenena mandrakariva ka tsy hiantra?
  '2':
  - type: text
    content: Jehovah ô, indrisy ny hahelan’ny efa nitarainako,
  - type: text
    content: Nefa tsy nohenoinao!
  - type: text
    content: 'Mitaraina aho hoe: Loza!'
  - type: text
    content: Nefa tsy vonjenao ihany.
  '3':
  - type: text
    content: Nahoana no ataonao mahita faharatsiana aho.
  - type: text
    content: Ary mijery fahoriana Hianao?
  - type: text
    content: Fa fandravana sy loza no eo anatrehako,
  - type: text
    content: Ary misy ady, sady miseho ny fifandirana.
  '4':
  - type: text
    content: Koa noho izany dia ngoly ny lalàna,
  - type: text
    content: Ary tsy mivoaka ny rariny;
  - type: text
    content: Fa irohonan’ny ratsy fanahy ny marina,
  - type: text
    content: Ka izany no ivoahan’ny fitsarana miangatra.
  - type: note
    content: Heb. miolana.
  '5':
  - type: text
    content: Jereo any amin’ny jentilisa, ka diniho,
  - type: text
    content: Ary gagà dia gagà;
  - type: text
    content: Fa manao zavatra amin’ny andronareo Aho,
  - type: text
    content: Izay tsy hinoanareo, na dia holazaina aminareo aza.
  '6':
  - type: text
    content: Fa, indro, atsangako ny Kaldeana,
  - type: text
    content: Dia ilay firenena masiaka
  - type: note
    content: Heb. mangidy.
  - type: text
    content: ' sady mirehidrehitra,'
  - type: text
    content: Izay mamaky eran’ny tany
  - type: text
    content: Hahazoany fonenana izay tsy azy.
  '7':
  - type: text
    content: Mahatsiravina sy mahatahotra izy;
  - type: text
    content: Avy amin’ny tenany ihany ny fitsarany sy ny fahalehibiazany.
  '8':
  - type: text
    content: Faingana noho ny leoparda ny soavaliny
  - type: text
    content: Sady masiaka noho ny amboadia
  - type: note
    content: lopa.
  - type: text
    content: ' hariva;'
  - type: text
    content: Ny mpitaingin-tsoavaliny mampiriotra, eny, ny mpitaingin-tsoavaliny dia avy lavitra;
  - type: text
    content: Miezaka toy ny voromahery maika hihinana izy.
  '9':
  - type: text
    content: Hampidi-doza no ihavian’izy rehetra;
  - type: text
    content: Ny handroso ihany no atrehiny fatratra,
  - type: note
    content: 'Na: atrehan’izy rehetra.'
  - type: text
    content: Ka manangona sambotra toy ny fasika izy.
