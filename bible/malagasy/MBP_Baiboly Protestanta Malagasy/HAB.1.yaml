document_id: HAB.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fandozana nataon’ny Kaldeana ary ny fitarainan’ny mpaminany noho izany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FAMINANIANA ny loza hanjo, izay hitan’i Habakoka mpaminany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy manakora ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ihomehezany ny mpanapaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tanàna mimanda rehetra dia ihomehezany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia manandratra tovon-tany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vovoka.
      marker-yv: yv-n
    - type: text
      text: ' izy ka mahafaka azy.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mihelina toy ny rivotra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandroso ka mahazo heloka.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany heriny izany no andriamaniny!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hatrizay hatrizay va Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah Andriamanitro, Iray Masiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho faty izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Jehovah ô, ho famaizana no nanendrenao ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Vatolampy ô, ho fananarana no nanangananao azy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao, Izay madio maso ka tsy te-hitsinjo ny ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mahajery fahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana Hianao no mijery izay mamitaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mangina, raha ny ratsy fanahy mandrapaka ny marina noho izy,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manao ny olona ho toy ny hazandrano any an-dranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ho toy ny biby mandady sy mikisaka, izay tsy mana-mpanapaka?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aingainy amin’ny fintana izy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samboriny amin’ny haratony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary sarihany amin’ny harato tarihiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia faly sy ravoravo izy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa izany no amonoany zavatra hatao fanatitra ho an’ny haratony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy andoroany ditin-kazo manitra ho an’ny harato tarihiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ireo no ahazoany hanina matsiro sy anjara matavy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa noho izany dia hanaisotra ny ao amin’ny tandrohony va izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamono firenena mandrakariva ka tsy hiantra?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, indrisy ny hahelan’ny efa nitarainako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy nohenoinao!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mitaraina aho hoe: Loza!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy vonjenao ihany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no ataonao mahita faharatsiana aho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mijery fahoriana Hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fandravana sy loza no eo anatrehako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary misy ady, sady miseho ny fifandirana.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa noho izany dia ngoly ny lalàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mivoaka ny rariny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa irohonan’ny ratsy fanahy ny marina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izany no ivoahan’ny fitsarana miangatra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miolana.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jereo any amin’ny jentilisa, ka diniho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary gagà dia gagà;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manao zavatra amin’ny andronareo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy hinoanareo, na dia holazaina aminareo aza.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa, indro, atsangako ny Kaldeana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay firenena masiaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mangidy.
      marker-yv: yv-n
    - type: text
      text: ' sady mirehidrehitra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamaky eran’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hahazoany fonenana izay tsy azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatsiravina sy mahatahotra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy amin’ny tenany ihany ny fitsarany sy ny fahalehibiazany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faingana noho ny leoparda ny soavaliny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady masiaka noho ny amboadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lopa.
      marker-yv: yv-n
    - type: text
      text: ' hariva;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpitaingin-tsoavaliny mampiriotra, eny, ny mpitaingin-tsoavaliny dia avy lavitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miezaka toy ny voromahery maika hihinana izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampidi-doza no ihavian’izy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny handroso ihany no atrehiny fatratra,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: atrehan’izy rehetra.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manangona sambotra toy ny fasika izy.
