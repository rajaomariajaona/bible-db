document_id: PSA.40,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fisaorana noho ny famonjena efa azo, sy fanolorana ny tena hankatò ny tenin’Andriamanitra, ary fangatahana ho amin’ny andro sisa.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NIANDRY dia niandry an’i Jehovah aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nitodika nitsinjo ahy Izy ka nandre ny fitarainako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny fahamarinanao tsy mba nafeniko tato am-poko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahamarinanao sy ny famonjenao no nambarako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nanafina ny famindramponao sy ny fahamarinanao tamin’ny fiangonana lehibe Aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hianao, Jehovah ô, aza miaro ny antranao tsy ho amiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny famindramponao sy ny fahamarinanao hiaro ahy mandrakariva.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa nanodidina ahy ny fahoriana tsy tambo isaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahazo ahy ny heloko, ka tsy mahay mijery aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maro noho ny volon-dohako ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka reraka ny foko.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aoko ho sitraky ny fonao, Jehovah ô, ny hanafaka ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, faingàna hamonjy ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aoka ho indray menatra sy mangaihay izay mitady hanimba ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hiamboho sy ho menatra izay mankasitraka ahy ho ory.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Aoka ho ankona noho ny fahamenarany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ireny manao amiko hoe: Hia! sakoa izay!'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Aoka ho faly sy ho ravoravo aminao izay rehetra mitady Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aoka izay rehetra tia ny famonjenao hanao mandrakariva hoe: Hankalazaina anie Jehovah.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa na dia ory sy malahelo aza aho, ny Tompo no mihevitra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpamonjy sy Mpanafaka ahy Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza ela, Andriamanitro ô.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia nampakatra ahy avy tao amin’ny lavaka fandringanana Izy, eny, tamin’ny fotaka mandrevo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nampitoetra ny tongotro teo ambony vatolampy Izy ka nampijoro ahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nanisy fihiram-baovao teo am-bavako Izy, dia fiderana an’Andriamanitsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maro no hahita sy hatahotra ary hatoky an’i Jehovah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Sambatra izay olona manao an’i Jehovah ho tokiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mivily ho naman’ny mpiavonavona na ny mpivadika ho amin’ny lainga.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nohamaroinao ny fahagaganao sy ny hevitrao izay nataonao ho anay, Jehovah Andriamanitro ô–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy azo ampitahaina aminao–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tiako hambara sy holazaina ireny, dia, indro, maro loatra izy ka tsy tambo isaina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny fanatitra alatsa-dra sy ny fanatitra hohanina tsy mba sitrakao–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sofiko nataonao malady
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny sofiko no nohadinao.
      marker-yv: yv-n
    - type: text
      text: –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanatitra dorana sy ny fanatitra noho ny ota tsy mba nilainao;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy Izaho: Inty Aho tonga–'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao amin’ny horonam-boky no nanoratana Ahy–
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny hanao ny sitraponao, Andriamanitra ô, no sitrako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lalànao no ato anatiko.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Efa nilaza teny mahafaly ny amin’ny fahamarinana teo amin’ny fiangonana lehibe Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny molotro tsy mba nakomboko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah ô, Hianao no mahalala.
