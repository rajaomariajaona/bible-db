document_id: 1CO.1
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarihan-teny sy fiarahabana ary fisaorana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'PAOLY, voantso ho Apostolin’i Jesosy Kristy noho ny sitrapon’Andriamanitra, ary Sostena rahalahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mamangy ny fiangonan’Andriamanitra any Korinto, dia izay nohamasinina ao amin’i Kristy Jesosy, olona voantso sady masina, mbamin’izay rehetra miantso ny anaran’i Jesosy Kristy Tompontsika eny amin’ny tany rehetra, dia azy sy antsika: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Misaotra an’Andriamanitro mandrakariva ny aminareo aho noho ny fahasoavan’Andriamanitra izay nomena anareo ao amin’i Kristy Jesosy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia ny nampananana harena anareo ao aminy amin’ny zavatra rehetra, na ny teny rehetra, na ny fahalalana rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'araka ny niorenan’ny filazana an’i Kristy teo aminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka dia tsy latsaka amin’ny fanomezam-pahasoavana rehetra hianareo, miandry ny fisehoan’i Jesosy Kristy Tompontsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izay hampiorina anareo koa hatramin’ny farany, ka dia tsy hanan-tsiny hianareo amin’ny andron’i Jesosy Kristy Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mahatoky Andriamanitra, Izay nahatonga ny fiantsoana anareo hanananareo firaisana amin’ny Zanany, dia Jesosy Kristy Tompontsika.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Anatra noho ny fifampiandanian’ny fiangonana tao Korinto, sy filazana ny amin’ny nitorian’i Paoly ny filazantsara.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ARY mananatra anareo aho, ry rahalahy, amin’ny anaran’i Jesosy Kristy Tompontsika, mba hiray teny hianareo rehetra, ka tsy hisy fisarahana eo aminareo, fa mba ho tafakambana tsara hianareo hiray saina sy hevitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa efa voalazan’ny avy amin’ny ankohonan’i Kloa tamiko ny amin’ny toetrareo, ry rahalahiko, fa misy fifampiandaniana eo aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao anefa no anaovako izany: Hianareo samy manao hoe: Izaho an’i Paoly, na: Izaho an’i Apolosy, na: Izaho an’i Kefasy, na: Izaho an’i Kristy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voazarazara va Kristy? Paoly va no voahombo tamin’ny hazofijaliana hamonjy anareo, sa ho amin’ny anaran’i Paoly no nanaovam-batisa anareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Misaotra an’Andriamanitra aho fa tsy nisy nataoko batisa hianareo afa-tsy Krispo sy Gaio, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fandrao misy milaza fa efa natao batisa ho amin’ny anarako hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nefa mba efa nanao batisa ny ankohonan’i Stefanasy koa aho; afa-tsy ireo dia tsy hitako izay nataoko batisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa Kristy tsy naniraka ahy hanao batisa, fa hitory ny filazantsara, tsy tamin’ny teny fahendrena, fandrao ho foana ny hazofijalian’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ny teny ny amin’ny hazofijaliana dia fahadalana amin’izay ho very, fa herin’Andriamanitra kosa amintsika izay hovonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Hofoanako ny fahendren’ny hendry,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary holaviko ny fahalalan’ny mahalala’’ (Isa. 29.14).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aiza ny hendry? Aiza ny mpanora-dalàna? Aiza ny mpiady hevitra avy amin’izao tontolo izao? Tsy nampodin’Andriamanitra ho fahadalana va ny fahendren’izao tontolo izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa satria, na dia naseho aza ny fahendren’Andriamanitra,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa noho ny fahendren’Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ' ny fahendrena dia tsy nahatonga izao tontolo izao hahalala an’Andriamanitra, ka dia ny fahadalan’ny fitorian-teny no sitrak’Andriamanitra hamonjeny izay mino; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: fa ny Jiosy mila famantarana, ary ny jentilisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grika.
    marker-yv: yv-n
  - type: text
    text: ' mitady fahendrena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: fa izahay kosa mitory an’i Kristy voahombo tamin’ny hazofijaliana, dia fahatafintohinana amin’ny Jiosy ary fahadalana amin’ny jentilisa,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grika.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: fa amin’izay voantso kosa, na Jiosy na jentilisa,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grika.
    marker-yv: yv-n
  - type: text
    text: ' dia Kristy, Izay herin’Andriamanitra sy fahendren’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa ny fahadalan’Andriamanitra dia hendry noho ny olona; ary ny fahalemen’Andriamanitra mahery noho ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa hevero ny fiantsoana anareo, ry rahalahy, fa tsy firy no olon-kendry araka ny nofo, tsy firy no olona mahery, tsy firy no avo razana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fa ny adala amin’izao tontolo izao no nofidin’Andriamanitra hampahamenatra ny hendry; ary ny malemy amin’izao tontolo izao no nofidin’Andriamanitra hampahamenatra ny mahery; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary ny iva razana amin’izao tontolo izao sy izay fanevetava no nofidin’Andriamanitra, dia ny atao ho tsy misy aza, mba hahafoana ny misy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'mba tsy hisy nofo hahazo mirehareha eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa avy aminy no nanaovana anareo ho ao amin’i Kristy Jesosy, Izay nataon’Andriamanitra fahendrena sy fahamarinana sy fahamasinana ary fanavotana ho antsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'mba ho araka ny voasoratra hoe: ,,Izay mirehareha, aoka Jehovah no ho reharehany’’ (Jer. 9.23).'
