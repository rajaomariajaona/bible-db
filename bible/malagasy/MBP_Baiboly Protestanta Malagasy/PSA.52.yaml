document_id: PSA.52,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny loza hanjo izay tsy miambim-bava.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an’ny mpiventy hira. Maskila nataon’i Davida, fony tonga Doega Edomita ka nilaza tamin’i Saoly hoe: Davida dia efa tonga ao an-tranon’i Ahimeleka.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: NAHOANA no mandoka tena amin’ny haratsiana hianao, ry ilay mahery?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny famindrampon’Andriamanitra maharitra mandrakariva.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Loza no heverin’ny lelanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny hareza maranitra, ry mpanao fitaka.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Efa tia ny ratsy noho ny tsara hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lainga noho ny miteny ny marina.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny teny mandripaka rehetra no tianao, ry lela mamitaka.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Andriamanitra kosa hanimba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanongana.
      marker-yv: yv-n
    - type: text
      text: ' anao mandrakizay;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hisambotra anao sy hanongotra anao hiala ao an-day Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hamongotra anao tsy ho eo amin’ny tanin’ny velona.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny marina hijery, dia hatahotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hihomehy azy hoe:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Indro, ny lehilahy izay tsy nanao an’Andriamanitra ho heriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa natoky ny haben’ny hareny ka nikikitra tamin’ny faharatsiany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa izaho dia tahaka ny hazo oliva maitso ao an-tranon’Andriamanitra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matoky ny famindrampon’Andriamanitra mandrakizay doria aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hidera Anao mandrakizay aho, fa efa nataonao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hiandry ny anaranao eo anatrehan’ny olonao masina aho, fa tsara izany.
