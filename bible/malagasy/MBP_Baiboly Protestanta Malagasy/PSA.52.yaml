document_id: PSA.52,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo izay tsy miambim-bava.
  - type: text
    content: 'Ho an’ny mpiventy hira. Maskila nataon’i Davida, fony tonga Doega Edomita ka nilaza tamin’i Saoly hoe: Davida dia efa tonga ao an-tranon’i Ahimeleka.'
  - type: text
    content: NAHOANA no mandoka tena amin’ny haratsiana hianao, ry ilay mahery?
  - type: text
    content: Ny famindrampon’Andriamanitra maharitra mandrakariva.
  '2':
  - type: text
    content: Loza no heverin’ny lelanao,
  - type: text
    content: Tahaka ny hareza maranitra, ry mpanao fitaka.
  '3':
  - type: text
    content: Efa tia ny ratsy noho ny tsara hianao,
  - type: text
    content: Ary ny lainga noho ny miteny ny marina.
  - type: text
    content: '[Sela.]'
  '4':
  - type: text
    content: Ny teny mandripaka rehetra no tianao, ry lela mamitaka.
  '5':
  - type: text
    content: Andriamanitra kosa hanimba
  - type: note
    content: 'Na: hanongana.'
  - type: text
    content: ' anao mandrakizay;'
  - type: text
    content: Hisambotra anao sy hanongotra anao hiala ao an-day Izy
  - type: text
    content: Ary hamongotra anao tsy ho eo amin’ny tanin’ny velona.
  - type: text
    content: '[Sela.]'
  '6':
  - type: text
    content: Ny marina hijery, dia hatahotra
  - type: text
    content: 'Ka hihomehy azy hoe:'
  '7':
  - type: text
    content: Indro, ny lehilahy izay tsy nanao an’Andriamanitra ho heriny;
  - type: text
    content: Fa natoky ny haben’ny hareny ka nikikitra tamin’ny faharatsiany.
  '8':
  - type: text
    content: Fa izaho dia tahaka ny hazo oliva maitso ao an-tranon’Andriamanitra.
  - type: text
    content: Matoky ny famindrampon’Andriamanitra mandrakizay doria aho.
  '9':
  - type: text
    content: Hidera Anao mandrakizay aho, fa efa nataonao izany;
  - type: text
    content: Ary hiandry ny anaranao eo anatrehan’ny olonao masina aho, fa tsara izany.
