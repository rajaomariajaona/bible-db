document_id: 2KI.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanjakan’i Joasy tamin’ny Joda, sy ny nanamboarana ny rafitry ny tempoly.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'FITO taona Joasy fony izy vao nanjaka: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa Joiada mpisorona naka vata anankiray, dia noloahany ny rakony, ary napetrany teo anilan’ny alitara tamin’ny sisiny ankavanana eo am-pidirana amin’ny tranon’i Jehovah; dia nalatsaky ny mpisorona, mpiandry varavarana, tao ny vola rehetra izay nampidirina ho ao an-tranon’i Jehovah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary rehefa hitany fa be ny vola tao am-bata, dia niakatra ny mpanoratry ny mpanjaka sy ny mpisoronabe, ka nofonosiny ny vola izay hita tao an-tranon’i Jehovah sady nisainy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny vola voalanja dia natolotr’ireo ho eo an-tànan’ny mpiraharaha, dia izay voatendry ny amin’ny tranon’i Jehovah; ary ireo kosa namoaka azy ho amin’ny mpandrafitra sy ny mpanao trano izay nanamboatra ny tranon’i Jehovah '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: sy ho amin’ny mpandatsa-bato sy ny mpipaika, ary hamidy hazo sy vato voapaika hanamboarana ny simba amin’ny tranon’i Jehovah sy holanina amin’izay rehetra hanamboarana azy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nefa tsy nisy lovia volafotsy, na antsy, na lovia famafazana, na trompetra, na izay fanaka volamena sy volafotsy na inona na inona, natao ho amin’ny tranon’i Jehovah tamin’ny volafotsy nampidirina tao; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'fa nomeny ny mpiasa izany ka nentin’ireo nanamboatra ny tranon’i Jehovah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary tsy nampamoahiny ny olona izay notolorany ny vola homena ny mpiasa, fa nahatoky ireo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny vola natao fanati-panonerana sy fanatitra noho ny ota dia tsy mba nampidirina tao an-tranon’i Jehovah, fa an’ny mpisorona kosa izany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary tamin’izany dia niakatra Hazaela, mpanjakan’i Syria, ary namely an’i Gata ka nahafaka azy; ary nizotra niakatra hamely an’i Jerosalema koa izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary Joasy, mpanjakan’ny Joda, naka ny zavatra rehetra izay nohamasinin’ny mpanjakan’ny Joda razany, dia Josafata sy Jehorama sy Ahazia, mbamin’ny zavatra nohamasinin’ny tenany koa sy ny volamena rehetra hita tamin’ny rakitra, na ny tao an-tranon’i Jehovah, na ny tao an-tranon’ny mpanjaka, ary nampitondrainy ho any amin’i Hazaela, mpanjakan’i Syria, izany; ka dia niverina tsy nankany Jerosalema Hazaela.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary tamin’ny taona fahafito nanjakan’i Jeho no vao nanjaka izy; ary efa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Zibia, avy any Beri-sheba. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary ny tantaran’i Joasy sisa mbamin’izay rehetra nataony, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany?
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary nitsangana ny mpanompon’i Joasy ka niodina taminy, dia namono azy tao an-trano Milo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fiarovana.
      marker-yv: yv-n
    - type: text
      text: ' ao am-pidinana mankany Sila. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa Jozakara, zanak’i Simata, sy Jozabada, zanak’i Somera, mpanompony, namely azy ho faty; dia nalevina tao amin’ny razany tao an-Tanànan’i Davida izy; ary Amazia zanany no nanjaka nandimby azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary Joasy nanao izay mahitsy eo imason’i Jehovah tamin’ny androny rehetra izay nanoloran’i Joiada mpisorona saina azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nefa kosa ny fitoerana avo tsy mba noravana; ary ny olona mbola namono zavatra hatao fanatitra sady nandoro ditin-kazo manitra teo amin’ny fitoerana avo ihany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy Joasy tamin’ny mpisorona: Ny vola amin’ny zava-masina rehetra izay nampidirina tao an-tranon’i Jehovah, dia ny volan’ny olona voaisa sy ny vola rehetra izay azo tamin’ny tomban’olona ary ny vola rehetra izay nentin’ny isan-olona an-tsitrapo ho ao an-tranon’i Jehovah,– '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: aoka horaisin’ny mpisorona amin’ny olom-pantany avy izany ka hanamboarany ny simba amin’ny trano, na amin’inona na amin’inona no hitany misy simba.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Kanjo hatramin’ny fahatelo amby roa-polo taona nanjakan’i Joasy mpanjaka dia tsy mbola voavoatry ny mpisorona ihany ny simba tamin’ny trano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ka dia niantso an’i Joiada mpisorona sy ny mpisorona sasany koa Joasy mpanjaka ka nanao taminy hoe: Nahoana hianareo no tsy namamboatra ny simba amin’ny trano? Koa ankehitriny, aza mandray vola amin’ny olom-pantatrareo intsony hianareo, fa omeo hanamboarana ny simba amin’ny trano ny vola. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary ny mpisorona nanaiky tsy handray vola amin’ny olona intsony sady tsy hanamboatra ny simba amin’ny trano.
