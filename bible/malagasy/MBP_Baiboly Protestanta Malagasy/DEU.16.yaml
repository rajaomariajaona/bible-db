document_id: DEU.16,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny andro firavoravoana telo, dia ny Paska sy ny Pentekosta ary ny Tabernakely.
  - type: text
    content: 'TANDREMO ny volana Abiba, ka ataovy ny Paskan’i Jehovah Andriamanitrao; fa tamin’ny volana Abiba no nitondran’i Jehovah Andriamanitrao anao nivoaka avy tany Egypta tamin’ny alina. '
  '10':
  - type: text
    content: Ary mitandrema andro firavoravoana manarakaraka ireo herinandro
  - type: note
    content: Dia ny Pentekosta.
  - type: text
    content: ' ho an’i Jehovah Andriamanitrao, ka manatera fanati-tsitrapo, izay homenao araka izay itahian’i Jehovah Andriamanitrao anao; '
  '11':
  - type: text
    content: 'ary mifalia eo anatrehan’i Jehovah Andriamanitrao hianao sy ny zanakao-lahy sy ny zanakao-vavy ary ny ankizilahinao sy ny ankizivavinao ary ny Levita izay ao an-tanànanao mbamin’ny vahiny sy ny kamboty ary ny mpitondratena izay eo aminao, dia eo amin’ny tany izay hofidin’i Jehovah Andriamanitrao hampitoerany ny anarany. '
  '12':
  - type: text
    content: Ary tsarovy fa andevo tany Egypta hianao; koa tandremo sy araho ireo didy ireo.
  '13':
  - type: text
    content: 'Tandremo hafitoana ny andro firavoravoana fitoeranan ami’ny trano rantsan-kazo, rehefa nangoninao ny avy amin’ny famoloanao sy ny famiazanao. '
  '14':
  - type: text
    content: 'Ary mifalia amin’ny andro firavoravoanao hianao sy ny zanakao-lahy sy ny zanakao-vavy sy ny ankizilahinao sy ny ankizivavinao ary ny Levita mbamin’ny vahiny sy ny kamboty ary ny mpitondratena izay ao an-tanànanao. '
  '15':
  - type: text
    content: Hafitoana no hitandremanao andro firavoravoana ho an’i Jehovah Andriamanitrao eo amin’ny tany izay hofidin’i Jehovah, satria hitahy anao i Jehovah Andriamanitrao amin’ny vokatrao rehetra sy ny asan-tànanao rehetra, ka dia hifaly tokoa hianao.
  '16':
  - type: text
    content: Intelo isan-kerintaona ny lehilahy rehetra aminao no hiseho eo anatrehan’i Jehovah, Andriamanitrao, eo amin’ny tany izay hofidiny, dia amin’ny andro firavoravoana fihinanana mofo tsy misy masirasira sy ny andro firavoravoana manarakaraka ireo herinandro
  - type: note
    content: Dia ny Pentekosta.
  - type: text
    content: ' ary ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo. Ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehan’i Jehovah; '
  '17':
  - type: text
    content: fa aoka samy hanatitra izay zakany avy, araka ny fitahian’i Jehovah Andriamanitrao, izay omeny anao.
  - type: heading
    content: Ny amin’ny fitsarana sy ny fifidianana mpanjaka.
  '18':
  - type: text
    content: MIFIDIANA mpitsara sy mpifehy ho anao ao an-tanànanao rehetra, izay omen’i Jehovah Andriamanitrao anao, araka ny firenenao; dia hitsara ny olona amin’ny fitsarana marina ireo.
  '19':
  - type: text
    content: 'Aza manao fitsarana miangatra, aza mizaha tavan’olona, ary aza mandray kolikoly; fa ny kolikoly mahajamba ny mason’ny hendry ary mamadika ny tenin’ny marina. '
  '2':
  - type: text
    content: 'Ary vonoy ny Paskan’i Jehovah Andriamanitrao, dia ondry aman-osy sy omby, eo amin’ny tany izay hofidin’i Jehovah hampitoerany ny anarany. '
  '20':
  - type: text
    content: Ny marina dia marina no harahinao, mba ho velona hianao ka handova ny tany izay omen’i Jehovah Andriamanitrao anao.
  '21':
  - type: text
    content: 'Aza manangana hazo ho Aseraha ho anao eo anilan’ny alitaran’i Jehovah Andriamanitrao, izay ataonao ho anao '
  '22':
  - type: text
    content: Ary aza manao tsangam-baton-tsampy ho anao; fa halan’i Jehovah Andriamanitrao izany.
  '3':
  - type: text
    content: 'Aza ny mofo misy masirasira no haninao aminy; hafitoana no hihinananao mofo tsy misy masirasira, dia mofom-pahoriana–fa tampoka no nivoahanao avy tany amin’ny tany Egypta–mba hotsarovanao amin’ny andro rehetra hiainanao ny andro izay nivoahanao avy tany amin’ ny tany Egypta. '
  '4':
  - type: text
    content: Ary aoka tsy hisy masirasira eo aminao ao anatin’ny fari-taninao rehetra hafitoana; ary aoka tsy hisy hitoetra miloaka alina ny henan’ny fanatitra izay novonoinao tamin’ny harivan’ny andro voalohany.
  '5':
  - type: text
    content: 'Tsy hisy azonao hamonoana ny Paska ny tanànanao rehetra izay omen’i Jehovah Andriamanitrao anao; '
  '6':
  - type: text
    content: 'fa eo amin’ny fitoerana izay hofidin’i Jehovah Andriamanitrao hampitoerany ny anarany no hamonoanao azy rehefa hariva tokony ho maty masoandro, dia tahaka ilay nivoahanao avy tany Egypta. '
  '7':
  - type: text
    content: 'Ary atsatsiho amin’ny afo izy, ka hano eo amin’ny tany izay hofidin’i Jehovah Andriamanitrao; ary miverena nony maraina, ka modia any amin’ny lainao. '
  '8':
  - type: text
    content: Henemana no hihinananao mofo tsy misy masirasira; fa ny andro fahafito dia fara-fivoriana ho an’i Jehovah Andriamanitrao, ka tsy hanao raharaha hianao amin’izany.
  '9':
  - type: text
    content: 'Herinandro fito no hisainao ho anao: hatramin’ny andro iandohan’ny fijinjam-bary no hanisanao azy. '
