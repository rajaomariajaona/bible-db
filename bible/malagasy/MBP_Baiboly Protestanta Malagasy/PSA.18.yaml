document_id: PSA.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitantaran’i Davida ny namonjen’Andriamanitra azy.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’i Davida, mpanompon’i Jehovah, izay nilaza tamin’i Jehovah ny tenin’ity fihirana ity tamin’ny andro namonjen’i Jehovah azy tamin’ny tànan’ny fahavalony rehetra, indrindra fa tamin’ny tànan’i Saoly; dia hoy izy:–
  - type: text
    content: MAMIKO indrindra Hianao, Jehovah Heriko ô.
  '10':
  - type: text
    content: Dia nitaingina kerobima Izy ka nanidina,
  - type: text
    content: Eny, nanidina faingana tamin’ny ela-drivotra Izy.
  '11':
  - type: text
    content: Efa nanao ny maizina ho fiereny sy tranony manodidina Azy Izy,
  - type: text
    content: Dia rahona ngalingaly
  - type: note
    content: Heb. aizin-drano.
  - type: text
    content: ' –rahona matevina.'
  '12':
  - type: text
    content: Ary teo amin’ny famirapiratana teo anatrehany dia nandalo ny rahony matevina–
  - type: text
    content: Havandra sy vainafo.
  '13':
  - type: text
    content: Dia nampikotroka tany an-danitra Jehovah,
  - type: text
    content: Ny Avo Indrindra niloa-peo–
  - type: text
    content: Havandra sy vainafo.
  '14':
  - type: text
    content: 'Dia nandefa ny zana-tsipìkany Izy ka nampiely '
  - type: text
    content: ny fahavaloko,
  - type: text
    content: Ary nampandeha helatra be ka nampifanaritaka azy.
  '15':
  - type: text
    content: Dia hita ny mason-drano,
  - type: text
    content: Ary niseho ny fanambanin’ny tany
  - type: text
    content: Noho ny teny mafy nataonao, Jehovah ô,
  - type: text
    content: Noho ny fifofofofon’ny fofonain’ny vavoronao.
  '16':
  - type: text
    content: Naninjitra ny tànany avy tany ambony Izy ka nandray ahy;
  - type: text
    content: Nanintona ahy niala tamin’ny rano be Izy;
  '17':
  - type: text
    content: Namonjy ahy tamin’ny fahavaloko mahery Izy
  - type: text
    content: Sy tamin’izay nankahala ahy, satria tsy leoko ireny.
  '18':
  - type: text
    content: Nisakana ahy tamin’ny andro nahitako loza ireny,
  - type: text
    content: Nefa Jehovah no niseho ho Mpanohana ahy.
  '19':
  - type: text
    content: Dia nitondra ahy ho any amin’ny malalaka Izy;
  - type: text
    content: Namonjy ahy Izy, satria tiany aho.
  '2':
  - type: text
    content: Jehovah no harambatoko sy batery fiarovana ho ahy ary Mpamonjy ahy;
  - type: text
    content: Andriamanitro, vatolampy ialofako,
  - type: text
    content: Sy ampingako ary tandroka famonjena ahy sy fiarovana avo ho ahy.
  '20':
  - type: text
    content: Nanisy soa ahy araka ny fahamarinako Jehovah;
  - type: text
    content: Araka ny fahadiovan’ny tànako no namaliany ahy.
  '21':
  - type: text
    content: Fa nitandrina ny làlan’i Jehovah aho,
  - type: text
    content: Ka tsy mba nanao ratsy hialana tamin’Andriamanitro;
  '22':
  - type: text
    content: Ny fitsipiny rehetra dia teo anatrehako,
  - type: text
    content: Ary ny lalàny tsy mba nampialaiko tamiko;
  '23':
  - type: text
    content: Tsy nanan-tsiny taminy aho
  - type: text
    content: Sady niaro tena tsy ho azon’ny fahotako;
  '24':
  - type: text
    content: Koa namaly ahy araka ny fahamarinako Jehovah,
  - type: text
    content: Dia araka ny fahadiovan’ny tànako teo imasony.
  '25':
  - type: text
    content: Ny olona tsara no isehoanao fa tsara;
  - type: text
    content: Ny tena olo-marina no isehoanao fa marina;
  '26':
  - type: text
    content: Ny madio no isehoanao fa madio;
  - type: text
    content: Ary ny mpiolakolaka kosa no isehoanao fa lalin-tsaina.
  - type: note
    content: Heb. miolakolaka.
  '27':
  - type: text
    content: Fa Hianao mamonjy ny olona ory;
  - type: text
    content: Ary ny maso miandranandrana kosa aetrinao.
  '28':
  - type: text
    content: Fa Hianao mampirehitra ny jiroko;
  - type: text
    content: Jehovah Andriamanitro no mampahazava ny fahamaizinako.
  '29':
  - type: text
    content: Fa Hianao no ahazoako mitsarapaka hamely ny miaramila iray toko;
  - type: text
    content: Ary Andriamanitro no ahazoako mitsambikina mihoatra ny mànda.
  '3':
  - type: text
    content: Miantso an’i Jehovah Izay mendrika hoderaina aho,
  - type: text
    content: Ka dia vonjena ho afaka amin’ny fahavaloko.
  '30':
  - type: text
    content: Raha ny amin’Andriamanitra, dia marina ny làlany;
  - type: text
    content: Ny tenin’i Jehovah dia voazaha toetra amin’ny memy;
  - type: text
    content: Jehovah no ampingan’izay rehetra mialoka aminy.
  '31':
  - type: text
    content: Fa iza no Andriamanitra afa-tsy Jehovah?
  - type: text
    content: Ary iza no Vatolampy afa-tsy Andriamanitsika?
  '32':
  - type: text
    content: Izany Andriamanitra izany no mampisikina hery ahy
  - type: text
    content: Sy manamarina ny alehako.
  '33':
  - type: text
    content: Manao ny tongotro ho tahaka ny an’ny dieravavy Izy
  - type: text
    content: Ka mampitoetra ahy eo amin’ny fitoerako avo.
  '34':
  - type: text
    content: Mampianatra ny tànako hiady Izy,
  - type: text
    content: Ka mahahenjana tsipìka varahina ny sandriko.
  '35':
  - type: text
    content: Omenao ahy ny ampingan’ny famonjenao;
  - type: text
    content: Ny tànanao ankavanana no manohana ahy,
  - type: text
    content: Ary ny fahamoram-panahinao no maha-lehibe ahy.
  '36':
  - type: text
    content: Halalahinao ny làlana hodiaviko,
  - type: text
    content: Ka tsy mangovitra ny hato-tongotro.
  '37':
  - type: text
    content: Manenjika ny fahavaloko aho ka mahatratra azy;
  - type: text
    content: Ary tsy mba miverina aho mandra-pahalany ritrany.
  '38':
  - type: text
    content: Mamely mafy azy aho, ka tsy mahaleo izy;
  - type: text
    content: Lavo eo ambanin’ny tongotro izy.
  '39':
  - type: text
    content: Hianao mampisikina ahy hery hiady;
  - type: text
    content: Aripakao ho ambaniko izay mitsangana hamely ahy,
  '4':
  - type: text
    content: Nihodidina tamiko ny famatoram-pahafatesana,
  - type: text
    content: Ary ny riaky ny faharatsiana nampahatahotra ahy.
  '40':
  - type: text
    content: Ary ataonao miamboho ahy ny fahavaloko;
  - type: text
    content: Ka aringako izay mankahala ahy.
  '41':
  - type: text
    content: Mitaraina izy, fa tsy misy mpamonjy,
  - type: text
    content: Dia amin’i Jehovah, fa tsy mamaly azy Izy.
  '42':
  - type: text
    content: Torotoroiko madinika tahaka ny vovoka entin’ny rivotra izy;
  - type: text
    content: Tahaka ny fanary fotaka eny an-dàlambe no fanariko azy.
  '43':
  - type: text
    content: Mamonjy ahy amin’ny fifanoheran’ny olona Hianao
  - type: text
    content: Sy manandratra ahy ho lohan’ny firenen-tsamy hafa;
  - type: text
    content: Ny firenena tsy fantatro aza dia manompo ahy.
  '44':
  - type: text
    content: Raha vao mahare ny lazako fotsiny ihany aza izy, dia manoa ahy;
  - type: text
    content: Ny hafa firenena mikoy ahy.
  - type: note
    content: 'Na: Ny olona re laza fotsiny ihany aza, dia hafa firenena, mikoy ahy.'
  '45':
  - type: text
    content: Ny hafa firenena dia mihaketraka
  - type: text
    content: Ka miala amin-kovitra avy ao amin’ny fiarovany mafy.
  '46':
  - type: text
    content: Velona Jehovah; isaorana anie ny Vatolampiko;
  - type: text
    content: Asandratra anie Andriamanitry ny famonjena ahy,
  '47':
  - type: text
    content: Dia Andriamanitra, Izay manao famaliana ho ahy
  - type: text
    content: Ka mampanaiky ny firenena ahy.
  '48':
  - type: text
    content: Mamonjy ahy amin’ny fahavaloko Izy;
  - type: text
    content: Eny, manandratra ahy ho ambonin’izay mitsangana hanohitra ahy Hianao,
  - type: text
    content: Ary mamonjy ahy amin’ny olon-dozabe.
  '49':
  - type: text
    content: Koa izany no hiderako Anao eny amin’ny firenen-tsamy hafa, Jehovah ô,
  - type: text
    content: Sy hankalazako ny anaranao.
  '5':
  - type: text
    content: Ny famatoran’ny fianan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' nihodidina tamiko;'
  - type: text
    content: Nisakana ahy ny fandriky ny fahafatesana.
  '50':
  - type: text
    content: Manao famonjen-dehibe ho an’ny mpanjaka voatendriny Izy
  - type: text
    content: Ary mamindrafo amin’ny voahosony,
  - type: text
    content: Dia amin’i Davida sy ny taranany mandrakizay.
  '6':
  - type: text
    content: Fony azom-pahoriana aho, dia niantso an’i Jehovah,
  - type: text
    content: Eny, Andriamanitro no nitarainako;
  - type: text
    content: Nihaino ny feoko tao an-tempoliny Izy,
  - type: text
    content: Ary ny fitarainako teo anatrehany dia efa tonga teo an-tsofiny.
  '7':
  - type: text
    content: Dia nihozongozona sy nihorohoro ny tany,
  - type: text
    content: Ary ny fanambanin’ny tendrombohitra nihorohoro;
  - type: text
    content: Eny, nihozongozona ireo, satria tezitra Jehovah.
  '8':
  - type: text
    content: Nisy setroka nisavoana teo am-bavorony,
  - type: text
    content: Ary afo avy teo am-bavany no nandevona
  - type: text
    content: Ka nisy vainafo nidedadeda teo aminy.
  '9':
  - type: text
    content: Dia naondriny ny lanitra, ka nidina Izy;
  - type: text
    content: Ary aizim-pito no teo ambanin’ny tongony.
