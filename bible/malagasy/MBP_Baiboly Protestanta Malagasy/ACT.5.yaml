document_id: ACT.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’i Ananiasy sy Safira.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'FA nisy kosa lehilahy atao hoe Ananiasy sy Safira vadiny nivarotra tany, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nikarapoka teo anoloan’ny tongony niaraka tamin’izay koa izy, ka afaka ny ainy; ary raha niditra ny zatovo, dia hitany fa maty, ary nentiny nivoaka ka naleviny teo anilan’ny lahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia raiki-tahotra indrindra ny fiangonana rehetra sy izay rehetra nandre izany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fahagagana nataon’ny Apostoly sy ny nandrosoan’ny fiangonana.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ARY ny tànan’ny Apostoly no nanaovana famantarana sy fahagagana maro teo amin’ny vahoaka; ary izy rehetra niray saina teo amin’ny Fialofan’i Solomona; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary tsy nisy tamin’ny olona sisa rehetra sahy niray taminy; nefa nankalaza azy ny vahoaka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary vao mainka nisy olona maro koa na lahy na vavy izay nino ny Tompo nanampy ho isany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ka dia nentiny teny an-dàlambe aza ny marary ka napetrany teny ambony farafara sy fandriana, mba hisy ho azon’ny tandindon’i Petera ahay, raha mandalo izy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary ny olona maro avy tamin’ny vohitra manodidina an’i Jerosalema dia nivory koa, nitondra ny marary sy izay nampahorin’ny fanahy maloto; dia sitrana avokoa izy rehetra.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny namatorana ny Apostoly rehetra, sy ny nitondrana azy teo anatrehan’ny Synedriona.
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ARY nitsangana ny mpisoronabe mbamin’ny namany rehetra (izay antokon’ny Sadoseo), fa feno fialonana izy, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: dia nisambotra ny Apostoly izy ka nanao azy tao an-trano-maizina.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa nisy anjelin’ny Tompo namoha ny varavaran’ny trano-maizina nony alina, dia nitondra azy nivoaka ka nanao hoe: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka nanafenany ho azy ny vola vidiny, ary ny vavy koa nahalala izany; dia nentiny ny vola sasany vidiny ka napetrany teo anoloan’ny tongotry ny Apostoly. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mandehana, ka mitsangàna, ary mitoria amin’ny vahoaka eo an-kianjan’ny tempoly ny teny rehetra milaza izany fiainana izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary rehefa nandre izany izy, dia niditra maraina koa teo an-kianjan’ny tempoly ka nampianatra.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga ny mpisoronabe sy ny namany, dia nampiangona ny Synedriona sy ny loholona rehetra tamin’ny Zanak’Isiraely izy ka naniraka nankao amin’ny trano-maizina haka ny Apostoly. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa nony tonga ny mpiandry raharaha, dia tsy nahita azy tao an-trano-maizina; dia niverina izy ka nilaza hoe: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny trano-maizina dia hitanay mihidy tsara, ary ny mpiambina mitsangana eo am-baravarana; kanefa nony novohanay, dia tsy nahita olona tao izahay.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ny lehiben’ny mpiambina ny tempoly sy ny lohan’ny mpisorona, rehefa nandre izany teny izany, dia niroahana ny amin’izay ho faran’izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia nisy tonga ka nilaza taminy hoe: Ireny lehilahy izay nataonareo tao an-trano-maizina ireny, dia indreo izy mitsangana eo an-kianjan’ny tempoly ka mampianatra ny olona.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia lasa ny lehiben’ny mpiambina sy ny mpiandry raharaha ka nitondra azy, nefa tsy nanao mahery, satria natahotra ny vahoaka izy, fandrao hotorahany vato. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary rehefa nentiny, dia napetrany teo anatrehan’ny Synedriona ireo, ary ny mpisoronabe nanontany azy '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'ka nanao hoe: Efa noraranay mafy dia mafy hianareo tsy hampianatra amin’izany anarana izany; kanjo, indro, efa nofenoinareo ny fampianaranareo Jerosalema, ka tianareo hankinina aminay ny ran’izany Lehilahy izany.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa Petera sy ny Apostoly namaly ka nanao hoe: Andriamanitra no tokony hekena mihoatra noho ny olona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hoy Petera: Ry Ananiasy, nahoana Satana no nameno ny fonao handainga amin’ny Fanahy Masina ka hanafina ny vola sasany vidin’ny tany? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Andriamanitry ny razantsika efa nanangana an’i Jesosy, Izay novonoin’ny tànanareo nahantonareo teo amin’ny hazo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Izy nasandratry ny tànana ankavanan’Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nasandratra ho eo an-tànana ankavanan’Andriamanitra.
      marker-yv: yv-n
    - type: text
      text: ' ho Tompo sy Mpamonjy, hanome fibebahana sy famelan-keloka ho an’ny Isiraely. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary izahay dia vavolombelon’izany zavatra izany, ary ny Fanahy Masina koa, Izay efa nomen’Andriamanitra ny manaiky Azy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary raha nandre izany izy, dia lotika ny fony, ka nihendry hamono azy izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia nitsangana teo amin’ny Synedriona ny Fariseo anankiray atao hoe Gamaliela, mpampiana-dalàna, izay nalaza teo amin’ny olona rehetra, ary nasainy navoaka kely ireo olona ireo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia hoy izy tamin’ny namany: Ry lehilahy Isiraely, tandremo tsara izay hataonareo amin’ireo olona ireo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Fa nitsangana fahiny Teodasy ka nanao ny tenany ho zavatra; tokony ho efa-jato no isan’ny lehilahy izay niandany taminy; fa novonoina izy ka nihahaka izay rehetra nanaiky azy ka tonga tsinontsinona. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary nanarakaraka azy indray, tamin’ny andro nanoratana ny vahoaka, dia nitsangana Jodasy avy any Galilia; ary izy nitaona olona hikomy hanaraka azy; dia novonoina koa izy, ka nihahaka izay rehetra nanaiky azy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary ankehitriny dia lazaiko aminareo: Mandefera amin’ireo olona ireo, ka avelao ihany izy; fa raha avy amin’olona izao saina na asa izao, dia ho foana; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: fa raha avy amin’Andriamanitra kosa izao, dia tsy ho azonareo foanana, sao dia miseho ho mpiady amin’Andriamanitra hianareo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fony tsy namidy, tsy anao ihany va izy? Ary rehefa namidy, tsy anao hanaovanao izay sitraponao koa va? Nahoana no nisaina izany tao am-ponao hianao? Tsy nandainga tamin’olona hianao, fa tamin’Andriamanitra. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia nanaiky azy izy; ary rehefa niantso ny Apostoly izy, dia nikapoka azy sady nandrara azy tsy hiteny amin’ny anaran’i Jesosy intsony, ary dia nandefa azy handeha. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary ireo dia niala teo anatrehan’ny Synedriona, sady faly, satria natao mendrika hitondra fahafaham-baraka ho voninahitr’izany anarana izany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ary tsy nitsahatra nampianatra sy nitory an’i Jesosy ho Kristy isan-andro teo an-kianjan’ny tempoly sy tao an-trano izy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Ananiasy, nony nandre izany teny izany, dia nikarapoka, ka afaka ny ainy; dia raiki-tahotra loatra izay rehetra nandre izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary nitsangana ny zatovo, dia nofonosiny ny faty ka nentiny nivoaka, dia naleviny.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa rehefa afaka tokony ho ora telo, dia niditra koa ny vavy, nefa tsy fantany izay efa nanjo teo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy Petera taminy: Lazao amiko: Izany ihany va no vola vidin’ny taninareo? Dia hoy izy: Eny, izany ihany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hoy
    - type: text
      text: ' Petera taminy: Nahoana hianareo no niray tetika haka fanahy ny Fanahin’ny Tompo? Indro, eo am-baravarana ny tongotr’izay nandevina ny vadinao, ary hitondra anao hivoaka koa izy. '
