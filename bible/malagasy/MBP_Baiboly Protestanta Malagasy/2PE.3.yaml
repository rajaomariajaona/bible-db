document_id: 2PE.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny hihavian’ny Tompo, sy fananarana noho izany.
  - type: text
    content: 'RY malala, ity no epistily faharoa soratako ho aminareo ankehitriny, ka izy roroa dia samy entiko mampifoha ny sainareo madio amin’ny fampahatsiarovana, '
  '10':
  - type: text
    content: Fa ho avy tahaka ny mpangalatra ny andron’ny Tompo, ary amin’izany ny lanitra dia ho lasa amin’ny firimorimoana mafy, ary ho levon’ny afo ny tenan’ny zavatra rehetra,
  - type: note
    content: 'Na: ny masoandro sy ny volana ary ny kintana.'
  - type: text
    content: ' ka hodorana avokoa ny tany sy ny asa izay eo aminy.'
  '11':
  - type: text
    content: 'Koa raha ho levona toy izany izao zavatra rehetra izao, dia olona tokony hanao ahoana moa hianareo amin’ny fitondrantena masina sy ny toe-panahy araka an’Andriamanitra, '
  '12':
  - type: text
    content: sady manantena no mampahafaingana
  - type: note
    content: 'Na: maniry mafy.'
  - type: text
    content: ' ny hihavian’ny andron’Andriamanitra, izay hahamay sy hahalevona ny lanitra ary handoro sy hampiempo ny tenan’ny zavatra rehetra!'
  - type: note
    content: 'Na: ny masoandro sy ny volana ary ny kintana.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: Kanefa isika, araka ny teny fikasany, dia manantena lanitra vaovao sy tany vaovao, izay itoeran’ny fahamarinana.
  '14':
  - type: text
    content: 'Koa amin’izany, ry malala, satria manantena izany zavatra izany hianareo, dia mazotoa mba ho hita tsy manan-tsiny amam-pondro eo anatrehan’ny Tompo amin’ny fihavanana. '
  '15':
  - type: text
    content: 'Ary ny fahari-pon’ny Tompontsika dia ekeo ho famonjena, tahaka ny voasoratr’i Paoly, rahalahy malalantsika, taminareo koa araka ny fahendrena nomena azy, '
  '16':
  - type: text
    content: 'tahaka ny ataony ao amin’ny epistiliny rehetra koa, fa milaza izany zavatra izany ao aminy izy; ary amin’ireo dia misy zavatra saro-pantarina, izay aolan’ny olona kely fahalalana sady tsy miorina tsara, tahaka ny anaovany ny teny sasany amin’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' koa, ka mahatonga fahaverezana ho an’ny tenany.'
  '17':
  - type: text
    content: 'Koa, satria fantatrareo rahateo izany, ry malala, dia tandremo fandrao ho voataonan’ny fahadisoan’ny ratsy fanahy hianareo ka ho lavo hiala amin’izay iorenanareo; '
  '18':
  - type: text
    content: fa mitomboa amin’ny fahasoavana sy ny fahalalana an’i Jesosy Kristy, Tompontsika sy Mpamonjy. Ho Azy anie ny voninahitra ankehitriny sy mandrakizay. Amena.
  '2':
  - type: text
    content: 'mba hahatsiarovanareo ny teny voalazan’ny mpaminany masina rahateo sy ny didin’ny Tompo sady Mpamonjy izay nentin’ny Apostoly nirahina ho atỳ aminareo; '
  '3':
  - type: text
    content: 'fa fantatrareo voalohany indrindra fa amin’ny andro farany dia hisy mpaniratsira avy haniratsira, mandeha araka ny filany '
  '4':
  - type: text
    content: 'ka manao hoe: Aiza ny teny fikasana ny amin’ny fihaviany? Fa hatrizay nodian’ny razana mandry dia maharitra tsy miova ny zavatra rehetra; eny, hatramin’ny nanaovana izao tontolo izao aza.'
  '5':
  - type: text
    content: 'Fa minia jamba ireo ka tsy mahalala fa nisy hatramin’ny ela ny lanitra, ary nisy tany koa, izay niseho avy tamin’ny rano, sady rano no nanaovana azy tamin’ny tenin’Andriamanitra, '
  '6':
  - type: text
    content: 'ary rano koa no nandravana izao rehetra izao taloha tamin’ny nanasaforany azy; '
  '7':
  - type: text
    content: fa izao lanitra sy tany ankehitriny izao dia hazonin’izany teny izany ho amin’ny afo ka tehirizina ho amin’ny andro fitsarana sy fandringanana ny ratsy fanahy.
  '8':
  - type: text
    content: 'Nefa, ry malala, izao zavatra iray loha izao no aoka tsy hohadinoinareo: ny indray andro amin’ny Tompo dia toy ny arivo taona, ary ny arivo taona toy ny indray andro. '
  '9':
  - type: text
    content: 'Ny Tompo tsy mahela ny teny fikasany, araka izay ataon’ny sasany ho fahelany; fa mahari-po aminareo Izy, ka tsy tiany hisy ho very, fa mba ho tonga amin’ny fibebahana izy rehetra, '
