document_id: 2PE.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny hihavian’ny Tompo, sy fananarana noho izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'RY malala, ity no epistily faharoa soratako ho aminareo ankehitriny, ka izy roroa dia samy entiko mampifoha ny sainareo madio amin’ny fampahatsiarovana, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ho avy tahaka ny mpangalatra ny andron’ny Tompo, ary amin’izany ny lanitra dia ho lasa amin’ny firimorimoana mafy, ary ho levon’ny afo ny tenan’ny zavatra rehetra,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny masoandro sy ny volana ary ny kintana.
      marker-yv: yv-n
    - type: text
      text: ' ka hodorana avokoa ny tany sy ny asa izay eo aminy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa raha ho levona toy izany izao zavatra rehetra izao, dia olona tokony hanao ahoana moa hianareo amin’ny fitondrantena masina sy ny toe-panahy araka an’Andriamanitra, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: sady manantena no mampahafaingana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: maniry mafy.
      marker-yv: yv-n
    - type: text
      text: ' ny hihavian’ny andron’Andriamanitra, izay hahamay sy hahalevona ny lanitra ary handoro sy hampiempo ny tenan’ny zavatra rehetra!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny masoandro sy ny volana ary ny kintana.
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Kanefa isika, araka ny teny fikasany, dia manantena lanitra vaovao sy tany vaovao, izay itoeran’ny fahamarinana.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa amin’izany, ry malala, satria manantena izany zavatra izany hianareo, dia mazotoa mba ho hita tsy manan-tsiny amam-pondro eo anatrehan’ny Tompo amin’ny fihavanana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny fahari-pon’ny Tompontsika dia ekeo ho famonjena, tahaka ny voasoratr’i Paoly, rahalahy malalantsika, taminareo koa araka ny fahendrena nomena azy, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'tahaka ny ataony ao amin’ny epistiliny rehetra koa, fa milaza izany zavatra izany ao aminy izy; ary amin’ireo dia misy zavatra saro-pantarina, izay aolan’ny olona kely fahalalana sady tsy miorina tsara, tahaka ny anaovany ny teny sasany amin’ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' koa, ka mahatonga fahaverezana ho an’ny tenany.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa, satria fantatrareo rahateo izany, ry malala, dia tandremo fandrao ho voataonan’ny fahadisoan’ny ratsy fanahy hianareo ka ho lavo hiala amin’izay iorenanareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: fa mitomboa amin’ny fahasoavana sy ny fahalalana an’i Jesosy Kristy, Tompontsika sy Mpamonjy. Ho Azy anie ny voninahitra ankehitriny sy mandrakizay. Amena.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'mba hahatsiarovanareo ny teny voalazan’ny mpaminany masina rahateo sy ny didin’ny Tompo sady Mpamonjy izay nentin’ny Apostoly nirahina ho atỳ aminareo; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'fa fantatrareo voalohany indrindra fa amin’ny andro farany dia hisy mpaniratsira avy haniratsira, mandeha araka ny filany '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ka manao hoe: Aiza ny teny fikasana ny amin’ny fihaviany? Fa hatrizay nodian’ny razana mandry dia maharitra tsy miova ny zavatra rehetra; eny, hatramin’ny nanaovana izao tontolo izao aza.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa minia jamba ireo ka tsy mahalala fa nisy hatramin’ny ela ny lanitra, ary nisy tany koa, izay niseho avy tamin’ny rano, sady rano no nanaovana azy tamin’ny tenin’Andriamanitra, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary rano koa no nandravana izao rehetra izao taloha tamin’ny nanasaforany azy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: fa izao lanitra sy tany ankehitriny izao dia hazonin’izany teny izany ho amin’ny afo ka tehirizina ho amin’ny andro fitsarana sy fandringanana ny ratsy fanahy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nefa, ry malala, izao zavatra iray loha izao no aoka tsy hohadinoinareo: ny indray andro amin’ny Tompo dia toy ny arivo taona, ary ny arivo taona toy ny indray andro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny Tompo tsy mahela ny teny fikasany, araka izay ataon’ny sasany ho fahelany; fa mahari-po aminareo Izy, ka tsy tiany hisy ho very, fa mba ho tonga amin’ny fibebahana izy rehetra, '
