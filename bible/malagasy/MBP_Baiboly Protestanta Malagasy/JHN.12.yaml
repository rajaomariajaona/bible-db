document_id: JHN.12,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary rehefa henemana no sisa tsy tonga ny Paska, Jesosy dia tonga tao Betania, izay nitoeran’i Lazarosy, ilay natsangany tamin’ny maty. '
  '10':
  - type: text
    content: 'Fa nihendry hahafaty an’i Lazarosy koa ny lohan’ny mpisorona, '
  '11':
  - type: text
    content: satria izy no nialan’ny maro tamin’ny Jiosy ka ninoany an’i Jesosy.
  - type: heading
    content: Ny niakaran’i Jesosy tany Jerosalema.
  - type: heading
    content: Mat. 21.1-11; Mar. 11.1-11; Lio. 19.29-44.
  '12':
  - type: text
    content: 'ARY nony ampitson’iny ny vahoaka betsaka, izay tonga ho amin’ny andro firavoravoana, rehefa nahare fa hankany Jerosalema Jesosy, '
  '13':
  - type: text
    content: 'dia naka sampan-drofia ka nivoaka hitsena Azy sady niantso hoe: Hosana! Isaorana anie ny Mpanjakan’ny Isiraely, Ilay avy amin’ny anaran’i Jehovah (Sal. 118.26).'
  '14':
  - type: text
    content: 'Ary Jesosy nahita zana-boriky anankiray, dia nitaingina azy, araka ny voasoratra hoe: '
  '15':
  - type: text
    content: ',,Aza matahotra, ry Ziona zanakavavy; indro, avy ny Mpanjakanao mitaingina zana-boriky’’ (Zak. 9.9).'
  '16':
  - type: text
    content: Izany zavatra izany dia tsy fantatry ny mpianany tamin’ny voalohany; fa rehefa niditra tamin’ny voninahiny Jesosy, dia vao nahatsiaro izy fa voasoratra hilaza Azy izany zavatra izany, ary efa nataony taminy izany.
  '17':
  - type: text
    content: 'Ary nanambara Azy ny vahoaka izay teny aminy, fony Izy niantso an’i Lazarosy hivoaka tamin’ny fasana ka nanangana azy tamin’ny maty. '
  '18':
  - type: text
    content: 'Ary izany koa no nitsenan’ny vahoaka Azy, satria efa reny fa nanao izany famantarana izany Izy. '
  '19':
  - type: text
    content: 'Ary tamin’izany ny Fariseo dia nifampilaza hoe: Hitanareo fa tsy mahefa na inona na inona akory hianareo; indro, efa lasa manaraka Azy avokoa izao tontolo izao.'
  - type: heading
    content: Ny amin’ny Grika izay ta-hahita an’i Jesosy, sy ny nilazan’i Jesosy ny amin’ny hahafatesany, ary ny amin’ny tsi-finoan’ny olona Azy.
  '2':
  - type: text
    content: Dia nanao fanasana ho an’i Jesosy tao izy; ary Marta no nanompo; fa Lazarosy no anankiray tamin’izay niara-nipetraka nihinana taminy.
  '20':
  - type: text
    content: 'ARY nisy Grika sasany tamin’izay niakatra hivavaka tamin’ny andro firavoravoana, '
  '21':
  - type: text
    content: 'ary izy ireo nankany amin’i Filipo avy any Betsaida any Galilia, dia nangataka taminy ka nanao hoe: Tompoko, mba ta-hahita an’i Jesosy izahay. '
  '22':
  - type: text
    content: Dia lasa Filipo nilaza tamin’i Andrea; ary Andrea sy Filipo lasa nilaza tamin’i Jesosy.
  '23':
  - type: text
    content: 'Ary Jesosy namaly azy hoe: Tonga ny fotoana hankalazana ny Zanak’olona. '
  '24':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Raha tsy latsaka ao amin’ny tany ny voam-bary ka maty, dia mitoetra foana izy; fa raha maty kosa izy, dia hahavokatra be. '
  '25':
  - type: text
    content: 'Izay tia ny ainy no mahavery izany; fa izay mankahala ny ainy amin’izao fiainana izao no hiaro izany ho amin’ny fiainana mandrakizay. '
  '26':
  - type: text
    content: 'Raha misy olona manompo Ahy, dia aoka izy hanaraka Ahy, ary izay itoerako, dia ao koa no hitoeran’ny mpanompoko; raha misy olona manompo Ahy, dia hankalaza azy ny Ray. '
  '27':
  - type: text
    content: 'Ankehitriny mangorohoro ny fanahiko; ary ahoana no holazaiko: Ray ô, vonjeo Aho ho afaka amin’ity ora ity? nefa izao no nihaviako ho amin’ity ora ity; '
  '28':
  - type: text
    content: Ray ô, mankalazà ny anaranao.
  - type: text
    content: 'Dia nisy feo avy tany an-danitra nanao hoe: Efa nankalaza azy Aho, ary hankalaza azy indray. '
  '29':
  - type: text
    content: 'Ary ny vahoaka izay nitsangana teo ka nahare dia nanao hoe: Kotrokorana izany. Hoy ny sasany: Anjely no niteny taminy. '
  '3':
  - type: text
    content: Ary Maria, rehefa naka menaka manitra nisy narda sady tsara no saro-bidy, lanjan’iray livatra, dia nanosotra ny tongotr’i Jesosy sy namaoka ny tongony tamin’ny volon-dohany; ary feno ny hanitry ny menaka ny trano.
  '30':
  - type: text
    content: 'Jesosy namaly ka nanao hoe: Tsy noho Izaho no nahatongavan’izany feo izany, fa noho hianareo. '
  '31':
  - type: text
    content: 'Tonga ankehitriny ny fitsarana izao tontolo izao; ankehitriny ny andrianan’izao tontolo izao no horoahina. '
  '32':
  - type: text
    content: 'Ary Izaho, raha asandratra hiala amin’ny tany, dia hitaona ny olona rehetra hanatona Ahy. '
  '33':
  - type: text
    content: Izany no nolazainy hanambara izay fahafatesana efa hiaretany.
  '34':
  - type: text
    content: 'Dia namaly Azy ny vahoaka ka nanao hoe: Efa renay tamin’ny lalàna fa Kristy haharitra mandrakizay; koa ahoana no ilazanao hoe: Tsy maintsy hasandratra ny Zanak’olona? Iza moa izany Zanak’olona izany? '
  '35':
  - type: text
    content: 'Dia hoy Jesosy taminy: Mbola kely ihany no hitoeran’ny mazava aminareo. Mandehana, raha mbola manana ny mazava hianareo, mba tsy hahatratra anareo ny maizina; fa izay mandeha amin’ny maizina dia tsy mahalala izay alehany. '
  '36':
  - type: text
    content: Raha mbola manana ny mazava hianareo, dia minoa ny mazava, mba ho tonga zanaky ny mazava.
  - type: text
    content: Rehefa nilaza izany Jesosy, dia niala Izy ka niery azy.
  '37':
  - type: text
    content: 'Nefa na dia efa nanao izany famantarana betsaka izany teo anatrehany aza Izy, dia tsy mba nino Azy ireo, '
  '38':
  - type: text
    content: 'mba hahatanteraka ny teny nataon’Isaia mpaminany hoe:'
  - type: text
    content: ',,Tompoko, iza no nino ny teny nampitondraina anay?'
  - type: text
    content: Ary iza no nampisehoana ny sandrin’i Jehovah?’’ (Isa. 53.1.)
  '39':
  - type: text
    content: 'Izany no tsy nahaizany nino, satria hoy koa Isaia:'
  '4':
  - type: text
    content: 'Ary hoy Jodasy Iskariota, anankiray tamin’ny mpianany, ilay efa hamadika Azy: '
  '40':
  - type: text
    content: ',,Efa nanajamba ny masony sy nanamafy ny fony Izy,'
  - type: text
    content: Mba tsy hahita ny masony, na hahalala ny fony,
  - type: text
    content: Dia tsy hibebaka izy,
  - type: text
    content: Ka tsy hahasitrana azy Aho’’ (Isa. 6.10).
  '41':
  - type: text
    content: 'Izany teny izany no nolazain’Isaia, satria nahita ny voninahiny izy ka nilaza Azy. '
  '42':
  - type: text
    content: 'Kanefa maro tamin’ny mpanakapa aza no nino Azy; nefa noho ny Fariseo dia tsy nanaiky ireo, fandrao havoaka hiala amin’ny synagoga. '
  '43':
  - type: text
    content: Fa tia ny voninahitra avy amin’ny olona izy ireo, fa tsy ny voninahitra avy amin’Andriamanitra.
  '44':
  - type: text
    content: 'Ary Jesosy niantso ka nanao hoe: Izay mino Ahy, dia tsy Izaho no inoany, fa Izay naniraka Ahy. '
  '45':
  - type: text
    content: 'Ary izay mahita Ahy dia mahita Izay naniraka Ahy. '
  '46':
  - type: text
    content: 'Izaho tonga amin’izao tontolo izao ho fahazavana, mba tsy hitoetra ao amin’ny maizina izay rehetra mino Ahy. '
  '47':
  - type: text
    content: 'Ary raha misy mandre ny teniko ka tsy mitandrina, Izaho tsy mitsara azy; fa tsy tonga hitsara izao tontolo izao Aho, fa hamonjy izao tontolo izao. '
  '48':
  - type: text
    content: 'Izay mandà Ahy ka tsy mandray ny teniko, dia manana izay mitsara azy: ny teny izay nolazaiko, izany ihany no hitsara azy amin’ny andro farany, '
  '49':
  - type: text
    content: 'satria Izaho tsy niteny ho Ahy, fa ny Ray Izay naniraka Ahy, Izy no nandidy Ahy izay holazaiko sy izay hotoriko. '
  '5':
  - type: text
    content: 'Nahoana io menaka io no tsy namidy denaria telon-jato ka nomena ny malahelo? '
  '50':
  - type: text
    content: Ary fantatro fa fiainana mandrakizay ny didiny; koa izay lazaiko dia lazaiko araka izay nolazain’ny Ray tamiko.
  '6':
  - type: text
    content: Ary izy no nilaza izany, tsy noho ny fiahiany ny malahelo, fa satria mpangalatra izy sady nitondra ny kitapo ka naka izay tao anatiny.
  '7':
  - type: text
    content: 'Dia hoy Jesosy: Avelao izy, mba hotehiriziny ho amin’ny andro hanamboarany Ahy halevina io. '
  '8':
  - type: text
    content: Fa ny malahelo dia etỳ aminareo mandrakariva; fa Izaho tsy mba ho etỳ aminareo mandrakariva.
  '9':
  - type: text
    content: 'Ary ny vahoaka betsaka tamin’ny Jiosy nahalala fa teo Izy, dia tonga teo, nefa tsy noho Jesosy ihany, fa mba hahita an’i Lazarosy koa, ilay natsangany tamin’ny maty. '
