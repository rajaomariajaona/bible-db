document_id: JER.37,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nangatahan’i Zedekia an’i Jeremia hivavaka ho azy, sy ny teny navalin’i Jeremia azy, ary ny nanaovana an’i Jeremia tao an-trano-maizina.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Zedekia mpanjaka, zanak’i Josia, dia nanjaka nandimby an’i Jekonia, zanak’i Joiakima, fa nampanjakain’i Nebokadnezara, mpanjakan’i Babylona, tao amin’ny tanin’ny Joda izy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na dia mamely ny miaramilan’ny Kaldeana rehetra izay miady aminareo aza hianareo, ka izay voalefona no ho sisa velona, ireo aza dia samy hitsangana avy ao anaty lainy ka handoro ity tanàna ity amin’ny afo.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha niala tany Jerosalema ny miaramilan’ny Kaldeana noho ny amin’ny miaramilan’i Farao, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nivoaka Jeremia avy tao Jerosalema hankany amin’ny tanin’ny Benjamina mba handray izay anjarany eo amin’ny vahoaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tonga teo am-bavahadin’i Benjamina izy, dia, indro, ny kapitenin’ny mpiambina, atao hoe Jiria, zanak’i Selemia, zanak’i Hanania, no teo; dia nisambotra an’i Jeremia mpaminany izy ka nanao hoe: Miray tetika amin’ny Kaldeana hianao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jeremia: Lainga izany. Tsy miray tetika amin’ny Kaldeana aho. Nefa tsy nino azy ireo, ka dia nosamborin’i Jiria ihany Jeremia ary nentiny ho ao amin’ny mpanapaka. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tezitra tamin’i Jeremia ny mpanapaka ka nikapoka azy, dia nandatsaka azy tao an-trano-maizina tao amin’ny tranon’i Jonatana mpanoratra; fa izany no nataony trano-maizina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tafiditra tao an-trano-maizina, tao amin’ilay niefitrefitra, Jeremia, ka efa nitoetra tao andro maro, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia naniraka haka azy Zedekia mpanjaka; ary ny mpanjaka nanontany azy mangingina tao an-tranony nanao hoe: Moa misy teny avy tamin’i Jehovah tokoa va? Dia hoy Jeremia: Eny, misy; ary hoy koa izy: Hatolotra eo an-tànan’ny mpanjakan’i Babylona hianao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Jeremia tamin’i Zedekia mpanjaka: Inona no ratsy nataoko taminao, na tamin’ny mpanomponao, na tamin’ity firenena ity, no dia nataonareo tao an-trano-maizina aho? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aiza moa ireo mpaminaninareo, izay naminany taminareo hoe: Tsy ho avy hiady aminareo na hamely ity tany ity ny mpanjakan’i Babylona? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nefa na izy, na ny mpanompony, na ny vahoaka, dia samy tsy nihaino ny tenin’i Jehovah, izay nampilazainy an’i Jeremia mpaminany.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa trarantitra hianao, ry tompokolahy mpanjaka, henoy kely ange! aoka hoborahina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hiankohoka.
      marker-yv: yv-n
    - type: text
      text: ' eto anatrehanao ny fifonako, ka aza averina ho ao amin’ny tranon’i Jonatana mpanoratra aho, fandrao dia maty ao.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nasain’i Zedekia mpanjaka nataony teo amin’ny kianjan’ny trano fiambenana Jeremia, ka nasainy nomena mofo iray isan-andro isan-andro avy any amin’ny fitoeran’ny mpanao mofo izy, ambara-pahalanin’ny mofo rehetra tao an-tanàna. Toy izany no nitoeran’i Jeremia teo amin’ny kianjan’ny trano fiambenana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Zedekia mpanjaka naniraka an’i Jehokala, zanak’i Selemia, sy Zefania, zanak’i Mahaseia, mpisorona, ho any amin’i Jeremia mpaminany hanao hoe: Mba ivavaho amin’i Jehovah Andriamanitsika re izahay. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jeremia mbola niditra sy nivoaka teo amin’ny olona ihany; fa tsy mbola nataony tao an-trano-maizina izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary efa niainga avy tany Egypta ny miaramilan’i Farao, ka raha nahare izany ny Kaldeana izay nanao fahirano an’ Jerosalema, dia niala tany Jerosalema izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga tamin’i Jeremia mpaminany ny tenin’i ehovah hoe: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Izao no lazaonareo amin’ny mpanjakan’ny Joda, izay naniraka anareo hankatỳ amiko hanontany amiko: Indro, ny miaramilan’i Farao, izay efa niainga hamonjy anareo, dia hiverina ho any Egypta taniny; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ho avy indray ny Kaldeana ka hamely ity tanàna ity sady hanafaka azy sy handoro azy amin’ny afo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah: Aza mamita-tena foana hianareo ka manao hoe: Hiala amintsika tokoa ny Kaldeana; fa tsy hiala izy tsy akory. '
