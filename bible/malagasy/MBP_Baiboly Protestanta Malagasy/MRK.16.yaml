document_id: MRK.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitsanganan’i Jesosy tamin’ny maty, sy ny nisehoany tamin’ny mpianany, ary ny nampiakarana Azy ho any an-danitra.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 28.1-20; Lio. 24.1-53; Jao. 20.1-29.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa afaka ny andro Sabata, dia lasa nividy zava-manitra Maria Magdalena sy Salome ary Maria, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: renin’i
  - type: text
    text: ' Jakoba, mba handeha hanosotra ny fatin’i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nony maraina koa tamin’ny voalohan’andro amin’ny herinandro, rehefa niposaka ny masoandro, dia nankany amin’ny fasana izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niresaka hoe izy: Iza re no hanakodia ny vato ho afaka amin’ny varavaram-pasana hisolo antsika? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa nony nitraka izy, dia, indro, hitany fa efa voakodia niala ny vato; fa lehibe dia lehibe ny vato. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha niditra tao anatin’ny fasana izy, dia nahita zatovo anankiray nipetraka teo amin’ny ankavanana niakanjo akanjo fotsy, dia talanjona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy ilay zatovo taminy: Aza talanjona; mitady an’i Jesosy avy any Nazareta, Izay nohomboana tamin’ny hazofijaliana, hianareo; efa nitsangana Izy; tsy ato Izy; jereo fa teo no nametrahany Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa mandehana, lazao amin’ny mpianany sy Petera fa mialoha anareo ho any Galilia Izy; any no hahitanareo Azy, araka izay nolazainy taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nivoaka izy ka lasa nandositra niala tamin’ny fasana, fa tora-kovitra sady talanjona izy; ary tsy mba nilaza na inona na inona tamin’olona izy, satria natahotra.
- type: usfm
  marker: p
  children:
  - type: text
    text: '['
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa nitsangana tamin’ny marain’ny andro voalohany amin’ny herinandro Jesosy, dia niseho voalohany tamin’i Maria Magdalena, ilay namoahany demonia fito, Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Maria nandeha ka nilaza tamin’ireo efa nomba an’i Jesosy, izay mbola nisaona sy nitomany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary izy ireo, na dia nandre aza fa velona Izy sady efa hitan-dravehivavy, dia mbola tsy nety nino ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary taorian’izany Jesosy dia niseho tamin’ny endrika hafa tamin’ny roa lahy aminy, izay nankany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary izy ireo nandeha ka nilaza tamin’ny namany; fa na dia ireo aza tsy ninoany koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa afaka izany, dia niseho tamin’ny iraika ambin’ny folo lahy Jesosy, raha nipetraka nihinana ireo; ary Izy nanome tsiny azy noho ny tsi-finoany sy ny hamafin’ny fony, satria tsy ninoany ireo efa nahita Azy, rehefa nitsangana Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Izy taminy: Mandehana any amin’izao tontolo izao hianareo, ka mitoria ny filazantsara amin’ny olombelona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay mino sy atao batisa no hovonjena; fa izay tsy mety mino no hohelohina. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izao famantarana izao no hanaraka izay mino: hamoaka demonia amin’ny anarako izy; hiteny amin’ny fiteny izay tsy mbola hainy izy; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: handray menarana izy; ary na dia misotro zava-mahafaty aza izy, dia tsy hampaninona azy izany; hametra-tànana amin’ny marary izy, dia ho sitrana ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Jesosy Tompo, rehefa niteny taminy, dia nampiakarina ho any an-danitra ka nipetraka eo an-kavanan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa izy ireo kosa dia lasa ka nitori-teny eny tontolo eny, ary ny Tompo niara-niasa taminy ka nanamarina ny teny tamin’ny famantarana izay nomba azy. Amena.]
