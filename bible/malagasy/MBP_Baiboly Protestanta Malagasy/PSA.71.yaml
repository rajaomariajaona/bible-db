document_id: PSA.71,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Vavaka ataon’izay mahatsiaro ny famindrampon’Andriamanitra taminy hatry ny fony tanora.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HIANAO, Jehovah ô, no itokiako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy ho menatra mandrakizay aho.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa miresaka ahy ny fahavaloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary miara-mioko izay manotrika hahazo ny aiko.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka manao hoe: Andriamanitra efa nahafoy azy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enjeho izy, ka sambory, fa tsy misy hamonjy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, aza manalavitra ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro ô, faingàna hamonjy ahy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho menatra sy ho levona ny mpanohitra ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hitafy henatra sy fahafaham-baraka izay mitady hanisy ratsy ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izaho kosa dia hanantena mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hitombo lalandava ny fiderako Anao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavako hitory ny fahamarinanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny famonjenao mandrakariva,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy fantatro ny isany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho entiko ny asa lehibe nataon’i Jehovah Tompo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampahatsiaro ny fahamarinanao aho, dia ny Anao ihany.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, Hianao efa nampianatra ahy hatry ny fony aho mbola tanora;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandraka ankehitriny dia nitory ny fahagaganao aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mandra-pahantitro sy fotsy volo, dia aza mahafoy ahy, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pilazako ny sandrinao amin’ny taranaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny asanao lehibe amin’izay rehetra mbola ho avy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihatra amin’izay avo indrindra ny fahamarinanao, Andriamanitra ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay nanao zava-dehibe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra ô, iza no tahaka Anao?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo ny fahamarinanao aho, ka afaho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano amiko ny sofinao, ka vonjeo aho.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao Izay nampahita ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '71.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anay.
      marker-yv: yv-n
    - type: text
      text: ' fahoriana be sady mafy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hamelona ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '71.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anay.
      marker-yv: yv-n
    - type: text
      text: ' ihdray'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampiakatra ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '71.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anay.
      marker-yv: yv-n
    - type: text
      text: ' indray hiala amin’ny fitoerana lalina amin’ny tany.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampitomboy ny voninahitro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hampionona ahy indray Hianao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho kosa hidera Anao amin’ny valiha, dia ny fahamarinanao, Andriamanitro ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hankalaza Anao amin’ny lokanga aho, ry Iray Masin’ny Isiraely ô.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihoby ny molotro, raha mankalaza Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fanahiko koa izay efa navotanao.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lelako hitory ny fahamarinanao mandrakariva;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa menatra sy mangaihay izay mitady hanisy ratsy ahy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho vatolampy fonenana hohatoniko mandrakariva Hianao, Izay efa nandidy hamonjy ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa harambatoko sy batery fiarovana ho ahy Hianao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro ô, afaho amin’ny tànan’ny ratsy fanahy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’ny tànan’ny mpanao meloka sy ny lozabe.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no fanantenako, Jehovah Tompo ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry tokiko hatry ny fony aho mbola tanora.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no nanankinana ahy hatrany am-bohoka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao namoaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '71.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'no Mpiaro, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mpanisy soa, ahy hatry, etc.
      marker-yv: yv-n
    - type: text
      text: ' ahy avy tany an-kibon-dreniko;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no deraiko mandrakariva.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga toa zava-mahagaga eo imason’ny maro aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa Hianao no fiarovana mafy ho ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavako ho feno ny fiderana Anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fankalazana Anao mandrakariva.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manary ahy, rehefa antitra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mahafoy ahy, rehefa ketraka ny heriko.
