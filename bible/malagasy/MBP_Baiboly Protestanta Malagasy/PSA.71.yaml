document_id: PSA.71,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ataon’izay mahatsiaro ny famindrampon’Andriamanitra taminy hatry ny fony tanora.
  - type: text
    content: HIANAO, Jehovah ô, no itokiako;
  - type: text
    content: Aoka tsy ho menatra mandrakizay aho.
  '10':
  - type: text
    content: Fa miresaka ahy ny fahavaloko;
  - type: text
    content: Ary miara-mioko izay manotrika hahazo ny aiko.
  '11':
  - type: text
    content: 'Ka manao hoe: Andriamanitra efa nahafoy azy;'
  - type: text
    content: Enjeho izy, ka sambory, fa tsy misy hamonjy.
  '12':
  - type: text
    content: Andriamanitra ô, aza manalavitra ahy;
  - type: text
    content: Andriamanitro ô, faingàna hamonjy ahy.
  '13':
  - type: text
    content: Aoka ho menatra sy ho levona ny mpanohitra ny fanahiko;
  - type: text
    content: Aoka hitafy henatra sy fahafaham-baraka izay mitady hanisy ratsy ahy.
  '14':
  - type: text
    content: Fa izaho kosa dia hanantena mandrakariva,
  - type: text
    content: Ary hitombo lalandava ny fiderako Anao.
  '15':
  - type: text
    content: Ny vavako hitory ny fahamarinanao
  - type: text
    content: Ny famonjenao mandrakariva,
  - type: text
    content: Fa tsy fantatro ny isany.
  '16':
  - type: text
    content: Ho entiko ny asa lehibe nataon’i Jehovah Tompo;
  - type: text
    content: Hampahatsiaro ny fahamarinanao aho, dia ny Anao ihany.
  '17':
  - type: text
    content: Andriamanitra ô, Hianao efa nampianatra ahy hatry ny fony aho mbola tanora;
  - type: text
    content: Ary mandraka ankehitriny dia nitory ny fahagaganao aho.
  '18':
  - type: text
    content: Koa mandra-pahantitro sy fotsy volo, dia aza mahafoy ahy, Andriamanitra ô,
  - type: text
    content: Mandra-pilazako ny sandrinao amin’ny taranaka
  - type: text
    content: Sy ny asanao lehibe amin’izay rehetra mbola ho avy.
  '19':
  - type: text
    content: Ary mihatra amin’izay avo indrindra ny fahamarinanao, Andriamanitra ô,
  - type: text
    content: 'Izay nanao zava-dehibe:'
  - type: text
    content: Andriamanitra ô, iza no tahaka Anao?
  '2':
  - type: text
    content: Vonjeo ny fahamarinanao aho, ka afaho;
  - type: text
    content: Atongilano amiko ny sofinao, ka vonjeo aho.
  '20':
  - type: text
    content: Hianao Izay nampahita ahy
  - type: note
    content: 'Na: anay.'
  - type: text
    content: ' fahoriana be sady mafy'
  - type: text
    content: No hamelona ahy
  - type: note
    content: 'Na: anay.'
  - type: text
    content: ' ihdray'
  - type: text
    content: Ka hampiakatra ahy
  - type: note
    content: 'Na: anay.'
  - type: text
    content: ' indray hiala amin’ny fitoerana lalina amin’ny tany.'
  '21':
  - type: text
    content: Ampitomboy ny voninahitro,
  - type: text
    content: Ary aoka hampionona ahy indray Hianao.
  '22':
  - type: text
    content: Izaho kosa hidera Anao amin’ny valiha, dia ny fahamarinanao, Andriamanitro ô;
  - type: text
    content: Hankalaza Anao amin’ny lokanga aho, ry Iray Masin’ny Isiraely ô.
  '23':
  - type: text
    content: Hihoby ny molotro, raha mankalaza Anao;
  - type: text
    content: Ny fanahiko koa izay efa navotanao.
  '24':
  - type: text
    content: Ary ny lelako hitory ny fahamarinanao mandrakariva;
  - type: text
    content: Fa efa menatra sy mangaihay izay mitady hanisy ratsy ahy.
  '3':
  - type: text
    content: Aoka ho vatolampy fonenana hohatoniko mandrakariva Hianao, Izay efa nandidy hamonjy ahy;
  - type: text
    content: Fa harambatoko sy batery fiarovana ho ahy Hianao.
  '4':
  - type: text
    content: Andriamanitro ô, afaho amin’ny tànan’ny ratsy fanahy aho,
  - type: text
    content: Dia amin’ny tànan’ny mpanao meloka sy ny lozabe.
  '5':
  - type: text
    content: Fa Hianao no fanantenako, Jehovah Tompo ô,
  - type: text
    content: Ry tokiko hatry ny fony aho mbola tanora.
  '6':
  - type: text
    content: Hianao no nanankinana ahy hatrany am-bohoka;
  - type: text
    content: Hianao namoaka
  - type: note
    content: 'Na: no Mpiaro, na Mpanisy soa, ahy hatry, etc.'
  - type: text
    content: ' ahy avy tany an-kibon-dreniko;'
  - type: text
    content: Hianao no deraiko mandrakariva.
  '7':
  - type: text
    content: Tonga toa zava-mahagaga eo imason’ny maro aho;
  - type: text
    content: Nefa Hianao no fiarovana mafy ho ahy.
  '8':
  - type: text
    content: Ny vavako ho feno ny fiderana Anao
  - type: text
    content: Sy ny fankalazana Anao mandrakariva.
  '9':
  - type: text
    content: Aza manary ahy, rehefa antitra aho;
  - type: text
    content: Ary aza mahafoy ahy, rehefa ketraka ny heriko.
