document_id: 2CH.4,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nanao alitara varahina izy: roa-polo hakiho ny lavany, roa-polo hakiho koa ny sakany, ary folo hakiho ny hahavony.'
  '10':
  - type: text
    content: Ary ny tavin-drano lehibe
  - type: note
    content: Heb. ranomasina.
  - type: text
    content: ' nataony tamin’ny ankavanana, dia teo amin’ny atsimo-atsinanana. '
  '11':
  - type: text
    content: Ary Hirama nanao ny vilany fandraofan-davenona sy ny sotron’afo ary ny lovia famafazana.
  - type: text
    content: 'Dia vitan’i Hirama ny asa izay nataony ho an’i Solomona mpanjaka ho amin’ny tranon’Andriamanitra: '
  '12':
  - type: text
    content: 'dia ny andry roa sy ny boriboriny sy ny kapitaliny izay teny an-tampon’ny andry roa sy ny harato roa hafono ny boriboriny roa momba ny kapitaly izay teo an-tampon’ny andry avy, '
  '13':
  - type: text
    content: 'ary ny sarin’ampongabendanitra efa-jato ho amin’ny harato roa, sarin’ampongabendanitra roa andalana ho amin’ny harato iray hafono ny boribory roa momba ny kapitaly izay teo an-tampon’ny andry avy; '
  '14':
  - type: text
    content: 'ary nanao ireo fitoeran-tavin-drano izy, ary ny tavin-drano nataony teo amin’ny fitoerany; '
  '15':
  - type: text
    content: ary ny tavin-drano lehibe
  - type: note
    content: Heb. ranomasina.
  - type: text
    content: ' iray sy ny sarin’omby roa ambin’ny folo; ambaniny. '
  '16':
  - type: text
    content: Ary ny vilany fandraofan-davenona sy ny sotron’afo sy ny fitrebika ary ny fanaka rehetra momba azy dia nataon’i Hiram-aby
  - type: note
    content: 'Na: Ikaky Hirama.'
  - type: text
    content: ' ho an’i Solomona mpanjaka ho amin’ny tranon’i Jehovah tamin’ny varahina manganohano. '
  '17':
  - type: text
    content: 'Teo amin’ny tany amoron’i Jordana no nanaovan’ny mpanjaka an-idina azy tamin’ny tanimanga teo anelanelan’i Sokota sy Zaretana. '
  '18':
  - type: text
    content: Toy izany no nanaovan’i Solomona ireo fanaka rehedrehetra ireo; fa tsy nozahana izay lanjan’ny varahina.
  '19':
  - type: text
    content: 'Ary Solomona nanao ny fanaka rehetra izay tao amin’ny tranon’Andriamanitra: ny alitara volamena sy ny latabatra fitoeran’ny mofo aseho, '
  '2':
  - type: text
    content: Ary nanao ny tavin-drano
  - type: note
    content: Heb. ranomasina.
  - type: text
    content: ' an-idina boribory lehibe izy: folo hakiho no halehiben’ny vavany, dimy hakiho ny hahavony, ary telo-polo hakiho ny manodidina azy. '
  '20':
  - type: text
    content: 'ary ny fanaovan-jiro sy ny lela fanaovan-jirony mba hampirehetina eo anoloan’ny efitra anatiny araka ny fanao dia samy volamena tsara; '
  '21':
  - type: text
    content: 'ny voniny sy ny lela fanaovan-jiro ary ny hetin-jiro dia samy volamena tsara indrindra avokoa; '
  '22':
  - type: text
    content: ary ny antsy sy ny lovia famafazana sy ny lovia kely sy ny fitoeran-davenon-jiro dia samy volamena tsara; ary ny lela-varavarana teo anatin’ny trano, dia ny mankao amin’ny fitoerana masina indrindra, sy ny lela-varavarana ho amin’ny ati-trano lehibe dia samy volamena avokoa.
  '3':
  - type: text
    content: Ary teo ambanin’ny tavin-drano lehibe
  - type: note
    content: Heb. ranomasina.
  - type: text
    content: ' nisy sarin’omby manodidina azy, dia folo amin’ny iray hakiho manodidina. Roa andalana ny sarin’omby sady niara-natao an-idina tamin’ny tavin-drano. '
  '4':
  - type: text
    content: 'Ary ny tavin-drano dia nipetraka tambonin’ny sarin’omby roa ambin’ny folo: ny telo nanatrika ny avaratra, ny telo nanatrika ny andrefana, ny telo nanatrika ny atsimo, ary ny telo nanatrika ny atsinanana; ny tavin-drano lehibe'
  - type: note
    content: Heb. ranomasina.
  - type: text
    content: ' dia teo amboniny, ary niady vody izy rehetra. '
  '5':
  - type: text
    content: Ary ny hateviny dia vodivoam-pelatànana, ary ny molony nataony tahaka ny molotry ny kapoaka, dia tahaka ny vonin’ny lilia; ary mahalany telo arivo bata izy.
  '6':
  - type: text
    content: Ary nanao tavin-drano folo koa izy hanasana, ny dimy nataony tamin’ny ankavanana, ary ny dimy tamin’ny ankavia; ary ny zavatra hatao fanatitra dorana dia nakobaka teo; fa ny tavin-drano lehibe
  - type: note
    content: Heb. ranomasina.
  - type: text
    content: ' kosa dia fisasan’ny mpisorona.'
  '7':
  - type: text
    content: Ary nanao ny fanaovan-jiro volamena folo araka ny marika izy, dia napetrany tao amin’ny tempoly, dimy teo amin’ny ankavanana, ary dimy teo amin’ny ankavia.
  '8':
  - type: text
    content: Ary nanao latabatra folo koa izy, dia napetrany tao amin’ny tempoly, dimy teo amin’ny ankavanana, ary dimy teo amin’ny ankavia. Ary nanao lovia volamena zato famafazana izy.
  '9':
  - type: text
    content: 'Ary nanao ny kianjan’ny mpisorona sy ny kianja lehibe sy ny lela-vavahadin’ny kianja izy, ary nopetahany takela-barahina ny lela-vavahady. '
