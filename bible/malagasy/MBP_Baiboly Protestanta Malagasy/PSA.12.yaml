document_id: PSA.12,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana noho ny tsi-fahamarinan’ny maro.
  - type: text
    content: Ho an’ny mpiventy hira. Al-hasheminith. Salamo nataon’i Davida.
  - type: text
    content: VONJEO, Jehovah ô, fa efa lany ny tsara fanahy;
  - type: text
    content: Eny, tsy misy mahatoky intsony eo amin’ny zanak’ olombelona.
  '2':
  - type: text
    content: Samy milaza lainga amin’ny namany amin’ny molotra mandrobo izy;
  - type: text
    content: Fo mamorom-pitaka no itenenany.
  '3':
  - type: text
    content: Holevonin’i Jehovah anie ny molotra mandrobo rehetra
  - type: text
    content: Sy ny lela miteny avonavona,
  '4':
  - type: text
    content: 'Izay manao hoe: Hampahery anay ny lelanay;'
  - type: text
    content: Miandany aminay ny molotray; iza no tomponay?
  '5':
  - type: text
    content: Noho ny fampahoriana ny ory sy ny fisentoan’ny malahelo
  - type: text
    content: Dia hitsangana Aho ankehitriny, hoy Jehovah;
  - type: text
    content: Hovonjeko izay vingavingain’ny sasany.
  - type: note
    content: 'Na: Hataoko mahita ny famonjena iriny izy.'
  '6':
  - type: text
    content: Ny tenin’i Jehovah dia teny madio,
  - type: text
    content: Tahaka
  - type: text
    content: ' ny volafotsy voarendrika tao anatin’ny memy '
  - type: text
    content: ka mitsoriaka
  - type: text
    content: ' amin’ny tany–eny, voadio impito.'
  '7':
  - type: text
    content: Hianao, Jehovah ô, no hiaro azy,
  - type: text
    content: Hianao no hiambina azy mandrakizay tsy ho azon’ity taranaka ity.
  '8':
  - type: text
    content: Raha avy izay isandratan’ny tsinontsinona eo amin’ny zanak’olombelona
  - type: text
    content: Dia mieboebo ombieniombieny ny ratsy fanahy.
