document_id: PSA.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarainana noho ny tsi-fahamarinan’ny maro.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-hasheminith. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: VONJEO, Jehovah ô, fa efa lany ny tsara fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy misy mahatoky intsony eo amin’ny zanak’ olombelona.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy milaza lainga amin’ny namany amin’ny molotra mandrobo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fo mamorom-pitaka no itenenany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holevonin’i Jehovah anie ny molotra mandrobo rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny lela miteny avonavona,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay manao hoe: Hampahery anay ny lelanay;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miandany aminay ny molotray; iza no tomponay?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fampahoriana ny ory sy ny fisentoan’ny malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hitsangana Aho ankehitriny, hoy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hovonjeko izay vingavingain’ny sasany.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hataoko mahita ny famonjena iriny izy.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’i Jehovah dia teny madio,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tahaka
    - type: text
      text: ' ny volafotsy voarendrika tao anatin’ny memy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ka mitsoriaka
    - type: text
      text: ' amin’ny tany–eny, voadio impito.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao, Jehovah ô, no hiaro azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no hiambina azy mandrakizay tsy ho azon’ity taranaka ity.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha avy izay isandratan’ny tsinontsinona eo amin’ny zanak’olombelona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mieboebo ombieniombieny ny ratsy fanahy.
