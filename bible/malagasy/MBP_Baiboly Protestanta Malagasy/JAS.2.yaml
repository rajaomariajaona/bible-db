document_id: JAS.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tsy mahamety ny fizahan-tavan’olona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'RY rahalahiko, aoka tsy hasiana fizahan-tavan’olona ny finoanareo ny Tompontsika, dia Jesosy Kristy, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Tompon’ '
  - type: text
    text: 'ny voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha misy olona miditra eo amin’ny synagoganareo misy peratra volamena amin’ny rantsan-tànany sady miakanjo tsara, ary mba miditra kosa izay olona malahelo miakanjo ratsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'koa mijery ilay miakanjo tsara hianareo ka manao hoe: Mipetraha eto amin’ny fitoerana aloha hianao; ary manao amin’ilay malahelo kosa hoe: Mitoera eroa hianao, na: Mipetraha etsy amin’ny fitoeran-tongotro,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: moa tsy miangatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miahanahana.
    marker-yv: yv-n
  - type: text
    text: ' va hianareo amin’izany ka efa mpitsara manan-kevi-dratsy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mihainoa, ry rahalahy malalako: Tsy efa nofidin’Andriamanitra va ny malahelo amin’izao fiainana izao ho mpanan-karena amin’ny finoana sy ho mpandova ny fanjakana nolazainy homena izay tia Azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hianareo efa nanala-baraka ny malahelo. Moa tsy ny mpanan-karena va no mampahory anareo? Ary tsy izy va no mitarika anareo ho eo amin’ny fitsarana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy izy koa va no miteny ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'manao blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' ny anarana tsara izay niantsoana anareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanefa raha mankatò ilay didy ambony indrindra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: andriana.
    marker-yv: yv-n
  - type: text
    text: ' hianareo, araka ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: ' hoe: ,,Tiava ny namanao tahaka ny tenanao’’ (Lev. 19.18), dia manao tsara hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa raha mizaha tavan’olona kosa hianareo, dia manota ka helohin’ny lalàna ho mpanota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa na iza na iza mitandrina ny lalàna rehetra, nefa diso amin’ny iray loha, dia meloka amin’izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Ilay nanao hoe: ,,Aza mijangajanga’’ no nanao hoe koa: ,,Aza mamono olona’’ (Eks. 20.13, 14). Fa raha tàhiny tsy mijangajanga hianao, kanefa mamono olona ihany, dia mpandika ny lalàna hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aoka hianareo hiteny sy hanao araka izay mahamendrika anareo, izay olona hotsarain’ny lalàn’ny fahafahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa fitsarana tsy misy famindrampo no ho anjaran’izay tsy mamindra fo; ary ny famindrampo kosa dia faly, fa tsy mba matahotra ny fitsarana.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahafoanan’ny finoana tsy misy asa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'INONA moa no soa azo, ry rahalahiko, raha misy milaza fa manam-pinoana izy, nefa tsy manana asa? Ny finoana va mahavonjy azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha misy rahalahy na anabavy tsy manan-kitafy sady tsy manan-kohanina isan-andro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka misy aminareo manao aminy hoe: Mandehana amin’ny fiadanana, mamindroa, mivokisa, kanefa tsy omenareo azy tsinona izay tandrifiny ho an’ny tenany, inona moa no soa azo amin’izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary mba toy izany koa ny finoana, raha tsy misy asa, dia maty mihitsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa angamba hisy hanao hoe: Hianao manam-pinoana, ary izaho manana asa; asehoy amiko tsy amin’ny asa ny finoanao, ary izaho kosa haneho aminao ny finoako amin’ny asako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hianao mino fa iray ihany no Andriamanitra; koa tsara izany ataonao izany,–ny demonia koa mba mino izany ka dia mangovitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moa tsy fantatrao va, ry olom-poana, fa tsy vanona ny finoana tsy misy asa?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy nohamarinina tamin’ny asa va Abrahama razantsika tamin’ny nanaterany an’Isaka zanany teo ambonin’ny alitara? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hitanao fa niara-niasa tamin’ny finoana ny asany, ary ny finoana dia notanterahina tamin’ny asa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary tanteraka ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: ' manao hoe: ,,Ary Abrahama nino an’Andriamanitra, ka nisaina ho fahamarinany izany’’ (Gen. 15.6), ary natao hoe ,,Sakaizan’Andriamanitra’’ izy (Isa. 41.8). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa dia hitanareo fa hamarinina amin’ny asa ny olona, fa tsy amin’ny finoana ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary toy izany koa Rahaba janga, tsy nohamarinina tamin’ny asa va izy tamin’ny nandraisany ireny iraka ireny sy ny nampandehanany azy tamin’ny làlan-kafa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa maty ny tena, raha tsy misy fanahy, ary maty toy izany koa ny finoana, raha tsy misy asa.
