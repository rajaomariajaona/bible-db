document_id: JAS.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsy mahamety ny fizahan-tavan’olona.
  - type: text
    content: 'RY rahalahiko, aoka tsy hasiana fizahan-tavan’olona ny finoanareo ny Tompontsika, dia Jesosy Kristy, '
  - type: text
    content: 'Tompon’ '
  - type: text
    content: 'ny voninahitra. '
  '10':
  - type: text
    content: 'Fa na iza na iza mitandrina ny lalàna rehetra, nefa diso amin’ny iray loha, dia meloka amin’izy rehetra. '
  '11':
  - type: text
    content: 'Fa Ilay nanao hoe: ,,Aza mijangajanga’’ no nanao hoe koa: ,,Aza mamono olona’’ (Eks. 20.13, 14). Fa raha tàhiny tsy mijangajanga hianao, kanefa mamono olona ihany, dia mpandika ny lalàna hianao.'
  '12':
  - type: text
    content: 'Aoka hianareo hiteny sy hanao araka izay mahamendrika anareo, izay olona hotsarain’ny lalàn’ny fahafahana. '
  '13':
  - type: text
    content: Fa fitsarana tsy misy famindrampo no ho anjaran’izay tsy mamindra fo; ary ny famindrampo kosa dia faly, fa tsy mba matahotra ny fitsarana.
  - type: heading
    content: Ny fahafoanan’ny finoana tsy misy asa.
  '14':
  - type: text
    content: 'INONA moa no soa azo, ry rahalahiko, raha misy milaza fa manam-pinoana izy, nefa tsy manana asa? Ny finoana va mahavonjy azy? '
  '15':
  - type: text
    content: 'Raha misy rahalahy na anabavy tsy manan-kitafy sady tsy manan-kohanina isan-andro, '
  '16':
  - type: text
    content: 'ka misy aminareo manao aminy hoe: Mandehana amin’ny fiadanana, mamindroa, mivokisa, kanefa tsy omenareo azy tsinona izay tandrifiny ho an’ny tenany, inona moa no soa azo amin’izany? '
  '17':
  - type: text
    content: 'Ary mba toy izany koa ny finoana, raha tsy misy asa, dia maty mihitsy. '
  '18':
  - type: text
    content: 'Fa angamba hisy hanao hoe: Hianao manam-pinoana, ary izaho manana asa; asehoy amiko tsy amin’ny asa ny finoanao, ary izaho kosa haneho aminao ny finoako amin’ny asako. '
  '19':
  - type: text
    content: 'Hianao mino fa iray ihany no Andriamanitra; koa tsara izany ataonao izany,–ny demonia koa mba mino izany ka dia mangovitra. '
  '2':
  - type: text
    content: 'Fa raha misy olona miditra eo amin’ny synagoganareo misy peratra volamena amin’ny rantsan-tànany sady miakanjo tsara, ary mba miditra kosa izay olona malahelo miakanjo ratsy, '
  '20':
  - type: text
    content: Moa tsy fantatrao va, ry olom-poana, fa tsy vanona ny finoana tsy misy asa?
  '21':
  - type: text
    content: 'Tsy nohamarinina tamin’ny asa va Abrahama razantsika tamin’ny nanaterany an’Isaka zanany teo ambonin’ny alitara? '
  '22':
  - type: text
    content: 'Hitanao fa niara-niasa tamin’ny finoana ny asany, ary ny finoana dia notanterahina tamin’ny asa; '
  '23':
  - type: text
    content: 'ary tanteraka ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' manao hoe: ,,Ary Abrahama nino an’Andriamanitra, ka nisaina ho fahamarinany izany’’ (Gen. 15.6), ary natao hoe ,,Sakaizan’Andriamanitra’’ izy (Isa. 41.8). '
  '24':
  - type: text
    content: Koa dia hitanareo fa hamarinina amin’ny asa ny olona, fa tsy amin’ny finoana ihany.
  '25':
  - type: text
    content: 'Ary toy izany koa Rahaba janga, tsy nohamarinina tamin’ny asa va izy tamin’ny nandraisany ireny iraka ireny sy ny nampandehanany azy tamin’ny làlan-kafa? '
  '26':
  - type: text
    content: Fa maty ny tena, raha tsy misy fanahy, ary maty toy izany koa ny finoana, raha tsy misy asa.
  '3':
  - type: text
    content: 'koa mijery ilay miakanjo tsara hianareo ka manao hoe: Mipetraha eto amin’ny fitoerana aloha hianao; ary manao amin’ilay malahelo kosa hoe: Mitoera eroa hianao, na: Mipetraha etsy amin’ny fitoeran-tongotro,– '
  '4':
  - type: text
    content: moa tsy miangatra
  - type: note
    content: 'Na: miahanahana.'
  - type: text
    content: ' va hianareo amin’izany ka efa mpitsara manan-kevi-dratsy?'
  '5':
  - type: text
    content: 'Mihainoa, ry rahalahy malalako: Tsy efa nofidin’Andriamanitra va ny malahelo amin’izao fiainana izao ho mpanan-karena amin’ny finoana sy ho mpandova ny fanjakana nolazainy homena izay tia Azy? '
  '6':
  - type: text
    content: 'Fa hianareo efa nanala-baraka ny malahelo. Moa tsy ny mpanan-karena va no mampahory anareo? Ary tsy izy va no mitarika anareo ho eo amin’ny fitsarana? '
  '7':
  - type: text
    content: Tsy izy koa va no miteny ratsy
  - type: note
    content: Gr. manao blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' ny anarana tsara izay niantsoana anareo?'
  '8':
  - type: text
    content: Kanefa raha mankatò ilay didy ambony indrindra
  - type: note
    content: Gr. andriana.
  - type: text
    content: ' hianareo, araka ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' hoe: ,,Tiava ny namanao tahaka ny tenanao’’ (Lev. 19.18), dia manao tsara hianareo. '
  '9':
  - type: text
    content: 'Fa raha mizaha tavan’olona kosa hianareo, dia manota ka helohin’ny lalàna ho mpanota. '
