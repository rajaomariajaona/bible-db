document_id: GEN.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanaovan’ny olona ilay tilikambo tao Babela, sy ny nanorokoroan’Andriamanitra ny fitenin’ny olona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY ny tany rehetra dia iray fanononana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: iray molotra.
    marker-yv: yv-n
  - type: text
    text: ' sy iray fiteny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary raha nifindrafindra niantsinanana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tany atsinanana.
    marker-yv: yv-n
  - type: text
    text: ' ny olona, dia nahita tany lemaka tany amin’ny tany Sinara izy ka nonina teo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niresadresaka hoe izy: Andeha isika hanao biriky ka handotra azy tsara. Ary ny biriky nataony solom-bato, ary ny asfalta'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaran-ditin-tany.
    marker-yv: yv-n
  - type: text
    text: ' nataony solon-drihitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy izy: Andeha isika hanao tanàna sy tilikambo ho antsika, ka ny tampony hahatakatra ny lanitra, dia hanao izay hahazoantsika laza, fandrao hiely eny ambonin’ny tany rehetra isika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nidina Jehovah hizaha ny tanàna sy ny tilikambo, izay nataon’ny zanak’olombelona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Jehovah: Indro, iray foko ny olona, sady iray fanononana izy rehetra, ary ity vao fiandohan’ny hataony; koa izao dia tsy hisy azo sakanana na inona na inona izay saintsaininy hatao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka Isika hidina, ka eny no hanorokoroantsika ny fiteniny, mba tsy hifankalala teny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tao no nampielezan’i Jehovah azy hiala ho eny ambonin’ny tany rehetra; dia nitsahatra tsy nanao ny tanàna intsony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa izany no nanaovana ny anarany hoe Babela;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Babela = Fikorokoroana.
    marker-yv: yv-n
  - type: text
    text: ' fa tao Jehovah no nanorokoro ny fitenin’ny tany rehetra; ary tao no nampielezan’i Jehovah ny olona ho eny ambonin’ny tany rehetra.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny taranak’i Sema mandraka mby amin’i Tera, rain’i Abrama.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'IZAO no taranak’i Sema:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Rehefa zato taona Sema, dia niteraka an’i Arpaksada izy roa taona taorian’ny safo-drano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny andro niainan’i Sema taorian’ny niterahany an’i Arpaksada dia diman-jato taona; ary niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa dimy amby telo-polo taona. ny andro niainan’i Arpaksada, dia niteraka an’i Sela izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny andro niainan’i Arpaksada taorian’ny niterahany an’i Sela dia telo amby efa-jato taona; ary niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa telo-polo taona ny andro niainan’i Sela, dia niteraka an i’ Ebera izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny andro niainan’i Sela taorian’ny niterahany an’i Ebera dia telo amby efa-jato taona; ary niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa efatra amby telo-polo taona ny andro niainan’i Ebera, dia niteraka an’i Palega izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny andro niainan’i Ebera taorian’ny niterahany an’i Palega dia telo-polo amby efa-jato taona; ary niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa telo-polo taona ny andro niainan’i Palega, dia niteraka an-dReo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary ny andro niainan’i Palega taorian’ny niterahany an-dReo dia sivy amby roan-jato taona; ary niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa roa amby telo-polo taona ny andro niainan-dReo, dia niteraka an’i Seroga izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny andro niainan-dReo taorian’ny niterahany an’i Seroga dia fito amby roan-jato taona; ary niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary rehefa telo-polo taona ny andro niainan’i Seroga, dia niteraka an’i Nahora izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ny andro niainan’i Seroga taorian’ny niterahany an’i Nahora dia roan-jato taona; ary niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa sivy amby roa-polo taona ny andro niainan’i Nahora, dia niteraka an’i Tera izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny andro niainan’i Nahora taorian’ny niterahany an’i Tera dia sivy ambin’ny folo amby zato taona; ary niteraka zazalahy sy zazavavy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary rehefa fito-polo taona ny andro niainan’i Tera, dia niteraka an’i Abrama sy Nahora ary Harana izy.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny taranak’i Tera, sy ny nifindrany nankany Harana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ARY izao no taranak’i Tera:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tera niteraka an’i Abrama sy Nahora ary Harana; ary Harana niteraka an’i Lota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary maty Harana, raha mbola teo anatrehan’i Tera rainy tany amin’ny tany nahaterahany, dia tao Oran’ny Kaldeana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Abrama sy Nahora dia samy naka vady ho azy: ny anaran’ny vadin’i Abrama dia Saray; ary ny anaran’ny vadin’i Nahora dia Milka, zanakavavin’i Harana, rain’i Milka sy rain’i Iska. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary momba Saray; tsy nanan-janaka izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary Tera nitondra an’i Abrama zanany sy Lota zafiny, zanak’i Harana, ary Saray vinantoni-vavy, vadin’i Abrama zanany; dia niaraka taminy ireo ka niala tao Oran’ny Kaldeana hankany amin’ny tany Kanana; dia tonga tao Harana izy ka nonina tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary dimy amby roan-jato taona ny andro niainan’i Tera; dia maty tao Harana izy.
