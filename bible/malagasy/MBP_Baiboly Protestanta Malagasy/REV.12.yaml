document_id: REV.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny vehivavy mitafy ny masoandro, izay nenjehin’ny dragona..
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nisy famantarana lehibe hita tany an-danitra, dia vehivavy mitafy ny masoandro, ary ny volana no eo ambanin’ny tongony, ary misy satroboninahitra kintana roa ambin’ny folo amin’ny lohany, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nahare feo mahery tany an-danitra aho nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia tonga ny famonjena sy ny hery sy ny fanjakan’Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahefan’ny Kristiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nazera ilay mpiampanga ny rahalahintsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ilay miampanga azy eo anatrehan’Andriamanitsika andro aman-alina.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izy ireo naharesy azy noho ny amin’ny ran’ny Zanak’ondry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny teny filazana Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy nankamamy ny ainy intsony izy, na dia ho faty aza.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary noho izany mifalia, ry lanitra sy hianareo izay monina ao aminy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loza ho an’ny tany sy ny ranomasina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nidina ho aminareo ny devoly sady manana fahatezerana lehibe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria fantany fa kely sisa ny androny.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hitan’ilay dragona fa nazera tamin’ny tany izy, dia nanenjika ilay vehivavy niteraka ny zazalahy izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay vehivavy nomena ny elatra roa an’ny voro-mahery lehibe hanidinany ho any an-efitra, ho any amin’ny fitoerany, izay itaizana azy fetr’andro iray sy fetr’andro roa ary antsasaky ny fetr’andro, mba tsy ho hitan’ilay menarana izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay menarana namoaka rano tamin’ny vavany, toy ny riaka, hanaraka an-dravehivavy, mba hindaosin’ny riaka izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa ny tany namonjy an-dravehivavy, fa nivava ny tany ka nitelina ny riaka izay navoaky ny dragona tamin’ny vavany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tezitra tamin’ilay vehivavy ny dragona ka lasa nandeha hiady tamin’ny zanany sisa, izay mitandrina ny didin’Andriamanitra sy mitana ny filazana an’i Jesosy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sady bevohoka izy; ary mihetsi-jaza izy ka mitaraina, satria marary fatratra efa hiteraka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy famantarana hafa koa hita tany an-danitra, ka, indro, nisy dragona mena lehibe manan-doha fito sy tandroka folo, ary misy diadema fito amin’ny lohany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny rambony dia manala ny ampahatelon’ny kintana amin’ny lanitra ka manjera ireny ho amin’ny tany; ary ny dragona nijanona teo anatrehan’ilay vehivavy efa hiteraka mba handrapaka ny zanany, raha vao teraka; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary niteraka zazalahy izy, izay efa hanapaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hiandry.
      marker-yv: yv-n
    - type: text
      text: ' ny firenena rehetra amin’ny tehim-by; ary ny zanany novonjena faingana nakarina ho any amin’Andriamanitra, dia ho any amin’ny seza fiandrianany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ravehivavy kosa nandositra nankany an-efitra, izay nisy fitoerany namboarin’Andriamanitra, mba hovelomina any enim-polo amby roan-jato amby arivo andro izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy ady tany an-danitra: Mikaela sy ny anjeliny niady tamin’ilay dragona; ary ilay dragona mbamin’ny anjeliny kosa dia niady, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa tsy naharesy, sady tsy nisy fitoerana ho azy intsony tany an-danitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nazera ilay dragona, dia ilay menarana ela, izay atao hoe devoly sy Satana, izay mamitaka izao tontolo izao; dia nazera tamin’ny tany izy, ary ny anjeliny koa niaraka nazera taminy. '
