document_id: ACT.10
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’i Kornelio.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nisy lehilahy anankiray tany Kaisaria, atao hoe Kornelio, kapiteny tamin’ny antokon’ny miaramila atao hoe Italiana; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary mpivavaka tsara sady natahotra an’Andriamanitra izy mbamin’ny ankohonany rehetra ka nanao fiantrana be tamin’ny olona sady nivavaka tamin’Andriamanitra mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izy nahita miharihary tamin’ny fahitana, rehefa tokony ho tamin’ny ora fahasivy antoandro, fa, indro, nisy anjelin’Andriamanitra niditra tao aminy ka nanao taminy hoe: Ry Kornelio. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nony nibanjina azy izy, dia raiki-tahotra ka nanao hoe: Ahoana, Tompoko? Ary izy nanao taminy hoe: Ny fivavakao sy ny fiantranao dia efa tafakatra ho fampahatsiarovana eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa ankehitriny maniraha olona hankany Jopa, ka ampanalao Simona anankiray, izay atao hoe koa Petera; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: mitoetra ao amin’i Simona mpandon-koditra izy, eo amoron-dranomasina ny tranony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa lasa ny anjely izay niteny tamin’i Kornelio, dia niantso roa lahy tamin’ny mpanompony izy sy miaramila mpivavaka anankiray isan’izay nanaraka azy isan-andro. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary rehefa nambarany taminy izany rehetra izany, dia naniraka azy hankany Jopa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony ampitso, raha mbola nandeha teny an-dàlana izy ireo ka mby teo akaikin’ny tanàna, dia niakatra teo ambonin’ny tampon-trano Petera mba hivavaka, rehefa tokony ho tamin’ny ora fahenina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia noana loatra izy ka te-hihinana; fa raha mbola natao ny nahandro, dia azon-tsindrimandry izy '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka nahita ny lanitra misokatra, sady nisy zavatra midina toa lamba lehibe nampidinina tamin’ny zorony efatra ho amin’ny tany; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary tao anatiny nisy ny biby rehetra izay mana-tongotra efatra sy ny zava-mandady sy mikisaka etỳ an-tany ary ny voro-manidina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nisy feo nanao taminy hoe: Mitsangàna, ry Petera; vonoy, ka hano. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy Petera: Sanatria, Tompoko! fa tsy mbola nihinana zava-padina na tsy madio aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hoy
  - type: text
    text: ' ilay feo taminy fanindroany: Izay efa nodiovin’Andriamanitra dia aza ataonao ho fady. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary intelo no nanaovana izany; dia nakarina tany an-danitra niaraka tamin’izay ilay zavatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha mbola nieritreritra tao am-pony Petera ny amin’izay anton’ny fahitana efa hitany, dia, indreo, ny olona izay nirahin’i Kornelio nanontany ny tranon’i Simona ka nijanona teo am-bavahady, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia niantso ka nanontany na mitoetra ao Simona, izay atao hoe koa Petera, na tsia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha mbola nieritreritra ny fahitana Petera, dia hoy ny Fanahy taminy: Indreo, misy telo lahy mitady anao; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa mitsangàna hianao, dia midìna, ary mandehana miaraka aminy, ka aza misalasala, fa Izaho no naniraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Petera nidina tany amin’ireo olona ireo ka nanao hoe: Inty aho izay tadiavinareo; inona no anton’ny ahatongavanareo atỳ? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy ireo: Kornelio kapiteny, lehilahy marina sady matahotra an’Andriamanitra ka tsara laza amin’ny firenen’ny Jiosy rehetra, dia efa notoroan’anjely masina hevitra hampaka anao ho any an-tranony sy hihaino teny avy aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary Petera nampiantrano azy handry tao.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary nony ampitso dia niainga Petera ka nandeha niaraka taminy, ary ny rahalahy sasany avy tany Jopa niaraka taminy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nony ampitso indray dia tonga tany Kaisaria izy. Ary Kornelio niandry azy sady efa nampiangona ny havany sy ny tena sakaizany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha vao niditra Petera, dia nitsena azy Kornelio ka niankohoka teo amin’ny tongony sady nitsaoka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa Petera nampitsangana azy ka nanao hoe: Mitsangàna; fa izaho dia olona ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nony niresaka taminy izy, dia niditra tao an-trano ka nahita ny olona maro tafangona tao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy izy taminy: Hianareo mahalala fa fady amin’ny Jiosy ny hanan-draharaha na hiantrano amin’ny olona hafa firenena; nefa izaho efa nampahafantarin’Andriamanitra fa tsy misy olona azoko atao hoe fady na tsy madio. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary amin’izany dia tsy nandà tsy hankatỳ aho, raha nampanalaina; koa manontany aho: Ahoana moa no nampanalanareo ahy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy Kornelio: Loak’andro afak’omaly, mandra-paha-toy izao ny andro, raha nivavaka teto an-tranoko aho mandritra ny ora fahasivy, dia, indro, nisy lehilahy niakanjo akanjo mamirapiratra nitsangana teto anatrehako '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ka nanao hoe: Ry Kornelio, efa re ny fivavakao, ary efa tsarovana eo anatrehan’Andriamanitra ny fiantranao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa maniraha hankany Jopa, ka ampanalao Simona, izay atao hoe koa Petera: mitoetra ao an-tranon’i Simona mpandon-koditra eo amoron’dranomasina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Koa niaraka tamin’izay dia naniraka tany aminao aho; ary nanao soa hianao no avy. Koa ankehitriny izahay rehetra dia efa eto anatrehan’Andriamanitra hihaino izay rehetra nandidian’ny Tompo anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary Petera niloa-bava ka nanao hoe: Hitako marina tokoa izao fa tsy mizaha tavan’olona Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fa amin’ny firenena rehetra izay olona matahotra Azy ka manao ny marina no ankasitrahany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Hianareo mahalala ny teny izay nampitondrainy ho amin’ny Zanak’Isiraely, mitory teny soa milaza fiadanana amin’ny alalan’i Jesosy Kristy (Izy no Tompon’izao rehetra izao), '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'dia ilay teny natomboka hatrany Galilia ka notorina tany Jodia rehetra teo aorian’ny batisa izay notorin’i Jaona, dia ny amin’i Jesosy avy any Nazareta, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Izay nohosoran’Andriamanitra tamin’ny Fanahy Masina sy ny hery sady nandehandeha nanao soa sy nahasitrana izay rehetra azon’ny herin’ny devoly, satria Andriamanitra nomba Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary izahay no vavolombelon’ny zavatra rehetra izay nataony tany amin’ny tanin’ny Jiosy sy tany Jerosalema; Izy dia novonoiny nahantony teo amin’ny hazo; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'nefa natsangan’Andriamanitra kosa Izy tamin’ny andro fahatelo ka nasehony marimarina, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'tsy tamin’ny olona rehetra, fa tamin’ny vavolombelona izay notendren’Andriamanitra rahateo, dia taminay izay niara-nihinana sy nisotro taminy, rehefa nitsangana tamin’ny maty Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary Izy nandidy anay hitory amin’ny olona ka hanambara fa Izy no voatendrin’Andriamanitra ho Mpitsara ny velona sy ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Izy no ambaran’ny mpaminany rehetra, fa amin’ny anarany no hahazoan’izay rehetra mino Azy famelan-keloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Raha mbola nilaza izany teny izany Petera, dia nilatsaka tamin’izay rehetra nandre ny teny ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary talanjona ny mino isan’ny voafora izay niaraka tamin’i Petera, satria nilatsaka tamin’ny jentilisa koa ny fanomezana, dia ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Fa nandre azy niteny tamin’ny fiteny tsy fantatra sy nankalaza an’Andriamanitra izy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia namaly Petera ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Moa misy olona mahazo mandrara ny rano tsy hanaovana batisa ireo, izay efa nandray ny Fanahy Masina tahaka antsika koa? '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Dia nasainy natao batisa amin’ny anaran’i Jesosy Kristy izy. Ary nangatahin’ireo mba hitoetra ao aminy andro vitsivitsy izy.
