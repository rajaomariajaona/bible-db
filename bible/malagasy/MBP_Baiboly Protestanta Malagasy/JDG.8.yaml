document_id: JDG.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy ny lehilahy amin’ny Efraima tamin’i Gideona: Ahoana izao zavatra nataonao taminay izao, no tsy nantsoinao izahay, raha nandeha hiady tamin’ny Midiana hianao? Dia nanome tsiny azy mafy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy Gideona taminy: Zinona izao nataoko izao, raha oharina amin’ izay nataonareo? Tsy tsara va ny fitsimponam-boalobok’i Efraima noho ny fiotazam-boalobok’i Abiezera? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Teo an-tànanareo no nanoloran’Andriamanitra ny andrianan’ny Midiana, dia Oreba sy Zeba; ary inona no azoko atao, raha oharina amin’ny nataonareo? Ary rehefa nilaza izany teny izany Gideona, dia nitony ny fahatezeran’ireo taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary Gideona nankany Jordana, ka nita izy sy ny telon-jato lahy teo aminy, na dia efa reraka aza, mbola nanenjika ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy izy tamin’ny mponina tao Sokota: Masìna hianareo, mba omeo mofo ny olona manaraka ahy, fa reraka izy, ary izaho manenjika an’i Zebaha sy Zalmona, mpanjakan’ny Midiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy ireo andrianan’i Sokota: Moa efa voahazon’ ny tànanao ankehitrny va ny tànan’i Zebaha sy Zalmona, no homenay mofo ny miaramilamao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Gideona: Rehefa voatolotr’i Jehovah eo an-tànako Zehaba sy Zalmona, dia handalasiko amin’ny tsilo avy any an-efitra sy ny sampi-vato ny tenanareo.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nofonareo.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niakatra avy teo izy ka nankany Penoela, dia nanao teny tahaka izany koa tamin’ny olona tao; ary ny mponina tao Penoela koa dia namaly azy tahaka ny navalin’ny mponina tao Sokota ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niteny tamin’ny mponina tao Penoela izy ka nanao hoe: Raha tafaverina soa aman-tsara aho, dia horavako ity tilikambo ity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary Zebaha sy Zalmona dia tonga tao Karkora mbamin’ny miaramila teo aminy, tokony ho dimy arivo sy iray alin-dahy, dia izay sisa rehetra tamin’ny miaramila rehetra an’ny zanaky ny atsinanana; ary ny maty kosa dia roa alina sy iray hetsy, samy lehilahy mpitan-tsabatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpantsoaka sabatra.
    marker-yv: yv-n
  - type: text
    text: ' avokoa ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Gideona niakatra tamin’ny làlan’ny mpitoetra an-day, atsinanan’i Noha sy Jogbeha, ka dia namely ny toby, raha mbola ilay tsy nanampo iny ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nandositra Zebaha sy Zalmona, ary nanenjika azy ny Isiraely ka nisambotra ny mpanjaka roa tamin’ny Midiana, dia Zebaha sy Zalmona, fa efa nampihorohoroiny avokoa ny toby rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niverina avy tamin’ny ady Gideona, zanak’i Joasy, avy teo amin’ny fiakarana Heresa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary nisambotra zatovo tamin’ny mponina tao Sokota izy ka nanontany azy; dia nosoratan’ilay zatovo ny anaran’ireo andrianan’ Sokota sy ny loholona tao, ka fito amby fito-polo lahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Gideona dia nankany amin’ny mponina tao Sokota ka nanao hoe: Indreo Zebaha sy Zalmona, izay efa nandatsanareo ahy hoe: Moa efa voahazon’ny tànanao ankehitriny va ny tànan’i Zebaha sy Zalmona, no homenay mofo ny olonao efa reraka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia naka ny loholona tao an-tanàna izy ary tsilo avy tany an-efitra sy sampivato, ka ireny no namaizany ny mponina tao Sokota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary nandrava ny tilikambo tao Penoela koa izy ka namono ny lehilahy tao an-tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy izy tamin’i Zebaha sy Zalmona: Lehilahy toy inona ange izay novonoinareo tany Tabara? Ary hoy izy roa lahy: Tahaka anao ihany izy. Nitarehin-janak’andriana avokoa izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy izy: Rahalahiko, zanaky ny reniko, ireo. Raha velona koa Jehovah, dia tsy mba hovonoiko hianareo, raha novelominareo ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy izy tamin’i Jatera lahimatoany: Mitsangàna, ka vonoy izy roa lahy. Fa ilay zatovo tsy nanatsoaka ny sabany, fa natahotra, satria mbola tanora fanahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Zebaha sy Zalmona: Aoka hianao no hitsangana hamely anay; fa araka ny toetry ny olona ihany ny heriny. Dia nitsangana Gideona ka namono an’i Zebaha sy Zalmona ary naka ny ravaka sarim-bolan-tsinana, izay teo amin’ny vozon’ny ramevany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy ny lehilahy amin’ny Isiraely tamin’i Gideona: Manapaha anay hianao sy ny zanakao ary ny zafinao; fa efa namonjy anay tamin’ny tànan’ny Midiana hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy Gideona taminy: Tsy hanapaka anareo aho, ary tsy hanapaka anareo koa ny zanako; Jehovah ihany no hanapaka anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy koa Gideona taminy: Zavatra iray loha monja no hany mba angatahiko aminareo; aoka samy hanome ahy ny kavina izay avy amin’ny babony avy hianareo (fa nanana kavim-bolamena ireny, satria Isimaelita). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy kosa ny olona: Eny, fa homenay tokoa izany. Dia namelatra lamba ny olona, ka samy nanipy ny kavina izay avy tamin’ny babony teo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny lanjan’ny kavim-bolamena nangatahiny dia sekely volamena fiton-jato amby arivo, afa-tsy ny ravaka sarim-bolan-tsinana sy ny kavina voa-vola sy ny lamba volomparasy, izay teny amin’ireo mpanjakan’ny Midiana, ary ny rojo, izay teny amin’ny vozon’ny ramevany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia nataon’i Gideona efoda ireo, ka nataony tao an-tanànany, dia tao Ofra; ary ny Isiraely rehetra nankany nijangajanga nanaraka izany efoda izany; ary tonga fandrika tamin’i Gideona sy ny ankohonany izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia resy teo anoloan’ny Zanak’Isiraely ny Midiana ka tsy nahatraka ny lohany intsony. Dia nandry efa-polo taona ny tany tamin’ny andron’i Gideona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nandeha Jerobala, zanak’i Joasy, ka nitoetra tao an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Gideona nana-janaka fito-polo lahy izay naterany: fa maro vady izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary ny vaditsindranony, izay tany Sekema, dia niteraka zazalahy taminy koa, ka ny anarany nataony hoe Abimeleka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia maty Gideona, zanak’i Joasy, rehefa tratrantitra tsara, ka nalevina tao amin’ny fasan’i Joasy rainy tao Ofran’ny Abiezrita izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary rehefa maty Gideona, dia nijangajanga nanaraka ireo Bala indray ny Zanak’Isiraely ka nanao an’i Bala-berita ho andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny Zanak’Isiraely tsy nahatsiaro an’i Jehovah Andriamaniny, Izay efa namonjy azy tamin’ny tànan’ny fahavalony rehetra nanodidina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: sady tsy nanao soa tamin’ny taranak’i Jerobala (na Gideona), araka izay soa rehetra nataon’i Gideona tamin’ny Isiraely, izy.
