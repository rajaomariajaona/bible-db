    - type: text
      text: '84'
  - type: text
    text: 'Ireo no zavatra naterin’ny lohan’ny Isiraely ho amin’ny fitokanana ny alitara tamin’ny andro izay nanosorana azy: lovia volafotsy roa ambin’ny folo, lovia volafotsy roa ambin’ny folo famafazana, lovia kely volamena roa ambin’ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: 'sekely telo-polo amby zato avy no lanjan’ny lovia vola-fotsy, ary sekely fito-polo avy ny lovia famafazana; ny lanjan’ny volafotsy rehetra tamin’ireo fanaka ireo dia sekely efa-jato amby roa arivo, araka ny sekely masina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: 'lovia kely volamena roa ambin’ny folo, feno ditin-kazo manitra, dia sekely masina; ny lanjan’ny lovia kely volamena rehetra dia sekely roa-polo amby zato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: Ny isan’ny biby rehetra izay natao fanatitra dorana dia vantotr’ombilahy roa ambin’ny folo, ondrilahy roa ambin’ny folo, zanak’ondry roa ambin’ny folo, izay samy iray taona,
