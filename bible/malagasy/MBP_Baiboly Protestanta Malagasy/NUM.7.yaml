    - type: text
      text: Ny zavatra naterin’ny lohan’ny firenen.Isiraely ho amin’ny fitokanana ny alitara’
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’ny andro izay nahavitan’i Mosesy ny nananganana ny tabernakely dia nanosotra sy nanamasina azy izy mbamin’ny fanaka rehetra momba azy ary ny alitara sy ny fanaka rehetra momba azy; ary rehefa nanosotra sy nanamasina ireo izy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ny lohan’ny firenena no nanatitra ho amin’ny fitokanana ny alitara tamin’ny andro izay nanosorana azy; koa dia samy nanatitra ny fanatiny teo anoloan’ny alitara izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Aoka ny lohan’ny firenena samy hanatitra ny fanatiny amin’ny an-androny avy ho amin’ny fitokanana ny alitara.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny nanatitra ny fanatiny tamin’ny andro voalohany dia Nasona, zanak’i Aminadaba, avy tamin’ny firenen’i Joda. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanatiny dia lovia volafotsy iray, sekely telo-polo amby zato no lanjany, sy lovia volafotsy iray famafazana, sekely fito-polo, araka ny sekely masina; izy roa samy feno koba tsara toto voaharo diloilo, ho fanatitra hohanina; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lovia kely volamena iray, sekely folo, feno ditin-kazo manitra; '
