document_id: NUM.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny zavatra naterin’ny lohan’ny firenen.Isiraely ho amin’ny fitokanana ny alitara’
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’ny andro izay nahavitan’i Mosesy ny nananganana ny tabernakely dia nanosotra sy nanamasina azy izy mbamin’ny fanaka rehetra momba azy ary ny alitara sy ny fanaka rehetra momba azy; ary rehefa nanosotra sy nanamasina ireo izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nitondra fanatitra ny lohan’ny firenen’ny Isiraely, dia ny lohan’ny fianakaviana (ireo no lohan’ny firenena, izay nifehy ny voalamina). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary izy ireo nitondra ny fanatiny teo anatrehan’i Jehovah, dia sariety enina mirakotra sy omby roa ambin’ny folo, dia sariety iray no avy amin’ny lohan’ny firenena roa, ary omby iray avy; dia nitondra ireo teo anoloan’ny tabernakely izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raiso aminy ireo hanaovana ny fanompoana momba ny trano-lay fihaonana, ka omeo ny Levita, dia samy araka ny fanompoany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia noraisin’i Mosesy ny sariety sy ny omby ka nomeny ny Levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sariety roa sy omby efatra no nomeny ho an’ny taranak’i Gersona, araka ny fanompoany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary sariety efatra sy omby valo no nomeny ho an’ny taranak’i Merary, araka ny fanompoany, eo amin’ny fehin’Itamara, zanak’i Arona mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny taranak’i Kehata kosa dia tsy mba nomeny na dia iray akory aza, satria ny fanompoana momba ny fitoerana masina no azy, ka eo an-tsorony ihany no hilanjany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia ny lohan’ny firenena no nanatitra ho amin’ny fitokanana ny alitara tamin’ny andro izay nanosorana azy; koa dia samy nanatitra ny fanatiny teo anoloan’ny alitara izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Mosesy: Aoka ny lohan’ny firenena samy hanatitra ny fanatiny amin’ny an-androny avy ho amin’ny fitokanana ny alitara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny nanatitra ny fanatiny tamin’ny andro voalohany dia Nasona, zanak’i Aminadaba, avy tamin’ny firenen’i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny fanatiny dia lovia volafotsy iray, sekely telo-polo amby zato no lanjany, sy lovia volafotsy iray famafazana, sekely fito-polo, araka ny sekely masina; izy roa samy feno koba tsara toto voaharo diloilo, ho fanatitra hohanina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'lovia kely volamena iray, sekely folo, feno ditin-kazo manitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary vantotr’ombilahy iray sy ondrilahy iray ary zanak’ondry iray izay iray taona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hatramin’ny iray taona no ho midina.
    marker-yv: yv-n
  - type: text
    text: ' ho fanatitra dorana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary osilahy iray, ho fanatitra noho ny ota; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary ho fanati-pihavanana dia omby roa, ondrilahy dimy, osilahy dimy, zanak’ondry dimy izay iray taona;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
