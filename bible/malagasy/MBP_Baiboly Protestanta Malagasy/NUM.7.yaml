    text: Ary rehefa niditra tao amin’ny trano-lay fihaonana Mosesy mba hiteny amin’Andriamanitra, dia nandre ny feo miresaka aminy izy avy tao amin’ny rakotra fanaovam-panavotana izay teo ambonin’ny fiaran’ny Vavolombelona,
