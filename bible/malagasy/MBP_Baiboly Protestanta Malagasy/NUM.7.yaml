    marker-yv: yv-n
  - type: text
    text: ' mbamin’ny fanatitra hohanina momba azy, ary osilahy roa ambin’ny folo ho fanatitra noho ny ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: Ary ny isan’ny biby rehetra izay natao fanati-pihavanana dia vantotr’ombilahy efatra amby roa-polo, ondrilahy enim-polo, osilahy enim-polo, zanak’ondry enim-polo, izay samy iray taona.
