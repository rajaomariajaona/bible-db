document_id: 1KI.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Jeroboama tamin’ny Isiraely.
  - type: text
    content: 'TAMIN’izany andro izany dia narary Abia, zanak’i Jeroboama. '
  '10':
  - type: text
    content: 'koa noho izany dia, indro, hahatonga loza amin’ny taranak’i Jeroboama Aho ka handringana izay lehilahy rehetra amin’ny tamingan’i Jeroboama, na ny voahazona na ny afaka amin’ny Isiraely, ary hanaisotra ny sisa amin’ny taranak’i Jeroboama Aho, toy ny fanaisotry ny olona ny diky ambara-paha-tsy hisy intsony. '
  '11':
  - type: text
    content: 'Koa izay tamingan’i Jeroboama maty ao an-tanàna dia hohanin’ny alika; ary izay maty any an-tsaha dia hohanin’ny voro-manidina; fa Jehovah no efa niteny. '
  '12':
  - type: text
    content: 'Koa mitsangàna hianao, ka modia any an-tranonao; fa raha vao mijadona ao an-tanàna ny tongotrao, dia, indro, ho faty ny zaza. '
  '13':
  - type: text
    content: 'Ary ny Isiraely rehetra hisaona sy handevina azy; fa amin’ny tamingan’i Jeroboama dia izy irery ihany no ho tonga ao am-pasana, satria izy ihany no nahitana fahatsaram-panahy ny amin’i Jehovah, Andriamanitry ny Isiraely. '
  '14':
  - type: text
    content: 'Ary Jehovah hanangana mpanjaka ho an’ny Isiraely izay handringana ny taranak’i Jeroboama amin’izany andro izany; fa rahoviana ange izany? Izao ankehitriny izao ihany. '
  '15':
  - type: text
    content: Fa Jehovah hamely ny Isiraely toy ny volotara hozongozonina any anaty rano sady hanongotra ny Isiraely amin’ity tany soa nomeny ny razany ity ary hanely azy ho any an-dafin’ny Ony,
  - type: note
    content: Eofrata.
  - type: text
    content: ' satria nanao ireo Aseraha izy ka nampahatezitra an’i Jehovah. '
  '16':
  - type: text
    content: Ary Izy hanolotra ny Isiraely noho ny fahotana izay nataon’i Jeroboama sady nampanotany ny Isiraely.
  '17':
  - type: text
    content: 'Dia niainga ny vadin’i Jeroboama ka lasa nandeha ary tonga tany Tirza; koa rehefa mby teo amin’ny tokonam-baravarana izy, dia maty ny zazalahy; '
  '18':
  - type: text
    content: dia nandevina azy ny Isiraely rehetra sady nisaona azy, araka ny tenin’i Jehovah izay nampilazainy an’i Ahia mpaminany mpanompony.
  '19':
  - type: text
    content: 'Ary ny tantaran’i Jeroboama sisa, dia ny niadiany sy ny nanjakany, indro, efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Isiraely izany. '
  '2':
  - type: text
    content: 'Ary hoy Jeroboama tamin’ny vadiny: Masìna hianao, mitsangàna, ka miovà endrika, mba tsy ho fantatr’olona ho vadin’i Jeroboama hianao; dia mankanesa any Silo; fa, indro, ao Ahia mpaminany, ilay nilaza tamiko fa ho mpanjakan’ity firenena ity aho. '
  '20':
  - type: text
    content: Ary ny andro nanjakan’i Jeroboama dia roa amby roa-polo taona; dia lasa nodi-mandry any amin’ny razany izy; ary Nadaba zanany no nanjaka nandimby azy.
  - type: heading
    content: Ny nanjakan-dRehoboama tamin’ny Joda.
  '21':
  - type: text
    content: ARY Rehoboama, zanak’i Solomona, no nanjaka tamin’ny Joda. Efa iraika amby efa-polo taona Rehoboama, fony izy vao nanjaka, ary fito ambin’ny folo taona no nanjakany tany Jerosalema, tanàna nofidin’i Jehovah tamin’ny firenen’Isiraely rehetra hametrahany ny anarany. Ary ny anaran-dreniny dia Nama Amonita.
  '22':
  - type: text
    content: 'Ary ny Joda nanao izay ratsy eo imason’i Jehovah ka nampahasaro-piaro Azy tamin’ny fahotana izay nataony mihoatra noho izay rehetra nataon’ny razany. '
  '23':
  - type: text
    content: Fa izy koa nanao fitoerana avo ho azy sy tsangam-baton-tsampy ary Aseraha
  - type: note
    content: Anaran’andriamani-tsi-izy, na ny sariny.
  - type: text
    content: ' teny an-tampon’ny tendrombohitra avo rehetra sy teny ambanin’ny hazo maitso rehetra. '
  '24':
  - type: text
    content: Ary nisy olona nanolo-tena nijangajanga ho fanompoan-tsampy teo amin’ny tany; ary nanaraka ny fahavetavetana rehetra fanaon’ny firenena izay noroahin’i Jehovah teo anoloan’ny Zanak’Isiraely izy.
  '25':
  - type: text
    content: 'Ary tamin’ny taona fahadimy nanjakan-dRehoboama mpanjaka dia niakatra Sisaka, mpanjakan’i Egypta, hamely an’i Jerosalema; '
  '26':
  - type: text
    content: 'dia nobaboiny ny rakitry ny tranon’i Jehovah sy ny rakitry ny tranon’ny mpanjaka ka lasany avokoa; ary nobaboiny koa ny ampinga volamena rehetra nataon’i Solomona. '
  '27':
  - type: text
    content: 'Ary Rehoboama mpanjaka nanao ampinga varahina ho solon’ireny ka nanolotra azy teo an-tànan’ny lehiben’ny mpiambina, izay niambina ny varavaran’ny tranon’ny mpanjaka. '
  '28':
  - type: text
    content: Ary na oviana na oviana no nidiran’ny mpanjaka tao an-tranon’i Jehovah, dia nentin’ny mpiambina ireo ka naveriny tao an-trano fiambenana indray.
  '29':
  - type: text
    content: 'Ary ny tantaran-dRehoboama sisa mbamin’izay rehetra nataony, tsy voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '3':
  - type: text
    content: Koa mitondrà mofo folo sy mofo madinika ary tantely iray tavoara, ka mankanesa any aminy; fa izy hanambara aminao izay ho toetry ny zaza.
  '30':
  - type: text
    content: 'Ary niady mandrakariva Rehoboama sy Jeroboama. '
  '31':
  - type: text
    content: Ary Rehoboama lasa nodi-mandry any amin’ny razany, dia nalevina tao amin’ny razany tao an-Tanànan’i Davida. Ary ny anaran-dreniny dia Nama Amonita. Ary Abia zanany no nanjaka nandimby azy.
  '4':
  - type: text
    content: 'Dia nanao araka izany ny vadin’i Jeroboama ka niainga nankany Silo izy, dia nankao an-tranon’i Ahia. Ary Ahia tsy nahita, fa efa pahina ny masony noho ny fahanterany. '
  '5':
  - type: text
    content: 'Ary Jehovah efa nilaza tamin’i Ahia hoe: Indro, avy ny vadin’i Jeroboama hanontany anao ny amin’ny zanany, fa marary izy; ary izao ka izao no holazainao aminy; nefa raha miditra izy, dia hody vehivavy hafa.'
  '6':
  - type: text
    content: 'Ary nony ren’i Ahia ny fingodongodon’ny tongony, raha vao niditra teo am-baravarana izy, dia hoy izy: Mandrosoa, ry vadin’i Jeroboama; nahoana hianao no mody olon-kafa? Fa izaho dia nirahina hitondra teny mafy aminao. '
  '7':
  - type: text
    content: 'Koa mandehana, ka lazao amin’i Jeroboama hoe: Izao no lazain’i Jehovah, Andriamanitry ny Isiraely: Satria nanandratra anao avy tamin’ny olona Aho ka nanendry anao ho mpanapaka ny Isiraely oloko, '
  '8':
  - type: text
    content: 'ary nendahako ny fanjakana ho afaka tamin’ny taranak’i Davida ka nomeko anao; nefa kosa hianao tsy mba nanao tahaka an’i Davida mpanompoko, izay nitandrina ny teniko sy nanaraka Ahy tamin’ny fony rehetra tsy hanao na inona na inona afa-tsy izay marina eo imasoko ihany; '
  '9':
  - type: text
    content: 'fa nanao ratsy mihoatra noho izay rehetra teo alohanao hianao, fa lasa nanao andriamani-kafa sy sarin-javatra an-idina ka nampahatezitra Ahy, fa Izaho efa narianao teo ivohonao: '
