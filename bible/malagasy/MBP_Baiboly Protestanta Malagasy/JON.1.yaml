document_id: JON.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanirahan’Andriamanitra an’i Jona hankany Ninive, sy ny nandosirany, ary ny nanjo azy noho izany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga tamin’i Jona, zanak’i Amitahy, ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia raiki-tahotra indrindra ny olona ka nanao taminy hoe: Adray izato ataonao izato! Fa fantany fa nandositra hiala eo anatrehan’i Jehovah izy, satria efa nambarany taminy izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy: Hataonay ahoana ary hianao mba hahatony ny ranomasina aminay? Fa mbola nihananonja ihany ny ranomasina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamin’ireo: Betao aho, ka atsipazo any anatin’ny ranomasina hahatony ny ranomasina aminareo; fa fantatro fa noho ny amiko no mahatonga izao onja mahery izao aminareo.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa namaky onja fatratra ny olona mba hamerina ny sambo ho amin’ny tany maina, fa tsy zakany, satria ny ranomasina mbola nihananonja mafy taminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitaraina tamin’i Jehovah izy ka nanao hoe: Mifona aminao izahay, Jehovah ô, aoka tsy ho faty izahay noho ny amin’ny ain’ity lehilahy ity, ary aza atao ho mpandatsaka ra marina izahay; fa Hianao, Jehovah ô, efa nanao izay sitraky ny fonao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nobetain’izy ireo Jona ka natsipiny tany anatin’ny ranomasina; ary dia nitsahatra ny fisafoaky ny ranomasina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia natahotra an’i Jehovah indrindra ireo olona ireo ka namono zavatra hatao fanatitra ho an’i Jehovah sady nivoady.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitsangàna, mankanesa any Ninive, ilay tanàna lehibe, ary miantsoa ny amin’ny hamelezana azy, fa tafakatra eto anatrehako ny faharatsiany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa Jona nitsangana handositra ho any Tarsisy mba hiala eo anatrehan’i Jehovah; ary nidina tany Jopa izy ka nahita sambo hankany Tarsisy, dia nandoa ny karamany ka niondrana taminy hiara-mandeha tamin’ny tao ho any Tarsisy hiala eo anatrehan’i Jehovah.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jehovah nahatonga rivotra mahery teny ambonin’ny ranomasina, dia nanonja mafy ny ranomasina, ka dia efa nila ho vaky ny sambo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia raiki-tahotra ny matilo, ka samy nitaraina tamin’ny andriamaniny avy, sady nariany tany anaty ranomasina ny zavatra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanaka.
      marker-yv: yv-n
    - type: text
      text: ' tao an-tsambo mba hampahatony ny loza. Fa Jona kosa efa nidina nankao anaty sambo ka nandry renoky ny torimaso.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankao aminy ny kapitenin-tsambo ka nanao taminy hoe: Endrey ity hianao renoky ny torimaso foana eto! Mitsangàna, ka antsoy ny Andriamanitrao, fa angamba hihevitra antsika Andriamanitra, ka dia tsy ho faty isika. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia samy nanao tamin’ny namany hoe izy: Avia isika hanao filokana mba hizahantsika izay mahatonga izao loza izao amintsika. Dia nanao filokana izy, ka Jona no azo.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ireo taminy: Masìna hianao, lazao aminay: Noho ny amin’iza moa no mahatonga izao loza izao amintsika? Inona no raharaha fanaonao? Ary avy taiza hianao? Aiza no taninao? Ary avy amin’ny firenen’iza hianao? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamin’ireo: Hebreo aho; ary Jehovah, Andriamanitry ny lanitra, no ivavahako, dia Izay nanao ny ranomasina sy ny tany maina.'
