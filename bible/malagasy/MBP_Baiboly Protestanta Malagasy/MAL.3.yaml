document_id: MAL.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indro, haniraka ny irako Aho, ary izy hanamboatra làlana eo alohako; ary ny Tompo Izay tadiavinareo dia ho avy tampoka ho eo an-tempoliny; ary ny Anjelin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Iraky.
      marker-yv: yv-n
    - type: text
      text: ' ny fanekena Izay irinareo, dia, indro, tamy Izy, hoy Jehovah, Tompon’ny maro.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Entonareo ny fahafolon-karena rehetra ho ao amin’ny trano firaketako, mba hasian-kanina ao an-tranoko, ary izahao toetra amin’izany Aho, hoy Jehovah, Tompon’ny maro, raha tsy hovohàko ny varavaran’ny lanitra ho anareo ka hampidinako fitahiana manana amby ampy ho anareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary hasiako teny mafy ny valala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpandany.
      marker-yv: yv-n
    - type: text
      text: ' noho ny aminareo, ka tsy hanimba ny vokatry ny tany intsony ireny, ka dia hahavanom-boa ny voalobokareo any an-tsaha, hoy Jehovah, Tompon’ny maro. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary hianareo hataon’ny firenena rehetra hoe sambatra; fa ho tany mahafinaritra hianareo, hoy Jehovah, Tompon’ny maro.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny teninareo dia mahery mamely Ahy, hoy Jehovah. Nefa hoy hianareo: Inona no resakay nentinay namely Anao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tamin’ny nanaovanareo hoe: Zava-poana ny manompo an’Andriamanitra; ary inona moa no soa efa azo tamin’ny fitandremantsika izay nasainy notandremana sy tamin’ny nandehanantsika nitafy lamba fisaonana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nijoretra.
      marker-yv: yv-n
    - type: text
      text: ' teo anatrehan’i Jehovah, Tompon’ny maro. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary ankehitriny isika dia midera ny mpirehareha hoe sambatra; eny, voaorina tsara izay nanao ratsy, sady efa naka fanahy an’Andriamanitra izy, nefa afa-nandositra ihany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary tamin’izany izay natahotra an’i Jehovah dia samy niresaka tamin’ny namany avy; ary Jehovah nihaino ka nandre izany; ary nisy boky nosoratana teo anatrehany ho fahatsiarovana izay matahotra an’i Jehovah sy mihevitra ny anarany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ho rakitra soa ho Ahy ireny amin’ny andro izay hotendreko, hoy Jehovah, Tompon’ny maro, ary ho antra azy Aho toy ny olona antra ny zanani-lahy izay manompo azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ka dia ho hitanareo indray ny tsi-fitovian’ny marina sy ny meloka, dia ny manompo an’Andriamanitra sy ny tsy manompo Azy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa, indro, avy ny andro, mandoro toy ny fatana fandoroana izy; ary ny mpirehareha rehetra sy ny mpanao ratsy rehetra dia ho vodivary; ka dia handoro azy ny andro izay ho avy, hoy Jehovah, Tompon’ny maro, ka tsy hasiany miangana, na ny fàkany na ny sampany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nefa iza no mahatanty ny andro hihaviany? Ary iza no mahajanona, raha miseho Izy? Fa Izy dia tahaka ny afon’ny mpandrendrika sy ny savonin’ny mpanasa lamba. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary hiposaka aminareo, izay matahotra ny anarako, ny Masoandron’ny fahamarinana, manana fanasitranana ao amin’ny tànany;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: elany.
      marker-yv: yv-n
    - type: text
      text: ' ary hivoaka hianareo ka hifalihavanja toy ny zanak’omby mifahy; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ary hohitsahinareo ny ratsy fanahy; fa ho lavenona eo ambanin’ny faladianareo izy amin’ny andro izay hotendreko, hoy Jehovah, Tompon’ny maro.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsarovinareo ny làlan’i Mosesy mpanompoko, izay nandidiako azy tao Horeba ny amin’ny Isiraely rehetra, dia ny didy sy ny fitsipika.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Indro, Izaho haniraka an’i Elia mpaminany ho aminareo, dieny tsy mbola tonga ny andron’i Jehovah, ilay lehibe sady mahatahotra: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ary izay hampody ny fon’ny ray ho amin’ny zanaka, ary ny fon’ny zanaka ho amin’ny rainy, fandrao ho avy Aho hamely ny tany amin’ny fandringanana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: herema.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hipetraka handrendrika sy hanadio volafotsy Izy; eny, hanadio ny taranak’i Levy Izy sy handrendrika azy toy ny fandrendrika volamena sy volafotsy, ka dia ho an’i Jehovah ireny ho mpanatitra fanatitra amim-pahamarinana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia ho mamin’i Jehovah ny fanatitry ny Joda sy Jerosalema toy ny tamin’ny andro fahiny sy toy ny tamin’ny taona taloha.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hanatona anareo ho fitsarana Aho ka ho vavolombelona faingana hanameloka ny mpanana ody sy ny mpijangajanga sy ny mpianian-tsy to sy ny mpampahory ny mpikarama amin’ny karamany mbamin’ny mpitondratena sy ny kamboty ary izay mampahory ny vahiny; fa tsy matahotra Ahy izy, hoy Jehovah, Tompon’ny maro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa Izaho Jehovah dia tsy miova, ary hianareo, ry taranak’i Jakoba, dia tsy fongana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hatramin’ny andron’ny razanareo dia efa niala tamin’ny didiko hianareo ka tsy nitandrina azy. Miverena amiko, dia mba hiverina ho aminareo kosa Aho, hoy Jehovah, Tompon’ny maro.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy hianareo: Ahoana àry no ho fiverinay? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Handroba an’Andriamanitra va ny olona, no mandroba Ahy hianareo? Nefa hoy hianareo: Amin’inona moa no androbanay Anao? Amin’ny fahafolon-karena sy ny fanatitra.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanatitra asandratra.
      marker-yv: yv-n
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Voaozona amin’ny ozona hianareo nefa Izaho no robainareo, dia izao hianareo rehetra iray firenena izao.
