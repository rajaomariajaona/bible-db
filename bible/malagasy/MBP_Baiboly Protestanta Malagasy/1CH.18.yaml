document_id: 1CH.18
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandresen’i Davida ny fahavalony.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY nony afaka izany, dia nandresy ny Filistina Davida ka nampietry azy, ary Gata sy ny zana-bohiny dia nesoriny tamin’ny tànan’ny Filistina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nandresy ny Moabita koa izy, ka dia tonga mpanompon’i Davida nandoa hetra ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia resin’i Davida koa Hadarezera, mpanjakan’i Zoba akaikin’i Hamata, tamin izy lasa nampiorina ny fanjakany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nanangana saina.
    marker-yv: yv-n
  - type: text
    text: ' teo amoron’ny ony Eofrata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary Davida nahazo babo kalesy arivo taminy sy mpitaingin-tsoavaly fito arivo ary miaramila an-tongotra roa alina; ary notraingotraingoin’i Davida avokoa ny soavalin-kalesy rehetra, fa ny tokony ho amin’ny kalesy zato ihany no navelany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony tonga ny Syriana avy any Damaskosy hanampy an’i Hadarezera, mpanjakan’i Zoba, dia nahafatesan’i Davida olona roa arivo sy roa alina ny Syriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nisy namponenin’i Davida tany Syria any Damaskosy; dia tonga mpanompon’i Davida ny Syriana ka nandoa hetra. Fa Jehovah nampahery an’i Davida teny amin’izay rehetra nalehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nalain’i Davida ny ampinga volamena teny amin’ny mpanompon’i Hadarezera ka nentiny nankany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary tao Tibata sy Kona, tanànan’i Hadarezera, no nahazoan’i Davida babo varahina be dia be, ary izany no nanaovan’i Solomona ilay tavin-drano
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ranomasina.
    marker-yv: yv-n
  - type: text
    text: ' varahina lehibe sy ny andry ary ny fanaka varahina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony ren’i Toy, mpanjakan’i Hamata, fa Davida efa naharesy ny miaramila rehetra an’i Hadarezera, mpanjakan’i Zoba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia naniraka an’i Hadorama zanany hankany amin’i Davida mpanjaka izy hiarahaba sy hisaotra azy noho ny niadiany tamin’i Hadarezera sy ny nahareseny azy (fa Hadarezera dia fahavalon’i Toy), sady nampitondrainy fanaka volamena sy volafotsy ary varahina izay samy maro karazana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nohamasinin’i Davida mpanjaka ho an’i Jehovah koa izany mbamin’ny volafotsy sy ny volamena nentiny avy tamin’ny firenena rehetra, dia tany Edoma sy Moaba sy ny taranak’i Amona sy ny Filistina ary ny Amalekita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Abisay, zanak’i Zeroia, naharesy ny Edomita teo amin’ny Lohasahan-tsira, dia lehilahy valo arivo sy iray alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nametraka miaramila tany Edoma izy; dia tonga mpanompon’i Davida ny Edomita rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: Fa Jehovah nampahery an’i Davida teny amin’izay rehetra nalehany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny mpanao raharaham-panjakana tamin’i Davida.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ARY Davida nanjaka tamin’ny Isiraely rehetra ka nitsara sy nitondra ny vahoakany rehetra tamin’ny fahamarinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Joaba, zanak’i Zeroia, no komandin’ny miaramila; ary Josafata, zanak’i Ahiloda, no mpitadidy ny raharaham-panjakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Zadoka, zanak’i Ahitoba, sy Abimeleka, zanak’i Abiatara, no mpisorona; ary Saosa no mpanoratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary Benaia, zanak’i Joiada, no mpifehy ny miaramila mpiambina andriana;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Keretita sy Peletita.
    marker-yv: yv-n
  - type: text
    text: ' ary ny zanak’i Davida no lehibe tamin’izay nanolotra ny mpanjaka.'
