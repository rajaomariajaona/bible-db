document_id: HOS.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aza dia fatra-pifaly loatra, toy ny firenena hafa, ry Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hianao efa nijangajanga niala tamin’Andriamanitrao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady efa tia tangy teny am-pamoloana rehetra;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tahaka ny fahitana voaloboka any an-efitra no nahitako ny Isiraely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny fahitana aviavy mialintaona no nahitako ny razanareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ireny dia tonga tany Bala-peora ka nanolo-tena ho amin’ilay mampahamenatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tonga fahavetavetana tahaka an’ilay tiany ihany izy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny amin’i Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihelina toy ny voro-manidina ny voninahiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy hiteraka, na hanan-anaka, na ho torontoronina.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Na dia misy mitaiza zanaka aza izy, dia hofoanako ihany ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy miangana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hahita loza koa izy amin’ny handaozako azy!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Efraima, raha araka ny hitako, dia voavoly ao amin’ny tany mahafinaritra tahaka an’i Tyro,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: araka ny nahitako azy hatrany Tyro, dia voavoly, etc.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy maintsy mamoaka ny zanany ho amin’ny mpamono izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Jehovah ô, omeo azy–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona no homenao azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Omeo azy ny kibo tsy mahazo zaza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: momba.
      marker-yv: yv-n
    - type: text
      text: ' sy ny nono ritra.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ao Gilgala ny fahotany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tao no vao nankahalako azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny faharatsian’ny ataony dia horoahiko hiala ao an-tranoko izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho tia azy intsony Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpiodina avokoa ny mpanapaka azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voaratra Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maina ny fakany, ka tsy hamoa izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, na dia miteraka aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hovonoiko ny zanany mahafinaritra azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Harian’Andriamanitro izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy nihaino Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho tonga mpirenireny any amin’ny jentilisa izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny famoloana sy ny fanantazana tsy hahavelona azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hahadiso fanantenana azy ny ranom-boaloboka.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy honina ao amin’ny tanin’i Jehovah izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Efraima hiverina ho any Egypta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hihinana zava-padina any Asyria.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy hanidina divay ho fanatitra ho an’i Jehovah izy, ary tsy hankasitrahany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny zavatra vonoiny hatao fanatitra dia ho toy ny fahan-kanina ho an’ny mpisaona aminy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra homana izany dia voaloto;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny haniny dia ho an’ny tenany ihany, fa tsy ho tafiditra ao an-tranon’i Jehovah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hanao ahoana kosa re hianareo, raha mby amin’ny fotoam-pivavahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny andro firavoravoana voatendrin’i Jehovah?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa he! lasa izy noho
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miala amin’.
      marker-yv: yv-n
    - type: text
      text: ' ny fandringanana;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypta no hanangona azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Memfisa no handevina azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fana-bolafotsiny mahafinaritra dia ho lasan’ny amiana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsilo no ho ao an-dainy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tonga ireo andro famaliana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga ireo andro fanodiavana–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho fantatr’Isiraely fa adala ny mpaminany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary very saina ny olona tsindriam-panahy–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny hamaroan’ny helokao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny habetsahan’ny fanoherana.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Efraima dia mizaha, nefa tsy avy amin’Andriamanitro;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Efraima dia tily tao amin’Andriamanitro.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpaminany dia fandriky ny mpamandri-borona eny amin’ny alehany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fanoherana ao an-tranon’Andriamaniny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fatra-panao ratsy toy ny tamin’ny andro tany Gibea izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hotsarovana ny helony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hovaliana ny fahotany.
