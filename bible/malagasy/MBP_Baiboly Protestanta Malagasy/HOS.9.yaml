document_id: HOS.9,873
type_code: plt
verses:
  '1':
  - type: text
    content: Aza dia fatra-pifaly loatra, toy ny firenena hafa, ry Isiraely;
  - type: text
    content: Fa hianao efa nijangajanga niala tamin’Andriamanitrao
  - type: text
    content: Sady efa tia tangy teny am-pamoloana rehetra;
  '10':
  - type: text
    content: Tahaka ny fahitana voaloboka any an-efitra no nahitako ny Isiraely.
  - type: text
    content: Toy ny fahitana aviavy mialintaona no nahitako ny razanareo;
  - type: text
    content: Nefa ireny dia tonga tany Bala-peora ka nanolo-tena ho amin’ilay mampahamenatra,
  - type: text
    content: Ka dia tonga fahavetavetana tahaka an’ilay tiany ihany izy.
  '11':
  - type: text
    content: Ny amin’i Efraima,
  - type: text
    content: Hihelina toy ny voro-manidina ny voninahiny,
  - type: text
    content: Ka tsy hisy hiteraka, na hanan-anaka, na ho torontoronina.
  '12':
  - type: text
    content: Na dia misy mitaiza zanaka aza izy, dia hofoanako ihany ireny,
  - type: text
    content: Ka tsy hisy miangana;
  - type: text
    content: Eny, hahita loza koa izy amin’ny handaozako azy!
  '13':
  - type: text
    content: Efraima, raha araka ny hitako, dia voavoly ao amin’ny tany mahafinaritra tahaka an’i Tyro,
  - type: note
    content: 'Na: araka ny nahitako azy hatrany Tyro, dia voavoly, etc.'
  - type: text
    content: Nefa tsy maintsy mamoaka ny zanany ho amin’ny mpamono izy.
  '14':
  - type: text
    content: Jehovah ô, omeo azy–
  - type: text
    content: Inona no homenao azy?
  - type: text
    content: Omeo azy ny kibo tsy mahazo zaza
  - type: note
    content: 'Na: momba.'
  - type: text
    content: ' sy ny nono ritra.'
  '15':
  - type: text
    content: Ao Gilgala ny fahotany rehetra,
  - type: text
    content: Eny, tao no vao nankahalako azy;
  - type: text
    content: Noho ny faharatsian’ny ataony dia horoahiko hiala ao an-tranoko izy;
  - type: text
    content: Tsy ho tia azy intsony Aho,
  - type: text
    content: Mpiodina avokoa ny mpanapaka azy.
  '16':
  - type: text
    content: Voaratra Efraima,
  - type: text
    content: Maina ny fakany, ka tsy hamoa izy;
  - type: text
    content: Eny, na dia miteraka aza izy,
  - type: text
    content: Dia hovonoiko ny zanany mahafinaritra azy.
  '17':
  - type: text
    content: Harian’Andriamanitro izy,
  - type: text
    content: Satria tsy nihaino Azy;
  - type: text
    content: Ka dia ho tonga mpirenireny any amin’ny jentilisa izy.
  '2':
  - type: text
    content: Ny famoloana sy ny fanantazana tsy hahavelona azy,
  - type: text
    content: Ary hahadiso fanantenana azy ny ranom-boaloboka.
  '3':
  - type: text
    content: Tsy honina ao amin’ny tanin’i Jehovah izy;
  - type: text
    content: Fa Efraima hiverina ho any Egypta
  - type: text
    content: Ary hihinana zava-padina any Asyria.
  '4':
  - type: text
    content: Tsy hanidina divay ho fanatitra ho an’i Jehovah izy, ary tsy hankasitrahany;
  - type: text
    content: 'Ny zavatra vonoiny hatao fanatitra dia ho toy ny fahan-kanina ho an’ny mpisaona aminy:'
  - type: text
    content: Izay rehetra homana izany dia voaloto;
  - type: text
    content: Fa ny haniny dia ho an’ny tenany ihany, fa tsy ho tafiditra ao an-tranon’i Jehovah.
  '5':
  - type: text
    content: Hanao ahoana kosa re hianareo, raha mby amin’ny fotoam-pivavahana
  - type: text
    content: Sy amin’ny andro firavoravoana voatendrin’i Jehovah?
  '6':
  - type: text
    content: Fa he! lasa izy noho
  - type: note
    content: 'Na: miala amin’.'
  - type: text
    content: ' ny fandringanana;'
  - type: text
    content: Egypta no hanangona azy,
  - type: text
    content: Memfisa no handevina azy;
  - type: text
    content: Ny fana-bolafotsiny mahafinaritra dia ho lasan’ny amiana,
  - type: text
    content: Tsilo no ho ao an-dainy.
  '7':
  - type: text
    content: Tonga ireo andro famaliana,
  - type: text
    content: Tonga ireo andro fanodiavana–
  - type: text
    content: Ho fantatr’Isiraely fa adala ny mpaminany,
  - type: text
    content: Ary very saina ny olona tsindriam-panahy–
  - type: text
    content: Noho ny hamaroan’ny helokao
  - type: text
    content: Sy ny habetsahan’ny fanoherana.
  '8':
  - type: text
    content: Efraima dia mizaha, nefa tsy avy amin’Andriamanitro;
  - type: note
    content: 'Na: Efraima dia tily tao amin’Andriamanitro.'
  - type: text
    content: Ny mpaminany dia fandriky ny mpamandri-borona eny amin’ny alehany rehetra
  - type: text
    content: Sy fanoherana ao an-tranon’Andriamaniny.
  '9':
  - type: text
    content: Fatra-panao ratsy toy ny tamin’ny andro tany Gibea izy;
  - type: text
    content: Ka dia hotsarovana ny helony,
  - type: text
    content: Ary hovaliana ny fahotany.
