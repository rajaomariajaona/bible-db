document_id: 2SA.16,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ary nony vao nihilana kely avy teo an-tampon’ny tendrombohitra Davida, indro, Ziba, mpanompon’i Mefiboseta, nitsena azy mitondra boriky roa voaisy lasely sady nampitondraina mofo roan-jato sy voaloboka maina zato sampaho sy voankazo masaka fahavaratra zato ary divay iray tavoara.
  - type: note
    content: 'Na: siny hoditra.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Fa hoy ny mpanjaka: Moa mifaninona akory izaho sy hianareo, ry zanak’i Zeroia? Raha manozona izy, sady Jehovah no nanao taminy hoe: Ozòny Davida, dia iza indray no hanao hoe: Nahoana hianao no manao izany?'
  '11':
  - type: text
    content: 'Ary hoy koa Davida tamin’i Abisay sy tamin’ny mpanompony rehetra: Indro, ny zanako naterako aza mitady ny aiko, ka mainka io Benjamita io! Avelao ihany izy hanozona, fa Jehovah no nampanao azy izany. '
  '12':
  - type: text
    content: Angamba Jehovah hamindra fo amiko ny amin’ny heloko
  - type: note
    content: 'Na: hijery ny fahoriako (na, ny ranomasoko?).'
  - type: text
    content: ' ary hamaly soa ahy noho izao ozona nanjo ahy andro-any izao. '
  '13':
  - type: text
    content: Ary nony nandeha teny an-dàlana Davida sy ny olony, dia nandeha tamin’ny ilan’ny havoana tandrifiny kosa Simey ka nanozona teny am-pandehanana sady nitora-bato nanandrify azy sy namafy vovoka.
  '14':
  - type: text
    content: Ary dia tonga tao ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy sady efa reraka,
  - type: note
    content: Na:Ary tonga tao Aiefima ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy.
  - type: text
    content: ' ka dia naka aina teo izy.'
  - type: heading
    content: Ny nataon’i Absaloma tany Jerosalema, sy ny hevitra nomen’i Ahitofela azy, ary ny nanafoanan’i Hosay izany.
  '15':
  - type: text
    content: ARY Absaloma sy ny vahoaka rehetra tamin’ny Isiraely dia tonga tany Jerosalema, ary Ahitofela koa dia teo aminy.
  '16':
  - type: text
    content: 'Ary Hosay Arkita, sakaizan’i Davida, dia tonga tao amin’i Absaloma ka nanao taminy hoe: Ho ela velona anie ny mpanjaka! ho ela velona anie ny mpanjaka! '
  '17':
  - type: text
    content: 'Fa hoy Absaloma tamin’i Hosay: Izao va no fitianao ny sakaizanao? Nahoana hianao no tsy mba nandeha niaraka tamin’ny sakaizanao? '
  '18':
  - type: text
    content: 'Ary hoy Hosay tamin’i Absaloma: Tsia, fa izay nofidin’i Jehovah sy ireto vahoaka ireto mbamin’ny lehilahy amin’ny Isiraely, dia izy no hombako, sady ao aminy no hitoerako. '
  '19':
  - type: text
    content: Ary koa, iza indray no hotompoiko? Tsy eo anatrehan’ny zanany va? Tahaka ny nanompoako teo anatrehan’ny rainao no hanompoako eto anatrehanao koa.
  '2':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin’i Ziba: Ahoana no hevitrao amin’ireto? Dia hoy Ziba: Ny boriky dia ho an’ny ankohonan’ny mpanjaka hitaingenany; ary ny mofo sy ny voankazo masaka fahavaratra hohanin’ny zatovo; ary ny divay hosotroin’izay reraka any an-efitra.'
  '20':
  - type: text
    content: 'Ary hoy Absaloma tamin’i Ahitofela: Heveronareo tsara izay hataontsika. '
  '21':
  - type: text
    content: 'Dia hoy Ahitofela tamin’i Absaloma: Midira ao amin’ny vaditsindranon-drainao, izay nampiandrasiny trano; dia ho ren’ny Isiraely rehetra fa efa nanamaimbo tena eo anatrehan-drainao hianao, ka dia hahery ny tànan’izay rehetra momba anao. '
  '22':
  - type: text
    content: Ary dia nanorin-day ho an’i Absaloma teo an-tampon-trano ny olona; ary Absaloma niditra tao amin’ny vaditsindranon-drainy teo imason’ny Isiraely rehetra.
  '23':
  - type: text
    content: Ary ny hevitr’i Ahitofela izay nataony tamin’izany dia hoatra ny manontany amin’Andriamanitra; toy izany avokoa ny hevitra rehetra nataon’i Ahitofela, na tamin’i Davida, na tamin’i Absaloma.
  '3':
  - type: text
    content: 'Dia hoy ny mpanjaka: Aiza ny zanakalahin’ny tomponao? Ary hoy Ziba tamin’ny mpanjaka: Indro, mitoetra any Jerosalema izy; fa hoy izy: Anio no hampodian’ny taranak’Isiraely ny fanjakan’ikaky ho ahy. '
  '4':
  - type: text
    content: 'Dia hoy ny mpanjaka tamin’i Ziba: Indro, anao izay rehetra an’i Mefiboseta. Ary hoy Ziba: Trarantitra anie hianao, aoka hahazo fitia eto imasonao aho, ry mpanjaka tompoko.'
  '5':
  - type: text
    content: 'Ary nony nanakaiky an’i Bahorima Davida mpanjaka, indro, nisy lehilahy, tamingan’i Saoly – ny anarany dia Simey, zanak’i Gera – nivoaka avy tao izy ka nanozona teny am-pandehanana. '
  '6':
  - type: text
    content: 'Ary nitora-bato an’i Davida mpanjaka sy ny mpanompony rehetra izy; ary ny vahoaka rehetra sy ny lehilahy mahery rehetra dia teo amin’ny ankavanan’ny mpanjaka sy teo amin’ny ankaviany. '
  '7':
  - type: text
    content: 'Ary hoy ny fanozon’i Simey: Mandehana, mandehana, ry lehilahy mpandatsa-dra sy tena ratsy fanahy! '
  '8':
  - type: text
    content: Nataon’i Jehovah manody anao izao ny ran’ny tamingan’i Saoly, ilay nodimbasanao fanjakana; ary Jehovah nanome ny fanjakana ho eo an-tànan’i Absaloma zanakao kosa; ary, indro, efa idiran-doza izao hianao, satria mpandatsa-dra.
  '9':
  - type: text
    content: 'Ary hoy Abisay, zanak’i Zeroia, tamin’ny mpanjaka: Nahoana no avela hanozona ny mpanjaka tompoko io alika maty io? Trarantitra hianao, aoka aho handeha ka hanapaka ny lohany. '
