document_id: 2SA.16
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nony vao nihilana kely avy teo an-tampon’ny tendrombohitra Davida, indro, Ziba, mpanompon’i Mefiboseta, nitsena azy mitondra boriky roa voaisy lasely sady nampitondraina mofo roan-jato sy voaloboka maina zato sampaho sy voankazo masaka fahavaratra zato ary divay iray tavoara.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: siny hoditra.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’i Ziba: Ahoana no hevitrao amin’ireto? Dia hoy Ziba: Ny boriky dia ho an’ny ankohonan’ny mpanjaka hitaingenany; ary ny mofo sy ny voankazo masaka fahavaratra hohanin’ny zatovo; ary ny divay hosotroin’izay reraka any an-efitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy ny mpanjaka: Aiza ny zanakalahin’ny tomponao? Ary hoy Ziba tamin’ny mpanjaka: Indro, mitoetra any Jerosalema izy; fa hoy izy: Anio no hampodian’ny taranak’Isiraely ny fanjakan’ikaky ho ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny mpanjaka tamin’i Ziba: Indro, anao izay rehetra an’i Mefiboseta. Ary hoy Ziba: Trarantitra anie hianao, aoka hahazo fitia eto imasonao aho, ry mpanjaka tompoko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony nanakaiky an’i Bahorima Davida mpanjaka, indro, nisy lehilahy, tamingan’i Saoly – ny anarany dia Simey, zanak’i Gera – nivoaka avy tao izy ka nanozona teny am-pandehanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nitora-bato an’i Davida mpanjaka sy ny mpanompony rehetra izy; ary ny vahoaka rehetra sy ny lehilahy mahery rehetra dia teo amin’ny ankavanan’ny mpanjaka sy teo amin’ny ankaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny fanozon’i Simey: Mandehana, mandehana, ry lehilahy mpandatsa-dra sy tena ratsy fanahy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nataon’i Jehovah manody anao izao ny ran’ny tamingan’i Saoly, ilay nodimbasanao fanjakana; ary Jehovah nanome ny fanjakana ho eo an-tànan’i Absaloma zanakao kosa; ary, indro, efa idiran-doza izao hianao, satria mpandatsa-dra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Abisay, zanak’i Zeroia, tamin’ny mpanjaka: Nahoana no avela hanozona ny mpanjaka tompoko io alika maty io? Trarantitra hianao, aoka aho handeha ka hanapaka ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy ny mpanjaka: Moa mifaninona akory izaho sy hianareo, ry zanak’i Zeroia? Raha manozona izy, sady Jehovah no nanao taminy hoe: Ozòny Davida, dia iza indray no hanao hoe: Nahoana hianao no manao izany?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy koa Davida tamin’i Abisay sy tamin’ny mpanompony rehetra: Indro, ny zanako naterako aza mitady ny aiko, ka mainka io Benjamita io! Avelao ihany izy hanozona, fa Jehovah no nampanao azy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Angamba Jehovah hamindra fo amiko ny amin’ny heloko
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hijery ny fahoriako (
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny ranomasoko?).
    marker-yv: yv-n
  - type: text
    text: ' ary hamaly soa ahy noho izao ozona nanjo ahy andro-any izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nony nandeha teny an-dàlana Davida sy ny olony, dia nandeha tamin’ny ilan’ny havoana tandrifiny kosa Simey ka nanozona teny am-pandehanana sady nitora-bato nanandrify azy sy namafy vovoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary dia tonga tao ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy sady efa reraka,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary tonga tao Aiefima ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy.
    marker-yv: yv-n
  - type: text
    text: ' ka dia naka aina teo izy.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nataon’i Absaloma tany Jerosalema, sy ny hevitra nomen’i Ahitofela azy, ary ny nanafoanan’i Hosay izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ARY Absaloma sy ny vahoaka rehetra tamin’ny Isiraely dia tonga tany Jerosalema, ary Ahitofela koa dia teo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Hosay Arkita, sakaizan’i Davida, dia tonga tao amin’i Absaloma ka nanao taminy hoe: Ho ela velona anie ny mpanjaka! ho ela velona anie ny mpanjaka! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy Absaloma tamin’i Hosay: Izao va no fitianao ny sakaizanao? Nahoana hianao no tsy mba nandeha niaraka tamin’ny sakaizanao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Hosay tamin’i Absaloma: Tsia, fa izay nofidin’i Jehovah sy ireto vahoaka ireto mbamin’ny lehilahy amin’ny Isiraely, dia izy no hombako, sady ao aminy no hitoerako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary koa, iza indray no hotompoiko? Tsy eo anatrehan’ny zanany va? Tahaka ny nanompoako teo anatrehan’ny rainao no hanompoako eto anatrehanao koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Absaloma tamin’i Ahitofela: Heveronareo tsara izay hataontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Ahitofela tamin’i Absaloma: Midira ao amin’ny vaditsindranon-drainao, izay nampiandrasiny trano; dia ho ren’ny Isiraely rehetra fa efa nanamaimbo tena eo anatrehan-drainao hianao, ka dia hahery ny tànan’izay rehetra momba anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary dia nanorin-day ho an’i Absaloma teo an-tampon-trano ny olona; ary Absaloma niditra tao amin’ny vaditsindranon-drainy teo imason’ny Isiraely rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ny hevitr’i Ahitofela izay nataony tamin’izany dia hoatra ny manontany amin’Andriamanitra; toy izany avokoa ny hevitra rehetra nataon’i Ahitofela, na tamin’i Davida, na tamin’i Absaloma.
