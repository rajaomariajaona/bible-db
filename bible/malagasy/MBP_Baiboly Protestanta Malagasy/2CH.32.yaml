document_id: 2CH.32
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanafihan’ny Asiriana an’i Joda tamin’ny andro nanjakan’i Hezerika sy ny niarovan’Andriamanitra azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY rehefa afaka izany raharaha marina izany, dia avy Sankeriba, mpanjakan’i Asyria, niditra tany Joda ary nanao fahirano ny tanàna mimànda ka nikasa hanafaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nony hitan’i Hezekia fa tonga Sankeriba ka nikasa hamely an’i Jerosalema, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia niara-nihevitra tamin’ny mpanapaka sy ny lehilahy mahery izy mba hanampina ny rano tamin’ny loharano eny ivelan’ny tanàna; ary nanampy azy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nivory ny olona maro ka nanampina ny loharano rehetra sy ilay renirano mamaky eo afovoan’ny tany, fa hoy izy: Nahoana no avela hahita rano be ny mpanjakan’i Asyria, raha avy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nohereziny namboariny avokoa izay rava tamin’ny mànda sady nasiany tilikambo teny amboniny sy mànda hafa koa teo ivelany, dia namboatra an’i Milo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiarovana.
    marker-yv: yv-n
  - type: text
    text: ' tao an-Tanànan’i Davida sady nanao lefona aman-ampinga betsaka izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nanendry mpifehy miaramila hifehy ny olona izy ka nampiangona azy hankeo aminy teo an-kalalahana akaikin’ny vavahadin’ny tanàna, dia nanao teny famporisihana taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mahereza ka matanhaja; aza matahotra na mivadi-po noho ny mpanjakan’i Asyria sy ny hamaroan’ny olona rehetra izay entiny; fa ny momba antsika dia be noho ny momba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sandry nofo no momba azy, fa Jehovah Andriamanitsika kosa no momba antsika hamonjy antsika ka hiady ny adintsika. Ary dia niankina tamin’ny tenin’i Hezekia, mpanjakan’ny Joda, ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa afaka izany, dia nirahin’i Sankeriba, mpanjakan’i Asyria, ny mpanompony hankany Jerosalema (fa izy sy ny miaramilany rehetra kosa nanao fahirano an’i Lakisy tamin’izay) ho any amin’i Hezekia, mpanjakan’ny Joda, sy ho any amin’ny Joda rehetra izay tany Jerosalema ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no lazain’i Sankeriba, mpanjakan’i Asyria: Inona izato itokianareo, no dia miaritra fahoriana ato Jerosalema hianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy Hezekia ihany va no manambosy anareo hanolo-tena ho faty mosary sy hetaheta ka manao hoe: Jehovah Andriamanitsika hamonjy antsika amin’ny tànan’ny mpanjakan’i Asyria? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy io Hezekia io ihany koa va no nandrava ny fitoerana avony sy ny alitarany ary nandidy ny Joda sy Jerosalema ka nanao hoe: Eo anoloan’ny alitara iray no hiankohofanareo sy handoroanareo ditin-kazo manitra? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy fantatrareo va izay nataoko, dia izaho sy ny razako, tamin’ny firenena rehetra tany amin’ny tany hafa? Moa ireny andriamanitry ny firenena tany amin’ny tany hafa ireny va nisy nahavonjy ny taniny akory tamin’ny tànako? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Iza amin’ny andriamanitr’ireo firenena efa naringan’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: natao herema.
    marker-yv: yv-n
  - type: text
    text: ' ny razako ireo no nahavonjy ny olony tamin’ny tànako, ka dia hahavonjy anareo amin’ny tànako va ny Andriamanitrareo? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa ankehitriny, aza avela hamitaka anareo Hezekia, na hitaona anareo tahaka izao; aza mino azy hianareo; fa tsy nisy andriamanitra tany amin’ny firenena sy ny fanjakana rehetra izay nahavonjy ny olony tamin’ny tànako sy ny tànan’ny razako; koa aiza ny Andriamanitrareo no hahavonjy anareo amin’ny tànako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny mpanompon’i Sankeriba mbola niteny ratsy an’i Jehovah Andriamanitra sy Hezekia mpanompony, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'sady nanoratra taratasy hihaika an’i Jehovah, Andriamanitry ny Isiraely, sy hiteny ratsy Azy ka nanao hoe: Tahaka ny tsy nahavonjen’ireny andriamanitry ny firenena tany amin’ny tany hafa ny olony tamin’ny tànako no tsy hahavonjen’ny Andriamanitr’i Hezekia ny olony koa amin’ny tànako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niantso tamin’ny feo mahery izy ka nanao teny Jiosy teo anatrehan’ny mponina tany Jerosalema izay teny ambonin’ny mànda hampitahorany sy hampangorohoroany azy mba hahafahany ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary Andriamanitr’i Jerosalema koa dia mba nolazainy toy ny filàzany ireny andriamanitry ny firenena tany amin’ny tany hafa ireny, izay asan’ tànan’olona ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary noho izany dia nivavaka Hezekia mpanjaka sy Isaia mpaminany, zanak’i Amoza, ka nitaraina tamin’ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Jehovah naniraka anjely izay nandringana ny lehilahy mahery rehetra sy ny mpanapaka ary ny komandy teo an-tobin’ny mpanjakan’i Asyria, ka dia lasa nody amin-kenatra Sankeriba. Ary nony niditra tao an-tranon’ny andriamaniny izy, dia namono azy tao tamin’ny sabatra ny zanany naterany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toy izany no namonjen’i Jehovah an’i Hezekia sy ny mponina tany Jerosalema tamin’ny tànan’i Sankeriba, mpanjakan’i Asyria, sy tamin’ny tànan’ny fahavalony rehetra; eny, niaro azy tamin’ny manodidina rehetra Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ny maro nitondra fanatitra ho an’i Jehovah tany Jerosalema sy zava-tsoa ho an’i Hezekia, mpanjakan’ny Joda; dia nalaza teo imason’ny firenena rehetra izy hatramin’izany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahararian’i Hezekia sy ny nanaretany, ary ny hareny amam-boninahiny, sy ny nampietrena azy, ary ny nahafatesany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: TAMIN’izany andro izany dia narary efa saiky maty Hezekia, koa dia nivavaka tamin’i Jehovah izy, ary Jehovah niteny taminy ka nanome azy famantarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa Hezekia tsy mba namaly araka izay soa efa natao taminy; fa niavonavona ny fony, dia niharan’ny fahatezerana izy mbamin’ny Joda sy Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Kanefa Hezekia nanetry tena noho ilay efa niavonavonan’ny fony, dia izy sy ny mponina tany Jerosalema, ka dia tsy niharan’ny fahatezeran’i Jehovah ireo fahavelon’i Hezekia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Hezekia nanana harena sy voninahitra be indrindra; dia nanao trano firaketana izy hitehirizany ny volafotsy sy ny volamena sy ny vato soa sy ny zava-manitra sy ny ampinga mbamin’izay fanaka tsara rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary tanàna fitehirizana ny vokatra koa, dia ny vary sy ny ranom-boaloboka ary ny diloilo, sy trano miefitrefitra hitoeran’ny biby fiompy samy hafa karazana ary vala hitoeran’ny ondry aman-osy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary nanao tanàna maro ho azy koa izy sady nanana ondry aman-osy ary omby betsaka, fa nomen’Andriamanitra fananana be indrindra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary notampenan’io Hezekia io ny fivoahan’ny rano ambony any Gihona ka nampandehaniny tany ambanin’ny tany hidina mahitsy ho any andrefan’ny Tanànan’i Davida izany. Ary nambinina tamin’ny asany rehetra Hezekia. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nefa noho ny amin’ny irak’ireo mpanapaka tany Babylona, izay naniraka tany aminy mba hanontany ny amin’ny zava-mahagaga natao teo amin’ny tany, dia nilaozan’Andriamanitra izy, mba hizahany toetra azy hahalalany izay rehetra ao am-pony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny tantaran’i Hezekia sisa mbamin’ ny soa nataony, indro, efa voasoratra ao amin’ny fahitan’Isaia mpaminany, zanak’i Amoza, sy ao amin’ny bokin’ny mpanjakan’ny Joda sy ny Isiraely izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary Hezekia lasa nodi-mandry any amin’ny razany, dia nalevina tao amin’ny fiakarana ho any amin’ny fasan’ny zanak’i Davida izy; ary ny Joda rehetra sy ny mponina rehetra tany Jerosalema nanome voninahitra azy tamin’ny nahafatesany. Ary Manase zanany no nanjaka nandimby azy.
