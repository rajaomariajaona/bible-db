document_id: PSA.133,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mahatsara ny fifankatiavana.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: ' Nataon’i Davida.'
  - type: text
    content: ENDREY, tsara sady mahafinaritra
  - type: text
    content: Raha ny mpirahalahy no miara-monina.
  '2':
  - type: text
    content: Tahaka ny diloilo tsara amin’ny loha,
  - type: text
    content: Izay mitsororoka amin’ny somotra, dia ny somotr’i Arona,
  - type: text
    content: Izay mitsororoka amin’ny moron-tongotr’akanjony;
  - type: note
    content: 'Na: vozon’akanjony.'
  '3':
  - type: text
    content: Tahaka ny ando any Hermona, izay milatsaka amin’ny tendrombohitra Ziona;
  - type: text
    content: Fa voadidin’i Jehovah ho eo ny fitahiana,
  - type: text
    content: Dia fiainana ho mandrakizay.
