document_id: PSA.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny mpikomy amin’Andriamanitra sy ny Mesiany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NAHOANA no mitabataba ny jentilisa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misaina anoano foana ny firenena?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ireo mpanjakan’ny tany mitsangana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanapaka miara-mioko
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hanohitra an’i Jehovah sy ny Mesiany ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ',,Aoka hotosantsika ny famatorany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hariantsika hiala amintsika ny famehezany.’’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay mipetraka any an-danitra mihomehy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny Tompo maneso ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia hiteny azy amin’ny fahavinirany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hampangorohoro azy amin’ny fahatezerany hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ',,Izaho kosa efa nanendry ny Mpanjakako'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tambonin’i Ziona, tendrombohitro masina.’’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ',,Hilaza zava-boatendry Aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Jehovah nilaza tamiko hoe: Zanako Hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho niteraka Anao andro-any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mangataha amiko, dia homeko ho lova nao ny jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny faran’ny tany ho fanananao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hotorotoroinao amin’ny tehimby izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny famaky vilany tany no hanamontsamontsananao azy.’’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary amin’izany dia hendre hianareo, ry mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Minoa anatra hianareo, ry mpitsaran’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Manompoa an’i Jehovah amin’ny fahatahorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mifalia amin’ny fangovitana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manoroha ny Zanaka, fandrao ho tezitra Izy, ka ho very eny an-dàlana hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa vetivety dia hirehitra ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sambatra izay rehetra mialoka aminy.
