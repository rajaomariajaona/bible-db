document_id: PSA.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpikomy amin’Andriamanitra sy ny Mesiany.
  - type: text
    content: NAHOANA no mitabataba ny jentilisa,
  - type: text
    content: Ary misaina anoano foana ny firenena?
  '10':
  - type: text
    content: Ary amin’izany dia hendre hianareo, ry mpanjaka;
  - type: text
    content: Minoa anatra hianareo, ry mpitsaran’ny tany.
  '11':
  - type: text
    content: Manompoa an’i Jehovah amin’ny fahatahorana,
  - type: text
    content: Ary mifalia amin’ny fangovitana.
  '12':
  - type: text
    content: Manoroha ny Zanaka, fandrao ho tezitra Izy, ka ho very eny an-dàlana hianareo;
  - type: text
    content: Fa vetivety dia hirehitra ny fahatezerany.
  - type: text
    content: Sambatra izay rehetra mialoka aminy.
  '2':
  - type: text
    content: Ireo mpanjakan’ny tany mitsangana,
  - type: text
    content: Ary ny mpanapaka miara-mioko
  - type: text
    content: 'Hanohitra an’i Jehovah sy ny Mesiany ka manao hoe:'
  '3':
  - type: text
    content: ',,Aoka hotosantsika ny famatorany,'
  - type: text
    content: Ka hariantsika hiala amintsika ny famehezany.’’
  '4':
  - type: text
    content: Izay mipetraka any an-danitra mihomehy,
  - type: text
    content: Ny Tompo maneso ireo.
  '5':
  - type: text
    content: Dia hiteny azy amin’ny fahavinirany Izy
  - type: text
    content: 'Ka hampangorohoro azy amin’ny fahatezerany hoe:'
  '6':
  - type: text
    content: ',,Izaho kosa efa nanendry ny Mpanjakako'
  - type: text
    content: Tambonin’i Ziona, tendrombohitro masina.’’
  '7':
  - type: text
    content: ',,Hilaza zava-boatendry Aho;'
  - type: text
    content: 'Jehovah nilaza tamiko hoe: Zanako Hianao,'
  - type: text
    content: Izaho niteraka Anao andro-any.
  '8':
  - type: text
    content: Mangataha amiko, dia homeko ho lova nao ny jentilisa
  - type: text
    content: Ary ny faran’ny tany ho fanananao.
  '9':
  - type: text
    content: 'Hotorotoroinao amin’ny tehimby izy:'
  - type: text
    content: Toy ny famaky vilany tany no hanamontsamontsananao azy.’’
