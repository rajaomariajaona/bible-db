document_id: EPH.6,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Anaka, maneke ny ray sy ny reninareo ao amin’ny Tompo, fa marina izany. '
  '10':
  - type: text
    content: 'FARANY, mahereza ao amin’ny Tompo sy amin’ny herin’ny faherezany. '
  '11':
  - type: text
    content: 'Tafio avokoa ny fiadian’Andriamanitra, mba hahazoanareo hifahatra amin’ny fanangolen’ny devoly. '
  '12':
  - type: text
    content: Fa isika tsy mitolona amin’ny nofo aman-dra, fa amin’ny fanapahana sy amin’ny fanjakana sy amin’ny mpanjakan’izao fahamaizinana izao, dia amin’ny fanahy ratsy eny amin’ny rivotra.
  - type: note
    content: Gr. lanitra.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Ary noho izany, dia raiso avokoa ny fiadian’Andriamanitra, mba hahazoanareo hanohitra amin’ny andro mahory; ary rehefa vitanareo avokoa, dia hahafahatra hianareo.
  '14':
  - type: text
    content: 'Mifahara ary, ka sikino fahamarinana ny valahanareo, ary mitafia ny rariny ho fiarovan-tratra, '
  '15':
  - type: text
    content: 'ary kiraroy ny fahavononam-panahy avy amin’ny filazantsaran’ny fihavanana ny tongotrareo; '
  '16':
  - type: text
    content: 'ary ho fanampin’izany rehetra izany dia tano ny finoana ho ampinga, izay hahazoanareo hamono ny zana-tsipìka mirehitra rehetra izay alefan’ilay ratsy. '
  '17':
  - type: text
    content: 'Ary raiso ny famonjena ho fiarovan-doha sy ny tenin’Andriamanitra ho sabatry ny Fanahy; '
  '18':
  - type: text
    content: 'ary mivavaha mandrakariva ao amin’ny Fanahy amin’ny fivavahana rehetra sy ny fangatahana, ka miambena amin’izany amin’ny faharetana sy ny fangatahana rehetra ho an’ny olona masina rehetra, '
  '19':
  - type: text
    content: 'ary ho ahy koa mba homena ahy ny hiloa-bava amin’ny fahasahiana hampahafantatra ny zava-miafina momba ny filazantsara '
  '2':
  - type: text
    content: ',,Manajà ny ray sy ny reninao’’ (fa izany no didy voalohany misy teny fikasana), '
  '20':
  - type: text
    content: (iraka
  - type: note
    content: Gr. ambasadôra.
  - type: text
    content: ' migadra noho izany aho), mba hiteny izany amin’ny fahasahiana aho, toy izay mety hoteneniko.'
  '21':
  - type: text
    content: 'Fa mba ho fantatrareo koa izay toetro, dia Tykiko, rahalahy malala sady mpanompo mahatoky ao amin’ny Tompo, no hampahalala anareo ny zavatra rehetra; '
  '22':
  - type: text
    content: izy no nirahiko hilaza izany zavatra izany indrindra aminareo, mba ho fantatrareo ny toetray, ary mba hamporisihiny ny fonareo.
  '23':
  - type: text
    content: 'Fiadanana anie ho an’ny rahalahy ary fitiavana mbamin’ny finoana avy amin’Andriamanitra Ray sy Jesosy Kristy Tompo. '
  '24':
  - type: text
    content: Ny fahasoavana anie ho amin’izay rehetra tia an’i Jesosy Kristy Tompontsika amin’ny fitiavana tsy mety levona. Amena.
  '3':
  - type: text
    content: ',,mba hahita soa hianao sy ho maro andro ambonin’ny tany’’ (Deo. 5.16). '
  '4':
  - type: text
    content: Ary hianareo ray, aza mampahatezitra ny zanakareo, fa tezao amin’ny famaizana sy ny fananaran’ny Tompo izy.
  '5':
  - type: text
    content: 'Hianareo mpanompo, maneke ny tomponareo araka ny nofo amin’ny fahatahorana sy ny fangovitana, amin’ny fahatsoran’ny fonareo, toy ny fanekena an’i Kristy ihany, '
  '6':
  - type: text
    content: 'tsy amin’ny fanompoana eo imaso, tahaka ny mpila sitraka amin’olona, fa tahaka ny mpanompon’i Kristy manao izay sitrapon’Andriamanitra amin’ny fo, '
  '7':
  - type: text
    content: 'amin’ny sitrapo manao fanompoana toy ny amin’ny Tompo, fa tsy amin’olona, '
  '8':
  - type: text
    content: 'satria fantatrareo fa izay soa ataon’ny olona rehetra no horaisiny amin’ny Tompo, na andevo na tsy andevo izy. '
  '9':
  - type: text
    content: Ary hianareo tompo, manaova toy izany aminy kosa, ka atsaharo ny fandrahonana, satria fantatrareo fa ny Tompony sady Tomponareo koa dia any an-danitra; ary tsy misy fizahan-tavan’olona aminy.
  - type: heading
    content: Ny adim-panahin’ny Kristiana, sy ny fiadiana atolotr’Andriamanitra azy.
