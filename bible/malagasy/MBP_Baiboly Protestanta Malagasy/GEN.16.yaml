document_id: GEN.16,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahaterahan’Isimaela.
  - type: text
    content: 'ARY Saray, vadin’i Abrama, tsy mba niteraka; ary izy nanana mpanompovavy Egyptiana, Hagara no anarany. '
  '10':
  - type: text
    content: 'Ary hoy koa Ilay Anjelin’i Jehovah taminy: Hataoko maro indrindra ny taranakao, ka tsy ho azo isaina izy noho ny hamaroany. '
  '11':
  - type: text
    content: 'Ary hoy indray Ilay Anjelin’i Jehovah taminy: Indro, manan-anaka hianao ka hiteraka zazalahy, ary ny anarany hataonao hoe Isimaela,'
  - type: note
    content: Isimaela = Andriamanitra mihaino.
  - type: text
    content: ' satria efa nihaino ny fahorianao Jehovah. '
  '12':
  - type: text
    content: Ary izy ho lehilahy toy ny boriki-dia; ny tànany hamely ny olona rehetra, ary ny tànan’ny olona rehetra kosa hamely azy; ary honina eo tandrifin’
  - type: note
    content: 'Na: atsinanan’.'
  - type: text
    content: ' ny rahalahiny rehetra izy.'
  '13':
  - type: text
    content: 'Ary Hagara nanao ny anaran’i Jehovah, Izay niteny taminy, hoe: Hianao no Andriamanitra Izay mahita;'
  - type: note
    content: Heb. Andriamanitry ny fahitana.
  - type: text
    content: ' fa hoy izy: Tsy teto va no mbola velona'
  - type: note
    content: Heb. mahita.
  - type: text
    content: ' aho aorian’ny fahitana? '
  '14':
  - type: text
    content: 'Izany no nanaovana ny lavaka fantsakana hoe: Bera-lahai-roy;'
  - type: note
    content: 'Bera-lahay-roy = Fantsakan’Ilay velona nahita ahy; na: Fantsakan’ilay velona na dia nahita aza....'
  - type: text
    content: ' indro, eo anelanelan’i Kadesy sy Bareda izany.'
  '15':
  - type: text
    content: 'Ary Hagara dia niteraka zazalahy tamin’i Abrama; ary ny anaran’ny zanany izay naterany dia nataon’i Abrama hoe Isimaela. '
  '16':
  - type: text
    content: Ary efa enina amby valo-polo taona Abrama, raha Hagara niteraka an’Isimaela taminy.
  '2':
  - type: text
    content: 'Ary hoy Saray tamin’i Abrama: Indro, efa tsy nanome zanaka ahy Jehovah; masìna hianao, mivadia amin’ny mpanompovaviko; angamba hahazo zaza aminy aho. Dia neken’i Abrama ny tenin’i Saray.'
  '3':
  - type: text
    content: 'Ary rehefa nonina folo taona teo amin’ny tany Kanana Abrama, dia nalain’i Saray, vadin’i Abrama, Hagara Egyptiana mpanompovaviny, ka nomeny an’i Abrama vadiny mba hovadìny. '
  '4':
  - type: text
    content: Dia nivady tamin’i Hagara izy, ka nanan-anaka ravehivavy; ary rehefa hitany fa efa manan-anaka izy, dia nataony toy ny tsinontsinona ny tompovaviny.
  '5':
  - type: text
    content: 'Ary hoy Saray tamin’i Abrama: Hanody anao anie ny fahoriako; fa efa nomeko ho andefimandrinao ny mpanompovaviko, ary nony hitany fa efa manan-anaka izy, dia nataony toy ny tsinontsinona aho; Jehovah anie hitsara ahy sy hianao. '
  '6':
  - type: text
    content: 'Ary hoy Abrama tamin’i Saray: Indro, eo an-tànanao ihany ny mpanompovavinao; ataovy aminy izay sitraponao. Ary raha nampahorin’i Saray Hagara, dia nandositra ny tavany izy.'
  '7':
  - type: text
    content: 'Ary Ilay Anjelin’i Jehovah nahita azy teo anilan’ny loharano anankiray tany an-efitra, dia teo anilan’ilay loharano eo amin’ny làlana mankany Sora. '
  '8':
  - type: text
    content: 'Ary hoy Izy: Ry Hagara, andevovavin’i Saray, avy taiza hianao? ary hankaiza? Ary hoy izy; Mandositra ny tavan’i Saray tompovaviko aho.'
  '9':
  - type: text
    content: 'Ary hoy Ilay Anjelin’i Jehovah taminy: Miverena any amin’ny tompovavinao ka miareta izay ataony aminao. '
