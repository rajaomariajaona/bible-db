document_id: GEN.16,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahaterahan’Isimaela.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Saray, vadin’i Abrama, tsy mba niteraka; ary izy nanana mpanompovavy Egyptiana, Hagara no anarany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Ilay Anjelin’i Jehovah taminy: Hataoko maro indrindra ny taranakao, ka tsy ho azo isaina izy noho ny hamaroany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy indray Ilay Anjelin’i Jehovah taminy: Indro, manan-anaka hianao ka hiteraka zazalahy, ary ny anarany hataonao hoe Isimaela,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isimaela = Andriamanitra mihaino.
      marker-yv: yv-n
    - type: text
      text: ' satria efa nihaino ny fahorianao Jehovah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izy ho lehilahy toy ny boriki-dia; ny tànany hamely ny olona rehetra, ary ny tànan’ny olona rehetra kosa hamely azy; ary honina eo tandrifin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: atsinanan’.
      marker-yv: yv-n
    - type: text
      text: ' ny rahalahiny rehetra izy.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Hagara nanao ny anaran’i Jehovah, Izay niteny taminy, hoe: Hianao no Andriamanitra Izay mahita;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Andriamanitry ny fahitana.
      marker-yv: yv-n
    - type: text
      text: ' fa hoy izy: Tsy teto va no mbola velona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mahita.
      marker-yv: yv-n
    - type: text
      text: ' aho aorian’ny fahitana? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no nanaovana ny lavaka fantsakana hoe: Bera-lahai-roy;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Bera-lahay-roy = Fantsakan’Ilay velona nahita ahy; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fantsakan’ilay velona na dia nahita aza....
      marker-yv: yv-n
    - type: text
      text: ' indro, eo anelanelan’i Kadesy sy Bareda izany.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Hagara dia niteraka zazalahy tamin’i Abrama; ary ny anaran’ny zanany izay naterany dia nataon’i Abrama hoe Isimaela. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary efa enina amby valo-polo taona Abrama, raha Hagara niteraka an’Isimaela taminy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Saray tamin’i Abrama: Indro, efa tsy nanome zanaka ahy Jehovah; masìna hianao, mivadia amin’ny mpanompovaviko; angamba hahazo zaza aminy aho. Dia neken’i Abrama ny tenin’i Saray.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nonina folo taona teo amin’ny tany Kanana Abrama, dia nalain’i Saray, vadin’i Abrama, Hagara Egyptiana mpanompovaviny, ka nomeny an’i Abrama vadiny mba hovadìny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nivady tamin’i Hagara izy, ka nanan-anaka ravehivavy; ary rehefa hitany fa efa manan-anaka izy, dia nataony toy ny tsinontsinona ny tompovaviny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Saray tamin’i Abrama: Hanody anao anie ny fahoriako; fa efa nomeko ho andefimandrinao ny mpanompovaviko, ary nony hitany fa efa manan-anaka izy, dia nataony toy ny tsinontsinona aho; Jehovah anie hitsara ahy sy hianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Abrama tamin’i Saray: Indro, eo an-tànanao ihany ny mpanompovavinao; ataovy aminy izay sitraponao. Ary raha nampahorin’i Saray Hagara, dia nandositra ny tavany izy.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Ilay Anjelin’i Jehovah nahita azy teo anilan’ny loharano anankiray tany an-efitra, dia teo anilan’ilay loharano eo amin’ny làlana mankany Sora. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Ry Hagara, andevovavin’i Saray, avy taiza hianao? ary hankaiza? Ary hoy izy; Mandositra ny tavan’i Saray tompovaviko aho.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Ilay Anjelin’i Jehovah taminy: Miverena any amin’ny tompovavinao ka miareta izay ataony aminao. '
