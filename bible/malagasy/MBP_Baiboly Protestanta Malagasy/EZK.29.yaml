document_id: EZK.29
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hamaliana an’i Farao sy ny vahoakany ary ny taniny.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TAMIN’ny andro faharoa ambin’ny folo tamin’ny volana fahafolo tamin’ny taona fahafolo dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak’olona, manandrifia an’i Farao, mpanjakan’i Egypta, ka maminania ny hamelezana azy mbamin’i Egypta rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mitenena, ka ataovy hoe: Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, avy hamely anao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Farao, mpanjakan’i Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay dragona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mamba.
    marker-yv: yv-n
  - type: text
    text: ' makadiry mamitsaka ao amin’ny Neiliny,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia ilay efa nanao hoe: Ahy ny Neiliko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izaho no namorona azy ho an’ny tenako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hasiako farango ny valanoranonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hampiraiketiko amin’ny kiranao ny hazandrano ao amin’ny Neilinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hampiakariko avy eo afovoan’ny Neilinao hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hazandrano rehetra amin’ny Neilinao dia hiraikitra amin’ny kiranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary hariako any an-efitra hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianao sy ny hazandrano rehetra avy amin’ny Neilinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsitsitra eny an-tanety hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hovorina na hangonina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nomeko hohanin’ny bibi-dia
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny voro-manidina hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia ho fantatry ny mponina rehetra any Egypta fa Izaho no Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria efa tehina volotara ho an’ny taranak’Isiraely izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: (Nony mandray anao amin’ny tànany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia folaka hianao, ka voatsindronao ny helik’izy rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nony mitehina aminao izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tapaka hianao ka mampilefidefitra ny valahan’izy rehetra.)
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hahatonga sabatra hamely anao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hofongorako tsy ho aminao ny olona sy ny biby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ny tany Egypta ho rava sy lao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatra fa Izaho no Jehovah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Satria hoy izy: Ahy Neily, ary izaho no nanao azy,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia, indro, avy hamely anao sy ny Neilinao Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany Egypta hataoko lao tokoa, eny, sady ho lao no ho rava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatrany Migdola ka hatrany Syena, dia hatramin’ny sisin’i Etiopia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy hodiavin-tongotr’olona ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tongo-biby aza tsy handia azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy honenana efa-polo taona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary hataoko tany rava dia rava
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rava ao amin’ny tany rava.
    marker-yv: yv-n
  - type: text
    text: ' ny tany Egypta,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lao dia ho lao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lao ao amin’ny tanàna lao.
    marker-yv: yv-n
  - type: text
    text: ' efa-polo taona ny tanànany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, haeliko ho any amin’ny firenena samy hafa ny Egyptiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahahako any amin’ny tany samy hafa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa afaka efa-polo taona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hangoniko avy any amin’ny firenena izay nielezany ny Egyptiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ary haveriko avy amin’ny fahababoany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampodiko any amin’ny tany Patrosa, tany nihaviany, izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho fanjakana ambany Egypta;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eny, ho ambany noho ny fanjakana hafa izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hisandratra ambonin’ny firenena hafa intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hohakeleziko izy ka tsy hampanompo ny firenena intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia tsy ho tokin’ny taranak’Isiraely intsony izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho fampahatsiarovana ny helony amin’ny andehanan’ireo hanaraka azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatra fa Izaho no Jehovah Tompo.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny babo azon’i Nebokadnezara tany Egypta ho karaman’ny miaramilany noho ny fahasasarany tany Tyro.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ARY tamin’ny andro voalohany tamin’ny volana voalohany tamin’ny taona fahafito amby roa-polo dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ry zanak’olona, mafy ny fanompoana izay nampanaovin’i Nebokadnezara, mpanjakan’i Babylona, ny miaramilany tamin’ny namelezany an’i Tyro, ka efa samy tonga sola avokoa ny lohany, sady niendaka ny sorony, nefa tsy nahazo karama avy tany Tyro izy sy ny miaramilany noho ny fanompoana izay nataony tamin’ny namelezany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa izao no lazain’i Jehovah Tompo: Indro, homeko an’i Nebokadnezara, mpanjakan’i Babylona, ny tany Egypta, dia halainy ny hareny, ary hobaboiny izay hita ao, ka hataony sambotra izay azo ao, koa izany no ho karaman’ny miaramilany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho valin’ny fanompoana nataony tany Tyro no nanomezako azy ny tany Egypta, satria nataony ho Ahy izany, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Amin’izany andro izany dia hampitsimoka tandroka ho an’ny taranak’Isiraely Aho, ary hampiloahiko vava eo aminy hianao; ka dia ho fantatra fa Izaho no Jehovah.
