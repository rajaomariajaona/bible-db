document_id: EZK.29,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hamaliana an’i Farao sy ny vahoakany ary ny taniny.
  - type: text
    content: 'TAMIN’ny andro faharoa ambin’ny folo tamin’ny volana fahafolo tamin’ny taona fahafolo dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: Dia, indro, avy hamely anao sy ny Neilinao Aho,
  - type: text
    content: Ary ny tany Egypta hataoko lao tokoa, eny, sady ho lao no ho rava,
  - type: text
    content: Hatrany Migdola ka hatrany Syena, dia hatramin’ny sisin’i Etiopia.
  '11':
  - type: text
    content: Tsy hodiavin-tongotr’olona ny tany,
  - type: text
    content: Ary ny tongo-biby aza tsy handia azy,
  - type: text
    content: Sady tsy honenana efa-polo taona izy.
  '12':
  - type: text
    content: Ary hataoko tany rava dia rava
  - type: note
    content: Heb. rava ao amin’ny tany rava.
  - type: text
    content: ' ny tany Egypta,'
  - type: text
    content: Ary ho lao dia ho lao
  - type: note
    content: Heb. lao ao amin’ny tanàna lao.
  - type: text
    content: ' efa-polo taona ny tanànany;'
  - type: text
    content: Eny, haeliko ho any amin’ny firenena samy hafa ny Egyptiana,
  - type: text
    content: Ary hahahako any amin’ny tany samy hafa.
  '13':
  - type: text
    content: 'Fa izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Rehefa afaka efa-polo taona,
  - type: text
    content: Dia hangoniko avy any amin’ny firenena izay nielezany ny Egyptiana.
  '14':
  - type: text
    content: ary haveriko avy amin’ny fahababoany izy,
  - type: text
    content: Ka hampodiko any amin’ny tany Patrosa, tany nihaviany, izy;
  - type: text
    content: Ary ho fanjakana ambany Egypta;
  '15':
  - type: text
    content: Eny, ho ambany noho ny fanjakana hafa izy
  - type: text
    content: Ka tsy hisandratra ambonin’ny firenena hafa intsony;
  - type: text
    content: Fa hohakeleziko izy ka tsy hampanompo ny firenena intsony.
  '16':
  - type: text
    content: Dia tsy ho tokin’ny taranak’Isiraely intsony izy
  - type: text
    content: Ho fampahatsiarovana ny helony amin’ny andehanan’ireo hanaraka azy;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah Tompo.
  - type: heading
    content: Ny babo azon’i Nebokadnezara tany Egypta ho karaman’ny miaramilany noho ny fahasasarany tany Tyro.
  '17':
  - type: text
    content: 'ARY tamin’ny andro voalohany tamin’ny volana voalohany tamin’ny taona fahafito amby roa-polo dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '18':
  - type: text
    content: 'Ry zanak’olona, mafy ny fanompoana izay nampanaovin’i Nebokadnezara, mpanjakan’i Babylona, ny miaramilany tamin’ny namelezany an’i Tyro, ka efa samy tonga sola avokoa ny lohany, sady niendaka ny sorony, nefa tsy nahazo karama avy tany Tyro izy sy ny miaramilany noho ny fanompoana izay nataony tamin’ny namelezany azy. '
  '19':
  - type: text
    content: 'Koa izao no lazain’i Jehovah Tompo: Indro, homeko an’i Nebokadnezara, mpanjakan’i Babylona, ny tany Egypta, dia halainy ny hareny, ary hobaboiny izay hita ao, ka hataony sambotra izay azo ao, koa izany no ho karaman’ny miaramilany. '
  '2':
  - type: text
    content: 'Ry zanak’olona, manandrifia an’i Farao, mpanjakan’i Egypta, ka maminania ny hamelezana azy mbamin’i Egypta rehetra. '
  '20':
  - type: text
    content: Ho valin’ny fanompoana nataony tany Tyro no nanomezako azy ny tany Egypta, satria nataony ho Ahy izany, hoy Jehovah Tompo.
  '21':
  - type: text
    content: Amin’izany andro izany dia hampitsimoka tandroka ho an’ny taranak’Isiraely Aho, ary hampiloahiko vava eo aminy hianao; ka dia ho fantatra fa Izaho no Jehovah.
  '3':
  - type: text
    content: 'Mitenena, ka ataovy hoe: Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, avy hamely anao Aho,
  - type: text
    content: Ry Farao, mpanjakan’i Egypta,
  - type: text
    content: Ilay dragona
  - type: note
    content: 'Na: mamba.'
  - type: text
    content: ' makadiry mamitsaka ao amin’ny Neiliny,'
  - type: text
    content: 'Dia ilay efa nanao hoe: Ahy ny Neiliko,'
  - type: text
    content: Fa izaho no namorona azy ho an’ny tenako.
  '4':
  - type: text
    content: Ary hasiako farango ny valanoranonao,
  - type: text
    content: Sady hampiraiketiko amin’ny kiranao ny hazandrano ao amin’ny Neilinao,
  - type: text
    content: Dia hampiakariko avy eo afovoan’ny Neilinao hianao,
  - type: text
    content: Ary ny hazandrano rehetra amin’ny Neilinao dia hiraikitra amin’ny kiranao.
  '5':
  - type: text
    content: Ary hariako any an-efitra hianao,
  - type: text
    content: Dia hianao sy ny hazandrano rehetra avy amin’ny Neilinao;
  - type: text
    content: Hitsitsitra eny an-tanety hianao
  - type: text
    content: Ka tsy hovorina na hangonina;
  - type: text
    content: Efa nomeko hohanin’ny bibi-dia
  - type: text
    content: Sy ny voro-manidina hianao.
  '6':
  - type: text
    content: Dia ho fantatry ny mponina rehetra any Egypta fa Izaho no Jehovah,
  - type: text
    content: Satria efa tehina volotara ho an’ny taranak’Isiraely izy.
  '7':
  - type: text
    content: (Nony mandray anao amin’ny tànany izy,
  - type: text
    content: Dia folaka hianao, ka voatsindronao ny helik’izy rehetra;
  - type: text
    content: Ary nony mitehina aminao izy,
  - type: text
    content: Dia tapaka hianao ka mampilefidefitra ny valahan’izy rehetra.)
  '8':
  - type: text
    content: 'Dia izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, hahatonga sabatra hamely anao Aho,
  - type: text
    content: Ka hofongorako tsy ho aminao ny olona sy ny biby.
  '9':
  - type: text
    content: Ary ny tany Egypta ho rava sy lao;
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah.
  - type: text
    content: 'Satria hoy izy: Ahy Neily, ary izaho no nanao azy,'
