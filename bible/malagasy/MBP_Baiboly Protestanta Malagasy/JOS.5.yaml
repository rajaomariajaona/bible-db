document_id: JOS.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ary ny mpanjaka rehetra amin’ny Amorita any an-dafy andrefan’i Jordana sy ny mpanjaka rehetra tamin’ny Kananita any amoron’ny ranomasina, rehefa nandre ny nanamainan’i Jehovah ny rano Jordana teo anoloan’ny Zanak’Isiraely mandra-pitany
  - type: note
    content: 'Na: (mandra-pitantsika).'
  - type: text
    content: ', dia ketraka ny fony, ka very hevitra izy noho ny tahony ny Zanak’Isiraely.'
  - type: heading
    content: Ny namorana ny olona izay nateraka tany an-efitra, sy ny nitandremany ny Paska, ary ny nitsaharan’ny mana.
  '10':
  - type: text
    content: Ary ny Zanak’Isiraely nitoby tany Gilgala ka nitandrina ny Paska tamin’ny harivan’ny andro fahefatra ambin’ny folo tamin’ny volana, teo amin’ny tani-hay
  - type: note
    content: Heb. Arabà.
  - type: text
    content: ' any Jeriko.'
  '11':
  - type: text
    content: 'Ary nony ampitson’ny Paska, dia nihinana ny vokatry ny tany izy tamin’izany andro izany indrindra, dia mofo tsy misy masirasira sy lango. '
  '12':
  - type: text
    content: Ary nitsahatra ny mana tamin’iny andro ampitso iny, dia tamin’ny nihinanany ny vokatry ny tany, ka tsy nisy mana ho an’ny Zanak’Isiraely intsony; fa nihinana ny vokatry ny tany Kanana izy tamin’izany taona izany.
  - type: heading
    content: Ny nisehoan’ny Komandin’ny miaramilan’i Jehovah tamin’i Josoa sy ny nahafahan’ny Isiraely an’i Jeriko.
  '13':
  - type: text
    content: 'ARY nony teo akaikin’i Jeriko Josoa, dia nanopy ny masony izy ka nijery, ary, indro, nisy lehilahy nitsangana tandrifiny, ka ny sabany voatsoaka dia teny an-tànany; ary nanatona Azy Josoa ka nanao taminy hoe: Namanay va Hianao, sa naman’ny fahavalonay? '
  '14':
  - type: text
    content: 'Dia hoy Izy: Tsia; fa Izaho dia Komandin’ny miaramilan’i Jehovah ka tonga atỳ ankehitriny.Dia niankohoka tamin’ny tany Josoa ka nanao taminy hoe: Inona no holazainao amin’ny mpanomponao, Tompokolahy?'
  '15':
  - type: text
    content: 'Dia hoy Ilay Komandin’ny miaramilan’i Jehovah tamin’i Josoa: Esory amin’ny tongotrao ny kapanao; fa masina io tany ijanonanao io. Dia nataon’i Josoa izany.'
  '2':
  - type: text
    content: 'TAMIN’izany andro izany no nilazan’i Jehovah tamin’i Josoa hoe: Manaova fiharatra vato ho anao, ka atombohy indray ny famorana ny Zanak’Isiraely. '
  '3':
  - type: text
    content: Dia nanao fiharatra vato ho azy Josoa ka namora ny Zanak’Isiraely teo an-kavoana Haralota.
  '4':
  - type: text
    content: 'Ary izao no anton’ny namoran’i Josoa azy: Ny lehilahy rehetra izay nivoaka avy tany Egypta, dia ny mpanafika rehetra, samy maty tany an-efitra teny an-dàlana, tamin’izy efa nivoaka avy tany Egypta. '
  '5':
  - type: text
    content: 'Ary voafora ny lehilahy rehetra izay nivoaka; fa ny lehilahy rehetra nateraka teny an-dàlana tany an-efitra, tamin’izy efa nivoaka avy tany Egypta, dia tsy mbola voafora kosa. '
  '6':
  - type: text
    content: 'Fa efa-polo taona no nandehanan’ny Zanak’Isiraely tany an-efitra, mandra-pahalany ritran’ny olona rehetra, dia ny mpanafika izay nivoaka avy tany Egypta, satria tsy nihaino ny feon’i Jehovah izy; dia ireo no nianianan’i Jehovah fa tsy havelany hahita ny tany izay nianianan’i Jehovah tamin’ny razana homeny antsika, dia tany tondra-dronono sy tantely. '
  '7':
  - type: text
    content: 'Ary ny zanany no natsangany handimby azy, ka ireo no noforan’i Josoa; fa tsy mbola voafora ireo, satria tsy noforana teny an-dàlana. '
  '8':
  - type: text
    content: Ary rehefa noforana ny lehilahy rehetra, dia nitoetra tao amin’ny fitoerany tany an-toby izy mandra-pahasitrany.
  '9':
  - type: text
    content: 'Dia hoy Jehovah tamin’i Josoa: An-droany no nanakodiavako ny fandatsan’i Egypta ho afaka aminareo. Ary ny anaran’izany tany izany dia nataony hoe Gilgala'
  - type: note
    content: Gilgala = Fanakodiavana.
  - type: text
    content: ' mandraka andro-any.'
