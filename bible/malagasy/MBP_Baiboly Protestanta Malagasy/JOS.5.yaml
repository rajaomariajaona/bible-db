document_id: JOS.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary ny mpanjaka rehetra amin’ny Amorita any an-dafy andrefan’i Jordana sy ny mpanjaka rehetra tamin’ny Kananita any amoron’ny ranomasina, rehefa nandre ny nanamainan’i Jehovah ny rano Jordana teo anoloan’ny Zanak’Isiraely mandra-pitany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (mandra-pitantsika).
    marker-yv: yv-n
  - type: text
    text: ', dia ketraka ny fony, ka very hevitra izy noho ny tahony ny Zanak’Isiraely.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny namorana ny olona izay nateraka tany an-efitra, sy ny nitandremany ny Paska, ary ny nitsaharan’ny mana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'TAMIN’izany andro izany no nilazan’i Jehovah tamin’i Josoa hoe: Manaova fiharatra vato ho anao, ka atombohy indray ny famorana ny Zanak’Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nanao fiharatra vato ho azy Josoa ka namora ny Zanak’Isiraely teo an-kavoana Haralota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izao no anton’ny namoran’i Josoa azy: Ny lehilahy rehetra izay nivoaka avy tany Egypta, dia ny mpanafika rehetra, samy maty tany an-efitra teny an-dàlana, tamin’izy efa nivoaka avy tany Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary voafora ny lehilahy rehetra izay nivoaka; fa ny lehilahy rehetra nateraka teny an-dàlana tany an-efitra, tamin’izy efa nivoaka avy tany Egypta, dia tsy mbola voafora kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa efa-polo taona no nandehanan’ny Zanak’Isiraely tany an-efitra, mandra-pahalany ritran’ny olona rehetra, dia ny mpanafika izay nivoaka avy tany Egypta, satria tsy nihaino ny feon’i Jehovah izy; dia ireo no nianianan’i Jehovah fa tsy havelany hahita ny tany izay nianianan’i Jehovah tamin’ny razana homeny antsika, dia tany tondra-dronono sy tantely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny zanany no natsangany handimby azy, ka ireo no noforan’i Josoa; fa tsy mbola voafora ireo, satria tsy noforana teny an-dàlana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary rehefa noforana ny lehilahy rehetra, dia nitoetra tao amin’ny fitoerany tany an-toby izy mandra-pahasitrany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Josoa: An-droany no nanakodiavako ny fandatsan’i Egypta ho afaka aminareo. Ary ny anaran’izany tany izany dia nataony hoe Gilgala'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gilgala = Fanakodiavana.
    marker-yv: yv-n
  - type: text
    text: ' mandraka andro-any.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny Zanak’Isiraely nitoby tany Gilgala ka nitandrina ny Paska tamin’ny harivan’ny andro fahefatra ambin’ny folo tamin’ny volana, teo amin’ny tani-hay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arabà.
    marker-yv: yv-n
  - type: text
    text: ' any Jeriko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony ampitson’ny Paska, dia nihinana ny vokatry ny tany izy tamin’izany andro izany indrindra, dia mofo tsy misy masirasira sy lango. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nitsahatra ny mana tamin’iny andro ampitso iny, dia tamin’ny nihinanany ny vokatry ny tany, ka tsy nisy mana ho an’ny Zanak’Isiraely intsony; fa nihinana ny vokatry ny tany Kanana izy tamin’izany taona izany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nisehoan’ny Komandin’ny miaramilan’i Jehovah tamin’i Josoa sy ny nahafahan’ny Isiraely an’i Jeriko.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ARY nony teo akaikin’i Jeriko Josoa, dia nanopy ny masony izy ka nijery, ary, indro, nisy lehilahy nitsangana tandrifiny, ka ny sabany voatsoaka dia teny an-tànany; ary nanatona Azy Josoa ka nanao taminy hoe: Namanay va Hianao, sa naman’ny fahavalonay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Izy: Tsia; fa Izaho dia Komandin’ny miaramilan’i Jehovah ka tonga atỳ ankehitriny.Dia niankohoka tamin’ny tany Josoa ka nanao taminy hoe: Inona no holazainao amin’ny mpanomponao, Tompokolahy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy Ilay Komandin’ny miaramilan’i Jehovah tamin’i Josoa: Esory amin’ny tongotrao ny kapanao; fa masina io tany ijanonanao io. Dia nataon’i Josoa izany.'
