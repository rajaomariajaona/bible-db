document_id: EZK.45,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny tany homena ho an’ny tempoly sy ny mpisorona sy ny Levita ary ny mpanjaka, ary ny amin’ny zavatra haloa ho an’ny mpanjaka hanaovany fanatitra.
  - type: text
    content: ARY rehefa zarainareo araka ny filokana ny tany mba ho lova, dia hisy hatokanareo ho fanatitra ho an’i Jehovah, dia anjara masina amin’ny tany; ny lavany dia indimy arivo sy roa alin’
  - type: text
    content: ny volotara,
  - type: text
    content: ' ary ny sakany iray alina. Ho masina any amin’ny fari-taniny rehetra manodidina izany. '
  '10':
  - type: text
    content: 'Mizana marina sy efaha marina ary bata marina no aoka hotananareo. '
  '11':
  - type: text
    content: 'Hitovy fatra ny efaha sy ny bata, ary ny bata hahalany ny ampahafolon’ny homera, ary ny efaha koa dia ampahafolon’ny homera: ny homera no mariky ny fatrany. '
  '12':
  - type: text
    content: Ny sekely dia roa-polo gera; sekely roa-polo sy dimy amby roa-polo ary dimy ambin’ny folo no ho manenareo.
  '13':
  - type: text
    content: 'Izao no zavatra haloanareo: Ny ampahenin’ny efaha isaky ny homeran’ny vary tritika; ary haloanareo koa ny ampahenin’ny efaha isaky ny homeran’ny vary hordea; '
  '14':
  - type: text
    content: 'ary ny didy ny amin’ny diloilo (ny diloilo iray bata) dia ampahafolon’ny bata isaky ny kora; fa ny homera dia misy bata folo, satria bata folo no homera iray. '
  '15':
  - type: text
    content: Ary ondry iray isan-droan-jato amin’ny tanin’ny Isiraely izay azon-drano no haloanareo hatao fanatitra hohanina sy fanatitra dorana ary fanati-pihavanana, mba hanaovana fanavotana ho an’ny vahoaka, hoy Jehovah Tompo.
  '16':
  - type: text
    content: 'Ny vahoaka rehetra no handoa izany ho an’ny mpanjakan’ny Isiraely. '
  '17':
  - type: text
    content: Fa ny mpanjaka kosa no hiantoka ny fanatitra dorana sy ny fanatitra hohanina ary ny fanatitra aidina amin’ny andro firavoravoana sy ny voaloham-bolana ary ny Sabata, dia amin’ny fotoam-pivavahana rehetra tandreman’ny taranak’Isiraely; eny, izy no hiantoka ny fanatitra noho ny ota sy ny fanatitra hohanina sy ny fanatitra dorana ary ny fanati-pihavanana, mba hanaovana fanavotana ho an’ny taranak’Isiraely.
  - type: heading
    content: Ny amin’ny andro firavoravoana sy ny fanatitra isan-andro.
  '18':
  - type: text
    content: 'IZAO no lazain’i Jehovah Tompo: Raha mby amin’ny andro voalohany amin’ny volana voalohany dia haka vantotr’ ombilahy tsy misy kilema hianao ka hanadio'
  - type: note
    content: Heb. hanafaka ota.
  - type: text
    content: ' ny fitoerana masina. '
  '19':
  - type: text
    content: 'Ary hangalan’ny mpisorona ny ran’ny fanatitra noho ny ota ka hatentiny amin’ny tolan’ny trano sy amin’ny zoro efatra amin’ny rindrin’ny alitara ary amin’ny tolan’ny vavahadin’ny kianja anatiny. '
  '2':
  - type: text
    content: 'Ary io dia hanalana efa-joro sokera ho tany masina, dimam-jato ny lavany, ary diman-jato koa ny sakany; ary ho dimam-polo hakiho ny tany manodidina azy. '
  '20':
  - type: text
    content: Ary toy izany koa no hataonao amin’ny andro fahafito amin’ny volana ho an’ny olona manota tsy nahy, na noho izy kely saina, ka dia hanao fanavotana ho an’ny trano hianareo.
  '21':
  - type: text
    content: 'Amin’ny andro fahefatra ambin’ny folo amin’ny volana voalohany no hanaovanareo ny Paska; andro firavoravoana hafitoana izany, ka mofo tsy misy masirasira no hohanina. '
  '22':
  - type: text
    content: 'Ary amin’izany andro izany ny mpanjaka dia hanatitra vantotr’ombilahy iray hatao fanatitra noho ny ota ho an’ny tenany sy ny vahoaka rehara. '
  '23':
  - type: text
    content: 'Ary amin’ny andro firavoravoana hafitoana dia hanatitra fanatitra dorana isan-andro mandritra ny hafitoana ho an’i Jehovah izy, dia vantotr’ombilahy fito sy ondrilahy fito tsy misy kilema, ary osilahy iray isan-andro hataony fanatitra noho ny ota. '
  '24':
  - type: text
    content: Ary hanatitra ny fanatitra hohanina koa izy, dia iray efaha isam-bantotr’ombilahy sy iray efaha isan-ondrilahy, ary diloilo eran’ny hina isan-efaha.
  '25':
  - type: text
    content: Amin’ny andro fahadimy ambin’ny folo amin’ny volana fahafito, amin’ny andro firavoravoana, dia hanatitra tahaka izany koa hafitoana izy, na ny fanatitra noho ny ota, na ny fanatitra dorana, na ny fanatitra hohanina, na ny diloilo.
  '3':
  - type: text
    content: Eny, araka izany fandrefesana izany no handrefesanao
  - type: note
    content: 'Na: Ary amin’izany voarefy izany dia mbola hisy horefesinao koa, dia.'
  - type: text
    content: ' dimy arivo amby roa alina ny lavany, ary iray alina ny sakany; ary ho ao amin’io ny fitoerana masina, dia ny masina indrindra. '
  '4':
  - type: text
    content: Ho anjara masina amin’ny tany izany ka ho an’ny mpisorona, mpanao fanompoam-pivavahana ao amin’ny fitoerana masina, dia izay manatona hanao fanompoam-pivavahana ho an’i Jehovah, ary ho fitoeran’ny tranony sy ho tany masina hasiana ny fitoerana masina.
  '5':
  - type: text
    content: 'Ary '
  - type: text
    content: tany
  - type: text
    content: ' dimy arivo amby roa alina ny lavany, ary iray alina ny sakany, no ho an’ny Levita, mpanao fanompoam-pivavahana ao amin’ny trano; ho zara-tany ho azy izany–efi-trano roa-polo.'
  '6':
  - type: text
    content: Ary homenareo koa ny zara-tany ho an’ny tanàna, dimy arivo ny sakany, ary dimy arivo amby roa alina ny lavany, mifanolotra amin’ny anjara masina voatokana; ho an’ny taranak’Isiraely rehetra izany.
  '7':
  - type: text
    content: 'Ary ny mpanjaka dia homenareo '
  - type: text
    content: tany
  - type: text
    content: ' eo an-daniny roa amin’ny anjara masina voatokana sy amin’ny tany ho an’ny tanàna, dia ny mifanolotra amin’ny anjara masina voatokana sy ny mifanolotra amin’ny tany ho an’ny tanàna, hatreo amin’ny andrefana mikipaka miankandrefana, ary hatreo amin’ny atsinanana mikipaka miantsinanana; ary ny sakany'
  - type: note
    content: Heb. lavany.
  - type: text
    content: ' dia mifanolotra amin’ireo anjaran’ny firenena, na amin’ny andrefana na amin’ny atsinanana. '
  '8':
  - type: text
    content: Ho taniny izany, dia anjara ho azy ao amin’ny Isiraely; ary ireo mpanjaka voahasotro
  - type: note
    content: Heb. mpanjakako.
  - type: text
    content: ' dia tsy hampahory ny oloko intsony, fa hahafoy ny tany ho an’ny taranak’Isiraely isam-pireneny.'
  '9':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo: Aoka izay, ry mpanjakan’ny Isiraely! Ajanòny ny halozana sy ny fampahoriana, ary manaova fitsarana sy fahamarinana; atsaharo ny fandroahanareo ny oloko, hoy Jehovah Tompo.'
