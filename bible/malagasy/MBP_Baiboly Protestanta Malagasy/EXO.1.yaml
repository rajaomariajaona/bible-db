document_id: EXO.1,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitomboan’ny Zanak’Isiraely, sy ny fahoriana nanjo azy tany Egypta.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY izao no anaran’ny Zanak’Isiraely izay niaraka tamin’i Jakoba nankany Egypta; samy nandeha mbamin’ny ankohonany avy izy rehetra: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: andeha hanaovantsika hevitra ireo, fandrao hihamaro izy, ka raha tàhiny hisy ady, dia homba ny fahavalontsika koa izy ka hiady amintsika, ary dia hiakatra hiala amin’ny tany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia nanendreny mpifehy izy, mba hampahory azy amin’ny fanompoany mafy. Ary nanao tanàna fitehirizana ho an’i Farao izy, dia Pitoma sy Ramesesa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa araka ny nampahoriany azy no vao mainka nihamaroany sy nitomboany kosa; ka dia natahotra ny Zanak’Isiraely indrindra ny Egyptiana.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampanompoin’ny Egyptiana fatratra ny Zanak’Isiraely, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka nataony mangidy ny fiainany tamin’ny fanompoana mafy, dia tamin’ny feta sy ny biriky mbamin’ny fanompoana rehetra any an-tsaha, dia ny fanompoana rehetra izay nampanompoany azy fatratra.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjakan’i Egypta niteny tamin’ny mpampivelona Hebreo (Sifra no anaran’ny anankiray, ary Poa no anaran’ny anankiray) '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao hoe: Raha mampivelona ny vehivavy Hebreo hianareo, ka hitanareo eo amin’ny fipetrahany fa zazalahy, dia vonoy, fa raha zazavavy kosa, dia velomy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa natahotra an’Andriamanitra ny mpampivelona ka tsy nanao araka izay nolazain’ny mpanjakan’i Egypta taminy, fa novelominy ihany ny zazalahy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampaka ny mpampivelona ny mpanjakan’i Egypta ka nanao taminy hoe: Nahoana no nanao izany zavatra izany hianareo, ka novelominareo ihany ny zazalahy? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpampivelona tamin’i Farao: Tsy mba tahaka ny vehivavy Egyptiana ny vehivavy Hebreo; fa matanjaka izy, ka raha tsy mbola tonga any aminy akory ny mpampivelona, dia velona izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Robena sy Simeona sy Levy ary Joda; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasian’Andriamanitra soa ny mpampivelona; ary nihamaro sy nihahery indrindra ny olona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tamin’izany, satria natahotra an’Andriamanitra ny mpampivelona dia nomen’Andriamanitra zanaka izy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nanaovany trano.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandidy ny vahoakany rehetra Farao ka nanao hoe: Ny zazalahy rehetra izay teraka dia ario an’i Neily, fa ny zazavavy rehetra kosa no velomy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isakara sy Zebolona ary Benjamina; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dana sy Naftaly, ary Gada sy Asera. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny isan’ny olona rehetra naterak’i Jakoba dia fito-polo; fa Josefa efa tany Egypta rahateo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary maty Josefa sy ny rahalahiny rehetra mbamin’izany taranaka rehetra izany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zanak’Isiraely niteraka ka nitombo betsaka sy nihamaro ary nihahery dia nihahery indrindra, ka dia henika azy ny tany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy mpanjaka vaovao nanjaka tany Egypta, izay tsy nahalala an’i Josefa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy niteny tamin’ny vahoakany hoe: Indro, ny firenen’ny Zanak’Isiraely efa maro sy mahery noho isika; '
