      - type: text
        text: '13'
    - type: text
      text: 'ary Zerobabela niteraka an’i Abihoda; ary Abihoda niteraka an’i Eliakima; ary Eliakima niteraka an’i Azora; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary Azora niteraka an’i Zadoka; ary Zadoka niteraka an’i Akima; ary Akima niteraka an’i Elihoda; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary Elihoda niteraka an’i Eleazara; ary Eleazara niteraka an’i Matana; ary Matana niteraka an’i Jakoba; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ary Jakoba niteraka an’i Josefa, vadin’i Maria; ary Maria niteraka an’i Jesosy, Izay atao hoe Kristy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ny taranaka rehetra hatramin’i Abrahama ka hatramin’i Davida dia taranaka efatra ambin’ny folo; ary hatramin’i Davida ka hatramin’ny nifindrana tany Babylona dia taranaka efatra ambin’ny folo; ary hatramin’ny nifindrana tany Babylona ka hatramin’i Kristy dia taranaka efatra ambin’ny folo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nilazan’ny anjely tamin’i Josefa fa ny Fanahy Masina no nananan’i Maria anaka.
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ARY ny nahaterahan’i Jesosy Kristy dia toy izao:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa nanaiky Maria, renin’i Jesosy, ho fofombadin’i Josefa, raha tsy mbola nivady izy, dia hita fa nitoe-jaza avy tamin’ny Fanahy Masina izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Josefa vadiny, izay lehilahy marina sady tsy ta-hanala baraka azy, dia nikasa hametraka azy mangingina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Abrahama niteraka an’i Isaka; ary Isaka niteraka an’i Jakoba; ary Jakoba niteraka an’i Joda mirahalahy avy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa raha mbola nisaina izany izy, indro, nisy anjelin’ny Tompo niseho taminy tamin’ny nofy ka nanao hoe: Ry Josefa, zanak’i Davida, aza matahotra hampakatra an’i Maria vadinao; fa ny Zaza ao an-kibony dia avy amin’ny Fanahy Masina, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ka hiteraka Zazalahy izy, ary ny anarany hataonao hoe '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: jesosy
    - type: text
      text: ;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesosy = Jehovah no Mpamonjy.
      marker-yv: yv-n
    - type: text
      text: ' fa Izy no hamonjy ny olony ho afaka amin’ny fahotany.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary izany rehetra izany dia tonga mba hahatanteraka izay nampilazain’ny Tompo ny mpaminany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
