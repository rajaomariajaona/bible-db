      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'profeta; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny profeta dia olona voafidin’Andriamanitra ho mpilaza ny teniny.
      marker-yv: yv-n
    - type: text
      text: 'hoe:'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ',,Indro, ny virijina hitoe-jaza ka hiteraka zazalahy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anarany hataon’ny olona hoe Imanoela’’ (Isa. 7.14),
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'izany hoe, raha adika: ,,Amintsika Andriamanitra’’.'
  '24':
