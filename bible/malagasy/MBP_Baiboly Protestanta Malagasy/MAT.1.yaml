    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary Josefa, rehefa nahatsiaro tamin’ny torimasony, dia nanao araka izay nandidian’ny anjelin’ny Tompo azy ka nampakatra ny vadiny. '
  '25':
  - type: usfm
