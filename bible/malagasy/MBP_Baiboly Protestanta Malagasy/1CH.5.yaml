document_id: 1CH.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’i Robena sy Gada ary ny antsasaky ny firenen’i Manase.
  - type: text
    content: 'ARY ny zanakalahin’i Robena, lahimatoan’Isiraely (fa izy no lahimatoa; saingy ny nandotoany ny farafaran-drainy no nanomezana ny fizokiany ho an’ny zanak’i Josefa, zanak’Isiraely; nefa tsy voasoratra ho zokiny amin’ny fitantaram-pirazanana ireo; '
  '10':
  - type: text
    content: Ary tamin’ny andron’i Saoly dia niady tamin’ny Hagarita izy ka naharesy azy; ary nonina an-day eran’ny ilany atsinanana rehetra amin’i Gileada
  - type: note
    content: 'Na: tany atsinanan’i Gileada.'
  - type: text
    content: ' izy.'
  '11':
  - type: text
    content: 'Ary ny taranak’i Gada nonina tandrifiny, teny amin’ny tany Basana hatrany Saleka; '
  '12':
  - type: text
    content: 'Joela no lohany, dia Safama no manarakaraka, dia Janay sy Safata tany Basana. '
  '13':
  - type: text
    content: 'Ary ny rahalahiny araka ny fianakaviany avy dia Mikaela sy Mesolama sy Seba sy Joray sy Jakana sy Zia ary Ebera; fito izy. '
  '14':
  - type: text
    content: 'Ireo no zanakalahin’i Abihaila, zanak’i Hory, zanak’i Jaroa, zanak’i Gileada, zanak’i Mikaela, zanak’i Jesisay, zanak’i Jado, zanak’i Boza; '
  '15':
  - type: text
    content: 'Ahia, zanak’i Abdiela, zanak’i Gony, no lohan’ny fianakaviany. '
  '16':
  - type: text
    content: 'Ary nonina tany Gileada sy tany Basana sy tamin’ny zana-bohiny ary tamin’ny tany rehetra an-tsisin’i Sarôna manodidina izy. '
  '17':
  - type: text
    content: Ireo rehetra ireo dia nisaina araka ny firazanany tamin’ny andron’i Jotama, mpanjakan’ny Joda, sy tamin’ny andron’i Jeroboama, mpanjakan’ny Isiraely.
  '18':
  - type: text
    content: 'Ny taranak’i Robena sy ny Gadita ary ny antsasaky ny firenen’i Manase, izay isan’ny lehilahy mahery, ka lehilahy mahatana ampinga sy sabatra ary mahahenjana tsipìka sady zatra ny miady, dia enim-polo amby fiton-jato amby efatra arivo sy efatra alina no isan’ny azo nalefa hanafika. '
  '19':
  - type: text
    content: 'Ary niady tamin’ny Hagarita sy tamin’i Jetora sy Nafisy ary Nodaba izy. '
  '2':
  - type: text
    content: 'fa Joda nisandratra noho ny rahalahiny, ary izy no nihavian’ny mpanapaka; nefa ny fizokiana kosa dia an’i Josefa ihany),– '
  '20':
  - type: text
    content: 'Ary nombana hamely ireo izy, ka dia voatolotra teo an-tànany ny Hagarita mbamin’izay rehetra nomba azy, satria nitaraina tamin’Andriamanitra teo amin’ny ady izy, ary nekeny ny fangatahany noho ny fahatokiany Azy. '
  '21':
  - type: text
    content: 'Ary nobaboiny ny bibiny, dia rameva dimy alina sy ondry aman-osy dimy alina amby roa hetsy sy boriky roa arivo ary olona iray hetsy; '
  '22':
  - type: text
    content: fa maro ny faty niampatrampatra, satria avy tamin’Andriamanitra ny ady. Ary nonina nandimby ireo izy mandra-pahatongan’ny namaboana azy kosa.
  '23':
  - type: text
    content: 'Ary ny taranaky ny antsasaky ny firenen’i Manase dia nonina tamin’ny tany; ary nihamaro izy hatrany Basana ka hatrany Bala-hermona sy Senira ary hatramin’ny tendrombohitra Hermona. '
  '24':
  - type: text
    content: 'Ary izao no lohan’ny fianakaviany: Efera sy Jisy sy Eliala sy Azriela sy Jeremia sy Hodavia ary Jadiela; lehilahy mahery ireo ary malaza sady samy lohan’ny fianakaviany avy.'
  '25':
  - type: text
    content: 'Ary nivadika tamin’Andriamanitry ny razany ireo, fa nijangajanga nanaraka ny andriamanitry ny tompon-tany, izay naringan’Andriamanitra tsy ho eo anoloany. '
  '26':
  - type: text
    content: Ary Andriamanitry ny Isiraely namporisika an’i Pola, mpanjakan’i Asyria, sy Tiglato-pilesera, mpanjakan’i Asyria, ka dia nobaboin’ireo ny Robenita sy ny Gadita sy ny antsasaky ny firenen’i Manase ka nentiny tany Hala sy Habora sy Hara ary tany amoron’ny ony Gozana ambaraka andro-any.
  - type: heading
    content: Ny taranak’i Levy.
  '27':
  - type: text
    content: NY zanakalahin’i Levy dia Gersona sy Kehata ary Merary.
  '28':
  - type: text
    content: 'Ary ny zanakalahin’i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela. '
  '29':
  - type: text
    content: Ary ny zanak’i Amrama dia Arona sy Mosesy ary Miriama.
  - type: text
    content: 'Ny zanakalahin’i Arona dia Nadaba sy Abiho sy Eleazara ary Itamara. '
  '3':
  - type: text
    content: ny zanakalahin’i Robena, lahimatoan’Isiraely, dia Hanoka sy Palo sy Hezrona ary Karmy.
  '30':
  - type: text
    content: 'Eleazara niteraka an’i Finehasa; ary Finehasa niteraka an’i Abisoa; '
  '31':
  - type: text
    content: 'ary Abisoa niteraka an’i Boky; ary Boky niteraka an’i Ozy; '
  '32':
  - type: text
    content: 'ary Ozy niteraka an’i Zerahia; ary Zerahia niteraka an’i Meraiota; '
  '33':
  - type: text
    content: 'ary Meraiota niteraka an’i Amaria; ary Amaria niteraka an’i Ahitoba; '
  '34':
  - type: text
    content: 'ary Ahitoba niteraka an’i Zadoka; ary Zadoka niteraka an’i Ahimaza; '
  '35':
  - type: text
    content: 'ary Ahimaza niteraka an’i Azaria; ary Azaria niteraka an’i Johanana; '
  '36':
  - type: text
    content: 'ary Johanana niteraka an’i Azaria (ilay nanao fisoronana tao amin’ny trano nataon’i Solomona tany Jerosalema); '
  '37':
  - type: text
    content: 'ary Azaria niteraka an’i Amaria; ary Amaria niteraka an’i Ahitoba; '
  '38':
  - type: text
    content: 'ary Ahitoba niteraka an’i Zadoka; ary Zadoka niteraka an’i Saloma; '
  '39':
  - type: text
    content: 'ary Saloma niteraka an’i Hilkia; ary Hilkia niteraka an’i Azaria; '
  '4':
  - type: text
    content: 'Ny zanakalahin’i Joela dia Semaia, ary Goga no zanakalahin’i Semaia, Simey no zanakalahin’i Goga, '
  '40':
  - type: text
    content: 'ary Azaria niteraka an’i Seraia; ary Seraia niteraka an’i Jozadaka; '
  '41':
  - type: text
    content: ary dia lasan-ko babo Jozadaka, nony voatolotr’i Jehovah ho babon’i Nebokadnezara ny Joda sy Jerosalema.
  '5':
  - type: text
    content: 'Mika no zanakalahin’i Simey, Reaia no zanakalahin’i Mika, Bala no zanakalahin’i Reaia, '
  '6':
  - type: text
    content: Bera no zanakalahin’i Bala, izay nobaboin’i Tiglato-pilesera, mpanjakan’i Asyria; izy no loham-pirenen’ny Robenita.
  '7':
  - type: text
    content: 'Ary ny rahalahiny araka ny fokony avy, raha nisaina ny firazanan’ny fireneny, dia Jeiela lohany sy Zakaria '
  '8':
  - type: text
    content: 'ary Bela, zanak’i Azaza, zanak’i Sema, zanak’i Joela, izay nonina tao Aroera hatrany Nebo sy Bala-meona. '
  '9':
  - type: text
    content: 'Ary nonina tany atsinanana hatrany akaikin’ny efitra ka hatramin’ny ony Eofrata izy; fa ny ombiny aman-ondriny nihamaro teny amin’ny tany Gileada. '
