document_id: PSA.53,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny faharatsian’ny olona sy ny faniriam-pamonjena.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ny mpiventy hira. Al-mahalath. Maskila nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'NY adala manao anakampo hoe: Tsy misy Andriamanitra.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manao izay ratsy sy vetaveta izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy manao ny tsara.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny an-danitra Andriamanitra miondrika mijery ny zanak’olombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hizaha na misy hendry mitady an’Andriamanitra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy efa nivily izy rehetra ka tonga vetaveta avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy manao ny tsara, na dia iray akory aza.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahalala va ny mpanao ratsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izay mihinana ny oloko '
    - type: usfm
      marker: it
      children:
      - type: text
        text: toy
    - type: text
      text: ' ny fihinan-kanina,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Andriamanitra tsy antsoiny?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indreo, matahotra dia matahotra ireny, nefa tsy nisy tokony hatahorany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra efa nanely ny taolan’izay nitoby hamely anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahamenatra azy hianao, satria efa narian’Andriamanitra izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka hivoaka avy ao Ziona ny famonjena ny Isiraely!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha ampodin’Andriamanitra avy amin’ny fahababoana ny olony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho faly Jakoba, ary ho ravoravo Isiraely.
