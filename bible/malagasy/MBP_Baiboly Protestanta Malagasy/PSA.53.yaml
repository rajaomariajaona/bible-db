document_id: PSA.53,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharatsian’ny olona sy ny faniriam-pamonjena.
  - type: text
    content: Ho an’ny mpiventy hira. Al-mahalath. Maskila nataon’i Davida.
  - type: text
    content: 'NY adala manao anakampo hoe: Tsy misy Andriamanitra.'
  - type: text
    content: Manao izay ratsy sy vetaveta izy,
  - type: text
    content: Tsy misy manao ny tsara.
  '2':
  - type: text
    content: Eny an-danitra Andriamanitra miondrika mijery ny zanak’olombelona,
  - type: text
    content: Mba hizaha na misy hendry mitady an’Andriamanitra.
  '3':
  - type: text
    content: Samy efa nivily izy rehetra ka tonga vetaveta avokoa;
  - type: text
    content: Tsy misy manao ny tsara, na dia iray akory aza.
  '4':
  - type: text
    content: Tsy mahalala va ny mpanao ratsy,
  - type: text
    content: 'Izay mihinana ny oloko '
  - type: text
    content: toy
  - type: text
    content: ' ny fihinan-kanina,'
  - type: text
    content: Ary Andriamanitra tsy antsoiny?
  '5':
  - type: text
    content: Indreo, matahotra dia matahotra ireny, nefa tsy nisy tokony hatahorany;
  - type: text
    content: Fa Andriamanitra efa nanely ny taolan’izay nitoby hamely anao;
  - type: text
    content: Nampahamenatra azy hianao, satria efa narian’Andriamanitra izy.
  '6':
  - type: text
    content: Enga anie ka hivoaka avy ao Ziona ny famonjena ny Isiraely!
  - type: text
    content: Raha ampodin’Andriamanitra avy amin’ny fahababoana ny olony,
  - type: text
    content: Dia ho faly Jakoba, ary ho ravoravo Isiraely.
