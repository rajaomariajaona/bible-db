document_id: ISA.22,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’ny loza hanjo an’i Jerosalema.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: FAMINANIANA ny amin’ny Lohasahan’ny Fahitana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona re izato manjo anareo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No dia miakatra eny an-tampon-trano avokoa hianareo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hianao.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Isainareo ny trano any Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ravanareo ny trano ho enti-manamafy ny mànda.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mihady lavaka famorian-drano eo anelanelan’ny mànda roa hianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Halehan’ny rano avy amin’ny kamory ela;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa tsy mijery Izay efa nanomana izao zavatra izao hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mahita Izay nikasa azy hatry ny fony ela.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary amin’izany andro izany Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiantso fitomaniana sy fioriana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fiharatana ary fisikinana lamba fisaonana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Kanjo he izato hafaliana sy haravoravoana!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy famonoana omby sy ondry aman-osy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fihinanan-kena sy fisotroan-divay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka isika hihinana sy hisotro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa rahampitso dia ho faty.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nambaran’i Jehovah, Tompon’ny maro, teo an-tsofiko izao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy havela mihitsy ambara-pahafatinareo izao helokareo izao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah, Tompon’ny maro.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny nanonganana an’i Sebna sy ny nanendrena an’i Eliakima ho solony.
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'IZAO no lazain’i Jehovah, Tompon’ny maro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andeha mankao amin’ilay mpanolo-tsaina io,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia ao amin’i Sebna, lehiben’ny ao an-dapa, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'ka ataovy hoe:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Manao inona etỳ hianao, ary inonao moa no etỳ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No manao fasana etỳ hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia manao fasana ho anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho azy.
      marker-yv: yv-n
    - type: text
      text: ' etỳ amin’ny hantsana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mandoaka fonenana ho anao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho azy.
      marker-yv: yv-n
    - type: text
      text: ' etỳ amin’ny harambato?'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Indro, Jehovah hanipy mafy anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hofiazany mafy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hosaronany.
      marker-yv: yv-n
    - type: text
      text: ' hianao,'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia hovolavolainy toy ny kodiarana
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ka hakodiadiany
    - type: text
      text: ' ho any amin’ny tany malalaka;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any no hahafaty anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho any koa ny kalesin’ny voninahitrao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry ilay henatry ny mpianakavin’ny tomponao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary horoahiko hiala amin’ny fitoeranao hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy haongako
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: haongany.
      marker-yv: yv-n
    - type: text
      text: ' hiala amin’ny raharahanao'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ry ilay be horakoraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tanàna be tabataba, vohitra miravoravo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny faty eo aminao dia tsy mba novonoin-tsabatra, na maty an-ady.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary amin’izany andro izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hantsoiko kosa Eliakima mpanompoko, zanak’i Hilkia;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary hampiakanjoiko azy ny akanjonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hosikinako amin’ny fehin-kibonao izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hatolotro eo an-tànany ny fanapahanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia ho tonga rain’ny mponina eto Jerosalema
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny taranak’i Joda izy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary hapetrako eo an-tsorony ny fanalahidin’ny tranon’i Davida;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hamoha izy, ka tsy hisy handrindrina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary handrindrina izy, ka tsy hisy hamoha.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary hatsatoko toy ny fihantonan-javatra eo amin’ny fitoerana mafy izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho sezam-boninahitra ho an’ny mpianakavin-drainy.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary hahantona eo aminy ny havesatry ny voninahitry ny mpianakavin-drainy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay zanaka sy tera-drainy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fanaka madinika rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny lovia ka hatramin’ny siny samy hafa rehetra.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Amin’izany andro izany, hoy Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiala ilay fihantonan-javatra voatsatoka teo amin’ny fitoerana mafy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hokapaina izy ka hianjera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho simba ny entana izay nihantona teo aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no efa niteny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Niara-nandositra ny lehibenao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nafatotra tsy amin-tsipìka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nafatotry ny mpandefa zana-tsipìka.
      marker-yv: yv-n
    - type: text
      text: ' izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra hita tao aminao dia niara-nafatotra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia nitady handositra lavitra aza.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa izany no anaovako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihodìna tsy hijery ahy, fa hitomany mafy dia mafy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza dia fatra-pampionona ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fandringanana ny oloko zanakavavy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa ao amin’ny Lohasahan’ny Fahitana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia misy andron’i Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andro fitabatabana sy fanosihosena sy fahaverezan-kevitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fandravana ny mànda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fidradradradrana manako hatrany an-tendrombohitra.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary Elama mitondra ny tranon-jana-tsipìka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny kalesy misy olona sy ny mpitaingin-tsoavaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Kira manaisotra ny fonon’ampinga.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Izay tsara indrindra amin’ny lohasahanao dia feno kalesy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpitaingin-tsoavaly milahatra eo am-bavahady.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia alana ny fisalobonan’i Joda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mijery ny fiadiana ao an-Tranoala hianao amin’izany andro izany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary hitanareo fa banga be ihany ny Tanànan’i Davida;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamory ny rano avy amin’ny kamory ambany hianareo.
