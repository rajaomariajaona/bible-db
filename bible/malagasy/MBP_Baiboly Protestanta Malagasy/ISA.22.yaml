document_id: ISA.22,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny loza hanjo an’i Jerosalema.
  - type: text
    content: FAMINANIANA ny amin’ny Lohasahan’ny Fahitana.
  - type: text
    content: Inona re izato manjo anareo,
  - type: note
    content: Heb. anao.
  - type: text
    content: No dia miakatra eny an-tampon-trano avokoa hianareo,
  - type: note
    content: Heb. hianao.
  '10':
  - type: text
    content: Isainareo ny trano any Jerosalema,
  - type: text
    content: Ka dia ravanareo ny trano ho enti-manamafy ny mànda.
  '11':
  - type: text
    content: Mihady lavaka famorian-drano eo anelanelan’ny mànda roa hianareo
  - type: text
    content: Halehan’ny rano avy amin’ny kamory ela;
  - type: text
    content: Kanefa tsy mijery Izay efa nanomana izao zavatra izao hianareo,
  - type: text
    content: Na mahita Izay nikasa azy hatry ny fony ela.
  '12':
  - type: text
    content: Ary amin’izany andro izany Jehovah, Tompon’ny maro,
  - type: text
    content: Hiantso fitomaniana sy fioriana
  - type: text
    content: Sy fiharatana ary fisikinana lamba fisaonana.
  '13':
  - type: text
    content: Kanjo he izato hafaliana sy haravoravoana!
  - type: text
    content: Sy famonoana omby sy ondry aman-osy
  - type: text
    content: Ary fihinanan-kena sy fisotroan-divay!
  - type: text
    content: Aoka isika hihinana sy hisotro,
  - type: text
    content: Fa rahampitso dia ho faty.
  '14':
  - type: text
    content: 'Dia nambaran’i Jehovah, Tompon’ny maro, teo an-tsofiko izao:'
  - type: text
    content: Tsy havela mihitsy ambara-pahafatinareo izao helokareo izao,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro.
  - type: heading
    content: Ny amin’ny nanonganana an’i Sebna sy ny nanendrena an’i Eliakima ho solony.
  '15':
  - type: text
    content: 'IZAO no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Andeha mankao amin’ilay mpanolo-tsaina io,
  - type: text
    content: 'Dia ao amin’i Sebna, lehiben’ny ao an-dapa, '
  - type: text
    content: 'ka ataovy hoe:'
  '16':
  - type: text
    content: Manao inona etỳ hianao, ary inonao moa no etỳ,
  - type: text
    content: No manao fasana etỳ hianao,
  - type: text
    content: Dia manao fasana ho anao
  - type: note
    content: Heb. ho azy.
  - type: text
    content: ' etỳ amin’ny hantsana'
  - type: text
    content: Sy mandoaka fonenana ho anao
  - type: note
    content: Heb. ho azy.
  - type: text
    content: ' etỳ amin’ny harambato?'
  '17':
  - type: text
    content: Indro, Jehovah hanipy mafy anao,
  - type: text
    content: Eny, hofiazany mafy
  - type: note
    content: 'Na: hosaronany.'
  - type: text
    content: ' hianao,'
  '18':
  - type: text
    content: Dia hovolavolainy toy ny kodiarana
  - type: text
    content: Ka hakodiadiany
  - type: text
    content: ' ho any amin’ny tany malalaka;'
  - type: text
    content: Dia any no hahafaty anao,
  - type: text
    content: Ary ho any koa ny kalesin’ny voninahitrao,
  - type: text
    content: Ry ilay henatry ny mpianakavin’ny tomponao.
  '19':
  - type: text
    content: Ary horoahiko hiala amin’ny fitoeranao hianao
  - type: text
    content: Sy haongako
  - type: note
    content: Heb. haongany.
  - type: text
    content: ' hiala amin’ny raharahanao'
  '2':
  - type: text
    content: Ry ilay be horakoraka,
  - type: text
    content: Tanàna be tabataba, vohitra miravoravo?
  - type: text
    content: Ny faty eo aminao dia tsy mba novonoin-tsabatra, na maty an-ady.
  '20':
  - type: text
    content: Ary amin’izany andro izany
  - type: text
    content: Dia hantsoiko kosa Eliakima mpanompoko, zanak’i Hilkia;
  '21':
  - type: text
    content: Ary hampiakanjoiko azy ny akanjonao,
  - type: text
    content: Sady hosikinako amin’ny fehin-kibonao izy;
  - type: text
    content: Ka dia hatolotro eo an-tànany ny fanapahanao,
  - type: text
    content: Ary dia ho tonga rain’ny mponina eto Jerosalema
  - type: text
    content: Sy ny taranak’i Joda izy.
  '22':
  - type: text
    content: Ary hapetrako eo an-tsorony ny fanalahidin’ny tranon’i Davida;
  - type: text
    content: Dia hamoha izy, ka tsy hisy handrindrina;
  - type: text
    content: Ary handrindrina izy, ka tsy hisy hamoha.
  '23':
  - type: text
    content: Ary hatsatoko toy ny fihantonan-javatra eo amin’ny fitoerana mafy izy
  - type: text
    content: Ka ho sezam-boninahitra ho an’ny mpianakavin-drainy.
  '24':
  - type: text
    content: Ary hahantona eo aminy ny havesatry ny voninahitry ny mpianakavin-drainy rehetra,
  - type: text
    content: Izay zanaka sy tera-drainy rehetra,
  - type: text
    content: Dia ny fanaka madinika rehetra
  - type: text
    content: Hatramin’ny lovia ka hatramin’ny siny samy hafa rehetra.
  '25':
  - type: text
    content: Amin’izany andro izany, hoy Jehovah, Tompon’ny maro,
  - type: text
    content: Dia hiala ilay fihantonan-javatra voatsatoka teo amin’ny fitoerana mafy;
  - type: text
    content: Eny, hokapaina izy ka hianjera,
  - type: text
    content: Dia ho simba ny entana izay nihantona teo aminy;
  - type: text
    content: Fa Jehovah no efa niteny.
  '3':
  - type: text
    content: Niara-nandositra ny lehibenao,
  - type: text
    content: Nafatotra tsy amin-tsipìka
  - type: note
    content: 'Na: Nafatotry ny mpandefa zana-tsipìka.'
  - type: text
    content: ' izy;'
  - type: text
    content: Izay rehetra hita tao aminao dia niara-nafatotra,
  - type: text
    content: Na dia nitady handositra lavitra aza.
  '4':
  - type: text
    content: 'Koa izany no anaovako hoe:'
  - type: text
    content: Mihodìna tsy hijery ahy, fa hitomany mafy dia mafy aho;
  - type: text
    content: Aza dia fatra-pampionona ahy
  - type: text
    content: Noho ny fandringanana ny oloko zanakavavy.
  '5':
  - type: text
    content: Fa ao amin’ny Lohasahan’ny Fahitana
  - type: text
    content: Dia misy andron’i Jehovah, Tompon’ny maro,
  - type: text
    content: Andro fitabatabana sy fanosihosena sy fahaverezan-kevitra,
  - type: text
    content: Ary fandravana ny mànda
  - type: text
    content: Sy fidradradradrana manako hatrany an-tendrombohitra.
  '6':
  - type: text
    content: Ary Elama mitondra ny tranon-jana-tsipìka
  - type: text
    content: Mbamin’ny kalesy misy olona sy ny mpitaingin-tsoavaly;
  - type: text
    content: Ary Kira manaisotra ny fonon’ampinga.
  '7':
  - type: text
    content: Izay tsara indrindra amin’ny lohasahanao dia feno kalesy,
  - type: text
    content: Ary ny mpitaingin-tsoavaly milahatra eo am-bavahady.
  '8':
  - type: text
    content: Dia alana ny fisalobonan’i Joda,
  - type: text
    content: Ary mijery ny fiadiana ao an-Tranoala hianao amin’izany andro izany.
  '9':
  - type: text
    content: Ary hitanareo fa banga be ihany ny Tanànan’i Davida;
  - type: text
    content: Ary mamory ny rano avy amin’ny kamory ambany hianareo.
