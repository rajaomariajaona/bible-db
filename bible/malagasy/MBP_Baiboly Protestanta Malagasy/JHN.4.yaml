document_id: JHN.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nankanesan’i Jesosy tany Galilia indray, sy ny resaka nataony tamin’ilay vehivavy Samaritana.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 4.12; Mar. 1.14; Lio. 4.14?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: KOA amin’izany, rehefa fantatry ny Tompo fa ny Fariseo efa nahare fa Jesosy mahazo mpianatra maro sy nanao batisa be noho Jaona (
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jesosy namaly ka nanao taminy hoe: Raha fantatrao ny fanomezan’Andriamanitra sy Izay miteny aminao hoe: Omeo Aho hosotroiko, dia hianao no ho nangataka taminy, ka nomeny rano velona.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hoy ravehivavy taminy: Tompoko, tsy manana fanovozana Hianao, sady lalina ny fantsakana; koa avy aiza no ahazoanao izany rano velona izany? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hianao va lehibe noho Jakoba razantsika izay nanome anay ity fantsakana ity, sady izy sy ny zanany mbamin’ny bibiny no nisotro teto? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jesosy namaly ka nanao taminy hoe: Izay rehetra misotro ity rano ity dia mbola hangetaheta indray; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa na iza na iza no misotro ny rano izay homeko azy dia tsy hangetaheta mandrakizay; fa ny rano izay homeko azy dia ho loharano miboiboika ao anatiny ho fiainana mandrakizay. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hoy ravehivavy taminy: Tompoko, omeo izany rano izany aho, mba tsy hangetaheta na hanketo hantsaka intsony.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hoy Jesosy taminy: Andeha ary, antsoy ivadinao, ka mankanesa atỳ. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ravehivavy namaly ka nanao taminy hoe: Tsy manam-bady aho. Hoy Jesosy taminy: Marina ihany izay nolazainao hoe: Tsy manam-bady aho; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: fa efa nanam-bady indimy hianao, sady tsy vadinao ilay itoeranao ankehitriny; marina izany voalazanao izany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hoy ravehivavy taminy: Tompoko, hitako fa mpaminany Hianao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'kanefa tsy Jesosy no nanao batisa, fa ny mpianany), '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny razantsika nivavaka teto amin’ity tendrombohitra ity; fa hianareo kosa milaza fa any Jerosalema no tokony hivavahana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hoy Jesosy taminy: Ravehivavy, minoa Ahy, fa avy ny andro ka tsy amin’ity tendrombohitra ity, na any Jerosalema aza, no hivavahanareo amin’ny Ray. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hianareo mivavaka amin’izay tsy fantatrareo; izahay kosa mivavaka amin’izay fantatray, satria avy amin’ny Jiosy ny famonjena. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa avy ny andro,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ora.
      marker-yv: yv-n
    - type: text
      text: ' sady tonga ankehitriny, raha ny tena mpivavaka hivavaka amin’ny Ray amin’ny fanahy sy ny fahamarinana; fa ny Ray koa mitady ny mpivavaka aminy ho tahaka izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Andriamanitra dia Fanahy; ary izay mivavaka aminy tsy maintsy mivavaka amin’ny fanahy sy ny fahamarinana.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hoy ravehivavy taminy: Fantatro fa avy ny Mesia (Ilay atao hoe Kristy); ka rehefa tonga Izy, dia hambarany amintsika ny zavatra rehetra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hoy Jesosy taminy: Izaho Izay miresaka aminao no Izy.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary tamin’izay dia tonga ny mpianany ka gaga, satria vehivavy no niresahany; nefa tsy nisy nanao hoe: Inona no tadiavinao? na: Nahoana no miresaka aminy Hianao?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nandao ny sininy ravehivavy ary nankany an-tanàna ka nanao tamin’ny olona hoe: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Andeha hizaha izaroa Lehilahy izaroana, Izay nilaza tamiko ny nataoko rehetra; Izao angaha no Kristy? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: dia niala tany Jodia Izy ka nankany Galilia indray.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nivoaka avy tao an-tanàna ny olona ka nankeo amin’i Jesosy.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary raha tsy mbola tonga izy ireny, ny mpianany dia nangataka taminy ka nanao hoe: Hano, Raby ô. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa hoy Jesosy taminy: Izaho manan-kanin-kohanina izay tsy fantatrareo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia niresaka ny mpianatra ka nanao hoe: Nisy olona nitondra zavatra hohaniny va re? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Hoy Jesosy taminy: Ny haniko dia ny manao ny sitrapon’Izay naniraka Ahy sy ny mahavita ny asany. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Moa hianareo tsy manao hoe va: Efa-bolana no sisa, dia tonga ny fararano? Indro, lazaiko aminareo: Atopazy ny masonareo, ka jereo ny eny an-tsaha, fa efa masaka sahady hojinjana izy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary izay mijinja dia mandray karama ka mamory vokatra ho amin’ny fiainana mandrakizay, mba hiara-mifaly ny mpamafy sy ny mpijinja. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary amin’izany dia marina ilay teny hoe: Ny iray mamafy, ary ny iray kosa mijinja. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Izaho naniraka anareo hijinja izay tsy nisasaranareo; olon-kafa no nisasatra, fa hianareo kosa no niditra teo amin’izay nisasarany.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary maro ny Samaritana avy tao amin’izany tanàna izany no nino an’i Jesosy noho ny filazan-dravehivavy, izay nanambara hoe: Nolazainy tamiko avokoa izay rehetra nataoko. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary tsy maintsy mamaky an’i Samaria Izy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ary rehefa nanatona Azy ny Samaritana, dia nangataka Azy hitoetra tao aminy; ka dia nitoetra tao indroa andro Izy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary maro koa no nino noho ny teniny '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'ka nanao tamin-dravehivavy hoe: Tsy noho ny filazanao ihany no inoanay, fa ny tenanay no mandre, ka fantatray fa Izy tokoa no Mpamonjy izao tontolo izao.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ary rehefa afaka ny indroa andro, dia niala tao Jesosy ka nankany Galilia. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Fa ny tenan’i Jesosy no efa nanambara fa tsy misy mpaminany manan-daza eo amin’ny taniny. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Koa rehefa tonga tany Galilia Izy, dia nandray Azy ny Galiliana, satria efa hitany izay rehetra nataony tany Jerosalema tamin’ny andro firavoravoana; fa izy ireo koa mba niakatra tamin’ny andro firavoravoana.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niverenan’i Jesosy tany Kana, sy ny nahasitranany ny zanakalahin’ny tandapa anankiray.
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'ARY tonga tany Kana any Galilia indray Jesosy, dia tany amin’ilay nampodiany ny rano ho divay. Ary nisy tandapa anankiray izay nanana zanakalahy narary tany Kapernaomy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary rehefa reny fa Jesosy efa tonga tany Galilia avy tany Jodia, dia nankany aminy izy ka nangataka Azy mba hidina sy hahasitrana ny zanany, satria efa ho faty izy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Dia hoy Jesosy taminy: Raha tsy mahita famantarana sy fahagagana hianareo, dia tsy mba hety hino mihitsy. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Hoy ilay tandapa taminy: Tompoko, midìna re, dieny tsy mbola maty ny zanako. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia tonga tao an-tanàna anankiray any Samaria Izy, izay atao hoe Sykara, akaikin’ny tany izay nomen’i Jakoba ho an’i Josefa zanany. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Hoy Jesosy taminy: Andeha mody; velona ny zanakao. Ary ralehilahy nino ny teny izay nolazain’i Jesosy taminy, ka dia lasa nody. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ary nony nidina izy, dia nitsena azy ny mpanompony ka nilaza fa velona ny zanany. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Ary izy nanontany azy ny ora izay nanaretany. Dia hoy ireo taminy: Omaly tamin’ny ora fahafito no nialan’ny tazo taminy. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Koa fantatry ny rainy fa tamin’izay indrindra no ora nanaovan’i Jesosy taminy hoe: Velona ny zanakao. Dia nino izy mbamin’ny ankohonany rehetra. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Izany no famantarana faharoa nataon’i Jesosy, fony Izy tonga tany Galilia avy tany Jodia.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary teo ilay fantsakan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'loharano; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sahala amin’ny teny ao amin’ny and. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.'
      marker-yv: yv-n
    - type: text
      text: ' i Jakoba. Ary satria sasatra Jesosy tamin’ny nalehany, dia nipetraka teo am-pantsakana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'loharano; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sahala amin’ny teny ao amin’ny and. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.'
      marker-yv: yv-n
    - type: text
      text: ' Izy, rehefa tokony ho tamin’ny ora fahenina.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nisy vehivavy Samaritana anankiray avy hantsaka rano; dia hoy Jesosy taminy: Omeo Aho hosotroiko. ('
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ny mpianany efa lasa nankany an-tanàna hividy hanina). '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa hoy ravehivavy Samaritana taminy: Nahoana Hianao no Jiosy ka mangataka amiko hosotroina, nefa aho vehivavy Samaritana? (Fa ny Jiosy tsy manan-draharaha amin’ny Samaritana.) '
