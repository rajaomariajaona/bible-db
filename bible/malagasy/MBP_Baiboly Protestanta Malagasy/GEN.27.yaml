document_id: GEN.27,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fitaka nataon’i Jakoba hahazoany ny tso-dranon’ny rainy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa antitra Isaka, ary pahina ny masony ka tsy nahita, dia niantso an’i Esao lahimatoany izy ka nanao taminy hoe: Anaka; ary hoy izy taminy kosa: Inty aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary dia ho entinao any amin’ny rainao hohaniny, mba hitsofany rano anao, dieny tsy mbola maty izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jakoba tamin-dRebeka reniny: Indro, Esao rahalahiko dia lehilahy voloina, fa izaho lehilahy malambo hoditra kosa; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary angamba hitsapa ahy ikaky, dia ho toy ny mpanandoka eo imasony aho ka hahatonga ozona amiko, fa tsy tso-drano. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny reniny taminy: Aoka ho ahy ihany anaka, ny ozona ho anao; araho ihany ny teniko, ka mandehana, itondray aho.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandeha izy ka naka, ary nitondra tao amin’ny reniny; ary ny reniny kosa dia nanao hanim-py araka ilay tian’ny rainy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalain-dRebeka ny fitafian’i Esao lahimatoany, dia ny tsara izay efa notehiriziny tao an-trano, ka nampitafiny an’i Jakoba zanany faralahy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny hoditry ny zanak’osy dia nafonony ny tànany sy ny malambolambo amin’ny vozony; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia natolony teo an-tànan’i Jakoba zanany ny hanim-py sy ny mofo izay efa namboariny.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jakoba nankany amin’ny rainy ka nanao hoe: Ry ikaky ô! ary hoy kosa izy: Inty aho; iza moa hianao, anaka? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jakoba tamin-drainy: Izaho no Esao zanakao lahimatoa; efa nanao araka izay nasainao nataoko aho; masìna hianao, miarena, dia mipetraha, ka hano ny hazako, mba hitsofan’ny fanahinao rano ahy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy: Indro fa efa antitra aho, ka tsy fantatro izay andro hahafatesako; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Isaka tamin’ny zanany: Nanao ahoana, anaka, no dia nalaky nahazo toy izany hianao? Ary hoy izy: Satria Jehovah Andriamanitrao no nampahazo ahy.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Isaka tamin’i Jakoba: Mba manatòna kely hoe hitsapako anao, anaka, hahafantarako na Esao zanako tokoa hianao, na tsia. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jakoba nanatona an’Isaka rainy, ary izy dia nitsapa azy ka nanao hoe: Ny feo dia feon’i Jakoba, fa ny tànana dia tànan’i Esao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsy nahafantatra azy izy, satria voloina tahaka ny tànan’i Esao rahalahiny ny tànany; dia notsofiny rano izy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy: Hianao tokoa moa no Esao zanako? Dia hoy izy: Izaho no izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy kosa Isaka: Arosoy eto anoloako ary izato hazan’ny zanako hihinanako, mba hitsofan’ny fanahiko rano anao. Ary dia narosony teo anoloany, ka dia nihinana izy; ary nitondrany divay izy, dia nisotro.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Isaka rainy taminy: Mba manatòna kely ka manoroha ahy, anaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona izy ka nanoroka azy; ary Isaka nandre ny fofon’ny fitafiany, dia nitso-drano azy ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E! ny fofon’ny zanako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny fofon’ny saha izay notahin’i Jehovah.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanomezan’Andriamanitra anao anie ny andon’ny lanitra sy ny tsiron’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary vary sy ranom-boaloboka betsaka.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanompo anao anie ny firenena maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hiankohoka eo anatrehanao ny firenena samy hafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tompon’ny rahalahinao anie hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hiankohoka eo anatrehanao ny zanaky ny reninao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho voaozona anie izay rehetra manozona anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hohasoavina anie izay manisy soa anao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa ankehitriny, masìna hianao, alao ny fitifiranao dia ny tranon-jana-tsipìkanao sy ny tsipìkanao, ary mankanesa any an-tsaha, ka ihazao aho; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa vita ny nitsofan’Isaka rano an’i Jakoba, ary vao nidify Jakoba teo anatrehan’Isaka rainy, dia niditra kosa Esao rahalahiny avy nihaza. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy koa nanao hanim-py ka nitondra azy tao amin’ny rainy; ary hoy izy tamin’ny rainy: Aoka hiarina ny raiko ka hihinana amin’ny hazan’ny zanany, mba hitsofan’ny fanahinao rano ahy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Isaka rainy taminy: Iza indray moa hianao? Ary hoy izy: Izaho no Esao zanakao lahimatoa. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toran-kovitra indrindra Isaka ka nanao hoe: Iza ary ilay naka haza ka nitondra teto amiko, ary efa nihinanako izany rehetra izany, fony tsy mbola tonga hianao, ka efa notsofiko rano izy; eny, hotahina tokoa izy.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raho vao ren’i Esao ny tenin’ny rainy, dia nitaraina mafy dia mafy izy ka nanao taminy hoe: Mba tsofy rano re aho, dia izaho koa, ry ikaky ô. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy rainy: Tonga ny rahalahinao nanandoka ka nahalasa ny tso-dranonao. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Esao: Moa tsy mandia va ny anarany hoe Jakoba?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Izahao '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: xxv.26.
      marker-yv: yv-n
    - type: text
      text: ' fa efa namingana ahy indroa izy izao: ny fizokiako efa nalainy; ary, indro, ankehtriny lasany koa ny tso-dranoko. Ary hoy koza izy: Tsy mba nitahiry tso-drano ho ahy va hianao?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Isaka ka nanao tamin’i Esao hoe: Indro, efa nataoko ho tomponao izy, ary ny rahalahiny rehetra nomeko ho mpanompony; ary vary sy ranom-boaloboka no namelomako azy; koa inona indray no hataoko aminao, anaka?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Esao tamin’ny rainy: Tso-drano iray ihany va no anao, ry ikaky? mba tsofy rano re aho, dia izaho koa, ry ikaky ô. Ary Esao dia nanandratra ny feony ka nitomany.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Isaka rainy ka nanao taminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, tsy ho amin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho amin’.
      marker-yv: yv-n
    - type: text
      text: ' ny tsiron’ny tany ny fonenanao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy ho amin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho amin’.
      marker-yv: yv-n
    - type: text
      text: ny andon’ny lanitra avy any ambony;
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary anaovy hanim-py aho araka ilay tiako, ka ento atỳ amiko hohaniko, mba hitsofan’ny fanahiko rano anao, dieny tsy mbola maty aho.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny sabatrao no hivelomanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny rahalahinao no hotompoinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa, raha mby amin’izay andro hahafahanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hotapahinao ny ziogany ho afaka amin’ny vozonao.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nialan’i Jakoba tao amin’ny rainy handositra an’i Esao, ary ny nampakaran’i Esao ny zanakavavin’Isimaela ho vadiny.
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Esao nanao fo-lentika tamin’i Jakoba noho ny tso-drano izay nataon-drainy taminy; dia hoy Esao anakampo: Efa antomotra ny andro hisaonana an’ikaky, dia hamono an’i Jakoba rahalahiko aho.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy namanbara tamin-dRebeka izany tenin’i Esao zanany lahimatoa izany; dia naniraka nampaka an’i Jakoba zanany faralahy izy ka nanao taminy hoe: Indro, Esao rahalahinao mikasa hamaly ny nataonao ka hamono anao. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, anaka, araho ny teniko; miaingà ka mandosira ho any Harana, dia any amin’i Labana anadahiko. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mitoera any aminy andro vitsivitsy mandra-pahafaky ny fahatezeran’ny rahalahinao, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: eny, mandra-pahafaky ny fahatezeran’ny rahalahinao aminao, ka ho hadinony izay nataonao taminy; dia haniraka aho ka hampaka anao any; hataoko ahoana no famoy anareo mirahalahy indray andro?
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Rebeka tamin’Isaka: Tsy te-ho velona aho noho ireny zanakavavin’ny Hetita; raha maka vady amin’ny zanaka vavin’ny Hetita Jakoba, tahaka ireto izay avy amin’ny zazavavy tompon-tany, koa hataoko inona ny aiko?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Rebeka nandre an’Isaka niteny tamin’i Esao zanani-lahy. Ary dia lasa nankany an-tsaha Esao nitady haza ho entiny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Rebeka niteny tamin’i Jakoba zanani-lahy ka nanao hoe: Indro, efa reko ny rainao niteny tamin’i Esao rahalahinao nanao hoe: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ihazao aho, ka anaovy hanim-py hohaniko; dia hitso-drano anao aho eo anatrehan’i Jehovah, dieny tsy mbola maty aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, anaka, araho ny teniko amin’izay asaiko ataonao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mankanesa kely any amin’ny ondry aman-osy, ka analao zanak’osy roa tsara aho; dia hataoko hanim-py ho an’ny rainao araka ilay tiany izany; '
