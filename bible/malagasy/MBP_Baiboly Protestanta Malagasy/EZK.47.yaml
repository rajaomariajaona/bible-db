document_id: EZK.47,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny onin’ny ranon’aina.
  - type: text
    content: 'DIA nentiny niverina ho eo amin’ny varavaran’ny trano aho; ary, indro, nisy rano niboika avy eo atsinanana eo ambanin’ny tokonan’ny trano; fa manatrika ny atsinanana ny trano, ary ny rano nidina avy teo ambanin’ny lafiny ankavanan’ny trano teo atsimon’ny alitara. '
  '10':
  - type: text
    content: 'Ary hisy mpaka hazandrano hitsangana eny amorony hatrany Enjedy ka hatrany En-eglaima; ho famelarana harato izany; ary ny hazandranony ho maro karazana, tahaka ny hazandrano betsaka dia betsaka any amin’ny Ranomasina Lehibe. '
  '11':
  - type: text
    content: 'Fa ny honahona sy ny heniheny dia tsy hositranina, fa havela ho sira. '
  '12':
  - type: text
    content: Ary eny amoron’ny ony, eny an-daniny roa, no anirian’ny hazo rehetra fihinam-boa; tsy halazo ny raviny, na ho lany ny voany; fa hamoa voa vaovao isam-bolana izy, satria mivoaka avy ao amin’ny fitoerana masina ny ranony; ary ho fihinana ny voany, ary ho fanafody ny raviny.
  - type: heading
    content: Ny ho faritry ny Tany Masina, sy ny hizarana azy, ary ny ho toetry ny Tanànan’Andriamanitra.
  '13':
  - type: text
    content: 'IZAO no lazain’i Jehovah Tompo: Izao no faritry ny tany hozarainareo ho lova araka ny firenen’Isiraely roa ambin’ny folo; anjaran-'
  - type: text
    content: droa
  - type: text
    content: ' no ho an’i Josefa. '
  '14':
  - type: text
    content: Ary samy handova avokoa hianareo rehetra, satria efa nanangan-tànana hanome ity ho an’ny razanareo Aho, ka dia ho azonareo ho lova ity tany ity.
  '15':
  - type: text
    content: 'Ary izao no faritry ny tany: Ny lafiny avaratra dia hatramin’ny Ranomasina Lehibe amin’ny làlana mankany Hetlona ka hatrany akaikin’i Zedada, '
  '16':
  - type: text
    content: 'dia Hamata, Berota, Sibraima, izay eo anelanelan’ny faritanin’i Damaskosy sy ny fari-tanin’i Hamata, Hazara afovoany, izay eo an-tsisin’i Haorana. '
  '17':
  - type: text
    content: Ary ny fari-taniny dia hatramin’ny ranomasina, dia Hazar-enana, fari-tanin’i Damaskosy, ary amin’ny avaratra dia Hamata no fari-taniny. Izany no lafiny avaratra.
  '18':
  - type: text
    content: Ary ny lafiny atsinanana hatrany anelanelan’i Haorana sy Damaskosy sy Gileada ary ny tanin’ny Isiraely dia Jordana; hatramin’ny fari-tany ka hatreo amoron’ny ranomasina atsinanana no horefesinareo. Izany no lafiny atsinanana.
  '19':
  - type: text
    content: Ary ny lafiny atsimo dia hatrany Tamara ka hatramin’ny ranon’i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin’ny Ranomasina Lehibe. Izany no lafiny atsimo.
  '2':
  - type: text
    content: Dia nentiny nivoaka tamin’ny làlana mankamin’ny vavahady avaratra aho ka nampandehaniny manodidina tamin’ny làlana ivelany hankany amin’ny vavahady ivelany, dia teo amin’ny làlana manatrika ny atsinanana, ary, indro, nisy rano nipoitra avy teo amin’ny ilany ankavanana.
  '20':
  - type: text
    content: Ny lafiny andrefana koa dia ny Ranomasina Lehibe hatramin’ny faritany ka hatrany akaikin’i Hamata. Izany no lafiny andrefana.
  '21':
  - type: text
    content: 'Hozarainareo ho anareo izany tany izany araka ny firenen’Isiraely. '
  '22':
  - type: text
    content: 'Ary amin’ny filokana no hizaranareo azy ho lovanareo sy ny vahiny monina ao aminareo, izay miteraka ao aminareo; ka izy dia hataonareo ho tahaka ny tena Zanak’Isiraely; hiara-manao filokana aminareo hiara-mandova amin’ny firenen’Isiraely izy. '
  '23':
  - type: text
    content: Ary amin’izay firenena hitoeran’ny vahiny dia ao no hanomezanareo azy ny lovany, hoy Jehovah Tompo.
  '3':
  - type: text
    content: 'Ary nony nandeha niantsinanana ralehilahy, nisy famolaina teny an-tànany, ka nandrefy arivo hakiho izy, dia nampitainy ny rano aho, ka hakitrokely ny rano. '
  '4':
  - type: text
    content: 'Ary nandrefy arivo hakiho indray izy, dia nampitainy ny rano aho, ka halohalika ny rano. Ary nandrefy arivo hakiho indray izy, dia nampitainy aho, ka havalahana ny rano. '
  '5':
  - type: text
    content: Ary nandrefy arivo hakiho indray koa izy, ary efa ony tsy azo itana, fa efa nihalalina ny rano, dia rano holanosina, eny, ony tsy azo itana.
  '6':
  - type: text
    content: 'Dia hoy izy tamiko: Ry zanak’olona, efa hitanao va izany? Dia nitondra ahy niverina ho eny amoron’ny ony izy. '
  '7':
  - type: text
    content: 'Ary nony niverina aho, indro, nisy hazo betsaka teny amoron’ny ony, dia teny an-daniny roa. '
  '8':
  - type: text
    content: 'Dia hoy izy tamiko: Ity rano ity dia mivoaka hankany amin’ny tany atsinanana, dia midina any amin’ny tani-hay'
  - type: note
    content: Heb. Arabà.
  - type: text
    content: ' ka miditra eo amin’ny ranomasina; ary rehefa tonga eo an-dranomasina izy, dia sitrana ny rano. '
  '9':
  - type: text
    content: Ary ny zava-manan-aina rehetra sesehena na aiza na aiza alehan’ny ony tondraka
  - type: note
    content: Heb. ony roa.
  - type: text
    content: ' dia ho velona, ka hisy hazandrano sesehena; fa nony tonga ao ity rano ity, dia ho sitrana izy, ary ho velona izay rehetra hidiran’ny ony. '
