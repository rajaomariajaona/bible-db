document_id: EZK.47,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny onin’ny ranon’aina.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'DIA nentiny niverina ho eo amin’ny varavaran’ny trano aho; ary, indro, nisy rano niboika avy eo atsinanana eo ambanin’ny tokonan’ny trano; fa manatrika ny atsinanana ny trano, ary ny rano nidina avy teo ambanin’ny lafiny ankavanan’ny trano teo atsimon’ny alitara. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hisy mpaka hazandrano hitsangana eny amorony hatrany Enjedy ka hatrany En-eglaima; ho famelarana harato izany; ary ny hazandranony ho maro karazana, tahaka ny hazandrano betsaka dia betsaka any amin’ny Ranomasina Lehibe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny honahona sy ny heniheny dia tsy hositranina, fa havela ho sira. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary eny amoron’ny ony, eny an-daniny roa, no anirian’ny hazo rehetra fihinam-boa; tsy halazo ny raviny, na ho lany ny voany; fa hamoa voa vaovao isam-bolana izy, satria mivoaka avy ao amin’ny fitoerana masina ny ranony; ary ho fihinana ny voany, ary ho fanafody ny raviny.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny ho faritry ny Tany Masina, sy ny hizarana azy, ary ny ho toetry ny Tanànan’Andriamanitra.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'IZAO no lazain’i Jehovah Tompo: Izao no faritry ny tany hozarainareo ho lova araka ny firenen’Isiraely roa ambin’ny folo; anjaran-'
    - type: usfm
      marker: it
      children:
      - type: text
        text: droa
    - type: text
      text: ' no ho an’i Josefa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary samy handova avokoa hianareo rehetra, satria efa nanangan-tànana hanome ity ho an’ny razanareo Aho, ka dia ho azonareo ho lova ity tany ity.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no faritry ny tany: Ny lafiny avaratra dia hatramin’ny Ranomasina Lehibe amin’ny làlana mankany Hetlona ka hatrany akaikin’i Zedada, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia Hamata, Berota, Sibraima, izay eo anelanelan’ny faritanin’i Damaskosy sy ny fari-tanin’i Hamata, Hazara afovoany, izay eo an-tsisin’i Haorana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny fari-taniny dia hatramin’ny ranomasina, dia Hazar-enana, fari-tanin’i Damaskosy, ary amin’ny avaratra dia Hamata no fari-taniny. Izany no lafiny avaratra.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny lafiny atsinanana hatrany anelanelan’i Haorana sy Damaskosy sy Gileada ary ny tanin’ny Isiraely dia Jordana; hatramin’ny fari-tany ka hatreo amoron’ny ranomasina atsinanana no horefesinareo. Izany no lafiny atsinanana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny lafiny atsimo dia hatrany Tamara ka hatramin’ny ranon’i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin’ny Ranomasina Lehibe. Izany no lafiny atsimo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentiny nivoaka tamin’ny làlana mankamin’ny vavahady avaratra aho ka nampandehaniny manodidina tamin’ny làlana ivelany hankany amin’ny vavahady ivelany, dia teo amin’ny làlana manatrika ny atsinanana, ary, indro, nisy rano nipoitra avy teo amin’ny ilany ankavanana.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lafiny andrefana koa dia ny Ranomasina Lehibe hatramin’ny faritany ka hatrany akaikin’i Hamata. Izany no lafiny andrefana.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hozarainareo ho anareo izany tany izany araka ny firenen’Isiraely. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin’ny filokana no hizaranareo azy ho lovanareo sy ny vahiny monina ao aminareo, izay miteraka ao aminareo; ka izy dia hataonareo ho tahaka ny tena Zanak’Isiraely; hiara-manao filokana aminareo hiara-mandova amin’ny firenen’Isiraely izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary amin’izay firenena hitoeran’ny vahiny dia ao no hanomezanareo azy ny lovany, hoy Jehovah Tompo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nandeha niantsinanana ralehilahy, nisy famolaina teny an-tànany, ka nandrefy arivo hakiho izy, dia nampitainy ny rano aho, ka hakitrokely ny rano. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandrefy arivo hakiho indray izy, dia nampitainy ny rano aho, ka halohalika ny rano. Ary nandrefy arivo hakiho indray izy, dia nampitainy aho, ka havalahana ny rano. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandrefy arivo hakiho indray koa izy, ary efa ony tsy azo itana, fa efa nihalalina ny rano, dia rano holanosina, eny, ony tsy azo itana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamiko: Ry zanak’olona, efa hitanao va izany? Dia nitondra ahy niverina ho eny amoron’ny ony izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niverina aho, indro, nisy hazo betsaka teny amoron’ny ony, dia teny an-daniny roa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamiko: Ity rano ity dia mivoaka hankany amin’ny tany atsinanana, dia midina any amin’ny tani-hay'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Arabà.
      marker-yv: yv-n
    - type: text
      text: ' ka miditra eo amin’ny ranomasina; ary rehefa tonga eo an-dranomasina izy, dia sitrana ny rano. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zava-manan-aina rehetra sesehena na aiza na aiza alehan’ny ony tondraka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ony roa.
      marker-yv: yv-n
    - type: text
      text: ' dia ho velona, ka hisy hazandrano sesehena; fa nony tonga ao ity rano ity, dia ho sitrana izy, ary ho velona izay rehetra hidiran’ny ony. '
