document_id: PSA.51
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fifonan’ny manan-keloka mba hahafahan’ny helony sy hodian’ny fifaliany amin’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Salamo nataon’i Davida, fony Natana mpaminany nankao aminy, rehefa naka an’i Batseba izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: MAMINDRÀ fo amiko, Andriamanitra ô, araka ny fahasoavanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny haben’ny fiantranao vonoy ny fahadisoako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sasao madio aho mba ho afa-keloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary diovy aho mba ho afa-pahotana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa tsaroako ny fahadisoako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo anatrehako mandrakariva ny fahotako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Taminao dia taminao ihany no nanotako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay ratsy eo imasoano no efa nataoko,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho marina Hianao, raha miteny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hanan-tsiny Hianao, raha mitsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, tamin’ny heloka no niterahana ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tamin’ny fahotana no torontoronina ahy ny reniko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indro, fahamarinana ao am-po no sitrakao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahendrena ao amin’ny miafina no ampahafantarinao ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Diovy hysopa aho ho afa-pahotana, dia hadio;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sasao aho, dia ho fotsy mangatsakatsaka.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: toy ny orampanala.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ampandreneso fifaliana sy faharavoravoana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hifalian’ny taolana izay voavakivakinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Afeno ny tavanao ny fahotako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary vonoy ny heloko rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Amoròny fo madio aho, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary havaozy hiorina marina ny fanahiko ato anatiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza manary ahy hiala eo anatrehanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza manaisotra ny Fanahinao Masina amiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ampodio amiko ny fifaliana amin’ny famonjenao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tohàny fanahy mazoto aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia hampianatra ny olon-diso ny làlanao aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanota hampiverenina aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vonjeo ho afaka amin’ny valin-dra aho, Andriamanitra ô, Andriamanitry ny famonjena ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hihoby ny fahamarinanao ny vavako.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny lelako.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tompo ô, sokafy ny molotro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanambara ny fiderana Anao ny vavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa tsy fanatitra no sitrakao; raha izany, dia nomeko ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanatitra dorana tsy mahafaly Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fanatitra ho an’Andriamanitra dia fanahy torotoro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fo torotoro sy mangorakoraka, Andriamanitra ô, tsy mba ataonao tsinontsinona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Manaova soa amin’i Ziona araka ny fahasoavanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovy ny màndan’i Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia ho sitrakao ny fanati-pahamarinana sy ny fanatitra dorana ary ny fanatitra levonina amin’ny afo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hanatitra vantotr’ombilahy eo amin’ny alitaranao ny olona.
