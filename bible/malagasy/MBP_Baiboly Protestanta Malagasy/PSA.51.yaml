document_id: PSA.51,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifonan’ny manan-keloka mba hahafahan’ny helony sy hodian’ny fifaliany amin’Andriamanitra.
  - type: text
    content: Ho an’ny mpiventy hira. Salamo nataon’i Davida, fony Natana mpaminany nankao aminy, rehefa naka an’i Batseba izy.
  - type: text
    content: MAMINDRÀ fo amiko, Andriamanitra ô, araka ny fahasoavanao;
  - type: text
    content: Araka ny haben’ny fiantranao vonoy ny fahadisoako.
  '10':
  - type: text
    content: Amoròny fo madio aho, Andriamanitra ô;
  - type: text
    content: Ary havaozy hiorina marina ny fanahiko ato anatiko.
  '11':
  - type: text
    content: Aza manary ahy hiala eo anatrehanao;
  - type: text
    content: Ary aza manaisotra ny Fanahinao Masina amiko.
  '12':
  - type: text
    content: Ampodio amiko ny fifaliana amin’ny famonjenao;
  - type: text
    content: Ary tohàny fanahy mazoto aho.
  '13':
  - type: text
    content: Dia hampianatra ny olon-diso ny làlanao aho;
  - type: text
    content: Ary ny mpanota hampiverenina aminao.
  '14':
  - type: text
    content: Vonjeo ho afaka amin’ny valin-dra aho, Andriamanitra ô, Andriamanitry ny famonjena ahy;
  - type: text
    content: Hihoby ny fahamarinanao ny vavako.
  - type: note
    content: Heb. ny lelako.
  '15':
  - type: text
    content: Tompo ô, sokafy ny molotro,
  - type: text
    content: Dia hanambara ny fiderana Anao ny vavako.
  '16':
  - type: text
    content: Fa tsy fanatitra no sitrakao; raha izany, dia nomeko ihany;
  - type: text
    content: Ny fanatitra dorana tsy mahafaly Anao.
  '17':
  - type: text
    content: Ny fanatitra ho an’Andriamanitra dia fanahy torotoro;
  - type: text
    content: Ny fo torotoro sy mangorakoraka, Andriamanitra ô, tsy mba ataonao tsinontsinona.
  '18':
  - type: text
    content: Manaova soa amin’i Ziona araka ny fahasoavanao;
  - type: text
    content: Ataovy ny màndan’i Jerosalema.
  '19':
  - type: text
    content: Dia ho sitrakao ny fanati-pahamarinana sy ny fanatitra dorana ary ny fanatitra levonina amin’ny afo;
  - type: text
    content: Dia hanatitra vantotr’ombilahy eo amin’ny alitaranao ny olona.
  '2':
  - type: text
    content: Sasao madio aho mba ho afa-keloka,
  - type: text
    content: Ary diovy aho mba ho afa-pahotana.
  '3':
  - type: text
    content: Fa tsaroako ny fahadisoako,
  - type: text
    content: Ary eo anatrehako mandrakariva ny fahotako.
  '4':
  - type: text
    content: Taminao dia taminao ihany no nanotako,
  - type: text
    content: Ary izay ratsy eo imasoano no efa nataoko,–
  - type: text
    content: Mba ho marina Hianao, raha miteny,
  - type: text
    content: Ary tsy hanan-tsiny Hianao, raha mitsara.
  '5':
  - type: text
    content: Indro, tamin’ny heloka no niterahana ahy,
  - type: text
    content: Ary tamin’ny fahotana no torontoronina ahy ny reniko.
  '6':
  - type: text
    content: Indro, fahamarinana ao am-po no sitrakao;
  - type: text
    content: Ary fahendrena ao amin’ny miafina no ampahafantarinao ahy.
  '7':
  - type: text
    content: Diovy hysopa aho ho afa-pahotana, dia hadio;
  - type: text
    content: Sasao aho, dia ho fotsy mangatsakatsaka.
  - type: note
    content: Heb. toy ny orampanala.
  '8':
  - type: text
    content: Ampandreneso fifaliana sy faharavoravoana aho,
  - type: text
    content: Hifalian’ny taolana izay voavakivakinao.
  '9':
  - type: text
    content: Afeno ny tavanao ny fahotako,
  - type: text
    content: Ary vonoy ny heloko rehetra.
