document_id: ISA.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny loza hanjo an’i Babylona.
  - type: text
    content: FAMINANIANA ny amin’ny loza hanjo ny Efitra Ranobe.
  - type: note
    content: Heb. Ranomasina.
  - type: text
    content: Tahaka ny firimorimon’ny tadio any atsimo
  - type: text
    content: No fihaviny avy any an-efitra, dia avy any amin’ny tany mahatahotra.
  '10':
  - type: text
    content: Ry ahy voavely toy ny vary teo am-pamoloako ô!
  - type: note
    content: Heb. zanaky ny famoloako.
  - type: text
    content: Izay efa reko tamin’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely,
  - type: text
    content: No nambarako taminareo.
  - type: heading
    content: Faminaniana ny amin’ny loza hanjo an’i Edoma.
  '11':
  - type: text
    content: FAMINANIANA ny amin’ny loza hanjo an’i Edoma.
  - type: note
    content: Heb. Doma.
  - type: text
    content: 'Misy miantso ahy any Seïra manao hoe:'
  - type: text
    content: Ry mpiambina ô, toy inona alina moa izao?
  - type: text
    content: Ry mpiambina ô toy inona alina moa izao?
  '12':
  - type: text
    content: 'Dia hoy ny mpiambina:'
  - type: text
    content: Avy ny maraina, avy koa ny alina;
  - type: text
    content: Raha mbola ta-hanontany hianareo, dia manontania ihany; ka avia, miverena.
  - type: note
    content: 'Na: avia indray.'
  - type: heading
    content: Faminaniana ny amin’ny loza hanjo an’i Arabia.
  '13':
  - type: text
    content: FAMINANIANA ny amin’ny loza hanjo an’i Arabia.
  - type: text
    content: Any an-ala any Arabia no andrianareo,
  - type: text
    content: Ry andian’ny Dedanita.
  '14':
  - type: text
    content: Itondrana rano ny mangetaheta;
  - type: text
    content: Ny mponina amin’ny tany Tema mitsena hanina ny mandositra;
  '15':
  - type: text
    content: Fa mandositra ny sabatra ireo,
  - type: text
    content: Dia ny sabatra voatsoaka
  - type: text
    content: Sy ny tsipìka voahenjana
  - type: text
    content: Ary ny havesatry ny ady.
  '16':
  - type: text
    content: 'Fa izao no nolazain’i Jehovah tamiko:'
  - type: text
    content: Ato anatin’ny herintaona, tahaka ny taonan’ny mpikarama,
  - type: text
    content: Dia ho levona avokoa ny voninahitr’i Kedara;
  '17':
  - type: text
    content: Ary ny tsipìka sisa izay an’ny lehilahy mahery, taranak’i Kedara, dia ho vitsy foana,
  - type: text
    content: Fa Jehovah, Andriamanitry ny Isiraely, no efa niteny.
  '2':
  - type: text
    content: 'Misy fahitana mampahory naseho tamiko:'
  - type: text
    content: Ny mpamitaka mamitaka, ary ny mpandringana mandringana.
  - type: text
    content: Iakaro, ry Elama ô! eteo, ry Media ô!
  - type: text
    content: Hatsahatro ny fisentoana rehetra.
  '3':
  - type: text
    content: Ary raha nahita izany aho, dia feno fanaintainana ny valahako;
  - type: text
    content: Fijalijaliana no nahazo ahy tahaka ny fijalijalian’ny vehivavy raha miteraka;
  - type: text
    content: Niolanolana fatratra aho ka tsy nandre izany;
  - type: text
    content: Toran-kovitra aho ka tsy nahita izany.
  '4':
  - type: text
    content: Niemponempona ny foko,
  - type: text
    content: Nampahatahotra ahy ny horohoro;
  - type: text
    content: Ny hariva fahafinaretako nampodiny ho fangovitako.
  '5':
  - type: text
    content: Velarina ny latabatra, miambina ny mpiambina,
  - type: note
    content: 'Na: velarina ny tsihy.'
  - type: text
    content: ' mihinana sy misotro ny olona–'
  - type: text
    content: Mitsangàna, hianareo lehibe, ka hosory ny ampinga!
  '6':
  - type: text
    content: 'Fa izao no nolazain’i Jehovah tamiko:'
  - type: text
    content: Mandehana, manendre tily;
  - type: text
    content: Ka izay hitany no aoka holazainy.
  '7':
  - type: text
    content: Dia nahita izy ka indreo mpitaingina manao andiany mandeha tsiroaroa
  - type: text
    content: Sy boriky andiany ary rameva andiany,–
  - type: text
    content: Ary nihaino izy, eny, nihaino dia nihaino;
  '8':
  - type: text
    content: 'Dia niantso nanao feon-diona izy ka nanao hoe:'
  - type: text
    content: Tompo ô! izaho mijanona mandrakariva eto ambonin’ny fitazanako nony antoandro,
  - type: text
    content: Ary mitoetra eto amin’ny fiambenako aho mandritra ny alina;
  '9':
  - type: text
    content: Koa, indreo, avy ny olona andiany,
  - type: text
    content: Mpitaingina mandeha tsiroaroa;
  - type: text
    content: 'Ary nanandratra ny feony izy ka nanao hoe:'
  - type: text
    content: Rava, rava Babylona!
  - type: text
    content: Ary ny sarin’
  - type: note
    content: Heb. sarin-javatra voasokitra.
  - type: text
    content: ' ny andriamaniny rehetra dia voatorotoro miraraka amin’ny tany.'
