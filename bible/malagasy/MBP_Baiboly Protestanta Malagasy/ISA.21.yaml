document_id: ISA.21,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’ny loza hanjo an’i Babylona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FAMINANIANA ny amin’ny loza hanjo ny Efitra Ranobe.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ranomasina.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny firimorimon’ny tadio any atsimo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No fihaviny avy any an-efitra, dia avy any amin’ny tany mahatahotra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry ahy voavely toy ny vary teo am-pamoloako ô!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zanaky ny famoloako.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay efa reko tamin’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No nambarako taminareo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’ny loza hanjo an’i Edoma.
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FAMINANIANA ny amin’ny loza hanjo an’i Edoma.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Doma.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Misy miantso ahy any Seïra manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mpiambina ô, toy inona alina moa izao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mpiambina ô toy inona alina moa izao?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hoy ny mpiambina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy ny maraina, avy koa ny alina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mbola ta-hanontany hianareo, dia manontania ihany; ka avia, miverena.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avia indray.
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’ny loza hanjo an’i Arabia.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: FAMINANIANA ny amin’ny loza hanjo an’i Arabia.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any an-ala any Arabia no andrianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry andian’ny Dedanita.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Itondrana rano ny mangetaheta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mponina amin’ny tany Tema mitsena hanina ny mandositra;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mandositra ny sabatra ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny sabatra voatsoaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny tsipìka voahenjana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny havesatry ny ady.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no nolazain’i Jehovah tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ato anatin’ny herintaona, tahaka ny taonan’ny mpikarama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho levona avokoa ny voninahitr’i Kedara;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tsipìka sisa izay an’ny lehilahy mahery, taranak’i Kedara, dia ho vitsy foana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah, Andriamanitry ny Isiraely, no efa niteny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Misy fahitana mampahory naseho tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpamitaka mamitaka, ary ny mpandringana mandringana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iakaro, ry Elama ô! eteo, ry Media ô!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsahatro ny fisentoana rehetra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha nahita izany aho, dia feno fanaintainana ny valahako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fijalijaliana no nahazo ahy tahaka ny fijalijalian’ny vehivavy raha miteraka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niolanolana fatratra aho ka tsy nandre izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toran-kovitra aho ka tsy nahita izany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niemponempona ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampahatahotra ahy ny horohoro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hariva fahafinaretako nampodiny ho fangovitako.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Velarina ny latabatra, miambina ny mpiambina,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: velarina ny tsihy.
      marker-yv: yv-n
    - type: text
      text: ' mihinana sy misotro ny olona–'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitsangàna, hianareo lehibe, ka hosory ny ampinga!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa izao no nolazain’i Jehovah tamiko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandehana, manendre tily;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izay hitany no aoka holazainy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nahita izy ka indreo mpitaingina manao andiany mandeha tsiroaroa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy boriky andiany ary rameva andiany,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nihaino izy, eny, nihaino dia nihaino;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia niantso nanao feon-diona izy ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompo ô! izaho mijanona mandrakariva eto ambonin’ny fitazanako nony antoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitoetra eto amin’ny fiambenako aho mandritra ny alina;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa, indreo, avy ny olona andiany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpitaingina mandeha tsiroaroa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary nanandratra ny feony izy ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rava, rava Babylona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sarin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sarin-javatra voasokitra.
      marker-yv: yv-n
    - type: text
      text: ' ny andriamaniny rehetra dia voatorotoro miraraka amin’ny tany.'
