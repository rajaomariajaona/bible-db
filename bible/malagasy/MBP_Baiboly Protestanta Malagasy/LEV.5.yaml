document_id: LEV.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary raha misy manota, satria mandre ny feon’ny fampianianana, sady vavolombelona nahita na nahalala, nefa tsy manambara izy, ka mahameloka azy izany,– '
  '10':
  - type: text
    content: Ary ny iray kosa dia hataony fanatitra dorana, araka ny fanao; ary ny mpisorona hanao fanavotana ho azy noho ny fahotany izay nataony, dia havela ny helony.
  '11':
  - type: text
    content: 'Fa raha tsy tratry ny ananany koa ny domohina roa na ny zana-boromailala roa, dia hitondra ny fanatiny noho ny fahotany izy, dia koba tsara toto ampahafolon’ny efaha ho fanatitra noho ny ota; tsy hasiany diloilo izany, ary tsy hasiany ditin-kazo mani-pofona, fa fanatitra noho ny ota izany. '
  '12':
  - type: text
    content: Dia hitondra azy ho eo amin’ny mpisorona izy, ary handraofan’ny mpisorona eran-tànan-ila ho fanati-pahatsiarovana avy aminy ka hodorany ho fofona eo ambonin’ny alitara miaraka
  - type: note
    content: 'Na: araka ny fanao.'
  - type: text
    content: ' amin’ny fanatitra atao amin’ny afo ho an’i Jehovah; dia fanatitra noho ny ota izany. '
  '13':
  - type: text
    content: 'Ary ny mpisorona hanao fanavotana ho azy noho ny fahotany izay nataony tamin’ny anankiray amin’ireo, dia havela ny helony; ary ho an’ny mpisorona '
  - type: text
    content: ny sisa
  - type: text
    content: ', toy ny fanatitra hohanina.'
  - type: heading
    content: Ny fanati-panonerana.
  '14':
  - type: text
    content: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '15':
  - type: text
    content: 'Raha misy olona manao izay mahadiso ka manota tsy nahy ny amin’ny zava-masin’i Jehovah, dia hitondra ny fanati-panonerany ho an’i Jehovah izy, dia ondrilahy tsy misy kilema, koa sekely volafotsy no anombananao azy, araka ny sekely masina, ho fanati-panonerana. '
  '16':
  - type: text
    content: Ary izay efa nanotany ny amin’ny zava-masina dia honerany, ary hampiany ho tonga avy fahenina ka hatolony amin’ny mpisorona; ary ny mpisorona hanao fanavotana ho azy amin’ny ondrilahy atao fanati-panonerana, dia havela ny helony.
  '17':
  - type: text
    content: 'Ary raha misy olona manota, satria manao izay tsy tokony hatao ka mandika ny anankiray amin’ny didin’i Jehovah, nefa tsy fantany izany, ka mahameloka azy, ary mitondra ny helony izy, '
  '18':
  - type: text
    content: 'dia hitondra ondrilahy tsy misy kilema izy, araka ny anombananao azy, ho fanati-panonerana ho any amin’ny mpisorona; ary ny mpisorona hanao fanavotana ho azy noho ny ota tsy nahy izay nahadiso azy, nefa tsy fantany, dia havela ny helony; '
  '19':
  - type: text
    content: dia fanati-panonerana izany, fa efa meloka tamin’i Jehovah tokoa izy.
  '2':
  - type: text
    content: 'na misy mikasika izay zavatra tsy madio, na ny fatin’ny bibi-dia tsy madio, na ny fatin’ny biby fiompy izay tsy madio, na ny fatin’ny biby mandady na mikisaka izay tsy madio, nefa tsy hitany izany, ka mahaloto sy mahameloka azy izany,– '
  '20':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '21':
  - type: text
    content: 'Raha misy olona manota, satria manao izay mahadiso amin’i Jehovah, fa mandainga amin’ny namany ny amin’izay nampitehirizina azy, na amin’ny zavatra notanany ho tsatòka, na amin’izay nalainy an-keriny, na efa nampahory ny namany, '
  '22':
  - type: text
    content: 'na nahita izay zavatra very ka mandainga amin’izany sady mianian-tsy to ny amin’izay mety ho fahotan’ny olona, '
  '23':
  - type: text
    content: 'satria nanota izy ka meloka, dia hanonitra izay nalainy an-keriny, na izay tamin’ny fampahoriana, na izay nampitehirizina azy, na izay zavatra very hitany, '
  '24':
  - type: text
    content: 'na izay rehetra nianianany tsy to; dia hanonitra toraka izany izy sady hanampy azy koa ho tonga avy fahenina, ka homeny ilay tompon-javatra amin’ny andro anaterany ny fanati-panonerany izany. '
  '25':
  - type: text
    content: 'Ary ny fanati-panonerana ho entiny ho an’i Jehovah dia ondrilahy tsy misy kilema, araka ny anombananao azy, ho fanati-panonerana ho any amin’ny mpisorona. '
  '26':
  - type: text
    content: Ary ny mpisorona hanao fanavotana ho azy eo anatrehan’i Jehovah, dia havela ny helony na inona na inona no fahadisoana nataony.
  '3':
  - type: text
    content: 'na misy mikasika ny fahalotoan’olona, dia izay fahalotoany rehetra na inona na inona, nefa tsy hitany izany, rehefa fantany izany, ka mahameloka azy,– '
  '4':
  - type: text
    content: 'na misy mianiana ka miteniteny foana amin’ny molotra hanao ratsy na hanao soa, na inona na inona tenitenenin’ny olona foana ka asiany fianianana, nefa tsy hitany izany, rehefa fantany, ka meloka amin’ny anankiray amin’ireo izy: '
  '5':
  - type: text
    content: 'koa raha meloka amin’ny anankiray amin’ireo izy, dia hiaiky izay zavatra nanotany, '
  '6':
  - type: text
    content: ary hitondra ny saziny
  - type: note
    content: 'Na: fanati-panonerany.'
  - type: text
    content: ' ho an’i Jehovah noho ny fahotany izay nataony izy, dia ondrivavy na osivavy, nefa izay vantony, ho fanatitra noho ny ota; ary ny mpisorona hanao fanavotana ho azy noho ny fahotany.'
  '7':
  - type: text
    content: Ary raha tsy tratry ny ananany izany, dia hitondra domohina roa na zana-boromailala roa ho an’i Jehovah izy ho saziny
  - type: note
    content: 'Na: fanati-panonerany.'
  - type: text
    content: ' noho ny nanotany; ka ny anankiray hatao fanatitra noho ny ota, ary ny anankiray kosa hatao fanatitra dorana. '
  '8':
  - type: text
    content: 'Dia hitondra ireo ho eo amin’ny mpisorona izy, ary ny mpisorona kosa hanatitra ny iray aloha ho fanatitra noho ny ota, ka hotapahiny amin’ny hoho ny lohany ho afaka amin’ny vozony, fa tsy hohenteriny izy. '
  '9':
  - type: text
    content: 'Ary hamafazany eo amin’ny rindrin’ny alitara ny ran’ny fanatitra noho ny ota; ary ny ra sisa hofiazany eo ambodin’ny alitara; dia fanatitra noho ny ota izany. '
