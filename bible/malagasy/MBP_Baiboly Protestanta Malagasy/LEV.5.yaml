document_id: LEV.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary raha misy manota, satria mandre ny feon’ny fampianianana, sady vavolombelona nahita na nahalala, nefa tsy manambara izy, ka mahameloka azy izany,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'na misy mikasika izay zavatra tsy madio, na ny fatin’ny bibi-dia tsy madio, na ny fatin’ny biby fiompy izay tsy madio, na ny fatin’ny biby mandady na mikisaka izay tsy madio, nefa tsy hitany izany, ka mahaloto sy mahameloka azy izany,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'na misy mikasika ny fahalotoan’olona, dia izay fahalotoany rehetra na inona na inona, nefa tsy hitany izany, rehefa fantany izany, ka mahameloka azy,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'na misy mianiana ka miteniteny foana amin’ny molotra hanao ratsy na hanao soa, na inona na inona tenitenenin’ny olona foana ka asiany fianianana, nefa tsy hitany izany, rehefa fantany, ka meloka amin’ny anankiray amin’ireo izy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'koa raha meloka amin’ny anankiray amin’ireo izy, dia hiaiky izay zavatra nanotany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary hitondra ny saziny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanati-panonerany.
    marker-yv: yv-n
  - type: text
    text: ' ho an’i Jehovah noho ny fahotany izay nataony izy, dia ondrivavy na osivavy, nefa izay vantony, ho fanatitra noho ny ota; ary ny mpisorona hanao fanavotana ho azy noho ny fahotany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary raha tsy tratry ny ananany izany, dia hitondra domohina roa na zana-boromailala roa ho an’i Jehovah izy ho saziny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanati-panonerany.
    marker-yv: yv-n
  - type: text
    text: ' noho ny nanotany; ka ny anankiray hatao fanatitra noho ny ota, ary ny anankiray kosa hatao fanatitra dorana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hitondra ireo ho eo amin’ny mpisorona izy, ary ny mpisorona kosa hanatitra ny iray aloha ho fanatitra noho ny ota, ka hotapahiny amin’ny hoho ny lohany ho afaka amin’ny vozony, fa tsy hohenteriny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hamafazany eo amin’ny rindrin’ny alitara ny ran’ny fanatitra noho ny ota; ary ny ra sisa hofiazany eo ambodin’ny alitara; dia fanatitra noho ny ota izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny iray kosa dia hataony fanatitra dorana, araka ny fanao; ary ny mpisorona hanao fanavotana ho azy noho ny fahotany izay nataony, dia havela ny helony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha tsy tratry ny ananany koa ny domohina roa na ny zana-boromailala roa, dia hitondra ny fanatiny noho ny fahotany izy, dia koba tsara toto ampahafolon’ny efaha ho fanatitra noho ny ota; tsy hasiany diloilo izany, ary tsy hasiany ditin-kazo mani-pofona, fa fanatitra noho ny ota izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia hitondra azy ho eo amin’ny mpisorona izy, ary handraofan’ny mpisorona eran-tànan-ila ho fanati-pahatsiarovana avy aminy ka hodorany ho fofona eo ambonin’ny alitara miaraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: araka ny fanao.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fanatitra atao amin’ny afo ho an’i Jehovah; dia fanatitra noho ny ota izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny mpisorona hanao fanavotana ho azy noho ny fahotany izay nataony tamin’ny anankiray amin’ireo, dia havela ny helony; ary ho an’ny mpisorona '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny sisa
  - type: text
    text: ', toy ny fanatitra hohanina.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fanati-panonerana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha misy olona manao izay mahadiso ka manota tsy nahy ny amin’ny zava-masin’i Jehovah, dia hitondra ny fanati-panonerany ho an’i Jehovah izy, dia ondrilahy tsy misy kilema, koa sekely volafotsy no anombananao azy, araka ny sekely masina, ho fanati-panonerana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary izay efa nanotany ny amin’ny zava-masina dia honerany, ary hampiany ho tonga avy fahenina ka hatolony amin’ny mpisorona; ary ny mpisorona hanao fanavotana ho azy amin’ny ondrilahy atao fanati-panonerana, dia havela ny helony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha misy olona manota, satria manao izay tsy tokony hatao ka mandika ny anankiray amin’ny didin’i Jehovah, nefa tsy fantany izany, ka mahameloka azy, ary mitondra ny helony izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia hitondra ondrilahy tsy misy kilema izy, araka ny anombananao azy, ho fanati-panonerana ho any amin’ny mpisorona; ary ny mpisorona hanao fanavotana ho azy noho ny ota tsy nahy izay nahadiso azy, nefa tsy fantany, dia havela ny helony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dia fanati-panonerana izany, fa efa meloka tamin’i Jehovah tokoa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha misy olona manota, satria manao izay mahadiso amin’i Jehovah, fa mandainga amin’ny namany ny amin’izay nampitehirizina azy, na amin’ny zavatra notanany ho tsatòka, na amin’izay nalainy an-keriny, na efa nampahory ny namany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'na nahita izay zavatra very ka mandainga amin’izany sady mianian-tsy to ny amin’izay mety ho fahotan’ny olona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'satria nanota izy ka meloka, dia hanonitra izay nalainy an-keriny, na izay tamin’ny fampahoriana, na izay nampitehirizina azy, na izay zavatra very hitany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'na izay rehetra nianianany tsy to; dia hanonitra toraka izany izy sady hanampy azy koa ho tonga avy fahenina, ka homeny ilay tompon-javatra amin’ny andro anaterany ny fanati-panonerany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny fanati-panonerana ho entiny ho an’i Jehovah dia ondrilahy tsy misy kilema, araka ny anombananao azy, ho fanati-panonerana ho any amin’ny mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny mpisorona hanao fanavotana ho azy eo anatrehan’i Jehovah, dia havela ny helony na inona na inona no fahadisoana nataony.
