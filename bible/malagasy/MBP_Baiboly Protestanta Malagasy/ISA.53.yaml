document_id: ISA.53,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Iza no nino ny teny nampitondraina anay?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no nampisehoana ny sandrin’i Jehovah?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nefa sitrak’i Jehovah ny hanorotoro sy hampangirifiry Azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa manolotra fanati-panonerana Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hahita taranaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rehefa ataonao fanati-panonerana ny ainy, dia hahita taranaka Izy.
      marker-yv: yv-n
    - type: text
      text: ' sady ho maro andro,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sitrapon’i Jehovah dia hambinina eo an-tànany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Noho ny fisasaran’ny fanahiny dia hahita '
    - type: usfm
      marker: it
      children:
      - type: text
        text: izany
    - type: text
      text: ' Izy ka ho afa-po;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahalalana Azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahalalany.
      marker-yv: yv-n
    - type: text
      text: ' no hanamarinan’ny Mpanompoko marina ny olona maro,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izy no hivesatra ny helok’ireo.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa dia hanome Azy anjara amin’ny lehibe Aho, ary hizara babo amin’ny mahery Izy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dia homeko Azy ny lehibe ho anjarany sy ny mahery ho anjara-babony.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria naidiny ho amin’ny fahafatesana ny ainy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary natao ho isan’ny mpanota Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Izy no nitondra ny fahotan’ny maro
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady manao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nanao.
      marker-yv: yv-n
    - type: text
      text: ' fifonana ho an’ny mpanota.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa naniry teo anatrehany tahaka ny zana-kazo madinika Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny solofon-kazo amin’ny tany karankaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy nanana endrika na fahatsaran-tarehy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha nijery Azy isika, dia tsy nisy hatsaran-tarehy haniriantsika Azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Natao tsinontsinona sy nolavin’ny olona Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lehilahy ory sady zatra ny fahoriana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lehilahy be fanaintainana sady fantatry ny faharariana.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka izay tsy tian’ny olon-kojerena akory Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Natao tsinontsinona Izy ka tsy mba nahoantsika.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nitondra ny aretintsika tokoa Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nivesatra ny fahoriantsika;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanaintainantsika.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanjo isika kosa nanao Azy ho nokapohina sy nasian’Andriamanitra ary nampahorina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nefa Izy dia voalefona noho ny fahadisoantsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy notorotoroina noho ny helotsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fampijaliana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: famaizana.
      marker-yv: yv-n
    - type: text
      text: ' nahazoantsika fihavanana no namelezana Azy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny dian-kapoka taminy no nahasitranana antsika.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Isika rehetra dia samy efa nania tahaka ny ondry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy efa nivily ho amin’ny làlantsika avy isika rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nataon’i Jehovah nihatra taminy avokoa ny helotsika rehetra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nampahorina Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa nanetry tena ka tsy niloa-bava,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny zanak’ondry entina hovonoina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny ondrivavy izay moana eo anatrehan’ny mpanety azy,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy niloa-bava Izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny fampahoriana sy ny fitsarana no nenti-nanaisotra Azy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nalaina niala tamin’ny fampahoriana sy ny fitsarana Izy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza tamin’ny niara-belona taminy no nihevitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ary iza no nihevitra izay ho taranany?
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nofongorana niala tamin’ny tanin’ny velona Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny fahadisoan’ny oloko no nikapohana Azy?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary nokasaina hatao tao amin’ny olo-meloka ny fasany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Nefa teo amin’ny mpanan-karena Izy, rehefa novonoina),
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sy ho eo amin’ny mpanan-karena, rehefa novonoina Izy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia tsy nanao ratsy aza Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy nisy fitaka teo am-bavany.
