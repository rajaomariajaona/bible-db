document_id: ISA.53,873
type_code: plt
verses:
  '1':
  - type: text
    content: Iza no nino ny teny nampitondraina anay?
  - type: text
    content: Ary iza no nampisehoana ny sandrin’i Jehovah?
  '10':
  - type: text
    content: Nefa sitrak’i Jehovah ny hanorotoro sy hampangirifiry Azy;
  - type: text
    content: Rehefa manolotra fanati-panonerana Izy,
  - type: text
    content: Dia hahita taranaka
  - type: note
    content: 'Na: Rehefa ataonao fanati-panonerana ny ainy, dia hahita taranaka Izy.'
  - type: text
    content: ' sady ho maro andro,'
  - type: text
    content: Ary ny sitrapon’i Jehovah dia hambinina eo an-tànany.
  '11':
  - type: text
    content: 'Noho ny fisasaran’ny fanahiny dia hahita '
  - type: text
    content: izany
  - type: text
    content: ' Izy ka ho afa-po;'
  - type: text
    content: Ny fahalalana Azy
  - type: note
    content: Heb. fahalalany.
  - type: text
    content: ' no hanamarinan’ny Mpanompoko marina ny olona maro,'
  - type: text
    content: Ary Izy no hivesatra ny helok’ireo.
  '12':
  - type: text
    content: Koa dia hanome Azy anjara amin’ny lehibe Aho, ary hizara babo amin’ny mahery Izy;
  - type: note
    content: 'Na: dia homeko Azy ny lehibe ho anjarany sy ny mahery ho anjara-babony.'
  - type: text
    content: Satria naidiny ho amin’ny fahafatesana ny ainy,
  - type: text
    content: Ary natao ho isan’ny mpanota Izy;
  - type: text
    content: Eny, Izy no nitondra ny fahotan’ny maro
  - type: text
    content: Sady manao
  - type: note
    content: 'Na: nanao.'
  - type: text
    content: ' fifonana ho an’ny mpanota.'
  '2':
  - type: text
    content: Fa naniry teo anatrehany tahaka ny zana-kazo madinika Izy
  - type: text
    content: Sy tahaka ny solofon-kazo amin’ny tany karankaina;
  - type: text
    content: Tsy nanana endrika na fahatsaran-tarehy Izy;
  - type: text
    content: Ary raha nijery Azy isika, dia tsy nisy hatsaran-tarehy haniriantsika Azy.
  '3':
  - type: text
    content: Natao tsinontsinona sy nolavin’ny olona Izy;
  - type: text
    content: Lehilahy ory sady zatra ny fahoriana,
  - type: note
    content: Heb. Lehilahy be fanaintainana sady fantatry ny faharariana.
  - type: text
    content: Ary tahaka izay tsy tian’ny olon-kojerena akory Izy;
  - type: text
    content: Natao tsinontsinona Izy ka tsy mba nahoantsika.
  '4':
  - type: text
    content: Nitondra ny aretintsika tokoa Izy
  - type: text
    content: Sady nivesatra ny fahoriantsika;
  - type: note
    content: Heb. fanaintainantsika.
  - type: text
    content: Kanjo isika kosa nanao Azy ho nokapohina sy nasian’Andriamanitra ary nampahorina.
  '5':
  - type: text
    content: Nefa Izy dia voalefona noho ny fahadisoantsika
  - type: text
    content: Sy notorotoroina noho ny helotsika,
  - type: text
    content: Ny fampijaliana
  - type: note
    content: Heb. famaizana.
  - type: text
    content: ' nahazoantsika fihavanana no namelezana Azy;'
  - type: text
    content: Ary ny dian-kapoka taminy no nahasitranana antsika.
  '6':
  - type: text
    content: Isika rehetra dia samy efa nania tahaka ny ondry,
  - type: text
    content: Samy efa nivily ho amin’ny làlantsika avy isika rehetra;
  - type: text
    content: Ary nataon’i Jehovah nihatra taminy avokoa ny helotsika rehetra.
  '7':
  - type: text
    content: Nampahorina Izy,
  - type: text
    content: Nefa nanetry tena ka tsy niloa-bava,
  - type: text
    content: Dia tahaka ny zanak’ondry entina hovonoina,
  - type: text
    content: Sy tahaka ny ondrivavy izay moana eo anatrehan’ny mpanety azy,–
  - type: text
    content: Eny, tsy niloa-bava Izy.
  '8':
  - type: text
    content: Ny fampahoriana sy ny fitsarana no nenti-nanaisotra Azy;
  - type: note
    content: 'Na: Nalaina niala tamin’ny fampahoriana sy ny fitsarana Izy.'
  - type: text
    content: Ary iza tamin’ny niara-belona taminy no nihevitra
  - type: note
    content: 'Na: Ary iza no nihevitra izay ho taranany?'
  - type: text
    content: Fa nofongorana niala tamin’ny tanin’ny velona Izy,
  - type: text
    content: Ka ny fahadisoan’ny oloko no nikapohana Azy?
  '9':
  - type: text
    content: Ary nokasaina hatao tao amin’ny olo-meloka ny fasany
  - type: text
    content: (Nefa teo amin’ny mpanan-karena Izy, rehefa novonoina),
  - type: note
    content: 'Na: Sy ho eo amin’ny mpanan-karena, rehefa novonoina Izy.'
  - type: text
    content: Na dia tsy nanao ratsy aza Izy,
  - type: text
    content: Sady tsy nisy fitaka teo am-bavany.
