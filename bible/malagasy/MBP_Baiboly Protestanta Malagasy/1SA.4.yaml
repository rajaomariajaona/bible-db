document_id: 1SA.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niadian’ny Isiraely tamin’ny Filistina, sy ny namaboana ny fiaran’i Jehovah.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tonga tany amin’ny Isiraely rehetra ny tenin’i Samoela. Dia nandeha ny Isiraely hiady tamin’ny Filistina ka nitoby teo anilan’i Ebenezera; ary ny Filistina kosa nitoby tany Afeka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary niady ny Filistina, dia resy ny Isiraely, ka samy nandositra ho any an-dainy avy izy rehetra, ary be dia be no maty, dia lehilahy telo alina mandeha an-tongotra tamin’ny Isiraely no niampatrampatra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia lasan-ko babo ny fiaran’Andriamanitra, ary maty izy mirahalahy zanak’i Ely, dia Hofinia sy Finehasa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nisy lehilahy Benjamita anankiray nihazakazaka avy tany tamin’ny miaramila ka tonga tao Silo androtrizay ihany, ary triatra ny akanjony, sady nihosin tany ny lohany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary raha tonga izy, indro, Ely nipetraka teo amin’ny sezany ka nitazana teo amoron-dàlana, fa niemponempona ny fony noho ny fiaran’Andriamanitra. Ary nony tonga tao an-tanàna ralehilahy ka nilaza, dia nidradradradra ny tao an-tanàna rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary rehefa ren’i Ely ny feo midradradradra, dia hoy izy: Inona izao feo mitabataba izao? Ary ilay lehilahy nanatona faingana ka nilaza tamin’i Ely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary efa valo amby sivi-folo taona Ely tamin’izay, sady efa pahina ny masony, ka tsy nahita izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hoy ilay lehilahy tamin’i Ely: Izaho ilay avy tany an-tafika, ary andro-any ihany no nandosirako niala tamin’ny miaramila. Ary hoy izy: Nanao ahoana izay tany, anaka? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia namaly ilay nitondra teny ka nanao hoe: Nandositra teo anoloan’ny Filistina ny Isiraely, ka be dia be no maty, ary izy mirahalahy zanakao, Hofinia sy Finehasa, mba maty koa, sady lasan-ko babo ny fiaran’Andriamanitra.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary nony nilaza ny amin’ny fiaran’Andriamanitra izy, dia lavo nitsilany niala tamin’ny sezany teo anilan’ny vavahady Ely, ka folaka ny vozony, dia maty izy, satria efa antitra sady mavesatra. Ary efa nitsara ny Isiraely efa-polo taona izy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny vinantoni-vavy, vadin’i Finehasa, nanan-anaka ka efa ho teraka; koa nony reny fa lasan-ko babo ny fiaran’Andriamanitra, sady maty avokoa ny rafozany sy ny vadiny, dia nitanondrika izy ka narary nihetsi-jaza, fa efa ho teraka. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia nilahatra ny Filistina hiady amin’ny Isiraely; ary rehefa raikitra ny ady, dia resin’ny Filistina ny Isiraely, ka nahafatesany tokony ho efatra arivo lahy ny miaramila nilahatra tany an-tsaha.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary rehefa nadiva hiala aina izy, dia niteny ireo vehivavy nitsangana teo anilany ka nanao taminy hoe: Aza matahotra, fa velon-dahy hianao. Fa tsy namaly na nihaino izany izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia nataony hoe Ikaboda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ikaboda=Tsy misy voninahitra.
      marker-yv: yv-n
    - type: text
      text: ' ny anaran’ny zaza; fa hoy izy: Afaka ny voninahitry ny Isiraely,–satria efa lasan-ko babo ny fiaran’Andriamanitra, sady efa maty koa ny rafozany sy ny vadiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hoy izy: Afaka tamin’ny Isiraely ny voninahitra, fa lasan-ko babo ny fiaran’Andriamanitra.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary rehefa tonga tany an-toby ny olona, dia hoy ny loholon’ny Isiraely: Nahoana no namely antsika teo anoloan’ny Filistina Jehovah androany? Andeha halaintsika avy any Silo ho eto amintsika ny fiaran’ny faneken’i Jehovah, ka raha tonga eto amintsika izany, dia hamonjy antsika amin’ny tànan’ny fahavalontsika. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia naniraka nankany Silo ny olona haka ny fiaran’ny faneken’i Jehovah, Tompon’ny maro, Izay mipetraka amin’ny kerobima; ary tao Silo, teo amin’ny fiaran’ny faneken’Andriamanitra, izy mirahalahy zanak’i Ely, dia Hofinia sy Finehasa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary rehefa tonga teo an-toby ny fiaran’ny faneken’i Jehovah, dia nihoby mafy ny Zanak’Isiraely rehetra, ka dia nanako ny tany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary rehefa ren’ny Filistina ny hoby, dia hoy izy; Inona re izany hoby mafy any an-tobin’ny Hebreo izany? Ary fantany fa tonga ao an-toby ny fiaran’i Jehovah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia raiki-tahotra ny Filistina ka nanao hoe: Andriamanitra no tonga ao an-toby. Ary hoy koa izy: Mahita loza isika! fa tsy mbola nisy toy izao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mahita loza isika! Iza no hamonjy antsika amin’ny tànan’ireo andriamanitra mahery ireo? Ireo no andriamanitra izay namely ny Egyptiana tamin’ny kapoka rehetra tany an-efitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mahereza, ary aoka hitomban-dahy hianareo, ry Filistina, fandrao hanompo ny Hebreo hianareo tahaka ny nanompoany anareo; misehoa ho lehilahy hianareo, ka miadia.
