document_id: JOB.2,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fizahan-toetra faharoa nahazo an’i Joba, sy ny namangian’ny sakaizany telo lahy azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’ny indray andro koa dia avy ireo zanak’Andriamanitra hiseho teo anatrehan’i Jehovah, ka dia mba tonga teo koa Satana tafaharo taminy hiseho teo anatrehan’i Jehovah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izy taminy: Tahaka ny tenin’ny anankiray amin’ny vehivavy adala ny teninao. Moa ny soa ihany va no horaisintsika avy amin’Andriamanitra, fa tsy ny ratsy koa?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin’izany rehetra izany dia tsy nanota tamin’ny molony Joba.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa ren’ny sakaizan’i Joba telo lahy ny fahoriana rehetra izay nanjo azy, dia samy niainga avy tany amin’ny fonenany avy izy–dia Elifaza Temanita sy Bildada Sohita ary Zofara Namatita–ary nifamotoana izy mba handeha hitsapa alahelo sy hampionona azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanopy ny masony teny lavidavitra eny izy telo lahy ka tsy nahafantatra azy, dia nanandratra ny feony izy ka nitomany; ary samy nandriatra ny lambany avy koa izy rehetra, dia nanopy vovoka ho amin’ny lanitra hiraraka amin’ny lohany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niara-nipetraka teo aminy tamin’ny tany hafitoan’andro sy hafitoan’alina izy, nefa tsy nisy niteny taminy na dia indraim-bava akory aza, satria hitany fa mafy loatra ny fahoriany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamin’i Satana: Avy taiza hianao? Ary Satana dia namaly an’i Jehovah ka nanao hoe: Avy nizahazaha teny amin’ny tany aho ka nivezivezy teny.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamin’i Satana: Efa nandinika an’i Joba mpanompoko va hianao? Fa tsy misy tahaka azy eny ambonin’ny tany, fa olona marina sy mahitsy izy sady matahotra an’Andriamanitra ka mifady ny ratsy? Ary mbola mitana mafy ny fahamarinany ihany izy, na dia nanesika Ahy hamongotra azy foana aza hianao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Satana dia namaly an’i Jehovah ka nanao hoe: Hoditra fefin’ny hoditra, eny, izay rehetra ananan’ny olona dia homeny ho fefin’ny ainy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ahinjiro ange ny tànanao, ka tendreo ny taolany sy ny nofony–raha tsy handa Anao eo imasonao aza
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hahafoy Anao mihitsy.
      marker-yv: yv-n
    - type: text
      text: ' izy e! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamin’i Satana: Indro, eo an-tànanao izy; ny ainy tokana ihany no aza asiana.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka Satana avy teo anatrehan’i Jehovah ka namely vay ratsy an’i Joba hatramin’ny faladiany ka hatramin’ny tampon-dohany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia naka tavim-bilany hihaorany izy, raha nipetraka teo an-davenona.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny vadiny taminy: Mbola mitana ny fahamarinanao ihany va hianao? Mahafoiza an’Andriamanitra hianao, dia aoka ho faty. '
