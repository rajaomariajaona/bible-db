document_id: DEU.18,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny ho anjaran’ny mpisorona sy ny Levita.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'NY Levita mpisorona, dia ny firenen’i Levy rehetra, tsy mba hanana anjara na lova eo amin’ny Isiraely; ny fanatitra atao amin’ny afo ho an’i Jehovah sy ny anjaran’i Jehovah no ho fihinany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aoka tsy hisy eo aminao izay mampandeha ny zanani-lahy na ny zanani-vavy hamaky ny afo, na mpanao fankatovana, na mpanandro, na mpanao sikidy, na mpanana ody, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'na manao ho masimbava, na mpanadina amin’ny manao azy ho tsindrian-javatra, na mpanao hatsarana, na mpanontany amin’ny maty. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa fahavetavetana eo imason’i Jehovah izay rehetra manao izany zavatra izany, ary izany fahavetavetana izany no androahan’i Jehovah Andriamanitrao azy eo anoloanao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Aoka ho tanteraka amin’i Jehovah Andriamanitrao hianao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa ireo firenena izay efa horoahinao ireo dia mihaino ny mpanandro sy ny mpanao fankatovana; fa hianao kosa tsy navelan’i Jehovah Andriamanitrao hanao izany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mpaminany avy eo aminao, dia avy amin’ny rahalahinao, tahaka ahy, no hatsangan’i Jehovah Andriamanitrao ho anao; izy no hohenoinareo; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'araka izay rehetra nangatahinao tamin’i Jehovah Andriamanitrao tao Horeba tamin’ny andro nivoriana hoe: Aoka tsy hihaino ny feon’i Jehovah Andriamanitro intsony aho, ary aoka tsy hahita izany afo lehibe izany intsony aho, fandrao maty. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy Jehovah tamiko: Tsara ny teny izay nolazainy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mpaminany no hatsangako ho azy avy amin’ny rahalahiny, tahaka anao, ka hataoko ao am-bavany ny teniko, ary holazainy aminy izay rehetra handidiako azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary izay rehetra tsy mihaino ny teniko, izay holazainy amin’ny anarako, dia Izaho no hitsara azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa tsy hanan-dova eo amin’ny rahalahiny izy; Jehovah no lovany, araka izay nolazainy taminy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa ny mpaminany izay sahy hilaza teny amin’ny anarako, nefa tsy nasaiko nolazainy, na izay miteny amin’anaran’andriamani-kafa, dia hatao maty.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary raha hoy hianao anakampo: Hataontsika ahoana no fahafantatra ny teny izay tsy nolazain’i Jehovah? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha miteny amin’ny anaran’i Jehovah ny mpaminany, ka tsy efa ny zavatra, na tsy tanteraka, dia teny izay tsy nolazain’i Jehovah izany: tamin’ny fahasahisahiana no nilazan’ny mpaminany izany, koa aza matahotra azy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary izao no ho anjaran’ny mpisorona avy amin’ny olona, dia avy amin’izay mamono zavatra hatao fanatitra, na omby, na ondry, na osy: dia homeny ho an’ny mpisorona ny sorony sy ny takolany roa ary ny vavoniny; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ary ny voaloham-bokatry ny varinao koa sy ny ranom-boalobokao sy ny diloilonao ary ny voalohan’ny volon’ondrinao no homenao azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa izy sy ny taranany no nofidin’i Jehovah Andriamanitrao tamin’ny firenenao rehetra hitsangana hanao fanompoam-pivavahana mandrakizay amin’ny anaran’i Jehovah.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary raha misy Levita miala amin’ny tanànanao anankiray, izay nivahiniany, amin’ny Isiraely rehetra, ka mandeha araka ny fanirian’ny fony ho any amin’ny tany izay hofidin’i Jehovah, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ka manao fanompoam-pivavahana amin’ny anaran’i Jehovah Andriamaniny, tahaka ny Levita rahalahiny rehetra, izay mitsangana eo anatrehan’i Jehovah, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: dia anjara mitovy amin’ny an’ireo ihany no ho fihinany, na dia misy aza izay vìdin’ny azony tamin-drainy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny mpaminany.
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'REHEFA tonga any amin’ny tany izay omen’i Jehovah Andriamanitrao anao hianao, dia aza mianatra hanao araka ny fahavetavetana ataon’ireo firenena ireo. '
