document_id: NUM.21
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandresen’ny Isiraely ny mpanjakan’i Arada.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ARY raha ren’ilay Kananita, mpanjakan’i Arada, izay nonina teo amin’ny tany atsimo, fa efa mandeha amin’ny làlana mankany Atarima
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’ny làlan’ny mpisafo-tany.
    marker-yv: yv-n
  - type: text
    text: ' ny Isiraely, dia niady taminy izy, ka nentiny ho babo ny sasany tamin’ny Isiraely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nivoady tamin’i Jehovah ny Isiraely ka nanao hoe: Raha hatolotrao eo an-tànanay tokoa ity firenena ity, dia hataonay levona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: herema.
    marker-yv: yv-n
  - type: text
    text: ' avokoa ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Jehovah nihaino ny feon’ny Isiraely ka dia natolony azy ny Kananita: ary dia nataon’ny Isiraely levona'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: herema.
    marker-yv: yv-n
  - type: text
    text: ' izy sy ny tanànany; koa ny anaran’izany tany izany dia hatao hoe Horma.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Horma = Herema.
    marker-yv: yv-n
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny Menarana Varahina.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ARY niala tany an-tendrombohitra Hora izy ka nahazo ny làlana mankany amin’ny Ranomasina Mena hanodidina ny tany Edoma; dia kivy ny fanahin’ny olona noho ny làlana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary niteny nanome tsiny an’Andriamanitra sy Mosesy ny olona ka nanao hoe: Nahoana no nentinao niakatra avy tany Egypta izahay ho faty atỳ an-efitra? fa tsy misy mofo na rano atỳ; ary mahamonamonaina ny fanahinay itony mofomofo foana itony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary Jehovah dia nampandeha ny menaran-afo teny amin’ny olona, ka nanaikitra ny olona ireny; dia nahafatesana be ny olona Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nankeo amin’i Mosesy ny olona ka nanao hoe: Efa nanota izahay, fa efa niteny nanome tsiny an’i Jehovah sy hianao. Ifony amin’i Jehovah izahay mba hanesorany ny menarana aminay. Dia nifona ho an’ny olona Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Jehovah taminy: Manaova menaran-afo, ka ahantòny amin’ny hazo lava, ary izay rehetra voakaikitra dia ho velona, raha mijery izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nanao menarana varahina Mosesy ka nanantona azy tamin’ny hazo lava; ary izay olona voakaikitry ny menarana ka nijery ilay menarana varahina dia velona.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nandehanan’ny Isiraely nanodidina ny tany Edoma sy Moaba, ary ny nandreseny an’i Sihona sy Oga.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ARY ny Zanak’Isiraely nifindra ka nitoby tao Obota. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony niala tao Obota, izy, dia nitoby tao Ie-abarima, tany amin’ny efitra izay mifanolotra amin’i Moaba, tandrifin’ny fiposahan’ny masoandro. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nony niala tao izy, dia nitoby tao amin’ny lohasahan-driaka Zareda. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nony niala tao izy, dia nitoby tao an-dafin’i Arnona, izay any an-efitra sady avy amin’ny fari-tanin’ny Amorita; fa Arnona no fari-tanin’ny Moabita, eo anelanelan’ny Moabita sy ny Amorita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa izany no ilazana eo amin’ny Bokin’ny Adin’i Jehovah hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vaheba any Sofa–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny lohasahan-driaka Arnona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny tany kisolosolo amin’ny lohasahan-driaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mandroso mankeo amin’ny tanin’i Ara
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mipaka amin’ny fari-tanin’i Moaba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary niala tao izy hankany Bera,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Bera = Lavaka fantsakana.
    marker-yv: yv-n
  - type: text
    text: ' dia ilay lavaka fantsakana nilazan’i Jehovah tamin’i Mosesy hoe: Angony ny olona, fa homeko rano izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nihira izao fihirana izao ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miboiboiha, ry lavaka fantsakana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataovinareo an-kira izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lavaka fantsakana izay nohadin’ireo mpanao lalàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nolavahan’ireo manan-kaja amin’ny firenena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny tehiny, dia ny tehina fanapahana.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary nony niala tany an-efitra izy, dia nankao Matana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nony niala tao Matana izy, dia nankao Nahaliela; ary nony niala tao Nahaliela izy, dia nankao Bamota; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ary nony niala tao Bamota izy, dia nankany an-dohasaha izay ao amin’ny tany Moaba, ao an-tampon’i Pisga, izay manatrika ny efitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny Isiraely naniraka olona ho any amin’i Sihona, mpanjakan’ny Amorita, hanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aoka mba handeha hamaky ny taninao izahay, fa tsy hania ho amin’ny saha na ho amin’ny tanimboaloboka izahay, ary tsy hisotro ny rano amin’ny lavaka fantsakana; ny làlan’andriana ihany no halehanay mandra-pahafakay ny fari-taninao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nefa Sihona tsy namela ny Isiraely handeha hamaky ny taniny, fa nanangona ny vahoakany rehetra izy ka nivoaka avy tany an-efitra hihaona amin’ny Isiraely, dia nankany Jahaza; ary niady tamin’ny Isiraely teo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary ny Isiraely namely azy tamin’ny lelan-tsabatra ka nahazo ny taniny hatrany Arnona ka hatrany Jaboka, dia hatramin’ny taranak’i Amona; fa mafy ny fari-tanin’ny taranak’i Amona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nalain’ny Isiraely izany tanàna rehetra izany; ary nonenany ny tanànan’ny Amorita rehetra, dia Hesbona sy ny zana-bohiny rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hesbona no tanànan’i Sihona, mpanjakan’ny Amorita, izay efa nanafika ny mpanjakan’i Moaba taloha, ka efa nalainy taminy avokoa ny taniny rehetra hatrany Arnona. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izany no nanaovan’ny mpanao oha-teny hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midira ao Hesbona hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hamboarina sy hatao mafy ny tanànan’i Sihona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa nisy afo nivoaka avy tao Hesbona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy lelafo avy tao an-tanànan’i Sihona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nandevona an’i Aran’i Moaba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny tompon’ny havoan’i Arnona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lozanao, ry Moaba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ringana hianao, ry olon’i Kemosy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foiny handositra ny zanani-lahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary navelany ho babo ny zanani-vavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho an’i Sihona, mpanjakan’ny Amorita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Notifirintsika izy; ringana Hesbona hatrany Dibona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nofoanantsika izy hatrany Nofa, izay mipaka an’i Medeba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia nitoetra tao amin’ny tanin’ny Amorita ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Mosesy naniraka olona hisafo an’i Jazera; ary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny Isiraely
  - type: text
    text: ' dia nahafaka ny zana-bohiny ka nandroaka ny Amorita izay tany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary niverina ny olona ka niakatra tamin’ny làlana mankany Basana; dia nivoaka Oga, mpanjakan’i Basana, hihaona aminy, dia izy sy ny vahoakany rehetra, hiady tao Edrehy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy Jehovah tamin’i Mosesy: Aza matahotra azy hianao, fa efa natolotro eo an-tànanao izy sy ny vahoakany rehetra ary ny taniny; ary hianao hanao aminy araka izay nataonao tamin’i Sihona, mpanjakan’ny Amorita, izay nitoetra tao Hesbona. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Dia namely azy sy ny zanani-lahy ary ny vahoakany rehetra izy, ka tsy nasiany niangana na dia iray akory aza; dia nahazo ny taniny izy.
