    - type: text
      text: Mba hametraka ny fanantenany amin’Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hanadino ny asany,
  - type: usfm
    marker: q1
    children:
    - type: text
