document_id: PSA.78,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana nalaina tamin’ny tantaran’ny Isiraely hatramin’i Mosesy ka hatramin’i Davida.
  - type: text
    content: Maskila nataon’i Asafa.
  - type: text
    content: HENOY ny lalàko, ry oloko;
  - type: text
    content: Atongilano ny sofinareo amin’ny tenin’ny vavako.
  '10':
  - type: text
    content: Tsy nitandrina ny fanekena amin’Andriamanitra izy,
  - type: text
    content: Ary tsy nety nandeha araka ny lalàny;
  '11':
  - type: text
    content: Nanadino ny asany izy
  - type: text
    content: Sy ny fahagagana izay nampahitany azy.
  '12':
  - type: text
    content: Teo anatrehan’ny razany no nanaovany fahagagana
  - type: text
    content: Tany amin’ny tany Egypta, dia tany amin’ny tany lemak’i Zoana.
  '13':
  - type: text
    content: Nampisaraka ny ranomasina Izy ka nitondra azy nita,
  - type: text
    content: Dia nampijanona ny rano ho toy ny antontan-javatra.
  '14':
  - type: text
    content: Ary ny rahona no nitondrany azy raha antoandro,
  - type: text
    content: Sy afo mahazava nony alina.
  '15':
  - type: text
    content: Namaky vatolampy tany an-efitra Izy
  - type: text
    content: Ka nampisotro azy nanaram-po tahaka ny amin’ny rano lalina.
  '16':
  - type: text
    content: Ary nampivoaka rano mandriaka avy tamin’ny haram-bato Izy
  - type: text
    content: Ka nampirotsaka rano ho tahaka ny ony.
  '17':
  - type: text
    content: Kanjo mbola nandroso nanota taminy ihany izy ireo
  - type: text
    content: Ka nampahatezitra ny Avo Indrindra tany an-efitra.
  '18':
  - type: text
    content: Dia naka fanahy an’Andriamanitra tam-pony izy
  - type: text
    content: Tamin’ny nilany hanina araka ny nahaliana azy.
  '19':
  - type: text
    content: 'Dia niteny nanohitra an’Andriamanitra izy ka nanao hoe:'
  - type: text
    content: Mahavelatra latabatra atỳ an-efitra va Andriamanitra?
  '2':
  - type: text
    content: Hiloa-bava hilaza fanoharana aho;
  - type: text
    content: Hanonona teny saro-pantarina fony taloha aho.
  '20':
  - type: text
    content: Indro, namely ny vatolampy Izy,
  - type: text
    content: Dia nigororoana ny rano ka nandriaka;
  - type: text
    content: Mahay manome mofo koa va Izy?
  - type: text
    content: Mahatonga hena ho an’ny olony va Izy?
  '21':
  - type: text
    content: Koa nony ren’i Jehovah izany, dia tezitra Izy;
  - type: text
    content: Ary nisy afo nirehitra tamin’i Jakoba,
  - type: text
    content: Sady nisy fahatezerana namely ny Isiraely,
  '22':
  - type: text
    content: Satria tsy nino an’Andriamanitra izy ireo
  - type: text
    content: Ka tsy natoky ny famonjeny.
  '23':
  - type: text
    content: Kanefa nandidy ny rahona tany ambony Izy,
  - type: text
    content: Ary ny varavaran’ny lanitra no novohany,
  '24':
  - type: text
    content: Dia nandatsaka mana teny aminy hohaniny Izy,
  - type: text
    content: Ary varin’ny lanitra no nomeny azy.
  '25':
  - type: text
    content: Ny fihinan’ny mahery no nohanin’ny olona;
  - type: text
    content: Nanaterany hanina hahavoky azy izy.
  '26':
  - type: text
    content: Nampandeha ny rivotra avy any atsinanana teny amin’ny lanitra Izy;
  - type: text
    content: Ary ny heriny no nitondrany ny rivotra avy any atsimo.
  '27':
  - type: text
    content: Dia nampilatsahany hena betsaka hoatra ny vovoka izy
  - type: text
    content: Sy voro-manidina hoatra ny fasiky ny ranomasina,
  '28':
  - type: text
    content: Ka nalatsany teny afovoan’ny tobiny,
  - type: text
    content: Manodidina ny fitoerany.
  '29':
  - type: text
    content: Dia nihinana izy ireo ka voky tsara;
  - type: text
    content: Ary izay nilainy dia nomeny azy.
  '3':
  - type: text
    content: Izay efa rentsika sy fantatsika
  - type: text
    content: Ary nambaran’ny razantsika tamintsika
  '30':
  - type: text
    content: Nefa tsy niala tamin’ny filany izy,
  - type: text
    content: Ary mbola teo am-bavany ihany ny haniny;
  '31':
  - type: text
    content: Dia nirehitra taminy ny fahatezeran’Andriamanitra,
  - type: text
    content: Ka nahafatesany ny tremalahy teo aminy,
  - type: text
    content: Ary naripany ny zatovolahin’ny Isiraely.
  '32':
  - type: text
    content: Fa na dia izany rehetra izany aza, dia mbola nanota ihany izy ireo
  - type: text
    content: Ka tsy nino ny fahagagana nataony.
  '33':
  - type: text
    content: Dia nampahalevona ny androny toy ny fofonaina Izy,
  - type: text
    content: Ary ny taonany tamin’ny fampitahorana.
  '34':
  - type: text
    content: Raha novonoiny izy ireo, dia nitady hahalala an’Andriamanitra izy
  - type: text
    content: Ary niverina nikatsaka Azy.
  '35':
  - type: text
    content: Dia nahatsiaro izy fa Andriamanitra no Vatolampiny,
  - type: text
    content: Ary Andriamanitra Avo Indrindra no Mpanavotra azy.
  '36':
  - type: text
    content: Kanefa nanao vava malefaka taminy ireo,
  - type: text
    content: Ary ny lelany no nandaingany taminy.
  '37':
  - type: text
    content: Ary ny fony tsy niorina taminy;
  - type: text
    content: Eny, tsy nitana ny fanekeny izy.
  '38':
  - type: text
    content: Nefa Andriamanitra kosa be famindrampo,
  - type: text
    content: Dia mamela heloka ka tsy mandringana;
  - type: text
    content: Eny, nahatsindry fo tokoa Izy,
  - type: text
    content: Ka tsy nofohaziny avokoa ny fahavinirany.
  '39':
  - type: text
    content: Fa nahatsiaro Izy fa nofo ihany ireo,
  - type: text
    content: Dia rivotra izay mandalo ka tsy miverina intsony.
  '4':
  - type: text
    content: Dia tsy mba hafenintsika amin’ny zanany;
  - type: text
    content: Fa hambarantsika amin’ny taranaka ho avy ny fiderana an’i Jehovah
  - type: text
    content: Sy ny heriny ary ny fahagagana izay efa nataony.
  '40':
  - type: text
    content: Impiry akory izy ireo no efa niodina taminy tany an-efitra
  - type: text
    content: Ka nampalahelo Azy tany amin’ny tany foana!
  '41':
  - type: text
    content: Naka fanahy an’Andriamanitra mandrakariva izy
  - type: text
    content: Ka nampalahelo ny Iray Masin’ny Isiraely.
  '42':
  - type: text
    content: Tsy mba nahatsiaro ny tànany izy,
  - type: text
    content: Dia ny andro izay nanavotany azy tamin’ny fahavalo,
  '43':
  - type: text
    content: Izay nanaovany famantarana tany Egypta
  - type: text
    content: 'Sy fahagagana tany an-tany lemak’i Zoana:'
  '44':
  - type: text
    content: Nampody ny oniny ho ra Izy,
  - type: text
    content: Ary ny reniranony tsy azony nisotroana.
  '45':
  - type: text
    content: Nandefa lalitra betsaka
  - type: note
    content: 'Na: fihitra, na kalalao.'
  - type: text
    content: ' hamely azy Izy, ka nandany azy ireny,'
  - type: text
    content: Ary sahona, ka nanimba azy ireny.
  '46':
  - type: text
    content: Dia nanome ny vokatry ny taniny ho an’ny sompanga Izy
  - type: text
    content: Ary ny asany ho an’ny valala.
  '47':
  - type: text
    content: Namono ny voalobony tamin’ny havandra Izy
  - type: text
    content: Ary ny aviaviny tamin’ny havandra vaventy.
  '48':
  - type: text
    content: Dia nanolotra ny biby fiompiny ho an’ny havandra Izy,
  - type: text
    content: Ary ny omby aman-ondriny ho an’ny varatra.
  '49':
  - type: text
    content: 'Nandatsaka ny fahatezerany mirehitra taminy Izy:'
  - type: text
    content: Eny, fahavinirana sy fahatezerana ary fampahoriana,
  - type: text
    content: Dia anjely andiany mitondra loza.
  '5':
  - type: text
    content: Fa nanorina teni-vavolombelona teo amin’i Jakoba Izy,
  - type: text
    content: Ary teo amin’Isiraely no nametrahany lalàna,
  - type: text
    content: Izay nandidiany ny razantsika,
  - type: text
    content: Hampahafantariny ny zanany;
  '50':
  - type: text
    content: Namboatra làlana ho an’ny fahatezerany Izy,
  - type: text
    content: Ary tsy niaro ny fanahin’ireo tamin’ny fahafatesana,
  - type: text
    content: Fa nanolotra ny ainy ho lanin’ny areti-mandringana;
  '51':
  - type: text
    content: Ary namely ny lahimatoa rehetra tany Egypta Izy,
  - type: text
    content: Dia ny voalohan’ainy tany an-dain’i Hama;
  '52':
  - type: text
    content: Fa namindra toerana ny olony toy ny ondry Izy,
  - type: text
    content: Ary nitondra azy tany an-efitra toy ny ondry andiany.
  '53':
  - type: text
    content: Nentiny soa aman-tsara izy ireo ka tsy mba natahotra;
  - type: text
    content: Fa ny fahavalony kosa voasaron’ny ranomasina.
  '54':
  - type: text
    content: Ary nitondra azy ho any amin’ny tany misy ny fitoerany masina Izy,
  - type: text
    content: Dia ny tendrombohitra izay azon’ny tànany ankavanana.
  '55':
  - type: text
    content: Ary nandroaka ny jentilisa teo anoloany Izy
  - type: text
    content: Ka nanome ny tanin’ireny ho lova nozaraina tamin’ny famolaina,
  - type: text
    content: Dia nampitoetra ny firenen’Isiraely tao an-dainy.
  '56':
  - type: text
    content: Nefa naka fanahy an’Andriamanitra Avo Indrindra izy ka niodina taminy,
  - type: text
    content: Ary ny teni-vavolombelony tsy notandremany.
  '57':
  - type: text
    content: Ary nihemotra izy ka nivadika tahaka ny razany.
  - type: text
    content: Dia nania tahaka ny tsipìka manjiona.
  '58':
  - type: text
    content: Ary nampahatezitra Azy tamin’ny fitoerana avony izy,
  - type: text
    content: Sady nahasaro-piaro Azy tamin’ny sarin-javatra voasokitra.
  '59':
  - type: text
    content: Ary nandre izany Andriamanitra, dia tezitra Izy,
  - type: text
    content: Ka nolaviny mihitsy ny Isiraely,
  '6':
  - type: text
    content: Mba hahafantatra izany ny taranaka ho avy–dia ny zaza mbola hateraka–
  - type: text
    content: Ka hitsangana hitory izany amin’ny zanany kosa,
  '60':
  - type: text
    content: Sady nahafoy ny tabernakeliny tao Silo Izy,
  - type: text
    content: Dia ny lay izay naoriny teo amin’ny olona;
  '61':
  - type: text
    content: Dia natolony ho babo ny heriny,
  - type: text
    content: Ary ny voninahiny ho eo an-tànan’ny fahavalo.
  '62':
  - type: text
    content: Dia nanolotra ny olony ho an’ny sabatra Izy;
  - type: text
    content: Ary tezitra indrindra tamin’ny lovany Izy.
  '63':
  - type: text
    content: Ny zatovolahiny dia lanin’ny afo;
  - type: text
    content: Ary ny zatovovaviny tsy mba nanaovana hiram-panambadiana.
  '64':
  - type: text
    content: Ny mpisorony lavon-tsabatra;
  - type: text
    content: Nefa ny mpitondratenan’ireo tsy nisaona.
  '65':
  - type: text
    content: Dia nifoha ny Tompo tahaka ny anankiray avy natory,
  - type: text
    content: Tahaka ny lehilahy mahery izay miantsoantso azon’ny divay.
  '66':
  - type: text
    content: Dia namely ny fahavalony hiamboho Izy
  - type: text
    content: Ka nahafa-baraka azy mandrakizay.
  '67':
  - type: text
    content: Dia nanary ny lain’i Josefa Izy,
  - type: text
    content: Ary ny firenen’i Efraima tsy nofidiny.
  '68':
  - type: text
    content: Fa nifidy ny firenen’i Joda kosa Izy,
  - type: text
    content: Dia ny tendrombohitra Ziona izay tiany.
  '69':
  - type: text
    content: Dia nanao ny fitoerany masina ho tahaka ny havoana Izy,
  - type: text
    content: Tahaka ny tany izay naoriny ho mandrakizay.
  '7':
  - type: text
    content: Mba hametraka ny fanantenany amin’Andriamanitra
  - type: text
    content: Ka tsy hanadino ny asany,
  - type: text
    content: Fa hitandrina ny didiny;
  '70':
  - type: text
    content: Dia nifidy an’i Davida mpanompony Izy
  - type: text
    content: Ka naka azy avy tany am-balan’ondry;
  '71':
  - type: text
    content: Tany amin’ny fiandrasany ny ondry ampianahana no nakany azy
  - type: text
    content: Mba hiandry an’i Jakoba olony
  - type: text
    content: Sy Isiraely lovany;
  '72':
  - type: text
    content: Dia niandry ireo araka ny hitsin’ny fony izy
  - type: text
    content: Ka nitondra azy araka ny fahaizan’ny tànany.
  '8':
  - type: text
    content: Mba tsy ho tahaka ny razany, izay taranaka maditra sy miodina, izy,
  - type: text
    content: Dia taranaka izay tsy nampiomana ny fony,
  - type: text
    content: Sady tsy marina tamin’Andriamanitra ny fanahiny.
  '9':
  - type: text
    content: Ny zanak’i Efraima, izay nitondra tsipìka hitifirany,
  - type: text
    content: Dia niamboho tamin’ny andro fiadiana.
