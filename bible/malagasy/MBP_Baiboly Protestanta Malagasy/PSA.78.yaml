  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny lehilahy mahery izay miantsoantso azon’ny divay.
  '66':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: Dia namely ny fahavalony hiamboho Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nahafa-baraka azy mandrakizay.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
