document_id: PSA.78,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fananarana nalaina tamin’ny tantaran’ny Isiraely hatramin’i Mosesy ka hatramin’i Davida.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Maskila nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HENOY ny lalàko, ry oloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atongilano ny sofinareo amin’ny tenin’ny vavako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tsy nitandrina ny fanekena amin’Andriamanitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy nety nandeha araka ny lalàny;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nanadino ny asany izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fahagagana izay nampahitany azy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Teo anatrehan’ny razany no nanaovany fahagagana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tany amin’ny tany Egypta, dia tany amin’ny tany lemak’i Zoana.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nampisaraka ny ranomasina Izy ka nitondra azy nita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nampijanona ny rano ho toy ny antontan-javatra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary ny rahona no nitondrany azy raha antoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy afo mahazava nony alina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Namaky vatolampy tany an-efitra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampisotro azy nanaram-po tahaka ny amin’ny rano lalina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary nampivoaka rano mandriaka avy tamin’ny haram-bato Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampirotsaka rano ho tahaka ny ony.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Kanjo mbola nandroso nanota taminy ihany izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampahatezitra ny Avo Indrindra tany an-efitra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia naka fanahy an’Andriamanitra tam-pony izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny nilany hanina araka ny nahaliana azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia niteny nanohitra an’Andriamanitra izy ka nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahavelatra latabatra atỳ an-efitra va Andriamanitra?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hiloa-bava hilaza fanoharana aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanonona teny saro-pantarina fony taloha aho.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Indro, namely ny vatolampy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nigororoana ny rano ka nandriaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahay manome mofo koa va Izy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatonga hena ho an’ny olony va Izy?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Koa nony ren’i Jehovah izany, dia tezitra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nisy afo nirehitra tamin’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nisy fahatezerana namely ny Isiraely,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Satria tsy nino an’Andriamanitra izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy natoky ny famonjeny.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Kanefa nandidy ny rahona tany ambony Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny varavaran’ny lanitra no novohany,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia nandatsaka mana teny aminy hohaniny Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary varin’ny lanitra no nomeny azy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny fihinan’ny mahery no nohanin’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nanaterany hanina hahavoky azy izy.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Nampandeha ny rivotra avy any atsinanana teny amin’ny lanitra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny heriny no nitondrany ny rivotra avy any atsimo.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia nampilatsahany hena betsaka hoatra ny vovoka izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy voro-manidina hoatra ny fasiky ny ranomasina,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ka nalatsany teny afovoan’ny tobiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manodidina ny fitoerany.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia nihinana izy ireo ka voky tsara;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay nilainy dia nomeny azy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izay efa rentsika sy fantatsika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nambaran’ny razantsika tamintsika
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Nefa tsy niala tamin’ny filany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mbola teo am-bavany ihany ny haniny;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Dia nirehitra taminy ny fahatezeran’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nahafatesany ny tremalahy teo aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary naripany ny zatovolahin’ny Isiraely.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Fa na dia izany rehetra izany aza, dia mbola nanota ihany izy ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nino ny fahagagana nataony.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia nampahalevona ny androny toy ny fofonaina Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taonany tamin’ny fampitahorana.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Raha novonoiny izy ireo, dia nitady hahalala an’Andriamanitra izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary niverina nikatsaka Azy.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Dia nahatsiaro izy fa Andriamanitra no Vatolampiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Andriamanitra Avo Indrindra no Mpanavotra azy.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Kanefa nanao vava malefaka taminy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lelany no nandaingany taminy.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Ary ny fony tsy niorina taminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tsy nitana ny fanekeny izy.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Nefa Andriamanitra kosa be famindrampo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mamela heloka ka tsy mandringana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nahatsindry fo tokoa Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy nofohaziny avokoa ny fahavinirany.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Fa nahatsiaro Izy fa nofo ihany ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia rivotra izay mandalo ka tsy miverina intsony.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia tsy mba hafenintsika amin’ny zanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hambarantsika amin’ny taranaka ho avy ny fiderana an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny heriny ary ny fahagagana izay efa nataony.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Impiry akory izy ireo no efa niodina taminy tany an-efitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampalahelo Azy tany amin’ny tany foana!
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Naka fanahy an’Andriamanitra mandrakariva izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nampalahelo ny Iray Masin’ny Isiraely.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Tsy mba nahatsiaro ny tànany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny andro izay nanavotany azy tamin’ny fahavalo,
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Izay nanaovany famantarana tany Egypta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy fahagagana tany an-tany lemak’i Zoana:'
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Nampody ny oniny ho ra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny reniranony tsy azony nisotroana.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Nandefa lalitra betsaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.45 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fihitra, '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'na '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: kalalao.
      marker-yv: yv-n
    - type: text
      text: ' hamely azy Izy, ka nandany azy ireny,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary sahona, ka nanimba azy ireny.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Dia nanome ny vokatry ny taniny ho an’ny sompanga Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny asany ho an’ny valala.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Namono ny voalobony tamin’ny havandra Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny aviaviny tamin’ny havandra vaventy.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Dia nanolotra ny biby fiompiny ho an’ny havandra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny omby aman-ondriny ho an’ny varatra.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Nandatsaka ny fahatezerany mirehitra taminy Izy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, fahavinirana sy fahatezerana ary fampahoriana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia anjely andiany mitondra loza.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa nanorina teni-vavolombelona teo amin’i Jakoba Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary teo amin’Isiraely no nametrahany lalàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nandidiany ny razantsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampahafantariny ny zanany;
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Namboatra làlana ho an’ny fahatezerany Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy niaro ny fanahin’ireo tamin’ny fahafatesana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa nanolotra ny ainy ho lanin’ny areti-mandringana;
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Ary namely ny lahimatoa rehetra tany Egypta Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny voalohan’ainy tany an-dain’i Hama;
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Fa namindra toerana ny olony toy ny ondry Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nitondra azy tany an-efitra toy ny ondry andiany.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Nentiny soa aman-tsara izy ireo ka tsy mba natahotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahavalony kosa voasaron’ny ranomasina.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Ary nitondra azy ho any amin’ny tany misy ny fitoerany masina Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny tendrombohitra izay azon’ny tànany ankavanana.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: Ary nandroaka ny jentilisa teo anoloany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanome ny tanin’ireny ho lova nozaraina tamin’ny famolaina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nampitoetra ny firenen’Isiraely tao an-dainy.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Nefa naka fanahy an’Andriamanitra Avo Indrindra izy ka niodina taminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny teni-vavolombelony tsy notandremany.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Ary nihemotra izy ka nivadika tahaka ny razany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nania tahaka ny tsipìka manjiona.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: Ary nampahatezitra Azy tamin’ny fitoerana avony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady nahasaro-piaro Azy tamin’ny sarin-javatra voasokitra.
  '59':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: Ary nandre izany Andriamanitra, dia tezitra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nolaviny mihitsy ny Isiraely,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mba hahafantatra izany ny taranaka ho avy–dia ny zaza mbola hateraka–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hitsangana hitory izany amin’ny zanany kosa,
  '60':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: Sady nahafoy ny tabernakeliny tao Silo Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny lay izay naoriny teo amin’ny olona;
  '61':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Dia natolony ho babo ny heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny voninahiny ho eo an-tànan’ny fahavalo.
  '62':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: Dia nanolotra ny olony ho an’ny sabatra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tezitra indrindra tamin’ny lovany Izy.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: Ny zatovolahiny dia lanin’ny afo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zatovovaviny tsy mba nanaovana hiram-panambadiana.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Ny mpisorony lavon-tsabatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa ny mpitondratenan’ireo tsy nisaona.
  '65':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
