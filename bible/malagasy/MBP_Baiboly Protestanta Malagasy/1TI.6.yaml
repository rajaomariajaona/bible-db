document_id: 1TI.6,873
type_code: plt
verses:
  '1':
  - type: text
    content: Aoka izay andevo rehetra eo ambanin’ny zioga hanao ny tompony ho miendrika hohajaina tsara, mba tsy hitenenana ratsy
  - type: note
    content: Gr. hasiana blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' ny anaran’Andriamanitra sy ny fampianarana. '
  '10':
  - type: text
    content: Fa ny fitiavam-bola no fototry ny ratsy rehetra, koa ny sasany izay fatra-pitady izany dia efa voavily niala tamin’ny finoana ka nanindrona ny tenany tamin’ny alahelo be.
  '11':
  - type: text
    content: 'Fa hianao kosa, ry lehilahin’Andriamanitra, mandosira izany zavatra izany, ka miezaha mitady fahamarinana, toe-panahy araka an’Andriamanitra, finoana, fitiavana, faharetana, fahalemem-panahy. '
  '12':
  - type: text
    content: 'Miadia ny ady tsaran’ny finoana, hazòny ny fiainana mandrakizay; fa ho amin’izany no niantsoana anao koa sy nanaovanao ilay fanekena tsara teo imason’ny vavolombelona maro. '
  '13':
  - type: text
    content: 'Izaho mananatra anao eo anatrehan’Andriamanitra, Izay mamelona ny zavatra rehetra, ary eo anatrehan’i Kristy Jesosy, Izay nanao ilay fanekena tsara teo anatrehan’i Pontio Pilato, '
  '14':
  - type: text
    content: 'mba hotehirizinao tsy hanan-tsiny amam-pondro hatramin’ny fisehoan’i Jesosy Kristy Tompontsika izany didy izany; '
  '15':
  - type: text
    content: 'ny Andriana finaritra sady tokana, Mpanjakan’ny mpanjaka sy Tompon’ny tompo, no haneho izany amin’ny fotoany; '
  '16':
  - type: text
    content: Izy ihany no manana ny tsi-fahafatesana, mitoetra eo amin’ny mazava tsy azo atonina Izay tsy hitan’olona sady tsy hainy jerena; ho Azy anie ny voninahitra sy ny fanjakana mandrakizay. Amena.
  '17':
  - type: text
    content: Anaro ny mpanan-karena amin’izao fiainana ankehitriny izao mba tsy hiavonavona, na hatoky ny harena miovaova,
  - type: note
    content: Gr. fiovaovan’ny harena.
  - type: text
    content: ' fa Andriamanitra, Izay manome antsika malalaka ny zavatra rehetra mba hifaliantsika, '
  '18':
  - type: text
    content: 'mba hanao soa, mba hanan-karena amin’ny asa tsara, hazoto manome sy miantra, '
  '19':
  - type: text
    content: ka dia hihary fanorenana tsara ho an’ny tenany ho amin’ny andro ho avy, mba hihazonany ny tena fiainana.
  '2':
  - type: text
    content: Ary izay manana tompo mino dia aoka tsy hanao tsinontsinona azy, satria rahalahy izy; fa vao mainka tokony hotompoiny aza izy, satria mino sy malala ilay mpandray ny soa atao. Izany zavatra izany no ampianaro sy ananaro.
  - type: heading
    content: Fananarana sy teny farany ho an’i Timoty.
  '20':
  - type: text
    content: 'Ry Timoty, tehirizo ilay natolotra '
  - type: text
    content: anao,
  - type: text
    content: ' ka mialà amin’ny fibedibedena foana sy ny fanoherana avy amin’izay atao hoe fahalalana, kanjo tsy izy, '
  '21':
  - type: text
    content: izay neken’ny sasany, ka nania tamin’ny finoana izy.
  - type: text
    content: Ho aminareo anie ny fahasoavana.
  '3':
  - type: text
    content: RAHA misy olona manao fampianarana hafa noho izany ka tsy manaiky ny teny tsy misy kilema,
  - type: note
    content: Gr. salama.
  - type: text
    content: ' dia ny an’i Jesosy Kristy Tompontsika, sy ny fampianarana izay mahatonga ny toe-panahy araka an’Andriamanitra, '
  '4':
  - type: text
    content: dia mieboebo foana izy ka tsy mahalala na inona na inona, fa adala
  - type: note
    content: Gr. marary.
  - type: text
    content: ' amin’ny fiadian-kevitra sy ny fiadian-teny izay mahatonga fialonana, fifandirana, fanaratsiana, fiahiahian-dratsy, '
  '5':
  - type: text
    content: 'fifandirana lalandava, fanaon’ny olona vetaveta saina sady efa nialan’ny fahamarinana, manao ny toe-panahy araka an’Andriamanitra ho fahazoan-javatra. '
  '6':
  - type: text
    content: 'Fa misy tombony lehibe tokoa ny toe-panahy araka an’Andriamanitra omban’ny fianinana. '
  '7':
  - type: text
    content: 'Fa tsy nitondra na inona na inona ho amin’izao tontolo izao isika, '
  - type: text
    content: sady hita
  - type: text
    content: ' fa'
  - type: note
    content: 'Na: satria.'
  - type: text
    content: ' tsy hahatondra na inona na inona hiala. '
  '8':
  - type: text
    content: 'Fa raha manan-kanina sy fitafiana isika, dia aoka hianina amin’izany. '
  '9':
  - type: text
    content: 'Ary izay ta-hanan-karena dia latsaka amin ny fakam-panahy sy ny fandrika ary ny filana maro tsy misy antony sady mandratra, izay mandentika ny olona ao amin’ny fandringanana sy ny fahaverezana. '
