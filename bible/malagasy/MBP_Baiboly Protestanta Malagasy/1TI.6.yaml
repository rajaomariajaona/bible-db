document_id: 1TI.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aoka izay andevo rehetra eo ambanin’ny zioga hanao ny tompony ho miendrika hohajaina tsara, mba tsy hitenenana ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hasiana blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' ny anaran’Andriamanitra sy ny fampianarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary izay manana tompo mino dia aoka tsy hanao tsinontsinona azy, satria rahalahy izy; fa vao mainka tokony hotompoiny aza izy, satria mino sy malala ilay mpandray ny soa atao. Izany zavatra izany no ampianaro sy ananaro.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana sy teny farany ho an’i Timoty.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: RAHA misy olona manao fampianarana hafa noho izany ka tsy manaiky ny teny tsy misy kilema,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: salama.
    marker-yv: yv-n
  - type: text
    text: ' dia ny an’i Jesosy Kristy Tompontsika, sy ny fampianarana izay mahatonga ny toe-panahy araka an’Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: dia mieboebo foana izy ka tsy mahalala na inona na inona, fa adala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: marary.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny fiadian-kevitra sy ny fiadian-teny izay mahatonga fialonana, fifandirana, fanaratsiana, fiahiahian-dratsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fifandirana lalandava, fanaon’ny olona vetaveta saina sady efa nialan’ny fahamarinana, manao ny toe-panahy araka an’Andriamanitra ho fahazoan-javatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa misy tombony lehibe tokoa ny toe-panahy araka an’Andriamanitra omban’ny fianinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy nitondra na inona na inona ho amin’izao tontolo izao isika, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sady hita
  - type: text
    text: ' fa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: satria.
    marker-yv: yv-n
  - type: text
    text: ' tsy hahatondra na inona na inona hiala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha manan-kanina sy fitafiana isika, dia aoka hianina amin’izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izay ta-hanan-karena dia latsaka amin ny fakam-panahy sy ny fandrika ary ny filana maro tsy misy antony sady mandratra, izay mandentika ny olona ao amin’ny fandringanana sy ny fahaverezana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny fitiavam-bola no fototry ny ratsy rehetra, koa ny sasany izay fatra-pitady izany dia efa voavily niala tamin’ny finoana ka nanindrona ny tenany tamin’ny alahelo be.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hianao kosa, ry lehilahin’Andriamanitra, mandosira izany zavatra izany, ka miezaha mitady fahamarinana, toe-panahy araka an’Andriamanitra, finoana, fitiavana, faharetana, fahalemem-panahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Miadia ny ady tsaran’ny finoana, hazòny ny fiainana mandrakizay; fa ho amin’izany no niantsoana anao koa sy nanaovanao ilay fanekena tsara teo imason’ny vavolombelona maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izaho mananatra anao eo anatrehan’Andriamanitra, Izay mamelona ny zavatra rehetra, ary eo anatrehan’i Kristy Jesosy, Izay nanao ilay fanekena tsara teo anatrehan’i Pontio Pilato, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'mba hotehirizinao tsy hanan-tsiny amam-pondro hatramin’ny fisehoan’i Jesosy Kristy Tompontsika izany didy izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny Andriana finaritra sady tokana, Mpanjakan’ny mpanjaka sy Tompon’ny tompo, no haneho izany amin’ny fotoany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izy ihany no manana ny tsi-fahafatesana, mitoetra eo amin’ny mazava tsy azo atonina Izay tsy hitan’olona sady tsy hainy jerena; ho Azy anie ny voninahitra sy ny fanjakana mandrakizay. Amena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Anaro ny mpanan-karena amin’izao fiainana ankehitriny izao mba tsy hiavonavona, na hatoky ny harena miovaova,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiovaovan’ny harena.
    marker-yv: yv-n
  - type: text
    text: ' fa Andriamanitra, Izay manome antsika malalaka ny zavatra rehetra mba hifaliantsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'mba hanao soa, mba hanan-karena amin’ny asa tsara, hazoto manome sy miantra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ka dia hihary fanorenana tsara ho an’ny tenany ho amin’ny andro ho avy, mba hihazonany ny tena fiainana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ry Timoty, tehirizo ilay natolotra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anao,
  - type: text
    text: ' ka mialà amin’ny fibedibedena foana sy ny fanoherana avy amin’izay atao hoe fahalalana, kanjo tsy izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: izay neken’ny sasany, ka nania tamin’ny finoana izy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ho aminareo anie ny fahasoavana.
