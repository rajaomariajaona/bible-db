document_id: PSA.145,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Salamo abidy. Fiderana an’Andriamanitra, Mpanjaka be indrafo.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fideran’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: HANANDRATRA Anao aho, ry Andriamanitro Mpanjaka ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hankalaza ny anaranao mandrakizay doria.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Jehovah ô, midera Anao ny asanao rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny olonao masina misaotra Anao.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Milaza ny voninahitry ny fanjakanao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady miresaka ny herinao,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mba hampahafantarina ny zanak’olombelona ny herinao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: heriny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny haben’ny voninahitry ny fanjakanao.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanjakany.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fanjakana mandrakizay ny fanjakanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hihatra amin’ny taranaka fara mandimby ny fanapahanao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Jehovah manohana izay rehetra efa ho lavo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mampitraka izay rehetra mitanondrika.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny mason’izao rehetra izao miandrandra Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Hianao manome azy ny haniny amin’ny fotoany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Manokatra ny tànanao Hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mahavoky soa ny zava-miaina rehetra.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Marina Jehovah amin’ny làlany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mamindra fo amin’ny asany rehetra.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Jehovah dia eo akaikin’izay rehetra miantso Azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay rehetra miantso Azy marina tokoa.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hanefa ny irin’izay matahotra Azy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hihaino ny fitarainany ka hamonjy azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hankalaza Anao isan-andro aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hidera ny anaranao mandrakizay doria.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Miaro izay rehetra tia Azy Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny ratsy fanahy rehetra kosa haringany.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny fiderana an’i Jehovah no hotenenin’ny vavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ny nofo rehetra hankalaza ny anarany masina mandrakizay doria.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Lehibe Jehovah ka tokony hoderaina indrindra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy takatry ny saina ny fahalehibiazany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny taranaka rehetra samy hidera ny asanao amin’izay mandimby azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanambara ny asanao lehibe.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny lazan’ny voninahitry ny fiandriananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny asanao mahagaga no hosaintsainiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny herin’ny asanao mahatahotra no hotenenin’ny olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahalehibiazanao no holazaiko.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hanonona ny fahatsiarovana ny haben’ny fahatsaranao izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hihoby ny fahamarinanao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mamindra fo sy miantra Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahari-po sady be famindrampo Izy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Manisy soa izao tontolo izao Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fiantràny dia eny amin’ny asany rehetra.
