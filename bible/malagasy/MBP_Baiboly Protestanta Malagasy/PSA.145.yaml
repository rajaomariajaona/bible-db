document_id: PSA.145,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fiderana an’Andriamanitra, Mpanjaka be indrafo.
  - type: text
    content: Fideran’i Davida.
  - type: text
    content: HANANDRATRA Anao aho, ry Andriamanitro Mpanjaka ô,
  - type: text
    content: Sy hankalaza ny anaranao mandrakizay doria.
  '10':
  - type: text
    content: Jehovah ô, midera Anao ny asanao rehetra;
  - type: text
    content: Ary ny olonao masina misaotra Anao.
  '11':
  - type: text
    content: Milaza ny voninahitry ny fanjakanao izy
  - type: text
    content: Sady miresaka ny herinao,
  '12':
  - type: text
    content: Mba hampahafantarina ny zanak’olombelona ny herinao
  - type: note
    content: Heb. heriny.
  - type: text
    content: Sy ny haben’ny voninahitry ny fanjakanao.
  - type: note
    content: Heb. fanjakany.
  '13':
  - type: text
    content: Fanjakana mandrakizay ny fanjakanao,
  - type: text
    content: Ary hihatra amin’ny taranaka fara mandimby ny fanapahanao.
  '14':
  - type: text
    content: Jehovah manohana izay rehetra efa ho lavo
  - type: text
    content: Sy mampitraka izay rehetra mitanondrika.
  '15':
  - type: text
    content: Ny mason’izao rehetra izao miandrandra Anao,
  - type: text
    content: Ary Hianao manome azy ny haniny amin’ny fotoany.
  '16':
  - type: text
    content: Manokatra ny tànanao Hianao
  - type: text
    content: Ka mahavoky soa ny zava-miaina rehetra.
  '17':
  - type: text
    content: Marina Jehovah amin’ny làlany rehetra,
  - type: text
    content: Sady mamindra fo amin’ny asany rehetra.
  '18':
  - type: text
    content: Jehovah dia eo akaikin’izay rehetra miantso Azy,
  - type: text
    content: Dia izay rehetra miantso Azy marina tokoa.
  '19':
  - type: text
    content: Hanefa ny irin’izay matahotra Azy Izy
  - type: text
    content: Ary hihaino ny fitarainany ka hamonjy azy.
  '2':
  - type: text
    content: Hankalaza Anao isan-andro aho
  - type: text
    content: Sy hidera ny anaranao mandrakizay doria.
  '20':
  - type: text
    content: Miaro izay rehetra tia Azy Jehovah;
  - type: text
    content: Fa ny ratsy fanahy rehetra kosa haringany.
  '21':
  - type: text
    content: Ny fiderana an’i Jehovah no hotenenin’ny vavako;
  - type: text
    content: Ary aoka ny nofo rehetra hankalaza ny anarany masina mandrakizay doria.
  '3':
  - type: text
    content: Lehibe Jehovah ka tokony hoderaina indrindra;
  - type: text
    content: Ary tsy takatry ny saina ny fahalehibiazany.
  '4':
  - type: text
    content: Ny taranaka rehetra samy hidera ny asanao amin’izay mandimby azy
  - type: text
    content: Sy hanambara ny asanao lehibe.
  '5':
  - type: text
    content: Ny lazan’ny voninahitry ny fiandriananao
  - type: text
    content: Sy ny asanao mahagaga no hosaintsainiko.
  '6':
  - type: text
    content: Ny herin’ny asanao mahatahotra no hotenenin’ny olona;
  - type: text
    content: Ary ny fahalehibiazanao no holazaiko.
  '7':
  - type: text
    content: Hanonona ny fahatsiarovana ny haben’ny fahatsaranao izy
  - type: text
    content: Sy hihoby ny fahamarinanao.
  '8':
  - type: text
    content: Mamindra fo sy miantra Jehovah;
  - type: text
    content: Mahari-po sady be famindrampo Izy.
  '9':
  - type: text
    content: Manisy soa izao tontolo izao Jehovah;
  - type: text
    content: Ary ny fiantràny dia eny amin’ny asany rehetra.
