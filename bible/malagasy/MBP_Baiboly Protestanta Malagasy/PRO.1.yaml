document_id: PRO.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarihan-teny.
  - type: text
    content: 'NY Ohabolan’i Solomona, zanak’i Davida, mpanjakan’ny Isiraely:'
  '10':
  - type: text
    content: Anaka, raha taomin’ny mpanota hianao,
  - type: text
    content: Aza manaiky.
  '11':
  - type: text
    content: 'Raha hoy izy: Andeha hiaraka isika,'
  - type: text
    content: Aoka isika hanotrika handatsa-dra;
  - type: text
    content: Andeha hamitsahantsika tsy ahoan-tsy ahoana ny tsy manan-tsiny;
  '12':
  - type: text
    content: Aoka isika hitelina azy velona tahaka ny fitelin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: Ary hanao azy telimoka toy ny latsaka any an-davaka;
  '13':
  - type: text
    content: Dia ho azontsika ny fananana saro-bidy rehetra,
  - type: text
    content: Ka hofenointsika babo ny tranontsika;
  '14':
  - type: text
    content: Avia mba hiara-miloka eto aminay;
  - type: text
    content: Aoka ho iray ihany ny kitapom-bolantsika rehetra.
  '15':
  - type: text
    content: Anaka, aza miara-dàlana aminy hianao;
  - type: text
    content: Arovy ny tongotrao tsy hankamin’ny alehany;
  '16':
  - type: text
    content: Fa ny tongony mihazakazaka ho amin’ny ratsy
  - type: text
    content: Sady faingana handatsa-dra.
  '17':
  - type: text
    content: Fa velarim-poana ny fandrika,
  - type: text
    content: Raha hitan’ny vorona.
  '18':
  - type: text
    content: Fa ireny dia manotrika handatsaka ny ran’ny tenany ihany;
  - type: text
    content: Mamitsaka hahafaty ny tenany ihany izy.
  '19':
  - type: text
    content: Toy izany no iafaran’izay rehetra fatra-pila harena;
  - type: text
    content: Fa hipaoka ny ain’izay fatra-pila azy izany.
  - type: heading
    content: Fiantsoana sy fananarana ataon’ny fahendrena.
  '2':
  - type: text
    content: Hahalalana fahendrena sy fananarana
  - type: text
    content: Ary hahafantarana ny tenin’ny fahalalana;
  '20':
  - type: text
    content: NY fahendrena miantso mafy eny ivelany;
  - type: text
    content: Manandratra ny feony eny an-kalalahana izy;
  '21':
  - type: text
    content: Mitory ao amin’izay fivorian’ny maro be mireondreona izy;
  - type: text
    content: 'Eo anoloan’ny vavahady sy ao an-tanàna no ilazany ny teniny hoe:'
  '22':
  - type: text
    content: Ry kely saina, mandra-pahoviana no hitiavanareo ny fahadalana,
  - type: text
    content: Sy hifalian’ny mpaniratsira amin’ny faniratsirana,
  - type: text
    content: Ary hankahalan’ny adala ny fahalalana?
  '23':
  - type: text
    content: Miverena hianareo hihaino ny fananarako;
  - type: text
    content: Indro, haidiko aminareo ny fanahiko,
  - type: text
    content: Ary hampahafantariko anareo ny teniko.
  '24':
  - type: text
    content: Satria efa niantso Aho, fa nandà hianareo;
  - type: text
    content: Efa naninjitra ny tànako Aho, fa tsy nisy nitandrina;
  '25':
  - type: text
    content: Fa nolavinareo ny saina rehetra natolotro,
  - type: text
    content: 'Sady tsy nety nanaiky ny anatro hianareo:'
  '26':
  - type: text
    content: Izaho kosa hihomehy, raha tonga ny fandringanana anareo;
  - type: text
    content: Handatsa Aho, raha tonga ny mahatahotra anareo.
  '27':
  - type: text
    content: Raha tonga ny zava-mahatahotra anareo tahaka ny rivo-doza
  - type: text
    content: Ary ny fandringanana anareo toy ny tadio,
  - type: text
    content: Ka manjo anareo ny fahoriana sy ny fangirifiriana,
  '28':
  - type: text
    content: Dia vao hiantso Ahy izy, fa tsy hamaly Aho;
  - type: text
    content: Dia vao hitady Ahy fatratra izy, fa tsy ho hitany Aho.
  '29':
  - type: text
    content: Satria nankahala ny fahalalana izy
  - type: text
    content: Ary tsy nifidy ny fahatahorana an’i Jehovah,
  '3':
  - type: text
    content: Hahazoana fananarana mampahahendry,
  - type: text
    content: Dia fahamarinana sy rariny ary fahitsiana;
  '30':
  - type: text
    content: Tsy nekeny ny saina natolotro,
  - type: text
    content: Notsiratsirainy avokoa ny anatro rehetra.
  '31':
  - type: text
    content: Dia hihinana ny vokatry ny alehany izy
  - type: text
    content: Ka ho voky ny fihendreny.
  '32':
  - type: text
    content: Fa ny fihemoran’ny kely saina hahafaty azy,
  - type: text
    content: Ary ny fiadanan’ny adala handringana azy.
  '33':
  - type: text
    content: Fa izay mihaino Ahy kosa hitoetra tsy manana ahiahy,
  - type: text
    content: Eny, handry fahizay izy ka tsy hatahotra ny ratsy.
  '4':
  - type: text
    content: Hanomezam-pahendrena ho an’ny kely saina
  - type: text
    content: Ary fahalalana sy fisainana mazava ho an’ny zatovo.
  '5':
  - type: text
    content: Aoka ny hendry hihaino ka hitombo saina;
  - type: text
    content: Ary aoka ny manam-panahy hahazo fitarihana tsara;
  '6':
  - type: text
    content: Hahafantarana ohabolana sy fanoharana
  - type: text
    content: Ary ny tenin’ny hendry sy ny teny saro-pantarina ataony.
  '7':
  - type: text
    content: Ny fahatahorana an’i Jehovah no fiandoham-pahalalana;
  - type: text
    content: Fa ny adala manamavo ny fahendrena sy ny famaizana.
  - type: heading
    content: Fananarana tsy hikambana amin’ny mpanao ratsy.
  '8':
  - type: text
    content: ANAKA, mihainoa ny ana-drainao,
  - type: text
    content: Ary aza mahafoy ny lalàn-dreninao;
  '9':
  - type: text
    content: Fa fehiloha tsara tarehy amin’ny lohanao izany
  - type: text
    content: Ary rado amin’ny vozonao.
