document_id: PSA.61
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fangatahan’ny mpanjaka efa nandositra, mba hampodin’Andriamanitra indray.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Nataon’ Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: HENOY ny fitarainako, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tandremo ny fivavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Any am-paran’ny tany no hiantsoako Anao, raha reraka ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ento aho ho any amin’ny vatolampy izay avo ka tsy tratro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa aroko Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tilikambo mafy handosirako ny fahavalo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka hitoetra ao an-tranonao mandrakizay aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hialoka ao ambanin’ny fanomban’ny elatrao aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa Hianao, Andriamanitra ô, efa nandre ny voadiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nomenao ahy ny lovan’izay matahotra ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Halavao ny andron’ny mpanjaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny taonany hahatratra ny taranaka maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka hitoetra eo anatrehan’Andriamanitra mandrakizay izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Famindrampo sy fahamarinana no tendreo hiaro azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ka dia izany no hankalazako ny anaranao mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanefako isan-andro ny voadiko.
