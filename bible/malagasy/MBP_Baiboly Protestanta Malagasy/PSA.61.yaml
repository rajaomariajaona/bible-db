document_id: PSA.61,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangatahan’ny mpanjaka efa nandositra, mba hampodin’Andriamanitra indray.
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Nataon’ Davida.
  - type: text
    content: HENOY ny fitarainako, Andriamanitra ô;
  - type: text
    content: Tandremo ny fivavako.
  '2':
  - type: text
    content: Any am-paran’ny tany no hiantsoako Anao, raha reraka ny foko;
  - type: text
    content: Ento aho ho any amin’ny vatolampy izay avo ka tsy tratro;
  '3':
  - type: text
    content: Fa aroko Hianao
  - type: text
    content: Sy tilikambo mafy handosirako ny fahavalo.
  '4':
  - type: text
    content: Aoka hitoetra ao an-tranonao mandrakizay aho;
  - type: text
    content: Aoka hialoka ao ambanin’ny fanomban’ny elatrao aho,
  '5':
  - type: text
    content: Fa Hianao, Andriamanitra ô, efa nandre ny voadiko;
  - type: text
    content: Efa nomenao ahy ny lovan’izay matahotra ny anaranao.
  '6':
  - type: text
    content: Halavao ny andron’ny mpanjaka;
  - type: text
    content: Aoka ny taonany hahatratra ny taranaka maro.
  '7':
  - type: text
    content: Aoka hitoetra eo anatrehan’Andriamanitra mandrakizay izy;
  - type: text
    content: Famindrampo sy fahamarinana no tendreo hiaro azy;
  '8':
  - type: text
    content: Ka dia izany no hankalazako ny anaranao mandrakizay,
  - type: text
    content: Mba hanefako isan-andro ny voadiko.
