document_id: JER.39
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanafahana an’i Jerosalema, sy ny nanjo an’i Zedekia, ary ny nanesorana an’i Jeremia tao an-davaka, sy ny teny nasain’Andriamanitra nolazainy tamin’i Ebeda-meleka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa afaka Jerosalema (tamin’ny volana fahafolo tamin’ny taona fahasivy nanjakan’i Zedekia, mpanjakan’ny Joda, no nahatongavan’i Nebokadnezara, mpanjakan’i Babylona, sy ny miaramilany rehetra hamely an’i Jerosalema ka nanao fahirano azy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary nony tamin’ny andro fahasivy tamin’ny volana fahefatra tamin’ny taona fahiraika ambin’ny folo nanjakan’i Zedekia, dia nisy voabanga ny tanàna), '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia niditra ny mpanapaky ny mpanjakan’i Babylona rehetra ka nipetraka teo amin’ny vavahady ampovoany, dia Nergala-sarezera sy Samgarnebo sy Sarsekima, Raba-sarisa, sy Nergala-sarezera, Raba-magy, mbamin’ny sisa rehetra amin’ny mpanapaky ny mpanjakan’i Babylona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa nahita ireo Zedekia, mpanjakan’ny Joda, sy ny miaramila rehetra, dia nandositra izy ka lasa nandeha alina niala tao an-tanàna, nahazo ny làlana mankamin’ny sahan’ny mpanjaka, tamin’ny vavahady eo anelanelan’ny mànda roa; ary lasa nivoaka nankany amin’ny làlana mankeny amin’ny tani-hay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny miaramilan’ny Kaldeana nanenjika azy ka nahatratra an’i Zedekia teny amin’ny tani-hay any Jeriko; ary nony azony izy, dia nentiny niakatra ho any amin’i Nebokadnezara, mpanjakan’i Babylona, tao Ribla tao amin’ny tany Hamata; ka dia notsarainy tao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny zanakalahin’i Zedekia dia novonoin’ny mpanjakan’i Babylona tao Ribla teo imason-drainy; ary ny manan-kaja rehetra tamin’ny Joda koa dia novonoin’ny mpanjakan’i Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nopotsiriny ny mason’i Zedekia, dia nafatony tamin’ny gadra varahina izy ho entiny any Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary nodoran’ny Kaldeana tamin’ny afo ny tranon’ny mpanjaka sy ny tranon’ny vahoaka, ary ny màndan’i Jerosalema noravany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny olona sisa tao an-tanàna sy izay efa nanatona azy ary ny vahoaka sisa koa dia nentin’i Nebozaradana, lehiben’ny mpiambina, ho babo tany Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nefa ny olona malahelo izay tsy nanana na inona na inona kosa dia nisy ihany navelan’i Nebozaradana, lehiben’ny mpiambina, tao amin’ny tanin’ny Joda sady nomeny tanimboaloboka sy tanimboly tamin’izany andro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Nebokadnezara, mpanjakan’i Babylona, nanome teny an’i Nebozaradana, lehiben’ny mpiambina, ny amin’i Jeremia nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ento izy, ka tandremo tsara, fa aza asian-dratsy; fa araka izay lazainy aminao no ataovy aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Nebozaradana, lehiben’ny mpiambina, sy Nebosazbana, Raba-sarisa, sy Nergala-sarezera, Raba-magy, ary ny mpanapaky ny mpanjakan’i Babylona rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dia naniraka haka an’i Jeremia teo amin’ny kianjan’ny trano fiambenana, ka natolony an’i Gedalia, zanak’i Ahikama, zanak’i Safana, mba ho entiny any an-trano izy, ka dia nitoetra tao amin’ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tonga tamin’i Jeremia ny tenin’i Jehovah, fony izy mbola voahazona tao amin’ny kianjan’ny trano fiambenana ihany, nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mandehana, ka lazao amin’i Ebeda-meleka Etiopiana hoe: Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Indro, hotoviko amin’ity tanàna ity ny teniko hahatonga loza, fa tsy soa; ary ho tanteraka eo imasonao izany amin’izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa hovonjeko hianao amin’izany andro izany, hoy Jehovah, fa tsy mba hatolotra eo an-tànan’ny olona izay atahoranao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa hovonjeko tokoa hianao ka tsy holavon-tsabatra; eny, ny ainao no ho babonao, satria efa natoky Ahy, hoy Jehovah.
