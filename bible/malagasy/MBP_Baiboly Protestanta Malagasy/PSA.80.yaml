document_id: PSA.80,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavahana ho an’ny Isiraely, voalobok’i Jehovah.
  - type: text
    content: Ho an’ny mpiventy hira. Al-shoshanim-edoth. Salamo nataon’i Asafa.
  - type: text
    content: RY Mpiandry ny Isiraely ô, mihainoa, Hianao Izay mitondra an’i Josefa toy ny ondry;
  - type: text
    content: Hianao, Izay mipetraka amin’ny kerobima, mamirapirata.
  '10':
  - type: text
    content: Nanaloka ny tendrombohitra ny alokalony,
  - type: text
    content: Ary ny sampany nanaloka ny sedera andrian-kazo.
  - type: note
    content: Heb. sederan’Andriamanitra.
  '11':
  - type: text
    content: Nampisandrahaka ny rantsany hatramin’ny ranomasina izy,
  - type: text
    content: Ary ny sakeliny hatramin’ny Ony.
  - type: note
    content: Eofrata.
  '12':
  - type: text
    content: Nahoana no noravanao ny fefiny,
  - type: text
    content: Ka anotazan’izay rehetra mandalo eny an-dàlana izy?
  '13':
  - type: text
    content: Ny lambo avy any an-ala mitrongy azy.
  - type: text
    content: Ary izay bibi-dia any an-tsaha mandany azy.
  '14':
  - type: text
    content: Ry Andriamanitry ny maro ô, miverena, ka tsinjovy any an-danitra, ary jereo,
  - type: text
    content: Ka vangio ity voaloboka ity.
  '15':
  - type: text
    content: Arovy
  - type: note
    content: 'Na: Dia.'
  - type: text
    content: ' izay nambolen’ny tànanao ankavanana'
  - type: text
    content: Sy ny zanaka izay nampaherezinao ho Anao.
  '16':
  - type: text
    content: Voadotry ny afo izy sady voakapa;
  - type: text
    content: Fongotry ny fananaran’ny tavanao izy.
  '17':
  - type: text
    content: Aoka ny tànanao ho amin’ny lehilahin’ny tànanao ankavanana,
  - type: text
    content: Dia amin’ny zanak’olombelona izay nampaherezinao ho Anao.
  '18':
  - type: text
    content: Dia tsy hihemotra hiala aminao izahay;
  - type: text
    content: Velomy izahay, dia hiantso ny anaranao.
  '19':
  - type: text
    content: Ry Jehovah, Andriamanitry ny maro, ô, ampodio izahay,
  - type: text
    content: Ampamirapirato ny tavanao, ary aoka hovonjena izahay.
  '2':
  - type: text
    content: Fohazy ny herinao
  - type: text
    content: Eo anoloan’i Efraima sy Benjamina ary Manase,
  - type: text
    content: Ka avia hamonjy anay.
  '3':
  - type: text
    content: Andriamanitra ô, ampodio izahay,
  - type: text
    content: Ka ampamirapirato ny tavanao, ary aoka hovonjena izahay.
  '4':
  - type: text
    content: Jehovah, Andriamanitry ny maro, ô,
  - type: text
    content: Mandra-pahoviana no hanetroka amin’ny fivavaky ny olonao
  - type: note
    content: 'Na: na dia mivavaka aza ny olonao.'
  - type: text
    content: ' ny fahatezeranao?'
  '5':
  - type: text
    content: Mampihinana azy mofo len-dranomaso Hianao,
  - type: text
    content: Ary mampisotro azy ranomaso tovozina.
  '6':
  - type: text
    content: Ataonao ho fifandirana amin’ny mifanila fonenana aminay izahay;
  - type: text
    content: Ary ny fahavalonay mifaly handatsa.
  '7':
  - type: text
    content: Andriamanitry ny maro ô, ampodio izahay,
  - type: text
    content: Ka ampamirapirato ny tavanao, ary aoka hovonjena izahay.
  '8':
  - type: text
    content: Nisy voaloboka nafindranao avy tany Egypta;
  - type: text
    content: Nandroaka ny jentilisa Hianao ka namboly azy kosa.
  '9':
  - type: text
    content: Nitevy teo alohany Hianao,
  - type: text
    content: Dia namaka lalina izy ka nameno ny tany.
