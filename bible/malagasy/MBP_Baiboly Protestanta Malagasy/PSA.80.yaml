document_id: PSA.80,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fivavahana ho an’ny Isiraely, voalobok’i Jehovah.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Al-shoshanim-edoth. Salamo nataon’i Asafa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: RY Mpiandry ny Isiraely ô, mihainoa, Hianao Izay mitondra an’i Josefa toy ny ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao, Izay mipetraka amin’ny kerobima, mamirapirata.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nanaloka ny tendrombohitra ny alokalony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sampany nanaloka ny sedera andrian-kazo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '80.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sederan’Andriamanitra.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nampisandrahaka ny rantsany hatramin’ny ranomasina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sakeliny hatramin’ny Ony.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '80.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eofrata.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nahoana no noravanao ny fefiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka anotazan’izay rehetra mandalo eny an-dàlana izy?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny lambo avy any an-ala mitrongy azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay bibi-dia any an-tsaha mandany azy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ry Andriamanitry ny maro ô, miverena, ka tsinjovy any an-danitra, ary jereo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka vangio ity voaloboka ity.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Arovy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '80.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dia.
      marker-yv: yv-n
    - type: text
      text: ' izay nambolen’ny tànanao ankavanana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny zanaka izay nampaherezinao ho Anao.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voadotry ny afo izy sady voakapa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fongotry ny fananaran’ny tavanao izy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Aoka ny tànanao ho amin’ny lehilahin’ny tànanao ankavanana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’ny zanak’olombelona izay nampaherezinao ho Anao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia tsy hihemotra hiala aminao izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Velomy izahay, dia hiantso ny anaranao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ry Jehovah, Andriamanitry ny maro, ô, ampodio izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampamirapirato ny tavanao, ary aoka hovonjena izahay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fohazy ny herinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eo anoloan’i Efraima sy Benjamina ary Manase,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka avia hamonjy anay.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Andriamanitra ô, ampodio izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ampamirapirato ny tavanao, ary aoka hovonjena izahay.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jehovah, Andriamanitry ny maro, ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no hanetroka amin’ny fivavaky ny olonao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '80.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: na dia mivavaka aza ny olonao.
      marker-yv: yv-n
    - type: text
      text: ' ny fahatezeranao?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mampihinana azy mofo len-dranomaso Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mampisotro azy ranomaso tovozina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ataonao ho fifandirana amin’ny mifanila fonenana aminay izahay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahavalonay mifaly handatsa.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Andriamanitry ny maro ô, ampodio izahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ampamirapirato ny tavanao, ary aoka hovonjena izahay.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nisy voaloboka nafindranao avy tany Egypta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nandroaka ny jentilisa Hianao ka namboly azy kosa.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nitevy teo alohany Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia namaka lalina izy ka nameno ny tany.
