document_id: 2CO.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa fantatsika fa raha ravana ny trano-laintsika etỳ an-tany, dia manana izay voarafitr’Andriamanitra isika, dia trano tsy nataon-tànana izay maharitra mandrakizay any an-danitra. '
  '10':
  - type: text
    content: Fa isika rehetra dia samy tsy maintsy ho hita toetra miharihary eo amin’ny fitsaran’i Kristy, mba handraisan’ny olona rehetra izay zavatra nataon’ny tenany, dia araka izay nataony, na tsara na ratsy.
  '11':
  - type: text
    content: 'Koa amin’izany, satria fantatsika ny fahatahorana ny Tompo, dia ny olona no ampanekenay, fa amin’Andriamanitra, kosa dia efa voaseho rahateo izahay, ary manantena aho fa voaseho ao amin’ny fieritreretanareo koa. '
  '12':
  - type: text
    content: Tsy midera tena indray aminareo izahay, fa manome anareo izay ho reharehanareo ny aminay, mba hisy havalinareo izay mirehareha ny amin’ny miseho
  - type: note
    content: Gr. tava.
  - type: text
    content: ' ihany, fa tsy amin’ny fo. '
  '13':
  - type: text
    content: 'Fa raha very saina izahay, dia ho an’Andriamanitra; fa raha tsy very saina izahay, dia ho anareo. '
  '14':
  - type: text
    content: 'Fa ny fitiavan’i Kristy no manery anay, satria izao no hevitray: maty ny Anankiray hamonjy ny olona rehetra, ka dia maty koa izy rehetra; '
  '15':
  - type: text
    content: ary maty hamonjy ny olona rehetra Izy, mba tsy ho velona ho an’ny tenany intsony izay velona, fa ho an’Izay efa maty sy nitsangana hamonjy azy.
  '16':
  - type: text
    content: 'Koa dia tsy mahalala olona intsony araka ny nofo isika; eny, na dia nahafantatra an’i Kristy araka ny nofo aza isika, ankehitriny dia tsy fantatsika '
  - type: text
    content: araka izany
  - type: text
    content: ' intsony Izy. '
  '17':
  - type: text
    content: 'Koa raha misy olona ao amin’i Kristy, dia olom-baovao izy; efa lasa ny zavatra taloha, indreo, efa tonga vaovao ireo. '
  '18':
  - type: text
    content: 'Fa izany rehetra izany dia avy amin’Andriamanitra, Izay nampihavana antsika taminy amin’ny alalan’i Kristy sady nanome anay ny fanompoana fampihavanana, '
  '19':
  - type: text
    content: 'dia izao: Andriamanitra ao amin’i Kristy no nampihavana izao tontolo izao taminy ka tsy nanisa ny fahadisoany; ary efa napetrany aminay ny teny fampihavanana.'
  '2':
  - type: text
    content: 'Ary misento ao anatin’ity isika ka maniry indrindra hitafy ny tranontsika izay avy any an-danitra koa; '
  '20':
  - type: text
    content: Koa dia iraka
  - type: note
    content: Gr. ambasadôra.
  - type: text
    content: ' solon’i Kristy izahay, toa an’Andriamanitra mampangataka anay aminareo, solon’i Kristy izahay ka mangataka indrindra aminareo hoe: mihavàna amin’Andriamanitra anie hianareo. '
  '21':
  - type: text
    content: Izay tsy nahalala ota dia efa nataony ota hamonjy antsika, mba ho tonga fahamarinan’Andriamanitra ao aminy kosa isika.
  '3':
  - type: text
    content: 'fa ho hita mitafy isika, fa tsy mba mitanjaka. '
  '4':
  - type: text
    content: 'Fa isika izay amin’izao lay izao dia misento noho ny mahavesatra antsika, satria tsy tiantsika ny hendahana, fa ny mba hotafiana koa, mba hatelin’ny fiainana ny mety maty. '
  '5':
  - type: text
    content: 'Ary Izay efa namboatra antsika ho amin’izany indrindra dia Andriamanitra, Izay efa nanome antsika ny santatry ny Fanahy. '
  '6':
  - type: text
    content: 'Koa matoky mandrakariva isika, ka fantatsika fa raha mitoetra eo amin’ny tena, dia tsy mitoetra any amin’ny Tompo '
  '7':
  - type: text
    content: '(fa finoana no andehanantsika, fa tsy fahitana); '
  '8':
  - type: text
    content: 'eny, matoky isika, ka aleontsika ny tsy hitoetra ao amin’ny tena, fa ny hitoetra any amin’ny Tompo. '
  '9':
  - type: text
    content: 'Koa dia ataontsika ho voninahitsika ny mba hankasitrahany antsika, na mitoetra, na tsy mitoetra. '
