document_id: 2CO.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa fantatsika fa raha ravana ny trano-laintsika etỳ an-tany, dia manana izay voarafitr’Andriamanitra isika, dia trano tsy nataon-tànana izay maharitra mandrakizay any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary misento ao anatin’ity isika ka maniry indrindra hitafy ny tranontsika izay avy any an-danitra koa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa ho hita mitafy isika, fa tsy mba mitanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa isika izay amin’izao lay izao dia misento noho ny mahavesatra antsika, satria tsy tiantsika ny hendahana, fa ny mba hotafiana koa, mba hatelin’ny fiainana ny mety maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Izay efa namboatra antsika ho amin’izany indrindra dia Andriamanitra, Izay efa nanome antsika ny santatry ny Fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa matoky mandrakariva isika, ka fantatsika fa raha mitoetra eo amin’ny tena, dia tsy mitoetra any amin’ny Tompo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '(fa finoana no andehanantsika, fa tsy fahitana); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'eny, matoky isika, ka aleontsika ny tsy hitoetra ao amin’ny tena, fa ny hitoetra any amin’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa dia ataontsika ho voninahitsika ny mba hankasitrahany antsika, na mitoetra, na tsy mitoetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa isika rehetra dia samy tsy maintsy ho hita toetra miharihary eo amin’ny fitsaran’i Kristy, mba handraisan’ny olona rehetra izay zavatra nataon’ny tenany, dia araka izay nataony, na tsara na ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa amin’izany, satria fantatsika ny fahatahorana ny Tompo, dia ny olona no ampanekenay, fa amin’Andriamanitra, kosa dia efa voaseho rahateo izahay, ary manantena aho fa voaseho ao amin’ny fieritreretanareo koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy midera tena indray aminareo izahay, fa manome anareo izay ho reharehanareo ny aminay, mba hisy havalinareo izay mirehareha ny amin’ny miseho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tava.
    marker-yv: yv-n
  - type: text
    text: ' ihany, fa tsy amin’ny fo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha very saina izahay, dia ho an’Andriamanitra; fa raha tsy very saina izahay, dia ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny fitiavan’i Kristy no manery anay, satria izao no hevitray: maty ny Anankiray hamonjy ny olona rehetra, ka dia maty koa izy rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary maty hamonjy ny olona rehetra Izy, mba tsy ho velona ho an’ny tenany intsony izay velona, fa ho an’Izay efa maty sy nitsangana hamonjy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa dia tsy mahalala olona intsony araka ny nofo isika; eny, na dia nahafantatra an’i Kristy araka ny nofo aza isika, ankehitriny dia tsy fantatsika '
  - type: usfm
    marker: it
    children:
    - type: text
      text: araka izany
  - type: text
    text: ' intsony Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa raha misy olona ao amin’i Kristy, dia olom-baovao izy; efa lasa ny zavatra taloha, indreo, efa tonga vaovao ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izany rehetra izany dia avy amin’Andriamanitra, Izay nampihavana antsika taminy amin’ny alalan’i Kristy sady nanome anay ny fanompoana fampihavanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia izao: Andriamanitra ao amin’i Kristy no nampihavana izao tontolo izao taminy ka tsy nanisa ny fahadisoany; ary efa napetrany aminay ny teny fampihavanana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa dia iraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ambasadôra.
    marker-yv: yv-n
  - type: text
    text: ' solon’i Kristy izahay, toa an’Andriamanitra mampangataka anay aminareo, solon’i Kristy izahay ka mangataka indrindra aminareo hoe: mihavàna amin’Andriamanitra anie hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay tsy nahalala ota dia efa nataony ota hamonjy antsika, mba ho tonga fahamarinan’Andriamanitra ao aminy kosa isika.
