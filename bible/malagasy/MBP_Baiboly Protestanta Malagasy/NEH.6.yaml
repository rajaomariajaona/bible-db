document_id: NEH.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny naharetan’i Nehemia hahavitana ny mànda, na dia fatratra aza ny teti-dratsy nataon’ny fahavalo.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY rehefa ren’i Sanbala sy Tobia sy Gasema Arabo mbamin’ny namany fahavalonay fa efa nanao ny mànda aho, ka tsy nisy banga intsony teo (kanefa tamin’izany andro izany tsy mbola voalatsako ny lelavavahady), '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary izaho dia tonga tao an-tranon’i Semaia, zanak’i Delaia, zanak’i Mehetabela, izay nihidy trano tao; dia hoy izy: Andeha isika hiditra ao an-tranon’Andriamanitra ao anatin’ny tempoly, ary aoka harindrintsika ny varavarana, fa ho avy hamono anao izy; eny, ho avy alina hamono anao izy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa hoy izaho: Moa ny lehilahy tahaka ahy tokony handositra va? Ary iza no olona tahaka ahy no mahazo miditra ao amin’ny tempoly ka ho velona? Tsy hiditra ao aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hitako fa, indro, tsy Andriamanitra no naniraka azy, fa nilaza izany faminaniana izany hamitahany ahy izy, satria notambazan’i Tobia sy Sanbala. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izany no nanambazany azy, mba hampitahotra ahy hanaovako izany ka hanotako, dia hahazoany teny ratsy hanaratsiany ahy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ry Andriamanitro ô, tsarovy Tobia sy Sanbala araka izany asany izany mbamin’i Noadia mpaminanivavy sy ny mpaminany sasany koa, izay nampitahotra ahy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia vita tamin’ny roa amby dimam-polo andro ny mànda, dia tamin’ny andro fahadimy amby roa-polo tamin’ny volana Elola. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary rehefa ren’ny fahavalonay rehetra izany, dia raiki-tahotra ny firenena rehetra manodidina anay, sady hitany fa tsinontsinona izy; ary fantany fa Andriamanitray no nahavitana izany asa izany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary tamin’izany andro izany ny manan-kaja amin’ny Joda dia nampitondra taratasy maro ho any amin’i Tobia, ary ny avy tamin’i Tobia kosa tonga tany aminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa nisy maro tany Joda efa nianiana niray tetika taminy, satria vinanton’i Sekania, zanak’i Ara, izy; ary Johanana zanani-lahy efa nanambady ny zanakavavin’i Mesolama, zanak’i Berekia. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary nisy koa teo anatrehako nilaza ny soa nataony ary nilaza ny teniko tany aminy kosa. Ary Tobia kosa nampitondra taratasy hampitahotra ahy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia naniraka ho any amiko Sanbala sy Gasema ka nanao hoe: Avia isika hihaona ao amin’izay vohitra anankiray amin’ny tany lemak’i Ono. Kanjo nikasa hanisy ratsy ahy izy roa lahy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia naniraka olona hankany aminy kosa aho hanao hoe: Asa lehibe no ataoko, ka tsy afa-midina aho; nahoana no hilaozako midina any aminareo ny asa ka hatsahatra?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Kanefa mbola naniraka tamiko inefatra araka izany ihany izy; ary izaho kosa dia mbola namaly azy toy izany ihany koa.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nirahin’i Sanbala fanindiminy ny zatovony hankeo amiko araka izany ihany, nitondra taratasy nivelatra teny an-tànany, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'izay nisy soratra hoe: Efa makoraka any amin’ny firenena maro izao teny izao, sady lazain’i Gasema hoe: Hianao sy ny Jiosy dia mikasa hikomy, ka izany no anaovanao ny mànda, ary araka izany teny izany dia mikasa ho mpanjakany, hono, hianao, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: sady efa nanendry ny mpaminany maro hilaza anao any Jerosalema hoe Mpanjaka any Joda; ary ankehitriny dia ho ren’ny mpanjaka izany teny izany; koa avia isika hiara-mihevitra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia naniraka ho any aminy aho hanao hoe: Tsy marina izany zavatra lazainao izany, fa tao am-ponao ihany no namoronanao izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa ta-hampahatahotra anay izy rehetra, ka hoy izy: Ho kivy amin’ny asa izy ka tsy hahatontosa.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ankehitriny ampaherezo e ny tànako!
