document_id: NEH.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny naharetan’i Nehemia hahavitana ny mànda, na dia fatratra aza ny teti-dratsy nataon’ny fahavalo.
  - type: text
    content: 'ARY rehefa ren’i Sanbala sy Tobia sy Gasema Arabo mbamin’ny namany fahavalonay fa efa nanao ny mànda aho, ka tsy nisy banga intsony teo (kanefa tamin’izany andro izany tsy mbola voalatsako ny lelavavahady), '
  '10':
  - type: text
    content: 'Ary izaho dia tonga tao an-tranon’i Semaia, zanak’i Delaia, zanak’i Mehetabela, izay nihidy trano tao; dia hoy izy: Andeha isika hiditra ao an-tranon’Andriamanitra ao anatin’ny tempoly, ary aoka harindrintsika ny varavarana, fa ho avy hamono anao izy; eny, ho avy alina hamono anao izy.'
  '11':
  - type: text
    content: 'Fa hoy izaho: Moa ny lehilahy tahaka ahy tokony handositra va? Ary iza no olona tahaka ahy no mahazo miditra ao amin’ny tempoly ka ho velona? Tsy hiditra ao aho. '
  '12':
  - type: text
    content: 'Ary hitako fa, indro, tsy Andriamanitra no naniraka azy, fa nilaza izany faminaniana izany hamitahany ahy izy, satria notambazan’i Tobia sy Sanbala. '
  '13':
  - type: text
    content: Izany no nanambazany azy, mba hampitahotra ahy hanaovako izany ka hanotako, dia hahazoany teny ratsy hanaratsiany ahy.
  '14':
  - type: text
    content: Ry Andriamanitro ô, tsarovy Tobia sy Sanbala araka izany asany izany mbamin’i Noadia mpaminanivavy sy ny mpaminany sasany koa, izay nampitahotra ahy.
  '15':
  - type: text
    content: 'Dia vita tamin’ny roa amby dimam-polo andro ny mànda, dia tamin’ny andro fahadimy amby roa-polo tamin’ny volana Elola. '
  '16':
  - type: text
    content: Ary rehefa ren’ny fahavalonay rehetra izany, dia raiki-tahotra ny firenena rehetra manodidina anay, sady hitany fa tsinontsinona izy; ary fantany fa Andriamanitray no nahavitana izany asa izany.
  '17':
  - type: text
    content: 'Ary tamin’izany andro izany ny manan-kaja amin’ny Joda dia nampitondra taratasy maro ho any amin’i Tobia, ary ny avy tamin’i Tobia kosa tonga tany aminy. '
  '18':
  - type: text
    content: 'Fa nisy maro tany Joda efa nianiana niray tetika taminy, satria vinanton’i Sekania, zanak’i Ara, izy; ary Johanana zanani-lahy efa nanambady ny zanakavavin’i Mesolama, zanak’i Berekia. '
  '19':
  - type: text
    content: Ary nisy koa teo anatrehako nilaza ny soa nataony ary nilaza ny teniko tany aminy kosa. Ary Tobia kosa nampitondra taratasy hampitahotra ahy.
  '2':
  - type: text
    content: 'dia naniraka ho any amiko Sanbala sy Gasema ka nanao hoe: Avia isika hihaona ao amin’izay vohitra anankiray amin’ny tany lemak’i Ono. Kanjo nikasa hanisy ratsy ahy izy roa lahy.'
  '3':
  - type: text
    content: 'Dia naniraka olona hankany aminy kosa aho hanao hoe: Asa lehibe no ataoko, ka tsy afa-midina aho; nahoana no hilaozako midina any aminareo ny asa ka hatsahatra?'
  '4':
  - type: text
    content: Kanefa mbola naniraka tamiko inefatra araka izany ihany izy; ary izaho kosa dia mbola namaly azy toy izany ihany koa.
  '5':
  - type: text
    content: 'Dia nirahin’i Sanbala fanindiminy ny zatovony hankeo amiko araka izany ihany, nitondra taratasy nivelatra teny an-tànany, '
  '6':
  - type: text
    content: 'izay nisy soratra hoe: Efa makoraka any amin’ny firenena maro izao teny izao, sady lazain’i Gasema hoe: Hianao sy ny Jiosy dia mikasa hikomy, ka izany no anaovanao ny mànda, ary araka izany teny izany dia mikasa ho mpanjakany, hono, hianao, '
  '7':
  - type: text
    content: sady efa nanendry ny mpaminany maro hilaza anao any Jerosalema hoe Mpanjaka any Joda; ary ankehitriny dia ho ren’ny mpanjaka izany teny izany; koa avia isika hiara-mihevitra.
  '8':
  - type: text
    content: 'Dia naniraka ho any aminy aho hanao hoe: Tsy marina izany zavatra lazainao izany, fa tao am-ponao ihany no namoronanao izany. '
  '9':
  - type: text
    content: 'Fa ta-hampahatahotra anay izy rehetra, ka hoy izy: Ho kivy amin’ny asa izy ka tsy hahatontosa.'
  - type: text
    content: Koa ankehitriny ampaherezo e ny tànako!
