document_id: 1SA.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fisaorana nataon’i Hana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Hana nivavaka ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny foko ravoravo amin’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tandroko voasandratra amin’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny vavako misokatra hamaly ny fahavaloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mifaly amin’ny famonjenao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy misy masina tahaka an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy misy afa-tsy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy vatolampy tahaka an’Andriamanitsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza dia mahery miteny avonavona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy haloaky ny vavanareo ny fireharehana.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah no Andriamanitry ny fahalalana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izy no mandanja ny asa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tapaka ny tsipìkan’ny olo-mahery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mila ho reraka dia sikinana hery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mikarama mofo ny voky, ary mianina kosa ny noana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny momba miteraka fito, ary mihamalemy kosa ny maro anaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jehovah no mahafaty sy mahavelona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no mampidina ho any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ary mampitsangana.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jehovah no mampalahelo sy mampanan-karena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy no mampietry sy mampisandratra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izy no manangana ny malahelo ho afaka amin’ny vovoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary manandratra ny mahantra hiala eo amin’ny zezika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hampiara-mitoetra azy eo amin’ny mpanapaka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampandova azy ny sezam-boninahitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa an’i Jehovah ny andrin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izany no ametrahany izao tontolo izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny tongotry ny olo-masiny dia tandremany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny ratsy fanahy kosa hampangininy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hangina.
    marker-yv: yv-n
  - type: text
    text: ' any amin’ny maizina;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy amin’ny hery no handresen’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho torotoro izay miady amin’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any an-danitra Izy no hampikotrokorana hamely azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah hitsara ny vazan-tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izy hanome hery ny mpanjakany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanandratra ny tandroky ny voahosony.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanompoan’i Samoela teo anatrehan’i Ely, ary ny ratsy nataon’ny zanakalahin’i Ely, sy ny nampilazan’Andriamanitra ny loza hanjo azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ARY Elkana nankany an-tranony tany Rama; fa ny zaza kosa nanao fanompoam-pivavahana tamin’i Jehovah teo anatrehan’i Ely mpisorona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny zanakalahin’i Ely dia tena ratsy fanahy, tsy nahalala an’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izao no fanaon’ny mpisorona tamin’ny olona: Raha'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy nahalala an’i Jehovah, na ny tokony ho anjaran’ny mpisorona avy amin’ny olona. Koa raha.
    marker-yv: yv-n
  - type: text
    text: ' nisy olona namono zavatra hatao fanatitra, dia avy ny zatovon’ny mpisorona nitondra fitrebika telo rantsana teny an-tànany, raha mbola nahandroina ny hena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia natsindrony tao anatin’ny fanendasana ny fitrebika, na tao anatin’ny fahandroan-kena, na ny vilany, na ny vilanibe, ka izay rehetra azon’ny fitrebika tao dia nalain’ny mpisorona ho azy. Ary izany no fanaony tao Silo tamin’ny Isiraely rehetra izay tonga tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary raha tsy mbola nodorany ho fofona ny sabora, dia avy ny zatovon’ny mpisorona ka nanao tamin’izay lehilahy namono zavatra hatao fanatitra hoe: Omeo hena hatsatsika ho an’ny mpisorona; fa tsy haka hena masaka aminao izy, fa ny manta ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha nisy olona nanao taminy hoe: Hodorana aloha ny sabora, dia amin’izay vao halainao izay sitraky ny fonao, dia novaliany hoe: Tsia; fa omeo ankehitriny izao ihany; fa raha tsy izany, dia halaiko an-keriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ka dia lehibe indrindra ny helok’ireo zatovo ireo teo anatrehan’i Jehovah, satria halan’ny olona ny fanatitra ho an’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Samoela nanao fanompoam-pivavahana teo anatrehan’i Jehovah raha mbola zaza, ary nisalotra efoda rongony fotsy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary nanaovan-dreniny akanjo kely izy, ka nentiny ho azy isan-taona isan-taona izany, raha niara-niakatra tamin’ny vadiny hanatitra ny fanatitra fanao isan-taona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Ely nitso-drano an’i Elkana mivady ka nanao hoe: Homen’i Jehovah zaza amin’ity vehivavy ity anie hianao ho solon’ilay voatolotra ho an’i Jehovah. Dia lasa nody izy mivady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Jehovah namangy an’i Hana, ka dia nanan-anaka koa izy ary niteraka lahy telo sy vavy roa. Ary Samoela zaza nitombo teo anantrehan’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary efa antitra indrindra Ely, ary izy nandre izay rehetra nataon’ny zanani-lahy tamin’ny Isiraely rehetra sy ny nandriany tamin’ireo vehivavy izay nanompo teo amin’ny varavaran’ny trano-lay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy izy taminy: Nahoana hianareo no manao izany zavatra izany? fa reko amin’izao olona rehetra izao ny ratsy ataonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsia, anaka, fa tsy tsara ny teny reko; fa mampanota ny olon’i Jehovah hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Raha misy olona manota amin’olona, dia ny mpitsara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Andriamanitra.
    marker-yv: yv-n
  - type: text
    text: ' no hitsara azy; fa raha misy manota amin’i Jehovah kosa, iza no hifona ho azy? Nefa tsy nihaino ny tenin-drainy izy ireo, satria sitrak’i Jehovah ny hahafaty azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary Samoela zaza nitombo, sady tian’i Jehovah sy ny olona koa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nisy lehilahin’Andriamanitra nankany amin’i Ely ka nanao taminy hoe: Izao no lazain’i Jehovah: Tsy efa niseho tokoa tamin’ny ankohonan-drainao va Aho, raha mbola tany Egypta tao an-tranon’i Farao izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Eny, nofidiko tamin’ny firenen’Isiraely rehetra ho mpisoroko izy mba hanatitra fanatitra eo ambonin’ny alitarako sy handoro ditin-kazo manitra ary hisalotra efoda eo anatrehako, ary nomeko ho an’ny tarana-drainao ny fanatitra rehetra ataon’ny Zanak’Isiraely amin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nahoana no hitsahinareo ny fanatitra alatsa-dra sy ny fanatitra hohanina '
  - type: usfm
    marker: it
    children:
    - type: text
      text: izay aterina
  - type: text
    text: ' ho Ahy, dia ilay nasaiko '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hatao
  - type: text
    text: ' ao amin’ny fonena'
  - type: usfm
    marker: it
    children:
    - type: text
      text: ko
  - type: text
    text: ', ka ny zanakao no omenao voninahitra mihoatra noho Izaho, mba hanatavy anareo amin’izay tsara indrindra amin’ny fanatitra rehetra aterin’ny Isiraely oloko?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa izany no anaovan’i Jehovah, Andriamanitry ny Isiraely, hoe: Efa voalazako tokoa fa ny taranakao sy ny tarana-drainao no handeha eo anatrehako mandrakizay; fa ankehitriny kosa, hoy Jehovah, sanatria Ahy izany; fa izay manome voninahitra Ahy no homeko voninahitra, ary izay manamavo Ahy no ho afa-baraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Indro, avy ny andro izay hanapahako ny sandrinao sy ny sandrin’ny tarana-drainao, ka tsy hisy lehilahy ho tratrantitra amin’ny taranakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary hahita ny manjo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahavalo eo amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny fonena'
  - type: usfm
    marker: it
    children:
    - type: text
      text: ko
  - type: text
    text: ' hianao na inona na inona soa omena ho an’ny Isiraely, ka tsy hisy lehilahy ho tratrantitra amin’ny taranakao mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nefa tsy dia hofongorako avokoa tsy ho eo anilan’ny alitarako izy, mba hahapahina ny masonao sy hampalahelo ny fonao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary ny lehilahy amin’ny taranakao izay tsy hofongorako tsy ho eo anilan’ny alitarako dia hahapahina ny masonao sy hampalahelo ny fonao.
    marker-yv: yv-n
  - type: text
    text: ' ary ny taranakao rehetra dia ho faty raha vao herotrerony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary izao no ho famantarana ho anao, izay hanjo ny zanakao roa lahy, dia Hofinia sy Finehasa: ho indray andro maty izy mirahalahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary Izaho hanangana mpisorona mahatoky ho Ahy, izay hanao araka ny ato am-poko sy ato an-tsaiko; ary Izaho hampaharitra ny taranany, ka handeha eo anatrehan’ny voahosotro mandrakizay izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ho avy izay sisa rehetra amin’ny taranakao ka hiankohoka eo anatrehany hangataka vola kely sy mofo iray ka hanao hoe: Masìna hianao, mba tendreo ho isan’ny mpisorona aho, mba hahazoako sombi-mofo hohanina.'
