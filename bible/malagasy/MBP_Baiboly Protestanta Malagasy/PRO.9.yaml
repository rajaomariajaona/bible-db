document_id: PRO.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiantsoan’ny fahendrena sy ny fahadalana.
  - type: text
    content: NY fahendrena efa nanao ny tranony;
  - type: text
    content: Efa nipaika ny andriny fito izy;
  '10':
  - type: text
    content: Ny fahatahorana an’i Jehovah no fiandoham-pahendrena;
  - type: text
    content: Ary ny fahafantarana ny Iray Masina no fahazavan-tsaina.
  '11':
  - type: text
    content: Fa izaho no hampitomboana ny andronao
  - type: text
    content: Sy hanamaroana ny taona hiainanao.
  '12':
  - type: text
    content: Raha hendry hianao, dia hendry ho an’ny tenanao ihany;
  - type: text
    content: Fa raha maniratsira kosa hianao, dia hianao ihany no hiharan’izany.
  '13':
  - type: text
    content: Ny fahadalana dia toy ny vehivavy vavana;
  - type: text
    content: Kely saina izy ka tsy mahalala na inona na inona.
  '14':
  - type: text
    content: Fa mipetraka eo am-baravaran’ny tranony izy,
  - type: text
    content: Ary amin’ny seza eny amin’ny fitoerana avo eo an-tanàna,
  '15':
  - type: text
    content: Mba hiantso ny mpandalo
  - type: text
    content: 'Izay mizotra amin’ny alehany, ka manao hoe:'
  '16':
  - type: text
    content: Aoka hivily atỳ izay kely saina;
  - type: text
    content: 'Ary amin’izay tsy ampy saina dia hoy izy:'
  '17':
  - type: text
    content: Mamy ny rano angalarina,
  - type: text
    content: 'Ary fy ny mofo '
  - type: text
    content: hanina
  - type: text
    content: ' amin’ny fiafenana,'
  '18':
  - type: text
    content: Nefa tsy fantany fa ny maty no ao,
  - type: text
    content: Ary any amin’ny halalin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ny olona nasainy.'
  '2':
  - type: text
    content: Efa namono ny bibiny sy nangaroharo ny divainy izy
  - type: text
    content: Ary efa namelatra ny latabany koa;
  '3':
  - type: text
    content: Ary efa naniraka ny ankizivaviny izy;
  - type: text
    content: 'Miantso eny an-tampon’ny fitoerana avo any an-tanàna izy ka manao hoe:'
  '4':
  - type: text
    content: Izay kely saina, dia aoka izy hankatỳ;
  - type: text
    content: 'Ary amin’izay tsy ampy saina dia hoy izy:'
  '5':
  - type: text
    content: Avia, hano ny mofoko,
  - type: text
    content: Ary sotroy ny divay voaharoharoko.
  '6':
  - type: text
    content: Ilaozy ny
  - type: note
    content: 'Na: Mitsahara, ry.'
  - type: text
    content: ' kely saina, dia ho velona hianao,'
  - type: text
    content: Ary mizora amin’ny làlan’ny fahalalana.
  '7':
  - type: text
    content: Izay mananatra ny mpaniratsira dia afa-baraka;
  - type: text
    content: Ary izay mananatra ny ratsy fanahy dia hahazo tsiny.
  '8':
  - type: text
    content: Aza mananatra ny mpaniratsira hianao, fandrao halany;
  - type: text
    content: Ny hendry no anaro, dia ho tiany hianao.
  '9':
  - type: text
    content: Toroy ny hendry, dia hihahendry izy;
  - type: text
    content: Ampianaro ny marina, dia hitombo saina izy.
