document_id: PRO.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fiantsoan’ny fahendrena sy ny fahadalana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY fahendrena efa nanao ny tranony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nipaika ny andriny fito izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Efa namono ny bibiny sy nangaroharo ny divainy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa namelatra ny latabany koa;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary efa naniraka ny ankizivaviny izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Miantso eny an-tampon’ny fitoerana avo any an-tanàna izy ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay kely saina, dia aoka izy hankatỳ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’izay tsy ampy saina dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avia, hano ny mofoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary sotroy ny divay voaharoharoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ilaozy ny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mitsahara, ry.
    marker-yv: yv-n
  - type: text
    text: ' kely saina, dia ho velona hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mizora amin’ny làlan’ny fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay mananatra ny mpaniratsira dia afa-baraka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mananatra ny ratsy fanahy dia hahazo tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza mananatra ny mpaniratsira hianao, fandrao halany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny hendry no anaro, dia ho tiany hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Toroy ny hendry, dia hihahendry izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ampianaro ny marina, dia hitombo saina izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fahatahorana an’i Jehovah no fiandoham-pahendrena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahafantarana ny Iray Masina no fahazavan-tsaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa izaho no hampitomboana ny andronao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanamaroana ny taona hiainanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha hendry hianao, dia hendry ho an’ny tenanao ihany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa raha maniratsira kosa hianao, dia hianao ihany no hiharan’izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fahadalana dia toy ny vehivavy vavana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kely saina izy ka tsy mahalala na inona na inona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa mipetraka eo am-baravaran’ny tranony izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny seza eny amin’ny fitoerana avo eo an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mba hiantso ny mpandalo
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay mizotra amin’ny alehany, ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka hivily atỳ izay kely saina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’izay tsy ampy saina dia hoy izy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mamy ny rano angalarina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary fy ny mofo '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hanina
  - type: text
    text: ' amin’ny fiafenana,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nefa tsy fantany fa ny maty no ao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any amin’ny halalin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ny olona nasainy.'
