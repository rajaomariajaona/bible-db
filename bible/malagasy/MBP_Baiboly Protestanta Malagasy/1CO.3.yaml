document_id: 1CO.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny raharahan’ny mpitoriteny, sy ny mbola hizahan-toetra azy.
  - type: text
    content: 'ARY izaho, ry rahalahy, tsy nahazo niteny taminareo tahaka ny amin’izay araka ny Fanahy, fa tahaka ny amin’izay mbola nofo, dia tahaka izay mbola zaza ihany ao amin’i Kristy. '
  '10':
  - type: text
    content: 'Araka ny fahasoavan’Andriamanitra nomena ahy, tahaka ny fanaon’ny mpità-marika mahay no nanaovako ny fanorenana, ary ny hafa mandrafitra eo amboniny; nefa aoka ny olona rehetra hitandrina izay arafiny eo amboniny. '
  '11':
  - type: text
    content: 'Fa tsy misy mahay manao fanorenana hafa afa-tsy izay natao, dia Jesosy Kristy. '
  '12':
  - type: text
    content: 'Ary raha misy mandrafitra volamena, na volafotsy, na vato tsara, na hazo, na bozaka, na mololo, eo ambonin’ny fanorenana, '
  '13':
  - type: text
    content: 'dia haseho avokoa ny asan’ny olona rehetra; fa ny andro no hampiseho azy, satria haseho amin’afo izany '
  - type: text
    content: andro izany,
  - type: text
    content: ' '
  - type: note
    content: 'Na: izany.'
  - type: text
    content: 'ka dia hozahan-toetra, amin’ny afo ny asan’ny olona rehetra. '
  '14':
  - type: text
    content: 'Raha maharitra ny asan’ny olona, izay narafiny teo amboniny, dia handray valim-pitia izy. '
  '15':
  - type: text
    content: Raha ho levon’ny afo ny asan’ny olona, dia ho fatiantoka izy; fa ny tenany kosa dia hovonjena, nefa toy ny avy ao amin’ny afo ihany izy.
  '16':
  - type: text
    content: 'Tsy fantatrareo va fa tempolin’Andriamanitra hianareo, ary ny Fanahin’Andriamanitra mitoetra ao anatinareo? '
  '17':
  - type: text
    content: Raha misy manimba ny tempolin’Andriamanitra, dia mba hosimban’Andriamanitra kosa izy; fa masina ny tempolin’Andriamanitra, dia hianareo izany.
  - type: note
    content: 'Na: dia masina koa hianareo.'
  '18':
  - type: text
    content: 'Aza misy mamita-tena. Raha misy eo aminareo manao azy ho hendry amin’izao tontolo izao, aoka ho adala izy mba ho hendry. '
  '19':
  - type: text
    content: 'Fa ny fahendren’izao tontolo izao dia fahadalana eo anatrehan’Andriamanitra; fa voasoratra hoe: ,,Ny hafetsen’ny hendry ihany no entiny misambotra azy’’ (Joba 5.13). '
  '2':
  - type: text
    content: 'Ronono no nomeko anareo, fa tsy ventin-kanina, satria tsy mbola natanjaka hianareo; eny, mbola tsy matanjaka mandraka ankehitriny aza, '
  '20':
  - type: text
    content: 'Ary indray: ,,Jehovah no mahalala ny hevitry ny hendry, fa zava-poana izany’’ (Sal. 94.11).'
  '21':
  - type: text
    content: 'Ka dia aza misy manao olona ho reharehany; fa anareo ny zavatra rehetra: '
  '22':
  - type: text
    content: 'na Paoly, na Apolosy, na Kefasy, na izao tontolo izao, na fiainana, na fahafatesana, na ny zavatra ankehitriny, na ny zavatra ho avy; dia anareo izany rehetra izany; '
  '23':
  - type: text
    content: ary hianareo an’i Kristy ary Kristy an’Andriamanitra.
  '3':
  - type: text
    content: 'fa mbola araka ny nofo ihany hianareo. Fa raha misy fialonana sy fifandirana eo aminareo, tsy araka ny nofo va hianareo ka mandeha araka ny fanaon’ny olona? '
  '4':
  - type: text
    content: 'Fa raha hoy ny anankiray: Izaho an’ Paoly, ary ny anankiray kosa: Izaho an’i Apolosy, moa tsy olona ihany va hianareo?'
  '5':
  - type: text
    content: 'Koa inona moa Apolosy, ary inona moa Paoly? Mpanompo ihany izay nahatonga anareo ho mpino ireo, dia samy araka ny nomen’ny Tompo azy avy. '
  '6':
  - type: text
    content: 'Izaho namboly, Apolosy nandena, fa Andriamanitra no nampitombo. '
  '7':
  - type: text
    content: 'Ka dia tsinontsinona izay mamboly, na izay mandena, fa Andriamanitra Izay mampitombo no izy. '
  '8':
  - type: text
    content: 'Ary iray ihany ny mpamboly sy ny mpandena; nefa samy handray izay valim-pitiany avy araka ny fisasarany izy. '
  '9':
  - type: text
    content: Fa mpiara-miasa amin’Andriamanitra izahay; ary sahan’Andriamanitra sy trano arafitr’Andriamanitra hianareo.
