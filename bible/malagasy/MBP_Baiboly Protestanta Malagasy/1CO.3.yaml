document_id: 1CO.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny raharahan’ny mpitoriteny, sy ny mbola hizahan-toetra azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY izaho, ry rahalahy, tsy nahazo niteny taminareo tahaka ny amin’izay araka ny Fanahy, fa tahaka ny amin’izay mbola nofo, dia tahaka izay mbola zaza ihany ao amin’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ronono no nomeko anareo, fa tsy ventin-kanina, satria tsy mbola natanjaka hianareo; eny, mbola tsy matanjaka mandraka ankehitriny aza, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa mbola araka ny nofo ihany hianareo. Fa raha misy fialonana sy fifandirana eo aminareo, tsy araka ny nofo va hianareo ka mandeha araka ny fanaon’ny olona? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha hoy ny anankiray: Izaho an’ Paoly, ary ny anankiray kosa: Izaho an’i Apolosy, moa tsy olona ihany va hianareo?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa inona moa Apolosy, ary inona moa Paoly? Mpanompo ihany izay nahatonga anareo ho mpino ireo, dia samy araka ny nomen’ny Tompo azy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izaho namboly, Apolosy nandena, fa Andriamanitra no nampitombo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ka dia tsinontsinona izay mamboly, na izay mandena, fa Andriamanitra Izay mampitombo no izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary iray ihany ny mpamboly sy ny mpandena; nefa samy handray izay valim-pitiany avy araka ny fisasarany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa mpiara-miasa amin’Andriamanitra izahay; ary sahan’Andriamanitra sy trano arafitr’Andriamanitra hianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Araka ny fahasoavan’Andriamanitra nomena ahy, tahaka ny fanaon’ny mpità-marika mahay no nanaovako ny fanorenana, ary ny hafa mandrafitra eo amboniny; nefa aoka ny olona rehetra hitandrina izay arafiny eo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa tsy misy mahay manao fanorenana hafa afa-tsy izay natao, dia Jesosy Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha misy mandrafitra volamena, na volafotsy, na vato tsara, na hazo, na bozaka, na mololo, eo ambonin’ny fanorenana, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia haseho avokoa ny asan’ny olona rehetra; fa ny andro no hampiseho azy, satria haseho amin’afo izany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: andro izany,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany.
    marker-yv: yv-n
  - type: text
    text: 'ka dia hozahan-toetra, amin’ny afo ny asan’ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Raha maharitra ny asan’ny olona, izay narafiny teo amboniny, dia handray valim-pitia izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha ho levon’ny afo ny asan’ny olona, dia ho fatiantoka izy; fa ny tenany kosa dia hovonjena, nefa toy ny avy ao amin’ny afo ihany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy fantatrareo va fa tempolin’Andriamanitra hianareo, ary ny Fanahin’Andriamanitra mitoetra ao anatinareo? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raha misy manimba ny tempolin’Andriamanitra, dia mba hosimban’Andriamanitra kosa izy; fa masina ny tempolin’Andriamanitra, dia hianareo izany.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dia masina koa hianareo.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aza misy mamita-tena. Raha misy eo aminareo manao azy ho hendry amin’izao tontolo izao, aoka ho adala izy mba ho hendry. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa ny fahendren’izao tontolo izao dia fahadalana eo anatrehan’Andriamanitra; fa voasoratra hoe: ,,Ny hafetsen’ny hendry ihany no entiny misambotra azy’’ (Joba 5.13). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary indray: ,,Jehovah no mahalala ny hevitry ny hendry, fa zava-poana izany’’ (Sal. 94.11).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ka dia aza misy manao olona ho reharehany; fa anareo ny zavatra rehetra: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'na Paoly, na Apolosy, na Kefasy, na izao tontolo izao, na fiainana, na fahafatesana, na ny zavatra ankehitriny, na ny zavatra ho avy; dia anareo izany rehetra izany; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ary hianareo an’i Kristy ary Kristy an’Andriamanitra.
