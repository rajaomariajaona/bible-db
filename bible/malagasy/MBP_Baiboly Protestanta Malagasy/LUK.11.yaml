document_id: LUK.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nampianaran’i Jesosy ny mpianany hivavaka.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jesosy nivavaka tao amin’ny fitoerana iray, ka rehefa nitsahatra Izy, dia hoy ny mpianany anankiray taminy: Tompoko, mampianara anay hivavaka, tahaka ny nampianaran’i Jaona ny mpianany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Izy taminy: Raha mivavaka hianareo, dia ataovy hoe: Ray ô,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Rainay Izay any an-danitra].'
    marker-yv: yv-n
  - type: text
    text: ' hohamasinina anie ny anaranao. Ho tonga anie ny fanjakanao.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Hatao anie ny sitraponao etỳ an-tany tahaka ny any an-danitra].'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Omeo anay isan-andro izay hanina sahaza ho anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary mamelà ny helokay; fa izahay koa mamela izay rehetra meloka aminay. Ary aza mitondra anay ho amin’ny fakam-panahy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[fa manafaha anay amin’ny ratsy].'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Jesosy taminy: Iza moa aminareo no manana sakaiza, izay hankeo aminy mamatonalina ka hanao aminy hoe: Ry sakaiza, ampisambory mofo telo aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa ny sakaizako nandeha tamin’ny nalehany, dia tonga atsy amiko, ka tsy misy izay hafahako azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary ilay ao an-trano kosa hamaly ka hanao hoe: Aza manahirana ahy; fa efa mihidy ny varavarana izao, ary ny zanako mandry eto am-pandriana eto amiko; tsy afaka hifoha hanome anao aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy Izaho aminareo: Na dia tsy hiainga hanome azy noho ny fisakaizana aza izy, dia hifoha ihany izy noho ny fitarainany fatratra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsi-fitandroany henatra.
    marker-yv: yv-n
  - type: text
    text: ' ka hanome azy izay ilainy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy izaho aminareo: Mangataha, dia homena hianareo; mitadiava, dia hahita hianareo; dondòny, dia hovohana hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandòndòna no hovohana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa iza moa aminareo izay ray, raha angatahan’ny zanany mofo, no hanome azy vato? ary raha '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angatahany
  - type: text
    text: ' hazandrano, no hanome azy menarana ho solon’ny hazandrano? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary raha angatahany atody, no hanome azy maingoka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa raha hianareo, na dia ratsy aza, mahalala hanome zava-tsoa ho an’ny zanakareo, tsy mainka va ny Ray, Izay any an-danitra, no hanome ny Fanahy Masina ho an’izay mangataka aminy?
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahasitranan’i Jesosy ny demoniaka anankiray, sy ny namaliany ny teny ratsy nataon’ny Fariseo.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 12.22-37,43-45; Mar. 3.22-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ARY Jesosy namoaka demonia moana. Ary rehefa nivoaka ny demonia, dia niteny ilay moana; ka dia gaga ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy ny sasany; Belzeboba, lohan’ny demonia, no amoahany ny demonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa ny sasany kosa naka fanahy Azy ka nangataka famantarana taminy avy any an-danitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Izy nahalala ny heviny, dia nanao taminy hoe: Ho foana ny fanjakana rehetra izay miady an-trano; ary ho rava ny ankohonana izay miady an-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha Satana koa aza no miady an-trano, ahoana no haharetan’ny fanjakany? Fa hoy hianareo: Belzeboba no amoahako ny demonia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha Izaho mamoaka demonia amin’ny herin’i Belzeboba, dia amin’ny herin’iza kosa no amoahan’ny zanakareo azy? koa amin’izany dia ho mpitsara anareo ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa raha ny rantsan-tànan’Andriamanitra no amoahako ny demonia, dia tonga aminareo tokoa ny fanjakan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha ny mahery mivonona amin’ny fiadiany no miaro ny tranony, dia tsy haninona ny fananany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa raha avy kosa izay mahery noho izy ka mandresy azy, dia alainy ny fiadiany rehetra izay nitokiany, ary izay azony ho babo dia zarainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izay tsy momba Ahy dia manohitra Ahy; ary izay tsy miara-mamory amiko dia manahaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha mivoaka amin’ny olona ny fanahy maloto, dia mandeha mitety ny tany tsy misy rano izy, mitady fitsaharana; ary rehefa tsy mahita, dia hoy izy: Hody any an-tranoko izay nivoahako aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony tonga izy, dia hitany fa voafafa sy voavoatra ny trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary dia mandeha izy ka mitondra fanahy fito hafa koa ratsy noho izy; dia miditra ireo ka mitoetra ao; ary ny faran’izany olona izany dia ratsy noho ny voalohany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Anatra nataon’i Jesosy tamin’ny vehivavy anankiray sy tamin’ny olona maro izay niangona hihaino Azy.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 12.38-42.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ARY raha nilaza izany Jesosy, dia nisy vehivavy anankiray teo amin’ny vahoaka niantso ka nanao taminy hoe: Sambatra ny kibo izay nitondra Anao sy ny nono izay ninonoanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa Izy nanao hoe: Eny tokoa, kanefa mainka sambatra aza ny mihaino ny tenin’Andriamanitra ka mitandrina izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary raha mbola niangona ny vahoaka betsaka, dia nilaza hoe Izy: Ity taranaka ity dia taranaka ratsy. Mitady famantarana izy; nefa tsy hisy famantarana homena azy, afa-tsy ny famantarana ny amin’i Jona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'fa tahaka an’i Jona, izay famantarana tamin’ny Ninivita, dia ho toy izany koa ny Zanak’olona amin’ity taranaka ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny mpanjakavavy avy tany atsimo dia hiara-mitsangana amin’ny lehilahy amin’ity taranaka ity amin’ny andro fitsarana ka hanameloka azy; fa avy tany amin’ny faran’ny tany izy hihaino ny fahendren’i Solomona; nefa, indro, misy lehibe noho Solomona eto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny olona tany Ninive hiara-mitsangana amin’ity taranaka ity amin’ny andro fitsarana ka hanameloka azy, fa izy nibebaka tamin’ny nitorian’i Jona teny; nefa, indro, misy lehibe noho Jona eto.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tsy misy olona mandrehitra jiro ka mametraka azy ao an-davaka, na ao ambanin’ny vata famarana, fa apetrany eo amin’ny fanaovan-jiro izy, mba ho hitan’izay miditra ny mazava. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny masonao no jiron’ny tena; koa raha tsara ny masonao, dia mazava ny tenanao rehetra; fa raha ratsy izy, dia maizina koa ny tenanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa tandremo, fandrao maizina ny mazava izay ao anatinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary amin’izany, raha mazava ny tenanao rehetra, ka tsy misy maizina, dia hazava avokoa izy rehetra, tahaka ny jiro raha mirehitra tsara ka manazava anao.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nihinanan’i Jesosy tao an-tranon’ny Fariseo anankiray sy ny nilazany ny faharatsian’ny Fariseo.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ARY raha mbola niteny Jesosy, dia nisy Fariseo nampiantrano Azy hisakafo ao aminy; dia niditra Izy ka nipetraka nihinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa gaga ilay Fariseo, raha nahita fa tsy nisasa Izy vao nihinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fa hoy ny Tompo taminy: Ankehitriny hianareo Fariseo dia manadio ny vohon’ny kapoaka sy ny lovia, nefa ny ao anatinareo kosa dia feno rombaka sy faharatsiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ry adala! tsy Izay nanao ny vohony va no nanao ny atiny koa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Fa ny zavatra eo anatiny no aoka homenareo ho fiantrana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.41 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manaova fiantrana araka izay azonareo atao.
    marker-yv: yv-n
  - type: text
    text: ' dia, indro, madio ho anareo ny zavatra rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Fa lozanareo, Fariseo! fa mandoa ny fahafolon’ny solila sy ny rota ary izay anana famboly rehetra hianareo, nefa lalovanareo ny fitsarana sy ny fitiavana an’Andriamanitra; ireto tokony ho nataonareo, nefa tsy tokony havelanareo ireroana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Lozanareo, Fariseo! fa tia ny fipetrahana aloha ao amin’ny synagoga sy ny fiarahabana any an-tsena hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Lozanareo, fa hianareo dia tahaka ny fasana tsy hita, ka tsy fantatry ny olona izay manitsaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary ny anankiray tamin’ny mpahay lalàna namaly ka nanao taminy hoe: Mpampianatra ô, raha miteny izany Hianao, dia manala baraka anay koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa hoy Jesosy: Lozanareo, mpahay lalàna koa! fa mampitondra ny olona entana sarotra entina hianareo, nefa tsy manendry izany entana izany akory hianareo, na dia amin’ny rantsan-tànanareo iray aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Lozanareo! fa manao ny rarivatom-pasan’ny mpaminany hianareo, nefa ny razanareo ihany no namono azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia vavolombelona hianareo ka manaiky ny asan’ny razanareo; fa izy no namono azy, ary hianareo kosa manao '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny rarivatom-pasany.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Koa izany no nanambaran’ny fahendren’Andriamanitra hoe: Haniraka mpaminany sy apostoly ho any aminy Aho, ka ny sasany hovonoiny, ary ny sasany henjehiny,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'mba hadinina amin’ity taranaka ity ny ran’ny mpaminany rehetra izay nalatsaka hatramin’ny nanorenana izao tontolo izao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: dia hatramin’ny ran’i Abela ka hatramin’ny ran’i Zakaria, izay novonoina teo anelanelan’ny alitara sy ny tempoly. Eny, lazaiko aminareo marina tokoa fa hadinina amin’ity taranaka ity izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Lozanareo, mpahay lalàna! satria nalainareo ny fanalahidin’ny fahalalana; hianareo tsy niditra, ary izay te-hiditra dia nosakananareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ary raha niala teo Izy, dia noteren’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.53 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tezitra mafy taminy.
    marker-yv: yv-n
  - type: text
    text: ' ny mpanora-dalàna sy ny Fariseo fatratra sady nadinadininy zavatra maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Dia nihendry Azy izy ireo hamandrihany Azy tamin’ny teny naloaky ny vavany.
