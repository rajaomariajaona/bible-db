document_id: REV.17,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ilay vehivavy janga (dia Babylona), izay nitaingina ny bibi-dia nivolon-jaky.
  - type: text
    content: 'ARY tonga ny anjely anankiray tamin’izy fito izay nanana ny lovia fito, dia niteny tamiko nanao hoe: Avia atỳ; dia hasehoko anao ny fitsarana ilay vehivavy janga lehibe, izay mipetraka eny ambonin’ny rano maro, '
  '10':
  - type: text
    content: 'Ary mpanjaka fito ireo; efa lavo ny dimy, fa ny iray mbola eo ihany, ary ny iray koa mbola tsy tonga; ary rehefa tonga izy, dia tsy maintsy mitoetra kelikely. '
  '11':
  - type: text
    content: Ary ny bibi-dia izay teo ihany ary tsy eo izao, dia izy no naman’ny fito mahavalo azy ka lasa ho amin’ny fandringanana.
  '12':
  - type: text
    content: 'Ary ny tandroka folo, izay hitanao, dia mpanjaka folo izay tsy mbola nahazo fanjakana; fa mandray fahefana ho toa mpanjaka iray ora miaraka amin’ny bibi-dia izy. '
  '13':
  - type: text
    content: 'Ireo dia miray saina ka manome ny heriny sy ny fahefany ho an’ilay bibi-dia. '
  '14':
  - type: text
    content: 'Ireo dia hiady amin’ny Zanak’ondry, ary ny Zanak’ondry haharesy azy, satria Tompon’ny tompo sy Mpanjakan’ny mpanjaka Izy, ary '
  - type: text
    content: haharesy azy koa
  - type: text
    content: ' izay momba Azy, dia olona voantso sy voafidy ary mahatoky.'
  '15':
  - type: text
    content: 'Ary hoy izy tamiko: Ny rano efa hitanao, izay ipetrahan’ilay vehivavy janga, dia olona sy vahoaka betsaka sy firenena maro ary samy hafa fiteny. '
  '16':
  - type: text
    content: 'Ary ny tandroka folo sy ny bibi-dia izay efa hitanao, dia ireo no hankahala ilay vehivavy janga ka hahatsinontsinona azy sy hampitanjaka azy sy hihinana ny nofony ary handevona ny tenany amin’ny afo. '
  '17':
  - type: text
    content: 'Fa Andriamanitra efa nanome fo ireo hanatanteraka ny heviny sy hifanara-tsaina ary hanome ny fanjakany ho an’ilay bibi-dia mandra-pahatanteraky ny tenin’Andriamanitra. '
  '18':
  - type: text
    content: Ary ravehivavy, ilay hitanao, dia tanàna lehibe, izay manjaka amin’ny mpanjakan’ny tany.
  '2':
  - type: text
    content: 'dia ilay nijangajangan’ny mpanjakan’ny tany, sady natao leon’ny divain’ny fijangajangany ny mponina tamin’ny tany. '
  '3':
  - type: text
    content: Dia nentiny tamin’ny Fanahy ho any an-efitra aho ary nahita vehivavy nitaingina bibi-dia mivolon-jaky, feno anarana fitenenan-dratsy
  - type: note
    content: Gr. blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' sady nanan-doha fito sy tandroka folo. '
  '4':
  - type: text
    content: 'Ary ravehivavy dia nitafy lamba volomparasy sy jaky ary niravaka volamena sy vato soa ary pèrila sady nitana kapoaka volamena teny an-tànany, feno zava-betaveta, dia ny zava-maloto momba ny fijangajangany; '
  '5':
  - type: text
    content: 'ary nisy anarana voasoratra teo amin’ny handriny nanao hoe: '
  - type: heading
    content: zava-miafina, babylona lehibe, renin’ny mpijangajanga sy ny zava-betaveta, amin’ny tany.
  '6':
  - type: text
    content: 'Ary hitako fa, indro, ravehivavy dia leon’ny ran’ny olona masina sy ny ran’ny martioran’i Jesosy; koa raha nahita azy aho, dia gaga indrindra. '
  '7':
  - type: text
    content: 'Ary hoy ilay anjely tamiko: Nahoana no gaga hianao? Izaho hilaza aminao ny zava-miafina ny amin-dravehivavy sy ny bibi-dia mitondra azy, izay manan-doha fito sy tandroka folo. '
  '8':
  - type: text
    content: Ny bibi-dia, ilay efa hitanao, dia teo ihany ary tsy eo izao, nefa efa hiakatra avy amin’ny lavaka tsy hita noanoa izy ka ho lasa ho amin’ny fandringanana; ary ny monina ambonin’ny tany, dia izay tsy voasoratra eo amin’ny bokin’ny fiainana hatramin’ny nanorenana izao tontolo izao, dia ho gaga raha mijery ilay bibi-dia, izay teo ihany ary tsy eo izao, nefa mbola ho avy indray.
  '9':
  - type: text
    content: 'Indro ny hevitra izay misy fahendrena: Ny loha fito dia tendrombohitra fito, izay ipetrahan-dravehivavy. '
