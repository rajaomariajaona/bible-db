document_id: REV.17
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ilay vehivavy janga (dia Babylona), izay nitaingina ny bibi-dia nivolon-jaky.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga ny anjely anankiray tamin’izy fito izay nanana ny lovia fito, dia niteny tamiko nanao hoe: Avia atỳ; dia hasehoko anao ny fitsarana ilay vehivavy janga lehibe, izay mipetraka eny ambonin’ny rano maro, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia ilay nijangajangan’ny mpanjakan’ny tany, sady natao leon’ny divain’ny fijangajangany ny mponina tamin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nentiny tamin’ny Fanahy ho any an-efitra aho ary nahita vehivavy nitaingina bibi-dia mivolon-jaky, feno anarana fitenenan-dratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' sady nanan-doha fito sy tandroka folo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ravehivavy dia nitafy lamba volomparasy sy jaky ary niravaka volamena sy vato soa ary pèrila sady nitana kapoaka volamena teny an-tànany, feno zava-betaveta, dia ny zava-maloto momba ny fijangajangany; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary nisy anarana voasoratra teo amin’ny handriny nanao hoe: '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: zava-miafina, babylona lehibe, renin’ny mpijangajanga sy ny zava-betaveta, amin’ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hitako fa, indro, ravehivavy dia leon’ny ran’ny olona masina sy ny ran’ny martioran’i Jesosy; koa raha nahita azy aho, dia gaga indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ilay anjely tamiko: Nahoana no gaga hianao? Izaho hilaza aminao ny zava-miafina ny amin-dravehivavy sy ny bibi-dia mitondra azy, izay manan-doha fito sy tandroka folo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny bibi-dia, ilay efa hitanao, dia teo ihany ary tsy eo izao, nefa efa hiakatra avy amin’ny lavaka tsy hita noanoa izy ka ho lasa ho amin’ny fandringanana; ary ny monina ambonin’ny tany, dia izay tsy voasoratra eo amin’ny bokin’ny fiainana hatramin’ny nanorenana izao tontolo izao, dia ho gaga raha mijery ilay bibi-dia, izay teo ihany ary tsy eo izao, nefa mbola ho avy indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Indro ny hevitra izay misy fahendrena: Ny loha fito dia tendrombohitra fito, izay ipetrahan-dravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary mpanjaka fito ireo; efa lavo ny dimy, fa ny iray mbola eo ihany, ary ny iray koa mbola tsy tonga; ary rehefa tonga izy, dia tsy maintsy mitoetra kelikely. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny bibi-dia izay teo ihany ary tsy eo izao, dia izy no naman’ny fito mahavalo azy ka lasa ho amin’ny fandringanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny tandroka folo, izay hitanao, dia mpanjaka folo izay tsy mbola nahazo fanjakana; fa mandray fahefana ho toa mpanjaka iray ora miaraka amin’ny bibi-dia izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireo dia miray saina ka manome ny heriny sy ny fahefany ho an’ilay bibi-dia. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireo dia hiady amin’ny Zanak’ondry, ary ny Zanak’ondry haharesy azy, satria Tompon’ny tompo sy Mpanjakan’ny mpanjaka Izy, ary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: haharesy azy koa
  - type: text
    text: ' izay momba Azy, dia olona voantso sy voafidy ary mahatoky.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy izy tamiko: Ny rano efa hitanao, izay ipetrahan’ilay vehivavy janga, dia olona sy vahoaka betsaka sy firenena maro ary samy hafa fiteny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny tandroka folo sy ny bibi-dia izay efa hitanao, dia ireo no hankahala ilay vehivavy janga ka hahatsinontsinona azy sy hampitanjaka azy sy hihinana ny nofony ary handevona ny tenany amin’ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Andriamanitra efa nanome fo ireo hanatanteraka ny heviny sy hifanara-tsaina ary hanome ny fanjakany ho an’ilay bibi-dia mandra-pahatanteraky ny tenin’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ravehivavy, ilay hitanao, dia tanàna lehibe, izay manjaka amin’ny mpanjakan’ny tany.
