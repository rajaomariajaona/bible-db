document_id: PSA.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiantsoana an’Andriamanitra, Mpitsara marina.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sigaiona nataon’i Davida, izay nohirainy ho an’i Jehovah noho ny tenin’i Kosy Benjamita.
- type: usfm
  marker: q1
  children:
  - type: text
    text: JEHOVAH Andriamanitro ô, Hianao no ialofako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho amin’izay rehetra manenjika ahy, ka afaho;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fandrao ny fanahiko viravirainy tahaka ny fanaon’ny liona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary kepokepohiny, ka tsy misy mamonjy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jehovah Andriamanitro ô, raha nanao izany aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha misy heloka eto an-tànako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha namaly ratsy izay tsara fihavanana tamiko aho–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Novonjeko aza izay nampahory ahy tsy ahoan-tsy ahoana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ka nandroba izay nampahory ahy tsy ahoan-tsy ahoana.
    marker-yv: yv-n
  - type: text
    text: –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia aoka ny fahavalo hanenjika ny fanahiko ka hahatratra azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, aoka izy hanitsaka ny aiko amin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampandry ny voninahitro amin’ny vovoka.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jehovah ô, mitsangàna amin’ny fahatezeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misandrata hisakana ny fisafoaky ny mpampahory ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mifohaza hanampy ahy, fa didy marina no navoakanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka ny firenena maro hivory manodidina Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary miverena ho any amin’ny avo eo amboniny Hianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jehovah hitsara ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah ô, tsarao aho araka ny fahamarinako sy ny tsi-fananako tsiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka ho tapaka ny ratsy ataon’ny ratsy fanahy, fa ampitoero kosa ny marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Andriamanitra marina no mamantatra ny fo sy ny voa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny ampingako dia ao amin’Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mpamonjy ny mahitsy fo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mpitsara marina Andriamanitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, Andriamanitra Izay tezitra isan-andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha tsy ibebahana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: iverenana.
    marker-yv: yv-n
  - type: text
    text: ' Izy, dia hanasa ny sabany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa manenjana ny tsipìkany Izy ka manamboatra azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ireo dia kendreny amin’ny fiadiana mahafaty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zana-tsipìkany ataony mirehitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, efa marary hiteraka zava-poana ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, torontoronina fampahoriana izy ary mitera-doza;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lainga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mihady lavaka izy ka manalalaka izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia latsaka ao anatin’ny longoa nataony ihany izy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mitsingerina ho eo an-dohany ihany ny fampahoriany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary eo an-tampon-dohany ihany no ianjeran’ny loza nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hidera an’i Jehovah araka ny fahamarinany aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hankalaza ny anaran’i Jehovah Avo Indrindra.
