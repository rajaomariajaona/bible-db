document_id: 2KI.21,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan’i Manase sy Amona.
  - type: text
    content: ROA ambin’ny folo taona Manase, fony izy vao nanjaka. ary dimy amby dimam-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Hefziba.
  '10':
  - type: text
    content: 'Ary Jehovah nampilaza ny mpaminany mpanompony hoe: '
  '11':
  - type: text
    content: 'Satria Manase, mpanjakan’ny Joda, nanao izao fahavetavetana izao ka nanao ratsy mihoatra noho izay rehetra nataon’ny Amorita izay teo alohany sady nampanota ny Joda tamin’ny sampiny, '
  '12':
  - type: text
    content: 'dia izao kosa no lazain’i Jehovah, Andriamanitry ny Isiraely: Indro, hahatonga loza amin’i Jerosalema sy Joda Aho, ka izay rehetra mandre izany dia hangintsingintsina ny sofiny roa. '
  '13':
  - type: text
    content: 'Ary hohenjaniko ato Jerosalema ny famolainan’i Samaria sy ny pilaon’ny taranak’i Ahaba; ary hamaoka an’i Jerosalema Aho, toy ny olona mamaoka lovia ka sady mamaoka no manohoka azy koa. '
  '14':
  - type: text
    content: 'Ary hafoiko ny lovako sisa ka hatolotro ho eo an-tànan’ny fahavalony; dia ho sambotra sy ho babon’ny fahavalony rehetra izy, '
  '15':
  - type: text
    content: satria efa nanao izay ratsy eo imasoko izy ka nampahatezitra Ahy hatramin’ny andro nivoahan’ny razany avy tany Egypta ka mandraka androany.
  '16':
  - type: text
    content: Ary na dia ny ra marina aza dia nalatsak’i Manase be dia be mandra-pamenony an’i Jerosalema rehetra, ho fanampin’ny ota izay nampanotany ny Joda tamin’ny nanaovany izay ratsy eo imason’i Jehovah.
  '17':
  - type: text
    content: 'Ary ny tantaran’i Manase sisa mbamin’izay rehetra nataony sy ny fahotana izay nataony, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '18':
  - type: text
    content: Ary Manase lasa nodi-mandry any amin’ny razany, dia nalevina teo an-tanimboly eo ala-tranony amin’ny sahan’i Oza; ary Amona zanany no nanjaka nandimby azy.
  '19':
  - type: text
    content: Roa amby roa-polo taona Amona, fony izy vao nanjaka, ary roa taona no nanjakany tany Jerosalema, Ary ny anaran-dreniny dia Mesolemeta, zanakavavin’i Haroza, avy any Jotba.
  '2':
  - type: text
    content: 'Ary nanao izay ratsy eo imason’i Jehovah izy tahaka ny fahavetavetan’ny firenena izay noroahin’i Jehovah tsy ho eo anoloan’ny Zanak’Isiraely. '
  '20':
  - type: text
    content: 'Ary nanao izay ratsy eo imason’i Jehovah koa izy tahaka ny nataon’i Manase rainy. '
  '21':
  - type: text
    content: 'Fa nandeha tamin’ny làlana rehetra izay efa nalehan-drainy izy ka nanompo ny sampy izay notompoin-drainy sady niankohoka teo anatrehany. '
  '22':
  - type: text
    content: Ary nahafoy an’i Jehovah, Andriamanitry ny razany, izy, fa tsy nandeha tamin’ny làlan’i Jehovah.
  '23':
  - type: text
    content: Ary ny mpanompon’i Amona mpanjaka nikomy taminy ka namono azy tao an-tranony.
  '24':
  - type: text
    content: Ary ny vahoaka namono izay rehetra nikomy tamin’i Amona mpanjaka, dia nampanjaka an’i Josia zanany hisolo azy.
  '25':
  - type: text
    content: 'Ary ny tantaran’i Amona sisa, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  '26':
  - type: text
    content: Ary nalevina tao amin’ny fasany tao amin’ny sahan’i Oza izy; ary Josia zanany no nanjaka nandimby azy.
  '3':
  - type: text
    content: 'Fa namboariny indray ny fitoerana avo, izay noravan’i Hezekia rainy, ka nanangana alitara ho an’i Bala izy sady nanao Aseraha, tahaka izay nataon’i Ahaba, mpanjakan’ny Isiraely, ary niankohoka teo anatrehan’izay rehetra eny amin’ny lanitra izy ka nanompo ireny, '
  '4':
  - type: text
    content: 'sady nanao alitara tao an-tranon’i Jehovah koa izy, dia tao amin’izay nolazain’i Jehovah hoe: Ao Jerosalema no hasiako ny anarako. '
  '5':
  - type: text
    content: 'Fa nanao alitara teo anatin’ny kianja roa tamin’ny tranon’i Jehovah ho an’izay rehetra eny amin’ny lanitra izy. '
  '6':
  - type: text
    content: Ary ny zanany nampamakiny ny afo, sady nanandro sy nanao sikidy izy ary naka ny manao azy ho tsindrian-javatra sy ny mpanao hatsarana, ary nahery nanao izay ratsy eo imason’i Jehovah izy ka nampahatezitra Azy.
  '7':
  - type: text
    content: 'Ary ny sarin’i Astarta izay nataony dia napetrany tao amin’ny trano nolazain’i Jehovah tamin’i Davida sy Solomona zanany hoe: Ato amin’ity trano ity sy eto Jerosalema, izay nofidiko tamin’ny firenen’Isiraely rehetra, no hasiako ny anarako mandrakizay. '
  '8':
  - type: text
    content: 'Ary tsy hampandeha ny tongotry ny Isiraely intsony hiala amin’ny tany izay nomeko ny razany Aho, raha mba hitandrina ka hanao araka izay rehetra nandidiako azy sy araka ny lalàna rehetra izay nandidian’i Mosesy mpanompoko azy ihany izy. '
  '9':
  - type: text
    content: Nefa tsy nihaino izy; fa Manase nitaona azy hanao ratsy mihoatra noho ny nataon’ny jentilisa, izay naringan’i Jehovah tsy ho eo anoloan’ny Zanak’Isiraely.
