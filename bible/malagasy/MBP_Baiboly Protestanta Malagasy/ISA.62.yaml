document_id: ISA.62
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny handrosoan’ny voninahitr’i Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TSY hangina Aho noho ny amin’i Ziona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hitsaha-miteny Aho noho ny amin’i Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-piposaky ny fahamarinany tahaka ny famirapiratry ny mazava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny famonjena azy tahaka ny fanilo mirehitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny firenena hahita ny fahamarinanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpanjaka rehetra hahita ny voninahitrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia homena anaram-baovao hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hotononin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hotendren’
    marker-yv: yv-n
  - type: text
    text: ' ny vavan’i Jehovah;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ka dia ho tonga satroboninahitra eo an-tànany hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy satrok’andriana eo am-pelatànan’Andriamanitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hianao tsy hatao intsony hoe Nafoy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taninao tsy hatao intsony hoe Lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hianao hatao hoe Ilay sitrako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taninao hatao hoe Vady ampakarina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa sitrak’i Jehovah hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taninao hampanambadina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tahaka ny zatovo mampakatra virijina ho vadiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hampakaran’ny mponina aminao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zanakao-lahy.
    marker-yv: yv-n
  - type: text
    text: ' anao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny fifalian’ny mpampakatra amin’ny ampakariny
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hifalian’Andriamanitrao aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa nanendry mpiambina ho eny ambonin’ny màndanao Aho, ry Jerosalema ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa mandrakariva na andro na alina dia tsy mahazo mangina ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hianareo izay mpampahatsiaro an’i Jehovah, aza mitsahatra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary aza mamela Azy hitsahatra mandra-panaony an’i Jerosalema ho mafy orina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hoderaina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jehovah efa nianiana tamin’ny tànany ankavanana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia tamin’ny sandriny mahery, hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy homeko hohanin’ny fahavalonao intsony ny varinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hafa firenena tsy hisotro ny ranom-boalobokao izay efa nisasaranao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa izay nijinja azy no hihinana azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hidera an’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay nioty azy no hisotro azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny kianjako masina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mivoaha, mivoaha amin’ny vavahady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amboary ny làlana halehan’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asandrato ho avo ny làlambe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esory ny vato eny aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manangàna faneva ho tazan’ny firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indro, Jehovah efa nanambara hatrany amin’ny faran’izao tontolo izao nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lazao amin’i Ziona zanakavavy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, avy ny famonjena anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro; ny valim-pitia hatolony dia ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny valin’asa homeny dia eo anoloany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ireny hotononina hoe Firenena masina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia olona navotan’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hianao dia hatao hoe Ilay notadiavina, Tanàna tsy foy.
