document_id: ISA.62,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handrosoan’ny voninahitr’i Jerosalema.
  - type: text
    content: TSY hangina Aho noho ny amin’i Ziona,
  - type: text
    content: Ary tsy hitsaha-miteny Aho noho ny amin’i Jerosalema,
  - type: text
    content: Mandra-piposaky ny fahamarinany tahaka ny famirapiratry ny mazava,
  - type: text
    content: Ary ny famonjena azy tahaka ny fanilo mirehitra.
  '10':
  - type: text
    content: Mivoaha, mivoaha amin’ny vavahady,
  - type: text
    content: Amboary ny làlana halehan’ny olona;
  - type: text
    content: Asandrato ho avo ny làlambe;
  - type: text
    content: Esory ny vato eny aminy;
  - type: text
    content: Manangàna faneva ho tazan’ny firenena.
  '11':
  - type: text
    content: 'Indro, Jehovah efa nanambara hatrany amin’ny faran’izao tontolo izao nanao hoe:'
  - type: text
    content: 'Lazao amin’i Ziona zanakavavy:'
  - type: text
    content: Indro, avy ny famonjena anao;
  - type: text
    content: Indro; ny valim-pitia hatolony dia ao aminy,
  - type: text
    content: Ary ny valin’asa homeny dia eo anoloany.
  '12':
  - type: text
    content: Ary ireny hotononina hoe Firenena masina,
  - type: text
    content: Dia olona navotan’i Jehovah;
  - type: text
    content: Ary hianao dia hatao hoe Ilay notadiavina, Tanàna tsy foy.
  '2':
  - type: text
    content: Ny firenena hahita ny fahamarinanao,
  - type: text
    content: Ary ny mpanjaka rehetra hahita ny voninahitrao;
  - type: text
    content: Dia homena anaram-baovao hianao,
  - type: text
    content: Izay hotononin’
  - type: note
    content: Heb. hotendren’
  - type: text
    content: ' ny vavan’i Jehovah;'
  '3':
  - type: text
    content: Ka dia ho tonga satroboninahitra eo an-tànany hianao
  - type: text
    content: Sy satrok’andriana eo am-pelatànan’Andriamanitrao.
  '4':
  - type: text
    content: Hianao tsy hatao intsony hoe Nafoy,
  - type: text
    content: Ary ny taninao tsy hatao intsony hoe Lao
  - type: text
    content: Fa hianao hatao hoe Ilay sitrako,
  - type: text
    content: Ary ny taninao hatao hoe Vady ampakarina;
  - type: text
    content: Fa sitrak’i Jehovah hianao,
  - type: text
    content: Ary ny taninao hampanambadina.
  '5':
  - type: text
    content: Fa tahaka ny zatovo mampakatra virijina ho vadiny
  - type: text
    content: No hampakaran’ny mponina aminao
  - type: note
    content: Heb. zanakao-lahy.
  - type: text
    content: ' anao;'
  - type: text
    content: Ary tahaka ny fifalian’ny mpampakatra amin’ny ampakariny
  - type: text
    content: No hifalian’Andriamanitrao aminao.
  '6':
  - type: text
    content: Efa nanendry mpiambina ho eny ambonin’ny màndanao Aho, ry Jerosalema ô,
  - type: text
    content: Koa mandrakariva na andro na alina dia tsy mahazo mangina ireny;
  - type: text
    content: Eny, hianareo izay mpampahatsiaro an’i Jehovah, aza mitsahatra;
  '7':
  - type: text
    content: Ary aza mamela Azy hitsahatra mandra-panaony an’i Jerosalema ho mafy orina
  - type: text
    content: Sy hoderaina amin’ny tany.
  '8':
  - type: text
    content: Jehovah efa nianiana tamin’ny tànany ankavanana,
  - type: text
    content: 'Dia tamin’ny sandriny mahery, hoe:'
  - type: text
    content: Tsy homeko hohanin’ny fahavalonao intsony ny varinao,
  - type: text
    content: Ary ny hafa firenena tsy hisotro ny ranom-boalobokao izay efa nisasaranao;
  '9':
  - type: text
    content: Fa izay nijinja azy no hihinana azy
  - type: text
    content: Ka hidera an’i Jehovah;
  - type: text
    content: Ary izay nioty azy no hisotro azy
  - type: text
    content: Ao amin’ny kianjako masina.
