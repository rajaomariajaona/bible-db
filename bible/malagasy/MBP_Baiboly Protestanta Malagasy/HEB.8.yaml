document_id: HEB.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitahana ny fanompoam-pivavahana tao amin’ny tabernakely araka ny lalàn’i Mosesy sy ny any an-danitra.
  - type: text
    content: 'ARY amin’izany zavatra lazainay izany dia izao no fotony: Manana Mpisoronabe toy izany isika, dia Ilay efa mipetraka eo amin’ny ankavanan’ny seza fiandrianan’ny Avo Indrindra any an-danitra, '
  '10':
  - type: text
    content: Fa izao no fanekena hataoko amin’ny taranak’Isiraely,
  - type: text
    content: 'Rehefa afaka izany andro izany, hoy Jehovah:'
  - type: text
    content: Dia hataoko ao an-tsainy ny lalàko,
  - type: text
    content: Sady hosoratako ao am-pony,
  - type: text
    content: Ary Izaho ho Andriamaniny, ary izy ho oloko;
  '11':
  - type: text
    content: Ary samy tsy hampianatra ny namany sy ny rahalahiny avy izy.
  - type: text
    content: 'Na hanao hoe: Mahalalà an’i Jehovah;'
  - type: text
    content: Fa samy hahalala Ahy avokoa izy rehetra
  - type: text
    content: Hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra;
  '12':
  - type: text
    content: Fa hamindra fo amin’ny tsi-fahamarinany Aho,
  - type: text
    content: Ary tsy hotsarovako intsony ny fahotany’’ (Jer. 31.31–34).
  '13':
  - type: text
    content: Amin’ny anaovany hoe ,vaovao’ dia nataony fa efa ela ny voalohany. Fa izay tratra ela sy mihantitra dia efa madiva ho levona.
  '2':
  - type: text
    content: Mpanao fanompoam-pivavahana ao amin’ny fitoerana masina sy ny tena tabernakely, izay naorin’ny Tompo, fa tsy olona.
  '3':
  - type: text
    content: 'Fa ny mpisoronabe rehetra dia tendrena hanatitra fanomezana sy fanatitra; ary amin’izany dia tsy maintsy mba manan-katerina koa Izy. '
  '4':
  - type: text
    content: 'Koa raha etỳ ambonin’ny tany dia tsy mba ho mpisorona akory Izy, satria misy rahateo ireo manatitra ny fanomezana araka ny lalàna, '
  '5':
  - type: text
    content: 'dia ireo manao fanompoam-pivavahana amin’izay endrika sy aloky ny zavatra any an-danitra, tahaka ny natoron’Andriamanitra an’i Mosesy, rehefa hanao ny tabernakely izy; fa hoy Izy: ,,Tandremo mba hataonao araka ny endrika izay naseho taminao tao an-tendrombohitra ny zavatra rehetra’’ (Eks. 25.40). '
  '6':
  - type: text
    content: Fa ankehitriny efa mahazo fanompoam-pivavahana tsara noho ny an’ireny Izy, dia araka ny nanaovana Azy ho Mpanalalana amin’ny fanekena tsara lavitra, izay natao tamin’ny teny fikasana tsara lavitra.
  '7':
  - type: text
    content: 'Fa raha tsy nanan-tsiny izany fanekena voalohany izany, dia tsy mba nisy fitoerana hotadiavina ho an’ny faharoa. '
  '8':
  - type: text
    content: 'Fa manome tsiny ny olona Izy manao hoe:'
  - type: text
    content: ',,Indro, avy ny andro, hoy Jehovah,'
  - type: text
    content: Izay hanaovako fanekena vaovao amin’ny taranak’Isiraely sy ny taranak’i Joda,
  '9':
  - type: text
    content: Nefa tsy araka ny fanekena nataoko tamin’ny razany
  - type: text
    content: Tamin’ny andro nitantanako azy nitondra azy nivoaka avy tany amin’ny tany Egypta;
  - type: text
    content: Fa izy ireny tsy nitoetra tamin’ny fanekeko,
  - type: text
    content: Ary Izaho kosa dia tsy nitandrina azy, hoy Jehovah.
