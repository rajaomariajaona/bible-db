document_id: HEB.8
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fampitahana ny fanompoam-pivavahana tao amin’ny tabernakely araka ny lalàn’i Mosesy sy ny any an-danitra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY amin’izany zavatra lazainay izany dia izao no fotony: Manana Mpisoronabe toy izany isika, dia Ilay efa mipetraka eo amin’ny ankavanan’ny seza fiandrianan’ny Avo Indrindra any an-danitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mpanao fanompoam-pivavahana ao amin’ny fitoerana masina sy ny tena tabernakely, izay naorin’ny Tompo, fa tsy olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny mpisoronabe rehetra dia tendrena hanatitra fanomezana sy fanatitra; ary amin’izany dia tsy maintsy mba manan-katerina koa Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa raha etỳ ambonin’ny tany dia tsy mba ho mpisorona akory Izy, satria misy rahateo ireo manatitra ny fanomezana araka ny lalàna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia ireo manao fanompoam-pivavahana amin’izay endrika sy aloky ny zavatra any an-danitra, tahaka ny natoron’Andriamanitra an’i Mosesy, rehefa hanao ny tabernakely izy; fa hoy Izy: ,,Tandremo mba hataonao araka ny endrika izay naseho taminao tao an-tendrombohitra ny zavatra rehetra’’ (Eks. 25.40). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ankehitriny efa mahazo fanompoam-pivavahana tsara noho ny an’ireny Izy, dia araka ny nanaovana Azy ho Mpanalalana amin’ny fanekena tsara lavitra, izay natao tamin’ny teny fikasana tsara lavitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha tsy nanan-tsiny izany fanekena voalohany izany, dia tsy mba nisy fitoerana hotadiavina ho an’ny faharoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa manome tsiny ny olona Izy manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Indro, avy ny andro, hoy Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hanaovako fanekena vaovao amin’ny taranak’Isiraely sy ny taranak’i Joda,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nefa tsy araka ny fanekena nataoko tamin’ny razany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro nitantanako azy nitondra azy nivoaka avy tany amin’ny tany Egypta;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izy ireny tsy nitoetra tamin’ny fanekeko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izaho kosa dia tsy nitandrina azy, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izao no fanekena hataoko amin’ny taranak’Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Rehefa afaka izany andro izany, hoy Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hataoko ao an-tsainy ny lalàko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hosoratako ao am-pony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izaho ho Andriamaniny, ary izy ho oloko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary samy tsy hampianatra ny namany sy ny rahalahiny avy izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Na hanao hoe: Mahalalà an’i Jehovah;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa samy hahalala Ahy avokoa izy rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny kely indrindra ka hatramin’ny lehibe indrindra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa hamindra fo amin’ny tsi-fahamarinany Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hotsarovako intsony ny fahotany’’ (Jer. 31.31–34).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Amin’ny anaovany hoe ,vaovao’ dia nataony fa efa ela ny voalohany. Fa izay tratra ela sy mihantitra dia efa madiva ho levona.
