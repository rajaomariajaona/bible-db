document_id: HEB.6,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa aoka hilaozantsika ny abidim-pianarana ny amin’i Kristy, fa aoka handroso ho amin’ny tanteraka isika ka tsy hanao fanorenana indray, dia fibebahana hahafahana amin’ny asa maty sy finoana an’Andriamanitra, '
  '10':
  - type: text
    content: 'Fa Andriamanitra tsy mba tsy marina hanadino ny asanareo sy ny fitiavana izay nasehonareo ho voninahitry ny anarany, raha nanompo ny olona masina hianareo sady mbola manompo ihany. '
  '11':
  - type: text
    content: 'Ary mbola irinay hianareo rehetra samy haneho izany fahazotoana izany mba hahazo ny fahatokiana be ny amin’ny fanantenana hatramin’ny farany; '
  '12':
  - type: text
    content: mba tsy hiketraka hianareo, fa hanahaka ireo mandova araka ny teny fikasana amin’ny finoana sy ny faharetana.
  '13':
  - type: text
    content: 'Fa Andriamanitra nanao teny fikasana tamin’i Abrahama, ary satria tsy nisy lehibe noho ny tenany izay azony nianianana, dia nianiana tamin’ny tenany Izy '
  '14':
  - type: text
    content: 'ka nanao hoe ,,Hitahy anao tokoa Aho ary hahamaro dia hahamaro anao’’ (Gen. 22.17). '
  '15':
  - type: text
    content: Ary araka izany, rehefa naharitra tsara Abrahama, dia nahazo ny teny fikasana.
  '16':
  - type: text
    content: 'Fa ny olona dia mianiana amin’izay lehibe noho ny tenany; ary ny fianianana dia ataony mba hahamafy ny teny hampitsahatra ny fifandirana rehetra. '
  '17':
  - type: text
    content: 'Ary amin’izany, raha Andriamanitra ta-haneho kokoa amin’ny mpandova araka ny teny fikasana ny tsi-fiovan’ny sitrapony, dia nataony mafy tamin’ny fianianana izany, '
  '18':
  - type: text
    content: 'mba ho zavatra roa loha tsy mety miova, izay tsy hain’Andriamanitra andaingana, no hahazoantsika famporisihana mafy, dia isika izay nandositra hihazona ny fanantenana napetraka eo anoloantsika, '
  '19':
  - type: text
    content: 'izay ananantsika ho vatofantsiky ny aina sady mafy no tsy mihetsika ary miditra any anatin’ny efitra lamba; '
  '2':
  - type: text
    content: 'ary fampianarana ny amin’ny fisasana maro sy ny fametrahan-tànana, ary ny fitsanganan’ny maty sy ny fitsarana mandrakizay. '
  '20':
  - type: text
    content: tany no nidiran’i Jesosy ho Mpialoha antsika, rehefa tonga Mpisoronabe ,,mandrakizay araka ny fanaon’i Melkizedeka’’ Izy.
  '3':
  - type: text
    content: Ary izany no hataontsika, raha avelan’Andriamanitra.
  '4':
  - type: text
    content: 'Fa izay efa nohazavaina indray mandeha sady efa nanandrana ny fanomezana avy any an-danitra sy efa nandray ny Fanahy Masina '
  '5':
  - type: text
    content: 'ary efa nanandrana ny teny tsaran’Andriamanitra sy ny herin’ny fiainana ho avy, '
  '6':
  - type: text
    content: nefa nihemotra, dia tsy azo havaozina indray ho amin’ny fibebahana, satria manombo ny Zanak’Andriamanitra indray amin’ny hazofijaliana ka manao Azy ho fahamenarana.
  '7':
  - type: text
    content: 'Fa izay tany mifoka ny ranonorana milatsaka aminy matetika ka maniry anana tsara ho an’ny olona iasana azy dia mahazo fitahiana avy amin’Andriamanitra; '
  '8':
  - type: text
    content: fa izay maniry tsilo sy songosongo kosa dia lavina sady akaikin’ny ozona, ary ny hiafarany dia ny hodorana.
  '9':
  - type: text
    content: 'Nefa, ry malala, na dia miteny izany aza izahay, dia manantena zavatra tsara ny aminareo, dia izay momba ny famonjena. '
