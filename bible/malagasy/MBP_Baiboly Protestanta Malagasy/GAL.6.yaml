document_id: GAL.6,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ry rahalahy, raha misy olona azon’ny ota tsy nahy aza,
  - type: note
    content: 'Na: azo olan-tànana amin’izay fahadisoana aza.'
  - type: text
    content: ' dia atsanganonareo izay manana ny Fanahy amin’ny fahamorana izy, ka mihevera ny tenanao, fandrao hianao koa mba halaim-panahy ihany. '
  '10':
  - type: text
    content: Koa araka ny ananantsika andro hanaovana, dia aoka isika hanao soa amin’ny olona rehetra, indrindra fa amin’ny mpianakavin’ny finoana.
  - type: heading
    content: Anatra farany.
  '11':
  - type: text
    content: INDRO ny havaventin’ny soratra izay soratan’ny tànako ho aminareo.
  '12':
  - type: text
    content: 'Na iza na iza te-hiseho ho tsara amin’ny nofo, dia ireo no manery anareo hoforana, nefa noho izao ihany: fandrao henjehina noho ny hazofijalian’i Kristy izy. '
  '13':
  - type: text
    content: 'Fa na dia ny tenan’izy voafora aza dia tsy mitandrina ny lalàna; kanefa tiany ho forana koa hianareo, mba hireharehany amin’ny nofonareo '
  '14':
  - type: text
    content: Fa sanatria raha mba misy hataoko rehareha afa-tsy ny hazofijalian’i Jesosy Kristy Tompontsika, Izay
  - type: note
    content: 'Na: izay.'
  - type: text
    content: ' naha-voahombo izao tontolo izao tamin’ny hazofijaliana, raha ny amiko, ary izaho kosa, raha ny amin’izao tontolo izao. '
  '15':
  - type: text
    content: 'Fa samy tsy mahasoa na ny famorana na ny tsi-famorana, fa ny ho olom-baovao. '
  '16':
  - type: text
    content: Ary izay rehetra mandeha araka ity fitsipika ity, dia ho aminy anie ny fiadanana sy ny famindrampo, ary ho amin’ny Isiraelin’Andriamanitra.
  '17':
  - type: text
    content: Amin’izao sisa izao aoka tsy hisy hanahirana ahy intsony; fa izaho mitondra ny marik’i Jesosy voatomboka eo amin’ny tenako.
  '18':
  - type: text
    content: Ho amin’ny fanahinareo anie, ry rahalahy, ny fahasoavan’i Jesosy Kristy Tompontsika. Amena.
  '2':
  - type: text
    content: Mifampitondrà izay mahavesatra, ary aoka izany no hahatanterahanareo ny lalàn’i Kristy.
  '3':
  - type: text
    content: 'Fa raha misy manao ny tenany ho zavatra, kanjo tsinontsinona, dia mamitaka ny tenany izy. '
  '4':
  - type: text
    content: 'Fa aoka ny olona rehetra samy hizaha toetra ny asany avy, dia samy hanana hafaliana ny amin’ny tenany ihany izy, fa tsy ny amin’ny olon-kafa; '
  '5':
  - type: text
    content: fa samy hitondra ny entany avy ny olona rehetra.
  '6':
  - type: text
    content: 'Aoka izay ampianarina ny teny mba hahafoy zava-tsoa ho an’izay mampianatra. '
  '7':
  - type: text
    content: 'Aza mety hofitahina hianareo; Andriamanitra tsy azo vazivazina, fa izay afafin’ny olona no hojinjany. '
  '8':
  - type: text
    content: 'Fa izay mamafy ho an’ny nofony dia hijinja fahasimbana avy amin’ny nofo; ary izay mamafy ho an’ny Fanahy dia hijinja fiainana mandrakizay avy amin’ny Fanahy. '
  '9':
  - type: text
    content: 'Ary aza mba ketraka amin’ny fanaovan-tsoa isika; fa amin’ny fotoan’andro no hijinjantsika, raha tsy reraka isika. '
