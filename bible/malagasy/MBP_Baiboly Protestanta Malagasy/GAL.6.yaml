document_id: GAL.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ry rahalahy, raha misy olona azon’ny ota tsy nahy aza,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: azo olan-tànana amin’izay fahadisoana aza.
    marker-yv: yv-n
  - type: text
    text: ' dia atsanganonareo izay manana ny Fanahy amin’ny fahamorana izy, ka mihevera ny tenanao, fandrao hianao koa mba halaim-panahy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mifampitondrà izay mahavesatra, ary aoka izany no hahatanterahanareo ny lalàn’i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa raha misy manao ny tenany ho zavatra, kanjo tsinontsinona, dia mamitaka ny tenany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa aoka ny olona rehetra samy hizaha toetra ny asany avy, dia samy hanana hafaliana ny amin’ny tenany ihany izy, fa tsy ny amin’ny olon-kafa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: fa samy hitondra ny entany avy ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aoka izay ampianarina ny teny mba hahafoy zava-tsoa ho an’izay mampianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza mety hofitahina hianareo; Andriamanitra tsy azo vazivazina, fa izay afafin’ny olona no hojinjany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa izay mamafy ho an’ny nofony dia hijinja fahasimbana avy amin’ny nofo; ary izay mamafy ho an’ny Fanahy dia hijinja fiainana mandrakizay avy amin’ny Fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary aza mba ketraka amin’ny fanaovan-tsoa isika; fa amin’ny fotoan’andro no hijinjantsika, raha tsy reraka isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa araka ny ananantsika andro hanaovana, dia aoka isika hanao soa amin’ny olona rehetra, indrindra fa amin’ny mpianakavin’ny finoana.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Anatra farany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: INDRO ny havaventin’ny soratra izay soratan’ny tànako ho aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Na iza na iza te-hiseho ho tsara amin’ny nofo, dia ireo no manery anareo hoforana, nefa noho izao ihany: fandrao henjehina noho ny hazofijalian’i Kristy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa na dia ny tenan’izy voafora aza dia tsy mitandrina ny lalàna; kanefa tiany ho forana koa hianareo, mba hireharehany amin’ny nofonareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa sanatria raha mba misy hataoko rehareha afa-tsy ny hazofijalian’i Jesosy Kristy Tompontsika, Izay
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izay.
    marker-yv: yv-n
  - type: text
    text: ' naha-voahombo izao tontolo izao tamin’ny hazofijaliana, raha ny amiko, ary izaho kosa, raha ny amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa samy tsy mahasoa na ny famorana na ny tsi-famorana, fa ny ho olom-baovao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary izay rehetra mandeha araka ity fitsipika ity, dia ho aminy anie ny fiadanana sy ny famindrampo, ary ho amin’ny Isiraelin’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Amin’izao sisa izao aoka tsy hisy hanahirana ahy intsony; fa izaho mitondra ny marik’i Jesosy voatomboka eo amin’ny tenako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ho amin’ny fanahinareo anie, ry rahalahy, ny fahasoavan’i Jesosy Kristy Tompontsika. Amena.
