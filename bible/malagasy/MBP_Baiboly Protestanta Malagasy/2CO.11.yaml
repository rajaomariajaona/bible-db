document_id: 2CO.11,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Enga anie ka mba handefitra amiko amin’ny hadalana kely hianareo, kanefa mandefitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eny, mandefera.
      marker-yv: yv-n
    - type: text
      text: ' amiko ihany hianareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha ato anatiko koa ny fahamarinan’i Kristy, dia tsy hisy hahafoana izany reharehako izany any amin’ny tany Akaia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nahoana? Satria tsy tiako va hianareo? Andriamanitra no mahalala. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa izay ataoko no mbola hataoko ihany, mba hampitsaharako ny famelezan’izay mitady hamely, mba ho hita fa tahaka anay ihany izy amin’izay ireharehany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa Apostoly sandoka izy ireny, mpiasa mamitaka, ka dia mampiova ny endriny ho tahaka ny Apostolin’i Kristy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary tsy mahagaga izany, fa Satana aza mampiova ny endriny ho tahaka ny anjelin’ny mazava. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Koa tsy dia zavatra lehibe tsy akory, raha ny mpanompony koa no mba mampiova ny endriny ho tahaka ny mpanompon’ny fahamarinana; nefa ny farany ho araka ny asany ihany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hoy izaho indray: Aza misy manao ahy ho adala; nefa, na dia misy manao izany aza, raiso toy ny adala aho mba hireharehako kelikely koa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Izao lazaiko izao dia tsy lazaiko araka ny Tompo, fa toa amin’ny fahadalana amin’izao rehareha matoky izao ihany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Satria maro no mirehareha araka ny nofo, dia mba hirehareha koa aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa sitrakareo ny handefitra amin’ny adala, satria hendry angaha hianareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa fahasaro-piaro araka an’Andriamanitra no mahasaro-piaro ahy aminareo; fa nataoko fofom-badin’ny lehilahy iray hianareo, mba hatolotro tahaka ny virijina madio ho an’i Kristy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa hay! mandefitra ihany hianareo, raha misy manandevo anareo, raha misy mandany anareo, raha misy misambotra anareo, raha misy mirehareha aminareo, raha misy mamely ny tavanareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Manala-barà-tena aho ka toa manaiky fa nalemy izahay!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin’izay mahasahy ny olona (miteny toy ny adala aho), dia mba sahy koa aho. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hebreo va izy? Izaho koa. Isiraelita va izy? Izaho koa. Taranak’i Abrahama va izy? Izaho koa. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mpanompon’i Kristy va izy? (miteny toy ny olona very saina aho) mihoatra noho izy aho: amin’ny fisasarana manantombo, amin’ny trano-maizina matetika kokoa, amin’ny kapoka be efa izay tsy izy, amin’ny fahafatesana matetika. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Indimy aho no nokapohin’ny Jiosy inefa-polo latsaka iray avy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Intelo nokapohina tamin’ny hazo aho, indray maka notoraham-bato, intelo no vaky sambo, indray andro sy indray alina no nitoetra teo amin’ny lalina, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'nandeha matetika aho, saiky nahita loza tamin’ny ony, saiky nahita loza tamin’ny jiolahy, saiky nahita loza tamin’ny tompon-tany namako, saiky nahita loza tamin’ny jentilisa, saiky nahita loza tao amin’ny tanàna aho, saiky nahita loza tany an-efitra aho, saiky nahita loza tany amin’ny ranomasina aho, saiky nahita loza tamin’ny rahalahy sandoka aho, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'tamin’ny fisasarana sy ny fikelezan-aina, tamin’ny tsi-fahitan-tory matetika, tamin’ny hanoanana sy ny hetaheta, tamin’ny fifadian-kanina matetika, tamin’ny hatsiaka sy ny fitanjahana. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Afa-tsy ireo zavatra ivelany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.28 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: izany rehetra izany.
      marker-yv: yv-n
    - type: text
      text: ' dia mbola misy koa izay mahazo ahy isan-andro, dia ny fiahiana ny fiangonana rehetra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Iza no malemy, ka tsy malemy aho? Iza no tafintohina, ka tsy mirehitra aho?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa matahotra aho, fandrao ny sainareo ho simba hiala amin’ny fahitsiam-po sy ny fahadiovana amin’i Kristy, tahaka ny namitahan’ny menarana an’i Eva tamin’ny fihendreny. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Raha tsy maintsy mirehareha aho, dia izay momba ny fahalemeko no hataoko rehareha. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Andriamanitra, Rain’i Jesosy Tompo, Izay isaorana mandrakizay, mahalala fa tsy mandainga aho. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Tany Damaskosy ny governora notendren’i Areta mpanjaka dia nampiambina ny tanàna Damaskosy mba hisambotra ahy; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: fa avy teo amin’ny varavarankely eo amin’ny mànda no nampidinana ahy tamin’ny sobiky, ka dia afa-nandositra ny tànany aho.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa raha misy tonga ka mitory Jesosy hafa izay tsy notorinay, na hianareo mandray fanahy hafa na filazantsara hafa izay tsy noraisinareo, hay! tsara ny andeferanareo amin’izany! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa ataoko fa tsy misy mahalatsaka ahy noho ireo Apostoly ambony indrindra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fatratra loatra.
      marker-yv: yv-n
    - type: text
      text: ' ireo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa na dia olona tsy nampianarina laha-teny aza aho, dia tsy mba tahaka izany aho amin’ny fahalalana; fa tamin’ny zavatra rehetra dia efa nasehonay marimarina tamin’ny olona rehetra izany hahasoa anareo.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Diso va aho, raha nanetry tena mba hisandratanareo ka nitory maimaimpoana ny filazantsaran’Andriamanitra taminareo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Namabo ny fiangonana sasany aho ka nandray karama hanompoako anareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa raha nitoetra teo aminareo aho ka tsy nanana, dia tsy mba nahavaky tratra olona aho; fa raha vao tonga avy tany Makedonia ny rahalahy, dia nomeny ahy izay nilaiko; ary tamin’ny zavatra rehetra dia nitandrina tsara izay tsy hahavaky tratra anareo aho sady mbola hitandrina izany ihany. '
