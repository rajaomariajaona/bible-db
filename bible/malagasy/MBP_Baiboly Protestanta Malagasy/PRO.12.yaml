document_id: PRO.12,873
type_code: plt
verses:
  '1':
  - type: text
    content: Izay tia fananarana no tia fahalalana;
  - type: text
    content: Fa izay mandà anatra dia biby.
  '10':
  - type: text
    content: Ny marina mitsimbina ny ain’ny bibiny;
  - type: text
    content: Fa fahasiahana kosa no famindrampon’ny ratsy fanahy.
  '11':
  - type: text
    content: Izay miasa ny taniny dia ho voky hanina;
  - type: text
    content: Fa izay manaraka ny olom-poana
  - type: note
    content: 'Na: ny zava-poana.'
  - type: text
    content: ' dia tsy ampy saina.'
  '12':
  - type: text
    content: Ny mpanota maniry ny hazan’
  - type: note
    content: 'Na: ny fandriky.'
  - type: text
    content: ' ny ratsy fanahy;'
  - type: text
    content: Fa ny fàkan’ny marina mitrebona.
  - type: note
    content: 'Na: Fa ny marina ataon’Andriamanitra miorim-paka.'
  '13':
  - type: text
    content: Amin’ny fahotan’ny molotra dia misy fandrika ahitan-doza;
  - type: text
    content: Fa ny marina ho afaka amin’ny fahoriana.
  '14':
  - type: text
    content: Ny vokatry ny vavan’ny olona no mahavoky soa azy,
  - type: text
    content: Ary ny asan’ny tànany hitsingerina aminy.
  '15':
  - type: text
    content: Ny làlan’ny adala dia mahitsy eo imasony;
  - type: text
    content: Fa izay mino anatra no hendry.
  '16':
  - type: text
    content: Ny fahasosoran’ny adala dia fantatra miaraka amin’izay;
  - type: text
    content: Fa izay mahatsindry fo amin’ny fanalam-baraka no hendry.
  '17':
  - type: text
    content: Izay olona mahatoky dia manambara ny rariny;
  - type: text
    content: Fa ny vavolombelona mandainga kosa miteny fitaka.
  '18':
  - type: text
    content: Misy mandefalefa teny tsy tsaroana ka tonga toy ny fanindron’ny sabatra;
  - type: text
    content: Fa ny lelan’ny marina dia fanasitranana kosa.
  '19':
  - type: text
    content: Ny molotra marina ampitoerina ho mandrakizay;
  - type: text
    content: Fa ny lela mandainga dia indray mipì-maso monja.
  '2':
  - type: text
    content: Ny tsara fanahy mahazo sitraka amin’i Jehovah;
  - type: text
    content: Fa ny mamoron-tsain-dratsy hohelohiny.
  '20':
  - type: text
    content: Fitaka no ao am-pon’izay mamoron-tsain-dratsy;
  - type: text
    content: Fa hafaliana no amin’izay misaina fiadanana.
  '21':
  - type: text
    content: Tsy misy ratsy manjo ny marina;
  - type: text
    content: Fa heni-doza
  - type: note
    content: Heb. henika ny ratsy.
  - type: text
    content: ' ny ratsy fanahy.'
  '22':
  - type: text
    content: Fahavetavetana eo imason’i Jehovah ny molotra mandainga;
  - type: text
    content: Fa izay olona mahatoky no ankasitrahany.
  '23':
  - type: text
    content: Ny olon-kendry tsy mba mampideradera fahalalana foana;
  - type: note
    content: Heb. manafina fahalalana.
  - type: text
    content: Fa ny fon’ny adala mamoaka fahadalana.
  '24':
  - type: text
    content: Ny tànan’ny mazoto no hanapaka;
  - type: text
    content: Fa izay miraviravy tànana dia hampanompoina.
  '25':
  - type: text
    content: Ny alahelo ao am-pon’ny olona dia mampitanondrika azy;
  - type: text
    content: Fa ny teny soa no mahafaly azy.
  '26':
  - type: text
    content: Ny marina dia mitari-dàlana ny namany;
  - type: text
    content: Fa ny alehan’ny ratsy fanahy kosa no mampivily azy.
  '27':
  - type: text
    content: Ny kamo tsy mety mihaza;
  - type: note
    content: 'Na: tsy mahatono izay nohazainy.'
  - type: text
    content: Fa fananana soa ho an’ny olona ny zoto.
  '28':
  - type: text
    content: Amin’ny làlan’ny fahamarinana no misy fiainana,
  - type: text
    content: Ary ny tsi-fahafatesana no làlan-kalehany.
  '3':
  - type: text
    content: Tsy maha-tafatoetra ny olona ny haratsiana;
  - type: text
    content: Fa ny fàkan’ny marina tsy mba hihetsika.
  '4':
  - type: text
    content: Ny vehivavy tsara dia satroboninahitry ny lahy;
  - type: text
    content: Fa ny vehivavy manao izay mahamenatra kosa dia tahaka ny lo ao anatin’ny taolana.
  '5':
  - type: text
    content: Rariny ny hevitry ny marina;
  - type: text
    content: Fa fitaka ny fisainan’ny ratsy fanahy.
  '6':
  - type: text
    content: Ny tenin’ny ratsy fanahy dia otrika ho enti-mandatsa-dra;
  - type: text
    content: Fa ny vavan’ny marina hamonjy azy.
  '7':
  - type: text
    content: Haringana ny ratsy fanahy ka tsy ho ao intsony;
  - type: note
    content: 'Na: Vetivety foana dia tsy ao intsony ny ratsy fanahy.'
  - type: text
    content: Fa ny mpianakavin’ny marina haharitra.
  '8':
  - type: text
    content: Araka ny fahendren’ny olona no hiderana azy;
  - type: text
    content: Fa izay meloka am-po dia hatao tsinontsinona.
  '9':
  - type: text
    content: Aleo ambany toetra, nefa manana mpanompo iray,
  - type: text
    content: Toy izay mihambo ho be voninahitra, nefa tsy manan-kohanina akory.
