document_id: EXO.26,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary ny tabernakely dia hataonao ambainy folo amin’ny rongony fotsy madinika voahasina sy manga sy volomparasy ary mena; kerobima, asan’ny mpanenona mahay, no hataonao sorany. '
  '10':
  - type: text
    content: 'Ary manaova tadivavarana dimam-polo eo an-tsisin’ny ambainy iray izay farany amin’ny efa voavitrana; ary tadivavarana dimam-polo koa ho eo an-tsisin’ny ambainy iray amin’ny anankiray koa efa voavitrana. '
  '11':
  - type: text
    content: 'Ary manaova farango varahina dimam-polo, ka ampidiro ho eo amin’ny tadivavarana ary akambano ny lay, ka dia ho iray ihany izy. '
  '12':
  - type: text
    content: 'Ary izay mihoatra amin’ny ambain’ny lay, dia ny antsasaky ny ambainy izay mihoatra, dia avelao hiraviravy eo ivohon’ny tabernakely. '
  '13':
  - type: text
    content: Ary ny iray hakiho avy eo amin’ny lohany roa amin’ny lamba, izay mihoatra amin’ny halavan’ny ambain’ny lay, dia avelao hiraviravy eo amin’ny lafibeny roa amin’ny tabernakely handrakotra azy.
  '14':
  - type: text
    content: Ary manaova koa rakotry ny lay amin’ny hoditr’ondrilahy efa nomenaina, ary manaova sarony hodi-takasy
  - type: note
    content: Izahao xxv. 5.
  - type: text
    content: ' ho eo amboniny.'
  '15':
  - type: text
    content: 'Ary manaova zanakazo akasia ho amin’ny tabernakely. '
  '16':
  - type: text
    content: 'Folo hakiho ny hahavon’ny zanakazo iray, ary iray hakiho sy sasany ny indraben’ny zanakazo iray. '
  '17':
  - type: text
    content: 'Lahiny roa no ho amin’ny zanakazo iray, ka hasiana izay hikambanany; izany no hanaovanao ny zanakazo rehetra amin’ny tabernakely. '
  '18':
  - type: text
    content: 'Ary manaova ny zanakazo ho amin’ny tabernakely, dia zanakazo roa-polo ho eo amin’ny lafiny atsimo. '
  '19':
  - type: text
    content: 'Ary manaova faladia volafotsy efa-polo, dia faladia roa avy ho ambanin’ny isan-janakazo iray hiorenan’ny lahiny roa. '
  '2':
  - type: text
    content: 'Ny halavan’ny ambainy iray dia valo amby roa-polo hakiho; ary ny lambanan’ny ambainy iray dia efatra hakiho; hitovy ohatra ny ambainy rehetra. '
  '20':
  - type: text
    content: 'Ary manaova zanakazo roa-polo ho eo amin’ny lafiny faharoa amin’ny tabernakely, dia ny lafiny avaratra. '
  '21':
  - type: text
    content: 'Ary manaova faladiany volafotsy efa-polo, dia faladia roa avy ho ambanin’ny isan-janakazo iray. '
  '22':
  - type: text
    content: 'Ary ny lafiny andrefana amin’ny tabernakely, izay ao ivohony, dia hanaovanao zanakazo enina. '
  '23':
  - type: text
    content: 'Ary zana-kazo roa no hataonao ho eo amin’ny zoron’ny tabernakely amin’ny lafiny ivoho. '
  '24':
  - type: text
    content: 'Ary hakambana ho iray izy hatramin’ny ambany ka hatramin’ny ambony, ka hasianao vava vola iray ihany: ho toy izany avokoa izy roa; eo amin’ny zorony roa no hisy izany. '
  '25':
  - type: text
    content: 'Ary aoka hisy zanakazo valo sy ny faladiany volafotsy, dia faladia enina ambin’ny folo: faladia roa avy ho ambanin’ny isan-janakazo iray.'
  '26':
  - type: text
    content: 'Ary manaova barany hazo akasia: dia dimy ho amin’ny zanakazo amin’ny lafiny iray amin’ny tabernakely, '
  '27':
  - type: text
    content: 'sy barany dimy ho amin’ny zanakazo amin’ny lafiny iray koa amin’ny tabernakely, ary barany dimy ho amin’ny zanakazo amin’ny lafiny andrefana izay ao ivohony. '
  '28':
  - type: text
    content: 'Ary ny barany afovoany, izay afovoan’ny zanakazo, dia hahatratra ny farany roa. '
  '29':
  - type: text
    content: Ary ny zanakazo hopetahanao takela-bolamena, ary hataonao volamena koa ny vava vola aminy, izay hitoeran’ny barany; ary petaho takela-bolamena koa ny barany.
  '3':
  - type: text
    content: 'Ambainy dimy no havitrana ho iray; ary ambainy dimy koa no havitrana ho iray. '
  '30':
  - type: text
    content: Ary manangàna ny tabernakely araka ny endriny, dia ilay naseho taminao tao an-tendrombohitra.
  '31':
  - type: text
    content: 'Ary manaova efitra lamba manga sy volomparasy sy mena ary rongony fotsy madinika voahasina; kerobima, asan’ny mpanenona mahay, no hataonao sorany. '
  '32':
  - type: text
    content: Ary ahantòny amin’ny andry hazo akasia efatra izay voapateka takela-bolamena izy; ho volamena koa ny fihantonany; ary eo amin’ny faladia volafotsy efatra no hiorenany. Ary ny efitra lamba dia ataovy eo ambanin’ny farango; ary ampidiro ao anatin’ny efitra lamba ny fiaran’ny Vavolombelona;
  - type: note
    content: Dia ny Didi Folo.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'ary ny efitra lamba no hampisaraka ny fitoerana masina sy ny fitoerana masina indrindra ho anareo. '
  '34':
  - type: text
    content: Ary ny rakotra fanaovam-panavotana dia ataovy eo ambonin’ny fiaran’ny Vavolombelona
  - type: note
    content: Dia ny Didi Folo.
  - type: text
    content: ' eo amin’ny fitoerana masina indrindra.'
  '35':
  - type: text
    content: Ary apetraho eo ivelan’ny efitra ny latabatra, ary ny fanaovan-jiro tandrifin’ny latabatra amin’ny lafiny atsimo amin’ny tabernakely; ary ny latabatra ataovy eo amin’ny lafiny avaratra.
  '36':
  - type: text
    content: 'Ary manaova varavarana lamba ho eo amin’ny lay, dia amin’ny manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, asan’ny mahay tenona samy hafa soratra. '
  '37':
  - type: text
    content: Ary manaova andry hazo akasia dimy ho amin’ny varavarana lamba, ka petaho takela-bolamena; ary ho volamena koa ny fihantonany; ary mandrendreha faladia varahina dimy hiorenany.
  '4':
  - type: text
    content: 'Ary manaova tadivavarana manga ho eo an-tsisin’ny ambainy iray, dia eo an-tsisin’ny anankiray efa voavitrana; ary manaova toy izany koa amin’ny ambainy farany, dia eo an-tsisin’ny anankiray efa voavitrana koa. '
  '5':
  - type: text
    content: 'Tadivavarana dimam-polo no hataonao eo amin’ny ambainy iray, ary tadivavarana dimam-polo koa no hataonao eo amin’ny sisin’ny ambainy izay amin’ny anankiray efa voavitrana koa; ary hifandray ny tadivavarana. '
  '6':
  - type: text
    content: Ary manaova farango volamena dimam-polo, ka akambano amin’ny farango ny ambainy, ka dia ho voakambana ho iray ny tabernakely.
  '7':
  - type: text
    content: 'Ary manaova ambainy koa amin’ny volon’osy ho lay handrakofana ny tabernakely; dia iraika ambin’ny folo ambainy no hanaovanao azy. '
  '8':
  - type: text
    content: 'Ny halavan’ny ambainy iray dia telo-polo hakiho, ary ny lambanan’ny ambainy iray dia efatra hakiho; hitovy ohatra ny ambainy iraika ambin’ny folo. '
  '9':
  - type: text
    content: 'Ary avitrano ny ambainy dimy hikambana, ary ny ambainy enina kosa hikambana. Ary aforeto ny ambainy fahenina amin’ny sakan’ny ay anatrehana. '
