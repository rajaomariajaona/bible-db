document_id: EXO.26
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny tabernakely dia hataonao ambainy folo amin’ny rongony fotsy madinika voahasina sy manga sy volomparasy ary mena; kerobima, asan’ny mpanenona mahay, no hataonao sorany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny halavan’ny ambainy iray dia valo amby roa-polo hakiho; ary ny lambanan’ny ambainy iray dia efatra hakiho; hitovy ohatra ny ambainy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ambainy dimy no havitrana ho iray; ary ambainy dimy koa no havitrana ho iray. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary manaova tadivavarana manga ho eo an-tsisin’ny ambainy iray, dia eo an-tsisin’ny anankiray efa voavitrana; ary manaova toy izany koa amin’ny ambainy farany, dia eo an-tsisin’ny anankiray efa voavitrana koa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tadivavarana dimam-polo no hataonao eo amin’ny ambainy iray, ary tadivavarana dimam-polo koa no hataonao eo amin’ny sisin’ny ambainy izay amin’ny anankiray efa voavitrana koa; ary hifandray ny tadivavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary manaova farango volamena dimam-polo, ka akambano amin’ny farango ny ambainy, ka dia ho voakambana ho iray ny tabernakely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary manaova ambainy koa amin’ny volon’osy ho lay handrakofana ny tabernakely; dia iraika ambin’ny folo ambainy no hanaovanao azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny halavan’ny ambainy iray dia telo-polo hakiho, ary ny lambanan’ny ambainy iray dia efatra hakiho; hitovy ohatra ny ambainy iraika ambin’ny folo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary avitrano ny ambainy dimy hikambana, ary ny ambainy enina kosa hikambana. Ary aforeto ny ambainy fahenina amin’ny sakan’ny ay anatrehana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary manaova tadivavarana dimam-polo eo an-tsisin’ny ambainy iray izay farany amin’ny efa voavitrana; ary tadivavarana dimam-polo koa ho eo an-tsisin’ny ambainy iray amin’ny anankiray koa efa voavitrana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary manaova farango varahina dimam-polo, ka ampidiro ho eo amin’ny tadivavarana ary akambano ny lay, ka dia ho iray ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izay mihoatra amin’ny ambain’ny lay, dia ny antsasaky ny ambainy izay mihoatra, dia avelao hiraviravy eo ivohon’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny iray hakiho avy eo amin’ny lohany roa amin’ny lamba, izay mihoatra amin’ny halavan’ny ambain’ny lay, dia avelao hiraviravy eo amin’ny lafibeny roa amin’ny tabernakely handrakotra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary manaova koa rakotry ny lay amin’ny hoditr’ondrilahy efa nomenaina, ary manaova sarony hodi-takasy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Izahao xxv. 5.
    marker-yv: yv-n
  - type: text
    text: ' ho eo amboniny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary manaova zanakazo akasia ho amin’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Folo hakiho ny hahavon’ny zanakazo iray, ary iray hakiho sy sasany ny indraben’ny zanakazo iray. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lahiny roa no ho amin’ny zanakazo iray, ka hasiana izay hikambanany; izany no hanaovanao ny zanakazo rehetra amin’ny tabernakely. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary manaova ny zanakazo ho amin’ny tabernakely, dia zanakazo roa-polo ho eo amin’ny lafiny atsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary manaova faladia volafotsy efa-polo, dia faladia roa avy ho ambanin’ny isan-janakazo iray hiorenan’ny lahiny roa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary manaova zanakazo roa-polo ho eo amin’ny lafiny faharoa amin’ny tabernakely, dia ny lafiny avaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary manaova faladiany volafotsy efa-polo, dia faladia roa avy ho ambanin’ny isan-janakazo iray. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny lafiny andrefana amin’ny tabernakely, izay ao ivohony, dia hanaovanao zanakazo enina. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary zana-kazo roa no hataonao ho eo amin’ny zoron’ny tabernakely amin’ny lafiny ivoho. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hakambana ho iray izy hatramin’ny ambany ka hatramin’ny ambony, ka hasianao vava vola iray ihany: ho toy izany avokoa izy roa; eo amin’ny zorony roa no hisy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary aoka hisy zanakazo valo sy ny faladiany volafotsy, dia faladia enina ambin’ny folo: faladia roa avy ho ambanin’ny isan-janakazo iray.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary manaova barany hazo akasia: dia dimy ho amin’ny zanakazo amin’ny lafiny iray amin’ny tabernakely, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'sy barany dimy ho amin’ny zanakazo amin’ny lafiny iray koa amin’ny tabernakely, ary barany dimy ho amin’ny zanakazo amin’ny lafiny andrefana izay ao ivohony. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny barany afovoany, izay afovoan’ny zanakazo, dia hahatratra ny farany roa. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary ny zanakazo hopetahanao takela-bolamena, ary hataonao volamena koa ny vava vola aminy, izay hitoeran’ny barany; ary petaho takela-bolamena koa ny barany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary manangàna ny tabernakely araka ny endriny, dia ilay naseho taminao tao an-tendrombohitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary manaova efitra lamba manga sy volomparasy sy mena ary rongony fotsy madinika voahasina; kerobima, asan’ny mpanenona mahay, no hataonao sorany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ahantòny amin’ny andry hazo akasia efatra izay voapateka takela-bolamena izy; ho volamena koa ny fihantonany; ary eo amin’ny faladia volafotsy efatra no hiorenany. Ary ny efitra lamba dia ataovy eo ambanin’ny farango; ary ampidiro ao anatin’ny efitra lamba ny fiaran’ny Vavolombelona;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.32 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didi Folo.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ary ny efitra lamba no hampisaraka ny fitoerana masina sy ny fitoerana masina indrindra ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary ny rakotra fanaovam-panavotana dia ataovy eo ambonin’ny fiaran’ny Vavolombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.34 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Dia ny Didi Folo.
    marker-yv: yv-n
  - type: text
    text: ' eo amin’ny fitoerana masina indrindra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary apetraho eo ivelan’ny efitra ny latabatra, ary ny fanaovan-jiro tandrifin’ny latabatra amin’ny lafiny atsimo amin’ny tabernakely; ary ny latabatra ataovy eo amin’ny lafiny avaratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary manaova varavarana lamba ho eo amin’ny lay, dia amin’ny manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, asan’ny mahay tenona samy hafa soratra. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary manaova andry hazo akasia dimy ho amin’ny varavarana lamba, ka petaho takela-bolamena; ary ho volamena koa ny fihantonany; ary mandrendreha faladia varahina dimy hiorenany.
