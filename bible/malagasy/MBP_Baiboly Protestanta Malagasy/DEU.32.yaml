document_id: DEU.32,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fihirana nataon’i Mosesy.
  - type: text
    content: MIHAINOA, ry lanitra, fa hiteny aho!
  - type: text
    content: Ary mandrenesa, ry tany, ny tenin’ny vavako!
  '10':
  - type: text
    content: Nahita azy tany an-efitra Izy,
  - type: text
    content: Dia tany amin’ny tany foana be nampierona,
  - type: text
    content: Ka dia nanodidina sy niahy azy,
  - type: text
    content: Ary notandremany tahaka ny anakandria-masony.
  '11':
  - type: text
    content: 'Toy ny voromahery manaitra ny '
  - type: text
    content: ao amin’ny
  - type: text
    content: ' akaniny'
  - type: text
    content: Ka manidintsidina eo ambonin’ny zanany,
  - type: text
    content: Dia toy izany no namelarany ny elany sy nandraisany azy
  - type: text
    content: Ary nitondrany azy teo ambonin’ny elany,–
  '12':
  - type: text
    content: Jehovah irery no nitondra azy,
  - type: text
    content: Ary tsy nisy andriamani-kafa teo aminy.
  '13':
  - type: text
    content: Nampandeha azy teny ambonin’ny havoana amin’ny tany Izy,
  - type: text
    content: Ka nohaniny ny vokatry ny saha.
  - type: text
    content: Nampitsentsitra azy tantely avy teo amin’ny vatolampy Izy
  - type: text
    content: Sy diloilo avy teo amin’ny vatolampy afovato
  '14':
  - type: text
    content: Sy rononomandrin’omby sy rononon’ondry aman-osy
  - type: text
    content: Mbamin’ny tavin’ny zanak’ondry
  - type: text
    content: Sy ondrilahin’i Basana sy osilahy
  - type: text
    content: Ary vary izay vokatra indrindra;
  - type: text
    content: Ary nisotro divay mahery avy tamin’ny ran’ny voaloboka hianao.
  '15':
  - type: text
    content: Nihanatavy Jesorona
  - type: note
    content: Jesorona dia anaran’ny Isiraely.
  - type: text
    content: ' ka namely daka–'
  - type: text
    content: Efa matavy hianao sady vory nofo no vaventibe–
  - type: text
    content: Dia nahafoy an’Andriamanitra Izay nanao azy izy,
  - type: text
    content: Ary nanamavo ny Vatolampy famonjena azy.
  '16':
  - type: text
    content: Nampahasaro-piaro Azy tamin’ny hafa izy;
  - type: text
    content: Ary tamin’ny zava-betaveta no nampahasosorany Azy;
  '17':
  - type: text
    content: Namono zavatra ho fanatitra ho an’ny demonia
  - type: note
    content: Heb. ireo tompo.
  - type: text
    content: ' izay tsy Andriamanitra izy–'
  - type: text
    content: Dia andriamanitra tsy fantany,
  - type: text
    content: Fa andriamanitra vao niseho,
  - type: text
    content: Izay tsy natahoran’ny razanareo.
  '18':
  - type: text
    content: Ny Vatolampy Izay niteraka anao dia tsy tsaroanao,
  - type: text
    content: Ary hadinoinao Andriamanitra Izay nahary anao.
  '19':
  - type: text
    content: Ary Jehovah nahita izany ka nandà
  - type: text
    content: Noho ny fahasosorany tamin’ny zanani-lahy sy ny zanani-vavy.
  '2':
  - type: text
    content: Ho avy tahaka ny ranonorana ny fampianarako,
  - type: text
    content: Ary hilatsaka tahaka ny ando ny teniko,
  - type: text
    content: Sy tahaka ny erika amin’ny ahi-maitso
  - type: text
    content: Ary ny ranonorana amin’ny anana.
  '20':
  - type: text
    content: 'Dia hoy Izy: Hafeniko azy ny tavako;'
  - type: text
    content: Ho hitako izay hiafarany;
  - type: text
    content: Fa firenena tena mpivadibadika izy,
  - type: text
    content: Dia zaza tsy mahatoky.
  '21':
  - type: text
    content: Izy efa nampahasaro-piaro Ahy tamin’izay tsy Andriamanitra
  - type: text
    content: Sy nampahasosotra Ahy tamin’ny zava-poanany;
  - type: text
    content: Ary Izaho kosa hampahasaro-piaro azy amin’izay tsy olona,
  - type: text
    content: Sy hampahasosotra azy amin’izay firenena adala.
  '22':
  - type: text
    content: Fa arehitra ny afon’ny fahatezerako,
  - type: note
    content: Heb. misy afo mirehitra amin’ny fahatezerako.
  - type: text
    content: Ka mandoro hatrany amin’ny fiainan-tsi-hita any ambany indrindra,
  - type: text
    content: Sady mandevona ny tany mbamin’ny vokatra ao aminy
  - type: text
    content: Ary mampirehitra ny fanambanin’ny tendrombohitra aza.
  '23':
  - type: text
    content: Havangongoko aminy ny loza betsaka;
  - type: text
    content: 'Ary holaniko aminy ny zana-tsi-pìkako:'
  '24':
  - type: text
    content: Hofezahin’ny mosary izy sady holanin’ny areti-mandripaka
  - type: note
    content: 'Na: zava-mahamay.'
  - type: text
    content: Sy ny fandringanana mangidy;
  - type: text
    content: Ary nifim-biby no hampandehaniko aminy
  - type: text
    content: Mbamin’ny poizin’ny biby mpikisaka amin’ny vovoka.
  '25':
  - type: text
    content: Eny ivelany dia ny sabatra no hahafaty ny zanany,
  - type: text
    content: Ary ao amin’ny efi-trano dia ny fampahatahorana–
  - type: text
    content: Na ny zatovolahy na ny zatovovavy,
  - type: text
    content: Na ny zaza minono na ny fotsy volo.
  '26':
  - type: text
    content: 'Fa efa nolazaiko hoe: Hotsofiko hihahaka izy;'
  - type: text
    content: Hatsahatro ny fahatsiarovana azy tsy ho eo amin’ny zanak’olombelona,
  '27':
  - type: text
    content: Raha tsy ny fireharehan’
  - type: note
    content: Heb. fahasosoran’.
  - type: text
    content: ' ny fahavalo no natahorako,'
  - type: text
    content: Andrao diso hevitra ireny mpandrafy azy ireny
  - type: text
    content: 'Ka hanao hoe: Ny tànany no avo;'
  - type: text
    content: Fa tsy Jehovah tsy akory no nanao izany rehetra izany.
  '28':
  - type: text
    content: Fa firenena tsy manan-tsaina izy
  - type: text
    content: Sady tsy manam-pahalalana.
  '29':
  - type: text
    content: Enga anie ka hendry izy mba hahalala izao
  - type: note
    content: 'Na: Raha hendry izy, dia hahalala izao.'
  - type: text
    content: Ka hahafantatra izay ho farany.
  '3':
  - type: text
    content: Fa ny anaran’i Jehovah no hotoriko;
  - type: text
    content: Maneke ny fahalehibiazan’Andriamanitsika.
  '30':
  - type: text
    content: Hataon’ny irery ahoana no fanenjika ny arivo,
  - type: text
    content: Ary hataon’ny roa lahy ahoana no fampandositra ny iray alina,
  - type: text
    content: Raha tsy ny Vatolampiny no efa nivarotra azy,
  - type: text
    content: Ary Jehovah no efa nanolotra azy?
  '31':
  - type: text
    content: Fa tsy mba mitovy amin’ny Vatolampintsika ny vatolampin’ireny,
  - type: text
    content: Na dia izy fahavalontsika aza no hitsara.
  '32':
  - type: text
    content: Ny tahom-boalobony dia tahomboalobok’i Sodoma
  - type: text
    content: Ary avy ao amin’ny sahan’i Gomora;
  - type: text
    content: Ny voalobony dia voaloboka mahafaty,
  - type: text
    content: Sady mangidy koa ny sampahony.
  '33':
  - type: text
    content: Ny divainy dia zava-mahafaty avy amin’ny dragona,
  - type: text
    content: Ary poizina loza avy amin’ny bibilava.
  '34':
  - type: text
    content: Moa tsy voatahiry ato amiko va izany
  - type: text
    content: Ka voaisy kase ato an-trano firaketako?
  '35':
  - type: text
    content: Ahy ny famaliana sy ny fampanodiavana,
  - type: text
    content: Raha avy izay hahasolafaka ny tongony;
  - type: text
    content: Fa antomotra ny andro hahitany loza,
  - type: text
    content: Ary ho avy faingana ny zava-boatendry hanjo azy.
  '36':
  - type: text
    content: Fa Jehovah hanome rariny ny olony
  - type: text
    content: Ary hanenina ny amin’ny mpanompony,
  - type: text
    content: Raha hitany fa lany ny heriny,
  - type: text
    content: Ka lasa avokoa na ny voahazona, na ny afaka.
  '37':
  - type: text
    content: 'Ary hiteny hoe Izy: Aiza ireo andriamaniny,'
  - type: text
    content: Dia ny vatolampy izay nialofany,
  '38':
  - type: text
    content: Izay nihinana ny saboran’ny fanatiny
  - type: text
    content: Ary nisotro ny divain’ny fanatitra aidiny?
  - type: text
    content: Aoka ireny no hitsangana ka hamonjy anareo
  - type: text
    content: Ary ho fierena ho anareo.
  '39':
  - type: text
    content: Fantaro ankehitriny fa Izaho dia Izaho no Izy,
  - type: text
    content: Ka tsy misy andriamanitra eto amiko.
  - type: text
    content: Izaho no mahafaty sy mahavelona,
  - type: text
    content: Ary Izaho no maharatra sy mahasitrana,
  - type: text
    content: Ka tsy misy mahafaka amin’ny tànako.
  '4':
  - type: text
    content: Ny amin’ny Vatolampy, tanteraka ny asany;
  - type: text
    content: Fa ny làlany rehetra dia amin’ny rariny avokoa.
  - type: text
    content: Andriamanitra mahatoky Izy, ka tsy misy ratsy ao aminy;
  - type: text
    content: Marina sy mahitsy Izy.
  '40':
  - type: text
    content: Fa manangana ny tànako amin’ny lanitra Aho
  - type: text
    content: 'Ka manao hoe: Raha velona koa Aho mandrakizay:'
  '41':
  - type: text
    content: Raha manasa ny sabatro manelatselatra Aho,
  - type: text
    content: Ka voarain’ny tànako ny fitsarana,
  - type: text
    content: dia hampanodiaviko ny mpandrafy Ahy ny ataony,
  - type: text
    content: Ary hovaliako ny mankahala Ahy.
  '42':
  - type: text
    content: Hataoko mamon-dra ny zana-tsipìkako,
  - type: text
    content: Ary ny sabatro hihina-nofo,
  - type: text
    content: Dia ny ran’ny voavono sy ny babo
  - type: text
    content: Mbamin’ny lohan’izay lehibe amin’ny fahavalo.
  '43':
  - type: text
    content: 'Mihobia, ry jentilisa '
  - type: text
    content: mbamin’
  - type: text
    content: ' ny olony;'
  - type: note
    content: 'Na: ry jentilisa olony.'
  - type: text
    content: Fa ny ran’ny mpanompony no hovaliany.
  - type: text
    content: Hamaly ny mpandrafy Azy Izy,
  - type: text
    content: Ary hanao fanavotana kosa ho an’ny taniny sy ny olony.
  '44':
  - type: text
    content: 'Dia nandeha Mosesy ka nilaza ny teny rehetra amin’izany fihirana izany teo anatrehan’ny olona, dia izy sy Hosea, zanak’i Nona. '
  '45':
  - type: text
    content: 'Ary nony efa tapitra voalazan’i Mosesy tamin’ny Isiraely rehetra izany teny rehetra izany, '
  '46':
  - type: text
    content: 'dia hoy izy taminy: Alatsaho ao am-ponareo ny teny rehetra izay ambarako aminareo anio, izay handidianareo ny zanakareo hotandremany sy hankatoaviny, dia ny teny rehetra amin’ity lalàna ity. '
  '47':
  - type: text
    content: Fa tsy zava-poana ho anareo izany, fa izany no fiainanareo; ary izany zavatra izany no hahamaro andro anareo eo amin’ny tany izay efa hidiranareo holovana, rehefa tafita an’i Jordana hianareo.
  '48':
  - type: text
    content: 'Ary Jehovah niteny tamin’i Mosesy androtrizay indrindra ka nanao hoe: '
  '49':
  - type: text
    content: 'Miakara amin’ity tendrombohitra Abarima ity, dia ny tendrombohitra Nebo, izay eo amin’ny tany Moaba tandrifin’i Jeriko; ary tazano ny tany Kanana, izay omeko ny Zanak’Isiraely ho lovany. '
  '5':
  - type: text
    content: Efa nasian-dratsy Izy;
  - type: text
    content: Tsy zanany ireny–tsininy izany;
  - type: text
    content: Taranaka miolakolaka sady efa nivadika izy.
  '50':
  - type: text
    content: 'Dia aoka ho faty ao amin’ny tendrombohitra izay iakaranao hianao, ka ho voangona any amin’ny razanao, tahaka ny nahafatesan’i Arona rahalahinao tao an-tendrombohitra Hora sy ny nanangonana azy any amin’ny razany, '
  '51':
  - type: text
    content: 'satria nivadika tamiko teo amin’ny Zanak’ Isiraely hianareo tao amin’ny ranon’i Meriba any Kadesy, tany an-efitra Zina; fa tsy nahamasina Ahy teo amin’ny Zanak’Isiraely hianareo. '
  '52':
  - type: text
    content: Fa hahatazana ny tany eo anoloanao ihany hianao, kanefa tsy hiditra any amin’ny tany izay omeko ny Zanak’Isiraely.
  '6':
  - type: text
    content: Moa Jehovah hovalianareo toy izany va,
  - type: text
    content: Ry firenena adala ka tsy hendry?
  - type: text
    content: Tsy Izy va no Rainao, Izay nanavotra anao?
  - type: text
    content: Tsy Izy va no nanao anao sy nanorina anao?
  '7':
  - type: text
    content: Tsarovy ny andro fahiny
  - type: text
    content: Saino ny taona hatrizay hatrizay;
  - type: text
    content: Anontanio amin-drainao, fa hanambara aminao izy,
  - type: text
    content: Sy amin’ny anti-panahy eo aminao, fa hilaza aminao izy;
  '8':
  - type: text
    content: Fony nomen’ny Avo Indrindra zara-tany ny jentilisa,
  - type: text
    content: Ka samy natokantokany ny zanak’olombelona,
  - type: text
    content: Dia notendreny ny fari-tanin’ireo firenena
  - type: text
    content: Araka ny isan’ny Zanak’Isiraely.
  '9':
  - type: text
    content: 'Fa anjaran’i Jehovah ny olony:'
  - type: text
    content: Jakoba no natokany ho lovany.
