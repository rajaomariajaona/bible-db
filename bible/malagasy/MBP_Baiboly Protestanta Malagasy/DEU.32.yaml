document_id: DEU.32,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny fihirana nataon’i Mosesy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: MIHAINOA, ry lanitra, fa hiteny aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mandrenesa, ry tany, ny tenin’ny vavako!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nahita azy tany an-efitra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tany amin’ny tany foana be nampierona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia nanodidina sy niahy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary notandremany tahaka ny anakandria-masony.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Toy ny voromahery manaitra ny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ao amin’ny
    - type: text
      text: ' akaniny'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manidintsidina eo ambonin’ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany no namelarany ny elany sy nandraisany azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nitondrany azy teo ambonin’ny elany,–
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Jehovah irery no nitondra azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy nisy andriamani-kafa teo aminy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nampandeha azy teny ambonin’ny havoana amin’ny tany Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nohaniny ny vokatry ny saha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nampitsentsitra azy tantely avy teo amin’ny vatolampy Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy diloilo avy teo amin’ny vatolampy afovato
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Sy rononomandrin’omby sy rononon’ondry aman-osy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny tavin’ny zanak’ondry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ondrilahin’i Basana sy osilahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary vary izay vokatra indrindra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nisotro divay mahery avy tamin’ny ran’ny voaloboka hianao.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nihanatavy Jesorona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Jesorona dia anaran’ny Isiraely.
      marker-yv: yv-n
    - type: text
      text: ' ka namely daka–'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa matavy hianao sady vory nofo no vaventibe–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia nahafoy an’Andriamanitra Izay nanao azy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanamavo ny Vatolampy famonjena azy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Nampahasaro-piaro Azy tamin’ny hafa izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tamin’ny zava-betaveta no nampahasosorany Azy;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Namono zavatra ho fanatitra ho an’ny demonia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ireo tompo.
      marker-yv: yv-n
    - type: text
      text: ' izay tsy Andriamanitra izy–'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia andriamanitra tsy fantany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa andriamanitra vao niseho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy natahoran’ny razanareo.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny Vatolampy Izay niteraka anao dia tsy tsaroanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hadinoinao Andriamanitra Izay nahary anao.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary Jehovah nahita izany ka nandà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahasosorany tamin’ny zanani-lahy sy ny zanani-vavy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ho avy tahaka ny ranonorana ny fampianarako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hilatsaka tahaka ny ando ny teniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny erika amin’ny ahi-maitso
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ranonorana amin’ny anana.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia hoy Izy: Hafeniko azy ny tavako;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho hitako izay hiafarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa firenena tena mpivadibadika izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia zaza tsy mahatoky.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izy efa nampahasaro-piaro Ahy tamin’izay tsy Andriamanitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nampahasosotra Ahy tamin’ny zava-poanany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izaho kosa hampahasaro-piaro azy amin’izay tsy olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hampahasosotra azy amin’izay firenena adala.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa arehitra ny afon’ny fahatezerako,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: misy afo mirehitra amin’ny fahatezerako.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandoro hatrany amin’ny fiainan-tsi-hita any ambany indrindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mandevona ny tany mbamin’ny vokatra ao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mampirehitra ny fanambanin’ny tendrombohitra aza.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Havangongoko aminy ny loza betsaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary holaniko aminy ny zana-tsi-pìkako:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Hofezahin’ny mosary izy sady holanin’ny areti-mandripaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zava-mahamay.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny fandringanana mangidy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nifim-biby no hampandehaniko aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny poizin’ny biby mpikisaka amin’ny vovoka.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Eny ivelany dia ny sabatra no hahafaty ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ao amin’ny efi-trano dia ny fampahatahorana–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny zatovolahy na ny zatovovavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny zaza minono na ny fotsy volo.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa efa nolazaiko hoe: Hotsofiko hihahaka izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatsahatro ny fahatsiarovana azy tsy ho eo amin’ny zanak’olombelona,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Raha tsy ny fireharehan’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fahasosoran’.
      marker-yv: yv-n
    - type: text
      text: ' ny fahavalo no natahorako,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andrao diso hevitra ireny mpandrafy azy ireny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka hanao hoe: Ny tànany no avo;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy Jehovah tsy akory no nanao izany rehetra izany.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa firenena tsy manan-tsaina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy manam-pahalalana.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Enga anie ka hendry izy mba hahalala izao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Raha hendry izy, dia hahalala izao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hahafantatra izay ho farany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ny anaran’i Jehovah no hotoriko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maneke ny fahalehibiazan’Andriamanitsika.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Hataon’ny irery ahoana no fanenjika ny arivo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataon’ny roa lahy ahoana no fampandositra ny iray alina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy ny Vatolampiny no efa nivarotra azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jehovah no efa nanolotra azy?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa tsy mba mitovy amin’ny Vatolampintsika ny vatolampin’ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia izy fahavalontsika aza no hitsara.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ny tahom-boalobony dia tahomboalobok’i Sodoma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avy ao amin’ny sahan’i Gomora;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny voalobony dia voaloboka mahafaty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mangidy koa ny sampahony.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny divainy dia zava-mahafaty avy amin’ny dragona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary poizina loza avy amin’ny bibilava.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Moa tsy voatahiry ato amiko va izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka voaisy kase ato an-trano firaketako?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ahy ny famaliana sy ny fampanodiavana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha avy izay hahasolafaka ny tongony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa antomotra ny andro hahitany loza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho avy faingana ny zava-boatendry hanjo azy.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Fa Jehovah hanome rariny ny olony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanenina ny amin’ny mpanompony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha hitany fa lany ny heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka lasa avokoa na ny voahazona, na ny afaka.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary hiteny hoe Izy: Aiza ireo andriamaniny,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny vatolampy izay nialofany,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Izay nihinana ny saboran’ny fanatiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nisotro ny divain’ny fanatitra aidiny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ireny no hitsangana ka hamonjy anareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho fierena ho anareo.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Fantaro ankehitriny fa Izaho dia Izaho no Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy andriamanitra eto amiko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no mahafaty sy mahavelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izaho no maharatra sy mahasitrana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy mahafaka amin’ny tànako.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny amin’ny Vatolampy, tanteraka ny asany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny làlany rehetra dia amin’ny rariny avokoa.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra mahatoky Izy, ka tsy misy ratsy ao aminy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marina sy mahitsy Izy.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Fa manangana ny tànako amin’ny lanitra Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka manao hoe: Raha velona koa Aho mandrakizay:'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Raha manasa ny sabatro manelatselatra Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka voarain’ny tànako ny fitsarana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dia hampanodiaviko ny mpandrafy Ahy ny ataony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hovaliako ny mankahala Ahy.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Hataoko mamon-dra ny zana-tsipìkako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sabatro hihina-nofo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny ran’ny voavono sy ny babo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny lohan’izay lehibe amin’ny fahavalo.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Mihobia, ry jentilisa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mbamin’
    - type: text
      text: ' ny olony;'
    - type: usfm
      marker: f
