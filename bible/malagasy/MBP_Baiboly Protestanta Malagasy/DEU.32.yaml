        children:
        - type: text
          text: ry jentilisa olony.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny ran’ny mpanompony no hovaliany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamaly ny mpandrafy Azy Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanao fanavotana kosa ho an’ny taniny sy ny olony.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Dia nandeha Mosesy ka nilaza ny teny rehetra amin’izany fihirana izany teo anatrehan’ny olona, dia izy sy Hosea, zanak’i Nona. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ary nony efa tapitra voalazan’i Mosesy tamin’ny Isiraely rehetra izany teny rehetra izany, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'dia hoy izy taminy: Alatsaho ao am-ponareo ny teny rehetra izay ambarako aminareo anio, izay handidianareo ny zanakareo hotandremany sy hankatoaviny, dia ny teny rehetra amin’ity lalàna ity. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Fa tsy zava-poana ho anareo izany, fa izany no fiainanareo; ary izany zavatra izany no hahamaro andro anareo eo amin’ny tany izay efa hidiranareo holovana, rehefa tafita an’i Jordana hianareo.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy androtrizay indrindra ka nanao hoe: '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Miakara amin’ity tendrombohitra Abarima ity, dia ny tendrombohitra Nebo, izay eo amin’ny tany Moaba tandrifin’i Jeriko; ary tazano ny tany Kanana, izay omeko ny Zanak’Isiraely ho lovany. '
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Efa nasian-dratsy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy zanany ireny–tsininy izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taranaka miolakolaka sady efa nivadika izy.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Dia aoka ho faty ao amin’ny tendrombohitra izay iakaranao hianao, ka ho voangona any amin’ny razanao, tahaka ny nahafatesan’i Arona rahalahinao tao an-tendrombohitra Hora sy ny nanangonana azy any amin’ny razany, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'satria nivadika tamiko teo amin’ny Zanak’ Isiraely hianareo tao amin’ny ranon’i Meriba any Kadesy, tany an-efitra Zina; fa tsy nahamasina Ahy teo amin’ny Zanak’Isiraely hianareo. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Fa hahatazana ny tany eo anoloanao ihany hianao, kanefa tsy hiditra any amin’ny tany izay omeko ny Zanak’Isiraely.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moa Jehovah hovalianareo toy izany va,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry firenena adala ka tsy hendry?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Izy va no Rainao, Izay nanavotra anao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy Izy va no nanao anao sy nanorina anao?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsarovy ny andro fahiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saino ny taona hatrizay hatrizay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anontanio amin-drainao, fa hanambara aminao izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny anti-panahy eo aminao, fa hilaza aminao izy;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fony nomen’ny Avo Indrindra zara-tany ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka samy natokantokany ny zanak’olombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia notendreny ny fari-tanin’ireo firenena
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny isan’ny Zanak’Isiraely.
  '9':
