document_id: PSA.138
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fiderana an’Andriamanitra noho ny famindrampony sy ny fahamarinany, izay mbola heken’ny mpanjaka rehetra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: HIDERA Anao amin’ny foko rehetra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo anatrehan’ireo andriamanitra no hankalazako Anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hivavaka manandrify ny tempolinao masina aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hidera ny anaranao noho ny famindramponao sy ny fahamarinanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nomenao voninahitra ny teninao ho ambonin’ny anaranao rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tamin’ny andro nitarainako dia namaly ahy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nomenao fahasahiana aho, ka nisy hery ny fanahiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jehovah ô, hidera Anao ny mpanjaka rehetra amin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa handre ny tenin’ny vavanao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eny, hihira ny amin’ny làlan’i Jehovah izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lehibe ny voninahitr’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa na dia avo aza Jehovah, dia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '138.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa avo Jehovah ka.
    marker-yv: yv-n
  - type: text
    text: ' mijery ny ambany toetra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpiavonavona fantany eny lavitra eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Na dia handeha eo amin’ny fahoriana aza aho, dia hamelona ahy Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haninjitra ny tànanao hanohitra ny fahatezeran’ny fahavaloko Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hamonjy ahy ny tànanao ankavanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jehovah no hahatanteraka ny amiko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah ô, mandrakizay ny famindramponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mahafoy ny asan’ny tànanao.
