document_id: PSA.138,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an’Andriamanitra noho ny famindrampony sy ny fahamarinany, izay mbola heken’ny mpanjaka rehetra.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: HIDERA Anao amin’ny foko rehetra aho;
  - type: text
    content: Eo anatrehan’ireo andriamanitra no hankalazako Anao.
  '2':
  - type: text
    content: Hivavaka manandrify ny tempolinao masina aho
  - type: text
    content: Ka hidera ny anaranao noho ny famindramponao sy ny fahamarinanao;
  - type: text
    content: Fa efa nomenao voninahitra ny teninao ho ambonin’ny anaranao rehetra.
  '3':
  - type: text
    content: Tamin’ny andro nitarainako dia namaly ahy Hianao;
  - type: text
    content: Nomenao fahasahiana aho, ka nisy hery ny fanahiko.
  '4':
  - type: text
    content: Jehovah ô, hidera Anao ny mpanjaka rehetra amin’ny tany,
  - type: text
    content: Fa handre ny tenin’ny vavanao izy.
  '5':
  - type: text
    content: Eny, hihira ny amin’ny làlan’i Jehovah izy;
  - type: text
    content: Fa lehibe ny voninahitr’i Jehovah.
  '6':
  - type: text
    content: Fa na dia avo aza Jehovah, dia
  - type: note
    content: 'Na: Fa avo Jehovah ka.'
  - type: text
    content: ' mijery ny ambany toetra,'
  - type: text
    content: Ary ny mpiavonavona fantany eny lavitra eny.
  '7':
  - type: text
    content: Na dia handeha eo amin’ny fahoriana aza aho, dia hamelona ahy Hianao;
  - type: text
    content: Haninjitra ny tànanao hanohitra ny fahatezeran’ny fahavaloko Hianao
  - type: text
    content: Ary hamonjy ahy ny tànanao ankavanana.
  '8':
  - type: text
    content: Jehovah no hahatanteraka ny amiko;
  - type: text
    content: Jehovah ô, mandrakizay ny famindramponao;
  - type: text
    content: Aza mahafoy ny asan’ny tànanao.
