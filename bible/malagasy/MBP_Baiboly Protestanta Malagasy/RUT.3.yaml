document_id: RUT.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nangatahan’i Rota an’i Boaza hitondra loloha azy araka ny hevitra natoron’i Naomy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA hoy Naomy rafozani-vavy taminy: Tsy hitady izay tokan-trano hahitanao fiadanana va aho, anaka, mba hahasoa anao? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ankehitriny, tsy isan’ny havantsika va Boaza, tompon’ny ankizivavy izay niarahanao? Indro, mikororoka vary hordea eo am-pamoloana izy anio alina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa mandroa sy mihosora diloilo ary miakanjoa, dia midìna any am-pamoloana; nefa aza atao fanta-dralehilahy akory hianao, raha tsy efa avy nihinana sy nisotro izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa mandry izy, dia fantaro izay andriany, ary midira, ka songay ny lamba eo an-tongony, dia mandria eo hianao; ary holazainy aminao izay hataonao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izy taminy: Eny, fa hataoko izay rehetra lazainao amiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nidina tany am-pamoloana izy ka nanao araka izay rehetra nandidian’ny rafozani-vavy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa avy nihinana sy nisotro Boaza, ka faly ny fony, dia nandeha handry teo amin’ny faran’ny antontam-bary izy; fa nandeha nitsaitsaika kosa Rota, dia nanonga ny lamba teo an-tongony ka nandry teo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony namatonalina, dia taitra ralehilahy ka niarina hitsapa, ary, indro, nisy vehivavy nandry teo an-tongony. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy izy: Iza moa izato? Ary hoy kosa ravehivavy: Rota zatovovavinao aho; mba rakofy ny lambanao ny zatovovavinao, fa havana mahavotra hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy: Hotahin’i Jehvoah anie hianao, anaka; efa nanao soa be lavitra tamin’ny ato aoriana hianao noho ny tamin’ny voalohany, noho ny tsy nanarahanao ny zatovo, na ny malahelo, na ny manan-karena. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa ankehitriny, anaka, aza matahotra; hataoko aminao izay rehetra angatahinao; fa fantatr’izay rehetra ao an-tanànan’ny fireneko fa vehivavy tsara hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ankehitriny marina izany, fa havana mahavotra aho; nefa misy havana mahavotra akaiky kokoa noho izaho. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitoera ihany atỳ anio alina, ary rehefa maraina, raha hitondra loloha anao izy, dia tsara izany, aoka izy no hitondra loloha anao; fa raha tàhiny kosa tsy hanao izany izy, dia ho entiko loloha ihany hianao, raha velona koa Jehovah, mitoera ihany atỳ mandra-pahamarain’ny andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nandry teo an-tongony mandra-pahamarain’ny andro Rota, ary nifoha, raha mbola maizimaizina, ilay mbola tsy ahitana tarehy iny. Fa hoy ralehilahy: Aza avela ho fantatr’olona fa tatỳ am-pamoloana ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy koa izy: Ento etỳ ny lamba itafianao, ka hazony izy. Ary rehefa nataony izany, dia namatra vary hordea inenin’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny famarana
  - type: text
    text: ' Boaza, ka nampitondrainy azy izany.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dia lasa nankany an-tanàna Boaza. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa tonga tany amin’ny rafozani-vavy Rota, dia hoy Naomy: Nanao ahoana izay tany, anaka? Dia nambarany azy izay rehetra nataon-dralehilahy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy koa izy: Ireto vary hordea inenin’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny famarana
  - type: text
    text: ' ireto dia nomeny ahy; fa hoy izy tamiko: Aza mandeha tsy mitondra zavatra ho any amin’ny rafozanao-vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy izy: Mitoera ihany, anaka, mandra-pahafantatrao izay hiantefan’ny raharaha; fa tsy hijanona ralehilahy, fa hovitainy anio ihany ny raharaha.'
