document_id: 2SA.15
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niodinan’i Absaloma, sy ny nandosiran’i Davida.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nony afaka izany, Absaloma dia nanomana kalesy iray sy soavaly ary olona dimam-polo lahy ho mpihazakazaka eo alohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Absaloma nifoha maraina koa, dia nijanona teo anilan’ny làlana mankeo am-bavahady, ka raha nisy olona nanana ady ho entiny any amin’ny mpanjaka hotsaraina, dia nantsoin’i Absaloma ka nanontaniany hoe: Avy any amin’ny tanàna aninona hianao? Ary hoy izy: Avy any Anonana amin’ny firenen’Isiraely ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Absaloma taminy: Eny, tsara sy marina ny raharahanao, saingy tsy misy olona voatendrin’ny mpanjaka hihaino anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy koa Absaloma: Enga anie ka izaho no voatendry ho mpitsara amin’ny tany, ary ho avy atỳ amiko ny olona rehetra izay manana ady sy teny hotsaraina, dia homeko rariny izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary isaky ny nisy olona nanatona hiankohoka teo anoloany, dia narosony ny tànany ka noraisiny sy norohany izany olona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary toy izany no nataon’i Absaloma tamin’ny Isiraely rehetra izay nankao amin’ny mpanjaka hotsaraina; ka dia voafetsin’i Absaloma ho azy ny fon’ny lehilahy amin’ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nony afaka efa-polo taona,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[efa-taona].'
    marker-yv: yv-n
  - type: text
    text: ' dia hoy Absaloma tamin’ny mpanjaka: Trarantitra hianao, aoka aho hankany Hebrona hanefa ny voadiko izay nivoadiako tamin’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa nivoady aho mpanomponao, fony mbola nitoetra tany Gesora any Syria, nanao hoe: Raha mbola hampodin’i Jehovah any Jerosalema ihany aho, dia hanompo an’i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Mandehana soa aman-tsara ary. Dia niainga izy ka nankany Hebrona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Absaloma naniraka mpitety nankeny amin’ny firenen’Isiraely rehetra hanao hoe: Raha vao mandre ny feon’ny anjomara hianareo, dia miantsoa hoe: Absaloma no mpanjaka ao Hebrona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy roan-jato lahy izay nasain’i Absaloma, ka dia nanaraka azy avy tany Jerosalema, nefa nandeha tamin’ny fahatsoran’ny fony izy ireo, fa tsy nahafantatra na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary Absaloma naniraka naka an’i Ahitofela Gilonita, mpanolo-tsaina an’i Davida, avy tao an-tanànany, dia tao Gilo, raha mbola nanatitra ny fanatitra izy. Ary nihamasaka ny tetika fikomiana, ka dia nihamaro mandrakariva ny olona nomba an’i Absaloma.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nisy olona tonga tao amin’i Davida ka nilaza hoe: Lasa nanaraka an’i Absaloma ny fon’ny lehilahy amin’ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Davida tamin’ny mpanompony rehetra izay tao aminy tany Jerosalema: Mitsangàna, andeha isika handositra, fa tsy hisy hahafahantsika amin’i Absaloma; andeha hiala faingana, fandrao tamy faingana izy, ka tratrany eto isika, dia hataony idiran-doza tampoka eto isika, ary hasiany amin’ny lelan-tsabatra ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy ny mpanompon’ny mpanjaka taminy: Indreto ny mpanomponao hanao araka izay rehetra sitraky ny mpanjaka tompoko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nivoaka ny mpanjaka ka narahin’ny ankohonany rehetra. Ary ny mpanjaka namela folo vavy tamin’ny vaditsindranony hiandry trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nivoaka ny mpanjaka, ka dia nanaraka azy ny vahoaka rehetra, ary nitoetra teo Faratanàna izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny mpanompony rehetra nandeha teny anilany, ka ny miaramila mpiambina andriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Keretita sy Peletita.
    marker-yv: yv-n
  - type: text
    text: ' rehetra sy ny Gatita rehetra, dia enin-iato lahy izay nanaraka azy avy tany Gata, nandeha teo alohan’ny mpanjaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’Itahy Gatita: Nahoana no hianao avy no mba miaraka aminay? Miverena, ka mitoera any amin’ny mpanjaka; fa hafa firenena sady mpivahiny hianao; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: modia
  - type: text
    text: ' ho any amin’ny fonenanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa vao omaly no nahatongavanao, ka anio va dia ho entiko manjenjena hiaraka aminay hianao? fa mandeha ho any amin’izay azoko aleha aho, koa miverena ihany hianao, ary ento hiara-miverina aminao koa ny rahalahinao; ho aminao anie ny famindrampo sy ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa Itahy namaly ny mpanjaka hoe: Raha velona koa Jehovah, ary raha velona koa ny mpanjaka tompoko, izay hitoeran’ny mpanjaka tompoko, na ho faty na ho velona, dia any koa no hitoeran’ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy Davida tamin’Itahy: Andeha mandroso ary. Dia nandroso Itahy Gatita sy ny olony rehetra mbamin’ny zaza amim-behivavy rehetra izay teo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ny olona rehetra dia nitomany nikaikaika, ary nita ny vahoaka rehetra; ny mpanjaka koa dia nita ny lohasahan-driaka Kidrona, ary ny vahoaka rehetra nandroso tamin’ny làlana mankany an-efitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary indro koa Zadoka sy ny Levita rehetra nanaraka azy nitondra ny fiaran’ny faneken’Andriamanitra. Ary nametraka ny fiaran’Andriamanitra izy – ary Abiatara niakatra – mandra-pahatapitry ny olona rehetra avy tao an-tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin’i Zadoka: Ento miverina ho any an-tanàna ihany ny fiaran’Andriamanitra; fa raha mahita fitia eo imason’i Jehovah aho, dia mbola ho entiny’ miverina ihany, ka hasehony ahy iny sy ny fitoerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa raha izao kosa no lazainy: Tsy sitrako hianao, dia inty aho, aoka Izy hanao amiko araka izay ataony ho tsara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy koa ny mpanjaka tamin’i Zadoka mpisorona: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tsy
  - type: text
    text: ' mpahita va hianao? miverena soa aman-tsara any an-tanàna hianao mbamin’ny zanakareo roa lahy miaraka aminareo, dia Ahimaza zanakao sy Jonatana, zanak’i Abiatara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Indro, izaho hijanonjanona eny amin’ny fitana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tani-hay.
    marker-yv: yv-n
  - type: text
    text: ' any amin’ny efitra mandra-pahatongan’izay teny avy atỳ aminareo hambara amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary Zadoka sy Abiatara nitondra ny fiaran’Andriamanitra niverina nankany Jerosalema ihany; dia nitoetra tany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary Davida niakatra teny an-tendrombohitra Oliva ka nitomany teny am-piakarana ary nisaron-doha sady nandeha tsy nikiraro; ary ny vahoaka rehetra izay nanaraka azy samy nisaron-doha sy niakatra ary nitomany teny am-piakarana avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nisy nanambara tamin’i Davida hoe: Ahitofela koa mba isan’ny mpiray tetika amin’i Absaloma. Dia hoy Davida: Mitaraina aminao aho, Jehovah ô, ampodio ho fahadalana ny hevitra ataon’i Ahitofela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary nony tonga teo an-tampon’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny tendrombohitra
  - type: text
    text: ' Davida, dia teo amin’izay fivavahan’ny olona tamin’Andriamanitra, indro, avy hitsena azy Hosay Arkita, voatriatra ny akanjony sady nihosin-tany ny lohany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ary hoy Davida taminy: Raha miara-mandroso amiko hianao, dia ho tonga enta-mavesatra amiko; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'fa raha hiverina any an-tanàna kosa hianao ka hanao amin’i Absaloma hoe: Ho mpanomponao aho, ry mpanjaka; efa mpanompon’ny rainao ihany aho taloha, fa ankehitriny kosa dia mpanomponao, aho – dia hofoananao hahasoa ahy ny hevitra ataon’i Ahitofela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary tsy ao aminao va Zadoka sy Abiatara mpisorona? Koa izay zavatra rehetra renao avy ao an-tranon’ny mpanjaka, dia ambarao amin’i Zadoka sy Abiatara mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Indreo, any aminy ny zanany roa lahy, dia Ahimaza, zanak’i Zadoka, sy Jonatana, zanak’i Abiatara; ary izy no hampitondrainareo izay rehetra renareo ho atỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Koa dia tonga tany an-tanàna Hosay, sakaizan’i Davida, tamin’ny nahatongavan’i Absaloma tany Jerosalema.
