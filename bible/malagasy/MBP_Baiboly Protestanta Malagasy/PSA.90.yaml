document_id: PSA.90
type_code: plt
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: BOKY FAHEFATRA
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fiankinan’ny olo-marina amin’Andriamanitra, na dia mandalo faingana aza ny androny sady isehoan’ny fahatezeran’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fivavak’i Mosesy, lehilahin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: TOMPO ô, efa fonenanay hatramin’ny taranaka rehetra Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fony tsy mbola ary ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na voaforonao ny tany sy izao rehetra izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia Andriamanitra Hianao hatramin’ny taloha indrindra ka mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mamerina ny olona ho amin’ny vovoka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '90.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahatorotoroana.
    marker-yv: yv-n
  - type: text
    text: ' Hianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao hoe: Miverena, ry zanak’olombelona.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa eo imasonao ny arivo taona dia toy ny fandalon’ny omaly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny fotoam-piambenana iray amin’ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Manindao azy tahaka ny riaka Hianao; torimaso izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny maraina tahaka ny ahitra mora miova izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin’ny maraina mamony izy, nefa mora miova;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '90.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amin’ny maraina dia tahaka ny kolokolon’ahitra izy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny hariva voajinja izy ka maina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa lanin’ny fahatezeranao izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raiki-tahotra noho ny fahaviniranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny helokay efa nataonao teo anatrehanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahotanay miafina teo amin’ny fahazavan’ny tavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny androanay rehetra efa lasa amin ny fahatezeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa laninay toy ny eritreritra ny taonanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fito-polo taona no andron’ny taonanay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha tàhiny mateza aza, dia valo-polo taona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa fahasasarana sy zava-poana ny voninahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mihelina faingana izany, ka lasa manidina izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Iza no mahafantatra ny herin’ny fahatezeranao sy ny fahaviniranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka izay tokony ho fahatahorana Anao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mampianara anay hanisa ny andronay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahazoanay fo hendry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Miverena, Jehovah ô! Mandra-pahoviana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mba aneneno ny amin’ny mpanomponao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vokiso ny famindramponao nony maraina izahay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hihobianay sy hifalianay amin’ny andro rehetra hiainanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mampifalia anay araka ny andro nampahorianao anay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny taona nahitanay loza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka hiseho amin’ny mpanomponao ny asanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny voninahitrao amin’ny zanany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary aoka ho aminay ny fahasoavan’ny Tompo Andriamanitray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampitoero aminay ny asan’ny tànanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny asan’ny tànanay, ampitoero izy.
