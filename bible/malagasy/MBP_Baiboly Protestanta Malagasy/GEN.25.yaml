document_id: GEN.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanambadian’i Abrahama an’i Ketora, sy ny taranany avy taminy; ary ny nahafatesan’i Abrahama, sy ny nandevenan’ny zanany azy.
  - type: text
    content: 'ARY Abrahama nampaka-bady indray, Ketora no anarany. '
  '10':
  - type: text
    content: dia ilay saha izay novinidin’i Abrahama tamin’ny taranak’i Heta; tao no nandevenana an’i Abrahama sy Saraha vadiny.
  '11':
  - type: text
    content: Ary rehefa maty Abrahama, dia notahin’Andriamanitra Isaka zanany; ary Isaka dia nonina teo akaikin’i Bera-lahai-roy.
  - type: heading
    content: Ny taranak’Isimaela.
  '12':
  - type: text
    content: 'ARY izao no taranak’Isimaela, zanakalahin’i Abrahama izay naterak’i Hagara, ilay Egyptiana, andevovavin’i Saraha, tamin’i Abrahama:'
  '13':
  - type: text
    content: 'Izao no anaran’ny zanakalahin’Isimaela, araka ny anarany sy araka ny taranany: Nebaiota, lahimatoan’Isimaela, sy Kedara sy Adbela sy Mibsama '
  '14':
  - type: text
    content: 'sy Misma sy Doma sy Masa '
  '15':
  - type: text
    content: 'sy Hadada sy Tema sy Jetora sy Nafisy ary Kedema. '
  '16':
  - type: text
    content: Izy ireo no zanakalahin’Isimaela, ary ireo no anarany, araka ny vohiny sy ny tobiny, dia andriana roa ambin’ny folo araka ny fireneny.
  '17':
  - type: text
    content: Ary ny andro niainan’Isimaela dia fito amby telo-polo amby zato taona; ary niala aina izy ka maty, dia voangona any amin’ny razany.
  '18':
  - type: text
    content: Ary ny taranany nonina hatrany Havila ka hatrany Sora, izay tandrifin’i Egypta amin’ny làlana mankany Asyria; nifanandrify tamin’ny rahalahiny rehetra no nitoerany.
  - type: heading
    content: Ny amin’i Esao sy Jakoba.
  '19':
  - type: text
    content: 'ARY izao no taranak’Isaka, zanakalahin’i Abrahama:'
  '2':
  - type: text
    content: 'Dia niteraka an’i Zimrana sy Joksana sy Medana sy Midiana sy Jisbaka ary Soaha tamin’i Abrahama izy. '
  '20':
  - type: text
    content: Abrahama niteraka an’Isaka; ary efa-polo taona Isaka, raha nampakatra an-dRebeka, zanakavavin’i Betoela Syriana,
  - type: note
    content: Heb. Aramiana.
  - type: text
    content: ' avy tany Mesopotamia,'
  - type: note
    content: Heb. Padan-arama.
  - type: text
    content: ' sady anabavin’i Labana Syriana.'
  - type: note
    content: Heb. Aramiana.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Ary Isaka nangataka tamin’i Jehovah ho an’ny vadiny, satria momba izy; ary nohenoin’i Jehovah ny fangatahany, dia nanan-anaka Rebeka vadiny. '
  '22':
  - type: text
    content: 'Ary nifanosika ny zaza kambana tao an-kibony; ary hoy Rebeka: Raha izao, nahoana re aho no dia mbola velona?'
  - type: note
    content: 'Na: Raha izany, nahoana no dia toy izao aho?'
  - type: text
    content: ' Dia lasa nanontany tamin’i Jehovah izy.'
  '23':
  - type: text
    content: 'Ary hoy Jehovah taminy:'
  - type: text
    content: Firenena roa no ao an-kibonao;
  - type: text
    content: Ary vahoaka roa toko no hisaraka hatrao am-bohokanao;
  - type: text
    content: Ary ny vahoaka iray toko hahery noho ny iray toko.
  - type: text
    content: Ka ny zokiny hanompo ny zandriny.
  '24':
  - type: text
    content: 'Ary rehefa tonga ny andro hahaterahany, indreo, nisy zaza kambana tao an-kibony. '
  '25':
  - type: text
    content: Dia teraka ny voalohany ka mena, ary tahaka ny kapôty volom-biby ny tenany rehetra; dia nataony hoe Esao
  - type: note
    content: Esao = Voloina.
  - type: text
    content: ' ny anarany. '
  '26':
  - type: text
    content: Ary rehefa afaka izany, dia teraka koa ny rahalahiny, ary ny tànany nihazona ny ombelahin-tongotr’i Esao, dia nataony hoe Jakoba
  - type: note
    content: Jakoba = Mpamingana.
  - type: text
    content: ' ny anarany; ary efa enim-polo taona Isaka tamin’ny niterahana azy mirahalahy.'
  '27':
  - type: text
    content: 'Dia nitombo ireo zaza ireo; ary Esao lehilahy nahay nihaza, dia mpianefitra, fa Jakoba kosa lehilahy tsara fanahy sady mpitoetra an-day. '
  '28':
  - type: text
    content: Ary Isaka tia an’i Esao, satria nankafy ny hazany; fa Rebeka kosa tia an’i Jakoba.
  '29':
  - type: text
    content: 'Ary nahandro hanina Jakoba; ary sendra avy tany an-tsaha Esao ka reraka. '
  '3':
  - type: text
    content: 'Ary Joksana niteraka an’i Sheba sy Dedana. Ary ny zanakalahin’i Dedana dia Asorima sy Letosima ary Leomima. '
  '30':
  - type: text
    content: 'Dia hoy Esao tamin’i Jakoba: Mba anomezo ahy honaniko ny mena, dia io mena io, fa reraka aho (izany no nanaovana ny anarany hoe Edoma'
  - type: note
    content: Edoma = Mena.
  - type: text
    content: '). '
  '31':
  - type: text
    content: 'Fa hoy Jakoba: Amidio amiko ary aloha ny fizokianao. '
  '32':
  - type: text
    content: 'Dia hoy kosa Esao: Indro, ho faty ihany aho;'
  - type: note
    content: 'Na: efa ho faty aho.'
  - type: text
    content: ' ka mahasoa inona izay fizokiana? '
  '33':
  - type: text
    content: 'Ary hoy Jakoba: Mianiàna ary amiko aloha. Dia nianiana taminy izy; ka dia namidiny tamin’i Jakoba ny fizokiany. '
  '34':
  - type: text
    content: Ary Jakoba nanome an’i Esao mofo sy voanemba masaka; dia nihinana sy nisotro izy, ary niainga ka lasa nandeha.
  - type: text
    content: Izany no nanamavoan’i Esao ny fizokiany.
  '4':
  - type: text
    content: Ary ny zanakalahin’i Midiana dia Efaha sy Efera sy Hanoka sy Abida ary Eldaha. Ireo rehetra ireo no zanak’i Ketora.
  '5':
  - type: text
    content: 'Dia natolotr’i Abrahama an’Isaka izay rehetra nananany. '
  '6':
  - type: text
    content: Fa ny zanak’ireo vaditsindranony hafa, izay nananan’i Abrahama, dia samy notolorany avy ka nampandehaniny, dieny mbola velona izy, hiala amin’Isaka zanany hiantsinanana ho any amin’ny tany atsinanana.
  '7':
  - type: text
    content: 'Ary ny andro niainan’i Abrahama dia dimy amby fito-polo amby zato taona. '
  '8':
  - type: text
    content: Dia niala aina Abrahama ka maty, rehefa fotsy volo tsara sady lahy antitra ela niainana;
  - type: note
    content: Heb. voky andro, na afa-pon’ny miaina
  - type: text
    content: ' dia voangona any amin’ny razany izy. '
  '9':
  - type: text
    content: 'Ary nalevin’Isaka sy Isimaela zanany izy tao amin’ny zohy ao Makpela, tao amin’ny sahan’i Efrona, zanak’i Zohara Hetita, izay tandrifin’i Mamre, '
