document_id: PRO.26
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Toy ny orampanala amin’ny lohataona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny ranonorana amin’ny taom-pijinjana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny voninahitra tsy tandrifiny ho an’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toy ny vorona mivezivezy sy ny sidintsidina manidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia toy izany ny fanozonam-poana: tsy mba hihatra izany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny karavasy ho amin’ny soavaly, ny lamboridy ho amin’ny boriky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tsorakazo kosa ho amin’ny lamosin’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aza mamaly ny adala araka ny hadalàny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao mba adala tahaka azy koa hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Valio ny adala araka ny hadalàny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao dia manao azy ho hendry izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manapaka ny tongony sady misotro loza
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mampitondra teny ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mikepikepika ny tongotry ny malemy tongotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny ohabolana eo am-bavan’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toy ny manisy vato eo amin’ny antsamotady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny manome voninahitra ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Toy ny tsilo eny an-tànan’ny olona mamo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny ohabolana eo am-bavan’ny adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny mpiasa mahay dia mahavita ny zavatra isan-karazany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay manakarama ny adala dia toy ny manakarama izay sendra mandalo.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toy ny mpandefa zana-tsipìka mahavoa ny olona rehetra, Dia toy izany ny manakarama ny adala sy manakarama izay sendra mandalo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Toy ny amboa miverina amin’ny loany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny adala miverina amin’ny hadalany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hitanao va ny olona manao azy ho hendry?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny adala misy hantenaina kokoa noho izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hoy ny malaina: Misy liona any an-dàlana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy liona atsy an-dàlambe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny varavarana mihodina amin’ny saviliny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny kamo eo amin’ny fandriany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny malaina mangarona ny eo an-doviany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ny hampakatra azy ho amin’ny vavany dia mahasasatra azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny kamo manao ny tenany ho hendry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihoatra noho ny olona fito izay mahavaly tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay mandalo ka mitsaraingona amin’ny ady tsy azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mandroritra amboa amin’ny sofiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Toy ny adala izay manely afo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy zana-tsipìka ary fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia toy izany ny olona mamitaka ny namany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao hoe: Tsy vosobosotra ihany va no ataoko?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Raha tsy misy kitay intsony, dia maty ny afo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha tsy misy mpifosafosa intsony, dia mitsahatra ny fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Toy ny arina atao amin’ny vainafo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny kitay hazo atao amin’ny afo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany, ny olona tia ady mandrehitra fifandirana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny tenin’ny mpifosafosa dia toy ny hanim-py
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mikorotsaka ao anaty kibo indrindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tavim-bilany misy ankosotra taim-bolafotsy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny molotra mihatsaravelatsihy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mirehitra.
    marker-yv: yv-n
  - type: text
    text: ' sy ny fo ratsy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny mpandrafy dia mody ho hafa amin’ny molony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manafim-pitaka ao am-pony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa na dia miteny soa aza izy, aza mino azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa fahavetavetana fito no ao am-pony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny lolompo dia miafina ao amin’ny fitaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ny haratsiany dia haharihary eo am-pahibemaso.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay mihady lavaka no ho latsaka ao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay manakodiadia vato no hikodiavany kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Halan’ny lela mandainga izay efa nampahoriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vava mandrobo dia mampidi-doza.
