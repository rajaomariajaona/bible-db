document_id: ISA.47,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana an’i Babylona.
  - type: text
    content: MIALA, ka mipetraha amin’ny vovoka,
  - type: text
    content: Ry Babylona, zanakavavy virijina!
  - type: text
    content: Mipetraha eo amin’ny tany, fa tsy amin’ny seza fiandrianana,
  - type: text
    content: Ry Kaldea zanakavavy!
  - type: text
    content: Fa tsy hatao hoe vehivavy malemilemy sy mihantahanta intsony hianao.
  '10':
  - type: text
    content: Fa nitoky tamin’ny faharatsianao
  - type: note
    content: 'Na: hafetsenao.'
  - type: text
    content: ' hianao'
  - type: text
    content: 'Ka nanao hoe: Tsy misy mahita ahy.'
  - type: text
    content: Ny fahendrenao sy ny fahalalanao dia nampivily anao,
  - type: text
    content: 'Ka dia nanao anakampo hianao hoe:'
  - type: text
    content: Izaho no izy, fa tsy misy afa-tsy izaho.
  '11':
  - type: text
    content: Kanjo hanjo anao ny fahoriana,
  - type: text
    content: Nefa tsy ho fantatrao izay fanafany;
  - type: note
    content: 'Na: iposahany.'
  - type: text
    content: Ary hahazo anao ny loza,
  - type: text
    content: Nefa tsy ho hainao ny fanàlany;
  - type: text
    content: Eny, hanjo anao tampoka ny fandringanana izay tsy ampoizinao.
  '12':
  - type: text
    content: Arosoy ary ny odinao
  - type: text
    content: Sy ny hamaroan’ny fankatovanao,
  - type: text
    content: Izay efa nisasaranao hatry ny fony hianao mbola kely;
  - type: text
    content: Angamba hahavita izay mahasoa hianao;
  - type: text
    content: Angamba ho tonga mahatahotra hianao.
  '13':
  - type: text
    content: Sasatra noho ny hamaroan’ny fisainanao hianao;
  - type: text
    content: Aoka hitsangana ankehitriny ireo mpamantatra
  - type: note
    content: Heb. mpizarazara.
  - type: text
    content: ' ny lanitra sy mpandinika ny kintana ireo hamonjy anao,'
  - type: text
    content: Dia ireo mpanambara isaky ny tsinam-bolana izay zavatra ho tonga aminao.
  - type: note
    content: 'Na: Aoka hitsangana ankehitriny ireo mpamantatra ny lanitra sy mpandinika ny kintana ireo hamonjy anao amin’izay hanjo anao.'
  '14':
  - type: text
    content: Indro, fa ho tahaka ny vodivary ireo;
  - type: text
    content: Ho main’ny afo izy ka tsy hahavonjy ny tenany amin’ny herin’ny lelafo akory;
  - type: text
    content: Tsy misy vainafo hamindroana,
  - type: text
    content: Na afo hitaninana aza.
  '15':
  - type: text
    content: Ho toy izany aminao ireo efa nisasaranao ireo,
  - type: text
    content: Dia ireo nifampivarotra taminao hatry ny fony hianao mbola kely;
  - type: text
    content: Samy hipariaka mandositra ho any amin’ny fonenany avy izy,
  - type: text
    content: Ka tsy hisy hahavonjy anao.
  '2':
  - type: text
    content: Alao ny vato fikosoham-bary, ka kosohy ny koba;
  - type: text
    content: Esory ny fisalobonanao, akaro ny morontongotr’akanjonao;
  - type: text
    content: Aoka hiseho ny fenao, ka miroboha mita ny ony.
  '3':
  - type: text
    content: Hiseho ny fitanjahanao,
  - type: text
    content: Eny, ho hita ny fahamenaranao;
  - type: text
    content: Hitondra famaliana Aho ka tsy hiantra olona.
  - type: note
    content: 'Na: tsy hiera amin’olona; na: tsy hihaona amin’olona.'
  '4':
  - type: text
    content: Ny anaran’ny Mpanavotra anay dia Jehovah, Tompon’ny maro,
  - type: text
    content: Iray Masin’ny Isiraely.
  '5':
  - type: text
    content: Mipetraha mangingina, ka midira ao amin’ny maizina,
  - type: text
    content: Ry Kaldea zanakavavy!
  - type: text
    content: Fa tsy hatao hoe Tompovavin’ny fanjakana intsony hianao.
  '6':
  - type: text
    content: Tezitra tamin’ny oloko Aho;
  - type: text
    content: Navelako holotoina ny lovako,
  - type: text
    content: Ka natolotro ho eo an-tànanao izy,–
  - type: text
    content: Tsy mba namindranao fo izy,
  - type: text
    content: Fa na dia ny antitra aza dia nasianao zioga mavesatra dia mavesatra.
  '7':
  - type: text
    content: 'Ary hoy hianao: Ho tompovavy mandrakizay Aho;'
  - type: text
    content: Ka dia tsy nandatsaka am-po izany zavatra izany hianao,
  - type: text
    content: Na nitsapa izay hiafarany.
  '8':
  - type: text
    content: Koa mihainoa, hianao izay mihantahanta
  - type: text
    content: Sady mipetraka tsy manana ahiahy
  - type: text
    content: 'Ka manao anakampo hoe:'
  - type: text
    content: Izaho no izy, ary tsy misy hafa;
  - type: text
    content: Tsy hipetraka ho mpitondratena aho,
  - type: text
    content: Na hahita fahafoanan-anaka.
  '9':
  - type: text
    content: Kanjo hanjo anao tampoka amin’ny indray andro monja ireto zavatra roa ireto,
  - type: text
    content: Dia ny fahafoanan-anaka sy ny fananoan-tena;
  - type: text
    content: Hotanterahina aminao avokoa izany,
  - type: text
    content: Na dia maro aza ny fankatovanao,
  - type: text
    content: Ary na dia be dia be aza ny odinao.
