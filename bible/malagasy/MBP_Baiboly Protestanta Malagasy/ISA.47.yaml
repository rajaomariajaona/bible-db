document_id: ISA.47
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny handravana an’i Babylona.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIALA, ka mipetraha amin’ny vovoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Babylona, zanakavavy virijina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha eo amin’ny tany, fa tsy amin’ny seza fiandrianana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Kaldea zanakavavy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hatao hoe vehivavy malemilemy sy mihantahanta intsony hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alao ny vato fikosoham-bary, ka kosohy ny koba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esory ny fisalobonanao, akaro ny morontongotr’akanjonao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hiseho ny fenao, ka miroboha mita ny ony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hiseho ny fitanjahanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho hita ny fahamenaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitondra famaliana Aho ka tsy hiantra olona.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tsy hiera amin’olona; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsy hihaona amin’olona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny anaran’ny Mpanavotra anay dia Jehovah, Tompon’ny maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iray Masin’ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mipetraha mangingina, ka midira ao amin’ny maizina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Kaldea zanakavavy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hatao hoe Tompovavin’ny fanjakana intsony hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tezitra tamin’ny oloko Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Navelako holotoina ny lovako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka natolotro ho eo an-tànanao izy,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mba namindranao fo izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa na dia ny antitra aza dia nasianao zioga mavesatra dia mavesatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy hianao: Ho tompovavy mandrakizay Aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy nandatsaka am-po izany zavatra izany hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nitsapa izay hiafarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa mihainoa, hianao izay mihantahanta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mipetraka tsy manana ahiahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka manao anakampo hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no izy, ary tsy misy hafa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hipetraka ho mpitondratena aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hahita fahafoanan-anaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanjo hanjo anao tampoka amin’ny indray andro monja ireto zavatra roa ireto,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fahafoanan-anaka sy ny fananoan-tena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotanterahina aminao avokoa izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia maro aza ny fankatovanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia be dia be aza ny odinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa nitoky tamin’ny faharatsianao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hafetsenao.
    marker-yv: yv-n
  - type: text
    text: ' hianao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka nanao hoe: Tsy misy mahita ahy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahendrenao sy ny fahalalanao dia nampivily anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka dia nanao anakampo hianao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izaho no izy, fa tsy misy afa-tsy izaho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Kanjo hanjo anao ny fahoriana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy ho fantatrao izay fanafany;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: iposahany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahazo anao ny loza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy ho hainao ny fanàlany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hanjo anao tampoka ny fandringanana izay tsy ampoizinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Arosoy ary ny odinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny hamaroan’ny fankatovanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay efa nisasaranao hatry ny fony hianao mbola kely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angamba hahavita izay mahasoa hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angamba ho tonga mahatahotra hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sasatra noho ny hamaroan’ny fisainanao hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hitsangana ankehitriny ireo mpamantatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpizarazara.
    marker-yv: yv-n
  - type: text
    text: ' ny lanitra sy mpandinika ny kintana ireo hamonjy anao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo mpanambara isaky ny tsinam-bolana izay zavatra ho tonga aminao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aoka hitsangana ankehitriny ireo mpamantatra ny lanitra sy mpandinika ny kintana ireo hamonjy anao amin’izay hanjo anao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, fa ho tahaka ny vodivary ireo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho main’ny afo izy ka tsy hahavonjy ny tenany amin’ny herin’ny lelafo akory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy vainafo hamindroana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na afo hitaninana aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ho toy izany aminao ireo efa nisasaranao ireo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo nifampivarotra taminao hatry ny fony hianao mbola kely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy hipariaka mandositra ho any amin’ny fonenany avy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hisy hahavonjy anao.
