document_id: EZK.37,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin’ny hampodiana ny Isiraely, sy ny hanakambanana azy ho firenena iray hanjakan’i Davida.
  - type: text
    content: 'TAO amiko ny tànan’i Jehovah, ary ny Fanahy no nitondran’i Jehovah ahy nivoaka, dia napetrany teo amin’ny lohasaha feno taolana aho. '
  '10':
  - type: text
    content: Dia naminany araka izay efa nandidiany ahy aho, ka dia nidiran’ny fofonaina ireo ka velona, dia nijoro tamin’ny tongony izy–maro be dia maro be tokoa.
  '11':
  - type: text
    content: 'Dia hoy Izy tamiko: Ry zanak’olona, ireto taolana ireto dia ny taranak’Isiraely rehetra; indreo izy manao hoe: Maina ny taolanay, levona ny fanantenanay, fongotra izahay. '
  '12':
  - type: text
    content: 'Koa maminania, ka ataovy aminy hoe: Izao no lazain’i Jehovah Tompo: Indro, ry oloko, Izaho no hanokatra ny fasanareo, ary hampiakariko avy amin’ny fasanareo hianareo, ka ho entiko ho any amin’ny tanin’ny Isiraely; '
  '13':
  - type: text
    content: 'ka dia ho fantatrareo fa Izaho no Jehovah, raha manokatra ny fasanareo Aho, ry oloko, ka mampiakatra anareo hiala amin’ny fasanareo. '
  '14':
  - type: text
    content: Ary hataoko ao anatinareo ny Fanahiko, dia ho velona hianareo, ary hamponeniko any amin’ny taninareo hianareo; ka dia ho fantatrareo fa Izaho Jehovah no efa niteny sady nahatanteraka izany, hoy Jehovah.
  '15':
  - type: text
    content: 'Ary tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '16':
  - type: text
    content: 'Ary hianao, ry zanak’olona, dia mangalà tapa-kazo iray, ka asio soratra hoe: Ho an’ny Joda sy ho an’ny zanak’Isiraely namany; dia mangalà tapa-kazo anankiray koa, ka asio soratra hoe: Ho an’i Josefa–dia tapa-kazon’i Efraima–sy ho an’ny taranak’Isiraely namany rehetra. '
  '17':
  - type: text
    content: Ary ampifanatony izy roa ho tonga tapa-kazo iray ihany, dia ho iray eny an-tànanao izy.
  '18':
  - type: text
    content: 'Ary raha miteny aminao ny zanaky ny firenenao manao hoe: Moa tsy hilaza izay hevitrao amin’izany va hianao? '
  '19':
  - type: text
    content: 'dia ataovy aminy hoe: Izao no lazain’i Jehovah Tompo: Indro, Izaho haka ny tapa-kazon’i Josefa, izay eny an-tànan’i Efraima, sy ny firenen’ny Isiraely namany, ary hakambako ho eo amin’ny tapa-kazon’i Joda izy, ary hataoko tapa-kazo iray ihany izy ka ho tonga iray eny an-tànako. '
  '2':
  - type: text
    content: Ary nitondra ahy nandehandeha teny amin’ireo Izy; ary, indreo, betsaka dia betsaka teny amin’ny lohasaha ireo, ary, indreo, maina dia maina ireo.
  '20':
  - type: text
    content: 'Ary ny tapa-kazo izay hasianao soratra dia ho eny an-tànanao eo imasony. '
  '21':
  - type: text
    content: 'Dia lazao aminy hoe: Izao no lazain’i Jehovah Tompo: Indro, Izaho haka ny Zanak’Isiraely avy any amin’ny jentilisa izay nalehany, eny, hangoniko avy any amin’ny manodidina any izy ka ho entiko ho any amin’ny taniny: '
  '22':
  - type: text
    content: 'ary hataoko ho firenena iray any amin’ny tany izy, dia any an-tendrombohitry ny Isiraely, ary mpanjaka iray ihany no ho mpanjakan’izy rehetra, ka tsy ho firenena roa intsony izy ary tsy hisaraka ho fanjakana roa intsony. '
  '23':
  - type: text
    content: Ary tsy handoto tena amin’ny sampiny, na amin’ny fahavetavetany, na amin’ny fahadisoany intsony izy; fa hovonjeko ho afaka amin’ny fonenany rehetra izay nanotany izy, ary hodioviko izy, ka dia ho oloko, ary Izaho ho Andriamaniny.
  '24':
  - type: text
    content: 'Ary Davida Mpanompoko no ho Mpanjakany; ary hiray Mpiandry izy rehetra, dia handeha araka ny fitsipiko izy sady hitandrina ny lalàko sy hankatò izany. '
  '25':
  - type: text
    content: Ary honina any amin’ny tany izay nomeko an’i Jakoba mpanompoko izy, dia ilay efa nonenan’ny razanareo, ka honina any izy sy ny zanany mbamin’ny zafiny mandrakizay; ary Davida Mpanompoko no ho Mpanapaka azy mandrakizay.
  '26':
  - type: text
    content: 'Ary hanao fanekem-pihavanana ho azy Aho, ka ho fanekena mandrakizay eo aminy izany, ary hametraka sy hahamaro azy Aho sady hametraka ny fitoerako masina eo aminy mandrakizay. '
  '27':
  - type: text
    content: 'Ary ny tabernakeliko ho eo aminy; ary Izaho ho Andriamaniny, ary izy ho oloko. '
  '28':
  - type: text
    content: Ka dia ho fantatry ny jentilisa fa Izaho Jehovah no manamasina ny Isiraely amin’ny isian’ny fitoerako masina eo aminy mandrakizay.
  '3':
  - type: text
    content: 'Ary hoy Jehovah tamiko: Ry zanak’olona, moa mety ho velona ihany va ireto taolana ireto? Ary hoy izaho: Jehovah Tompo ô, Hianao no mahalala.'
  '4':
  - type: text
    content: 'Dia hoy indray Izy tamiko: Maminania amin’ireto taolana ireto, ka ataovy aminy hoe: Ry taola-maina, mihainoa ny tenin’i Jehovah! '
  '5':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo amin’ireto taolana ireto: Indro, hasiako fofonaina hianareo ka ho velona; '
  '6':
  - type: text
    content: ary hasiako ozatra hianareo ka hampaniriko nofo; ary hosaronako hoditra hianareo; ary hasiako fofonaina hianareo ka ho velona; ka dia ho fantatrareo fa Izaho no Jehovah.
  '7':
  - type: text
    content: 'Dia naminany aho araka izay efa nandidiana ahy, ary nony efa naminany aho, dia injany! nisy feo, ary, indreo, nihetsiketsika sady nifanatonatona ny taolana, samy nanatona ny taolana namany avy. '
  '8':
  - type: text
    content: Ary hitako fa, indro, naniry ny ozatra sy ny nofo, ary nisarona hoditra izy, nefa tsy mbola nisy fofonaina tao aminy.
  '9':
  - type: text
    content: 'Dia hoy Izy tamiko: Maminania amin’ny fofonaina, eny, maminania, ry zanak’olona, ka ataovy amin’ny fofonaina hoe: Izao no lazain’i Jehovah Tompo: Manatòna avy amin’ny rivotra efatra, ry fofonaina, ka tsotsofy ireo voavono ireo, mba ho velona izy.'
