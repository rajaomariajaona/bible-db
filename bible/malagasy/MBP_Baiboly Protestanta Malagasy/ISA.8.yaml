document_id: ISA.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny hahaterahan’ny zanaky ny mpaminanivavy, sy ny handresen’i Asyria ny Joda, ary ny toky ho azon’ny tena Isiraely noho ny nahaterahan’ny Zaza Mahagaga.
  - type: text
    content: 'ARY hoy Jehovah tamiko: Mangalà fafana lehibe, ka soraty aminy araka ny fanoratry ny olona hoe: ,,Ho an’'
  - type: note
    content: 'Na: Ny amin’.'
  - type: text
    content: ' i Mahera-salala-hasi-baza.’’'
  - type: note
    content: Mahera-salala-hasi-baza = Avy faingana ny famaboana, mimaona ny fandrobana.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Makà saina ihany hianareo, nefa mbola hofoanana izany;
  - type: text
    content: Milazà ihany ny teny, nefa tsy ho tanteraka izany tsy akory;
  - type: text
    content: Fa aminay Andriamanitra.
  - type: note
    content: Heb. imano Ela; izahao and. 8.
  '11':
  - type: text
    content: Fa izao no nolazain’i Jehovah tamiko, raha nanindry ahy mafy ny tànany,
  - type: text
    content: 'Ka nanariny tsy handeha amin’ny falehan’ity firenena ity aho:'
  '12':
  - type: text
    content: Aza mba lazainareo ho tetika fikomiana izay lazain’ity firenena ity ho tetika fikomiana;
  - type: text
    content: Ary aza matahotra izay atahorany na mangovitra hianareo.
  '13':
  - type: text
    content: Jehovah, Tompon’ny maro, no hasino;
  - type: text
    content: Ary aoka Izy ihany no hatahoranareo,
  - type: text
    content: Ary Izy ihany no hangovitanareo.
  '14':
  - type: text
    content: Dia ho fitoerana masina ho anareo Izy,
  - type: text
    content: Fa ho vato mahatafintohina sy vatolampy mahasolafaka kosa
  - type: text
    content: Amin’ny firenena roa amin’ny Isiraely,
  - type: text
    content: Sady ho fandrika sy tonta
  - type: text
    content: Amin’ny mponina any Jerosalema.
  '15':
  - type: text
    content: Ary maro ao aminy no ho tafintohina
  - type: text
    content: Sady ho lavo sy ho ringana
  - type: text
    content: Ary ho voafandrika sy ho voasambotra.
  '16':
  - type: text
    content: Fehezo ny teni-vavolombelona,
  - type: text
    content: Ary asio tombo-kase ny lalàna eo amin’ny mpianatro.
  '17':
  - type: text
    content: Ary hiandry an’i Jehovah aho
  - type: text
    content: Izay manafina ny tavany amin’ny taranak’i Jakoba,
  - type: text
    content: Ka hanantena Azy ihany aho.
  '18':
  - type: text
    content: Indreto, izaho sy ireo zaza nomen’i Jehovah ahy
  - type: text
    content: Dia famantarana sy fahagagana ao amin’ny Isiraely
  - type: text
    content: Avy amin’i Jehovah, Tompon’ny maro,
  - type: text
    content: Izay monina ao an-tendrombohitra Ziona.
  '19':
  - type: text
    content: 'Ary raha lazainy aminareo hoe:'
  - type: text
    content: Milà saina amin’ny manao azy ho tsindrian-javatra sy ny mpanao sikidy, izay mitsiatsiaka sy miboeriboerika,
  - type: text
    content: Moa tsy Andriamaniny va no tokony hilan’ny olona saina?
  - type: text
    content: Fa hila saina
  - type: text
    content: ' amin’ny maty ho an’ny velona va izy?'
  '2':
  - type: text
    content: 'Ary haka vavolombelona mahatoky Aho, dia Oria mpisorona sy Zakaria, zanakalahin’i Jeberekia. '
  '20':
  - type: text
    content: Ho amin’ny lalàna sy ny teni-vavolombelona ihany!
  - type: text
    content: Raha tsy miteny araka izany teny izany izy,
  - type: text
    content: Dia olona izay tsy hiposahan’ny fahazavan’ny maraina.
  - type: note
    content: 'Na: Eny, izany no holazain’ny olona izay tsy iposahan’ny fahazavan’ny maraina.'
  '21':
  - type: text
    content: Dia samy hivezivezy amin’ny tany izy rehetra sady mahantra no mosarena;
  - type: text
    content: Ary rehefa mosarena izy, dia ho sosotra
  - type: text
    content: Ka hanozona
  - type: note
    content: 'Na: hanozona amin’ny anaran’.'
  - type: text
    content: ' ny mpanjakany sy Andriamaniny,'
  - type: note
    content: 'Na: ny andriamaniny.'
  - type: text
    content: Ary dia hiandrandra;
  '22':
  - type: text
    content: Ary hijery ny tany izy,
  - type: text
    content: Ka indro fahoriana sy fahamaizinana ary manjombona mahafadiranovana,
  - type: text
    content: Ary horoahina ho any amin’ny aizim-pito izy.
  '23':
  - type: text
    content: Fa tsy hanjombona mandrakariva ilay efa nozoim-pahoriana.
  - type: text
    content: Tamin’ny taloha dia nataony tsinontsinona ny tany Zebolona sy ny tany Naftaly;
  - type: text
    content: Fa amin’ny aoriana kosa dia homeny voninahitra ny làlana eo amoron-dranomasina, any an-dafin’i Jordana,
  - type: text
    content: Dia Galilia, tanin’ny jentilisa.
  '3':
  - type: text
    content: 'Ary nankany amin’ny mpaminanivavy aho; dia nanan-anaka izy ka niteraka zazalahy. Ary hoy Jehovah tamiko: Aoka ny anarany hataonao hoe Mahera-salala-hasi-baza. '
  '4':
  - type: text
    content: Fa raha tsy mbola mahatonona hoe Idada na Ineny io zazalahy io, dia hobaboina eo anatrehan’ny mpanjakan’i Asyria ny haren’i Damaskosy sy ny fananan’i Samaria.
  '5':
  - type: text
    content: 'Ary Jehovah dia mbola niteny tamiko indray hoe:'
  '6':
  - type: text
    content: Satria ity firenena ity mandà ny rano Siloa izay misononoka
  - type: text
    content: Ary mifaly amin-dRezina sy ny zanak’i Remalia,
  '7':
  - type: text
    content: Dia, indro, hampiakarin’ny Tompo hanafotra azy
  - type: text
    content: Ny rano be sady manonja amin’ny Ony
  - type: note
    content: Eofrata.
  - type: text
    content: (Dia ny mpanjakan’i Asyria sy ny voninahiny rehetra);
  - type: text
    content: Ary ny masondranony rehetra ho tondraka,
  - type: text
    content: Ary ny morony rehetra hihoarany;
  '8':
  - type: text
    content: Dia himaona fatratra izy ka hihatra amin’ny Joda
  - type: text
    content: Ary hanafotra sady mbola hisondrotra ihany
  - type: text
    content: Mandra-pahatongany havozona;
  - type: text
    content: Ary ny fipasany eny an-daniny roa
  - type: note
    content: Heb. fampivelatra ny elany.
  - type: text
    content: ' dia hanenika ny taninao, ry Imanoela ô.'
  '9':
  - type: text
    content: Misafoaha ihany hianareo, ry firenena ô, nefa mbola ho ringana mihitsy hianareo;
  - type: text
    content: Ary mihainoa ihany, ry tany lavitra rehetra,
  - type: text
    content: Misikìna ihany hianareo, nefa mbola ho ringana mihitsy;
  - type: text
    content: Eny, misikìna ihany hianareo, nefa mbola ho ringana mihitsy.
