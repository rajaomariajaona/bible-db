document_id: ISA.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny hahaterahan’ny zanaky ny mpaminanivavy, sy ny handresen’i Asyria ny Joda, ary ny toky ho azon’ny tena Isiraely noho ny nahaterahan’ny Zaza Mahagaga.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY hoy Jehovah tamiko: Mangalà fafana lehibe, ka soraty aminy araka ny fanoratry ny olona hoe: ,,Ho an’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ny amin’.
      marker-yv: yv-n
    - type: text
      text: ' i Mahera-salala-hasi-baza.’’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mahera-salala-hasi-baza = Avy faingana ny famaboana, mimaona ny fandrobana.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Makà saina ihany hianareo, nefa mbola hofoanana izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milazà ihany ny teny, nefa tsy ho tanteraka izany tsy akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aminay Andriamanitra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'imano Ela; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao and. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.'
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa izao no nolazain’i Jehovah tamiko, raha nanindry ahy mafy ny tànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka nanariny tsy handeha amin’ny falehan’ity firenena ity aho:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aza mba lazainareo ho tetika fikomiana izay lazain’ity firenena ity ho tetika fikomiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza matahotra izay atahorany na mangovitra hianareo.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Jehovah, Tompon’ny maro, no hasino;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka Izy ihany no hatahoranareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izy ihany no hangovitanareo.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Dia ho fitoerana masina ho anareo Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho vato mahatafintohina sy vatolampy mahasolafaka kosa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny firenena roa amin’ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady ho fandrika sy tonta
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny mponina any Jerosalema.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary maro ao aminy no ho tafintohina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady ho lavo sy ho ringana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho voafandrika sy ho voasambotra.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fehezo ny teni-vavolombelona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary asio tombo-kase ny lalàna eo amin’ny mpianatro.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary hiandry an’i Jehovah aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay manafina ny tavany amin’ny taranak’i Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanantena Azy ihany aho.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Indreto, izaho sy ireo zaza nomen’i Jehovah ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia famantarana sy fahagagana ao amin’ny Isiraely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy amin’i Jehovah, Tompon’ny maro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay monina ao an-tendrombohitra Ziona.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary raha lazainy aminareo hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milà saina amin’ny manao azy ho tsindrian-javatra sy ny mpanao sikidy, izay mitsiatsiaka sy miboeriboerika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy Andriamaniny va no tokony hilan’ny olona saina?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Fa hila saina
    - type: text
      text: ' amin’ny maty ho an’ny velona va izy?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary haka vavolombelona mahatoky Aho, dia Oria mpisorona sy Zakaria, zanakalahin’i Jeberekia. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ho amin’ny lalàna sy ny teni-vavolombelona ihany!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy miteny araka izany teny izany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia olona izay tsy hiposahan’ny fahazavan’ny maraina.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eny, izany no holazain’ny olona izay tsy iposahan’ny fahazavan’ny maraina.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia samy hivezivezy amin’ny tany izy rehetra sady mahantra no mosarena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary rehefa mosarena izy, dia ho sosotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanozona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanozona amin’ny anaran’.
      marker-yv: yv-n
    - type: text
      text: ' ny mpanjakany sy Andriamaniny,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny andriamaniny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia hiandrandra;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary hijery ny tany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka indro fahoriana sy fahamaizinana ary manjombona mahafadiranovana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary horoahina ho any amin’ny aizim-pito izy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fa tsy hanjombona mandrakariva ilay efa nozoim-pahoriana.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tamin’ny taloha dia nataony tsinontsinona ny tany Zebolona sy ny tany Naftaly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa amin’ny aoriana kosa dia homeny voninahitra ny làlana eo amoron-dranomasina, any an-dafin’i Jordana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Galilia, tanin’ny jentilisa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nankany amin’ny mpaminanivavy aho; dia nanan-anaka izy ka niteraka zazalahy. Ary hoy Jehovah tamiko: Aoka ny anarany hataonao hoe Mahera-salala-hasi-baza. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa raha tsy mbola mahatonona hoe Idada na Ineny io zazalahy io, dia hobaboina eo anatrehan’ny mpanjakan’i Asyria ny haren’i Damaskosy sy ny fananan’i Samaria.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Jehovah dia mbola niteny tamiko indray hoe:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Satria ity firenena ity mandà ny rano Siloa izay misononoka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mifaly amin-dRezina sy ny zanak’i Remalia,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia, indro, hampiakarin’ny Tompo hanafotra azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rano be sady manonja amin’ny Ony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Eofrata.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Dia ny mpanjakan’i Asyria sy ny voninahiny rehetra);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny masondranony rehetra ho tondraka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny morony rehetra hihoarany;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia himaona fatratra izy ka hihatra amin’ny Joda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanafotra sady mbola hisondrotra ihany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahatongany havozona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fipasany eny an-daniny roa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fampivelatra ny elany.
      marker-yv: yv-n
    - type: text
      text: ' dia hanenika ny taninao, ry Imanoela ô.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Misafoaha ihany hianareo, ry firenena ô, nefa mbola ho ringana mihitsy hianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihainoa ihany, ry tany lavitra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misikìna ihany hianareo, nefa mbola ho ringana mihitsy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, misikìna ihany hianareo, nefa mbola ho ringana mihitsy.
