    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Eny, izany no mampitepotepo ny foko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mampiemponempona azy hiala amin’ny fitoerany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa dia mihainoa ny fikotrokotroky ny feony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny rohona izay mivoaka avy amin’ny vavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandefa izany ho eny ambanin’ny lanitra rehetra Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny helatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahazavany.
    marker-yv: yv-n
  - type: text
    text: ' hatramin’ny faran’ny tany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Manarakaraka izany, dia misy feo mirohondrohona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampikotrokotroka ny feon’ny fahalehibiazany Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka rehefa re ny feony, dia tsy sakanany '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny helatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mahagaga ny fikotrokotrok’Andriamanitra amin’ny feony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao zava-dehibe tsy takatry ny saintsika Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny orampanala baikoiny hoe: Milatsaha eny ambonin’ny tany hianao;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy izany koa ny ranonorana mivatravatra, eny, dia ny ranonorany mivatravatra mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mampiohona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manisy tombo-kase.
    marker-yv: yv-n
  - type: text
    text: ' ny tànan’ny olona rehetra Izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba samy hahalala izany ny olona rehetra izay nataony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary miditra ao am-piereny koa ny bibi-dia
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mamitsaka ao an-davany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Avy any atsimo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'efi-trano: '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Joba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix. 9.
    marker-yv: yv-n
  - type: text
    text: ' ny tadio,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary entin’ny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rivotra
  - type: text
    text: ' avy any avaratra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avy amin’ireo mpanahakahaka.
    marker-yv: yv-n
  - type: text
    text: ' ny hatsiaka.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fofonain’Andriamanitra mahamisy ranomandry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka voageja ny rano malalaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny rahona matevina tambesarany rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny rahon’ny helatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahazavany.
    marker-yv: yv-n
  - type: text
    text: ' dia ampieleziny;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia mihodinkodina araka ny fitarihany azy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanatateraka izay rehetra andidiany azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny ambonin’ny tany eran’izao tontolo izao,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eny ambonin’izao tontolo izao ho amin’ny tany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Na alatsany ho famaizana–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tokony ho an’ny taniny izany–na ho famindrampo kosa.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: alatsany ho famaizana, na hahasoa ny taniny, na ho famindrampo.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mihainoa izany, ry Joba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mijanòna, ka mba diniho ny fahagagana ataon’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fantatrao va ny fanamboaran’Andriamanitra ireny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fampitselatselany ny helatry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahazavany.
    marker-yv: yv-n
  - type: text
    text: ' ny rahony?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fantatrao va ny fihevahevan’ny rahona matevina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fahagagana ataon’Ilay tanteraka amin’ny fahalalana?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hianao izay mahatsiaro ny fitafianao ho mafana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha migaingaina ny andro azon’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny rivotra
  - type: text
    text: ' avy any atsimo,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moa hianao niara-nanao taminy va, raha namelatra ny habakabaka Izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mitoetra mafy toy ny zavatra manganohano natao an-idina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mba ampianaro anay ary izay holazainay aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hitanay izay halahatray noho ny aizina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Holazaina aminy va, raha miteny aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa misy olona maniry ho levona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miteny ta-hatelina.
    marker-yv: yv-n
  - type: text
    text: ' tokoa va?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy hita ankehitriny ny mazava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay mamirapiratra any amin’ny rahona:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa raha mandalo ny rivotra, dia mampisava azy ihany izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Avy any avaratra no ihavian’ny mazava mitarehim-bolamena;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ihavian’ny volamena.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’Andriamanitra ny voninahitra mahatahotra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny Tsitoha, tsy mahita Azy isika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay lehibe amin’ny hery sy ny fitsarana mbamin’ny fahamarinana tanteraka dia tsy mba mampahory.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mamaly.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa izany no atahoran’ny olona Azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mety mijery izay manao azy ho hendry
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny hendry am-po; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tsy misy mahita Azy ny hendry am-po rehetra.
    marker-yv: yv-n
  - type: text
    text: ' Izy.'
