document_id: JOB.37,873
type_code: plt
verses:
  '1':
  - type: text
    content: Eny, izany no mampitepotepo ny foko
  - type: text
    content: Ka mampiemponempona azy hiala amin’ny fitoerany.
  '10':
  - type: text
    content: Ny fofonain’Andriamanitra mahamisy ranomandry,
  - type: text
    content: Ka voageja ny rano malalaka.
  '11':
  - type: text
    content: Ny rahona matevina tambesarany rano,
  - type: text
    content: Ary ny rahon’ny helatra
  - type: note
    content: Heb. fahazavany.
  - type: text
    content: ' dia ampieleziny;'
  '12':
  - type: text
    content: Dia mihodinkodina araka ny fitarihany azy ireo
  - type: text
    content: Hanatateraka izay rehetra andidiany azy
  - type: text
    content: Eny ambonin’ny tany eran’izao tontolo izao,
  - type: note
    content: 'Na: Eny ambonin’izao tontolo izao ho amin’ny tany.'
  '13':
  - type: text
    content: Na alatsany ho famaizana–
  - type: text
    content: Raha tokony ho an’ny taniny izany–na ho famindrampo kosa.
  - type: note
    content: 'Na: alatsany ho famaizana, na hahasoa ny taniny, na ho famindrampo.'
  '14':
  - type: text
    content: Mihainoa izany, ry Joba;
  - type: text
    content: Mijanòna, ka mba diniho ny fahagagana ataon’Andriamanitra.
  '15':
  - type: text
    content: Fantatrao va ny fanamboaran’Andriamanitra ireny
  - type: text
    content: Sy ny fampitselatselany ny helatry
  - type: note
    content: Heb. fahazavany.
  - type: text
    content: ' ny rahony?'
  '16':
  - type: text
    content: Fantatrao va ny fihevahevan’ny rahona matevina,
  - type: text
    content: Dia ny fahagagana ataon’Ilay tanteraka amin’ny fahalalana?
  '17':
  - type: text
    content: Hianao izay mahatsiaro ny fitafianao ho mafana,
  - type: text
    content: Raha migaingaina ny andro azon’
  - type: text
    content: ny rivotra
  - type: text
    content: ' avy any atsimo,'
  '18':
  - type: text
    content: Moa hianao niara-nanao taminy va, raha namelatra ny habakabaka Izy,
  - type: text
    content: Izay mitoetra mafy toy ny zavatra manganohano natao an-idina?
  '19':
  - type: text
    content: Mba ampianaro anay ary izay holazainay aminy;
  - type: text
    content: Fa tsy hitanay izay halahatray noho ny aizina.
  '2':
  - type: text
    content: Mihainoa dia mihainoa ny fikotrokotroky ny feony
  - type: text
    content: Sy ny rohona izay mivoaka avy amin’ny vavany.
  '20':
  - type: text
    content: Holazaina aminy va, raha miteny aho?
  - type: text
    content: Moa misy olona maniry ho levona
  - type: note
    content: Heb. miteny ta-hatelina.
  - type: text
    content: ' tokoa va?'
  '21':
  - type: text
    content: Tsy hita ankehitriny ny mazava,
  - type: text
    content: 'Izay mamirapiratra any amin’ny rahona:'
  - type: text
    content: Nefa raha mandalo ny rivotra, dia mampisava azy ihany izany.
  '22':
  - type: text
    content: Avy any avaratra no ihavian’ny mazava mitarehim-bolamena;
  - type: note
    content: Heb. ihavian’ny volamena.
  - type: text
    content: Ao amin’Andriamanitra ny voninahitra mahatahotra.
  '23':
  - type: text
    content: Ny Tsitoha, tsy mahita Azy isika;
  - type: text
    content: Izay lehibe amin’ny hery sy ny fitsarana mbamin’ny fahamarinana tanteraka dia tsy mba mampahory.
  - type: note
    content: 'Na: mamaly.'
  '24':
  - type: text
    content: Koa izany no atahoran’ny olona Azy;
  - type: text
    content: Tsy mety mijery izay manao azy ho hendry
  - type: note
    content: 'Heb. ny hendry am-po; na: Tsy misy mahita Azy ny hendry am-po rehetra.'
  - type: text
    content: ' Izy.'
  '3':
  - type: text
    content: Mandefa izany ho eny ambanin’ny lanitra rehetra Izy,
  - type: text
    content: Ary ny helatra
  - type: note
    content: Heb. fahazavany.
  - type: text
    content: ' hatramin’ny faran’ny tany.'
  '4':
  - type: text
    content: Manarakaraka izany, dia misy feo mirohondrohona;
  - type: text
    content: Mampikotrokotroka ny feon’ny fahalehibiazany Izy,
  - type: text
    content: 'Ka rehefa re ny feony, dia tsy sakanany '
  - type: text
    content: ny helatra.
  '5':
  - type: text
    content: Mahagaga ny fikotrokotrok’Andriamanitra amin’ny feony;
  - type: text
    content: Manao zava-dehibe tsy takatry ny saintsika Izy.
  '6':
  - type: text
    content: 'Fa ny orampanala baikoiny hoe: Milatsaha eny ambonin’ny tany hianao;'
  - type: text
    content: Ary toy izany koa ny ranonorana mivatravatra, eny, dia ny ranonorany mivatravatra mafy.
  '7':
  - type: text
    content: Mampiohona
  - type: note
    content: Heb. Manisy tombo-kase.
  - type: text
    content: ' ny tànan’ny olona rehetra Izy,'
  - type: text
    content: Mba samy hahalala izany ny olona rehetra izay nataony;
  '8':
  - type: text
    content: Ary miditra ao am-piereny koa ny bibi-dia
  - type: text
    content: Ka mamitsaka ao an-davany.
  '9':
  - type: text
    content: Avy any atsimo
  - type: note
    content: 'Heb. efi-trano: izahao Joba ix. 9.'
  - type: text
    content: ' ny tadio,'
  - type: text
    content: 'Ary entin’ny '
  - type: text
    content: rivotra
  - type: text
    content: ' avy any avaratra'
  - type: note
    content: Heb. avy amin’ireo mpanahakahaka.
  - type: text
    content: ' ny hatsiaka.'
