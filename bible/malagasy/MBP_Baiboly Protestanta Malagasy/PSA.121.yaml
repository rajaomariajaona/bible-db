document_id: PSA.121,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokian’izay manana an’i Jehovah ho Mpiaro azy.
  - type: text
    content: Fihirana fiakarana.
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: MANOPY ny masoko ho amin’ny tendrombohitra aho;
  - type: text
    content: Avy aiza ny famonjena ahy?
  - type: note
    content: 'Na: Izay ihavian’ny famonjena ahy.'
  '2':
  - type: text
    content: Ny famonjena ahy dia avy amin’i Jehovah,
  - type: text
    content: Mpanao ny lanitra sy ny tany.
  '3':
  - type: text
    content: Tsy mba havelany hangozohozo anie ny tongotrao;
  - type: text
    content: Tsy ho rendrehana anie ny Mpiaro anao.
  '4':
  - type: text
    content: Indro, tsy matory na rendrehana
  - type: text
    content: Ny Mpiaro ny Isiraely.
  '5':
  - type: text
    content: Jehovah no Mpiaro anao;
  - type: text
    content: Jehovah no fialofanao eo amin’ny ankavananao.
  '6':
  - type: text
    content: Ny masoandro tsy mba hamely anao nony andro,
  - type: text
    content: Na ny volana nony alina.
  '7':
  - type: text
    content: Jehovah hiaro anao amin’ny ratsy rehetra;
  - type: text
    content: Eny, hiaro ny fanahinao Izy.
  '8':
  - type: text
    content: Jehovah hiaro anao, na mivoaka na miditra,
  - type: text
    content: Hatramin’izao ka ho mandrakizay.
