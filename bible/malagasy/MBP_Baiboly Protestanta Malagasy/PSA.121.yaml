document_id: PSA.121,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fahatokian’izay manana an’i Jehovah ho Mpiaro azy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fihirana fiakarana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '121.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fihirana misy hevitra ambaratonga.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: MANOPY ny masoko ho amin’ny tendrombohitra aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy aiza ny famonjena ahy?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '121.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izay ihavian’ny famonjena ahy.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny famonjena ahy dia avy amin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanao ny lanitra sy ny tany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy mba havelany hangozohozo anie ny tongotrao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ho rendrehana anie ny Mpiaro anao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Indro, tsy matory na rendrehana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Mpiaro ny Isiraely.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Jehovah no Mpiaro anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no fialofanao eo amin’ny ankavananao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny masoandro tsy mba hamely anao nony andro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny volana nony alina.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jehovah hiaro anao amin’ny ratsy rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hiaro ny fanahinao Izy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jehovah hiaro anao, na mivoaka na miditra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’izao ka ho mandrakizay.
