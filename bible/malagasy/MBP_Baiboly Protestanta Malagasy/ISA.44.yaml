document_id: ISA.44,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ankehitriny dia mihainoa, ry Jakoba, mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ry Isiraely, izay nofidiko;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no namorona andriamanitra, na nanao sarin-javatra an-idina izay tsy mahasoa akory?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ho menatra ny namany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mpiasa dia olona ihany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hivory izy rehetra ka handroso;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ho raiki-tahotra sy ho menatra avokoa izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny mpanefy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: manamboatra
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: manasa.'
      marker-yv: yv-n
    - type: text
      text: fiasana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miasa amin’ny arina izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manamboatra azy amin’ny tantanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy miasa azy amin’ny sandriny matanjaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, noana izy, ka ketraka ny heriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misotro rano izy ka reraka.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpandrafitra manenjana ny kofehy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy manamarika azy amin’ny fitsipihana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manamboatra azy amin’ny vankona izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia manamarika azy amin’ny kompà
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahavita azy ho tahaka ny endrik’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny hatsaran-tarehin’ny olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampitoerina ao an-trano.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy maintsy mijinja ny sedera izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary maka ny hazo ileksa sy ôka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mifidy hazo any an-ala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamboly ny hazo orno izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ampanirin’ny ranonorana izany;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary dia anaovan’ny olona kitay izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka analany hamindroany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ampirehetiny izany mba hanendasany mofo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anaovany andriamanitra izany, ka dia ivavahany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, anaovany sarin-javatra voasokitra koa izany, ka dia iankohofany.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sasany dorany amin’ny afo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ny sasany ahandroany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ihinanany.
      marker-yv: yv-n
    - type: text
      text: ' hena;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manatsatsika hena izy, ka dia voky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, mamindro izy ka manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aha! mafana aho izany! nahita afo aho lahy!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sisan’izany dia amboariny ho andriamanitra, ho sarin-javatra voasokitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary miondrika sy miankohoka eo anatrehany izy ka mivavaka aminy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonjeo aho, fa andriamanitro hianao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahalala na mahafantatra ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa voatampina ny masony ka tsy mahita,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fony, ka tsy mahalala.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy mieritreritra ao am-pony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na mba manana fahalalana na saina akory hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sasany mantsy nodorako tamin’ny afo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eny, efa nanendy mofo tamin’ny vainafony aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nanatsatsika hena aho ka nihinana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ny sisa va hataoko fahavetavetana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiankohofako eo anatrehan’izay vatan-kazo?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: vokatry ny hazo.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no lazain’i Jehovah, Izay nahary anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy namorona anao hatrany am-bohoka sady mamonjy anao:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra, ry Jakoba mpanompoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao, ry Jesoròna,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Jesorona dia anaran’ny Isiraely.
      marker-yv: yv-n
    - type: text
      text: ' izay nofidiko;'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homan-davenona izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voafitaka ny fony ka nampivily azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ka dia tsy mahavonjy ny fanahiny izy na mahalaza hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy lainga va no eto an-tànako ankavanana?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsarovy izany, ry Jakoba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hianao, ry Isiraely, fa mpanompoko hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noforoniko hianao ka mpanompoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hohadinoiko hianao, ry Isiraely ô,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho efa nandevona ny fahadisoanao tahaka ny fandevona ny zavona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahotanao tahaka ny rahona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa miverena amiko, fa efa nanavotra anao Aho.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihobia, ry lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no nanao izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova feo fifaliana hianareo, ry fitoerana lalina any ambanin’ny tany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Velomy ny hoby, ry tendrombohitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hianao, ry ala mbamin’izay hazo rehetra ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah efa nanavotra an’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mampiseho ny voninahiny eo amin’Isiraely.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’i Kyrosy, izay voahosotr’i Jehovah ho mpanafaka ny Isiraely.
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: IZAO no lazain’i Jehovah, Izay nanavotra anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sady namorona anao hatrany am-bohoka:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho no Jehovah Izay manao ny zavatra rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho irery no manenjana ny lanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenako ihany no mamelatra ny tany;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho mahafoana ny famantarana lazain’ny mpibedibedy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mampahavery saina ny mpanao fankatovana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mampihemotra ny olon-kendry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mampody ny fahalalany ho fahadalana,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahatò ny tenin’ny mpanompoko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpanompony.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mahatanteraka ny saina atolotry ny irako,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: irany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary manao amin’i Jerosalema hoe: Honenana hianao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy amin’ny tanànan’i Joda hoe: Hatsangana hianareo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hamboariko izay rava eo,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary milaza amin’ny rano lalina hoe: Tankìna,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hataoko tankina ny oninao,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary milaza an’i Kyrosy hoe: Izy no mpiandry ondriko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izay sitrako rehetra dia hotanterahiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary izy hanao amin’i Jerosalema hoe: Hatsangana hianao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary amin’ny tempoly hoe: Haorina indray ny fanorenanao.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa handatsaka rano amin’izay mangetaheta Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary riaka ho amin’izay tany karankaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, handatsaka ny Fanahiko amin’ny taranakao Aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fitahiako ho amin’ny terakao;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia haniry eny amin’ny ahitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny hazomalahelo eny anilan’ny rano mandeha ireny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny anankiray hilaza hoe: An’i Jehovah aho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anankiray koa hankalaza ny anarana hoe Jakoba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anankiray koa indray hanoratra amin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eo amin’.
      marker-yv: yv-n
    - type: text
      text: ' ny tànany hoe: An’i Jehovah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny anarana hoe Isiraely dia hotononiny amim-panajana.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’i Jehovah, Mpanjakan’ny Isiraely, sy ny amin’ny sampin’ny jentilisa.
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: IZAO no lazain’i Jehovah, Mpanjakan’ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia Jehovah, Tompon’ny maro, Mpanavotra azy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izaho no voalohany, ary Izaho no farany:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy Andriamanitra afa-tsy Izaho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza moa no mba mahantso tahaka Ahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Aoka hanambara sy handahatra izany amiko izy)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatrizay nampitoerako ny firenena fony fahagola?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zavatra ho avy sy ny mbola ho tonga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka hambarany koa izany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza matahotra na mangovitra hianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy efa nampandre anareo hatramin’ny fahiny va Aho ka nanambara taminareo?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hianareo no vavolombeloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy Andriamanitra afa-tsy Izaho va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsia, tsy misy Vatolampy, tsy hitako izany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mamorona sarin-javatra voasokitra dia zava-poana avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny zavatra tiany indrindra dia tsy mahasoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vavolombelon’ireny dia tsy mahita na mahalala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hahamenatra azy.
