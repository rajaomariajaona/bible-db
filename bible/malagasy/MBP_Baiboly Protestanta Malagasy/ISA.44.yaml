document_id: ISA.44,873
type_code: plt
verses:
  '1':
  - type: text
    content: Fa ankehitriny dia mihainoa, ry Jakoba, mpanompoko,
  - type: text
    content: Sy ry Isiraely, izay nofidiko;
  '10':
  - type: text
    content: Iza no namorona andriamanitra, na nanao sarin-javatra an-idina izay tsy mahasoa akory?
  '11':
  - type: text
    content: Indro, ho menatra ny namany rehetra;
  - type: text
    content: Fa ny mpiasa dia olona ihany;
  - type: text
    content: Aoka hivory izy rehetra ka handroso;
  - type: text
    content: Aoka ho raiki-tahotra sy ho menatra avokoa izy.
  '12':
  - type: text
    content: 'Ny mpanefy '
  - type: text
    content: manamboatra
  - type: text
    content: ' '
  - type: note
    content: 'Na: manasa.'
  - type: text
    content: fiasana;
  - type: text
    content: Miasa amin’ny arina izy
  - type: text
    content: Ary manamboatra azy amin’ny tantanana
  - type: text
    content: Sy miasa azy amin’ny sandriny matanjaka;
  - type: text
    content: Eny, noana izy, ka ketraka ny heriny;
  - type: text
    content: Tsy misotro rano izy ka reraka.
  '13':
  - type: text
    content: Ny mpandrafitra manenjana ny kofehy
  - type: text
    content: Sy manamarika azy amin’ny fitsipihana;
  - type: text
    content: Manamboatra azy amin’ny vankona izy,
  - type: text
    content: Dia manamarika azy amin’ny kompà
  - type: text
    content: Ary mahavita azy ho tahaka ny endrik’olona,
  - type: text
    content: Dia tahaka ny hatsaran-tarehin’ny olona,
  - type: text
    content: Mba hampitoerina ao an-trano.
  '14':
  - type: text
    content: Tsy maintsy mijinja ny sedera izy
  - type: text
    content: Ary maka ny hazo ileksa sy ôka
  - type: text
    content: Ary mifidy hazo any an-ala;
  - type: text
    content: Mamboly ny hazo orno izy,
  - type: text
    content: Ka ampanirin’ny ranonorana izany;
  '15':
  - type: text
    content: Ary dia anaovan’ny olona kitay izany
  - type: text
    content: Ka analany hamindroany;
  - type: text
    content: Eny, ampirehetiny izany mba hanendasany mofo;
  - type: text
    content: Anaovany andriamanitra izany, ka dia ivavahany;
  - type: text
    content: Eny, anaovany sarin-javatra voasokitra koa izany, ka dia iankohofany.
  '16':
  - type: text
    content: Ny sasany dorany amin’ny afo,
  - type: text
    content: Eny, ny sasany ahandroany
  - type: note
    content: Heb. ihinanany.
  - type: text
    content: ' hena;'
  - type: text
    content: Manatsatsika hena izy, ka dia voky;
  - type: text
    content: 'Eny, mamindro izy ka manao hoe:'
  - type: text
    content: Aha! mafana aho izany! nahita afo aho lahy!
  '17':
  - type: text
    content: Ary ny sisan’izany dia amboariny ho andriamanitra, ho sarin-javatra voasokitra,
  - type: text
    content: 'Ary miondrika sy miankohoka eo anatrehany izy ka mivavaka aminy hoe:'
  - type: text
    content: Vonjeo aho, fa andriamanitro hianao.
  '18':
  - type: text
    content: Tsy mahalala na mahafantatra ireny;
  - type: text
    content: Fa voatampina ny masony ka tsy mahita,
  - type: text
    content: Ary ny fony, ka tsy mahalala.
  '19':
  - type: text
    content: Tsy misy mieritreritra ao am-pony,
  - type: text
    content: 'Na mba manana fahalalana na saina akory hanao hoe:'
  - type: text
    content: Ny sasany mantsy nodorako tamin’ny afo;
  - type: text
    content: 'Eny, efa nanendy mofo tamin’ny vainafony aho:'
  - type: text
    content: Efa nanatsatsika hena aho ka nihinana;
  - type: text
    content: Koa ny sisa va hataoko fahavetavetana,
  - type: text
    content: Hiankohofako eo anatrehan’izay vatan-kazo?
  - type: note
    content: 'Na: vokatry ny hazo.'
  '2':
  - type: text
    content: Izao no lazain’i Jehovah, Izay nahary anao
  - type: text
    content: 'Sy namorona anao hatrany am-bohoka sady mamonjy anao:'
  - type: text
    content: Aza matahotra, ry Jakoba mpanompoko,
  - type: text
    content: Ary hianao, ry Jesoròna,
  - type: note
    content: Jesorona dia anaran’ny Isiraely.
  - type: text
    content: ' izay nofidiko;'
  '20':
  - type: text
    content: Homan-davenona izy;
  - type: text
    content: Voafitaka ny fony ka nampivily azy,
  - type: text
    content: 'Ka dia tsy mahavonjy ny fanahiny izy na mahalaza hoe:'
  - type: text
    content: Moa tsy lainga va no eto an-tànako ankavanana?
  '21':
  - type: text
    content: Tsarovy izany, ry Jakoba,
  - type: text
    content: Dia hianao, ry Isiraely, fa mpanompoko hianao;
  - type: text
    content: Noforoniko hianao ka mpanompoko;
  - type: text
    content: Tsy hohadinoiko hianao, ry Isiraely ô,
  '22':
  - type: text
    content: Izaho efa nandevona ny fahadisoanao tahaka ny fandevona ny zavona,
  - type: text
    content: Ary ny fahotanao tahaka ny rahona;
  - type: text
    content: Koa miverena amiko, fa efa nanavotra anao Aho.
  '23':
  - type: text
    content: Mihobia, ry lanitra;
  - type: text
    content: Fa Jehovah no nanao izany;
  - type: text
    content: Manaova feo fifaliana hianareo, ry fitoerana lalina any ambanin’ny tany;
  - type: text
    content: Velomy ny hoby, ry tendrombohitra,
  - type: text
    content: Ary hianao, ry ala mbamin’izay hazo rehetra ao;
  - type: text
    content: Fa Jehovah efa nanavotra an’i Jakoba
  - type: text
    content: Sy mampiseho ny voninahiny eo amin’Isiraely.
  - type: heading
    content: Ny amin’i Kyrosy, izay voahosotr’i Jehovah ho mpanafaka ny Isiraely.
  '24':
  - type: text
    content: IZAO no lazain’i Jehovah, Izay nanavotra anao
  - type: text
    content: 'Sady namorona anao hatrany am-bohoka:'
  - type: text
    content: Izaho no Jehovah Izay manao ny zavatra rehetra,
  - type: text
    content: Izaho irery no manenjana ny lanitra;
  - type: text
    content: Ny tenako ihany no mamelatra ny tany;
  '25':
  - type: text
    content: Izaho mahafoana ny famantarana lazain’ny mpibedibedy
  - type: text
    content: Sy mampahavery saina ny mpanao fankatovana
  - type: text
    content: Ary mampihemotra ny olon-kendry
  - type: text
    content: Ka mampody ny fahalalany ho fahadalana,
  '26':
  - type: text
    content: Ary mahatò ny tenin’ny mpanompoko
  - type: note
    content: Heb. mpanompony.
  - type: text
    content: Sy mahatanteraka ny saina atolotry ny irako,
  - type: note
    content: Heb. irany.
  - type: text
    content: 'Ary manao amin’i Jerosalema hoe: Honenana hianao,'
  - type: text
    content: 'Sy amin’ny tanànan’i Joda hoe: Hatsangana hianareo,'
  - type: text
    content: Ka hamboariko izay rava eo,
  '27':
  - type: text
    content: 'Ary milaza amin’ny rano lalina hoe: Tankìna,'
  - type: text
    content: Fa hataoko tankina ny oninao,
  '28':
  - type: text
    content: 'Ary milaza an’i Kyrosy hoe: Izy no mpiandry ondriko,'
  - type: text
    content: Ka izay sitrako rehetra dia hotanterahiny;
  - type: text
    content: 'Ary izy hanao amin’i Jerosalema hoe: Hatsangana hianao,'
  - type: text
    content: 'Ary amin’ny tempoly hoe: Haorina indray ny fanorenanao.'
  '3':
  - type: text
    content: Fa handatsaka rano amin’izay mangetaheta Aho,
  - type: text
    content: Ary riaka ho amin’izay tany karankaina;
  - type: text
    content: Eny, handatsaka ny Fanahiko amin’ny taranakao Aho
  - type: text
    content: Ary ny fitahiako ho amin’ny terakao;
  '4':
  - type: text
    content: Dia haniry eny amin’ny ahitra
  - type: text
    content: Tahaka ny hazomalahelo eny anilan’ny rano mandeha ireny.
  '5':
  - type: text
    content: 'Ny anankiray hilaza hoe: An’i Jehovah aho:'
  - type: text
    content: Ary ny anankiray koa hankalaza ny anarana hoe Jakoba;
  - type: text
    content: Ary ny anankiray koa indray hanoratra amin’
  - type: note
    content: 'Na: eo amin’.'
  - type: text
    content: ' ny tànany hoe: An’i Jehovah,'
  - type: text
    content: Ary ny anarana hoe Isiraely dia hotononiny amim-panajana.
  - type: heading
    content: Ny amin’i Jehovah, Mpanjakan’ny Isiraely, sy ny amin’ny sampin’ny jentilisa.
  '6':
  - type: text
    content: IZAO no lazain’i Jehovah, Mpanjakan’ny Isiraely,
  - type: text
    content: 'Dia Jehovah, Tompon’ny maro, Mpanavotra azy:'
  - type: text
    content: 'Izaho no voalohany, ary Izaho no farany:'
  - type: text
    content: Ka tsy misy Andriamanitra afa-tsy Izaho.
  '7':
  - type: text
    content: Ary iza moa no mba mahantso tahaka Ahy
  - type: text
    content: (Aoka hanambara sy handahatra izany amiko izy)
  - type: text
    content: Hatrizay nampitoerako ny firenena fony fahagola?
  - type: text
    content: Ary ny zavatra ho avy sy ny mbola ho tonga,
  - type: text
    content: Dia aoka hambarany koa izany.
  '8':
  - type: text
    content: Aza matahotra na mangovitra hianareo;
  - type: text
    content: Tsy efa nampandre anareo hatramin’ny fahiny va Aho ka nanambara taminareo?
  - type: text
    content: Eny, hianareo no vavolombeloko;
  - type: text
    content: Misy Andriamanitra afa-tsy Izaho va?
  - type: text
    content: Tsia, tsy misy Vatolampy, tsy hitako izany.
  '9':
  - type: text
    content: Izay mamorona sarin-javatra voasokitra dia zava-poana avokoa;
  - type: text
    content: Ary ny zavatra tiany indrindra dia tsy mahasoa;
  - type: text
    content: Ny vavolombelon’ireny dia tsy mahita na mahalala,
  - type: text
    content: Mba hahamenatra azy.
