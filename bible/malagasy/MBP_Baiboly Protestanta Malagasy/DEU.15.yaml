document_id: DEU.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny taom-panafahana.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY isam-pito taona dia manaova fanafahana hianao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Omeo tokoa izy, ary aoka tsy halahelo ny fonao raha manome azy, satria izany zavatra izany no hitahian’i Jehovah Andriamanitrao, anao amin’ny asanao rehetra sy amin’izay rehetra ataon’ny tànanao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany tsy ilaozan’olo-malahelo, koa izany no andidiako anao hoe: Sokafy tsara amin’ny rahalahinao ny tànanao, dia amin’ny malahelo sy ny mahantra eo amin’ny taninao.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hamidy aminao ny namanao, na lehilahy Hebreo, na vehivavy Hebreo, ka efa nanompo anao enin-taona, dia hovotsoranao ho afaka izy amin’ny taona fahafito. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha hovotsoranao ho afaka izy, dia tsy havelanao handeha fotsiny; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hisy hampitondrainao azy avy amin’ny ondry aman-osinao ary avy amin’ny famoloanao sy ny famiazanao: araka izay efa nitahian’i Jehovah Andriamanitrao anao no hanomezanao azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tsarovy fa andevo tany amin’ny tany Egypta hianao, nefa i Jehovah Andriamanitrao efa nanavotra anao, koa izany no andidiako anao izao zavatra izao anio.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa raha hoy izy aminao: Tsy hiala aminao aho, satria tsy foiny hianao sy ny ankohonanao, ka finaritra aminao izy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia halainao ny haolo ka hotevehinao amin’ny varavarana ny sofiny, dia ho mpanomponao mandrakizay izy. Ary toy izany koa no hataonao amin’ny ankizivavinao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza ataonao ho sarotra ny hamotsotra azy ho afaka, fa indroa toraka ny karaman’ny mpikarama no azonao tamin’ny nanompoany anao enin-taona; dia hitahy anao Jehovah Andriamanitrao amin’izay rehetra ataonao.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny ho fanao amin’ny voalohan-teraky ny biby fiompy.
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'NY lahy rehetra amin’ny voalohan-teraky ny ombinao sy ny ondry aman-osinao dia hohamasininao ho an’i Jehovah Andriamanitrao; aza mampiasa ny voalohan-teraky ny ombinao, na manety ny voalohan-teraky ny ondry aman-osinao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no ho fomban’ny fanafahana: Ny tompon-trosa rehetra izay nampanàna vola tamin’ny namany dia hamoy izany; tsy hanery ny namany izay rahalahiny handoa izy, satria efa voantso ny fanafahan’i Jehovah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eo anatrehan’i Jehovah Andriamanitrao no hihinananao sy ny ankohonanao azy isan-taona isan-taona eo amin’ny fitoerana izay hofidin’i Jehovah.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy kilemany izy: na mandringa, na jamba, na izay kilema ratsy hafa akory, dia aza vonoinao hatao fanatitra ho an’i Jehovah Andriamanitrao ireny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao an-tanànanao ihany no hihinananao ireny; na ny olona maloto na ny madio dia samy mahazo mihinana azy, tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa ny rany no aza hanina, fa aidino amin’ny tany toy ny rano.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona hafa firenena ihany no azonao terena handoa; fa izay anao amin’ny rahalahinao kosa dia hafoinao; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa tsy dia hisy olo-malahelo eo aminao, fa hitahy anao tokoa Jehovah eo amin’ny tany izay omen’i Jehovah Andriamanitrao ho lovanao, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha mihaino tsara ny feon’i Jehovah Andriamanitrao hianao ka mitandrina hanaraka izao lalàna rehetra izao, izay andidiako anao anio. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa i Jehovah Andriamanitrao hitahy anao araka izay nolazainy taminao; ary hampisambotra ny firenena maro hianao, fa hianao kosa tsy hisambotra; ary hanapaka firenena maro hianao, fa izy kosa tsy mba hanapaka anao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy malahelo ny rahalahinao ao an-tanànanao anankiray amin’ny taninao izay omen’i Jehovah Andriamanitrao anao, dia aza manamafy ny fonao, na manakombona ny tànanao, amin’ny rahalahinao malahelo; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa sokafy tsara aminy ny tànanao, ka ampisambory izay ilainy, araka izay mahory azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitandrema fandrao hisy hevi-dratsy ao am-ponao manao hoe: Antomotra ny taona fahafito, dia ny taom-panafahana; ary ho ratsy fijery ny rahalahinao malahelo hianao, ka tsy hanome azy akory hianao; ary hitaraina amin’i Jehovah hiampanga anao izy, ka dia ho fahotanao izany. '
