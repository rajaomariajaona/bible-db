document_id: 2CO.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa raha manana ireo teny fikasana ireo isika, ry malala, dia aoka isika hanadio ny tenantsika ho afaka amin’ny fahalotoana rehetra, na amin’ny nofo na amin’ny fanahy, ka hahatanteraka ny fahamasinana amin’ny fahatahorana an’Andriamanitra.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny alahelo araka an’Andriamanitra miasa fibebahana ho famonjena tsy hanenenana; fa miasa fahafatesana kosa ny alahelon’izao tontolo izao.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa, indro, izany nampalahelovana araka an’Andriamanitra izany indrindra dia nahatonga fahazotoana manao ahoana tao aminareo! eny, fialan-tsiny manao ahoana! fahatezerana manao ahoana! fahatahorana manao ahoana! faniriana manao ahoana! zotom-po manao ahoana! famaliana ny ratsy natao manao ahoana! Tamin’izany rehetra izany dia nampiseho ny fahadiovanareo ny amin’izany raharaha izany hianareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa na dia nanoratra taminareo aza aho, dia tsy noho ny nanao izay tsy marina, na noho ny niaritra izay tsy marina, fa mba haseho aminareo eo anatrehan’Andriamanitra ny fahazotoanareo hanaiky anay.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho izany dia nampiononina izahay, ary tamin’ny nampiononana anay dia vao mainka nifaly izahay noho ny fifalian’i Titosy, fa hianareo rehetra efa namelombelona ny fanahiny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nisy nataoko rehareha taminy ny aminareo, dia tsy mahamenatra ahy izany; fa tahaka ny nilazanay marina taminareo ny zavatra rehetra, dia tonga marina koa ny reharehanay tamin’i Titosy ny aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary vao mainka miraikitra aminareo aza ny fony, raha mahatsiaro ny fanarahanareo rehetra izy, dia ny haben’ny fahatahorana sy ny fangovitana nandraisanareo azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary faly aho fa matoky anareo amin’ny zavatra rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ataovy omby anay ny fonareo; tsy nanao izay tsy marina tamin’olona izahay, tsy nanimba olona, tsy nanambaka olona. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy miteny izany ho fanamelohana aho; fa efa nilaza rahateo aho fa ao am-ponay hianareo, mba hiara-maty sy hiara-belona isika. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Be ny fahatokiako anareo, lehibe ny reharehako ny aminareo; feno fiononana aho sady be hafaliana indrindra amin’ny fahorianay rehetra.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia efa tonga tany Makedonia aza izahay, dia tsy nisy hiainan’ny nofonay, fa nampahorina tamin’ny zavatra rehetra: teo ivelany nisy ady, tao anatiny nisy tahotra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Andriamanitra, Izay mampionona ny mpandefitra, no efa nampionona anay tamin’ny nahatongavan’i Titosy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsy tamin’ny nahatongavany ihany, fa tamin’ny fampiononana izay nampiononanareo azy koa, raha nambarany taminay ny fanirianareo sy ny fitomanianareo sy ny fahazotoanareo hanaiky ahy; ka dia mainka nifaly aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia nampalahelo anareo tamin’ny epistily aza aho, dia tsy manenina '
    - type: usfm
      marker: it
      children:
      - type: text
        text: intsony,
    - type: text
      text: ' na dia efa nanenina ihany aza teo; fa fantatro fa efa nampalahelo anareo izany epistily izany, kanefa vetivety ihany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mifaly kosa aho ankehitriny, nefa tsy noho ny nampalahelovana anareo, fa noho ny nampalahelovana anareo mba hibebaka; fa nampalahelovina araka an’Andriamanitra hianareo, mba tsy hataonay matiantoka na amin’inona na amin’inona. '
