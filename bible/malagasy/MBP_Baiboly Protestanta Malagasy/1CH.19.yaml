document_id: 1CH.19
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahatonga ny niadian’i Davida tamin’ny Syriana sy ny Amonita, ary ny nahareseny azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa afaka izany, dia maty Nahasy, mpanjakan’ny taranak’i Amona, ary ny zanany no nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Davida: Hanisy soa an’i Hanona, zanak’i Nahasy, aho, fa soa no nataon’ny rainy tamiko. Ary Davida naniraka olona hitsapa alahelo azy noho ny amin-drainy. Ary tonga tany amin’i Hanona tany amin’ny tanin’ny Amonita ny mpanompon’i Davida hitsapa alahelo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy ireo mpanapaka ny taranak’i Amona tamin’i Hanona: Moa ataonao ho fanajana ny rainao no anirahan’i Davida hitsapa alahelo anao? Fa tsy hizaha sy handrava ary hisafo ny tany va no nalehan’ireo mpanompony ireo atỳ aminao? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia nosamborin’i Hanona ny mpanompon’i Davida ka noharatany, sady nofolonany hatreo amin’ny foto-peny ny akanjony, ka dia nalefany hody izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary dia nisy lasa nanambara tamin’i Davida izay natao tamin’ireo lehilahy ireo; ary izy naniraka hitsena azy, fa afa-baraka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: menatra.
    marker-yv: yv-n
  - type: text
    text: ' loatra izy, ka dia hoy ny mpanjaka: Mitoera any Jeriko aloha ambara-panirin’ny somotrareo, vao mody hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony hitan’ny taranak’i Amona fa efa nanao izay nampangidy hoditra azy tamin’i Davida izy, dia naniraka nampanatitra talenta volafotsy arivo hakaramany kalesy sy mpitaingin-tsoavaly any Mesopotamia sy Syriamaka ary Zoba Hanona sy ny taranak’i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nanakarama kalesy roa arivo amby telo alina mbamin’ny mpanjakan’i Maka sy ny olony izy; ary tonga ireo ka nitoby tandrifin’i Medeba. Ary nivory ny taranak’ Amona niala tany amin’ny tanànany avy ka tamy hiady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony ren’i Davida izany, dia naniraka an’i Joaba sy ny miaramila rehetra izy, dia ny lehilahy mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ny taranak’i Amona nivoaka ka nilahatra hiady teo anoloan’ny vavahadin’ny tanàna; fa ireo mpanjaka tonga ireo kosa dia nitokana teny an-tsaha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa hitan’i Joaba fa sady teo anoloany no teo ivohony ny fahavalo, dia nifidy olona tamin’ireo voafantina tamin’ny Isiraely rehetra izy, ka nalahany hiady tamin’ny Syriana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny olona sisa kosa nomeny ho entin’i Abisay rahalahiny, ka dia nilahatra hiady amin’ny taranak’i Amona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Joaba: Raha tsy tohako ny Syriana, dia vonjeo aho; fa raha tsy tohanao kosa ny taranak’i Amona, dia hovonjeko hianao; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mahereza, ary aoka hitombandahy isika ho an’ny firenentsika sy ireo tanànan’Andriamanitsika; ary aoka Jehovah hanao izay sitrapony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nandroso hiady tamin’ny Syriana Joaba sy ny olona nanaraka azy; ka dia nandositra niala teo anoloany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nony hitan’ny taranak’i Amona fa nandositra ny Syriana, dia mba nandositra niala teo anoloan’i Abisay, rahalahin’i Joaba, koa izy ka niditra tao an-tanàna. Ary dia tonga tany Jerosalema Joaba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nony hitan’ny Syriana fa resy teo anoloan’ny Isiraely izy, dia naniraka olona izy haka ny Syriana izay tany an-dafin’ny Ony;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
  - type: text
    text: ' ary Sobaka, komandin’ny miaramilan’i Hadarezera, no nitarika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nony nambara tamin’i Davida izany, dia namory ny Isiraely rehetra izy ka lasa nita an’i Jordana, dia tonga teo aminy ka nilahatra hiady aminy. Ary nony nilahatra hiady amin ny Syriana Davida, dia niady taminy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa vaky nandositra teo anoloan’ny Isiraely ny Syriana, ka nahafaty ny teo amin’ny kalesy fito arivo sy miaramila an-tongotra efatra alina tamin’ny Syriana Davida; ary matiny koa Sobaka, komandin’ny miaramila. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary nony hitan’ireo nanoa an’i Hadarezera fa resy teo anoloan’ny Isiraely izy, dia nanao fihavanana tamin’i Davida izy ka nanompo azy; ary tsy nety nanampy ny taranak’i Amona intsony ny Syriana.
