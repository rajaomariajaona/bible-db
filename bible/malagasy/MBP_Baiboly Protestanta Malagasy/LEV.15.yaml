document_id: LEV.15
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny lalàna ny amin’ny fitsihana sy ny fadimbolana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niteny tamin’i Mosesy sy Arona ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin’ny Zanak’Isiraely hoe: Ny lehilahy rehetra izay marary mitsika dia haloto noho ny fitsihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izao no ho fahalotoany, raha marary mitsika izy: na mandeha ny fitsihany, na tsy mandeha, dia samy fahalotoana ihany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maloto ny fandriana rehetra izay andrian’ny marary mitsika; ary maloto ny zavatra rehetra izay ipetrahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary izay rehetra mikasika ny fandriany, dia hanasa fitafiana sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izay mipetraka amin’ny zavatra izay efa nipetrahan’ny marary mitsika dia hanasa fitafiana sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izay mikasika ny tenan’ny marary mitsika dia hanasa fitafiana sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha misy olona madio voaroran’ny marary mitsika, dia hanasa fitafiana izy sy handro amin’ny rano ary haloto mandra-paharivan’ny andro– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary haloto ny lasely rehetra izay itaingenan’ny marary mitsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary izay rehetra mikasika izay zavatra teo ambaniny dia haloto mandra-paharivan’ny andro; ary izay mitondra izany zavatra izany dia hanasa fitafiana sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izay rehetra voakasiky ny marary mitsika, kanefa ilay marary tsy mbola nanasa ny tànany tamin’ny rano, dia hanasa fitafiana sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary hovakivakina ny vilany tany izay voakasiky ny marary mitsika; ary hosasana amin’ny rano kosa ny fanaka hazo rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha sitrana amin’ny fitsihany ny marary mitsika, dia hiandry hafitoana ny amin’ny fanadiovana azy izy; ary hanasa fitafiana sy handro amin’ny rano mandeha izy, dia hadio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary amin’ny andro fahavalo dia hitondra domohina roa na zana-boromailala roa izy ka hankeo anatrehan’i Jehovah, eo anoloan’ny varavaran’ny trano-lay fihaonana, dia hanolotra ireo ho amin’ny mpisorona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia haterin’ny mpisorona ireo, ny anankiray hatao fanatitra noho ny ota, ary ny anankiray kosa hatao fanatitra odorana; dia hanao fanavotana ho azy eo anatrehan’i Jehovah ny mpisorona noho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hahafahany amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny fitsihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha miala amin’ny lehilahy ny azy, dia hanasa ny tenany rehetra amin’ny rano izy ary haloto mandra-paharivan’ny andro; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary hosasana amin’ny rano ny fitafiany rehetra sy ny hoditra rehetra, izay nilatsahan’ny azy; dia haloto mandra-paharivan’ny andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny vehivavy izay andrian-dehilahy koa, dia samy handro amin’ny rano izy roroa ary haloto mandra-paharivan’ny andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha misy vehivavy mararin’ny fadimbolany, dia haloto hafitoana izy; ary izay rehetra mikasika azy dia haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny zavatra rehetra izay andriany amin’ny andro fahalotoany dia haloto koa; ary ny zavatra rehetra izay ipetrahany dia haloto koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izay rehetra mikasika ny fandriany dia hanasa fitafiana sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izay rehetra mikasika ny zavatra izay efa nipetrahany dia hanasa fitafiana sy handro amin’ny rano ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary raha ao amin’ny fandriana izany, na ao amin’ny zavatra izay efa nipetrahany, raha nikasika izany izy, dia haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary raha misy lehilahy mandry amin-dravehivavy, ary mankeo aminy ny fadimbolany, dia haloto hafitoana izy, ary izay rehetra andriany dia haloto koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha misy vehivavy marary mitsi-dra ela, na dia tsy amin’ny andro fahalotoany amin’ny fadimbolany aza, na raha misy mararin’ny fadimbolana ka mandeha mihoatra noho ny fihaviny, dia haloto izy amin’ny andron’ny faharariany rehetra, tahaka ny amin’ny andro fahalotoany ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny fandriana rehetra andriany amin’ny andron’ny fahalotoany rehetra dia hataony tahaka ny fandriana nandriany tamin’ny andro fahalotoany; ary izay rehetra ipetrahany dia haloto koa tahaka ny fahalotoany amin’ny fadimbolany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary izay rehetra mikasika izany zavatra izany dia haloto; ary hanasa fitafiana sy handro amin’ny rano izy ary haloto mandra-paharivan’ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa raha sitrana amin’ny faharariany ravehivavy, dia hiandry hafitoana izy, ary rehefa afaka izany, dia hadio izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary amin’ny andro fahavalo dia haka domohina roa na zana-boromailala roa ho azy izy ka hitondra ireo ho eo amin’ny mpisorona, eo anoloan’ny varavaran’ny trano-lay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia haterin’ny mpisorona ny anankiray hatao fanatitra noho ny ota ary ny anankiray hatao fanatitra odorana; dia hanao fanavotana ho an-dravehivavy eo anatrehan’i Jehovah ny mpisorona noho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hahafahany amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny faharariany izay nahaloto azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia hampisarahinareo amin’ny fahalotoany ny Zanak’Isiraely, tsy handotoany ny tabernakeliko izay eo aminy, ka tsy hahafaty azy ny fahalotoany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izany no lalàna ny amin’ny marary mitsika, sy ny amin’izay ialan’ny azy, ka mahaloto azy izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ary ny amin’ny mararin’ny fadimbolany, ary ny amin’ny marary mitsika, na lehilahy na vehivavy, ary ny amin’izay mandry amin’ny vehivavy maloto.
