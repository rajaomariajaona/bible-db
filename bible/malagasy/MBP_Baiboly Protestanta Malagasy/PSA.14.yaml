document_id: PSA.14
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny faharatsian’ny olona, sy ny fanirian’ny sasany famonjena.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'NY adala manao anakampo hoe: Tsy misy Andriamanitra.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao izay ratsy sy vetaveta izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy manao ny tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eny an-danitra Jehovah miondrika mijery ny zanak’olombelona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hizaha na misy hendry mitady an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Samy efa nivily izy rehetra ka tonga vetaveta avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy manao ny tsara, na dia iray akory aza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mahalala va ny mpanao ratsy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay mihinana ny oloko '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toy
  - type: text
    text: ' ny fihinan-kanina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jehovah tsy antsoiny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indreo, matahotra dia matahotra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria Andriamanitra no eo amin’ny taranaka marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na dia foananareo aza ny fisainan’ny ory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah kosa no arony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Enga anie ka hivoaka avy ao Ziona ny ny famonjena ny Isiraely!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha ampodin’i Jehovah avy amin’ny fahababoana ny olony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho faly Jakoba, ary ho ravoravo Isiraely. .
