document_id: PSA.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharatsian’ny olona, sy ny fanirian’ny sasany famonjena.
  - type: text
    content: Ho an’ny mpiventy hira. Nataon’i Davida.
  - type: text
    content: 'NY adala manao anakampo hoe: Tsy misy Andriamanitra.'
  - type: text
    content: Manao izay ratsy sy vetaveta izy;
  - type: text
    content: Tsy misy manao ny tsara.
  '2':
  - type: text
    content: Eny an-danitra Jehovah miondrika mijery ny zanak’olombelona,
  - type: text
    content: Mba hizaha na misy hendry mitady an’Andriamanitra.
  '3':
  - type: text
    content: Samy efa nivily izy rehetra ka tonga vetaveta avokoa;
  - type: text
    content: Tsy misy manao ny tsara, na dia iray akory aza.
  '4':
  - type: text
    content: Tsy mahalala va ny mpanao ratsy rehetra,
  - type: text
    content: 'Izay mihinana ny oloko '
  - type: text
    content: toy
  - type: text
    content: ' ny fihinan-kanina,'
  - type: text
    content: Ary Jehovah tsy antsoiny?
  '5':
  - type: text
    content: Indreo, matahotra dia matahotra izy,
  - type: text
    content: Satria Andriamanitra no eo amin’ny taranaka marina.
  '6':
  - type: text
    content: Na dia foananareo aza ny fisainan’ny ory,
  - type: text
    content: Jehovah kosa no arony.
  '7':
  - type: text
    content: Enga anie ka hivoaka avy ao Ziona ny ny famonjena ny Isiraely!
  - type: text
    content: Raha ampodin’i Jehovah avy amin’ny fahababoana ny olony,
  - type: text
    content: Dia ho faly Jakoba, ary ho ravoravo Isiraely. .
