document_id: HEB.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitahana an’i Kristy sy Melkizedeka.
  - type: text
    content: 'FA io Melkizedeka io, izay mpanjakan’i Salema sy mpisoron’Andriamanitra Avo Indrindra, ilay nitsena an’i Abrahama, rehefa niverina avy nandresy ny mpanjaka maro izy ka nitso-drano azy, '
  '10':
  - type: text
    content: satria mbola tao an-kibon-drainy ihany izy tamin’ny nitsenan’i Melkizedeka an’i Abrahama.
  '11':
  - type: text
    content: 'Koa raha nisy fanatanterahana tamin’ny fisoronan’i Levy (fa tamin’izany no nahazoan’ny olona ny lalàna), ahoana no mbola ilana mpisorona hafa hiseho araka ny fanaon’i Melkizedeka ihany, izay tsy hotononina ho araka ny fanaon’i Arona? '
  '12':
  - type: text
    content: 'Fa raha ovana ny fisoronana, dia tsy maintsy ovana koa ny lalàna. '
  '13':
  - type: text
    content: 'Fa Izay nolazaina amin’izany teny izany dia avy tamin’ny firenena hafa, izay tsy nisy olona manompo eo amin’ny alitara. '
  '14':
  - type: text
    content: 'Fa hita marimarina fa avy tamin’i Joda no nisehoan’ny Tompontsika, ary izany firenena izany dia tsy nisy nolazain’i Mosesy akory ny amin’izay ho mpisorona. '
  '15':
  - type: text
    content: 'Ary hita marimarina kokoa indray izany, raha misy Mpisorona hafa miseho ka tahaka an’i Melkizedeka, '
  '16':
  - type: text
    content: 'izay natao tsy araka ny lalàn’izay didy momba ny nofo, fa araka ny herin’ny fiainana tsy manam-pahataperana. '
  '17':
  - type: text
    content: 'Fa Izy dia nambara hoe:'
  - type: text
    content: ',,Hianao no Mpisorona mandrakizay'
  - type: text
    content: Araka ny fanaon’i Melkizedeka’’ (Sal. 110.4).
  '18':
  - type: text
    content: Fa misy fahafoanana ny didy nialoha noho ny halemeny sy ny tsi-fanasoavany (
  '19':
  - type: text
    content: fa ny lalàna dia tsy nahatanteraka na inona na inona), ary misy kosa fampidirana ny fanantenana tsaratsara kokoa, izay anatonantsika an’Andriamanitra.
  '2':
  - type: text
    content: 'sady nomen’i Abrahama ny ampahafolon’ny zavatra rehetra aza (voalohany, raha adika ny anarany, dia Mpanjakan’ny fahamarinana, dia vao Mpanjakan’i Salema koa, izany hoe: Mpanjakan’ny fiadanana; '
  '20':
  - type: text
    content: 'Ary tahaka an’i Melkizedeka tsy '
  - type: text
    content: natao mpisorona
  - type: text
    content: ' raha tsy tamin’ny fianianana '
  '21':
  - type: text
    content: '–fa ireny kosa dia natao mpisorona tsy tamin’ny fianianana, fa Ity tamin’ny fianianana nataon’Ilay nilaza taminy hoe:'
  - type: text
    content: ',,Efa nianiana Jehovah ka tsy hanenina:'
  - type: text
    content: Hianao no Mpisorona mandrakizay’’ (Sal. 110.4)–
  '22':
  - type: text
    content: dia tahaka izany koa no nanaovana an’i Jesosy ho Mpiantoka ny fanekena tsara lavitra.
  '23':
  - type: text
    content: 'Fa natao maro ireny mpisorona ireny, satria tsy navelan’ny fahafatesana haharitra izy; '
  '24':
  - type: text
    content: 'fa Izy kosa dia manana fisoronana tsy dimbasana, satria maharitra mandrakizay Izy; '
  '25':
  - type: text
    content: koa amin’izany dia mahavonjy tokoa
  - type: note
    content: 'Na: hatramin’ny farany.'
  - type: text
    content: ' izay manatona an’Andriamanitra amin’ny alalany Izy, satria velona mandrakizay hanao fifonana ho azy.'
  '26':
  - type: text
    content: 'Fa Mpisoronabe tahaka izao no miendrika ho antsika: dia Izay masina, tsy misy tsiny, tsy misy loto, voasaraka amin’ny mpanota ka natao avo noho ny lanitra, '
  '27':
  - type: text
    content: 'Izay tsy mila hanatitra fanatitra isan-andro tahaka ny ataon’ireny mpisoronabe ireny, voalohany noho ny otan’ny tenany, dia vao noho ny an’ny olona kosa; fa izany dia nataony indray mandeha ihany, raha nanatitra ny tenany Izy. '
  '28':
  - type: text
    content: Fa ny lalàna dia manendry olona izay manana fahalemena ho mpisoronabe; fa ny tenin’ny fianianana kosa, izay tato aorian’ny lalàna, dia manendry ny Zanaka, Izay notanterahina ho mandrakizay.
  '3':
  - type: text
    content: tsy manan-dray, tsy manan-dreny, tsy manana tantaram-pirazanana, tsy manana voalohan’andro na faran’ny fiainana, fa natao tahaka ny Zanak’Andriamanitra),–izy dia mitoetra ho mpisorona mandrakariva.
  '4':
  - type: text
    content: 'Ary hevero ny halehiben’io lehilahy io, izay nomen’i Abrahama patriarka ny ampahafolon’izay tsara tamin’ny zavatra nobaboina. '
  '5':
  - type: text
    content: 'Ary izay avy tamin’ny taranak’i Levy ka mandray ny fisoronana no mahazo teny haka ny fahafolon-karena amin’ny olona araka ny lalàna, dia amin’ny rahalahiny izany, na dia teraky ny kibon’i Abrahama aza ireny; '
  '6':
  - type: text
    content: 'nefa izay tsy isan’ny firazanan’ireo akory no nandray ny fahafolon-karena tamin’i Abrahama sy nitso-drano ilay nanana ny teny fikasana. '
  '7':
  - type: text
    content: 'Ary tsy azo lavina akory anefa fa ny kely no mahazo tso-drano amin’ny lehibe noho ny tenany. '
  '8':
  - type: text
    content: 'Ary etỳ dia izay olona mety maty no mandray ny fahafolon-karena, fa any kosa dia izay nambara fa velona. '
  '9':
  - type: text
    content: 'Ary toa azo lazaina fa Levy aza, izay mandray ny fahafolon-karena, dia mba nandoa ny fahafolon-karena koa tao anatin’i Abrahama, '
