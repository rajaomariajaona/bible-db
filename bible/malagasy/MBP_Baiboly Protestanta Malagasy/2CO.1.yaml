document_id: 2CO.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana sy fisaorana nataon’i Paoly noho ny nampiononan’Andriamanitra azy. Ny amin’ny nahasampona an’i Paoly tsy hankany Makedonia, sy hafatra ny amin’ny handraisana ilay efa nesorina, ary fisaoran’i Paoly an’Andriamanitra noho ny nitahiany ny tori-teniny.
  - type: text
    content: 'PAOLY, Apostolin’i Kristy Jesosy noho ny sitrapon’Andriamanitra, ary Timoty rahalahy, mamangy ny fiangonan’Andriamanitra izay any Korinto mbamin’ny olona masina rehetra eran’i Akaia: '
  '10':
  - type: text
    content: 'Ary Izy no nahafaka anay tamin’izao fahafatesana lehibe izao, ary mbola hanafaka ihany; eny, Izy no antenainay fa mbola hanafaka anay koa, '
  '11':
  - type: text
    content: satria hianareo koa miara-miasa ho anay amin’ny fivavahanareo mba hisaoran’ny maro ny aminay noho ny fahasoavana azonay tamin’ny nataon’ny maro.
  '12':
  - type: text
    content: 'Fa izao no ataonay ho voninahitray: ny fieritreretanay no vavolombelona fa tamin’ny fahamasinana sy ny fahadiovam-po avy amin’Andriamanitra, tsy tamin’ny fahendren’ny nofo, fa tamin’ny fahasoavan’Andriamanitra, no nitondranay tena teo amin’izao tontolo izao, mainka fa teo aminareo. '
  '13':
  - type: text
    content: 'Fa tsy manoratra teny hafa aminareo izahay, afa-tsy izay vakinareo na izay fantatrareo; ary manantena aho fa mbola ho fantatrareo ihany hatramin’ny farany aza, '
  '14':
  - type: text
    content: toy ny efa fantapantatrareo ihany fa voninahitrareo izahay, dia tahaka anareo kosa no voninahitray amin’ny andron’i Jesosy Tompontsika.
  '15':
  - type: text
    content: 'Ary tamin’izao fahatokiana izao dia nikasa hankatỳ aminareo aloha aho (mba hahazoanareo soa fanindroany), '
  '16':
  - type: text
    content: ary hankany Makedonia aho, raha avy atỳ aminareo, ary dia vao hiverina ho atỳ aminareo indray raha avy any Makedonia, ary mba haterinareo ho any Jodia.
  '17':
  - type: text
    content: 'Koa raha nikasa izany aho, moa nanao kitoatoa va aho? Ary izay zavatra kasaiko, moa kasaiko araka ny nofo va, mba hanaovako ’eny eny’ foana, sy ’tsia tsia’ foana? '
  '18':
  - type: text
    content: 'Fa raha mahatoky koa Andriamanitra, ny teninay taminareo dia tsy ’eny’ sy ’tsia’; '
  '19':
  - type: text
    content: 'fa ny Zanak’Andriamanitra, dia Jesosy Kristy, Izay notorinay teo aminareo, dia izaho sy Silasy ary Timoty, dia tsy ’eny’ sy ’tsia’, fa ao aminy dia ’eny’ ihany. '
  '2':
  - type: text
    content: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin’Andriamanitra Raintsika sy Jesosy Kristy Tompo.
  '20':
  - type: text
    content: Fa na firy na firy ny teny fikasan’Andriamanitra, dia ao aminy ny ’eny’, ary amin’ny alalany koa ny ’Amena’, ho voninahitr’Andriamanitra amin’ny ataonay.
  '21':
  - type: text
    content: 'Fa Izay mampitoetra anay mbaminareo ao amin’i Kristy sady nanosotra antsika dia Andriamanitra, '
  '22':
  - type: text
    content: Izay nanisy tombo-kase antsika koa ka nanome ny Fanahy ho santatra ato am-pontsika.
  '23':
  - type: text
    content: 'Ary izaho miantso an’Andriamanitra ho vavolombelona ny amin’ny fanahiko, fa ny fialako nenina aminareo ihany no tsy mbola nankanesako tatỳ Korinto. '
  '24':
  - type: text
    content: Kanefa tsy mihambo ho tompon’ny finoanareo izahay, fa mpiara-miasa hampandroso ny fifalianareo, satria finoana no itoeranareo.
  '3':
  - type: text
    content: 'Isaorana anie Andriamanitra, Rain’i Jesosy Kristy Tompontsika, Rain’ny famindrampo sady Andriamanitry ny fampiononana rehetra, '
  '4':
  - type: text
    content: 'Izay mampionona anay amin’ny fahorianay rehetra mba hahaizanay mampionona izay rehetra mitondra fahoriana kosa, amin’ny fampiononana izay ampiononan’Andriamanitra anay. '
  '5':
  - type: text
    content: 'Fa araka ny haben’ny fijalian’i Kristy mihatra aminay no haben’ny fampiononana anay kosa amin’ny alalan’i Kristy. '
  '6':
  - type: text
    content: Ary raha ampahorina izahay, dia ho fampiononana sy famonjena anareo izany; ary raha ampiononina izahay, dia ho fampiononana anareo izany, ka miasa amin’ny fiaretan
  - type: text
    content: areo
  - type: text
    content: ' fahoriana mitovy indrindra amin’izay entinay. '
  '7':
  - type: text
    content: Ary miorina tsara ny fanantenanay anareo, satria fantatray fa tahaka ny iombonanareo ny fahoriana no iombonanareo ny fampiononana koa.
  '8':
  - type: text
    content: 'Fa tsy tianay tsy ho fantatrareo, ry rahalahy, ny amin’ny fahoriana izay nanjo anay tany Asia, fa novesarana indrindra mihoatra noho ny zakanay izahay, ka dia efa nafoinay na dia ny ainay aza; '
  '9':
  - type: text
    content: 'eny, tsy nanampo izay ho velona intsony izahay, mba tsy hitokianay amin’ny tenanay, fa amin’Andriamanitra, Izay manangana ny maty ihany. '
