document_id: JOB.28,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fa misy tany fihadiana volafotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary misy tany fahazoana volamena, izay diovina.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny vatolampy tatahany hatao làlan-drano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay zava-tsoa rehetra dia hitan’ny masony avokoa.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tampenany ny làlan-drano mba tsy hisy mitete.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay zava-miafina dia avoakany ho amin’ny mazava.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa aiza kosa no hahitana ny fahendrena?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aiza no fitoeran’ny fahalalana?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tsy misy zanak’olombelona mahalala ny vidiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hita eo amin’ny tanin’ny velona izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hoy ny lalina: Tsy ato anatiko izy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary, Tsy ato amiko izy, hoy ny ranomasina.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny volamena tsara tsy mahatakalo azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny volafotsy tsy azo lanjaina ho vidiny;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny volamena avy any Ofira tsy ampy ho tombany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny beryla saro-bidy sy ny safira aza.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny volamena sy ny fitaratra tsy azo ampitahaina aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy azo takalozana firavaka tena volamena izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tsy tokony hotsaroana akory ny voahangy sy ny vato krystaly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fahazoana fahendrena dia mihoatra noho ny voahangy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny topaza avy any Etiopia dia tsy azo ampitahaina aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mahatakalo azy ny tena volamena tsara.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny vy dia alaina avy amin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny varahina arendrika avy amin’ny vato.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia avy aiza ary ny fahendrena?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aiza no fitoeran’ny fahalalana?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Miafina amin’ny mason’ny velona rehetra izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary takona amin’ny voro-manidina.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hoy Abadona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abadona = Fandringanana.
      marker-yv: yv-n
    - type: text
      text: ' sy Ifahafatesana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sofinay ihany no nandrenesanay ny filazana azy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Andriamanitra ihany no mahalala ny làlana ho any aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Izy no mahafantatra ny itoerany;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Fa Izy no mitsinjo hatramin’ny faran’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mahatazana manerana izao ambanin’ny lanitra rehetra izao,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ka manendry ny lanjan’ny rivotra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamatra ny rano amin’ny famarana.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Raha nanao lalàna ho an’ny ranonorana Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy làlana halehan’ny helatry ny kotrokorana,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dia nahita ka nanambara azy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nanorina azy Izy sady namantatra azy;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy Izy tamin’ny olona: Indro, ny fahatahorana ny Tompo no fahendrena,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fialana amin’ny ratsy no fahalalana.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny mpihady vola
    - type: text
      text: ' mampisava ny maizina'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mizaha hatramin’ny faran’ny zavatra rehetra ao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny vaton’ny aizim-pito sy ny aloky ny fahafatesana;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mihady lavaka mihalavitra amin’izay itoeran’olona izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy ampoizin’ny tongotra akory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihantona sy mitsingevaheva any ambany lavitra ny olona izy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny tany no ihavian’ny hanina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ao ambaniny dia avadika tahaka ny afo.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fitoeran’ny safira ny vatony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary misy akoram-bolamena ao aminy–
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Làlana tsy fantatry ny vorona mpihaza
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hitan’ny mason’ny voromahery,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Sady tsy nodiavin’ny zanaky ny bibi-dia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy mba nalehan’ny liona masiaka.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Maninjitra ny tànany amin’ny vatokaranana ireo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamadika ny tendrombohitra hatramin’ny fotony;
