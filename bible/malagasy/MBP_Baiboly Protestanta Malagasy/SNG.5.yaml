document_id: SNG.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: Efa tonga eto an-tsahako aho, ry havako
  - type: note
    content: Heb. anabaviko.
  - type: text
    content: ' ampakariko;'
  - type: text
    content: Mioty ny miorako mbamin’ny zava-manitro aho;
  - type: text
    content: Efa homana ny toho-tanteliko mbamin’ny tanteliko aho,
  - type: text
    content: Ary efa misotro ny divaiko mbamin’ny rononoko;
  - type: text
    content: Homàna hianareo, ry sakaizako,
  - type: text
    content: Misotroa, eny, mivokisa divay, ry malala.
  - type: heading
    content: Teny nataon’ny ampakarina sy ny mpanjaka ary ny zanakavavin’i Jerosalema.
  '10':
  - type: text
    content: Ny malalako dia sady fotsy mangatsakatsaka no mena,
  - type: text
    content: Notsongaina tamin’ny alinalina.
  '11':
  - type: text
    content: Ny lohany dia toy ny tena volamena tsara;
  - type: text
    content: Ny volony dia milantolanto sady mangilohilo toy ny goaika.
  '12':
  - type: text
    content: Ny masony dia tahaka ny voromailala eo anilan’ny sakeli-drano,
  - type: text
    content: Mandro amin’ny ronono sady tahaka ny vato soa alatsaka an-tranontranony izy.
  '13':
  - type: text
    content: Ny takolany dia tahaka ny tanim-boninkazo misy zava-manitra eo an-tsaha,
  - type: text
    content: Dia tahaka ny tany navosaina
  - type: note
    content: Heb. tilikambo.
  - type: text
    content: ' misy voninkazo manitra.'
  - type: text
    content: Ny molony dia tahaka ny lilia
  - type: text
    content: Sady mitete ranon’ny miora.
  '14':
  - type: text
    content: Ny tànany dia tahaka ny anja-bolamena voaisy krysolita;
  - type: text
    content: Ny tenany dia tahaka ny ivory voarafitra tsara sady misarona safira;
  '15':
  - type: text
    content: Ny ranjony dia tahaka ny andry vatosanga
  - type: note
    content: marmora fotsy.
  - type: text
    content: Miorina amin’ny faladia tena volamena;
  - type: text
    content: Ny tarehiny dia tahaka an’i Libanona,
  - type: text
    content: Tsara toy ny sedera.
  '16':
  - type: text
    content: Mamy dia mamy ny vavany,
  - type: note
    content: Heb. lanilaniny.
  - type: text
    content: ' eny, mahate-ho-tia avokoa izy.'
  - type: text
    content: Toy izany ny malalako, ary toy izany ny sakaizako,
  - type: text
    content: Ry zanakavavin’i Jerosalema!
  '2':
  - type: text
    content: NATORY aho, nefa nahatsiaro ihany ny foko;
  - type: text
    content: 'Injay! ny feon’ny malalako, izay mandòndòna ka manao hoe:'
  - type: text
    content: Vohay aho, ry havako
  - type: note
    content: Heb. anabaviko.
  - type: text
    content: ' ampakariko,'
  - type: text
    content: Ry voromailalako, ilay ahy tsy misy kilema;
  - type: text
    content: Fa vonton’ando ny lohako,
  - type: text
    content: Ny voloko milantolanto dia kotsan’ny andon’ny alina.
  '3':
  - type: text
    content: ' '
  - type: text
    content: 'Fa hoy izaho:'
  - type: text
    content: ' Efa niala akanjo aho,'
  - type: text
    content: Ka hataoko ahoana indray no fiakanjo?
  - type: text
    content: Efa nioza tongotra aho,
  - type: text
    content: Ka hataoko ahoana no fandoto azy?
  '4':
  - type: text
    content: Nampiditra ny tànany teo amin’ny loaka ilay malalako,
  - type: text
    content: Dia nangorakoraka azy ny foko.
  '5':
  - type: text
    content: Nitsangana hamoha varavarana ny malalako ihany aho,
  - type: text
    content: Ary nitete miora ny tànako,
  - type: text
    content: Eny, ny rantsan-tànako nitete ranon’ny miora
  - type: text
    content: Teo amin’ny famohana ny hidin-trano.
  '6':
  - type: text
    content: Namoha varavarana ny malalako aho,
  - type: text
    content: Kanjo efa nihodina izy ka lasa;
  - type: text
    content: Very hevitra aho tamin’ny nitenenany;
  - type: text
    content: Nitady azy aho, fa tsy nahita;
  - type: text
    content: Niantso azy aho, fa tsy novaliany.
  '7':
  - type: text
    content: Nahita ahy ny antily izay mandehandeha eny an-tanàna,
  - type: text
    content: Dia nikapoka ka nandratra ahy;
  - type: text
    content: Ny mpiambina ny mànda nanala ny lamba fisaronako.
  '8':
  - type: text
    content: 'Mampianiana anareo aho, ry zanakavavin’i Jerosalema:'
  - type: text
    content: Raha mba hitanareo re ny malalako,
  - type: text
    content: Dia ahoana no holazainareo aminy?
  - type: text
    content: Lazao fa
  - type: text
    content: ' mararim-pitia aho.'
  '9':
  - type: text
    content: Inona ny malalanao mihoatra noho ny malala sasany,
  - type: text
    content: Ry tsara tarehy amin’ny vehivavy?
  - type: text
    content: Inona ny malalanao mihoatra noho ny malala sasany,
  - type: text
    content: No dia mampianiana anay toy izao hianao?
