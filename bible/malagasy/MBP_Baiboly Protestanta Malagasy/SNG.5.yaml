document_id: SNG.5
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa tonga eto an-tsahako aho, ry havako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anabaviko.
    marker-yv: yv-n
  - type: text
    text: ' ampakariko;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mioty ny miorako mbamin’ny zava-manitro aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa homana ny toho-tanteliko mbamin’ny tanteliko aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary efa misotro ny divaiko mbamin’ny rononoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Homàna hianareo, ry sakaizako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misotroa, eny, mivokisa divay, ry malala.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Teny nataon’ny ampakarina sy ny mpanjaka ary ny zanakavavin’i Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: NATORY aho, nefa nahatsiaro ihany ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Injay! ny feon’ny malalako, izay mandòndòna ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vohay aho, ry havako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: anabaviko.
    marker-yv: yv-n
  - type: text
    text: ' ampakariko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry voromailalako, ilay ahy tsy misy kilema;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa vonton’ando ny lohako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny voloko milantolanto dia kotsan’ny andon’ny alina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Fa hoy izaho:'
  - type: text
    text: ' Efa niala akanjo aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hataoko ahoana indray no fiakanjo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nioza tongotra aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hataoko ahoana no fandoto azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nampiditra ny tànany teo amin’ny loaka ilay malalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nangorakoraka azy ny foko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nitsangana hamoha varavarana ny malalako ihany aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nitete miora ny tànako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny rantsan-tànako nitete ranon’ny miora
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teo amin’ny famohana ny hidin-trano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Namoha varavarana ny malalako aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo efa nihodina izy ka lasa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Very hevitra aho tamin’ny nitenenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nitady azy aho, fa tsy nahita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niantso azy aho, fa tsy novaliany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahita ahy ny antily izay mandehandeha eny an-tanàna,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nikapoka ka nandratra ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpiambina ny mànda nanala ny lamba fisaronako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mampianiana anareo aho, ry zanakavavin’i Jerosalema:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mba hitanareo re ny malalako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ahoana no holazainareo aminy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Lazao fa
  - type: text
    text: ' mararim-pitia aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona ny malalanao mihoatra noho ny malala sasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry tsara tarehy amin’ny vehivavy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona ny malalanao mihoatra noho ny malala sasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No dia mampianiana anay toy izao hianao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny malalako dia sady fotsy mangatsakatsaka no mena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Notsongaina tamin’ny alinalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny lohany dia toy ny tena volamena tsara;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny volony dia milantolanto sady mangilohilo toy ny goaika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny masony dia tahaka ny voromailala eo anilan’ny sakeli-drano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandro amin’ny ronono sady tahaka ny vato soa alatsaka an-tranontranony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny takolany dia tahaka ny tanim-boninkazo misy zava-manitra eo an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ny tany navosaina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tilikambo.
    marker-yv: yv-n
  - type: text
    text: ' misy voninkazo manitra.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny molony dia tahaka ny lilia
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mitete ranon’ny miora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny tànany dia tahaka ny anja-bolamena voaisy krysolita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tenany dia tahaka ny ivory voarafitra tsara sady misarona safira;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny ranjony dia tahaka ny andry vatosanga
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: marmora fotsy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miorina amin’ny faladia tena volamena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tarehiny dia tahaka an’i Libanona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsara toy ny sedera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mamy dia mamy ny vavany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lanilaniny.
    marker-yv: yv-n
  - type: text
    text: ' eny, mahate-ho-tia avokoa izy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izany ny malalako, ary toy izany ny sakaizako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry zanakavavin’i Jerosalema!
