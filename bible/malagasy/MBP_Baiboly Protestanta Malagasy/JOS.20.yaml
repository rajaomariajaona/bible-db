document_id: JOS.20,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nifidianana ny tanàna fandosirana ho an’izay nahafaty olona tsy nahy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY Jehovah niteny tamin’i Josoa ka nanao hoe: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Lazao amin’ny Zanak’Isiraely hoe: Fidio ny tanàna fandosirana izay nasaiko nolazain’i Mosesy taminareo, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: handosiran’izay nahafaty olona tsy nahy; dia ho fandosirana ho anareo izany mba tsy ho azon’ny mpamaly ra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary raha misy mandositra ho ao amin’ny anankiray amin’ireo tanàna ireo ka mijanona eo anoloan’ny vavahady ary mandahatra ny teniny eo anatrehan’ny loholona amin’izany tanàna izany, dia hampidiriny ho ao an-tanàna izy ka homeny toerana, mba hitoetra ao aminy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary raha manenjika azy ny mpamaly ra, dia tsy hanolotra ilay nahafaty olona ho eo an-tanany izy, satria nahafaty tsy nahy ny namany, fa tsy dia nankahala azy teo aloha. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dia hitoetra ao amin’izany tanàna izany izy mandra-pisehony eo anatrehan’ny fiangonana hotsaraina, sy mandra-pahafatin’izay mpisoronabe amin’izany andro izany; dia hiverina ilay nahafaty olona ka hody any an-tanànany sy any an-tranony, dia any amin’ny tanàna izay nialany fony izy nandositra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia nanokana an’i Kadesy any Galilia any amin’ny tany havoan’i Naftaly izy sy Sekema any amin’ny tany havoan’i Efraima ary Kiriat-arba (Hebrona izany) any amin’ny tany havoan’i Joda.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary dia nifidy an’i Bezera any an-efitra amin’ny tany lemaka izay an’ny firenen’i Robena izy, ary Ramota izay any Gileada, an’ny firenen’i Gada, ary Golana any Basana, izay an’ny firenen’i Manase, any an-dafy atsinanan’i Jordana, tandrifin’i Jeriko.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ireo no tanàna voafidy ho an’ny Zanak’Isiraely rehetra sy ny vahiny eo aminy handosiran’izay rehetra nahafaty olona tsy nahy, mba tsy ho fatin’ny tanan’ny mpamaly ra izy mandra-pisehony eo anatrehan’ny fiangonana.
