document_id: ISA.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanendrena an’Isaia ho mpaminany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TAMIN’ny taona nahafatesan’i Ozia mpanjaka no nahitako ny Tompo nipetraka teo ambonin’ny seza fiandrianana avo sady manerinerina, ary ny ebaneban’akanjony nahafeno ny tempoly. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nisy serafima nitsangana teo amboniny, samy nanana elatra enina avy; ny roa nanaronany ny tavany, ny roa nanaronany ny tongony, ary ny roa nanidinany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nanandratra ny feony izy ka nifamaly hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masina, masina, masina Jehovah, Tompon’ny maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henika ny voninahiny ny tany rehetra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voninahiny avokoa ny eran’ny tany.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia nihorohoro ny fanambanin’ny tokonana noho ny feon’ireo nanandratra ny feony; ary feno setroka ny trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izaho: Lozako! maty aho! fa lehilahy maloto molotra, sady ato amin’ny firenena maloto molotra no itoerako, fa ny Mpanjaka, dia Jehovah, Tompon’ny maro, no efa hitan’ny masoko. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nanidina nanatona ahy ny serafima anankiray nitondra vainafo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vato mahamay.
    marker-yv: yv-n
  - type: text
    text: ' teny an-tànany, izay nalainy tamin’ny tandra avy teo amin’ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary natehiny ny vavako izany, ka hoy izy: Indro, efa nitehika tamin’ny molotrao io; ka dia afaka ny helokao, ary voavela ny fahotanao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nandre ny feon’ny Tompo aho nanao hoe: Iza no hirahiko, ary iza no handeha ho irakay? Dia hoy izaho: Inty aho, iraho aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mandehana, ka lazao amin’ity firenena ity hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandrenesa mandrakariva ihany hianareo, nefa aza mahalala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mijere mandrakariva ihany hianareo, nefa aza mahafantatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ataovy adala ny fon’ity firenena ity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ataovy lalodalovana ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ataovy mikimpy ny masony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao hahita ny masony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy handre ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hahalala ny fony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hibebaka izy ka ho sitrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izaho: Tompo ô, mandra-pahoviana anefa?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia hoy Izy: Mandra-pahafoanan’ny tanàna, ka tsy hisy mponina,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny trano tsy hisy olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tany ho lao tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary Jehovah hampandeha lavitra ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho be ny lao ao amin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary na dia misy ampahafolony aza sisa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mbola hosimbana ihany koa izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa kosa tahaka ny hazo terebinta sy ny ôka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mbola misy fotony ihany na dia voakapa aza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany no mbola hisiana taranaka masina ho fotony.
