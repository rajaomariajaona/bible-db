document_id: PRO.25
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ohabolana samy hafa ny amin’ny fitondrantena sy ny toetry ny olona marina.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I ZAO koa no ohabolan’i Solomona, izay nangonin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nafindran’.
    marker-yv: yv-n
  - type: text
    text: ' ny olon’i Hezekia, mpanjakan’ny Joda:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voninahitr’Andriamanitra ny manafin-javatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa voninahitry ny mpanjaka kosa ny mamanta-javatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny hahavon’ny lanitra sy ny halalin’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fon’ny mpanjaka dia samy tsy azo fantarina avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Esory ny taim-bolafotsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hisy fanaka ho an’ny mpanao an-idina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Esory ny ratsy fanahy tsy ho eo anatrehan’ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hampitoerina amin’ny fahamarinana ny seza fiandrianany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza manandra-tena eo anatrehan’ny mpanjaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza mitoetra eo amin’ny fitoeran’ny lehibe;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa aleo hianao hantsoina hoe: Miakara atỳ,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izay hatambotsotra eo imason’ny manan-kaja izay hitan’ny masonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza maika handeha hiady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fandrao '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tsy ho fantatrao
  - type: text
    text: ' izay hataonao amin’ny farany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rehefa omen’ny namanao henatra hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miadia ihany ny adinao amin’ny namanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa aza aseho izay tsy tian’ny sasany holazaina,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fandrao izay mandre hanondro maso anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho afaka aminao ny laza ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny teny atao amin’ny antony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia poma volamena ao anaty vilia volafotsy tsara soratra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: poma volamena misy ravaka volafotsy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kavim-bolamena sy firavaka volamena tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpananatra hendry, raha amin’ny sofina mihaino.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toy ny hatsiaky ny orampanala amin’ny taom-pijinjana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny iraka mahatoky amin’izay naniraka azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mamelombelona ny fon’ny tompony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny rahona sy ny rivotra tsy misy orana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny olona izay mirehaka amin’ny fizaram-bava.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny fahari-po no ahazoana mampanaiky ny mpitsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vava
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lela.
    marker-yv: yv-n
  - type: text
    text: ' malefaka mahatapa-taolana.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mahita tantely va hianao? Hano izay antonona anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao voky loatra hianao ka handoa azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza miditra matetika ao an-tranon’ny namanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fandrao tofoka anao izy, ka ho halany hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Langilangy sy sabatra ary zana-tsipìka maranitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny olona izay mitsangana ho vavolombelona mandainga hanameloka ny namany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy ny nify nahasimatsimahana sy ny tongotra mangozohozo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahatokiana ny mpamitaka amin’ny andro fahoriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Toy ny miala lamba amin’ny hatsiaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny vinaingitra amin’ny sirahazo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny mikalo amin’ny malahelo am-po.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Raha noana ny fahavalonao, omeo hanina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha mangetaheta izy, omeo rano hosotroiny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa raha manao izany hianao, dia hanambatra vainafo ho eo an-dohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jehovah no hamaly soa anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny rivotra avy any avaratra mahatonga ranonorana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany, ny lelan’ny mpifosa mampahavinitra endrika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aleo mitoetra eo an-joron’ny tampon-trano
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy izay miray trano amin’ny vehivavy tia ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rano mangatsiaka amin’ny fanahy reraka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny filazana soa avy any an-tany lavitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Loharano voahosihosy sy fantsakana simba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny marina izay mikoy ny ratsy fanahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy tsara raha mahery homana tantely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fitadiavan’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny olona
  - type: text
    text: ' ny voninahiny dia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tsy
  - type: text
    text: ' voninahitra.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa ny fandinihana izay sarotra dia voninahitra (
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mavesatra)
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tanàna rava tsy misy mànda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny lehilahy izay tsy mahatsindry ny fanahiny.
