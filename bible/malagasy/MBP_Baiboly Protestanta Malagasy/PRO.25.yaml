        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: poma volamena misy ravaka volafotsy.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kavim-bolamena sy firavaka volamena tsara
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpananatra hendry, raha amin’ny sofina mihaino.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny hatsiaky ny orampanala amin’ny taom-pijinjana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany ny iraka mahatoky amin’izay naniraka azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mamelombelona ny fon’ny tompony izy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny rahona sy ny rivotra tsy misy orana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona izay mirehaka amin’ny fizaram-bava.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahari-po no ahazoana mampanaiky ny mpitsara,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny vava
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.15 '
      - type: usfm
