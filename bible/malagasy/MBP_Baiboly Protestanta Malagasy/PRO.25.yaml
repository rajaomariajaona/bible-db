document_id: PRO.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ohabolana samy hafa ny amin’ny fitondrantena sy ny toetry ny olona marina.
  - type: text
    content: I ZAO koa no ohabolan’i Solomona, izay nangonin’
  - type: note
    content: Heb. nafindran’.
  - type: text
    content: ' ny olon’i Hezekia, mpanjakan’ny Joda:'
  '10':
  - type: text
    content: Fandrao izay mandre hanondro maso anao,
  - type: text
    content: Ka tsy ho afaka aminao ny laza ratsy.
  '11':
  - type: text
    content: Ny teny atao amin’ny antony
  - type: text
    content: Dia poma volamena ao anaty vilia volafotsy tsara soratra.
  - type: note
    content: 'Na: poma volamena misy ravaka volafotsy.'
  '12':
  - type: text
    content: Kavim-bolamena sy firavaka volamena tsara
  - type: text
    content: Ny mpananatra hendry, raha amin’ny sofina mihaino.
  '13':
  - type: text
    content: Toy ny hatsiaky ny orampanala amin’ny taom-pijinjana,
  - type: text
    content: Dia toy izany ny iraka mahatoky amin’izay naniraka azy,
  - type: text
    content: Fa mamelombelona ny fon’ny tompony izy.
  '14':
  - type: text
    content: Toy ny rahona sy ny rivotra tsy misy orana
  - type: text
    content: Ny olona izay mirehaka amin’ny fizaram-bava.
  '15':
  - type: text
    content: Ny fahari-po no ahazoana mampanaiky ny mpitsara,
  - type: text
    content: Ary ny vava
  - type: note
    content: Heb. lela.
  - type: text
    content: ' malefaka mahatapa-taolana.'
  '16':
  - type: text
    content: Mahita tantely va hianao? Hano izay antonona anao,
  - type: text
    content: Fandrao voky loatra hianao ka handoa azy.
  '17':
  - type: text
    content: Aza miditra matetika ao an-tranon’ny namanao,
  - type: text
    content: Fandrao tofoka anao izy, ka ho halany hianao.
  '18':
  - type: text
    content: Langilangy sy sabatra ary zana-tsipìka maranitra
  - type: text
    content: Ny olona izay mitsangana ho vavolombelona mandainga hanameloka ny namany.
  '19':
  - type: text
    content: Toy ny nify nahasimatsimahana sy ny tongotra mangozohozo
  - type: text
    content: Ny fahatokiana ny mpamitaka amin’ny andro fahoriana.
  '2':
  - type: text
    content: Voninahitr’Andriamanitra ny manafin-javatra;
  - type: text
    content: Fa voninahitry ny mpanjaka kosa ny mamanta-javatra.
  '20':
  - type: text
    content: Toy ny miala lamba amin’ny hatsiaka,
  - type: text
    content: Ary toy ny vinaingitra amin’ny sirahazo,
  - type: text
    content: Dia toy izany ny mikalo amin’ny malahelo am-po.
  '21':
  - type: text
    content: Raha noana ny fahavalonao, omeo hanina izy;
  - type: text
    content: Ary raha mangetaheta izy, omeo rano hosotroiny;
  '22':
  - type: text
    content: Fa raha manao izany hianao, dia hanambatra vainafo ho eo an-dohany,
  - type: text
    content: Ary Jehovah no hamaly soa anao.
  '23':
  - type: text
    content: Ny rivotra avy any avaratra mahatonga ranonorana,
  - type: text
    content: Dia toy izany, ny lelan’ny mpifosa mampahavinitra endrika.
  '24':
  - type: text
    content: Aleo mitoetra eo an-joron’ny tampon-trano
  - type: text
    content: Toy izay miray trano amin’ny vehivavy tia ady.
  '25':
  - type: text
    content: Rano mangatsiaka amin’ny fanahy reraka
  - type: text
    content: Ny filazana soa avy any an-tany lavitra.
  '26':
  - type: text
    content: Loharano voahosihosy sy fantsakana simba
  - type: text
    content: Ny marina izay mikoy ny ratsy fanahy.
  '27':
  - type: text
    content: Tsy tsara raha mahery homana tantely;
  - type: text
    content: Fa ny fitadiavan’
  - type: text
    content: ny olona
  - type: text
    content: ' ny voninahiny dia '
  - type: text
    content: tsy
  - type: text
    content: ' voninahitra.'
  - type: note
    content: 'Na: Fa ny fandinihana izay sarotra dia voninahitra (na: mavesatra)'
  '28':
  - type: text
    content: Tanàna rava tsy misy mànda
  - type: text
    content: Ny lehilahy izay tsy mahatsindry ny fanahiny.
  '3':
  - type: text
    content: Ny hahavon’ny lanitra sy ny halalin’ny tany
  - type: text
    content: Ary ny fon’ny mpanjaka dia samy tsy azo fantarina avokoa.
  '4':
  - type: text
    content: Esory ny taim-bolafotsy,
  - type: text
    content: Dia hisy fanaka ho an’ny mpanao an-idina.
  '5':
  - type: text
    content: Esory ny ratsy fanahy tsy ho eo anatrehan’ny mpanjaka,
  - type: text
    content: Dia hampitoerina amin’ny fahamarinana ny seza fiandrianany.
  '6':
  - type: text
    content: Aza manandra-tena eo anatrehan’ny mpanjaka,
  - type: text
    content: Ary aza mitoetra eo amin’ny fitoeran’ny lehibe;
  '7':
  - type: text
    content: 'Fa aleo hianao hantsoina hoe: Miakara atỳ,'
  - type: text
    content: Toy izay hatambotsotra eo imason’ny manan-kaja izay hitan’ny masonao.
  '8':
  - type: text
    content: Aza maika handeha hiady,
  - type: text
    content: 'Fandrao '
  - type: text
    content: tsy ho fantatrao
  - type: text
    content: ' izay hataonao amin’ny farany,'
  - type: text
    content: Rehefa omen’ny namanao henatra hianao.
  '9':
  - type: text
    content: Miadia ihany ny adinao amin’ny namanao,
  - type: text
    content: Kanefa aza aseho izay tsy tian’ny sasany holazaina,
