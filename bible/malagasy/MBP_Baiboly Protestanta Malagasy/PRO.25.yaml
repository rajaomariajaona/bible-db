          text: lela.
      marker-yv: yv-n
    - type: text
      text: ' malefaka mahatapa-taolana.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahita tantely va hianao? Hano izay antonona anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao voky loatra hianao ka handoa azy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza miditra matetika ao an-tranon’ny namanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao tofoka anao izy, ka ho halany hianao.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Langilangy sy sabatra ary zana-tsipìka maranitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olona izay mitsangana ho vavolombelona mandainga hanameloka ny namany.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nify nahasimatsimahana sy ny tongotra mangozohozo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahatokiana ny mpamitaka amin’ny andro fahoriana.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voninahitr’Andriamanitra ny manafin-javatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa voninahitry ny mpanjaka kosa ny mamanta-javatra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny miala lamba amin’ny hatsiaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary toy ny vinaingitra amin’ny sirahazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany ny mikalo amin’ny malahelo am-po.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha noana ny fahavalonao, omeo hanina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha mangetaheta izy, omeo rano hosotroiny;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha manao izany hianao, dia hanambatra vainafo ho eo an-dohany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jehovah no hamaly soa anao.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rivotra avy any avaratra mahatonga ranonorana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia toy izany, ny lelan’ny mpifosa mampahavinitra endrika.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleo mitoetra eo an-joron’ny tampon-trano
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izay miray trano amin’ny vehivavy tia ady.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rano mangatsiaka amin’ny fanahy reraka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny filazana soa avy any an-tany lavitra.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loharano voahosihosy sy fantsakana simba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny marina izay mikoy ny ratsy fanahy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy tsara raha mahery homana tantely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny fitadiavan’
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny olona
    - type: text
      text: ' ny voninahiny dia '
    - type: usfm
