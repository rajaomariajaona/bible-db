  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tanàna rava tsy misy mànda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lehilahy izay tsy mahatsindry ny fanahiny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny hahavon’ny lanitra sy ny halalin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fon’ny mpanjaka dia samy tsy azo fantarina avokoa.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esory ny taim-bolafotsy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hisy fanaka ho an’ny mpanao an-idina.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esory ny ratsy fanahy tsy ho eo anatrehan’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hampitoerina amin’ny fahamarinana ny seza fiandrianany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manandra-tena eo anatrehan’ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aza mitoetra eo amin’ny fitoeran’ny lehibe;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa aleo hianao hantsoina hoe: Miakara atỳ,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izay hatambotsotra eo imason’ny manan-kaja izay hitan’ny masonao.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza maika handeha hiady,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fandrao '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsy ho fantatrao
    - type: text
      text: ' izay hataonao amin’ny farany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa omen’ny namanao henatra hianao.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miadia ihany ny adinao amin’ny namanao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kanefa aza aseho izay tsy tian’ny sasany holazaina,
