    - type: text
      text: ' ny olon’i Hezekia, mpanjakan’ny Joda:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao izay mandre hanondro maso anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy ho afaka aminao ny laza ratsy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny teny atao amin’ny antony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia poma volamena ao anaty vilia volafotsy tsara soratra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.11 '
      - type: usfm
