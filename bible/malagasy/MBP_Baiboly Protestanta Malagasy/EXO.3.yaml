document_id: EXO.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Mosesy niandry ny ondry aman-osin’i Jetro rafozany, mpisorona tao Midiana, dia nitondra ny ondry aman-osy tany ankoatry ny efitra ka nankany Horeba, tendrombohitr’Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary Ilay Anjelin’i Jehovah niseho taminy teo anaty lelafo teo amin’ny roimemy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sene.
    marker-yv: yv-n
  - type: text
    text: ' anankiray; dia nijery izy, ka, indro, nirehitra afo ny roimemy, kanefa tsy nahalevonana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Mosesy: Hivily kely aho ka hizaha io fahitana lehibe io, hahafantarako izay tsy ahalevonan’ny roimemy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa hitan’i Jehovah fa nivily hizaha izy, dia niantso azy tao afovoan’ny roimemy Andriamanitra ka nanao hoe: Ry Mosesy, ry Mosesy! Dia hoy izy: Inty aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Izy: Aza manakaiky etỳ; esory ny kapanao amin’ny tongotrao, fa tany masina io ijanonanao io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy koa Izy: Izaho no Andriamanitry ny razanao, dia Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba. Dia nisaron-tava Mosesy, fa natahotra hijery an’Andriamanitra izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Jehovah: Efa hitako tokoa ny fahorian’ny oloko izay any Egypta, ary efa reko ny fitarainany noho ny ataon’ny mpampiasa azy; eny, fantatro ny alahelony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia efa nidina Aho izao hamonjy azy amin’ny tànan’ny Egyptiana ka hitondra azy hiakatra hiala amin’izany tany izany ho any amin’izay tany soa sy malalaka, dia any amin’izay tany tondra-dronono sy tantely, any amin’ny tanin’ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ankehitriny, indro, ny fitarainan’ny Zanak’Isiraely dia efa mby atỳ amiko, sady efa hitako koa ny fahoriana izay ampahorian’ny Egyptiana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa avia ankehitriny hianao hirahiko ho any amin’i Farao hitondra ny Zanak’Isiraely oloko hivoaka avy any Egypta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy Mosesy tamin’Andriamanitra: Iza moa aho no hankany amin’i Farao sy hitondra ny Zanak’Isiraely hivoaka avy any Egypta?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Izy: Homba anao tokoa Aho; ary izao no famantarana ho anao fa Izaho no efa naniraka anao; rehefa entinao mivoaka avy any Egypta ny olona, dia hanompo an’Andriamanitra eto amin’ity tendrombohitra ity hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Mosesy tamin’Andriamanitra: Indro, rehefa tonga any amin’ny Zanak’Isiraely aho ka manao aminy hoe: Andriamanitry ny razanareo no efa naniraka ahy ho atỳ aminareo, ary hanao amiko hoe kosa izy: Iza moa no anarany? dia ahoana no havaliko azy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Andriamanitra tamin’i Mosesy: '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: izaho, izay izy hatrizay hatrizay ka ho mandrakizay.
  - type: text
    text: ' Ary hoy koa Izy: Izao no holazainao amin’ny Zanak’Isiraely: '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: izaho izay izy
  - type: text
    text: ' no efa naniraka ahy ho atỳ aminareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy koa Andriamanitra tamin’i Mosesy: Izao no holazainao amin’ny Zanak’Isiraely: Jehovah, Andriamanitry ny razanareo, dia Andriamanitr’i Abrahama sy Andriamanitr’i Isaka ary Andriamanitr’i Jakoba, no efa naniraka ahy ho atỳ aminareo; izany no anarako mandrakizay, ary izany no hahatsiarovana Ahy hatramin’ny taranaka fara mandimby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mandehana, dia angony ny loholon’ny Isiraely, ka lazao aminy hoe: Efa niseho tamiko Jehovah, Andriamanitry ny razanareo, dia Andriamanitr’i Abrahama sy Isaka ary Jakoba, ka nanao hoe: Efa namangy anareo tokoa Aho ka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nahita
  - type: text
    text: ' ny anaovana anareo atỳ Egypta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary hoy Izaho: Hitondra anareo hiakatra Aho ho afaka amin’ny fahoriana atỳ Egypta ho any amin’ny tanin’ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita, ho any amin’izay tany tondra-dronono sy tantely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hihaino ny feonao izy; ary hankao amin’ny mpanjakan’i Egypta hianao sy ny loholon’ny Isiraely ka hilaza aminy hoe: Jehovah, Andriamanitry ny Hebreo, efa nihaona taminay; ary ankehitriny, trarantitra hianao, aoka handeha làlan-kateloana any an-efitra izahay mba hamono zavatra hatao fanatitra ho an’i Jehovah Andriamanitray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa Izaho mahalala fa tsy havelan’ny mpanjakan’i Egypta handeha hianareo, tsia, na dia amin’ny tànana mahery aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia haninjitra ny tànako Aho ka hamely an’i Egypta amin’ny fahagagana rehetra izay hataoko eo aminy; ary rehefa afaka izany, dia vao handefa anareo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hataoko mahita fitia eo imason’ny Egyptiana ity firenena ity, ka raha handeha hianareo, dia tsy mba handeha maina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: fa ny vehivavy samy hangataka firavaka volafotsy sy volamena ary fitafiana amin’ny miray monina aminy sy amin’izay mivahiny ao an-tranony; dia hataonareo amin’ny zanakareo-lahy sy ny zanakareovavy izany, ka dia hofoananareo ny Egyptiana.
