document_id: PSA.123,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanantenana an’Andriamanitra hanafaka amin’ny fanebahana sy ny fanamavoana.
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga.'
  - type: text
    content: AMINAO no anandratako ny masoko,
  - type: text
    content: Ry Mpitoetra any an-danitra ô.
  '2':
  - type: text
    content: Indro, toy ny fijerin’ny ankizilahy
  - type: text
    content: Ny tànan’ny tompolahiny,
  - type: text
    content: Ary toy ny fijerin’ny ankizivavy
  - type: text
    content: Ny tànan’ny tompovaviny,
  - type: text
    content: No fijerintsika an’i Jehovah Andriamanitsika,
  - type: text
    content: Mandra-pamindra fony amintsika.
  '3':
  - type: text
    content: Mamindrà fo aminay, Jehovah ô, mamindrà fo aminay;
  - type: text
    content: Fa tototry ny fanamavoana loatra izahay;
  '4':
  - type: text
    content: Eny, tototry ny famingavingan’ny miadana ny fanahinay,
  - type: text
    content: Sy tototry ny fanamavoan’ny mpiavonavona.
