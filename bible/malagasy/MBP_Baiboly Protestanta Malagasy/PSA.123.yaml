      - type: text
        text: Fihirana misy hevitra ambaratonga.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: AMINAO no anandratako ny masoko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry Mpitoetra any an-danitra ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indro, toy ny fijerin’ny ankizilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànan’ny tompolahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny fijerin’ny ankizivavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny tànan’ny tompovaviny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No fijerintsika an’i Jehovah Andriamanitsika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pamindra fony amintsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mamindrà fo aminay, Jehovah ô, mamindrà fo aminay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tototry ny fanamavoana loatra izahay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, tototry ny famingavingan’ny miadana ny fanahinay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tototry ny fanamavoan’ny mpiavonavona.
