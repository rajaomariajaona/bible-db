document_id: ACT.27,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitondrana an’i Paoly nankany Roma, sy ny zavatra nanjo azy teny an-dàlana.
  - type: text
    content: 'ARY rehefa voadidy hiondrana an-tsambo hiala hankany Italia izahay, Paoly sy ny mpifatotra sasany dia natolotra tamin’ny kapiteny atao hoe Jolio, tamin’ny antokon’i Aogosto. '
  '10':
  - type: text
    content: 'ka nanao taminy hoe: Ry tompokolahy ô, hitako fa izao fandehanana izao dia hisy fahasimbana sy fantiantoka be ihany, ka tsy amin’ny entana sy ny sambo ihany, fa ny aintsika koa aza. '
  '11':
  - type: text
    content: 'Kanefa ny kapiteny nino ny mpitondra sy ny tompon-tsambo, fa tsy ny teny nolazain’i Paoly. '
  '12':
  - type: text
    content: Ary satria ny fitodian-tsambo teo dia tsy tsara hitoerana amin’ny ririnana, dia nataon’ny maro fa tsara raha miala, fandrao mba ho tonga any Foiniksa ahay handany ny ririnina any; fitodian-tsambo any Kreta izany ka manatrika mianatsimo-andrefana sy mianavaratra-andrefana.
  - type: note
    content: 'Na: mianavaratra-atsinanana sy mianatsimo-atsinana.'
  '13':
  - type: text
    content: 'Ary raha nitsoka malemy ny rivotra avy any atsimo, ka nataony fa efa nahazo izay niriny izy, dia niala teo izy ka nandalo akaikikaikin’i Kreta. '
  '14':
  - type: text
    content: 'Ary tsy ela rehefa afaka izany, dia nifofofofo nidina avy teo ny tafio-drivotra mahery atao hoe Eorakylona. '
  '15':
  - type: text
    content: 'Ary raha nopaohin’ny rivotra ny sambo ka tsy nahatoha azy, dia navelanay haveziveziny izy. '
  '16':
  - type: text
    content: Ary raha nandeha faingana nanara-morona ny nosy atao hoe Kaoda
  - type: note
    content: 'Na: [Klaoda].'
  - type: text
    content: ' nihazo ny ilany takon-drivotra izahay, dia saiky tsy nahazo ny salopy; '
  '17':
  - type: text
    content: ary rehefa nakarina izany, dia novahorany manodidina ny sambo; ary natahotra izy, fandrao hihatra any amin’ilay fasika mandrevo,
  - type: note
    content: Gr. Syrtisy.
  - type: text
    content: ' dia nampidina ny lay, ka navelany handeha ho azy ny sambo. '
  '18':
  - type: text
    content: 'Ary raha nasian’ny rivotra mafy izahay, dia nanariany ny entana nony ampitso; '
  '19':
  - type: text
    content: 'ary nony ampitson’io indray dia narian’ny tànany ihany ny fanaka teo amin’ny sambo; '
  '2':
  - type: text
    content: 'Ary rehefa nirotsaka an-tsambo avy any Adramytena izay efa handeha hitety ny sisin-tanin’i Asia izahay, dia lasa nandeha; ary niaraka taminay Aristarko Makedoniana avy any Tesalonika. '
  '20':
  - type: text
    content: fa rehefa tsy hita ny masoandro na ny kintana hatramin’ny andro maro, ary tsy kely ny rivotra izay namely, dia tsy nanantena ho voavonjy intsony izahay.
  '21':
  - type: text
    content: 'Ary rehefa tsy nihinan-kanina ela izy ireo, Paoly dia nitsangana teo afovoany ka nanao hoe: Ry tompokolahy ô, tsara raha ho nihaino ahy hianareo ka tsy niala tany Kreta, mba tsy ho nahitana izao fahasimbana sy fatiantoka izao. '
  '22':
  - type: text
    content: 'Ary ankehitriny mananatra anareo aho mba hatoky; fa tsy hisy ho faty hianareo, fa ny sambo ihany no ho very. '
  '23':
  - type: text
    content: 'Fa nisy anjelin’Andriamanitra, Izay Tompoko sady tompoiko, nitsangana teo anilako halina '
  '24':
  - type: text
    content: 'ka nanao hoe: Aza matahotra, ry Paoly; fa tsy maintsy hitsangana eo anatrehan’i Kaisara hianao; ary, indro, efa nomen’Andriamanitra anao ny olona rehetra izay miaraka aminao. '
  '25':
  - type: text
    content: 'Koa matokia, ry tompokolahy ô, fa mino an’Andriamanitra aho fa ho tonga araka ny voalazany tamiko izany. '
  '26':
  - type: text
    content: Nefa tsy maintsy fefika ihany eo amin’ny nosy anankiray isika.
  '27':
  - type: text
    content: 'Ary tamin’ny alina fahefatra ambin’ny folo, raha navezimbezina tany Adria izahay, nony namatonalina dia nataon’ny matilo fa efa manakaiky tany izy; '
  '28':
  - type: text
    content: 'dia nanaka-drano izy ka hitany fa faharoa-polo refy; ary nony nandrosoroso kokoa izy, dia nanaka-drano indray ka hitany fa fahadimy ambin’ny folo refy. '
  '29':
  - type: text
    content: Dia natahotra izahay, fandrao hidona amin’ny hara-mbato, ka dia nandatsaka vatofantsika efatra teo am-bodi-sambo ary naniry ny andro ho maraina.
  '3':
  - type: text
    content: 'Ary nony ampitso dia tonga tany Sidona izahay. Ary tsara ny nitondran’i Jolio an’i Paoly, fa navelany hankany amin’ny sakaizany izay hiahy azy izy. '
  '30':
  - type: text
    content: 'Fa raha nitady handositra hiala tamin’ny sambo ny matilo ka efa nampidina ny salopy teo amin’ny ranomasina izy, nody handatsaka vatofantsika eo an-doha-sambo, '
  '31':
  - type: text
    content: 'dia hoy Paoly tamin’ny kapiteny sy ny miaramila: Raha tsy mitoetra eto an-tsambo ireo, dia tsy azo vonjena hianareo. '
  '32':
  - type: text
    content: Dia notapahin’ny miaramila ny mahazaka rehetra tamin’ny salopy, ka navelany ho latsaka.
  '33':
  - type: text
    content: 'Ary raha mbola tsy nazava ny andro, dia niangavy tamin’ny olona rehetra Paoly mba hihinan-kanina ka nanao hoe: Anio no fahefatra ambin’ny folo andro niandrasanareo, sady nahari-noana hianareo ka tsy nihinana. '
  '34':
  - type: text
    content: 'Koa mananatra anareo aho hihinan-kanina, fa izany no isan’ny hamonjena anareo; ary tsy hisy ho very aminareo rehetra na dia singam-bolo iray akory aza. '
  '35':
  - type: text
    content: 'Ary rehefa nilaza izany izy sady nandray mofo, dia nisaotra an’Andriamanitra teo anatrehan’ny olona rehetra; ary rehefa novakiny, dia nihinana izy. '
  '36':
  - type: text
    content: 'Dia nahazo toky izy rehetra ka nihinana koa. '
  '37':
  - type: text
    content: 'Ary izahay rehetra teo anaty sambo dia olona enina amby fito-polo amby roan-jato. '
  '38':
  - type: text
    content: Ary rehefa voky izy, dia nanariany ho any anaty ranomasina ny hanina
  - type: note
    content: 'Na: ny vary tritika.'
  - type: text
    content: ' mba hanamaivana ny sambo.'
  '39':
  - type: text
    content: 'Ary rehefa nazava ny andro, dia tsy nahalala ny tany izy, fa nahita helodrano anankiray tsara morona, ka teo no nokasainy hampidonana ny sambo, raha azony atao. '
  '4':
  - type: text
    content: 'Ary nony niala teo izahay, dia nanara-morona an’i Kyprosy nihazo ny ilany takon-drivotra, satria nanohitra ny rivotra. '
  '40':
  - type: text
    content: 'Ary rehefa nesoriny avokoa ny vatofantsika, dia navelany ho any an-dranomasina, ary novahany koa ny kofehin’ny familian-tsambo dia namelatra ny lay anoloana izy ho azon’ny rivotra ka nanatona ny tany. '
  '41':
  - type: text
    content: Ary raha tonga tamin’izay nisy fihaonan-dranomasina izy, dia navelany hidona tamin’ny tany ny sambo; ary ny loha-sambo nihizina ka nitoetra tsy nihetsika, fa ny vodi-sambo kosa dia vakivaky azon’ny herin’
  - type: text
    content: ny onja.
  '42':
  - type: text
    content: 'Ary ny miaramila nanao tetika hamono ny mpifatotra, fandrao hisy hilomano ireo ka ho afaka. '
  '43':
  - type: text
    content: 'Fa ny kapiteny ta-hamonjy an’i Paoly, dia nisakana azy tsy hanao izay nokasainy; fa izay nahay nilomano no nasainy hirotsaka aloha ka hilomano ho any amin’ny tany, '
  '44':
  - type: text
    content: 'ary ny sisa dia samy '
  - type: text
    content: hanao izay hahafaka azy,
  - type: text
    content: ' na amin’ny hazo fisaka, na amin’ny zavatra avy amin’ny sambo. Dia tonga soa aman-tsara teny an-tanety avokoa izy rehetra.'
  '5':
  - type: text
    content: 'Ary rehefa namaky ny ranomasina tany Kilikia sy Pamfilia izahay, dia tonga tany Myra any Lykia. '
  '6':
  - type: text
    content: Ary tao no nahitan’ny kapiteny sambon’Aleksandria hankany Italia, dia nasainy niondrana teo aminy izahay.
  '7':
  - type: text
    content: 'Ary rehefa nandeha niadana andro maromaro izahay ka saiky tsy tonga tandrifin’i Kinido, satria nisakana anay ny rivotra, dia takon-drivotra tandrifin’i Salmona izahay; '
  '8':
  - type: text
    content: ary nony sahirana nanara-morona izahay, dia tonga teo amin’ny tany anankiray atao hoe Tsara-fitodian-tsambo; akaikin’izany ny tanàna Lasea.
  '9':
  - type: text
    content: Ary rehefa lany ny andro maro, sady sarotra ny fandehanan-tsambo tamin’izany, satria efa afaka ny Andro Fifadiana,
  - type: note
    content: Ny Andro Fanavotana izany.
  - type: text
    content: ' dia nananatra azy Paoly '
