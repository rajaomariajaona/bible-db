document_id: ACT.27
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nitondrana an’i Paoly nankany Roma, sy ny zavatra nanjo azy teny an-dàlana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa voadidy hiondrana an-tsambo hiala hankany Italia izahay, Paoly sy ny mpifatotra sasany dia natolotra tamin’ny kapiteny atao hoe Jolio, tamin’ny antokon’i Aogosto. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa nirotsaka an-tsambo avy any Adramytena izay efa handeha hitety ny sisin-tanin’i Asia izahay, dia lasa nandeha; ary niaraka taminay Aristarko Makedoniana avy any Tesalonika. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony ampitso dia tonga tany Sidona izahay. Ary tsara ny nitondran’i Jolio an’i Paoly, fa navelany hankany amin’ny sakaizany izay hiahy azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nony niala teo izahay, dia nanara-morona an’i Kyprosy nihazo ny ilany takon-drivotra, satria nanohitra ny rivotra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary rehefa namaky ny ranomasina tany Kilikia sy Pamfilia izahay, dia tonga tany Myra any Lykia. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary tao no nahitan’ny kapiteny sambon’Aleksandria hankany Italia, dia nasainy niondrana teo aminy izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa nandeha niadana andro maromaro izahay ka saiky tsy tonga tandrifin’i Kinido, satria nisakana anay ny rivotra, dia takon-drivotra tandrifin’i Salmona izahay; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary nony sahirana nanara-morona izahay, dia tonga teo amin’ny tany anankiray atao hoe Tsara-fitodian-tsambo; akaikin’izany ny tanàna Lasea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary rehefa lany ny andro maro, sady sarotra ny fandehanan-tsambo tamin’izany, satria efa afaka ny Andro Fifadiana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Ny Andro Fanavotana izany.
    marker-yv: yv-n
  - type: text
    text: ' dia nananatra azy Paoly '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka nanao taminy hoe: Ry tompokolahy ô, hitako fa izao fandehanana izao dia hisy fahasimbana sy fantiantoka be ihany, ka tsy amin’ny entana sy ny sambo ihany, fa ny aintsika koa aza. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa ny kapiteny nino ny mpitondra sy ny tompon-tsambo, fa tsy ny teny nolazain’i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary satria ny fitodian-tsambo teo dia tsy tsara hitoerana amin’ny ririnana, dia nataon’ny maro fa tsara raha miala, fandrao mba ho tonga any Foiniksa ahay handany ny ririnina any; fitodian-tsambo any Kreta izany ka manatrika mianatsimo-andrefana sy mianavaratra-andrefana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mianavaratra-atsinanana sy mianatsimo-atsinana.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha nitsoka malemy ny rivotra avy any atsimo, ka nataony fa efa nahazo izay niriny izy, dia niala teo izy ka nandalo akaikikaikin’i Kreta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tsy ela rehefa afaka izany, dia nifofofofo nidina avy teo ny tafio-drivotra mahery atao hoe Eorakylona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary raha nopaohin’ny rivotra ny sambo ka tsy nahatoha azy, dia navelanay haveziveziny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary raha nandeha faingana nanara-morona ny nosy atao hoe Kaoda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Klaoda].'
    marker-yv: yv-n
  - type: text
    text: ' nihazo ny ilany takon-drivotra izahay, dia saiky tsy nahazo ny salopy; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary rehefa nakarina izany, dia novahorany manodidina ny sambo; ary natahotra izy, fandrao hihatra any amin’ilay fasika mandrevo,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Syrtisy.
    marker-yv: yv-n
  - type: text
    text: ' dia nampidina ny lay, ka navelany handeha ho azy ny sambo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha nasian’ny rivotra mafy izahay, dia nanariany ny entana nony ampitso; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary nony ampitson’io indray dia narian’ny tànany ihany ny fanaka teo amin’ny sambo; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: fa rehefa tsy hita ny masoandro na ny kintana hatramin’ny andro maro, ary tsy kely ny rivotra izay namely, dia tsy nanantena ho voavonjy intsony izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary rehefa tsy nihinan-kanina ela izy ireo, Paoly dia nitsangana teo afovoany ka nanao hoe: Ry tompokolahy ô, tsara raha ho nihaino ahy hianareo ka tsy niala tany Kreta, mba tsy ho nahitana izao fahasimbana sy fatiantoka izao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ankehitriny mananatra anareo aho mba hatoky; fa tsy hisy ho faty hianareo, fa ny sambo ihany no ho very. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa nisy anjelin’Andriamanitra, Izay Tompoko sady tompoiko, nitsangana teo anilako halina '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ka nanao hoe: Aza matahotra, ry Paoly; fa tsy maintsy hitsangana eo anatrehan’i Kaisara hianao; ary, indro, efa nomen’Andriamanitra anao ny olona rehetra izay miaraka aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa matokia, ry tompokolahy ô, fa mino an’Andriamanitra aho fa ho tonga araka ny voalazany tamiko izany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nefa tsy maintsy fefika ihany eo amin’ny nosy anankiray isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary tamin’ny alina fahefatra ambin’ny folo, raha navezimbezina tany Adria izahay, nony namatonalina dia nataon’ny matilo fa efa manakaiky tany izy; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia nanaka-drano izy ka hitany fa faharoa-polo refy; ary nony nandrosoroso kokoa izy, dia nanaka-drano indray ka hitany fa fahadimy ambin’ny folo refy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia natahotra izahay, fandrao hidona amin’ny hara-mbato, ka dia nandatsaka vatofantsika efatra teo am-bodi-sambo ary naniry ny andro ho maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa raha nitady handositra hiala tamin’ny sambo ny matilo ka efa nampidina ny salopy teo amin’ny ranomasina izy, nody handatsaka vatofantsika eo an-doha-sambo, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'dia hoy Paoly tamin’ny kapiteny sy ny miaramila: Raha tsy mitoetra eto an-tsambo ireo, dia tsy azo vonjena hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dia notapahin’ny miaramila ny mahazaka rehetra tamin’ny salopy, ka navelany ho latsaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary raha mbola tsy nazava ny andro, dia niangavy tamin’ny olona rehetra Paoly mba hihinan-kanina ka nanao hoe: Anio no fahefatra ambin’ny folo andro niandrasanareo, sady nahari-noana hianareo ka tsy nihinana. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Koa mananatra anareo aho hihinan-kanina, fa izany no isan’ny hamonjena anareo; ary tsy hisy ho very aminareo rehetra na dia singam-bolo iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary rehefa nilaza izany izy sady nandray mofo, dia nisaotra an’Andriamanitra teo anatrehan’ny olona rehetra; ary rehefa novakiny, dia nihinana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia nahazo toky izy rehetra ka nihinana koa. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary izahay rehetra teo anaty sambo dia olona enina amby fito-polo amby roan-jato. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary rehefa voky izy, dia nanariany ho any anaty ranomasina ny hanina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.38 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny vary tritika.
    marker-yv: yv-n
  - type: text
    text: ' mba hanamaivana ny sambo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary rehefa nazava ny andro, dia tsy nahalala ny tany izy, fa nahita helodrano anankiray tsara morona, ka teo no nokasainy hampidonana ny sambo, raha azony atao. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary rehefa nesoriny avokoa ny vatofantsika, dia navelany ho any an-dranomasina, ary novahany koa ny kofehin’ny familian-tsambo dia namelatra ny lay anoloana izy ho azon’ny rivotra ka nanatona ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary raha tonga tamin’izay nisy fihaonan-dranomasina izy, dia navelany hidona tamin’ny tany ny sambo; ary ny loha-sambo nihizina ka nitoetra tsy nihetsika, fa ny vodi-sambo kosa dia vakivaky azon’ny herin’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny onja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ny miaramila nanao tetika hamono ny mpifatotra, fandrao hisy hilomano ireo ka ho afaka. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa ny kapiteny ta-hamonjy an’i Paoly, dia nisakana azy tsy hanao izay nokasainy; fa izay nahay nilomano no nasainy hirotsaka aloha ka hilomano ho any amin’ny tany, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'ary ny sisa dia samy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hanao izay hahafaka azy,
  - type: text
    text: ' na amin’ny hazo fisaka, na amin’ny zavatra avy amin’ny sambo. Dia tonga soa aman-tsara teny an-tanety avokoa izy rehetra.'
