document_id: JHN.7,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niakaran’i Jesosy tany Jerosalema tamin’ny andro firavoravoana Tabernakely, sy ny nampianarany teo an-kianjan’ny tempoly, ary ny nitadiavan’ny lehibe hisambotra Azy.
  - type: text
    content: 'ARY rehefa afaka izany, dia nandeha tany Galilia Jesosy; fa nalain-kandeha tany Jodia Izy, satria nitady hahafaty Azy ny Jiosy. '
  '10':
  - type: text
    content: 'Fa rehefa lasa niakatra ho amin’ny andro firavoravoana ny rahalahiny, dia niakatra koa Izy, nefa tsy mba nisehoseho, fa toa niafinafina. '
  '11':
  - type: text
    content: 'Ary ny Jiosy dia nitady Azy tamin’ny andro firavoravoana ka nanao hoe: Aiza Izy? '
  '12':
  - type: text
    content: 'Ary nitakoritsika Azy be ihany ny vahoaka. Hoy ny sasany: Tsara fanahy Izy; fa hoy kosa ny sasany; Tsia; fa mamitaka ny vahoaka Izy. '
  '13':
  - type: text
    content: Nefa tsy nisy sahy niresaka Azy miharihary noho ny fahatahorany ny Jiosy.
  '14':
  - type: text
    content: 'Ary rehefa nisasaka ny andro firavoravoana, dia niakatra teo an-kianjan’ny tempoly Jesosy ka nampianatra. '
  '15':
  - type: text
    content: 'Dia gaga ny Jiosy ka nanao hoe: Ahoana no nahaizan’Ilehity soratra, nefa tsy mba nianatra Izy? '
  '16':
  - type: text
    content: 'Dia namaly azy Jesosy ka nanao hoe: Tsy Ahy ny fampianarako, fa an’Izay naniraka Ahy. '
  '17':
  - type: text
    content: 'Raha misy olona ta-hanao ny sitrapony, dia hahalala ny amin’ny fampianarana izy, na avy amin’Andriamanitra izany, na miteny ho Ahy Aho. '
  '18':
  - type: text
    content: 'Izay miteny ho azy dia mitady ny voninahitry ny tenany; fa izay mitady ny voninahitr’Izay naniraka azy no marina, ary tsy misy tsi-fahamarinana ao aminy. '
  '19':
  - type: text
    content: Tsy Mosesy va no nanome anareo ny lalàna? nefa tsy misy eo aminareo mankatò ny lalàna. Nahoana hianareo no mitady hamono Ahy?
  '2':
  - type: text
    content: 'Ary efa akaiky ny andro firavoravoan’ny Jiosy, dia ny amin’ny Tabernakely, '
  '20':
  - type: text
    content: 'Ny vahoaka namaly hoe: Manana demonia Hianao; iza no mitady hamono Anao? '
  '21':
  - type: text
    content: 'Jesosy namaly ka nanao taminy hoe: Asa iray loha ihany no nataoko, ka gaga avokoa hianareo rehetra. '
  '22':
  - type: text
    content: 'Izao no nanomezan’i Mosesy anareo ny famorana: tsy noho izy avy tamin’i Mosesy, fa noho izy avy tamin’ny razana, ka na dia amin’ny Sabata aza dia mamora olona ihany hianareo. '
  '23':
  - type: text
    content: 'Raha amin’ny Sabata aza no amorana olona, mba tsy hahafoana ny lalàn’i Mosesy, dia tezitra amiko va hianareo, satria nisy olona anankiray nataoko sitrana avokoa ny tenany rehetra tamin’ny Sabata. '
  '24':
  - type: text
    content: Aza mitsara araka ny miseho, fa mba mitsarà marina.
  '25':
  - type: text
    content: 'Ary ny mponina sasany tany Jerosalema dia nanao hoe: Tsy Ilehity va Ilay tadiaviny hovonoina? '
  '26':
  - type: text
    content: 'Ary indro Izy miteny miharihary, nefa tsy misy miteny Azy akory. Sao efa fantatry ny mpanapaka anie fa Io no Kritsy? '
  '27':
  - type: text
    content: 'Nefa fantatsika izay nihavian’Ilehio, fa raha avy Kristy, tsy misy mahalala izay hihaviany. '
  '28':
  - type: text
    content: 'Dia niantso teo an-kianjan’ny tempoly Jesosy, raha nampianatra, ka nanao hoe: Izaho dia fantatrareo, sady fantatrareo koa izay nihaviako; ary tsy avy ho Ahy Aho, fa marina ny naniraka Ahy, Izay tsy fantatrareo. '
  '29':
  - type: text
    content: 'Izaho mahalala Azy; fa Izy no nihaviako, ka Izy no naniraka Ahy. '
  '3':
  - type: text
    content: 'ka hoy ny rahalahiny taminy: Mialà eto, ka mandehana ho any Jodia, mba ho hitan’ny mpianatrao koa ny asa izay ataonao; '
  '30':
  - type: text
    content: Dia nitady hisambotra Azy ny olona; kanefa tsy nisy naninji-tànana taminy, satria tsy mbola tonga ny fotoany.
  '31':
  - type: text
    content: 'Ary maro ny vahoaka no nino Azy ka nanao hoe: Raha tonga Kristy, moa hanao famantarana maro mihoatra noho ny nataon’ity Lehilahy ity va Izy? '
  '32':
  - type: text
    content: 'Ny Fariseo nandre ny vahoaka nitakoritsika izany zavatra izany ny aminy; ary ny lohan’ny mpisorona sy ny Fariseo dia naniraka mpiandry raharaha mba hisambotra Azy. '
  '33':
  - type: text
    content: 'Dia hoy Jesosy: Kely foana no itoerako aminareo, dia hankany amin’Izay naniraka Ahy Aho. '
  '34':
  - type: text
    content: Hitady Ahy hianareo, fa tsy hahita; ary izay itoerako dia tsy azonareo haleha.
  '35':
  - type: text
    content: 'Dia niresaka hoe ny Jiosy: Hankaiza moa no halehan’Ilehity, no tsy ho hitantsika? Hankany amin’izay miely any amin’ny Grika va Izy ka hampianatra ny Grika? '
  '36':
  - type: text
    content: 'Ahoana re izao teny nolazainy izao hoe: Hitady Ahy hianareo, fa tsy hahita; ary izay itoerako tsy azonareo haleha?'
  '37':
  - type: text
    content: 'Ary tamin’ny andro farany, izay andro lehibe tamin’ny andro firavoravoana, dia nitsangana Jesosy ka niantso nanao hoe: Raha misy olona mangetaheta, aoka izy hanatona Ahy ka hisotro. '
  '38':
  - type: text
    content: 'Izay mino Ahy, dia hisy onin’ny rano velona hiboiboika avy ao an-kibony, araka ny voalazan’ny Soratra '
  - type: text
    content: Masina.
  - type: text
    content: ' '
  '39':
  - type: text
    content: Ary ny Fanahy, Izay efa horaisin’ny mino Azy, no nolazainy tamin’izany; fa ny Fanahy
  - type: note
    content: 'Na: [Fanahy Masina].'
  - type: text
    content: ' tsy mbola '
  - type: text
    content: nomena,
  - type: text
    content: ' satria Jesosy tsy mbola niditra tamin’ny voninahiny.'
  '4':
  - type: text
    content: 'fa tsy misy olona manao zavatra amin’ny takona, nefa ny tenany mitady ho hita miharihary; '
  - type: note
    content: 'Na: mitady ho hita fa matoky.'
  - type: text
    content: 'raha manao izany zavatra izany Hianao, dia misehoa amin’izao tontolo izao. '
  '40':
  - type: text
    content: 'Ary ny sasany tamin’ny vahoaka, raha nandre izany teny izany, dia nanao hoe: Ity tokoa no Ilay Mpaminany. '
  '41':
  - type: text
    content: 'Hoy ny sasany: Ity no Kristy. Fa hoy kosa ny sasany: Avy any Galilia va no ihavian’i Kristy? '
  '42':
  - type: text
    content: 'Tsy voalazan’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' va fa Kristy dia avy amin’ny taranak’i Davida, sady avy ao Betlehema, vohitra nonenan’i Davida (Mik. 5.1)? '
  '43':
  - type: text
    content: 'Dia nisara-tsaina ny amin’i Jesosy ny vahoaka. '
  '44':
  - type: text
    content: Ary ny sasany nitady hisambotra Azy; kanefa tsy nisy naninji-tànana taminy.
  '45':
  - type: text
    content: 'Ary ny mpiandry raharaha nankeo amin’ny lohan’ny mpisorona sy ny Fariseo, ka hoy izy ireo taminy: Nahoana hianareo no tsy nitondra Azy? '
  '46':
  - type: text
    content: 'Ny mpiandry raharaha namaly hoe: Tsy mbola nisy olona niteny tahaka izany. '
  '47':
  - type: text
    content: 'Ary ny Fariseo namaly azy hoe: Hianareo koa va voafitaka? '
  '48':
  - type: text
    content: 'Moa misy mpanapaka na Fariseo mba nino Azy? '
  '49':
  - type: text
    content: Fa voaozona ireto vahoaka ireto, izay tsy mahalala ny lalàna.
  '5':
  - type: text
    content: 'Fa na dia ny rahalahiny aza tsy nino Azy. '
  '50':
  - type: text
    content: 'Ary Nikodemosy, anankiray teo aminy, dia ilay nankeo amin’i Jesosy teo aloha, dia nanao taminy hoe: '
  '51':
  - type: text
    content: 'Moa manameloka olona va ny lalàntsika, raha tsy mbola mihaino azy aloha ka mahafantatra izay nataony? '
  '52':
  - type: text
    content: 'Izy ireo namaly ka nanao taminy hoe: Hianao koa angaha mba avy any Galilia? Diniho, dia ho hitanao fa tsy mba misy mpaminany avy any Galilia.'
  - type: heading
    content: Ny amin’ilay vehivavy azo nijangajanga.
  - type: text
    content: '['
  '53':
  - type: text
    content: DIA samy lasa nody ho any an-tranony avy izy rehetra;
  '6':
  - type: text
    content: 'Dia hoy Jesosy taminy: Tsy mbola tonga ny fotoako; fa ny fotoanareo dia vonona lalandava. '
  '7':
  - type: text
    content: 'Tsy mahazo mankahala anareo izao tontolo izao; fa Izaho no halany, satria milaza fa ratsy ny asany. '
  '8':
  - type: text
    content: 'Miakara ho amin’ny andro firavoravoana hianareo; fa Izaho tsy mbola miakatra ho amin’ity andro firavoravoana ity; satria tsy mbola tonga ny fotoako. '
  '9':
  - type: text
    content: Ary rehefa nilaza izany teny izany taminy Izy, dia mbola nitoetra tany Galilia ihany.
