document_id: JHN.7
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny niakaran’i Jesosy tany Jerosalema tamin’ny andro firavoravoana Tabernakely, sy ny nampianarany teo an-kianjan’ny tempoly, ary ny nitadiavan’ny lehibe hisambotra Azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY rehefa afaka izany, dia nandeha tany Galilia Jesosy; fa nalain-kandeha tany Jodia Izy, satria nitady hahafaty Azy ny Jiosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary efa akaiky ny andro firavoravoan’ny Jiosy, dia ny amin’ny Tabernakely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka hoy ny rahalahiny taminy: Mialà eto, ka mandehana ho any Jodia, mba ho hitan’ny mpianatrao koa ny asa izay ataonao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa tsy misy olona manao zavatra amin’ny takona, nefa ny tenany mitady ho hita miharihary; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mitady ho hita fa matoky.
    marker-yv: yv-n
  - type: text
    text: 'raha manao izany zavatra izany Hianao, dia misehoa amin’izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa na dia ny rahalahiny aza tsy nino Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy Jesosy taminy: Tsy mbola tonga ny fotoako; fa ny fotoanareo dia vonona lalandava. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy mahazo mankahala anareo izao tontolo izao; fa Izaho no halany, satria milaza fa ratsy ny asany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Miakara ho amin’ny andro firavoravoana hianareo; fa Izaho tsy mbola miakatra ho amin’ity andro firavoravoana ity; satria tsy mbola tonga ny fotoako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary rehefa nilaza izany teny izany taminy Izy, dia mbola nitoetra tany Galilia ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa rehefa lasa niakatra ho amin’ny andro firavoravoana ny rahalahiny, dia niakatra koa Izy, nefa tsy mba nisehoseho, fa toa niafinafina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny Jiosy dia nitady Azy tamin’ny andro firavoravoana ka nanao hoe: Aiza Izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nitakoritsika Azy be ihany ny vahoaka. Hoy ny sasany: Tsara fanahy Izy; fa hoy kosa ny sasany; Tsia; fa mamitaka ny vahoaka Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nefa tsy nisy sahy niresaka Azy miharihary noho ny fahatahorany ny Jiosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa nisasaka ny andro firavoravoana, dia niakatra teo an-kianjan’ny tempoly Jesosy ka nampianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia gaga ny Jiosy ka nanao hoe: Ahoana no nahaizan’Ilehity soratra, nefa tsy mba nianatra Izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia namaly azy Jesosy ka nanao hoe: Tsy Ahy ny fampianarako, fa an’Izay naniraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha misy olona ta-hanao ny sitrapony, dia hahalala ny amin’ny fampianarana izy, na avy amin’Andriamanitra izany, na miteny ho Ahy Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izay miteny ho azy dia mitady ny voninahitry ny tenany; fa izay mitady ny voninahitr’Izay naniraka azy no marina, ary tsy misy tsi-fahamarinana ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy Mosesy va no nanome anareo ny lalàna? nefa tsy misy eo aminareo mankatò ny lalàna. Nahoana hianareo no mitady hamono Ahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny vahoaka namaly hoe: Manana demonia Hianao; iza no mitady hamono Anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesosy namaly ka nanao taminy hoe: Asa iray loha ihany no nataoko, ka gaga avokoa hianareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izao no nanomezan’i Mosesy anareo ny famorana: tsy noho izy avy tamin’i Mosesy, fa noho izy avy tamin’ny razana, ka na dia amin’ny Sabata aza dia mamora olona ihany hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha amin’ny Sabata aza no amorana olona, mba tsy hahafoana ny lalàn’i Mosesy, dia tezitra amiko va hianareo, satria nisy olona anankiray nataoko sitrana avokoa ny tenany rehetra tamin’ny Sabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aza mitsara araka ny miseho, fa mba mitsarà marina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny mponina sasany tany Jerosalema dia nanao hoe: Tsy Ilehity va Ilay tadiaviny hovonoina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary indro Izy miteny miharihary, nefa tsy misy miteny Azy akory. Sao efa fantatry ny mpanapaka anie fa Io no Kritsy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nefa fantatsika izay nihavian’Ilehio, fa raha avy Kristy, tsy misy mahalala izay hihaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niantso teo an-kianjan’ny tempoly Jesosy, raha nampianatra, ka nanao hoe: Izaho dia fantatrareo, sady fantatrareo koa izay nihaviako; ary tsy avy ho Ahy Aho, fa marina ny naniraka Ahy, Izay tsy fantatrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izaho mahalala Azy; fa Izy no nihaviako, ka Izy no naniraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia nitady hisambotra Azy ny olona; kanefa tsy nisy naninji-tànana taminy, satria tsy mbola tonga ny fotoany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary maro ny vahoaka no nino Azy ka nanao hoe: Raha tonga Kristy, moa hanao famantarana maro mihoatra noho ny nataon’ity Lehilahy ity va Izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny Fariseo nandre ny vahoaka nitakoritsika izany zavatra izany ny aminy; ary ny lohan’ny mpisorona sy ny Fariseo dia naniraka mpiandry raharaha mba hisambotra Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia hoy Jesosy: Kely foana no itoerako aminareo, dia hankany amin’Izay naniraka Ahy Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Hitady Ahy hianareo, fa tsy hahita; ary izay itoerako dia tsy azonareo haleha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia niresaka hoe ny Jiosy: Hankaiza moa no halehan’Ilehity, no tsy ho hitantsika? Hankany amin’izay miely any amin’ny Grika va Izy ka hampianatra ny Grika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ahoana re izao teny nolazainy izao hoe: Hitady Ahy hianareo, fa tsy hahita; ary izay itoerako tsy azonareo haleha?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary tamin’ny andro farany, izay andro lehibe tamin’ny andro firavoravoana, dia nitsangana Jesosy ka niantso nanao hoe: Raha misy olona mangetaheta, aoka izy hanatona Ahy ka hisotro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Izay mino Ahy, dia hisy onin’ny rano velona hiboiboika avy ao an-kibony, araka ny voalazan’ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ary ny Fanahy, Izay efa horaisin’ny mino Azy, no nolazainy tamin’izany; fa ny Fanahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.39 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Fanahy Masina].'
    marker-yv: yv-n
  - type: text
    text: ' tsy mbola '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nomena,
  - type: text
    text: ' satria Jesosy tsy mbola niditra tamin’ny voninahiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny sasany tamin’ny vahoaka, raha nandre izany teny izany, dia nanao hoe: Ity tokoa no Ilay Mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hoy ny sasany: Ity no Kristy. Fa hoy kosa ny sasany: Avy any Galilia va no ihavian’i Kristy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Tsy voalazan’ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: ' va fa Kristy dia avy amin’ny taranak’i Davida, sady avy ao Betlehema, vohitra nonenan’i Davida (Mik. 5.1)? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia nisara-tsaina ny amin’i Jesosy ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ary ny sasany nitady hisambotra Azy; kanefa tsy nisy naninji-tànana taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary ny mpiandry raharaha nankeo amin’ny lohan’ny mpisorona sy ny Fariseo, ka hoy izy ireo taminy: Nahoana hianareo no tsy nitondra Azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ny mpiandry raharaha namaly hoe: Tsy mbola nisy olona niteny tahaka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary ny Fariseo namaly azy hoe: Hianareo koa va voafitaka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Moa misy mpanapaka na Fariseo mba nino Azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Fa voaozona ireto vahoaka ireto, izay tsy mahalala ny lalàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary Nikodemosy, anankiray teo aminy, dia ilay nankeo amin’i Jesosy teo aloha, dia nanao taminy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Moa manameloka olona va ny lalàntsika, raha tsy mbola mihaino azy aloha ka mahafantatra izay nataony? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Izy ireo namaly ka nanao taminy hoe: Hianao koa angaha mba avy any Galilia? Diniho, dia ho hitanao fa tsy mba misy mpaminany avy any Galilia.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ilay vehivavy azo nijangajanga.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: '['
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: DIA samy lasa nody ho any an-tranony avy izy rehetra;
