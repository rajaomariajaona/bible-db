document_id: ISA.40,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Teny mahafaly, fampiononana ny Isiraely.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: AMPIONÒNY, ampionòny ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Andriamanitrareo;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Jehovah Tompo ho avy amin’ny heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ny sandriny ihany no hanapaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny valim-pitia hatolony dia eny aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny valin’asa homeny dia eo anoloany.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hiandry ny ondriny tahaka ny mpiandry ondry Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sandriny no hanangonany ny zanak’ondry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hotrotroiny eo an-tratrany ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary horoahiny miadana ny ampianahany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no namatra ny rano teo am-pelatànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanjehy ny lanitra tamin’ny zehiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy namory ny vovo-tany tamin’ny vata,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ampahatelon’ny efaha.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nandanja ny tendrombohitra tamin’ny fandanjana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny havoana tamin’ny mizana?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nanome hevitra ny Fanahin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza no mpanolo-tsaina nampianatra Azy?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nidinihany ka nanome saina Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nanoro Azy ny làlan’ny fitsarana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nampianatra fahalalana Azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nampahafantatra Azy ny làlan’ny fahendrena?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny firenena dia tahaka ny rano indray mitete avy amin’ny siny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary atao ho tahaka ny vovoka madinika amin’ny mizana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny nosy dia tsintsininy tahaka ny zavatra bitika indrindra.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tahaka ny vovoka madinika paohin’
      - type: usfm
        marker: fk
        children:
        - type: text
          text: ny rivotra.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Libanona aza tsy ampy hataina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny biby ao tsy ampy ho fanatitra dorana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny firenena rehetra dia tahaka ny tsinontsinona eo anatrehany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ataony ho naman’ny tsinontsinona sy ny zava-poana izy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ampitovinareo amin’iza moa Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary endrik’inona no ampanahafinareo Azy?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpiasa manao sarin-javatra an-idina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpanefy volamena mametaka takela-bolemana aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy manao tongalika volafotsy an-idina.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitoria teny soa mahafaly amin’i Jerosalema, ka lazao aminy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa vita ny adiny,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tapitra ny fe-taom-panompoany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady voavela ny helony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa nandray indroa heny tamin’ny tànan’i Jehovah izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho valin’ny fahotana rehetra nataony.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay malahelo ka tsy manan-katerina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia mifidy hazo tsy mety ho lo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mitady mpiasa mahay zavatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hamorona sarin-javatra voasokitra izay tsy hihozongozona.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fantatrareo va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy efa renareo va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy efa nambara taminareo fony taloha va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy efa azonareo an-tsaina va ny amin’ny fanorenan’ny tany?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mipetraka amin’ny habakabaka ambonin’ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mponina etỳ dia tahaka ny valala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mamelatra ny lanitra tahaka ny lamba manify kararavina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manenjana azy tahaka ny lay hitoerana;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mahatsinontsinona ny mpanapaka
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mahatonga ny mpitsara amin’ny tany ho tahaka ny zava-poana.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao nambolena vetivety ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao nafafy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vao namaka tao amin’ny tany ny fotony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia notsofin’Andriamanitra ireo, ka dia nalazo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nindaosin’ny tafio-drivotra tahaka ny vodivary izy.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ampitovinareo amin’iza moa Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitahako aminy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy ny Iray Masina.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato ny masonareo, ka mijere;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no nahary ireny?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no mamoaka ny antokony araka ny isany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy miantso azy rehetra amin’ny anarany avy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny haben’ny fahatanjahany sy ny heriny tsy toha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy diso ireny na dia iray akory aza.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahoana no miteny hianao, ry Jakoba ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary milaza hianao, ry Isiraely ô, hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miafina tsy hitan’i Jehovah ny làlako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihelina tsy hitan’Andriamanitro ny rariny tokony ho ahy?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy fantatrao va?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy efa renao va
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra mandrakizay Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay namorona ny faran’ny tany?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mba mety ho reraka na sasatra Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy takatry ny saina ny fahalalany.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mampahatanjaka ny reraka Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay kely hery dia omeny hery be.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Injany! misy feon’ny miantso hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manamboara làlana any an-efitra ho an’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova làlambe any an-tany foana ho an’Andriamanitsika.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia ny tanora fanahy aza dia ho reraka sy ho sasatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia ny zatovo aza dia mety ho tafintohina mafy;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay miandry an’i Jehovah dia mandroso hery kosa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elatra no hiakarany tahaka ny voromahery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihazakazaka izy, nefa tsy ho sasatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handeha izy, nefa tsy ho reraka.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hasandratra ny lohasaha rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka haetry ny tendrombohitra sy ny havoana rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka ny be havoana ho tonga lembalemba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tany saro-dàlana ho tonga lemaka;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hiseho ny voninahitr’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny nofo rehetra hiara-mahita izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny vavan’i Jehovah no efa niteny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Injany! misy miteny hoe: Miantsoa.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary hoy izy: Ahoana anefa no antso hataoko?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ahitra ny nofo rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hatsaran-tarehiny rehetra dia tahaka ny vonin-javatra any an-tsaha;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maina ny ahitra, malazo ny voniny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsofin’ny fofonain’i Jehovah ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, ahitra tokoa ny olona.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maina ny ahitra, malazo ny voniny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny tenin’Andriamanitsika dia haharitra mandrakizay.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Ziona, izay mitondra teny soa mahafaly ô,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ry ilay mitondra teny soa mahafaly ho an’i Ziona.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miakara any an-tendrombohitra avo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry Jerosalema, izay mitondra teny soa mahafaly ô,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ry ilay mitondra teny soa mahafaly ho an’i Jerosalema.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato mafy ny feonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato, fa aza matahotra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lazao amin’ny tanànan’ny Joda hoe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro Andriamanitrareo!
