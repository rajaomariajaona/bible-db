document_id: ISA.40,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny mahafaly, fampiononana ny Isiraely.
  - type: text
    content: AMPIONÒNY, ampionòny ny oloko,
  - type: text
    content: Hoy Andriamanitrareo;
  '10':
  - type: text
    content: Indro, Jehovah Tompo ho avy amin’ny heriny,
  - type: text
    content: Ka ny sandriny ihany no hanapaka;
  - type: text
    content: Indro, ny valim-pitia hatolony dia eny aminy,
  - type: text
    content: Ary ny valin’asa homeny dia eo anoloany.
  '11':
  - type: text
    content: Hiandry ny ondriny tahaka ny mpiandry ondry Izy;
  - type: text
    content: Ny sandriny no hanangonany ny zanak’ondry,
  - type: text
    content: Ka hotrotroiny eo an-tratrany ireny,
  - type: text
    content: Ary horoahiny miadana ny ampianahany.
  '12':
  - type: text
    content: Iza no namatra ny rano teo am-pelatànany,
  - type: text
    content: Ary nanjehy ny lanitra tamin’ny zehiny,
  - type: text
    content: Sy namory ny vovo-tany tamin’ny vata,
  - type: note
    content: Heb. ampahatelon’ny efaha.
  - type: text
    content: Ary nandanja ny tendrombohitra tamin’ny fandanjana
  - type: text
    content: Sy ny havoana tamin’ny mizana?
  '13':
  - type: text
    content: Iza no nanome hevitra ny Fanahin’i Jehovah,
  - type: text
    content: Ary iza no mpanolo-tsaina nampianatra Azy?
  '14':
  - type: text
    content: Iza no nidinihany ka nanome saina Azy
  - type: text
    content: Sy nanoro Azy ny làlan’ny fitsarana
  - type: text
    content: Ary nampianatra fahalalana Azy
  - type: text
    content: Sy nampahafantatra Azy ny làlan’ny fahendrena?
  '15':
  - type: text
    content: Indro, ny firenena dia tahaka ny rano indray mitete avy amin’ny siny
  - type: text
    content: Ary atao ho tahaka ny vovoka madinika amin’ny mizana;
  - type: text
    content: Indro, ny nosy dia tsintsininy tahaka ny zavatra bitika indrindra.
  - type: note
    content: 'Na: tahaka ny vovoka madinika paohin’ny rivotra.'
  '16':
  - type: text
    content: Ary Libanona aza tsy ampy hataina,
  - type: text
    content: Ary ny biby ao tsy ampy ho fanatitra dorana.
  '17':
  - type: text
    content: Ny firenena rehetra dia tahaka ny tsinontsinona eo anatrehany,
  - type: text
    content: Ka ataony ho naman’ny tsinontsinona sy ny zava-poana izy.
  '18':
  - type: text
    content: Koa ampitovinareo amin’iza moa Andriamanitra?
  - type: text
    content: Ary endrik’inona no ampanahafinareo Azy?
  '19':
  - type: text
    content: Ny mpiasa manao sarin-javatra an-idina,
  - type: text
    content: Ary ny mpanefy volamena mametaka takela-bolemana aminy
  - type: text
    content: Sy manao tongalika volafotsy an-idina.
  '2':
  - type: text
    content: Mitoria teny soa mahafaly amin’i Jerosalema, ka lazao aminy
  - type: text
    content: Fa vita ny adiny,
  - type: note
    content: 'Na: tapitra ny fe-taom-panompoany.'
  - type: text
    content: Sady voavela ny helony,
  - type: text
    content: Ary efa nandray indroa heny tamin’ny tànan’i Jehovah izy
  - type: text
    content: Ho valin’ny fahotana rehetra nataony.
  '20':
  - type: text
    content: Izay malahelo ka tsy manan-katerina
  - type: text
    content: Dia mifidy hazo tsy mety ho lo
  - type: text
    content: Ary mitady mpiasa mahay zavatra
  - type: text
    content: Mba hamorona sarin-javatra voasokitra izay tsy hihozongozona.
  '21':
  - type: text
    content: Tsy fantatrareo va?
  - type: text
    content: Tsy efa renareo va?
  - type: text
    content: Tsy efa nambara taminareo fony taloha va?
  - type: text
    content: Tsy efa azonareo an-tsaina va ny amin’ny fanorenan’ny tany?
  '22':
  - type: text
    content: Izy no mipetraka amin’ny habakabaka ambonin’ny tany,
  - type: text
    content: Ary ny mponina etỳ dia tahaka ny valala;
  - type: text
    content: Izy no mamelatra ny lanitra tahaka ny lamba manify kararavina
  - type: text
    content: Ary manenjana azy tahaka ny lay hitoerana;
  '23':
  - type: text
    content: Izy no mahatsinontsinona ny mpanapaka
  - type: text
    content: Sy mahatonga ny mpitsara amin’ny tany ho tahaka ny zava-poana.
  '24':
  - type: text
    content: Vao nambolena vetivety ireo,
  - type: text
    content: Vao nafafy ireo,
  - type: text
    content: Vao namaka tao amin’ny tany ny fotony,
  - type: text
    content: Dia notsofin’Andriamanitra ireo, ka dia nalazo,
  - type: text
    content: Ary nindaosin’ny tafio-drivotra tahaka ny vodivary izy.
  '25':
  - type: text
    content: Koa ampitovinareo amin’iza moa Aho,
  - type: text
    content: Hitahako aminy?
  - type: text
    content: Hoy ny Iray Masina.
  '26':
  - type: text
    content: Asandrato ny masonareo, ka mijere;
  - type: text
    content: Iza no nahary ireny?
  - type: text
    content: Izy no mamoaka ny antokony araka ny isany
  - type: text
    content: Sy miantso azy rehetra amin’ny anarany avy
  - type: text
    content: Noho ny haben’ny fahatanjahany sy ny heriny tsy toha,
  - type: text
    content: Ka tsy misy diso ireny na dia iray akory aza.
  '27':
  - type: text
    content: Nahoana no miteny hianao, ry Jakoba ô,
  - type: text
    content: 'Ary milaza hianao, ry Isiraely ô, hoe:'
  - type: text
    content: Miafina tsy hitan’i Jehovah ny làlako,
  - type: text
    content: Ary mihelina tsy hitan’Andriamanitro ny rariny tokony ho ahy?
  '28':
  - type: text
    content: Tsy fantatrao va?
  - type: text
    content: Tsy efa renao va
  - type: text
    content: Fa Andriamanitra mandrakizay Jehovah,
  - type: text
    content: Izay namorona ny faran’ny tany?
  - type: text
    content: Tsy mba mety ho reraka na sasatra Izy;
  - type: text
    content: Tsy takatry ny saina ny fahalalany.
  '29':
  - type: text
    content: Mampahatanjaka ny reraka Izy,
  - type: text
    content: Ary izay kely hery dia omeny hery be.
  '3':
  - type: text
    content: 'Injany! misy feon’ny miantso hoe:'
  - type: text
    content: Manamboara làlana any an-efitra ho an’i Jehovah,
  - type: text
    content: Manaova làlambe any an-tany foana ho an’Andriamanitsika.
  '30':
  - type: text
    content: Na dia ny tanora fanahy aza dia ho reraka sy ho sasatra,
  - type: text
    content: Ary na dia ny zatovo aza dia mety ho tafintohina mafy;
  '31':
  - type: text
    content: Fa izay miandry an’i Jehovah dia mandroso hery kosa;
  - type: text
    content: Elatra no hiakarany tahaka ny voromahery;
  - type: text
    content: Hihazakazaka izy, nefa tsy ho sasatra;
  - type: text
    content: Handeha izy, nefa tsy ho reraka.
  '4':
  - type: text
    content: Aoka hasandratra ny lohasaha rehetra,
  - type: text
    content: Aoka haetry ny tendrombohitra sy ny havoana rehetra;
  - type: text
    content: Aoka ny be havoana ho tonga lembalemba,
  - type: text
    content: Ary ny tany saro-dàlana ho tonga lemaka;
  '5':
  - type: text
    content: Dia hiseho ny voninahitr’i Jehovah,
  - type: text
    content: Ary ny nofo rehetra hiara-mahita izany;
  - type: text
    content: Fa ny vavan’i Jehovah no efa niteny.
  '6':
  - type: text
    content: 'Injany! misy miteny hoe: Miantsoa.'
  - type: text
    content: 'Ary hoy izy: Ahoana anefa no antso hataoko?'
  - type: text
    content: Ahitra ny nofo rehetra,
  - type: text
    content: Ary ny hatsaran-tarehiny rehetra dia tahaka ny vonin-javatra any an-tsaha;
  '7':
  - type: text
    content: Maina ny ahitra, malazo ny voniny,
  - type: text
    content: Satria tsofin’ny fofonain’i Jehovah ireny;
  - type: text
    content: Eny, ahitra tokoa ny olona.
  '8':
  - type: text
    content: Maina ny ahitra, malazo ny voniny;
  - type: text
    content: Fa ny tenin’Andriamanitsika dia haharitra mandrakizay.
  '9':
  - type: text
    content: Ry Ziona, izay mitondra teny soa mahafaly ô,
  - type: note
    content: 'Na: Ry ilay mitondra teny soa mahafaly ho an’i Ziona.'
  - type: text
    content: Miakara any an-tendrombohitra avo;
  - type: text
    content: Ry Jerosalema, izay mitondra teny soa mahafaly ô,
  - type: note
    content: 'Na: Ry ilay mitondra teny soa mahafaly ho an’i Jerosalema.'
  - type: text
    content: Asandrato mafy ny feonao,
  - type: text
    content: Asandrato, fa aza matahotra;
  - type: text
    content: Lazao amin’ny tanànan’ny Joda hoe.
  - type: text
    content: Indro Andriamanitrareo!
