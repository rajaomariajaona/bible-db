document_id: GEN.18
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nisehoan’ny anjely telo tamin’i Abrahama.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Jehovah niseho tamin’i Abrahama teo an-kazo terebintan’i Mamre; ary nipetraka teo am-baravaran’ny lainy izy, raha nafana ny andro; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nanopy ny masony izy ka nijery, ary, indreo, nisy telo lahy nijanona teo tandrifiny, ka nony nahita ireo izy, dia niala teo am-baravaran’ny lainy ka nihazakazaka hitsena azy, dia niankohoka tamin’ny tany '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nanao hoe: Tompo ô, raha mahita fitia eto imasonao aho, masìna hianao, aza dia mandalo ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aoka hangalana rano kely hianareo hanasana ny tongotrareo; ary aoka mba hiala sasatra kely eo am-pototry ny hazo hianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia haka mofo kely aho hataonareo ody am-bavafo; ary rehefa afaka izany, dia handeha ihany hianareo; fa tonga atỳ amin’ny mpanomponareo hianareo. Ary hoy izy telo lahy: Ataovy ihany araka izay nolazainao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandeha faingana Abrahama nankany an-day tany amin’i Saraha ka nanao hoe: Faingàna, makà koba tsara toto intelon’ny famarana;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sea.
    marker-yv: yv-n
  - type: text
    text: ' dia fetafetao ka ataovy mofo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Abrahama kosa nihazakazaka nankany amin’ny omby, dia naka zanak’omby tanora sady tsara ka nanolotra azy tamin’ny ankizilahy, dia lasa faingana izy hamboatra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Abrahama naka rononomandry sy ronono ary ilay zanak’omby efa namboariny, dia narosony teo anoloan’izy telo lahy; ary nijanona teo anilany teo ambanin’ny hazo izy, dia nihinana izy telo lahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy izy telo lahy tamin’i Abrahama: Aiza Saraha vadinao? Ary hoy kosa izy: Indro, ao an-day izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Izy: Hiverina aminao tokoa Aho raha avy ny taona toy izao; ary, indro, hanana zazalahy Saraha vadinao.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary Saraha nandre izany teo am-baravaran’ny lay, izay teo ivohon’Ilay niteny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Abrahama sy Saraha dia samy efa zoki-olona ka nandroso fahanterana, ary efa nitsahatra tamin’ny fombam-behivavy Saraha. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Saraha dia nihomehy anakampo ka nanao hoe: Moa mbola hanana hafaliana ihany va aho rehefa tratrantitra toy izao, sady efa antitra koa itompokolahy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Jehovah tamin’i Abrahama: Nahoana no nihomehy Saraha ka nanao hoe: Hiteraka tokoa va aho, kanefa izao efa antitra izao? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa moa misy zavatra mahagaga izay tsy hain’i Jehovah va? Amin’ny fotoan’andro raha avy ny taona toy izao dia hiverina aminao Aho, ary Saraha hanana zazalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nandà Saraha, satria natahotra izy, ka nanao hoe: Tsy nihomehy aho tsy akory. Fa hoy Ilay niteny: Tsia; fa nihomehy mihitsy hianao.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nifonan’i Abrahama ho an’i Sodoma.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: DIA nitsangana ireny lehilahy ireny ka niala teo, dia nitsinjo an’i Sodoma; ary Abrahama niaraka taminy hanatitra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jehovah nanao hoe: Hafeniko amin’i Abrahama va izay hataoko? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Abrahama ho tonga firenena lehibe sy mahery tokoa, ary aminy no hitahiana ny firenena rehetra ambonin’ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa efa nifidy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nahalala.
    marker-yv: yv-n
  - type: text
    text: ' azy Aho mba handidy ny zanany sy ny taranany mandimby azy hitandreman’ireo ny làlan’i Jehovah hanao izay marina sy mahitsy, mba hitondran’i Jehovah amin’i Abrahama izay efa nolazainy taminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Jehovah: Ny fitarainan’i Sodoma sy Gomora dia lehibe tokoa, ary ny fahotany dia mavesatra indrindra; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: hidina Aho ka hizaha na efa nahatanteraka izany tokoa izy araka ny fitarainan’ny tany, izay efa tonga atỳ amiko, na tsia; ary raha tsy izany, dia ho fantatro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia nihodina niala teo ireo lehilahy ireo ka nandroso ho any Sodoma; fa Abrahama kosa mbola nijanona teo anatrehan’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nanatona Abrahama ka nanao hoe: Haringanao miaraka amin’ny meloka va ny marina? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Angamba misy olo-marina dimam-polo ao an-tanàna; haringanao koa va, ka tsy hamindranao fo ny tanàna noho ny dimam-polo marina izay ao? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sanatria Anao raha hanao toy izany ka hamono ny marina miaraka amin’ny meloka, ka ny marina hatao tahaka ny meloka; sanatria Anao izany! tsy hitsara marina va ny Mpitsara ny tany rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy Jehovah: Raha mahita dimam-polo marina ao an-tanàna Sodoma Aho, dia hamindrako fo ny tanàna rehetra noho ireny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia namaly Abrahama ka nanao hoe: Indro, fa efa sahy niteny tamin’ny Tompo aho nefa vovoka sy lavenona: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Angamba ho latsaka dimy ny dimam-polo marina; moa haringanao va ny tanàna rehetra noho ny dimy? Ary hoy Izy: Tsy handringana Aho, raha mahita dimy amby efa-polo ao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia mbola niteny taminy indray izy ka nanao hoe: Angamba efa-polo no ho hita ao. Ary hoy Izy: Tsy mba hanao izany Aho noho ny efa-polo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy izy: Aoka anie mba tsy ho tezitra ny Tompo, fa mbola hiteny aho: Angamba telo-polo no ho hita ao. Ary hoy Izy: Tsy mba hanao izany Aho, raha mahita telo-polo ao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy izy: Indro, fa efa sahy niteny tamin’ny Tompo aho: Angamba roa-polo no ho hita ao. Ary hoy Izy: Tsy mba handringana azy Aho noho ny roa-polo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hoy izy: Aoka anie mba tsy ho tezitra Hianao, Tompo, ô, fa hiteny izao indray mandeha izao ihany aho: Angamba folo no ho hita ao. Ary hoy Izy: Tsy mba handringana Aho noho ny folo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dia lasa nandeha Jehovah, rehefa vita ny teny nataony tamin’i Abrahama; ary Abrahama niverina ho any amin’ny fonenany.
