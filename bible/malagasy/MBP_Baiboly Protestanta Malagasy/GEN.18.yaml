document_id: GEN.18,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nisehoan’ny anjely telo tamin’i Abrahama.
  - type: text
    content: 'ARY Jehovah niseho tamin’i Abrahama teo an-kazo terebintan’i Mamre; ary nipetraka teo am-baravaran’ny lainy izy, raha nafana ny andro; '
  '10':
  - type: text
    content: 'Ary hoy Izy: Hiverina aminao tokoa Aho raha avy ny taona toy izao; ary, indro, hanana zazalahy Saraha vadinao.'
  - type: text
    content: 'Ary Saraha nandre izany teo am-baravaran’ny lay, izay teo ivohon’Ilay niteny. '
  '11':
  - type: text
    content: 'Ary Abrahama sy Saraha dia samy efa zoki-olona ka nandroso fahanterana, ary efa nitsahatra tamin’ny fombam-behivavy Saraha. '
  '12':
  - type: text
    content: 'Ary Saraha dia nihomehy anakampo ka nanao hoe: Moa mbola hanana hafaliana ihany va aho rehefa tratrantitra toy izao, sady efa antitra koa itompokolahy?'
  '13':
  - type: text
    content: 'Ary hoy Jehovah tamin’i Abrahama: Nahoana no nihomehy Saraha ka nanao hoe: Hiteraka tokoa va aho, kanefa izao efa antitra izao? '
  '14':
  - type: text
    content: 'Fa moa misy zavatra mahagaga izay tsy hain’i Jehovah va? Amin’ny fotoan’andro raha avy ny taona toy izao dia hiverina aminao Aho, ary Saraha hanana zazalahy. '
  '15':
  - type: text
    content: 'Dia nandà Saraha, satria natahotra izy, ka nanao hoe: Tsy nihomehy aho tsy akory. Fa hoy Ilay niteny: Tsia; fa nihomehy mihitsy hianao.'
  - type: heading
    content: Ny nifonan’i Abrahama ho an’i Sodoma.
  '16':
  - type: text
    content: DIA nitsangana ireny lehilahy ireny ka niala teo, dia nitsinjo an’i Sodoma; ary Abrahama niaraka taminy hanatitra azy.
  '17':
  - type: text
    content: 'Ary Jehovah nanao hoe: Hafeniko amin’i Abrahama va izay hataoko? '
  '18':
  - type: text
    content: 'Fa Abrahama ho tonga firenena lehibe sy mahery tokoa, ary aminy no hitahiana ny firenena rehetra ambonin’ny tany. '
  '19':
  - type: text
    content: Fa efa nifidy
  - type: note
    content: Heb. nahalala.
  - type: text
    content: ' azy Aho mba handidy ny zanany sy ny taranany mandimby azy hitandreman’ireo ny làlan’i Jehovah hanao izay marina sy mahitsy, mba hitondran’i Jehovah amin’i Abrahama izay efa nolazainy taminy.'
  '2':
  - type: text
    content: 'dia nanopy ny masony izy ka nijery, ary, indreo, nisy telo lahy nijanona teo tandrifiny, ka nony nahita ireo izy, dia niala teo am-baravaran’ny lainy ka nihazakazaka hitsena azy, dia niankohoka tamin’ny tany '
  '20':
  - type: text
    content: 'Ary hoy Jehovah: Ny fitarainan’i Sodoma sy Gomora dia lehibe tokoa, ary ny fahotany dia mavesatra indrindra; '
  '21':
  - type: text
    content: hidina Aho ka hizaha na efa nahatanteraka izany tokoa izy araka ny fitarainan’ny tany, izay efa tonga atỳ amiko, na tsia; ary raha tsy izany, dia ho fantatro.
  '22':
  - type: text
    content: Dia nihodina niala teo ireo lehilahy ireo ka nandroso ho any Sodoma; fa Abrahama kosa mbola nijanona teo anatrehan’i Jehovah.
  '23':
  - type: text
    content: 'Dia nanatona Abrahama ka nanao hoe: Haringanao miaraka amin’ny meloka va ny marina? '
  '24':
  - type: text
    content: 'Angamba misy olo-marina dimam-polo ao an-tanàna; haringanao koa va, ka tsy hamindranao fo ny tanàna noho ny dimam-polo marina izay ao? '
  '25':
  - type: text
    content: 'Sanatria Anao raha hanao toy izany ka hamono ny marina miaraka amin’ny meloka, ka ny marina hatao tahaka ny meloka; sanatria Anao izany! tsy hitsara marina va ny Mpitsara ny tany rehetra? '
  '26':
  - type: text
    content: 'Ary hoy Jehovah: Raha mahita dimam-polo marina ao an-tanàna Sodoma Aho, dia hamindrako fo ny tanàna rehetra noho ireny.'
  '27':
  - type: text
    content: 'Dia namaly Abrahama ka nanao hoe: Indro, fa efa sahy niteny tamin’ny Tompo aho nefa vovoka sy lavenona: '
  '28':
  - type: text
    content: 'Angamba ho latsaka dimy ny dimam-polo marina; moa haringanao va ny tanàna rehetra noho ny dimy? Ary hoy Izy: Tsy handringana Aho, raha mahita dimy amby efa-polo ao.'
  '29':
  - type: text
    content: 'Dia mbola niteny taminy indray izy ka nanao hoe: Angamba efa-polo no ho hita ao. Ary hoy Izy: Tsy mba hanao izany Aho noho ny efa-polo.'
  '3':
  - type: text
    content: 'ka nanao hoe: Tompo ô, raha mahita fitia eto imasonao aho, masìna hianao, aza dia mandalo ny mpanomponao. '
  '30':
  - type: text
    content: 'Ary hoy izy: Aoka anie mba tsy ho tezitra ny Tompo, fa mbola hiteny aho: Angamba telo-polo no ho hita ao. Ary hoy Izy: Tsy mba hanao izany Aho, raha mahita telo-polo ao.'
  '31':
  - type: text
    content: 'Ary hoy izy: Indro, fa efa sahy niteny tamin’ny Tompo aho: Angamba roa-polo no ho hita ao. Ary hoy Izy: Tsy mba handringana azy Aho noho ny roa-polo.'
  '32':
  - type: text
    content: 'Ary hoy izy: Aoka anie mba tsy ho tezitra Hianao, Tompo, ô, fa hiteny izao indray mandeha izao ihany aho: Angamba folo no ho hita ao. Ary hoy Izy: Tsy mba handringana Aho noho ny folo.'
  '33':
  - type: text
    content: Dia lasa nandeha Jehovah, rehefa vita ny teny nataony tamin’i Abrahama; ary Abrahama niverina ho any amin’ny fonenany.
  '4':
  - type: text
    content: 'Aoka hangalana rano kely hianareo hanasana ny tongotrareo; ary aoka mba hiala sasatra kely eo am-pototry ny hazo hianareo; '
  '5':
  - type: text
    content: 'dia haka mofo kely aho hataonareo ody am-bavafo; ary rehefa afaka izany, dia handeha ihany hianareo; fa tonga atỳ amin’ny mpanomponareo hianareo. Ary hoy izy telo lahy: Ataovy ihany araka izay nolazainao.'
  '6':
  - type: text
    content: 'Dia nandeha faingana Abrahama nankany an-day tany amin’i Saraha ka nanao hoe: Faingàna, makà koba tsara toto intelon’ny famarana;'
  - type: note
    content: Heb. sea.
  - type: text
    content: ' dia fetafetao ka ataovy mofo. '
  '7':
  - type: text
    content: 'Ary Abrahama kosa nihazakazaka nankany amin’ny omby, dia naka zanak’omby tanora sady tsara ka nanolotra azy tamin’ny ankizilahy, dia lasa faingana izy hamboatra azy. '
  '8':
  - type: text
    content: Ary Abrahama naka rononomandry sy ronono ary ilay zanak’omby efa namboariny, dia narosony teo anoloan’izy telo lahy; ary nijanona teo anilany teo ambanin’ny hazo izy, dia nihinana izy telo lahy.
  '9':
  - type: text
    content: 'Ary hoy izy telo lahy tamin’i Abrahama: Aiza Saraha vadinao? Ary hoy kosa izy: Indro, ao an-day izy. '
