document_id: JER.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nivadihan’ny Isiraely tamin’ny fanekena nataon’i Jehovah taminy, sy ny nanjo azy noho izany.
  - type: text
    content: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah:'
  '10':
  - type: text
    content: Fa izy niverina nankamin’ny heloky ny razany,
  - type: text
    content: Izay tsy nety nihaino ny teniko,
  - type: text
    content: Ary lasa nanaraka andriamani-kafa izy ka nanompo azy;
  - type: text
    content: Ny taranak’Isiraely sy ny taranak’i Joda efa nivadika ny fanekeko,
  - type: text
    content: Izay nataoko tamin’ny razany.
  '11':
  - type: text
    content: 'Koa izao no lazain’i Jehovah:'
  - type: text
    content: Indro, Izaho hahatonga loza aminy, izay tsy azony handosirana;
  - type: text
    content: Ary na dia hitaraina amiko aza izy,
  - type: text
    content: Dia tsy hihaino azy Aho.
  '12':
  - type: text
    content: Dia handeha ny tanànan’ny Joda sy ny mponina any Jerosalema
  - type: text
    content: Ka hitaraina amin’ireny andriamaniny, izay efa nandoroany ditin-kazo manitra;
  - type: text
    content: Nefa ireny tsy hahavonjy azy akory amin’ny andro fahoriany.
  '13':
  - type: text
    content: Fa araka ny isan’ny tanànanao, ry Joda, no isan’ny andriamanitrao;
  - type: text
    content: Ary araka ny isan’ny làlamben’i Jerosalema no isan’ny alitara naorinareo ho an’ilay mampahamenatra,
  - type: text
    content: Dia alitara handoroana ditin-kazo manitra ho an’i Bala.
  '14':
  - type: text
    content: Koa aza mivavaka ho an’ity firenena ity hianao,
  - type: text
    content: Ary aza manandratra fitarainana na fifonana ho azy;
  - type: text
    content: Fa amin’ny andro izay hitarainany amiko noho ny fahoriany
  - type: text
    content: Dia tsy hihaino azy Aho.
  '15':
  - type: text
    content: Hanao inona ao an-tranoko ny malalako
  - type: text
    content: Fa efa namoron-tsain-dratsy niaraka tamin’ny maro izy,
  - type: text
    content: Ary ny hena masina dia esorina aminao;
  - type: note
    content: 'Na: [Nahoana ny malalako no manao fahavetavetana eto an-tranoko? Moa ny voady sy ny hena masina va no hampiala ny faharatsianao, na hahafahanao handositra?].'
  - type: text
    content: Raha azon-doza hianao, mifalia ary!
  '16':
  - type: text
    content: ',Hazo oliva maitso sady misy voany maha-te-hizaha’'
  - type: text
    content: No nataon’i Jehovah anaranao;
  - type: text
    content: Tamin’ny fihorakorahana be no nandrehetany afo taminy,
  - type: text
    content: Ary notapahina ny rantsany.
  '17':
  - type: text
    content: Fa Jehovah, Tompon’ny maro, Izay namboly anao,
  - type: text
    content: No nanambara ny loza hanjo anao,
  - type: text
    content: Noho ny ratsy nataon’ny taranak’Isiraely sy ny taranak’i Joda,
  - type: text
    content: Izay nahavoa ny tenany ka nahatezitra Ahy,
  - type: text
    content: Dia tamin’ny nandoroany ditin-kazo manitra ho an’i Bala.
  - type: heading
    content: Ny teny nasain’i Jehovah nolazaina ny amin’ny mponina tao Anatota, izay nitady hamono an’i Jeremia
  '18':
  - type: text
    content: ARY nampahafantarin’i Jehovah aho, ka dia nahalala;
  - type: text
    content: Tamin’izany dia nasehonao ahy ny fanaony.
  '19':
  - type: text
    content: Fa izaho dia tahaka ny zanak’ondry bonaika, izay entina hovonoina;
  - type: text
    content: 'Ary tsy fantatro fa izao no tetika nataony namelezany ahy:'
  - type: text
    content: Aoka hosimbantsika ny hazo mbamin’ny voany,
  - type: text
    content: Ary aoka hofongorantsika hiala amin’ny tanin’ny velona izy,
  - type: text
    content: Mba tsy hotsarovana intsony ny anarany.
  '2':
  - type: text
    content: Mihainoa ny tenin’izao fanekena izao hianareo,
  - type: text
    content: Ary mitenena amin’ny Joda
  - type: text
    content: Sy amin’ny mponina any Jerosalema,
  '20':
  - type: text
    content: Nefa, ry Jehovah, Tompon’ny maro ô, Izay mitsara marina
  - type: text
    content: Ka manantatra ny voa sy ny fo–
  - type: text
    content: Aoka ho hitako ny famalianao azy;
  - type: text
    content: Fa aminao no efa nanankinako ny adiko.
  '21':
  - type: text
    content: 'Koa izao no lazain’i Jehovah ny amin’ny mponina ao Anatota, izay mitady ny ainao ka manao hoe: Aza maminany amin’ny anaran’i Jehovah, fandrao matin’ny tànanay hianao,– '
  '22':
  - type: text
    content: 'izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Indro, hovaliako izy,
  - type: text
    content: Ka ny zatovo ho fatin-tsabatra,
  - type: text
    content: Ary ny zanani-lahy sy ny zanani-vavy ho fati-mosary;
  '23':
  - type: text
    content: Ka tsy hisy hiangana izy;
  - type: text
    content: Fa hahatonga loza amin’ny mponina ao Anatota Aho
  - type: text
    content: Amin’ny taona hamaliana azy.
  '3':
  - type: text
    content: 'Ary ataovy aminy hoe:'
  - type: text
    content: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely:'
  - type: text
    content: Ho voaozona izay olona tsy mankatò ny tenin’izao fanekena izao,
  '4':
  - type: text
    content: Izay nandidiako ny razanareo
  - type: text
    content: Tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Egypta,
  - type: text
    content: Dia avy tao amin’ny memy fandrendreham-by,
  - type: text
    content: 'Ka nanaovako hoe: Mihainoa ny feoko,'
  - type: text
    content: Ary mankatoava ireny araka izay rehetra andidiako anareo,
  - type: text
    content: Dia ho oloko hianareo,
  - type: text
    content: Ary Izaho kosa ho Andriamanitrareo,
  '5':
  - type: text
    content: Mba hotoviko ny fianianana izay nianianako tamin’ny razanareo,
  - type: text
    content: Dia ny hanomezana azy tany tondra-dronono sy tantely
  - type: text
    content: Tahaka ny amin’izao anio izao.
  - type: text
    content: 'Dia namaly aho ka nanao hoe: Ho izany tokoa anie,'
  - type: note
    content: Heb. Amena.
  - type: text
    content: ' Jehovah ô!'
  '6':
  - type: text
    content: 'Ary hoy Jehovah tamiko:'
  - type: text
    content: Torio any an-tanànan’ny Joda
  - type: text
    content: 'Sy any an-dàlamben’i Jerosalema izany teny rehetra izany, ka lazao hoe:'
  - type: text
    content: Henoy ny tenin’izao fanekena izao,
  - type: text
    content: Ka ankatoavy izy.
  '7':
  - type: text
    content: Fa nananatra mafy ny razanareo Aho
  - type: text
    content: Tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Egypta
  - type: text
    content: Ka ambaraka andro-any;
  - type: text
    content: 'Eny, nifoha maraina koa Aho ka nananatra hoe:'
  - type: text
    content: Mihainoa ny feoko.
  '8':
  - type: text
    content: Nefa tsy nihaino izy na nanongilana ny sofiny,
  - type: text
    content: Fa samy nandeha tamin’ny ditry ny fo ratsiny ihany izy;
  - type: text
    content: Ka dia nataoko mihatra aminy ny teny rehetra amin’izao fanekena izao,
  - type: text
    content: Ilay nasaiko nataony, nefa tsy nataony.
  '9':
  - type: text
    content: 'Ary hoy koa Jehovah tamiko:'
  - type: text
    content: Misy tetika fikomiana hita ao amin’ny Joda
  - type: text
    content: Sy amin’ny mponina any Jerosalema.
