document_id: JER.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nivadihan’ny Isiraely tamin’ny fanekena nataon’i Jehovah taminy, sy ny nanjo azy noho izany.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa ny tenin’izao fanekena izao hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitenena amin’ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny mponina any Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ataovy aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah, Andriamanitry ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho voaozona izay olona tsy mankatò ny tenin’izao fanekena izao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay nandidiako ny razanareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia avy tao amin’ny memy fandrendreham-by,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka nanaovako hoe: Mihainoa ny feoko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mankatoava ireny araka izay rehetra andidiako anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho oloko hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Izaho kosa ho Andriamanitrareo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mba hotoviko ny fianianana izay nianianako tamin’ny razanareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny hanomezana azy tany tondra-dronono sy tantely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny amin’izao anio izao.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia namaly aho ka nanao hoe: Ho izany tokoa anie,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amena.
    marker-yv: yv-n
  - type: text
    text: ' Jehovah ô!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Jehovah tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Torio any an-tanànan’ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy any an-dàlamben’i Jerosalema izany teny rehetra izany, ka lazao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henoy ny tenin’izao fanekena izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ankatoavy izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa nananatra mafy ny razanareo Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro nitondrako azy nivoaka avy tany amin’ny tany Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ambaraka andro-any;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, nifoha maraina koa Aho ka nananatra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mihainoa ny feoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nefa tsy nihaino izy na nanongilana ny sofiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa samy nandeha tamin’ny ditry ny fo ratsiny ihany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia nataoko mihatra aminy ny teny rehetra amin’izao fanekena izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay nasaiko nataony, nefa tsy nataony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy koa Jehovah tamiko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy tetika fikomiana hita ao amin’ny Joda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny mponina any Jerosalema.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa izy niverina nankamin’ny heloky ny razany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy nety nihaino ny teniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary lasa nanaraka andriamani-kafa izy ka nanompo azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny taranak’Isiraely sy ny taranak’i Joda efa nivadika ny fanekeko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nataoko tamin’ny razany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, Izaho hahatonga loza aminy, izay tsy azony handosirana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia hitaraina amiko aza izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hihaino azy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia handeha ny tanànan’ny Joda sy ny mponina any Jerosalema
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hitaraina amin’ireny andriamaniny, izay efa nandoroany ditin-kazo manitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ireny tsy hahavonjy azy akory amin’ny andro fahoriany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa araka ny isan’ny tanànanao, ry Joda, no isan’ny andriamanitrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary araka ny isan’ny làlamben’i Jerosalema no isan’ny alitara naorinareo ho an’ilay mampahamenatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia alitara handoroana ditin-kazo manitra ho an’i Bala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa aza mivavaka ho an’ity firenena ity hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza manandratra fitarainana na fifonana ho azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa amin’ny andro izay hitarainany amiko noho ny fahoriany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hihaino azy Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hanao inona ao an-tranoko ny malalako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa namoron-tsain-dratsy niaraka tamin’ny maro izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hena masina dia esorina aminao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[Nahoana ny malalako no manao fahavetavetana eto an-tranoko? Moa ny voady sy ny hena masina va no hampiala ny faharatsianao, na hahafahanao handositra?].'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha azon-doza hianao, mifalia ary!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ',Hazo oliva maitso sady misy voany maha-te-hizaha’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nataon’i Jehovah anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny fihorakorahana be no nandrehetany afo taminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary notapahina ny rantsany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa Jehovah, Tompon’ny maro, Izay namboly anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nanambara ny loza hanjo anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny ratsy nataon’ny taranak’Isiraely sy ny taranak’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nahavoa ny tenany ka nahatezitra Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tamin’ny nandoroany ditin-kazo manitra ho an’i Bala.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny nasain’i Jehovah nolazaina ny amin’ny mponina tao Anatota, izay nitady hamono an’i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ARY nampahafantarin’i Jehovah aho, ka dia nahalala;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’izany dia nasehonao ahy ny fanaony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa izaho dia tahaka ny zanak’ondry bonaika, izay entina hovonoina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary tsy fantatro fa izao no tetika nataony namelezany ahy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hosimbantsika ny hazo mbamin’ny voany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hofongorantsika hiala amin’ny tanin’ny velona izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy hotsarovana intsony ny anarany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nefa, ry Jehovah, Tompon’ny maro ô, Izay mitsara marina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manantatra ny voa sy ny fo–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho hitako ny famalianao azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aminao no efa nanankinako ny adiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa izao no lazain’i Jehovah ny amin’ny mponina ao Anatota, izay mitady ny ainao ka manao hoe: Aza maminany amin’ny anaran’i Jehovah, fandrao matin’ny tànanay hianao,– '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'izao no lazain’i Jehovah, Tompon’ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hovaliako izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ny zatovo ho fatin-tsabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zanani-lahy sy ny zanani-vavy ho fati-mosary;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ka tsy hisy hiangana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hahatonga loza amin’ny mponina ao Anatota Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny taona hamaliana azy.
