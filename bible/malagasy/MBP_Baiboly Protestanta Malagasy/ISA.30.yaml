document_id: ISA.30,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hanjo ny Isiraely noho ny nanaovany fihavanana tamin’i Egypta, sy ny mbola hamindrana fo aminy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: LOZAN’ny zaza maditra, izay maka saina, nefa tsy avy amiko, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manao fanekena,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mandrary harato.
      marker-yv: yv-n
    - type: text
      text: ' nefa tsy avy amin’ny Fanahiko,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hanampy ota amin’ny ota,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izay manao amin’ny mpahita hoe: Aza mahita,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary amin’ny mpaminany: Aza maminany zavatra marina aminay:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manaova vava malefaka aminay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maminania fitaka,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mialà amin’ny làlana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mivilia amin’ny aleha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atsaharo ny Iray Masin’ny Isiraely tsy ho eo anoloanay intsony.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa izao no lazain’ny Iray Masin’ny Isiraely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria mandà izany teny izany hianareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary matoky ny fanaovana an-keriny sy ny fiolakolahana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miankina amin’izany,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia ho aminareo ity heloka ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka izay mivava efa mila hianjera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy izay mibohitra amin’ny mànda avo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho tampoka dia tampoka no haharavany.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary hovakivakina izy tahaka ny fahavakivakin’ny vilanin’ny mpanefy tanimanga,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha montsamontsaniny ka tsy itondrany roa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa rehefa montsamontsana izy, dia tsy hisy vàkiny ho azo atao fangalana afo ao am-patana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ho azo atao fangalan-drano ao an-davaka famorian-drano aza.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa izao no lazain’ny Tompo, dia Jehovah, ny Iray Masin’ny Isiraely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fiverenana sy ny fitsaharana no hamonjena anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fanginana sy ny fahatokiana no hisian’ny herinareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy nety hianareo;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa hoy kosa hianareo: Tsia, fa handositra mitaingin-tsoavaly izahay;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa noho izany dia handositra tokoa hianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary hoy hianareo: Hitaingina ny faingan-tongotra izahay;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho faingan-tongotra koa ny manenjika anareo.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny arivo handositra, raha rahonan’ny anankiray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, handositra hianareo, raha rahonan’ny dimy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahatongan’ny sisa aminareo ho tahaka ny to-kazo avo any an-tampon’ny tendrombohitra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny faneva any amin’ny havoana.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Koa Jehovah dia mbola hiandry mandra-pamindrany fo aminareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mbola hitoetra any amin’ny avo Izy mandra-piantrany anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitry ny fahamarinana Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay rehetra miandry Azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fa hianao, ry firenena mitoetra ao Ziona any Jerosalema,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy hitomany intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hamindra fo aminao tokoa Izy, raha reny ny fitarainanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, raha vao reny izany, dia hamaly anao Izy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia izay mandeha hidina any Egypta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy nanadina tamin’ny vavako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handositra ho any amin’ny fiarovana mafin’i Farao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hialokaloka ao amin’ny alokalok’i Egypta.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary homen’ny Tompo mofo fahoriana sy ny rano fahalahelovana hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hiery intsony ny mpampianatra anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny masonao hahita ny mpampianatra anao;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa na mivily ho amin’ny ankavanana hianao, na mivily ho amin’ny ankavia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny sofinao dia handre teny ao ivohonao manao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ity no làlana, ka andehano.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary holotoinao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: holotoinareo.
      marker-yv: yv-n
    - type: text
      text: ' ny takela-bolafotsy voapetaka amin’ny sampinao voasokitra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny takela-bolamena voapetaka amin’ny sampinao an-idina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka harianao tahaka ny lamba maloto izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mialà amiko! no teny hataonao aminy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary dia hanome ranonorana ho an’ny voa nafafinao any an-tsaha Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy mofo vokatry ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsara no vokatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’izany andro izany ny ombinao dia hihinana eny amin’ny tany malalaka;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ny omby sy ny boriky tanora, izay miasa ny tany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hihinana vilona voaisy sira, izay voatsikerakera amin’ny sahiratsy sy ny fikororohana.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary any amin’ny tendrombohitra avo rehetra sy ny havoana andrandraina rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hisy ony sy ranovelona amin’ny andro lehibe famonoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia amin’ny andro hianjeran’ny tilikambo.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary ny fahazavan’ny volana dia ho tahaka ny fahazavan’ny masoandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fahazavan’ny masoandro dia ho avy fito heny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho tahaka ny fahazavan’ny hafitoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny andro hamehezan’i Jehovah ny fahatorotoroan’ny olony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hanasitranany ny fery tamin’ny namelezana azy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Indro, avy any lavitra any ny anaran’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mirehitra amin’ny fahatezerany Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady midonaka amin’ny setroka be;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny molony dia feno fahatezerana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lelany dia tahaka ny afo mandevona;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary ny fofonainy tahaka ny riaka manafotra havozona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanasivana ny firenena amin’ny sivana fandevonana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hisy lamboridy mampivily eo amin’ny valanoranon’ny olona.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary ny hira hataonao dia ho tahaka ny amin’ny alina fitandremana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fanamasinana.
      marker-yv: yv-n
    - type: text
      text: ' ny andro firavoravoana,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny hafalian’ny fo dia ho tahaka ny olona mandeha omban’ny feon-tsodina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any an-tendrombohitr’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia any amin’ny Vatolampin’ny Isiraely;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Kanjo ho tonga henatra ho azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anareo.
      marker-yv: yv-n
    - type: text
      text: ' ny fiarovana mafin’i Farao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho fanalam-baraka azy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anareo.
      marker-yv: yv-n
    - type: text
      text: ' ny fialokalofany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fialokalofanareo.
      marker-yv: yv-n
    - type: text
      text: ' ao amin’ny alokalok’i Egypta.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary Jehovah hanandratra ny feon’ny fiandrianany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hampiseho ny fiantefan’ny sandriny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny firehetan’ny fahatezerana sy ny lelafo mandevona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny ranonoram-baratra sy ny orana mifafy ary ny havandra vaventy.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa ny feon’i Jehovah dia haharaiki-tahotra ny Asyriana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hasiany amin’ny tsorakazo ireo.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary na aiza na aiza no amelezan’ny tsorakazo voatendry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay amelin’i Jehovah azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia harahina ampongatapaka sy lokanga izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny ady hamelezany mafy no hiadiany aminy.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa efa voavoatra fahataloha Tofeta;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, efa nataony vonona ho an’ny mpanjaka izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nataony lalina sady malalaka izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny antontany dia misy afo sy kitay betsaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fofonain’i Jehovah, izay tahaka ny renirano solifara, no mampirehitra azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tonga any Zoana ireo lehibeny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tonga any Hanesa ny irany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izy rehetra dia samy hahazo henatra noho ny amin’ny firenena tsy mahasoa azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izay tsy mahavonjy na mahasoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tonga henatra sy latsa kosa.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Faminaniana ny amin’ny behemota
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hipopotamosy.
      marker-yv: yv-n
    - type: text
      text: ' any amin’ny tany atsimo.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any amin’ny tany mampahory sy mahaporiporitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay ihavian’ny liom-bavy sy ny lion-dahy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny menarana sy ny menaran’afo manidina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No nitondrany ny hareny teny an-damosin’ny boriky tanora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fananany teo amin’ny trafon’ny rameva
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho any amin’ny firenena tsy mahasoa azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nefa zava-poana sy tsinontsinona ny famonjen’ny Egyptiana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izany no nanaovako azy hoe: Ilay be rehaka tsy mety manao na inona na inona!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rehareha foana ireny, ka aoka izay!
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mandehana ankehitriny, soraty amin’ny fàfana eo anatrehany izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary soraty amin’ny taratasy,
  - type: usfm
    marker: q1
    children:
    - type: text
