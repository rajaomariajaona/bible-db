document_id: ISA.30,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hanjo ny Isiraely noho ny nanaovany fihavanana tamin’i Egypta, sy ny mbola hamindrana fo aminy.
  - type: text
    content: LOZAN’ny zaza maditra, izay maka saina, nefa tsy avy amiko, hoy Jehovah,
  - type: text
    content: Ary manao fanekena,
  - type: note
    content: Heb. mandrary harato.
  - type: text
    content: ' nefa tsy avy amin’ny Fanahiko,'
  - type: text
    content: Mba hanampy ota amin’ny ota,
  '10':
  - type: text
    content: 'Izay manao amin’ny mpahita hoe: Aza mahita,'
  - type: text
    content: 'Ary amin’ny mpaminany: Aza maminany zavatra marina aminay:'
  - type: text
    content: Manaova vava malefaka aminay,
  - type: text
    content: Maminania fitaka,
  '11':
  - type: text
    content: Mialà amin’ny làlana,
  - type: text
    content: Mivilia amin’ny aleha;
  - type: text
    content: Atsaharo ny Iray Masin’ny Isiraely tsy ho eo anoloanay intsony.
  '12':
  - type: text
    content: 'Koa izao no lazain’ny Iray Masin’ny Isiraely:'
  - type: text
    content: Satria mandà izany teny izany hianareo
  - type: text
    content: Ary matoky ny fanaovana an-keriny sy ny fiolakolahana
  - type: text
    content: Ka miankina amin’izany,
  '13':
  - type: text
    content: Dia ho aminareo ity heloka ity,
  - type: text
    content: Tahaka izay mivava efa mila hianjera
  - type: text
    content: Sy izay mibohitra amin’ny mànda avo,
  - type: text
    content: Ka ho tampoka dia tampoka no haharavany.
  '14':
  - type: text
    content: Ary hovakivakina izy tahaka ny fahavakivakin’ny vilanin’ny mpanefy tanimanga,
  - type: text
    content: Raha montsamontsaniny ka tsy itondrany roa;
  - type: text
    content: Koa rehefa montsamontsana izy, dia tsy hisy vàkiny ho azo atao fangalana afo ao am-patana,
  - type: text
    content: Na ho azo atao fangalan-drano ao an-davaka famorian-drano aza.
  '15':
  - type: text
    content: 'Fa izao no lazain’ny Tompo, dia Jehovah, ny Iray Masin’ny Isiraely:'
  - type: text
    content: Amin’ny fiverenana sy ny fitsaharana no hamonjena anareo,
  - type: text
    content: Amin’ny fanginana sy ny fahatokiana no hisian’ny herinareo;
  - type: text
    content: Nefa tsy nety hianareo;
  '16':
  - type: text
    content: 'Fa hoy kosa hianareo: Tsia, fa handositra mitaingin-tsoavaly izahay;'
  - type: text
    content: Koa noho izany dia handositra tokoa hianareo;
  - type: text
    content: 'Ary hoy hianareo: Hitaingina ny faingan-tongotra izahay;'
  - type: text
    content: Ka dia ho faingan-tongotra koa ny manenjika anareo.
  '17':
  - type: text
    content: Ny arivo handositra, raha rahonan’ny anankiray,
  - type: text
    content: Eny, handositra hianareo, raha rahonan’ny dimy,
  - type: text
    content: Mandra-pahatongan’ny sisa aminareo ho tahaka ny to-kazo avo any an-tampon’ny tendrombohitra
  - type: text
    content: Sy tahaka ny faneva any amin’ny havoana.
  '18':
  - type: text
    content: Koa Jehovah dia mbola hiandry mandra-pamindrany fo aminareo,
  - type: text
    content: Ary mbola hitoetra any amin’ny avo Izy mandra-piantrany anareo;
  - type: text
    content: Fa Andriamanitry ny fahamarinana Jehovah;
  - type: text
    content: Sambatra izay rehetra miandry Azy.
  '19':
  - type: text
    content: Fa hianao, ry firenena mitoetra ao Ziona any Jerosalema,
  - type: text
    content: Dia tsy hitomany intsony;
  - type: text
    content: Fa hamindra fo aminao tokoa Izy, raha reny ny fitarainanao;
  - type: text
    content: Eny, raha vao reny izany, dia hamaly anao Izy.
  '2':
  - type: text
    content: Dia izay mandeha hidina any Egypta,
  - type: text
    content: Nefa tsy nanadina tamin’ny vavako,
  - type: text
    content: Handositra ho any amin’ny fiarovana mafin’i Farao
  - type: text
    content: Sy hialokaloka ao amin’ny alokalok’i Egypta.
  '20':
  - type: text
    content: Ary homen’ny Tompo mofo fahoriana sy ny rano fahalahelovana hianao;
  - type: text
    content: Ary tsy hiery intsony ny mpampianatra anao;
  - type: text
    content: Ny masonao hahita ny mpampianatra anao;
  '21':
  - type: text
    content: Fa na mivily ho amin’ny ankavanana hianao, na mivily ho amin’ny ankavia,
  - type: text
    content: 'Ny sofinao dia handre teny ao ivohonao manao hoe:'
  - type: text
    content: Ity no làlana, ka andehano.
  '22':
  - type: text
    content: Ary holotoinao
  - type: note
    content: Heb. holotoinareo.
  - type: text
    content: ' ny takela-bolafotsy voapetaka amin’ny sampinao voasokitra'
  - type: text
    content: Sy ny takela-bolamena voapetaka amin’ny sampinao an-idina,
  - type: text
    content: Ka harianao tahaka ny lamba maloto izany;
  - type: text
    content: Mialà amiko! no teny hataonao aminy.
  '23':
  - type: text
    content: Ary dia hanome ranonorana ho an’ny voa nafafinao any an-tsaha Izy,
  - type: text
    content: Sy mofo vokatry ny tany
  - type: text
    content: Sady tsara no vokatra;
  - type: text
    content: Ary amin’izany andro izany ny ombinao dia hihinana eny amin’ny tany malalaka;
  '24':
  - type: text
    content: Ny omby sy ny boriky tanora, izay miasa ny tany,
  - type: text
    content: Dia hihinana vilona voaisy sira, izay voatsikerakera amin’ny sahiratsy sy ny fikororohana.
  '25':
  - type: text
    content: Ary any amin’ny tendrombohitra avo rehetra sy ny havoana andrandraina rehetra
  - type: text
    content: Dia hisy ony sy ranovelona amin’ny andro lehibe famonoana,
  - type: text
    content: Dia amin’ny andro hianjeran’ny tilikambo.
  '26':
  - type: text
    content: Ary ny fahazavan’ny volana dia ho tahaka ny fahazavan’ny masoandro,
  - type: text
    content: Ary ny fahazavan’ny masoandro dia ho avy fito heny,
  - type: text
    content: Ka ho tahaka ny fahazavan’ny hafitoana,
  - type: text
    content: Amin’ny andro hamehezan’i Jehovah ny fahatorotoroan’ny olony,
  - type: text
    content: Sy hanasitranany ny fery tamin’ny namelezana azy.
  '27':
  - type: text
    content: Indro, avy any lavitra any ny anaran’i Jehovah,
  - type: text
    content: Mirehitra amin’ny fahatezerany Izy
  - type: text
    content: Sady midonaka amin’ny setroka be;
  - type: text
    content: Ny molony dia feno fahatezerana,
  - type: text
    content: Ary ny lelany dia tahaka ny afo mandevona;
  '28':
  - type: text
    content: Ary ny fofonainy tahaka ny riaka manafotra havozona,
  - type: text
    content: Hanasivana ny firenena amin’ny sivana fandevonana,
  - type: text
    content: Ary hisy lamboridy mampivily eo amin’ny valanoranon’ny olona.
  '29':
  - type: text
    content: Ary ny hira hataonao dia ho tahaka ny amin’ny alina fitandremana
  - type: note
    content: Heb. fanamasinana.
  - type: text
    content: ' ny andro firavoravoana,'
  - type: text
    content: Ary ny hafalian’ny fo dia ho tahaka ny olona mandeha omban’ny feon-tsodina
  - type: text
    content: Ho any an-tendrombohitr’i Jehovah,
  - type: text
    content: Dia any amin’ny Vatolampin’ny Isiraely;
  '3':
  - type: text
    content: Kanjo ho tonga henatra ho azy
  - type: note
    content: Heb. anareo.
  - type: text
    content: ' ny fiarovana mafin’i Farao,'
  - type: text
    content: Ary ho fanalam-baraka azy
  - type: note
    content: Heb. anareo.
  - type: text
    content: ' ny fialokalofany'
  - type: note
    content: Heb. fialokalofanareo.
  - type: text
    content: ' ao amin’ny alokalok’i Egypta.'
  '30':
  - type: text
    content: Ary Jehovah hanandratra ny feon’ny fiandrianany
  - type: text
    content: Sy hampiseho ny fiantefan’ny sandriny
  - type: text
    content: Amin’ny firehetan’ny fahatezerana sy ny lelafo mandevona
  - type: text
    content: Sy ny ranonoram-baratra sy ny orana mifafy ary ny havandra vaventy.
  '31':
  - type: text
    content: Fa ny feon’i Jehovah dia haharaiki-tahotra ny Asyriana;
  - type: text
    content: Hasiany amin’ny tsorakazo ireo.
  '32':
  - type: text
    content: Ary na aiza na aiza no amelezan’ny tsorakazo voatendry,
  - type: text
    content: Izay amelin’i Jehovah azy,
  - type: text
    content: Dia harahina ampongatapaka sy lokanga izany;
  - type: text
    content: Ary amin’ny ady hamelezany mafy no hiadiany aminy.
  '33':
  - type: text
    content: Fa efa voavoatra fahataloha Tofeta;
  - type: text
    content: Eny, efa nataony vonona ho an’ny mpanjaka izany;
  - type: text
    content: Efa nataony lalina sady malalaka izy;
  - type: text
    content: Ny antontany dia misy afo sy kitay betsaka;
  - type: text
    content: Ary ny fofonain’i Jehovah, izay tahaka ny renirano solifara, no mampirehitra azy.
  '4':
  - type: text
    content: Fa tonga any Zoana ireo lehibeny,
  - type: text
    content: Ary tonga any Hanesa ny irany.
  '5':
  - type: text
    content: Izy rehetra dia samy hahazo henatra noho ny amin’ny firenena tsy mahasoa azy,
  - type: text
    content: Dia izay tsy mahavonjy na mahasoa,
  - type: text
    content: Fa tonga henatra sy latsa kosa.
  '6':
  - type: text
    content: Faminaniana ny amin’ny behemota
  - type: note
    content: hipopotamosy.
  - type: text
    content: ' any amin’ny tany atsimo.'
  - type: text
    content: Any amin’ny tany mampahory sy mahaporiporitra,
  - type: text
    content: Izay ihavian’ny liom-bavy sy ny lion-dahy
  - type: text
    content: Ary ny menarana sy ny menaran’afo manidina,
  - type: text
    content: No nitondrany ny hareny teny an-damosin’ny boriky tanora
  - type: text
    content: Ary ny fananany teo amin’ny trafon’ny rameva
  - type: text
    content: Ho any amin’ny firenena tsy mahasoa azy.
  '7':
  - type: text
    content: Nefa zava-poana sy tsinontsinona ny famonjen’ny Egyptiana;
  - type: text
    content: 'Koa izany no nanaovako azy hoe: Ilay be rehaka tsy mety manao na inona na inona!'
  - type: note
    content: 'Na: Rehareha foana ireny, ka aoka izay!'
  '8':
  - type: text
    content: Mandehana ankehitriny, soraty amin’ny fàfana eo anatrehany izany,
  - type: text
    content: Ary soraty amin’ny taratasy,
  - type: text
    content: Mba haharitra amin’ny andro any aoriana mandrakizay doria izany.
  '9':
  - type: text
    content: Fa firenena maditra izy, zaza mandainga,
  - type: text
    content: Dia zaza izay tsy mety mihaino ny lalàn’i Jehovah,–
