document_id: PSA.84,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Alahelo ny tranon’Andriamanitra.
  - type: text
    content: Ho an’ny mpiventy hira. Al-hagitith. Salamo nataon’ny Koraïta.
  - type: text
    content: ENDREY ny hatsaran’ny tabernakelinao, Jehovah, Tompon’ny maro, ô!
  '10':
  - type: text
    content: Fa ny indray andro eo an-kianjanao dia tsara noho ny arivo;
  - type: text
    content: Aleoko mipetraka eo amin’ny tokonam-baravaran’ny tranon’Andriamanitra,
  - type: text
    content: Toy izay mitoetra ao an-dain’ny ratsy fanahy.
  '11':
  - type: text
    content: Fa Masoandro sy Ampinga Jehovah Andriamanitra;
  - type: text
    content: Fahasoavana sy voninahitra no homen’i Jehovah;
  - type: text
    content: Tsy hiaro zava-tsoa amin’izay mandeha amin’ny fahitsiana Izy.
  '12':
  - type: text
    content: Jehovah, Tompon’ny maro, ô,
  - type: text
    content: Sambatra izay olona matoky Anao.
  '2':
  - type: text
    content: Manina sady vonton’alahelo ny kianjan’i Jehovah ny fanahiko;
  - type: text
    content: Ny foko sy ny nofoko mihoby an’Andriamanitra velona.
  '3':
  - type: text
    content: Eny, ny tsikirity mahita trano,
  - type: text
    content: Ary ny sidintsidina mahita akany ho azy hametrahany ny zanany,
  - type: text
    content: Dia ny alitaranao, Jehovah, Tompon’ny maro, ô,
  - type: text
    content: Mpanjakako sy Andriamanitro.
  '4':
  - type: text
    content: Sambatra izay mitoetra ao an-tranonao;
  - type: text
    content: Hidera Anao mandrakariva izy.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Sambatra izay olona manan-kery avy aminao;
  - type: text
    content: Ao am-pony ny làlana.
  '6':
  - type: text
    content: Raha mandeha mamaky ny lohasaha Baka
  - type: note
    content: Baka = Fitomaniana.
  - type: text
    content: ' izy,'
  - type: text
    content: Dia ataony misy loharano izany, ary ny loha-orana manarom-pitahiana azy.
  '7':
  - type: text
    content: Miampy hery eny am-pandehanana izy;
  - type: text
    content: Samy miseho eo anatrehan’Andriamanitra any Ziona izy rehetra.
  '8':
  - type: text
    content: Jehovah, Andriamanitry ny maro, ô, henoy ny fivavako;
  - type: text
    content: Mandrenesa, ry Andriamanitr’i Jakoba ô.
  - type: text
    content: '[Sela.]'
  '9':
  - type: text
    content: Andriamanitra, Ampinganay, ô, tsinjovy,
  - type: text
    content: Ka jereo ny tavan’ny voahosotrao.
