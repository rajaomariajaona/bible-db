document_id: PSA.84,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Alahelo ny tranon’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Al-hagitith. Salamo nataon’ny Koraïta.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ENDREY ny hatsaran’ny tabernakelinao, Jehovah, Tompon’ny maro, ô!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ny indray andro eo an-kianjanao dia tsara noho ny arivo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aleoko mipetraka eo amin’ny tokonam-baravaran’ny tranon’Andriamanitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy izay mitoetra ao an-dain’ny ratsy fanahy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa Masoandro sy Ampinga Jehovah Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahasoavana sy voninahitra no homen’i Jehovah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hiaro zava-tsoa amin’izay mandeha amin’ny fahitsiana Izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Jehovah, Tompon’ny maro, ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra izay olona matoky Anao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Manina sady vonton’alahelo ny kianjan’i Jehovah ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny foko sy ny nofoko mihoby an’Andriamanitra velona.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eny, ny tsikirity mahita trano,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sidintsidina mahita akany ho azy hametrahany ny zanany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny alitaranao, Jehovah, Tompon’ny maro, ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mpanjakako sy Andriamanitro.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Sambatra izay mitoetra ao an-tranonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidera Anao mandrakariva izy.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Sambatra izay olona manan-kery avy aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao am-pony ny làlana.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Raha mandeha mamaky ny lohasaha Baka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Baka = Fitomaniana.
      marker-yv: yv-n
    - type: text
      text: ' izy,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ataony misy loharano izany, ary ny loha-orana manarom-pitahiana azy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Miampy hery eny am-pandehanana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy miseho eo anatrehan’Andriamanitra any Ziona izy rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jehovah, Andriamanitry ny maro, ô, henoy ny fivavako;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandrenesa, ry Andriamanitr’i Jakoba ô.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Andriamanitra, Ampinganay, ô, tsinjovy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka jereo ny tavan’ny voahosotrao.
