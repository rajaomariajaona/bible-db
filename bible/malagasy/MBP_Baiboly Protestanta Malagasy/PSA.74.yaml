document_id: PSA.74
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainana tamin’Andriamanitra, satria mafy ny fanenjehana, sady nosimbana ny tempoly.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maskila nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA ô, nahoana no nanary anay mandrakizay Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manetroka amin’ny ondry fiandrinao ny fahatezeranao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsarovy ny fiangonanao izay efa azonao fahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ilay navotanao ho firenena lovanao, dia ny tendrombohitra Ziona izay nonenanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aingao ny tongotrao, ka miakara ho amin’ny voarava mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zavatra rehetra tao amin’ny fitoerana masina dia simban’ny fahavalo avokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nierona tao anatin’ny fiangonanao ny mpandrafy anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanangana ny sainany ho famantarana izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny fijery azy dia tahaka ny olona manainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: Famaky hijinja ny ala mikitroka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary amin’izao ny rafitra misoratra rehetra ao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia asiany ny famaky sy ny kanonta.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa nandoro ny fitoeranao masina tamin’ny afo izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nolotoiny sy nazerany tamin’ny tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '74.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nolotoiny hatramin’ny tany.
    marker-yv: yv-n
  - type: text
    text: ' ny fonenan’ny anaranao.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy izy tam-pony: Aoka hampahorintsika avokoa izy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nandoro ny tranon’Andriamanitra eran’ny tany rehetra izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy hitanay ny famantaranay–tsy misy mpaminany intsony–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy aminay mahalala izay mbola haharetan’izao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mandra-pahoviana, Andriamanitra ô, no hanaratsian’ny mpandrafy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanamavo ny anaranao mandrakizay va ny fahavalo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nahoana no mampihemotra ny tànanao, dia ny tànanao ankavanana, Hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampialà azy amin’ny tratranao, ka mandringàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa Andriamanitra no Mpanjakako hatrizay hatrizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manao famonjena eny amin’ny tany Izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nampisaraka ny ranomasina tamin’ny herinao Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa namakivaky ny lohan’ny dragona tao anaty rano Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hianao nanorotoro ny lohan’ny mamba
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanome azy hohanin’izay firenena any an-efitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hianao namaky ny vatolampy hamoaka loharano sy ony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao nahatankina ny ony tsy mety ritra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Anao ny andro, Anao koa ny alina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao namboatra ny fanazavana, indrindra fa ny masoandro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hianao nametra ny faritry ny tany rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahavaratra sy ny ririnina, dia Hianao no nanao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsarovy izao: Manaratsy an’i Jehovah ny fahavalo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olona adala manamavo ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aza manolotra ny ain’ny voromailalanao ho an’ny bibi-dia;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza manadino mandrakizay ny ain’ny olo-mahantranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hevero ny fanekena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa feno fonenan’ny fandozana ny fitoera-maizina amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aoka tsy hiverina amin-kenatra ny mahantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny ory sy ny malahelo hidera ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mitsangàna, Andriamanitra ô, efao ny adinao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsarovy ny fanaratsian’ny adala Anao isan-andro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aza manadino ny feon’ny rafinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny fitabataban’ny mpanohitra Anao, izay miakatra mandrakariva.
