document_id: PSA.74,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana tamin’Andriamanitra, satria mafy ny fanenjehana, sady nosimbana ny tempoly.
  - type: text
    content: Maskila nataon’i Asafa.
  - type: text
    content: ANDRIAMANITRA ô, nahoana no nanary anay mandrakizay Hianao,
  - type: text
    content: Sady manetroka amin’ny ondry fiandrinao ny fahatezeranao?
  '10':
  - type: text
    content: Mandra-pahoviana, Andriamanitra ô, no hanaratsian’ny mpandrafy?
  - type: text
    content: Hanamavo ny anaranao mandrakizay va ny fahavalo?
  '11':
  - type: text
    content: Nahoana no mampihemotra ny tànanao, dia ny tànanao ankavanana, Hianao?
  - type: text
    content: Mampialà azy amin’ny tratranao, ka mandringàna.
  '12':
  - type: text
    content: Fa Andriamanitra no Mpanjakako hatrizay hatrizay;
  - type: text
    content: Manao famonjena eny amin’ny tany Izy.
  '13':
  - type: text
    content: Nampisaraka ny ranomasina tamin’ny herinao Hianao;
  - type: text
    content: Efa namakivaky ny lohan’ny dragona tao anaty rano Hianao.
  '14':
  - type: text
    content: Hianao nanorotoro ny lohan’ny mamba
  - type: text
    content: Ka nanome azy hohanin’izay firenena any an-efitra.
  '15':
  - type: text
    content: Hianao namaky ny vatolampy hamoaka loharano sy ony;
  - type: text
    content: Hianao nahatankina ny ony tsy mety ritra.
  '16':
  - type: text
    content: Anao ny andro, Anao koa ny alina;
  - type: text
    content: Hianao namboatra ny fanazavana, indrindra fa ny masoandro.
  '17':
  - type: text
    content: Hianao nametra ny faritry ny tany rehetra;
  - type: text
    content: Ny fahavaratra sy ny ririnina, dia Hianao no nanao azy.
  '18':
  - type: text
    content: 'Tsarovy izao: Manaratsy an’i Jehovah ny fahavalo,'
  - type: text
    content: Ary ny olona adala manamavo ny anaranao.
  '19':
  - type: text
    content: Aza manolotra ny ain’ny voromailalanao ho an’ny bibi-dia;
  - type: text
    content: Ary aza manadino mandrakizay ny ain’ny olo-mahantranao.
  '2':
  - type: text
    content: Tsarovy ny fiangonanao izay efa azonao fahiny,
  - type: text
    content: Ilay navotanao ho firenena lovanao, dia ny tendrombohitra Ziona izay nonenanao.
  '20':
  - type: text
    content: Hevero ny fanekena;
  - type: text
    content: Fa feno fonenan’ny fandozana ny fitoera-maizina amin’ny tany.
  '21':
  - type: text
    content: Aoka tsy hiverina amin-kenatra ny mahantra;
  - type: text
    content: Aoka ny ory sy ny malahelo hidera ny anaranao.
  '22':
  - type: text
    content: Mitsangàna, Andriamanitra ô, efao ny adinao;
  - type: text
    content: Tsarovy ny fanaratsian’ny adala Anao isan-andro.
  '23':
  - type: text
    content: Aza manadino ny feon’ny rafinao,
  - type: text
    content: Dia ny fitabataban’ny mpanohitra Anao, izay miakatra mandrakariva.
  '3':
  - type: text
    content: Aingao ny tongotrao, ka miakara ho amin’ny voarava mandrakizay;
  - type: text
    content: Ny zavatra rehetra tao amin’ny fitoerana masina dia simban’ny fahavalo avokoa.
  '4':
  - type: text
    content: Nierona tao anatin’ny fiangonanao ny mpandrafy anao;
  - type: text
    content: Nanangana ny sainany ho famantarana izy.
  '5':
  - type: text
    content: Ny fijery azy dia tahaka ny olona manainga
  - type: text
    content: Famaky hijinja ny ala mikitroka;
  '6':
  - type: text
    content: Ary amin’izao ny rafitra misoratra rehetra ao
  - type: text
    content: Dia asiany ny famaky sy ny kanonta.
  '7':
  - type: text
    content: Efa nandoro ny fitoeranao masina tamin’ny afo izy;
  - type: text
    content: Nolotoiny sy nazerany tamin’ny tany
  - type: note
    content: Heb. Nolotoiny hatramin’ny tany.
  - type: text
    content: ' ny fonenan’ny anaranao.'
  '8':
  - type: text
    content: 'Hoy izy tam-pony: Aoka hampahorintsika avokoa izy.'
  - type: text
    content: Efa nandoro ny tranon’Andriamanitra eran’ny tany rehetra izy.
  '9':
  - type: text
    content: Tsy hitanay ny famantaranay–tsy misy mpaminany intsony–
  - type: text
    content: Ary tsy misy aminay mahalala izay mbola haharetan’izao.
