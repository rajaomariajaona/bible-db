document_id: GAL.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ho amin’ny fahafahana no nanafahan’i Kristy antsika; ka tomoera tsara, fa aza mety hohazonin’ny zioga fanandevozana intsony.
  - type: heading
    content: Famporisihana ny Galatiana tsy hahavery ny fahafahany, fa hazoto handroso amin’ny fitondrantena tsara.
  '10':
  - type: text
    content: 'Izaho matoky anareo ao amin’ny Tompo fa tsy hisaina zavatra hafa akory hianareo; fa ilay mampitabataba anareo no hiharan’ny fanamelohana, na zovy na zovy izy. '
  '11':
  - type: text
    content: 'Fa izaho, ry rahalahy, raha mbola mitory ny famorana ihany, nahoana aho no mbola enjehina? Dia afaka tokoa ny fahatanfitohinana noho ny hazofijaliana. '
  '12':
  - type: text
    content: Enga anie ka hiesotra
  - type: note
    content: 'Na: hanakilema tena.'
  - type: text
    content: ' aza izay mampitabataba anareo.'
  '13':
  - type: text
    content: 'Fa efa nantsoina ho amin’ny fahafahana hianareo, ry rahalahy; kanefa aoka tsy '
  - type: text
    content: ho entinareo
  - type: text
    content: ' hanaraka ny nofo izany fahafahana izany, fa mifampanompoa amin’ny fitiavana. '
  '14':
  - type: text
    content: 'Fa tanteraka amin’ny teny iray ihany ny lalàna rehetra, dia izao: ,,Tiava ny namanao tahaka ny tenanao’’ (Lev. 19.18). '
  '15':
  - type: text
    content: Fa raha mifandramatra sy mifampihinana hianareo, tandremo fandrao mifandringana.
  '16':
  - type: text
    content: 'Fa hoy izaho: Mandehana araka ny Fanahy, dia tsy hahatanteraka ny filan’ny nofo hianareo. '
  '17':
  - type: text
    content: 'Fa ny nofo manohitra ny Fanahy, ary ny Fanahy manohitra ny nofo; ary mifanohitra izy roroa, mba tsy hahazoanareo manao izay zavatra tianareo. '
  '18':
  - type: text
    content: Fa raha tarihin’ny Fanahy hianareo, dia tsy mba ambanin’ny lalàna.
  '19':
  - type: text
    content: 'Fa miharihary ny asan ny nofo, dia izao: Fijangajangana, fahalotoana, fijejojejoana, '
  '2':
  - type: text
    content: 'INDRO, izaho Paoly milaza aminareo fa raha mety hoforana hianareo, dia tsy hahasoa anareo na dia kely akory aza Kristy. '
  '20':
  - type: text
    content: 'fanompoan-tsampy, fanaovana ody ratsy, fandrafiana, fifandirana, adi-lahy, fiafonafonana, fifampiandaniana, fisarahana, fitokoana, '
  '21':
  - type: text
    content: fialonana, fahamamoana, filalaovan-dratsy, ary ny toy izany, izay lazaiko aminareo rahateo, tahaka ny voalazako fahiny koa, fa izay manao izany dia tsy handova ny fanjakan’Andriamanitra.
  '22':
  - type: text
    content: 'Fa ny vokatry ny Fanahy kosa dia fitiavana, fifaliana, fiadanana, fahari-po fahamoram-panahy, fanaovan-tsoa, fahamarinana, '
  '23':
  - type: text
    content: 'fahalemem-panahy, fahononam-po; tsy misy lalàna manohitra izany. '
  '24':
  - type: text
    content: Fa izay an’i Kristy Jesosy dia efa nanombo ny nofony mbamin’ny faniriany sy ny filàny tamin’ny hazofijaliana.
  '25':
  - type: text
    content: 'Raha velon’ny Fanahy isika, dia aoka handeha araka ny Fanahy. '
  '26':
  - type: text
    content: Aoka isika tsy handrani-tena foana ka hifampihaika sy hifampialona.
  '3':
  - type: text
    content: 'Ary lazaiko marina indray amin’ny olona manaiky hoforana rehetra fa mpitrosa tsy maintsy mankatò ny lalàna rehetra izy. '
  '4':
  - type: text
    content: 'Dia tafasaraka amin’i Kristy hianareo na iza na iza izay mitady hohamarinina amin’ny lalàna; efa lavo niala tamin’ny fahasoavana hianareo. '
  '5':
  - type: text
    content: Fa izahay amin’ny Fanahy sy noho ny finoana dia miandry ny fanantenana
  - type: note
    content: 'Na: fanantenan’.'
  - type: text
    content: ' ny fahamarinana. '
  '6':
  - type: text
    content: Fa ao amin’i Kristy Jesosy dia tsy mahasoa na ny famorana na ny tsi-famorana, fa ny finoana izay miasa amin’ny fitiavana.
  '7':
  - type: text
    content: 'Hianareo nihazakazaka tsara, iza no nisakana anareo tsy hanaiky ny marina? '
  '8':
  - type: text
    content: 'Izany fitaomana izany dia tsy avy tamin’Ilay miantso anareo. '
  '9':
  - type: text
    content: 'Ny masirasira kely dia mahatonga ny vongana rehetra ho masirasira avokoa. '
