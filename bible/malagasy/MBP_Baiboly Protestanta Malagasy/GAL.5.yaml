document_id: GAL.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho amin’ny fahafahana no nanafahan’i Kristy antsika; ka tomoera tsara, fa aza mety hohazonin’ny zioga fanandevozana intsony.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Famporisihana ny Galatiana tsy hahavery ny fahafahany, fa hazoto handroso amin’ny fitondrantena tsara.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'INDRO, izaho Paoly milaza aminareo fa raha mety hoforana hianareo, dia tsy hahasoa anareo na dia kely akory aza Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary lazaiko marina indray amin’ny olona manaiky hoforana rehetra fa mpitrosa tsy maintsy mankatò ny lalàna rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia tafasaraka amin’i Kristy hianareo na iza na iza izay mitady hohamarinina amin’ny lalàna; efa lavo niala tamin’ny fahasoavana hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa izahay amin’ny Fanahy sy noho ny finoana dia miandry ny fanantenana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fanantenan’.
    marker-yv: yv-n
  - type: text
    text: ' ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ao amin’i Kristy Jesosy dia tsy mahasoa na ny famorana na ny tsi-famorana, fa ny finoana izay miasa amin’ny fitiavana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hianareo nihazakazaka tsara, iza no nisakana anareo tsy hanaiky ny marina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izany fitaomana izany dia tsy avy tamin’Ilay miantso anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny masirasira kely dia mahatonga ny vongana rehetra ho masirasira avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izaho matoky anareo ao amin’ny Tompo fa tsy hisaina zavatra hafa akory hianareo; fa ilay mampitabataba anareo no hiharan’ny fanamelohana, na zovy na zovy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izaho, ry rahalahy, raha mbola mitory ny famorana ihany, nahoana aho no mbola enjehina? Dia afaka tokoa ny fahatanfitohinana noho ny hazofijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Enga anie ka hiesotra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hanakilema tena.
    marker-yv: yv-n
  - type: text
    text: ' aza izay mampitabataba anareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa efa nantsoina ho amin’ny fahafahana hianareo, ry rahalahy; kanefa aoka tsy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ho entinareo
  - type: text
    text: ' hanaraka ny nofo izany fahafahana izany, fa mifampanompoa amin’ny fitiavana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa tanteraka amin’ny teny iray ihany ny lalàna rehetra, dia izao: ,,Tiava ny namanao tahaka ny tenanao’’ (Lev. 19.18). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa raha mifandramatra sy mifampihinana hianareo, tandremo fandrao mifandringana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy izaho: Mandehana araka ny Fanahy, dia tsy hahatanteraka ny filan’ny nofo hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny nofo manohitra ny Fanahy, ary ny Fanahy manohitra ny nofo; ary mifanohitra izy roroa, mba tsy hahazoanareo manao izay zavatra tianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa raha tarihin’ny Fanahy hianareo, dia tsy mba ambanin’ny lalàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa miharihary ny asan ny nofo, dia izao: Fijangajangana, fahalotoana, fijejojejoana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fanompoan-tsampy, fanaovana ody ratsy, fandrafiana, fifandirana, adi-lahy, fiafonafonana, fifampiandaniana, fisarahana, fitokoana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: fialonana, fahamamoana, filalaovan-dratsy, ary ny toy izany, izay lazaiko aminareo rahateo, tahaka ny voalazako fahiny koa, fa izay manao izany dia tsy handova ny fanjakan’Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny vokatry ny Fanahy kosa dia fitiavana, fifaliana, fiadanana, fahari-po fahamoram-panahy, fanaovan-tsoa, fahamarinana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'fahalemem-panahy, fahononam-po; tsy misy lalàna manohitra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa izay an’i Kristy Jesosy dia efa nanombo ny nofony mbamin’ny faniriany sy ny filàny tamin’ny hazofijaliana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Raha velon’ny Fanahy isika, dia aoka handeha araka ny Fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Aoka isika tsy handrani-tena foana ka hifampihaika sy hifampialona.
