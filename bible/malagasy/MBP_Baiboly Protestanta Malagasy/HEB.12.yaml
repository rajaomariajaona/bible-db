document_id: HEB.12
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana hampahatanjaka ny sain’ny malemy finoana sy hampaharitra azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'KOA amin’izany, satria misy vavolombelona maro be toy izany manodidina antsika toy ny rahona, dia aoka isika koa hanaisotra izay rehetra mitambesatra amintsika mbamin’ny ota izay malaky mahazo antsika, ary aoka isika hihazakazaka amin’ny faharetana amin’izao fihazakazahana filokana napetraka eo anoloantsika izao, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mijery an’i Jesosy, Tompon’ny finoantsika sy Mpanefa azy, Izay naharitra ny hazo fijaliana, fa tsy nitandro henatra, mba hahazoany ny fifaliana napetraka teo anoloany, ka dia efa mipetraka eo amin’ny ankavanan’ny seza fiandrianan’Andriamanitra Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa hevero tsara ilay naharitra ny fanoherana nataon’ny mpanota taminy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ireo mpanota nanimba tena.
    marker-yv: yv-n
  - type: text
    text: ' fandrao ho ketraka hianareo, ka ho reraka ny fanahianreo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hianareo tsy mbola nanohitra niady tamin’ny ota hatramin’ny fahalatsahan-dra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hadinonareo ny fananarana izay milaza aminareo toy ny amin’ny zanaka hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Anaka, aza atao ho zavatra kely ny famaizana ataon’i Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza reraka, raha resi-lahatry ny anatra ataony hianao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa izay tian’i Jehovah no faizany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay zanaka rehetra raisiny no kapohiny’’ (Oha. 3.11, 12).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Famaizana no anton’ny iaretanareo; Andriamanitra mitondra anareo tahaka ny zanaka; fa aiza moa izay zanaka tsy faizan-drainy? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha tsy faizana tahaka ny itondrana azy rehetra hianareo, dia zazasary, fa tsy zanaka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary koa, isika dia nanana ny rain’ny nofontsika ho mpanafay antsika ka efa nanaja azy; tsy mainka va ny hanekentsika ny Rain’ny fanahy, ka ho velona isika? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ireny dia nanao izay hahafay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: antsika
  - type: text
    text: ' tamin’ny andro vitsy araka izay sitrapony, fa Izy kosa dia ny hahasoa, mba handraisantsika ny fahamasinany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny famaizana rehetra dia tsy mba atao ho mahafaly andro anaovana, fa mampahory; fa rehefa afaka izany, dia vao mitondra ny vokatry ny fahamarinana hiadanana ho an’izay nanaovana azy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa hatanjaho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ahitsio.
    marker-yv: yv-n
  - type: text
    text: ' ny tànana miraviravy sy ny lohalika malemy; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary manaova làla-mahitsy halehan’ny tongotrareo, mba tsy hampipitsoka ny tongotry ny mandringa, fa ny mba hahasitrana azy kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Miezaha mitady fihavanana amin’ny olona rehetra ary fahamasinana; fa izay tsy manam-pahamasinana dia tsy hahita ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary mitandrema tsara, fandrao hisy hiala amin’ny fahasoavan’Andriamanitra; fandrao hisy faka mangidy mitsimoka hampikorontana, ka ho voaloto ny maro; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fandrao hisy mpijangajanga na olona tsy manaja ny masina, dia tahaka an’i Esao, izay nivarotra ny fizokiany hahazoany hanina indraim-bava. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa fantatrareo fa rehefa afaka izany, raha ta-handova ny fitahiana izy, dia nolavina; fa tsy nahita izay hibebahana izy, na dia nitady fatratra tamin’ny ranomaso aza.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny halehiben’ny fahasoavana azo amin’ny fanekena vaovao, sy ny halehiben’ny helok’izay mandà izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'FA hianareo tsy mby eo amin’izay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tendrombohitra
  - type: text
    text: ' azo tsapaina sady mirehitra afo, dia eo amin’ny fahamaintisana sy ny aizina sy ny tafio-drivotra '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sy ny fanenon’ny trompetra ary ny feon’ny teny, ka izay nandre izany dia nangataka mba tsy hasian-teny intsony izy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa tsy tohany ilay nandidiana hoe: ,,Ary raha misy biby aza mikasika ny tendrombohitra, dia hotoraham-bato izany’’ (Eks. 19.12, 13), '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary satria loza indrindra ny fahitana, dia hoy Mosesy: ,,Matahotra loatra sy mangovitra indrindra aho’’ (Deo. 9.19). '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hianareo kosa efa mby eo an-tendrombohitra Ziona, tanànan’Andriamanitra velona, dia Jerosalema any an-danitra, ary ho ao amin’ny anjely tsy omby alinalina, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: amin’ny fihaonana fifaliana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho ao amin’ireo tsy omby alinalina, dia ny fivorian’ny anjely.
    marker-yv: yv-n
  - type: text
    text: ' sy ny fiangonan’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: eklesia.
    marker-yv: yv-n
  - type: text
    text: ' ny lahimatoa voasoratra any an-danitra, sy amin’Andriamanitra, Mpitsara ny olona rehetra, ary amin’ny fanahin’ny olona marina izay efa natao tanteraka, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'sy amin’i Jesosy, Mpanalalana amin’ny fanekena vaovao, ary amin’ny ra famafazana, izay miteny tsara lavitra noho '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny an’i
  - type: text
    text: ' Abela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tandremo mba tsy holavinareo Izay miteny. Fa raha izy ireo tsy afa-nandositra tamin’ny nandavany ilay nilaza ny tenin’Andriamanitra taminy tetỳ ambonin’ny tany, mainka fa isika, raha mihodina miala amin’Ilay avy any an-danitra, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izay nampihorohoro ny tany fahiny tamin’ny feony; fa ankehitriny Izy efa nanao teny fikasana hoe: ,,Indray maka koa tsy ny tany ihany no hampihorohoroiko, fa ny lanitra koa’’ (Hag. 2.6). '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny hoe ,,indray maka koa’’ dia manambara ny hanovana izay zavatra ampihorohoroina, toy ny zavatra natao, mba haharetan’izay zavatra tsy ampihorohoroina. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Koa satria mandray fanjakana tsy azo ampihorohoroina isika, dia aoka isika hanana fahasoavana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hanana fanahy masaotra.
    marker-yv: yv-n
  - type: text
    text: ' ho entintsika manao izay fanompoana sitrak’Andriamanitra amin’ny fanajana sy ny fahatahorana; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: fa Andriamanitsika dia afo mandevona (Deo. 4.24).
