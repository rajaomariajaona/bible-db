document_id: NEH.12,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny anaran’ny mpisorona sy ny Levita izay niverina avy tany Babylona.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY ny mpisorona sy ny Levita izay niara-niakatra tamin’i Zerobabela, zanak’i Sealtiela, sy Jesoa dia Seraia, Jeremia, Ezra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesoa niteraka an’i Joiakima; ary Joiakima niteraka an’i Eliasiba; ary Eliasiba niteraka an’i Joiada; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary Joiada niteraka an’i Jonatana; ary Jonatana niteraka an’i Jadoa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny andron’i Joiakima dia nisy mpisorona, lohan’ny fianakaviana, dia izao: Ny avy tamin’i Seraia dia Meraia; ny avy tamin’i Jeremia dia Hanania; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Ezra dia Mesolama; ny avy tamin’i Amaria dia Johanana; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Meliko dia Jonatana; ny avy tamin’i Sebania dia Josefa; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Harima dia Adna; ny avy tamin’i Meraiota dia Helkay; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’Ido dia Zakaria; ny avy tamin’i Ginetona dia Mesolama; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Abia dia Zikry; ny avy tamin’i Miniamina, avy tamin’i Moadia, dia Piltahy; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Bilga dia Samoa; ny avy tamin’i Semaia dia Jonatana; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Joariba dia Matenay; ny avy tamin’i Jedaia dia Ozy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amaria, Maloka, Hatosy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny avy tamin’i Salay dia Kalay; ny avy tamin’i Amoka dia Ebera; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny avy tamin’i Hilkia dia Hasabia; ny avy tamin’i Jedaia dia Netanela.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin’ny andron’i Eliasiba sy Joiada sy Johanana ary Jadoa ny Levita dia voasarotra ho lohan’ny fianakaviany; ary toy izany koa ny mpisorona, hatramin’ny nanjakan’i Dariosy Persiana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak’i Levy, lohan’ny fianakaviana, dia voasoratra ao amin’ny bokin’ny tantara hatramin’ny andron’i Johanana, zanak’i Eliasiba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lohan’ny Levita dia Hasabia sy Serebia sy Jesoa, zanak’i Kadmiela, mbamin’ny rahalahin’ireo izay nifanandrify taminy, mba hidera sy hisaotra araka ny didin’i Davida, lehilahin’Andriamanitra, nifanandrify isan-tokony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Matania, Bakbokia, Obadia, Mesolama, Talmona sy Akoba no mpiandry varavarana ka nitandrina ny fiambenana teo amin’ny trano firaketana.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no tamin’ny andron’i Joiakima, zanak’i Jesoa, zanak’i Jozadaka, sy tamin’ny andron’i Nehemia governora sy Ezra mpisorona sady mpanora-dalàna.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitokanana ny màndan’i Jerosalema.
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY rehefa hitokanana ny màndan’i Jerosalema, dia nitady ny Levita avy tamin’ny fonenany rehetra izy mba ho entina any Jerosalema hanao ny fitokanana amin’ny fifaliana sy ny fiderana ary ny hira mbamin’ny kipantsona sy ny valiha ary ny lokanga. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niangona ny mpihira avy tamin’ny tany lemaka manodidina an’i Jerosalema sy ny avy tamin’ny vohitry ny Netofatita '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Beti-gilgala ary ny sahan’i Geba sy Azmaveta; fa efa nanao vohitra ho azy manodidina an’i Jerosalema ny mpihira. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sekania, Rehoma, Meremota, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mpisorona sy ny Levita samy nanadio ny tenany, ary nodioviny koa ny olona sy ny vavahady ary ny mànda.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nasaiko niakatra eo ambonin’ny mànda ny mpanapaka ny Joda, ary nanendry mpanao fiderana roa tonta aho handeha milahatra tsara. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ny irai-dia nandeha
    - type: text
      text: ' tamin’ny ankavanana teo ambonin’ny mànda ho amin’ny vavahadin-jezika; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nandeha nanarakaraka azy Hosaia sy ny antsasaky ny andriandahin’ny Joda, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia Azaria sy Ezra sy Mesolama '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Joda sy Benjamina sy Semaia ary Jeremia, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny sasany tamin’ny taranaky ny mpisorona nitondra trompetra, dia Zakaria, zanak’i Jonatana, zanak’i Semaia, zanak’i Matania, zanak’i Mikaia, zanak’i Zakora, zanak’i Asafa, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mbamin’ny rahalahiny, dia Semaia sy Azarela, Milalay, Gilalay, May, Netanela sy Joda ary Hanany, nitondra ny zava-manenon’i Davida, lehilahin’Andriamanitra; ary Ezra mpanora-dalàna nandeha teo alohan’ireo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hatreo amin’ny vavahadin-doharano dia nizotra izy ka niakatra tamin’ny ambaratongan’ny Tanànan’i Davida, tamin’ny fiakarana amin’ny mànda eo ambonin’ny tranon’i Davida ka hatramin’ny vavahadin-drano eo atsinanana.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanao fiderana irai-dia kosa dia nandeha nifanandrify taminy sady narahiko sy ny antsasaky ny olona teo ambonin’ny mànda hatreo ambonin’ny tilikambo misy ny fatana fandoroana ka hatramin’ny mànda lehibe, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary hatreo ambonin’ny vavahadin’i Efraima sy teo ambonin’ny vavahady taloha ary teo ambonin’ny vavahadin-kazandrano sy ny tilikambo Hananela sy ny tilikambo Hamea, dia hatramin’ny vavahadin’ondry; ary nijanona teo amin’ny vavahadin-trano-maizina izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ido, Ginetoy, Abia, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijanona tao an-tranon’Andriamanitra izy roa tonta, ary izaho koa sy ny antsasaky ny mpanapaka izay niaraka tamiko '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny mpisorona, dia Eliakima, Mahaseia, Miniamina, Mikaia, Elioenay, Zakaria ary Hanania, nitondra trompetra, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Mahaseia sy Semaia sy Eleazara sy Ozy sy Johanana sy Malkia sy Elama ary Ezera. Ary nihira mafy ny mpihira sy Jizrahia, mpifehy azy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia namono zavatra betsaka hatao fanatitra tamin’izany andro izany izy sady nifaly, fa Andriamanitra nampifaly azy indrindra; ary ny vadiny aman-janany nifaly koa; ka dia re lavitra ny fifaliana tany Jerosalema.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny fiveloman’ny mpisorona sy ny Levita.
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’izany andro izany dia nisy olona notendrena hitandrina ny efi-trano fitehirizana ny rakitra sy ny fanatitra asandratra sy ny voaloham-bokatra ary ny fahafolon-karena, mba hangonina ao izay anjara voadidy ho an’ny mpisorona sy ny Levita avy amin’ny saha manodidina ny isan-tanàna; fa nifalian’ny Joda ireo mpisorona sy Levita izay nanompo ireo. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitandrina izay nasaina hotandremany ny amin’Andriamaniny sy ny amin’ny fanadiovana izy; ary toy izany koa ny mpihira sy ny mpiandry varavarana, araka ny didin’i Davida sy Solomona zanany. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fahiny tamin’ny andron’i Davida sy Asafa aza dia efa nisy lohan’ny mpihira sy hira fiderana ary fisaorana an’Andriamanitra. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Isiraely rehetra tamin’ny andron’i Zerobabela sy Nehemia nanome ny anjaran’ny mpihira sy ny mpiandry varavarana, dia ny anjarany isan-andro; ary nanokana izay ho an’ny Levita izy; ary ny Levita kosa nanokana izay ho an’ny taranak’i Arona.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miamina, Madia, Bilga, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Semaia, Joiariba, Jedaia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salo, Amoka, Hilkia ary Jedaia. Ireo no lohan’ny mpisorona sy ny rahalahiny tamin’ny andron’i Jesoa.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Levita kosa dia izao: Jesoa, Binoy, Kadmiela, Serebia, Joda ary Matania, dia izy ireo sy ny rahalahiny no tonian’ny fiderana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Bakbokia sy Ono, rahalahin’ireo, dia nifanandrify tamin’ny anjara-raharahany.
