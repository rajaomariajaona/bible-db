document_id: JER.49
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’i Amona.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: NY amin’ny taranak’i Amona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa tsy manan-janakalahy va Isiraely?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy manan-kandova va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa nahoana Gada no lasan’ny mpanjakany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Malkana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vahoakany monina ao amin’ny tanànany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa, indro, avy ny andro, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hampandrenesako akoran’ady amin’ny famelezana an’i Raban’ny taranak’i Amona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho tanànaolo rava izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zana-bohiny hodorana amin’ny afo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Isiraely hahalasa ny an’izay nahalasa azy, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Midradradradrà, ry Hesbona, fa rava Ay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitaraina, hianareo zanakavavin’i Raba!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misikìna lamba fisaonana hianareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova fisaonana, ary mivoivoiza eo anaty fefy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lasan-ko babo ny mpanjakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny mpisorony sy ireo mpanapaka azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nahoana no ny lohasaha no ataonao ho reharehanao, dia ny lohasahanao mahavokatra be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry zanakavavy mpiodina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izay mitoky amin’ny rakiny ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza moa no ho afa-miakatra atỳ amiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro Aho hahatonga tahotra aminao avy amin’izay rehetra manodidina anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Tompon’ny maro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary horoahina samy hizotra amin’izay hitsiny avy hianareo rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady tsy hisy hamory izay mandositra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary rehefa afaka izany, dia hampodiko ihany avy amin’ny fahababoana ny taranak’i Amona, hoy Jehovah.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’i Edoma.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: NY amin’i Edoma.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy fahendrena intsony va ao Temana?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Very saina va ny olon-kendry?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lany va ny fahendreny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mandosira, miambohoa hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamitsaha ao amin’ny lalina, ry mponina any Dedana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny loza ho an’i Esao dia nataoko nihatra taminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny andro hamaliako azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha tonga ao aminao ny mpioty voaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tsy hamela voaloboka sisa hotsimponina akory izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha avy alina ny mpangalatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia handrava mandra-pahafa-pony izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izaho dia nampitanjaka an’i Esao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary naharihariko ny fiereny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mahazo miery izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ringana ny zanany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny rahalahiny ary ny namany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ao intsony ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ilaozy ny zanakao ho kamboty, fa Izaho no hamelona azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka Izaho no hitokian’ny vadinao mpitondratena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, fa na dia izay tsy tokony hisotro amin’ny kapoaka aza dia hisotro tokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka moa ho afa-potsiny va hianao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ho afa-potsiny hianao, fa tsy maintsy hisotro tokoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ny tenako no nianianako, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho tonga figagana Bozra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho fandatsa sy ho rava ary ho fanozonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tanànany rehetra ho lao mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa efa nahare filazana avy tamin’i Jehovah aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary nisy iraka nalefa ho any amin’ny jentilisa hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mivoria hianareo, ka mankanesa hamely azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mitsangàna hanafika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa, indro, hataoko tsinontsinona eo amin’ny firenena hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fanazimbazimba eo amin’ny olona,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ry ilay monina ao an-tsefatsefaky ny harambato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mifikitra amin’ny tampon’ny havoana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahatahorana anao sy ny avonavon’ny fonao no namitaka anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa na dia ataonao eny amin’ny avo tahaka ny an’ny voromahery aza ny akaninao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia havariko avy eny hianao, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ho figagana Edoma:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay rehetra mandalo azy dia ho gaga ka hisitrisitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny loza rehetra efa namelezana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary toy ny nandravana an’i Sodoma sy Gomora
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny tanàna teny akaikiny, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No tsy hisian’olona honina any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na zanak’olombelona hivahiny any.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Indro, toy ny fiakatry ny liona avy any amin’ny kirihitrala eny amoron’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny reharehany.
    marker-yv: yv-n
  - type: text
    text: ' i Jordana'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No hiakarany ho any amin’ny misy ahitra mateza;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fonenany mafy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa hampandosiriko tampoka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Edoma
  - type: text
    text: ' hiala ao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay olona iray voafidy no hotendreko hanapaka azy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa iza no tahaka Ahy, ary iza no hifandahatra amiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza moa no mpiandry ondry mahajanona eo anatrehako?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa henoy ny saina avy amin’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nosaininy hamelezana an’i Edoma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy ny heviny izay noheveriny hamelezana ny mponina ao Temana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoviraviraina tokoa ireny, dia ny kely indrindra amin’ny ondry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho gaga azy tokoa ny saha fiandrasana azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tamin’ny fiezinezin’ny fianjerany dia nihorohoro ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny feon’ny fitarainany dia re hatrany amin’ny Ranomasina Mena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Indro, hanidina hiakatra toy ny voro-mahery izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamelatra ny elany eny ambonin’i Bozra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’izany andro izany ny fon’ny lehilahy maherin’i Edoma
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tahaka ny fon’ny vehivavy mihetsi-jaza.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’i Damaskosy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: NY amin’i Damaskosy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Very hevitra Hamata sy Arpada,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nandre filazan-doza izy ka kivy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misamboaravoara ny ranomasina ka tsy mety tafatoetra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Misy fanahiana hatrany an-dranomasina aza; tsy mahita fiononana ny olona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Efa ketraka Damaskosy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mihodina handositra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tora-kovitra izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary azon’ny faharariana sy ny fanaintainana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny vehivavy raha miteraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nahoana re no tsy nilaozana ny tanàna malaza,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Indrisy! efa lao ny tanàna malaza.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tanàna fifaliako!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ka dia hiampatrampatra eny an-kalalahana ny zatovony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny miaramila rehetra ho ringana avokoa amin’izany andro izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Tompon’ny maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary hisy afo hampirehetiko ao anatin’ny màndan’i Damaskosy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handevona ny lapan’i Beni-hadada.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’i Kedara sy Hazora
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: NY amin’i Kedara sy ny fanjakan’i Hazora, izay resin’i Nebokadnezara, mpanjakan’i Babylona.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna hianareo, ka miakara hamely an’i Kedara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aringano ny zanaky ny atsinanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Halainy ny lainy sy ny ondry aman-osiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho entiny ny ambain-dainy mbamin’ny fanaka rehetra sy ny ramevany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sady hiantsoantso hilaza aminy hoe izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misy fampangorohoroana manodidina!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mandosira, ka mandehana lavitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamitsaha ao amin’ny lalina, ry mponina any Hazora! hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Nebokadnezara, mpanjakan’i Babylona, nanao saina hamelezany anareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy namoron-kevitra hamelezany anareo.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: azy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mitsangàna, iakaro ny firenena miadana izay tsy manana ahiahy, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay tsy misy vavahady mirindrina na mihidy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady mitoka-monina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ho babo ny ramevany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary horobaina ny omby aman-ondriny betsaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Haeliko ho any amin’ny rivotra rehetra ireo voahety sisim-bolo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho entiko avy amin’ny manodidina rehetra ny loza hanjo azy, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary Hazora dia ho fonenan’ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jakala.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho tany lao mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy olona honina any,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na zanak’olombelona hivahiny any.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’i Elama.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'NY tenin’i Jehovah izay tonga tamin’i Jeremia mpaminany ny amin’i Elama tamin’ny niandohan’ny nanjakan’i Zedekia, mpanjakan’ny Joda, hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hotapatapahiko ny tsipìkan’i Elama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay fototry ny heriny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary hitondra rivotra efatra avy amin’ny lafiny efatry ny lanitra Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamelezana an’i Elama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary haeliko ho amin’izany rivotra rehetra izany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hisy firenena izay tsy halehan’ny voaroaka avy any Elama.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa hampivadi-po an’i Elama eo anoloan’ny fahavalony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy eo anoloan’izay mitady ny ainy Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hahatonga loza aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny firehetan’ny fahatezerako, hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampanenjehiko azy ny sabatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandra-pandaniko azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Dia hapetrako ao Elama ny seza fiandrianako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hofongorako tsy hisy intsony any na ny mpanjaka na ny mpanapaka, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Nefa any am-parany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mbola hampodiko avy amin’ny fahababoany ihany Elama, hoy Jehovah.
