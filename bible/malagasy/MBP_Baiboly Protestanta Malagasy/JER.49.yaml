document_id: JER.49,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’i Amona.
  - type: text
    content: NY amin’ny taranak’i Amona,
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Moa tsy manan-janakalahy va Isiraely?
  - type: text
    content: Ary tsy manan-kandova va izy?
  - type: text
    content: Koa nahoana Gada no lasan’ny mpanjakany,
  - type: note
    content: 'Na: Malkana.'
  - type: text
    content: Ary ny vahoakany monina ao amin’ny tanànany?
  '10':
  - type: text
    content: Izaho dia nampitanjaka an’i Esao,
  - type: text
    content: Ary naharihariko ny fiereny,
  - type: text
    content: Ka tsy mahazo miery izy;
  - type: text
    content: Ringana ny zanany
  - type: text
    content: Sy ny rahalahiny ary ny namany,
  - type: text
    content: Ka tsy ao intsony ireny.
  '11':
  - type: text
    content: Ilaozy ny zanakao ho kamboty, fa Izaho no hamelona azy,
  - type: text
    content: Ary aoka Izaho no hitokian’ny vadinao mpitondratena.
  '12':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Indro, fa na dia izay tsy tokony hisotro amin’ny kapoaka aza dia hisotro tokoa,
  - type: text
    content: Ka moa ho afa-potsiny va hianao?
  - type: text
    content: Tsy ho afa-potsiny hianao, fa tsy maintsy hisotro tokoa.
  '13':
  - type: text
    content: Fa ny tenako no nianianako, hoy Jehovah,
  - type: text
    content: Fa ho tonga figagana Bozra
  - type: text
    content: Sy ho fandatsa sy ho rava ary ho fanozonana,
  - type: text
    content: Ary ny tanànany rehetra ho lao mandrakizay.
  '14':
  - type: text
    content: Fa efa nahare filazana avy tamin’i Jehovah aho,
  - type: text
    content: 'Ary nisy iraka nalefa ho any amin’ny jentilisa hanao hoe:'
  - type: text
    content: Mivoria hianareo, ka mankanesa hamely azy,
  - type: text
    content: Ary mitsangàna hanafika.
  '15':
  - type: text
    content: Fa, indro, hataoko tsinontsinona eo amin’ny firenena hianao
  - type: text
    content: Sy fanazimbazimba eo amin’ny olona,
  '16':
  - type: text
    content: Ry ilay monina ao an-tsefatsefaky ny harambato,
  - type: text
    content: Izay mifikitra amin’ny tampon’ny havoana,
  - type: text
    content: Ny fahatahorana anao sy ny avonavon’ny fonao no namitaka anao;
  - type: text
    content: Fa na dia ataonao eny amin’ny avo tahaka ny an’ny voromahery aza ny akaninao,
  - type: text
    content: Dia havariko avy eny hianao, hoy Jehovah.
  '17':
  - type: text
    content: 'Ary ho figagana Edoma:'
  - type: text
    content: Izay rehetra mandalo azy dia ho gaga ka hisitrisitra
  - type: text
    content: Noho ny loza rehetra efa namelezana azy.
  '18':
  - type: text
    content: Ary toy ny nandravana an’i Sodoma sy Gomora
  - type: text
    content: Mbamin’ny tanàna teny akaikiny, hoy Jehovah,
  - type: text
    content: No tsy hisian’olona honina any,
  - type: text
    content: Na zanak’olombelona hivahiny any.
  '19':
  - type: text
    content: Indro, toy ny fiakatry ny liona avy any amin’ny kirihitrala eny amoron’
  - type: note
    content: Heb. ny reharehany.
  - type: text
    content: ' i Jordana'
  - type: text
    content: No hiakarany ho any amin’ny misy ahitra mateza;
  - type: note
    content: 'Na: fonenany mafy.'
  - type: text
    content: 'Fa hampandosiriko tampoka '
  - type: text
    content: Edoma
  - type: text
    content: ' hiala ao,'
  - type: text
    content: Ary izay olona iray voafidy no hotendreko hanapaka azy.
  - type: text
    content: Fa iza no tahaka Ahy, ary iza no hifandahatra amiko,
  - type: text
    content: Ary iza moa no mpiandry ondry mahajanona eo anatrehako?
  '2':
  - type: text
    content: Koa, indro, avy ny andro, hoy Jehovah,
  - type: text
    content: Izay hampandrenesako akoran’ady amin’ny famelezana an’i Raban’ny taranak’i Amona,
  - type: text
    content: Ary ho tanànaolo rava izy,
  - type: text
    content: Ary ny zana-bohiny hodorana amin’ny afo;
  - type: text
    content: Ary ny Isiraely hahalasa ny an’izay nahalasa azy, hoy Jehovah.
  '20':
  - type: text
    content: Koa henoy ny saina avy amin’i Jehovah,
  - type: text
    content: Izay nosaininy hamelezana an’i Edoma,
  - type: text
    content: 'Sy ny heviny izay noheveriny hamelezana ny mponina ao Temana:'
  - type: text
    content: Hoviraviraina tokoa ireny, dia ny kely indrindra amin’ny ondry;
  - type: text
    content: Ho gaga azy tokoa ny saha fiandrasana azy.
  '21':
  - type: text
    content: Tamin’ny fiezinezin’ny fianjerany dia nihorohoro ny tany;
  - type: text
    content: Ny feon’ny fitarainany dia re hatrany amin’ny Ranomasina Mena.
  '22':
  - type: text
    content: Indro, hanidina hiakatra toy ny voro-mahery izy
  - type: text
    content: Ka hamelatra ny elany eny ambonin’i Bozra;
  - type: text
    content: Ary amin’izany andro izany ny fon’ny lehilahy maherin’i Edoma
  - type: text
    content: Dia ho tahaka ny fon’ny vehivavy mihetsi-jaza.
  - type: heading
    content: Faminaniana ny amin’i Damaskosy.
  '23':
  - type: text
    content: NY amin’i Damaskosy.
  - type: text
    content: Very hevitra Hamata sy Arpada,
  - type: text
    content: Fa nandre filazan-doza izy ka kivy;
  - type: text
    content: Misamboaravoara ny ranomasina ka tsy mety tafatoetra.
  - type: note
    content: 'Na: Misy fanahiana hatrany an-dranomasina aza; tsy mahita fiononana ny olona.'
  '24':
  - type: text
    content: Efa ketraka Damaskosy
  - type: text
    content: Ka mihodina handositra,
  - type: text
    content: Fa tora-kovitra izy;
  - type: text
    content: Ary azon’ny faharariana sy ny fanaintainana,
  - type: text
    content: Toy ny vehivavy raha miteraka.
  '25':
  - type: text
    content: Nahoana re no tsy nilaozana ny tanàna malaza,
  - type: note
    content: 'Na: Indrisy! efa lao ny tanàna malaza.'
  - type: text
    content: Tanàna fifaliako!
  '26':
  - type: text
    content: Ka dia hiampatrampatra eny an-kalalahana ny zatovony,
  - type: text
    content: Ary ny miaramila rehetra ho ringana avokoa amin’izany andro izany,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro.
  '27':
  - type: text
    content: Ary hisy afo hampirehetiko ao anatin’ny màndan’i Damaskosy,
  - type: text
    content: Handevona ny lapan’i Beni-hadada.
  - type: heading
    content: Faminaniana ny amin’i Kedara sy Hazora
  '28':
  - type: text
    content: NY amin’i Kedara sy ny fanjakan’i Hazora, izay resin’i Nebokadnezara, mpanjakan’i Babylona.
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Mitsangàna hianareo, ka miakara hamely an’i Kedara,
  - type: text
    content: Ary aringano ny zanaky ny atsinanana.
  '29':
  - type: text
    content: Halainy ny lainy sy ny ondry aman-osiny,
  - type: text
    content: Ho entiny ny ambain-dainy mbamin’ny fanaka rehetra sy ny ramevany,
  - type: text
    content: 'Sady hiantsoantso hilaza aminy hoe izy:'
  - type: text
    content: Misy fampangorohoroana manodidina!
  '3':
  - type: text
    content: Midradradradrà, ry Hesbona, fa rava Ay!
  - type: text
    content: Mitaraina, hianareo zanakavavin’i Raba!
  - type: text
    content: Misikìna lamba fisaonana hianareo;
  - type: text
    content: Manaova fisaonana, ary mivoivoiza eo anaty fefy;
  - type: text
    content: Fa lasan-ko babo ny mpanjakany,
  - type: text
    content: Dia ny mpisorony sy ireo mpanapaka azy.
  '30':
  - type: text
    content: Mandosira, ka mandehana lavitra!
  - type: text
    content: Mamitsaha ao amin’ny lalina, ry mponina any Hazora! hoy Jehovah;
  - type: text
    content: Fa Nebokadnezara, mpanjakan’i Babylona, nanao saina hamelezany anareo
  - type: text
    content: Sy namoron-kevitra hamelezany anareo.
  - type: note
    content: Heb. azy.
  '31':
  - type: text
    content: Mitsangàna, iakaro ny firenena miadana izay tsy manana ahiahy, hoy Jehovah,
  - type: text
    content: Dia izay tsy misy vavahady mirindrina na mihidy
  - type: text
    content: Sady mitoka-monina.
  '32':
  - type: text
    content: Ho babo ny ramevany,
  - type: text
    content: Ary horobaina ny omby aman-ondriny betsaka,
  - type: text
    content: Haeliko ho any amin’ny rivotra rehetra ireo voahety sisim-bolo;
  - type: text
    content: Ary ho entiko avy amin’ny manodidina rehetra ny loza hanjo azy, hoy Jehovah,
  '33':
  - type: text
    content: Ary Hazora dia ho fonenan’ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: Sy ho tany lao mandrakizay;
  - type: text
    content: Tsy hisy olona honina any,
  - type: text
    content: Na zanak’olombelona hivahiny any.
  - type: heading
    content: Faminaniana ny amin’i Elama.
  '34':
  - type: text
    content: 'NY tenin’i Jehovah izay tonga tamin’i Jeremia mpaminany ny amin’i Elama tamin’ny niandohan’ny nanjakan’i Zedekia, mpanjakan’ny Joda, hoe:'
  '35':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Indro, hotapatapahiko ny tsipìkan’i Elama,
  - type: text
    content: Izay fototry ny heriny.
  '36':
  - type: text
    content: Ary hitondra rivotra efatra avy amin’ny lafiny efatry ny lanitra Aho
  - type: text
    content: Hamelezana an’i Elama,
  - type: text
    content: Ary haeliko ho amin’izany rivotra rehetra izany izy,
  - type: text
    content: Ka tsy hisy firenena izay tsy halehan’ny voaroaka avy any Elama.
  '37':
  - type: text
    content: Fa hampivadi-po an’i Elama eo anoloan’ny fahavalony
  - type: text
    content: Sy eo anoloan’izay mitady ny ainy Aho
  - type: text
    content: Ka hahatonga loza aminy,
  - type: text
    content: Dia ny firehetan’ny fahatezerako, hoy Jehovah;
  - type: text
    content: Ary hampanenjehiko azy ny sabatra
  - type: text
    content: Mandra-pandaniko azy;
  '38':
  - type: text
    content: Dia hapetrako ao Elama ny seza fiandrianako,
  - type: text
    content: Ary hofongorako tsy hisy intsony any na ny mpanjaka na ny mpanapaka, hoy Jehovah.
  '39':
  - type: text
    content: Nefa any am-parany
  - type: text
    content: Dia mbola hampodiko avy amin’ny fahababoany ihany Elama, hoy Jehovah.
  '4':
  - type: text
    content: Nahoana no ny lohasaha no ataonao ho reharehanao, dia ny lohasahanao mahavokatra be,
  - type: text
    content: Ry zanakavavy mpiodina,
  - type: text
    content: 'Izay mitoky amin’ny rakiny ka manao hoe:'
  - type: text
    content: Iza moa no ho afa-miakatra atỳ amiko?
  '5':
  - type: text
    content: Indro Aho hahatonga tahotra aminao avy amin’izay rehetra manodidina anao,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro;
  - type: text
    content: Ary horoahina samy hizotra amin’izay hitsiny avy hianareo rehetra,
  - type: text
    content: Sady tsy hisy hamory izay mandositra.
  '6':
  - type: text
    content: Ary rehefa afaka izany, dia hampodiko ihany avy amin’ny fahababoana ny taranak’i Amona, hoy Jehovah.
  - type: heading
    content: Faminaniana ny amin’i Edoma.
  '7':
  - type: text
    content: NY amin’i Edoma.
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: Tsy misy fahendrena intsony va ao Temana?
  - type: text
    content: Very saina va ny olon-kendry?
  - type: text
    content: Lany va ny fahendreny?
  '8':
  - type: text
    content: Mandosira, miambohoa hianareo,
  - type: text
    content: Mamitsaha ao amin’ny lalina, ry mponina any Dedana,
  - type: text
    content: Fa ny loza ho an’i Esao dia nataoko nihatra taminy,
  - type: text
    content: Dia ny andro hamaliako azy.
  '9':
  - type: text
    content: Raha tonga ao aminao ny mpioty voaloboka,
  - type: text
    content: Dia tsy hamela voaloboka sisa hotsimponina akory izy;
  - type: text
    content: Raha avy alina ny mpangalatra,
  - type: text
    content: Dia handrava mandra-pahafa-pony izy.
