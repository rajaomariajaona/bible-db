document_id: DEU.28
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny soa izay ho valin’ny fanarahana an’i Jehovah, ary ny loza izay hanjo ny miala aminy kosa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'RAHA mihaino tsara ny feon’i Jehovah Andriamanitrao hianao ka mitandrina hanaraka ny didiny rehetra, izay andidiako anao anio, dia hasandratr’i Jehovah Andriamanitrao ho ambonin’ny firenena rehetra amin’ny tany hianao; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary ho tonga aminao sy ho azonao izao fitahiana rehetra izao, raha mihaino ny feon’i Jehovah Andriamanitrao hianao:–
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hotahina hianao ao an-tanàna, ary hotahina hianao any an-tsaha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hotahina ny ateraky ny kibonao sy ny vokatry ny taninao ary ny ateraky ny biby fiompinao, dia ny ateraky ny ombinao sy ny ateraky ny ondry aman-osinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hotahina ny haronao sy ny vilia fanaova-mofonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hotahina hianao, raha miditra; ary hotahina hianao, raha mivoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hatolotr’i Jehovah ho resy eo anoloanao ny fahavalonao, izay mitsangana hiady aminao, ka làlana iray no hivoahany hanatona anao, fa làlana fito kosa no handosirany hiala eo anoloanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Handidy ny fitahiany ho aminao Jehovah amin’ny fitoeram-barinao sy izay rehetra ataon’ny tànanao, ka hitahy anao Izy any amin’ny tany izay omen’i Jehovah Andriamanitrao anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hanandratra anao ho firenena masina ho Azy Jehovah, araka izay nianianany taminao, raha mitandrina ny didin’i Jehovah Andriamanitrao hianao ka mandeha amin’ny làlany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia ho hitan’ny firenena rehetra ambonin’ny tany fa ny anaran’i Jehovah no antsoina aminao, dia hatahotra anao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hataon’i Jehovah manana amby ampy izay hahasoa anao, dia ny ateraky ny kibonao sy ny ateraky ny biby fiompinao ary ny vokatry ny taninao, any amin’ny tany izay nianianan’i Jehovah tamin’ny razanao homena anao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hovohan’i Jehovah ho anao ny lanitra, tranony fitehirizan-tsoa, handatsahany ranonorana amin’ny taninao amin’ny fotoany sy hitahiany ny asan’ny tànanao rehetra.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary hampisambotra ny firenena maro hianao, fa hianao kosa tsy hisambotra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hataon’i Jehovah ho lohany hianao, fa tsy ho rambony; ary ho ambony tokoa hianao, fa tsy ho ambany, raha mihaino ny didin’i Jehovah Andriamanitrao, izay andidiako anao anio, ka mitandrina sy manaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary aza miala amin’ny teny rehetra izay andidiako anao anio, na ho amin’ny ankavanana, na ho amin’ny ankavia, hanaraka andriamani-kafa ka hanompo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa raha tsy mihaino ny feon’i Jehovah Andriamanitrao kosa hianao ka tsy mitandrina hanaraka ny didiny rehetra sy ny lalàny, izay andidiako anao anio, dia ho tonga aminao sy hahatratra anao izao fanozonana rehetra izao:–
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hozonina hianao ao an-tanàna, ary hozonina hianao any an-tsaha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hozonina ny haronao sy ny vilia fanaova-mofonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hozonina ny ateraky ny kibonao sy ny vokatry ny taninao ary ny ateraky ny ombinao sy ny ateraky ny ondry aman-osinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hozonina hianao, raha miditra; ary hozonina hianao, raha mivoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hampandehanin’i Jehovah aminao ny ozona, dia horohoro sy fampitahorana amin’izay rehetra ataon’ny tànanao, mandra-paharinganao sy mandra-pahalaninao faingana noho ny faharatsian’ny nataonao tamin’ny nahafoizanao Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hampiraiketin’i Jehovah aminao ny areti-mandringana, mandra-pandaniny anao tsy ho eo amin’ny tany izay efa hidiranao holovana. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary areti-mahasahozanina sy tazo mahamay sy fahamaizana sy hafanana mangotraka sy andro mihantona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sabatra.
    marker-yv: yv-n
  - type: text
    text: ' sy vary main’ny rivotra na maty fotsy no hamelezan’i Jehovah anao; dia hanenjika anao ireny mandra-pahalany ritranao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ho varahina ny lanitra eo ambonin’ny lohanao, ary ho vy ny tany eo ambaninao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hataon’i Jehovah vovoka sy jofo ny ranonorana amin’ny taninao; avy any an-danitra no hidinan’izany aminao mandra-paharinganao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Hatolotr’i Jehovah ho resy eo anoloan’ny fahavalonao hianao, ka làlana iray no hivoahanao hiady aminy, fa làlana fito kosa no handosiranao hiala eo anoloany; dia ho mpanjenjena any amin’ny fanjakana rehetra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho fampangovitana ny fanjakana rehetra.
    marker-yv: yv-n
  - type: text
    text: ' ambonin’ny tany hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary ny fatinao hohanin’ny voro-manidina rehetra sy ny bibi-dia, ka tsy hisy hanaitaitra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hamelin’i Jehovah anao ny vain’i Egypta sy ny tomboka sy ny hatina ary ny hazaka (izay tsy azom-panafody); '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary hamelin’i Jehovah anao koa ny fahadalana sy ny fahajambana ary ny fahaverezan-kevitra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hitsapatsapa hianao na dia amin’ny mitataovovonana aza tahaka ny fitsapatsapan’ny jamba ao amin’ny aizim-pito ka tsy ho tonga amin’izay halehanao; dia hampahorin’ny sasany sy hobaboiny mandrakariva hianao, fa tsy hisy hamonjy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hifofo vady hianao, fa olon-kafa no handry aminy; hanao trano hianao, fa tsy hitoetra ao; hanao tanimboaloboka hianao, fa tsy hihinana ny vokatra. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny ombinao hovonoina eo imasonao, fa tsy hihinana ny henany hianao. Ny borikinao halaina an-keriny eo anatrehanao ka tsy haverina aminao. Ny ondry aman-osinao homena ho an’ny fahavalonao, nefa tsy hanan-kamonjy hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny zanakao-lahy sy ny zanakao-vavy homena ho an’ny firenena hafa, ary hijery ny masonao ka ho pahina manontolo andro noho ny alahelonao azy, nefa tsy hahefa na inona na inona ny tànanao. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ny vokatry ny taninao sy izay rehetra efa nisasaranao dia hohanin’ny firenena izay tsy fantatrao; ary hanaovan’ny sasany an-keriny sy hotorotoroiny mandrakariva hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia ho very saina hianao noho ny zavatra izay ho hitan’ny masonao. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Hamelin’i Jehovah anao ny vay ratsy, izay tsy azom-panafody, dia amin’ny lohalikao sy ny tongotrao, hatramin’ny faladianao ka hatramin’ny tampon-dohanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ho entin’i Jehovah ho any amin’ny firenena izay tsy fantatrao na ny razanao hianao sy ny mpanjakanao, izay hatsanganao hanjaka aminao; ary any no hanompoanao andriamani-kafa, dia vato aman-kazo. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Dia ho figagana sy ohabolana ary ho ambentinteny hianao any amin’ny firenena rehetra izay hitondran’i Jehovah anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Voan-javatra betsaka no ho entinao hambolena any an-tsaha, fa kely kosa no hangoninao, satria ho lanin’ny valala ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hanao tanimboaloboka hianao ka hiasa azy, nefa tsy hisotro divay na hioty voaloboka hianao, satria ho lanin’ny fositra ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hanana hazo oliva amin’ny taninao rehetra hianao, nefa tsy hihosotra diloilo; fa hihintsana ny olivanao. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hiteraka zazalahy sy zazavavy hianao, nefa tsy ho anao ireny, fa ho lasan-ko babo. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ny hazonao sy ny vokatry ny taninao rehetra dia ho lanin’ny valala. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ny vahiny eo aminao hisandratra ho ambony dia ambony noho hianao, fa hianao kosa hietry ho ambany dia ambany. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Izy hampisambotra anao, fa hianao kosa tsy hampisambotra azy; izy ho lohany, fa hianao ho rambony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia ho tonga aminao ireo ozona rehetra ireo ka hanenjika anao sy hahatratra anao mandra-paharinganao, satria tsy nihaino ny feon’i Jehovah Andriamanitrao hianao hitandremanao ny didiny sy ny lalàny, izay nandidiany anao. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary ho famantarana sy fahagagana aminao sy ny taranakao mandrakizay izany, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'satria tsy nanompo an’i Jehovah Andriamanitrao tamin’ny fahafaliana sy ny faharavoam-po hianao noho ny habetsahan’ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Ary amin’ny fahanoanana sy ny hetaheta sy ny fitanjahana ary ny tsi-fananana na inona na inona no hanompoanao ny fahavalonao izay hampandehanin’i Jehovah hiady aminao; dia hanisy zioga vy amin’ny vozonao ireny mandra-pandringany anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ho entin’i Jehovah hiady aminao izay firenena avy lavitra, dia ny avy amin’ny faran’ny tany–tahaka ny fanidin’ny voromahery '
  - type: usfm
    marker: it
    children:
    - type: text
      text: no fihaviny
  - type: text
    text: ', sady firenena izay tsy ho fantatrao ny fiteniny, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'firenena masiaka endrika, izay tsy hanaja ny antitra, na hiantra ny tanora– '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'dia hohaniny ny ateraky ny ombinao sy ny vokatry ny taninao mandra-paharinganao; ka tsy hisy havelany ho anao, na vary, na ranom-boaloboka, na diloilo, na ny ateraky ny ombinao, na ny ateraky ny ondry aman-osinao, mandra-pandringany anao. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hataony fahirano any amin’ny tanànanao rehetra hianao mandra-pandravany ny màndanao avo sy mafy, izay itokianao, eran’ny taninao rehetra; eny, hataony fahirano hianao any amin’ny tanànanao rehetra eran’ny taninao rehetra, izay omen’i Jehovah Andriamanitrao anao. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary eo amin’ny fahirano sy ny fanerena, izay haneren’ny fahavalonao anao, dia ny ateraky ny kibonao no hohaninao, dia ny nofon’ny zanakao-lahy sy ny zanakao-vavy, izay omen’i Jehovah Andriamanitrao anao. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ny lehilahy malemilemy sy mihantahanta indrindra eo aminao dia ho ratsy fijery ny rahalahiny sy ny vadiny andefimandry ary ny zanany sisa, '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'ka tsy hisy amin’ireo hanomezany ny nofon’ny zanany izay haniny fandrao tsy hisy intsony ho azy amin’ny fahirano sy ny fanerena, izay haneren’ny fahavalonao anao any amin’ny tanànanao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ny vehivavy malemilemy sy mihantahanta eo aminao, izay tsy mbola nanandrana nandia tany noho ny fihantahantany sy ny fahalemilemeny, dia ho ratsy fijery ny vadiny andefimandry sy ny zanani-lahy ary ny zanani-vavy '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: noho ny ahitra izay mivoaka avy aminy sy ny zanany vao teraka; fa hihinana izany mangingina izy noho ny tsi-fisian-javatra amin’ny fahirano sy ny fanerena, izay haneren’ny fahavalonao anao any amin’ny tanànanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Raha tsy tandremanao ny hanaraka ny teny rehetra amin’ity lalàna ity, izay voasoratra eto amin’ity boky ity, hatahoranao izao anarana efa nankalazaina sady mahatahotra izao hoe: JEHOVAH ANDRIAMANITRAO, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'dia hataon’i Jehovah mahagaga ny kapoka hataony aminao sy ny zanakao, dia kapoka mafy sady maharitra ela ary faharariana mafy sady maharitra ela. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Dia haveriny aminao indray ny aretin’i Egypta rehetra, izay natahoranao ka hiraikitra aminao ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary ny faharariana rehetra sy ny kapoka rehetra koa, izay tsy voasoratra amin’ny bokin’ity lalàna ity aza, dia ho entin’i Jehovah mamely anao mandra-paharinganao. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Ary olona vitsy no ho sisa aminareo hisolo izao fahamaroanareo toy ny kintana eny amin’ny lanitra izao, satria tsy nihaino ny feon’i Jehovah Andriamanitrao hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary araka izay nifalian’i Jehovah taminareo hahasoa hahamaro anareo, dia araka izany kosa no hifalian’i Jehovah handringana sy handrava anareo; dia hofongorana hianareo tsy ho eo amin’ny tany, izay efa hidiranao holovana. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Dia haelin’i Jehovah any amin’ny firenena rehetra hatramin’ny faran’ny tany hianao; ary any no hanompoanao andriamani-kafa vato aman-kazo, izay tsy fantatrao na ny razanao. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Ary any amin’ireo firenena ireo dia tsy hisy hiainanao, na hitsaharan’ny faladianao; fa any no hanomezan’i Jehovah anao fo miemponempona sy maso pahina ary fahakiviam-panahy. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ary ny ainao hihevingevina eo anatrehanao; dia hatahotra andro aman-alina hianao ka tsy hanampo izay ho velona. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Nony maraina ny andro dia hanao hoe hianao: Malakia hariva! ary nony hariva ny andro, dia hanao hoe hianao: Malakia maraina! noho ny tahotry ny fonao izay hatahoranao, sy noho ny zavatra izay ho hitan’ny masonao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Ary hianao ho entin’i Jehovah an-tsambo hiverina any Egypta amin’ilay làlana efa nolazaiko taminao hoe: Tsy hahita izany intsony hianao; dia hivaro-tena ho andevolahy sy ho andevovavy any amin’ny fahavalonareo hianareo, nefa tsy hisy mpividy.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Filazana ny faneken’i Jehovah tamin’ny Isiraely, sy fananarana azy, andrao misy mandika izany fanekena izany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: IZAO no tenin’ny fanekena izay nandidian’i Jehovah an’i Mosesy hatao amin’ny Zanak’Isiraely tany amin’ny tany Moaba, afa-tsy ilay fanekena nataony taminy tao Horeba.
