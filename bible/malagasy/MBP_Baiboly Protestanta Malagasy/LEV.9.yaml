document_id: LEV.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanombohan’i Arona sy ny zanany ny raharahany.
  - type: text
    content: 'ARY tamin’ny andro fahavalo Mosesy dia nampaka an’i Arona sy ny zanany ary ny loholon’ny Isiraely. '
  '10':
  - type: text
    content: fa ny saborany sy ny voany roa ary ny ila-atiny lehibe
  - type: note
    content: 'Na: saron’atiny.'
  - type: text
    content: ' avy tamin’ny fanatitra noho ny ota dia nodorany ho fofona teo ambonin’ny alitara, araka izay nandidian’i Jehovah an’i Mosesy; '
  '11':
  - type: text
    content: ary ny hena sy ny hoditra dia nodorany tamin’ny afo teny ivelan’ny toby.
  '12':
  - type: text
    content: 'Dia namono ny fanatitra dorana Arona; ary ny zanany nanolotra azy ny ra dia nanopy izany manodidina tamin’ny lafin’ny alitara izy. '
  '13':
  - type: text
    content: 'Ary ny fanatitra dorana mbamin’ny lohany dia natolotr’ireo azy tsirairay araka ny nandrasàna azy ka nodorany ho fofona teo ambonin’ny alitara. '
  '14':
  - type: text
    content: Ary nanasa ny taovany sy ny tongony izy, dia nandoro ireo ho fofona niaraka tamin’ny fanatitra dorana teo ambonin’ny alitara.
  '15':
  - type: text
    content: Dia nentiny nanatona ny fanatitry ny olona, ka nalainy ny osilahy hatao fanatitra noho ny ota, izay ho an’ny olona, dia namono azy izy ka nanatitra azy ho fanatitra noho ny ota, tahaka ilay anankiray teo.
  - type: note
    content: Dia ilay ho an’ny tenany (and. 8–11).
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Dia nanatitra ny fanatitra dorana izy ka nanao azy araka ny fanao. '
  '17':
  - type: text
    content: 'Dia nentiny nanatona koa ny fanatitra hohanina ka nangalany eran-tànan-ila, dia nodorany ho fofona teo ambonin’ny alitara izany, ho fanampin’ny fanatitra dorana maraina. '
  '18':
  - type: text
    content: 'Dia namono ny omby sy ny ondrilahy koa izy hatao fanati-pihavanana, izay haterina noho ny olona; ary ny zanak’i Arona nanolotra azy ny ra, dia nanopy izany manodidina tamin’ny lafin’ny alitara izy. '
  '19':
  - type: text
    content: Ary natolony azy koa ny saboran’ny omby sy ny hofaky ny ondrilahy mbamin’ny safodrorohany ary ny voany roa sy ny ila-atiny lehibe,
  - type: note
    content: 'Na: saron’atiny.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Dia hoy izy tamin’i Arona: Makà ombilahy kely ho anao hatao fanatitra noho ny ota sy ondrilahy ho fanatitra dorana, izay samy tsy misy kilema, ka atero eo anatrehan’i Jehovah. '
  '20':
  - type: text
    content: 'dia napetrany teo ambonin’ny tratran’ireo ny saborany, ary nodorany ho fofona teo ambonin’ny alitara izany; '
  '21':
  - type: text
    content: fa ny tratrany sy ny sorony
  - type: note
    content: 'Na: feny.'
  - type: text
    content: ' ankavanana kosa dia nahevahevan’i Arona ho fanatitra ahevaheva eo anatrehan’i Jehovah, araka izay nandidian’i Mosesy.'
  '22':
  - type: text
    content: 'Ary Arona nanandratra ny tànany manandrify ny olona ka nitso-drano azy; dia nidina izy, rehefa avy nanatitra ny fanatitra noho ny ota sy ny fanatitra dorana ary ny fanati-pihavanana. '
  '23':
  - type: text
    content: 'Ary Mosesy sy Arona niditra tao amin’ny trano-lay fihaonana, dia nivoaka ka nitso-drano ny olona; ary ny voninahitr’i Jehovah niseho tamin’ny olona rehetra. '
  '24':
  - type: text
    content: Ary nisy afo nivoaka avy teo anatrehan’i Jehovah ka nandevona ny fanatitra dorana sy ny saborany teo ambonin’ny alitara; ary nony hitan’ny olona rehetra izany, dia nihoby izy sady niankohoka.
  '3':
  - type: text
    content: 'Ary ny Zanak’Isiraely dia ilazao hoe: Makà osilahy hatao fanatitra noho ny ota sy ombilahy kely ary zanak’ondry, izay samy iray taona'
  - type: note
    content: 'Na: hatramin’ny iray taona no ho midina.'
  - type: text
    content: ' sady samy tsy misy kilema, hatao fanatitra dorana, '
  '4':
  - type: text
    content: ary omby sy ondrilahy hatao fanati-pihavanana, hovonoina ho fanatitra eo anatrehan’i Jehovah, ary fanatitra hohanina voaharo diloilo; fa anio no hisehoan’i Jehovah aminareo.
  '5':
  - type: text
    content: 'Dia nitondra izay nandidian’i Mosesy azy ho eo anoloan’ny trano-lay fihaonana izy; ary ny fiangonana rehetra nanatona ka nijanona teo anatrehan’i Jehovah. '
  '6':
  - type: text
    content: 'Ary hoy Mosesy: Izao no zavatra izay nandidian’i Jehovah, koa ataovinareo, dia hiseho aminareo ny voninahitr’i Jehovah.'
  '7':
  - type: text
    content: 'Ary hoy Mosesy tamin’i Arona: Manatòna ny alitara, dia manatera ny fanatitrao noho ny ota sy ny fanatitra odoranao ka manaova fanavotana ho an’ny tenanao sy ho an’ny olona; dia manatera ny fanatitry ny olona ka manaova fanavotana ho azy, araka izay nandidian’i Jehovah.'
  '8':
  - type: text
    content: 'Dia nanatona ny alitara Arona ka namono ny ombilahy kely hatao fanatitra noho ny ota, izay ho an’ny tenany. '
  '9':
  - type: text
    content: 'Ary nentin’ny zanak’i Arona ho eo aminy ny ra, dia nanoboka ny fanondrony tamin’ny ra Arona, ka notentenany ny tandroky ny alitara ary ny ra '
  - type: text
    content: sisa
  - type: text
    content: ' dia naidiny teo am-bodin’ny alitara; '
