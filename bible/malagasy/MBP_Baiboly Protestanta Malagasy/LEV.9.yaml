document_id: LEV.9,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanombohan’i Arona sy ny zanany ny raharahany.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’ny andro fahavalo Mosesy dia nampaka an’i Arona sy ny zanany ary ny loholon’ny Isiraely. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny saborany sy ny voany roa ary ny ila-atiny lehibe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: saron’atiny.
      marker-yv: yv-n
    - type: text
      text: ' avy tamin’ny fanatitra noho ny ota dia nodorany ho fofona teo ambonin’ny alitara, araka izay nandidian’i Jehovah an’i Mosesy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny hena sy ny hoditra dia nodorany tamin’ny afo teny ivelan’ny toby.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namono ny fanatitra dorana Arona; ary ny zanany nanolotra azy ny ra dia nanopy izany manodidina tamin’ny lafin’ny alitara izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanatitra dorana mbamin’ny lohany dia natolotr’ireo azy tsirairay araka ny nandrasàna azy ka nodorany ho fofona teo ambonin’ny alitara. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanasa ny taovany sy ny tongony izy, dia nandoro ireo ho fofona niaraka tamin’ny fanatitra dorana teo ambonin’ny alitara.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentiny nanatona ny fanatitry ny olona, ka nalainy ny osilahy hatao fanatitra noho ny ota, izay ho an’ny olona, dia namono azy izy ka nanatitra azy ho fanatitra noho ny ota, tahaka ilay anankiray teo.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ilay ho an’ny tenany (and. 8–11).
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatitra ny fanatitra dorana izy ka nanao azy araka ny fanao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nentiny nanatona koa ny fanatitra hohanina ka nangalany eran-tànan-ila, dia nodorany ho fofona teo ambonin’ny alitara izany, ho fanampin’ny fanatitra dorana maraina. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namono ny omby sy ny ondrilahy koa izy hatao fanati-pihavanana, izay haterina noho ny olona; ary ny zanak’i Arona nanolotra azy ny ra, dia nanopy izany manodidina tamin’ny lafin’ny alitara izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary natolony azy koa ny saboran’ny omby sy ny hofaky ny ondrilahy mbamin’ny safodrorohany ary ny voany roa sy ny ila-atiny lehibe,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: saron’atiny.
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamin’i Arona: Makà ombilahy kely ho anao hatao fanatitra noho ny ota sy ondrilahy ho fanatitra dorana, izay samy tsy misy kilema, ka atero eo anatrehan’i Jehovah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia napetrany teo ambonin’ny tratran’ireo ny saborany, ary nodorany ho fofona teo ambonin’ny alitara izany; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny tratrany sy ny sorony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: feny.
      marker-yv: yv-n
    - type: text
      text: ' ankavanana kosa dia nahevahevan’i Arona ho fanatitra ahevaheva eo anatrehan’i Jehovah, araka izay nandidian’i Mosesy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Arona nanandratra ny tànany manandrify ny olona ka nitso-drano azy; dia nidina izy, rehefa avy nanatitra ny fanatitra noho ny ota sy ny fanatitra dorana ary ny fanati-pihavanana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mosesy sy Arona niditra tao amin’ny trano-lay fihaonana, dia nivoaka ka nitso-drano ny olona; ary ny voninahitr’i Jehovah niseho tamin’ny olona rehetra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy afo nivoaka avy teo anatrehan’i Jehovah ka nandevona ny fanatitra dorana sy ny saborany teo ambonin’ny alitara; ary nony hitan’ny olona rehetra izany, dia nihoby izy sady niankohoka.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Zanak’Isiraely dia ilazao hoe: Makà osilahy hatao fanatitra noho ny ota sy ombilahy kely ary zanak’ondry, izay samy iray taona'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hatramin’ny iray taona no ho midina.
      marker-yv: yv-n
    - type: text
      text: ' sady samy tsy misy kilema, hatao fanatitra dorana, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary omby sy ondrilahy hatao fanati-pihavanana, hovonoina ho fanatitra eo anatrehan’i Jehovah, ary fanatitra hohanina voaharo diloilo; fa anio no hisehoan’i Jehovah aminareo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitondra izay nandidian’i Mosesy azy ho eo anoloan’ny trano-lay fihaonana izy; ary ny fiangonana rehetra nanatona ka nijanona teo anatrehan’i Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy: Izao no zavatra izay nandidian’i Jehovah, koa ataovinareo, dia hiseho aminareo ny voninahitr’i Jehovah.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Mosesy tamin’i Arona: Manatòna ny alitara, dia manatera ny fanatitrao noho ny ota sy ny fanatitra odoranao ka manaova fanavotana ho an’ny tenanao sy ho an’ny olona; dia manatera ny fanatitry ny olona ka manaova fanavotana ho azy, araka izay nandidian’i Jehovah.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanatona ny alitara Arona ka namono ny ombilahy kely hatao fanatitra noho ny ota, izay ho an’ny tenany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nentin’ny zanak’i Arona ho eo aminy ny ra, dia nanoboka ny fanondrony tamin’ny ra Arona, ka notentenany ny tandroky ny alitara ary ny ra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sisa
    - type: text
      text: ' dia naidiny teo am-bodin’ny alitara; '
