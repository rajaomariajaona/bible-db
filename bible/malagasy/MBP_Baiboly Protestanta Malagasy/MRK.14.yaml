document_id: MRK.14,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nihendren’ny lohan’ny mpisorona sy ny loholona hamonoany an’i Jesosy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.1-5; Lio. 22.1,2.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'REHEFA indroa andro no sisa tsy hahatongavan’ny Paska, fihinanana ny mofo tsy misy masirasira, dia nitady hisambotra an’i Jesosy tamin’ny fitaka ny lohan’ny mpisorona sy ny mpanora-dalàna mba hamonoany Azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Jodasy Iskariota, ilay isan’ny roa ambin’ny folo lahy, dia nankao amin’ny lohan’ny mpisorona hamadika an’i Jesosy aminy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nandre izany izy ireo, dia faly ka nanaiky hanome vola azy. Ary Jodasy dia nitady izay andro hahazoany mamadika Azy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niarahan’i Jesosy sy ny mpianany nihinana ny Paska.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.17-29; Lio. 22.7-23.
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tamin’ny voalohan’ny andro fihinanana ny mofo tsy misy masirasira, izay famonoana ny Paska, dia hoy ny mpianany taminy: Aiza no tianao halehanay hanamboaranay mba hihinananao ny Paska?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka roa lahy tamin’ny mpianany Izy ka nanao taminy hoe: Mankanesa any an-tanàna, ary hisy lehilahy mitondra siny feno rano hifanena aminareo; dia manaraha azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazao amin’ny tompon’ny trano izay hidirany hoe: Izao no lazain’ny Mpampianatra: Aiza ny efi-trano hiarahako mihinana ny Paska amin’ny mpianatro? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy hanoro anareo efi-trano malalaka ambony rihana izay voaisy fipetrahana sady voavoatra tsara; any no amboary ho antsika. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mpianatra nandeha, dia tonga tany an-tanàna ka nahita araka izay nolazainy taminy; dia namboatra ny Paska izy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hariva ny andro, dia tonga Izy sy ny roa ambin’ny folo lahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nipetraka nihinana izy, dia hoy Jesosy: Lazaiko aminareo marina tokoa fa ny anankiray aminareo, dia izay iray miara-mihinana amiko, no hamadika Ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalahelo izy, ka samy nanontany Azy tsirairay hoe: Izaho va izany? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy izy: Tsy amin’ny andro firavoravoana, fandrao hampitabataba ny vahoaka.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanosoran-dravehivavy an’i Jesosy tao an-tranon’i Simona boka.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.6-13; Jao. 12.1-11.
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izy nanao taminy hoe: Izay anankiray amin’ny roa ambin’ny folo lahy miara-manatsoboka amiko ao anatin’ny lovia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: no izy.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny Zanak’olona dia mandeha tokoa, araka ny nanoratana Azy, nefa lozan’izay olona hahazoana ny Zanak’olona hatolotra! Tsara ho an’izany olona izany raha tsy ary akory.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola nihinana izy, Jesosy nandray mofo; ka nony efa nisaotra, dia novakiny ka natolony azy ary nataony hoe: Raiso, ity no tenako. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandray kapoaka Izy, ka nony efa nisaotra, dia natolony azy; ka dia nisotroan’izy rehetra izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Ity no rako amin’ny fanekena,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.24 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[fanekena vaovao].'
      marker-yv: yv-n
    - type: text
      text: ' izay alatsaka hamonjy ny maro. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Tsy mba hisotro ny vokatry ny voaloboka intsony Aho mandra-pihavin’ny andro hisotroako izay vaovao any amin’ny fanjakan’Andriamanitra.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny resaka nataon’i Jesosy sy ny mpianany teny an-dàlana, raha nankany an-tendrombohitra Oliva.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.30-35; Lio. 22.31-38; Jao. 13.36-38?
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ARY rehefa nihira fiderana izy, dia lasa nankany an-tendrombohitra Oliva.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy taminy: Ho tafintohina avokoa hianareo rehetra; fa voasoratra hoe: „Hamely ny mpiandry Aho, dia hihahaka ny ondry” (Zak. 13.7). '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa rehefa mitsangana Aho, dia hialoha anareo ho any Galilia.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Petera taminy: Na dia ho tafintohina avokoa aza ny olona rehetra, izaho tsy mba ho fafintohina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nony tany Betania Jesosy tao an-tranon’i Simona boka ka nipetraka nihinana, dia avy ny vehivavy anankiray nitondra tavoara ala-bastara feno menaka manitra nisy narda saro-bidy indrindra; dia novakiny ny tavoara, ka naidiny tamin’ny lohan’i Jesosy ny menaka. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy taminy: Lazaiko aminao marina tokoa: Anio, dia amin’ity alina ity, raha tsy mbola misy akoho maneno fanindroany, dia handa Ahy intelo hianao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa vao mainka niteny mafy dia mafy izy hoe: Na dia hiara-maty aminao aza aho, tsy mba handa Anao tokoa aho. Ary toy izany koa no nolazain’izy rehetra.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jesosy tao Getsemane.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.36-46; Lio. 22.39-46.
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY tonga tany amin’ny saha izay atao hoe Getsemane izy; dia hoy Jesosy tamin’ny mpianany: Mipetraha eto hianareo mandra-pivavako.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitondra an’i Petera sy Jakoba sy Jaona Izy, dia talanjona sady ory indrindra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Fadiranovana loatra ny fanahiko toy ny efa ho faty; mitoera eto, ka miareta tory. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nandroso kelikely Izy, dia niankohoka tamin’ny tany ka nivavaka mba hialan’izany ora izany aminy, raha azo atao. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Aba, Raiko ô, ny zavatra rehetra hainao; esory amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao, fa ny Anao.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary avy Izy ka nahita azy ireo matory, dia hoy Izy tamin’i Petera: Ry Simona, matory va hianao? Tsy nahazaka niari-tory na dia ora iray ihany aza va hianao? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miareta tory hianareo, ka mivavaha, mba tsy hidiranareo amin’ny fakam-panahy; mety ihany ny fanahy, fa ny nofo no tsy manan-kery. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa indray Izy ka nivavaka nanao ilay teny teo ihany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy ny sasany tezitra ka nifampilaza hoe: Inona no anton’izao fandaniam-poana ny menaka manitra izao? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niverina indray Izy, dia nahita azy matory, fa efa nilondolondo ny masony, ka tsy hitany izay havaliny Azy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary avy fanintelony Izy, dia nanao taminy hoe: Matoria ary ankehitriny, ka mialà sasatra hianareo. Aoka izay; efa tonga ny ora; indro, ny Zanak’olona hatolotra eo an-tànan’ny mpanota. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitsangàna, andeha isika; indro fa efa akaiky ilay mamadika Ahy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nisamborana an’i Jesosy.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.47-56; Lio. 22.47-53; Jao. 18.1-11.
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY niaraka tamin’izay, raha mbola niteny Izy, dia avy Jodasy, isan’ny roa ambin’ny folo lahy, sady nisy vahoaka niaraka taminy, nitondra sabatra sy langilangy, nirahin’ny lohan’ny mpisorona sy ny mpanora-dalàna ary ny loholona. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay hamadika Azy efa nanome famantarana ireo ka nanao hoe: Izay horohako no Izy; sambory Izy ka ento, fa aza avela ho afaka. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga izy, dia nanatona an’i Jesosy niaraka tamin’izay ka nanao hoe: Raby ô! dia nanoroka Azy izy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona naninjitra ny tànany taminy ka nisambotra Azy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anankiray tamin’izay teo anilany nanatsoaka ny sabany, dia nikapa ny mpanompon’ny mpisoronabe ka nahafaka ny sofiny.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy namaly ka nanao taminy hoe: Mivoaka mitondra sabatra sy langilangy hisambotra Ahy toy ny hisambotra jiolahy va hianareo? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo aminareo isan-andro Aho nampianatra teo an-kianjan’ny tempoly, nefa tsy nisambotra Ahy hianareo; fa mba hahatanteraka ny Soratra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Masina
    - type: text
      text: ' izao.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa azo namidy ho lafo tsy omby denaria telon-jato iny menaka manitra iny ka homena ny malahelo. Dia tezitra indrindra tamin-dravehivavy ireo.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary samy nandao Azy izy rehetra ka nandositra.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy zatovo anankiray nanaraka Azy, ka lamba hariry madinika fotsiny ihany no nitafiany, ary nosamborin’ny olona teo izy. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia navelany '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teny aminy
    - type: text
      text: ' ny lambany hariry madinika, ka nandositra nitanjaka izy.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nitsarana an’i Jesosy teo anatrehan’ny mpirosonabe, sy ny nandavan’i Petera Azy intelo.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 26.57-75; Lio. 22.54-71; Jao. 18.12-27.
    marker-yv: yv-h
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY nitondra an’i Jesosy ho any amin’ny mpisoronabe izy; ary niangona teo aminy ny lohan’ny mpisorona rehetra sy ny loholona ary ny mpanora-dalàna. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Petera efa nanaraka Azy teny lavidavitra eny hatrany amin’ny kianjan’ny tranon’ny mpisoronabe; ary niara-nipetraka teo amin’ny mpiandry raharaha izy ka namindro teo anilan’ny afo.
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lohan’ny mpisorona sy ny Synedriona rehetra nitady vavolombelona hiampanga an’i Jesosy hamonoany Azy, nefa tsy nahita. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maro no niampanga lainga Azy, nefa tsy nifanaraka ny fiampangany. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsangana ny sasany, dia niampanga lainga Azy nanao hoe: '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izahay efa nandre Azy nanao hoe: Izaho handrava ity tempoly nataon-tànana ity, ary amin’ny hateloana dia hanangana hafa izay tsy nataon-tànana Aho. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy nifanaraka ny filàzany na dia tamin’izany aza.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy taminy: Avelao izy; nahoana hianareo no mampalahelo azy? Asa soa no nataony tamiko. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisoronabe nitsangana nankeo afovoany, dia nanontany an’i Jesosy ka nanao hoe: Tsy mety mamaly akory va Hianao? Inona no iampangan’ireto Anao? '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy niteny Jesosy sady tsy namaly akory.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany Azy indray ny mpisoronabe ka nanao taminy hoe: Hianao va no Kristy, Zanaky ny Isaorana? '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy: Izaho no Izy; ary ho hitanareo ny Zanak’olona mipetraka eo ankavanan’ny Hery sady avy eo amin’ny rahon’ny lanitra. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisoronabe nandriatra ny fitafiany ka nanao hoe: Ahoana no mbola ilantsika vavolombelona indray? '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa renareo ny fitenenany ratsy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.64 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'blasfemia; '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'izahao Mat. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ix. 3.
      marker-yv: yv-n
    - type: text
      text: ' ahoana no hevitrareo? Dia nataon’izy rehetra fa mendrika ho faty Izy.'
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sasany nandrora Azy, dia nanarona ny tavany sady namely tahamaina Azy ka nanao hoe: Maminania; ary ny mpiandry raharaha namely tahamaina'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.65 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tehina.
      marker-yv: yv-n
    - type: text
      text: ' Azy koa.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nitoetra teo ambany teo an-kianja Petera, dia avy ny anankiray tamin’ny ankizivavin’ny mpisoronabe; '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nony nahita an’i Petera namindro izy, dia nijery azy ka nanao hoe: Hianao koa nomba an’i Jesosy avy any Nazareta. '
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izy nandà ka nanao hoe: Tsy fantatro sady tsy azoko ny teninao. Dia niala ho eo am-bavahady izy, ary nisy akoho naneno. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay ankizivavy nahita azy indray, dia niteny tamin’izay teo anilany hoe: Io lehilahy io mba naman’ireny; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny malahelo dia eto aminareo mandrakariva, ary na oviana na oviana no tianareo hanaovana soa aminy, dia mahazo manao hianareo; fa Izaho kosa tsy mba ho eto aminareo mandrakariva. '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izy nandà indray. Ary nony afaka kelikely, izay teo anilany koa dia nilaza tamin’i Petera hoe: Naman’ireo tokoa hianao; fa Galiliana hianao. '
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niozona sy nianiana izy ka nanao hoe: Tsy fantatro izany Lehilahy lazainareo izany. '
  '72':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niaraka tamin’izay dia nisy akoho naneno fanindroany. Ary Petera nahatsiaro ny teny izay nolazain’i Jesosy taminy hoe: Raha tsy mbola misy akoho maneno fanindroany, dia handa Ahy intelo hianao. Ary nony nieritreritra izany izy, dia nitomany.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nanao izay azony natao izy: namonjy nanosotra ny tenako hanamboarany Ahy halevina izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazaiko aminareo marina tokoa: Na aiza na aiza amin’izao tontolo izao no hitoriana ny filazantsara, dia holazaina koa izao nataon-dravehivavy izao mba ho fahatsiarovana azy.'
