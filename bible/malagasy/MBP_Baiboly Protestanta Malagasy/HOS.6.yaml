document_id: HOS.6,873
type_code: plt
verses:
  '1':
  - type: text
    content: Andeha hiverina ho amin’i Jehovah isika;
  - type: text
    content: Fa Izy no namiravira, ary Izy ihany no hahasitrana antsika;
  - type: text
    content: Izy no namely, ary Izy no hamehy ny ferintsika.
  '10':
  - type: text
    content: 'Tao amin’ny taranak’Isiraely no nahitako zavatra mahatsiravina:'
  - type: text
    content: Ao ny fijangajangan’i Efraima, voaloto Isiraely.
  '11':
  - type: text
    content: Ny aminao, ry Joda, dia voatendry koa ny andro hijinjana anao,
  - type: text
    content: Rehefa ampodiko avy amin’ny fahababoana ny oloko.
  '2':
  - type: text
    content: Rehefa afaka indroa andro, dia hovelominy indray isika;
  - type: text
    content: Ary amin’ny andro fahatelo, dia hatsangany ho velona eo anatrehany isika.
  '3':
  - type: text
    content: Dia aoka hahalala, eny, aoka hiezaka hahalala an’i Jehovah isika;
  - type: text
    content: Mahatoky toy ny maraina ny fiposahany,
  - type: text
    content: Fa ho avy amintsika toy ny ranonorana mivatravatra Izy,
  - type: text
    content: Sy toy ny fara-orana izay mahavonto ny tany.
  '4':
  - type: text
    content: Inona re no ho azoko atao aminao, ry Efraima?
  - type: text
    content: Inona re no ho azoko atao aminao, ry Joda?
  - type: text
    content: Fa toy ny rahona maraina ny fitiavanareo
  - type: text
    content: Sy tahaka ny ando izay levona, raha vao maraina ny andro.
  '5':
  - type: text
    content: Ary noho izany ny mpaminany no nentiko nikapa azy,
  - type: text
    content: Ny tenin’ny vavako no nentiko namono azy;
  - type: text
    content: Ary ny fitsarana anao dia hiposaka toy ny mazava.
  '6':
  - type: text
    content: Fa famindrampo no sitrako, fa tsy fanatitra alatsa-dra,
  - type: text
    content: Ary fahalalana an’Andriamanitra noho ny fanatitra dorana.
  '7':
  - type: text
    content: Fa ireny dia nivadika ny fanekena tahaka an’i Adama,
  - type: text
    content: Tao no nivadihany nahafoizany Ahy.
  '8':
  - type: text
    content: Gileada dia tanànan’ny mpanao ratsy
  - type: text
    content: Sady voaloton’ny ra.
  '9':
  - type: text
    content: 'Ary toy ny fanotriky ny jiolahy no fikamban’ny mpisorona:'
  - type: text
    content: Mamono eny an-dàlambe mankany Sekema izy,
  - type: text
    content: Eny, efa nanao fahavetavetana koa izy.
