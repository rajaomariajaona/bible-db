document_id: HOS.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Andeha hiverina ho amin’i Jehovah isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no namiravira, ary Izy ihany no hahasitrana antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izy no namely, ary Izy no hamehy ny ferintsika.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tao amin’ny taranak’Isiraely no nahitako zavatra mahatsiravina:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ao ny fijangajangan’i Efraima, voaloto Isiraely.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny aminao, ry Joda, dia voatendry koa ny andro hijinjana anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa ampodiko avy amin’ny fahababoana ny oloko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rehefa afaka indroa andro, dia hovelominy indray isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny andro fahatelo, dia hatsangany ho velona eo anatrehany isika.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia aoka hahalala, eny, aoka hiezaka hahalala an’i Jehovah isika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahatoky toy ny maraina ny fiposahany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho avy amintsika toy ny ranonorana mivatravatra Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy toy ny fara-orana izay mahavonto ny tany.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Inona re no ho azoko atao aminao, ry Efraima?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inona re no ho azoko atao aminao, ry Joda?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa toy ny rahona maraina ny fitiavanareo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy tahaka ny ando izay levona, raha vao maraina ny andro.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary noho izany ny mpaminany no nentiko nikapa azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tenin’ny vavako no nentiko namono azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fitsarana anao dia hiposaka toy ny mazava.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa famindrampo no sitrako, fa tsy fanatitra alatsa-dra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fahalalana an’Andriamanitra noho ny fanatitra dorana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ireny dia nivadika ny fanekena tahaka an’i Adama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tao no nivadihany nahafoizany Ahy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Gileada dia tanànan’ny mpanao ratsy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady voaloton’ny ra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary toy ny fanotriky ny jiolahy no fikamban’ny mpisorona:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamono eny an-dàlambe mankany Sekema izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, efa nanao fahavetavetana koa izy.
