document_id: ZEC.9,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana ny firenena maro, sy ny voninahitra ho azon’i Ziona kosa.
  - type: text
    content: TENY faminaniana avy tamin’i Jehovah ny amin’ny loza hanjo ny tany Hadraka,
  - type: text
    content: Ary Damaskosy no hiharany–
  - type: text
    content: Fa ny mason’i Jehovah mandinika ny olombelona
  - type: note
    content: 'Na: Fa mijery an’i Jehovah ny mason’ny olombelona.'
  - type: text
    content: Mbamin’ny firenena rehetra amin’ny Isiraely–
  '10':
  - type: text
    content: Ary hofoanako tsy hisy kalesy intsony Efraima,
  - type: text
    content: Na soavaly any Jerosalema,
  - type: text
    content: Hofoanana koa ny tsipìka fiadiana,
  - type: text
    content: Ary hiteny fiadanana amin’ny jentilisa Izy;
  - type: text
    content: Ny fanapahany dia hatramin’ny ranomasina ka hatramin’ny ranomasina
  - type: text
    content: Ary hatramin’ny Ony
  - type: note
    content: Eofrata.
  - type: text
    content: ' ka hatramin’ny faran’ny tany.'
  '11':
  - type: text
    content: Ny aminao koa, noho ny ran’ny fanekena taminao
  - type: text
    content: No efa namoahako ny mpifatotrao avy tao an-davaka tsy misy rano.
  '12':
  - type: text
    content: Miverena ho amin’ny fiarovana mafy,
  - type: text
    content: Hianareo mpifatotra manana ny fanantenana!
  - type: text
    content: 'Anio no hanambarako hoe: Hanonitra roa heny ho anao Aho.'
  '13':
  - type: text
    content: Fa nohenjaniko ho Ahy Joda,
  - type: text
    content: Efraima nataoko zana-tsipìka;
  - type: text
    content: Ary hotairiko ny zanakao, ry Ziona, hiady amin’ny zanakao, ry Grisia,
  - type: text
    content: Ary hataoko toy ny sabatry ny lehilahy mahery hianao,
  '14':
  - type: text
    content: Ary Jehovah hiseho ao aminy,
  - type: text
    content: Ka handeha toy ny helatra ny zana-tsipìkany;
  - type: text
    content: Jehovah Tompo hitsoka anjomara
  - type: text
    content: Ka handeha amin’ny tafio-drivotra any atsimo.
  '15':
  - type: text
    content: Ary Jehovah, Tompon’ny maro, no hiaro ireny;
  - type: text
    content: Dia hihinana ireny ka hanitsakitsaka vaton’antsamotady;
  - type: text
    content: Ary hisotro ireny ka hihorakoraka tahaka ny azon’ny divay,
  - type: text
    content: Ary ho feno toy ny lovia famafazana ireny, dia toy ny zoron’ny alitara.
  '16':
  - type: text
    content: Ary hovonjen’i Jehovah Andriamaniny ireny amin’izany andro izany
  - type: text
    content: Toy ny olona izay ondriny;
  - type: text
    content: Fa ho toy ny vaton-tsatroboninahitra
  - type: text
    content: Mamirapiratra eny amin’ny taniny ireny.
  '17':
  - type: text
    content: Fa akory ny hasoany! ary akory ny hatsaran-tarehiny!
  - type: text
    content: Vary no hampaharoroka
  - type: note
    content: Heb. hampitsimoka.
  - type: text
    content: ' ny zatovo,'
  - type: text
    content: Ary ranom-boaloboka kosa ny zazavavy.
  '2':
  - type: text
    content: Sy Hamata koa, izay mifanolotra aminy,
  - type: text
    content: Ary Tyro sy Sidona koa, satria hendry izy.
  '3':
  - type: text
    content: Ary Tyro nanao mànda mafy ho azy
  - type: text
    content: Ka nanangona volafotsy hoatra ny vovoka
  - type: text
    content: Sy volamena tsara hoatra ny fotaka eny an-dàlambe.
  '4':
  - type: text
    content: Indro, hofoanan’ny Tompo ny fananany,
  - type: text
    content: Sady hasiany koa ny heriny ao amin’ny ranomasina;
  - type: text
    content: Ary ny tenany ho levon’ny afo.
  '5':
  - type: text
    content: Askelona hahita izany ka ho raiki-tahotra,
  - type: text
    content: Gaza koa, ka ho toran-kovitra indrindra,
  - type: text
    content: Ary Ekrona, fa ho tonga henatra ny fanantenany;
  - type: text
    content: Tsy hisy mpanjaka intsony ao Gaza,
  - type: text
    content: Ary Askelona tsy honenana.
  '6':
  - type: text
    content: Zazasary no ho mpanjaka ao Asdoda,
  - type: text
    content: Ary hofoanako ny reharehan’ny Filistina.
  '7':
  - type: text
    content: Hesoriko eny am-bavany ny rany,
  - type: text
    content: Sy ny fahavetavetany tsy ho eny anelanelan’ny nifiny;
  - type: text
    content: Ary izy koa ho sisa ho an’Andriamanitsika
  - type: text
    content: Sy ho toy ny lohany amin’ny firenen’i Joda,
  - type: text
    content: Ary Ekrona ho toy ny Jebosita,
  '8':
  - type: text
    content: Ary hitoby Aho hiaro ny tranoko noho ny miaramila betsaka,
  - type: text
    content: Dia noho izay mandroso sy miverina;
  - type: text
    content: Ary
  - type: note
    content: 'Na: Mba tsy hisy mandroso na miverina, ka.'
  - type: text
    content: ' tsy hisy mpampahory handeha hamaky eo aminy intsony,'
  - type: text
    content: Fa ankehitriny dia efa hitan’ny masoko.
  '9':
  - type: text
    content: Mifalia indrindra, ry Ziona zanakavavy;
  - type: text
    content: Manaova feo fifaliana, ry Jerosalema zanakavavy;
  - type: text
    content: Indro, ny Mpanjakanao avy ho anao;
  - type: note
    content: 'Na: ho atỳ aminao.'
  - type: text
    content: Marina Izy sady manam-pamonjena,
  - type: note
    content: Heb. voavonjy.
  - type: text
    content: Malemy fanahy sady mitaingina boriky
  - type: text
    content: Dia zana-boriky tanora.
