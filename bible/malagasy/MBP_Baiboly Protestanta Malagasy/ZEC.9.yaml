document_id: ZEC.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny handravana ny firenena maro, sy ny voninahitra ho azon’i Ziona kosa.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: TENY faminaniana avy tamin’i Jehovah ny amin’ny loza hanjo ny tany Hadraka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Damaskosy no hiharany–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny mason’i Jehovah mandinika ny olombelona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa mijery an’i Jehovah ny mason’ny olombelona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny firenena rehetra amin’ny Isiraely–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sy Hamata koa, izay mifanolotra aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Tyro sy Sidona koa, satria hendry izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary Tyro nanao mànda mafy ho azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanangona volafotsy hoatra ny vovoka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy volamena tsara hoatra ny fotaka eny an-dàlambe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, hofoanan’ny Tompo ny fananany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady hasiany koa ny heriny ao amin’ny ranomasina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tenany ho levon’ny afo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Askelona hahita izany ka ho raiki-tahotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gaza koa, ka ho toran-kovitra indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Ekrona, fa ho tonga henatra ny fanantenany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy mpanjaka intsony ao Gaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Askelona tsy honenana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Zazasary no ho mpanjaka ao Asdoda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hofoanako ny reharehan’ny Filistina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hesoriko eny am-bavany ny rany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fahavetavetany tsy ho eny anelanelan’ny nifiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izy koa ho sisa ho an’Andriamanitsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho toy ny lohany amin’ny firenen’i Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Ekrona ho toy ny Jebosita,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary hitoby Aho hiaro ny tranoko noho ny miaramila betsaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia noho izay mandroso sy miverina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mba tsy hisy mandroso na miverina, ka.
    marker-yv: yv-n
  - type: text
    text: ' tsy hisy mpampahory handeha hamaky eo aminy intsony,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ankehitriny dia efa hitan’ny masoko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifalia indrindra, ry Ziona zanakavavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manaova feo fifaliana, ry Jerosalema zanakavavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, ny Mpanjakanao avy ho anao;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ho atỳ aminao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marina Izy sady manam-pamonjena,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voavonjy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malemy fanahy sady mitaingina boriky
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia zana-boriky tanora.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary hofoanako tsy hisy kalesy intsony Efraima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na soavaly any Jerosalema,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hofoanana koa ny tsipìka fiadiana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hiteny fiadanana amin’ny jentilisa Izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanapahany dia hatramin’ny ranomasina ka hatramin’ny ranomasina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hatramin’ny Ony
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
  - type: text
    text: ' ka hatramin’ny faran’ny tany.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny aminao koa, noho ny ran’ny fanekena taminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: No efa namoahako ny mpifatotrao avy tao an-davaka tsy misy rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Miverena ho amin’ny fiarovana mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianareo mpifatotra manana ny fanantenana!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Anio no hanambarako hoe: Hanonitra roa heny ho anao Aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa nohenjaniko ho Ahy Joda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efraima nataoko zana-tsipìka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hotairiko ny zanakao, ry Ziona, hiady amin’ny zanakao, ry Grisia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hataoko toy ny sabatry ny lehilahy mahery hianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary Jehovah hiseho ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka handeha toy ny helatra ny zana-tsipìkany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jehovah Tompo hitsoka anjomara
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka handeha amin’ny tafio-drivotra any atsimo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary Jehovah, Tompon’ny maro, no hiaro ireny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hihinana ireny ka hanitsakitsaka vaton’antsamotady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hisotro ireny ka hihorakoraka tahaka ny azon’ny divay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho feno toy ny lovia famafazana ireny, dia toy ny zoron’ny alitara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hovonjen’i Jehovah Andriamaniny ireny amin’izany andro izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny olona izay ondriny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho toy ny vaton-tsatroboninahitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mamirapiratra eny amin’ny taniny ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa akory ny hasoany! ary akory ny hatsaran-tarehiny!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vary no hampaharoroka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hampitsimoka.
    marker-yv: yv-n
  - type: text
    text: ' ny zatovo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ranom-boaloboka kosa ny zazavavy.
