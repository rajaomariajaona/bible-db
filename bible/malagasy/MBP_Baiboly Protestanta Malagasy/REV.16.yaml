document_id: REV.16,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nahare feo mahery avy tao amin’ny tempoly aho nanao tamin’ny anjely fito hoe: Mandehana, aidino amin’ny tany ny ao amin’ny lovia fito feno ny fahatezeran’Andriamanitra.'
  '10':
  - type: text
    content: 'Ary ny fahadimy nampidina ny tao an-doviany tamin’ny seza fiandrianan’ilay bibi-dia; dia tonga maizina ny fanjakany, ary ny olona nitsakotsako ny lelany noho ny fanaintainana, '
  '11':
  - type: text
    content: dia niteny ratsy
  - type: note
    content: Gr. nanao blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' an’Andriamanitry ny lanitra izy noho ny fanaintainany sy ny vainy sady tsy nibebaka tamin’ny asany.'
  '12':
  - type: text
    content: 'Ary ny fahenina nampidina ny tao an-doviany tamin’i Eofrata, ony lehibe; dia ritra ny ranony hanamboarana ny làlan’ireny mpanjaka avy any amin’ny fiposahan’ny masoandro. '
  '13':
  - type: text
    content: 'Ary nahita aho fa indreo fanahy maloto telo tahaka ny sahona avy tamin’ny vavan’ilay dragona sy tamin’ny vavan’ilay bibi-dia ary tamin’ny vavan’ilay mpaminany sandoka. '
  '14':
  - type: text
    content: Fa fanahin’ny demonia ireo ka manao famantarana sady mankany amin’ny mpanjaka amin’izao tontolo izao, mba hanangona azy ho amin’ny adin’ilay andro lehiben’Andriamanitra Tsitoha. (
  '15':
  - type: text
    content: Indro, avy toy ny mpangalatra Aho. Sambatra izay miambina
  - type: note
    content: Gr. miari-tory.
  - type: text
    content: ' ka miaro ny fitafiany, fandrao mandeha mitanjaka izy, ka hita ny fahamenarany.) '
  '16':
  - type: text
    content: Ary nangoniny ho any amin’ny tany atao amin’ny teny Hebreo hoe Hara-magedona ireny.
  '17':
  - type: text
    content: 'Ary ny fahafito dia nampidina ny tao an-doviany tamin’ny rivotra; dia nisy feo mahery nivoaka avy tao amin’ny tempoly, teo amin’ny seza fiandrianana, nanao hoe: Vita. '
  '18':
  - type: text
    content: 'Dia nisy helatra sy feo sy kotrokorana, ary nisy horohorontany mafy, izay tsy mbola nisy toy izany hatrizay nisian’olona tetỳ ambonin’ny tany, eny, tsy mbola nisy horohorontany mafy sy lehibe toy izany. '
  '19':
  - type: text
    content: 'Ary ny tanàna lehibe dia vaky ho telo toko, ary rava ny tanànan’ny firenena maro; ary Babylona lehibe dia notsarovana teo anatrehan’Andriamanitra, mba homena azy ny kapoaky ny divain’ny firehetan’ny fahatezerany. '
  '2':
  - type: text
    content: Ary ny voalohany nandeha, dia nampidina ny tao an-doviany tamin’ny tany; dia nisy vay ratsy sady mampahory tamin’ny olona izay nanana ny mariky ny bibi-dia sy niankohoka teo anatrehan’ny sariny.
  '20':
  - type: text
    content: 'Ary ny nosy rehetra nandositra, ary ny tendrombohitra tsy hita intsony. '
  '21':
  - type: text
    content: Ary nisy havandra vaventy nilatsaka avy tany an-danitra ho amin’ny olona, tokony ho lanjan-talenta iray avy; ary niteny ratsy
  - type: note
    content: Gr. nanao blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' an’Andriamanitra ny olona noho ny loza avy tamin’ny havandra; fa lehibe loatra izany loza izany.'
  '3':
  - type: text
    content: 'Ary ny faharoa nampidina ny tao an-doviany tamin’ny ranomasina; dia nody ra tahaka ny ran’ny olona maty ny ranomasina: ary maty ny zava-manan-aina rehetra tao aminy.'
  '4':
  - type: text
    content: 'Ary ny fahatelo nampidina ny tao an-doviany tamin’ny ony sy ny loharano; dia nody ra ireny. '
  '5':
  - type: text
    content: 'Ary nahare ny anjelin’ny rano aho nanao hoe: Marina Hianao, Ilay ankehitriny sy taloha, dia ny Iray Masina, satria efa nitsara toy izany Hianao; '
  '6':
  - type: text
    content: 'fa ny ran’ny olona masina sy ny mpaminany no nalatsany, ka dia ra kosa no nomenao hosotroiny; ary tandrifiny ho azy izany. '
  '7':
  - type: text
    content: 'Ary reko ny alitara nanao hoe: Eny, Tompo ô, Andriamanitra Tsitoha, marina sy mahitsy ny fitsaranao.'
  '8':
  - type: text
    content: 'Ary ny fahefatra nampidina ny tao an-doviany tamin’ny masoandro; dia nasaina nandoro ny olona tamin’ny afo izy. '
  '9':
  - type: text
    content: Ary main’ny hafanana be ny olona, dia niteny ratsy
  - type: note
    content: Gr. nanao blasfemia; izahao Mat. ix.3.
  - type: text
    content: ' ny anaran’Andriamanitra, Izay manam-pahefana amin’ireny loza ireny, izy sady tsy nibebaka mba hanome voninahitra Azy.'
