document_id: 1CH.27,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandaminana ny miaramila.
  - type: text
    content: ARY ny amin’ny Zanak’Isiraely araka ny isany, dia ny lohan’ny fianakaviany sy ny mpifehy arivo sy ny mpifehy zato ary ny mpifehy azy, izay nanompo ny mpanjaka tamin’izay raharahany rehetra isan-tokony, izay nifandimby isam-bolana mandritra ny herintaona, dia efatra arivo amby roa alina avy no isan’ny isan-tokony.
  '10':
  - type: text
    content: Ny fahafito, ho amin’ny volana fahafito, dia Heleza Pelonita, isan’ny taranak’i Efraima; ary ny antokony dia efatra arivo amby roa alina.
  '11':
  - type: text
    content: Ny fahavalo, ho amin’ny volana fahavalo, dia Sibekay Hosatita, isan’ny Zerita; ary ny antokony dia efatra arivo amby roa alina.
  '12':
  - type: text
    content: Ny fahasivy, ho amin’ny volana fahasivy, dia Abiezera Anatotita, isan’ny Benjamita; ary ny antokony dia efatra arivo amby roa alina.
  '13':
  - type: text
    content: Ny fahafolo, ho amin’ny volana fahafolo, dia Maharay Netofatita, isan’ny Zerita; ary ny antokony dia efatra arivo amby roa alina.
  '14':
  - type: text
    content: Ny fahiraika ambin’ny folo, ho amin’ny volana fahiraika ambin’ny folo, dia Benaia Piratonita, isan’ny taranak’i Efraima; ary ny antokony dia efatra arivo amby roa alina.
  '15':
  - type: text
    content: Ny faharoa ambin’ny folo, ho amin’ny volana faharoa ambin’ny folo, dia Helday Netofatita, isan’ny taranak’i Otniela; ary ny antokony dia efatra arivo amby roa alina.
  - type: heading
    content: Ny lohan’ny firenena roa ambin’ny folo.
  '16':
  - type: text
    content: 'ARY izao no lohan’ny firenen’Isiraely: Tamin’ny Robenita dia Eliezera, zanakalahin’i Zikry; tamin’ny Simeonita dia Sefatia, zanakalahin’i Maka; '
  '17':
  - type: text
    content: 'tamin’ny Levita dia Hasabia, zanakalahin’i Kemoela; tamin’ny Aronita dia Zadoka; '
  '18':
  - type: text
    content: 'tamin’ny Joda dia Eliho, izay isan’ny rahalahin’i Davida; tamin’ny Isakara dia Omry, zanakalahin’i Mikaela; '
  '19':
  - type: text
    content: 'tamin’ny Zebolona dia Jismaia, zanakalahin’i Obadia; tamin’ny Naftaly dia Jerimota, zanakalahin’i Azriela; '
  '2':
  - type: text
    content: 'Ny nifehy ny antokony voalohany, ho amin’ny volana voalohany, dia Jasobeama, zanak’i Zabdiela, ary ny antokony dia efatra arivo amby roa alina; '
  '20':
  - type: text
    content: 'tamin’ny taranak’i Efraima dia Hosea, zanakalahin’i Azazia; tamin’ny antsasaky ny firenen’i Manase dia Joela, zanakalahin’i Pedaia; '
  '21':
  - type: text
    content: 'tamin’ny antsasaky ny firenen’i Manase tao Gileada dia Ido, zanakalahin’i Zakaria; tamin’ny Benjamina dia Jasiela, zanakalahin’i Abnera; '
  '22':
  - type: text
    content: tamin’ny Dana dia Azarela, zanakalahin’i Jerohama. Ireo no lohan ny firenen’Isiraely.
  '23':
  - type: text
    content: 'Nefa tsy nanisa ny hatramin’ny roa-polo taona no ho midina Davida; fa Jehovah efa nilaza fa hampitombo ny Isiraely ho tahaka ny kintana eny amin’ny lanitra Izy. '
  '24':
  - type: text
    content: Joaba, zanak’i Zeroia, nanomboka nanisa, fa tsy nahefa, satria nisy fahatezerana nihatra tamin’ny Isiraely tamin’izany, ka dia tsy voasoratra ao amin’ny bokin’ny tantaran’i Davida mpanjaka ny isany.
  - type: heading
    content: Ny mpitandrina ny fananan’i Davida, sy ny mpanolo-tsaina azy.
  '25':
  - type: text
    content: 'ARY ny tonian’ny rakitry ny mpanjaka dia Azmaveta, zanak’i Adiela; ary ny tonian ny trano firaketana tany ambany vohitra, na tamin’ny tanàna, na tamin’ny vohitra, na tamin’ny tilikambo, dia Jonatana, zanak’i Ozia; '
  '26':
  - type: text
    content: 'ary ny mpifehy ny mpiasa tany an-tsaha hiasa ny tany dia Ezry, zanak’i Keloba; '
  '27':
  - type: text
    content: 'ary ny tonian’ny tanimboaloboka dia Simey Ramatita; ary ny tonian’ny divay tehirizina any amin’ny tanimboaloboka dia Zebdy Sifmita; '
  '28':
  - type: text
    content: ary ny tonian’ny hazo oliva sy ny aviavy eny amin’ny tany lemaka amoron-tsiraka
  - type: note
    content: Heb. Sefela.
  - type: text
    content: ' dia Bala-hanana Gaderita; ary ny tonian’ny diloilo tehirizina dia Joasy; '
  '29':
  - type: text
    content: 'ary ny tonian’ny omby nandrasana tany Sarôna dia Sitray Sarônita; ary ny tonian’ny omby tany an-dohasaha dia Safata, zanak’i Adlay; '
  '3':
  - type: text
    content: isan’ny taranak’i Fareza izy sady lohan’ny mpifehy rehetra tamin’ny miaramila amin’ny volana voalohany.
  '30':
  - type: text
    content: 'ary ny tonian’ny rameva dia Obila Ismaelita; ary ny tonian’ny borikivavy dia Jedeia Meronotita; '
  '31':
  - type: text
    content: ary ny tonian’ny ondry aman-osy dia Jaziza Hagarita. Ireo rehetra ireo no tonian’ny fananan’i Davida mpanjaka.
  '32':
  - type: text
    content: 'Ary Jonatana, rahalahin-drain’i Davida, dia mpanolo-tsaina,–lehilahy hendry sady be fahalalana izy; ary Jehiela, zanak’i Hakmony, dia teo amin’ny zanaky ny mpanjaka; '
  '33':
  - type: text
    content: ary Ahitofela dia mpanolo-tsaina ny mpanjaka; ary Hosay Arkita no sakaizan’ny mpanjaka; ary ny manarakaraka an’i Ahitofela dia Joiada, zanak’i Benaia, sy Abiatara; ary ny komandin’ny miaramilan’ny mpanjaka dia Joaba.
  '4':
  - type: text
    content: Ary ny nifehy ny antokony ho amin’ny volana faharoa dia Dodo Ahohita; Miklota andriandahy no isan’ny antokony; ary ny antokon’ny Ahohita dia efatra arivo amby roa alina.
  '5':
  - type: text
    content: 'Ny komandin’ny antokony fahatelo tamin’ny miaramila, ho amin’ny volana fahatelo, dia Benaia lohany, zanak’i Joiada mpisorona; ary ny antokony dia efatra arivo amby roa alina. '
  '6':
  - type: text
    content: Io no ilay Benaia, izay nahery sady ambony tamin’izy telo-polo lahy; Amizabada zanany no isan’ny antokony.
  '7':
  - type: text
    content: Ny fahefatra, ho amin’ny volana fahefatra, dia Asahela, rahalahin’i Joaba, ary Zebadia zanany no nanarakaraka azy; ary ny antokony dia efatra arivo amby roa alina.
  '8':
  - type: text
    content: Ny fahadimy, ho amin’ny volana fahadimy, dia Samihota Jizarita; ary ny antokony dia efatra arivo amby roa alina.
  '9':
  - type: text
    content: Ny fahenina, ho amin’ny volana fahenina, dia Ira, zanak’Ikesy Tekoita; ary ny antokony dia efatra arivo amby roa alina.
