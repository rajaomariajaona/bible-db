document_id: ZEC.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Valin’ny fanontanian’ny avy any Betela ny amin’ny andro fifadiana, ary filazana ny loza hamelezan’i Jehovah ny olony, sy ny mbola hitahiany azy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tamin’ny taona fahefatra nanjakan’i Dariosa no nahatongavan’ny tenin’i Jehovah tamin’i Zakaria, tamin’ny andro fahefatra tamin’ny volana fahasivy (Kisleva izany); '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ary aza mampahory ny mpitondratena na ny kamboty, na ny vahiny, na ny mahantra; ary aza misy mihevitra ao am-ponareo hanisy ratsy ny rahalahinareo hianareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nefa tsy nety nihaino ireny, fa nampihemotra ny sorony, ary nataony lalodalovana ny sofiny mba tsy handre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Eny, nanao ny fony ho '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mafy
    - type: text
      text: ' toy ny diamondra izy, mba tsy hihaino ny lalàna sy ny teny izay nampitondrain’ny Fanahin’i Jehovah, Tompon’ny maro, holazain’ny mpaminany fahiny, ka dia tonga izay fahatezerana mafy avy tamin’i Jehovah, Tompon’ny maro, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa toy ny niantsoan’ireny, fa tsy nohenoiny, dia ho toy izany no hiantsoany kosa, fa tsy hohenoiko, hoy Jehovah, Tompon’ny maro; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: fa haeliko amin’ny tafio-drivotra ho any amin’ny firenena rehetra izay tsy fantany izy. Toy izany no nahalao ny tany tao aoriany, ka tsy nisy olona nandroso na niverina; fa nahatonga ny tany mahafinaritra ho tany lao izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ary Betela efa naniraka an’i Serezera sy Regema-meleka sy ny olony
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ary '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'ny any '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Betela, dia Serezera . . . . efa naniraka.
      marker-yv: yv-n
    - type: text
      text: ' hifona amin’i Jehovah '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka hiteny amin’ny mpisoron’ny tranon’i Jehovah, Tompon’ny maro, sy amin’ny mpaminany hoe: Hitomany amin’ny volana fahadimy va aho ka hifady toy ny fanaoko tamin’ny taon-dasa ela?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia tonga tamiko ny tenin’i Jehovah, Tompon’ny maro, nanao hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lazao amin’ny vahoaka rehetra amin’ny tany sy amin’ny mpisorona hoe: Raha nifady hanina sy nitomany tamin’ny volana fahadimy sy ny fahafito tamin’izao fito-polo taona izao, hianareo moa nifady ho Ahy va hianareo? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary raha mihinana sy misotro hianareo, moa tsy mihinana sy misotro ho an’ny tenanareo ihany va hianareo?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moa tsy hianareo ihany va no mihinana sy misotro.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Moa tsy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tokony ho nihaino
    - type: text
      text: ' ny teny izay nasain’i Jehovah nantsoin’ny mpaminany fahiny va hianareo, fony mbola nonenana sy nandry fahizay Jerosalema sy ny zana-bohiny manodidina azy, sady nonenana koa ny tany atsimo sy ny tany lemaka amoron-tsiraka?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sefela.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary tonga tamin’i Zakaria ny tenin’i Jehovah nanao hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro: Manaova fitsarana marina, ary samia mifampiantra sy mifamindra fo amin’ny rahalahiny avy; '
