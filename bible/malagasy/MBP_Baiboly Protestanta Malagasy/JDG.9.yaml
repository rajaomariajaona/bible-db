document_id: JDG.9
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny ratsy nataon’i Abimeleka, sy ny nanjo azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY Abimeleka, zanak’i Jerobala, dia dia nandeha nankany Sekema tany amin’ny anadahin-dreniny ka niresaka taminy sy tamin’izay rehetra isan’ny fianakavian-dreniny nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mba mitenena hianareo eo anatrehan’ny mponina rehetra eto Sekema hoe: Iza no tsara ho anareo: ny hiarahan’izy fito-polo lahy zanak’i Jerobala manjaka aminareo va, sa ny hanjakan’ny lehilahy iray? Koa tsarovy fa taolanareo sy nofonareo aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny anadahin-dreniny nilaza azy teo anatrehan’ny mponina rehetra tao Sekema ka nanao izany teny rehetra izany; koa ny fon’ireo dia ta-hanaraka an’i Abimeleka, fa hoy izy: Rahalahintsika izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nomeny sekely volafotsy fito-polo avy tao an-tranon’i Bala-berita izy, ary nanambazan’i Abimeleka olom-poana sy marivo salosana izany, ka dia nanaraka azy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nankany an-tranon-drainy tany Ofra izy ka namono ny rahalahiny fito-polo lahy, zanak’i Jerobala, teo ambonin’ny vato iray; ary Jotama, faralahin’i Jerobala, no sisa velona, satria niery izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nivory ny mponina rehetra tao Sekema sy ny olona rehetra tao Milo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiarovana.
    marker-yv: yv-n
  - type: text
    text: ' ka nandeha nampanjaka an’i Abimeleka teo anilan’ny hazo terebinta, akaikin’ny tsangam-bato'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rovan’ny miaramila.
    marker-yv: yv-n
  - type: text
    text: ' any Sekema.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy nilaza izany tamin’i Jotama, dia nandeha izy ka nitsangana teo an-tampon’ny tendrombohitra Gerizima, ary nanandratra ny feony ka niantso hoe: Mihainoa, ahy hianareo mponina ao Sekema mba hihainon’Andriamanitra anareo kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Niainga, hono, ny hazo hanosotra mpanjaka hanjaka aminy; ka hoy izy tamin’ny oliva: Manjakà aminay hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy ny oliva taminy: Ho foiko va ny diloiloko, izay ankalazan’ireny andriamanitra sy ny olona ahy, ka handeha hitsingevingevina erỳ ambony hazo aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary hoy ny hazo tamin’ny aviavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aviavimbazaha.
    marker-yv: yv-n
  - type: text
    text: ' : Avia hianao, ka manjakà aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Da hoy ny aviavy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aviavimbazaha.
    marker-yv: yv-n
  - type: text
    text: ' taminy: Ho foiko va ny fahamamiako sy ny vokatro tsara, ka handeha hitsingevingevina erỳ ambony hazo aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ny hazo tamin’ny voaloboka: Avia hianao, ka manjakà aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy ny voaloboka taminy: Ho foiko va ny ranoko, izay mahafaly an’Andriamanitra sy ny olona, ka handeha hitsingevingevina erỳ ambony hazo aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy ny hazo rehetra tamin’ny tsilo: Avia hianao, ka manjakà aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy ny tsilo tamin’ny hazo: Raha ho soranareo ho mpanjakanareo tokoa ary aho, dia avia hianareo ka mialofa ato amin’ny alokaloko; fa raha tsy izany, aoka hisy afo hivoaka avy amin’ny tsilo ka handevona ny sederan’i Libanona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa ankehitriny, raha marina sy mahitsy ny nataonareo tamin’ny nampanjakanareo an’i Abimeleka, ary raha soa no nataonareo tamin’i Jerobala sy ny taranany, ka novalianareo araka izay nataon’ny tànany izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '(fa ny raiko niady ho anareo sady nanao ny ainy tsy ho zavatra ka namonjy anareo tamin’ny tànan’ny Midiana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'nefa hianareo kosa niodina tamin’ny taranaky ny raiko androany ka namono ny zanany fito-polo lahy teo ambonin’ny vato iray, ary Abimeleka, zanaky ny ankizivaviny, no nampanjakainareo tamin’ny mponina ao Sekema, satria rahalahinareo izy),– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'koa raha marina sy mahitsy ny nataonareo andro-any tamin’i Jerobala sy ny zanany, dia mifalia amin’i Abimeleka hianareo, ary aoka izy kosa hifaly aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa raha tsy izany kosa, dia aoka hisy afo hivoaka avy amin’i Abimeleka ka handevona ny mponina ao Sekema sy ny olona ao Milo;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aviavimbazaha.
    marker-yv: yv-n
  - type: text
    text: ' ary aoka koa hisy afo hivoaka avy amin’ny mponina ao Sekema sy ny olona ao Milo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fiarovana.
    marker-yv: yv-n
  - type: text
    text: ' ka handevona an’i Abimeleka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia riatra nandositra Jotama ka nankany Bera ary nitoetra teo mba hiery an’i Abimeleka rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary rehefa nanapaka telo taona tamin’ny Isiraely Abimeleka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Andriamanitra dia naniraka fanahy ratsy tamin’i Abimeleka sy ny mponina tao Sekema; ary ny mponina tao Sekema dia nivadika nahafoy an’i Abimeleka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: mba hitsingerenan’ny loza natao tamin’ny namonoana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.24 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ran’.
    marker-yv: yv-n
  - type: text
    text: ' ny zanak’i Jerobala fito-polo lahy ka hanody an’i Abimeleka rahalahiny izay namono azy, sy ny mponina tao Sekema, izay nampahery ny tànany hamono ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary nanaovan’ny mponina tao Sekema otrika tany an-tampon-tendrombohitra izy, dia nobaboin’ny otrika izay rehetra nandalo tamin’izany làlana izany; ary nolazaina tamin’i Abimeleka izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia tonga tao Gala, zanak’i Ebeda, sy ny rahalahiny ka nankany Sekema, ary ny mponina tao Sekema natoky azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia nivoaka ho any an-tsaha izy ka nioty ny voalobony ary nanosihosy azy, dia nanao fanati-piderana ka niditra tao an-tranon’ny andriamaniny izy, dia nihinana sy nisotro ary nanozona an’i Abimeleka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy Gala, zanak’i Ebeda: Iza moa Abimeleka, ary iza moa Sekema, no hotompointsika? Tsy zanak’i Jerobala va izy? Ary tsy Zebola va no lefiny? Manompoa ny taranak’i Hamora, rain’i Sekema; fa nahoana no hanompo io isika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary enga anie ka ho eo ambanin’ny tànako ireto olona ireto! dia hesoriko Abimeleka. Dia hoy izy tamin’i Abimeleka: Hamaroy ny miaramilanao ka mivoaha.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary rehefa ren’i Zebola, komandin’ny tanàna, ny tenin’i Gala, zanak’i Ebeda, dia nirehitra ny fahatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia naniraka olona mangingina tany amin’i Abimeleka izy hanao hoe: Indro, Gala, zanak’i Ebeda, sy ny rahalahiny dia tonga ato Sekema; ary, indro, mandrendrika ny ato an-tanàna hiodina aminao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Koa ankehitriny, miaingà alina hianao sy ny vahoaka eo aminao, ka manotreha any an-tsaha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary raha maraina, raha vao miposaka ny masoandro, dia mifohaza maraina koa hianao, ka miroata hamely ny tanàna; ary, indro, raha mivoaka hiady aminao izy sy ny vahoaka eo aminy, dia ataovy aminy izay zakan’ny tànanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niainga alina Abimeleka sy ny vahoaka rehetra teo aminy ka nanao otrika efa-toko tandrifin’i Sekema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nivoaka Gala, zanak’i Ebeda, ka nijanona teo anoloan’ny vavahadin’ny tanàna; dia niroatra avy tao ampanotrehana Abimeleka sy ny vahoaka teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary rehefa hitan’i Gala ny olona, dia hoy izy tamin’i Zebola: Indreo, misy olona midina avy eny an-tampon’ny tendrombohitra. Fa hoy Zebola taminy: Ny aloky ny tendrombohitra no hitanao ka toa olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia niteny indray Gala ka nanao hoe: Indreo, misy olona eo amin’ny havoana, ary, indreo misy, antokony hafa mandeha amin’ny làlana eo amin’ny hazo terebinta Meonenima.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.37 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpanandro.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy Zebola taminy: Aiza ny vavanao izay niteny hoe: Iza moa Abimeleka, no hotompointsika? Tsy ireo va no olona izay nohamavoinao? Mivoaha ankehitriny ka miadia aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia nivoaka teo anoloan’ny mponina tao Sekema Gala ka niady tamin’i Abimeleka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nanenjika azy Abimeleka, ary nandositra teo anoloany izy, ka maro ny faty niampatrampatra hatreny anoloan’ny vavahady aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary Abimeleka nonina tany Aroma; ary Zebola nandroaka an’i Gala sy ny rahalahiny mba tsy honina any Sekema intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary nony ampitson’iny dia nivoaka ho any an-tsaha ny olona; ary nolazaina tamin’i Abimeleka izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia naka ny vahoaka izy ka nizara azy ho telo toko ary nanotrika tany an-tsaha; dia nijery izy, ka, indreo, ny olona nivoaka avy tao an-tanàna; dia nitsangana hiady aminy izy ka namely azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary Abimeleka sy ny antokony izay teo aminy dia niroatra ka nitsangana teo anoloan’ny vavahadin-tanàna; ary ny roa toko kosa niroatra namely ny vahoaka rehetra tany an-tsaha ka namono azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary Abimeleka namely ny tanàna mandritra izany andro izany, dia nahafaka ny tanàna ka namono ny olona tao; ary noravany ny tanàna sady nofafazany sira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary nony nandre izany ny olona rehetra tao amin’ny tilikambo tao Sekema, dia niditra tao amin’ny efitrano fierena tao an-tranon’i Berita andriamaniny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary nolazaina tamin’i Abimeleka fa tafangona tao amin’ny tilikambo tao Sekema ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary Abimeleka sy ny vahoaka teo aminy dia niakatra tany an-tendrombohitra Zalmona; ary Abimeleka nitondra famaky teny an-tànany, dia nikapa sampan-kazo, ka nobetainy izany, dia nolanjainy teny an-tsorony, ary hoy izy tamin’ny vahoaka teo aminy: Izay hitanareo ataoko, dia mba manaova faingana toy izany koa hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Koa samy nikapa sampan-kazo avy ny vahoaka rehetra ka nanaraka an’i Abimeleka, dia nametraka izany teo an-trano fiarovana ka nandoro azy tamin’ny afo, raha mbola tao ny olona, ka maty koa ny olona rehetra tao amin’ny tilikambo tao Sekema, na lehilahy na vehivavy, tokony ho arivo no isany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia nandeha Abimeleka nankany Tebeza ary nitoby tandrifin’i Tebeza ka nahafaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Fa nisy tilikambo mafy tao anatin’ny tanàna, ka nandositra tao ny lehilahy rehetra sy ny vehivavy ary izay rehetra tao an-tanàna ka nihidy tao, dia niakatra teo an-tampon’ny tilikambo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary Abimeleka nankany amin’ny tilikambo ka namely azy, dia nanatona ny varavaran’ny tilikambo izy handoro azy amin’ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Fa nisy vehivavy anankiray, nanjera vato
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.53 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vato ambony.
    marker-yv: yv-n
  - type: text
    text: ' fikosoham-bary tamin’ny lohan’i Abimeleka ka nahavaky ny karan-dohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dia nantsoin’i Abimeleka faingana ny zatovo, mpitondra ny fiadiany, ka hoy izy taminy: Tsoahy ny sabatrao, ka vonoy aho, mba tsy hanaovan’ny olona ahy hoe: Vehivavy no nahafaty azy. Dia namely azy miboroaka ilay zatovo, ka maty izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Ary rehefa hitan’ny lehilahy amin’ ny Isiraely fa maty Abimeleka, dia samy lasa nandeha ho any amin’ny fonenany avy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Izany no namalian’Andriamanitra ny ratsy nataon’i Abimeleka, izay efa nataony tamin’ny rainy tamin’ny namonoany ny rahalahiny fito-polo lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Ary ny ratsy rehetra nataon’ny mponina tao Sekema dia natsingerin’Andriamanitra tamin’ny lohany avokoa, ka dia nihatra taminy ilay fanozonana nataon’i Jotama, zanak’i Jerobala.
