document_id: LUK.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nahasitranan’i Jesosy ny mpanompon’ilay kapiteny.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 8.5-13.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ARY rehefa vitan’i Jesosy teo anatrehan’ny olona izany toriteniny rehetra izany, dia nankany Kapernaomy Izy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary nony tafaverina tao an-trano ireo iraka ireo, dia hitany fa sitrana ilay mpanompo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nananganan’i Jesosy ny zanakalahin’ilay mpitondratena tao Naina.
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ARY taoriana kelin’izany
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[nony ampitson’iny].'
      marker-yv: yv-n
    - type: text
      text: ' Jesosy dia nankany an-tanàna atao hoe Naina; ary nanaraka Azy ny mpianany sy ny vahoaka betsaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary rehefa mby teo akaikin’ny vavahadin’ny tànana Izy, dia, indro, nisy fatin’ny lehilahy anankiray nentina nivoaka, izay zanakalahy tokan’ny reniny, sady mpitondratena ravehivavy; ary nisy vahoaka betsaka avy tao an-tanàna nanaraka azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nony nahita an-dravehivavy ny Tompo, dia onena azy ka nanao taminy hoe: Aza mitomany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nanatona Izy ka nanendry ny tranovorona, dia nijanona izay nilanja. Ary hoy Jesosy: Ry zatovo, hoy Izaho aminao: Miarena. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia niarina ny maty sady niteny, ary dia natolony tamin-dreniny.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary raiki-tahotra ny olona rehetra ka nankalaza an’Andriamanitra hoe: Mpaminany lehibe no efa mitsangana eto amintsika; ary Andriamanitra efa nitsinjo ny olony. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia niely teny Jodia rehetra sy teny amin’ny tany manodidina rehetra ny lazan’i Jesosy ny amin’izany zavatra izany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanirahan’i Jaona Mpanao-batisa tany amin’i Jesosy, sy ny teny nataon’i Jesosy tamin’izany.
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mat. 11.2-19.
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ARY ny mpianatr’i Jaona nanambara izany rehetra izany taminy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Jaona niantso ny mpianany roa lahy hankao aminy, dia naniraka azy hankany amin’ny Tompo hanao hoe: Hianao va Ilay ho avy, sa mbola hafa no andrasantsika? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary ny mpanompon’ny kapiteny anankiray, izay malalany, dia narary efa ho faty. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nony tonga tany aminy ireo lehilahy ireo, dia nanao hoe: Jaona Mpanao-batisa naniraka anay hankatỳ aminao hanao hoe: Hianao va Ilay ho avy, sa mbola hafa no andrasantsika?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary tamin’izany ora izany Jesosy dia nahasitrana olona maro tamin’ny rofy sy ny aretina sy ny fanahy ratsy sady nampahiratra ny jamba maro. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia namaly Izy ka nanao taminy hoe: Mandehana hianareo, ambarao amin’i Jaona izao hitanareo sy renareo izao; mahiratra ny jamba, afaka ny mandringa, diovina ny boka, malady ny marenina, atsangana ny maty, ary ny malahelo dia itoriana ny filazantsara. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary sambatra izay tsy ho tafintohina noho ny amiko.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary rehefa lasa ny irak’i Jaona, dia nilaza an’i Jaona tamin’ny vahoaka Jesosy ka nanao hoe: Hizaha inona no nalehanareo tany an-efitra? Volotara nohozongozonin’ny rivotra va? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Sa hizaha inona no nalehanareo? Olona mitafy lamba soa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: malemy.
      marker-yv: yv-n
    - type: text
      text: ' va? Indro, ny mitafy lamba soa sy mihinana zava-py dia ao an-tranon’ny mpanjaka. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Sa hizaha inona no nalehanareo tany? Mpaminany va? Eny, hoy Izaho aminareo, sady mihoatra lavitra noho ny mpaminany izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa izy ilay voasoratra hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: „Indro, Izaho maniraka ny irako hialoha Anao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay hamboatra ny làlanao eo alohanao” (Mal. 3.1)
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Lazaiko aminareo: Amin’izay nateraky ny vehivavy tsy misy lehibe noho Jaona; nefa ny kely indrindra amin’ny fanjakan’Andriamanitra dia lehibe noho izy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary ny vahoaka rehetra sy ny mpamory hetra raha nandre, dia nanamarina an’Andriamanitra, satria natao batisa tamin’ny batisan’i Jaona izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa raha nahare ny amin’i Jesosy ilay kapiteny, dia naniraka loholon’ny Jiosy hankeo aminy hangataka Azy mba ho avy ka hahasitrana ny mpanompony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Fa ny Fariseo sy ny mpahay lalàna kosa nanda ny fikasan’Andriamanitra, satria tsy mba nanatona hataon’i Jaona batisa izy.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Tahaka ny inona ary no hanoharako ny olona amin’ity taranaka ity? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'tahaka ny inona moa izy? Tahaka ny ankizy madinika mipetraka eny an-tsena izy, izay mifampiantso hoe: Efa nitsoka sodina taminareo izahay, nefa tsy nandihy hianareo; efa nanao feo fisaonana izahay, nefa tsy nitomany hianareo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa tonga Jaona Mpanao-batisa tsy nihinan-kanina na nisotro divay, ka hoy hianareo: Manana demonia izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Tonga ny Zanak’olona mihinana sy misotro kosa, ka hoy hianareo: Indro, olona fatra-pitia hanina sy mpisotro divay, sakaizan’ny mpamory hetra sy ny mpanota. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Fa ny fahendrena dia hamarinin’ny zanany rehetra.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanatonan’ilay vehivavy mpanota an’i Jesosy tao an-tranon’i Simona Fariseo.
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'ARY ny Fariseo anankiray nanasa an’i Jesosy hiara-mihinana aminy; ary dia niditra tao an-tranon’ilay Fariseo Izy ka nipetraka nihinana. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary, indro, nisy vehivavy mpanota tao an-tanàna, ka rehefa fantany fa Jesosy nipetraka nihinana tao an-tranon’ilay Fariseo, dia nitondra tavoara alabastara feno menaka manitra izy; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ary nijanona teo ivohony tanilan’ny tongony izy ka nitomany, dia nahakotsa ny tongony tamin’ny ranomasony sy namaoka azy tamin’ny volon-dohany, dia nanoroka fatratra ny tongony ka nanosotra azy tamin’ny menaka manitra.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary nony nahita izany ilay Fariseo nanasa Azy, dia nanao anakampo hoe: Raha mpaminany Ity, dia ho nahalala io vehivavy manendry Azy io sy ny toeny; fa mpanota io.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary rehefa tonga teo amin’i Jesosy ireo, dia nangataka mafy taminy ka nanao hoe: Mendrika ny hanaovanao izany izy, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ary Jesosy namaly ka nanao taminy hoe: Ry Simona, manan-kolazaina aminao Aho. Dia hoy izy: Lazao ary, Mpampianatra ô.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Nisy roa lahy nananan’ny mpampanàna vola anankiray trosa: ny iray nananany denaria diman-jato, ary ny iray kosa dimam-polo. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ary raha tsy nanan-kaloa izy roa lahy, dia samy navelany. Koa iza moa amin’ireo no ho tia azy indrindra? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Simona namaly ka nanao hoe: Ataoko fa ilay namoizany be. Dia hoy Izy taminy: Marina ny hevitrao.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ary Jesosy nitodika nijery an-dravehivavy ka nanao tamin’i Simona hoe: Hitanao va io vehivavy io? Niditra teto an-tranonao Aho; nefa tsy mba nanome Ahy rano hanasana ny tongotro hianao; fa izy kosa nahakotsa ny tongotro tamin’ny ranomasony, dia namaoka azy tamin’ny volon-dohany. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Tsy mba nanoroka Ahy akory hianao; fa izy, hatr’izay nidirako, dia tsy mbola nitsahatra nanoroka fatratra ny tongotro. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ny lohako tsy mba nohosoranao diloilo akory; fa izy kosa nanoso-menaka manitra ny tongotro. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary amin’izany dia lazaiko aminao: Voavela ny helony be, fa be fitiavana izy; fa izay voavela tamin’ny kely dia kely fitiavana. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Dia hoy Izy tamin-dravehivavy: Voavela ny helokao.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Ary izay niara-nipetraka nihinana teo aminy dia niresaka hoe: Iza moa Ity no mba mamela heloka? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'satria tia ny firenentsika izy, sady izy no efa nanao ny synagoga ho antsika. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ary hoy Izy tamin-dravehivavy: Ny finoanao efa namonjy anao; mandehana soa aman-tsara.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary Jesosy nandeha niaraka taminy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa efa mby teo akaikin’ny trano Izy, ilay kapiteny dia naniraka sakaiza hitsena Azy ka nanao taminy hoe: Tompoko, aza manahirana ny tenanao Hianao; fa tsy mendrika hidiranao ao ambanin’ny tafon-tranoko aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa na dia ny tenako aza dia nataoko fa tsy mendrika hankeo aminao; fa mitenena ihany, dia ho sitrana ny ankizilahiko. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa izaho koa mba lehilahy manan-dehibe ihany, ka manana miaramila izay feheziko; koa hoy izaho amin’ny anankiray: Mandehana, dia mandeha izy, ary amin’ny anankiray koa: Avia, dia avy izy, ary amin’ny mpanompoko: Ataovy izao, dia manao izy.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nony nahare izany Jesosy, dia gaga taminy; ary dia nitodika Izy ka nanao tamin’ny vahoaka izay nanaraka Azy hoe: Lazaiko aminareo fa tsy mbola nahita finoana lehibe toy izany Aho, na dia tamin’ny Isiraely aza. '
