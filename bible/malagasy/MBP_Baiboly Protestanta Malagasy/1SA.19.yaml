document_id: 1SA.19,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nifonan’i Jonatana ho an’i Davida, sy ny nitadiavan’i Saoly indray hahafaty azy, ary ny nandosiran’i Davida nankany amin’i Samoela.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Saoly niresaka tamin’i Jonatana zanany sy tamin’ny mpanompony rehetra ny amin’izay hahafaty an’i Davida. Fa Jonatana, zanak’i Saoly, kosa tia dia tia an’i Davida. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Saoly nihendry hamely an’i Davida tamin’ny lefona. ka hataony miboroaka mihatra amin’ny rindrina; fa izy nisoroka niala teo anatrehan’i Saoly, ka ny rindrina no voan’ny lefona; dia nandositra Davida ka afaka tamin’iny alina iny ihany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Saoly naniraka olona hankany amin’ny tranon’i Davida hiambina azy hahafaty azy raha maraina; fa Mikala, vadin’i Davida, nilaza taminy hoe: Raha tsy mamonjy ny ainao anio alina hianao, dia hatao maty raha maraina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mikala nampidina an’i Davida tamin’ ny varavarankely; ka dia lasa nandositra izy ka afaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nalain’i Mikala ny sampy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terafima.
      marker-yv: yv-n
    - type: text
      text: '. dia napetrany teo amin’ny farafarany, ka nosaronany makarakara volon’osy ny lohany, dia norakofany ny lamba izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony naniraka haka an’i Davida Saoly, dia hoy ny vavy: Marary izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Saoly naniraka ny olona hizaha an’i Davida indray ka nanao hoe: Ento miakatra atỳ amiko amin’ny farafara izy hovonoiko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niditra ny iraka, kanjo, indro, ny sampy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terafima.
      marker-yv: yv-n
    - type: text
      text: ' no teo am-parafara, ary voasaron’ilay makarakara volon’osy ny lohany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Saoly tamin’i Mikala: Nahoana hianao no namitaka ahy toy izany ka nandefa ny fahavaloko, ary afa-nandositra izy? Fa hoy Mikala tamin’i Saoly: Hoy izy tamiko: Avelao aho handeha, fandrao hovonoiko hianao.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandositra Davida ka afaka ary tonga tany amin’i Samoela tany Rama, dia nambarany azy izay rehetra nataon’i Saoly taminy; ary nandeha izy sy Samoela ka nonina tany Naiota.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy nanambara tamin’i Saoly hoe: Indro, Davida ao Naiota any Rama. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jonatana nanambara tamin’i Davida hoe: Saoly raiko mitady hamono anao; koa, masìna hianao, tandremo ny tenanao rahampitso maraina, ary mitoera amin’izay fitoerana mangingina, ka miere; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Saoly naniraka olona hisambotra an’i Davida; ary nony hitan’ireo ny mpaminany tafangona sy maminany ary Samoela mitsangana eo ho lohany, dia tonga tamin’ny irak’i Saoly ny Fanahin’Andriamanitra, ka dia mba naminany koa izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony nisy nanambara izany tamin’i Saoly, dia naniraka olon-kafa izy, ary ireo koa dia mba naminany. Ary Saoly naniraka olon-kafa indray fanintelony, nefa naminany ihany koa ireo.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia lasa nankany Rama koa ny tenany, ary tonga tao amin’ny lavaka lehibe famorian-drano izay ao Seko izy ka nanontany hoe: Aiza Samoela sy Davida? Ary hoy ny anankiray: Indreo ao Naiota any Rama izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankany Naiota any Rama Saoly, ary tonga tao aminy koa ny Fanahin’Andriamanitra, dia nandroso izy sady naminany teny am-pandehanana ambara-pahatongany tany Naiota any Rama. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanaisotra ny fitafiany koa izy ka mba naminany tahaka ny sasany teo anatrehan’i Samoela, ary izy nandry nitanjaka mandritra iny andro sy alina iny. Koa izany no nanaovan’ny olona hoe: ,Saoly koa moa mba isan’ny mpaminany?’'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary izaho hivoaka ka hitsangana eo anilan’ikaky amin’ny saha izay misy anao, dia hiresaka aminy ny aminao; koa izay hitako dia hambarako aminao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jonatana nilaza soa an’i Davida tamin’i Saoly rainy, ka hoy izy taminy: Aoka ny mpanjaka tsy hanisy ratsy an’i Davida mpanompony, fa izy tsy nanisy ratsy anao, sady nahasoa anao indrindra ny nataony; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa izy efa nanao ny ainy tsy ho zavatra ka namono ny Filistina, ary Jehovah nahavita famonjena lehibe ho an’ny Isiraely rehetra; hianao nahita izany ka faly; koa nahoana no dia hanota handatsaka ra marina hianao ka hahafaty foana an’i Davida?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Saoly nihaino ny tenin’i Jonatana ka nianiana hoe: Raha velona koa Jehovah, dia tsy hatao maty izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jonatana niantso an’i Davida ka nanambara izany rehetra zany taminy, dia nitondra an’i Davida ho eo amin’i Saoly, ka dia nitoetra teo anatrehany tahaka ny teo aloha ihany indray izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary mbola nisy ady ihany; dia nivoaka Davida ka niady tamin’ny Filistina ary nahafaty betsaka, ka dia nandositra azy ireny.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy fanahy ratsy avy tany amin’i Jehovah tonga tao amin’i Saoly, raha nipetraka tao an-tranony izy sy nitana ny lefony teny an-tànany; ary Davida nitendry lokanga tamin’ny tànany. '
