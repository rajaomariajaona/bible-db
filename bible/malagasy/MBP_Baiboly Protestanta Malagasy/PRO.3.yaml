document_id: PRO.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Famporisihana hitondra tena tsara.
  - type: text
    content: ANAKA, aza manadino ny lalàko;
  - type: text
    content: Fa aoka ny fonao hitandrina ny didiko;
  '10':
  - type: text
    content: Ka dia ho feno mitafotafo ny fitoeram-barinao,
  - type: text
    content: Ary hihoatra ny ranom-boaloboka eo amin’ny vata fanantazanao.
  '11':
  - type: text
    content: Anaka, aza manamavo ny famaizan’i Jehovah,
  - type: text
    content: Ary aza tofoka amin’ny fananarany;
  '12':
  - type: text
    content: Fa izay tian’i Jehovah no anariny,
  - type: text
    content: Dia tahaka ny ataon’ny ray amin’ny zanaka tiany.
  - type: heading
    content: Ny fahasambaran’izay olona mahita fahendrena.
  '13':
  - type: text
    content: SAMBATRA izay olona mahita fahendrena
  - type: text
    content: Sy izay olona mahazo fahalalana.
  '14':
  - type: text
    content: Fa ny fandrantoana azy dia tsara noho ny fandrantoana volafotsy,
  - type: text
    content: Ary ny tombom-barotra aminy dia mihoatra noho ny volamena tsara.
  '15':
  - type: text
    content: Saro-bidy noho ny voahangy
  - type: note
    content: 'Na: perla.'
  - type: text
    content: ' izy;'
  - type: text
    content: Ary izay rehetra irinao tsy misy azo ampitahaina aminy.
  '16':
  - type: text
    content: Fa andro maro no eo an-tànany ankavanana;
  - type: text
    content: Ary harena sy voninahitra no eo an-tànany ankavia.
  '17':
  - type: text
    content: Làlana mahafinaritra ny làlany,
  - type: text
    content: Ary fiadanana ny alehany rehetra.
  '18':
  - type: text
    content: Hazon’aina ho an’izay rehetra mifikitra aminy izy;
  - type: text
    content: Ary izay rehetra mitana azy no hatao hoe sambatra.
  '19':
  - type: text
    content: Fahendrena no nanorenan’i Jehovah ny tany,
  - type: text
    content: Ary fahalalana no nampitoerany ny lanitra.
  '2':
  - type: text
    content: Fa andro maro sy taona ela iainana
  - type: text
    content: Ary fiadanana no hanampiny ho anao.
  '20':
  - type: text
    content: Ny fahalalany no entiny mampiboiboika ny rano any amin’ny lalina
  - type: text
    content: Sy ampitetevany ando avy amin’ny rahona.
  '21':
  - type: text
    content: Anaka, aoka tsy hiala amin’ny masonao izany;
  - type: text
    content: Raketo ny tena fahendrena sy ny fisainana mazava,
  '22':
  - type: text
    content: Ka dia ho ain’ny fanahinao izany
  - type: text
    content: Ary ho firavaky ny vozonao,
  '23':
  - type: text
    content: Dia handroso aman-toky hianao,
  - type: text
    content: Ka tsy ho tafintohina ny tongotrao.
  '24':
  - type: text
    content: Tsy hatahotra hianao, raha mandry;
  - type: text
    content: Eny, handry hianao, ary ho mamy ny torimasonao.
  '25':
  - type: text
    content: Aza manahy ny tahotra avy tampoka,
  - type: text
    content: Na ny rivo-doza mamely
  - type: note
    content: 'Na: ny fandringanana avy amin’ny.'
  - type: text
    content: ' ny ratsy fanahy, raha avy izany;'
  '26':
  - type: text
    content: Fa Jehovah no ho tokinao
  - type: text
    content: Ka hiambina ny tongotrao tsy ho voafandrika.
  - type: heading
    content: Famporisihana hanao soa amin’olona sy hanao ny marina.
  '27':
  - type: text
    content: AZA mamihina ny soa amin’izay tokony homena azy,
  - type: text
    content: Raha azon’ny tananao atao ihany;
  '28':
  - type: text
    content: 'Aza manao amin’ny namanao hoe:'
  - type: text
    content: Mandehana, ka avia indray, fa rahampitso no homeko;
  - type: text
    content: Kanefa manana ihany hianao.
  '29':
  - type: text
    content: Aza mamorona sain-dratsy ho enti-mamely ny namanao,
  - type: text
    content: Saingy mitoetra matoky eo aminao izy.
  '3':
  - type: text
    content: Aoka tsy handao anao ny famindrampo sy ny fahamarinana;
  - type: text
    content: Afehezo eo am-bozonao izany,
  - type: text
    content: Ary soraty ao amin’ny fonao tahaka ny amin’ny vato fisaka,
  '30':
  - type: text
    content: Aza miady amin’olona foana,
  - type: text
    content: Raha tsy mbola nanisy ratsy anao izy.
  '31':
  - type: text
    content: Aza mialona ny olon-dozabe,
  - type: text
    content: Na mifidy izay làlany akory,
  '32':
  - type: text
    content: Satria fahavetavetana eo imason’i Jehovah ny maniasia,
  - type: text
    content: Fa ao amin’ny marina kosa ny fisakaizany.
  '33':
  - type: text
    content: Ny ozon’i Jehovah dia ao an-tranon’ny ratsy fanahy;
  - type: text
    content: Fa ny fonenan’ny marina dia tahìny kosa.
  '34':
  - type: text
    content: Na dia tsiratsirainy aza ny mpaniratsira,
  - type: text
    content: Dia omeny fahasoavana kosa ny mpandefitra.
  '35':
  - type: text
    content: Ny hendry handova voninahitra;
  - type: text
    content: Fa henatra kosa no ho anjaran’ny adala.
  '4':
  - type: text
    content: Ka dia hahazo fitia sy fahalalana tsara
  - type: text
    content: Eo anatrehan’Andriamanitra sy ny olona hianao.
  '5':
  - type: text
    content: Matokia an’i Jehovah amin’ny fonao rehetra,
  - type: text
    content: Fa aza miankina amin’ny fahalalanao;
  '6':
  - type: text
    content: Maneke Azy amin’ny alehanao rehetra,
  - type: text
    content: Fa Izy handamina ny làlanao.
  '7':
  - type: text
    content: Aza manao anao ho hendry;
  - type: text
    content: Matahora an’i Jehovah, ka mifadia ny ratsy.
  '8':
  - type: text
    content: Dia ho famelombelomana ny nofonao izany
  - type: text
    content: Sy ho fanamandoana ny taolanao.
  '9':
  - type: text
    content: Mankalazà an’i Jehovah amin’ny fanananao
  - type: text
    content: Sy amin’izay voaloham-bokatrao rehetra;
