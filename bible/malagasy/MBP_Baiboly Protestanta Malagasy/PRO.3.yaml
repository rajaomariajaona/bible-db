document_id: PRO.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Famporisihana hitondra tena tsara.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ANAKA, aza manadino ny lalàko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aoka ny fonao hitandrina ny didiko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa andro maro sy taona ela iainana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fiadanana no hanampiny ho anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka tsy handao anao ny famindrampo sy ny fahamarinana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afehezo eo am-bozonao izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary soraty ao amin’ny fonao tahaka ny amin’ny vato fisaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ka dia hahazo fitia sy fahalalana tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo anatrehan’Andriamanitra sy ny olona hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Matokia an’i Jehovah amin’ny fonao rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa aza miankina amin’ny fahalalanao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maneke Azy amin’ny alehanao rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izy handamina ny làlanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza manao anao ho hendry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Matahora an’i Jehovah, ka mifadia ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia ho famelombelomana ny nofonao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ho fanamandoana ny taolanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mankalazà an’i Jehovah amin’ny fanananao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’izay voaloham-bokatrao rehetra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ka dia ho feno mitafotafo ny fitoeram-barinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hihoatra ny ranom-boaloboka eo amin’ny vata fanantazanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Anaka, aza manamavo ny famaizan’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza tofoka amin’ny fananarany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa izay tian’i Jehovah no anariny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia tahaka ny ataon’ny ray amin’ny zanaka tiany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fahasambaran’izay olona mahita fahendrena.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: SAMBATRA izay olona mahita fahendrena
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay olona mahazo fahalalana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ny fandrantoana azy dia tsara noho ny fandrantoana volafotsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tombom-barotra aminy dia mihoatra noho ny volamena tsara.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Saro-bidy noho ny voahangy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: perla.
    marker-yv: yv-n
  - type: text
    text: ' izy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay rehetra irinao tsy misy azo ampitahaina aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa andro maro no eo an-tànany ankavanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary harena sy voninahitra no eo an-tànany ankavia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Làlana mahafinaritra ny làlany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fiadanana ny alehany rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hazon’aina ho an’izay rehetra mifikitra aminy izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay rehetra mitana azy no hatao hoe sambatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fahendrena no nanorenan’i Jehovah ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fahalalana no nampitoerany ny lanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny fahalalany no entiny mampiboiboika ny rano any amin’ny lalina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ampitetevany ando avy amin’ny rahona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Anaka, aoka tsy hiala amin’ny masonao izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raketo ny tena fahendrena sy ny fisainana mazava,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ka dia ho ain’ny fanahinao izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho firavaky ny vozonao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia handroso aman-toky hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy ho tafintohina ny tongotrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tsy hatahotra hianao, raha mandry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, handry hianao, ary ho mamy ny torimasonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aza manahy ny tahotra avy tampoka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny rivo-doza mamely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny fandringanana avy amin’ny.
    marker-yv: yv-n
  - type: text
    text: ' ny ratsy fanahy, raha avy izany;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa Jehovah no ho tokinao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiambina ny tongotrao tsy ho voafandrika.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Famporisihana hanao soa amin’olona sy hanao ny marina.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: AZA mamihina ny soa amin’izay tokony homena azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha azon’ny tananao atao ihany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aza manao amin’ny namanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandehana, ka avia indray, fa rahampitso no homeko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa manana ihany hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aza mamorona sain-dratsy ho enti-mamely ny namanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saingy mitoetra matoky eo aminao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Aza miady amin’olona foana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha tsy mbola nanisy ratsy anao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aza mialona ny olon-dozabe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na mifidy izay làlany akory,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Satria fahavetavetana eo imason’i Jehovah ny maniasia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ao amin’ny marina kosa ny fisakaizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny ozon’i Jehovah dia ao an-tranon’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fonenan’ny marina dia tahìny kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Na dia tsiratsirainy aza ny mpaniratsira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia omeny fahasoavana kosa ny mpandefitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ny hendry handova voninahitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa henatra kosa no ho anjaran’ny adala.
