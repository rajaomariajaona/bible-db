document_id: GEN.39,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nanaovana an’i Josefa tao antrano-maizina.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Josefa nentina nidina ho any Egypta; ary Potifara, lehilahy Egyptiana, tandapan’i Farao sady mpifehy ny mpiambina, no nividy azy tamin’ny Isimaelita, izay nitondra azy nidina tany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na dia niteny tamin’i Josefa isan-andro aza ravehivavy, dia tsy nety nanaiky azy handry aminy izy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: na
    - type: text
      text: ' hiara-mitoetra aminy.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny indray andro dia niditra tao an-trano Josefa hanao ny raharahany; ary sendra tsy nisy mpanompo tao an-trano tamin’izay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisambotra azy tamin’ny akanjony ravehivavy ka nanao hoe: Avia handry amiko; fa navelan’i Josefa teo an-tànany ny akanjony, dia nandositra izy ka nivoaka teny ala-trano. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hitan-dravehivavy fa navelany teo an-tànany ny akanjony, sady lasa nandositra any ala-trano izy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niantso ny mpanompo izy ka nilaza taminy hoe: Indro, efa nampiditra lehilahy Hebreo tato amintsika hisangy antsika izy; nanatona ahy mba handry amiko iny, dia niantso tamin’ny feo mahery aho; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nony reny fa nanandratra ny feoko aho ka niantso, dia navelany teto anilako ny akanjony, ary nandositra iny ka lasa any ala-trano. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia napetra-dravehivavy teo anilany ny akanjon’i Josefa, mandra-pahatongan’ny tompony tao an-trano. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilaza taminy izy araka ireo teny ireo ka nanao hoe: Nanatona ahy ilay andevolahy Hebreo, izay nentinao ho eto amintsika, mba hisangy ahy; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary rehefa nanandratra ny feoko aho ka niantso, dia navelany eto anilako ny akanjony, ka lasa nandositra any ala-trano izy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa ren’ny tompony ny tenin’ny vadiny, izay niteny taminy ka nanao hoe: Araka ireo teny ireo no nataon’ilay andevolahinao tamiko, dia nirehitra ny fahatezerany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah nomba an’i Josefa, dia lehilahy nambinina izy; ary nitoetra tao an-tranon’ilay Egyptiana tompony izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tompon’i Josefa dia naka azy ka nanao azy tao an-trano-maizina, izay fitoeran’ny mpifatotra diso tamin’ny mpanjaka; dia nitoetra tao an-trano maizina izy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa Jehovah nomba an’i Josefa sy namindra fo taminy ka nampahita fitia azy teo imason’ny mpitandrina ny trano-maizina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natolotry ny mpitandrina ny trano-maizina ho andraikitr’i Josefa ny mpifatotra rehetra izay tao an-trano-maizina; ary izay rehetra nataony tao dia izy no antony. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mpitandrina ny trano-maizina tsy mba nikarakara na inona na inona izay efa mby an-tànany, satria Jehovah nomba an’i Josefa, ary izay nataony dia nambinin’i Jehovah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitan’ny tompony fa nomban’i Jehovah izy, ka izay rehetra nataony dia nambinin’i Jehovah avokoa teo aminy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Josefa nahita fitia teo imason’ny tompony, ka dia nanompo azy; dia notendreny ho mpikarakara ny tao an-tranony, ary izay rehetra nananany dia natolony ho andraikiny.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hatramin’izay nanendreny azy ho mpikarakara ny tao an-tranony mbamin’izay rehetra nananany dia notahin’i Jehovah ny tranon’ilay Egyptiana noho ny amin’i Josefa; ary ny fitahian’i Jehovah nomba izay rehetra nananany, na ny tao an-trano, na ny tany an-tsaha. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia navelany ho andraikitr’i Josefa izay rehetra nananany; ary izy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ary satria nanana azy izy, dia.
      marker-yv: yv-n
    - type: text
      text: ' tsy nihevitra intsony izay rehetra nananany na inona na inona afa-tsy ny hanin-kohaniny ihany. Ary Josefa dia bikana sady tsara tarehy.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary taorian’izany ny vadin’ny tompony nanopy ny masony hijery an’i Josefa ka nanao hoe: Avia handry amiko. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandà izy ka nanao tamin’ny vadin’ny tompony hoe: Indro, ny tompoko tsy mahalala izay tandremako ato an-trano,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Indro, satria manana ahy ny tompoko, dia tsy mihevitra na inona na inona ato an-trano izy.
      marker-yv: yv-n
    - type: text
      text: ' fa izay rehetra ananany dia efa natolony ho andraikitro avokoa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy misy lehibe noho izaho raha amin’ity trano ity, ary tsy misy zavatra narovany amiko afa-tsy hianao ihany, satria vadiny hianao; koa hataoko ahoana no hanao izany, ratsy lehibe izany ka hanota amin’Andriamanitra? '
