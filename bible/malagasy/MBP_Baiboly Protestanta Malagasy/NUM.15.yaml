document_id: NUM.15,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Didy samy hafa ny amin’ny fanatitra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: Mitenena amin’ny Zanak’Isiraely hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary divay antsasaky ny hina no haterinao ho fanatitra aidina, ho fanatitra atao amin’ny afo, ho hanitra ankasitrahana ho an’i Jehovah.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no hatao’ amin’ny isan-omby iray, na ny isan-ondrilahy iray, na ny isan-janak’ondry iray, na ny isan-janak’osy iray. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka izany no hataonareo amin’izy rehetra, araka ny isan’ny zavatra aterinareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tompon-tany rehetra samy hanao ireo zavatra ireo araka izany, raha manatitra fanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah izy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy vahiny eo aminareo, na olona miara-mitoetra aminareo, hatramin’ny taranakareo fara mandimby, ka manatitra fanatitra atao amin’ny afo ho hanitra ankasitrahana ho an’i Jehovah izy, dia araka izay ataonareo no hataony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny amin’ny fiangonana, dia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ry fiangonana.
      marker-yv: yv-n
    - type: text
      text: ' lalàna iray ihany no fanao iray ihany no ho aminareo sy izay vahiny eo aminareo koa, dia lalàna mandrakizay hatramin’ny taranakareo fara mandimby izany: tsy hisy hafa eo anatrehan’i Jehovah na hianareo na ny vahiny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lalàna iray ihany sy fanao iray ihany no ho aminareo sy izay vahiny eo aminareo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely hoe: Raha tonga any amin’ny tany izay itondrako anareo hianareo '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka hihinana mofo avy amin’ny vokatry ny tany, dia hanokana izay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanatitra fanatitra asandratra.
      marker-yv: yv-n
    - type: text
      text: ' ho an’i Jehovah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tonga any amin’ny tany honenanareo izay omeko anareo hianareo '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanokana mofo iray izay hatao amin’ny voalohan’ny kobanareo voafetafeta hianareo; tahaka izay atokana avy eo amin’ny famoloana no hanokananareo izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny voalohan’ny kobanareo voafetafeta dia hanomezanareo ho an’i Jehovah hatramin’ny taranakareo fara mandimby.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha manota tsy nahy hianareo ka tsy mankatò ireo didy rehetra ireo, izay nolazain’i Jehovah tamin’i Mosesy, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izay rehetra nasain’i Jehovah nandidian’i Mosesy anareo, hatramin’ny andro izay nanaovan’i Jehovah izany didy izany ka hatramin’ny taranakareo fara mandimby, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa atao tsy nahy izany ka tsy fantatry ny fiangonana; dia hanatitra vantotr’ombilahy iray ny fiangonana rehetra ho fanatitra dorana, ho hanitra ankasitrahana ho an’i Jehovah, mbamin’ny fanatitra hohanina sy ny fanatitra aidina momba azy, araka ny fanao, ary osilahy iray ho fanatitra noho ny ota. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona dia hanao fanavotana ho an’ny fiangonana, dia ny Zanak’Isiraely rehetra, ka dia havela ny helony, satria natao tsy nahy izany; ary hitondra ny fanatiny izy, dia fanatitra atao amin’ny afo ho an’i Jehovah, ary ny fanatiny noho ny ota, eo anatrehan’i Jehovah, noho ny ota tsy nahy nataony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia havela ny heloky ny fiangonana, dia ny Zanak’Isiraely rehetra, mbamin’izay vahiny eo aminy; fa nahazo ny olona rehetra izany noho ny ota tsy nahy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha olona iray kosa no manota tsy nahy, dia hanatitra osivavy iray izay iray taona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: htaramin’ny iray taona no ho midina.
      marker-yv: yv-n
    - type: text
      text: ' izy ho fanatitra noho ny ota. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona dia hanao fanavotana ho an’ny olona izay nanota tsy nahy eo anatrehan’i Jehovah, ka dia havela ny helony. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lalàna iray ihany no hatao amin’izay manota tsy nahy, na amin’ny Zanak’Isiraely rehetra, na amin’ny vahiny eo aminareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka manatitra fanatitra atao amin’ny afo ho an’i Jehovah, dia omby na ondry aman-osy hatao fanatitra dorana, na fanatitra hafa alatsa-dra hanalana voady, na amin’ny sitrapo na amin’ny fotoam-pivavahanareo, hanaovana hanitra ankasitrahana ho an’i Jehovah: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny olona izay manota sahisahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.30 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: amin’ny tànana asandratra.
      marker-yv: yv-n
    - type: text
      text: ' kosa, na tompon-tany, na vahiny, dia manamavo an’i Jehovah, ka dia hofongorana tsy ho amin’ny fireneny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny tenin’i Jehovah no nohamavoiny, ary ny lalàny no nodikainy, dia hofongorana tokoa izany olona izany; ny helony dia ho aminy ihany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny natao tamin’ilay lehilahy nanangona kitay tamin’ny andro Sabata.
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ARY raha tany an-efitra ny Zanak’Isiraely, dia nahita lehilahy anankiray nanangona kitay hazo tamin’ny andro Sabata. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay nahita azy nanangona kitay dia nitondra azy teo amin’i Mosesy sy Arona ary ny fiangonana rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nambenana ralehilahy, satria tsy mbola fantatra izay hatao aminy.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Hatao maty tokoa izany lehilahy izany; hitora-bato azy eny ivelan’ny toby ny fiangonana rehetra. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia namoaka azy ho eny ivelan’ny toby ny fiangonana rehetra ka nitora-bato azy, ka maty izy,–dia araka izay nandidian’i Jehovah an’i Mosesy ihany.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny hanaovana somotraviavy amin’ny sisin’ny fitafian’ny Zanak’Isiraely.
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin’ny Zanak’Isiraely, ka asaovy asiany somotraviavy ny sisin’ny fitafiany hatramin’ny taranany fara mandimby, ary aoka hasiany kofehy manga eo amin’ny somotraviaviny. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho somotraviavy ho anareo izany, ka raha jerenareo, dia hotsarovanareo sy hankatoavinareo ny didin’i Jehovah rehetra; ary tsy handeha araka ny fonareo hianareo, na araka ny masonareo, izay andehananareo hijangajangana,– '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay manatitra ny fanatiny ho an’i Jehovah dia hanatitra fanatitra hohanina koa, dia koba tsara toto ampahafolon’ny efaha voaharo diloilo ampahefatry ny hina; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hotsarovanareo sy hankatoavinareo ny didiko rehetra, ka dia ho masina ho an’Andriamanitrareo hianareo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no Jehovah Andriamanitrareo, Izay nitondra anareo nivoaka avy tany amin’ny tany Egypta mba ho Andriamanitrareo: Izaho no Jehovah Andriamanitrareo.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary divay ampahefatry ny hina hatao fanatitra aidina no hampombainao ny fanatitra dorana, na ny fanatitra hafa alatsa-dra, amin’ny isan-janak’ondry iray. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho fanampin’ny isan-ondrilahy iray dia koba tsara toto roa ampahafolon’ny efaha voaharo diloilo ampahatelon’ny hina no haterinao ho fanatitra hohanina; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary divay ampahatelon’ny hina no haterinao ho fanatitra aidina, ho hanitra ankasitrahana ho an’i Jehovah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha manatitra omby ho fanatitra dorana na ho fanatitra hafa alatsa-dra hianao, hanalana voady, na ho fanati-pihavanana ho an’i Jehovah, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia fanatitra hohanina koa no haterinao ho fanampin’ny isan-omby iray, dia koba tsara toto telo ampahafolon’ny efaha voaharo diloilo antsasaky ny hina; '
