document_id: 1PE.1,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana, sy filazana ny amin’ny fahatsaran’ny fanavotana.
  - type: text
    content: 'PETERA, Apostolin’i Jesosy Kristy, mamangy ny mpivahiny monina any am-pielezana any Ponto, Galatia, Kapadokia, Asia sy Bitynia, dia olom-boafidy '
  '10':
  - type: text
    content: 'Ny amin’izany famonjena izany dia notadiavin’ny mpaminany sy nokatsahiny fatratra, dia ireo efa naminany ny fahasoavana ho anareo; '
  '11':
  - type: text
    content: 'eny, nokatsahiny izay andro na izay toetry ny andro notondroin’ny Fanahin’i Kristy tao anatiny, raha nambarany rahateo ny fijalian’i Kristy sy ny voninahitra manaraka izany. '
  '12':
  - type: text
    content: Ary naseho tamin’ireo fa tsy ho azy, fa ho anareo no nanompoany ny amin’izany zavatra izany, izay voalaza aminareo ankehitriny, tamin’ny tenin’ireo nitory ny filazantsara taminareo amin’ny Fanahy Masina, Izay nirahina avy tany an-danitra; izany zavatra izany dia tian’ny anjely hodinihina.
  - type: heading
    content: Famporisihana hitondra tena mifanaraka amin’ny filazantsara.
  '13':
  - type: text
    content: 'KOA amin’izany sikino ny sainareo, dia mahonòna tena, ka antenao tsara ny fahasoavana izay ho entina ho anareo amin’ny hisehoan’i Jesosy Kristy; '
  '14':
  - type: text
    content: 'tahaka ny zanaka manoa, tsy mitondra tena araka ny filanareo fahiny tamin’ny tsi-fahalalanareo; '
  '15':
  - type: text
    content: 'fa araka ny fahamasinan’Ilay niantso anareo, dia aoka mba ho masina koa hianareo amin’ny fitondrantena rehetra, '
  '16':
  - type: text
    content: 'satria voasoratra hoe: ,,Ho masina hianareo, satria masina Aho’’ (Lev. 11. 44).'
  '17':
  - type: text
    content: 'Ary raha Ilay tsy mizaha tavan’olona, fa mitsara araka ny asan’izy rehetra, no antsoinareo hoe Ray, dia mitondrà tena amin’ny fahatahorana mandritra ny andron’ny fivahinianareo etỳ; '
  '18':
  - type: text
    content: 'fa fantatrareo fa tsy zavatra mety ho simba, '
  - type: text
    content: tahaka
  - type: text
    content: ' ny volafotsy sy ny volamena, no nanavotana anareo tamin’ny fitondrantena adala, izay azonareo tamin’ny nentin-drazana, '
  '19':
  - type: text
    content: 'fa ny ra soan’i Kristy, toy ny ran’ny zanak’ondry tsy misy kilema ary tsy misy pentimpentina; '
  '2':
  - type: text
    content: 'araka ny fahalalana rahateo, izay an’Andriamanitra Ray, amin’ny fanamasinan’ny Fanahy, ho amin’ny fanarahana sy ny famafazan’ny ran’i Jesosy Kristy: hampitomboina ho anareo anie ny fahasoavana sy ny fiadanana.'
  '20':
  - type: text
    content: 'Izay fantatra rahateo, fony tsy mbola ary ny fanorenan’izao tontolo izao, fa efa naseho tamin’izao andro farany izao noho ny aminareo, '
  '21':
  - type: text
    content: Izay mino an’Andriamanitra amin’ny alalany, dia Ilay nanangana Azy tamin’ny maty ka nanome voninahitra Azy,–mba hiorenan’ny finoanareo sy ny fanantenanareo amin’Andriamanitra.
  '22':
  - type: text
    content: Satria efa nodiovinareo ny fanahinareo tamin’ny fanarahana ny fahamarinana ho amin’ny fitiavan-drahalahy tsy miangatra, dia mifankatiava fatratra amin’ny fo;
  - type: note
    content: 'Na: [amin’ny fo madio].'
  - type: text
    content: ' '
  '23':
  - type: text
    content: fa efa teraka indray hianareo, tsy tamin’ny voa mety ho lo, fa tamin’ny tsy mety ho lo, dia ny tenin’Andriamanitra, izay velona sady maharitra.
  '24':
  - type: text
    content: Fa ,,ny nofo rehetra dia tahaka ny ahitra,
  - type: text
    content: Ary izay mety ho voninahiny dia tahaka ny vonin’ny ahitra.
  - type: text
    content: Malazo ny ahitra, ka mihintsana ny voniny;
  '25':
  - type: text
    content: Fa ny tenin’ny Tompo maharitra mandrakizay’’ (Isa. 40.6–8).
  - type: text
    content: Ary izany no tenin’ny filazantsara izay notorina taminareo.
  '3':
  - type: text
    content: 'Isaorana anie Andriamanitra, Rain’i Jesosy Kristy Tompontsika, Izay niteraka antsika indray araka ny haben’ny famindrampony ho amin’ny fanantenana velona tamin’ny nitsanganan’i Jesosy Kristy tamin’ny maty, '
  '4':
  - type: text
    content: 'ho amin’ny lova tsy mety simba, tsy misy loto, tsy mety levona, voatahiry any an-danitra ho anareo, '
  '5':
  - type: text
    content: izay arovan’ny herin’Andriamanitra amin’ny finoana ho amin’ny famonjena efa vonona haseho any am-parany.
  '6':
  - type: text
    content: 'Izany no iravoravoanareo, na dia ampalahelovina vetivety ankehitriny amin’ny fakam-panahy maro samy hafa aza hianareo, raha tsy maintsy hisy izany, '
  '7':
  - type: text
    content: 'mba ho hita ho fiderana sy voninahitra ary fankalazana ny fizahan-toetra ny finoanareo (izay tsara lavitra noho ny volamena mety ho simba, na dia voazaha toetra tamin’ny afo aza), dia amin’ny hisehoan’i Jesosy Kristy, '
  '8':
  - type: text
    content: 'Izay, na dia tsy mbola hitanareo aza, dia tianareo, ary na dia tsy hitanareo ankehitriny aza, nefa, satria inoanareo, dia iravoravoanareo amin’ny fifaliana tsy azo tononina sady be voninahitra, '
  '9':
  - type: text
    content: mandray ny anton’ny finoanareo, dia ny famonjena ny fanahy.
