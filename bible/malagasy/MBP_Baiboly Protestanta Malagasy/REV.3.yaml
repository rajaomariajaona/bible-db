document_id: REV.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (5) Sardisy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary soraty ho amin’ny anjelin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gt. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' any Sardisy:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Ilay manana ny Fanahy fiton’Andriamanitra sy ny kintana fito: Fantatro ny asanao, fa manana anarana ho velona hianao, kanjo maty ihany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Satria efa nitandrina ny teniko ny amin’ny faharetana hianao, Izaho kosa hiaro anao ho voavonjy amin’ny andro fakam-panahy izay efa hihatra amin’izao tontolo izao ho fizahan-toetra izay monina ambonin’ny tany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ho avy faingana Aho; tano mafy izay anananao, mba tsy hisy haka ny satroboninahitrao.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Izay maharesy no hataoko andry eo amin’ny tempolin’Andriamanitro, ary tsy hiala eo intsony izy; ary hosoratako eo aminy ny anaran’Andriamanitro sy ny anaran’ny tanànan’Andriamanitro, dia Jerosalema vaovao, izay midina avy any an-danitra avy amin’Andriamanitro, ary ilay anarako vaovao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gt. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (7) Laodikia.
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary soraty ho amin’ny anjelin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gt. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' any Laodikia:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’ny Amena, dia Ilay Vavolombelona mahatoky sy marina, Izay niandohan’izao zavatra noharìn’Andriamanitra izao: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fantatro ny asanao, fa tsy mangatsiaka na mafana hianao; aleo ho mangatsiaka na ho mafana hianao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa satria matimaty hianao ka tsy mafana na mangatsiaka, dia efa haloan’ny vavako hianao; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'fa hoy hianao: Manan-karena sy efa nihary fananana be aho ka tsy manan-java-mahory; kanjo tsy fantatrao fa hianao no ilay ory sy mahantra sy malahelo sy jamba ary mitanjaka; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'dia manoro hevitra anao Aho hividy amiko volamena voadio tamin’ny afo, mba hanan-karena hianao, ary fitafiana fotsy hotafinao, mba tsy hisehoan’ny henatrao noho ny fitanjahana, ary odi-maso hahosotrao ny masonao mba hahiratanao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Izay
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Raha Izaho, dia izay.
      marker-yv: yv-n
    - type: text
      text: ' rehetra tiako no anariko sy faizako; koa dia mazotoa hianao, ka mibebaha. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Miambena,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Miareta tory.
      marker-yv: yv-n
    - type: text
      text: ' ka aoreno tsara ny zavatra sisa izay saiky maty; fa tsy nisy hitako'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[tsy hitako].'
      marker-yv: yv-n
    - type: text
      text: ' tanteraka ny asanao eo anatrehan’Andriamanitro. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Indro, efa mitsangana eo am-baravarana Aho ka mandòndòna; raha misy mihaino ny feoko ka mamoha ny varavarana, dia hiditra ao aminy Aho ka hiara-misakafo aminy, ary izy amiko.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Izay maharesy dia havelako hiara-mipetraka amiko eo ambonin’ny seza fiandrianako, dia tahaka ny nandreseko kosa sy ny niarahako nipetraka amin’ny Raiko eo ambonin’ny seza fiandrianany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.22 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia tsarovy ny amin’ny nandraisanao sy ny nandrenesanao, ary tano mafy, ka mibebaha. Koa raha tsy hiambina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hiari-tory.
      marker-yv: yv-n
    - type: text
      text: ' hianao, dia ho tonga toy ny fihavin’ny mpangalatra Aho, ka tsy ho fantatrao izay ora hihaviako aminao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Kanefa misy olona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gr. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: anarana.
      marker-yv: yv-n
    - type: text
      text: ' vitsy atỳ aminao atỳ Sardisy izay tsy nandoto ny fitafiany; ary hiara-mandeha amiko mitafy lamba fotsy ireo, satria mendrika izy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izay maharesy dia hitafy lamba fotsy tahaka ireo koa, ary tsy hamono ny anarany eo amin’ny bokin’ny fiainana tokoa Aho, fa hanaiky ny anarany eo anatrehan’ny Raiko sy eo anatrehan’ny anjeliny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gt. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (6) Filadelfia.
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary soraty ho amin’ny anjelin’ny fiangonana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Gt. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: eklesia.
      marker-yv: yv-n
    - type: text
      text: ' any Filadelfia:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain’Izay masina, Izay marina, Izay manana ny fanalahidin’i Davida, Izay mamoha ka tsy hisy hanidy, ary manidy ka tsy misy mamoha: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fantatro ny asanao (indro, efa nasiako varavarana mivoha eo anatrehanao, ka tsy misy maharindrina azy), fa manana hery kely ihany hianao ka nitandrina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fa na dia kely aza ny herinao, dia efa nitandrina, etc.
      marker-yv: yv-n
    - type: text
      text: ' ny teniko ary tsy mba nandà ny anarako. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Indro, alaiko ny sasany amin’ny synagogan’i Satana, izay milaza ny tenany ho Jiosy, kanjo tsy izy, fa mandainga, indro, hataoko tonga hiankohoka eo anoloan’ny tongotrao ireo, ka ho fantany fa Izaho efa tia anao. '
