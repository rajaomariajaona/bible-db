document_id: REV.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: (5) Sardisy.
  - type: text
    content: Ary soraty ho amin’ny anjelin’ny fiangonana
  - type: note
    content: Gt. eklesia.
  - type: text
    content: ' any Sardisy:'
  - type: text
    content: 'Izao no lazain’Ilay manana ny Fanahy fiton’Andriamanitra sy ny kintana fito: Fantatro ny asanao, fa manana anarana ho velona hianao, kanjo maty ihany. '
  '10':
  - type: text
    content: 'Satria efa nitandrina ny teniko ny amin’ny faharetana hianao, Izaho kosa hiaro anao ho voavonjy amin’ny andro fakam-panahy izay efa hihatra amin’izao tontolo izao ho fizahan-toetra izay monina ambonin’ny tany. '
  '11':
  - type: text
    content: Ho avy faingana Aho; tano mafy izay anananao, mba tsy hisy haka ny satroboninahitrao.
  '12':
  - type: text
    content: 'Izay maharesy no hataoko andry eo amin’ny tempolin’Andriamanitro, ary tsy hiala eo intsony izy; ary hosoratako eo aminy ny anaran’Andriamanitro sy ny anaran’ny tanànan’Andriamanitro, dia Jerosalema vaovao, izay midina avy any an-danitra avy amin’Andriamanitro, ary ilay anarako vaovao. '
  '13':
  - type: text
    content: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
  - type: note
    content: Gt. eklesia.
  - type: heading
    content: (7) Laodikia.
  '14':
  - type: text
    content: Ary soraty ho amin’ny anjelin’ny fiangonana
  - type: note
    content: Gt. eklesia.
  - type: text
    content: ' any Laodikia:'
  - type: text
    content: 'Izao no lazain’ny Amena, dia Ilay Vavolombelona mahatoky sy marina, Izay niandohan’izao zavatra noharìn’Andriamanitra izao: '
  '15':
  - type: text
    content: 'Fantatro ny asanao, fa tsy mangatsiaka na mafana hianao; aleo ho mangatsiaka na ho mafana hianao. '
  '16':
  - type: text
    content: 'Fa satria matimaty hianao ka tsy mafana na mangatsiaka, dia efa haloan’ny vavako hianao; '
  '17':
  - type: text
    content: 'fa hoy hianao: Manan-karena sy efa nihary fananana be aho ka tsy manan-java-mahory; kanjo tsy fantatrao fa hianao no ilay ory sy mahantra sy malahelo sy jamba ary mitanjaka; '
  '18':
  - type: text
    content: 'dia manoro hevitra anao Aho hividy amiko volamena voadio tamin’ny afo, mba hanan-karena hianao, ary fitafiana fotsy hotafinao, mba tsy hisehoan’ny henatrao noho ny fitanjahana, ary odi-maso hahosotrao ny masonao mba hahiratanao. '
  '19':
  - type: text
    content: Izay
  - type: note
    content: Gr. Raha Izaho, dia izay.
  - type: text
    content: ' rehetra tiako no anariko sy faizako; koa dia mazotoa hianao, ka mibebaha. '
  '2':
  - type: text
    content: Miambena,
  - type: note
    content: Gr. Miareta tory.
  - type: text
    content: ' ka aoreno tsara ny zavatra sisa izay saiky maty; fa tsy nisy hitako'
  - type: note
    content: 'Na: [tsy hitako].'
  - type: text
    content: ' tanteraka ny asanao eo anatrehan’Andriamanitro. '
  '20':
  - type: text
    content: Indro, efa mitsangana eo am-baravarana Aho ka mandòndòna; raha misy mihaino ny feoko ka mamoha ny varavarana, dia hiditra ao aminy Aho ka hiara-misakafo aminy, ary izy amiko.
  '21':
  - type: text
    content: 'Izay maharesy dia havelako hiara-mipetraka amiko eo ambonin’ny seza fiandrianako, dia tahaka ny nandreseko kosa sy ny niarahako nipetraka amin’ny Raiko eo ambonin’ny seza fiandrianany. '
  '22':
  - type: text
    content: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
  - type: note
    content: Gr. eklesia.
  '3':
  - type: text
    content: Dia tsarovy ny amin’ny nandraisanao sy ny nandrenesanao, ary tano mafy, ka mibebaha. Koa raha tsy hiambina
  - type: note
    content: Gr. hiari-tory.
  - type: text
    content: ' hianao, dia ho tonga toy ny fihavin’ny mpangalatra Aho, ka tsy ho fantatrao izay ora hihaviako aminao. '
  '4':
  - type: text
    content: Kanefa misy olona
  - type: note
    content: Gr. anarana.
  - type: text
    content: ' vitsy atỳ aminao atỳ Sardisy izay tsy nandoto ny fitafiany; ary hiara-mandeha amiko mitafy lamba fotsy ireo, satria mendrika izy.'
  '5':
  - type: text
    content: 'Izay maharesy dia hitafy lamba fotsy tahaka ireo koa, ary tsy hamono ny anarany eo amin’ny bokin’ny fiainana tokoa Aho, fa hanaiky ny anarany eo anatrehan’ny Raiko sy eo anatrehan’ny anjeliny. '
  '6':
  - type: text
    content: Izay manan-tsofina, aoka izy hihaino izay lazain’ny Fanahy amin’ny fiangonana.
  - type: note
    content: Gt. eklesia.
  - type: heading
    content: (6) Filadelfia.
  '7':
  - type: text
    content: Ary soraty ho amin’ny anjelin’ny fiangonana
  - type: note
    content: Gt. eklesia.
  - type: text
    content: ' any Filadelfia:'
  - type: text
    content: 'Izao no lazain’Izay masina, Izay marina, Izay manana ny fanalahidin’i Davida, Izay mamoha ka tsy hisy hanidy, ary manidy ka tsy misy mamoha: '
  '8':
  - type: text
    content: Fantatro ny asanao (indro, efa nasiako varavarana mivoha eo anatrehanao, ka tsy misy maharindrina azy), fa manana hery kely ihany hianao ka nitandrina
  - type: note
    content: 'Na: fa na dia kely aza ny herinao, dia efa nitandrina, etc.'
  - type: text
    content: ' ny teniko ary tsy mba nandà ny anarako. '
  '9':
  - type: text
    content: 'Indro, alaiko ny sasany amin’ny synagogan’i Satana, izay milaza ny tenany ho Jiosy, kanjo tsy izy, fa mandainga, indro, hataoko tonga hiankohoka eo anoloan’ny tongotrao ireo, ka ho fantany fa Izaho efa tia anao. '
