document_id: DEU.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia niverina isika ka niakatra tamin’ny làlana mankany Basana; ary nivoaka hiady amintsika tao Edregy Oha, mpanjakan’i Basana, mbamin’ny vahoakany rehetra. '
  '10':
  - type: text
    content: 'dia ny tanàna rehetra amin’ny tany lemaka sy i Gileada rehetra ary i Basana rehetra hatrany Saleka sy Edrehy, dia ny tanàna amin’ny fanjakan’i Oga tany Basana. '
  '11':
  - type: text
    content: Fa Oga, mpanjakan’i Basana, ihany no sisa velona tamin’ny Refaïta; indro, farafara vy ny farafarany (tsy ao Raban’ny taranak’i Amona va izany?), sivy hakiho ny halavany, ary efatra hakiho ny sakany, araka ny hakihon’ny lehilahy.
  '12':
  - type: text
    content: 'Ary io tany io dia azontsika tamin’izany andro izany; hatrany Aroera, izay eo amoron’ny lohasahan-driaka Arnona, sy ny antsasaky ny tany havoan’i Gileada ary ny tanàna eo dia nomeko ny Robenita sy ny Gadita. '
  '13':
  - type: text
    content: 'Ary i Gileada sisa sy Basana rehetra, izay fanjakan’i Oga, dia nomeko ny antsasaky ny firenen’i Manase, dia ny tany Argoba rehetra, dia Basana rehetra (atao hoe tanin’ny Refaïta izany. '
  '14':
  - type: text
    content: 'Jaïra, zanak’i Manase, no nahafaka ny tany Argoba rehetra, hatramin’ny fari-tanin’ny Gesorita sy ny Makatita; ary ny anaran’ izany (dia Basana) nataony hoe Havota-jaïra, araka ny anaran-tenany ihany, mandraka andro-any). '
  '15':
  - type: text
    content: 'Ary i Gileada dia nomeko an’i Makira. '
  '16':
  - type: text
    content: 'Ary ny Robenita sy ny Gadita dia nomeko ny hatrany Gileada ka hatramin’ny lohasahan-driaka Arnona, dia ny antsasaky ny lohasaha, sy ny fari-tany hatramin’ny amoron’ny lohasahan-driaka Jaboka, izay fari-tanin’ny taranak’i Amona, '
  '17':
  - type: text
    content: ary ny tani-hay
  - type: note
    content: Heb.Arabà.
  - type: text
    content: ' koa sy Jordana ary ny fari-tany hatrany Kinereta ka hatramin’ny ranomasina amin’ny tani-hay,'
  - type: note
    content: Heb. Arabà.
  - type: text
    content: ', dia ny Ranomasin-tsira, eo am-bodin’i Pisga, dia ao atsinanany.'
  '18':
  - type: text
    content: 'Ary nandidy anareo tamin’izany andro izany aho ka nanao hoe: Jehovah Andriamanitrareo efa nanome anareo ity tany ity ho lovanareo; andeha mita eo alohan’ny Zanak’Isiraely rahalahinareo hianareo rehetra izay mahery, samy efa voaomana hiady. '
  '19':
  - type: text
    content: 'Fa ny vadinareo sy ny zanakareo madinika ary ny ombinareo (fantatro fa be omby hianareo) dia hitoetra ao an-tanànanareo izay nomeko anareo, '
  '2':
  - type: text
    content: 'Ary hoy Jehovah tamiko: Aza matahotra azy hianao; fa efa natolotro eo an-tànanao izy mbamin’ny vahoakany rehetra sy ny taniny, ary hianao hanao aminy araka izay nataonao tamin’i Sihona, mpanjakan’ny Amorita, izay nonina tao Hesbona.'
  '20':
  - type: text
    content: mandra-panomen’i Jehovah fitsaharana ny rahalahinareo tahaka ny anareo, ka holovany koa ny tany izay nomen’i Jehovah Andriamanitrareo azy any an-dafin’i Jordana; dia hiverina hianareo, samy ho any amin’ny taniny avy, izay nomeko anareo.
  - type: heading
    content: Ny amin’ny tsy hidiran’i Mosesy ao Kanana, sy ny nanendrena an’i Josoa handimby azy.
  '21':
  - type: text
    content: 'DIA nandidy an’i Josoa aho tamin’izany andro izany ka nanao hoe: Ny masonao efa nahita izay rehetra nataon’i Jehovah Andriamanitrareo tamin’ireo mpanjaka roa lahy ireo; dia toy izany no hataon’i Jehovah amin’ny fanjakana rehetra izay halehanao. '
  '22':
  - type: text
    content: Aza matahotra azy hianareo; fa Jehovah Andriamanitrareo no hiady ho anareo.
  '23':
  - type: text
    content: 'Dia nitaraina tamin’i Jehovah tamin’izany andro izany aho ka nanao hoe: '
  '24':
  - type: text
    content: 'Jehovah Tompo ô, Hianao vao naneho tamin’ny mpanomponao ny fahalehibiazanao sy ny tànanao mahery; fa aiza no misy andriamanitra, na any an-danitra na atỳ an-tany, izay mahay manao araka ny asanao sy ny herinao? '
  '25':
  - type: text
    content: 'Aoka mba handeha hita aho ka hahita ny tany soa izay any an-dafin’i Jordana, dia ilay be tendrombohitra tsara sy Libanona. '
  '26':
  - type: text
    content: 'Fa tezitra tamiko i Jehovah noho ny aminareo ka tsy nihaino ahy; dia hoy i Jehovah tamiko: Aoka izay, fa aza miteny amiko intsony ny amin’izany zavatra izany hianao. '
  '27':
  - type: text
    content: 'Miakara eo an-tampon’i Pisga hianao, ary atopazy ny masonao miankandrefana sy mianavaratra ary mianatsimo sy miantsinanana, ary aoka hijery ny masonao; fa tsy hita izany Jordana izany hianao; '
  '28':
  - type: text
    content: fa mandidia an’i Josoa hianao, dia mampahereza azy sy mampahatanjaha azy; fa izy no handeha hita eo alohan’ity firenena ity, ary izy no hampandova azy ny tany izay ho hitanao.
  '29':
  - type: text
    content: Ka dia nitoetra tany an-dohasaha tandrifin’i Beti-peora isika.
  '3':
  - type: text
    content: 'Dia natolotr’i Jehovah Andriamanitsika teo an-tànantsika koa i Oga, mpanjakan’i Basana, sy ny vahoakany rehetra; dia nandresy azy isika mandra-paha-tsi-hisy niangana na dia iray akory aza. '
  '4':
  - type: text
    content: 'Dia afatsika ny tanànany rehetra tamin’izany andro izany – tsy nisy tanàna izay tsy nalaintsika taminy – dia tanàna enim-polo, dia ny tany Argoba rehetra, izay fanjakan’i Oga tany Basana. ( '
  '5':
  - type: text
    content: 'Ireo tanàna rehetra ireo dia samy nasiana mànda avo sy vavahady ary hidy hahamafy azy, afa-tsy ny vohitra madinika maro dia maro.) '
  '6':
  - type: text
    content: Dia naringantsika
  - type: note
    content: Heb. nataontsika herema.
  - type: text
    content: ' ireny tahaka izay efa nataontsika tamin’i Sihona, mpanjakan’i Hesbona; naringana ny mponina rehetra tamin’ny isan-tanàna mbamin’ny zaza amim-behivavy. '
  '7':
  - type: text
    content: Fa ny biby fiompy rehetra sy ny fananana tamin’ireo tanàna ireo dia nataontsika babo ho antsika.
  '8':
  - type: text
    content: Ary nalaintsika tamin’izany andro izany tamin’ny mpanjaka roan’ny Amorita ny tany izay any an-dafin’i Jordana, hatramin’ny lohasahan-driaka Arnona ka hatramin’ny tendrombohitra Hermona (
  '9':
  - type: text
    content: 'Hermona nataon’ny Sidoniana hoe Siriona; ary ny Amorita kosa nanao azy hoe Senira), '
