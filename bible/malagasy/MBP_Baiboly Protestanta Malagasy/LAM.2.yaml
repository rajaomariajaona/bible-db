document_id: LAM.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitomaniana noho ny nanjo an’i Ziona sy ny Joda.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: INDRISY! Ziona zanakavavy dia saronan’ny Tompo rahona amin’ny fahatezerany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nazerany avy tany an-danitra ho amin’ny tany ny reharehan’ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy tsaroany ny fitoeran-tongony tamin’ny andro fahatezerany!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nolevonin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Natelin’.
    marker-yv: yv-n
  - type: text
    text: ' ny Tompo ny fonenan’i Jakoba rehetra, fa tsy niantrany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noravany an-katezerana ny fiarovan’i Joda zanakavavy ka nazerany tamin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nohamasininy ny fanjakana sy ny mpanapaka,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nokapainy tamin’ny fahatezerany mirehitra ny tandroky ny Isiraely rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nahemony teo anoloan’ny fahavalo ny tànany ankavanana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nandoro an’i Jakoba Izy toy ny lelafo miredareda izay nandevona manodidina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nanenjana ny tsipìkany toy ny fahavalo Izy, nijoro naninjitra ny tànany ankavanana toy ny rafilahy Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nandripaka izay rehetra mahafinaritra ny maso;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fahatezerany dia naidiny toy ny afo tamin’ny lain’i Ziona zanakavavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny Tompo dia tonga toy ny fahavalo ka nandevona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nitelina.
    marker-yv: yv-n
  - type: text
    text: ' ny Isiraely.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, nolevoniny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nateliny.
    marker-yv: yv-n
  - type: text
    text: ' ny lapany rehetra, sady noravany ny fiarovany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nampitomboiny ny fisentoana sy ny fitarainan’i Joda zanakavavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary noravany an-keriny toy ny tanimboly ilay nofefena ho Azy, sady noravany ny trano fihaonany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nataon’i Jehovah hadino tao Ziona ny fotoam-pivavahana sy ny Sabata,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nolaviny tamin’ny fahatezerany mirehitra ny mpanjaka sy ny mpisorona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny alitarany narian’ny Tompo, ny fitoerany masina nolaviny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Natolony ho eo an-tànan’ny fahavalo ny màndan’ny lapa ao Ziona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanandratra ny feony tao an-tranon’i Jehovah toy ny amin’ny fotoam-pivavahana ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jehovah ninia handrava ny màndan’i Ziona zanakavavy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanenjana ny famolaina Izy ka tsy namonkina ny tanany tsy handrava;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hitelina.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mampitomany ny fiarovany ivelany sy ny mànda Izy, ka miara-dreraka ireo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny vavahadiny dia tototry ny tany, nosimbany sy notapatapahiny ny hidiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanjakany sy ny mpanapaka azy efa mby any amin’ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy lalàna intsony, fa na ny mpaminaniny aza dia tsy mahita fahitana avy amin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mipetraka amin’ny tany ny loholon’i Ziona zanakavavy ka mangina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nasiany vovoka ny lohany, misikina lamba fisaonana izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny virijina any Jerosalema nampitanondrika ny lohany ho amin’ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pahina ny masoko azon’ny ranomaso, mandevilevy ny foko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naidina tamin’ny tany ny atiko noho ny fandringanana ny oloko zanakavavy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy noho ny ankizy madinika sy ny zaza minono izay ana eny an-kalalahana ao an-tanàna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha ana toy ny voatrobaka eny an-kalalahana ao an-tanàna izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na miala aina eo am-pofoan-dreniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia manontany an-dreniny hoe izy: Aiza izay vary sy divay?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Inona no hataoko vavolombelona ho anao? Inona no hanoharako anao, ry Jerosalema zanakavavy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no hampitahaiko aminao mba hampiononako anao, ry Ziona zanakavavy virijina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa lehibe toy ny ranomasina ny faharatranao, iza no mahasitrana anao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny mpaminaninao nahita lainga sy fahadalana ho anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nampiseho ny helokao mba hiaro anao tsy ho babo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nahita faminaniana lainga sy fampiviliana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fandroahana.
    marker-yv: yv-n
  - type: text
    text: ' ho anao izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Miteha-tànana anao izay rehetra mandalo eny an-dàlana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Misitrisitra sy mihifikifi-doha amin’i Jerosalema zanakavavy izy ka manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ity va ilay tanàna nataony hoe Tena fahatsaran-tarehy, Fifalian’ny tany rehetra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Misanasana vava aminao ny fahavalonao rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Misitrisitra sy mihidy vazana izy ka manao hoe: Efa nolevoninay!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: natelinay.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ity tokoa no andro nandrasanay ka efa azonay sady hitanay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jehovah efa nanao izay nosaininy ka nahatanteraka ny teniny izay nandidiany hatramin’ny andro fahagola;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nandrava Izy, fa tsy niantra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nampifaly ny fahavalo taminao Izy sady nanandratra ny tandroky ny rafilahinao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fonao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fony.
    marker-yv: yv-n
  - type: text
    text: ' mitaraina amin’ny Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry màndan’i Ziona zanakavavy! mandrotsaha ranomaso andro aman-alina toy ny riaka;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza mangina, aoka tsy hitsahatra ny anakandriamasonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mitsangàna, miantsoantsoa amin’ny alina hatramin’ny filatsahan’ny fiambenana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aidino tahaka ny rano eo anatrehan’ny Tompo ny fonao!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asandrato aminy ny tànanao hifona ho an’ny ain’ny zanakao madinika, izay anan’ny hanoanana eny an-joron-dàlambe rehetra eny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jehovah ô, jereo ka izahao ny amin’ny olona izay nanaovanao izany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny vehivavy va hihinana ny ateraky ny kibony, dia ny zanany madinika trotroiny?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hovonoina ao amin’ny fitoera-masin’i Jehovah va ny mpisorona sy ny mpaminany?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Miampatrampatra eny an-dàlambe ny tanora sy ny antitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny virijinako sy ny zatovoko dia lavon’ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Novonoinao tamin’ny andro fahatezeranao izy, eny, naripakao, fa tsy niantranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nantsoinao ny fampangorohoroana manodidina ahy, toy ny amin’ny fotoam-pivavahana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia tsy nisy sisa afa-nandositra tamin’ny andro fahatezeran’i Jehovah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay notrotroiko sy notezaiko aza dia lanin’ny fahavaloko.
