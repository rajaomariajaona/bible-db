document_id: JER.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny fivadihan’ny Isiraely ampitahaina amin’ny tsi-fiovan’ny fitiavan’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga tamiko ny tenin’i Jehovah hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandehana, ka miantsoa eo anatrehan’i Jerosalema hoe: Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tsaroako ny niraiketan’ny fonao '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tamiko
  - type: text
    text: ', fony hianao mbola tanora,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny fitiavanao, fony hianao vao nampakarina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay nanarahanao Ahy tany an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teny amin’ny tany tsy mbola nifafy zavatra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Masina ho an’i Jehovah ny Isiraely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady santatra amin’ny vokany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay rehetra nihinana azy dia nohelohina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny loza no nanjo ireny, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mihainoa ny tenin’i Jehovah, ry taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hianareo, ry fokony rehetra amin’ny taranak’Isiraely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona moa no tsy marina hitan’ny razanareo tamiko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No dia nanalavitra Ahy izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nanaraka ny zava-poana, ka dia tonga zava-poana koa izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izy tsy nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiza Jehovah Izay nitondra antsika niakatra avy tany amin’ny tany Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nitarika antsika tany an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay tany foana sady be lavaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tany karankaina sady aloky ny fahafatesana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tany izay tsy mba nalehan’olona akory na nonenan’olona?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nitondra anareo niditra ho any amin’ny tany mahavokatra Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hihinananareo ny vokatra sy ny zavatra tsara eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo nony tafiditra hianareo, dia nolotoinareo ny taniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady novetavetainareo ny lovako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny mpisorona tsy nanao hoe: Aiza Jehovah?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpiadidy ny lalàna tsy nahalala Ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpitondra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpiandry ondry.
    marker-yv: yv-n
  - type: text
    text: ' koa nanota tamiko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpaminany naminany tamin’ny anaran’i Bala
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanaraka ireny tsy mahasoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa mbola hifandahatra aminareo Aho, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hiady amin’ny zafinareo koa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa mità ho any amin’ny moron-dranomasin’i Kitima, ka izahao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maniraha ho any Kedara, ka diniho tsara,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia aoka ho hitanareo na mba efa nisy toy izao, na tsia:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moa nisy firenena efa nanova ny andriamaniny va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ireny dia tsy Andriamanitra akory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny oloko kosa efa nanakalo ny voninahiny tamin’ireny tsy mahasoa ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Talanjòna amin’izany, ry lanitra!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary matahora, ka mangorohoroa indrindra, hianareo! hoy Jehovah;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa zava-dratsy roa loha no nataon’ny oloko:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nahafoy Ahy, loharanon’aina, izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nihady lavaka famorian-drano ho an’ny tenany, nefa lavaka mitriatriatra tsy mahatan-drano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Moa mpanompo va Isiraely? Ompikely va izy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa nahoana no voababo izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hamely azy no ampieronan’ny liona tanora sy amoahany feo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mahatonga ny taniny ho lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nodorana ny tanànany, ka tsy nisy mponina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny mponina tao Memfisa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nofa.
    marker-yv: yv-n
  - type: text
    text: ' sy Tapanesa aza'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nampangadihady ny tampon-dohanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moa tsy ny nahafoizanao an’i Jehovah Andriamanitrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tamin’ny andro nitondrany anao teny an-dàlana va
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nahatonga izany taminao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa inona no anton’ny ankanesanao amin’ny làlana mankany Egypta
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisotro ny ranon’i Sihora?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Neily.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary inona no anton’ny ankanesanao amin’ny làlana mankany Asyria
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisotro ny rano amin’ny Ony?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eofrata.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny haratsianao no anafaizana anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fiodinanao no ananarana anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa fantaro sy hevero fa ratsy sady mangidy ny nahafoizanao an’i Jehovah Andriamanitrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny tsy nisian’ny tahotrao Ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Tompon’ny maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa hatramin’ny ela no efa nanapahanao ny zioga taminao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy efa nanitosanao ny fatoranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hoy hianao: Tsy hety hanompo aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa teny amin’ny havoana andrandraina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy teny ambanin’ny hazo maitso rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: No nandrianao nijangajanganao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa Izaho namboly anao ho karazam-boaloboka tsara indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia rantsana tsara avokoa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ahoana no nanjary sampany ratsy hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho voaloboka hafa?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa na dia misasa sirahazo aza hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka maka lavenona betsaka hanadiovana anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny helokao dia mbola voasoratra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: maloto.
    marker-yv: yv-n
  - type: text
    text: ' eo anatrehako ihany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ahoana no anaovanao hoe: Tsy nanao izay nahaloto ahy aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy nanaraka ireo Bala aho?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hevero ny nalehanao tany amin’ilay lohasaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fantaro izay nataonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry ramevavavy haingam-pandeha mivezivezy amin’ny alehany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Sy ry borikivavi-dia tamana any an-efitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manimbolo ny rivotra noho ny faniriany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamaimaizany–iza no mahasakana azy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay rehetra mitady azy dia tsy ho sasa-poana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa amin’ny volany no hahitany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aza esorina ny kapa amin’ny tongotrao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy ho maina ny tendanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa hoy hianao: Tsy misy fanantenana;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsia! fa ny hafa no tiako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia hanaraka azy aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Toy ny fangaihain’ny mpangalatra, raha azo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia toy izany ny fangaihain’ny taranak’Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, izy sy ny mpanjakany sy ny lehibeny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny mpisorony ary ny mpaminaniny,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia izay manao amin’ny tapakazo hoe: Raiko hianao,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary amin’ny vato hoe: Hianao no niteraka ahy;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa niamboho Ahy izy ka tsy nanatrika Ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa amin’ny andro fahoriany kosa dia vao hanao hoe izy:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna, ka vonjeo izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa aiza ireny andriamanitrao izay nataonao ho anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka hitsangana ireny, raha mahavonjy anao amin’ny andro fahorianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa araka ny isan’ny tanànanao, ry Joda, no isan’ny andriamanitrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nahoana no mifandahatra amiko hianareo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa samy efa niodina tamiko hianareo rehetra, hoy Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Foana ny namelezako ny zanakareo, fa tsy zaka nanarina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sabatrareo nandringana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nihinana.
    marker-yv: yv-n
  - type: text
    text: ' ny mpaminaninareo,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny liona mamiravira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ry taranaka, dinihonareo ny tenin’i Jehovah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moa efa nanjary tany efitra ho an’ny Isiraely va Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na tany maizim-pito?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tany misy aizim-pito avy amin’i Jehovah.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nahoana ny oloko no manao hoe: Afaka mikarenjy izahay'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hankany aminao intsony?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Hanadino ny firàvany va ny virijina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hanadino ny fehin-kibony misy haingony va ny ampakarina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy hita isa ny andro nanadinoan’ny oloko Ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Kanto izany fandehanao hitady fitia izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka zarinao ho amin’ny ratsy ny dianao!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ka na dia ny vehivavy ratsy fanahy aza dia ampianarinao ny fombanao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary koa eo an-tsisin-dambanao no ahitana ny ran’ny olona malahelo izay tsy manan-tsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy tamin’ny tami-trano no nahazoanao azy, fa tamin’izany rehetra izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nefa hoy hianao: Tsy manan-tsiny aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa afaka amiko tokoa ny fahatezerany.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hifandahatra aminao Aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Noho ny anaovanao hoe: Tsy nanota aho.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nahoana hianao no maika hanova ny alehanao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho menatra noho ny amin’i Egypta koa hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny nahamenaranao noho ny amin’i Asyria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Izany koa dia hialanao, ka hiloloha tànana hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa nolavin’i Jehovah ny tokinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy hambinina amin’ireo hianao.
