document_id: JER.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fivadihan’ny Isiraely ampitahaina amin’ny tsi-fiovan’ny fitiavan’Andriamanitra.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah hoe: '
  '10':
  - type: text
    content: Fa mità ho any amin’ny moron-dranomasin’i Kitima, ka izahao,
  - type: text
    content: Ary maniraha ho any Kedara, ka diniho tsara,
  - type: text
    content: 'Dia aoka ho hitanareo na mba efa nisy toy izao, na tsia:'
  '11':
  - type: text
    content: Moa nisy firenena efa nanova ny andriamaniny va?
  - type: text
    content: Nefa ireny dia tsy Andriamanitra akory.
  - type: text
    content: Fa ny oloko kosa efa nanakalo ny voninahiny tamin’ireny tsy mahasoa ireny.
  '12':
  - type: text
    content: Talanjòna amin’izany, ry lanitra!
  - type: text
    content: Ary matahora, ka mangorohoroa indrindra, hianareo! hoy Jehovah;
  '13':
  - type: text
    content: 'Fa zava-dratsy roa loha no nataon’ny oloko:'
  - type: text
    content: Efa nahafoy Ahy, loharanon’aina, izy
  - type: text
    content: Ka nihady lavaka famorian-drano ho an’ny tenany, nefa lavaka mitriatriatra tsy mahatan-drano.
  '14':
  - type: text
    content: Moa mpanompo va Isiraely? Ompikely va izy?
  - type: text
    content: Koa nahoana no voababo izy?
  '15':
  - type: text
    content: Hamely azy no ampieronan’ny liona tanora sy amoahany feo
  - type: text
    content: Ka mahatonga ny taniny ho lao
  - type: text
    content: Nodorana ny tanànany, ka tsy nisy mponina.
  '16':
  - type: text
    content: Ny mponina tao Memfisa
  - type: note
    content: Heb. Nofa.
  - type: text
    content: ' sy Tapanesa aza'
  - type: text
    content: Efa nampangadihady ny tampon-dohanao.
  '17':
  - type: text
    content: Moa tsy ny nahafoizanao an’i Jehovah Andriamanitrao
  - type: text
    content: Tamin’ny andro nitondrany anao teny an-dàlana va
  - type: text
    content: No nahatonga izany taminao?
  '18':
  - type: text
    content: Koa inona no anton’ny ankanesanao amin’ny làlana mankany Egypta
  - type: text
    content: Hisotro ny ranon’i Sihora?
  - type: note
    content: Neily.
  - type: text
    content: Ary inona no anton’ny ankanesanao amin’ny làlana mankany Asyria
  - type: text
    content: Hisotro ny rano amin’ny Ony?
  - type: note
    content: Eofrata.
  '19':
  - type: text
    content: Ny haratsianao no anafaizana anao,
  - type: text
    content: Ary ny fiodinanao no ananarana anao;
  - type: text
    content: Koa fantaro sy hevero fa ratsy sady mangidy ny nahafoizanao an’i Jehovah Andriamanitrao
  - type: text
    content: Sy ny tsy nisian’ny tahotrao Ahy,
  - type: text
    content: Hoy Jehovah, Tompon’ny maro.
  '2':
  - type: text
    content: 'Mandehana, ka miantsoa eo anatrehan’i Jerosalema hoe: Izao no lazain’i Jehovah:'
  - type: text
    content: 'Tsaroako ny niraiketan’ny fonao '
  - type: text
    content: tamiko
  - type: text
    content: ', fony hianao mbola tanora,'
  - type: text
    content: Sy ny fitiavanao, fony hianao vao nampakarina,
  - type: text
    content: Dia ilay nanarahanao Ahy tany an-efitra,
  - type: text
    content: Teny amin’ny tany tsy mbola nifafy zavatra;
  '20':
  - type: text
    content: Fa hatramin’ny ela no efa nanapahanao ny zioga taminao
  - type: text
    content: Sy efa nanitosanao ny fatoranao,
  - type: text
    content: 'Ka hoy hianao: Tsy hety hanompo aho;'
  - type: text
    content: Nefa teny amin’ny havoana andrandraina
  - type: text
    content: Sy teny ambanin’ny hazo maitso rehetra
  - type: text
    content: No nandrianao nijangajanganao.
  '21':
  - type: text
    content: Fa Izaho namboly anao ho karazam-boaloboka tsara indrindra,
  - type: text
    content: Dia rantsana tsara avokoa;
  - type: text
    content: Ka ahoana no nanjary sampany ratsy hianao
  - type: text
    content: Ho voaloboka hafa?
  '22':
  - type: text
    content: Fa na dia misasa sirahazo aza hianao
  - type: text
    content: Ka maka lavenona betsaka hanadiovana anao,
  - type: text
    content: Ny helokao dia mbola voasoratra
  - type: note
    content: 'Na: maloto.'
  - type: text
    content: ' eo anatrehako ihany,'
  - type: text
    content: Hoy Jehovah Tompo.
  '23':
  - type: text
    content: 'Ahoana no anaovanao hoe: Tsy nanao izay nahaloto ahy aho,'
  - type: text
    content: Tsy nanaraka ireo Bala aho?
  - type: text
    content: Hevero ny nalehanao tany amin’ilay lohasaha,
  - type: text
    content: Fantaro izay nataonao,
  - type: text
    content: Ry ramevavavy haingam-pandeha mivezivezy amin’ny alehany,
  '24':
  - type: text
    content: Sy ry borikivavi-dia tamana any an-efitra,
  - type: text
    content: Izay manimbolo ny rivotra noho ny faniriany;
  - type: text
    content: Ary ny fahamaimaizany–iza no mahasakana azy?
  - type: text
    content: Izay rehetra mitady azy dia tsy ho sasa-poana;
  - type: text
    content: Fa amin’ny volany no hahitany azy.
  '25':
  - type: text
    content: Aza esorina ny kapa amin’ny tongotrao;
  - type: text
    content: Ary aoka tsy ho maina ny tendanao;
  - type: text
    content: 'Nefa hoy hianao: Tsy misy fanantenana;'
  - type: text
    content: Tsia! fa ny hafa no tiako,
  - type: text
    content: Ka dia hanaraka azy aho.
  '26':
  - type: text
    content: Toy ny fangaihain’ny mpangalatra, raha azo,
  - type: text
    content: Dia toy izany ny fangaihain’ny taranak’Isiraely,
  - type: text
    content: Eny, izy sy ny mpanjakany sy ny lehibeny
  - type: text
    content: Sy ny mpisorony ary ny mpaminaniny,
  '27':
  - type: text
    content: 'Dia izay manao amin’ny tapakazo hoe: Raiko hianao,'
  - type: text
    content: 'Ary amin’ny vato hoe: Hianao no niteraka ahy;'
  - type: text
    content: Fa efa niamboho Ahy izy ka tsy nanatrika Ahy;
  - type: text
    content: 'Nefa amin’ny andro fahoriany kosa dia vao hanao hoe izy:'
  - type: text
    content: Mitsangàna, ka vonjeo izahay.
  '28':
  - type: text
    content: Fa aiza ireny andriamanitrao izay nataonao ho anao?
  - type: text
    content: Aoka hitsangana ireny, raha mahavonjy anao amin’ny andro fahorianao;
  - type: text
    content: Fa araka ny isan’ny tanànanao, ry Joda, no isan’ny andriamanitrao.
  '29':
  - type: text
    content: Nahoana no mifandahatra amiko hianareo?
  - type: text
    content: Fa samy efa niodina tamiko hianareo rehetra, hoy Jehovah.
  '3':
  - type: text
    content: Masina ho an’i Jehovah ny Isiraely
  - type: text
    content: Sady santatra amin’ny vokany;
  - type: text
    content: Izay rehetra nihinana azy dia nohelohina,
  - type: text
    content: Ny loza no nanjo ireny, hoy Jehovah.
  '30':
  - type: text
    content: Foana ny namelezako ny zanakareo, fa tsy zaka nanarina izy;
  - type: text
    content: Ny sabatrareo nandringana
  - type: note
    content: Heb. nihinana.
  - type: text
    content: ' ny mpaminaninareo,'
  - type: text
    content: Toy ny liona mamiravira.
  '31':
  - type: text
    content: Ry taranaka, dinihonareo ny tenin’i Jehovah!
  - type: text
    content: Moa efa nanjary tany efitra ho an’ny Isiraely va Aho,
  - type: text
    content: Na tany maizim-pito?
  - type: note
    content: 'Na: tany misy aizim-pito avy amin’i Jehovah.'
  - type: text
    content: 'Nahoana ny oloko no manao hoe: Afaka mikarenjy izahay'
  - type: text
    content: Ka tsy hankany aminao intsony?
  '32':
  - type: text
    content: Hanadino ny firàvany va ny virijina,
  - type: text
    content: Na hanadino ny fehin-kibony misy haingony va ny ampakarina?
  - type: text
    content: Nefa tsy hita isa ny andro nanadinoan’ny oloko Ahy.
  '33':
  - type: text
    content: Kanto izany fandehanao hitady fitia izany,
  - type: text
    content: Ka zarinao ho amin’ny ratsy ny dianao!
  - type: note
    content: 'Na: Ka na dia ny vehivavy ratsy fanahy aza dia ampianarinao ny fombanao.'
  '34':
  - type: text
    content: Ary koa eo an-tsisin-dambanao no ahitana ny ran’ny olona malahelo izay tsy manan-tsiny,
  - type: text
    content: Tsy tamin’ny tami-trano no nahazoanao azy, fa tamin’izany rehetra izany.
  '35':
  - type: text
    content: 'Nefa hoy hianao: Tsy manan-tsiny aho,'
  - type: text
    content: Efa afaka amiko tokoa ny fahatezerany.
  - type: text
    content: Indro, hifandahatra aminao Aho
  - type: text
    content: 'Noho ny anaovanao hoe: Tsy nanota aho.'
  '36':
  - type: text
    content: Nahoana hianao no maika hanova ny alehanao?
  - type: text
    content: Fa ho menatra noho ny amin’i Egypta koa hianao,
  - type: text
    content: Toy ny nahamenaranao noho ny amin’i Asyria.
  '37':
  - type: text
    content: Izany koa dia hialanao, ka hiloloha tànana hianao;
  - type: text
    content: Fa nolavin’i Jehovah ny tokinao,
  - type: text
    content: Ka tsy hambinina amin’ireo hianao.
  '4':
  - type: text
    content: Mihainoa ny tenin’i Jehovah, ry taranak’i Jakoba,
  - type: text
    content: Sy hianareo, ry fokony rehetra amin’ny taranak’Isiraely!
  '5':
  - type: text
    content: 'Izao no lazain’i Jehovah:'
  - type: text
    content: Inona moa no tsy marina hitan’ny razanareo tamiko,
  - type: text
    content: No dia nanalavitra Ahy izy
  - type: text
    content: Sady nanaraka ny zava-poana, ka dia tonga zava-poana koa izy?
  '6':
  - type: text
    content: 'Ary izy tsy nanao hoe:'
  - type: text
    content: Aiza Jehovah Izay nitondra antsika niakatra avy tany amin’ny tany Egypta
  - type: text
    content: Sady nitarika antsika tany an-efitra,
  - type: text
    content: Dia ilay tany foana sady be lavaka,
  - type: text
    content: Tany karankaina sady aloky ny fahafatesana,
  - type: text
    content: Tany izay tsy mba nalehan’olona akory na nonenan’olona?
  '7':
  - type: text
    content: Ary nitondra anareo niditra ho any amin’ny tany mahavokatra Aho,
  - type: text
    content: Mba hihinananareo ny vokatra sy ny zavatra tsara eo aminy;
  - type: text
    content: Kanjo nony tafiditra hianareo, dia nolotoinareo ny taniko,
  - type: text
    content: Sady novetavetainareo ny lovako.
  '8':
  - type: text
    content: 'Ny mpisorona tsy nanao hoe: Aiza Jehovah?'
  - type: text
    content: Ary ny mpiadidy ny lalàna tsy nahalala Ahy;
  - type: text
    content: Ny mpitondra
  - type: note
    content: Heb. mpiandry ondry.
  - type: text
    content: ' koa nanota tamiko,'
  - type: text
    content: Ary ny mpaminany naminany tamin’ny anaran’i Bala
  - type: text
    content: Ka nanaraka ireny tsy mahasoa.
  '9':
  - type: text
    content: Koa mbola hifandahatra aminareo Aho, hoy Jehovah,
  - type: text
    content: Sy hiady amin’ny zafinareo koa.
