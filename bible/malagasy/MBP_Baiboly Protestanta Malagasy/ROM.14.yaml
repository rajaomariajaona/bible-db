document_id: ROM.14
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny handraisana izay malemy finoana, sy ny tokony hifandeferana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY raiso ny malemy finoana, nefa aza mandray azy hitsaranareo ny eritreriny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny anankiray mino fa mahazo mihinana ny zavatra rehetra izy, fa ny anankiray kosa malemy finoana, ka dia mihinana zava-maniry ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka ny mihinana tsy hanamavo ny tsy mihinana; ary aoka kosa ny tsy mihinana tsy hitsara ny mihinana; fa Andriamanitra no efa nandray azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza moa hianao izay mitsara ny mpanompon’ny hafa? Amin’ny tompony ihany no ijoroany na ahalavoany. Nefa hampitoerina ihany izy; fa mahay mampitoetra azy ny Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny anankiray manao ny andro anankiray ho mihoatra noho ny andro sasany; ary ny anankiray kosa manao ny andro rehetra hitovy. Aoka samy hatoky tsara ao amin’ny sainy avy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny mitandrina ny andro dia mitandrina izany ho an’ny Tompo. Ary ny mihinana dia mihinana ho an’ny Tompo, satria misaotra an’Andriamanitra izy; ary ny tsy mihinana kosa dia tsy mihinana ho an’ny Tompo, sady misaotra an’Andriamanitra koa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy misy velon-ko an’ny tenany isika, ary tsy misy maty ho an’ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha velona isika, dia velona ho an’ny Tompo; ary raha maty isika, dia maty ho an’ny Tompo; koa amin’izany, na velona na maty isika, dia an’ny Tompo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa izany no nahafatesan’i Kristy sy nahavelomany indray, mba ho Tompon’ny maty sy ny velona Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa nahoana hianao no mitsara ny rahalahinao? Ary nahoana kosa hianao no manao tsinontsinona ny rahalahinao? Fa samy hiseho eo anoloan’ny fitsaran’Andriamanitra isika rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa voasoratra hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Raha velona koa Aho, hoy Jehovah, ny lohalika rehetra handohalika amiko,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lela rehetra hidera an’Andriamanitra’’ (Isa. 45.23).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa samy hampamoahin’Andriamanitra ny amin’ny tenany avy isika rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa aza mifampitsara intsony isika; fa aleo mihevitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mitsara.
    marker-yv: yv-n
  - type: text
    text: ' izao, dia ny tsy hanisy fandavoana na fanafintohinana eo anoloan’ny rahalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mahalala sady matoky ao amin’i Jesosy Tompo aho fa tsy misy zavatra maloto ho azy; fa raha misy manao zavatra ho maloto, dia aminy ihany no maloto izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha mampalahelo ny rahalahinao ny fihinanao, dia tsy mba manaraka ny fitiavana intsony hianao. Aza ny fihinanao no animbanao azy, fa efa maty Kristy hamonjy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aoka ary tsy mba hotenenina ratsy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hanaovana blasfemia; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Mat. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ix.3.
    marker-yv: yv-n
  - type: text
    text: ' ny fahasoavana azonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny fanjakan’Andriamanitra dia tsy amin’ny fihinanana sy ny fisotroana, fa fahamarinana sy fiadanana ary fifaliana ao amin’ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa izay manompo an’i Kristy amin’izany zavatra izany no sitrak’Andriamanitra sy eken’ny olona fa tsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa dia aoka isika hiezaka hitady ny momba ny fiadanana sy ny momba ny fifampandrosoana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aza izay hanina no andravanao ny asan’Andriamanitra. Madio avokoa ny zavatra rehetra, nefa ratsy ho an’ny olona izay mihinana amin’ny fahatafintohinana. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa tsara ny tsy mihinana hena, na misotro divay, na manao izay hahatafintohina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[na hahalavo, na hahalemy].'
    marker-yv: yv-n
  - type: text
    text: ' ny rahalahinao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny finoana izay anananao dia hazòny ho anao eo anatrehan’Andriamanitra. Sambatra izay tsy manameloka ny tenany amin’izay zavatra ekeny. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa izay miahanahana dia meloka raha homana, satria tsy avy amin’ny finoana izany; fa ota izay rehetra tsy avy amin’ny finoana.
