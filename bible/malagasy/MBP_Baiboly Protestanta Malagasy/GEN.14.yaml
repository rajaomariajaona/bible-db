document_id: GEN.14,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namaboana an’i Lota sy ny namonjen’i Abrama azy, ary ny nitsenan’i Melkizedeka an’i Abrama.
  - type: text
    content: 'ARY tamin’ny andron’i Amrafela, mpanjakan’i Sinara, sy Arioka, mpanjakan’i Elasara, sy Kedorlaomera, mpanjakan’i Elama, ary Tidala, mpanjakan’ny Goima, '
  '10':
  - type: text
    content: 'Ary ny lohasahan’i Sidima, dia be lavak’asfalta, ary nandositra ny mpanjakan’i Sodoma sy ny mpanjakan’i Gomora ka latsaka tao; ary ny sisa nandositra tany an-tendrombohitra. '
  '11':
  - type: text
    content: 'Ary izy ireo namabo ny fananana rehetra tao Sodoma sy Gomora ary ny hanina rehetra, dia lasa nandeha. '
  '12':
  - type: text
    content: Ary namabo ny zana-drahalahin’i Abrama koa izy, dia Lota, mbamin’ny fananany, dia lasa nandeha; fa nonina tao Sodoma koa Lota.
  '13':
  - type: text
    content: 'Ary tonga ny anankiray izay efa nandositra ka nanambara tamin’i Abrama Hebreo, izay nonina teo an-kazo terebintan’i Mamre Amorita, rahalahin’i Eskola sy Anera; fa ireo dia olona efa vita fanekena tamin’i Abrama. '
  '14':
  - type: text
    content: 'Ary raha nahare Abrama fa lasan-ko babo ny rahalahiny, dia nitondra ny ompikeliny valo ambin’ny folo amby telon-jato izy, izay efa nahay niady, ka nanenjika hatrany Dana. '
  '15':
  - type: text
    content: 'Dia nitokotoko hamely azy nony alina izy sy ny andevolahiny; dia namely azy izy ka nanenjika azy hatrany Hoba, izay ao avaratr’i Damaskosy. '
  '16':
  - type: text
    content: Ary nampody ny fananana rehetra izy, ary Lota rahalahiny sy ny fananany dia nampodiny koa mbamin’ny vehivavy sy ny vahoaka.
  '17':
  - type: text
    content: 'Dia nivoaka ny mpanjakan’i Sodoma hitsena an’i Abrama teo an-dohasaha Save (Lohasahan’ny mpanjaka izany), rehefa niverina izy avy nandresy an’i Kedorlaomera sy ireo mpanjaka nomba azy. '
  '18':
  - type: text
    content: 'Ary Melkizedeka, mpanjakan’i Salema, nivoaka nitondra mofo sy divay; ary izy dia mpisoron’Andriamanitra Avo Indrindra. '
  '19':
  - type: text
    content: 'Dia nitso-drano azy izy ka nanao hoe:'
  - type: text
    content: Hotahin’Andriamanitra Avo Indrindra anie Abrama,
  - type: text
    content: Dia Andriamanitra Izay nahary
  - type: note
    content: 'Na: Tompon’.'
  - type: text
    content: ' ny lanitra sy ny tany;'
  '2':
  - type: text
    content: 'dia nandeha izy ireo ka nanafika an’i Bera, mpanjakan’i Sodoma, sy Birsa, mpanjakan’i Gomora, sy Sinaba, mpanjakan’i Adma, sy Semebera, mpanjakan’i Zeboima, ary ny mpanjakan’i Bela (dia Zoara izany). '
  '20':
  - type: text
    content: Ary isaorana anie Andriamanitra Avo Indrindra,
  - type: text
    content: Izay efa nanolotra ny fahavalonao teo an-tànanao.
  - type: text
    content: Dia nomen’i Abrama azy ny ampahafolon’ny zavatra rehetra.
  '21':
  - type: text
    content: 'Ary hoy ny mpanjakan’i Sodoma tamin’i Abrama: Omeo ahy ny olona, fa ny fananana ento ihany ho anao. '
  '22':
  - type: text
    content: 'Fa hoy Abrama tamin’ny mpanjakan’i Sodoma: Izaho efa nanangan-tànana tamin’i Jehovah, Andriamanitra Avo Indrindra, Izay nahary'
  - type: note
    content: 'Na: Tompon’.'
  - type: text
    content: ' ny lanitra sy ny tany, '
  '23':
  - type: text
    content: 'fa tsy handray na taretra na fehin-kapa aza amin’izay rehetra mety ho anao (fandrao hataonao hoe: Izaho no nampanan-karena an’i Abrama), '
  '24':
  - type: text
    content: afa-tsy izay efa nohanin’ny zatovo sy ny anjaran’ny olona izay niaraka tamiko, dia Anera sy Eskola ary Mamre; aoka horaisin’ireo ny anjarany.
  '3':
  - type: text
    content: 'Ary ireo rehetra ireo dia nanao fotoana ka nivory tao an-dohasahan’i Sidima (dia ny Ranomasintsira izany). '
  '4':
  - type: text
    content: Fa efa nanompo an’i Kedorlaomera roa ambin’ny folo taona ireo, fa tamin’ny taona fahatelo ambin’ny folo kosa dia niodina izy.
  '5':
  - type: text
    content: 'Ary tamin’ny taona fahefatra ambin’ny folo dia tonga Kedorlaomera sy ireo mpanjaka nomba azy ka namely ny Refaïta tany Astarta-karnaima sy ny Zozima tany Hama ary ny Emima tany Save-kiriataima '
  '6':
  - type: text
    content: 'ary ny Horita tany an-tendrombohitra Seïra hatrany El-parana, izay eo anilan’ny efitra. '
  '7':
  - type: text
    content: Dia niverina indray izy ireo ka nankany Ena-mispata (dia Kadesy izany) ka namely ny tany rehetra an’ny Amalekita sy ny Amorita koa, izay nonina tany Hazazon-tamara.
  '8':
  - type: text
    content: 'Dia nivoaka ny mpanjakan’i Sodoma sy ny mpanjakan’i Gomora sy ny mpanjakan’i Adma sy ny mpanjakan’i Zeboima ary ny mpanjakan’i Bela (dia Zoara izany) ka nilahatra hiady amin’ireo teo an-dohasahan’i Sidima, '
  '9':
  - type: text
    content: 'dia tamin’Kedorlaomera, mpanjakan’i Elama, sy Tidala, mpanjakan’ny Goima, sy Amrafela, mpanjakan’i Sinara, ary Arioka, mpanjakan’i Elasara; dia mpanjaka efatra no niady tamin’ny mpanjaka dimy. '
