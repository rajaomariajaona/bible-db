document_id: MIC.3
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nahadiso ny lehiben’ny Isiraely sy ny mpaminany, ary ny handravana an’i Jerosalema.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY hoy izaho:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Masìna hianareo, mihainoa, ry loholon’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sy hianareo mpanapaka ny taranak’Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy anjara-raharahanareo va ny hahalala ny rariny?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia hianareo izay mankahala ny tsara ka tia ny ratsy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manendaka ny hoditry ny olona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny nofony amin’ny taolany,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, hianareo izay homana ny nofon’ny oloko koa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manendaka ny hodiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mamakivaky ny taolany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mitetika azy toy ny hatao am-bilany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary toy ny hena ao anatin’ny fahandroan-kena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Amin’izany dia hitaraina amin’i Jehovah izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy hohenoiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanafina ny tavany aminy amin’izany andro izany Izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny faharatsian’ny nataon’ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain’i Jehovah ny amin’ny mpaminany izay mampaniasia ny oloko,–dia ireo izay manaikitra amin’ny nifiny, nefa mitory fiadanana, ary izay tsy manisy hanina eo am-bavany kosa dia iantsoany hanaovana ady masina:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa izany no hisian’ny alina aminareo, ka tsy hisy fahitana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny maizina aminareo, ka tsy hisy fankatovana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hilentika tsy hanazava ny mpaminany ny masoandro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho maizina aminy ny andro,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia ho menatra ny mpahita,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hangaihay ny mpanao fankatovana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hitampim-bava avokoa izy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy misy valiny avy amin’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa izaho kosa dia feno hery, dia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: amin’.
    marker-yv: yv-n
  - type: text
    text: ' ny Fanahin’i Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny rariny sy ny faherezana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanambara amin’i Jakoba ny helony
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’Isiraely ny fahotany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Masìna hianareo, mihainoa izao, Ry loholon’ny taranak’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ry mpanapaka ny taranak’Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hianareo izay manao ny rariny ho fahavetavetana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mamadika ny hitsiny rehetra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia izay manangana an’i Ziona amin’ny fandatsahan-dra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy Jerosalema amin’ny faharatsiana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny mpifehiny mitsara hahazoany kolikoly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpisorony mampianatra hahazoany karama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mpaminany manao fankatovana hahazoany vola;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nefa Jehovah mbola iankinany ihany hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy ato amintsika va Jehovah?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy loza hanjo antsika.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa dia hasaina toy ny tanimboly Ziona noho ny nataonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jerosalema ho tonga korontam-bato,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tendrombohitra misy ny trano dia ho tonga toy ny havoana mifono ala.
