document_id: MIC.3,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahadiso ny lehiben’ny Isiraely sy ny mpaminany, ary ny handravana an’i Jerosalema.
  - type: text
    content: 'ARY hoy izaho:'
  - type: text
    content: Masìna hianareo, mihainoa, ry loholon’i Jakoba,
  - type: text
    content: 'Sy hianareo mpanapaka ny taranak’Isiraely:'
  - type: text
    content: Tsy anjara-raharahanareo va ny hahalala ny rariny?
  '10':
  - type: text
    content: Dia izay manangana an’i Ziona amin’ny fandatsahan-dra
  - type: text
    content: Sy Jerosalema amin’ny faharatsiana.
  '11':
  - type: text
    content: Ny mpifehiny mitsara hahazoany kolikoly,
  - type: text
    content: Ary ny mpisorony mampianatra hahazoany karama,
  - type: text
    content: Ary ny mpaminany manao fankatovana hahazoany vola;
  - type: text
    content: 'Nefa Jehovah mbola iankinany ihany hoe:'
  - type: text
    content: Tsy ato amintsika va Jehovah?
  - type: text
    content: Tsy hisy loza hanjo antsika.
  '12':
  - type: text
    content: Koa dia hasaina toy ny tanimboly Ziona noho ny nataonareo,
  - type: text
    content: Ary Jerosalema ho tonga korontam-bato,
  - type: text
    content: Ary ny tendrombohitra misy ny trano dia ho tonga toy ny havoana mifono ala.
  '2':
  - type: text
    content: Dia hianareo izay mankahala ny tsara ka tia ny ratsy,
  - type: text
    content: Izay manendaka ny hoditry ny olona
  - type: text
    content: Sy ny nofony amin’ny taolany,
  '3':
  - type: text
    content: Eny, hianareo izay homana ny nofon’ny oloko koa
  - type: text
    content: Sady manendaka ny hodiny
  - type: text
    content: Ary mamakivaky ny taolany;
  - type: text
    content: Eny, mitetika azy toy ny hatao am-bilany izy,
  - type: text
    content: Ary toy ny hena ao anatin’ny fahandroan-kena.
  '4':
  - type: text
    content: Amin’izany dia hitaraina amin’i Jehovah izy,
  - type: text
    content: Nefa tsy hohenoiny;
  - type: text
    content: Hanafina ny tavany aminy amin’izany andro izany Izy
  - type: text
    content: Araka ny faharatsian’ny nataon’ireo.
  '5':
  - type: text
    content: 'Izao no lazain’i Jehovah ny amin’ny mpaminany izay mampaniasia ny oloko,–dia ireo izay manaikitra amin’ny nifiny, nefa mitory fiadanana, ary izay tsy manisy hanina eo am-bavany kosa dia iantsoany hanaovana ady masina:'
  '6':
  - type: text
    content: Koa izany no hisian’ny alina aminareo, ka tsy hisy fahitana,
  - type: text
    content: Ary ny maizina aminareo, ka tsy hisy fankatovana;
  - type: text
    content: Fa hilentika tsy hanazava ny mpaminany ny masoandro,
  - type: text
    content: Ary ho maizina aminy ny andro,
  '7':
  - type: text
    content: Dia ho menatra ny mpahita,
  - type: text
    content: Ary hangaihay ny mpanao fankatovana;
  - type: text
    content: Eny, hitampim-bava avokoa izy rehetra,
  - type: text
    content: Satria tsy misy valiny avy amin’Andriamanitra.
  '8':
  - type: text
    content: Fa izaho kosa dia feno hery, dia
  - type: note
    content: 'Na: amin’.'
  - type: text
    content: ' ny Fanahin’i Jehovah,'
  - type: text
    content: Mbamin’ny rariny sy ny faherezana,
  - type: text
    content: Mba hanambara amin’i Jakoba ny helony
  - type: text
    content: Sy amin’Isiraely ny fahotany.
  '9':
  - type: text
    content: Masìna hianareo, mihainoa izao, Ry loholon’ny taranak’i Jakoba,
  - type: text
    content: Sy ry mpanapaka ny taranak’Isiraely,
  - type: text
    content: Dia hianareo izay manao ny rariny ho fahavetavetana
  - type: text
    content: Sy mamadika ny hitsiny rehetra,
