document_id: JOB.31,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa nampanekeko ny masoko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa hataoko ahoana indray no fijery zazavavy?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: virijina.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka kosa ny vadiko halain’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hitoto ho an’.
      marker-yv: yv-n
    - type: text
      text: ' ny sasany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka olon-kafa no handry aminy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fahavetavetana izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, heloka tokony hotsarain’ny mpitsara;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa afo mandevona hatrany amin’ny fandringanana izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanongotra ny vokatro rehetra.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho nandà ny rariny izay an’ny ankizilahiko na ny ankizivaviko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nifamaly tamiko izy,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia inona no hataoko, raha hitsangana Andriamanitra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ahoana no havaliko Azy, raha handinika Izy?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa moa tsy Izay nanao ahy tany an-kibo ihany va no nanao azy koa?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy Iray ihany va no namorona anay tany am-bohoka?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho nandà izay nirin’ny malahelo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nahapahina ny mason’ny mpitondratena,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na nihinana ny sombin-kaniko irery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mba nihinanan’ny kamboty
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '(Fa tsy izany, fa hatry ny fony mbola tanora aho, dia notezaina teo amiko tahaka ny zanaka '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny kamboty
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary nitondra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny mpitondratena
    - type: text
      text: ' hatrany an-kibon-dreniko aho);'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho nahita olona efa ho faty noho ny tsi-fananan-damba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na malahelo tsy manan-kitafy,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha izany, dia inona no anjara avy amin’Andriamanitra any ambony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy lova avy amin’ny Tsitoha any amin’ny avo?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa tsy nankasitraka ahy ny tenany,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.20 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: valahany.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy nanafàna azy ny volon’ondriko;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho naninjitra ny tànako hampahory ny kamboty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Saingy hitako fa nisy niandany tamiko teo am-bavahady:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka ny foto-tsandriko hitsoaka hiala amin’ny rangomainako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, aoka ny sandriko ho latsaka hiala amin’ny taolam-panaviko.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mampahatahotra ahy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.23 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa hanjo ahy ny zava-mahatahotra, dia.
      marker-yv: yv-n
    - type: text
      text: ' ny loza avy amin’Andriamanitra,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mahavita na inona na inona aho noho ny fahalehibiazany.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho nanao ny volamena ho fanantenako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na nanonona ny volamena tsara hoe: Ry tokiko ô;'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny ho nifaly noho ny haben’ny fananako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy noho ny nahazoan’ny tànako harena betsaka;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho nijery ny masoandro, raha namirapiratra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ny volana, raha nandeha tamin’ny fangarangarany izy,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka voafitaka mangingina ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nanoroka ny tànako ny vavako
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Dia heloka hanamelohan’ny mpitsara koa izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho nihatsaravelatsihy tamin’Andriamanitra izay any ambony aho);
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho nifaly noho ny loza nanjo izay nankahala ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na nibitabitaka, raha nozoim-pahoriana izy
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy loza va no manjo ny ratsy fanahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy fahoriana va no mahazo ny mpanao ratsy?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Tsia, fa tsy navelako hanota akory ny vavako
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hangataka ozona hanjo azy);
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raha tàhiny ny tao an-daiko tsy nanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza moa no tsy voky tamin’ny henany?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Iza moa no tsy voky tamin’ny fianakaviany?
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vahiny aza tsy nandry teny ala-trano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa novohako ny varavarako manatrika ny làlana.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho mba nanarona ny fahadisoako tahaka an’i Adama
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.33 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tahaka ny olona.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanafina ny heloko tato an-tratrako,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nampihorohoro ny foko ny vahoaka maro be,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary natahotra aho, fandrao hamavoin’ny fokon’olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia namitsaka, fa tsy sahy nivoaka ny varavarana–
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka hisy hihaino ahy! Indro ny soniako!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enga anie ka hamaly ahy ny Tsitoha! Indro ny taratasy voasoratr’ilay manana ady amiko!
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko eny an-tsoroko tokoa izany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hafehiko amiko ho satroboninahitra.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny isan’ny diako dia hambarako aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tahaka ny fanaton’ny zanak’andriana no hanatonako Azy.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny mitaraina hiampanga ahy ny taniko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miara-mitomany ny vavasako;
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny aho nihinana ny vokatra, nefa tsy nandoa ny vidiny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na nanao izay hahafaty ny ain’ny tompony:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moa tsy Andriamanitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izy.
      marker-yv: yv-n
    - type: text
      text: ' va no mijery ny làlako'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka manisa ny diako rehetra?
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka ny tsilo no haniry hisolo ny vary tritika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny ahi-dratsy hisolo ny vary hordea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tapitra ny tenin’i Joba.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny nandeha tamin’ny fitaka aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na niezaka tamin’ny fahafetsena
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Enga anie ka holanjain’Andriamanitra eo amin’ny mizanan’ny fahamarinana aho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho fantany ny tsi-fananako tsiny);
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny nivily niala tamin’ny làlana ny diako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na nanaraka ny masoko ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Na nisy tsiny niraikitra tamin’ny tànako:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia aoka hamafy aho, fa olon-kafa no hihinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho fongotra izay amboleko.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tàhiny adala tamin’ny vadin’olona ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka namitsaka teo am-baravaran’ny namako aho,
