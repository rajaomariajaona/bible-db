document_id: JOB.31,873
type_code: plt
verses:
  '1':
  - type: text
    content: Efa nampanekeko ny masoko;
  - type: text
    content: Koa hataoko ahoana indray no fijery zazavavy?
  - type: note
    content: Heb. virijina.
  '10':
  - type: text
    content: Dia aoka kosa ny vadiko halain’
  - type: note
    content: 'Na: hitoto ho an’.'
  - type: text
    content: ' ny sasany,'
  - type: text
    content: Ary aoka olon-kafa no handry aminy.
  '11':
  - type: text
    content: Fa fahavetavetana izany,
  - type: text
    content: Eny, heloka tokony hotsarain’ny mpitsara;
  '12':
  - type: text
    content: Fa afo mandevona hatrany amin’ny fandringanana izany
  - type: text
    content: Ka hanongotra ny vokatro rehetra.
  '13':
  - type: text
    content: Raha tàhiny aho nandà ny rariny izay an’ny ankizilahiko na ny ankizivaviko,
  - type: text
    content: Raha nifamaly tamiko izy,
  '14':
  - type: text
    content: Dia inona no hataoko, raha hitsangana Andriamanitra?
  - type: text
    content: Ary ahoana no havaliko Azy, raha handinika Izy?
  '15':
  - type: text
    content: Fa moa tsy Izay nanao ahy tany an-kibo ihany va no nanao azy koa?
  - type: text
    content: Ary tsy Iray ihany va no namorona anay tany am-bohoka?
  '16':
  - type: text
    content: Raha tàhiny aho nandà izay nirin’ny malahelo
  - type: text
    content: Ka nahapahina ny mason’ny mpitondratena,
  '17':
  - type: text
    content: Na nihinana ny sombin-kaniko irery,
  - type: text
    content: Ka tsy mba nihinanan’ny kamboty
  '18':
  - type: text
    content: '(Fa tsy izany, fa hatry ny fony mbola tanora aho, dia notezaina teo amiko tahaka ny zanaka '
  - type: text
    content: ny kamboty
  - type: text
    content: ','
  - type: text
    content: 'Ary nitondra '
  - type: text
    content: ny mpitondratena
  - type: text
    content: ' hatrany an-kibon-dreniko aho);'
  '19':
  - type: text
    content: Raha tàhiny aho nahita olona efa ho faty noho ny tsi-fananan-damba.
  - type: text
    content: Na malahelo tsy manan-kitafy,
  '2':
  - type: text
    content: Fa raha izany, dia inona no anjara avy amin’Andriamanitra any ambony.
  - type: text
    content: Sy lova avy amin’ny Tsitoha any amin’ny avo?
  '20':
  - type: text
    content: Koa tsy nankasitraka ahy ny tenany,
  - type: note
    content: Heb. valahany.
  - type: text
    content: Ary tsy nanafàna azy ny volon’ondriko;
  '21':
  - type: text
    content: Raha tàhiny aho naninjitra ny tànako hampahory ny kamboty,
  - type: text
    content: 'Saingy hitako fa nisy niandany tamiko teo am-bavahady:'
  '22':
  - type: text
    content: Dia aoka ny foto-tsandriko hitsoaka hiala amin’ny rangomainako,
  - type: text
    content: Eny, aoka ny sandriko ho latsaka hiala amin’ny taolam-panaviko.
  '23':
  - type: text
    content: Fa mampahatahotra ahy
  - type: note
    content: 'Na: Fa hanjo ahy ny zava-mahatahotra, dia.'
  - type: text
    content: ' ny loza avy amin’Andriamanitra,'
  - type: text
    content: Ka tsy mahavita na inona na inona aho noho ny fahalehibiazany.
  '24':
  - type: text
    content: Raha tàhiny aho nanao ny volamena ho fanantenako,
  - type: text
    content: 'Na nanonona ny volamena tsara hoe: Ry tokiko ô;'
  '25':
  - type: text
    content: Raha tàhiny ho nifaly noho ny haben’ny fananako
  - type: text
    content: Sy noho ny nahazoan’ny tànako harena betsaka;
  '26':
  - type: text
    content: Raha tàhiny aho nijery ny masoandro, raha namirapiratra izy,
  - type: text
    content: Na ny volana, raha nandeha tamin’ny fangarangarany izy,
  '27':
  - type: text
    content: Ka voafitaka mangingina ny foko,
  - type: text
    content: Ary nanoroka ny tànako ny vavako
  '28':
  - type: text
    content: (Dia heloka hanamelohan’ny mpitsara koa izany;
  - type: text
    content: Fa ho nihatsaravelatsihy tamin’Andriamanitra izay any ambony aho);
  '29':
  - type: text
    content: Raha tàhiny aho nifaly noho ny loza nanjo izay nankahala ahy,
  - type: text
    content: Na nibitabitaka, raha nozoim-pahoriana izy
  '3':
  - type: text
    content: Moa tsy loza va no manjo ny ratsy fanahy?
  - type: text
    content: Ary tsy fahoriana va no mahazo ny mpanao ratsy?
  '30':
  - type: text
    content: (Tsia, fa tsy navelako hanota akory ny vavako
  - type: text
    content: Hangataka ozona hanjo azy);
  '31':
  - type: text
    content: 'Raha tàhiny ny tao an-daiko tsy nanao hoe:'
  - type: text
    content: Iza moa no tsy voky tamin’ny henany?
  - type: note
    content: 'Na: Iza moa no tsy voky tamin’ny fianakaviany?'
  '32':
  - type: text
    content: Ny vahiny aza tsy nandry teny ala-trano;
  - type: text
    content: Fa novohako ny varavarako manatrika ny làlana.
  '33':
  - type: text
    content: Raha tàhiny aho mba nanarona ny fahadisoako tahaka an’i Adama
  - type: note
    content: 'Na: tahaka ny olona.'
  - type: text
    content: Ka nanafina ny heloko tato an-tratrako,
  '34':
  - type: text
    content: Satria nampihorohoro ny foko ny vahoaka maro be,
  - type: text
    content: Ary natahotra aho, fandrao hamavoin’ny fokon’olona,
  - type: text
    content: Ka dia namitsaka, fa tsy sahy nivoaka ny varavarana–
  '35':
  - type: text
    content: Enga anie ka hisy hihaino ahy! Indro ny soniako!
  - type: text
    content: Enga anie ka hamaly ahy ny Tsitoha! Indro ny taratasy voasoratr’ilay manana ady amiko!
  '36':
  - type: text
    content: Hataoko eny an-tsoroko tokoa izany
  - type: text
    content: Ary hafehiko amiko ho satroboninahitra.
  '37':
  - type: text
    content: Ny isan’ny diako dia hambarako aminy,
  - type: text
    content: Ary tahaka ny fanaton’ny zanak’andriana no hanatonako Azy.
  '38':
  - type: text
    content: Raha tàhiny mitaraina hiampanga ahy ny taniko,
  - type: text
    content: Ka miara-mitomany ny vavasako;
  '39':
  - type: text
    content: Raha tàhiny aho nihinana ny vokatra, nefa tsy nandoa ny vidiny.
  - type: text
    content: 'Na nanao izay hahafaty ny ain’ny tompony:'
  '4':
  - type: text
    content: Moa tsy Andriamanitra
  - type: note
    content: Heb. Izy.
  - type: text
    content: ' va no mijery ny làlako'
  - type: text
    content: Ka manisa ny diako rehetra?
  '40':
  - type: text
    content: Dia aoka ny tsilo no haniry hisolo ny vary tritika,
  - type: text
    content: Ary ny ahi-dratsy hisolo ny vary hordea.
  - type: text
    content: Tapitra ny tenin’i Joba.
  '5':
  - type: text
    content: Raha tàhiny nandeha tamin’ny fitaka aho
  - type: text
    content: Na niezaka tamin’ny fahafetsena
  '6':
  - type: text
    content: (Enga anie ka holanjain’Andriamanitra eo amin’ny mizanan’ny fahamarinana aho!
  - type: text
    content: Dia ho fantany ny tsi-fananako tsiny);
  '7':
  - type: text
    content: Raha tàhiny nivily niala tamin’ny làlana ny diako,
  - type: text
    content: Na nanaraka ny masoko ny foko,
  - type: text
    content: 'Na nisy tsiny niraikitra tamin’ny tànako:'
  '8':
  - type: text
    content: Dia aoka hamafy aho, fa olon-kafa no hihinana,
  - type: text
    content: Ary aoka ho fongotra izay amboleko.
  '9':
  - type: text
    content: Raha tàhiny adala tamin’ny vadin’olona ny foko,
  - type: text
    content: Ka namitsaka teo am-baravaran’ny namako aho,
