document_id: JOB.31
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa nampanekeko ny masoko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa hataoko ahoana indray no fijery zazavavy?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.1 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: virijina.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa raha izany, dia inona no anjara avy amin’Andriamanitra any ambony.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy lova avy amin’ny Tsitoha any amin’ny avo?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Moa tsy loza va no manjo ny ratsy fanahy?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy fahoriana va no mahazo ny mpanao ratsy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moa tsy Andriamanitra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Izy.
    marker-yv: yv-n
  - type: text
    text: ' va no mijery ny làlako'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka manisa ny diako rehetra?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha tàhiny nandeha tamin’ny fitaka aho
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na niezaka tamin’ny fahafetsena
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: (Enga anie ka holanjain’Andriamanitra eo amin’ny mizanan’ny fahamarinana aho!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho fantany ny tsi-fananako tsiny);
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha tàhiny nivily niala tamin’ny làlana ny diako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nanaraka ny masoko ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Na nisy tsiny niraikitra tamin’ny tànako:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia aoka hamafy aho, fa olon-kafa no hihinana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho fongotra izay amboleko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha tàhiny adala tamin’ny vadin’olona ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka namitsaka teo am-baravaran’ny namako aho,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia aoka kosa ny vadiko halain’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hitoto ho an’.
    marker-yv: yv-n
  - type: text
    text: ' ny sasany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka olon-kafa no handry aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa fahavetavetana izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, heloka tokony hotsarain’ny mpitsara;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa afo mandevona hatrany amin’ny fandringanana izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanongotra ny vokatro rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha tàhiny aho nandà ny rariny izay an’ny ankizilahiko na ny ankizivaviko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha nifamaly tamiko izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia inona no hataoko, raha hitsangana Andriamanitra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ahoana no havaliko Azy, raha handinika Izy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa moa tsy Izay nanao ahy tany an-kibo ihany va no nanao azy koa?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy Iray ihany va no namorona anay tany am-bohoka?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha tàhiny aho nandà izay nirin’ny malahelo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nahapahina ny mason’ny mpitondratena,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Na nihinana ny sombin-kaniko irery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mba nihinanan’ny kamboty
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '(Fa tsy izany, fa hatry ny fony mbola tanora aho, dia notezaina teo amiko tahaka ny zanaka '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny kamboty
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary nitondra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ny mpitondratena
  - type: text
    text: ' hatrany an-kibon-dreniko aho);'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Raha tàhiny aho nahita olona efa ho faty noho ny tsi-fananan-damba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na malahelo tsy manan-kitafy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa tsy nankasitraka ahy ny tenany,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: valahany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nanafàna azy ny volon’ondriko;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Raha tàhiny aho naninjitra ny tànako hampahory ny kamboty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Saingy hitako fa nisy niandany tamiko teo am-bavahady:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia aoka ny foto-tsandriko hitsoaka hiala amin’ny rangomainako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, aoka ny sandriko ho latsaka hiala amin’ny taolam-panaviko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa mampahatahotra ahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fa hanjo ahy ny zava-mahatahotra, dia.
    marker-yv: yv-n
  - type: text
    text: ' ny loza avy amin’Andriamanitra,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mahavita na inona na inona aho noho ny fahalehibiazany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha tàhiny aho nanao ny volamena ho fanantenako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Na nanonona ny volamena tsara hoe: Ry tokiko ô;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Raha tàhiny ho nifaly noho ny haben’ny fananako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy noho ny nahazoan’ny tànako harena betsaka;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Raha tàhiny aho nijery ny masoandro, raha namirapiratra izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny volana, raha nandeha tamin’ny fangarangarany izy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ka voafitaka mangingina ny foko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nanoroka ny tànako ny vavako
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: (Dia heloka hanamelohan’ny mpitsara koa izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho nihatsaravelatsihy tamin’Andriamanitra izay any ambony aho);
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha tàhiny aho nifaly noho ny loza nanjo izay nankahala ahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na nibitabitaka, raha nozoim-pahoriana izy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: (Tsia, fa tsy navelako hanota akory ny vavako
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hangataka ozona hanjo azy);
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha tàhiny ny tao an-daiko tsy nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iza moa no tsy voky tamin’ny henany?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Iza moa no tsy voky tamin’ny fianakaviany?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny vahiny aza tsy nandry teny ala-trano;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa novohako ny varavarako manatrika ny làlana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Raha tàhiny aho mba nanarona ny fahadisoako tahaka an’i Adama
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tahaka ny olona.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nanafina ny heloko tato an-tratrako,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Satria nampihorohoro ny foko ny vahoaka maro be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary natahotra aho, fandrao hamavoin’ny fokon’olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia namitsaka, fa tsy sahy nivoaka ny varavarana–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Enga anie ka hisy hihaino ahy! Indro ny soniako!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enga anie ka hamaly ahy ny Tsitoha! Indro ny taratasy voasoratr’ilay manana ady amiko!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Hataoko eny an-tsoroko tokoa izany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hafehiko amiko ho satroboninahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ny isan’ny diako dia hambarako aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny fanaton’ny zanak’andriana no hanatonako Azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Raha tàhiny mitaraina hiampanga ahy ny taniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka miara-mitomany ny vavasako;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Raha tàhiny aho nihinana ny vokatra, nefa tsy nandoa ny vidiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Na nanao izay hahafaty ny ain’ny tompony:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia aoka ny tsilo no haniry hisolo ny vary tritika,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ahi-dratsy hisolo ny vary hordea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tapitra ny tenin’i Joba.
