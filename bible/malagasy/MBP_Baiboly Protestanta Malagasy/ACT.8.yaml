document_id: ACT.8,873
type_code: plt
verses:
  '1':
  - type: text
    content: Ary Saoly mba nankasitraka ny namonoana azy koa.
  - type: heading
    content: Ny nielezan’ny mpianatra noho ny fanenjehana, sy ny nitorian’i Filipo tany Samaria sy tamin’ilay tandapa Etiopiana.
  - type: text
    content: ARY tamin’izany andro izany dia nisy fanenjehana mafy tamin’ny fiangonana tany Jerosalema; ka dia niely teny amin’ny tany Jodia sy Samaria izy rehetra, afa-tsy ny Apostoly ihany.
  '10':
  - type: text
    content: 'ary nihaino azy ny olona rehetra, na ny kely na ny lehibe, ka nanao hoe: Ity lehilahy ity no herin’Andriamanitra, izay atao hoe hery lehibe. '
  '11':
  - type: text
    content: 'Ary nihaino azy ny olona, satria efa ela no talanjona tamin’ny odiny. '
  '12':
  - type: text
    content: 'Ary rehefa nino an’i Filipo nitory ny teny soa mahafaly ny amin’ny fanjakan’Andriamanitra sy ny anaran’i Jesosy Kristy ireo, dia natao batisa avokoa na lahy na vavy. '
  '13':
  - type: text
    content: Ary Simona koa mba nino; ary rehefa natao batisa izy, dia nanaraka an’i Filipo. Ary talanjona izy, raha nahita ny famantarana sy ny asa lehibe izay natao.
  '14':
  - type: text
    content: 'Ary nony ren’ny Apostoly tany Jerosalema fa Samaria efa nandray ny tenin’Andriamanitra, dia naniraka an’i Petera sy Jaona izy hankany aminy. '
  '15':
  - type: text
    content: 'Nony tafidina tany izy roa lahy, dia nivavaka ho an’ny olona mba handraisany ny Fanahy Masina. '
  '16':
  - type: text
    content: 'Fa tsy mbola nisy nilatsahany izy na dia iray akory aza; fa natao batisa tamin’ny anaran’i Jesosy Tompo ihany izy. '
  '17':
  - type: text
    content: Ary izy roa lahy nametra-tànana taminy, ka dia nandray ny Fanahy Masina ireo.
  '18':
  - type: text
    content: 'Ary Simona, nony nahita fa ny fametrahan’ny Apostoly tànana no nanomezana ny Fanahy Masina, dia nitondra vola homena azy '
  '19':
  - type: text
    content: 'ka nanao hoe: Omeo izany fahefana izany koa aho, mba handray ny Fanahy Masina izay olona hametrahako tànana. '
  '2':
  - type: text
    content: 'Ary mpivavaka tsara no nandevina an’i Stefana sady nisaona azy fatratra. '
  '20':
  - type: text
    content: 'Fa hoy Petera taminy: Aoka ho very mbamin’ny tenanao ny volanao, satria nataonao fa azo vidim-bola ny fanomezan’Andriamanitra. '
  '21':
  - type: text
    content: 'Tsy manana anjara na raharaha amin’izany zavatra izany hianao, satria tsy mahitsy fo eo anatrehan’Andriamanitra. '
  '22':
  - type: text
    content: 'Koa mibebaha amin’izao haratsianao izao, ka mangataha amin’ny Tompo, andrao mba havelany izay noheverin’ny fonao. '
  '23':
  - type: text
    content: 'Fa hitako fa mbola mitoetra amin’ny fangidian’afero sy ny fehin-keloka ihany hianao. '
  '24':
  - type: text
    content: 'Ary Simona namaly ka nanao hoe: Mangataha ho ahy amin’ny Tompo, mba tsy ho tonga amiko izay nolazainareo.'
  '25':
  - type: text
    content: Ary rehefa nanambara sy nitory ny tenin’ny Tompo Petera sy Jaona, dia niverina nankany Jerosalema ka nitory ny filazantsara teny amin’ny vohitra maro izay an’ny Samaritana.
  '26':
  - type: text
    content: 'Ary nisy anjelin’ny Tompo nilaza tamin’i Filipo ka nanao hoe: Mitsangàna, ka mandehana mianatsimo ho any amin’ny làlana midina avy any Jerosalema mankany Gaza; dia efitra izany. '
  '27':
  - type: text
    content: 'Dia nitsangana izy ka lasa nandeha; ary, indro, nisy lehilahy Etiopiana, tandapan’i Kandasy, mpanjakavavin’ny Etiopiana, sady mpitahiry ny hareny rehetra, ary tonga tany Jerosalema izy mba hivavaka; '
  '28':
  - type: text
    content: dia nody izy ka nipetraka teo anatin’ny kalesiny ary namaky teny tao amin’Isaia mpaminany.
  '29':
  - type: text
    content: 'Dia hoy ny Fanahy tamin’i Filipo: Andeha manatona ka mankanesa amin’io kalesy io. '
  '3':
  - type: text
    content: Fa Saoly nampahory mafy ny fiangonana, ka nidirany isan-trano sady nosarihany, na ny lehilahy na ny vehivavy, ka nataony tao an-trano-maizina.
  '30':
  - type: text
    content: 'Ary Filipo nihazakazaka nankeo aminy, dia nandre azy mamaky teny tao amin’Isaia mpaminany, ka niteny taminy hoe: Moa fantatrao va izay vakinao? '
  '31':
  - type: text
    content: 'Fa hoy izy: Hataoko ahoana no fahay, raha tsy misy mampianatra'
  - type: note
    content: Gr. mitari-dàlana.
  - type: text
    content: ' ahy? Ary izy nangataka an’i Filipo hiakatra sy hipetraka eo aminy.'
  '32':
  - type: text
    content: 'Ary izao no tenin’ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' novakiny:'
  - type: text
    content: ',,Nentina hovonoina tahaka ny ondry Izy,'
  - type: text
    content: Ary tsy niloa-bava,
  - type: text
    content: Tahaka ny zanak’ondry moana eo anoloan’ny mpanety azy;
  '33':
  - type: text
    content: Ny fietren-tena no nanaovana Azy resy lahatra;
  - type: text
    content: Ary iza no hahalaza ny amin’ny niara-belona taminy?
  - type: note
    content: 'Na: ny fianakaviany.'
  - type: text
    content: Fa ny ainy nesorina tamin’ny tany’’ (Isa. 53.7, 8).
  '34':
  - type: text
    content: 'Ary ilay tandapa namaly an’i Filipo ka nanao hoe: Masìna hianao, iza moa no lazain’ny mpaminany amin’izany? Ny tenany va, sa olon-kafa? '
  '35':
  - type: text
    content: 'Ary Filipo niloa-bava, dia nanomboka teo amin’izany Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' izany nitory an’i Jesosy taminy.'
  '36':
  - type: text
    content: 'Ary raha nandeha teny an-dàlana izy, dia tonga teo amin’izay nisy rano; ary hoy ilay tandapa: Indro rano, ka inona moa no misakana ahy tsy hatao batisa?'
  - type: note
    content: 'Amipo hoe: [37 Dia hoy Filipo: Raha mino amin’ny fonao rehetra hianao, dia azo atao ihany. Ary izy namaly ka nanao hoe: Mino aho fa Jesosy Kristy no Zanak’Andriamanitra.]'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Dia nasainy najanona ny kalesy; ary izy roa lahy, dia Filipo sy ilay tandapa, nidina ho eo amin’ny rano; dia nataony batisa izy.
  '39':
  - type: text
    content: 'Ary rehefa niakatra avy teo amin’ny rano izy roa lahy, dia nentin’ny Fanahin’ny Tompo Filipo ka tsy hitan’ilay tandapa intsony; fa nandeha tamin’ny nalehany izy sady nifaly. '
  '4':
  - type: text
    content: 'Ary izay niely dia nandeha nitory teny tontolo eny. '
  '40':
  - type: text
    content: Fa Filipo hita tany Azota, dia nitory ny filazantsara tany amin’ny tanàna rehetra izay nalehany ambara-pahatongany tany Kaisaria.
  '5':
  - type: text
    content: 'Ary Filipo nidina tany an-tanàna any Samaria ka nitory an’i Kristy tamin’ny olona tao. '
  '6':
  - type: text
    content: 'Ary ny vahoaka betsaka dia niray hevitra nihaino izay nolazain’i Filipo, raha nandre azy sy nahita ny fahagagana nataony. '
  '7':
  - type: text
    content: 'Fa ny fanahy maloto niantso tamin’ny feo mahery, dia nivoaka tamin’ny maro izay nanana azy; ary maro ny mararin’ny paralysisa sy ny mandringa no nositraniny. '
  '8':
  - type: text
    content: Dia nisy fifaliana lehibe tao amin’izany tanàna izany.
  '9':
  - type: text
    content: 'Ary nisy lehilahy anankiray rahateo teo an-tanàna, atao hoe Simona, izay nanao ody ka nahatalanjona ny olona tany Samaria sady nandoka tena nanao azy ho zavatra; '
