document_id: ACT.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary Saoly mba nankasitraka ny namonoana azy koa.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nielezan’ny mpianatra noho ny fanenjehana, sy ny nitorian’i Filipo tany Samaria sy tamin’ilay tandapa Etiopiana.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: ARY tamin’izany andro izany dia nisy fanenjehana mafy tamin’ny fiangonana tany Jerosalema; ka dia niely teny amin’ny tany Jodia sy Samaria izy rehetra, afa-tsy ny Apostoly ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary mpivavaka tsara no nandevina an’i Stefana sady nisaona azy fatratra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Saoly nampahory mafy ny fiangonana, ka nidirany isan-trano sady nosarihany, na ny lehilahy na ny vehivavy, ka nataony tao an-trano-maizina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izay niely dia nandeha nitory teny tontolo eny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Filipo nidina tany an-tanàna any Samaria ka nitory an’i Kristy tamin’ny olona tao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny vahoaka betsaka dia niray hevitra nihaino izay nolazain’i Filipo, raha nandre azy sy nahita ny fahagagana nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny fanahy maloto niantso tamin’ny feo mahery, dia nivoaka tamin’ny maro izay nanana azy; ary maro ny mararin’ny paralysisa sy ny mandringa no nositraniny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nisy fifaliana lehibe tao amin’izany tanàna izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy lehilahy anankiray rahateo teo an-tanàna, atao hoe Simona, izay nanao ody ka nahatalanjona ny olona tany Samaria sady nandoka tena nanao azy ho zavatra; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary nihaino azy ny olona rehetra, na ny kely na ny lehibe, ka nanao hoe: Ity lehilahy ity no herin’Andriamanitra, izay atao hoe hery lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nihaino azy ny olona, satria efa ela no talanjona tamin’ny odiny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa nino an’i Filipo nitory ny teny soa mahafaly ny amin’ny fanjakan’Andriamanitra sy ny anaran’i Jesosy Kristy ireo, dia natao batisa avokoa na lahy na vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Simona koa mba nino; ary rehefa natao batisa izy, dia nanaraka an’i Filipo. Ary talanjona izy, raha nahita ny famantarana sy ny asa lehibe izay natao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nony ren’ny Apostoly tany Jerosalema fa Samaria efa nandray ny tenin’Andriamanitra, dia naniraka an’i Petera sy Jaona izy hankany aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nony tafidina tany izy roa lahy, dia nivavaka ho an’ny olona mba handraisany ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa tsy mbola nisy nilatsahany izy na dia iray akory aza; fa natao batisa tamin’ny anaran’i Jesosy Tompo ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary izy roa lahy nametra-tànana taminy, ka dia nandray ny Fanahy Masina ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Simona, nony nahita fa ny fametrahan’ny Apostoly tànana no nanomezana ny Fanahy Masina, dia nitondra vola homena azy '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka nanao hoe: Omeo izany fahefana izany koa aho, mba handray ny Fanahy Masina izay olona hametrahako tànana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy Petera taminy: Aoka ho very mbamin’ny tenanao ny volanao, satria nataonao fa azo vidim-bola ny fanomezan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy manana anjara na raharaha amin’izany zavatra izany hianao, satria tsy mahitsy fo eo anatrehan’Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa mibebaha amin’izao haratsianao izao, ka mangataha amin’ny Tompo, andrao mba havelany izay noheverin’ny fonao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hitako fa mbola mitoetra amin’ny fangidian’afero sy ny fehin-keloka ihany hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Simona namaly ka nanao hoe: Mangataha ho ahy amin’ny Tompo, mba tsy ho tonga amiko izay nolazainareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary rehefa nanambara sy nitory ny tenin’ny Tompo Petera sy Jaona, dia niverina nankany Jerosalema ka nitory ny filazantsara teny amin’ny vohitra maro izay an’ny Samaritana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nisy anjelin’ny Tompo nilaza tamin’i Filipo ka nanao hoe: Mitsangàna, ka mandehana mianatsimo ho any amin’ny làlana midina avy any Jerosalema mankany Gaza; dia efitra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nitsangana izy ka lasa nandeha; ary, indro, nisy lehilahy Etiopiana, tandapan’i Kandasy, mpanjakavavin’ny Etiopiana, sady mpitahiry ny hareny rehetra, ary tonga tany Jerosalema izy mba hivavaka; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: dia nody izy ka nipetraka teo anatin’ny kalesiny ary namaky teny tao amin’Isaia mpaminany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy ny Fanahy tamin’i Filipo: Andeha manatona ka mankanesa amin’io kalesy io. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Filipo nihazakazaka nankeo aminy, dia nandre azy mamaky teny tao amin’Isaia mpaminany, ka niteny taminy hoe: Moa fantatrao va izay vakinao? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa hoy izy: Hataoko ahoana no fahay, raha tsy misy mampianatra'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.31 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mitari-dàlana.
    marker-yv: yv-n
  - type: text
    text: ' ahy? Ary izy nangataka an’i Filipo hiakatra sy hipetraka eo aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary izao no tenin’ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: ' novakiny:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Nentina hovonoina tahaka ny ondry Izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy niloa-bava,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny zanak’ondry moana eo anoloan’ny mpanety azy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny fietren-tena no nanaovana Azy resy lahatra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary iza no hahalaza ny amin’ny niara-belona taminy?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny fianakaviany.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny ainy nesorina tamin’ny tany’’ (Isa. 53.7, 8).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ilay tandapa namaly an’i Filipo ka nanao hoe: Masìna hianao, iza moa no lazain’ny mpaminany amin’izany? Ny tenany va, sa olon-kafa? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary Filipo niloa-bava, dia nanomboka teo amin’izany Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: ' izany nitory an’i Jesosy taminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary raha nandeha teny an-dàlana izy, dia tonga teo amin’izay nisy rano; ary hoy ilay tandapa: Indro rano, ka inona moa no misakana ahy tsy hatao batisa?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.36 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Amipo hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[37 Dia hoy Filipo: Raha mino amin’ny fonao rehetra hianao, dia azo atao ihany. Ary izy namaly ka nanao hoe: Mino aho fa Jesosy Kristy no Zanak’Andriamanitra.]'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Dia nasainy najanona ny kalesy; ary izy roa lahy, dia Filipo sy ilay tandapa, nidina ho eo amin’ny rano; dia nataony batisa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary rehefa niakatra avy teo amin’ny rano izy roa lahy, dia nentin’ny Fanahin’ny Tompo Filipo ka tsy hitan’ilay tandapa intsony; fa nandeha tamin’ny nalehany izy sady nifaly. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Fa Filipo hita tany Azota, dia nitory ny filazantsara tany amin’ny tanàna rehetra izay nalehany ambara-pahatongany tany Kaisaria.
