document_id: EZK.26
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’ny handravana an’i Tyro.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’ny andro voalohany amin’ny volana tamin’ny taona fahiraika ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak’olona, noho ny nandatsan’i Tyro an’i Jerosalema hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hia! sakoa izay! rava ilay vavahadin’ny firenena!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hifindra amiko kosa izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho feno aho, fa izy kosa ho foana,–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hamely anao Aho, ry Tyro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hampiakatra ny firenena maro hiady aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny fampiakatry ny ranomasina ny onjany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary horavan’ireo ny màndan’i Tyro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady harodany ny tilikambony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hofafako hiala aminy ny vovotaniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hataoko tahaka ny votalampy mangadihady izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ho famelarana harato eo amin’ny ranomasina izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Izaho no niteny izany, hoy Jehovah Tompo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho babon’ny firenena izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny zana-bohiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zanani-vavy.
    marker-yv: yv-n
  - type: text
    text: ' eny an-tanety dia hovonoina amin’ny sabatra;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatra fa Izaho no Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa izao no lazain’i Jehovah Tompo: Indro, ho entiko avy any avaratra ho any Tyro Nebokadnezara, mpanjakan’i Babylona, andrianan’ny andriana, mitondra soavaly sy kalesy sy mpitaingin-tsoavaly ary vahoaka betsaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zana-bohitrao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: zanakao-vavy.
    marker-yv: yv-n
  - type: text
    text: ' any an-tanety dia hovonoiny amin’ny sabatra; ary hanandratra tilikambo sy tovon-tany sady hanangana ampinga lehibe hamelezany anao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary hametraka lohondry vy fandravana eo akaikin’ny màndanao izy, sady horavany amin’ny fiadiany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sabany.
    marker-yv: yv-n
  - type: text
    text: ' ny tilikambonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho feno ny vovo-taniny hianao noho ny habetsahan’ny soavaliny; hihorohoro ny màndanao noho ny fikorodondrodon’ny mpitaingin-tsoavaly sy ny kodia sy ny kalesy, raha miditra eo amin’ny vavahadinao tahaka ny olona miditra amin’ny tanàna izay voabanga izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny kitron-tsoavaliny no hanitsakitsahany ny làlambenao rehetra; ny olonao dia hovonoiny amin’ny sabatra, ary ny tsangam-batonao mafy dia hianjera amin’ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hobaboiny ny harenao, horobainy ny rantonao, harodany ny màndanao, horavany ny tranonao mahafinaritra; ary ny vatonao sy ny hazonao sy ny vovokao dia hataony any amin’ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hatsahatro ny feon’ny hiranao, sady tsy ho re intsony ny fanenon’ny lokanganao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hataoko toy ny vatolampy mangadihady hianao ka ho famelarana harato sady tsy haorina intsony; fa Izaho Jehovah no niteny, hoy Jehovah Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo amin’i Tyro:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hihorohoro va ny moron-dranomasina noho ny fikotrokotroky ny firodananao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mitrona ny voatrabaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary misy vonoana eo ampovoanao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia hidina hiala amin’ny seza fiandrianany ireo andrianan’ny ranomasina rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiala akanjo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hanaisotra ny fitafiany misoratsoratra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hovotra no hitafiany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hipetraka amin’ny tany izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hangovitra isaky ny indray mipì-maso izy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho gaga anao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hanao hira fahalahelovana ny aminao izy ka hanao aminao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy! rava hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ry ilay nonenan’ny avy any an-dranomasina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ilay tanàna malaza izay nahery teo amin’ny ranomasina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izy mbamin’ny mponina ao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nampahatahotra ny mponina rehetra eo aminy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ankehitriny dia raiki-tahotra ny amoron-dranomasina amin’ny andro hianjeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, toran-kovitra ny nosy any an-dranomasina noho ny haharavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa izao no lazain’i Jehovah Tompo: Raha hataoko tanàna lao'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ireo tanànahaolo hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampiakariko aminao ny rano lalina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hosaronan’ny rano be hianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia hampidiniko hiaraka amin’izay mivarina any an-davaka hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hankany amin’ny razana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamponeniko any ambanin’ny tany hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’ny fonenana efa lao hatramin’ny ela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiaraka amin’izay mivarina any an-davaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba tsy honenana intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hasiako voninahitra eo amin’ny tanin’ny velona;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia hataoko fampitahorana hianao, ka tsy ho eo intsony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hotadiavina hianao, nefa tsy ho hita intsony mandrakizay, hoy Jehovah Tompo.
