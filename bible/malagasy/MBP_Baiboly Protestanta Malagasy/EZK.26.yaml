document_id: EZK.26,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny handravana an’i Tyro.
  - type: text
    content: 'ARY tamin’ny andro voalohany amin’ny volana tamin’ny taona fahiraika ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
  '10':
  - type: text
    content: 'Ho feno ny vovo-taniny hianao noho ny habetsahan’ny soavaliny; hihorohoro ny màndanao noho ny fikorodondrodon’ny mpitaingin-tsoavaly sy ny kodia sy ny kalesy, raha miditra eo amin’ny vavahadinao tahaka ny olona miditra amin’ny tanàna izay voabanga izy. '
  '11':
  - type: text
    content: 'Ny kitron-tsoavaliny no hanitsakitsahany ny làlambenao rehetra; ny olonao dia hovonoiny amin’ny sabatra, ary ny tsangam-batonao mafy dia hianjera amin’ny tany. '
  '12':
  - type: text
    content: 'Hobaboiny ny harenao, horobainy ny rantonao, harodany ny màndanao, horavany ny tranonao mahafinaritra; ary ny vatonao sy ny hazonao sy ny vovokao dia hataony any amin’ny rano. '
  '13':
  - type: text
    content: 'Ary hatsahatro ny feon’ny hiranao, sady tsy ho re intsony ny fanenon’ny lokanganao. '
  '14':
  - type: text
    content: Dia hataoko toy ny vatolampy mangadihady hianao ka ho famelarana harato sady tsy haorina intsony; fa Izaho Jehovah no niteny, hoy Jehovah Tompo.
  '15':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo amin’i Tyro:'
  - type: text
    content: Tsy hihorohoro va ny moron-dranomasina noho ny fikotrokotroky ny firodananao,
  - type: text
    content: Raha mitrona ny voatrabaka,
  - type: text
    content: Ary misy vonoana eo ampovoanao?
  '16':
  - type: text
    content: Dia hidina hiala amin’ny seza fiandrianany ireo andrianan’ny ranomasina rehetra
  - type: text
    content: Ka hiala akanjo
  - type: text
    content: Sy hanaisotra ny fitafiany misoratsoratra;
  - type: text
    content: Hovotra no hitafiany,
  - type: text
    content: Ka hipetraka amin’ny tany izy;
  - type: text
    content: Ary hangovitra isaky ny indray mipì-maso izy
  - type: text
    content: Ka ho gaga anao.
  '17':
  - type: text
    content: 'Ary hanao hira fahalahelovana ny aminao izy ka hanao aminao hoe:'
  - type: text
    content: Indrisy! rava hianao,
  - type: text
    content: Ry ilay nonenan’ny avy any an-dranomasina!
  - type: text
    content: Dia ilay tanàna malaza izay nahery teo amin’ny ranomasina,
  - type: text
    content: Dia izy mbamin’ny mponina ao,
  - type: text
    content: Izay nampahatahotra ny mponina rehetra eo aminy!
  '18':
  - type: text
    content: Ankehitriny dia raiki-tahotra ny amoron-dranomasina amin’ny andro hianjeranao;
  - type: text
    content: Eny, toran-kovitra ny nosy any an-dranomasina noho ny haharavanao.
  '19':
  - type: text
    content: 'Fa izao no lazain’i Jehovah Tompo: Raha hataoko tanàna lao'
  - type: text
    content: Tahaka ireo tanànahaolo hianao,
  - type: text
    content: Ary hampiakariko aminao ny rano lalina,
  - type: text
    content: Ka hosaronan’ny rano be hianao,
  '2':
  - type: text
    content: 'Ry zanak’olona, noho ny nandatsan’i Tyro an’i Jerosalema hoe:'
  - type: text
    content: Hia! sakoa izay! rava ilay vavahadin’ny firenena!
  - type: text
    content: Mba hifindra amiko kosa izao,
  - type: text
    content: Ka ho feno aho, fa izy kosa ho foana,–
  '20':
  - type: text
    content: Dia hampidiniko hiaraka amin’izay mivarina any an-davaka hianao,
  - type: text
    content: Hankany amin’ny razana,
  - type: text
    content: Ka hamponeniko any ambanin’ny tany hianao,
  - type: text
    content: Dia any amin’ny fonenana efa lao hatramin’ny ela,
  - type: text
    content: Hiaraka amin’izay mivarina any an-davaka,
  - type: text
    content: Mba tsy honenana intsony;
  - type: text
    content: Ary hasiako voninahitra eo amin’ny tanin’ny velona;
  '21':
  - type: text
    content: Dia hataoko fampitahorana hianao, ka tsy ho eo intsony;
  - type: text
    content: Eny, hotadiavina hianao, nefa tsy ho hita intsony mandrakizay, hoy Jehovah Tompo.
  '3':
  - type: text
    content: 'Dia izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Indro, hamely anao Aho, ry Tyro,
  - type: text
    content: Ka hampiakatra ny firenena maro hiady aminao,
  - type: text
    content: Tahaka ny fampiakatry ny ranomasina ny onjany.
  '4':
  - type: text
    content: Ary horavan’ireo ny màndan’i Tyro,
  - type: text
    content: Sady harodany ny tilikambony;
  - type: text
    content: Dia hofafako hiala aminy ny vovotaniny,
  - type: text
    content: Ka hataoko tahaka ny votalampy mangadihady izy.
  '5':
  - type: text
    content: Ho famelarana harato eo amin’ny ranomasina izy;
  - type: text
    content: Fa Izaho no niteny izany, hoy Jehovah Tompo,
  - type: text
    content: Ka dia ho babon’ny firenena izy.
  '6':
  - type: text
    content: Ary ny zana-bohiny
  - type: note
    content: Heb. zanani-vavy.
  - type: text
    content: ' eny an-tanety dia hovonoina amin’ny sabatra;'
  - type: text
    content: Ka dia ho fantatra fa Izaho no Jehovah.
  '7':
  - type: text
    content: 'Fa izao no lazain’i Jehovah Tompo: Indro, ho entiko avy any avaratra ho any Tyro Nebokadnezara, mpanjakan’i Babylona, andrianan’ny andriana, mitondra soavaly sy kalesy sy mpitaingin-tsoavaly ary vahoaka betsaka. '
  '8':
  - type: text
    content: Ny zana-bohitrao
  - type: note
    content: Heb. zanakao-vavy.
  - type: text
    content: ' any an-tanety dia hovonoiny amin’ny sabatra; ary hanandratra tilikambo sy tovon-tany sady hanangana ampinga lehibe hamelezany anao izy. '
  '9':
  - type: text
    content: Ary hametraka lohondry vy fandravana eo akaikin’ny màndanao izy, sady horavany amin’ny fiadiany
  - type: note
    content: Heb. sabany.
  - type: text
    content: ' ny tilikambonao. '
