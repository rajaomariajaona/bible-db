document_id: PSA.4,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fivavaky ny azom-pahoriana, sy fanantenany an’Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: RAHA miantso aho, mamalia ahy, ry Andriamanitry ny fahamarinako ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tao an-katerena aho, dia nohalalahinao toerana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mamindrà fo amiko, ka henoy ny fivavako.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ry lehibe, mandra-pahoviana no hataonareo ho henatra ny voninahitro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho tia zava-poana sy hamoron-dainga hianareo?
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Kanefa aoka ho fantatrareo fa efa navahan’i Jehovah ho Azy ny tsara fanahy;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fa efa nomen’i Jehovah voninahitra ny olo-masiny.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah hihaino, raha miantso Azy aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tezera,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mangovita.
      marker-yv: yv-n
    - type: text
      text: ' fa aza manota;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieritrereta eo am-pandrianareo, ka mangìna.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Manatera fanati-pahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary matokia an’i Jehovah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Maro no niteny hoe: Iza no haneho soa antsika?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asandrato aminay ny fahazavan’ny tavanao, Jehovah ô.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Efa nasianao fifaliana ny foko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihoatra noho ny tamin’ny taona nahabetsahan’ny variny sy ny ranom-boalobony.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: andry amin’ny fiadanana aho, ka dia hatory miaraka amin’izay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria Hianao, Jehovah ô, no mampitoetra ahy mitokana irery tsy manana ahiahy.
