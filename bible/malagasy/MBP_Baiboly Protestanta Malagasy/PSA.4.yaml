document_id: PSA.4,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavaky ny azom-pahoriana, sy fanantenany an’Andriamanitra.
  - type: text
    content: Ho an’ny mpiventy hira. Hampiarahina amin’ny valiha. Salamo nataon’i Davida.
  - type: text
    content: RAHA miantso aho, mamalia ahy, ry Andriamanitry ny fahamarinako ô;
  - type: text
    content: Raha tao an-katerena aho, dia nohalalahinao toerana;
  - type: text
    content: Mamindrà fo amiko, ka henoy ny fivavako.
  '2':
  - type: text
    content: Ry lehibe, mandra-pahoviana no hataonareo ho henatra ny voninahitro,
  - type: text
    content: Ary ho tia zava-poana sy hamoron-dainga hianareo?
  - type: text
    content: '[Sela.]'
  '3':
  - type: text
    content: Kanefa aoka ho fantatrareo fa efa navahan’i Jehovah ho Azy ny tsara fanahy;
  - type: note
    content: 'Na: fa efa nomen’i Jehovah voninahitra ny olo-masiny.'
  - type: text
    content: Jehovah hihaino, raha miantso Azy aho.
  '4':
  - type: text
    content: Tezera,
  - type: note
    content: 'Na: Mangovita.'
  - type: text
    content: ' fa aza manota;'
  - type: text
    content: Mieritrereta eo am-pandrianareo, ka mangìna.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Manatera fanati-pahamarinana,
  - type: text
    content: Ary matokia an’i Jehovah.
  '6':
  - type: text
    content: 'Maro no niteny hoe: Iza no haneho soa antsika?'
  - type: text
    content: Asandrato aminay ny fahazavan’ny tavanao, Jehovah ô.
  '7':
  - type: text
    content: Efa nasianao fifaliana ny foko
  - type: text
    content: Mihoatra noho ny tamin’ny taona nahabetsahan’ny variny sy ny ranom-boalobony.
  '8':
  - type: text
    content: andry amin’ny fiadanana aho, ka dia hatory miaraka amin’izay,
  - type: text
    content: Satria Hianao, Jehovah ô, no mampitoetra ahy mitokana irery tsy manana ahiahy.
