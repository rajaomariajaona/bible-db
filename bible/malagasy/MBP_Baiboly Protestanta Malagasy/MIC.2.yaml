document_id: MIC.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny heloky ny Isiraely, sy ny hampijaliana azy, ary ny mbola hampodiana azy indray.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: LOZAN’izay mamoron-keloka
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy misaintsain-dratsy ao am-pandriany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nony maraina ny andro, dia manatanteraka izany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria manan-kery ny tànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary mitsiriritra saha izy ka maka izany an-keriny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy trano koa ka mahalasa azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mampahory olona mbamin’ny ankohonany izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny olona mbamin’ny lovany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, mamorona loza hamelezana ity firenena ity Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay tsy hahazoanareo hanafaka ny vozonareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy handeha miandranandrana hianareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria andro mampahory izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Amin’izany andro izany no hanaovana oha-teny handatsana anareo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hitomaniana sy hidradradradrana hoe: Efa levona izao!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eny, hiteny izy hoe: Fongana tokoa isika;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ataony fanakalo zavatra ny anjaran’ny oloko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endrey! afindrany hiala amiko izany!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy zarainy ho an’ny mpiodina avy ny tanintsika!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Koa tsy hisy aminao hanenjana famolaina akory hanaovana filokana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny fiangonan’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza miteniteny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mampitete.
    marker-yv: yv-n
  - type: text
    text: ' hianareo, hoy ny fiteniteniny;'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mampitete.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy hiteniteny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mampitete.
    marker-yv: yv-n
  - type: text
    text: ' ny amin’ireto izy,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hita lany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Raha tsy miteniteny amin ireto izy, dia tsy ho afaka.
    marker-yv: yv-n
  - type: text
    text: ' ny fanalam-baraka ataony!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He! izany teny izany! ry taranak’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: He! hianao izay atao hoe taranak’i.
    marker-yv: yv-n
  - type: text
    text: ' i Jakoba,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malaky tezitra va ny Fanahin’i Jehovah?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ireto va no asa fanaony?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy mahasoa izay mandeha mahitsy va ny teniko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vao omaly no omaly no nitsanganan’ny oloko ho fahavalo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sendahanareo hiala eo amin’ny lamba ny kapôtin’izay mandeha tsy manana ahiahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izay tsy tia ady.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny vehivavy eo amin’ny oloko dia roahinareo hiala amin’ny tranony mahafinaritra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esorinareo hiala mandrakizay amin’ny zanany madinika ny voninahitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mitsangàna, ka mialà
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Fa tsy eto no fitsaharana),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria misy fahalotoana mahatonga fandringanana eto, eny, fandringanana mafy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha misy manaraka ny rivotra sy ny lainga ka mandainga hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitori-teny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hampitete.
    marker-yv: yv-n
  - type: text
    text: ' aminao ny amin’ny divay sy ny zava-mahamamo aho,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izy no ho mpitori-tenin’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mpampiteten’.
    marker-yv: yv-n
  - type: text
    text: ' ity firenena ity.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hamory anareo rehetra tokoa Aho, ry Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanangona ny sisa amin’ny Isiraely tokoa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hakambako toy ny ondry any amin’ny vala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: any Bozra.
    marker-yv: yv-n
  - type: text
    text: ' izy,–'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny ondry andiany ao amin’ny tany fiandrasana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitabataba izy noho ny hamaroan’ny olona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny mpanabanga miakatra eo alohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manabanga izy ka mandroso ho eo amin’ny vavahady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia mivoaka eo aminy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny mpanjakany mandroso eo alohany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Jehovah no mitarika azy.
