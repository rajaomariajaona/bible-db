document_id: MIC.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny heloky ny Isiraely, sy ny hampijaliana azy, ary ny mbola hampodiana azy indray.
  - type: text
    content: LOZAN’izay mamoron-keloka
  - type: text
    content: Sy misaintsain-dratsy ao am-pandriany!
  - type: text
    content: Ary nony maraina ny andro, dia manatanteraka izany izy,
  - type: text
    content: Satria manan-kery ny tànany.
  '10':
  - type: text
    content: Mitsangàna, ka mialà
  - type: text
    content: (Fa tsy eto no fitsaharana),
  - type: text
    content: Satria misy fahalotoana mahatonga fandringanana eto, eny, fandringanana mafy.
  '11':
  - type: text
    content: 'Raha misy manaraka ny rivotra sy ny lainga ka mandainga hoe:'
  - type: text
    content: Hitori-teny
  - type: note
    content: Heb. Hampitete.
  - type: text
    content: ' aminao ny amin’ny divay sy ny zava-mahamamo aho,'
  - type: text
    content: Dia izy no ho mpitori-tenin’
  - type: note
    content: Heb. mpampiteten’.
  - type: text
    content: ' ity firenena ity.'
  '12':
  - type: text
    content: Hamory anareo rehetra tokoa Aho, ry Jakoba,
  - type: text
    content: Ary hanangona ny sisa amin’ny Isiraely tokoa,
  - type: text
    content: Hakambako toy ny ondry any amin’ny vala
  - type: note
    content: 'Na: any Bozra.'
  - type: text
    content: ' izy,–'
  - type: text
    content: Toy ny ondry andiany ao amin’ny tany fiandrasana;
  - type: text
    content: Hitabataba izy noho ny hamaroan’ny olona.
  '13':
  - type: text
    content: Ny mpanabanga miakatra eo alohany,
  - type: text
    content: Manabanga izy ka mandroso ho eo amin’ny vavahady,
  - type: text
    content: Dia mivoaka eo aminy;
  - type: text
    content: Ny mpanjakany mandroso eo alohany,
  - type: text
    content: Ary Jehovah no mitarika azy.
  '2':
  - type: text
    content: Ary mitsiriritra saha izy ka maka izany an-keriny,
  - type: text
    content: Sy trano koa ka mahalasa azy;
  - type: text
    content: Ary mampahory olona mbamin’ny ankohonany izy,
  - type: text
    content: Dia ny olona mbamin’ny lovany.
  '3':
  - type: text
    content: 'Koa izao no lazain’i Jehovah:'
  - type: text
    content: Indro, mamorona loza hamelezana ity firenena ity Aho,
  - type: text
    content: Izay tsy hahazoanareo hanafaka ny vozonareo,
  - type: text
    content: Ka tsy handeha miandranandrana hianareo,
  - type: text
    content: Satria andro mampahory izany.
  '4':
  - type: text
    content: Amin’izany andro izany no hanaovana oha-teny handatsana anareo,
  - type: text
    content: 'Ka hitomaniana sy hidradradradrana hoe: Efa levona izao!'
  - type: text
    content: 'Eny, hiteny izy hoe: Fongana tokoa isika;'
  - type: text
    content: Ataony fanakalo zavatra ny anjaran’ny oloko;
  - type: text
    content: Endrey! afindrany hiala amiko izany!
  - type: text
    content: Samy zarainy ho an’ny mpiodina avy ny tanintsika!
  '5':
  - type: text
    content: Koa tsy hisy aminao hanenjana famolaina akory hanaovana filokana
  - type: text
    content: Ao amin’ny fiangonan’i Jehovah.
  '6':
  - type: text
    content: Aza miteniteny
  - type: note
    content: Heb. mampitete.
  - type: text
    content: ' hianareo, hoy ny fiteniteniny;'
  - type: note
    content: Heb. mampitete.
  - type: text
    content: Aoka tsy hiteniteny
  - type: note
    content: Heb. mampitete.
  - type: text
    content: ' ny amin’ireto izy,'
  - type: text
    content: Tsy hita lany
  - type: note
    content: 'Na: Raha tsy miteniteny amin ireto izy, dia tsy ho afaka.'
  - type: text
    content: ' ny fanalam-baraka ataony!'
  '7':
  - type: text
    content: He! izany teny izany! ry taranak’
  - type: note
    content: 'Na: He! hianao izay atao hoe taranak’i.'
  - type: text
    content: ' i Jakoba,'
  - type: text
    content: Malaky tezitra va ny Fanahin’i Jehovah?
  - type: text
    content: Ireto va no asa fanaony?
  - type: text
    content: Tsy mahasoa izay mandeha mahitsy va ny teniko?
  '8':
  - type: text
    content: Vao omaly no omaly no nitsanganan’ny oloko ho fahavalo;
  - type: text
    content: Sendahanareo hiala eo amin’ny lamba ny kapôtin’izay mandeha tsy manana ahiahy,
  - type: text
    content: Dia izay tsy tia ady.
  '9':
  - type: text
    content: Ny vehivavy eo amin’ny oloko dia roahinareo hiala amin’ny tranony mahafinaritra;
  - type: text
    content: Esorinareo hiala mandrakizay amin’ny zanany madinika ny voninahitro.
