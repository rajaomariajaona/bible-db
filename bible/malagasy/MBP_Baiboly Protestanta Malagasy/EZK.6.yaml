document_id: EZK.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny handravana ny fomban’ny sampy sy ny mpivavaka aminy.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ka dia ho fantany fa Izaho no Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy foana ny nilazako fa hahatonga izany loza izany aminy Aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izao no lazain’i Jehovah Tompo: Mameleza amin’ny tànanao hianao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary mitotoa amin’ny tongotrao, ka manaova hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! ny fahavetavetana ratsy rehetra ataon’ny taranak’Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay ho lavon’ny sabatra sy ny mosary ary ny areti-mandringana!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny lavitra ho fatin’ny areti-mandringana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny akaiky ho lavon’ny sabatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay sisa sy izay voaro dia ho faty mosary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hotanterahiko aminy ny fahatezerako.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia ho fantatrareo fa Izaho no Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa miampatrampatra eny amin’ny sampiny manodidina ny alitarany ny voavono ao aminy,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny amin’ny havoana andrandraina rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny amin’ny tendrombohitra rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy eny ambanin’ny hazo maitso rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy eny ambanin’ny terebinta misandrahaka rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia eny amin’izay efa nanaterany hanitra ankasitrahana tamin’ny sampiny rehetra;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hahinjitro aminy ny tànako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny tany any amin’ny fonenany rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hataoko lao sy foana mihoatra noho ny efitr’i Dibla;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho fantany fa Izaho no Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry zanak’olona, manandrifia ny tendrombohitry ny Isiraely, ary maminania ny hamelezana azy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka ataovy hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry tendrombohitry ny Isiraely ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mihainoa ny tenin’i Jehovah Tompo:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izao no lazain’i Jehovah Tompo amin’ny tendrombohitra sy ny havoana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny lohasahan-driaka sy ny lohasaha:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, Izaho no hahatonga sabatra hamely anareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary horavako ny fitoerana avonareo.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary hokoroina ny alitaranareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hosimbana ny tsangan-kazonareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsangam-batonareo.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny masoandro;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hataoko mitsitra eo anoloan’ny sampinareo ny fatinareo;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary ny fatin’ny Zanak’Isiraely hataoko eo anoloan’ny sampiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny taolanareo dia haeliko eny manodidina ny alitaranareo eny.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Any amin’ny fonenanareo rehetra dia ho lao ny tanàna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho rava ny fitoerana avo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ho rava sy lao koa ny alitaranareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hotapatapahina sy hofoanana ny sampinareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hokapaina ny tsangan-kazonareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsangam-batonareo.
      marker-yv: yv-n
    - type: text
      text: ' ho an’ny masoandro,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia holevonina ny asanareo.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary hisy faty hiampatrampatra eo aminareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia ho fantatrareo fa Izaho no Jehovah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nefa hamelako hisy sisa ihany hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hisy ho afaka amin’ny sabatra any amin’ny jentilisa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa voaely ho any amin’ny tany samy hafa hianareo.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary izay afaka aminareo dia hahatsiaro Ahy any amin’ny jentilisa izay hitondrana azy ho babo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rehefa voatorotoroko ny fony mijangajanga, izay efa niala tamiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny masony, izay mijangajanga manaraka ny sampiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary haharikoriko azy ny tenany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny ratsy izay efa nataony, dia ny fahavetavetany rehetra;
