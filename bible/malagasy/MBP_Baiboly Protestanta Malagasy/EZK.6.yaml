document_id: EZK.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny handravana ny fomban’ny sampy sy ny mpivavaka aminy.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: Ka dia ho fantany fa Izaho no Jehovah,
  - type: text
    content: Ary tsy foana ny nilazako fa hahatonga izany loza izany aminy Aho.
  '11':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo: Mameleza amin’ny tànanao hianao,'
  - type: text
    content: 'Ary mitotoa amin’ny tongotrao, ka manaova hoe:'
  - type: text
    content: Indrisy! ny fahavetavetana ratsy rehetra ataon’ny taranak’Isiraely,
  - type: text
    content: Izay ho lavon’ny sabatra sy ny mosary ary ny areti-mandringana!
  '12':
  - type: text
    content: Ny lavitra ho fatin’ny areti-mandringana,
  - type: text
    content: Ny akaiky ho lavon’ny sabatra,
  - type: text
    content: Ary izay sisa sy izay voaro dia ho faty mosary;
  - type: text
    content: Ka dia hotanterahiko aminy ny fahatezerako.
  '13':
  - type: text
    content: Dia ho fantatrareo fa Izaho no Jehovah,
  - type: text
    content: Rehefa miampatrampatra eny amin’ny sampiny manodidina ny alitarany ny voavono ao aminy,–
  - type: text
    content: Eny amin’ny havoana andrandraina rehetra,
  - type: text
    content: Eny amin’ny tendrombohitra rehetra
  - type: text
    content: Sy eny ambanin’ny hazo maitso rehetra
  - type: text
    content: Sy eny ambanin’ny terebinta misandrahaka rehetra,
  - type: text
    content: Dia eny amin’izay efa nanaterany hanitra ankasitrahana tamin’ny sampiny rehetra;
  '14':
  - type: text
    content: Hahinjitro aminy ny tànako,
  - type: text
    content: Ary ny tany any amin’ny fonenany rehetra
  - type: text
    content: Dia hataoko lao sy foana mihoatra noho ny efitr’i Dibla;
  - type: text
    content: Ka dia ho fantany fa Izaho no Jehovah.
  '2':
  - type: text
    content: 'Ry zanak’olona, manandrifia ny tendrombohitry ny Isiraely, ary maminania ny hamelezana azy, '
  '3':
  - type: text
    content: 'ka ataovy hoe:'
  - type: text
    content: Ry tendrombohitry ny Isiraely ô,
  - type: text
    content: 'Mihainoa ny tenin’i Jehovah Tompo:'
  - type: text
    content: Izao no lazain’i Jehovah Tompo amin’ny tendrombohitra sy ny havoana,
  - type: text
    content: 'Ary ny lohasahan-driaka sy ny lohasaha:'
  - type: text
    content: Indro, Izaho no hahatonga sabatra hamely anareo,
  - type: text
    content: Ary horavako ny fitoerana avonareo.
  '4':
  - type: text
    content: Ary hokoroina ny alitaranareo,
  - type: text
    content: Ary hosimbana ny tsangan-kazonareo
  - type: note
    content: 'Na: tsangam-batonareo.'
  - type: text
    content: ' ho an’ny masoandro;'
  - type: text
    content: Ary hataoko mitsitra eo anoloan’ny sampinareo ny fatinareo;
  '5':
  - type: text
    content: Ary ny fatin’ny Zanak’Isiraely hataoko eo anoloan’ny sampiny;
  - type: text
    content: Ary ny taolanareo dia haeliko eny manodidina ny alitaranareo eny.
  '6':
  - type: text
    content: Any amin’ny fonenanareo rehetra dia ho lao ny tanàna,
  - type: text
    content: Ary ho rava ny fitoerana avo,
  - type: text
    content: Mba ho rava sy lao koa ny alitaranareo,
  - type: text
    content: Dia hotapatapahina sy hofoanana ny sampinareo,
  - type: text
    content: Ary hokapaina ny tsangan-kazonareo
  - type: note
    content: 'Na: tsangam-batonareo.'
  - type: text
    content: ' ho an’ny masoandro,'
  - type: text
    content: Ka dia holevonina ny asanareo.
  '7':
  - type: text
    content: Ary hisy faty hiampatrampatra eo aminareo;
  - type: text
    content: Ka dia ho fantatrareo fa Izaho no Jehovah.
  '8':
  - type: text
    content: Nefa hamelako hisy sisa ihany hianareo,
  - type: text
    content: Fa hisy ho afaka amin’ny sabatra any amin’ny jentilisa,
  - type: text
    content: Rehefa voaely ho any amin’ny tany samy hafa hianareo.
  '9':
  - type: text
    content: Ary izay afaka aminareo dia hahatsiaro Ahy any amin’ny jentilisa izay hitondrana azy ho babo,
  - type: text
    content: Rehefa voatorotoroko ny fony mijangajanga, izay efa niala tamiko,
  - type: text
    content: Sy ny masony, izay mijangajanga manaraka ny sampiny,
  - type: text
    content: Ary haharikoriko azy ny tenany
  - type: text
    content: Noho ny ratsy izay efa nataony, dia ny fahavetavetany rehetra;
