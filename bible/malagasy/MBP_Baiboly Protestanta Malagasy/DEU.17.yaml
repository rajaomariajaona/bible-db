document_id: DEU.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza vonoina hatao fanatitra ho an’i Jehovah Andriamanitrao izay misy kilema maharatsy azy, na omby na ondry na osy, fa fahavetavetana eo imason’i Jehovah Andriamanitrao ny manao izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha misy hita ao aminao ao an-tanànanao, izay omen’i Jehovah Andriamanitrao anao, na lehilahy na vehivavy manao izay ratsy eo imason’i Jehovah Andriamanitrao ka mivadika ny fanekeny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka lasa mandeha manompo andriamani-kafa ary mivavaka aminy, na amin’ny masoandro, na amin’ny volana, na amin’ny kintana, izay zavatra efa nandrarako azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka voalaza aminao izany, ary efa renao, dia diniho tsara, ka indro, raha nisy marina tokoa izany zavatra izany, ka natao teo amin’ny Isiraely izany fahavetavetana izany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dia avoahy ho eo am-bavahadinao izay lehilahy na vehivavy efa nanao izany zava-dratsy izany, ka torahy vato ho faty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin’ny tenin’ny vavolombelona roa na telo no hamonoana izay tokony ho faty; fa ny tenin’ny vavolombelona iray monja dia tsy hahafaty azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny tànan’ny vavolombelona no ho voalohany hamono azy, dia vao ny tànan’ny vahoaka rehetra; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha misy teny sarotra loatra amin’ny fitsarana ka tsy efanao, na ny amin’ny mahafaty aina, na ny ady, na ny vonoana, izay iadiana ao an-tanànanao, dia miaingà hianao, ka miakara any amin’ny tany izay hofidin’i Jehovah Andriamanitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary mankanesa amin’ireo Levita mpisorona sy amin’ny anankiray izay mpitsara amin’izany andro izany, ka manontania, dia hambarany aminao ny teny fitsarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary araho ny teny izay hambarany aminao eo amin’ny tany izay hofidin’i Jehovah, ka mitandrema hanao araka izay rehetra hatorony anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Araka ny lalàna izay hatorony anao sy araka ny fitsarana izay holazainy aminao no hataonao; aza mivily miala amin’ny teny izay hambarany aminao, na ho amin’ny ankavanana, na ho amin’ny ankavia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ny olona izay miavonavona ka tsy mihaino ny mpisorona izay mitsangana hanao fanompoam-pivavahana eo anatrehan’i Jehovah Andriamanitrao, na ny mpitsara, dia aoka ho faty izany olona izany; ka dia hofongoranao tsy ho eo amin’ny Isiraely ny fanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny vahoaka rehetra handre, dia hatahotra ka tsy hiavonavona intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa tonga any amin’ny tany izay omen’i Jehovah Andriamanitrao anao hianao ka mandova azy sy monina eo ary manao hoe: Hanangana mpanjaka ho ahy aho, mba ho tahaka ny firenena rehetra izay manodidina ahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia izay hofidin’i Jehovah Andriamanitrao ihany no hatsanganao ho mpanjakanao: anankiray amin’ny rahalahinao no hatsanganao ho mpanjakanao, fa tsy mahazo mifidy olona hafa firenena izay tsy avy amin’ny rahalahinao hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa aoka tsy hanana soavaly maro izy, na hampiverina ny olona ho any Egypta mba hahazoany soavaly maro, satria hoy Jehovah taminareo: Aza miverina amin’izany làlana izany intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary aoka tsy hamporafy maro izy, fandrao hivily ny fony; ary aoka tsy hamory volafotsy na volamena be ho azy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa mipetraka eo ambonin’ny sezam-panjakany izy, dia aoka hadikany ho azy amin’ny boky izao lalàna izao ka hataony araka ilay tehirizin’ireo Levita mpisorona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ho ao aminy izany ka hovakiny amin’ny andro rehetra hiainany, mba hianarany hatahotra an’i Jehovah Andriamaniny ka hitandrina ny teny rehetra amin’izao lalàna izao sy ireto didy ireto hankatoavany azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mba tsy hiavonavonan’ny fony amin’ny rahalahiny, ary mba tsy hiviliany hiala amin’ny lalàna, na ho amin’ny ankavanana, na ho amin’ny ankavia, mba ho maro andro amin’ny fanjakany eo amin’ny Isiraely; izy sy ny taranany.
