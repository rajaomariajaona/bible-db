document_id: 1TH.5,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa ny amin’ny andro sy ny fotoana, ry rahalahy, dia tsy misy tokony hosoratako aminareo, '
  '10':
  - type: text
    content: 'Izay maty hamonjy antsika, mba hiara-belona aminy isika, na mahatsiaro na matory. '
  '11':
  - type: text
    content: Koa mifananara sy mifampahatanjaha, tahaka ny ataonareo ihany.
  - type: heading
    content: Fananarana sy fanaovam-beloma.
  '12':
  - type: text
    content: 'ARY mangataka aminareo izahay, ry rahalahy, mba hekenareo izay mikely aina eo aminareo sy mitondra anareo amin’ny Tompo ary mananatra anareo, '
  '13':
  - type: text
    content: ary mba hohajainareo indrindra amin’ny fitiavana izy noho ny asany. Mihavàna tsara.
  '14':
  - type: text
    content: 'Ary mananatra anareo izahay, ry rahalahy; anaro izay tsy mitoetra tsara; omeo toky ny malemy saina; ampaherezo ny reraka; mandefera amin’ny olona rehetra. '
  '15':
  - type: text
    content: Tandremo mba tsy hisy hamaly ratsy olona; fa miezaha mandrakariva hitady izay tsara, na amin’ny namanareo na amin’ny olona rehetra.
  '16':
  - type: text
    content: 'Mifalia mandrakariva. '
  '17':
  - type: text
    content: 'Mivavaha, ka aza mitsahatra. '
  '18':
  - type: text
    content: Misaora amin’ny zavatra rehetra; fa izany no sitrapon’Andriamanitra ao amin’i Kristy Jesosy ho anareo.
  '19':
  - type: text
    content: 'Aza mamono ny Fanahy. '
  '2':
  - type: text
    content: 'satria hianareo mahalala marimarina fa ho avy toy ny mpangalatra amin’ny alina ny andron’ny Tompo. '
  '20':
  - type: text
    content: 'Aza manao tsinontsionna ny faminaniana. '
  '21':
  - type: text
    content: 'Fantaro ny zavatra rehetra; hazòny mafy izay tsara. '
  '22':
  - type: text
    content: Fadio ny fanao ratsy rehetra.
  '23':
  - type: text
    content: 'Ary Andriamanitry ny fiadanana anie hahamasina anareo samy ho tanteraka, ka aoka harovana avokoa ny fanahinareo sy ny ainareo ary ny tenanareo ho tanteraka ka tsy hanan-tsiny amin’ny fihavian’i Jesosy Kristy Tompontsika. '
  '24':
  - type: text
    content: Mahatoky Izay miantso anareo, sady Izy ihany no hanefa izany.
  '25':
  - type: text
    content: Ry rahalahy, mivavaha ho anay.
  '26':
  - type: text
    content: 'Manaova veloma ny rahalahy rehetra amin’ny fanorohana masina. '
  '27':
  - type: text
    content: Mampianiana anareo amin’ny Tompo aho mba hovakina amin’ny rahalahy
  - type: note
    content: 'Na: [rahalahy masina].'
  - type: text
    content: ' rehetra ity epistily ity.'
  '28':
  - type: text
    content: Ho aminareo anie ny fahasoavan’i Jesosy Kristy Tompontsika.
  '3':
  - type: text
    content: 'Raha misy olona manao hoe: Miadana sy mandry fahizay, dia hanjo azy tampoka ny fandringanana, toy ny fahararian’ny vehivavy raha miteraka, ka tsy ho afa-mandositra mihitsy izy.'
  '4':
  - type: text
    content: 'Fa hianareo, ry rahalahy, tsy ao amin’ny maizina, mba hahatratra anareo toy ny mpangalatra izany andro izany. '
  '5':
  - type: text
    content: 'Fa hianareo rehetra dia zanaky ny mazava sy zanaky ny andro; tsy an’ny alina na an’ny maizina isika. '
  '6':
  - type: text
    content: Koa dia aza mba matory toy ny sasany isika, fa aoka hiambina
  - type: note
    content: Gr. hiari-tory.
  - type: text
    content: ' ka hahonon-tena. '
  '7':
  - type: text
    content: 'Fa izay matory dia matory amin’ny alina; ary izay mamo dia mamo amin’ny alina. '
  '8':
  - type: text
    content: 'Fa satria an’ny andro isika, dia aoka hahonon-tena ka hitafy ny finoana sy ny fitiavana ho fiarovan-tratra, ary ny fanantenana ny famonjena ho fiarovan-doha. '
  '9':
  - type: text
    content: 'Fa Andriamanitra tsy nanendry antsika ho amin’ny fahatezerana, fa mba hahazo famonjena amin’ny alalan’i Jesosy Kristy Tompontsika, '
