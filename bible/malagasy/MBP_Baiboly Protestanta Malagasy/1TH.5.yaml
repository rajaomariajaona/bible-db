document_id: 1TH.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ny amin’ny andro sy ny fotoana, ry rahalahy, dia tsy misy tokony hosoratako aminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'satria hianareo mahalala marimarina fa ho avy toy ny mpangalatra amin’ny alina ny andron’ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha misy olona manao hoe: Miadana sy mandry fahizay, dia hanjo azy tampoka ny fandringanana, toy ny fahararian’ny vehivavy raha miteraka, ka tsy ho afa-mandositra mihitsy izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hianareo, ry rahalahy, tsy ao amin’ny maizina, mba hahatratra anareo toy ny mpangalatra izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hianareo rehetra dia zanaky ny mazava sy zanaky ny andro; tsy an’ny alina na an’ny maizina isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa dia aza mba matory toy ny sasany isika, fa aoka hiambina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hiari-tory.
    marker-yv: yv-n
  - type: text
    text: ' ka hahonon-tena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa izay matory dia matory amin’ny alina; ary izay mamo dia mamo amin’ny alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa satria an’ny andro isika, dia aoka hahonon-tena ka hitafy ny finoana sy ny fitiavana ho fiarovan-tratra, ary ny fanantenana ny famonjena ho fiarovan-doha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa Andriamanitra tsy nanendry antsika ho amin’ny fahatezerana, fa mba hahazo famonjena amin’ny alalan’i Jesosy Kristy Tompontsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay maty hamonjy antsika, mba hiara-belona aminy isika, na mahatsiaro na matory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa mifananara sy mifampahatanjaha, tahaka ny ataonareo ihany.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana sy fanaovam-beloma.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ARY mangataka aminareo izahay, ry rahalahy, mba hekenareo izay mikely aina eo aminareo sy mitondra anareo amin’ny Tompo ary mananatra anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary mba hohajainareo indrindra amin’ny fitiavana izy noho ny asany. Mihavàna tsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary mananatra anareo izahay, ry rahalahy; anaro izay tsy mitoetra tsara; omeo toky ny malemy saina; ampaherezo ny reraka; mandefera amin’ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tandremo mba tsy hisy hamaly ratsy olona; fa miezaha mandrakariva hitady izay tsara, na amin’ny namanareo na amin’ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mifalia mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mivavaha, ka aza mitsahatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Misaora amin’ny zavatra rehetra; fa izany no sitrapon’Andriamanitra ao amin’i Kristy Jesosy ho anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aza mamono ny Fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aza manao tsinontsionna ny faminaniana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fantaro ny zavatra rehetra; hazòny mafy izay tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fadio ny fanao ratsy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Andriamanitry ny fiadanana anie hahamasina anareo samy ho tanteraka, ka aoka harovana avokoa ny fanahinareo sy ny ainareo ary ny tenanareo ho tanteraka ka tsy hanan-tsiny amin’ny fihavian’i Jesosy Kristy Tompontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mahatoky Izay miantso anareo, sady Izy ihany no hanefa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ry rahalahy, mivavaha ho anay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Manaova veloma ny rahalahy rehetra amin’ny fanorohana masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mampianiana anareo amin’ny Tompo aho mba hovakina amin’ny rahalahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[rahalahy masina].'
    marker-yv: yv-n
  - type: text
    text: ' rehetra ity epistily ity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ho aminareo anie ny fahasoavan’i Jesosy Kristy Tompontsika.
