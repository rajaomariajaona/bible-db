document_id: PSA.32,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny amin’ny famelan-keloka.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataon’i Davida. Maskila.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: SAMBATRA ny olona izay voavela ny helony sy voasarona ny fahotany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be ny fanaintainan’ny ratsy fanahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izay matoky an’i Jehovah kosa dia hohodidinin’ny famindrampo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifalia amin’i Jehovah, ary ravoravoa, hianareo olo-marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mihobia, hianareo mahitsy fo rehetra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sambatra ny olona izay tsy isain’i Jehovah heloka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy misy fitaka ny fanahiny.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha nangina aho, dia nihalany ny taolako rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fitarainako mandrakariva.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa navesatra tamiko andro aman-alina ny tànanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Niova ny fahatanjahako toy ny azon’ny fahamainana amin’ny lohataona.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahotako nambarako taminao, ary ny heloko tsy mba nafeniko.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hoy izaho: Hiaiky ny fahadisoako amin’i Jehovah aho;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Hianao dia namela ny heloky ny fahotako.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no aoka hivavahan’ny tsara fanahy rehetra aminao amin’izay andro hahitana Anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny tokoa, na dia tondraka aza ny ranobe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hahatratra azy izany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao no fiereko, miaro ahy tsy ho azon’ny fahoriana Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fihobiam-pamonjena no ahodidinao ahy.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanome saina anao sy hampianatra anao izay làlan-kalehanao Aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hitsinjo anao ny masoko ka hanolo-tsaina anao Aho.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manahaka ny soavaly na ny ampondra tsy manan-tsaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vy sy lamboridy no haingo hihazonana azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tsy mety manakaiky anao izy.
