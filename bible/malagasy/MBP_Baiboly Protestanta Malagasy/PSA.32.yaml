document_id: PSA.32,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny famelan-keloka.
  - type: text
    content: Nataon’i Davida. Maskila.
  - type: text
    content: SAMBATRA ny olona izay voavela ny helony sy voasarona ny fahotany.
  '10':
  - type: text
    content: Be ny fanaintainan’ny ratsy fanahy;
  - type: text
    content: Fa izay matoky an’i Jehovah kosa dia hohodidinin’ny famindrampo.
  '11':
  - type: text
    content: Mifalia amin’i Jehovah, ary ravoravoa, hianareo olo-marina;
  - type: text
    content: Ary mihobia, hianareo mahitsy fo rehetra.
  '2':
  - type: text
    content: Sambatra ny olona izay tsy isain’i Jehovah heloka,
  - type: text
    content: Ary tsy misy fitaka ny fanahiny.
  '3':
  - type: text
    content: Raha nangina aho, dia nihalany ny taolako rehetra
  - type: text
    content: Noho ny fitarainako mandrakariva.
  '4':
  - type: text
    content: Fa efa navesatra tamiko andro aman-alina ny tànanao;
  - type: text
    content: Niova ny fahatanjahako toy ny azon’ny fahamainana amin’ny lohataona.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Ny fahotako nambarako taminao, ary ny heloko tsy mba nafeniko.
  - type: text
    content: 'Hoy izaho: Hiaiky ny fahadisoako amin’i Jehovah aho;'
  - type: text
    content: Ary Hianao dia namela ny heloky ny fahotako.
  - type: text
    content: '[Sela.]'
  '6':
  - type: text
    content: Izany no aoka hivavahan’ny tsara fanahy rehetra aminao amin’izay andro hahitana Anao;
  - type: text
    content: Eny tokoa, na dia tondraka aza ny ranobe,
  - type: text
    content: Tsy hahatratra azy izany.
  '7':
  - type: text
    content: Hianao no fiereko, miaro ahy tsy ho azon’ny fahoriana Hianao;
  - type: text
    content: Fihobiam-pamonjena no ahodidinao ahy.
  - type: text
    content: '[Sela.]'
  '8':
  - type: text
    content: Hanome saina anao sy hampianatra anao izay làlan-kalehanao Aho;
  - type: text
    content: Hitsinjo anao ny masoko ka hanolo-tsaina anao Aho.
  '9':
  - type: text
    content: Aza manahaka ny soavaly na ny ampondra tsy manan-tsaina;
  - type: text
    content: Vy sy lamboridy no haingo hihazonana azy;
  - type: text
    content: Fa tsy mety manakaiky anao izy.
