document_id: PSA.32
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny famelan-keloka.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nataon’i Davida. Maskila.
- type: usfm
  marker: q1
  children:
  - type: text
    text: SAMBATRA ny olona izay voavela ny helony sy voasarona ny fahotany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sambatra ny olona izay tsy isain’i Jehovah heloka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy misy fitaka ny fanahiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha nangina aho, dia nihalany ny taolako rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fitarainako mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa efa navesatra tamiko andro aman-alina ny tànanao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Niova ny fahatanjahako toy ny azon’ny fahamainana amin’ny lohataona.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny fahotako nambarako taminao, ary ny heloko tsy mba nafeniko.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hoy izaho: Hiaiky ny fahadisoako amin’i Jehovah aho;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary Hianao dia namela ny heloky ny fahotako.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany no aoka hivavahan’ny tsara fanahy rehetra aminao amin’izay andro hahitana Anao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny tokoa, na dia tondraka aza ny ranobe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hahatratra azy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hianao no fiereko, miaro ahy tsy ho azon’ny fahoriana Hianao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fihobiam-pamonjena no ahodidinao ahy.
- type: usfm
  marker: qr
  children:
  - type: text
    text: '[Sela.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanome saina anao sy hampianatra anao izay làlan-kalehanao Aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hitsinjo anao ny masoko ka hanolo-tsaina anao Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza manahaka ny soavaly na ny ampondra tsy manan-tsaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vy sy lamboridy no haingo hihazonana azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy mety manakaiky anao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Be ny fanaintainan’ny ratsy fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay matoky an’i Jehovah kosa dia hohodidinin’ny famindrampo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mifalia amin’i Jehovah, ary ravoravoa, hianareo olo-marina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihobia, hianareo mahitsy fo rehetra.
