document_id: PSA.110,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny haherezan’ny Mpanjakan’i Ziona, Izay sady Mpanjaka no Mpisorona.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'IZAO no lazain’i Jehovah amin’ny Tompoko:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipetraha eo an-tànako ankavanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny tehin’ny herinao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Havoak’i Jehovah avy ao Ziona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manapaha eo amin’ny fahavalonao, Hianao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny olonao dia mazoto manolo-tena amin’ny andro anafihanao;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: andron’ny herinao.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fihaingoana masina, tahaka ny ando ateraky ny maraina ho Anao ny zatovonao.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Efa nianiana Jehovah ka tsy hanenina: Hianao no Mpisorona mandrakizay'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Araka ny fanaon’i Melkizedeka.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny Tompo eo an-kavananao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia handripaka ny mpanjaka maro amin’ny andron’ny fahatezerany.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hitsara any amin’ny jentilisa Izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampiampatrampatra faty any;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handripaka loholona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: loha.
      marker-yv: yv-n
    - type: text
      text: ' any amin’ny tany malalaka Izy.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hisotro amin’ny ony any an-dàlana Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka izany no hitrahan’ny lohany.
