document_id: 2KI.18,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niandohan’ny nanjakan’i Hezekia, sy ny naharavan’ny fanjakan’ny Isiraely.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY tamin’ny taona fahatelo nanjakan’i Hosea, zanak’i Elaha, mpanjakan’ny Isiraely, no vao nanjakan’i Hezekia, zanak’i Ahaza, mpanjakan’ny Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary nony tapitra ny telo taona, dia afak’ireo ny tanàna; dia tamin’ny taona fahenina nanjakan’i Hezekia, izay taona fahasivy nanjakan’i Hosea, mpanjakan’ny Isiraely, no nahafahana an’i Samaria.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny mpanjakan’i Asyria nitondra ny Isiraely ho babo tany Asyria ka nametraka azy tao Hala sy teo amoron’i Habora, onin’i Gozana, ary teny amin’ny tanànan’ny Mediana, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: satria tsy nihaino ny feon’i Jehovah Andriamaniny izy, fa nivadika ny fanekeny, dia izay rehetra nandidian’i Mosesy, mpanompon’i Jehovah, ka tsy nihaino na nankatò izany izy.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny niadian’i Sankeriba tamin’i Hezekia.
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ARY tamin’ny taona fahefatra ambin’ny folo nanjakan’i Hezekia mpanjaka dia niakatra Sankeriba, mpanjakan’i Asyria, hamely ny tanàna mimànda rehetra any Joda ka nahafaka azy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary Hezekia, mpanjakan’ny Joda, naniraka tany amin’ny mpanjakan’i Asyria tany Lakisy nanao hoe: Efa diso aho, ialao aho, fa izay hampitondrainao ahy dia ho entiko. Ary ny mpanjakan’i Asyria nampandoa an’i Hezekia, mpanjakan’ny Joda, talenta volafotsy telon-jato sy talenta volamena telo-polo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary Hezekia nanome azy ny volafotsy rehetra izay hita tao an-tranon’i Jehovah sy tao amin’ny rakitry ny tranon’ny mpanjaka. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tamin’izany andro izany no nanendahan’i Hezekia '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ny volamena
    - type: text
      text: ' tamin’ny varavaran’ny tempolin’i Jehovah sy tamin’ny tolana, dia ilay efa napetak’i Hezekia, mpanjakan’ny Joda; ary dia nomeny ho an’ny mpanjakan’i Asyria izany.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny mpanjakan’i Asyria naniraka an’i Tartana sy Raba-sarisa ary Rabsake mbamin’ny miaramila betsaka avy teo Lakisy hankany Jerosalema ho any amin’i Hezekia mpanjaka. Dia niakatra ireny ka tonga tany Jerosalema; ary nony tonga teo izy, dia nitsangana teo anilan’ny lakan-drano amin’ny kamory ambony, teo an-dàlambe mankamin’ny sahan’ny mpamotsy lamba. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary nony efa niantso ny mpanjaka izy, dia nivoaka ho eo aminy Eliakima, zanak’i Hilkia, izay lehiben’ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak’i Asafa, mpitadidy ny raharaham-panjakana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy Rabsake tamin’ireo: Andeha, lazao amin’i Hezekia hoe: Izao no lazain’ny mpanjaka lehibe, dia ny mpanjakan’i Asyria: Inona izato itokianao? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dimy amby roa-polo taona izy, fony vao nanjaka, ary nanjaka sivy amby roa-polo taona tany Jerosalema izy. Ary ny anaran-dreniny dia Aby, zanakavavin’i Zakaria. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hoy hianao (nefa teny foana izany): Manana saina sy hery hiady aho. Koa iza no itokianao, no miodina amiko hianao? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa, indro, hianao matoky io tehina volotara torotoro io, dia Egypta, nefa raha itehenan’olona iny, dia manindrona ny tànany miboroaka; tahaka izany Farao, mpanjakan’i Egypta, amin’izay rehetra matoky azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary raha hoy hianareo amiko: Jehovah Andriamanitray no itokianay,–moa tsy Azy va ny fitoerana avo aman-alitara izay noravan’i Hezekia, izay nilaza tamin’ny Joda sy Jerosalema hoe: Eto anoloan’ity alitara eto Jerosalema ity no hiankohofanareo? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Koa aoka hifaninana hianao sy ny tompoko, mpanjakan’i Asyria, fa homeko soavaly roa arivo hianao, raha tàhiny manana olona hitaingina azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Hataonao ahoana no fampiamboho ny komandy iray amin’ny mpanompon’ny tompoko, na dia izay kely indrindra aminy aza? Nefa matoky an’i Egypta hianao hahazoanao kalesy sy mpitaingin-tsoavaly. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Koa moa haitraitro va izao niakarako izao? Tsia, fa Jehovah no naniraka ahy handrava ity tany ity ka nanao hoe: Miakara hamely ity tany ity, ka ravao izy.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia hoy Eliakima, zanak’i Hilkia, sy Sebna ary Joa tamin-dRabsake: Masìna hianao, teny Syriana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aramiana.
      marker-yv: yv-n
    - type: text
      text: ' no ataovy aminay mpanomponao, fa fantatray ihany izany; fa aza manao teny Jiosy ho ren’ny olona eny ambonin’ny mànda. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa hoy Rabsake taminy: Moa ho amin’ny tomponao sy hianao akory va no nanirahan’ny tompoko ahy hilaza izao teny izao, fa tsy ho amin’ny olona izay mipetraka eny ambonin’ny mànda, hihinanany izay tsy fihinany'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny tainy.
      marker-yv: yv-n
    - type: text
      text: ' sy hisotroany izay tsy fisotrony'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.27 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny amaniny.
      marker-yv: yv-n
    - type: text
      text: ' miaraka aminareo?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nijoro teo Rabsake ka niantso tamin’ny feo mahery tamin’ny teny Jiosy hoe: Henoy ny tenin’ny mpanjaka lehibe, dia ny mpanjakan’i Asyria: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Izao no lazain’ny mpanjaka: Aza mety hofitahin’i Hezekia hianareo, fa tsy hahavonjy anareo amin’ny tànako izy tsy akory. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nanao izay mahitsy eo imason’i Jehovah izy tahaka izay rehetra nataon’i Davida rainy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary aza mety hampahatokin’i Hezekia an’i Jehovah hianareo amin’ny anaovany hoe: Jehovah no hamonjy antsika tokoa; ary tsy hatolotra eo an-tànan’ny mpanjakan’i Asyria tsy akory ity tanàna ity. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Aza mihaino an’i Hezekia; fa izao no lazain’ny mpanjakan’i Asyria: Manaova fanekena amiko hiadanana, ka mankanesa atỳ amiko, ary samia homana ny voalobony sy ny aviaviny, ary samia misotro ny rano avy amin’ny lavaka famorian-dranony avy hianareo, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'mandra-pihaviko hitondra anareo ho any amin’izay tany tahaka ny taninareo, dia tany misy vary sy ranom-boaloboka, tany misy mofo sy tanim-boaloboka, tany misy oliva tsara diloilo sy tantely,–mba ho velona hianareo, fa tsy ho faty; ary aza mihaino an’i Hezekia, raha izy manome vohony anareo amin’ny anaovany hoe: Jehovah no hamonjy antsika. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Moa nisy nahavonjy ny taniny tamin’ny mpanjakan’i Asyria va ireo andriamanitry ny firenena? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Aiza moa ireo andriamanitr’i Hamata sy Arpada? Ary aiza koa ireo andriamanitr’i Sefarvaima sy Hena ary Iva? Nahavonjy an’i Samaria tamin’ny tànako va ireo andriamaniny? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Iza moa amin’ny andriamanitra rehetra amin’ny tany no efa nahavonjy ny taniny tamin’ny tànako, koa aiza no hahavonjen’i Jehovah an’i Jerosalema amin’ny tànako?
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Nefa nangina ny olona, ka tsy nisy namaly azy na dia teny indraim-bava akory aza, satria ny mpanjaka efa nandidy hoe: Aza misy mamaly azy.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Ary Eliakima, zanak’i Hilkia. izay lehiben’ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak’i Asafa, mpitadidy ny raharaham-panjakana, dia niditra nankao amin’i Hezekia, sady voatriatra ny fitafiany, ary nilaza taminy ny tenin-dRabsake izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izy no nandrava ny fitoerana avo sy namakivaky ny tsangam-baton-tsampy sy nikapa ny Aserahany ary nanorotoro ny menarana varahina izay nataon’i Mosesy; fa ny Zanak’Isiraely efa nandoro ditin-kazo manitra tamin’iny hatramin’izany andro izany aza; ary ny anarany nataony hoe Nehostana.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nehostana = Ilay varahina.
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jehovah, Andriamanitry ny Isiraely, no nitokiany, ka dia tsy nisy tahaka azy tamin’izay rehetra mpanjakan’ny Joda, na ny teo aoriany, na ny teo alohany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa nifikitra tamin’i Jehovah izy ka tsy niala tamin’ny fanarahana Azy, fa nitandrina ny didy izay nandidian’i Jehovah an’i Mosesy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary Jehovah nomba azy, ka dia nambinina
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hita ho hendry.
      marker-yv: yv-n
    - type: text
      text: ' tamin’izay nalehany rehetra izy; ary niodina tamin’ny mpanjakan’i Asyria izy ka tsy nanompo azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Izy no namely ny Filistina hatrany Gaza sy ny fari-taniny, ka noravany avokoa hatramin’ny tilikambon’ny mpiambina ka hatramin’ny tanàna mimànda.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary tamin’ny taona fahefatra nanjakan’i Hezekia mpanjaka (dia ny taona fahafito nanjakan’i Hosea, zanak’i Elaha, mpanjakan’ny Isiraely, izany) no niakaran’i Salmanesera mpanjakan’i Asyria, hamely an’i Samaria sy nanaovany fahirano azy. '
