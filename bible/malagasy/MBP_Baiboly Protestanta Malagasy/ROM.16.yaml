document_id: ROM.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Famangiana sy teny farany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'INDRY, Foiby anabavintsika, diakon’ny fiangonana atỳ Kenkrea, lazaiko tsara aminareo, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba horaisinareo ao amin’ny Tompo izy, toy izay mendrika ny olona masina, ary mba hampianareo izy amin’izay raharaha ilany anareo: fa izy dia mpiahy ny maro mbamin’ny tenako koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Veloma amin’i Prisila sy Akoila, mpiara-miasa amiko ao amin’i Kristy Jesosy; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'izy mivady dia nanolotra ny tenany hamonjy ny aiko; nefa tsy izaho ihany no misaotra azy, fa ny fiangonana rehetra any amin’ny jentilisa koa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary veloma amin’ny fiangonana izay ao an-tranony. Veloma amin’i Epaineto malalako, izay voaloham-bokatr’i Asia ho an’i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Veloma amin’i Maria, izay nikely aina fatratra ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Veloma amin’i Androniko sy Jonia, havako sy namako niara-nifatotra tamiko, izay malaza eo amin’ny Apostoly sady tao amin’i Kristy talohako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Veloma amin’i Ampliato, malalako ao amin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Veloma amin’i Orbano, mpiara-miasa aminay ao amin’i Kristy, sy Staky malalako. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Veloma amin’i Apela, ilay efa voazaha toetra ao amin’i Kristy. Veloma amin’ny ankohonan’i Aristobolo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Veloma amin’i Herodiona havako. Veloma amin’ny ankohonan’i Narkisa, izay ao amin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Veloma amin’i Tryfena sy Tryfosa, izay mikely aina ao amin’ny Tompo. Veloma amin’i Persy malala, izay nikely aina fatratra tao amin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Veloma amin’i Rofosy, ilay voafidy ao amin’ny Tompo, ary amin’ny reniny sy reniko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Veloma amin’i Asynkrito, Flegona, Hermesy, Patroba, Herma, mbamin’ny rahalahy ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Veloma amin’i Filologo sy Jolia, Nerea sy ny anabaviny sy Olympa ary ny olona masina rehetra izay ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mifanaova veloma amin’ny fanorohana masina. Ny fiangonana rehetra an’i Kristy manao veloma anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa izaho mananatra anareo, ry rahalahy, mba hitandrina ny amin’izay mahatonga ny fisarahana sy ny fahatafintohinana tsy araka ny fampianarana efa nianaranareo; mialà amin’ireny olona ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izy ireny tsy mba manompo an’i Kristy Tompontsika, fa ny kibony ihany; ary teny malefaka sady tsara lahatra no amitahany ny fon’ny tsy ary saina. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa efa niely any amin’ny olona rehetra ny lazan’ny fanarahanareo. Ary faly aho noho ny aminareo; satria tiako ho hendry amin’izay tsara hianareo, ary tsy hiharo amin’izay ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa Andriamanitry ny fiadanana hanorotoro an’i Satana faingana eo ambanin’ny tongotrareo.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ho aminareo anie ny fahasoavan’i Jesosy Kristy Tompontsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manao veloma anareo Timoty, mpiara-miasa amiko, sy Losio sy Jasona ary Sosipatro havako. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izaho, Tertio, izay manoratra ity epistily ity, manao veloma anareo ao amin’ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Gaio, ilay itoeranay sy ny fiangonana rehetra, manao veloma anareo. Erasto, mpitahiry ny volam-panjakana ato an-tanàna, sy Koarto rahalahy manao veloma anareo.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Ampio hoe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[24 Ho aminareo rehetra anie ny ahasoavan’i Jesosy Kristy Tompontsika. Amena.]'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ho an’Izay mahay mampahery anareo araka ny filazantsarako sy ny fitoriana an’i Jesosy Kristy, araka ny fampisehoana ny zava-niafina, izay voàfina hatry ny fony fahagola, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'fa efa naseho ankehitriny tamin’izay soratry ny mpaminany, araka ny didin’Andriamanitra mandrakizay, ka nampahafantarina any amin’ny firenena rehetra hahatonga fanekena ny finoana,– '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ho an’Andriamanitra tokana ihany sady hendry anie ny voninahitra amin’ny alalan’i Jesosy Kristy mandrakizay mandrakizay. Amena.
