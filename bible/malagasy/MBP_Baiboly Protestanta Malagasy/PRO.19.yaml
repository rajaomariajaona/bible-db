document_id: PRO.19
type_code: plt
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsara ny malahelo mandeha tsy misy tsiny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho izay mandainga amin’ny molony sady adala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy tsara raha tsy manam-pahalalana ny fanahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay miezaka mosalahy dia ho diso làlana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fahadalan’ny olona no mahasimba ny alehany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka amin’i Jehovah no sosotra ny fony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny harena mahamaro sakaiza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny malahelo afoin’ny sakaizany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny vavolombelona mandainga tsy ho afa-tsiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mamoaka lainga tsy ho afa-miala.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maro no mandambolambo andriana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olona rehetra samy misakaiza amin’izay mpanome zavatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny malahelo dia halan’ny rahalahiny rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa mainka fa ny sakaizany tsy hanalavitra azy va?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manandrandra amin’ny teny tsy misy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manenjika teny tsy misy.
    marker-yv: yv-n
  - type: text
    text: ' izy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mihary fahendrena no tia ny tenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay mitandrina fahalalana hahita soa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny vavolombelona mandainga tsy maintsy hampijalina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny miteny lainga ho very.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny ho velona amin’ny fahafinaretana dia tsy tandrifiny ho an’ny adala,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa mainka izay hanapahan’ny mpanompo ny zanak’andriana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fahendren’ny olona manindry ny fahatezerany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary voninahitra ho azy ny tsy mamaly fahadisoana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny fahatezeran’ny mpanjaka dia toy ny fieron’ny liona tanora:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fitiany kosa toy ny ando amin’ny ahitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zanaka adala mahabe fahoriana ny rainy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ady ataon’ ny vehivavy dia toy ny rano mitete mandrakariva.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Trano sy harena no lova avy amin’ny ray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny vady hendry kosa dia avy amin’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny hakamoana mahasondrian-tory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho mosarena ny olona malaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay mitandrina ny didy mitandrina ny ainy;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny fanahiny.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa izay tsy mihevitra ny alehany dia ho faty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay miantra ny malahelo dia mampisambotra an’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay nomeny dia honerany kosa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Faizo ny zanakao, fa mbola misy azo antenaina ihany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa aza dia entim-po loatra, fandrao mahafaty azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny lozabe tsy maintsy hampijalina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia vonjenao aza izy, dia mbola hanahirana anao ihany indray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Henoy ny saina atolotra, ary raiso ny fananarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba ho hendry hianao amin’ izay hiafaranao.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.20 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: any aoriana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Maro ny hevitra ao am-pon’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ny fisainan’i Jehovah no haharitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fifaliana amin’ny olona ny manisy soa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aleo ho malahelo toy izay ho mpandainga.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny fahatahorana an’i Jehovah no ahazoana fiainana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manana izany tsy mba handry fotsy sady tsy hiharan-doza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny malaina dia mangarona ny eo an-dovia amin’ny tànany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ny mampakatra azy ho amin’ny vavany dia tsy zakany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Kapohy ny mpaniratsira, dia ho hendry ny kely saina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary anaro ny manan-tsaina, dia hahalala fahendrena izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay mitohatoha amin-drainy sy mandroaka ny reniny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia zanaka mahamenatra sy mahafa-baraka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Anaka, mitsahara tsy hihaino anatra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mampanalavitra anao ny tenin’ny fahalalana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Anaka, raha dia minia manalavitra ny tenin’ny fahalalana hianao, Dia mitsahara tsy hihaino anatra.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny vavolombelona ratsy maniratsira ny fitsarana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vavan’ny ratsy fanahy mitelina ny ratsy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Vonona ho amin’ny mpaniratsira ny fanamelohana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kapoka ho amin’ny lamosin’ny adala.
