document_id: PRO.19,873
type_code: plt
verses:
  '1':
  - type: text
    content: Tsara ny malahelo mandeha tsy misy tsiny
  - type: text
    content: Noho izay mandainga amin’ny molony sady adala.
  '10':
  - type: text
    content: Ny ho velona amin’ny fahafinaretana dia tsy tandrifiny ho an’ny adala,
  - type: text
    content: Koa mainka izay hanapahan’ny mpanompo ny zanak’andriana.
  '11':
  - type: text
    content: Ny fahendren’ny olona manindry ny fahatezerany,
  - type: text
    content: Ary voninahitra ho azy ny tsy mamaly fahadisoana.
  '12':
  - type: text
    content: 'Ny fahatezeran’ny mpanjaka dia toy ny fieron’ny liona tanora:'
  - type: text
    content: Fa ny fitiany kosa toy ny ando amin’ny ahitra.
  '13':
  - type: text
    content: Ny zanaka adala mahabe fahoriana ny rainy;
  - type: text
    content: Ary ny ady ataon’ ny vehivavy dia toy ny rano mitete mandrakariva.
  '14':
  - type: text
    content: Trano sy harena no lova avy amin’ny ray;
  - type: text
    content: Fa ny vady hendry kosa dia avy amin’i Jehovah.
  '15':
  - type: text
    content: Ny hakamoana mahasondrian-tory,
  - type: text
    content: Ary ho mosarena ny olona malaina.
  '16':
  - type: text
    content: Izay mitandrina ny didy mitandrina ny ainy;
  - type: note
    content: 'Na: ny fanahiny.'
  - type: text
    content: Fa izay tsy mihevitra ny alehany dia ho faty.
  '17':
  - type: text
    content: Izay miantra ny malahelo dia mampisambotra an’i Jehovah,
  - type: text
    content: Ary izay nomeny dia honerany kosa.
  '18':
  - type: text
    content: Faizo ny zanakao, fa mbola misy azo antenaina ihany,
  - type: text
    content: Nefa aza dia entim-po loatra, fandrao mahafaty azy.
  '19':
  - type: text
    content: Ny lozabe tsy maintsy hampijalina;
  - type: text
    content: Ary na dia vonjenao aza izy, dia mbola hanahirana anao ihany indray.
  '2':
  - type: text
    content: Tsy tsara raha tsy manam-pahalalana ny fanahy;
  - type: text
    content: Ary izay miezaka mosalahy dia ho diso làlana.
  '20':
  - type: text
    content: Henoy ny saina atolotra, ary raiso ny fananarana,
  - type: text
    content: Mba ho hendry hianao amin’ izay hiafaranao.
  - type: note
    content: 'Na: any aoriana.'
  '21':
  - type: text
    content: Maro ny hevitra ao am-pon’ny olona;
  - type: text
    content: Fa ny fisainan’i Jehovah no haharitra.
  '22':
  - type: text
    content: Fifaliana amin’ny olona ny manisy soa;
  - type: text
    content: Ary aleo ho malahelo toy izay ho mpandainga.
  '23':
  - type: text
    content: Ny fahatahorana an’i Jehovah no ahazoana fiainana;
  - type: text
    content: Izay manana izany tsy mba handry fotsy sady tsy hiharan-doza.
  '24':
  - type: text
    content: Ny malaina dia mangarona ny eo an-dovia amin’ny tànany,
  - type: text
    content: Nefa ny mampakatra azy ho amin’ny vavany dia tsy zakany.
  '25':
  - type: text
    content: Kapohy ny mpaniratsira, dia ho hendry ny kely saina;
  - type: text
    content: Ary anaro ny manan-tsaina, dia hahalala fahendrena izy.
  '26':
  - type: text
    content: Izay mitohatoha amin-drainy sy mandroaka ny reniny
  - type: text
    content: Dia zanaka mahamenatra sy mahafa-baraka.
  '27':
  - type: text
    content: Anaka, mitsahara tsy hihaino anatra
  - type: text
    content: Izay mampanalavitra anao ny tenin’ny fahalalana.
  - type: note
    content: 'Na: Anaka, raha dia minia manalavitra ny tenin’ny fahalalana hianao, Dia mitsahara tsy hihaino anatra.'
  '28':
  - type: text
    content: Ny vavolombelona ratsy maniratsira ny fitsarana;
  - type: text
    content: Ary ny vavan’ny ratsy fanahy mitelina ny ratsy.
  '29':
  - type: text
    content: Vonona ho amin’ny mpaniratsira ny fanamelohana,
  - type: text
    content: Ary ny kapoka ho amin’ny lamosin’ny adala.
  '3':
  - type: text
    content: Ny fahadalan’ny olona no mahasimba ny alehany,
  - type: text
    content: Ka amin’i Jehovah no sosotra ny fony.
  '4':
  - type: text
    content: Ny harena mahamaro sakaiza;
  - type: text
    content: Fa ny malahelo afoin’ny sakaizany.
  '5':
  - type: text
    content: Ny vavolombelona mandainga tsy ho afa-tsiny,
  - type: text
    content: Ary izay mamoaka lainga tsy ho afa-miala.
  '6':
  - type: text
    content: Maro no mandambolambo andriana;
  - type: text
    content: Ary ny olona rehetra samy misakaiza amin’izay mpanome zavatra.
  '7':
  - type: text
    content: Ny malahelo dia halan’ny rahalahiny rehetra,
  - type: text
    content: Koa mainka fa ny sakaizany tsy hanalavitra azy va?
  - type: text
    content: Manandrandra amin’ny teny tsy misy
  - type: note
    content: Heb. manenjika teny tsy misy.
  - type: text
    content: ' izy.'
  '8':
  - type: text
    content: Izay mihary fahendrena no tia ny tenany,
  - type: text
    content: Ary izay mitandrina fahalalana hahita soa.
  '9':
  - type: text
    content: Ny vavolombelona mandainga tsy maintsy hampijalina,
  - type: text
    content: Ary ny miteny lainga ho very.
