document_id: LUK.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitetezan’i Jesosy ny vohitra maro tany Galilia, sy ny nanompoan’ny vehivavy sasany Azy.
  - type: text
    content: 'ARY taoriana kelin’izany, dia lasa Jesosy nitety ny tanàna sy ny vohitra nitory ny filazantsaran’ny fanjakan’Andrimanitra; ary ny roa ambin’ny folo lahy nanaraka Azy '
  '10':
  - type: text
    content: 'Dia hoy Izy: Hianareo no navela'
  - type: note
    content: Gr. nomena.
  - type: text
    content: ' hahalala ny zava-miafina ny amin’ny fanjakan’Andriamanitra; fa amin’ny olon-kafa dia fanoharana no atao, mba hijery izy, fa tsy hahita, ary hahare, fa tsy hahafantatra (Isa. 6.9). '
  '11':
  - type: text
    content: 'Koa izao no hevitry ny fanoharana: Ny voa dia ny tenin’Andriamanitra. '
  '12':
  - type: text
    content: 'Ireo teny amoron-dàlana dia izay mandre, nefa avy ny devoly ka manaisotra ny teny ao am-pony, fandrao hino izy ka hovonjena. '
  '13':
  - type: text
    content: 'Ireo teny ambonin’ny vatolampy dia izay mandre sady mandray ny teny amin’ny hafaliana; nefa tsy manam-paka ireo, fa mino vetivety ihany, koa amin’izay andro isehoan’ny fakam-panahy dia mihemotra izy. '
  '14':
  - type: text
    content: 'Ireo teny amin’ny tsilo dia izay mandre, fa nony mandeha izy, dia voagejan’ny fiahiahiana sy ny harena ary ny fahafinaretan’izao fiainana izao ka tsy mahavanom-boa. '
  '15':
  - type: text
    content: Fa ireo teny amin’ny tany tsara kosa dia izay mandre ny teny amin’ny fo sady marina no tsara, dia mitana azy ka mamoa amin’ny faharetana.
  '16':
  - type: text
    content: Tsy misy olona mampirehitra jiro ka manarona azy, na nametraka azy ao ambanin’ny farafara; fa ataony eo amin’ny fanaovan-jiro izy, mba ho hitan’izay miditra ny mazava.
  '17':
  - type: text
    content: 'Fa tsy misy takona izay tsy ho hita, na miafina izay tsy ho fantatra sy tsy haseho. '
  '18':
  - type: text
    content: Koa tandremo ny fihainonareo; fa izay manana dia homena; ary izay tsy manana kosa, na dia izay ataony ho ananany aza dia halaina aminy.
  - type: heading
    content: Ny nitadiavan’ny renin’i Jesosy sy ny rahalahiny Azy.
  - type: heading
    content: Mat. 12.46-50; Mar. 3.31-35.
  '19':
  - type: text
    content: 'ARY ny renin’i Jesosy sy ny rahalahiny nanatona Azy, fa tsy nahazo nihaona taminy, satria nifanety ny vahoaka. '
  '2':
  - type: text
    content: 'mbamin’ny vehivavy sasany, izay nositraniny tamin’ny fanahy ratsy sy ny aretina, dia Maria atao hoe Magdalena, izay efa nivoahan’ny demonia fito, '
  '20':
  - type: text
    content: 'Ary nisy nilaza taminy hoe: Ny reninao sy ny rahalahinao mijanona ato ala-trano ta-hahita Anao. '
  '21':
  - type: text
    content: 'Fa namaly Izy ka nanao taminy hoe: Ny reniko sy ny rahalahiko dia ireto izay mandre ny tenin’Andriamanitra ka mankatò azy.'
  - type: heading
    content: Ny nampitsaharan’i Jesosy ny tafio-drivotra.
  - type: heading
    content: Mat. 8.23-27; Mar. 4.35-41.
  '22':
  - type: text
    content: 'ARY tamin’ny andro anankiray dia niondrana an-tsambokely Jesosy sy ny mpianany; ary hoy Izy taminy: Andeha isika hankeny am-pitan’ny farihy; dia lasa izy. '
  '23':
  - type: text
    content: 'Ary nony nandeha ny sambokely, dia azon’ny torimaso Jesosy; ary nisy tafio-drivotra nidina tamin’ny farihy, ka nila ho feno '
  - type: text
    content: rano ny sambo,
  - type: text
    content: ' ary saiky nahita loza izy ireo. '
  '24':
  - type: text
    content: 'Ary nanatona izy, dia namoha Azy ka nanao hoe: Tompoko, Tompoko, maty izahay! Dia nitsangana Izy, ka noteneniny mafy ny rivotra sy ny onjan-drano. Ary dia nitsahatra izany, ka tonga tony tsara ny andro. '
  '25':
  - type: text
    content: 'Ary hoy Izy taminy: Aiza ny finoanareo? Ary natahotra izy ireo sady gaga ka niresaka hoe: Iza moa Ity, no mandidy ny rivotra sy ny rano Izy, ka manaiky Azy izany!'
  - type: heading
    content: Ny namoahan’i Jesosy demonia maro tamin’ny lehilahy anankiray tany amin’ny tanin’ny Gerasena.
  - type: heading
    content: Mat. 8.28-34; Mar. 5.1-20.
  '26':
  - type: text
    content: DIA nitody tany amin’ny tanin’ny Gerasena
  - type: note
    content: 'Na: [Gadarena].'
  - type: text
    content: ' izay tandrifin’i Galilia izy. '
  '27':
  - type: text
    content: 'Ary raha niala nankeny an-tanety Jesosy, dia nifanena taminy ny lehilahy anankiray avy tao an-tanàna, izay efa nanana demonia, ary efa ela izy no tsy nitafy lamba sady tsy nitoetra tao an-trano, fa teny amin’ny fasana. '
  '28':
  - type: text
    content: 'Fa nony nahita an’i Jesosy izy, dia niantso mafy sady niankohoka teo anatrehany ka niteny tamin’ny feo mahery hoe: Moa mifaninona akory izaho sy Hianao, ry Jesosy, Zanak’Andriamanitra Avo Indrindra ô? masìna Hianao, aza mampijaly ahy. '
  '29':
  - type: text
    content: Fa Izy nandidy ny fanahy maloto hivoaka tamin-dralehilahy. Fa efa nahazo azy ela izany; ary efa nafatotra tamin’ny gadra, na ny tànany, na ny tongony, ka nambenana izy; nefa notapahiny ny fatorana, ka dia nentin’ny demonia niriotra nankany an-efitra izy.
  '3':
  - type: text
    content: sy Johana, vadin’i Koza, mpitandrina ny fananan’i Heroda, ary Sosana mbamin’ny maro hafa koa, izay nanompo azy
  - type: note
    content: 'Na: [Azy].'
  - type: text
    content: ' tamin’ny fananany.'
  - type: heading
    content: Fanoharana nataon’i Jesosy.
  - type: heading
    content: Mat. 13.1-23; Mar. 4.1-25.
  '30':
  - type: text
    content: 'Ary Jesosy nanontany azy ka nanao hoe: Iza moa no anaranao? Dia hoy izy: Legiona; fa demonia maro no efa niditra tao anatiny. '
  '31':
  - type: text
    content: 'Ary nifona taminy izy mba tsy handidiany azy hankany amin’ny lavaka tsy hita noanoa. '
  '32':
  - type: text
    content: 'Ary nisy kisoa maro andiany iray nandrasana teny an-tendrombohitra, ary ny demonia nifona taminy mba havelany hiditra ao anatiny. Dia nekeny. '
  '33':
  - type: text
    content: Ary ny demonia, rehefa nivoaka tamin-dralehilahy, dia niditra tao anatin’ny kisoa; ary ireo kisoa andiany ireo nitratrevatreva tamin’ny hantsana ho any amin’ny farihy, ka dia maty
  - type: note
    content: Gr. kenda.
  - type: text
    content: ' tany. '
  '34':
  - type: text
    content: 'Ary nony hitan’ny mpiandry izany natao izany, dia nandositra izy ka nilaza izany tao an-tanàna sy tany an-tsaha. '
  '35':
  - type: text
    content: 'Dia nivoaka ny olona mba hizaha izany natao izany; ary tonga tany amin’i Jesosy izy, dia nahita an-dralehilahy, izay efa nivoahan’ny demonia, fa indro izy nipetraka teo anilan’ny tongotr’i Jesosy nitafy lamba sady ary saina; dia raiki-tahotra ireo. '
  '36':
  - type: text
    content: 'Ary izay efa nahita dia nanambara tamin’ny olona ny namonjena an’ilay demoniaka. '
  '37':
  - type: text
    content: Ary ny olona rehetra tany amin’ny tanin’ny Gerasena
  - type: note
    content: 'Na: [Gadarena].'
  - type: text
    content: ' manodidina dia nangataka an’i Jesosy hiala aminy, satria raiki-tahotra indrindra izy; ary Jesosy niondrana an-tsambokely ka niverina.'
  '38':
  - type: text
    content: 'Ary ny lehilahy izay efa nivoahan’ny demonia dia nangataka mba hitoetra ao aminy; nefa nampodin’i Jesosy izy ka nataony hoe: '
  '39':
  - type: text
    content: Modia ihany any an-tranonao, ka ambarao ny zavatra lehibe nataon’Andriamanitra taminao. Dia nandeha izy ka nitory eran’ny tanàna izay zavatra lehibe nataon’i Jesosy taminy.
  - type: heading
    content: Ny nahasitranan’i Jesosy ilay vehivavy narary roa ambin’ny folo taona, sy ny nananganany ny zanakavavin’i Jairo tamin’ny maty.
  - type: heading
    content: Mat. 9.18-26; Mar. 5.21-43.
  '4':
  - type: text
    content: 'ARY nisy vahoaka betsaka niangona, ka nanatona Azy ny olona avy tamin’ny isan-tanàna, dia nanao fanoharana hoe Izy: '
  '40':
  - type: text
    content: ARY nony tafaverina Jesosy, dia nandray Azy tsara ny vahoaka, fa niandry Azy avokoa izy rehetra.
  '41':
  - type: text
    content: 'Ary, indro, dia tonga ny lehilahy atao hoe Jaïro, mpanapaka ny synagoga; dia niankohoka tamin’ny tongotr’i Jesosy izy ka niangavy taminy hiditra ao an-tranony. '
  '42':
  - type: text
    content: Fa nanana zanakavavy tokana tokony ho roa ambin’ny folo taona izy, ary efa ho faty razazavavy. Ary raha nandeha Jesosy, dia nanety làlana Azy ny vahoaka.
  '43':
  - type: text
    content: Ary nisy vehivavy anankiray narary
  - type: note
    content: Gr. narary nandeha ra.
  - type: text
    content: ' roa ambin’ny folo taona, izay efa nandany ny fananany rehetra tamin’ny mpanao fanafody, nefa tsy nisy nahasitrana azy akory. '
  '44':
  - type: text
    content: Dia nankao ivohon’i Jesosy ravehivavy ka nanendry ny somotraviavin-dambany, ary niaraka tamin’izay dia nijanona ny aretiny.
  - type: note
    content: Gr. fandehanan’ny rany.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Ary hoy Jesosy: Iza moa no nanendry Ahy? Ary rehefa samy nanda izy rehetra, dia hoy Petera sy ny namany: Tompoko, ny vahoaka betsaka mifanety ka manizina Anao. '
  '46':
  - type: text
    content: 'Fa hoy Jesosy: Nisy olona nanendry Ahy; fa fantatro fa nisy hery nivoaka avy tamiko. '
  '47':
  - type: text
    content: 'Ary rehefa hitan-dravehivavy fa tsy takona Azy izy, dia nangovitra izy ka nankeo aminy sady niankohoka teo anatrehany, dia nanambara teo anatrehan’ny vahoaka rehetra izay anton’ny nanendreny Azy sy izay nahasitranany niaraka tamin’izay. '
  '48':
  - type: text
    content: 'Ary hoy Jesosy taminy: Anaka, ny finoanao no nahasitrana'
  - type: note
    content: Gr. nahavonjy.
  - type: text
    content: ' anao; mandehana soa aman-tsara.'
  '49':
  - type: text
    content: 'Ary raha mbola niteny Jesosy, dia tonga ny anankiray avy tany amin’ilay mpanapaka ny synagoga ka nanao hoe: Maty ny zanakaovavy; aza manahirana ny Mpampianatra. '
  '5':
  - type: text
    content: 'Nivoaka ny mpamafy hamafy ny voa; ary raha namafy izy, ny sasany dia voafafy teny amoron-dàlana ka voahitsakitsaka, ary dia lanin’ny voro-manidina. '
  '50':
  - type: text
    content: 'Fa Jesosy, raha nahare, dia namaly azy ka nanao hoe: Aza matahotra; minoa fotsiny ihany, dia ho velona'
  - type: note
    content: Gr. voavonjy.
  - type: text
    content: ' izy. '
  '51':
  - type: text
    content: 'Ary raha tonga tao an-trano Izy, dia tsy nisy olona navelany hiara-miditra taminy, afa-tsy Petera sy Jaona ary Jakoba mbamin’ny ray aman-drenin-drazazavavy. '
  '52':
  - type: text
    content: 'Ary ny olona rehetra nitomany sy nisaona azy; fa Jesosy nanao hoe: Aza mitomany; fa tsy maty izy, fa matory. '
  '53':
  - type: text
    content: 'Dia nihomehy Azy fatratra ny olona, satria fantany fa efa maty razazavavy. '
  '54':
  - type: text
    content: 'Ary Jesosy dia nandray ny tànany ka niantso hoe: Ry zazavavy, miarena. '
  '55':
  - type: text
    content: 'Dia nody indray ny ainy, ka niarina niaraka tamin’izay izy; ary nasainy nomena hanina izy. '
  '56':
  - type: text
    content: Ary dia talanjona ny ray aman-dreniny; fa Jesosy nandrara azy tsy hilazalaza amin’olona ny zavatra efa natao.
  '6':
  - type: text
    content: 'Ary ny sasany dia voafafy teny ambonin’ny vatolampy; ary raha vao naniry izy, dia nalazo; satria tsy nisy mandomando. '
  '7':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin’ny tsilo; ary ny tsilo niara-naniry taminy, dia nangeja azy. '
  '8':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin’ny tany tsara, dia naniry ka namoa zato heny. Ary rehefa nilaza izany Izy, dia niantso hoe: Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.'
  '9':
  - type: text
    content: 'Ary ny mpianany nanontany Azy ny amin’izay hevitr’izany fanoharana izany. '
