document_id: LAM.5
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainana amin’Andriamanitra sy fangatahana ny hodian’ny soa nananana fahiny.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: JEHOVAH ô, tsarovy izay nanjo anay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hevero sy diniho ny latsa mahazo anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny lovanay dia afindra ho an’ny vahiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tranonay ho an’ny hafa firenena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa kamboty izahay ka tsy manan-dray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny reninay dia toy ny mpitondra-tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Na dia ny loharanonay aza dia andoavanay vola vao azonay isotroana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny kitay hazonay dia vidinay vao azo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rambondrambonan’ny mpanenjika amin’ny hatokay izahay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reraka izahay, fa tsy manam-pitsaharana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanolo-tànana tamin’ny Egyptiana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny Asyriana izahay mba ho voky hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nanota ny razanay–tsy etỳ intsony izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izahay no mivesatra ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andevo no manapaka anay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy manafaka anay amin’ny tànany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny sabatra mamely any an-efitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia manao vy very ny ainay izahay vao mahazo hanina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahamay toy ny fatana ny hoditray
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny fahamaimaizana avy amin’ny mosary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nosavihina ny vehivavy tao Ziona
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny virijina tao amin’ny tanànan’ny Joda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahantona tamin’ny tànany ny lehibe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny antitra tsy mba nohajaina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zatovo nitondra ny fikosoham-bary;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny ankizy madinika nivembena nitondra ny hazo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny loholona tsy misy eo am-bavahady,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny zatovo tsy mitendry zava-maneno intsony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny hafalian’ny fonay dia nitsahatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny dihinay niova ho fitomaniana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa afaka ny satroboninahitra tamin’ny lohanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Idiran-doza izahay, fa efa nanota!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary noho izany dia reraka ny fonay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, noho izany dia maizina ny masonay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Noho ny amin’ny tendrombohitra Ziona, izay efa lao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady ikarenjen’ny amboahaolo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jehovah ô, Hianao no mipetraka mandrakizay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ny sezafiandriananao no maharitra hatramin’ny taranaka fara mandimby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ahoana no dia anadinoanao anay mandrakizay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ahafoizanao anay andro lava?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Jehovah ô, ampivereno aminao izahay, mba hiverenanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Havaozy ho toy ny fahiny ny andronay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa dia nandà anay tokoa va Hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tezitra aminay indrindra?
