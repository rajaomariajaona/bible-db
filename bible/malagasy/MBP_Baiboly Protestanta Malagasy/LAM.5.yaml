document_id: LAM.5,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana amin’Andriamanitra sy fangatahana ny hodian’ny soa nananana fahiny.
  - type: text
    content: JEHOVAH ô, tsarovy izay nanjo anay;
  - type: text
    content: Hevero sy diniho ny latsa mahazo anay.
  '10':
  - type: text
    content: Mahamay toy ny fatana ny hoditray
  - type: text
    content: Noho ny fahamaimaizana avy amin’ny mosary.
  '11':
  - type: text
    content: Nosavihina ny vehivavy tao Ziona
  - type: text
    content: Ary ny virijina tao amin’ny tanànan’ny Joda.
  '12':
  - type: text
    content: Nahantona tamin’ny tànany ny lehibe;
  - type: text
    content: Ary ny antitra tsy mba nohajaina.
  '13':
  - type: text
    content: Ny zatovo nitondra ny fikosoham-bary;
  - type: text
    content: Ary ny ankizy madinika nivembena nitondra ny hazo.
  '14':
  - type: text
    content: Ny loholona tsy misy eo am-bavahady,
  - type: text
    content: Ary ny zatovo tsy mitendry zava-maneno intsony.
  '15':
  - type: text
    content: Ny hafalian’ny fonay dia nitsahatra,
  - type: text
    content: Ary ny dihinay niova ho fitomaniana.
  '16':
  - type: text
    content: Efa afaka ny satroboninahitra tamin’ny lohanay;
  - type: text
    content: Idiran-doza izahay, fa efa nanota!
  '17':
  - type: text
    content: Ary noho izany dia reraka ny fonay,
  - type: text
    content: Eny, noho izany dia maizina ny masonay,
  '18':
  - type: text
    content: Noho ny amin’ny tendrombohitra Ziona, izay efa lao
  - type: text
    content: Sady ikarenjen’ny amboahaolo.
  '19':
  - type: text
    content: Jehovah ô, Hianao no mipetraka mandrakizay,
  - type: text
    content: Eny, ny sezafiandriananao no maharitra hatramin’ny taranaka fara mandimby.
  '2':
  - type: text
    content: Ny lovanay dia afindra ho an’ny vahiny,
  - type: text
    content: Ary ny tranonay ho an’ny hafa firenena.
  '20':
  - type: text
    content: Ahoana no dia anadinoanao anay mandrakizay
  - type: text
    content: Sy ahafoizanao anay andro lava?
  '21':
  - type: text
    content: Jehovah ô, ampivereno aminao izahay, mba hiverenanay;
  - type: text
    content: Havaozy ho toy ny fahiny ny andronay.
  '22':
  - type: text
    content: Moa dia nandà anay tokoa va Hianao
  - type: text
    content: Sy tezitra aminay indrindra?
  '3':
  - type: text
    content: Efa kamboty izahay ka tsy manan-dray,
  - type: text
    content: Ny reninay dia toy ny mpitondra-tena.
  '4':
  - type: text
    content: Na dia ny loharanonay aza dia andoavanay vola vao azonay isotroana,
  - type: text
    content: Ary ny kitay hazonay dia vidinay vao azo.
  '5':
  - type: text
    content: Rambondrambonan’ny mpanenjika amin’ny hatokay izahay;
  - type: text
    content: Reraka izahay, fa tsy manam-pitsaharana.
  '6':
  - type: text
    content: Nanolo-tànana tamin’ny Egyptiana
  - type: text
    content: Sy ny Asyriana izahay mba ho voky hanina.
  '7':
  - type: text
    content: Nanota ny razanay–tsy etỳ intsony izy;
  - type: text
    content: Ary izahay no mivesatra ny helony.
  '8':
  - type: text
    content: Andevo no manapaka anay;
  - type: text
    content: Tsy misy manafaka anay amin’ny tànany.
  '9':
  - type: text
    content: Noho ny sabatra mamely any an-efitra
  - type: text
    content: Dia manao vy very ny ainay izahay vao mahazo hanina.
