document_id: 2KI.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanjakan’i Ahaza tamin’ny Joda.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TAMIN’ny taona fahafito ambin’ny folo nanjakan’i Peka, zanak’i Remalia, no vao nanjakan’i Ahaza, zanak’i Jotama, mpanjakan’ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Roa-polo taona Ahaza, fony izy vao nanjaka, ary enina ambin’ny folo taona no nanjakany tany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ary tsy nanao izay mahitsy eo imason’i Jehovah Andriamaniny tahaka ny nataon’i Davida rainy izy; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa nandeha tamin’ny làlan’ny mpanjakan’ny Isiraely izy; eny, ny zanani-lahy aza dia nampamakiny ny afo, araka ny fahavetavetan’ny jentilisa izay noroahin’i Jehovah tsy ho eo anoloan’ny Zanak’Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary namono zavatra hatao fanatitra izy sady nandoro ditin-kazo manitra teny amin’ny fitoerana avo sy teny amin’ny havoana ary teny ambanin’ny hazo maitso rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary tamin’izany dia niakatra hanafika an’i Jerosalema Rezina, mpanjakan’i Syria, sy Peka, zanak’i Remalia, mpanjakan’ny Isiraely; ary nanao fahirano an’i Ahaza izy, nefa tsy naharesy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tamin’izany andro izany Rezina, mpanjakan’i Syria, dia nahalasa an’i Elota ho isan’ny fanjakan’i Syria ka nandroaka ny Jiosy hiala tao; ary ny Syriana nankany Elota ka monina ao mandraka andro-any.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Ahaza naniraka olona ho any amin’i Tiglato-pilesera, mpanjakan’i Asyria, hanao hoe: Mpanomponao sy zanakao aho; miakara, ka vonjeo aho tsy ho azon’ny mpanjakan’i Syria sy ny mpanjakan’ny Isiraely, izay efa mitsangana hiady amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nalain’i Ahaza ny volafotsy sy ny volamena izay hita tao an-tranon’i Jehovah sy tao amin’ny rakitry ny tranon’ny mpanjaka, dia nampanateriny ho fanomezana ho an’ny mpanjakan’i Asyria. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nanaiky ny teniny ny mpanjakan’i Asyria ka niakatra hamely an’i Damaskosy ary nahafaka azy; dia nentiny ho any Kira ny olona nobaboiny; fa Rezina kosa novonoiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nandeha Ahaza mpanjaka hitsena an’i Tiglato-pilesera, mpanjakan’i Asyria, any Damaskosy; ary nony nahita ny alitara tao Damaskosy izy, dia nampitondra ny mariky ny alitara sy ny sariny araka ny fombany rehetra ho any amin’i Oria mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Oria mpisorona dia nanao alitara: araka ny marika rehetra nampitondrain’i Ahaza mpanjaka avy tany Damaskosy no nanaovan’i Oria mpisorona azy mandra-pihavin’i Ahaza mpanjaka avy tany Damaskosy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nony tonga avy tany Damaskosy ny mpanjaka, dia nandeha nizaha azy izy ary nanatona ka nanatitra fanatitra teo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nandoro ny fanatitra dorany sy ny fanatitra hohaniny teo izy ary nanidina ny fanatitra aidiny sady nanopy ny ran’ny fanati-pihavanany tamin’ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny alitara varahina kosa, izay teo anatrehan’i Jehovah, dia nafindrany hiala eo anoloan’ny trano–dia eo anelanelan’ny alitara '
  - type: usfm
    marker: it
    children:
    - type: text
      text: vaovao
  - type: text
    text: ' sy ny tranon’i Jehovah–ka nataony teo avaratry ny alitarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Ahaza mpanjaka nandidy an’i Oria mpisorona hoe: Eo ambonin’ny alitara lehibe no andoroy ny fanatitra dorana maraina sy ny fanatitra hohanina hariva sy ny fanatitra dorana mbamin’ny fanatitra hohanina izay ho an’ny mpanjaka, ary ny fanatitra dorana mbamin’ny fanatitra hohanina sy ny fanatitra aidina izay ho an’ny vahoaka rehetra; ary ny ra rehetra avy amin’ny fanatitra dorana sy ny fanatitra alatsa-dra hafa dia hatopinao aminy; ary ny amin’ny alitara varahina dia mbola hataoko fanontanian-javatra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary Oria mpisorona dia nanao araka izay rehetra nandidian’i Ahaza mpanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary nesorin’i Ahaza mpanjaka ny kibon’ny fitoeran-tavin-drano; ary nesoriny ny tavin-drano, ary ilay tavin-drano lehibe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.17 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ranomasina.
    marker-yv: yv-n
  - type: text
    text: ' dia nampidininy niala tamin’ireo omby varahina izay teo ambaniny ka nataony teo ambony lampivato. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny Fialofana tamin’ny Sabata, izay natao teo akaikin’ny trano, sy ny fidirana ivelany izay an’ny mpanjaka, dia nafindrany ho ao an-tranon’i Jehovah noho ny tahony ny mpanjakan’i Asyria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny tantaran’i Ahaza sisa, tsy efa voasoratra ao amin’ny bokin’ny tantaran’ny mpanjakan’ny Joda va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary Ahaza lasa nodi-mandry any amin’ny razany, dia nalevina tao amin’ny razany tao an-Tanànan’i Davida izy; ary Hezekia zanany no nanjaka nandimby azy.
