document_id: JOB.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin’i Joba.
  - type: text
    content: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Dia hahita fiononana amin’izany aho
  - type: text
    content: Ka hiravoravo na dia amin’ny fangirifiriana tsy mifaditrovana aza,
  - type: text
    content: Satria tsy nandà ny tenin’ny Iray Masina aho.
  '11':
  - type: text
    content: Inona moa ny heriko, no hanantena aho?
  - type: text
    content: Ary hanao ahoana moa ny farako, no hanindry fo
  - type: note
    content: 'Na: hanalava ny androko.'
  - type: text
    content: ' aho?'
  '12':
  - type: text
    content: Herim-bato va ny heriko?
  - type: text
    content: Na varahina va ny nofoko?
  '13':
  - type: text
    content: Tsy efa foana va ny hery ho entiko mamonjy tena,
  - type: text
    content: Ary tsy efa nakifika hiala amiko va ny faharetana?
  '14':
  - type: text
    content: Izay efa mivarahontsana dia tokony hiantran’ny sakaizany.
  - type: text
    content: Fandrao mahafoy ny fahatahorana ny Tsitoha izy.
  '15':
  - type: text
    content: Ny rahalahiko mampihambo manana ahy tahaka ny ranotrambo,
  - type: text
    content: Dia tahaka ny mason-drano any an-dohasahan-driaka, izay malaky ritra,
  '16':
  - type: text
    content: Izay mainty azon’ny ranomandry
  - type: text
    content: Sady iafenan’ny orampanala;
  '17':
  - type: text
    content: Fa raha taninin’ny hainandro izy, dia levona;
  - type: text
    content: Raha maina ny andro, dia ritra eo amin’ny fitoerany izy;
  '18':
  - type: text
    content: Mivilivily no fandehany;
  - type: text
    content: Tankina izy ka levona.
  '19':
  - type: text
    content: Ny antokon’i Tema mitazana,
  - type: text
    content: Ny andian’i Sheba manantena azy;
  '2':
  - type: text
    content: Enga anie ka holanjaina tokoa ny fahasosorako,
  - type: text
    content: Ka hampifandanjaina amin’ny mizana izy sy ny fahoriako!
  '20':
  - type: text
    content: Very hevitra ireo, satria samy nanampo;
  - type: text
    content: Tonga teo izy, kanjo nangaihay.
  '21':
  - type: text
    content: Fa ankehitriny efa tsinontsinona hianareo;
  - type: text
    content: Nahita ny fahoriana hianareo ka raiki-tahotra.
  '22':
  - type: text
    content: 'Moa aho va efa nanao hoe: Omeo aho,'
  - type: text
    content: Ka mahafoiza zavatra ho ahy amin’ny fanananareo,
  '23':
  - type: text
    content: Ary vonjeo amin’ny tànan’ny fahavalo aho,
  - type: text
    content: Ka afaho amin’ny tànan’ny mpitohatoha?
  '24':
  - type: text
    content: Mampianara ahy, dia hangina aho;
  - type: text
    content: Ary ampahafantaro izay nahadisoako aho.
  '25':
  - type: text
    content: Endrey ny herin’ny teny marina!
  - type: text
    content: Fa mba mahavoa inona kosa moa ny anatra ataonareo?
  '26':
  - type: text
    content: Ny amin’ny teniko ihany va no ananaranareo ahy?
  - type: text
    content: Fa ho amin’ny rivotra ny tenin’ny olona mamoy fo.
  '27':
  - type: text
    content: Eny, fa na dia ny kamboty aza dia ataonareo loka,
  - type: text
    content: Ary ny sakaizanareo dia ataonareo varotra.
  '28':
  - type: text
    content: Fa ankehitriny, masìna hianareo, mba atreho kely aho,
  - type: text
    content: Dia ho hitanareo fa tsy handainga tsy akory aho.
  '29':
  - type: text
    content: Masìna hianareo, diniho indray aho, ary aoka tsy hisy fitsarana tsy marina;
  - type: text
    content: Eny, diniho indray aho, fa mbola ao ihany ny fahamarinako.
  '3':
  - type: text
    content: Fa ankehitriny mavesatra noho ny fasika any an-dranomasina ny fahoriako,
  - type: text
    content: Koa dia nirediredy aho.
  '30':
  - type: text
    content: Moa misy heloka va eo amin’ny lelako?
  - type: text
    content: Tsy mahafantatra izay ratsy va ny vavako?
  '4':
  - type: text
    content: Fa ny zana-tsipìky ny Tsitoha mitsatoka amiko,
  - type: text
    content: Ka mifoka ny poizina avy aminy ny fanahiko;
  - type: text
    content: Ary ny fampitahoran’Andriamanitra milahatra hamely ahy.
  '5':
  - type: text
    content: Maneno va ny boriki-dia, raha eo amin’ny vilona?
  - type: text
    content: Na mimàmà va ny omby, raha eo amin’ny fihinany?
  '6':
  - type: text
    content: Azo hanina va ny matsatso, raha tsy asian-tsira?
  - type: text
    content: Na mba misy tsirony va ny tafotsin’atody?
  - type: note
    content: 'Na: ranon-tsikobonkobondanitra.'
  '7':
  - type: text
    content: Ny zavatra izay nolaviko tsy hotendrena,
  - type: text
    content: Dia ireny no tsy maintsy haniko, na dia maharikoriko ahy aza.
  '8':
  - type: text
    content: Enga anie ka ho azoko izay angatahiko,
  - type: text
    content: Ary homen’Andriamanitra ahy anie izay iriko!
  '9':
  - type: text
    content: Ka ho sitrak’Andriamanitra anie ny hanorotoro ahy!
  - type: text
    content: Eny, halefany anie ny tànany ka hahamaito ny aiko,–
