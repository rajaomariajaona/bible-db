document_id: JOB.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny teny navalin’i Joba.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'DIA namaly Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia hahita fiononana amin’izany aho
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hiravoravo na dia amin’ny fangirifiriana tsy mifaditrovana aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy nandà ny tenin’ny Iray Masina aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Inona moa ny heriko, no hanantena aho?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hanao ahoana moa ny farako, no hanindry fo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hanalava ny androko.
      marker-yv: yv-n
    - type: text
      text: ' aho?'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Herim-bato va ny heriko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na varahina va ny nofoko?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tsy efa foana va ny hery ho entiko mamonjy tena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy efa nakifika hiala amiko va ny faharetana?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izay efa mivarahontsana dia tokony hiantran’ny sakaizany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fandrao mahafoy ny fahatahorana ny Tsitoha izy.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny rahalahiko mampihambo manana ahy tahaka ny ranotrambo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny mason-drano any an-dohasahan-driaka, izay malaky ritra,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izay mainty azon’ny ranomandry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady iafenan’ny orampanala;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa raha taninin’ny hainandro izy, dia levona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha maina ny andro, dia ritra eo amin’ny fitoerany izy;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mivilivily no fandehany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tankina izy ka levona.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny antokon’i Tema mitazana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny andian’i Sheba manantena azy;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Enga anie ka holanjaina tokoa ny fahasosorako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampifandanjaina amin’ny mizana izy sy ny fahoriako!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Very hevitra ireo, satria samy nanampo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga teo izy, kanjo nangaihay.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa ankehitriny efa tsinontsinona hianareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nahita ny fahoriana hianareo ka raiki-tahotra.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moa aho va efa nanao hoe: Omeo aho,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mahafoiza zavatra ho ahy amin’ny fanananareo,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary vonjeo amin’ny tànan’ny fahavalo aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka afaho amin’ny tànan’ny mpitohatoha?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mampianara ahy, dia hangina aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ampahafantaro izay nahadisoako aho.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Endrey ny herin’ny teny marina!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mba mahavoa inona kosa moa ny anatra ataonareo?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny amin’ny teniko ihany va no ananaranareo ahy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho amin’ny rivotra ny tenin’ny olona mamoy fo.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Eny, fa na dia ny kamboty aza dia ataonareo loka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sakaizanareo dia ataonareo varotra.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Fa ankehitriny, masìna hianareo, mba atreho kely aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho hitanareo fa tsy handainga tsy akory aho.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Masìna hianareo, diniho indray aho, ary aoka tsy hisy fitsarana tsy marina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, diniho indray aho, fa mbola ao ihany ny fahamarinako.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ankehitriny mavesatra noho ny fasika any an-dranomasina ny fahoriako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa dia nirediredy aho.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Moa misy heloka va eo amin’ny lelako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mahafantatra izay ratsy va ny vavako?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa ny zana-tsipìky ny Tsitoha mitsatoka amiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mifoka ny poizina avy aminy ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fampitahoran’Andriamanitra milahatra hamely ahy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Maneno va ny boriki-dia, raha eo amin’ny vilona?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mimàmà va ny omby, raha eo amin’ny fihinany?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Azo hanina va ny matsatso, raha tsy asian-tsira?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na mba misy tsirony va ny tafotsin’atody?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranon-tsikobonkobondanitra.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny zavatra izay nolaviko tsy hotendrena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ireny no tsy maintsy haniko, na dia maharikoriko ahy aza.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Enga anie ka ho azoko izay angatahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary homen’Andriamanitra ahy anie izay iriko!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ka ho sitrak’Andriamanitra anie ny hanorotoro ahy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, halefany anie ny tànany ka hahamaito ny aiko,–
