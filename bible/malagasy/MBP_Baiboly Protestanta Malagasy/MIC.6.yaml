document_id: MIC.6,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny fampibebahana ny Isiraely.
  - type: text
    content: 'MASÌNA hianareo, mihainoa izay lazain’i Jehovah:'
  - type: text
    content: Mitsangàna, mandahara eo anoloan’ny tendrombohitra,
  - type: text
    content: Ary aoka ho ren’ny havoana ny feonao.
  '10':
  - type: text
    content: Mbola misy rakitry ny faharatsiana ihany va ao an-tranon’ny ratsy fanahy
  - type: text
    content: Sy ny famarana
  - type: note
    content: Heb. efaha.
  - type: text
    content: ' tsy ampy izay voaozona?'
  '11':
  - type: text
    content: Mety madio va aho, raha manana mizana mandainga
  - type: text
    content: Sy kitapo misy vato tsy marina?
  '12':
  - type: text
    content: Fa feno loza ny mpanan-karenany,
  - type: text
    content: Mandainga ny mponina ao aminy,
  - type: text
    content: Ary ny lelany dia fitaka eo am-bavany.
  '13':
  - type: text
    content: Izaho kosa dia hikapoka maharary anao
  - type: text
    content: Amin’ny fandringanako anao noho ny helokao.
  '14':
  - type: text
    content: Hianao hihinana, nefa tsy ho voky,
  - type: text
    content: Fa mbola ho ao anatinao ihany ny fahanoananao;
  - type: text
    content: Hampirina hianao, nefa tsy hahavonjy,
  - type: text
    content: Ary izay voavonjinao aza dia hatolotro ho amin’ny sabatra.
  '15':
  - type: text
    content: Hianao hamafy, nefa tsy hijinja;
  - type: text
    content: Hianao hanosihosy oliva, nefa tsy hihosotra diloilo,
  - type: text
    content: Ary hanosihosy ranom-boaloboka, nefa tsy hisotro divay;
  '16':
  - type: text
    content: Fa fatra-pitandrina ny lalàn’i Omry
  - type: text
    content: Sy ny asan’ny taranak’i Ahaba rehetra hianareo
  - type: text
    content: Sady manaraka ny fisainany,–
  - type: text
    content: Mba hanolorako anao ho figagana,
  - type: text
    content: Ary ny mponina any ho zavatra mampisitrisitra,
  - type: text
    content: Ka dia hitondra ny latsan’ny oloko hianareo.
  '2':
  - type: text
    content: Mihainoa ny adin’i Jehovah hianareo, ry tendrombohitra,
  - type: text
    content: Sy hianareo, ry fanorena-matezan’ny tany;
  - type: text
    content: Fa Jehovah manana ady amin’ny olony,
  - type: text
    content: Eny, amin’ny Isiraely no ifandaharany.
  '3':
  - type: text
    content: Ry oloko, inona no nataoko taminao?
  - type: text
    content: Inona no nanasarako anao?
  - type: text
    content: Tondroy maso ary Aho.
  '4':
  - type: text
    content: Fa nentiko niakatra avy tany amin’ny tany Egypta hianao
  - type: text
    content: 'Sady navotako avy tao amin’ny trano nahandevozana:'
  - type: text
    content: Dia nirahiko hitarika anao Mosesy sy Arona ary Miriama.
  '5':
  - type: text
    content: Ry oloko, mba tsarovy ny saina nataon’i Balaka, mpanjakan’i Moaba,
  - type: text
    content: Sy izay navalin’i Balama, zanak’i Beora, azy,
  - type: text
    content: Ary izay natao
  - type: text
    content: ' hatrany Sitima ka hatrany Gilgala,'
  - type: text
    content: Hahafantaranareo ny asa marina nataon’i Jehovah.
  '6':
  - type: text
    content: Inona no ho entiko manatona an’i Jehovah
  - type: text
    content: Sy miondrika eo anatrehan’Andriamanitra Izay any amin’ny avo?
  - type: text
    content: Hanatona Azy mitondra fanatitra dorana
  - type: text
    content: Sy ny ombilahy kely iray taona va aho?
  '7':
  - type: text
    content: Ho sitrak’i Jehovah va ny ondrilahy arivoarivo,
  - type: text
    content: Na renirano diloilo iray alina?
  - type: text
    content: Hanolotra ny lahimatoako noho ny fahadisoako va aho,
  - type: text
    content: Na ny ateraky ny kiboko noho ny fahotan’ny fanahiko?
  '8':
  - type: text
    content: Ry olombelona, efa naseho anao izay tsara
  - type: text
    content: Sy izay ilain’i Jehovah aminao,
  - type: text
    content: 'Dia izao ihany: Ny hanao ny marina sy ny ho tia famindrampo'
  - type: text
    content: Ary ny hanaraka an’Andriamanitrao amin’ny fanetren-tena.
  '9':
  - type: text
    content: Manaitra ny tanàna ny feon’i Jehovah,
  - type: text
    content: Ary mahita ny anaranao ny hendry;
  - type: note
    content: 'Heb. ny fahendrena; na: Ary fahendrena no kendren’ny anaranao.'
  - type: text
    content: Henoinareo ny tsorakazo sy Izay nanendry azy.
