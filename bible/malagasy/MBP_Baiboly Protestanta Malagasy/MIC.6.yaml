document_id: MIC.6
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Teny fampibebahana ny Isiraely.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'MASÌNA hianareo, mihainoa izay lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mitsangàna, mandahara eo anoloan’ny tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka ho ren’ny havoana ny feonao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa ny adin’i Jehovah hianareo, ry tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy hianareo, ry fanorena-matezan’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah manana ady amin’ny olony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, amin’ny Isiraely no ifandaharany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ry oloko, inona no nataoko taminao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Inona no nanasarako anao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tondroy maso ary Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa nentiko niakatra avy tany amin’ny tany Egypta hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sady navotako avy tao amin’ny trano nahandevozana:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nirahiko hitarika anao Mosesy sy Arona ary Miriama.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ry oloko, mba tsarovy ny saina nataon’i Balaka, mpanjakan’i Moaba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay navalin’i Balama, zanak’i Beora, azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ary izay natao
  - type: text
    text: ' hatrany Sitima ka hatrany Gilgala,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hahafantaranareo ny asa marina nataon’i Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Inona no ho entiko manatona an’i Jehovah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy miondrika eo anatrehan’Andriamanitra Izay any amin’ny avo?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanatona Azy mitondra fanatitra dorana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny ombilahy kely iray taona va aho?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho sitrak’i Jehovah va ny ondrilahy arivoarivo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na renirano diloilo iray alina?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hanolotra ny lahimatoako noho ny fahadisoako va aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny ateraky ny kiboko noho ny fahotan’ny fanahiko?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry olombelona, efa naseho anao izay tsara
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy izay ilain’i Jehovah aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dia izao ihany: Ny hanao ny marina sy ny ho tia famindrampo'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny hanaraka an’Andriamanitrao amin’ny fanetren-tena.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manaitra ny tanàna ny feon’i Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahita ny anaranao ny hendry;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ny fahendrena; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary fahendrena no kendren’ny anaranao.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Henoinareo ny tsorakazo sy Izay nanendry azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mbola misy rakitry ny faharatsiana ihany va ao an-tranon’ny ratsy fanahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny famarana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: efaha.
    marker-yv: yv-n
  - type: text
    text: ' tsy ampy izay voaozona?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mety madio va aho, raha manana mizana mandainga
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy kitapo misy vato tsy marina?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa feno loza ny mpanan-karenany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mandainga ny mponina ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lelany dia fitaka eo am-bavany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izaho kosa dia hikapoka maharary anao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amin’ny fandringanako anao noho ny helokao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hianao hihinana, nefa tsy ho voky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa mbola ho ao anatinao ihany ny fahanoananao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hampirina hianao, nefa tsy hahavonjy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay voavonjinao aza dia hatolotro ho amin’ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hianao hamafy, nefa tsy hijinja;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hianao hanosihosy oliva, nefa tsy hihosotra diloilo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hanosihosy ranom-boaloboka, nefa tsy hisotro divay;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa fatra-pitandrina ny lalàn’i Omry
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny asan’ny taranak’i Ahaba rehetra hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady manaraka ny fisainany,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hanolorako anao ho figagana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny mponina any ho zavatra mampisitrisitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia hitondra ny latsan’ny oloko hianareo.
