document_id: JOB.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny voalohany nataon’i Zofara.
  - type: text
    content: 'DIA namaly Zofara Namatita ka nanao hoe:'
  '10':
  - type: text
    content: Raha mandroso Izy ka misambotra ary manao fitsarana,
  - type: text
    content: Dia iza moa no mahasakana Azy?
  '11':
  - type: text
    content: Fa Izy mahafantatra ny olon-dratsy;
  - type: text
    content: Ary hitany ny heloka, na dia tsy mandinika akory aza Izy.
  - type: note
    content: 'Na: Ary hitany ny heloka izay tsy heverin’ny olona akory.'
  '12':
  - type: text
    content: Koa na dia ny olom-poana aza dia hahazo fahendrena,
  - type: text
    content: Ary na dia ny zanaky ny boriki-dia aza dia hateraka ho olombelona.
  - type: note
    content: 'Na: Nefa ny olom-poana dia tsy manam-pahendrena; Eny, ny olombelona dia teraka ho toy ny boriki-dia.'
  '13':
  - type: text
    content: Raha ampanatrehinao Azy ny fonao,
  - type: text
    content: Ary atantinao aminy ny tànanao,
  '14':
  - type: text
    content: Ka misy heloka eo an-tànanao, dia ario lavitra izany,
  - type: text
    content: Ary aza avela hisy ratsy hitoetra ao an-dainao;
  '15':
  - type: text
    content: Dia hahazo hanandratra ny tavanao tsy misy tsiny hianao,
  - type: text
    content: Koa hijoro tsara ary tsy hatahotra;
  '16':
  - type: text
    content: 'Fa ho hadinonao ny fahorianao:'
  - type: text
    content: Toy ny rano efa nandalo no hahatsiarovanao azy.
  '17':
  - type: text
    content: Ary hamirapiratra lavitra noho ny mitataovovonana ny andronao;
  - type: text
    content: Na dia sendra manjombona aza, dia ho tonga tahaka ny maraina.
  '18':
  - type: text
    content: Hatoky hianao, satria misy fanantenana;
  - type: text
    content: Eny, hijery manodidina hianao ka handry tsy amin’ahiahy.
  '19':
  - type: text
    content: Dia ho tafandry hianao, fa tsy hisy hanaitaitra;
  - type: text
    content: Ary maro no hila sitraka aminao.
  '2':
  - type: text
    content: Moa tsy hovaliana va ny teny be toy izany?
  - type: text
    content: Ary moa raha maro vava, dia ho marina va?
  '20':
  - type: text
    content: Fa ny mason’ny ratsy fanahy kosa ho pahina,
  - type: text
    content: Ka ho very avokoa ny fiarovana azy,
  - type: text
    content: Ary ny fialana aina ihany no hany sisa azony antenaina.
  '3':
  - type: text
    content: Ny bedibedinao va no hampangina ny olona?
  - type: text
    content: Ka dia haniratsira hianao, ka tsy hisy handresy lahatra,
  '4':
  - type: text
    content: 'Ary dia hiteny hoe: Madio ny teny nalahatro,'
  - type: text
    content: Ary tsy nanan-tsiny teo imasonao aho.
  '5':
  - type: text
    content: Enga anie ka hiteny Andriamanitra
  - type: text
    content: Ka hiloa-bava hamaly anao!
  '6':
  - type: text
    content: Dia hasehony aminao ny fahendrena miafina,
  - type: text
    content: Fa tsy hita lany
  - type: note
    content: Heb. roa sosona.
  - type: text
    content: ' izany,'
  - type: text
    content: Ka dia ho fantatrao fa tsy dia novalian’Andriamanitra avokoa ny helokao.
  '7':
  - type: text
    content: Takatry ny sainao va ny fomban’
  - type: note
    content: 'Na: ny famantarana an’.'
  - type: text
    content: ' Andriamanitra?'
  - type: text
    content: Ary tanteraka va ny fahitanao ny Tsitoha
  '8':
  - type: text
    content: Avo tahaka ny lanitra izany! ka inona no hainao atao?
  - type: text
    content: Lalina noho ny fiainan-tsi-hita!
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ka inona no fantatrao?'
  '9':
  - type: text
    content: Lava noho ny tany ny ohany
  - type: text
    content: Ary lehibe noho ny ranomasina.
