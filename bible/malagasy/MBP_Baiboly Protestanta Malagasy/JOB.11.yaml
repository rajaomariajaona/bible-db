document_id: JOB.11
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny teny voalohany nataon’i Zofara.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'DIA namaly Zofara Namatita ka nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Moa tsy hovaliana va ny teny be toy izany?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary moa raha maro vava, dia ho marina va?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny bedibedinao va no hampangina ny olona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia haniratsira hianao, ka tsy hisy handresy lahatra,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary dia hiteny hoe: Madio ny teny nalahatro,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nanan-tsiny teo imasonao aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Enga anie ka hiteny Andriamanitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiloa-bava hamaly anao!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hasehony aminao ny fahendrena miafina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa tsy hita lany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: roa sosona.
    marker-yv: yv-n
  - type: text
    text: ' izany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantatrao fa tsy dia novalian’Andriamanitra avokoa ny helokao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Takatry ny sainao va ny fomban’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny famantarana an’.
    marker-yv: yv-n
  - type: text
    text: ' Andriamanitra?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tanteraka va ny fahitanao ny Tsitoha
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avo tahaka ny lanitra izany! ka inona no hainao atao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lalina noho ny fiainan-tsi-hita!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ka inona no fantatrao?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lava noho ny tany ny ohany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary lehibe noho ny ranomasina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha mandroso Izy ka misambotra ary manao fitsarana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia iza moa no mahasakana Azy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa Izy mahafantatra ny olon-dratsy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitany ny heloka, na dia tsy mandinika akory aza Izy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ary hitany ny heloka izay tsy heverin’ny olona akory.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa na dia ny olom-poana aza dia hahazo fahendrena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary na dia ny zanaky ny boriki-dia aza dia hateraka ho olombelona.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nefa ny olom-poana dia tsy manam-pahendrena; Eny, ny olombelona dia teraka ho toy ny boriki-dia.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha ampanatrehinao Azy ny fonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary atantinao aminy ny tànanao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ka misy heloka eo an-tànanao, dia ario lavitra izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza avela hisy ratsy hitoetra ao an-dainao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia hahazo hanandratra ny tavanao tsy misy tsiny hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Koa hijoro tsara ary tsy hatahotra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ho hadinonao ny fahorianao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toy ny rano efa nandalo no hahatsiarovanao azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hamirapiratra lavitra noho ny mitataovovonana ny andronao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na dia sendra manjombona aza, dia ho tonga tahaka ny maraina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hatoky hianao, satria misy fanantenana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hijery manodidina hianao ka handry tsy amin’ahiahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia ho tafandry hianao, fa tsy hisy hanaitaitra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary maro no hila sitraka aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ny mason’ny ratsy fanahy kosa ho pahina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho very avokoa ny fiarovana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fialana aina ihany no hany sisa azony antenaina.
