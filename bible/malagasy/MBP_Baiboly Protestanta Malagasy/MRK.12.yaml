document_id: MRK.12
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary niteny taminy Izy ka nanao fanoharana hoe: Nisy lehilahy anankiray nanao tanimboaloboka ka namefy azy manodidina sy nihady famiazana ary nanao tilikambo, ka nahofany tamin’olona mpiasa tany izany, dia lasa nankany an-tany hafa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nony tonga ny fotoana, dia naniraka mpanompo anankiray izy hankany amin’ny mpiasa tany handray amin’ny vokatry ny tanimboaloboka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ireo nisambotra ilay mpanompo sady nikapoka azy ka nampiala azy maina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izy naniraka mpanompo anankiray koa ho any aminy indray, fa io koa, dia noratrainy ny lohany, ka nalany baraka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary naniraka anankiray koa izy, fa io kosa indray dia novonoiny ho faty; ary maro koa no nirahiny, fa ny sasany nokapohiny, ary ny sasany novonoiny ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary mbola nanana anankiray izy, dia ny zanani-lahy malalany, ka nony farany dia naniraka azy hankany aminy izy ka nanao hoe: Hanaja ny zanako izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa izany mpiasa tany izany niresaka hoe: Ity no mpandova; andeha hovonointsika izy, dia ho antsika ny lova. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa nisambotra azy izy, dia nahafaty azy sy namoaka azy teo ivelan’ny tanimboaloboka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa ahoana no hataon’ny tompon’ny tanimboaloboka amin’izany? Ho avy izy, dia handringana ny mpiasa tany, ka homeny olon-kafa ny tanimboaloboka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tsy mbola novakinareo va izao Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: ' izao:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Ny vato izay nolavin’ny mpanao trano,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia izy no efa natao fehizoro;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avy tamin’i Jehovah izao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka mahagaga eo imasontsika?’’ (Sal. 118.22, 23.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary nitady hisambotra Azy izy ireo, nefa natahotra ny vahoaka izy, satria fantany fa ny tenany no nolazainy tamin’izany fanoharana izany; dia nandao an’i Jesosy ny olona ka lasa.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanontaniana an’i Jesosy ny amin’ny mandoa vola hetra ho an’i Kaisara.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 22.15-22; Lio. 20.20-26.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ARY nirahiny hankeo amin’i Jesosy ny sasany avy tamin’ny Fariseo sy ny Herodiana hamandrika Azy amin’ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa tonga izy ireo, dia nanao taminy hoe: Mpampianatra ô, fantatray fa marina Hianao, ka tsy mampaninona Anao ny hevitry ny olona, fa tsy mba mizaha tavan’olona Hianao, fa mampianatra marina ny làlan’Andriamanitra. Mety va ny mandoa vola hetra ho an’i Kaisara, sa tsia? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Handoa va izahay, sa tsy handoa?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fa Izy nahalala ny fihatsarambelatsihiny, ka dia nanao taminy hoe: Nahoana no maka fanahy Ahy hianareo? Itondray denaria etỳ amiko hizahako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nitondrany Izy. Ary hoy Izy taminy: An’iza io sary sy soratra io? Ary hoy izy taminy: An’i Kaisara. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy Jesosy taminy: Aloavy ho an’i Kaisara izay an’i Kaisara, ary ho an’Andriamanitra izay an’Andriamanitra. Dia gaga taminy ireny.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanontanian’ny Sadoseo an’i Jesosy ny amin’ny hitsanganan’ny maty.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 22.23-33; Lio. 20.27-40.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ARY ny Sadoseo, izay milaza fa tsy misy fitsanganan’ny maty, dia nisy sasany tonga teo aminy ka nanontany Azy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mpampianatra ô, Mosesy nanoratra ho antsika hoe: Raha misy manan-drahalahy maty momba, ka mbola velona ny vadin’ny maty, dia aoka ny rahalahiny hampakatra azy hiteraka hamelo-maso ny rahalahiny (Deo. 25. 5). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nisy fito mirahalahy; ary ny zokiny nampaka-bady, dia maty momba. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny faharoa nampakatra an-dravehivavy, dia maty momba koa; ary ny fahatelo dia toy izany ihany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izy fito mirahalahy dia samy maty momba avokoa. Koa faran’izy rehetra dia maty koa ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Koa amin’ny fitsanganan’ny maty, ho vadin’iza moa ravehivavy, satria efa samy nanambady azy avokoa izy fito mirahalahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy Jesosy taminy: Tsy izao tsi-fahafantaranareo ny Soratra '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Masina
  - type: text
    text: ' sy ny herin’Andriamanitra izao va no mahadiso hevitra anareo? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa amin’ny hitsanganana amin’ny maty dia tsy hisy hampaka-bady na havoaka hampakarina; fa tahaka ny anjely any an-danitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ka ny amin’ny hananganana ny maty, tsy mbola novakinareo va ny eo amin’ny bokin’i Mosesy, eo amin’
  - type: usfm
    marker: it
    children:
    - type: text
      text: ilay teny milaza
  - type: text
    text: ' ny Voaroy, dia ny nanaovan’Andriamanitra taminy hoe: ,,Izaho no Andriamanitr’i Abrahama sy Andriamanitr’Isaka ary Andriamanitr’i Jakoba’’? (Eks. 3. 6) '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy Andriamanitry ny maty Izy, fa an’ny velona; koa diso indrindra hianareo.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanontaniana an’i Jesosy ny amin’izay didy lehibe.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 22.34-40.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'DIA nanatona an’i Jesosy ny mpanora-dalàna anankiray, izay efa nahare ny niadiany hevitra tamin’ny Sadoseo ka nahalala fa namaly azy tsara Izy, dia nanontany Azy hoe: Ny didy manao ahoana no voalohany amin’izy rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Jesosy namaly hoe: Ny voalohany dia izao: ,,Mihainoa, ry Isiraely: Jehovah Andriamanitsika dia Jehovah iray ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'koa tiava an’i Jehovah Andriamanitrao amin’ny fonao rehetra sy ny fanahinao rehetra sy ny sainao rehetra ary ny herinao rehetra’’ (Deo. 6.4, 5). '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny faharoa dia izao: ,,Tiava ny namanao tahaka ny tenanao’’ (Lev. 19.18). Tsy misy didy hafa lehibe noho ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hoy ilay mpanora-dalàna taminy: Marina izany, Tompoko; tsara ny nilazanao fa iray ihany Andriamanitra, ary tsy misy afa-tsy Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny ho tia Azy amin’ny fo rehetra sy ny saina rehetra sy ny hery rehetra, ary ny ho tia ny namana tahaka ny tena, dia mihoatra lavitra noho ny fanatitra hodorana sy ny fanatitra hafa rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary raha hitan’i Jesosy fa namaly tamim-pahendrena izy, dia hoy Izy taminy: Tsy lavitra ny fanjakan’Andriamanitra hianao.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ary tsy nisy sahy nanontany Azy intsony.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanontanian’i Jesosy ny Fariseo ny amin’izay maha-Zanak’i Davida ny Mesia.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 22.41-46; Lio. 20.41-44.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ARY Jesosy, raha nampianatra teo an-kianjan’ny tempoly, dia namaly ka nanao hoe: Ahoana no lazain’ny mpanora-dalàna fa Kristy no Zanak’i Davida? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Kanefa ny tenan’i Davida dia nampilazain’ny Fanahy Masina hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ',,Jehovah nilaza tamin’ny Tompoko hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mipetraha eo an-tànako ankavanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao’’ (Sal. 110.1).
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ny tenan’i Davida manao Azy hoe ,,Tompo’’, koa ahoana no maha-Zanany Azy? Ary ny vahoaka betsaka nihaino Azy tamin’ny hafaliana.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nilazan’i Jesosy ny faharatsian’ny mpanora-dalàna.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 23.1-39; Lio. 20.45-47.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ARY hoy Izy tamin’ny fampianarany: Mitandrema ny amin’ny mpanora-dalàna izay mazoto mandehandeha miakanjo akanjo lava sy te-hoharabain’olona eny an-tsena, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tia
  - type: text
    text: ' ny fipetrahana aloha ao amin’ny synagoga sy ny fitoerana aloha ao amin’ny fanasana, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ary mandany ny tranon’ny mpitondratena ka manao vavaka lavareny mba ho fiolahana; ireo no hahazo fahamelohana mafimafy kokoa.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ilay mpitondratena nandatsa-bola tao amin’ny fandatsahan-drakitra.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lio. 21.1-4.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ARY raha nipetraka tandrifin’ny fandatsahan-drakitra Jesosy, dia nijery ny fandatsaky ny vahoaka vola tao Izy; ary maro ny mpanan-karena nandatsaka be tao. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Fa nisy mpitondratena malahelo anankiray kosa tonga teo, ka nandatsaka farantsakely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.42 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'lepta roa, '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: dia farantsakely varahina izany = kodranta iray = tokony ho variroaventy.
    marker-yv: yv-n
  - type: text
    text: ' roa ankevitry ny variroaventy avy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary Jesosy niantso ny mpianany hanatona Azy ka nanao taminy hoe: Lazaiko aminareo marina tokoa fa io mpitondratena malahelo io no efa nandatsaka be noho izay rehetra nandatsaka tao amin’ny fandatsahan-drakitra. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Fa ireo rehetra ireo, dia tamin’ny haben’ny fananany no nandatsahany tao; fa izy kosa, tamin’ny alahelony no nandatsahany tao izay rehetra nananany, dia ny fivelomany rehetra.
