document_id: ISA.34
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny hampijaliana ny fahavalon ny Isiraely, indrindra fa Edoma, sy ny fahasambaran’ny navotan’i Jehovah.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MANATÒNA, hianareo jentilisa, mba handre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihainoa, hianareo firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka handre ny tany sy ny ao aminy rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izao tontolo izao sy ny vokatra rehetra avy aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa Jehovah dia tezitra amin’ny jentilisa rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mirehitra amin’ny miaramilany rehetra ny fahatezerany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa nodidiany haringana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hatao herema.
    marker-yv: yv-n
  - type: text
    text: ' ireo ary natolony hovonoina.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary izay voavono amin’ireo dia hariana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hamofona ny hamaimbon’ny fatiny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tendrombohitra hiempo azon’ny rany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay rehetra eny amin’ny lanitra dia ho levona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny lanitra hahorona tahaka ny fangorona taratasy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny eny aminy rehetra dia halazo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny fahalazon’ny ravina mihintsana avy amin’ny voaloboka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tahaka ny ravina malazo mihintsana avy amin’ny aviavy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa ny sabatro dia mamon-
  - type: usfm
    marker: it
    children:
    - type: text
      text: dra
  - type: text
    text: ' any amin’ny lanitra;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hidina hihatra amin’i Edoma iny
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny firenena voatendriko haringana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hatao herema.
    marker-yv: yv-n
  - type: text
    text: ' mba ho fitsarana azy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny sabatr’i Jehovah feno ra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, mihosi-menaka amin’ny matavy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny ran’ny zanak’ondry sy ny osilahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary amin’ny fonom-boan’ny ondrilahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa Jehovah mamono zavatra hatao fanatitra ao Bozra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mahafaty be ao amin’ny tany Edoma.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny ombimanga miaraka aripaka aminy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mbamin’ny vantotr’omby sy ny ombilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia vonton-dra ny taniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary mihosi-menaka ny vovo-taniny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa Jehovah manana andro famaliana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia taona famaliana hiadiana ho an’i Ziona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary hovana ho tonga dity ny renirano any Edoma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho solifara ny vovo-taniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny taniny ho dity mirehitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Na alina na andro dia tsy hovonoina izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny setrony hisavoana mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny taranaka fara mandimby dia ho tany karankaina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy hisy handeha hamaky azy intsony mandrakizay mandrakizay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ho zara-tanin’ny sama sy ny sokina izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny vorondolo lehibe sy ny goaika dia hitoetra ao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hohenjaniny eo aminy ny famolaina fikorontanana
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny pilao fahafoanana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny lehibe dia tsy hisy ao intsony hifidy izay hanjaka,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hiantso ny fanjakana.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho fongana ny mpanapaka rehetra ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ho rakotry ny tsilo ny ao anatin’ny lapan’ny mpanjakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amiana sy voaroy no ho ao amin’ny trano fiarovany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho fonenan’ny amboadia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.13 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jakala.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy fitoeran’ny ostritsa izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny bibi-dia any an-efitra hihaona amin’ny kary;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jakala.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny osilahy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'seïrima; '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao Lev. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: xvii.7.
    marker-yv: yv-n
  - type: text
    text: ' hiantso ny namany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ilay mandehandeha amin’ny alina
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lilita.
    marker-yv: yv-n
  - type: text
    text: ' hitoetra any'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hahita fitoerana ho azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny bibilava miantoratoraka hanao ny lavany any
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hanatody sy hifana ary hikotrika ao amin’ny alokaloka any;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any koa no hiangonan’ny papango,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy eo amin’ny namany avy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izahao ao amin’ny bokin’i Jehovah, ka vakio;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy tsy ao ireo na dia iray akory aza.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy misy na dia iray akory aza hitady ny namany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fa ny vavan’i '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehovah
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.16 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vavako.
    marker-yv: yv-n
  - type: text
    text: no nandidy izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny Fanahiny ihany no nanangona azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary Izy no efa nanendry anjara ho an’ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny tànany no efa nizara izany ho an’ireo tamin’ny famolaina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handova izany mandrakizay ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitoetra ao hatramin’ny taranaka fara mandimby.
