document_id: ISA.34,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampijaliana ny fahavalon ny Isiraely, indrindra fa Edoma, sy ny fahasambaran’ny navotan’i Jehovah.
  - type: text
    content: MANATÒNA, hianareo jentilisa, mba handre;
  - type: text
    content: Ary mihainoa, hianareo firenena;
  - type: text
    content: Aoka handre ny tany sy ny ao aminy rehetra,
  - type: text
    content: Izao tontolo izao sy ny vokatra rehetra avy aminy.
  '10':
  - type: text
    content: Na alina na andro dia tsy hovonoina izany,
  - type: text
    content: Ary ny setrony hisavoana mandrakizay;
  - type: text
    content: Hatramin’ny taranaka fara mandimby dia ho tany karankaina izy,
  - type: text
    content: Tsy hisy handeha hamaky azy intsony mandrakizay mandrakizay.
  '11':
  - type: text
    content: Fa ho zara-tanin’ny sama sy ny sokina izy,
  - type: text
    content: Ny vorondolo lehibe sy ny goaika dia hitoetra ao;
  - type: text
    content: Ary hohenjaniny eo aminy ny famolaina fikorontanana
  - type: text
    content: Sy ny pilao fahafoanana.
  '12':
  - type: text
    content: Ary ny lehibe dia tsy hisy ao intsony hifidy izay hanjaka,
  - type: note
    content: Heb. hiantso ny fanjakana.
  - type: text
    content: Fa ho fongana ny mpanapaka rehetra ao aminy.
  '13':
  - type: text
    content: Ary ho rakotry ny tsilo ny ao anatin’ny lapan’ny mpanjakany,
  - type: text
    content: Amiana sy voaroy no ho ao amin’ny trano fiarovany;
  - type: text
    content: Ary ho fonenan’ny amboadia
  - type: note
    content: 'Na: jakala.'
  - type: text
    content: Sy fitoeran’ny ostritsa izy.
  '14':
  - type: text
    content: Ny bibi-dia any an-efitra hihaona amin’ny kary;
  - type: note
    content: Heb. jakala.
  - type: text
    content: Ary ny osilahy
  - type: note
    content: Heb. seïrima; izahao Lev. xvii.7.
  - type: text
    content: ' hiantso ny namany;'
  - type: text
    content: Ary ilay mandehandeha amin’ny alina
  - type: note
    content: Heb. lilita.
  - type: text
    content: ' hitoetra any'
  - type: text
    content: Ka hahita fitoerana ho azy.
  '15':
  - type: text
    content: Ny bibilava miantoratoraka hanao ny lavany any
  - type: text
    content: Ka hanatody sy hifana ary hikotrika ao amin’ny alokaloka any;
  - type: text
    content: Any koa no hiangonan’ny papango,
  - type: text
    content: Samy eo amin’ny namany avy.
  '16':
  - type: text
    content: Izahao ao amin’ny bokin’i Jehovah, ka vakio;
  - type: text
    content: Tsy misy tsy ao ireo na dia iray akory aza.
  - type: text
    content: Tsy misy na dia iray akory aza hitady ny namany;
  - type: text
    content: 'Fa ny vavan’i '
  - type: text
    content: Jehovah
  - type: text
    content: ' '
  - type: note
    content: Heb. vavako.
  - type: text
    content: no nandidy izany,
  - type: text
    content: Ary ny Fanahiny ihany no nanangona azy.
  '17':
  - type: text
    content: Ary Izy no efa nanendry anjara ho an’ireo
  - type: text
    content: Ary ny tànany no efa nizara izany ho an’ireo tamin’ny famolaina;
  - type: text
    content: Handova izany mandrakizay ireo
  - type: text
    content: Ary hitoetra ao hatramin’ny taranaka fara mandimby.
  '2':
  - type: text
    content: Fa Jehovah dia tezitra amin’ny jentilisa rehetra,
  - type: text
    content: Ary mirehitra amin’ny miaramilany rehetra ny fahatezerany;
  - type: text
    content: Efa nodidiany haringana
  - type: note
    content: Heb. hatao herema.
  - type: text
    content: ' ireo ary natolony hovonoina.'
  '3':
  - type: text
    content: Ary izay voavono amin’ireo dia hariana,
  - type: text
    content: Ka hamofona ny hamaimbon’ny fatiny,
  - type: text
    content: Ary ny tendrombohitra hiempo azon’ny rany.
  '4':
  - type: text
    content: Izay rehetra eny amin’ny lanitra dia ho levona,
  - type: text
    content: Ary ny lanitra hahorona tahaka ny fangorona taratasy;
  - type: text
    content: Ary ny eny aminy rehetra dia halazo
  - type: text
    content: Tahaka ny fahalazon’ny ravina mihintsana avy amin’ny voaloboka,
  - type: text
    content: Ary tahaka ny ravina malazo mihintsana avy amin’ny aviavy.
  '5':
  - type: text
    content: Fa ny sabatro dia mamon-
  - type: text
    content: dra
  - type: text
    content: ' any amin’ny lanitra;'
  - type: text
    content: Indro, hidina hihatra amin’i Edoma iny
  - type: text
    content: Sy amin’ny firenena voatendriko haringana,
  - type: note
    content: Heb. hatao herema.
  - type: text
    content: ' mba ho fitsarana azy.'
  '6':
  - type: text
    content: Ny sabatr’i Jehovah feno ra,
  - type: text
    content: Eny, mihosi-menaka amin’ny matavy
  - type: text
    content: Sy amin’ny ran’ny zanak’ondry sy ny osilahy
  - type: text
    content: Ary amin’ny fonom-boan’ny ondrilahy;
  - type: text
    content: Fa Jehovah mamono zavatra hatao fanatitra ao Bozra
  - type: text
    content: Ary mahafaty be ao amin’ny tany Edoma.
  '7':
  - type: text
    content: Ary ny ombimanga miaraka aripaka aminy
  - type: text
    content: Mbamin’ny vantotr’omby sy ny ombilahy,
  - type: text
    content: Ka dia vonton-dra ny taniny,
  - type: text
    content: Ary mihosi-menaka ny vovo-taniny.
  '8':
  - type: text
    content: Fa Jehovah manana andro famaliana,
  - type: text
    content: Dia taona famaliana hiadiana ho an’i Ziona.
  '9':
  - type: text
    content: Ary hovana ho tonga dity ny renirano any Edoma,
  - type: text
    content: Ary ho solifara ny vovo-taniny,
  - type: text
    content: Ary ny taniny ho dity mirehitra.
