document_id: PSA.27,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fahatokiana an’i Jehovah, Mpiaro sy Mpitahy ny olony.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH no fahazavako sy famonjena ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hatahorako?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah no fiarovana mafy ho an’ny aiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hangovitako?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ny raiko aman-dreniko efa nahafoy ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah kosa no mandray ahy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fa na dia mahafoy ahy aza ny raiko aman-dreniko, Dia horaisin’i Jehovah kosa aho.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ampianaro ny làlanao aho, Jehovah ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tariho amin’ny làlana marina aho noho ny fahavaloko.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aza manolotra ahy ho amin’ny sitrapon’ny mpampahory ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa vavolombelona mandainga sy izay mifofofofo loza no mitsangana hiampanga ahy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Raha izay re aho no tsy nanantena hahita ny fahasoavan’i Jehovah amin’ny tanin’ny velona.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Miandrasa an’i Jehovah hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Matokia, ary aoka hahery ny fonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, miandrasa an’i Jehovah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raha manatona ahy hihinana ny nofoko ny ratsy fanahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay fahavaloko sy rafilahiko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izy ihany no tafintohina ka lavo.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Na dia misy antokony mitoby hiady amiko aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hatahotra ny foko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia misy ady mihatra amiko aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hatoky ihany aho.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Zavatra iray loha no nangatahiko tamin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no hotadiaviko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny hitoetra ao an-tranon’i Jehovah amin’ny andro rehetra hiainako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba ho faly mijery ny fahasoavan’i Jehovah sy mandinika ny tempoliny.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa hanafina ahy ao an-trano fialofany amin’ny andro fahoriana Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hampiery ahy amin’ny fierena ao an-dainy Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanandratra ahy ho eny ambony vatolampy Izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Koa dia hisandratra ambonin’ny fahavaloko manodidina ahy ny lohako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hanatitra fanatitra hihobiana ao an-dainy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hihira sy hankalaza an’i Jehovah aho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mihainoa, Jehovah ô,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa mitaraina mafy aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary mamindrà fo amiko, ka valio aho.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Raha hoy Hianao:'
    - type: text
      text: ' Tadiavonareo ny tavako,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dia hoy ny navalin’ny foko: Eny, ny tavanao no tadiaviko, Jehovah ô;'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza manafina ny tavanao amiko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mandroaka ny mpanomponao an-katezerena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa famonjena ahy Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza manary na mahafoy ahy, ry Andriamanitry ny famonjena ahy.
