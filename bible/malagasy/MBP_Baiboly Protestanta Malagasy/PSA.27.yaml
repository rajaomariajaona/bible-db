document_id: PSA.27,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokiana an’i Jehovah, Mpiaro sy Mpitahy ny olony.
  - type: text
    content: Nataon’i Davida.
  - type: text
    content: JEHOVAH no fahazavako sy famonjena ahy;
  - type: text
    content: Iza no hatahorako?
  - type: text
    content: Jehovah no fiarovana mafy ho an’ny aiko;
  - type: text
    content: Iza no hangovitako?
  '10':
  - type: text
    content: Fa ny raiko aman-dreniko efa nahafoy ahy;
  - type: text
    content: Fa Jehovah kosa no mandray ahy.
  - type: note
    content: 'Na: Fa na dia mahafoy ahy aza ny raiko aman-dreniko, Dia horaisin’i Jehovah kosa aho.'
  '11':
  - type: text
    content: Ampianaro ny làlanao aho, Jehovah ô;
  - type: text
    content: Ary tariho amin’ny làlana marina aho noho ny fahavaloko.
  '12':
  - type: text
    content: Aza manolotra ahy ho amin’ny sitrapon’ny mpampahory ahy;
  - type: text
    content: Fa vavolombelona mandainga sy izay mifofofofo loza no mitsangana hiampanga ahy.
  '13':
  - type: text
    content: Raha izay re aho no tsy nanantena hahita ny fahasoavan’i Jehovah amin’ny tanin’ny velona.
  '14':
  - type: text
    content: Miandrasa an’i Jehovah hianao;
  - type: text
    content: Matokia, ary aoka hahery ny fonao;
  - type: text
    content: Eny, miandrasa an’i Jehovah.
  '2':
  - type: text
    content: Raha manatona ahy hihinana ny nofoko ny ratsy fanahy,
  - type: text
    content: Izay fahavaloko sy rafilahiko,
  - type: text
    content: Dia izy ihany no tafintohina ka lavo.
  '3':
  - type: text
    content: Na dia misy antokony mitoby hiady amiko aza,
  - type: text
    content: Tsy hatahotra ny foko;
  - type: text
    content: Na dia misy ady mihatra amiko aza,
  - type: text
    content: Dia hatoky ihany aho.
  '4':
  - type: text
    content: Zavatra iray loha no nangatahiko tamin’i Jehovah,
  - type: text
    content: Izany no hotadiaviko,
  - type: text
    content: Dia ny hitoetra ao an-tranon’i Jehovah amin’ny andro rehetra hiainako,
  - type: text
    content: Mba ho faly mijery ny fahasoavan’i Jehovah sy mandinika ny tempoliny.
  '5':
  - type: text
    content: Fa hanafina ahy ao an-trano fialofany amin’ny andro fahoriana Izy;
  - type: text
    content: Hampiery ahy amin’ny fierena ao an-dainy Izy;
  - type: text
    content: Hanandratra ahy ho eny ambony vatolampy Izy.
  '6':
  - type: text
    content: Koa dia hisandratra ambonin’ny fahavaloko manodidina ahy ny lohako,
  - type: text
    content: Ka hanatitra fanatitra hihobiana ao an-dainy aho;
  - type: text
    content: Hihira sy hankalaza an’i Jehovah aho.
  '7':
  - type: text
    content: Mihainoa, Jehovah ô,
  - type: text
    content: Fa mitaraina mafy aho;
  - type: text
    content: Ary mamindrà fo amiko, ka valio aho.
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Raha hoy Hianao:'
  - type: text
    content: ' Tadiavonareo ny tavako,'
  - type: text
    content: 'Dia hoy ny navalin’ny foko: Eny, ny tavanao no tadiaviko, Jehovah ô;'
  '9':
  - type: text
    content: Aza manafina ny tavanao amiko
  - type: text
    content: Aza mandroaka ny mpanomponao an-katezerena;
  - type: text
    content: Efa famonjena ahy Hianao;
  - type: text
    content: Aza manary na mahafoy ahy, ry Andriamanitry ny famonjena ahy.
