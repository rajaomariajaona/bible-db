document_id: 2CH.8
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny trano nataon’i Solomona, sy ny nandaminany ny amin’ny fanatitra hatao ao amin’ny tempoly.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nony afaka ny roa-polo taona nanaovan’i Solomona ny tranon’i Jehovah sy ny lapan’ny tenany, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia namboariny ny tanàna izay nomen’i Hirama azy ka namponenany ny Zanak’Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Solomona nankany Hamata-zoba ka naharesy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nanorina an’i Tadmora tany an-efitra sy ny tanàna fitehirizana rehetra izay nataony tany Hamata izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary namboariny koa Beti-horona ambony sy Beti-horona ambany, tanàna mafy misy mànda sy vavahady mihidy, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary Baleta sy ny tanàna fitehirizana rehetra izay an’i Solomona sy ny tanàna rehetra fitoeran-kalesy sy ny tanàna fitoeran’ny mpitaingin-tsoavaly ary izay rehetra tian’i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin’ny tany nanjakany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny amin’ny olona sisa rehetra tamin’ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita, izay tsy isan’ny Isiraely, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dia ny taranany izay sisa nandimby azy teo amin’ny taniny, fa tsy naringan’ny Isiraely, no nampanaovin’i Solomona fanompoana mandraka andro-any.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ny Zanak’Isiraely dia tsy mba nampanaovin’i Solomona izany, fa ireo kosa no miaramila sy komandin’ny mpanafika malaza ary komandin’ny kalesiny sy ny mpitaingin-tsoavaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary izao no mpifehy ny olona voa-tendrin’i Solomona mpanjaka, dia dimam-polo amby roan-jato izay nanapaka ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Solomona nitondra ny zanakavavin’i Farao niakatra avy tany an-Tanànan’i Davida ho ao amin’ny trano izay nataony ho azy, fa hoy izy: Ny vadiko tsy mahazo mitoetra ao an-tranon’i Davida, mpanjakan’ny Isiraely, fa masina izay efa nidiran’ny fiaran’i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tamin’izany Solomona nanatitra fanatitra dorana ho an’i Jehovah teo ambonin’ny alitaran’i Jehovah, izay naoriny teo anoloan’ny lavarangana fidirana; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: eny, nanatitra izay fanao isan-andro izy araka ny didin’i Mosesy, dia tamin’ny Sabata sy ny voaloham-bolana ary ny fotoam-pivavahana intelo isan-taona, dia tamin’ny andro firavoravoana fihinanana mofo tsy misy masirasira sy ny andro firavoravoana manarakaraka ireo herinandro ary ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary notendreny koa ny antokon’ny mpisorona araka ny nandaharan’i Davida rainy azy ho amin’ny fanompoany avy ary ny Levita ho amin’ny anjara-raharahany koa, dia ny hidera sy hanao fanompoam-pivavahana eo anoloan’ny mpisorona araka ny raharaha fanao isan-andro, ary ny mpiandry varavarana araka ny antokony amin’ny isam-bavahady; fa izany no nandidian’i Davida lehilahin’Andriamanitra, azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary tsy nialan’ireo ny didin’ny mpanjaka tamin’ny mpisorona sy ny Levita na amin’inona na amin’inona, indrindra fa ny amin’ny rakitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Toy izany no nanamboaran’i Solomona ny asa rehetra nataony hatramin’ny andro nanorenany ny tranon’i Jehovah ka ambara-pahavitany; ka dia vita tsara ny tranon’i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary tamin’izay Solomona dia nankany Ezion-gebera sy Elota eo amoron’ny ranomasina any amin’ny tany Edoma, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ary ny mpanompon’i Hirama dia nampandehaniny hitondra sambo sy mpanompo izay mahay ranomasina; ary niara-nandeha tamin’ny mpanompon’i Solomona ho any Ofira ireo ka nahazo talenta volamena dimam-polo amby efa-jato tany izy, dia nentiny tany amin’i Solomona mpanjaka izany.
