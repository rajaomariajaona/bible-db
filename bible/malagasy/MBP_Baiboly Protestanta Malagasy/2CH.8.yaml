document_id: 2CH.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin’ny trano nataon’i Solomona, sy ny nandaminany ny amin’ny fanatitra hatao ao amin’ny tempoly.
  - type: text
    content: 'ARY nony afaka ny roa-polo taona nanaovan’i Solomona ny tranon’i Jehovah sy ny lapan’ny tenany, '
  '10':
  - type: text
    content: 'Ary izao no mpifehy ny olona voa-tendrin’i Solomona mpanjaka, dia dimam-polo amby roan-jato izay nanapaka ny olona. '
  '11':
  - type: text
    content: 'Ary Solomona nitondra ny zanakavavin’i Farao niakatra avy tany an-Tanànan’i Davida ho ao amin’ny trano izay nataony ho azy, fa hoy izy: Ny vadiko tsy mahazo mitoetra ao an-tranon’i Davida, mpanjakan’ny Isiraely, fa masina izay efa nidiran’ny fiaran’i Jehovah.'
  '12':
  - type: text
    content: 'Ary tamin’izany Solomona nanatitra fanatitra dorana ho an’i Jehovah teo ambonin’ny alitaran’i Jehovah, izay naoriny teo anoloan’ny lavarangana fidirana; '
  '13':
  - type: text
    content: eny, nanatitra izay fanao isan-andro izy araka ny didin’i Mosesy, dia tamin’ny Sabata sy ny voaloham-bolana ary ny fotoam-pivavahana intelo isan-taona, dia tamin’ny andro firavoravoana fihinanana mofo tsy misy masirasira sy ny andro firavoravoana manarakaraka ireo herinandro ary ny andro firavoravoana fitoerana amin’ny trano rantsan-kazo.
  '14':
  - type: text
    content: 'Ary notendreny koa ny antokon’ny mpisorona araka ny nandaharan’i Davida rainy azy ho amin’ny fanompoany avy ary ny Levita ho amin’ny anjara-raharahany koa, dia ny hidera sy hanao fanompoam-pivavahana eo anoloan’ny mpisorona araka ny raharaha fanao isan-andro, ary ny mpiandry varavarana araka ny antokony amin’ny isam-bavahady; fa izany no nandidian’i Davida lehilahin’Andriamanitra, azy. '
  '15':
  - type: text
    content: Ary tsy nialan’ireo ny didin’ny mpanjaka tamin’ny mpisorona sy ny Levita na amin’inona na amin’inona, indrindra fa ny amin’ny rakitra.
  '16':
  - type: text
    content: Toy izany no nanamboaran’i Solomona ny asa rehetra nataony hatramin’ny andro nanorenany ny tranon’i Jehovah ka ambara-pahavitany; ka dia vita tsara ny tranon’i Jehovah.
  '17':
  - type: text
    content: 'Ary tamin’izay Solomona dia nankany Ezion-gebera sy Elota eo amoron’ny ranomasina any amin’ny tany Edoma, '
  '18':
  - type: text
    content: ary ny mpanompon’i Hirama dia nampandehaniny hitondra sambo sy mpanompo izay mahay ranomasina; ary niara-nandeha tamin’ny mpanompon’i Solomona ho any Ofira ireo ka nahazo talenta volamena dimam-polo amby efa-jato tany izy, dia nentiny tany amin’i Solomona mpanjaka izany.
  '2':
  - type: text
    content: dia namboariny ny tanàna izay nomen’i Hirama azy ka namponenany ny Zanak’Isiraely.
  '3':
  - type: text
    content: 'Ary Solomona nankany Hamata-zoba ka naharesy azy. '
  '4':
  - type: text
    content: 'Ary nanorina an’i Tadmora tany an-efitra sy ny tanàna fitehirizana rehetra izay nataony tany Hamata izy. '
  '5':
  - type: text
    content: 'Ary namboariny koa Beti-horona ambony sy Beti-horona ambany, tanàna mafy misy mànda sy vavahady mihidy, '
  '6':
  - type: text
    content: ary Baleta sy ny tanàna fitehirizana rehetra izay an’i Solomona sy ny tanàna rehetra fitoeran-kalesy sy ny tanàna fitoeran’ny mpitaingin-tsoavaly ary izay rehetra tian’i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin’ny tany nanjakany rehetra.
  '7':
  - type: text
    content: 'Ary ny amin’ny olona sisa rehetra tamin’ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita, izay tsy isan’ny Isiraely, '
  '8':
  - type: text
    content: dia ny taranany izay sisa nandimby azy teo amin’ny taniny, fa tsy naringan’ny Isiraely, no nampanaovin’i Solomona fanompoana mandraka andro-any.
  '9':
  - type: text
    content: 'Fa ny Zanak’Isiraely dia tsy mba nampanaovin’i Solomona izany, fa ireo kosa no miaramila sy komandin’ny mpanafika malaza ary komandin’ny kalesiny sy ny mpitaingin-tsoavaliny. '
