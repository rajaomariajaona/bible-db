document_id: JER.50,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’i Babylona.
  - type: text
    content: IZAO no teny nampilazain’i Jehovah an’i Jeremia mpaminany ny amin’i Babylona, dia ny tanin’ny Kaldeana.
  '10':
  - type: text
    content: Ary Kaldea ho voababo;
  - type: text
    content: Izay rehetra mamabo azy dia ho afa-po, hoy Jehovah.
  '11':
  - type: text
    content: Satria, mifaly sy miravoravo hianareo,
  - type: text
    content: Ry mpamabo ny lovako,
  - type: text
    content: Eny, mifalihavanja toy ny ombivavy kely mively vary
  - type: note
    content: 'Na: ombivavy kely eny amin’ny ahitra.'
  - type: text
    content: ' hianareo'
  - type: text
    content: Sady maneno toy ny soavaly matanjaka;
  '12':
  - type: text
    content: Dia ho menatra indrindra ny reninareo,
  - type: text
    content: Hangaihay ilay niteraka anareo;
  - type: text
    content: Indro, ny faran’ny firenena,–
  - type: text
    content: Efitra sy tany karankaina ary tani-hay!
  '13':
  - type: text
    content: Noho ny fahatezeran’i Jehovah
  - type: text
    content: Dia tsy honenana Babylona,
  - type: text
    content: Fa ho tonga tany lao avokoa;
  - type: text
    content: Izay rehetra mandalo azy dia ho gaga
  - type: text
    content: Ka hisitrisitra noho ny loza rehetra namelezana azy.
  '14':
  - type: text
    content: Milahara manodidina hamely an’i Babylona,
  - type: text
    content: Hianareo rehetra izay manenjana tsipìka;
  - type: text
    content: Asio izy, fa aza tsitsina ny zana-tsipìka,
  - type: text
    content: Fa tamin’i Jehovah no nanotany.
  '15':
  - type: text
    content: Akoray manodidina izy!
  - type: text
    content: Fa efa nikoy;
  - type: text
    content: Nirodana ny bateriny,
  - type: text
    content: Rava ny màndany;
  - type: text
    content: Fa famalian’i Jehovah izany.
  - type: text
    content: Valio izy,
  - type: text
    content: Eny, toy ny efa nataony no mba ataovinareo aminy kosa.
  '16':
  - type: text
    content: Aringano tsy ho any Babylona ny mpamafy
  - type: text
    content: Sy izay mitana fijinjana amin’ny fararano;
  - type: text
    content: Fa noho ny sabatra mandoza dia samy hihodina ho any amin’ny fireneny avy izy,
  - type: text
    content: Ary samy handositra ho any amin’ny taniny avy.
  '17':
  - type: text
    content: Ondry iray voavily ny Isiraely,
  - type: text
    content: Liona no nanenjika azy;
  - type: text
    content: Voalohany dia ny mpanjakan’i Asyria no nandany azy,
  - type: text
    content: Ary farany dia ity Nebokadnezara, mpanjakan’i Babylona, ity no nanapatapaka
  - type: note
    content: 'Na: nikiky.'
  - type: text
    content: ' ny taolany.'
  '18':
  - type: text
    content: 'Koa izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: text
    content: Indro, hovaliako ny mpanjakan’i Babylona sy ny taniny
  - type: text
    content: Toy ny efa namaliako ny mpanjakan’i Asyria.
  '19':
  - type: text
    content: Ary hampodiko ho any amin’ny saha fiandrasana azy indray ny Isiraely,
  - type: text
    content: Ka hihinana ao Karmela sy Basana izy;
  - type: text
    content: Ary any an-tany havoan’i Efraima sy Gileada no hahavoky azy.
  '2':
  - type: text
    content: Ambaraonareo, eny, torio any amin’ny firenena,
  - type: text
    content: Ary manangàna faneva,–
  - type: text
    content: Torio, fa aza afenina,
  - type: text
    content: 'Ataovy hoe: Afaka Babylona!'
  - type: text
    content: Mangaihay Bela, raiki-tahotra Merodaka!
  - type: text
    content: Eny, mangaihay ny sampiny,
  - type: text
    content: Raiki-tahotra ny sarin-javatra!
  '20':
  - type: text
    content: Amin’izany andro izany sy amin’izany fotoana izany, hoy Jehovah,
  - type: text
    content: Dia hotadiavina izay heloky ny Isiraely, fa tsy hisy;
  - type: text
    content: Ary izay fahotan’ny Joda, fa tsy ho hita;
  - type: text
    content: Satria havelako ny helok’izay sisa narovako.
  '21':
  - type: text
    content: Iakaro Ibefikomiana
  - type: note
    content: Anaran’i Babylona io.
  - type: text
    content: Sy ny mponina ao Ampamaliana;
  - type: note
    content: Anaran’i Babylona io.
  - type: text
    content: Ravao sy aringano
  - type: note
    content: Heb. ataovy herema.
  - type: text
    content: ' manarakaraka azy, hoy Jehovah,'
  - type: text
    content: Ary manaova araka izay rehetra nandidiako anao.
  '22':
  - type: text
    content: Misy tabataban’ady amin’ny tany
  - type: text
    content: Sy fandringanana be.
  '23':
  - type: text
    content: Indrisy! tapaka sy torotoro ilay fampohazan’ny tany rehetra;
  - type: text
    content: Indrisy Babylona efa tonga figagana any amin’ny firenena.
  '24':
  - type: text
    content: Nofandrihako hianao, ry Babylona, ka voa,
  - type: text
    content: Nefa tsy fantatrao akory;
  - type: text
    content: Hita ka voasambotra koa hianao,
  - type: text
    content: Satria nila ady tamin’i Jehovah.
  '25':
  - type: text
    content: Novohan’i Jehovah ny firaketany,
  - type: text
    content: Ka navoakany ny fitaovan’ny fahatezerany;
  - type: text
    content: Fa misy hataon’i Jehovah, Tompon’ny maro, any amin’ny tanin’ny Kaldeana.
  '26':
  - type: text
    content: Avia avokoa hianareo rehetra hamely azy;
  - type: text
    content: Vohay ny trano fitoeran-kanina,
  - type: text
    content: Atobitobio toy ny antontam-bary,
  - type: text
    content: Ka levòny
  - type: note
    content: Heb. ataovy herema.
  - type: text
    content: ' avokoa izay ao;'
  - type: text
    content: Fa aza avela hisy sisa ho azy.
  '27':
  - type: text
    content: Vonoy ireo ombilahy rehetra,
  - type: text
    content: Ary aoka hidina ho any amin’ny famonoana izy.
  - type: text
    content: Mahita loza izy, fa tonga ny androny,
  - type: text
    content: Dia ny fotoana hamaliana azy.
  '28':
  - type: text
    content: Injany! misy feon’izay mandositra
  - type: text
    content: Sy izay afaka avy any amin’ny tany Babylona,
  - type: text
    content: Hanambara ny famalian’i Jehovah Andriamanitsika ao Ziona,
  - type: text
    content: Dia ny famaliana noho ny tempoliny.
  '29':
  - type: text
    content: Antsoy ny mpandefa zana-tsipìka
  - type: note
    content: 'Na: ny mahery.'
  - type: text
    content: ' hamely an’i Babylona.'
  - type: text
    content: Dia ny mpanenjana tsipìka rehetra;
  - type: text
    content: Mitobia manodidina hamely azy;
  - type: text
    content: Aoka tsy hisy ho afaka izy;
  - type: text
    content: Valio araka ny asany izy,
  - type: text
    content: Eny, araka ny asa rehetra nataony no mba ataovy aminy kosa;
  - type: text
    content: Fa niavonavona tamin’i Jehovah izy,
  - type: text
    content: Dia tamin’ny Iray Masin’ny Isiraely.
  '3':
  - type: text
    content: Fa misy firenena avy any avaratra miakatra hamely azy
  - type: text
    content: Ka hahatonga ny taniny ho lao tsy hisy mponina intsony;
  - type: text
    content: Fa na ny olona na ny biby dia samy handositra ka ho lasa avokoa.
  '30':
  - type: text
    content: Koa hiampatrampatra eny an-kalalahana ny zatovony,
  - type: text
    content: Ary ho ringana ny miaramilany rehetra amin’izany andro izany, hoy Jehovah.
  '31':
  - type: text
    content: Indro, hiatrika aminao Aho, ry Ifiavonavonana,
  - type: note
    content: Anaran’i Babylona io.
  - type: text
    content: Hoy Jehovah, Tompon’ny maro;
  - type: text
    content: Fa tonga ny andronao,
  - type: text
    content: Dia ny fotoana hamaliako anao.
  '32':
  - type: text
    content: Ho tafintohina Ifiavonavonana,
  - type: note
    content: Anaran’i Babylona io.
  - type: text
    content: ' dia ho lavo,'
  - type: text
    content: Ka tsy hisy hanarina azy;
  - type: text
    content: Ary handrehitra afo ao an-tanànany Aho,
  - type: text
    content: Ka handevona ny manodidina azy rehetra izany.
  '33':
  - type: text
    content: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: text
    content: 'Niara-nampahorina ny Zanak’Isiraely sy ny taranak’i Joda:'
  - type: text
    content: Ary izay rehetra namabo azy dia mihazona azy mafy
  - type: text
    content: Ka tsy mety mandefa azy.
  '34':
  - type: text
    content: Mahery ny Mpanavotra azy,
  - type: text
    content: Jehovah, Tompon’ny maro, no anarany;
  - type: text
    content: Handahatra ny adiny tokoa Izy,
  - type: text
    content: Mba hampiadana ny tany
  - type: text
    content: Sy hampangovitra ny mponina any Babylona kosa.
  '35':
  - type: text
    content: Indro! hisy sabatra hamely ny Kaldeana
  - type: text
    content: Mbamin’ny mponina any Babylona
  - type: text
    content: Sy ny mpanapaka azy ary ny olon-kendriny, hoy Jehovah.
  '36':
  - type: text
    content: Indro! hisy sabatra hamely ny mpibedibedy, ka ho very saina izy;
  - type: text
    content: Indro! hisy sabatra hamely ny lehilahy maheriny, ka hivadi-po izy.
  '37':
  - type: text
    content: Indro! hisy sabatra hamely ny soavaliny sy ny kalesiny
  - type: text
    content: Mbamin’ny olona samy hafa firenena rehetra ao aminy,
  - type: text
    content: Ka ho tonga toy ny vehivavy ireny!
  - type: text
    content: Indro! hisy sabatra hamely ny firaketany, ka horobaina izany.
  '38':
  - type: text
    content: Ny fihantonan’ny andro no mahatankina ny ranony;
  - type: text
    content: Fa tany be sarin-javatra voasokitra izy,
  - type: text
    content: Ary ny sampiny mahatahotra mahadala azy.
  '39':
  - type: text
    content: Koa ny bibi-dia any an-efitra sy ny kary
  - type: note
    content: Heb. jakala.
  - type: text
    content: Sy ny ostritsa no honina ao;
  - type: text
    content: Tsy honenana intsony mandrakizay izy
  - type: text
    content: Ary tsy hitoerana hatramin’ny taranaka fara-mandimby.
  '4':
  - type: text
    content: Amin’izany andro izany sy amin’izany fotoana izany, hoy Jehovah, dia ho avy ny Zanak’Isiraely,
  - type: text
    content: Dia izy mbamin’ny taranak’i Joda;
  - type: text
    content: Eny, handeha izy sady hitomany eny am-pandehanana
  - type: text
    content: Ka hitady an’i Jehovah Andriamaniny.
  '40':
  - type: text
    content: Toy ny nandravan’Andriamanitra an’i Sodoma sy Gomora
  - type: text
    content: Mbamin’ny tanàna eny akaikiny, hoy Jehovah,
  - type: text
    content: No tsy hisian’olona honina any
  - type: text
    content: Na zanak’olombelona hivahiny any.
  '41':
  - type: text
    content: Indro, misy firenena avy any avaratra,
  - type: text
    content: Dia firenena lehibe sy mpanjaka maro no mitsangana avy any amin’ny faran’ny tany.
  '42':
  - type: text
    content: Tsipìka sy lefona no entiny;
  - type: text
    content: Lozabe sy tsy mamindra fo izy;
  - type: text
    content: Ny feony dia mirohondrohona toy ny ranomasina,
  - type: text
    content: Sady mitaingin-tsoavaly izy
  - type: text
    content: Ary voaomana tahaka ny lehilahy ho amin’ny ady,–
  - type: text
    content: Hamely anao, ry Babylona zanakavavy.
  '43':
  - type: text
    content: Efa ren’ny mpanjakan’i Babylona ny lazany,
  - type: text
    content: Ka miraviravy tànana izy;
  - type: text
    content: Fahoriana no mahazo azy,
  - type: text
    content: Eny, fanaintainana tahaka ny vehivavy raha miteraka.
  '44':
  - type: text
    content: Indro, toy ny fiakatry ny liona avy ao amin’ny kirihitrala eny amoron’
  - type: note
    content: Heb. ny reharehany.
  - type: text
    content: ' i Jordana'
  - type: text
    content: No hiakarany ho any amin’ny misy ahitra mateza;
  - type: note
    content: 'Na: fonenany mafy.'
  - type: text
    content: Nefa hampandosiriko tampoka hiala ao aminy izy,
  - type: text
    content: Ary izay olona anankiray voafidy no hotendreko hanapaka azy;
  - type: text
    content: Fa iza no tahaka Ahy, ary iza no hifandahatra amiko?
  - type: text
    content: Ary iza moa no mpiandry ondry mahajanona eo anatrehako?
  '45':
  - type: text
    content: Koa henoy ny saina avy amin’i Jehovah,
  - type: text
    content: Izay nosaininy hamelezana an’i Babylona,
  - type: text
    content: 'Sy ny heviny izay noheveriny hamelezana ny tanin’ny Kaldeana:'
  - type: text
    content: Hoviraviraina tokoa ireny, dia ny kely indrindra amin’ny ondry;
  - type: text
    content: Ho gaga azy tokoa ny saha fiandrasana azy.
  '46':
  - type: text
    content: 'Noho ny antsoantso hoe: ,Efa afaka Babylona,’ dia mihorohoro ny tany,'
  - type: text
    content: Ary ny fitarainana dia re any amin’ny firenena.
  '5':
  - type: text
    content: Hanontany ny làlana mankany Ziona izy
  - type: text
    content: 'Sady hanatrika hankany ka hanao hoe:'
  - type: text
    content: Avia, ka maneke ho an’i Jehovah
  - type: text
    content: Amin’ny fanekena mandrakizay izay tsy hohadinoina.
  '6':
  - type: text
    content: Ondry very ny oloko,
  - type: text
    content: Fa ny mpiandry azy nampirenreny azy,
  - type: text
    content: Eny, nampirenireny azy teny an-tendrombohitra izy;
  - type: text
    content: Nirenireny teny an-tendrombohitra sy teny an-kavoana ireny,
  - type: text
    content: Ka hadinony ny tany fandriany.
  '7':
  - type: text
    content: Izay rehetra nahita azy dia nandringana azy,
  - type: text
    content: 'Ary ny fahavalony nanao hoe: Tsy manan-keloka izahay,'
  - type: text
    content: Satria izy efa nanota tamin’i Jehovah, fonenan’ny fahamarinana,
  - type: text
    content: Dia Jehovah, fanantenan’ny razany.
  '8':
  - type: text
    content: Mandosira hiala an’i Babylona,
  - type: text
    content: Eny, mialà amin’ny tanin’ny Kaldeana,
  - type: text
    content: Ary aoka hianareo ho tahaka ny anankiray izay tari-dàlan’ny ondry aman-osy andiany.
  '9':
  - type: text
    content: Fa, indro, Izaho hamporisika sy hampiakatra firenena lehibe manao andiany avy any avaratra hamely an’i Babylona;
  - type: text
    content: Ary hilahatra hamely azy ireo,
  - type: text
    content: Ka avy ao no hanafahany azy;
  - type: text
    content: Ny zana-tsipìkany ho tahaka ny lehilahy mahery sady mahay,
  - type: text
    content: Izay tsy miverina foana.
