document_id: JER.50,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Faminaniana ny amin’i Babylona.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: IZAO no teny nampilazain’i Jehovah an’i Jeremia mpaminany ny amin’i Babylona, dia ny tanin’ny Kaldeana.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Kaldea ho voababo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mamabo azy dia ho afa-po, hoy Jehovah.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria, mifaly sy miravoravo hianareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ry mpamabo ny lovako,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mifalihavanja toy ny ombivavy kely mively vary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ombivavy kely eny amin’ny ahitra.
      marker-yv: yv-n
    - type: text
      text: ' hianareo'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady maneno toy ny soavaly matanjaka;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ho menatra indrindra ny reninareo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hangaihay ilay niteraka anareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, ny faran’ny firenena,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efitra sy tany karankaina ary tani-hay!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny fahatezeran’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tsy honenana Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho tonga tany lao avokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra mandalo azy dia ho gaga
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hisitrisitra noho ny loza rehetra namelezana azy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Milahara manodidina hamely an’i Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianareo rehetra izay manenjana tsipìka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asio izy, fa aza tsitsina ny zana-tsipìka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tamin’i Jehovah no nanotany.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akoray manodidina izy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nikoy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nirodana ny bateriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rava ny màndany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa famalian’i Jehovah izany.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Valio izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, toy ny efa nataony no mba ataovinareo aminy kosa.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aringano tsy ho any Babylona ny mpamafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy izay mitana fijinjana amin’ny fararano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa noho ny sabatra mandoza dia samy hihodina ho any amin’ny fireneny avy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary samy handositra ho any amin’ny taniny avy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ondry iray voavily ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Liona no nanenjika azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voalohany dia ny mpanjakan’i Asyria no nandany azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary farany dia ity Nebokadnezara, mpanjakan’i Babylona, ity no nanapatapaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nikiky.
      marker-yv: yv-n
    - type: text
      text: ' ny taolany.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Koa izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hovaliako ny mpanjakan’i Babylona sy ny taniny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny efa namaliako ny mpanjakan’i Asyria.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hampodiko ho any amin’ny saha fiandrasana azy indray ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hihinana ao Karmela sy Basana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary any an-tany havoan’i Efraima sy Gileada no hahavoky azy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ambaraonareo, eny, torio any amin’ny firenena,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manangàna faneva,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torio, fa aza afenina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ataovy hoe: Afaka Babylona!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mangaihay Bela, raiki-tahotra Merodaka!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mangaihay ny sampiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raiki-tahotra ny sarin-javatra!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany sy amin’izany fotoana izany, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hotadiavina izay heloky ny Isiraely, fa tsy hisy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay fahotan’ny Joda, fa tsy ho hita;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria havelako ny helok’izay sisa narovako.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iakaro Ibefikomiana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaran’i Babylona io.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny mponina ao Ampamaliana;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaran’i Babylona io.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ravao sy aringano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.21 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ataovy herema.
      marker-yv: yv-n
    - type: text
      text: ' manarakaraka azy, hoy Jehovah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary manaova araka izay rehetra nandidiako anao.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misy tabataban’ady amin’ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fandringanana be.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy! tapaka sy torotoro ilay fampohazan’ny tany rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy Babylona efa tonga figagana any amin’ny firenena.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nofandrihako hianao, ry Babylona, ka voa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy fantatrao akory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hita ka voasambotra koa hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria nila ady tamin’i Jehovah.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Novohan’i Jehovah ny firaketany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka navoakany ny fitaovan’ny fahatezerany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy hataon’i Jehovah, Tompon’ny maro, any amin’ny tanin’ny Kaldeana.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia avokoa hianareo rehetra hamely azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vohay ny trano fitoeran-kanina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Atobitobio toy ny antontam-bary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka levòny
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ataovy herema.
      marker-yv: yv-n
    - type: text
      text: ' avokoa izay ao;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa aza avela hisy sisa ho azy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vonoy ireo ombilahy rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hidina ho any amin’ny famonoana izy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahita loza izy, fa tonga ny androny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fotoana hamaliana azy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany! misy feon’izay mandositra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy izay afaka avy any amin’ny tany Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanambara ny famalian’i Jehovah Andriamanitsika ao Ziona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny famaliana noho ny tempoliny.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Antsoy ny mpandefa zana-tsipìka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.29 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny mahery.
      marker-yv: yv-n
    - type: text
      text: ' hamely an’i Babylona.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny mpanenjana tsipìka rehetra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitobia manodidina hamely azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka tsy hisy ho afaka izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Valio araka ny asany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, araka ny asa rehetra nataony no mba ataovy aminy kosa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa niavonavona tamin’i Jehovah izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tamin’ny Iray Masin’ny Isiraely.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa misy firenena avy any avaratra miakatra hamely azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hahatonga ny taniny ho lao tsy hisy mponina intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa na ny olona na ny biby dia samy handositra ka ho lasa avokoa.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa hiampatrampatra eny an-kalalahana ny zatovony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho ringana ny miaramilany rehetra amin’izany andro izany, hoy Jehovah.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hiatrika aminao Aho, ry Ifiavonavonana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.31 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaran’i Babylona io.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoy Jehovah, Tompon’ny maro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tonga ny andronao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny fotoana hamaliako anao.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho tafintohina Ifiavonavonana,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.32 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Anaran’i Babylona io.
      marker-yv: yv-n
    - type: text
      text: ' dia ho lavo,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy hisy hanarina azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary handrehitra afo ao an-tanànany Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handevona ny manodidina azy rehetra izany.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Izao no lazain’i Jehovah, Tompon’ny maro:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Niara-nampahorina ny Zanak’Isiraely sy ny taranak’i Joda:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay rehetra namabo azy dia mihazona azy mafy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy mety mandefa azy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mahery ny Mpanavotra azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jehovah, Tompon’ny maro, no anarany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Handahatra ny adiny tokoa Izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hampiadana ny tany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy hampangovitra ny mponina any Babylona kosa.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro! hisy sabatra hamely ny Kaldeana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny mponina any Babylona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny mpanapaka azy ary ny olon-kendriny, hoy Jehovah.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro! hisy sabatra hamely ny mpibedibedy, ka ho very saina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro! hisy sabatra hamely ny lehilahy maheriny, ka hivadi-po izy.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro! hisy sabatra hamely ny soavaliny sy ny kalesiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny olona samy hafa firenena rehetra ao aminy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka ho tonga toy ny vehivavy ireny!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro! hisy sabatra hamely ny firaketany, ka horobaina izany.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fihantonan’ny andro no mahatankina ny ranony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa tany be sarin-javatra voasokitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny sampiny mahatahotra mahadala azy.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa ny bibi-dia any an-efitra sy ny kary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.39 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jakala.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny ostritsa no honina ao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy honenana intsony mandrakizay izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tsy hitoerana hatramin’ny taranaka fara-mandimby.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’izany andro izany sy amin’izany fotoana izany, hoy Jehovah, dia ho avy ny Zanak’Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia izy mbamin’ny taranak’i Joda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, handeha izy sady hitomany eny am-pandehanana
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hitady an’i Jehovah Andriamaniny.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny nandravan’Andriamanitra an’i Sodoma sy Gomora
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mbamin’ny tanàna eny akaikiny, hoy Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No tsy hisian’olona honina any
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na zanak’olombelona hivahiny any.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, misy firenena avy any avaratra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia firenena lehibe sy mpanjaka maro no mitsangana avy any amin’ny faran’ny tany.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsipìka sy lefona no entiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lozabe sy tsy mamindra fo izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny feony dia mirohondrohona toy ny ranomasina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mitaingin-tsoavaly izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary voaomana tahaka ny lehilahy ho amin’ny ady,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamely anao, ry Babylona zanakavavy.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa ren’ny mpanjakan’i Babylona ny lazany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka miraviravy tànana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fahoriana no mahazo azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, fanaintainana tahaka ny vehivavy raha miteraka.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, toy ny fiakatry ny liona avy ao amin’ny kirihitrala eny amoron’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.44 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny reharehany.
      marker-yv: yv-n
    - type: text
      text: ' i Jordana'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hiakarany ho any amin’ny misy ahitra mateza;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.44 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fonenany mafy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa hampandosiriko tampoka hiala ao aminy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay olona anankiray voafidy no hotendreko hanapaka azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza no tahaka Ahy, ary iza no hifandahatra amiko?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary iza moa no mpiandry ondry mahajanona eo anatrehako?
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa henoy ny saina avy amin’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nosaininy hamelezana an’i Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sy ny heviny izay noheveriny hamelezana ny tanin’ny Kaldeana:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hoviraviraina tokoa ireny, dia ny kely indrindra amin’ny ondry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho gaga azy tokoa ny saha fiandrasana azy.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Noho ny antsoantso hoe: ,Efa afaka Babylona,’ dia mihorohoro ny tany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fitarainana dia re any amin’ny firenena.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanontany ny làlana mankany Ziona izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sady hanatrika hankany ka hanao hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avia, ka maneke ho an’i Jehovah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amin’ny fanekena mandrakizay izay tsy hohadinoina.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ondry very ny oloko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny mpiandry azy nampirenreny azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, nampirenireny azy teny an-tendrombohitra izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nirenireny teny an-tendrombohitra sy teny an-kavoana ireny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hadinony ny tany fandriany.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra nahita azy dia nandringana azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary ny fahavalony nanao hoe: Tsy manan-keloka izahay,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria izy efa nanota tamin’i Jehovah, fonenan’ny fahamarinana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia Jehovah, fanantenan’ny razany.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandosira hiala an’i Babylona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mialà amin’ny tanin’ny Kaldeana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka hianareo ho tahaka ny anankiray izay tari-dàlan’ny ondry aman-osy andiany.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa, indro, Izaho hamporisika sy hampiakatra firenena lehibe manao andiany avy any avaratra hamely an’i Babylona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hilahatra hamely azy ireo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka avy ao no hanafahany azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zana-tsipìkany ho tahaka ny lehilahy mahery sady mahay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay tsy miverina foana.
