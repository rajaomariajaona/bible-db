document_id: EZK.32,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitomaniana noho ny nanjo an’i Farao sy ny vahoakany.
  - type: text
    content: 'ARY tamin’ny andro voalohany tamin’ny volana faharoa ambin’ny folo tamin’ny taona faharoa ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  '10':
  - type: text
    content: Eny, hataoko talanjona anao ny firenena maro,
  - type: text
    content: Ary hipararetra noho ny aminao ny mpanjakany,
  - type: text
    content: Raha hantsodiko eo imasony ny sabatro,
  - type: text
    content: Ary samy hangovitra lalandava izy amin’ny fanahiany ny ainy,
  - type: text
    content: Raha mby amin’ny andro haharavanao.
  '11':
  - type: text
    content: 'Fa izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Ny sabatry ny mpanjakan’i Babylona dia ho tonga aminao.
  '12':
  - type: text
    content: Ny sabatry ny mahery, izay samy masiaka indrindra amin’ny firenena,
  - type: text
    content: Ho entiko mandavo ny vahoakanao maro be,
  - type: text
    content: Dia horavany ny reharehan’i Egypta,
  - type: text
    content: Ka ho fongotra ny vahoakany maro be rehetra.
  '13':
  - type: text
    content: Haringako koa ny biby fiompiny rehetra eny amoron’ny rano maro,
  - type: text
    content: Ary tsy hanakobankobana azy intsony ny tongotry ny olona,
  - type: text
    content: Na handoto azy ny kitron’ny biby fiompy.
  '14':
  - type: text
    content: Dia hahenako
  - type: note
    content: 'Na: hampandriko hadio.'
  - type: text
    content: ' ny ranony,'
  - type: text
    content: Ary hampandehaniko toy ny diloilo ny oniny,
  - type: text
    content: Hoy Jehovah Tompo,
  '15':
  - type: text
    content: Raha hataoko lao ny tany Egypta,
  - type: text
    content: Ka hofoanako tsy hisy na inona na inona izay nahafeno azy teo;
  - type: text
    content: Ary haringako ny monina rehetra ao aminy,
  - type: text
    content: Dia ho fantatra fa Izaho no Jehovah.
  '16':
  - type: text
    content: Izany no hira fahalahelovana hataon’ny olona;
  - type: text
    content: Ny zanakavavin’ny firenena no hihira izany;
  - type: text
    content: Eny, ho fahalahelovana an’i Egypta sy ny vahoakany maro be rehetra no hihirany izany, hoy Jehovah Tompo.
  '17':
  - type: text
    content: 'Ary tamin’ny andro fahadimy ambin’ny folo tamin’ny volana tamin’ny taona faharoa ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
  '18':
  - type: text
    content: Ry zanak’olona, isaony ny vahoaka maro ben’i Egypta,
  - type: text
    content: Ary ampidino izy mbamin’ny zanakavavin’ny firenena malaza
  - type: text
    content: Ho any ambanin’ny tany,
  - type: text
    content: Miaraka amin’izay midina any an-davaka.
  '19':
  - type: text
    content: Mihoatra noho ny an’iza moa ny hatsaran-tarehinao?
  - type: text
    content: Midina, ka miampara
  - type: note
    content: Heb. mandria.
  - type: text
    content: ' amin’izay tsy voafora.'
  '2':
  - type: text
    content: 'Ry zanak’olona, manaova hira fahalahelovana ny amin’i Farao, mpanjakan’i Egypta, ka ataovy aminy hoe:'
  - type: text
    content: Nanao ny tenanao ho tahaka ny liona tanora tamin’ny firenena hianao,
  - type: text
    content: Kanjo tahaka ny dragona
  - type: note
    content: 'Na: mamba.'
  - type: text
    content: ' ao anatin’ny rano be;'
  - type: text
    content: Ary nitsoriaka teny amin’ny oninao hianao
  - type: text
    content: Dia nanakobankobana ny rano tamin’ny tongotrao
  - type: text
    content: Ka nahaloto ny ony.
  '20':
  - type: text
    content: Any amin’ny voatrabaky ny sabatra no hiampatramparany;
  - type: text
    content: Ny sabatra dia efa voatolotra;
  - type: text
    content: Tariho izy mbamin’ny vahoakany maro be rehetra.
  '21':
  - type: text
    content: Izy sy ny nanampy azy no resahin’ireo malaza amin’ny lehilahy mahery any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' manao hoe:'
  - type: text
    content: Tafidina ka miampatra ny tsy voafora,
  - type: text
    content: Dia ireo voatrabaky ny sabatra.
  '22':
  - type: text
    content: Ao koa Asyria mbamin’ny vahoakany maro be rehetra;
  - type: text
    content: Manodidina azy ny fasany;
  - type: text
    content: Voatrabaka izy rehetra, samy lavon’ny sabatra;
  '23':
  - type: text
    content: Efa natao any am-paravodi-lavaka ny fasany,
  - type: text
    content: Ary ny vahoakany maro be dia manodidina ny fasany;
  - type: text
    content: Voatrabaka izy rehetra, samy lavon’ny sabatra,
  - type: text
    content: Dia ireo izay nahatonga tahotra tany amin’ny tanin’ny velona.
  '24':
  - type: text
    content: Ao koa Elama mbamin’ny vahoakany maro be rehetra manodidina ny fasany;
  - type: text
    content: Voatrabaka izy rehetra, samy lavon’ny sabatra,
  - type: text
    content: Ka tafidina tsy voafora ho any ambanin’ny tany,
  - type: text
    content: Dia ireo nahatonga ny fahatahorana azy tany amin’ny tanin’ny velona,
  - type: text
    content: Ary samy mitondra henatra miaraka amin’izay midina any an-davaka.
  '25':
  - type: text
    content: Teo amin’ny voatrabaka no nanaovana fandriana ho azy mbamin’ny vahoakany maro be rehetra;
  - type: text
    content: Manodidina azy ny fasany,
  - type: text
    content: Izy rehetra samy tsy voafora sady voatrabaky ny sabatra,
  - type: text
    content: Fa efa niely tany amin’ny tanin’ny velona ny fahatahorana azy,
  - type: text
    content: Ary samy mitondra henatra miaraka amin’izay midina any an-davaka izy;
  - type: text
    content: Ao amin’ny voatrabaka no nametrahany azy.
  '26':
  - type: text
    content: Ao koa Meseka-tobala mbamin’ny vahoakany maro be rehetra;
  - type: text
    content: Manodidina azy ny fasany;
  - type: text
    content: Samy tsy voafora izy rehetra sady voatrabaky ny sabatra,
  - type: text
    content: Satria nahatonga ny fahatahorana azy tany amin’ny tanin’ny velona izy.
  '27':
  - type: text
    content: Ary tsy hiara-miampatra
  - type: note
    content: Heb. mandry.
  - type: text
    content: ' amin’ny lehilahy mahery'
  - type: text
    content: Izay lavo isan’ny tsy voafora izy–
  - type: text
    content: Dia ireo tafidina any amin’ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola.
  - type: text
    content: ' ka mitondra ny fiadiany,'
  - type: text
    content: Sady voapetraka eo ambanin’ny lohany ny sabany,
  - type: text
    content: Ary ao amin’ny taolany ny helony,–
  - type: text
    content: Satria nampahatahotra ny mahery tany amin’ny tanin’ny velona izy.
  '28':
  - type: text
    content: Eny, hianao dia haripaka ao amin’ny tsy voafora
  - type: text
    content: Ka hiara-miampatra
  - type: note
    content: Heb. mandry.
  - type: text
    content: ' amin’ny voatrabaky ny sabatra.'
  '29':
  - type: text
    content: Ao koa Edoma mbamin’ny mpanjakany sy ny mpanapaka rehetra tao aminy,
  - type: text
    content: Izay natao ao amin’ny voatrabaky ny sabatra, na dia be aza ny heriny,
  - type: text
    content: Miara-miampatra
  - type: note
    content: Heb. mandry.
  - type: text
    content: ' amin’ny tsy voafora izy'
  - type: text
    content: Sy amin’izay midina any an-davaka.
  '3':
  - type: text
    content: 'Izao no lazain’i Jehovah Tompo:'
  - type: text
    content: Ny firenena betsaka tafatambatra no ho entiko mamelatra ny haratoko aminao,
  - type: text
    content: Ary hakarin’ireny amin’ny haratoko hianao,
  '30':
  - type: text
    content: Ao koa ireo andrianan’ny avaratra rehetra
  - type: text
    content: Sy ny Sidoniana rehetra,
  - type: text
    content: Izay niara-nidina tamin’ny voatrabaka;
  - type: text
    content: Menatra izy, na dia efa natahorana noho ny heriny aza,
  - type: text
    content: Ary miampatra
  - type: note
    content: Heb. mandry.
  - type: text
    content: ' tsy voafora ao amin’izay voatrabaky ny sabatra izy'
  - type: text
    content: Ka mitondra henatra ao amin’izay midina any an-davaka.
  '31':
  - type: text
    content: Ireny dia ho hitan’i Farao, ka dia hionona izy ny amin’ny vahoakany maro be.
  - type: text
    content: Voatrabaky ny sabatra Farao mbamin’ny miaramilany rehetra, hoy Jehovah Tompo.
  '32':
  - type: text
    content: Fa efa nahatonga ny fahatahorana azy
  - type: note
    content: 'Na: Ahy.'
  - type: text
    content: ' tany amin’ny tanin’ny velona Aho;'
  - type: text
    content: Ary Farao dia halevina
  - type: note
    content: Heb. hampandrina.
  - type: text
    content: ' ao amin’ny tsy voafora,'
  - type: text
    content: Miaraka amin’ireo voatrabaky ny sabatra,
  - type: text
    content: Dia Farao mbamin’ny vahoakany maro be rehetra, hoy Jehovah Tompo.
  '4':
  - type: text
    content: Dia hatsipiko eny an-tanety hianao
  - type: text
    content: Ary hariako any an-tsaha,
  - type: text
    content: Dia hampitangoroniko eo aminao ny voro-manidina rehetra,
  - type: text
    content: Ary homeko hivokisan’ny bibi-dia rehetra ny tenanao.
  '5':
  - type: text
    content: Haeliko eny an-tendrombohitra ny nofonao,
  - type: text
    content: Ary hofenoiko ny tenabenao
  - type: note
    content: Heb. hahavonao.
  - type: text
    content: ' ny lohasaha.'
  '6':
  - type: text
    content: Hataoko safotry ny ranao ny tany
  - type: text
    content: Hatramin’ny tendrombohitra aza;
  - type: text
    content: Ary ho feno anao ny ony.
  '7':
  - type: text
    content: 'Ary raha hovonoiko ny fahazavanao, dia hosaronako ny lanitra:'
  - type: text
    content: Hotafiako lamba fisaonana ny kintany;
  - type: text
    content: Ny masoandro hotakonako rahona,
  - type: text
    content: Ary ny volana tsy hangarangarana.
  '8':
  - type: text
    content: Eny, ireny fanazavana eny amin’ny lanitra ireny dia hotafiako lamba fisaonana avokoa noho ny aminao,
  - type: text
    content: Ary hosaronako aizina ny taninao, hoy Jehovah Tompo.
  '9':
  - type: text
    content: Hataoko mitebiteby koa ny fon’ny firenena maro,
  - type: text
    content: Raha hampandrenesiko ny firenena maro ny naharavanao,
  - type: text
    content: Dia any amin’ny tany izay tsy fantatrao.
