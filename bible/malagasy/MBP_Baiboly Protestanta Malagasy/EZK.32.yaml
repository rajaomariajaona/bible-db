document_id: EZK.32
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitomaniana noho ny nanjo an’i Farao sy ny vahoakany.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tamin’ny andro voalohany tamin’ny volana faharoa ambin’ny folo tamin’ny taona faharoa ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak’olona, manaova hira fahalahelovana ny amin’i Farao, mpanjakan’i Egypta, ka ataovy aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nanao ny tenanao ho tahaka ny liona tanora tamin’ny firenena hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanjo tahaka ny dragona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.2 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mamba.
    marker-yv: yv-n
  - type: text
    text: ' ao anatin’ny rano be;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nitsoriaka teny amin’ny oninao hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia nanakobankobana ny rano tamin’ny tongotrao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nahaloto ny ony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny firenena betsaka tafatambatra no ho entiko mamelatra ny haratoko aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hakarin’ireny amin’ny haratoko hianao,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia hatsipiko eny an-tanety hianao
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ary hariako any an-tsaha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hampitangoroniko eo aminao ny voro-manidina rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary homeko hivokisan’ny bibi-dia rehetra ny tenanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Haeliko eny an-tendrombohitra ny nofonao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hofenoiko ny tenabenao
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.5 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hahavonao.
    marker-yv: yv-n
  - type: text
    text: ' ny lohasaha.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hataoko safotry ny ranao ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny tendrombohitra aza;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho feno anao ny ony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha hovonoiko ny fahazavanao, dia hosaronako ny lanitra:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hotafiako lamba fisaonana ny kintany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny masoandro hotakonako rahona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny volana tsy hangarangarana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eny, ireny fanazavana eny amin’ny lanitra ireny dia hotafiako lamba fisaonana avokoa noho ny aminao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hosaronako aizina ny taninao, hoy Jehovah Tompo.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hataoko mitebiteby koa ny fon’ny firenena maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha hampandrenesiko ny firenena maro ny naharavanao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia any amin’ny tany izay tsy fantatrao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eny, hataoko talanjona anao ny firenena maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hipararetra noho ny aminao ny mpanjakany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha hantsodiko eo imasony ny sabatro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary samy hangovitra lalandava izy amin’ny fanahiany ny ainy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha mby amin’ny andro haharavanao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao no lazain’i Jehovah Tompo:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sabatry ny mpanjakan’i Babylona dia ho tonga aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny sabatry ny mahery, izay samy masiaka indrindra amin’ny firenena,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho entiko mandavo ny vahoakanao maro be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia horavany ny reharehan’i Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho fongotra ny vahoakany maro be rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Haringako koa ny biby fiompiny rehetra eny amoron’ny rano maro,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hanakobankobana azy intsony ny tongotry ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na handoto azy ny kitron’ny biby fiompy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hahenako
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.14 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hampandriko hadio.
    marker-yv: yv-n
  - type: text
    text: ' ny ranony,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hampandehaniko toy ny diloilo ny oniny,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah Tompo,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha hataoko lao ny tany Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hofoanako tsy hisy na inona na inona izay nahafeno azy teo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary haringako ny monina rehetra ao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho fantatra fa Izaho no Jehovah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izany no hira fahalahelovana hataon’ny olona;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny zanakavavin’ny firenena no hihira izany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho fahalahelovana an’i Egypta sy ny vahoakany maro be rehetra no hihirany izany, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary tamin’ny andro fahadimy ambin’ny folo tamin’ny volana tamin’ny taona faharoa ambin’ny folo dia tonga tamiko ny tenin’i Jehovah nanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ry zanak’olona, isaony ny vahoaka maro ben’i Egypta,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampidino izy mbamin’ny zanakavavin’ny firenena malaza
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho any ambanin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Miaraka amin’izay midina any an-davaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mihoatra noho ny an’iza moa ny hatsaran-tarehinao?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Midina, ka miampara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.19 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mandria.
    marker-yv: yv-n
  - type: text
    text: ' amin’izay tsy voafora.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Any amin’ny voatrabaky ny sabatra no hiampatramparany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny sabatra dia efa voatolotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tariho izy mbamin’ny vahoakany maro be rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izy sy ny nanampy azy no resahin’ireo malaza amin’ny lehilahy mahery any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.21 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' manao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tafidina ka miampatra ny tsy voafora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo voatrabaky ny sabatra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ao koa Asyria mbamin’ny vahoakany maro be rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manodidina azy ny fasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voatrabaka izy rehetra, samy lavon’ny sabatra;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Efa natao any am-paravodi-lavaka ny fasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny vahoakany maro be dia manodidina ny fasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voatrabaka izy rehetra, samy lavon’ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo izay nahatonga tahotra tany amin’ny tanin’ny velona.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ao koa Elama mbamin’ny vahoakany maro be rehetra manodidina ny fasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voatrabaka izy rehetra, samy lavon’ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tafidina tsy voafora ho any ambanin’ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo nahatonga ny fahatahorana azy tany amin’ny tanin’ny velona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary samy mitondra henatra miaraka amin’izay midina any an-davaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Teo amin’ny voatrabaka no nanaovana fandriana ho azy mbamin’ny vahoakany maro be rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manodidina azy ny fasany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izy rehetra samy tsy voafora sady voatrabaky ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa niely tany amin’ny tanin’ny velona ny fahatahorana azy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary samy mitondra henatra miaraka amin’izay midina any an-davaka izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ao amin’ny voatrabaka no nametrahany azy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ao koa Meseka-tobala mbamin’ny vahoakany maro be rehetra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manodidina azy ny fasany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy tsy voafora izy rehetra sady voatrabaky ny sabatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nahatonga ny fahatahorana azy tany amin’ny tanin’ny velona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary tsy hiara-miampatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mandry.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny lehilahy mahery'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay lavo isan’ny tsy voafora izy–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ireo tafidina any amin’ny fiainan-tsi-hita
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheola.
    marker-yv: yv-n
  - type: text
    text: ' ka mitondra ny fiadiany,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady voapetraka eo ambanin’ny lohany ny sabany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ao amin’ny taolany ny helony,–
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria nampahatahotra ny mahery tany amin’ny tanin’ny velona izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny, hianao dia haripaka ao amin’ny tsy voafora
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hiara-miampatra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.28 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mandry.
    marker-yv: yv-n
  - type: text
    text: ' amin’ny voatrabaky ny sabatra.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ao koa Edoma mbamin’ny mpanjakany sy ny mpanapaka rehetra tao aminy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay natao ao amin’ny voatrabaky ny sabatra, na dia be aza ny heriny,
- type: usfm
  marker: q1
  children:
