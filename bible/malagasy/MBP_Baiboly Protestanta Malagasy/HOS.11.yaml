document_id: HOS.11,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny hamindran’i Jehovah fo amin’ny Isiraely, na dia be aza ny helony.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: FONY mbola zaza Isiraely, dia tiako izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nantsoiko hiala tany Egypta ny zanako.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Harahin’ireny Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hierona toy ny liona Izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, Izy no hierona, dia hanatona amin-kovitra avy any andrefana ny zanaka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hanatona amin-kovitra avy any Egypta toy ny voronkely izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary avy any amin’ny tany Asyria toy ny voromailala;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hampitoeriko ao an-tranony izy, hoy Jehovah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nony nisy niantso azy, dia vao mainka nandositra ireny izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho an’ireo Bala kosa no amonoany zavatra hatao fanatitra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ho an’ny sarin-javatra voasokitra no andoroany ditin-kazo manitra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa Izaho no nampianatra an’i Efraima handeha–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, notrotroiko tamin’ny sandriko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: notrotroiny tamin’ny sandriny.
      marker-yv: yv-n
    - type: text
      text: ' aza izy–'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy fantany fa Izaho no nahasitrana azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tamin’ny kofehy fitarihana olona no nitarihako azy, dia tamin’ny mahazakan’ny fitiavana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary efa toy izay manainga ny fehim-bava
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: zioga.
      marker-yv: yv-n
    - type: text
      text: ' eo ambonin’ny valanoranony Aho'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanolo-kanina azy tsimoramora.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tsy hiverina ho any amin’ny tany Egypta izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Asyria no ho mpanjakany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria tsy nety nibebaka izy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary noho ny fisainany dia hisy sabatra hantsodina ao an-tanànany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka handrava sy handevona ny hidiny.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Minia miodina amiko ny oloko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary na dia antsoiny ho amin’ny Avo aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samy tsy mety miainga akory.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hataoko ahoana e no fahafoy anao, ry Efraima,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na ho fanolotra anao, ry Isiraely!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ahoana e no fanao anao ho tahaka an’i Adma!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataoko ahoana e no fametraka anao ho tahaka an’i Zeboima!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Onena ny foko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mafy loatra ny alaheloko.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsy hanontolo fo Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na handringana an’i Efraima intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra Aho, fa tsy olona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ny Iray Masina ao aminao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia tsy ho avy amim-pahatezerana mirehitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tsy hiditra ao an-tanàna Aho.
      marker-yv: yv-n
    - type: text
      text: ' Aho.'
