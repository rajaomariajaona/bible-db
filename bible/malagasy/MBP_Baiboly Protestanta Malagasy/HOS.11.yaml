document_id: HOS.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hamindran’i Jehovah fo amin’ny Isiraely, na dia be aza ny helony.
  - type: text
    content: FONY mbola zaza Isiraely, dia tiako izy,
  - type: text
    content: Ary nantsoiko hiala tany Egypta ny zanako.
  '10':
  - type: text
    content: Harahin’ireny Jehovah,
  - type: text
    content: Hierona toy ny liona Izy;
  - type: text
    content: Eny, Izy no hierona, dia hanatona amin-kovitra avy any andrefana ny zanaka.
  '11':
  - type: text
    content: Hanatona amin-kovitra avy any Egypta toy ny voronkely izy,
  - type: text
    content: Ary avy any amin’ny tany Asyria toy ny voromailala;
  - type: text
    content: Ka dia hampitoeriko ao an-tranony izy, hoy Jehovah.
  '2':
  - type: text
    content: Nony nisy niantso azy, dia vao mainka nandositra ireny izy;
  - type: text
    content: Ho an’ireo Bala kosa no amonoany zavatra hatao fanatitra,
  - type: text
    content: Ary ho an’ny sarin-javatra voasokitra no andoroany ditin-kazo manitra.
  '3':
  - type: text
    content: Fa Izaho no nampianatra an’i Efraima handeha–
  - type: text
    content: Eny, notrotroiko tamin’ny sandriko
  - type: note
    content: Heb. notrotroiny tamin’ny sandriny.
  - type: text
    content: ' aza izy–'
  - type: text
    content: Nefa tsy fantany fa Izaho no nahasitrana azy.
  '4':
  - type: text
    content: Tamin’ny kofehy fitarihana olona no nitarihako azy, dia tamin’ny mahazakan’ny fitiavana;
  - type: text
    content: Ary efa toy izay manainga ny fehim-bava
  - type: note
    content: Heb. zioga.
  - type: text
    content: ' eo ambonin’ny valanoranony Aho'
  - type: text
    content: Ka nanolo-kanina azy tsimoramora.
  '5':
  - type: text
    content: Tsy hiverina ho any amin’ny tany Egypta izy,
  - type: text
    content: Fa Asyria no ho mpanjakany,
  - type: text
    content: Satria tsy nety nibebaka izy.
  '6':
  - type: text
    content: Ary noho ny fisainany dia hisy sabatra hantsodina ao an-tanànany
  - type: text
    content: Ka handrava sy handevona ny hidiny.
  '7':
  - type: text
    content: Minia miodina amiko ny oloko;
  - type: text
    content: Ary na dia antsoiny ho amin’ny Avo aza izy,
  - type: text
    content: Samy tsy mety miainga akory.
  '8':
  - type: text
    content: Hataoko ahoana e no fahafoy anao, ry Efraima,
  - type: text
    content: Na ho fanolotra anao, ry Isiraely!
  - type: text
    content: Hataoko ahoana e no fanao anao ho tahaka an’i Adma!
  - type: text
    content: Hataoko ahoana e no fametraka anao ho tahaka an’i Zeboima!
  - type: text
    content: Onena ny foko,
  - type: text
    content: Mafy loatra ny alaheloko.
  '9':
  - type: text
    content: Tsy hanontolo fo Aho,
  - type: text
    content: Na handringana an’i Efraima intsony;
  - type: text
    content: Fa Andriamanitra Aho, fa tsy olona,
  - type: text
    content: Dia ny Iray Masina ao aminao,
  - type: text
    content: Ka dia tsy ho avy amim-pahatezerana mirehitra
  - type: note
    content: 'Na: tsy hiditra ao an-tanàna Aho.'
  - type: text
    content: ' Aho.'
