document_id: 1CH.11,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanosorana an’i Davida ho mpanjaka handimby an’i Saoly, sy ny nahazoany an’i Jerosalema.
  - type: text
    content: 'ARY dia nivory teo amin’i Davida tao Hebrona ny Isiraely rehetra ka nanao hoe: Indreto izahay, fa taolanao sy nofonao. '
  '10':
  - type: text
    content: 'ARY izao no lohan’ny lehilahy maherin’i Davida izay nifikitra mafy taminy tamin’ny fanjakany, mbamin’ny Isiraely rehetra, hampanjaka azy araka ny tenin’i Jehovah ny amin’ny Isiraely. '
  '11':
  - type: text
    content: 'Dia izao no isan’ny lehilahy maherin’i Davida: Jasobeama, zanak’i Hakmony, lehiben’ny mpanafika malaza; izy no namely telon-jato lahy tamin’ny lefona ka naharingana azy tamin’ny ady indray mandeha monja.'
  '12':
  - type: text
    content: 'Ary ny manarakaraka azy dia Eleazara, zanak’i Dodo Ahohita, anankiray amin’izy telo lahy mahery. '
  '13':
  - type: text
    content: 'Izy dia teo amin’i Davida tao Efesa-damima, raha vory teo ny Filistina hiady, ary ny tany nisy vary hordea maniry, ary ny olona nandositra ny Filistina. '
  '14':
  - type: text
    content: Fa nijanona teo afovoan’io tany io kosa Eleazara ka nahazo io ary namono ny Filistina, ka dia nanao famonjena lehibe Jehovah.
  '15':
  - type: text
    content: 'Ary nisy telo lahy malaza tamin’ny telo-polo nidina nankeo amin’ny vatolampy ho any amin’i Davida tamin’ny zohin’i Adolama; ary ny miaramilan’ny Filistina nitoby tao amin’ny Lohasahan’ny Refaïta. '
  '16':
  - type: text
    content: 'Ary Davida dia tao amin’ny batery fiarovana tamin’izay, ary ny miaramilan’ny Filistina kosa dia tao Betlehema. '
  '17':
  - type: text
    content: 'Ary Davida naniry ka nanao hoe: Enga anie ka hisy hampisotro rano ahy avy amin’ny fantsakana ao Betlehema, ilay ao akaikin’ny vavahady. '
  '18':
  - type: text
    content: 'Ary izy telo lahy ireo namaky teo amin’ny miaramilan’ny Filistina ka nanovo rano tao amin’ny fantsakana tao Betlehema, ilay tao akaikin’ny vavahady, dia nentiny ho any amin’i Davida. Kanjo tsy nety nisotro izy, fa naidiny ho an’i Jehovah. '
  '19':
  - type: text
    content: 'Fa hoy izy: Sanatria amiko eo anatrehan’Andriamanitra raha hanao izany; hisotro ny ran’ireto olona nanao vi-very ny ainy ireto va aho? Fa nanao vi-very ny ainy izy ireo tamin’ny nakany ity. Ka dia tsy nety nisotro izy. Izany zavatra izany no nataon’ireo telo lahy mahery ireo.'
  '2':
  - type: text
    content: 'Hatry ny fahiny ihany koa, fony Saoly mbola nanjaka aza, dia hianao ihany no mpitarika ny Isiraely nivoaka sy niditra; ary hoy Jehovah Andriamanitrao taminao; Hianao no ho mpiandry ny Isiraely oloko, ary hianao no ho mpanapaka azy. '
  '20':
  - type: text
    content: 'Ary Abisay, rahalahin’i Joaba, no lehibe tamin’izy telo lahy; fa izy koa namely telon-jato lahy tamin’ny lefona ka nahafaty azy, ka dia izy no nalaza tamin’izy telo lahy. '
  '21':
  - type: text
    content: Eny, tamin’izy telo lahy dia izy no nanana voninahitra mihoatra noho ny azy roa lahy, fa izy no lehibeny; nefa tsy nahomby azy telo lahy teo izy.
  '22':
  - type: text
    content: Ary Benaia, zanak’i Joiada, zanaky ny lehilahy mahay tany Kabzela, izay nahavita asa be, izy no nahafaty ny roa lahy mahery
  - type: note
    content: Heb. lionan’Andriamanitra.
  - type: text
    content: ' tany Moaba; ary izy koa no nidina namono ny liona tao anatin’ny lavaka fantsakana tamin’ilay andro nisy orampanala iny. '
  '23':
  - type: text
    content: 'Ary izy koa no namono ilay Egyptiana makadiry, izay dimy hakiho ny halavany, nefa teny an-tànan’ilay Egyptiana nisy lefona tahaka ny vodi-tenon’ny mpanenona; nefa namoro-tsahan’i Benaia tamin’ny tehiny ihany izy, dia nosarihany ny lefona teny an-tànan’ilay Egyptiana, ka iny lefony iny ihany no namonoany azy. '
  '24':
  - type: text
    content: 'Izany zavatra izany no nataon’i Benaia, zanak’i Joiada, ary tamin’izy telo lahy mahery dia izy no nalaza. '
  '25':
  - type: text
    content: Indro fa be voninahitra tamin’ny telo-polo lahy izy, nefa tsy nahomby azy telo lahy teo; ary Davida nanao azy ho isan’ny mpanolo-tsaina azy.
  '26':
  - type: text
    content: 'Ary ny lehilahy mahery dia Asahela, rahalahin’i Joaba, sy Elanana, zanak’i Dodo, avy any Betlehema, '
  '27':
  - type: text
    content: 'sy Samota Harorita sy Haleza Pelonita '
  '28':
  - type: text
    content: 'sy Ira, zanak’Ikesy Tekoita, sy Abiezera Anatotita '
  '29':
  - type: text
    content: 'sy Sibekay Hosatita sy Ely Ahohita '
  '3':
  - type: text
    content: Eny, tonga tao amin’ny mpanjaka tao Hebrona ny loholon’ny Isiraely rehetra; ary Davida nanao fanekena taminy tao Hebrona teo anatrehan’i Jehovah; ary dia nanosotra an’i Davida ho mpanjakan’ny Isiraely izy araka ny tenin’i Jehovah izay nampilazainy an’i Samoela.
  '30':
  - type: text
    content: 'sy Maharay Netofatita sy Heleda, zanak’i Bana Netofatita, '
  '31':
  - type: text
    content: 'sy Itahy, zanak’i Ribay avy any Gibean’ny taranak’i Benjamina, sy Benaia Piratonita '
  '32':
  - type: text
    content: 'sy Horay, any amin’ny lohasahan-driak’i Gasy, sy Abiela Arbatita '
  '33':
  - type: text
    content: 'sy Azmaveta Baharomita sy Eliaba Salbonita '
  '34':
  - type: text
    content: 'sy ny zanak’i Hasema Gizonita sy Jonatana, zanak’i Sage Hararita, '
  '35':
  - type: text
    content: 'sy Ahiama, zanak’i Sakara Hararita, sy Elifala, zanak’i Ora, '
  '36':
  - type: text
    content: 'sy Hefera Mekeratita sy Ahia Pelonita '
  '37':
  - type: text
    content: 'sy Hezro Karmelita sy Naray, zanak’i Ezbay, '
  '38':
  - type: text
    content: 'sy Joela, rahalahin’i Natana, sy Mibara, zanak’i Hagry. '
  '39':
  - type: text
    content: 'sy Zaleka Amonita sy Naharay Berotita, mpitondra ny fiadian’i Joaba, zanak’i Zeroia, '
  '4':
  - type: text
    content: 'Ary Davida sy ny Isiraely rehetra nankany Jerosalema (Jebosa izany); ary tao ny Jebosita tompon-tany. '
  '40':
  - type: text
    content: 'sy Ira Jitrita sy Gareba Jitrita '
  '41':
  - type: text
    content: 'sy Oria Hetita sy Zabada, zanak’i Ahelay, '
  '42':
  - type: text
    content: 'sy Adina, zanak’i Siza Robenita, mpifehy ny Robenita, ary ny namany telo-polo lahy koa, '
  '43':
  - type: text
    content: 'sy Hanana, zanak’i Maka, sy Josafata Mitnita '
  '44':
  - type: text
    content: 'sy Ozia Astartita ary Sama sy Jeiela, zanak’i Hotama Aroerita, '
  '45':
  - type: text
    content: 'sy Jediaela, zanak’i Simry, sy Joha Tizita rahalahiny '
  '46':
  - type: text
    content: 'sy Eliala Mahavita sy Jeribay sy Josavia, zanak’i Elnama, sy Jitma Moabita '
  '47':
  - type: text
    content: sy Eliala sy Obeda ary Jasiela Mezobaita.
  '5':
  - type: text
    content: 'Ary hoy ny mponina tao Jebosa tamin’i Davida: Tsy ho tafiditra eto hianao. Kanjo afak’i Davida ihany ny batery fiarovana, dia Ziona (Tanànan’i Davida izany). '
  '6':
  - type: text
    content: 'Ary hoy Davida: Na iza na iza no hamely voalohany ny Jebosita, dia izy no ho lohany sy ho komandy. Ary Joaba, zanak’i Zeroia, no niakatra voalohany, ka dia izy no lohany.'
  '7':
  - type: text
    content: 'Dia nitoetra tao anatin’ny batery fiarovana Davida, ka izany no nanaovana ny anarany hoe Tanànan’i Davida. '
  '8':
  - type: text
    content: Ary nandrafitra ny manodidina ny tanàna hatrany Milo
  - type: note
    content: Heb. fiarovana.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Koa dia nandroso nihalehibe Davida; fa Jehovah, Tompon’ny maro, no nomba azy.
  - type: heading
    content: Ny amin’ny lehilahy maherin’i Davida izay niady hampanjaka azy.
