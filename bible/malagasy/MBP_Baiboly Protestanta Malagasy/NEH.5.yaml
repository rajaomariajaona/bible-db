document_id: NEH.5,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny nataon’i Nehemia hampitsahatra ny fampahoriana ny olona malahelo.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY nitaraina mafy ny lehilahy sy ny vadiny ny amin’ny Jiosy rahalahiny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izaho sy ny rahalahiko ary ny zatovoko efa nampanàna vola sy vary taminy; koa masìna hianareo, aoka re hafointsika izany trosa izany; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: eny, masìna hianareo, ampodio aminy anio ihany ny taniny sy ny tanimboalobony sy ny taninolivany sy ny tranony sy ny ampahazaton’ny vola sy ny vary ary ny divay sy ny diloilo izay nampisamborinareo azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy ireo: Eny, hampodinay izany, ka tsy haka na inona na inona aminy izahay, fa hanao araka izay lazainao. Dia niantso ny mpisorona aho ka nampianiana ireo hanao araka izany teny izany, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'sady nanakopaka ny lambako teo am-pofoako aho ka nanao hoe: Ho tahaka izany anie no hanakopahan’Andriamanitra ny olona rehetra izay tsy mahatanteraka izany teny izany hiala amin’ny tranony sy ny vokatry ny asany; eny, hakopaka ka hofoanana tahaka izany anie izy. Ary ny fiangonana rehetra nanao hoe: Amena; sady nidera an’i Jehovah izy. Ary dia nanao araka izany teny izany ny olona.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary koa, hatramin’ny andro nanendrena ahy ho governora amin’ny tany Joda, dia hatramin’ny taona faharoa-polo ka hatramin’ny taona faharoa amby telo-polo nanjakan’i Artaksersesy, dia roa ambin’ny folo taona izay, izaho sy ny rahalahiko tsy mba nihinana izay anjara-fiveloman’ny governora. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa ireo governora fahiny izay teo alohako ireo dia nahavaky tratra ny olona ka nampandoa azy hanina sy divay ary sekely volafotsy efa-polo koa; eny, na dia ny zatovony aza dia nisetrasetra tamin’ny olona; fa izaho tsy mba nanao izany noho ny fahatahorako an’Andriamanitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Eny, izaho naharitra nanao io mànda io ihany, sady tsy nividy tany izahay; ary ny zatovoko rehetra dia voangona hanao ny asa.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary teo amin’ny latabatro nisy Jiosy sy mpanapaka dimam-polo amby zato afa-tsy izay nankeo aminay avy tamin’ny firenena manodidina anay. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary ny namboarina ho ahy isan-andro dia omby iray sy ondry matavy enina ary vorona koa, ary indray mandeha isan-kafoloana dia nasiana divay samy hafa betsaka; nefa na dia izany aza, ny anjara-fiveloman’ny governora dia tsy mba nilaiko, satria nahavesatra ny olona ny fanompoana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsarovy aho ka hasoavy, ry Andriamanitro ô, araka izay rehetra nataoko ho an’ity firenena ity.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa nisy nanao hoe: Maro izahay mbamin’ny zanakai-lahy sy ny zanakai-vavy; koa ta-hahazo vary izahay mba hohaninay hivelomanay. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nisy koa nanao hoe: Ny taninay sy ny tanimboalobokay ary ny tranonay dia efa nataonay antoka, koa ta-hahazo vary izahay noho ny mosary. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nisy koa indray nanao hoe: Efa nisambo-bola izahay handoavanay ny hetran’ny mpanjaka, ary ny taninay sy ny tanimboalobokay no nataonay antoka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Kanefa mba tahaka ny nofon’ny rahalahinay ihany ny nofonay, ary tahaka ny zanany ihany ny zanakay; fa na dia izany aza, indreo izahay manetry ny zanakai-lahy sy ny zanakai-vavy ho andevo, ary ny sasany amin’ny zanakai-vavy dia efa andevo rahateo; nefa tsy manan-ko enti-manavotra azy izahay, satria lasan’ny sasany ny taninay sy ny tanimboalobokay.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia tezitra indrindra aho, raha nahare ny fitarainany sy izany teny izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nihevitra tao am-poko aho, ka dia nananatra mafy ny manan-kaja sy ny mpanapaka ka nanao taminy hoe: Samy mampanàna zavatra amin’ny rahalahinareo avy hianareo. Dia nanendry fiangonan-dehibe aho hitsarana azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy izaho taminy: Izahay araka izay tratry ny nanananay dia efa nanavotra ny Jiosy rahalahinay, izay efa namidy tamin’ny jentilisa; fa hianareo kosa moa hivarotra ny rahalahinareo va, ka hamidy aminay va izy? Dia sina izy, fa tsy hitany izay havaliny.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy koa aho: Tsy tsara izao ataonareo izao; moa tsy tokony handeha amin’ny fahatahorana an’Andriamanitsika va hianareo noho ny fanaratsian’ny jentilisa fahavalontsika? '
