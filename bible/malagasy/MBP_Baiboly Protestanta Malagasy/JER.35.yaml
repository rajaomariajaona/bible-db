document_id: JER.35
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny Rekabita.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no teny tonga tamin’i Jeremia avy tamin’i Jehovah tamin’ny andron’i Joiakima, zanak’i Josia, mpanjakan’ny Joda, nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mankanesa any amin’ny taranak’i Rekaba, ary mitenena aminy, dia ampidiro ao an-tranon’i Jehovah, ao amin’ny efi-trano anankiray, izy, ka omeo divay hosotroiny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nalaiko Jazania, zanak’i Jeremia, zanak’i Habazinia, sy ny rahalahiny sy ny zanany rehetra mbamin’ny taranak’i Rekaba rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka nampidiriko ho ao amin’ny tranon’i Jehovah izy, dia tao amin’ny efi-tranon’ny taranak’i Hanana, zanak’i Jigdalia, lehilahin’Andriamanitra, izay ao anilan’ny efi-tranon’ny mpanapaka, ao ambonin’ny efi-tranon’i Mahaseia, zanak’i Saloma, mpiandry varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary norosoako kapoaka sy siny feno divay teo anoloan’ny taranak’i Rekaba ka nolazaiko taminy hoe: Misotroa divay hianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy kosa ireo: Tsy hisotro divay izahay; fa Jonadaba, zanak’i Rekaba, razanay, efa nanafatra anay hoe: Aza mba misotro divay hianareo na ny taranakareo mandrakizay; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary aza manao trano hianareo, na mamafy voan-javatra, na manao tanimboaloboka, na mety hanana izany akory; fa lay no itoeronareo amin’ny andronareo rehetra, mba ho ela velona hianareo amin’ny tany izay ivahinianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nankatoavinay izany tenin’i Jonadaba, zanak’i Rekaba, razanay izany, tamin’izay rehetra nanafarany anay, mba tsy hisotro divay amin’ny andronay rehetra, na izahay, na ny vadinay, na ny zanakai-lahy, na ny zanakai-vavy; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary tsy hanao trano hitoeranay, na hanana tanimboly, na saha, na voan-javatra izahay; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa efa nitoetra an-day izahay araka izay rehetra nanafaran’i Jonadaba razanay anay. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha nananika ny tany Nebokadnezara, mpanjakan’i Babylona, dia hoy izahay: Andeha isika hankany Jerosalema handositra ny miaramilan’ny Kaldeana sy ny miaramilan’ny Syriana, ka dia izany no itoerany eto Jerosalema.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia tonga tamin’i Jeremia ny tenin’i Jehovah hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Andeha, lazao amin’ny Joda sy amin’ny mponina any Jerosalema hoe: Tsy hino anatra hitandrina ny teniko va hianareo? hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'To ny tenin’i Jonadaba, zanak’i Rekaba, izay nanafarany ny zanany tsy hisotro divay, fa tsy misotro tokoa izy mandraka andro-any, fa mahatana ny hafa-drazany; ary Izaho efa niteny taminareo,–eny, nifoha maraina koa Aho ka niteny, nefa tsy nihaino hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nirahiko taminareo koa ny mpaminany mpanompoko rehetra,–eny, nifoha maraina koa Aho ka naniraka azy hanao hoe: Samia miala amin’ny làlanareo ratsy hianareo ankehitriny, ary ataovy tsara ny ataonareo, ary aza manaraka andriamani-kafa hanompo azy, dia honina amin’ny tany izay nomeko anareo sy ny razanareo hianareo nefa tsy nanongilana ny sofinareo na nihaino Ahy hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eny, nankatoavin’ny zanak’i Jonadaba, zanak’i Rekaba, ny hafa-drazany, izay nanafarany azy; fa ity firenena ity kosa tsy mba nihaino Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa izao no lazain’i Jehovah, Andriamanitry ny maro, Andriamanitry ny Isiraely Indro, hataoko mihatra amin’ny Joda sy ny mponina rehetra any Jerosalema ny loza rehetra izay nolazaiko hatao aminy, satria efa niteny taminy Aho, fa tsy nihaino izy, ary niantso azy Aho, fa tsy namaly izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny taranak’i Rekaba dia nilazan’i Jeremia hoe: Izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Noho ny nahatananareo ny hafatr’i Jonadaba razanareo sy ny nitandremanareo ny hafany rehetra ary ny nanaovanareo araka izay rehetra nanafarany anareo, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely: Jonadaba, zanak’i Rekaba, tsy ho diso zanakalahy hitsangana eo anatrehako mandrakizay.'
