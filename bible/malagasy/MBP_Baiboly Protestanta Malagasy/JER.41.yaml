document_id: JER.41,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin’ny volana fahafito dia tonga tany amin’i Gedalia, zanak’i Ahikama, tao Mizpa Isimaela, zanak’i Netania, zanak’i Elisama, taranaky ny mpanjaka, sy ny mpanapaky ny mpanjaka; ary nisy folo Iahy niaraka taminy; ary niara-nihinan-kanina tao Mizpa izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nentin’Isimaela ho babo ny olona rehetra izay sisa tao Mizpa, na ny vehivavy zanak’andriana, na ny olona rehetra izay sisa tao Mizpa, izay napetrak’i Nebozaradana, lehiben’ny mpiambina, tao amin’i Gedalia, zanak’i Ahikama; eny, Isimaela, zanak’i Netania, nitondra azy ireny ho babo, ka dia lasa niala nankany amin’ny taranak’i Amona izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony ren’i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy ny ratsy rehetra nataon’Isimaela, zanak’i Netania, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia novoriny ny olona rehetra ka nentiny niady tamin’Isimaela, zanak’i Netania ary hitany teo amoron’ny kamory
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.12 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny rano be.
      marker-yv: yv-n
    - type: text
      text: ' ao Gibeona izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona rehetra izay tao amin’Isimaela, nony nahita an’i Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy, dia faly. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona rehetra izay nentin’Isimaela ho babo avy tany Mizpa dia nitodika ka niverina nanatona an’i Johanana, zanak’i Karea. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Isimaela, zanak’i Netania, sy ny olona valo lahy kosa dia afaka nandositra an’i Johanana ka lasa nankany amin’ny taranak’i Amona.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Johanana, zanak’i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy dia nitondra ny olona rehetra izay voavonjiny ho afaka tamin’Isimaela, zanak’i Netania, avy tany Mizpa, taorian’ny namonoany an’i Gedalia, zanak’i Ahikama, dia ny lehilahy mpiady sy ny zaza amim-behivavy ary ny tandapa, izay nentiny niverina avy tany Gibeona; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary dia lasa izy ireo ka nitoetra tao Gerota-kimama,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: an-tranom-bahinin’i Kimama.
      marker-yv: yv-n
    - type: text
      text: ' izay ao akaikin’i Betlehema, mba handehanany hankany Egypta '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tsy ho tratry ny Kaldeana; fa natahotra azy izy, satria Isimaela, zanak’i Netania, efa namono an’i Gedalia, zanak’i Ahikama, izay notendren’ny mpanjakan’i Babylona ho mpanapaka ny tany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana Isimaela, zanak’i Netania, sy ireo olona folo lahy niaraka taminy ka namely sabatra an’i Gedalia, zanak’i Ahikama, zanak’i Safana, dia nahafaty ilay efa nataon’ny mpanjakan’i Babylona ho mpanapaka ny tany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Jiosy rehetra izay tao aminy, dia izay tao amin’i Gedalia tao Mizpa, sy ny Kaldeana izay hita tao ary ny miaramila dia novonoin’Isimaela avokoa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony ampitson’ny andro namonoana an’i Gedalia, raha tsy mbola nisy olona nahalala izany, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nisy valo-polo lahy avy tany Sekema sy Silo ary Samaria, izay samy mihara-bolom-bava, sady voatriatra ny fitafiany, ary voatetika ny tenany, nitondra fanatitra sy ditin-kazo mani-pofona teny an-tànany ho entina ao an-tranon’i Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Isimaela, zanak’i Netania, dia nivoaka avy tao Mizpa hitsena azy sady nitomany teny am-pandehanana, ary nony efa nihaona taminy izy, dia niteny taminy hoe: Mankanesa any amin’i Gedalia, zanak’i Ahikama. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga tao afovoan’ny tanàna izy ireo, dia novonoin’Isimaela, zanak’i Netania, mbamin’ny olona nanaraka azy izy ka nariany tao anaty lavaka famorian-drano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy folo lahy tamin’ireo nanao tamin’Isimaela hoe: Aza vonoina izahay; fa manan-tahiry any an-tsaha izahay, dia vary tritika sy vary hordea sy diloilo ary tantely. Ka dia nijanona izy, fa tsy namono ireo tahaka ny efa nataony tamin’ny namany.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ilay lavaka nanarian’Isimaela ny fatin’ny olona rehetra, izay novonoiny ho eo anilan’i Gedalia, dia ilay efa nataon’i Asa mpanjaka mba hiereny an’i Basa, mpanjakan’ny Isiraely, dia nofenoin’Isimaela, zanak’i Netania, faty.
