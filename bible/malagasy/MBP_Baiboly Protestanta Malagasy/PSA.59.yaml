document_id: PSA.59,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan’izay misy fahavalo maro mitady hahafaty azy.
  - type: text
    content: Ho an’ny mpiventy hira. Al-tasheth. Miktama nataon’i Davida, fony Saoly naniraka, ka nisy niambina ny trano hamonoana azy.
  - type: text
    content: AFAHO amin’ny fahavaloko aho, Andriamanitro ô;
  - type: text
    content: Asondroty eo amin’ny avo aho tsy ho azon’izay miodina amiko.
  '10':
  - type: text
    content: Andriamanitra, Izay mamindra fo amiko, no hialoha ahy;
  - type: text
    content: Hataon’Andriamanitra faly mijery ny amin’ny fahavaloko aho.
  '11':
  - type: text
    content: Aza mahafaty azy Hianao, fandrao hanadino izany ny fireneko;
  - type: text
    content: Ampirenireneo amin’ny herinao izy, ka aripaho, ry Tompo ô, Ampinganay.
  '12':
  - type: text
    content: Ny fahotan’ny vavany dia ny tenin’ny molony;
  - type: text
    content: Aoka hosamborina amin’ny fireharehany izy,
  - type: text
    content: Eny, noho ny ozona sy ny lainga ataony.
  '13':
  - type: text
    content: Aringano an-katezerana izy, aringano mba tsy ho ao intsony;
  - type: text
    content: Ary aoka ho fantany fa Andriamanitra no manapaka eo amin’i Jakoba
  - type: text
    content: Ka hatramin’ny faran’ny tany.
  - type: text
    content: '[Sela.]'
  '14':
  - type: text
    content: Ary miverina nony hariva ireny ka mierona tahaka ny alika
  - type: text
    content: Sady mandehandeha eran’ny tanàna.
  '15':
  - type: text
    content: Miriorio mitady hanina izy;
  - type: text
    content: Raha tsy voky izy, dia any ihany mandritra ny alina.
  '16':
  - type: text
    content: Fa izaho kosa dia hihira ny herinao,
  - type: text
    content: Ary hihoby ny famindramponao nony maraina,
  - type: text
    content: Satria fiarovana avo ho ahy Hianao.
  - type: text
    content: Ary fandosirako amin’ny andro fahoriana.
  '17':
  - type: text
    content: Ry Heriko ô, Hianao no hankalazaiko;
  - type: text
    content: Fa Andriamanitra no fiarovana avo ho ahy, dia Andriamanitra Izay mamindra fo amiko.
  '2':
  - type: text
    content: Afaho amin’ny mpanao ratsy aho,
  - type: text
    content: Ary vonjeo amin’ny mpandatsa-dra.
  '3':
  - type: text
    content: Fa, indro, manotrika hahazo ny aiko izy;
  - type: text
    content: Miangona hanohitra ahy ny mahery,
  - type: text
    content: Nefa tsy fahadisoako ary tsy fahotako, Jehovah ô.
  '4':
  - type: text
    content: Tsy heloko
  - type: note
    content: Heb. heloka.
  - type: text
    content: ' no ihazakazahany sy iomanany,'
  - type: text
    content: Koa mifohaza hitsena ahy, ka jereo.
  '5':
  - type: text
    content: Ary Hianao, Jehovah ô, Andriamanitry ny maro, Andriamanitry ny Isiraely,
  - type: text
    content: Mifohaza hitsara ny firenen-tsamy hafa;
  - type: text
    content: Aza mamindra fo amin’izay mpivadika ratsy fanahy.
  - type: text
    content: '[Sela.]'
  '6':
  - type: text
    content: Miverina nony hariva ireny ka mierona tahaka ny alika
  - type: text
    content: Sady mandehandeha eran’ny tanàna.
  '7':
  - type: text
    content: Indro, mirezadrezatra amin’ny vavany izy;
  - type: text
    content: Sabatra no eo amin’ny molony,
  - type: text
    content: 'Fa iza, '
  - type: text
    content: hono,
  - type: text
    content: ' no handre?'
  '8':
  - type: text
    content: Kanjo Hianao, Jehovah ô, hihomehy azy;
  - type: text
    content: Hianao haneso ny firenena rehetra.
  '9':
  - type: text
    content: Koa noho ny herin’ireny dia hiandry Anao aho;
  - type: text
    content: Fa Andriamanitra no fiarovana avo ho ahy.
