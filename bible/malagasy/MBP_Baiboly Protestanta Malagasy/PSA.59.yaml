document_id: PSA.59,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fitarainan’izay misy fahavalo maro mitady hahafaty azy.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Al-tasheth. Miktama nataon’i Davida, fony Saoly naniraka, ka nisy niambina ny trano hamonoana azy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: AFAHO amin’ny fahavaloko aho, Andriamanitro ô;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asondroty eo amin’ny avo aho tsy ho azon’izay miodina amiko.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Andriamanitra, Izay mamindra fo amiko, no hialoha ahy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hataon’Andriamanitra faly mijery ny amin’ny fahavaloko aho.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Aza mahafaty azy Hianao, fandrao hanadino izany ny fireneko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ampirenireneo amin’ny herinao izy, ka aripaho, ry Tompo ô, Ampinganay.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny fahotan’ny vavany dia ny tenin’ny molony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aoka hosamborina amin’ny fireharehany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, noho ny ozona sy ny lainga ataony.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aringano an-katezerana izy, aringano mba tsy ho ao intsony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary aoka ho fantany fa Andriamanitra no manapaka eo amin’i Jakoba
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hatramin’ny faran’ny tany.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary miverina nony hariva ireny ka mierona tahaka ny alika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mandehandeha eran’ny tanàna.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Miriorio mitady hanina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha tsy voky izy, dia any ihany mandritra ny alina.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa izaho kosa dia hihira ny herinao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hihoby ny famindramponao nony maraina,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria fiarovana avo ho ahy Hianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary fandosirako amin’ny andro fahoriana.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ry Heriko ô, Hianao no hankalazaiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra no fiarovana avo ho ahy, dia Andriamanitra Izay mamindra fo amiko.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Afaho amin’ny mpanao ratsy aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary vonjeo amin’ny mpandatsa-dra.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa, indro, manotrika hahazo ny aiko izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miangona hanohitra ahy ny mahery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy fahadisoako ary tsy fahotako, Jehovah ô.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy heloko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '59.4 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: heloka.
      marker-yv: yv-n
    - type: text
      text: ' no ihazakazahany sy iomanany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa mifohaza hitsena ahy, ka jereo.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary Hianao, Jehovah ô, Andriamanitry ny maro, Andriamanitry ny Isiraely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mifohaza hitsara ny firenen-tsamy hafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aza mamindra fo amin’izay mpivadika ratsy fanahy.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Miverina nony hariva ireny ka mierona tahaka ny alika
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady mandehandeha eran’ny tanàna.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Indro, mirezadrezatra amin’ny vavany izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sabatra no eo amin’ny molony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fa iza, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hono,
    - type: text
      text: ' no handre?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanjo Hianao, Jehovah ô, hihomehy azy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao haneso ny firenena rehetra.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa noho ny herin’ireny dia hiandry Anao aho;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Andriamanitra no fiarovana avo ho ahy.
