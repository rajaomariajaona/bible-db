document_id: HOS.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Raha ta-hanasitrana ny Isiraely Aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia miseho ny helok’i Efraima sy ny faharatsian’i Samaria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa manao fitaka izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miditra ny mpangalatra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny jiolahy manao andiany dia mandehandeha eny ivelany.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary ny avonavon’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ny Reharehany.
      marker-yv: yv-n
    - type: text
      text: ' Isiraely dia vavolombelona manameloka azy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa, na dia izany rehetra izany aza, dia tsy miverina amin’i Jehovah Andriamaniny ihany izy, na mitady Azy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary Efraima dia efa tonga tahaka ny voromailala adaladala tsy manan-tsaina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa miantso an’i Egypta izy ary efa mankany Asyria.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha vao mandeha izy, dia hovelariko aminy ny fandrika haratoko,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hampidiniko ao toy ny voromanidina izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofaizako izy araka izay efa nambara tamin’ny fiangonany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Lozan’ireny! satria nandositra Ahy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haringana izy! satria niodina tamiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izaho ta-hanavotra azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa izy kosa–dia lainga no entiny milaza Ahy.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary tsy mitaraina amiko ao am-pony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa midradradradra foana ao am-pandriany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mitangorona hitady vary sy ranom-boaloboka izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia miodina miala amiko.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary Izaho no nampianatra sy nanatanjaka ny sandriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa izy kosa dia misaintsain-dratsy Ahy,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Miverina ihany izy, nefa tsy ho amin’ny Avo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tonga tahaka ny tsipìka manjiona izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ho lavon-tsabatra ny mpanapaka azy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny firehitry ny lelany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izany no ho latsany any amin’ny tany Egypta.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary tsy heveriny ao am-po
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ataony hoe.
      marker-yv: yv-n
    - type: text
      text: ' fa tsarovako ny faharatsiany rehetra;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia gejan’ny nataony izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa tonga eo anatrehako izany.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Amin’ny faharatsiany no ampifaliany ny mpanjaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary amin’ny laingany ny mpanapaka.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Samy mpaka vadin’olona avokoa izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka toy ny fatana voafanan’ny mpanendy mofo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitsahatra tsy misorona afo
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatramin’ny ametafetany ny koba ka ambara-pitombony.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tamin’ny andron’ny mpanjakantsika dia nankarary tena tamin’ny fanafanan’ny herin’ny divay ny mpanapaka;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nifandray tànana tamin’ny mpaniratsira ny mpanjaka.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa entin’ireo ho ao am-panotrehana ny fony, toy ny ho ao amin’ny fatana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandritra ny alina dia matory ihany ny mpanendy azy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary nony maraina dia toy ny lelafo mirehitra ny fatana.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Samy mahamay toy ny fatana izy rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka mandevona ny andriambaventiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efa lavo avokoa, ny mpanjakany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy miantso Ahy izy rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Efraima dia miharoharo amin’ireo firenena;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efraima dia efa tonga ampempa tsy voavadika.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Lanin’ny vahiny ny heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy fantany akory izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, efa mipì-bolo ihany izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saingy tsy fantany.
