document_id: HOS.7,873
type_code: plt
verses:
  '1':
  - type: text
    content: Raha ta-hanasitrana ny Isiraely Aho,
  - type: text
    content: Dia miseho ny helok’i Efraima sy ny faharatsian’i Samaria,
  - type: text
    content: Fa manao fitaka izy;
  - type: text
    content: Miditra ny mpangalatra,
  - type: text
    content: Ary ny jiolahy manao andiany dia mandehandeha eny ivelany.
  '10':
  - type: text
    content: Ary ny avonavon’
  - type: note
    content: 'Na: ny Reharehany.'
  - type: text
    content: ' Isiraely dia vavolombelona manameloka azy;'
  - type: text
    content: Nefa, na dia izany rehetra izany aza, dia tsy miverina amin’i Jehovah Andriamaniny ihany izy, na mitady Azy.
  '11':
  - type: text
    content: Ary Efraima dia efa tonga tahaka ny voromailala adaladala tsy manan-tsaina;
  - type: text
    content: Efa miantso an’i Egypta izy ary efa mankany Asyria.
  '12':
  - type: text
    content: Raha vao mandeha izy, dia hovelariko aminy ny fandrika haratoko,
  - type: text
    content: Ka hampidiniko ao toy ny voromanidina izy;
  - type: text
    content: Hofaizako izy araka izay efa nambara tamin’ny fiangonany.
  '13':
  - type: text
    content: Lozan’ireny! satria nandositra Ahy izy,
  - type: text
    content: Haringana izy! satria niodina tamiko;
  - type: text
    content: Izaho ta-hanavotra azy,
  - type: text
    content: Fa izy kosa–dia lainga no entiny milaza Ahy.
  '14':
  - type: text
    content: Ary tsy mitaraina amiko ao am-pony izy,
  - type: text
    content: Fa midradradradra foana ao am-pandriany;
  - type: text
    content: Mitangorona hitady vary sy ranom-boaloboka izy,
  - type: text
    content: Dia miodina miala amiko.
  '15':
  - type: text
    content: Ary Izaho no nampianatra sy nanatanjaka ny sandriny,
  - type: text
    content: Nefa izy kosa dia misaintsain-dratsy Ahy,
  '16':
  - type: text
    content: Miverina ihany izy, nefa tsy ho amin’ny Avo;
  - type: text
    content: Tonga tahaka ny tsipìka manjiona izy;
  - type: text
    content: Ho lavon-tsabatra ny mpanapaka azy
  - type: text
    content: Noho ny firehitry ny lelany;
  - type: text
    content: Izany no ho latsany any amin’ny tany Egypta.
  '2':
  - type: text
    content: Ary tsy heveriny ao am-po
  - type: note
    content: Heb. ataony hoe.
  - type: text
    content: ' fa tsarovako ny faharatsiany rehetra;'
  - type: text
    content: Ankehitriny dia gejan’ny nataony izy,
  - type: text
    content: Efa tonga eo anatrehako izany.
  '3':
  - type: text
    content: Amin’ny faharatsiany no ampifaliany ny mpanjaka,
  - type: text
    content: Ary amin’ny laingany ny mpanapaka.
  '4':
  - type: text
    content: Samy mpaka vadin’olona avokoa izy rehetra
  - type: text
    content: Ka toy ny fatana voafanan’ny mpanendy mofo,
  - type: text
    content: Izay mitsahatra tsy misorona afo
  - type: text
    content: Hatramin’ny ametafetany ny koba ka ambara-pitombony.
  '5':
  - type: text
    content: Tamin’ny andron’ny mpanjakantsika dia nankarary tena tamin’ny fanafanan’ny herin’ny divay ny mpanapaka;
  - type: text
    content: Nifandray tànana tamin’ny mpaniratsira ny mpanjaka.
  '6':
  - type: text
    content: Fa entin’ireo ho ao am-panotrehana ny fony, toy ny ho ao amin’ny fatana;
  - type: text
    content: Mandritra ny alina dia matory ihany ny mpanendy azy,
  - type: text
    content: Ary nony maraina dia toy ny lelafo mirehitra ny fatana.
  '7':
  - type: text
    content: Samy mahamay toy ny fatana izy rehetra
  - type: text
    content: Ka mandevona ny andriambaventiny;
  - type: text
    content: Efa lavo avokoa, ny mpanjakany,
  - type: text
    content: Tsy misy miantso Ahy izy rehetra.
  '8':
  - type: text
    content: Efraima dia miharoharo amin’ireo firenena;
  - type: text
    content: Efraima dia efa tonga ampempa tsy voavadika.
  '9':
  - type: text
    content: Lanin’ny vahiny ny heriny,
  - type: text
    content: Nefa tsy fantany akory izany;
  - type: text
    content: Eny, efa mipì-bolo ihany izy,
  - type: text
    content: Saingy tsy fantany.
