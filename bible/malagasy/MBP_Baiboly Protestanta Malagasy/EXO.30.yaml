document_id: EXO.30,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny alitara fandoroana ditin-kazo manitra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'ARY manaova alitara handoroana ditin-kazo manitra: hazo akasia no hanaovanao azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary aoka Arona hanao fanavotana eo amin’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho an’.
      marker-yv: yv-n
    - type: text
      text: ny tandrony indray mandeha isan-kerintaona; amin’ny ran’ny fanatitra noho ny ota, izay atao fanavotana, indray mandeha isan-kerintaona, no hanaovany fanavotana eo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.10 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ho azy.
      marker-yv: yv-n
    - type: text
      text: ' hatramin’ny taranakareo fara mandimby; ho masina indrindra ho an’i Jehovah izany.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny handoavana ny vola avotra.
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha maka ny isan’ny Zanak’Isiraely araka ny fandaminana azy hianao, dia samy handoa avotry ny ainy avy ho an’i Jehovah ny isan-olona, raha alamina izy, mba tsy hisy areti-mandringana hanjo azy, raha alamina izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izao no haloan’izay rehetra voalamina, dia antsasaky ny sekely avy araka ny sekely masina (gera roa-polo ny sekely iray), eny, antsasaky ny sekely ho fanatitra ho an’i Jehovah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Izay rehetra voalamina hatramin’ny roa-polo taona no ho miakatra no handoa ny fanatitra ho an’i Jehovah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny manan-karena tsy handoa mihoatra noho ny antsasaky ny sekely, ary ny malahelo tsy handoa latsaka, raha mandoa ny fanatitra ho an’i Jehovah izy, hanavotra ny ainareo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary handray ny vola avotra amin’ny Zanak’Isiraely hianao, ka hataonao amin’ny fanompoana ao amin’ny trano-lay fihaonana; ary ho fahatsiarovana ho an’ny Zanak’Isiraely eo anatrehan’i Jehovah izany, ho avotry ny ainareo.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny tavy, sy ny diloilo fanosorana, ary ny ditin-kazo manitra.
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ARY Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Manaova tavy varahina hanasana, ary aoka ho varahina koa ny faladiany; ary apetraho eo anelanelan’ny trano-lay fihaonana sy ny alitara izy, ka asio rano eo anatiny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary eo no hanasan’i Arona sy ny zanany ny tongony aman-tànany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ho iray hakiho avy ny lafiny efatra, dia ho efa-joro izy, ary ho roa hakiho ny hahavony; koa ataovy miray aminy ny tandrony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Raha miditra amin’ny trano-lay fihaonana izy, dia hisasa amin’ny rano, mba tsy hahafaty azy. Ary raha manakaiky ny alitara hanao fanompoam-pivavahana izy, mba handoro ny fanatitra atao amin’ny afo ho an’i Jehovah, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: dia hanasa ny tongony aman-tànany izy, mba tsy hahafaty azy; ary ho lalàna mandrakizay aminy sy ny zanany izany hatramin’ny taranany fara mandimby.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary Jehovah niteny tamin’i Mosesy ka nanao hoe: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Makà zava-manitra tsara ho anao, dia miora mitete dimam-jato '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sekely
    - type: text
      text: ' sy havozomanitra antsasak’izany, dia dimam-polo amby roan-jato, sy veromanitra dimam-polo amby roan-jato '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'sy kasia dimam-jato, araka ny sekely masina, ary diloilon’oliva eran’ny hina; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: dia amboary ho diloilo fanosorana masina izany, ho zavatra aharoharo, asan’ny mpangaraharo zava-manitra; ho diloilo fanosorana masina izany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary hosory amin’izany ny trano-lay fihaonana sy ny fiaran’ny Vavolombelona,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.26 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ny Didy Folo.
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'sy ny latabatra mbamin’ny fanaka rehetra momba azy sy ny fanaovan-jiro mbamin’ny fanaka momba azy sy ny alitara fandoroana ditin-kazo manitra, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'ary ny alitara fandoroana ny fanatitra odorana mbamin’ny fanaka rehetra momba azy ary ny tavy sy ny faladiany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary hamasino ireo mba ho masina indrindra; ary ho masina izay rehetra manendry azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary petaho takela-bolamena tsara izy, dia ny tampony sy ny lafiny manodidina ary ny tandrony; ary asio koronosy volamena manodidina. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary hosory Arona sy ny zanany, ka hamasino izy mba ho mpisorona ho Ahy.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary mitenena amin’ny Zanak’Isiraely hoe: Ity ho diloilo fanosorana masina ho Ahy hatramin’ny taranakareo fara mandimby. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Aoka tsy hihosoran’ny olon-kafa izany, na hisy haka tahaka azy, araka ny fanaovana azy; fa masina izy ka ho masina aminareo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Na zovy na zovy mangaroharo izay tahaka azy, ary na zovy na zovy manosotra azy amin’ny vahiny dia hofongorana tsy ho amin’ny fireneny.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia hoy Jehovah tamin’i Mosesy: Makà zava-manitra ho anao, dia natafa sy sekeleta sy helbena ary lebona madio; samy hamboarina manokana'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.34 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: samy hampitovin-danja.
      marker-yv: yv-n
    - type: text
      text: ' ireo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary ataovy ditin-kazo manitra izy, dia zavatra aharoharo araka ny fanaon’ny mpangaroharo zava-manitra, dia asio sira izy, ary aoka ho madio sy masina. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ary torotoroy ny sasany ho madinika indrindra, dia ataovy eo anoloan’ny Vavolombelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.36 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ny Didy Folo.
      marker-yv: yv-n
    - type: text
      text: ' ao amin’ny trano-lay fihaonana, izay hihaonako aminao; ho masina indrindra ho anareo izany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary ny amin’ny ditin-kazo manitra izay hataonao, dia aza mba misy atao tahaka azy ny ho anareo; ho masina aminao ho an’i Jehovah izany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Na zovy na zovy manao izay tahaka azy ho fanorohana dia hofongorana tsy ho amin’ny fireneny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary asio vava volamena roa izy eo ambanin’ny koronosiny, ka ataovy eo amin’ny zorony efatra ireo; ary ho fitoeran’ny bao ireo hilanjana azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hazo akasia no anaovy ny bao, ka petaho takela-bolamena. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary apetraho eo anoloan’ny efitra izay manakona ny fiaran’ny Vavolombelona
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ny Didy Folo.
      marker-yv: yv-n
    - type: text
      text: ' izy, dia manandrify ny rakotra fanaovam-panavotana eo ambonin’ny Vavolombelona,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.6 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: Dia ny Didy Folo.
      marker-yv: yv-n
    - type: text
      text: ' izay hihaonako aminao.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary Arona handoro ditin-kazo mani-pofona eo; isa-maraina, raha mamboatra ny lela fanaovan-jiro, no handoroany izany; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ary raha mampirehitra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manaingina.
      marker-yv: yv-n
    - type: text
      text: ' ny lela fanaovan-jiro Arona nony hariva no handoroany izany koa; ditin-kazo mani-pofona eo anatrehan’i Jehovah mandrakariva hatramin’ny taranakareo fara mandimby izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza manatitra ditin-kazo manitra tsy izy eo hianareo, na fanatitra odorana, na fanatitra hohanina; ary aza manidina fanatitra aidina eo.
