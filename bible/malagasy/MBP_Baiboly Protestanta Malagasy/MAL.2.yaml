document_id: MAL.2,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsi-fahamarinan’ny mpisorona sy ny namalian’Andriamanitra azy.
  - type: text
    content: 'ARY ankehitriny, ry mpisorona, dia ho aminareo izao didy izao: '
  '10':
  - type: text
    content: 'TSY mpiombon-dray va isika rehetra? Tsy Andriamanitra iray ihany va no nahary antsika? Koa nahoana no samy mivadika amin’ny rahalahintsika avy isika ka mamadika ny fanekena tamin’ny razantsika? '
  '11':
  - type: text
    content: 'Ny Joda efa namitaka, ary misy fahavetavetana atao ao amin’ny Isiraely sy eto Jerosalema; fa ny Joda efa nandoto ny fitoera-masin’i Jehovah, izay tiany, sady efa nanambady ny zanakavavin’ny andriamani-kafa. '
  '12':
  - type: text
    content: Enga anie ka hofongoran’i Jehovah hiala amin’ny lain’i Jakoba ny lehilahy izay manao izany, na iza na iza,
  - type: note
    content: Heb. na ny mpiambina, na ny mpamaly.
  - type: text
    content: ' sy izay manatitra fanatitra ho an’i Jehovah, Tompon’ny maro.'
  '13':
  - type: text
    content: 'Ary faharoan’izany, dia izao koa no ataonareo: Saronanareo ranomaso sy fitomaniana ary fisentoana ny alitaran’i Jehovah, ka tsy mba jereny intsony ny fanatitra, ary tsy handray fankasitrahana avy amin’ny tànanareo Izy.'
  '14':
  - type: text
    content: 'Nefa hoy hianareo: Nahoana? Satria Jehovah no vavolombelona ny aminao sy ny vadin’ny fahatanoranao izay nofitahinao, na dia namanao sady vady efa vita fanekena taminao aza izy. '
  '15':
  - type: text
    content: Moa tsy nisy anankiray nanao izany va, nefa mbola nanam-panahy ihany? Fa inona andrefa no notadiavin’ilay anankiray? Taranaka araka an’Andriamanitra.
  - type: note
    content: 'Na: Moa tsy iray va no nataony? Nefa nanana fanahy sisa ihany Izy. Ary nahoana no iray? Nitady aranaka araka an’Andriamanitra Izy.'
  - type: text
    content: 'Koa dia tandremo ny fanahinareo, ary aoka tsy hisy hamitaka ny vadin’ny fahatanorany. '
  '16':
  - type: text
    content: Fa halako ny fisaoram-bady, hoy Jehovah, Andriamanitry ny Isiraely, sy ny fanosenana fampahoriana amin’ny fitafiany, hoy Jehovah, Tompon’ny maro; koa tandremo ny fanahinareo, ary aza mamitaka hianareo.
  - type: heading
    content: Ny amin’ny andron’i Jehovah.
  '17':
  - type: text
    content: 'EFA manasatra an’i Jehovah amin’ ny teninareo hianareo. Nefa hoy hianareo: Amin’inona moa no anasaranay Azy? Amin’ny fanaovanareo hoe: Izay rehetra manao ratsy dia tsara eo imason’i Jehovah ka ankasitrahany, na amin’ny hoe: Aiza Andriamanitry ny fitsarana?'
  '2':
  - type: text
    content: 'Raha tsy hihaino na handatsaka am-po ka hanome voninahitra ny anarako hianareo, hoy Jehovah, Tompon’ny maro, dia halefako hamely anareo ny ozona, ka hozoniko ny tso-drano ataonareo; eny, efa voaozoko sahady izany, satria tsy nandatsaka am-po hianareo. '
  '3':
  - type: text
    content: 'Indro, hasiako teny mafy ny voa afafinareo, ary hofafazako tain-droroha ny tavanareo, dia ny tain-droroha avy amin’ny andro firavoravoanareo; ary hailika miaraka aminy hianareo. '
  '4':
  - type: text
    content: Dia ho fantatrareo fa nampitondra izany didy izany ho aminareo Aho, mba haharetan’ny fanekeko amin’i Levy,
  - type: note
    content: 'Na: mba ho fanekeko amin’i Levy izany.'
  - type: text
    content: ' hoy Jehovah, Tompon’ny maro.'
  '5':
  - type: text
    content: 'Ny fanekeko taminy dia fiainana sy fiadanana; ary nomeko azy ho fahatahorana izany, ka dia natahotra Ahy sy nangovitra teo anatrehan’ny anarako izy. '
  '6':
  - type: text
    content: Ny lalàn’ny fahamarinana no teo am-bavany, ary tsy mba nisy tsi-fahamarinana teo amin’ny molony; tamin’ny fiadanana sy ny fahitsiana no niarahany nandeha tamiko, ary maro no nampialainy tamin’ny heloka.
  '7':
  - type: text
    content: 'Fa ny molotry ny mpisorona tokony hitahiry fahalalana, ary ny lalàna hotadiavina eo am-bavany, satria irak’i Jehovah, Tompon’ny maro, izy. '
  '8':
  - type: text
    content: 'Fa hianareo kosa dia efa nivily làlana sady nampahatafintohina olona maro ny amin’ny lalàna ary namadika ny fanekena amin’i Levy, hoy Jehovah; Tompon’ny maro. '
  '9':
  - type: text
    content: Ary Izaho kosa dia efa nanolotra anareo ho fanazimbazimba sy ho fanao tsinontsinona eo anatrehan’ny vahoaka rehetra, noho ny tsy nitandremanareo ny làlako sy ny nizahanareo tavan’olona ny amin’ny lalàna.
  - type: heading
    content: Fananarana ny olona noho ny fisaoram-bady nataony sy ny nifanambadiany tamin’ny jentilisa.
