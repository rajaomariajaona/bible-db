document_id: MAL.2
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny tsi-fahamarinan’ny mpisorona sy ny namalian’Andriamanitra azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY ankehitriny, ry mpisorona, dia ho aminareo izao didy izao: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha tsy hihaino na handatsaka am-po ka hanome voninahitra ny anarako hianareo, hoy Jehovah, Tompon’ny maro, dia halefako hamely anareo ny ozona, ka hozoniko ny tso-drano ataonareo; eny, efa voaozoko sahady izany, satria tsy nandatsaka am-po hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Indro, hasiako teny mafy ny voa afafinareo, ary hofafazako tain-droroha ny tavanareo, dia ny tain-droroha avy amin’ny andro firavoravoanareo; ary hailika miaraka aminy hianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia ho fantatrareo fa nampitondra izany didy izany ho aminareo Aho, mba haharetan’ny fanekeko amin’i Levy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mba ho fanekeko amin’i Levy izany.
    marker-yv: yv-n
  - type: text
    text: ' hoy Jehovah, Tompon’ny maro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny fanekeko taminy dia fiainana sy fiadanana; ary nomeko azy ho fahatahorana izany, ka dia natahotra Ahy sy nangovitra teo anatrehan’ny anarako izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny lalàn’ny fahamarinana no teo am-bavany, ary tsy mba nisy tsi-fahamarinana teo amin’ny molony; tamin’ny fiadanana sy ny fahitsiana no niarahany nandeha tamiko, ary maro no nampialainy tamin’ny heloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny molotry ny mpisorona tokony hitahiry fahalalana, ary ny lalàna hotadiavina eo am-bavany, satria irak’i Jehovah, Tompon’ny maro, izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hianareo kosa dia efa nivily làlana sady nampahatafintohina olona maro ny amin’ny lalàna ary namadika ny fanekena amin’i Levy, hoy Jehovah; Tompon’ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary Izaho kosa dia efa nanolotra anareo ho fanazimbazimba sy ho fanao tsinontsinona eo anatrehan’ny vahoaka rehetra, noho ny tsy nitandremanareo ny làlako sy ny nizahanareo tavan’olona ny amin’ny lalàna.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fananarana ny olona noho ny fisaoram-bady nataony sy ny nifanambadiany tamin’ny jentilisa.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'TSY mpiombon-dray va isika rehetra? Tsy Andriamanitra iray ihany va no nahary antsika? Koa nahoana no samy mivadika amin’ny rahalahintsika avy isika ka mamadika ny fanekena tamin’ny razantsika? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny Joda efa namitaka, ary misy fahavetavetana atao ao amin’ny Isiraely sy eto Jerosalema; fa ny Joda efa nandoto ny fitoera-masin’i Jehovah, izay tiany, sady efa nanambady ny zanakavavin’ny andriamani-kafa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Enga anie ka hofongoran’i Jehovah hiala amin’ny lain’i Jakoba ny lehilahy izay manao izany, na iza na iza,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: na ny mpiambina, na ny mpamaly.
    marker-yv: yv-n
  - type: text
    text: ' sy izay manatitra fanatitra ho an’i Jehovah, Tompon’ny maro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary faharoan’izany, dia izao koa no ataonareo: Saronanareo ranomaso sy fitomaniana ary fisentoana ny alitaran’i Jehovah, ka tsy mba jereny intsony ny fanatitra, ary tsy handray fankasitrahana avy amin’ny tànanareo Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa hoy hianareo: Nahoana? Satria Jehovah no vavolombelona ny aminao sy ny vadin’ny fahatanoranao izay nofitahinao, na dia namanao sady vady efa vita fanekena taminao aza izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Moa tsy nisy anankiray nanao izany va, nefa mbola nanam-panahy ihany? Fa inona andrefa no notadiavin’ilay anankiray? Taranaka araka an’Andriamanitra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moa tsy iray va no nataony? Nefa nanana fanahy sisa ihany Izy. Ary nahoana no iray? Nitady aranaka araka an’Andriamanitra Izy.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Koa dia tandremo ny fanahinareo, ary aoka tsy hisy hamitaka ny vadin’ny fahatanorany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa halako ny fisaoram-bady, hoy Jehovah, Andriamanitry ny Isiraely, sy ny fanosenana fampahoriana amin’ny fitafiany, hoy Jehovah, Tompon’ny maro; koa tandremo ny fanahinareo, ary aza mamitaka hianareo.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny andron’i Jehovah.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'EFA manasatra an’i Jehovah amin’ ny teninareo hianareo. Nefa hoy hianareo: Amin’inona moa no anasaranay Azy? Amin’ny fanaovanareo hoe: Izay rehetra manao ratsy dia tsara eo imason’i Jehovah ka ankasitrahany, na amin’ny hoe: Aiza Andriamanitry ny fitsarana?'
