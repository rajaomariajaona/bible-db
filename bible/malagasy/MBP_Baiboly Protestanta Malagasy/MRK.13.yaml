document_id: MRK.13
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nanambaran’i Jesosy ny handravana an’i Jerosalema, sy ny hihaviany indray.
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mat. 24.1-51; Lio. 21.5-36.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY nony niala teo an-kianjan’ny tempoly Jesosy, dia hoy ny mpianany anankiray taminy: Mpampianatra ô, akory re ireto vato sy rafitra ireto! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Jesosy nanao taminy hoe: Hitanao va ireto rafitra lehibe ireto? Tsy havela hisy vato hifanongoa eto ka tsy horavana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha nipetraka teo amin’ny tendrombohitra Oliva tandrifin’ny tempoly Izy, dia nanontany Azy mangingina Petera sy Jakoba sy Jaona ary Andrea hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lazao aminay: Rahoviana no hisy izany? ary inona no ho famantarana, rehefa ho tonga izany rehetra izany?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jesosy nilaza taminy hoe: Mitandrema, fandrao hisy hamitaka anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa maro no ho avy amin’ny anarako hanao hoe: Izaho no Izy, ka maro no ho voafitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha mandre ady sy filazana ady hianareo, dia aza matahotra; tsy maintsy hisy izany, nefa tsy mbola tonga ny farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana; ary hisy horohorontany any amin’ny tany samy hafa, sady hisy mosary; izany no fiandohan’ny fahoriana.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: faharariam-piterahana.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa mitandrema hianareo, fa hatolotra amin’ny Synedriona sy hokapohina ao amin’ny synagoga ary hitsangana eo anatrehan’ny mpanapaka sy ny mpanjaka noho ny amiko hianareo ho vavolombelona aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny firenena rehetra tsy maintsy hitoriana ny filazantsara aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa raha mitondra anareo hatolotra izy, dia aza manahy rahateo izay holazainareo; fa izay teny homena anareo amin’izany ora izany no holazainareo; fa tsy hianareo no hiteny, fa ny Fanahy Masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny rahalahy hanolotra ny rahalahiny ho amin’ny fahafatesana, ary ny ray hanolotra ny zanany; ary ny zanaka hitsangana hanohitra ny rainy aman-dreniny ka hahafaty azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ho halan’ny olona rehetra hianareo noho ny anarako: fa izay maharitra hatramin’ny farany no hovonjena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha hitanareo mitsangana amin’izay tsy mety hitsanganany „ny fahavetavetan’ny fandravana” (Dan. 12.11; 9.27) (aoka hisaina izay mamaky izany), dia aoka handositra ho any an-tendrombohitra izay olona any Jodia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary izay ao an-tampon-trano aoka tsy hidina na hiditra haka zavatra ao an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary izay any an-tsaha aoka tsy hiverina haka ny lambany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary lozan’ny bevohoka sy ny mitaiza kely amin’izany andro izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa mivavaha hianareo mba tsy ho amin’ny ririnina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa amin’izany andro izany dia hisy fahoriana izay tsy mbola nisy toy izany hatrizay nanaovan’Andriamanitra izao tontolo izao ka mandraka izao ankehitriny izao, sady tsy hisy intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary raha tsy nohafohezin’ny Tompo izany andro izany, dia tsy nisy nofo hovonjena; fa noho ny olom-boafidy, izay nofidiny, dia nohafoheziny izany andro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary amin’izay raha tàhiny misy olona manao aminareo hoe: Indro, etỳ Kristy, na: Indro, erỳ; aza mino hianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa hisy Kristy sandoka sy mpaminany sandoka hitsangana,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hatsangana.
    marker-yv: yv-n
  - type: text
    text: ' ka haneho famantarana sy fahagagana hamitahany na dia ny olom-boafidy aza, raha azo atao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa mitandrema kosa hianareo; indro, efa voalazako taminareo rahateo ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa amin’izany andro izany, raha afaka izany fahoriana izany, ny masoandro hohamaizinina, ary ny volana tsy haneho fahazavana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ary ny kintana hiraraka avy eny amin’ny lanitra, ary hohozongozonina ny hery izay ao amin’ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary amin’izay ny Zanak’olona dia ho hita avy eo amin’ny rahona amin’ny hery lehibe sy ny voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary amin’izay dia haniraka ny anjely Izy, ary hanangona ny olom-boafidiny avy amin’ny vazan-tany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.27 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rivotra.
    marker-yv: yv-n
  - type: text
    text: ' efatra hatramin’ny faran’ny tany ka hatramin’ny faran’ny lanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary mianara ny fanoharana ny amin’ny aviavy: Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny lohataona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia tahaka izany koa hianareo, raha vao hitanareo fa tonga izany zavatra izany, dia aoka ho fantatrareo fa efa akaiky eo am-baravarana Izy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.29 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: izany.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Lazaiko aminareo marina tokoa fa tsy mba ho lany
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: handalo.
    marker-yv: yv-n
  - type: text
    text: ' ity taranaka ity'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.30 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ity firenena ity.
    marker-yv: yv-n
  - type: text
    text: ' mandra-pahatongan’izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa ny amin’izany andro na ora izany dia tsy misy mahalala, na dia ny anjely any an-danitra, ary na dia ny Zanaka aza, afa-tsy ny Ray ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Mitandrema, miambena,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.33 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Gr. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: miareta tory.
    marker-yv: yv-n
  - type: text
    text: ' ka mivavaha; fa tsy fantatrareo izay hihavian’ny fotoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Izany dia
  - type: text
    text: ' tahaka ny olona nandeha hivahiny, izay nandao ny tranony ka nanome fahefana ny mpanompony, ka samy notolorany ny raharahany avy, ary ny mpiandry varavarana dia nasainy niambina tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa miambena hianareo, fa tsy fantatrareo izay andro hihavian’ny tompon-trano, na ho hariva, na ho mamatonalina, na ho maneno akoho, na ho maraina,– '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'fandrao avy tampoka izy ka mahita anareo matory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary izay lazaiko aminareo dia lazaiko amin’ny olona rehetra koa: Miambena.'
