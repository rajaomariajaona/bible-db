document_id: ISA.17,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin’ny loza hanjo an’i Damaskosy.
  - type: text
    content: FAMINANIANA ny amin’ny loza hanjo an’i Damaskosy.
  - type: text
    content: Indro, Damaskosy, dia rava tsy ho tanàna intsony,
  - type: text
    content: Eny, tonga korontam-bato izy.
  '10':
  - type: text
    content: Fa nanadino an’Andriamanitry ny famonjena anao hianao
  - type: text
    content: Ary tsy nahatsiaro ny Vatolampy fiarovana mafy ho anao,
  - type: text
    content: Ka dia nanao voly mahafinaritra hianao
  - type: text
    content: Ary zana-boaloboka avy amin’ny firenena hafa no nambolenao teo;
  '11':
  - type: text
    content: Tamin’ny andro nambolenao azy dia nofefenao izy,
  - type: text
    content: Ary nony maraina dia nampitsimohinao ilay nambolenao;
  - type: text
    content: Nefa ho vokatra miavosa izany ho amin’ny andro fangirifiriana
  - type: note
    content: 'Na: Nefa ho levona ny vokatra amin’ny andro hahazoana azy.'
  - type: text
    content: ' sy fanaintainana tsy azo sitranina.'
  - type: heading
    content: Ny handringanana ny Asyriana.
  '12':
  - type: text
    content: INDRISY ny fihahohahon’ny firenena maro!
  - type: text
    content: Izay mihahohaho tahaka ny feon’ny ranomasina!
  - type: text
    content: Indrisy ny firohondrohon’ny olona maro be!
  - type: text
    content: Tahaka ny firohondrohon’ny rano manonja ny firohondrohony!
  '13':
  - type: text
    content: Eny, mirohondrohona tahaka ny firohondrohon’ny rano be ny firenena;
  - type: text
    content: Kanefa hotezerana mafy izy,
  - type: text
    content: Ka dia handositra lavitra
  - type: text
    content: Ary ho lasa tahaka ny akofa eny an-tendrombohitra, raha paohin’ny rivotra,
  - type: text
    content: Sy tahaka ny fakom-bary mitambolimbolina entin’ny tadio.
  '14':
  - type: text
    content: Raha hariva ny andro, dia, injao, fampahatahorana;
  - type: text
    content: Ary raha tsy mbola maraina akory aza, dia tsy ao intsony ireny.
  - type: text
    content: Izany no anjaran’izay mamabo antsika
  - type: text
    content: Sy tambin’izay mandroba antsika.
  '2':
  - type: text
    content: Efa lao ny tanànan’i Aroera
  - type: text
    content: Ka ho an’ny andian’ny ondry aman-osy,
  - type: text
    content: Handry ao ireo, ka tsy hisy hanaitaitra azy,
  '3':
  - type: text
    content: Ary tsy hisy tanàna mimanda intsony any Efraima,
  - type: text
    content: Na fanjakana ao Damaskosy;
  - type: text
    content: Ary izay sisa amin’i Syria dia hitovy voninahitra amin’ny Zanak’Isiraely;
  - type: text
    content: Hoy Jehovah, Tompon’ny maro.
  '4':
  - type: text
    content: Ary amin’izany andro izany dia hihena ny voninahitr’i Jakoba,
  - type: text
    content: Ary hihena ny hataviny.
  '5':
  - type: text
    content: Ary ho tahaka ny fanangon’ny olona ny vary an-tahony amin’ny fararano izany,
  - type: text
    content: Ka tangosan’ny sandriny ny salohim-bary;
  - type: text
    content: Eny, ho tahaka ny fanangon’ny olona salohim-bary eny amin’ny Lohosahan’ny Refaïta;
  '6':
  - type: text
    content: 'Kanefa hisy sisa hotsimponina ihany izy tahaka ny amin’ny fikapohana ny hazo oliva:'
  - type: text
    content: Hisy voany roa na telo ao an-tendrony ambony indrindra,
  - type: text
    content: Efatra na dimy ao amin’ny rantsan’ny hazo mahavokatra,
  - type: text
    content: Hoy Jehovah, Andriamanitry ny Isiraely.
  '7':
  - type: text
    content: Amin’izany andro izany dia hanandrandra ny Mpanao azy ny olona,
  - type: text
    content: Ary ny masony hijery ny Iray Masin’ny Isiraely,
  '8':
  - type: text
    content: Fa tsy hanandrandra ny alitara, asan’ny tànany, intsony izy.
  - type: text
    content: Ary ny nataon’ny rantsan-tànany tsy hahoany,
  - type: text
    content: Na ny Aseraha,
  - type: note
    content: Anaran’andriamani-tsi-izy, na ny sariny.
  - type: text
    content: na ny tsangan-kazo
  - type: note
    content: 'Na: tsangam-bato.'
  - type: text
    content: ' ho an’ny masoandro.'
  '9':
  - type: text
    content: Amin’izany andro izany ny tanànany mafy,
  - type: text
    content: Dia ho tahaka ny tany lao any an-ala na any an-tampon-tendrombohitra,
  - type: text
    content: Izay nilaozan’ny olona teo anoloan’ny Zanak’Isiraely,
  - type: text
    content: Ka dia ho foana ny tany.
