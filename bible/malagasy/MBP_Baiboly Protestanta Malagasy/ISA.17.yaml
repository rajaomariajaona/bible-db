document_id: ISA.17
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Faminaniana ny amin’ny loza hanjo an’i Damaskosy.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: FAMINANIANA ny amin’ny loza hanjo an’i Damaskosy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, Damaskosy, dia rava tsy ho tanàna intsony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tonga korontam-bato izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Efa lao ny tanànan’i Aroera
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho an’ny andian’ny ondry aman-osy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Handry ao ireo, ka tsy hisy hanaitaitra azy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary tsy hisy tanàna mimanda intsony any Efraima,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na fanjakana ao Damaskosy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary izay sisa amin’i Syria dia hitovy voninahitra amin’ny Zanak’Isiraely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Tompon’ny maro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary amin’izany andro izany dia hihena ny voninahitr’i Jakoba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hihena ny hataviny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ho tahaka ny fanangon’ny olona ny vary an-tahony amin’ny fararano izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tangosan’ny sandriny ny salohim-bary;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho tahaka ny fanangon’ny olona salohim-bary eny amin’ny Lohosahan’ny Refaïta;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Kanefa hisy sisa hotsimponina ihany izy tahaka ny amin’ny fikapohana ny hazo oliva:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hisy voany roa na telo ao an-tendrony ambony indrindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efatra na dimy ao amin’ny rantsan’ny hazo mahavokatra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hoy Jehovah, Andriamanitry ny Isiraely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin’izany andro izany dia hanandrandra ny Mpanao azy ny olona,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny masony hijery ny Iray Masin’ny Isiraely,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa tsy hanandrandra ny alitara, asan’ny tànany, intsony izy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny nataon’ny rantsan-tànany tsy hahoany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na ny Aseraha,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: Anaran’andriamani-tsi-izy, na ny sariny.
    marker-yv: yv-n
  - type: text
    text: na ny tsangan-kazo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tsangam-bato.
    marker-yv: yv-n
  - type: text
    text: ' ho an’ny masoandro.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin’izany andro izany ny tanànany mafy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ho tahaka ny tany lao any an-ala na any an-tampon-tendrombohitra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nilaozan’ny olona teo anoloan’ny Zanak’Isiraely,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho foana ny tany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa nanadino an’Andriamanitry ny famonjena anao hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nahatsiaro ny Vatolampy fiarovana mafy ho anao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia nanao voly mahafinaritra hianao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary zana-boaloboka avy amin’ny firenena hafa no nambolenao teo;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tamin’ny andro nambolenao azy dia nofefenao izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary nony maraina dia nampitsimohinao ilay nambolenao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa ho vokatra miavosa izany ho amin’ny andro fangirifiriana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nefa ho levona ny vokatra amin’ny andro hahazoana azy.
    marker-yv: yv-n
  - type: text
    text: ' sy fanaintainana tsy azo sitranina.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny handringanana ny Asyriana.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: INDRISY ny fihahohahon’ny firenena maro!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay mihahohaho tahaka ny feon’ny ranomasina!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indrisy ny firohondrohon’ny olona maro be!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tahaka ny firohondrohon’ny rano manonja ny firohondrohony!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, mirohondrohona tahaka ny firohondrohon’ny rano be ny firenena;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kanefa hotezerana mafy izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia handositra lavitra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lasa tahaka ny akofa eny an-tendrombohitra, raha paohin’ny rivotra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tahaka ny fakom-bary mitambolimbolina entin’ny tadio.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha hariva ny andro, dia, injao, fampahatahorana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary raha tsy mbola maraina akory aza, dia tsy ao intsony ireny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izany no anjaran’izay mamabo antsika
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy tambin’izay mandroba antsika.
