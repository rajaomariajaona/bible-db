document_id: 2CH.6,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia hoy Solomona: Jehovah efa nilaza fa hitoetra ao amin’ny aizim-pito Izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary Jehovah efa nahatanteraka ny teniny izay nolazainy, koa nitsangana handimby an’i Davida raiko aho ary mipetraka amin’ny seza fiandrianan’ny Isiraely tahaka ny efa nolazain’i Jehovah, sady efa nanao ny trano ho an’ny anaran’i Jehovah, Andriamanitry ny Isiraely, aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary napetrako tao ny fiara izay itoeran’ny faneken’i Jehovah, ilay nataony tamin’ny Zanak’Isiraely.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Solomona nitsangana teo anoloan’ny alitaran’i Jehovah teo anatrehan’ny fiangonana, dia ny Isiraely rehetra, ka namelatra ny tànany, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'fa efa nanao fitaingenana varahina izy, ary napetrany teo afovoan’ny kianja io (dimy hakiho ny lavany, ary dimy hakiho ny sakany, ary telo hakiho ny hahavony); dia nitsangana teo amin’io izy ka nandohalika teo anatrehan’ny fiangonana, dia ny Isiraely rehetra, ary namelatra ny tànany manandrify ny lanitra '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ka nanao hoe: Ry Jehovah, Andriamanitry ny Isiraely ô, tsy misy Andriamanitra tahaka Anao, na any an-danitra na etỳ an-tany, Izay mitandrina ny fanekenao sy ny famindramponao ho an’ny mpanomponao izay mandeha eo anatrehanao amin’ny fony rehetra, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'sady efa nahatanteraka tamin’i Davida raiko mpanomponao ilay nolazainao taminy; fa nolazain’ny vavanao izany, dia notanterahin’ny tànanao tahaka ny amin’izao anio izao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa tanteraho amin’i Davida raiko mpanomponao, Jehovah, Andriamanitry ny Isiraely ô, ilay nolazainao taminy hoe: Tsy ho diso zanakalahy eo anatrehako hianao hipetraka amin’ny seza fiandrianan’ny Isiraely, raha ny zanakao mitandrina ny alehany ka mankatò ny lalàko tahaka ny nandehananao teo anatrehako. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Koa ankehitriny, ry Jehovah, Andriamanitry ny Isiraely ô, mifona amina aho, aoka ho to anie ny teninao, izay nolazainao tamin’i Davida mpanomponao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Andriamanitra va dia honina amin’ny olona etỳ an-tany tokoa? He! ny lanitra, ary ny lanitry ny lanitra aza, tsy omby Anao, koa mainka fa ity trano nataoko ity!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa atreho ny fivavaka sy ny fifonan’ny mpanomponao, Jehovah Andriamanitro ô, mba hohenoinao ny fitarainana sy ny fivavaka izay ataon’ny mpanomponao eto anatrehanao, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nefa izaho efa nanao trano hitoeranao tokoa, dia fitoerana hitoeranao mandrakizay.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'mba hihiratan’ny masonao andro aman-alina amin’ity trano ity, dia amin’ny fitoerana nolazainao hoe: Ao no hasiako ny anarako,–hihainoanao ny vavaka izay ataon’ny mpanomponao manatrika ity fitoerana ity. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary henoy ny fifonan’ny mpanomponao sy ny Isiraely olonao, raha mivavaka manatrika ity fitoerana ity izy; dia mihainoa any an-danitra fonenanao Hianao; eny, mihainoa, ka mamelà heloka.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha misy olona manota amin’ny namany, ary ampianianiny, ka tonga hianiana eo anoloan’ny alitaranao amin’ity trano ity izy, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: dia mihainoa any an-danitra Hianao, ka manaova, ary mitsarà ny mpanomponao, hamaly ny ratsy fanahy ka hampitsingerina ny nataony ho amin’ny lohany, ary hanamarina ny marina kosa ka hanome azy araka ny fahamarinany.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Raha resy eo anoloan’ny fahavalo ny Isiraely olonao noho ny nanotany taminao, ary miverina sy manaiky ny anaranao indray ka mivavaka sy mifona eto anatrehanao amin’ity trano ity izy, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: dia mihainoa any an-danitra, Hianao, ka mamelà ny fahotan’ny Isiraely olonao, ary ampodio amin’ny tany nomenao azy sy ny razany izy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Raha mihantona ny andro, ka tsy misy ranonorana noho ny nanotan’ny olona taminao, ary mivavaka manatrika ity fitoerana ity izy ka manaiky ny anaranao sady miala amin’ny fahotany, satria ampahorinao, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: dia mihainoa any an-danitra Hianao, ka mamelà ny fahotan’ny mpanomponao, dia ny Isiraely olonao, satria atoronao azy ny làlana tsara izay tokony halehany, ary mandatsaha ranonorana amin’ny taninao, izay nomenao ho lovan’ny olonao.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Raha misy mosary amin’ny tany, na areti-mandringana, na miainan’ny rivotra ny vary, na maty fotsy, na misy valala sy sompanga, na misy fahavalo manao fahirano azy ao amin’ny taniny, dia ao amin’ny tanànany, na inona fahoriana, na inona aretina, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'izay vavaka rehetra sy fifonana rehetra ataon’olona, na ny Isiraely olonao rehetra, izay samy mahalala ny fahoriany sy ny alahelony avy, ka mamelatra ny tànany manatrika ity trano ity izy,– '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ny mpanjaka nitodika ka nitso-drano ny fiangonana, dia ny Isiraely rehetra (nitsangana avokoa ny fiangonana, dia ny Isiraely rehetra), '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'dia mihainoa any an-danitra fonenanao Hianao, ka mamelà heloka, ka omeo ny olona araka ny alehany rehetra, fa fantatrao ny fony (fa Hianao dia Hianao irery ihany no mahalala ny fon’ny zanak’olombelona,) '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: mba hatahorany Anao sy handehanany amin’ny làlanao amin’izay andro rehetra hiainany etỳ amin’ny tany nomenao ny razanay.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary henoy koa ny vahiny izay tsy isan’ny Isiraely olonao, fa tonga avy any amin’ny tany lavitra noho ny amin’ny anaranao lehibe sy ny tànanao mahery ary ny sandrinao ahinjitra,–koa raha avy izy ka mivavaka manatrika ity trano ity, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: dia mihainoa any an-danitra fonenanao Hianao, ka manaova araka izay rehetra iantsoan’ny vahiny Anao, mba ho fantatry ny firenena rehetra ambonin’ny tany ny anaranao, hatahorany Anao tahaka ny ataon’ny Isiraely olonao ihany, ary mba ho fantany fa ny anaranao no efa nantsoina tamin’ity trano nataoko ity.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Raha mivoaka hiady amin’ny fahavalony ny olonao, na ho aiza na ho aiza no hanirahanao azy, ka mivavaka aminao manandrify ity tanàna izay nofidinao ity sy ny trano izay nataoko ho an’ny anaranao izy, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: dia henoy any an-danitra ny fivavany sy ny fifonany, ka omeo rariny izy.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Raha manota aminao izy (fa tsy misy olombelona tsy manota), ka tezitra aminy Hianao ary manolotra azy eo anoloan’ny fahavalony, ka dia entin’ny mpamabo ho babo any amin’ny tany na ho lavitra na ho akaiky izy, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'ary mahatsiaro any amin’ny tany nitondrana azy ho babo izy ka mibebaka sy mifona aminao any amin’ny tany izay nitondrana azy ho babo ary manao hoe: Efa nanota izahay sady efa nanao meloka sy efa nanao ratsy, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'ka dia miverina aminao amin’ny fony rehetra sy ny fanahiny rehetra izy ao amin’ny tany nitondrana azy ho babo ary mivavaka manandrify ny taniny izay nomenao ny razany sy ny tanàna izay nofidinao ary ny trano izay nataoko ho an’ny anaranao,– '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: dia henoy any an-danitra fonenanao ny fivavany sy ny fifonany, ka omeo rariny izy; ary mamelà ny olonao izay efa nanota taminao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ka nanao hoe: Isaorana anie Jehovah, Andriamanitry ny Isiraely, fa ny vavany efa niteny tamin’i Davida raiko, ary ny tànany no nahatanteraka izany taminy, dia ilay hoe: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ankehitriny, ry Andriamanitro ô, mifona aminao aho, aoka hihiratra ny masonao, ary aoka ny sofinao hihaino ny vavaka atao amin’ity fitoerana ity.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Koa ankehitriny mitsangàna, ry Jehovah Andriamanitra ô, ho amin’ny fitsaharanao, dia Hianao sy ny fiaran’ny herinao; aoka ny mpisoronao hitafy famonjena, Jehovah Andriamanitra ô, ary aoka ny olonao masina hifaly amin’ny soa. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ry Jehovah Andriamanitra ô, aza lavinao ny voahosotrao; tsarovy ny famindrampo nampanantenaina an’i Davida mpanomponao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hatramin’ny andro nitondrako ny oloko nivoaka avy tany Egypta dia tsy mbola nisy tanàna nofidiko tamin’ny firenen’Isiraely rehetra hanaovana trano mba hitoeran’ny anarako; ary tsy nisy olona nofidiko ho mpanapaka ny Isiraely oloko; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: fa nifidy an’i Jerosalema Aho hitoeran’ny anarako, ary nifidy an’i Davida Aho hanapaka ny Isiraely oloko.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary efa mby tao am-pon’i Davida raiko ny hanao trano ho an’ny anaran’i Jehovah, Andriamanitry ny Isiraely. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nefa hoy Jehovah tamin’i Davida raiko: Satria tao am-ponao ny fikasana hanao trano ho an’ny anarako, dia tsara izany fikasanao izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Kanefa tsy hianao no hanao ny trano, fa ny zanakao izay haterakao, izy no hanao ny trano ho an’ny anarako. '
