document_id: PSA.69
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fitarainan’izay nenjehina sy nampahorina noho ny amin’Andriamanitra.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’i Davida.
- type: usfm
  marker: q1
  children:
  - type: text
    text: VONJEO aho, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa mihatra amin’ny aiko ny rano.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Milentika amin’ny fotaka mandrevo aho, ka tsy misy hifaharana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Efa miditra amin’ny rano lalina aho, ka mandifotra ahy ny riaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sasatry ny mitaraina aho, maimay ny tendako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pahina ny masoko, raha miandry an’Andriamanitro aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Maro noho ny volon-dohako ny isan’izay mankahala ahy tsy ahoan-tsy ahoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mahery izay ta-hahafaty ahy, dia ny fahavaloko tsy ahoan-tsy ahoana;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mampanonitra ahy izay tsy nalaiko izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andriamanitra ô, Hianao mahalala ny hadalako;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny heloko tsy mba miafina aminao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka tsy ho menatra noho ny amiko izay miandry Anao, Jehovah, Tompon’ny maro ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka tsy ho very hevitra noho ny amiko izay mitady Anao, ry Andriamanitry ny Isiraely ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa noho ny aminao no itondrako latsa;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Safotry ny henatra ny tavako.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Efa vahiny amin’ny rahalahiko aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, efa olon-ko azy amin’ny zanak’ineny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny firehetako ny amin’ny tranonao no naharìtra aina ahy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny latsa nataon’izay nandatsa Anao dia nihatra tamiko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nitomany sady nifady hanina aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia natao latsa ho ahy izany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lamba fisaonana no nataoko fitafiako,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia efa ambentinteny tamin’ireny aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Miresaka ahy izay mipetraka eo am-bavahady;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ataon’ny mpisotro toaka an-kira aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa izaho hivavaka aminao amin’ny andro fankasitrahana, Jehovah ô,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia aminao, Andriamanitra ô, noho ny haben’ny famindramponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Valio aho araka ny hamarinan’ny famonjenao.–
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Afaho amin’ny fotaka aho, ka aza avela hilentika;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vonjeo aho amin’izay mankahala ahy sy amin’ny rano lalina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aza avela hanafotra ahy ny rano mandriaka,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hitelina ahy ny lalina;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza avela hikatom-bava amiko ny lavaka fantsakana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Valio aho, Jehovah ô, fa tsara ny famindramponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Todiho aho araka ny haben’ny fiantranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary aza manafina ny tavanao amin’ny mpanomponao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa azom-pahoriana aho, koa faingàna hamaly ahy Hianao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hatòny ny fanahiko, avoty izy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, vonjeo aho noho ny ataon’ny fahavaloko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hianao no mahalala ny latsa mihatra amiko
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahamenarako sy ny fahafaham-boninahitro;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo anatrehanao ny mpandrafy ahy rehetra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny latsa dia nanorotoro ny foko ka reraka indrindra aho;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary niandry antra aho, fa tsy nisy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy mpanony, fa tsy nahita.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa zava-mangidy no nomeny ho haniko;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary vinaingitra no natolony ahy hosotroina, raha nangetaheta aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aoka ho fandrika '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ho azy
  - type: text
    text: ' ny latabany eo anoloany;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, ho tonta ho an’ny tsy manana ahiahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aoka ho jamba ny masony mba tsy hahita;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ampangozohozoy mandrakariva ny valahany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aidino aminy ny fahatezeranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka hahatratra azy ny firehetan’ny fahaviniranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka ho foana ny tobiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza avela hisy hitoetra ao an-dainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa izay nasianao no nenjehiny;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny fahararian’ny voatsindronao dia lazalazainy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aoka hiampy ny helony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy hiditra amin’ny fahamarinanao izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aoka hovonoina tsy ho eo amin’ny bokin’ny velona ny anarany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy hosoratana eo amin’ny marina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa izaho dia ory sy mahantra, Andriamanitra ô;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ny famonjenao no hanandratra ahy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hankalaza ny anaran’Andriamanitra amin’ny fihirana aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hidera Azy amin’ny fisaorana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa ho sitrak’i Jehovah izany mihoatra noho ny vantotr’ombilahy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay manan-tandroka sady mivaky kitro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Hahita izany ny mpandefitra ka ho faly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho velona ny fonareo, ry mpitady an’Andriamanitra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa mihaino ny malahelo Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny olony mifatotra tsy mba hamavoiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Aoka hidera Azy ny lanitra sy ny tany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny ranomasina sy izay rehetra mihetsika ao aminy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Fa Andriamanitra hamonjy an’i Ziona sady hanangana ny tanànan’i Joda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitoetra ao ny olony ka ho tompony;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Dia handova azy ny taranaky ny mpanompony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary hitoetra ao izay tia ny anarany.
