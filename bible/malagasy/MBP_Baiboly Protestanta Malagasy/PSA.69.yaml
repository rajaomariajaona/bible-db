document_id: PSA.69,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan’izay nenjehina sy nampahorina noho ny amin’Andriamanitra.
  - type: text
    content: Ho an’ny mpiventy hira. Al-shoshanim. Nataon’i Davida.
  - type: text
    content: VONJEO aho, Andriamanitra ô;
  - type: text
    content: Fa efa mihatra amin’ny aiko ny rano.
  '10':
  - type: text
    content: Nitomany sady nifady hanina aho,
  - type: text
    content: Dia natao latsa ho ahy izany.
  '11':
  - type: text
    content: Lamba fisaonana no nataoko fitafiako,
  - type: text
    content: Dia efa ambentinteny tamin’ireny aho.
  '12':
  - type: text
    content: Miresaka ahy izay mipetraka eo am-bavahady;
  - type: text
    content: Ary ataon’ny mpisotro toaka an-kira aho.
  '13':
  - type: text
    content: Fa izaho hivavaka aminao amin’ny andro fankasitrahana, Jehovah ô,
  - type: text
    content: Dia aminao, Andriamanitra ô, noho ny haben’ny famindramponao;
  - type: text
    content: Valio aho araka ny hamarinan’ny famonjenao.–
  '14':
  - type: text
    content: Afaho amin’ny fotaka aho, ka aza avela hilentika;
  - type: text
    content: Vonjeo aho amin’izay mankahala ahy sy amin’ny rano lalina.
  '15':
  - type: text
    content: Aza avela hanafotra ahy ny rano mandriaka,
  - type: text
    content: Na hitelina ahy ny lalina;
  - type: text
    content: Ary aza avela hikatom-bava amiko ny lavaka fantsakana.
  '16':
  - type: text
    content: Valio aho, Jehovah ô, fa tsara ny famindramponao;
  - type: text
    content: Todiho aho araka ny haben’ny fiantranao.
  '17':
  - type: text
    content: Ary aza manafina ny tavanao amin’ny mpanomponao;
  - type: text
    content: Fa azom-pahoriana aho, koa faingàna hamaly ahy Hianao.
  '18':
  - type: text
    content: Hatòny ny fanahiko, avoty izy;
  - type: text
    content: Eny, vonjeo aho noho ny ataon’ny fahavaloko.
  '19':
  - type: text
    content: Hianao no mahalala ny latsa mihatra amiko
  - type: text
    content: Ary ny fahamenarako sy ny fahafaham-boninahitro;
  - type: text
    content: Eo anatrehanao ny mpandrafy ahy rehetra.
  '2':
  - type: text
    content: Milentika amin’ny fotaka mandrevo aho, ka tsy misy hifaharana;
  - type: text
    content: Efa miditra amin’ny rano lalina aho, ka mandifotra ahy ny riaka.
  '20':
  - type: text
    content: Ny latsa dia nanorotoro ny foko ka reraka indrindra aho;
  - type: text
    content: Ary niandry antra aho, fa tsy nisy,
  - type: text
    content: Sy mpanony, fa tsy nahita.
  '21':
  - type: text
    content: Fa zava-mangidy no nomeny ho haniko;
  - type: text
    content: Ary vinaingitra no natolony ahy hosotroina, raha nangetaheta aho.
  '22':
  - type: text
    content: 'Aoka ho fandrika '
  - type: text
    content: ho azy
  - type: text
    content: ' ny latabany eo anoloany;'
  - type: text
    content: Eny, ho tonta ho an’ny tsy manana ahiahy.
  '23':
  - type: text
    content: Aoka ho jamba ny masony mba tsy hahita;
  - type: text
    content: Ary ampangozohozoy mandrakariva ny valahany.
  '24':
  - type: text
    content: Aidino aminy ny fahatezeranao;
  - type: text
    content: Ary aoka hahatratra azy ny firehetan’ny fahaviniranao.
  '25':
  - type: text
    content: Aoka ho foana ny tobiny;
  - type: text
    content: Aza avela hisy hitoetra ao an-dainy.
  '26':
  - type: text
    content: Fa izay nasianao no nenjehiny;
  - type: text
    content: Ary ny fahararian’ny voatsindronao dia lazalazainy.
  '27':
  - type: text
    content: Aoka hiampy ny helony;
  - type: text
    content: Ary aoka tsy hiditra amin’ny fahamarinanao izy.
  '28':
  - type: text
    content: Aoka hovonoina tsy ho eo amin’ny bokin’ny velona ny anarany,
  - type: text
    content: Ary aoka tsy hosoratana eo amin’ny marina.
  '29':
  - type: text
    content: Fa izaho dia ory sy mahantra, Andriamanitra ô;
  - type: text
    content: Aoka ny famonjenao no hanandratra ahy.
  '3':
  - type: text
    content: Sasatry ny mitaraina aho, maimay ny tendako;
  - type: text
    content: Pahina ny masoko, raha miandry an’Andriamanitro aho.
  '30':
  - type: text
    content: Hankalaza ny anaran’Andriamanitra amin’ny fihirana aho,
  - type: text
    content: Ary hidera Azy amin’ny fisaorana.
  '31':
  - type: text
    content: Fa ho sitrak’i Jehovah izany mihoatra noho ny vantotr’ombilahy,
  - type: text
    content: Izay manan-tandroka sady mivaky kitro.
  '32':
  - type: text
    content: Hahita izany ny mpandefitra ka ho faly;
  - type: text
    content: Aoka ho velona ny fonareo, ry mpitady an’Andriamanitra.
  '33':
  - type: text
    content: Fa mihaino ny malahelo Jehovah,
  - type: text
    content: Ary ny olony mifatotra tsy mba hamavoiny.
  '34':
  - type: text
    content: Aoka hidera Azy ny lanitra sy ny tany,
  - type: text
    content: Ny ranomasina sy izay rehetra mihetsika ao aminy.
  '35':
  - type: text
    content: Fa Andriamanitra hamonjy an’i Ziona sady hanangana ny tanànan’i Joda;
  - type: text
    content: Ary hitoetra ao ny olony ka ho tompony;
  '36':
  - type: text
    content: Dia handova azy ny taranaky ny mpanompony;
  - type: text
    content: Ary hitoetra ao izay tia ny anarany.
  '4':
  - type: text
    content: Maro noho ny volon-dohako ny isan’izay mankahala ahy tsy ahoan-tsy ahoana;
  - type: text
    content: Mahery izay ta-hahafaty ahy, dia ny fahavaloko tsy ahoan-tsy ahoana;
  - type: text
    content: Mampanonitra ahy izay tsy nalaiko izy.
  '5':
  - type: text
    content: Andriamanitra ô, Hianao mahalala ny hadalako;
  - type: text
    content: Ary ny heloko tsy mba miafina aminao.
  '6':
  - type: text
    content: Aoka tsy ho menatra noho ny amiko izay miandry Anao, Jehovah, Tompon’ny maro ô;
  - type: text
    content: Aoka tsy ho very hevitra noho ny amiko izay mitady Anao, ry Andriamanitry ny Isiraely ô.
  '7':
  - type: text
    content: Fa noho ny aminao no itondrako latsa;
  - type: text
    content: Safotry ny henatra ny tavako.
  '8':
  - type: text
    content: Efa vahiny amin’ny rahalahiko aho;
  - type: text
    content: Eny, efa olon-ko azy amin’ny zanak’ineny aho.
  '9':
  - type: text
    content: Fa ny firehetako ny amin’ny tranonao no naharìtra aina ahy;
  - type: text
    content: Ary ny latsa nataon’izay nandatsa Anao dia nihatra tamiko.
