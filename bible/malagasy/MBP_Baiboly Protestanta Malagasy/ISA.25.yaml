document_id: ISA.25,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Hira fisaorana an’Andriamanitra noho ny soa nataony ho an’ny olony sy ny nampijaliany ny fahavalony kosa.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: JEHOVAH ô, Andriamanitro Hianao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hanandratra Anao sy hidera ny anaranao aho,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nanao zava-mahagaga Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia zavatra efa voakasa hatramin’ny ela sady mahatoky no marina indrindra.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hipetraka amin’ity tendrombohitra ity ny tànan’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Moaba hohosihosena ao amin’izay itoerany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia tahaka ny fanosihosena ny mololo miavosa amin’ny rano ao am-pahitra;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ireo dia hamelatra ny tànany eo afovoan’izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny famelatry ny mpilomano ny tànany raha milomano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.11 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Izy.
      marker-yv: yv-n
    - type: text
      text: ' kosa hampietry ny fiavonavonany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Na dia kanto aza ny fahamailamailaky ny tànany.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny màndanao mafy sy avo dia harodany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka haetriny sy hofongorany hatramin’ny tany, dia hatramin’ny vovoka.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa efa nataonao tonga korontam-bato ny tanàna;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny tanàna mimanda dia rava tokoa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny lapan’ny fahavalo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.2 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hafa firenena.
      marker-yv: yv-n
    - type: text
      text: ' dia nataonao tsy vanon-ko tanàna;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hatsangana intsony mandrakizay iny;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka dia hankalaza Anao ny firenena masiaka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hatahotra Anao ny tanànan’ny firenena lozabe.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa fiarovana mafy ho an’ny reraka Hianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, fiarovana mafy ho an’ny malahelo amin’ny fahoriany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fierena amin’ny ranonoram-baratra, fialokalofana amin’ny hainandro,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ny rivotry ny mahery dia tahaka ny ranonorana mifafy mamely ny ampiantany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tahaka ny fandresinao ny hainandro izay mamely ny tany karankaina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No andresenao ny fitabataban’ny firenena hafa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, tahaka ny amin’ny hainandro resin’ny aloky ny rahona matevina
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No andresena ny fanakoran’ny olon-dozabe.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jehovah, Tompon’ny maro, dia hanao fanasana ho an’ny firenena rehetra eto amin’ity tendrombohitra ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fanasana amin’ny zavatra matavy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fanasana amin’ny divay efa niotrika ela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zavatra matavy be tsoka,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Divay efa niotrika ela sady voadio tsara.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hofoanany eto amin’ity tendrombohitra ity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny sarona izay manarona ny olona rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny rakotra izay arakotra ny firenena rehetra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hofoanany tsy hisy mandrakizay ny fahafatesana;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Jehovah Tompo hamafa ny ranomaso amin’ny tava rehetra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady hanafa-tondromaso ny olony eny amin’ny tany rehetra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Jehovah no efa niteny.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ary holazaina amin’izany andro izany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro Andriamanitsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay nandrasantsika hamonjy antsika;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro Jehovah, Izay nandrasantsika,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Koa dia aoka ho faly sy ho ravoravo amin’ny famonjeny isika.
