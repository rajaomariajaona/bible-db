document_id: ISA.25,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fisaorana an’Andriamanitra noho ny soa nataony ho an’ny olony sy ny nampijaliany ny fahavalony kosa.
  - type: text
    content: JEHOVAH ô, Andriamanitro Hianao;
  - type: text
    content: Hanandratra Anao sy hidera ny anaranao aho,
  - type: text
    content: Fa efa nanao zava-mahagaga Hianao,
  - type: text
    content: Dia zavatra efa voakasa hatramin’ny ela sady mahatoky no marina indrindra.
  '10':
  - type: text
    content: Fa hipetraka amin’ity tendrombohitra ity ny tànan’i Jehovah,
  - type: text
    content: Ary Moaba hohosihosena ao amin’izay itoerany,
  - type: text
    content: Dia tahaka ny fanosihosena ny mololo miavosa amin’ny rano ao am-pahitra;
  '11':
  - type: text
    content: Ary ireo dia hamelatra ny tànany eo afovoan’izany,
  - type: text
    content: Tahaka ny famelatry ny mpilomano ny tànany raha milomano;
  - type: text
    content: Fa Jehovah
  - type: note
    content: Heb. Izy.
  - type: text
    content: ' kosa hampietry ny fiavonavonany,'
  - type: text
    content: Na dia kanto aza ny fahamailamailaky ny tànany.
  '12':
  - type: text
    content: Ary ny màndanao mafy sy avo dia harodany
  - type: text
    content: Ka haetriny sy hofongorany hatramin’ny tany, dia hatramin’ny vovoka.
  '2':
  - type: text
    content: Fa efa nataonao tonga korontam-bato ny tanàna;
  - type: text
    content: Ny tanàna mimanda dia rava tokoa;
  - type: text
    content: Ny lapan’ny fahavalo
  - type: note
    content: Heb. hafa firenena.
  - type: text
    content: ' dia nataonao tsy vanon-ko tanàna;'
  - type: text
    content: Tsy hatsangana intsony mandrakizay iny;
  '3':
  - type: text
    content: Ka dia hankalaza Anao ny firenena masiaka,
  - type: text
    content: Hatahotra Anao ny tanànan’ny firenena lozabe.
  '4':
  - type: text
    content: Fa fiarovana mafy ho an’ny reraka Hianao,
  - type: text
    content: Eny, fiarovana mafy ho an’ny malahelo amin’ny fahoriany,
  - type: text
    content: Fierena amin’ny ranonoram-baratra, fialokalofana amin’ny hainandro,
  - type: text
    content: Fa ny rivotry ny mahery dia tahaka ny ranonorana mifafy mamely ny ampiantany.
  '5':
  - type: text
    content: Tahaka ny fandresinao ny hainandro izay mamely ny tany karankaina
  - type: text
    content: No andresenao ny fitabataban’ny firenena hafa;
  - type: text
    content: Eny, tahaka ny amin’ny hainandro resin’ny aloky ny rahona matevina
  - type: text
    content: No andresena ny fanakoran’ny olon-dozabe.
  '6':
  - type: text
    content: Ary Jehovah, Tompon’ny maro, dia hanao fanasana ho an’ny firenena rehetra eto amin’ity tendrombohitra ity,
  - type: text
    content: Dia fanasana amin’ny zavatra matavy,
  - type: text
    content: Fanasana amin’ny divay efa niotrika ela,
  - type: text
    content: Zavatra matavy be tsoka,
  - type: text
    content: Divay efa niotrika ela sady voadio tsara.
  '7':
  - type: text
    content: Ary hofoanany eto amin’ity tendrombohitra ity,
  - type: text
    content: Ny sarona izay manarona ny olona rehetra
  - type: text
    content: Sy ny rakotra izay arakotra ny firenena rehetra.
  '8':
  - type: text
    content: Hofoanany tsy hisy mandrakizay ny fahafatesana;
  - type: text
    content: Ary Jehovah Tompo hamafa ny ranomaso amin’ny tava rehetra
  - type: text
    content: Sady hanafa-tondromaso ny olony eny amin’ny tany rehetra,
  - type: text
    content: Fa Jehovah no efa niteny.
  '9':
  - type: text
    content: 'Ary holazaina amin’izany andro izany hoe:'
  - type: text
    content: Indro Andriamanitsika,
  - type: text
    content: Izay nandrasantsika hamonjy antsika;
  - type: text
    content: Indro Jehovah, Izay nandrasantsika,
  - type: text
    content: Koa dia aoka ho faly sy ho ravoravo amin’ny famonjeny isika.
