document_id: PSA.79
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Fifonana noho ny faharavana nataon’ny fahavalo.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon’i Asafa.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ANDRIAMANITRA ô, tonga eto amin’ny lovanao ny jentilisa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka nandoto ny tempolinao masina
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nanao an’i Jerosalema ho korontam-bato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fatin’ny mpanomponao nomeny hehanin’ny voro-manidina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny nofon’ny olonao masina ho an’ny bidi-dia;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny rany naidiny manodidina an’i Jerosalema tahaka ny rano,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy nisy handevina.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tonga fandàtsan’ny namanay izahay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady faneso sy fanakòran’izay manodidina anay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mandra-pahoviana, Jehovah ô, no hanontolo fo Hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka hirehitra tahaka ny afo ny fahasaro-piaronao?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aidino amin’ny jentilisa izay tsy mahalala Anao ny fahatezeranao
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy amin’ny fanjakana izay tsy miantso ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa efa nandany an’i Jakoba izy ireo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sady nandrava ny fonenany.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza tsarovana aminay ny heloky ny razanay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho avy faingana hitsena anay ny fiantranao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa reraka indrindra izahay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô, noho ny voninahitry ny anaranao;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary afaho izahay, ka mamelà ny helokay, noho ny anaranao.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nahoana ny jentilisa no hanao hoe: Aiza izay Andriamaniny?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aoka ho fantatra amin’ny jentilisa eo imasonay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny famaliana ny ran’ny mpanomponao izay nalatsaka.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aoka ho tonga eo anatrehanao ny fisentoan’ny mpifatotra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Araka ny halehiben’ny sandrinao dia arovy tsy ho faty ny zanaky ny fahafatesana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary valio impito heny ho ao an-tratran’ny mifanila fonenana aminay
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny fanaratsiana izay nanaratsiany Anao, Tompo ô.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa izahay, olonao sy ondry fiandrinao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia hisaotra Anao mandrakizay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hatramin’ny taranaka fara mandimby no hilazanay ny fiderana Anao.
