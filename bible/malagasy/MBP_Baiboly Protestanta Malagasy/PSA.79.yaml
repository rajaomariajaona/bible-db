document_id: PSA.79,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifonana noho ny faharavana nataon’ny fahavalo.
  - type: text
    content: Salamo nataon’i Asafa.
  - type: text
    content: ANDRIAMANITRA ô, tonga eto amin’ny lovanao ny jentilisa
  - type: text
    content: Ka nandoto ny tempolinao masina
  - type: text
    content: Sady nanao an’i Jerosalema ho korontam-bato.
  '10':
  - type: text
    content: 'Nahoana ny jentilisa no hanao hoe: Aiza izay Andriamaniny?'
  - type: text
    content: Aoka ho fantatra amin’ny jentilisa eo imasonay
  - type: text
    content: Ny famaliana ny ran’ny mpanomponao izay nalatsaka.
  '11':
  - type: text
    content: Aoka ho tonga eo anatrehanao ny fisentoan’ny mpifatotra;
  - type: text
    content: Araka ny halehiben’ny sandrinao dia arovy tsy ho faty ny zanaky ny fahafatesana.
  '12':
  - type: text
    content: Ary valio impito heny ho ao an-tratran’ny mifanila fonenana aminay
  - type: text
    content: Ny fanaratsiana izay nanaratsiany Anao, Tompo ô.
  '13':
  - type: text
    content: Fa izahay, olonao sy ondry fiandrinao,
  - type: text
    content: Dia hisaotra Anao mandrakizay;
  - type: text
    content: Hatramin’ny taranaka fara mandimby no hilazanay ny fiderana Anao.
  '2':
  - type: text
    content: Ny fatin’ny mpanomponao nomeny hehanin’ny voro-manidina,
  - type: text
    content: Ny nofon’ny olonao masina ho an’ny bidi-dia;
  '3':
  - type: text
    content: Ny rany naidiny manodidina an’i Jerosalema tahaka ny rano,
  - type: text
    content: Ary tsy nisy handevina.
  '4':
  - type: text
    content: Tonga fandàtsan’ny namanay izahay
  - type: text
    content: Sady faneso sy fanakòran’izay manodidina anay.
  '5':
  - type: text
    content: Mandra-pahoviana, Jehovah ô, no hanontolo fo Hianao,
  - type: text
    content: Ka hirehitra tahaka ny afo ny fahasaro-piaronao?
  '6':
  - type: text
    content: Aidino amin’ny jentilisa izay tsy mahalala Anao ny fahatezeranao
  - type: text
    content: Sy amin’ny fanjakana izay tsy miantso ny anaranao;
  '7':
  - type: text
    content: Fa efa nandany an’i Jakoba izy ireo
  - type: text
    content: Sady nandrava ny fonenany.
  '8':
  - type: text
    content: Aza tsarovana aminay ny heloky ny razanay;
  - type: text
    content: Aoka ho avy faingana hitsena anay ny fiantranao,
  - type: text
    content: Fa reraka indrindra izahay.
  '9':
  - type: text
    content: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô, noho ny voninahitry ny anaranao;
  - type: text
    content: Ary afaho izahay, ka mamelà ny helokay, noho ny anaranao.
