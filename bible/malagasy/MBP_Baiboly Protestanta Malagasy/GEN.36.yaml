document_id: GEN.36,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak’i Esao.
  - type: text
    content: 'ARY izao no taranak’i Esao (Edoma izany): '
  '10':
  - type: text
    content: 'Ny anaran’ny zanakalahin’i Esao dia izao: Elifaza, zanak’i Ada, vadin’i Esao, sy Regoela, zanak’i Basemata, vadin’i Esao.'
  '11':
  - type: text
    content: 'Ary ny zanakalahin’i Elifaza dia Temana sy Omara sy Zefo sy Gatama ary Kenaza. '
  '12':
  - type: text
    content: Ary Timna no vaditsindranon’i Elifaza, zanakalahin’i Esao; ary niteraka an’i Amaleka tamin’i Elifaza izy. Ireo no zanakalahin’i Ada, vadin’i Esao.
  '13':
  - type: text
    content: 'Ary izao no zanakalahin’i Regoela: Nahata sy Zera sy Sama ary Miza; ireo no zanakalahin’i Basemata, vadin’i Esao.'
  '14':
  - type: text
    content: 'Ary izao no zanakalahin’i Oholibama, zanakavavin’i Ana, zanakavavin’i Zibona, vadin’i Esao: niteraka an’i Jeosy sy Jalama ary Kora tamin’i Esao izy.'
  '15':
  - type: text
    content: 'Izao no loham-pirenena tamin’ny taranak’i Esao: ny zanakalahin’i Elifaza, lahimatoan’i Esao, dia Temana loham-pireneny sy Omara loham-pireneny sy Zefo loham-pireneny sy Kenaza loham-pireneny '
  '16':
  - type: text
    content: sy Kora loham-pireneny sy Gatama loham-pireneny ary Amaleka loham-pireneny. Ireo no loham-pireneny avy tamin’i Elifaza tany amin’ny tany Edoma; ireo no zanak’i Ada.
  '17':
  - type: text
    content: 'Ary izao no zanakalahin’i Regoela, zanak’i Esao: Nahata loham-pireneny sy Zera loham-pireneny sy Sama loham-pireneny sy Miza loham-pireneny. Ireo no loham-pirenena avy tamin’i Regoela tany amin’ny tany Edoma; ireo no zanak’i Basemata, vadin’i Esao.'
  '18':
  - type: text
    content: 'Ary izao no zanakalahin’i Oholibama, vadin’i Esao: Jeosy loham-pireneny sy Jalama loham-pireneny sy Kora loham-pireneny. Ireo no loham-pirenena avy tamin’i Oholibama, zanakavavin’i Ana, vadin’i Esao. '
  '19':
  - type: text
    content: Ireo no zanak’i Esao, izay atao hoe koa Edoma, ary ireo no loham-pireneny.
  '2':
  - type: text
    content: 'Esao naka vady tamin’ny zanakavavin’ny Kananita, dia Ada, zanak’i Elona Hetita, sy Oholibama, zanak’i Ana, zanakavavin’i Zibona Hivita, '
  '20':
  - type: text
    content: 'Ary izao no zanakalahin’i Seïra Horita, izay nonina tany amin’ny tany: Lotana sy Sobala sy Zibona sy Ana '
  '21':
  - type: text
    content: sy Disona sy Ezera ary Disana. Ireo no loham-pirenena tamin’ny Horita, dia ny taranak’i Seïra, tany amin’ny tany Edoma.
  '22':
  - type: text
    content: Ary ny zanakalahin’i Lotana dia Hory sy Hemana; ary Timna no anabavin’i Lotana.
  '23':
  - type: text
    content: 'Ary izao no zanakalahin’i Sobala: Alvana sy Manahata sy Ebala sy Sefo ary Onama.'
  '24':
  - type: text
    content: 'Ary izao no zanakalahin’i Zibona: Aia sy Ana (izany Ana izany ilay nahita ny ranomafana tany an-efitra, raha niandry ny borikin’i Zibona rainy izy).'
  '25':
  - type: text
    content: 'Ary izao no zanak’i Ana: Disona sy Oholibama, zanakavavin’i Ana. '
  '26':
  - type: text
    content: 'Ary izao no zanakalahin’i Disona: Hemdana sy Esbana sy Jitrana ary Kerana. '
  '27':
  - type: text
    content: 'Ary izao no zanak’i Ezera: Bilana sy Zavana ary Akana. '
  '28':
  - type: text
    content: 'Ary izao no zanak’i Disana: Oza sy Arana.'
  '29':
  - type: text
    content: 'Ary izao no loham-pirenena tamin’ny Horita: Lotana loham-pireneny sy Sobala loham-pireneny sy Zibona loham-pireneny sy Ana loham-pireneny '
  '3':
  - type: text
    content: 'ary Basemata, zanakavavin’Isimaela sady anabavin’i Nebaiota. '
  '30':
  - type: text
    content: sy Disona loham-pireneny sy Ezera loham-pireneny ary Disana loham-pireneny. Ireo no loham-pirenena tamin’ny Horita, dia ny loham-pireneny tany amin’ny tany Seïra.
  '31':
  - type: text
    content: 'Ary izao no mpanjaka izay nanjaka tany amin’ny tany Edoma, fony tsy mbola nisy mpanjaka nanjaka tamin’ny Zanak’Isiraely:'
  '32':
  - type: text
    content: 'Nanjaka tany Edoma Bela, zanak’i Beora; ary Dinaba no anaran’ny tanànany. '
  '33':
  - type: text
    content: 'Ary maty Bela, dia nanjaka nandimby azy Jobaba, zanak’i Zera avy tany Bozra. '
  '34':
  - type: text
    content: 'Ary maty Jobaba, dia nanjaka nandimby azy Hosama avy tamin’ny tanin’ny Temanita. '
  '35':
  - type: text
    content: 'Ary maty Hosama, dia nanjaka nandimby azy Hadada, zanak’i Bedada, izay namely ny Midianita tany amin’ny tany Moaba; ary Avita no anaran’ny tanànany. '
  '36':
  - type: text
    content: 'Ary maty Hadada, dia nanjaka nandimby azy Samla avy tany Masreka. '
  '37':
  - type: text
    content: 'Ary maty Samla, dia nanjaka nandimby azy Saoly avy tany Rehobota eo amoron’ny Ony. '
  '38':
  - type: text
    content: 'Ary maty Saoly, dia nanjaka nandimby azy Bala-hanana, zanak’i Akbora. '
  '39':
  - type: text
    content: Ary maty Bala-hanana, zanak’i Akbora; dia nanjaka nandimby azy Hadara; ary Pao no anaran’ny tanànany; ary ny anaran’ny vadiny dia Mehetebela, zanakavavin’i Matreda, zanakavavin’i Me-zahaba.
  '4':
  - type: text
    content: 'Ary Ada niteraka an’i Elifaza tamin’i Esao; ary Basemata niteraka an’i Regoela; '
  '40':
  - type: text
    content: 'Ary izao no anaran’ny loham-pirenena tamin’ny taranak’i Esao, araka ny mpianakaviny, araka ny fonenany sy araka ny anarany: Timna loham-pireneny sy Alva loham-pireneny sy Jeteta loham-pireneny '
  '41':
  - type: text
    content: 'sy Oholibama loham-pireneny sy Elaha loham-pireneny sy Pinona loham-pireneny '
  '42':
  - type: text
    content: 'sy Kenaza loham-pireneny sy Temana loham-pireneny sy Mibzara loham-pireneny '
  '43':
  - type: text
    content: sy Magdiela loham-pireneny ary Irama loham-pireneny. Ireo no loham-pirenena tamin’ny Edomita, araka ny fonenany, tany amin’ny taniny avy. Izany no Esao, rain’ny Edomita.
  '5':
  - type: text
    content: ary Oholibama niteraka an’i Jeosy sy Jalama ary Kora. Ireo no zanak’i Esao, izay naterany tany amin’ny tany Kanana.
  '6':
  - type: text
    content: 'Dia nentin’i Esao ny vadiny sy ny zanani-lahy sy ny zanani-vavy sy ny olona rehetra tao an-tranony sy ny omby aman-ondriny sy ny biby fiompiny rehetra, mbamin’ny fananany rehetra izay efa nohariny tany amin’ny tany Kanana, ka dia lasa nankany amin’izay tany hialana eo anatrehan’i Jakoba rahalahiny. '
  '7':
  - type: text
    content: 'Fa samy be loatra ny haren’izy mirahalahy, ka tsy mba nahazo niray monina izy; ary tsy omby azy ny tany fivahiniany, noho ny omby aman-ondriny. '
  '8':
  - type: text
    content: Koa nonina tany an-tendrombohitra Seïra Esao (Edoma izany).
  '9':
  - type: text
    content: 'Ary izao no taranak’i Esao, rain’ny Edomita any an-tendrombohitra Seïra: – '
