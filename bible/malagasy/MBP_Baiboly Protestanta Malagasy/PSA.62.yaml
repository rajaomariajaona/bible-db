document_id: PSA.62,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantombenan’ny fanahy izay manantena an’Andriamanitra, na dia mafy aza ny famelin’ny fahavalo.
  - type: text
    content: Ho an’ny mpiventy hira. Al-jedotona. Salamo nataon’i Davida.
  - type: text
    content: ANDRIAMANITRA tokoa no iantombenan’ny fanahiko;
  - type: text
    content: Avy aminy ny famonjena ahy.
  '10':
  - type: text
    content: Aza matoky ny fanaovana an-keriny, ary aza miantehitra amin’ny halatra;
  - type: text
    content: Raha mitombo ny harena, dia aza anorenana ny fonareo.
  '11':
  - type: text
    content: Indray mandeha no nitenenan’Andriamanitra;
  - type: text
    content: 'Indroa no nandrenesako hoe:'
  - type: text
    content: An’Andriamanitra ny hery.
  '12':
  - type: text
    content: Ary Anao koa, ry Tompo ô, ny famindrampo,
  - type: text
    content: Fa Hianao no mamaly ny olona rehetra araka ny asany avy.
  '2':
  - type: text
    content: Izy tokoa no vatolampiko sy famonjena ahy.
  - type: text
    content: Dia fiarovana avo ho ahy, ka tsy hangozohozo loatra aho.
  '3':
  - type: text
    content: Mandra-pahoviana no hirohotanareo hamely olona
  - type: text
    content: Sy handrodananareo rehetra azy toy ny mànda mirona sy ny rova mihozongozona;
  '4':
  - type: text
    content: Misaina hanongana azy hiala amin’ny voninahiny ireny;
  - type: text
    content: Lainga no ifaliany,
  - type: text
    content: Misaotra amin’ny vavany izy, fa manozona amin’ny fony.
  - type: text
    content: '[Sela.]'
  '5':
  - type: text
    content: Miantombena amin’Andriamanitra tokoa hianao, ry fanahiko;
  - type: text
    content: Fa Izy no antenaiko.
  '6':
  - type: text
    content: Izy tokoa no vatolampiko sy famonjena ahy,
  - type: text
    content: Dia fiarovana avo ho ahy, ka tsy mba hangozohozo aho.
  '7':
  - type: text
    content: Andriamanitra no iankinan’ny famonjena ahy sy ny voninahitro;
  - type: text
    content: Ny vatolampiko mafy sy ny aroko dia ao amin’Andriamanitra.
  '8':
  - type: text
    content: Matokia Azy mandrakariva hianareo, ry olona;
  - type: text
    content: Loary eo anatrehany ny fonareo;
  - type: text
    content: Andriamanitra no aro ho antsika.
  - type: text
    content: '[Sela.]'
  '9':
  - type: text
    content: Zava-poana tokoa ny ambany, ary lainga ny ambony;
  - type: text
    content: Raha hatao amin’ny mizana izy, dia maivana; zava-poana mihitsy izy.
