document_id: PSA.62,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Fiantombenan’ny fanahy izay manantena an’Andriamanitra, na dia mafy aza ny famelin’ny fahavalo.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an’ny mpiventy hira. Al-jedotona. Salamo nataon’i Davida.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ANDRIAMANITRA tokoa no iantombenan’ny fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avy aminy ny famonjena ahy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aza matoky ny fanaovana an-keriny, ary aza miantehitra amin’ny halatra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha mitombo ny harena, dia aza anorenana ny fonareo.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Indray mandeha no nitenenan’Andriamanitra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indroa no nandrenesako hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An’Andriamanitra ny hery.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary Anao koa, ry Tompo ô, ny famindrampo,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Hianao no mamaly ny olona rehetra araka ny asany avy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Izy tokoa no vatolampiko sy famonjena ahy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fiarovana avo ho ahy, ka tsy hangozohozo loatra aho.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mandra-pahoviana no hirohotanareo hamely olona
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy handrodananareo rehetra azy toy ny mànda mirona sy ny rova mihozongozona;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Misaina hanongana azy hiala amin’ny voninahiny ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lainga no ifaliany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misaotra amin’ny vavany izy, fa manozona amin’ny fony.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Miantombena amin’Andriamanitra tokoa hianao, ry fanahiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa Izy no antenaiko.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izy tokoa no vatolampiko sy famonjena ahy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia fiarovana avo ho ahy, ka tsy mba hangozohozo aho.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Andriamanitra no iankinan’ny famonjena ahy sy ny voninahitro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny vatolampiko mafy sy ny aroko dia ao amin’Andriamanitra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Matokia Azy mandrakariva hianareo, ry olona;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loary eo anatrehany ny fonareo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitra no aro ho antsika.
  - type: usfm
    marker: qr
    children:
    - type: text
      text: '[Sela.]'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Zava-poana tokoa ny ambany, ary lainga ny ambony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha hatao amin’ny mizana izy, dia maivana; zava-poana mihitsy izy.
