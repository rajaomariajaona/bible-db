document_id: NAM.3,873
type_code: plt
verses:
  '1':
  - type: text
    content: LOZAN’ny tanàna mpandatsa-dra!
  - type: text
    content: Feno lainga sy fandozana izy;
  - type: text
    content: Tsy ialan-dremby ao aminy.
  '10':
  - type: text
    content: Nefa na izy aza dia lasa, eny, lasan-ko babo;
  - type: text
    content: Ny zanany madinika koa notorotoroina teny an-joron-dàlambe rehetra eny;
  - type: text
    content: Ny olo-malazany nanaovany filokana,
  - type: text
    content: Ary ny lehibeny rehetra nogadrana.
  '11':
  - type: text
    content: Hianao koa ho mamo ka hiafina;
  - type: text
    content: Hianao koa hitady fiarovana mafy hierenao ny fahavalonao.
  '12':
  - type: text
    content: 'Ny mànda mafinao rehetra ho tahaka ny aviavy misy voa mialintaona:'
  - type: text
    content: Raha hohozongozonina izy, dia hihintsana ao am-bavan’izay hihinana aza.
  '13':
  - type: text
    content: Indro, vehivavy no olonao ao aminao;
  - type: text
    content: Hidiran’ny fahavalonao no hidanadanan’ny vavahadin’ny taninao;
  - type: text
    content: Levon’ny afo ny hidinao.
  '14':
  - type: text
    content: Manangòna rano ho anao ho an’ny fahirano;
  - type: text
    content: Hamafio ny màndanao;
  - type: text
    content: Mirotsaha amin’ny fotaka, ka hosihoseo ho feta,
  - type: text
    content: Amboary ny lafaoro fandoroam-biriky.
  '15':
  - type: text
    content: Any no handevonan’ny afo anao
  - type: text
    content: Sy handripahan’ny sabatra anao;
  - type: text
    content: Hohaniny toy ny fihinan’ny valalavao hianao.
  - type: text
    content: Mihamaroa toy ny valalavao,
  - type: text
    content: Mihabetsaha toy ny valala.
  '16':
  - type: text
    content: Nataonao betsaka noho ny kintana eny amin’ny lanitra ny mpandrantonao;
  - type: text
    content: Mipariaka
  - type: note
    content: 'Na: Mandevona.'
  - type: text
    content: ' ny valalavao ka lasa manidina.'
  '17':
  - type: text
    content: Ny andriananao dia toy ny valala,
  - type: text
    content: Ary ny mpifehinao
  - type: note
    content: 'Na: mpanoratrao.'
  - type: text
    content: ' dia toy ny valalavao,'
  - type: text
    content: Izay mitoby eny amin’ny fefy, raha mangatsiaka ny andro;
  - type: text
    content: Fa raha miposaka ny masoandro, dia lasa manidina izy,
  - type: text
    content: Ka tsy fantatra izay nalehany.
  '18':
  - type: text
    content: Rendrehana ny mpiandrinao, ry mpanjakan’i Asyria;
  - type: text
    content: Miampatrampatra ny lehilahy maherinao;
  - type: text
    content: Aely eny an-tendrombohitra ny olonao
  - type: text
    content: Ka tsy misy mamory azy.
  '19':
  - type: text
    content: Tsy mety mihena ny fangirifirianao,
  - type: text
    content: Tsy azo sitranina ny ferinao;
  - type: text
    content: Izay rehetra ilazana ny nanjo anao dia hiteha-tànana anao;
  - type: text
    content: Fa iza no tsy efa tratry ny fandozanao mandrakariva?
  '2':
  - type: text
    content: Injany! ny fifiopioky ny karavasy!
  - type: text
    content: Ny fikorodondrodon’ny kodia!
  - type: text
    content: Ny fikatrokatroky ny soavaly!
  - type: text
    content: Ary ny fitraitraiky ny kalesy!
  '3':
  - type: text
    content: He! ny fampiriotry ny mpitaingin-tsoavaly!
  - type: text
    content: Akory ny fanelatselatry ny sabatra
  - type: text
    content: Sy ny famirapiratry ny lefona!
  - type: text
    content: Indrisy ny habetsahan’ny voatrabaka sy ny hamaroan’ny voavono!
  - type: text
    content: Tsy hita isa ny faty,
  - type: text
    content: Eny, voafingampingan’ny faty ny olona,
  '4':
  - type: text
    content: Noho ny habiazan’ny fijangajangan’ikala janga tsara tarehy,
  - type: text
    content: Tompovavin’ny fankatovana,
  - type: text
    content: Izay mivarotra firenena amin’ny fijangajangany
  - type: text
    content: Sy fokom-pirenena amin’ny fankatovany.
  '5':
  - type: text
    content: Indro, hamely anao Aho, hoy Jehovah, Tompon’ny maro;
  - type: text
    content: Ary haingaiko ho amin’ny tavanao ny moron-tongotr’akanjonao,
  - type: text
    content: Ka hasehoko amin’ny firenena ny fitanjahanao
  - type: text
    content: Sy amin’ny fanjakana ny fahamenaranao.
  '6':
  - type: text
    content: Dia hotsipazako loto hianao
  - type: text
    content: Ka hataoko tsinontsinona,
  - type: text
    content: Eny, hataoko fitalanjonana hianao.
  '7':
  - type: text
    content: Ary izay rehetra mijery anao dia handositra anao
  - type: text
    content: 'ka hanao hoe: Rava Ninive!'
  - type: text
    content: Iza no hitomany azy?
  - type: text
    content: Aiza no hitadiavako Izay hampionona anao?
  '8':
  - type: text
    content: Tsara noho No-amona va hianao?
  - type: text
    content: Ilay nitoetra teo anelanelan’ny ony
  - type: text
    content: Ka nohodidinin’ny rano;
  - type: text
    content: Ny rano be
  - type: note
    content: Heb. ranomasina.
  - type: text
    content: ' no rovany,'
  - type: text
    content: Ary ny rano be
  - type: note
    content: Heb. ranomasina.
  - type: text
    content: ' koa no màndany;'
  '9':
  - type: text
    content: Ny Etiopiana sy ny Egyptiana no heriny,
  - type: text
    content: Sady tsy hita lany ireny;
  - type: text
    content: Ny Lydiana sy ny Libyana no mpanampy azy.
  - type: note
    content: Heb. anao.
