document_id: NAM.3,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: LOZAN’ny tanàna mpandatsa-dra!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feno lainga sy fandozana izy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy ialan-dremby ao aminy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa na izy aza dia lasa, eny, lasan-ko babo;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny zanany madinika koa notorotoroina teny an-joron-dàlambe rehetra eny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny olo-malazany nanaovany filokana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny lehibeny rehetra nogadrana.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao koa ho mamo ka hiafina;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hianao koa hitady fiarovana mafy hierenao ny fahavalonao.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ny mànda mafinao rehetra ho tahaka ny aviavy misy voa mialintaona:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raha hohozongozonina izy, dia hihintsana ao am-bavan’izay hihinana aza.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, vehivavy no olonao ao aminao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hidiran’ny fahavalonao no hidanadanan’ny vavahadin’ny taninao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levon’ny afo ny hidinao.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manangòna rano ho anao ho an’ny fahirano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamafio ny màndanao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mirotsaha amin’ny fotaka, ka hosihoseo ho feta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amboary ny lafaoro fandoroam-biriky.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any no handevonan’ny afo anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy handripahan’ny sabatra anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hohaniny toy ny fihinan’ny valalavao hianao.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihamaroa toy ny valalavao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mihabetsaha toy ny valala.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nataonao betsaka noho ny kintana eny amin’ny lanitra ny mpandrantonao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mipariaka
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mandevona.
      marker-yv: yv-n
    - type: text
      text: ' ny valalavao ka lasa manidina.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny andriananao dia toy ny valala,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny mpifehinao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mpanoratrao.
      marker-yv: yv-n
    - type: text
      text: ' dia toy ny valalavao,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mitoby eny amin’ny fefy, raha mangatsiaka ny andro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa raha miposaka ny masoandro, dia lasa manidina izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy fantatra izay nalehany.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendrehana ny mpiandrinao, ry mpanjakan’i Asyria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Miampatrampatra ny lehilahy maherinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aely eny an-tendrombohitra ny olonao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka tsy misy mamory azy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy mety mihena ny fangirifirianao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy azo sitranina ny ferinao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay rehetra ilazana ny nanjo anao dia hiteha-tànana anao;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa iza no tsy efa tratry ny fandozanao mandrakariva?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Injany! ny fifiopioky ny karavasy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fikorodondrodon’ny kodia!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fikatrokatroky ny soavaly!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny fitraitraiky ny kalesy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He! ny fampiriotry ny mpitaingin-tsoavaly!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Akory ny fanelatselatry ny sabatra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy ny famirapiratry ny lefona!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indrisy ny habetsahan’ny voatrabaka sy ny hamaroan’ny voavono!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy hita isa ny faty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, voafingampingan’ny faty ny olona,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noho ny habiazan’ny fijangajangan’ikala janga tsara tarehy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tompovavin’ny fankatovana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Izay mivarotra firenena amin’ny fijangajangany
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy fokom-pirenena amin’ny fankatovany.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indro, hamely anao Aho, hoy Jehovah, Tompon’ny maro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary haingaiko ho amin’ny tavanao ny moron-tongotr’akanjonao,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hasehoko amin’ny firenena ny fitanjahanao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy amin’ny fanjakana ny fahamenaranao.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hotsipazako loto hianao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka hataoko tsinontsinona,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, hataoko fitalanjonana hianao.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary izay rehetra mijery anao dia handositra anao
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ka hanao hoe: Rava Ninive!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iza no hitomany azy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aiza no hitadiavako Izay hampionona anao?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsara noho No-amona va hianao?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ilay nitoetra teo anelanelan’ny ony
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nohodidinin’ny rano;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny rano be
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranomasina.
      marker-yv: yv-n
    - type: text
      text: ' no rovany,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary ny rano be
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ranomasina.
      marker-yv: yv-n
    - type: text
      text: ' koa no màndany;'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Etiopiana sy ny Egyptiana no heriny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sady tsy hita lany ireny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny Lydiana sy ny Libyana no mpanampy azy.
    - type: usfm
      marker: f
      children:
