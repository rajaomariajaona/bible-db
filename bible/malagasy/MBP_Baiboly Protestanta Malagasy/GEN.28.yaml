document_id: GEN.28,873
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Isaka nampaka an’i Jakoba ka nitso-drano azy ary namepetra azy hoe: Aza maka vady avy amin’ny zanakavavin’ny Kananita hianao. '
  '10':
  - type: text
    content: 'DIA nivoaka avy tany Beri-sheba Jakoba ka nankany Harana. '
  '11':
  - type: text
    content: Ary tonga teo amin’ny fitoerana anankiray izy ka nandry teo niloaka alina, satria efa maty ny masoandro; dia naka vato tamin’izany fitoerana izany izy ka nataony ondana, dia nandry teo izy.
  '12':
  - type: text
    content: 'Ary nanonofy izy, ka, indro, nisy tohatra niorina tamin’ny tany, ka nipaka tamin’ny lanitra ny lohany; ary, indreo, nisy anjelin’Andriamanitra niakatra sy nidina teo aminy. '
  '13':
  - type: text
    content: Ary, indro, Jehovah niseho teo amboniny
  - type: note
    content: 'Na: teo anilany.'
  - type: text
    content: ' ka nanao hoe: Izaho no Jehovah, Andriamanitr’i Abrahama rainao sy Andriamanitr’Isaka; ny tany izay andrianao dia homeko anao sy ny taranakao; '
  '14':
  - type: text
    content: 'ary ny taranakao ho be tahaka ny vovoka amin’ny tany; dia hiely any andrefana sy any atsinanana ary any avaratra sy any atsimo hianao; ary aminao sy ny taranakao no hitahiana ny firenena rehetra ambonin’ny tany. '
  '15':
  - type: text
    content: Ary, indro, Izaho momba anao ka hiaro anao amin’izay làlan-kalehanao rehetra ary hampody anao indray ho amin’ity tany ity; fa tsy handao anao Aho mandra-panaoko izay voalazako taminao.
  '16':
  - type: text
    content: 'Ary Jakoba nahatsiaro tamin’ny torimasony, dia nanao hoe: Ato amin’ity fitoerana ity tokoa Jehovah, fa izaho no tsy nahalala. '
  '17':
  - type: text
    content: 'Dia raiki-tahotra izy ka nanao hoe: Endrey, mahatahotra ity fioetrana ity! tsy hafa ity, fa tranon’Andriamanitra sy vavahadin’ny lanitra.'
  '18':
  - type: text
    content: 'Ary nifoha maraina koa Jakoba, dia naka ilay vato izay nataony ondana ka nanorina azy ho tsangam-bato, dia nampidina diloilo teo aminy. '
  '19':
  - type: text
    content: Ary ny anaran’izany fitoerana izany dia nataony hoe Betela,
  - type: note
    content: Betela = Tranon’Andriamanitra.
  - type: text
    content: ' fa Lozy no anaran’ilay tanàna tany aloha.'
  '2':
  - type: text
    content: Miaingà ka mankanesa any Mesopotamia,
  - type: note
    content: Heb. Padan-arama.
  - type: text
    content: ' any amin’ny tranon’i Betoela rain-dreninao; dia makà vady any, avy amin’ny zanakavavin’i Labana anadahin-dreninao. '
  '20':
  - type: text
    content: 'Dia nivoady Jakoba ka nanao hoe: Raha homba ahy Andriamanitra ka hiaro ahy amin’izao làlana alehako izao, ary hanome ahy mofo hohaniko sy lamba hitafiako, '
  '21':
  - type: text
    content: 'ka ho tafaverina soa aman-tsara any amin’ny tranon’ny raiko aho, dia Jehovah no ho Andriamanitro, '
  '22':
  - type: text
    content: ary
  - type: note
    content: 'Na: ary Jehovah no ho Andriamnitro, dia.'
  - type: text
    content: ' ity vato izay naoriko ho tsangam-bato ity ho tranon’Andriamanitra, ary izay rehetra homenao ahy, dia homeko Anao tokoa ny ampahafolony.'
  '3':
  - type: text
    content: Ary Andriamanitra Tsitoha anie hitahy anao ka hahamaro fara anao sy hampitombo anao, mba ho tonga firenena maro
  - type: note
    content: Heb. fikambanam-pirenena.
  - type: text
    content: ' hianao; '
  '4':
  - type: text
    content: ary homeny anao anie ny fitahiana an’i Abrahama, dia ho anao sy ny taranakao koa, mba handovanao ny tany fivahinianao, izay efa nomen’Andriamanitra an’i Abrahama.
  '5':
  - type: text
    content: Ary Isaka nampandeha an’i Jakoba ka dia lasa izy nankany Mesopotamia.
  - type: note
    content: Heb. Padan-arama.
  - type: text
    content: ' ho any amin’i Labana, zanak’i Betoela Syriana,'
  - type: note
    content: Heb. Aramiana.
  - type: text
    content: ' anadahin-dRebeka, renin’i Jakoba sy Esao.'
  '6':
  - type: text
    content: Ary nony hitan’i Esao fa Isaka efa nitso-drano an’i Jakoba ka efa nampandeha azy ho any Mesopotamia
  - type: note
    content: Heb. Padan-arama.
  - type: text
    content: ' haka vady any ary nitso-drano azy sady namepetra azy hoe: Aza maka vady avy amin’ny zanakavavin’ny Kananita hianao; '
  '7':
  - type: text
    content: koa Jakoba efa nanaraka ny tenin’ny rainy aman-dreniny ka lasa nankany Mesopotamia;
  - type: note
    content: Heb. Padan-arama.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'ary hitan’i Esao fa efa ratsy teo imason’Isaka rainy ny zanakavavin’ny Kananita: '
  '9':
  - type: text
    content: dia lasa Esao nankany amin’Isimaela ka naka an’i Mahalota, zanakavavin’Isimaela, zanak’i Abrahama, sady anabavin’i Nebaiota, ho vadiny, ho fanampin’ny vady izay nananany.
  - type: heading
    content: Ny nisehoan’Andriamanitra tamin’i Jakoba tao Betela.
