    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary osilahy iray ho fanatitra noho ny ota, hanaovana fanavotana ho anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ho fanampin’ny fanatitra dorana noho ny voaloham-bolana sy ny fanatitra ho hanina momba azy ary ny fanatitra dorana mandrakariva sy ny fanatitra hohanina momba azy sy ny fanatitra aidina momba azy, araka ny fanaony, ho hanitra ankasitrahana, dia fanatitra atao amin’ny afo ho an’i Jehovah.
