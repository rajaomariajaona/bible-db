    - type: text
      text: '1'
  - type: text
    text: 'Ary amin’ny andro voalohany amin’ny volana fahafito dia hisy fivoriana masina ho anareo, aza manao tao-zavatra akory; ho andro fitsofan-trompetra ho anareo izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary izao no atero ho fanatitra odorana, ho hanitra ankasitrahana ho an’i Jehovah: vantotr’ombilahy iray sy ondrilahy iray ary zanak’ondry fito, izay iray taona'
