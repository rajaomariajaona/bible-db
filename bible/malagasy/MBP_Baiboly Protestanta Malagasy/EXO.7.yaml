document_id: EXO.7,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Indro, efa nataoko andriamanitra ho an’i Farao hianao; ary Arona rahalahinao kosa ho mpaminaninao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary Mosesy sy Arona nankao amin’i Farao ka nanao araka izay efa nandidian’i Jehovah; dia natsipin’i Arona teo anatrehan’i Farao sy teo anatrehan’ny mpanompony ny tehiny, ka tonga menarana iny.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nampanalain’i Farao ny olon-kendry sy ny mpanana ody; ary ireo ombiasy teo Egypta ireo dia nanao toy izany tamin’ny fankatovany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa samy nanipy ny tehiny avy izy ireo, ka tonga menarana ireny; nefa ny tehin’i Arona nitelina ny tehin’ireo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dia nihamafy ny fon’i Farao, ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain’i Jehovah.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Ny loza folo loha namelezan’Andriamanitra ny tany Egypta. Voalohany: ny rano tonga ra.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ARY hoy Jehovah tamin’i Mosesy: Efa mafy ny fon’i Farao, ka mandà tsy handefa ny olona izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mankanesa ao aminy hianao rahampitso; indro, hivoaka ho any amin’ny rano izy; dia mijanòna eo amoron’i Neily hianao ambara-pihaviny (ary ny tehina, ilay novana ho menarana, ho entinao eny an-tànanao), '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'dia lazao aminy hoe: Jehovah, Andriamanitry ny Hebreo, no naniraka ahy nankatỳ aminao hanao hoe: Alefaso ny oloko mba hanompoany Ahy any an-efitra; fa, indro, tsy nihaino hianao mandraka ankehitriny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa izao no lazain’i Jehovah: Izao no hahafantaranao fa Izaho no Jehovah: indro, ny tehiko etỳ an-tànako no hikapohako ny rano ao Neily, ka ho tonga ra izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia ho faty ny hazandrano ao Neily, ka ho maimbo Neily, ary tsy ho tian’ny Egyptania intsony ny hisotro ny rano ao.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy: Lazao amin’i Arona hoe: Raiso ny tehinao, ka ahinjiro ambonin’ny ranon’i Egypta ny tànanao, dia ambonin’ny sampan-dranony sy ambonin’ny lahin-dranony, sy ambonin,ny heniheniny, ary ambonin’ny kamoriny rehetra, mba ho tonga ra ireny; ary hisy ra eran’ny tany Egypta rehetra, na amin’ny fitoeran-drano hazo na amin’ny fitoeran-drano vato.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hianao hilaza izay rehetra nandidiako anao, ary Arona rahalahinao kosa hilaza amin’i Farao, mba handefasany ny Zanak’Isiraely hiala amin’ny taniny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nataon’i Mosesy sy Arona izany, araka izay nandidian’i Jehovah; dia nanainga ny tehina izy ka namely ny rano tao Neily teo imason’i Farao sy teo imason’ny mpanompony, dia tonga ra ny rano rehetra tao Neily; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: koa maty ny hazandrano izay tao Neily, dia maimbo Neily, ka tsy azon’ny Egyptiana nosotroina ny rano avy ao; ary ny ra dia nanerana ny tany Egypta rehetra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ny ombiasy teo Egypta, dia mba nanao toy izany koa tamin’ny fankatovany; ka dia nihamafy ny fon’i Farao, ka tsy nihaino azy mirahalahy izy, araka izay efa nolazain’i Jehovah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia niverina Farao ka nankao an-tranony. Kanefa tsy mba nahoany akory, na dia izany aza. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nihady rano hosotroiny teo amoron’i Neily ny Egyptiana rehetra; fa tsy azony nisotroana ny rano tao Neily. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nisy hafitoana taorian’ny namelezan’i Jehovah an’i Neily.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Faharoa: ny sahona.'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'DIA hoy Jehovah tamin’i Mosesy: Mankanesa ao amin’i Farao, ka lazao aminy hoe: Izao no lazain’i Jevoah: Alefaso ny oloko hanompo Ahy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa raha mandà ka tsy mandefa azy hianao, indro, Izaho hamely ny taninao rehetra amin’ny sahona; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'dia hisy sahona betsaka any Neily, ary hiakatra ireny ka hankao amin’ny tranonao sy ny trano fandrianao sy eny ambonin’ny farafaranao sy any amin’ny tranon’ny mpanomponao sy amin’ny vahoakanao ary eny amin’ny fanendasa-mofonao sy eny amin’ny vilia fanaova-mofonao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia ho aminao sy ny vahoakanao ary ny mpanomponao rehetra no hiakaran’ny sahona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary Izaho hanamafy ny fon’i Farao sy hanamaro ny famantarana sy ny fahagagana izay hataoko eto amin’ny tany Egypta. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa tsy hihaino anareo Farao, ka dia hamely an’i Egypta ny tànako, ary fitsarana lehibe no hitondrako ny antokon’ny Zanak’Isiraely oloko hiala amin’ny tany Egypta. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dia ho fantatry ny Egyptiana fa Izaho no Jehovah, rehefa maninjitra ny tànako amin’i Egypta Aho ka mitondra ny Zanak’Isiraely hivoaka avy any.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nataon’i Mosesy sy Arona izany: araka izay nandidian’i Jehovah azy no nataony.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary efa valo-polo taona Mosesy, ary efa telo amby valo-polo taona kosa Arona, raha niteny tamin’i Farao izy mirahalahy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy Jehovah tamin’i Mosesy sy Arona: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Raha miteny aminareo Farao ka manao hoe: Manaova fahagagana hanambara anareo, dia lazao amin’i Arona hoe: Raiso ny tehinao, ka atsipazo eo anatrehan’i Farao, dia ho tonga menarana iny.'
