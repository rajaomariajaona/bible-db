document_id: 1CH.12
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny lehilahy mahery izay nanatona an’i Davida, fony izy mbola nenjehin’i Saoly.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY izao no nankany amin’i Davida tany Ziklaga, fony izy mbola niery an’i Saoly, zanak’i Kisy; ary isan’ny lehilahy mahery mpanampy amin’ny ady ireo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'sady mpitondra tsipìka ka nahay nanavia sy nanavanana raha nitora-bato na nandefa tsipìka. Isan’ny Benjamita, rahalahin’i Saoly, ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny lohany dia Ahiezera sy Joasy, zanak’i Sema Gibeatita, sy Jeziela sy Peleta zanak’i Azmaveta, ary Beraka sy Jeho Anatotita '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary Jismaia Gibeonita, lehilahy mahery isan’ny telo-polo lahy sady mpifehy ny telo-polo lahy, ary Jeremia sy Jahaziela sy Johanana sy Jozababa Gaderatita '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sy Elozay sy Jerimota ary Bealia sy Semaria sy Sefatia Harofita '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sy Elkana sy Jisia sy Azarela sy Joezera ary Jasobeama Koraïta '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ary Joela sy Zebadia, zanak’i Jerohama avy any Gedora.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary tamin’ny Gadita nisy lehilahy mahery niendaka hanatona an’i Davida ho amin’ny fiarovana tany an-efitra, dia ny miaramila nahay niady ka nahatana ampinga lehibe sy lefona; ny tarehiny dia tahaka ny tarehin’ny liona, ary faingam-pandeha tahaka ny gazela
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'izahao 2 Sam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: i.19.
    marker-yv: yv-n
  - type: text
    text: ' eny an-tendrombohitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ezera no voalohany, Obadia no faharoa, Eliaba no fahatelo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mismana no fahefatra, Jeremia no fahadimy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Atahy no fahenina, Eliala no fahafito, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Johanana no fahavalo, Elizabada no fahasivy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jeremia no fahafolo, Makbanay no fahiraika ambin’ny folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireo no isan’ny taranak’i Gada sady samy mpifehy miaramila; ny kely indrindra naharesy olona zato, ary ny lehibe indrindra naharesy arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ireo no nita an’i Jordana tamin’ny volana voalohany, fony iny nihoatra ny morony rehetra; ary nampandositra izay rehetra teny amin’ny lohasaha na atsinanana na andrefana ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nisy tamin’ny taranak’i Benjamina sy Joda nankany amin’i Davida tany amin’ny fiarovana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Davida nivoaka hitsena azy ka niteny taminy hoe: Raha fihavanana no ihavianareo atỳ amiko hanampy ahy, dia hikambana isika; fa raha avy hamadika ahy kosa hianareo ho azon’ny fahavaloko, nefa tsy mba nanao an-keriny ny tànako, dia Andriamanitry ny razantsika no hijery sy hamaly izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Amasay, lehiben’ny mpanafika malaza,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Na: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ny telo-polo lahy.
    marker-yv: yv-n
  - type: text
    text: ' dia nampitenenin’ny Fanahy hoe: Anao izahay, ry Davida ô, fa miandany aminao, ry zanak’i Jese; fiadanana, eny, fiadanana anie ho anao, ary fiadanana anie ho an’ny manampy anao; fa Andriamanitrao no manampy anao. Dia noraisin’i Davida ireo ka notendreny ho mpifehy ny miaramila.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nisy sasany tamin’ny Manase niala hanatona an’i Davida, raha nomba ny Filistina hiady amin’i Saoly izy, nefa tsy nanampy azy izy; fa ireo andrianan’ny Filistina nifampisaina, dia nampandeha azy ka nanao hoe: Ny lohantsika no ho entiny mila sitraka hiverenany amin’i Saoly tompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha nankany Ziklaga izy, nisy tamin’ny Manase nanatona azy, dia Adna sy Jozabada sy Jediaela sy Mikaela sy Jozabada sy Eliho ary Ziletahy, mpifehy arivo tamin’ny Manase. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ireo dia nanampy an’i Davida hamely ny antokon’ny jirika; fa lehilahy mahery avokoa izy sady komandy amin’ny miaramila. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa tamin’izany nisy nankany amin’i Davida isan-andro isan-andro hanampy azy mandra-pahatongany ho toby lehibe toy ny tobin’Andriamanitra.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny amin’ny miaramila avy tamin’ny Isiraely rehetra izay nanatona an’i Davida tao Hebrona hampanjaka azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ARY izao no isan’ny miaramila efa voaomana hiady, izay tonga tao amin’i Davida tao Hebrona hamindra ny fanjakan’i Saoly ho azy araka ny tenin’i Jehovah:–
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tamin’ny taranak’i Joda, valon-jato amby enina arivo, mpitondra ampinga lehibe sy lefona sady efa voaomana hiady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tamin’ny taranak’i Simeona, zato amby fito arivo, lehilahy mahery sady matanjaka amin’ny ady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tamin’ny taranak’i Levy, enin-jato amby efatra arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Joiada dia lehiben’ny Aronita, ary nisy fiton-jato amby telo arivo teo aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ary Zadoka, zatovo mahery, sy ny fianakaviany, dia roa amby roa-polo lahy mpifehy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary tamin’ny taranak’i Benjamina, havan’i Saoly, telo arivo; fa hatramin’izany ny ankamaroany mbola nomba ny mpianakavin’i Saoly ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary tamin’ny taranak’i Efraima dia valon-jato amby roa alina, lehilahy mahery avokoa sady samy nalaza tamin’ny fianakaviany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary tamin’ny antsasaky ny firenen’i Manase dia valo arivo amby iray alina, izay notononina anarana ho avy hampanjaka an’i Davida.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary tamin’ny taranak’Isakara dia roan-jato no lohany, samy nahay namantatra tsara izay fotoana mety ka nahalala izay tokony hataon’ny Isiraely; ary ny rahalahiny rehetra nanaraka ny teniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tamin’ny Zebolona, izay azo nalefa hanafika ka nahay niady tamin’ny fiadiana samy hafa rehetra dia dimy alina, izay nahay nilahatra tsara tamin’ny firaisan-kina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary tamin’ny Naftaly dia nisy mpifehy arivo, ary manaraka azy dia nisy fito arivo amby telo alina amin’ampinga lehibe sy lefona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary tamin’ny Danita dia enin-jato amby valo arivo sy roa alina izay nahay niady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary tamin’ny Asera, efatra alina izay azo nalefa hanafika sady nahay niady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary avy tany an-dafin’i Jordana, tamin’ny Robenita sy ny Gadita ary ny antsasaky ny firenen’i Manase, nisy roa alina amby iray hetsy nitana fiadiana samy hafa rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ireo miaramila rehetra ireo, izay nahay nilahatra tsara, dia niray fo nankany Hebrona hampanjaka an’i Davida amin’ny Isiraely rehetra; ary ny sisa rehetra tamin’ny Isiraely koa niray fo hampanjaka an’i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary tao amin’i Davida hateloana izy sady nihinana sy nisotro; fa efa nanao nahandro ho azy ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary izay teo akaikiny koa hatramin’ny Isakara sy ny Zebolona ary ny Naftaly dia samy nampitondra hanina samy hafa nentin’ny boriky sy rameva sy ampondra ary omby, dia koba sy ampempan’aviavy sy voaloboka maina sy divay sy diloilo, ary omby sy ondry aman-osy betsaka koa; fa nisy fifaliana tamin’ny Isiraely.
