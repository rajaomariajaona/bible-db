document_id: JER.16,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nasain’Andriamanitra nataon’i Jeremia ny amin’ny loza hampijaliana ny Joda.
  - type: text
    content: 'ARY tonga tamiko ny tenin’i Jehovah hoe:'
  '10':
  - type: text
    content: 'Ary raha ambaranao amin’ity firenena ity izany teny rehetra izany, ka hoy izy aminao: Nahoana Jehovah no nilaza izany loza mafy rehetra izany hamelezana anay? Fa inona no helokay, ary inona no fahotanay, izay nanotanay tamin’i Jehovah Andriamanitray? '
  '11':
  - type: text
    content: 'dia lazao aminy hoe:'
  - type: text
    content: Noho ny nahafoizan’ny razanareo Ahy, hoy Jehovah,
  - type: text
    content: Sy ny nanarahany andriamani-kafa
  - type: text
    content: Sy ny nanompoany azy sy ny niankohofany teo anatrehany
  - type: text
    content: Ary ny nahafoizany Ahy sy ny tsy nitandremany ny lalàko.
  '12':
  - type: text
    content: Ary ny tenanareo koa nanao ratsy mihoatra noho ny razanareo;
  - type: text
    content: Fa he! hianareo samy mandeha araka ny ditry ny fo ratsinareo avokoa
  - type: text
    content: Ka tsy mihaino Ahy;
  '13':
  - type: text
    content: Ka dia horoahiko hiala amin’ity tany ity hianareo
  - type: text
    content: Ho any amin’ny tany tsy fantatrareo na ny razanareo;
  - type: text
    content: Any no hanompoanareo andriamani-kafa andro aman-alina,
  - type: text
    content: Satria tsy hamindra fo aminareo Aho.
  '14':
  - type: text
    content: 'Koa, indro, avy any andro, hoy Jehovah, izay tsy hanaovana intsony hoe:'
  - type: text
    content: Raha velona koa Jehovah,
  - type: text
    content: Izay nitondra ny Zanak’Isiraely niakatra avy tany amin’ny tany Egypta;
  '15':
  - type: text
    content: 'Fa izao kosa: Raha velona koa Jehovah,'
  - type: text
    content: Izay nitondra ny Zanak’Isiraely niakatra avy tany amin’ny tany avaratra
  - type: text
    content: Sy avy tany amin’ny tany rehetra izay nandroahany azy;
  - type: text
    content: Fa hampodiko ho amin’ny tany izay nomeko ny razany izy.
  '16':
  - type: text
    content: Indro, Izaho haniraka mpamovo maro, hoy Jehovah,
  - type: text
    content: Izay hamovo azy;
  - type: text
    content: Ary rehefa afaka izany, dia haniraka mpihaza maro Aho,
  - type: text
    content: Izay hihaza azy
  - type: text
    content: Any amin’ny tendrombohitra sy ny havoana rehetra
  - type: text
    content: Ary any an-tsefatsefaky ny harambato.
  '17':
  - type: text
    content: Fa ny masoko dia mijery ny alehany rehetra,
  - type: text
    content: Ka tsy miafina amin’ny tavako izany,
  - type: text
    content: Ary tsy takona amin’ny masoko ny helony.
  '18':
  - type: text
    content: Alohan’izany anefa dia hovaliako avy sasaka ny helony sy ny fahotany
  - type: text
    content: Noho ny nandotoany ny taniko,
  - type: text
    content: Dia ny namenoany ny lovako tamin’ireo fatin’ny sampiny
  - type: note
    content: Heb. fahavetavetany.
  - type: text
    content: ' sy fahavetavetany ireo.'
  '19':
  - type: text
    content: Jehovah ô, ry heriko sy fiarovana mafy ho ahy
  - type: text
    content: Ary fandosirako amin’ny andro fahoriana ô!
  - type: text
    content: Ho tonga aminao ny jentilisa avy any amin’ny faran’ny tany
  - type: text
    content: 'Ka hanao hoe:'
  - type: text
    content: Eny, tokoa lainga no nolovan’ny razanay,
  - type: text
    content: Dia zava-poana sady tsy misy mahasoa.
  '2':
  - type: text
    content: Aza manam-bady hianao,
  - type: text
    content: Ary aoka tsy hanan-janakalahy na zanakavavy amin’ity tany ity.
  '20':
  - type: text
    content: Moa mahay manao andriamanitra ho azy va ny olona?
  - type: text
    content: Tsy Andriamanitra ireny.
  '21':
  - type: text
    content: Koa, indro, hampahafantariko azy amin’izao indray mandeha izao,
  - type: text
    content: Eny, hampahafantariko azy ny tànako sy ny heriko,
  - type: text
    content: Ka dia ho fantany fa Jehovah no anarako.
  '3':
  - type: text
    content: Fa izao no lazain’i Jehovah ny amin’ny zanakalahy sy ny zanakavavy izay teraka amin’ity tany ity
  - type: text
    content: Sy ny amin’ny reniny izay niteraka azy
  - type: text
    content: 'Ary ny amin’ny rainy izay niteraka azy amin’ity tany ity koa:'
  '4':
  - type: text
    content: Ho fatin’ny loza samy hafa izy,
  - type: text
    content: Nefa tsy hisaonana na halevina,
  - type: text
    content: Fa ho zezika eny ambonin’ny tany;
  - type: text
    content: Ary ho lanin-tsabatra sy mosary izy,
  - type: text
    content: Ka ho fihinan’ny voro-manidina sy ny bibi-dia ny fatiny.
  '5':
  - type: text
    content: 'Fa izao no lazain’i Jehovah:'
  - type: text
    content: Aza miditra amin’ny trano misy fisaonana,
  - type: text
    content: Ary aza misaona na mitsapa alahelo azy;
  - type: text
    content: Fa efa nesoriko tsy ho amin’ity firenena ity ny fiadanako, hoy Jehovah,
  - type: text
    content: Dia ny famindrampo sy ny fiantrana.
  '6':
  - type: text
    content: Ho faty na ny lehibe na ny kely amin’ity tany ity;
  - type: text
    content: Samy tsy halevina na hisaonana izy,
  - type: text
    content: Na hitetehan’ny sasany tena, na hiboriany;
  '7':
  - type: text
    content: Ary tsy hisy hamahan-kanina azy amin’ny fisaonany,
  - type: text
    content: Mba hampionona azy ny amin’ny maty;
  - type: text
    content: Ary tsy hisy hampisotro azy amin’ny kapoaka fampiononana,
  - type: text
    content: Raha maty ny rainy na ny reniny;
  '8':
  - type: text
    content: Ary aza miditra ao amin’ny trano misy fanasana koa hianao,
  - type: text
    content: Hiara-mitoetra aminy hihinana sy hisotro.
  '9':
  - type: text
    content: 'Fa izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
  - type: text
    content: Indro, hatsahatro amin’ity tany ity
  - type: text
    content: Eo imasonareo sy amin’ny andronareo
  - type: text
    content: Ny feo mifaly sy ny feo miravoravo,
  - type: text
    content: Dia ny feon’ny mpampakatra sy ny feon’ny ampakarina.
