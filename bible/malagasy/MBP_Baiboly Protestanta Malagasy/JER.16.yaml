document_id: JER.16
type_code: plt
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ny nasain’Andriamanitra nataon’i Jeremia ny amin’ny loza hampijaliana ny Joda.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'ARY tonga tamiko ny tenin’i Jehovah hoe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aza manam-bady hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aoka tsy hanan-janakalahy na zanakavavy amin’ity tany ity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa izao no lazain’i Jehovah ny amin’ny zanakalahy sy ny zanakavavy izay teraka amin’ity tany ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny amin’ny reniny izay niteraka azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ary ny amin’ny rainy izay niteraka azy amin’ity tany ity koa:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ho fatin’ny loza samy hafa izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nefa tsy hisaonana na halevina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa ho zezika eny ambonin’ny tany;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ho lanin-tsabatra sy mosary izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka ho fihinan’ny voro-manidina sy ny bibi-dia ny fatiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa izao no lazain’i Jehovah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aza miditra amin’ny trano misy fisaonana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary aza misaona na mitsapa alahelo azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa efa nesoriko tsy ho amin’ity firenena ity ny fiadanako, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny famindrampo sy ny fiantrana.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ho faty na ny lehibe na ny kely amin’ity tany ity;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samy tsy halevina na hisaonana izy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Na hitetehan’ny sasany tena, na hiboriany;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary tsy hisy hamahan-kanina azy amin’ny fisaonany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mba hampionona azy ny amin’ny maty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy hisy hampisotro azy amin’ny kapoaka fampiononana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha maty ny rainy na ny reniny;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary aza miditra ao amin’ny trano misy fanasana koa hianao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hiara-mitoetra aminy hihinana sy hisotro.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izao no lazain’i Jehovah, Tompon’ny maro, Andriamanitry ny Isiraely:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indro, hatsahatro amin’ity tany ity
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eo imasonareo sy amin’ny andronareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ny feo mifaly sy ny feo miravoravo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny feon’ny mpampakatra sy ny feon’ny ampakarina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha ambaranao amin’ity firenena ity izany teny rehetra izany, ka hoy izy aminao: Nahoana Jehovah no nilaza izany loza mafy rehetra izany hamelezana anay? Fa inona no helokay, ary inona no fahotanay, izay nanotanay tamin’i Jehovah Andriamanitray? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia lazao aminy hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny nahafoizan’ny razanareo Ahy, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny nanarahany andriamani-kafa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy ny nanompoany azy sy ny niankohofany teo anatrehany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary ny nahafoizany Ahy sy ny tsy nitandremany ny lalàko.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary ny tenanareo koa nanao ratsy mihoatra noho ny razanareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa he! hianareo samy mandeha araka ny ditry ny fo ratsinareo avokoa
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy mihaino Ahy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka dia horoahiko hiala amin’ity tany ity hianareo
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho any amin’ny tany tsy fantatrareo na ny razanareo;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any no hanompoanareo andriamani-kafa andro aman-alina,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satria tsy hamindra fo aminareo Aho.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa, indro, avy any andro, hoy Jehovah, izay tsy hanaovana intsony hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raha velona koa Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nitondra ny Zanak’Isiraely niakatra avy tany amin’ny tany Egypta;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izao kosa: Raha velona koa Jehovah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay nitondra ny Zanak’Isiraely niakatra avy tany amin’ny tany avaratra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sy avy tany amin’ny tany rehetra izay nandroahany azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fa hampodiko ho amin’ny tany izay nomeko ny razany izy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, Izaho haniraka mpamovo maro, hoy Jehovah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hamovo azy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary rehefa afaka izany, dia haniraka mpihaza maro Aho,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Izay hihaza azy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any amin’ny tendrombohitra sy ny havoana rehetra
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary any an-tsefatsefaky ny harambato.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny masoko dia mijery ny alehany rehetra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka tsy miafina amin’ny tavako izany,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary tsy takona amin’ny masoko ny helony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Alohan’izany anefa dia hovaliako avy sasaka ny helony sy ny fahotany
- type: usfm
  marker: q1
  children:
  - type: text
    text: Noho ny nandotoany ny taniko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia ny namenoany ny lovako tamin’ireo fatin’ny sampiny
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: fk
      children:
      - type: text
        text: 'Heb. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fahavetavetany.
    marker-yv: yv-n
  - type: text
    text: ' sy fahavetavetany ireo.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jehovah ô, ry heriko sy fiarovana mafy ho ahy
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ary fandosirako amin’ny andro fahoriana ô!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ho tonga aminao ny jentilisa avy any amin’ny faran’ny tany
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ka hanao hoe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, tokoa lainga no nolovan’ny razanay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dia zava-poana sady tsy misy mahasoa.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moa mahay manao andriamanitra ho azy va ny olona?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tsy Andriamanitra ireny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Koa, indro, hampahafantariko azy amin’izao indray mandeha izao,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eny, hampahafantariko azy ny tànako sy ny heriko,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ka dia ho fantany fa Jehovah no anarako.
