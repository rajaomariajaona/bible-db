document_id: JHN.19,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanomboana an’i Jesosy tamin’ny hazo fijaliana.
  - type: heading
    content: Mat. 27.27-56; Mar. 15.16-41; Lio. 23.26-49.
  - type: text
    content: 'ARY tamin’izany dia nalain’i Pilato Jesosy ka nokapohiny. '
  '10':
  - type: text
    content: 'Dia hoy Pilato taminy: Tsy miteny amiko va Hianao? tsy fantatrao va fa manana fahefana handefa Anao aho, sady manana fahefana hanombo Anao amin’ny hazofijaliana koa? '
  '11':
  - type: text
    content: 'Jesosy namaly azy hoe: Hianao tsy manana fahefana amiko akory, raha tsy nomena anao avy any ambony; koa izay nanolotra Ahy taminao no manan-keloka bebe kokoa.'
  '12':
  - type: text
    content: Ary hatramin’izany
  - type: note
    content: 'Na: noho izany.'
  - type: text
    content: ' dia nitady handefa Azy Pilato; nefa ny Jiosy niantso ka nanao hoe: Raha alefanao io Lehilahy io, dia tsy mba sakaizan’i Kaisara hianao; fa izay rehetra manao ny tenany ho mpanjaka dia manao teny manohitra an’i Kaisara. '
  '13':
  - type: text
    content: 'Ary rehefa ren’i Pilato izany teny izany, dia nitondra an’i Jesosy nivoaka izy ka nipetraka teo amin’ny seza fitsarana teo amin’ny fitoerana atao hoe Lampivato, fa amin’ny teny Hebreo Gabata– '
  '14':
  - type: text
    content: 'ary andro fiomanana amin’ny Paska ny andro, tokony ho tamin’ny ora fahenina–dia hoy izy tamin’ny Jiosy: Indro ny Mpanjakanareo! '
  '15':
  - type: text
    content: 'Fa niantso ireo hoe: Ento, ento, homboy amin’ny hazofijaliana Izy! Hoy Pilato taminy: Hohomboako amin’ny hazofijaliana va ny Mpanjakanareo? Ny lohan’ny mpisorona namaly hoe: Tsy manana mpanjaka afa-tsy Kaisara izahay. '
  '16':
  - type: text
    content: Ary tamin’izany Pilato dia nanolotra Azy taminy mba hohomboana amin’ny hazofijaliana.
  - type: text
    content: 'Dia noraisin’ireo Jesosy; '
  '17':
  - type: text
    content: 'ary Izy nitondra ny hazofijaliany, dia nankany amin’ny tany atao hoe Ikarandoha, izay atao amin’ny teny Hebreo hoe Golgota. '
  '18':
  - type: text
    content: Teo no nanomboana Azy tamin’ny hazofijaliana, ary nisy roa lahy koa niaraka taminy, iray avy teo an-daniny roa, ary Jesosy teo afovoany.
  '19':
  - type: text
    content: 'Ary Pilato nanoratra anarana, ka napetany teo amin’ny hazofijaliana. Ary izao no voasoratra: '
  - type: heading
    content: jesosy avy any nazareta, mpanjakan’ny jiosy.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Ary ny miaramila nandrandrana satroka tsilo, ka nasatrony ny lohany, ary nampitafiny lamba volomparasy Izy, '
  '20':
  - type: text
    content: 'Ary izany anarana izany dia novakin’ny Jiosy maro, fa akaikin’ny tanàna ny tany izay nanomboana an’i Jesosy tamin’ny hazofijaliana; ary voasoratra tamin’ny teny Hebreo sy Romana sy Grika izany. '
  '21':
  - type: text
    content: 'Ary noho izany ny lohan’ny mpisorona tamin’ny Jiosy dia nanao tamin’i Pilato hoe: Aza soratana hoe: Mpanjakan’ny Jiosy; fa izao: Izy no nilaza hoe: Mpanjakan’ny Jiosy Aho. '
  '22':
  - type: text
    content: 'Pilato namaly hoe: Izay voasoratro dia voasoratro.'
  '23':
  - type: text
    content: 'Ary rehefa voahombon’ny miaramila tamin’ny hazofijaliana Jesosy, dia nalainy ny fitafiany ka nozarainy efatra, samy nanana ny anjarany avy ny miaramila; ary ny akanjony koa; fa tsy nisy vitrana ny akanjony, fa tenona iray ihany. '
  '24':
  - type: text
    content: 'Dia niresaka hoe izy: Aza mba triarintsika, fa aoka hilokantsika ho an’izay hahazo azy; mba hahatanteraka ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' manao hoe: ,,Nozarainy ny fitafiako, ary nilokany ny akanjoko’’ (Sal. 22.18). Izany zavatra izany no nataon’ny miaramila.'
  '25':
  - type: text
    content: 'Ary nijanona teo akaikin’ny hazofijalian’i Jesosy ny reniny sy ny rahavavin-dreniny, Maria, vadin’i Klopa, sy Maria Magdalena. '
  '26':
  - type: text
    content: 'Ary nony hitan’i Jesosy ny reniny sy ilay mpianatra tiany nijanona teo, dia hoy Izy tamin’ny reniny: Ravehivavy, indro ny zanakao! '
  '27':
  - type: text
    content: 'Ary hoy koa Izy tamin’ilay mpianatra: Indro ny reninao! Ary tamin’izany ora izany dia noraisin’ilay mpianatra ho any aminy izy.'
  '28':
  - type: text
    content: 'Ary rehefa afaka izany, dia fantatr’i Jesosy fa efa vita ny zavatra rehetra tamin’izay, mba hahatanteraka ny Soratra '
  - type: text
    content: Masina,
  - type: text
    content: ' dia hoy Izy: Mangetaheta Aho. '
  '29':
  - type: text
    content: 'Ary nisy bakoly feno vinaingitra nipetraka teo; ary nisy sipaonjy feno vinaingitra notohiziny tamin’ny hysopa ka nataony tamin’ny vavany. '
  '3':
  - type: text
    content: 'dia nanatona Azy ireo ka niteny hoe: Arahaba, ry Mpanjakan’ny Jiosy! sady namely tahamaina'
  - type: note
    content: 'Na: tehina.'
  - type: text
    content: ' Azy izy.'
  '30':
  - type: text
    content: 'Ary rehefa nanandrana ny vinaingitra Jesosy, dia nanao hoe: Vita; dia nanondrika ny lohany Izy ka nanolotra ny fanahiny.'
  '31':
  - type: text
    content: 'Ary satria andro fiiomanana ny andro, dia nangataka tamin’i Pilato ny Jiosy mba hotapahina ny ranjon’ireo, ary hesorina ny faty, mba tsy ho tratry ny andro Sabata eo amin’ny hazofijaliana, satria andro lehibe izany Sabata izany. '
  '32':
  - type: text
    content: 'Dia tonga ny miaramila ka nanapaka ny ranjon’ny voalohany sy ny an’ny anankiray koa izay niaraka nohomboana tamin’i Jesosy tamin’ny hazofijaliana. '
  '33':
  - type: text
    content: 'Fa nony nankeo amin’i Jesosy izy, dia hitany fa efa maty sahady Izy, ka dia tsy mba notapahiny ny ranjony. '
  '34':
  - type: text
    content: Fa ny miaramila anankiray nandefona ny lanivoany, ary niaraka tamin’izay dia nisy ra sy rano nandeha.
  '35':
  - type: text
    content: 'Ary ilay nahita dia vavolombelona manambara, ary marina ny fanambarany; ary fantany fa milaza ny marina izy, mba hinoanareo koa. '
  '36':
  - type: text
    content: 'Fa tonga izany mba hahatanteraka ny Soratra '
  - type: text
    content: Masina
  - type: text
    content: ' hoe: ,,Tsy hisy hotapahina ny taolany’’ (Eks. 12.46; Sal. 34.20). '
  '37':
  - type: text
    content: 'Ary hoy koa ny teny iray ao amin’ny Soratra '
  - type: text
    content: 'Masina:'
  - type: text
    content: ' ,,Hijery Izay nolefoniny izy’’ (Zak. 12.10).'
  - type: heading
    content: Ny nandevenana an’i Jesosy.
  - type: heading
    content: Mat. 27.57-66; Mar. 15.42-47; Lio. 23.50-56.
  '38':
  - type: text
    content: 'ARY rehefa afaka izany, Josefa avy any Arimatia (mpianatr’i Jesosy izy, nefa tamin’ny mangingina ihany noho ny fahatahorany ny Jiosy) dia nangataka tamin’i Pilato, mba hahazoany manaisotra ny fatin’i Jesosy. Ary nanaiky Pilato. Dia lasa izy ka nanaisotra ny fatin’i Jesosy. '
  '39':
  - type: text
    content: 'Ary tonga koa Nikodemosy (ilay nankao amin’i Jesosy nony alina tamin’ny voalohany) ka nitondra miora sy hazo manitra voaharoharo, tokony ho zato livatra. '
  '4':
  - type: text
    content: 'Dia nivoaka indray Pilato ka nanao taminy hoe: Indro, izaho mitondra Azy mivoaka ho eto aminareo, mba ho fantatrareo fa tsy hitako izay helony, na dia kely akory aza. '
  '40':
  - type: text
    content: Dia noraisiny ny fatin’i Jesosy ka nofonosiny lambam-paty mbamin’ny zava-manitra, araka ny fanaon’ny Jiosy, raha mamboatra faty halevina.
  '41':
  - type: text
    content: 'Ary nisy saha teo amin’ilay nanomboana Azy tamin’ny hazofijaliana; ary teo anatin’ilay saha nisy fasana vaovao, izay tsy mbola nandevenana olona. '
  '42':
  - type: text
    content: Ary teo no nandevenany an’i Jesosy noho ny andro fiomanan’ny Jiosy, sstria teo akaiky ny fasana.
  '5':
  - type: text
    content: 'Ary nivoaka Jesosy misatroka tsilo sy mitafy ny lamba volomparasy. Dia hoy Pilato tamin’ny vahoaka: Indro ny Lehilahy!'
  '6':
  - type: text
    content: 'Ary rehefa hitan’ny lohan’ny mpisorona sy ny mpiandry raharaha Jesosy, dia niantso ireo ka nanao hoe: Homboy amin’ny hazofijaliana Izy! homboy amin’ny hazo fijaliana Izy! Hoy Pilato taminy: Entonareo Izy, ka homboy amin’ny hazofijaliana; fa izaho tsy mahita izay helony. '
  '7':
  - type: text
    content: 'Fa ny Jiosy namaly azy hoe: Izahay manana lalàna, ary araka izany lalàna izany dia tokony ho faty Izy, satria nanao ny tenany ho Zanak’Andriamanitra.'
  '8':
  - type: text
    content: 'Ary nony ren’i Pilato izany teny izany, dia vao mainka natahotra izy, '
  '9':
  - type: text
    content: dia niditra tao anati-rova
  - type: note
    content: Gr. pretoria.
  - type: text
    content: ' indray izy ka nanao tamin’i Jesosy hoe: Avy aiza moa Hianao? Fa tsy namaly azy akory Jesosy. '
