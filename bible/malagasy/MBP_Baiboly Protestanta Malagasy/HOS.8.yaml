document_id: HOS.8,873
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ny loza hanjo ny Isiraely noho ny nivadihany.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ATAOVY eo am-bavanao
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: lanilaninao.
      marker-yv: yv-n
    - type: text
      text: ' ny anjomara!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa hisy toy ny voromahery hipaoka ny tranon’i Jehovah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satria efa nivadika ny fanekeko
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sy nandika ny lalàko ireo.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary na dia nanangy tany amin’ny jentilisa aza izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia hovoriko ankehitriny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hihavitsy izy noho ny entan’ny mpanjakan’ireo mpanapaka.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa Efraima nanao alitara maro hanotana,–
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, efa nahazo alitara hanotana izy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Na dia soratako ho azy ny teny betsaka amin’ny lalàko aza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dia ataony ho toy ny zavatra tsy izy izany.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mamono zavatra hatao fanatitra ho Ahy izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, mihinana ny henan’izany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nefa tsy sitrak’i Jehovah izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia hotsarovany ny fahotany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary hovaliany ny helony;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eny, izy ireny dia hiverina ho any Egypta.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Efa nanadino ny Mpanao azy Isiraely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka nanorina trano vaventy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary Joda nanamaro tanàna mimanda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa haterako afo ao an-tanànany,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ka holevonin’izany ny trano vaventiny.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izaho dia hitarainany hoe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Andriamanitro ô, izahay Isiraely mahalala Anao.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ataon’ny Isiraely ho zavatra maharikoriko ny soa;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny fahavalo no hanenjika azy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ireny dia nanangana mpanjaka, nefa tsy avy tamiko;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nifidy mpanapaka izy, nefa tsy fantatro;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny volafotsiny sy ny volamenany no nataony sampiny
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mba hamongorana azy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Maharikoriko
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Na: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ataony ho zava-maharikoriko.
      marker-yv: yv-n
    - type: text
      text: ' ilay ombilahy kelinao, ry Samaria;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mirehitra aminareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aminy.
      marker-yv: yv-n
    - type: text
      text: ' ny fahatezerako;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mandra-pahoviana no tsy ho tohanareo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tohany.
      marker-yv: yv-n
    - type: text
      text: ' ny fahadiovana?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa avy tamin’ny Isiraely koa izany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny mpiasa no nanao azy, ka dia tsy Andriamanitra izy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fa ho torotoro ilay ombilahy kelin’i Samaria.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa rivotra no nafafiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary tadio no hojinjany;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tsy misy vary mitsangana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ny salohiny tsy hisy ventiny;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ary raha tàhiny hisy aza, dia ny olona hafa firenena no hihinana azy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Voatelina Isiraely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ankehitriny dia efa tonga tahaka ny fanaka tsy mahafinaritra izy any amin’ny jentilisa.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa niakatra ho any Asyria izy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toy ny boriki-dia mandeha irery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efraima dia nanangy ireo lehilahiny.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'Heb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fitiavany.
      marker-yv: yv-n
