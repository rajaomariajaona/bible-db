document_id: HOS.8,873
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo ny Isiraely noho ny nivadihany.
  - type: text
    content: ATAOVY eo am-bavanao
  - type: note
    content: Heb. lanilaninao.
  - type: text
    content: ' ny anjomara!'
  - type: text
    content: Fa hisy toy ny voromahery hipaoka ny tranon’i Jehovah,
  - type: text
    content: Satria efa nivadika ny fanekeko
  - type: text
    content: Sy nandika ny lalàko ireo.
  '10':
  - type: text
    content: Ary na dia nanangy tany amin’ny jentilisa aza izy,
  - type: text
    content: Dia hovoriko ankehitriny;
  - type: text
    content: Ary hihavitsy izy noho ny entan’ny mpanjakan’ireo mpanapaka.
  '11':
  - type: text
    content: Fa Efraima nanao alitara maro hanotana,–
  - type: text
    content: Eny, efa nahazo alitara hanotana izy.
  '12':
  - type: text
    content: Na dia soratako ho azy ny teny betsaka amin’ny lalàko aza,
  - type: text
    content: Dia ataony ho toy ny zavatra tsy izy izany.
  '13':
  - type: text
    content: Mamono zavatra hatao fanatitra ho Ahy izy,
  - type: text
    content: Eny, mihinana ny henan’izany,
  - type: text
    content: Nefa tsy sitrak’i Jehovah izany;
  - type: text
    content: Ankehitriny dia hotsarovany ny fahotany,
  - type: text
    content: Ary hovaliany ny helony;
  - type: text
    content: Eny, izy ireny dia hiverina ho any Egypta.
  '14':
  - type: text
    content: Efa nanadino ny Mpanao azy Isiraely
  - type: text
    content: Ka nanorina trano vaventy,
  - type: text
    content: Ary Joda nanamaro tanàna mimanda
  - type: text
    content: Fa haterako afo ao an-tanànany,
  - type: text
    content: Ka holevonin’izany ny trano vaventiny.
  '2':
  - type: text
    content: 'Izaho dia hitarainany hoe:'
  - type: text
    content: Andriamanitro ô, izahay Isiraely mahalala Anao.
  '3':
  - type: text
    content: Ataon’ny Isiraely ho zavatra maharikoriko ny soa;
  - type: text
    content: Ny fahavalo no hanenjika azy.
  '4':
  - type: text
    content: Ireny dia nanangana mpanjaka, nefa tsy avy tamiko;
  - type: text
    content: Nifidy mpanapaka izy, nefa tsy fantatro;
  - type: text
    content: Ny volafotsiny sy ny volamenany no nataony sampiny
  - type: text
    content: Mba hamongorana azy.
  '5':
  - type: text
    content: Maharikoriko
  - type: note
    content: 'Na: Ataony ho zava-maharikoriko.'
  - type: text
    content: ' ilay ombilahy kelinao, ry Samaria;'
  - type: text
    content: Mirehitra aminareo
  - type: note
    content: Heb. aminy.
  - type: text
    content: ' ny fahatezerako;'
  - type: text
    content: Mandra-pahoviana no tsy ho tohanareo
  - type: note
    content: Heb. tohany.
  - type: text
    content: ' ny fahadiovana?'
  '6':
  - type: text
    content: Fa avy tamin’ny Isiraely koa izany;
  - type: text
    content: Ny mpiasa no nanao azy, ka dia tsy Andriamanitra izy,
  - type: text
    content: Fa ho torotoro ilay ombilahy kelin’i Samaria.
  '7':
  - type: text
    content: Fa rivotra no nafafiny,
  - type: text
    content: Ary tadio no hojinjany;
  - type: text
    content: Tsy misy vary mitsangana,
  - type: text
    content: Ny salohiny tsy hisy ventiny;
  - type: text
    content: Ary raha tàhiny hisy aza, dia ny olona hafa firenena no hihinana azy.
  '8':
  - type: text
    content: Voatelina Isiraely;
  - type: text
    content: Ankehitriny dia efa tonga tahaka ny fanaka tsy mahafinaritra izy any amin’ny jentilisa.
  '9':
  - type: text
    content: Fa niakatra ho any Asyria izy
  - type: text
    content: Toy ny boriki-dia mandeha irery;
  - type: text
    content: Efraima dia nanangy ireo lehilahiny.
  - type: note
    content: Heb. fitiavany.
