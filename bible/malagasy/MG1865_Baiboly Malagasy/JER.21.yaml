document_id: JER.21,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny hahafahan'ny Kaldeana an'i Jerosalema
  - type: text
    content: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah, fony Zedekia mpanjaka naniraka an''i Pasora, zanak''i Malkia, sy Zefania, zanak''i Mahasela mpisorona, hankany aminy hanao hoe: '
  '10':
  - type: text
    content: Fa efa manandrina ity tanàna ity Aho hahatonga loza aminy, fa tsy soa, hoy Jehovah; hatolotro eo an-tànan'ny mpanjakan'i Babylona ity ka hodoroany amin'ny afo.
  '11':
  - type: text
    content: 'Ary henoy ny tenin''i Jehovah ny amin''ny taranaky ny mpanjakan''ny Joda sy ny mpianakaviny. '
  '12':
  - type: text
    content: 'Ry taranak''i Davida, izao no lazain''i Jehovah: Mitsarà isa-maraina, afaho amin''ny tanan''ny mpampahory ny alona norobaina, fandrao mivoaka toy ny afo ny fahatezerako ary mirehitra ka tsy hisy hamono noho ny faharatsian''ny ataonareo.'
  '13':
  - type: text
    content: 'Indro, hohatoniko ianao, ry mponina an-dohasaha, dia eo amin''ny vatolampy amin''ny tany lemaka, hoy Jehovah, dia ianareo izay manao hoe: Iza moa no sahy hidina hamely anay? Ary iza no sahy hiditra ato amin''ny fonenanay? '
  '14':
  - type: text
    content: Fa hamaly anareo araka ny vokatry ny asanareo Aho, hoy Jehovah, ary handrehitra afo ao amin'ny alany, ka handevona ny manodidina azy rehetra izany.
  '2':
  - type: text
    content: 'Masìna ianao, manontania amin''i Jehovah ho anay; miady aminay Nebokadnezara, mpanjakan''i Babylona, angamba Jehovah hanao aminay araka ny asany mahagaga rehetra, mba hialan''ireo aminay. '
  '3':
  - type: text
    content: 'Dia hoy Jeremia taminy: Lazaonareo amin''i Zedekia hoe: '
  '4':
  - type: text
    content: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Indro, haveriko ny fiadiana eny an-tananareo, izay entinareo miady eny ivelan''ny manda amin''ny mpanjakan''i Babylona sy amin''ny Kaldeana, izay manao fahirano anareo, ka hangoniko eto afovoan''ity tanàna ity ireo. '
  '5':
  - type: text
    content: 'Ary Izaho no hiady aminareo amin''ny tanana ahinjitra sy amin''ny sandry mahery ary amin''ny fahavinirana sy ny fisafoahana ary ny fahatezerana mirehitra. '
  '6':
  - type: text
    content: 'Ary hamely ny mponina amin''ity tanàna ity Aho, na olona, na biby: ho fatin''ny aretim-be mandringana izy. '
  '7':
  - type: text
    content: Ary rehefa afaka izany, hoy Jehovah, Zedekia, mpanjakan'ny Joda, sy ny mpanompony sy ny vahoaka ary izay sisa tsy matin'ny areti-mandringana sy ny sabatra sy ny mosary amin'ity tanàna ity dia hatolotro eo an-tànan'i Nebokadnezara, mpanjakan'i Babylona, sy eo an-tànan'ny fahavalony sy eo an-tànan'izay mitady ny ainy; dia hamely azy amin'ny lelan-tsabatra ireo, fa tsy hitsitsy na hiantra azy, na hamindra fo aminy.
  '8':
  - type: text
    content: 'Ary ity firenena ity dia hilazanao hoe: Izao no lazain''i Jehovah: Indro, ataoko eo anoloanareo ny lalan''ny fiainana sy ny lalan''ny fahafatesana: '
  '9':
  - type: text
    content: 'Izay mbola mitoetra eto amin''ity tanàna ity ihany dia ho fatin-tsabatra sy mosary ary areti-mandringana; fa izay mivoaka hanatona ny Kaldeana izay manao fahirano anareo kosa dia ho velona, ka ny ainy no ho babony. '
