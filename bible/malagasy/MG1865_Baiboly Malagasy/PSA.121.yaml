document_id: PSA.121,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahatokian'izay manana an'i Jehovah ho Mpiaro azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fihirana fiakarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fihirana misy hevitra ambaratonga'
      marker-yv: yv-n
    - type: text
      text: . Manopy ny masoko ho amin'ny tendrombohitra aho; Avy aiza ny famonjena ahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Izay ihavian''ny famonjena ahy'
      marker-yv: yv-n
    - type: text
      text: '? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny famonjena ahy dia avy amin'i Jehovah, Mpanao ny lanitra sy ny tany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mba havelany hangozohozo anie ny tongotrao; Tsy ho rendrehana anie ny Mpiaro anao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, tsy matory na rendrehana Ny Mpiaro ny Isiraely.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah no Mpiaro anao; Jehovah no fialofanao eo amin''ny an-kavananao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny masoandro tsy mba hamely anao nony andro, Na ny volana nony alina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah hiaro anao amin''ny ratsy rehetra; Eny, hiaro ny fanahinao Izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah hiaro anao, na mivoaka na miditra, Hatramin'izao ka ho mandrakizay.
