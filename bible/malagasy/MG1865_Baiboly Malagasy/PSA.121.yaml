document_id: PSA.121,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokian'izay manana an'i Jehovah ho Mpiaro azy
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: . Manopy ny masoko ho amin'ny tendrombohitra aho; Avy aiza ny famonjena ahy
  - type: note
    content: 'Na: Izay ihavian''ny famonjena ahy'
  - type: text
    content: '? '
  '2':
  - type: text
    content: Ny famonjena ahy dia avy amin'i Jehovah, Mpanao ny lanitra sy ny tany.
  '3':
  - type: text
    content: 'Tsy mba havelany hangozohozo anie ny tongotrao; Tsy ho rendrehana anie ny Mpiaro anao. '
  '4':
  - type: text
    content: Indro, tsy matory na rendrehana Ny Mpiaro ny Isiraely.
  '5':
  - type: text
    content: 'Jehovah no Mpiaro anao; Jehovah no fialofanao eo amin''ny an-kavananao. '
  '6':
  - type: text
    content: 'Ny masoandro tsy mba hamely anao nony andro, Na ny volana nony alina. '
  '7':
  - type: text
    content: 'Jehovah hiaro anao amin''ny ratsy rehetra; Eny, hiaro ny fanahinao Izy. '
  '8':
  - type: text
    content: Jehovah hiaro anao, na mivoaka na miditra, Hatramin'izao ka ho mandrakizay.
