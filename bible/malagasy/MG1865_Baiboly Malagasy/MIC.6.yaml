document_id: MIC.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny fampibebahana ny Isiraely
  - type: text
    content: 'Masìna ianareo, mihainoa izay lazain''i Jehovah: Mitsangàna, mandahara eo anoloan''ny tendrombohitra, Ary aoka ho ren''ny havoana ny feonao. '
  '10':
  - type: text
    content: Mbola misy rakitry ny faharatsiana ihany va ao an-tranon'ny ratsy fanahy Sy ny famarana
  - type: note
    content: Heb. efaha
  - type: text
    content: ' tsy ampy izay voaozona? '
  '11':
  - type: text
    content: 'Mety madio va aho, raha manana mizana mandainga Sy kitapo misy vato tsy marina? '
  '12':
  - type: text
    content: 'Fa feno loza ny mpanankarenany, Mandainga ny mponina ao aminy, Ary ny lelany dia fitaka eo am-bavany. '
  '13':
  - type: text
    content: 'Izaho kosa dia hikapoka maharary anao Amin''ny fandringanako anao noho ny helokao. '
  '14':
  - type: text
    content: 'Hianao hihinana, nefa tsy ho voky, Fa mbola ho ao anatinao ihany ny fahanoananao; Hampirina ianao, nefa tsy hahavonjy, Ary izay voavonjinao aza dia hatolotro ho amin''ny sabatra. '
  '15':
  - type: text
    content: 'Hiantso hamafy, nefa tsy hijinja; Hianao hanosihosy oliva, nefa tsy hihosotra diloilo, Ary hanosihosy ranom-boaloboka, nefa tsy hisotro divay; '
  '16':
  - type: text
    content: Fa fatra-pitandrina ny lalàn'i Omry Sy ny asan'ny taranak'i Ahaba rehetra ianareo Sady manaraka ny fisainany, Mba hanolorako anao ho figagana, Ary ny mponina any ho zavatra mampisitrisitra, Ka dia hitondra ny latsan'ny oloko ianareo.
  '2':
  - type: text
    content: 'Mihainoa ny adin''i Jehovah ianareo, ry tendrombohitra, Sy ianareo, ry fanorena-matezan''ny tany; Fa Jehovah manana ady amin''ny olony, Eny, amin''ny Isiraely no ifandaharany. '
  '3':
  - type: text
    content: 'Ry oloko, inona no nataoko taminao? Inona no nanasarako anao? Tondroy maso ary Aho. '
  '4':
  - type: text
    content: 'Fa nentiko niakatra avy tany amin''ny tany Egypta ianao Sady navotako avy tao amin''ny trano nahandevozana: Dia nirahiko hitarika anao Mosesy sy Arona ary Miriama. '
  '5':
  - type: text
    content: 'Ry oloko, mba tsarovy ny saina nataon''i Balaka, mpanjakan''i Moaba, Sy izay navalin''i Balama, zanak''i Beora, azy, Ary izay natao hatrany Sitima ka hatrany Gilgala, Hahafantaranareo ny asa marina nataon''i Jehovah. '
  '6':
  - type: text
    content: 'Inona no ho entiko manatona an''i Jehovah Sy miondrika eo anatrehan''Andriamanitra Izay any amin''ny avo? Hanatona Azy mitondra fanatitra dorana Sy ny ombilahy kely iray taona va aho? '
  '7':
  - type: text
    content: 'Ho sitrak''i Jehovah va ny ondrilahy arivoarivo, Na renirano diloilo iray alina? Hanolotra ny lahimatoako noho ny fahadisoako va aho, Na ny ateraky ny kiboko noho ny fahotan''ny fanahiko? '
  '8':
  - type: text
    content: 'Ry olombelona, efa naseho anao izay tsara Sy izay ilain''i Jehovah aminao, Dia izao ihany: Ny hanao ny marina sy ny ho tia famindram-po Ary ny hanaraka an''Andriamanitrao amin''ny fanetren-tena'
  '9':
  - type: text
    content: Manaitra ny tanàna ny feon'i Jehovah, Ary mahita ny anaranao ny hendry
  - type: note
    content: 'Heb. ny fahendrena; na: ary fahendrena no kendren''ny anaranao'
  - type: text
    content: '; Henoinareo ny tsorakazo sy Izay nanendry azy. '
