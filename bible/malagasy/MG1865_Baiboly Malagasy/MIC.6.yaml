document_id: MIC.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny fampibebahana ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Masìna ianareo, mihainoa izay lazain''i Jehovah: Mitsangàna, mandahara eo anoloan''ny tendrombohitra, Ary aoka ho ren''ny havoana ny feonao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mihainoa ny adin''i Jehovah ianareo, ry tendrombohitra, Sy ianareo, ry fanorena-matezan''ny tany; Fa Jehovah manana ady amin''ny olony, Eny, amin''ny Isiraely no ifandaharany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ry oloko, inona no nataoko taminao? Inona no nanasarako anao? Tondroy maso ary Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa nentiko niakatra avy tany amin''ny tany Egypta ianao Sady navotako avy tao amin''ny trano nahandevozana: Dia nirahiko hitarika anao Mosesy sy Arona ary Miriama. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ry oloko, mba tsarovy ny saina nataon''i Balaka, mpanjakan''i Moaba, Sy izay navalin''i Balama, zanak''i Beora, azy, Ary izay natao hatrany Sitima ka hatrany Gilgala, Hahafantaranareo ny asa marina nataon''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Inona no ho entiko manatona an''i Jehovah Sy miondrika eo anatrehan''Andriamanitra Izay any amin''ny avo? Hanatona Azy mitondra fanatitra dorana Sy ny ombilahy kely iray taona va aho? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ho sitrak''i Jehovah va ny ondrilahy arivoarivo, Na renirano diloilo iray alina? Hanolotra ny lahimatoako noho ny fahadisoako va aho, Na ny ateraky ny kiboko noho ny fahotan''ny fanahiko? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ry olombelona, efa naseho anao izay tsara Sy izay ilain''i Jehovah aminao, Dia izao ihany: Ny hanao ny marina sy ny ho tia famindram-po Ary ny hanaraka an''Andriamanitrao amin''ny fanetren-tena'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manaitra ny tanàna ny feon'i Jehovah, Ary mahita ny anaranao ny hendry
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb. ny fahendrena; na: ary fahendrena no kendren''ny anaranao'
    marker-yv: yv-n
  - type: text
    text: '; Henoinareo ny tsorakazo sy Izay nanendry azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mbola misy rakitry ny faharatsiana ihany va ao an-tranon'ny ratsy fanahy Sy ny famarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. efaha
    marker-yv: yv-n
  - type: text
    text: ' tsy ampy izay voaozona? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mety madio va aho, raha manana mizana mandainga Sy kitapo misy vato tsy marina? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa feno loza ny mpanankarenany, Mandainga ny mponina ao aminy, Ary ny lelany dia fitaka eo am-bavany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izaho kosa dia hikapoka maharary anao Amin''ny fandringanako anao noho ny helokao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hianao hihinana, nefa tsy ho voky, Fa mbola ho ao anatinao ihany ny fahanoananao; Hampirina ianao, nefa tsy hahavonjy, Ary izay voavonjinao aza dia hatolotro ho amin''ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hiantso hamafy, nefa tsy hijinja; Hianao hanosihosy oliva, nefa tsy hihosotra diloilo, Ary hanosihosy ranom-boaloboka, nefa tsy hisotro divay; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa fatra-pitandrina ny lalàn'i Omry Sy ny asan'ny taranak'i Ahaba rehetra ianareo Sady manaraka ny fisainany, Mba hanolorako anao ho figagana, Ary ny mponina any ho zavatra mampisitrisitra, Ka dia hitondra ny latsan'ny oloko ianareo.
