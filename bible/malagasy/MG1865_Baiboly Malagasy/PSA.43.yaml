document_id: PSA.43
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Omeo rariny aho, Andriamanitra ô, ary alaharo ny teniko haharesy ny firenena tsy misy famindram-po; Vonjeo aho ho afaka amin''ny lehilahy mpamitaka sy mpanao meloka. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa Hianao no Andriamanitry ny heriko; Nahoana no manary ahy Hianao? Nahoana no mandeha mijoretra aho noho ny fampahorian''ny fahavaloko? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ampandehano ny fahazavanao sy ny fahamarinanao; aoka hitarika ahy ireo ka hitondra ahy ho any an-tendrombohitrao masina, dia ho any amin''ny tabernakelinao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia hankany amin'ny alitaran'Andriamanitra aho, dia any amin'Andriamanitry ny fifaliako indrindra; ary hidera Anao amin'ny lokanga aho, ry Andriamanitra ô, dia Andriamanitro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nahoana no mitanondrika ianao ry fanahiko? ary nahoana no mitoloko ato anatiko ianao? manantenà an'Andriamanitra, fa mbola hidera Azy ihany aho. Izy no famonjena ny tavako sady Andriamanitro.
