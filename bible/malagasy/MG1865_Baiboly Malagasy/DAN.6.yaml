document_id: DAN.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny nanipazana an'i Daniela tao an-davaky ny liona
  - type: text
    content: Ary Dariosa Mediana no nandray ny fanjakana, rehefa tokony ho roa amby enim-polo taona no andro niainany.
  '10':
  - type: text
    content: 'Ary noho izany dia nasian''i Dariosa mpanjaka sonia izany lalàna sy didy izany. '
  '11':
  - type: text
    content: 'Nony fantatr''i Daniela fa efa voaisy sonia ny didy, dia nankao an-tranony izy; ary ny varavarankelin''ny tranony ambony nanandrify an''i Jerosalema dia nivoha. Koa intelo isan''andro no nandohalika ka nivavaka sy nisaotra teo anatrehan''Andriamaniny izy, satria fanaony hatramin''ny taloha izany. '
  '12':
  - type: text
    content: 'Dia somaritaka nivory ireo lehilahy ireo ka nahita an''i Daniela mangataka sy mifona eo anatrehan''Andriamaniny. '
  '13':
  - type: text
    content: 'Dia nanatona izy ka niteny teo anatrehan''ny mpanjaka noho ny amin''ilay lalàn''ny mpanjaka ka nanao hoe: Moa tsy misy lalàna nasianao sonia fa na zovy na zovy no hanao fangatahana, na amin''Andriamanitra na amin''olona, ato anatin''ny telo-polo andro afa-tsy aminao ihany, ry mpanjaka ô, dia hatsipy ao an-davaky ny liona? Ny mpanjaka namaly ka nanao hoe: Marina izany, dia araka ny lalàn''ny Mediana sy ny Persiana izay tsy azo ovana. '
  '14':
  - type: text
    content: 'Dia niteny ireo ka nanao teo anatrehan''ny mpanjaka hoe: Ilay Daniela, isan''ny babo avy amin''ny taranak''i Joda, dia tsy manaiky anao, na ny lalàna izay nasianao sonia, ry mpanjaka ô, fa manao fangatahana intelo isan''andro izy. '
  '15':
  - type: text
    content: 'Dia tezitra indrindra ny mpanjaka, raha nahare izany teny izany, nefa matiny ihany izy ny hanafaka an''i Daniela, ka nanao izay tratry ny heviny hamonjy azy mandra-pilentiky ny masoandro. '
  '16':
  - type: text
    content: 'Dia somaritaka nivory ho any amin''ny mpanjaka ireo lehilahy ireo ka nanao tamin''ny mpanjaka hoe: Aoka ho fantatrao, ry mpanjaka, fa izao no lalàn''ny Mediana sy ny Persiana: Ny lalàna sy ny didy izay efa navoaky ny mpanjaka dia tsy azo ovana.'
  '17':
  - type: text
    content: 'Dia nandidy ny mpanjaka; ary nentina Daniela ka natsipy tao an-davaky ny liona. Dia niteny ny mpanjaka ka nanao tamin''i Daniela hoe: Andriamanitrao Izay tompoinao mandrakariva anie hamonjy anao. '
  '18':
  - type: text
    content: 'Ary nisy vato natampina ny vava-lavaka; ary ny mpanjaka nanomboka izany tamin''ny fanombohan-kaseny sy tamin''ny fanombohan-kasen''ny andriandahiny, mba tsy hovana ny teny ny amin''i Daniela. '
  '19':
  - type: text
    content: Dia nody tany an-dapany ny mpanjaka ary tsy nitendry hanina mandritra ny alina, sady tsy nisy zava-maneno
  - type: note
    content: 'Na: zazavavy mpandihy'
  - type: text
    content: ' nampidirina teo anatrehany, ary tsy nahita torimaso izy. '
  '2':
  - type: text
    content: 'Sitrak''i Dariosa ny hanendry solo-mpanjaka roa-polo amby zato hanapaka ny fanjakana, izay hanapaka ny fanjakana rehetra. '
  '20':
  - type: text
    content: 'Dia nifoha maraina koa ny mpanjaka ka nandeha faingana ho any amin''ny lavaky ny liona. '
  '21':
  - type: text
    content: 'Ary nony tonga teo amin''ny lavaka izy, dia niantso an''i Daniela tamin''ny feo malahelo; eny, niteny ny mpanjaka ka nanao tamin''i Daniela hoe: Ry Daniela, mpanompon''Andriamanitra velona ô, moa Andriamanitrao Izay tompoinao mandrakariva mahavonjy anao amin''ny liona va? '
  '22':
  - type: text
    content: 'Namaly ny mpanjaka Daniela hoe: Ry mpanjaka, ho velona mandrakizay anie ianao. '
  '23':
  - type: text
    content: 'Andriamanitro efa naniraka ny anjeliny ka nanakombona ny vavan''ny liona tsy handratra ahy, satria fahamarinana no hitany tamiko; ary teo anatrehanao koa, ry mpanjaka ô, tsy nanao ratsy aho. '
  '24':
  - type: text
    content: 'Dia faly indrindra ny mpanjaka, ka nasainy nakarina avy ao an-davaka Daniela. Dia nakarina avy tao an-davaka Daniela, ary tsy hita nisy naratra izy, satria nino an''Andriamaniny. '
  '25':
  - type: text
    content: Ary ny mpanjaka nandidy, ka nentina ireo lehilahy niampanga
  - type: note
    content: Ar. nihinana ny nofony
  - type: text
    content: ' an''i Daniela ireo, dia natsipy tao an-davaky ny liona izy mbamin''ny vadiny aman-janany, ary ny liona nanan-kery taminy ka nanapatapaka ny taolany, raha tsy mbola nipaka tamin''ny vodin''ny lavaka akory aza izy. '
  '26':
  - type: text
    content: 'Tamin''izany Dariosa mpanjaka dia nanoratra ho amin''ny fokom-pirenena sy ny firenena sy ny samy hafa fiteny rehetra izay monina ambonin''ny tany rehetra hoe: Hitombo anie ny fiadananareo. '
  '27':
  - type: text
    content: Manao lalàna aho mba hangovitan'ny olona sy hatahorany eo anatrehan'Andriamanitr'i Daniela eran'ny fanjakako rehetra; fa Izy no Andriamanitra velona sady maharitra mandrakizay; ny fanjakany haharitra hatramin'ny farany.
  '28':
  - type: text
    content: Izy no mamonjy sy manafaka ary manao famantarana sy fahagagana any an-danitra sy etỳ an-tany, ary Izy no namonjy an'i Daniela ho afaka tamin'ny herin'ny liona. Ary izany Daniela izany dia nambinina tamin'ny nanjakan'i Dariosa sy tamin'ny nanjakan'i Kyrosy Persiana.
  '3':
  - type: text
    content: Koa tamin'ireo dia nisy komandy lehibe telo lahy, ary Daniela no anankiray tamin'ireo, mba hilazan'ny solo-mpanjaka ny raharaha tsy hahafatiantoka ny mpanjaka.
  '4':
  - type: text
    content: 'Izany Daniela izany dia nihoatra noho ny komandy lehibe sy ny solo-mpanjaka namany, fa nanam-panahy hendry izy; ary ny mpanjaka nikasa hanandratra azy ho lehibe amin''ny fanjakana rehetra. '
  '5':
  - type: text
    content: 'Koa ny komandy lehibe sy ny solo-mpanjaka dia nitady izay hiampangany an''i Daniela ny amin''ny fanjakana, nefa tsy nahita izay hiampangany azy na izay tsininy akory ireo, satria marina izy, ka tsy nisy kilema na tsiny hita taminy. '
  '6':
  - type: text
    content: 'Dia hoy ireo lehilahy ireo: Tsy ho hitantsika izay hiampangantsika io Daniela io raha tsy ny amin''ny lalan''Andriamaniny no misy hitantsika hiampangana azy. '
  '7':
  - type: text
    content: 'Dia somaritaka nivory ho any amin''ny mpanjaka ireo komandy lehibe sy solo-mpanjaka ireo; ary izao no nataony taminy: Ry Dariosa mpanjaka ô, ho velona mandrakizay anie ianao. '
  '8':
  - type: text
    content: 'Ny komandy lehibe rehetra amin''ny fanjakana sy ny mpanapaka sy ny solo-mpanjaka sy ny mpanolo-tsaina ary ny governora dia mifanara-kevitra fa tokony hanao lalàna sy didy mafy ianao, ry mpanjaka, ka na zovy na zovy no hanao fangatahana ato anatin''ny telo-polo andro, na amin''Andriamanitra na amin''olona, afa-tsy aminao ihany, ry mpanjaka ô, dia hatsipy ao an-davaky ny liona izy. '
  '9':
  - type: text
    content: Ankehitriny, ry mpanjaka ô, ataovy mafy ny lalàna, ka asio sonia mba tsy hiova, araka ny lalàn'ny Mediana sy ny Persiana izay tsy azo ovana.
