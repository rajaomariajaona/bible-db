document_id: LEV.14,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''ny andro fahavalo dia haka zanak''ondrilahy roa tsy misy kilema izy ary zanak''ondrivavy iray tsy misy kilema izay iray taona ary koba tsara toto telo ampahafolon''ny efaha voaharo diloilo ho fanatitra hohanina ary diloilo iray loga. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpiosorona izay manadio ilay lehilahy hodiovina dia hametraka azy sy ireo zavatra ireo eo anatrehan''i Jehovah, eo anoloan''ny varavaran''ny trano-lay fihaonana; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia haka ny zanak''ondrilahy iray ny mpisorona ka hanatitra azy ho fanati-panonerana mbamin''ny diloilo iray loga ka hahevahevany ho fanatitra ahevaheva eo anatrehan''i Jehovah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hamono ny zanak''ondrilahy eo amin''ny famonoana ny fanatitra noho ny ota sy ny fanatitra dorana izy, dia eo amin''ny fitoerana masina; fa ho an''ny mpisorona ny fanatitra noho ny ota, toy ny fanati-panonerana, ho masina dia masina izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hangalan''ny mpisorona ny ran''ny fanati-panonerana, ka hotentenany ny tendron''ny ravin-tsofina ankavanan''ilay hodiovina sy ny ankihiben-tànany ankavanana sy ny ankihiben-tongony ankavanana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny diloilo iray loga dia hangalan''ny mpisorona ka haidiny eo am-pelatanany ankavia; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hatsoboky ny mpisorona ny fanondrony ankavanana eo amin''ny diloilo izay eo am-pelatanany ankavia ka hafafiny impito eo anatrehan''i Jehovah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny diloilo sisa eo am-pelatanany dia hanentenan''ny mpisorona ny tendron''ny ravin-tsofina ankavanan''ilay hodiovina sy ny ankihiben-tànany ankavanana ary ny ankihiben-tongony ankavanana eo amin''ilay nasiana ny ran''ny fanati-panonerana; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny diloilo mbola sisa eo ampela-tànan''ny mpisorona dia hataony amin''ny lohan''ilay hodiovina; ary hanao fanavotana ho azy eo anatrehan''i Jehovah ny mpisorona. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona dia hanatitra ny fanatiny noho ny ota ka hanao fanavotana ho an''ilay hodiovina hahafahany amin''ny fahalotoany; ary rehefa afaka izany, dia hamono ny fanatitra dorana izy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lalàna ny amin''ny boka amin''ny andro fanavotana azy: ho entina any amin''ny mpisorona izy; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny mpisorona dia hanatitra ny fanatitra dorana sy ny fanatitra hohanina eo ambonin''ny alitara ka hanao fanavotana ho an''ilay olona hodiovina, dia hadio izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha malahelo kosa izy, ka tsy tratry ny ananany izany, dia hitondra zanak''ondry iray hatao fanati-panonerana havehaveva izy, hanaovana fanavotana ho azy, ary koba tsara toto iray ampahafolon''ny efaha voaharo diloilo hatao fanatitra hohanina sy diloilo iray loga '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary domohina roa, na zana-boromailala roa, araka izay tratry ny ananany, ka ny anankiray hatao fanatitra noho ny ota, ary ny anankiray hatao fanatitra dorana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ho eniny any amin''ny mpisorona ireo amin''ny andro fahavalon''ny fanadiovana azy, ho eo anoloan''ny varavaran''ny trano-lay fihaonana eo anatrehan''i Jehovah. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia horaisin''ny mpisorona ny zanak''ondrilahy izay hatao fanati-panonerana sy ny diloilo iray loga ka hahevahevany ho fanatitra ahevaheva eo anatrehan''i Jehovah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hovonoina ny zanak''ondry izay hatao fanati-panonerana, dia hangalan''ny mpisorona ny ran''ny fanati-panonerana, ka hotentenany ny tendron''ny ravin-tsofina ankavanan''ilay hodiovina sy ny ankihiben-tànany ankavanana ary ny ankihiben-tongony ankavanana; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hangalan''ny mpisorona ny diloilo ka haidiny eo ampela-tànany ankavia; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hangalan''ny mpisorona amin''ny fanondrony ankavanana ny diloilo izay eo ampela-tànany ankavia, ka hafafiny impito eo anatrehan''i Jehovah; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hotentenan''ny mpisorona amin''ny diloilo izay eo an-tànany ny tendron''ny ravin-tsofina ankavanan''ilay hodiovina sy ny ankihiben-tànany ankavanana sy ny ankihiben-tongony ankavanana, eo amin''ilay nasiana ny ran''ny fanati-panonerana; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny diloilo sisa eo ampela-tànan''ny mpisorona dia hataony amin''ny lohan''ilay hodiovina hanaovana fanavotana ho azy eo anatrehan''i Jehovah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hivoaka eny ivelan''ny toby ny mpisorona ka hizaha azy; Ary raha hitany fa sitrana amin''ny habokany ny boka, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hateriny koa ny domohina anankiray, na ny zana-boromailala anankiray, araka izay tratry ny ananany, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny anankiray hatao fanatitra noho ny ota, ary ny anankiray kosa hatao fanatitra dorana, mbamin''ny fanatitra hohanina; ary ny mpisorona dia hanao fanavotana ho an''ilay hodiovina eo anatrehan''i Jehovah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no lalàna ny amin'ny boka, raha tsy tratry ny ananany izay hanadiovana azy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa tonga any amin''ny tany Kanana izay omeko ho taninareo ianareo, ka misy trano hasiako habokana amin''ny tany fanananareo, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia handeha ny tompon-trano ka hilaza amin''ny mpisorona hoe: Toa misy aretina miseho ao amin''ny tranoko. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hasain''ny mpisorona hesorina aloha ny entana ao an-trano mandra-pihaviny hizaha ny aretina, mba tsy hahalotoan''ny zavatra rehetra ao an-trano; ary rehefa vita izany, dia ho avy ny mpisorona hizaha ny trano; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary raha zahany ny aretina, ka hitany fa mihady eo amin''ny rindrin''ny trano izy ka maitsomaitso na menamena, ary milentika eo amin''ny rindrin-trano no fijeriny azy, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hivoaka ho eo am-baravarana ny mpisorona ka hanidy ny trano tsy hivoha hafitoana. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hiverina ny mpisorona amin''ny andro fahafito, ary raha zahany ny aretina, ka hitany fa nanitatra teo amin''ny rindrin''ny trano izy, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia vorona roa velona sady madio sy hazo sedera sy jaky ary hysopa no hasain''ny mpisorona ho an''ilay hodiovina; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hasain''ny mpisorona hesorina ny vato izay misy azy ka hariana amin''izay fitoerana maloto eo ivelan''ny tanàna; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hasainy hokikisana ny ati-trano rehetra, ary ny kikiny dia harian''ny olona amin''izay fitoerana maloto eny ivelan''ny tanàna. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia haka vato hafa kosa ny olona, ka hasolony ny vato teo; ary haka feta koa izy ka handalotra ny trano. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tàhiny miseho indray ny aretina ka mifariparitra eo amin''ny trano, rehefa voaisotra ny vato, ary rehefa voakiky sady voalalotra ny trano, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tonga ny mpisorona ka mizaha, ary hitany fa nanitatra teo amin''ny trano ny aretina, dia habokana mafy eo amin''ny trano izany, ka dia maloto izy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary horavana ny trano, dia ny vato sy ny hazo ary ny lalotra rehetra, ka ho entina ho amin''izay fitoerana maloto eny ivelan''ny tanàna. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay miditra ao amin''izany trano izany amin''ny andro rehetra izay hihidiany dia haloto mandra-paharivan''ny andro; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izay mandry ao dia hanasa ny fitafiany; ary izay mihinana ao dia hanasa ny fitafiany koa. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa kosa raha tonga ny mpisorona ka mizaha azy, ary hitany fa tsy nanitatra teo amin''ny trano ny aretina, rehefa voalalotra ny trano, dia hataon''ny mpisorona hoe madio ny trano, satria efa afaka ny aretina. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary haka vorona roa sy hazo sedera sy jaky ary hysopa izy hanadiovana ny trano. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hasainy hovonoina ny vorona anankiray eo ambonin''ny vilany tany izay misy rano nalaina tamin''ny rano mandeha; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hovonoiny eo ambonin''ny vilany tany izay misy rano nalaina tamin''ny rano mandeha ny vorona anankiray; '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia horaisiny ny hazo sedera sy ny hysopa sy ny jaky ary ny vorona velona, ka hatsobony eo amin''ny ran''ny vorona izay novonoina sy eo amin''ny rano nalaina tamin''ny rano mandeha, dia hamafazany ny trano impito. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hanadio ny trano amin''ny ran''ny vorona izy sy amin''ny rano nalaina tamin''ny rano mandeha sy amin''ny vorona velona sy amin''ny hazo sedera sy amin''ny hysopa ary amin''ny jaky. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hasainy ho entina eny ivelan''ny tanàna ny vorona velona ka halefa; dia hanao fanavotana ho an''ny trano izy, ka dia hadio izany. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no lalàna ny amin''ny habokana rehetra sy ny kongonina, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary amin''ny habokana amin''ny fitafiana sy amin''ny trano, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny amin''ny mamontsina sy ny manako-pery ary ny mifaritra fotsy mangirana, '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: hampianatra hahalalana ny andro hahadiovana sy ny andro hahalotoana. Izany no lalàna ny amin'ny habokana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary halainy ny vorona velona sy ny hazo sedera sy ny jaky ary ny hysopa, dia hatsobony ireo mbamin''ny vorona velona eo amin''ny ran''ny vorona izay novonoina teo ambonin''ny rano nalaina tamin''ny rano mandeha. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hofafazany impito ilay hodiovina ho afaka amin''ny habokany ka hataony hoe madio, ary halefany ny vorona velona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ilay hodiovina dia hanasa ny fitafiany sy hanaratra ny volon-dohany rehetra ary handro amin''ny rano, ka hadio izy; ary rehefa faka izany dia hankeo an-toby izy, kanefa hitoetra eo ivelan''ny lainy hafitoana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''ny andro fahafito dia hanaratra ny volony rehetra izy, na ny volon-dohany, na ny somony, na ny manja-masony; ny volony rehetra hoharatany avokoa ary hanasa ny fitafiany izy sady handro amin''ny rano, dia hadio izy. '
