document_id: ISA.62
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny handrosoan'ny voninahitr'i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsy hangina Aho noho ny amin''i Ziona, Ary tsy hitsaha-miteny Aho noho ny amin''i Jerosalema, mandra-piposaky ny fahamarinany tahaka ny famirapiratry ny mazava, ary ny famonjena azy tahaka ny fanilo mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny firenena hahita ny fahamarinanao, ary ny mpanjaka rehetra hahita ny voninahitrao; dia homena anaram-baovao ianao, Izay hotononin
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hotendren'
    marker-yv: yv-n
  - type: text
    text: '''ny vavan''i Jehovah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka dia ho tonga satro-boninahitra eo an-tànany ianao sy satrok''andriana eo am-pelatanan''Andriamanitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hianao tsy hatao intsony hoe nafoy, ary ny taninao tsy hatao intsony hoe Lao fa ianao hatao hoe Ilay sitrako, ary ny taninao hatao hoe Vady ampakarina; Fa sitrak''i Jehovah ianao, ary ny taninao hampanambadina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tahaka ny zatovo mampakatra virijina ho vadiny no hampakaran'ny mponina aminao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. zanakao-lahy
    marker-yv: yv-n
  - type: text
    text: ' anao; ary tahaka ny fifalian''ny mpampakatra amin''ny ampakariny no hifalian''Andriamanitrao aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Efa nanendry mpiambina ho eny ambonin''ny mandanao Aho, ry Jerosalema ô, koa mandrakariva na andro na alina dia tsy mahazo mangina ireny; eny, ianareo izay mpampahatsiaro an''i Jehovah, aza mitsahatra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary aza mamela Azy hitsahatra mandra-panaony an''i Jerosalema ho mafy orina sy hoderaina amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jehovah efa nianiana tamin''ny tànany ankavanana, dia tamin''ny sandriny mahery, hoe: Tsy homeko hohanin''ny fahavalonao intsony ny varinao, ary ny hafa firenena tsy hisotro ny ranom-boalobokao izay efa nisasaranao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa izay nijinja azy no hihinana azy ka hidera an'i Jehovah; ary izay nioty azy no hisotro azy ao amin'ny kianjako masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mivoaha, mivoaha amin''ny vavahady, amboary ny lalana halehan''ny olona; asandrato ho avo ny lalambe; esory ny vato eny aminy; manangàna faneva ho tazan''ny firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indro, Jehovah efa nanambara hatrany amin''ny faran''izao tontolo izao nanao hoe: Lazao amin''i Ziona zanakavavy: Indro, avy ny famonjena anao; Indro; ny valim-pitia hatolony dia ao aminy, ary ny valin''asa homeny dia eo anoloany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary Ireny hotononina hoe Firenena masina, dia olona navotan'i Jehovah; ary ianao dia hatao hoe Ilay notadiavina, Tanàna tsy foy.
