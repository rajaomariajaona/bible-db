document_id: JHN.17,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Rehefa nolazain''i Jesosy izany teny izany, dia nanandratra ny masony ho amin''ny lanitra Izy ka nanao hoe: Ray ô, tonga ny fotoana; mankalazà ny Zanakao, mba hankalazan''ny Zanaka Anao. '
  '10':
  - type: text
    content: 'Ary izay Ahy rehetra dia Anao; ary izay Anao dia Ahy; ary efa ankalazaina eo aminy Aho. '
  '11':
  - type: text
    content: 'Ary tsy ho eto amin''izao tontolo izao intsony Aho, fa izy ireto no ho eto amin''izao tontolo izao, ary Izaho mankany aminao. Ray masina ô, tehirizo ireo amin''ny anaranao izay nomenao Ahy, mba ho iray ihany izy, tahaka ny mahiray Antsika. '
  '12':
  - type: text
    content: 'Raha mbola teo aminy Aho, dia nitahiry azy tamin''ny anaranao izay nomenao Ahy; ary notandremako izy, ka tsy misy very, afa-tsy ilay zanaky ny fahaverezana ihany; mba hahatanteraka ny Soratra Masina. '
  '13':
  - type: text
    content: 'Fa ankehitriny mankany aminao Aho; ary izany teny izany no lazaiko eto amin''izao tontolo izao, mba hananany ny fifaliako tanteraka ao aminy. '
  '14':
  - type: text
    content: Efa nomeko azy ny teninao; ary halan'izao tontolo izao izy, satria tsy naman
  - type: note
    content: Gr. avy amin'
  - type: text
    content: '''izao tontolo izao, tahaka Ahy tsy naman'
  - type: note
    content: Gr. avy amin'
  - type: text
    content: '''izao tontolo izao. '
  '15':
  - type: text
    content: Izaho tsy mangataka aminao mba hampiala azy amin'izao tontolo izao, fa ny mba hiaro azy amin'ny ratsy
  - type: note
    content: 'Na: amin''ilay ratsy'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Tsy naman
  - type: note
    content: Gr. avy amin'
  - type: text
    content: ' izao tontolo izao izy, tahaka Ahy tsy naman'
  - type: note
    content: Gr. avy amin'
  - type: text
    content: '''izao tontolo izao. '
  '17':
  - type: text
    content: 'Manamasina azy amin''ny fahamarinana; ny teninao no fahamarinana. '
  '18':
  - type: text
    content: 'Tahaka ny nanirahanao Ahy ho amin''izao tontolo izao no mba nanirahako azy kosa ho amin''izao tontolo izao. '
  '19':
  - type: text
    content: 'Ary ho an''ireto no anamasinako ny tenako, mba hanamasinan''ny fahamarinanao azy. '
  '2':
  - type: text
    content: 'araka ny nanomezanao Azy fahefana amin''ny nofo rehetra mba hanome fiainana mandrakizay ho an''izay rehetra nomenao Azy. '
  '20':
  - type: text
    content: 'Nefa tsy ho an''ireto ihany no angatahako, fa ho an''izay mino Ahy koa noho ny teniny; '
  '21':
  - type: text
    content: 'mba ho iray ihany izy rehetra, tahaka Anao Ray ato amiko, ary Izaho koa ao aminao, mba ho ao amintsika koa izy; mba hinoan''izao tontolo izao fa Hianao no naniraka Ahy. '
  '22':
  - type: text
    content: 'Ary nomeko azy ny voninahitra izay nomenao Ahy, mba ho iray izy, tahaka ny mahiray Antsika: '
  '23':
  - type: text
    content: 'Izaho ao aminy, ary Hianao ato amiko, mba ho tanteraka ho iray izy, mba ho fantatr''izao tontolo izao fa Hianao efa naniraka Ahy sady efa tia azy tahaka ny nitiavanao Ahy. '
  '24':
  - type: text
    content: 'Ray ô, tiako mba ho any amiko amin''izay itoerako ireo izay nomenao Ahy, mba hahita ny voninahitro nomenao Ahy izy; fa efa tia Ahy Hianao, fony tsy mbola ary ny fanorenan''izao tontolo izao. '
  '25':
  - type: text
    content: 'Ray marina ô, tsy nahalala Anao izao tontolo izao; fa Izaho nahalala Anao, ary ireto efa mahalala fa Hianao no naniraka Ahy. '
  '26':
  - type: text
    content: Ary efa nampahafantariko azy ny anaranao, ary mbola hampahafantariko ihany, mba ho ao aminy ny fitiavana izay nitiavanao Ahy, ary Izaho koa ho ao aminy.
  '3':
  - type: text
    content: 'Ary izao no fiainana mandrakizay, dia ny mahafantatra Anao, Izay Andriamanitra tokana sady marina, sy Jesosy Kristy, Izay efa nirahinao. '
  '4':
  - type: text
    content: 'Izaho efa nankalaza Anao tetỳ ambonin''ny tany; vitako ny asa nomenao Ahy hataoko. '
  '5':
  - type: text
    content: 'Ary ankehitriny, Ray ô, mankalazà Ahy amin''ny tenanao, dia amin''ny voninahitra niarahako nanana taminao, fony tsy mbola ary izao tontolo izao. '
  '6':
  - type: text
    content: 'Nasehoko tamin''ny olona izay nomenao Ahy avy tamin''izao tontolo izao ny anaranao; Anao ireny ka nomenao Ahy; ary notandremany ny teninao. '
  '7':
  - type: text
    content: 'Fantany ankehitriny fa avy taminao izay rehetra efa nomenao Ahy. '
  '8':
  - type: text
    content: 'Fa ny teny izay nomenao Ahy dia nomeko azy kosa, ary noraisiny, ka fantany marina tokoa fa avy taminao Aho; ary nino izy fa Hianao no naniraka Ahy. '
  '9':
  - type: text
    content: 'Izaho mangataka ho azy; tsy mangataka ho an''izao tontolo izao Aho, fa ho an''izay nomenao Ahy, satria Anao izy. '
