document_id: PSA.124,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana an'Andriamanitra noho ny nanafahany ny mpanompony saiky tra-doza
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Nataon''i Davida. Raha tsy Jehovah no nomba antsika, Eny, aoka hataon''ny Isiraely hoe: '
  '2':
  - type: text
    content: 'Raha tsy Jehovah no nomba antsika, Raha nitsangana hamely antsika ny olona. '
  '3':
  - type: text
    content: 'Dia nitelina antsika velona izy, Raha nirehitra tamintsika ny fahatezerany; '
  '4':
  - type: text
    content: 'Dia nandifotra antsika ny rano, Ary nanafotra ny fanahintsika ny riaka; '
  '5':
  - type: text
    content: 'Eny, nanafotra ny fanahintsika Ny rano misafoaka. '
  '6':
  - type: text
    content: 'Isaorana anie Jehovah, Izay tsy nanolotra antsika ho rembin''ny nifiny. '
  '7':
  - type: text
    content: 'Ny fanahintsika dia efa afaka tahaka ny vorona afaka tamin''ny fandriky ny mpihaza: Tapaka ny fandrika, ka afaka isika. '
  '8':
  - type: text
    content: Ny famonjena antsika dia amin'ny anaran'i Jehovah, Mpanao ny lanitra sy ny tany.
