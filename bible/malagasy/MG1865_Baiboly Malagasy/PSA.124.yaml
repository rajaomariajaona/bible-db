document_id: PSA.124
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaorana an'Andriamanitra noho ny nanafahany ny mpanompony saiky tra-doza
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fihirana misy hevitra ambaratonga'
    marker-yv: yv-n
  - type: text
    text: '. Nataon''i Davida. Raha tsy Jehovah no nomba antsika, Eny, aoka hataon''ny Isiraely hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha tsy Jehovah no nomba antsika, Raha nitsangana hamely antsika ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nitelina antsika velona izy, Raha nirehitra tamintsika ny fahatezerany; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandifotra antsika ny rano, Ary nanafotra ny fanahintsika ny riaka; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, nanafotra ny fanahintsika Ny rano misafoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Isaorana anie Jehovah, Izay tsy nanolotra antsika ho rembin''ny nifiny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny fanahintsika dia efa afaka tahaka ny vorona afaka tamin''ny fandriky ny mpihaza: Tapaka ny fandrika, ka afaka isika. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny famonjena antsika dia amin'ny anaran'i Jehovah, Mpanao ny lanitra sy ny tany.
