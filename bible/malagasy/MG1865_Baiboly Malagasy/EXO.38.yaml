document_id: EXO.38,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tontalin'ny volamena sy volafotsy ary vara­hina izay lany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ny alitara fandoroana ny fanatitra dorana tamin''ny hazo akasia izy: dimy hakiho avy ny lafiny efatra, dia efa-joro tsy mivadi-mandry izy; ary telo hakiho ny hahavony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary roa-polo ny tsangantsangany, ary roa-polo ny faladiany vara­hina; ary volafotsy ny fihantonany amin''ny tsangantsangany sy ny anjaka hitohizany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny lafiny avaratra koa nisy zato hakiho sy ny tsangantsangany roa-polo ary ny faladiany varahina roa-polo; volafotsy ny fihantonany amin''ny tsangantsangany sy ny anjaka hitohizany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny lafiny andrefana nisy fefy lamba dimam-polo hakiho; folo ny tsangantsangany ary folo ny faladiany; ary volafotsy ny fihantonana amin''ny tsangantsangany sy ny anjaka hitohizany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lafiny atsinanana nataony dimam-polo hakiho. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy fefy lamba dimy ambin''ny folo hakiho tamin''ny ilany iray; telo ny tsangantsangany, ary telo ny faladiany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy fefy lamba dimy ambin''ny folo hakiho tamin''ny ilany iray koa; telo ny tsangantsangany, ary telo ny faladiany; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nataony rongony fotsy madinika voahasina avokoa ny fefy lamban''ny kianja manodidina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny faladian''ny tsangantsangany dia nataony varahina; ary ny fihantonana amin''ny tsangantsangany sy ny anjaka hitohizany nataony volafotsy; ary ny lohany dia nopetahany takela-bolafotsy; ary ny tsangantsangany rehetra tamin''ny kianja dia samy nisy anjaka volafotsy hitohizany avokoa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vavahady lamba eo am-bavahadin''ny kianja dia asan''ny mahay tenona samy hafa soratra tamin''ny manga sy volomparasy sy mena ary rongony fotsy madinika voahasina; roa-polo hakiho ny halavany; ary ny hahavony nitovy tamin''ny lambanan-damba, dia dimy hakiho, araka ny hahavon''ny fefy lamban''ny kianja. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efatra ny tsangantsangany, ary efatra ny faladiany varahina; ary ny fihantonany dia volafotsy; ary ny takela-bola tamin''ny lohany sy ny anjaka hitohizany dia volafotsy koa. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ny tandrony teo amin''ny zorony efatra izy, ka nataony miray aminy, ary nopetahany takela-barahina ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny tsimatra amin'ny tabernakely sy amin'ny kianja manodidina dia nataony varahina avokoa.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no isan''ny zavatra nomba ny tabernakely, dia ny tabernakelin''ny Vavolombelona, izay nisaina araka ny didin''i Mosesy; natao fanompoan''ny Levita, fehin''Itamara, zanak''i Arona mpisorona, ny nanisa azy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Bezalila, zanak''i Ory, zanak''i Hora, avy amin''ny firenen''i Joda, nanao izay rehetra nandidian''i Jehovah an''i Mosesy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny namany dia Oholiaba, zanak''i Ahisamaka, avy amin''ny firenen''i Dana, mpiasa tefy sy rafitra ary mpanenona mahay sady nahay tenona samy hafa soratra tamin''ny manga sy volomparasy sy mena ary rongony fotsy madinika. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Talenta sivy amby roa-polo, ary sekely telo-polo amby fiton-jato, araka ny sekely masina, ny volamena rehetra izay lany tamin''ny asa rehetra tamin''ny fitoerana masina, dia ny volamena izay natao fanatitra ahevaheva. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny volafotsy avy tamin''ny olona izay voaisa tamin''ny fiangonana dia talenta zato sy sekely dimy amby fito-polo amby fiton-jato amby arivo, araka ny sekely masina: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'beka iray isan-olona, dia antsasaky ny sekely araka ny sekely masina, no naloan''izay rehetra voalamina, hatramin''ny roa-polo taona no ho miakatra, dia olona dimam-polo amby diman-jato amby telo arivo sy enina hetsy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny volafotsy talenta zato dia narendrika nanaovana ny faladian''ny fitoerana masina sy ny faladian''ny efitra lamba: dia faladia zato tamin''ny talenta volafotsy zato, talenta iray ny faladiany iray. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny sekely dimy amby fito-polo amby fiton-jato sy arivo no nanaovany ny fihantonana tamin''ny andry, sy nametahana takela-bola tamin''ny lohany, ary nanaovany ny anjaka hitohizany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny varahina izay natao fanatitra ahevaheva dia talenta fito-polo sy sekely efa-jato amby roa arivo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ny fanaka rehetra momba ny alitara izy, dia ny vilaniny fandraofan-davenona sy ny sotron''afony sy ny loviany famafazana sy ny fitrebiny ary ny fitondran''afony; nataony varahina avokoa ny fanaka rehetra momba azy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izany no nanaovany ny faladiany ho amin''ny varavaran''ny trano-lay fihaonana, sy ny alitara varahina sy ny makarakara varahina izay teo aminy ary ny fanaka rehetra momba ny alitara, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny faladia tamin'ny kianja manodidina sy ny faladia tamin'ny vavahadin'ny kianja, sy ny tsimatra rehetra tamin'ny tabernakely ary ny tsimatra rehetra tamin'ny kianja manodidina.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao makarakara vara­hina tahaka ny harato ho eo amin''ny alitara izy, dia eo ambanin''ny sikiny, hatreo ambodin''ny alitara ka hatreo amin''ny fisasahany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandrendrika vava vola efatra hatao eo an-jorony efatra amin''ny makarakara varahina izy ho fitoeran''ny bao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ny bao tamin''ny hazo akasia izy, ka nopetahany takela-barahina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nampiditra ny bao teo amin'ny vava vola teo amin'ny lafiny roa amin'ny alitara izy hilanjana azy. Ary hazo fisaka no narafiny ho alitara, ka nataony hobokaty.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tavy varahina sy ny faladiany vara­hina dia nataony tamin''ny fitaratra varahin''ny vehivavy izay nanompo teo anoloan''ny varavaran''ny trano-lay fihaonana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ny kianja izy: tamin''ny lafiny atsimo nisy fefy lamba zato hakiho ho amin''ny kianja natao tamin''ny rongony fotsy madinika voahasina; '
