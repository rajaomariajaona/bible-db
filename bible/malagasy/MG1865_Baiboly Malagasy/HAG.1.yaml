document_id: HAG.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famporisihana ny olona hanao ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''ny andro voalohany tamin''ny volana fahenina tamin''ny taona faharoa nanjakan''i Dariosa mpanjaka no nahatongavan''ny tenin''i Jehovah nentin''i Hagay mpaminany tamin''i Zerobabela, zanak''i Sealtiela, governora tany Joda, sy tamin''i Josoa, zanak''i Jozadaka, mpisoronabe, nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Ity firenena ity nanao hoe: Tsy mbola tonga ny andro tokony hihaviana hanaovana ny tranon''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia tonga ny tenin''i Jehovah nentin''i Hagay mpaminany nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moa andro tokony hitoeran''ny tenanareo ao amin''ny tranonareo misy valin-drihana va izao, kanefa rava ity trano ity? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro: Hevero ny lalanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Efa namafy be ianareo, nefa kely no taomina: mihinana ianareo, nefa tsy voky; misotro ianareo, nefa tsy afa-po; mitafy ianareo, nefa tsy misy mafana; ary izay mahazo karama dia mahazo karama hatao an-kitapo loaka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Hevero ny lalanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miakara any an-tendrombohitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin''ny tany havoana'
    marker-yv: yv-n
  - type: text
    text: ', ka makà hazo, ary ataovy ny trano, dia hankasitrahako izany, sady hankalazaina Aho, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanampo be ianareo, kanjo indro, kely monja; ary nony notaominareo, dia notsofiko. Nahoana? hoy Jehovah, Tompon''ny maro. Satria efa rava ny tranoko, nefa ianareo samy mihazakazaka hanao ny tranonareo avy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary noho izany dia ny aminareo no nitsaharan''ny lanitra tsy hampilatsaka ando sy nitsaharan''ny tany tsy hahavokatra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary niantso ny fahamainana Aho hamely ny tany sy ny tendrombohitra sy ny vary sy ny ranom-boaloboka sy ny diloilo sy izay vokatry ny tany ary ny olona sy ny biby fiompy mbamin''izay rehetra efa nisasaran''ny tanana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Zerobabela, zanak''i Sealtiela, sy Josoa, zanak''i Jozadaka, mpisoronabe, mbamin''ny sisa rehetra amin''ny vahoaka, dia nihaino ny feon''i Jehovah Andriamaniny sy ny tenin''i Hagay mpaminany, araka ny nanirahan''i Jehovah Andriamaniny azy, ary natahotra teo anatrehan''i Jehovah ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nambaran''i Hagay, irak''i Jehovah, ny teny nampitondrain''i Jehovah ho amin''ny olona nanao hoe: Izaho no momba anareo, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia notairin''i Jehovah ny fanahin''i Zerobabela, zanak''i Sealtiela, governora any Joda, sy ny fanahin''i Josoa, zanak''i Jozadaka mpisoronabe, sy ny fanahin''ny sisa rehetra amin''ny vahoaka; ary dia avy izy ka nandrafitra ny tranon''i Jehovah, Tompon''ny maro, Andriamaniny, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: tamin'ny andro fahefatra amby roa-polo tamin'ny volana fahenina tamin'ny taona faharoa nanjakan'i Dariosa.
