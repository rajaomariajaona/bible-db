document_id: ISA.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa, indro, Jehovah, Tompon''ny maro, Manaisotra amin''i Jerosalema sy Joda izay andry sy tohana rehetra: Dia ny mofo sy ny rano rehetra, izay tohan''aina, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Lazaonareo ny amin''ny marina fa hahita soa izy, Fa ny vokatry ny asany no hohaniny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lozan''ny ratsy fanahy! hiharan''ny ratsy izy, Satria ny valin''ny nataon''ny tànany ihany no hanody azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny amin''ny oloko, dia zaza no mampahory azy, Ary ireo vehivavy no manapaka azy. Ry oloko ô, ny mpitarika anao no mampivily anao Sady mandrava ny lalana alehanao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jehovah mitsangana handahatra Ka miatrika hitsara ny firenena. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jehovah miampanga ny loholona sy ny lehiben''ny olony amin''ny fitsarana hoe: Hianareo no efa nandevona ny tanim-boaloboka; Ary ao an-tranonareo ny fananan''ny malahelo izay efa nalaina an-keriny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ahoana no hevitrareo no dia hosihosenareo ny oloko, Ary torotoroinareo ny tavan'ny malahelo ? Hoy Jehovah, Tompon'ny maro.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hoy koa Jehovah: Satria miavona ireo zanakavavin''i Ziona ka mandeha mianjonanjona sy manao maso meloka Sady kasikasy fandeha Ary mampikorintsandrintsana ny fehin-tongony, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Noho izany dia hataon''ny Tompo feno tako-pery ny tampon-dohan''ny zanakavavin''i Ziona, Ary Jehovah hampiseho ny fitanjahany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Amin'izany andro izany dia hesorin'i Jehovah ny firavaka rehetra, na ny fehin-tongotra, Na ny fehi-loha
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: voavola'
      marker-yv: yv-n
    - type: text
      text: ', na ny sarim-bolan-tsinana, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Na ny kavina voavola, na ny rojo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: haba'
      marker-yv: yv-n
    - type: text
      text: ', na ny fisalobonana makarakara, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny lehilahy mahery sy ny mpiady, Ny mpitsara sy ny mpaminany, Ny mpanao fankatovana sy ny loholona, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Na ny satroka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. diadema
      marker-yv: yv-n
    - type: text
      text: ', na ny rojo parapaingo, na ny fehin-kibo misy haingony, Na ny fitoeran-dranomanitra, na ny ody fanaony ravaka, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Na ny peratra, na ny kavin''orona, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Na ny akanjo fihaingoana, na ny kapôty, Na ny saly, na ny poketra, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Na ny fitaratra fizahana, na ny akanjo somizy anatiny, Na ny satroka fihaingoana
    - type: usfm
      marker: x
      children:
      - type: text
        text: He. hamama
      marker-yv: yv-n
    - type: text
      text: ', na ny lamba fisaronana; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary ny manitra hosoloana ny maimbo; Ary ny fehin-kibo tsara hosoloana ny mahazaka; Ary ny volo voavoatra tsara hosoloana ny boriana; Ary ny akanjo miebanebana hosoloana ny lamba fisaonana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lamba malailay
      marker-yv: yv-n
    - type: text
      text: '; Ary ny hatsaran-tarehy hosoloana ny tomboka amin''ny vy mahamay. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ny lehilahy ao aminao ho lavon-tsabatra, Ary ny mahery ao aminao ho faty an''ady; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ka dia hitomany sy hisaona ny vavahadiny; Ary ho lao ny tanàna ka hanjokaiky,
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny mpifehy ny dimam-polo sy ny manan-kaja, Ny mpanolo-tsaina sy ny mahay zavatra Ary ny mahay ny fiboeriboeriky ny mpanao ody. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hanendry ankizilahy madinika ho lehibeny Aho, Ary ny haitraitran-jaza no hanapaka azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hifanipaka izy samy iray firenena, Dia samy ny namany avy sy ny akaiky azy avy; Ny tovolahy hirehareha amin''ny anti-panahy, Ary ny tsy manan-daza amin''ny manan-daza. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Raha misy olona angatahin
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hazon'
      marker-yv: yv-n
    - type: text
      text: '''ny rahalahiny ao an-tranon-drainy ka ataony hoe: Hianao no manana lamba, koa aoka ho mpanapaka anay, Ary aoka ity faharavana ity ho raharahanao, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia namaly izy amin''izany andro izany hoe: Tsy mety ho dokotera aho, Fa ao an-tranoko tsy misy hanina na lamba; Koa tsy azonareo hatao mpanapaka ny olona aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa tafintohina Jerosalema, Ary potraka Joda, satria ny lelany sy ny asany dia samy manohitra an''i Jehovah Mba hihaika ny mason''ny voninahiny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny fisehon''ny tarehiny miampanga azy; Ary mampiharihary ny fahotany tahaka an''i Sodoma izy ka tsy manafina azy. Lozan''ny fanahiny! Fa mampidi-doza amin''ny tenany izy. '
