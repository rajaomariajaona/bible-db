document_id: ISA.3,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa, indro, Jehovah, Tompon''ny maro, Manaisotra amin''i Jerosalema sy Joda izay andry sy tohana rehetra: Dia ny mofo sy ny rano rehetra, izay tohan''aina, '
  '10':
  - type: text
    content: 'Lazaonareo ny amin''ny marina fa hahita soa izy, Fa ny vokatry ny asany no hohaniny. '
  '11':
  - type: text
    content: 'Lozan''ny ratsy fanahy! hiharan''ny ratsy izy, Satria ny valin''ny nataon''ny tànany ihany no hanody azy. '
  '12':
  - type: text
    content: 'Ny amin''ny oloko, dia zaza no mampahory azy, Ary ireo vehivavy no manapaka azy. Ry oloko ô, ny mpitarika anao no mampivily anao Sady mandrava ny lalana alehanao. '
  '13':
  - type: text
    content: 'Jehovah mitsangana handahatra Ka miatrika hitsara ny firenena. '
  '14':
  - type: text
    content: 'Jehovah miampanga ny loholona sy ny lehiben''ny olony amin''ny fitsarana hoe: Hianareo no efa nandevona ny tanim-boaloboka; Ary ao an-tranonareo ny fananan''ny malahelo izay efa nalaina an-keriny. '
  '15':
  - type: text
    content: Ahoana no hevitrareo no dia hosihosenareo ny oloko, Ary torotoroinareo ny tavan'ny malahelo ? Hoy Jehovah, Tompon'ny maro.
  '16':
  - type: text
    content: 'Ary hoy koa Jehovah: Satria miavona ireo zanakavavin''i Ziona ka mandeha mianjonanjona sy manao maso meloka Sady kasikasy fandeha Ary mampikorintsandrintsana ny fehin-tongony, '
  '17':
  - type: text
    content: 'Noho izany dia hataon''ny Tompo feno tako-pery ny tampon-dohan''ny zanakavavin''i Ziona, Ary Jehovah hampiseho ny fitanjahany. '
  '18':
  - type: text
    content: Amin'izany andro izany dia hesorin'i Jehovah ny firavaka rehetra, na ny fehin-tongotra, Na ny fehi-loha
  - type: note
    content: 'Na: voavola'
  - type: text
    content: ', na ny sarim-bolan-tsinana, '
  '19':
  - type: text
    content: Na ny kavina voavola, na ny rojo
  - type: note
    content: 'Na: haba'
  - type: text
    content: ', na ny fisalobonana makarakara, '
  '2':
  - type: text
    content: 'Ny lehilahy mahery sy ny mpiady, Ny mpitsara sy ny mpaminany, Ny mpanao fankatovana sy ny loholona, '
  '20':
  - type: text
    content: Na ny satroka
  - type: note
    content: Heb. diadema
  - type: text
    content: ', na ny rojo parapaingo, na ny fehin-kibo misy haingony, Na ny fitoeran-dranomanitra, na ny ody fanaony ravaka, '
  '21':
  - type: text
    content: 'Na ny peratra, na ny kavin''orona, '
  '22':
  - type: text
    content: 'Na ny akanjo fihaingoana, na ny kapôty, Na ny saly, na ny poketra, '
  '23':
  - type: text
    content: Na ny fitaratra fizahana, na ny akanjo somizy anatiny, Na ny satroka fihaingoana
  - type: note
    content: He. hamama
  - type: text
    content: ', na ny lamba fisaronana; '
  '24':
  - type: text
    content: Ary ny manitra hosoloana ny maimbo; Ary ny fehin-kibo tsara hosoloana ny mahazaka; Ary ny volo voavoatra tsara hosoloana ny boriana; Ary ny akanjo miebanebana hosoloana ny lamba fisaonana
  - type: note
    content: Heb. lamba malailay
  - type: text
    content: '; Ary ny hatsaran-tarehy hosoloana ny tomboka amin''ny vy mahamay. '
  '25':
  - type: text
    content: 'Ny lehilahy ao aminao ho lavon-tsabatra, Ary ny mahery ao aminao ho faty an''ady; '
  '26':
  - type: text
    content: Ka dia hitomany sy hisaona ny vavahadiny; Ary ho lao ny tanàna ka hanjokaiky,
  '3':
  - type: text
    content: 'Ny mpifehy ny dimam-polo sy ny manan-kaja, Ny mpanolo-tsaina sy ny mahay zavatra Ary ny mahay ny fiboeriboeriky ny mpanao ody. '
  '4':
  - type: text
    content: 'Ary hanendry ankizilahy madinika ho lehibeny Aho, Ary ny haitraitran-jaza no hanapaka azy. '
  '5':
  - type: text
    content: 'Ary hifanipaka izy samy iray firenena, Dia samy ny namany avy sy ny akaiky azy avy; Ny tovolahy hirehareha amin''ny anti-panahy, Ary ny tsy manan-daza amin''ny manan-daza. '
  '6':
  - type: text
    content: Raha misy olona angatahin
  - type: note
    content: Heb. hazon'
  - type: text
    content: '''ny rahalahiny ao an-tranon-drainy ka ataony hoe: Hianao no manana lamba, koa aoka ho mpanapaka anay, Ary aoka ity faharavana ity ho raharahanao, '
  '7':
  - type: text
    content: 'Dia namaly izy amin''izany andro izany hoe: Tsy mety ho dokotera aho, Fa ao an-tranoko tsy misy hanina na lamba; Koa tsy azonareo hatao mpanapaka ny olona aho. '
  '8':
  - type: text
    content: 'Fa tafintohina Jerosalema, Ary potraka Joda, satria ny lelany sy ny asany dia samy manohitra an''i Jehovah Mba hihaika ny mason''ny voninahiny. '
  '9':
  - type: text
    content: 'Ny fisehon''ny tarehiny miampanga azy; Ary mampiharihary ny fahotany tahaka an''i Sodoma izy ka tsy manafina azy. Lozan''ny fanahiny! Fa mampidi-doza amin''ny tenany izy. '
