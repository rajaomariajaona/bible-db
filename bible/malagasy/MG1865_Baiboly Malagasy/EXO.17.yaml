document_id: EXO.17,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nimonomononan'ny Zanak'Isiraely noho ny tsi-fisian-drano, sy ny nanomezan'Andriamanitra azy rano avy tamin'ny vatolampy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nifindra ny fiangonana, dia ny Zanak''Isiraely rehetra, ka niala tao an-efitra Sina, araka izay natoron''i Jehovah hitobiany, dia nitoby tao Refidima; ary tsy nisy rano hosotroin''ny olona. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary Josoa dia nanao araka izay efa nolazain''i Mosesy taminy, ka niady tamin''ny Amalekita izy; ary Mosesy sy Arona sy Hora kosa niakatra ho ao an-tampon''ny havoana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary raha nasandratr''i Mosesy ny tànany, dia nahery ny Isiraely; fa raha nampidininy ny tànany, dia nahery kosa ny Amalekita. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa efa vizana ny tanan''i Mosesy; ka dia naka vato izy roa lahy, ka nataony teo ambanin''i Mosesy hipetrahany; ary Arona sy Hora dia nanohana ny tànany, ka ny iray tamin''ny anila, ary ny iray kosa tamin''ny anila; dia naharitra tsy nidina intsony ny tànany mandra-pahafatin''ny masoandro. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary Josoa dia nandresy ny Amalekita sy ny olony tamin''ny lelan-tsabatra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hoy Jehovah tamin''i Mosesy: Soraty eo amin''ny boky izany ho fahatsiarovana, ka ambarao amin''i Josoa; fa hofoanako tokoa ny fahatsiarovana ny Amalekita tsy ho eny ambanin''ny lanitra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nanorina alitara Mosesy ka nanao ny anarany hoe: Jehovah Nisi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa hoy izy: Jehovah nianiana hoe: Ny adin''i Jehovah amin''ny Amalekita dia tsy hitsahatra hatramin''izay taranany fara mandimby.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nila ady tamin''i Mosesy ny olona ka nanao hoe: Omeo rano izahay mba hosotroinay. Fa hoy Mosesy taminy: Nahoana no mila ady amiko ianareo? Nahoana no maka fanahy an''i Jehovah ianareo? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nangetaheta teo ny olona, dia nimonomonona tamin''i Mosesy izy ka nanao hoe: Nahoana ianao no nitondra anay niakatra niala tany Egypta hahafatin-ketaheta anay sy ny zanakay ary ny bibinay? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Mosesy nitaraina tamin''i Jehovah ka nanao hoe: Ahoana no hataoko amin''ireto olona ireto? fa mila hitora-bato ahy izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy Jehovah tamin''i Mosesy: Mandrosoa eo alohan''ny olona, ary itondray hiaraka aminao ny loholon''ny Isiraely; ary ny tehinao, ilay nikapohanao an''i Neily, dia ento eny an-tananao, ka mandehana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary, indro, hijanona eo anatrehanao eo ambonin''ny harambato any Horeba Aho, dia hikapoka ny harambato ianao, ka hisy rano hivoaka avy aminy hosotroin''ny olona. Dia nanao izany Mosesy teo imason''ny loholon''ny Isiraely. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny anaran''izany tany izany dia natao­ny hoe Masa sy Meriba, noho ny ady nataon''ny Zanak''Isiraely, sy noho ny nakany fanahy an''i Jehovah hoe: Eto aminay va Jehovah, sa tsia? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary tonga ny Amalekita ka niady tamin''ny Isiraely tao Refidima. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy Mosesy tamin''i Josoa: Mifidiana lehilahy ho antsika, dia mandehana ka miadia amin''ny Amalekita; rahampitso dia hijoro eo an-tampon''ny havoana aho ka hitana ny tehin''Andriamanitra etỳ an-tanako. '
