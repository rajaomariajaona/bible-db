document_id: ACT.12,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny nanenjehana ny fiangonana, sy ny nanafahana an'i Petera tao an-tranomaizina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tamin''izany andro izany Heroda mpanjaka naninjitra ny tànany hampahory ny sasany tamin''ny fiangonana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa rehefa nandalo ny fiambenana voalohany sy faharoa izy, dia tonga teo amin''ny vavahady vy izay mahazo ny lalana ho any an-tanàna; ary nivoha ho azy io mba halehany; ary nony nivoaka izy, dia nandroso tamin''ny lalana iray; ary niaraka tamin''izay dia nandao azy ilay anjely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary rehefa nahatsiaro fanahy Petera, dia nanao hoe: Ankehitriny fantatro marina tokoa fa ny Tompo efa naniraka ny anjeliny ka namonjy ahy tamin''ny tànan''i Heroda sy ny fanantenan''ny Jiosy rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary rehefa fantany tsara izany, dia nankany an-tranon''i Maria, renin''i Jaona, izay atao hoe koa Marka, izy; ary nisy olona maro niangona nivavaka tao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary raha nandondona ny vavahady Petera, dia nisy ankizivavy atao hoe Roda nankeo hihaino. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary rehefa nahalala ny feon''i Petera izy, dia tsy namoha ny vavahady noho ny hafaliany, fa lasa nihazakazaka ary niditra ka nilaza fa Petera no mijanona eo am-bavahady. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa hoy ny olona taminy: Very saina ianao. Fa izy nitompo rariny fa izany tokoa. Dia hoy indray ny olona: Anjeliny izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa Petera naharitra nandòndòna ihany, ary rehefa novohany, dia nahita azy ireo ka talanjona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa izy nanofa tanana azy mba hangina, dia nanambara taminy izay namoahan''ny Tompo azy avy tao an-tranomaizina. Ary dia hoy izy: Ambarao amin''i Jakoba sy ny rahalahy izany zavatra izany. Dia niala izy ka lasa nankany amin''ny fitoerana hafa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary rehefa nazava ny andro, dia nifanaritaka be ihany ny miaramila ka nanao hoe: Nankaiza Petera? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary rehefa nitady azy fatratra Heroda, fa tsy nahita, dia nadininy ny mpiambina ka nasainy novonoina. Ary Heroda nidina niala tany Jodia hankany Kaisaria, dia nitoetra tany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary izy namono an''i Jakoba, rahalahin''i Jaona, tamin''ny sabatra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary Heroda tezitra loatra tamin'ny Tyriana sy ny Sidoniana; fa niray saina kosa ireo ka nankany aminy, ary rehefa nahazo an'i Blasto, mpitandrina ny trano fandrian'ny mpanjaka, ho sakaizany, dia nangataka fihavanana, satria ny taniny nivelona tamin'ny tanin'i Heroda
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. ny mpanjaka
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary tamin''ny andro voatendry dia niakanjo akanjom-panjakana Heroda ka nipetraka teo ambonin''ny seza fiandrianany, dia nikabary tamin''ny vahoaka. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ny vahoaka niantso hoe: Feon''Andriamanitra izany, fa tsy an''olona! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary niaraka tamin'izay dia nisy anjelin'ny Tompo namely azy, satria tsy nanome voninahitra an'Andriamanitra izy; ka dia nohanin'ny kankana izy ka maty.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary nandroso sy niely ny tenin''Andriamanitra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary Barnabasy sy Saoly niverina avy tany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: niverina tany'
      marker-yv: yv-n
    - type: text
      text: ' Jerosalema, rehefa vita ny fanompoany, dia nitondra an''i Jaona, izay atao hoe Marka, hiaraka aminy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary rehefa hitany fa sitraky ny Jiosy izany, dia nandroso nisambotra an''i Petera koa izy. (Efa mby tamin''ny andro fihinanana ny mofo tsy misy masirasira tamin''izany.) '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary rehefa nosamboriny izy, dia nataony tao an-tranomaizina ka natolony tamin'ny miaramila enina ambin'ny folo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. miaramila efatra katernia; ny katernia iray dia miaramila efa-dahy
      marker-yv: yv-n
    - type: text
      text: ' hambenany; dia nikasa hamoaka azy ho eo amin''ny vahoaka izy, rehefa afaka ny Paska. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Petera nambenana tao an-tranomaizina; ary ny fiangonana nahery nangataka tamin''Andriamanitra ho azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nony efa hamoaka azy Heroda, dia natory teo anelanelan''ny miaramila roa lahy Petera tamin''iny alina iny, sady voafatotra tamin''ny gadra roa izy; ary nisy mpiambina niambina ny tranomaizina teo am-baravarana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary, indro, nisy anjelin''ny Tompo tonga teo, sady nisy mazava namirapiratra tao an-trano; ary izy nanohina ny tehezan''i Petera, dia namoha azy ka nanao hoe: Mitsangàna faingana. Dia niala tamin''ny tànany ny gadra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary hoy ilay anjely taminy: Misikina, ary fehezo ny kapanao. Dia nataony izany. Ary hoy koa izy taminy: Tafio ny lambanao, ka manaraha ahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nivoaka izy ka nanaraka ary; ary tsy fantany ho marina izay nataon''ny anjely, fa nataony ho nahita fahitana ihany izy. '
