document_id: PRO.29,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izay olona anarina matetika ka mihamafy hatoka Dia ho torotoro tampoka, ka tsy hisy fahasitranana.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny olona mpandatsa-drà mankahala ny tsy misy tsiny; Fa ny mahitsy kosa miahy ny ainy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary mitady ny ain''ny mahitsy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny fahatezeran''ny adala dia avoakany avokoa; Fa ny hendry kosa manindry fo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha mihaino lainga ny mpanapaka, Dia ho ratsy fanahy ny mpanompony rehetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mihaona ny malahelo sy ny mpampahory
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mpampanana vola'
      marker-yv: yv-n
    - type: text
      text: ; Jehovah no manazava ny mason'izy roa tonta.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Izay mpanjaka mitsara marina ny malahelo, Dia haharitra mandrakizay ny seza fiandrianany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny tsorakazo sy ny anatra no manome fahendrena; Fa ny zaza aranana mampahamenatra ny reniny.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Raha maro ny ratsy fanahy, dia mitombo ny ota; Fa ny marina ho faly mahita ny fahalavoany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Faizo ny zanakao, dia ho famelombelomana ny fonao izy Sy ho fifalian'ny fanahinao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Raha tsy misy fahitana, dia atondraka hanaram-po amin'izay tsy mety ny olona; Fa raha mitandrina ny lalàna kosa izy, dia sambatra.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Raha teny fotsiny ihany, dia tsy ampy hananarana ny mpanompo; Fa na dia fantany aza, tsy hankatoaviny
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. tsy misy valiny
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Raha mihamaro ny marina, dia faly ny vahoaka; Fa raha ny ratsy fanahy no manapaka, dia misento kosa izy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hitanao va ny olona faingam-bava? Ny adala aza misy hantenaina kokoa noho izy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ny mpanompo izay nampihantaina hatry ny fony mbola kely Dia hihambo ho zanaka any am-parany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ny olona mora tezitra manetsika ady; Ary ny olona masiaka dia be fahadisoana.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny fiavonavonan'ny olona no hampietry azy; Fa hahazo voninahitra kosa ny manetry tena.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izay miray tetika amin''ny mpangalatra dia manary tena; Mandre ny fampianianana izy, nefa tsy mety milaza. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mamandrika ny tahotra olona; Fa izay matoky an'i Jehovah no hovonjena
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hatao amin'ny avo
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Maro no mila sitraka amin
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mitady ny tavan'
      marker-yv: yv-n
    - type: text
      text: '''ny mpanapaka; Fa avy amin''i Jehovah ny fitsarana ny olona.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny meloka dia fahavetavetana eo imason'ny marina; Ary ny mahitsy lalana dia mba fahavetavetana eo imason'ny ratsy fanahy kosa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Izay tia fahendrena no mahafaly ny rainy; Fa izay misakaiza amin'ny vehivavy janga dia mandany harena.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny rariny no ampandrian'ny mpanjaka ny tany; Fa izay mandray tambitamby
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mampandoa harena'
      marker-yv: yv-n
    - type: text
      text: ' no mandrava azy kosa.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izay olona mandrobo ny namany Dia mamela-pandrika ny tongony.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Misy fandrika amin'ny heloky ny olon-dratsy; Fa ny marina mihoby sy mifaly.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny marina mihevitra ny adin'ny malahelo; Fa ny ratsy fanahy tsy hahalala fahendrena.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny mpaniratsira mampihotakotaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mampirehitra
      marker-yv: yv-n
    - type: text
      text: ' ny tanàna; Fa ny hendry mampionona fahatezerana.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha iadian'ny hendry ny adala, Dia tezitra sy mihomehy izy, ka tsy hisy fitsaharana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Raha hendry miady amin''adala, na tezitra izy, na mihomehy, dia tsy misy fitsaharana'
      marker-yv: yv-n
    - type: text
      text: .
