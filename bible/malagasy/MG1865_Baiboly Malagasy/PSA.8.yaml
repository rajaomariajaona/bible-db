document_id: PSA.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny voninahitr'Andriamanitra, sy ny voninahitra nomeny ny olombelona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho an''ny mpiventy hira Al-hagitith. Salamo nataon''i Davida. Jehovah, Tomponay ô, endrey ny voninahitry ny anaranao amin''ny tany rehetra! nataonao eny amin''ny lanitra ny voninahitrao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy amin'ny vavan'ny ankizy madinika sy ny minono no nanorenanao hery noho ny mpandrafy Anao, mba hampanginanao ny fahavalo sy izay ta-hamaly ratsy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha jereko ny lanitrao, izay asan''ny rantsan-tananao, sy ny volana aman-kintana, izay noforoninao, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona moa ny olona, no ahatsiarovanao azy? Ary ny zanak''olombelona, no amangianao azy? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa nataonao ambany kely noho Andriamanitra izy, ary efa nosatrohanao voninahitra sy fiandrianana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nampanjakainao amin''ny asan''ny tananao izy; ny zavatra rehetra dia efa nataonao eo ambanin''ny tongony, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ny ondry aman''osy sy ny omby rehetra, ary ny bibidia koa, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbamin''ny voro-manidina sy ny hazandrano any an-dranomasina,izay mandeha amin''ny lalan-dranomasina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah Tomponay ô, endrey ny voninahitry ny anaranao amin'ny tany rehetra!
