document_id: DEU.34,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan'i Mosesy, sy ny nandevenana azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia niakatra niala teo Arbota-moaba Mosesy ka nankany an-tendrombohitra Nebo, ao an-tampon''i Pisga, izay tandrifin''i Jeriko. Ary nasehon''i Jehovah azy ny tany Gileada rehetra hatrany Dana '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary tsy nisy mpaminany intsony niseho teo amin''ny Isiraely tahaka an''i Mosesy, izay fantatr''i Jehovah nifanatrika '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'tamin''ny famantarana rehetra sy ny fahagagana, izay nanirahan''i Jehovah azy mba hataony tany Egypta tamin''i Farao sy ny mpanompony rehetra ary ny taniny rehetra '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ary tamin'ny herin-tanana rehetra sy ny fampahatahorana lehibe rehetra, izay nasehon'i Mosesy teo imason'ny Isiraely rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'sy Naftaly rehetra sy ny tanin''ny Efraima sy ny Manase sy ny tanin''ny Joda rehetra hatramin''ny ranomasina andrefana '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary ny tany atsimo sy ny ao amin''ny lohasahan''i Jeriko, tanàna be rofia hatrany Zoara. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy Jehovah taminy: Io no tany izay nianianako tamin''i Abrahama sy Isaka ary Jakoba hoe: Homeko ny taranakao izy; nataoko mahita azy ny masonao, nefa tsy ho tafita ho tonga eny ianao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Mosesy, mpanompon''i Jehovah, dia maty teo amin''ny tany Moaba araka ny tenin''i Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary naleviny tao an-dohasaha tao amin''ny tany Moaba, tandrifin''i Beti-peora, izy; ka tsy misy olona mahalala ny fasany mandraka androany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Efa roa-polo amby zato taona Mosesy vao maty; ary tsy pahina ny masony, na nihena ny heriny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary ny Zanak''Isiraely nisaona an''i Mosesy telo-polo andro teo Arbota-moaba; dia tapitra ny andro fitomaniana nisaonana an''i Mosesy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary Josoa, zanak''i Nona, dia feno ny fanahim-pahendrena, fa efa nametrahan''i Mosesy tanana izy; dia nihaino azy ny Zanak''Isiraely ka nanao araka izay nandidian''i Jehovah an''i Mosesy. '
