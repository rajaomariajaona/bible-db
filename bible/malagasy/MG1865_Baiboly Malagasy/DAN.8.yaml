document_id: DAN.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny fahavalo anankiray izay nampahory ny olon'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''ny taona fahatelo nanjakan''i Belsazara mpanjaka dia nisy fahitana niseho tamiko, izaho Daniela, taorian''ilay niseho tamiko tamin''ny voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nahita tamin''ny fahitana aho, ka raha mbola nijery aho, dia, indro, tao Sosana tao amin''ny lapan''ny mpanjaka izay ao amin''ny tany Elama aho; ary nahita tamin''ny fahitana aho, ka teo amoron''ny ony Olay aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia natopiko ny masoko, ka hitako, fa, indro, nisy ondrilahy iray nitsangana teo amoron''ny ony, izay nanana tandroka roa; lava ireo tandroka ireo, ary ny anankiray lava noho ny anankiray, nefa ilay lavalava kokoa no niposaka taoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hitako ny ondrilahy manoto miankandrefana sy mianavaratra ary mianatsimo; ary tsy nisy biby nahajanona teo anoloany, ary tsy nisy naharombaka izay mby teny an-tanany; fa nanao araka izay sitrapony izy ka tonga lehibe
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: niavonavona'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha mbola nandinika aho, dia, indro, nisy osilahy nivoaka avy tany andrefana ka nitety ny tany rehetra, nefa tsy nikasika ny tany; ary ilay osilahy dia nanana tandroka lehibe teo anelanelan''ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izy nankeo amin''ilay ondrilahy nanana tandroka roa, dia ilay efa hitako nitsangana eo amoron''ny ony, ka nanazakazaka azy tamin''ny fahatezeran''ny heriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hitako nanatona ho eo anilan''ny ondrilahy izy, dia nisafoaka taminy ka namely ny ondrilahy ary nanapaka ny tandrony roa, ka tsy nahajanona teo anoloany intsony ilay ondrilahy, fa nazerany teo amin''ny tany ka nohitsakitsahiny; ary tsy nisy nahavonjy ilay ondrilahy teny an-tànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary dia nihahery indrindra ilay osilahy; nefa nony nahery izy, dia tapaka ilay tandrony lehibe; ary nisy efatra lehibe nipoitra nisolo iny nifanandrify tamin''ny rivotra efatry ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy tandroka kely nipoitra avy tamin''ny anankiray amin''ireny ka nihalehibe indrindra nianatsimo sy niantsinanana ary nankany amin''ny tany mahafinaritra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nihalehibe izy ka nihatra tamin''ireo maro be eny amin''ny lanitra; ary nisy nazerany ho amin''ny tany ireo maro be sy ny kintana ka nohitsakitsahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, nihalehibe izy ka dia niady tamin''ny Komandin''ireo maro be, ary nesorina taminy ny fanatitra isan''andro, ary ny fitoerana masina noravana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nisy maro be mbamin''ny fanatitra isan''andro natolotra azy noho ny fahadisoana, dia nazerany ho amin''ny tany ny fahamarinana; ary niasa izy sady nambinina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nandre ny masina anankiray niteny aho, ary nisy masina iray koa nanao tamin''ilay niteny hoe: Mandra-pahoviana ny fahitana mandrakariva'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny amin''ny fanatitra isan''andro'
    marker-yv: yv-n
  - type: text
    text: ' sy ny fahotana mahatonga fandravana mba hanolorana ny fitoerana masina sy ireo maro be ho fanitsaka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy izy tamiko: Taon-jato sy roa arivo andro'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hariva sy maraina
    marker-yv: yv-n
  - type: text
    text: ; ary nony afaka izany, dia amin'izay vao hodiovina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ho marina
    marker-yv: yv-n
  - type: text
    text: ' ny fitoerana masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nony nahita ny fahitana izaho Daniela ka nitady hahafantatra izany, dia, indro, nisy nanana tarehy tahaka ny olona nitsangana teo anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nandre feon''olona tao afovoan''i Olay aho, izay niantso ka nanao hoe: Ry Gabriela, ampahalalao ny fahitana ity lehilahy ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary dia nankeo amin''ilay nitsanganako izy; ary nony tonga izy, dia raiki-tahotra aho ka nikarapoka nihohoka; nefa hoy izy tamiko: Aoka ho fantatrao, ry zanak''olona, fa io fahitana io dia milaza ny farany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha niresaka tamiko izy, dia renoky ny torimaso teo amin''ny tany aho; fa izy nanohina nampitsangana ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy izy: Indro, hampahafantariko anao izay ho tonga amin''ny fahatezerana farany; fa ho amin''ny fotoana any am-parany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ilay ondrilahy hitanao nanana tandroka roa dia ny mpanjakan''i Media sy Persia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny osilahy lava volo dia ny mpanjakan''i Grisia; ary ny tandroka lehibe teo anelanelan''ny masony dia ny mpanjaka voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny amin''ilay efa tapaka, ka nisy efatra nitsangana nandimby azy, dia hisy fanjakana efatra hitsangana avy amin''ny jentilisa, nefa tsy mitovy hery aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny hiafaran''ny fanjakany, rehefa tanteraky ny mpanota ny asany, dia hisy mpanjaka hitsangana, izay masia-tarehy sy mahafantatra zavatra saro-pantarina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ho be ny heriny, nefa tsy amin''ny herin''ny tenany; ary mahagaga ny fanimbana hataony; ary hambinina izy ka hahefa ary hanimba ny mahery sy ny olo-masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny fahafetseny koa no hahatanteraka ny fitaka eny an-tanany; ary izy hiavonavona am-po ka handringana ny maro amin''izay tsy ampoiziny; ary hitsangana hanohitra ny Andrianan''ny andriana izy, kanjo ho torotoro kosa, nefa tsy hisy tanana hamely azy tsinona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary dia marina ny amin''ireo andro voalaza ireo, nefa ahorony ny fahitana, fa mbola ho andro maro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary izaho Daniela dia torana ka nandraiky narary andro vitsivitsy; ary nony afaka izany dia nitsangana aho ka nanao ny raharahan'ny mpanjaka; ary ka aho ny amin'ny fahitana, nefa tsy nisy nahafantatra izany.
