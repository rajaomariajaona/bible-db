document_id: 1KI.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny mpiasan'i Solomona sy ny zavatra nentiny nanao ny tempoly
  - type: text
    content: 'Ary rehefa vitan''i Solomona ny nanaovany ny tranon''i Jehovah sy ny lapan''ny mpanjaka araka izay rehetra efa niriny hatao, '
  '10':
  - type: text
    content: 'Ary nony afaka ny roa-polo taona nanaovan''i Solomona ny trano roa, dia ny tranon''i Jehovah sy ny lapan''ny mpanjaka '
  '11':
  - type: text
    content: '(Hirama, mpanjakan''i Tyro, nanome an''i Solomona hazo sedera sy hazo kypreso ary volamena, araka izay rehetra niriny), dia nomen''i Solomona tanàna roa-polo tany amin''ny tany Galilia kosa Hirama. '
  '12':
  - type: text
    content: 'Ary Hirama niala tany Tyro hizaha ny tanàna izay nomen''i Solomona azy, ka tsy tiany ireny. '
  '13':
  - type: text
    content: 'Dia hoy izy: Hatao inona ireo tanàna nomenao ahy ireo, ry rahalahiko? Ary ireny dia natao hoe tany Kobola mandraka androany. '
  '14':
  - type: text
    content: 'Ary Hirama nampanatitra talenta volamena roa-polo amby zato ho an''ny mpanjaka. '
  '15':
  - type: text
    content: Ary izao no toetry ny fanompoana nampanaovin'i Solomona mpanjaka ny olona, tamin'ny nanaovany ny tranon'i Jehovah sy ny lapan'andriana ary Milo
  - type: note
    content: Heb. fiarovana
  - type: text
    content: ' sy ny màndan''i Jerosalema, sy Hazora sy Megido ary Gazera '
  '16':
  - type: text
    content: '(fa Farao, mpanjakan''i Egypta, efa niakatra, dia nahafaka an''i Gazera ka nandoro azy tamin''ny afo; ary ny Kananita izay nitoetra tao an-tanàna dia novonoiny, ary ny tanàna dia nomeny ho haren-jazavavy ho an''ny zananivavy, vadin''i Solomona), '
  '17':
  - type: text
    content: 'ary, Solomona nanamboatra an''i Gazera sy Beti-horona ambany '
  '18':
  - type: text
    content: 'sy Baleta sy Tadmora any an-efitra, amin''ny tany Samata, '
  '19':
  - type: text
    content: 'ary ny tanàna fitehirizana rehetra izay nananan''i Solomona sy ny tanàna fitoeran''ny kalesy sy ny tanàna fitoeran''ny mpitaingin-tsoavaly sy izay tian''i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin''ny tany nanjakany rehetra. '
  '2':
  - type: text
    content: 'dia niseho tamin''i Solomona indray Jehovah tahaka ilay nisehoany taminy tao Gibeona. '
  '20':
  - type: text
    content: 'Ary ny olona sisa rehetra tamin''ny Amorita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita, izay tsy isan''ny Zanak''Isiraely, '
  '21':
  - type: text
    content: dia ny taranany izay sisa nandimby azy teo amin'ny tany, izay tsy azon'ny Isiraely naringana
  - type: note
    content: Heb. natao herema
  - type: text
    content: ' avokoa, no nampanaovin''i Solomona fanompoana mandraka androany. '
  '22':
  - type: text
    content: 'Fa ny Zanak''Isiraely dia tsy mba nampanaovin''i Solomona izany; fa izy kosa no miaramila sy mpanompony sy komandy sy mpanafika malaza sy komandin''ny kalesiny sy ny mpitaingin-tsoavaliny. '
  '23':
  - type: text
    content: 'Izao no isan''ny mpifehy ny olona voatendry izay nitandrina ny asan''i Solomona: dimam-polo amby dimam-jato lahy no mpifehy ny mpiasa.'
  '24':
  - type: text
    content: Ary rehefa niakatra avy any an-Tanànan'i Davida ny zanakavavin'i Farao hankany amin'ny tranony izay nataon'i Solomona ho azy, dia nanao an'i Milo
  - type: note
    content: Heb. fiarovana
  - type: text
    content: ' koa izy.'
  '25':
  - type: text
    content: Ary intelo isan-taona no nanateran'i Solomona fanatitra dorana sy fanati-pihavanana teo ambonin'ny alitara izay naoriny ho an'i Jehovah, sady nandoro ditin-kazo manitra teo ambonin'ny alitara teo anatrehan'i Jehovah izy. Ka toy izany no nahavitany ny trano.
  '26':
  - type: text
    content: 'Ary Solomona mpanjaka nanao sambo tao Ezion-gebera, izay ao anilan''i Elota, ao amoron''ny Ranomasina Mena, amin''ny tany Edoma. '
  '27':
  - type: text
    content: 'Ary Hirama nampandeha ny vahoakany tamin''ny sambo, dia matilô izay nahay ranomasina, hiaraka amin''ny vahoakan''i Solomona. '
  '28':
  - type: text
    content: Ary nankany Ofira ireo, dia naka talenta volamena roa-polo amby efa-jato, ka nentiny tany amin'i Solomona mpanjaka izany.
  '3':
  - type: text
    content: 'Ary hoy Jehovah taminy: Efa reko ny vavakao sy ny fifonanao izay nataonao teo anatrehako; koa efa nohamasiniko ity trano nataonao ity mba hampitoerana ny anarako mandrakizay: ary ho amin''ity mandrakariva ny masoko sy ny foko. '
  '4':
  - type: text
    content: 'Ary raha ianao handeha eo anatrehako tahaka ny nandehanan''i Davida rainao tamin''ny fahitsian''ny fo sy ny fahamarinana ka hanao araka izay rehetra nandidiako anao ary hitandrina ny didiko sy ny fitsipiko, '
  '5':
  - type: text
    content: 'dia hampitoeriko mandrakizay amin''ny Isiraely ny seza fiandrianan''ny fanjakanao, araka ilay nolazaiko tamin''i Davida rainao hoe: Tsy ho diso zanakalahy amin''ny seza fiandrianan''ny Isiraely ianao. '
  '6':
  - type: text
    content: 'Fa raha miala amin''ny fanarahana Ahy kosa ianareo na ny zanakareo ka tsy mitandrina ny lalàko sy ny didiko, izay nataoko teo anoloanareo, fa mandeha manompo andriamanikafa sy miankohoka eo anatrehany, '
  '7':
  - type: text
    content: 'dia hofongorako tsy ho amin''ny tany izay nomeko azy ny Isiraely; ary ity trano izay nohamasiniko ho an''ny anarako ity dia hofongorako tsy ho eo imasoko; ary ny Isiraely ho tonga ohabolana sy ambentinteny any amin''ny firenena rehetra; '
  '8':
  - type: text
    content: 'ary na dia avo aza ity trano ity, dia mbola hitalanjonan''izay rehetra mandalo izy sady hisitrisirany ka hanaovany hoe: Naninona re no dia nataon''i Jehovah toy izao ity tany sy ity trano ity? '
  '9':
  - type: text
    content: 'Ary hisy hamaly hoe: Satria ny olona nahafoy an''i Jehovah Andriamaniny, Izay nitondra ny razany nivoaka avy tany amin''ny tany Egypta, ary nikikitra tamin''andriamani-kafa sy niankohoka teo anatrehany ka nanompo azy, dia izany no nampidiran''i Jehovah izao loza rehetra izao taminy.'
