document_id: ZEC.14,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, hisy andron''i Jehovah ho avy, ka ny babo aminao hozaraina ao am-povoanao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho tonga tahaka ny tani-hay
    - type: usfm
      marker: x
      children:
      - type: text
        text: heb. Arabà
      marker-yv: yv-n
    - type: text
      text: ' ny tany rehetra hatrany Geba ka hatrany Rimona ao atsimon''i Jerosalema; ary hasandratra sy honenana ao amin''ny fitoerany izy hatramin''ny vavahadin''i Benjamina ka hatreo amin''ny vavahady voalohany, hatramin''ny vavahady an-jorony, ary hatramin''ny tilikambo Hananela ka hatramin''ireo famiazam-boaloboky ny mpanjaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hisy mponina any, ary tsy hisy ozona
    - type: usfm
      marker: x
      children:
      - type: text
        text: heb. herema
      marker-yv: yv-n
    - type: text
      text: ' intsony, fa Jerosalema handry fahizay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no areti-mandringana hamelezan''i Jehovah ny firenena rehetra izay efa nanafika an''i Jerosalema: Hataony mihalevona am-pitsanganana ny nofony, ary hihalevona eo amin''ny itoerany ny masony, ary ny lelany koa hihalevona ao am-bavany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany andro izany dia hisy fifanaritahana lehibe avy amin''i Jehovah ao aminy, ary hifampihazon-tanana izy, sady samy hanainga tanana hifamely. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Joda koa hamely an'i
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: hiady any'
      marker-yv: yv-n
    - type: text
      text: ' Jerosalema, ary hovorina ny haren''ny firenena manodidina rehetra, dia volamena sy volafotsy ary fitafiana betsaka. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho toy izany koa ny areti-mandringana hamely ny soavaly sy ny ampondra sy ny rameva sy ny boriky mbamin''ny biby fiompy rehetra izay ao amin''ireny toby ireny, eny, ho tahaka izany areti-mandringana izany ihany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sisa rehetra amin''ny jentilisa rehetra, izay niakatra namely an''i Jerosalema, dia hiakatra isan-taona isan-taona hiankohoka eo anatrehan''ny Mpanjaka, dia Jehovah, Tompon''ny maro, sy hitandrina ny andro firavoravoana fitoerana an-trano rantsan-kazo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na iza na iza amin''ny firenena samy hafa amin''ny tany no tsy hiakatra ho any Jerosalema hiankohoka eo anatrehan''ny Mpanjaka, dia Jehovah, Tompon''ny maro, dia tsy mba hisy ranonorana mivatravatra any aminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha ny firenen''i Egypta tsy mba miakatra ka tsy tonga, dia tsy hisy koa any aminy, sady ho tonga ny areti-mandringana izay hamelezan''i Jehovah ny firenena tsy miakatra hitandrina ny andro firavoravoana fitoerana an-trano rantsan-kazo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no fampijaliana an
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: fahotana'
      marker-yv: yv-n
    - type: text
      text: '''i Egypta sy fampijaliana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: fahotana'
      marker-yv: yv-n
    - type: text
      text: ' ny firenena rehetra izay tsy miakatra hitandrina ny andro firavoravoana fitoerana an-trano rantsan-kazo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hangoniko ny jentilisa rehetra hamely an'i Jerosalema, dia ho afaka ny tanàna, ka horobaina ny trano, ary hosavihina ny vehivavy; ary ny an-tsasaky ny tanàna dia ho lasan-ko babo, fa ny vahoaka sisa tsy dia hofongorana avokoa amin'ny tanàna.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''izany andro izany dia hisy ao amin''ny famohamandrin-tsoavaly manao hoe: HAMASININA HO AN''I JEHOVAH; ary ny vilany ao an-tranon''i Jehovah ho tahaka ny lovia famafazana eo- anoloan''ny alitara. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, ny vilany rehetra any Jerosalema sy Joda dia hohamasinina ho an'i Jehovah, Tompon'ny maro; ary izay rehetra mamono zavatra hatao fanatitra dia ho avy haka amin'ireny ka hahandro aminy. Ary amin'izany andro izany dia tsy hisy Kananita
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: mpandranto'
      marker-yv: yv-n
    - type: text
      text: ' intsony ao an-tranon''i Jehovah, Tompon''ny maro.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hivoaka Jehovah ka hiady amin''ireny jentilisa ireny, tahaka ny fameliny amin''ny andro fiadiana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany andro izany ny tongony hijoro eo an-Tendrombohitra Oliva. izay eo atsinanana tandrifin''i Jerosalema, ary ny Tendrombohitra Oliva hitresaka eo afovoany hiatsinanana sy hiankandrefana, ka hisy lohasaha lehibe; ary ny antsasaky ny tendrombohitra hifindra hianavaratra, fa ny an-tsasany kosa hianatsimo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia handositra ho any amin
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: hamaky'
      marker-yv: yv-n
    - type: text
      text: '''ny lohasahan''ny tendrombohitro ianareo, fa hipaka hatrany Azela ny lohasahan''ny tendrombohitra; eny, handositra ianareo tahaka ny nandosiranareo ny horohorontany tamin''ny andron''i Ozia, mpanjakan''ny Joda; ary ho avy Jehovah Andriamanitro mbamin''ny masina rehetra momba Azy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: heb. Anao
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany andro izany dia tsy hisy mazava, ary ireo mamirapiratra tsy hiseho intsony; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hisy andro iray, izay fantatr''i Jehovah, tsy andro na alina; nefa, raha hariva ny andro, dia hisy mazava. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany andro izany dia hisy rano velona hivoaka avy any Jerosalema, ka ny antsasany hankany amin''ny ranomasina atsinanana, ary ny antsasany hankany amin''ny ranomasina andrefana, na amin''ny fahavaratra na amin''ny ririnina dia samy hisian''izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah ho Mpanjakan''ny tany rehetra; amin''izany andro izany dia iray no Jehovah, sady iray no anarany. '
