document_id: EZR.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny nataon'i Kyrosy nandefasana ny Jiosy hody, sy ny nanomezany azy ny fanaka avy tao amin'ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny taona voalohany nanjakan''i Kyrosy, mpanjakan''i Persia, dia notairin''i Jehovah ny fanahin''i Kyrosy, mpanjakan''i Persia, mba hanatanteraka ny tenin''i Jehovah izay nampilazainy an''i Jeremia, ka dia nandefa teny eran''ny fanjakany rehetra izy, sady nataony an-tsoratra koa izany hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kapoaka volamena misarona telo-polo, lovia volafotsy manarakaraka folo amby efa-jato, ary lovia hafa koa arivo; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: efa-jato amby dimy arivo no isan'ny fanaka volamena sy volafotsy rehetra. Ireo rehetra ireo dia nentin'i Sesbazara niaraka nankany Jerosalema tamin'ny babo izay niverina avy tany Babylona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Kyrosy, mpanjakan''i Persia: Ny fanjakana rehetra ambonin''ny tany dia efa nomen''i Jehovah, Andriamanitry ny lanitra, ahy; ary Izy efa nandidy ahy hanao trano ho Azy any Jerosalema izay any Joda. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa iza avy moa aminareo rehetra no olony? Andriamaniny anie homba azy, fa aoka hiakatra any Jerosalema izay any Joda izy ka hanao ny tranon''i Jehovah, Andriamanitry ny Isiraely, Izy no Andriamanitra Izay any Jerosalema. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na iza na iza sisa tratra, dia aoka ny tompon-tany ao amin''izay ivahiniany hanome azy volafotsy sy volamena sy fanaka ary biby fiompy mbamin''ny fanati-tsitrapo ho an''ny tranon''Andriamanitra, izay any Jerosalema. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niainga ny lohan''ny firenen''i Joda sy Benjamina sy ny mpisorona sy ny Levita, dia izay rehetra efa namporisihin''Andriamanitra hiakatra hanao ny tranon''i Jehovah any Jerosalema. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay rehetra manodidina dia nampahery ny tànan''ireo tamin''ny fanaka volafotsy sy volamena sy fanaka hafa sy biby fiompy ary zava-tsoa mbamin''izay rehetra nateriny tamin''ny sitrapo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia navoak''i Kyrosy mpanjaka ny fanaky ny tranon''i Jehovah, izay efa nalain''i Nebokadnezara tany Jerosalema ka efa nataony tao an-tranon''ireo andriamaniny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mitredata, mpitahiry ny haren''ny fanjakana, dia nasain''i Kyrosy, mpanjakan''i Persia; namoaka ireny, ka nisainy sady natolony an''i Sesbazara, lehiben''ny firenen''i Joda. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no isany: Lovia volamena telo-polo, lovia volafotsy arivo, antsy sivy amby roa-polo, '
