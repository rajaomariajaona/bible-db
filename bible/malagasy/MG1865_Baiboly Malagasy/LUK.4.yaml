document_id: LUK.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jesosy feno ny Fanahy Masina dia niverina avy tany Jordana, ary nentin''ny Fanahy tany an-efitra efa-polo andro Izy '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nalain''ny devoly fanahy. Ary tsy nihinan-kanina akory Izy tamin''izany andro izany, ka rehefa tapitra izany, dia noana Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy ny devoly taminy: raha Zanak''Andriamanitra Hianao, teneno io vato io mba ho tonga mofo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Jesosy namaly azy ka nanao hoe: Voasoratra hoe: Tsy mofo ihany no hiveloman''ny olona (Deo. 8. 3). '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny devoly nitondra Azy niakatra, dia naneho Azy indray mipi-maso ny fanjakana rehetra amin''izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy ny devoly taminy: Homeko Anao izao fanapahana rehetra izao mbamin''ny voninahiny, fa efa natolotra ahy izany, ka izay tiako no homeko azy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'koa raha hiankohoka eto anatrehako Hianao, dia ho Anao avokoa izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa Jesosy namaly ka nanao taminy hoe: Voasoratra hoe: Jehovah Andriamanitrao no hiankohofanao, ary Izy irery ihany no hotompoinao (Deo. 6. 13; 10. 20). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nitondra Azy nankany Jerosalema izy, dia nampitoetra Azy teo an-tampon''ny tempoly ka nanao taminy hoe: Raha Zanak''Andriamanitra Hianao, mivarina any ambany any; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa voasoratra hoe: Izy handidy ny anjeliny ny aminao mba hiaro Anao; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary eny an-tànany no hitondran''ireo Anao, Fandrao ho tafintohina amin''ny vato ny tongotrao (Sal. 91. 11, 12). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa Jesosy namaly ka nanao taminy hoe: Voalaza hoe: Aza maka fanahy an''i Jehovah Andriamanitrao (Deo. 6. 16). '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa nahatapitra izay fakam-panahy rehetra ny devoly, dia nandao Azy izy aloha. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jesosy niverina tamin''ny herin''ny Fanahy nankany Galilia; dia niely tamin''ny tany rehetra manodidina ny lazany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Izy nampianatra teny amin''ny synagogan''ny olona ka nankalazain''izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia tonga tao Nazareta, izay nahabe Azy Izy; ary araka ny fanaony dia niditra tao amin''ny synagoga tamin''ny andro Sabata Izy ka nitsangana hamaky teny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia natolotra Azy ny bokin''Isaia mpaminany; ary nony namelatra ny boky Izy, dia nahita ny teny voasoratra hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny Fanahin''i Jehovah no ato amiko, Satria nanosotra Ahy hitory teny soa mahafaly amin''ny malahelo Izy; Naniraka Ahy hitory fandefasana amin''ny mpifatotra Izy, Sy fampahiratana amin''ny jamba, Hanafaka izay nampahorina, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hitory ny taona ankasitrahan''i Jehovah (Isa. 61. 1, 2). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa nahorony ny boky ka naveriny tamin''ny mpanao raharaha, dia nipetraka Izy. Ary nandinika Azy ny mason''izay rehetra teo amin''ny synagoga. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Jesosy niteny taminy hoe: Androany no efa tanteraka eto anatrehanareo izany soratra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izy rehetra nankalaza Azy sady talanjona noho ny tenin''ny fahasoavana naloaky ny vavany, ka hoy izy: Tsy Zanak''i Josefa va Ity? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy kosa Jesosy taminy: Hataonareo amiko tokoa izao ohabolana izao hoe: Mpanao fanafody, sitrano ny tenanao: izay renay fa nataonao tao Kapernaomy dia mba ataovy eto amin''ny taninao koa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy koa Izy: Lazaiko aminareo marina tokoa: Tsy misy mpaminany izay ankasitrahana ao amin''ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa lazaiko aminareo marina tokoa: Maro no mpitondratena teo amin''ny Isiraely tamin''ny andron''i Elia, raha nihantona ny andro'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr.nirindrina ny lanitra
    marker-yv: yv-n
  - type: text
    text: ' telo taona sy enim-bolana, ka nisy mosary mafy tamin''ny tany rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'nefa tsy mba nirahina ho any amin''ny anankiray tamin''ireo Elia, fa ho any Zarefata any amin''ny tany Sidona ihany, dia ho any amin''izay vehivavy mpitondratena. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary maro no boka teo amin''ny Isiraely tamin''ny andron''i Elisa mpaminany, nefa tsy mba nisy nodiovina na dia iray akory aza fa Namàna Syriana ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia tezitra loatra izay rehetra teo amin''ny synagoga, raha nandre izany, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ka nitsangana izy, dia nandroaka Azy hiala ao an-tanàna ary nitondra Azy ho any an-tampon''ny havoana niorenan''ny tanàna, mba hazerany amin''ny hantsana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nefa Izy namaky teo afovoany, ka dia lasa nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nidina tany Kapernaomy, tanàna any Galilia, Jesosy ka nampianatra ny olona tamin''ny Sabata. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia talanjona ny olona tamin''ny fampianarany, satria nisy fahefana ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nisy olona tao amin''ny synagoga, izay nanana ny fanahin''ny demonia maloto, dia niantso tamin''ny feo mahery izy '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ka nanao hoe: Indrisy! moa mifaninona akory izahay sy Hianao, ry Jesosy avy any Nazareta? avy handringana anay va Hianao? Fantatro fa Ilay Masin''Andriamanitra Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa Jesosy niteny mafy azy ka nanao hoe: Mangina ianao, ka mivoaha aminy. Ary ny demonia, nony namotraka azy teo afovoan''ny olona, dia nivoaka taminy, nefa tsy naharatra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary talanjona avokoa izy rehetra ka niresaka hoe: Manao ahoana izao teny izao! fa amin''ny fahefana sy ny hery no andidiany ny fanahy maloto, dia mivoaka ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary niely teny amin''ny tany manodidina rehetra ny lazany. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary nony nitsangana niala tao amin''ny synagoga Jesosy, dia niditra tao an-tranon''i Simona. Ary azon''ny tazo mafy ny rafozam-bavin''i Simona; ary izy ireo nangataka taminy hahasitrana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Dia nitsangana teo akaikiny Izy, ka noteneniny mafy ny tazo, dia niala tamin-dravehivavy izany; ary nitsangana niaraka tamin'izay izy ka nanompo azy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary raha nilentika ny masoandro, ny olona rehetra izay nanana marary tamin''ny aretina samy hafa dia nitondra azy teo aminy; ary dia nametra-tanana tamin''izy rehetra tsirairay Izy ka nahasitrana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nisy demonia nivoaka tamin''ny maro ka niantso hoe: Hianao no Zanak''Andriamanitra. Nefa norarany ireo ka tsy navelany hiteny, satria nahalala Azy ho Kristy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary nony maraina ny andro, dia niala Jesosy ka nankany an-tany foana; ary ny vahoaka nitady Azy, dia nankeo aminy ka te-hihazona Azy mba tsy hialany tao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fa hoy Izy taminy: Tsy maintsy mitory ny teny soa mahafaly ny amin''ny fanjakan''Andriamanitra any amin''ny tanàna hafa koa Aho, satria izany no nanirahana Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ary Izy nitori-teny tao amin'ny synagoga eran'i Galilia.
