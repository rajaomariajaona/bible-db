document_id: ECC.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsi-fahatakaran'ny saina ny fitondran'Andriamanitra, sy ny tokony hifaliana amin'izay soa hita ary hahazotoana amin'izay rehetra azo atao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Iza no toy ny hendry? Ary iza no mahalala izay anton-javatra? Ny fahendren'ny olona mahamiramirana ny tarehiny, ary voaova ny fahadontoan'ny endriny.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary tamin'izany dia hitako ny ratsy fanahy nalevina ka tafiditra; fa izay nanao ny marina kosa dia lasa niala tamin'ny fitoeran'ny masina ka nohadinoina tao an-tanàna
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ary tafiditra izy ka niala tamin''ny fitoeran''ny masina, ary nohadinoin''ny tao an-tanàna izay efa nanaovany izany'
      marker-yv: yv-n
    - type: text
      text: ; zava-poana koa izany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Saingy tsy tanterahina vetivety ny famaliana ny ratsy atao, dia izany no ikirizan''ny fon''ny zanak''olombelona amin''ny fanaovan-dratsy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Eny, fa na dia manao ratsy injato aza ny mpanota ka ela velona ihany, dia fantatro kosa fa hisy soa ho an''izay matahotra an''Andriamanitra, dia izay matahotra eo anatrehany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa tsy hisy soa ho an''ny ratsy fanahy; fa ho toy ny aloka izy ka tsy haharitra ela, satria tsy matahotra eo anatrehan''Andriamanitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Izao koa no zava-poana izay atao atỳ ambonin''ny tany: Misy olo-marina iharan''izay tokony ho valin''ny asa ratsy; ary misy olo-meloka mahazo izay tokony ho valin''ny asa marina; hoy izaho: Zava-poana koa izany.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia noderaiko ny fifaliana, satria tsy misy mahasoa ny olona atỳ ambanin'ny masoandro afa-tsy ny mihinana sy ny misotro ary ny miravoravo, ka hisy izany amin'ny fisasarany mandritra ny andro hiainany, izay nomen'Andriamanitra azy atỳ ambanin'ny masoandro.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Raha nampiasaiko ny foko hahalala fahendrena sy hahita ny raharaha atao atỳ ambonin''ny tany (fa misy tsy mahita torimaso na andro na alina), '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: dia hitako avokoa ny asan'Andriamanitra, fa tsy takatry ny sain'ny olona ny asa atao atỳ ambanin'ny masoandro; koa na dia mikely aina hitady izany aza ny olona, tsy ho hitany; eny, na ny hendry aza no manao hahafantatra izany, dia tsy ho azony fantarina akory.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hoy izaho: Tandremo ny didin''ny mpanjaka noho ny efa nianianana tamin''Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Aza malaky miala eo anatrehany; aza mikikitra amin''ny fanaovan-dratsy; fa na inona na inona sitrany dia azony atao avokoa; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa ny tenin''ny mpanjaka dia misy hery, ka iza no mahazo manao aminy hoe: Inona no ataonao? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Izay mitandrina ny didy tsy mba mikambana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mahalala
      marker-yv: yv-n
    - type: text
      text: ' amin''ny fanaovan-dratsy; ary ny fon''ny hendry dia mahalala fotoana sy fitsarana; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: fa samy manana ny fotoany sy ny fitsarana azy avy ny hevitra rehetra, satria efa be ny heloky
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fahorian'''
      marker-yv: yv-n
    - type: text
      text: ' ny olona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa tsy mahafantatra izay ho avy izy; fa iza no hampahafantatra azy izay hihaviany?
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsy misy olona manan-kery hahatana ny ainy, na manan-kery ny amin''ny andro hahafatesana; ary tsy misy fahafahana amin''ny ady, ary ny ratsy fanahy tsy ho voavonjin''ny faharatsiany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izany rehetra izany dia efa hitako avokoa tamin''ny nampiasako ny foko nandinika ny asa rehetra atao atỳ ambanin''ny masoandro. Misy andro anapahan''ny olona ny namany ka ampidirany loza aminy. '
