document_id: PSA.91,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatokian'ny olo-marina an'Andriamanitra, na dia manakaiky azy aza ny manjo ny sasany
  - type: text
    content: Ny mitoetra ao amin'ny fierena izay an'ny Avo Indrindra Dia monina eo ambanin'ny aloky ny Tsitoha.
  '10':
  - type: text
    content: 'Dia tsy hisy loza hanjo anao, Na aretina hanakaiky ny lainao. '
  '11':
  - type: text
    content: 'Fa Izy handidy ny anjeliny ny aminao Mba hiaro anao eny amin''izay rehetra halehanao. '
  '12':
  - type: text
    content: 'Eny an-tànany no hitondran''ireo anao, Fandrao ho tafintohina amin''ny vato ny tongotrao. '
  '13':
  - type: text
    content: Ny liona masiaka sy ny vipera hodiavinao; Ny liona tanora sy ny menarana no hohitsahinao.
  '14':
  - type: text
    content: 'Satria Izaho no niraiketan''ny fitiavany, Dia hamonjy azy Aho, Hanandratra azy ho any amin''ny avo Aho, satria mahalala ny anarako izy '
  '15':
  - type: text
    content: 'Hiantso Ahy izy, dia hamaly azy Aho; Ho eo aminy Aho, raha ory izy; Hamonjy sy hanome voninahitra azy Aho. '
  '16':
  - type: text
    content: Hovokisako fahela-velona izy Ary hasehoko azy ny famonjeko.
  '2':
  - type: text
    content: 'Izaho hilaza an''i Jehovah hoe: Fialofako sy batery fiarovana ho ahy Izy Ary Andriamanitro, Izay hitokiako.'
  '3':
  - type: text
    content: 'Fa Izy no hanafaka anao amin''ny fandriky ny mpihaza sy ny areti-mandoza. '
  '4':
  - type: text
    content: 'Ny volon''elany no anaronany anao, Ary ao ambanin''ny elany no hialofanao; Ho ampinga kely sy ampinga lehibe ny fahamarinany. '
  '5':
  - type: text
    content: 'Tsy hatahotra ny horohoro nony alina ianao, Na ny zana-tsipìka manidina nony andro, '
  '6':
  - type: text
    content: 'Na ny areti-mandringana mandeha amin''ny maizina, Na ny fandringanana mandripaka amin''ny mitataovovonana. '
  '7':
  - type: text
    content: 'Na dia hisy arivo aza lavo eo anilanao sy iray alina eo an-kavananao, Dia tsy hihatra aminao izany '
  '8':
  - type: text
    content: Hijery maso fotsiny ianao,Ka ho hitanao ny hamaliana ny ratsy fanahy.
  '9':
  - type: text
    content: 'Satria hoy ianao: Jehovah ô, Hianao no aroko, Sady nataonao ho fonenanao ny Avo Indrindra, '
