document_id: JER.49
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'i Elama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny amin''ny taranak''i Amona, Izao no lazain''i Jehovah: Moa tsy manan-janakalahy va Isiraely? Ary tsy manan-kandova va izy? Koa nahoana Gada no lasan''ny mpanjakany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Malkana'
    marker-yv: yv-n
  - type: text
    text: ', ary ny vahoakany monina ao amin''ny tanànany?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa, indro, avy ny andro, hoy Jehovah, izay hampandrenesako akoran''ady amin''ny famelezana an''i Raban''ny taranak''i Amona, ary ho tanànaolo rava izy, ary ny zana-bohiny hodorana amin''ny afo; Ary ny Isiraely hahalasa ny an''izay nahalaza azy, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Midradradradrà, ry Hesbona, fa rava Ay! Mitaraina, ianareo zanakavavin''i Raba! Misikina lamba fisaonana ianareo; Manaova fisaonana, ary mivoivoiza eo anaty fefy; Fa lasan-ko babo ny mpanjakany, dia ny mpisorony sy ireo mpanapaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nahoana no ny lohasaha no ataonao ho reharehanao, dia ny lohasahanao mahavokatra be. Ry zanakavavy mpiodina, izay mitoky amin''ny rakiny ka manao hoe: Iza moa no ho afa-miakatra atỳ amiko? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Indro Aho hahatonga tahotra aminao avy amin''izay rehetra manodidina anao, hoy Jehovah, Tompon''ny maro; Ary horoahina samy hizotra amin''izay hitsiny avy ianareo rehetra, sady tsy hisy hamory izay mandositra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary rehefa afaka izany, dia hampodiko ihany avy amin'ny fahababoana ny taranak'i Amona, hoy Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny amin''i Edoma. Izao no lazain''i Jehovah, Tompon''ny maro: Tsy misy fahendrena intsony va ao Temana? Very saina va ny olon-kendry? Lany va ny fahendreny?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mandosira, miambohoa ianareo, mamitsaha ao amin''ny lalina, ry mponina any Dedana, fa ny loza ho an''i Esao dia nataoko nihatra taminy, dia ny andro hamaliako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha tonga ao aminao ny mpioty voaloboka, dia tsy hamela voaloboka sisa hotsimponina akory izy; Raha avy alina ny mpangalatra, dia handrava mandra-pahafa-pony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izaho dia nampitanjaka an''i Esao, ary naharihariko ny fiereny, ka tsy mahazo miery izy; Ringana ny zanany sy ny rahalahiny ary ny namany, ka tsy ao intsony ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ilaozy ny zanakao ho kamboty, fa Izaho no hamelona azy, ary aoka Izaho no hitokian''ny vadinao mpitondratena. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Indro, fa na dia izay tsy tokony hisotro amin''ny kapoaka aza dia hisotro tokoa, ka moa ho afa-potsiny va ianao? Tsy ho afa-potsiny ianao, fa tsy maintsy hisotro tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny tenako no nianianako, hoy Jehovah, fa ho tonga figagana Bozra sy ho fandatsa sy ho rava ary ho fanozonana, ary ny tanànany rehetra ho lao mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa efa nahare filazana avy tamin''i Jehovah aho, ary nisy iraka nalefa ho any amin''ny jentilisa hanao hoe: Mivoria ianareo, ka mankanesa hamely azy, ary mitsangàna hanafika. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa, indro, hataoko tsinontsinona eo amin''ny firenena ianao sy fanazimbazimba eo amin''ny olona, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ry ilay monina ao an-tsefatsefaky ny harambato, Izay mifikitra amin''ny tampon''ny havoana, ny fahatahorana anao sy ny avonavon''ny fonao no namitaka anao; Fa na dia ataonao eny amin''ny avo tahaka ny an''ny voromahery aza ny akaninao, dia havariko avy eny ianao, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ho figagana Edoma: Izay rehetra mandalo azy dia ho gaga ka hisitrisitra noho ny loza rehetra efa namelezana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary toy ny nandravana an''i Sodoma sy Gomora mbamin''ny tanàna teny akaikiny, hoy Jehovah, no tsy hisian''olona honina any, na zanak''olombelona hivahiny any. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Indro, toy ny fiakatry ny liona avy any amin'ny kirihitrala eny amoron
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ny reharehany
    marker-yv: yv-n
  - type: text
    text: '''i Jordana no hiakarany ho any amin''ny misy ahitra mateza'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fonenany mafy'
    marker-yv: yv-n
  - type: text
    text: '; Fa hampandosiriko tampoka Edoma hiala ao, ary izay olona iray voafidy no hotendreko hanapaka azy. Fa iza no tahaka Ahy, ary iza no hifandahatra amiko, ary iza moa no mpiandry ondry mahajanona eo anatrehako? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa henoy ny saina avy amin''i Jehovah, Izay nosaininy hamelezana an''i Edoma, sy ny heviny izay noheveriny hamelezana ny mponina ao Temana: Hoviraviraina tokoa ireny, dia ny kely indrindra amin''ny ondry; Ho gaga azy tokoa ny saha fiandrasana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tamin''ny fiezinezin''ny fianjerany dia nihorohoro ny tany; Ny feon''ny fitarainany dia re hatrany amin''ny Ranomasina Mena. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Indro, hanidina hiakatra toy ny voromahery izy ka hamelatra ny elany eny ambonin'i Bozra; Ary amin'izany andro izany ny fon'ny lehilahy maherin'i Edoma dia ho tahaka ny fon'ny vehivavy mihetsi- jaza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny amin'i Damaskosy. Very hevitra Hamata sy Arpada, fa nandre filazan-doza izy ka kivy; Misamboaravoara ny ranomasina ka tsy mety tafatoetra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Misy fanahiana hatrany an-dranomasina aza; tsy mahita fiononana ny olona'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Efa ketraka Damaskosy ka mihodina handositra, fa, toran-kovitra izy; Ary azon''ny faharariana sy ny fanaintainana, toy ny vehivavy raha miteraka. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nahoana re no tsy nilaozana ny tanàna malaza
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Indrisy! efa lao ny tanàna malaza'
    marker-yv: yv-n
  - type: text
    text: ', tanana fifaliako! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ka dia hiampatrampatra eny an-kalalahana ny zatovony. Ary ny miaramila rehetra ho ringana avokoa amin''izany andro izany, hoy Jehovah, Tompon''ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary hisy afo hampirehetiko ao anatin'ny mandan'i Damaskosy, handevona ny lapan'i Beni-hadada.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny amin''i Kedara sy ny fanjakan''i Hazora, izay resin''i Nebokadnezara, mpanjakan''i Babylona. Izao no lazain''i Jehovah: Mitsangàna ianareo, ka miakara hamely an''i Kedara, ary aringano ny zanaky ny atsinanana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Halainy ny lainy sy ny ondry aman''osiny, ho entin''ny ambain-dainy mbamin''ny fanaka rehetra sy ny ramevany, sady hiantsoantso hilaza aminy hoe izy: Misy fampangorohoroana manodidina! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mandosira, ka mandehana lavitra! Mamitsaha ao amin'ny lalina, ry mponina any Hazora! hoy Jehovah; Fa Nebokadnezara, mpanjakan'i Babylona, nanao saina hamelezany anareo sy namoron-kevitra hamelezany anareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. azy
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mitsangàna, iakaro ny firenena miadana izay tsy manana ahiahy, hoy Jehovah. Dia izay tsy misy vavahady mirindrina na mihidy sady mitoka- monina. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ho babo ny ramevany, ary horobaina ny omby aman''ondriny betsaka, haeliko ho any amin''ny rivotra rehetra ireo voahety sisim-bolo; Ary ho entiko avy amin''ny manodidina rehetra ny loza hanjo azy, hoy Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary Hazora dia ho fonenan'ny amboadia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: jakala'
    marker-yv: yv-n
  - type: text
    text: ' sy ho tany lao mandrakizay; Tsy hisy olona honina any, Na zanak''olombelona hivahiny any.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny tenin''i Jehovah izay tonga tamin''i Jeremia mpaminany ny amin''i Elama tamin''ny niandohan''ny nanjakan''i Zedekia, mpanjakan''ny Joda, hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Indro, hotapatapahiko ny tsipìkan''i Elama, Izay fototry ny heriny. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hitondra Avotra efatra avy amin''ny lafiny efatry ny lanitra Aho hamelezana an''i Elama, ary haeliko ho amin''izany rivotra rehetra izany izy, ka tsy hisy firenena izay tsy halehan''ny voaroaka avy any Elama. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa hampivadi-po an''i Elama eo anoloan''ny fahavalony sy eo anoloan''izay mitady ny ainy Aho ka hahatonga loza aminy, dia ny firehetan''ny fahatezerako, hoy Jehovah; Ary hampanenjehiko azy ny sabatra Mandra-pandaniko azy; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hapetrako ao Elasma ny seza fiandrianako. Ary hofongorako tsy hisy intsony any na ny mpanjaka na ny mpanapaka, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Nefa any am-parany dia mbola hampodiko avy amin'ny fahababoany ihany Elama, hoy Jehovah.
