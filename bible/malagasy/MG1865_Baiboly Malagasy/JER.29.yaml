document_id: JER.29,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Taratasy nampitondrain'i Jeremia ho any amin'ny babo tany Babylona
  - type: text
    content: 'Ary izao no fitenin''ny taratasy izay nampitondrain''i Jeremia mpaminany avy tany Jerosalema ho any amin''ny sisa amin''ny loholona voababo sy ho amin''ny mpisorona sy ny mpaminany ary ny vahoaka rehetra, izay nobaboin''i Nebokadnezara ka nentiny avy tany Jerosalema ho any Babylona '
  '10':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Rehefa tapitra ny fito-polo taona ny amin''i Babylona, dia hamangy anareo Aho, fa hotanterahiko aminareo ny teniko tsara, ka hampodiko ho amin''ity tany ity ianareo. '
  '11':
  - type: text
    content: Fa Izaho mahalala ny hevitra iheverako anareo, hoy Jehovah, dia hevitra hahatonga fiadanana, fa tsy loza, mba hanome anareo fanantenana ny amin'ny farany
  - type: note
    content: Heb. farany sy fanantenana
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ary hiantso Ahy ianareo ka handeha sy hivavaka amiko, dia hihaino anareo Aho. '
  '13':
  - type: text
    content: 'Ary hitady Ahy ianareo, dia ho hitanareo Aho, raha katsahinareo amin''ny fonareo rehetra. '
  '14':
  - type: text
    content: 'Eny, ho hitanareo Aho, hoy Jehovah; ary hampodiko avy amin''ny fahababoana ianareo, ka hangoniko avy any amin''ny firenena rehetra sy avy any amin''ny tany rehetra izay nandroahako anareo, hoy Jehovah, ka hampodiko ho any amin''ilay tany efa nanolorako anareo hobaboina. '
  '15':
  - type: text
    content: 'Fa hoy ianareo: Jehovah nanangana mpaminany ho anay eto Babylona. '
  '16':
  - type: text
    content: 'Fa izao no lazain''i Jehovah ny amin''ny mpanjaka izay mipetraka eo amin''ny seza fiandrianan''i Davida sy ny amin''ny vahoaka rehetra izay monina amin''ity tanàna ity, dia ny rahalahinareo izay tsy mba lasan-ko babo niaraka taminareo. '
  '17':
  - type: text
    content: 'izao no lazain''i Jehovah, Tompon''ny maro: Indro, hampameleziko azy ny sabatra sy ny mosary ary ny areti-mandringana, ka hataoko toy ny aviavy ratsy dia ratsy izay tsy azo hanina noho ny haratsiny izy. '
  '18':
  - type: text
    content: Ary henjehiko amin'ny sabatra sy ny mosary ary ny areti-mandringana izy ka hatolotro ho mpanjenjena
  - type: note
    content: 'Na: ho fampangovitana'
  - type: text
    content: ' any amin''ny fanjakana rehetra ambonin''ny tany, ho fanozonana sy figagana sy zavatra mampisitrisitra sy fandatsa ho an''ny firenena izay nandroahako, azy '
  '19':
  - type: text
    content: 'noho ny tsy nihainoany ny teniko, hoy Jehovah, izay nampitondraiko ny mpaminany mpanompoko ho any aminy, teny, nifoha maraina koa Aho ka naniraka azy, nefa tsy nihaino ianareo, hoy Jehovah. '
  '2':
  - type: text
    content: '(rehefa lasa niala tany Jerosalema Jekonia mpanjaka sy ny reniny sy ny tandapa sy ny mpanapaka ny Joda sy Jerosalema mbamin''ny mahay tao-zavatra sy ny mpanefy vy), '
  '20':
  - type: text
    content: 'Koa mihainoa ny tenin''i Jehovah, ianareo babo rehetra izay nesoriko tany Jerosalema ho atỳ Babylona. '
  '21':
  - type: text
    content: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, ny amin''i Ahaba, zanak''i Kolaia, sy ny amin''i Zedekia, zanak''i Mahaseia, izay maminany lainga aminareo amin''ny anarako: Indro, hatolotro eo an-tanan''i Nebokadnezara, mpanjakan''i Babylona, izy, ka dia hovonoiny eo imasonareo. '
  '22':
  - type: text
    content: 'Ary izy roa lahy dia hataon''ny babo rehetra amin''ny Joda izay any Babylona ho fanozonana hoe: Hataon''i Jehovah tahaka an''i Zedekia sy Ahaba, izay nodoran''ny mpanjakan''i Babylona tamin''ny afo, anie ianao, '
  '23':
  - type: text
    content: noho ny nanaovany izay fady indrindra
  - type: note
    content: Heb; fahadalana
  - type: text
    content: ' tao amin''ny Isiraely sy ny nijangajangany tamin''ny vadin''ny namany ary ny nitenenany lainga tamin''ny anarako, izay tsy nandidiako azy; Izaho no mahalala, ka ho vavolombelona Aho, hoy Jehovah. '
  '24':
  - type: text
    content: 'Ary Semaia Nehelamita dia hilazanao hoe: '
  '25':
  - type: text
    content: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Noho ny nampitondranao taratasy tamin''ny anaranao ho amin''ny vahoaka rehetra izay any Jerosalema sy amin''i Zefania mpisorona, zanak''i Mahaseia, ary amin''ny mpisorona rehetra hafa koa nanao hoe: '
  '26':
  - type: text
    content: 'Jehovah efa nanao anao ho mpisorona ho solon''i Joiada mpisorona, mba hanendry izay ho mpiandraikitra ny tranon''i Jehovah, hisakana izay rehetra very saina sy manao azy ho mpaminany, ka dia hasianao boloky hazo ny vozony sy ny tongony; '
  '27':
  - type: text
    content: 'koa nahoana ianao no tsy nananatra mafy an''i Jeremia avy any Anatota, izay manao azy ho mpaminany aminareo? '
  '28':
  - type: text
    content: 'Fa naniraka ho aminay any Babylona izy nanao hoe: Mbola haharitra ela izao, koa manaova trano ianareo, dia mitoera aminy, ary manaova tanimboly, ka hano ny vokatra aminy. '
  '29':
  - type: text
    content: 'Ary Zefania mpisorona namaky izany taratasy izany teo anatrehan''i Jeremia mpaminany. '
  '3':
  - type: text
    content: 'dia ilay teny nampitondrainy an''i Elasa, zanak''i Safana, sy Gemaria, zanak''i Hilkia, izay nirahin''i Zedekia, mpanjakan''ny Joda, ho any Babylona, ho any amin''i Nebokadnezara, mpanjakan''i Babylona, nanao hoe: '
  '30':
  - type: text
    content: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah hoe: '
  '31':
  - type: text
    content: 'Maniraha ho any amin''ny babo rehetra, ka lazao aminy hoe: Izao no lazain''i Jehovah ny amin''i Semaia Nehelamita: Noho ny naminanian''i Semaia taminareo, kanefa tsy nirahiko izy tsinona, fa nampitoky anareo tamin''ny lainga '
  '32':
  - type: text
    content: 'dia izao no lazain''i Jehovah: Indro, efa hamaly an''i Semaia Nehelamita sy ny taranany Aho: tsy hanana zanakalahy honina amin''ity firenena ity izy sady tsy hanam-pifaliana amin''ny hahitana ny soa izay hataoko amin''ny oloko, hoy Jehovah, satria fiodinana tamin''i Jehovah no notoriny.'
  '4':
  - type: text
    content: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, amin''ny babo rehetra izay natolotro ho babo avy tany Jerosalema ho any Babylona: '
  '5':
  - type: text
    content: 'Manaova trano ianareo, ka mitoera aminy; ary manaova tanimboly, ka hano ny vokatra avy aminy. '
  '6':
  - type: text
    content: 'Manambadia, ka miteraha zazalahy sy zazavavy; analao vady ny zanakalahinareo, ary ampanambadio ny zanakavavinareo, mba hiterahany zazalahy sy zazavavy, ka hihamaro anie ianareo, fa tsy hihavitsy. '
  '7':
  - type: text
    content: Ary katsaho izay hiadanan'ny tanàna izay nampandehanako anareo ho babo, ary mivavaha amin'i Jehovah ho azy; fa raha miadana izy, dia mba hiadana koa ianareo.
  '8':
  - type: text
    content: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Aza mety hofitahin''ny mpaminaninareo sy ny mpanao fankatovanareo, izay ao aminareo, ary aza mino ny nofinareo izay nofisinareo'
  - type: note
    content: 'Na: izay nampanonofisinareo'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Fa lainga no vinaniny aminareo amin''ny anarako; tsy naniraka azy Aho, hoy Jehovah. '
