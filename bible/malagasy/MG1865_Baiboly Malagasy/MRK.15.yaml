document_id: MRK.15,96
type_code: plt
verses:
  '1':
  - type: text
    content: Ary niaraka tamin'izay raha vao maraina ny andro, ny lohan'ny mpisorona sy ny loholona sy ny mpanora-dalàna mbamin
  - type: note
    content: 'Na: dia'
  - type: text
    content: '''ny Synedriona rehetra dia niara-nisaina ary namatotra an''i Jesosy ka nitondra Azy, dia nanolotra Azy teo amin''i Pilato. '
  '10':
  - type: text
    content: 'Fa fantany fa fialonana no nanoloran''ny lohan''ny mpisorona Azy. '
  '11':
  - type: text
    content: 'Fa ny lohan''ny mpisorona nanome fo ny vahoaka, fa aleo Barabasy no halefan''i Pilato ho azy. '
  '12':
  - type: text
    content: 'Ary Pilato namaly ka nanao taminy indray hoe: Ka inona ary no hataoko amin''ilay ataonareo hoe: Mpanjakan''ny Jiosy? '
  '13':
  - type: text
    content: 'Ary ny vahoaka niantso indray hoe: Homboy amin''ny hazo fijaliana Izy! '
  '14':
  - type: text
    content: 'Ary hoy Pilato taminy: Fa inona moa no ratsy nataony? Nefa vao mainka niantsoantso izy ka nanao hoe: Homboy amin''ny hazo fijaliana Izy! '
  '15':
  - type: text
    content: Ary Pilato ta-hahazo sitraka tamin'ny vahoaka, ka dia nandefa an'i Barabasy ho azy; fa Jesosy nasainy nokapohina
  - type: note
    content: Izahao Mat. 27.36
  - type: text
    content: ', dia natolony azy mba hohomboana amin''ny hazo fijaliana. '
  '16':
  - type: text
    content: 'Ary ny miaramila nitondra an''i Jesosy ho eo an-kianja, dia ao anati-rova, sady nanangona ny miaramila namany rehetra. '
  '17':
  - type: text
    content: 'Ary dia nampitafy Azy lamba volomparasy izy, sady nandrandrana satroka tsilo, ka nasatrony ny lohany. '
  '18':
  - type: text
    content: 'Ary dia niarahaba Azy hoe izy: Arahaba, ry Mpanjakan''ny Jiosy! '
  '19':
  - type: text
    content: 'Ary dia nikapoka ny lohany tamin''ny volotara izy sady nandrora Azy, dia nandohalika sy niankohoka teo anatrehany. '
  '2':
  - type: text
    content: 'Ary Pilato nanontany Azy hoe: Hianao va no Mpanjakan''ny Jiosy? Ary Izy namaly ka nanao taminy hoe: Voalazanao. '
  '20':
  - type: text
    content: 'Ary rehefa nanao Azy ho fihomehezana izy, dia nanala ilay lamba volomparasy teny aminy, ka nampitafiny Azy indray ny fitafiany; ary dia nentiny hohomboany amin''ny hazo fijaliana Izy. '
  '21':
  - type: text
    content: Ary Simona Kyreniana (rain'i Aleksandro sy Rofosy) izay nandalo avy tany an-tsaha, no notereny hitondra ny hazo fijalian'i Jesosy.
  '22':
  - type: text
    content: 'Ary Jesosy dia nentiny teo amin''ny tany Golgota, izany hoe, raha adika, Fitoeran-karan-doha. '
  '23':
  - type: text
    content: 'Dia notolorany divay miharo miora Izy; nefa tsy nety nisotro Izy. '
  '24':
  - type: text
    content: 'Ary rehefa voahombony tamin''ny hazo fijaliana Izy, dia nanaovany loka no fizara ny fitafiany, hahitany izay ho azony avy. '
  '25':
  - type: text
    content: 'Ary tamin''ny ora fahatelo no nanomboany tamin''ny hazo fijaliana. '
  '26':
  - type: text
    content: 'Ary ny soratra milaza ny nanamelohana Azy dia voasoratra teo amboniny hoe: MPANJAKAN''NY JIOSY. '
  '27':
  - type: text
    content: Ary nisy jiolahy roa nohomboany tamin'ny hazo fijaliana koa, ny anankiray teo amin'ny ankavanany, ary ny anankiray teo amin'ny ankaviany
  - type: note
    content: 'Ampio hoe: (28) Dia tanteraka ny Soratra Masina izay manao hoe: Ary natao ho isan''ny mpanota Izy (Isa. 53. 12)'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Ary izay nandalo niteny ratsy Azy sady nihifikifi-doha ka nanao hoe: Hià! ry Ilay maharava ny tempoly sy mahatsangana azy amin''ny hateloana, '
  '3':
  - type: text
    content: 'Ary ny lohan''ny mpisorona niampanga Azy zavatra maro. '
  '30':
  - type: text
    content: 'vonjeo ny tenanao, ka midìna hiala amin''ny hazo fijaliana. '
  '31':
  - type: text
    content: 'Ary toy izany koa no faneson''ny lohan''ny mpisorona, fa niresaka izy sy ny mpanora-dalàna nanao hoe: Namonjy ny sasany Izy, fa ny tenany tsy hainy vonjena. '
  '32':
  - type: text
    content: 'Aoka Kristy, Mpanjakan''ny Isiraely, hidina hiala amin''ny hazo fijaliana ankehitriny mba ho hitantsika ka hinoantsika. Ary ireo niaraka nohomboana taminy tamin''ny hazo fijaliana dia naneso Azy koa. '
  '33':
  - type: text
    content: 'Ary nony tamin''ny ora fahenina, dia tonga maizina ny tany rehetra, ka naharitra hatramin''ny ora fahasivy izany. '
  '34':
  - type: text
    content: 'Ary tamin''ny ora fahasivy Jesosy dia niantso tamin''ny feo mahery ka nanao hoe: Eloy, Eloy, lamà sabaktany! izay hoe, raha adika: Andriamanitro ô, Andriamanitro ô, nahoana no mahafoy Ahy Hianao? (Sal. 22. 2). '
  '35':
  - type: text
    content: 'Ary ny sasany izay nijanona teo, raha nandre izany, dia nanao hoe: Indro, miantso an''i Elia Izy. '
  '36':
  - type: text
    content: 'Ary ny anankiray nihazakazaka, dia nanatsoboka sipaonjy tamin''ny vinaingitra, ka notohiziny tamin''ny volotara, dia natohony hotsentsefin''i Jesosy, fa hoy izy: Aoka ho hizahantsika, na ho avy hampidina Azy Elia, na tsia. '
  '37':
  - type: text
    content: 'Ary Jesosy niantso tamin''ny feo mahery, dia afaka ny ainy. '
  '38':
  - type: text
    content: 'Ary ny efitra lamba tao amin''ny tempoly dia triatra nizara roa hatrany ambony ka hatrany ambany. '
  '39':
  - type: text
    content: Ary ny kapiteny izay nijanona tandrifiny, raha nahita fa afaka toy izany ny ainy
  - type: note
    content: 'Na: nahita Azy niantso toy izany, sady afaka ny ainy'
  - type: text
    content: ', dia nanao hoe: Marina tokoa fa Zanak''Andriamanitra io Lehilahy io. '
  '4':
  - type: text
    content: 'Ary Pilato dia nanontany Azy indray hoe: Tsy mety mamaly akory va Hianao? He! izao hamaroan''ny zavatra iampangany Anao izao! '
  '40':
  - type: text
    content: 'Ary nisy vehivavy koa nitsinjo teny lavidavitra eny, ary isan''ireny Maria Magdalena sy Salome ary Maria, renin''i Jakoba kely sy Josesy, '
  '41':
  - type: text
    content: 'izay nanaraka Azy ka nanompo Azy, fony Izy tany Galilia, mbamin''ny vehivavy maro koa izay niaraka taminy niakatra tany Jerosalema. '
  '42':
  - type: text
    content: 'Ary nony hariva (satria andro fiomanana ny andro, dia ny andro alohan''ny Sabata), '
  '43':
  - type: text
    content: 'dia avy Josefa avy any Arimatia, lehilahy manan-kaja, izay isan''ny Synedriona sady niandry ny fanjakan''Andriamanitra koa; ary sahy niditra tao amin''i Pilato izy ka nangataka ny fatin''i Jesosy. '
  '44':
  - type: text
    content: 'Ary gaga Pilato raha maty sahady Jesosy, ka dia niantso ny kapiteny hankao aminy izy ka nanontaniany azy na efa maty ela Izy, na tsia. '
  '45':
  - type: text
    content: 'Ary rehefa nahare tamin''ny kapiteny izy, dia nomeny an''i Josefa ny faty. '
  '46':
  - type: text
    content: 'Ary izy nividy hariry madinika, dia nampidininy ny fatin''i Jesosy ka nofonosiny hariry madinika, ary naleviny tao amin''ny fasana, izay nolavahana tamin''ny vatolampy, dia nanakodia vato ho eo amin''ny varavaran''ny fasana izy. '
  '47':
  - type: text
    content: Ary Maria Magdalena sy Maria, renin'i Josesy, dia nijery izay nametrahany Azy.
  '5':
  - type: text
    content: 'Fa Jesosy tsy namaly intsony, na dia indraim-bava akory aza, ka dia gaga Pilato. '
  '6':
  - type: text
    content: 'Ary isaky ny avy ny andro firavoravoana dia fanaony ny mandefa mpifatotra iray izay angatahin''ny vahoaka. '
  '7':
  - type: text
    content: 'Ary nisy anankiray ilay atao hoe Barabasy, nifatotra tao mbamin''ny mpikomy sasany, izay efa nahafaty olona tamin''ny fikomiana. '
  '8':
  - type: text
    content: 'Ary ny vahoaka niakatra ka nangataka azy hanao araka izay fanaony aminy. '
  '9':
  - type: text
    content: 'Fa Pilato namaly azy ka nanao hoe: Tianareo va mba ny Mpanjakan''ny Jiosy no halefako ho anareo? '
