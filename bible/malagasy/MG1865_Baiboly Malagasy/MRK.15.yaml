document_id: MRK.15
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary niaraka tamin'izay raha vao maraina ny andro, ny lohan'ny mpisorona sy ny loholona sy ny mpanora-dalàna mbamin
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: dia'
    marker-yv: yv-n
  - type: text
    text: '''ny Synedriona rehetra dia niara-nisaina ary namatotra an''i Jesosy ka nitondra Azy, dia nanolotra Azy teo amin''i Pilato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Pilato nanontany Azy hoe: Hianao va no Mpanjakan''ny Jiosy? Ary Izy namaly ka nanao taminy hoe: Voalazanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny lohan''ny mpisorona niampanga Azy zavatra maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Pilato dia nanontany Azy indray hoe: Tsy mety mamaly akory va Hianao? He! izao hamaroan''ny zavatra iampangany Anao izao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Jesosy tsy namaly intsony, na dia indraim-bava akory aza, ka dia gaga Pilato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary isaky ny avy ny andro firavoravoana dia fanaony ny mandefa mpifatotra iray izay angatahin''ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy anankiray ilay atao hoe Barabasy, nifatotra tao mbamin''ny mpikomy sasany, izay efa nahafaty olona tamin''ny fikomiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny vahoaka niakatra ka nangataka azy hanao araka izay fanaony aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa Pilato namaly azy ka nanao hoe: Tianareo va mba ny Mpanjakan''ny Jiosy no halefako ho anareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa fantany fa fialonana no nanoloran''ny lohan''ny mpisorona Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny lohan''ny mpisorona nanome fo ny vahoaka, fa aleo Barabasy no halefan''i Pilato ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Pilato namaly ka nanao taminy indray hoe: Ka inona ary no hataoko amin''ilay ataonareo hoe: Mpanjakan''ny Jiosy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny vahoaka niantso indray hoe: Homboy amin''ny hazo fijaliana Izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Pilato taminy: Fa inona moa no ratsy nataony? Nefa vao mainka niantsoantso izy ka nanao hoe: Homboy amin''ny hazo fijaliana Izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary Pilato ta-hahazo sitraka tamin'ny vahoaka, ka dia nandefa an'i Barabasy ho azy; fa Jesosy nasainy nokapohina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao Mat. 27.36
    marker-yv: yv-n
  - type: text
    text: ', dia natolony azy mba hohomboana amin''ny hazo fijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny miaramila nitondra an''i Jesosy ho eo an-kianja, dia ao anati-rova, sady nanangona ny miaramila namany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary dia nampitafy Azy lamba volomparasy izy, sady nandrandrana satroka tsilo, ka nasatrony ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary dia niarahaba Azy hoe izy: Arahaba, ry Mpanjakan''ny Jiosy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary dia nikapoka ny lohany tamin''ny volotara izy sady nandrora Azy, dia nandohalika sy niankohoka teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa nanao Azy ho fihomehezana izy, dia nanala ilay lamba volomparasy teny aminy, ka nampitafiny Azy indray ny fitafiany; ary dia nentiny hohomboany amin''ny hazo fijaliana Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Simona Kyreniana (rain'i Aleksandro sy Rofosy) izay nandalo avy tany an-tsaha, no notereny hitondra ny hazo fijalian'i Jesosy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Jesosy dia nentiny teo amin''ny tany Golgota, izany hoe, raha adika, Fitoeran-karan-doha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia notolorany divay miharo miora Izy; nefa tsy nety nisotro Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa voahombony tamin''ny hazo fijaliana Izy, dia nanaovany loka no fizara ny fitafiany, hahitany izay ho azony avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary tamin''ny ora fahatelo no nanomboany tamin''ny hazo fijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny soratra milaza ny nanamelohana Azy dia voasoratra teo amboniny hoe: MPANJAKAN''NY JIOSY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nisy jiolahy roa nohomboany tamin'ny hazo fijaliana koa, ny anankiray teo amin'ny ankavanany, ary ny anankiray teo amin'ny ankaviany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: (28) Dia tanteraka ny Soratra Masina izay manao hoe: Ary natao ho isan''ny mpanota Izy (Isa. 53. 12)'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary izay nandalo niteny ratsy Azy sady nihifikifi-doha ka nanao hoe: Hià! ry Ilay maharava ny tempoly sy mahatsangana azy amin''ny hateloana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'vonjeo ny tenanao, ka midìna hiala amin''ny hazo fijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary toy izany koa no faneson''ny lohan''ny mpisorona, fa niresaka izy sy ny mpanora-dalàna nanao hoe: Namonjy ny sasany Izy, fa ny tenany tsy hainy vonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aoka Kristy, Mpanjakan''ny Isiraely, hidina hiala amin''ny hazo fijaliana ankehitriny mba ho hitantsika ka hinoantsika. Ary ireo niaraka nohomboana taminy tamin''ny hazo fijaliana dia naneso Azy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nony tamin''ny ora fahenina, dia tonga maizina ny tany rehetra, ka naharitra hatramin''ny ora fahasivy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary tamin''ny ora fahasivy Jesosy dia niantso tamin''ny feo mahery ka nanao hoe: Eloy, Eloy, lamà sabaktany! izay hoe, raha adika: Andriamanitro ô, Andriamanitro ô, nahoana no mahafoy Ahy Hianao? (Sal. 22. 2). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny sasany izay nijanona teo, raha nandre izany, dia nanao hoe: Indro, miantso an''i Elia Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny anankiray nihazakazaka, dia nanatsoboka sipaonjy tamin''ny vinaingitra, ka notohiziny tamin''ny volotara, dia natohony hotsentsefin''i Jesosy, fa hoy izy: Aoka ho hizahantsika, na ho avy hampidina Azy Elia, na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary Jesosy niantso tamin''ny feo mahery, dia afaka ny ainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny efitra lamba tao amin''ny tempoly dia triatra nizara roa hatrany ambony ka hatrany ambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ary ny kapiteny izay nijanona tandrifiny, raha nahita fa afaka toy izany ny ainy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nahita Azy niantso toy izany, sady afaka ny ainy'
    marker-yv: yv-n
  - type: text
    text: ', dia nanao hoe: Marina tokoa fa Zanak''Andriamanitra io Lehilahy io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nisy vehivavy koa nitsinjo teny lavidavitra eny, ary isan''ireny Maria Magdalena sy Salome ary Maria, renin''i Jakoba kely sy Josesy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'izay nanaraka Azy ka nanompo Azy, fony Izy tany Galilia, mbamin''ny vehivavy maro koa izay niaraka taminy niakatra tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary nony hariva (satria andro fiomanana ny andro, dia ny andro alohan''ny Sabata), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'dia avy Josefa avy any Arimatia, lehilahy manan-kaja, izay isan''ny Synedriona sady niandry ny fanjakan''Andriamanitra koa; ary sahy niditra tao amin''i Pilato izy ka nangataka ny fatin''i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary gaga Pilato raha maty sahady Jesosy, ka dia niantso ny kapiteny hankao aminy izy ka nanontaniany azy na efa maty ela Izy, na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary rehefa nahare tamin''ny kapiteny izy, dia nomeny an''i Josefa ny faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary izy nividy hariry madinika, dia nampidininy ny fatin''i Jesosy ka nofonosiny hariry madinika, ary naleviny tao amin''ny fasana, izay nolavahana tamin''ny vatolampy, dia nanakodia vato ho eo amin''ny varavaran''ny fasana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ary Maria Magdalena sy Maria, renin'i Josesy, dia nijery izay nametrahany Azy.
