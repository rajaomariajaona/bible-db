document_id: RUT.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampakaran'i Boaza an'i Rota, sy ny nahaterahan'i Obeda, ary ny filazam-pirazanana hatramin'i Fareza ka hatramin'i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tafakatra teo am-bavahady Boaza ka nipetraka teo, dia, indro, nandalo ilay havana mahavotra voalazany, dia hoy Boaza: Ranona iry ô! maitia kely ange; mipetraha eto. Dia nanatona izy ka nipetraka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Rota koa, vehivavy Moabita, vadin''i Malona, dia lasako ho vadiko hamelo-maso ny anaran''ny maty ao amin''ny lovany, mba tsy ho faty maso ny anaran''ny maty eo amin''ny rahalahiny sy eo amin''ny vavahadin''ny fonenany; ianareo no vavolombelona androany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny vahoaka rehetra izay teo amin''ny vavahady sy ny loholona: Eny, vavolombelona izahay; hataon''i Jehovah tahaka an''i Rahely sy tahaka an''i Lea anie izay vehivavy efa ho tonga ao an-tranonao; fa izy roa vavy no nanangana ny tranon''ny Isiraely; ary aoka ho lehibe any Efrata anie ianao, ary halaza any Betlehema anie ny anaranao; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ho tahaka ny taranak''i Fareza, izay naterak''i Tamara tamin''i Joda, anie ny taranakao avy amin''ny zanaka izay homen''i Jehovah anao amin''ity vehivavy ity. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Boaza dia nampakatra an''i Rota ka nanambady azy; ary Jehovah nampanan''anaka azy, ka niteraka zazalahy izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireo vehivavy tamin''i Naomy: Isaorana anie Jehovah, Izay tsy namela anao androany tsy hanan-kavana mahavotra, ary aoka halaza ny anarany eo amin''ny Isiraely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hamelona ny ainao sy hitaiza anao izy, rehefa antitra ianao; fa niteraka azy ny vinantonaovavy, izay tia anao, ilay tsara lavitra aminao mihoatra noho ny zanaka fito lahy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandray ny zaza Naomy ka nitrotro azy, dia tonga mpitaiza azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vehivavy namany nifidy ny anarany ka nanao hoe: Misy zazalahy teraka ho an''i Naomy; ary ny anarany nataony hoe Obeda; izy no rain''i Jese, rain''i Davida. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no taranak''i Fareza: Fareza niteraka an''i Hezrona; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Hezrona niteraka an''i Rama; ary Rama niteraka an''i Aminadaba; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naka folo lahy tamin''ny loholona tao an-tanàna Boaza ka nanao hoe: Mipetraha eto ianareo. Dia nipetraka ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Aminadaba niteraka an''i Nasona; ary Nasona niteraka an''i Salmona; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Salmona niteraka an''i Boaza; ary Boaza niteraka an''i Obeda; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary Obeda niteraka an'i Jese; ary Jese niteraka an'i Davida.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin''Ilay havana akaiky izy ka nanao hoe: Naomy, izay niverina avy tany amin''ny tany Moaba, dia mivarotra ny tany izay an''i Elimeleka rahalahintsika. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho nikasa hampandre anao hoe: Vidio eto anatrehan''izay mipetraka eto sy eto anatrehan''ny loholona amin''ny fireneko izany. Raha hanavotra ianao, dia avoty; fa raha tàhiny tsy hanavotra ianao, dia lazao amiko mba ho fantatro; fa tsy misy tokony hanavotra afa-tsy ianao, ary izaho no manarakaraka anao. Ary hoy izy: Hanavotra ihany aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Boaza: Amin''izay andro ividiananao ny tany amin''ny tànan''i Naomy, dia amin''i Rota koa, vehivavy Moabita, vadin''ny maty, no hividiananao azy, mba hamelo-maso ny anaran''ny maty ao amin''ny lovany ianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ilay havana mahavotra: Tsia, tsy mahazo manavotra ho an''ny tenako aho, fandrao mahasimba ny lovako; avoty ihany ho anao ny ahy, fa tsy mahavotra aho.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny amin''ny fanavotana sy ny fanakalozana teo amin''ny Isiraely fahiny hahamafy ny teny rehetra dia izao: nesorin''ny lehilahy ny kirarony ka nomeny ho an''ny namany; dia vavolombelona teo amin''ny Isiraely izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ilay havana mahavotra tamin''i Boaza: Vidio ho anao izany. Dia nanaisotra ny kirarony izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Boaza tamin''ny loholona sy ny vahoaka rehetra: Hianareo no vavolombelona androany fa efa novidiko tamin''ny tànan''i Naomy izay rehetra an''i Elimeleka sy izay rehetra an''i Kiliona sy Malona. '
