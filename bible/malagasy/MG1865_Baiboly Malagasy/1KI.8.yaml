document_id: 1KI.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitokanana ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany Solomona mpanjaka dia namory ny loholon''ny Isiraely sy ny lohan''ny firenena rehetra, dia ny lohan''ny fianakaviana tamin''ny Zanak''Isiraely, ho ao aminy tany Jerosalema mba hampakatra ny fiaran''ny faneken''i Jehovah avy ao Ziona. Tanànan''i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nivory ho any amin''i Solomona mpanjaka ny lehilahy rehetra amin''ny Isiraely tamin''ny andro firavoravoana tamin''ny volana Etanima (volana fahafito izany). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tonga ny loholon''ny Isiraely rehetra, ary ny mpisorona no nitondra ny fiara; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary dia nampakariny ny fiaran''i Jehovah sy ny trano-lay fihaonana mbamin''ny fanaka masina rehetra izay tao amin''ny lay. Nampakarin''ny mpisorona sy ny Levita ireo zavatra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Solomona mpanjaka sy ny fiangonana, dia ny Isiraely rehetra, izay nivory teo aminy teo anoloan''ny fiara, dia samy namono zavatra hatao fanatitra, dia ondry aman''osy sy omby izay tsy tambo isaina sady tsy hita isa noho ny hamaroany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny fiaran''ny faneken''i Jehovah dia nampidirin''ny mpisorona ho ao amin''ny fitoerany tao anatin''ny efi-trano anatiny, dia ny fitoerana masina indrindra, teo ambanin''ny elatry ny kerobima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa nivelatra teo ambonin''ny fitoeran''ny fiara ny elatry ny kerobima ka nanaloka ny fiara sy ny baony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary lava ny bao, ka hita ny lohany, raha amin''ny fitoerana masina eo anoloan''ny efitra anatiny, nefa tsy hita raha eny ivelany; ary mbola ao mandraka androany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary tsy nisy na inona na inona tao anatin''ny fiara afa-tsy ny vato fisaka roa, izay nataon''i Mosesy tao anatiny tany Horeba, fony Jehovah nanao fanekena tamin''ny Zanak''Isiraely tamin''ny nivoahany avy tany amin''ny tany Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nony nivoaka avy tao amin''ny fitoerana masina ny mpisorona, dia nameno ny tranon''i Jehovah ny rahona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka dia tsy nahajanona hanao fanompoam-pivavahana ny mpisorona noho ny rahona, satria ny voninahitr''i Jehovah nameno ny tranon''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Solomona: Jehovah efa nilaza fa hitoetra ao amin''ny aizim-pito Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Efa nanao trano hitoeranao tokoa aho, dia fitoerana hitoeranao mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny mpanjaka nitodika ka nitso-drano ny fiangonana, dia ny Isiraely rehetra (nitsangana avokoa ny fiangonana, dia ny Isiraely rehetra), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka nanao hoe: Isaorana anie Jehovah, Andriamanitry ny Isiraely, fa ny vavany efa niteny tamin''i Davida raiko, ary ny tànany no nahatanteraka izany taminy, dia ilay hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hatramin''ny andro nitondrako ny Isiraely oloko nivoaka avy tany Egypta dia tsy mbola nisy tanàna nofidiko tamin''ny firenen''Isiraely rehetra hanaovana trano hitoeran''ny anarako; fa nifidy an''i Davida Aho hanapaka ny Isiraely oloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary efa mby tao am-pon''i Davida raiko ny hanao trano ho an''ny anaran''i Jehovah, Andriamanitry ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa hoy Jehovah tamin''i Davida raiko: Satria tao am-ponao ny fikasana hanao trano ho an''ny anarako, dia tsara izany fikasanao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa kosa tsy ianao no hanao ny trano, fa ny zanakao izay haterakao, izy no hanao ny trano ho an''ny anarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Jehovah efa nahatanteraka ny teniny izay nolazainy, koa nitsangana handimby an''i Davida raiko aho ary mipetraka eo amin''ny seza fiandrianan''ny Isiraely tahaka ny efa nolazain''i Jehovah, sady efa nanao ny trano ho an''ny anaran''i Jehovah, Andriamanitry ny Isiraely, aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nasiako fitoerana teo ho an'ny fiara izay itoeran'ny faneken'i Jehovah, ilay nataony tamin'ny razantsika fony Izy nitondra azy nivoaka avy tany Egypta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Solomona nitsangana teo anoloan ny alitaran''i Jehovah teo anatrehan''ny fiangonana, dia ny Isiraely rehetra, ka namelatra ny tànany nanandrify ny lanitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary nanao hoe. Ry Jehovah, Andriamanitry ny Isiraely ô. tsy misy Andriamanitra tahaka Anao na amin''ny lanitra ambony na amin''ny tany ambany, Izay mitandrina ny fanekenao sy ny famindram-ponao ho an''ny mpanomponao izay mandeha eo anatrehanao amin''ny fony rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'sady efa nahatanteraka tamin''i Davida raiko mpanomponao ilay nolazainao taminy, fa nolazain''ny vavanao izany dia notanterahin''ny tananao tahaka ny amin''izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa tanteraho amin''i Davida raiko mpanomponao, Jehovah, Andriamanitry ny Isiraely ô. ilay nolazainao taminy hoe: Tsy ho diso zanakalahy eo anatrehako ianao hipetraka amin''ny seza fiandrianan''ny Isiraely, raha ny zanakao mitandrina ny alehany handehanany eo anatrehako tahaka ny nandehananao teo anatrehako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa ankehitriny ry Andriamanitry ny Isiraely ô, mifona aminao aho, aoka ho tò anie ny teninao, izay nolazainao tamin''i Davida raiko mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Andriamanitra va dia honina etỳ an-tany tokoa? He! ny lanitra, ary ny lanitry ny lanitra aza tsy omby Anao, koa mainka fa ity trano nataoko ity! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa atreho ny fivavaka sy ny fifonan''ny mpanomponao, Jehovah Andriamanitro ô, mba hohenoinao ny fitarainana sy ny fivavaka izay ataon''ny mpanomponao eto anatrehanao anio, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'mba hihiratan''ny masonao andro aman''alina amin''ity trano ity, dia amin''ny fitoerana nolazainao hoe: Ho ao ny anarako hihainoanao ny vavaka izay ataon''ny mpanomponao manatrika ity fitoerana ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary henoy ny fifonan''ny mpanomponao sy ny Isiraely olonao, raha mivavaka manatrika ity fitoerana ity izy; dia mihainoa any an-danitra fonenanao Hianao; eny, mihainoa ka mamelà heloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha misy olona manota amin''ny namany, ary ampianianiny, ka tonga hianiana eo anoloan''ny alitaranao amin''ity trano ity izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: dia mihainoa any an-danitra Hianao, ka manaova, ary mitsarà ny mpanomponao, hanameloka ny ratsy fanahy ka hampitsingerina ny nataony ho amin'ny lohany, ary hanamarina ny marina kosa ka hanome azy araka ny fahamarinany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Raha resy eo anoloan''ny fahavalo ny Isiraely olonao noho ny nanotany taminao, ary miverina aminao sy manaiky ny anaranao indray ka mivavaka sy mifona aminao eto amin''ity trano ity izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: dia mihainoa any an-danitra Hianao, ka mamelà ny fahotan'ny Isiraely olonao, ary ampodio amin'ny tany nomenao ny razany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Raha mihantona ny andro ka tsy misy ranonorana noho ny nanotan''ny olona taminao, ka mivavaka manatrika ity fitoerana ity izy ka manaiky ny anaranao sady miala amin''ny fahotany, satria ampahorinao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'dia mihainoa any an-danitra Hianao, ka mamelà ny fahotan''ny mpanomponao, dia ny Isiraely olonao satria atoronao azy ny lalana tsara izay tokony halehany, ary mandatsaha ranonorana amin''ny taninao, izay nomenao ho lovan''ny olonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Raha misy mosary amin''ny tany, na areti-mandringana, na mainan''ny rivotra ny vary, na maty fotsy, na misy valala sy sompanga, na misy fahavalo manao fahirano azy ao amin''ny taniny, dia ao amin''ny tanànany, na inona fahoriana, na inona aretina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'izay vavaka rehetra sy fifonana rehetra ataon''olona, na ny Isiraely olonao rehetra, izay samy mahalala ny fahorian''ny fony avy, ka mamelatra ny tànany manatrika ity trano ity izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'dia mihainoa any an-danitra fonenanao Hianao, ka mamelà heloka, ary manaova, ka omeo ny olonao araka ny alehany rehetra, fa fantatrao ny fony (fa Hianao dia Hianao irery ihany no mahalala ny fon''ny zanak''olombelona rehetra), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'mba hatahorany Anao amin''Izay andro rehetra hiainany etỳ amin''ny tany nomenao ny razanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary henoy koa ny vahiny izay tsy isan''ny Isiraely olonao, fa tonga avy any amin''ny tany lavitra noho ny amin''ny anaranao izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: '(fa ho reny ny anaranao lehibe sy ny tananao mahery ary ny sandrinao ahinjitra), koa raha avy izy ka mivavaka manatrika ity trano ity, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'dia mihainoa any an-danitra fonenanao Hianao, ka manaova araka izay rehetra iantsoan''ny vahiny Anao, mba ho fantatry ny firenena rehetra ambonin''ny tany ny anaranao hatahorany Anao tahaka ny ataon''ny Isiraely olonao ihany, ary mba ho fantany fa ny anaranao no efa nantsoina tamin''ity trano nataoko ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Raha mivoaka hiady amin''ny fahavalon''ny olonao, na ho aiza na ho aiza no hanirahanao azy, ka mivavaka amin''i Jehovah manandrify ny tanàna izay nofidinao sy ny trano izay nataoko ho an''ny anaranao izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: dia henoy any an-danitra ny fivavany sy ny fifonany, ka omeo rariny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Raha manota aminao izy (fa tsy misy olombelona tsy manota), ka tezitra aminy Hianao ary manolotra azy eo anoloan''ny fahavalony, ka dia ho entin''ny mpamabo ho babo any amin''ny tanin''ny fahavalo izy, na ho lavitra na ho akaiky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'ary mahatsiaro any amin''ny tanin''ireo namabo azy ireo izy, ka mibebaka sy mifona aminao any amin''ny tany izay nitondrany azy ho babo ary manao hoe: Efa nanota izahay sady efa nanao meloka sy efa nanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ka dia miverina aminao amin''ny fony rehetra sy ny fanahiny rehetra ao amin''ny tanin''ny fahavalony izay namabo azy izy, ary mivavaka aminao manandrify ny taniny izay nomenao ny razany sy ny tanàna izay nofidinao ary ny trano izay nataoko ho an''ny anaranao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'dia henoy any an-danitra fonenanao ny fivavany sy ny fifonany, ka omeo rariny izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'eny, mamelà ny heloky ny olonao izay nanota taminao sy ny fahadisoany rehetra izay nataony taminao, ary ataovy mahazo famindram-po amin''izay mamabo azy izy, dia ny hamindran''ireo fo aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'fa olonao sy lovanao izy, izay nentinao nivoaka avy tany Egypta, dia avy tao amin''ny memy fandrendreham-by, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'mba hihiratan''ny masonao amin''ny fifonan''ny mpanomponao sy ny fifonan''ny Isiraely olonao hihaino azy amin''izay rehetra iantsoany Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Fa Hianao, Jehovah, Tompo ô no nanavaka azy tamin''ny firenena rehetra ambonin''ny tany ho lovanao, araka izay nampilazainao an''i Mosesy mpanomponao tamin''ny nitondranao ny razanay nivoaka avy tany Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary rehefa vita izany vavaka sy fifonana vehetra nataon''i Solomona tamin''i Jehovah: any, dia nitsangana niala teo amin''ny alitaran''i Jehovah izay efa nandohalehan''ny lohaliny sy efa namelarany ny tànany ho amin''ny lanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary nitsangana izy ka nitso-drano ny fiangonana, dia ny Isiraely rehetra, tamin''ny feo mahery hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Isaorana anie Jehovah, izay nanome fitsaharana ho an''ny Isiraely olony araka izay rehetra nolazainy; tsy misy latsaka na dia teny iray aza tamin''izay teny soa rehetra nampilazainy an''i Mosesy mpanompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Jehovah Andriamanitsika anie no amintsika, tahaka ny tamin''ny razantsika; aoka tsy handao na hahafoy antsika Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'mba hampanatoniny Azy ny fontsika handehanantsika amin''ny lalany rehetra sy hitandremantsika ny lalàny sy ny didiny ary ny fitsipiny izay nandidiany ny razantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary aoka izany teny nifonako teto anatrehan''i Jehovah izany ho ao amin''i Jehovah Andriamanitsika andro aman''alina, mba hanomezany rariny ho ahy mpanompony sy ny Isiraely olony araka izay tandrifiny ho azy isan''andro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'mba ho fantatry ny firenena rehetra ambonin''ny tany fa Jehovah no Andriamanitra, fa tsy misy afa-tsy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary aoka ho marina amin''i Jehovah Andriamanitsika anie ny fonareo, handehananareo amin''ny didiny sy hitandremanareo ny lalàny, tahaka ny amin''izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ary ny mpanjaka sy ny Isiraely rehetra teo aminy dia namono zavatra hatao fanatitra eo anatrehan''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary Solomona namono zavatra hatao fanati-pihavanana, Izay nateriny ho an''i Jehovah, dia omby roa arivo amby roa alina sy ondry aman''osy roa alina amby iray hetsy. Toy izany no nitokanan''ny mpanjaka sy ny Zanak''Isiraely rehetra ny tranon''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ary androtr''io ihany no nanamasinan''ny mpanjaka ny afovoan''ny kianja izay teo anoloan''ny tranon''i Jehovah; fa teo no nanaterany fanatitra dorana sy fanatitra hohanina ary ny saboran''ny fanati-pihavanana; fa kely loatra ny alitara varahina izay teo anatrehan''i Jehovah ka tsy omby ny fanatitra dorana sy ny fanatitra hohanina ary ny saboran''ny fanati-pihavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Ary tamin''izany andro izany Solomona sy ny Isiraely rehetra teo aminy, dia fiangonana lehibe hatrany akaikin''i Hamata ka hatramin''ny lohasahan-driak''i Egypta, dia nitandrina ny andro firavoravoana teo anatrehan''i Jehovah Andriamanitsika hafitoana indroa, dia efatra ambin''ny folo andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Ary nony tamin'ny andro fahavalo dia nampodiny ny olona, ary nisaotra andriana izy, dia lasa nandeha ho any an-dainy avy, sady faly no ravoravo ny fony noho ny soa rehetra nataon'i Jehovah tamin'i Davida mpanompony sy ny Isiraely olony.
