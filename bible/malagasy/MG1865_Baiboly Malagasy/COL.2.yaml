document_id: COL.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananaran'i Paoly ny Kolosiana mba haharitra tsara tsy ho voafitaky ny mpampianatra sandoka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa tiako ho fantatrareo ny hamafin''ny fiezahako ho anareo sy izay any Laodikia mbamin''izay rehetra tsy mbola nahita ny tavako amin''ny nofo, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hampifalina ny fony amin''ny ampiraisana azy amin''ny fitiavana sy ho amin''ny haren''ny fahatokiana be avy amin''ny fahazavan-tsaina, ho amin''ny fahalalana tsara ny zava-miafina izay an''Andriamanitra, dia Kristy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izay iafenan''ny rakitry ny fahendrena sy ny fahalalana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izany no lazaiko, fandrao hisy hampahadiso hevitra anareo amin''ny teny toa marina. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa na dia tsy manatrika anareo amin''ny nofo aza aho, dia manatrika anareo ihany amin''ny fanahy ka mifaly sy mijery ny filaminanareo sy ny tsi-fiovan''ny finoanareo an''i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa tahaka ny nandraisanareo an''i Kristy Jesosy Tompo, dia mandehana ao aminy araka izany koa, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ka mamaka tsara sy miorina mafy ao aminy ary tafatoetra amin'ny finoana, toy ny efa nampianarana anareo, ka mazoto
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (mitombo amin''izany)'
    marker-yv: yv-n
  - type: text
    text: ' amin''ny fisaorana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tandremo fandrao misy mahalasa anareo ho babony amin''ny filosofia sy ny famitahana foana, araka ny fampianarana voatolotry ny razana, araka ny abidim-pianaran''izao tontolo izao, fa tsy araka an''i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ao amin''ny tenany no itoeran''ny fahafenoan''ny fomban''Andriamanitra rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary ianareo dia tanteraka ao aminy, sady Izy no Lohan''ny fanapahana sy ny fahefana rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary tao aminy koa no namorana anareo tamin''ny famorana tsy nataon-tanana, tamin''ny fanesorana ny tenan''ny nofo, dia tamin''ny famoran''i Kristy; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fa niara-nilevina taminy ianareo tamin''ny batisa, izay niarahanareo natsangana taminy koa noho ny finoana ny asan''Andriamanitra, izay nanangana Azy tamin''ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ianareo, izay efa matin''ny fahadisoana sy ny tsi-fiforan''ny nofonareo, dia novelominy niaraka tamin''i Kristy, rehefa navelany ny fahadisoantsika rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary novonoiny ny sora-tànan''ny didy izay niampanga antsika; dia nesoriny tsy ho eo mihitsy izany ka nohomboany tamin''ny hazo fijaliana, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary nesoriny tsy ho eo amin'ny tenany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: noreseny ka nobaboiny'
    marker-yv: yv-n
  - type: text
    text: ' ny fanapahana sy ny fahefana, ary noho ny hazo fijaliana dia nasehony miharihary ny fitondrany ireo toy ny fanaon''izay avy nandresy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa aza avela hisy hitsara anareo ny amin''ny fihinana, na ny fisotro, na ny andro firavoravoana, na ny voaloham-bolana, na ny Sabata; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'aloky ny zavatra ho avy ireny, fa ny tenany dia an''i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aza mety hofitahina tsy hahazoanareo ny loka noho ny fanetren-tena haitraitra sy ny fivavahana amin'ny anjely, ka mitompo amin'ny zavatra efa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (tsy)'
    marker-yv: yv-n
  - type: text
    text: ' hitany sady feno fiavonavonana noho ny fisainan''ny nofony '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka tsy mihazona ny Loha; Izy no itomboan''ny tena rehetra, izay velomina sy ampiraisina tsara amin''ny famavany sy ny hozatra, araka ny fampitomboan''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha niara-maty tamin''i Kristy ianareo ka efa afaka tamin''ny abidim-pianaran''izao tontolo izao, nahoana no toa mbola velona amin''izao tontolo izao ihany ianareo ka mety hodidiana hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza mandray, aza manandrana, aza manendry - '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'levona amin''ny fanaovana ihany izany rehetra izany - araka ny didy sy ny fampianaran''olona? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izany rehetra izany dia ankalazaina ho fahendrena amin'ny fivavahana haitraitra sy ny fanetren-tena ary ny fampahoriana ny tena, nefa tsy manan-kery akory hahasakana ny fampanaranana ny nofo.
