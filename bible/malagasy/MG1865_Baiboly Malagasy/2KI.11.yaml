document_id: 2KI.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan'i Atalia, sy ny namonoana azy, ary ny nampanjakana an'i Joasy handimby azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nony hitan''i Atalia, renin''i Ahazia, fa maty ny zanany dia nitsangana izy ka nandringana ny zanak''andriana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa Joseba. zanakavavin''i Jehorama mpanjaka ary anabavin''i Ahazia, dia naka an''i Joasy, zanak''i Ahazia, ka namonjy azy mbamin''ny mpitaiza azy avy teo amin''ny zanaky ny mpanjaka izay novonoina ho ao an-trano fitehirizam-pandriana ary nafeniny an''i Atalia izy, ka dia tsy mba voavono. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary niery enin-taona tao aminy tao an-tranon''i Jehovah izy. Ary Atalia no nanjaka tamin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary tamin'ny taona fahafito Joiada naniraka haka ny kapiteny, mpifehy ny anjolofo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Kariana
    marker-yv: yv-n
  - type: text
    text: ' sy ny mpiambina, dia nampiditra azy tao an-tranon''i Jehovah ary nampanaiky sy nampianiana azy tao an-tranon''i Jehovah, ka nasehony azy ny zanakalahin''ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary izy nandidy azy hoe: Izao no hataonareo: Ny ampahatelony izay milatsaka amin''ny Sabata dia hiambina ny tranon''ny mpanjaka; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary ny ampahatelony ho eo am-bavahady Sora; ary ny ampahatelony ho ao am-bavahady ivohon''ny mpiambina, dia hiambina ny trano ianareo ka hiaro azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny roa toko aminareo kosa, dia izay rehetra miala amin''ny andro Sabata, dia hiambina ny tranon''i Jehovah hiarovana ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hanemitra manodidina ny mpanjaka ianareo, samy mitana ny fiadiany avy; ka na iza na iza mamaky laharana dia vonoy, ary arahonareo ny mpanjaka, na mivoaka na miditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny kapiteny dia nanao araka izay rehetra nandidian''i Joiada mpisorona, ka samy nitondra ny olom-peheziny izay nilatsaka tamin''ny Sabata sy izay niala tamin''ny Sabata ary nankany amin''i Joiada mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny kapiteny nomen''ilay mpisorona ny lefona sy ampingan''i Davida mpanjaka izay tao an-tranon''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpiambina nitsangana, ka samy nitana ny fiadiany avy hanodidina ny mpanjaka hatramin''ny lafiny ankavanan''ny trano ka hatramin''ny lafiny ankavia, hatramin''ny alitara ka hatramin''ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nentin'i Joiada nivoaka ny zanakalahin'ny mpanjaka ka nosatrohany ny satro-boninahitra izy, dia notolorany ny Vavolombelona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dia ny Didy Folo
    marker-yv: yv-n
  - type: text
    text: '; ka dia nampanjakainy sy nohosorany izy, ary ny olona nitehaka ka niantso hoe: Ho ela velona anie ny mpanjaka! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nony ren''i Atalia ny tabataban''ny mpiambina sy ny vahoaka, dia mba nankao amin''ny vahoaka tao amin''ny tranon''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hitany fa, indro, ny mpanjaka nitsangana teo amin''ny fitoeran''andriana toy ny fanao, ary ny andrian-dahy sy ny mpitsoka trompetra dia teo anilan''ny mpanjaka; ary ny vahoaka rehetra nifaly sady nampaneno ny trompetra; dia nandriatra ny fitafiany Atalia ka niantso hoe: Fikomiana! fikomiana! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa Joiada mpisorona nandidy ny kapiteny, mpifehy ny miaramila, ka nanao taminy hoe: Avoahy eny ivelan''ny laharana izy, ary izay manaraka azy dia vonoy amin''ny sabatra. Fa ny mpisorona efa nandrara hoe Aza vonoina ao an-tranon''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny olona nisava teo an-daniny roa, dia nandeha tamin'ny lalana fandehanan'ny soavaly ho any an-tranon'ny mpanjaka ravehivavy; dia novonoiny tao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Joiada nampanao fanekena ny mpanjaka sy ny vahoaka tamin''i Jehovah, mba ho olon''i Jehovah izy, ary nampifanaiky ny mpanjaka sy ny vahoaka koa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny vahoaka rehetra niditra tao an-tranon''i Bala ka nandrava azy; ny alitara sy ny endri-javatra teo aminy dia notorotoroiny avokoa, ary Matana, mpisoron''i Bala, novonoiny teo anoloan''ny alitara. Ary ny mpisorona nanendry ny ho mpitandrina ny tranon''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nalainy ny kapiteny sy ny anjolofo sy ny mpiambina mbamin''ny vahoaka rehetra ary nentina nidina avy tao an-tranon''i Jehovah ny mpanjaka, ka teo am-bavahadin''ny mpiambina no nalehany hankao an-tranon''ny mpanjaka. Ary nipetraka tamin''ny seza fiandrianan''ny mpanjaka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nifaly ny vahoaka rehetra, ary nandry fahizay ny tanàna Ary Atalia novonoiny tamin'ny sabatra tao an-tranon'ny mpanjaka.
