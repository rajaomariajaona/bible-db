document_id: GEN.46,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nifindran'Isiraely sy ny ankohonany ho any amin'ny tany Egypta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary niainga Isiraely nitondra izay rehetra nananany ka nankany Beri-sheba, dia namono zavatra hatao fanatitra ho an''Andriamanitr''Isaka rainy izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny zanakalahin''i Simeona dia Jemoela sy Jamina sy Ohada sy Jakina sy Zohara ary Saoly, zanakalahin''ny vehivavy Kananita. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny zanakalahin''i Levy dia Gersona sy Kehata atỳ Merary. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny zanakalahin''i Joda dia Era sy Onana sy Sela sy Fareza ary Zera; ary Era sy Onana anefa dia maty tany amin''ny tany Kanana ihany. Ary ny zanakalahin''i Fareza dia Hezrona sy Hamola. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ny zanakalahin''Isakara dia Tola sy Pova sy Joba ary Simrona. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny zanakalahin''i Zebolona dia Sereda sy Elona ary Jahalela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: lreo no zanakalahin'i Lea izay naterany tamin'i Jakoba tany Mesopotamia, ary Dina zananivavy; ny isan'ny zananilahy rehetra mbamin'ny zananivavy dia telo amby telo-polo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny zanakalahin''i Gada dia Zifiona sy Hagy sy Sony sy Ezbona sy Erỳ sy Aroda ary Arely. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny zanak''i Asera dia Jimna sy Jisva sy Jisvy sy Beria ary Sera, anabavin''ireo; ary ny zanakalahin''i Beria dia Hebera sy Malkiela. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ireo no zanak'i Zilpa, izay nomen'i Labana an'i Lea zananivavy, ary ireo no naterany tamin'i Jakoba, dia enina ambin'ny folo izy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny zanakalahin-dRahely, vadin''i Jakoba dia Josefa sy Benjamina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Andriamanitra niteny tamin''Isiraely tao amin''ny fahitana nony alina ka nanao ho : Ry Jakoba, ry Jakoba ô! Ary hoy kosa izy: Inty aho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny zanakalahin''i Asenata, zanakavavin''i Poti-fera, mpisorona tao Ona, izay naterak''i Josefa tany amin''ny tany Egypta, dia Manase sy Efraima. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny zanakalahin''i Benjamina dia Bela sy Bakera sy Asbela sy Gera sy Namana sy Ehy sy Rosy sy Mopima sy Hopima ary Arda. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ireo no zanakalahin-dRahely, izay naterany tamin'i Jakoba; efatra ambin'ny folo ny isan'izy rehetra.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny zanakalahin''i Dana dia Hosima. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ny zanakalahin''i Naftaly dia Jaziela sy Gony sy Jezera ary Silema. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ireo no zanakalahin'i Bila, izay nomen'i Labana an-dRahely zananivavy, ary ireo no naterak'i Jakoba; fito no isan'izy rehetra.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny isan''izay rehetra nankany Egypta niaraka tamin''i Jakoba, dia izay naloaky ny kibony, afa-tsy ny vadin''ny zanakalahin''i Jakoba dia enina amby enim-polo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary ny zanakalahin''i Josefa, izay naterany tany Egypta, dia roa lahy; ny isan''ny terak''i Jakoba rehetra, izay tonga tany Egypta, dia fito-polo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary Joda nirahiny nialoha azy hankany amin''i Josefa mba hanoro lalana azy ho any Gosena; dia tonga tany amin''ny tany Gosena izy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary Josefa nampanamboatra ny kalesiny, dia niakatra hitsena an''Isiraely rainy tany Gosena izy; ary raha niseho taminy izy, dia namihina ny vozony ka nitomany ela teo amin''ny vozony. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy Izy: Izaho no Andriamanitra, dia Andriamanitry ny rainao; aza matahotra hidina any Egypta ianao, fa hataoko firenena lehibe any ianao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary hoy Isiraely tamin''i Josefa: Aoka ho faty amin''izao aho, satria efa hitako ny tavanao, fa mbola velona ihany ianao.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary hoy Josefa tamin''ny rahalahiny sy ny ankohonan''ny rainy: Hiakatra aho hilaza amin''i Farao ka hanao aminy hoe: Ny rahalahiko sy ny ankohonan''ny raiko, izay tany amin''ny tany Kanana, dia efa tonga atỳ amiko. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary mpiandry ondry ireo lehilahy ireo, fa mpiompy omby aman''ondry izy; ary ny ondry aman''osiny sy ny ombiny mbamin''izay rehetra ananany dia nentiny avokoa. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary raha hiantso anareo Farao ka hanao hoe : Inona no raharaha fanaonareo? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'dia izao no havalinareo: Miompy omby aman''ondry no raharaha fanaon''ny mpanomponao, hatry ny fony vao zaza ka ambaraka ankehitriny, dia izahay sy ny razanay koa mba hahazoanareo monina ao amin''ny tany Gosena, satria fahavetavetana amin''ny Egyptiana ny mpiandry ondry rehetra.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izaho hiara-midina aminao ho any Egypta; ary Izaho hitondra anao hiakatra indray tokoa ary ny tànan''i Josefa no hanirina ny masonao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia niainga Jakoba ka niala tao Beri-sheba; ary ny zanak''Isiraely nitondra an''i Jakoba rainy sy ny zanany madinika ary ny vadiny teo anatin''ny sariety, izay efa nampitondrain''i Farao hitondrana azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nentin''izy ireo ny omby aman''ondriny sy ny fananany, izay efa nohariny tany amin''ny tany Kanana, dia tonga tany Egypta Jakoba sy ny zanany rehetra nomba azy: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ny zananilahy sy ny zafini-lahy nomba azy, ary ny zananivavy sy ny zafini-vavy; eny, nentiny nomba azy ho any Egypta avokoa ny zanany rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary izao no anaran''ny zanak''Isiraely izay tonga tany Egypta, dia Jakoba sy ny zananilahy : '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Robena, lahimatoan''i Jakoba. Ary ny zanakalahin-dRobena dia Hanoka sy Palo sy Hezrona ary Karmy '
