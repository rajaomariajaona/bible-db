document_id: GAL.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra farany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry rahalahy, raha misy olona azon'ny ota tsy nahy aza
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: azo olan-tanana amin''izay fahadisoana aza'
      marker-yv: yv-n
    - type: text
      text: ', dia atsanganonareo izay manana ny Fanahy amin''ny fahamorana izy, ka mihevera ny tenanao, fandrao ianao koa mba halaim-panahy ihany.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa araka ny ananantsika andro hanaovana, dia aoka isika hanao soa amin'ny olona rehetra, indrindra fa amin'ny mpianakavin'ny finoana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro ny havaventin''ny soratra izay soratan''ny tanako ho aminareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na iza na iza te-hiseho ho tsara amin''ny nofo, dia ireo no manery anareo hoforana, nefa noho izao ihany : fandrao henjehina noho ny hazo fijalian''i Kristy izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia ny tenan''izy voafora aza dia tsy mitandrina ny lalàna; kanefa tiany ho forana koa ianareo, mba hireharehany amin''ny nofonareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa sanatria raha mba misy hataoko rehareha afa-tsy ny hazo fijalian'i Jesosy Kristy Tompontsika, Izay
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: izay'
      marker-yv: yv-n
    - type: text
      text: ' nahavoahombo izao tontolo izao tamin''ny hazo fijaliana, raha ny amiko, ary izaho kosa, raha ny amin''izao tontolo izao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa samy tsy mahasoa na ny famorana na ny tsi-famorana, fa ny ho olom-baovao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay rehetra mandeha araka ity fitsipika ity, dia ho aminy anie ny fiadanana sy ny famindram-po, ary ho amin''ny Isiraelin''Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''izao sisa izao aoka tsy hisy hanahirana ahy intsony; fa izaho mitondra ny marik''i Jesosy voatomboka eo amin''ny tenako. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho amin'ny fanahinareo anie, ry rahalahy, ny fahasoavan'i Jesosy Kristy Tompontsika. Amena.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifampitondrà izay mahavesatra, ary aoka izany no hahatanterahanareo ny lalàn''i Kristy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy manao ny tenany ho zavatra, kanjo tsinontsinona, dia mamitaka ny tenany izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa aoka ny olona rehetra samy hizaha toetra ny asany avy, dia samy hanana hafaliana ny amin''ny tenany ihany izy, fa tsy ny amin''ny olon-kafa; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa samy hitondra ny entany avy ny olona rehetra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka izay ampianarina ny teny mba hahafoy zava-tsoa ho an'izay mampianatra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mety hofitahina ianareo; Andriamanitra tsy azo vazivazina, fa izay afafin''ny olona no hojinjany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay mamafy ho an''ny nofony dia hijinja fahasimbana avy amin''ny nofo; ary izay mamafy ho an''ny Fanahy dia hijinja fiainana mandrakizay avy amin''ny Fanahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aza mba ketraka amin''ny fanaovan-tsoa isika; fa amin''ny fotoan''andro no hijinjantsika, raha tsy reraka isika. '
