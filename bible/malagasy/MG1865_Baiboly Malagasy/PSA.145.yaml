document_id: PSA.145,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salamo abidy. Fiderana an'Andriamanitra, Mpanjaka be indrafo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fideran''i Davida. Hanandratra Anao aho, ry Andriamanitro Mpanjaka ô, Sy hankalaza ny anaranao mandrakizay doria. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jehovah ô, midera Anao ny asanao rehetra; Ary ny olonao masina misaotra Anao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Milaza ny voninahitry ny fanjakanao izy Sady miresaka ny herinao, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mba hampahafantarina ny zanak'olombelona ny herinao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. heriny
      marker-yv: yv-n
    - type: text
      text: ' Sy ny haben''ny voninahitry ny fanjakanao'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fanjakany
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fanjakana mandrakizay ny fanjakanao, Ary hitatra amin''ny taranaka fara mandimby ny fanapahanao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jehovah manohana izay rehetra efa ho lavo Sy mampitraka izay rehetra mitanondrika. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny mason''izao rehetra izao miandrandra Anao, Ary Hianao manome azy ny haniny amin''ny fotoany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Manokatra ny tananao Hianao Ka mahavoky soa ny zava-miaina rehetra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Marina Jehovah amin''ny lalany rehetra, Sady mamindra fo amin''ny asany rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jehovah dia eo akaikin''izay rehetra miantso Azy, Dia izay rehetra miantso Azy marina tokoa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hanefa ny irin''izay matahotra Azy Izy Ary hihaino ny fitarainany ka hamonjy azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hankalaza Anao isan'andro aho sy hidera ny anaranao mandrakizay doria.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Miaro izay rehetra tia Azy Jehovah; Fa ny ratsy fanahy rehetra kosa haringany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny fiderana an'i Jehovah no hotenenin'ny vavako; Ary aoka ny nofo rehetra hankalaza ny anarany masina mandrakizay doria.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Lehibe Jehovah ka tokony hoderaina indrindra; Ary tsy takatry ny saina ny fahalehibiazany . '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny taranaka rehetra samy hidera ny asanao amin''izay mandimby azy Sy hanambara ny asanao lehibe. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny lazan''ny voninahitry ny fiandriananao Sy ny asanao mahagaga no hosaintsainiko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny herin''ny asanao mahatahotra no hotenenin''ny olona; Ary ny fahalehibiazanao no holazaiko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hanonona ny fahatsiarovana ny haben'ny fahatsaranao izy Sy hihoby ny fahamarinanao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mamindra fo sy miantra Jehovah; Mahari-po sady be famindram-po Izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Manisy soa izao tontolo izao Jehovah; Ary ny fiantràny dia eny amin''ny asany rehetra. '
