document_id: PSA.145,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fiderana an'Andriamanitra, Mpanjaka be indrafo
  - type: text
    content: 'Fideran''i Davida. Hanandratra Anao aho, ry Andriamanitro Mpanjaka ô, Sy hankalaza ny anaranao mandrakizay doria. '
  '10':
  - type: text
    content: 'Jehovah ô, midera Anao ny asanao rehetra; Ary ny olonao masina misaotra Anao. '
  '11':
  - type: text
    content: 'Milaza ny voninahitry ny fanjakanao izy Sady miresaka ny herinao, '
  '12':
  - type: text
    content: Mba hampahafantarina ny zanak'olombelona ny herinao
  - type: note
    content: Heb. heriny
  - type: text
    content: ' Sy ny haben''ny voninahitry ny fanjakanao'
  - type: note
    content: Heb. fanjakany
  - type: text
    content: .
  '13':
  - type: text
    content: 'Fanjakana mandrakizay ny fanjakanao, Ary hitatra amin''ny taranaka fara mandimby ny fanapahanao. '
  '14':
  - type: text
    content: 'Jehovah manohana izay rehetra efa ho lavo Sy mampitraka izay rehetra mitanondrika. '
  '15':
  - type: text
    content: 'Ny mason''izao rehetra izao miandrandra Anao, Ary Hianao manome azy ny haniny amin''ny fotoany. '
  '16':
  - type: text
    content: 'Manokatra ny tananao Hianao Ka mahavoky soa ny zava-miaina rehetra. '
  '17':
  - type: text
    content: 'Marina Jehovah amin''ny lalany rehetra, Sady mamindra fo amin''ny asany rehetra. '
  '18':
  - type: text
    content: 'Jehovah dia eo akaikin''izay rehetra miantso Azy, Dia izay rehetra miantso Azy marina tokoa. '
  '19':
  - type: text
    content: 'Hanefa ny irin''izay matahotra Azy Izy Ary hihaino ny fitarainany ka hamonjy azy. '
  '2':
  - type: text
    content: Hankalaza Anao isan'andro aho sy hidera ny anaranao mandrakizay doria.
  '20':
  - type: text
    content: Miaro izay rehetra tia Azy Jehovah; Fa ny ratsy fanahy rehetra kosa haringany.
  '21':
  - type: text
    content: Ny fiderana an'i Jehovah no hotenenin'ny vavako; Ary aoka ny nofo rehetra hankalaza ny anarany masina mandrakizay doria.
  '3':
  - type: text
    content: 'Lehibe Jehovah ka tokony hoderaina indrindra; Ary tsy takatry ny saina ny fahalehibiazany . '
  '4':
  - type: text
    content: 'Ny taranaka rehetra samy hidera ny asanao amin''izay mandimby azy Sy hanambara ny asanao lehibe. '
  '5':
  - type: text
    content: 'Ny lazan''ny voninahitry ny fiandriananao Sy ny asanao mahagaga no hosaintsainiko. '
  '6':
  - type: text
    content: 'Ny herin''ny asanao mahatahotra no hotenenin''ny olona; Ary ny fahalehibiazanao no holazaiko. '
  '7':
  - type: text
    content: Hanonona ny fahatsiarovana ny haben'ny fahatsaranao izy Sy hihoby ny fahamarinanao.
  '8':
  - type: text
    content: 'Mamindra fo sy miantra Jehovah; Mahari-po sady be famindram-po Izy. '
  '9':
  - type: text
    content: 'Manisy soa izao tontolo izao Jehovah; Ary ny fiantràny dia eny amin''ny asany rehetra. '
