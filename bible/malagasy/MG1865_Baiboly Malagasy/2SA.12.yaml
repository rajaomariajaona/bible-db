document_id: 2SA.12,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nibebahan'i Davida, rehefa nanarin'i Natana, ary ny nahafahany an'i Raba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Jehovah naniraka an''i Natana hankao amin''i Davida. Ary dia tonga tao aminy izy ka nanao taminy hoe: Nisy olona roa lahy tao an-tanàna anankiray, ny iray manan-karena, ary ny iray malahelo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa noho izany dia tsy hiala amin''ny taranakao mandrakizay kosa ny sabatra, satria nanamavo Ahy ianao ka naka ny vadin''i Oria Hetita ho vadinao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izao koa no lazain''i Jehovah: Indro, Izaho efa hahatonga loza aminao avy ao amin''ny ankohonanao ihany; ary hesoriko eo imasonao ny vadinao ka homeko ny namanao; ary izy handry amin''ny vadinao amin''izao antoandrobenanahary izao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa ianao nanao izany tao amin'ny mangingina, ary Izaho kosa haneho izany zavatra izany eo anatrehan'ny Isiraely rehetra sy amin'izao antoandrobenanahary izao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia hoy Davida tamin''i Natana: Efa nanota tamin''i Jehovah aho. Ary hoy kosa atana tamin''i Davida: Jehovah efa nanaisotra ny helokao, ka tsy ho faty ianao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nefa noho ny nampitenenanao ratsy ny fahavalon''i Jehovah amin''izany zavatra izany dia ho faty tokoa ny zaza izay haterakao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary Natana nody tany an-tranony. Ary Jehovah namely ny zaza izay nateraky ny vadin'i Oria tamin'i Davida, ka dia narary be ny zaza.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nifona tamin''Andriamanitra ho an''ny zaza Davida, dia nifady hanina sady niditra ka nandry tamin''ny tany mandritra ny alina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny loholona tao an-tranony nitsangana nankao aminy hampiarina azy amin''ny tany; nefa tsy nety izy sady tsy nety niara-nihinan-kanina taminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nony nandray hafitoana, dia maty ny zaza; ary ny mpanompon''i Davida natahotra hilaza ny nahafatesan''ny zaza aminy, fa hoy ireo: Indro, fony mbola velona aza ny zaza, raha niteny taminy isika, dia tsy nohenoiny ny feontsika, koa hataontsika ahoana no filaza aminy ny fahafatesan''ny zaza? fandrao hanimba tena izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary nony hitan''i Davida fa nitakoritsika ny mpanompony, dia fantany fa maty ny zaza; ka hoy izy tamin''ny mpanompony: Maty va ny zaza? Ary hoy ireo: Maty. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ilay manan-karena nanana ondry aman''osy sy omby betsaka; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia niarina tsy nandry tamin''ny tany intsony Davida ary nandro sy nihosotra diloilo ary nanova ny fitafiany, dia nankao amin''ny tranon''i Jehovah ka niankohoka; ary dia nody tany an-tranony izy ka niantso mba hisy handroso hanina eo anoloany, dia nihinana izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy ny mpanompony taminy: Ahoana izao zavatra nataonao izao? Fa fony mbola velona ny zaza, dia nifady hanina sy nitomany ianao, fa rehefa maty ny zaza, dia niarina sy nihinan-kanina kosa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hoy izy: Fony mbola velona ny zaza, dia nifady hanina sy nitomany tokoa aho: fa hoy izaho: Iza moa no mahalala na mba hamindra fo amiko Jehovah ka hahavelona ny zaza, na tsia? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Kanjo maty izy izao, ka nahoana aho no hifady hanina intsony? Mahay mampiverina azy va aho? Izaho no hankany aminy, fa izy tsy hiverina etỳ amiko intsony. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary Davida nampionona an'i Batseba vadiny, dia niditra tao aminy ka nandry taminy; ary niteraka zazalahy izy, ka ny anarany nataony hoe Solomona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Solomona = Miadana
      marker-yv: yv-n
    - type: text
      text: '. Ary Jehovah tia azy, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: dia naniraka an'i Natana mpaminany ka nanao ny anaran'ny zaza hoe Jedidia
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jedidia = Tian'i Jehovah
      marker-yv: yv-n
    - type: text
      text: ' noho ny amin''i Jehovah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary Joaba namely an''i Raban''ny taranak''i Amona ka nahafaka ny tanànan''ny mpanjaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary Joaba naniraka olona tany amin''i Davida nanao hoe: Namely an''i Raba aho ka nahafaka ny tanàna misy rano. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Koa vorio ny olona sisa izao, ka mitobia hamely ny tanàna, ary aoka ho afakao izy; fandrao izaho no hahafaka ny tanàna, ka dia hotononina araka ny anarako izy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary Davida namory ny vahoaka rehetra, dia nankany Raba ka namely azy ary nahafaka azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'fa ilay malahelo kosa tsy nanana na inona na inona afa-tsy zanak''ondry vavy kely iray monja izay novidiny; ary nokolokoloiny tsara io ka nitombo teo aminy sy ny zanany; fa tamin''ny hanin-kelin-dralehilahy no nihinanany, ary tamin''ny kapoakany no nisotroany, sady notrotroiny teo an-tratrany izy ka nataony toy ny zananivavy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia nesoriny ny satro-boninahitr'ilay mpanjaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Malkama; izahao Zef. i. 5'
      marker-yv: yv-n
    - type: text
      text: ' teny an-dohany talenta volamena iray no lanjany, sady nisy vato soa, ary dia nisatrohan''i Davida. Ary navoakany tao an-tanàna ny babo azo, ka be dia be ireny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary dia navoakany koa ny olona teo ka nataony teo amin
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (nampiasaina tamin'')'
      marker-yv: yv-n
    - type: text
      text: '''ny tsofa sy ny fangao-by lehibe ary ny famaky vy, ary nataony tao anatin''ny fandoroam-biriky; toy izany no nataony tamin''ny tanànan''ny taranak''i Amona rehetra. Ary Davida sy ny vahoaka rehetra dia niverina nankany Jerosalema.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nisy vahiny tonga tao amin''ilay manan-karena, nefa ny ondriny aman''osiny sy ny ombiny notsitsiny ka tsy nangalany hatao nahandro ho an''ilay vahiny tonga tao aminy; fa ny zanak''ondry vavin''ilay malahelo kosa no nalainy, ka dia nataony nahandro ho an''ilay olona tonga tao aminy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nirehitra mafy ny fahatezeran''i Davida tamin''izany olona izany, ka hoy izy tamin''i Natana: Raha velona koa Jehovah, tsy maintsy hatao maty izay olona nanao izany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ary ilay zanak'ondry vavy tsy maintsy honerany efatra heny noho ny nanaovany izany zavatra izany sy noho ny tsy namindrany fo.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy Natana tamin''i Davida: Hianao no izy. Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Izaho nanosotra anao ho mpanjakan''ny Isiraely ka namonjy anao ho afaka tamin''ny tànan''i Saoly; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'ary nomeko anao ny tranon''ny tomponao sy ny vadin''ny tomponao ho andefimandrinao, ary nomeko anao koa ny firenen''Isiraely sy Joda; ary raha mbola tsy ampy ho anao izany, dia ho nomeko bebe kokoa ianao; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'koa nahoana ianao no nanamavo ny tenin''i Jehovah ka nanao izay ratsy eo imasony? Oria Hetita nasianao ny sabatra, ary ny vadiny nalainao ho vadinao. Eny, efa novonoinao tamin''ny sabatry ny taranak''i Amona izy. '
