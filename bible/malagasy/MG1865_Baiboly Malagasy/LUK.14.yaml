document_id: LUK.14
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary raha niditra mba hihinana tao an-tranon''ny loholona anankiray amin''ny Fariseo Izy tamin''ny Sabata, dia nizaha taratra Azy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary, indro, nisy olona manirano anankiray teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Jesosy namaly ka nanao tamin''ny mpahay lalàna sy ny Fariseo hoe: Mety va ny mahasitrana amin''ny Sabata, sa tsia? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa tsy niteny ireo. Ary Izy nanendry ilay marary, dia nahasitrana azy ka nandefa azy handeha. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Izy nanao tamin''ireo hoe: Iza moa aminareo, raha manana boriky na omby latsaka ao an-davaka fantsakana, no tsy hampakatra azy miaraka amin''izay na dia amin''ny andro Sabata aza? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tsy nahavaly ny amin''izany zavatra izany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Jesosy nanao fanoharana tamin''izay nasaina, raha nahita azy mifidy ny fitoerana aloha, ka nanao taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha misy maka anao ho any amin''ny fampakaram-bady, aza mipetraka eo amin''ny fitoerana aloha, fandrao hisy olona nalaina izay mihaja kokoa noho ianao, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary ho avy izay nanasa anao sy izy ka hilaza aminao hoe: Omeo toerana io olona io: dia ho menatra ianao ka hifindra ho any amin''ny fitoerana aoriana indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha misy manasa anao, mandehana ka mipetraha eo amin''ny fitoerana aoriana indrindra, ary rehefa tonga ilay nanasa anao, dia mahazo manao aminao hoe: Ry sakaiza, mandrosoa etsy alohaloha kokoa; dia hahazo haja eo imason''izay rehetra miara-mipetraka mihinana aminao ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa izay rehetra manandra-tena no haetry; ary izay manetry tena no hasandratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Jesosy tamin''ilay nanasa Azy kosa: Raha manasa olona amin''ny sakafo antoandro na ny sakafo hariva ianao, dia aza ny sakaizanao, na ny rahalahinao, na ny havanao, na ny namanao manan-karena, no asainao, fandrao hanasa anao kosa ireo, ka dia ho voavaliny ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha manao fanasana ianao, dia asao ny malahelo, ny kilemaina, ny mandringa, ny jamba; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia ho sambatra ianao, satria tsy mba manan-kavaly ireo; fa hovaliana kosa ianao amin''ny fitsanganan''ny marina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny anankiray tamin''izay niara-nipetraka nihinana taminy dia nandre izany ka nanao taminy hoe: Sambatra izay hihinan-kanina ao amin''ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy Jesosy taminy: Nisy olona anankiray nanao fanasana lehibe ka nanasa olona maro. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary naniraka ny mpanompony izy tamin''ny fotoana fisakafoana hilaza amin''izay efa nasaina hoe: Andeha, fa efa voavoatra izao ny fanasana. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izy rehetra dia nitovy saina, ka samy nanao fialàna. Hoy ny voalohany taminy: Efa nividy tany aho ka tsy maintsy mandeha hizaha azy; masìna ianao, ekeo ny fandavako. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy ny anankiray koa: Efa nividy omby folo aho ka handeha hamantatra azy; masìna ianao, ekeo ny fandavako. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy ny anankiray koa: Efa nampaka-bady aho, koa amin''izany tsy afaka mankany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nony tonga ilay mpanompo, dia nambarany tamin''ny tompony izany. Dia tezitra ny tompon-trano ka nanao tamin''ilay mpanompony hoe: Mandehana faingana ho eny amin''ny lalambe sy ny sakeli-dalana eto an-tanàna, ka ampidiro ny malahelo sy ny kilemaina sy ny jamba ary ny mandringa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy ilay mpanompo: Tompoko, efa natao izay nandidianao, ary mbola tsy feno ihany ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy ny tompo tamin''ilay mpanompony: Mandehana ho eny amin''ny lalambe sy ny sisim-boly, ka tereo ny olona hiditra, mba ho feno ny tranoko. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa lazaiko aminareo: Tsy hisy hanandrana ny nahandroko ireny olona nasaiko ireny na dia iray akory aza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nisy vahoaka betsaka niaraka tamin''i Jesosy, dia nitodika Izy ka nanao taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha misy manaraka Ahy ka tsy mankahala ny rainy sy ny reniny sy ny vadiny sy ny zanany sy ny rahalahiny sy ny anabaviny, eny, ary ny ainy koa aza, dia tsy azo ekena ho mpianatro izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Na zovy na zovy no tsy mitondra ny hazo fijaliana ka tsy manaraka Ahy, dia tsy azo ekena ho mpianatro izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa iza moa aminareo, raha ta-hanao tilikambo, no tsy mipetraka aloha mihevitra izay ho lany hanaovany izany, na misy hahavitany azy, na tsia? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'fandrao, rehefa nanao ny fanorenana izy ka tsy mahavita, dia handatsa azy izay rehetra mahita '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ka hanao hoe: Io olona io dia nanomboka nanao trano, fa tsy nahavita. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary iza moa no mpanjaka, raha handeha hiady amin''ny mpanjaka hafa, no tsy mipetraka aloha mba haka hevitra tsara, na mahay mandresy ilay mitondra roa alina amin''ny iray alina izy, na tsia? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa raha tsy izany, raha mbola lavitra ny mpanjaka anankiray, dia hampitondra teny izy ka hangataka fihavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary toy izany koa ianareo rehetra, izay tsy mahafoy izay rehetra anananareo, dia tsy azo ekena ho mpianatro. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Koa tsara ny sira; fa raha ny sira aza no tonga matsatso, inona indray no hahasira azy? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tsy mahasoa ny tany na ny zezika izy, fa harian'ny olona. Izay manan-tsofina ho enti-mihaino, aoka izy hihaino.
