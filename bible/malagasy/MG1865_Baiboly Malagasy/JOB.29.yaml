document_id: JOB.29
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia mbola nandroso nanao oha-teny ihany Joba ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Enga anie ka ho tahaka ny tamin'ireny volana lasa ireny aho! Dia tahaka ilay tamin'ny andro niarovan'Andriamanitra ahy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fony mbola nazava teo ambonin'ny lohako ny jirony, ary ny fahazavany no nandehanako tao amin'ny maizina;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, tahaka ny toetro fony aho mbola fararano, raha niseho teo ambonin'ny laiko ny fisakaizan'Andriamanitra;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fony mbola tao amiko ny Tsitoha, Ary nanodidina ahy ny zanako
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny ankizilahiko'
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fony mbola nanasa ny tongotro tamin'ny rononomandry aho, ary ny vatolampy namoaka renirano diloilo teo amiko;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha niainga niakatra ho eo amin'ny vavahadin'ny tanàna aho ka nametraka ny fipetrahako teo ankalalahana,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nahita ahy ny zatovo ka niampirimpirina; Ary niainga ny fotsy volo, dia nijoro;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nangina tsy niteny ny lehibe ka nitampim-bava;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy sahy niteny ny mpanapaka, ary ny lelany niraikitra tamin'ny lanilaniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay sofina nandre dia nanao ahy hoe sambatra; Ary Izay maso nahita dia vavolombelona ho ahy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Satria namonjy ny ory izay nitaraina aho sy ny kamboty izay tsy nanan-kamonjy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fisaoran'izay efa ho faty dia tonga tamiko; Ary ny fon'ny mpitondratena nampifaliko
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nampihobiko
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nitafy fahamarinana aho, ka mba nitafy ahy kosa izy; Eny, tahaka ny lamba sy ny hamama ny rariny izay nananako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Efa maso ho an'ny jamba aho ary tongotra ho an'ny mandringa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa ray ho an'ny malahelo aho, ary ny adin'ny olona tsy fantatro aza nodinihiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Namaky ny nifin'ny ratsy fanahy aho ka nandrombaka ny babo teo am-bavany
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy izaho: Eo amin''ny akaniko ihany no hialako aina, ary hanamaro ny androko toy ny fasika aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny fakako ho azon'ny rano, ary ny ando hitoetra amin'ny sampako mandritra ny alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho vaovao amiko lalandava ny voninahitro, ary ny tsipikako hihahenjana eny an-tanako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nihaino ahy ny olona, dia niandry, ka nangina tamin'ny fanolorako saina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rehefa niteny aho, dia tsy mba namaly intsony izy; ary nitetevan'ny teniko izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Niandry ahy toy ny fiandry ny ranonorana izy ary nitanatana vava toy ny fiandry ny fara-orana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha nisy nila ho ketraka, dia mbola niseho miramirana taminy ihany ny tarehiko, ary tsy nahamaloka ny fahazavan'ny tavako ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nifidy ny lalan-kalehany aho ka nipetraka ho lohany, eny, nitoetra toy ny mpanjaka teo amin'ny miaramila sy toy ny mpampionona ny misaona aho.
