document_id: 1CH.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny taranak'i Benjamina sy ny firazanan'i Saoly
  - type: text
    content: 'Ary Benjamina niteraka an''i Bela, lahimatoa, sy Asbela, lahiaivo, sy Ahara, fahatelo, '
  '10':
  - type: text
    content: 'sy Jeoza sy Sakia ary Mirma. Ireo no zananilahy, samy lohan''ny fianakaviany avy. '
  '11':
  - type: text
    content: 'Ary Hosima no niterahany an''i Abitoba sy Elpala. '
  '12':
  - type: text
    content: 'Ary ny zanakalahin''i Elpala dia Ebera sy Misama ary Samera, izay nanorina an''i Ono sy Loda sy ny zana-bohiny; '
  '13':
  - type: text
    content: 'Beria koa sy Sema, izay lohan''ny fianakavian''ny mponina ao Aialona sady nandroaka ny mponina tao Gata; '
  '14':
  - type: text
    content: 'ary Ahio sy Sasaka sy Jeremota '
  '15':
  - type: text
    content: 'sy Zebadia sy Arada sy Adera '
  '16':
  - type: text
    content: 'sy Mikaela sy Jispa sy Joha (zanakalahin''i Beria ireo), '
  '17':
  - type: text
    content: 'ary Zebadia sy Mesolama sy Hizky sy Hebera '
  '18':
  - type: text
    content: 'sy Jismeray sy Jizlia sy Jobaba (zanakalahin''i Elpala ireo), '
  '19':
  - type: text
    content: 'ary Jakima sy Zikry sy Zabdy '
  '2':
  - type: text
    content: 'sy Noha, fahefatra, ary Rafa, faralahy. '
  '20':
  - type: text
    content: 'sy Elienay sy Ziletahy sy Eliala '
  '21':
  - type: text
    content: 'sy Adaia sy Beraia sy Simrata (zanakalahin''i Simey ireo), '
  '22':
  - type: text
    content: 'ary Jispana sy Hebera sy Eliala '
  '23':
  - type: text
    content: 'sy Abdona sy Zikry sy Hanana '
  '24':
  - type: text
    content: 'sy Hanania sy Elama sy Antotia '
  '25':
  - type: text
    content: 'sy Jifdia sy Penoela (zanakalahin''i Sasaka ireo), '
  '26':
  - type: text
    content: 'ary Samseray sy Seharia sy Atalia '
  '27':
  - type: text
    content: 'sy Jaresia sy Elia sy Zitry (zanakalahin''i Jerohama ireo). '
  '28':
  - type: text
    content: 'Ireo no lohan''ny fianakaviany araka ny firazanany, dia samy loholona. Ireo no nonina tany Jerosalema. '
  '29':
  - type: text
    content: 'Ary tao Gibeona no nonenan''ny razamben''ny an''i Gibeona, ary ny anaran''ny vadiny dia Imaka, '
  '3':
  - type: text
    content: 'Ary ny zanakalahin''i Bela dia Adara sy Gera sy Abihoda '
  '30':
  - type: text
    content: 'ary Abdona no lahimatoany, dia Zora, dia Kisy, dia Bala, dia Nadaba, '
  '31':
  - type: text
    content: 'dia Gedora, dia Ahio, dia Zakera. '
  '32':
  - type: text
    content: 'Ary Miklota niteraka an''i Simea. Ireo koa dia niara-nonina tamin''ny rahalahiny tany Jerosalema nifanandrify fonenana taminy. '
  '33':
  - type: text
    content: 'Ary Nera niteraka an''i Kisy; ary Kisy niteraka an''i Saoly; ary Saoly niteraka an''i Jonatana sy Malkisoa sy Abinadaba ary Esbala. '
  '34':
  - type: text
    content: 'Ary ny zanakalahin''i Jonatana dia Meribala; ary Meribala niteraka an''i Mika. '
  '35':
  - type: text
    content: 'Ary ny zanakalahin''i Mika dia Pitona sy Maleka sy Tarea ary Ahaza. '
  '36':
  - type: text
    content: 'Ary Ahaza niteraka an''i Joada; ary Joada niteraka an''i Alemeta sy Azmaveta ary Zimry; ary Zimry niteraka an''i Moza; '
  '37':
  - type: text
    content: 'ary Moza niteraka an''i Binea; Rafa no zanakalahin''i Binea, Elasa no zanakalahin''i Rafa, Azela no zanakalahin''i Elasa '
  '38':
  - type: text
    content: 'Ary Azela nanana zanaka enina mirahalahy, ka izao no anarany: Azrikama sy Bokero sy Isimaela sy Searia sy Obadia ary Hanana. Ireo rehetra ireo no zanakalahin''i Azela. '
  '39':
  - type: text
    content: 'Ary ny zanakalahin''i Eseka rahalahiny dia Olama, lahimatoa, sy Jeosy, lahiaivo, ary Elifeleta, faralahy. '
  '4':
  - type: text
    content: 'sy Abisoa sy Namana sy Ahoa '
  '40':
  - type: text
    content: Ary ny zanakalahin'i Olama dia lehilahy mahery sady mpandefa zana-tsipìka, ary nanana zanakalahy sy zafy maro izy, dia dimam-polo amby zato. Ireo rehetra ireo no taranak'i Benjamina.
  '5':
  - type: text
    content: 'sy Gera sy Sefofana ary Horama. '
  '6':
  - type: text
    content: 'Ary izao no zanakalahin''i Ehoda (izao no lohan''ny fianakavian''ny mponina any Geba; ary nitondra azy ho babo tany Manahata, '
  '7':
  - type: text
    content: 'Namana sy Ahia ary Gera; izy no nitondra azy ho babo), niteraka an''i Oza sy Ahihoda izy. '
  '8':
  - type: text
    content: 'Ary Saharaima niteraka tao amin''ny tany Moaba taorian''ny nisaorany an''i Hosima sy Bara vadiny. '
  '9':
  - type: text
    content: 'Ary Hodesy vadiny no niterahany an''i Jobaba sy Ziba sy Mesa sy Malkama '
