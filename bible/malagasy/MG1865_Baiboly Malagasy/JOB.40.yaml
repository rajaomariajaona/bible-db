document_id: JOB.40,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny naneken'i Joba ny fahadisoan-keviny, sy ny navalin'i Jehovah azy
  - type: text
    content: 'Ary Jehovah mbola namaly an''i Joba nanao hoe:'
  '10':
  - type: text
    content: Miravaha fahalehibiazana sy tabiha ianao, ary mitafia famirapiratana sy voninahitra;
  '11':
  - type: text
    content: Alefaso ny fahatezeranao mirehitra; Ary jereo ny avonavona rehetra, ka ampietreo.
  '12':
  - type: text
    content: Eny, jereo ny avonavona rehetra, ka aongàny; Ary apotrahy eo amin'ny fitoerany ihany ny ratsy fanahy.
  '13':
  - type: text
    content: Asitriho ao amin'ny vovoka avokoa izy rehetra; Sarony ao amin'ny fiafenana ny tavany.
  '14':
  - type: text
    content: Fa Izaho kosa dia hidera anao, Satria mahavonjy anao ny tananao ankavanana.
  '15':
  - type: text
    content: He! jereo ange ny behemota
  - type: note
    content: hipopotamosy
  - type: text
    content: ', izay nataoko tahaka ny nanaovako anao ihany'
  - type: note
    content: 'Na: ho eo aminao'
  - type: text
    content: ': Mihinana ahitra tahaka ny omby izy.'
  '16':
  - type: text
    content: Indro, eo amin'ny valahany ny heriny, ary eo amin'ny ozatra amin'ny kibony ny tanjany.
  '17':
  - type: text
    content: Henjaniny ny rambony ho tahaka ny hazo sedera; Mifaniditriditra ny ozatra amin'ny feny
  '18':
  - type: text
    content: Ny taolany dia tahaka ny fantsom-barahina, eny, tahaka ny anja-by ny taolany.
  '19':
  - type: text
    content: Voalohany amin'ny asan
  - type: note
    content: Heb. lalan'
  - type: text
    content: '''Andriamanitra izy; Ny Mpanao azy no nanome sabatra azy.'
  '2':
  - type: text
    content: Hiady amin'ny Tsitoha va io mpanadidy Azy io? Aoka ny mananatra an'Andriamanitra no hamaly!
  '20':
  - type: text
    content: Mamoaka hanina ho azy ny tendrombohitra, izay ilalaovan'ny bibi-dia rehetra;
  '21':
  - type: text
    content: Eo ambanin'ny hazo lota no andriany, any am-pierena anaty zozoro sy fotaka.
  '22':
  - type: text
    content: Manalokaloka azy ny hazo lota; Ary ny hazomalahelo eny amoron'ny ony no manodidina azy
  '23':
  - type: text
    content: Indro, na dia maria aza ny ony, tsy manahy izy; Matoky izy, na dia misy Jordana migorodana amin'ny vavany aza.
  '24':
  - type: text
    content: Moa misy mahasambotra azy va, raha mihiratra ny masony? Raha azon'ny fandrika izy, misy mahatsindrona ny orony va?
  - type: text
    content: Mahasarika ny mamba
  - type: note
    content: Heb. leviatana
  - type: text
    content: ' amin''ny farango va ianao, na mahafatotra ny lelany amin''ny mahazaka?'
  - type: text
    content: Mahisy tady zozoro amin'ny orony va ianao, na mahaboroaka ny valanoranony amin'ny fintana?
  - type: text
    content: Hifon-jato amin'arivo aminao va izy, na hanao teny malefaka aminao?
  - type: text
    content: Hanao fanekena aminao va izy? Azonao alaina ho andevonao mandrakizay va izy?
  - type: text
    content: Hilalao azy tahaka ny filalao voron-kely va ianao? Ary hamatotra azy ho an'ny zazavavy ao aminao va ianao?
  - type: text
    content: Hataon'ny mpaka hazandrano varotra va izy, ka hotsinjarainy amin'ny mpandranto?
  - type: text
    content: Mahafeno lefom-pohy ny hodiny va ianao, na firombaka amin'ny lohany?
  - type: text
    content: Atehefo aminy ange ny tananao; Raha tsaroanao ny ady, dia tsy hanindroa intsony ianao.
  '3':
  - type: text
    content: 'Ary Joba dia namaly an''i Jehovah ka nanao hoe:'
  '4':
  - type: text
    content: Indro, tsinontsinona, aho ka inona no azoko avaly Anao? Hitampim-bava aho izao.
  '5':
  - type: text
    content: Efa niteny indray mandeha aho, ka tsy hamaly intsony; Eny, indroa aza, fa tsy hanampy teny intsony aho.
  '6':
  - type: text
    content: 'Dia namaly an''i Joba teo amin''ny tafio-drivotra Jehovah ka nanao hoe:'
  '7':
  - type: text
    content: 'Misikina tahaka ny lehilahy; Fa hanadina anao Aho, ka ampahafantaro Aho:'
  '8':
  - type: text
    content: Hanaisotra ny rariny amiko va ianao? Hanameloka Ahy va ianao, mba hanamarina ny tenanao kosa?
  '9':
  - type: text
    content: Manan-tsandry tahaka ny an'Andriamanitra va ianao? Ary mahay mampikotrokotro-peo tahaka ny Azy va ianao?
