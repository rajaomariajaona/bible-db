document_id: JOB.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny naneken'i Joba ny fahadisoan-keviny, sy ny navalin'i Jehovah azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah mbola namaly an''i Joba nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hiady amin'ny Tsitoha va io mpanadidy Azy io? Aoka ny mananatra an'Andriamanitra no hamaly!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Joba dia namaly an''i Jehovah ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Indro, tsinontsinona, aho ka inona no azoko avaly Anao? Hitampim-bava aho izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa niteny indray mandeha aho, ka tsy hamaly intsony; Eny, indroa aza, fa tsy hanampy teny intsony aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia namaly an''i Joba teo amin''ny tafio-drivotra Jehovah ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Misikina tahaka ny lehilahy; Fa hanadina anao Aho, ka ampahafantaro Aho:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hanaisotra ny rariny amiko va ianao? Hanameloka Ahy va ianao, mba hanamarina ny tenanao kosa?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manan-tsandry tahaka ny an'Andriamanitra va ianao? Ary mahay mampikotrokotro-peo tahaka ny Azy va ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miravaha fahalehibiazana sy tabiha ianao, ary mitafia famirapiratana sy voninahitra;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alefaso ny fahatezeranao mirehitra; Ary jereo ny avonavona rehetra, ka ampietreo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, jereo ny avonavona rehetra, ka aongàny; Ary apotrahy eo amin'ny fitoerany ihany ny ratsy fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Asitriho ao amin'ny vovoka avokoa izy rehetra; Sarony ao amin'ny fiafenana ny tavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa Izaho kosa dia hidera anao, Satria mahavonjy anao ny tananao ankavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He! jereo ange ny behemota
  - type: usfm
    marker: x
    children:
    - type: text
      text: hipopotamosy
    marker-yv: yv-n
  - type: text
    text: ', izay nataoko tahaka ny nanaovako anao ihany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho eo aminao'
    marker-yv: yv-n
  - type: text
    text: ': Mihinana ahitra tahaka ny omby izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, eo amin'ny valahany ny heriny, ary eo amin'ny ozatra amin'ny kibony ny tanjany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Henjaniny ny rambony ho tahaka ny hazo sedera; Mifaniditriditra ny ozatra amin'ny feny
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny taolany dia tahaka ny fantsom-barahina, eny, tahaka ny anja-by ny taolany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voalohany amin'ny asan
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalan'
    marker-yv: yv-n
  - type: text
    text: '''Andriamanitra izy; Ny Mpanao azy no nanome sabatra azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mamoaka hanina ho azy ny tendrombohitra, izay ilalaovan'ny bibi-dia rehetra;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eo ambanin'ny hazo lota no andriany, any am-pierena anaty zozoro sy fotaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manalokaloka azy ny hazo lota; Ary ny hazomalahelo eny amoron'ny ony no manodidina azy
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Indro, na dia maria aza ny ony, tsy manahy izy; Matoky izy, na dia misy Jordana migorodana amin'ny vavany aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moa misy mahasambotra azy va, raha mihiratra ny masony? Raha azon'ny fandrika izy, misy mahatsindrona ny orony va?
- type: usfm
  marker: p
  children:
  - type: text
    text: Mahasarika ny mamba
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. leviatana
    marker-yv: yv-n
  - type: text
    text: ' amin''ny farango va ianao, na mahafatotra ny lelany amin''ny mahazaka?'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mahisy tady zozoro amin'ny orony va ianao, na mahaboroaka ny valanoranony amin'ny fintana?
- type: usfm
  marker: p
  children:
  - type: text
    text: Hifon-jato amin'arivo aminao va izy, na hanao teny malefaka aminao?
- type: usfm
  marker: p
  children:
  - type: text
    text: Hanao fanekena aminao va izy? Azonao alaina ho andevonao mandrakizay va izy?
- type: usfm
  marker: p
  children:
  - type: text
    text: Hilalao azy tahaka ny filalao voron-kely va ianao? Ary hamatotra azy ho an'ny zazavavy ao aminao va ianao?
- type: usfm
  marker: p
  children:
  - type: text
    text: Hataon'ny mpaka hazandrano varotra va izy, ka hotsinjarainy amin'ny mpandranto?
- type: usfm
  marker: p
  children:
  - type: text
    text: Mahafeno lefom-pohy ny hodiny va ianao, na firombaka amin'ny lohany?
- type: usfm
  marker: p
  children:
  - type: text
    text: Atehefo aminy ange ny tananao; Raha tsaroanao ny ady, dia tsy hanindroa intsony ianao.
