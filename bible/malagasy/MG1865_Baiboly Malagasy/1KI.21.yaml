document_id: 1KI.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namonoana an'i Nabota. sy ny nahazoan'i Ahaba ny tanim-boalobony ary ny loza voalaza Anjo an'i Ahaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa afaka izany zavatra izany, Nabota Jezirelita nanana tanim-boaloboka tao Jezirela, takaikin''ny lapan''i Ahaba, mpanjakan''i Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Ahaba niteny tamin''i Nabota hoe: Omeo ahy ny tanim-boalobokao mba hataoko fambolena anana, fa akaikin''ny lapako izy; ary hotakalozako tanim-boaloboka tsara noho izy, na vola tokom-bidiny, raha izany no sitraky ny fonao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy Nabota tamin''i Ahaba: Sanatria amiko eo anatrehan''i Jehovah izany! fa tsy homeko anao any tanin-drazako. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Ahaba nankany an-trano sady malahelo no sosotra noho ny teny nolazain''i Nabota Jezirelita taminy hoe: Tsy homeko anao ny tanindrazako. Dia nandry teo am-parafarany izy ka nampihodina ny tavany sady tsy nety nihinan-kanina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jezebela vadiny nankeo aminy ka nanao taminy hoe: Ahoana no mampahasosotra anao toy izao, no tsy mety homan-kanina ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy izy taminy: Satria niteny tamin''i Nabora Jezirelita aho ka nanao taminy hoe: Omeo ahy ny tanim-boalobokao hovidiko vola, na hotakalozako tanim-boaloboka hafa, raha izany no sitraky ny fonao; fa izy namaly hoe: Tsy homeko anao ny tanim-boaloboko. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Jezebela vadiny taminy: Moa ianao tokoa va no manjaka amin''ny Isiraely izao? Miarena, mihinàna hanina, ary aoka ho ravoravo ny fonao; izaho hanome anao ny tanim-boalobok''i Nabota Jezirelita. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Jezebela dia nanoratra taratasy tamin''ny anaran''i Ahaba, ka notombohiny tamin''ny fanombohan-kasen''andriana, ary ny taratasy dia nampitondrainy ho any amin''ny loholona sy ny manan-kaja tao an-tanànany, dia ireo niara-nitoetra tamin''i Nabota. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izao no nosoratany tao amin''ny taratasy: Miantsoa andro fifadian-kanina, ary apetraho eo anatrehan''ny olona Nabota. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia anangano roa lahy izay tena ratsy fanahy ho eo anatrehany hiampanga azy hoe: Efa niteny ratsy an''Andriamanitra sy ny mpanjaka ianao. Dia ento mivoaka izy, ka torahy vato ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny olona tao an-tanànany, dia ny loholona sy ny manan-kaja izay nonina tao, nanao araka izay nanirahan''i Jezebela tany aminy, dia ilay voasoratra ao amin''ny taratasy izay nampitondrainy tany aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niantso andro fifadian-kanina izy ka nametraka an''i Nabota teo anatrehan''ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary niditra ilay roa lahy tena ratsy fanahy ka nipetraka teo anatrehany, dia niampanga an''i Nabota teo anatrehan''ny olona ireo ka nanao hoe: Niteny ratsy an''Andriamanitra sy ny mpanjaka Nabota. Ary nentin''ny olona nivoaka teny ivelan''ny tanàna Nabota, dia notorahany vato ka maty. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia naniraka tany amin''i Jezebela izy ireo ka nanao hoe: Efa notoraham-bato Nabota ka maty. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa ren''i Jezebela fa voatora-bato Nabota ka maty, dia hoy izy tamin''i Ahaba: Mitsangàna, ka alao ho anao ny tanim-boalobok''i Nabota Jezirelita, izay tsy foiny ho namidy taminao; fa tsy velona intsony Nabota fa efa maty. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary rehefa ren'i Ahaba fa efa maty Nabota, dia niainga izy ka nidina nankany amin'ny tanim-boalobok'i Nabota Jezirelita mba haka ny tany ho azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny tenin''i Jehovah tonga tamin''i Elia Tisbita ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Miaingà, ka midìna hihaona amin''i Ahaba, mpanjakan''ny Isiraely, izay ao Samaria; indro, ao amin''ny tanim-boalobok''i Nabota izy, fa lasa nankao izy mba haka ny tany ho azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa mitenena aminy hoe: Izao no Jazain''i Jehovah: Efa namono va ianao ka efa naka ho anao koa? Ary ianao dia hiteny aminy hoe: Izao no lazain''i Jehovah: Ao amin''ny tany izay nilelafan''ny alika ny ran''i Nabota no hilelafan''ny alika ny rànao, dia ny rànao tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Ahaba tamin''i Elia: Azonao va aho, ry ilay fahavaloko? Ary Elia namaly hoe: Azoko ianao, satria ianao efa nivaro-tena hanao izay ratsy eo imason''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Indro, hahatonga loza aminao Aho ka handringana ny taranakao, ary ho fongotra ny lehilahy rehetra amin''ny taranak''i Ahaba, na ny voahazona na ny afaka amin''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny taranakao hataoko tahaka ny taranak''i Jeroboama, zanak''i Nebata, sy tahaka ny taranak''i Basa, zanak''i Ahia, noho ny nampirehetanao ny fahatezerako sy ny nampanotanao ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny amin''i Jezebela koa dia nolazain''i Jehovah hoe: Ny alika hihinana an''i Jezebela eny ivelan''ny màndan''i Jezirela. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay tamingan''i Ahaba maty ao an-tanàna dia hohanin''ny alika; ary izay tamingany maty any an-tsaha kosa dia hohanin''ny voro-manidina. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa tsy nisy tahaka an''i Ahaba,izay nivarotena hanao izay ratsy eo imason''i Jehovah, satria nampirisihin''i Jezebela vadiny izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary izy nanao vetaveta loatra tamin'ny 1 nanarahany ny sampy, dia tahaka izay rehetra nataon'ny Amorita. izay noroahin'i Jehovah teo anoloan'ny Zanak'Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary rehefa ren''i Ahaba izany teny izany, dia nandriatra ny fitafiany izy ka nitafy lamba fisaonana nataony manolo-koditra sady nifady hanina sy nandry tamin-damba fisaonana ary nijoretra teny am-pandehanana. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny tenin''i Jehovah tonga tamin''i Elia Tisbita ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hitanao va ny nanetren'i Ahaba tena teo anatrehako? Satria nanetry tena teo anatrehako izy. dia tsy hahatonga loza aminy Aho amin'ny androny; fa any amin'ny andron'ny zanany vao hahatonga loza amin'ny taranany Aho.
