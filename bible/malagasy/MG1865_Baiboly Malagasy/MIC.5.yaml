document_id: MIC.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hahaterahan'ny Mesia, sy ny ho toetry ny fanjakany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ianao, ry Betlehema Efrata, Izay kely tsy tokony ho isan''ny arivon''i Joda akory, Dia avy ao aminao no hivoahan''Izay anankiray ho Mpanapaka ho Ahy ao amin''ny Isiraely; Hatry ny fahagola no efa nivoahany, dia hatrizay hatrizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Koa dia hatolony ireny, Ambara-pihavin'ny fotoana hiterahan'izay anankiray hiteraka; Ary izay sisa amin'ny rahalahiny dia hiverina mbamin'2
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho any'
    marker-yv: yv-n
  - type: text
    text: ' ny Zanak''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hitsangana Izy hiandry ny ondriny amin''ny herin''i Jehovah. Sy amin''ny voninahitry ny anaran''i Jehovah Andriamaniny, Ka handry fahizay ireny, Fa izao dia ho lehibe hatrany amin''ny faran''ny tany Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Izy no ho fiadanana; Raha tonga eto amin''ny tanin-tsika ny Asyriana Ka miditra ao amin''ny tranobentsika, Dia hanangana mpiandry ondry fito sy mpanapaka valo hisakana azy isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary handany ny tany Asyria amin'ny sabatra Sy ny tanin'i Nimroda ao an-tanànany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. am-bavahadiny
    marker-yv: yv-n
  - type: text
    text: ' ireo; Ary Izy hamonjy amin''ny Asyriana, Raha tonga amin''ny tanintsika sady manitsaka ato amin''ny fari-tanintsika ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izay sisa amin''i Jakoba ao amin''ny firenena maro Dia ho tahaka ny ando avy amin''i Jehovah, Sy tahaka ny ranonorana eny amin''ny ahitra, Izay tsy manantena mpaniraka, Na miandry zanak''olombelona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izay sisa amin''i Jakoba ao amin''ny jentilisa, Ao amin''ny firenena maro, Dia ho tahaka ny liona amin''ny biby any an''ala, Sy ho tahaka ny liona tanora ao amin''ny andian''ny ondry aman''osy: Raha mamaky eo izy, dia manitsakitsaka sy mamiravira, ka tsy misy mahavonjy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aoka haingaina amin''ny rafilahinao ny tananao, Ary aoka ho ringana ny fahavalonao rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary amin''izany andro izany, hoy Jehovah, Dia haringako tsy ho eo aminao intsony ny soavalinao, Ary hofonganiko ny kalesinao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hofoanako ny tanàna amin''ny taninao, Ary harodako ny tanànanao mimanda rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hofoanako tsy hisy amin''ny tananao ny fankatovanao, Ary tsy hanana mpanandro intsony ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hofoanako tsy hisy aminao koa ny sampinao voasokitra Sy ny tsangam-baton-tsampinao; Ary tsy hiankohoka eo anatrehan''ny asan''ny tananao intsony ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hongotako tsy ho eo aminao ny Aserahanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Anaran'andriamani-tsy-izy, na ny sariny
    marker-yv: yv-n
  - type: text
    text: ; Ary horavako koa ny tanànanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: haringako koa ny fahavalonao'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny fahatezerana sy ny fahavinirana no hamaliako ny firenena izay tsy mihaino.
