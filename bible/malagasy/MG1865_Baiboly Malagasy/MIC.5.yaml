document_id: MIC.5,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hahaterahan'ny Mesia, sy ny ho toetry ny fanjakany
  - type: text
    content: 'Fa ianao, ry Betlehema Efrata, Izay kely tsy tokony ho isan''ny arivon''i Joda akory, Dia avy ao aminao no hivoahan''Izay anankiray ho Mpanapaka ho Ahy ao amin''ny Isiraely; Hatry ny fahagola no efa nivoahany, dia hatrizay hatrizay. '
  '10':
  - type: text
    content: 'Hofoanako ny tanàna amin''ny taninao, Ary harodako ny tanànanao mimanda rehetra; '
  '11':
  - type: text
    content: 'Hofoanako tsy hisy amin''ny tananao ny fankatovanao, Ary tsy hanana mpanandro intsony ianao. '
  '12':
  - type: text
    content: 'Hofoanako tsy hisy aminao koa ny sampinao voasokitra Sy ny tsangam-baton-tsampinao; Ary tsy hiankohoka eo anatrehan''ny asan''ny tananao intsony ianao. '
  '13':
  - type: text
    content: Hongotako tsy ho eo aminao ny Aserahanao
  - type: note
    content: Anaran'andriamani-tsy-izy, na ny sariny
  - type: text
    content: ; Ary horavako koa ny tanànanao
  - type: note
    content: 'Na: haringako koa ny fahavalonao'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Ary ny fahatezerana sy ny fahavinirana no hamaliako ny firenena izay tsy mihaino.
  '2':
  - type: text
    content: Koa dia hatolony ireny, Ambara-pihavin'ny fotoana hiterahan'izay anankiray hiteraka; Ary izay sisa amin'ny rahalahiny dia hiverina mbamin'2
  - type: note
    content: 'Na: ho any'
  - type: text
    content: ' ny Zanak''Isiraely. '
  '3':
  - type: text
    content: 'Ary hitsangana Izy hiandry ny ondriny amin''ny herin''i Jehovah. Sy amin''ny voninahitry ny anaran''i Jehovah Andriamaniny, Ka handry fahizay ireny, Fa izao dia ho lehibe hatrany amin''ny faran''ny tany Izy. '
  '4':
  - type: text
    content: 'Ary Izy no ho fiadanana; Raha tonga eto amin''ny tanin-tsika ny Asyriana Ka miditra ao amin''ny tranobentsika, Dia hanangana mpiandry ondry fito sy mpanapaka valo hisakana azy isika. '
  '5':
  - type: text
    content: Ary handany ny tany Asyria amin'ny sabatra Sy ny tanin'i Nimroda ao an-tanànany
  - type: note
    content: Heb. am-bavahadiny
  - type: text
    content: ' ireo; Ary Izy hamonjy amin''ny Asyriana, Raha tonga amin''ny tanintsika sady manitsaka ato amin''ny fari-tanintsika ireny. '
  '6':
  - type: text
    content: 'Ary izay sisa amin''i Jakoba ao amin''ny firenena maro Dia ho tahaka ny ando avy amin''i Jehovah, Sy tahaka ny ranonorana eny amin''ny ahitra, Izay tsy manantena mpaniraka, Na miandry zanak''olombelona. '
  '7':
  - type: text
    content: 'Ary izay sisa amin''i Jakoba ao amin''ny jentilisa, Ao amin''ny firenena maro, Dia ho tahaka ny liona amin''ny biby any an''ala, Sy ho tahaka ny liona tanora ao amin''ny andian''ny ondry aman''osy: Raha mamaky eo izy, dia manitsakitsaka sy mamiravira, ka tsy misy mahavonjy. '
  '8':
  - type: text
    content: 'Aoka haingaina amin''ny rafilahinao ny tananao, Ary aoka ho ringana ny fahavalonao rehetra. '
  '9':
  - type: text
    content: 'Ary amin''izany andro izany, hoy Jehovah, Dia haringako tsy ho eo aminao intsony ny soavalinao, Ary hofonganiko ny kalesinao, '
