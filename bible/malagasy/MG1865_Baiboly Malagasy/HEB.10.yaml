document_id: HEB.10,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny famporisihana sy fananarana ho an'izay nihamalaina ka mila hihemotra
  - type: text
    content: 'Fa ny lalàna, izay misy aloky ny zava-tsoa ho avy, fa tsy ny tena endrik''izany zavatra izany, dia tsy mba mahatanteraka ny olona manatona amin''izay fanatitra ateriny mandrakariva isan-taona. '
  '10':
  - type: text
    content: 'Amin''izany sitrapo izany no nanamasinana antsika tamin''ny nanaterana ny tenan''i Jesosy Kristy indray mandeha. '
  '11':
  - type: text
    content: 'Ary ny mpisorona rehetra dia mitsangana isan''andro manao fanompoam-pivavahana sy manatitra ireny fanatitra ireny ihany matetika izay tsy mahaisotra ny ota; '
  '12':
  - type: text
    content: fa Izy kosa, rehefa nanao fanatitra iray monja ho mandrakizay noho ny ota, dia efa mipetraka
  - type: note
    content: 'Na: noho ny ota, dia efa mipetraka mandrakizay'
  - type: text
    content: ' eo an-tanana ankavanan''Andriamanitra, '
  '13':
  - type: text
    content: 'ka hatramin''izao dia miandry Izy mandra-panaony ny fahavalony ho fitoeran-tongony. '
  '14':
  - type: text
    content: 'Fa ny fanatitra iray ihany no efa nahatanterahany ho mandrakizay izay olona hamasinina. '
  '15':
  - type: text
    content: 'Ary ny Fanahy Masina koa manambara izany amintsika; fa rehefa voalazany hoe: '
  '16':
  - type: text
    content: '"Izao no fanekena hataoko aminy, Rehefa afaka izany andro izany, hoy Jehovah: Hataoko ao am-pony ny lalàko, Sady hosoratako ao an-tsainy," '
  '17':
  - type: text
    content: 'dia hoy koa Izy: "Ny fahotany sy ny helony tsy hotsarovako intsony" (Jer. 31.33, 34). '
  '18':
  - type: text
    content: Ary rehefa misy famelana ireo, dia tsy misy fanatitra noho ny ota intsony.
  '19':
  - type: text
    content: 'Koa amin''izany, ry rahalahy. satria manana fahatokiana hiditra ao amin''ny fitoerana masina isika noho ny ran''i Jesosy, '
  '2':
  - type: text
    content: 'Raha izany, dia tsy ho nitsahatra va ny nanaterany ireo, satria rehefa nodiovina indray mandeha ny mpivavaka, dia tsy ho nasian''ny fieritreretany ny ota intsony izy? '
  '20':
  - type: text
    content: 'amin''izay lalana natokany ho antsika, dia lalana vaovao sady velona, namaky teo amin''ny efitra lamba, dia ny nofony, '
  '21':
  - type: text
    content: 'sady manana Mpisorona lehibe mitandrina ny tranon''Andriamanitra, '
  '22':
  - type: text
    content: dia aoka isika hanatona amin'ny fo marina sy amin'ny fahatokiana be avy amin'ny finoana, manana fo voadio
  - type: note
    content: Gr. voafafy
  - type: text
    content: ' ho afaka amin''ny fieritreretana ratsy sy tena voasasa tamin''ny rano madio; '
  '23':
  - type: text
    content: 'aoka hohazonintsika mafy ny fanekena ny fanantenana mba tsy hihozongozonany (fa mahatoky Ilay efa nanao ny teny fikasana); '
  '24':
  - type: text
    content: 'ary aoka isika hifampandinika hampandroso ny fitiavana sy ny asa tsara; '
  '25':
  - type: text
    content: 'aza mahafoy ny fiarahantsika miangona, tahaka ny fanaon''ny sasany, fa mifananara kosa, mainka satria hitanareo fa mihantomotra ny andro. '
  '26':
  - type: text
    content: 'Fa raha minia manota isika rehefa nahazo ny fahalalana tsara ny marina, dia tsy misy fanatitra noho ny ota intsony, '
  '27':
  - type: text
    content: 'fa fiandrasana mahatahotra amin''ny fitsarana ary fahatezerana mirehitra izay handany ny fahavalo rehetra kosa. '
  '28':
  - type: text
    content: 'Izay manohitra ny lalàn''i Mosesy dia maty amin''ny tenin''ny vavolombelona roa na telo ka tsy asiana famindram-po; '
  '29':
  - type: text
    content: 'manao ahoana kosa ary no hamafin''ny fampijaliana ataonareo tokony hihatra amin''izay nanitsaka ny Zanak''Andriamanitra ka nanao ny ran''ny fanekena izay nanamasinana azy ho zavatra tsy masina sady naniratsira ny Fanahin''ny fahasoavana? '
  '3':
  - type: text
    content: 'Fa amin''ireo dia misy fahatsiarovana ny ota isan-taona. '
  '30':
  - type: text
    content: 'Fa fantatsika Izay nanao hoe: "Ahy ny famaliana; Izaho no hamaly;" ary koa: "Jehovah hitsara ny olony" (Deo. 32.35, 36). '
  '31':
  - type: text
    content: 'Zavatra mahatahotra ny ho azon''ny tànan''Andriamanitra velona. '
  '32':
  - type: text
    content: 'Fa tsarovy ny andro fahiny izay naharetanareo ny ady mafy tamin''ny fahoriana, rehefa nohazavaina ianareo; '
  '33':
  - type: text
    content: 'indraindray raha natao ho fizaha noho ny fanaratsiana sy ny fampahoriana ianareo, ary indraindray koa raha tonga naman''izay azon''izany. '
  '34':
  - type: text
    content: Fa sady niara-niaritra tamin'izay nifatotra ianareo no nifaly raha norobaina ny fanananareo, satria fantatrareo fa ianareo dia manana fananana tsara lavitra sady maharitra
  - type: note
    content: 'Na: fa ianareo dia manana ny tenanareo ho fananana tsara lavitra sady maharitra'
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Koa aza manary ny fahasahianareo izay misy valiny lehibe. '
  '36':
  - type: text
    content: 'Fa tokony hanana faharetana ianareo raha hahazoanareo izay lazain''ny teny fikasana, rehefa vitanareo ny sitrapon''Andriamanitra. '
  '37':
  - type: text
    content: 'Fa "rehefa afaka kelikely, Dia ho tonga Ilay ho avy, fa tsy hitaredretra" '
  '38':
  - type: text
    content: Ary "ny oloko marina
  - type: note
    content: ny marina
  - type: text
    content: ' dia ho velon''ny finoana;" Fa raha mihemotra izy, dia tsy sitraky ny fanahiko (Hab. 2.3, 4). '
  '39':
  - type: text
    content: Fa isika tsy mba naman'izay mihemotra ho amin'ny fahaverezana, fa naman'izay mino ho amin'ny famonjena ny fanahy.
  '4':
  - type: text
    content: 'Fa tsy mahaisotra ny ota ny ran''ombilahy sy ny ran''osilahy. '
  '5':
  - type: text
    content: 'Koa nony niditra tamin''izao fiainana izao Izy, dia nanao hoe: "Ny fanatitra alatsa-drà sy ny fanatitra hohanina tsy mba nilainao, Fa tena no namboarinao ho Ahy; '
  '6':
  - type: text
    content: 'Ny fanatitra odorana sy ny fanatitra noho ny ota tsy sitrakao; '
  '7':
  - type: text
    content: 'Dia hoy Izaho: Inty Aho tonga - Ao amin''ny horonam-boky no nanoratana Ahy -Hanao ny sitraponao, Andriamanitra ô". (Sal. 40.6-8). '
  '8':
  - type: text
    content: 'Rehefa nolazainy teo hoe: "Ny fanatitra alatsa-drà sy ny fanatitra hohanina sy ny fanatitra odorana ary ny fanatitra noho ny ota" (dia ireny aterina araka ny lalàna) "no tsy ilainao ary tsy sitrakao", '
  '9':
  - type: text
    content: 'dia hoy indray Izy: "Inty Aho tonga hanao ny sitraponao." Manaisotra ny voalohany Izy mba hampitoerany ny faharoa. '
