document_id: EST.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny alahelon'ny Jiosy, ary ny nataon'i Mordekay sy Estera mba tsy hahatanterahan'i Hamana izay nokasainy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nony fantatr''i Mordekay izay rehetra efa natao, dia nandriatra ny fitafiany izy ka nitafy lamba fisaonana sady nihosin-davenona, dia nankeo afovoan''ny tanàna ka nitaraina sy nidradradradra mafy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa Estera naniraka an''i Hatàka indray hanao amin''i Mordekay hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny mpanompon''ny mpanjaka rehetra sy ny olona isan-tokony eran''ny fanjakany dia samy mahalala fa na iza na iza mankeo amin''ny mpanjaka ho eo an-kianja anatiny, na lehilahy na vehivavy, nefa tsy nantsoina, dia misy lalàna iray ihany hahafaty azy, afa-tsy izay hotondroin''ny mpanjaka amin''ny tehim-bolamena hahavelona azy; ary izaho anefa dia tsy mbola nantsoina hiditra ao amin''ny mpanjaka intsony telo-polo andro izay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nolazaina tamin''i Mordekay ny tenin''i Estera. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary Mordekay nampitondra valiny ho amin''i Estera hoe: Aza manao anakampo fa ho afaka mihoatra noho ny Jiosy rehetra ianao, saingy ao an-tranon''ny mpanjaka; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa raha hangina mihitsy ianao amin''izao andro izao, dia hisy fahafahana sy famonjena hiseho avy amin''ny fitoerana hafa ho an''ny Jiosy, fa ianao sy ny mpianakavin-drainao kosa dia haringana; ary iza no mahalala, fa angamba ho amin''izao andro izao mihitsy no nanandratana anao ho amin''ny fanjakana? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nampitondra valiny ho any amin''i Mordekay indray Estera ka nanao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mandehana ary, vorio ny Jiosy rehetra izay mba ato Sosana ary mifadia hanina noho ny amiko, ka aza mihinana na misotro hateloana na andro na alina; ary izaho sy ny ankizivaviko hifady toy izany koa, ary amin''izany no hidirako ao amin''ny mpanjaka, na dia tsy araka ny lalàna aza; koa raha tàhiny maty aho, dia maty. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dia lasa Mordekay ka nanao araka izay rehetra nandidian'i Estera azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary tonga teo anoloan''ny vavahadin''ny mpanjaka aza izy; nefa tsy nisy nahazo niditra teo amin''ny vavahadin''ny mpanjaka, raha nitafy lamba fisaonana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary tany amin''ny isan-tokony tamin''ny fanjakana rehetra nalehan''ny tenin''ny mpanjaka sy ny didiny dia nalahelo mafy ny Jiosy ka nifady hanina sy nitomany ary nidradradradra, sady maro no nandry tamin''ny lamba fisaonana aman-davenona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary niditra ny ankizivavin'i Estera sy ny tsindranolahiny
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ionoka
      marker-yv: yv-n
    - type: text
      text: ' ka nilaza izany taminy. Dia nalahelo indrindra ny vadin''ny mpanjaka, ka nampanatitra lamba hitafin''i Mordekay izy mba hanesorany ny lamba fisaonana taminy; nefa tsy nety nandray izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Estera niantso an''i Hatàka, tsindranolahin'' ny mpanjaka, izay notendreny hanompo azy, ka nampitondra teny azy ho any amin''i Mordekay, mba hahafantarany izay anton''izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nivoaka Hatàka nankany amin''i Mordekay ho eo an-kalalahana eo an-tanàna, dia ilay eo anoloan''ny vavahadin''ny mpanjaka; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'dia nambaran''i Mordekay taminy izay rehetra efa nanjo azy sy ny isan''ny vola izay nokasain''i Hamana haloa ho ao an-trano firaketan''ny mpanjaka noho ny handringanana ny Jiosy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nomeny azy koa ny kopen''ny lalàna, izay nantsoina tany Sosana handringanana azy, mba haseho amin''i Estera hampahafantatra azy izany sy handidy azy hiditra ao amin''ny mpanjaka mba hifona aminy sy hangataka eo anatrehany ho an''ny fireneny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary tonga Hatàka ka nanambara ny tenin''i Mordekay tamin''i Estera. '
