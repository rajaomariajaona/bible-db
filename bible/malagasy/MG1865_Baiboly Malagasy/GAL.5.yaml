document_id: GAL.5,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famporisihana ny Galatiana tsy hahavery ny fahafahany, fa hazoto handroso amin'ny fitondran-tena tsara
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho amin'ny fahafahana no nanafahan'i Kristy antsika; ka tomoera tsara, fa aza mety hohazonin'ny zioga fanandevozana intsony.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho matoky anareo ao amin'ny Tompo fa tsy hisaina zavatra hafa akory ianareo; fa ilay mampitabataba anareo no hiharan'ny fanamelohana, na zovy na zovy izy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izaho, ry rahalahy, raha mbola mitory ny famorana ihany, nahoana aho no mbola enjehina? Dia afaka tokoa ny fahatafintohinana noho ny hazo fijaliana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enga anie ka hiesotra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hanakilema tena'
      marker-yv: yv-n
    - type: text
      text: ' aza izay mampitabataba anareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa nantsoina ho amin''ny fahafahana ianareo, ry rahalahy; kanefa aoka tsy ho entinareo hanaraka ny nofo izany fahafahana izany, fa mifampanompoa amin''ny fitiavana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tanteraka amin''ny teny iray ihany ny lalàna rehetra, dia izao: Tiava ny namanao tahaka ny tenanao (Lev. 19. 18). '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mifandramatra sy mifampihinana ianareo, tandremo fandrao mifandringana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izaho: Mandehana araka ny Fanahy, dia tsy hahatanteraka ny filan''ny nofo ianareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny nofo manohitra ny Fanahy, ary ny Fanahy manohitra ny nofo; ary mifanohitra izy roroa, mba tsy hahazoanaroeo manao izay zavatra tianareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tarihin''ny Fanahy ianareo, dia tsy mba ambanin''ny lalàna. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa miharihary ny asan''ny nofo, dia izao: Fijangajangana, fahalotoana, fijejojejoana, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, izaho Paoly milaza aminareo fa raha mety hoforana ianareo, dia tsy hahasoa anareo na dia kely akory aza Kristy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fanompoan-tsampy, fanaovana ody ratsy, fandrafiana, fifandirana, adi-lahy, fiafonafonana, fifampiandaniana, fisarahana, fitokoana, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fialonana, fahamamoana, filalaovan-dratsy, ary ny toy izany, izay lazaiko aminareo rahateo, tahaka ny voalazako fahiny koa, fa izay manao izany dia tsy handova ny fanjakan''Andriamanitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny vokatry ny Fanahy kosa dia fitiavana, fifaliana, fiadanana, fahari-po fahamoram-panahy, fanaovan-tsoa, fahamarinana, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fahalemem-panahy, fahononam-po; tsy misy lalàna manohitra izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay an''Kristy Jesosy dia efa nanombo ny nofony mbamin''ny faniriany sy ny filany tamin''ny hazo fijaliana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha velon''ny Fanahy isika, dia aoka handeha araka ny Fanahy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka isika tsy handrani-tena foana ka hifampihaika sy hifampialona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lazaiko marina indray amin''ny olona manaiky hoforana rehetra fa mpitrosa tsy maintsy mankatò ny lalàna rehetra izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tafasaraka amin''i Kristy ianareo na iza na iza izay mitady hohamarinina amin''ny lalàna; efa lavo niala tamin''ny fahasoavana ianareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izahay amin'ny Fanahy sy noho ny finoana dia miandry ny fanantenana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanantenan'''
      marker-yv: yv-n
    - type: text
      text: ' ny fahamarinana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ao amin''i Kristy Jesosy dia tsy mahasoa na ny famorana na ny tsi-famorana, fa ny finoana izay miasa amin''ny fitiavana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianareo nihazakazaka tsara, iza no nisakana anareo tsy hanaiky ny marina? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany fitaomana izany dia tsy avy tamin''ilay miantso anareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny masirasira kely dia mahatonga ny vongana rehetra ho masirasira avokoa. '
