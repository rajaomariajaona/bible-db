document_id: PSA.10,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fitarainana sy fangataham-pamonjena noho ny fireharehan'ny ratsy
  - type: text
    content: Jehovah ô, nahoana no mijanona eny lavitra eny Hianao ka miery amin'ny andro fahoriana?
  '10':
  - type: text
    content: 'Torotoro sy mitanondrika ny mahantra ka lavo amin''ny herin''ny ratsy fanahy. '
  '11':
  - type: text
    content: 'Hoy izy anakampony: efa nanadino Andriamanitra, efa nanafina ny tavany Izy ka tsy hahita mandrakizay.'
  '12':
  - type: text
    content: 'Mitsangàna, Jehovah ô; Andriamanitra ô, atsangano ny tananao, aza manadino ny ory. '
  '13':
  - type: text
    content: 'Nahoana no mamingavinga an''Andriamanitra ny ratsy fanahy ka manao anakampo hoe: Tsy hanadina Hianao? '
  '14':
  - type: text
    content: 'Efa nahita ihany Hianao, satria mijery fahoriana sy alahelo, mba hovalian''ny tananao. Hianao no iononan''ny mahantra; Hianao no Mpamonjy ny kamboty. '
  '15':
  - type: text
    content: Torotoroy ny sandrin'ny ratsy fanahy; ary adino ny heloky ny mpanao ratsy mandra-paha-tsy hisy hitanao intsony.
  '16':
  - type: text
    content: 'Jehovah no Mpanjaka mandrakizay doria; voafongotra tsy ho amin''ny taniny intsony ny jentilisa. '
  '17':
  - type: text
    content: 'Efa nohenoinao, Jehovah ô, ny irin''ny mpandefitra; mampiomana ny fony Hianao sady mampihaino ny sofinao, '
  '18':
  - type: text
    content: Hanomezanao rariny ny kamboty sy ny mahantra, mba tsy handroso hampitahotra intsony ny zanak'olombelona etỳ an-tany.
  '2':
  - type: text
    content: Noho ny fireharehan'ny ratsy fanahy dia enjehina mafy ny malahelo
  - type: note
    content: 'Na: miolomay manenjika ny malahelo izy'
  - type: text
    content: '; azon''ny fahendrena nataony izy ireny. '
  '3':
  - type: text
    content: 'Ny ratsy fanahy mandoka izay irin''ny fony; ary ny mpierina mahafoy sy manamavo an''i Jehovah. '
  '4':
  - type: text
    content: 'Ny ratsy fanahy mirehareha hoe: Tsy hanadina Izy; eny, "Tsy misy Andriamanitra" no tontalin-keviny. '
  '5':
  - type: text
    content: Tanteraka
  - type: note
    content: Heb. Mahery
  - type: text
    content: ' mandrakariva ny alehany; any amin''ny avo lavitra azy ny fitsarànao; ny mpandrafy azy rehetra dia ataony hoe: zinona ireny? '
  '6':
  - type: text
    content: 'Hoy izy am-pony: tsy hangozohozo aho, tsy ho azon-doza mandrakizay doria aho. '
  '7':
  - type: text
    content: 'Feno ozona sy fitaka ary fanaovana an-keriny ny vavany; ao ambanin''ny lelany dia misy fampahoriana sy faharatsiana. '
  '8':
  - type: text
    content: 'Mamitsaka amin''ny fanotrehana ao an-tanàna izy, ao an-katakonana no amonoany ny marina; ny masony mikendry ny mahantra. '
  '9':
  - type: text
    content: 'Manotrika ao an-katakonana tahaka ny liona ao amin''ny famitsahany izy; manotrika hisambotra ny malahelo izy; fandrihany amin''ny haratony no fisambony ny malahelo. '
