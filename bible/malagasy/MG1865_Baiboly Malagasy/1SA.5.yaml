document_id: 1SA.5,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namelezan'Andriamanitra ny Filistina noho ny namaboany ny fiara, sy ny namerenan'ny Filistina azy
  - type: text
    content: 'Dia nalain''ny Filistina ny fiaran''Andriamanitra ka nentiny niala tany Ebenezera ho any Asdoda. '
  '10':
  - type: text
    content: 'Ary dia naterin''ny olona nankany Ekrona ny fiaran''Andriamanitra. Ary raha vao tonga tany Ekrona ny fiaran''Andriamanitra, dia nitaraina ny Ekronita nanao hoe: Efa nafindran''ny olona ho atỳ amintsika ny fiaran''ny Andriamanitry ny Isiraely hahafaty antsika sy ny firenentsika. '
  '11':
  - type: text
    content: 'Dia naniraka olona izy ka nanangona ireo andriana rehetra tamin''ny Filistina ka nanao hoe: Ampandehano ny fiaran''ny Andriamanitry ny Isiraely, ary aoka ho entina ho any amin''ny fitoerany ihany indray izy mba tsy hahafaty antsika sy ny firenentsika; fa nanerana ny tanàna ny horohoron''ny fahafatesana, fa navesatra indrindra tao ny tànan''Andriamanitra. '
  '12':
  - type: text
    content: Ary ny olona izay tsy maty dia voan'ny vay kosa, ka ny fitarainan'ny tao an-tanàna dia niakatra ho any an-danitra.
  '2':
  - type: text
    content: 'Ary nony efa azon''ny Filistina ny fiaran''Andriamanitra, dia nentiny tao an-tranon''i Dagona izy ka napetrany teo anilany. '
  '3':
  - type: text
    content: 'Ary nony ampitson''iny dia nifoha maraina koa ny Asdodita, ka indro Dagona potraka niankohoka tamin''ny tany teo anoloan''ny fiaran''i Jehovah; dia narenin''ny olona izy ka napetrany teo amin''ny fitoerany indray. '
  '4':
  - type: text
    content: 'Ary nony ampitson''iny indray dia nifoha maraina koa ny olona, ka indro Dagona potraka niankohoka indray tamin''ny tany teo anoloan''ny fiaran''i Jehovah, ary tapaka teo amin''ny tokonam-baravarana ny lohan''i Dagona sy ny felatanany roa; fa ny tenabeny ihany no sisa '
  '5':
  - type: text
    content: 'izany no tsy anitsahan''ny mpisoron''i Dagona, na izay miditra ao an-tranony, ny tokonam-baravaran''i Dagona ao Asdoda mandraka androany). '
  '6':
  - type: text
    content: 'Ary navesatra tamin''ny Asdodita ny tànan''i Jehovah, fa nandringana azy Izy; ary nasiany vay ny tao Asdoda sy ny tamin''ny fari-taniny rehetra. '
  '7':
  - type: text
    content: 'Ary rehefa hitan''ny mponina tao Asdoda fa nisy izany, dia hoy izy: Aza avela hitoetra eto amintsika ny fiaran''ny Andriamanitry ny Isiraely; fa mavesatra amintsika sy amin''i Dagona andriamanitsika ny tànany. '
  '8':
  - type: text
    content: 'Dia naniraka olona izy ka nanangona ireo andriana rehetra tamin''ny Filistina hankeo aminy ka nanao hoe: Hataontsika ahoana ny fiaran''ny Andriamanitry ny Isiraely? Dia hoy ireo: Aoka hafindra hankany Gata ny fiaran''ny Andriamanitry ny Isiraely. Dia nafindrany ny fiaran''ny Andriamanitry ny Isiraely. '
  '9':
  - type: text
    content: Ary rehefa voafindrany ny fiara, dia namely ny tanàna ny tànan'i Jehovah ka nampangorohoro azy indrindra, fa Izy namely ny mponina tao an-tanàna, na kely na lehibe, ka nisy vay nipoipoitra taminy.
