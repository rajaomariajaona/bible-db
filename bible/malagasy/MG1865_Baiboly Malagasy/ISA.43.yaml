document_id: ISA.43,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hamindran'i Jehovah fo amin'ny Isiraely, sy ny hampodiany azy avy amin'ny fahababoana, ary ny hampidinany ny Fanahiny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny, ry Jakoba ô, izao no lazain''i Jehovah, Izay nahary anao sady namorona anao, ry Isiraely ô: Aza matahotra ianao, fa efa nanavotra anao Aho; Efa niantso ny anaranao Aho, Ahy ianao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianareo no vavolombeloko, hoy Jehovah, sady mpanompoko izay efa nofidiko, Mba hahafantaranareo sy hinoanareo Ahy ka ho azonareo tsara fa Izaho no Izy; Talohako dia tsy nisy andriamanitra voaforona, sady tsy hisy handimby Ahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho dia Izaho ihany no Jehovah Ary tsy misy Mpamonjy afa-tsy Izaho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho efa nilaza sy namonjy ary nanambara, ary tsy nisy hafa tao aminareo; Dia ianareo no vavolombeloko, hoy Jehovah, ary Izaho no Andriamanitra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, hatramin'izary andro izany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Hatrizay nisian''ny andro'
      marker-yv: yv-n
    - type: text
      text: ' Izaho no Izy, Ary tsy misy maharombaka amin''ny tanako; Miasa Aho, ka iza moa no mahasakana izany?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah, Mpanavotra anareo, dia ny Iray Masin''ny Isiraely: Noho ny aminareo no nanirahako tany Babylona, ary hampidiniko izy rehetra mbamin'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia'
      marker-yv: yv-n
    - type: text
      text: '''ny Kaldeana ho mpandositra ho any amin''ny sambo izay efa nifaliany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho no Jehovah, Iray Masinareo, Mpamorona ny Isiraely sady Mpanjakanareo.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah, Izay manao lalana eny amin''ny ranomasina sy lalan-kaleha eny amin''ny rano manonja, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mamoaka ny kalesy sy ny soavaly, ny miaramila sy ny lehilahy miara-mandry avokoa izy ka tsy hiarina intsony, mitsilopilopy izy, ka dia maty toy ny jiro: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mahatsiaro ny lasa, na misaina ny taloha. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, Izaho efa hanao zava-baovao, koa ankehitriny dia efa miposaka izany tsy hahalala izany va ianareo? eny, any an-efitra no hanaovako lalana ary any amin''ny tany sao no hasiako ony; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mita ny rano ianao, dia homba anao Aho; Ary raha mita ny ony ianao, dia tsy hanafotra anao izy; Raha mandeha mamaky ny afo ianao, dia tsy ho may, Ary tsy hirehitra aminao ny lelafo; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hanome voninahitra Ahy ny bibi-dia sy ny amboadia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: jakala'
      marker-yv: yv-n
    - type: text
      text: ' ary ny ostritsa, satria manisy rano any an-efitra sy ony any amin''ny tany lao Aho, Hampisotroana ny oloko, dia ilay voafidiko. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao olona noforoniko ho Ahy izao no hanambara ny fiderana Ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa Izaho tsy mba nantsoinao, ry Jakoba; Fa sasatra amiko ianao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Na nisasaranao akory'
      marker-yv: yv-n
    - type: text
      text: ', ry Isiraely. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nitondranao ny zanak'ondry fanatitra doranao Aho, na nomenao voninahitra tamin'ny fanatitrao. Tsy nampahavesatra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nampanompo
      marker-yv: yv-n
    - type: text
      text: ' anao tamin''ny fanatitra Aho, na nanasatra anao tamin''ny ditin-kazo mani-pofona. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy nandoa vola namidy veromanitra ho Ahy ianao, na nahavoky Ahy tamin'ny saboran'ny fanatitrao; Fa nampahavesatra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nampanompo
      marker-yv: yv-n
    - type: text
      text: ' Ahy tamin''ny fahotanao kosa ianao sy nanasatra Ahy tamin''ny helokao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho dia Izaho no mamono ny fahadisoanao noho ny amin''ny tenako, ary tsy hotsarovako ny fahotanao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ampahatsiarovy Aho, ka avia isika hifandahatra; Alaharo ary ny teninao, mba hahitana izay mahamarina anao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny razambenao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. rainao
      marker-yv: yv-n
    - type: text
      text: ' voalohany indrindra dia efa nanota, ary ireny mpanalalana aminao efa niodina tamiko, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa izany no nanaovako ny mpanapaka masina ho tsy masina, sy nanolorako an'i Jakoba ho fandringana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. herema
      marker-yv: yv-n
    - type: text
      text: ' ary Isiraely ho latsa.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Izaho Jehovah no Andriamanitrao, Dia ny Iray Masin''ny Isiraely, Mpamonjy anao; Omeko ho avotrao Egypta, ary Etiopia sy Seba ho solonao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria malala eo imasoko ianao, eny, be voninahitra ianao sady tiako, dia olona no omeko ho solonao, ary firenena ho solon''ny ainao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mahatahotra, fa momba anao Aho; Hitondra ny taranakao avy any atsinanana Aho, ary avy any andrefana no hanangonako anao; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny avaratra hilazako hoe: Avoahy, ary ny atsimo hoe: Aza hazonina; Alao ny zanako-lahy avy lavitra sy ny zanako-vavy avy any amin''ny faran''ny tany, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia izay rehetra antsoina amin''ny anarako sady nohariko ho voninahitro, dia izay noforoniko sy nataoko. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ento mivoaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Entiko mivoaka'
      marker-yv: yv-n
    - type: text
      text: ' ny olona jamba mana-maso sy ny marenina manan-tsofina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka hiangona
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Miangona'
      marker-yv: yv-n
    - type: text
      text: ' ny firenena rehetra, Ary aoka hivory'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mivory'
      marker-yv: yv-n
    - type: text
      text: ' ny olombelona; Iza aminareo no mahalaza izany? Aoka hambarany amintsika ny fahiny taloha; Aoka ho entiny ny vavolombelony hahamarina azy; Ary aoka hihaino ireo ka hiaiky hoe: Marina izany. '
