document_id: 1CH.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak'i Abrahama sy Isaka ary Esao sy Jakoba
  - type: text
    content: 'Adama, Seta, Enosy, '
  '10':
  - type: text
    content: 'Ary Kosy niteraka an''i Nimroda; izy no voalohany izay tonga olona mahery teo ambonin''ny tany. '
  '11':
  - type: text
    content: 'Ary Mizraima niteraka ny Lodita sy ny Anamita sy ny Lehabita sy ny Naftohita '
  '12':
  - type: text
    content: 'sy ny Patrosita sy ny Kaslohita (izay nihavian''ny Filistina) ary ny Kaftorita. '
  '13':
  - type: text
    content: 'Ary Kanana niteraka an''i Sidona, lahimatoany, sy Heta '
  '14':
  - type: text
    content: 'ary ny Jebosita sy ny Amorita sy ny Girgasita '
  '15':
  - type: text
    content: 'sy ny Hivita sy ny Arkita sy ny Sinita '
  '16':
  - type: text
    content: sy ny Arvadita sy ny Zemarita ary ny Harnatita.
  '17':
  - type: text
    content: 'Ny zanakalahin''i Sema dia Elama sy Asyra sy Arpahada sy Loda sy Arama sy Oza sy Hola sy Gatera ary Maseka. '
  '18':
  - type: text
    content: 'Ary Arpaksada niteraka an''i Sela; ary Sela niteraka an''i Ebera. '
  '19':
  - type: text
    content: 'Ary Ebera niteraka roa lahy: ny anaran''ny iray natao hoe Palega'
  - type: note
    content: Palega = Fizarana
  - type: text
    content: ', satria tamin''ny androny no nizarana ny tany; ary Joktana no anaran''ny rahalahiny. '
  '2':
  - type: text
    content: 'Kenana, Mahalalila, Jareda, '
  '20':
  - type: text
    content: 'Ary Joktana niteraka an''i Almodada sy Salefa sy Hazarmaveta sy Jera '
  '21':
  - type: text
    content: 'sy Hadorama sy Ozala sy Dikla '
  '22':
  - type: text
    content: 'sy Ebala sy Abimaela sy Sheba '
  '23':
  - type: text
    content: 'sy Ofira sy Havila ary Jobaba; ireo rehetra ireo no zanakalahin''i Joktana. '
  '24':
  - type: text
    content: 'Sema, Arpaksada, Sela, '
  '25':
  - type: text
    content: 'Ebera, Palega, Reo, '
  '26':
  - type: text
    content: 'Seroga, Nahora, Tera, '
  '27':
  - type: text
    content: Abrama (dia Abrahama izany).
  '28':
  - type: text
    content: 'Ny zanakalahin''i Abrahama dia Isaka sy Isimaela. '
  '29':
  - type: text
    content: 'Izao no taranany: Nebaiota, lahimatoan''Isimaela, dia Kedara sy Abdela sy Mibsama '
  '3':
  - type: text
    content: 'Enoka, Metosela, Lameka, '
  '30':
  - type: text
    content: 'sy Misma sy Doma sy Masa sy Hadada sy Tema '
  '31':
  - type: text
    content: 'sy Jetora sy Nafisy ary Kedma. Ireo no zanakalahin''Isimaela. '
  '32':
  - type: text
    content: 'Ary ny zanakalahin''i Ketora, vaditsindranon''i Abrahama. Izy no niteraka an''i Zimrama sy Joksana sy Medana sy Midiana sy Jisbaka ary Soaha. Ary ny zanakalahin''i Joksana dia Sheba sy Dedana. '
  '33':
  - type: text
    content: Ary ny zanakalahin'i Midiana dia Efaha sy Efera sy Hanoka sy Abida ary Eldaha. Ireo rehetra ireo no zanakalahin'i Ketora.
  '34':
  - type: text
    content: 'Ary Abrahama niteraka an''Isaka. Ny zanakalahin''i Isaka dia Esao sy Isiraely. '
  '35':
  - type: text
    content: 'Ny zanakalahin''i Esao dia Elifaza sy Regoela sy Jeosy sy Jalama ary Kora. '
  '36':
  - type: text
    content: 'Ny zanak''i Elifaza dia Temana sy Omara sy Zefo sy Gatama sy Kenaza sy Timna ary Amaleka. '
  '37':
  - type: text
    content: Ny zanakalahin'i Regoela dia Nahata sy Zera sy Sama ary Miza.
  '38':
  - type: text
    content: 'Ary ny zanakalahin''i Seira dia Lotana sy Sobala sy Zibona sy Ana sy Disona sy Ezera ary Disana. '
  '39':
  - type: text
    content: 'Ary ny zanakalahin''i Lotana dia Hory sy Homama; ary Timna no anabavin''i Lotana. '
  '4':
  - type: text
    content: Noa, Sema, Hama ary Jafeta.
  '40':
  - type: text
    content: 'Ary ny zanakalahin''i Sobala dia Aliana sy Manahata sy Ebala sy Sefy ary Onama. Ary ny zanakalahin''i Zibona dia Aia sy Ana. '
  '41':
  - type: text
    content: 'Ary ny zanakalahin''i Ana dia Disona. Ary ny zanakalahin''i Disona dia Hamrana sy Esbana sa Jitrana ary Kerana. '
  '42':
  - type: text
    content: Ary ny zanakalahin i Ezera dia Bilana sy Zavana ary Jakana. Ny zanakalahin'i Disana dia Oza sy Arana.
  '43':
  - type: text
    content: 'Ary izao no mpanjaka izay nanjaka tany amin''ny tany Edoma, fony tsy mbola nisy mpanjaka nanjaka tamin''ny Zanak''Isiraely: Bela, zanak''i Beora; ary Dinaba no anaran''ny tanànany. '
  '44':
  - type: text
    content: 'Ary maty Bela, dia nanjaka nandimby azy Jobaba, zanak''i Zera, avy any Bozra. '
  '45':
  - type: text
    content: 'Ary maty Jobaba, dia nanjaka nandimby azy Hosama, avy any amin''ny tanin''ny Temanita. '
  '46':
  - type: text
    content: 'Ary maty Hosama, dia nanjaka nandimby azy Hadada, zanak''i Bedada, izay namely ny Midianita tany amin''ny tany Moaba; ary Avita no anaran''ny tanànany. '
  '47':
  - type: text
    content: 'Ary maty Hadada, dia nanjaka nandimby azy Samla avy any Masreka. '
  '48':
  - type: text
    content: 'Ary maty Samla, dia nanjaka nandimby azy Saoly avy any Rehobota eo amoron''ny Ony. '
  '49':
  - type: text
    content: 'Ary maty Saoly, dia nanjaka nandimby azy Bala-hanana, zanak''i Akbora. '
  '5':
  - type: text
    content: 'Ny zanakalahin''i Jafeta dia Gomera sy Magoga sy Maday sy Javana sy Tobala sy Maseta ary Tirasa. '
  '50':
  - type: text
    content: 'Ary maty Bala-hanana, dia nanjaka nandimby azy Hadada; ary Pao no anaran''ny tanànany; ary ny anaran''ny vadiny dia Mehetabela, zanakavavin''i Matreda, zanakavavin''i Me-zahaba. '
  '51':
  - type: text
    content: Dia maty koa Hadada. Ary ny loham-pirenen'i Edoma dia Timna loham-pireneny, Alva loham-pireneny, Jetata loham-pireneny,
  '52':
  - type: text
    content: 'Oholibama loham-pireneny, Elaha loham-pireneny, Pinona loham-pireneny, '
  '53':
  - type: text
    content: 'Kenaza loham-pireneny, Temana loham-pireneny, Mibzara loham-pireneny, '
  '54':
  - type: text
    content: Magdiela loham-pireneny, Irama loham-pireneny. Ireo no loham-pirenen'i Edoma.
  '6':
  - type: text
    content: 'Ary ny zanakalahin''i Gomera dia Askenaza sy Rifata ary Togarma. '
  '7':
  - type: text
    content: Ary ny zanakalahin'i Javana dia Elisaha sy Tarsisy sy ny Kitima ary ny Dodanita.
  '8':
  - type: text
    content: 'Ny zanakalahin''i Hama dia Kosy sy Mizraima sy Pota ary Kanana. '
  '9':
  - type: text
    content: 'Ary ny zanakalahin''i Kosy dia Seba sy Havila sy Sabta sy Ragarna ary Sabteka. Ary ny zanakalahin''i Ragama dia Seba sy Dedana. '
