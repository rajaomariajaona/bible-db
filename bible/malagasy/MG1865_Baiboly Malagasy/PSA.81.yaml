document_id: PSA.81
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana ny Isiraelita hifaly amin'Andriamanitra noho ny nitondràny azy nivoaka avy tany Egypta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Al-gitith. Nataon''i Asafa. Mihobia ho an''Andriamanitra herintsika; manaova feo fifaliana ho an''Andriamanitr''i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Asandrato ny hira, ka velezo ny ampongatapaka, ary tendreo ny lokanga mahafinaritra mbamin''ny valiha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsofy ny anjomara amin''ny volana; eny, amin''ny feno-volana, dia amin''ny andro firavoravoantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa lalàna ho an''ny Isiraely izany, ary fitsipik''Andriamanitr''i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Notendreny ho vavolombelona eo amin'i Josefa izany, raha nandeha namely ny tany Egypta Izy; nandre teny tsy fantatro aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nampiala ny sorony tamin''ny entana Aho; nitsahatra tsy nitondra sobiky ny tànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fony azom-pahoriana ianao, dia niantso Ahy, ka namonjy anao Aho; namaly anao tao amin''ny fiafenan''ny kotrokorana Aho, ary nizaha toetra anao tao amin''ny ranon''i Meriba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mihainoa, ry oloko, dia hambarako aminao; enga anie hihaino Ahy ianao, ry Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza asiana andriamani-kafa eo aminao; ary aza mivavaka amin''ny andriamanitry ny firenena hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izaho no Jehovah Andriamanitrao, Izay nitondra anao niakatra avy tany amin''ny tany Egypta; atanatanao ny vavanao, dia hofenoiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa tsy nihaino ny feoko ny oloko; ary ny Isiraely tsy nankato Ahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ka dia navelako hanaraka ny ditry ny fony Izy, handehanany manaraka ny fisainan'ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Enga anie ka hihaino Ahy ny oloko, dia handeha amin''ny lalako ny Isiraely; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vetivety dia hampietry ny fahavalony Aho, ka hamerina ny tanako hamely ny rafiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay mankahala an''i Jehovah dia hikoy aminy, ka dia haharitra mandrakizay ny andron''ny oloko; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hampihinana azy vary tsara indrindra Izy; eny, tantely avy amin'ny vatolampy no hamokisako anao.
