document_id: PSA.81,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana ny Isiraelita hifaly amin'Andriamanitra noho ny nitondràny azy nivoaka avy tany Egypta
  - type: text
    content: 'Ho an''ny mpiventy hira. Al-gitith. Nataon''i Asafa. Mihobia ho an''Andriamanitra herintsika; manaova feo fifaliana ho an''Andriamanitr''i Jakoba. '
  '10':
  - type: text
    content: 'Izaho no Jehovah Andriamanitrao, Izay nitondra anao niakatra avy tany amin''ny tany Egypta; atanatanao ny vavanao, dia hofenoiko. '
  '11':
  - type: text
    content: 'Fa tsy nihaino ny feoko ny oloko; ary ny Isiraely tsy nankato Ahy; '
  '12':
  - type: text
    content: Ka dia navelako hanaraka ny ditry ny fony Izy, handehanany manaraka ny fisainan'ny tenany.
  '13':
  - type: text
    content: 'Enga anie ka hihaino Ahy ny oloko, dia handeha amin''ny lalako ny Isiraely; '
  '14':
  - type: text
    content: 'Vetivety dia hampietry ny fahavalony Aho, ka hamerina ny tanako hamely ny rafiny; '
  '15':
  - type: text
    content: 'Izay mankahala an''i Jehovah dia hikoy aminy, ka dia haharitra mandrakizay ny andron''ny oloko; '
  '16':
  - type: text
    content: Ary hampihinana azy vary tsara indrindra Izy; eny, tantely avy amin'ny vatolampy no hamokisako anao.
  '2':
  - type: text
    content: 'Asandrato ny hira, ka velezo ny ampongatapaka, ary tendreo ny lokanga mahafinaritra mbamin''ny valiha. '
  '3':
  - type: text
    content: 'Tsofy ny anjomara amin''ny volana; eny, amin''ny feno-volana, dia amin''ny andro firavoravoantsika. '
  '4':
  - type: text
    content: 'Fa lalàna ho an''ny Isiraely izany, ary fitsipik''Andriamanitr''i Jakoba. '
  '5':
  - type: text
    content: Notendreny ho vavolombelona eo amin'i Josefa izany, raha nandeha namely ny tany Egypta Izy; nandre teny tsy fantatro aho.
  '6':
  - type: text
    content: 'Nampiala ny sorony tamin''ny entana Aho; nitsahatra tsy nitondra sobiky ny tànany. '
  '7':
  - type: text
    content: 'Fony azom-pahoriana ianao, dia niantso Ahy, ka namonjy anao Aho; namaly anao tao amin''ny fiafenan''ny kotrokorana Aho, ary nizaha toetra anao tao amin''ny ranon''i Meriba. '
  '8':
  - type: text
    content: 'Mihainoa, ry oloko, dia hambarako aminao; enga anie hihaino Ahy ianao, ry Isiraely. '
  '9':
  - type: text
    content: 'Aza asiana andriamani-kafa eo aminao; ary aza mivavaka amin''ny andriamanitry ny firenena hafa. '
