document_id: 2SA.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nataon'i Davida, rehefa nahare ny nahafatesan'i Saoly, sy ny hira fisaonana nentiny nisaona azy
  - type: text
    content: 'Ary nony maty Saoly, ary niverina avy namono ny Amalekita Davida, dia nitoetra indroa andro tao Ziklaga izy. '
  '10':
  - type: text
    content: Dia nanatona azy aho ka namono azy, satria fantatro fa tsy ho velona izy, rehefa resy
  - type: note
    content: Heb. lavo
  - type: text
    content: ', ka dia nalaiko ny satro-boninahiny teo an-dohany sy ny fehin-tanana teo amin''ny sandriny, ka nentiko etỳ amin''ny tompoko izany. '
  '11':
  - type: text
    content: 'Dia noraisin''i Davida ny fitafiany ka notriariny: ary dia mba nanao toy izany koa ny olona rehetra teo aminy. '
  '12':
  - type: text
    content: 'Ary nisaona sy nitomany sy nifady hanina ambara-paharivan''ny andro izy noho ny amin''i Saoly sy Jonatana zanany sy ny olon''i Jehovah ary ny taranak''Isiraely, satria lavon-tsabatra ireny. '
  '13':
  - type: text
    content: 'Ary hoy Davida tamin''ilay zatovo nanambara taminy: Avy aiza ianao? Ary hoy izy: Zanaky ny vahiny Amalekita aho. '
  '14':
  - type: text
    content: 'Dia hoy Davida taminy: Nahoana ianao no tsy natahotra haninjitra ny tananao hamono ny voahosotr''i Jehovah? '
  '15':
  - type: text
    content: 'Dia niantso zatovo anankiray Davida ka nanao hoe: Hatony io, ka vonoy; dia nasiany izy ka maty. '
  '16':
  - type: text
    content: 'ary hoy Davida taminy: Aoka ny rànao ho eo amin''ny lohanao, satria ny vavanao ihany no efa niampanga anao nanao hoe: Izaho no namono ny voahosotr''i Jehovah. '
  '17':
  - type: text
    content: 'Ary Davida nisaona an''i Saoly sy Jonatana zanany tamin''izao hira fisaonana izao '
  '18':
  - type: text
    content: (ary nasainy nampianarina ny taranak'i Joda ny hira atao hoe Tsipika; indro, voasoratra ao amin'ny Bokin'i Jasara
  - type: note
    content: Jasara = Ilay mahitsy
  - type: text
    content: ' izany):'
  '19':
  - type: text
    content: Ilay voninahitrao
  - type: note
    content: 'Na: gazelanao, dia anaram-biby haingan-tongotra'
  - type: text
    content: ', ry Isiraely, no voalefona teo amin''ny havoananao; Endrey! Lavo ny mahery!'
  '2':
  - type: text
    content: 'Ary tamin''ny andro fahatelo, indro, nisy lehilahy iray tonga avy tany amin''ny miaramilan''i Saoly, triatra ny akanjony sady nihosin-tany ny lohany; ary rehefa tonga teo amin''i Davida izy, dia niankohoka tamin''ny tany ka nitsaoka. '
  '20':
  - type: text
    content: Aza ambaranareo any Gata izany, Aza torinareo ho fifaliana any an-dalamben'i Askelona. Fandrao mifaly ny zanakavavin'ny Filistina. Fandrao miravoravo ny zanakavavin'ny tsy mifora.
  '21':
  - type: text
    content: Hianareo tendrombohitra Gilboa, Aza misy ando aman'orana intsony eny aminareo, na saha angalana fanatitra asandratra, satria tany no nandotoana
  - type: note
    content: 'Na: nanariana'
  - type: text
    content: ' ny ampingan''ny mahery, Dia ny ampingan''i Saoly, ka'
  - type: note
    content: 'Na: toy ny an''izay'
  - type: text
    content: ' tsy nohosorana diloilo.'
  '22':
  - type: text
    content: Ny tsipìkan'i Jonatana tsy nihemotra. Raha tsy nahazo ny ran'ny maty sy ny tavin'ny mahery; ary ny sabatr'i Saoly tsy mba niverina foana.
  '23':
  - type: text
    content: Saoly sy Jonatana, izay tiana sady mahate-ho-tia fony fahavelony, dia tsy nosarahina na dia tamin'ny nahafatesany aza; Faingana noho ny voromahery izy ary mahery noho ny liona.
  '24':
  - type: text
    content: Ry zanakavavin'Isiraely, mitomania an'i Saoly, fa nahafinaritra ny mampitafiany jaky anareo, sady nasiany firava-bolamena ny fitafianareo.
  '25':
  - type: text
    content: Endrey! lavo teo amin'ny ady ny mahery voalefona teo amin'ny havoananao Jonatana.
  '26':
  - type: text
    content: Ory noho ny aminao aho, ry Jonatana rahalahiko; nahafinaritra ahy indrindra ianao; nahagaga ny fitiavanao ahy mihoatra noho ny fitiavan'ny vehivavy.
  '27':
  - type: text
    content: Endrey! lavo ny mahery, ary levona ny fiadiana!
  '3':
  - type: text
    content: 'Ary hoy Davida taminy: Avy taiza moa ianao? Dia hoy izy taminy: Afaka nandositra avy tany amin''ny tobin''ny Isiraely aho. '
  '4':
  - type: text
    content: 'Ary hoy Davida taminy: Nanao ahoana izay tany? Masìna ianao, ambarao amiko. Dia hoy izy: Ny olona nandositra tamin''ny ady, ary be koa ny miampatrampatra sy maty, ary maty koa Saoly sy Jonatana zanany. '
  '5':
  - type: text
    content: 'Ary hoy Davida tamin''ilay zatovo niteny taminy: Ahoana no nahafantaranao fa maty Saoly sy Jonatana zanany. '
  '6':
  - type: text
    content: 'Dia nanambara taminy ilay zatovo nanao hoe: Sendra tao an-tendrombohitra Gilboa aho, ary, indro, Saoly nitehina tamin''ny lefony; ary, indreo, ny kalesy sy ny mpitaingin-tsoavaly nanenjika azy mafy. '
  '7':
  - type: text
    content: 'Dia niherika izy ka nahita ahy; ary niantso ahy izy, ka hoy izaho: Inty aho. '
  '8':
  - type: text
    content: 'Ary hoy izy tamiko: Iza moa ianao? Dia hoy izaho taminy: Amalekita aho. '
  '9':
  - type: text
    content: 'Ary hoy indray izy tamiko: Masìna ianao, hatony kely aho, ka vonoy, fa marary mivonkina ozatra aho, fa mbola ato anatiko ihany ny aiko. '
