document_id: 1CO.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary izaho koa, ry rahalahy, raha tonga tany aminareo, dia tsy tonga tamin'ny teny sy fahendrena marevaka, raha nitory taminareo ny zava-miafina izay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny filazana'
    marker-yv: yv-n
  - type: text
    text: ' an''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ninia tsy hahafantatra zavatra hafa teo aminareo aho, afa-tsy Jesosy Kristy, indrindra fa Izy voahombo tamin''ny hazo fijaliana; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary izaho, raha tany aminareo, dia azon''ny fahalemena sy ny fahatahorana ary ny fangovitana be; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary ny teniko sy ny toriteniko dia tsy tamin''ny teny fahendrena mahataona, fa tamin''ny fanehoan''ny Fanahy sy ny hery, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mba tsy niorenan''ny finoanareo amin''ny fahendren''ny olona, fa amin''ny herin''Andriamanitra ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Anefa milaza fahendrena amin''ny efa matanjaka izahay, fa tsy ny fahendren''izao tontolo izao, na ny an''ny mpanapaka izao tontolo izao, izay olona mihalevona; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa milaza ny fahendren''Andriamanitra izahay ka maneho zava-niafina, dia fahendrena izay nafenina sady voatendrin''Andriamanitra ho voninahitsika talohan''ny nanaovana izao tontolo izao; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary tsy nisy nahalala izany ny mpanapaka izao tontolo izao; fa raha nahalala izy, dia tsy nohomboany tamin''ny hazo fijaliana ny Tompon''ny voninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa araka ny voasoratra hoe: Izay tsy mbola hitan''ny maso ary tsy mbola ren''ny sofina, na niditra tao am-pon''ny olona, na inona na inona no efa namboarin''Andriamanitra ho an''izay tia Azy (Isa. 64. 3), '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia isika no nanambaran''Andriamanitra izany tamin''ny Fanahy; fa ny Fanahy mamantatra ny zavatra rehetra, na dia ny saina lalina izay an''Andriamanitra aza. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa iza no olona mahalala ny ao am-pon''olona, afa-tsy ny fanahin''ny olona izay ao anatiny ihany? Ary toy izany koa, tsy misy mahalala ny ao am-pon''Andriamanitra afa-tsy ny Fanahin''Andriamanitra ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa isika tsy nandray ny fanahin''izao tontolo izao, fa ny Fanahy Izay avy amin''Andriamanitra, mba ho fantatsika izay zavatra nomen''Andriamanitra antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izany koa no lazainay, tsy amin'ny teny ampianarin'ny fahendren'olona fa amin'ny teny ampianarin'ny Fanahy, raha milaza zava-panahy amin'izay olona
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: teny'
    marker-yv: yv-n
  - type: text
    text: ' araka ny Fanahy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: raha mampikambana zava-panahy; na mampitaha zava-panahy'
    marker-yv: yv-n
  - type: text
    text: ' izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny olona izay araka ny nofo ihany dia tsy mba mandray izay an''ny Fanahin''Andriamanitra; fa fahadalana aminy izany sady tsy azony, satria araka ny Fanahy no amantarana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ny olona araka ny Fanahy kosa dia mahafantatra ny zavatra rehetra, kanefa izy tsy fantarin''olona. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa iza no nahafantatra ny sain'ny Tompo mba hampianatra Azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: azy'
    marker-yv: yv-n
  - type: text
    text: '? (Isa. 40. 13). Fa izahay manana ny sain''i Kristy.'
