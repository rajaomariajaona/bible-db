document_id: 2TI.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famporisihana an'i Timoty mba hamelona tsara ny fanomezam-pahasoavana azony avy tamin'Andriamanitra.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paoly, Apostolin''i Kristy Jesosy noho ny sitrapon''Andriamanitra, mba ho mpitory ny teny fikasana milaza ny fiainana izay ao amin''i Kristy Jesosy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa naharihary ankehitriny tamin''ny nisehoan''i Kristy Jesosy, Mpamonjy antsika, Izay nahafoana ny herin''ny fahafatesana, ka ny filazantsara no nampisehoany mazava ny fiainana sy ny tsi-fahalòvana mandrakizay; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny amin'io filazantsara io no nanendrena ahy ho mpitory sy Apostoly ary mpampianatra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mpampianatra ny jentilisa'
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary noho izany koa no iaretako izao zavatra izao, ka tsy menatra aho, satria fantatro Izay inoako, ary matoky aho fa Izy dia mahatahiry ilay zavatra natolotro Azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ilay zavatra natolony ahy'
      marker-yv: yv-n
    - type: text
      text: ' mandra-pihavin''izay andro izay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tano amin''ny finoana ny ny fitiavana ao amin''i Kristy Jesosy ny mariky ny teny tsy misy kilema, izay efa renao tamiko. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay zavatra tsara natolotra anao dia tehirizo amin''ny fampaherezan''ny Fanahy Masina, Izay mitoetra ao anatintsika. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatrao fa efa nahafoy ahy izay rehetra any Asia; isan''ireny Fygelo sy Hermogena. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Homen''ny Tompo famindram-po anie ny ankohonan''i Onesiforosy; satria namelombelona ny fanahiko matetika izy, fa tsy menatra ny gadrako; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa raha tany Roma izy, dia nitady ahy fatratra ka nahita '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (ny Tompo anie hampahita azy famindram-po amin'ny Tompo amin'izay andro izay); ary ny hafatratry ny nanompoany ahy tany Efesosy dia fantatrao tsara.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mamangy an''i Timoty, zanako malala: ho aminao anie ny fahasoavana sy ny famindram-po ary ny fiadanana avy amin''Andriamanitra Ray sy Kristy Jesosy Tompontsika.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaotra an''Andriamanitra aho, Izay tompoiko araka ny nataon''ny razako amin''ny fieritreretana madio, fa tsy manam-pitsaharana akory ny fahatsiarovako anao amin''ny fivavahako andro aman''alina; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary maniry hahita anao aho
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fa andro aman''alina dia maniry hahita anao aho'
      marker-yv: yv-n
    - type: text
      text: ' (satria tsaroako ny ranomasonao), mba ho feno fifaliana aho; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa nisy nahatsiarovako ny finoana tsy mihatsaravelatsihy izay ao anatinao, izay nitoetra taloha tao anatin'i Loisa renibenao sy Eonika reninao, ary matoky aho fa ao anatinao koa izany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho izany dia mampahatsiaro anao aho mba hamelomanao ny fanomezam-pahasoavana avy amin''Andriamanitra, izay ao anatinao tamin''ny fametrahako ny tanako. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy nomen''Andriamanitra fanahy osa isika, fa fanahy mahery sy fitiavana ary fahononan-tena. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza menatra ny ho vavolombelon''ny Tompontsika, na ahy mpifatony ianao; fa aoka ianao ho mpiombona ny fahoriana noho ny filazantsara araka ny herin''Andriamanitra, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay namonjy antsika sy niantso antsika tamin''ny fiantsoana masina, tsy araka ny asantsika, fa araka ny fikasany sy ny fahasoavany izay nomena antsika tao amin''i Kristy Jesosy hatry ny fony fahagola; '
