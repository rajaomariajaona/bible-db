document_id: 1CH.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak'i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary izao no zanakalahin''i Davida, izay naterany tao Hebrona: Amnona, zanak''i Ahinoama Jezirelita, no lahimatoa; ary Daniela, zanak''i Abigaila Karmelita, no lahiaivo; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny zanakalahin''i Solomona dia Rehoboama, Abia no zanakalahin-dRehoboama, Asa no zanakalahin''i Abia, Josafata no zanakalahin''i Asa, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jehorama no zanakalahin''i Josafata, Ahazia no zanakalahin''i Jehorama. Joasy no zanakalahin''i Ahazia, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Amazia no zanakalahin''i Joasy, Azaria no zanakalahin''Amazia, Jotama no zanakalahin i Azaria, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ahaza no zanakalahin''i Jotama Hezekia no zanakalahin''i Ahaza, Manase no zanakalahin''i Hezetia, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Amona no zanakalahin'i Manase, Josia no zanakalahin'i Amona.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary izao no zanakalahin''i Josia: Johanana, lahimatoa, Joiakima, lahiaivo, Zedekia, fahatelo, Saloma, faralahy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny zanakalahin''i Joiakima dia Jekonia, ary Zedekia no zanak''i Jekonia. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ny zanakalahin'Jekonia dia Asira
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Jekonia mpifatotra'
      marker-yv: yv-n
    - type: text
      text: ', Sealtiela no zanak''i Asira, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary Malkirama koa sy Pedaia sy Senazara sy Jekamia sy Hosama ary Nedabia. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny zanakalahin''i Pedaia dia Zerobabela sy simey. Ary ny zanakalahin''i Zerobabela dia Mesolama sy Hanania ary Selomita, anabaviny, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Absaloma, zanak''i Maka, zanakavavin''i Talmay, mpanjakan''i Gesora, no fahatelo; Adonia, zanak''i Hagita, no fahefatra; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary Hasoba sy Ohela sy Berekia sy Hasadia ary Josaba-heseda; dimy izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny zanakalahin''i Hanania dia Pelatia sy Jisaia sy ny zanakalahin''i Rafaia sy ny zanakalahin''i Arnana sy ny zanakalahin''i Obadia ary ny zanakalahin''i Sekania. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary ny zanakalahin''i Sekania dia Semaia. Ary ny zanakalahin''i Semaia dia Hatosy sy Jigala sy Baria sy Nearia ary Safata; enina izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny zanakalahin''i Nearia dia Elioenay sy Hezekia ary Azrikama; telo izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary ny zanakalahin'i Elioenay dia Hodaia sy Eliasiba sy Pelaia sy Akoba sy Johanana sy Delaia ary Anany; fito izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Sefatia, zanak''i Abitala, no fahadimy; Jitreama, zanak''i Egla vadiny, no fahenina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ireo enina ireo no naterany tao Hebrona; fa tao no nanjakany fito taona sy enim-bolana; ary tany Jerosalema kosa no nanjakany telo amby telo-polo taona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary izao no naterany tany Jerosalema: Simea sy Sobaba sy Natana ary Solomona (ireo efa-dahy ireo no naterak''i Batsoa, zanakavavin''i Amiela) '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'sy Jibara sy Elisama sy Elifeleta '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'sy Noga sy Nafega sy Jafia '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'sy Elisama sy Eliada ary Elifeleta; dia sivy kosa ireo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ireo rehetra ireo no zanakalahin''i Davida, afa-tsy ny zanaky ny vaditsindranony sy Tamara, anabavin''ireo. '
