document_id: EXO.40,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nananganana ny tabernakely
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary hosory ny alitara fandoroana ny fanatitra dorana sy ny fanaka rehetra momba azy; ary hamasino ny alitara, dia ho masina indrindra izy. '
  '11':
  - type: text
    content: Ary hosory ny tavy sy ny faladiany, ka hamasino izy.
  '12':
  - type: text
    content: 'Ary ento Arona sy ny zanany hankeo anoloan''ny varavaran''ny trano-lay fihaonana, ka ampandroy amin''ny rano izy. '
  '13':
  - type: text
    content: 'Ary ampiakanjoy an''i Arona ny fitafiana masina, dia hosory sy hamasino izy, mba ho mpisorona ho Ahy. '
  '14':
  - type: text
    content: 'Ary ento ny zanany, ka ampiakanjoy azy ny akanjo lava. '
  '15':
  - type: text
    content: 'Ary hosory izy, tahaka ny nanosoranao ny rainy, mba ho mpisorona ho Ahy; ary ny fanosorana azy dia ho fisoronana mandrakizay ho azy hatramin''ny taranany fara mandimby. '
  '16':
  - type: text
    content: 'Dia nataon''i Mosesy izany: araka izay rehetra efa nandidian''i Jehovah azy no nataony.'
  '17':
  - type: text
    content: 'Ary tamin''ny andro voalohany tamin''ny volana voalohany tamin''ny taona faharoa no nananganana ny tabernakely. '
  '18':
  - type: text
    content: 'Ary Mosesy nanangana ny tabernakely, dia nametraka ny faladiany sy nanangana ny zana-kazony, ary nampiditra ny barany sy nanangana ny andriny. '
  '19':
  - type: text
    content: Ary namelatra ny lay teo ambonin'ny tabernakely izy, ary ny firakotry ny lay nataony teo amboniny, dia araka izay efa nandidian'i Jehovah an'i Mosesy.
  '2':
  - type: text
    content: 'Amin''ny andro voalohany amin''ny volana voalohany dia atsangano ny tabernakelin''ny trano-lay fihaonana. '
  '20':
  - type: text
    content: 'Dia nalainy ny Vavolombelona ka napetrany tao anatin''ny fiara, ary ny bao dia nataony teo amin''ny fiara, ary ny rakotra fanaovam-panavotana dia napetrany teo ambonin''ny fiara. '
  '21':
  - type: text
    content: 'Ary ny fiara dia nampidiriny tao amin''ny tabernakely, ka nahantony ny efitra lamba fanakonana hanakona ny fiaran''ny Vavolombelona, dia araka izay efa nandidian''i Jehovah an''i Mosesy. '
  '22':
  - type: text
    content: 'Ary ny latabatra dia napetrany teo amin''ny trano-lay fihaonana, dia teo amin''ny lafin''ny tabernakely avaratra, teo ivelan''ny efitra lamba. '
  '23':
  - type: text
    content: Ary nandahatra mofo teo amboniny teo anatrehan'i Jehovah izy, dia araka izay efa nandidian'i Jehovah an'i Mosesy.
  '24':
  - type: text
    content: 'Ary ny fanaovan-jiro dia napetrany teo amin''ny trano-lay fihaonana, tandrifin''ny latabatra, teo amin''ny lafin''ny tabernakely atsimo. '
  '25':
  - type: text
    content: 'Ary nampirehitra ny jiro teo anatrehan''i Jehovah izy, dia araka izay efa nandidian''i Jehovah an''i Mosesy. '
  '26':
  - type: text
    content: 'Ary ny alitara volamena dia nataony teo amin''ny trano-lay fihaonana, teo anoloan''ny efitra lamba; '
  '27':
  - type: text
    content: ary nandoro ditin-kazo mani-pofona teo izy, dia araka izay efa nandidian'i Jehovah an'i Mosesy.
  '28':
  - type: text
    content: Ary ny varavarana lamba dia nataony teo amin'ny varavaran'ny tabernakely;
  '29':
  - type: text
    content: ary ny alitara fandoroana ny fanatitra dorana dia napetrany teo anoloan'ny varavaran'ny tabernakelin'ny trano-lay fihaonana; ary nateriny teo amboniny ny fanatitra dorana sy ny fanatitra hohanina, dia araka izay efa nandidian'i Jehovah an'i Mosesy.
  '3':
  - type: text
    content: 'Ary ataovy ao ny fiaran''ny Vavolombelona; dia ahantòny ny efitra lamba hanakona ny fiara. '
  '30':
  - type: text
    content: 'Ary ny tavy dia nataony teo anelanelan''ny trano-lay fihaonana sy ny alitara, ka nasiany rano teo anatiny hanasana. '
  '31':
  - type: text
    content: 'Ary teo no nanasan''i Mosesy sy Arona ary ny zanany ny tongony aman-tànany. '
  '32':
  - type: text
    content: Raha niditra tao amin'ny trano-lay fihaonana izy, ary raha nanakaiky ny alitara, dia nisasa izy, dia araka izay efa nandidian'i Jehovah an'i Mosesy.
  '33':
  - type: text
    content: 'Ary natsangany koa ny kianja manodidi­na ny tabernakely sy ny alitara; ary ny vava­hady lamba dia nataony teo amin''ny vavahadin''ny kianja. Dia vitan''i Mosesy ny asa rehetra. '
  '34':
  - type: text
    content: 'Ary ny rahona nanarona ny trano-lay fihaonana, ary ny voninahitr''i Jehovah nameno ny tabernakely. '
  '35':
  - type: text
    content: Ary Mosesy tsy nahazo niditra tao amin'ny trano-lay fihaona­na, satria ny rahona nitoetra teo amboniny, ary ny voninahitr'i Jehovah nameno ny tabernakely.
  '36':
  - type: text
    content: 'Ary raha niakatra niala tamin''ny tabernakely ny rahona, dia nifindra ny Zanak''Isiraely tamin''ny nandehanany rehetra; '
  '37':
  - type: text
    content: 'fa raha tsy niakatra ny rahona, dia tsy nifindra izy, mandra-pihavin''izay andro hiakarany. '
  '38':
  - type: text
    content: Fa ny rahon'i Jehovah dia teo ambonin'ny tabernakely nony andro, ary nisy afo teo aminy nony alina, teo imason'ny taranak'Isiraely rehetra, tamin'ny nandehanany rehetra.
  '4':
  - type: text
    content: 'Ary ampidiro ny latabatra, ka alaharo izay halahatra eo amboniny; ary ampidiro ny fanaovan-jiro, ka ampireheto ny jiro. '
  '5':
  - type: text
    content: 'Ary ny alitara volamena fandoroana ditin-kazo manitra dia ataovy eo anoloan''ny fiaran''ny Vavolombelona, ary ny varavarana lamba dia ataovy eo amin''ny varavaran''ny tabernakely. '
  '6':
  - type: text
    content: 'Ary ny alitara fandoroana ny fanatitra dorana dia apetraho eo anoloan''ny tabernakelin''ny trano-lay fihaonana. '
  '7':
  - type: text
    content: 'Ary ny tavy dia apetraho eo anelanelan''ny trano-lay fihaonana sy ny alitara, ka asio rano eo anatiny. '
  '8':
  - type: text
    content: 'Ary amboary ny kianja manodidina, ka ahantòny ny vavahady lamba eo amin''ny vavahadin''ny kianja. '
  '9':
  - type: text
    content: 'Ary alao ny diloilo fanosorana, ka hosory ny tabernakely sy izay rehetra ao, dia hamasino izy mbamin''ny fanaka rehetra momba azy, ka dia ho masina izy. '
