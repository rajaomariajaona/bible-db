document_id: ISA.47
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny handravana an'i Babylona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mialà, ka mipetraha amin''ny vovoka, ry Babylona, zanakavavy virijina! Mipetraha eo amin''ny tany, fa tsy amin''ny seza fiandrianana, ry Kaldea zanakavavy! Fa tsy hatao hoe vehivavy malemilemy sy mihantahanta intsony ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alao ny vato fikosoham-bary, ka kosohy ny koba; esory ny fisalobonanao, akaro ny moron-tongotr''akanjonao; aoka hiseho ny fenao, ka miroboha mita ny ony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hiseho ny fitanjahanao, eny, ho hita ny fahamenaranao; hitondra famaliana Aho ka tsy hiantra olona
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tsy hiera amin''olona; na: tsy hihaona amin''olona'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny anaran''ny Mpanavotra anay dia Jehovah, Tompon''ny maro, Iray Masin''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mipetraha mangingina, ka midìra ao amin''ny maizina, ry Kaldea zanakavavy! Fa tsy hatao hoe Tompovavin''ny fanjakana intsony ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tezitra tamin''ny oloko Aho; navelako holotoina ny lovako, ka natolotro ho eo an-tananao izy, tsy mba namindranao fo izy, fa na dia ny antitra aza dia nasianao zioga mavesatra dia mavesatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ianao: Ho tompovavy mandrakizay Aho; ka dia tsy nandatsaka am-po izany zavatra izany ianao, na nitsapa izay hiafarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa mihainoa, ianao izay mihantahanta sady mipetraka tsy manana ahiahy ka manao anakampo hoe: Izaho no izy, ary tsy misy hafa; tsy hipetraka ho mpitondratena aho, na hahita fahafoanan''anaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Kanjo hanjo anao tampoka amin''ny indray andro monja ireto zavatra roa ireto, dia ny fahafoanan''anaka sy ny fananoan-tena; Hotanterahina aminao avokoa izany, na dia maro aza ny fankatovanao, ary na dia be dia be aza ny odinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa nitoky tamin'ny faharatsianao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hafetsenao'
    marker-yv: yv-n
  - type: text
    text: ' ianao ka nanao hoe: Tsy misy mahita ahy. Ny fahendrenao sy ny fahalalanao dia nampivily anao, ka dia nanao anakampo ianao hoe: Izaho no izy, fa tsy misy afa-tsy izaho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Kanjo hanjo anao ny fahoriana, nefa tsy ho fantatrao izay fanafany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: iposahany'
    marker-yv: yv-n
  - type: text
    text: '; Ary hahazo anao ny loza, nefa tsy ho hainao ny fanàlany; eny, hanjo anao tampoka ny fandringanana izay tsy ampoizinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Arosoy ary ny odinao sy ny hamaroan''ny fankatovanao, izay efa nisasaranao hatry ny fony ianao mbola kely; Angamba hahavita izay mahasoa ianao; angamba ho tonga mahatahotra ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sasatra noho ny hamaroan'ny fisainanao ianao; aoka hitsangana ankehitriny ireo mpamantatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpizarazara
    marker-yv: yv-n
  - type: text
    text: ' ny lanitra sy mpandinika ny kintana ireo hamonjy anao, dia ireo mpanambara isaky ny tsinam-bolana izay zavatra ho tonga aminao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Aoka hitsangana ankehitriny ireo mpamantatra ny lanitra sy mpandinika ny kintana ireo hamonjy anao amin''izay hanjo anao'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro, fa ho tahaka ny vodivary ireo; ho main''ny afo izy ka tsy hahavonjy ny tenany amin''ny herin''ny lelafo akory; tsy misy vainafo hamindroana, na afo hitaninana aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ho toy izany aminao ireo efa nisasaranao ireo, dia ireo nifampivarotra taminao hatry ny fony ianao mbola kely; samy hipariaka mandositra ho any amin'ny fonenany avy izy, ka tsy hisy hahavonjy anao.
