document_id: EZK.41,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nentiny ho ao amin''ny ati-trano lehibe aho, dia norefesiny ny tongo-bato, ka enina hakiho ny sakany tamin''ny lafiny iray, ary enina hakiho koa ny sakany tamin''ny lafiny iray; sakan''ny trano-lay izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny teo anelanelan''ny efi-trano dia roa-polo hakiho manodidina ny trano na aiza na aiza. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny varavaran''ny paosin-trano dia mankao amin''ilay sisa navela, dia varavarana iray manatrika ny avaratra, ary iray koa manatrika ny atsimo; ary ny sakan''ilay sisa navela dia dimy hakiho manodidina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ny trano izay teo anoloan'ilay kianja voatokana tamin'ny lafiny andrefana, dia dia fito-polo hakiho ny sakany; ary ny rindrin'ny trano, dia dimy hakiho ny hatevin'ny manodidina, ary sivi-folo hakiho ny lavany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nandrefy ny trano izy, ka zato hakiho ny lavany, ary ny kianja voatokana sy ny trano ary ny rindrina, dia zato hakiho ny lavany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary ny sakan'ny trano eo anoloany sy ny kianja voatokana teo atsinanana dia zato hakiho.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia norefesiny ny lavan''ny trano teo anoloan''ny kianja izay tao ivohony, ary ny lalan-tsarany teo an-daniny roa, ka zato hakiho. Ny tempoly ao anaty sy ny lavarangana ao amin''ny kianja '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary ny tokonana sy ny varavarankely makarakara tsy mivoha ary ny lalan-tsara manodidina amin''izy telo (manandrify ny tokonana dia nopetahana hazo fisaka manodidina, ary hatramin''ny tany ka hatramin''ny varavarankely koa, ary voasarona ny varavarankely), '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary ny eo ambonin''ny varavarana, na amin''ny trano ao anatiny, na ny eny ivelany, mbamin''ny rindrina manodidina, na ny ao anatiny na ny eny ivelany, koa samy natao tamin''ny ohatra avokoa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary nisy sarin'ny kerobima sy ny hazo rofia
    - type: usfm
      marker: x
      children:
      - type: text
        text: palma
      marker-yv: yv-n
    - type: text
      text: ' natao, ka ny sarin''ny hazo rofia'
    - type: usfm
      marker: x
      children:
      - type: text
        text: palma
      marker-yv: yv-n
    - type: text
      text: ' dia teo anelanelan''ny kerobima, ary ny kerobima dia samy nanana tarehy roa avy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ka ny tarehin'olona no nanatrika ny hazo rofia tamin'ny an-kilany iray, ary ny tarehin-diona tanora kosa no nanatrika ny hazo rofia
    - type: usfm
      marker: x
      children:
      - type: text
        text: palma
      marker-yv: yv-n
    - type: text
      text: ' tamin''ny an-kilany iray; ny manodidina ny trano dia natao tahaka izany avokoa izy rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary ny sakan''ny varavarana dia folo hakiho; ary ny teo an-danin''ny varavarana dia dimy hakiho avy; ary norefesiny ny lavany, ka efa-polo hakiho, ary ny sakany roa-polo hakiho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hatramin'ny tany ka hatrany ambonin'ny varavarana no nasiana sarin'ny kerobima sy ny hazo rofia
    - type: usfm
      marker: x
      children:
      - type: text
        text: palma
      marker-yv: yv-n
    - type: text
      text: ', dia teo amin''ny rindrin''ny ati-trano lehibe. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Efa-joro ny tolan''ny ati-trano lehibe, ary ny anoloana amin''ny fitoerana masina dia nitovy tarehy tamin''izany koa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny alitara dia hazo, ka telo hakiho ny hahavony, ary roa hakiho ny lavany; ary nisy zorony koa, ary ny lavany sy ny rindriny dia hazo. Ary hoy izy tamiko: Io no latabatra izay eo anatrehan''i Jehovah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny ati-trano lehibe sy ny fitoerana masina dia nisy lela-varavarana roa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ireo lela-varavarana ireo dia samy kopa-droa avy, dia lela-varavarana roa amin''ny anankiray, ary lela-varavarana roa koa amin''ny anankiray. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nisy sarin'ny kerobima sy ny hazo rofia
    - type: usfm
      marker: x
      children:
      - type: text
        text: palma
      marker-yv: yv-n
    - type: text
      text: ' natao teo amin''ny varavaran''ny ati-trano lehibe tahaka izay natao teo amin''ny rindrina ihany; ary nisy tokonana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tatao'
      marker-yv: yv-n
    - type: text
      text: ' hazo teo anoloan''ny lavarangana fidirana, dia teo ivelany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary nisy varavarankely makarakara tsy mivoha sy sarin'ny hazo rofia
    - type: usfm
      marker: x
      children:
      - type: text
        text: palma
      marker-yv: yv-n
    - type: text
      text: ' teo an-daniny roa, dia teo anilan''ny lavarangana fidirana sy teo amin''ny efi-trano momba ny trano ary teo amin''ny tokonana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tatao'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nandroso ho ao anatiny indrindra izy ary, norefesiny ny tongo-bato eo an-danin''ny varavarana, ka roa hakiho, ary ny varavarana enina hakiho, ary ny sakan''ny varavarana fito hakiho. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia norefesiny ny lavany, ka roa-polo hakiho, ary ny sakany roa-polo hakiho teo anoloan''ny ati-trano lehibe; dia hoy izy tamiko: Io no fitoerana masina indrindra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary samy norefesiny manodidina, ka ny hatevin''ny rindrin''ny trano dia enina hakiho, ary ny sakan''ny paosin-trano dia efatra hakiho. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ireo paosin-trano ireo dia nifanongoa telo sady telo-polo milahatra; ary niankina tamin''ny rindrin-trano izay ho an''ny paosin-trano manodidina izy mba hitsatohany, fa tsy hitsatoka amin''ny rindrin''ny trano. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ny sakan'ireo efi-trano ireo dia nihamalalaka manodidina isaky ny mifanongoa, fa niampy isaky ny mifanongoa izy, ka dia nihamalalaka araka ny fisandrany; ary ny tombon'ny ambony amin'ny an-tenatenany dia tahaka ny tombon'ny an-tenatenany amin'ny ambany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia hitako fa nisy tokotany nasandratra manodidina ny trano ho fanorenan'ny paosin-trano, dia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Dia noheveriko ny hahavon''ny trano manodidina; ary ny fanorenan''ny paosin-trano dia'
      marker-yv: yv-n
    - type: text
      text: ' eran''ilay volotara hatramin''ny ifanohizany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny hatevin''ny rindrina ivelany amin''ny paosin-trano dia dimy hakiho; ary hoatra izany koa ilay sisa navela manolotra ny paosin-trano. '
