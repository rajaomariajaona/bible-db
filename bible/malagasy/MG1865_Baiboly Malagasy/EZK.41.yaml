document_id: EZK.41,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nentiny ho ao amin''ny ati-trano lehibe aho, dia norefesiny ny tongo-bato, ka enina hakiho ny sakany tamin''ny lafiny iray, ary enina hakiho koa ny sakany tamin''ny lafiny iray; sakan''ny trano-lay izany. '
  '10':
  - type: text
    content: 'Ary ny teo anelanelan''ny efi-trano dia roa-polo hakiho manodidina ny trano na aiza na aiza. '
  '11':
  - type: text
    content: 'Ary ny varavaran''ny paosin-trano dia mankao amin''ilay sisa navela, dia varavarana iray manatrika ny avaratra, ary iray koa manatrika ny atsimo; ary ny sakan''ilay sisa navela dia dimy hakiho manodidina. '
  '12':
  - type: text
    content: Ary ny trano izay teo anoloan'ilay kianja voatokana tamin'ny lafiny andrefana, dia dia fito-polo hakiho ny sakany; ary ny rindrin'ny trano, dia dimy hakiho ny hatevin'ny manodidina, ary sivi-folo hakiho ny lavany.
  '13':
  - type: text
    content: 'Dia nandrefy ny trano izy, ka zato hakiho ny lavany, ary ny kianja voatokana sy ny trano ary ny rindrina, dia zato hakiho ny lavany. '
  '14':
  - type: text
    content: Ary ny sakan'ny trano eo anoloany sy ny kianja voatokana teo atsinanana dia zato hakiho.
  '15':
  - type: text
    content: 'Dia norefesiny ny lavan''ny trano teo anoloan''ny kianja izay tao ivohony, ary ny lalan-tsarany teo an-daniny roa, ka zato hakiho. Ny tempoly ao anaty sy ny lavarangana ao amin''ny kianja '
  '16':
  - type: text
    content: 'ary ny tokonana sy ny varavarankely makarakara tsy mivoha ary ny lalan-tsara manodidina amin''izy telo (manandrify ny tokonana dia nopetahana hazo fisaka manodidina, ary hatramin''ny tany ka hatramin''ny varavarankely koa, ary voasarona ny varavarankely), '
  '17':
  - type: text
    content: 'ary ny eo ambonin''ny varavarana, na amin''ny trano ao anatiny, na ny eny ivelany, mbamin''ny rindrina manodidina, na ny ao anatiny na ny eny ivelany, koa samy natao tamin''ny ohatra avokoa. '
  '18':
  - type: text
    content: Ary nisy sarin'ny kerobima sy ny hazo rofia
  - type: note
    content: palma
  - type: text
    content: ' natao, ka ny sarin''ny hazo rofia'
  - type: note
    content: palma
  - type: text
    content: ' dia teo anelanelan''ny kerobima, ary ny kerobima dia samy nanana tarehy roa avy, '
  '19':
  - type: text
    content: ka ny tarehin'olona no nanatrika ny hazo rofia tamin'ny an-kilany iray, ary ny tarehin-diona tanora kosa no nanatrika ny hazo rofia
  - type: note
    content: palma
  - type: text
    content: ' tamin''ny an-kilany iray; ny manodidina ny trano dia natao tahaka izany avokoa izy rehetra. '
  '2':
  - type: text
    content: 'Ary ny sakan''ny varavarana dia folo hakiho; ary ny teo an-danin''ny varavarana dia dimy hakiho avy; ary norefesiny ny lavany, ka efa-polo hakiho, ary ny sakany roa-polo hakiho. '
  '20':
  - type: text
    content: Hatramin'ny tany ka hatrany ambonin'ny varavarana no nasiana sarin'ny kerobima sy ny hazo rofia
  - type: note
    content: palma
  - type: text
    content: ', dia teo amin''ny rindrin''ny ati-trano lehibe. '
  '21':
  - type: text
    content: 'Efa-joro ny tolan''ny ati-trano lehibe, ary ny anoloana amin''ny fitoerana masina dia nitovy tarehy tamin''izany koa. '
  '22':
  - type: text
    content: 'Ny alitara dia hazo, ka telo hakiho ny hahavony, ary roa hakiho ny lavany; ary nisy zorony koa, ary ny lavany sy ny rindriny dia hazo. Ary hoy izy tamiko: Io no latabatra izay eo anatrehan''i Jehovah. '
  '23':
  - type: text
    content: 'Ary ny ati-trano lehibe sy ny fitoerana masina dia nisy lela-varavarana roa. '
  '24':
  - type: text
    content: 'Ary ireo lela-varavarana ireo dia samy kopa-droa avy, dia lela-varavarana roa amin''ny anankiray, ary lela-varavarana roa koa amin''ny anankiray. '
  '25':
  - type: text
    content: Ary nisy sarin'ny kerobima sy ny hazo rofia
  - type: note
    content: palma
  - type: text
    content: ' natao teo amin''ny varavaran''ny ati-trano lehibe tahaka izay natao teo amin''ny rindrina ihany; ary nisy tokonana'
  - type: note
    content: 'Na: tatao'
  - type: text
    content: ' hazo teo anoloan''ny lavarangana fidirana, dia teo ivelany. '
  '26':
  - type: text
    content: Ary nisy varavarankely makarakara tsy mivoha sy sarin'ny hazo rofia
  - type: note
    content: palma
  - type: text
    content: ' teo an-daniny roa, dia teo anilan''ny lavarangana fidirana sy teo amin''ny efi-trano momba ny trano ary teo amin''ny tokonana'
  - type: note
    content: 'Na: tatao'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dia nandroso ho ao anatiny indrindra izy ary, norefesiny ny tongo-bato eo an-danin''ny varavarana, ka roa hakiho, ary ny varavarana enina hakiho, ary ny sakan''ny varavarana fito hakiho. '
  '4':
  - type: text
    content: 'Dia norefesiny ny lavany, ka roa-polo hakiho, ary ny sakany roa-polo hakiho teo anoloan''ny ati-trano lehibe; dia hoy izy tamiko: Io no fitoerana masina indrindra. '
  '5':
  - type: text
    content: 'Ary samy norefesiny manodidina, ka ny hatevin''ny rindrin''ny trano dia enina hakiho, ary ny sakan''ny paosin-trano dia efatra hakiho. '
  '6':
  - type: text
    content: 'Ary ireo paosin-trano ireo dia nifanongoa telo sady telo-polo milahatra; ary niankina tamin''ny rindrin-trano izay ho an''ny paosin-trano manodidina izy mba hitsatohany, fa tsy hitsatoka amin''ny rindrin''ny trano. '
  '7':
  - type: text
    content: Ary ny sakan'ireo efi-trano ireo dia nihamalalaka manodidina isaky ny mifanongoa, fa niampy isaky ny mifanongoa izy, ka dia nihamalalaka araka ny fisandrany; ary ny tombon'ny ambony amin'ny an-tenatenany dia tahaka ny tombon'ny an-tenatenany amin'ny ambany.
  '8':
  - type: text
    content: Dia hitako fa nisy tokotany nasandratra manodidina ny trano ho fanorenan'ny paosin-trano, dia
  - type: note
    content: 'Na: Dia noheveriko ny hahavon''ny trano manodidina; ary ny fanorenan''ny paosin-trano dia'
  - type: text
    content: ' eran''ilay volotara hatramin''ny ifanohizany. '
  '9':
  - type: text
    content: 'Ny hatevin''ny rindrina ivelany amin''ny paosin-trano dia dimy hakiho; ary hoatra izany koa ilay sisa navela manolotra ny paosin-trano. '
