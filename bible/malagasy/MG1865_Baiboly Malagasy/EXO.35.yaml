document_id: EXO.35,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nilazan'i Mosesy ny didin'i Jehovah ny amin'ny hitandremana ny Sabata sy ny hanaovana ny tabernakely, ary ny zavatra naterin'ny olona hanaovana azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Mosesy dia namory ny fiangonana, dia ny Zanak''Isiraely rehetra, ka nanao taminy hoe: Izao no teny nandidian''i Jehovah hatao: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary aoka ny hendry rehetra eo aminareo ho avy ka hanao izay rehetra nandidian''i Jehovah: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'dia ny tabernakely sy ny lainy sy ny firakony sy ny farangony, sy ny zana-kazony sy ny barany sy ny andriny sy ny faladiany, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary ny fiara sy ny baony sy ny rakotra fanaovam-panavotana sy ny efitra lamba fanakonana, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary ny latabatra sy ny baony mbamin''ny fanaka rehetra momba azy, ary ny mofo aseho, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary ny fanaovan-jiro ho fanazavana mbamin''ny fanaka momba azy ary ny lela fanaovan-jirony sy ny diloilo hatao fanazavana, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary ny alitara fandoroana ditin-kazo manitra sy ny baony, ary ny diloilo fanosorana sy ny ditin-kazo mani-pofona, ary ny varavarana lamba ho eo amin''ny varavaran''ny tabernakely, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary ny alitara fandoroana ny fanatitra dorana sy ny harato varahina ho eo aminy sy ny baony ary ny fanaka rehetra momba azy, ary ny tavy sy ny faladiany, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary ny fefy lamba ho amin''ny kianja sy ny tsangantsangany sy ny faladiany sy ny vavahady lamba ho eo amin''ny vavahadin''ny kianja, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary ny tsimatry ny tabernakely sy ny tsimatry ny kianja sy ny kofehiny, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary ny fitafiana makarakara ho entiny manao fanompoam-pivavahana ao amin''ny fitoerana masina sy ny fitafiana masina ho an''i Arona mpisorona ary ny fitafian''ny zanany ho entiny misorona. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Henemana no hanaovanao raharaha, fa ny andro fahafito ho masina aminareo, dia tena andro fitsaharana ho an''i Jehovah; izay rehetra manao raharaha amin''izany dia hatao maty. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia niala teo anatrehan''i Mosesy ny fiangonana, dia ny Zanak''Isiraely rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary samy nanatona izy, dia izay rehetra nampahazotoin''ny fony, ary izay rehetra namporisihin''ny fanahiny, ka nitondra ny fanatitra ho an''i Jehovah hanaovana ny trano-lay fihaonana sy ny fanompoana rehetra momba azy ary ny fitafiana masina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nanatona ny lehilahy mbamin''ny vehivavy rehetra izay namporisihin''ny fony, ka nitondra fisisika sy kavina sy peratra sy voa volamena, dia izay firavaka volamena samy hafa rehetra, dia ny olona rehetra izay efa nanatitra volamena ho fanatitra ho an''i Jehovah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny olona rehetra izay nanana manga sy volomparasy sy mena sy rongony fotsy madinika sy volon''osy sy hoditr''ondrilahy efa nomenaina ary hodi-takasy dia nitondra azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izay rehetra nanatitra fanatitra volafotsy sy varahina dia nitondra ny fanatitra ho an''i Jehovah; ary izay rehetra nanana hazo akasia hanaovana zavatra ho amin''ny fanompoana dia nitondra azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ny vehivavy rehetra izay hendry dia namoly tamin''ny tànany ka nitondra izay nofolesiny, dia ny manga sy volomparasy sy mena ary ny rongony fotsy madinika. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary ny vehivavy rehetra izay nampahazotoin''ny fony tamin''ny fahendrena dia namoly ny volon''osy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary ny loholona nitondra ny vato beryla sy ny vato halatsaka an-tranontranony ho amin''ny efoda sy ho amin''ny saron-tratra, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'ary ny zava-manitra sy ny diloilo hatao fanazavana sy ho amin''ny diloilo fanosorana ary ho amin''ny ditin-kazo mani-pofona. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary ny Zanak''Isiraely nitondra fanatitra sitra-po ho an''i Jehovah: dia ny lehilahy sy ny vehivavy rehetra izay namporisihin''ny fony hitondra izay hanaovana ny zavatra rehetra nandidian''i Jehovah an''i Mosesy hatao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aza mampirehitra afo amin'ny andro Sabata any amin'izay rehetra itoeranareo.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary hoy Mosesy tamin''ny Zanak''Isiraely: Indro, efa notononin''i Jehovah anarana Bezalila, zanak''i Ory, zanak''i Hora, avy amin''ny firenen''i Joda, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ka efa nofenoiny fanahin''Andriamanitra, dia fahendrena sy fahiratan-tsaina sy fahalalana ny amin''ny tao-zavatra samy hafa, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'dia ny hamoron-tsaina hanao asa kanto, sy ny hiasa volamena sy volafotsy ary varahina, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'ary ny hamboatra vato halatsaka an-tranontranony sy ny handrafitra hazo, hanaovana izay asa kanto samy hafa rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary ny fahaizana hampianatra koa dia efa nataon''Andriamanitra tao am-pony, dia izy sy Oholiaba, zanak''i Ahisamaka avy amin''ny firenen''i Dana. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary efa nofenoiny fahendrena izy roa lahy, hanaovany ny tao-zavatra samy hafa, dia ny an'ny mpiasa tefy sy rafitra ary ny an'ny mpanenona mahay tenona samy hafa soratra, dia amin'ny manga sy volomparasy sy mena ary amin'ny rongony fotsy madinika ary ny an'ny mpanenona, dia ny ho mpanao ny asa samy hafa sy ho mpamorona asa kanto.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Mosesy niteny tamin''ny fiangonana, dia ny Zanak''Isiraely rehetra, ka nanao hoe: Izao no teny izay nandidian''i Jehovah: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Manalà ao aminareo fanatitra ho an''i Jehovah: izay rehetra amporisihin''ny fony dia aoka hitondra fanatitra ho an''i Jehovah: dia volamena sy volafotsy sy varahina, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary manga sy volomparasy sy mena sy rongony fotsy madinika, ary volon''osy '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'sy hoditr''ondrilahy efa nomenaina sy hodi-takasy ary hazo akasia, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'sy diloilo hatao fanazavana sy zava-manitra ho amin''ny diloilo fanosorana sy ho ditin-kazo mani-pofona, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ary vato beryla sy vato halatsaka an-tranontranony ho amin''ny efoda sy ho amin''ny saron-tratra. '
