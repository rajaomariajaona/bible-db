document_id: 2CH.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitandreman'i Hezekia sy ny vahoaka ny Paska
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Hezekia naniraka tany amin''ny Isiraely sy ny Joda rehetra ka nanoratra taratasy ho amin''ny Efraima sy ny Manase koa mba hankanesany any an-tranon''i Jehovah any Jerosalema hitandrina ny Paska ho an''i Jehovah, Andriamanitry ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny mpanjaka sy ny mpanapaka mbamin''ny fiangonana rehetra tany Jerosalema dia niara-nihevitra ny amin''ny hitandremana ny Paska amin''ny volana faharoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nefa tsy nahatandrina azy tamin''izany andro izany izy, satria ny mpisorona tsy mbola nanamasina ny tenany loatra, ary ny olona koa tsy mbola vory tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary sitraky ny mpanjaka sy ny fiangonana rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nandidy handefa teny eran''ny Isiraely rehetra hatrany Beri-sheba ka hatrany Dana izy mba hankanesan''ny olona hitandrina ny Paska ho an''i Jehovah, Andriamanitry ny Isiraely, any Jerosalema; fa ny be sy ny maro tsy mba nitandrina azy araka ny voasoratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia lasa ny tsimandoa nitondra ny taratasy avy tamin''ny mpanjaka sy ny mpanapaka hitety ny Isiraely sy ny Joda rehetra ka nilaza araka ny didin''ny mpanjaka hoe: Ry zanak''isiraely ô, miverena amin''i Jehovah, Andriamanitr''i Abrahama sy Isaka ary Isiraely, mba hiverenany ho amin''izay sisa aminareo izay tsy azon''ny tànan''ireo mpanjakan''i Asyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza manahaka ny rainareo sy ny rahalahinareo izay nivadika tamin''i Jehovah, Andriamanitry ny razany, ka dia natolony ho figagana araka izao hitanareo izao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa aza manamafy ny hatokareo toy ny nataon''ny razanareo, fa atolory an''i Jehovah ny tananareo, ka midìra ao amin''ny fitoerany masina, izay nohamasininy ho mandrakizay; ary manompoa an''i Jehovah Andriamanitrareo, mba hiala aminareo ny fahatezerany mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa raha miverina amin''i Jehovah ianareo, dia hahazo famindram-po eo anatrehan''izay nitondra azy ho babo ny rahalahinareo sy ny zanakareo, ka dia ho tafaverina amin''ity tany ity izy; fa miantra sy mamindra fo Jehovah Andriamanitrareo, ary tsy mba hiamboho anareo Izy, raha miverina aminy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny tsimandoa nitety ny tanàna hatrany amin''ny tanin''ny Efraima sy ny Manase ka hatrany amin''ny Zebolona; fa nihomehezan''ny olona sy novazivaziny foana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa kosa ny tamin''ny Asera sy ny Manase ary ny Zebolona dia nisy ihany nanetry tena ka tonga tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny tànan''Andriamanitra dia napetrany tamin''ny Joda koa mba hanome azy fo iray hankatò ny didin''ny mpanjaka sy ny mpanapaka noho ny tenin''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tamin''ny volana faharoa dia nisy olona maro nivory tany Jerosalema hitandrina ny andro firavoravoana fihinanana ny mofo tsy misy masirasira, dia fivoriana lehibe tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nitsangana izy, dia nandrava ireo alitara tany Jerosalema; ary ny alitara fandoroana ditin-kazo manitra rehetra dia noravany koa ka nariany tany amin'ny lohasahan-driaka Kidrona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia namono ny Paska izy tamin''ny andro fahefatra ambin''ny folo tamin''ny volana faharoa; ary menatra, ny mpisorona sy ny Levita, dia nanamasina ny tenany ka nampiditra ny fanatitra dorana ho ao an-tranon''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nitsangana teo amin''ny fitoerany tahaka ny fanao izy, araka ny lalàn''i Mosesy, lehilahin''Andriamanitra; ary ny mpisorona nanopy ny rà izay teny an-tànan''ny Levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa nisy maro tao amin''ny fiangonana izay tsy mba nanamasina ny tenany, ka dia ny Levita no nampamonoina ny Paska hisolo izay rehetra tsy madio mba hanamasina azy ho an''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa nisy olona betsaka, dia maro avy tamin''ny Efraima sy ny Manase sy ny Isakara ary ny Zebolona, no tsy mba nanadio ny tenany, kanefa nihinana ny Paska ihany izy, fa tsy araka izay voasoratra. Ary Hezekia nivavaka ho an''ireny ka nanao hoe: Jehovah tsara ô, mamelà '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'izay rehetra efa nampiomana ny fony hitady an''Andriamanitra, dia Jehovah, Andriamanitry ny razany, na dia tsy madio araka ny fahadiovan''ny fitoerana masina aza izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Jehovah nihaino an''i Hezekia ka nahasitrana ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny Zanak'isiraely izay tany Jerosalema dia nitandrina hafitoana ny andro firavoravoana fihinanana ny mofo tsy misy masirasira tamin'ny fifaliana lehibe; ary ny Levita sy ny mpisorona nidera an'i Jehovah isan'andro sady nampaneno zavatra mafy faneno
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fiderana'
    marker-yv: yv-n
  - type: text
    text: ' ho an''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Hezekia dia nankasitraka ny Levita rehetra, izay nanana fahaizana ho an'i Jehovah; ary nihinana ny Paska hafitoana izy sady nanatitra fanati-pihavanana koa sy nisaotra an'i Jehovah, Andriamanitry ny razany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny fiangonana rehetra niara-nihevitra ny amin''ny hitandremana hafitoana indray; ka dia mbola nitandrina hafitoana koa tamin''ny hafaliana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa Hezekia, mpanjakan''ny Joda, nanome vantotr''ombilahy arivo sy ondry aman''osy fito arivo ho an''ny fiangonana; ary ny mpanapaka koa nanome vantotr''ombilahy arivo sy ondry aman''osy iray alina ho an''ny fiangonana; ary maro ny mpisorona no nanamasina ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary faly ny fiangonana, dia ny Joda rehetra sy ny mpisorona sy ny Levita sy izay rehetra tafangona avy tamin''ny Isiraely mbamin''ny vahiny izay avy tany amin''ny tany Isiraely ary izay nonina tany Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa nisy fifaliana be tany Jerosalema; fa hatramin''ny andron''i Solomona, zanak''i Davida, mpanjakan''ny Isiraely, dia tsy mbola nisy tahaka izany tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia nitsangana ny Levita sy ny mpisorona ka nitso-drano ny olona; ary nohenoin'Andriamanitra ny feony, ka niakatra ho any an-danitra, fonenany masina, ny fivavany.
