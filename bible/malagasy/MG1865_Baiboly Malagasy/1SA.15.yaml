document_id: 1SA.15,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsy nahatanterahan'i Saoly ny tenin'Andriamanitra ny amin'ny handringanana ny Amalekita, sy ny nandavan'Andriamanitra azy tamin'izany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy Samoela tamin''i Saoly: Jehovah naniraka ahy hanosotra anao ho mpanjakan''ny Isiraely olony; koa ankehitriny mihainoa ny tenin''i Jehovah ianao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary tonga tamin''i Samoela ny tenin''i Jehovah hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Manenina Aho noho ny nanaovako an''i Saoly ho mpanjaka, fa niala tamin''ny fanarahana Ahy izy ka tsy nahatanteraka ny teniko. Dia tezitra Samoela ka nitaraina tamin''i Jehovah mandritra ny alina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nifoha maraina koa Samoela hitsena an''i Saoly, dia nisy nilaza tamin''i Samoela hoe: Saoly efa tonga ato Karmela, ary, indro, izy nanorina fahatsiarovana ho azy, dia nihodina ka nandroso nidina ho any Gilgala. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary Samoela tonga teo amin''i Saoly, dia hoy Saoly taminy: Hotahin''i Jehovah anie ianao; efa nahatanteraka ny tenin''i Jehovah aho. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa hoy Samoela: Inona anefa izany fibarareoky ny ondry aman- osy ren''ny sofiko izany sy ny fimàmàn''ny omby reko? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy Saoly: Avy tany amin''ny Amalekita no nitondrany ireny, fa ny olona namela izay ondry aman''osy sy omby tsara indrindra mba hovonoina hatao fanatitra ho an''i Jehovah Andriamanitrao, fa ny sisa dia naringanay'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nataonay herema
      marker-yv: yv-n
    - type: text
      text: ' ihany avokoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia hoy Samoela tamin''i Saoly: Aoka izay, fa hambarako aminao izay nolazain''i Jehovah tamiko halina. Ary hoy izy taminy: Ambarao ary. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia hoy Samoela: Na dia noheverinao ho kely aza ny tenanao, moa tsy tonga lohan''ny firenen''Isiraely va? Ary Jehovah nanosotra anao ho mpanjakan''ny Isiraely; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary Jehovah naniraka anao ka nanao hoe: Mandehana, ka aringano'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ataovy herema
      marker-yv: yv-n
    - type: text
      text: ' avokoa ny Amalekita mpanota, ary miadia aminy ambara-paharingany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa nahoana ianao no tsy nihaino ny feon''i Jehovah, fa nanao an-kazakazaka tamin''ny babo ka nanao izay ratsy eo imason''i Jehovah? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Hovaliako izay nataon''ny Amalekita tamin''ny Isiraely, dia ny nanotrehany azy tany an-dalana, fony izy niakatra avy tany Egypta. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa hoy Saoly tamin''i Samoela: Efa nihaino ny feon''i Jehovah ihany aho ka nandeha tamin''izay nanirahan''i Jehovah ahy ary nitondra an''i Agaga, mpanjakan''ny Amalekita, sady nandringana ny Amalekita rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nefa nangalan''ny olona ondry aman''osy sy omby ny babo, dia izay soa avy tamin''ny zavatra haringana,1 mba hovonoina hatao fanatitra ho an''i Jehovah Andriamanitrao ao Gilgala. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa hoy Samoela: Sitrak''i Jehovah moa ny fanatitra dorana sy ny fanatitra hafa alatsa-drà mihoatra noho ny mihaino ny feon''i Jehovah? He! ny manafaka no tsara noho ny fanatitra, ary ny mihaino no tsara noho ny saboran''ondrilahy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa ny miodina dia toy ny heloka amin''ny fankatovana, ary ny ditra dia toy ny manompo sampy sy terafima. Satria nandà ny tenin''i Jehovah ianao, dia nolaviny tsy ho mpanjaka kosa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy Saoly tamin''i Samoela: Efa nanota aho, fa efa nandika ny tenin''i Jehovah sy ny teninao; fa natahotra ny vahoaka aho ka nihaino ny feony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Koa ankehitriny, masìna ianao, mamelà ny heloko ary miverena amiko indray mba hiankohofako eo anatrehan''i Jehovah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa hoy Samoela tamin''i Saoly: Tsy hiverina aminao aho; fa ianao efa nandà ny tenin''i Jehovah, ary Jehovah kosa efa nandà anao tsy ho mpanjakan''ny Isiraely intsony. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary nony nihodina handeha Samoela, dia nohazonin''i Saoly ny sisin''akanjony ka triatra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia hoy Samoela tamin''i Saoly: Efa notriarin''i Jehovah kosa ho afaka aminao androany ny fanjakan''Isiraely ka efa nomeny ny namanao izay tsara noho ianao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary koa, ny Tokin''ny Isiraely tsy mba handainga na hanenina, fa tsy olona Izy ka hanenina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Koa mandehana ankehitriny, ka mameleza ny Amalekita, ary aringano
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ataovy herema
      marker-yv: yv-n
    - type: text
      text: ' izay rehetra mety ho azy, ka aza asiana miangana, fa vonoy avokoa, na lahy na vavy, na ankizy madinika, na zaza minono, na omby, na ondry aman''osy, na rameva, na boriky. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa hoy Saoly: Efa nanota aho izao, kanefa, masìna ianao, mba omeo voninahitra eo anatrehan''ny loholoko sy eo anatrehan''ny Isiraely aho, ary andeha re hiara-miverina amiko indray mba hiankohofako eo anatrehan''i Jehovah Andriamanitrao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary Samoela dia niverina nanaraka an''i Saoly indray ary Saoly niankohoka teo anatrehan''i Jehovah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia hoy Samoela: Entonareo eto amiko Agaga, mpanjakan''ny Amalekita. Ary Agaga nankeo aminy sady falifaly ka nanao hoe: Lasa tokoa ny fangidian''ny fahafatesana. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa hoy Samoela: Toy ny tsy nampananan''ny sabatrao zanaka ny vehivavy no tsy hananan''ny reninao zanaka kosa ao amin''ny vehivavy. Dia notetitetehin''i Samoela teo anatrehan''i Jehovah tao Gilgala Agaga. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary Samoela nankany Rama; fa Saoly kosa niakatra tany amin''ny tranony tao Gibean''i Saoly. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary Samoela tsy namangy an'i Saoly intsony ambara-pahafatiny; fa Samoela nalahelo an'i Saoly. Ary Jehovah nanenina noho ny nanaovany an'i Saoly ho mpanjakan'ny Isiraely.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Saoly namory ny olona ka nandamina azy tao Telaima, dia roa hetsy ny mandeha an-tongotra, ary iray alina ny lehilahy amin''ny Joda. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Saoly dia tonga tao an-tanànan''ny Amalekita ka nanotrika tao an-dohasaha. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy Saoly tamin''ny Kenita: Andeha miala ianareo, ka midìna hiala amin''ny Amalekita, fandrao miaraka aringako aminy ianareo, fa ianareo nanisy soa ny Zanak''Isiraely rehetra, fony izy nivoaka avy tany Egypta. Ka dia niala tamin''ny Amalekita ny Kenita. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary Saoly namely ny Amalekita hatrany Havila amin''ny lalana mankany Sora izay tandrifin''i Egypta. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary azony sambo-belona Agaga, mpanjakan'ny Amalekita, fa ny vahoaka rehetra kosa dia naringany
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nataony herema
      marker-yv: yv-n
    - type: text
      text: ' tamin''ny lelan-tsabatra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa Saoly sy ny olona tsy namono an'i Agaga sy izay tsara indrindra tamin'ny ondry aman'osy sy ny omby sy ny mifahy sy ny zanak'ondry ary izay tsara rehetra, fa tsy foiny ho naringana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hatao herema
      marker-yv: yv-n
    - type: text
      text: ' ireny; fa ny ratsy rehetra sy izay tsy tiany kosa dia naringany ihany avokoa. '
