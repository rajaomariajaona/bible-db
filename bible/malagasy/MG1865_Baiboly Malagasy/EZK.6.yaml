document_id: EZK.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny handravana ny fomban'ny sampy sy ny mpivavaka aminy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia ho fantany fa Izaho no Jehovah, ary tsy foana ny nilazako fa hahatonga izany loza izany aminy Aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah Tompo: Mameleza amin''ny tananao ianao, ary mitotoa amin''ny tongotrao, ka manaova hoe: Indrisy! ny fahavetavetana ratsy rehetra ataon''ny taranak''Isiraely, izay ho lavon''ny sabatra sy ny mosary ary ny areti-mandringana! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lavitra ho fatin''ny areti-mandringana, ny akaiky ho lavon''ny sabatra, ary izay sisa sy izay voaro dia ho faty mosary; Ka dia hotanterahiko aminy ny fahatezerako. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ho fantatrareo fa Izaho no Jehovah, Rehefa miampatrampatra eny amin''ny sampy manodidina ny alitarany ny voavono ao aminy, eny amin''ny havoana andrandraina rehetra, eny amin''ny tendrombohitra rehetra sy eny ambanin''ny hazo maitso rehetra sy eny ambanin''ny terebinta misandrahaka rehetra, dia eny amin''izay efa nanaterany hanitra ankasitrahana tamin''ny sampiny rehetra; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hahinjitro aminy ny tanako, ary ny tany any amin'ny fonenany rehetra dia hataoko lao sy foana mihoatra noho ny efitr'i Dibla; Ka dia ho fantany fa Izaho no Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak''olona, manandrifia ny tendrombohitry ny Isiraely, ary maminania ny hamelezana azy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ataovy hoe: Ry tendrombohitry ny Isiraely ô. Mihainoa ny tenin''i Jehovah Tompo: Izao no lazain''i Jehovah Tompo amin''ny tendrombohitra sy ny havoana, ary ny lohasahan-driaka sy ny lohasaha: Indro, Izaho no hahatonga sabatra hamely anareo, ary horavako ny fitoerana avonareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hokoroina ny alitaranareo, ary hosimbana ny tsangan-kazonareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsangam-batonareo'
      marker-yv: yv-n
    - type: text
      text: ' ho an''ny masoandro; ary hataoko mitsitra eo anoloan''ny sampinareo ny fatinareo; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fatin''ny zanak''Isiraely hataoko eo anoloan''ny sampiny; Ary ny taolanareo dia haeliko eny manodidina ny alitaranareo eny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Any amin'ny fonenanareo rehetra dia ho lao ny tanàna, Ary ho rava ny fitoerana avo, mba ho rava sy lao koa ny alitaranareo, dia hotapatapahina sy hofoanana ny sampinareo, ary hokapaina ny tsangan-kazonareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsangam-batonareo'
      marker-yv: yv-n
    - type: text
      text: ' ho an''ny masoandro, Ka dia holevonina ny asanareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hisy faty hiampatrampatra eo aminareo; Ka dia ho fantatrareo fa Izaho no Jehovah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hamelako hisy sisa ihany ianareo, fa hisy ho afaka amin''ny sabatra any amin''ny jentilisa, Rehefa voaely ho any amin''ny tany samy hafa ianareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay afaka aminareo dia hahatsiaro Ahy any amin''ny jentilisa izay hitondrana azy ho babo, rehefa voatorotoroko ny fony mijangajanga, izay efa niala tamiko, sy ny masony, izay mijangajanga manaraka ny sampiny, ary haharikoriko azy ny tenany noho ny ratsy izay efa nataony, dia ny fahavetavetany rehetra; '
