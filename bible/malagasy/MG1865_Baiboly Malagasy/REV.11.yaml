document_id: REV.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitsofana ny trompetra fahafito, sy ny nahatongavan'ny Joza fahatelo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nomena volotara tahaka ny tehina aho, ka nisy nilaza tamiko hoe: Mitsangàna, ka refeso ny tempolin''Andriamanitra sy ny alitara, ary isao izay mivavaka ao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny kianja eo ivelan'ny tempoly dia avelao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. atsipazo eny ivelany
    marker-yv: yv-n
  - type: text
    text: ' ihany, fa aza mba refesina; fa nomena ny jentilisa izany, ka hanitsaka ny tanàna masina roa amby efa-polo volana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary homeko hery ny vavolombeloko roa, ka haminany enim-polo amby roan-jato amby arivo andro izy, sady hitafy lamba fisaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ireo ilay hazo oliva roa sy ilay fanaovan-jiro roa, izay mitsangana eo anatrehan''ny Tompon''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha misy ta-handratra ireo, dia misy afo mivoaka amin''ny vavany ka mandany ny fahavalony; ary rana misy ta-handratra ireo, dia tsy maintsy hovonoina toy izany koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ireo dia manam-pahefana handrindrina ny lanitra, mba tsy hilatsahan''ny ranonorana amin''ny andro aminaniany; ary manam-pahefana amin''ny rano koa izy hampody azy ho rà sy hamely ny tany amin''ny loza araka izay andro tiany na oviana na oviana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa tanteraka ny filazany, dia hiady aminy kosa ilay bibi-dia miakatra avy amin''ny lavaka tsy hita noanoa ka haharesy sy hahafaty azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny fatiny hiampatra eny an-dalambe amin''ny tanàna lehibe, izay atao, araka ny hevi-panahy, hoe Sodoma sy Egypta, sady tao koa no nanomboana ny Tompony tamin''ny hazo fijaliana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny olona sy ny fokom-pirenena sy ny samy hafa fiteny ary ny firenena maro dia misy mijery ny fatiny hateloan''andro sy tapany; ary tsy avelany halevina ao am-pasana ny fatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny mponina ambonin''ny tany mifaly azy ka ravoravo, ary hifanati-javatra izy, satria nampangirifiry ny mponina ambonin''ny tany ireo mpaminany roa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary rehefa afaka ny hateloan''andro sy tapany, dia nisy fanahin''aina avy tamin''Andriamanitra niditra tao anatin''ireo, ary nijoro tamin''ny tongony izy, ka raiki-tahotra indrindra izay nahita azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nahare feo mahery avy tany an-danitra izy roa nanao taminy hoe: Miakara atỳ. Dia niakatra ho any an-danitra tao anatin''ny rahona ireo; ary nahatsinjo azy ny fahavalony. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tamin''izany ora izany dia nisy horohorontany mafy, ka rava ny ampahafolon''ny tanàna, ary maty tamin''izany horohorontany izany ny olona fito arivo; ary raiki-tahotra ny olona sisa ka nanome voninahitra an''Andriamanitry ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lasa ny loza faharoa; indro, avy faingana ny loza fahatelo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny anjely fahafito nitsoka, dia nisy feo mafy tany an-danitra nanao hoe: Ny fanjakana amin''izao tontolo izao dia efa lasan''ny ny Tompontsika sy ny Kristiny; ary Izy no hanjaka mandrakizay mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny loholona
  - type: usfm
    marker: x
    children:
    - type: text
      text: presbytera
    marker-yv: yv-n
  - type: text
    text: ' fatra amby roa-polo, izay mipetraka eo ambonin''ny seza fiandrianany eo anatrehan''Andriamanitra, dia niankohoka ka nivavaka tamin''Andriamanitra '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'nanao hoe: Misaotra Anao izahay, Tompo Ô, Andriamanitra Tsitoha, Ilay ankehitriny sy taloha, Satria nasehonao ny herinao lehibe, ka efa manjaka Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary tezitra ny firenena maro, ary tonga ny fahatezeranao Sy ny fotoana hitsarana ny maty, sy hanomezana valim-pitia ny mpaminany mpanomponao sy ny olona masina ary izay matahotra ny anaranao, na kely na lehibe, ary mba hanimbanao izay manimba ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary novohana ny tempolin'Andriamanitra any an-danitra, ka hita ny fiaran'ny fanekeny teo anatin'ny tempoliny; ary nisy helatra sy feo sy kotrokorana sy horohorontany ary havandra vaventy.
