document_id: PRO.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana hikatsaka ny fahendrena tsy hikambana amin'ny mpanao ratsy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanaka, henoy ny anatry ny ray, Ary tandremo mba hahazoanareo ny fahalalana tsara. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anaka, mihainoa, ka raiso ny teniko; Dia hihamaro ny taona hiainanao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Làlam-pahendrena no atoroko anao: Eny, mitarika anao amin''ny lalana mahitsy aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mandeha ianao, dia tsy ho etỳ ny lalanao; Ary raha mihazakazaka ianao, dia tsy ho tafintohina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tano mafy ny fananarana, ka aza avela hiala; Hazony izy, fa ainao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mankany amin''ny alehan''ny ratsy fanahy, Ary aza mizotra amin''ny lalan''ny ratsy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manalavira azy; aza mandalo eo akory; Mivilia azy, ka mizora. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy matory ireny, raha tsy efa nanao ratsy; Ary tsy mahita torimaso izy, raha tsy efa nanafintohina ny sasany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mihinana ny mofon''ny faharatsiana izy, Sy misotro ny divain''ny fahalozàna. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny lalan''ny marina dia toy ny fipoak''andro maraina, Izay mihamazava mandra-pitataovovonan''ny andro. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny alehan'ny ratsy fanahy dia toy ny aizim-pito; Tsy fantany akory izay manafintohina azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa anatra tsara no omeko anareo; Aza mahafoy ny lalàko. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anaka, tandremo ny teniko; Atongilano ny sofinao hihaino ny filazako. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza avela hiala eo imasonao izy, Fa raketo ao am-ponao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa aina ho an'ny mahazo azy izy Ary fahasalamana ho an'ny nofony rehetra.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tandremo ny fonao mihoatra noho izay rehetra tokony hotandremana; Fa avy ao aminy no ihavian
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fivoahan'
      marker-yv: yv-n
    - type: text
      text: '''ny aina. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esory aminao ny vava mandainga, Ary ampanalaviro anao ny molotra mamitaka. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka ny masonao hijery mahitsy, Ary ny hodimasonao hibanjina eo anoloanao.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ataovy marina ny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Saino tsara izay'
      marker-yv: yv-n
    - type: text
      text: ' alehan''ny tongotrao, Dia ho voalamina ny alehanao rehetra; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mivily, na ho amin'ny ankavanana, na ho amin'ny ankavia; Esory amin'ny ratsy ny tongotrao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa zanak'ikaky aho, Sady tiana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. malemilemy
      marker-yv: yv-n
    - type: text
      text: ' no hany malala teo imason''ineny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampianatra ahy izy ka nanao tamiko hoe: Aoka ny fonao hitana ny teniko; Tandremo ny didiko, dia ho velona ianao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahazoa fahendrena, mahazoa fahalalana; Fa aza hadinoina na ihemorana ny teny aloaky ny vavako. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mahafoy azy, fa hiaro anao izy; Tiavo izy, dia hitandrina anao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny voaloham-pahendrena dia izao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fahendrena no ambony indrindra'
      marker-yv: yv-n
    - type: text
      text: ': Mahazoa fahendrena; Eny, lanio ny fanananao rehetra hamidy fahalalana tsara. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asandrato izy, dia hanandratra anao kosa Eny, hanome voninahitra anao izy, raha tananao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hasiany fehiloha mahafinaritra ny lohanao; Eny, satro-boninahitra tsara tarehy no homeny anao. '
