document_id: JER.13,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hampietrena ny avonavon'ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nolazain''i Jehovah tamiko: Andeha mividy fehin-kibo rongony ho anao, ka ifehezo ny kibonao, fa aza atao anaty rano. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ity firenena ratsy ity, izay tsy mety mihaino ny teniko, fa mandeha amin''ny ditry ny fony ka manaraka andriamani-kafa mba hotompoiny sy hiankohofany, dia ho tahaka ity fehin-kibo ity, izay tsy azo atao na inona na inona intsony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa toy ny firaikitry ny fehin-kibo amin''ny valahan''ny olona no nampiraiketako ny taranak''Isiraely sy ny taranak''i Joda rehetra tamiko, hoy Jehovah, mba ho olona sy anarana sy fiderana ary voninahitra ho Ahy ireny Kanjo tsy nety nihaino izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao teny izao dia lazao aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Ny tavoara rehetra dia feno divay; ary izy hanao aminao hoe: Moa tsy efa fantatray ihany va fa feno divay ny tavoara rehetra? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia holazainao aminy hoe: Izao no lazain''i Jehovah: Indro, hataoko leony'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. feno
      marker-yv: yv-n
    - type: text
      text: ' ny mponina rehetra amin''ity tany ity, dia ny mpanjaka, izay mipetraka amin''ny seza fiandrianan''i Davida, sy ny mpisorona sy ny mpaminany ary ny mponina rehetra any Jerosalema. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hampifamohiko izy, dia ny ray mbamin''ny zanany, hoy Jehovah; Tsy hiantra Aho, na hitsitsy, na hamindra fo tsy handringana azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandrenesa ka mihainoa, aza miavonavona; Fa Jehovah no miteny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manomeza voninahitra an''i Jehovah Andriamanitrareo, dieny tsy mbola mahatonga ny maizina Izy, ary dieny tsy mbola tafintohina amin''ny tendrombohitra maizimaizina ny tongotrareo, ka raha miandry ny mazava ianareo, dia hataony tonga ho aloky ny fahafatesana, ka hampodiny ho aizim-pito. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy hihaino izany ianareo. Dia hitomany any amin''ny mangingina ny fanahiko, satria misy fiavonavonana; Eny, ny masoko hamarin-dranomaso hijononoka be, satria voababo ny ondrin''i Jehovah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao amin''ny andriamanjaka sy ny reniny hoe: Mitombena amin''ny tany; Fa ho afaka ny firavaka eo an-dohanareo, dia ny satro-boninahitrareo tsara tarehy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voarindrina ny tanàna any amin''ny tany atsimo, ka tsy misy mamoha; Lasan-ko babo Joda, eny, lasan-ko babo avokoa izy rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nividy fehin-kibo aho araka ny tenin''i Jehovah ka nifehezako ny kiboko. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atopazy ny masonareo, ka tazano izay avy any avaratra; Aiza ny ondry andiany izay nomena anao, dia ny ondrinao tsara tarehy? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana re no holazainao, raha tendreny hanapaka anao ireny sakaizanao ireny, fa ianao ihany no nampianatra azy handrafy anao? Tsy hahazo anao va ny fanaintainana toy ny vehivavy raha miteraka? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha manao anakampo ianao hoe: ahoana no nahatonga izao tamiko? Noho ny haben''ny helokao no nampiaingana ny moron-tongotr''akanjonao sy nandratrana ny ombelahin-tongotrao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa mahova ny hodiny va ny Etiopiana, ary ny leoparda
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaram-biby masiaka sady misoratsoratra
      marker-yv: yv-n
    - type: text
      text: ' va mahova ny sorany? Raha izany, dia mahazo manao tsara koa ianareo izay efa zatra nanao ratsy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia haeliko izy toy ny vodivary indaosin''ny rivotra avy any an-efitra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no lokanao, dia anjara voarefy ho anao, hoy Jehovah, Satria nanadino Ahy ianao ka nitoky tamin''ny lainga. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izaho kosa dia hampiainga ny moron-tongotr''akanjonao ho eny amin''ny tavanao, mba hisehoan''ny henatrao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fijangajanganao sy ny fanenonao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Izahao v. 8
      marker-yv: yv-n
    - type: text
      text: ', ny fahavetavetan''ny fijejojejoanao any amin''ny havoana any an-tsaha, eny, samy efa hitako avokoa ireo fahavetavetanao ireo. Lozanao, ry Jerosalema! Mandra-pahoviana no mbola tsy hetezanao hanadio ny tenanao?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko fanindroany ny tenin''i Jehovah hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ento ny fehin-kibo izay novidinao, dia ilay ifehezanao ny kibonao, ka mitsangana, mankanesa any Eofrata, ary afeno ao an-tsefatsefaky ny harambato izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia nandeha aho, ary nafeniko tao amoron''i Eofrata izy, araka ny nandidian''i Jehovah ahy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony afaka andro maro, dia hoy Jehovah tamiko: Mitsangana, ka mankanesa any Eofrata, ary alao any ny fehin-kibo, dia ilay nasaiko nafeninao tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nankany Eofrata aho ka nihady, ary nalaiko tao amin'ny fitoerana nanafenako azy ilay fehin-kibo; kanjo, indro, simba ny fehin-kibo ka tsy azo natao na inona na inona intsony.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga tamiko ny tenin''i Jehovah hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah: Tahaka izany no hanimbako ny avonavon''ny Joda sy ny haben''ny avonavon''i Jerosalema. '
