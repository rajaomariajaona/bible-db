document_id: PRO.23
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Raha mipetraka hiara-komana amin'ny mpanapaka ianao, Dia hevero tsara izay eo anatrehanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: anoloanao'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ka andraso antsy ny tendanao, Raha dia liana loatra ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza mitsiriritra ny hanim-piny, Fa hani-mamitaka izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza manasa-tena hanan-karena, Aza entina amin''izany ny fahendrenao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moa hampanarahinao azy va ny masonao, nefa tsy ao intsony izy? Fa maniry elatra tokoa izy Ka manidina toy ny voromahery ho eny amin'ny lanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aza homana ny mofon''izay ratsy fijery, Ary aza mitsiriritra ny hanim-piny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tahaka ny heviny ao am-pony ihany no toetrany: Hoy izy aminao: Mihinàna, misotroa; Kanjo tsy sitrany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay sombiny kely voatelinao aza dia mbola haloanao, Ka ho very foana ny teny mahafinaritra nataonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza miteny amin'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. an-tsofin'
    marker-yv: yv-n
  - type: text
    text: ' ny adala;Fa hohamavoiny foana ny fahendren''ny teninao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza manakisaka ny fari-tany ela, Ary aza manitatra mankamin
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. miditra amin'
    marker-yv: yv-n
  - type: text
    text: '''ny sahan''ny kamboty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa mahery ny Mpanavotra azy, Izy no hisolo vava azy amin'ny adiny aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ampiekeo famaizana ny fonao, Sy tenim-pahalalana ny sofinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza tsy manafay zanaka, Fa tsy dia ho faty izy tsy akory na dia asianao ny hazo aza
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa tsy ho faty izy, raha asianao ny hazo'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha mamely azy amin'ny hazo ianao, Dia ho voavonjinao tsy ho any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' ny fanahiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Anaka, raha hendry ny fonao,Dia ho faly koa ny foko, dia ny foko; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eny, ho ravoravo ny fanahiko
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. voako
    marker-yv: yv-n
  - type: text
    text: ', Raha miteny marina ny molotrao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aoka tsy hialona ny mpanota ny fonao; Fa matahora an''i Jehovah mandritra ny andro; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa raha mbola hisy koa ny farany, Dia tsy ho foana ny fanantenanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mihainoa ianao, anaka, ka hendre, Ary ampizory amin''ny lalana ny fonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aza misakaiza amin''izay mpiboboka divay Sy izay fatra-pitia hena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa halahelo izay mpiboboka sy izay fatra-pitia hena; Ary ny fitiavan-torimaso mampitafy voro-damba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Maneke ny rainao izay niteraka anao. Ary aza manamavo ny reninao, saingy efa antitra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Vidio ny marina, ka aza amidy, Dia ny fahendrena sy ny fananarana ary ny fahazavan-tsaina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hifaly dia hifaly ny rain''ny marina, Ary izay miteraka zaza hendry hanampifaliana aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aoka ho faly ny rainao sy ny reninao, Eny, aoka ho ravoravo ny reninao izay niteraka anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Anaka, atolory ahy ny fonao, Ary aoka ny masonao ho faly mijery ny lalako
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary aoka ny masonao handinika ny lalako'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa ny vehivavy jejo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. vehivavy tsy vadiny
    marker-yv: yv-n
  - type: text
    text: ' dia hady lalina, Ary ny vahiny janga lavaka etỳ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny, manotrika toy ny jiolahy ireny Ary mahamaro ny olona mpivadika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: An'iza ny Indrisy? An'iza ny Endrey? An'iza ny fifandirana? An'iza ny fitolokoana? An'iza ny ratra tsy ahoan-tsy ahoana? An'iza ny maso mivoara-mena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: manjambena'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'An''izay mikikitra amin''ny divay, Eny, an''izay mandeha hanandrana divay voaharoharo zavatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aza mijery ny divay noho ny hamenany Sy ny fanganohanony eo anaty gilasy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. kapoaka
    marker-yv: yv-n
  - type: text
    text: ' Ary ny fikoriany mahafinaritra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa amin''ny farany dia hanaikitra toy ny bibilava izy Ary hanindrona toy ny menarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Koa ny masonao dia hijery vehivavy jejo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. vehivavy tsy vadiny
    marker-yv: yv-n
  - type: text
    text: ', Ary ny fonao hieritreri-dratsy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny masonao hahita zavatra hafahafa, Ary ny fonao hirediredy foana'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Eny, ho sahala amin''izay mandry ao amin''ny ranomasina ianao Sady ho tahaka izay mandry eo an-tendron''ny andrin-tsambo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nokapohiny aho, hoy ianao, fa tsy reko naharary ahy, Nandalasiny aho, fa tsy tsaroako; Rahoviana ange aho no hifoha mba hitadiavako azy indray?
