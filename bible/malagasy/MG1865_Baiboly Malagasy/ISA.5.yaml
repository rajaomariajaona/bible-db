document_id: ISA.5,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny Isiraely. tanim-boalobok'i Jehovah, sy ny hanjo azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Aoka aho hihira ny amin
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho an'''
      marker-yv: yv-n
    - type: text
      text: '''ny Malalako, dia hiran''ny Malalako ny amin''ny tanim-boalobony. Ny Malalako nanana tanim-boaloboka tao an-kavoana lonaka; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary bata iray monja no ho vokatry ny tanim-boaloboka folo Zemeda
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zemeda dia anaram-pandrefesana, tokony ho antsasaky ny akera
      marker-yv: yv-n
    - type: text
      text: ', Ary rehefa iray monja no ho vokatry ny voan-javatra eran''ny homera. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lozan''izay mifoha maraina koa ka mitady toaka! Izay miboboka mandra-paharivan''ny andro ka ampirehetin''ny divay! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny lokanga sy ny valiha, ny ampongatapaka sy ny sodina ary ny divay no foto-panasany; Fa ny asan''i Jehovah tsy mba jereny, Ary ny ataon''ny tanany tsy mba hitany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary noho izany dia ho lasan-ko babo ny oloko noho ny tsi-fahalalany, Ary ny olona ambony ho mosarena, Ary ny valalabemandry ho main''ny hetaheta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Koa izany no mampitanatana vava ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: He. Sheola
      marker-yv: yv-n
    - type: text
      text: ' Hanao teli-moka an''i Jerosalema'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. azy
      marker-yv: yv-n
    - type: text
      text: '; Ary any no hivarinan''ny voninahiny sy ny fihahohahony ary ny tabatabany mbamin''izay mifalifaly ao aminy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny zanak''olombelona dia hatao mitanondrika, Ary ny olona haetry, Ary ny mason''ny miandranandrana dia haidina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa Jehovah, Tompon''ny maro, no hisandratra amin''ny fitsarana, Ary Andriamanitra masina dia hiseho ho masina amin''ny fahamarinana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny zanak''ondry hikania toy ny eny amin''ny tany fiandrasana azy ihany; Ary ny tany foana izay nipetrahan''ny matavy, dia mpirenireny no hiandry ondry ao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lozan''izay mitari-keloka amin''ny kofehin''ny faharatsiana Ary mitarika ota toy ny amin''ny mahazakan-tsariety, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia izay manao hoe: Aoka hohafainganiny sy hododonany ny asany, mba ho hitantsika, Ary aoka izay kasain''ny Iray Masin''ny Isiraely ho mby akaiky ka ho tanteraka, mba ho fantatsika! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nasainy io, ka nesoriny ny vato, Ary novoleny karazam-boaloboka tsara, Sady nanao tilikambo teo afovoany Izy Ary nandavaka famiazam-boaloboka teo; Dia nanantena azy hamoa voaloboka tsara Izy, Kanjo namoa voalobo-dratsy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Lozan''izay milaza ny ratsy ho tsara ary na tsara ho ratsy! Izay manao ny maizina ho mavaza ary ny mazava ho maizina! Izay manao ny mangidy ho mamy ary ny mamy ho mangidy! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Lozan''izay manao azy ho hendry sy manao azy ho mazava saina! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Lozan'izay fatratra nefa amin'ny fisotroan-divay ihany, sy izay kanto
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mahery
      marker-yv: yv-n
    - type: text
      text: ' nefa amin''ny fampiharoharoana toaka ihany! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary izay manamarina ny meloka noho ny kolikoly sy manala ny rariny amin''ny marina! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa toy ny fandevonan''ny lelafo ny mololo, ary toy ny fifitsaky ny bozaka midedadeda, dia toy izany no hahalovan''ny fakany sy hijofoan''ny voniny hanjary vovoka, satria efa nandà ny lalàn''i Jehovah, Tompon''ny maro izy Sy nanamavo ny tenin''ny Iray Masin''ny Isiraely. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Koa izany no irehetan'ny fahatezeran'i Jehovah amin'ny olony sy aninjirany ny tànany aminy ka amelezany azy; Dia mihorohoro ny tendrombohitra, ary ny fatin'ny olona dia tonga tahaka ny diky eny an-dalambe. Kanefa, na dia izany rehetra izany aza, dia tsy mbola afaka ihany ny fahatezerany, fa mbola mihinjitra ihany ny tànany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary hanangana faneva ho amin'ny firenena lavitra Izy sady hisiaka hiantso ny iray avy any am-paran'ny tany; Ary, indro, ho avy faingana dia faingana ireo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mahery
      marker-yv: yv-n
    - type: text
      text: '; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tsy hisy reraka na tafintohina ao aminy; Tsy ho rendrehana na hatory izy: Tsy hiboraka ny fehin-kibony, ary tsy ho tapaka ny fehin-kapany, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Maranitra ny zana-tsipìkany, Ary voahenjana avokoa ny tsipìkany; Ny kitron-tsoavaliny atao ho tahaka ny afovato; Ary ny kodiany ho tahaka ny tadio; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ny fierony dia tahaka ny fieron''ny liom-bavy, Ary mierona tahaka ny liona tanora izy; Eny, manerona izy ka mandrapaka ny toha, Dia lasany, ka tsy azo alaina intsony. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa noho izany, ry mponina any Jerosalema sy ry lehilahy amin''ny Joda, Masìna ianareo, tsarao Aho sy ny tanim-boaloboko. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary hirohondrohona aminy amin'izany andro izany izy Tahaka ny firohondrohon'ny ranomasina; Ary raha mijery ny tany ny olona, dia indro aizina sy fahoriana; Ary ny fahazavana hohamaizinin'ny rahona.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Inona moa no mbola azo natao tamin''ny tanim-boaloboko, Ka tsy efa nataoko taminy? Koa raha nanantena azy hamoa voaloboka tsara Aho, Nahoana no namoa voalobo-dratsy izy? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa noho izany dia aoka hambarako anareo izay hataoko amin''ny tanim-boaloboko: Hesoriko ny fefy tsilony, ka dia holevonina izy; Ary harodako ny fefy vatony, ka dia ho voahitsakitsaka izy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary hataoko simba dia simba izy; Tsy hohetezana ny sakeli-boalobony, ary tsy hohevoina izy, Fa ho rakotry ny hery sy ny tsilo; Ary hodidiako ny rahona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. rahona matevina
      marker-yv: yv-n
    - type: text
      text: ' tsy hampilatsaka ranonorana aminy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ny taranak'i Isiraely no tanim-boalobok'i Jehovah, Tompon'ny maro, Ary ny lehilahy amin'ny Joda no voly tiany; Dia nanantena fitsarana marina Izy, kanjo fandatsahan-drà
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fampahoriana'
      marker-yv: yv-n
    - type: text
      text: '; Niandry fahamarinana Izy, kanjo, indro, fitarainana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lozanareo izay mangorona trano lalandava Sady mampiharo vala ny saha amin''ny saha, Ambara-paha-tsy hisy hitoeran''ny sasany intsony, Mba ho tonga mponina manirery eo amin''ny tany ianareo! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izao no ren''ny sofiko avy amin''i Jehovah, Tompon''ny maro: Marina tokoa fa ho foana ny trano maro, Eny, na dia izay lehibe sady tsara aza dia tsy hisy mpitoetra. '
