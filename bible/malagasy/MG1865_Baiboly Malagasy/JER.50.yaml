document_id: JER.50
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'i Babylona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izao no teny nampilazain'i Jehovah an'i Jeremia mpaminany ny amin'i Babylona dia ny tanin'ny Kaldeana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ambaraonareo, eny, torio any amin''ny firenena, ary manangàna faneva, torio, fa aza afenina, ataovy hoe: Afaka Babylona! Mangaihay Bela, raiki-tahotra Merodaka! Eny, mangaihay ny sampiny, Raiki-tahotra ny sarin-javatra! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa misy firenena avy any avaratra miakatra hamely azy ka hahatonga ny taniny ho lao tsy hisy mponina intsony; Fa na ny olona na ny biby dia samy handositra ka ho lasa avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Amin''izany andro izany sy amin''izany fotoana izany, hoy Jehovah, dia ho avy ny Zanak''Isirsely, dia izy mbamin''ny taranak''i Joda, eny, handeha izy sady hitomany eny am-pandehanana ka hitady an''i Jehovah Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hanontany ny lalana mankany Ziona izy sady hanatrika hankany ka hanao hoe: Avia, ka maneke ho an''i Jehovah amin''ny fanekena mandrakizay izay tsy hohadinoina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ondry very ny oloko, fa ny mpiandry azy nampirenireny azy, eny, nampirenireny azy teny an-tendrombohitra izy; Nirenireny teny an-tendrombohitra sy teny an-kavoana ireny. Ka hadinony ny tany fandriany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izay rehetra nahita azy dia nandringana azy, ary ny fahavalony nanao hoe: Tsy manan-keloka izahay, satria izy efa nanota tamin''i Jehovah, fonenan''ny fahamarinana, dia Jedovah, fanantenan''ny razany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mandosira hila an''i Babylona, eny, mialà amin''ny tanin''ny Kaldeana, ary aoka ianareo ho tahaka ny anankiray izay tari-dalan''ny ondry aman''osy andiany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa, indro, Izaho hamporisika sy hampiakatra firenena lehibe manao andiany avy any avaratra hamely an''i Babylona; Ary hilahatra hamely azy ireo, ka avy ao no hanafahany azy; Ny zana-tsipìkany ho tahaka ny lehilahy mahery sady mahay, izay tsy miverina foana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Kaldea ho voababo; Izay rehetra mamabo azy dia ho afa-po, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Satria, mifaly sy miravoravo ianareo, ry mpamabo ny lovako, eny, mifalihavanja toy ny ombivavy kely mively vary
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ombivavy kely eny amin''ny ahitra'
    marker-yv: yv-n
  - type: text
    text: ' ianareo sady maneno toy ny soavaly matanjaka; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia ho menatra indrindra ny reninareo, hangaihay ilay niteraka anareo; Indro, ny faran''ny firenena, efitra sy tany karankaina ary tani-hay! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Noho ny fahatezeran''i Jehovah dia tsy honenana Babylona. Fa ho tonga tany lao avokoa; Izay rehetra mandalo azy dia ho gaga ka hisitrisitra noho ny loza rehetra namelezana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Milahara manodidina hamely an''i Babylona, ianareo rehetra izay manenjana tsipìka; Asio izy, fa aza tsitsina ny zana-tsipìka, fa tamin''i Jehovah no nanotany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Akoray manodidina izy! Fa efa nikoy; Nirodana ny bateriny, rava ny mandany; Fa famalian''i Jehovah izany. Valio izy, eny, toy ny efa nataony no mba ataovinareo aminy kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aringano tsy ho any Babylona ny mpamafy sy izay mitana fijinjana amin''ny fararano; Fa noho ny sabatra mandoza dia samy hihodina ho any amin''ny fireneny avy izy, ary samy handositra ho any amin''ny taniny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ondry iray voavily ny Isiraely, Liona no nanenjika azy; Voalohany dia ny mpanjakan'i Asyria no nandany azy. Ary farany dia ity Nebokadnezara, mpanjakan'i Babylona, ity no nanapatapaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nikiky'
    marker-yv: yv-n
  - type: text
    text: ' ny taolany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hovaliko ny mpanjakan''i Babylona sy ny taniny toy ny efa namaliako ny mpanjakan''i Asyria. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hampodiko ho any amin''ny saha fiandrasana azy indray ny Isiraely, ka hihinana ao Karmela sy Basana izy; Ary any an-tany havoan''i Daima sy Gileada no hahavoky azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin'izany andro izany sy amin'izany fotoana izany, hoy Jehovah, dia hotadiavina izay heloky ny Isiraely, fa tsy hisy; Ary izay fahotan'ny Joda, fa tsy ho hita; Satria havelako ny helok'izay sisa narovako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Iakaro Ibefikomiana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Anaran'i Babylona io
    marker-yv: yv-n
  - type: text
    text: ' sy ny mponina ao Arapamaliana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Anaran'i Babylona io
    marker-yv: yv-n
  - type: text
    text: ; Ravao sy aringano
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ataovy herema
    marker-yv: yv-n
  - type: text
    text: ' manarakaraka azy, hoy Jehovah, ary manaova araka izay rehetra nandidiako anao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Misy tabataban''ady amin''ny tany sy fandringanana be. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Indrisy! tapaka sy torotoro ilay fampohazan''ny tany rehetra; Indrisy! Babylona efa tonga figagana any amin''ny firenena. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nofandrihako ianao, ry Babylona, ka voa, nefa tsy fantatrao akory; Hita ka voasambotra koa ianao, Satria nila ady tamin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Novohan''i Jehovah ny firaketany. Ka navoakany ny fitaovan''ny fahatezerany; Fa misy hataon''i Jehovah, Tompon''ny maro, any amin''ny tanin''ny Kaldeana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avia avokoa ianareo rehetra hamely azy; Vohay ny trano fitoeran-kanina, atobitobio toy ny antontan-bary, ka levony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ataovy herema
    marker-yv: yv-n
  - type: text
    text: ' avokoa izay ao; Fa aza avela hisy sisa ho azy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vonoy ireo ombilahy rehetra, ary aoka hidina ho any amin''ny famonoana izy. Mahita loza izy, fa tonga ny androny, dia ny fotoana hamaliana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Injany! misy feon'izay mandositra sy izay afaka avy any amin'ny tany Babylona, hanambara ny famalian'i Jehovah Andriamanitsika ao Ziona, dia ny famaliana noho ny tempoliny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Antsoy ny mpandefa zana-tsipìka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny mahery'
    marker-yv: yv-n
  - type: text
    text: ' hamely an''i Babylona. Dia ny mpanenjana tsipìka rehetra; Mitobia manodidina hamely azy; Aoka tsy hisy ho afaka izy; Valio araka ny asany izy, eny, araka ny asa rehetra nataony, no mba ataovy aminy kosa; Fa niavonavona tamin''i Jehovah izy, dia tamin''ny Iray Masin''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa hiampatrampatra eny ankalalahana ny zatovony, ary ho ringana ny miaramilany rehetra amin''izany andro izany, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Indro, hiatrika aminao Aho, ry Ifiavonavonana, hoy Jehovah, Tompon''ny maro; Fa tonga ny andronao, dia ny fotoana hamaliako anao. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ho tafintohina Ifiavonavonana, dia ho lavo, ka tsy hisy hanarina azy; Ary handrehitra afo ao an-tanànany Aho, ka handevona ny manodidina azy rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Niara-nampahorina ny Zanak''Isiraely sy ny taranak''i Joda; Ary izay rehetra namabo azy dia mihazona azy mafy ka tsy mety mandefa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mahery ny Mpanavotra azy, Jehovah, Tompon''ny maro, no anarany; Handahatra ny adiny tokoa Izy, mba hampiadana ny tany sy hampangovitra ny mponina any Babylona kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Indro! hisy sabatra hamely ny Kaldeana mbamin''ny mponina any Babylona sy ny mpanapaka azy sy ny olon-kendriny, hoe Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Indro! hisy sabatra hamely ny mpibedibedy, ka ho very saina izy; Indro! hisy sabatra hamely ny lehilahy maheriny, ka hivadi-po izy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Indro! hisy sabatra hamely ny soavaliny sy ny kalesiny mbamin''ny olona samy hafa firenena rehetra ao aminy, ka ho tonga toy ny vehivavy ireny! Indro! Hisy sabatra hamely ny firaketany, ka horobaina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ny fihantonan''ny andro no mahatankina ny ranony; Fa tany be sarin-javatra voasokitra izy, ary ny sampiny mahatahotra mahadala azy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Koa ny bibi-dia any an-efitra sy ny kary
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. jakala
    marker-yv: yv-n
  - type: text
    text: ' sy ny ostritsa no honina ao; Tsy honenana intsony mandrakizay izy ary tsy hitoerana hatramin''ny taranaka fara-mandimby. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Toy ny nandravan''Andriamanitra an''i Sodoma sy Gomora mbamin''ny tanàna eny akaikiny, hoy Jehovah, no tsy hisian''olona honina any na zanak''olombelona hivahiny any. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Indro, misy firenena avy any avaratra, dia firenena lehibe sy mpanjaka maro no mitsangana avy any amin''ny faran''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Tsipika sy lefona no entiny; Lozabe sy tsy mamindra fo izy, ny feony dia mirohondrohona toy ny ranomasina, sady mitaingin-tsoavaly izy ary voaomana tahaka ny lehilahy ho amin''ny ady, hamely anao, ry Babylona zanakavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Efa ren''ny mpanjakan''i Babylona ny lazany, ka miraviravy tànany izy; Fahoriana no mahazo azy, eny, fanaintainana tahaka ny vehivavy raha miteraka. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Indro, toy ny fiakatry ny liona avy ao amin'ny kirihitrala eny amoron
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ny reharehany
    marker-yv: yv-n
  - type: text
    text: '''i Jordana no hiakarany ho any amin''ny misy ahitra mateza'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fonenany mafy'
    marker-yv: yv-n
  - type: text
    text: '; Nefa hampandosiriko tampoka hiala ao aminy izy, ary izay olona anankiray voafidy no hotendreko hanapaka azy; Fa iza no tahaka Ahy, ary iza no hifandahatra amiko? Ary iza moa no mpiandry ondry mahajanona eo anatrehako? '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Koa henoy ny saina avy amin''i Jehovah, izay nosaininy hamelezana an''i Babylona, sy ny heviny izay noheveriny hamelezana ny tanin''ny Kaldeana: Hoviraviraina tokoa ireny, dia ny kely indrindra amin''ny ondry; Ho gaga azy tokoa ny saha fiandrasana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Noho ny antsoantso hoe: "Efa afaka Babylona", dia mihorohoro ny tany, ary ny fitarainana dia re any amin''ny firenena.'
