document_id: NUM.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hifidianana tanàna handosiran'izay nahafaty olona tsy nahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy teo Arbota-moaba, amoron''i Jordana tandrifin''i Jeriko, ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandidia ny Zanak''Isiraely mba hanome tanàna ao amin''ny zara-taniny avy honenan''ny Levita; ary homenareo tany manodidina ny tanàna koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa ny tanàna dia honenany; ary ny tany dia ho an''ny biby fiompiny sy ny fananany mbamin''ny bibiny rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny tany manodidina ny tanàna izay homenareo ny Levita dia izao: Hatramin''ny màndan''ny tanàna ka hatramin''ny faritry ny taniny dia arivo hakiho amin''ny lafiny efatra avy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia handrefy roa arivo hakiho eo ivelan''ny tanàna ianareo amin''ny lafiny atsinanana, ary roa arivo hakiho amin''ny lafiny atsimo, ary roa arivo hakiho amin''ny lafiny andrefana, ary roa arivo hakiho amin''ny lafiny avaratra, ary ny tanàna dia ho eo afovoany; izany no ho taniny manodidina ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izao no tanàna izay homenareo ny Levita: dia tanàna enina, fandosirana, izay homenareo handosiran''izay nahafaty olona, sy tanàna roa amby efa-polo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ny tanàna rehetra izay homenareo ny Levita dia valo amby efa-polo mbamin''ny tany manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny amin''ny tanàna izay homenareo avy amin''ny zara-tanin''ny firenen''ny Zanak''Isiraely, dia izay be no hanalanareo be, ary izay kely no hanalanareo kely: samy hanome tanàna ho an''ny Levita izy rehetra araka ny zara-taniny avy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mitenena amin''ny Zanak''Isiraely hoe: Rehefa tafita an''i Jordana ianareo ka tonga any amin''ny tany Kanana, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia hifidy tanàna ianareo, ho tanàna fandosirana ho anareo, mba handosiran''izay nahafaty olona tsy nahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia ho fandosirana ho anareo mba tsy ho azon''ny mpamaly rà izany tanàna izany, mba tsy ho faty izay nahafaty olona mandra-pisehony hotsaraina eo anatrehan''ny fiangonana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ireo tanàna homenareo ireo dia ho tanàna fandosirana enina ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny tanàna telo dia homenareo etỳ an-dafin''i Jordana etỳ, ary ny tanàna telo kosa homenareo ao amin''ny tany Kanana; ho tanàna fandosirana ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ireo tanàna enina ireo dia ho fandosirana ho an''ny Zanak''Isiraely sy ny vahiny ary ny mpitoetra ao aminy, mba handosiran''izay rehetra nahafaty olona tsy nahy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa raha misy mamely vy olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha misy mamely vato olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha misy mamely hazo olona ka mahafaty, dia nahafaty olona izy; hatao maty tokoa izay nahafaty olona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny mpamaly rà no mahazo mamono azy; raha mihaona aminy izy, dia mahazo mamono azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha misy mamely olona noho ny lolom-po, na mitoraka olona amin''ny fanotrehana, ka mahafaty, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'na mamely amin''ny tànany noho ny fandrafiana ka mahafaty, dia hatao maty tokoa ilay namely; nahafaty olona izy; ny mpamaly rà no mahazo mamono azy, raha mihaona aminy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha misy mamely olona tsy nahy, ka tsy noho ny fandrafiana, na mitoraka olona na amin''inona na amin''inona, nefa tsy amin''ny fanotrehana, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'na sendra manjera vato ka mahafaty olona, nefa tsy hitany, sady tsy fahavalony izy, na mitady handratra azy, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia hotsarain''ny fiangonana ilay namely sy ny mpamaly rà araka izany lalàna izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hovonjen''ny fiangonana ho afaka amin''ny mpamaly rà ilay nahafaty olona, ka hateriny indray ho ao amin''ny tanàna fandosirana izay nalehany tamin''izy nandositra; ary hitoetra ao izy mandra-pahafatin''ny mpisoronabe izay voahosotra tamin''ny diloilo masina. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa raha mivoaka ho eo ivelan''ny tanàna fandosirana izay nalehany tamin''izy nandositra ilay nahafaty olona '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ka hitan''ny mpamaly rà eo ivelan''ny tanàna, dia azony vonoina izy; ary tsy hisy valin-drà amin''izany, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'satria tokony ho nitoetra tao an-tanàna fandosirana izy mandra-pahafatin''ny mpisoronabe; fa rehefa maty ny mpisoronabe, dia mahazo mody any amin''ny zara-taniny ihany ilay nahafaty olona. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary izany zavatra izany dia ho lalàna hitondrana anareo hatramin''ny taranakareo fara mandimby eny amin''izay rehetra onenanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny amin''izay rehetra mahafaty olona, dia hatao maty izay mahafaty, araka ny tenin''ny vavolombelona; nefa raha vavolombelona iray monja, dia tsy ampy hanameloka hahafaty olona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ianareo tsy handray avotry ny ain''ny nahafaty olona, izay meloka ka tokony ho faty; fa hatao maty tokoa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ianareo tsy handray avotra ho an''izay mandositra ho ao an-tanàna fandosirana, mba hodiany indray hitoetra amin''ny taniny, raha mbola tsy maty ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary aza mametaveta ny tany izay onenanareo, fa ny rà dia fametavetana ny tany; ary ny tany tsy azo anaovana fanavotana ny amin''ny rà izay nalatsaka teo, afa-tsy amin''ny ran''izay nandatsaka azy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary aza lotoinareo ny tany onenanareo, izay itoerako; fa Izaho Jehovah mitoetra eo amin'ny Zanak'Isiraely.
