document_id: 1CO.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny raharahan'ny mpitoriteny, sy ny mbola hizahan-toetra azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho, ry rahalahy, tsy nahazo niteny taminareo tahaka ny amin''izay araka ny Fanahy, fa tahaka ny amin''izay mbola nofo, dia tahaka izay mbola zaza ihany ao amin''i Kristy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny fahasoavan''Andriamanitra nomena ahy, tahaka ny fanaon''ny mpità-marika mahay no nanaovako ny fanorenana, ary ny hafa mandrafitra eo amboniny; nefa aoka ny olona rehetra hitandrina izay arafiny eo amboniny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy misy mahay manao fanorenana hafa afa-tsy izay natao, dia Jesosy Kristy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy mandrafitra volamena, na volafotsy, na vato tsara, na hazo, na bozaka, na mololo, eo ambonin''ny fanorenana, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia haseho avokoa ny asan'ny olona rehetra; fa ny andro no hampiseho azy, satria haseho amin'afo izany andro izany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: izany'
      marker-yv: yv-n
    - type: text
      text: ', ka dia hozahan-toetra, amin''ny afo ny asan''ny olona rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha maharitra ny asan''ny olona, izay narafiny teo amboniny, dia handray valim-pitia izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ho levon''ny afo ny asan''ny olona, dia ho fatiantoka izy; fa ny tenany kosa dia hovonjena, nefa toy ny avy ao amin''ny afo ihany izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy fantatrareo va fa tempolin''Andriamanitra ianareo, ary ny Fanahin''Andriamanitra mitoetra no anatinareo? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy manimba ny tempolin'Andriamanitra, dia mba hosimban'Andriamanitra kosa izy; fa masina ny tempolin'Andriamanitra, dia ianareo izany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia masina koa ianareo'
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza misy mamita-tena. Raha misy eo aminareo manao azy ho hendry amin''izao tontolo izao, aoka ho adala izy mba ho hendry. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fahendren''izao tontolo izao dia fahadalana eo anatrehan''Andriamanitra; fa voasoratra hoe: Ny hafetsen''ny hendry ihany no entiny misambotra azy (Joba 5. 13). '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ronono no nomeko anareo, fa tsy ventin-kanina, satria tsy mbola natanjaka ianareo; eny, mbola tsy matanjaka mandraka ankehitriny aza, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indray: Jehovah no mahalala ny hevitry ny hendry fa zava-poana izany (Sal. 94. 11) '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia aza misy manao olona ho reharehany; fa anareo ny zavatra rehetra: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na Paoly, na Apolosy, na Kefasy, na izao tontolo izao, na fiainana, na fahafatesana, na ny zavatra ankehitriny, na ny zavatra ho avy; dia anareo izany rehetra izany; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ianareo an'i Kristy ary Kristy an'Andriamanitra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa mbola araka ny nofo ihany ianareo. Fa raha misy fialonana sy fifandirana eo aminareo, tsy araka ny nofo va ianareo ka mandeha araka ny fanaon''ny olona? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha hoy ny anankiray: Izaho an''i Paoly, ary ny anankiray kosa: Izaho an''i Apolosy, moa tsy olona ihany va ianareo? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa inona moa Apolosy, ary inona moa Paoly? Mpanompo ihany izay nahatonga anareo ho mpino ireo, dia samy araka ny nomen''ny Tompo azy avy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho namboly, Apolosy nandena, fa Andriamanitra no nampitombo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia tsinontsinona izay mamboly, na izay mandena, fa Andriamanitra Izay mampitombo no izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary iray ihany ny mpamboly sy ny mpandena; nefa samy handray izay valim-pitiany avy araka ny fisasarany izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mpiara-miasa amin''Andriamanitra izahay; ary sahan''Andriamanitra sy trano arafitr''Andriamanitra ianareo. '
