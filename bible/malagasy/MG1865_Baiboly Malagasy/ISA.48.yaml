document_id: ISA.48
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampahatsiarovana ny lasa, sy filazana ny ho avy, indrindra fa ny hanafahana ny Isiraely avy any Babylona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mihainoa, ry taranak''i Jakoba, dia ianareo izay antsoina amin''ny anaran''Isiraely sy avy amin''ny loharanon''i Joda, ianareo izay mianiana amin''ny anaran''i Jehovah ary mankalaza ny anaran''Andriamanitry ny Isiraely, kanefa tsy araka ny marina, na araka ny hitsiny; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa milaza ny tenany ho avy amin''ny tanana masina izy ka miankina amin''Andriamanitry ny Isiraely; Jehovah, Tompon''ny maro, no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny zavatra taloha dia efa voalazako hatramin''ny fahiny, ary naloaky ny vavako izany sady nambarako; Tampoka no nanaovako izany, ary tonga izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Satria fantatro fa maditra ianao, ka ozaby ny hatokao, ary varahina ny handrinao, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nambarako taminao hatramin''ny fahiny izany, eny, fony tsy mbola tonga aza izany, dia efa nambarako taminao rahateo, fandrao hataonao hoe: Ny sampiko no nanao izany, ary ny sarin-javatra voasokitra sy ny sarin-javatra anidina no nandidy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Efa renao, ka dia jereo izany rehetra izany, moa ianareo tsy hanambara izany va? Mampandre anao zava-baovao kosa Aho hatramin''izao, dia zavatra miafina izay tsy fantatrao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vao izao no namoronana azy, fa tsy hatramin''ny fahiny, ary tsy mbola nandre azy ianao talohan''ny andro anio, fandrao ianao hanao hoe: Indro, ny efa fantatro ihany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa tsy nandre na nahalala ianao; Eny, hatramin'ny fahiny aza no tsy mbola nisokatra ny sofinao; fa fantatro fa tena mpivadika ianao sady natao hoe mpiodina hatrany an-kibo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Noho ny anarako dia ononiko ny fahatezerako, ary mba hiderana ahy dia manindry fo aminao Aho, mba tsy hamongorana anao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Indro, nodioviko ianao, nefa tsy toy ny volafotsy; Efa nizaha toetra anao tao amin''ny memy fahoriana Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Noho ny tenako, eny, noho ny tenako ihany no anaovako izany; indrisy, lotoina ny anarako! Ary ny voninahitro tsy homeko ny hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mihainoa Ahy, ry Jakoba, sy y Isiraely izay nantsoiko: Tsy miova Aho; Izaho no voalohany, ary Izaho koa no farany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eny, ny tanako no nanorina ny fanambanin''ny tany, ary ny tanako ankavanana no namelatra ny lanitra; Raha antsoiko ireo, dia indray miseho avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mivoria ianareo rehetra, ka mihainoa: Iza moa amin''ireny no mba efa nanambara izany; ilay tian''i Jehovah no hahefa ny sitrapony amin''i Babylona ary ny sandriny ho amin''ny Kaldeana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izaho dia Izaho ihany no miteny sady miantso azy, nitondra azy Aho, ka hambinina ny lalany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Manatona Ahy ianareo, ka mihainoa; hatramin''ny taloha no efa tsy nitenenako tamin''ny mangingina, hatry ny fony vao nisian''ireo dia teo Aho, ary ankehitriny Jehovah Tompo no naniraka Ahy sy ny Fanahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izao no lazain''i Jehovah, Mpanavotra anao, dia ny Iray Masin''ny Isiraely: Izaho, Jehovah Andriamanitrao, no nampianatra anao hahita soa sady mitarika anao amin''ny lalana tokony halehanao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Toy izay anie ianao mba nihaino ny didiko
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Enga anie ka hihaino ny didiko ianao'
    marker-yv: yv-n
  - type: text
    text: '! Dia ho tonga tahaka ny ony ny fiadananao, ary ho tahaka ny onjan-dranomasina ny fahamarinanao, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ho tahaka ny fasika ny taranakao, ary ny aloaky ny kibonao ho tahaka ny sombim-pasika; Ny anarany tsy ho tapaka na ho foana eo anatrehako. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mivoaha hiala any Babylona; miezaha avy any amin''ny Kaldeana; torio amin''ny feo mahafaly, ary ambarao, ka aelezo hatrany amin''ny faran''ny tany, lazao hoe: Jehovah efa nanavotra an''i Jakoba mpanompony. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary tsy nangetaheta ireo tamin'ny nitondrany azy tany an-efitra; Nampiboiboika rano ho azy avy tamin'ny vatolampy Izy, Eny, nampitresaka ny vatolampy Izy, ka dia nigororoana ny rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy misy fiadanana ho an'ny ratsy fanahy, hoy Jehovah.
