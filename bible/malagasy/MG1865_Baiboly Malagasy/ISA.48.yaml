document_id: ISA.48,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampahatsiarovana ny lasa, sy filazana ny ho avy, indrindra fa ny hanafahana ny Isiraely avy any Babylona
  - type: text
    content: 'Mihainoa, ry taranak''i Jakoba, dia ianareo izay antsoina amin''ny anaran''Isiraely sy avy amin''ny loharanon''i Joda, ianareo izay mianiana amin''ny anaran''i Jehovah ary mankalaza ny anaran''Andriamanitry ny Isiraely, kanefa tsy araka ny marina, na araka ny hitsiny; '
  '10':
  - type: text
    content: 'Indro, nodioviko ianao, nefa tsy toy ny volafotsy; Efa nizaha toetra anao tao amin''ny memy fahoriana Aho. '
  '11':
  - type: text
    content: 'Noho ny tenako, eny, noho ny tenako ihany no anaovako izany; indrisy, lotoina ny anarako! Ary ny voninahitro tsy homeko ny hafa. '
  '12':
  - type: text
    content: 'Mihainoa Ahy, ry Jakoba, sy y Isiraely izay nantsoiko: Tsy miova Aho; Izaho no voalohany, ary Izaho koa no farany. '
  '13':
  - type: text
    content: 'Eny, ny tanako no nanorina ny fanambanin''ny tany, ary ny tanako ankavanana no namelatra ny lanitra; Raha antsoiko ireo, dia indray miseho avokoa. '
  '14':
  - type: text
    content: 'Mivoria ianareo rehetra, ka mihainoa: Iza moa amin''ireny no mba efa nanambara izany; ilay tian''i Jehovah no hahefa ny sitrapony amin''i Babylona ary ny sandriny ho amin''ny Kaldeana. '
  '15':
  - type: text
    content: 'Izaho dia Izaho ihany no miteny sady miantso azy, nitondra azy Aho, ka hambinina ny lalany. '
  '16':
  - type: text
    content: 'Manatona Ahy ianareo, ka mihainoa; hatramin''ny taloha no efa tsy nitenenako tamin''ny mangingina, hatry ny fony vao nisian''ireo dia teo Aho, ary ankehitriny Jehovah Tompo no naniraka Ahy sy ny Fanahiny. '
  '17':
  - type: text
    content: 'Izao no lazain''i Jehovah, Mpanavotra anao, dia ny Iray Masin''ny Isiraely: Izaho, Jehovah Andriamanitrao, no nampianatra anao hahita soa sady mitarika anao amin''ny lalana tokony halehanao. '
  '18':
  - type: text
    content: Toy izay anie ianao mba nihaino ny didiko
  - type: note
    content: 'Na: Enga anie ka hihaino ny didiko ianao'
  - type: text
    content: '! Dia ho tonga tahaka ny ony ny fiadananao, ary ho tahaka ny onjan-dranomasina ny fahamarinanao, '
  '19':
  - type: text
    content: 'Ary ho tahaka ny fasika ny taranakao, ary ny aloaky ny kibonao ho tahaka ny sombim-pasika; Ny anarany tsy ho tapaka na ho foana eo anatrehako. '
  '2':
  - type: text
    content: 'Fa milaza ny tenany ho avy amin''ny tanana masina izy ka miankina amin''Andriamanitry ny Isiraely; Jehovah, Tompon''ny maro, no anarany. '
  '20':
  - type: text
    content: 'Mivoaha hiala any Babylona; miezaha avy any amin''ny Kaldeana; torio amin''ny feo mahafaly, ary ambarao, ka aelezo hatrany amin''ny faran''ny tany, lazao hoe: Jehovah efa nanavotra an''i Jakoba mpanompony. '
  '21':
  - type: text
    content: Ary tsy nangetaheta ireo tamin'ny nitondrany azy tany an-efitra; Nampiboiboika rano ho azy avy tamin'ny vatolampy Izy, Eny, nampitresaka ny vatolampy Izy, ka dia nigororoana ny rano.
  '22':
  - type: text
    content: Tsy misy fiadanana ho an'ny ratsy fanahy, hoy Jehovah.
  '3':
  - type: text
    content: 'Ny zavatra taloha dia efa voalazako hatramin''ny fahiny, ary naloaky ny vavako izany sady nambarako; Tampoka no nanaovako izany, ary tonga izany. '
  '4':
  - type: text
    content: 'Satria fantatro fa maditra ianao, ka ozaby ny hatokao, ary varahina ny handrinao, '
  '5':
  - type: text
    content: 'Dia nambarako taminao hatramin''ny fahiny izany, eny, fony tsy mbola tonga aza izany, dia efa nambarako taminao rahateo, fandrao hataonao hoe: Ny sampiko no nanao izany, ary ny sarin-javatra voasokitra sy ny sarin-javatra anidina no nandidy izany. '
  '6':
  - type: text
    content: 'Efa renao, ka dia jereo izany rehetra izany, moa ianareo tsy hanambara izany va? Mampandre anao zava-baovao kosa Aho hatramin''izao, dia zavatra miafina izay tsy fantatrao. '
  '7':
  - type: text
    content: 'Vao izao no namoronana azy, fa tsy hatramin''ny fahiny, ary tsy mbola nandre azy ianao talohan''ny andro anio, fandrao ianao hanao hoe: Indro, ny efa fantatro ihany izany. '
  '8':
  - type: text
    content: Fa tsy nandre na nahalala ianao; Eny, hatramin'ny fahiny aza no tsy mbola nisokatra ny sofinao; fa fantatro fa tena mpivadika ianao sady natao hoe mpiodina hatrany an-kibo.
  '9':
  - type: text
    content: 'Noho ny anarako dia ononiko ny fahatezerako, ary mba hiderana ahy dia manindry fo aminao Aho, mba tsy hamongorana anao. '
