document_id: PSA.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana nataon'izay tra-panenjehana mafy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Jehovah ô, Hianao no ialofako; aoka tsy ho menatra akory mandrakizay aho; vonjeo amin''ny fahamarinanao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Atongilano amiko ny sofinao, faingàna hamonjy ahy; aoka ho vatolampiko fiarovana mafy Hianao sy batery fiarovana hamonjena ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa harambatoko sy batery fiarovana ho ahy Hianao; ary noho ny anaranao no hitondrànao sy hitarihanao ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hanafaka ahy amin''ny fandrika harato izay nafeniny hamandrihany ahy Hianao; fa Hianao no fiarovana mafy ho ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eo an-tananao no atolotro ny fanahiko; fa efa nanavotra ahy Hianao, Jehovah ô, Andriamanitry ny fahamarinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Halako izay mivavaka amin'ny sampy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: zava-poana mandainga'
    marker-yv: yv-n
  - type: text
    text: '; fa Jehovah kosa no itokiako. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hifaly sy ho ravoravo amin''ny famindram-ponao aho; fa nahita ny fahantrako Hianao, ka nahafantatra ny fahorian''ny fanahiko, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary tsy mba nangeja ahy teo an-tànan''ny fahavalo; fa efa nampitoetra ny tongotro eo amin''ny malalaka Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mamindrà fo amiko, Jehovah ô, fa azom-pahoriana aho; simban''alahelo ny masoko sy ny fanahiko ary ny tenako. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa lanin''alahelo ny aiko, sady lanim-pisentoana ny taonako; Tsy manan-kery aho noho ny heloko, ary efa lany ny taolako. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Noho ny ataon''ny fahavaloko rehetra dia efa tonga fandatsa aho, eny, na dia amin''ny namako aza,sady atahoran''ny olom-pantatro aho; izay mahita ahy eny ivelany mandositra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Efa hadino tahaka ny olona maty izay tsy tsaroana intsony aho; tahaka ny vilany ariana aho. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa mandre ny endrikendriky ny maro aho; misy fampangorohoroana manodidina, raha miara-mioko hamely ahy izy, ka miray tetika hahafaty ny aiko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa izaho matoky Anao, Jehovah ô; hoy izaho: Andriamanitro Hianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Eo an-tananao ny androko; Vonjeo aho tsy ho azon''ny tanan''ny fahavaloko sy izay manenjika ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ampamirapirato amin''ny mpanomponao ny tavanao; vonjeo amin''ny famindram-ponao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka tsy ho menatra aho, Jehovah ô, satria miantso Anao; fa aoka kosa ho menatra ny ratsy fanahy ka hangina any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: Sheola'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aoka hangina ny molotra mandainga, izay miteny sahisahy hanohitra ny marina, amin'ny avonavona sy ny fanamavoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Akory re ny haben''ny zava-tsoanao voarakitrao ho an''ny matahotra Anao! dia izay nataonao teo anatrehan''ny zanak''olombelona ho an''izay mialoka aminao! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hanafina azy ao amin''ny fiafenana eo anatrehanao Hianao, mba tsy ho tratry ny teti-dratsy ataon''ny olona izy; hampiery azy ao an-tranonao Hianao, mba tsy ho azon''ny lela mifanditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Isaorana anie Jehovah; fa nataony mahagaga ny famindram-pony tamiko tao an-tanàna mimanda. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa hoy izaho tamin'ny fahatairako; voafongotra tsy ho eo imasonao aho; kanjo nihaino ny feon'ny fifonako ihany Hianao, raha nitaraina taminao aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tiava an''i Jehovah, ry olony masina rehetra; miaro ny marina Jehovah, ary mamaly dia mamaly ny mpiavonavona Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mahereza, ary aoka hatanjaka ny fonareo, dia ianareo rehetra izay manantena an'i Jehovah.
