document_id: JER.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitadiavan'ny olona hamely an'i Jeremia, sy ny vavaka nataon'i Jeremia tamin'izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitsangàna, ka midina ho any amin''ny tranon''ny mpanefy tanimanga, ary any no hampandrenesako anao ny teniko. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nidina tany amin''ny tranon''ny mpanefy tanimanga aho, ary, indro, nanao ny asany teo amin''ny ankodina fanaovana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha simba ny vilany ataony araka izay mazàna miseho amin''ny tanimanga eny an-tànan''ny mpanefy dia ataony vilany hafa indray, araka izay tian''ny mpanefy tanimanga hanaovana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia tonga tamiko ny tenin''i Jehovah hoe : '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moa tsy mahazo manao aminareo toy ny ataon''ity mpanefy tanimanga ity va Aho, ry taranak''i Isiraely? hoy Jehovah. Indro, toy ny tanimanga eo an-tanan''ny mpanefy azy, dia toy izany ianareo eo an-tanako, ry taranak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vetivety
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. indray mipi-maso
    marker-yv: yv-n
  - type: text
    text: ' Aho dia milaza firenena sy fanjakana hongotako sy hazerako ary horavako; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa raha miala amin''ny ratsy izany firenena noteneniko izany, dia hanenenako kosa ny loza izay nokasaiko hamelezako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary vetivety kosa Aho dia milaza firenena sy fanjakana haoriko sy hamboleko; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa raha manao izay ratsy eo imasoko izy ka tsy mihaino ny feoko, dia hanenenako kosa ny soa izay nolazaiko hanasoavako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa amin''izany, lazao amin''ny Joda sy amin''ny mponina eto Jerosalema hoe: Izao no lazain''i Jehovah: Indro, Izaho mamorona loza hihatra aminareo ary mihevitra izay hamelezako anareo; Koa samia miala amin''ny lalany ratsy avy ianareo, ary ataovy tsara ny lalanareo sy ny ataonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa hoy ireo: Kivy izahay izany! Fa mbola hanaraka ny hevitray ihany izahay, eny, samy hanao araka ny ditry ny fo ratsinay avy izahay rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa izao no lazain''i Jehovah: anontanio any amin''ny jentilisa hoe: Iza no nandre zavatra toy izany? Zavatra mahatsiravina indrindra no nataon''Isiraely virijina. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hitsahatra tsy ho eo amin''ny vatolampy any an-tsaha va ny oram-panalan''i Libanona, ary mety ho ritra va ny rano maria sady mangatsiaka avy amin''ny tany hafa? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa efa nanadino Ahy ny oloko, ka ho an'ny sampy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb; zava-poana
    marker-yv: yv-n
  - type: text
    text: ' no nandoroany ditin-kazo manitra; Ary nanafintohina azy teo amin''ny lalany ireny; dia ny lalana fahagola, handehanany amin''ny sakeli-dalana madinika, dia amin''ny lalana tsy voavoatra, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mba hahatonga ny taniny ho figagana sy ho zavatra mampisitrisitra mandrakizay; Izay rehetra mandalo azy dia ho gaga sy hihifikifi-doha. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toy ny fampielin'ny rivotra avy any atsinanana no hampielezako azy eo anoloan'ny fahavalony; Hiamboho azy Aho, fa tsy hanatrika azy, amin'ny andro hahitany loza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy ny olona: Andeha isika hihevitra izay hamelezana an''i Jeremia; fa tsy ho tapaka tsy akory ny lalàna avy amin''ny mpisorona, na ny saina avy amin''ny hendry, na ny teny avy amin''ny mpaminany. Aoka ny vavantsika'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lelantsika
    marker-yv: yv-n
  - type: text
    text: ' ho enti-mamely azy, ary aoka tsy hohenointsika akory izay teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mihainoa ahy, Jehovah ô; Ary mihainoa ny tenin''izay miady amiko '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ratsy va no havaly ny soa? Fa efa nihady lavaka hamandrihana ahy ireo. Tsarovy ny nitsanganako teo anatrehanao nitaraina ho azy hampiala ny fahatezeranao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa aoka ho mosarena ny zanany, ary atolory ho amin''ny herin''ny sabatra izy, ka ho foana anaka ny vadiny sady ho tonga mpitondratena; Ary aoka ny lehilahy lehibe aminy haripaky ny aretina, ary ny zatovony ho fatin-tsabatra amin''ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aoka hisy fidradradradrana ho re ao an-tranony, raha mitondra miaramila iray toko any aminy tampoka Hianao; Fa efa nihady lavaka hamandrihana ahy izy sady nanafim-pandrika haningorana ny tongotro. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa Hianao, Jehovah ô, no mahalala ny fisainana rehetra ataony hamelezany ahy ho faty; Aza avela ny helony; Ary aza vonoina tsy ho eo imasonao ny fahotany, fa aoka ho solafaka eo anatrehanao izy; Mameleza azy amin'ny andro fahatezeranao.
