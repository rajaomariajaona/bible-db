document_id: 1SA.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faran'ny nitadiavan'i Jonatana hampihavana an-drainy amin'i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Davida nandositra niala tao Naiota any Rama, dia tonga ka nilaza teo anatrehan''i Jonatana hoe: Inona no nataoko? Inona no heloko? Ary inona no fahotako teo anatrehan-drainao, no dia mitady ny aiko izy? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy izy taminy: Sanatria izany! Tsy ho faty ianao; indro, tsy misy tsy ambaran''ikaky ahy izay ataony na be na kely, ary hataon''ikaky ahoana no fanafina izany zavatra izany amiko? Tsy misy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Davida mbola nianiana indray nanao hoe: Fantatry ny rainao marimarina fa efa mahita fitia eo imasonao aho, ka hoy izy: Aoka tsy ho fantatr''i Jonatana izany, fandrao malahelo izy; fa raha velona koa Jehovah, ary raha velona koa ny fanahinao, toa iray dia monja no anelanelako sy ny fahafatesana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy Jonatana tamin''i Davida: Na inona na inona no angatahinao, dia hatàoko aminao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Davida tamin''i Jonatana: Indro, ho tsinam-bolana rahampitso, ary izaho tokony hiara-mipetraka hihinana amin''ny mpanjaka; nefa avelao aho handeha hiery any an-tsaha ambara-pihavin''ny afaka ampitso harivariva. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa raha hitan''ny rainao fa tsy eo aho, dia ataovy hoe: Niera fatratra tamiko Davida mba hikaretsaka kely hankany Betlehema tanànany; fa misy fanatitra fanao amin''izy mianakavy rehetra isan-taona any. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha lazainy hoe: Tsara izany, dia fiadanana no ho an''ny mpanomponao; fa raha tezitra mafy kosa izy, dia aoka ho fantatrao tsara fa misy ratsy ifofoany ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa mamindrà fo amin''ny mpanomponao; fa nampanaovinao ny faneken''i Jehovah aminao ny mpanomponao; nefa raha manankeloka aho, dia aoka ianao ihany no hahafaty ahy, fa nahoana no ho entinao any amin''ny rainao aho? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy Jonatana: Sanatria raha hahazo anao izany! Fa raha fantatro tokoa fa misy ratsy ifofoan''ikaky anao, dia hambarako aminao mihitsy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Davida tamin''i Jonatana: Iza no hanambara izany amiko, na hampandre ahy izay teny sarotra havalin-drainao anao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Iza anefa no hanambara amiko, raha tahìny mamaly sarotra anao rainao'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Jonatana tamin''i Davida: Andeha ary isika hivoaka any an-tsaha. Dia nivoaka tany an-tsaha izy roa lahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Jonatana tamin''i Davida: Jehovah, Andriamanitry ny Isiraely, anie ho vavolombelona! Rehefa fotorako tsara rahampitso na afaka ampitso toy izao ny hevitry ny raiko, ka hitako fa misy soa ho an''i Davida, ka tsy maniraka any aminao aho sy manambara izany aminao, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia hataon''i Jehovah toy izany anie Jonatana, eny, mihoatra noho izany aza; fa raha kasain''ny raiko kosa ny hanisy ratsy anao, dia hambarako aminao izany, ka halefako ianao mba handehananao soa aman-tsara; ary homba anao tahaka ny tamin''ny raiko anie Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha mbola velona ihany aho, dia tsy hasehonao ahy va ny fiantran''i Jehovah mba tsy hahafaty ahy? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tsy hesorinao amin''ny taranako koa ny famindram-ponao mandrakizay, eny, na dia avy aza izay handringanan''i Jehovah ny fahavalon''i Davida rehetra tsy ho etỳ ambonin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary dia nanao fanekena Jonatana ny amin''ny taranak''i Davida hoe: Jehovah no hamaly ny fahavalon''i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary Jonatana nampianiana an'i Davida indray noho ny fitiavany azy; fa tiany toy ny tenany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Jonatana tamin''i Davida: Rahampitso ho tsinam-bolana; ary ho hita fa tsy eo ianao, fa ho foana ny fipetrahanao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa rehefa mby amin'ny andro fahatelo dia midìna faingana ianao, ary tongava ao amin'ilay nierenao tamin'ny andro nitrangan'ilay raharaha iny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao xix. 2, 3
    marker-yv: yv-n
  - type: text
    text: ', ka mitoera ao anilan''ny vato Ezela. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary izaho handefa zana-tsipìka telo eo anilany, toy ny mikendry marika. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia haniraka ny zazalahy aho ka hanao hoe: Mandehana, izahao ny zana-tsipìka. Ka raha lazaiko mihitsy amin''ilay zazalahy hoe: Indreo eo aorianao ny zana-tsipìka, ento etỳ, dia avia ianao, fa hipetraka amin''ny fiadanana ianao, ka tsy hisy haninona anao, raha velona koa Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha hoy kosa aho amin''ilay zazalahy: Indreo eo alohanao ny zana-tsipìka, dia mandehana ianao, fa Jehovah no nampandeha anao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny amin''ilay noresahintsika, dia izaho sy ianao, indro, Jehovah no vavolombelona amiko sy aminao mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Davida niery tany an-tsaha. Koa nony tsinam-bolana, dia nipetraka hihinana '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'teo amin''ny fipetrahany tahaka ny isanandro ihany ny mpanjaka, dia teo amin''ny fipetrahana teo anilan''ny rindrina, koa Jonatana nitsangana, fa Abnera nipetraka teo anilan''i Saoly; ary foana kosa ny fipetrahan''i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nefa Saoly tsy niteny na inona na inona tamin''izany andro izany; fa nataony ho nisy zavatra nanjo azy, ka tsy madio izy, eny, tsy madio izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nony tamin''ny andro faharoa dia ny ampitson''ny tsinam-bolana, ka mbola foana ihany ny fipetrahan''i Davida, dia hoy Saoly tamin''i Jonatana zanany: Ahoana no tsy mba nahatongavan''ny zanak''i Jese hihinana omaly sy androany? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Jonatana namaly an''i Saoly hoe: Davida niera fatratra tamiko hankany Betlehema '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'nanao hoe: Masìna ianao, aoka handeha aho, fa izahay mianakavy manao fanatitra any an-tanàna, ka asain''ny rahalahiko mankany aho; koa ankehitriny, raha nahita fitia eo imasonao aho, masìna ianao, aoka handeha aho hamangy ny rahalahiko; ka izany no tsy mba nahatongavany teto amin''ny latabatry ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nirehitra tamin''i Jonatana ny fahatezeran''i Saoly, ka hoy izy taminy: Hianao zanaky ny vehivavy maditra sy mpiodina, moa tsy fantatro va fa mifidy ny zanak''i Jese ianao ho henatrao sy ho henatry ny kibon'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fitanjahan'
    marker-yv: yv-n
  - type: text
    text: '''ny reninao. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa raha mbola velona etỳ ambonin''ny tany koa iny zanak''i Jese iny, dia tsy ho tafatoetra tsara ianao na ny fanjakanao. Koa maniraha haka azy hankatỳ amiko, fa meloka tokony ho faty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Jonatana namaly an''i Saoly rainy ka nanao taminy hoe: Nahoana no hatao maty izy? Inona no nataony? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary Saoly nitora-defona handefona azy, ka dia fantatr''i Jonatana fa nofofoin''ny rainy hovonoina Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nitsangana niala teo amin''ny latabatra Jonatana, sady nirehitra ny fahatezerany, ka tsy nihinan-kanina izy tamin''ny ampitson''ny tsinam-bolana; fa nalahelo an''i Davida izy, satria nomen-drainy henatra. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nony maraina, dia nivoaka nankany an-tsaha Jonatana tamin''ilay fotoana nataony tamin''i Davida, ary nisy zazalahy kely nanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy Jonatana taminy: Mihazakazaha, ka izahao ny zana-tsipìka alefako. Ary nony nihazakazaka ilay zazalahy, dia nalefany nihoatra azy ny zana-tsipìka. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nony efa tonga teo amin''ilay nipetrahan''ny zana-tsipìka nalefan''i Jonatana ilay zazalahy, dia nantsoin''i Jonatana izy hoe: Tsy ireo alohanao ireo va ny zana-tsipìka? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary Jonatana niantso ilay zazalahy hoe: Haingàna dia haingàna, ka aza mijanonjanona. Ary ny zazalahin''i Jonatana nanangona ny zana-tsipìka, dia nankeo amin''ny tompony. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nefa ilay zazalahy tsy nahalala na inona na inona; fa Jonatana sy Davida ihany no nahalala ny anton''izany. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nomen''i Jonatana ilay zazalahy ny fiadiany, ka hoy izy taminy: Mandehana, ka ento ho any an-tanàna ireto. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nony lasa ilay zazalahy, dia nitsangana avy any atsimo Davida, ka niankohoka tamin''ny tany izy sady niondrika in-telo, ary nifanoroka izy roa lahy, ka samy nitomany; nefa ny an''i Davida dia mafy loatra. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary hoy Jonatana tamin''i Davida: Mandehana soa aman-tsara; fa efa nianiana tamin''ny anaran''i Jehovah isika roa lahy hoe: Jehovah no vavolombelona amiko sy aminao ary amin''ny taranako sy ny taranakao mandrakizay.'
