document_id: JOS.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan'i Josoa sy Eleazara, sy ny nandevenana ny taolan'i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Josoa nanangona ny firenen''ny Isiraely rehetra tany Sekema ka niantso ny loholon''ny Isiraely sy ny lehibeny sy ny mpitsara azy ary ny mpifehy azy, ka dia niara-niseho teo anatrehan''Andriamanitra izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Josoa tamin''ny vahoaka rehetra: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Tany an-dafin''ny Ony'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: ' no nonenan''ny razanareo tany aloha. dia Tera, rain''i Abrahama sy Nahora; ary nanompo andriamani-kafa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia naka an'i Abrahama razanareo avy tany an-dafin'ny Ony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: ' Aho ka nitondra azy nitety ny tany Kanana rehetra, dia nahamaro ny taranany ka nanome an''Isaka ho zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Isaka koa dia nomeko an''i Jakoba sy Esao ho zanany; ary nomeko ho lovan''i Esao ny tendrombohitra Seira; fa Jakoba sy ny taranany kosa nankany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia naniraka an''i Mosesy sy Arona Aho ka namely an''i Egypta, araka izay nataoko teo aminy; ary rehefa afaka izany, dia nitondra anareo nivoaka Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony nitondra ny razanareo nivoaka avy tany Egypta Aho, dia tonga teo amin''ny ranomasina ianareo; ary nanenjika ny razanareo hatreo amin''ny Ranomasina Mena ny Egyptiana, nitaingina kalesy sy soavaly. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nitaraina tamin''i Jehovah izy, ka nasiany maizina teo anelanelanareo sy ny Egyptiana,sady nakatony taminy ny ranomasina ka naony azy, ary ny masonareo nahita izay nataoko tany Egypta; ary nitoetra ela tany efitra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nentiko ho any amin''ny tanin''ny Amorita, izay nonina tany an-dafin''i Jordana ianareo; dia niady taminareo ireo; ary nanolotra azy teo an-tananareo Aho, mba handovanareo ny taniny, ary nandringana azy teo anoloanareo Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nitsangana Balaka, zanak''i Zipora, mpanjakan''i Moaba, ka niady tamin''ny Isiraely; dia naniraka ka nampaka an''i Balama, zanak''i Beora, izy hanozona anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa tsy nety nihaino an''i Balama Aho, koa nitahy anareo tokoa izy; ka dia namonjy anareo tamin''ny tànany Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nita an''i Jordana ianareo ka nankany Jeriko; dia niady taminareo ny mponina tao Jeriko mbamin''ny Amorita sy ny Perizita sy ny Kananita sy ny Hetita sy ny Girgasita sy ny Hivita ary ny Jebosita, ka natolotro teo an-tananareo ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nampandehaniko teo anoloanareo ny fanenitra, Izay nandroaka azy teo anoloanareo, dia ny mpanjaka roa tamin''ny Amorita, fa tsy tamin''ny sabatrao. na tamin''ny tsipìkanao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nomeko tany izay tsy nasainareo ianareo sy tanàna izay tsy naorinareo ianareo ka dia nonina tao ianareo; ary nihinana ny avy amin''ny tanim-boaloboka sy ny tanin''oliva izay tsy nataonareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa ankehitriny, matahora an'i Jehovah, ka manompoa Azy amin'ny fahitsiana sy ny fahamarinana; ary ario ny andriamanitra izay notompoin'ny razanareo tany an-dafin'ny Ony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: ' sy tany Egypta, ka manompoa an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa raha tsy sitrakareo ny hanompo an''i Jehovah, dia fidionareo anio ary izay hotompoinareo. na ny andriamanitra izay notompoin''ny razanareo tany an-dafin''ny Ony,1 na ny andriamanitry ny Amorita, izay mponina teto amin''ny tany onenanareo; fa raha izaho sy ny ankohonako kosa, dia hanompo an''i Jehovah izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia namaly ny vahoaka ka nanao hoe: Sanatria raha hahafoy an''i Jehovah izahay ka hanompo izay andriamani-kafa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Jehovah Andriamanitsika, Izy no nitondra antsika sy ny razantsika nivoaka avy tany amin''ny tany Egypta, tany amin''ny trano nahandevozana, ary Izy no nanao ireny famantarana lehibe ireny teo imasontsika ka niaro antsika teny amin''ny lalana rehetra nalehantsika sy teny amin''ny firenena rehetra izay notetezintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Jehovah nandroaka ny firenena rehetra teo anoloantsika, dia ny Amorita izay nonina teto amin'ny tany; koa izahay koa dia mba hanompo an'i Jehovah, fa Izy no Andriamanitsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy Josoa tamin''ny vahoaka: Tsy mahay manompo an''i Jehovah ianareo; fa Andriamanitra masina Izy, Andriamanitra saro-piaro Izy ka tsy hamela ny fahadisoanareo sy ny fahotanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha mahafoy an''i Jehovah ianareo ka manompo andriamani-kafa, dia hiverina Izy ka hampahory anareo sy hahafongana anareo, rehefa nasiany soa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy ny vahoaka tamin''i Josoa: Tsia; fa Jehovah ihany no hotompoinay. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy Josoa tamin''ny vahoaka: Vavolombelona ho an''ny tenanareo ianareo fa efa nifidy an''i Jehovah hotompoinareo. Ary hoy ny olona: Eny vavolombelona izahay . '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Arionareo ankehitriny ary ny andriamani-kafa, izay eo aminareo. ka ampanatony an''i Jehovah, Andriamanitry ny Isiraely ny fonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy ny vahoaka tamin''i Josoa: Jehovah Andriamanitray no hotompoinay ary ny feony no hohenoinay '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary dia nanao fanekena tamin''ny vahoaka Josoa tamin''izany andro izany ka nanome azy lalàna sy didy tany Sekema. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nosoratan''i Josoa tao amin''ny bokin''ny lalàn''Andriamanitra ireo teny ireo. ary naka vato lehibe izy ka nanangana azy teo ambanin''ny hazo terebinta, izay teo anilan''ny fitoera-masin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy Josoa tamin''ny vahoaka rehetra; Indro, io vato io ho vavolombelona amintsika; fa efa nahare ny teny rehetra nolazain''i Jehovah tamintsika io, dia ho vavolombelona aminareo io, fandrao handainga amin''Andriamanitrareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia nampodin'i Josoa ny vahoaka samy ho any amin'ny lovany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary rehefa afaka izany zavatra izany, dia maty Josoa, zanak''i Nona, mpanompon''i Jehovah, rehefa folo amby zato taona ny androny. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dia nalevina tao amin'ny faritanin'ny lovany izy, dia tao Timnata-sera, any amin'ny tany havoan'i Efraima, avaratry ny tendrombohitra Gasa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary nanompo an'i Jehovah ny Isiraely tamin'ny andro rehetra niainan'i Josoa sy tamin'ny andro rehetra niainan'ny loholona izay velona taorian'i Josoa ka nahalala ny asa rehetra izay nataon'i Jehovah ho an'ny Isiraely
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ny taolan'i Josefa, izay efa nentin'ny Zanak'Isiraely avy tany Egypta, dia naleviny tao Sekema, tao amin'ny tany izay novidin'i Jakoba volafotsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. kesita; izahao Gen. xxxiii. 19
    marker-yv: yv-n
  - type: text
    text: ' zato tamin''ny zanak''i Hamora, rain''i Sekema; dia tonga lovan''ny taranak''i Josefa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dia maty koa Eleazara, zanak'i Arona, ka naleviny teo amin'ny havoan'i Finehasa zanany, izay nomena azy tany amin'ny tany havoan'i Efraima.
