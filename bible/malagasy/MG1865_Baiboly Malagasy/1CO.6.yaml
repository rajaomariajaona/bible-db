document_id: 1CO.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny fijangajangana tsy azo atao ho isan'ny zavatra tsy mampaninona, tahaka ny hanina samy hafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Misy aminareo va, raha manana ady amin''ny namany, sahy handeha hotsarain''ny olona tsy marina, fa tsy eo anatrehan''ny olona masina? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sa tsy fantatrareo fa ny olona masina dia hitsara izao tontolo izao? Ary raha hitsara izao tontolo izao ianareo, moa tsy miendrika hitsara izay zavatra madinika indrindra va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy fantatrareo va fa hitsara anjely isika? mainka fa izay zavatra momba izao fiainana izao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa raha misy hotsarainareo ny amin''ny momba izao fiainana izao, moa izay ataon''ny fiangonana ho tsinontsinona va no tendrenareo ho mpitsara? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hampahamenatra anareo no itenenako izany. Hay! dia tsy misy olon-kendry aminareo, na dia iray akory aza, izay mahay manamboatra ny adin''ny rahalahiny? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny rahalahy mandeha hiady amin''ny rahalahiny, na dia hotsarain''ny tsy mino aza. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ankehitriny dia kilema aminareo ny anananareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: matiantoka mihitsy ny fanahinareo, raha manana'
    marker-yv: yv-n
  - type: text
    text: ' ady amin''ny namanareo. Nahoana no tsy aleo mandefitra ny tsy rariny aza ianareo? Nahoana no tsy aleo maharitra hambakaina aza ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kanjo ianareo indray no manao izay tsy marina ka manambaka na dia ny rahalahinareo aza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moa tsy fantatrareo va fa ny olona tsy marina tsy mba handova ny fanjakan''Andriamanitra? Aza mety hofitahina ianareo: fa ny mpijangajanga sy ny mpanompo sampy sy ny mpaka vadin''olona sy ny sodomita'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao Lev.18.22
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sy ny mpangalatra sy ny mpierina sy ny mpimamo sy ny mpanaratsy ary ny mpanao an-keriny dia tsy mba handova ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary efa mba toy izany ihany ny sasany aminareo, saingy efa voasasa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. efa nanasa tena
    marker-yv: yv-n
  - type: text
    text: ' ianareo, efa nohamasinina ianareo, efa nohamarinina ianareo, tamin''ny anaran''i Jesosy Kristy Tompo sy tamin''ny Fanahin''Andriamanitsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny zavatra rehetra azoko atao, nefa tsy dia ary mahasoa avokoa ny zavatra rehetra; ny zavatra rehetra azoko atao, nefa izaho tsy mety handevozin-javatra na inona na inona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny hanina dia ho an'ny kibo, ary ny kibo ho an'ny hanina; nefa samy holevonin'Andriamanitra izy roroa. Fa ny tena kosa dia tsy ho an'ny fijangajangana, fa ho an'ny Tompo; ary ny Tompo ho an'ny tena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Andriamanitra efa nanangana ny Tompo sady hanangana antsika koa amin''ny heriny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy fantatrareo va fa momba ny tena''i Kristy ny tenanareo? Moa hanala ny momba ny tenan''i Kristy va aho ka hanolotra izany ho momba ny tenan''ny vehivavy janga? Sanatria izany! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moa tsy fantatrareo va fa izay miray amin''ny vehivavy janga dia tena iray aminy? fa hoy Andriamanitra: Ho nofo iray ihany izy roroa (Gen. 2. 24). '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa izay miray amin''ny Tompo kosa dia fanahy iray aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mandosira ny fijangajangana. Izay fahotana rehetra ataon''ny olona dia eny ivelan''ny tena ihany; fa ny mpijangajanga kosa dia manota mihatra amin''ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ahoana ary? Moa tsy fantatrareo fa ny tenanareo dia tempolin''ny Fanahy Masina, Izay ao anatinareo sady efa azonareo tamin''Andriamanitra? ka tsy tompon''ny tenanareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa olom-boavidy ianareo, koa dia mankalazà an'Andriamanitra amin'ny tenanareo.
