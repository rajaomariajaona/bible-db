document_id: EXO.23,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niantohan'Andriamanitra hiaro ny Zanak'Isiraely sy hamponina azy soa aman-tsara ao amin'ny tany Kanana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manangan-tsaho foana. Aza mifandray tanana amin''ny ratsy fanahy ho vavolombelona mampidi-doza. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary enin-taona no hamafazanao amin''ny taninao sy hanangonanao ny vokatra; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa amin''ny taona fahafito kosa dia hatsahatrao tsy hovolena izy, mba hisy hohanin''ny malahelo amin''ny firenenao; ary izay sisan''ireo dia mba hohanin''ny biby any an-tsaha kosa. Toy izany koa no hataonao amin''ny tanim-boalobokao sy amin''ny tanin''olivanao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Henemana no hanaovanao ny raharahanao; fa amin''ny andro fahafito dia hitsahatra ianao, mba hialan''ny ombinao sy ny borikinao sasatra, ary mba hakan''ny zanaky ny ankizivavinao sy ny vahiny aina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tandremo izay rehetra nolazaiko taminareo, ka aza manonona ny anaran'andriamani-kafa akory ianareo; aza avela ho re avy amin'ny vavanao izany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Intelo isan-kerintaona no hanaovanao andro firavoravoana ho Ahy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandremo ny andro firavoravoana fihinanana ny mofo tsy misy masirasira; hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nandidiako anao, amin''ny fotoan''andro amin''ny volana Abiba, fa tamin''izany no nivoahanao avy tany Egypta; ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehako. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tandremo koa ny andro firavoravoana amin'ny fijinjana ny voaloham-bokatry ny asanao, izay nafafinao tany an-tsaha, sy ny andro firavoravoana amin'ny fanangonana amin'ny faran'ny taona, raha manangona ny vokatry ny asanao avy any an-tsaha ianao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia intelo isan-kerintaona no hisehoan''ny lehilahy rehetra aminareo eo anatrehan''i Jehovah Tompo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manatitra ny ran''ny zavatra vonoina hatao fanatitra ho Ahy ianao, raha mbola misy masirasira ao aminao; ary aza avela ho tra-maraina ny saboran''ny zavatra vonoina amin''ny andro firavoravoana ho Ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny santatry ny voaloham-bokatry ny taninao dia ho entinao ao an-tranon'i Jehovah Andriamanitrao. Aza mahandro zanak'osy amin'ny rononon-dreniny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manaraka ny maro hanao ratsy; ary aza mamaly ny amin''ny adin''olona hivily hanaraka ny maro hamadika ny rariny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, Izaho maniraka Anjely eo alohanao hiaro anao any an-dalana sy hitondra anao ho any amin''ny fitoerana izay namboariko. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitandrema eo anatrehany, ka mihainoa ny feony, ary aza mampahatezitra Azy; fa tsy hamela ny fahotanareo Izy; fa ny anarako no ao aminy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha hihaino ny feony tokoa ianao ka hanao izay rehetra lazaiko, dia ho fahavalon''ny fahavalonao sy ho rafin''ny rafinao Aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa handeha eo alohanao ny Anjeliko ka hitondra anao any amin''ny Amorita sy ny Hetita sy ny Perizita sy ny Kananita sy ny Hivita ary ny Jebosita; ary dia hofongorako ireny, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza miankohoka eo anatrehan''ny andriamanitr''ireny ianao, na manompo azy, na manao araka ny ataony; fa aringano tokoa izy, ary torotoroy tokoa ny tsangam-baton-tsampiny. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa manompoa an''i Jehovah Andriamanitrareo, dia hitahy ny haninao sy ny ranonao Izy; ary hesoriko aminao ny aretina. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hisy ho afa-jaza na ho momba ao amin''ny taninao; hotanterahiko ny isan''ny andronao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hampandeha ny fahatahorana Ahy eo alohanao Aho ka hampifanaritaka ny firenena rehetra izay alehanao, ary hampiamboho ny fahavalonao rehetra anao Aho. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hampandeha fanenitra eo alohanao Aho, ka handroaka ny Hivita sy ny Kananita ary ny Hetita eo alohanao ireny. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy handroaka azy eo alohanao amin''ny taona iray Aho, fandrao ho lao ny tany, ka hihamaro hamely anao ny bibi-dia. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mandravaka ny tenin''ny malahelo eo amin''ny fandaharan-teniny ianao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsikelikely no handroahako azy eo alohanao mandra-pahamaronao ka handova ny tany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hatramin''ny Ranomasina Mena ka hatramin''ny ranomasin''ny Filistina no hataoko fari-taninao, ary hatramin''ny efitra ka hatramin''ny Ony; fa hanolotra ny mponina amin''ny tany ho eo an-tananareo Aho; ary handroaka azy eo alohanao ianao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manao fanekena aminy na amin''ny andriamaniny ianao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy honina eo amin'ny taninao ireny, fandrao hampanota anao amiko; fa raha manompo ny andriamaniny ianao, dia ho fandrika aminao tokoa izany,
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hitanao mania ny ombin''ny fahavalonao, na ny borikiny, dia avereno any aminy mihitsy izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha hitanao ny borikin'izay mankahala anao mihonaka ao ambanin'ny entany, dia aza malaina hamonjy azy ianao, fa manampia ny namanao hamaha azy tokoa.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mamily ny rariny izay ananan''ny malahelo ao aminao, raha manana ady izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manalavira izay teny lainga, ary aza mamono izay tsy manan-tsiny sy izay marina ianao; fa tsy hanamarina ny meloka Aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aza mandray kolikoly, fa ny kolikoly mahajamba ny mason''ny mahiratra sy mamadika ny tenin''ny marina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aza mampahory vahiny, fa ianareo mahalala ny fon''ny vahiny, satria efa mba vahiny tany amin''ny tany Egypta ihany ianareo. '
