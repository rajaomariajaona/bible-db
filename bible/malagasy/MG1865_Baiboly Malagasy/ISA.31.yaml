document_id: ISA.31,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampijaliana ny Isiraely noho ny niankinany tamin'i Egypta sy ny hiarovan'Andriamanitra izay mibebaka, ary ny hanendreny mpanjaka izay hitondra azy amin'ny fahamarinana
  - type: text
    content: 'Lozan''izay midina any Egypta hitady famonjena sy miantehitra amin''ny soavaly ary matoky ny kalesy, satria maro ireny, sy ny mpitaingin-tsoavaly, satria mahery dia mahery ireny, fa tsy manandrandra ny Iray Masin''ny Isiraely, na mitady an''i Jehovah. '
  '2':
  - type: text
    content: 'Nefa Izy koa dia hendry ka mahatonga loza, ary tsy tsoahany ny teniny; Fa mitsangana Izy hamely ny mpianakavin''ny mpanao ratsy sy izay manampy ny mpanao meloka. '
  '3':
  - type: text
    content: 'Fa olona ihany ny Egyptiana fa tsy Andriamanitra; Ary nofo ihany ny soavaliny, fa tsy fanahy. Koa raha ahinjitr''i Jehovah ny tànany, dia ho tafintohina izay manampy, ary ho potraka izay ampiana, ka samy ho levona avokoa izy roa tonta. '
  '4':
  - type: text
    content: 'Fa izao no nolazain''i Jehovah tamiko: Tahaka ny fieron''ny liona sy ny liona tanora eo amin''ny rembiny, ka na dia voangona aza ny mpiandry ondry betsaka hamely azy, Tsy matahotra ny feon''ireo izy, na mandatsa-dremby noho ny fihorakorahany, dia tahaka izany no hidinan''i Jehovah, Tompon''ny maro, Hiady ao an-tendrombohitra'
  - type: note
    content: 'Na: hamely ny tendrombohitra'
  - type: text
    content: ' Ziona sy ny havoany. '
  '5':
  - type: text
    content: Tahaka ny vorona manomba no hiarovan'i Jehovah, tompon'ny maro, an'i Jerosalema, fa sady hiaro no hamonjy Izy, eny, sady hiantra
  - type: note
    content: Heb. handalo; izahao Eks. xii.13
  - type: text
    content: ' no hanafaka. '
  '6':
  - type: text
    content: 'Koa miverena ho amin''izay efa niodinanareo fatratra, ry zanak''Isiraely ô. '
  '7':
  - type: text
    content: Fa amin'izany andro izany dia harian'ny olona rehetra ny andriamani-bolafotsiny
  - type: note
    content: Heb. andriamani-tsi-izy
  - type: text
    content: ' sy ny andriamani-bolamenany'
  - type: note
    content: Heb. andriamani-tsi-izy
  - type: text
    content: ', izay fahotana nataon''ny tananareo. '
  '8':
  - type: text
    content: 'Ary ny Asyriana ho lavon''ny sabatra izay tsy mba an''olombelona, eny, sabatra izay tsy mba an''olombelona no handringanana azy; Dia handositra ny sabatra izy, ary ny zatovony hampanaovina fanompoana, '
  '9':
  - type: text
    content: Ary ny mpanjakany
  - type: note
    content: 'Na: harambatony'
  - type: text
    content: ' ho lasa noho ny fahatahorana, Ary mpanapaka azy hivadi-po noho ny faneva, hoy Jehovah, Izay manana ny afony ao Ziona sy ny fatany fandoroana ao Jerosalema.'
