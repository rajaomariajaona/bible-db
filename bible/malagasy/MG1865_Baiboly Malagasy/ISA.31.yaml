document_id: ISA.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hampijaliana ny Isiraely noho ny niankinany tamin'i Egypta sy ny hiarovan'Andriamanitra izay mibebaka, ary ny hanendreny mpanjaka izay hitondra azy amin'ny fahamarinana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lozan''izay midina any Egypta hitady famonjena sy miantehitra amin''ny soavaly ary matoky ny kalesy, satria maro ireny, sy ny mpitaingin-tsoavaly, satria mahery dia mahery ireny, fa tsy manandrandra ny Iray Masin''ny Isiraely, na mitady an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nefa Izy koa dia hendry ka mahatonga loza, ary tsy tsoahany ny teniny; Fa mitsangana Izy hamely ny mpianakavin''ny mpanao ratsy sy izay manampy ny mpanao meloka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa olona ihany ny Egyptiana fa tsy Andriamanitra; Ary nofo ihany ny soavaliny, fa tsy fanahy. Koa raha ahinjitr''i Jehovah ny tànany, dia ho tafintohina izay manampy, ary ho potraka izay ampiana, ka samy ho levona avokoa izy roa tonta. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no nolazain''i Jehovah tamiko: Tahaka ny fieron''ny liona sy ny liona tanora eo amin''ny rembiny, ka na dia voangona aza ny mpiandry ondry betsaka hamely azy, Tsy matahotra ny feon''ireo izy, na mandatsa-dremby noho ny fihorakorahany, dia tahaka izany no hidinan''i Jehovah, Tompon''ny maro, Hiady ao an-tendrombohitra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hamely ny tendrombohitra'
    marker-yv: yv-n
  - type: text
    text: ' Ziona sy ny havoany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tahaka ny vorona manomba no hiarovan'i Jehovah, tompon'ny maro, an'i Jerosalema, fa sady hiaro no hamonjy Izy, eny, sady hiantra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. handalo; izahao Eks. xii.13
    marker-yv: yv-n
  - type: text
    text: ' no hanafaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa miverena ho amin''izay efa niodinanareo fatratra, ry zanak''Isiraely ô. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa amin'izany andro izany dia harian'ny olona rehetra ny andriamani-bolafotsiny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. andriamani-tsi-izy
    marker-yv: yv-n
  - type: text
    text: ' sy ny andriamani-bolamenany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. andriamani-tsi-izy
    marker-yv: yv-n
  - type: text
    text: ', izay fahotana nataon''ny tananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny Asyriana ho lavon''ny sabatra izay tsy mba an''olombelona, eny, sabatra izay tsy mba an''olombelona no handringanana azy; Dia handositra ny sabatra izy, ary ny zatovony hampanaovina fanompoana, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ny mpanjakany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: harambatony'
    marker-yv: yv-n
  - type: text
    text: ' ho lasa noho ny fahatahorana, Ary mpanapaka azy hivadi-po noho ny faneva, hoy Jehovah, Izay manana ny afony ao Ziona sy ny fatany fandoroana ao Jerosalema.'
