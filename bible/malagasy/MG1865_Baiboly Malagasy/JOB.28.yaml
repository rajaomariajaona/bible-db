document_id: JOB.28,96
type_code: plt
verses:
  '1':
  - type: text
    content: Fa misy tany fihadiana volafotsy, ary misy tany fahazoana volamena, izay diovina.
  '10':
  - type: text
    content: Ny vatolampy tatahany hatao lalan-drano, ary izay zava-tsoa rehetra dia hitan'ny masony avokoa.
  '11':
  - type: text
    content: Tampenany ny lalan-drano mba tsy hisy mitete. Ary izay zava-miafina dia avoakany ho amin'ny mazava.
  '12':
  - type: text
    content: Fa aiza kosa no hahitana ny fahendrena? ary aiza no fitoeran'ny fahalalana?
  '13':
  - type: text
    content: Tsy misy zanak'olombelona mahalala ny vidiny, ary tsy hita eo amin'ny tanin'ny velona izy.
  '14':
  - type: text
    content: 'Hoy ny lalina: Tsy ato anatiko izy; Ary, tsy ato amiko izy, hoy ny ranomasina.'
  '15':
  - type: text
    content: Ny volamena tsara tsy mahatakalo azy, ary ny volafotsy tsy azo lanjaina ho vidiny;
  '16':
  - type: text
    content: Ny volamena avy any Ofira tsy ampy ho tombany, na ny beryla saro-bidy sy ny safira aza.
  '17':
  - type: text
    content: Ny volamena sy ny fitaratra tsy azo ampitahaina aminy, ary tsy azo takalozana firavaka tena volamena izy.
  '18':
  - type: text
    content: Tsy tokony hotsaroana akory ny voahangy sy ny vato krystaly, fa ny fahazoana fahendrena dia mihoatra noho ny voahangy.
  '19':
  - type: text
    content: Ny topaza avy any Etiopia dia tsy azo ampitahaina aminy, ary tsy mahatakalo azy ny tena volamena tsara
  '2':
  - type: text
    content: Ny vy dia alaina avy amin'ny tany, ary ny varahina arendrika avy amin'ny vato.
  '20':
  - type: text
    content: Dia avy aiza ary ny fahendrena? Ary aiza no fitoeran'ny fahalalana?
  '21':
  - type: text
    content: Miafina amin'ny mason'ny velona rehetra izany ary takona amin'ny voro-manidina.
  '22':
  - type: text
    content: Hoy Abadona
  - type: note
    content: Abadona = Fandringanana
  - type: text
    content: ' sy Ifahafatesana: Ny sofinay ihany no nandrenesany ny filazana azy.'
  '23':
  - type: text
    content: Andriamanitra ihany no mahalala ny lalana ho any aminy, ary Izy no mahafantatra ny itoerany;
  '24':
  - type: text
    content: Fa Izy no mitsinjo hatramin'ny faran'ny tany ary mahatazana manerana izao ambanin'ny lanitra rehetra izao,
  '25':
  - type: text
    content: Ka manendry ny lanjan'ny rivotra ary mamatra ny rano amin'ny famarana.
  '26':
  - type: text
    content: Raha nanao lalana ho an'ny ranonorana Izy sy lalana halehan'ny helatry ny kotrokorana,
  '27':
  - type: text
    content: Dia nahita ka nanambara azy Izy; Eny, nanorina azy Izy sady namantatra azy;
  '28':
  - type: text
    content: 'Dia hoy Izy tamin''ny olona: Indro, ny fahatahorana ny Tompo no fahendrena. Ary ny fialàna amin''ny ratsy no fahalalana.'
  '3':
  - type: text
    content: Ny mpihady vola mampisava ny maizina ka mizaha hatramin'ny faran'ny zavatra rehetra ao, dia ny vaton'ny aizim-pito sy ny aloky ny fahafatesana;
  '4':
  - type: text
    content: Mihady lavaka mihalavitra amin'izay itoeran'olona izy ka tsy ampoizin'ny tongotra akory, ary mihantona sy mitsingevaheva any ambany lavitra ny olona izy.
  '5':
  - type: text
    content: Ny tany no ihavian'ny hanina; Ary ny ao ambaniny dia avadika tahaka ny afo.
  '6':
  - type: text
    content: Fitoeran'ny safira ny vatony, ary misy akoram-bolamena ao aminy
  '7':
  - type: text
    content: Làlana tsy fantatry ny vorona mpihaza ary tsy hitan'ny mason'ny voromahery,
  '8':
  - type: text
    content: Sady tsy nodiavin'ny zanaky ny bibi-dia ary tsy mba nalehan'ny liona masiaka.
  '9':
  - type: text
    content: Maninjitra ny tànany amin'ny vatokaranana ireo ary mamadika ny tendrombohitra hatramin'ny fotony;
