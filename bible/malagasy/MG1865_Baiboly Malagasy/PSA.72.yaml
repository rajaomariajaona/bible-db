document_id: PSA.72
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny handrosoan'ny fanjakan'ny mpanjaka voatendrin'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nataon''i Solomona. Andriamanitra ô, omeo ho an''ny mpanjaka ny fitsarànao,ary ho an''ny zanaky ny mpanjaka ny fahamarinanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hitsara
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Aoka, etc'
    marker-yv: yv-n
  - type: text
    text: ' ny olonao amin''ny fahamarinana izy. Ary ny malahelolonao amin''ny fahitsiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny tendrombohitra hahavokatra fiadanana ho an''ny olona, eny, ny havoana koa amin''ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hitsara2 ny olona ory izy sy hamonjy ny zanaky ny mahantra ary hanorotoro ny mpampahory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hatahotra2 anao ny olona, raha mbola maharitra koa ny masoandro sy ny volana hatramin'ny taranaka fara mandimby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hidina2 tahaka ny ranonorana amin''ny saha voajinja izy, tahaka ny ranonorana mivatravatra amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny2 marina hitrebona amin''ny androny, ary ho be ny fiadanana mandra-paha-tsy hisy volana intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary hanjaka hatramin'ny ranomasina ka hatramin'ny ranomasina izy, ary hatramin'ny ony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: ' ka hatramin''ny faran''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny mponina any an-efitra handohalika eo anatrehany; ary ny fahavalony hilelaka ny vovoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny mpanjakan''i Tarsisy sy ny nosy handoa hetra; ny mpanjakan''i Sheba sy Seba hanatitra fanomezana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpanjaka rehetra hiankohoka eo anatrehany; ny firenena rehetra hanompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hamonjy ny mahantra mitaraina izy sy ny ory tsy manan-kamonjy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hiantra ny reraka sy ny malahelo izy ary hamonjy ny fanahin''ny malahelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hanavotra ny fanahiny amin''ny fampahoriana sy ny fanaovana an-keriny izy; ary ho zava-dehibe eo imasony ny ràny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia ho velona ireny ka hanome azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia ho velona Izy ka homena'
    marker-yv: yv-n
  - type: text
    text: ' volamena avy any Sheba, ary hanao fifonana ho azy mandrakariva, izy, ary isan''andro no hisaorany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hahavoka-bary betsaka ny tany na dia any an-tampon''ny tendrombohitra aza; hirondrona tahaka ny any Libanona ny fahavokarany; ary ny ao an-tanàna hidokadoka tahaka ny ahitra amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho mandrakizay ny anarany; raha mbola maharitra koa ny masoandro, dia hanorobona ny anarany; ary izy ho fitahiana ny olona; ny firenena rehetra hanao azy ho sambatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izaho Gen.xxii. 18
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Isaorana anie Jehovah Andriamanitra, Andriamanitry ny Isiraely; Izy irery ihany no manao fahagagana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary isaorana mandrakizay anie ny anarany malaza; ary aoka ny tany rehetra ho henika ny voninahiny. Amena dia Amena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tapitra ny fivavak'i Davida, zanak'i Jese.
