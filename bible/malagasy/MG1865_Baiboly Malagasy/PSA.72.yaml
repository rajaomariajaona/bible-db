document_id: PSA.72,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handrosoan'ny fanjakan'ny mpanjaka voatendrin'Andriamanitra
  - type: text
    content: 'Nataon''i Solomona. Andriamanitra ô, omeo ho an''ny mpanjaka ny fitsarànao,ary ho an''ny zanaky ny mpanjaka ny fahamarinanao. '
  '10':
  - type: text
    content: 'Ny mpanjakan''i Tarsisy sy ny nosy handoa hetra; ny mpanjakan''i Sheba sy Seba hanatitra fanomezana. '
  '11':
  - type: text
    content: 'Ary ny mpanjaka rehetra hiankohoka eo anatrehany; ny firenena rehetra hanompo azy. '
  '12':
  - type: text
    content: 'Fa hamonjy ny mahantra mitaraina izy sy ny ory tsy manan-kamonjy; '
  '13':
  - type: text
    content: 'Hiantra ny reraka sy ny malahelo izy ary hamonjy ny fanahin''ny malahelo. '
  '14':
  - type: text
    content: 'Hanavotra ny fanahiny amin''ny fampahoriana sy ny fanaovana an-keriny izy; ary ho zava-dehibe eo imasony ny ràny. '
  '15':
  - type: text
    content: Dia ho velona ireny ka hanome azy
  - type: note
    content: 'Na: Dia ho velona Izy ka homena'
  - type: text
    content: ' volamena avy any Sheba, ary hanao fifonana ho azy mandrakariva, izy, ary isan''andro no hisaorany azy. '
  '16':
  - type: text
    content: 'Hahavoka-bary betsaka ny tany na dia any an-tampon''ny tendrombohitra aza; hirondrona tahaka ny any Libanona ny fahavokarany; ary ny ao an-tanàna hidokadoka tahaka ny ahitra amin''ny tany. '
  '17':
  - type: text
    content: Ho mandrakizay ny anarany; raha mbola maharitra koa ny masoandro, dia hanorobona ny anarany; ary izy ho fitahiana ny olona; ny firenena rehetra hanao azy ho sambatra
  - type: note
    content: Izaho Gen.xxii. 18
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Isaorana anie Jehovah Andriamanitra, Andriamanitry ny Isiraely; Izy irery ihany no manao fahagagana; '
  '19':
  - type: text
    content: Ary isaorana mandrakizay anie ny anarany malaza; ary aoka ny tany rehetra ho henika ny voninahiny. Amena dia Amena.
  '2':
  - type: text
    content: Hitsara
  - type: note
    content: 'Na: Aoka, etc'
  - type: text
    content: ' ny olonao amin''ny fahamarinana izy. Ary ny malahelolonao amin''ny fahitsiana. '
  '20':
  - type: text
    content: Tapitra ny fivavak'i Davida, zanak'i Jese.
  '3':
  - type: text
    content: 'Ny tendrombohitra hahavokatra fiadanana ho an''ny olona, eny, ny havoana koa amin''ny fahamarinana. '
  '4':
  - type: text
    content: Hitsara2 ny olona ory izy sy hamonjy ny zanaky ny mahantra ary hanorotoro ny mpampahory.
  '5':
  - type: text
    content: Hatahotra2 anao ny olona, raha mbola maharitra koa ny masoandro sy ny volana hatramin'ny taranaka fara mandimby.
  '6':
  - type: text
    content: 'Hidina2 tahaka ny ranonorana amin''ny saha voajinja izy, tahaka ny ranonorana mivatravatra amin''ny tany. '
  '7':
  - type: text
    content: 'Ny2 marina hitrebona amin''ny androny, ary ho be ny fiadanana mandra-paha-tsy hisy volana intsony. '
  '8':
  - type: text
    content: Ary hanjaka hatramin'ny ranomasina ka hatramin'ny ranomasina izy, ary hatramin'ny ony
  - type: note
    content: Eofrata
  - type: text
    content: ' ka hatramin''ny faran''ny tany. '
  '9':
  - type: text
    content: 'Ny mponina any an-efitra handohalika eo anatrehany; ary ny fahavalony hilelaka ny vovoka. '
