document_id: PSA.76,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an'Andriamanitra noho ny nisehoan'ny fitsarany marina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha. Salamo nataon''i Asafa. Tonon-kira. Andriamanitra dia fantatra eo amin''ny Joda; malaza eo amin''ny Isiraely ny anarany; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa ny fahatezeran''ny olona hidera Anao tokoa; ny fahatezerana sisa dia isikinanao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mivoadia, ka efao ny voadinareo amin''i Jehovah Andriamanitrareo; aoka izay rehetra manodidina Azy hitondra fanatitra ho an''Izay mahatahotra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Manapaka ny reharehan'ny lehibe Izy sady tahotry ny mpanjakan'ny tany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Naoriny ao Salema ny tranolainy, ary any Ziona ny fonenany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Teo no nanapatapahany ny zana-tsipìka manelatra, sy ny ampinga sy ny sabatra ary ny fiadiana.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mamirapiratra Hianao sady be voninahitra miseho avy any amin
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: noho'
      marker-yv: yv-n
    - type: text
      text: '''ny tendrombohitra fitohàna. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voababo ny mahery fo; renoky ny torimasony izy; ary samy ankona tsy nahahetsika
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nahita
      marker-yv: yv-n
    - type: text
      text: ' ny tànany avokoa ny olo-mahery rehetra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Noho ny teny mafy nataonao, ry Andriamanitr''i Jakoba, dia sondrian-tory ny kalesy sy ny soavaly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hianao no mahatahotra; ka iza no mahajanona eo anatrehanao, rehefa miseho ny fahatezeranao? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Avy tany an-danitra no nampandrenesanao fitsaràna. Raiki-tahotra ny tany ka sina, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Raha nitsangana hitsara Andriamanitra mba hamonjy ny mpandefitra rehetra ambonin'ny tany.
