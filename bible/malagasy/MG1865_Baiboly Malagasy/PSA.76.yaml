document_id: PSA.76,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra noho ny nisehoan'ny fitsarany marina
  - type: text
    content: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha. Salamo nataon''i Asafa. Tonon-kira. Andriamanitra dia fantatra eo amin''ny Joda; malaza eo amin''ny Isiraely ny anarany; '
  '10':
  - type: text
    content: 'Fa ny fahatezeran''ny olona hidera Anao tokoa; ny fahatezerana sisa dia isikinanao. '
  '11':
  - type: text
    content: 'Mivoadia, ka efao ny voadinareo amin''i Jehovah Andriamanitrareo; aoka izay rehetra manodidina Azy hitondra fanatitra ho an''Izay mahatahotra. '
  '12':
  - type: text
    content: Manapaka ny reharehan'ny lehibe Izy sady tahotry ny mpanjakan'ny tany.
  '2':
  - type: text
    content: 'Naoriny ao Salema ny tranolainy, ary any Ziona ny fonenany. '
  '3':
  - type: text
    content: Teo no nanapatapahany ny zana-tsipìka manelatra, sy ny ampinga sy ny sabatra ary ny fiadiana.
  '4':
  - type: text
    content: Mamirapiratra Hianao sady be voninahitra miseho avy any amin
  - type: note
    content: 'Na: noho'
  - type: text
    content: '''ny tendrombohitra fitohàna. '
  '5':
  - type: text
    content: Voababo ny mahery fo; renoky ny torimasony izy; ary samy ankona tsy nahahetsika
  - type: note
    content: Heb. nahita
  - type: text
    content: ' ny tànany avokoa ny olo-mahery rehetra. '
  '6':
  - type: text
    content: 'Noho ny teny mafy nataonao, ry Andriamanitr''i Jakoba, dia sondrian-tory ny kalesy sy ny soavaly. '
  '7':
  - type: text
    content: 'Hianao no mahatahotra; ka iza no mahajanona eo anatrehanao, rehefa miseho ny fahatezeranao? '
  '8':
  - type: text
    content: 'Avy tany an-danitra no nampandrenesanao fitsaràna. Raiki-tahotra ny tany ka sina, '
  '9':
  - type: text
    content: Raha nitsangana hitsara Andriamanitra mba hamonjy ny mpandefitra rehetra ambonin'ny tany.
