document_id: ISA.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hitsarana an'i Samaria sy Jerosalema, sy fanoharana mahamarina ny fitondran'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan'ny satro-boninahitra, izay reharehan'ny mpimamo any Efraima, sy ny voninkazo mihamalazo amin'ny firàvany tsara tarehy, izay eo an-dohan'ny lohasaha lonaky
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. matavy
    marker-yv: yv-n
  - type: text
    text: ' ny fileon-divay. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indro, ny Tompo manana izay mahery sady matanjaka, tahaka ny rivo-kavandra sy ny tafio-drivotra mandoza; Koa tahaka ny fandriaky ny rano be manafotra no hanjerany azy mafy ho amin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hohitsahin''ny tongotra ny satro-boninahitra, Izay reharehan''ny mpimamo any Efraima. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ny voninkazo mihamalazo amin'ny firàvany tsara tarehy, izay eo an-dohan'ny lohasaha lonaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. matavy
    marker-yv: yv-n
  - type: text
    text: ', dia ho tahaka ny voan''aviavy mialin-taona, raha tsy mbola tonga ny fahavaratra, koa izay mahita azy dia mijery, ary raha vao raisiny, dia arapany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary amin''izany andro izany Jehovah, Tompon''ny maro, dia ho satro-boninahitra tsara tarehy sy ho fehiloha firavaka ho an''ny olony sisa, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ho fanahy fitsarana ho an'izay mipetraka eo amin'ny fitsarana, sy ho hery ho an'izay mampiverina ny ady hatreo am-bavahady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa ireo koa dia miraingiraingy azon''ny divay ary mivembena azon''ny toaka; Ny mpisorona sy ny mpaminany miraingiraingy azon''ny toaka; Resin''ny divay ireo; Mivembena azon''ny toaka izy; Miraingiraingy amin''ny fahitana izy ary midoladola eo amin''ny fitsarana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa feno loa sy loto ny latabatra rehetra, ka efa tsy misy madio hitoerana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Iza no hampianariny fahalalana? Ary iza no hampahafantariny fianarana? Zaza vao notazana va? Ny vao nitsaha-nono va? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa didy anampy didy, didy anampy didy; Fitsipika anampy fitsipika, fitsipika anampy fitsipika; Kely etỳ, ary kely erỳ; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, amin''ny molotra miambakambaka sy amin''ny fiteny baiko no hitenenany amin''ity firenena ity, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Izay nilazany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia Izy Izay nilaza taminy'
    marker-yv: yv-n
  - type: text
    text: ' hoe: Ity no fitsaharana, ampitsaharo ny reraka, ary ity no famelombelomana; Nefa tsy nety nihaino ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny tenin'i Jehovah dia ho tonga didy anampy didy aminy tokoa, eny, didy anampy didy, fitsipika anampy fitsipika, fitsipika anampy fitsipika; Kely etỳ, ary kely erỳ, mba hanaovany dia mianotra, ka ho torotoro izy sy hofandrihana ary hosamborina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa mihainoa ny tenin''i Jehovah ianareo, ry mpaniratsira, izay manapaka ity firenena eto Jerosalema ity. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Satria ianareo manao hoe: Efa nanao fanekena tamin''ny fahafatesana izahay ary efa nanao fifanarahana tamin''ny fiainan-tsi-hita'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' ka na dia ho avy aza ny loza'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. kotopia
    marker-yv: yv-n
  - type: text
    text: ' manafotra, dia tsy hihatra aminy izany, fa ny lainga no nataonay ho fiarovana, ary ny fitaka ho fierena, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia izao no lazain''i Jehovah Tompo: Indro, Izaho no efa nametraka vato ao Ziona, dia vato voazaha toetra, vato tsara izay fehizoro voaorina ho fanorenana mafy, ka tsy mba ho taitra izay mino. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny fitsarana no hataoko ho fitsipika, ary ny fahamarinana ho pilao; Hopaohin''ny havandra ny lainga fiarovana, ary hindaosin''ny rano ny fierena. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hofoanana ny fanekenareo amin'ny fahafatesana, ary tsy haharitra ny fifanarahanareo amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' raha ho avy ny loza'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. kotopia
    marker-yv: yv-n
  - type: text
    text: ' manafotra, dia ho tonga fanitsakitsany ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary na oviana na oviana no ihaviany, dia hahatratra anareo izany; Fa isa-maraina isa-maraina no hihaviany, na andro na alina; Ary ny vokatry ny fahafantarana izany fianarana izany dia fangovitana ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa fohy loatra ny farafara ka tsy azon''ny olona ilamparana; Ary kely ny firakotra ka tsy maharakotra, raha misy te-hirakotra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa Jehovah hitsangana tahaka ny teo amin''ny tendrombohitra Perazima, ho tezitra tahaka ny teo amin''ny lohasahan''i Gibeona Izy, mba hanaovany ny asany tsy ilay fanaony mandrakariva anefa, ary hahavitany ny ataony tsy ilay vitainy mandrakariva anefa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa dia aza maniratsira intsony ianareo, fandrao atao mafy ny famatorana anareo; Fa fahafonganana voatendry no efa reko tamin''i Jehovah, Tompon''ny maro, Hamelezana ny tany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mihainoa ianareo, ka mandrenesa ny feoko; Mitandrema, ka mandrenesa ny teniko. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moa ny mpiasa tany va miasa mba hamafy, na mitombo-doha sy mandravona ny taniny mandrakariva? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rehefa voaravony tsara ny tany, moa tsy afafiny amin'izay va ny voan'ny nigela, ary tsy apariakany va ny komina, ary tsy alahany mitandahatra tsara va ny vary tritika sy ny vary hordea amin'ny tany voafaritra ho azy Ary ny ampemby
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: spelta'
    marker-yv: yv-n
  - type: text
    text: ' kosa eny an-tsisiny? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa Andriamaniny no manoro azy izay mety hataony, Eny, Izy no mampianatra azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Samy ataony araka izay tandrifiny ho azy avy; Fa Andriamaniny no mampianatra azy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa tsy ny kodia vy no ivelezana ny nigela, ary tsy ny kodian''ny sariety no akodiadia amin''ny komina; Fa ny nigela dia velezina amin''ny fantàka, ary ny komina amin''ny tehina. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moa mongomongoiny va ny vary hatao mofo? Tsia, fa tsy veleziny na hampandehanany ny kodian''ny sarietiny sy ny soavaliny lalandava izy; Tsy mongomongoiny tsy akory izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izany koa dia avy amin'i Jehovah, Tompon'ny maro; Fa mahagaga amin'ny fisainana Izy Ary mahatalanjona amin'ny fahendrena.
