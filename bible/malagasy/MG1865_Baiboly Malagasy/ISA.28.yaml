document_id: ISA.28,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hitsarana an'i Samaria sy Jerosalema, sy fanoharana mahamarina ny fitondran'Andriamanitra
  - type: text
    content: Lozan'ny satro-boninahitra, izay reharehan'ny mpimamo any Efraima, sy ny voninkazo mihamalazo amin'ny firàvany tsara tarehy, izay eo an-dohan'ny lohasaha lonaky
  - type: note
    content: Heb. matavy
  - type: text
    content: ' ny fileon-divay. '
  '10':
  - type: text
    content: 'Fa didy anampy didy, didy anampy didy; Fitsipika anampy fitsipika, fitsipika anampy fitsipika; Kely etỳ, ary kely erỳ; '
  '11':
  - type: text
    content: 'Eny, amin''ny molotra miambakambaka sy amin''ny fiteny baiko no hitenenany amin''ity firenena ity, '
  '12':
  - type: text
    content: Izay nilazany
  - type: note
    content: 'Na: Dia Izy Izay nilaza taminy'
  - type: text
    content: ' hoe: Ity no fitsaharana, ampitsaharo ny reraka, ary ity no famelombelomana; Nefa tsy nety nihaino ireo. '
  '13':
  - type: text
    content: Ary ny tenin'i Jehovah dia ho tonga didy anampy didy aminy tokoa, eny, didy anampy didy, fitsipika anampy fitsipika, fitsipika anampy fitsipika; Kely etỳ, ary kely erỳ, mba hanaovany dia mianotra, ka ho torotoro izy sy hofandrihana ary hosamborina.
  '14':
  - type: text
    content: 'Koa mihainoa ny tenin''i Jehovah ianareo, ry mpaniratsira, izay manapaka ity firenena eto Jerosalema ity. '
  '15':
  - type: text
    content: 'Satria ianareo manao hoe: Efa nanao fanekena tamin''ny fahafatesana izahay ary efa nanao fifanarahana tamin''ny fiainan-tsi-hita'
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' ka na dia ho avy aza ny loza'
  - type: note
    content: Heb. kotopia
  - type: text
    content: ' manafotra, dia tsy hihatra aminy izany, fa ny lainga no nataonay ho fiarovana, ary ny fitaka ho fierena, '
  '16':
  - type: text
    content: 'Dia izao no lazain''i Jehovah Tompo: Indro, Izaho no efa nametraka vato ao Ziona, dia vato voazaha toetra, vato tsara izay fehizoro voaorina ho fanorenana mafy, ka tsy mba ho taitra izay mino. '
  '17':
  - type: text
    content: 'Ny fitsarana no hataoko ho fitsipika, ary ny fahamarinana ho pilao; Hopaohin''ny havandra ny lainga fiarovana, ary hindaosin''ny rano ny fierena. '
  '18':
  - type: text
    content: Hofoanana ny fanekenareo amin'ny fahafatesana, ary tsy haharitra ny fifanarahanareo amin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' raha ho avy ny loza'
  - type: note
    content: Heb. kotopia
  - type: text
    content: ' manafotra, dia ho tonga fanitsakitsany ianareo. '
  '19':
  - type: text
    content: 'Ary na oviana na oviana no ihaviany, dia hahatratra anareo izany; Fa isa-maraina isa-maraina no hihaviany, na andro na alina; Ary ny vokatry ny fahafantarana izany fianarana izany dia fangovitana ihany. '
  '2':
  - type: text
    content: 'Indro, ny Tompo manana izay mahery sady matanjaka, tahaka ny rivo-kavandra sy ny tafio-drivotra mandoza; Koa tahaka ny fandriaky ny rano be manafotra no hanjerany azy mafy ho amin''ny tany. '
  '20':
  - type: text
    content: 'Fa fohy loatra ny farafara ka tsy azon''ny olona ilamparana; Ary kely ny firakotra ka tsy maharakotra, raha misy te-hirakotra azy. '
  '21':
  - type: text
    content: 'Fa Jehovah hitsangana tahaka ny teo amin''ny tendrombohitra Perazima, ho tezitra tahaka ny teo amin''ny lohasahan''i Gibeona Izy, mba hanaovany ny asany tsy ilay fanaony mandrakariva anefa, ary hahavitany ny ataony tsy ilay vitainy mandrakariva anefa. '
  '22':
  - type: text
    content: 'Koa dia aza maniratsira intsony ianareo, fandrao atao mafy ny famatorana anareo; Fa fahafonganana voatendry no efa reko tamin''i Jehovah, Tompon''ny maro, Hamelezana ny tany rehetra. '
  '23':
  - type: text
    content: 'Mihainoa ianareo, ka mandrenesa ny feoko; Mitandrema, ka mandrenesa ny teniko. '
  '24':
  - type: text
    content: 'Moa ny mpiasa tany va miasa mba hamafy, na mitombo-doha sy mandravona ny taniny mandrakariva? '
  '25':
  - type: text
    content: Rehefa voaravony tsara ny tany, moa tsy afafiny amin'izay va ny voan'ny nigela, ary tsy apariakany va ny komina, ary tsy alahany mitandahatra tsara va ny vary tritika sy ny vary hordea amin'ny tany voafaritra ho azy Ary ny ampemby
  - type: note
    content: 'Na: spelta'
  - type: text
    content: ' kosa eny an-tsisiny? '
  '26':
  - type: text
    content: Fa Andriamaniny no manoro azy izay mety hataony, Eny, Izy no mampianatra azy
  - type: note
    content: 'Na: Samy ataony araka izay tandrifiny ho azy avy; Fa Andriamaniny no mampianatra azy'
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Fa tsy ny kodia vy no ivelezana ny nigela, ary tsy ny kodian''ny sariety no akodiadia amin''ny komina; Fa ny nigela dia velezina amin''ny fantàka, ary ny komina amin''ny tehina. '
  '28':
  - type: text
    content: 'Moa mongomongoiny va ny vary hatao mofo? Tsia, fa tsy veleziny na hampandehanany ny kodian''ny sarietiny sy ny soavaliny lalandava izy; Tsy mongomongoiny tsy akory izy. '
  '29':
  - type: text
    content: Izany koa dia avy amin'i Jehovah, Tompon'ny maro; Fa mahagaga amin'ny fisainana Izy Ary mahatalanjona amin'ny fahendrena.
  '3':
  - type: text
    content: 'Dia hohitsahin''ny tongotra ny satro-boninahitra, Izay reharehan''ny mpimamo any Efraima. '
  '4':
  - type: text
    content: Ary ny voninkazo mihamalazo amin'ny firàvany tsara tarehy, izay eo an-dohan'ny lohasaha lonaka
  - type: note
    content: Heb. matavy
  - type: text
    content: ', dia ho tahaka ny voan''aviavy mialin-taona, raha tsy mbola tonga ny fahavaratra, koa izay mahita azy dia mijery, ary raha vao raisiny, dia arapany. '
  '5':
  - type: text
    content: 'Ary amin''izany andro izany Jehovah, Tompon''ny maro, dia ho satro-boninahitra tsara tarehy sy ho fehiloha firavaka ho an''ny olony sisa, '
  '6':
  - type: text
    content: Ary ho fanahy fitsarana ho an'izay mipetraka eo amin'ny fitsarana, sy ho hery ho an'izay mampiverina ny ady hatreo am-bavahady.
  '7':
  - type: text
    content: 'Nefa ireo koa dia miraingiraingy azon''ny divay ary mivembena azon''ny toaka; Ny mpisorona sy ny mpaminany miraingiraingy azon''ny toaka; Resin''ny divay ireo; Mivembena azon''ny toaka izy; Miraingiraingy amin''ny fahitana izy ary midoladola eo amin''ny fitsarana. '
  '8':
  - type: text
    content: 'Fa feno loa sy loto ny latabatra rehetra, ka efa tsy misy madio hitoerana. '
  '9':
  - type: text
    content: 'Iza no hampianariny fahalalana? Ary iza no hampahafantariny fianarana? Zaza vao notazana va? Ny vao nitsaha-nono va? '
