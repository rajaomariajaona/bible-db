document_id: NUM.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny fampirehetana ny jiro, sy ny nanadiovana ny Levita, ary ny fe-taona hanompoany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin''i Arona hoe: Raha mampirehitra ny jiro fito ianao, dia ataovy mahazava ny eo anoloan''ny fanaovan-jiro izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nataon''i Arona izany, fa nampirehetiny ny jiro mba hahazava ny eo anoloan''ny fanaovan-jiro, araka izay efa nandidian''i Jehovah an''i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izao no toetry ny fanaovan-jiro; volamena novoasana izy; hatramin''ny faladiany sy ny voniny aza dia samy novoasana avokoa; araka ny endrika izay nasehon''i Jehovah an''i Mosesy no nanaovany ny fanaovan-jiro. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alao ny Levita avy amin''ny Zanak''Isiraely, ka diovy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izao no hataonao aminy hanadiovana azy: Fafazo rano fanadiovana izy, ary asaovy haratany avokoa ny tenany rehetra, ary aoka hosasany ny fitafiany, ka dia hadio izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia asaovy maka vantotr''ombilahy iray izy mbamin''ny fanatitra hohanina fombany, dia koba tsara toto voaharo diloilo; ary vantotr''ombilahy iray koa no halainao ho fanatitra noho ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ento ny Levita hankeo anoloan''ny trano-lay fihaonana; ary vorio ny fiangonana, dia ny Zanak''Isiraely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ento ny Levita hankeo anatrehan''i Jehovah; ary ny Zanak''Isiraely hametraka ny tànany aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary Arona dia hanatitra ny Levita eo anatrehan''i Jehovah ho fanatitra ahevaheva avy amin''ny Zanak''Isiraely, mba hanao ny fanompoana an''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny Levita hametraka ny tànany amin''ny lohan''ny vantotr''ombilahy roa; dia atero ny anankiray ho fanatitra noho ny ota, ary ny anankiray kosa ho fanatitra dorana ho an''i Jehovah, hanaovana fanavotana ho an''ny Levita. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary apetraho eo anatrehan''i Arona sy ny zanany ny Levita, ka atero ho fanatitra ahevaheva ho an''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ampiavaho amin''ny Zanak''Isiraely ny Levita, dia ho Ahy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa afaka izany, dia hiditra ny Levita hanao fanompoana ao amin''ny trano-lay fihaonana. Dia hodiovinao toy izany izy ka haterinao ho fanatitra ahevaheva; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'fa efa nomena ho Ahy avy tamin''ny Zanak''Isiraely mihitsy izy; ho solon''izay voalohan-teraka rehetra, dia izay lahimatoa rehetra amin''ny Zanak''Isiraely, no nanalako azy ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Ahy ny voalohan-teraka rehetra amin''ny Zanak''Isiraely, na olona na biby fiompy; tamin''ilay andro namelezako ny voalohan-teraka rehetra tany amin''ny tany Egypta no nanamasinako azy ho Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary efa nalaiko ny Levita ho solon''ny lahimatoa rehetra amin''ny Zanak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nomeko ho an''i Arona sy ny zanany mihitsy ny Levita, avy amin''ny Zanak''Isiraely, hanao ny fanompoan''ny Zanak''Isiraely ao amin''ny trano-lay fihaonana sy hanao fanavotana ho an''ny Zanak''Isiraely, mba tsy hisy areti-mandringana hanjo azy, raha manakaiky ny fitoerana masina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nataon''i Mosesy sy Arona mbamin''ny fiangonana, dia ny Zanak''Isiraely rehetra, tamin''ny Levita izany; araka izay rehetra efa nandidian''i Jehovah an''i Mosesy ny amin''ny Levita no nataon''ny Zanak''Isiraely taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nodiovin''ny Levita ny tenany ho afaka ota, ary nosasany ny fitafiany; ary Arona nanatitra azy ho fanatitra ahevaheva eo anatrehan''i Jehovah sady nanao fanavotana ho azy hanadiovana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary rehefa afaka izany, dia niditra ny Levita hanao ny fihaonana teo anatrehan''i Arona sy ny zanany; araka izay efa nandidian''i Jehovah an''i Mosesy ny amin''ny Levita no nataony taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny amin''ny Levita dia izao: Hatramin''ny dimy amby roa-polo taona no ho miakatra izy no hanatona hilatsaka amin''ny antokony hanao ny fanompoana ao amin''ny trano-lay fihaonana; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa rehefa dimam-polo taona kosa izy, dia hiala amin''ny antokon''ny fanompoana ka tsy hanompo intsony; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: kanefa mahazo manampy ny rahalahiny ao amin'ny trano-lay fihaonana ihany izy mba hitandrina izay anjara-raharaha; fa tsy hanao fanompoana hafa izy. Izany no hataonao amin'ny Levita ny amin'ny anjara-raharahany.
