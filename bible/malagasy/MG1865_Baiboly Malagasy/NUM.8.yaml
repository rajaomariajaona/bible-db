document_id: NUM.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny fampirehetana ny jiro, sy ny nanadiovana ny Levita, ary ny fe-taona hanompoany
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary ento ny Levita hankeo anatrehan''i Jehovah; ary ny Zanak''Isiraely hametraka ny tànany aminy; '
  '11':
  - type: text
    content: 'ary Arona dia hanatitra ny Levita eo anatrehan''i Jehovah ho fanatitra ahevaheva avy amin''ny Zanak''Isiraely, mba hanao ny fanompoana an''i Jehovah izy. '
  '12':
  - type: text
    content: 'Ary ny Levita hametraka ny tànany amin''ny lohan''ny vantotr''ombilahy roa; dia atero ny anankiray ho fanatitra noho ny ota, ary ny anankiray kosa ho fanatitra dorana ho an''i Jehovah, hanaovana fanavotana ho an''ny Levita. '
  '13':
  - type: text
    content: 'Ary apetraho eo anatrehan''i Arona sy ny zanany ny Levita, ka atero ho fanatitra ahevaheva ho an''i Jehovah izy. '
  '14':
  - type: text
    content: 'Ary ampiavaho amin''ny Zanak''Isiraely ny Levita, dia ho Ahy izy. '
  '15':
  - type: text
    content: 'Ary rehefa afaka izany, dia hiditra ny Levita hanao fanompoana ao amin''ny trano-lay fihaonana. Dia hodiovinao toy izany izy ka haterinao ho fanatitra ahevaheva; '
  '16':
  - type: text
    content: 'fa efa nomena ho Ahy avy tamin''ny Zanak''Isiraely mihitsy izy; ho solon''izay voalohan-teraka rehetra, dia izay lahimatoa rehetra amin''ny Zanak''Isiraely, no nanalako azy ho Ahy. '
  '17':
  - type: text
    content: 'Fa Ahy ny voalohan-teraka rehetra amin''ny Zanak''Isiraely, na olona na biby fiompy; tamin''ilay andro namelezako ny voalohan-teraka rehetra tany amin''ny tany Egypta no nanamasinako azy ho Ahy. '
  '18':
  - type: text
    content: 'Ary efa nalaiko ny Levita ho solon''ny lahimatoa rehetra amin''ny Zanak''Isiraely. '
  '19':
  - type: text
    content: 'Ary nomeko ho an''i Arona sy ny zanany mihitsy ny Levita, avy amin''ny Zanak''Isiraely, hanao ny fanompoan''ny Zanak''Isiraely ao amin''ny trano-lay fihaonana sy hanao fanavotana ho an''ny Zanak''Isiraely, mba tsy hisy areti-mandringana hanjo azy, raha manakaiky ny fitoerana masina izy. '
  '2':
  - type: text
    content: 'Mitenena amin''i Arona hoe: Raha mampirehitra ny jiro fito ianao, dia ataovy mahazava ny eo anoloan''ny fanaovan-jiro izy. '
  '20':
  - type: text
    content: 'Dia nataon''i Mosesy sy Arona mbamin''ny fiangonana, dia ny Zanak''Isiraely rehetra, tamin''ny Levita izany; araka izay rehetra efa nandidian''i Jehovah an''i Mosesy ny amin''ny Levita no nataon''ny Zanak''Isiraely taminy. '
  '21':
  - type: text
    content: 'Dia nodiovin''ny Levita ny tenany ho afaka ota, ary nosasany ny fitafiany; ary Arona nanatitra azy ho fanatitra ahevaheva eo anatrehan''i Jehovah sady nanao fanavotana ho azy hanadiovana azy. '
  '22':
  - type: text
    content: 'Ary rehefa afaka izany, dia niditra ny Levita hanao ny fihaonana teo anatrehan''i Arona sy ny zanany; araka izay efa nandidian''i Jehovah an''i Mosesy ny amin''ny Levita no nataony taminy. '
  '23':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '24':
  - type: text
    content: 'Ny amin''ny Levita dia izao: Hatramin''ny dimy amby roa-polo taona no ho miakatra izy no hanatona hilatsaka amin''ny antokony hanao ny fanompoana ao amin''ny trano-lay fihaonana; '
  '25':
  - type: text
    content: 'fa rehefa dimam-polo taona kosa izy, dia hiala amin''ny antokon''ny fanompoana ka tsy hanompo intsony; '
  '26':
  - type: text
    content: kanefa mahazo manampy ny rahalahiny ao amin'ny trano-lay fihaonana ihany izy mba hitandrina izay anjara-raharaha; fa tsy hanao fanompoana hafa izy. Izany no hataonao amin'ny Levita ny amin'ny anjara-raharahany.
  '3':
  - type: text
    content: 'Dia nataon''i Arona izany, fa nampirehetiny ny jiro mba hahazava ny eo anoloan''ny fanaovan-jiro, araka izay efa nandidian''i Jehovah an''i Mosesy. '
  '4':
  - type: text
    content: 'Ary izao no toetry ny fanaovan-jiro; volamena novoasana izy; hatramin''ny faladiany sy ny voniny aza dia samy novoasana avokoa; araka ny endrika izay nasehon''i Jehovah an''i Mosesy no nanaovany ny fanaovan-jiro. '
  '5':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '6':
  - type: text
    content: 'Alao ny Levita avy amin''ny Zanak''Isiraely, ka diovy izy. '
  '7':
  - type: text
    content: 'Ary izao no hataonao aminy hanadiovana azy: Fafazo rano fanadiovana izy, ary asaovy haratany avokoa ny tenany rehetra, ary aoka hosasany ny fitafiany, ka dia hadio izy. '
  '8':
  - type: text
    content: 'Dia asaovy maka vantotr''ombilahy iray izy mbamin''ny fanatitra hohanina fombany, dia koba tsara toto voaharo diloilo; ary vantotr''ombilahy iray koa no halainao ho fanatitra noho ny ota. '
  '9':
  - type: text
    content: 'Ary ento ny Levita hankeo anoloan''ny trano-lay fihaonana; ary vorio ny fiangonana, dia ny Zanak''Isiraely rehetra. '
