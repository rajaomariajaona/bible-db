document_id: JER.46
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'i Egypta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin'i Jehovah Izay tonga tamin'i Jeremia mpaminany ny amin'ny jentilisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny amin''i Egypta. Ny amin''ny miaramilan''i Farao-neko, mpanjakan''i Egypta, izay teny amoron''ny ony Eofrata, tany Karkemisy, dia ilay resin''i Nebokadnezara, mpanjakan''i Babylona, tamin''ny taona fahefatra nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mitaova amin''ny ampinga kely sy ny ampinga lehibe, ka mandrosoa hiady; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fehezo amin''ny kalesy ny soavaly, ary itaingeno ny soavaly fitaingina; Mijoroa tsara ianareo, ka samia misatroka fiarovan-doha; Fotsio ny lefona, miakanjoa ny akanjo fiarovan-tena. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Indrisy ny ahitako azy! raiki-tahotra sy miamboho izy, ary ny maheriny aza dia efa ripaka, sady miezaka mandositra izy ka tsy miherika akory; Fa misy fampangorohoroana manodidina, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy ho afa-mandositra ny haingan-tongotra, na ho afaka ny mahery; Any avaratra eo amoron''ny ony Eofrata no hahatafintohina sy hahalavo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Iza moa izato mizotra tahaka an''i Neily, ary ny onjany misamboaravoara toy ny renirano '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Egypta mizotra tahaka an''i Neily, ary ny onjany misamboaravoara toy ny renirano, ary hoy izy: Hizotra aho ka hanafotra ny tany; Haringako ny tanàna sy ny mponina ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Miakara, ianareo soavaly, ary miriota toy ny adala, ianareo kalesy; Ary aoka hivoaka ny lehilahy mahery, dia ny Etiopiana sy ny Libyana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Pota
    marker-yv: yv-n
  - type: text
    text: ', izay mitana ampinga, ary ny Lydiana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Loda
    marker-yv: yv-n
  - type: text
    text: ', izay mitana sy manenjana tsipìka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa izao andro izao dia an''i Jehovah, Tompon''ny maro, ho andro famaliana hamaliany ny fahavalony; Ary ny sabatra hihinana ka ho voky sy ho mamon''ny ran''ireo; Fa ny Tompo, dia Jehovah, Tompon''ny maro, no mamono zavatra hatao fanatitra any amin''ny tany avaratra ao amoron''ny ony Eofrata. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Miakara any Gileada, ka makà balsama, ry Egypta zanakavavy virijina; Foana ny nanaovanao fanafody maro, fa tsy manana plasitera hapetaka amin''ny ferinao ianao, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Efa ren''ny firenena ny henatrao, ary ny fiantsoantsoanao nanenika ny tany; fa mifandona ny samy mahery, ka miara-davo izy roa tonta. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny teny izay nolazain''i Jehovah tamin''i Jeremia mpaminany ny amin''ny hihavian''i Nebokadnezara, mpanjakan''i Babylona, hamely ny tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ambaraonareo any Egypta, ary torio any Migdola, eny, torio any Memfisa sy Tapanesa, ka ataovy hoe: Mijoroa tsara ianao, ka miomàna; Fa mandringana manodidina anao ny sabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nahoana no voapaoka ny maherinao? Tsy nahafahatra izy, satria Jehovah no nandroaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Efa nahatafintohina ny maro Izy, ka lavo mifanindry ireo; Dia hoy ireo: Mitsangàna, ka andeha isika hiverina ho any amin''ny firenentsika sy ho any amin''ny tany nahaterahantsika ho afaka amin''ny sabatra mandoza, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nitaraina tany izy hoe: Tabataba foana Farao, mpanjakan''i Egypta, efa nandiso ny fotoana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha velona koa Aho, hoy ny Mpanjaka, Jehovah, Tompon''ny maro, no anarany: Tahaka an''i Tabara amin''ny tendrombohitra, sy tahaka an''i Karmela ao amoron-dranomasina, dia ho tahaka izany no hihaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ry Egypta zanakavavy mponina, Mifeheza entana ho entinao any amin''ny fahababoana; Fa ho tonga tany lao Memfisa, eny, hodorana izy, ka tsy hisy mponina. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Egypta dia tahaka ny ombivavy kely tsara tarehy dia tsara tarehy; Fa injay! tamy, eny, tamy ny fihitra avy any avaratra! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Na dia ny olona karamaina ao aminy aza, izay tahaka ny ombilahy kely mifahy, ireny koa dia mihodina ka samy mandositra avokoa; Tsy mahajanona izy, fa efa tonga aminy ny andro hahitany loza, dia ny andro hamaliana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny feony dia toy ny fikasaotsaoky ny menarana mandeha; Fa mandeha hitondra miaramila izy ka avy hamely azy amin''ny famaky toy ny mpikapa hazo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kapainy ny alany, hoy Jehovah, satria efa nikirindro loatra; Fa maro noho ny valala izy ka tsy tambo isaina. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ho afa-baraka Egypta zanakavavy, Hatolotra eo an-tànan''ny olona any avaratra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely; Indro, hovaliako Amona avy any Nô Ary Farao sy Egypta mbamin''ny andriamaniny sy ny mpanjakany, dia Farao sy izay rehetra matoky azy; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary hatolotro eo an-tànan'izay mitady ny ainy izy, dia eo an-tànan'i Nebokadnezara, mpanjakan'i Babylona, sy eo an-tànan'ny mpanompony; Ary aorian'izany, dia handry fahizay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: honenana indray'
    marker-yv: yv-n
  - type: text
    text: ' toy ny tamin''ny andro fahiny ihany izy, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa aza matahotra ianao, ry Jakoba mpanompoko, ary aza mivadi-po, ry Isiraely; Fa, indro, hovonjeko avy any amin''ny lavitra ianao, ary ny taranakao avy any amin''ny tany nahababo azy; Dia hiverina Jakoba ka hiadana, eny, handry fahizay izy, ka tsy hisy hanaitaitra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aza matahotra ianao, ry Jakoba mpanompoko, hoy Jehovah, fa momba anao Aho; Fa na dia levoniko aza ny firenena rehetra izay nandroahako anao, ianao tsy mba holevoniko, nefa kosa mba hanariko araka ny antonony ihany ianao, fa tsy dia havelako fotsiny.
