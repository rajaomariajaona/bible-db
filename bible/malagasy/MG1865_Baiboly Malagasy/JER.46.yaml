document_id: JER.46,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin'i Egypta
  - type: text
    content: Ny tenin'i Jehovah Izay tonga tamin'i Jeremia mpaminany ny amin'ny jentilisa.
  '10':
  - type: text
    content: 'Fa izao andro izao dia an''i Jehovah, Tompon''ny maro, ho andro famaliana hamaliany ny fahavalony; Ary ny sabatra hihinana ka ho voky sy ho mamon''ny ran''ireo; Fa ny Tompo, dia Jehovah, Tompon''ny maro, no mamono zavatra hatao fanatitra any amin''ny tany avaratra ao amoron''ny ony Eofrata. '
  '11':
  - type: text
    content: 'Miakara any Gileada, ka makà balsama, ry Egypta zanakavavy virijina; Foana ny nanaovanao fanafody maro, fa tsy manana plasitera hapetaka amin''ny ferinao ianao, '
  '12':
  - type: text
    content: 'Efa ren''ny firenena ny henatrao, ary ny fiantsoantsoanao nanenika ny tany; fa mifandona ny samy mahery, ka miara-davo izy roa tonta. '
  '13':
  - type: text
    content: 'Ny teny izay nolazain''i Jehovah tamin''i Jeremia mpaminany ny amin''ny hihavian''i Nebokadnezara, mpanjakan''i Babylona, hamely ny tany Egypta. '
  '14':
  - type: text
    content: 'Ambaraonareo any Egypta, ary torio any Migdola, eny, torio any Memfisa sy Tapanesa, ka ataovy hoe: Mijoroa tsara ianao, ka miomàna; Fa mandringana manodidina anao ny sabatra. '
  '15':
  - type: text
    content: 'Nahoana no voapaoka ny maherinao? Tsy nahafahatra izy, satria Jehovah no nandroaka azy. '
  '16':
  - type: text
    content: 'Efa nahatafintohina ny maro Izy, ka lavo mifanindry ireo; Dia hoy ireo: Mitsangàna, ka andeha isika hiverina ho any amin''ny firenentsika sy ho any amin''ny tany nahaterahantsika ho afaka amin''ny sabatra mandoza, '
  '17':
  - type: text
    content: 'Nitaraina tany izy hoe: Tabataba foana Farao, mpanjakan''i Egypta, efa nandiso ny fotoana izy. '
  '18':
  - type: text
    content: 'Raha velona koa Aho, hoy ny Mpanjaka, Jehovah, Tompon''ny maro, no anarany: Tahaka an''i Tabara amin''ny tendrombohitra, sy tahaka an''i Karmela ao amoron-dranomasina, dia ho tahaka izany no hihaviany. '
  '19':
  - type: text
    content: 'Ry Egypta zanakavavy mponina, Mifeheza entana ho entinao any amin''ny fahababoana; Fa ho tonga tany lao Memfisa, eny, hodorana izy, ka tsy hisy mponina. '
  '2':
  - type: text
    content: 'Ny amin''i Egypta. Ny amin''ny miaramilan''i Farao-neko, mpanjakan''i Egypta, izay teny amoron''ny ony Eofrata, tany Karkemisy, dia ilay resin''i Nebokadnezara, mpanjakan''i Babylona, tamin''ny taona fahefatra nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda:'
  '20':
  - type: text
    content: 'Egypta dia tahaka ny ombivavy kely tsara tarehy dia tsara tarehy; Fa injay! tamy, eny, tamy ny fihitra avy any avaratra! '
  '21':
  - type: text
    content: 'Na dia ny olona karamaina ao aminy aza, izay tahaka ny ombilahy kely mifahy, ireny koa dia mihodina ka samy mandositra avokoa; Tsy mahajanona izy, fa efa tonga aminy ny andro hahitany loza, dia ny andro hamaliana azy. '
  '22':
  - type: text
    content: 'Ny feony dia toy ny fikasaotsaoky ny menarana mandeha; Fa mandeha hitondra miaramila izy ka avy hamely azy amin''ny famaky toy ny mpikapa hazo. '
  '23':
  - type: text
    content: 'Kapainy ny alany, hoy Jehovah, satria efa nikirindro loatra; Fa maro noho ny valala izy ka tsy tambo isaina. '
  '24':
  - type: text
    content: 'Ho afa-baraka Egypta zanakavavy, Hatolotra eo an-tànan''ny olona any avaratra izy. '
  '25':
  - type: text
    content: 'Ary hoy Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely; Indro, hovaliako Amona avy any Nô Ary Farao sy Egypta mbamin''ny andriamaniny sy ny mpanjakany, dia Farao sy izay rehetra matoky azy; '
  '26':
  - type: text
    content: Ary hatolotro eo an-tànan'izay mitady ny ainy izy, dia eo an-tànan'i Nebokadnezara, mpanjakan'i Babylona, sy eo an-tànan'ny mpanompony; Ary aorian'izany, dia handry fahizay
  - type: note
    content: 'Na: honenana indray'
  - type: text
    content: ' toy ny tamin''ny andro fahiny ihany izy, hoy Jehovah. '
  '27':
  - type: text
    content: 'Fa aza matahotra ianao, ry Jakoba mpanompoko, ary aza mivadi-po, ry Isiraely; Fa, indro, hovonjeko avy any amin''ny lavitra ianao, ary ny taranakao avy any amin''ny tany nahababo azy; Dia hiverina Jakoba ka hiadana, eny, handry fahizay izy, ka tsy hisy hanaitaitra azy. '
  '28':
  - type: text
    content: Aza matahotra ianao, ry Jakoba mpanompoko, hoy Jehovah, fa momba anao Aho; Fa na dia levoniko aza ny firenena rehetra izay nandroahako anao, ianao tsy mba holevoniko, nefa kosa mba hanariko araka ny antonony ihany ianao, fa tsy dia havelako fotsiny.
  '3':
  - type: text
    content: 'Mitaova amin''ny ampinga kely sy ny ampinga lehibe, ka mandrosoa hiady; '
  '4':
  - type: text
    content: 'Fehezo amin''ny kalesy ny soavaly, ary itaingeno ny soavaly fitaingina; Mijoroa tsara ianareo, ka samia misatroka fiarovan-doha; Fotsio ny lefona, miakanjoa ny akanjo fiarovan-tena. '
  '5':
  - type: text
    content: 'Indrisy ny ahitako azy! raiki-tahotra sy miamboho izy, ary ny maheriny aza dia efa ripaka, sady miezaka mandositra izy ka tsy miherika akory; Fa misy fampangorohoroana manodidina, hoy Jehovah. '
  '6':
  - type: text
    content: 'Tsy ho afa-mandositra ny haingan-tongotra, na ho afaka ny mahery; Any avaratra eo amoron''ny ony Eofrata no hahatafintohina sy hahalavo azy. '
  '7':
  - type: text
    content: 'Iza moa izato mizotra tahaka an''i Neily, ary ny onjany misamboaravoara toy ny renirano '
  '8':
  - type: text
    content: 'Egypta mizotra tahaka an''i Neily, ary ny onjany misamboaravoara toy ny renirano, ary hoy izy: Hizotra aho ka hanafotra ny tany; Haringako ny tanàna sy ny mponina ao aminy. '
  '9':
  - type: text
    content: Miakara, ianareo soavaly, ary miriota toy ny adala, ianareo kalesy; Ary aoka hivoaka ny lehilahy mahery, dia ny Etiopiana sy ny Libyana
  - type: note
    content: Heb. Pota
  - type: text
    content: ', izay mitana ampinga, ary ny Lydiana'
  - type: note
    content: Heb. Loda
  - type: text
    content: ', izay mitana sy manenjana tsipìka. '
