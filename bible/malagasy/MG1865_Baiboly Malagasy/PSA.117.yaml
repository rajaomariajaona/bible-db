document_id: PSA.117,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana izao firenena rehetra izao hidera an'i Jehovah
  - type: text
    content: 'Miderà an''i Jehovah ry firenena rehetra; Miderà Azy, ry olona rehetra. '
  '2':
  - type: text
    content: Fa lehibe ny famindram-pony amintsika; Ary mandrakizay ny fahamarinan'i Jehovah. Haleloia.
