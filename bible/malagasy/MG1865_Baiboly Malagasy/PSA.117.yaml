verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiantsoana izao firenena rehetra izao hidera an'i Jehovah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miderà an''i Jehovah ry firenena rehetra; Miderà Azy, ry olona rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa lehibe ny famindram-pony amintsika; Ary mandrakizay ny fahamarinan'i Jehovah. Haleloia.
