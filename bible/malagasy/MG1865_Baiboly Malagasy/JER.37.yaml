document_id: JER.37
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nangatahan'i Zedekia an'i Jeremia hivavaka ho azy, sy ny teny navalin'i Jeremia azy, ary ny nanaovana an'i Jeremia tao an-tranomaizina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Zedekia mpanjaka, zanak''i Josia, dia nanjaka nandimby an''i Jekonia, zanak''i Joiakima, fa nampanjakain''i Nebokadnezara, mpanjakan''i Babylona, tao amin''ny tanin''ny Joda izy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'nefa na izy, na ny mpanompony, na ny vahoaka, dia samy tsy nihaino ny tenin''i Jehovah, izay nampilazainy an''i Jeremia mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Zedekia mpanjaka naniraka an''i Jehokala, zanak''i Selemia, sy Zefania, zanak''i Mahaseia, mpisorona, ho any amin''i Jeremia mpaminany hanao hoe: Mba ivavaho amin''i Jehovah Andriamanitsika re izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Jeremia mbola niditra sy nivoaka teo amin''ny olona ihany; fa tsy mbola nataony tao an-trano-maizina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary efa niainga avy tany Egypta ny miaramilan''i Farao, ka raha nahare izany ny Kaldeana izay nanao fahirano an''i Jerosalema, dia niala tany Jerosalema izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia tonga tamin''i Jeremia mpaminany ny tenin''i Jehovah hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Izao no lazaonareo amin''ny mpanjakan''ny Joda, izay naniraka anareo hankatỳ amiko hanontany amiko: Indro, ny miaramilan''i Farao, izay efa niainga hamonjy anareo, dia hiverina ho any Egypta taniny; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa ho avy indray ny Kaldeana ka hamely ity tanana ity sady hanafaka azy sy handoro azy amin''ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain''i Jehovah: Aza mamita-tena foana ianareo ka manao hoe: Hiala amintsika tokoa ny Kaldeana; fa tsy hiala izy tsy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa na dia mamely ny miaramilan'ny Kaldeana rehetra izay miady aminareo aza ianareo, ka izay voalefona no ho sisa velona, ireo aza dia samy hitsangana avy ao anaty lainy ka handoro ity tanàna ity amin'ny afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha niala tany Jerosalema ny miaramilan''ny Kaldeana noho ny amin''ny miaramilan''i Farao, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia nivoaka Jeremia avy tao Jerosalema hankany amin''ny tanin''ny Benjamina mba handray izay anjarany eo amin''ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha tonga teo am-bavahadin''i Benjamina izy, dia, indro, ny kapitenin''ny mpiambina, atao hoe Jiria, zanak''i Selemia, zanak''i Hanania, no teo; dia nisambotra an''i Jeremia mpaminany izy ka nanao hoe: Miray tetika amin''ny Kaldeana ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy Jeremia: Lainga izany. Tsy miray tetika amin''ny Kaldeana aho. Nefa tsy nino azy ireo, ka dia nosamborin''i Jiria ihany Jeremia ary nentiny ho ao amin''ny mpanapaka. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tezitra tamin''i Jeremia ny mpanapaka ka nikapoka azy, dia nandatsaka azy tao an-trano-maizina tao amin''ny tranon''i Jonatana mpanoratra; fa izany no nataony trano-maizina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony tafiditra tao an-trano-maizina, tao amin''ilay niefitrefitra, Jeremia, ka efa nitoetra tao andro maro, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia naniraka haka azy Zedekia mpanjaka; ary ny mpanjaka nanontany azy mangingina tao an-tranony nanao hoe: Moa misy teny avy tamin''i Jehovah tokoa va? Dia hoy Jeremia: Eny, misy; ary hoy koa izy: Hatolotra eo an-tànan''ny mpanjakan''i Babylona ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy koa Jeremia tamin''i Zedekia mpanjaka: Inona no ratsy nataoko taminao, na tamin''ny mpanomponao, na tamin''ity firenena ity, no dia nataonareo tao an-trano-maizina aho? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aiza moa ireo mpaminaninareo, izay naminany taminareo hoe: Tsy ho avy hiady aminareo na hamely ity tany ity ny mpanjakan''i Babylona? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa trarantitra ianao, ry tompokolahy mpanjaka, henoy kely ange! aoka hoborahina eto anatrehanao ny fifonako, ka aza averina ho ao amin''ny tranon''i Jonatana mpanoratra aho, fandrao dia maty ao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia nasain'i Zedekia mpanjaka nataony teo amin'ny kianjan'ny trano fiambenana Jeremia, ka nasainy nomena mofo iray isan'andro isan'andro avy any amin'ny fitoeran'ny mpanao mofo izy, ambara-pahalanin'ny mofo rehetra tao an-tanàna. Toy izany no nitoeran'i Jeremia teo amin'ny kianjan'ny trano fiambenana.
