document_id: PSA.7,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana an'Andriamanitra, Mpitsara marina
  - type: text
    content: 'Sigaiona nataon''i Davida, izay nohirainy ho an''i Jehovah noho ny tenin''i Kosy Benjamita. Jehovah Andriamanitro ô, Hianao no ialofako; vonjeo aho amin''izay rehetra manenjika ahy, ka afaho; '
  '10':
  - type: text
    content: 'Ny ampingako dia ao amin''Andriamanitra, Mpamonjy ny mahitsy fo. '
  '11':
  - type: text
    content: 'Mpitsara marina Andriamanitra, eny Andriamanitra Izay tezitra isan''andro. '
  '12':
  - type: text
    content: Raha tsy ibebahana
  - type: note
    content: 'Na: iverenana'
  - type: text
    content: ' Izy, dia hanasa ny sabany; efa manenjana ny tsipìkany Izy ka manamboatra azy, '
  '13':
  - type: text
    content: 'Ary ireo dia kendreny amin''ny fiadiana mahafaty; ny zana-tsipìkany ataony mirehitra. '
  '14':
  - type: text
    content: Indro, efa marary hiteraka zava-poana ireo; eny, torontoronina fampahoriana izy ary mitera-doza
  - type: note
    content: 'Heb: lainga'
  - type: text
    content: '; '
  '15':
  - type: text
    content: 'Mihady lavaka izy ka manalalaka izany, dia latsaka ao anatin''ny longoa nataony ihany izy; '
  '16':
  - type: text
    content: Mitsingerina ho eo an-dohany ihany ny fampahoriany; ary eo an-tampon-dohany ihany no ianjeran'ny loza nataony.
  '17':
  - type: text
    content: Hidera an'i Jehovah araka ny fahamarinany aho, ary hankalaza ny anaran'i Jehovah Avo Indrindra.
  '2':
  - type: text
    content: Fandrao ny fanahiko viravirainy tahaka ny fanaon'ny liona, ary kepokepohiny, ka tsy misy mamonjy.
  '3':
  - type: text
    content: 'Jehovah Andriamanitro ô, raha nanao izany aho; raha misy heloka eto an-tanako; '
  '4':
  - type: text
    content: Raha namaly ratsy izay tsara fihavanana tamiko aho, novonjeko aza izay nampahory ahy tsy ahoan-tsy ahoana
  - type: note
    content: 'Na: Ka nandroba izay nampahory ahy tsy ahoan-tsy ahoana'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Dia aoka ny fahavalo hanenjika ny fanahiko ka hahatratra azy; eny, aoka izy hanitsaka ny aiko amin'ny tany, ary hampandry ny voninahitro amin'ny vovoka.
  '6':
  - type: text
    content: 'Jehovah ô, mitsangàna amin''ny fahatezeranao; misandrata hisakana ny fisafoaky ny mpampahory ahy; ary mifohaza hanampy ahy, fa didy marina no navoakanao; '
  '7':
  - type: text
    content: Aoka ny firenena maro hivory manodidina Anao; ary miverena ho any amin'ny avo eo amboniny Hianao,
  '8':
  - type: text
    content: 'Jehovah hitsara ny firenena; Jehovah ô, tsarao aho araka ny fahamarinako sy ny tsi-fananako tsiny. '
  '9':
  - type: text
    content: Aoka ho tapaka ny ratsy ataon'ny ratsy fanahy, fa ampitoero kosa ny marina; fa Andriamanitra marina no mamantatra ny fo sy ny voa.
