document_id: PSA.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana an'Andriamanitra, Mpitsara marina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sigaiona nataon''i Davida, izay nohirainy ho an''i Jehovah noho ny tenin''i Kosy Benjamita. Jehovah Andriamanitro ô, Hianao no ialofako; vonjeo aho amin''izay rehetra manenjika ahy, ka afaho; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fandrao ny fanahiko viravirainy tahaka ny fanaon'ny liona, ary kepokepohiny, ka tsy misy mamonjy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jehovah Andriamanitro ô, raha nanao izany aho; raha misy heloka eto an-tanako; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha namaly ratsy izay tsara fihavanana tamiko aho, novonjeko aza izay nampahory ahy tsy ahoan-tsy ahoana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ka nandroba izay nampahory ahy tsy ahoan-tsy ahoana'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia aoka ny fahavalo hanenjika ny fanahiko ka hahatratra azy; eny, aoka izy hanitsaka ny aiko amin'ny tany, ary hampandry ny voninahitro amin'ny vovoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jehovah ô, mitsangàna amin''ny fahatezeranao; misandrata hisakana ny fisafoaky ny mpampahory ahy; ary mifohaza hanampy ahy, fa didy marina no navoakanao; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka ny firenena maro hivory manodidina Anao; ary miverena ho any amin'ny avo eo amboniny Hianao,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jehovah hitsara ny firenena; Jehovah ô, tsarao aho araka ny fahamarinako sy ny tsi-fananako tsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka ho tapaka ny ratsy ataon'ny ratsy fanahy, fa ampitoero kosa ny marina; fa Andriamanitra marina no mamantatra ny fo sy ny voa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny ampingako dia ao amin''Andriamanitra, Mpamonjy ny mahitsy fo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mpitsara marina Andriamanitra, eny Andriamanitra Izay tezitra isan''andro. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha tsy ibebahana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: iverenana'
    marker-yv: yv-n
  - type: text
    text: ' Izy, dia hanasa ny sabany; efa manenjana ny tsipìkany Izy ka manamboatra azy, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ireo dia kendreny amin''ny fiadiana mahafaty; ny zana-tsipìkany ataony mirehitra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, efa marary hiteraka zava-poana ireo; eny, torontoronina fampahoriana izy ary mitera-doza
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: lainga'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mihady lavaka izy ka manalalaka izany, dia latsaka ao anatin''ny longoa nataony ihany izy; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mitsingerina ho eo an-dohany ihany ny fampahoriany; ary eo an-tampon-dohany ihany no ianjeran'ny loza nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hidera an'i Jehovah araka ny fahamarinany aho, ary hankalaza ny anaran'i Jehovah Avo Indrindra.
