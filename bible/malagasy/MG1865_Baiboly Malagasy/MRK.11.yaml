document_id: MRK.11
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary raha nanakaiky any Jerosalema tao Betifaga sy Betania any an-tendrombohitra Oliva izy, dia naniraka roa lahy tamin''ny mpianany Jesosy '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka nanao taminy hoe: Mankanesa amin''iroa vohitra tandrifinareo iroa; ary raha vao miditra eo ianareo, miaraka amin''izay dia hahita zana-boriky mifatotra, izay tsy mbola nitaingenan''olona; vahao izy, ka ento etỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha misy olona manao aminareo hoe: Ahoana no anaovanareo izao? dia lazao hoe: Misy raharaha analan''ny Tompo azy; dia havelany ho entina etỳ indray miaraka amin''izay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandeha izy ka nahita zana-boriky nifatotra teo ala-trano anilan''ny varavarana teo an-dalana, dia novahany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny olona sasany teo nanao taminy hoe: Ahoana no amahanareo ny zana-boriky? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izy nilaza taminy araka izay nolazain''i Jesosy taminy, dia navelan''ny olona handeha izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nentiny teo amin''i Jesosy ny zana-boriky, dia nataony teo amboniny ny lambany; ary Jesosy nitaingina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary maro no namelatra ny lambany teny an-dalana; ary ny sasany kosa nampihahaka rantsan-kazo izay efa nalainy tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izay nandeha teo alohany sy izay nanaraka teo aoriany dia samy niantso hoe: Hosana! Isaorana anie Izay avy amin''ny anaran''i Jehovah! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hotahina anie ny fanjakana izay avy, dia ny an''i Davida raintsika! Hosana any amin''ny avo indrindra (Sal. 118. 26). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Jesosy niditra tany Jerosalema ka nankeo an-kianjan''ny tempoly; ary rehefa nijerijery ny zavatra rehetra Izy, sady efa hariva ny andro tamin''izay, dia niala Izy mbamin''ny roa ambin''ny folo lahy ka nankany Betania. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nony ampitson''iny, rehefa niala tany Betania izy, dia noana Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nahatsinjo aviavy anankiray mandravina erỳ lavidavitra Izy, dia nankeo, fa toa hahita voany eo aminy; kanjo nony tonga teo aminy Izy, dia tsy nahita na inona na inona, afa-tsy ravina ihany; fa tsy mbola tonga ny taom-pamoazan''ny aviavy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Aza misy mihinana voa avy aminao intsony mandrakizay. Ary ny mpianany nahare izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tonga tany Jerosalema izy: ary Jesosy niditra teo an-kianjan''ny tempoly, dia nandroaka izay nivarotra sy izay nividy teo an-kianjan''ny tempoly sady nanjera ny latabatry ny mpanakalo vola sy ny fipetrahan''ny mpivarotra ny voromailala; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary tsy navelany hisy olona hitondra fanaka handeha hamaky ny kianjan''ny tempoly. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nampianatra Izy ka nanao taminy hoe: Tsy voasoratra hoe va: Ny tranoko hatao hoe trano fivavahana ho an''ny firenena rehetra? (Isa. 56. 7); fa ianareo kosa efa nanao azy ho zohy fieren''ny jiolahy (Jery. 7. 11). '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nahare izany ny lohan''ny mpisorona mbamin''ny mpanora-dalàna, ka dia nitady izay hamonoany Azy; saingy natahotra Azy izy, satria talanjona ny vahoaka rehetra noho ny fampianarany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary isan-kariva dia niala tao an-tanàna Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nony maraina, raha nandalo izy, dia hitany fa efa nalazo hatramin''ny fakany ilay aviavy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Petera nahatsiahy ka nanao taminy hoe: Raby ô, indro fa efa malazo ilay aviavy nozoninao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Manàna finoana an''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no hilaza amin''ity tendrombohitra ity hoe: Mifindrà, ka mianjerà any an-dranomasina, ka tsy hiahanahana ao am-pony, fa hino fa ho tonga ny zavatra lazainy, dia ho azony izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Koa lazaiko aminareo: Na inona na inona tononinareo amin''ny fivavahana sy angatahinareo, dia minoa fa efa nandray ianareo, dia ho azonareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary raha mitsangana mivavaka ianareo, ka misy olona anananareo alahelo, dia mamelà ny helony, mba havelan'ny Rainareo Izay any an-danitra kosa ny helokareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: (26) Fa raha ianareo tsy mamela heloka, ny Rainareo Izay any an-danitra kosa tsy hamela ny helokareo'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary tonga tany Jerosalema indray izy; ary raha nitsangantsangana teo an-kianjan''ny tempoly Jesosy, dia nanatona Azy ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ka nanao taminy hoe: Fahefana manao ahoana no anaovanao izao zavatra izao? Ary iza no nanome Anao izany fahefana izany hanaovanao izao zavatra izao? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Jesosy nanao taminy hoe: Hanontany anareo zavatra iray loha kosa Aho, ka valio Aho; ary dia holazaiko aminareo izay fahefana anaovako izao zavatra izao: '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny batisan''i Jaona avy tany an-danitra va, sa avy tamin''ny olona? Valio Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary izy ireo niara-nisaina ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hataony hoe: Nahoana ary no tsy nino azy ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa raha holazaintsika hoe kosa: Avy tamin''ny olona, natahotra ny olona izy, satria neken''ny olona rehetra fa mpaminany tokoa Jaona. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia namaly an''i Jesosy izy ka nanao hoe: Tsy fantatray. Ary Jesosy nanao taminy hoe: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
