document_id: MRK.11,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary raha nanakaiky any Jerosalema tao Betifaga sy Betania any an-tendrombohitra Oliva izy, dia naniraka roa lahy tamin''ny mpianany Jesosy '
  '10':
  - type: text
    content: 'Hotahina anie ny fanjakana izay avy, dia ny an''i Davida raintsika! Hosana any amin''ny avo indrindra (Sal. 118. 26). '
  '11':
  - type: text
    content: 'Ary Jesosy niditra tany Jerosalema ka nankeo an-kianjan''ny tempoly; ary rehefa nijerijery ny zavatra rehetra Izy, sady efa hariva ny andro tamin''izay, dia niala Izy mbamin''ny roa ambin''ny folo lahy ka nankany Betania. '
  '12':
  - type: text
    content: 'Ary nony ampitson''iny, rehefa niala tany Betania izy, dia noana Jesosy. '
  '13':
  - type: text
    content: 'Ary nahatsinjo aviavy anankiray mandravina erỳ lavidavitra Izy, dia nankeo, fa toa hahita voany eo aminy; kanjo nony tonga teo aminy Izy, dia tsy nahita na inona na inona, afa-tsy ravina ihany; fa tsy mbola tonga ny taom-pamoazan''ny aviavy. '
  '14':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Aza misy mihinana voa avy aminao intsony mandrakizay. Ary ny mpianany nahare izany.'
  '15':
  - type: text
    content: 'Ary tonga tany Jerosalema izy: ary Jesosy niditra teo an-kianjan''ny tempoly, dia nandroaka izay nivarotra sy izay nividy teo an-kianjan''ny tempoly sady nanjera ny latabatry ny mpanakalo vola sy ny fipetrahan''ny mpivarotra ny voromailala; '
  '16':
  - type: text
    content: 'ary tsy navelany hisy olona hitondra fanaka handeha hamaky ny kianjan''ny tempoly. '
  '17':
  - type: text
    content: 'Dia nampianatra Izy ka nanao taminy hoe: Tsy voasoratra hoe va: Ny tranoko hatao hoe trano fivavahana ho an''ny firenena rehetra? (Isa. 56. 7); fa ianareo kosa efa nanao azy ho zohy fieren''ny jiolahy (Jery. 7. 11). '
  '18':
  - type: text
    content: 'Ary nahare izany ny lohan''ny mpisorona mbamin''ny mpanora-dalàna, ka dia nitady izay hamonoany Azy; saingy natahotra Azy izy, satria talanjona ny vahoaka rehetra noho ny fampianarany. '
  '19':
  - type: text
    content: 'Ary isan-kariva dia niala tao an-tanàna Izy. '
  '2':
  - type: text
    content: 'ka nanao taminy hoe: Mankanesa amin''iroa vohitra tandrifinareo iroa; ary raha vao miditra eo ianareo, miaraka amin''izay dia hahita zana-boriky mifatotra, izay tsy mbola nitaingenan''olona; vahao izy, ka ento etỳ. '
  '20':
  - type: text
    content: 'Ary nony maraina, raha nandalo izy, dia hitany fa efa nalazo hatramin''ny fakany ilay aviavy. '
  '21':
  - type: text
    content: 'Ary Petera nahatsiahy ka nanao taminy hoe: Raby ô, indro fa efa malazo ilay aviavy nozoninao. '
  '22':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Manàna finoana an''Andriamanitra. '
  '23':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no hilaza amin''ity tendrombohitra ity hoe: Mifindrà, ka mianjerà any an-dranomasina, ka tsy hiahanahana ao am-pony, fa hino fa ho tonga ny zavatra lazainy, dia ho azony izany. '
  '24':
  - type: text
    content: 'Koa lazaiko aminareo: Na inona na inona tononinareo amin''ny fivavahana sy angatahinareo, dia minoa fa efa nandray ianareo, dia ho azonareo izany. '
  '25':
  - type: text
    content: Ary raha mitsangana mivavaka ianareo, ka misy olona anananareo alahelo, dia mamelà ny helony, mba havelan'ny Rainareo Izay any an-danitra kosa ny helokareo
  - type: note
    content: 'Ampio hoe: (26) Fa raha ianareo tsy mamela heloka, ny Rainareo Izay any an-danitra kosa tsy hamela ny helokareo'
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Ary tonga tany Jerosalema indray izy; ary raha nitsangantsangana teo an-kianjan''ny tempoly Jesosy, dia nanatona Azy ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona '
  '28':
  - type: text
    content: 'ka nanao taminy hoe: Fahefana manao ahoana no anaovanao izao zavatra izao? Ary iza no nanome Anao izany fahefana izany hanaovanao izao zavatra izao? '
  '29':
  - type: text
    content: 'Ary Jesosy nanao taminy hoe: Hanontany anareo zavatra iray loha kosa Aho, ka valio Aho; ary dia holazaiko aminareo izay fahefana anaovako izao zavatra izao: '
  '3':
  - type: text
    content: 'Ary raha misy olona manao aminareo hoe: Ahoana no anaovanareo izao? dia lazao hoe: Misy raharaha analan''ny Tompo azy; dia havelany ho entina etỳ indray miaraka amin''izay izy. '
  '30':
  - type: text
    content: 'Ny batisan''i Jaona avy tany an-danitra va, sa avy tamin''ny olona? Valio Aho. '
  '31':
  - type: text
    content: 'Ary izy ireo niara-nisaina ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hataony hoe: Nahoana ary no tsy nino azy ianareo? '
  '32':
  - type: text
    content: 'Fa raha holazaintsika hoe kosa: Avy tamin''ny olona, natahotra ny olona izy, satria neken''ny olona rehetra fa mpaminany tokoa Jaona. '
  '33':
  - type: text
    content: 'Dia namaly an''i Jesosy izy ka nanao hoe: Tsy fantatray. Ary Jesosy nanao taminy hoe: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao.'
  '4':
  - type: text
    content: 'Dia nandeha izy ka nahita zana-boriky nifatotra teo ala-trano anilan''ny varavarana teo an-dalana, dia novahany izy. '
  '5':
  - type: text
    content: 'Ary ny olona sasany teo nanao taminy hoe: Ahoana no amahanareo ny zana-boriky? '
  '6':
  - type: text
    content: 'Ary izy nilaza taminy araka izay nolazain''i Jesosy taminy, dia navelan''ny olona handeha izy. '
  '7':
  - type: text
    content: 'Ary nentiny teo amin''i Jesosy ny zana-boriky, dia nataony teo amboniny ny lambany; ary Jesosy nitaingina azy. '
  '8':
  - type: text
    content: 'Ary maro no namelatra ny lambany teny an-dalana; ary ny sasany kosa nampihahaka rantsan-kazo izay efa nalainy tany an-tsaha. '
  '9':
  - type: text
    content: 'Ary izay nandeha teo alohany sy izay nanaraka teo aoriany dia samy niantso hoe: Hosana! Isaorana anie Izay avy amin''ny anaran''i Jehovah! '
