document_id: LUK.3,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tamin''ny taona fahadimy ambin''ny folo nanjakan''i Tiberia Kaisara, fony Pontio Pilato no governora tany Jodia, ary Heroda no mpanapaka tany Galilia, ary Filipo rahalahiny no mpanapaka ny tany Itoria sy Trakonitisy, ary Lysania no mpanapaka tany Abilena, '
  '10':
  - type: text
    content: 'Ary ny vahoaka nanontany an''i Jaona hoe: inona ary no hataonay? '
  '11':
  - type: text
    content: 'Ary namaly izy ka nanao taminy hoe: Izay manana akanjo roa dia aoka hanome ho an''ny tsy manana; ary izay manan-kanina, dia aoka hanao toy izany koa izy. '
  '12':
  - type: text
    content: 'Dia avy koa ny mpamory hetra sasany mba hataony batisa ka nanao taminy hoe: Mpampianatra ô, inona no hataonay? '
  '13':
  - type: text
    content: 'Ary hoy izy taminy: Aza mampandoa mihoatra noho izay notendrena halainareo. '
  '14':
  - type: text
    content: 'Ary nisy miaramila koa nanontany azy ka nanao hoe: Ary inona kosa no mba hataonay? Dia hoy izy taminy: Aza mitohatoha foana amin''olona, ary aza miampanga lainga, ary mianina amin''ny karamanareo. '
  '15':
  - type: text
    content: 'Fa raha mbola niandry ny olona, ka samy nisaina an''i Jaona tam-pony, na izy no Kristy, na tsia, '
  '16':
  - type: text
    content: 'dia namaly Jaona ka nanao tamin''izy rehetra hoe: Izaho manao batisa anareo amin''ny rano, fa avy Izay mahery noho izaho, ka tsy miendrika hamaha ny fehin-kapany aza aho; Izy no hanao batisa anareo amin''ny Fanahy Masina sy ny afo; '
  '17':
  - type: text
    content: 'eny an-tànany ny fikororohany hanadiovany tsara ny no am-pamoloany ka hanangonany ny vary ho any amin''ny sompiny; fa ny akofa sy ny mololo hodorany amin''ny afo tsy azo vonoina. '
  '18':
  - type: text
    content: 'Ary fananarana maro hafa koa no notoriny tamin''ny olona. '
  '19':
  - type: text
    content: 'Fa Heroda mpanapaka, nony nanarin''i Jaona noho ny amin''i Herodiasy, vadin-drahalahiny, sy noho ny ratsy rehetra izay nataony, '
  '2':
  - type: text
    content: 'ary Anasy sy Kaiafa no mpisoronabe,- dia tonga tamin''i Jaona, zanak''i Zakaria, tany an-efitra ny tenin''Andriamanitra. '
  '20':
  - type: text
    content: 'dia nanidy an''i Jaona tao an-tranomaizina ho fanampin''izany rehetra izany koa. '
  '21':
  - type: text
    content: 'Ary rehefa natao batisa ny vahoaka rehetra, ary Jesosy koa efa natao batisa sy nivavaka, dia nisokatra ny lanitra; '
  '22':
  - type: text
    content: 'ary ny Fanahy Masina nidina teo amboniny, ka ny endriny dia tahaka ny voromailala; ary nisy feo avy tany an-danitra nanao hoe: Hianao no Zanako malalako; Hianao no sitrako.'
  '23':
  - type: text
    content: 'Ary tokony ho efa telo-polo taona Jesosy, raha vao nanomboka ny raharahany, ka natao ho zanak''i Josefa, izay zanak''i Hely, '
  '24':
  - type: text
    content: 'zanak''i Matata, zanak''i Levy, zanak''i Melky, zanak''i Janay, zanak''i Josefa, '
  '25':
  - type: text
    content: 'zanak''i Matitia, zanak''i Amosa, zanak''i Nahoma, zanak''i Esly, zanak''i Nagay, '
  '26':
  - type: text
    content: 'zanak''i Mata, zanak''i Matatia, zanak''i Semey, zanak''i Joseka, zanak''i Joda, '
  '27':
  - type: text
    content: zanak'i Joanana, zanak'i Resa, zanak'i Zerobabela, zanak'i Sealtiela
  - type: note
    content: Gr. Salatiela
  - type: text
    content: ', zanak''i Nery, '
  '28':
  - type: text
    content: 'zanak''i Melky, zanak''i Ady, zanak''i Kosama, zanak''i Elmadama, zanak''i Era, '
  '29':
  - type: text
    content: 'zanak''i Jesosy, zanak''i Eliezera, zanak''i Joreima, zanak''i Matata, zanak''i Levy, '
  '3':
  - type: text
    content: 'Ary nankany amin''ny tany rehetra any amoron''i Jordana izy nitory ny batisan''ny fibebahana ho famelan-keloka; '
  '30':
  - type: text
    content: 'zanak''i Simeona, zanak''i Joda, zanak''i Josefa, zanak''i Jonama, zanak''i Eliakima, '
  '31':
  - type: text
    content: 'zanak''i Melea, zanak''i Mena, zanak''i Matata, zanak''i Natana, zanak''i Davida, '
  '32':
  - type: text
    content: 'zanak''i Jese, zanak''i Obeda, zanak''i Boaza, zanak''i Salmona, zanak''i Nahasona, '
  '33':
  - type: text
    content: zanak'i Aminadaba, zanak'i Arny
  - type: note
    content: 'Na: (Arama)'
  - type: text
    content: ', zanak''i Hezrona, zanak''i Fareza, zanak''i Joda, '
  '34':
  - type: text
    content: 'zanak''i Jakoba, zanak''isaka, zanak''i Abrahama, zanak''i Tera, zanak''i Nahora, '
  '35':
  - type: text
    content: 'zanak''i Seroga, zanak''i Reo, zanak''i Palega, zanak''i Ebera, zanak''i Sela, '
  '36':
  - type: text
    content: 'zanak''i Kenana, zanak''i Arpaksada, zanak''i Sema, zanak''i Noa, zanak''i Lameka, '
  '37':
  - type: text
    content: 'zanak''i Metosela, zanak''i Enoka, zanak''i Jareda, zanak''i Mahalalila, zanak''i Kenana, '
  '38':
  - type: text
    content: zanak'i Enosa, zanak'i Seta, zanak'i Adama, zanak'Andriamanitra.
  '4':
  - type: text
    content: 'araka ny voasoratra ao amin''ny bokin''ny tenin''Isaia mpaminany hoe: Injany! misy feon''ny miantso mafy any an-efitra hoe: Amboary ny lalan''i Jehovah, Ataovy mahitsy ny lalan-kalehany. '
  '5':
  - type: text
    content: 'Ny lohasaha rehetra hototofana, Ary ny tendrombohitra sy ny havoana rehetra haetry, Ary ny meloka hahitsy, Ary ny lalana mikitoantoana hohamarinina; '
  '6':
  - type: text
    content: 'Ary ny nofo rehetra hahita ny famonjen''Andriamanitra (Isa. 40:3-5). '
  '7':
  - type: text
    content: 'Dia hoy izy tamin''ny vahoaka izay nankeo aminy mba hataony batisa: Ry taranaky ny menarana, iza no nanoro hevitra anareo handositra ny fahatezerana ho avy? '
  '8':
  - type: text
    content: 'Koa mamoaza voa miendrika ny fibebahana; ary aza manao anakampo hoe: Manana an''i Abrahama ho rainay izahay; fa lazaiko aminareo fa Andriamanitra mahay manangana zanaka ho an''i Abrahama avy amin''ireto vato ireto. '
  '9':
  - type: text
    content: 'Ary, indro, efa mipetraka ao amin''ny fototry ny hazo sahady ny famaky; koa ny hazo rehetra izay tsy mamoa voa tsara dia hokapohina ka hatsipy any anaty afo. '
