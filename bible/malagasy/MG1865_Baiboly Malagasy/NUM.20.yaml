document_id: NUM.20,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny nampitondrain'ny Isiraely tamin'ny mpanjakan'i Edoma
  - type: text
    content: 'Ary tamin''ny volana voalohany tonga tao an-efitra Zina ny Zanak''Isiraely, dia ny fiangonana rehetra; ary nitoetra tao Kadesy ny olona. Ary maty tao Miriama ka nalevina tao. '
  '10':
  - type: text
    content: 'Dia novorin''i Mosesy sy Arona teo anoloan''ny vatolampy ny fiangonana; ka dia hoy izy: Mihainoa, ry mpiodina: Moa amin''ity vatolampy ity va no hampivoahanay rano ho anareo? '
  '11':
  - type: text
    content: 'Ary Mosesy dia nanainga ny tànany ka nikapoka ny vatolampy indroa tamin''ny tehiny; dia niboiboika be dia be ny rano, ka nisotro avokoa ny fiangonana sy ny biby fiompiny. '
  '12':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy sy Arona hoe: Satria tsy nino Ahy ianareo hanamasina Ahy eo imason''ny Zanak''Isiraely, dia tsy hitondra izao fiangonana izao ho any amin''ny tany izay nomeko azy ianareo. '
  '13':
  - type: text
    content: Ity no ranon'i Meriba, izay nilan'ny Zanak'Isiraely ady tamin'i Jehovah, ka nisehoan'i Jehovah ho masina tamin'ny nataony taminy.
  '14':
  - type: text
    content: 'Ary Mosesy dia naniraka olona avy tao Kadesy hankany amin''ny mpanjakan''i Edoma hanao hoe: Izao no lazain''i Isiraely rahalahinao: Hianao mahalala ny fahoriana rehetra izay nanjo anay: '
  '15':
  - type: text
    content: 'dia ny nidinan''ny razanay tany Egypta, sy ny nitoeranay ela tany; ary nampahory anay sy ny razanay ny Egyptiana; '
  '16':
  - type: text
    content: 'ary raha nitaraina tamin''i Jehovah izahay, dia nihaino ny feonay Izy ka naniraka Anjely sy nitondra anay nivoaka avy tany Egypta; ary, indreto, tonga eto Kadesy, tanàna eto amin''ny faritry ny taninao, izahay; '
  '17':
  - type: text
    content: 'koa aoka mba handeha hamaky ny taninao izahay; fa tsy handeha hamaky ny saha sy ny tanim-boaloboka, na hisotro ny rano amin''ny lavaka fantsakana akory: ny lalan''andriana ihany no halehanay, fa tsy hania izahay na ho amin''ny ankavanana na ho amin''ny ankavia mandra-pahafakay ny faritry ny taninao. '
  '18':
  - type: text
    content: 'Fa hoy ny Edomita taminy: Tsy mahazo mandeha mamaky ny taniko ianao, fandrao hivoaka hamely anao amin''ny sabatra aho. '
  '19':
  - type: text
    content: 'Dia hoy ny Zanak''Isiraely taminy: Ny lalam-be ihany no halehanay, fa raha hisotro ny ranonao izaho sy ny omby aman''ondriko, dia hefaiko vola izany; fa tsy hanao na inona na inona aho, fa handalo fotsiny ihany. '
  '2':
  - type: text
    content: 'Ary tsy nisy rano ho an''ny fiangonana, ka dia niangona izy hiodina amin''i Mosesy sy Arona. '
  '20':
  - type: text
    content: 'Fa hoy izy: Tsy mahazo mandalo atỳ ianao. Ary nivoaka hisakana azy ny Edomita nitondra vahoaka betsaka sady nanao tàna-mahery. '
  '21':
  - type: text
    content: Toy izany no nandavan'ny Edomita ka tsy namela ny Isiraely hamaky ny taniny, ka dia nivily niala taminy ny Zanak'Isiraely.
  '22':
  - type: text
    content: 'Ary nifindra ny Zanak''Isiraely, dia ny fiangonana rehetra, ka niala tany Kadesy ary tonga tao an-tendrombohitra Hora. '
  '23':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy sy Arona tao an-tendrombohitra Hora, tao amin''ny fari-tanin''i Edoma, ka nanao hoe: '
  '24':
  - type: text
    content: 'Arona hangonina any amin''ny razany; fa tsy hiditra any amin''ny tany izay nomeko ny Zanak''Isiraely izy, satria nandà ny teniko teo amin''ny ranon''i Meriba ianareo. '
  '25':
  - type: text
    content: 'Alao Arona sy Eleazara zanany, ka ento miakatra ao an-tendrombohitra Hora izy mianaka; '
  '26':
  - type: text
    content: 'dia esory ny fitafian''i Arona, ka atafio an''i Eleazara zanany; ary Arona hangonina any amin''ny razany ka ho faty ao. '
  '27':
  - type: text
    content: 'Ary Mosesy nanao araka izay nandidian''i Jehovah; dia niakatra tao an-tendrombohitra Hora teo imason''ny fiangonana rehetra izy telo mianaka. '
  '28':
  - type: text
    content: 'Dia nesorin''i Mosesy ny fitafian''i Arona ka natafiny an''i Eleazara zanany; ary maty tao an-tampon''ny tendrombohitra Arona; dia nidina avy tao an-tendrombohitra Mosesy sy Eleazara. '
  '29':
  - type: text
    content: Koa nony hitan'ny fiangonana rehetra fa maty Arona, dia nisaona azy telo-polo andro izy, dia ny taranak'Isiraely rehetra.
  '3':
  - type: text
    content: 'Dia nila ady tamin''i Mosesy ny olona ka niteny hoe: Inay anie izahay mba maty tamin''ny nahafatesan''ny rahalahinay teo anatrehan''i Jehovah! '
  '4':
  - type: text
    content: 'Fa nahoana no nitondra ny fiangonan''i Jehovah ho amin''ity efitra ity ianareo, mba hahafaty anay sy ny ombinay eto? '
  '5':
  - type: text
    content: 'Ary nahoana no nitondra anay niakatra avy tany Egypta ianareo, hampiditra anay ho amin''ity tany ratsy ity, izay tsy misy voan-javatra, na aviavy, na voaloboka, na ampongaben-danitra akory, sady tsy misy rano hosotroina? '
  '6':
  - type: text
    content: Dia niala teo anatrehan'ny fiangonana Mosesy sy Arona ho eo anoloan'ny varavaran'ny trano-lay fihaonana ka niankohoka; dia niseho taminy ny voninahitr'i Jehovah.
  '7':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '8':
  - type: text
    content: 'Alao ny tehina, ka vorionao sy Arona rahalahinao ny fiangonana, ary mitenena amin''ny vatolampy eo imasony, dia hampiboiboika ny ranony izy; ary hampivoaka rano ho an''ny olona avy amin''ny vatolampy ianao, ka dia hampisotroinao ny fiangonana sy ny biby fiompiny. '
  '9':
  - type: text
    content: 'Dia nalain''i Mosesy ny tehina avy teo anatrehan''i Jehovah, araka izay nandidiany azy. '
