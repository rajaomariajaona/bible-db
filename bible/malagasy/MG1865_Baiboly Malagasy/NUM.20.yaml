document_id: NUM.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny nampitondrain'ny Isiraely tamin'ny mpanjakan'i Edoma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny volana voalohany tonga tao an-efitra Zina ny Zanak''Isiraely, dia ny fiangonana rehetra; ary nitoetra tao Kadesy ny olona. Ary maty tao Miriama ka nalevina tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tsy nisy rano ho an''ny fiangonana, ka dia niangona izy hiodina amin''i Mosesy sy Arona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nila ady tamin''i Mosesy ny olona ka niteny hoe: Inay anie izahay mba maty tamin''ny nahafatesan''ny rahalahinay teo anatrehan''i Jehovah! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa nahoana no nitondra ny fiangonan''i Jehovah ho amin''ity efitra ity ianareo, mba hahafaty anay sy ny ombinay eto? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nahoana no nitondra anay niakatra avy tany Egypta ianareo, hampiditra anay ho amin''ity tany ratsy ity, izay tsy misy voan-javatra, na aviavy, na voaloboka, na ampongaben-danitra akory, sady tsy misy rano hosotroina? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia niala teo anatrehan'ny fiangonana Mosesy sy Arona ho eo anoloan'ny varavaran'ny trano-lay fihaonana ka niankohoka; dia niseho taminy ny voninahitr'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alao ny tehina, ka vorionao sy Arona rahalahinao ny fiangonana, ary mitenena amin''ny vatolampy eo imasony, dia hampiboiboika ny ranony izy; ary hampivoaka rano ho an''ny olona avy amin''ny vatolampy ianao, ka dia hampisotroinao ny fiangonana sy ny biby fiompiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nalain''i Mosesy ny tehina avy teo anatrehan''i Jehovah, araka izay nandidiany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia novorin''i Mosesy sy Arona teo anoloan''ny vatolampy ny fiangonana; ka dia hoy izy: Mihainoa, ry mpiodina: Moa amin''ity vatolampy ity va no hampivoahanay rano ho anareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Mosesy dia nanainga ny tànany ka nikapoka ny vatolampy indroa tamin''ny tehiny; dia niboiboika be dia be ny rano, ka nisotro avokoa ny fiangonana sy ny biby fiompiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona hoe: Satria tsy nino Ahy ianareo hanamasina Ahy eo imason''ny Zanak''Isiraely, dia tsy hitondra izao fiangonana izao ho any amin''ny tany izay nomeko azy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ity no ranon'i Meriba, izay nilan'ny Zanak'Isiraely ady tamin'i Jehovah, ka nisehoan'i Jehovah ho masina tamin'ny nataony taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Mosesy dia naniraka olona avy tao Kadesy hankany amin''ny mpanjakan''i Edoma hanao hoe: Izao no lazain''i Isiraely rahalahinao: Hianao mahalala ny fahoriana rehetra izay nanjo anay: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia ny nidinan''ny razanay tany Egypta, sy ny nitoeranay ela tany; ary nampahory anay sy ny razanay ny Egyptiana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary raha nitaraina tamin''i Jehovah izahay, dia nihaino ny feonay Izy ka naniraka Anjely sy nitondra anay nivoaka avy tany Egypta; ary, indreto, tonga eto Kadesy, tanàna eto amin''ny faritry ny taninao, izahay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'koa aoka mba handeha hamaky ny taninao izahay; fa tsy handeha hamaky ny saha sy ny tanim-boaloboka, na hisotro ny rano amin''ny lavaka fantsakana akory: ny lalan''andriana ihany no halehanay, fa tsy hania izahay na ho amin''ny ankavanana na ho amin''ny ankavia mandra-pahafakay ny faritry ny taninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy ny Edomita taminy: Tsy mahazo mandeha mamaky ny taniko ianao, fandrao hivoaka hamely anao amin''ny sabatra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy ny Zanak''Isiraely taminy: Ny lalam-be ihany no halehanay, fa raha hisotro ny ranonao izaho sy ny omby aman''ondriko, dia hefaiko vola izany; fa tsy hanao na inona na inona aho, fa handalo fotsiny ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy izy: Tsy mahazo mandalo atỳ ianao. Ary nivoaka hisakana azy ny Edomita nitondra vahoaka betsaka sady nanao tàna-mahery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Toy izany no nandavan'ny Edomita ka tsy namela ny Isiraely hamaky ny taniny, ka dia nivily niala taminy ny Zanak'Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nifindra ny Zanak''Isiraely, dia ny fiangonana rehetra, ka niala tany Kadesy ary tonga tao an-tendrombohitra Hora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona tao an-tendrombohitra Hora, tao amin''ny fari-tanin''i Edoma, ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Arona hangonina any amin''ny razany; fa tsy hiditra any amin''ny tany izay nomeko ny Zanak''Isiraely izy, satria nandà ny teniko teo amin''ny ranon''i Meriba ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alao Arona sy Eleazara zanany, ka ento miakatra ao an-tendrombohitra Hora izy mianaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia esory ny fitafian''i Arona, ka atafio an''i Eleazara zanany; ary Arona hangonina any amin''ny razany ka ho faty ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Mosesy nanao araka izay nandidian''i Jehovah; dia niakatra tao an-tendrombohitra Hora teo imason''ny fiangonana rehetra izy telo mianaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nesorin''i Mosesy ny fitafian''i Arona ka natafiny an''i Eleazara zanany; ary maty tao an-tampon''ny tendrombohitra Arona; dia nidina avy tao an-tendrombohitra Mosesy sy Eleazara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Koa nony hitan'ny fiangonana rehetra fa maty Arona, dia nisaona azy telo-polo andro izy, dia ny taranak'Isiraely rehetra.
