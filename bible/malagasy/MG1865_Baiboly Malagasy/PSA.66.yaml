document_id: PSA.66
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana izao rehetra izao hisaotra an'Andriamanitra noho ny nataony ho an'ny mpanompony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Tonon-kira. Salamo. Mihobia ho an''Andriamanitra, ry tany rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mankalazà ny voninahitry ny anarany; omeo voninahitra Izy ho fiderana Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lazao amin''Andriamanitra hoe: endrey, mahatahotra ny asanao! ny fahalehibiazan''ny herinao no hikoizan''ny fahavalonao Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny tany rehetra hiankohoka eo anatrehanao ka hankalaza Anao; eny, hankalaza ny anaranao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avia, ka jereo ny asan''Andriamanitra, mahatahotra ny zavatra ataony amin''ny zanak''olombelona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa nampody ny ranomasina ho tany maina Izy; nandeha an-tongotra nita ny ony ny olona; tao no nifaliantsika tamin
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ao no aoka hifaliantsika amin'''
    marker-yv: yv-n
  - type: text
    text: '''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Manjaka mandrakizay amin'ny heriny Izy, ary ny masony mandinika ny firenen-tsamy hafa; aoka tsy hanandra-tena ny maditra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Misaora an''Andriamanitsika, ry firenena; ary asandrato ny feo fiderana Azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay mampitoetra ny fanahintsika amin''ny fiainana ka tsy mamela ny tongotsika hangozohozo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa efa nizaha toetra anay Hianao, Andriamanitra ô; efa nanadio anay Hianao, tahaka ny fanadio volafotsy amin''ny memy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Efa nampiditra anay tamin''ny fandrika Hianao; efa nanisy enta-mavesatra teo am-balahanay Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Efa nampandeha ny olona hanitsaka ny lohanay Hianao; nandeha namaky ny afo sy ny rano izahay; fa nitondra anay nivoaka ho amin'ny fitahiana mahatretrika Hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hiditra ao an-tranonao mitondra fanatitra dorana aho; hefaiko aminao ny voadiko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izay notononin''ny molotro sy naloaky ny vavako, fony aho azom-pahoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hateriko aminao ho fanatitra dorana ny matavy mbamin'ny setroky ny ondrilahy; hanatitra omby sy osilahy aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Avia, mihainoa ianareo rehetra izay matahotra an''Andriamanitra, fa holazaiko izay nataony ho an''ny fanahiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izy no nantsoin''ny vavako; ary ny fanandratana Azy no teo ambanin''ny lelako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha nankasitraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: nijery'
    marker-yv: yv-n
  - type: text
    text: ' ota tao am-poko aho, dia tsy mba hihaino ny Tompo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa efa nihaino tokoa Andriamanitra; efa nihaino ny feon''ny fivavako Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Isorana anie Andriamanitra, izay tsy nandà ny fivavako, na nanaisotra ny famindram-pony tamiko.
