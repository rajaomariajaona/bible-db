document_id: PSA.66,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana izao rehetra izao hisaotra an'Andriamanitra noho ny nataony ho an'ny mpanompony
  - type: text
    content: 'Ho an''ny mpiventy hira. Tonon-kira. Salamo. Mihobia ho an''Andriamanitra, ry tany rehetra; '
  '10':
  - type: text
    content: 'Fa efa nizaha toetra anay Hianao, Andriamanitra ô; efa nanadio anay Hianao, tahaka ny fanadio volafotsy amin''ny memy. '
  '11':
  - type: text
    content: 'Efa nampiditra anay tamin''ny fandrika Hianao; efa nanisy enta-mavesatra teo am-balahanay Hianao. '
  '12':
  - type: text
    content: Efa nampandeha ny olona hanitsaka ny lohanay Hianao; nandeha namaky ny afo sy ny rano izahay; fa nitondra anay nivoaka ho amin'ny fitahiana mahatretrika Hianao.
  '13':
  - type: text
    content: 'Hiditra ao an-tranonao mitondra fanatitra dorana aho; hefaiko aminao ny voadiko, '
  '14':
  - type: text
    content: 'Izay notononin''ny molotro sy naloaky ny vavako, fony aho azom-pahoriana. '
  '15':
  - type: text
    content: Hateriko aminao ho fanatitra dorana ny matavy mbamin'ny setroky ny ondrilahy; hanatitra omby sy osilahy aho.
  '16':
  - type: text
    content: 'Avia, mihainoa ianareo rehetra izay matahotra an''Andriamanitra, fa holazaiko izay nataony ho an''ny fanahiko. '
  '17':
  - type: text
    content: 'Izy no nantsoin''ny vavako; ary ny fanandratana Azy no teo ambanin''ny lelako. '
  '18':
  - type: text
    content: Raha nankasitraka
  - type: note
    content: 'Heb: nijery'
  - type: text
    content: ' ota tao am-poko aho, dia tsy mba hihaino ny Tompo; '
  '19':
  - type: text
    content: 'Kanefa efa nihaino tokoa Andriamanitra; efa nihaino ny feon''ny fivavako Izy. '
  '2':
  - type: text
    content: 'Mankalazà ny voninahitry ny anarany; omeo voninahitra Izy ho fiderana Azy. '
  '20':
  - type: text
    content: Isorana anie Andriamanitra, izay tsy nandà ny fivavako, na nanaisotra ny famindram-pony tamiko.
  '3':
  - type: text
    content: 'Lazao amin''Andriamanitra hoe: endrey, mahatahotra ny asanao! ny fahalehibiazan''ny herinao no hikoizan''ny fahavalonao Anao. '
  '4':
  - type: text
    content: 'Ny tany rehetra hiankohoka eo anatrehanao ka hankalaza Anao; eny, hankalaza ny anaranao izy. '
  '5':
  - type: text
    content: 'Avia, ka jereo ny asan''Andriamanitra, mahatahotra ny zavatra ataony amin''ny zanak''olombelona. '
  '6':
  - type: text
    content: Efa nampody ny ranomasina ho tany maina Izy; nandeha an-tongotra nita ny ony ny olona; tao no nifaliantsika tamin
  - type: note
    content: 'Na: Ao no aoka hifaliantsika amin'''
  - type: text
    content: '''Andriamanitra. '
  '7':
  - type: text
    content: Manjaka mandrakizay amin'ny heriny Izy, ary ny masony mandinika ny firenen-tsamy hafa; aoka tsy hanandra-tena ny maditra.
  '8':
  - type: text
    content: 'Misaora an''Andriamanitsika, ry firenena; ary asandrato ny feo fiderana Azy, '
  '9':
  - type: text
    content: 'Izay mampitoetra ny fanahintsika amin''ny fiainana ka tsy mamela ny tongotsika hangozohozo. '
