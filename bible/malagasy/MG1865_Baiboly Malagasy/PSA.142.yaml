document_id: PSA.142
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka ataon'izay foin'ny sakaizany sady enjehin'ny fahavalony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Maskila nataon''i Davida tamin''izy tao anaty lavaka. Fivavahana. Ny feoko no itarainako amin''i Jehovah; Ny feoko no ifonako amin''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Loarako eo anatrehany ny fitarainako; Ambarako eo anatrehany ny fahoriako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha reraka ato anatiko ny fanahiko, dia fantatro ny alehako; Eo amin''ny lalana izorako No nanafenany fandrika hamandrihany ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jereo eo an-kavanana, ka izahao, Fa tsy misy olona mahalala ahy; Foana avokoa ny fiarovana ahy; Tsy misy miahy ny fanahiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mitaraina aminao aho, Jehovah ô; Hoy izaho: Hianao no aroko Sy anjarako eo amin''ny tanin''ny velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Henoy ny fitarainako, Fa reraka indrindra aho; Vonjeo aho amin''ny mpanenjika ahy, Fa tsy leoko ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avoahy hiala amin'ny tranomaizina ny fanahiko, Mba hiderako ny anaranao; Hanodidina ahy ny marina, Satria manisy soa ahy Hianao.
