document_id: PSA.142,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ataon'izay foin'ny sakaizany sady enjehin'ny fahavalony
  - type: text
    content: 'Maskila nataon''i Davida tamin''izy tao anaty lavaka. Fivavahana. Ny feoko no itarainako amin''i Jehovah; Ny feoko no ifonako amin''i Jehovah. '
  '2':
  - type: text
    content: Loarako eo anatrehany ny fitarainako; Ambarako eo anatrehany ny fahoriako.
  '3':
  - type: text
    content: 'Raha reraka ato anatiko ny fanahiko, dia fantatro ny alehako; Eo amin''ny lalana izorako No nanafenany fandrika hamandrihany ahy. '
  '4':
  - type: text
    content: 'Jereo eo an-kavanana, ka izahao, Fa tsy misy olona mahalala ahy; Foana avokoa ny fiarovana ahy; Tsy misy miahy ny fanahiko. '
  '5':
  - type: text
    content: 'Mitaraina aminao aho, Jehovah ô; Hoy izaho: Hianao no aroko Sy anjarako eo amin''ny tanin''ny velona. '
  '6':
  - type: text
    content: 'Henoy ny fitarainako, Fa reraka indrindra aho; Vonjeo aho amin''ny mpanenjika ahy, Fa tsy leoko ireny. '
  '7':
  - type: text
    content: Avoahy hiala amin'ny tranomaizina ny fanahiko, Mba hiderako ny anaranao; Hanodidina ahy ny marina, Satria manisy soa ahy Hianao.
