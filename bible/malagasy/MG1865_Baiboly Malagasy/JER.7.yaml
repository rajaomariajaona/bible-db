document_id: JER.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana ny olona izay niankina foana tamin'ny tempoly sy ny fombam-pivavahana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nefa mbola avy miseho ao anatrehako amin''ity trano izay efa niantsoana ny anarako ity ihany ianareo ka manao hoe: Efa voavonjy izahay mba hanaovana ireto fahavetavetana rehetra ireto! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Moa ataonareo ho zohy fieren''ny jiolahy va ity trano izay efa niantsoana ny anarako ity? Indro, ny tenako aza dia mahita izany, hoy Jehovah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa mandehana ianareo any amin''ny fitoerako izay ao Silo, dia ilay nasiako ny anarako any am-boalohany, ka jereo izay nataoko taminy noho ny haratsian''ny Isiraely oloko. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa ankehitriny, hoy Jehovah, satria nanao izany zavatra rehetra izany ianareo, ary niteny taminareo Aho, eny, nifoha maraina koa ka niteny taminareo, nefa tsy nohenoinareo, ary niantso anareo Aho, nefa tsy novalianareo, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Koa dia ho toy ny nataoko tamin''i Silo no hataoko amin''ny trano izay efa niantsoana ny anarako sady itokianareo, sy amin''ny fitoerana izay nomeko anareo sy ny razanareo; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hesoriko hiala eto anatrehako ianareo toy ny nanesorako ny rahalahinareo rehetra, dia ny taranak''i Efraima rehetra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa aza mivavaka ho an''ity firenena ity ianao, ary aza manandratra fitarainana sy fivavahana ho azy na mifona amiko; Fa tsy hihaino anao Aho. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tsy hitanao va ny ataon''ireo any an-tanànan''ny Joda sy any an-dalamben''i Jerosalema? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny zaza manangon-kitay, ny ray mandrehitra afo, ary ny vehivavy mametafeta ny koba hatao mofo ho an''ny mpanjakavavin''ny lanitra sy hanidinana fanatitra aidina ho an''ny andriamani-kafa mba hampahasosotra Ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Moa Izaho va no ampahasosorin''ireo, hoy Jehovah, fa tsy ny tenany ihany mba ho fangaihainy? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitsangana eo am-bavahadin''ny tranon''i Jehovah, ary torio eo izao teny izao, ka ataovy hoe: Mihainoa ny tenin''i Jehovah ianareo, ry Joda rehetra, izay miditra amin''ireto vavahady ireto mba hiankohoka eo anatrehan''i Jehovah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Indro, ny fahatezerako sy ny fahavinirako haidina amin''ity tany ity, dia amin''ny olona sy ny biby fiompy sy ny hazo any an-tsaha ary ny vokatry ny tany; Dia hirehitra izany ka tsy hovonoina.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Aoka ny fanatitra dorana ho naman''ny fanatitrareo hafa alatsa-drà, ka mihinàna hena. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa tsy ny amin''ny fanatitra dorana sy ny fanatitra hafa no nitenenako tamin''ny razanareo na nandidiako azy tamin''ny andro nitondrako azy nivoaka avy tany amin''ny tany Egypta; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa izao kosa no nandidiako azy: Henoy ny feoko. Dia ho Andriamanitrareo Aho, ary ianareo ho oloko ka handeha amin''ny lalana rehetra nandidiako anareo, mba hahitanareo soa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Kanjo tsy nihaino izy na nanongilana ny sofiny, fa nandeha tamin''ny fisainany sy ny ditry ny fo ratsiny ihany izy dia niamboho, fa tsy mba nanatrika. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hatramin''ny andro nivoahan''ny razanareo avy tany amin''ny tany Egypta ka ambaraka androany dia nirahiko ho any aminareo ihany ny mpaminany mpanompoko rehetra, eny, nifoha maraina koa isan''andro Aho ka naniraka azy mandrakariva. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nefa tsy nihaino Ahy izy ireo sady tsy nanongilana ny sofiny, fa nanamafy ny hatony ka nanao ratsy mihoatra noho ny razany aza. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary na dia holazainao aminy aza ireo teny rehetra ireo, dia tsy hihaino anao izy; Ary na dia antsoinao aza izy, dia tsy hamaly anao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Koa lazao aminy hoe: Ity no firenena tsy mihaino feon''i Jehovah Andriamaniny sady tsy mino anatra; Very ny fahamarinana, fa afaka tamin''ny vavany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Hetezo ny volonao, ry Jerosalema, ka ario, ary manaova hira fahalahelovana any an-tendrombohitra mangadihady, satria lavin''i Jehovah sy afoiny ny taranaka mahatezitra Azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Ataovy tsara ny lalanareo sy ny ataonareo, dia hamponeniko amin''ity tany ity ianareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa manao izay ratsy eo imasoko ny taranak''i Joda, hoy Jehovah, mametraka ny fahavetavetany ao amin''ny trano izay efa niantsoana ny anarako izy mba handoto azy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary izy nanorina ireo fitoerana avo any Tofeta, izay ao amin''ny lohasahan''ny taranak''i Hinema, handoroany ny zananilahy sy ny zananivavy amin''ny afo; Nefa zavatra tsy mba nandidiako na tao an-tsaiko akory aza izany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Koa, indro, avy ny andro, hoy Jehovah, izay tsy hanaovana azy intsony hoe Tofeta, na Lohasahan''ny taranak''i Hinoma, fa Lohasaha Famonoana kosa. Ary any Tofeta aza no handevenana noho ny hateren''ny tany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary ny fatin''ity firenena ity dia ho fihinan''ny voro-manidina sy ny bibidia, ka tsy hisy hanaitaitra azy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Dia hatsahatro any an-tanànan'ny Joda sy eny an-dalamben'i Jerosalema ny feo mifaly sy ny feo miravoravo, dia ny feon'ny mpampakatra sy ny feon'ny ampakarina; Fa ho lao ny tany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aza matoky ny teny lainga hoe: Tempolin''i Jehovah, tempolin''i Jehovah, Tempolin''i Jehovah ity. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa raha ataonareo tsara mihitsy ny lalanareo sy ny ataonareo, ka mitsara marina ny adin''olona amin''ny namany ianareo, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary tsy mampahory ny vahiny sy ny kamboty sy ny mpitondratena, na mandatsaka rà marina amin''ity tany ity, sady tsy manaraka andriamani-kafa hahatonga loza aminareo, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hamponeniko amin''ity tany ity ihany ianareo, dia eto amin''ny tany nomeko ny razanareo, hatramin''ny ela ka ho mandrakizay. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He! ianareo matoky ny teny lainga, nefa tsy mahasoa tsinona izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hay! hangalatra sy hamono olona sy hijangajanga va ianareo ary hianian-tsy tò sy handoro ditin-kazo manitra ho an''i Bala sady hanaraka andriamani-kafa izay tsy fantatrareo? '
