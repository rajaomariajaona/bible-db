document_id: PRO.22,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ohabolana ny amin'ny fahamarinana sy ny fitondran-tenan'ny hendry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aleo ho tsara laza toy izay ho be harena, Ary tsara ny fitia noho ny volafotsy sy ny volamena.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Roahy ny mpaniratsira, dia ho afaka ny fifandirana, Eny, hitsahatra ny ady sy ny fahafaham-baraka.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay tia fahadiovam-po, dia milaza soa ny molony. Sady sakaizan'ny mpanjaka izy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mason'i Jehovah miaro ny manam-pahalalana; Fa ny tenin'ny mpivadika dia foanany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny malaina: Misy liona any ivelany; Ho fatin''ny sasany any an-dalambe aho.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vavan'ny vehivavy jejo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vehivavy tsy vadiny
      marker-yv: yv-n
    - type: text
      text: ' dia lavaka lalina; Izay voaozon''i Jehovah no ho latsaka ao.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miraikitra amin'ny fon'ny zaza ny hadalana; Fa ny tsorakazo famaizana no hampanalavitra izany aminy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mampahory ny malahelo dia mampitombo ny hareny; Fa izay manome ho an'ny manana kosa dia mampihena ny hareny.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atongilano ny sofinao, ka henoy ny tenin''ny hendry, Ary ampitandremo ny fahalalako ny fonao; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mahafinaritra raha voatahirinao ao an-kibonao izany, Koa aoka samy ho eo amin''ny molotrao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao dia ianao no nampahafantariko izany, Mba hitokianao amin''i Jehovah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mihaona ny manan-karena sy ny malahelo; Fa Jehovah no Mpanao azy roa tonta.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy efa nanoratra zava-tsoa ho anao va aho, Izay misy hevitra tsara sy fahalalana, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hampahafantariko ny fahamarinan'ny teny mahatoky ianao, Sy hahazoanao teny holazaina amin'izay naniraka anao?
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manosihosy ny malahelo, saingy malahelo izy; Ary aza dia manifakifa ny ory eo am-bavahady; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Jehovah anie ka hisolo vava azy amin'ny adiny. Ary hanimba ny ain'izay manimba azy.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza misakaiza amin''ny olona mora tezitra, Ary aza miara-dia amin''ny olona foizina, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fandrao ianao mianatra ny fanaony Ka mahazo fandrika ho an'ny ainao.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mety ho isan''ny mifandray tanana, Na izay mianto-trosa; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha tsy manan-kaloa ianao, Nahoana no dia halainy ny lafika andrianao?
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manakisaka ny fari-tany ela, Izay naorin'ny razanao.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mahita olona mailaka amin'ny raharahany va ianao? Eo anatrehan'ny mpanjaka no hitsanganany, Fa tsy hitsangana eo anatrehan'ny olona ambany izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mahira-tsaina mahatsinjo ny loza ka miery; Fa ny kely saina kosa mandroso ka voa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny valin'ny fanetren-tena sy ny fahatahorana an'i Jehovah Dia harena sy voninahitra ary fiainana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsilo sy fandrika no amin'ny alehan'ny maditra; Fa izay te-hiaro ny ainy dia manalavitra izany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zaro amin''izay lalana tokony halehany ny zaza, Ka na rehefa antitra aza izy, dia tsy hiala amin''izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny manan-karena dia manapaka ny malahelo, Ary izay misambotra dia mpanompon'ny mampisambotra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mamafy heloka dia hijinja fahoriana, Ary ho levona ny tsorakazon'ny fahatezerany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manana maso miantra hotahina, Satria anomezany ho an'ny malahelo ny haniny.
