document_id: ISA.53,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Iza no nino ny teny nampitondraina anay ? Ary iza no nampisehoana ny sandrin''i Jehovah? '
  '10':
  - type: text
    content: Nefa sitrak'i Jehovah ny hanorotoro sy hampangirifiry Azy; Rehefa manolotra fanati-panonerana Izy, dia hahita taranaka
  - type: note
    content: 'Na: Rehefa ataonao fanati-panonerana ny ainy, dia hahita taranaka Izy'
  - type: text
    content: ' sady ho maro andro, ary ny sitrapon''i Jehovah dia hambinina eo an-tànany. '
  '11':
  - type: text
    content: Noho ny fisasaran'ny fanahiny dia hahita izany Izy ka ho afa-po; Ny fahalalana Azy
  - type: note
    content: Heb.fahalalany
  - type: text
    content: ' no hanamarinan''ny Mpanompoko marina ny olona maro, ary Izy no hivesatra ny helok''ireo. '
  '12':
  - type: text
    content: Koa dia hanome Azy anjara amin'ny lehibe Aho, ary hizara babo amin'ny mahery Izy
  - type: note
    content: 'Na: dia homeko Azy ny lehibe ho anjarany sy ny mahery ho anjara-babony'
  - type: text
    content: ; Satria naidiny ho amin'ny fahafatesana ny ainy, Ary natao ho isan'ny mpanota Izy; Eny, Izy no nitondra ny fahotan'ny maro sady manao
  - type: note
    content: 'Na: nanao'
  - type: text
    content: ' fifonana ho an''ny mpanota.'
  '2':
  - type: text
    content: 'Fa naniry teo anatrehany tahaka ny zana-kazo madinika Izy sy tahaka ny solofon-kazo amin''ny tany karankaina; tsy nanana endrika na fahatsaran-tarehy Izy; Ary raha nijery Azy isika, dia tsy nisy hatsaran-tarehy haniriantsika Azy. '
  '3':
  - type: text
    content: Natao tsinontsinona sy nolavin'ny olona Izy; lehilahy ory sady zatra ny fahoriana
  - type: note
    content: Heb. lehilahy be fanaintainana sady fantatry ny faharariana
  - type: text
    content: ', Ary tahaka izay tsy tian''ny olon-kojerena akory Izy; natao tsinontsinona Izy ka tsy mba nahoantsika. '
  '4':
  - type: text
    content: Nitondra ny aretintsika tokoa Izy sady nivesatra ny fahoriantsika
  - type: note
    content: Heb. fanaintainantsika
  - type: text
    content: '; kanjo isika kosa nanao azy ho nokapohina sy nasian''Andriamanitra ary nampahorina. '
  '5':
  - type: text
    content: Nefa Izy dia voalefona noho ny fahadisoantsika sy notorotoroina noho ny helotsika, ny fampijaliana
  - type: note
    content: Heb. famaizana
  - type: text
    content: ' nahazoantsika fihavanana no namelezana Azy; ary ny dian-kapoka taminy no nahasitranana antsika. '
  '6':
  - type: text
    content: 'Isika rehetra dia samy efa nania tahaka ny ondry, samy efa nivily ho amin''ny lalantsika avy isika rehetra; ary nataon''i Jehovah nihatra taminy avokoa ny helotsika rehetra. '
  '7':
  - type: text
    content: 'Nampahorina Izy, nefa nanetry tena ka tsy niloa-bava, dia tahaka ny zanak''ondry entina hovonoina, sy tahaka ny ondrivavy izay moana eo anatrehan''ny mpanety azy, eny, tsy niloa-bava Izy. '
  '8':
  - type: text
    content: Ny fampahoriana sy ny fitsarana no nenti-nanaisotra Azy
  - type: note
    content: 'Na: Nalaina niala tamin''ny fampahoriana sy ny fitsarana Izy'
  - type: text
    content: ; ary iza tamin'ny niara-belona taminy no nihevitra
  - type: note
    content: 'Na: Ary iza no nihevitra izay ho taranany?'
  - type: text
    content: ' fa nofongorana niala tamin''ny tanin''ny velona Izy, ka ny fahadisoan''ny oloko no nikapohana Azy? '
  '9':
  - type: text
    content: Ary nokasaina hatao tao amin'ny olo-meloka ny fasany (Nefa teo amin'ny mpanankarena Izy, rehefa novonoina
  - type: note
    content: 'Na: Sy ho eo amin''ny mpanankarena, rehefa novonoina Izy'
  - type: text
    content: '), na dia tsy nanao ratsy aza Izy, sady tsy nisy fitaka teo am-bavany. '
