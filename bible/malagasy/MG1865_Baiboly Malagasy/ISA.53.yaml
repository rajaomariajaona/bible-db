document_id: ISA.53,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Iza no nino ny teny nampitondraina anay ? Ary iza no nampisehoana ny sandrin''i Jehovah? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nefa sitrak'i Jehovah ny hanorotoro sy hampangirifiry Azy; Rehefa manolotra fanati-panonerana Izy, dia hahita taranaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Rehefa ataonao fanati-panonerana ny ainy, dia hahita taranaka Izy'
      marker-yv: yv-n
    - type: text
      text: ' sady ho maro andro, ary ny sitrapon''i Jehovah dia hambinina eo an-tànany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Noho ny fisasaran'ny fanahiny dia hahita izany Izy ka ho afa-po; Ny fahalalana Azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb.fahalalany
      marker-yv: yv-n
    - type: text
      text: ' no hanamarinan''ny Mpanompoko marina ny olona maro, ary Izy no hivesatra ny helok''ireo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Koa dia hanome Azy anjara amin'ny lehibe Aho, ary hizara babo amin'ny mahery Izy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia homeko Azy ny lehibe ho anjarany sy ny mahery ho anjara-babony'
      marker-yv: yv-n
    - type: text
      text: ; Satria naidiny ho amin'ny fahafatesana ny ainy, Ary natao ho isan'ny mpanota Izy; Eny, Izy no nitondra ny fahotan'ny maro sady manao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: nanao'
      marker-yv: yv-n
    - type: text
      text: ' fifonana ho an''ny mpanota.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa naniry teo anatrehany tahaka ny zana-kazo madinika Izy sy tahaka ny solofon-kazo amin''ny tany karankaina; tsy nanana endrika na fahatsaran-tarehy Izy; Ary raha nijery Azy isika, dia tsy nisy hatsaran-tarehy haniriantsika Azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Natao tsinontsinona sy nolavin'ny olona Izy; lehilahy ory sady zatra ny fahoriana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lehilahy be fanaintainana sady fantatry ny faharariana
      marker-yv: yv-n
    - type: text
      text: ', Ary tahaka izay tsy tian''ny olon-kojerena akory Izy; natao tsinontsinona Izy ka tsy mba nahoantsika. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nitondra ny aretintsika tokoa Izy sady nivesatra ny fahoriantsika
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fanaintainantsika
      marker-yv: yv-n
    - type: text
      text: '; kanjo isika kosa nanao azy ho nokapohina sy nasian''Andriamanitra ary nampahorina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nefa Izy dia voalefona noho ny fahadisoantsika sy notorotoroina noho ny helotsika, ny fampijaliana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. famaizana
      marker-yv: yv-n
    - type: text
      text: ' nahazoantsika fihavanana no namelezana Azy; ary ny dian-kapoka taminy no nahasitranana antsika. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Isika rehetra dia samy efa nania tahaka ny ondry, samy efa nivily ho amin''ny lalantsika avy isika rehetra; ary nataon''i Jehovah nihatra taminy avokoa ny helotsika rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nampahorina Izy, nefa nanetry tena ka tsy niloa-bava, dia tahaka ny zanak''ondry entina hovonoina, sy tahaka ny ondrivavy izay moana eo anatrehan''ny mpanety azy, eny, tsy niloa-bava Izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny fampahoriana sy ny fitsarana no nenti-nanaisotra Azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Nalaina niala tamin''ny fampahoriana sy ny fitsarana Izy'
      marker-yv: yv-n
    - type: text
      text: ; ary iza tamin'ny niara-belona taminy no nihevitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary iza no nihevitra izay ho taranany?'
      marker-yv: yv-n
    - type: text
      text: ' fa nofongorana niala tamin''ny tanin''ny velona Izy, ka ny fahadisoan''ny oloko no nikapohana Azy? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary nokasaina hatao tao amin'ny olo-meloka ny fasany (Nefa teo amin'ny mpanankarena Izy, rehefa novonoina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Sy ho eo amin''ny mpanankarena, rehefa novonoina Izy'
      marker-yv: yv-n
    - type: text
      text: '), na dia tsy nanao ratsy aza Izy, sady tsy nisy fitaka teo am-bavany. '
