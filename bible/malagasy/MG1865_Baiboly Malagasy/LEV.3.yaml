document_id: LEV.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanati-pihavanana
  - type: text
    content: 'Ary raha fanati-pihavanana no fanatiny, ka ombilahy na ombivavy no ateriny, dia izay tsy misy kilema no hateriny eo anatrehan''i Jehovah. '
  '10':
  - type: text
    content: 'ary ny voany roa mbamin''ny fonom-boany, izay eo amin''ny takibany, sy ny ila-atiny lehibe; hataony indray manala amin''ny voany no fanaisony izany. '
  '11':
  - type: text
    content: Ary ny mpisorona dia handoro izany ho fofona eo ambonin'ny alitara; hanina avy amin'ny fanatitra atao amin'ny afo ho an'i Jehovah izany.
  '12':
  - type: text
    content: 'Ary raha osy no fanatiny, dia hanatitra azy eo anatrehan''i Jehovah izy. '
  '13':
  - type: text
    content: 'Ary hametraka ny tànany amin''ny lohany izy, dia hamono azy eo anoloan''ny trano-lay fihaonana; ary ireo zanak''i Arona dia hanopy ny rà manodidina amin''ny lafin''ny alitara. '
  '14':
  - type: text
    content: 'Ary avy aminy no hanaterany ny fanatiny atao amin''ny afo ho an''i Jehovah, dia ny safodrorohany sy ny saboran-tsinainy '
  '15':
  - type: text
    content: 'ary ny voany roa mbamin''ny fonom-boany, izay eo amin''ny takibany, sy ny ila-atiny lehibe; hataony indray manala amin''ny voany no fanaisony izany. '
  '16':
  - type: text
    content: 'Ary ny mpisorona handoro azy ho fofona eo ambonin''ny alitara; hanina avy amin''ny fanatitra atao amin''ny afo ho hanitra ankasitrahana izany; an''i Jehovah ny sabora rehetra. '
  '17':
  - type: text
    content: 'Izao no ho lalàna mandrakizay amin''ny taranakareo hatramin''ny fara mandimby eny amin''izay rehetra itoeranareo: tsy hihinana sabora na rà akory ianareo.'
  '2':
  - type: text
    content: 'Ary hametraka ny tànany amin''ny lohan''ny fanatiny izy, dia hamono azy eo anoloan''ny varavaran''ny trano-lay fihaonana; ary ireo mpisorona, zanak''i Arona, hanopy ny rà manodidina amin''ny lafin''ny alitara. '
  '3':
  - type: text
    content: 'Dia hangalan''ny mpisorona ny fanati-pihavanana, ka hateriny ho fanatitra atao amin''ny afo ho an''i Jehovah, dia ny safodrorohany sy ny saboran-tsinainy '
  '4':
  - type: text
    content: 'sy ny voany roa mbamin''ny fonom-boany, izay eo amin''ny takibany, ary ny ila-atiny lehibe; hataony indray manala amin''ny voany no fanaisony izany. '
  '5':
  - type: text
    content: 'Ary ireo zanak''i Arona dia handoro izany ho fofona eo ambonin''ny alitara miaraka amin''ny fanatitra dorana izay eo ambonin''ny kitay eo amin''ny afo; dia fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah izany. '
  '6':
  - type: text
    content: 'Ary raha ondry na osy no ateriny ho fanati-pihavanana ho an''i Jehovah, dia izay tsy misy kilema, na lahy na vavy, no hateriny. '
  '7':
  - type: text
    content: 'Raha zanak''ondry no hateriny ho fanatiny, dia hanatitra azy eo anatrehan''i Jehovah izy. '
  '8':
  - type: text
    content: 'Ary hametraka ny tànany amin''ny lohan''ny fanatiny izy, dia hamono azy eo anoloan''ny trano-lay fihaonana; ary ireo zanak''i Arona hanopy ny rà manodidina amin''ny lafin''ny alitara. '
  '9':
  - type: text
    content: 'Ary hangalan''ireo ny fanati-pihavanana ka hateriny ho fanatitra atao amin''ny afo ho an''i Jehovah, dia ny hofany manontolo (faranana hatreo amin''ny faran''ny taolan-damosina no fanaisony izany) sy ny saborany, dia ny safodrorohany sy ny saboran-tsinainy '
