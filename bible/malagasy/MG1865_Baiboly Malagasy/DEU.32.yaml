document_id: DEU.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fihirana nataon'i Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: MIHAINOA, ry lanitra, fa hiteny aho! Ary mandrenesa, ry tany, ny tenin'ny vavako!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ho avy tahaka ny ranonorana ny fampianarako, Ary hilatsaka tahaka ny ando ny teniko, Sy tahaka ny erika amin'ny ahi-maitso Ary ny ranonorana amin'ny anana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny anaran'i Jehovah no hotoriko; Maneke ny fahalehibiazan'Andriamanitsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny amin'ny Vatolampy, tanteraka ny asany; Fa ny lalany rehetra dia amin'ny rariny avokoa. Andriamanitra mahatoky Izy, ka tsy misy ratsy ao aminy; Marina sy mahitsy Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Efa nasian-dratsy Izy; Tsy zanany ireny, tsininy izany; Taranaka miolakolaka sady efa nivadika izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moa Jehovah hovalianareo toy izany va, Ry firenena adala ka tsy hendry? Tsy Izy va no Rainao, Izay nanavotra anao? Tsy Izy va no nanao anao sy nanorina anao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsarovy ny andro fahiny, Saino ny taona hatrizay hatrizay; Anontanio amin-drainao, fa hanambara aminao izy, Sy amin'ny anti-panahy eo aminao, fa hilaza aminao izy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fony nomen'ny Avo Indrindra zara-tany ny jentilisa, Ka samy natokantokany ny zanak'olombelona, Dia notendreny ny fari-tanin'ireo firenena Araka ny isan'ny Zanak'Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa anjaran''i Jehovah ny olony: Jakoba no natokany ho lovany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nahita azy tany an-efitra Izy, Dia tany amin'ny tany foana be nampierona, Ka dia nanodidina sy niahy azy Ary notandremany tahaka ny anakandriamasony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Toy ny voromahery manaitra ny ao amin'ny akaniny Ka manidintsidina eo ambonin'ny zanany, Dia toy izany no namelarany ny elany sy nandraisany azy Ary nitondrany azy teo ambonin'ny elany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jehovah irery no nitondra azy, Ary tsy nisy andriamani-kafa teo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nampandeha azy teny ambonin'ny havoana amin'ny tany Izy, Ka nohaniny ny vokatry ny saha. Nampitsentsitra azy tantely avy teo amin'ny vatolampy Izy Sy diloilo avy teo amin'ny vatolampy afovato
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sy rononomandrin'omby sy rononon'ondry aman'osy Mbamin'ny tavin'ny zanak'ondry Sy ondrilahin'i Basana sy osilahy Ary vary izay vokatra indrindra; Ary nisotro divay mahery avy tamin'ny ran'ny voaloboka ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nihanatavy Jesorona ka namely daka, Efa matavy ianao sady vory nofo no vaventibe, Dia nahafoy an'Andriamanitra Izay nanao azy izy, Ary nanamavo ny Vatolampy famonjena azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nampahasaro-piaro Azy tamin'ny hafa Izy; Ary tamin'ny zava-betaveta no nampahasosorany Azy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Namono zavatra ho fanatitra ho an'ny demonia izay tsy Andriamanitra izy, Dia andriamanitra tsy fantany, Fa andriamanitra vao niseho, Izay tsy natahoran'ny razanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny Vatolampy Izay niteraka anao dia tsy tsaroanao, Ary hadinoinao Andriamanitra Izay nahary anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary Jehovah nahita izany ka nandà Noho ny fahasosorany tamin'ny zananilahy sy ny zananivavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy Izy: Hafeniko azy ny tavako; Ho hitako izay hiafarany; Fa firenena tena mpivadibadika izy, Dia zaza tsy mahatoky.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izy efa nampahasaro-piaro Ahy tamin'izay tsy Andriamanitra Sy nampahasosotra Ahy tamin'ny zava-poanany; Ary Izaho kosa hampahasaro-piaro azy amin'izay tsy olona, Sy hampahasosotra azy amin'izay firenena adala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa arehitra ny afon'ny fahatezerako, Ka mandoro hatrany amin'ny fiainan-tsi-hita any ambany indrindra, Sady mandevona ny tany mbamin'ny vokatra ao aminy Ary mampirehitra ny fanambanin'ny tendrombohitra aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Havangongoko aminy ny loza betsaka; Ary holaniko aminy ny zana-tsi-pikako:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hofezahin'ny mosary izy sady holanin'ny areti-mandripaka Sy ny fandringanana mangidy; Ary nifim-biby no hampandehaniko aminy Jesorona dia anaran'ny Isiraely. Mbamin'ny poizin'ny biby mpikisaka amin'ny vovoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Eny ivelany dia ny sabatra no hahafaty ny zanany, Ary ao amin'ny efi-trano dia ny fampahatahorana Na ny zatovolahy na ny zatovovavy, Na ny zaza minono na ny fotsy volo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa efa nolazaiko hoe: Hotsofiko hihahaka izy; Hatsahatro ny fahatsiarovana azy tsy ho eo amin''ny zanak''olombelona,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha tsy ny fireharehan''ny fahavalo no natahorako, Andrao diso hevitra ireny mpandrafy azy ireny Ka hanao hoe: Ny tananay no avo; Fa tsy Jehovah tsy akory no nanao izany rehetra izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa firenena tsy manan-tsaina izy Sady tsy manam-pahalalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Enga anie ka hendry izy mba hahalala izao Ka hahafantatra izay ho farany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hataon'ny irery ahoana no fanenjika ny arivo, Ary hataon'ny roa lahy ahoana no fampandositra ny iray alina, Raha tsy ny Vatolampiny no efa nivarotra azy, Ary Jehovah no efa nanolotra azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa tsy mba mitovy amin'ny Vatolampintsika ny vatolampin'ireny, Na dia izy fahavalontsika aza no hitsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny tahom-boalobony dia tahom-boalobok'i Sodoma Ary avy ao amin'ny sahan'i Gomora; Ny voalobony dia voaloboka mahafaty, Sady mangidy koa ny sampahony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny divainy dia zava-mahafaty avy amin'ny dragona, Ary poizina loza avy amin'ny bibilava.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Moa tsy voatahiry ato amiko va izany Ka voaisy kase ato an-trano firaketako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ahy ny famaliana sy ny fampanodiavana, Raha avy izay hahasolafaka ny tongony; Fa antomotra ny andro hahitany loza, Ary ho avy faingana ny zava-boatendry hanjo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Fa Jehovah hanome rariny ny olony Ary hanenina ny amin'ny mpanompony, Raha hitany fa lany ny heriny, Ka lasa avokoa na ny voahazona, na ny afaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary hiteny hoe Izy: Aiza ireo andriamaniny, Dia ny vatolampy izay nialofany,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Izay nihinana ny saboran'ny fanatiny Ary nisotro ny divain'ny fanatitra aidiny? Aoka ireny no hitsangana ka hamonjy anareo Ary ho fierena ho anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Fantaro ankehitriny fa Izaho dia Izaho no Izy, Ka tsy misy andriamanitra eto amiko. Izaho no mahafaty sy mahavelona, Ary Izaho no maharatra sy mahasitrana, Ka tsy misy mahafaka amin'ny tanako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa manangana ny tanako amin''ny lanitra Aho Ka manao hoe: Raha velona koa Aho mandrakizay:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Raha manasa ny sabatro manelatselatra Aho, Ka voarain'ny tanako ny fitsarana, Dia hampanodiaviko ny mpandrafy Ahy ny ataony, Ary hovaliako ny mankahala Ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Hataoko mamon-drà ny zana-tsipikako, Ary ny sabatro hihina-nofo, Dia ny ran'ny voavono sy ny babo Mbamin'ny lohan'izay lehibe amin'ny fahavalo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Mihobia, ry jentilisa mbamin'ny olony; Fa ny ran'ny mpanompony no hovaliany. Hamaly ny mpandrafy Azy Izy, Ary hanao fanavotana kosa ho an'ny taniny sy ny olony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Dia nandeha Mosesy ka nilaza ny teny rehetra amin''izany fihirana izany teo anatrehan''ny olona, dia izy sy Hosea, zanak''i Nona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary nony efa tapitra voalazan''i Mosesy tamin''ny Isiraely rehetra izany teny rehetra izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'dia hoy izy taminy: Alatsaho ao am-ponareo ny teny rehetra izay ambarako aminareo anio, izay handidianareo ny zanakareo hotandremany sy hankatoaviny, dia ny teny rehetra amin''ity lalàna ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Fa tsy zava-poana ho anareo izany, fa izany no fiainanareo; ary izany zavatra izany no hahamaro andro anareo eo amin''ny tany izay efa hidiranareo holovana, rehefa tafita an''i Jordana ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy androtrizay indrindra ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Miakara amin''ity tendrombohitra Abarima ity, dia ny tendrombohitra Nebo, izay eo amin''ny tany Moaba tandrifin''i Jeriko; ary tazano ny tany Kanana, izay omeko ny Zanak''Isiraely ho lovany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia aoka ho faty ao amin''ny tendrombohitra izay iakaranao ianao, ka ho voangona any amin''ny razanao, tahaka ny nahafatesan''i Arona rahalahinao tao an-tendrombohitra Hora sy ny nanangonana azy any amin''ny razany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'satria nivadika tamiko teo amin''ny Zanak''Isiraely ianareo tao amin''ny ranon''i Meriba any Kadesy, tany an-efitra Zina; fa tsy nahamasina Ahy teo amin''ny Zanak''Isiraely ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Fa hahatazana ny tany eo anoloanao ihany ianao, kanefa tsy hiditra any amin'ny tany izay omeko ny Zanak'Isiraely.
