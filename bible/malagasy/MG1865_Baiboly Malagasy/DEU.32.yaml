document_id: DEU.32,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fihirana nataon'i Mosesy
  - type: text
    content: MIHAINOA, ry lanitra, fa hiteny aho! Ary mandrenesa, ry tany, ny tenin'ny vavako!
  '10':
  - type: text
    content: Nahita azy tany an-efitra Izy, Dia tany amin'ny tany foana be nampierona, Ka dia nanodidina sy niahy azy Ary notandremany tahaka ny anakandriamasony.
  '11':
  - type: text
    content: Toy ny voromahery manaitra ny ao amin'ny akaniny Ka manidintsidina eo ambonin'ny zanany, Dia toy izany no namelarany ny elany sy nandraisany azy Ary nitondrany azy teo ambonin'ny elany,
  '12':
  - type: text
    content: Jehovah irery no nitondra azy, Ary tsy nisy andriamani-kafa teo aminy.
  '13':
  - type: text
    content: Nampandeha azy teny ambonin'ny havoana amin'ny tany Izy, Ka nohaniny ny vokatry ny saha. Nampitsentsitra azy tantely avy teo amin'ny vatolampy Izy Sy diloilo avy teo amin'ny vatolampy afovato
  '14':
  - type: text
    content: Sy rononomandrin'omby sy rononon'ondry aman'osy Mbamin'ny tavin'ny zanak'ondry Sy ondrilahin'i Basana sy osilahy Ary vary izay vokatra indrindra; Ary nisotro divay mahery avy tamin'ny ran'ny voaloboka ianao.
  '15':
  - type: text
    content: Nihanatavy Jesorona ka namely daka, Efa matavy ianao sady vory nofo no vaventibe, Dia nahafoy an'Andriamanitra Izay nanao azy izy, Ary nanamavo ny Vatolampy famonjena azy.
  '16':
  - type: text
    content: Nampahasaro-piaro Azy tamin'ny hafa Izy; Ary tamin'ny zava-betaveta no nampahasosorany Azy;
  '17':
  - type: text
    content: Namono zavatra ho fanatitra ho an'ny demonia izay tsy Andriamanitra izy, Dia andriamanitra tsy fantany, Fa andriamanitra vao niseho, Izay tsy natahoran'ny razanareo.
  '18':
  - type: text
    content: Ny Vatolampy Izay niteraka anao dia tsy tsaroanao, Ary hadinoinao Andriamanitra Izay nahary anao.
  '19':
  - type: text
    content: Ary Jehovah nahita izany ka nandà Noho ny fahasosorany tamin'ny zananilahy sy ny zananivavy.
  '2':
  - type: text
    content: Ho avy tahaka ny ranonorana ny fampianarako, Ary hilatsaka tahaka ny ando ny teniko, Sy tahaka ny erika amin'ny ahi-maitso Ary ny ranonorana amin'ny anana.
  '20':
  - type: text
    content: 'Dia hoy Izy: Hafeniko azy ny tavako; Ho hitako izay hiafarany; Fa firenena tena mpivadibadika izy, Dia zaza tsy mahatoky.'
  '21':
  - type: text
    content: Izy efa nampahasaro-piaro Ahy tamin'izay tsy Andriamanitra Sy nampahasosotra Ahy tamin'ny zava-poanany; Ary Izaho kosa hampahasaro-piaro azy amin'izay tsy olona, Sy hampahasosotra azy amin'izay firenena adala.
  '22':
  - type: text
    content: Fa arehitra ny afon'ny fahatezerako, Ka mandoro hatrany amin'ny fiainan-tsi-hita any ambany indrindra, Sady mandevona ny tany mbamin'ny vokatra ao aminy Ary mampirehitra ny fanambanin'ny tendrombohitra aza.
  '23':
  - type: text
    content: 'Havangongoko aminy ny loza betsaka; Ary holaniko aminy ny zana-tsi-pikako:'
  '24':
  - type: text
    content: Hofezahin'ny mosary izy sady holanin'ny areti-mandripaka Sy ny fandringanana mangidy; Ary nifim-biby no hampandehaniko aminy Jesorona dia anaran'ny Isiraely. Mbamin'ny poizin'ny biby mpikisaka amin'ny vovoka.
  '25':
  - type: text
    content: Eny ivelany dia ny sabatra no hahafaty ny zanany, Ary ao amin'ny efi-trano dia ny fampahatahorana Na ny zatovolahy na ny zatovovavy, Na ny zaza minono na ny fotsy volo.
  '26':
  - type: text
    content: 'Fa efa nolazaiko hoe: Hotsofiko hihahaka izy; Hatsahatro ny fahatsiarovana azy tsy ho eo amin''ny zanak''olombelona,'
  '27':
  - type: text
    content: 'Raha tsy ny fireharehan''ny fahavalo no natahorako, Andrao diso hevitra ireny mpandrafy azy ireny Ka hanao hoe: Ny tananay no avo; Fa tsy Jehovah tsy akory no nanao izany rehetra izany.'
  '28':
  - type: text
    content: Fa firenena tsy manan-tsaina izy Sady tsy manam-pahalalana.
  '29':
  - type: text
    content: Enga anie ka hendry izy mba hahalala izao Ka hahafantatra izay ho farany.
  '3':
  - type: text
    content: Fa ny anaran'i Jehovah no hotoriko; Maneke ny fahalehibiazan'Andriamanitsika.
  '30':
  - type: text
    content: Hataon'ny irery ahoana no fanenjika ny arivo, Ary hataon'ny roa lahy ahoana no fampandositra ny iray alina, Raha tsy ny Vatolampiny no efa nivarotra azy, Ary Jehovah no efa nanolotra azy?
  '31':
  - type: text
    content: Fa tsy mba mitovy amin'ny Vatolampintsika ny vatolampin'ireny, Na dia izy fahavalontsika aza no hitsara.
  '32':
  - type: text
    content: Ny tahom-boalobony dia tahom-boalobok'i Sodoma Ary avy ao amin'ny sahan'i Gomora; Ny voalobony dia voaloboka mahafaty, Sady mangidy koa ny sampahony.
  '33':
  - type: text
    content: Ny divainy dia zava-mahafaty avy amin'ny dragona, Ary poizina loza avy amin'ny bibilava.
  '34':
  - type: text
    content: Moa tsy voatahiry ato amiko va izany Ka voaisy kase ato an-trano firaketako?
  '35':
  - type: text
    content: Ahy ny famaliana sy ny fampanodiavana, Raha avy izay hahasolafaka ny tongony; Fa antomotra ny andro hahitany loza, Ary ho avy faingana ny zava-boatendry hanjo azy.
  '36':
  - type: text
    content: Fa Jehovah hanome rariny ny olony Ary hanenina ny amin'ny mpanompony, Raha hitany fa lany ny heriny, Ka lasa avokoa na ny voahazona, na ny afaka.
  '37':
  - type: text
    content: 'Ary hiteny hoe Izy: Aiza ireo andriamaniny, Dia ny vatolampy izay nialofany,'
  '38':
  - type: text
    content: Izay nihinana ny saboran'ny fanatiny Ary nisotro ny divain'ny fanatitra aidiny? Aoka ireny no hitsangana ka hamonjy anareo Ary ho fierena ho anareo.
  '39':
  - type: text
    content: Fantaro ankehitriny fa Izaho dia Izaho no Izy, Ka tsy misy andriamanitra eto amiko. Izaho no mahafaty sy mahavelona, Ary Izaho no maharatra sy mahasitrana, Ka tsy misy mahafaka amin'ny tanako.
  '4':
  - type: text
    content: Ny amin'ny Vatolampy, tanteraka ny asany; Fa ny lalany rehetra dia amin'ny rariny avokoa. Andriamanitra mahatoky Izy, ka tsy misy ratsy ao aminy; Marina sy mahitsy Izy.
  '40':
  - type: text
    content: 'Fa manangana ny tanako amin''ny lanitra Aho Ka manao hoe: Raha velona koa Aho mandrakizay:'
  '41':
  - type: text
    content: Raha manasa ny sabatro manelatselatra Aho, Ka voarain'ny tanako ny fitsarana, Dia hampanodiaviko ny mpandrafy Ahy ny ataony, Ary hovaliako ny mankahala Ahy.
  '42':
  - type: text
    content: Hataoko mamon-drà ny zana-tsipikako, Ary ny sabatro hihina-nofo, Dia ny ran'ny voavono sy ny babo Mbamin'ny lohan'izay lehibe amin'ny fahavalo.
  '43':
  - type: text
    content: Mihobia, ry jentilisa mbamin'ny olony; Fa ny ran'ny mpanompony no hovaliany. Hamaly ny mpandrafy Azy Izy, Ary hanao fanavotana kosa ho an'ny taniny sy ny olony.
  '44':
  - type: text
    content: 'Dia nandeha Mosesy ka nilaza ny teny rehetra amin''izany fihirana izany teo anatrehan''ny olona, dia izy sy Hosea, zanak''i Nona. '
  '45':
  - type: text
    content: 'Ary nony efa tapitra voalazan''i Mosesy tamin''ny Isiraely rehetra izany teny rehetra izany, '
  '46':
  - type: text
    content: 'dia hoy izy taminy: Alatsaho ao am-ponareo ny teny rehetra izay ambarako aminareo anio, izay handidianareo ny zanakareo hotandremany sy hankatoaviny, dia ny teny rehetra amin''ity lalàna ity. '
  '47':
  - type: text
    content: 'Fa tsy zava-poana ho anareo izany, fa izany no fiainanareo; ary izany zavatra izany no hahamaro andro anareo eo amin''ny tany izay efa hidiranareo holovana, rehefa tafita an''i Jordana ianareo. '
  '48':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy androtrizay indrindra ka nanao hoe: '
  '49':
  - type: text
    content: 'Miakara amin''ity tendrombohitra Abarima ity, dia ny tendrombohitra Nebo, izay eo amin''ny tany Moaba tandrifin''i Jeriko; ary tazano ny tany Kanana, izay omeko ny Zanak''Isiraely ho lovany. '
  '5':
  - type: text
    content: Efa nasian-dratsy Izy; Tsy zanany ireny, tsininy izany; Taranaka miolakolaka sady efa nivadika izy.
  '50':
  - type: text
    content: 'Dia aoka ho faty ao amin''ny tendrombohitra izay iakaranao ianao, ka ho voangona any amin''ny razanao, tahaka ny nahafatesan''i Arona rahalahinao tao an-tendrombohitra Hora sy ny nanangonana azy any amin''ny razany, '
  '51':
  - type: text
    content: 'satria nivadika tamiko teo amin''ny Zanak''Isiraely ianareo tao amin''ny ranon''i Meriba any Kadesy, tany an-efitra Zina; fa tsy nahamasina Ahy teo amin''ny Zanak''Isiraely ianareo. '
  '52':
  - type: text
    content: Fa hahatazana ny tany eo anoloanao ihany ianao, kanefa tsy hiditra any amin'ny tany izay omeko ny Zanak'Isiraely.
  '6':
  - type: text
    content: Moa Jehovah hovalianareo toy izany va, Ry firenena adala ka tsy hendry? Tsy Izy va no Rainao, Izay nanavotra anao? Tsy Izy va no nanao anao sy nanorina anao?
  '7':
  - type: text
    content: Tsarovy ny andro fahiny, Saino ny taona hatrizay hatrizay; Anontanio amin-drainao, fa hanambara aminao izy, Sy amin'ny anti-panahy eo aminao, fa hilaza aminao izy;
  '8':
  - type: text
    content: Fony nomen'ny Avo Indrindra zara-tany ny jentilisa, Ka samy natokantokany ny zanak'olombelona, Dia notendreny ny fari-tanin'ireo firenena Araka ny isan'ny Zanak'Isiraely.
  '9':
  - type: text
    content: 'Fa anjaran''i Jehovah ny olony: Jakoba no natokany ho lovany.'
