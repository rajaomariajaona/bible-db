document_id: EZK.24,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahitana ny amin'ny vilany fahandroana, ary ny tenin'Andriamanitra ny amin'ny hahafatesan'ny vadin'i Ezekiela
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny andro fahafolo tamin''ny volana fahafolo tamin''ny taona fahasivy dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Atohofy betsaka ny kitay hazo, ampireheto ny afo, masaho tsara ny hena, ka asio zavatra hahamanitra azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: eny, taneho tsara izy'
      marker-yv: yv-n
    - type: text
      text: ', ary aoka ho may ny taolana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia foàny ny vilany, ka ataovy eo ambonin''ny vainafo hampahafana sy hahamay ny varahiny, ka ho levona eo aminy ny fahalotoany, ary ho afaka ny harafesiny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nanasatra dia nanasatra ny tenany izy, nefa tsy nety afaka ny harafesim-beny; aoka ho eo amin''ny afo ny harafesiny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahalotoanao dia misy fahavetavetana; satria nanadio anao Aho, nefa tsy nadio ianao, dia tsy hadio ho afaka amin''ny fahalotoana intsony ianao ambara-pialako fo aminao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho Jehovah no niteny, ka ho tonga izany ary hataoko; tsy hiahotrahotra Aho, na hiantra, na hanenina; araka ny fanaonao sy ny asanao no hitsarana anao, hoy Jehovah Tompo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak''olona, indro, efa hesoriko amin''ny loza indray mamely monja ilay tian''ny masonao; nefa aza misaona na mitomany na mandatsa-dranomaso akory ianao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misentoa malemilemy ihany ianao, fa aza mitomany na misaona ny maty; afehezo aminao ny hamamanao, ary asio kiraro ny tongotrao, ary aza manarona ny saokanao na mihinana ny fahan-kanina aterin''olona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony maraina dia niteny tamin''ny olona aho; ary nony hariva dia maty ny vadiko; ary nony maraina indray dia nanao araka ny efa nandidiana ahy aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny olona tamiko: Moa tsy holazainao aminay va izay hevitra tokony ho azonay amin''izao ataonao izao? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry zanak''olona, soratinao ny anaran''ny andro, dia izao andro anio izao; ny mpanjakan''i Babylona miantomboka mamely an''i Jerosalema amin''izao andro anio izao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izaho taminy: Tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazao amin''ny taranak''Isiraely hoe: Izao no lazain''i Jehovah Tompo: Indro, holotoiko ny fitoerako masina, izay reharehan''ny herinareo, dia ilay tian''ny masonareo sy mahamanina ny fanahinareo; ary ho lavon''ny sabatra ny zanakalahinareo sy ny zanakavavinareo, izay nilaozanareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia manaova tahaka ny nataoko ianareo: aza manarona ny saokanareo ianareo, na mihinana ny fahan-kanina aterin''olona; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary aoka ho eo an-dohanareo ny hamamanareo sy ho eo an-tongotrareo ny kiraronareo; aza misaona na mitomany ianareo; fa ho levona noho ny helokareo ianareo ka hifampitoloko. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Ezekiela dia ho famantarana mahagaga ho anareo; koa araka izay rehetra nataony no mba hataonareo; ary rehefa tonga izany, dia ho fantatrareo fa Izaho no Jehovah Tompo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ianao, ry zanak''olona, amin''ny andro hanesorako aminy ny heriny sy ny fifalian''ny voninahiny, ilay tian''ny masony sy ilay tian''ny fanahiny, dia ny zananilahy sy ny zananivavy, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, amin''izany andro izany dia hisy olona handositra ho tonga any aminao mba hampandre ny sofinao izany; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: amin'izany andro izany dia hisokatra miaraka amin'ny an'ilay mandositra ny vavanao, ka dia hiteny ianao, fa tsy ho moana intsony; ry ho famantarana mahagaga aminy ianao; ka dia ho fantany fa Izaho no Jehovah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary milazà fanoharana amin''ny taranaka maditra, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Asio vilany eo an-tokoana, eny, ataovy eo an-tokoana, ka asio rano ao anatiny; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary arotsahy ao ny vaingambaingany, dia ny vaingambaingany tsara rehetra, na ny feny na ny sorony; fenoy taolana voafantina izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alao ny ondry voafantina, ka tohofy kitay betsaka ao ambaniny koa hahandroana ny taolana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ka angòny eo ambaniny ny taolana'
      marker-yv: yv-n
    - type: text
      text: ', dia ampangotrahy tsara izy, ka andrahoy ao ny taolany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Lozan''ny tanàna mpandatsa-drà sy ny vilany izay misy harafesina tsy mety afaka ao anatiny! Loary tsirairay ny vaingambaingany, fa aza anaovana filokana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny ràny dia ao aminy; teo ambonin''ny vatolampy mangadihady no nametrahany azy; tsy naidiny tamin''ny tany hosaronan''ny vovoka izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mba hampakatra ny fahatezerana hamaliana azy no nametrahako ny ràny teo ambonin''ny vatolampy mangadihady mba tsy ho voasarona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Lozan''ny tanàna mpandatsa-drà; Izaho koa hamory kitay betsaka. '
