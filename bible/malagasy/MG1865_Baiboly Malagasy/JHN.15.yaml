document_id: JHN.15
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izaho no tena voaloboka, ary ny Raiko no mpamboatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny sampany rehetra eo amiko izay tsy mamoa dia esoriny; fa ny sampany rehetra izay mamoa kosa dia amboariny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr dioviny
    marker-yv: yv-n
  - type: text
    text: ', mba hamoa bebe kokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Efa madio rahateo ianareo noho ny teniko, izay nolazaiko taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tomoera amiko ary Izaho aminareo. Tahaka ny sampany tsy mahay mamoa ho azy, raha tsy miray amin''ny voaloboka izy, dia toy izany koa ianareo, raha tsy miray amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izaho no voaloboka, ianareo no sampany. Izay miray amiko, ary Izaho aminy, dia mamoa be izy; fa raha misaraka amiko kosa ianareo, dia tsy mahay manao na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha misy tsy miray amiko, dia ariana eny ivelany tahaka ny sampany izy ka malazo; ary angonina izy ka atsipy ao anaty afo, dia ho may. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha miray amiko ianareo, ka mitoetra ao anatinareo ny teniko, dia angataho izay tianareo na inona na inona, fa ho tonga aminareo izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izany no ankalazana ny Raiko, mba hamoazanareo be ka ho tonga mpianatro ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tahaka ny nitiavan''ny Ray Ahy no nitiavako anareo; tomoera amin''ny fitiavako ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha mitandrina ny didiko ianareo, dia hitoetra amin''ny fitiavako, tahaka ny nitandremako ny didin''ny Raiko sy ny itoerako amin''ny fitiavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izany zavatra izany dia efa nolazaiko taminareo, mba ho ao aminareo ny fifaliako, ka ho tanteraka ny fifalianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no didiko, dia ny mba hifankatiavanareo tahaka ny nitiavako anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy misy manana fitiavana lehibe noho izao, dia ny manolotra ny ainy hamonjy ny sakaizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hianareo no sakaizako, raha manao araka izay andidiako anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy hataoko hoe mpanompo intsony ianareo, fa ny mpanompo tsy mahalala izay ataon''ny tompony; fa efa nataoko hoe sakaiza ianareo, satria izay rehetra reko tamin''ny Raiko no nambarako taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy ianareo no nifidy Ahy, fa Izaho no nifidy anareo ka nanendry anareo mba handeha sy hamoa, ary mba haharetan''ny vokatrareo, mba homen''ny Ray anareo izay rehetra hangatahinareo amin''ny anarako na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izany zavatra izany no andidiako anareo, mba hifankatiavanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha halan''izao tontolo izao ianareo, dia aoka ho fantatrareo fa Izaho efa halany talohanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Raha naman
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. avy amin'
    marker-yv: yv-n
  - type: text
    text: '''izao tontolo izao ianareo, dia ho tia ny azy izao tontolo izao; fa satria tsy naman'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. avy amin'
    marker-yv: yv-n
  - type: text
    text: '''izao tontolo izao ianareo, fa Izaho efa nifidy anareo tamin''izao tontolo izao, dia halan''izao tontolo izao ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsarovy ny teny izay nolazaiko taminareo hoe: Ny mpanompo tsy lehibe noho ny tompony. Raha nanenjika Ahy izy, dia hanenjika anareo koa; ary raha nitandrina ny teniko izy, dia hitandrina ny anareo koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa izany rehetra izany no hataony aminareo noho ny anarako, satria tsy mahalala Izay naniraka Ahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha tsy tonga Aho ka niteny taminy, dia tsy nanan-keloka izy; fa ankehitriny dia tsy misy fialàna azony atao ny amin''ny helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izay mankahala Ahy dia mankahala ny Raiko koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha tsy nataoko teo aminy Izay asa tsy nataon''olona, dia tsy nanan-keloka izy; fa ankehitriny efa hitany sady efa halany Ahy sy ny Raiko koa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa tonga izany mba hahatanteraka ny teny izay voasoratra ao amin''ny lalàny hoe: Halany foana Aho (Sal. 69. 4; 109. 3). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa raha tonga ny Mpananatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao 14.16
    marker-yv: yv-n
  - type: text
    text: ', Izay hirahiko ho aminareo avy amin''ny Ray, dia ny Fanahin''ny fahamarinana Izay mivoaka avy amin''ny Ray, dia Izy no ho vavolombelona hanambara Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ianareo koa dia vavolombelona hanambara, satria ianareo efa teto amiko hatramin'ny voalohany.
