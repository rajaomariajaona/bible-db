document_id: 1KI.19,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandosiran'i Elia nankany an-efitra, sy ny nisehoan'Andriamanitra taminy tao Horeba, ary ny nanendrena an'i Elisa handimby azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia nolazain''i Ahaba tamin''i Jezebela izay rehetra nataon''i Elia, dia ny namonoany ny mpaminany rehetra tamin''ny sabatra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hoy izy: Nafana dia nafana ny foko noho ny fitiavako an''i Jehovah, Andriamanitry ny maro; fa ny Zanak''Isiraely nahafoy ny fanekenao; ny alitaranao noravany, ny mpaminaninao novonoiny tamin''ny sabatra, ary izaho dia izaho irery ihany no sisa, nefa mbola mitady hahafaty ny aiko koa izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy Jehovah: Mivoaha, ka mitsangana eo ambonin''ny tendrombohitra eo anatrehan''i Jehovah. Ary, indro, nandalo Jehovah, ka nisy rivotra be sady mahery namakivaky ny tendrombohitra sy nanorotoro ny harambato teo alohan'': Jehovah; nefa Jehovah tsy tao amin''ny rivotra; ary manarakaraka ny rivotra nisy horohoron-tany; nefa Jehovah tsy tao amin''ny horohoron-tany; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary manarakaraka ny horohorontany nisy afo; nefa Jehovah tsy tao amin''ny afo; ary manarakaraka ny afo nisy feo nitsoka malemy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary raha ren''i Elia izany, dia nosaronany ny kapôtiny ny tavany, ary nivoaka izy ka nijanona teo am-bava-zohy. Ary, indro, nisy feo nankao aminy nanao hoe: Manao inona atỳ ianao ry Elia ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia hoy izy: Nafana dia nafana ny foko noho ny fitiavako an''i Jehovah, Andriamanitry ny maro; fa ny Zanak''Isiraely efa nahafoy ny fanekenao; ny alitaranao noravany, ary ny mpaminaninao novonoiny tamin''ny sabatra, ary izaho dia izaho irery ihany no sisa. nefa mbola mitady hahafaty ny aiko koa izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa hoy Jehovah taminy: Mandehana, miverena amin''ny nalehanao ho any amin''ny efitr''i Damaskosy; ary raha mby any ianao, dia hosory Hazaela ho mpanjakan''i Syria; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary Jeho,zanak''i Nimsy, dia hosory ho mpanjakan''ny Isiraely; ary Elisa, zanak''i Safata, avy any Abela-mehola, dia hosory ho mpaminany handimby anao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary izay afa-mandositra ny sabatr''i Hazaela dia hovonoin''i Jeho; ary izay afa-mandositra ny sabatr''i Jeho kosa dia hovonoin''i Elisa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nefa hamela fito arivo ao amin'ny Isiraely Aho, dia ny lohalika rehetra izay tsy nandohalika tamin'i Bala sy ny vava rehetra izay tsy nanoroka azy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary niala teo Elia ka nahita an''i Elisa, zanak''i Safata, izay nampiasa omby efatra amby roa-polo mikambana tsiroaroa avy, fa izy teo amin''ny roa farany indrindra; ary Elia nandroso nanatona azy, dia nanipy ny kapôtiny hanarona azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Jezebela naniraka olona tany amin''i Elia hanao hoe: Hataon''ireo andriamanitra amiko anie izany, eny, mihoatra noho izany aza, raha tsy hataoko toy ny ain''ny anankiray amin''ireny ny ainao raha maraina toy izao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nandao ny omby izy ka nihazakazaka nanaraka an''i Elia ary niteny hoe: Masìna ianao, avelao aho aloha hanoroka an''ikaky sy ineny vao manaraka anao. Ary hoy izy taminy: Mandehana miverina, fa naninona anao moa aho? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia niverina niala taminy indray izy ka naka ny omby roa mikambana, dia namono azy, ary nandrahoiny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: natonony'
      marker-yv: yv-n
    - type: text
      text: ' tamin''ny hazo fiasàn''ny omby ny henany ka nomeny ny olona, dia nihinana ireo; ary niainga izy ka nanaraka an''i Elia, dia nanompo azy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary raha nahita izany izy, dia niainga ka lasa nandeha hamonjy ny ainy dia nankany Beri-sheba, izay any Joda, ary ny zatovo najanony tao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa izy kosa nandeha lalana indray andro tany an-efitra, ary tonga ka nipetraka teo ambanin'ny anjavidy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. rotema; zava-maniry mifanahatahaka amin'ny kifafam-bohitra
      marker-yv: yv-n
    - type: text
      text: ' anankiray; dia nangataka ho faty izy ka nanao hoe: Aoka izay! alao ny aiko ankehitriny, Jehovah ô. fa tsy tsara noho ny razako aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary raha nandry natory teo ambanin'ny anjavidy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. rotema; zava-maniry mifanahatahaka amin'ny kifafam-bohitra
      marker-yv: yv-n
    - type: text
      text: ' anankiray izy, indro, nisy anjely nanohina azy ka nanao taminy hoe. Miarena, ka homàna. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nijery izy, ka, indro, teo anilan''ny lohany nisy mofo voaendy tamin''ny vato mahamay sy rano iray tavoara; ary nihinana sy nisotro izy, dia nandry indray. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary avy fanindroany indray Ilay Anjelin''i Jehovah, dia nanohina azy ka nanao hoe: Mitohaza, ka homàna, fa lavitra loatra ny halehanao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nifoha izy ka nihinana sy nisotro; ary nandeha tamin''ny tanjaka azony tamin''izany hanina izany efa-polo andro efa-polo alina izy ho any Horeba, tendrombohitr''Andriamanitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary niditra tao anatin''ny zohy izy ka nitoetra tao. Ary, indro, tonga taminy ny tenin''i Jehovah nanao hoe: Manao inona atỳ ianao, ry Elia?'
