document_id: 2CH.32,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahararian'i Hezekia sy ny nanaretany, ary ny hareny amam-boninahiny, sy ny nampietrena azy, ary ny nahafatesany
  - type: text
    content: 'Ary rehefa afaka izany raharaha marina izany, dia avy Sankeriba, mpanjakan''i Asyria, niditra tany Joda ary nanao fahirano ny tanàna mimanda ka nikasa hanafaka azy. '
  '10':
  - type: text
    content: 'Izao nolazain''i Sankeriba, mpanjakan''i Asyria: Inona izato itokianareo, no dia miaritra fahoriana ato Jerosalema ianareo ? '
  '11':
  - type: text
    content: 'Tsy Hezekia ihany va no manambosy anareo hanole-tena ho faty mosary sy hetaheta ka .anao hoe: Jehovah Andriamanitsika hamonjy antsika amin''ny tanan''ny mpanjakan''i Syria? '
  '12':
  - type: text
    content: 'Tsy io Hezekia io ihany koa va no nandrava ny fitoerana avony sy ny alitarany ary nandidy ny Joda sy Jerosalema ka nanao hoe: Eo anoloan''ny alitara iray no iankohofanareo sy handoroanareo ditin-kazo manitra ? '
  '13':
  - type: text
    content: 'Tsy fantatrareo va izay nataoko, dia izaho sy ny razako, tamin''ny firenena rehetra tany amin''ny tany hafa ? Moa ireny andriamanitry ny firenena tany amin''ny tany hafa ireny va nisy nahavonjy ny taniny akory tamin''iny tanako? '
  '14':
  - type: text
    content: Iza amin'ny andriamanitr'ireo firenena efa naringan
  - type: note
    content: Heb. natao herema
  - type: text
    content: '''ny razako ireo no nahavonjy ny olony tamin''ny tanako, ka dia hahavonjy anareo amin''ny tanako va ny Andriamanitrareo? '
  '15':
  - type: text
    content: 'Koa ankehitriny, aza avela hamitaka anareo Hezekia, na hitaona anareo tahaka izao; aza mino azy ianareo; fa tsy nisy andriamanitra tany amin''ny firenena sy ny fanjakana rehetra izay nahavonjy ny olony tamin''ny tanako sy ny tanan''ny razako; koa aiza ny Andriamanitrareo no hahavonjy anareo amin''ny tanako? '
  '16':
  - type: text
    content: 'Ary ny mpanompon''i Sankeriba mbola niteny ratsy an''i Jehovah Andriamanitra sy Hezekia mpanompony, '
  '17':
  - type: text
    content: 'sady nanoratra taratasy hihaika an''i Jehovah, Andriamanitry ny Isiraely, sy hiteny ratsy Azy ka nanao hoe: Tahaka ny tsy nahavonien''ireny andriamanitry ny firenena tany amin''ny tany hafa ny olony tamin''ny tanako no tsy hahavonjen''ny Andriamanitr''i Hezekia ny olony koa amin''ny tanako. '
  '18':
  - type: text
    content: 'Dia niantso tamin''ny feo mahery izy ka nanao teny Jiosy teo anatrehan''ny mponina tany Jerosalema izay teny ambonin''ny manda hampitahorany sy hampangorohoroany azy mba hahafahany ny tanàna. '
  '19':
  - type: text
    content: 'Ary Andriamanitr''i Jerosalema koa dia mba nolazainy toy ny filazàny ireny andriamanitry ny firenena tany amin''ny tany hafa ireny, izay asan''tànan''olona ihany. '
  '2':
  - type: text
    content: 'Ary nony hitan''i Hezekia fa tonga Sankeriba ka nikasa hamely an''i Jerosalema, '
  '20':
  - type: text
    content: 'Ary noho izany dia nivavaka Hezekia mpanjaka sy Isaia mpaminany, zanak''i Amoza, ka nitaraina tamin''ny lanitra. '
  '21':
  - type: text
    content: 'Ary Jehovah naniraka anjely izay nandringana ny lehilahy mahery rehetra sy ny mpanapaka ary ny komandy teo an-tobin''ny mpanjakan''i Asyria, ka dia lasa nody amin-kenatra Sankeriba. Ary nony niditra tao an-tranon''ny andriamaniny izy, dia namono azy tao tamin''ny sabatra ny zanany naterany. '
  '22':
  - type: text
    content: 'Toy izany no namonjen''i Jehovah an''i Hezekia sy ny mponina tany Jerosalema tamin''ny tànan''i Sankeriba, mpanjakan''i Asyria, sy tamin''ny tanan''ny fahavalony rehetra; eny, niaro azy tamin''ny manodidina rehetra Izy. '
  '23':
  - type: text
    content: Ary ny maro nitondra fanatitra ho an'i Jehovah tany Jerosalema sy zava-tsoa ho an'i Hezekia, mpanjakan'ny Joda; dia nalaza teo imason'ny firenena rehetra izy hatramin'izany.
  '24':
  - type: text
    content: 'Tamin''izany andro izany dia narary efa saiky maty Hezekia, koa dia nivavaka tamin''i Jehovah izy, ary Jehovah niteny taminy ka nanome azy famantarana. '
  '25':
  - type: text
    content: 'Fa Hezekia tsy mba namaly araka izay soa efa natao taminy; fa niavonavona ny fony, dia niharan''ny fahatezerana izy mbamin''ny Joda sy Jerosalema. '
  '26':
  - type: text
    content: 'Kanefa Hezekia nanetry tena noho ilay efa niavonavonan''ny fony, dia izy sy ny mponina tany Jerosalema, ka dia tsy niharan''ny fahatezeran''i Jehovah ireo fahavelon''i Hezekia. '
  '27':
  - type: text
    content: 'Ary Hezekia nanana harena sy voninahitra be indrindra; dia nanao trano firaketana izy hitehirizany ny volafotsy sy ny volamena sy ny vato soa sy ny zava-manitra sy ny ampinga mbamin''izay fanaka tsara rehetra, '
  '28':
  - type: text
    content: 'ary tanàna fitehirizana ny vokatra koa, dia ny vary sy ny ranom-boaloboka ary ny diloilo, sy trano miefitrefitra hitoeran''ny biby fiompy samy hafa karazana ary vala hitoeran''ny ondry aman''osy. '
  '29':
  - type: text
    content: 'Ary nanao tanàna maro ho azy koa izy sady nanana ondry aman''osy ary omby betsaka, fa nomen''Andriamanitra fananana be indrindra izy. '
  '3':
  - type: text
    content: 'dia niara-nihevitra tamin''ny mpanapaka sy ny lehilahy mahery izy mba hanampina ny rano tamin''ny loharano eny ivelan''ny tanàna; ary nanampy azy ireo. '
  '30':
  - type: text
    content: 'Ary notampenan''io Hezekia io ny fivoahan''ny rano ambony any Gihona ka nampandehaniny tany ambanin''ny tany hidina mahitsy ho any andrefan''ny Tanànan''i Davida izany. Ary nambinina tamin''ny asany rehetra Hezekia. '
  '31':
  - type: text
    content: 'Nefa noho ny amin''ny irak''ireo mpanapaka tany Babylona, izay naniraka tany aminy mba hanontany ny amin''ny zava-mahagaga natao teo amin''ny tany, dia nilaozan''Andriamanitra izy, mba hizahany toetra azy hahalalany izay rehetra ao am-pony. '
  '32':
  - type: text
    content: 'Ary ny tantaran''i Hezekia sisa mbamin''ny soa nataony, indro, efa voasoratra ao amin''ny fahitan''Isaia mpaminany, zanak''i Amoza, sy ao amin''ny bokin''ny mpanjakan''ny Joda sy ny Isiraely izany. '
  '33':
  - type: text
    content: Ary Hezekia lasa nodi-mandry any amin'ny razany, dia nalevina tao amin'ny fiakarana ho any amin'ny fasan'ny zanak'i Davida izy; ary ny Joda rehetra sy ny mponina rehetra tany Jerosalema nanome voninahitra azy tamin'ny nahafatesany. Ary Manase zanany no nanjaka nandimby azy.
  '4':
  - type: text
    content: 'Dia nivory ny olona maro ka nanampina ny loharano rehetra sy ilay renirano mamaky eo afovoan''ny tany, fa hoy izy: Nahoana no avela hahita rano be ny mpanjakan''i Asyria, raha avy? '
  '5':
  - type: text
    content: Dia nohereziny namboariny avokoa izay rava tamin'ny manda sady nasiany tilikambo teny amboniny sy manda hafa koa teo ivelany, dia namboatra an'i Milo
  - type: note
    content: Heb. fiarovana
  - type: text
    content: ' tao an-tanànan''i Davida sady nanao lefona aman''ampinga betsaka izy. '
  '6':
  - type: text
    content: 'Ary nanendry mpifehy miaramila hifehy ny olona izy ka nampiangona azy hankeo aminy teo an-kalalahana akaikin''ny vavahadin''ny tanàna, dia nanao teny famporisihana taminy hoe: '
  '7':
  - type: text
    content: 'Mahereza ka matanjaha; aza matahotra na mivadi-po noho ny mpanjakan''i Asyria sy ny hamaroan''ny olona rehetra izay entiny; fa ny momba antsika dia be noho ny momba azy. '
  '8':
  - type: text
    content: 'Sandry nofo no momba azy, fa Jehovah Andriamanitsika kosa no momba antsika hamonjy antsika ka hiady ny adintsika. Ary dia niankina tamin''ny tenin''i Hezekia, mpanjakan''ny Joda, ny olona. '
  '9':
  - type: text
    content: 'Rehefa afaka izany, dia nirahin''i Sankeriba, mpanjakan''i Asyria, ny mpanompony hankany Jerosalema (fa izy sy ny miaramilany rehetra kosa nanao fahirano an''i Lakisy tamin''izay) ho any amin''i Hezekia, mpanjakan''ny Joda, sy ho any amin''ny Joda rehetra izay tany Jerosalema ka nanao hoe: '
