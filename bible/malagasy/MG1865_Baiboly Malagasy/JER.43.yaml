document_id: JER.43
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandosiran'ny olona nankany Egypta, sy ny teny nampilazain'Andriamanitra ny amin'ny handresen'ny Kaldeana an'i Egypta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa tapitra voalazan''i Jeremia tamin''ny vahoaka rehetra izany teny rehetra avy tamin''i Jehovah Andriamaniny izany, izay nanirahan''i Jehovah Andriamanitra azy holazaina aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia niteny Azaria, zanak''i Hosaia, sy Johanana, zanak''i Karea, mbamin''ny olona mpirehareha rehetra ka niteny tamin''i Jeremia hoe: Mandainga ianao; fa tsy naniraka anao Jehovah Andriamanitsika hilaza hoe: Aza mandeha hivahiny any Egypta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: fa Baroka, zanak'i Neria, no nanome fo anao hamely anay mba hanolotra anay ho eo an-tànan'ny Kaldeana hahafaty anay sy hahalasa anay ho babo any Babylona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra ary ny vahoaka rehetra dia tsy nihaino ny feon''i Jehovah ny amin''ny honenany ao amin''ny tanin''ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra dia nitondra ny sisa rehetra tamin''ny Joda, izay niverina avy tany amin''ny firenena rehetra nandroahana azy honina ao amin''ny tanin''ny Joda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia ny lehilahy sy ny zaza amim-behivavy sy ny vehivavy zanak''andriana ary ny olona rehetra izay navelan''i Nebozaradana, lehiben''ny mpiambina, tao amin''i Gedalia, zanak''i Ahikama, zanak''i Safana, sy tao amin''i Jeremia mpaminany sy Baroka, zanak''i Neria '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ka dia nankany amin'ny tany Egypta izy ireny, fa tsy nihaino ny feon'i Jehovah, ary dia tonga hatrany Tapanesa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia tonga tamin''i Jeremia tao Tapanesa ny tenin''i Jehovah hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mitondrà vato lehibe eny an-tananao, ka afeno ao amin''ny feta ao amin''ny gorodona taila, izay eo akaikin''ny vavahady amin''ny tranon''i Farao ao Tapanesa, eo imason''ny lehilahy amin''ny Joda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro Aho haniraka haka an''i Nebokadnezara, mpanjakan''i Babylona, mpanompoko, ka haoriko amin''ireto vato nafeniko ireto ny seza fiandrianany; ary hamelatra ny lambany tsara tarehy hatao alokaloka eo amboniny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, ho avy izy hamely ny tany Egypta, ka izay ho amin''ny areti-mandringana dia ho amin''ny areti-mandringana, ary izay ho amin''ny fahababoana dia ho amin''ny fahababoana, ary izay ho amin''ny sabatra dia ho amin''ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary handrehitra afo ao amin''ny tranon''ny andriamanitr''i Egypta Aho, ka dia hodorany sy hobaboiny ireo, ary hitafy ny tany Egypta izy toy ny fitafin''ny mpiandry ondry ny lambany; ary hiala any amin''ny fiadanana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary hotorotoroiny ny tsangam-baton-tsampy ao Beti-semesy, izay any amin'ny tany Egypta; ary hodorany amin'ny afo ny tranon'ny andriamanitr'i Egypta.
