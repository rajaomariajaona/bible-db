document_id: 2CH.12,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Rehoboama, rehefa nampandry ny ny fanjakany sady efa nahery, dia nahafoy ny lalan''i Jehovah izy sy ny Isiraely rehetra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary Rehoboama mpanjaka nanao ampinga varahina ho solon''ireny ka nanolotra azy ho eo an-tànan''ny lehiben''ny mpiambina, izay niambina ny varavaran''ny tranon''ny mpanjaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary na oviana na oviana no nidiran''ny mpanjaka tao an-tranon''i Jehovah, dia avy ny mpiambina naka ireo ka namerina azy ho ao an-tranon''ny mpiambina indray. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary raha nanetry tena izy, dia niala taminy ny fahatezeran'i Jehovah ka tsy nahalany ringana azy; sady nisy fahatsaram-panahy koa tamin'ny Joda.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary Rehoboama mpanjaka dia nitombo hery tany Jerosalema, ka dia nanjaka; iraika amby efa-polo taona izy, fony vao nanjaka, ary fito ambin''ny folo taona no nanjakany tany Jerosalema, ilay tanana nofidin''i Jehovah tamin''ny firenen''Isiraely rehetra hampitoerany ny anarany. Ary ny anaran-dreniny dia Nama Amonita. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary nanao ratsy izy, satria tsy nampiomana ny fony hitady an'i Jehovah.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny tantaran-dRehoboama, na ny voalohany na ny farany, tsy efa voasoratra ao amin''ny bokin''i Semaia mpaminany sy Ido mpahita ny amin''ny firazanana va izany? Ary niady mandrakariva Rehoboama sy Jeroboama. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary Rehoboama lasa nodimandry any amin'ny razany, dia nalevina tao an-Tanànan'i Davida izy; ary Abia zanany no nanjaka nandimby azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary tamin''ny taona fahadimy nanjakan-dRehoboama mpanjaka dia niakatra Sisaka, mpanjakan''i Egypta, hamely an''i Jerosalema, fa nivadika tamin''i Jehovah ny mponina tany, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary nitondra kalesy roan-jato amby arivo sy mpitaingin-tsoavaly enina alina izy, ary tsy hita isa ny olona izay nanaraka azy avy tany Egypta, dia ny Lobita sy ny Sokita ary ny Etiopiana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nahafaka ny tanàna mimanda izay any Joda izy ka tonga tany Jerosalema. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Semaia mpaminany tonga tao amin-dRehoboama sy ireo mpanapaka ny Joda, izay tafangona tany Jerosalema noho ny amin''i Sisaka, ka nanao taminy hoe: Izao no lazain''i Jehovah: Hianareo efa nahafoy Ahy, koa Izaho kosa dia mba nahafoy anareo ho eo an-tànan''i Sisaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia niaiky ireo mpanapaka ny Isiraely sy ny mpanjaka ka nanao hoe: Marina Jehovah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nony hitan''i Jehovah fa niaiky izy, dia tonga tao amin''i Semaia indray ny tenin''i Jehovah nanao hoe: Efa niaiky izy, ka dia tsy handringana azy Aho, fa tsy ho ela dia hamonjy azy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fa hamonjeko ihany'
      marker-yv: yv-n
    - type: text
      text: '; ary tsy haidiko amin''i Jerosalema avy amin''ny tànan''i Sisaka ny fahatezerako. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Kanefa ho mpanompony ihany izy, mba hahafantarany ny fanompoana Ahy sy ny fanompoana any amin''ny fanjakana hafa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia niakatra Sisaka, mpanjakan''i Egypta, hamely an''i Jerosalema ka namabo ny rakitry ny tranon''i Jehovah sy ny rakitry ny tranon''ny mpanjaka: samy nobaboiny avokoa izy rehetra; ary nobaboiny koa ny ampinga volamena izay nataon''i Solomona. '
