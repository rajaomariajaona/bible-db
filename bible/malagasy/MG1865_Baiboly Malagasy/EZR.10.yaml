document_id: EZR.10,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary raha mbola nivavaka sy nitsotra Ezra sady nitomany sy niankohoka teo anoloan''ny tranon''Andriamanitra, dia nivory teo aminy ny olona maro be avy tamin''ny Isiraely, na lehilahy, na vehivavy mbamin''ny ankizy madinika; fa nitomany mafy dia mafy koa ny olona. '
  '10':
  - type: text
    content: 'Dia nitsangana Ezra mpisorona ka nanao taminy hoe: Hianareo efa nanao izay mahadiso, satria naka vehivavy hafa firenena ho vadinareo ka nampitombo ny fahadisoan''ny Isiraely. '
  '11':
  - type: text
    content: 'Koa mitsora amin''i Jehovah, Andriamanitry ny razanareo, ka ataovy ny sitrapony; ary misaraha amin''ny olona tompon-tany sy ny vehivavy hafa firenena. '
  '12':
  - type: text
    content: 'Dia namaly ny fiangonana rehetra ka niredona mafy hoe: Izay lazainao dia tsy maintsy hataonay; '
  '13':
  - type: text
    content: 'nefa maro ny olona, ary fahavaratra ny andro, ka tsy mahatoetra etỳ ala-trano izahay, sady raharaha tsy vita indray andro na indroa andro aza izao, fa maro izahay no efa nanota tamin''izany zavatra izany; '
  '14':
  - type: text
    content: 'koa aoka ny mpanapaka anay no hitoetra eto ho solon''ny fiangonana rehetra, ary ny olona rehetra any amin''ny tanànantsika avy izay efa naka vehivavy hafa firenena ho vadiny no aoka hankatỳ amin''izay fotoan''andro hatao, ary hiaraka aminy koa ny loholony isan-tanàna sy ny mpitsara ao, mandra-pahavitan''izany raharaha izany sy ny hialan''ny firehetan''ny fahatezeran''Andriamanitsika amintsika. '
  '15':
  - type: text
    content: 'Jonatana, zanak''i Asahela, sy Jahaza, zanak''i Tikva, ihany no nanohitra izany; ary Mesolama sy Sabetahy Levita niandany taminy koa. '
  '16':
  - type: text
    content: 'Fa ny olona izay efa niverina avy tamin''ny fahababoana kosa dia nanaraka izany; ary voatokana Ezra mpisorona sy ny sasany amin''ny lohan''ny fianakaviana, araka ny fianakaviany avy, sady samy efa notononina anarana, dia nipetraka handinika Izany raharaha izany tamin''ny andro voalohany tamin''ny volana fahafolo. '
  '17':
  - type: text
    content: 'Ary nony tonga ny andro voalohany tamin''ny volana voalohany dia vitany ny raharaha ny amin''ny lehilahy rehetra Izay efa naka vehivavy hafa firenena ho vadiny. '
  '18':
  - type: text
    content: 'Ary ny hita teo amin''ny taranaky ny mpisorona izay efa naka vehivavy hafa firenena ho vadiny dia izao: Ny teo amin''ny taranak''i Jesoa, zanak''i Jozadaka, sy ny rahalahiny dia Mahaseia sy Eliezera sy Jariba ary Gedalia; '
  '19':
  - type: text
    content: 'dia nanola-tanana nanaiky hisaotra ny vadiny izy ireo sy handoa ondriny iray avy ho fanati-panonerany. '
  '2':
  - type: text
    content: 'Dia namaly Sekania, zanak''i Jehiela, isan''ny taranak''i Elama, ka nanao tamin''i Ezra hoe: Izahay efa nanao izay mahadiso amin''Andriamanitsika, fa efa naka vehivavy hafa firenena avy tamin''ny tompon-tany ho vadinay; nefa mbola misy fanantenana ihany ho an''ny Isiraely ny amin''izany zavatra izany. '
  '20':
  - type: text
    content: 'Ary ny avy tamin''ny taranak''Imera dia Hanany sy Zebedia; '
  '21':
  - type: text
    content: 'ary ny avy tamin''ny taranak''i Harima dia Mahaseia sy Elia sy Semaia sy Jehiela ary Ozia; '
  '22':
  - type: text
    content: 'ary ny avy tamin''ny taranak''i Pasora dia Elioenay sy Mahaseia sy Isimaela sy Netanela sy Jozabada ary Elasa. '
  '23':
  - type: text
    content: 'Ary ny avy tamin''ny Levita dia Jozabada sy Simey sy Kelaia (Kelita izany) sy Petahia sy Joda ary Eliezera: '
  '24':
  - type: text
    content: 'ary ny avy tamin''ny mpihira dia Eliasiba; ary ny avy tamin''ny mpiandry varavarana dia Saloma sy Talema ary Ory. '
  '25':
  - type: text
    content: 'Ary ny avy tamin''ny Isiraely koa: ny avy tamin''ny taranak''i Parosy dia Ramia sy Jizia sy Malkia sy Miamina sy Eleazara sy Malkia ary Benaia; '
  '26':
  - type: text
    content: 'ary ny avy tamin''ny taranak''i Elema dia Matania sy Zakaria sy Jehiela sy Abdia sy Jeremota ary Elia; '
  '27':
  - type: text
    content: 'ary ny avy tamin''ny taranak''i Zato dia Elioenay sy Eliasiba sy Matania sy Jeremota sy Zabada ary Aziza; '
  '28':
  - type: text
    content: 'ary ny avy tamin''ny taranak''i Bebay dia Johanana sy Hanania sy Zabay sy Atlay; '
  '29':
  - type: text
    content: 'ary ny avy tamin''ny taranak''i Bany dia Mesolama sy Maloka sy Adaia sy Jasoba sy Seala ary Ramota; '
  '3':
  - type: text
    content: 'Koa aoka izahay hanao fanekena amin''Andriamanitsika hisaotra ny vady rehetra sy hanary izay naterany araka ny anatra nataonao, tompokolahy, sy izay mangovitra noho ny didin''Andriamanitsika; ary aoka hatao araka ny lalàna izany. '
  '30':
  - type: text
    content: 'ary ny avy tamin''ny taranak''i Pahata-moaba dia Adna sy Kelala sy Benaia sy Mahaseia sy Matania sy Bezalila sy Binoy ary Manase; '
  '31':
  - type: text
    content: 'ary ny avy tamin''ny taranak''i Harima dia Eliezera sy Jisia sy Malkia sy Semaia sy Simeona '
  '32':
  - type: text
    content: 'sy Benjamina sy Maloka ary Semaria; '
  '33':
  - type: text
    content: 'ny avy tamin''ny taranak''i Hasoma dia Matenay sy Matata sy Zabada sy Elifeleta sy Jeremay sy Manase ary Simey; '
  '34':
  - type: text
    content: 'ny avy tamin''ny taranak''i Bany dia Maday sy Amrama sy Oela '
  '35':
  - type: text
    content: 'sy Benaia sy Bedeia sy Keloho '
  '36':
  - type: text
    content: 'sy Vania sy Meremota sy Eliasiba '
  '37':
  - type: text
    content: 'sy Matania sy Matenay sy Jasao '
  '38':
  - type: text
    content: 'sy Bany sy Binoy sy Simey '
  '39':
  - type: text
    content: 'sy Selemia sy Natana sy Adaia '
  '4':
  - type: text
    content: 'Mitsangàna, fa adidinao izany; ary indreto koa izahay eto aminao; dia matokia tsara, ka ataovy izany. '
  '40':
  - type: text
    content: 'sy Maknadebay sy Sasay sy Saray '
  '41':
  - type: text
    content: 'sy Azarela sy Selemia sy Semaria '
  '42':
  - type: text
    content: 'sy Saloma sy Amaria ary Josefa; '
  '43':
  - type: text
    content: 'ny avy tamin''ny taranak''i Nebo dia Jeiela sy Matitia sy Zabada sy Zebina sy Jadao sy Joela ary Benaia. '
  '44':
  - type: text
    content: Ireny rehetra ireny no samy efa naka vehivavy hafa firenena ho vadiny avokoa, sady efa niteraka ny vehivavy sasany tamin'ireny
  '5':
  - type: text
    content: 'Dia nitsangana Ezra ka nampianiana ny lohan''ny mpisorona sy ny Levita ary ny Isiraely rehetra hanao araka izany teny izany; dia nianiana ireo. '
  '6':
  - type: text
    content: Dia nitsangana niala teo anoloan'ny tranon'Andriamanitra Ezra ka nankany amin'ny efi-trano nitoeran'i Johanana, zanak'i Eliasiba; ary nony tafiditra tao izy, dia tsy mba nihinan-kanina na nisotro rano, fa nalahelo izy noho ny fahadisoan'ny olona izay efa niverina avy tamin'ny fahababoana.
  '7':
  - type: text
    content: 'Dia nandefa teny eran''i Joda sy Jerosalema ireo ho any amin''ny olona rehetra izay efa niverina avy tamin''ny fahababoana mba hivory any Jerosalema; '
  '8':
  - type: text
    content: ary na iza na iza no tsy tonga amin'ny hateloana araka ny tenin'ny mpanapaka sy ny loholona, dia horobaina
  - type: note
    content: Heb. hatao herema
  - type: text
    content: ' ny fananany rehetra, ary hesorina amin''ny fiangonan''ny olona izay efa niverina avy tamin''ny fahababoana izy. '
  '9':
  - type: text
    content: 'Ary nony tamin''ny andro fahatelo dia vory tany Jerosalema ny lehilahy rehetra tamin''ny Joda sy ny Benjamina, dia tamin''ny andro faharoa-polo tamin''ny volana fahasivy; ary nipetraka teo an-kalalahana akaikin''ny tranon''Andriamanitra ny olona rehetra ka nangovitra noho izany zavatra izany sy noho ny ranonorana be. '
