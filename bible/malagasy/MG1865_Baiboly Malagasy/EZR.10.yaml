document_id: EZR.10
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary raha mbola nivavaka sy nitsotra Ezra sady nitomany sy niankohoka teo anoloan''ny tranon''Andriamanitra, dia nivory teo aminy ny olona maro be avy tamin''ny Isiraely, na lehilahy, na vehivavy mbamin''ny ankizy madinika; fa nitomany mafy dia mafy koa ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia namaly Sekania, zanak''i Jehiela, isan''ny taranak''i Elama, ka nanao tamin''i Ezra hoe: Izahay efa nanao izay mahadiso amin''Andriamanitsika, fa efa naka vehivavy hafa firenena avy tamin''ny tompon-tany ho vadinay; nefa mbola misy fanantenana ihany ho an''ny Isiraely ny amin''izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa aoka izahay hanao fanekena amin''Andriamanitsika hisaotra ny vady rehetra sy hanary izay naterany araka ny anatra nataonao, tompokolahy, sy izay mangovitra noho ny didin''Andriamanitsika; ary aoka hatao araka ny lalàna izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mitsangàna, fa adidinao izany; ary indreto koa izahay eto aminao; dia matokia tsara, ka ataovy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nitsangana Ezra ka nampianiana ny lohan''ny mpisorona sy ny Levita ary ny Isiraely rehetra hanao araka izany teny izany; dia nianiana ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia nitsangana niala teo anoloan'ny tranon'Andriamanitra Ezra ka nankany amin'ny efi-trano nitoeran'i Johanana, zanak'i Eliasiba; ary nony tafiditra tao izy, dia tsy mba nihinan-kanina na nisotro rano, fa nalahelo izy noho ny fahadisoan'ny olona izay efa niverina avy tamin'ny fahababoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandefa teny eran''i Joda sy Jerosalema ireo ho any amin''ny olona rehetra izay efa niverina avy tamin''ny fahababoana mba hivory any Jerosalema; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ary na iza na iza no tsy tonga amin'ny hateloana araka ny tenin'ny mpanapaka sy ny loholona, dia horobaina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hatao herema
    marker-yv: yv-n
  - type: text
    text: ' ny fananany rehetra, ary hesorina amin''ny fiangonan''ny olona izay efa niverina avy tamin''ny fahababoana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony tamin''ny andro fahatelo dia vory tany Jerosalema ny lehilahy rehetra tamin''ny Joda sy ny Benjamina, dia tamin''ny andro faharoa-polo tamin''ny volana fahasivy; ary nipetraka teo an-kalalahana akaikin''ny tranon''Andriamanitra ny olona rehetra ka nangovitra noho izany zavatra izany sy noho ny ranonorana be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nitsangana Ezra mpisorona ka nanao taminy hoe: Hianareo efa nanao izay mahadiso, satria naka vehivavy hafa firenena ho vadinareo ka nampitombo ny fahadisoan''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa mitsora amin''i Jehovah, Andriamanitry ny razanareo, ka ataovy ny sitrapony; ary misaraha amin''ny olona tompon-tany sy ny vehivavy hafa firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia namaly ny fiangonana rehetra ka niredona mafy hoe: Izay lazainao dia tsy maintsy hataonay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'nefa maro ny olona, ary fahavaratra ny andro, ka tsy mahatoetra etỳ ala-trano izahay, sady raharaha tsy vita indray andro na indroa andro aza izao, fa maro izahay no efa nanota tamin''izany zavatra izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'koa aoka ny mpanapaka anay no hitoetra eto ho solon''ny fiangonana rehetra, ary ny olona rehetra any amin''ny tanànantsika avy izay efa naka vehivavy hafa firenena ho vadiny no aoka hankatỳ amin''izay fotoan''andro hatao, ary hiaraka aminy koa ny loholony isan-tanàna sy ny mpitsara ao, mandra-pahavitan''izany raharaha izany sy ny hialan''ny firehetan''ny fahatezeran''Andriamanitsika amintsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jonatana, zanak''i Asahela, sy Jahaza, zanak''i Tikva, ihany no nanohitra izany; ary Mesolama sy Sabetahy Levita niandany taminy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ny olona izay efa niverina avy tamin''ny fahababoana kosa dia nanaraka izany; ary voatokana Ezra mpisorona sy ny sasany amin''ny lohan''ny fianakaviana, araka ny fianakaviany avy, sady samy efa notononina anarana, dia nipetraka handinika Izany raharaha izany tamin''ny andro voalohany tamin''ny volana fahafolo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nony tonga ny andro voalohany tamin''ny volana voalohany dia vitany ny raharaha ny amin''ny lehilahy rehetra Izay efa naka vehivavy hafa firenena ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny hita teo amin''ny taranaky ny mpisorona izay efa naka vehivavy hafa firenena ho vadiny dia izao: Ny teo amin''ny taranak''i Jesoa, zanak''i Jozadaka, sy ny rahalahiny dia Mahaseia sy Eliezera sy Jariba ary Gedalia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia nanola-tanana nanaiky hisaotra ny vadiny izy ireo sy handoa ondriny iray avy ho fanati-panonerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny avy tamin''ny taranak''Imera dia Hanany sy Zebedia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary ny avy tamin''ny taranak''i Harima dia Mahaseia sy Elia sy Semaia sy Jehiela ary Ozia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary ny avy tamin''ny taranak''i Pasora dia Elioenay sy Mahaseia sy Isimaela sy Netanela sy Jozabada ary Elasa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny avy tamin''ny Levita dia Jozabada sy Simey sy Kelaia (Kelita izany) sy Petahia sy Joda ary Eliezera: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary ny avy tamin''ny mpihira dia Eliasiba; ary ny avy tamin''ny mpiandry varavarana dia Saloma sy Talema ary Ory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny avy tamin''ny Isiraely koa: ny avy tamin''ny taranak''i Parosy dia Ramia sy Jizia sy Malkia sy Miamina sy Eleazara sy Malkia ary Benaia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary ny avy tamin''ny taranak''i Elema dia Matania sy Zakaria sy Jehiela sy Abdia sy Jeremota ary Elia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary ny avy tamin''ny taranak''i Zato dia Elioenay sy Eliasiba sy Matania sy Jeremota sy Zabada ary Aziza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary ny avy tamin''ny taranak''i Bebay dia Johanana sy Hanania sy Zabay sy Atlay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary ny avy tamin''ny taranak''i Bany dia Mesolama sy Maloka sy Adaia sy Jasoba sy Seala ary Ramota; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ary ny avy tamin''ny taranak''i Pahata-moaba dia Adna sy Kelala sy Benaia sy Mahaseia sy Matania sy Bezalila sy Binoy ary Manase; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ary ny avy tamin''ny taranak''i Harima dia Eliezera sy Jisia sy Malkia sy Semaia sy Simeona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'sy Benjamina sy Maloka ary Semaria; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ny avy tamin''ny taranak''i Hasoma dia Matenay sy Matata sy Zabada sy Elifeleta sy Jeremay sy Manase ary Simey; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ny avy tamin''ny taranak''i Bany dia Maday sy Amrama sy Oela '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'sy Benaia sy Bedeia sy Keloho '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'sy Vania sy Meremota sy Eliasiba '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'sy Matania sy Matenay sy Jasao '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'sy Bany sy Binoy sy Simey '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'sy Selemia sy Natana sy Adaia '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'sy Maknadebay sy Sasay sy Saray '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'sy Azarela sy Selemia sy Semaria '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'sy Saloma sy Amaria ary Josefa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'ny avy tamin''ny taranak''i Nebo dia Jeiela sy Matitia sy Zabada sy Zebina sy Jadao sy Joela ary Benaia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ireny rehetra ireny no samy efa naka vehivavy hafa firenena ho vadiny avokoa, sady efa niteraka ny vehivavy sasany tamin'ireny
