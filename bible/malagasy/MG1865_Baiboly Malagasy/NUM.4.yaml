document_id: NUM.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny raharahan'ny Levita, sy ny isany isam-pirazanany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alao isa ny taranak''i Kehata eo amin''ny taranak''i Levy, araka ny fokony sy ny fianakaviany, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra miditra amin''ny antokony hanao raharaha ao amin''ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no ho fanompoan''ny taranak''i Kehata ao amin''ny trano-lay fihaonana, dia ny zavatra masina indrindra: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha hifindra ny toby, dia hiditra Arona sy ny zanany ka hampidina ny efitra lamba fanakonana; ary hasarony ny fiaran''ny Vavolombelona''izany; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary hodi-takasy no hataony sarona eo amboniny, ka lamba volon''ondry manga tokam-bolo no hovelariny hasarony eo ambonin''io, dia hataony eo aminy ny baony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hamelatra lamba, volon''ondry manga eo ambonin''ny latabatry ny mofo aseho izy, ka hataony eo ny lovia sy ny lovia kely sy ny kapoaka ary ny fitoeran-divay ho fanidinana; ary ny mofo aseho dia hataony eo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hovelarany lamba jaky eo amboniny izy, ka hosaronany amin''ny sarona hodi-takasy izany; dia hataony eo aminy ny baony. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia haka lamba volon''ondry manga izy, ka hasarony ny fanaovan-jiro fanazavana sy ny lela fanaovan-jirony sy ny hetin-jirony sy ny fitoeran-davenon-jirony ary ny fitoeran-diloilo rehetra eo, izay anaovana ny fanompoam-pivavahana; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary ireo sy ny fanaka rehetra momba azy dia hataony ao anatin''ny sarona hodi-takasy ka hatainginy eo ambonin''ny filanjana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hamelatra lamba manga eo ambonin''ny alitara volamena izy, dia hosaronany sarona hodi-takasy, ary hataony eo aminy ny baony; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia halainy ny fanaka rehetra enti-manompo, dia izay fanaovany fanompoam-pivavahana ao amin''ny fitoerana masina, ka hataony ao anaty lamba volon''ondry manga ka hosaronany sarona hodi-takasy, dia hatainginy eo ambonin''ny filanjana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hanaisotra ny lavenona amin''ny alitara izy ka hamelatra lamba volomparasy eo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hapetrany eo amboniny avokoa ny fanaka rehetra momba azy, izay fanaovana fanompoan-pivavahana eo, dia ny fitondran''afony sy ny fitrebiny sy ny sotron''afony ary ny loviany famafazana, dia ny fanaka rehetra momba ny alitara; ary hovelarany sarona hodi-takasy eo amboniny izy, dia hataony eo aminy ny baony. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa vitan''i Arona sy ny zanany ny manarona ny fitoerana masina sy ny fanaka rehetra momba azy, ka efa hifindra ny toby, dia vao izay no ho avy ny zanak''i Kehata hitondra azy; fa tsy hikasika ny fitoerana masina izy, fandrao maty. Izany zavatra momba ny trano-lay fihaonana izany no ho anjara entan''ny taranak''i Kehata. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny raharahan'i Eleazara, zanak'i Arona mpisorona, dia ny diloilo hatao fanazavana sy ny ditin-kazo mani-pofona sy ny fanatitra hohanina fanao isan'andro ary ny diloilo fanosorana, dia ny raharaha rehetra amin'ny tabernakely sy izay rehetra ao anatiny amin'ny fitoerana masina sy ny fanaka momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ataovy izay tsy hahafongotra ny fokon''ny Kehatita tsy ho amin''ny Levita: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fa izao no hataonareo aminy, mba ho velona izy ka tsy ho faty, raha manatona ny zavatra masina indrindra: Arona ny ny zanany ihany no hahazo miditra ka hanendry azy rehetra samy ho amin''ny fanompoany avy sy amin''ny entany avy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'fa izy dia tsy hiditra hijery ny fitoerana masina, na dia indray mipi-maso akory aza, fandrao maty. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alao isa koa ny taranak''i Gersona, araka ny fianakaviany sy ny fokony avy; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ny hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona no halaminao, dia izay rehetra miditra amin''ny antokony hanao fanompoana ao amin''ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izao no ho fanompoan''ny fokon''ny Gersonita hanompoany sy hitondrany entana: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny ambain''ny tabernakely sy ny trano-lay fihaonana sy ny firakony sy ny sarona hodi-takasy izay eo amboniny, ary ny varavarana lamba amin''ny varavaran''ny trano-lay fihaonana, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary ny fefy lamban''ny kianja sy ny vavahady lamba amin''ny vavahadin''ny kianja, izay manodidina ny tabernakely sy ny alitara, ary ny kofehiny mbamin''ny fiasana rehetra momba azy; ary izay rehetra hatao amin''ireo no ho fanompoany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Araka ny tenin''i Arona sy ny zanany no hanaovan''ny Gersonita ny fanompoany amin''ny entany rehetra sy ny fanompoany rehetra; ary hatolotrao azy ho anjara-raharahany ny zavatra rehetra izay ho entiny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izany no ho fanompoan''ny fokon''ny Gersonita ny amin''ny trano-lay fihaonana; ary ny ho mpifehy azy amin''izany anjara-raharahany izany dia Itamara, zanak''i Arona mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny amin''ny taranak''i Merary, dia araka ny fokony sy ny fianakaviany no handaminanao azy; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ny hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona no halaminao, dia izay rehetra miditra amin''ny antokony hanao ny fanompoana momba ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary izao no ho anjara-raharahany ny amin''ny entana araka ny fanompoany rehetra ao amin''ny trano-lay fihaonana: ny zana-kazo amin''ny tabernakely sy ny barany sy ny andriny sy ny faladiany, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'sy ny tsangantsangan''ny kianja manodidina sy ny faladiany sy ny tsimany rehetra ary ny kofehy momba ny fiasana rehetra sy ny zavatra rehetra enti-manao fanompoana ao; ary araka ny anarany avy no handaminanareo ny fanaka izay anjarany ho entina. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Izany no ho fanompoan''ny fokon''ny taranak''i Merary, araka ny fanompoany rehetra ao amin''ny trano-lay fihaonana, ary Itamara, zanak''i Arona mpisorona, no ho mpifehy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary Mosesy sy Arona ary ny lohan''ny fiangonana nandamina ny taranaky ny Kehatita, araka ny fokony sy ny fianakaviany avy, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra niditra tamin''ny antokony hanao fanompoana ao amin''ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary izay nalamina taminy, araka ny fokony, dia dimam-polo amby fiton-jato sy roa arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ireo no nalamina tamin''ny fokon''ny Kehatita, dia izay rehetra manao fanompoana ao amin''ny trano-lay fihaonana, izay nalamin''i Mosesy sy Arona araka ny didin''i Jehovah nampitondrainy an''i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary izay nalamina tamin''ny taranak''i Gersona, araka ny fokony sy ny fianakaviany, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra niditra amin''ny antokony hanao fanompoana ao amin''ny trano-lay fihaonana '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'izay nalamina taminy, araka ny fokony sy ny fianakaviany, dia telo-polo amby enin-jato sy roa arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ireo no nalamina tamin''ny fokon''ny taranak''i Gersona, izay rehetra manao fanompoana ao amin''ny trano-lay fihaonana, dia izay nalamin''i Mosesy sy Arona araka ny didin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary izay nalamina tamin''ny fokon''ny taranak''i Merary, araka ny fokony sy ny fianakaviany '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra niditra tamin''ny antokony, hanao fanompoana ao amin''ny trano-lay fihaonana, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'izay nalamina taminy, araka ny fokony, dia roan-jato sy telo arivo; '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'ireo no nalamina tamin''ny fokon''ny taranak''i Merary, izay nalamin''i Mosesy sy Arona araka ny didin''i Jehovah izay nampitondrainy an''i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ny tontalin''ny taranak''i Levy izay nalamin''i Mosesy sy Arona mbamin''ny lohan''ny Isiraely, araka ny fokony sy ny fianakaviany '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'hatramin''ny telo-polo taona ka hatramin''ny dimam-polo taona, dia izay rehetra niditra hanao raharaha amin''ny fanompoana sy ny fitondrana entana ao amin''ny trano-lay fihaonana, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'izay nalamina taminy dia valo-polo amby diman-jato sy valo arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Araka ny didin'i Jehovah izay nampitondrainy an'i Mosesy no nandaminany azy samy ho amin'ny fanompoany avy sy ny anjara-entany avy ary ny zavatra nalamina araka izay nandidian'i Jehovah an'i Mosesy.
