document_id: NUM.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny hanaovana somotraviavy amin'ny sisin'ny fitafian'ny Zanak'Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha tonga any amin''ny tany honenanareo izay omeko anareo ianareo '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka manatitra fanatitra atao amin''ny afo ho an''i Jehovah, dia omby na ondry aman''osy hatao fanatitra dorana, na fanatitra hafa alatsa-drà hanalana voady, na amin''ny sitrapo na amin''ny fotoam-pivavahanareo, hanaovana hanitra ankasitrahana ho an''i Jehovah: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'izay manatitra ny fanatiny ho an''i Jehovah dia hanatitra fanatitra hohanina koa, dia koba tsara toto ampahafolon''ny efaha voaharo diloilo ampahefatry ny hina; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary divay ampahefatry ny hina hatao fanatitra aidina no hampombainao ny fanatitra dorana, na ny fanatitra hafa alatsa-drà, amin''ny isan-janak''ondry iray. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ho fanampin''ny isan-ondrilahy iray dia koba tsara toto roa ampahafolon''ny efaha voaharo diloilo ampahatelon''ny hina no haterinao ho fanatitra hohanina; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary divay ampahatelon''ny hina no haterinao ho fanatitra aidina, ho hanitra ankasitrahana ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha manatitra omby ho fanatitra dorana na ho fanatitra hafa alatsa-drà ianao, hanalana voady, na ho fanati-pihavanana ho an''i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia fanatitra hohanina koa no haterinao ho fanampin''ny isan-omby iray, dia koba tsara toto telo ampahafolon''ny efaha voaharo diloilo antsasaky ny hina; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary divay antsasaky ny hina no haterinao ho fanatitra aidina, ho fanatitra atao amin''ny afo, ho hanitra ankasitrahana ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izany no hatao amin''ny isan-omby iray, na ny isan-ondrilahy iray, na ny isan-janak''ondry iray, na ny isan-janak''osy iray. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tahaka izany no hataonareo amin''izy rehetra, araka ny isan''ny zavatra aterinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny tompon-tany rehetra samy hanao ireo zavatra ireo araka izany, raha manatitra fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha misy vahiny eo aminareo, na olona miara-mitoetra aminareo, hatramin''ny taranakareo fara mandimby, ka manatitra fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah izy, dia araka izay ataonareo no hataony. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny amin''ny fiangonana, dia lalàna iray ihany sy fanao iray ihany no ho aminareo sy izay vahiny eo aminareo koa, dia lalàna mandrakizay hatramin''ny taranakareo fara mandimby izany: tsy hisy hafa eo anatrehan''i Jehovah na ianareo na ny vahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lalàna iray ihany sy fanao iray ihany no ho aminareo sy izay vahiny eo aminareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha tonga any amin''ny tany izay itondrako anareo ianareo '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka hihinana mofo avy amin''ny vokatry ny tany, dia hanokana izay ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hanokana mofo iray izay hatao amin''ny voalohan''ny kobanareo voafetafeta ianareo; tahaka izay atokana avy eo amin''ny famoloana no hanokananareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny voalohan''ny kobanareo voafetafeta dia hanomezanareo ho an''i Jehovah hatramin''ny taranakareo fara mandimby. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha manota tsy nahy ianareo ka tsy mankatò ireo didy rehetra ireo, izay nolazain''i Jehovah tamin''i Mosesy, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia izay rehetra nasain''i Jehovah nandidian''i Mosesy anareo, hatramin''ny andro izay nanaovan''i Jehovah izany didy izany ka hatramin''ny taranakareo fara mandimby, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'koa atao tsy nahy izany ka tsy fantatry ny fiangonana; dia hanatitra vantotr''ombilahy iray ny fiangonana rehetra ho fanatitra dorana, ho hanitra ankasitrahana ho an''i Jehovah, mbamin''ny fanatitra hohanina sy ny fanatitra aidina momba azy, araka ny fanao, ary osilahy iray ho fanatitra noho ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny mpisorona dia hanao fanavotana ho an''ny fiangonana, dia ny Zanak''Isiraely rehetra, ka dia havela ny helony, satria natao tsy nahy izany; ary hitondra ny fanatiny izy, dia fanatitra atao amin''ny afo ho an''i Jehovah, ary ny fanatiny noho ny ota, eo anatrehan''i Jehovah, noho ny ota tsy nahy nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia havela ny heloky ny fiangonana, dia ny Zanak'Isiraely rehetra, mbamin'izay vahiny eo aminy; fa nahazo ny olona rehetra izany noho ny ota tsy nahy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha olona iray kosa no manota tsy nahy, dia hanatitra osivavy iray izay iray taona izy ho fanatitra noho ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny mpisorona dia hanao fanavotana ho an''ny olona izay nanota tsy nahy eo anatrehan''i Jehovah, ka dia havela ny helony. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lalàna iray ihany no hatao amin''izay manota tsy nahy, na amin''ny Zanak''Isiraely rehetra, na amin''ny vahiny eo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny olona izay manota sahisahy kosa, na tompon-tany, na vahiny, dia manamavo an''i Jehovah, ka dia hofongorana tsy ho amin''ny fireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa ny tenin'i Jehovah no nohamavoiny, ary ny lalàny no nodikainy, dia hofongorana tokoa izany olona izany; ny helony dia ho aminy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary raha tany an-efitra ny Zanak''Isiraely, dia nahita lehilahy anankiray nanangona kitay hazo tamin''ny andro Sabata. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary izay nahita azy nanangona kitay dia nitondra azy teo amin''i Mosesy sy Arona ary ny fiangonana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nambenana ralehilahy, satria tsy mbola fantatra izay hatao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Hatao maty tokoa izany lehilahy izany; hitora-bato azy eny ivelan''ny toby ny fiangonana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Dia namoaka azy ho eny ivelan'ny toby ny fiangonana rehetra ka nitora-bato azy, ka maty izy, dia araka izay nandidian'i Jehovah an'i Mosesy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Mitenena amin''ny Zanak''Isiraely, ka asaovy asiany somotraviavy ny sisin''ny fitafiany hatramin''ny taranany fara mandimby, ary aoka hasiany kofehy manga eo amin''ny somotraviaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ho somotraviavy ho anareo izany, ka raha jerenareo, dia hotsarovanareo sy hankatoavinareo ny didin''i Jehovah rehetra; ary tsy handeha araka ny fonareo ianareo, na araka ny masonareo, izay andehananareo hijangajangana, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'mba hotsarovanareo sy hankatoavinareo ny didiko rehetra, ka dia ho masina ho an''Andriamanitrareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Izaho no Jehovah Andriamanitrareo, Izay nitondra anareo nivoaka avy tany amin''ny tany Egypta mba ho Andriamanitrareo: Izaho no Jehovah Andriamanitrareo.'
