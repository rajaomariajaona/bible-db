document_id: PSA.25,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Fangatahana fiarovanana sy fitarihana
  - type: text
    content: 'Nataon''i Davida. Aminao, Jehovah ô, no anandratako ny fanahiko. '
  '10':
  - type: text
    content: 'Ny lalan''i Jehovah rehetra dia famindram-po sy fahamarinana amin''izay mitandrina ny fanekeny sy ny teni-vavolombelony. '
  '11':
  - type: text
    content: 'Noho ny anaranao, Jehovah ô, dia mamelà ny heloko, fa lehibe izany. '
  '12':
  - type: text
    content: 'Iza no lehilahy matahotra an''i Jehovah? Izy no hampianariny izay lalana tokony hofidiny. '
  '13':
  - type: text
    content: 'Ny fanahiny hitoetra amin''ny soa; ary ny taranany handova ny tany. '
  '14':
  - type: text
    content: 'Ny fisainan''i Jehovah asehony amin''izay matahotra Azy, ary ny fanekeny no hampahafantariny azy. '
  '15':
  - type: text
    content: Ny masoko mijery an'i Jehovah mandrakariva; fa Izy no nanafaka ny tongotro tamin'ny fandrika harato.
  '16':
  - type: text
    content: 'Todiho aho, ka amindrao fo, fa irery aho ka mahantra. '
  '17':
  - type: text
    content: 'Ny fahorian''ny foko efa mihalehibe; afaho amin''ny fahatereko aho. '
  '18':
  - type: text
    content: 'Jereo ny fahoriako sy ny mavesatra amiko, ka mamelà ny fahotako rehetra. '
  '19':
  - type: text
    content: 'Jereo ny fahavaloko, fa maro izy; ary loza ny fankahalàny ahy. '
  '2':
  - type: text
    content: 'Andriamanitro ô, Hianao no itokiako, aoka tsy ho menatra aho; aoka tsy hifalian''ny fahavaloko aho. '
  '20':
  - type: text
    content: 'Arovy ny fanahiko, ka vonjeo aho; aoka tsy ho menatra aho, fa mialoka aminao. '
  '21':
  - type: text
    content: 'Aoka ny tsi-fisian-tsiny sy ny fahitsiana no hiaro ahy; fa miandry Anao aho. '
  '22':
  - type: text
    content: Andriamanitra ô, afaho ny Isiraely, amin'ny fahoriany rehetra.
  '3':
  - type: text
    content: Eny, tsy hisy ho menatra izay rehetra miandry Anao; fa izay mivadika foana no ho menatra.
  '4':
  - type: text
    content: 'Ampahafantaro ny lalanao aho, Jehovah ô; ampianaro ny sitrakao aho. '
  '5':
  - type: text
    content: 'Tariho amin''ny fahamarinanao aho, ka ampianaro; fa Hianao no Andriamanitry ny famonjena ahy; Hianao no andrasako mandritra ny andro. '
  '6':
  - type: text
    content: 'Tsarovy ny antranao sy ny indrafonao, Jehovah ô, fa hatrizay hatrizay ireny. '
  '7':
  - type: text
    content: Aza ny fahotan'ny fahatanorako, na ny ratsy nataoko, no tsarovanao; fa aoka ho araka ny famindram-ponao no hahatsiarovanao ahy, noho ny fahasoavanao Jehovah ô,
  '8':
  - type: text
    content: 'Tsara sy mahitsy Jehovah, ka izany no ampianarany ny mpanota ny lalana. '
  '9':
  - type: text
    content: 'Mitarika ny mpandefitra amin''ny marina Izy, ary mampianatra ny mpandefitra ny lalany. '
