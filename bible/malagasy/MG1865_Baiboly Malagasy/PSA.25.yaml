document_id: PSA.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salamo abidy. Fangatahana fiarovanana sy fitarihana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nataon''i Davida. Aminao, Jehovah ô, no anandratako ny fanahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Andriamanitro ô, Hianao no itokiako, aoka tsy ho menatra aho; aoka tsy hifalian''ny fahavaloko aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, tsy hisy ho menatra izay rehetra miandry Anao; fa izay mivadika foana no ho menatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ampahafantaro ny lalanao aho, Jehovah ô; ampianaro ny sitrakao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tariho amin''ny fahamarinanao aho, ka ampianaro; fa Hianao no Andriamanitry ny famonjena ahy; Hianao no andrasako mandritra ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsarovy ny antranao sy ny indrafonao, Jehovah ô, fa hatrizay hatrizay ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aza ny fahotan'ny fahatanorako, na ny ratsy nataoko, no tsarovanao; fa aoka ho araka ny famindram-ponao no hahatsiarovanao ahy, noho ny fahasoavanao Jehovah ô,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsara sy mahitsy Jehovah, ka izany no ampianarany ny mpanota ny lalana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mitarika ny mpandefitra amin''ny marina Izy, ary mampianatra ny mpandefitra ny lalany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny lalan''i Jehovah rehetra dia famindram-po sy fahamarinana amin''izay mitandrina ny fanekeny sy ny teni-vavolombelony. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Noho ny anaranao, Jehovah ô, dia mamelà ny heloko, fa lehibe izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Iza no lehilahy matahotra an''i Jehovah? Izy no hampianariny izay lalana tokony hofidiny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny fanahiny hitoetra amin''ny soa; ary ny taranany handova ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny fisainan''i Jehovah asehony amin''izay matahotra Azy, ary ny fanekeny no hampahafantariny azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny masoko mijery an'i Jehovah mandrakariva; fa Izy no nanafaka ny tongotro tamin'ny fandrika harato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Todiho aho, ka amindrao fo, fa irery aho ka mahantra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny fahorian''ny foko efa mihalehibe; afaho amin''ny fahatereko aho. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jereo ny fahoriako sy ny mavesatra amiko, ka mamelà ny fahotako rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jereo ny fahavaloko, fa maro izy; ary loza ny fankahalàny ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Arovy ny fanahiko, ka vonjeo aho; aoka tsy ho menatra aho, fa mialoka aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aoka ny tsi-fisian-tsiny sy ny fahitsiana no hiaro ahy; fa miandry Anao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Andriamanitra ô, afaho ny Isiraely, amin'ny fahoriany rehetra.
