document_id: PSA.65,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an'Andriamanitra noho ny ataony, fa indrindra noho ny anomezany ny vokatry ny tany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an'ny mpiventy hira.Salamo nataon'i Davida. Tonon-kira. Ho anao ny fanginana sy ny fiderana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ny fiononana dia fiderana ankasitrahinao'
      marker-yv: yv-n
    - type: text
      text: ', Andriamanitra any Ziona ô, ary aminao no anefana ny voady. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mahampoka ny tany voasa Hianao ka mampiravona azy; ranonorana mivatravatra no amontosanao azy; mitahy ny fitsimohany Hianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Satrohanao voninahitra ny taona fitahianao; ary ny dianao mitete menaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Vonton-drano ny fiandrasana ondry any an-efitra, ary misikina fifaliana ny havoana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rakotra ondry ny saha; ary voasarona vary ny lohasaha: mihoby izy, eny, mihira koa.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ry Mpihaino vavaka ô, Hianao no hohatonin'ny nofo rehetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny zava-mahameloka ahy dia mihoatra noho izay zakako; nefa Hianao no mamela ny fahadisoanay. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Sambatra izay fidinao ka ampanatoninao hitoetra eo an-kianjanao; Te-ho voky ny zava-tsoa ao amin''ny tranonao izahay dia ny zava-masina ao amin''ny tempolinao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Zava-mahatahotra no ataonao amin''ny fahamarinana ho valin''ny vavakay, ry Andriamanitry ny famonjena anay ô, ry tokin''ny faran''ny tany rehetra sy ny ranomasina eny lavitra eny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mampiorina ny tendrombohitra amin''ny heriny Izy, misikina fahatanjahana Izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mampitsahatra ny firohondrohon''ny onjan-dranomasina Izy, sy ny fitabataban''ny firenena. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia matahotra noho ny famantaranao ny mponina any am-paran''ny tany; ny any amin''ny fiposahan''ny maraina sy ny hariva no ampihobinao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mamangy ny tany Hianao ka mahamando azy; mampahavokatra azy betsaka Hianao - Ny onin''Andriamanitra dia tondra-drano - Mamboatra vary ho an''ny olona Hianao; fa izany no famboatrao ny tany. '
