document_id: PSA.65,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra noho ny ataony, fa indrindra noho ny anomezany ny vokatry ny tany
  - type: text
    content: Ho an'ny mpiventy hira.Salamo nataon'i Davida. Tonon-kira. Ho anao ny fanginana sy ny fiderana
  - type: note
    content: 'Na: Ny fiononana dia fiderana ankasitrahinao'
  - type: text
    content: ', Andriamanitra any Ziona ô, ary aminao no anefana ny voady. '
  '10':
  - type: text
    content: 'Mahampoka ny tany voasa Hianao ka mampiravona azy; ranonorana mivatravatra no amontosanao azy; mitahy ny fitsimohany Hianao. '
  '11':
  - type: text
    content: 'Satrohanao voninahitra ny taona fitahianao; ary ny dianao mitete menaka. '
  '12':
  - type: text
    content: 'Vonton-drano ny fiandrasana ondry any an-efitra, ary misikina fifaliana ny havoana. '
  '13':
  - type: text
    content: 'Rakotra ondry ny saha; ary voasarona vary ny lohasaha: mihoby izy, eny, mihira koa.'
  '2':
  - type: text
    content: Ry Mpihaino vavaka ô, Hianao no hohatonin'ny nofo rehetra.
  '3':
  - type: text
    content: 'Ny zava-mahameloka ahy dia mihoatra noho izay zakako; nefa Hianao no mamela ny fahadisoanay. '
  '4':
  - type: text
    content: 'Sambatra izay fidinao ka ampanatoninao hitoetra eo an-kianjanao; Te-ho voky ny zava-tsoa ao amin''ny tranonao izahay dia ny zava-masina ao amin''ny tempolinao. '
  '5':
  - type: text
    content: 'Zava-mahatahotra no ataonao amin''ny fahamarinana ho valin''ny vavakay, ry Andriamanitry ny famonjena anay ô, ry tokin''ny faran''ny tany rehetra sy ny ranomasina eny lavitra eny. '
  '6':
  - type: text
    content: 'Mampiorina ny tendrombohitra amin''ny heriny Izy, misikina fahatanjahana Izy. '
  '7':
  - type: text
    content: 'Mampitsahatra ny firohondrohon''ny onjan-dranomasina Izy, sy ny fitabataban''ny firenena. '
  '8':
  - type: text
    content: 'Dia matahotra noho ny famantaranao ny mponina any am-paran''ny tany; ny any amin''ny fiposahan''ny maraina sy ny hariva no ampihobinao. '
  '9':
  - type: text
    content: 'Mamangy ny tany Hianao ka mahamando azy; mampahavokatra azy betsaka Hianao - Ny onin''Andriamanitra dia tondra-drano - Mamboatra vary ho an''ny olona Hianao; fa izany no famboatrao ny tany. '
