document_id: NAM.3
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lozan''ny tanàna mpandatsa-drà! Feno lainga sy fandozana izy; Tsy ialan-dremby ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Injany! ny fifiopioky ny karavasy! Ny fikorodondrodon''ny kodia! Ny fikatrokatroky ny soavaly! Ary ny fitraitraiky ny kalesy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He! ny fampiriotry ny mpitaingin-tsoavaly! Akory ny fanelatselatry ny sabatra Sy ny famirapiratry ny lefona! Indrisy ny habetsahan''ny voatrabaka sy ny hamaroan''ny voavono! Tsy hita isa ny faty, Eny, voafingampingan''ny faty ny olona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noho ny habiazan''ny fijangajangan''ikala janga tsara tarehy, Tompovavin''ny fankatovana, Izay mivarotra firenena amin''ny fijangajangany Sy fokom-pirenena amin''ny fankatovany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Indro, hamely anao Aho, hoy Jehovah, Tompon''ny maro; Ary haingaiko ho amin''ny tavanao ny moron-tongotr''akanjonao, Ka hasehoko amin''ny firenena ny fitanjahanao Sy amin''ny fanjakana ny fahamenaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hotsipazako loto ianao Ka hataoko tsinontsinona, Eny, hataoko fitalanjonana ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Arv izay rehetra mijery anao dia handositra anao Ka hanao hoe: Rava Ninive! Iza no hitomany azy? Aiza no hitadiavako izay hampionona anao ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsara noho No-amona va ianao? Ilay nitoetra teo anelanelan'ny ony Ka nohodidinin'ny rano; Ny rano be
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ranomasina
    marker-yv: yv-n
  - type: text
    text: ' no rovany, Ary ny rano be koa no mandany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny Etiopiana sy ny Egyptiana no heriny, Sady tsy hita lany ireny; Ny Lydiana sy ny Libyana no mpanampy azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. anao
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa na izy aza dia lasa, eny, lasan-ko babo; Ny zanany madinika koa notorotoroina teny an-joron-dalambe rehetra eny; Ny olo-malazany nanaovany filokana, Ary ny lehibeny rehetra nogadrana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hianao koa ho mamo ka hiafina, Hianao koa hitady fiarovana mafy hierenao ny fahavalonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny manda mafinao rehetra ho tahaka ny aviavy misy voa mialin-taona: Raha hohozongozonina izy, dia hihintsana ao am-bavan''izay hihinana aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Indro, vehivavy no olonao ao aminao; Hidiran''ny fahavalonao no hidananan''ny vavahadin''ny taninao; Levon''ny afo ny hidinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Manangona rano ho anao ho an''ny fahirano; Hamafio ny mandanao; Mirotsaha amin''ny fotaka, ka hosihoseo ho feta, Amboary ny lafaoro fandoroam-biriky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Any no handevonan''ny afo anao Sy handripahan''ny sabatra anao; Hohaniny toy ny fihinan''ny valalavao ianao; Mihamaroa toy ny valalavao, Mihabetsaha toy ny valala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nataonao betsaka noho ny kintana eny amin'ny lanitra ny mpandrantonao; Mipariaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mandevona'
    marker-yv: yv-n
  - type: text
    text: ' ny valalavao ka lasa manidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny andriananao dia toy ny valala, Ary ny mpifehinao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mpanoratrao'
    marker-yv: yv-n
  - type: text
    text: ' dia toy ny valalavao, Izay mitoby eny amin''ny fefy, raha mangatsiaka ny andro; Fa raha miposaka ny masoandro, dia lasa manidina izy, Ka tsy fantatra izay nalehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rendrehana ny mpiandrinao, ry mpanjakan''i Asyria; Miampatrampatra ny lehilahy maherinao; Aely eny an-tendrombohitra ny olonao. Ka tsy misy mamory azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy mety mihena ny fangirifirianao, Tsy azo sitranina ny ferinao; Izay rehetra ilazana ny nanjo anao dia hiteha-tanana anao; Fa iza no tsy efa tratry ny fandozanao mandrakariva?
