document_id: PRO.11
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny mizana mandainga dia fahavetavetana eo imason'i Jehovah; Fa ny vato marina no ankasitrahany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha tonga ny fiavonavonana, dia tonga koa ny fahafaham-baraka; Fa ao amin'ny manetry tena no misy fahendrena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fahitsian'ny mahitsy no mitarika azy; Fa ny faharatsian'ny mpivadika mahatonga fandringanana amin'ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny harena dia tsy mahasoa amin'ny andro fahatezerana; Fa ny fahamarinana no mamonjy tsy ho azon'ny fahafatesana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny fahamarinan'ny marina mandamina ny alehany; Fa ny ratsy fanahy lavon'ny haratsiany ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahamarinan'ny mahitsy mamonjy azy; Fa ny mpivadika dia voafandriky ny filàny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha maty ny ratsy fanahy, dia foana ny fanantenany, Eny, foana ny fanantenan'ny mpanao ratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mahery'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny marina dia vonjena amin'ny fahoriana; Fa ho avy kosa ny ratsy fanahy hisolo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny vavan'ny mpihatsaravelatsihy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ratsy fanahy'
    marker-yv: yv-n
  - type: text
    text: ' no animbany ny namany; Fa ny fahalalana no hanafahana ny marina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny fahalalan''ny marina no hanafahana ny namany'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha miadana ny marina, dia ravoravo ny tanàna; Fa raha ringana ny ratsy fanahy, dia velona ny hoby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fisaoran
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny fitahiana avy amin'''
    marker-yv: yv-n
  - type: text
    text: '''ny marina no isandratan''ny tanàna; Fa ny vavan''ny ratsy fanahy no aharavany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy ampy saina izay manamavo ny namany; Fa izay hendry dia mangina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mandehandeha manaratsy dia manambara ny hevitra afenina; Fa ny olona mahatoky tsy mba tia lazalaza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha tsy misy mpitondra, dia rava ny firenena; Fa handry fahizay, raha maro ny mpanolo-tsaina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hahita loza tokoa ny mianto-bahiny: Fa mitoetra tsy manana ahiahy ny tsy tia antoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny vehivavy tsara tarehy mahazo dera; Ary ny mpanao an-keriny mahazo harena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny olona mamindra fo dia mahazo soa ho an'ny tenany; Fa ny lozabe dia todin'ny halozany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny ratsy fanahy dia mahazo valiny tsy mahasoa; Fa izay mamafy fahamarinana no mahazo izay tena tambiny tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny tena fahamarinana dia mamantana any amin''ny fiainana; Fa izay fatra-panaraka ny ratsy dia iharan''ny fahafatesana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fahavetavetana eo imason'i Jehovah ny meloka am-po; Fa ankasitrahany kosa izay mandeha tsy misy tsiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Azo itompoana tokoa fa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Azo ifandraisan-tanana fa; na: Hatramin''ny taranaka fara mandimby dia'
    marker-yv: yv-n
  - type: text
    text: ' tsy maintsy hampijalina ny ratsy fanahy; Fa ny taranaky ny marina no hovonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Toy ny kavim-bolamena eo amin'ny oron-kisoa Ny vehivavy tsara tarehy tsy manam-pahendrena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: efa niala tamin''ny fahendrena'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny soa ihany no irin'ny marina; Fa fahatezerana no fanantenan'ny ratsy fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Misy mahafoy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mamafy
    marker-yv: yv-n
  - type: text
    text: ', nefa mitombo fananana ihany; Ary misy fatra-pahihitra loatra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mihazona ny hareny'
    marker-yv: yv-n
  - type: text
    text: ', nefa tonga malahelo ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay manisy soa olona hohatavezina; Ary izay mandena dia mba holemana kosa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Ary izay mampisotro dia mba hampisotroina kosa
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay tsy mamoaka ny variny dia ozonin'ny olona; Fa saotra no ho amin'ny lohan'izay mivarotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay fatra-pikatsaka ny tsara no mitady ny mahafinaritra; Fa izay mitady ny ratsy dia hiharan'izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izay matoky ny hareny dia ho lavo; Fa ny marina ho tahaka ny ravina maitso.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izay mampidi-doza amin'ny ankohonany dia mandova ny rivotra; Ary ny adala dia tonga mpanompon'ny hendry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny vokatry ny marina dia hazon''aina, Ary ny hendry dia mahataona olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Indro, ny marina aza dia valiana etỳ an-tany, Koa mainka fa ny ratsy fanahy sy ny mpanota!
