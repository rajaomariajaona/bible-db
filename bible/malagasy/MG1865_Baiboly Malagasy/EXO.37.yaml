document_id: EXO.37,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Bezalila nanao ny fiara tamin''ny hazo akasia: roa hakiho sy sasany ny lavany, ary iray hakiho sy sasany ny sakany, ary iray hakiho sy sasany ny hahavony; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nanao ny latabatra tamin''ny hazo akasia izy: roa hakiho ny lavany, ary iray hakiho ny sakany, ary iray hakiho sy sasany ny hahavony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nopetahany takela-bolamena tsara izy, sady nasiany koronosy volamena manodidina azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nasiany sisiny vodivoam-pelatanana manodidina azy, ary nasiany koronosy volamena ny sisiny manodidina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nandrendrika vava volamena efatra hatao aminy izy, ka nataony teo amin''ny zorony efatra, izay eo amin''ny tongony efatra, ireo: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'eo akaikin''ny sisiny no nisian''ny vava vola ho fitoeran''ny bao hilanjana ny latabatra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nanao ny bao tamin''ny hazo akasia izy, hilanjana ny latabatra, ka nopetahany takela-bolamena. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary nanao ny fanaka izay eo ambonin'ny latabatra izy, dia ny lovia ny sy ny lovia keliny ary ny kapoakany sy ny fitoeran-divainy ho fanidinam-panatitra; volamena tsara no nanaovany ireo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nanao ny fanaovan-jiro tamin''ny volamena tsara izy; voasana no nanaovany ny fanaovan-jiro; nataony indray mivofy taminy avokoa ny faladiany sy ny tahony sy ny vodi-voniny sy ny kiboriny ary ny voniny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nisy sampany enina tamin''ny ankilany roa, dia sampany telo tamin''ny fanaovan-jiro amin''ny ankilany iray, ary sampany telo tamin''ny fanaovan-jiro amin''ny ankilany iray koa; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'teo amin''ny sampany anankiray nisy vodi-voniny telo natao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny; ary teo amin''ny sampany anankiray koa nisy vodi-voniny telo natao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny; dia toy izany avokoa tamin''ny sampany enina tamin''ny fanaovan-jiro. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary nopetahany takela-bolamena tsara tao anatiny sy teo ivelany; ary nasiany koronosy volamena manodidina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary teo amin''ny fanaovan-jiro dia nisy vodi-voniny efatra natao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'dia kiboriny iray eo ambanin''ny sampany roa sady miray aminy, ary kiboriny iray eo ambanin''ny sampany roa sady miray aminy, ary kiboriny iray eo ambanin''ny sampany roa koa sady miray aminy; dia amin''ny sampany enina izay miray amin''ny fanaovan-jiro. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny kiboriny sy ny sampany dia niray taminy avokoa; natao indray mivofy tamin''ny volamena tsara izy rehetra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nanao ny lela fanaovan-jirony fito sy ny hetin-jirony sy ny fitoeran-davenon-jirony tamin''ny volamena tsara izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Volamena tsara talenta iray no nanaovany azy mbamin'ny fanaka rehetra momba azy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nanao ny alitara fandoroana ditin-kazo manitra tamin''ny hazo akasia izy: iray hakiho avy ny lafiny efatra, dia efa-joro tsy mivadi-mandry izy; ary roa hakiho ny hahavony; ary nataony miray aminy ny tandrony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary nopetahany takela-bolamena tsara izy, dia ny tampony sy ny lafiny manodidina ary ny tandrony; ary nasiany koronosy volamena manodidina. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary nasiany vava volamena roa izy teo ambanin''ny koronosiny, ka nataony teo amin''ny zorony efatra ireo ho fitoeran''ny bao hilanjana azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary hazo akasia no nanaovany ny bao, ka nopetahany takela-bolamena.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary nanao ny diloilo fanosorana masina izy, sy ny zava-manitra manetona madio, asan'ny mpangaroharo zava-manitra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nandrendrika vava volamena efatra hatao aminy izy, ka nataony teo amin''ny tongony efatra: dia vava vola roa teo amin''ny lafiny iray, ary vava vola roa teo amin''ny lafiny iray koa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nanao bao tamin''ny hazo akasia izy, ka nopetahany takela-bolamena. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nampidiriny ny bao ho eo amin''ny vava vola, izay eo amin''ny lafin''ny fiara, hilanjana azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nanao rakotra fanaovam-panavotana tamin''ny volamena tsara izy: roa hakiho sy sasany ny lavany, ary iray hakiho sy sasany ny sakany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nanao kerobima volamena roa izy; voasana no nanaovany azy roa miray amin''ny lohany roa amin''ny rakotra fanaovam-panavotana: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia ny kerobima iray nataony teo amin''ny sakany anankiray, ary ny kerobima iray kosa teo amin''ny sakany anankiray: indray mivofy tamin''ny rakotra fanaovam-panavotana no nanaovany ny kerobima roa, dia teo amin''ny sakany roa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ny elatry ny kerobima nivelatra teo ambony, ka nalofan''ny elany ny rakotra fanaovam-panavotana; ary ny tavany nifanatrika, sady nanatrika ny rakotra fanaovam-panavotana koa izy. '
