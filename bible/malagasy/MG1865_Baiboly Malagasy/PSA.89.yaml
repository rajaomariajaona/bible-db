document_id: PSA.89
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiderana an'Andriamanitra noho ny fahatsarany, indrindra fa noho ny fanekeny tamin'i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Maskila nataon''i Etana Ezrahita. Ny famindram-pon''i Jehovah no hohiraiko mandrakizay; Hatramin''ny taranaka fara mandimby no hampahafantaran''ny vavako ny fahamarinanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa hoy izaho Hotovonana mandrakizay ny famindram-po; Ny fahamarinanao hampitoerinao any an-danitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Efa nanao fanekena tamin''ny voafidiko Aho; Eny, efa nianiana tamin''i Davida mpanompoko Aho hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hampitoetra ny taranakao ho mandrakizay Aho Ka hanangana ny seza fiandriananao hatramin''ny taranaka fara mandimby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny lanitra hidera ny fahagagana ataonao, Jehovah ô, Ary ny fahamarinanao koa ao amin''ny fiangonan''ny olo-masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa iza any an-danitra no mitovy amin''i Jehovah? Ary iza amin''ny zanak''ireo andriamanitra no manahaka an''i Jehovah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia Andriamanitra mahatahotra indrindra eo amin''ny fiangonan''ny olo-masiny Ary hajain''izay rehetra manodidina Azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jehovah, Andriamanitry ny maro, ô, iza no mahery tahaka Anao, Jehovah? Ary manodidina Anao ny fahamarinanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hianao manapaka ny fisavoan''ny ranomasina; Raha manonja ny alony, dia mampitsahatra azy Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hianao nanorotoro an-dRahaba ho tahaka izay voavono; Ny sandrinao mahery no nampielezanao ny fahavalonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Anao ny lanitra, Anao koa ny tany; Izao tontolo izao sy izay rehetra eo aminy. Hianao no nanorina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny avaratra sy ny atsimo. Hianao no nahary azy; Ny anaranao no ihobian''i Tabara sy Hermona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Manan-tsandry mahery Hianao; Mahery ny tananao, avo ny tananao ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rariny sy fitsarana no fanorenan'ny seza fiandriananao; Famindram-po sy fahamarinana no mialoha ny tavanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Sambatra izay olona mahalala ny feo mahafaly; Jehovah ô, amin''ny fahazavan''ny tavanao no handehanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny anaranao no hifaliany mandrakariva; Ary ny fahamarinanao no hisandratany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa voninahitry ny heriny Hianao; Ary amin''ny fankasitrahanao no hisandratan''ny tandrokay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa an'i Jehovah ny ampinganay; Ary an'ny Iray Masin'ny Isiraely ny mpanjakanay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tamin''izany ny olonao masina dia nilazanao tamin''ny fahitana hoe: Nametraka famonjena tamin''izay mahery Aho Ary nanandratra ny anankiray voafidy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nanandratra zatovo avy'
    marker-yv: yv-n
  - type: text
    text: ' tamin''ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Efa nahita an''i Davida mpanompoko Aho; Ny diloiloko masina no nanosorako azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izy no homban''ny tanako; Eny, ny sandriko no hampahery azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy hamitaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hitaky trosa aminy'
    marker-yv: yv-n
  - type: text
    text: ' azy ny fahavalo; Ary tsy hampahory azy ny ratsy fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa handripaka ny fahavalony eo anoloan''ny tavany Aho Sady hamely izay mankahala azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny fahamarinako sy ny famindram-poko homba azy; Ary ny anarako no hisandratan''ny tandrony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hampitoetra ny tànany amin''ny ranomasina Aho Ary ny tànany ankavanana amin''ny ony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izy hiantso Ahy hoe: Raiko Hianao, Andriamanitro sy Vatolampin''ny famonjena ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Izaho kosa hanao azy ho lahimatoa, Ambony indrindra amin''ny mpanjakan''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hitahiry ny famindram-poko ho azy mandrakizay Aho, Ary ny fanekeko hampaharetiko aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hampaharitra ny taranany ho mandrakizay Aho, Ary ny seza fiandrianany ho tahaka ny faharetan''ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha mahafoy ny lalàko ny zanany Ka tsy mandeha araka ny fitsipiko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha ny teniko no ataony ho fahavetavetana, Ary ny didiko no tsy tandremany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia hovaliako tsorakazo ny fahadisoany, Ary kapoka ny helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nefa ny famindram-poko tsy hofoanako aminy, Ary ny fahamarinako tsy havadiko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny fanekeko tsy hotsoahako, Ary ny nolazain''ny molotro tsy hovako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izao zavatra iray loha izao no nianianako tamin''ny fahamasinako, Tsy handainga amin''i Davida mihitsy Aho: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny taranany haharitra mandrakizay, Ary ny seza fiandrianany ho tahaka ny masoandro eo anatrehako; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Hampitoerina mandrakizay tahaka ny volana izy, Tahaka ny vavolombelona marina any an-danitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary ny vavolombelona any an-danitra dia marina'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa efa narianao sy nolavinao izy; Efa tezitra tamin''ny voahosotrao Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Efa nahafoana ny fanekena tamin''ny mpanomponao Hianao; Efa nataonao ho fahavetavetana ny satro-boninahiny ka narianao teny an-tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Efa noravanao ny fefiny rehetra; Efa nosimbanao ny fiarovany mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Izay rehetra mandalo eny an-dalana dia manimba azy; Efa fandà-tsan''ny mpiray monina aminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Efa nampisandratra ny tanana ankavanan''ny rafilahiny Hianao Ary efa nampifaly ny fahavalony rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Efa nampihemotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nampilefitra'
    marker-yv: yv-n
  - type: text
    text: ' ny lelan''ny sabany Hianao Ka tsy nampaharitra azy tamin''ny ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Efa nampitsahatra ny voninahiny Hianao Ka nanongana ny seza fiandrianany ho amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Efa nahafohy ny andron''ny fahatanorany Hianao Ary efa nanaron-kenatra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mandra-pahoviana, Jehovah ô? Hiery mandrakizay va Hianao? Mirehitra tahaka ny afo va ny fahatezeranao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Tsarovy ny hafohin''ny androko; Toa zava-poana mihitsy ny namoronanao ny zanak''olombelona rehetra! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Iza no olona ho velona tsy hahita fahafatesana, Fa hamonjy ny fanahiny tsy ho azon'ny tanan'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Tompo ô, aiza ny famindram-ponao fahiny, Izay nianiananao tamin''i Davida tamin''ny fahamarinanao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Tompo ô, tsarovy ny latsa manjo ny mpanomponao, Ny tratrako vesaran''ny firenena rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Dia ny nandatsan''ny fahavalonao, Jehovah ô, Eny, ny nandatsany ny dian''ny voahosotrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Isaorana mandrakizay anie Jehovah. Amena dia Amena.
