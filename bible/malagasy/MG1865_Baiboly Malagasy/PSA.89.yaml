document_id: PSA.89,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra noho ny fahatsarany, indrindra fa noho ny fanekeny tamin'i Davida
  - type: text
    content: 'Maskila nataon''i Etana Ezrahita. Ny famindram-pon''i Jehovah no hohiraiko mandrakizay; Hatramin''ny taranaka fara mandimby no hampahafantaran''ny vavako ny fahamarinanao. '
  '10':
  - type: text
    content: 'Hianao nanorotoro an-dRahaba ho tahaka izay voavono; Ny sandrinao mahery no nampielezanao ny fahavalonao. '
  '11':
  - type: text
    content: 'Anao ny lanitra, Anao koa ny tany; Izao tontolo izao sy izay rehetra eo aminy. Hianao no nanorina azy. '
  '12':
  - type: text
    content: 'Ny avaratra sy ny atsimo. Hianao no nahary azy; Ny anaranao no ihobian''i Tabara sy Hermona. '
  '13':
  - type: text
    content: 'Manan-tsandry mahery Hianao; Mahery ny tananao, avo ny tananao ankavanana. '
  '14':
  - type: text
    content: Rariny sy fitsarana no fanorenan'ny seza fiandriananao; Famindram-po sy fahamarinana no mialoha ny tavanao.
  '15':
  - type: text
    content: 'Sambatra izay olona mahalala ny feo mahafaly; Jehovah ô, amin''ny fahazavan''ny tavanao no handehanany. '
  '16':
  - type: text
    content: 'Ny anaranao no hifaliany mandrakariva; Ary ny fahamarinanao no hisandratany. '
  '17':
  - type: text
    content: 'Fa voninahitry ny heriny Hianao; Ary amin''ny fankasitrahanao no hisandratan''ny tandrokay. '
  '18':
  - type: text
    content: Fa an'i Jehovah ny ampinganay; Ary an'ny Iray Masin'ny Isiraely ny mpanjakanay.
  '19':
  - type: text
    content: 'Tamin''izany ny olonao masina dia nilazanao tamin''ny fahitana hoe: Nametraka famonjena tamin''izay mahery Aho Ary nanandratra ny anankiray voafidy'
  - type: note
    content: 'Na: nanandratra zatovo avy'
  - type: text
    content: ' tamin''ny olona. '
  '2':
  - type: text
    content: Fa hoy izaho Hotovonana mandrakizay ny famindram-po; Ny fahamarinanao hampitoerinao any an-danitra.
  '20':
  - type: text
    content: 'Efa nahita an''i Davida mpanompoko Aho; Ny diloiloko masina no nanosorako azy; '
  '21':
  - type: text
    content: 'Izy no homban''ny tanako; Eny, ny sandriko no hampahery azy. '
  '22':
  - type: text
    content: Tsy hamitaka
  - type: note
    content: 'Na: hitaky trosa aminy'
  - type: text
    content: ' azy ny fahavalo; Ary tsy hampahory azy ny ratsy fanahy. '
  '23':
  - type: text
    content: 'Fa handripaka ny fahavalony eo anoloan''ny tavany Aho Sady hamely izay mankahala azy. '
  '24':
  - type: text
    content: 'Ny fahamarinako sy ny famindram-poko homba azy; Ary ny anarako no hisandratan''ny tandrony. '
  '25':
  - type: text
    content: 'Dia hampitoetra ny tànany amin''ny ranomasina Aho Ary ny tànany ankavanana amin''ny ony. '
  '26':
  - type: text
    content: 'Izy hiantso Ahy hoe: Raiko Hianao, Andriamanitro sy Vatolampin''ny famonjena ahy. '
  '27':
  - type: text
    content: 'Ary Izaho kosa hanao azy ho lahimatoa, Ambony indrindra amin''ny mpanjakan''ny tany. '
  '28':
  - type: text
    content: 'Hitahiry ny famindram-poko ho azy mandrakizay Aho, Ary ny fanekeko hampaharetiko aminy. '
  '29':
  - type: text
    content: 'Hampaharitra ny taranany ho mandrakizay Aho, Ary ny seza fiandrianany ho tahaka ny faharetan''ny lanitra. '
  '3':
  - type: text
    content: 'Efa nanao fanekena tamin''ny voafidiko Aho; Eny, efa nianiana tamin''i Davida mpanompoko Aho hoe: '
  '30':
  - type: text
    content: 'Raha mahafoy ny lalàko ny zanany Ka tsy mandeha araka ny fitsipiko, '
  '31':
  - type: text
    content: 'Raha ny teniko no ataony ho fahavetavetana, Ary ny didiko no tsy tandremany, '
  '32':
  - type: text
    content: 'Dia hovaliako tsorakazo ny fahadisoany, Ary kapoka ny helony. '
  '33':
  - type: text
    content: 'Nefa ny famindram-poko tsy hofoanako aminy, Ary ny fahamarinako tsy havadiko, '
  '34':
  - type: text
    content: 'Ny fanekeko tsy hotsoahako, Ary ny nolazain''ny molotro tsy hovako. '
  '35':
  - type: text
    content: 'Izao zavatra iray loha izao no nianianako tamin''ny fahamasinako, Tsy handainga amin''i Davida mihitsy Aho: '
  '36':
  - type: text
    content: 'Ny taranany haharitra mandrakizay, Ary ny seza fiandrianany ho tahaka ny masoandro eo anatrehako; '
  '37':
  - type: text
    content: Hampitoerina mandrakizay tahaka ny volana izy, Tahaka ny vavolombelona marina any an-danitra
  - type: note
    content: 'Na: Ary ny vavolombelona any an-danitra dia marina'
  - type: text
    content: .
  '38':
  - type: text
    content: 'Fa efa narianao sy nolavinao izy; Efa tezitra tamin''ny voahosotrao Hianao. '
  '39':
  - type: text
    content: 'Efa nahafoana ny fanekena tamin''ny mpanomponao Hianao; Efa nataonao ho fahavetavetana ny satro-boninahiny ka narianao teny an-tany. '
  '4':
  - type: text
    content: 'Hampitoetra ny taranakao ho mandrakizay Aho Ka hanangana ny seza fiandriananao hatramin''ny taranaka fara mandimby. '
  '40':
  - type: text
    content: 'Efa noravanao ny fefiny rehetra; Efa nosimbanao ny fiarovany mafy. '
  '41':
  - type: text
    content: 'Izay rehetra mandalo eny an-dalana dia manimba azy; Efa fandà-tsan''ny mpiray monina aminy izy. '
  '42':
  - type: text
    content: 'Efa nampisandratra ny tanana ankavanan''ny rafilahiny Hianao Ary efa nampifaly ny fahavalony rehetra. '
  '43':
  - type: text
    content: Efa nampihemotra
  - type: note
    content: 'Na: nampilefitra'
  - type: text
    content: ' ny lelan''ny sabany Hianao Ka tsy nampaharitra azy tamin''ny ady. '
  '44':
  - type: text
    content: 'Efa nampitsahatra ny voninahiny Hianao Ka nanongana ny seza fiandrianany ho amin''ny tany. '
  '45':
  - type: text
    content: 'Efa nahafohy ny andron''ny fahatanorany Hianao Ary efa nanaron-kenatra azy. '
  '46':
  - type: text
    content: 'Mandra-pahoviana, Jehovah ô? Hiery mandrakizay va Hianao? Mirehitra tahaka ny afo va ny fahatezeranao? '
  '47':
  - type: text
    content: 'Tsarovy ny hafohin''ny androko; Toa zava-poana mihitsy ny namoronanao ny zanak''olombelona rehetra! '
  '48':
  - type: text
    content: Iza no olona ho velona tsy hahita fahafatesana, Fa hamonjy ny fanahiny tsy ho azon'ny tanan'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: '? '
  '49':
  - type: text
    content: 'Tompo ô, aiza ny famindram-ponao fahiny, Izay nianiananao tamin''i Davida tamin''ny fahamarinanao? '
  '5':
  - type: text
    content: 'Ary ny lanitra hidera ny fahagagana ataonao, Jehovah ô, Ary ny fahamarinanao koa ao amin''ny fiangonan''ny olo-masina. '
  '50':
  - type: text
    content: 'Tompo ô, tsarovy ny latsa manjo ny mpanomponao, Ny tratrako vesaran''ny firenena rehetra, '
  '51':
  - type: text
    content: 'Dia ny nandatsan''ny fahavalonao, Jehovah ô, Eny, ny nandatsany ny dian''ny voahosotrao. '
  '52':
  - type: text
    content: Isaorana mandrakizay anie Jehovah. Amena dia Amena.
  '6':
  - type: text
    content: 'Fa iza any an-danitra no mitovy amin''i Jehovah? Ary iza amin''ny zanak''ireo andriamanitra no manahaka an''i Jehovah, '
  '7':
  - type: text
    content: 'Dia Andriamanitra mahatahotra indrindra eo amin''ny fiangonan''ny olo-masiny Ary hajain''izay rehetra manodidina Azy? '
  '8':
  - type: text
    content: 'Jehovah, Andriamanitry ny maro, ô, iza no mahery tahaka Anao, Jehovah? Ary manodidina Anao ny fahamarinanao. '
  '9':
  - type: text
    content: 'Hianao manapaka ny fisavoan''ny ranomasina; Raha manonja ny alony, dia mampitsahatra azy Hianao. '
