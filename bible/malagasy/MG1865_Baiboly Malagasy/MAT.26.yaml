document_id: MAT.26
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa vitan''i Jesosy izany teny rehetra izany, dia nilaza tamin''ny mpianany hoe Izy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatrareo fa raha afaka indroa andro, dia ho tonga ny Paska, koa ny Zanak''olona dia hatolotra hohomboana amin''ny hazo fijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tamin''izany dia nivory ny lohan''ny mpisorona sy ny loholona tao an-kianjan''ny tranon''ny mpisoronabe atao hoe Kaiafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary niara-nihevitra izy hisambotra an''i Jesosy amin''ny fitaka ka hamono Azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'kanefa hoy izy: Tsy amin''ny andro firavoravoana, fandrao hisy tabataba amin''ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony tany Betania Jesosy, tao an-tranon''i Simona boka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia nanatona Azy ny vehivavy anankiray nitondra tavoara alabastara feno menaka manitra saro-bidy loatra, ka naidiny tamin''ny lohany izany, raha nipetraka nihinana Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa nony nahita izany ny mpianatra, dia tezitra ka nanao hoe: Inona no anton''izao fandaniam-poana izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa azo namidy ho lafo be iny ka homena ny malahelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary fantatr''i Jesosy izay nataon''ireo, ka dia hoy Izy taminy: Nahoana ianareo no mampalahelo an-dravehivavy? fa asa soa no nataony tamiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny malahelo dia eto aminareo mandrakariva, fa Izaho tsy mba ho eto aminareo mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izy no nampidina izany menaka manitra izany tamin''ny tenako, dia ny hamboatra Ahy halevina no nanaovany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Na aiza na aiza amin''izao tontolo izao no hitoriana ity filazantsara ity, dia holazaina koa izay nataon-dravehivavy mba ho fahatsiarovana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny anankiray tamin''ny roa ambin''ny folo lahy, atao hoe Jodasy Iskariota, dia nankao amin''ny lohan''ny mpisorona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka nanao hoe: Homenareo hoatrinona aho hanolorako Azy aminareo? Ary izy nandanja sekely volafotsy telo-polo homena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hatramin'izay no nitadiavany izay andro hahazoany mamadika Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary tamin''ny voalohan''ny andro fihinanana ny mofo tsy misy masirasira dia nankeo amin''i Jesosy ny mpianatra ka nanao hoe: Aiza no tianao hamboarinay hihinananao ny Paska? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Izy: Mankanesa any an-tanàna ho any amin-dralehilahy, ka lazao aminy hoe: Hoy ny Mpampianatra: Efa akaiky ny fotoako; koa ato aminao Aho sy ny mpianatro no hitandrina ny Paska. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny mpianatra dia nanao araka ny nasain''i Jesosy nataony ka namboatra ny Paska. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nony hariva ny andro, dia nipetraka nihinana Izy mbamin'ny mpianatra roa ambin'ny folo lahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (mbamin''ny roa ambin''ny folo lahy)'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary raha mbola nihinana izy, dia hoy Jesosy: Lazaiko aminareo marina tokoa fa ny anankiray aminareo hamadika Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nalahelo indrindra izy rehetra, ka samy nanontany Azy hoe: Moa izaho va izany, Tompoko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Izy namaly ka nanao hoe: Izay niara-nanatsoboka ny tànany tamiko tao anatin''ny lovia, izy no hamadika Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny Zanak''olona dia mandeha tokoa araka izay nanoratana Azy, nefa lozan''izay olona hahazoana ny Zanak''olona hatolotra! tsara ho an''izany olona izany raha tsy ary akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Jodasy, izay namadika Azy, dia namaly ka nanao hoe: Izaho va izany, Raby ô? Dia hoy Izy taminy: Voalazanao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha mbola nihinana izy, dia nandray mofo Jesosy, ka nony efa nisaotra Izy, dia novakiny ka natolony ny mpianatra, ary hoy Izy: Raiso, hano, ity no tenako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nandray kapoaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (ny kapoaka)'
    marker-yv: yv-n
  - type: text
    text: ' Izy, ka nony efa nisaotra, dia natolony azy ka nataony hoe: Sotroinareo rehetra ity; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: fa ity no rako, dia ny amin'ny fanekena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (ny fanekena vaovao)'
    marker-yv: yv-n
  - type: text
    text: ', izay alatsaka ho an''ny maro ho famelan-keloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary lazaiko aminareo fa hatramin''izao dia tsy mba hisotro itony vokatry ny voaloboka itony intsony Aho mandra-pihavin''ny andro hiarahako misotro izay vaovao aminareo any amin''ny fanjakan''ny Raiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary rehefa nihira fiderana izy, dia lasa nankany amin''ny tendrombohitra Oliva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary tamin''izany dia hoy Jesosy taminy: Hianareo rehetra dia ho tafintohina noho ny amiko anio alina; fa voasoratra hoe: Hamely ny mpiandry Aho, dia hihahaka ny ondry andrasana (Zak. 13. 7). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa rehefa atsangana Aho, dia hialoha anareo ho any Galilia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa Petera namaly ka nanao taminy hoe: Na dia ho tafintohina noho ny aminao aza ny olona rehetra, izaho tsy mba ho tafintohina mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hoy Jesosy taminy: Lazaiko aminao marina tokoa fa anio alina, raha tsy mbola misy akoho maneno, dia handà Ahy intelo ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Hoy Petera taminy: Na dia hiara-maty aminao aza aho, tsy mba handà Anao tokoa aho. Ary toy izany koa no nolazain''ny mpianatra rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary Jesosy mbamin''ny mpianany dia tonga tao amin''ny saha anankiray atao hoe Getsemane, ary hoy Izy tamin''ny mpianany: Mipetraha eto aloha ianareo, raha mbola mankeroa hivavaka Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nitondra an''i Petera mbamin''izy roa lahy zanak''i Zebedio Izy, dia nalahelo am-po sy ory indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy Izy taminy: Fadiranovana loatra ny fanahiko, toy ny efa ho faty; mitoera eto, ka miaraha miari-tory amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary nony nandroso kelikely Izy, dia niankohoka ka nivavaka hoe: Raiko ô, raha azo atao, dia aoka hesorina amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao, fa ny Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nankeo amin''ny mpianatra Izy ka nahita azy matory, dia hoy Izy tamin''i Petera: Hay! tsy mahazaka ny miara-miari-tory amiko na dia ora iray ihany aza ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Miareta tory sy mivavaha ianareo, mba tsy hidiranareo amin''ny fakam-panahy; mety ihany ny fanahy, fa ny nofo no tsy manan-kery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nandeha fanindroany Izy ka nivavaka hoe: Raiko ô, raha tsy azo esorina ity, fa tsy maintsy hosotroiko, dia aoka ny sitraponao no hatao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary nony tonga Izy, dia nahita azy matory indray; fa efa nilondolondo ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary rehefa nandao azy Izy ka lasa indray, dia nivavaka fanintelony ka nanao izany teny izany ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia nankeo amin''ny mpianatra Izy ka nanao taminy hoe: Matoria ary ankehitriny, ka mialà sasatra ianareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Mbola matory ihany va ianareo ka miala sasatra?'
    marker-yv: yv-n
  - type: text
    text: '; indro, efa akaiky ny ora, ary ny Zanak''olona hatolotra eo an-tànan''ny mpanota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mitsangàna, andeha isika; indro fa efa akaiky ilay mamadika Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary raha mbola niteny Jesosy, indro, avy Jodasy, izay isan''ny roa ambin''ny folo lahy, mbamin''ny vahoaka betsaka niaraka taminy, nitondra sabatra sy langilangy, nirahin''ny lohan''ny mpisorona sy ny loholona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary ilay namadika Azy nanome famantarana ny olona ka nanao hoe: Izay horohako no Izy; sambory Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary niaraka tamin''izay dia nanatona an''i Jesosy izy ka nanao hoe: Finaritra, Raby! dia nanoroka Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ry sakaiza, ataovy izay nalehanao eto'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: haninona eto ianao?'
    marker-yv: yv-n
  - type: text
    text: '. Dia nanatona ny olona ka nisambotra an''i Jesosy ary nitana Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary, indro, ny anankiray tamin''izay nomba an''i Jesosy naninjitra ny tànany, dia nanatsoaka ny sabany ka nikapa ny mpanompon''ny mpisoronabe ary nahafaka ny sofiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ampidiro amin''ny tranony ny sabatrao; fa izay rehetra mandray sabatra no hovonoina amin''ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary ataonao va fa tsy mahazo mangataka amin''ny Raiko Aho, dia haniraka anjely tsy omby roa ambin''ny folo legiona ho etỳ amiko Izy ankehitriny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Raha izany, dia hatao ahoana no hahatanteraka ny Soratra Masina, izay milaza fa tsy maintsy ho tonga izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary tamin''izany ora izany dia niteny tamin''ny vahoaka Jesosy ka nanao hoe: Mivoaka mitondra sabatra sy langilangy hisambotra Ahy toy ny hisambotra jiolahy va ianareo? Isan''andro dia nipetraka nampianatra teo an-kianjan''ny tempoly Aho, nefa tsy nisambotra Ahy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Fa izany rehetra izany dia tonga mba hahatanteraka izay voasoratry ny mpaminany. Ary tamin'izany dia nandao Azy ny mpianatra rehetra ka nandositra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary izay efa nisambotra an''i Jesosy dia nitondra Azy ho any amin''i Kaiafa mpisoronabe, izay nivorian''ny mpanora-dalàna sy ny loholona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ary Petera nanaraka Azy teny lavidavitra eny hatrany amin''ny kianjan''ny tranon''ny mpisoronabe; ary niditra izy, dia niara-nipetraka tao amin''ny mpiandry raharaha mba hahita izay hiafarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary ny lohan''ny mpisorona mbamin''ny Synedriona rehetra nitady teny ho entiny hiampanga lainga an''i Jesosy mba hamonoany Azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'fa tsy nahita izy, na dia maro aza ny vavolombelona mandainga tonga teo. Ary nony farany dia nisy roa lahy tonga teo, izay nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ilehity nanao hoe: Mahay mandrava ny tempolin''Andriamanitra Aho sy manangana azy amin''ny hateloana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Dia nitsangana ny mpisoronabe ka nanao tamin''i Jesosy hoe: Tsy mety mamaly akory va Hianao? Inona no iampangan''ireto Anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Nefa tsy niteny Jesosy. Dia hoy ny mpisoronabe taminy: Ampianianiko amin''Andriamanitra velona Hianao hilaza aminay, raha Hianao no Kristy, Zanak''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Hoy Jesosy taminy: Voalazanao; ary koa, lazaiko aminareo: Hatramin''izao dia ho hitanareo ny Zanak''olona mipetraka eo amin''ny tanana ankavanan''ny Hery sy avy eo amin''ny rahon''ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Ary tamin''izany ny mpisoronabe dia nandriatra ny fitafiany ka nanao hoe: Efa niteny ratsy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. blasfemia, izahao 9. 3
    marker-yv: yv-n
  - type: text
    text: ' Izy; ahoana no mbola ilantsika vavolombelona indray? indro, efa renareo izao fitenenan-dratsy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. blasfemia, izahao 9. 3
    marker-yv: yv-n
  - type: text
    text: ' izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ahoana no hevitrareo? Ary ireo namaly ka nanao hoe: Miendrika hohelohina ho faty Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Dia nororany ny tavany, ka nasiany totohondry Izy; ary ny sasany namely tahamaina Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'ka nanao hoe: Maminania aminay, ry Kristy, iza no namely Anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Ary Petera nipetraka teo ivelany, teo an-kianja, dia nanatona azy ny ankizivavy anankiray ka nanao hoe: Hianao koa nomba an''i Jesosy, ilay Galiliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Fa izy nandà teo anatrehan''izy rehetra ka nanao hoe: Tsy azoko izay lazainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Ary nony niala ho eo am-bavahady izy, dia nahita azy ny ankizivavy anankiray koa ka nilaza tamin''izay teo hoe: Ity koa nomba an''i Jesosy avy any Nazareta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Ary nandà indray tamin''ny fianianana izy ka nanao hoe: Tsy fantatro izany Lehilahy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Ary nony afaka kelikely, dia nanatona izay nijanona teo ka nanao tamin''i Petera hoe: Marina tokoa fa naman''ireny ianao; fa ny fiteninao miampanga anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'Dia vao niozona sy nianiana izy ka nanao hoe: Tsy fantatro izany Lehilahy izany; ary niaraka tamin''izay dia nisy akoho naneno. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Ary Petera nahatsiaro ny tenin''i Jesosy, izay nolazainy hoe: Raha tsy mbola misy akoho maneno, dia handà Ahy intelo ianao. Ary rehefa nivoaka teny ivelany izy, dia nitomany fatratra.'
