document_id: 2SA.16,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nataon'i Absaloma tany Jerosalema, sy ny hevitra nomen'i Ahitofela azy, ary ny nanafoanan'i Hosay izany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony vao nihilana kely avy teo an-tampon'ny tendrombohitra Davida, indro, Ziba, mpanompon'i Mefiboseta, nitsena azy mitondra boriky roa voaisy lasely sady ampitondraina mofo roan-jato sy voaloboka maina zato sampaho sy voankazo masaka fahavaratra zato ary divay iray tavoara
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: siny hoditra'
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpanjaka: Moa mifaninona akory izaho sy ianareo, ry zanak''i Zeroia? Raha manozona izy, sady Jehovah no nanao taminy hoe: Ozony Davida, dia iza indray no hanao hoe: Nahoana ianao no manao izany? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Davida tamin''i Abisay sy tamin''ny mpanompony rehetra: Indro, ny zanako naterako aza mitady ny aiko, ka mainka io Benjamita io! Avelao ihany izy hanozona, fa Jehovah no nampanao azy izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Angamba Jehovah hamindra fo amiko ny amin'ny heloko
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hijery ny fahoriako (na, ny ranomasoko?)'
      marker-yv: yv-n
    - type: text
      text: ' ary hamaly soa ahy noho izao ozona nanjo ahy androany izao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nandeha teny an-dalana Davida sy ny olony, dia nandeha tamin''ny ilan''ny havoana tandrifiny kosa Simey ka nanozona teny ampandehanana sady nitora-bato nanandrify azy sy namafy vovoka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia tonga tao ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy sady efa reraka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary tonga tao Aiefima ny mpanjaka sy ny vahoaka rehetra izay nanaraka azy'
      marker-yv: yv-n
    - type: text
      text: ', ka dia naka aina teo izy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Absaloma sy ny vahoaka rehetra tamin''ny Isiraely dia tonga tany Jerosalema, ary Ahitofela koa dia teo aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Hosay Arkita, sakaizan''i Davida, dia tonga tao amin''i Absaloma ka nanao taminy hoe: Ho ela velona anie ny mpanjaka! ho ela velona anie ny mpanjaka! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Absaloma tamin''i Hosay: izao va no fitianao ny sakaizanao? Nahoana ianao no tsy mba nandeha niaraka tamin''ny sakaizanao? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Hosay tamin''i Absaloma: Tsia, fa izay nofidin''i Jehovah sa ireto vahoaka ireto mbamin''ny lehilahy amin''ny Isiraely, dia izy no hombako, sady ao aminy no hitoerako. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary koa, iza indray no hotompoiko? Tsy eo anatrehan'ny zanany va? Tahaka ny nanompoako teo anatrehan'ny rainao no hanompoako eto anatrehanao koa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin''i Ziba: Ahoana no hevitrao amin''ireto? Dia hoy Ziba: Ny boriky dia ho an''ny ankohonan''ny mpanjaka itaingenany; ary ny mofo sy ny voankazo masaka fahavaratra hohanin''ny zatovo; ary ny divay hosotroin''izay reraka any an-efitra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Absaloma tamin''i Ahitofela: Heveronareo tsara izay hataontsika. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Ahitofela tamin''i Absaloma: Midira ao amin''ny vaditsindranon-drainao, izay nampiandrasiny trano; dia ho ren''ny Isiraely rehetra fa efa nanamaimbo tena eo anatrehan-drainao ianao, ka dia hahery ny tànan''izay rehetra momba anao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nanorin-day ho an''i Absaloma teo an-tampon-trano ny olona; ary Absaloma niditra tao amin''ny vaditsindranon-drainy teo imason''ny Isiraely rehetra. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny hevitr'i Ahitofela izay nataony tamin'izany dia hoatra ny manontany amin'Andriamanitra; toy izany avokoa ny hevitra rehetra nataon'i Ahitofela, na tamin'i Davida, na tamin'i Absaloma.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka: Aiza ny zanakalahin''ny tomponao? Ary hoy Ziba tamin''ny mpanjaka: Indro, mitoetra any Jerosalema izy; fa hoy izy: Anio no hampodian''ny taranak''Isiraely ny fanjakan''ikaky ho ahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjaka tamin''i Ziba: Indro, anao izay rehetra an''i Mefiboseta. Ary hoy Ziba: Trarantitra anie ianao, aoka hahazo fitia eto imasonao aho, ry mpanjaka tompoko. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nanakaiky an''i Bahorima Davida mpanjaka, indro, nisy lehilahy, tamingan''i Saoly ny anarany dia Simey, zanak''i Gera nivoaka avy tao izy ka nanozona teny ampandehanana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitora-bato an''i Davida mpanjaka sy ny mpanompony rehetra izy; ary ny vahoaka rehetra sy ny lehilahy mahery rehetra dia teo amin''ny ankavanan''ny mpanjaka sy teo amin''ny ankaviany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny fanozon''i Simey: Mandehana, mandehana, ry lehilahy mpandatsa-drà sy tena ratsy fanahy! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataon''i Jehovah manody anao izao ny ran''ny tamingan''i Saoly, ilay nodimbiasanao fanjakana; ary Jehovah nanome ny fanjakana ho eo an-tànan''i Absaloma zanakao kosa; ary indro, efa idiran-doza izao ianao, satria mpandatsa-drà. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Abisay, zanak''i Zeroia, tamin''ny mpanjaka: Nahoana no avela hanozona ny mpanjaka tompoko io alika maty io? Trarantitra ianao, aoka aho handeha ka hanapaka ny lohany. '
