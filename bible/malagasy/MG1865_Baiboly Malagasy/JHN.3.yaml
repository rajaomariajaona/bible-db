document_id: JHN.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy Fariseo anankiray atao hoe Nikodemosy, mpanapaka tamin''ny Jiosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesosy namaly ka nanao taminy hoe: Hianao va no mpampianatra ny Isiraely ka tsy mahalala izany zavatra izany? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminao marina dia marina tokoa: Izay fantatray no lazainay, ary izay hitanay no ambaranay; nefa ny fanambaranay tsy raisinareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ny zavatra etỳ an-tany aza no nolazaiko taminareo ka tsy inoanareo, ahoana no hinoanareo, raha milaza aminareo ny zavatra any an-danitra Aho? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nisy niakatra ho any an-danitra, afa-tsy Ilay nidina avy tany an-danitra, dia ny Zanak''olona, Izay any an-danitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tahaka ny nanandratan''i Mosesy ny menarana tany an-efitra no tsy maintsy hanandratana ny Zanak''olona, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hanana fiainana mandrakizay izay rehetra mino Azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa toy izao no nitiavan’Andriamanitra izao tontolo izao: nomeny ny Zanani-lahy Tokana, mba tsy ho very izay rehetra mino Azy, fa hanana fiainana mandrakizay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Andriamanitra tsy naniraka ny Zanaka ho amin'izao tontolo izao hanameloka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. hitsara
      marker-yv: yv-n
    - type: text
      text: ' izao tontolo izao, fa mba hamonjeny izao tontolo izao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mino Azy dia tsy helohina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. tsaraina
      marker-yv: yv-n
    - type: text
      text: ; fa izay tsy mino kosa dia efa voaheloka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. voatsara
      marker-yv: yv-n
    - type: text
      text: ' rahateo, satria tsy nino ny anaran''ny Zanaka-lahy Tokan''Andriamanitra izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izao no fanamelohana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. voatsara
      marker-yv: yv-n
    - type: text
      text: ', fa tonga amin''izao tontolo izao ny mazava, nefa aleon''ny olona ny maizina toy izay ny mazava, satria ratsy ny asany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy nankao amin''i Jesosy nony alina ka nanao taminy hoe: Raby ô, fantatray fa mpampianatra avy amin''Andriamanitra Hianao; fa tsy misy olona mahay manao izao famantarana ataonao izao, raha tsy Andriamanitra no momba azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay rehetra manao ratsy dia mankahala ny mazava sady tsy manatona ny mazava, fandrao hita miharihary ny asany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay manao ny marina kosa dia manatona ny mazava, mba haseho ny asany, fa atao amin''Andriamanitra izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka izany, dia tonga tany amin''ny tany Jodia Jesosy sy ny mpianany; ary niara-nitoetra taminy tao Izy sady nanao batisa. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jaona koa nanao batisa tao Ainona, akaikin''i Saleima, satria nisy loharano maro tao; dia nankany ny olona ka nataony batisa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy mbola natao tao an-tranomaizina Jaona. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy nifandiran''ny mpianatr''i Jaona tamin''ny Jiosy anankiray ny amin''ny fanadiovana; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tonga tany amin''i Jaona ny mpianany ka nanao taminy hoe: Raby ô, Ilay tany aminao, tany an-dafin''i Jordana, Izay nambaranao, indro, manao batisa Izy, ary ny olona rehetra manatona Azy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jaona namaly ka nanao hoe: Tsy misy olona mahay mandray na inona na inona, raha tsy nomena azy avy any an-danitra izany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianareo no vavolombeloko fa hoy izaho: Tsy izaho no Kristy, fa nirahiny hialoha Azy aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay manana ny ampakarina no mpampakatra; fa ny sakaizan''ny mpampakatra, izay mitsangana sy mihaino azy, dia mifaly indrindra noho ny feon''ny mpampakatra; ary efa tanteraka izany fifaliako izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesosy namaly ka nanao taminy hoe: Lazaiko aminao marina dia marina tokoa: Raha tsy ateraka indray'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ateraka avy ambony'
      marker-yv: yv-n
    - type: text
      text: ' ny olona, dia tsy mahazo mahita ny fanjakan''Andriamanitra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy tsy maintsy mitombo, fa izaho kosa tsy maintsy mihena. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay avy any ambony dia ambonin''izy rehetra; ary izay avy amin''ny tany dia avy amin''ny tany, ka ny momba ny etỳ an-tany ihany no lazainy; Izay avy any an-danitra dia ambonin''izy rehetra; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa izay hitany sy reny no ambarany; ary tsy misy mandray ny fanambarany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mandray ny fanambarany dia nanisy tombo-kase fa marina Andriamanitra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Izay nirahin''Andriamanitra dia milaza ny teniny; fa tsy misy fetra ny fanomezan''Andriamanitra ny Fanahy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Ray tia ny Zanaka ka efa nanolotra ny zavatra rehetra ho eo an-tànany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mino ny Zanaka manana fiainana mandrakizay; fa izay tsy mino ny Zanaka dia tsy hahita fiainana, fa ny fahatezeran'Andriamanitra no mitoetra eo aminy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Nikodemosy taminy: Hataon''ny olona ahoana no hateraka rehefa lehibe; moa mahazo miditra any an-kibon-dreniny indray va izy ka hateraka? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesosy namaly hoe: Lazaiko aminao marina dia marina tokoa: Raha misy olona tsy ateraky ny rano sy ny Fanahy, dia tsy mahazo miditra amin''ny fanjakan''Andriamanitra izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay ateraky ny nofo dia nofo; ary izay ateraky ny Fanahy dia fanahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aza gaga noho ny nilazako taminao hoe: Tsy maintsy hateraka indray'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hateraka avy any ambony'
      marker-yv: yv-n
    - type: text
      text: ' ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny rivotra mitsoka amin''izay tiany, ary renao ny feony, nefa tsy fantatrao izay ihaviany na izay alehany, dia tahaka izany izay rehetra ateraky ny Fanahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nikodemosy namaly ka nanao taminy hoe: Hatao ahoana no hahatonga izany zavatra izany? '
