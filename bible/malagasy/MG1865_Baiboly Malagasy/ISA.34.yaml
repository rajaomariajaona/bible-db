document_id: ISA.34,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampijaliana ny fahavalon'ny Isiraely, indrindra fa Edoma, sy ny fahasambaran'ny navotan'i Jehovah
  - type: text
    content: 'Manatona, ianareo jentilisa, mba handre; Ary mihainoa, ianareo firenena; Aoka handre ny tany sy ny ao aminy rehetra, Izao tontolo izao sy ny vokatra rehetra avy aminy. '
  '10':
  - type: text
    content: 'Na alina na andro dia tsy hovonoina izany, ary ny setrony hisavoana mandrakizay; Hatramin''ny taranaka fara mandimby dia ho tany karankaina izy, tsy hisy handeha hamaky azy intsony mandrakizay mandrakizay. '
  '11':
  - type: text
    content: 'Fa ho zara-tanin''ny sama sy ny sokina izy, ny vorondolo lehibe sy ny goaika dia hitoetra ao; Ary hohenjaniny eo aminy ny famolaina fikorontanana sy ny pilao fahafoanana. '
  '12':
  - type: text
    content: Ary ny lehibe dia tsy hisy ao intsony hifidy izay hanjaka
  - type: note
    content: Heb. hiantso ny fanjakana
  - type: text
    content: ', fa ho fongana ny mpanapaka rehetra ao aminy. '
  '13':
  - type: text
    content: Ary ho rakotry ny tsilo ny ao anatin'ny lapan'ny mpanjakany, amiana sy voaroy no ho ao amin'ny trano fiarovany; Ary ho fonenan'ny amboadia
  - type: note
    content: Heb.jakala
  - type: text
    content: ' sy fitoeran''ny ostritsa izy. '
  '14':
  - type: text
    content: Ny bibi-dia any an-efitra hihaona amin'ny kary
  - type: note
    content: 'Na: jakala'
  - type: text
    content: ; ary ny osilahy
  - type: note
    content: Heb. seirima; izahao Lev. xvii. 7
  - type: text
    content: ' hiantso ny namany; Ary ilay mandehandeha amin''ny alina'
  - type: note
    content: Heb. lilita
  - type: text
    content: ' hitoetra any ka hahita fitoerana ho azy. '
  '15':
  - type: text
    content: 'Ny bibilava miantoratoraka hanao ny lavany any ka hanatody sy hifana ary hikotrika ao amin''ny alokaloka any; Any koa no hiangonan''ny papango, samy eo amin''ny namany avy. '
  '16':
  - type: text
    content: Izahao ao amin'ny bokin'i Jehovah, ka vakio; Tsy misy tsy ao ireo na dia iray akory aza. Tsy misy na dia iray akory aza hitady ny namany; Fa ny vavan'i Jehovah
  - type: note
    content: Heb. vavako
  - type: text
    content: ' no nandidy izany, ary ny fanahiny ihany no nanangona azy. '
  '17':
  - type: text
    content: Ary Izy no efa tinendry anjara ho an'ireo ary ny tànany no efa nizara izany ho an'ireo tamin'ny famolaina; Handova izany mandrakizay ireo ary hitoetra ao hatramin'ny taranaka fara-mandimby.
  '2':
  - type: text
    content: Fa Jehovah dia tezitra amin'ny jentilisa rehetra, ary mirehitra amin'ny miaramilany rehetra ny fahatezerany; Efa nodidiany haringana
  - type: note
    content: Heb. hatao herema
  - type: text
    content: ' ireo ary natolony hovonoina. '
  '3':
  - type: text
    content: 'Ary izay voavono amin''ireo dia hariana, ka hamofona ny hamaimbon''ny fatiny, ary ny tendrombohitra hiempo azon''ny ràny. '
  '4':
  - type: text
    content: 'Izay rehetra eny amin''ny lanitra dia ho levona, Ary ny lanitra hahorona tahaka ny fangorona taratasy; Ary ny eny aminy rehetra dia halazo tahaka ny fahalazon''ny ravina mihintsana avy amin''ny voaloboka, ary tahaka ny ravina malazo mihintsana avy amin''ny aviavy. '
  '5':
  - type: text
    content: Fa ny sabatro dia mamon-drà any amin'ny lanitra; Indro, hidina hihatra amin'i Edoma iny sy amin'ny firenena voatendriko haringana
  - type: note
    content: Heb. hatao herema
  - type: text
    content: ', mba ho fitsarana azy. '
  '6':
  - type: text
    content: 'Ny sabatr''i Jehovah feno rà, eny, mihosi-menaka amin''ny matavy sy amin''ny ran''ny zanak''ondry sy ny osilahy ary amin''ny fonomboan''ny ondrilahy; Fa Jehovah mamono zavatra hatao fanatitra ao Bozra Ary mahafaty be ao amin''ny tany Edoma. '
  '7':
  - type: text
    content: 'Ary ny ombimanga miaraka aripaka aminy mbamin''ny vantotr''omby sy ny ombilahy, ka dia vonton-drà ny taniny, ary mihosi-menaka ny vovo-taniny. '
  '8':
  - type: text
    content: 'Fa Jehovah manana andro famaliana, dia taona famaliana hiadiana ho an''i Ziona. '
  '9':
  - type: text
    content: 'Ary hovana ho tonga dity ny renirano any Edoma, ary ho solifara ny vovo-taniny, ary ny taniny ho dity mirehitra. '
