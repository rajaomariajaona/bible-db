document_id: ISA.34,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hampijaliana ny fahavalon'ny Isiraely, indrindra fa Edoma, sy ny fahasambaran'ny navotan'i Jehovah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Manatona, ianareo jentilisa, mba handre; Ary mihainoa, ianareo firenena; Aoka handre ny tany sy ny ao aminy rehetra, Izao tontolo izao sy ny vokatra rehetra avy aminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Na alina na andro dia tsy hovonoina izany, ary ny setrony hisavoana mandrakizay; Hatramin''ny taranaka fara mandimby dia ho tany karankaina izy, tsy hisy handeha hamaky azy intsony mandrakizay mandrakizay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa ho zara-tanin''ny sama sy ny sokina izy, ny vorondolo lehibe sy ny goaika dia hitoetra ao; Ary hohenjaniny eo aminy ny famolaina fikorontanana sy ny pilao fahafoanana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ny lehibe dia tsy hisy ao intsony hifidy izay hanjaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hiantso ny fanjakana
      marker-yv: yv-n
    - type: text
      text: ', fa ho fongana ny mpanapaka rehetra ao aminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary ho rakotry ny tsilo ny ao anatin'ny lapan'ny mpanjakany, amiana sy voaroy no ho ao amin'ny trano fiarovany; Ary ho fonenan'ny amboadia
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb.jakala
      marker-yv: yv-n
    - type: text
      text: ' sy fitoeran''ny ostritsa izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny bibi-dia any an-efitra hihaona amin'ny kary
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: jakala'
      marker-yv: yv-n
    - type: text
      text: ; ary ny osilahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. seirima; izahao Lev. xvii. 7
      marker-yv: yv-n
    - type: text
      text: ' hiantso ny namany; Ary ilay mandehandeha amin''ny alina'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lilita
      marker-yv: yv-n
    - type: text
      text: ' hitoetra any ka hahita fitoerana ho azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny bibilava miantoratoraka hanao ny lavany any ka hanatody sy hifana ary hikotrika ao amin''ny alokaloka any; Any koa no hiangonan''ny papango, samy eo amin''ny namany avy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izahao ao amin'ny bokin'i Jehovah, ka vakio; Tsy misy tsy ao ireo na dia iray akory aza. Tsy misy na dia iray akory aza hitady ny namany; Fa ny vavan'i Jehovah
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vavako
      marker-yv: yv-n
    - type: text
      text: ' no nandidy izany, ary ny fanahiny ihany no nanangona azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary Izy no efa tinendry anjara ho an'ireo ary ny tànany no efa nizara izany ho an'ireo tamin'ny famolaina; Handova izany mandrakizay ireo ary hitoetra ao hatramin'ny taranaka fara-mandimby.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa Jehovah dia tezitra amin'ny jentilisa rehetra, ary mirehitra amin'ny miaramilany rehetra ny fahatezerany; Efa nodidiany haringana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hatao herema
      marker-yv: yv-n
    - type: text
      text: ' ireo ary natolony hovonoina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary izay voavono amin''ireo dia hariana, ka hamofona ny hamaimbon''ny fatiny, ary ny tendrombohitra hiempo azon''ny ràny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izay rehetra eny amin''ny lanitra dia ho levona, Ary ny lanitra hahorona tahaka ny fangorona taratasy; Ary ny eny aminy rehetra dia halazo tahaka ny fahalazon''ny ravina mihintsana avy amin''ny voaloboka, ary tahaka ny ravina malazo mihintsana avy amin''ny aviavy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fa ny sabatro dia mamon-drà any amin'ny lanitra; Indro, hidina hihatra amin'i Edoma iny sy amin'ny firenena voatendriko haringana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hatao herema
      marker-yv: yv-n
    - type: text
      text: ', mba ho fitsarana azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny sabatr''i Jehovah feno rà, eny, mihosi-menaka amin''ny matavy sy amin''ny ran''ny zanak''ondry sy ny osilahy ary amin''ny fonomboan''ny ondrilahy; Fa Jehovah mamono zavatra hatao fanatitra ao Bozra Ary mahafaty be ao amin''ny tany Edoma. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny ombimanga miaraka aripaka aminy mbamin''ny vantotr''omby sy ny ombilahy, ka dia vonton-drà ny taniny, ary mihosi-menaka ny vovo-taniny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa Jehovah manana andro famaliana, dia taona famaliana hiadiana ho an''i Ziona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hovana ho tonga dity ny renirano any Edoma, ary ho solifara ny vovo-taniny, ary ny taniny ho dity mirehitra. '
