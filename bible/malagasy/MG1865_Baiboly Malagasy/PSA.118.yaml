document_id: PSA.118
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiderana an'Andriamanitra noho ny famindram-pony, indrindra noho ny namaliany ny vavaka nataon'ny mpanompony sy ny namonjeny azy tamin'ny fahavalony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Miderà an''i Jehovah, fa tsara Izy; Eny, mandrakizay ny famindram-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aoka ny Isiraely hanao hoe: Mandrakizay ny famindram-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka ny taranak''i Arona hanao hoe: Mandrakizay ny famindram-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aoka izay matahotra an''i Jehovah hanao hoe: Mandrakizay ny famindram-pony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tao an-katerena no niantsoako an''i Jehovah; Dia namaly ahy Jehovah ka nampahalalaka ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jehovah no miandany amiko, ka tsy hatahotra aho. Inona no azon''ny olona atao amiko? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jehovah no miandany amiko, sady mamonjy ahy; Ary izaho ho faly hahita ny amin''izay mankahala ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsara ny mialoka amin''i Jehovah Noho ny mialoka amin''ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsara ny matoky an'i Jehovah Noho ny matoky ny mpanapaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny firenena rehetra nanodidina ahy; Fa ny anaran''i Jehovah no handringanako azy tokoa; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nitangorona tamiko ireny, eny, nitangorona tamiko; Fa ny anaran''i Jehovah no handringanako azy tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nanodidina ahy tahaka ny renitantely izy; Voavono tahaka ny afon-tsilo izy; Fa ny anaran'i Jehovah no handringanako azy tokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nanosika ahy mafy hahalavo ahy ianao; Fa Jehovah no namonjy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jehovah no heriko sy fiderako. Fa efa famonjena ahy Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ao an-dain''ny marina ny feo mihoby noho ny famonjena; Ny tanana ankavanan''i Jehovah mampiseho hery; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny tanana ankavanan''i Jehovah dia misandratra; Ny tanana ankavanan''i Jehovah mampiseho hery. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy ho faty aho, fa ho velona Ka hitory ny asan''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nofaizan'i Jehovah mafy aho, Nefa tsy natolony ho amin'ny fahafatesana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vohay ny vavahadin''ny fahamarinana aho; Hiditra eo aho ka hidera an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ity no vavahadin''i Jehovah; Ny marina no hiditra eo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hidera Anao aho, fa efa namaly ahy Hianao Ka efa famonjena ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny vato izay nolavin''ny mpanao trano No efa tonga fehizoro Indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Avy tamin''i Jehovah izany Ka mahagaga eo imasontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ity no andro nataon''i Jehovah; Hifaly sy ho ravoravo amin''izao isika. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mifona aminao aho, Jehovah ô, vonjeo è! Mifona aminao aho, Jehovah ô, ambino è! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hotahina anie izay avy amin'ny anaran'i Jehovah; Avy ao an-tranon'i Jehovah no itsofanay rano anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Andriamanitra Jehovah ka nampahazava antsika; Rohizo kofehy ny fanati-piravoravoana na dia hatreo amin''ny tandroky ny alitara aza. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Andriamanitro Hianao, ka hidera Anao aho; Eny, Andriamanitro, ka hanandratra Anao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Miderà an'i Jehovah, fa tsara Izy; Eny, mandrakizay ny famindram-pony.
