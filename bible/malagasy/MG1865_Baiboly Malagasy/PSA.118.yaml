document_id: PSA.118,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra noho ny famindram-pony, indrindra noho ny namaliany ny vavaka nataon'ny mpanompony sy ny namonjeny azy tamin'ny fahavalony
  - type: text
    content: 'Miderà an''i Jehovah, fa tsara Izy; Eny, mandrakizay ny famindram-pony. '
  '10':
  - type: text
    content: 'Ny firenena rehetra nanodidina ahy; Fa ny anaran''i Jehovah no handringanako azy tokoa; '
  '11':
  - type: text
    content: 'Nitangorona tamiko ireny, eny, nitangorona tamiko; Fa ny anaran''i Jehovah no handringanako azy tokoa. '
  '12':
  - type: text
    content: Nanodidina ahy tahaka ny renitantely izy; Voavono tahaka ny afon-tsilo izy; Fa ny anaran'i Jehovah no handringanako azy tokoa.
  '13':
  - type: text
    content: 'Nanosika ahy mafy hahalavo ahy ianao; Fa Jehovah no namonjy ahy. '
  '14':
  - type: text
    content: Jehovah no heriko sy fiderako. Fa efa famonjena ahy Izy.
  '15':
  - type: text
    content: 'Ao an-dain''ny marina ny feo mihoby noho ny famonjena; Ny tanana ankavanan''i Jehovah mampiseho hery; '
  '16':
  - type: text
    content: 'Ny tanana ankavanan''i Jehovah dia misandratra; Ny tanana ankavanan''i Jehovah mampiseho hery. '
  '17':
  - type: text
    content: 'Tsy ho faty aho, fa ho velona Ka hitory ny asan''i Jehovah. '
  '18':
  - type: text
    content: Nofaizan'i Jehovah mafy aho, Nefa tsy natolony ho amin'ny fahafatesana.
  '19':
  - type: text
    content: 'Vohay ny vavahadin''ny fahamarinana aho; Hiditra eo aho ka hidera an''i Jehovah. '
  '2':
  - type: text
    content: 'Aoka ny Isiraely hanao hoe: Mandrakizay ny famindram-pony. '
  '20':
  - type: text
    content: 'Ity no vavahadin''i Jehovah; Ny marina no hiditra eo. '
  '21':
  - type: text
    content: Hidera Anao aho, fa efa namaly ahy Hianao Ka efa famonjena ahy.
  '22':
  - type: text
    content: 'Ny vato izay nolavin''ny mpanao trano No efa tonga fehizoro Indrindra. '
  '23':
  - type: text
    content: 'Avy tamin''i Jehovah izany Ka mahagaga eo imasontsika. '
  '24':
  - type: text
    content: 'Ity no andro nataon''i Jehovah; Hifaly sy ho ravoravo amin''izao isika. '
  '25':
  - type: text
    content: 'Mifona aminao aho, Jehovah ô, vonjeo è! Mifona aminao aho, Jehovah ô, ambino è! '
  '26':
  - type: text
    content: Hotahina anie izay avy amin'ny anaran'i Jehovah; Avy ao an-tranon'i Jehovah no itsofanay rano anareo.
  '27':
  - type: text
    content: 'Andriamanitra Jehovah ka nampahazava antsika; Rohizo kofehy ny fanati-piravoravoana na dia hatreo amin''ny tandroky ny alitara aza. '
  '28':
  - type: text
    content: 'Andriamanitro Hianao, ka hidera Anao aho; Eny, Andriamanitro, ka hanandratra Anao aho. '
  '29':
  - type: text
    content: Miderà an'i Jehovah, fa tsara Izy; Eny, mandrakizay ny famindram-pony.
  '3':
  - type: text
    content: 'Aoka ny taranak''i Arona hanao hoe: Mandrakizay ny famindram-pony. '
  '4':
  - type: text
    content: 'Aoka izay matahotra an''i Jehovah hanao hoe: Mandrakizay ny famindram-pony.'
  '5':
  - type: text
    content: 'Tao an-katerena no niantsoako an''i Jehovah; Dia namaly ahy Jehovah ka nampahalalaka ahy. '
  '6':
  - type: text
    content: 'Jehovah no miandany amiko, ka tsy hatahotra aho. Inona no azon''ny olona atao amiko? '
  '7':
  - type: text
    content: 'Jehovah no miandany amiko, sady mamonjy ahy; Ary izaho ho faly hahita ny amin''izay mankahala ahy. '
  '8':
  - type: text
    content: 'Tsara ny mialoka amin''i Jehovah Noho ny mialoka amin''ny olona. '
  '9':
  - type: text
    content: Tsara ny matoky an'i Jehovah Noho ny matoky ny mpanapaka.
