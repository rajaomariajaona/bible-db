document_id: GEN.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanambadian'i Joda, sy ny zanany naterany, ary ny nijangajangany tamin'i Tamara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany andro izany Joda dia nidina niala teo amin''ny rahalahiny ka lasa nanatona ny lehilahy Adolamita anankiray. Hira no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary teo no nahitan''i Joda ny zanakavavin''i Soa, lehilahy Kana­nita anankiray; dia naka azy izy ka nanambady azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nanan''anaka ravehivavy ka niteraka zazalahy; ary ny anarany nataony hoe Era. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanan''anaka indray izy ka niteraka zazalahy; ary ny anarany nataony hoe Onana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nanan''anaka indray koa izy ka niteraka zazalahy; ary ny anarany natao­ny hoe Sela; ary Joda nitoetra tany Keziba tamin''ny niterahan''ny vadiny an''i Sela. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Joda naka vady ho an''i Era lahimatoany, Tamara no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ratsy fanahy teo imason''1 Jehovah Era, lahimatoan''i Joda; dia novonoin''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Joda tamin''i Onana: Vadio ny vadin''ny rahalahinao, ka ento loloha izy, dia velomy maso ny rahalahinao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary fantatr''i Onana fa tsy ho azy tsinona ny zaza; koa raha nandry tamin''ny vadin''ny rahalahiny izy, dia nandraraka tamin''ny tany mba tsy hiterahany zanaka ho an''ny rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ratsy teo imason''i Jehovah izay nataony; ka dia novonoiny koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Joda tamin''i Tamara vinantoni-vavy: Tomoera ho mpitondratena ao an-tranon-drainao mandra-pahalehiben''i Sela zanako-lahy (fa hoy izy: Fandrao maty koa tahaka ny rahalahiny izy); dia nandeha Tamara ka nitoetra tao an-tranon-drainy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa ela, dia maty ny vadin''i Joda, dia ilay zanakavavin''i Soa; ary rehefa nionona ny alahelon''i Joda, dia niakatra tany amin''ny mpanety ondriny tany Timna izy sy Hira Adolamita sakaizany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nisy nanambara tamin''i Tamara hoe Indro, ny rafozanao miakatra ho any Timna hanety ny ondriny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanaisotra ny akanjony fanaon''ny mpitondratena izy, dia nisarona fisalobonana ka nisalobona, dia nipetraka teo am-bavahadin''i Enaima, izay eo amin''ny lalana mankany Timna; satria efa hitan''i Tamara fa efa lehibe Sela, nefa tsy mbola nomen''i Joda ho vadin''i Sela izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hitan''i Joda izy ka nataony fa vehivavy janga, satria efa nanarona ny tavany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nivily nanatona azy teo amoron-dalana Joda ka nanao hoe: Aoka mba handry aminao aho (fa tsy fantany ho vinantony izy); dia hoy kosa ravehivavy: Inona ary no homenao ahy, raha handry amiko ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy izy: Hampanatitra zanak''osy avy amin''ny ondry aman''osy aho. Fa hoy kosa ravehivavy: Hanome fampitanana va ianao mandra-pampanatitrao azy? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy: Inona no fampitanana homeko anao? Ary hoy rave­hivavy: Ny fanombohan-kasenao sy ny kofehinao ary iny tehinao eny an-tananao iny. Ary nomeny azy ireny, dia nandry taminy izy, ka nanan''anaka taminy ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary niainga ravehivavy ka lasa nandeha, dia nanala ny fisalobonana izay notafiny ka niakanjo ny akanjony fanaon''ny mpitondratena indray. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nampitondrain''i Joda ilay Adolamita sakaizany ny zanak''osy, hangalany ilay fampitanana amin-dravehivavy; kanjo tsy hitany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nanontany ny olona teo amin''ny fonenan-dravehivavy izy ka nanao hoe: Aiza moa ilay vehivavy janga izay tamoron-dalana teo Enaima ? Fa hoy ny olona: Tsy nisy vehivavy janga teo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niverina tany amin''i Joda izy ka nanao hoe: Tsy nahita azy aho; ary nolazain''ny olona tompon-tany fa tsy nisy vehivavy janga teo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy Joda: Aoka ho lasany ho azy, fandrao ho afa-baraka isika; indro, efa nampanateriko ity zanak''osy ity, nefa ianao tsy nahita an-dravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa afaka tokony ho telo volana, dia nisy nanambara tamin''i Joda hoe: Efa nijangajanga Tamara vinantovavinao; ka indro, efa manan''anaka tamin''ny fijangajangana izy. Dia hoy Joda: Avoahy izy hodorana. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary rehefa navoaka izy, dia naniraka tany amin''ny rafozany ka nanao hoe: Ny lehilahy izay tompon''ireto no nananako anaka; ary hoy koa izy: Masìna ianao, fantaro izay tompon''ireto fanombohan-kase sy kofehy ary tehina ireto. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nahafantatra ireo Joda ka nanao hoe: Marina noho izaho izy, satria tsy nomeko ho vadin''i Sela zanako. Dia tsy nandry taminy intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary tamin''ny andro niterahany, indro, nisy zaza kambana tao an-kibony. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary raha niteraka izy, dia niseho ny tanan''ny anankiray, ary naka kofehy mena ny mpampivelona, ka nafehiny tamin''ny tànany, sady hoy izy: Ity no niseho voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary rehefa nahemony ny tànany, dia, indro, teraka ny rahalahiny; ary hoy ny mpampivelona: Ahoana no nibosesehanao? dia nataony hoe Fareza no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary rehefa afaka izany, dia teraka koa ny rahalahiny, izay nisy ilay kofehy mena tamin'ny tànany; dia natao­ny hoe Zera no anarany.
