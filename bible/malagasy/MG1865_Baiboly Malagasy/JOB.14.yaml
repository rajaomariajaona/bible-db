document_id: JOB.14,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny olona tera-behivavy dia vitsy andro sady vontom-pahoriana.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny olona kosa maty ka miampatra; Eny, miala aina ny olona, ary aiza izy?
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny rano miala eo amin'ny kamory, ary ny ony mihena ka ritra,
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary toy izany koa ny olona; mandry izy ka tsy hitsangana intsony; Eny, mandra-paha-tsy hisian'ny lanitra dia tsy hahatsiaro izy na hofohazina amin'ny torimasony.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enga anie ka hanafina ahy any amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: ' Hianao Ka hampiery ahy mandra-pahafaky ny fahatezeranao! Ary hanendry fetr''andro ho ahy, dia hahatsiaro ahy'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha maty ny olona, moa ho velona indray va izy? Raha izany, dia hiandry mandritra ny andro fanafihako aho, mandra-pahatongan'ny fahafahako
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fiovako'
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hiantso Hianao, ary izaho hamaly Anao; ary mba halahelo ny asan'ny tananao Hianao.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ankehitriny manisa ny diako Hianao; Tsy mitsikilo ny fahotako va Hianao?
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa voaisy tombo-kase ny kitapo misy ny fahadisoako; Ary voazaitranao ny heloko.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa na dia ny tendrombohitra aza, raha mianjera, dia mihalevona; Ary ny vatolampy dia afindra hiala amin'ny fitoerany;
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lanin''ny rano ny vato; ary indaosin''ny riaka ny vovo-tany: Toy izany no fanimbanao ny fanantenan''ny zanak''olombelona.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitsimoka tahaka ny voninkazo izy ka jinjana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: malazo'
      marker-yv: yv-n
    - type: text
      text: ', ary mihelina tahaka ny aloka izy ka tsy mitoetra.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandresy azy ho mandrakizay Hianao, ka lasa izy; Manova ny tarehiny Hianao ka mampandeha azy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Omem-boninahitra ny zanany nefa tsy fantany; Ary mietry ireo, nefa tsy hitany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mihatra amin'ny tenany ihany no mampanaintaina azy, ary ny mihatra amin'ny tenany ihany no mampalahelo ny fanahiny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: kanefa amin'izay toy izany foana no ampihiratanao ny masonao? ka dia izay izaho avy no entinao hifandahatra aminao amin'ny fitsarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fitsaranao'
      marker-yv: yv-n
    - type: text
      text: '!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aiza no misy madio ateraky ny tsy madio? Tsy misy na dia iray akory aza.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha voafetra ny androny, ary voatendrinao ny isan'ny volana iainany, ary asianao fefy tsy azony ihoarana,
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia mihodina tsy hanatrika azy Hianao, mba hitsaharany, ka hifaliany amin
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hotaperany'
      marker-yv: yv-n
    - type: text
      text: '''ny androny toy ny mpikarama.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa azo antenaina ny hazo, satria na dia kapaina aza izy, dia mbola hitsimoka indray, ka tsy maintsy hisy ny solofony;
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Na dia efa tonga antitra ao amin'ny tany aza ny fakany, ary maty ao amin'ny vovoka ny fotony,
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mahare ny fofon-drano izy, dia hitsimoka indray. Ka handrahaka tahaka ny hazo tanora nambolena.
