document_id: JER.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny nasain'i Jehovah nolazaina ny amin'ny mponina tao Anatota, izay nitady hamono an'i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mihainoa ny tenin''izao fanekena izao ianareo, ary mitenena amin''ny Joda sy amin''ny mponina any Jerosalema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ataovy aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: ho voaozona izay olona tsy mankatò ny tenin''izao fanekena izao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay nandidiako ny razanareo tamin''ny andro nitondrako azy nivoaka avy tany amin''ny tany Egypta, dia avy tao amin''ny memy fandrendreham-by, ka nanaovako hoe: Mihainoa ny feoko, ary mankatoava ireny araka izay rehetra andidiako anareo, dia ho oloko ianareo, ary Izaho kosa ho Andriamanitrareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mba hotoviko ny fianianana izay nianianako tamin''ny razanareo, dia ny hanomezana azy tany tondra-dronono sy tantely tahaka ny amin''izao anio izao. Dia namaly aho ka nanao hoe: Ho izany tokoa anie'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Amena
    marker-yv: yv-n
  - type: text
    text: ', Jehovah ô! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Jehovah tamiko: Torio any an-tanànan''ny Joda sy any an-dalamben''i Jerosalema Izany teny rehetra izany, ka lazao hoe: Henoy ny tenin''izao fanekena izao, ka ankatoavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa nananatra mafy ny razanareo Aho tamin''ny andro nitondrako azy nivoaka avy tany amin''ny tany Egypta ka ambaraka androany; Eny, nifoha maraina koa Aho ka nananatra hoe: Mihainoa ny feoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nefa tsy nihaino izy na nanongilana ny sofiny, fa samy nandeha tamin'ny ditry ny fo ratsiny ihany izy; Ka dia nataoko mihatra aminy ny teny rehetra amin'izao fanekena izao, ilay nasaiko nataony, nefa tsy nataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy koa Jehovah tamiko: Misy tetika fikomiana hita ao amin''ny Joda sy amin''ny mponina any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa izy niverina nankamin''ny heloky ny razany, izay tsy nety nihaino ny teniko, ary lasa nanaraka andriamani-kafa izy ka nanompo azy; Ny taranak''Isiraely sy ny taranak''i Joda efa nivadika ny fanekeko, izay nataoko tamin''ny razany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izao no lazain''i Jehovah: Indro, Izaho hahatonga loza aminy, izay tsy azony handosirana; Ary na dia hitaraina amiko aza izy, dia tsy hihaino azy Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia handeha ny tanànan''ny Joda sy ny mponina any Jerosalema ka hitaraina amin''ireny andriamaniny, izay efa nandoroany ditin-kazo manitra; Nefa ireny tsy hahavonjy azy akory amin''ny andro fahoriany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa araka ny isan''ny tanànanao, ry Joda, no isan''ny andriamanitrao, Ary araka ny isan''ny lalamben''i Jerosalema no isan''ny alitara naorinareo ho an''ilay mampahamenatra. Dia alitara handoroana ditin-kazo manitra ho an''i Bala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa aza mivavaka ho an'ity firenena ity ianao, ary aza manandratra fitarainana na fifonana ho azy; Fa amin'ny andro izay hitarainany amiko noho ny fahoriany dia tsy hihaino azy Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hanao inona ao an-tranoko ny malalako fa efa namoron-tsain-dratsy niaraka tamin'ny maro izy, ary ny hena masina dia esorina aminao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nahoana ny malalako no manao fahavetavetana eto an-tranoko? Moa ny voady sy ny hena masina va no hampiala ny faharatsianao, na hahafahanao handositra?'
    marker-yv: yv-n
  - type: text
    text: '; Raha azon-doza ianao, mifalia ary! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hazo oliva maitso sady misy voany maha-te-hizaha no nataon''i Jehovah anaranao; Tamin''ny fihorakorahana be no nandrehetany afo taminy, ary notapahina ny rantsany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa Jehovah, Tompon'ny maro, Izay namboly anao, no nanambara ny loza hanjo anao, noho ny ratsy nataon'ny taranak'Isiraely sy ny taranak'i Joda, Izay nahavoa ny tenany ka nahatezitra Ahy. Dia tamin'ny nandoroany ditin-kazo manitra ho an'i Bala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nampahafantarin''i Jehovah aho, ka dia nahalala; Tamin''izany dia nasehonao ahy ny fanaony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa izaho dia tahaka ny zanak''ondry bonaika, izay entina hovonoina; Ary tsy fantatro fa izao no tetika nataony namelezany ahy: Aoka hosimbantsika ny hazo mbamin''ny voany, ary aoka hofongorantsika hiala amin''ny tanin''ny velona izy, mba tsy hotsarovana intsony ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nefa, ry Jehovah, Tompon''ny maro ô, Izay mitsara marina ka mamantatra ny voa sy ny fo aoka ho hitako ny famalianao azy; Fa aminao no efa nanankinako ny adiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa izao no lazain''i Jehovah ny amin''ny mponina ao Anatota, izay mitady ny ainao ka manao hoe: Aza maminany amin''ny anaran''i Jehovah, fandrao matin''ny tananay ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'izao no lazain''i Jehovah, Tompon''ny maro: Indro, hovaliako Izy, ka ny zatovo ho fatin-tsabatra, ary ny zananilahy sy ny zananivavy ho fati-mosary; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ka tsy hisy hiangana izy; Fa hahatonga loza amin'ny mponina ao Anatota Aho amin'ny taona hamaliana azy.
