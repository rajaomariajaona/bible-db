document_id: PSA.59,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan'izay misy fahavalo maro mitady hahafaty azy
  - type: text
    content: 'Ho an''ny mpiventy hira. Al-tasheth. Miktama nataon''i Davida, fony Saoly naniraka, ka nisy niambina ny trano hamonoana azy. Afaho amin''ny fahavaloko aho, Andriamanitro ô; asondroty eo amin''ny avo aho tsy ho azon''izay miodina amiko. '
  '10':
  - type: text
    content: Andriamanitra, Izay mamindra fo amiko, no hialoha ahy; hataon'Andriamanitra faly mijery ny amin'ny fahavaloko aho.
  '11':
  - type: text
    content: 'Aza mahafaty azy Hianao, fandrao hanadino izany ny fireneko. Ampirenireneo amin''ny herinao izy, ka aripaho, ry Tompo ô, Ampinganay. '
  '12':
  - type: text
    content: 'Ny fahotan''ny vavany dia ny tenin''ny molony; aoka hosamborina amin''ny fireharehany izy, eny, noho ny ozona sy ny lainga ataony. '
  '13':
  - type: text
    content: Aringano an-katezerana izy, aringano mba tsy ho ao intsony; ary aoka ho fantany fa Andriamanitra no manapaka eo amin'ny Jakoba ka hatramin'ny faran'ny tany.
  '14':
  - type: text
    content: 'Ary miverina nony hariva ireny ka mierona tahaka ny alika, sady mandehandeha eran''ny tanàna. '
  '15':
  - type: text
    content: 'Miriorio mitady hanina izy; raha tsy voky izy, dia any ihany mandritra ny alina. '
  '16':
  - type: text
    content: 'Fa izaho kosa dia hihira ny herinao, ary hihoby ny famindram-ponao nony maraina, satria fiarovana avo ho ahy Hianao, ary fandosirako amin''ny andro fahoriana. '
  '17':
  - type: text
    content: Ry Heriko ô, Hianao no hankalazaiko; fa Andriamanitra no fiarovana avo ho ahy, dia Andriamanitra Izay mamindra fo amiko.
  '2':
  - type: text
    content: 'Afaho amin''ny mpanao ratsy aho, ary vonjeo amin''ny mpandatsa-drà. '
  '3':
  - type: text
    content: 'Fa, indro, manotrika hahazo ny aiko izy; miangona hanohitra ahy ny mahery, nefa tsy fahadisoako ary tsy fahotako, Jehovah ô. '
  '4':
  - type: text
    content: Tsy heloko
  - type: note
    content: Heb. vokatra
  - type: text
    content: ' no ihazakazahany sy iomanany, koa mifohaza hitsena ahy, ka jereo. '
  '5':
  - type: text
    content: Ary Hianao, Jehovah ô, Andriamanitry ny maro, Andriamanitry ny Isiraely, mifohaza hitsara ny firenen-tsamy hafa; aza mamindra fo amin'izay mpivadika ratsy fanahy.
  '6':
  - type: text
    content: 'Miverina nony hariva ireny ka mierona tahaka ny alika, sady mandehandeha eran''ny tanàna. '
  '7':
  - type: text
    content: 'Indro, mirezadrezatra amin''ny vavany izy; sabatra no eo amin''ny molony, fa iza, hono, no handre? '
  '8':
  - type: text
    content: Kanjo Hianao, Jehovah ô, hihomehy azy; Hianao haneso ny firenena rehetra.
  '9':
  - type: text
    content: 'Koa noho ny herin''ireny dia hiandry Anao aho; fa Andriamanitra no fiarovana avo ho ahy. '
