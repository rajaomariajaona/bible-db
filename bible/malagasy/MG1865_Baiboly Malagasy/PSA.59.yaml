document_id: PSA.59,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainan'izay misy fahavalo maro mitady hahafaty azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Al-tasheth. Miktama nataon''i Davida, fony Saoly naniraka, ka nisy niambina ny trano hamonoana azy. Afaho amin''ny fahavaloko aho, Andriamanitro ô; asondroty eo amin''ny avo aho tsy ho azon''izay miodina amiko. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Andriamanitra, Izay mamindra fo amiko, no hialoha ahy; hataon'Andriamanitra faly mijery ny amin'ny fahavaloko aho.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aza mahafaty azy Hianao, fandrao hanadino izany ny fireneko. Ampirenireneo amin''ny herinao izy, ka aripaho, ry Tompo ô, Ampinganay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny fahotan''ny vavany dia ny tenin''ny molony; aoka hosamborina amin''ny fireharehany izy, eny, noho ny ozona sy ny lainga ataony. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aringano an-katezerana izy, aringano mba tsy ho ao intsony; ary aoka ho fantany fa Andriamanitra no manapaka eo amin'ny Jakoba ka hatramin'ny faran'ny tany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary miverina nony hariva ireny ka mierona tahaka ny alika, sady mandehandeha eran''ny tanàna. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Miriorio mitady hanina izy; raha tsy voky izy, dia any ihany mandritra ny alina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa izaho kosa dia hihira ny herinao, ary hihoby ny famindram-ponao nony maraina, satria fiarovana avo ho ahy Hianao, ary fandosirako amin''ny andro fahoriana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ry Heriko ô, Hianao no hankalazaiko; fa Andriamanitra no fiarovana avo ho ahy, dia Andriamanitra Izay mamindra fo amiko.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Afaho amin''ny mpanao ratsy aho, ary vonjeo amin''ny mpandatsa-drà. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa, indro, manotrika hahazo ny aiko izy; miangona hanohitra ahy ny mahery, nefa tsy fahadisoako ary tsy fahotako, Jehovah ô. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tsy heloko
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vokatra
      marker-yv: yv-n
    - type: text
      text: ' no ihazakazahany sy iomanany, koa mifohaza hitsena ahy, ka jereo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary Hianao, Jehovah ô, Andriamanitry ny maro, Andriamanitry ny Isiraely, mifohaza hitsara ny firenen-tsamy hafa; aza mamindra fo amin'izay mpivadika ratsy fanahy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Miverina nony hariva ireny ka mierona tahaka ny alika, sady mandehandeha eran''ny tanàna. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Indro, mirezadrezatra amin''ny vavany izy; sabatra no eo amin''ny molony, fa iza, hono, no handre? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanjo Hianao, Jehovah ô, hihomehy azy; Hianao haneso ny firenena rehetra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa noho ny herin''ireny dia hiandry Anao aho; fa Andriamanitra no fiarovana avo ho ahy. '
