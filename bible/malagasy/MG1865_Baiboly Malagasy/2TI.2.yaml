document_id: 2TI.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mety hataon'i Timoty noho ny fisian'ny mpampianatra sandoka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa ianao, anaka, dia aoka hihahery amin''ny fahasoavana izay ao amin''i Kristy Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary izay zavatra efa renao tamiko teo anatrehan''ny vavolombelona maro dia atolory ny olona mahatoky, izay hahay mampianatra ny sasany kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Miaraha miaritra ny mafy amiko ianao tahaka ny miaramila tsaran''i Kristy Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny miaramila manafika dia tsy mba misy maningo-tena amin''ny raharahan''izao fiainana izao. mba hahafaly izay efa nifidy azy ho miaramila. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha misy manezaka amin''ny filalaovana, dia tsy satrohana satro-boninahitra izy, raha tsy manezaka araka ny lalàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny mpiasa tany izay misasatra no tokony ho voalohany handray ny vokatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Diniho izay lazaiko, fa homen'ny Tompo fahazavan-tsaina ny amin'ny zavatra rehetra ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsarovy Jesosy Kristy Izay natsangana tamin''ny maty, dia Ilay avy tamin''ny taranak''i Davida, araka ny filazantsarako, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'izay iaretako fahoriana hatramin''ny fatorana aza, hoatra ny mpanao ratsy; nefa ny tenin''Andriamanitra dia tsy mba voafatotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izany no iaretako ny zavatra rehetra noho ny amin''ny olom-boafidy, mba hahazoan''ireny koa famonjena. dia izay ao amin''i Kristy Jesosy. mbamin''ny voninahitra mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mahatoky izao teny izao: Fa raha miara-maty aminy isika, dia hiara-belona aminy koa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'raha miaritra isika, dia hiara-manjaka aminy; raha mandà Azy isika, Izy kosa handà antsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: fa na dia tsy matoky Azy aza isika, dia mbola mahatoky ihany Izy, fa tsy mahazo mandà ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany zavatra izany no ampahatsiarovy ny olona, ka anaro mafy eo anatrehan''ny Tompo izy mba tsy hiady teny, satria tsy mahasoa akory izany, fa mamadika ny mpihaino, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mazotoa manolotra ny tenanao amin'Andriamanitra ho olona voazaha toetra, dia mpiasa tsy mahazo henatra, mizara tsara
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mamoaka tsara; na: mizotra mahitsy amin'''
    marker-yv: yv-n
  - type: text
    text: ' ny teny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa halaviro ny fibedibedena foana; fa mbola handroso amin''ny haratsiam-panahy ihany izy ireny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ary ny teniny dia handany tahaka ny aretina mihady
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. gangrena
    marker-yv: yv-n
  - type: text
    text: '; isan ireny Hymeneo sy Fileto, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'izay nania tamin''ny marina ka milaza fa efa lasa sahady ny fitsanganan''ny maty, dia mamadika ny finoan''ny sasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa ny fanorenana mafy nataon''Andriamanitra dia miorina tsara sady manana izao tombo-kase izao: "Ny Tompo mahalala ny azy", ary koa: "Aoka ny olona rehetra izay manonona ny anaran''ny Tompo hiala amin''ny ratsy." '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ao an-trano lehibe, tsy dia fanaka volamena sy volafotsy ihany no ao, fa fanaka hazo sy tany koa, ny sasany homem-boninahitra, ary ny sasany halam-baraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa raha misy olona manadio ny tenany ho afaka amin''ireny, dia ho fanaka homem-boninahitra izy, efa nohamasinina ka mahasoa ho an''ny Tompo, voavoatra ho amin''ny asa tsara rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa mandosira ny filan''ny tanora fanahy; ary miezaha mitady fahamarinana, finoana, fitiavana, fihavanana amin''izay miantso ny Tompo amin''ny fo madio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa mandava ny fanontaniana adaladala tsy misy antony, satria fantatrao fa mahatonga ady izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary tsy mety raha miady ny mpanompon''ny Tompo, fa ho malemy fanahy amin''ny olona rehetra, mahay mampianatra, mahalefitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'mananatra ny mpanohitra amin''ny fahamoram-panahy; fa angamba Andriamanitra hanome azy fibebahana hahalalany tsara ny marina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ka hody ny sainy ho afaka amin'ny fandriky ny devoly, izay nanao azy sambo-belona hanao ny sitrapony
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ka hody ny sainy - ho afaka amin''ny fandriky ny devoly, izay nanao azy sambo-belona - hanao ny sitrapon''Andriamanitra; na: fa ataon''ny mpanompon''ny Tompo sambo-belona izay hanao ny sitrapon''Andriamanitra'
    marker-yv: yv-n
  - type: text
    text: .
