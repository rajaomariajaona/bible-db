document_id: 2TI.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mety hataon'i Timoty noho ny fisian'ny mpampianatra sandoka
  - type: text
    content: 'Koa ianao, anaka, dia aoka hihahery amin''ny fahasoavana izay ao amin''i Kristy Jesosy. '
  '10':
  - type: text
    content: 'Izany no iaretako ny zavatra rehetra noho ny amin''ny olom-boafidy, mba hahazoan''ireny koa famonjena. dia izay ao amin''i Kristy Jesosy. mbamin''ny voninahitra mandrakizay. '
  '11':
  - type: text
    content: 'Mahatoky izao teny izao: Fa raha miara-maty aminy isika, dia hiara-belona aminy koa; '
  '12':
  - type: text
    content: 'raha miaritra isika, dia hiara-manjaka aminy; raha mandà Azy isika, Izy kosa handà antsika; '
  '13':
  - type: text
    content: fa na dia tsy matoky Azy aza isika, dia mbola mahatoky ihany Izy, fa tsy mahazo mandà ny tenany.
  '14':
  - type: text
    content: 'Izany zavatra izany no ampahatsiarovy ny olona, ka anaro mafy eo anatrehan''ny Tompo izy mba tsy hiady teny, satria tsy mahasoa akory izany, fa mamadika ny mpihaino, '
  '15':
  - type: text
    content: Mazotoa manolotra ny tenanao amin'Andriamanitra ho olona voazaha toetra, dia mpiasa tsy mahazo henatra, mizara tsara
  - type: note
    content: 'Na: mamoaka tsara; na: mizotra mahitsy amin'''
  - type: text
    content: ' ny teny fahamarinana. '
  '16':
  - type: text
    content: 'Fa halaviro ny fibedibedena foana; fa mbola handroso amin''ny haratsiam-panahy ihany izy ireny, '
  '17':
  - type: text
    content: ary ny teniny dia handany tahaka ny aretina mihady
  - type: note
    content: Gr. gangrena
  - type: text
    content: '; isan ireny Hymeneo sy Fileto, '
  '18':
  - type: text
    content: 'izay nania tamin''ny marina ka milaza fa efa lasa sahady ny fitsanganan''ny maty, dia mamadika ny finoan''ny sasany. '
  '19':
  - type: text
    content: 'Kanefa ny fanorenana mafy nataon''Andriamanitra dia miorina tsara sady manana izao tombo-kase izao: "Ny Tompo mahalala ny azy", ary koa: "Aoka ny olona rehetra izay manonona ny anaran''ny Tompo hiala amin''ny ratsy." '
  '2':
  - type: text
    content: 'Ary izay zavatra efa renao tamiko teo anatrehan''ny vavolombelona maro dia atolory ny olona mahatoky, izay hahay mampianatra ny sasany kosa. '
  '20':
  - type: text
    content: 'Fa ao an-trano lehibe, tsy dia fanaka volamena sy volafotsy ihany no ao, fa fanaka hazo sy tany koa, ny sasany homem-boninahitra, ary ny sasany halam-baraka. '
  '21':
  - type: text
    content: 'Koa raha misy olona manadio ny tenany ho afaka amin''ireny, dia ho fanaka homem-boninahitra izy, efa nohamasinina ka mahasoa ho an''ny Tompo, voavoatra ho amin''ny asa tsara rehetra. '
  '22':
  - type: text
    content: 'Fa mandosira ny filan''ny tanora fanahy; ary miezaha mitady fahamarinana, finoana, fitiavana, fihavanana amin''izay miantso ny Tompo amin''ny fo madio. '
  '23':
  - type: text
    content: 'Fa mandava ny fanontaniana adaladala tsy misy antony, satria fantatrao fa mahatonga ady izany. '
  '24':
  - type: text
    content: 'Ary tsy mety raha miady ny mpanompon''ny Tompo, fa ho malemy fanahy amin''ny olona rehetra, mahay mampianatra, mahalefitra, '
  '25':
  - type: text
    content: 'mananatra ny mpanohitra amin''ny fahamoram-panahy; fa angamba Andriamanitra hanome azy fibebahana hahalalany tsara ny marina, '
  '26':
  - type: text
    content: ka hody ny sainy ho afaka amin'ny fandriky ny devoly, izay nanao azy sambo-belona hanao ny sitrapony
  - type: note
    content: 'Na: ka hody ny sainy - ho afaka amin''ny fandriky ny devoly, izay nanao azy sambo-belona - hanao ny sitrapon''Andriamanitra; na: fa ataon''ny mpanompon''ny Tompo sambo-belona izay hanao ny sitrapon''Andriamanitra'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Miaraha miaritra ny mafy amiko ianao tahaka ny miaramila tsaran''i Kristy Jesosy. '
  '4':
  - type: text
    content: 'Ny miaramila manafika dia tsy mba misy maningo-tena amin''ny raharahan''izao fiainana izao. mba hahafaly izay efa nifidy azy ho miaramila. '
  '5':
  - type: text
    content: 'Ary raha misy manezaka amin''ny filalaovana, dia tsy satrohana satro-boninahitra izy, raha tsy manezaka araka ny lalàna. '
  '6':
  - type: text
    content: 'Ny mpiasa tany izay misasatra no tokony ho voalohany handray ny vokatra. '
  '7':
  - type: text
    content: Diniho izay lazaiko, fa homen'ny Tompo fahazavan-tsaina ny amin'ny zavatra rehetra ianao.
  '8':
  - type: text
    content: 'Tsarovy Jesosy Kristy Izay natsangana tamin''ny maty, dia Ilay avy tamin''ny taranak''i Davida, araka ny filazantsarako, '
  '9':
  - type: text
    content: 'izay iaretako fahoriana hatramin''ny fatorana aza, hoatra ny mpanao ratsy; nefa ny tenin''Andriamanitra dia tsy mba voafatotra. '
