document_id: 2SA.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny soa nataon'i Davida tamin'i Mefiboseta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Davida: Mbola misy sisa ihany va ny tamingan''i Saoly mba hasiako soa noho ny amin''i Jonatana? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy mpanompon''ny fianakavian''i Saoly, Ziba no anarany. Ary nantsoiny hankany amin''i Davida izy, ka hoy ny mpanjaka taminy: Hianao moa no Ziba? Ary hoy izy: Izaho mpanomponao no izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy ny mpanjaka: Mbola misy sisa ihany va ny tamingan''i Saoly mba hasiako soa araka ny fanaon''Andriamanitra? Dia hoy Ziba tamin''ny mpanjaka: Mbola misy zanakalahin''i Jonatana iray ihany ao, nefa malemy tongotra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy; Aiza anefa izy? Dia hoy Ziba tamin''ny mpanjaka: Indro izy ao an-tranon''i Makira, zanak''i Amiela, ao Lo-debara. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Davida mpanjaka naniraka haka azy tao an-tranon''i Makira, zanak''i Amiela, tao Lodebara. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony tonga teo amin''i Davida Mefiboseta, zanak''i Jonatana, zanak''i Saoly, dia niankohoka sy nitsaoka azy izy. Ary hoy Davida: Mefiboseta! Dia hoy izy: Inty ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Davida taminy: Aza matahotra, fa hasiako soa tokoa ianao noho ny amin''i Jonatana rainao, ary hampodiko ho anao ny tany rehetra izay an''i Saoly rainao, ary ianao hihinana eo amin''ny latabatro mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niankohoka izy ka nanao hoe: Zinona moa aho mpanomponao izay toy ny alika maty, no mba jerenao? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niantso an''i Ziba, mpanompon''i Saoly, ny mpanjaka ka nanao taminy hoe: Izay rehetra nananan''i Saoly sy ny mpianakaviny rehetra dia nomeko ny zanakalahin''ny tomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa ianao sy ny zanakaolahy ary ny mpanomponao no hiasa ny tany ho azy ka hanatitra hanin-kohanina ho an''ny zanakalahin''ny tomponao; fa Mefiboseta, zanakalahin''ny tomponao, hihinana eo amin''ny latabatro mandrakariva. Ary Ziba nanana zanakalahy dimy ambin''ny folo sy mpanompo roa-polo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Ziba tamin''ny mpanjaka: Araka izay rehetra nandidianao mpanjaka tompoko no hataon''ny mpanomponao. Fa ny amin''i Mefiboseta, hoy Davida, dia hihinana eo amin''ny latabatro toy ny anankiray amin''ny zanakalahin''ny mpanjaka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Mefiboseta nanan-janakalahy tanora, Mika no anarany. Ary izay rehetra nitoetra tao an-tranon''i Ziba dia mpanompon''i Mefiboseta avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Mefiboseta nonina tany Jerosalema; fa teo amin'ny latabatry ny mpanjaka no nihinanany mandrakariva; ary nalemy ny tongony roa.
