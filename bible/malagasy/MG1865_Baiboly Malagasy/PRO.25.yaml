document_id: PRO.25,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ohabolana samy hafa ny amin'ny fitondran-tena sy ny toetry ny olona marina
  - type: text
    content: Izao koa no ohabolan'i Solomona, izay nangonin
  - type: note
    content: Heb. nafindran'
  - type: text
    content: '''ny olon''i Hezekia, mpanjakan''ny Joda:'
  '10':
  - type: text
    content: Fandrao izay mandre hanondro maso anao, Ka tsy ho afaka aminao ny laza ratsy.
  '11':
  - type: text
    content: Ny teny atao amin'ny antony dia poma volamena ao anaty vilia volafotsy tsara soratra
  - type: note
    content: 'Na: poma volamena misy ravaka volafotsy'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Kavim-bolamena sy firavaka volamena tsara Ny mpananatra hendry, raha amin''ny sofina mihaino. '
  '13':
  - type: text
    content: Toy ny hatsiaky ny oram-panala amin'ny taom-pijinjana, Dia toy izany ny iraka mahatoky amin'izay naniraka azy, Fa mamelombelona ny fon'ny tompony izy.
  '14':
  - type: text
    content: Toy ny rahona sy ny rivotra tsy misy orana Ny olona izay mirehaka amin'ny fizaram-bava.
  '15':
  - type: text
    content: Ny fahari-po no ahazoana mampanaiky ny mpitsara, Ary ny vava
  - type: note
    content: Heb. lela
  - type: text
    content: ' malefaka mahatapa-taolana.'
  '16':
  - type: text
    content: Mahita tantely va ianao? Hano izay antonona anao, Fandrao voky loatra ianao ka handoa azy.
  '17':
  - type: text
    content: Aza miditra matetika ao an-tranon'ny namanao, Fandrao tofoka anao izy, ka ho halany ianao.
  '18':
  - type: text
    content: Langilangy sy sabatra ary zana-tsipìka maranitra Ny olona izay mitsangana ho vavolombelona mandainga hanameloka ny namany.
  '19':
  - type: text
    content: Toy ny nify nahasimatsimahana sy ny tongotra mangozohozo Ny fahatokiana ny mpamitaka amin'ny andro fahoriana.
  '2':
  - type: text
    content: Voninahitr'Andriamanitra ny manafin-javatra; Fa voninahitry ny mpanjaka kosa ny mamanta-javatra.
  '20':
  - type: text
    content: Toy ny miala lamba amin'ny hatsiaka, Ary toy ny vinaingitra amin'ny sirahazo, Dia toy izany ny mikalo amin'ny malahelo am-po.
  '21':
  - type: text
    content: 'Raha noana ny fahavalonao, omeo hanina izy; Ary raha mangetaheta izy, omeo rano hosotroiny; '
  '22':
  - type: text
    content: Fa raha manao izany ianao, dia hanambatra vainafo ho eo an-dohany, Ary Jehovah no hamaly soa anao.
  '23':
  - type: text
    content: 'Ny rivotra avy any avaratra mahatonga ranonorana, Dia toy izany, ny lelan''ny mpifosa mampahavinitra endrika. '
  '24':
  - type: text
    content: Aleo mitoetra eo an-joron'ny tampontrano Toy izay miray trano amin'ny vehivavy tia ady.
  '25':
  - type: text
    content: Rano mangatsiaka amin'ny fanahy reraka Ny filazana soa avy any an-tany lavitra.
  '26':
  - type: text
    content: Loharano voahosihosy sy fantsakana simba Ny marina izay mikoy ny ratsy fanahy,
  '27':
  - type: text
    content: Tsy tsara raha mahery homana tantely; Fa ny fitadiavan'ny olona ny voninahiny dia tsy voninahitra
  - type: note
    content: 'Na: Fa ny fandinihana izay sarotra dia voninahitra (na: mavesatra)'
  - type: text
    content: '. '
  '28':
  - type: text
    content: Tanàna rava tsy misy manda Ny lehilahy izay tsy mahatsindry ny fanahiny.
  '3':
  - type: text
    content: Ny hahavon'ny lanitra sy ny halalin'ny tany Ary ny fon'ny mpanjaka dia samy tsy azo fantarina avokoa.
  '4':
  - type: text
    content: 'Esory ny taim-bolafotsy, Dia hisy fanaka ho an''ny mpanao an-idina. '
  '5':
  - type: text
    content: Esory ny ratsy fanahy tsy ho eo anatrehan'ny mpanjaka, Dia hampitoerina amin'ny fahamarinana ny seza fiandrianany.
  '6':
  - type: text
    content: 'Aza manandra-tena eo anatrehan''ny mpanjaka, Ary aza mitoetra eo amin''ny fitoeran''ny lehibe; '
  '7':
  - type: text
    content: 'Fa aleo ianao hantsoina hoe: Miakara atỳ, Toy izay hatambotsotra eo imason''ny manan-kaja izay hitan''ny masonao. '
  '8':
  - type: text
    content: Aza maika handeha hiady, Fandrao tsy ho fantatrao izay hataonao amin'ny farany, Rehefa omen'ny namanao henatra ianao.
  '9':
  - type: text
    content: 'Miadia ihany ny adinao amin''ny namanao, Kanefa aza aseho izay tsy tian''ny sasany holazaina, '
