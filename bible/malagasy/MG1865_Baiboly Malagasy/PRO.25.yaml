document_id: PRO.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ohabolana samy hafa ny amin'ny fitondran-tena sy ny toetry ny olona marina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izao koa no ohabolan'i Solomona, izay nangonin
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nafindran'
    marker-yv: yv-n
  - type: text
    text: '''ny olon''i Hezekia, mpanjakan''ny Joda:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voninahitr'Andriamanitra ny manafin-javatra; Fa voninahitry ny mpanjaka kosa ny mamanta-javatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny hahavon'ny lanitra sy ny halalin'ny tany Ary ny fon'ny mpanjaka dia samy tsy azo fantarina avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Esory ny taim-bolafotsy, Dia hisy fanaka ho an''ny mpanao an-idina. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Esory ny ratsy fanahy tsy ho eo anatrehan'ny mpanjaka, Dia hampitoerina amin'ny fahamarinana ny seza fiandrianany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aza manandra-tena eo anatrehan''ny mpanjaka, Ary aza mitoetra eo amin''ny fitoeran''ny lehibe; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa aleo ianao hantsoina hoe: Miakara atỳ, Toy izay hatambotsotra eo imason''ny manan-kaja izay hitan''ny masonao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aza maika handeha hiady, Fandrao tsy ho fantatrao izay hataonao amin'ny farany, Rehefa omen'ny namanao henatra ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Miadia ihany ny adinao amin''ny namanao, Kanefa aza aseho izay tsy tian''ny sasany holazaina, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fandrao izay mandre hanondro maso anao, Ka tsy ho afaka aminao ny laza ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny teny atao amin'ny antony dia poma volamena ao anaty vilia volafotsy tsara soratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: poma volamena misy ravaka volafotsy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kavim-bolamena sy firavaka volamena tsara Ny mpananatra hendry, raha amin''ny sofina mihaino. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toy ny hatsiaky ny oram-panala amin'ny taom-pijinjana, Dia toy izany ny iraka mahatoky amin'izay naniraka azy, Fa mamelombelona ny fon'ny tompony izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny rahona sy ny rivotra tsy misy orana Ny olona izay mirehaka amin'ny fizaram-bava.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny fahari-po no ahazoana mampanaiky ny mpitsara, Ary ny vava
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lela
    marker-yv: yv-n
  - type: text
    text: ' malefaka mahatapa-taolana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mahita tantely va ianao? Hano izay antonona anao, Fandrao voky loatra ianao ka handoa azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza miditra matetika ao an-tranon'ny namanao, Fandrao tofoka anao izy, ka ho halany ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Langilangy sy sabatra ary zana-tsipìka maranitra Ny olona izay mitsangana ho vavolombelona mandainga hanameloka ny namany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy ny nify nahasimatsimahana sy ny tongotra mangozohozo Ny fahatokiana ny mpamitaka amin'ny andro fahoriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Toy ny miala lamba amin'ny hatsiaka, Ary toy ny vinaingitra amin'ny sirahazo, Dia toy izany ny mikalo amin'ny malahelo am-po.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha noana ny fahavalonao, omeo hanina izy; Ary raha mangetaheta izy, omeo rano hosotroiny; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa raha manao izany ianao, dia hanambatra vainafo ho eo an-dohany, Ary Jehovah no hamaly soa anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny rivotra avy any avaratra mahatonga ranonorana, Dia toy izany, ny lelan''ny mpifosa mampahavinitra endrika. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aleo mitoetra eo an-joron'ny tampontrano Toy izay miray trano amin'ny vehivavy tia ady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rano mangatsiaka amin'ny fanahy reraka Ny filazana soa avy any an-tany lavitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Loharano voahosihosy sy fantsakana simba Ny marina izay mikoy ny ratsy fanahy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tsy tsara raha mahery homana tantely; Fa ny fitadiavan'ny olona ny voninahiny dia tsy voninahitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa ny fandinihana izay sarotra dia voninahitra (na: mavesatra)'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tanàna rava tsy misy manda Ny lehilahy izay tsy mahatsindry ny fanahiny.
