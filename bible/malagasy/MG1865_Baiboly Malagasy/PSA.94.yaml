document_id: PSA.94,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana amin'Andriamanitra noho ny fampahoriana ataon'ny lozabe
  - type: text
    content: 'Jehovah, Andriamanitra Mpamaly ny natao, ô, Andriamanitra, Mpamaly ny natao, ô, mamirapirata. '
  '10':
  - type: text
    content: 'Ny Mpampianatra ny jentilisa va tsy hananatra, Dia Izay mampianatra fahalalana ny olona? '
  '11':
  - type: text
    content: Jehovah no mahalala ny hevitry ny olona, Fa zava-poana izany.
  '12':
  - type: text
    content: 'Sambatra izay olona anarinao, Jehovah ô, Sady ampianarinao avy amin''ny lalanao, '
  '13':
  - type: text
    content: 'Mba homenao fitsaharana amin''ny andro fahoriana izy, Mandra-pihady lavaka ho an''ny ratsy fanahy. '
  '14':
  - type: text
    content: 'Fa Jehovah tsy mba hanary ny olony, Ary ny lovany tsy hafoiny. '
  '15':
  - type: text
    content: Fa ny fitsarana hiverina ho amin'ny fahamarinana, Ary hanaraka izany ny mahitsy fo rehetra
  '16':
  - type: text
    content: 'Iza no hitsangana ho ahy hisakana ny mpanao ratsy? Iza no hiseho ho ahy hisakana ny mpanao meloka? '
  '17':
  - type: text
    content: 'Raha tsy Jehovah no Mpamonjy ahy, Dia efa saiky nalaky nitoetra tao amin''ny mangingina ny fanahiko. '
  '18':
  - type: text
    content: 'Fony aho nanao hoe: Mangozohozo ny tongotro, Dia ny famindram-ponao, Jehovah ô, no nanohana ahy. '
  '19':
  - type: text
    content: 'Raha be ny ahiahy ato anatiko Dia mampifaly ny fanahiko ny fampiononanao. '
  '2':
  - type: text
    content: Misandrata, ry Mpitsara ny tany, ô; Mamalia ny mpiavonavona.
  '20':
  - type: text
    content: Hikambana aminao va ny seza fiandrianan'ny ratsy, Izay misaina fampahoriana manohitra ny lalàna
  - type: note
    content: 'Na: Izay misaina fampahoriana araka ny lalàny'
  - type: text
    content: '?'
  '21':
  - type: text
    content: 'Manao andiany hamely ny fanahin''ny marina ireo Ka manameloka ny rà marina. '
  '22':
  - type: text
    content: 'Fa tonga fiarovana avo ho ahy Jehovah; Ary vatolampy fialofako Andriamanitro. '
  '23':
  - type: text
    content: Dia ampanodiaviny azy ireo ny helony ka aringany noho ny faharatsiany izy; Eny, aringan'i Jehovah Andriamanitsika izy.
  '3':
  - type: text
    content: 'Mandra-pahoviana re ny ratsy fanahy, Jehovah ô, Mandra-pahoviana re no mbola hifalifaly ny ratsy fanahy? '
  '4':
  - type: text
    content: 'Mirezadrezatra sy miteny sahisahy izy; Mirehareha ny mpanao ratsy rehetra. '
  '5':
  - type: text
    content: 'Ny olonao, Jehovah ô, torotoroiny, Ary ny lovanao ampahoriny; '
  '6':
  - type: text
    content: 'Ny mpitondratena sy ny vahiny vonoiny, Ary ny kamboty dia matiny '
  '7':
  - type: text
    content: 'Fa hoy izy: Tsy mijery Jehovah, Ary tsy mandinika Andriamanitr''i Jakoba.'
  '8':
  - type: text
    content: 'Mahalalà ianareo olona ketrina; Ary ianareo adala, rahoviana re no mba ho hendry ianareo? '
  '9':
  - type: text
    content: Ny Mpanao
  - type: note
    content: Heb. Mpamboly
  - type: text
    content: ' ny sofina va tsy handre? Ny Mpamorona ny maso va tsy hahita? '
