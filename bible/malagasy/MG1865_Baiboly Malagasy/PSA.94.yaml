document_id: PSA.94
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana amin'Andriamanitra noho ny fampahoriana ataon'ny lozabe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jehovah, Andriamanitra Mpamaly ny natao, ô, Andriamanitra, Mpamaly ny natao, ô, mamirapirata. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Misandrata, ry Mpitsara ny tany, ô; Mamalia ny mpiavonavona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mandra-pahoviana re ny ratsy fanahy, Jehovah ô, Mandra-pahoviana re no mbola hifalifaly ny ratsy fanahy? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mirezadrezatra sy miteny sahisahy izy; Mirehareha ny mpanao ratsy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny olonao, Jehovah ô, torotoroiny, Ary ny lovanao ampahoriny; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny mpitondratena sy ny vahiny vonoiny, Ary ny kamboty dia matiny '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy izy: Tsy mijery Jehovah, Ary tsy mandinika Andriamanitr''i Jakoba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mahalalà ianareo olona ketrina; Ary ianareo adala, rahoviana re no mba ho hendry ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny Mpanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Mpamboly
    marker-yv: yv-n
  - type: text
    text: ' ny sofina va tsy handre? Ny Mpamorona ny maso va tsy hahita? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny Mpampianatra ny jentilisa va tsy hananatra, Dia Izay mampianatra fahalalana ny olona? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah no mahalala ny hevitry ny olona, Fa zava-poana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Sambatra izay olona anarinao, Jehovah ô, Sady ampianarinao avy amin''ny lalanao, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mba homenao fitsaharana amin''ny andro fahoriana izy, Mandra-pihady lavaka ho an''ny ratsy fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa Jehovah tsy mba hanary ny olony, Ary ny lovany tsy hafoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa ny fitsarana hiverina ho amin'ny fahamarinana, Ary hanaraka izany ny mahitsy fo rehetra
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Iza no hitsangana ho ahy hisakana ny mpanao ratsy? Iza no hiseho ho ahy hisakana ny mpanao meloka? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha tsy Jehovah no Mpamonjy ahy, Dia efa saiky nalaky nitoetra tao amin''ny mangingina ny fanahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fony aho nanao hoe: Mangozohozo ny tongotro, Dia ny famindram-ponao, Jehovah ô, no nanohana ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha be ny ahiahy ato anatiko Dia mampifaly ny fanahiko ny fampiononanao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hikambana aminao va ny seza fiandrianan'ny ratsy, Izay misaina fampahoriana manohitra ny lalàna
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Izay misaina fampahoriana araka ny lalàny'
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manao andiany hamely ny fanahin''ny marina ireo Ka manameloka ny rà marina. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa tonga fiarovana avo ho ahy Jehovah; Ary vatolampy fialofako Andriamanitro. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia ampanodiaviny azy ireo ny helony ka aringany noho ny faharatsiany izy; Eny, aringan'i Jehovah Andriamanitsika izy.
