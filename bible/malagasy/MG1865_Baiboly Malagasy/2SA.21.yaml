document_id: 2SA.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny herim-pon'ny mpiadin'i Davida raha niady tamin'ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nisy mosary telo taona misesy tamin'ny andron'i Davida, ary Davida nanontany tamin
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nitady ny tavan'
    marker-yv: yv-n
  - type: text
    text: '''i Jehovah. Dia hoy Jehovah: Avy amin''ny taranak''i Saoly, izay meloka noho ny fandatsahan-drà izao, satria namono ny Gibeonita izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny mpanjaka nampaka ny Gibeonita ka nanao taminy hoe (ny Gibeonita tsy mba isan''ny Zanak''Isiraely, fa sisa tamin''ny Amorita, ary ny Zanak''Isiraely efa nianiana taminy; nefa Saoly nitady izay hamelezany azy amin''ny firehetan''ny fitiavany ny Zanak''Isiraely sy ny Joda), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary hoy Davida tamin''ny Gibeonita: Inona no hataoko ho anareo; ary amin''inona no hanaovako fanavotana mba hitsofanareo rano ny lovan''i Jehovah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny Gibeonita taminy: Izahay tsy mahazo mandray volafotsy na volamena amin''i Saoly na amin''ny taranany sady tsy mahazo mamono olona amin''ny Isiraely Ary hoy izy: Koa ahoana ary no tianareo hataoko ho anareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izy ireo tamin''ny mpanjaka: Ny lehilahy izay nandringana anay sy nikasa hamely anay ho ringana tsy hitoetra amin''ny tanin''ny Isiraely rehetra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'no avelao hisy fito lahy amin''ny zanany hatolotra anay hahantonay ho an''i Jehovah ao Gibean''i Saoly, ilay voafidin''i Jehovah. Dia hoy ny mpanjaka: Hatolotro izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ny mpanjaka niaro an'i Mefiboseta, zanak'i Jonatana, zanak'i Saoly, noho ny fianianana tamin'i Jehovah nataon'i Davida sy Jonatana, zanak'i Saoly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny mpanjaka naka azy roa lahy, zanak'i Rizpa, zanakavavin'i Aia, izay naterany tamin'i Saoly, dia Armony sy Mefiboseta, ary ny dimy lahy zanak'i Mikala
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Meraba); izahao 1 Sam.xviii.19'
    marker-yv: yv-n
  - type: text
    text: ', zanakavavin''i Saoly, izay naterany tamin''i Adriela, zanak''i Barzilay Meholatita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia natolony teo an-tànan''ny Gibeonita ireo ka nahanton''ireo teo amin''ny havoana teo anatrehan''i Jehovah; ary niara-maty izy fitolahy, samy novonoiny tamin''ny niandohan''ny fararano tamin''ny voalohan''ny taom-pijinjana ny vary hordea izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Rizpa, zanakavavin''i Aia, naka lamba fisaonana, dia novelariny teo amin''ny vatolampy iny hitoerany hatramin''ny niandohan''ny taom-pijinjana ka ambara-pilatsaky ny orana avy any an-danitra tamin''ny faty, ka tsy navelany hipetrahan''ny voro-manidina ireo raha antoandro, na ny bibi-dia raha alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nambara tamin''i Davida izay nataon''i Rizpa, zanakavavin''i Aia, vaditsindranon''i Saoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia lasa Davida naka ny taolan''i Saoly sy ny taolan''i Jonatana zanany tany amin''ny mponina tao Jabesi-gileada, izay nangalatra azy tao an-kalalahana any Beti-sana, ilay nanantonan''ny Filistina azy tamin''ny andro namonoan''ny Filistina an''i Saoly tao Gilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary dia nentiny niakatra avy tany ny taolan''i Saoly sy ny taolan''i Jonatana zanany, ary nangoniny koa ny taolan''ireo voahantona ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny taolan'i Saoly sy Jonatana zanany dia nalevin'ny olona tao amin'ny tanin'ny Benjamina tao Zela, tao amin'ny fasan'i Kisy rainy; ary dia vitany izay rehetra nandidian'ny mpanjaka. Ary nony efa vita izany, dia neken'Andriamanitra ny fifonana natao ho an'ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary niady indray ny Filistina sy ny Isiraely; ary Davida sy ny mpanompony izay nanaraka azy dia nidina ka niady tamin''ny Filistina, ary reraka Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Jisbibenoba, izay isan''ny taranaky ny Refaita (ny lanjan''ny lefony dia varahina telon-jato sekely), dia nitondra fiadiana vaovao ka nikasa hahafaty an''i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Abisay, zanak''i Zeroia, nanampy azy, dia namely ilay Filistina ka nahafaty azy. Ary tamin''izay ny olon''i Davida dia nianiana taminy ka nanao hoe: Tsy hiara-mivoaka aminay intsony ho amin''ny ady ianao, fandrao hovonoinao ny fahazavan''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony afaka izany, dia nisy ady indray amin''ny Filistina teo Goba, ary Sibeka Hosatita nahafaty an''i Safa, izay isan''ny taranaky ny Refaita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary nisy ady indray koa tamin'ny Filistina teo Goba, ary Elanana, zanak'i Jare-oregima Betlehemita, namono an'i Goliata Gatita
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny rahalahin''i Goliata; izahao 1 Tan. xx.5'
    marker-yv: yv-n
  - type: text
    text: ', izay nanan-jaran-defona tahaka ny vodi-tenon''ny mpanenona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nisy ady koa tao Gata, ary nisy lehilahy vaventy, izay enin-drantsana, ka dia efatra amby roa-polo no isan''ny rantsan-tànany sy ny rantsan-tongony, ary izy koa dia mba teraky ny Refaita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izy nihaika ny Isiraely, ka matin''i Jonatana, zanak''i Simea, rahalahin''i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ireo efatra ireo no teraky ny Refaita teo Gata, ka matin'ny tànan'i Davida sy ny tanan'ny mpanompony avokoa ireo.
