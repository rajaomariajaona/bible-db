document_id: PSA.17,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fivavaky ny ory mba hovonjen'Andriamanitra tsy ho azon'ny hery sy ny reharehan'ny fahavalony
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fivavak''i Davida. Jehovah ô, mihainoa ny rariny, mandrenesa ny fitarainako, atongilano ny sofinao amin''ny fivavako avy amin''ny molotra tsy misy fitaka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Efa mihirim-belona izy; teny miavonavona no aloaky ny vavany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Manodidina anay
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ahy'
      marker-yv: yv-n
    - type: text
      text: ' amin''ny alehanay ankehitriny izy, Vandrininy hapotrany amin''ny tany izahay; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny fijery azy dia tahaka ny liona noana ta-hamiravira, sy tahaka ny liona tanora mamitsaka ao am-pierena. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mitsangàna, Jehovah ô, sakano izy, aripaho izy; vonjeo amin''ny sabatrao ny fanahiko tsy ho azon''ny ratsy fanahy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Vonjeo amin'ny tananao aho, Jehovah ô, mba tsy ho azon'ny olon'izao tontolo izao, izay manana ny anjarany amin'izao fiainana izao, sady fenoinao ny harenao ny kibony; Maro anaka izy, dia mamela ny fananany be ho an'ny zanany madinika.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa izaho kosa, dia aoka hahita ny tavanao amin'ny fahamarinana; aoka ny endrikao no hahafa-po ahy, raha mifoha.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hivoaka avy eo anatrehanao ny fitsarana ahy; ny masonao hijery marina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nizaha toetra ny foko Hianao, namantatra ahy nony alina; nizaha toetra ahy tamin'ny memy Hianao, fa tsy nahita na inona na inona; ny vavako tsy hafa noho ny eritreritro
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fa tsy nahita hevi-dratsy; Tsy ho diso ny vavako na: Mikasa tsy hampanota ny vavako aho'
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny amin''ny asan''ny olona, dia ny tenin''ny molotrao no nitandremako tsy ho amin''ny lalan''ny mpanao an-keriny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny diako maharitra eo amin'ny lalanao, tsy solafaka ny tongotro.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izaho miantso Anao, ka mamaly ahy Hianao, Andriamanitra ô; atongilano amiko ny sofinao, ka henoy ny teniko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ataovy mahagaga ny famindram-ponao, ry Mpamonjy amin''ny tananao ankavanana izay olona mialoka aminao, mba tsy ho azon''ny fahavalo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Arovy tahaka ny anakandriamaso aho, afeno ao ambanin''ny aloky ny elatrao, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mba tsy ho azon''ny ratsy fanahy izay mampahory ahy, dia ny fahavaloko masiaka, izay manodidina ahy. '
