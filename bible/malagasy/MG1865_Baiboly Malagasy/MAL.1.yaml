document_id: MAL.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny fitiavan'Andriamanitra ny Isiraely, sy ny nanamavoan'ireny ny anarany sy ny fombam-pivavahana aminy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teny faminaniana avy tamin''i Jehovah nampitondrainy an''i Malakia ho amin''ny Isiraely. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enga anie ka hisy aminareo handrindrina ny varavarana ka tsy handrehitra afo foana eo ambonin''ny alitarako! Tsy hankasitraka anareo Aho, na ta-handray fanatitra amin''ny tananareo, hoy Jehovah, Tompon''ny maro. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hatramin'ny fiposahan'ny masoandro ka hatramin'ny filentehany dia lehibe
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho lehibe'
      marker-yv: yv-n
    - type: text
      text: ' ny anarako any amin''ny jentilisa, ary any amin''ny tany rehetra no handoroana ditin-kazo manitra sy hanaterana fanatitra madio ho an''ny anarako; fa lehibe'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho lehibe'
      marker-yv: yv-n
    - type: text
      text: ' any amin''ny jentilisa ny anarako, hoy Jehovah, Tompon''ny maro. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo kosa manamavo izany amin''ny fanaovanareo hoe: Voaloto ny latabatr''i Jehovah, ary ny haniny aterina eo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vokany
      marker-yv: yv-n
    - type: text
      text: ' dia tsinontsinona. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy koa ianareo: Tsy mba hasasarana lahy ! ary ikifonanareo izany, hoy Jehovah, Tompon''ny maro; entinareo ny nalaina an-keriny sy ny mandringa sy ny marary, ka dia aterinareo ho fanatitra; moa ta-handray izany amin''ny tenanareo va Aho ? hoy Jehovah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa voaozona ny mpamitaka, izay manana ondrilahy ao amin'ny ondriny, ary mivoady, nefa mamono zavatra misy kilema hatao fanatitra ho an'ny Tompo. Fa Mpanjaka lehibe Aho, hoy Jehovah, Tompon'ny maro, ary ny anarako dia mahatahotra any amin'ny jentilisa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa tia anareo Aho, hoy Jehovah; nefa hoy ianareo: Inona no nentinao nitia anay? Tsy rahalahin''i Jakoba va Esao? hoy Jehovah; nefa Jakoba no tiako, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa Esao no halako, ka nataoko tany lao ny tendrombohiny, ary ny lovany natolotro ho an'ny amboadia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: jakala'
      marker-yv: yv-n
    - type: text
      text: ' any an-efitra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia hoy aza Edoma: Torotoro izahay, nefa mbola hamboarinay indray ny efa rava dia izao no lazain''i Jehovah, Tompon''ny maro: Ireo dia hanamboatra, fa Izaho kosa handrava; ary dia hatao hoe tanin''ny faharatsiana, dia firenena tezeran''i Jehovah mandrakizay, ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny masonareo no hahita, ka dia hiteny ianareo hanao hoe: Jehovah dia lehibe'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho lehibe anie'
      marker-yv: yv-n
    - type: text
      text: ' any an-koatry'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: eny amin'''
      marker-yv: yv-n
    - type: text
      text: ' ny tanin''ny Isiraely. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanaka manaja ny rainy, ary ny mpanompo ny tompony; koa raha Ray Aho, aiza ary izay hajako? ary raha Tompo Aho, aiza izay tahotra Ahy? hoy Jehovah, Tompon''ny maro, aminareo, ry mpisorona, izay manamavo ny anarako. nefa manao hoe: Amin''inona no anamavoanay ny anaranao? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''ny fitondrana hanina voaloto ho eo amin''ny alitarako. Nefa ianareo manao hoe: Amin''inona no andotoanay Anao ? Amin''ny fanaovanareo hoe: Ny latabatr''i Jehovah dia fanazimbazimba. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha jamba no entinareo hovonoina hatao fanatitra, tsy ratsy hoe izany! Ary raha mandringa sy marary no entinareo, tsy ratsy hoe izany! Atero ho an''ny governora manapaka anao ange izany, moa hahazo sitraka na fitia aminy va ianao? hoy Jehovah Tompon''ny maro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa masìna ianareo, andeha mifona amin''Andriamanitra hamindrany fo amintsika fa ny tananareo no nahatonga izany, moa hankasitraka va Izy noho ny aminareo? hoy Jehovah, Tompon''ny maro. '
