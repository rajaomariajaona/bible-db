document_id: ISA.23,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin'loza hanjo an'i Tyro
  - type: text
    content: Faminaniana ny amin'ny loza hanjo an'i Tyro. Midradradradrà ianareo, ry sambon'i Tarsisy ô! Fa rava Tyro, ka tsy misy trano sady tsy azo idirana intsony ao; Avy tany amin'ny tany Kitima no nanambarana izany taminy.
  '10':
  - type: text
    content: Ry Tarsisy zanakavavy, aoka ianao hanafotra ny taninao tahaka an'i Neily; Fa tsy misy fifehezana
  - type: note
    content: Heb. fehin-kibo
  - type: text
    content: ' intsony. '
  '11':
  - type: text
    content: 'Ny tànan''i Jehovah nahifiny tambonin''ny ranomasina; Nampihorohoroiny ny fanjakana; Jehovah efa nandidy ny amin''i Kanana, mba horavana ny fiarovany mafy. '
  '12':
  - type: text
    content: 'Ary hoy Izy: Tsy hiravoravo intsony ianao, ry virijina afa-baraka, Sidona zanakavavy; Miaingà, mità ho any Kitima; Kanefa na dia any aza tsy hahita fitsaharana tsy akory ianao. '
  '13':
  - type: text
    content: Indro ny tanin'ny Kaldeana! Tsy firenena intsony izy, fa nataon'ny Asyriana fonenan'ny bibi-dia any an-efitra
  - type: note
    content: 'Na: Indro ny tanin''ny Kaldeana, Izay tsy mbola firenena fahiny, Fa ny Asyriana no nanorina azy ho an''ny mponina any an-efitra'
  - type: text
    content: '; Manao tilikambo fitiliana izy ka mandrava ny lapan''ny mpanjaka ao ary mampody azy ho korontam-bato. '
  '14':
  - type: text
    content: 'Midradradradrà ianareo, ry sambon''i Tarsisy ô! Fa rava ny fiarovanareo mafy. '
  '15':
  - type: text
    content: 'Ary amin''izany andro izany dia hohadinoina fito-polo taona Tyro, toy ny andron''ny mpanjaka iray; Ary rehefa afaka fito-polo taona, Tyro dia hiharan''ilay tonon-kalon''ny janga manao hoe: '
  '16':
  - type: text
    content: '"Makà lokanga, ka miveziveze eran''ny tanàna ianao, ry kala janga hadino; Mitendre tsara, ka mahereza mivazovazo, mba hahatsiarovana anao." '
  '17':
  - type: text
    content: 'Ary rehefa afaka fito-polo taona, Jehovah hamangy an''i Tyro, ka dia hiverina amin''ny filan-tangy izy sy hijangajanga amin''ny fanjakana rehetra manerana izao tontolo izao. '
  '18':
  - type: text
    content: Ary ny varony sy ny tangy azony dia hohamasinina ho an'i Jehovah; Tsy hotehirizina na horaketina izany; Fa ny varony dia ho an'izay mitoetra eo anatrehan'i Jehovah, ho hanina mahavoky sy ho fitafiana mendrika
  - type: note
    content: 'Na: mateza'
  - type: text
    content: .
  '2':
  - type: text
    content: Mangina, ianareo mponina amoron-tsiraka! Ny mpandranto avy any Sidona, Izay mandeha eny ambonin'ny ranomasina, no efa nampanan-karena
  - type: note
    content: Heb. nameno
  - type: text
    content: ' anao. '
  '3':
  - type: text
    content: 'Teny amin''ny rano be ny varin''i Sihora, dia ny vokatr''i Neily, ka nampiditra harena ho azy; Ary tonga tsenan''ny firenena izy. '
  '4':
  - type: text
    content: 'Aoka ho menatra ianao, ry Sidona; Fa ny ranomasina, dia ny fiarovana mafy ao an-dranomasina, efa niteny hoe: Tsy mbola nihetsi-jaza aho, na niteraka, tsy mbola nitaiza zatovo aho, na namelona virijina. '
  '5':
  - type: text
    content: 'Rehefa re tany Egypta izany, Dia toran-kovitra izy noho ny nanjo an''i Tyro. '
  '6':
  - type: text
    content: 'Mità ho any Tarsisy ianareo; Midradradradrà, ry mponina amoron-tsiraka. '
  '7':
  - type: text
    content: Izao va no manjo anao, ry ilay niravoravo
  - type: note
    content: Izao va no tanànanao miravoravo?
  - type: text
    content: ', izay efa naorina hatry ny fony fahagola sady nentin''ny tongony hivahiny any lavitra any? '
  '8':
  - type: text
    content: 'Iza no nikasa izany hamelezana an''i Tyro, mpanome satro-boninahitra, izany? Mpanapaka ny mpandrantony, Olo-malaza amin''ny tany ny mpivarony. '
  '9':
  - type: text
    content: 'Jehovah, Tompon''ny maro, no nikasa izany, mba hampietreny ny fiavonavonan''ny voninahitra rehetra, sy hanalany ny voninahitry ny olo-malaza rehetra amin''ny tany. '
