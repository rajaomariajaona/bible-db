document_id: 3JN.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana an'i Gaio noho ny nandraisany vahiny, sy filazana ny amin'i Diotrefa sy Demetrio
  - type: text
    content: Izaho loholona
  - type: note
    content: Gr. Ny presbytera
  - type: text
    content: ' mamangy an''i Galo, ilay malala, izay tiako amin''ny fahamarinana.'
  '10':
  - type: text
    content: Koa amin'izany, raha tonga aho, dia hotsarovako izay asa ataony, fa mibedibedy foana manaratsy anay izy; ary tsy afa-po amin'izany ihany, fa ny tenany dia tsy mandray ireo rahalahy ireo, ary izay ta-handray azy dia raràny sy roahiny hiala amin'ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ry malala, aza ny ratsy no alain-tahaka, fa ny tsara. Izay manao ny tsara no avy amin''Andriamanitra; fa izay manao ny ratsy tsy mba nahita an''Andriamanitra. '
  '12':
  - type: text
    content: Demetrio dia tsara laza amin'ny olona rehetra sy amin'ny fahamarinana koa; ary izahay koa manambara izany, ary fantatrao fa marina ny fanambaranay.
  '13':
  - type: text
    content: Nanana zavatra maro hosoratana aho, nefa tsy tiako hosoratana aminao amin'ny ranomainty sy ny penina
  - type: note
    content: Gr. volotara
  - type: text
    content: '; '
  '14':
  - type: text
    content: fa manantena hahita anao faingana ihany aho, dia hiteny mifanatrika isika. Ho aminao anie ny fiadanana. Ny sakaiza atỳ manao veloma anao. Veloma amin'ny sakaiza tsirairay araka ny anarany avy.
  '2':
  - type: text
    content: 'Ry malala, mangataka aho mba hambinina sy ho salama amin''ny zavatra rehetra anie ianao, tahaka izay anambinana ny fanahinao ihany. '
  '3':
  - type: text
    content: 'Fa faly indrindra aho, fony nisy rahalahy tonga ka nanambara ny fahamarinanao, dia toy ny andehananao araka ny fahamarinana. '
  '4':
  - type: text
    content: 'Tsy manana fifaliana mihoatra noho izao aho, dia ny andrenesako fa mandeha araka ny fahamarinana ny zanako. '
  '5':
  - type: text
    content: 'Ry malala, manao asa mahatoky ianao na amin''inona na amin''inona ataonao amin''ireo rahalahy ireo, na dia vahiny aza izy, '
  '6':
  - type: text
    content: izay nanambara ny fitiavanao teo anatrehan'ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: '; dia ho soa no ataonao, raha mamoaka azy koa araka izay miendrika hatao noho ny amin''Andriamanitra ianao; '
  '7':
  - type: text
    content: 'fa noho ny Anarana no niangany, ka tsy naka na inona na inona tamin''ny jentilisa izy. '
  '8':
  - type: text
    content: 'Koa isika dia tokony handray tsara izay toy izany, mba ho mpiara-miasa aminy amin''ny fahamarinana. '
  '9':
  - type: text
    content: Nanoratra tamin'ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' Ihany aho; nefa Diotrefa, izay te-ho lohany, dia tsy mba mandray anay. '
