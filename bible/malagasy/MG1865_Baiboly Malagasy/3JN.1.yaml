document_id: 3JN.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaorana an'i Gaio noho ny nandraisany vahiny, sy filazana ny amin'i Diotrefa sy Demetrio
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izaho loholona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. Ny presbytera
    marker-yv: yv-n
  - type: text
    text: ' mamangy an''i Galo, ilay malala, izay tiako amin''ny fahamarinana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry malala, mangataka aho mba hambinina sy ho salama amin''ny zavatra rehetra anie ianao, tahaka izay anambinana ny fanahinao ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa faly indrindra aho, fony nisy rahalahy tonga ka nanambara ny fahamarinanao, dia toy ny andehananao araka ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy manana fifaliana mihoatra noho izao aho, dia ny andrenesako fa mandeha araka ny fahamarinana ny zanako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ry malala, manao asa mahatoky ianao na amin''inona na amin''inona ataonao amin''ireo rahalahy ireo, na dia vahiny aza izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: izay nanambara ny fitiavanao teo anatrehan'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: '; dia ho soa no ataonao, raha mamoaka azy koa araka izay miendrika hatao noho ny amin''Andriamanitra ianao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa noho ny Anarana no niangany, ka tsy naka na inona na inona tamin''ny jentilisa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa isika dia tokony handray tsara izay toy izany, mba ho mpiara-miasa aminy amin''ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nanoratra tamin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ' Ihany aho; nefa Diotrefa, izay te-ho lohany, dia tsy mba mandray anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa amin'izany, raha tonga aho, dia hotsarovako izay asa ataony, fa mibedibedy foana manaratsy anay izy; ary tsy afa-po amin'izany ihany, fa ny tenany dia tsy mandray ireo rahalahy ireo, ary izay ta-handray azy dia raràny sy roahiny hiala amin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ry malala, aza ny ratsy no alain-tahaka, fa ny tsara. Izay manao ny tsara no avy amin''Andriamanitra; fa izay manao ny ratsy tsy mba nahita an''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Demetrio dia tsara laza amin'ny olona rehetra sy amin'ny fahamarinana koa; ary izahay koa manambara izany, ary fantatrao fa marina ny fanambaranay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nanana zavatra maro hosoratana aho, nefa tsy tiako hosoratana aminao amin'ny ranomainty sy ny penina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. volotara
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: fa manantena hahita anao faingana ihany aho, dia hiteny mifanatrika isika. Ho aminao anie ny fiadanana. Ny sakaiza atỳ manao veloma anao. Veloma amin'ny sakaiza tsirairay araka ny anarany avy.
