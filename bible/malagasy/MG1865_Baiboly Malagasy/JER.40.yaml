document_id: JER.40,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanafahana an'i Jeremia, sy ny niverenan'ny olona maro hipetraka ao amin'ny tany hotapahin'i Gedalia, ary ny namonoana an'i Gedalia
  - type: text
    content: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah, taorian''ny nandefasan''i Nebozaradana, lehiben''ny mpiambina, azy niala tany Rama, tamin''ilay nampanalany azy fony izy mbola nigadra tao amin''ny babo rehetra avy tany Jerosalema sy Joda, izay nentina ho babo tany Babylona. '
  '10':
  - type: text
    content: Ary ny amiko, dia, indro, honina any Mizpa aho hanompo ny Kaldeana izay ho avy etỳ amintsika; fa ianareo dia manangona divay sy voankazo masaka fahavaratra ary diloilo, ka ataovy ao amin'ny fitehirizanareo, dia monena amin'izay tanàna nidiranareo.
  '11':
  - type: text
    content: 'Ary koa, ny Jiosy rehetra izay tany Moaba sy tany amin''ny taranak''i Amona sy tany Edoma ary izay tany amin''ny tany rehetra dia nahare fa ny mpanjakan i Babylona efa namela ny Joda hisy sisa sady efa nanendry an''i Gedalia, zanak''i Ahikama, zanak''i Safana, ho mpanapaka azy, '
  '12':
  - type: text
    content: dia niverina ny Jiosy rehetra avy tany amin'ny tany rehetra izay efa nandroahana azy ka tonga tany amin'ny tanin'ny Joda ho any amin'i Gedalia tao Mizpa, ka nanangona divay sy voankazo sesehena masaka fahavaratra izy.
  '13':
  - type: text
    content: 'Ary Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay tany an-tsaha dia tonga tany amin''i Gedalia tany Mizpa '
  '14':
  - type: text
    content: 'ka nanao taminy hoe: Moa fantatrao tokoa va fa Balisa, mpanjakan''ny taranak''i Amona, dia naniraka an''Isimaela, zanak''i Netania, hamono anao? Nefa tsy nino azy Gedalia, zanak i Ahikama. '
  '15':
  - type: text
    content: 'Ary Johanana, zanak''i Karea, nilaza mangingina tamin''i Gedalia tao Mizpa nanao hoe: masìna ianao, aoka aho handeha hamono an''Isimaela, zanak''i Netania, fa tsy hisy olona hahalala izany tsy akory; fa nahoana no havela hamono anao izy ka hampiely ny Jiosy rehetra izay tafangona eto aminao ary hahalany ringana ny sisa amin''ny Joda? '
  '16':
  - type: text
    content: 'Fa hoy Gedalia, zanak''i Ahikama, tamin''i Johanana, zanak''i Karea: Aza manao izany ianao, fa miampanga lainga foana an''Isimaela ianao.'
  '2':
  - type: text
    content: 'An''ny lehiben''ny mpiambina dia naka an''i Jeremia ka nanao taminy hoe: Jehovah Andriamanitrao nanambara izao loza izao, izay nanjo ity tanàna ity. '
  '3':
  - type: text
    content: 'Ary Jehovah nahatonga izany ka nanao araka izay nolazainy, noho ny nanotanareo tamin''i Jehovah sy ny tsy nihainoanareo ny feony, dia izany no nahatonga izao zavatra izao taminareo. '
  '4':
  - type: text
    content: 'Ary, indro, ankehitriny vahako izao ny gadra amin''ny tananao. Koa raha sitraky ny fonao kosa ny hiaraka amiko hankany Babylona, dia andeha, fa hotandremako tsara ianao; nefa raha tsy sitraky ny fonao ny hiaraka amiko ho any Babylona, dia mijanòna ihany; indro, ny tany rehetra dia eo anoloanao, koa izay tany tianao sy sitrakao no andehano. '
  '5':
  - type: text
    content: 'Ary raha tsy mbola nety nandeha izy, dia hoy Nebozaradana: Miverena indray any amin''i Gedalia, zanak''i Ahikama, zanak''i Safana, izay voatendrin''ny mpanjakan''i Babylona ho mpanapaka ny tanànan''ny Joda ka tomoera aminy ao amin''ny olona, na mandehana any amin''izay tianao haleha na aiza na aiza. Dia nomen''ny lehiben''ny mpiambina vatsy sy fanomezana izy ka nalefany handeha. '
  '6':
  - type: text
    content: 'Ary Jeremia nankany amin''i Gedalia, zanak''i Ahikama, tany Mizpa ka niara-nonina taminy tao amin''ny vahoaka izay sisa velona tamin''ny tany. '
  '7':
  - type: text
    content: 'Ary raha ren''ny mpifehy ny miaramila rehetra izay tany an-tsaha sy ny olom-peheziny fa ny mpanjakan''i Babylona efa nanendry an''i Gedalia, zanak''i Ahikama, ho mpanapaka ny tany sy ho mpitandrina ny lehilahy mbamin''ny zaza amim-behivavy ary ny malahelo sasany teo amin''ny tany izay tsy mbola lasan-ko babo tany Babylona, '
  '8':
  - type: text
    content: 'dia tonga tany amin''i Gedalia tany Mizpa izy, dia Isimaela, zanak''i Netania, sy Johanana sy Jonatana, zanak''i Karea, sy Seraia, zanak''i Tanometa, sy ny zanak''i Efay Netofatita ary Jazania, zanak''ilay Makatita, dia izy ireny sy ny olom-peheziny avy. '
  '9':
  - type: text
    content: 'Ary Gedalia, zanak''i Ahikama, zanak''i Safana, dia nianiana taminy sy tamin''ny olona-peheziny nanao hoe: Aza matahotra hanompo ny Kaldeana; monena amin''ny tany, ka manompoa ny mpanjakan''i Babylona, dia hahita soa ianareo. '
