document_id: MAT.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nony afaka henemana, Jesosy dia naka an''i Petera sy Jakoba ary Jaona rahalahiny ka nitondra azy niakatra ho any an-tendrombohitra avo mba hitokana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niova tarehy teo anatrehany Izy, ka ny tavany namirapiratra tahaka ny masoandro, ary ny fitafiany tonga fotsy tahaka ny mazava. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary, indreo, niseho tamin''ny mpianatra Mosesy sy Elia, niresaka tamin''i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niteny Petera ka nanao tamin''i Jesosy hoe: Tompoko, tsara raha mitoetra eto isika; koa raha sitrakao, aoka aho hanao lay telo eto: ny anankiray ho Anao, ny anankiray ho an''i Mosesy, ary ny anankiray ho an''i Elia. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha mbola niteny izy, indro, nisy rahona mazava nanarona azy ireo; ary, injao, nisy feo avy tao amin''ny rahona nanao hoe: Ity no Zanako malalako Izay sitrako; Izy no henoy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony nandre izany ny mpianatra, dia lavo niankohoka sady natahotra indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Jesosy nankeo aminy, dia nanendry azy ka nanao hoe; Mitsangàna, fa aza matahotra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony niandrandra izy ireo, dia tsy nahita olona, afa-tsy Jesosy irery ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa nidina avy tao an-tendrombohitra izy, dia nandrara azy Jesosy ka nanao hoe: Aza milaza amin''olona ny fahitana, mandra-pitsangan''ny Zanak''olona amin''ny maty. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny mpianany nanontany Azy ka nanao hoe: Nahoana ary no ilazan''ny mpanora-dalàna fa Elia tsy maintsy ho avy aloha? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Jesosy namaly ka nanao hoe: Elia dia avy ihany ka hampody ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa lazaiko aminareo: Efa tonga sahady Elia; nefa ny olona tsy nahafantatra azy, fa nanao izay sitraky ny fony taminy. Dia tahaka izany koa no hampiaretany ny Zanak''olona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia fantatry ny mpianatra fa Jaona Mpanao-batisa no nolazainy taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa tonga teo amin''ny vahoaka izy ireo, nisy lehilahy anankiray nanatona an''i Jesosy, dia nandohalika teo anatrehany ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tompoko, mamindrà fo amin''ny zanako-lahy, fa mararin''ny androbe izy ka mahantra tokoa; fa matetika izy no mianjera ao amin''ny afo, ary matetika ao amin''ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nitondra azy tamin''ny mpianatrao aho, fa tsy nahay nahasitrana azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jesosy namaly ka nanao hoe: Ry taranaka tsy mino sady efa nivadika, mandra-pahoviana no hitoerako aminareo? Mandra-pahoviana no handeferako aminareo? Ento atỳ amiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niteny mafy azy Jesosy, dia nivoaka taminy ny demonia, ka sitrana ilay zazalahy tamin''izay ora izay. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nankao amin''i Jesosy mangingina ny mpianatra ka nanao hoe: Nahoana izahay no tsy nahavoaka azy? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Jesosy taminy: Noho ny fahakelezan''ny finoanareo ihany; fa lazaiko aminareo marina tokoa: Raha manana finoana hoatra ny voan-tsinapy iray aza ianareo ka hiteny amin''io tendrombohitra io hoe: Mifindrà erỳ , dia hifindra izy; ary tsy hisy tsy ho hainareo hatao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: (21) Kanefa iny karazana iny tsy mivoaka raha tsy avoaka amin''ny fivavahana sy ny fifadian-kanina'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha nitoetra tany Galilia izy, Jesosy dia nilaza tamin''ny mpianany hoe: Ny Zanak''olona efa hatolotra ho eo an-tànan''ny olona '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ka hovonoiny, nefa amin''ny andro fahatelo dia hatsangana indray Izy. Ary dia nalahelo indrindra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nony tonga tao Kapernaomy izy, dia nankeo amin''i Petera ny mpandray ny antsasaky ny sekely ka nanao hoe: Moa ny mpampianatra anareo tsy mba mandoa ny antsasaky ny sekely'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. didrakma
    marker-yv: yv-n
  - type: text
    text: ' va? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy Petera: Mandoa ihany Izy. Ary raha vao tafiditra tao an-trano Petera, dia nosakanan''i Jesosy teny izy ka nataony hoe: Ahoana no hevitrao, ry Simona? Avy amin''iza moa no andraisan''ny mpanjaka etỳ an-tany fadin-tseranana sy vola hetra? Avy amin''ny zanany va, sa avy amin''ny olon-kafa? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony hoy Petera taminy: Avy amin''ny olon-kafa, dia hoy kosa Jesosy: Dia afaka ary ny zanaka. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nefa andrao isika manafintohina azy, dia mankanesa ao amin'ny ranomasina ianao, ka manjonoa; ary raiso izay hazandrano azo voalohany, ka rehefa sokafanao ny vavany, dia hahita vola sekely eo ianao; dia raiso izany, ka omeo azy ho avy amiko sy ianao.
