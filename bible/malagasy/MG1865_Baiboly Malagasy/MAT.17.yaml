document_id: MAT.17,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nony afaka henemana, Jesosy dia naka an''i Petera sy Jakoba ary Jaona rahalahiny ka nitondra azy niakatra ho any an-tendrombohitra avo mba hitokana. '
  '10':
  - type: text
    content: 'Ary ny mpianany nanontany Azy ka nanao hoe: Nahoana ary no ilazan''ny mpanora-dalàna fa Elia tsy maintsy ho avy aloha? '
  '11':
  - type: text
    content: 'Ary Jesosy namaly ka nanao hoe: Elia dia avy ihany ka hampody ny zavatra rehetra. '
  '12':
  - type: text
    content: 'Nefa lazaiko aminareo: Efa tonga sahady Elia; nefa ny olona tsy nahafantatra azy, fa nanao izay sitraky ny fony taminy. Dia tahaka izany koa no hampiaretany ny Zanak''olona. '
  '13':
  - type: text
    content: Dia fantatry ny mpianatra fa Jaona Mpanao-batisa no nolazainy taminy.
  '14':
  - type: text
    content: 'Ary rehefa tonga teo amin''ny vahoaka izy ireo, nisy lehilahy anankiray nanatona an''i Jesosy, dia nandohalika teo anatrehany ka nanao hoe: '
  '15':
  - type: text
    content: 'Tompoko, mamindrà fo amin''ny zanako-lahy, fa mararin''ny androbe izy ka mahantra tokoa; fa matetika izy no mianjera ao amin''ny afo, ary matetika ao amin''ny rano. '
  '16':
  - type: text
    content: 'Ary nitondra azy tamin''ny mpianatrao aho, fa tsy nahay nahasitrana azy izy. '
  '17':
  - type: text
    content: 'Ary Jesosy namaly ka nanao hoe: Ry taranaka tsy mino sady efa nivadika, mandra-pahoviana no hitoerako aminareo? Mandra-pahoviana no handeferako aminareo? Ento atỳ amiko izy. '
  '18':
  - type: text
    content: 'Ary niteny mafy azy Jesosy, dia nivoaka taminy ny demonia, ka sitrana ilay zazalahy tamin''izay ora izay. '
  '19':
  - type: text
    content: 'Dia nankao amin''i Jesosy mangingina ny mpianatra ka nanao hoe: Nahoana izahay no tsy nahavoaka azy? '
  '2':
  - type: text
    content: 'Dia niova tarehy teo anatrehany Izy, ka ny tavany namirapiratra tahaka ny masoandro, ary ny fitafiany tonga fotsy tahaka ny mazava. '
  '20':
  - type: text
    content: 'Ary hoy Jesosy taminy: Noho ny fahakelezan''ny finoanareo ihany; fa lazaiko aminareo marina tokoa: Raha manana finoana hoatra ny voan-tsinapy iray aza ianareo ka hiteny amin''io tendrombohitra io hoe: Mifindrà erỳ , dia hifindra izy; ary tsy hisy tsy ho hainareo hatao'
  - type: note
    content: 'Ampio hoe: (21) Kanefa iny karazana iny tsy mivoaka raha tsy avoaka amin''ny fivavahana sy ny fifadian-kanina'
  - type: text
    content: .
  '22':
  - type: text
    content: 'Ary raha nitoetra tany Galilia izy, Jesosy dia nilaza tamin''ny mpianany hoe: Ny Zanak''olona efa hatolotra ho eo an-tànan''ny olona '
  '23':
  - type: text
    content: 'ka hovonoiny, nefa amin''ny andro fahatelo dia hatsangana indray Izy. Ary dia nalahelo indrindra ireo. '
  '24':
  - type: text
    content: 'Ary nony tonga tao Kapernaomy izy, dia nankeo amin''i Petera ny mpandray ny antsasaky ny sekely ka nanao hoe: Moa ny mpampianatra anareo tsy mba mandoa ny antsasaky ny sekely'
  - type: note
    content: Gr. didrakma
  - type: text
    content: ' va? '
  '25':
  - type: text
    content: 'Dia hoy Petera: Mandoa ihany Izy. Ary raha vao tafiditra tao an-trano Petera, dia nosakanan''i Jesosy teny izy ka nataony hoe: Ahoana no hevitrao, ry Simona? Avy amin''iza moa no andraisan''ny mpanjaka etỳ an-tany fadin-tseranana sy vola hetra? Avy amin''ny zanany va, sa avy amin''ny olon-kafa? '
  '26':
  - type: text
    content: 'Ary nony hoy Petera taminy: Avy amin''ny olon-kafa, dia hoy kosa Jesosy: Dia afaka ary ny zanaka. '
  '27':
  - type: text
    content: Nefa andrao isika manafintohina azy, dia mankanesa ao amin'ny ranomasina ianao, ka manjonoa; ary raiso izay hazandrano azo voalohany, ka rehefa sokafanao ny vavany, dia hahita vola sekely eo ianao; dia raiso izany, ka omeo azy ho avy amiko sy ianao.
  '3':
  - type: text
    content: 'Ary, indreo, niseho tamin''ny mpianatra Mosesy sy Elia, niresaka tamin''i Jesosy. '
  '4':
  - type: text
    content: 'Dia niteny Petera ka nanao tamin''i Jesosy hoe: Tompoko, tsara raha mitoetra eto isika; koa raha sitrakao, aoka aho hanao lay telo eto: ny anankiray ho Anao, ny anankiray ho an''i Mosesy, ary ny anankiray ho an''i Elia. '
  '5':
  - type: text
    content: 'Raha mbola niteny izy, indro, nisy rahona mazava nanarona azy ireo; ary, injao, nisy feo avy tao amin''ny rahona nanao hoe: Ity no Zanako malalako Izay sitrako; Izy no henoy. '
  '6':
  - type: text
    content: 'Ary nony nandre izany ny mpianatra, dia lavo niankohoka sady natahotra indrindra. '
  '7':
  - type: text
    content: 'Ary Jesosy nankeo aminy, dia nanendry azy ka nanao hoe; Mitsangàna, fa aza matahotra. '
  '8':
  - type: text
    content: 'Ary nony niandrandra izy ireo, dia tsy nahita olona, afa-tsy Jesosy irery ihany. '
  '9':
  - type: text
    content: 'Ary rehefa nidina avy tao an-tendrombohitra izy, dia nandrara azy Jesosy ka nanao hoe: Aza milaza amin''olona ny fahitana, mandra-pitsangan''ny Zanak''olona amin''ny maty. '
