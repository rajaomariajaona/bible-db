document_id: ECC.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fihoaran'ny fahendrena noho ny fahadalana, ary ny mahatsara ny fiononana, na dia hita aza fa misy zavatra maro itovian'ny hendry sy ny adala
  - type: text
    content: 'Hoy izaho anakampo: Aoka mba hizahako toetra amin''ny hafaliana ianao, ka dia mifalia amin''ny fahitana ny fahafinaretana; kanjo, indro, zava-poana koa izany. '
  '10':
  - type: text
    content: 'Ary na inona na inona nirin''ny masoko dia tsy nisy narovako taminy; tsy nisakana ny foko tamin''izay mety ho fifaliana aho; fa nahazo hafaliana avy tamin''ny fisasarako rehetra ny foko; ary izany no anjarako avy tamin''ny fisasarako rehetra. '
  '11':
  - type: text
    content: Kanefa nitodika aho nandinika ny asa rehetra nataon'ny tanako sy ny fisasarana izay nisasarako, ka, indreo, zava-poana sy misambo-drivotra
  - type: note
    content: 'Na: Homan-drivotra'
  - type: text
    content: ' foana izany rehetra izany, fa tsy nisy nahasoa tatỳ ambanin''ny masoandro.'
  '12':
  - type: text
    content: 'Ary nitodika aho hijery ny fahendrena sy ny fahaverezan-tsaina ary ny fahadalana; fa inona no hataon''ny olona izay handimby ny mpanjaka? Izay efa natao hatramin''ny ela ihany. '
  '13':
  - type: text
    content: Dia hitako fa ny fahendrena dia tsara
  - type: note
    content: Heb. mihoatra
  - type: text
    content: ' noho ny fahadalana, toy ny fahatsaran'
  - type: note
    content: Heb. fihoaran'
  - type: text
    content: '''ny mazava noho ny maizina. '
  '14':
  - type: text
    content: 'Ny mason''ny hendry dia eo an-dohany; fa ny adala kosa mandeha amin''ny maizina; nefa hitako fa mitovy ihany ny manjo azy roa tonta. '
  '15':
  - type: text
    content: 'Dia hoy izaho anakampo: Mitovy amin''ny manjo ny adala ihany ny manjo ahy, koa nahoana ary no nanan-tombom-pahendrena aho? Dia hoy izaho anakampo: zava-poana koa izany. '
  '16':
  - type: text
    content: 'Fa samy tsy misy fahatsiarovana mandrakizay na ny hendry na ny adala; fa amin''ny andro ho avy dia samy ho hadino ela izy. Indrisy! samy ho faty na ny adala na ny hendry. '
  '17':
  - type: text
    content: Dia efa halako ny aina, satria nataoko ho ratsy ny asa atao atỳ ambanin'ny masoandro; fa zava-poana sy misambo-drivotra
  - type: note
    content: 'Na: Homan-drivotra'
  - type: text
    content: ' foana izy rehetra. '
  '18':
  - type: text
    content: 'Eny, efa halako ny fisasarako rehetra izay nisasarako tatỳ ambanin''ny masoandro, fa havelako ho an''ny olona izay handimby ahy izany, '
  '19':
  - type: text
    content: 'ary iza no mahalala na ho hendry na ho adala izy? Nefa izy no ho tompon''izay rehetra nisasarako sy nataoko tamin''ny fahendreko tatỳ ambanin''ny masoandro. Zava-poana koa izany. '
  '2':
  - type: text
    content: 'Hoy izaho, miantso ny fihomehezana: Fahadalana, ary ny fifaliana hoe: Mahefa inona? '
  '20':
  - type: text
    content: 'Dia nitodika aho hampamoy ny foko amin''ny fahakiviana ny amin''ny fisasarana rehetra izay nisasarako tatỳ ambanin''ny masoandro. '
  '21':
  - type: text
    content: 'Fa misy olona izay misasatra amin''ny fahendrena sy ny fahalalana ary ny fahaizana, nefa ny olona izay tsy nisasatra tamin''izany akory no tsy maintsy hamelany azy ho lovany. Zava-poana sy faharatsiana lehibe koa izany. '
  '22':
  - type: text
    content: 'Fa inona no azon''ny olona amin''ny fisasarany rehetra sy amin''ny fikatsahan''ny fony, izay nisasarany tatỳ ambanin''ny masoandro? '
  '23':
  - type: text
    content: Fa ny androny rehetra dia fanaintainana avokoa, ary ny fisasarany dia fahasorisorena; eny, na dia amin'ny alina aza dia tsy manam-pitsaharana ny fony. Zava-poana koa izany.
  '24':
  - type: text
    content: Tsy misy mahasoa ny olona mihoatra noho ny mihinana sy misotro ary ny mampahafinaritra ny tenany amin'ny fisasarany. Izany koa aza dia efa hitako fa avy amin'ny tànan'Andriamanitra
  - type: note
    content: 'Na: Tsy misy tsara amin''ny olona. Ny mihinana sy misotro ary ny mampahafinaritra ny tenanay amin''ny fisasaranay dia hitako fa avy amin''ny tànan''Andriamanitra koa'
  - type: text
    content: ' '
  '25':
  - type: text
    content: '(fa iza no mahalany, ary iza no mahazo manaram-po mihoatra noho izaho?). '
  '26':
  - type: text
    content: Fa ny olona izay ankasitrahan'Andriamanitra dia omeny fahendrena sy fahalalana ary fifaliana; fa ny mpanota kosa ampiasainy hanangona sy hamory, mba hisy homeny izay ankasitrahan'Andriamanitra. Zava-poana sy misambo-drivotra
  - type: note
    content: 'Na: Homan-drivotra'
  - type: text
    content: ' foana koa izany.'
  '3':
  - type: text
    content: 'Nisaina tato am-poko hamalifaly ny nofoko tamin''ny divay aho (ny foko anefa mbola hitondra azy amin''ny fahendrena ihany) ary hitana ny fahadalana, mandra-pahitako izay tsara ho an''ny zanak''olombelona ka tokony hataony atỳ ambanin''ny lanitra amin''ny andro vitsy iainany. '
  '4':
  - type: text
    content: 'Nanao asa lehibe ho ahy aho, nanao trano, nanao tanim-boaloboka, '
  '5':
  - type: text
    content: 'nanao tanimboly sy saha aho ka namboly hazo fihinam-boa samy hafa karazana tao; '
  '6':
  - type: text
    content: 'nanao kamory aho handemana ny ala be zana-kazo; '
  '7':
  - type: text
    content: 'nahazo ankizilahy sy ankizivavy aho sady nanana ompikely; ary nanana fananana be aho, dia omby sy ondry aman''osy mihoatra noho izay rehetra talohako teto Jerosalema. '
  '8':
  - type: text
    content: Nihary volafotsy sy volamena koa aho ary fanaka tsara fananan'ny mpanjaka sy izay avy amin'ny tany samy hafa; ary nahazo mpihiralahy sy mpihiravavy aho mbamin'izay mahafinaritra ny zanak'olombelona, dia vady sy vaditsindrano betsaka
  - type: note
    content: 'Na: fahafinaretan''ny zanak''olombelona be dia be'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Dia efa nisandratra mihoatra noho izay rehetra talohako teto Jerosalema aho; ary ny fahendreko anefa dia mbola tato amiko ihany. '
