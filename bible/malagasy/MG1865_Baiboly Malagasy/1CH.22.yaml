document_id: 1CH.22,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namorian'i Davida ny zavatra ho enti-manao ny tempoly, sy ny hafatra nataony ny amin'ny hanaovana azy
  - type: text
    content: 'Dia hoy Davida: Eto no ho tranon''i Jehovah Andriamanitra, ary eto no ho alitara fandoroana ny fanatitra dorana ho an''ny Isiraely.'
  '10':
  - type: text
    content: 'Izy no hanao trano ho an''ny anarako; ary izy ho zanako, ary Izaho ho rainy, ary Izaho hampitoetra ny seza fiandrianan''ny fanjakany amin''ny Isiraely mandrakizay. '
  '11':
  - type: text
    content: 'Koa ankehitriny, anaka, ho aminao anie Jehovah, ka hambinina anie ianao, fa ataovy ny tranon''i Jehovah Andriamanitrao araka izay nilazany anao. '
  '12':
  - type: text
    content: 'Ary homen''i Jehovah saina sy fahendrena anie ianao ka hatsangany ho mpanapaka ny Isiraely, mba hitandremanao ny lalan''i Jehovah Andriamanitrao. '
  '13':
  - type: text
    content: 'Ary amin''izany dia hambinina ianao, raha mitandrina hankatò ny lalàna sy ny fitsipika izay nandidian''i Jehovah an''i Mosesy ho an''ny Isiraely; mahereza sy matanjaha; aza matahotra na mivadi-po. '
  '14':
  - type: text
    content: 'Ary, he! fa na dia be fahoriana aza aho, dia nahavory talenta volamena iray hetsy sy talenta volafotsy iray tapitrisa ary varahina sy vy betsaka tsy hita lanja ho enti-manao ny tranon''i Jehovah; ary efa nahavonona hazo sy vato koa aho; ka dia ampionao kosa ireo. '
  '15':
  - type: text
    content: 'Ary koa, efa manana mpiasa betsaka ianao, dia mpikapa hazo sy tambato sy mpandrafitra ary olona mahay ny asa samy hafa rehetra. '
  '16':
  - type: text
    content: 'Ny volamena sy ny volafotsy ary ny varahina sy ny vy dia tsy hita isa. Koa mitsangàna ianao, ka manaova, ary homba anao anie Jehovah. '
  '17':
  - type: text
    content: 'Ary Davida nandidy ny lehibe rehetra tamin''ny Isiraely hanampy an''i Solomona zanany hoe: '
  '18':
  - type: text
    content: 'Tsy momba anareo va Jehovah Andriamanitrareo ka efa nampiadana anareo amin''ny manodidina? Fa efa natolony teo an-tanako ny mponina amin''ny tany; ary ny tany efa resy teo anoloan''i Jehovah sy teo anoloan''ny olony. '
  '19':
  - type: text
    content: Koa ankehitriny ampitadiavo an'i Jehovah Andriamanitrareo ny fonareo sy ny fanahinareo, ka mitsangàna, ary manaova ny fitoerana masina ho an'i Jehovah Andriamanitra, hampidirana ny fiaran'ny faneken'i Jehovah sy ny fanaka masin'Andriamanitra ho ao amin'ny trano izay hatao ho an'ny anaran'i Jehovah.
  '2':
  - type: text
    content: 'Ary nasain''i Davida novorina ny olona hafa firenena izay tany amin''ny tanin''ny Isiraely, ka nanendreny tambato hipai-bato hanaovana ny tranon''Andriamanitra. '
  '3':
  - type: text
    content: 'Ary Davida nahavonona vy betsaka hatao hombon''ny lela-vavahady sy ny fikambanany, ary varahina betsaka tsy hita lanja '
  '4':
  - type: text
    content: 'sy hazo sedera tsy hita isa; fa ny mponina tany Sidona sy Tyro nitondra hazo sedera betsaka ho any amin''i Davida. '
  '5':
  - type: text
    content: 'Fa hoy Davida: Solomona zanako mbola zaza sady tanora fanahy, ary ny trano hatao ho an''i Jehovah dia tsy maintsy ho lehibe indrindra, mba hiely any amin''ny tany rehetra ny lazany sy ny voninahiny, koa hovononiko rahateo ny zavatra ho enti-manao azy. Ka dia nahavonona betsaka Davida, raha mbola velona izy.'
  '6':
  - type: text
    content: 'Ary niantso an''i Solomona zanany izy va nandidy azy hanao trano ho an''i Jehovah, andriamanitry ny Isiraely, '
  '7':
  - type: text
    content: 'ary nanao taminy hoe: Anaka, efa mby tato am-poko ny hanao trano ho an''ny anaran''i Jehovah Andriamanitro; '
  '8':
  - type: text
    content: saingy nisy tenin'i Jehovah tonga tamiko
  - type: note
    content: 'Na: ny amiko'
  - type: text
    content: ' nanao hoe: Be ny rà efa nalatsakao, ary ady lehibe no efa nataonao; koa tsy mahazo manao trano ho an''ny anarako ianao, satria be ny rà efa nalatsakao tamin''ny tany teo imasoko. '
  '9':
  - type: text
    content: Fa, indro, ianao hiteraka zazalahy, izay ho lehilahy miadana, ary hampiadaniko tsy hisy hahazo azy ny fahavalony rehetra manodidina; koa ny anarany dia hatao hoe Solomona
  - type: note
    content: Solomona = Miadana
  - type: text
    content: '; ary hampiadaniko sy hampandriko fahizay ny Isiraely amin''ny androny. '
