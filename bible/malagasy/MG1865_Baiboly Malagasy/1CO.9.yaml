document_id: 1CO.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandeferan'i Paoly tsy hovelomin'ny fiangonana tao Korinto
  - type: text
    content: 'Tsy olona afaka va aho? Tsy Apostoly va aho? Tsy efa nahita an''i Jesosy Tompontsika va aho? Tsy asako ao amin''ny Tompo va ianareo? '
  '10':
  - type: text
    content: 'Sa noho izahay mihitsy no nanaovana izany teny izany? Eny, fa noho izahay indrindra no nanoratana izany, satria izay miasa tany dia tokony hiasa amin''ny fanantenana, ary izay mively vary dia tokony hively amin''ny fanantenana hahazo. '
  '11':
  - type: text
    content: 'Raha izahay namafy izay zava-panahy ho anareo, dia zavatra lehibe va raha mba mijinja izay anananareo araka ny nofo kosa izahay? '
  '12':
  - type: text
    content: 'Raha ny hafa aza manana izany fahefana izany aminareo, tsy mainka va fa izahay? Kanefa tsy nanampatra izany fahefana izany izahay, fa mihafy amin''ny zavatra rehetra, fandrao hisakana ny filazantsaran''i Kristy. '
  '13':
  - type: text
    content: 'Tsy fantatrareo va fa izay manompo amin''ny zavatra masina dia mihinana ny zavatry ny tempoly, ary izay manompo eo amin''ny alitara dia miombona amin''ny alitara? '
  '14':
  - type: text
    content: 'Toy izany koa no nandidian''ny Tompo, fa izay mitory ny filazantsara dia hahazo fivelomana amin''ny filazantsara. '
  '15':
  - type: text
    content: 'Nefa tsy nahavatra izany zavatra izany na dia kely akory aza aho; ary tsy manoratra izany aho mba hanaovana izany amiko; fa aleoko maty toy izay hisy hahafoana ny reharehako. '
  '16':
  - type: text
    content: 'Fa raha mitory ny filazantsara aho, dia tsy misy ho reharehako, satria tsy maintsy manao izany; fa lozako, raha tsy mitory ny filazantsara aho! '
  '17':
  - type: text
    content: 'Fa raha ny sitrapoko no anaovako izany, dia mahazo valim-pitia aho; fa raha tsy ny sitrapoko, dia natolotra aho ho andraikitro izany. '
  '18':
  - type: text
    content: 'Inona ary no valim-pitia azoko? Dia izao: raha mitory ny filazantsara aho, dia tsy asiako fandoavam-bola ny filazantsara, mba tsy hanampatra ny fahefako amin''ny filazantsara. '
  '19':
  - type: text
    content: 'Fa na dia afaka amin''ny olona rehetra aza aho, dia mbola nataoko ho mpanompon''ny olona rehetra ihany ny tenako mba hahazoako maromaro kokoa. '
  '2':
  - type: text
    content: 'Raha tsy Apostoly ho an''ny sasany aza aho, dia Apostoly ho anareo tokoa; fa ianareo no tombo-kase mah''Apostoly ahy ao amin''ny Tompo. '
  '20':
  - type: text
    content: 'Tamin''ny Jiosy, dia tonga toy ny Jiosy aho, mba hahazoako ny Jiosy; tamin''izay ambanin''ny lalàna, dia tonga toy izay ambanin''ny lalàna aho, na dia tsy ambanin''ny lalàna aza aho, mba hahazoako izay ambanin''ny lalàna; '
  '21':
  - type: text
    content: 'tamin''izay tsy manana lalàna, dia toy izay tsy manana lalàna aho (kanefa tsy mba olona tsy manana lalàna amin''Andriamanitra aho, fa ambanin''ny lalàn''i Kristy), mba hahazoako izay tsy manana lalàna; '
  '22':
  - type: text
    content: 'tamin''ny malemy dia tonga malemy aho, mba hahazoako ny malemy; efa tonga zavatra rehetra aho amin''ny olona rehetra, mba hamonjeko ny sasany na iza na iza. '
  '23':
  - type: text
    content: 'Ary izany rehetra izany dia ataoko noho ny filazantsara mba ho tonga mpiombona aminy aho. '
  '24':
  - type: text
    content: 'Tsy fantatrareo va fa izay mihazakazaka eo amin''ny tany fihazakazahana dia samy mihazakazaka avokoa, nefa ny iray ihany no mahazo ny loka? Mihazakazaha toy izany mba hahazoanareo. '
  '25':
  - type: text
    content: 'Ary ny mpihazakazaka rehetra dia mahonon-tena amin''ny zavatra rehetra. Kanefa ireny dia mitady satro-boninahitra mety ho lò ihany, fa isika kosa ny tsy mety ho lò. '
  '26':
  - type: text
    content: 'Raha izaho ary, dia mihazakazaka, nefa tsy toy ny manao kitoatoa; ary mamely totohondry aho, nefa tsy toy ny mamely ny rivotra; '
  '27':
  - type: text
    content: fa asiako mafy ny tenako ho mangana ka andevoziko, fandrao, na dia efa nitory tamin'ny sasany aza aho, dia holavina kosa ny tenako.
  '3':
  - type: text
    content: 'Izany no avaliko izay manadina ahy. '
  '4':
  - type: text
    content: 'Moa tsy mahazo mihinana sy misotro va izahay? '
  '5':
  - type: text
    content: Moa tsy mahazo mitondra vady izay isan'ny mino
  - type: note
    content: Gr. anabavy
  - type: text
    content: ' va izahay, tahaka ny Apostoly sasany koa sy ny rahalahin''ny Tompo ary Kefasy? '
  '6':
  - type: text
    content: 'Sa izaho ihany sy Barnabasy no tsy mahazo mitsahatra tsy miasa? '
  '7':
  - type: text
    content: 'Iza no mandeha manafika ka mivelona amin''ny haren''ny tenany? Iza no manao tanim-boaloboka ka tsy mihinana ny vokatra? Ary iza no miandry ondry aman''osy ka tsy mihinana ny rononony? '
  '8':
  - type: text
    content: 'Moa araka ny fihevitry ny olona va no itenenako izany, sa ny lalàna mba milaza izany koa? '
  '9':
  - type: text
    content: 'Fa voasoratra eo amin''ny lalàn''i Mosesy hoe: Aza manakombona ny vavan''ny omby mively vary (Deo. 25. 4). Ny omby va no ahin''Andriamanitra? '
