document_id: 1CO.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandeferan'i Paoly tsy hovelomin'ny fiangonana tao Korinto
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsy olona afaka va aho? Tsy Apostoly va aho? Tsy efa nahita an''i Jesosy Tompontsika va aho? Tsy asako ao amin''ny Tompo va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha tsy Apostoly ho an''ny sasany aza aho, dia Apostoly ho anareo tokoa; fa ianareo no tombo-kase mah''Apostoly ahy ao amin''ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izany no avaliko izay manadina ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moa tsy mahazo mihinana sy misotro va izahay? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moa tsy mahazo mitondra vady izay isan'ny mino
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. anabavy
    marker-yv: yv-n
  - type: text
    text: ' va izahay, tahaka ny Apostoly sasany koa sy ny rahalahin''ny Tompo ary Kefasy? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sa izaho ihany sy Barnabasy no tsy mahazo mitsahatra tsy miasa? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Iza no mandeha manafika ka mivelona amin''ny haren''ny tenany? Iza no manao tanim-boaloboka ka tsy mihinana ny vokatra? Ary iza no miandry ondry aman''osy ka tsy mihinana ny rononony? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moa araka ny fihevitry ny olona va no itenenako izany, sa ny lalàna mba milaza izany koa? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa voasoratra eo amin''ny lalàn''i Mosesy hoe: Aza manakombona ny vavan''ny omby mively vary (Deo. 25. 4). Ny omby va no ahin''Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sa noho izahay mihitsy no nanaovana izany teny izany? Eny, fa noho izahay indrindra no nanoratana izany, satria izay miasa tany dia tokony hiasa amin''ny fanantenana, ary izay mively vary dia tokony hively amin''ny fanantenana hahazo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha izahay namafy izay zava-panahy ho anareo, dia zavatra lehibe va raha mba mijinja izay anananareo araka ny nofo kosa izahay? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha ny hafa aza manana izany fahefana izany aminareo, tsy mainka va fa izahay? Kanefa tsy nanampatra izany fahefana izany izahay, fa mihafy amin''ny zavatra rehetra, fandrao hisakana ny filazantsaran''i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tsy fantatrareo va fa izay manompo amin''ny zavatra masina dia mihinana ny zavatry ny tempoly, ary izay manompo eo amin''ny alitara dia miombona amin''ny alitara? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Toy izany koa no nandidian''ny Tompo, fa izay mitory ny filazantsara dia hahazo fivelomana amin''ny filazantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nefa tsy nahavatra izany zavatra izany na dia kely akory aza aho; ary tsy manoratra izany aho mba hanaovana izany amiko; fa aleoko maty toy izay hisy hahafoana ny reharehako. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha mitory ny filazantsara aho, dia tsy misy ho reharehako, satria tsy maintsy manao izany; fa lozako, raha tsy mitory ny filazantsara aho! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha ny sitrapoko no anaovako izany, dia mahazo valim-pitia aho; fa raha tsy ny sitrapoko, dia natolotra aho ho andraikitro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Inona ary no valim-pitia azoko? Dia izao: raha mitory ny filazantsara aho, dia tsy asiako fandoavam-bola ny filazantsara, mba tsy hanampatra ny fahefako amin''ny filazantsara. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa na dia afaka amin''ny olona rehetra aza aho, dia mbola nataoko ho mpanompon''ny olona rehetra ihany ny tenako mba hahazoako maromaro kokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin''ny Jiosy, dia tonga toy ny Jiosy aho, mba hahazoako ny Jiosy; tamin''izay ambanin''ny lalàna, dia tonga toy izay ambanin''ny lalàna aho, na dia tsy ambanin''ny lalàna aza aho, mba hahazoako izay ambanin''ny lalàna; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'tamin''izay tsy manana lalàna, dia toy izay tsy manana lalàna aho (kanefa tsy mba olona tsy manana lalàna amin''Andriamanitra aho, fa ambanin''ny lalàn''i Kristy), mba hahazoako izay tsy manana lalàna; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'tamin''ny malemy dia tonga malemy aho, mba hahazoako ny malemy; efa tonga zavatra rehetra aho amin''ny olona rehetra, mba hamonjeko ny sasany na iza na iza. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izany rehetra izany dia ataoko noho ny filazantsara mba ho tonga mpiombona aminy aho. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsy fantatrareo va fa izay mihazakazaka eo amin''ny tany fihazakazahana dia samy mihazakazaka avokoa, nefa ny iray ihany no mahazo ny loka? Mihazakazaha toy izany mba hahazoanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny mpihazakazaka rehetra dia mahonon-tena amin''ny zavatra rehetra. Kanefa ireny dia mitady satro-boninahitra mety ho lò ihany, fa isika kosa ny tsy mety ho lò. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha izaho ary, dia mihazakazaka, nefa tsy toy ny manao kitoatoa; ary mamely totohondry aho, nefa tsy toy ny mamely ny rivotra; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: fa asiako mafy ny tenako ho mangana ka andevoziko, fandrao, na dia efa nitory tamin'ny sasany aza aho, dia holavina kosa ny tenako.
