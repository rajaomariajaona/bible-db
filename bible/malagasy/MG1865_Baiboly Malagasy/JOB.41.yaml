document_id: JOB.41
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro, foana ny fihendrena azy; Tsy mahakivy va na dia ny fijery azy aza?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tsy misy sahy manao vi-very hanaitra azy; Koa iza kosa no mahajanona eo anatrehako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Iza no nanome Ahy aloha mba hamaliako azy? Ny eny ambanin'ny lanitra rehetra dia Ahy avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy mbola hangina Aho ny amin'ny momba ny tenany sy ny heriny ary ny fahatsaran'ny endriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza no mahasonga ny fitafiany anoloany? Na iza no sahy hiditra ao amin'ny nifiny roa sosona?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Iza no mahasokatra ny varavaran'ny tavany? Mahatsiravina ny nifiny manodidina!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Reharehany ny faharaoraon'ny kirany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ampingany
    marker-yv: yv-n
  - type: text
    text: ', mihidy avokoa toy ny voapetaka mafy amin''ny tombo-kase ireo;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mikirindro ireo, ka tsy azon'ny rivotra idirana eo anelanelany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifanindry lany ireo sady mifaniditra ka tsy azo sarahina,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fieviny dia mampamirapiratra fahazavana, ary ny masony dia tahaka ny hodimason'ny maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lelafo no mivoaka avy amin'ny vavany; Kilalaon'afo no mipariaka avy aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny vavorony dia ivoahan'ny setroka, tahaka ny avy amin'ny vilany mangotraka, na amin'ny fahandroana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: afon-kerana'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fofonainy mampirehitra arina, ary misy lelafo mivoaka avy amin'ny vavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny vozony no itoeran'ny hery; Ary mibitaka eo alohany ny fampahatahorana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mivalombalona ny hotraka amin'ny tenany; Mafy ireny ka tsy azo endahana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mafy tahaka ny vato ny fony; Eny, mafy tahaka ny vato fikosoham-bary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Raha mitsangana izy, dia raiki-tahotra ny mahery; Eny, toran-kovitra ireo ka tsy mahavoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha misy mamely azy amin'ny sabatra dia tsy mahalaitra, na amin'ny lefom-pohy, na ny firombaka, na ny zana-tsipìka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ataony toy ny mololo ny vy, ary toy ny hazo momoka ny varahina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy mampandositra azy ny zana-tsipìka; Ataony ho toy ny vodivary ny vaton'antsamotady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ataony ho toy ny vodivary koa ny langilangy; Ihomehezany ny fanetsehana ny lefona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny takibany dia tahaka ny tavim-bilany maranitra; Mamelatra fivelezam-bary maranitra eo amin'ny fotaka izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mampandevy ny lalina ho tahaka ny ao am-bilany izy; Manao ny ranomasina ho tahaka ny vilany misy menaka manitra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mampahazava ny lalany eo aoriany izy. Ataon'ny olona ho toy ny volo fotsy ny lalina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy misy tahaka azy eny ambonin'ny tany, izay voaforona tsy hahalala tahotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny avo rehetra jereny avokoa; Mpanjakan'ny bibi-dia rehetra izy
