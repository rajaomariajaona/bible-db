document_id: JER.35,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny Rekabita
  - type: text
    content: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah tamin''ny andron''i Joiakima, zanak''i Josia. mpanjakan''ny Joda, nanao hoe: '
  '10':
  - type: text
    content: 'fa efa nitoetra an-day izahay araka izay rehetra nanafaran''i Jonadaba razanay anay. '
  '11':
  - type: text
    content: 'Fa raha nananika ny tany Nebokadnezara, mpanjakan''i Babylona. Dia hoy izahay: Andeha isika hankany Jerosalema handositra ny miaramilan''ny Kaldeana sy ny miaramilan''ny Syriana, ka dia izany no itoerany eto Jerosalema.'
  '12':
  - type: text
    content: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah hoe: '
  '13':
  - type: text
    content: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Andeha, lazao amin''ny Joda sy amin''ny mponina any Jerosalema hoe: Tsy hino anatra hitandrina ny teniko va ianareo? hoy Jehovah. '
  '14':
  - type: text
    content: 'To ny tenin''i Jonadaba, zanak''i Rekaba, izay nanafarany ny zanany tsy hisotro divay, fa tsy misotro tokoa izy mandraka androany, fa mahatana ny hafa-drazany, ary Izaho efa niteny taminareo, eny, nifoha maraina koa Aho ka niteny, nefa tsy nihaino ianareo. '
  '15':
  - type: text
    content: 'Nirahiko taminareo koa ny mpaminany mpanompoko rehetra, eny, nifoha maraina koa Aho ka naniraka azy hanao hoe: Samia miala amin''ny lalanareo ratsy ianareo ankehitriny, ary ataovy tsara ny ataonareo. ary aza manaraka andriamani-kafa hanompo azy, dia honina amin''ny tany izay nomeko anareo sy ny razanareo ianareo nefa tsy nanongilana ny sofinareo na nihaino Ahy ianareo. '
  '16':
  - type: text
    content: 'Eny, nankatoavin''ny zanak''i Jonadaba, zanak''i Rekaba, ny hafa-drazany, izay nanafarany azy; fa ity firenena ity kosa tsy mba nihaino Ahy. '
  '17':
  - type: text
    content: Koa izao no lazain'i Jehovah, Andriamanitry ny maro, Andriamanitry ny Isiraely Indro, hataoko mihatra amin'ny Joda sy ny mponina rehetra any Jerosalema ny loza rehetra izay nolazaiko hatao aminy, satria efa niteny taminy Aho, fa tsy nihaino izy, ary niantso azy Aho, fa tsy namaly izy.
  '18':
  - type: text
    content: 'Ary ny taranak''i Rekaba dia nilazan''i Jeremia hoe: Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Noho ny nahatananareo ny hafatr''i Jonadaba razanareo sy ny nitandremanareo ny hafany rehetra ary ny nanaovanareo araka izay rehetra nanafarany anareo, '
  '19':
  - type: text
    content: 'dia izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Jonadaba, zanak''i Rekaba, tsy ho diso zanakalahy hitsangana eo anatrehako mandrakizay.'
  '2':
  - type: text
    content: 'Mankanesa any amin''ny taranak''i Rekaba, ary mitenena aminy, dia ampidiro ao an-tranon''i Jehovah, ao amin''ny efi-trano anankiray, izy, ka omeo divay hosotroiny. '
  '3':
  - type: text
    content: 'Dia nalaiko Jazania, zanak''i Jeremia, zanak''i Habazinia, sy ny rahalahiny sy ny zanany rehetra mbamin''ny taranak''i Rekaba rehetra, '
  '4':
  - type: text
    content: 'ka nampidiriko ho ao amin''ny tranon''i Jehovah izy, dia tao amin''ny efi-tranon''ny taranak''i Hanana zanak''i Jigdalia, lehilahin''Andriamanitra, izay ao anilan''ny efi-tranon''ny mpanapaka, ao ambonin''ny efi-tranon''i Mahaseia, zanak''i Saloma, mpiandry varavarana. '
  '5':
  - type: text
    content: 'Ary norosoako kapoaka sy siny feno divay teo anoloan''ny taranak''i Rekaba ka nolazaiko taminy hoe: Misotroa divay ianareo. '
  '6':
  - type: text
    content: 'Fa hoy kosa ireo: Tsy hisotro divay izahay; fa Jonadaba, zanak''i Rekaba, razanay efa nafatra anay hoe: Aza mba misotro divay ianareo na ny taranakareo mandrakizay; '
  '7':
  - type: text
    content: 'ary aza manao trano ianareo, na mamafy voan-javatra, na manao tanim-boaloboka, na mety hanana izany akory, fa lay no itoeronareo amin''ny andronareo rehetra, mba ho ela velona ianareo amin''ny tany izay ivahinianareo. '
  '8':
  - type: text
    content: 'Dia nankatoavinay izany tenin''i Jonadaba, zanak''i Rekaba, razanay izany tamin''izay rehetra nanafarany anay, mba tsy hisotro divay amin''ny andronay rehetra, na izahay na ny vadinay, na ny zanakai-lahy, na ny zanakai-vavy; '
  '9':
  - type: text
    content: 'ary tsy hanao trano hitoeranay, na hanana tanimboly, na saha, na voan-javatra izahay; '
