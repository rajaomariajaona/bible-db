document_id: PSA.42,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faniriana an'Andriamanitra raha lavitra an'i Ziona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Maskila. Nataon''ny Koraita. Tahaka ny diera mihanahana maniry ny rano an''ony no anirian''ny fanahiko Anao, Andriamanitra ô. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Toy ny zavatra mahatorotoro ny taolako no fandatsan''ny fahavaloko ahy, ka hoy izy isan''andro: Aiza izay Andriamanitrao?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nahoana no mitanondrika ianao, ry fanahiko? ary nahoana no mitoloko ato anatiko ianao? Manantenà an'Andriamanitra, fa mbola hidera Azy ihany aho, Izy no famonjena ny tavako sady Andriamanitro.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mangetaheta an''Andriamanitra ny fanahiko, dia Andriamanitra velona; Rahoviana no ho tonga aho ka hiseho eo anatrehan''Andriamanitra? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ny ranomasoko no fiahiko andro aman''alina, amin''ny anaovany ahy mandrakariva hoe: Aiza izay Andriamanitrao? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Izao zavatra izao no hotsarovako, ka haidiko ato anatiko ny fanahiko, dia ny nandrosoako niaraka tamin'ny maro, sy ny nitarihako azy ho any an-tranon'Andriamanitra, nanao feo mihoby sy midera, dia olona maro izay nitandrina ny andro firavoravoana.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nahoana no mitanondrika ianao, ry fanahiko, ka mitoloko ato anatiko? Manantenà an''Andriamanitra ianao, fa mbola hidera Azy ihany aho noho ny famonjen''ny tavany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Andriamanitro ô, mitanondrika ato anatiko ny fanahiko; Izany no ahatsiarovako Anao eo amin'ny tanin'i Jordana sy amin'ireo Hermona ary amin'ny tendrombohitra Mizara.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny lalina miantso ny lalina noho ny firohondrohon''ny riananao; ny onjanao rehetra sy ny alon-dranonao efa nanafotra ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jehovah handidy ny famindram-pony nony andro, ary ho amiko nony alina ny fihirana Azy, dia vavaka amin''Andriamanitry ny aiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hoy izaho amin''Andriamanitra Vatolampiko: nahoana no nanadino ahy Hianao? nahoana no mandeha mijoretra aho noho ny fampahorian''ny fahavaloko? '
