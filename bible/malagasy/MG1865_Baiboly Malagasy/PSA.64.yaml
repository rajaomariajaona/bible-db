document_id: PSA.64,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana an'Andriamanitra hanafaka amin'ny fandrika amam-pitaka ataon'ny olona, sy fanambarana ny havaliny ireny
  - type: text
    content: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Henoy ny feoko, raha mitaraina aho, Andriamanitra ô; arovy ny aiko amin''ny tahotro ny fahavalo. '
  '10':
  - type: text
    content: Mifaly amin'i Jehovah ny marina ka mialoka aminy; eny, mifaly tena ny mahitsy fo rehetra.
  '2':
  - type: text
    content: 'Afeno aho tsy ho azon''ny firaisan-tetiky ny ratsy fanahy,sy ny fitabataban''ny mpanao ratsy, '
  '3':
  - type: text
    content: 'Izay mandranitra ny lelany ho tahaka ny sabatra, ka mikendry handefa ny zana-tsipìkany, dia teny mangidy. '
  '4':
  - type: text
    content: 'Mba hitifitra mangingina ny mahitsy; mitifitra azy tampoka izy ka tsy matahotra. '
  '5':
  - type: text
    content: 'Hamafiny ny hevi-dratsiny; mifampitaona hanao fandri-totofana izy ka manao hoe: iza no hahita izany? '
  '6':
  - type: text
    content: 'Manao saim-petsy izy; omaniny tsara ny sain-dalina voaheviny; lalina ny ao anatin''ny olombelona, dia ny fony. '
  '7':
  - type: text
    content: 'Mitifitra azy Andriamanitra; tampoka toy ny fiantefan''ny zana-tsipìka no fahavoazany. '
  '8':
  - type: text
    content: Apotrany izy ka voasingotra ny lelany ihany; mandositra
  - type: note
    content: 'Na: Mihifikifi-doha'
  - type: text
    content: ' izay rehetra mahita azy. '
  '9':
  - type: text
    content: 'Dia matahotra ny olona rehetra ka manambara ny ataon''Andriamanitra sady mandinika tsara ny asany. '
