document_id: PSA.64
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana an'Andriamanitra hanafaka amin'ny fandrika amam-pitaka ataon'ny olona, sy fanambarana ny havaliny ireny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Henoy ny feoko, raha mitaraina aho, Andriamanitra ô; arovy ny aiko amin''ny tahotro ny fahavalo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Afeno aho tsy ho azon''ny firaisan-tetiky ny ratsy fanahy,sy ny fitabataban''ny mpanao ratsy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izay mandranitra ny lelany ho tahaka ny sabatra, ka mikendry handefa ny zana-tsipìkany, dia teny mangidy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mba hitifitra mangingina ny mahitsy; mitifitra azy tampoka izy ka tsy matahotra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hamafiny ny hevi-dratsiny; mifampitaona hanao fandri-totofana izy ka manao hoe: iza no hahita izany? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manao saim-petsy izy; omaniny tsara ny sain-dalina voaheviny; lalina ny ao anatin''ny olombelona, dia ny fony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mitifitra azy Andriamanitra; tampoka toy ny fiantefan''ny zana-tsipìka no fahavoazany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Apotrany izy ka voasingotra ny lelany ihany; mandositra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Mihifikifi-doha'
    marker-yv: yv-n
  - type: text
    text: ' izay rehetra mahita azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia matahotra ny olona rehetra ka manambara ny ataon''Andriamanitra sady mandinika tsara ny asany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mifaly amin'i Jehovah ny marina ka mialoka aminy; eny, mifaly tena ny mahitsy fo rehetra.
