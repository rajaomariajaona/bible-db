document_id: JOS.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anjaran'ny firenen'i Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no anjaran''ny firenena taranak''i Joda tamin''ny filokana araka ny fokony: hatramin''ny fari-tanin''i Edoma dia ny efitra Zina atsimo, izay faran''ny faritany atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny fari-taniny atsimo dia hatramin''ny faran''ny Ranomasin-tsira, dia hatramin''ny helo-drano atsimo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia nandroso hatrany atsimon''ny fiakarana Akrabima, dia nandroso hatrany Zina, dia niakatra any atsimon''i Kadesi-barnea ka nandroso hatrany Hezrona dia niakatra any Adara ary niolaka hatrany Karka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia nandroso hatrany Azmona ka nahazo ny lohasahan-driak''i Egypta, ary dia nihatra tamin''ny ranomasina; izany no ho fari-taninareo atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny fari-tany atsinanana dia ny Ranomasin-tsira hatramin''ny faran''i Jordana. Ary ny fari-taniny tamin''ny lafiny avaratra dia hatramin''ny helo-drano eo amin''ny faran''i Jordana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia niakatra hatrany Beti-hogla ka nandroso any avaratr''i Bet-araba, dia niakatra hatramin''ny vaton''i Bohana, zanak''i Robena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia niakatra ho any Debira hatramin''ny lohasaha Akora ary nianavaratra manandrify an''i Gilgala tandrifin''ny fiakarana Adomina, izay eo atsimon''ny lohasahan-driaka, dia nandroso hatramin''ny rano Ensemesy ary nihatra tany En-rogela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia niakatra teo amin''ny lohasahan''ny taranak''i Hinoma, ho eo anilany atsimon''ny Jebosita (Jerosalema izany), dia niakatra hatramin''ny tampon''ny tendrombohitra, izay manandrify ny lohasahan''i Hinoma eo andrefany, amin''ny farany avaratry ny Lohasahan''ny Refaita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia nizotra hatramin''ny tampon''ny tendrombohitra ka nihatra tamin''ny loharano Neftoa, dia nahazo ny tanàna tao an-tendrombohitra Efrona, dia nizotra hatrany Bala (Kiriata-jearima izany), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia niolaka hatrany Bala andrefana ka hatramin''ny tendrombohitra Seira ka nandroso hatramin''ny ilany avaratry ny tendrombohitra Jearima (Kesalona izany), dia nidina hatrany Beti-semesy ka nandroso hatrany Timna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia nihatra tamin''ny lafiny avaratr''i Ekrona, dia nizotra hatrany Sikerona ka nandroso hatramin''ny tendrombohitra Bala, dia nihatra tamin''i Jabniela, ary dia nihatra tany amin''ny ranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny fari-tany andrefana dia ny moron''ny Ranomasina Lehibe. Izany no fari-tany manodidina ny anjaran''ny taranak''i Joda araka ny fokony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Kaleba, zanak'i Jefone, dia nomeny anjara teo amin'ny taranak'i Joda, araka ny didin'i Jehovah tamin'i Josoa, dia ny tanànan'i Arba
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Kiriat-arba; izahao Jos. XV. 54'
    marker-yv: yv-n
  - type: text
    text: ', rain''i Anàka (Hebrona izany). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia noroahin''i Kaleba niala tao izy telo lahy, taranaky ny Anakita, dia Sesay sy Ahimana ary Talmay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niakatra avy tao izy hankany amin''ny mponina any Debira (Kiriata-sefera no anaran''i Debira taloha). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy Kaleba: Izay mamely an''i Kiriata-sefera ka mahafaka azy, dia homeko azy Aksa zanako-vavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Otniela, zanak''i Kenaza, rahalahin''i Kaleba, no nahafaka azy; ka dia nomeny azy Aksa zananivavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa voampakatra ravehivavy, dia nanome vava ny lahy hangataka saha tamin-drainy; dia niala faingana tamin''ny borikiny ravehivavy, ka hoy Kaleba taminy: Inona no ilainao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy izy: Omeo tso-drano aho; fa tsy tany misy rano no efa nomenao ahy, ka mba omeo loharano koa aho. Dia nomeny azy ny loharano ambony sy ny loharano ambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izao no lovan''ny firenena taranak''i Joda araka ny fokony: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny tanàna farany amin''ny firenena taranak''i Joda, eo akaikin''ny fari-tanin''i Edoma amin''ny tany atsimo, dia Kabzela sy Edera sy Jagora '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'sy Kina sy Dimona sy Adada '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'sy Kadesy sy Hazora sy Itnana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'sy Zifa sy Talema sy Bealota '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'sy Hazora-hadata sy Keriota-hezrona (Hazora izany), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'sy Amama sy Sema sy Molada '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'sy Hazara-gada sy Hesmona sy Beti-paleta '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'sy Hazara-soala sy Beri-sheba sy Biziotia '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'sy Bala sy Ie sy Azema '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'sy Eltolada sy Kesila sy Horma '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'sy Ziklaga sy Madmana sy Sansana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'sy Lebaota sy Silima sy Aina sy Rimona; sivy amby roa-polo ny tanàna rehetra sy ny zana-bohiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary teo amin'ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sefela
    marker-yv: yv-n
  - type: text
    text: ' dia Estaola sy Zora sy Asna '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'sy Zanoa sy En-ganima sy Tapoa sy Enama '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'sy Jarmota sy Adolama sy Soko sy Azeka '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'sy Saraima sy Aditaima sy Gadera sy Gederotaima: tanàna efatra ambin''ny folo sy ny zana-bohiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ary Zenana sy Hadasa sy Migdala-gada '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'sy Dilana sy Mizpa ary Joktela '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'sy Lakisy sy Bozkata sy Eglona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'sy Kabona sy Lamasa sy Kitlisa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'sy Gederota sy Beti-dagona sy Nama sy Makeda: tanàna enina ambin''ny folo sy ny zana-bohiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Libna sy Atera sy Asana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'sy Jifta sy Asna ary Neziba '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'sy Keila sy Akziba ary Maresa: tanàna Sivy sy ny zana-bohiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ekrona sy ny tanànany ary ny zana-bohiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'hatrany Ekrona no ho miankandrefana, dia izay rehetra akaiky an''i Asdoda, sy ny zana-bohitr''ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Asdoda sy ny tanànany ary ny zana-bohiny, Gaza sy ny tanànany ary ny zana-bohiny, hatramin''ny lohasahan-driak''i Egypta sy ny amoron''ny Ranomasina Lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary tany amin''ny tany havoana dia Samira sy Jatira sy Soko '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'sy Dana sy Ririata-sana (Debira izany) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'sy Anaba sy Estemo sy Anima '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'sy Gosena sy Holona sy Gilo: tanàna iraika ambin''ny folo sy ny zana-bohiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Araba sy Doma sy Esana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'sy Janoma sy Beti-tapoa sy Afeka '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'sy Honta sy Kiriat-arba (Hebrona izany) ary Ziora: tanàna sivy sy ny zana-bohiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Maona sy Karmela sy Zifa sy Jota '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'sy Jezirela sy Jokdeama sy Zanoa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'sy Kaina sy Gibea sy Timna: tanana folo sy ny zana-bohiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'sy Halola sy Beti-zora sy Gedora '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'sy Marata sy Bet-anota sy Eltekona: tanàna enina sy ny zana-bohiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'sy Kiriata-bala (Kiriata-jearima izany) sy Raba; tanàna roa sy ny zana-bohiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Tany an-efitra dia Bet-araba sy Midina sy Sekaka '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'sy Nibsana sy ilay Tanànantsira ary En-jedy: tanàna enina sy ny zana-bohiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Ary ny amin'ny Jebosita, mponina any Jerosalema, dia tsy naharoaka azy ny taranak'i Joda; fa miara-monina amin'ny taranak'i Joda any Jerosalema mandraka androany izy ireny.
