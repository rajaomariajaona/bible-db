document_id: JOB.7,96
type_code: plt
verses:
  '1':
  - type: text
    content: Tsy mahafantatra izay ratsy va ny vavako? Tsy mpiantafika va ny zanak'olombelona etỳ ambonin'ny tany? Ary tsy tahaka ny andron'ny mpikarama va ny androny?
  '10':
  - type: text
    content: Tsy hiverina any an-tranony intsony izy. Ary tsy hahalala azy intsony ny fonenany.
  '11':
  - type: text
    content: Ary izaho dia tsy hamehy vava, Fa hiteny noho ny fahorian'ny fanahiko sy hitaraina noho ny fangidian'ny aiko.
  '12':
  - type: text
    content: Ranomasina va aho, na trozona, No dia asianao fiambenana?
  '13':
  - type: text
    content: 'Raha hoy izaho: Hampionona ahy ny farafarako, hampitony ny fitarainako ny fandriako.'
  '14':
  - type: text
    content: Dia mampitahotra ahy amin'ny nofy Hianao ary mampihorohoro ahy amin'ny tsindrimandry;
  '15':
  - type: text
    content: Ka dia aleon'ny fanahiko ny hokendaina, eny, aleoko ny fahafatesana aza toy izay izato fitofezako
  - type: note
    content: Heb. taolako
  - type: text
    content: ' izato;'
  '16':
  - type: text
    content: Maharikoriko ahy izao, tsy tiako ny ho velona ela; Ilaozy miala aho, fa fofona foana ny androko.
  '17':
  - type: text
    content: Inona moa ny zanak'olombelona, no ekenao ho lehibe, ka ampandinihinao azy ny fonao,
  '18':
  - type: text
    content: Sady fantarinao isa-maraina izy; sy izahanao toetra isaky ny indray mipi-maso?
  '19':
  - type: text
    content: Mandra-pahoviana re vao hihodina tsy hijery ahy Hianao, ka mba hiala amiko mandra-piteliko rora?
  '2':
  - type: text
    content: Toy ny mpanompo maniry alokaloka, ary toy ny mpikarama miandry ny karaman'ny asany,
  '20':
  - type: text
    content: Na dia ho nanota aza aho, nampaninona Anao moa izany, ry Mpandinika ny olombelona? Nahoana no dia nataonao fikendry aho, ka efa tonga enta-mavesatra amiko aho?
  '21':
  - type: text
    content: Ary nahoana no tsy mamela ny fahadisoako sy manaisotra ny heloko Hianao? Fa izao dia efa handry any amin'ny vovoka aho; ary hitady ahy fatratra Hianao, fa tsy ho atỳ intsony aho.
  '3':
  - type: text
    content: Dia toy izany no anaovana ahy hahita volana mampahory, ary alina mahadisadisa no tendrena ho ahy.
  '4':
  - type: text
    content: 'Raha vao mandry aho, dia mieritreritra hoe: Rahoviana re no hifoha aho? Fa mihalava izany ny alina'
  - type: note
    content: Heb. hariva
  - type: text
    content: ', ary mivadibadika indrindra aho mandra-pahazavan''ny andro.'
  '5':
  - type: text
    content: Ny nofoko mitafy olitra sy baingan-tany; efa maina ny hoditro, kanjo mitsiranorano indray.
  '6':
  - type: text
    content: Faingana noho ny famahanan-tenona ny androko ka lany tsy misy fanantenana.
  '7':
  - type: text
    content: 'Tsarovy fa rivotra ny aiko: ary tsy hahita soa intsony ny masoko.'
  '8':
  - type: text
    content: 'Tsy hahita ahy intsony ny mason''izay mijery ahy: Ny masonao hizaha ahy, fa tsy ho ao aho.'
  '9':
  - type: text
    content: Tahaka ny rahona misava ka levona, dia tahaka izany koa, izay midina any amin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' tsy mba hiakatra intsony;'
