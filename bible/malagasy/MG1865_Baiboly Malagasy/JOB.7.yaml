document_id: JOB.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsy mahafantatra izay ratsy va ny vavako? Tsy mpiantafika va ny zanak'olombelona etỳ ambonin'ny tany? Ary tsy tahaka ny andron'ny mpikarama va ny androny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toy ny mpanompo maniry alokaloka, ary toy ny mpikarama miandry ny karaman'ny asany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia toy izany no anaovana ahy hahita volana mampahory, ary alina mahadisadisa no tendrena ho ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Raha vao mandry aho, dia mieritreritra hoe: Rahoviana re no hifoha aho? Fa mihalava izany ny alina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hariva
    marker-yv: yv-n
  - type: text
    text: ', ary mivadibadika indrindra aho mandra-pahazavan''ny andro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny nofoko mitafy olitra sy baingan-tany; efa maina ny hoditro, kanjo mitsiranorano indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Faingana noho ny famahanan-tenona ny androko ka lany tsy misy fanantenana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsarovy fa rivotra ny aiko: ary tsy hahita soa intsony ny masoko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy hahita ahy intsony ny mason''izay mijery ahy: Ny masonao hizaha ahy, fa tsy ho ao aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tahaka ny rahona misava ka levona, dia tahaka izany koa, izay midina any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' tsy mba hiakatra intsony;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy hiverina any an-tranony intsony izy. Ary tsy hahalala azy intsony ny fonenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary izaho dia tsy hamehy vava, Fa hiteny noho ny fahorian'ny fanahiko sy hitaraina noho ny fangidian'ny aiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ranomasina va aho, na trozona, No dia asianao fiambenana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha hoy izaho: Hampionona ahy ny farafarako, hampitony ny fitarainako ny fandriako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia mampitahotra ahy amin'ny nofy Hianao ary mampihorohoro ahy amin'ny tsindrimandry;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ka dia aleon'ny fanahiko ny hokendaina, eny, aleoko ny fahafatesana aza toy izay izato fitofezako
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. taolako
    marker-yv: yv-n
  - type: text
    text: ' izato;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maharikoriko ahy izao, tsy tiako ny ho velona ela; Ilaozy miala aho, fa fofona foana ny androko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Inona moa ny zanak'olombelona, no ekenao ho lehibe, ka ampandinihinao azy ny fonao,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sady fantarinao isa-maraina izy; sy izahanao toetra isaky ny indray mipi-maso?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mandra-pahoviana re vao hihodina tsy hijery ahy Hianao, ka mba hiala amiko mandra-piteliko rora?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na dia ho nanota aza aho, nampaninona Anao moa izany, ry Mpandinika ny olombelona? Nahoana no dia nataonao fikendry aho, ka efa tonga enta-mavesatra amiko aho?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary nahoana no tsy mamela ny fahadisoako sy manaisotra ny heloko Hianao? Fa izao dia efa handry any amin'ny vovoka aho; ary hitady ahy fatratra Hianao, fa tsy ho atỳ intsony aho.
