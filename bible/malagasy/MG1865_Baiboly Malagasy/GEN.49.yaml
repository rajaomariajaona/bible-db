document_id: GEN.49
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahafatesan'i Jakoba sy ny nandevenana azy, ary ny nahafatesan'i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jakoba namory ny zananilahy ka nanao hoe: Mivoria ianareo, mba hanambarako aminareo izay ho tonga aminareo any am-parany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Miangòna, ka mandrenesa, ry zanakalahin''i Jakoba, eny, mihainoa an''Isiraely rainareo:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ry ROBENA, lahimatoako ianao, heriko sy voalohan'ny tanjako, manan-tombom-pisandratana, manan-tombon-kery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mandroadroatra toy ny rano ianao ka tsy hanan-tombo, fa niakatra tamin'ny fandrian'ny rainao ianao, tamin'izany no nandotoanao azy. Endrey, ny farafarako lahy, ka dia niakarany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: SIMEONA sy LEVY dia mpirahalahy, fiadia-mandoza ny sabany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza mankeo amin'izay iokoany, ry foko, ary aza miray amin'ny fiangonany. ry fanahiko; fa tamin'ny fahatezerany no namonoany olona, ary tamin'ny fahasahisahiany no nanatraingoany omby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ho voaozona anie ny fahatezerany, fa nasiaka izany, ary ny fahavinirany, fa loza izany; hampihahakahaka azy eny amin'i Jako­ba aho, ary hanely azy eny amin'Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry JODA, hoderain'ny rahalahinao ianao, ny tananao ho ao amin'ny vozon'ny fahavalonao; hiankohoka eo anatrehanao ny zanaky ny rainao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Zana-diona, Joda, avy niremby ianao, anaka; mamitsaka, mandry toy ny liona izy, ary toy ny liom-bavy, ka iza no hanaitra azy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny tehim-panjakana tsy hiala amin'i Joda, na ny tehina fanapahana eo anelanelan'ny tongony, mandra-pahatongan'i Silo, ka hanoa Azy ny firenena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mamatotra ny borikiny tanora eo amin'ny tahom-boaloboka izy. Ary ny zanaky ny borikivaviny eo amin'ny tahom-boaloboka tsara; nanasa ny fitafiany tamin'ny divay izy, ary ny akanjony tamin'ny ram-boaloboka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mangamanga ny masony azon'ny divay ary fotsy ny nifiny azon'ny ronono.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ZEBOLONA, ao amoron-dranomasina no honenany, dia ao amoron-dranomasina fitodian-tsambo; ary ny sisin-taniny hifanolotra amin'i Sidona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ISAKARA dia boriky henjana, mandry eo anelanelan'ny vala;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary hitany fa tsara ny fialan-tsasatra, sady mahafinaritra ny tany; dia nanongilana ny sorony hitondra entana izy ka tonga mpanompo mandoa hetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: DANA hitsara ny olony tahaka ny anankiray amin'ny firenen'ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dana ho menarana ao amoron-dalana, ho bibilava misy tandroka ao an-dalana izy, izay manaikitra ny kitrokelin'ny soavaly, ka potraka miantsilany ny mpitaingina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny famonjenao no andrasako, Jehovah ô!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: GADA, ny manao andiany hamoritra azy; fa izy kosa hamely ny otrika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ASERA dia avy ao aminy ny matavy fihinany, ary izy no ihavian'ny hanim-pin'andriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: NAFTALY dia dieravavy alefa; manao teny mahafinaritra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: JOSEFA dia sampana mahavokatra, eny, sampana mahavokatra eo anilan-doharano; ny rantsany mananika mihoatra ny fefy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nampahory azy ny mpitifitra, dia nitifitra azy sy nanenjika azy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kanefa mateza hery ny tsipìkany, ary mailamailaka ny sandrin-tànany, avy amin'ny tànan'Ilay Maherin'i Jakoba, dia avy ao amin'ny Mpiandry, Izay Vatolampin'ny Isiraely,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avy amin''ny Andriamanitry ny rainao, ka Izy hamonjy anao avy amin''ny Tsitoha, ka Izy hitahy anao: Dia fitahiana avy amin''ny lanitra any ambony, sy fitahiana avy amin''ny lalina, izay mamitsaka any ambany, ary fitahiana avy amin''ny nono sy ny kibo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny tso-dranon'ny rainao dia mihoatra noho ny havoana mandrakizay sy ny zavatra mahafinaritra amin'ny tendrombohitra fahagola; ho eo an-dohan'i Josefa izany, dia ho eo an-tampon-dohan'ilay nalaza tamin'ny rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'BENJAMINA dia amboadia mamiravira: Nony maraina homan-dremby izy, nony hariva mizara babo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ireo rehetra ireo no firenen''ny Isiraely roa ambin''ny folo; ary izany no nolazain''ny rainy taminy sy nitsofany rano azy; samy araka ny tso-drano izay tokony ho azy avy no nitsofany rano azy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia nanafatra azy izy ka nanao taminy hoe: Izaho efa madiva hangonina ho any amin''ny razako; aleveno ao amin''ny razako aho, dia ao anatin''ny zohy izay any amin''ny sahan''i Efrona Hetita, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ao anatin''ny zohy izay any amin''ny saha Makpela, izay tandrifin''i Mamre, any amin''ny tany Kanana, dia ilay novidin''i Abrahama mbamin''ny saha tamin''i Efrona Hetita ho tany fandevenana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tao no nandevenany an''i Abrahama sy Saraha vadiny; ary tao koa no nandevenany an''Isaka sy Rebeka vadiny; ary tao koa no nandevenako an''i Lea, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ny saha sy ny zohy ao anatiny izay novidiny tamin'ny taranak'i Heta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary rehefa vitan'i Jakoba ny hafatra nataony tamin'ny zananilahy rehetra, dia navonkiny teo am-parafara ny tongony, dia niala aina izy ka voangona any amin'ny razany.
