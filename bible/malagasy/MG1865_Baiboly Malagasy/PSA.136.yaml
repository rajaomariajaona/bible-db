document_id: PSA.136
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fankalazana an'Andriamanitra noho ny nanaovany izao rehetra izao sy ny nanavotany ny olony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Miderà an''i Jehovah, fa tsara Izy; Fa mandrakizay ny famindram-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Midera an'Andriamanitra Avo Indrindra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Andriamanitry ny andriamanitra
    marker-yv: yv-n
  - type: text
    text: '; Fa mandrakizay ny famindram-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Miderà ny Tompon'ny tompo; Fa mandrakizay ny famindram-pony;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izy irery no Mpanao fahagagan-dehibe (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay nanao ny lanitra tamin''ny fahendrena (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay namelatra ny tany ho ambonin''ny rano, (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izay nanao ireo fanazavana lehibe (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia ny masoandro ho mpanapaka ny andro (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny volana sy ny kintana ho mpanapaka ny alina (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay namely ny voalohan-terak''i Egypta, (Fa mandrakizay ny famindram-pony) '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka nitondra ny Isiraely nivoaka avy teo aminy (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin''ny tanana mahery sy ny sandry nahinjitra (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izay nampisaraka ny Ranomasina Mena (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ka nampandeha ny Isiraely namaky teo afovoany (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa nanary an''i Farao sy ny miaramilany tao anatin''ny Ranomasina Mena (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay nitondra ny olony nitety ny efitra (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izay namely mpanjaka lehibe (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ka nahafaty mpanjaka malaza (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia Sihona, mpanjakan''ny Amorita (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Sy Oga, mpanjakan''i Basana (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny taniny nomeny ho lova (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia ho lovan'ny Isiraely mpanompony (Fa mandrakizay ny famindram-pony),
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izay nahatsiaro antsika fony isika ambany toetra (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ka naneho hery namonjy antsika ho afaka tamin''ny fahavalontsika (Fa mandrakizay ny famindram-pony), '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izay manome hanina ny nofo rehetra (Fa mandrakizay ny famindram-pony); '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Miderà an'Andriamanitry ny lanitra; Fa mandrakizay ny famindram-pony.
