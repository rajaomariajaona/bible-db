document_id: NUM.23
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Balama tamin''i Balaka: Manorena alitara fito eto ho ahy, ka manamboara vantotr''ombilahy fito sy ondrilahy fito. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia narahin''i Balaka izay efa nolazain''i Balama; ary Balaka sy Balama nanatitra vantotr''ombilahy sy ondrilahy iray avy teo ambonin''ny isan''alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Balama tamin''i Balaka: Mitoera eto anilan''ny fanatitra doranao, fa izaho kosa handeha; angamba ho avy hihaona amiko Jehovah; ary izay hasehony amiko dia hambarako aminao. Ary lasa nankany amin''ny tendrombohitra anankiray mangadihady izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Andriamanitra dia nihaona tamin''i Balama; ary hoy Balama taminy: Ny alitara fito dia efa namboariko, ary efa nanatitra vantotr''ombilahy sy ondrilahy iray avy teo ambonin''ny isan''alitara aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jehovah nanisy teny teo am-bavan''i Balama ka nanao hoe: Miverena any amin''i Balaka, ary izany no holazainao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia niverina tany amin''i Balaka izy, ary, indreo, teo anilan''ny fanatitra dorany izy sy ireo andriandahin''i Moaba rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nanao oha-teny Balama ka nilaza hoe: Balaka nampaka ahy avy tany Arama, Ny mpanjakan''i Moaba nampaka ahy avy tany amin''ny tendrombohitra atsinanana: Avia, ka ozòny ho ahy Jakoba; ary mankanesa atỳ, ka sahatoy ny Isiraely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hataoko ahoana no fanozona izay tsy nozonin'Andriamanitra? Ary hataoko ahoana no fisahato izay tsy nosahatoin'i Jehovah?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa eto an-tampon'ny vatolampy no ahitako azy, ary eto amin'ny havoana no itazanako azy; indro, firenena mitoka-monina izy, ary tsy hatao ho isan'ny jentilisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza no mahisa ny vovok'i Jakoba, na ny isan'ny ampahefatry ny Isiraely? Aoka ho tahaka ny fahafatesan'ny olo-marina ny fahafatesako, ary aoka ny hiafarako ho tahaka ny azy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Balaka tamin''i Balama: Ahoana izao nataonao tamiko izao? Hanozona ny fahavaloko no nangalako anao, kanjo nitso-drano dia nitso-drano azy kosa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia namaly izy ka nanao hoe: Tsy hotandremako va ny hilaza izay ataon''i Jehovah eto am-bavako?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Balaka taminy: Andeha mba hiaraka amiko ho any amin''ny tany hafa izay hahitanao azy; kanefa ny sisiny ihany no ho hitanao eo, fa tsy ho hitanao avokoa izy rehetra; ka ozòny ho ahy ao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nitondra azy tao an-tsaha Zofima izy, tao an-tampon''i Pisga; ary nanorina alitara fito izy ka nanatitra vantotr''ombilahy sy ondrilahy iray avy teo ambonin''ny isan''alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy izy tamin''i Balaka: Mitoera eto anilan''ny fanatitra doranao, fa izaho hankerỳ hihaona amin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Jehovah nihaona tamin''i Balama, dia nanisy teny teo am-bavany ka nanao hoe: Miverena mankeo amin''i Balaka ary izany no holazainao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nony tonga tany aminy izy, dia, indreo, teo anilan''ny fanatitra dorany izy sy ireo andriandahin''i Moaba izay teo aminy. Dia hoy Balaka taminy: Ahoana no nolazain''i Jehovah? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nanao oha-teny Balama ka nilaza hoe: Mitsangàna,, ry Balaka, ka mandrenesa; Atongilano amiko ny sofinao, ry zanak''i Zipora;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Andriamanitra tsy mba olona ka handainga, na zanak'olombelona ka hanenina; moa efa nilaza va Izy, ka tsy hefainy? na efa niteny va Izy, ka tsy hotoviny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Indro, ny hitahy no efa azoko; ary efa nitahy Izy, ka tsy mahova izany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy mijery faharatsiana eo amin'i Jakoba Izy. Ary tsy mahita fahoriana eo amin'ny Isiraely; Jehovah Andriamaniny no nomba azy, Ary hoby fanao amin'andriana no re eo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nentin'Andriamanitra nivoaka avy tany Egypta izy, ary manan-kery toy ny ombimanga,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa tsy misy fisikidianana eo amin'i Jakoba, ary tsy misy fankatovana eo amin'Isiraely. Fa amin'ny fotoana no hilazana amin'i Jakoba sy Isiraely izay efa nataon'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Indro, firenena mitsangana toy ny liom-bavy sy miarina toy ny liona; tsy handry izy mandra-pihinany toha sy mandra-pisotrony ny ran'ny voavono.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy Balaka tamin''i Balama: Aza manozona na mitso-drano azy akory '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa namaly kosa Balama ka nanao tamin''i Balaka hoe; Tsy efa nilaza taminao va aho ka nanao hoe: Izay rehetra holazain''i Jehovah, izany no hataoko?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia hoy Balaka tamin''i Balama: Andeha ho entiko any amin''izay tany hafa ianao; angamba ho sitrak''Andriamanitra ny hanozonanao azy any ho ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Balama dia nentin''i Balaka ho ao an-tampon''i Peora, izay manatrika ny efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy Balama tamin''i Balaka: Manorena alitara fito eto ho ahy, ka manamboara vantotr''ombilahy fito sy ondrilahy fito. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary Balaka dia nanao araka izay efa nolazain'i Balama ka nanatitra vantotr'ombilahy, sy ondrilahy iray avy teo ambonin'ny isan'alitara.
