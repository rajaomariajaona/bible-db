document_id: HEB.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitahana an'i Kristy sy Melkizedeka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa io Melkizedeka io, izay mpanjakan''i Salema sy mpisoron''Andriamanitra Avo Indrindra, ilay nitsena an''i Abrahama, rehefa niverina avy nandresy ny mpanjaka maro izy ka nitso-drano azy, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'sady nomen''i Abrahama ny ampahafolon''ny zavatra rehetra aza (voalohany, raha adika ny anarany, dia Mpanjakan''ny fahamarinana, dia vao Mpanjakan''i Salema koa, izany hoe: Mpanjakan''ny fiadanana; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy manan-dray, tsy manan-dreny, tsy manana tantaram-pirazanana, tsy manana voalohan''andro na faran''ny fiainana, fa natao tahaka ny Zanak''Andriamanitra),- izy dia mitoetra ho mpisorona mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hevero ny halehiben''io lehilahy io -, izay nomen''i Abrahama patriarka ny ampahafolon''izay tsara tamin''ny zavatra nobaboina. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary izay avy tamin''ny taranak''i Levy ka mandray ny fisoronana no mahazo teny haka ny fahafolon-karena amin''ny olona araka ny lalàna, dia amin''ny rahalahiny izany, na dia teraky ny kibon''i Abrahama aza ireny; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'nefa izay tsy isan''ny firazanan''ireo akory no nandray ny fahafolon-karena tamin''i Abrahama sy nitso-drano ilay nanana ny teny fikasana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tsy azo lavina akory anefa fa ny kely no mahazo tso-drano amin''ny lehibe noho ny tenany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary etỳ dia izay olona mety maty no mandray ny fahafolon-karena, fa any kosa dia izay nambara fa velona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary toa azo lazaina fa Levy aza, izay mandray ny fahafolon-karena, dia mba nandoa ny fahafolon-karena koa tao anatin''i Abrahama, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'satria mbola tao an-kibon-drainy ihany izy tamin''ny nitsenan''i Melkizedeka an''i Abrahama. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa raha nisy fanatanterahana tamin''ny fisoronan''i Levy (fa tamin''izany no nahazoan''ny olona ny lalàna), ahoana no mbola ilana mpisorona hafa hiseho araka ny fanaon''i Melkizedeka ihany, izay tsy hotononina ho araka ny fanaon''i Arona? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha ovana ny fisoronana, dia tsy maintsy ovana koa ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa Izay nolazaina amin''izany teny izany dia avy tamin''ny firenena hafa, izay tsy nisy olona manompo eo amin''ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hita marimarina fa avy tamin''ny Joda no nisehoan''ny Tompontsika, ary izany firenena izany dia tsy nisy nolazain''i Mosesy akory ny amin''izay ho mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hita marimarina kokoa indray izany, raha misy Mpisorona hafa miseho ka tahaka an''i Melkizedeka, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'izay natao tsy araka ny lalàn''izay didy momba ny nofo, fa araka ny herin''ny fiainana tsy manam-pahataperana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Izy dia nambara hoe: "Hianao no Mpisorona mandrakizay Araka ny fanaon''i Melkizedeka" (Sal.110.4). '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa misy fahafoanana ny didy nialoha noho ny halemeny sy ny tsi-fanasoavany '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '(fa ny lalàna dia tsy nahatanteraka na inona na inona), ary misy kosa fampidirana ny fanantenana tsaratsara kokoa, izay anatonantsika an''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary tahaka an''i Melkizedeka tsy natao mpisorona raha tsy tamin''ny fianianana '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '- fa ireny kosa dia natao mpisorona tsy tamin''ny fianianana, fa Ity tamin''ny fianianana nataon''ilay nilaza taminy hoe: "Efa nianiana Jehovah ka tsy hanenina: Hianao no Mpisorona mandrakizay" (Sal. 110. 4) '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '- dia tahaka izany koa no nanaovana an''i Jesosy ho Mpiantoka ny fanekena tsara lavitra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa natao maro ireny mpisorona ireny. satria tsy navelan''ny fahafatesana haharitra izy; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fa Izy kosa dia manana fisoronana tsy dimbiasana, satria maharitra mandrakizay Izy; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: koa amin'izany dia mahavonjy tokoa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hatramin''ny farany'
    marker-yv: yv-n
  - type: text
    text: ' izay manatona an''Andriamanitra amin''ny alalany Izy, satria velona mandrakizay hanao fifonana ho azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa Mpisoronabe tahaka izao no miendrika ho antsika: dia Izay masina, tsy misy tsiny, tsy misy loto, voasaraka amin''ny mpanota ka natao avo noho ny lanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izay tsy mila hanatitra fanatitra isan''andro tahaka ny ataon''ireny mpisoronabe ireny, voalohany noho ny otan''ny tenany, dia vao noho ny an''ny olona kosa; fa izany dia nataony indray mandeha ihany, raha nanatitra ny tenany Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa ny lalàna dia manendry olona izay manana fahalemena ho mpisoronabe; fa ny tenin'ny fianianana kosa, izay tato aorian'ny lalàna, dia manendry ny Zanaka, Izay notanterahina ho mandrakizay.
