document_id: JHN.19
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany dia nalain''i Pilato Jesosy ka nokapohiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny miaramila nandrandrana satroka tsilo, ka nasatrony ny lohany, ary nampitafiny lamba volomparasy Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia nanatona Azy ireo ka niteny hoe: Arahaba, ry Mpanjakan''ny Jiosy! sady namely tahamaina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tehina'
    marker-yv: yv-n
  - type: text
    text: ' Azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nivoaka indray Pilato ka nanao taminy hoe: Indro, izaho mitondra Azy mivoaka ho eto aminareo, mba ho fantatrareo fa tsy hitako izay helony, na dia kely akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nivoaka Jesosy misatroka tsilo sy mitafy ny lamba volomparasy. Dia hoy Pilato tamin''ny vahoaka: Indro ny Lehilahy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa hitan''ny lohan''ny mpisorona sy ny mpiandry raharaha Jesosy, dia niantso ireo ka nanao hoe: Homboy amin''ny hazo fijaliana Izy! homboy amin''ny hazo fijaliana Izy! Hoy Pilato taminy: Entonareo Izy, ka homboy amin''ny hazo fijaliana; fa izaho tsy mahita izay helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny Jiosy namaly azy hoe: Izahay manana lalàna, ary araka izany lalàna izany dia tokony ho faty Izy, satria nanao ny tenany ho Zanak''Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony ren''i Pilato izany teny izany, dia vao mainka natahotra izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: dia niditra tao anati-rova
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. pretoria
    marker-yv: yv-n
  - type: text
    text: ' indray izy ka nanao tamin''i Jesosy hoe: Avy aiza moa Hianao? Fa tsy namaly azy akory Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Pilato taminy: Tsy miteny amiko va Hianao? tsy fantatrao va fa manana fahefana handefa Anao aho, sady manana fahefana hanombo Anao amin''ny hazo fijaliana koa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jesosy namaly azy hoe: Hianao tsy manana fahefana amiko akory, raha tsy nomena anao avy any ambony; koa izay nanolotra Ahy taminao no manan-keloka bebe kokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary hatramin'izany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: noho izany'
    marker-yv: yv-n
  - type: text
    text: ' dia nitady handefa Azy Pilato; nefa ny Jiosy niantso ka nanao hoe: Raha alefanao io Lehilahy io, dia tsy mba sakaizan''i Kaisara ianao; fa izay rehetra manao ny tenany ho mpanjaka dia manao teny manohitra an''i Kaisara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa ren''i Pilato izany teny izany, dia nitondra an''i Jesosy nivoaka izy ka nipetraka teo amin''ny seza fitsarana teo amin''ny fitoerana atao hoe Lampivato, fa amin''ny teny Hebreo Gabata '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary andro fiomanana amin''ny Paska ny andro, tokony ho tamin''ny ora fahenina dia hoy izy tamin''ny Jiosy: Indro ny Mpanjakanareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa niantso ireo hoe: Ento, ento, homboy amin''ny hazo fijaliana Izy! Hoy Pilato taminy: Hohomboako amin''ny hazo fijaliana va ny Mpanjakanareo? Ny lohan''ny mpisorona namaly hoe: Tsy manana mpanjaka afa-tsy Kaisara izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tamin''izany Pilato dia nanolotra Azy taminy mba hohomboana amin''ny hazo fijaliana. Dia noraisin''ireo Jesosy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary Izy nitondra ny hazo fijaliany, dia nankany amin''ny tany atao hoe Ikarandoha, izay atao amin''ny teny Hebreo hoe Golgota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Teo no nanomboana Azy tamin''ny hazo fijaliana, ary nisy roa lahy koa niaraka taminy, iray avy teo an-daniny roa, ary Jesosy teo afovoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Pilato nanoratra anarana, ka napetany teo amin''ny hazo fijaliana. Ary izao no voasoratra: JESOSY AVY ANY NAZARETA, MPANJAKAN''NY JIOSY. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary izany anarana izany dia novakin''ny Jiosy maro, fa akaikin''ny tanàna ny tany izay nanomboana an''i Jesosy tamin''ny hazo fijaliana; ary voasoratra tamin''ny teny Hebreo sy Romana sy Grika izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary noho izany ny lohan''ny mpisorona tamin''ny Jiosy dia nanao tamin''i Pilato hoe; Aza soratana hoe: Mpanjakan''ny Jiosy; fa izao: Izy no nilaza hoe: Mpanjakan''ny Jiosy Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pilato namaly hoe: Izay voasoratro dia voasoratro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary rehefa voahombon''ny miaramila tamin''ny hazo fijaliana Jesosy, dia nalainy ny fitafiany ka nozarainy efatra, samy nanana ny anjarany avy ny miaramila; ary ny akanjony koa; fa tsy nisy vitrana ny akanjony, fa tenona iray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niresaka hoe izy: Aza mba triarintsika, fa aoka hilokantsika ho an''izay hahazo azy; mba hahatanteraka ny Soratra Masina manao hoe: Nozarainy ny fitafiako, ary nilokany ny akanjoko (Sal. 22. 18). Izany zavatra izany no nataon''ny miaramila. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nijanona teo akaikin''ny hazo fijalian''i Jesosy ny reniny sy ny rahavavin-dreniny, Maria, vadin''i Klopa, sy Maria Magdalena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony hitan''i Jesosy ny reniny sy ilay mpianatra tiany nijanona teo, dia hoy Izy tamin''ny reniny: Ravehivavy, indro ny zanakao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy koa Izy tamin''ilay mpianatra: Indro ny reninao! Ary tamin''izany ora izany dia noraisin''ilay mpianatra ho any aminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary rehefa afaka izany, dia fantatr''i Jesosy fa efa vita ny zavatra rehetra tamin''izay, mba hahatanteraka ny Soratra Masina, dia hoy Izy: Mangetaheta Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nisy bakoly feno vinaingitra nipetraka teo; ary nisy sipaonjy feno vinaingitra notohiziny tamin''ny hysopa ka nataony tamin''ny vavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary rehefa nanandrana ny vinaingitra Jesosy, dia nanao hoe: Vita; dia nanondrika ny lohany Izy ka nanolotra ny fanahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary satria andro fiomanana ny andro, dia nangataka tamin''i Pilato ny Jiosy mba hotapahina ny ranjon''ireo, ary hesorina ny faty, mba tsy ho tratry ny andro Sabata eo amin''ny hazo fijaliana, satria andro lehibe izany Sabata izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia tonga ny miaramila ka nanapaka ny ranjon''ny voalohany sy ny an''ny anankiray koa izay niaraka nohomboana tamin''i Jesosy tamin''ny hazo fijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa nony nankeo amin''i Jesosy izy, dia hitany fa efa maty sahady Izy, ka dia tsy mba notapahiny ny ranjony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa ny miaramila anankiray nandefona ny lanivoany, ary niaraka tamin''izay dia nisy rà sy rano nandeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ilay nahita dia vavolombelona manambara, ary marina ny fanambarany; ary fantany fa milaza ny marina izy, mba hinoanareo koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa tonga izany mba hahatanteraka ny Soratra Masina hoe: Tsy hisy hotapahina ny taolany (Eks. 12. 46; Sal. 34. 20). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary hoy koa ny teny iray ao amin''ny Soratra Masina: Hijery Izay nolefoniny izy (Zak. 12. 10).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary rehefa afaka izany, Josefa avy any Arimatia (mpianatr''i Jesosy izy, nefa tamin''ny mangingina ihany noho ny fahatahorany ny Jiosy) dia nangataka tamin''i Pilato, mba hahazoany manaisotra ny fatin''i Jesosy. Ary nanaiky Pilato. Dia lasa izy ka nanaisotra ny fatin''i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary tonga koa Nikodemosy (ilay nankao amin''i Jesosy nony alina tamin''ny voalohany) ka nitondra miora sy hazo manitra voaharoharo, tokony ho zato livatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia noraisiny ny fatin''i Jesosy ka nofonosiny lambam-paty mbamin''ny zava-manitra, araka ny fanaon''ny Jiosy, raha mamboatra faty halevina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary nisy saha teo amin''ilay nanomboana Azy tamin''ny hazo fijaliana; ary teo anatin''ilay saha nisy fasana vaovao, izay tsy mbola nandevenana olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary teo no nandevenany an'i Jesosy noho ny andro fiomanan'ny Jiosy, satria teo akaiky ny fasana.
