document_id: JHN.18,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Rehefa voalazan''i Jesosy izany teny izany, dia nandeha Izy mbamin''ny mpianany ka nita ny lohasahan-driaka Kidrona; ary nisy saha teo, izay nidiran''izy sy ny mpianany. '
  '10':
  - type: text
    content: 'Ary Simona Petera nanana sabatra, dia nanatsoaka azy ka nikapa ny mpanompon''ny mpisoronabe ary nahafaka ny sofiny ankavanana. Ary Malko no anaran''ilay mpanompo. '
  '11':
  - type: text
    content: 'Dia hoy Jesosy tamin''i Petera: Ampidiro amin''ny tranony ny sabatrao; ny kapoaka nomen''ny Raiko Ahy tsy hosotroiko va? '
  '12':
  - type: text
    content: 'Ary ny miaramila iray toko sy ny mpifehy arivo ary ny mpiandry raharaha tamin''ny Jiosy dia nisambotra an''i Jesosy ka namatotra Azy, '
  '13':
  - type: text
    content: 'dia nitondra Azy tany amin''i Anasy aloha, fa izy no rafozan''i Kaiafa, mpisoronabe tamin''izany taona izany. '
  '14':
  - type: text
    content: 'Ary Kaiafa no ilay nanome saina ny Jiosy fa mahatsara raha maty ny olona anankiray hamonjy ny firenena. '
  '15':
  - type: text
    content: 'Ary Simona Petera sy ny mpianatra anankiray koa dia nanaraka an''i Jesosy; ary fantatry ny mpisoronabe izany mpianatra izany, dia niara-niditra tamin''i Jesosy ho ao an-kianjan''ny tranon''ny mpisoronabe izy. '
  '16':
  - type: text
    content: 'Fa Petera nijanona teo ala-trano teo am-bavahady. Dia nivoaka ilay mpianatra anankiray, izay fantatry ny mpisoronabe, ka niteny tamin''ny mpiandry vavahady, dia nitondra an''i Petera niditra. '
  '17':
  - type: text
    content: 'Ary hoy ny ankizivavy mpiandry vavahady tamin''i Petera: Moa ianao mba isan''ny mpianatr''io Lehilahy io? Hoy izy: Tsia. '
  '18':
  - type: text
    content: 'Ary ny mpanompo sy ny mpiandry raharaha namelona afon''arina ka nijanona namindro teo, fa nangatsiaka ny andro; ary Petera koa mba nijanona niara-namindro taminy. '
  '19':
  - type: text
    content: 'Ary ny mpisoronabe nanadina an''i Jesosy ny amin''ny mpianany sy ny fampianarany. '
  '2':
  - type: text
    content: 'Ary Jodasy koa, ilay namadika Azy, dia nahalala izany tany izany, satria mpankao matetika Jesosy mbamin''ny mpianany. '
  '20':
  - type: text
    content: 'Jesosy namaly azy hoe: Izaho niteny miharihary tamin''izao tontolo izao; Izaho nampianatra mandrakariva tao amin''ny synagoga sy ny kianjan''ny tempoly, izay iangonan''ny Jiosy rehetra; ary tsy nisy nolazaiko tao amin''ny takona; '
  '21':
  - type: text
    content: 'koa nahoana no manontany Ahy ianao? Ireo nihaino no anontanio izay nolazaiko taminy; fa ireo no mahalala izay nolazaiko. '
  '22':
  - type: text
    content: Ary rehefa nilaza izany teny izany Izy, ny mpiandry raharaha anankiray izay nitsangana teo dia namely tahamaina
  - type: note
    content: 'Na: tehina'
  - type: text
    content: ' an''i Jesosy ka nanao hoe: Izany va no famalinao ny mpisoronabe? '
  '23':
  - type: text
    content: 'Jesosy namaly azy hoe: Raha niteny ratsy Aho, ambarao izay ratsy; fa raha tsara ihany kosa, nahoana no dia mamely Ahy ianao? '
  '24':
  - type: text
    content: 'Ary dia nasain''i Anasy nentina tamin''ny fatorany ho any amin''i Kaiafa mpisoronabe Izy. '
  '25':
  - type: text
    content: 'Ary Simona Petera nijanona namindro. Dia nisy nilaza taminy hoe: Moa ianao koa mba isan''ny mpianany? Fa izy nandà ka nanao hoe: Tsia. '
  '26':
  - type: text
    content: 'Hoy ny anankiray tamin''ny mpanompon''ny mpisoronabe havan''ilay nokapain''i Petera ny sofiny: Tsy efa hitako teo aminy tao anaty saha va ianao? '
  '27':
  - type: text
    content: Dia nandà indray Petera; ary niaraka tamin'izay dia nisy akoho naneno.
  '28':
  - type: text
    content: Ary Jesosy dia nentiny niala tao amin'i Kaiafa ho ao anatirova
  - type: note
    content: Gr. pretoria
  - type: text
    content: ; ary maraina koa ny andro tamin'izay; nefa ireo tsy niditra tao anati-rova
  - type: note
    content: Gr. pretoria
  - type: text
    content: ', fandrao ho voaloto, fa efa hihinana ny Paska izy. '
  '29':
  - type: text
    content: 'Ary Pilato nivoaka ho eo aminy teo ivelany ka nanao hoe: Inona moa no iampanganareo io Lehilahy io? '
  '3':
  - type: text
    content: 'Ary Jodasy, rehefa nahazo ny miaramila iray toko sy mpiandry raharaha avy tamin''ny lohan''ny mpisorona sy ny Fariseo, dia nankeo nitondra fanilo sy fanala ary fiadiana. '
  '30':
  - type: text
    content: 'Dia namaly ireo ka nanao taminy hoe: Raha tsy mpanao ratsy Izy, dia tsy mba natolotray anao. '
  '31':
  - type: text
    content: 'Ary hoy Pilato taminy: Entonareo Izy, ka tsarao araka ny lalànareo. Hoy ny Jiosy taminy: Izahay tsy manam-pahefana hahafaty olona; '
  '32':
  - type: text
    content: 'mba hahatanteraka ny tenin''i Jesosy izay nolazainy nanambara ny fomban''ny fahafatesana izay efa hiaretany. '
  '33':
  - type: text
    content: Ary niditra tao anati-rova
  - type: note
    content: Gr. pretoria
  - type: text
    content: ' indray Pilato, dia niantso an''i Jesosy ka nanao taminy hoe: Hianao va no Mpanjakan''ny Jiosy? '
  '34':
  - type: text
    content: 'Jesosy namaly hoe: Hevitrao ihany va no anaovanao izany, sa nisy hafa nilaza Ahy taminao? '
  '35':
  - type: text
    content: 'Pilato namaly hoe: Moa aho Jiosy? Ny firenenao sy ny mpisoronabe no nanolotra Anao tamiko; inona moa no nataonao? '
  '36':
  - type: text
    content: 'Jesosy namaly hoe: Ny fanjakako tsy avy amin''izao tontolo izao; fa raha mba avy amin''izao tontolo izao ny fanjakako, dia ho niady ny mpanompoko, mba tsy ho voatolotra tamin''ny Jiosy Aho; nefa ankehitriny tsy avy amin''izany ny fanjakako. '
  '37':
  - type: text
    content: 'Ary hoy Pilato taminy: Mpanjaka va ary Hianao ? Jesosy namaly hoe: Voalazanao fa mpanjaka Aho. Izao no nahaterahako, ary izao no nihaviako amin''izao tontolo izao, dia ny hanambara ny marina. Izay rehetra avy amin''ny marina dia mihaino ny feoko. '
  '38':
  - type: text
    content: 'Hoy Pilato taminy: Inona no marina? Ary rehefa nanontany izany izy, dia nivoaka nankeo amin''ny Jiosy indray ka nanao taminy hoe: Tsy hitako izay helony, na dia kely akory aza. '
  '39':
  - type: text
    content: 'Fa misy fanaonareo amin''ny Paska, handefasako anankiray ho anareo; koa tianareo va raha halefako ho anareo ny Mpanjakan''ny Jiosy? '
  '4':
  - type: text
    content: 'Ary satria fantatr''i Jesosy izay rehetra hanjo Azy, dia nivoaka Izy ka nanao tamin''ireo hoe: Iza moa no tadiavinareo? '
  '40':
  - type: text
    content: 'Ary ireo niantso indray ka nanao hoe: Tsy Ilehio, fa Barabasy; koanefa jiolahy Barabasy.'
  '5':
  - type: text
    content: 'Ary ireo namaly Azy hoe: Jesosy avy any Nazareta. Hoy Jesosy taminy: Izaho no Izy. Ary teo koa Jodasy, ilay namadika Azy. '
  '6':
  - type: text
    content: 'Ary raha Jesosy vao nilaza taminy hoe: Izaho no Izy, dia nianotra ireo ka lavo tamin''ny tany. '
  '7':
  - type: text
    content: 'Ary Jesosy nanontany azy indray hoe: Iza moa no tadiavinareo? Dia hoy izy: Jesosy avy any Nazareta. '
  '8':
  - type: text
    content: 'Jesosy namaly hoe: Efa nolazaiko taminareo fa Izaho no Izy; koa raha Izaho no tadiavinareo, dia avelao handeha ireto; '
  '9':
  - type: text
    content: 'mba hahatanteraka ny teny izay nataony hoe: Tsy nasiako very izay nomenao Ahy. '
