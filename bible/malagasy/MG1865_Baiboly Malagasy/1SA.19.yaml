document_id: 1SA.19,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nifonan'i Jonatana ho an'i Davida, sy ny nitadiavan'i Saoly indray hahafaty azy, ary ny nandosiran'i Davida nankany amin'i Samoela
  - type: text
    content: 'Ary Saoly niresaka tamin''i Jonatana zanany sy tamin''ny mpanompony rehetra ny amin''izay hahafaty an''i Davida. Fa Jonatana, zanak''i Saoly, kosa tia dia tia an''i Davida. '
  '10':
  - type: text
    content: 'Ary Saoly nihendry hamely an''i Davida tamin''ny lefona, ka hataony miboroaka mihatra amin''ny rindrina; fa izy nisoroka niala teo anatrehan''i Saoly, ka ny rindrina no voan''ny lefona; dia nandositra Davida ka afaka tamin''iny alina iny ihany. '
  '11':
  - type: text
    content: 'Ary Saoly naniraka olona hankany amin''ny tranon''i Davida hiambina azy hahafaty azy raha maraina; fa Mikala, vadin''i Davida, nilaza taminy hoe: Raha tsy mamonjy ny ainao anio alina ianao, dia hatao maty raha maraina. '
  '12':
  - type: text
    content: 'Ary Mikala nampidina an''i Davida tamin''ny varavarankely; ka dia lasa nandositra izy ka afaka. '
  '13':
  - type: text
    content: Ary nalain'i Mikala ny sampy
  - type: note
    content: Heb. terafima
  - type: text
    content: ', dia napetrany teo amin''ny farafarany, ka nosaronany makarakara volon''osy ny lohany, dia norakofany ny lamba izy. '
  '14':
  - type: text
    content: 'Ary nony naniraka haka an''i Davida Saoly, dia hoy ny vavy: Marary izy. '
  '15':
  - type: text
    content: 'Ary Saoly naniraka ny olona hizaha an''i Davida indray ka nanao hoe: Ento miakatra atỳ amiko amin''ny farafara izy hovonoiko. '
  '16':
  - type: text
    content: Dia niditra ny iraka, kanjo, indro, ny sampy
  - type: note
    content: Heb. terafima
  - type: text
    content: ' no teo am-parafara, ary voasaron''ilay makarakara volon''osy ny lohany. '
  '17':
  - type: text
    content: 'Dia hoy Saoly tamin''i Mikala: Nahoana ianao no namitaka ahy toy izany ka nandefa ny fahavaloko, ary afa-nandositra izy? Fa hoy Mikala tamin''i Saoly: Hoy izy tamiko: Avelao aho handeha, fandrao hovonoiko '
  '18':
  - type: text
    content: 'Dia nandositra Davida ka afaka ary tonga tany amin''i Samoela tany Rama, dia nambarany azy izay rehetra nataon''i Saoly taminy; ary nandeha izy sy Samoela ka nonina tany Naiota. '
  '19':
  - type: text
    content: 'Ary nisy nanambara tamin''i Saoly hoe: Indro, Davida ao Naiota any Rama. '
  '2':
  - type: text
    content: 'Ary Jonatana nanambara tamin''i Davida hoe: Saoly raiko mitady hamono anao; koa, masìna ianao, tandremo ny tenanao rahampitso maraina, ary mitoera amin''izay fitoerana mangingina, ka miere; '
  '20':
  - type: text
    content: 'Ary Saoly naniraka olona hisambotra an''i Davida; ary nony hitan''ireo ny mpaminany tafangona sy maminany ary Samoela mitsangana eo ho lohany, dia tonga tamin''ny irak''i Saoly ny Fanahin''Andriamanitra. ka dia mba naminany koa izy. '
  '21':
  - type: text
    content: 'Ary nony nisy nanambara izany tamin''i Saoly, dia naniraka olon-kafa izy, ary ireo koa dia mba naminany. Ary Saoly naniraka olonkafa indray fanintelony, nefa naminany ihany koa ireo. '
  '22':
  - type: text
    content: 'Ary dia lasa nankany Rama koa ny tenany, ary tonga tao amin''ny lavaka lehibe famorian-drano izay ao Seko izy ka nanontany hoe: Aiza Samoela sy Davida? Ary hoy ny anankiray: Indreo ao Naiota any Rama izy. '
  '23':
  - type: text
    content: 'Dia nankany Naiota any Rama Saoly, ary tonga tao aminy koa ny Fanahin''Andriamanitra, dia nandroso izy sady naminany teny am-pandehanana ambara-pahatongany tany Naiota any Rama. '
  '24':
  - type: text
    content: 'Ary nanaisotra ny fitafiany koa izy ka mba naminany tahaka ny sasany teo anatrehan''i Samoela, ary izy nandry nitanjaka mandritra iny andro sy alina iny. Koa izany no nanaovan''ny olona hoe: Saoly koa moa mba isan''ny mpaminany?'
  '3':
  - type: text
    content: 'ary izaho hivoaka ka hitsangana eo anilan''ikaky amin''ny saha izay misy anao, dia hiresaka aminy ny aminao; koa izay hitako dia hambarako aminao. '
  '4':
  - type: text
    content: 'Ary Jonatana nilaza soa an''i Davida tamin''i Saoly rainy, ka hoy izy taminy: Aoka ny mpanjaka tsy hanisy ratsy an''i Davida mpanompony, fa izy tsy nanisy ratsy anao, sady nahasoa anao indrindra ny nataony, '
  '5':
  - type: text
    content: 'fa izy efa nanao ny ainy tsy ho zavatra ka namono ny Filistina, ary Jehovah nahavita famonjena lehibe ho an''ny Isiraely rehetra; ianao nahita izany ka faly; koa nahoana no dia hanota handatsaka rà marina ianao ka hahafaty foana an''i Davida? '
  '6':
  - type: text
    content: 'Ary Saoly nihaino ny tenin''i Jonatana ka nianiana hoe: Raha velona koa Jehovah, dia tsy hatao maty izy.'
  '7':
  - type: text
    content: Ary Jonatana niantso an'i Davida ka nanambara izany rehetra Izany taminy, dia nitondra an'i Davida ho eo amin'i Saoly, ka dia nitoetra teo anatrehany tahaka ny teo aloha ihany indray izy.
  '8':
  - type: text
    content: 'Ary mbola nisy ady ihany; dia nivoaka Davida ka niady tamin''ny Filistina ary nahafaty betsaka, ka dia nandositra azy ireny. '
  '9':
  - type: text
    content: 'Ary nisy fanahy ratsy avy tany amin''i Jehovah tonga tao amin''i Saoly, raha nipetraka tao an-tranony izy sy nitana ny lefony teny an-tànany; ary Davida nitendry lokanga tamin''ny tànany. '
