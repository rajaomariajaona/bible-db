document_id: 1SA.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifonan'i Jonatana ho an'i Davida, sy ny nitadiavan'i Saoly indray hahafaty azy, ary ny nandosiran'i Davida nankany amin'i Samoela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Saoly niresaka tamin''i Jonatana zanany sy tamin''ny mpanompony rehetra ny amin''izay hahafaty an''i Davida. Fa Jonatana, zanak''i Saoly, kosa tia dia tia an''i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Jonatana nanambara tamin''i Davida hoe: Saoly raiko mitady hamono anao; koa, masìna ianao, tandremo ny tenanao rahampitso maraina, ary mitoera amin''izay fitoerana mangingina, ka miere; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary izaho hivoaka ka hitsangana eo anilan''ikaky amin''ny saha izay misy anao, dia hiresaka aminy ny aminao; koa izay hitako dia hambarako aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Jonatana nilaza soa an''i Davida tamin''i Saoly rainy, ka hoy izy taminy: Aoka ny mpanjaka tsy hanisy ratsy an''i Davida mpanompony, fa izy tsy nanisy ratsy anao, sady nahasoa anao indrindra ny nataony, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa izy efa nanao ny ainy tsy ho zavatra ka namono ny Filistina, ary Jehovah nahavita famonjena lehibe ho an''ny Isiraely rehetra; ianao nahita izany ka faly; koa nahoana no dia hanota handatsaka rà marina ianao ka hahafaty foana an''i Davida? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Saoly nihaino ny tenin''i Jonatana ka nianiana hoe: Raha velona koa Jehovah, dia tsy hatao maty izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary Jonatana niantso an'i Davida ka nanambara izany rehetra Izany taminy, dia nitondra an'i Davida ho eo amin'i Saoly, ka dia nitoetra teo anatrehany tahaka ny teo aloha ihany indray izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary mbola nisy ady ihany; dia nivoaka Davida ka niady tamin''ny Filistina ary nahafaty betsaka, ka dia nandositra azy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy fanahy ratsy avy tany amin''i Jehovah tonga tao amin''i Saoly, raha nipetraka tao an-tranony izy sy nitana ny lefony teny an-tànany; ary Davida nitendry lokanga tamin''ny tànany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Saoly nihendry hamely an''i Davida tamin''ny lefona, ka hataony miboroaka mihatra amin''ny rindrina; fa izy nisoroka niala teo anatrehan''i Saoly, ka ny rindrina no voan''ny lefona; dia nandositra Davida ka afaka tamin''iny alina iny ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Saoly naniraka olona hankany amin''ny tranon''i Davida hiambina azy hahafaty azy raha maraina; fa Mikala, vadin''i Davida, nilaza taminy hoe: Raha tsy mamonjy ny ainao anio alina ianao, dia hatao maty raha maraina. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Mikala nampidina an''i Davida tamin''ny varavarankely; ka dia lasa nandositra izy ka afaka. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nalain'i Mikala ny sampy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. terafima
    marker-yv: yv-n
  - type: text
    text: ', dia napetrany teo amin''ny farafarany, ka nosaronany makarakara volon''osy ny lohany, dia norakofany ny lamba izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nony naniraka haka an''i Davida Saoly, dia hoy ny vavy: Marary izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Saoly naniraka ny olona hizaha an''i Davida indray ka nanao hoe: Ento miakatra atỳ amiko amin''ny farafara izy hovonoiko. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia niditra ny iraka, kanjo, indro, ny sampy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. terafima
    marker-yv: yv-n
  - type: text
    text: ' no teo am-parafara, ary voasaron''ilay makarakara volon''osy ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy Saoly tamin''i Mikala: Nahoana ianao no namitaka ahy toy izany ka nandefa ny fahavaloko, ary afa-nandositra izy? Fa hoy Mikala tamin''i Saoly: Hoy izy tamiko: Avelao aho handeha, fandrao hovonoiko '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nandositra Davida ka afaka ary tonga tany amin''i Samoela tany Rama, dia nambarany azy izay rehetra nataon''i Saoly taminy; ary nandeha izy sy Samoela ka nonina tany Naiota. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nisy nanambara tamin''i Saoly hoe: Indro, Davida ao Naiota any Rama. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Saoly naniraka olona hisambotra an''i Davida; ary nony hitan''ireo ny mpaminany tafangona sy maminany ary Samoela mitsangana eo ho lohany, dia tonga tamin''ny irak''i Saoly ny Fanahin''Andriamanitra. ka dia mba naminany koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nony nisy nanambara izany tamin''i Saoly, dia naniraka olon-kafa izy, ary ireo koa dia mba naminany. Ary Saoly naniraka olonkafa indray fanintelony, nefa naminany ihany koa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary dia lasa nankany Rama koa ny tenany, ary tonga tao amin''ny lavaka lehibe famorian-drano izay ao Seko izy ka nanontany hoe: Aiza Samoela sy Davida? Ary hoy ny anankiray: Indreo ao Naiota any Rama izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nankany Naiota any Rama Saoly, ary tonga tao aminy koa ny Fanahin''Andriamanitra, dia nandroso izy sady naminany teny am-pandehanana ambara-pahatongany tany Naiota any Rama. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanaisotra ny fitafiany koa izy ka mba naminany tahaka ny sasany teo anatrehan''i Samoela, ary izy nandry nitanjaka mandritra iny andro sy alina iny. Koa izany no nanaovan''ny olona hoe: Saoly koa moa mba isan''ny mpaminany?'
