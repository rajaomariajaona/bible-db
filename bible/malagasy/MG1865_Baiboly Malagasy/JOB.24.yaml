document_id: JOB.24,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nahoana no tsy misy fotoan'andro voatendrin'ny Tsitoha, ary nahoana no tsy hitan'ny mahalala Azy izany androny Izany?
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mandeha mitsaitsaika ireo, fa mitanjaka tsy manan-kitafy, ary noana eo am-pitondrana ny amboaram-bary.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Manao diloilo eo anatin'ny tambohon'ny mpampahory azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. tambohon'ireny
      marker-yv: yv-n
    - type: text
      text: ' izy; Ary manosihosy ny famiazam-boaloboka izy, nefa mangetaheta ihany.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mitrona ny lehilahy ao an-tanana, ary mitaraina ny fanahin'ny voalefona; Nefa tsy ahoan'Andriamanitra akory ny ratsy atao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ireny no mpikomy amin'ny mazava; Tsy mba mihevitra ny lalany izy, na mitoetra eo amin'ny alehany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Raha vao mangiran-dratsy, dia mifoha ny mpamono olona; Mamono ny ory sy ny malahelo izy, ary nony alina, dia tahaka ny mpangalatra.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny mason''ny mpijangajanga miandry ny maizimaizina, ka hoy izy: Tsy misy hahalala ahy ka dia manao very maso izy.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Misy manamy trano nony maizina; Nefa nony antoandro dia miery izy; Tsy mahalala ny mazava izy;
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny aizim-pito
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. aloky ny fahafatesana
      marker-yv: yv-n
    - type: text
      text: ' no marainan''ireo rehetra ireo; Satria efa mahazatra azy ny fampahatahoran''ny aizim-pito'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. aloky ny fahafatesana
      marker-yv: yv-n
    - type: text
      text: ' izy.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mitsinkafona paohin'ny rano izy; Voaozona ny anjarany eo amin'ny tany; Tsy mivily ho amin'ny lalana mankeny amin'ny tanim-boaloboka izy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toy ny andevonan'ny maina sy ny mafana ny ranom-panala no andevonan'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: ' ny mpanota.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Misy mamindra fari-tany sy mangalatra omby aman'ondry sady miandry azy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Manadino azy ny vohoka; manjary hanim-py ho an'ny olitra izy ka tsy tsarovana intsony; Ary tapaka tahaka ny hazo ny ratsy fanahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. faharatsiana
      marker-yv: yv-n
    - type: text
      text: ','
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dia ilay nandroba ny momba izay tsy niteraka ary tsy nanisy soa ny mpitondratena.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Kanefa halavain'Andriamanitra amin'ny heriny ny andron'ny olo-mahery; Mitsangana indray ireo, na dia tsy nanampo izay ho velona intsony aza.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ataony mandry fahizay sy tsara tohana izy, sady tsinjoviny mandrakariva ny lalany.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Nasandratra izy, kanjo vetivety dia tsy ao intsony, dia mihalevona izy ka otazana tahaka ny olona rehetra, ary tangosana tahaka ny salohim-bary.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Raha tsy izany, dia aoka hisy hamaky lainga ahy ka hampiseho ny teniko ho tsinontsinona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mandroaka ny borikin'ny kamboty izy, ary maka ny ombin'ny mpitondratena ho tsatòka.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Manosika ny mahantra hiala amin'ny lalana izy, ka dia miery azy avokoa ny malahelo amin'ny tany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indro, tahaka ny fivoaky ny boriki-dia any an-efitra no fivoak'ireny ho amin'ny asany hiremby; Ny tani-hay no ahazoany hanina ho an'ny zanany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Any an-tsaha izy maka vilona sy mitsimpontsimpona ny voaloboky ny ratsy fanahy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mandry mitanjaka amin'ny alina izy, satria tsy manan-damba, ka dia tsy manana firakotra amin'ny hatsiaka;
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kotsan'ny ranonoram-baratra any an-tendrombohitra izy, ka mitampisaka amin'ny vatolampy, fa tsy manam-pialofana.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Misarika ny kamboty eo am-pinonoana izy ary maka tsatòka amin'ny ory.
