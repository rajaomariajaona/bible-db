document_id: JOB.24,96
type_code: plt
verses:
  '1':
  - type: text
    content: Nahoana no tsy misy fotoan'andro voatendrin'ny Tsitoha, ary nahoana no tsy hitan'ny mahalala Azy izany androny Izany?
  '10':
  - type: text
    content: Mandeha mitsaitsaika ireo, fa mitanjaka tsy manan-kitafy, ary noana eo am-pitondrana ny amboaram-bary.
  '11':
  - type: text
    content: Manao diloilo eo anatin'ny tambohon'ny mpampahory azy
  - type: note
    content: Heb. tambohon'ireny
  - type: text
    content: ' izy; Ary manosihosy ny famiazam-boaloboka izy, nefa mangetaheta ihany.'
  '12':
  - type: text
    content: Mitrona ny lehilahy ao an-tanana, ary mitaraina ny fanahin'ny voalefona; Nefa tsy ahoan'Andriamanitra akory ny ratsy atao.
  '13':
  - type: text
    content: Ireny no mpikomy amin'ny mazava; Tsy mba mihevitra ny lalany izy, na mitoetra eo amin'ny alehany.
  '14':
  - type: text
    content: Raha vao mangiran-dratsy, dia mifoha ny mpamono olona; Mamono ny ory sy ny malahelo izy, ary nony alina, dia tahaka ny mpangalatra.
  '15':
  - type: text
    content: 'Ny mason''ny mpijangajanga miandry ny maizimaizina, ka hoy izy: Tsy misy hahalala ahy ka dia manao very maso izy.'
  '16':
  - type: text
    content: Misy manamy trano nony maizina; Nefa nony antoandro dia miery izy; Tsy mahalala ny mazava izy;
  '17':
  - type: text
    content: Fa ny aizim-pito
  - type: note
    content: Heb. aloky ny fahafatesana
  - type: text
    content: ' no marainan''ireo rehetra ireo; Satria efa mahazatra azy ny fampahatahoran''ny aizim-pito'
  - type: note
    content: Heb. aloky ny fahafatesana
  - type: text
    content: ' izy.'
  '18':
  - type: text
    content: Mitsinkafona paohin'ny rano izy; Voaozona ny anjarany eo amin'ny tany; Tsy mivily ho amin'ny lalana mankeny amin'ny tanim-boaloboka izy.
  '19':
  - type: text
    content: Toy ny andevonan'ny maina sy ny mafana ny ranom-panala no andevonan'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' ny mpanota.'
  '2':
  - type: text
    content: Misy mamindra fari-tany sy mangalatra omby aman'ondry sady miandry azy.
  '20':
  - type: text
    content: Manadino azy ny vohoka; manjary hanim-py ho an'ny olitra izy ka tsy tsarovana intsony; Ary tapaka tahaka ny hazo ny ratsy fanahy
  - type: note
    content: Heb. faharatsiana
  - type: text
    content: ','
  '21':
  - type: text
    content: Dia ilay nandroba ny momba izay tsy niteraka ary tsy nanisy soa ny mpitondratena.
  '22':
  - type: text
    content: Kanefa halavain'Andriamanitra amin'ny heriny ny andron'ny olo-mahery; Mitsangana indray ireo, na dia tsy nanampo izay ho velona intsony aza.
  '23':
  - type: text
    content: Ataony mandry fahizay sy tsara tohana izy, sady tsinjoviny mandrakariva ny lalany.
  '24':
  - type: text
    content: Nasandratra izy, kanjo vetivety dia tsy ao intsony, dia mihalevona izy ka otazana tahaka ny olona rehetra, ary tangosana tahaka ny salohim-bary.
  '25':
  - type: text
    content: Raha tsy izany, dia aoka hisy hamaky lainga ahy ka hampiseho ny teniko ho tsinontsinona.
  '3':
  - type: text
    content: Mandroaka ny borikin'ny kamboty izy, ary maka ny ombin'ny mpitondratena ho tsatòka.
  '4':
  - type: text
    content: Manosika ny mahantra hiala amin'ny lalana izy, ka dia miery azy avokoa ny malahelo amin'ny tany.
  '5':
  - type: text
    content: Indro, tahaka ny fivoaky ny boriki-dia any an-efitra no fivoak'ireny ho amin'ny asany hiremby; Ny tani-hay no ahazoany hanina ho an'ny zanany.
  '6':
  - type: text
    content: Any an-tsaha izy maka vilona sy mitsimpontsimpona ny voaloboky ny ratsy fanahy.
  '7':
  - type: text
    content: Mandry mitanjaka amin'ny alina izy, satria tsy manan-damba, ka dia tsy manana firakotra amin'ny hatsiaka;
  '8':
  - type: text
    content: Kotsan'ny ranonoram-baratra any an-tendrombohitra izy, ka mitampisaka amin'ny vatolampy, fa tsy manam-pialofana.
  '9':
  - type: text
    content: Misarika ny kamboty eo am-pinonoana izy ary maka tsatòka amin'ny ory.
