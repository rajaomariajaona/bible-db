document_id: JOS.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanoratan'i Josoa ny dikan'ny lalàna tamin'ny vato, sy ny namakiana ny fitahiana sy ny fanozonana teo an-tendrombohitra Gerizima sy Ebala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hoy Jehovah tamin''i Josoa: Aza matahotra na mivadi-po ianao, ento miaraka aminao ny vahoaka rehetra mpanafika, ka miaingà, iakaro Ay; indro, efa natolotro eo an-tananao ny mpanjakan''i Ay mbamin''ny vahoakany sy ny tanànany ary ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia tahaka ny nataonao tamin'i Jeriko sy ny mpanjakany no hataonao koa amin'i Ay sy sy mpanjakany; nefa ny fananana rehetra sy ny biby fiompy ao dia halainareo ho babo ho anareo ihany; asio otrika eo ankoatry ny tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niainga Josoa sy ny mpanafika rehetra hiakatra any Ay, ary nifidy lehilahy mahery telo alina Josoa ka nandefa ireo tamin''ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nandidy azy izy ka nanao hoe: Indro, ianareo hanotrika eo ivohon''ny tanàna hamely azy, ka aza manalavitra azy loatra, fa miomàna ianareo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary izaho sy ny vahoaka rehetra izay miaraka amiko kosa dia hanatona ny tanàna; ary rehefa mivoaka hamely anay tahaka ny teo ny olona, dia handositra eo anoloany izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hivoaka hanenjika anay izy mandra-pitarikay azy hiala ao an-tanàna; fa izy hanao hoe: Mandositra eo anoloantsika tahaka ny teo izy; dia hanao tari-dositra eo anoloany izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary dia hiroatra avy ao amin''ny fanotrehana kosa ianareo, ka ho azonareo ny tanàna; fa atolotr''i Jehovah Andriamanitrareo eo an-tananareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa afakareo ny tanàna, dia dory amin''ny afo; araka ny didin''i Jehovah no hataonareo; indro, efa nandidy anareo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia nampandehanin'i Josoa izy ireo, ary nandeha hanotrika ka nitoetra teo andrefan'i Ay, teo anelanelan'i Betela sy Ay; fa Josoa kosa nitoetra teo amin'ny vahoaka ihany tamin'izany alina izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nifoha maraina koa Josoa ka nandamina ny vahoaka, ary niakatra teo alohan''ny vahoaka hankany Ay izy sy ny loholon''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny vahoaka rehetra mpanafika, izay niaraka tamin''i Josoa, dia niakatra ka nanakaiky sy nanandrify ny tanàna; ary nitoby teo avaratr''i Ay izy, ka ny lohasaha no teo anelanelan''izy sy Ay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia naka olona tokony ho dimy arivo lahy izy ka nampanotrika azy teo anelanelan''i Betela sy Ay, andrefan''ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary rehefa voalahatry ny vahoaka ny toby rehetra izay teo avaratry ny tanàna sy ny otrika teo andrefan'ny tanàna, dia nandeha nankeo amin'ny lohasaha Josoa tamin'izany alina izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary rehefa hitan'ny mpanjakan'i Ay izany, dia nifoha maraina koa ny olona tao an-tanàna ka nivoaka faingana hiady tamin'ny Isiraely, teo amin'ny tany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fotoana'
    marker-yv: yv-n
  - type: text
    text: ' nifamotoanany tandrifin''ny tani-hay, dia ny mpanjaka sy ny vahoakany: fa tsy fantany ho nisy otrika hamely azy tao ankoatry ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Josoa sy ny Isiraely rehetra nody resy teo anoloany ka nanao tari-dositra tamin''ny lalana mankany an-efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nifampiantso hanenjika azy ny vahoaka rehetra izay tao an-tanàna; ary nanenjika an''i Josoa izy, ka dia voatarika ho tafavoaka ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary tsy nisy lehilahy sisa, na tao Ay na tao Betela, izay tsy nivoaka hanenjika ny Isiraely; ary nilaozany mbola nivoha ny tanàna, ka lasa nanenjika ny Isiraely izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Josoa: Atondroy an''i Ay ny lefona izay eny an-tananao; fa hatolotro eo an-tananao Ay. Dia natondron''i Josoa ny tanàna ny lefona izay teny an-tànany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia niroatra faingana ny otrika avy tao amin''ny nitoerany ka nihazakazaka, raha vao natondrony ny tànany; dia niditra tao an-tanàna izy ka nahafaka azy ary nandoro azy faingana tamin''ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary niherika ny mponina tao Ay, ka hitany fa, indro, ny setroky ny tanàna niakatra ho any an-danitra, sady tsy nisy handosirany akory , na ho etỳ, na ho erỳ; fa ny Isiraely izay nanao tari-dositra ho any an-efitra dia nifotitra namely ny mpanenjika kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa rehefa hitan''i Josoa sy ny Isiraely rehetra fa efa azon''ny otrika ny tanàna, ka niakatra ny setroky ny tanàna, dia nifotitra izy ka namely ny mponina tao Ay. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ireo tao an-tanàna nivoaka hamely azy, ka dia latsaka teo afovoan''ny Isiraely ny olona, fa ny Isiraely sasany teo an-daniny iray, ary ny sasany teo an-daniny iray koa; dia nifandafaran''ny Isiraely teo izy, ka tsy nasiany niangana na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny mpanjakan''i Ay nataony sambo-belona ka nentiny teo amin''i Josoa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa namono ny mponina rehetra tao Ay tany an-tsaha ny Isiraely, dia tany amin''ny efitra nanenjehany azy, ka lavo tamin''ny lelan-tsabatra avokoa izy rehetra mandra-pahalany ritrany, dia niverina tany Ay ny Isiraely rehetra ka namely azy tamin''ny lelan-tsabatra. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary izay rehetra maty tamin''izany andro izany, na lehilahy na vehivavy, dia roa arivo amby iray alina, dia ny mponina rehetra tao Ay. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary Josoa tsy nampihemotra ny tànany izay nanondro tamin'ny lefona mandra-pandringana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. herema
    marker-yv: yv-n
  - type: text
    text: ' ny mponina rehetra tao Ay. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nefa ny biby fiompy mbamin''ny fananana rehetra tao amin''izany tanàna izany dia nalain''ny Isiraely ho babony ihany, araka ny tenin''i Jehovah izay nandidiany an''i Josoa. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Ay dia nodoran''i Josoa ka nofoanany ho tanànaolo mandrakizay, dia toy izany mandraka androany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary ny mpanjakan'i Ay nahantony tamin'ny hazo mandra-paharivan'ny andro; ary rehefa tokony ho maty masoandro, dia nasain'i Josoa nesorina tamin'ny hazo ny fatiny ka nariana teo anoloan'ny vavahadin'ny tanàna ary notsindriany antontam-bato avo mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary tamin''izany Josoa dia nanorina alitara tao an-tendrombohitra Ebala ho an''i Jehovah, Andriamanitry ny Isiraely, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'araka izay nandidian''i Mosesy mpanompon''i Jehovah, ny Zanak''Isiraely, dia araka ny voasoratra eo amin''ny bokin''ny lalàn''i Mosesy dia alitara vato tsy voavoatra, izay tsy nopehim-by; ary dia nanatitra fanatitra dorana teo amboniny ho an''i Jehovah izy sady namono zavatra hatao fanati-pihavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nosoratany teo amin''ny vato ny dikan''ny lalàn''i Mosesy, izay efa nosoratany teo anatrehan''ny Zanak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny Isiraely rehetra sy ny loholony sy ny mpifehy azy ary ny mpitsara azy dia nitsangana teo an-daniny roa amin''ny fiara, teo anatrehan''ny Levita mpisorona, izay nitondra ny fiaran''ny faneken''i Jehovah, na olona hafa firenena, na Isiraely: ny antsasany nanandrify ny tendrombohitra Gerizima, ary ny antsasany nanandrify ny tendrombohitra Ebala, araka izay efa nandidian''i Mosesy mpanompon''i Jehovah fahiny, mba hitso-drano ny olona Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary rehefa afaka izany, dia namaky ny tenin''ny lalàna rehetra izy, dia ny fitahiana sy ny fanozonana, araka izay rehetra voasoratra eo amin''ny bokin''ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tsy nisy teny tamin'izay rehetra nandidian'i Mosesy, izay tsy novakin'i Josoa teo anatrehan'ny fiangonana, dia ny Isiraely rehetra, mbamin'ny vehivavy sy ny ankizy madinika ary ny vahiny izay teo aminy.
