verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainana ataon'ny olona miara-mitoetra amin'izay tia ady
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fihirana fiakarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fihirana misy hevitra ambaratonga'
      marker-yv: yv-n
    - type: text
      text: '. Jehovah no nitarainako tamin''ny fahoriako dia namaly ahy Izy, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jehovah ô, vonjeo ny fanahiko amin''ny molotra mandainga, Eny, amin''ny lela mamitaka '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Inona no homeny anao, ary inona koa no hataony aminao, Ry lela mamitaka? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Zana-tsipìkan'ny mahery sady voaranitra, Mbamin'ny vain'afon'anjavidy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Izahao 1 Mpan. xix. 4
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lozako, fa mivahiny eto amin''ny Maseka aho Ary mitoetra ato an-dain''ny Kedarita! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ela loatra izay no nitoeran''ny fanahiko teo amin''Izay tsy tia fihavanana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha izaho, dia fihavanana; Kanjo nony miteny aho, dia mila ady kosa ireny.
