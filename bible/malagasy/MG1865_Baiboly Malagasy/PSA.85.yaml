document_id: PSA.85,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangatahana mba hampodin'Andriamanitra indray ny fankasitrahany ny olony
  - type: text
    content: 'Ho an''ny mpiventy hira. Salamo nataon''ny Koraita. Jehovah ô, efa naneho fitia tamin''ny taninao Hianao, Efa nampodinao Jakoba avy tamin''ny fahababoany. '
  '10':
  - type: text
    content: 'Mihaona ny famindram-po sy ny fahamarinana; Mifanoroka ny rariny sy ny fihavanana. '
  '11':
  - type: text
    content: 'Ny fahamarinana mitsimoka amin''ny tany; Ary ny rariny mitsinjo eny an-danitra. '
  '12':
  - type: text
    content: 'Eny, Jehovah hanome ny tsara Ary ny tanintsika hahavoka-javatra. '
  '13':
  - type: text
    content: Ny rariny no hialoha Azy, Sady hizotra hanaraka ny diany eny an-dalana.
  '2':
  - type: text
    content: 'Voaisotrao ny heloky ny olonao, Voasaronao ny fahotany rehetra. '
  '3':
  - type: text
    content: 'Efa nampijanona ny fahatezeranao rehetra Hianao, Ary niala tamin''ny fahatezeranao mirehitra. '
  '4':
  - type: text
    content: 'Miverena aminay, ry Andriamanitry ny famonjena anay ô, Ary ampitsaharo ny fahatezeranao aminay. '
  '5':
  - type: text
    content: 'Ho tezitra aminay mandrakizay va Hianao? Hampaharetinao hahatratra ny taranaka fara mandimby va ny fahatezeranao? '
  '6':
  - type: text
    content: 'Tsy hovelominao indray va izahay, Mba hifalian''ny olonao aminao? '
  '7':
  - type: text
    content: Asehoy anay ny famindram-ponao, Jehovah ô, Ka omeo anay ny famonjenao.
  '8':
  - type: text
    content: 'Hihaino izay holazain''i Jehovah Andriamanitra aho; Fa hilaza fiadanana amin''ny olony Izy, dia amin''ny olony masina; Koa aoka tsy hiverina ho ao amin''ny fahadalana ireo. '
  '9':
  - type: text
    content: 'Eny tokoa, akaikin''izay matahotra Azy ny famonjeny, Mba hitoeran''ny voninahitra eo amin''ny tanintsika. '
