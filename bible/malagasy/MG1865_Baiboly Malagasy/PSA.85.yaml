document_id: PSA.85
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fangatahana mba hampodin'Andriamanitra indray ny fankasitrahany ny olony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Salamo nataon''ny Koraita. Jehovah ô, efa naneho fitia tamin''ny taninao Hianao, Efa nampodinao Jakoba avy tamin''ny fahababoany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voaisotrao ny heloky ny olonao, Voasaronao ny fahotany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Efa nampijanona ny fahatezeranao rehetra Hianao, Ary niala tamin''ny fahatezeranao mirehitra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Miverena aminay, ry Andriamanitry ny famonjena anay ô, Ary ampitsaharo ny fahatezeranao aminay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ho tezitra aminay mandrakizay va Hianao? Hampaharetinao hahatratra ny taranaka fara mandimby va ny fahatezeranao? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy hovelominao indray va izahay, Mba hifalian''ny olonao aminao? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Asehoy anay ny famindram-ponao, Jehovah ô, Ka omeo anay ny famonjenao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hihaino izay holazain''i Jehovah Andriamanitra aho; Fa hilaza fiadanana amin''ny olony Izy, dia amin''ny olony masina; Koa aoka tsy hiverina ho ao amin''ny fahadalana ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eny tokoa, akaikin''izay matahotra Azy ny famonjeny, Mba hitoeran''ny voninahitra eo amin''ny tanintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mihaona ny famindram-po sy ny fahamarinana; Mifanoroka ny rariny sy ny fihavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny fahamarinana mitsimoka amin''ny tany; Ary ny rariny mitsinjo eny an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, Jehovah hanome ny tsara Ary ny tanintsika hahavoka-javatra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny rariny no hialoha Azy, Sady hizotra hanaraka ny diany eny an-dalana.
