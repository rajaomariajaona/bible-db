document_id: MAT.24
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nony niala teo an-kianjan''ny tempoly Jesosy, dia lasa nandeha; ary ny mpianany nanatona Azy hampizaha Azy ny rafitry ny tempoly. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa Izy namaly ka nanao taminy hoe: Tsy hitanareo va ireo rehetra ireo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na:Tsy hitanareo izany rehetra izany
    marker-yv: yv-n
  - type: text
    text: '? Lazaiko aminareo marina tokoa: Tsy havela hisy vato hifanongoa eto ka tsy horavana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nipetraka teo an-tendrombohitra Oliva Izy, dia nanatona Azy mangingina ny mpianany ka nanao hoe: Lazao aminay izay andro hahatongavan''izany, ary izay ho famantarana ny fihavianao sy ny fahataperan''izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Mitandrema, fandrao hisy hamitaka anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa maro no ho avy amin''ny anarako hanao hoe: Izaho no Kristy, ka maro no ho voafitany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary handre ady sy filazana ady ianareo; koa mitandrema, aza matahotra; fa tsy maintsy ho tonga izany; nefa tsy mbola tonga ny farany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana; ary hisy mosary sy horohorontany amin''ny tany samy hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa izany rehetra izany no fiandohan'ny fahoriana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. faharariam-piterahana; izahao 19. 28
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary dia hatolony ho amin''ny fahoriana ianareo ka hovonoiny; ary ho halan''ny firenena rehetra ianareo noho ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary amin''izany andro izany dia ho tafintohina ny maro, ary hifampiampanga sy hifankahala izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hisy mpaminany sandoka maro hitsangana ka hamitaka ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary noho ny haben''ny tsi-fankatoavan-dalàna dia hihamangatsiaka ny fitiavan''ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izay maharitra hatramin''ny farany no hovonjena. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hotorina amin''izao tontolo izao ity filazantsaran''ny fanjakana ity ho vavolombelona amin''ny firenena rehetra, dia vao ho tonga ny farany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa raha hitanareo mitsangana ao amin''izay fitoerana masina ny fahavetavetan''ny fandravana, izay nampilazaina an''i Daniela mpaminany (Dan. 12. 11; 9. 27) (aoka hisaina izay mamaky izany), '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia aoka izay olona any Jodia handositra ho any an-tendrombohitra; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary izay ao an-tampon-trano aoka tsy hidina haka ny ao an-tranony; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary izay any an-tsaha aoka tsy hiverina haka ny lambany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary lozan''ny bevohoka sy ny mampinono amin''ireo andro ireo! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa mivavaha ianareo mba tsy ho amin''ny ririnina na ho amin''ny Sabata no handosiranareo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa amin''izany andro izany dia hisy fahoriana lehibe, izay tsy mbola nisy toa azy hatrizay niandohan''izao tontolo izao ka mandraka ankehitriny, sady tsy hisy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha tsy efa nohafohezina izany andro izany, dia tsy nisy nofo hovonjena; fa noho ny olom-boafidy dia hohafohezina izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa raha misy manao aminareo hoe: Indro,y Kristy, na: Indro, ar ; aza mino ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa hisy Kristy sandoka sy mpaminany sandoka hitsangana ka haneho famantarana lehibe sy fahagagana, ary raha azo atao, na dia ny olom-boafidy aza dia hofitahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Indro, voalazako aminareo rahateo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary amin''izany, raha misy manao aminareo hoe: Indro, any an-efitra Izy, aza mankany ianareo; Indro, ao amin''ny efi-trano Izy, aza mino. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa tahaka ny helatra avy any atsinanana ka hita hatrany andrefana, dia ho tahaka izany ny fihavian''ny Zanak''olona. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa izay itoeran''ny faty, dia any no hiangonan''ny voromahery. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary raha vao afaka ny fahoriana amin''ireo andro ireo, ny masoandro dia hohamaizinina, ary ny volana tsy hahazava; ny kintana hiraraka avy any an-danitra, ary ny herin''ny lanitra hohozongozonina. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary amin''izany andro izany dia hiseho eo amin''ny lanitra ny famantarana ny Zanak''olona, ka dia hitomany ny firenena rehetra ambonin''ny tany, ary hahita ny Zanak''olona avy amin-kery sy voninahitra lehibe eo amin''ny rahon''ny lanitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary amin'ny ampanenoana mafy ny trompetra dia haniraka ny anjeliny Izy, ary hangonin'ireo ny olom-boafidy avy amin'ny vazan-tany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. rivotra
    marker-yv: yv-n
  - type: text
    text: ' efatra hatramin''ny faravodilanitra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary mianara ny fanoharana ny amin'ny aviavy
  - type: usfm
    marker: x
    children:
    - type: text
      text: aviavimbazaha
    marker-yv: yv-n
  - type: text
    text: ': Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny lohataona. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dia tahaka izany koa ianareo, raha vao hitanareo izany rehetra izany, dia aoka ho fantatrareo fa efa akaiky mby eo am-baravarana Izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: izany'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Tsy mba ho lany izao taranaka izao mandra-pahatongan''izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa ny amin''izany andro sy ora izany dia tsy misy mahalala, na dia ny anjelin''ny lanitra aza, [ary na ny Zanaka aza,] afa-tsy ny Ray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa tahaka ny andron''i Noa, dia ho tahaka izany koa ny fihavian''ny Zanak''olona. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa tahaka ny tamin''ny andro fony tsy mbola tonga ny Safo-drano, ka nihinana sy nisotro ny olona ary nampaka-bady sy namoaka ny ampakarina, mandra-pihavin''ny andro izay nidiran''i Noa tao amin''ny sambo-fiara, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ary tsy fantany mandra-pihavin''ny Safo-drano izay nandringana ny olona rehetra, dia ho tahaka izany ny fihavian''ny Zanak''olona. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary amin''izany hisy roa lahy any an-tsaha; ny anankiray horaisina, ary ny anankiray havela. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary hisy roa vavy manodina ny fikosoham-bary; ny anankiray horaisina, ary ny anankiray havela. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Koa amin''izany miambena ianareo; fa tsy fantatrareo izay andro hihavian''ny Tomponareo. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nefa aoka ho fantatrareo izao: Raha fantatry ny tompon-trano ny fiambenana amin''ny alina izay hihavian''ny mpangalatra, dia ho niambina izy ka tsy namela ny tranony hotamina. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Koa miomana kosa ianareo; fa amin''izay ora tsy ampoizinareo no hihavian''ny Zanak''olona. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Iza moa no mpanompo mahatoky sy manan-tsaina, izay notendren''ny tompony hifehy ny mpanompony mba hanome azy hanina amin''ny fotoana? '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Sambatra izany mpanompo izany, raha avy ny tompony ka hahita azy manao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Hotendreny ho mpanapaka ny fananany rehetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Fa raha manao anakampo izany mpanompo ratsy fanahy izany hoe: Maharitra ela ny tompoko, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'ka dia mikapoka ny mpanompo namany izy ary mihinana sy misotro amin''ny mpimamo, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'dia ho avy ny tompon''izany mpanompo izany amin''ny andro izay tsy ampoiziny sy amin''ny ora izay tsy fantany, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: dia hotapahiny roa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hokapohiny mafy'
    marker-yv: yv-n
  - type: text
    text: ' izy ka homeny anjara any amin''ny mpihatsaravelatsihy; any no hisy ny fitomaniana sy ny fikitroha-nify.'
