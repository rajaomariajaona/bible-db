document_id: REV.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitsofana ny trompetra fahenina, sy ny nahatongavan'ny loza faharoa
  - type: text
    content: 'Ary ny anjely fahadimy nitsoka, dia hitako fa, indro, nisy kintana anankiray avy tany an-danitra latsaka tamin''ny tany; ary nomena ilay anjely ny fanalahidin''ny lavaka tsy hita noanoa. '
  '10':
  - type: text
    content: Ary manan-drambo tahaka ny maingoka izy sady misy fanindronana; ary amin'ny rambony no misy ny heriny
  - type: note
    content: Gr. fahefana
  - type: text
    content: ' hampahoriany ny olona dimy volana. '
  '11':
  - type: text
    content: Ary manana ny anjelin'ny lavaka tsy hita noanoa ho mpanjakany izy; ny anarany amin'ny teny Hebreo dia Abadona
  - type: note
    content: Abadona = Fandringanana
  - type: text
    content: ', fa amin''ny teny Grika kosa dia Apolyona'
  - type: note
    content: Apolyona = Mpandringana
  - type: text
    content: ' no anarany. '
  '12':
  - type: text
    content: Lasa ny loza anankiray; indreo, ho avy ny loza roa hafa koa, rehefa afaka izao.
  '13':
  - type: text
    content: 'Ary ny anjely fahenina nitsoka, dia nahare feo ary tamin''ny tandroky ny alitara volamena eo anatrehan''Andriamanitra aho, '
  '14':
  - type: text
    content: 'nanao tamin''ny anjely fahenina, izay nanana ny trompetra, hoe: Vahao ny anjely efatra izay mifatotra any Eofrata, ony lehibe. '
  '15':
  - type: text
    content: 'Dia novahana ny anjely efatra izay voaomana ho amin''ny ora sy ny andro sy ny volana ary ny taona mba hahafaty ny ampahatelon''ny olona. '
  '16':
  - type: text
    content: Ary ny isan'ny miaramila an-tsoavaly dia roa alinalina; nahare ny isany aho.
  '17':
  - type: text
    content: 'Ary toy izao no nahitako ny soavaly teo amin''ny fahitana sy izay nitaingina azy: manana-piarovan-tratra tahaka ny afo sy ny setroka ary ny solifara izy; ary ny lohan''ny soavaly dia tahaka ny lohan''ny liona; ary misy afo sy setroka ary solifara mivoaka ary amin''ny vavany. '
  '18':
  - type: text
    content: 'Ireo loza telo loha ireo, dia ny afo sy ny setroka ary ny solifara izay nivoaka ary tamin''ny vavany, no nahafaty ny ampahatelon''ny olona. '
  '19':
  - type: text
    content: 'Fa ny herin''ny soavaly dia eo amin''ny vavany sy ny rambony; fa ny rambony dia tahaka ny menarana sady manan-doha, ka ireny no entiny mampahory. '
  '2':
  - type: text
    content: 'Ary nanokatra ny lavaka tsy hita noanoa izy, dia nisy setroka niakatra ary tamin''ny lavaka, tahaka ny setroka ary amin''ny lafaoro lehibe, ary tonga maizina ny masoandro sy ny habahabaka noho ny setroka avy tao amin''ny lavaka. '
  '20':
  - type: text
    content: 'Nefa ny olona sisa, izay tsy matin''ireo loza ireo, dia tsy nibebaka hiala tamin''ny asan''ny tànany, mba tsy hivavaka amin''ny demonia sy ny sampy volamena sy volafotsy sy varahina sy vato ary hazo, izay tsy mahajery, na mahare, na afa-mamindra; '
  '21':
  - type: text
    content: ary tsy nibebaka tamin'ny namonoany olona izy, na tamin'ny nanaovany ody ratsy, na tamin'ny fijangajangany, na tamin'ny halatra nataony koa.
  '3':
  - type: text
    content: Ary nisy valala nivoaka avy tamin'ny setroka nankamin'ny tany; ary nomena hery
  - type: note
    content: Gr. fahefana
  - type: text
    content: ' ireny, tahaka ny herin'
  - type: note
    content: Gr. fahefana
  - type: text
    content: '''ny maingoka amin''ny tany. '
  '4':
  - type: text
    content: 'Ary nilazana izy mba tsy hanimba ny ahitra amin''ny tany, na ny zava-maitso, na ny hazo akory aza, fa ny olona izay tsy manana ny tombo-kasen''Andriamanitra eo amin''ny handriny ihany. '
  '5':
  - type: text
    content: 'Nefa tsy navela hahafaty ary izy, fa ny hampanaintaina ary dimy volana; ary ny fampanaintainany dia tahaka ny fampanaintainan''ny maingoka, raha mamely olona. '
  '6':
  - type: text
    content: 'Ary amin''izany andro izany dia hitady fahafatesana ny olona, fa tsy hahita; ary haniry ho faty izy, fa mandositra ary ny fahafatesana. '
  '7':
  - type: text
    content: 'Ary ny endriky ny valala dia tahaka ny soavaly voaomana ho enti-miady; ary tamin''ny lohany nisy satro-boninahitra toy ny volamena, ary ny tavany tahaka ny tavan''olona. '
  '8':
  - type: text
    content: 'Ary nanam-bolo tahaka ny volom-behivavy izy, ary ny nifiny tahaka ny an''ny liona. '
  '9':
  - type: text
    content: 'Ary nanam-piarovan-tratra tahaka ny fiarovan-tratra vy izy; ary ny fikopakopaky ny elany dia tahaka ny fikotrokotroky ny kalesy entin''ny soavaly betsaka miriotra ho amin''ny ady. '
