document_id: NUM.33,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nitobian'ny Zanak'Isiraely tany an-efitra
  - type: text
    content: 'Ary izao no nandehan''ny Zanak''Isiraely, izay nentin''i Mosesy sy Arona nivoaka avy tany amin''ny tany Egypta araka ny antokony. '
  '10':
  - type: text
    content: 'Ary nony niala tao Elima izy, dia nitoby tao amoron''ny Ranomasina Mena. '
  '11':
  - type: text
    content: 'Ary nony niala tao amoron''ny Ranomasina Mena izy, dia nitoby tany an-efitra Sina. '
  '12':
  - type: text
    content: 'Ary nony niala tany an-efitra Sina izy, dia nitoby tao Dopka. '
  '13':
  - type: text
    content: 'Ary nony niala tao Dopka izy, dia nitoby tao Alosy. '
  '14':
  - type: text
    content: 'Ary nony niala tao Alosy izy, dia nitoby tao Refidima; ary tsy nisy rano tao hosotroin''ny olona. '
  '15':
  - type: text
    content: 'Ary nony niala tao Refidima izy, dia nitoby tany an-efitr''i Sinay. '
  '16':
  - type: text
    content: 'Ary nony niala tany an-efitr''i Sinay izy, dia nitoby tao Kibrota-hatava. '
  '17':
  - type: text
    content: 'Ary nony niala tao Kibrota-hatava izy, dia nitoby tao Hazerota. '
  '18':
  - type: text
    content: 'Ary nony niala tao Hazerota izy, dia nitoby tao Ritma. '
  '19':
  - type: text
    content: 'Ary nony niala tao Ritma izy, dia nitoby tao Rimona-pareza. '
  '2':
  - type: text
    content: 'Dia nosoratan''i Mosesy ny nialany araka ny nandehanany, araka ny didin''i Jehovah; ary izao no nandehanany araka ny nialany: '
  '20':
  - type: text
    content: 'Ary nony niala tao Rimona-pareza izy, dia nitoby tao Libna. '
  '21':
  - type: text
    content: 'Ary nony niala tao Libna izy, dia nitoby tao Risa. '
  '22':
  - type: text
    content: 'Ary nony niala tao Risa izy, dia nitoby tao Kehelata. '
  '23':
  - type: text
    content: 'Ary nony niala tao Kehelata izy, dia nitoby tao an-tendrombohitra Sapera. '
  '24':
  - type: text
    content: 'Ary. nony niala tao an-tendrombohitra Sapera izy, dia nitoby tao Harada. '
  '25':
  - type: text
    content: 'Ary nony niala tao Harada izy, dia nitoby tao Makelota. '
  '26':
  - type: text
    content: 'Ary nony niala tao Makelota izy, dia nitoby tao Tahata. '
  '27':
  - type: text
    content: 'Ary nony niala tao Tahata izy, dia nitoby tao Tera. '
  '28':
  - type: text
    content: 'Ary nony niala tao Tera izy, dia nitoby tao Mitka. '
  '29':
  - type: text
    content: 'Ary nony niala tao Mitka izy, dia nitoby tao Hasmona. '
  '3':
  - type: text
    content: 'Niala tao Ramesesa Izy tamin''ny volana voalohany, dia tamin''ny andro fahadimy ambin''ny folo tamin''ny volana voalohany; nony ampitson''ny Paska no nivoahan''ny Zanak''Isiraely tamin''ny tanana avo teo imason''ny Egyptiana rehetra. '
  '30':
  - type: text
    content: 'Ary nony niala tao Hasmona izy, dia nitoby tao Moserota. '
  '31':
  - type: text
    content: 'Ary nony niala tao Moserota izy, dia nitoby tao Bene-jakana. '
  '32':
  - type: text
    content: 'Ary nony niala tao Bene-jakana izy, dia nitoby tao Hora-hagidgada. '
  '33':
  - type: text
    content: 'Ary nony niala tao Hora-hagidgada izy, dia nitoby tao Jotbata. '
  '34':
  - type: text
    content: 'Ary nony niala tao Jotbata izy, dia nitoby tao Abrona. '
  '35':
  - type: text
    content: 'Ary nony niala tao Abrona izy, dia nitoby tao Ezion-gebera. '
  '36':
  - type: text
    content: 'Ary nony niala tao Ezion-gebera izy, dia nitoby tany an-efitra Zina (Kadesy izany). '
  '37':
  - type: text
    content: 'Ary nony niala tao Kadesy izy, dia nitoby tao an-tendrombohitra Hora, tao an-tsisin''ny tany Edoma. '
  '38':
  - type: text
    content: 'Ary Arona mpisorona niakatra tao an-tendrombohitra Hora, araka ny didin''i Jehovah, dia maty tao izy tamin''ny fahefa-polo taona taorian''ny nivoahan''ny Zanak''Isiraely avy tany amin''ny tany Egypta, tamin''ny andro voalohany tamin''ny volana fahadimy. '
  '39':
  - type: text
    content: 'Ary efa telo amby roa-polo amby zato taona Arona, raha maty tao an-tendrombohitra Hora izy. '
  '4':
  - type: text
    content: 'Fa ny Egyptiana mbola nandevina izay efa novonoin''i Jehovah teo aminy, dia ny lahimatoa rehetra; ary ny andriamaniny dia notsarain''i Jehovah. '
  '40':
  - type: text
    content: 'Ary ren''ilay Kananita, mpanjakan''i Arada, izay nonina teo amin''ny tany atsimo amin''ny tany Kanana, fa avy ny Zanak''Isiraely. '
  '41':
  - type: text
    content: 'Ary nony niala tao an-tendrombohitra Hora izy, dia nitoby tao Zalmona. '
  '42':
  - type: text
    content: 'Ary nony niala tao Zalmona izy, dia nitoby tao Ponona. '
  '43':
  - type: text
    content: 'Ary nony niala tao Ponona izy, dia nitoby tao Obota. '
  '44':
  - type: text
    content: 'Ary nony niala tao Obota izy, dia nitoby tao Ie-abarima tao amin''ny faritanin''i Moaba. '
  '45':
  - type: text
    content: 'Ary nony niala tao Ie-abarima izy, dia nitoby tao Dibon-gada. '
  '46':
  - type: text
    content: 'Ary nony niala tao Dibon-gada izy, dia nitoby tao Almon-diblataima. '
  '47':
  - type: text
    content: 'Ary nony niala tao Almon-diblataima izy, dia nitoby tao amin''ny tendrombohitra Abarima, tandrifin''i Nebo. '
  '48':
  - type: text
    content: 'Ary nony niala tamin''ny tendrombohitra Abarima izy, dia nitoby tao Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko. '
  '49':
  - type: text
    content: 'Ary nitoby teo amoron''i Jordana izy hatrany Betijesimota ka hatrany Abela-sitima, tao Arbota-moaba. '
  '5':
  - type: text
    content: 'Ary nony niala tao Ramesesa ny Zanak''Isiraely, dia nitoby tao Sokota. '
  '50':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy teo Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko, ka nanao hoe: '
  '51':
  - type: text
    content: 'Mitenena amin''ny Zanak''Isiraely hoe: Rehefa tafita an''i Jordana ka tonga any amin''ny tany Kanana ianareo, '
  '52':
  - type: text
    content: 'dia horoahinareo eo alohanareo ny mponina rehetra amin''ny tany, ary horavanareo ny vato soratany rehetra, ary hosimbanareo ny sarin-javany an-idina rehetra, ary horavanareo ny fitoerana avony rehetra; '
  '53':
  - type: text
    content: 'dia halainareo ny tany, ka hitoetra eo ianareo; fa ianareo no nomeko ny tany ho zara-taninareo. '
  '54':
  - type: text
    content: 'Ary filokana no hizaranareo ny tany araka ny fokonareo avy: ny maro isa homenareo zara-tany bebe kokoa, ary ny vitsy isa homenareo kelikely kokoa; samy ao amin''izay ivoahan''ny filokana ho azy no ho anjarany; araka ny firenen''ny razanareo no hahazoanareo zara-tany. '
  '55':
  - type: text
    content: 'Fa raha tsy roahinareo eo alohanareo ny mponina amin''ny tany, dia ho lay amin''ny masonareo sy ho tsilo amin''ny tehezanareo izay avelanareo hitoetra eo, ka handrafy anareo eo amin''ny tany izay onenanareo izy; '
  '56':
  - type: text
    content: ary hataoko aminareo izay nokasaiko hatao aminy.
  '6':
  - type: text
    content: 'Ary nony niala tao Sokota izy, dia nitoby ao Etama, izay teo an-tsisin''ny efitra. '
  '7':
  - type: text
    content: 'Ary nony niala tao Etama izy, dia nivily nankao Pi-hahirota, izay tandrifin''i Balazefona, ka nitoby tandrifin''i Migdola. '
  '8':
  - type: text
    content: 'Ary nony niala tandrifin''i Hahirota izy, dia nandeha nita teo afovoan''ny ranomasina ho any an-efitra, dia nandeha lalan-kateloana tany an-efitra Etama izy ka nitoby tao Mara. '
  '9':
  - type: text
    content: 'Ary nony niala tao Mara izy, dia nankany Elima; ary tao Elima dia nisy loharano roa ambin''ny folo sy hazo rofia fito-polo, dia nitoby teo izy. '
