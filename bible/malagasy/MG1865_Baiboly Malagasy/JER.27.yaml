document_id: JER.27,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny zioga hataon'ny mpanjakan'i Babylona amin'ny vozon'ny firenena izay resiny, sy ny namporisihan'i Jeremia azy hitondra izany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin''ny niandohan''ny nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda, no nahatongavan''izao teny izao tamin''i Jeremia avy tamin''i Jehovah hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lainga no vinanin''ireo aminareo, mba hamindrana anareo ho lavitra ny taninareo, dia horoahiko ianareo ka ho ringana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay firenena mampiditra ny vozony eo amin''ny ziogan''ny mpanjakan''i Babylona kosa ka manompo azy dia havelako hitoetra amin''ny taniny ihany, hoy Jehovah, ka hiasa azy sady honina ao izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Zedekia, mpanjakan''ny Joda. koa dia efa nilazako araka izany teny rehetra izany hoe: Ampidiro eo amin''ny ziogan''ny mpanjakan''i Babylona ny vozonareo, ka manompoa azy sy ny vahoakany, dia ho velona ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana no ho fatin''ny sabatra sy ny mosary ary ny areti-mandringana ianareo, dia ianao mbamin''ny vahoakanao, araka ny nolazain''i Jehovah ny amin''ny firenena izay tsy mety manompo ny mpanjakan''i Babylona? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza mihaino ny tenin''ny mpaminany izay manao aminareo hoe: Tsy hanompo ny mpanjakan''i Babylona ianareo; fa lainga no vinanin''ireo aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy naniraka azy Aho, hoy Jehovah, nefa manandoka ho mpaminany amin''ny anarako ihany izy, mba handroahako anareo, ka ho lany ringana ianareo, dia ianareo sy ny mpaminany izay maminany aminareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisorona sy ity firenena rehetra ity dia efa nilazako hoe: Izao no lazain''i Jehovah: Aza mihaino ny tenin''ny mpaminaninareo. izay maminany aminareo hoe: Indro, ny fanaky ny tranon''i Jehovah hampodina faingana avy any Babylona; fa lainga no vinaniny aminareo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mihaino azy, fa manompoa ny mpanjakan''i Babylona, dia ho velona ianareo; fa nahoana no ho rava ity tanàna ity? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mpaminany tokoa ireo, ary raha ao aminy tokoa ny tenin''i Jehovah, dia aoka hifona amin''i Jehovah, Tompon''ny maro, izy, mba tsy ho lasa ho any Babylona koa ny fanaka sisa ao an-tranon''i Jehovah sy ao an-tranon''ny mpanjakan''ny Joda sy ato Jerosalema '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izao ny lazain'i Jehovah, Tompon'ny maro, ny amin'ny andry sy ny tavin-drano lehibe
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ranomasina
      marker-yv: yv-n
    - type: text
      text: ' sy ny fitoeran-tavin-drano ary ny amin''ny fanaka hafa izay mbola sisa amin''ity tanàna ity, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nolazain''i Jehovah tamiko: Manaova famatorana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: kofehy'
      marker-yv: yv-n
    - type: text
      text: ' sy zioga ianao, ka ataovy eo am-bozonao, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izay tsy nalain''i Nebokadnezara mpanjakan''i Babylona, fony izy nitondra an''i Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, ho babo avy tany Jerosalema ho any Babylona, mbamin''ny manan-kaja rehetra amin''ny Joda sy Jerosalema, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, ny amin''ny fanaka izay sisa ao an-tranon''i Jehovah sy ao an-tranon''ny mpanjakan''ny Joda sy ato Jerosalema: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho any Babylona no hitondrana ireo, sady hitoetra any izy ambara-pahatongan'ny andro hamangiako azy, hoy Jehovah, dia vao ho entiko miakatra izy ka hampodiko amin'ity tanàna ity.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ampanatero any amin''ny mpanjakan''i Edoma sy any amin''ny mpanjakan''i Moaba sy any amin''ny mpanjakan''ny taranak''i Amona sy any amin''ny mpanjakan''i Tyro ary any amin''ny mpanjakan''i Sidona izany ho entin''ny iraka izay mankaty Jerosalema ho atỳ amin''i Zedekia, mpanjakan''ny Joda; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary asaovy lazainy amin''ny tompony avy hoe: Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Izao no holazainareo amin''ny tomponareo: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no nanao ny tany sy ny olona ary ny biby izay eo aminy tamin''ny heriko lehibe sy tamin''ny sandriko nahinjitra; ary efa nomeko ho an''izay sitraky ny foko ny tany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny Izaho dia efa nanolotra ireto tany rehetra ireto ho eo an-tànan''i Nebokadnezara, mpanjakan''i Babylona, mpanompoko; eny, na dia ny bibi-dia aza dia efa nomeko hanompo azy koa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny firenena rehetra dia hanompo azy sy ny zanany ary ny zafiny ambara-pahatongan''ny fotoana hamaliana ny tanin''izy io kosa, ka hampanompoin''ny firenena maro sy ny mpanjaka lehibe izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay firenena na fanjakana tsy mety manompo an''i Nebokadnezara, mpanjakan''i Babylona, ary tsy mety mampiditra ny vozony eo amin''ny ziogan''ny mpanjakan''i Babylona, dia hovaliako amin''ny sabatra sy ny mosary ary ny areti-mandringana izany firenena izany, hoy Jehovah, ambara-pandringako azy amin''ny tànany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aza mihaino ny mpaminaninareo ianareo, na ny mpanao fankatovanareo, na ny nofinareo, na ny mpanandronareo, na ny mpanana odinareo, izay manao aminareo hoe: Tsy hanompo ny mpanjakan''i Babylona ianareo. '
