document_id: 1TI.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana sy teny farany ho an'i Timoty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka izay andevo rehetra eo ambanin'ny zioga hanao ny tompony ho miendrika hohajaina tsara, mba tsy hitenenana ratsy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. hasiana blasfemia, izahao Mat. 9.3
      marker-yv: yv-n
    - type: text
      text: ' ny anaran''Andriamanitra sy ny fampianarana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fitiavam-bola no fototry ny ratsy rehetra, koa ny sasany izay fatra-pitady izany dia efa voavily niala tamin''ny finoana ka nanindrona ny tenany tamin''ny alahelo be. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianao kosa, sy lehilahin''Andriamanitra, mandosira izany zavatra izany, ka miezaha mitady fahamarinana, toe-panahy araka an''Andriamanitra, finoana, fitiavana, faharetana, fahalemem-panahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miadia ny ady tsaran''ny finoana, hazòny ny fiainana mandrakizay; fa ho amin''izany no niantsoana anao koa sy nanaovanao ilay fanekena tsara teo imason''ny vavolombelona maro. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho mananatra anao eo anatrehan''Andriamanitra, Izay mamelona ny zavatra rehetra, ary eo anatrehan''i Kristy Jesosy, Izay nanao ilay fanekena tsara teo anatrehan''i Pontio Pilato, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hotehirizinao tsy hanan-tsiny amam-pondro hatramin''ny fisehoan''i Jesosy Kristy Tompontsika izany didy izany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny Andriana finaritra sady tokana, Mpanjakan''ny mpanjaka sy Tompon''ny tompo, no haneho izany amin''ny fotoany; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy ihany no manana ny tsi-fahafatesana, mitoetra eo amin''ny mazava tsy azo hatonina, Izay tsy hitan''olona sady tsy hainy jerena; ho Azy anie ny voninahitra sy ny fanjakana mandrakizay. Amena. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anaro ny mpanankarena amin'izao fiainana ankehitriny izao mba tsy hiavonavona, na hatoky ny harena miovaova
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. fiovavovan'ny harena
      marker-yv: yv-n
    - type: text
      text: ', fa Andriamanitra, Izay manome antsika malalaka ny zavatra rehetra mba hifaliantsika, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hanao soa, mba hanan-karena amin''ny asa tsara, hazoto manome sy miantra, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ka dia hihary fanorenana tsara ho an'ny tenany ho amin'ny andro ho avy, mba hihazonany ny tena fiainana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay manana tompo mino dia aoka tsy hanao tsinontsinona azy, satria rahalahy izy; fa vao mainka tokony hotompoiny aza izy, satria mino sy malala ilay mpandray ny soa atao. Izany zavatra izany no ampianaro sy ananaro.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry Timoty, tehirizo ilay natolotra anao, ka mialà amin''ny fibedibedena foana sy ny fanoherana avy amin''izay atao hoe fahalalana, kanjo tsy izy, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: izay neken'ny sasany, ka nania tamin'ny finoana izy. Ho aminareo anie ny fahasoavana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy olona manao fampianarana hafa noho izany ka tsy manaiky ny teny tsy misy kilema
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. salama
      marker-yv: yv-n
    - type: text
      text: ', dia ny an''i Jesosy Kristy Tompontsika, sy ny fampianarana izay mahatonga ny toe-panahy araka an''Andriamanitra, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia mieboebo foana izy ka tsy mahalala na inona na inona, fa adala
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. marary
      marker-yv: yv-n
    - type: text
      text: ' amin''ny fiadian-kevitra sy ny fiadian-teny izay mahatonga fialonana, fifandirana, fanaratsiana, fiahiahian-dratsy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fifandirana lalandava, fanaon''ny olona vetaveta saina sady efa nialan''ny fahamarinana, manao ny toe-panahy araka an''Andriamanitra ho fahazoan-javatra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa misy tombony lehibe tokoa ny toe-panahy araka an''Andriamanitra omban''ny fianinana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy nitondra na inona na inona ho amin'izao tontolo izao isika, sady hita fa
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: satria'
      marker-yv: yv-n
    - type: text
      text: ' tsy hahatondra na inona na inona hiala. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha manan-kanina sy fitafiana isika, dia aoka hianina amin''izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay ta-hanan-karena dia latsaka amin''ny fakam-panahy sy ny fandrika ary ny filàna maro tsy misy antony sady mandratra, izay mandentika ny olona ao amin''ny fandringanana sy ny fahaverezana. '
