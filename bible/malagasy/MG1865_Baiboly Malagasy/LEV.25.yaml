document_id: LEV.25,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalàna ny amin'ny taona sabata sy ny Jobily
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy teo an-tendrombohitra Sinay ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hamasino ny taona fahadimam-polo, ka miantsoa fanafahana amin''ny tany ho an''ny mponina rehetra ao aminy; Jobily ho anareo izany, ka samia mody any amin''ny taninareo avy ianareo sy any amin''ny mpianakavinareo avy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jobily ho anareo izany taona fahadimam-polo izany; aza mamafy ianareo, ary aza mijinja izay maniry ho azy avy tamin''ny voa nihintsana tamin''ny fararano lasa, ary aza mioty ny avy tamin''izay tsy namboarinareo; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'fa Jobily izany ka ho masina ho anareo. Izay vokatra alaina any an-tsaha no hohaninareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Amin''izany taona Jobily izany dia samy hody amin''ny taninareo avy ianareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary raha mivarotra na mividy zavatra amin''ny namanao ianao, aza misy manao sarotra: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'araka ny isan''ny taona aorian''ny Jobily no hividiananao amin''ny namanao; ary araka ny isan''ny fararano no hivarotany aminao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Araka ny hamaron''ny taona no hampitomboanao ny vidiny, ary araka ny havitsin''ny taona sisa no hampihenanao ny vidiny; fa araka ny isan''ny fararano no hivarotany aminao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary aza misy manao sarotra ianareo, fa matahora an''Andriamanitrao; fa Izaho no Jehovah Andriamanitrareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary araho ny didiko, ary tandremo ny fitsipiko, ka araho izy; dia handry fahizay amin''ny tany ianareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny tany hahavoka-javatra dia hihinana ianareo ka ho voky, ary handry fahizay. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitenena amin''ny Zanak''Isiraely hoe: Rehefa tonga any amin''ny tany izay omeko anareo ianareo, aoka hisy fitsaharana ho an''ny tany, dia sabata ho an''i Jehovah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary andrao ianareo manao hoe: Inona no hohaninay amin''ny taona fahafito? fa, indro, tsy mamafy izahay, na manangona ny vokatray; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'dia hataoko aminareo ny fitahiako amin''ny taona fahenina, ka hisy vokatra ampy ho anareo amin''ny telo taona. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hamafy amin''ny taona fahavalo ianareo ka hihinana ny tranainy mandra-pahatongan''ny taona fahasivy; mandra-pahatongan''ny vao no hihinananareo ny tranainy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny tany tsy hatao varo-maty, satria Ahy ny tany; fa vahiny sy mpivahiny amiko ianareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary havelanareo ho azo avotana ny tany eo amin''ny tany rehetra izay lovanareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Raha tàhiny mihamalahelo ny rahalahinao, ka nivarotany ny taniny, dia ho avy ny havany akaiky ka hanavotra izay namidin''ny rahalahiny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary raha tsy manan-kavana hanavotra ralehilahy, nefa nambinina izy ka nahazo izay ampy ho enti-manavotra azy, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'dia aoka hanisa ny taona hatramin''ny nivarotany azy izy ka handoa ny hevitry ny taona sisa ho an''ny lehilahy izay nivarotany azy; ka dia hody amin''ny taniny izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa raha tsy nahazo izay ampy handoavana izany izy, izay namidiny dia mbola hitoetra eo an-tànan''ilay nividy azy ihany mandra-pahatongan''ny taona Jobily; ary ho afaka izany amin''ny Jobily, ka hody amin''ny taniny ralehilahy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary raha misy olona mivarotra trano itoerana ao amin''ny tanàna mimanda, dia hahazo manavotra azy izy mandra-pahatapitry ny herintaona nivarotany azy; fa ao anatin''izany no hahazoany manavotra azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Enin-taona no hamafazanao ny taninao, enin-taona no hanamboaranao ny sahanao sy hanangonanao ny vokatra; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa raha tsy voavotra mandra-pahatapitry ny herintaona kosa ilay trano ao amin''ny tanàna mimanda, dia tapaka ho varo-maty ho an''izay nividy azy sy ho an''ny taranany izany; tsy ho afaka izany na dia amin''ny Jobily aza. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa ny trano ao amin''ny vohitra izay tsy misy manda manodidina kosa dia hatao taha, ka ny tany ihany; ho azo avotana ihany izany, na ho afaka amin''ny Jobily. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Kanefa ny amin''ny tanànan''ny Levita, ny trano ao amin''ny tanàna izay ho anjarany dia ho azon''ny Levita avotana ihany na oviana na oviana. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary raha misy Levita manavotra azy, dia ho afaka amin''ny Jobily ny trano izay namidy sy ny tanàna izay anjarany; fa ny trano ao an-tanànan''ny Levita dia lovany ao amin''ny Zanak''Isiraely. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Fa ny tany manodidina ny tanànany kosa dia tsy azo hamidy; fa ho lovany mandrakizay izany. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary raha mihamalahelo ny rahalahinao izay miara-monina aminao ka reraka, dia vonjeo izy, ka aoka mba ho velona eo aminao tahaka ny vahiny sy ny mpivahiny izy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Aza maka zana-bola na tombony aminy; fa matahora an''Andriamanitrao, mba ho velona eo aminao ny rahalahinao. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Aza mampanàna vola aminy, ary aza mampisambotra hanina hahazoana tombony: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Izaho no Jehovah Andriamanitrareo, Izay nitondra anareo nivoaka avy tany amin'ny tany Egypta, hanome anareo ny tany Kanana, mba ho Andriamanitrareo.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary raha mihamalahelo ny rahalahinao ka mivaro-tena aminao, aza ampanompoinao toy ny andevo izy; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa ny taona fahafito kosa ho tena fitsaharana ho an''ny tany, dia sabata ho an''i Jehovah; aza mamafy amin''ny taninao ianao, ary aza mamboatra ny sahanao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'fà aoka hitoetra eo aminao tahaka ny mpikarama sy tahaka ny vahiny izy; mandra-pahatongan''ny taona Jobily no hanompoany anao. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dia ho afaka izy sy ny zanany ka hody amin''ny mpianakaviny sy amin''ny tanin-drazany koa. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Fa mpanompoko izay nentiko nivoaka avy tany amin''ny tany Egypta izy ka tsy hamidy tahaka ny andevo. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Aza mampanompo azy fatratra, fa matahora an''Andriamanitrao. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ary ny amin''izay ho andevolahinao sy andevovavinao, dia amin''ny jentilisa izay manodidina anareo no hividiananareo azy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ary amin''ny zanaky ny vahiny eo aminareo sy amin''ny taranany izay haterany eo amin''ny taninareo no hividiananareo koa; ary dia ho fanananareo izany. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ary hataonareo lovan''ny zanakareo mandimby anareo izany ho fananana holovany ka hampanompoinareo mandrakizay fa ny Zanak''Isiraely rahalahinareo dia aza mba ampanompoina fatratra. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary raha tonga manan-karena ny vahiny izay monina eo aminao na ny mpivahiny, ary ny rahalahinao eo aminy mihamalahelo kosa ka mivaro-tena amin''ny vahiny eo aminao, na amin''ny taranaky ny vahiny; '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'na dia nivaro-tena aza izy, dia azo avotana indray; ny anankiray amin''ny rahalahiny no mahazo manavotra azy: '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'na ny rahalahin-drainy, na ny zanak''olo-mirahalahy aminy, na izay havany akaiky azy amin''ny mpianakaviny no mahazo manavotra azy; kanefa raha tratry ny ananany, dia hanavo-tena izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Aza mijinja izay maniry ho azy avy tamin''ny voa nihintsana tamin''ny fararano lasa, ary aza mioty ny voaloboka avy tamin''izay tsy namboarinao; fa aoka ho taona fitsaharana ho an''ny tany izany. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ary dia hisainy amin''izay nividy azy hatramin''ny taona nivarotana azy ka hatramin''ny taona Jobily; ary ny vola nivarotany ny tenany dia hoheverina araka ny isan''ny taona; dia ara-kevitry ny andron''ny mpikarama no hiheverana azy. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Raha mbola maro ny taona sisa, dia ara-keviny ihany no handoavany ny avony avy amin''ny vola vidiny teo aloha. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Any raha vitsy kosa ny taona sisa mandra-pahatongan''ny taona Jobily, dia hanisa izany aminy izy, ka ara-kevitry ny taona ihany no handoavany ny vola avony. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Tahaka izay karamaina isan-taona no hitoerany eo aminy; fa aoka tsy hampanompoina fatratra eo imasonao izy. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Ary raha tsy voavotra amin''izay izy, dia ho afaka amin''ny taona Jobily izy sy ny zanany koa. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Fa mpanompoko ny Zanak''Isiraely, dia mpanompoko izay nentiko nivoaka avy tany amin''ny tany Egypta: Izaho no Jehovah Andriamanitrareo.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary izay maniry ho azy amin''ny sabatan''ny tany no ho hanina ho anao sy ny ankizilahinao sy ny ankizivavinao sy ny mpikarama sy ny vahiny eo aminao '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'sy ny biby fiompinao ary ny bibidia izay eo amin''ny taninao; izay vokatra rehetra eo no hohaniny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary manisà sabatan-taona fito ho anao, dia fito taona impito, ka ny hanisanao ny andron''ireo sabatan-taona fito ireo dia sivy amby efa-polo taona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia mitsofa anjomara avo feo amin''ny andro fahafolo amin''ny volana fahafito; dia amin''ny andro fanavotana no hitsofanareo anjomara eran''ny taninareo. '
