document_id: ISA.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny alahelon'i Jehovah noho ny niodinan'ny Isiraely, ary ny nananarany azy sy ny nokasainy hatao aminy
  - type: text
    content: Ny fahitan'Isaia, zanak'i Amoza, izay hitany ny amin'ny Joda sy Jerosalema tamin'ny andron'i Ozia sy Jotama sy Ahaza ary Hezekia, izay samy mpanjakan'ny Joda.
  '10':
  - type: text
    content: 'Mandrenesa ny tenin''i Jehovah, ry mpitsaran''i Sodoma; Mihainoa ny lalàn''Andriamanitsika, ry vahoakan''i Gomora. '
  '11':
  - type: text
    content: 'Hataoko inona ny zavatra betsaka vonoinareo ho fanatitra? hoy Jehovah; Efa tofoka ny ondrilahy atao fanatitra dorana sy ny saboran''ny zanak''omby mifahy Aho, Ary tsy sitrako ny ran''ny vantotr''ombilahy sy ny an''ny zanak''ondry ary ny an''ny osilahy. '
  '12':
  - type: text
    content: 'Raha avy miseho eo anatrehako ianareo, Iza moa no nitady anareo hanitsakitsaka ny kianjako? '
  '13':
  - type: text
    content: 'Aza mitondra fanati-poana intsony; Fofona fahavetavetana amiko izany! Ny voaloham-bolana sy ny Sabata ary ny fiantsoam-piangonana Tsy zakako ny fivoriana masina haroharoam-paharatsiana! '
  '14':
  - type: text
    content: 'Ny voaloham-bolanareo sy ny fotoam-pivavahanareo dia halan''ny fanahiko, Mavesatra amiko izany, Ka sasatra mitondra azy Aho. '
  '15':
  - type: text
    content: Raha mananty tanana ianareo, Dia hitampi-maso tsy hijery anareo Aho; Eny, na dia manao vavaka be aza ianareo, dia tsy hihaino Aho; Feno ran'olona
  - type: note
    content: Heb. rà nalatsaka
  - type: text
    content: ' ny tananareo. '
  '16':
  - type: text
    content: 'Misasà ianareo, diovy ny tenanareo, Esory tsy ho eo anoloan''ny masoko ny ratsy fanaonareo; Mitsahara, fa aza manao ratsy; '
  '17':
  - type: text
    content: 'Mianara hanao ny tsara, Diniho izay rariny, anaro ny mpampahory, Omeo rariny ny kamboty, tsarao ny adin''ny mpitondratena. '
  '18':
  - type: text
    content: 'Avia ary hifandahatra isika, hoy Jehovah: Na dia tahaka ny jaky aza ny fahotanareo, Dia ho fotsy tahaka ny oram-panala, Na dia mangatrakatraka tahaka ny sily aza, Dia ho tahaka ny volon''ondry fotsy. '
  '19':
  - type: text
    content: 'Raha manaiky sy mankatò ianareo, dia hihinana ny voka-tsoa amin''ny tany; '
  '2':
  - type: text
    content: 'Mandrenesa, ry lanitra, ary mihainoa, ry tany, Fa Jehovah no miteny hoe: Efa nitaiza sy nahalehibe zaza Aho, Kanjo niodina tamiko ireo. '
  '20':
  - type: text
    content: 'Fa raha mbola mandà sy miodina ihany ianareo, Dia ho lanin''ny sabatra: Fa ny vavan''i Jehovah no efa niteny. '
  '21':
  - type: text
    content: 'Indrisy! tonga janga ity tanàna mahatoky Izay feno ny rariny taloha Sady nitoeran''ny fahamarinana, Fa ankehitriny kosa mpamono olona no ao. '
  '22':
  - type: text
    content: 'Ny volafotsinao efa tonga tain-drendrika; Ny divainao efa voatsatso rano; '
  '23':
  - type: text
    content: Ny lehibenao dia mpiodina sady naman'ny mpangalatra; Samy tia kolikoly sy fatra-nitady tambitam-by avokoa izy rehetra; Ny kamboty tsy mba omeny rariny, Ary ny adin'ny mpitondratena tsy avelany ho entina eo anatrehany.
  '24':
  - type: text
    content: 'Ka dia hoy Jehovah, Tompon''ny maro, Ilay Maherin''ny Isiraely: E! hiala fo amin''ny mandrafy Ahy Aho Ary hamaly ny fahavaloko. '
  '25':
  - type: text
    content: Dia hamerina ny tanako ho aminao Aho, Ka hodioviko amin'ny lavenona
  - type: note
    content: Heb. sirahazo
  - type: text
    content: ' ianao hahafahan''ny tain-drendrikao, ary hesoriko ny firaka rehetra aminao. '
  '26':
  - type: text
    content: 'Dia hampodiko ho toy ny teo aloha ny mpitsaranao, Ary ny mpanolo-tsainao ho toy ny tamin''ny voalohany; Ary rehefa afaka izany, ianao dia hantsoina hoe: Tanànan''ny fahamarinana, Tanàna mahatoky. '
  '27':
  - type: text
    content: Ziona havotana amin'ny fitsarana, ary izay efa mibebaka
  - type: note
    content: Heb. miverina
  - type: text
    content: ' ao dia havotana amin''ny fahamarinana; '
  '28':
  - type: text
    content: 'Ary samy haringana avotoa ny mpiodina sy ny mpanota, Eny, ho lany ritra izay mahafoy an''i Jehovah. '
  '29':
  - type: text
    content: Fa hahazo henatra ianareo
  - type: note
    content: Heb. izy
  - type: text
    content: ' noho ny amin''ny hazo terebinta izay nifalianareo, ary hangaihay ianareo noho ny amin''ny saha izay natokanareo. '
  '3':
  - type: text
    content: 'Ny omby mahalala ny tompony, Ary ny boriky ny fihinanam-bilon''ny tompony; Fa ny Isiraely tsy mahalala, Ny oloko tsy misaina. '
  '30':
  - type: text
    content: 'Fa ho tahaka ny hazo terebinta malazo ravina ianareo, Sy ho tahaka ny saha tsy misy rano. '
  '31':
  - type: text
    content: Ny mahery ho tahaka ny vohavoha, Ary ny asany ho tahaka ny kilalaon'afo, Dia hiaraka hodorana izy roa tonta, Ka tsy hisy hamono ny afo.
  '4':
  - type: text
    content: 'Indrisy! firenena mpanota, olona mavesa-keloka, Taranaka mpanao ratsy, zanaka mpanao meloka! Efa nahafoy an''i Jehovah izy, Efa nanamavo ny Iray Masin''ny Isiraely. Efa nihodina izy. '
  '5':
  - type: text
    content: 'Nahoana no mbola ta-hasiana ihany ianareo noho izao fiodinanareo lalandava izao? Henika aretina avokoa ny loha rehetra, Ary marary ny fo rehetra. '
  '6':
  - type: text
    content: 'Hatramin''ny faladia ka hatramin''ny loha dia tsy misy izay tsy marary, Fa ratra sy dian-kapoka ary fery vao; Tsy mbola voaporitra, na voafehy, na voalemin''ny diloilo izy. '
  '7':
  - type: text
    content: Ny taninareo dia efa lao; Ny tanànanareo dia voadotra tamin'ny afo; Ny tany volenareo dia lanin'ny fahavalo
  - type: note
    content: Heb. hafa firenena
  - type: text
    content: ' eo imasonareo, ary lao izy toy ny efa noravan''ny fahavalo'
  - type: note
    content: Heb. hafa firenena
  - type: text
    content: '. '
  '8':
  - type: text
    content: Ary Ziona zanakavavy dia nilaozana tahaka ny trano rantsan-kazo ao anaty tanim-boaloboka, Sy tahaka ny fandriana mihantona an'ny mpiandry voly ao anaty tanimbolim-boantango
  - type: note
    content: voantangom-bazaha
  - type: text
    content: ', Dia tahaka ny tanàna atao fahirano. '
  '9':
  - type: text
    content: 'Raha tsy nosisan''i Jehovah. Tompon''ny maro, olona vitsivitsy isika, Dia efa tonga tahaka an''i Sodoma Ary nitovy tamin''i Gomora. '
