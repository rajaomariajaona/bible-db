document_id: ISA.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alahelon'i Jehovah noho ny niodinan'ny Isiraely, ary ny nananarany azy sy ny nokasainy hatao aminy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny fahitan'Isaia, zanak'i Amoza, izay hitany ny amin'ny Joda sy Jerosalema tamin'ny andron'i Ozia sy Jotama sy Ahaza ary Hezekia, izay samy mpanjakan'ny Joda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandrenesa, ry lanitra, ary mihainoa, ry tany, Fa Jehovah no miteny hoe: Efa nitaiza sy nahalehibe zaza Aho, Kanjo niodina tamiko ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny omby mahalala ny tompony, Ary ny boriky ny fihinanam-bilon''ny tompony; Fa ny Isiraely tsy mahalala, Ny oloko tsy misaina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indrisy! firenena mpanota, olona mavesa-keloka, Taranaka mpanao ratsy, zanaka mpanao meloka! Efa nahafoy an''i Jehovah izy, Efa nanamavo ny Iray Masin''ny Isiraely. Efa nihodina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nahoana no mbola ta-hasiana ihany ianareo noho izao fiodinanareo lalandava izao? Henika aretina avokoa ny loha rehetra, Ary marary ny fo rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hatramin''ny faladia ka hatramin''ny loha dia tsy misy izay tsy marary, Fa ratra sy dian-kapoka ary fery vao; Tsy mbola voaporitra, na voafehy, na voalemin''ny diloilo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny taninareo dia efa lao; Ny tanànanareo dia voadotra tamin'ny afo; Ny tany volenareo dia lanin'ny fahavalo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hafa firenena
    marker-yv: yv-n
  - type: text
    text: ' eo imasonareo, ary lao izy toy ny efa noravan''ny fahavalo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hafa firenena
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Ziona zanakavavy dia nilaozana tahaka ny trano rantsan-kazo ao anaty tanim-boaloboka, Sy tahaka ny fandriana mihantona an'ny mpiandry voly ao anaty tanimbolim-boantango
  - type: usfm
    marker: x
    children:
    - type: text
      text: voantangom-bazaha
    marker-yv: yv-n
  - type: text
    text: ', Dia tahaka ny tanàna atao fahirano. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha tsy nosisan''i Jehovah. Tompon''ny maro, olona vitsivitsy isika, Dia efa tonga tahaka an''i Sodoma Ary nitovy tamin''i Gomora. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mandrenesa ny tenin''i Jehovah, ry mpitsaran''i Sodoma; Mihainoa ny lalàn''Andriamanitsika, ry vahoakan''i Gomora. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hataoko inona ny zavatra betsaka vonoinareo ho fanatitra? hoy Jehovah; Efa tofoka ny ondrilahy atao fanatitra dorana sy ny saboran''ny zanak''omby mifahy Aho, Ary tsy sitrako ny ran''ny vantotr''ombilahy sy ny an''ny zanak''ondry ary ny an''ny osilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha avy miseho eo anatrehako ianareo, Iza moa no nitady anareo hanitsakitsaka ny kianjako? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aza mitondra fanati-poana intsony; Fofona fahavetavetana amiko izany! Ny voaloham-bolana sy ny Sabata ary ny fiantsoam-piangonana Tsy zakako ny fivoriana masina haroharoam-paharatsiana! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny voaloham-bolanareo sy ny fotoam-pivavahanareo dia halan''ny fanahiko, Mavesatra amiko izany, Ka sasatra mitondra azy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha mananty tanana ianareo, Dia hitampi-maso tsy hijery anareo Aho; Eny, na dia manao vavaka be aza ianareo, dia tsy hihaino Aho; Feno ran'olona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. rà nalatsaka
    marker-yv: yv-n
  - type: text
    text: ' ny tananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Misasà ianareo, diovy ny tenanareo, Esory tsy ho eo anoloan''ny masoko ny ratsy fanaonareo; Mitsahara, fa aza manao ratsy; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mianara hanao ny tsara, Diniho izay rariny, anaro ny mpampahory, Omeo rariny ny kamboty, tsarao ny adin''ny mpitondratena. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avia ary hifandahatra isika, hoy Jehovah: Na dia tahaka ny jaky aza ny fahotanareo, Dia ho fotsy tahaka ny oram-panala, Na dia mangatrakatraka tahaka ny sily aza, Dia ho tahaka ny volon''ondry fotsy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha manaiky sy mankatò ianareo, dia hihinana ny voka-tsoa amin''ny tany; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha mbola mandà sy miodina ihany ianareo, Dia ho lanin''ny sabatra: Fa ny vavan''i Jehovah no efa niteny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Indrisy! tonga janga ity tanàna mahatoky Izay feno ny rariny taloha Sady nitoeran''ny fahamarinana, Fa ankehitriny kosa mpamono olona no ao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny volafotsinao efa tonga tain-drendrika; Ny divainao efa voatsatso rano; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny lehibenao dia mpiodina sady naman'ny mpangalatra; Samy tia kolikoly sy fatra-nitady tambitam-by avokoa izy rehetra; Ny kamboty tsy mba omeny rariny, Ary ny adin'ny mpitondratena tsy avelany ho entina eo anatrehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ka dia hoy Jehovah, Tompon''ny maro, Ilay Maherin''ny Isiraely: E! hiala fo amin''ny mandrafy Ahy Aho Ary hamaly ny fahavaloko. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dia hamerina ny tanako ho aminao Aho, Ka hodioviko amin'ny lavenona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. sirahazo
    marker-yv: yv-n
  - type: text
    text: ' ianao hahafahan''ny tain-drendrikao, ary hesoriko ny firaka rehetra aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hampodiko ho toy ny teo aloha ny mpitsaranao, Ary ny mpanolo-tsainao ho toy ny tamin''ny voalohany; Ary rehefa afaka izany, ianao dia hantsoina hoe: Tanànan''ny fahamarinana, Tanàna mahatoky. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ziona havotana amin'ny fitsarana, ary izay efa mibebaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. miverina
    marker-yv: yv-n
  - type: text
    text: ' ao dia havotana amin''ny fahamarinana; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary samy haringana avotoa ny mpiodina sy ny mpanota, Eny, ho lany ritra izay mahafoy an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa hahazo henatra ianareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. izy
    marker-yv: yv-n
  - type: text
    text: ' noho ny amin''ny hazo terebinta izay nifalianareo, ary hangaihay ianareo noho ny amin''ny saha izay natokanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ho tahaka ny hazo terebinta malazo ravina ianareo, Sy ho tahaka ny saha tsy misy rano. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny mahery ho tahaka ny vohavoha, Ary ny asany ho tahaka ny kilalaon'afo, Dia hiaraka hodorana izy roa tonta, Ka tsy hisy hamono ny afo.
