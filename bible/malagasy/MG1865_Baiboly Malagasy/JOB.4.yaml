document_id: JOB.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny voalohany nataon'i Elifaza
  - type: text
    content: 'Dia namaly Elifaza Temanita ka nanao hoe:'
  '10':
  - type: text
    content: Ny feon'ny olona, eny, ny feon'ny liona masiaka, ary ny nifin'ny liona tanora dia ombotana;
  '11':
  - type: text
    content: Mirenireny ny lion-dahy noho ny tsi-fahitany remby, ary miely ny zanaky ny liom-bavy.
  '12':
  - type: text
    content: Nisy teny tonga tamiko mangingina, ary ny sofiko nahare siosio avy taminy,
  '13':
  - type: text
    content: Tamin'ny eritreritra avy amin'ny tsindrimandry alina, raha sondrian-tory ny olona,
  '14':
  - type: text
    content: Dia azon-tahotra sy hovotra aho, ka nampihorohoro ny taolako rehetra izany.
  '15':
  - type: text
    content: Ary nisy fanahy nandalo teo anatrehako ka nampitsangam-bolo ny tenako.
  '16':
  - type: text
    content: 'Nijanona izy, nefa tsy nahafantatra ny tarehiny aho; Nisy endri-javatra teo anoloan''ny masoko; Nisy fanginana, dia nandre feo aho nanao hoe:'
  '17':
  - type: text
    content: Ho marina noho
  - type: note
    content: 'Na: eo anatrehan'''
  - type: text
    content: ' Andriamanitra va ny zanak''olombelona? Ho madio noho'
  - type: note
    content: 'Na: eo anatrehan'''
  - type: text
    content: ' ny Mpanao azy va ny olona?'
  '18':
  - type: text
    content: Indro, tsy matoky ireo mpanompony aza Izy, eny, ny anjeliny aza ataony ho tsy tonga ohatra.
  '19':
  - type: text
    content: Koa mainka izay mitoetra ao an-trano tany, sady avy tamin'ny vovoka no nihaviany
  - type: note
    content: Heb. ao amin'ny vovoka fiorenany
  - type: text
    content: ', ary mora poritra noho ny kalalao izy;'
  '2':
  - type: text
    content: Raha misy sahy miteny aminao, dia ho sosotra va ianao? Fa raha ny mamehy vava kosa, iza moa no mahazaka izany?
  '20':
  - type: text
    content: Indray andro monja dia montsana izy; Tsy misy misaina azy, na dia levona mandrakizay aza izy.
  '21':
  - type: text
    content: Tsy voaongotra va ny kofehin-dainy ao aminy? Maty izy, nefa tsy mbola nanam-pahendrena.
  '3':
  - type: text
    content: Indro, efa nananatra ny maro ianao. Ary ny tanana miraviravy efa nampaherezinao;
  '4':
  - type: text
    content: Ny teninao efa nanohana izay efa saiky lavo, ary ny lohalika malemy efa nampahatanjahinao
  '5':
  - type: text
    content: Nefa ankehitriny mba manjo anao kosa izany, ka dia kivy ianao, Mihatra aminao izany, ka raiki-tahotra ianao
  '6':
  - type: text
    content: Tsy ny fivavahanao
  - type: note
    content: Heb. fahatahoranao
  - type: text
    content: ' va no tokinao? Ary tsy fanantenanao va ny fahitsian''ny lalanao?'
  '7':
  - type: text
    content: Masìna ianao, tsarovy fa iza moa no very tsy nanan-tsiny? Ary taiza no nisy olo-mahitsy naringana?
  '8':
  - type: text
    content: Araka izay efa hitako, dia izay miasa heloka sy mamafy fahoriana no mijinja izany.
  '9':
  - type: text
    content: Ny fofonain'Andriamanitra no andringanana azy. Eny, ny fofonain'ny fahatezerany no mahalevona azy.
