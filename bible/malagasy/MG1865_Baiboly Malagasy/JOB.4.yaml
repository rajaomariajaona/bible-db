document_id: JOB.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny voalohany nataon'i Elifaza
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Elifaza Temanita ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha misy sahy miteny aminao, dia ho sosotra va ianao? Fa raha ny mamehy vava kosa, iza moa no mahazaka izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Indro, efa nananatra ny maro ianao. Ary ny tanana miraviravy efa nampaherezinao;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny teninao efa nanohana izay efa saiky lavo, ary ny lohalika malemy efa nampahatanjahinao
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nefa ankehitriny mba manjo anao kosa izany, ka dia kivy ianao, Mihatra aminao izany, ka raiki-tahotra ianao
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsy ny fivavahanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fahatahoranao
    marker-yv: yv-n
  - type: text
    text: ' va no tokinao? Ary tsy fanantenanao va ny fahitsian''ny lalanao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Masìna ianao, tsarovy fa iza moa no very tsy nanan-tsiny? Ary taiza no nisy olo-mahitsy naringana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Araka izay efa hitako, dia izay miasa heloka sy mamafy fahoriana no mijinja izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny fofonain'Andriamanitra no andringanana azy. Eny, ny fofonain'ny fahatezerany no mahalevona azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny feon'ny olona, eny, ny feon'ny liona masiaka, ary ny nifin'ny liona tanora dia ombotana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mirenireny ny lion-dahy noho ny tsi-fahitany remby, ary miely ny zanaky ny liom-bavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nisy teny tonga tamiko mangingina, ary ny sofiko nahare siosio avy taminy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tamin'ny eritreritra avy amin'ny tsindrimandry alina, raha sondrian-tory ny olona,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia azon-tahotra sy hovotra aho, ka nampihorohoro ny taolako rehetra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nisy fanahy nandalo teo anatrehako ka nampitsangam-bolo ny tenako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nijanona izy, nefa tsy nahafantatra ny tarehiny aho; Nisy endri-javatra teo anoloan''ny masoko; Nisy fanginana, dia nandre feo aho nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ho marina noho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: eo anatrehan'''
    marker-yv: yv-n
  - type: text
    text: ' Andriamanitra va ny zanak''olombelona? Ho madio noho'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: eo anatrehan'''
    marker-yv: yv-n
  - type: text
    text: ' ny Mpanao azy va ny olona?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indro, tsy matoky ireo mpanompony aza Izy, eny, ny anjeliny aza ataony ho tsy tonga ohatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Koa mainka izay mitoetra ao an-trano tany, sady avy tamin'ny vovoka no nihaviany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ao amin'ny vovoka fiorenany
    marker-yv: yv-n
  - type: text
    text: ', ary mora poritra noho ny kalalao izy;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Indray andro monja dia montsana izy; Tsy misy misaina azy, na dia levona mandrakizay aza izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy voaongotra va ny kofehin-dainy ao aminy? Maty izy, nefa tsy mbola nanam-pahendrena.
