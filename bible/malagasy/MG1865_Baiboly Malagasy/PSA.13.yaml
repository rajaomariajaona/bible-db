document_id: PSA.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Jehovah ô, mandra-pahoviana no mbola hanadinoanao ahy ihany? Mandra-pahoviana no mbola hanafenanao ny tavanao amiko? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandra-pahoviana no mbola hisaintsainako am-panahy, sy hahalahelovako am-po isan''andro? Mandra-pahoviana no mbola hisandratan''ny fahavaloko ho amboniko? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jereo aho ka valio, Jehovah Andriamanitro ô; ampahazavao ny mazoto, fandrao renoky ny torimaso fahafatesana aho; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fandrao ny fahavaloko hanao hoe: naharesy azy aho, fandrao hifaly ny rafilahiko, raha mangozohozo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha izaho kosa, dia ny famindram-ponao no itokiako; ho faly amin'ny famonjenao ny foko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hihira ho an'i Jehovah aho, satria nanisy soa ahy Izy;
