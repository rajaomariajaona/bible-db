document_id: 1CH.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny raharaha sasany koa nataon'ny Levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny amin''ny antokon''ny mpiandry varavarana: Tamin''ny Koraita dia Meselemia, zanak''i Kore, avy tamin''ny zanak''i Asafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny zanakalahin''i Meselemia dia Zakaria, lahimatoa, sy Jediaela, lahiaivo, sy Zebadia, fahatelo, sy Jediaela, fahefatra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sy Elama, fahadimy, sy Johanana, fahenina, sy Elihoenay, faralahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny zanakalahin''i Obed-edoma dia Semaia, lahimatoa, sy Jozabada, lahiaivo, sy Joa, fahatelo, sy Sakara, fahefatra, sy Netanela, fahadimy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sy Amiela, fahenina, sy Isakara, fahafito, sy Peoletahy, faralahy; fa Andriamanitra efa nitahy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Semaia zanany niteraka zazalahy maromaro izay samy tonga mpanapaka tamin''ny fianakavian-drainy, satria samy lehilahy mahay izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny zanakalahin''i Semaia dia Otny sy Refaela sy Obeda ary Elzabada mbamin''ireo rahalahiny, lehilahy mahay, dia Eliho sy Semakia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ireo rehetra ireo no avy tamin''ny zanak''i Obededoma, dia izy sy ny zanany sy ny rahalahiny, izay samy lehilahy mahery sady matanjaka amin''ny fanompoany; roa amby enim-polo no an''i Obed-edoma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Meselemia nanan-janaka sy rahalahy valo ambin''ny folo, samy lehilahy mahay avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Hosa, tamin''ny taranak''i Merary, nanan-janakalahy, dia Simry, lohany (fa na dia tsy lahimatoa aza izy, dia izy no nataon-drainy ho lohany), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'sy Hilkia, lahiaivo, sy Tebalia, fahatelo, ary Zakaria, fahefatra; ny zanakalahin''i Hosa sy ny rahalahiny rehetra dia telo ambin''ny folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireo lohan''ny tonian''ny mpiandry varavarana ireo dia nomena anjara-raharaha niaraka tamin''ny rahalahiny hanao fanompoam-pivavahana ao an-tranon''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izy ireo, na ny kely na ny lehibe, dia nanao filokana avokoa araka ny fianakaviany ny ho amin''ny isam-bavahady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa ny loka tamin''ny atsinanana dia azon''i Selemia. Ary nanaovana filokana Zakaria zanany, mpanolo-tsaina hendry, ka ny loka tamin''ny avaratra no azony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'An''i Obed-edoma ny atsimo, ary an''ny zanany ny trano firaketana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'An''i Sopima sy Hosa ny andrefana mbamin''ny vavahady Saleketa amin''ny lalana miakatra; ary dia feno avokoa ny fiambenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny atsinanana nisy Levita enina, ny avaratra nisy efatra Isan''andro, ny atsimo nisy efatra isan''andro, ary ny trano firaketana nisy efa-dahy nizara ho roa avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tany Parbara
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao 2 Mpan. xxiii. 11
    marker-yv: yv-n
  - type: text
    text: ' andrefana nisy efatra amin''ny lalana, ary roa tao Parbara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia Ireo no antokon'ny mpiandry varavarana tamin'ny taranak'i Kora sy ny taranak'i Merary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary tamin'ny Levita dia Ahia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (ary ny Levita rahalahiny)'
    marker-yv: yv-n
  - type: text
    text: ' no tonian''ny rakitry ny tranon''Andriamanitra sy ny zavatra nohamasinina ho rakitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny taranak''i Ladana, ilay Ladana Gersonita, ireo lohan''ny fianakavian''i Ladana Gersonita, dia ny Jehielita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny taranaky ny Jehielita, dia Zetama sy Joela rahalahiny, no tonian''ny rakitry ny tranon''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin''ny Amramita sy ny Jizarita sy ny Hebronita ary ny Ozielita '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia Seboela, avy tamin''ny taranak''i Gersona, zanak''i Mosesy, no tonian''ny rakitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny rahalahiny avy tamin''i Eliezera dia Rehabia, zanak''i Eliezera, sy Jesaia, zanak''i Rehabia, sy Jorama, zanak''i Jesaia, sy Zikry, zanak''i Jorama, ary Selomota, zanak''i Zikry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Io Selomota io sy ny rahalahiny no tonian''ny zavatra nohamasinina ho rakitra, dia Izay nohamasinin''i Davida mpanjaka sy ny lohan''ny fianakaviana ary ny mpifehy arivo sy ny mpifehy zato ary ny komandin''ny miaramila. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin''ny babo izay azony tamin''ny ady nisy nohamasininy ho enti-manamboatra ny tranon''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary izay rehetra nohamasinin''i Samoela mpahita sy Saoly, zanak''i Kisy, sy Abnera, zanak''i Nera, sy Joaba, zanak''i Zeroia, dia izay rehetra nohamasininy, dia Selomota sy ny rahalahiny no nitahiry izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin''ny Jizarita dia Kenania sy ny zanany no voatendry ho amin''ny raharaha ivelany amin''ny Isiraely, dia ho mpifehy sy mpitsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary tamin''ny Hebronita dia Hasabia sy ny rahalahiny, lehilahy mahay fiton-jato amby arivo, no mpifehy tamin''ny Isiraely tany an-dafy andrefan''i Jordana ny amin''ny raharaha rehetra ho an''i Jehovah sy ny fanompoana ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ny Hebronita dia Jeria lohany (tamin''ny taona fahefa-polo nanjakan''i Davida no nitadiavana ny Hebronita araka ny fianakaviany avy, ka nisy lehilahy mahay hita tao aminy tao Jazera any Gileada) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: sy ny rahalahiny fiton-jato amby roa arivo, samy lehilahy mahay, lohan'ny fianakaviany avy. Ary Davida nanendry ireo ho mpifehy ny Robenita sy ny Gadita ary ny antsasaky firenen'i Manase, ny amin'ny raharahan'Andriamanitra sy ny mpanjaka.
