document_id: GEN.42,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandehanan'ny zanak'i Jakoba hividy vary tany Egypta, sy ny nihaonany tamin'i Josefa
  - type: text
    content: 'Ary fantatr''i Jakoba fa nisy vary tany Egypta, dia hoy izy tamin''ny zananilahy: Nahoana no mifampijery foana ianareo ? '
  '10':
  - type: text
    content: 'Fa hoy izy ireo taminy: Tsia, tompokolahy; fa tonga mba hividy hanina ny mpanomponao. '
  '11':
  - type: text
    content: 'Zanaky ny lehilahy iray ihany izahay rehetra; olo-marina izahay, fa tsy mba mpisafo tsy akory ny mpanomponao. '
  '12':
  - type: text
    content: 'Ary hoy izy taminy: Tsia, fa hizaha ny fangadihadin''ny tany no nahatongavanareo. '
  '13':
  - type: text
    content: 'Fa hoy izy; Roa ambin''ny folo mirahalahy ny mpanomponao, zanaky ny lehilahy iray ihany any amin''ny tany Kanana; ary, indro, ny faralahy dia any amin''ny rainay ankehitriny, fa ny anankiray tsy ao intsony. '
  '14':
  - type: text
    content: 'Ary hoy Josefa taminy: Ilay voalazako taminareo ihany hoe: Mpisafo ianareo no marina; '
  '15':
  - type: text
    content: 'dia izao àry no hamantarana anareo: Raha velona koa Farao, tsy hiala atỳ ianareo, raha tsy tonga atỳ izany zandrinareo faralahy izany. '
  '16':
  - type: text
    content: 'Iraho ny anankiray aminareo, ary aoka izy haka ny zandrinareo, fa ianareo hafatotra, mba hofantarina ny teninareo, na marina na tsia; fa raha tsy izany, raha velona koa Farao, dia mpisafo tokoa ianareo. '
  '17':
  - type: text
    content: 'Dia nataony tao an-trano-maizina hateloana izy rehetra. '
  '18':
  - type: text
    content: 'Ary nony tamin''ny andro fahatelo dia hoy Josefa taminy: Izao no ataovy, dia ho velona ianareo; fa izaho matahotra an''Andriamanitra: '
  '19':
  - type: text
    content: 'Raha olo-marina ary ianareo, dia aoka ny anankiray aminareo mirahalahy avy no hafatotra ao amin''ny trano-maizina nitoeranareo; ary mandehana ianareo hitondra vary noho ny mosary any amin''ny tranonareo; '
  '2':
  - type: text
    content: 'Dia hoy koa izy: Indro, efa reko fa misy vary any Egypta; andeha midina any ianareo, ka mividia ho antsika, mba ho velona isika, fa tsy ho faty. '
  '20':
  - type: text
    content: 'ary ny zandrinareo faralahy dia ento mankaty amiko; dia ho hita fa marina ny teninareo, ary tsy hovonoina ianareo. Ary nataony izany. '
  '21':
  - type: text
    content: 'Dia niresaka hoe izy: Efa meloka tokoa isika noho ny amin''ny rahalahintsika, satria nahita ny fahorian''ny fanahiny isika, raha nitaraina tamintsika izy, nefa tsy mba nihaino isika; koa izany no nahatongavan''izao fahoriana izao amintsika. '
  '22':
  - type: text
    content: 'Dia namaly azy Robena ka nanao hoe: Moa tsy niteny taminareo va aho ka nanao hoe: Aza manota amin''ny zaza? nefa tsy mba nihaino ianareo; koa indro fa adinina ny ràny izao. '
  '23':
  - type: text
    content: 'Ary izy ireo tsy mba nahalala fa Josefa nahafantatra ny teniny, satria nisy mpandika teny niresahany taminy. '
  '24':
  - type: text
    content: Ary Josefa dia nihodina niala teo aminy ka nitomany; ary niverina nankeo aminy indray izy ka niteny taminy, ary dia naka an'i Simeona teo aminy izy ka namatotra azy teo imasony.
  '25':
  - type: text
    content: 'Ary Josefa nanome teny hameno vary ny lasakany sady hamerina ny volan''ny isan-dahy ho ao anatin''ny lasakany avy ary hanome vatsy azy ho entiny eny an-dalana; dia nanao izany taminy izy. '
  '26':
  - type: text
    content: 'Ary natainginy tamin''ny borikiny ny vary, dia lasa nandeha izy. '
  '27':
  - type: text
    content: 'Ary raha nosokafan''ny anankiray ny lasakany hampihinanany ny borikiny teo amin''izay handriany, dia hitany ny volany; fa, indro, teo am-bavan''ny lasakany izany. '
  '28':
  - type: text
    content: 'Dia hoy izy tamin''ireo rahalahiny: Naverina ny volako, ka, indro, eo anatin''ny lasakako izany; dia ketraka ny fony, ary nifampijery amin-tahotra izy ka niresaka hoe: Inona izao ataon''Andriamanitra amintsika izao ? '
  '29':
  - type: text
    content: 'Ary tonga tany amin''i Jakoba rainy, tany amin''ny tany Kanana izy, dia nambarany taminy izay rehetra efa nanjo azy, ka hoy izy : '
  '3':
  - type: text
    content: 'Dia lasa nidina izy folo lahy rahalahin''i Josefa mba hividy vary tany Egypta. '
  '30':
  - type: text
    content: 'Mafy ny teny nataon-dralehilahy, tompon''ny tany, taminay, fa nataony ho mpisafo ny tany izahay. '
  '31':
  - type: text
    content: 'Ary hoy izahay taminy: Olo-marina izahay, fa tsy mba mpisafo tsy akory; '
  '32':
  - type: text
    content: 'roa ambin''ny folo mirahalahy izahay no zanaky ny rainay; tsy ao intsony ny anankiray, ary ny faralahy dia any amin''ny rainay any amin''ny tany Kanana ankehitriny. '
  '33':
  - type: text
    content: 'Dia hoy ralehilahy, tompon''ny tany, taminay: Izao ary no hahafantarako fa olo-marina ianareo : ny anankiray aminareo mirahalahy avy dia avelao atỳ amiko, ka mitondra vary noho ny mosary any amin''ny tranonareo, dia mandehana; '
  '34':
  - type: text
    content: 'ary ento mankaty amiko ny zandrinareo faralahy, dia ho fantatro fa tsy mba mpisafo ianareo, fa olo-marina; dia homeko anareo ny rahalahinareo, ka dia hanao varotra eto amin''ny tany ianareo. '
  '35':
  - type: text
    content: 'Ary raha nandraraka izay tao anatin''ny lasakany izy ireo, dia, indro, ny volany am-ponosana samy teo anatin''ny lasakany avy; ary rehefa nahita ny volany am-ponosana izy sy ny rainy, dia samy raiki-tahotra. '
  '36':
  - type: text
    content: 'Ary hoy Jakoba rainy taminy: Foananareo anaka aho: Josefa tsy eto intsony, Simeona koa tsy eto intsony, ary Benjamina indray halainareo; izaho ihany no ozoin''izany rehetra izany, '
  '37':
  - type: text
    content: 'Ary Robena niteny tamin''ny rainy ka nanao hoe: Vonoy ny zanako roa lahy, raha tsy entiko miverina atỳ aminao izy; atolory eto an-tanako izy, dia izaho no hitondra azy mody ho atỳ aminao indray. '
  '38':
  - type: text
    content: 'Ary hoy Jakoba: Tsy hidina hiaraka aminareo ny zanako; fa maty ny rahalahiny, ary izy irery ihany no sisa, ary raha hisy loza hanjo azy any amin''ny lalana izay halehanareo, dia hampidininareo any amin''ny fiainan-tsi-hita amin''alahelo ny volo fotsiko.'
  '4':
  - type: text
    content: 'Fa Benjamina, rahalahin''i Josefa, tsy mba nampandehanin''i Jakoba niaraka tamin''ny rahalahiny; fa hoy izy: Andrao hisy loza hanjo azy. '
  '5':
  - type: text
    content: 'Dia tonga ny zanak''Isiraely mba hividy vary niaraka tamin''izay nankany; fa tratry ny mosary koa ny tany Kanana. '
  '6':
  - type: text
    content: 'Ary Josefa no mpanapaka ny tany, sady izy no mpivaro-bary tamin''ny tompon-tany rehetra; ary tonga ny rahalahin''i Josefa ka niankohoka tamin''ny tany teo anatrehany. '
  '7':
  - type: text
    content: 'Ary hitan''i Josefa ny rahalahiny, dia fantany ihany izy, nefa nody olon-kafa taminy izy ka niteny mafy taminy nanao hoe: Avy aiza ianareo? Ary hoy kosa izy: Avy any amin''ny tany Kanana izahay mba hividy hanina. '
  '8':
  - type: text
    content: 'Ary fantatr''i Josefa ny rahalahiny, nefa izy ireo kosa tsy mba nahafantatra azy. '
  '9':
  - type: text
    content: 'Ary Josefa nahatsiaro ireo nofy nanofisany azy ka nanao taminy hoe: Mpisafo ianareo; hizaha ny fangadihadin''ny tany no nahatongavanareo. '
