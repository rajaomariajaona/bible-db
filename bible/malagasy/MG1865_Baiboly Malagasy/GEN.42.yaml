document_id: GEN.42
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandehanan'ny zanak'i Jakoba hividy vary tany Egypta, sy ny nihaonany tamin'i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary fantatr''i Jakoba fa nisy vary tany Egypta, dia hoy izy tamin''ny zananilahy: Nahoana no mifampijery foana ianareo ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy koa izy: Indro, efa reko fa misy vary any Egypta; andeha midina any ianareo, ka mividia ho antsika, mba ho velona isika, fa tsy ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia lasa nidina izy folo lahy rahalahin''i Josefa mba hividy vary tany Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Benjamina, rahalahin''i Josefa, tsy mba nampandehanin''i Jakoba niaraka tamin''ny rahalahiny; fa hoy izy: Andrao hisy loza hanjo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia tonga ny zanak''Isiraely mba hividy vary niaraka tamin''izay nankany; fa tratry ny mosary koa ny tany Kanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Josefa no mpanapaka ny tany, sady izy no mpivaro-bary tamin''ny tompon-tany rehetra; ary tonga ny rahalahin''i Josefa ka niankohoka tamin''ny tany teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hitan''i Josefa ny rahalahiny, dia fantany ihany izy, nefa nody olon-kafa taminy izy ka niteny mafy taminy nanao hoe: Avy aiza ianareo? Ary hoy kosa izy: Avy any amin''ny tany Kanana izahay mba hividy hanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary fantatr''i Josefa ny rahalahiny, nefa izy ireo kosa tsy mba nahafantatra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Josefa nahatsiaro ireo nofy nanofisany azy ka nanao taminy hoe: Mpisafo ianareo; hizaha ny fangadihadin''ny tany no nahatongavanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy izy ireo taminy: Tsia, tompokolahy; fa tonga mba hividy hanina ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Zanaky ny lehilahy iray ihany izahay rehetra; olo-marina izahay, fa tsy mba mpisafo tsy akory ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy izy taminy: Tsia, fa hizaha ny fangadihadin''ny tany no nahatongavanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy izy; Roa ambin''ny folo mirahalahy ny mpanomponao, zanaky ny lehilahy iray ihany any amin''ny tany Kanana; ary, indro, ny faralahy dia any amin''ny rainay ankehitriny, fa ny anankiray tsy ao intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Josefa taminy: Ilay voalazako taminareo ihany hoe: Mpisafo ianareo no marina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia izao àry no hamantarana anareo: Raha velona koa Farao, tsy hiala atỳ ianareo, raha tsy tonga atỳ izany zandrinareo faralahy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Iraho ny anankiray aminareo, ary aoka izy haka ny zandrinareo, fa ianareo hafatotra, mba hofantarina ny teninareo, na marina na tsia; fa raha tsy izany, raha velona koa Farao, dia mpisafo tokoa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nataony tao an-trano-maizina hateloana izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony tamin''ny andro fahatelo dia hoy Josefa taminy: Izao no ataovy, dia ho velona ianareo; fa izaho matahotra an''Andriamanitra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha olo-marina ary ianareo, dia aoka ny anankiray aminareo mirahalahy avy no hafatotra ao amin''ny trano-maizina nitoeranareo; ary mandehana ianareo hitondra vary noho ny mosary any amin''ny tranonareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary ny zandrinareo faralahy dia ento mankaty amiko; dia ho hita fa marina ny teninareo, ary tsy hovonoina ianareo. Ary nataony izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niresaka hoe izy: Efa meloka tokoa isika noho ny amin''ny rahalahintsika, satria nahita ny fahorian''ny fanahiny isika, raha nitaraina tamintsika izy, nefa tsy mba nihaino isika; koa izany no nahatongavan''izao fahoriana izao amintsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia namaly azy Robena ka nanao hoe: Moa tsy niteny taminareo va aho ka nanao hoe: Aza manota amin''ny zaza? nefa tsy mba nihaino ianareo; koa indro fa adinina ny ràny izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izy ireo tsy mba nahalala fa Josefa nahafantatra ny teniny, satria nisy mpandika teny niresahany taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary Josefa dia nihodina niala teo aminy ka nitomany; ary niverina nankeo aminy indray izy ka niteny taminy, ary dia naka an'i Simeona teo aminy izy ka namatotra azy teo imasony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Josefa nanome teny hameno vary ny lasakany sady hamerina ny volan''ny isan-dahy ho ao anatin''ny lasakany avy ary hanome vatsy azy ho entiny eny an-dalana; dia nanao izany taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary natainginy tamin''ny borikiny ny vary, dia lasa nandeha izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha nosokafan''ny anankiray ny lasakany hampihinanany ny borikiny teo amin''izay handriany, dia hitany ny volany; fa, indro, teo am-bavan''ny lasakany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia hoy izy tamin''ireo rahalahiny: Naverina ny volako, ka, indro, eo anatin''ny lasakako izany; dia ketraka ny fony, ary nifampijery amin-tahotra izy ka niresaka hoe: Inona izao ataon''Andriamanitra amintsika izao ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary tonga tany amin''i Jakoba rainy, tany amin''ny tany Kanana izy, dia nambarany taminy izay rehetra efa nanjo azy, ka hoy izy : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mafy ny teny nataon-dralehilahy, tompon''ny tany, taminay, fa nataony ho mpisafo ny tany izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy izahay taminy: Olo-marina izahay, fa tsy mba mpisafo tsy akory; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'roa ambin''ny folo mirahalahy izahay no zanaky ny rainay; tsy ao intsony ny anankiray, ary ny faralahy dia any amin''ny rainay any amin''ny tany Kanana ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia hoy ralehilahy, tompon''ny tany, taminay: Izao ary no hahafantarako fa olo-marina ianareo : ny anankiray aminareo mirahalahy avy dia avelao atỳ amiko, ka mitondra vary noho ny mosary any amin''ny tranonareo, dia mandehana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ary ento mankaty amiko ny zandrinareo faralahy, dia ho fantatro fa tsy mba mpisafo ianareo, fa olo-marina; dia homeko anareo ny rahalahinareo, ka dia hanao varotra eto amin''ny tany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary raha nandraraka izay tao anatin''ny lasakany izy ireo, dia, indro, ny volany am-ponosana samy teo anatin''ny lasakany avy; ary rehefa nahita ny volany am-ponosana izy sy ny rainy, dia samy raiki-tahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy Jakoba rainy taminy: Foananareo anaka aho: Josefa tsy eto intsony, Simeona koa tsy eto intsony, ary Benjamina indray halainareo; izaho ihany no ozoin''izany rehetra izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary Robena niteny tamin''ny rainy ka nanao hoe: Vonoy ny zanako roa lahy, raha tsy entiko miverina atỳ aminao izy; atolory eto an-tanako izy, dia izaho no hitondra azy mody ho atỳ aminao indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary hoy Jakoba: Tsy hidina hiaraka aminareo ny zanako; fa maty ny rahalahiny, ary izy irery ihany no sisa, ary raha hisy loza hanjo azy any amin''ny lalana izay halehanareo, dia hampidininareo any amin''ny fiainan-tsi-hita amin''alahelo ny volo fotsiko.'
