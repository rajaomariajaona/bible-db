document_id: JHN.20
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny andro voalohany amin''ny herinandro dia nandeha maraina koa mbola maizimaizina hankany amin''ny fasana Maria Magdalena ka nahita ny vato voaisotra tamin''ny fasana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nihazakazaka nankany amin''i Simona Petera sy ilay mpianatra tian''i Jesosy izy ka nanao taminy hoe: Nalain''olona tao am-pasana ny Tompo, ka tsy fantatray izay nametrahany Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nandeha Petera sy ilay mpianatra anankiray ka nankany amin''ny fasana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary niara-nihazakazaka izy roa lahy; ary ilay mpianatra anankiray nihazakazaka nihoatra an''i Petera ka tonga taloha tao amin''ny fasana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony niondrika nitsirika izy, dia nahita ny lambam-paty nipetraka teo, nefa tsy niditra tao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary avy koa Simona Petera nanaraka azy, dia niditra tao am-pasana ka nijery ny lambam-paty nipetraka teo, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary ny mosara izay nafehy ny lohany tsy mba nipetraka teo amin''ny lambam-paty, fa voavalona mitokana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary tamin''izay dia niditra koa ny mpianatra anankiray izay tonga taloha teo amin''ny fasana, ary nahita ka nino. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa tsy mbola fantany ny Soratra Masina fa tsy maintsy hitsangana amin''ny maty Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia lasa indray ny mpianatra nody tany aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Maria nijanona nitomany teo ivelan''ny fasana; ary raha nitomany izy, dia niondrika nitsirika ny tao am-pasana '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka nahita anjely roa nitafy lamba fotsy nipetraka teo, ny anankiray teo an-doha tamin''ilay nandrian''ny fatin''i Jesosy, ary ny anankiray teo an-tongotra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy ireo taminy: Ravehivavy, nahoana ianao no mitomany? Dia hoy izy taminy: Satria nalain''olona ny Tompoko, ka tsy fantatro izay nametrahany Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa nilaza izany izy, dia nitodika ka nahita an''i Jesosy nitsangana teo, nefa tsy fantany ho Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hoy Jesosy taminy: Ravehivavy, nahoana ianao no mitomany? iza no tadiavinao? Nataony fa mpiandry saha Izy, ka hoy izy taminy: Tompoko, raha Hianao no naka Azy teto, lazao amiko izay nametrahanao Azy, ary izaho dia haka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy Jesosy taminy: Ry Maria! Dia nitodika izy ka niteny taminy nanao teny Hebreo hoe: Rabôny! izany hoe: Mpampianatra ô. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy Jesosy taminy: Aza manendry Ahy; fa tsy mbola niakatra tany amin''ny Ray Aho; fa mandehana mankany amin''ny rahalahiko, ka lazao aminy hoe: Miakatra ho any amin''ny Raiko sy ny Rainareo Aho, ary ho any amin''Andriamanitro sy Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia tonga Maria Magdalena ka nilaza tamin''ny mpianatra hoe: Efa nahita ny Tompo aho, sady izany teny izany no nolazainy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa harivan''ilay andro voalohany amin''ny herinandro, raha voarindrina ny varavaran''izay niangonan''ny mpianatra, noho ny fahatahorany ny Jiosy, dia tonga Jesosy ka nitsangana teo afovoany, dia nanao taminy hoe: Fiadanana ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa nilaza izany Izy, dia nasehony azy ny tànany sy ny lanivoany. Dia faly ny mpianatra, raha nahita ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy indray Jesosy taminy: Fiadanana ho anareo; tahaka ny nanirahan''ny Ray Ahy no anirahako anareo kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary rehefa nilaza izany Izy, dia nanisy fofonaina, ka hoy Izy taminy; Raiso ny Fanahy Masina; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'na helok''iza na helok''iza no avelanareo, dia voavela izany; ary na an''iza na an''iza kosa no tsy avelanareo, dia tsy voavela izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa Tomasy, anankiray tamin''ny roa ambin''ny folo lahy, ilay atao hoe Didymo, dia tsy mba teo aminy raha tonga Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy ny mpianatra sasany taminy: Efa nahita ny Tompo izahay. Fa hoy kosa izy taminy: Raha tsy hitako eo amin''ny tànany ny holatry ny nohomboana, ka ataoko eo amin''ny holatry ny nohomboana ny rantsan-tanako, ary ataoko eo amin''ny lanivoany koa ny tanako, dia tsy mba hino aho. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony afaka havaloana, dia tafangona teo indray ny mpianany, ary teo koa Tomasy. Dia tonga Jesosy, rehefa voarindrina ny varavarana, ka nitsangana teo afovoany, dia nanao hoe: Fiadanana ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy Izy tamin''i Tomasy: Atehefo eto ny rantsan''tananao, ka jereo ny tanako; ary atehefo eto koa ny tananao, ka ataovy amin''ny lanivoako; ary aza ho isan''izay tsy mino, fa minoa. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia namaly Tomasy ka nanao taminy hoe: Tompoko sy Andriamanitro! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hoy Jesosy taminy: Satria nahita Ahy ianao, dia nino; sambatra kosa izay tsy nahita, nefa nino. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary nisy famantarana maro hafa koa nataon''i Jesosy teo imason''ny mpianatra, izay tsy voasoratra amin''ity boky ity; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: fa voasoratra izao, mba hinoanareo fa Jesosy no Kristy, Zanak'Andriamanitra, ary mba hanananareo fiainana amin'ny anarany, raha mino ianareo.
