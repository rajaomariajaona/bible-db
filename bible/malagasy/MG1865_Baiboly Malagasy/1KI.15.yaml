document_id: 1KI.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjahan'i Nadaba sy Basa sy Elaha sy Zimry ary Omry tamin'ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny taona fahavalo ambin''ny folo nanjakan''i Jeroboama, zanak''i Nebata, no vao nanjakan''i Abia tamin''ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Telo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Imaka, zanakavavin''i Absaloma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nandeha tamin''ny fahotana rehetra nataon-drainy izy, dia izay nataony teo alohany; ary ny fony tsy mba nahitsy tamin''i Jehovah Andriamaniny tahaka ny fon''i Davida rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa noho ny amin''i Davida dia nomen''i Jehovah Andriamaniny fanilo tany Jerosalema ihany izy, fa natsangany handimby azy ny zanany, sady nampaharitra an''i Jerosalema Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'satria Davida nanao izay mahitsy eo imason''i Jehovah ka tsy nivily niala tamin''izay nandidiany azy tamin''ny andro rehetra niainany, afa-tsy ilay tamin''i Oria Hetita ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary niady Rehoboama sy Jeroboama tamin'ny andro rehetra niainany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny tantaran''i Abia sisa mbamin''izay rehetra nataony, tsy voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany ? Ary niady Abia sy Jeroboama '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Abia lasa nodi-mandry any amin''ny razany, dia nalevina tao an-Tanànan''i Davida izy; ary Asa zanany no nanjaka nandimby azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary tamin''ny taona faharoa-polo nanjakan''i Jeroboama, mpanjakan''ny Isiraely, no vao nanjakan''i Asa tamin''ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary iraika amby efa-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Imaka, zanakavavin''i Absaloma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Asa nanao izay mahitsy eo imason''i Jehovah toy ny nataon''i Davida rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa nesoriny tamin''ny tany ny olona izay nanolotena hijangajanga ho fanompoan-tsampy, sady nariany ny sampy rehetra izay nataon-drainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary na dia Imaka reniny aza dia naetriny tsy ho andriambavy, satria efa nanao sampy ho an''ny Aseraha; ary Asa nikapa ny sampiny ka nandoro azy tao an-dohasahan-driaka Kidrona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ny fitoerana avo tsy mba noravana; nefa nahitsy teo imason''i Jehovah ny fon''i Asa tamin''ny andro rehetra niainany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nampidiriny ho ao an-tranon''i Jehovah ny zavatra izay nohamasinin-drainy mbamin''izay nohamasinin''ny tenany, dia volafotsy sy volamena ary fanaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary niady Asa sy Basa, mpanjakan''ny Isiraely, tamin''ny andro rehetra niainany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Basa, mpanjakan''ny Isiraely, niakatra hamely ny Joda, dia nanamboatra an''i Rama mba tsy hisy hahazo hivoaka sy hiditra ho any amin''i Asa, mpanjakan''ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Asa naka ny volafotsy sy ny volamena rehetra izay sisa tamin''ny rakitry ny tranon''i Jehovah sy tamin''ny rakitry ny tranon ny mpanjaka, ka natolony teo an-tànan''ny mpanompony; ary Asa mpanjaka nampanatitra azy tany amin''i Beni-hadada, zanak''i Tabrimona, zanak''i Heziona, mpanjakan''i Syria, izay nonina tao Damaskosy, ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aoka hisy fanekena amiko sy aminao toy ny tamin''ny raiko sy ny rainao; koa, indro, mampanatitra volafotsy sy volamena ho fanomezana ho anao aho; andeha, tsoahy ny fanekenao tamin''i Basa, mpanjakan''ny Isiraely, mba hialany amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Beni-hadada nihaino an''i Asa mpanjaka ka naniraka komandin''ny miaramilany hamely ny tanànan''ny Isiraely, ary namely an''Iona sy Dana sy Abelabeti-maka ary Kinerota rehetra mbamin''ny tanin''ny Naftaly rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary rehefa ren''i Basa izany, dia nitsahatra tsy nanamboatra an''i Rama intsony izy sady nitoetra tao Tirza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Asa mpanjaka kosa nampandre ny Joda rehetra (tsy nisy tsy nampandrenesiny); ary dia nesorin'ny olona ny vato sy ny hazo tao Rama, izay naorin'i Basa; ary nentin'i Asa mpanjaka nanamboatra an'i Geban'i Benjamina sy Mizpa kosa izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny tantaran''i Asa sisa rehetra sy ny heriny rehetra mbamin''izay rehetra nataony ary ny tanàna izay nataony, tsy voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? Nefa kosa tamin''ny andro fahanterany dia narary tamin''ny tongony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary lasa nodimandry any amin'ny razany, dia nalevina tao amin'ny razany tao an-Tanànan'i Davida rainy izy; ary Josafata zanany no nanjaka nandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Nadaba, zanak''i Jeroboama, vao nanjaka tamin''ny Isiraely tamin''ny taona faharoa nanjakan''i Asa, mpanjakan''ny Joda; ary nanjaka roa taona tamin''ny Isiraely izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa nandeha tamin''ny lalan-drainy sy tamin''ny fahotany izay nampanotany ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Basa, zanak''i Ahia, amin''ny taranak''Isakara, nikomy taminy dia namely azy tao Gibetona, izay an''ny Filistina (fa Nadaba sy ny Isiraely rehetra nanao fahirano an''i Gibetona fahizay). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Basa nahafaty azy tamin''ny taona fahatelo nanjakan''i Asa, mpanjakan''ny Joda, ka dia nanjaka nisolo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary rehefa nanjaka izy, dia namely ny mpianakavin''i Jeroboama rehetra izy, ka tsy nasiany niangana ho an''i Jeroboama na dia olona iray akory aza, fa naringany avokoa ireo araka ny tenin''i Jehovah izay nampilazainy an''i Ahia Silonita mpanompony, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'noho ny fahotana nataon''i Jeroboama sady nampanotany ny Isiraely tamin''izay nataony nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny tantaran''i Nadaba sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary niady Asa sy Basa, mpanjakan'ny Isiraely, tamin'ny andro rehetra niainany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tamin''ny taona fahatelo nanjakan''i Asa, mpanjakan''ny Joda, no vao nanjakan''i Basa, zanak''i Ahia, tamin''ny Isiraely rehetra tao Tirza; ary mpanjaka efatra amby roa-polo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nanao izay ratsy eo imason'i Jehovah izy, fa nandeha tamin'ny lalan'i Jeroboama sy tamin'ny fahotany izay nampanotany ny Isiraely.
