document_id: DEU.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny handringanana ny Kananita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa entin''i Jehovah Andriamanitrao ianao ka tafiditra any amin''ny tany izay efa hidiranao holovana, ary firenena maro no voaroakany hiala eo anoloanao, dia ny Hetita sy ny Girgasita sy ny Amorita sy ny Kananita sy ny Perizita sy ny Hivita ary ny Jebosita, dia firenena fito izay lehibe sy mahery noho ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary rehefa voatolotr''i Jehovah Andriamanitrao eo anoloanao ireny ka resinao: dia aringano mihitsy izy; aza manao fanekena aminy, na mamindra fo aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary aza mifanambady anaka aminy: ny zanakao-vavy tsy homenao ho vadin''ny zananilahy, ary ny zananivavy tsy halainao ho vadin''ny zanakao-lahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hampiala ny zanakao-lahy amin''ny fanarahana Ahy izy mba hanompoany andriamani-kafa, dia hirehitra aminareo ny fahatezeran''i Jehovah, ka handrifigana anao vetivety Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa izao kosa no ataovinareo aminy: ny alitarany horavanao, ary ny tsangam-baton-tsampiny hovakivakinao; ny Aserahany hokapainao, ary ny sarin-javatra voasokitra hodoranao amin''ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa firenena masina ho an''i Jehovah Andriamanitrao ianao; fa ianao efa nofidin''i Jehovah Andriamanitrao ho firenena rakitra soa ho Azy mihoatra noho ny firenena rehetra ambonin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy ny hamaroanareo noho ny firenena rehetra anefa no niraiketan''ny fitiavan''i Jehovah taminareo sy nifidianany anareo, fa ianareo dia vitsy noho ny firenena rehetra aza; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: fa ny nitiavan'i Jehovah anareo sy ny nitandremany ny fianianana izay efa nianianany tamin'ny razanareo no nitondran'i Jehovah anareo tamin'ny tanana mahery sy nanavotany anao tamin'ny trano nahandevozana dia tamin'ny tànan'i Farao, mpanjakan'i Egypta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa aoka ho fantatrao fa Jehovah Andriamanitrao ihany no Andriamanitra, dia Andriamanitra mahatoky, Izay mitandrina fanekena sy famindram-po amin''izay tia Azy sy mitandrina ny didiny, hatramin''ny taranaka arivo mandimby, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary mamaly miharihary izay mandrafy Azy amin''ny fandringanana azy; tsy hitaredretra Izy ny amin''izay mandrafy Azy, fa hamaly azy miharihary. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa tandremo ny lalàna sy ny didy ary ny fitsipika, izay andidiako anao anio, ka araho izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha mihaino ireo fitsipika ireo ianareo ka mitandrina sy manaraka azy, dia hotanterahin''i Jehovah Andriamanitrao aminao ny fanekena sy ny famindram-po, izay nianianany tamin''ny razanao; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia ho tia anao sy hitahy anao ary hahamaro anao Izy; ary Izy hitahy ny ateraky ny kibonao sy ny vokatry ny taninao, dia ny varinao sy ny ranom-boalobokao sy ny diloilonao, ary ny ateraky ny ombinao sy ny ateraky ny ondry aman''osinao any amin''ny tany izay nianianany tamin''ny razanao homena anao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hotahina ianao mihoatra noho ny firenena rehetra; tsy hisy lahy na vavy tsy hiteraka, na ianareo na ny biby fiompinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary harovan''i Jehovah tsy ho azon''aretina ianao, ka tsy hisy hameliny anao ny aretin-dratsin''i Egypta, izay fantatrao; fa hataony amin''izay rehetra mankahala anao kosa ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary aoka holaninao ny firenena rehetra, izay hatolotr''i Jehovah Andriamanitrao anao, ka aoka tsy hiantra azy ny masonao; ary aza manompo ny andriamaniny, fa ho fandrika aminao ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raha ianao hanao anakampo hoe: Maro noho izaho ireo firenena ireo, ka hataoko ahoana no fahay mandroaka azy? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia aza matahotra azy ianao; fa tsarovy tsara izay nataon''i Jehovah Andriamanitrao tamin''i Farao sy ny Egyptiana rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia ny fizahan-toetra lehibe, izay efa hitan''ny masonao, sy ny famantarana sy ny fahagagana sy ny tanana mahery ary ny sandry nahinjitra, izay nitondran''i Jehovah Andriamanitrao anao nivoaka; fa toy izany no hataon''i Jehovah Andriamanitrao amin''ny firenena rehetra izay atahoranao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny fanenitra koa dia hampandehanin''i Jehovah Andriamanitrao ho eo aminy mandra-paharingan''izay sisa sy izay efa niery ka tsy hitanao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza matahotra azy ianao; fa Jehovah Andriamanitrao no eo aminao, dia Andriamanitra lehibe sy mahatahotra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary horoahin''i Jehovah Andriamanitrao eo alohanao tsikelikely ireny firenena ireny; tsy haharoaka azy faingana ianao, fandrao hihamaro ny bibi-dia ka hamely anao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hatolotr''i Jehovah Andriamanitrao eo anoloanao izy ka hataony mifanaritaka be ihany mandra-pahalany ritrany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hatolony eo an-tananao koa ny mpanjakany, ka ho foananao tsy ho re intsony atỳ ambanin''ny lanitra ny anarany; tsy hisy olona hahajanona eo anoloanao, fa haringanao avokoa izy mandra-pahalaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny sarin-javatra voasokitra, izay andriamaniny, dia hodoranareo amin''ny afo; aza mitsiriritra ny volafotsy na ny volamena izay eo aminy, na maka izany ho anao, fandrao ho voafandriny ianao, fa fahavetavetana eo imason''i Jehovah Andriamanitrao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary aza mitondra fahavetavetana ho ao an-tranonao, fandrao ho voaozona tahaka izany koa ianao; ho halanao sy ho fahavetavetana eo imasonao indrindra izany, fa zavatra voaozona.
