document_id: ACT.26,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Agripa tamin''i Paoly: Mahazo mandahatra ny teninao ianao. Ary Paoly naninjitra ny tànany ka nandaha-teny hanala tsiny ny tenany nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady nataoko tany Jerosalema izany, ka maro ny olona masina no nohidiako tao an-tranomaizina, rehefa nahazo fahefana tamin''ny lohan''ny mpisorona aho; ary raha hovonoina ireny, dia mba nandatsa-bato nanaiky izany koa aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nampijaly azy matetika teo amin'ny synagoga rehetra aho ka nanery azy hiteny ratsy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. hanao blasfemia; izahao Mat. 9,3
      marker-yv: yv-n
    - type: text
      text: '; ary satria very saina tamin''ny fahatezerako taminy aho, dia nanenjika azy hatramin''ny tanàna any ivelany koa aza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izany, raha nankany Damaskosy aho, nitondra fahefana sy teny izay efa azoko tamin''ny lohan''ny mpisorona, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa nony ilay nitatao-vovonana iny ny andro, ry mpanjaka ô, dia hitako teny an-dalana fa, indro, nisy mazava avy tany an-danitra nanelatrelatra manodidina ahy mbamin''izay niaraka tamiko mihoatra noho ny famirapiratry ny masoandro. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa lavo tamin''ny tany izahay rehetra, dia nandre feo nilaza tamiko aho nanao tamin''ny teny Hebreo hoe: Saoly Saoly, nahoana ianao no manenjika Ahy? Zavatra sarotra aminao ny hanipaka ny fanindronana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izaho: Iza moa Hianao, Tompoko? Ary hoy ny Tompo: Izaho no Jesosy Izay enjehinao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa mitsangàna, ka mijoroa amin'ny tongotrao; fa izao no nisehoako taminao, dia ny hanendry anao ho mpanompo sy ho vavolombelona ny amin'izay efa nahitanao Ahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (izay efa hitanao)'
      marker-yv: yv-n
    - type: text
      text: ' sy izay hisehoako aminao, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hamonjy anao amin''ny olona Isiraely sy ny jentilisa, izay anirahako anao, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hampahiratra ny masony hialany amin''ny maizina ho amin''ny mazava, ary amin''ny fahefan''i Satana ho amin''Andriamanitra, mba hahazoany famelan-keloka sy lova eo amin''izay nohamasinina noho ny finoana Ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany, ry Agripa mpanjaka ô, dia tsy nandà ny fahitana avy tany an-danitra aho; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin''ny zavatra rehetra iampangan''ny Jiosy ahy, ry Agripa mpanjaka, dia ataoko fa sambatra aho, satria mahazo mandaha-teny hanala tsiny ny tenako eto anatrehanao anio, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nambarako voalohany tamin''izay tany Damaskosy sy Jerosalema sy tany amin''ny tany Jodia rehetra ary tany amin''ny Jentilisa, mba hibebaka sy hiverina amin''Andriamanitra izy ka hanao asa miendrika ny fibebahana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izany no nisamboran''ny Jiosy ahy teo an-kianjan''ny tempoly sy nitadiavany hahafaty ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho ny fitahian''Andriamanitra ahy dia mbola maharitra mandraka androany aho ka manambara na amin''ny kely na amin''ny lehibe, ary tsy milaza na inona na inona afa-tsy izay nolazain''ny mpaminany sy Mosesy fa ho avy, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa Kristy tsy maintsy mijaly ary ho voalohany hitsangana amin''ny maty ka hitory fahazavana amin''ny olona Isiraely sy amin''ny jentilisa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nandahatra izany izy, dia hoy Festosy tamin''ny feo mahery: Ry Paoly ô, very saina ianao; ny fianarana be loatra no efa nahavery saina anao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Paoly: Tsy very saina aho, ry Festosy tsara indrindra, fa mandahatra tenin''ny fahamarinana sy ny fahononana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fantatry ny mpanjaka izany zavatra izany, ka dia miteny amin''ny fahasahiana eto anatrehany aho; fa mino aho fa tsy miafina aminy izany zavatra izany, satria tsy natao tao amin''ny takona izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry Agripa mpanjaka ô, mino ny mpaminany va ianao? Fantatro fa mino ianao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Agripa tamin''i Paoly: Hay! ataonao fa mora toy izany no hampanekenao ahy ho Kristiana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Paoly: Mangataka amin''Andriamanitra aho, fa na amin''ny mora, na amin''ny sarotra, tsy ianao ihany, fa izay rehetra mandre ahy anio, dia hitovy amiko, afa-tsy amin''ireto gadra ireto ihany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'indrindra fa efa fantatrao tsara ny fanao sy ny ady hevitra rehetra amin''ny Jiosy; koa trarantitra ianao, mba mahareta hihaino ahy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitsangana ny mpanjaka sy ny governora ary Berenika mbamin''izay niara-nipetraka teo aminy; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rehefa niala teo izy, dia niresaka hoe: Tsy manao izay tokony hahafaty na hamatorana azy tsy akory izany lehilahy izany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Agripa tamin''i Festosy: Azo nalefa ihany io lehilahy io, saingy efa nifidy ny handahatra any anatrehan''i Kaisara izy.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatry ny Jiosy rehetra ny fitondran-tenako hatry ny fony aho mbola kely teo amin''ny fireneko tany Jerosalema hatramin''ny voalohany; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, fantany hatramin''ny voalohany aho (raha mety milaza izy), fa efa Fariseo aho araka ny antoko, fatra-pitana indrindra ny lalàna amin''ny fivavahantsika. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny ny fanantenana ny teny fikasana izay nataon''Andriamanitra tamin''ny razantsika no itsanganako hotsaraina eto, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ilay fanantenana andrasan''ny firenentsika roa ambin''ny folo, izay mazoto manao fanompoam-pivavahana ho an''Andriamanitra andro aman''alina. Izany fanantenana izany no iampangan''ny Jiosy ahy, ry mpanjaka ô. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana no ataonareo ho zavatra tsy azo inoana, raha Andriamanitra manangana ny maty? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho efa nihevitra tao am-poko tokoa fa tsy mety raha tsy manao zavatra maro hanohitra ny anaran''i Jesosy avy any Nazareta, '
