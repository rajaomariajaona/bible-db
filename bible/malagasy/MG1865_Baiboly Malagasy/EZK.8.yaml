document_id: EZK.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahitana ny amin'ny nanarahan'ny olona tany Jerosalema ny fomban-tsampy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny andro fahadimy tamin''ny volana fahenina tamin''ny taona fahenina, raha nipetraka tao an-tranoko aho, ary nipetraka teo anatrehako ny loholon''ny Joda, dia nilatsaka tamiko ny tànan''i Jehovah Tompo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niditra aho ka nahita, ary indreo, nisy sarin''ny biby mandady sy mikisaka rehetra sy ny biby hafa, dia izay fahavetavetana, sy ny sampy rehetra an''ny taranak''Isiraely, voasoratra teo amin''ny rindrina manodidina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy olona fito-polo lahy, isan''ny loholon''ny taranak''Isiraely, nitsangana teo anoloan''ireo, ary Jazania, zanak''i Safana, nitsangana teo afovoany, samy nitondra ny loviany fandoroana ditin-kazo manitra teny an-tànany avy, ary ny setroky ny ditin-kazo manitra dia nidonata. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy tamiko: Ry zanak''olona efa hitanao va ny ataon''ny loholon''ny taranak''Isiraely amin''ny maizina, dia samy ao amin''ny efi-tranony misy sary'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsara soratra'
      marker-yv: yv-n
    - type: text
      text: '? Fa hoy izy: Jehovah tsy mahita anay; efa nahafoy ny tany Izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Izy tamiko: Mbola hahita fahavetavetana lehibe izay ataony koa ianao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nentiny ho eo anoloan''ny vavahadin''ny tranon''i Jehovah, izay manatrika ny avaratra aho; ary, indreo, nisy vehivavy nipetraka teo, nitomany an''i Tamoza. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy tamiko: Hitanao va izany ry zanak''olona? Mbola hahita fahavetavetana lehibe noho ireto koa ianao.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentiny ho eo amin'ny kianja anatiny amin'ny tranon'i Jehovah aho, ary, indro, teo am-baravaran'ny tempolin'i Jehovah, dia teo anelanelan'ny lavarangana fidirana sy ny alitara, dia nisy tokony ho dimy amby roa-polo lahy niamboho ny tempolin'i Jehovah ka nanatrika ny atsinanana; ary ireo dia niankohoka manandrify ny masoandro, nanatrika ny atsinanana.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy tamiko: Hitanao va izany, ry zanak''olona? Moa ataon''ny taranak''i Joda ho kely loatra va ny nanaovany ny fahavetavetana izay ataony eto, no fenoiny fampahoriana koa ny tany, ka mampahatezitra Ahy lalandava izy; ary indro izy nanainga ny rantsan-kazo ho amin''ny orony. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Izaho kosa dia hamely amin'ny fahatezerako; tsy hiantra ny masoko, sady tsy hamindra fo Aho; ary na dia mitaraina mafy eo an-tsofiko aza izy, dia tsy hihaino azy Aho.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitako fa, indro, nisy nitarehin''afo; hatramin''ny valahany no ho midina dia afo; ary hatramin''ny valahany no ho miakatra kosa dia nitarehin-java-mamirapiratra dia toy ny volon''ny metaly mamirapiratra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy nitarehin-tanana nahinjiny, ka noraisiny tamin'ny voloko aho, dia nisy fanahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: rivotra'
      marker-yv: yv-n
    - type: text
      text: ' nanainga ahy ho eny anelanelan''ny tany sy ny lanitra ka nitondra ahy ho any Jerosalema tamin''ny fahitana avy amin''Andriamanitra, ho eo amin''ny vavahadin''ny kianja anatiny, izay manatrika ny avaratra, dia ilay nisy ny sarin-javatra fampahasaro-piaro, dia ilay mampahasaro-piaro. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, teo ny voninahitr''Andriamanitry ny Isiraely tahaka ilay fahitana efa hitako teo amin''ny lohasaha. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy tamiko: Ry zanak''olona, atopazy kely amin''ny lalana mianavaratra ny masonao. Dia natopiko tamin''ny lalana mianavaratra ny masoko ka, indro, eny avaratry ny vavahadin''ny alitara no nisy ilay sarin-javatra fampahasaro-piaro teo amin''ny fidirana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy koa Izy tamiko: Ry zanak''olona, hitanao va izay ataon''ireo, dia ny fahavetavetana lehibe izay ataon''ny taranak''Isiraely eto ka mampanalavitra Ahy amin''ny fitoerako masina? Mbola hahita fahavetavetana lehibe koa ianao.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nentiny ho eo amin''ny vavahadin''ny kianja aho; ary hitako fa, indro, nisy loaka teo amin''ny ampiantany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy tamiko: Ry zanak''olona, loahy ny ampiantany; dia noloahako ny ampiantany ka, indro, nisy varavarana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy tamiko: Midira, ka jereo ny fahavetavetana lehibe ataony eto. '
