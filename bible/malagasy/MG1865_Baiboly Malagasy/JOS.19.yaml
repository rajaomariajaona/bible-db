document_id: JOS.19,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loka faharoa dia azon''i Simeona, dia ny firenena taranak''i Simeona isam-pokony; ary ny lovany dia tao anatin''ny lovan''ny taranak''i Joda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loka fahatelo dia azon''ny taranak''i Zebolona isam-pokony; ary ny faritanin''ny lovany dia hatrany Sarida, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niakatra niankandrefana hatrany Marala, dia nahazo an''i Dabeseta ka nihatra tamin''ny lohasahan-driaka tandrifin''i Jokneama, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nitodika niantsinanana hatrany Sarida ka hatramin''ny fari-tanin''i Rislota-tabara, dia nandroso hatrany Daberata ka niakatra hatrany Jafia, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nandroso niantsinanana hatrany Gata-hefera sy Ita-kazina ka nandroso hatrany Rimona, izay mipaka an''i Nea, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niolaka eo avaratr''iny ka nahazo an''i Hanatona, dia nihatra tamin''ny lohasaha Jifta-ela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Katata sy Nahalola sy Simrona sy Idala sy Betlehema, dia tanàna roa ambin''ny folo sy ny zana-bohiny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no lovan''ny taranak''i Zebolona araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loka fahefatra dia azon''Isakara, dia ny taranak''Isakara isam-pokony. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-taniny dia hatrany Jezirela sy Kesolota sy Sonema '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Hafraima sy Siona sy Anaharata '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no azony ho lovany: Beri-sheba, na Seba, sy Molada '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Rabita sy Kisiona sy Abeza '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Rameta sy Enganima sy Enhada ary Beti-pazeza. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-taniny dia nahazo an''i Tabara sy Sahazoma sy Beti-semesy, ka dia nihatra tany Jordana: tanàna enina ambin''ny folo sy ny zana-bohiny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no lovan'ny firenena taranak'Isakara araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loka fahadimy dia azon''ny firenena taranak''i Asera isam-pokony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-taniny dia Helkata sy Haly sy Batena sy Aksafa '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Alameleka sy Amada sy Misala, dia nihatra any Karmela eo andrefana sy Sihora-libnata, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nitodika niantsinanana ho any Beti-dagona ka nihatra any Zebolona sy ny lohasaha Jifta-ela any avaratra sy Bet-emeka sy Neiela, ka dia nihatra any Kabola eo ankavia '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Ebrona sy Rehoba sy Hamona sy Kana ka hatrany Sidona lehibe, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nitodika hatrany Rama sy Tyro, tanàna mimanda, dia nitodika hatrany Hosa, ka dia nihatra tamin''ny ranomasina teo akaikin''ny tany Akziba '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Hazara-soala sy Bala sy Azema '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Oma sy Afeka ary Rehoba: tanàna roa amby roa-polo sy ny zana-bohiny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no lovan''ny firenena taranak''i Asera araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loka fahenina dia an''ny taranak''i Naftaly isam-pokony. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-taniny dia hatrany Halefa ka hatramin''ny hazo terebinta ao Zananima sy hatrany Adami-hanekeba sy Jabniela ka hatrany Lakoma, ka dia nihatra an''i Jordana, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nitodika niankandrefana hatrany Aznota-tabara, dia nandroso hatrany Hokoka ary nihatra an''i Zebolona eo atsimo sy Asera eo andrefana ary Joda amoron''i Jordana eo atsinanana. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tanàna mimanda dia Zidima Zera sy Hamata sy Rakata sy Kinereta '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Adama sy Rama sy Hazora '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Kadesy sy Edrehy sy En-hazora '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Irona sy Migda ela sy Horema sy Bet-anata ary Beti-semesy: tanàna sivy ambin''ny folo sy ny zana-bohiny. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no lovan''ny firenena taranak''i Naftaly araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Eltolada sy Betola sy Horma '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loka fahafito dia an''ny firenena taranak''i Dana isam-pokony. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-tanin''ny lovany dia Zora sy Estaola sy Ira-semesy '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Salabima sy Aialona sy Jitla '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Elona sy Timna sy Ekrona '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Elteke sy Gibetona sy Baleta '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Jehoda sy Bene-beraka sy Gat-rimona '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Me-jarkona sy Rakona ary ny tany tandrifin''i Jopa. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-tanin''ny taranak''i Dana dia nandroso nihoatra ireo; fa niakatra ny taranak''i Dana, dia niady tamin''i Lesema ka nahafaka azy ary namely azy tamin''ny lelan-tsabatra ka nahazo azy, dia nitoetra teo; ary ny anaran''i Lesema nataony hoe Dana araka ny anaran''i Dana rainy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no lovan''ny firenena taranak''i Dana araka ny fokony, dia ireo tanàna ireo sy ny zana-bohiny. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia vitany ny nizarana ny tany holovany araka ny fari-taniny, ka dia nomen''ny Zanak''Isiraely lova teo aminy koa Josoa, zanak''i Nona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Ziklaga sy Beti-markabota sy Hazara-sosa '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny tenin''i Jehovah dia nomeny azy ny tanàna izay nangatahiny, dia Timnata-sera any amin''ny tany havoan''i Efraima: dia nanamboatra ny tanàna izy ka nitoetra tao.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no lova izay nozarain'i Eleazara mpisorona sy Josoa, zanak'i Nona, ary ny lohan'ny fianakaviana tamin'ny firenen'ny Zanak'Isiraely tao Silo teo anatrehan'i Jehovah, dia teo am-baravaran'ny trano-lay fihaonana, araka ny filokana. Dia vitany avokoa ny nizarany ny tany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Beti-lebaota ary Sarohena: tanàna telo ambin''ny folo sy ny zana-bohiny; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Aina sy Rimona sy Etera sy Asana: tanàna efatra sy ny zana-bohiny; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny zana-bohitra rehetra manodidina ireo tanàna ireo hatrany Baleta-bera sy Rama amin''ny tany atsimo. Izany no lovan''ny firenena taranak''i Simeona araka ny fotony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tamin''ny anjaran''ny taranak''i Joda no nahazoan''ny taranak''i Simeona ny lovany; fa nalalaka loatra taminy ny anjaran''ny taranak''i Joda, ka izany no nahazoan''ny taranak''i Simeona anjara tao anatin''ny azy. '
