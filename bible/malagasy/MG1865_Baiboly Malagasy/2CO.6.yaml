document_id: 2CO.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanarana ny Kristiana tao Korinto mba tsy hikamba amin'ny ratsy, sy filazana ny hafalian'i Paoly noho ny nibebahan'ireo, rehefa nahazo ny epistily nampitondrainy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izahay mpiara-miasa aminy dia mangataka aminareo koa mba tsy handraisanareo foana ny fahasoavan''Andriamanitra '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tahaka ny ampalahelovina, nefa faly mandrakariva; tahaka ny malahelo, nefa mampanan-karena ny maro; tahaka ny tsy manana na dia kely akory aza, nefa manana ny zavatra rehetra.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry Korintiana, ny vavanay misokatra aminareo, ny fonay malalaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy tery aminay ianareo, fa tery ao am-ponareo ihany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mba ho valiny toraka izany (izaho miteny toy ny amin''ny zanako), dia mba mihalalaha kosa ianareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mety hasiana zioga tsy antonona anareo hikambanana amin''ny tsy mino. Fa inona no iraisan''ny fahamarinana sy ny fahotana? Ary inona no iombonana''ny mazava sy ny maizina? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary inona no ifanarahan''i Kristy sy Beliala? Ary inona no iraisan''ny anjaran''ny mino sy ny tsy mino? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary inona no ikambanan''ny tempolin''Andriamanitra amin''ny sampy ? Fa isika no tempolin''Andriamanitra velona, araka ny nataon''Andriamanitra hoe: Honina eo aminy sy handeha eo aminy Aho, ary izy ho oloko (Lev. 26. 11, 12). '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mivoaha eo aminy ianareo, ka misaraha aminy, hoy Jehovah, Ary aza manendry izay zavatra tsy madio; Ary Izaho handray anareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho Rainareo Aho, ary ianareo ho zanako-lahy sy ho zanako-vavy, hoy Jehovah Tsitoha (Isa. 52. 11, 12).
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hoy Izy: Tamin''ny taona fankasitrahana no nihainoako anao, Ary tamin''ny andro famonjena no namonjeko anao (Isa. 49. 8); indro, ankehitriny no andro fankasitrahana; indro, ankehitriny no andro famonjena; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tsy manao izay mahatafintohina izahay na amin''inona na amin''inona, mba tsy homen-tsiny ny fanompoana; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa amin''ny zavatra rehetra dia mampiseho ny tenanay ho mpanompon''Andriamanitra izahay, dia amin''ny faharetana be, amin''ny fahoriana, amin''ny fahaterena, amin''ny fahantrana, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin''ny kapoka, amin''ny fatorana, amin''ny tabataba, amin''ny fisasarana, amin''ny tsy fahitan-tory, amin''ny fifadian-kanina, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin''ny fahadiovana, amin''ny fahalalana, amin''ny fahari-po, amin''ny fahamoram-panahy, amin''ny Fanahy Masina, amin''ny fitiavana tsy mihatsaravelatsihy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin''ny teny fahamarinana, amin''ny herin''Andriamanitra, amin''ny fiadian''ny fahamarinana, na amin''ny ankavanana na amin''ny ankavia, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin''ny voninahitra sy ny fahafaham-boninahitra, amin''ny laza ratsy sy ny laza soa; tahaka ny mpamitaka, nefa marina ihany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tahaka ny tsy fantatra, nefa fantatra tsara ihany ; tahaka ny efa ho faty, nefa, indro, velona ihany; tahaka ny faizana, nefa tsy atao maty; '
