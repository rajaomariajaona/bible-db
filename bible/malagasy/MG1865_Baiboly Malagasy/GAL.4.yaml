document_id: GAL.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy izaho: Raha mbola zaza ny mpandova, dia tsy hafa noho ny andevo izy, na dia tompon''ny zavatra rehetra aza; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Andro sy volana sy fotoana ary taona no tandremanareo fatratra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Matahotra ny aminareo aho, fandrao dia nisasatra foana taminareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ry rahalahy, mangataka aminareo aho, aoka ho tonga tahaka ahy ianareo, fa izaho kosa mba efa tonga tahaka anareo. Tsy naninona ahy akory ianareo; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'nefa fantatrareo fa noho ny fahalemen''ny nofo no nitoriako ny filazantsara taminareo tamin''ilay voalohany; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary ny teo amin''ny nofoko izay tonga fakam-panahy anareo dia tsy mba nohamavoinareo na nolavinareo; fa nandray ahy tahaka ny mandray anjelin''Andriamanitra ianareo, eny, dia tahaka an''i Kristy Jesosy aza. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Aiza ary ilay nataonareo ho fahasambarana? Fa vavolombelonareo aho fa raha azo atao, na dia ny masonareo aza dia ho nesorinareo ka nomenareo ahy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa efa tonga fahavalonareo va aho, satria milaza ny marina aminareo? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mazoto mila fitia aminareo izy ireo, nefa tsy araka ny mety; fa izy ta-hanidy anareo any ivelany, mba hampahazoto anareo hila fitia aminy kosa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa tsara raha ilam-pitia amin''ny tsara mandrakariva, na dia sendra tsy eo aminareo aza aho. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Anaka, izay aharariako indray amin''ny fiterahana mandra-paharin''i Kristy ao anatinareo, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'fa fehezin''izay mpitondra sy mpitaiza azy izy mandra-pahatongan''ny fetr''andro voatendrin''ny rainy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: enga anie ka ho tonga eo aminareo aho ankehitriny ka hanova ny feoko; fa misalasala aho ny aminareo.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Milazà amiko, ianareo izay te-ho ambanin''ny lalàna: tsy renareo va ny lalàna? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'fa voasoratra hoe: Abrahama nanana zanaka roa lahy, ny anankiray tamin''ny andevovavy, ary ny anankiray tamin''ny tsy andevo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Kanefa ilay tamin''ny andevovavy dia nateraka araka ny nofo; fa ilay tamin''ny tsy andevo kosa dia nateraka tamin''ny teny fikasana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary izany dia azo atao fanoharana; fa izy roa vavy ireo dia fanekena roa; ny anankiray avy tamin''ny tendrombohitra Sinay ka miteraka ho amin''ny fahandevozana, dia Hagara izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (Fa)'
      marker-yv: yv-n
    - type: text
      text: ' ny hoe Hagara dia ny tendrombohitra Sinay any Arabia ka mifamaly amin''i Jerosalema ankehitriny; fa andevo izy mbamin''ny zanany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa Jerosalema any ambony kosa, izay renintsika, dia tsy mba andevo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa voasoratra hoe: Mifalia, ramomba, izay tsy miteraka; Miantsoa sy minanananà, ianao izay tsy mbola mihetsi-jaza; Fa ny zanaky ny mpitondratena dia maro noho ny an''ny manana-bady (Isa. 54. 1). '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa isika, ry rahalahy, dia zanaky ny teny fikasana tahaka an''isaka. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Kanefa tahaka ny tamin''izany andro izany, ilay teraka araka ny nofo dia nanenjika ilay araka ny Fanahy, dia tahaka izany koa ankehitriny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia tahaka izany koa isika, fony mbola zaza, dia nandevozin''ny abidim-pianaran''izao tontolo izao; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nefa ahoana no lazain''ny Soratra Masina? Roahy io andevo-vavy io sy ny zananilahy; fa ny zanaky ny andevo tsy hiray lova amin''ny zanaky ny tsy andevo (Gen. 21. 10). '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary amin'izany, ry rahalahy, tsy zanak'andevovavy isika, fa zanaky ny tsy andevo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa rehefa tonga ny fotoan''andro, dia nirahin''Andriamanitra ny Zanany, nateraky ny vehivavy, nateraka tao ambanin''ny lalàna, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'hanavotany izay ambanin''ny lalàna, mba handraisantsika ny fananganan''anaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary satria zanaka ianareo, dia nirahin''Andriamanitra ho ato am-pontsika ny Fanahin''ny Zanany, miantso hoe: Aba, Ray ô. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ka dia tsy mpanompo intsony ianao, fa zanaka: ary raha zanaka, dia mpandova koa noho ny ataon''Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Kanefa tamin''izany, fony mbola tsy nahalala an''Andriamanitra ianareo, dia nanompo izay andriamani-tsi-izy; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'fa ankehitriny, rehefa mahalala an''Andriamanitra ianareo - nefa tsy izany, fa Izy no mahalala anareo - nahoana ianareo no dia miverina indray ho amin''ny abidim-pianarana malemy sady tsy misy na inona na inona, nefa tianareo hotompoina indray? '
