document_id: 2SA.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ratsy nataon'i Amnona, sy ny namonoan'i Absaloma azy, ary ny nandosiran'i Absaloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nony afaka izany, dia nisy toy izao: Absaloma, zanak''i Davida, nanana anabavy tsara tarehy, Tamara no anarany; ary tia azy Amnona, zanak''i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Amnona nalahelo ka matiny ihany noho Tamara anabaviny; fa virijina izy, ka sarotra tamin''i Amnona ny haka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Amnona nanan-tsakaiza, Jonadaba no anarany, zanak''i Simea, rahalahin''i Davida; ary Jonadaba dia olona fetsy loatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka hoy izy taminy: Nahoana ianao, ry zanaky ny mpanjaka, no mihamahia isan''andro isan''andro? Tsy tianao hambara amiko va izany? Dia hoy Amnona taminy: Tia an''i Tamara, anabavin''i Absaloma rahalahiko, aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Jonadaba taminy: Mandria eo amin''ny fandrianao ianao, ka modia marary; ary raha avy mamangy anao rainao, dia ataovy aminy hoe: Trarantitra ianao, aoka Tamara anabaviko mba ho avy hampihinan-kanina ahy ary hanao ny nahandro eto imasoko mba ho hitako ka hihinanako ny avy eny an-tànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nandry Amnona ka nody marary; ary nony avy mamangy azy ny mpanjaka, dia hoy izy taminy: Trarantitra ianao, aoka Tamara anabaviko hankatỳ hanao mofo roa ho ahy eto imasoko hihinanako ny avy eny an-tànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Davida naniraka nankany amin''i Tamara any an-tranony nanao hoe: Mankanesa kely any an-tranon''i Amnona anadahinao, ka manaova nahandro ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nandeha Tamara nankany an-tranon''i Amnona anadahiny; ary nandry ny anadahiny. Dia naka koba razazavavy, ka nofetafetainy ary nataony mofo teo imasony, ary nendasiny ny mofo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia noraisiny ny fanendasana, ka narosony teo anoloany; fa tsy nety nihinana izy. Ary hoy Amnona: Avoahy ny olona rehetra. Dia nivoaka ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Amnona tamin''i Tamara: Ento atỳ amin''ny efi-trano ny nahandro hihinanako ny avy eny an-tananao. Dia nalain''i Tamara ny mofo nataony ka nentiny tao amin''ny efi-trano tao amin''i Amnona anadahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony nentiny tao aminy hohaniny izany; dia nihazona an''i Tamara izy ka nanao taminy hoe: Avia handry amiko, ranabaviko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny anabaviny: Sanatria, ranadahy! Aza misavika ahy; fa tsy fanao eto amin''ny Isiraely izany; aza manao izany zavatra fady indrindra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fahadalana
    marker-yv: yv-n
  - type: text
    text: ' izany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny amiko, ho entiko aiza moa ny henatro? Ary ianao koa ho toy ny anankiray amin''ny adala eto amin''ny Isiraely. Koa trarantitra ianao, lazao amin''ny mpanjaka; fa tsy hisakana ahy tsy ho anao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa tsy nety nihaino ny feon-drazazavavy izy, fa natanjaka noho izy, dia nisavika azy ka nandry taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary dia halan''i Amnona indrindra izy, ka ny fankahalany azy dia be lavitra noho ny fitiavany azy taloha. Dia hoy Amnona taminy: Mitsangàna, mandehana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy izy taminy: Aza dia manao ratsy mandroaka ahy ianao, fa ratsy noho ny zavatra hafa nataonao izao. Nefa tsy nety nihaino azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niantso ny zatovony izay nanompo azy izy ka nanao hoe: Esory hiala eto amiko ity vehivavy ity, ka hidio ny varavarana, rehefa tafavoaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary niakanjo akanjo lava
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: akanjo misoratsoratra'
    marker-yv: yv-n
  - type: text
    text: ' razazavavy; fa izany no fanaon''ny zanakavavin''ny mpanjaka ho akanjo ambony, raha mbola virijina izy. Dia navoakan''ilay ankizilahy izy, ka nohidiany ny varavarana, nony tafavoaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nasian''i Tamara lavenona ny lohany, sady notriariny ny akanjo lava izay niakanjoany, dia niloloha tanana izy, sady nitomany nidradradradra teny am-pandehanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Absaloma anadahiny taminy: Efa tany aminao va Amnona anadahinao? Mangina ihany aloha, ranabavy, fa anadahinao izy; fa aza malahelo noho izany. Ka dia nitoetra tao an-tranon''i Absaloma anadahiny Tamara sady ory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa nony ren''i Davida mpanjaka izany zavatra rehetra izany, dia nirehitra ny fahatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Absaloma tsy nifampiteny tamin'i Amnona rahalahiny akory na soa na ratsy; fa halan'i Absaloma izy noho ny nisavihany an'i Tamara anabaviny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nony afaka roa taona ngarangidina, dia nampanety ondry teo Bala-hazora ao akaiky an''i Efraima Absaloma, ka nanasa ny zanakalahin''ny mpanjaka rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nankao amin''ny mpanjaka Absaloma ka nanao hoe: Indro, mampanety ondry ny mpanomponao; koa trarantitra ianao, aoka ny mpanjaka sy ny mpanompony handeha hiaraka amiko mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy ny mpanjaka tamin''i Absaloma: Tsia, anaka, aoka tsy handeha avokoa izahay rehetra, fandrao mahavaky tratra anao. Fa Absaloma nanery azy ihany; nefa tsy nety nandeha izy, fa nitso-drano azy ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy Absaloma: Raha tsy izany ary, trarantitra ianao, aoka Amnona rahalahiko no handeha hiaraka aminay. Ary hoy ny mpanjaka taminy: Ahoana no hiarahany aminao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa nanery azy Absaloma, ka dia nalefany Amnona sy ny zanakalahin''ny mpanjaka rehetra handeha hiaraka aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Absaloma nanome teny ny zatovony hoe: Miomàna tsara, fa rehefa faly ny fon''i Amnona azon''ny divay, ka lazaiko aminareo hoe: Asio Amnona, dia ataovy maty izy, fa aza matahotra; tsy izaho va no nanome teny anareo? Matokia, aoka hiseho ho lehilahy mahery ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny zatovon''i Absaloma nanao tamin''i Amnona araka ny teny nomen''i Absaloma azy. Dia nitsangana avokoa ny zanakalahin''ny mpanjaka rehetra, ary samy nitaingina ny ampondrany ka nandositra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary raha mbola teny an-dalana izy ireo, dia tonga tao amin''i Davida ny filazana hoe: novonoin''i Absaloma avokoa ny zanakalahin''ny mpanjaka, ka tsy nasiany miangana na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nitsangana ny mpanjaka ka nandriatra ny fitafiany, dia nandry tamin''ny tany; ary ny mpanompony rehetra nitsangana teo, samy voatriatra avokoa ny fitafiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Jonadaba, zanak''i Simea, rahalahin''i Davida, nanao hoe: Aoka ny tompoko tsy hanao hoe: Matiny avokoa ny zatovo rehetra, zanakalahin''ny mpanjaka; fa Amnona ihany no maty; fa Absaloma efa nifofo azy hatramin''ny andro nisavihany an''i Tamara anabaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa aoka ny mpanjaka tompoko tsy hieritreritra am-po fa maty avokoa ny zanakalahin''ny mpanjaka rehetra; fa Amnona ihany no maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa Absaloma nandositra. Ary ny zatovo mpitily nanopy ny masony ka nahita fa, indreo nisy olona maro avy teo ivohony, teo anilan''ny tendrombohitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary hoy Jonadaba tamin''ny mpanjaka: Indreo, avy ny zanakalahin''ny mpanjaka, dia araka ny nolazain''ny mpanomponao tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary nony efa voalazany izany teny izany, dia indreo, tonga ny zanakalahin''ny mpanjaka, ary nanandratra ny feony izy ka nitomany; ary ny mpanjaka sy ny mpanompony dia mba nitomany mafy dia mafy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa Absaloma nandositra nankany amin''i Talmay, zanakalahin''i Amihoda, mpanjakan''i Gesora. Ary nisaona ny zanany mandrakariva Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary Absaloma efa nandositra nankany Gesora ka nitoetra tany telo taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ary Davida mpanjaka naniry hivoaka hankany amin'i Absaloma
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Koa izany no nisakana an''i Davida mpanjaka tsy hivoaka hamely an''i Absaloma'
    marker-yv: yv-n
  - type: text
    text: ; fa nionona izy noho ny amin'i Amnona, satria efa maty izy.
