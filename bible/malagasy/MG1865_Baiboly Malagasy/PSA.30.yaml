document_id: PSA.30,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fisaorana nataon'izay narary mafy noho ny namonjen'Andriamanitra ny ainy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salamo. Fihirana tamin''ny nitokanana ny trano. Nataon''i Davida. Hanandratra Anao aho, Jehovah ô; fa nanintona ahy niakatra Hianao, ka tsy nataonao ho fifalian''ny fahavaloko aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihainoa, Jehovah ô, ka mamindrà fo amiko; Jehovah ô, aoka ho Mpamonjy ahy Hianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nampody ny fisaonako ho fandihizana Hianao; efa nanaisotra ny lamba fisaonako Hianao ka nampisikina ahy fifaliana, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hankalazan'ny fanahiko
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: voninahitro'
      marker-yv: yv-n
    - type: text
      text: ' Anao ka tsy hangina. Jehovah Andriamanitro ô, hidera Anao mandrakizay aho.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah Andriamanitro ô, nitaraina taminao aho, dia nahasitrana ahy Hianao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah ô, efa nampakatra ny fanahiko avy tany amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: Sheola'
      marker-yv: yv-n
    - type: text
      text: ' Hianao; efa nampody ny aiko Hianao, mba tsy ho isan''izay midina any an-davaka aho.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mankalazà an'i Jehovah, ry olony masina, ka miderà ny anarany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: fahatsiarovana'
      marker-yv: yv-n
    - type: text
      text: ' masina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa indray mipi-maso ihany ny fahatezerany; nefa mandritra ny andro iainana kosa ny fankasitrahany; amin''ny hariva dia misy fitomaniana tonga hivahiny miloaka alina; Fa nony maraina kosa dia misy fihobiana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hoy izaho, raha mbola niadana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: Na: noho ny fiadanako'
      marker-yv: yv-n
    - type: text
      text: ': tsy hangozohozo mandrakizay aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah ô, noho ny fankasitrahanao dia nampitoerinao mafy ny tendrombohitro; nanafina ny tavanao Hianao, dia ory aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao no nantsoiko, Jehovah ô; ary Jehovah no nifonako hoe: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona no soa azo amin''ny rako sy ny hidinako any an-davaka? Hidera Anao va ny vovoka? Hanambara ny fahamarinanao va izany? '
