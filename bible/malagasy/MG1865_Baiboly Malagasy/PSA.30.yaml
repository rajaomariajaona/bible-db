document_id: PSA.30,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana nataon'izay narary mafy noho ny namonjen'Andriamanitra ny ainy
  - type: text
    content: 'Salamo. Fihirana tamin''ny nitokanana ny trano. Nataon''i Davida. Hanandratra Anao aho, Jehovah ô; fa nanintona ahy niakatra Hianao, ka tsy nataonao ho fifalian''ny fahavaloko aho. '
  '10':
  - type: text
    content: 'Mihainoa, Jehovah ô, ka mamindrà fo amiko; Jehovah ô, aoka ho Mpamonjy ahy Hianao. '
  '11':
  - type: text
    content: 'Efa nampody ny fisaonako ho fandihizana Hianao; efa nanaisotra ny lamba fisaonako Hianao ka nampisikina ahy fifaliana, '
  '12':
  - type: text
    content: Mba hankalazan'ny fanahiko
  - type: note
    content: 'Heb: voninahitro'
  - type: text
    content: ' Anao ka tsy hangina. Jehovah Andriamanitro ô, hidera Anao mandrakizay aho.'
  '2':
  - type: text
    content: 'Jehovah Andriamanitro ô, nitaraina taminao aho, dia nahasitrana ahy Hianao. '
  '3':
  - type: text
    content: Jehovah ô, efa nampakatra ny fanahiko avy tany amin'ny fiainan-tsi-hita
  - type: note
    content: 'Heb: Sheola'
  - type: text
    content: ' Hianao; efa nampody ny aiko Hianao, mba tsy ho isan''izay midina any an-davaka aho.'
  '4':
  - type: text
    content: Mankalazà an'i Jehovah, ry olony masina, ka miderà ny anarany
  - type: note
    content: 'Heb: fahatsiarovana'
  - type: text
    content: ' masina. '
  '5':
  - type: text
    content: 'Fa indray mipi-maso ihany ny fahatezerany; nefa mandritra ny andro iainana kosa ny fankasitrahany; amin''ny hariva dia misy fitomaniana tonga hivahiny miloaka alina; Fa nony maraina kosa dia misy fihobiana. '
  '6':
  - type: text
    content: Ary hoy izaho, raha mbola niadana
  - type: note
    content: 'Heb: Na: noho ny fiadanako'
  - type: text
    content: ': tsy hangozohozo mandrakizay aho. '
  '7':
  - type: text
    content: 'Jehovah ô, noho ny fankasitrahanao dia nampitoerinao mafy ny tendrombohitro; nanafina ny tavanao Hianao, dia ory aho. '
  '8':
  - type: text
    content: 'Hianao no nantsoiko, Jehovah ô; ary Jehovah no nifonako hoe: '
  '9':
  - type: text
    content: 'Inona no soa azo amin''ny rako sy ny hidinako any an-davaka? Hidera Anao va ny vovoka? Hanambara ny fahamarinanao va izany? '
