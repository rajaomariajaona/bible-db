document_id: 1SA.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nangatahan'ny Isiraely mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa antitra Samoela, dia ny zanany no nataony mpitsara ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Joela no anaran''ny lahimatoany, ary Abia no anaran''ny faralahiny; mpitsara tany Beri-sheba izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nefa ny zanany tsy nanaraka ny dian-drainy, fa nivily nitady vola aman-karena ka nandray kolikoly sy nanao fitsarana miangatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny loholon''ny Isiraely rehetra nivory tao Rama ho any amin''i Samoela '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka nanao taminy hoe: Indro, efa antitra ianao, ary ny zanakao tsy manaraka ny dianao; koa manendre mpanjaka ho anay hitsara anay, tahaka ny firenena rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa tsy sitrak''i Samoela ny nanaovan''ny olona hoe: Omeo mpanjaka izahay hitsara anay. Dia nivavaka tamin''i Jehovah Samoela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Samoela: Henoy ihany ny tenin''ny olona amin''izany rehetra lazainy aminao; fa tsy ianao no laviny, fa Izaho no laviny tsy hanjaka aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Araka ny asa rehetra izay nataony hatramin''ny andro nitondrako azy nivoaka avy tany Egypta ka mandraka androany, dia ny nahafoizany Ahy sy ny nanompoany andriamani-kafa, dia toy izany koa no ataony aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ankehitriny henoy ihany ny teniny, kanefa lazao aminy marimarina, ka asehoy azy ny ho fanaon'ny mpanjaka izay hanjaka aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nambaran''i Samoela tamin''ny olona izay nangataka mpanjaka taminy ny teny rehetra nolazain''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy izy: Izao no ho fanaon''ny mpanjaka izay hanjaka aminareo: Ny zanakareo-lahy dia halainy ka hotendreny ho amin''ny kalesiny sy ho mpitaingin-tsoavaliny ary hihazakazaka eo alohan''ny kalesiny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary hotendreny ho mpifehy arivo sy ho mpifehy dimam-polo, ary hiasa ny taniny sy hijinja ny vokany ary hanao ny fiadiany sy ny fanaka momba ny kalesiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary ny zanakareo-vavy dia halainy ho mpangaroharo zava-manitra ary ho mpahandro sy mpanao mofo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary ny tsara indrindra amin''ny sahanareo sy ny tanim-boalobokareo sy ny tanin''olivanareo dia halainy ka homeny ho an''ny mpanompony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ary ny ampahafolon'ny voan-javatrareo sy ny tanim-boalobokareo dia halainy ka homeny ho an'ny tandapany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ionoka
    marker-yv: yv-n
  - type: text
    text: ' sy ny tandonany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny ankizilahinareo sy ny ankizivavinareo sy ny zatovonareo tsara indrindra ary ny borikinareo dia halainy ka hampanaoviny ny asany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary halainy koa ny ampahafolon''ny ondry aman''osinareo; ary ny tenanareo ho tonga mpanompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hitaraina amin''izany andro izany ianareo noho ny mpanjakanareo izay nofidinareo ho anareo, fa Jehovah tsy hamaly anareo amin''izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanefa tsy nety nihaino ny tenin''i Samoela ny olona, fa hoy izy: Tsia, fa aoka ihany hisy mpanjaka hanjaka aminay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'mba ho tahaka ny firenena rehetra koa izahay, ka ny mpanjakanay hitsara anay sy hivoaka eo alohanay ary hitarika ny adinay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ren''i Samoela ny teny rehetra nolazain''ny olona, ka dia nolazainy teo anatrehan''i Jehovah kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Samoela: Henoy ny teniny ka manendre mpanjaka ho azy. Dia hoy Samoela tamin''ny lehilahy amin''ny Isiraely: Samia ary mandeha ho any amin''ny tanànanareo avy ianareo rehetra.'
