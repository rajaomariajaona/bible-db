document_id: JER.41,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tamin''ny volana fahafito dia tonga tany amin''i Gedalia, zanak''i Ahikama, tao Mizpa Isimaela, zanak''i Netania, zanak''i Elisama, taranaky ny mpanjaka, sy ny mpanapaky ny mpanjaka; ary nisy folo lahy niaraka taminy; ary niara-nihinan-kanina tao Mizpa izy. '
  '10':
  - type: text
    content: 'Ary nentin''Isimaela ho babo ny olona rehetra izay sisa tao Mizpa, na ny vehivavy zanak''andriana, na ny olona rehetra izay sisa tao Mizpa, izay napetrak''i Nebozaradana, lehiben''ny mpiambina, tao amin''i Gedalia, zanak''i Ahikama; eny, Isimaela, zanak''i Netania, nitondra azy ireny ho babo, ka dia lasa niala nankany amin''ny taranak''i Amona izy. '
  '11':
  - type: text
    content: 'Fa nony ren''i Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy ny ratsy rehetra nataon''Isimaela, zanak''i Netania, '
  '12':
  - type: text
    content: dia novoriny ny olona rehetra ka nentiny niady tamin'Isimaela, zanak'i Netania ary hitany teo amoron'ny kamory
  - type: note
    content: Heb. ny rano be
  - type: text
    content: ' ao Gibeona izy. '
  '13':
  - type: text
    content: 'Ary ny olona rehetra izay tao amin''Isimaela, nony nahita an''i Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy, dia faly. '
  '14':
  - type: text
    content: 'Ary ny olona rehetra izay nentin''Isimaela ho babo avy tany Mizpa dia nitodika ka niverina nanatona an''i Johanana, zanak''i Karea. '
  '15':
  - type: text
    content: 'Fa Isimaela, zanak''i Netania, sy ny olona valo lahy kosa dia afaka nandositra an''i Johanana ka lasa nankany amin''ny taranak''i Amona. '
  '16':
  - type: text
    content: 'Ary Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay tao aminy dia nitondra ny olona rehetra izay voavonjiny ho afaka tamin''Isimaela, zanak''i Netania, avy tany Mizpa, taorian''ny namonoany an''i Gedalia, zanak''i Ahikama, dia ny lehilahy mpiady sy ny zaza amim-behivavy ary ny tandapa, izay nentiny niverina avy tany Gibeona; '
  '17':
  - type: text
    content: ary dia lasa izy ireo ka nitoetra tao Gerota-kimama
  - type: note
    content: 'Na: an-tranom-bahinin''i Kimama'
  - type: text
    content: ', izay ao akaikin''i Betlehema, mba handehanany hankany Egypta. '
  '18':
  - type: text
    content: tsy ho tratry ny Kaldeana; fa natahotra azy izy, satria Isimaela, zanak'i Netania, efa namono an'i Gedalia, zanak'i Ahikama, izay notendren'ny mpanjakan'i Babylona ho mpanapaka ny tany.
  '2':
  - type: text
    content: 'Dia nitsangana Isimaela, zanak''i Netania, sy ireo olona folo lahy niaraka taminy ka namely sabatra an''i Gedalia, zanak''i Ahikama, zanak''i Safana, dia nahafaty ilay efa nataon''ny mpanjakan''i Babylona ho mpanapaka ny tany. '
  '3':
  - type: text
    content: 'Ary ny Jiosy rehetra izay tao aminy, dia izay tao amin''i Gedalia tao Mizpa, sy ny Kaldeana izay hita tao ary ny miaramila dia novonoin''Isimaela avokoa. '
  '4':
  - type: text
    content: 'Ary nony ampitson''ny andro namonoana an''i Gedalia, raha tsy mbola nisy olona nahalala izany, '
  '5':
  - type: text
    content: 'dia nisy valo-polo lahy avy tany Sekema sy Silo ary Samaria, izay samy mihara-bolom-bava, sady voatriatra ny fitafiany, ary voatetika ny tenany, nitondra fanatitra sy ditin-kazo mani-pofona teny an-tànany ho entina ao an-tranon''i Jehovah. '
  '6':
  - type: text
    content: 'Ary Isimaela, zanak''i Netania, dia nivoaka avy tao Mizpa hitsena azy sady nitomany teny ampandehanana, ary nony efa nihaona taminy izy, dia niteny taminy hoe: Mankanesa any amin''i Gedalia, zanak''i Ahikama. '
  '7':
  - type: text
    content: 'Ary nony tonga tao afovoan''ny tanàna izy ireo, dia novonoin''Isimaela, zanak''i Netania, mbamin''ny olona nanaraka azy izy ka nariany tao anaty lavaka famorian-drano. '
  '8':
  - type: text
    content: 'Fa nisy folo lahy tamin''ireo nanao tamin''Isimaela hoe: Aza vonoina izahay; fa manan-tahiry any an-tsaha izahay, dia vary tritika sy vary hordea sy diloilo ary tantely. Ka dia nijanona izy, fa tsy namono ireo tahaka ny efa nataony tamin''ny namany. '
  '9':
  - type: text
    content: 'Ary ilay lavaka nanarian''Isimaela ny fatin''ny olona rehetra, izay novonoiny ho eo anilan''i Gedalia, dia ilay efa nataon''i Asa mpanjaka mba hiereny an''i Basa, mpanjakan''ny Isiraely, dia nofenoin''Isimaela, zanak''i Netania, faty. '
