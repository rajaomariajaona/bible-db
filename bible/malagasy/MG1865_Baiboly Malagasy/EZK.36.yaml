document_id: EZK.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fifampiankinan'ny famonjena ny Isiraely sy ny fahamasinany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ianao, ry zanak''olona, maminania amin''ny tendrombohitry ny Isiraely, ka ataovy hoe: Ry tendrombohitry ny Isiraely, mihainoa ny tenin''i Jehovah: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Noho ny nanaovan''ny fahavalo anareo hoe: Hià! efa lasanay ny havoana fahagola! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia maminania, ka lazao hoe: Izao no lazain''i Jehovah Tompo: Noho ny nandravany anareo sy ny nisafoahany nanenjika anareo avy amin''ny tany manodidina, ka dia efa lasan''ny jentilisa sisa ho fananany ianareo, sady efa nataon''ny molotry ny mpibedibedy fitenenana ka efa ambentinteny amin''ny firenena, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia mihainoa ny tenin''i Jehovah Tompo, ry tendrombohitry ny Isiraely: Izao no lazain''i Jehovah Tompo amin''ny tendrombohitra sy ny havoana, ny lohasahan-driaka sy ny lohasaha ary amin''ny korontam-bato sy ny tanàna haolo, izay efa babo sy fandatsa ho an''ny firenena sisa amin''ny manodidina, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eny, izao no lazain''i Jehovah Tompo: Tamin''ny afon''ny  fahasaro-piaroko no nitenenako tokoa Namely ny firenena sisa sy Edoma rehetra, Izay nahalasa ny taniko ho fananany Tamin''ny hafalian''ny fony tokoa sy tamin''ny fanahy mamingavinga, mba hangoronany azy ho babo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa maminania ny amin''ny tanin''ny Isiraely, ka lazao amin''ny tendrombohitra sy ny havoana ary ny lohasahan-driaka sy ny lohasaha hoe: Izao no lazain''i Jehovah Tompo: (Indro, tamin''ny fahasaro-piaroko sy ny fahatezerako no nitenenako): Noho ny nitondranareo latsa tamin''ny firenena, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia izao no lazain''i Jehovah Tompo: Izaho efa nanangan-tanana nanao hoe; Ny firenena manodidina anareo no hitondra henatra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ianareo kosa, ry tendrombohitry ny Isiraely, dia hisandrahaka sy hahavokatra ho an''ny Isiraely oloko; Fa efa antomotra ny hihavian''ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa, indro, hitodika ho aminareo Aho ka hanatrika anareo; Dia hasaina sy hofafazana ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hahamaro ny olona eny aminareo Aho, dia ny taranak''Isiraely rehetra rehetra, ary honenana ny tanàna, ka haorina indray ny efa rava; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hampitombo olona sy biby fiompy eny aminareo Aho, ka hitombo sy hiteraka ireo; Hametrahako mponina tahaka ny taloha any aminareo, ary hanisy soa anareo mihoatra noho ny tamin''ny niandohanareo Aho; Ka dia ho fantatrareo fa Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, hampivoivoy olona eny aminareo Aho, dia ny Isiraely oloko; Dia hanana anareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. anao
    marker-yv: yv-n
  - type: text
    text: ' izy ka hahalasa anareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. anao
    marker-yv: yv-n
  - type: text
    text: ' ho lovany, ary tsy hahalany fara azy intsony ianareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ianao
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Noho ny nanaovany taminareo hoe: Hianao, ry tany, dia mandany olona, Sady mahalany fara ny firenenao, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia tsy handany olona intsony ianao, na hahalavo ny firenenao intsony, hoy Jehovah Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary hataoko tsy mahare ny latsan'ny jentilisa intsony ianao Sady tsy hitondra ny fanaratsian'olona intsony; Ary tsy hahalavo ny firenenao intsony ianao, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ry zanak'olona, ny taranak'Isiraely nonina tany amin'ny taniny, dia nandoto izany tamin'ny fanaony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalany
    marker-yv: yv-n
  - type: text
    text: ' sy tamin''ny asany izy; fa tahaka ny fahalotoan''ny vehivavy mararin''ny fadim-bolana no fahalotoan''ny fanaony'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalany
    marker-yv: yv-n
  - type: text
    text: ' eo anatrehako. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ka dia naidiko ho aminy ny fahatezerako mirehitra noho ny rà nalatsany teo amin''ny tany sy noho ny nandotoany izany tamin''ny sampiny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary naeliko ho any amin'ny firenena izy ka nahahaka ho any amin'ny tany samy hafa; araka ny fanaony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalany
    marker-yv: yv-n
  - type: text
    text: ' sy ny asany no nitsarako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nony tonga tany amin''ny firenena izay nalehany izy, dia tonga fandotoana ny anarako masina tamin''ny nanaovan''ny olona azy hoe: Ireo no olon''i Jehovah, nefa niala tamin''ny tanin''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia namindrako fo ny anarako masina, izay nolotoin''ny taranak''Isiraely tany amin''ny firenena izay nalehany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa atsovy amin''ny taranak''Isiraely hoe: Izao no lazain''i Jehovah Tompo: Tsy noho ny aminareo no anaovako izany, ry taranak''Isiraely, fa noho ny anarako, masina, izay nolotoinareo tany amin''ny jentilisa izay nalehanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hohamasiniko ny anarako lehibe izay efa nolotoinareo tany amin''ny jentilisa, ka dia ho fantany fa Izaho no Jehovah, hoy Jehovah Tompo, rehefa miseho ho masina eo imasony Aho amin''ny ataoko aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa halaiko avy any amin''ny jentilisa ianareo ary hangoniko avy any amin''ny tany rehetra ka ho entiko ho any amin''ny taninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hofafazako rano madio ianareo, ka hadio; ny mba ho afaka amin''ny fahalotoanareo rehetra sy ny sampinareo rehetra no hanadiovako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary homeko fo vaovao ianareo, ary fanahy vaovao no hataoko ao anatinareo, ary hesoriko amin''ny nofonareo ny fo vato, ka homeko fo nofo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny Fanahiko no hataoko ao anatinareo, ka hahatonga anareo handeha araka ny lalàko sy hitandrina ny fitsipiko ka hanaraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary honina any amin''ny tany izay nomeko ny razanareo ianareo, ka ho oloko ianareo, ary Izaho ho Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hovonjeko ho afaka amin''ny fahalotoanareo rehetra ianareo, ary hantsoiko sy hataoko vokatra ny vary, ary tsy hanaterako mosary intsony ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ary hataoko vokatra koa ny voankazo sy ny vokatry ny saha, mba tsy ho voalatsan''ny jentilisa amin''ny mosary intsony ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hotsarovanareo ny lalan-dratsinareo sy ny fanao tsy metinareo, ka dia haharikoriko anareo ny tenanareo noho ny fahadisoanareo sy ny fahavetavetanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tsy noho ny aminareo no anaovako izany, hoy Jehovah Tompo aoka ho fantatrareo izany; koa menara sy mangaihaiza ianareo noho ny lalanareo, ry taranak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Amin''ny andro hanadiovako anareo ho afaka amin''ny helokareo rehetra dia hametrahako mponina ao amin''ny tanana, ary haorina indray ny efa rava. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hasaina ny tany efa lao, fa tsy ho lao eo imason''ny mpandalo rehetra intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa holazainy hoe: Ity tany efa lao ity dia tonga tahaka ny saha Edena; ary ny tanàna efa foana sy lao dia misy mponina sady asiana manda; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ka dia ho fantatry ny jentilisa sisa manodidina anareo fa Izaho Jehovah no manorina indray ny efa rava sy mamboly izay efa foana. Izaho Jehovah no niteny sady hahatanteraka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Mbola hotadiavin''ny taranak''Isiraely Aho amin''ny hanaovako izao ho azy; hohamaroiko toy ny ondry ny olony. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Toy ny ondry aman'osy masina, izay any Jerosalema amin'ny fotoam-pivavahana, dia toy izany no hahafenoan'ny tanànany efa lao amin'ny olona maro toy ny ondry aman'osy; ka dia ho fantatra fa Izaho no Jehovah.
