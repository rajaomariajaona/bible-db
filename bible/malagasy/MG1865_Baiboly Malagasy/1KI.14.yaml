document_id: 1KI.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan-dRehoboama tamin'ny Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''izany andro izany dia narary Abia, zanak''i Jeroboama. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Jeroboama tamin''ny vadiny: Masìna ianao, mitsangàna, ka miovà endrika, mba tsy ho fantatr''olona ho vadin''i Jeroboama ianao; dia mankanesa any Silo, fa, indro, ao Ahia mpaminany, ilay nilaza tamiko fa ho mpanjakan''ity firenena ity aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa mitondrà mofo folo sy mofo madinika ary tantely iray tavoara, ka mankanesa any aminy; fa izy hanambara aminao izay ho toetry ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nanao araka izany ny vadin''i Jeroboama ka niainga nankany Silo izy, dia nankao an-tranon''i Ahia. Ary Ahia tsy nahita, fa efa pahina ny masony noho ny fahantrany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jehovah efa nilaza tamin''i Ahia hoe: Indro, avy ny vadin''i Jeroboama hanontany anao ny amin''ny zanany, fa marary izy; ary izao ka izao no holazainao aminy; nefa raha miditra izy, dia hody vehivavy hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony ren''i Ahia ny fingodongodon''ny tongony, raha vao niditra teo am-baravarana izy, dia hoy izy: Mandrosoa, ry vadin''i Jeroboama; nahoana ianao no mody olonkafa? Fa izaho dia nirahina hitondra teny mafy aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa mandehana, ka lazao amin''i Jeroboama hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Satria nanandratra anao avy tamin''ny olona Aho ka nanendry anao ho mpanapaka ny Isiraely oloko, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary nendahako ny fanjakana ho afaka tamin''ny taranak''i Davida ka nomeko anao, nefa kosa ianao tsy mba nanao tahaka an''i Davida mpanompoko, izay nitandrina ny teniko sy nanaraka Ahy tamin''ny fony rehetra tsy hanao na inona na inona afa-tsy izay marina eo imasoko ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'fa nanao ratsy mihoatra noho izay rehetra teo alohanao ianao, fa lasa nanao andriamani-kafa sy sarin-javatra an-idina ka nampahatezitra Ahy, fa Izaho efa narianao teo ivohonao: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'koa noho izany dia, indro, hahatonga loza amin''ny taranak''i Jeroboama Aho ka handringana izay lehilahy rehetra amin''ny tamingan''i Jeroboama, na ny voahazona na ny afaka amin''ny Isiraely, ary hanaisotra ny sisa amin''ny taranak''i Jeroboama Aho, toy ny fanaisotry ny olona ny diky ambara-paha-tsy hisy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izay tamingan''i Jeroboama maty ao an-tanàna dia hohanin''ny alika; ary izay maty any an-tsaha dia hohanin''ny voro-manidina; fa Jehovah no efa niteny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa mitsangàna ianao, ka modia any an-tranonao; fa raha vao mijadona ao an-tanàna ny tongotrao, dia, indro, ho faty ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny Isiraely rehetra hisaona sy handevina azy; fa amin''ny tamingan''i Jeroboama dia izy irery ihany no ho tonga ao am-pasana, satria izy ihany no nahitana fahatsaram-panahy ny amin''i Jehovah, Andriamanitry ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jehovah hanangana mpanjaka ho an''ny Isiraely izay handringana ny taranak''i Jeroboama amin''izany andro izany; fa rahoviana ange izany? Izao ankehitriny izao ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa Jehovah hamely ny Isiraely toy ny volotara hozongozonina any anaty rano sady hanongotra ny Isiraely amin'ity tany soa nomeny ny razany ity ary hanely azy ho any an-dafin'ny Ony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: ', satria nanao ireo Aseraha izy ka nampahatezitra an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary Izy hanolotra ny Isiraely noho ny fahotana izay nataon'i Jeroboama sady nampanotany ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niainga ny vadin''i Jeroboama ka lasa nandeha ary tonga tany Tirza; koa rehefa mby teo amin''ny tokonam-baravarana izy, dia maty ny zazalahy; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: dia nandevina azy ny Isiraely rehetra sady nisaona azy, araka ny tenin'i Jehovah izay nampilazainy an'i Ahia mpaminany mpanompony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny tantaran''i Jeroboama sisa, dia ny niadiany sy ny nanjakany, indro, efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely izany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny andro nanjakan'i Jeroboama dia roa amby roa-polo taona; dia lasa nodi-mandry any amin'ny razany izy; ary Nadaba zanany no nanjaka nandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Rehoboama, zanak''i Solomona, no nanjaka tamin''ny Joda. Efa iraika amby efa-polo taona Rehoboama, fony izy vao nanjaka, ary fito ambin''ny folo taona no nanjakany tany Jerosalema, tanàna nofidin''i Jehovah tamin''ny firenen''Isiraely rehetra hametrahany ny anarany. Ary ny anaran-dreniny dia Nama Amonita. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny Joda nanao izay ratsy eo imason''i Jehovah ka nampahasaro-piaro Azy tamin''ny fahotana izay nataony mihoatra noho izay rehetra nataon''ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa izy koa nanao fitoerana avo ho azy sy tsangam-baton-tsampy ary Aseraha
  - type: usfm
    marker: x
    children:
    - type: text
      text: Anaran'andriamani-tsi-izy, na ny sariny
    marker-yv: yv-n
  - type: text
    text: ' teny an-tampon''ny tendrombohitra avo rehetra sy teny ambanin''ny hazo maitso rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary nisy olona nanolo-tena nijangajanga ho fanompoan-tsampy teo amin'ny tany; ary nanaraka ny fahavetavetana rehetra fanaon'ny firenena izay noroahin'i Jehovah teo anoloan'ny Zanak'Isiraely izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary tamin''ny taona fahadimy nanjakan-dRehoboama mpanjaka dia niakatra Sisaka, mpanjakan''i Egypta, hamely an''i Jerosalema; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'dia nobaboiny ny rakitry ny tranon''i Jehovah sy ny rakitry ny tranon''ny mpanjaka ka lasany avokoa; ary nobaboiny koa ny ampinga volamena rehetra nataon''i Solomona '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Rehoboama mpanjaka nanao ampinga varahina ho solon''ireny ka nanolotra azy teo an-tànan''ny lehiben''ny mpiambina, izay niambina ny varavaran''ny tranon''ny mpanjaka '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary na oviana na oviana no nidiran'ny mpanjaka tao an-tranon'i Jehovah, dia nentin'ny mpiambina ireo ka naveriny tao an-trano fiambenana indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny tantaran-dRehoboama sisa mbamin''izay rehetra nataony, tsy voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary niady mandrakariva Rehoboama sy Jeroboama. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary Rehoboama lasa nodi-mandry any amin'ny razany, dia nalevina tao amin'ny razany tao an-Tanànan'i Davida. Ary ny anaran-dreniny dia Nama Amonita. Ary Abia zanany no nanjaka nandimby azy.
