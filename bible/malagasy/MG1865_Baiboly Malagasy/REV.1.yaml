document_id: REV.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fisehoan'ny voninahitr'i Kristy
  - type: text
    content: 'Ny Fanambaran''i Jesosy Kristy, izay nomen''Andriamanitra Azy, mba hasehony amin''ny mpanompony izay zavatra tsy maintsy ho tonga faingana; ary naniraka ny anjeliny Izy hanambara amin''i Jaona mpanompony, '
  '10':
  - type: text
    content: 'Voatsindrin''ny Fanahy tamin''ny Andron''ny Tompo aho ka nahare feo mahery teo ivohoko, toy ny feon''ny trompetra, '
  '11':
  - type: text
    content: 'nanao hoe: Izay zavatra hitanao dia soraty eo amin''ny boky, ka ampitondray ho any amin''ny fiangonana'
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' fito, dia ho any Efesosy sy Smyrna sy Pergamosy sy Tyatira sy Sardisy sy Filadelfia ary Laodikia. '
  '12':
  - type: text
    content: 'Dia nitodika aho nizaha ilay feo niteny tamiko. Koa rehefa nitodika aho, dia nahita fanaovan-jiro volamena fito; '
  '13':
  - type: text
    content: ary teo afovoan'ny fanaovan-jiro dia nisy Anankiray tahaka ny Zanak'olona
  - type: note
    content: 'Na: toa zanak''olona'
  - type: text
    content: ' niakanjo akanjo lava hatrany an-tongony sady nisikina fisikinam-bolamena teo amin''ny tratrany. '
  '14':
  - type: text
    content: 'Ary ny lohany sy ny volony dia fotsy tahaka ny volon''ondry fotsy, dia tahaka ny oram-panala, ary ny masony tahaka ny lelafo; '
  '15':
  - type: text
    content: 'ary ny tongony tahaka ny varahina manganohano, hoatra ilay voadio teo amin''ny fandrendrehana iny; ary ny feony toy ny firohondrohon''ny rano be. '
  '16':
  - type: text
    content: 'Ary nitana kintana fito teny an-tànany ankavanana Izy; ary nisy sabatra maranitra roa lela nivoaka avy teo am-bavany; ary ny tarehiny dia tahaka ny masoandro mamirapiratra amin''ny heriny. '
  '17':
  - type: text
    content: 'Ary raha nahita Azy aho, dia lavo niankohoka tahaka ny maty teo anoloan''ny tongony. Fa Izy nanendry ahy tamin''ny tànany ankavanana ka nanao hoe: Aza matahotra; Izaho no Voalohany sy Farany, '
  '18':
  - type: text
    content: dia Ilay velona; efa maty Aho, nefa, indro, velona mandrakizay mandrakizay sady manana ny fanalahidin'ny fahafatesana sy ny fiainan-tsi-hita
  - type: note
    content: Gr. Hades
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Koa soraty izay zavatra efa hitanao, na izay zavatra ankehitriny, na izay zavatra mbola ho avy rahatrizay, '
  '2':
  - type: text
    content: Izay nanambara ny tenin'Andriamanitra sy ny filazana an'i Jesosy Kristy, dia ny zavatra rehetra izay efa hitany.
  '20':
  - type: text
    content: dia ny zava-miafina ny amin'ny kintana fito izay efa hitanao teny an-tanako ankavanana sy ny fanaovan-jiro volamena fito. Ny kintana fito dia ny anjelin'ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' fito: ary ny fanaovan-jiro fito dia fiangonana'
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' fito.'
  '3':
  - type: text
    content: Sambatra izay manaiky sy ny mihaino ny tenin'ity faminaniana ity ka mitandrina izay voasoratra ato anatiny; fa antomotra ny andro.
  '4':
  - type: text
    content: Jaona mamangy ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' fito any Asia: Ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''ilay ankehitriny sy taloha ary ho avy; ary avy amin''ny Fanahy fito izay eo anoloan''ny seza fiandrianany; '
  '5':
  - type: text
    content: ary avy amin'i Jesosy Kristy, Vavolombelona marina sy Lahimatoa amin'ny maty ary Lehiben'ny mpanjaka amin'ny tany. Ho an'izay tia antsika ka namaha
  - type: note
    content: Gr. nanasa
  - type: text
    content: ' antsika ho afaka amin''ny fahotantsika tamin''ny ràny, '
  '6':
  - type: text
    content: 'sady efa nanao antsika ho fanjakana, dia mpisorona ho an''Andriamanitra Ray,- ho Azy anie ny voninahitra sy ny fanjakana mandrakizay mandrakizay. Amena. '
  '7':
  - type: text
    content: 'Indro Izy avy amin''ny rahona; ary ny maso rehetra hahita Azy, na dia izay nandefona Azy aza; ary hitomany Azy ny firenena rehetra ambonin''ny tany. Eny, Amena. '
  '8':
  - type: text
    content: Izaho no Alfa sy Omega, hoy ny Tompo Andriamanitra, Ilay ankehitriny sy taloha ary ho avy, dia ny Tsitoha.
  '9':
  - type: text
    content: Izaho Jaona, rahalahinareo sy namanareo amin'ny fahoriana ary amin'ny fanjakana sy ny faharetana ao amin'i Jesosy, dia tao amin'ny nosy atao hoe Patmo noho ny tenin'Andriamanitra sy ny filazana an'i Jesosy.
