document_id: ZEP.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra ho fampibebahana ny olona, dieny mbola tsy mihatra ny loza
  - type: text
    content: Miangona, eny, mivoria ianareo Ry firenena tsy manan-kenatra
  - type: note
    content: 'Na: tsy manina'
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'Izany no ho valin''ny avonavony, Satria nandatsa ny olon''i Jehovah, Tompon''ny maro, sy nirehareha taminy izy. '
  '11':
  - type: text
    content: 'Hahatsiravina azy Jehovah, Satria hahamosarena ireo andriamanitra rehetra ambonin''ny tany Izy, Mba hiankohofan''ny any amoron-tsiraky ny jentilisa rehetra eo anatrehan''i Jehovah, Samy any amin''ny fitoerany avy. '
  '12':
  - type: text
    content: Hianareo Etiopiana koa, Ho voatrabaky ny sabatro ianareo
  - type: note
    content: Heb. izy
  - type: text
    content: .
  '13':
  - type: text
    content: 'Ary haninjitra ny tànany hamely ny avaratra Izy Ka handringana an''i Asyria; Ary hahalao an''i Ninive ho karankaina tahaka ny efitra Izy. '
  '14':
  - type: text
    content: 'Ary hisy andiany handry ao aminy, Dia fivorian''ny karazam-biby samy hafa, Ny sama sy ny sokina hitoetra ao amin''ny kapitaliny; Feo mikiririoka no ho re ao am-baravarankely, Ary fandravana no ho eo an-tokonana, Fa hendahany ny rafitra sedera. '
  '15':
  - type: text
    content: 'Izany no tanàna niravoravo sady nandry fahizay, Izay nanao anakampo hoe: Izaho no izy, ary tsy misy hafa; Endrey! efa tonga lao izy, eny, fandrian''ny biby! Izay rehetra mandalo azy dia hisitrisitra sy hanondro tanana.'
  '2':
  - type: text
    content: 'Dieny tsy mbola mihatra ny didy (Mihelina toy ny akofa ny andro!), Dieny tsy mbola tonga aminareo ny fahatezerana mafin''i Jehovah, Eny, dieny tsy mbola tonga aminareo ny andro firehetan''ny fahatezeran''i Jehovah. '
  '3':
  - type: text
    content: 'Mitadiava an''i Jehovah, ianareo mpandefitra rehetra amin''ny tany, Izay efa nanaraka ny fitsipiny: Tadiavo ny fahamarinana, Tadiavo ny fandeferana; Angamba ho voafina ianareo amin''ny andro fahatezeran''i Jehovah. '
  '4':
  - type: text
    content: 'Fa hafoy Gaza, Ary ho lao Askelona; Horoahiny mitataovovonana Asdoda, Ary hofongorana Ekrona. '
  '5':
  - type: text
    content: 'Lozan''ny mponina any amoron-tsiraka, Dia ny firenen''ny Keretita! Mihatra aminareo ny tenin''i Jehovah, Ry Kanana, tanin''ny Filistina! Haringako tsy hisy mponina eo aminao, '
  '6':
  - type: text
    content: Ary ny any amoron-tsiraka dia ho tonga tany fiandrasana ondry, izay misy zohy fialofan
  - type: note
    content: 'Na: trano-bongon'''
  - type: text
    content: '''ny mpiandry ondry, Sy ho valan''ondry aman''osy, '
  '7':
  - type: text
    content: 'Ary ho tanin''ny sisa amin''ny taranak''i Joda izany, Ka any no hiandrasany ondry; Ny tranon''i Askelona no handriany amin''ny hariva; Fa Jehovah Andriamaniny no hamangy azy Ka hampody azy avy amin''ny fahababoany. '
  '8':
  - type: text
    content: 'Efa reko ny fandatsan''i Moaba Sy ny fanaratsian''ny taranak''i Amona, Izay nandatsany ny oloko Sy nireharehany teny amin''ny sisin-taniny. '
  '9':
  - type: text
    content: 'Koa raha velona koa Aho, hoy Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, Dia ho tahaka an''i Sodoma tokoa Moaba, Ary ny taranak''i Amona ho tahaka an''i Gomora, Dia ho alan''amiana sy lava-tsira ary tany lao mandrakizay; Ny sisa amin''ny oloko no hamabo azy, ary ny sisa amin''ny oloko no hahalasa azy. '
