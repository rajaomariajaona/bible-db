document_id: ZEP.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra ho fampibebahana ny olona, dieny mbola tsy mihatra ny loza
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Miangona, eny, mivoria ianareo Ry firenena tsy manan-kenatra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsy manina'
      marker-yv: yv-n
    - type: text
      text: ', '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izany no ho valin''ny avonavony, Satria nandatsa ny olon''i Jehovah, Tompon''ny maro, sy nirehareha taminy izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hahatsiravina azy Jehovah, Satria hahamosarena ireo andriamanitra rehetra ambonin''ny tany Izy, Mba hiankohofan''ny any amoron-tsiraky ny jentilisa rehetra eo anatrehan''i Jehovah, Samy any amin''ny fitoerany avy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hianareo Etiopiana koa, Ho voatrabaky ny sabatro ianareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. izy
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary haninjitra ny tànany hamely ny avaratra Izy Ka handringana an''i Asyria; Ary hahalao an''i Ninive ho karankaina tahaka ny efitra Izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hisy andiany handry ao aminy, Dia fivorian''ny karazam-biby samy hafa, Ny sama sy ny sokina hitoetra ao amin''ny kapitaliny; Feo mikiririoka no ho re ao am-baravarankely, Ary fandravana no ho eo an-tokonana, Fa hendahany ny rafitra sedera. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izany no tanàna niravoravo sady nandry fahizay, Izay nanao anakampo hoe: Izaho no izy, ary tsy misy hafa; Endrey! efa tonga lao izy, eny, fandrian''ny biby! Izay rehetra mandalo azy dia hisitrisitra sy hanondro tanana.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dieny tsy mbola mihatra ny didy (Mihelina toy ny akofa ny andro!), Dieny tsy mbola tonga aminareo ny fahatezerana mafin''i Jehovah, Eny, dieny tsy mbola tonga aminareo ny andro firehetan''ny fahatezeran''i Jehovah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mitadiava an''i Jehovah, ianareo mpandefitra rehetra amin''ny tany, Izay efa nanaraka ny fitsipiny: Tadiavo ny fahamarinana, Tadiavo ny fandeferana; Angamba ho voafina ianareo amin''ny andro fahatezeran''i Jehovah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa hafoy Gaza, Ary ho lao Askelona; Horoahiny mitataovovonana Asdoda, Ary hofongorana Ekrona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lozan''ny mponina any amoron-tsiraka, Dia ny firenen''ny Keretita! Mihatra aminareo ny tenin''i Jehovah, Ry Kanana, tanin''ny Filistina! Haringako tsy hisy mponina eo aminao, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary ny any amoron-tsiraka dia ho tonga tany fiandrasana ondry, izay misy zohy fialofan
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: trano-bongon'''
      marker-yv: yv-n
    - type: text
      text: '''ny mpiandry ondry, Sy ho valan''ondry aman''osy, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ho tanin''ny sisa amin''ny taranak''i Joda izany, Ka any no hiandrasany ondry; Ny tranon''i Askelona no handriany amin''ny hariva; Fa Jehovah Andriamaniny no hamangy azy Ka hampody azy avy amin''ny fahababoany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Efa reko ny fandatsan''i Moaba Sy ny fanaratsian''ny taranak''i Amona, Izay nandatsany ny oloko Sy nireharehany teny amin''ny sisin-taniny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Koa raha velona koa Aho, hoy Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, Dia ho tahaka an''i Sodoma tokoa Moaba, Ary ny taranak''i Amona ho tahaka an''i Gomora, Dia ho alan''amiana sy lava-tsira ary tany lao mandrakizay; Ny sisa amin''ny oloko no hamabo azy, ary ny sisa amin''ny oloko no hahalasa azy. '
