document_id: LAM.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitomaniana noho ny nanjo an'i Ziona sy ny Joda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Indrisy! Ziona zanakavavy dia saronan'ny Tompo rahona amin'ny fahatezerany; Nazerany avy tany an-danitra ho amin'ny tany ny reharehan'ny Isiraely, Ary tsy tsaroany ny fitoeran-tongony tamin'ny andro fahatezerany!
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mipetraka amin'ny tany ny loholon'i Ziona zanakavavy ka mangina; Nasiany vovoka ny lohany, misikina lamba fisaonana izy; Ny virijina any Jerosalema nampitanondrika ny lohany ho amin'ny tany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Pahina ny masoko azon'ny ranomaso, mandevilevy ny foko; Naidina tamin'ny tany ny atiko noho ny fandringanana ny oloko zanakavavy, sy noho ny ankizy madinika sy ny zaza minono izay ana eny an-kalalahana ao an-tanàna.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha ana toy ny voatrobaka eny an-kalalahana ao an-tanana izy, na miala aina eo am-pofoan-dreniny, dia manontany an-dreniny hoe izy: aiza izay vary sy divay?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Inona no hataoko vavolombelona ho anao? Inona no hanoharako anao, ry Jerosalema zanakavavy? Inona no hampitahaiko aminao mba hampiononako anao, ry Ziona zanakavavy virijina? Fa lehibe toy ny ranomasina ny faharatranao, iza no mahasitrana anao?
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny mpaminaninao nahita lainga sy fahadalana ho anao; Ary tsy nampiseho ny helokao mba hiaro anao tsy ho babo; Fa nahita faminaniana lainga sy fampiviliana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fandroahana'
      marker-yv: yv-n
    - type: text
      text: ' ho anao izy.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Miteha-tanana anao izay rehetra mandalo eny an-dalana; Misitrisitra sy mihifikifi-doha amin''i Jerosalema zanakavavy izy ka manao hoe: Ity va ilay tanàna nataony hoe Tena fahatsaran-tarehy Fifalian''ny tany rehetra ?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Misanasana vava aminao ny fahavalonao rehetra; Misitrisitra sy mihidy vazana izy ka manao hoe: Efa nolevoninay'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. natelinay
      marker-yv: yv-n
    - type: text
      text: '! Ity tokoa no andro nandrasanay ka efa azonay sady hitanay.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Jehovah efa nanao izay nosaininy ka nahatanteraka ny teniny izay nandidiany hatramin'ny andro fahagola; Nandrava Izy, fa tsy niantra; Ary nampifaly ny fahavalo taminao Izy sady nanandratra ny tandroky ny rafilahinao.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fonao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fony
      marker-yv: yv-n
    - type: text
      text: ' mitaraina amin''ny Tompo: Ry mandan''i Ziona zanakavavy! mandrotsaha ranomaso andro aman''alina toy ny riaka; Aza mangina, aoka tsy hitsahatra ny anakandriamasonao.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mitsangàna, miantsoantsoa amin'ny alina hatramin'ny filatsahan'ny fiambenana, Aidino tahaka ny rano eo anatrehan'ny Tompo ny fonao! Asandrato aminy ny tananao hifona ho an'ny ain'ny zanakao madinika, izay anan'ny hanoanana eny an-joron-dalambe rehetra eny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nolevonin
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Natelin'
      marker-yv: yv-n
    - type: text
      text: '''ny Tompo ny fonenan''i Jakoba rehetra, fa tsy niantrany; Noravany an-katezerana ny fiarovan''i Joda zanakavavy ka nazerany tamin''ny tany, tsy nohamasininy ny fanjakana sy ny mpanapaka,'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Jehovah ô, jereo ka izahao ny amin'ny olona izay nanaovanao izany. Ny vehivavy va hihinana ny ateraky na kibony, dia ny zanany madinika trotroiny? Hovonoina ao amin'ny fitoera-masin'i Jehovah va ny mpisorona sy ny mpaminany ?
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Miampatrampatra eny an-dalambe ny tanora sy ny antitra; Ny virijinako sy ny zatovoko dia lavon'ny sabatra, Novonoinao tamin'ny andro fahatezeranao izy, eny, naripakao, fa tsy niantranao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nantsoinao ny fampangorohoroana manodidina ahy, toy ny amin'ny fotoam-pivavahana, ka dia tsy nisy sisa afa-nandositra tamin'ny andro fahatezeran'i Jehovah; Izay notrotroiko sy notezaiko aza dia lanin'ny fahavaloko.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nokapainy tamin'ny fahatezerany mirehitra ny tandroky ny Isiraely rehetra; Nahemony teo anoloan'ny fahavalo ny tànany ankavanana; Ary nandoro an'i Jakoba Izy toy ny lelafo miredareda izay nandevona manodidina.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nanenjana ny tsipìkany toy ny fahavalo Izy, nijoro naninjitra ny tànany ankavanana toy ny rafilahy Izy ka nandripaka izay rehetra mahafinaritra ny maso; Ny fahatezerany dia naidiny toy ny afo tamin'ny lain'i Ziona zanakavavy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny Tompo dia tonga toy ny fahavalo ka nandevona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nitelina
      marker-yv: yv-n
    - type: text
      text: ' ny Isiraely. Eny, nolevoniny'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nateliny
      marker-yv: yv-n
    - type: text
      text: ' ny lapany rehetra, sady noravany ny fiarovany; Ary nampitomboiny ny fisentoana sy ny fitarainan''i Joda zanakavavy.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary noravany an-keriny toy ny tanimboly ilay nofefena ho Azy, sady noravany ny trano fihaonany; Nataon'i Jehovah hadino tao Ziona ny fotoam-pivavahana sy ny Sabata, ka nolaviny tamin'ny fahatezerany mirehitra ny mpanjaka sy ny mpisorona.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny alitarany narian'ny Tompo, ny fitoerany masina nolaviny; Natolony ho eo an-tànan'ny fahavalo ny mandan'ny lapa ao Ziona; Nanandratra ny feony tao an-tranon'i Jehovah toy ny amin'ny fotoam-pivavahana ireny.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jehovah ninia handrava ny mandan'i Ziona zanakavavy; Nanenjana ny famolaina Izy ka tsy namonkina ny tanany tsy handrava
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hitelina
      marker-yv: yv-n
    - type: text
      text: ; dia mampitomany ny fiarovany ivelany sy ny manda Izy, ka miara-dreraka ireo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny vavahadiny dia tototry ny tany, nosimbany sy notapatapahiny ny hidiny; Ny mpanjakany sy ny mpanapaka azy efa mby any amin'ny firenena; Tsy misy lalàna intsony, fa na ny mpaminaniny aza dia tsy mahita fahitana avy amin'i Jehovah.
