document_id: MAT.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tandremo mba tsy hanao ny asan'ny fahamarinanareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fiantrana'
    marker-yv: yv-n
  - type: text
    text: ' eo imason''ny olona hahitany izany; Fa raha tsy izany, dia tsy manana valim-pitia amin''ny Rainareo Izay any an-danitra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa amin''izany, raha manao fiantrana ianao, aza mba mitsoka trompetra eo aloanao tahaka ny fanaon''ny mpihatsaravelatsihy eo amin''ny synagoga sy eny an-dalambe mba hankalazan''ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ianao kosa, raha manao fiantrana, dia aoka tsy ho fantatry ny tananao ankavia izay ataon''ny tananao ankavanana, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mba hatao ao amin''ny mangingina ny fiantranao; ary ny Rainao, Izay mahita ao amin''ny mangingina, no hamaly anao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha mivavaka ianareo, aza mba ho tahaka ny mpihatsaravelatsihy; Fa izy tia ny mivavaka mitsangana eo amin''ny synagoga sy eo an-joron-dalana hahitan''ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ianao kosa, raha mivavaka, dia midìra ao amin''ny efi-tranonao, ka rehefa voarindrinao ny varavaranao, dia mivavaha amin''ny Rainao, Izay ao amin''ny mangingina; ary ny Rainao, Izay mahita ao amin''ny mangingina no hamaly anao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha mivavaka ianareo, dia aza mba manao teny maro foana tahaka ny jentilisa; Fa ataony ho ny hamaroan''ny teniny no hihainoana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa aza manahaka azy ianareo; fa fantatry ny Rainareo izay tokony ho anareo, raha tsy mbola mangataka aminy aza ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa amin''izany mivavaha toy izao ianareo: Rainay Izay any an-danitra, hohamasinina anie ny anaranao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho tonga anie ny fanjakanao. Hatao anie ny sitraponao etỳ an-tany tahaka ny any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Omeo anay anio izay hanina sahaza ho anay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary mamelà ny helokay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: trosa'
    marker-yv: yv-n
  - type: text
    text: ' tahaka ny namelanay izay meloka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na:nitrosa
    marker-yv: yv-n
  - type: text
    text: ' taminay. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary aza mitondra anay ho amin'ny fakam-panahy, fa manafaha anay amin'ny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin''ilay'
    marker-yv: yv-n
  - type: text
    text: ' ratsy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: Fa Anao ny fanjakana sy ny hery ary ny voninahitra mandrakizay. Amena'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha mamela ny fahadisoan''ny olona ianareo, dia mba hamela ny anareo kosa ny Rainareo Izay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha tsy mamela ny fahadisoan''ny olona ianareo, dia tsy hamela ny fahadisoanareo ny Rainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha mifady hanina ianareo, aza mety ho tahaka ny mpihatsaravelatsihy, izay malahelo tarehy; fa mampisotisoty ny tavany izy mba ho hitan''ny olona fa mifady. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ianao kosa, raha mifady hanina, dia hosory ny lohanao, ary sasao ny tavanao, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mba tsy ho hitan'ny olona fa mifady, fa ho hitan'ny Rainao, Izay ao amin'ny mangingina; ary ny Rainao, Izay mahita ao amin'ny mangingina, no hamaly anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aza mihary harena ho anareo eto an-tany, izay misy kalalao sy harafesina manimba, sady misy mpangalatra manami-trano sy mangalatra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa miharia harena ho anareo any an-danitra, izay tsy misy kalalao na harafesina manimba, sady tsy misy mpangalatra manamitrano na mangalatra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa izay itoeran'ny harenao, dia ho any koa ny fonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny maso no jiron''ny tena; koa amin''izany, raha tsara ny masonao, dia hazava avokoa ny tenanao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa raha ratsy ny masonao, dia ho maizina avokoa ny tenanao rehetra; koa raha maizina ny fahazavana ao anatinao, manao ahoana ny halehiben'izany fahamaizinana izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tsy misy olona mahay manompo tompo roa; fa ny anankiray ho halany, ary ny anankiray ho tiany; na ny anankiray hombany, ary ny anankiray hohamavoiny. Tsy mahay manompo an'Andriamanitra sy Mamôna
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mamôna = harena
    marker-yv: yv-n
  - type: text
    text: ' ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary noho izany dia lazaiko aminareo hoe: Aza manahy ny amin''ny ainareo, dia izay hohaninareo na izay hosotroinareo, na ny amin''ny tenanareo, dia izay hotafinareo. Moa ny aina tsy mihoatra noho ny hanina va, ary ny tena noho ny fitafiana? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tsinjovy ny voro-manidina, fa tsy mba mamafy, na mijinja, na mitaona ho any an-tsompitra ireny; ary ny Rainareo Izay any an-danitra mamelona azy. Moa tsy mihoatra lavitra noho ireny va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary iza ao aminareo, na dia manahy aza, no mahay manampy ny andro hiainany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny halavan''ny tenany'
    marker-yv: yv-n
  - type: text
    text: ' na dia kely monja'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. Hakiho iray
    marker-yv: yv-n
  - type: text
    text: ' aza? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary nahoana no manahy ny amin'ny fitafiana ianareo? Diniho tsara ny fanirin'ny voninkazo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Karazan'ny lilia
    marker-yv: yv-n
  - type: text
    text: ' any an-tsaha; tsy mba miasa na mamoly ireny; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'nefa lazaiko aminareo fa na dia Solomona tao amin''ny voninahiny rehetra aza tsy mba nitafy tahaka ny anankiray amin''ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary raha ny ahitra any an-tsaha, izay any ihany anio ka hatsipy ao am-patana rahampitso, no ampitafin''Andriamanitra toy izany, tsy mainka va ianareo, ry kely finoana? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia aza manahy ianareo ka manao hoe: Inona no hohaninay? na: Inona no hosotroinay? na: Inona no hotafinay? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa izany rehetra izany dia katsahin''ny jentilisa fatratra; fa fantatry ny Rainareo Izay any an-danitra fa tokony ho anareo izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa katsaho aloha ny fanjakany sy ny fahamarinany, dia hanampy ho anareo izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary amin'izany dia aza manahy ny amin'ny ampitso ianareo; fa ny ampitso hanahy ny azy. Ampy ho an'ny andro ny ratsy miseho ao aminy.
