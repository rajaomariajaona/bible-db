document_id: MAT.6,96
type_code: plt
verses:
  '1':
  - type: text
    content: Tandremo mba tsy hanao ny asan'ny fahamarinanareo
  - type: note
    content: 'Na: ny fiantrana'
  - type: text
    content: ' eo imason''ny olona hahitany izany; Fa raha tsy izany, dia tsy manana valim-pitia amin''ny Rainareo Izay any an-danitra ianareo. '
  '10':
  - type: text
    content: 'Ho tonga anie ny fanjakanao. Hatao anie ny sitraponao etỳ an-tany tahaka ny any an-danitra. '
  '11':
  - type: text
    content: 'Omeo anay anio izay hanina sahaza ho anay. '
  '12':
  - type: text
    content: Ary mamelà ny helokay
  - type: note
    content: 'Na: trosa'
  - type: text
    content: ' tahaka ny namelanay izay meloka'
  - type: note
    content: Na:nitrosa
  - type: text
    content: ' taminay. '
  '13':
  - type: text
    content: Ary aza mitondra anay ho amin'ny fakam-panahy, fa manafaha anay amin'ny
  - type: note
    content: 'Na: amin''ilay'
  - type: text
    content: ' ratsy'
  - type: note
    content: 'Ampio hoe: Fa Anao ny fanjakana sy ny hery ary ny voninahitra mandrakizay. Amena'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Fa raha mamela ny fahadisoan''ny olona ianareo, dia mba hamela ny anareo kosa ny Rainareo Izay any an-danitra. '
  '15':
  - type: text
    content: 'Fa raha tsy mamela ny fahadisoan''ny olona ianareo, dia tsy hamela ny fahadisoanareo ny Rainareo. '
  '16':
  - type: text
    content: 'Ary raha mifady hanina ianareo, aza mety ho tahaka ny mpihatsaravelatsihy, izay malahelo tarehy; fa mampisotisoty ny tavany izy mba ho hitan''ny olona fa mifady. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '17':
  - type: text
    content: 'Fa ianao kosa, raha mifady hanina, dia hosory ny lohanao, ary sasao ny tavanao, '
  '18':
  - type: text
    content: mba tsy ho hitan'ny olona fa mifady, fa ho hitan'ny Rainao, Izay ao amin'ny mangingina; ary ny Rainao, Izay mahita ao amin'ny mangingina, no hamaly anao.
  '19':
  - type: text
    content: 'Aza mihary harena ho anareo eto an-tany, izay misy kalalao sy harafesina manimba, sady misy mpangalatra manami-trano sy mangalatra. '
  '2':
  - type: text
    content: 'Koa amin''izany, raha manao fiantrana ianao, aza mba mitsoka trompetra eo aloanao tahaka ny fanaon''ny mpihatsaravelatsihy eo amin''ny synagoga sy eny an-dalambe mba hankalazan''ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '20':
  - type: text
    content: 'Fa miharia harena ho anareo any an-danitra, izay tsy misy kalalao na harafesina manimba, sady tsy misy mpangalatra manamitrano na mangalatra. '
  '21':
  - type: text
    content: Fa izay itoeran'ny harenao, dia ho any koa ny fonao.
  '22':
  - type: text
    content: 'Ny maso no jiron''ny tena; koa amin''izany, raha tsara ny masonao, dia hazava avokoa ny tenanao rehetra. '
  '23':
  - type: text
    content: Fa raha ratsy ny masonao, dia ho maizina avokoa ny tenanao rehetra; koa raha maizina ny fahazavana ao anatinao, manao ahoana ny halehiben'izany fahamaizinana izany!
  '24':
  - type: text
    content: Tsy misy olona mahay manompo tompo roa; fa ny anankiray ho halany, ary ny anankiray ho tiany; na ny anankiray hombany, ary ny anankiray hohamavoiny. Tsy mahay manompo an'Andriamanitra sy Mamôna
  - type: note
    content: Mamôna = harena
  - type: text
    content: ' ianareo. '
  '25':
  - type: text
    content: 'Ary noho izany dia lazaiko aminareo hoe: Aza manahy ny amin''ny ainareo, dia izay hohaninareo na izay hosotroinareo, na ny amin''ny tenanareo, dia izay hotafinareo. Moa ny aina tsy mihoatra noho ny hanina va, ary ny tena noho ny fitafiana? '
  '26':
  - type: text
    content: 'Tsinjovy ny voro-manidina, fa tsy mba mamafy, na mijinja, na mitaona ho any an-tsompitra ireny; ary ny Rainareo Izay any an-danitra mamelona azy. Moa tsy mihoatra lavitra noho ireny va ianareo? '
  '27':
  - type: text
    content: Ary iza ao aminareo, na dia manahy aza, no mahay manampy ny andro hiainany
  - type: note
    content: 'Na: Ny halavan''ny tenany'
  - type: text
    content: ' na dia kely monja'
  - type: note
    content: Gr. Hakiho iray
  - type: text
    content: ' aza? '
  '28':
  - type: text
    content: Ary nahoana no manahy ny amin'ny fitafiana ianareo? Diniho tsara ny fanirin'ny voninkazo
  - type: note
    content: Karazan'ny lilia
  - type: text
    content: ' any an-tsaha; tsy mba miasa na mamoly ireny; '
  '29':
  - type: text
    content: 'nefa lazaiko aminareo fa na dia Solomona tao amin''ny voninahiny rehetra aza tsy mba nitafy tahaka ny anankiray amin''ireny. '
  '3':
  - type: text
    content: 'Fa ianao kosa, raha manao fiantrana, dia aoka tsy ho fantatry ny tananao ankavia izay ataon''ny tananao ankavanana, '
  '30':
  - type: text
    content: 'Ary raha ny ahitra any an-tsaha, izay any ihany anio ka hatsipy ao am-patana rahampitso, no ampitafin''Andriamanitra toy izany, tsy mainka va ianareo, ry kely finoana? '
  '31':
  - type: text
    content: 'Dia aza manahy ianareo ka manao hoe: Inona no hohaninay? na: Inona no hosotroinay? na: Inona no hotafinay? '
  '32':
  - type: text
    content: 'Fa izany rehetra izany dia katsahin''ny jentilisa fatratra; fa fantatry ny Rainareo Izay any an-danitra fa tokony ho anareo izany rehetra izany. '
  '33':
  - type: text
    content: 'Fa katsaho aloha ny fanjakany sy ny fahamarinany, dia hanampy ho anareo izany rehetra izany. '
  '34':
  - type: text
    content: Ary amin'izany dia aza manahy ny amin'ny ampitso ianareo; fa ny ampitso hanahy ny azy. Ampy ho an'ny andro ny ratsy miseho ao aminy.
  '4':
  - type: text
    content: 'mba hatao ao amin''ny mangingina ny fiantranao; ary ny Rainao, Izay mahita ao amin''ny mangingina, no hamaly anao. '
  '5':
  - type: text
    content: 'Ary raha mivavaka ianareo, aza mba ho tahaka ny mpihatsaravelatsihy; Fa izy tia ny mivavaka mitsangana eo amin''ny synagoga sy eo an-joron-dalana hahitan''ny olona azy. Lazaiko aminareo marina tokoa fa efa azony ny valim-pitiany. '
  '6':
  - type: text
    content: 'Fa ianao kosa, raha mivavaka, dia midìra ao amin''ny efi-tranonao, ka rehefa voarindrinao ny varavaranao, dia mivavaha amin''ny Rainao, Izay ao amin''ny mangingina; ary ny Rainao, Izay mahita ao amin''ny mangingina no hamaly anao. '
  '7':
  - type: text
    content: 'Ary raha mivavaka ianareo, dia aza mba manao teny maro foana tahaka ny jentilisa; Fa ataony ho ny hamaroan''ny teniny no hihainoana azy. '
  '8':
  - type: text
    content: 'Koa aza manahaka azy ianareo; fa fantatry ny Rainareo izay tokony ho anareo, raha tsy mbola mangataka aminy aza ianareo. '
  '9':
  - type: text
    content: 'Koa amin''izany mivavaha toy izao ianareo: Rainay Izay any an-danitra, hohamasinina anie ny anaranao. '
