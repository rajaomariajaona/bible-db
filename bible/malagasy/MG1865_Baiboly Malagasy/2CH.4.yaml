document_id: 2CH.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nanao alitara varahina izy: roa-polo hakiho ny lavany, roa-polo hakiho koa ny sakany, ary folo hakiho ny hahavony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary ny tavin-drano lehibe
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ranomasina
      marker-yv: yv-n
    - type: text
      text: ' nataony tamin''ny ankavanana, dia teo amin''ny atsimo-atsinana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary Hirama nanao ny vilany fandraofan-davenona sy ny sotron''afo ary ny lovia famafazana. Dia vitan''i Hirama ny asa izay nataony ho an''i Solomona mpanjaka ho amin''ny tranon''Andriamanitra:'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'dia ny andry roa sy ny boriboriny sy ny kapitaliny izay teny an-tampon''ny andry roa sy ny harato roa hafono ny boriboriny roa momba ny kapitaly izay teo an-tampon''ny andry avy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ary ny sarin''ampongaben-danitra efa-jato ho amin''ny harato roa, sarin''ampongabendanitra roa andalana ho amin''ny harato iray hafono ny boribory roa momba ny kapitaly izay teo an-tampon''ny andry avy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary nanao ireo fitoeran-tavin-drano izy, ary ny tavin-drano nataony teo amin''ny fitoerany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ary ny tavin-drano lehibe
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ranomasina
      marker-yv: yv-n
    - type: text
      text: ' iray sy ny sarin''omby roa ambin''ny folo; ambaniny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary ny vilany fandraofan-davenona sy ny sotron'afo sy ny fitrebika ary ny fanaka rehetra momba azy dia nataon'i Hiram-aby
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ikaky Hirama'
      marker-yv: yv-n
    - type: text
      text: ' ho an''i Solomona mpanjaka ho amin''ny tranon''i Jehovah tamin''ny varahina manganohano. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Teo amin''ny tany amoron''i Jordana no nanaovan''ny mpanjaka an-idina azy tamin''ny tanimanga teo anelanelan''i Sokota sy Zaretana. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Toy izany no nanaovan''i Solomona ireo fanaka rehetra rehetra ireo; fa tsy nozahana Izay lanjan''ny varahina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Solomona nanao ny fanaka rehetra izay tao amin''ny tranon''Andriamanitra: ny alitara volamena sy ny latabatra fitoeran''ny mofo aseho, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary nanao ny tavin-drano
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ranomasina
      marker-yv: yv-n
    - type: text
      text: ' an-idina boribory lehibe izy: folo hakiho no halehiben''ny vavany, dimy hakiho ny hahavony, ary telo-polo hakiho ny manodidina azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary ny fanaovan-jiro sy ny lela fanaovan-jirony mba hampirehetina eo noloan''ny efitra anatiny araka ny fanao dia samy volamena tsara; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ny voniny sy ny lela fanaovan-jiro ary ny hetin-jiro dia samy volamena tsara indrindra avokoa; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ary ny antsy sy ny lovia famafazana sy ny lovia kely sy ny fitoeran-davenon-jiro dia samy volamena tsara; ary ny lela-varavarana teo anatin'ny trano, dia ny mankao amin'ny fitoerana masina indrindra, sy ny lela-varavarana ho amin'ny ati-trano lehibe dia samy volamena avokoa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary teo ambanin'ny tavin-drano lehibe
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ranomasina
      marker-yv: yv-n
    - type: text
      text: ' nisy sarin''omby manodidina azy, dia folo amin''ny iray hakiho manodidina. Roa andalana ny sarin''omby sady niara-natao an-idina tamin''ny tavin-drano. . '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny tavin-drano dia nipetraka tambonin''ny sarin''omby roa ambin''ny folo: ny telo nanatrika ny avaratra ny telo nanatrika ny andrefana, ny telo nanatrika ny atsimo, ary ny telo nanatrika ny atsinanana; ny tavin-drano lehibe'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ranomasina
      marker-yv: yv-n
    - type: text
      text: ' dia teo amboniny, ary niady vody izy rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny hateviny dia vodivoam-pelatanana, ary ny molony nataony tahaka ny molotry ny kapoaka, dia tahaka ny vonin''ny lilia; ary mahalany telo arivo bata izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary nanao tavin-drano folo koa izy hanasana, ny dimy nataony tamin'ny ankavanana, ary ny dimy tamin'ny ankavia; ary ny zavatra hatao fanatitra dorana dia nakobaka teo; fa ny tavin-drano lehibe
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ranomasina
      marker-yv: yv-n
    - type: text
      text: ' kosa dia fisasan''ny mpisorona.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nanao ny fanaovan-jiro volamena folo araka ny marika izy, dia napetrany tao amin''ny tempoly, dimy teo amin''ny ankavanana, ary dimy teo amin''ny ankavia. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary nanao latabatra folo koa izy, dia napetrany tao amin'ny tempoly, dimy teo amin'ny ankavanana, ary dimy teo amin'ny ankavia. Ary nanao lovia volamena zato famafazana izy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nanao ny kianjan''ny mpisorona sy ny kianja lehibe sy ny lela-vavahadin''ny kianja izy, ary nopotehany takela-barahina ny lela-vavahady. '
