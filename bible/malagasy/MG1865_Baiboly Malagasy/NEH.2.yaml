document_id: NEH.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny volana Nisana tamin''ny taona faharoa-polo nanjakan''i Artaksersesy, raha teo anoloany ny divay, dia noraisiko ka natolotro ny mpanjaka. Fa vao izay aho no mba nalahelo teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy ny mpanjaka tamiko: Nahoana no malahelo tarehy ianao, kanefa tsy marary tsinona? Tsy zavatra hafa izao, fa alahelom-po mihitsy. Dia raiki-tahotra indrindra aho '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nanao tamin''ny mpanjaka hoe: Ho velona mandrakizay anie ny mpanjaka; nahoana no tsy halahelo tarehy aho, fa rava ny tanàna misy ny fasan-drazako, sady efa levon''ny afo ny vavahadiny? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ny mpanjaka tamiko: Inona ary no angatahinao? Dia nivavaka tamin''Andriamanitry ny lanitra aho aloha, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia vao niteny tamin''ny mpanjaka hoe: Raha sitraky ny mpanjaka, ka mahita fitia eto imasonao ny mpanomponao, dia alefaso ho any Joda aho, ho any amin''ny tanàna misy ny fasan-drazako mba hanamboarako izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy ny mpanjaka tamiko (ny vadin''ny mpanjaka koa nipetraka teo anilany): Haharitra hoatrinona any anefa ianao, ary rahoviana no hiverina? Ka dia sitraky ny mpanjaka ny handefa ahy; ary dia nilaza fotoana taminy aho. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy koa aho tamin''ny mpanjaka: Raha sitraky ny mpanjaka, aoka homena taratasy ho amin''ireo governora any an-dafin''ny ony aho, mba hamelany ahy handeha hatrany Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sy taratasy ho amin''i Asafa, mpitandrina ny alan''i ny mpanjaka mba hanomezany hazo hanaovako ny vavahadin''ny lapa izay momba ny tempoly sy hanaovako ny mandan''ny tanàna sy ny trano izay hitoerako. Dia nomen''ny mpanjaka ahy izany araka ny soa nataon''ny tànan''Andriamanitro tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia tonga tany amin''ireo governora any an-dafin''ny ony aho, ka natolotro azy ny taratasin''ny mpanjaka. Ary ny mpanjaka efa naniraka manamboninahitra sy mpitaingin-tsoavaly hanatitra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha nahare izany Sanbala Horonita sy Tobia Amonita mpanompo, dia sosotra loatra izy, satria nisy lehilahy tonga hitady izay hahasoa ny Zanak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia tonga tany Jerosalema aho ka nitoetra tany hateloana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nifoha tamin''ny alina aho, dia izaho sy ny olom-bitsy nomba ahy; nefa tsy nisy olona nilazako izay natsindrin''Andriamanitra ny foko hatao any Jerosalema; ary tsy nisy biby nentiko afa-tsy ilay nitaingenako ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nandeha alina aho ka nivoaka tamin''ny vavahady mankany amin''ny lohasaha, tandrifin''ny loharanon''ny dragona, sy tamin''ny vavahadin-jezika ka nizaha ny mandan''i Jerosalema izay efa rava sy ny vavahadiny izay efa levon''ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nankany amin''ny vavahadin-doharano sy ny farihin''ny mpanjaka koa aho; nefa tsy nisy lalana azon''ilay biby nitaingenako naleha akory. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niakatra teo amin''ny lohasahan-driaka aho tamin''ny alina ka nizaha ny manda, dia nitodika ka niditra tamin''ny vavahady mankany amin''ny lohasaha, dia niverina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nefa ireo mpanapaka tsy nahalala izay nalehako, na izay nataoko; fa hatramin''izay dia tsy mbola nolazaiko tamin''ny Jiosy izany, na tamin''ny mpisorona, na tamin''ny manan-kaja, na tamin''ny mpanapaka, na tamin''ny vahoaka sisa izay nanao ny asa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy izaho taminy: Hianareo mahita ny fahoriantsika , fa rava Jerosalema ary nodoran''ny afo ny vavahadiny; koa andeha isika hanangana ny mandan''i Jerosalema, mba tsy ho latsa intsony isika. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nambarako azy ny tànan''Andriamanitro izay nahasoa ahy, ary ny tenin''ny mpanjaka koa izay nolazainy tamiko. Ary hoy izy: Eny, aoka ary isika hitsangana ka handrafitra azy. Koa dia nampahery ny tànany hanao izany soa izany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa nony ren''i Sanbala Horonita sy Tobia Amonita mpanompo ary Gasema Arabo izany, dia nanaraby sy nanevateva anay izy nanao hoe: Inona izao zavatra ataonareo izao? Hikomy amin''ny mpanjaka angaha ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia namaly azy aho ka nanao taminy hoe: Andriamanitry ny lanitra, Izy no hanambina anay, ka dia hitsangana handrafitra izahay mpanompony; fa ianareo tsy manana anjara. na rariny, na fahatsiarovana akory, atỳ Jerosalema.'
