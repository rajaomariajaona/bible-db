document_id: DAN.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'i Daniela sy ny namany telo lahy
  - type: text
    content: 'Tamin''ny taona fahatelo nanjakan''i Joiakima, mpanjakan''ny Joda, no nankanesan''i Nebokadnezara, mpanjakan''i Babylona, tany Jerosalema sy nanaovany fahirano azy. '
  '10':
  - type: text
    content: 'Ary hoy ilay lehiben''ny tandapa tamin''i Daniela: Matahotra ny mpanjaka tompoko izay nampanokana ny hohaninareo sy ny hosotroinareo aho; fa hanao ahoana raha mahita ny tarehinareo mahia noho ny an''ny zatovo namanareo izy, moa tsy hahameloka ahy amin''ny mpanjaka va ianareo, ka hotapahiny ny lohako? '
  '11':
  - type: text
    content: 'Dia hoy Daniela tamin''ny mpiadidy, izay notendren''ny lehiben''ny tandapa ho mpiadidy an''i Daniela sy Hanania sy Misaela ary Azaria: '
  '12':
  - type: text
    content: 'Masìna ianao, izahao toetra hafoloana izahay mpanomponao, ary aoka homena hanin-kotrana hohaninay sy rano hosotroinay. '
  '13':
  - type: text
    content: 'Dia aoka hizahana eo anatrehanao ny tarehinay sy ny tarehin''ny zatovo izay mihinana ny anjara avy amin''ny hanin''ny mpanjaka, ary araka izay hitanao no ataovy amin''ny mpanomponao. '
  '14':
  - type: text
    content: 'Ary nanaiky izany teny izany izy ka nizaha toetra azy hafoloana. '
  '15':
  - type: text
    content: 'Ary nony tapitra ny hafoloana, dia hita fa mandimandina sy matavy aza ny tarehiny noho ny an''ny zatovo rehetra izay nihinana anjara avy tamin''ny hanin''ny mpanjaka. '
  '16':
  - type: text
    content: 'Dia najanon''ilay mpiadidy ny anjara-haniny sy ny divay hosotroiny, ka hanin-kotrana no nomeny azy. '
  '17':
  - type: text
    content: 'Ary ireo zatovo efa-dahy ireo dia nomen''Andriamanitra fahalalana sy saina ny amin''ny taratasy sy ny fahendrena rehetra; ary Daniela nahafantatra ny amin''ny fahitana sy ny nofy rehetra. '
  '18':
  - type: text
    content: 'Ary nony tonga ny andro nasain''ny mpanjaka hampidirana azy, dia nentin''ilay lehiben''ny tandapa niditra teo anatrehan''i Nebokadnezara izy. '
  '19':
  - type: text
    content: 'Ary ny mpanjaka niresaka taminy, ka tsy nisy hita izay tahaka an''i Daniela sy Hanania sy Misaela ary Azaria tamin''izy rehetra, ka dia nitoetra teo anatrehan''ny mpanjaka izy ireo. '
  '2':
  - type: text
    content: 'Ary ny Tompo nanolotra an''i Joiakima, mpanjakan''ny Joda, mbamin''ny fanaka sasany tao an-tranon''Andriamanitra ho eo an-tànany, ka nentiny ho any amin''ny tany Sinara ireny, ho ao an-tranon''andriamaniny; koa ny fanaka dia nampidiriny tao amin''ny trano firaketan''andriamaniny. '
  '20':
  - type: text
    content: 'Ary ny amin''ny fahendrena sy ny fahalalana rehetra izay nanontanian''ny mpanjaka azy, dia hitany fa nanan-tombo im-polo heny noho ny ombiasy rehetra sy ny mpisikidy izay teo amin''ny fanjakany rehetra aza izy. '
  '21':
  - type: text
    content: Ary Daniela nahatratra ny taona voalohany nanjakan'i Kyrosy mpanjaka.
  '3':
  - type: text
    content: 'Ary ny mpanjaka nandidy an''i Aspenaza, lehiben''ny tandapany, hitondra ny sasany amin''ny Zanak''Isiraely, dia amin''ny zanak''andriana na amin''ny ambony firazanana, '
  '4':
  - type: text
    content: 'dia zatovo izay tsy nisy kilema, fa tsara tarehy sady kanto amin''ny fahendrena rehetra sy manam-pahalalana ary mazava saina ka miendrika hitoetra ao an-dapan''ny mpanjaka sady nasainy nampianarina ny taratasy sy ny tenin''ny Kaldeana. '
  '5':
  - type: text
    content: Ary ny mpanjaka nampanokana hanina ho an'ireo isan'andro avy tamin'ny haniny sy avy tamin'ny divay izay fisotrony mba hamelomana azy telo taona, ary rehefa afaka izany, dia hitoetra eo anatrehan'ny mpanjaka izy.
  '6':
  - type: text
    content: 'Ary tamin''ireo dia nisy avy amin''ny taranak''i Joda, dia Daniela sy Hanania sy Misaela ary Azaria. '
  '7':
  - type: text
    content: 'Ary izy ireo nomen''ny lehiben''ny tandapa anarana, ka Daniela nataony hoe Beltesazara, ary Hanania nataony hoe Sadraka, ary Misaela nataony hoe Mesaka, ary Azaria nataony hoe Abednego. '
  '8':
  - type: text
    content: Ary Daniela ninia tao am-pony tsy handoto ny tenany tamin'ny anjara-hanina avy tamin'ny hanin'ny mpanjaka, na tamin'ny divay izay fisotrony; ka dia nangataka tamin'ny lehiben'ny tandapa izy mba havelany tsy handoto ny tenany.
  '9':
  - type: text
    content: 'Dia nataon''Andriamanitra nahita fitia sy famindram-po tamin''ilay lehiben''ny tandapa Daniela. '
