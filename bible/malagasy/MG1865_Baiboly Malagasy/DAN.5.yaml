document_id: DAN.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanasana nataon'i Belsazara, sy ny sora-tanana niseho teo amin'ny rindrina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Belsazara mpanjaka nanao fanasana lehibe ho an''ny mpanolo-tsainy arivo lahy, ary teo anatrehan''ireny no nisotroany divay. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony efa nisotro divay Belsazara, dia nasainy nalaina ny fanaka volamena sy volafotsy izay nalain''i Nebokadnezara rainy avy tao amin''ny tempoly tany Jerosalema, mba hisotroan''ny mpanjaka sy ny mpanolotsainy sy ny vadiny mbamin''ny vaditsindranony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nentiny ny fanaka volamena izay nalaina avy teo amin''ny tempolin''ny tranon''Andriamanitra tany Jerosalema, ary ny mpanjaka sy ny mpanolo-tsainy sy ny vadiny mbamin''ny vaditsindranony nisotro taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eny, nisotro divay izy sady nankalaza ny andriamanitra volamena sy volafotsy sy varahina sy vy sy hazo ary vato. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin''izay dia nisy rantsan- tànan''olona niseho ka nanoratra tandrifin''ny jiro tamin''ny lalotra sokay teo amin''ny rindrin''ny lapan''ny mpanjaka; ary ny mpanjaka nahita ilay rantsan-tanana nanoratra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nivaloarika ny tarehin''ny mpanjaka, ary naharaiki-tahotra azy ny eritreriny, ka dia nivahavaha ny valahany, sady niady ny lohaliny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niantso mafy ny mpanjaka hampiditra ny mpisikidy sy ny Kaldeana ary ny mpanandro. Ary ny mpanjaka niteny ka nanao tamin''ny olon-kendrin''i Babylona hoe: Na zovy na zovy no mahavaky io soratra io sady milaza ny heviny amiko dia hampiakanjoina volomparasy, sy hasiana rojo volamena ny vozony, ary ho isan''ny mpanapaka telo lahy amin''ny fanjakana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niditra avokoa ny olon-kendrin''ny mpanjaka, nefa tsy nisy nahavaky ny soratra na nampahalala ny mpanjaka ny heviny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia natahotra indrindra Belsazara mpanjaka, ka nivaloarika ny tarehiny, ary vaka terỳ ny mpanolo-tsainy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny renin''ny mpanjaka niditra tao amin''ny trano fanasana noho ny tenin''ny mpanjaka sy ny mpanolo-tsainy; dia niteny ny renin''ny mpanjaka ka nanao hoe: Ry mpanjaka ô, ho velona mandrakizay anie ianao, aoka tsy haharaiki-tahotra anao ny eritreritrao, na hivaloarika ny tarehinao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Misy lehilahy ato amin''ny fanjakanao izay manana fanahin''ireo andriamanitra masina ao anatiny; ary fony fahavelon-drainao dia hita fa nisy fahazavan-tsaina sy fahalalana ary fahendrena tao aminy tahaka ny fahendren''ireo andriamanitra; ka nataon''i Nebokadnezara mpanjaka rainao, dia ny mpanjaka rainao, hoy izaho, ho lehiben''ny ombiasy sy ny mpisikidy sy ny Kaldeana ary ny mpanandro izy; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: fa fanahy hendry sy fahalalana sy saina ary fahaiza-milaza nofy sy fanambarana teny sarotra sy fampisehoana hevitra miafina no hita tao amin'izany Daniela izany, izay nomen'ny mpanjaka anarana hoe Beltesazara, koa aoka hantsoina Daniela, fa holazainy ny hevitry ny teny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nampidirina teo anatrehan''ny mpanjaka Daniela. Ary ny mpanjaka niteny ka nanao tamin''i Daniela hoe: Hianao mantsy no Daniela, ilay isan''ny babo avy amin''ny taranak''i Joda, izay nentin''ny mpanjaka raiko avy tany Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Efa reko ny aminao, fa ianao manana fanahin''ireo andriamanitra sady misy fahazavan-tsaina sy fahalalana ary fahendrena tsara hita ao aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary vao teo dia efa nampidirina teto anatrehako ny olon-kendry sy ny mpisikidy hamaky io soratra io sy hampahafantatra ahy ny heviny; fa tsy nahalaza ny hevitry ny teny izy; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary efa reko ny aminao, fa ianao no mahalaza hevitra sy mahay mampiseho hevitra miafina; koa raha mahavaky ny soratra sy mampahafantatra ahy ny heviny ianao, dia hampiakanjoina volomparasy, sy hasiana rofo volamena ny vozonao, ary ho isan''ny mpanapaka telo lahy amin''ny fanjakana ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia namaly Daniela ka nanao teo anatrehan''ny mpanjaka hoe: Aoka ihany ho anao ny fanomezanao, ary ny valim-pitianao omeo ny hafa; nefa hovakiko amin''ny mpanjaka ihany ny soratra, ary hampahafantariko azy ny heviny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny aminao, ry mpanjaka ô, Andriamanitra Avo Indrindra efa nanome fanjakana sy fahalehibiazana sy voninahitra ary laza an''i Nebokadnezara rainao; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary noho ny fahalehibiazana izay nomeny azy, ny fokom-pirenena sy ny firenena ary ny samy hafa fiteny rehetra dia nangovitra sy natahotra teo anatrehany; izay tiany hovonoina dia novonoiny; ary izay tiany hovelomina dia novelominy; ary izay tiany hasandratra dia nasandrany; ary izay tiany haetry dia naetriny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa nony niavonavona kosa ny fony, ary nikikitra tamin''ny fireharehana ny fanahiny, dia naetry niala tamin''ny seza fiandrianan''ny fanjakany izy, ary ny voninahiny nesorina taminy; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia noroahina niala tamin''ny zanak''olombelona izy; ary ny fony natao tahaka ny an''ny biby, ary ny fonenany tany amin''ny boriki-dia, dia nampihinanina ahitra toy ny omby izy, ary kotsan''ny andon''ny lanitra ny tenany, ambara-pahafantany fa Andriamanitra Avo Indrindra no manapaka amin''ny fanjakan''ny olona, ary izay tiany no tendreny ho mpanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ianao, ry Belsazara zanany, dia tsy mba nampietry ny fonao, na dia fantatrao aza izany rehetra izany; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'fa niavonavona tamin''ny Tompon''ny lanitra ianao; ary ny fanaky ny tranon''Andriamanitra dia nentina eto anatrehanao, ary ianao sy ny mpanolo-tsainao sy ny vadinao mbamin''ny vaditsindranonao nisotro divay taminy; ary ianao nankalaza ny andriamanitra volafotsy sy volamena sy varahina sy vy sy hazo ary vato, izay tsy mahita, na mandre, na mahalala; fa Andriamanitra Izay mitana ny ainao sady Tompon''ny alehanao rehetra dia tsy mba nankalazainao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary noho izany dia Izy no nihavian''ilay rantsan-tanana, ka voasoratra ireo teny ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny teny voasoratra dia izao: Mene, Mene, Tekela, Oparesina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Oparesina = sy Paresina
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izao no hevitry ny teny: Mene, voaisan''Andriamanitra ny nanjakanao ka taperiny amin''izao; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tekela, efa voalanja tamin''ny mizana ianao ka, indro, latsa-danja; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Paresa, zarazaraina ny fanjakanao ka omena ho an''ny Mediana sy ny Persiana. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Belsazara dia nanome teny, ka dia nampiakanjoina volomparasy Daniela, sady nasiana rojo volamena ny vozony, ary nisy niantso azy ho isan''ny mpanapaka telo lahy amin''ny fanjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary tamin'io alina io ihany dia novonoina Belsazara, mpanjakan'ny Kaldeana.
