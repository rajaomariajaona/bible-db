document_id: 1CH.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandaminan'i Davida ny fanompoam-pivavahana, sy ny salamo natao ho fisaorana an'i Jehovah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nampiditra ny Fiaran''Andriamanitra ny olona ka nametraka azy tao afovoan''ny lay izay naorin''i Davida ho azy; ary nanatitra fanatitra dorana sy fanati-pihavanana teo anatrehan''Andriamanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nony voatitr''i Davida ny fanatitra odorana sy ny fanati-pihavanana, dia nitso-drano ny olona tamin''ny anaran''i Jehovah izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dia nizara mofo iray avy sy hena iray didy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: divay eran''ny kapoaka'
    marker-yv: yv-n
  - type: text
    text: ' ary ampempam-boaloboka ho an''ny Isiraely rehetra na lahy na vavy izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny Levita sasany notendren''i Davida ho mpanao fanompoam-pivavahana eo anatrehan''ny fiaran''i Jehovah mba hankalaza sy hisaotra ary hidera an''i Jehovah, Andriamanitry ny Isiraely: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Asafa no lohany, ary Zakaria no nanarakaraka, dia Jeiela sy Semiramota sy Jehiela sy Matitia sy Eliaba sy Benaia sy Obed-edoma ary Jeiela no nitendry ny valiha sy ny lokanga; fa Asafa no nampaneno ny kipantsona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Benaia sy Jahaziela mpisorona kosa no mpitsoka ny trompetra mandrakariva eo anoloan'ny fiaran'ny faneken'Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tamin'izay andro izay no voalohan'ny nanendren'i Davida an'i Asafa sy ny rahalahiny hidera an'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miderà an'i Jehovah, miantsoa ny anarany; Ampahafantaro ny firenena ny asany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mihira ho Azy, mankalazà Azy; Saintsaino ny fahagagana rehetra ataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ataovy ho reharehanareo ny anarany masina; Aoka hifaly ny fon'izay mitady an'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mitadiava an'i Jehovah sy ny heriny, Katsaho mandrakariva ny tavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mahatsiarova ny asa mahagaga izay nataony, dia ny fahagagany sy ny fitsaran'ny vavany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hianareo taranak'Isiraely mpanompony, Hianareo olom-boafidiny, taranak'i Jakoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jehovah, Izy no Andriamanitsika, manerana ny tany rehetra ny fitsarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tsarovy mandrakizay ny fanekeny. Dia ilay teny voadidiny ho an'ny taranaka arivo mandimby,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eny, dia ilay nataony tamin'i Abrahama sy ny fianianany tamin'Isaka,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay naoriny ho lalàna ho an'i Jakoba sy ho fanekena mandrakizay ho an'Isiraely,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ka nataony hoe: Homeko anao ny tany Kanana ho lovanareo voazara amin''ny famolaina;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fony mbola olom-bitsy ianareo, Eny, Vitsy sady vahiny tao,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary nifindrafindra tany amin'ny firenena, sy nifindrafindra fanjakana ho amin'ny firenen-kafa,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy nisy navelany hampahory azy; Ary nananatra mpanjaka Izy noho ny amin''ireo hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aza manendry ireo voahosotro, Ary aza manisy ratsy Ireo mpaminaniko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mihira ho an'i Jehovah, ry tany rehetra; Lazao isan'andro isan'andro ny famonjeny mahafaly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ambarao any amin'ny jentilisa ny voninahiny, ary any amin'ny firenena rehetra ny fahagagana ataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa lehibe Jehovah ka mendrika hoderaina indrindra, sady mahatahotra, fa ambonin'ny andriamanitra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa ny andriamanitry ny firenena rehetra dia tsinontsinona, fa Jehovah no nanao ny lanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Famirapiratana sy voninahitra no eo anatrehany, Hery sy hafaliana no ao amin'ny fitoerany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ry firenena, manomeza an'i Jehovah, eny, manomeza voninahitra sy hery ho an'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Manomeza an'i Jehovah ny voninahitry ny anarany; Mitondrà fanatitra, ka mankanesa eo anatrehany; Miankohofa eo anatrehan'i Jehovah amin'ny fihaingoana masina
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mangovita eo anatrehany, ry tany rehetra; Izao rehetra izao voaorina ka tsy hihetsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Aoka ho faly ny lanitra ary ho ravo ny tany; Ary aoka holazaina any amin''ny firenena hoe: Jehovah no Mpanjaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy; Aoka ho faly ny saha sy izay rehetra ao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dia hihoby eo anatrehan'i Jehovah amin'izay ny hazo an'ala; Fa avy hitsara ny tany Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Miderà an''i Jehovah, fa tsara Izy: Fa mandrakizay ny famindram-pony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary manaova hoe: Vonjeo izahay, ry Andriamanitry ny famonjena anay ô, ary angòny izahay, ka vonjeo tsy ho azon''ny jentilisa, Mba hisaoranay ny anaranao masina, ka ho reharehanay ny fiderana Anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Isaorana anie Jehovah, Andriamanitry ny Isiraely, hatramin''ny taloha indrindra ka ho mandrakizay. Ary ny olona rehetra nanao hoe: Amena, sady nidera an''i Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary Asafa sy ny rahalahiny dia navelan''i Davida teo anoloan''ny fiaran''ny faneken''Jehovah hanao fanompoam-pivavahana ao mandrakariva araka ny raharaha tokony hatao isan''andro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary Obed-edoma sy ny rahalahiny valo amby enim-polo sy Obed-edoma, zanak''i Jedotona, ary Hosa ho mpiandry varavarana kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary Zadoka mpisorona sy ny mpisorona rahalahiny dia navelany teo anoloan''ny tabernakelin''i Jehovah teo amin''ny fitoerana avo any Gibeona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'hanatitra fanatitra dorana ho an''i Jehovah marain-tsy hariva eo amin''ny alitara fandoroana ny fanatitra dorana mandrakariva, ary hanao araka izay rehetra voasoratra ao amin''ny lalàn''i Jehovah, izay nandidiany ny Isiraely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ary naman''ireo koa Hemana sy Jedotona ary ny sisa amin''ny olona voafidy izay voatonona anarana hidera an''i Jehovah, fa mandrakizay ny famindram-pony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary tao amin''i Hemana sy Jedotona nisy trompetra sy kipantsona ho an''izay mampaneno ary ny fomban''ny zava-manenon''Andriamanitra. Ary ny zanak''i Jedotona no mpiandry varavarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary dia samy nody tany an-tranony avy ny olona rehetra, ary Davida koa lasa nody mba hitso-drano ny ankohonany.
