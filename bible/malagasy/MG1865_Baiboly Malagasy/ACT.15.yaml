document_id: ACT.15,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niaingan'i Paoly fanindroany hitety vohitra tany Asia Minora
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ny olona sasany izay nidina avy tany Jodia nampianatra ny rahalahy hoe: Raha tsy forana araka ny fanaon''i Mosesy ianareo, dia tsy azo vonjena. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa nahoana ianareo no maka fanahy an''Andriamanitra amin''ny fametrahanareo zioga amin''ny vozon''ny mpianatra, izay tsy zakan''ny razantsika na isika ho entina? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa mino isika fa ny fahasoavan''i Jesosy Tompo no hamonjena antsika, dia tahaka ny azy ihany koa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia nangina ny olona rehetra ka nihaino an''i Barnabasy sy Paoly, izay nilaza ny famantarana sy ny fahagagana nampanaovin''Andriamanitra azy tany amin''ny jentilisa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary rehefa nitsahatra tsy niteny izy roa lahy, dia namaly Jakoba ka nanao hoe: Ry rahalahy, mihainoa ahy: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Simeona efa nanambara izay nitsinjovan''Andriamanitra ny jentilisa tamin''ny voalohany hanalany olona aminy hankalazana ny anarany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary mifanaraka amin''izany ny tenin''ny mpaminany, araka ny voasoratra hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rehefa afaka izany, dia hiverina Aho Ka hanangana ny trano-lain''i Davida izay efa nianjera; Ary hanangana izay efa rava ao Aho Ka hanamboatra azy indray; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mba hitady ny Tompo ny olona sisa sy ny jentilisa rehetra, Izay efa niantsoana ny anarako, hoy Jehovah, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Izay manao izany zavatra fantatra hatramin''ny voalohany indrindra izany (Amo. 9. 11, 12). '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa dia izao no hevitro: Tsy mety raha isika manome fahasahiranana ny avy amin''ny jentilisa izay miverina ho amin''Andriamanitra; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary rehefa nifanditra sy niady hevitra be ihany tamin'ireo Paoly sy Barnabasy, dia nifanarahana ny hiakaran'izy roa lahy sy ny sasany koa hankany Jerosalema ho any amin'ny Apostoly sy ny loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: ' hanadina izany teny niadian-kevitra izany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'fa aoka hanoratra epistily aminy isika mba hifadiany ny hena fahavetavetana aterina amin''ny sampy sy ny fijangajangana ary ny zavatra kendaina sy ny rà. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa hatramin''ny razana fahiny dia manana izay mitory azy ao amin''ny isan-tanàna Mosesy, fa vakina ao amin''ny synagoga rehetra isan-tSabata ny teniny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary sitraky ny Apostoly sy ny loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: ' mbamin''ny fiangonana rehetra ny hifidy olona amin''ny namany mba hirahina hiaraka amin''i Paoly sy Barnabasy hankany Antiokia, dia Joda, izay atao hoe Barnabasy, sy Silasy, izay lehilahy samy tsara laza eo amin''ny rahalahy; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ary nanoratra taratasy izy ho entin''ireo, dia izao: Ny Apostoly sy ny rahalahy loholona'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: ' miarahaba ny rahalahy avy amin''ny jentilisa izay any Antiokia sy Syria ary Kilikia. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Satria efa renay fa ny sasany izay avy tany aminay efa nanao teny nampitabataba anareo ka namadika ny sainareo, kanefa tsy nasainay nanao izany izy, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'dia sitrakay, rehefa nifanara-kevitra, ny hifidy olona hirahina hankatỳ aminareo hiaraka amin''i Barnabasy sy Paoly malalanay, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'lehilahy izay nanao ny ainy tsy ho zavatra ho voninahitry ny anaran''i Jesosy Kristy Tompontsika. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia nirahinay Joda sy Silasy, sady hilaza vava izany teny izany koa izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa sitraky ny Fanahy Masina sy izahay tsy hampitondra enta-mavesatra anareo afa-tsy izao zavatra tsy maintsy hotandremana izao ihany: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'dia ny hifadianareo ny hena aterina amin''ny sampy sy ny rà sy ny zavatra kendaina ary ny fijangajangana; raha mahatandrin-tena hifady izany ianareo, dia ho soa. Veloma ianareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary rehefa nanatitra azy ny fiangonana, dia nandeha namaky an''i Foinika sy Samaria izy ka nilaza ny niovan''ny jentilisa; dia nampifaly ny rahalahy rehetra indrindra izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary rehefa nalefany izy ireo, dia nidina nankany Antiokia; ary namory ny olona maro izy, dia natolony ilay epistily. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary nony efa namaky izany ny olona, dia nifaly noho ny anatra tsara. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary satria mpaminany Joda sy Silasy, dia namporisika ny rahalahy tamin''ny teny maro izy ka nampahery azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary rehefa nitoetra elaela teo izy ireo, dia nampandehanin'ny rahalahy soa aman-tsara ho any amin'izay naniraka azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: (34) Nefa mbola sitrak''i Silasy ny hitoetra ao'
      marker-yv: yv-n
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ary Paoly sy Barnabasy kosa nitoetra tany Antiokia; dia nampianatra sy nitory ny tenin'ny Tompo izy roa lahy mbamin'ny maro koa.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary rehefa afaka andro vitsivitsy, dia hoy Paoly tamin''i Barnabasy: Andeha isika hiverina hamangy ny rahalahy any amin''ny tanàna rehetra izay efa nitoriantsika ny tenin''ny Tompo, hahitantsika izay toetrany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary tian''i Barnabasy ny hitondra an''i Jaona, izay atao hoe Marka, hiaraka aminy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Nefa nataon''i Paoly fa tsy tokony ho entiny miaraka aminy izy, satria nandao azy tany Pamfylia ka tsy niaraka taminy ho any amin''ny raharaha. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary nifanditra mafy izy roa lahy ka nisaraka; ary Barnabasy nitondra an''i Marka, dia niondrana an-tsambo nankany Kyprosy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary rehefa tonga tany Jerosalema izy, dia noraisin'ny fiangonana sy ny Apostoly ary ny loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: ', ka dia nilaza izay rehetra efa nataon''Andriamanitra tamin''ny nombany azy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Fa Paoly kosa nifidy an''i Silasy, dia niainga, rehefa natolotry ny rahalahy ho amin''ny fahasoavan''ny Tompo izy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Dia nandeha namaky an'i Syria sy Kilikia izy nampahery ny fiangonana tany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa ny mino sasany, izay isan''ny antokon''ny Fariseo kosa, dia nitsangana ka nanao hoe: Tsy maintsy forana ireny ka asaina mitandrina ny lalàn''i Mosesy.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary dia nivory ny Apostoly sy ny loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: ' mba hihevitra izany zavatra izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary rehefa nisy ady hevitra be ihany, dia nitsangana Petera ka nanao taminy hoe: Ry rahalahy, fantatrareo fa hatramin''ny ela Andriamanitra dia efa nifidy teo aminareo fa amin''ny vavako no handrenesan''ny jentilisa ny tenin''ny filazantsara ka hinoany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary Andriamanitra, Izay mahalala ny fo, dia vavolombelony tamin''ny nanomezany azy ny Fanahy Masina tahaka antsika koa; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'fa tsy nataony misy hafa isika sy izy, fa nodioviny tamin''ny finoana ny fony. '
