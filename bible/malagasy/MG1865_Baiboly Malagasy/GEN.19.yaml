document_id: GEN.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niandohan'ny firenen'i Moaba Sy Amona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nankany Sodoma ilay anjely roa nony hariva, raha Lota nipetraka teo am-bavahadin''i Sodoma; ary raha nahita azy Lota, dia nitsangana mba hitsena azy izy ka niankohoka tamin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy izy: Mba mivilia ianareo, tompoko, ho ato an-tranon''ny mpanomponareo, ka mandria anio alina, ary sasao ny tongotrareo, ary hifoha maraina koa ianareo, dia handeha amin''izay lalan-kalehanareo. Fa hoy izy roa lahy: Tsia; fa hitoetra eto an-kianja ihany izahay anio alina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa noteren''i Lota fatratra izy roa lahy, dia nivily tany aminy izy ka niditra tao an-tranony; dia nanaovany nahandro izy sy nanendasany mofo tsy misy masirasira, dia nihinana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha tsy mbola nandry izy, dia avy manodidina ny trano ny mponina tao an-tanàna Sodoma, hatramin''ny tanora ka hatramin''ny antitra, dia ny vahoaka rehetra tao an-tanàna; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia niantso an''i Lota izy ireo ka nanao taminy hoe: Aiza ireo lehilahy vao tonga tato aminao izao alina izao? avoahy ho atỳ aminay izy hahalalanay azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nivoaka teo am-baravarana Lota hankeo aminy, ka nakatony ny varavarana teo ivohony; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary hoy izy: Masìna ianareo, ry rahalahiko, aza manao ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Indro, manan-janaka roa vavy aho, izay tsy mbola nahalala lahy; masìna ianareo, aoka re ireo no havoakako ho eto aminareo, ka hataonareo aminy izay sitraponareo; fa ireo lehilahy ireo kosa dia aza anaovanareo na inona na inona; fa tonga hialoka eto ambanin''ny tafon-tranoko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy izy ireo: Mialà eto ianao. Dia hoy izy ireo indray: Ilehity tonga etỳ hivahiny, kanefa matetika mila hiseho ho mpitsara; ankehitriny dia hanao ratsiratsy kokoa aminao noho ny amin''ireo lehilahy ireo izahay. Dia nanosika mafy an-dralehilahy izy ireo, dia an''i Lota, ka nisesika hamaky ny varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa naninjitra ny tànany izy roa lahy, dia nanintona an''i Lota hankao an-trano ho ao aminy, ka nakatony ny varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nampanjambena ny mason''ny lehilahy izay teo am-baravaran''ny trano izy hatramin''ny kely ka hatramin''ny lehibe; ka dia sasa-poana nitady ny varavarana ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy izy roa lahy tamin''i Lota : Mbola manana ato koa va ianao? dia izay vinantonao-lahy sy ny zanakao-lahy sy ny zanakao-vavy, ary na zovy na zovy anananao ato an-tanàna, ento miala amin''ity tanàna ity; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa horavanay ity tanàna ity, satria efa lehibe ny fitarainany eo anatrehan''i Jehovah; ka dia naniraka anay Jehovah handrava azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nivoaka Lota ary niteny tamin''ny vinantony, izay efa hanambady ny zananivavy, ka nanao hoe : Miaingà, miala amin''ity tanàna ity; fa horavan''i Jehovah ity tanàna ity. Fa nataon''ny vinantony ho tahaka ny mpanao vazivazy izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nony maraina koa ny andro, dia nandodona an''i Lota ireo anjely ka nanao hoe: Miaingà, ento ny vadinao sy ny zanakao roa vavy izay eto, fandrao mba haringana ianao noho ny heloky ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony nitaredretra izy, dia notantanan''izy roa lahy izy sy ny vadiny ary ny zanany roa vavy noho ny famindram-pon''i Jehovah taminy; dia nitondra azy nivoaka izy roa lahy ka nandao azy tany ivelan''ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa nitondra azy nivoaka tany ivelany izy, dia hoy ny anankiray: Mandosira hamonjy ny ainao; aza miherika ianao, na mijanona eny amin''ny tany lemaka rehetra; mandosira any an-tendrombohitra, fandrao haringana ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Lota taminy: Aza an''izany, Tompo ô! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'indro, fa efa nahita fitia teo imasonao ny mpanomponao, ary efa nahalehibe ny famindram-ponao ianao, izay nataonao tamiko hamonjenao ny aiko; ary tsy afa-mandositra any an-tendrombohitra aho, fandrao hahatratra ahy ny loza, ka ho faty aho; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'indro, io vohitra io dia akaiky handosirana sady kely; masìna ianao, aoka handositra ao aho (tsy kely va izy io?), dia ho velona ny aiko. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy izy taminy: Indro, efa nekeko koa ianao tamin''izany zavatra izany, ka tsy horavako io vohitra nolazainao io. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mandehana faingana, mandosira ho ao; fa tsy mahazo manao na inona na inona aho mandra-pahatonganao ao. Izany no nanaovana ny anaran''ny tanàna hoe Zoara. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny masoandro efa niposaka tamin''ny tany, raha tonga tao Zoara Lota. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Jehovah nandatsaka tamin''i Sodoma sy Gomora solifara sy afo, avy tamin''i Jehovah tany an-danitra, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ka nandrava ireny tanàna ireny sy ny tany lemaka rehetra sy ny mponina rehetra tao an-tanàna ary ny zava-maniry teo amin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa ny vadin''i Lota niherika teo ivohony, dia tonga vongan-tsira mitsangana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nifoha maraina koa Abrahama ka nankany amin''ilay efa nijanonany teo anatrehan''i Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary nitsinjo an''i Sodoma sy Gomora sy ny tany lemaka rehetra izy, dia nahita, ka, indro, niakatra ny setroky ny tany tahaka ny setroky ny lafaoro lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary raha noravan'Andriamanitra ny tanàna tany amin'ny tany lemaka, dia nahatsiaro an'i Abrahama Andriamanitra ka namoaka an'i Lota hiala teo afovoan'ny horavana, tamin'ny nandravany ny tanàna izay nonenan'i Lota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia niakatra Lota avy tao Zoara ka nitoetra tany an-tendrombohitra, dia izy sy ny zanany roa vavy; fa natahotra hitoetra tao Zoara izy; dia nitoetra tao an-johy izy sy ny zanany roa vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy ny vavimatoa tamin''ny zandriny: Efa antitra izao raintsika, ary tsy misy lehilahy ambonin''ny tany hanambady antsika araka ny fanaon''ny tany rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'andeha hampisotrointsika divay ny raintsika dia handry aminy isika hananantsika fara avy amin''ny raintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nampisotroiny divay ny rainy tamin''iny alina iny dia niditra ny vavimatoa ka nandry tamin-drainy; ary izy tsy nahafantatra izay nandriany na izay nifohazany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nony ampitson''iny dia hoy ny vavimatoa tamin''ny zandriny: Indro, efa nandry tamin''ny raintsika aho halina; aoka hampisotrointsika divay indray izy anio alina, dia midìra ianao ka mandria aminy hananantsika fara avy amin''ny raintsika. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nampisotroiny divay indray ny rainy tamin''iny alina iny; dia nitsangana ilay zandriny ka nandry taminy; ary izy tsy nahafantatra izay nandriany, na izay nifohazany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia samy nanan''anaka tamin-drainao ny zanak''i Lota roa vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia niteraka zazalahy ny vavimatoa, ka ny anarany nataony hoe Moaba; izy no rain''ny Moabita mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary ny zandriny koa dia niteraka zazalahy ary ny anarany nataony hoe Benamy; izy kosa no rain'ny taranak'i Amona mandraka androany.
