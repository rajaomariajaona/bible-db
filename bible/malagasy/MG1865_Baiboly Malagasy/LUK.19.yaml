document_id: LUK.19,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Jesosy niditra ka nandeha namaky an''i Jeriko. '
  '10':
  - type: text
    content: 'Fa efa tonga ny Zanak''olona hitady sy hamonjy ny very. '
  '11':
  - type: text
    content: 'Ary raha mbola nihaino izany ny olona, dia nandroso niteny ihany Jesosy ka nanao fanoharana, satria efa akaiky an''i Jerosalema Izy, ka nataon''ny olona fa hiseho faingana ny fanjakan''Andriamanitra. '
  '12':
  - type: text
    content: 'Dia hoy Izy: Nisy andriandahy anankiray nandeha nankany an-tany lavitra mba handray fahefana hanjaka, dia hiverina. '
  '13':
  - type: text
    content: Dia niantso folo lahy tamin'ny mpanompony izy ary nanome azy farantsa
  - type: note
    content: Gr. mina = drakma = tokony ho farantsa 15
  - type: text
    content: ' folo ka nanao taminy hoe: Mandrantoa mandra-pihaviko. '
  '14':
  - type: text
    content: Fa ny vahoakany
  - type: note
    content: 'Na: vahoaka namany'
  - type: text
    content: ' nankahala azy, dia nampitondra reny nanaraka azy nanao hoe: Tsy manaiky hanjakan''iny lehilahy iny izahay. '
  '15':
  - type: text
    content: 'Ary nony tafaverina izy, rehefa nandray fahefana hanjaka, dia nasainy nantsoina hankeo aminy izany mpanompo nomeny ny vola izany mba hahitany izay azony tamin''ny fandrantoana. '
  '16':
  - type: text
    content: 'Dia tonga ny voalohany ka nanao hoe: Tompoko, ny farantsanao iray efa nahazoana tombony farantsa folo. '
  '17':
  - type: text
    content: 'Ary hoy izy taminy: Tsara izany, ry mpanompo tsara; satria nahatoky tamin''ny kely indrindra ianao, dia manapaha tanàna folo. '
  '18':
  - type: text
    content: 'Dia tonga ny anankiray koa ka nanao hoe: Tompoko, ny farantsanao iray efa tonga farantsa dimy. '
  '19':
  - type: text
    content: 'Ary hoy koa izy tamin''io: Manapaha tanàna dimy koa ianao. '
  '2':
  - type: text
    content: 'Ary, indro, nisy lehilahy atao hoe Zakaiosy, izay lehiben''ny mpamory hetra sady nanan-karena. '
  '20':
  - type: text
    content: 'Fa tonga kosa ny anankiray ka nanao hoe: Tompoko, indry ny farantsanao, izay notehiriziko voafono amin''ny mosara. '
  '21':
  - type: text
    content: 'Fa natahotra anao aho, satria olona mila voatsiary ianao ka maka izay tsy napetrakao, ary mijinja izay tsy nafafinao. '
  '22':
  - type: text
    content: 'Ary hoy ny tompony taminy: Ny vavanao no hitsarako anao, ry mpanompo ratsy fanahy: fantatrao fa izaho dia olona mila voatsiary ka maka izay tsy napetrako, ary mijinja izay tsy nafafiko; '
  '23':
  - type: text
    content: 'koa nahoana no tsy napetrakao tamin''ny mpanana vola ny volako, ka rehefa tonga aho, dia ho nandray ny ahy mban-janany? '
  '24':
  - type: text
    content: 'Ary hoy izy tamin''izay nitsangana teo anilany: Alao ny farantsa eny aminy, ka omeo ilay manana farantsa folo '
  '25':
  - type: text
    content: '(Fa hoy ireo taminy: Tompoko, efa manana farantsa folo izy.) '
  '26':
  - type: text
    content: 'Lazaiko aminareo: Izay rehetra manana dia homena; fa ny amin''izay tsy manana, na dia izay ananany aza dia halaina aminy. '
  '27':
  - type: text
    content: 'Fa ireo fahavaloko tsy nanaiky hanjakako ireo, dia ento atỳ , ka vonoy eto anatrehako. '
  '28':
  - type: text
    content: Ary rehefa niteny izany Izy, dia nandeha nialoha hiakatra ho any Jerosalema.
  '29':
  - type: text
    content: 'Ary raha nanakaiky an''i Betifaga sy Betania teo an-tendrombohitra atao hoe Oliva Izy, dia naniraka roa lahy tamin''ny mpianatra '
  '3':
  - type: text
    content: 'Ary nitady hahita izay Jesosy izy, kanefa ny afaka noho ny habetsahan''ny olona nifanety, satria fohy izy. '
  '30':
  - type: text
    content: 'ka nanao hoe: Mankanesa amin''iroa vohitra tandrifinareo iroa; ary raha vao miditra ao ianareo, dia hisy zana-boriky mifatotra ho hitanareo, izay tsy mbola nitaingenan''olona; vahao izy, ka ento erỳ . '
  '31':
  - type: text
    content: 'Ary raha misy manontany anareo hoe: Nahoana no vahanareo io? dia izao no holazainareo: Misy raharaha analan''ny Tompo azy. '
  '32':
  - type: text
    content: 'Ary nony nandeha ireo nirahina, dia nahita araka izay nolazainy taminy. '
  '33':
  - type: text
    content: 'Ary raha namaha ny zana-boriky izy, dia hoy ny tompony taminy: Nahoana no vahanareo ny zana-boriky? '
  '34':
  - type: text
    content: 'Ary hoy izy: Misy raharaha analan''ny Tompo azy. '
  '35':
  - type: text
    content: 'Dia nitondra azy ho any amin''i Jesosy izy ary nametraka ny lambany teo ambonin''ny zana-boriky, ka nampitaingeniny azy Jesosy. '
  '36':
  - type: text
    content: 'Ary raha nandeha Jesosy, dia namelatra ny lambany teny an-dalana izy lreo. '
  '37':
  - type: text
    content: 'Ary rehefa nanakaiky Izy ka tonga teo am-pidinana amin''ny tendrombohitra Oliva, dia nifaly avokoa ny mpianatra maro be ka nidera an''Andriamanitra tamin''ny feo mahery noho ny asa lehibe rehetra izay efa hitany '
  '38':
  - type: text
    content: 'ka nanao hoe: Isaorana anie ny Mpanjaka, Izay avy amin''ny anaran''i Jehovah. Fiadanana any an-danitra, ary voninahitra any amin''ny avo indrindra. '
  '39':
  - type: text
    content: 'Fa ny Fariseo sasany, izay teo amin''ny vahoaka, nanao taminy hoe: Mpampianatra ô, rarao ny mpianatrao. '
  '4':
  - type: text
    content: 'Dia nihazakazaka nialoha izy ka nananika aviavy hizaha an''i Jesosy; fa efa handalo tamin''izany lalana izany Izy. '
  '40':
  - type: text
    content: 'Fa Izy namaly ka nanao hoe: Lazaiko aminareo fa raha mangina ireo, dia ny vato no hiantsoantso. '
  '41':
  - type: text
    content: 'Ary raha nanakaiky Izy ka nahita ny tanàna, dia nitomany azy '
  '42':
  - type: text
    content: 'ka nanao hoe: Raha mba nahafantatra mantsy ianao na dia amin''ity andro ity aza izay momba ny fiadanana! - fa ankehitriny miafina amin''ny masonao izany. '
  '43':
  - type: text
    content: 'Fa ho avy aminao ny andro izay hananganan''ny fahavalonao tovon-tany manodidina anao, dia hanemitra anao izy ka hanidy anao manodidina '
  '44':
  - type: text
    content: 'ary hamongotra anao hatramin''ny tany mbamin''ny zanakao ao anatinao, ka tsy havelany hisy vato mifanongoa eo aminao, ho valin''ny tsy nahafantaranao ny andro namangiana anao. '
  '45':
  - type: text
    content: 'Ary niditra teo an-kianjan''ny tempoly Jesosy, dia nandroaka izay nivarotra '
  '46':
  - type: text
    content: 'ka nanao taminy hoe: Efa voasoratra hoe: Ny tranoko dia trano fivavahana (Isa. 56. 7); fa ianareo kosa nanao azy ho zohy fieren''ny jiolahy (Jery. 7. 11). '
  '47':
  - type: text
    content: 'Ary nampianatra isan''andro teo an-kianjan''ny tempoly Izy. Fa ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona nitady hahafaty Azy; '
  '48':
  - type: text
    content: nefa tsy hitany izay hataony, satria ny vahoaka rehetra nazoto dia nazoto hihaino Azy.
  '5':
  - type: text
    content: 'Ary rehefa tonga teo Jesosy, dia niandrandra ka nanao taminy hoe: Ry Zakaiosy, midina faingana; fa tsy maintsy mitoetra ao an-tranonao Aho anio. '
  '6':
  - type: text
    content: 'Dia nidina faingana izy ka nampiantrano Azy sady faly. '
  '7':
  - type: text
    content: 'Ary raha nahita izany izy rehetra, dia nimonomonona ka nanao hoe: Lasa nandeha hiantrano amin''izay lehilahy mpanota Izy. '
  '8':
  - type: text
    content: 'Fa Zakaiosy kosa nitsangana ka nanao tamin''ny Tompo hoe: Indro, Tompoko, ny antsasaky ny fananako omeko ho an''ny malahelo; ary raha misy zavatr''olona nalaiko tamin''ny fanambakana, dia honerako avy efatra heny izany. '
  '9':
  - type: text
    content: 'Ary hoy Jesosy taminy: Anio no tonga eto amin''ity trano ity ny famonjena, fa izy dia zanak''i Abrahama koa. '
