document_id: EST.10,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Ahasoerosy mpanjaka nampandoa hetra ny tany sy ny nosin-dranomasina. '
  '2':
  - type: text
    content: 'Ary izay rehetra nataony araka ny fahefany sy ny heriny mbamin''ny filazana ny fahalehibiazan''i Mordekay, araka izay nanandratan''ny mpanjaka azy, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''i Media sy Persia va izany? '
  '3':
  - type: text
    content: Fa Mordekay Jiosy no nanarakaraka an'i Ahasoerosy mpanjaka sady nalaza tamin'ny Jiosy ka nankasitrahan'ny rahalahiny maro, satria nitady hihasoa ny fireneny izy sady nilaza fiadanana tamin'ny olona rehetra iray firazanana aminy.
