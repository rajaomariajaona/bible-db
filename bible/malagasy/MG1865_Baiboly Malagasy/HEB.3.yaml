document_id: HEB.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitahana an'i Kristy sy Mosesy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa amin''izany, ry rahalahy masina, mpiombona ny fiantsoana avy any an-danitra, hevero ny Apostoly sy Mpisoronabe Izay ekentsika, dia Jesosy, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay mahatoky ny nanendry Ary, tahaka an'i Mosesy koa tao amin'ny tranon'Andriamanitra rehetra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao Nom. 12. 7
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Izy dia natao miendrika hanam-boninahitra noho Mosesy, araka ny ananan''ny mpanao trano voninahitra bebe kokoa noho ny trano nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny trano rehetra dia samy nisy mpanao azy; fa Izay nanao ny zavatra rehetra kosa dia Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Mosesy dia mpanompo nahatoky tao amin''ny tranon''Andriamanitra rehetra, ho fanambarana izay zavatra mbola holazaina; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa Kristy kosa dia Zanaka manapaka ny tranon''Andriamanitra; ary isika no tranony, raha hazonintsika mafy hatramin''ny farany ny fahasahiana sy ny firavoravoana momba ny fanantenana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa araka izay lazain''ny Fanahy Masina hoe: "Anio, raha hihaino ny feony ianareo, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza manamafy ny fonareo tahaka ny tamin''ny fahasosorana, tamin''ny andro fakam-panahy tany an-efitra, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay nakan''ny razanareo fanahy Ahy tamin''ny nizahany toetra Ahy, Ary nahita ny asako efa-polo taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa tezitra tamin''izany taranaka izany Aho Ka nanao hoe: Ireo dia maniasia amin''ny fony mandrakariva Ka tsy nahalala ny lalako; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary araka izany no nianianako tamin''ny fahatezerako hoe: Tsy hiditra amin''ny fitsaharako mihitsy izy" (Sal. 95.7-11). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tandremo, ry rahalahy, fandrao hisy aminareo hanana fo ratsy tsy mino ka hiala amin''Andriamanitra velona; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa mifananara isan''andro, raha mbola atao hoe "Anio"; fandrao hisy aminareo ho tonga mafy fo noho ny famitahan''ny ota. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa efa tonga mpiombona amin''i Kristy isika, raha mihazona mafy ny fiandohan''ny fahatokiantsika hatramin''ny farany; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'raha atao hoe: "Anio, raha hihaino ny feony ianareo, Aza manamafy ny fonareo tahaka ny tamin''ny fahasosorana." (Sal. 95 7, 8). '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa iza moa no nahatezitra Azy, rehefa nandre? Tsy izay rehetra nentin''i Mosesy niala tany Egypta va? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary iza no nahatezitra Azy efa-polo taona? Tsy izay nanota va, ka dia niampatrampatra tany an-efitra ny fatiny? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary iza no nianianany fa tsy hiditra any amin''ny fitsaharany, afa-tsy izay tsy nanaiky? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ka dia hitantsika fa tsy nahazo niditra izy ireo noho ny tsi-finoany.
