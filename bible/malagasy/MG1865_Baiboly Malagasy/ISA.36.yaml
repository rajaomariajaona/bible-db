document_id: ISA.36,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanafihan'i Sankeriba an'i Joda, sy ny teny nampitondrainy ho any amin'i Hezekia, ary ny fitarainan'i Hezekia sy ny teny nasain'Andriamanitra nolazain'Isaia taminy
  - type: text
    content: 'Ary tamin''ny taona fahefatra ambin''ny folo nanjakan''i Hezekia mpanjaka dia niakatra Sankeriba, mpanjakan''i Asyria, hamely ny tanàna mimanda rehetra any Joda ka nahafaka azy. '
  '10':
  - type: text
    content: 'Koa moa haitraitro va izao niakarako izao? Tsia, fa Jehovah no naniraka ahy handrava ity tany ity ka nanao hoe: Miakara ho amin''izany tany izany, ka ravao izy. '
  '11':
  - type: text
    content: 'Dia hoy Eliakima sy Sebna ary Joa tamin-dRabsake: Masìna ianao, teny Syriana'
  - type: note
    content: Heb. Aramiana
  - type: text
    content: ' no ataovy amin''ny mpanomponao, fa fantatray ihany izany; fa aza manao teny Jiosy ho ren''ny olona eny ambonin''ny manda. '
  '12':
  - type: text
    content: 'Fa hoy Rabsake: Moa ho amin''ny tomponao sy ianao va no nanirahan''ny tompoko hilaza izany teny izany, fa tsy ho amin''ny olona izay mipetraka eny ambonin''ny manda, hihinanany izay tsy fihinany'
  - type: note
    content: Heb. ny tainy
  - type: text
    content: ' sy hisotroany izay tsy fisotrony'
  - type: note
    content: Heb. ny amaniny
  - type: text
    content: ' miaraka aminareo? '
  '13':
  - type: text
    content: 'Dia nijoro teo Rabsake ka niantso tamin''ny feo mahery tamin''ny teny Jiosy hoe: Henoy ny tenin''ny mpanjaka lehibe, dia ny mpanjakan''i Asyria. '
  '14':
  - type: text
    content: 'Izao no lazain''ny mpanjaka: Aza mety hofitahin''i Hezekia ianareo; fa tsy hahavonjy anareo izy tsy akory. '
  '15':
  - type: text
    content: 'Ary aza mety hampahatokin''i Hezekia an''i Jehovah ianareo amin''ny anaovany hoe: Jehovah no hamonjy antsika tokoa; ary tsy hatolotra eo an-tànan''ny mpanjakan''i Asyria tsy akory ity tanàna ity. '
  '16':
  - type: text
    content: 'Aza mihaino an''i Hezekia ianareo; fa izao no lazain''ny mpanjakan''i Asyria: Manaova fanekena amiko hiadananareo, ka mankanesa atỳ amiko, ary samia homana ny voalobony sy ny aviaviny, ary samia misotro ny rano avy amin''ny lavaka famorian-dranony avy ianareo, '
  '17':
  - type: text
    content: 'mandra-pihaviko hitondra anareo ho any amin''izay tany tahaka ny taninareo, dia tany misy vary sy ranom-boaloboka, tany misy mofo sy tanim-boaloboka. '
  '18':
  - type: text
    content: 'Aza mety homen''i Hezekia vohony ianareo amin''ny anaovany hoe: Jehovah no hamonjy antsika. Moa nisy nahavonjy ny taniny tamin''ny tanan''ny mpanjakan''i Asyria va ireo andriamanitry ny firenena ireo? '
  '19':
  - type: text
    content: 'Aiza moa ny andriamanitr''i Hamata sy Arpada? Ary aiza koa ny andriamanitr''i Sefarvaima? Nahavonjy an''i Samaria tamin''ny tanako va ireo andriamaniny? '
  '2':
  - type: text
    content: 'Ary ny mpanjakan''i Asyria naniraka an-dRabsake mbamin''ny miaramila betsaka avy teo Lakisy hankany Jerosalema ho any amin''i Hezekia mpanjaka. Dia nitsangana teo anilan''ny lakan-drano amin''ny kamory ambony izy, teo an-dalambe mankamin''ny sahan''ny mpamotsy lamba. '
  '20':
  - type: text
    content: 'Iza moa amin''ny andriamanitra rehetra amin''ireo tany ireo no efa nahavonjy ny taniny tamin''ny tanako, koa aiza no hahavonjen''i Jehovah an''i Jerosalema amin''ny tanako? '
  '21':
  - type: text
    content: 'Nefa nangina ny olona, ka tsy nisy namaly azy na dia teny indraim-bava akory aza, satria ny mpanjaka efa nandidy hoe: Aza misy mamaly azy. '
  '22':
  - type: text
    content: Ary Eliakima, zanak'i Hilkia, izay lehiben'ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak'i Asafa, mpitadidy ny raharaham-panjakana, dia niditra nankao amin'i Hezekia, sady voatriatra ny fitafiany, ary nilaza taminy ny tenin-dRabsake izy.
  '3':
  - type: text
    content: 'Ary Eliakima, zanak''i Hilkia, izay lehiben''ny tao an-dapa, sy Sebna mpanoratra ary Joa, zanak''i Asafa, mpitadidy ny raharaham-panjakana, dia nivoaka ho ao aminy. '
  '4':
  - type: text
    content: 'Dia hoy Rabsake tamin''ireo: Andeha, lazao amin''i Hezekia hoe: Izao no lazain''ny mpanjaka lehibe, dia ny mpanjakan''i Asyria: Inona moa izato itokianao? '
  '5':
  - type: text
    content: 'Hoy izaho: Teny foana ny hoe: Manana saina sy hery hiady aho. Fa iza no itokianao, no miodina amiko ianao? '
  '6':
  - type: text
    content: 'Indro, ianao matoky io tehina volotara torotoro io, dia Egypta, nefa raha itehenan''olona io, dia manindrona ny tànany miboroaka; eny, tahaka izany Farao, mpanjakan''i Egypta, amin''izay rehetra matoky azy. '
  '7':
  - type: text
    content: 'Fa raha hoy ianao amiko: Jehovah Andriamanitray no itokianay, moa tsy Azy va ny fitoerana avo aman''alitara izay noravan''i Hezekia, izay nilaza tamin''ny Joda sy Jerosalema hoe: Eto anoloan''ity alitara ity no hiankohofanareo? '
  '8':
  - type: text
    content: 'Koa aoka hifaninana ianao sy ny tompoko, mpanjakan''i Asyria, fa homeko soavaly roa arivo ianao, raha tàhiny manana olona hitaingina azy. '
  '9':
  - type: text
    content: 'Hataonao ahoana no fampiamboho ny komandy iray amin''ny mpanompon''ny tompoko, na dia izay kely indrindra aminy aza, nefa matoky an''i Egypta ianao hahazoanao kalesy sy mpitaingin-tsoavaly? '
