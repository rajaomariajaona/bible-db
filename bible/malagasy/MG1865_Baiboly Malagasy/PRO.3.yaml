document_id: PRO.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famporisihana hanao soa amin'olona sy hanao ny marina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Anaka, aza manadino ny lalàko; Fa aoka ny fonao hitandrina ny didiko; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ka dia ho feno mitafotafo ny fitoeram-barinao, Ary hihoatra ny ranom-boaloboka eo amin'ny vata fanantazanao.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Anaka, aza manamavo ny famaizan''i Jehovah, Ary aza tofoka amin''ny fananarany; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa izay tian'i Jehovah no anariny, Dia tahaka ny ataon'ny ray amin'ny zanaka tiany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Sambatra izay olona mahita fahendrena Sy izay olona mahazo fahalalana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ny fandrantoana azy dia tsara noho ny fandrantoana volafotsy, Ary ny tombom-barotra aminy dia mihoatra noho ny volamena tsara. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Sarobidy noho ny voahangy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: perla'
      marker-yv: yv-n
    - type: text
      text: ' izy; Ary izay rehetra irinao tsy misy azo ampitahaina aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa andro maro no eo an-tànany ankavanana; Ary harena sy voninahitra no eo an-tànany ankavia. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Làlana mahafinaritra ny lalany, Ary fiadanana ny alehany rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hazon''aina ho an''izay rehetra mifikitra aminy izy; Ary izay rehetra mitana azy no hatao hoe sambatra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fahendrena no nanorenan''i Jehovah ny tany, Ary fahalalana no nampitoerany ny lanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa andro maro sy taona ela iainana Ary fiadanana no hanampiny ho anao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny fahalalany no entiny mampiboiboika ny rano any amin''ny lalina Sy ampitetevany ando avy amin''ny rahona. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Anaka, aoka tsy hiala amin''ny masonao izany; Raketo ny tena fahendrena sy ny fisainana mazava, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ka dia ho ain''ny fanahinao izany Ary ho firavaky ny vozonao, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia handroso aman-toky ianao, Ka tsy ho tafintohina ny tongotrao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tsy hatahotra ianao, raha mandry; Eny, handry ianao, ary ho mamy ny torimasonao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Aza manahy ny tahotra avy tampoka, Na ny rivo-doza mamely
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny fandringanana avy amin''ny'
      marker-yv: yv-n
    - type: text
      text: ' ny ratsy fanahy, raha avy izany; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fa Jehovah no ho tokinao Ka hiambina ny tongotrao tsy ho voafandrika.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Aza mamihina ny soa amin'izay tokony homena azy, Raha azon'ny tananao atao ihany;
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Aza manao amin''ny namanao hoe: Mandehana, ka avia indray, fa rahampitso no homeko; Kanefa manana ihany ianao.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Aza mamorona sain-dratsy ho enti-mamely ny namanao, Saingy mitoetra matoky eo aminao izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Aoka tsy handao anao ny famindram-po sy ny fahamarinana; Afehezo eo am-bozonao izany, Ary soraty ao amin''ny fonao tahaka ny amin''ny vato fisaka, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Aza miady amin'olona foana, Raha tsy mbola nanisy ratsy anao izy.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Aza mialona ny olon-dozabe, Na mifidy izay lalany akory,
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Satria fahavetavetana eo imason''i Jehovah ny maniasia, Fa ao amin''ny marina kosa ny fisakaizany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ny ozon''i Jehovah dia ao an-tranon''ny ratsy fanahy; Fa ny fonenan''ny marina dia tahìny kosa. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Na dia tsiratsirainy aza ny mpaniratsira, Dia omeny fahasoavana kosa ny mpandefitra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ny hendry handova voninahitra; Fa henatra kosa no ho anjaran'ny adala.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ka dia hahazo fitia sy fahalalana tsara Eo anatrehan'Andriamanitra sy ny olona ianao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Matokia an''i Jehovah amin''ny fonao rehetra, Fa aza miankina amin''ny fahalalanao; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Maneke Azy amin'ny alehanao rehetra, Fa Izy handamina ny lalanao,
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aza manao anao ho hendry; Matahora an''i Jehovah, ka mifadia ny ratsy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia ho famelombelomana ny nofonao izany Sy ho fanamandoana ny taolanao.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mankalazà an''i Jehovah amin''ny fanananao Sy amin''izay voaloham-bokatrao rehetra; '
