document_id: PRO.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Famporisihana hanao soa amin'olona sy hanao ny marina
  - type: text
    content: 'Anaka, aza manadino ny lalàko; Fa aoka ny fonao hitandrina ny didiko; '
  '10':
  - type: text
    content: Ka dia ho feno mitafotafo ny fitoeram-barinao, Ary hihoatra ny ranom-boaloboka eo amin'ny vata fanantazanao.
  '11':
  - type: text
    content: 'Anaka, aza manamavo ny famaizan''i Jehovah, Ary aza tofoka amin''ny fananarany; '
  '12':
  - type: text
    content: Fa izay tian'i Jehovah no anariny, Dia tahaka ny ataon'ny ray amin'ny zanaka tiany.
  '13':
  - type: text
    content: 'Sambatra izay olona mahita fahendrena Sy izay olona mahazo fahalalana. '
  '14':
  - type: text
    content: 'Fa ny fandrantoana azy dia tsara noho ny fandrantoana volafotsy, Ary ny tombom-barotra aminy dia mihoatra noho ny volamena tsara. '
  '15':
  - type: text
    content: Sarobidy noho ny voahangy
  - type: note
    content: 'Na: perla'
  - type: text
    content: ' izy; Ary izay rehetra irinao tsy misy azo ampitahaina aminy. '
  '16':
  - type: text
    content: 'Fa andro maro no eo an-tànany ankavanana; Ary harena sy voninahitra no eo an-tànany ankavia. '
  '17':
  - type: text
    content: 'Làlana mahafinaritra ny lalany, Ary fiadanana ny alehany rehetra. '
  '18':
  - type: text
    content: 'Hazon''aina ho an''izay rehetra mifikitra aminy izy; Ary izay rehetra mitana azy no hatao hoe sambatra. '
  '19':
  - type: text
    content: 'Fahendrena no nanorenan''i Jehovah ny tany, Ary fahalalana no nampitoerany ny lanitra. '
  '2':
  - type: text
    content: 'Fa andro maro sy taona ela iainana Ary fiadanana no hanampiny ho anao. '
  '20':
  - type: text
    content: 'Ny fahalalany no entiny mampiboiboika ny rano any amin''ny lalina Sy ampitetevany ando avy amin''ny rahona. '
  '21':
  - type: text
    content: 'Anaka, aoka tsy hiala amin''ny masonao izany; Raketo ny tena fahendrena sy ny fisainana mazava, '
  '22':
  - type: text
    content: 'Ka dia ho ain''ny fanahinao izany Ary ho firavaky ny vozonao, '
  '23':
  - type: text
    content: 'Dia handroso aman-toky ianao, Ka tsy ho tafintohina ny tongotrao. '
  '24':
  - type: text
    content: 'Tsy hatahotra ianao, raha mandry; Eny, handry ianao, ary ho mamy ny torimasonao. '
  '25':
  - type: text
    content: Aza manahy ny tahotra avy tampoka, Na ny rivo-doza mamely
  - type: note
    content: 'Na: ny fandringanana avy amin''ny'
  - type: text
    content: ' ny ratsy fanahy, raha avy izany; '
  '26':
  - type: text
    content: Fa Jehovah no ho tokinao Ka hiambina ny tongotrao tsy ho voafandrika.
  '27':
  - type: text
    content: Aza mamihina ny soa amin'izay tokony homena azy, Raha azon'ny tananao atao ihany;
  '28':
  - type: text
    content: 'Aza manao amin''ny namanao hoe: Mandehana, ka avia indray, fa rahampitso no homeko; Kanefa manana ihany ianao.'
  '29':
  - type: text
    content: Aza mamorona sain-dratsy ho enti-mamely ny namanao, Saingy mitoetra matoky eo aminao izy.
  '3':
  - type: text
    content: 'Aoka tsy handao anao ny famindram-po sy ny fahamarinana; Afehezo eo am-bozonao izany, Ary soraty ao amin''ny fonao tahaka ny amin''ny vato fisaka, '
  '30':
  - type: text
    content: Aza miady amin'olona foana, Raha tsy mbola nanisy ratsy anao izy.
  '31':
  - type: text
    content: Aza mialona ny olon-dozabe, Na mifidy izay lalany akory,
  '32':
  - type: text
    content: 'Satria fahavetavetana eo imason''i Jehovah ny maniasia, Fa ao amin''ny marina kosa ny fisakaizany. '
  '33':
  - type: text
    content: 'Ny ozon''i Jehovah dia ao an-tranon''ny ratsy fanahy; Fa ny fonenan''ny marina dia tahìny kosa. '
  '34':
  - type: text
    content: 'Na dia tsiratsirainy aza ny mpaniratsira, Dia omeny fahasoavana kosa ny mpandefitra. '
  '35':
  - type: text
    content: Ny hendry handova voninahitra; Fa henatra kosa no ho anjaran'ny adala.
  '4':
  - type: text
    content: Ka dia hahazo fitia sy fahalalana tsara Eo anatrehan'Andriamanitra sy ny olona ianao.
  '5':
  - type: text
    content: 'Matokia an''i Jehovah amin''ny fonao rehetra, Fa aza miankina amin''ny fahalalanao; '
  '6':
  - type: text
    content: Maneke Azy amin'ny alehanao rehetra, Fa Izy handamina ny lalanao,
  '7':
  - type: text
    content: 'Aza manao anao ho hendry; Matahora an''i Jehovah, ka mifadia ny ratsy. '
  '8':
  - type: text
    content: Dia ho famelombelomana ny nofonao izany Sy ho fanamandoana ny taolanao.
  '9':
  - type: text
    content: 'Mankalazà an''i Jehovah amin''ny fanananao Sy amin''izay voaloham-bokatrao rehetra; '
