document_id: JER.28,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faminanian'i Hanania mpaminany sandoka, sy ny navalin'i Jeremia azy
  - type: text
    content: 'Ary tamin''izany taona izany ihany, dia tamin''ny niandohan''ny nanjakan''i Zedekia, mpanjakan''ny Joda, tamin''ny volana fahadimy tamin''ny taona fahefatra, no nitenenan''i Hanania, zanak''i Azora, mpaminany avy tany Gibeona, tamiko tao an-tranon''i Jehovah, teo anatrehan''ny mpisorona sy ny vahoaka rehetra, nanao hoe: '
  '10':
  - type: text
    content: 'Dia nesorin''i Hanania mpaminany ny zioga tamin''ny vozon''i Jeremia mpaminany ka notapahiny. '
  '11':
  - type: text
    content: 'Ary Hanania niteny teo anatrehan''ny vahoaka rehetra hoe: Izao no lazain''i Jehovah: tahaka izao no hanapahako ny ziogan''i Nebokadnezara, mpanjakan''ny Babylona, ho afaka amin''ny vozon''ny firenena rehetra ao anatin''ny roa taona. Ary dia lasa niala Jeremia mpaminany.'
  '12':
  - type: text
    content: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah, nony efa notapahin''i Hanania mpaminany ho afaka tamin''ny vozon''i Jeremia mpaminany ny zioga, nanao hoe: '
  '13':
  - type: text
    content: 'Mandehana, ka lazao amin''i Hanania hoe: Izao no lazain''i Jehovah: Zioga hazo no notapahinao, fa zioga vy kosa no hataonao solony. '
  '14':
  - type: text
    content: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Zioga vy no nataoko tamin''ny vozon''ireto firenena rehetra ireto mba hanompoany an''i Nebokadnezara, mpanjakan''i Babylona, ka dia hanompo azy izy; eny, na dia ny bibi-dia aza dia nomeko azy koa.'
  '15':
  - type: text
    content: 'Dia hoy Jeremia mpaminany tamin''i Hanania mpaminany: Mba henoy, ry Hanania: Tsy naniraka anao Jehovah; fa ianao dia mampitoky ity firenena ity amin''ny lainga. '
  '16':
  - type: text
    content: 'Koa izao no lazain''i Jehovah: Indro, hesoriko tsy ho amin''ny tany ianao; amin''ity taona ity ihany no hahafatesanao, satria fiodinana tamin''i Jehovah no notorinao '
  '17':
  - type: text
    content: Ka dia maty tamin'ny volana fahafito tamin'iny taona iny ihany Hanania mpaminany.
  '2':
  - type: text
    content: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Efa notapahiko ny ziogan''ny mpanjakan''i Babylona, '
  '3':
  - type: text
    content: 'ka ao anatin''ny roa taona no hampodiako ho amin''ity tanàna ity ny fanaka rehetra tao an-tranon''i Jehovah izay nalain''i Nebokadnezara, mpanjakan''i Babylona, avy tamin''ity tanàna ity ka nentiny ho any Babylona: '
  '4':
  - type: text
    content: 'ary Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, mbamin''ny Joda voababo rehetra, izay lasa tany Babylona, dia hampodiko ho amin''ity tanàna ity, hoy Jehovah; fa hotapahiko ny ziogan''ny mpanjakan''i Babylona. '
  '5':
  - type: text
    content: 'Dia hoy Jeremia mpaminany tamin''i Hanania mpaminany teo anatrehan''ny mpisorona sy ny vahoaka rehetra izay tao an-tranon''i Jehovah, '
  '6':
  - type: text
    content: 'Eny, amena! hoy Jeremia mpaminany; hataon''i Jehovah anie izany! hotanterahin''i Jehovah anie ny teninao, izay novinaninao ny amin''ny hampodiana ny fanaky ny tranon''i Jehovah mbamin''ny babo rehetra hiala any Babylona ka hiverina ho amin''ity tanàna ity indray. '
  '7':
  - type: text
    content: 'Kanefa kosa mba henoinao izao teny izao, izay holazaiko eto anatrehanao sy ny vahoaka rehetra: '
  '8':
  - type: text
    content: 'Ny mpaminany izay tany alohako sy tany alohanao hatramin''ny ela dia naminany ady sy loza ary areti-mandringana ho amin''ny tany maro sy ny fanjakana lehibe. '
  '9':
  - type: text
    content: 'Ny amin''ny mpaminany izay maminany fiadanana raha tanteraka ny teniny, dia ho fantatra ho mpaminany nirahin''i Jehovah tokoa izy. '
