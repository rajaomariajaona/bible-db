document_id: JER.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faminanian'i Hanania mpaminany sandoka, sy ny navalin'i Jeremia azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany taona izany ihany, dia tamin''ny niandohan''ny nanjakan''i Zedekia, mpanjakan''ny Joda, tamin''ny volana fahadimy tamin''ny taona fahefatra, no nitenenan''i Hanania, zanak''i Azora, mpaminany avy tany Gibeona, tamiko tao an-tranon''i Jehovah, teo anatrehan''ny mpisorona sy ny vahoaka rehetra, nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Efa notapahiko ny ziogan''ny mpanjakan''i Babylona, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka ao anatin''ny roa taona no hampodiako ho amin''ity tanàna ity ny fanaka rehetra tao an-tranon''i Jehovah izay nalain''i Nebokadnezara, mpanjakan''i Babylona, avy tamin''ity tanàna ity ka nentiny ho any Babylona: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, mbamin''ny Joda voababo rehetra, izay lasa tany Babylona, dia hampodiko ho amin''ity tanàna ity, hoy Jehovah; fa hotapahiko ny ziogan''ny mpanjakan''i Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy Jeremia mpaminany tamin''i Hanania mpaminany teo anatrehan''ny mpisorona sy ny vahoaka rehetra izay tao an-tranon''i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eny, amena! hoy Jeremia mpaminany; hataon''i Jehovah anie izany! hotanterahin''i Jehovah anie ny teninao, izay novinaninao ny amin''ny hampodiana ny fanaky ny tranon''i Jehovah mbamin''ny babo rehetra hiala any Babylona ka hiverina ho amin''ity tanàna ity indray. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanefa kosa mba henoinao izao teny izao, izay holazaiko eto anatrehanao sy ny vahoaka rehetra: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny mpaminany izay tany alohako sy tany alohanao hatramin''ny ela dia naminany ady sy loza ary areti-mandringana ho amin''ny tany maro sy ny fanjakana lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny amin''ny mpaminany izay maminany fiadanana raha tanteraka ny teniny, dia ho fantatra ho mpaminany nirahin''i Jehovah tokoa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nesorin''i Hanania mpaminany ny zioga tamin''ny vozon''i Jeremia mpaminany ka notapahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Hanania niteny teo anatrehan''ny vahoaka rehetra hoe: Izao no lazain''i Jehovah: tahaka izao no hanapahako ny ziogan''i Nebokadnezara, mpanjakan''ny Babylona, ho afaka amin''ny vozon''ny firenena rehetra ao anatin''ny roa taona. Ary dia lasa niala Jeremia mpaminany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah, nony efa notapahin''i Hanania mpaminany ho afaka tamin''ny vozon''i Jeremia mpaminany ny zioga, nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mandehana, ka lazao amin''i Hanania hoe: Izao no lazain''i Jehovah: Zioga hazo no notapahinao, fa zioga vy kosa no hataonao solony. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Zioga vy no nataoko tamin''ny vozon''ireto firenena rehetra ireto mba hanompoany an''i Nebokadnezara, mpanjakan''i Babylona, ka dia hanompo azy izy; eny, na dia ny bibi-dia aza dia nomeko azy koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy Jeremia mpaminany tamin''i Hanania mpaminany: Mba henoy, ry Hanania: Tsy naniraka anao Jehovah; fa ianao dia mampitoky ity firenena ity amin''ny lainga. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izao no lazain''i Jehovah: Indro, hesoriko tsy ho amin''ny tany ianao; amin''ity taona ity ihany no hahafatesanao, satria fiodinana tamin''i Jehovah no notorinao '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ka dia maty tamin'ny volana fahafito tamin'iny taona iny ihany Hanania mpaminany.
