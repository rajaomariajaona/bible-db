document_id: EZK.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'ny firenena mifanila fonenana amin'ny Isiraely, dia ny Amonita, ny Moabita, ny Edomita ary ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak''olona, manandrifia ny Amonita, ary maminania ny hamelezana azy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka ataovy aminy hoe: Mihainoa ny tenin''i Jehovah Tompo: Izao no lazain''i Jehovah Tompo; Noho ny nanaovanao hoe: Hià! sakoa izay! raha nolotoina ny fitoerako masina, Ary noravana ny tanin''ny Isiraely, Sady lasan-ko babo ny taranak''i Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia indro kosa, hatolotro ho fananan''ny zanaky ny atsinanana ianao, Ka haoriny ao aminao ny tobiny, ary hataony ao aminao ny fonenany; Ireny no hihinana ny vokatrao sy hisotro ny ronononao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary Raba dia hataoko tany fitoeran'ny rameva, ary ny taranak'i Amona ho tany fandrian'ny ondry aman'osy; Ka dia ho fantatrareo fa Izaho no Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao no lazain''i Jehovah Tompo: Noho ny nitehafanao tanana sy ny nitotoanao tamin''ny tongotrao ary ny nifalian''ny fonao tamin''ny fanaovana tsinontsinona ny tanin''ny Isiraely, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia, indro, hahinjitro aminao ny tanako, ka hatolotro ho babon'ny jentilisa ianao; Ary hofongorako tsy ho vanon-ko firenena intsony ianao, ka hataoko lany ritra tsy ho amin'ny tany; Eny, haringako ianao, ka dia ho fantatrao fa Izaho no Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Noho ny nanaovan''i Moaba sy Seïra hoe: Indro, ny taranak''i Joda efa tonga tahaka ny firenena rehetra izao, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia, indro, hotatahako kosa ny tanin''ny Moaba, hatrany amin''ny tanànany rehetra, izay ravaky ny tany, dia Beti-jesimota sy Bala-meona ary Kiriataima, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho an''ny zanaky ny atsinanana koa tahaka ny taranak''i Amona''ihany, eny, hatolotro ho fananan''ireny izy, mba tsy hotsarovana ao amin''ny firenena intsony ny taranak''i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hotanterahiko ny fitsarana an'i Moaba; ka dia ho fantany fa Izaho no Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Noho ny namelezan''i Edoma ny taranak''i Joda tamin''ny namaliany azy ary ny nanotany indrindra sy ny namaliany azy, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia izao no lazain''i Jehovah Tompo: Hahinjitro amin''i Edoma ny tanako, ka haringako ny olona sy ny biby ao aminy; Ary hataoko lao hatrany Temana izy sy ho lavon''ny sabatra hatrany Dedana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny tanan'ny Isiraely oloko no ho entiko mamaly an'i Edoma, ka hanao aminy araka ny fahatezerako sy ny fahavinirako ireo; Ka dia ho fantany ny famaliako, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Noho ny famaliana nataon''ny Filistina, eny, noho ny namaliany ratsy tamin''ny nanaovany tsinontsinona azy, ka nandringana noho ny fandrafiany hatry ny fony ela, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia izao no lazain''i Jehovah Tompo: Indro, hahinjitro amin''ny Filisitna ny tanako, ka haringako ny keretita, ary horavako izay sisa any amoron-dranomasina; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary famaizana mirehitra no ho entiko manao famaliana lehibe aminy; ka dia ho fantatra-fa Izaho no Jehovah, rehefa hataoko mihatra aminy ny famaliako.
