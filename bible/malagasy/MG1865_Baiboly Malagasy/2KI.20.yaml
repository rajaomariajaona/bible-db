document_id: 2KI.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahararian'i Hezekia, sy ny nanaretany ary ny nampamangian'i Berodaka-baladana, mpanjakan'i Babylona, azy, sy ny nahafatesany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany andro izany dia narary saiky maty Hezekia. Ary Isaia mpaminany, zanak''i Amoza, nankao aminy ka nilaza taminy hoe: Izao no lazain''i Jehovah: Hafaro ny ankohonanao, fa ho faty ianao, fa tsy ho velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitodika nankany amin''ny rindrina izy ka nivavaka tamin''i Jehovah hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jehovah ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin''ny fahamarinana sy tamin''ny foko rehetra ary ny nanaovako izay tsara eo imasonao. Dia nitomany mafy dia mafy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary raha tsy mbola tafavoaka ny tanàna
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: kianja'
    marker-yv: yv-n
  - type: text
    text: ' afovoany Isaia, dia tonga taminy ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Miverena, ka lazao amin''i Hezekia, mpanapaka ny oloko, hoe: Izao no lazain''i Jehovah, Andriamanitr''i Davida rainao: Efa nohenoiko ny fitarainanao, ary efa hitako ny ranomasonao; indro, hahasitrana anao Aho, ka raha afaka ampitso dia hiakatra ho ao an-tranon''i Jehovah ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hampiako dimy ambin''ny folo taona ny andronao; sady hamonjy anao sy ity tanàna ity amin''ny tanan''ny mpanjakan''i Asyria Aho; ary hiaro ity tanàna ity Aho noho ny amin''ny tenako sy Davida mpanompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Isaia: Makà ampempan''aviavy. Ary dia nalainy ka napetany tamin''ny vay, dia sitrana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Hezekia tamin''i Isaia: Inona no famantarana fa hositranin''i Jehovah aho ka hiakatra any an-tranon''i Jehovah raha afaka ampitso? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy Isaia: Izao no famantarana ho anao avy amin''i Jehovah hahalalanao fa Jehovah hanao izay zavatra nolazainy: handroso hàdiny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ambaratonga
    marker-yv: yv-n
  - type: text
    text: ' folo va ny aloka, sa hiverina hàdiny folo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Hezekia namaly hoe: Mora foana ny handrosoan''ny aloka hàdiny folo; tsy izany, fa aoka ny aloka hiverina hàdiny folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Isaia mpaminany nitaraina tamin''i Jehovah, ka nampiverina ny aloka hàdiny folo Jehovah, dia ilay nidinany teo amin''ny dialin''i Ahaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin''izany andro izany no nampitondran''i Berodaka baladana, zanak''i Baladana, mpanjakan''i Babylona, taratasy sy fanomezana ho an''i Hezekia; fa efa reny fa narary izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Hezekia nandray
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nihaino
    marker-yv: yv-n
  - type: text
    text: ' azy ka naneho azy ny trano rehetra fitehirizany zava-tsoa, dia volafotsy sy volamena sy zava-manitra ary menaka tsara, sy ny trano fitehirizana ny fiadiany rehetra mbamin''izay rehetra tao amin''ny firaketany: tsy nisy zavatra tsy nasehon''i Hezekia azy, na ny tao an-tranony, na ny tao amin''ny fanjakany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nankany amin''i Hezekia mpanjaka Isaia mpaminany ka nanao taminy hoe: Ahoana no nolazain''ireo olona nankaty aminao ireo, ary avy taiza moa izy? Ary hoy Hezekia: Avy tany an-tany lavitra izy, dia avy tany Babylona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia hoy izy: Ka inona avy anefa no hitany tato an-tranonao? Ary hoy Hezekia: Izay rehetra ato an-tranoko dia efa hitany avokoa: tsy misy zavatra tsy nasehoko azy ny ato amin''ny firaketako rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy Isaia tamin''i Hezekia: Henoy ary ny tenin''i Jehovah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Indro, avy ny andro, ka ho entina ho any Babylona izay rehetra ao an-tranonao sy izay rehetra noharin''ny razanao ka voarakitra mandraka androany; eny, tsy hisy sisa hijanona na inona na inona, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary na dia ny terakao aza dia hisy ho entiny koa; ka ho tandonaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ionoka
    marker-yv: yv-n
  - type: text
    text: ' any amin''ny lapan''ny mpanjakan''i Babylona ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy Hezekia tamin''Isaia: Tsara ny tenin''i Jehovah izay nolazainao. Ary hoy koa izy: Eny, tsy izany va, raha misy fiadanana amin''ny androko ka handry fahizay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny tantaran''i Hezekia sisa sy ny heriny rehetra mbamin''ny nanaovany ny kamory sy ny lakan-drano nitarihany rano ho ao an-tanàna, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary Hezekia lasa nodimandry any amin'ny razany; ary Manase zanany no nanjaka nandimby azy
