document_id: REV.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tyatira
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Soraty ho amin'ny anjelin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ' any Efesosy. Izao no lazain''ilay miharona ny kintana fito eny an-tànany ankavanana sady mandeha eo afovoan''ny fanaovan-jiro volamena fito: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fantatro ny asanao sy ny fikelezanao aina sy ny faharetanao ary ny tsi-fahazakanao izay mpanao ratsy; ary ianao efa nizaha toetra izay milaza ny tenany ho Apostoly, kanjo tsy izy, ary hitanao fa mpandainga izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary manana faharetana ianao ka niaritra noho ny anarako sady tsy reraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Kanefa manan-teny aminao Aho, satria efa niala tamin''ny fitiavanao voalohany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa tsarovy izay nitoeranao fony tsy mbola lavo, dia mibebaha, ka manaova ny asa voalohany; fa raha tsy izany, dia ho avy aminao Aho ka hamindra ny fanaovan-jironao hiala amin''ny fitoerany, raha tsy mibebaka ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Kanefa izao no toetranao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. anananao
    marker-yv: yv-n
  - type: text
    text: ': halanao ny asan''ny Nikolaita, izay halako koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay manan-tsofina, aoka izy hihaino izay lazain'ny Fanahy amin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: . Izay maharesy dia havelako hihinana ny avy amin'ny hazon'aina, izay eo amin'ny Paradisan'Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary soraty ho amin'ny anjelin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ' any Smyrna: Izao no lazain''ny Voalohany sy ny Farany, Izay efa maty, nefa velona indray:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fantatro ny fahorianao sy ny fahantranao (nefa manan-karena ianao), ary ny fitenenan-dratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. blasfemia; izahao Mat. 9, 3
    marker-yv: yv-n
  - type: text
    text: ' ataon''izay milaza ny tenany ho Jiosy, kanjo tsy izy, fa synagogan''i Satana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza matahotra izay efa hiaretanao; indro, ny devoly efa hanao ny sasany aminareo ao an-tranomaizina, mba ho voazaha toetra ianareo, ary hanam-pahoriana hafoloana. Aoka ho mahatoky hatramin''ny fahafatesana ianao, dia homeko anao ny satro-boninahitra fiainana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay manan-tsofina, aoka izy hihaino izay lazain'ny Fanahy amin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: . Izay maharesy dia tsy hosimban'ny fahafatesana faharoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary soraty ho amin'ny anjelin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ' any Pergamosy: Izao no lazain''ilay manana ny sabatra roa lela maranitra:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fantatro izay onenanao, dia ao amin''ny itoeran''ny seza fiandrianan''i Satana; ary mitàna mafy ny anarako ianao ka tsy nandà ny finoana Ahy, na dia tamin''ny andron''i Antipasy martiorako aza, izay lehilahy nahatoky Ahy, dia ilay novonoina teo aminareo, teo amin''izay onenan''i Satana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa manan-teny kely aminao Aho, fa misy eo aminao izay mitàna ny fampianaran''i Balama, ilay nanome fo an''i Balaka hanisy fahatafintohinana teo anoloan''ny Zanak''isiraely, hihinana hena naterina tamin''ny sampy sy hijangajanga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary toy izany koa, misy eo aminao izay mitàna ny fampianaran''ny Nikolaita tahaka ny an''ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa dia mibebaha; fa raha tsy izany, dia ho avy aminao faingana Aho ka hamely ireo amin''ny sabatry ny vavako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay manan-tsofina, aoka izy hihaino izay lazain'ny Fanahy amin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: . Izay maharesy dia homeko mana miafina sady homeko vato fotsy, ary eo amin'ny vato dia misy anaram-baovao voasoratra, izay tsy fantatr'olona afa-tsy izay mandray azy ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary soraty ho amin'ny anjelin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ' any Tyatira: Izao no lazain''ny Zanak''Andriamanitra, Izay manana maso toy ny lelafo, ary ny tongony tahaka ny varahina manganohano:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fantatro ny asanao sy ny fitiavanao sy ny finoanao sy ny fanompoanao ary ny faharetanao, ary ny asanao farany dia be noho ny voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Kanefa manan-teny aminao Aho, satria ianao mandefitra amin''ilay vehivavy Jezebela, izay milaza ny tenany ho mpaminanivavy ka mampianatra sady manoloky ny mpanompoko hijangajanga sy hihinana hena naterina tamin''ny sampy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nomeko andro hibebahany izy, nefa tsy mety mibebaka amin''ny fijangajangany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Indro, hampandamahiko eo am-pandriana izy, ary izay mijangajanga aminy dia hataoko ao amin''ny fahoriana lehibe, raha tsy hibebaka amin''ny asan-dravehivavy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary hovonoiko amin'ny fahafatesana ny zanany; ary ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ' rehetra hahalala fa Izaho no mandinika ny voa sy ny fo; ary homeko araka ny asanareo avy ianareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa aminareo izay sisa any Tyatira, dia izay tsy manana izany fampianarana izany sady tsy mba mahalala ny ataon''ireo hoe "sain-dalin''i Satana", dia izao no lazaiko: tsy hovesarako entana hafa ianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'kanefa izay anananareo dia tano mafy mandra-pihaviko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary izay maharesy ka mitandrina ny asako hatramin''ny farany dia homeko fahefana amin''ny jentilisa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary hiandry azy amin''ny tehim-by izy ka hanorotoro azy toy ny fanorotoro vilany tany, dia araka izay efa noraisiko tamin''ny Raiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary homeko azy ny kintana fitarika andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izay manan-tsofina, aoka izy hihaino izay lazain'ny Fanahy amin'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: .
