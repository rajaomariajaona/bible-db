document_id: JDG.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tantaran'Ibzana sy Elona ary Abdona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nivory ny lehilahy amin'ny Efraima, dia nandeha nianavaratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nankany Zafona'
    marker-yv: yv-n
  - type: text
    text: ' ka nanao tamin''i Jefta hoe: Nahoana no nandeha niady tamin''ny taranak''i Amona ianao ka tsy mba niantso anay hiaraka aminao? Hodoranay amin''ny afo ny tranonao sy ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hoy Jefta taminy: Izaho sy ny oloko efa nanana ady mafy tamin''ny taranak''i Amona; ary niantso anareo aho, fa tsy namonjy ahy tamin''ny tànany ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa hitako fa tsy namonjy ahy ianareo, dia nanao ny aiko tsy ho zavatra aho ka nandeha niady tamin''ny taranak''i Amona, ary natolotr''i Jehovah teo an-tanako izy, koa nahoana ianareo no miakatra atỳ amiko anio hila ady amiko? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Jefta dia namory ny lehilahy rehetra amin''ny Gileada ka niady tamin''ny Efraima; ary dia namely ny Efraima ny lehilahy amin''ny Gileada, satria hoy ireo: Hianareo Gileadita dia mpandositra avy amin''ny Efraima ao amin''ny taranak''i Efraima sy Manase. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia novonjen''ny Gileada ny fitàna any Jordana mankany amin''ny Efraima; ary nony niteny ny mpandositra avy amin''ny Efraima nanao hoe: Aoka mba hita aho; dia hoy ny lehilahy amin''ny Gileada taminy: Efraimita va ianao? ary raha hoy izy: Tsia, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia hoy izy ireo taminy: Tonony ary ny hoe Shiboleta; fa hoy kosa izy: Siboleta, satria tsy nahay nanonona izany marina izy. Dia nisambotra azy ireo ka namono azy teo amin''ny fitàna ao Jordana; ary nahafatesana roa arivo sy efatra alina ny Efraimita tamin''izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia nitsara ny Isiraely enin-taona Jefta. Ary maty Jefta Gileadita ka nalevina tao amin'ny tanana anankiray any Gileada.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Ibzana, avy any Betlehema, no nitsara ny Isiraely nandimby an''i Jefta. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izy nanana zanakalahy telo-polo sy zanakavavy telo-polo, izay nampanambadiny tany ivelany, ary zazavavy telo-polo kosa no nampidiriny ho an''ny zananilahy. Ary nitsara ny Isiraely fito taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia maty Ibzana ka nalevina tany Betlehema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Elona Zebolonita no nitsara ny Isiraely nandimby azy; ary nitsara ny Isiraely folo taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia maty Elona Zebolonita ka nalevina tany Aialona ao amin'ny tanin'ny Zebolona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Abdona, zanak''i Elela, avy any Piratona, no nitsara ny Isiraely nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nanana zanakalahy efa-polo sy zafy telo-polo izay nitaingina zana-boriky fito-polo izy, ary nitsara ny Isiraely valo taona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia maty Abdona, zanak'i Elela, avy any Piratona, ka nalevina tany Piratona, any amin'ny tanin'ny Efraima any amin'ny tany havoan'ny Amalekita.
