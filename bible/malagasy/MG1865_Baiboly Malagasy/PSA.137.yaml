document_id: PSA.137,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatsiarovana ny alahelon'ny babo tany Babylona
  - type: text
    content: 'Teo amoron''ny onin''i Babylona no nipetrahanay, Sady nitomanianay, raha nahatsiaro an''i Ziona. '
  '2':
  - type: text
    content: 'Teo amin''ny hazomalahelo teo afovoan''i Babylona No nanantonanay ny lokanganay. '
  '3':
  - type: text
    content: 'Fa teo dia nangataka anay hihira izay namabo anay; Ary izay nampahory anay nangataka anay hanao fifaliana ka nanao hoe: Manaova hiran''i Ziona eto anatrehanay.'
  '4':
  - type: text
    content: 'Nefa ho nataontsika ahoana no fihira ny fihiran''i Jehovah Tany an-tany nivahiniana? '
  '5':
  - type: text
    content: 'Raha manadino anao aho, ry Jerosalema ô, Aoka kosa ny tanako ankavanana mba hanadino. '
  '6':
  - type: text
    content: 'Raha tsy mahatsiaro anao aho, Aoka ny lelako hiraikitra amin''ny lanilaniko, Raha tsy Jerosalema no ataoko ambony indrindra amin''ny fifaliako rehetra. '
  '7':
  - type: text
    content: 'Jehovah ô, tsarovy amin''ny taranak''i Edoma Ny andron''i Jerosalema, Dia ireo izay nanao hoe: Ravao, ravao izy Hatramin''ny fanorenany. '
  '8':
  - type: text
    content: Ry Babylona zanakavavy izay efa resy
  - type: note
    content: 'Na: ho resy'
  - type: text
    content: ', Sambatra izay mamaly anao Araka izay nataonao taminay. '
  '9':
  - type: text
    content: Sambatra izay maka ny zanakao madinika ka manjera azy ho torotoro, Amin'ny harambato.
