document_id: PSA.137
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahatsiarovana ny alahelon'ny babo tany Babylona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Teo amoron''ny onin''i Babylona no nipetrahanay, Sady nitomanianay, raha nahatsiaro an''i Ziona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Teo amin''ny hazomalahelo teo afovoan''i Babylona No nanantonanay ny lokanganay. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa teo dia nangataka anay hihira izay namabo anay; Ary izay nampahory anay nangataka anay hanao fifaliana ka nanao hoe: Manaova hiran''i Ziona eto anatrehanay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa ho nataontsika ahoana no fihira ny fihiran''i Jehovah Tany an-tany nivahiniana? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha manadino anao aho, ry Jerosalema ô, Aoka kosa ny tanako ankavanana mba hanadino. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha tsy mahatsiaro anao aho, Aoka ny lelako hiraikitra amin''ny lanilaniko, Raha tsy Jerosalema no ataoko ambony indrindra amin''ny fifaliako rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jehovah ô, tsarovy amin''ny taranak''i Edoma Ny andron''i Jerosalema, Dia ireo izay nanao hoe: Ravao, ravao izy Hatramin''ny fanorenany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ry Babylona zanakavavy izay efa resy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho resy'
    marker-yv: yv-n
  - type: text
    text: ', Sambatra izay mamaly anao Araka izay nataonao taminay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sambatra izay maka ny zanakao madinika ka manjera azy ho torotoro, Amin'ny harambato.
