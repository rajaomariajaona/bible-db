document_id: 2KI.13,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan'i Joahaza sy Joasy zanany tamin'ny Isiraely, ary ny nahafatesan'i Elisa
  - type: text
    content: 'Tamin''ny taona fahatelo amby roa-polo nanjakan''i Joasy, zanak''i Ahazia, mpanjakan''ny Joda, no vao nanjakan''i Joahaza, zanak''i Jeho, tamin''ny Isiraely tany Samaria, ary nanjaka fito ambin''ny folo taona izy. '
  '10':
  - type: text
    content: 'Tamin''ny taona fahafito amby telo-polo nanjakan''i Joasy, mpanjakan''ny Joda, no vao nanjakan''i Joasy, zanak''i Joahaza, tamin''ny Isiraely tany Samaria, ary nanjaka enina ambin''ny folo taona izy. '
  '11':
  - type: text
    content: 'Ary nanao izay ratsy eo imason''i Jehovah izy; fa tsy niala tamin''ny fahotana rehetra izay nataon''i Jeroboama, zanak''i Nebata, sady nampanotany ny Isiraely; fa nandeha tamin''izany ihany izy. '
  '12':
  - type: text
    content: 'Ary ny tantaran''i Joasy sisa mbamin''izay rehetra nataony sy ny heriny niadiany tamin''i Amazia, mpanjakan''ny Joda, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  '13':
  - type: text
    content: Ary Joasy lasa nodi-mandry any amin'ny razany, ary Jeroboama nipetraka tamin'ny seza fiandrianany; ary Joasy dia nalevina tany Samaria tao amin'ny mpanjakan'ny Isiraely.
  '14':
  - type: text
    content: 'Ary Elisa dia nararin''ny aretina izay hahafaty azy. Ary Joasy, mpanjakan''ny Isiraely, nidina nankany aminy ka niondrika nitomany teo ambonin''ny tavan''i Elisa ka nanao hoe: Ry ikaky ô, ry ikaky ô, ny kalesin''ny Isiraely sy ny mpitaingin-tsoavaliny! '
  '15':
  - type: text
    content: 'Ary hoy Elisa taminy: Makà tsipìka sy zana-tsipìka. Ary dia naka tsipìka sy zana-tsipìka izy. '
  '16':
  - type: text
    content: 'Ary hoy izy tamin''ny mpanjakan''ny Isiraely: Henjano ny tsipìka. Dia nohenjaniny; ary Elisa nametraka ny tànany teo amin''ny tanan''ny mpanjaka. '
  '17':
  - type: text
    content: 'Ary hoy izy: Vohay ny varavarankely atsinanana. Ary dia novohany. Dia hoy Elisa: Alefao. Ka dia nalefany. Ary hoy izy: Zana-tsipìkan''ny famonjen''i Jehovah, dia zana-tsipìkan''ny famonjena hahavoa ny Syriana! fa hamely ny Syriana ao Afeka ianao mandra-pandringanao azy. '
  '18':
  - type: text
    content: 'Ary hoy koa izy: Raiso ny zana-tsipìka. Dia noraisiny. Ary hoy izy tamin''ny mpanjakan''ny Isiraely: Kapohy ny tany. Ary nokapohiny intelo, dia nitsahatra izy. '
  '19':
  - type: text
    content: 'Ary ilay lehilahin''Andriamanitra dia tezitra taminy ka nanao hoe: Tokony ho nikapoka indimy na inenina ianao, dia ho nasianao ny Syriana mandra-pandringanao azy; fa izao dia intelo ihany no hamelezanao ny Syriana.'
  '2':
  - type: text
    content: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa nanaraka ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely; tsy niala tamin''izany izy. '
  '20':
  - type: text
    content: 'Ary dia maty Elisa ka nalevina. Ary ny mpitoha adin''ny Moabita nananika ny tany amin''ny fitsingerenan''ny taona. '
  '21':
  - type: text
    content: Ary nisy nandevina olona, dia, indro, nahita ireo mpitoha ady izy, ka dia natsipiny tao am-pasan'i Elisa ny faty; ary raha vao nitehika tamin'ny taolan'i Elisa ny fatin-dralehilahy, dia velona izy ka nijoro tamin'ny tongony.
  '22':
  - type: text
    content: 'Ary Hazaela, mpanjakan''i Syria, nampahory ny Isiraely tamin''ny andro rehetra nanjakan''i Joahaza. '
  '23':
  - type: text
    content: 'Fa Jehovah namindra fo taminy sy niantra azy ary nitsinjo azy noho ny fanekeny tamin''i Abrahama sy Isaka ary Jakoba, ka tsy ta-handringana azy na hanaisotra azy tsy ho eo anatrehany mandraka ankehitriny. '
  '24':
  - type: text
    content: 'Ary maty Hazaela, mpanjakan''i Syria; ary Beni-hadada zanany no nanjaka nandimby azy. '
  '25':
  - type: text
    content: Ary Joasy, zanak'i Joahaza, naka indray teo an-tànan'i Beni-hadada, zanak'i Hazaela, ny tanàna izay efa nalain'i Hazaela teo an-tànan'i Joahaza, rain'i Joasy, tamin'ny ady. Intelo no nandresen'i Joasy azy, ka dia azony indray ny tanànan'ny Isiraely.
  '3':
  - type: text
    content: 'Ary ny fahatezeran''i Jehovah nirehitra tamin''ny Isiraely, ka dia natolony teo an-tanan''i Hazaela, mpanjakan''i Syria, sy teo an-tanan''i Beni-hadada, zanak''i Hazaela, mandrakariva izy. '
  '4':
  - type: text
    content: 'Ary Joahaza nifona tamin''i Jehovah, dia nohenoin''i Jehovah izy, satria hitany ny fahorian''ny Isiraely, fa nampahory azy ny mpanjakan''i Syria. '
  '5':
  - type: text
    content: 'Ary Jehovah nanome mpamonjy ho amin''ny Isiraely, ka dia afaka tamin''ny tanan''ny Syriana izy; ary nandry fahizay toy ny teo aloha ny Zanak''Isiraely. '
  '6':
  - type: text
    content: Kanefa tsy niala tamin'ny fahotan'ny taranak'i Jeroboama, izay nampanotany ny Isiraely, izy, fa nandeha tamin'izany ihany, ary na dia ilay Aseraha
  - type: note
    content: Anaran'andriamani-tsi-izy, na ny sariny
  - type: text
    content: ' aza dia mbola tao Samaria ihany. '
  '7':
  - type: text
    content: 'Fa tsy nisy sisa navelan''i Jehovah ho an''i Joahaza, afa-tsy mpitaingin-tsoavaly dimam-polo sy kalesy folo ary miaramila an-tongotra iray alina; fa ny mpanjakan''i Syria efa nandringana azy ka nanao azy ho toy ny vovoka hitsakitsahina. '
  '8':
  - type: text
    content: 'Ary ny tantaran''i Joahaza sisa mbamin''izay rehetra nataony ary ny heriny, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  '9':
  - type: text
    content: Ary Joahaza lasa nodi-mandry any amin'ny razany, dia nalevina tao Samaria izy; ary Joasy zanany no nanjaka nandimby azy.
