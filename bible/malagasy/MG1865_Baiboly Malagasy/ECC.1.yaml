document_id: ECC.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsy ahitana fahafaham-po, na dia amin'ny fitadiavam-pahendrena aza
  - type: text
    content: Ny tenin'i Mpitoriteny, zanak'i Davida, mpanjaka tany Jerosalema.
  '10':
  - type: text
    content: 'Raha misy zavatra azo lazaina hoe: He! ity no vaovao, dia ilay efa teo ela tany amin''ny andro talohantsika ihany izany. '
  '11':
  - type: text
    content: Tsy misy fahatsiarovana ny taloha; ary ny ho avy koa dia tsy hotsarovan'izay handimby azy.
  '12':
  - type: text
    content: 'Izaho Mpitoriteny dia mpanjakan''ny Isiraely tany Jerosalema; '
  '13':
  - type: text
    content: 'ary nampiasaiko ny foko mba hitady sy hikatsaka amim-pahendrena ny zavatra rehetra izay atao atỳ ambanin''ny lanitra; asa mahareraka omen''Andriamanitra hisasaran''ny zanak''olombelona izany. '
  '14':
  - type: text
    content: Efa hitako ny zavatra rehetra izay atao atỳ ambanin'ny masoandro; fa, indro, zava-poana sy misambo-drivotra
  - type: note
    content: 'Na: Homan-drivotra'
  - type: text
    content: ' foana izany rehetra izany. '
  '15':
  - type: text
    content: Ny meloka tsy mety tonga mahitsy; ary ny tsy ao tsy mba azo isaina
  - type: note
    content: 'Na: ny tsi-fahampiana dia tsy tambo isaina'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Hoy izaho tamin''ny foko: Indro, izaho nahazo fahendrena be dia be mihoatra noho izay rehetra talohako teto Jerosalema; eny, ny foko nahita ny fahendrena sy ny fahalalana betsaka. '
  '17':
  - type: text
    content: Ary nampiasaiko ny foko hahalala fahendrena sy hahalala fahaverezan-tsaina sy fahadalana; dia fantatro fa misambo-drivotra
  - type: note
    content: 'Na: Homan-drivotra'
  - type: text
    content: ' foana koa izany, '
  '18':
  - type: text
    content: satria izay be fahendrena dia be alahelo, ary izay mitombo fahalalana dia mitombo fahoriana.
  '2':
  - type: text
    content: Zava-poana dia zava-poana, hoy Mpitoriteny, zava-poana dia zava-poana, eny, zava-poana ny zavatra rehetra!
  '3':
  - type: text
    content: Inona no soa azon'ny olona amin'ny fisasarany rehetra izay isasarany atỳ ambanin'ny masoandro?
  '4':
  - type: text
    content: 'Lasa ny taranaka iray, ary mandimby kosa ny taranaka iray; fa ny tany mbola maharitra mandrakizay. '
  '5':
  - type: text
    content: 'Ny masoandro koa miposaka ary ny masoandro milentika sady miriotra ho any amin''ny fitoerana izay niposahany. '
  '6':
  - type: text
    content: 'Mianatsimo ny rivotra, dia mihodina mianavaratra, mivezivezy mandrakariva izy ka miverimberina manodidina indray. '
  '7':
  - type: text
    content: 'Ny renirano rehetra dia samy mankamin''ny ranomasina, nefa tsy tondraka ny ranomasina; any amin''izay falehan''ny renirano ihany no iverenany indray. '
  '8':
  - type: text
    content: Maivana
  - type: note
    content: Heb. Feno fahasasarana
  - type: text
    content: ' ny teny rehetra, ka tsy misy olona mahalaza'
  - type: note
    content: 'Na: Feno fahasasarana ny zavatra rehetra ka tsy hain''ny olona lazaina'
  - type: text
    content: '; ny maso tsy mamo mijery, ary ny sofina tsy mamo mihaino. '
  '9':
  - type: text
    content: 'Izay efa teo ihany no ho tonga indray, ary izay efa natao ihany no mbola hatao indray fa tsy misy zava-baovao akory atỳ ambanin''ny masoandro. '
