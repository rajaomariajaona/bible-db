document_id: 1PE.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famporisihana hitondra tena mifanaraka anim'ny filazantsara
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Petera, Apostolin''i Jesosy Kristy, mamangy ny mpivahiny monina any am-pielezana any Ponto, Galatia, Kapadokia, Asia sy Bitynia, dia olom-boafidy '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin''izany famonjena izany dia notadiavin''ny mpaminany sy nokatsahiny fatratra, dia ireo efa naminany ny fahasoavana ho anareo; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, nokatsahiny izay andro na izay toetry ny andro notondroin''ny Fanahin''i Kristy ao anatiny, raha nambarany rahateo ny fijalian''i Kristy sy ny voninahitra manaraka izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary naseho tamin'ireo fa tsy ho azy, fa ho anareo no nanompoany ny amin'izany zavatra izany, izay voalaza aminareo ankehitriny, tamin'ny tenin'ireo nitory ny filazantsara taminareo amin'ny Fanahy Masina, Izay nirahina avy tany an-danitra; izany zavatra izany dia tian'ny anjely hodinihina.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin''izany sikino ny sainareo, dia mahonona tena, ka antenao tsara ny fahasoavana izay ho entina ho anareo amin''ny hisehoan''i Jesosy Kristy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tahaka ny zanaka manoa, tsy mitondra tena araka ny filanareo fahiny tamin''ny tsi-fahalalanareo; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa araka ny fahamasinan''ilay niantso anareo, dia aoka mba ho masina koa ianareo amin''ny fitondran-tena rehetra, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria voasoratra hoe: "Ho masina ianareo, satria masina Aho" (Lev. 11.44). '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha Ilay tsy mizaha tavan''olona, fa mitsara araka ny asan''izy rehetra, no antsoinareo hoe Ray, dia mitondrà tena amin''ny fahatahorana mandritra ny andron''ny fivahinianareo etỳ ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa fantatrareo fa tsy zavatra mety ho simba, tahaka ny volafotsy sy ny volamena, no nanavotana anareo tamin''ny fitondran-tena adala, izay azonareo tamin''ny nentin-drazana, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny rà soan''i Kristy, toy ny ran''ny zanak''ondry tsy misy kilema ary tsy misy pentimpentina; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny fahalalana rahateo, izay an''Andriamanitra Ray, amin''ny fanamasinan''ny Fanahy, ho amin''ny fanarahana sy ny famafazan''ny ran''i Jesosy Kristy: hampitomboina ho anareo anie ny fahasoavana sy ny fiadanana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay fantatra rahateo, fony tsy mbola ary ny fanorenan''izao tontolo izao, fa efa naseho tamin''izao andro farany izao noho ny aminareo '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mino an''Andriamanitra amin''ny alalany, dia Ilay nanangana Azy tamin''ny maty ka nanome voninahitra Azy,- mba hiorenan''ny finoanareo sy ny fanantenanareo amin''Andriamanitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Satria efa nodiovinareo ny fanahinareo tamin'ny fanarahana ny fahamarinana ho amin'ny fitiavan-drahalahy tsy miangatra dia mifankatiava fatratra amin'ny fo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Na:(amin'ny fo madio)
      marker-yv: yv-n
    - type: text
      text: '; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa efa teraka indray ianareo, tsy tamin''ny voa mety ho lò, fa tamin''ny tsy mety ho lò, dia ny tenin''Andriamanitra, izay velona sady maharitra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa "ny nofo rehetra dia tahaka ny ahitra, Ary izay mety ho voninahiny dia tahaka ny vonin''ny ahitra. Malazo ny ahitra, ka mihintsana ny voniny; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny tenin'ny Tompo maharitra mandrakizay" (Isa. 40.6 - 8). Ary izany no tenin'ny filazantsara izay notorina taminareo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaorana anie Andriamanitra, Rain''i Jesosy Kristy Tompontsika, Izay niteraka antsika indray araka ny haben''ny famindram-pony ho amin''ny fanantenana velona tamin''ny nitsanganan''i Jesosy Kristy tamin''ny maty, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ho amin''ny lova tsy mety simba, tsy misy loto, tsy mety levona, voatahiry any an-danitra ho anareo, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay arovan''ny herin''Andriamanitra amin''ny finoana ho amin''ny famonjena efa vonona haseho any am-parany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no iravoravoanareo, na dia ampalahelovina vetivety ankehitriny amin''ny fakam-panahy maro samy hafa aza ianareo, raha tsy maintsy hisy izany, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho hita ho fiderana sy voninahitra ary fankalazana ny fizahan-toetra ny finoanareo (izay tsara lavitra noho ny volamena mety ho simba, na dia voazaha toetra tamin''ny afo aza), dia amin''ny hisehoan''i Jesosy Kristy; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay, na dia tsy mbola hitanareo aza, dia tianareo, ary na dia tsy hitanareo ankehitriny aza, anefa, satria inoanareo, dia iravoravoanareo amin''ny fifaliana tsy azo tononina sady be voninahitra, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mandray ny anton''ny finoanareo, dia ny famonjena ny fanahy. '
