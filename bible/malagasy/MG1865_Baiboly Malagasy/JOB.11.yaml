document_id: JOB.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny voalohany nataon'i Zofara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Zofara Namatita ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Moa tsy hovaliana va ny teny be toy izany? Ary moa raha maro vava, dia ho marina va?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny bedibedinao va no hampangina ny olona? Ka dia haniratsira ianao, ka tsy hisy handresy lahatra,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary dia hiteny hoe: Madio ny teny nalahatro, ary tsy nanan-tsiny teo imasonao aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Enga anie ka hiteny Andriamanitra ka hiloa-bava hamaly anao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia hasehony aminao ny fahendrena miafina, fa tsy hita lany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. roa sosona
    marker-yv: yv-n
  - type: text
    text: ' izany, ka dia ho fantatrao fa tsy dia novalian''Andriamanitra avokoa ny helokao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Takatry ny sainao va ny fomban
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny famantarana an'''
    marker-yv: yv-n
  - type: text
    text: '''Andriamanitra? Ary tanteraka va ny fahitanao ny Tsitoha'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avo tahaka ny lanitra izany! ka inona no hainao atao? Lalina noho ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: '! ka inona no fantatrao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lava noho ny tany ny ohany ary lehibe noho ny ranomasina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Raha mandroso Izy ka misambotra ary manao fitsarana, dia iza moa no mahasakana Azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa Izy mahafantatra ny olon-dratsy; Ary hitany ny heloka, na dia tsy mandinika akory aza Izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary hitany ny heloka izay tsy heverin''ny olona akory'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa na dia ny olom-poana aza dia hahazo fahendrena, ary na dia ny zanaky ny boriki-dia aza dia hateraka ho olombelona
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nefa ny olom-poana dia tsy manam-pahendrena; Eny, ny olombelona dia teraka ho toy ny boriki-dia'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha ampanatrehinao Azy ny fonao, ary atantinao aminy ny tananao,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ka misy heloka eo an-tananao, dia ario lavitra izany, ary aza avela hisy ratsy hitoetra ao an-dainao;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia hahazo hanandratra ny tavanao tsy misy tsiny ianao, koa hijoro tsara ary tsy hatahotra;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ho hadinonao ny fahorianao: Toy ny rano efa nandalo no hahatsiarovanao azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hamirapiratra lavitra noho ny mitataovovonana ny andronao; na dia sendra manjombona aza, dia ho tonga tahaka ny maraina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hatoky ianao, satria misy fanantenana; eny, hijery manodidina ianao ka handry tsy amin'ahiahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia ho tafandry ianao, fa tsy hisy hanaitaitra; Ary maro no hila sitraka aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ny mason'ny ratsy fanahy kosa ho pahina, ka ho very avokoa ny fiarovana azy, ary ny fialàna aina ihany no hany sisa azony antenaina.
