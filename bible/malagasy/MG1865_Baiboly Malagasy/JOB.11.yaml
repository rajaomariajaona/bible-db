document_id: JOB.11,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny voalohany nataon'i Zofara
  - type: text
    content: 'Dia namaly Zofara Namatita ka nanao hoe:'
  '10':
  - type: text
    content: Raha mandroso Izy ka misambotra ary manao fitsarana, dia iza moa no mahasakana Azy?
  '11':
  - type: text
    content: Fa Izy mahafantatra ny olon-dratsy; Ary hitany ny heloka, na dia tsy mandinika akory aza Izy
  - type: note
    content: 'Na: Ary hitany ny heloka izay tsy heverin''ny olona akory'
  - type: text
    content: .
  '12':
  - type: text
    content: Koa na dia ny olom-poana aza dia hahazo fahendrena, ary na dia ny zanaky ny boriki-dia aza dia hateraka ho olombelona
  - type: note
    content: 'Na: Nefa ny olom-poana dia tsy manam-pahendrena; Eny, ny olombelona dia teraka ho toy ny boriki-dia'
  - type: text
    content: .
  '13':
  - type: text
    content: Raha ampanatrehinao Azy ny fonao, ary atantinao aminy ny tananao,
  '14':
  - type: text
    content: Ka misy heloka eo an-tananao, dia ario lavitra izany, ary aza avela hisy ratsy hitoetra ao an-dainao;
  '15':
  - type: text
    content: Dia hahazo hanandratra ny tavanao tsy misy tsiny ianao, koa hijoro tsara ary tsy hatahotra;
  '16':
  - type: text
    content: 'Fa ho hadinonao ny fahorianao: Toy ny rano efa nandalo no hahatsiarovanao azy.'
  '17':
  - type: text
    content: Ary hamirapiratra lavitra noho ny mitataovovonana ny andronao; na dia sendra manjombona aza, dia ho tonga tahaka ny maraina.
  '18':
  - type: text
    content: Hatoky ianao, satria misy fanantenana; eny, hijery manodidina ianao ka handry tsy amin'ahiahy.
  '19':
  - type: text
    content: Dia ho tafandry ianao, fa tsy hisy hanaitaitra; Ary maro no hila sitraka aminao.
  '2':
  - type: text
    content: Moa tsy hovaliana va ny teny be toy izany? Ary moa raha maro vava, dia ho marina va?
  '20':
  - type: text
    content: Fa ny mason'ny ratsy fanahy kosa ho pahina, ka ho very avokoa ny fiarovana azy, ary ny fialàna aina ihany no hany sisa azony antenaina.
  '3':
  - type: text
    content: Ny bedibedinao va no hampangina ny olona? Ka dia haniratsira ianao, ka tsy hisy handresy lahatra,
  '4':
  - type: text
    content: 'Ary dia hiteny hoe: Madio ny teny nalahatro, ary tsy nanan-tsiny teo imasonao aho.'
  '5':
  - type: text
    content: Enga anie ka hiteny Andriamanitra ka hiloa-bava hamaly anao!
  '6':
  - type: text
    content: Dia hasehony aminao ny fahendrena miafina, fa tsy hita lany
  - type: note
    content: Heb. roa sosona
  - type: text
    content: ' izany, ka dia ho fantatrao fa tsy dia novalian''Andriamanitra avokoa ny helokao.'
  '7':
  - type: text
    content: Takatry ny sainao va ny fomban
  - type: note
    content: 'Na: ny famantarana an'''
  - type: text
    content: '''Andriamanitra? Ary tanteraka va ny fahitanao ny Tsitoha'
  '8':
  - type: text
    content: Avo tahaka ny lanitra izany! ka inona no hainao atao? Lalina noho ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: '! ka inona no fantatrao?'
  '9':
  - type: text
    content: Lava noho ny tany ny ohany ary lehibe noho ny ranomasina.
