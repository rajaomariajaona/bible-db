document_id: PSA.129,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hiafaran'ny mpandrafy an'i Ziona
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Mafy no nampahoriany ahy hatry ny fony aho mbola tanora, Eny, aoka hataon''ny Isiraely hoe: '
  '2':
  - type: text
    content: 'Mafy no nampahoriany ahy hatry ny fony aho mbola tanora; Nefa tsy naharesy ahy izy. '
  '3':
  - type: text
    content: Ny mpiasa dia niasa ny lamosiko; Efa nanalava ny vavasany izy.
  '4':
  - type: text
    content: 'Marina Jehovah: Efa nanapaka ny famatorana nataon''ny ratsy fanahy Izy. '
  '5':
  - type: text
    content: 'Aoka ho menatra sy hiamboho Izay rehetra mandrafy an''i Ziona '
  '6':
  - type: text
    content: 'Ka ho tahaka ny ahitra eo an-tampon-trano. Izay malazo, na dia tsy misy manongotra azy aza; '
  '7':
  - type: text
    content: 'Tsy misy mpijinja mameno tanana Na mpamehy amboara mameno tratra amin''izany; '
  '8':
  - type: text
    content: 'Ka dia tsy hisy mpandalo hanao hoe: Hotahin''i Jehovah anie ianareo; Eny, ny anaran''i Jehovah no itsofanay rano anareo.'
