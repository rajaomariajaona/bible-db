document_id: PSA.129,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hiafaran'ny mpandrafy an'i Ziona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Fihirana fiakarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fihirana misy hevitra ambaratonga'
      marker-yv: yv-n
    - type: text
      text: '. Mafy no nampahoriany ahy hatry ny fony aho mbola tanora, Eny, aoka hataon''ny Isiraely hoe: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mafy no nampahoriany ahy hatry ny fony aho mbola tanora; Nefa tsy naharesy ahy izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ny mpiasa dia niasa ny lamosiko; Efa nanalava ny vavasany izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Marina Jehovah: Efa nanapaka ny famatorana nataon''ny ratsy fanahy Izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Aoka ho menatra sy hiamboho Izay rehetra mandrafy an''i Ziona '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ka ho tahaka ny ahitra eo an-tampon-trano. Izay malazo, na dia tsy misy manongotra azy aza; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tsy misy mpijinja mameno tanana Na mpamehy amboara mameno tratra amin''izany; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ka dia tsy hisy mpandalo hanao hoe: Hotahin''i Jehovah anie ianareo; Eny, ny anaran''i Jehovah no itsofanay rano anareo.'
