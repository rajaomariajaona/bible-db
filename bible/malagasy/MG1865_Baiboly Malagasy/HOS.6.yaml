document_id: HOS.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andeha hiverina ho amin''i Jehovah isika; Fa Izy no namiravira, ary Izy ihany no hahasitrana antsika; Izy no namely, ary Izy no hamehy ny ferintsika. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao amin''ny taranak''Isiraely no nahitako zavatra mahatsiravina: ao ny fijangajangan''i Efraima, voaloto Isiraely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny aminao, ry Joda, dia voatendry koa ny andro hijinjana anao, rehefa ampodiko avy amin'ny fahababoana ny oloko.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka indroa andro, dia hovelominy indray isika; Ary amin''ny andro fahatelo, dia hatsangany ho velona eo anatrehany isika '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia aoka hahalala, eny, aoka hiezaka hahalala an'i Jehovah isika; Mahatoky toy ny maraina ny fiposahany, dia ho avy amintsika toy ny ranonorana mivatravatra Izy, sy toy ny fara orana izay mahavonto ny tany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona re no ho azoko atao aminao, ry Efraima? Inona re no ho azoko atao aminao, ry Joda? Fa toy ny rahona maraina ny fitiavanareo sy tahaka ny ando izay levona, raha vao maraina ny andro. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho izany ny mpaminany no nentiko nikapa azy, ny tenin''ny vavako no nentiko namono azy; Ary ny fitsarana anao dia hiposaka toy ny mazava. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa famindram-po no sitrako, fa tsy fanatitra alatsa-drà, ary fahalalana an''Andriamanitra noho ny fanatitra dorana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ireny dia nivadika ny fanekena tahaka an''i Adama, tao no nivadihany nahafoizany Ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gileada dia tanànan''ny mpanao ratsy sady voaloton''ny rà. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy ny fanotriky ny jiolahy no fikamban''ny mpisorona: Mamono eny an-dalambe mankany Sekema izy, eny, efa nanao fahavetavetana koa izy. '
