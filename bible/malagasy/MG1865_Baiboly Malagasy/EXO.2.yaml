document_id: EXO.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nisehoan'Andriamanitra tamin'i Mosesy, sy ny nanirahany azy hanafaka ny olony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy lehilahy anankiray avy amin''ny mpianakavin''i Levy lasa naka vady tamin''ny zanakavavin''i Levy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nanan''anaka ravehivavy ka niteraka zazalahy; ary rehefa hitany fa zaza tsara izy, dia nafeniny telo volana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa tsy azony nafenina intsony izy, dia nangalany fiara zozoro, ka nopetahany asfalta sy dity ny fiara, dia napetrany tao ny zaza; ary napetrany tao anaty zozoro teo amoron''i Neily ny fiara. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny anabaviny nijanona teny lavidavitra eny, mba hahita izay hatao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nidina ny zanakavavin''i Farao mba handro tao Neily; ary ny ankizivaviny nitsangatsangana teny amoron''i Neily; ary raha nahita ny fiara teo anaty zozoro ny zanakavavin''i Farao, dia naniraka ny mpanompovaviny iray izy ka nampaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony nosokafany, dia hitany ny zazakely; ary indro fa zazalahy mitomany. Dia namindra fo taminy izy ka nanao hoe: Isan''ny zanaky ny Hebreo ity. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy kosa ny anabaviny tamin''ny zanakavavin''i Farao: Handeha haka mpitaiza amin''ny vehivavy Hebreo va aho hankatỳ aminao mba hitaiza ny zaza ho anao? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ny zanakavavin''i Farao taminy: Andeha ary. Dia lasa razazavavy ka naka ny renin''ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ny zanakavavin''i Farao taminy: Ento ity zaza ity, ka tezao ho ahy, fa izaho handoa ny karamanao. Dia nentin-dravehivavy ny zaza ka notezainy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa lehibe ny zaza, dia nentiny tao amin''ny zanakavavin''i Farao izy, ka dia tonga zanany. Ary ny anarany nataony hoe Mosesy; fa hoy izy: Satria tamin''ny rano no nangalako azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tamin''izany andro izany, rehefa lehibe Mosesy, dia nivoaka nankany amin''ny rahalahiny izy ka nijery ny fanompoany mafy, ary nahita lehilahy Egyptiana nanavokavoka ny anankiray tamin''ny Hebreo rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niherikerika izy, ka nony hitany fa tsy nisy olona, dia novonoiny ilay Egyptiana, ary nasitriny tao amin''ny fasika ny faty. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nony ampitson''iny, dia nivoaka indray izy, ary, indreo, nisy Hebreo roa lahy niady; dia hoy izy tamin''ilay diso: Nahoana no mamono ny namanao ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy izy: Iza no nanendry an''ialahy ho mpanapaka sy mpitsara anay? Moa mikasa hamono ahy koa va ialahy, tahaka ny namonoan''ialahy ilay Egyptiana? Dia raiki-tahotra Mosesy ka nanao hoe: Hay! fantatr''olona izany! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa ren''i Farao izany zavatra izany, dia nitady hamono an''i Mosesy izy. Fa Mosesy nandositra ny tavan''i Farao ka nonina tany amin''ny tany Midiana; ny nipetraka teo anilan''ny lavaka fantsakana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny mpisorona tao Midiana nanana zanaka fito mirahavavy; ary avy izy ireo, dia nanovo rano ka nameno ny tavin-drano hampisotroany ny ondry aman''osin-drainy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary avy kosa ny lehilahy mpiandry ondry ka nandroaka azy; fa Mosesy nitsangana ka namonjy azy, dia nampisotro rano ny ondry aman''osiny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa tonga teo amin-dRegoela rainy izy, dia hoy izy: Nahoana no dia nalaky tonga toy izany ianareo androany? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy izy ireo: Nisy lehilahy Egyptiana anankiray namonjy anay tamin''ny tanan''ny mpiandry ondry sady nanovo rano ho anay, dia nampisotro ny ondry aman''osy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy izy tamin''ny zananivavy: Ka aiza izy? Nahoana no nilaozanareo izany lehilahy izany? Alao izy mba hihinan-kanina. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary sitrak''i Mosesy ny hitoetra tao amin-dralehilahy. Ary Zipora zananivavy dia nomeny ho vadin''i Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niteraka zazalahy izy, ary ny anarany nataon-drainy hoe Gersoma; fa hoy izy: Efa vahiny atỳ amin''ny tanin''ny firenena hafa aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary tao anatin''izany andro maro izany dia maty ny mpanjakan''i Egypta; ary ny Zanak''Isiraely nisento noho ny fanompoany ka nitaraina; ary niakatra tany amin''Andriamanitra ny fitarainany noho ny fanompoany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Andriamanitra nandre ny fitarainany, dia nahatsiaro ny fanekeny tamin''i Abrahama sy Isaka ary Jakoba. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary Andriamanitra dia nijery ny Zanak'Isiraely ka nahafantatra azy.
