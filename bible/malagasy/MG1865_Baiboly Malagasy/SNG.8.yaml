document_id: SNG.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandehanany ho any amin'ny tany nihavian'ny ampakarina
  - type: text
    content: 'Enga anie ka ho tahaka ny anadahiko, izay ninono an''ineny, ianao! Dia ho nahita anao teny ala-trano aho ka ho nanoroka anao. Eny tsy ho azon''olona notevatevaina aho. '
  '10':
  - type: text
    content: 'Mànda aho, dia toy ny tilikambo ny nonoko. Raha eo imasony dia toy ny efa mahita soa aho. '
  '11':
  - type: text
    content: 'Solomona nanan-tanim-boaloboka tao Bala-hamona; Nahofany tamin''olona mpiandry voly ny tanim-boaloboka, ka samy tsy maintsy mitondra sekely volafotsy arivo ho solon''ny vokatra. '
  '12':
  - type: text
    content: Ny tanim-boaloboko, eny, ilay an'ny tenako, dia eto anatrehako, Ny arivo kosa dia anao, ry Solomona, ary ny roan-jato ho an'izay mpiandry voly.
  '13':
  - type: text
    content: Ry mitoetra eny an-tsaha! Te-hihaino ny feonao ireo namako; Mba ampandreneso izany koa aho.
  '14':
  - type: text
    content: Mandosira, ry malalako, ary aoka ianao mba ho toy ny gazela
  - type: note
    content: Anaram-biby haingan-tongotra
  - type: text
    content: ' na ny diera tanora eny an-tendrombohitry ny zava-manitra.'
  '2':
  - type: text
    content: 'Dia ho entiko ka hampidiriko ho ao an-tranon''ineny ianao, ary hampianarinao aho; Hampisotroiko divay noharoharoan-java-manitra mbamin''ny ranon''ampongaben-danitro ianao. '
  '3':
  - type: text
    content: 'Aoka hanondana ahy ny tànany ankavia, ary aoka hanohona ahy ny tànany ankavanana. '
  '4':
  - type: text
    content: 'Mampianiana anareo aho, ry zanakavavin''i Jerosalema: Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony.'
  '5':
  - type: text
    content: Iza moa iry vehivavy miakatra avy any an-efitra, mitehina amin'ny malalany? Teo ambanin'iny hazo poma no namohazako anao; Teo no niterahan-dreninao anao, eny, teo no nahararian'ilay niteraka anao.
  '6':
  - type: text
    content: Ataovy toy ny fanombohan-kase ao am-ponao aho sy toy ny fanombohan-kase eo an-tsandrinao; Fa mahery toy ny fahafatesana ny fitiavana, masiaka tahaka ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' ny fahasaro-piaro; Ny lelafony dia lelafo midedadeda, eny, lelafon''i Jehovah. '
  '7':
  - type: text
    content: 'Na dia ny ony maro aza tsy mahavono ny afon''ny fitiavana, ary ny renirano tsy mahapaoka azy; Na dia misy olona manome ny fananany rehetra ao an-tranony aza hamidy fitiavana, dia hatao tsinontsinona izy. '
  '8':
  - type: text
    content: Manana zandrivavy tsy mbola misy nono izahay
  - type: note
    content: 'Na: isika'
  - type: text
    content: ; Ahoana no hataonay
  - type: note
    content: 'Na: hataontsika'
  - type: text
    content: ' amin''ny zandrivavinay'
  - type: note
    content: 'Na: zandrivavintsika'
  - type: text
    content: ', raha mby amin''izay andro hangatahan''olona azy ho vady? '
  '9':
  - type: text
    content: Raha manda izy, dia hanangananay
  - type: note
    content: 'Na: hananganantsika'
  - type: text
    content: ' tilikambo volafotsy eo an-tampony; Fa raha varavarana kosa izy, dia hotampenanay'
  - type: note
    content: 'Na: hotampenantsika'
  - type: text
    content: ' hazo fisaka sedera. '
