document_id: SNG.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandehanany ho any amin'ny tany nihavian'ny ampakarina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Enga anie ka ho tahaka ny anadahiko, izay ninono an''ineny, ianao! Dia ho nahita anao teny ala-trano aho ka ho nanoroka anao. Eny tsy ho azon''olona notevatevaina aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia ho entiko ka hampidiriko ho ao an-tranon''ineny ianao, ary hampianarinao aho; Hampisotroiko divay noharoharoan-java-manitra mbamin''ny ranon''ampongaben-danitro ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka hanondana ahy ny tànany ankavia, ary aoka hanohona ahy ny tànany ankavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mampianiana anareo aho, ry zanakavavin''i Jerosalema: Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza moa iry vehivavy miakatra avy any an-efitra, mitehina amin'ny malalany? Teo ambanin'iny hazo poma no namohazako anao; Teo no niterahan-dreninao anao, eny, teo no nahararian'ilay niteraka anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ataovy toy ny fanombohan-kase ao am-ponao aho sy toy ny fanombohan-kase eo an-tsandrinao; Fa mahery toy ny fahafatesana ny fitiavana, masiaka tahaka ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' ny fahasaro-piaro; Ny lelafony dia lelafo midedadeda, eny, lelafon''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Na dia ny ony maro aza tsy mahavono ny afon''ny fitiavana, ary ny renirano tsy mahapaoka azy; Na dia misy olona manome ny fananany rehetra ao an-tranony aza hamidy fitiavana, dia hatao tsinontsinona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Manana zandrivavy tsy mbola misy nono izahay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: isika'
    marker-yv: yv-n
  - type: text
    text: ; Ahoana no hataonay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hataontsika'
    marker-yv: yv-n
  - type: text
    text: ' amin''ny zandrivavinay'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: zandrivavintsika'
    marker-yv: yv-n
  - type: text
    text: ', raha mby amin''izay andro hangatahan''olona azy ho vady? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha manda izy, dia hanangananay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hananganantsika'
    marker-yv: yv-n
  - type: text
    text: ' tilikambo volafotsy eo an-tampony; Fa raha varavarana kosa izy, dia hotampenanay'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hotampenantsika'
    marker-yv: yv-n
  - type: text
    text: ' hazo fisaka sedera. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mànda aho, dia toy ny tilikambo ny nonoko. Raha eo imasony dia toy ny efa mahita soa aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Solomona nanan-tanim-boaloboka tao Bala-hamona; Nahofany tamin''olona mpiandry voly ny tanim-boaloboka, ka samy tsy maintsy mitondra sekely volafotsy arivo ho solon''ny vokatra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny tanim-boaloboko, eny, ilay an'ny tenako, dia eto anatrehako, Ny arivo kosa dia anao, ry Solomona, ary ny roan-jato ho an'izay mpiandry voly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ry mitoetra eny an-tsaha! Te-hihaino ny feonao ireo namako; Mba ampandreneso izany koa aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mandosira, ry malalako, ary aoka ianao mba ho toy ny gazela
  - type: usfm
    marker: x
    children:
    - type: text
      text: Anaram-biby haingan-tongotra
    marker-yv: yv-n
  - type: text
    text: ' na ny diera tanora eny an-tendrombohitry ny zava-manitra.'
