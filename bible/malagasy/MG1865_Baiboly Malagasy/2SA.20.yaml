document_id: 2SA.20,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpanao raharaham-panjakan'i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary sendra nisy lehilahy iray tena ratsy fanahy teo, Seba no anarany, zanak''i Bikry Benjamita; ary nitsoka ny anjomara izy sady niantso hoe: Isika tsy manana anjara amin''i Davida na lova amin''ny zanak''i Jese; samia mody any amin''ny lainy avy, ry Isiraely ô. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa Amasa tsy nanahinahy ny sabatra teny an-tànan''i Joaba, kanjo nasiany tamin''ny kibony izy, ka dia nivaroraka tamin''ny tany ny tsinainy, ary tsy nasiany intsony, fa matiny tamin''izay. Ary Joaba sy Abisay rahalahiny nanenjika an''i Seba, zanak''i Bikry. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny zatovon''i Joaba anankiray nijanona teo anilan''ny faty ka nanao hoe: Izay miandany amin''i Joaba sy Davida dia aoka hanaraka an''i Joaba. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Amasa nihosin-drà teo anaty lalambe. Ary raha hitan-dralehilahy fa nijanona ny olona rehetra, dia nafindrany niala teo amin''ny lalambe ho any an-tsaha ny fatin''i Amasa ka nosaronany lamba, nony hitany fa nijanona izay rehetra mandalo azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nony nafindrany niala teo amin''ny lalambe izy, dia nizotra nanaraka an''i Joaba ny olona rehetra hanenjika an''i Seba, zanak''i Bikry. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary izy nandeha namaky ny firenen''Isiraely rehetra hatrany Abela sy Beti-maka sy ny an''ny Berita rehetra; ary nivory ireo, ka dia mba lasa nanaraka azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary dia tonga izy ka nanao fahirano azy teo Abela sy Beti-maka, ary nanandratra tovon-tany tandrifin''ny tanàna izy, ka teo ivelany manolotra ny manda no nitoerany; ary ny olona izay nomba an''i Joaba dia namely nandrava ny manda. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nisy vehivavy hendry tao an-tanàna niantso hoe: Mihainoa, mihainoa e; masìna ianareo, lazao amin''i Joaba hoe: Mankanesa erỳ aminy, hono, ianao, fa misy holazainy aminao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nony efa mby tao akaiky izy, dia hoy ravehivavy: Hianao va no Joaba? Dia hoy izy: Eny, izaho no izy. Ary hoy ravehivavy taminy: Mihainoa ny teniko mpanompovavinao. Dia hoy izy: Mihaino aho izao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy ravehivavy: Izao no fitenin''ny olona taloha: Aoka hanadina ao Abela izy; koa araka izany ny nahavitany raharaha. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izaho dia isan''ny tia fihavanana sady olona mahatoky eto amin''ny Isiraely; fa ianao kosa mitady handrava renivohitra eto amin''ny. Isiraely, koa ahoana no hamongoranao ny lovan''i Jehovah? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ka dia samy niara-nandao an'i Davida ny lehilahy amin'ny Isiraely ka nanaraka an'i Seba, zanak'i Bikry; fa ny lehilahy amin'ny Joda no nifikitra tamin'ny mpanjakany hatrany Jordana ka hatrany Jerosalema.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Joaba namaly hoe: Sanatria dia sanatria amiko izay handripaka sy handringana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tsy izany tsy akory; fa misy lehilahy avy amin''ny tany havoan''i Efraima, Seba no anarany, zanak''i Bikry, izay efa nanainga tanana hikomy amin''i Davida mpanjaka; koa izy ihany no atolory ahy, dia hiala amin''ny tanàna aho. Ary hoy ravehivavy tamin''i Joaba: Indro, ny lohany atsipy eny aminao eny ankoatry ny manda. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dia lasa nanatona ny olona rehetra tamin'ny fahendreny ravehivavy. Dia notapahin'ireo ny lohan'i Seba, zanak'i Bikry, ka natsipiny teny amin'i Joaba. Ary Joaba nitsoka ny anjomara, ka dia niala tamin'ny tanàna ny olona samy ho any amin'ny lainy avy. Ary Joaba niverina nankany Jerosalema ho any amin'ny mpanjaka.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary Joaba no komandin'ny miaramila rehetra tamin'ny Isiraely; ary Benaia, zanak'i Joiada, no mpifehy ny miaramila mpiambina andriana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Keretita sy Peletita
      marker-yv: yv-n
    - type: text
      text: '; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary Adorama no komandin''ny mpanao fanompoana; ary Josafata, zanak''i Ahiloda, no mpitadidy ny raharaham-panjakana; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ary Seva no mpanoratra; ary Zadoka sy Abiatara no mpisorona; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ary Ira Jairita kosa no mpanolo-tsaina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mpisorona'
      marker-yv: yv-n
    - type: text
      text: ' an''i Davida.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nony tonga tao an-tranony tany Jerosalema Davida mpanjaka, dia nalainy ny vaditsindranony folo vavy izay navelany hiandry trano tao, ka nataony tao an-trano fiambenana ary nomeny fivelomana, fa tsy nandriany intsony. Ka dia nambenana tao mandra-pahafatiny ireo ka velona tsy nanam-bady intsony.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hoy ny mpanjaka tamin''i Amasa: Vorio ny lehilahy amin''ny Joda ho eto amiko amin''ny hateloana, ary aoka mba ho eto koa ny tenanao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary dia lasa Arnasa namory ny Joda, fa nandiso ny fotoan''andro nomeny azy izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy Davida tamin''i Abisay: Ankehitriny izao dia Seba, zanak''i Bikry no ahitantsika loza mihoatra noho Absaloma; koa ento ny mpanomponao ny tomponao, ka enjeho izy, fandrao mahazo tanàna mimanda ka tsy ho azontsika. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary dia nivoaka hanenjika azy ny olon'i Joaba sy ny miaramila mpiambina andriana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Keretita sy Peletita
      marker-yv: yv-n
    - type: text
      text: ' ary ny lehilahy mahery rehetra; dia nivoaka avy tany Jerosalema ireo hanenjika an''i Seba, zanak''i Bikry.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa nony tonga tao amin''ilay vato lehibe tao Gibeona izy, dia avy Amasa nitsena azy; ary ny akanjo fiadian''i Joaba, ilay niakanjoany, dia nofehezina taminy, ary teo amboniny teo am-balahany no nisy ny fehin-tsabany ambamin''ny tranony; ary nony nandeha izy, dia latsaka ny sabatra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy Joaba tamin''i Amasa: Tsara ihany va ianao, ry rahalahy? Dia noraisin''i Joaba tamin''ny tànany ankavanana ny somotr''i Amasa horohany. '
