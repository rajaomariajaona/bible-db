document_id: JOB.27,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia mbola nandroso nanao oha-teny ihany Joba ka nanao hoe:'
  '10':
  - type: text
    content: Ho azony hiravoravoana va ny Tsitoha? Hahazo miantso an'Andriamanitra mandrakariva va izy?
  '11':
  - type: text
    content: Hampianatra anareo ny amin'ny tànan'Andriamanitra aho, ary tsy hisorona anareo aho ny amin'ny hevitry ny Tsitoha.
  '12':
  - type: text
    content: Indreo, ianareo rehetra samy efa nahita izany; Koa nahoana ianareo no manao hevi-poana?
  '13':
  - type: text
    content: 'Izao no anjaran''ny ratsy fanahy avy amin''Andriamanitra, sy lovan''ny lozabe raisiny avy amin''ny Tsitoha:'
  '14':
  - type: text
    content: Na dia mihamaro aza ny zanany, dia ho an'ny sabatra ihany ireny. Ary ny zaza aterany tsy ho voky hanina;
  '15':
  - type: text
    content: Ny ankohonany sisa dia hasitrik'Ifahafatesana
  - type: note
    content: 'Na: halevina noho ny areti-mandringana'
  - type: text
    content: ', ary tsy hisaona azy ny mpitondratenany;'
  '16':
  - type: text
    content: Na dia mahary volafotsy hoatra ny vovoka aza izy ary mahangona fitafiana hoatra ny fotaka,
  '17':
  - type: text
    content: Eny, manangona ihany izy, nefa ny marina no hitafy izany, ary ny tsy manan-tsiny no hizara ny volafotsy;
  '18':
  - type: text
    content: Manao ny tranony tahaka ny an'ny lolofotsy izy, ary tahaka ny trano rantsan-kazo ataon'ny mpiandry voly;
  '19':
  - type: text
    content: Ao avokoa ihany ny hareny, raha vao mandry izy; Nefa nony ahirany ny masony, dia tsy ao intsony ireny.
  '2':
  - type: text
    content: Raha velona koa Andriamanitra, Izay efa nandà tsy hanome ahy ny rariny, sy ny Tsitoha, Izay efa nampangidy ny aiko.
  '20':
  - type: text
    content: 'Ny fampahatahorana mahatratra azy tahaka ny riaka: Nony alina paohin''ny tafio-drivotra izy;'
  '21':
  - type: text
    content: Ny rivotra avy any atsinanana mampiainga sy mahalasa azy ka mipaoka azy hiala amin'ny fitoerany;
  '22':
  - type: text
    content: Asian
  - type: note
    content: Heb. Torahan', na Tifirin'
  - type: text
    content: '''Andriamanitra izy ka tsy iantrany, ary mandositra dia mandositra ho afaka amin''ny tànany izy;'
  '23':
  - type: text
    content: Tehafin'ny olona tanana izy sady isitrisirany ka ampialainy amin'ny fonenany
  - type: note
    content: 'Na: Ary ny miray monina aminy aza misitrisitra azy'
  - type: text
    content: .
  '3':
  - type: text
    content: Fa mbola ato anatiko ihany ny aiko, ary eo am-bavoroko ny Fanahin'Andriamanitra.
  '4':
  - type: text
    content: Dia tsy hanao teny tsy marina ny molotro, ary tsy hanonom-pitaka ny lelako.
  '5':
  - type: text
    content: Sanatria raha hanaiky ny anareo ho marina aho! Mandra-pialan'ny aiko dia tsy hanaiky ny tenako ho manan-tsiny aho.
  '6':
  - type: text
    content: Ny fahamarinako dia hazoniko mafy ka tsy ho foiko; Ny foko tsy manome tsiny ahy akory na dia ny amin'ny androko iray monja aza.
  '7':
  - type: text
    content: Aoka ho hita fa ratsy fanahy ny fahavaloko, ary tsy marina izay mitsangana hanohitra ahy.
  '8':
  - type: text
    content: Fa inona no fanantenan'ny mpihatsaravelatsihy,44 raha maito ny ainy, ka
  - type: note
    content: 'Na: Fa inona no fanantenan''ny mpihatsaravelatsihy, na dia mahazo harena be aza. Raha, etc'
  - type: text
    content: ' tsoahan''Andriamanitra ny fanahiny?'
  '9':
  - type: text
    content: Hihaino ny fitarainany va Andriamanitra, raha ozoim-pahoriana izy?
