document_id: JOB.27
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia mbola nandroso nanao oha-teny ihany Joba ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha velona koa Andriamanitra, Izay efa nandà tsy hanome ahy ny rariny, sy ny Tsitoha, Izay efa nampangidy ny aiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa mbola ato anatiko ihany ny aiko, ary eo am-bavoroko ny Fanahin'Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia tsy hanao teny tsy marina ny molotro, ary tsy hanonom-pitaka ny lelako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sanatria raha hanaiky ny anareo ho marina aho! Mandra-pialan'ny aiko dia tsy hanaiky ny tenako ho manan-tsiny aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahamarinako dia hazoniko mafy ka tsy ho foiko; Ny foko tsy manome tsiny ahy akory na dia ny amin'ny androko iray monja aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka ho hita fa ratsy fanahy ny fahavaloko, ary tsy marina izay mitsangana hanohitra ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa inona no fanantenan'ny mpihatsaravelatsihy,44 raha maito ny ainy, ka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa inona no fanantenan''ny mpihatsaravelatsihy, na dia mahazo harena be aza. Raha, etc'
    marker-yv: yv-n
  - type: text
    text: ' tsoahan''Andriamanitra ny fanahiny?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hihaino ny fitarainany va Andriamanitra, raha ozoim-pahoriana izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho azony hiravoravoana va ny Tsitoha? Hahazo miantso an'Andriamanitra mandrakariva va izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hampianatra anareo ny amin'ny tànan'Andriamanitra aho, ary tsy hisorona anareo aho ny amin'ny hevitry ny Tsitoha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indreo, ianareo rehetra samy efa nahita izany; Koa nahoana ianareo no manao hevi-poana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no anjaran''ny ratsy fanahy avy amin''Andriamanitra, sy lovan''ny lozabe raisiny avy amin''ny Tsitoha:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na dia mihamaro aza ny zanany, dia ho an'ny sabatra ihany ireny. Ary ny zaza aterany tsy ho voky hanina;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny ankohonany sisa dia hasitrik'Ifahafatesana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: halevina noho ny areti-mandringana'
    marker-yv: yv-n
  - type: text
    text: ', ary tsy hisaona azy ny mpitondratenany;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Na dia mahary volafotsy hoatra ny vovoka aza izy ary mahangona fitafiana hoatra ny fotaka,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eny, manangona ihany izy, nefa ny marina no hitafy izany, ary ny tsy manan-tsiny no hizara ny volafotsy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Manao ny tranony tahaka ny an'ny lolofotsy izy, ary tahaka ny trano rantsan-kazo ataon'ny mpiandry voly;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ao avokoa ihany ny hareny, raha vao mandry izy; Nefa nony ahirany ny masony, dia tsy ao intsony ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny fampahatahorana mahatratra azy tahaka ny riaka: Nony alina paohin''ny tafio-drivotra izy;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny rivotra avy any atsinanana mampiainga sy mahalasa azy ka mipaoka azy hiala amin'ny fitoerany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Asian
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Torahan', na Tifirin'
    marker-yv: yv-n
  - type: text
    text: '''Andriamanitra izy ka tsy iantrany, ary mandositra dia mandositra ho afaka amin''ny tànany izy;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tehafin'ny olona tanana izy sady isitrisirany ka ampialainy amin'ny fonenany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary ny miray monina aminy aza misitrisitra azy'
    marker-yv: yv-n
  - type: text
    text: .
