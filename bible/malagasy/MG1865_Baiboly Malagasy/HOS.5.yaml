document_id: HOS.5,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Henoinareo izao, ry mpisorona, ary mandrenesa, ry taranak''Isiraely; Ary atongilano ny sofinareo, ry mpianakavin''ny mpanjaka; Fa ianareo no hihiran''ny fitsarana, satria tonga fandrika ao Mizpa ianareo sy fandrika harato voavelatra ao Tabara. '
  '10':
  - type: text
    content: 'Ny mpanapaka ny Joda dia efa tonga toy izay mamindra faritany, ka dia ireo no hampidinako ny fahatezerako toy ny fampidina rano. '
  '11':
  - type: text
    content: 'Ampahorina Efraima sady voatorotoron''ny fitsarana, satria ninia nanaraka didin''olombelona izy, '
  '12':
  - type: text
    content: Koa amin'i Efraima dia tahaka ny kalalao Aho ary amin'ny taranak'i Joda dia toy ny fositra
  - type: note
    content: 'Na: momoka'
  - type: text
    content: '. '
  '13':
  - type: text
    content: Rehefa hitan'i Efraima ny aretiny, ary Joda ny feriny, dia nantany amin'ny Asyriana Efraima, eny, naniraka ho any amin'i Jareba
  - type: note
    content: Jareba = Mpandahatra, na Mpiady
  - type: text
    content: ' mpanjaka izy; Nefa izy tsy mahasitrana anareo, na mampanaritra ny ferinareo. '
  '14':
  - type: text
    content: 'Fa amin''i Efraima dia tahaka ny liona Aho, ary amin''ny taranak''i Joda dia tahaka ny liona tanora: Izaho dia Izaho no mamiravira, dia lasa mandeha; Mahalasa Aho, ka tsy misy mahavonjy. '
  '15':
  - type: text
    content: Handeha hody any amin'ny fitoerako Aho ambara-piaikiny ny helony sy hitadiavany ny tavako. Rehefa azom-pahoriana izy, dia hitady Ahy fatratra.
  '2':
  - type: text
    content: Ny mpivadika dia fatra-pamono
  - type: note
    content: 'Na: fatra-panao ratsy'
  - type: text
    content: '; Fa Izaho kosa famaizana azy rehetra. '
  '3':
  - type: text
    content: 'Izaho mahalala an''i Efraima, ary Isiraely tsy takona amiko; Ankehitriny dia tonga mpijangajanga ianao, ry Efraima, voaloto Isiraely. '
  '4':
  - type: text
    content: Tsy avelan'ny ataony hiverina
  - type: note
    content: 'Na: tsy mety manao izay hiverenany'
  - type: text
    content: ' amin''Andriamanitra izy; Fa ny fanahim-pijangajangana no ao anatiny, ary Jehovah tsy fantany. '
  '5':
  - type: text
    content: 'Ary ny avonavon''Isiraely dia vavolombelona manameloka azy; Ary Isiraely indrindra fa Efraima, ho lavon-keloka; Joda hiara-davo aminy koa. '
  '6':
  - type: text
    content: 'Hitondra ny ombiny aman''ondriny izy ka handeha hitady an''i Jehovah. Nefa tsy hahita Azy; Jehovah efa niala taminy. '
  '7':
  - type: text
    content: 'Nivadika tamin''i Jehovah izy, fa niteraka zaza sary; Ankehitriny dia ho levon''ny voaloham-bolana izy mbamin''ny zara-lovany. '
  '8':
  - type: text
    content: 'Tsofy ao Gibea ny anjomara ary ny trompetra ao Rama! Miantsoa mafy ao Betavena! Inay! misy manenjika anao, ry Benjamina! '
  '9':
  - type: text
    content: 'Ho lao Efraima, raha mby amin''ny andro fanamelohana; Izay tsy maintsy ho tò no nambarako tao amin''ny firenen''Isiraely. '
