document_id: HOS.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Henoinareo izao, ry mpisorona, ary mandrenesa, ry taranak''Isiraely; Ary atongilano ny sofinareo, ry mpianakavin''ny mpanjaka; Fa ianareo no hihiran''ny fitsarana, satria tonga fandrika ao Mizpa ianareo sy fandrika harato voavelatra ao Tabara. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny mpivadika dia fatra-pamono
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fatra-panao ratsy'
    marker-yv: yv-n
  - type: text
    text: '; Fa Izaho kosa famaizana azy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izaho mahalala an''i Efraima, ary Isiraely tsy takona amiko; Ankehitriny dia tonga mpijangajanga ianao, ry Efraima, voaloto Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy avelan'ny ataony hiverina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tsy mety manao izay hiverenany'
    marker-yv: yv-n
  - type: text
    text: ' amin''Andriamanitra izy; Fa ny fanahim-pijangajangana no ao anatiny, ary Jehovah tsy fantany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny avonavon''Isiraely dia vavolombelona manameloka azy; Ary Isiraely indrindra fa Efraima, ho lavon-keloka; Joda hiara-davo aminy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hitondra ny ombiny aman''ondriny izy ka handeha hitady an''i Jehovah. Nefa tsy hahita Azy; Jehovah efa niala taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nivadika tamin''i Jehovah izy, fa niteraka zaza sary; Ankehitriny dia ho levon''ny voaloham-bolana izy mbamin''ny zara-lovany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsofy ao Gibea ny anjomara ary ny trompetra ao Rama! Miantsoa mafy ao Betavena! Inay! misy manenjika anao, ry Benjamina! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ho lao Efraima, raha mby amin''ny andro fanamelohana; Izay tsy maintsy ho tò no nambarako tao amin''ny firenen''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny mpanapaka ny Joda dia efa tonga toy izay mamindra faritany, ka dia ireo no hampidinako ny fahatezerako toy ny fampidina rano. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ampahorina Efraima sady voatorotoron''ny fitsarana, satria ninia nanaraka didin''olombelona izy, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Koa amin'i Efraima dia tahaka ny kalalao Aho ary amin'ny taranak'i Joda dia toy ny fositra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: momoka'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rehefa hitan'i Efraima ny aretiny, ary Joda ny feriny, dia nantany amin'ny Asyriana Efraima, eny, naniraka ho any amin'i Jareba
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jareba = Mpandahatra, na Mpiady
    marker-yv: yv-n
  - type: text
    text: ' mpanjaka izy; Nefa izy tsy mahasitrana anareo, na mampanaritra ny ferinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa amin''i Efraima dia tahaka ny liona Aho, ary amin''ny taranak''i Joda dia tahaka ny liona tanora: Izaho dia Izaho no mamiravira, dia lasa mandeha; Mahalasa Aho, ka tsy misy mahavonjy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Handeha hody any amin'ny fitoerako Aho ambara-piaikiny ny helony sy hitadiavany ny tavako. Rehefa azom-pahoriana izy, dia hitady Ahy fatratra.
