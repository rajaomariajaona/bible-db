document_id: LEV.11,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lalàna ny amin'ny biby madio sy maloto
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao taminy hoe: '
  '10':
  - type: text
    content: 'fa izay rehetra tsy misy vombony sy kirany kosa, na ao anatin''ny ranomasina, na ao anatin''ny ony, na amin''izay rehetra mihetsiketsika ao anaty rano sy amin''ny zava-manan''aina izay ao anaty rano; fahavetavetana aminareo ireny; '
  '11':
  - type: text
    content: 'eny, ho fahavetavetana aminareo ireny; tsy ho fihinanareo ny nofony, ary hataonareo ho zava-betaveta ny fatiny. '
  '12':
  - type: text
    content: 'Izay rehetra tsy misy vombony na kirany ao anaty rano dia ho zava-betaveta aminareo. '
  '13':
  - type: text
    content: 'Ary izao no ho zava-betaveta aminareo amin''ny vorona ka tsy ho fihinanareo, fa zava-betaveta izy: ny voltora sy ny gypa sy ny ankoay '
  '14':
  - type: text
    content: 'ary ny papango sy ny voromahery, isan-karazany, '
  '15':
  - type: text
    content: 'ary ny goaika rehetra, isan-karazany, '
  '16':
  - type: text
    content: 'ary ny ostritsa sy ny tararaka sy ny vorondriaka sy ny hitsikitsika, isan-karazany, '
  '17':
  - type: text
    content: 'ary ny vorondolo sy ny manarana sy ny vorondolo lehibe '
  '18':
  - type: text
    content: 'ary ny ibisa sy ny sama ary ny voltora madinika '
  '19':
  - type: text
    content: 'sy ny vano sy ny vanobe, isan-karazany, ary ny takidara sy ny manavy. '
  '2':
  - type: text
    content: 'Mitenena amin''ny Zanak''Isiraely hoe: Izao no ho fihinanareo amin''ny biby rehetra ambonin''ny tany: '
  '20':
  - type: text
    content: 'Ny zava-mandady rehetra izay manana elatra sady mandia tongotra efatra dia ho zava-betaveta aminareo; '
  '21':
  - type: text
    content: 'nefa izao kosa no ho fihinanareo amin''ny zava-mandady izay manana elatra sady mandia tongotra efatra, dia izay manam-pingotra ambonin''ny faladiany hitsipihany eo amin''ny tany. '
  '22':
  - type: text
    content: 'Amin''ireny dia izao no ho fihinanareo; ny valala, isan-karazany, ny solama, isan-karazany, ary ny hargola, isan-karazany, ary ny hagaba, isan-karazany. '
  '23':
  - type: text
    content: 'Fa ny zava-mandady rehetra izay manana elatra sady mandia tongotra efatra afa-tsy ireo dia ho zava-betaveta aminareo. '
  '24':
  - type: text
    content: 'Dia Ireo no ho zava-maloto aminareo; ary izay rehetra mikasika ny fatiny dia haloto mandra-paharivan''ny andro. '
  '25':
  - type: text
    content: 'Ary izay rehetra mitondra ny fatiny dia hanasa ny fitafiany ary haloto mandra-paharivan''ny andro. '
  '26':
  - type: text
    content: 'Ny biby rehetra izay mivaky kitro, nefa tsy mba misara-kitro tsara sady tsy mandinika, dia ho zava-maloto aminareo; haloto izay rehetra mikasika azy. '
  '27':
  - type: text
    content: 'Ary izay rehetra mandeha amin''ny faladiany, amin''ny biby rehetra izay mandia tongotra efatra, dia zava-maloto aminareo; haloto mandra-paharivan''ny andro izay rehetra mikasika ny fatiny. '
  '28':
  - type: text
    content: 'Ary izay mitondra ny fatiny dia hanasa ny fitafiany ka haloto mandra-paharivan''ny andro; ho zava-maloto aminareo ireny. '
  '29':
  - type: text
    content: 'Ary izao no haloto aminareo amin''ny biby izay mandady na mikisaka amin''ny tany: ny kionkiona sy ny totozy ary ny sitry, isan-karazany, '
  '3':
  - type: text
    content: 'Izay biby rehetra mivaky kitro, ka misaraka tsara ny kitrony, sady mandinika izy, no ho fihinanareo. '
  '30':
  - type: text
    content: 'ary ny anakà sy ny koaha sy ny letaha sy ny hometa ary ny tana. '
  '31':
  - type: text
    content: 'Ireo no maloto aminareo amin''ny biby rehetra izay mandady na mikisaka; izay rehetra mikasika ny fatin''ireo dia haloto mandra-paharivan''ny andro. '
  '32':
  - type: text
    content: 'Ary izay zavatra rehetra ilatsahan''ny fatin''Ireo, na fanaka hazo, na fitafiana, na hoditra, na lasaka, izay mety ho fanaovan-javatra na inona na inona, dia haloto, ka tsy maintsy hatao anaty rano izany, ary haloto mandra-paharivan''ny andro izy vao hadio. '
  '33':
  - type: text
    content: 'Ary ny amin''ny vilany tany rehetra izay ilatsahan''ny fatin''ireo, dia haloto izay ao anatiny na inona na inona, ary ny vilany dia hovakinareo. '
  '34':
  - type: text
    content: 'Ary ny hanina fihinana rehetra, izay asian-drano, sy ny fisotro rehetra izay sotroina dia haloto koa, na tamin''ny fanaka inona na tamin''ny fanaka inona. '
  '35':
  - type: text
    content: 'Ary haloto izay zavatra rehetra ilatsahan''ny fatin''ireo, na fanendasana, na vilany mirakotra, dia hovakivakina izany; fa maloto ireny, ary ho zava-maloto aminareo. '
  '36':
  - type: text
    content: 'Kanefa ny loharano na ny lavaka famorian-drano izay misy rano be dia hadio ihany; fa izay mikasika ny fatin-javatra eo no haloto. '
  '37':
  - type: text
    content: 'Ary raha misy fatin''ireo latsaka amin''ny voan-javatra famafy, izay efa hafafy, dia hadio ihany izany. '
  '38':
  - type: text
    content: 'Fa raha misy voan-javatra nalona tamin''ny rano ka ilatsahan''ny fatiny, dia ho zava-maloto aminareo izany. '
  '39':
  - type: text
    content: 'Ary raha misy maty izay biby fihinanareo, dia haloto mandra-paharivan''ny andro izay mikasika ny fatiny. '
  '4':
  - type: text
    content: 'Kanefa amin''izay mandinika sy mivaky kitro dia izao kosa no tsy ho fihinanareo: Ny rameva, satria mandinika ihany izy, nefa tsy mba mivaky kitro: maloto aminareo izy; '
  '40':
  - type: text
    content: 'Ary izay mihinana amin''ny fatiny dia hanasa ny fitafiany, ary haloto mandra-paharivan''ny andro; ary izay mitondra ny fatiny dia hanasa ny fitafiany sady haloto mandra-paharivan''ny andro '
  '41':
  - type: text
    content: 'Ary ny zavatra rehetra izay mandady na mikisaka amin''ny tany dia ho zava-betaveta aminareo ka tsy ho fihinana. '
  '42':
  - type: text
    content: 'Izay rehetra mandady amin''ny kibony sy Izay rehetra mandia tongotra efatra ary izay rehetra maro tongotra, dia ny biby tehetra izay mandady na mikisaka amin''ny tany, dia tsy ho fihinanareo, fa zava-betaveta ireny. '
  '43':
  - type: text
    content: 'Aza mametaveta ny tenanareo amin''izay biby mandady na mikisaka; ary aza mandoto ny tenanareo aminy, mba tsy hahaloto anareo izany. '
  '44':
  - type: text
    content: 'Fa Izaho no Jehovah Andriamanitrareo, dia manamasina ny tenanareo, ka dia ho masina ianareo, satria masina Aho; ary aza mandoto ny tenanareo amin''izay zavatra mandady na mikisaka amin''ny tany. '
  '45':
  - type: text
    content: Fa Izaho no Jehovah Izay nitondra anareo niakatra avy tany amin'ny tany Egypta, mba ho Andriamanitrareo, ka dia ho masina ianareo, satria masina Aho.
  '46':
  - type: text
    content: 'Izany no lalàna ny amin''ny biby sy ny vorona sy ny zava-manan''aina rehetra izay mihetsiketsika ao anaty rano ary ny zava-manan''aina rehetra izay mandady na mikisaka amin''ny tany, '
  '47':
  - type: text
    content: mba hanavahana ny maloto sy ny madio, ary ny biby izay ho fihinana sy ny biby izay tsy ho fihinana.
  '5':
  - type: text
    content: 'ary ny hyraka, satria mandinika ihany izy, nefa tsy mba mivaky kitro: maloto aminareo izy; '
  '6':
  - type: text
    content: 'ary ny rabitro, satria mandinika ihany izy, nefa tsy mba mivaky kitro; maloto aminareo izy; '
  '7':
  - type: text
    content: 'ary ny kisoa, satria mivaky kitro ihany izy ka misaraka tsara ny kitrony, nefa tsy mba mandinika izy: maloto aminareo izy. '
  '8':
  - type: text
    content: Ny henan'ireny tsy ho fihinanareo, ary ny fatiny tsy hokasihinareo akory; zava-maloto aminareo ireny.
  '9':
  - type: text
    content: 'Ary amin''izay rehetra ao anatin''ny rano dia izao no ho fihinanareo: Izay rehetra misy vombony sy kirany ao anaty rano, na ao anatin''ny ranomasina, na ao anatin''ny ony, no ho fihinanareo; '
