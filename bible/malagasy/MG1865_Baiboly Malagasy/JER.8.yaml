document_id: JER.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nikirizan'ny olona tamin'ny fanaovan-dratsy, sy ny hamafin'ny loza hanjo azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Amin''izany andro izany, hoy Jehovah, dia hofongarina avy ao am-pasana ny taolan''ny mpanjakan''ny Joda sy ny taolan''ny lehibeny sy ny taolan''ny mpisorona sy ny taolan''ny mpaminany ary ny taolan''ny mponina any Jerosalema, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary noho izany dia homeko ho an''ny sasany ny vadiny, ary ny sahany ho an''izay maka azy, satria izy rehetra, na ny kely na ny lehibe, dia samy fatra-pila harena, na mpaminany na mpisorona dia samy mamitaka avokoa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa nataotaony foana ny fanasitranany ny faharatran''ny oloko zanakavavy tamin''ny nanaovany hoe: Fiadanana, fiadanana; Kanjo tsy misy fiadanana tsinona! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nomenarina izy noho ny nanaovany fahavetavetana, nefa tsy mba menatra akory izy, ary tsy mba valahara; Koa ho lavo ao amin''izay lavo izy, amin''ny andro hamaliana azy dia ho tafintohina izy, ho Jehovah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hakifako tokoa izy, hoy Jehovah; Tsy mamoa ny voaloboka, ary tsy misy voany ny aviavy, malazo ny raviny; Ary nanendry izay hanafika azy Aho.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nahoana isika no mbola mipetra-poana? Mivoria ianareo, ka andeha isika hiditra any an-tanàna mimanda, ka dia ho faty ao; fa Jehovah Andriamanitra efa nanendry antsika ho faty ka nanome rano mangidy hosotrointsika Noho ny nanotantsika tamin''i Jehovah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nanantena fiadanana isika, kanjo tsy nahita soa; Ary andro fanasitranana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fahafinaretana'
      marker-yv: yv-n
    - type: text
      text: ', fa indro fampitahorana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny fiefonefon''ny soavaly dia re hatrany Dana: Mihorohoro ny tany rehetra noho ny fanenon''ny soavaly matanjaka; Fa avy izy ka mandany ny tany mbamin''ny izay rehetra ao aminy, dia ny tanàna sy izay monina ao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa indro Aho handefa bibilava hamely anareo, dia menarana izay tsy azon'ody, ka hanaikitra anareo ireny, hoy Jehovah.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Indrisy! enga anie ka hisy fahamiramiranana ho ahy eto amin''ny alaheloko, fa reraka ny foko ato anatiko. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Injany! misy feo fitarainan''ny oloko zanakavavy hatrany amin''ny tany lavitra hoe: Moa Jehovah tsy ao Ziona va? Ary tsy ao aminy va ny Mpanjakany? Nahoana no nahatezitra Ahy ireny tamin''ny sarin-javatra voasokitra ao aminy sy tamin''ny zava-poana avy amin''ny firenena hafa? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka haeliny eo anatrehan''ny masoandro sy ny volana ary ny kintana rehetra eny amin''ny lanitra, izay efa tiany sy notompoiny sy efa narahiny sy efa notadiaviny ary efa niankohofany teo anatrehany: tsy hangonina na halevina intsony ireny, fa hatao zezika eny ambonin''ny tany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Lasa ny fararano, tapitra ny taom-piotazana, nefa tsy voavonjy isika. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Torotoro aho noho ny fahatorotoroan''ny oloko zanakavavy; Misaona aho, ary horohoro no mahazo ahy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moa tsy misy balsama va any Gileada? Moa tsy misy dokotera va any? Koa nahoana no tsy tanteraka ny fanasitranana ny oloko zanakavavy? Enga anie ka ho rano ny lohako, ary ho loharanon-dranomaso ny masoko, mba hitomaniako andro aman'alina noho ny voavono amin'ny oloko zanakavavy!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary ny sisa rehetra amin'ity taranaka ratsy ity, izay mbola sisa any amin'ny tany rehetra nandroahako azy, dia haniry ny ho faty noho ny ho velona, hoy Jehovah, Tompon'ny maro.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary koa, lazao aminy hoe: Izao no lazain''i Jehovah: Ho lavo va ny olona ka tsy hiarina? Hihodina hivily va ny olona ka tsy hitodika hiverina? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nahoana ity firenena eto Jerosalema ity
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ity firenena Jerosalema ity
      marker-yv: yv-n
    - type: text
      text: ' no miodina amin''ny fiodinana tsy mety mitsahatra? Mikikitra mafy amin''ny fitaka izy ka tsy mety miverina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nihaino Aho, ka nandre, fa manao teny tsy marina izy: Ary tsy misy manenina ny amin''ny haratsiany hoe: Endrey izany nataoko izany! Izy rehetra dia samy mivily mankamin''ny alehany avy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: samy mivily eny am-pandehanany'
      marker-yv: yv-n
    - type: text
      text: ' tahaka ny soavaly miriotra ho amin''ny ady. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Na dia ny vano eny amin''ny lanitra aza dia mahalala ny fotoan''androny, ary ny domohina sy ny sidintsidina ary ny vanobe koa samy mitandrina ny fotoana fihaviany; Fa ny oloko kosa tsy mba mahalala ny fitsipik''i Jehovah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ahoana no anaovanareo hoe: Hendry izahay, ary ato aminay ny lalàn''i Jehovah? Nefa ny fanoratan-daingan''ny mpanoratra mahatonga azy ho lainga. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mahazo henatra ny hendry, raiki-tahotra sy voasambotra izy; Indro, ny tenin''i Jehovah dia nolaviny, ka inona intsony no fahendrena ananany? '
