document_id: JOB.5,96
type_code: plt
verses:
  '1':
  - type: text
    content: Miantsoa ange! moa misy hamaly anao va? Ary iza amin'ireo masina no hotodihinao?
  '10':
  - type: text
    content: Dia Izay mampilatsaka ranonorana etỳ ambonin'ny tany ary mampandeha rano eny amin'ny saha,
  '11':
  - type: text
    content: Ka apetrany amin'ny avo Izay ambany, ary asandrany ho amin'ny fahafinaretana ny miory,
  '12':
  - type: text
    content: Dia Izay mahafoana ny hevitry ny fetsy, ka tsy hahefan'ny tànany na inona na inona hahasoa ny tenany;
  '13':
  - type: text
    content: Ny fahafetsen'ny hendry ihany no entiny misambotra azy, ary ny saina ataon'ny mpiolakolaka dia rava;
  '14':
  - type: text
    content: Na dia amin'ny antoandro aza dia tafatsarapaka ao amin'ny maizina ireny ka miraparapa amin'ny mitataovovonana tahaka ny amin'ny alina;
  '15':
  - type: text
    content: Fa vonjeny kosa ny malahelo tsy ho voan'ny sabatry ny vavany; Eny, vonjeny tsy ho azon'ny tanan'ny mahery izy.
  '16':
  - type: text
    content: Dia misy fanantenana ho an'ny reraka; fa ny faharatsiana kosa mihombom-bava
  '17':
  - type: text
    content: Indro, sambatra ny zanak'olombelona izay anarin'Andriamanitra, koa aza atao ho zavatra kely ny famaizan'ny Tsitoha;
  '18':
  - type: text
    content: Fa sady mandratra Izy no mamehy; Manorotoro Izy, ary ny tànany ihany no manasitrana.
  '19':
  - type: text
    content: Amin'ny fahoriana enina dia hamonjy anao Izy; Eny, amin'ny fito aza dia tsy hisy loza hihatra aminao.
  '2':
  - type: text
    content: Fa ny adala dia vonoin'ny fahasosorana, ary ny kely saina dia matin'ny fialonana.
  '20':
  - type: text
    content: Raha avy ny mosary, dia hiaro anao amin'ny fahafatesana Izy; Ary raha avy ny ady, dia hiaro anao tsy ho voan'ny sabatra Izy;
  '21':
  - type: text
    content: Hampiereny tsy ho voan'ny kapo-bava ianao, ary tsy hatahotra, raha avy ny fandringanana;
  '22':
  - type: text
    content: Ny fandringanana sy ny mosary dia hihomehezanao; ary tsy hatahoranao ny bibi-dia;
  '23':
  - type: text
    content: Fa vita fanekena amin'ny vato any an-tsaha aza ianao; Ary ny bibi-dia hihavana aminao;
  '24':
  - type: text
    content: Ary ho hitanao fa ny fiadanana no lainao; Ary raha mizaha ny kijanao ianao, dia ho hitanao fa tsy misy very ny ao;
  '25':
  - type: text
    content: Ary ho hitanao koa fa maro ny zanakao, ary ny terakao ho tahaka ny ahitra amin'ny tany;
  '26':
  - type: text
    content: Haharitra ianao ambara-piditrao any am-pasana, raha mbola henjana, dia tahaka ny amboaram-bary akarina amin'ny fotoana.
  '27':
  - type: text
    content: Izany ary no izy, fa efa nandinika azy izahay; Hevero ary izany, ka fantaro tsara.
  '3':
  - type: text
    content: Izaho nahita olona adala mamaka, nefa vetivety Indray dia tsy maintsy nanozona ny fonenany aho;
  '4':
  - type: text
    content: Lavitra ny famonjena ny zanany Ka torotoro eo am-bavahady, nefa tsy manan-kamonjy;
  '5':
  - type: text
    content: Ny vokatry ny taniny dia lanin'ny noana, eny, alainy na dia voafefy tsilo aza; ary ny fandrika mitanatana vava hahazo ny fananany
  '6':
  - type: text
    content: Fa tsy mivoaka avy amin'ny vovoka ny alahelo, ary tsy mitrebona avy amin'ny tany ny fahoriana,
  '7':
  - type: text
    content: Nefa teraka ho amin'ny fahoriana ny olombelona, dia tahaka ny fanidin'ny kilalaon'afo miakatra
  '8':
  - type: text
    content: Fa raha toa ahy kosa dia hitady an'Andriamanitra aho, ary Andriamanitra ihany no hotolorako ny teniko,
  '9':
  - type: text
    content: Dia Izay manao zava-dehibe tsy takatry ny saina sy zava-mahagaga tsy hita isa,
