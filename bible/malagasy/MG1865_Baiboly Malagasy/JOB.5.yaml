document_id: JOB.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miantsoa ange! moa misy hamaly anao va? Ary iza amin'ireo masina no hotodihinao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny adala dia vonoin'ny fahasosorana, ary ny kely saina dia matin'ny fialonana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izaho nahita olona adala mamaka, nefa vetivety Indray dia tsy maintsy nanozona ny fonenany aho;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lavitra ny famonjena ny zanany Ka torotoro eo am-bavahady, nefa tsy manan-kamonjy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny vokatry ny taniny dia lanin'ny noana, eny, alainy na dia voafefy tsilo aza; ary ny fandrika mitanatana vava hahazo ny fananany
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy mivoaka avy amin'ny vovoka ny alahelo, ary tsy mitrebona avy amin'ny tany ny fahoriana,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nefa teraka ho amin'ny fahoriana ny olombelona, dia tahaka ny fanidin'ny kilalaon'afo miakatra
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa raha toa ahy kosa dia hitady an'Andriamanitra aho, ary Andriamanitra ihany no hotolorako ny teniko,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dia Izay manao zava-dehibe tsy takatry ny saina sy zava-mahagaga tsy hita isa,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia Izay mampilatsaka ranonorana etỳ ambonin'ny tany ary mampandeha rano eny amin'ny saha,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ka apetrany amin'ny avo Izay ambany, ary asandrany ho amin'ny fahafinaretana ny miory,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia Izay mahafoana ny hevitry ny fetsy, ka tsy hahefan'ny tànany na inona na inona hahasoa ny tenany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fahafetsen'ny hendry ihany no entiny misambotra azy, ary ny saina ataon'ny mpiolakolaka dia rava;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na dia amin'ny antoandro aza dia tafatsarapaka ao amin'ny maizina ireny ka miraparapa amin'ny mitataovovonana tahaka ny amin'ny alina;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa vonjeny kosa ny malahelo tsy ho voan'ny sabatry ny vavany; Eny, vonjeny tsy ho azon'ny tanan'ny mahery izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia misy fanantenana ho an'ny reraka; fa ny faharatsiana kosa mihombom-bava
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indro, sambatra ny zanak'olombelona izay anarin'Andriamanitra, koa aza atao ho zavatra kely ny famaizan'ny Tsitoha;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa sady mandratra Izy no mamehy; Manorotoro Izy, ary ny tànany ihany no manasitrana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amin'ny fahoriana enina dia hamonjy anao Izy; Eny, amin'ny fito aza dia tsy hisy loza hihatra aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Raha avy ny mosary, dia hiaro anao amin'ny fahafatesana Izy; Ary raha avy ny ady, dia hiaro anao tsy ho voan'ny sabatra Izy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hampiereny tsy ho voan'ny kapo-bava ianao, ary tsy hatahotra, raha avy ny fandringanana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fandringanana sy ny mosary dia hihomehezanao; ary tsy hatahoranao ny bibi-dia;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa vita fanekena amin'ny vato any an-tsaha aza ianao; Ary ny bibi-dia hihavana aminao;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary ho hitanao fa ny fiadanana no lainao; Ary raha mizaha ny kijanao ianao, dia ho hitanao fa tsy misy very ny ao;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ho hitanao koa fa maro ny zanakao, ary ny terakao ho tahaka ny ahitra amin'ny tany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Haharitra ianao ambara-piditrao any am-pasana, raha mbola henjana, dia tahaka ny amboaram-bary akarina amin'ny fotoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izany ary no izy, fa efa nandinika azy izahay; Hevero ary izany, ka fantaro tsara.
