document_id: GEN.11,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak'i Tera, sy ny nifindrany nankany Harana
  - type: text
    content: 'Ary ny tany rehetra dia iray fanononana sy iray fiteny. '
  '10':
  - type: text
    content: 'Izao no taranak''i Sema: Rehefa zato taona Sema, dia niteraka an''i Arpaksada izy roa taona taorian''ny safo-drano. '
  '11':
  - type: text
    content: Ary ny andro niainan'i Sema taorian'ny niterahany an'i Arpaksada dia diman-jato taona; ary niteraka zazalahy sy zazavavy izy.
  '12':
  - type: text
    content: 'Ary rehefa dimy amby telo-polo taona ny andro niainan''i Arpaksada, dia niteraka an''i Sela izy. '
  '13':
  - type: text
    content: Ary ny andro niainan'i Arpaksada taorian'ny niterahany an'i Sela dia telo amby efa-jato taona; ary niteraka zazalahy sy zazavavy izy.
  '14':
  - type: text
    content: 'Ary rehefa telo-polo taona ny andro niainan''i Sela, dia niteraka an''i Ebera izy. '
  '15':
  - type: text
    content: Ary ny andro niainan'i Sela taorian'ny niterahany an'i Ebera dia telo amby efa-jato taona; ary niteraka zazalahy sy zazavavy izy.
  '16':
  - type: text
    content: 'Ary rehefa efatra amby telo-polo taona ny andro niainan''i Ebera, dia niteraka an''i Palega izy. '
  '17':
  - type: text
    content: Ary ny andro niainan'i Ebera taorian'ny niterahany an'i Palega dia telo-polo amby efa-jato taona; ary niteraka zazalahy sy zazavavy izy.
  '18':
  - type: text
    content: 'Ary rehefa telo-polo taona ny andro niainan''i Palega, dia niteraka an-dReo izy, '
  '19':
  - type: text
    content: Ary ny andro niainan'i Palega taorian'ny niterahany an-dReo dia sivy amby roan-jato taona; ary niteraka zazalahy sy zazavavy izy.
  '2':
  - type: text
    content: 'Ary raha nifindrafindra niantsinanana ny olona, dia nahita tany lemaka tany amin''ny tany Sinara izy ka nonina teo. '
  '20':
  - type: text
    content: 'Ary rehefa roa amby telo-polo, taona ny andro niainan-dReo, dia niteraka an''i Seroga izy. '
  '21':
  - type: text
    content: Ary ny andro niainan-dReo taorian'ny niterahany an'i Seroga dia fito amby roan-jato taona; ary niteraka zazalahy sy zazavavy izy.
  '22':
  - type: text
    content: 'Ary rehefa telo-polo taona ny andro niainan''i Seroga, dia niteraka an''i Nahora izy, '
  '23':
  - type: text
    content: Ary ny andro niainan'i Seroga taorian'ny niterahany an'i Nahora dia roan-jato taona; ary niteraka zazalahy sy zazavavy izy.
  '24':
  - type: text
    content: 'Ary rehefa sivy amby roa-polo taona ny andro niainan''i Nahora, dia niteraka an''i Tera izy. '
  '25':
  - type: text
    content: Ary ny andro niainan'i Nahora taorian'ny niterahany an'i Tera dia sivy ambin'ny folo amby zato taona; ary niteraka zazalahy sy zazavavy izy.
  '26':
  - type: text
    content: 'Ary rehefa fito-polo taona ny andro niainan''i Tera, dia niteraka an''i Abrama sy Nahora ary Harana izy:'
  '27':
  - type: text
    content: 'Ary izao no taranak''i Tera: Tera niteraka an''i Abrama sy Nahora ary Harana; ary Harana niteraka an''i Lota. '
  '28':
  - type: text
    content: 'Ary maty Harana, raha mbola teo anatrehan''i Tera rainy tany amin''ny tany nahaterahany, dia tao Oran''ny Kaldeana. '
  '29':
  - type: text
    content: 'Ary Abrama sy Nahora dia samy naka vady ho azy: ny anaran''ny vadin''i Abrama dia Saray; ary ny anaran''ny vadin''i Nahora dia Milka, zanakavavin''i Harana, rain''i Milka sy rain''Iska. '
  '3':
  - type: text
    content: 'Ary niresadresaka hoe izy: Andeha isika hanao biriky ka handotra azy tsara. Ary ny biriky na taony solom-bato, ary ny asfalta nataony solon-drihitra. '
  '30':
  - type: text
    content: 'Ary momba Saray; tsy nanan-janaka izy. '
  '31':
  - type: text
    content: 'Ary Tera nitondra an''i Abrama zanany sy Lota zafiny, zanak''i Harana, ary Saray vinantoni-vavy, vadin''i Abrama zanany; dia niaraka taminy ireo ka niala tao Oran''ny Kaldeana hankany amin''ny tany Kanana; dia tonga tao Harana izy ka nonina tao. '
  '32':
  - type: text
    content: Ary dimy amby roan-jato taona ny andro niainan'i Tera; dia maty tao Harana izy.
  '4':
  - type: text
    content: 'Ary hoy izy: Andeha isika hanao tanàna sy tilikambo ho antsika, ka ny tampony hahatakatra ny lanitra, dia hanao izay hahazoantsika laza, fandrao hiely eny ambonin''ny tany rehetra isika. '
  '5':
  - type: text
    content: 'Dia nidina Jehovah hizaha ny tanàna sy ny tilikambo, izay nataon''ny zanak''olombelona. '
  '6':
  - type: text
    content: 'Ary hoy Jehovah : Indro, iray foko ny olona, sady iray fanononana izy rehetra, ary ity vao fiandohan''ny hataony; koa izao dia tsy hisy azo sakanana na inona na inona izay saintsaininy hatao. '
  '7':
  - type: text
    content: 'Aoka isika hidina, ka eny no hanorokoroantsika ny fiteniny, mba tsy hifankahala teny izy. '
  '8':
  - type: text
    content: 'Dia tao no nampielezan''i Jehovah azy hiala ho eny ambonin''ny tany rehetra; dia nitsahatra tsy nanao ny tanàna intsony izy. '
  '9':
  - type: text
    content: Koa izany no nanaovana ny anarany hoe Babela; fa tao Jehovah no nanorokoro ny fitenin'ny tany rehetra; ary tao no nampielezan'i Jehovah ny olona ho eny ambonin'ny tany rehetra.
