document_id: 1KI.12,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanaovan'i Jeroboama ireo sarin'ombilahy kely volamena tao Betela sy Dana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Rehoboama nankany Sekema, fa tany no efa nalehan''ny Isiraely rehetra hampanjaka azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ireo tovolahy indray nihira taminy nanao taminy hoe: Izao no lazao amin''ny vahoaka izay niteny taminao hoe: Rainao nampitondra zioga mavesatra anay; fa inty kosa mby aminao ka mba hamaivano aminay izany, izao no lazao aminy: Ny ankihikeliko dia lehibe noho ny valahan''ny raiko; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'koa raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa dia mainka hanampy ny zioga ho entinareo; kotopia no namaizan''ny raiko anareo, fa maingoka fikapohana kosa no hamaizako anareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Jeroboama sy ny vahoaka rehetra nankany amin-dRehoboama tamin''ny andro fahatelo, araka ilay nolazain''ny mpanjaka hoe: Mankanesa atỳ amiko indray amin''ny andro fahatelo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ny mpanjaka nanao teny mafy tamin''ny olona, fa nandà ny saina nomen''ireo zoki-olona azy izy '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ka niteny taminy araka ny hevitra nomen''ireo tovolahy hoe: Ny raiko dia nampitondra zioga mavesatra anareo, fa izaho kosa mainka hanampy ny zioga ho entinareo, kotopia no namazain''ny raiko anareo, fa maingoka fikapohana kosa no hamaizako anareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa dia tsy nihaino ny olona ny mpanjaka; fa avy tamin''i Jehovah izany zavatra izany hahatanteraka ny teniny izay nampilazainy an''i Ahia Silonita tamin''i Jeroboama, zanak''i Nebata. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nony hitan''ny Isiraely rehetra fa tsy nihaino azy ny mpanjaka, dia namaly ny mpanjaka ny vahoaka ka nanao hoe: Inona moa no anjaranay amin''i Davida? Tsy manana lova amin''ny zanak''i Jese izahay; samia mody any an-dainy avy, ry Isiraely e; ankehitriny tandremo ny taranakao, ry Davida ô. Dia samy nody ho any an-dainy avy ny Isiraely. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ny Zanak''Isiraely izay nonina tany an-tanànan''ny Joda ihany no nanjakan-dRehoboama . '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary dia naniraka an''i Adorama, komandin''ny mpanao fanompoana, Rehoboama mpanjaka, nefa ny Isiraely rehetra nitora-bato azy, ka maty izy. Dia niezaka faingana nankeo amin''ny kalesiny Rehoboama mpanjaka handositra ho any Jerosalema. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ka dia niodina tamin'ny taranak'i Davida ny Isiraely mandraka androany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Koa raha nandre izany Jeroboama, zanak''i Nebata (fa izy mbola tany Egypta, izay nalehany tamin''izy nandositra niala teo anatrehan''i Solomona mpanjaka; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary rehefa ren'ny Isiraely rehetra fa efa tafaverina indray Jeroboama, dia naniraka naka azy ho ao amin'ny fivoriana izy ka nampanjaka azy tamin'ny Isiraely rehetra; dia tsy nisy nanaraka ny taranak'i Davida afa-tsy ny firenen'i Joda ihany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary nony tonga tany Jerosalema Rehoboama, dia novoriny ny taranak''i Joda rehetra mbamin''ny firenen''i Benjamina, dia miaramila valo alina amby iray hetsy voafantina, hiady amin''ny taranak''Isiraely hampody ny fanjakana indray ho an-dRehoboama, zanak''i Solomona. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Kanjo tonga tamin''i Semaia, lehilahin''Andriamanitra, kosa ny tenin''Andriamanitra nanao hoe '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mitenena amin-dRehoboama, zanak''i Solomona, mpanjakan''ny Joda, sy amin''ny taranak''i Joda sy Benjamina rehetra ary amin''ny vahoaka sisa hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izao no lazain''i Jehovah: Aza mandeha hiady amin''ny Zanak''Isiraely rahalahinareo; fa samia mody any an-tranony avy ianareo, fa avy amiko izao zavatra izao. Dia nihaino ny tenin''i Jehovah ny olona, ka dia samy lasa nody araka ny tenin''i Jehovah.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary Jeroboama dia nanamboatra an'i Sekema any amin'ny tany havoan'i Efraima ka nonina tao; ary raha avy tao izy, dia nanamboatra an'i Pehoela koa.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary Jeroboama nanao anakampo hoe: Izao ny fanjakana dia hody amin''ny taranak''i Davida ihany; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'fa raha miakatra hamono zavatra hatao fanatitra ao amin''ny tranon''i Jehovah any Jerosalema ny vahoaka, dia hody amin''ny tompony indray ny fony dia amin-dRehoboama, mpanjakan''ny Joda, ary dia hamono ahy izy ka hiverina any amin-dRehoboama, mpanjakan''ny Joda, indray. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nihevitra ny mpanjaka ka nanao ombilahy kely volamena roa; ary hoy izy tamin''ny olona: "Aoka izay ny fiakaranareo any Jerosalema! Ry Isiraely ô" indreo ny andriamanitrao, izay nitondra anao nivoaka avy tany amin''ny tany Egypta. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary ny anankiray dia napetrany tao Betela, fa ny anankiray kosa dia tao Dana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka dia naniraka naka azy ny olona), dia tonga izy sy ny fiangonana, dia ny Isiraely rehetra, ka niteny tamin-dRehoboama hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary izany zavatra izany dia tonga fahotana; fa ny olona dia nandeha hivavaha teo anatrehan''ny anankiray amin''ireo hatrany Dana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary nanao trano teny amin''ny fitoerana avo izy sady nanendry olona hafa ho mpisorona, izay tsy isan''ny taranak''i Levy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary Jeroboama, nanendry andro firavoravoana tamin''ny andro fahadimy ambin''ny folo amin''ny volana fahavalo, tahaka ny andro firavoravoana tamin''ny Joda ihany, ka nanatitra fanatitra teo ambonin''ny alitara izy. Toy izany no nataony tao Betela, fa namono zavatra hatao fanatitra ho an''ireo ombilahy kely izay nataony izy; ary nampitoeriny tao Betela ireo mpisorona amin''ny fitoerana avo izay notendreny. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary nanatitra fanatitra teo ambonin'ny alitara izay nataony tao Betela izy tamin'ny andro fahadimy ambin'ny folo amin'ny volana fahavalo, volana izay notendreny araka ny sitrapony ihany; ary nanao andro firavoravoana ho an'ny Zanak'Isiraely izy sady nanatitra fanatitra teo ambonin'ny alitara sy nandoro ditin-kazo manitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Rainao dia nampitondra zioga mavesatra anay, fa inty kosa mby aminao ka mba hamaivano ny fanompoana mafy tamin-drainao sy ny zioga mavesatra izay nataony taminay, dia hanompo anao izahay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa hoy kosa izy taminy: Mandehana aloha, ka raha afaka hateloana, dia mankanesa atỳ amiko indray. Dia lasa ny olona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary Rehoboama mpanjaka naka hevitra tamin''ny zoki-olona izay nitoetra teo anatrehan''i Solomona rainy fony fahavelony ka nanao hoe: Ahoana no hevitra omenareo havaly ny vahoaka? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy ireo taminy: Raha mety ho mpanompon''ny vahoaka ianao izao ka hanompo azy sy hanao teny mora aminy, dia ho mpanomponao mandrakizay izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nefa nolavin-dRehoboama ny hevitra nomen''ireo zoki-olona azy, dia naka hevitra tamin''ny tovolahy izay indray nihira taminy sady efa nitoetra teo anatrehany izy '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ka nanao taminy hoe: Ahoana kosa no mba hevitra omenareo havalintsika ny vahoaka izay efa niteny tamiko hoe: Hamaivano ny zioga izay nataon-drainao taminay '
