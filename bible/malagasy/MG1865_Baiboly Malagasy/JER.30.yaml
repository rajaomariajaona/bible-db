document_id: JER.30,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampodiana ny voninahitry ny Isiraely, sy ny hampijaliana izay nampahory azy
  - type: text
    content: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah: '
  '10':
  - type: text
    content: 'Koa aza matahotra ianao, ry Jakoba mpanompoko, hoy Jehovah; Ary aza mivadi-po, ry Isiraely; Fa, indro, hovonjeko avy any lavitra ianao ary ny taranakao avy any amin''ny tany izay nahababo azy; Dia hiverina Jakoba ka hiadana sy handry fahizay, ka tsy hisy hanaitaitra azy. '
  '11':
  - type: text
    content: 'Fa momba anao hamonjy anao Aho, hoy Jehovah; Koa na dia levoniko aza ny firenena rehetra izay nampielezako anao, Hianao tsy mba holevoniko; Nefa kosa mba hanariko araka ny antonony ihany ianao, fa tsy dia havelako fotsiny. '
  '12':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Maharary ny faharatranao, ary tsy azo sitranina ny ferinao. '
  '13':
  - type: text
    content: Tsy misy handahatra ny teninao; Tsy manana plasitera fanasitranana hapetaka amin'ny ferinao ianao
  - type: note
    content: 'Na: Tsy misy mikarakara ny raharahanao hamoritana ny ferinao, Ary tsy, manana plasitera fanasitranana ianao'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ireo tia anao dia efa nanadino anao avokoa, tsy mba notadiaviny ianao; Fa famelin''ny fahavalo no namelezako anao, dia ny famaizan''ny lozabe, noho ny habetsahan''ny helokao sy ny hamaroan''ny fahotanao. '
  '15':
  - type: text
    content: 'Nahoana ianao no mitaraina noho ny faharatranao sy noho ny fanaintainanao izay tsy azo atsahatra? Fa noho ny habetsahan''ny helokao sy ny hamaroan''ny fahotanao no nanaovako izany taminao. '
  '16':
  - type: text
    content: 'Koa izay rehetra mihinana anao dia mba hohanina, ary izay rehetra mampahory anao dia ho lasan-ko babo, izay mamabo anao dia hobaboina, ary Izay rehetra mandroba anao dia hatolotro horobaina. '
  '17':
  - type: text
    content: 'Fa hotanterahiko ny fanasitranana anao, eny, hositraniko ny faharatranao, hoy Jehovah, noho ny nanaovany anao hoe: Ilay noroahina, sy hoe: Ziona tsy misy mpitady ity.'
  '18':
  - type: text
    content: 'Izao no lazain''i Jehovah: Indro, hampodiko avy amin''ny fahababoana ny lain''i Jakoba, ary ny fonenany dia hamindrako fo; ka ny tanàna dia haorina ao amin''ny havoany, ary ny lapan''andriana hitoetra ao amin''izay mahamety azy. '
  '19':
  - type: text
    content: 'Ary hisy fisaorana sy feon''ny mifaly avy ao; Dia hahamaro azy Aho, ka tsy ho vitsy izy, sady hanome voninahitra azy Aho, ka tsy ho ambany izy. '
  '2':
  - type: text
    content: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Soratinao amin''ny boky ny teny rehetra izay efa nolazaiko taminao. '
  '20':
  - type: text
    content: 'Ny zanany koa ho tahaka ny tany aloha, ary ny fiangonany hampitoerina eo anatrehako, dia hovaliako izay rehetra mampahory azy. '
  '21':
  - type: text
    content: Ary ilay malazany dia ho avy ao aminy ihany, ary ny mpanapaka azy dia ho avy ao aminy ihany koa; Ary hampanakaiky azy Aho, ka dia hanatona Ahy izy, fa iza no sahy hanao ny ainy
  - type: note
    content: Heb. fony
  - type: text
    content: ' ho antoka ka hanatona Ahy? hoy Jehovah. '
  '22':
  - type: text
    content: Ary ianareo ho oloko, ary Izaho ho Andriamanitrareo.
  '23':
  - type: text
    content: 'He! ny tadion''i Jehovah! Mivoaka ny fahatezerana sy ny tadio mitambolimbolina ka miantonta amin''ny lohan''ny ratsy fanahy. '
  '24':
  - type: text
    content: Ny firehetan'ny fahatezeran'i Jehovah tsy ho afaka ambara-panefany sy ambara-panatanterany ny hevitry ny fony; Mbola ho fantatrareo marimarina izany any am-parany.
  '3':
  - type: text
    content: Fa, indro, avy ny andro, hoy Jehovah, izay hampodiako ny oloko, dia ny Isiraely sy ny Joda, avy amin'ny fahababoany, hoy Jehovah; eny, hampody azy ho amin'ny tany izay efa nomeko ny razany Aho, dia ho azy izany.
  '4':
  - type: text
    content: 'Ary izao no teny izay nolazain''i Jehovah ny amin''ny Isiraely sy ny Joda, '
  '5':
  - type: text
    content: 'eny, izao no lazain''i Jehovah: Feo mampangovitra no renay; Misy tahotra, fa tsy fiadanana. '
  '6':
  - type: text
    content: 'Anontanionareo ka izahao, raha mba misy lehilahy mihetsi-jaza; Koa nahoana no samy hitako manery ny valahany amin''ny tànany avy ny lehilahy rehetra hoatra ilay efa mihetsi-jaza iny, ary ny tarehy rehetra dia efa tonga hatsatra avokoa? '
  '7':
  - type: text
    content: 'Indrisy! fa lehibe izany andro izany, ka tsy misy tahaka azy; Andro fahoriana ho an''i Jakoba izany, nefa ho voavonjy ho afaka amin''izany ihany izy. '
  '8':
  - type: text
    content: Fa amin'izany andro izany, hoy Jehovah, Tompon'ny maro, dia hotapahiko ny ziogany ho afaka amin'ny vozonao sy hotosako ny fatoranao. Ary ny firenena hafa tsy hampanompo anao
  - type: note
    content: Heb. azy
  - type: text
    content: ' intsony; '
  '9':
  - type: text
    content: Fa ianao hanompo an'i Jehovah Andriamanitrao sy Davida Mpanjakanao
  - type: note
    content: Heb. Mpanjakany
  - type: text
    content: ', Izay hatsangako ho anao. '
