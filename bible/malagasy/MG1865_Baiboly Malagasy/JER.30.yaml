document_id: JER.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hampodiana ny voninahitry ny Isiraely, sy ny hampijaliana izay nampahory azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Soratinao amin''ny boky ny teny rehetra izay efa nolazaiko taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa, indro, avy ny andro, hoy Jehovah, izay hampodiako ny oloko, dia ny Isiraely sy ny Joda, avy amin'ny fahababoany, hoy Jehovah; eny, hampody azy ho amin'ny tany izay efa nomeko ny razany Aho, dia ho azy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izao no teny izay nolazain''i Jehovah ny amin''ny Isiraely sy ny Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'eny, izao no lazain''i Jehovah: Feo mampangovitra no renay; Misy tahotra, fa tsy fiadanana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Anontanionareo ka izahao, raha mba misy lehilahy mihetsi-jaza; Koa nahoana no samy hitako manery ny valahany amin''ny tànany avy ny lehilahy rehetra hoatra ilay efa mihetsi-jaza iny, ary ny tarehy rehetra dia efa tonga hatsatra avokoa? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Indrisy! fa lehibe izany andro izany, ka tsy misy tahaka azy; Andro fahoriana ho an''i Jakoba izany, nefa ho voavonjy ho afaka amin''izany ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa amin'izany andro izany, hoy Jehovah, Tompon'ny maro, dia hotapahiko ny ziogany ho afaka amin'ny vozonao sy hotosako ny fatoranao. Ary ny firenena hafa tsy hampanompo anao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. azy
    marker-yv: yv-n
  - type: text
    text: ' intsony; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ianao hanompo an'i Jehovah Andriamanitrao sy Davida Mpanjakanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Mpanjakany
    marker-yv: yv-n
  - type: text
    text: ', Izay hatsangako ho anao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa aza matahotra ianao, ry Jakoba mpanompoko, hoy Jehovah; Ary aza mivadi-po, ry Isiraely; Fa, indro, hovonjeko avy any lavitra ianao ary ny taranakao avy any amin''ny tany izay nahababo azy; Dia hiverina Jakoba ka hiadana sy handry fahizay, ka tsy hisy hanaitaitra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa momba anao hamonjy anao Aho, hoy Jehovah; Koa na dia levoniko aza ny firenena rehetra izay nampielezako anao, Hianao tsy mba holevoniko; Nefa kosa mba hanariko araka ny antonony ihany ianao, fa tsy dia havelako fotsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Maharary ny faharatranao, ary tsy azo sitranina ny ferinao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy misy handahatra ny teninao; Tsy manana plasitera fanasitranana hapetaka amin'ny ferinao ianao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Tsy misy mikarakara ny raharahanao hamoritana ny ferinao, Ary tsy, manana plasitera fanasitranana ianao'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireo tia anao dia efa nanadino anao avokoa, tsy mba notadiaviny ianao; Fa famelin''ny fahavalo no namelezako anao, dia ny famaizan''ny lozabe, noho ny habetsahan''ny helokao sy ny hamaroan''ny fahotanao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nahoana ianao no mitaraina noho ny faharatranao sy noho ny fanaintainanao izay tsy azo atsahatra? Fa noho ny habetsahan''ny helokao sy ny hamaroan''ny fahotanao no nanaovako izany taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izay rehetra mihinana anao dia mba hohanina, ary izay rehetra mampahory anao dia ho lasan-ko babo, izay mamabo anao dia hobaboina, ary Izay rehetra mandroba anao dia hatolotro horobaina. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hotanterahiko ny fanasitranana anao, eny, hositraniko ny faharatranao, hoy Jehovah, noho ny nanaovany anao hoe: Ilay noroahina, sy hoe: Ziona tsy misy mpitady ity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izao no lazain''i Jehovah: Indro, hampodiko avy amin''ny fahababoana ny lain''i Jakoba, ary ny fonenany dia hamindrako fo; ka ny tanàna dia haorina ao amin''ny havoany, ary ny lapan''andriana hitoetra ao amin''izay mahamety azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hisy fisaorana sy feon''ny mifaly avy ao; Dia hahamaro azy Aho, ka tsy ho vitsy izy, sady hanome voninahitra azy Aho, ka tsy ho ambany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zanany koa ho tahaka ny tany aloha, ary ny fiangonany hampitoerina eo anatrehako, dia hovaliako izay rehetra mampahory azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ilay malazany dia ho avy ao aminy ihany, ary ny mpanapaka azy dia ho avy ao aminy ihany koa; Ary hampanakaiky azy Aho, ka dia hanatona Ahy izy, fa iza no sahy hanao ny ainy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fony
    marker-yv: yv-n
  - type: text
    text: ' ho antoka ka hanatona Ahy? hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ianareo ho oloko, ary Izaho ho Andriamanitrareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He! ny tadion''i Jehovah! Mivoaka ny fahatezerana sy ny tadio mitambolimbolina ka miantonta amin''ny lohan''ny ratsy fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny firehetan'ny fahatezeran'i Jehovah tsy ho afaka ambara-panefany sy ambara-panatanterany ny hevitry ny fony; Mbola ho fantatrareo marimarina izany any am-parany.
