document_id: PSA.26,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangatahana mba tsy hatao ho naman'ny ratsy fanahy
  - type: text
    content: 'Nataon''i Davida. Tsarao aho, Jehovah ô, fa mandeha amin''ny fahamarinako aho; ary Jehovah no itokiako, ka tsy miahanahana aho. '
  '10':
  - type: text
    content: 'Izay misy fitaka eny an-tànany, ary feno kolikoly ny tànany ankavanana. '
  '11':
  - type: text
    content: 'Fa izaho kosa dia mandeha amin''ny fahamarinako; avoty sy amindrao fo aho. '
  '12':
  - type: text
    content: Ny tongotro mijoro eo amin'ny tany marina; eo am-piangonana no isaorako an'i Jehovah.
  '2':
  - type: text
    content: 'Diniho aho, Jehovah ô, ka fantaro; izahao toetra ny voako sy ny foko. '
  '3':
  - type: text
    content: 'Fa ny famindram-ponao no eo anoloan''ny masoko; ary mandeha amin''ny fahamarinanao aho. '
  '4':
  - type: text
    content: 'Tsy mba miara-mipetraka amin''ny olon-dratsy aho, na manan-draharaha amin''ny olom-petsy. '
  '5':
  - type: text
    content: 'Halako ny fiangonan''ny mpanao ratsy; ary tsy miara-mipetraka amin''ny ratsy fanahy aho. '
  '6':
  - type: text
    content: 'Manasa ny tanako noho ny fahamarinako aho, ka te-hitoetra eo akaikin''ny alitaranao, Jehovah ô, '
  '7':
  - type: text
    content: 'Mba hanao feo fiderana, ka hilaza ny asanao mahagaga rehetra. '
  '8':
  - type: text
    content: 'Jehovah ô, tiako ny trano itoeranao, dia ny fonenan''ny voninahitrao. '
  '9':
  - type: text
    content: 'Aza mitondra ny fanahiko hiara-maty amin''ny mpanota, na ny aiko amin''ny mpandatsa-drà, '
