document_id: PSA.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fangatahana mba tsy hatao ho naman'ny ratsy fanahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nataon''i Davida. Tsarao aho, Jehovah ô, fa mandeha amin''ny fahamarinako aho; ary Jehovah no itokiako, ka tsy miahanahana aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Diniho aho, Jehovah ô, ka fantaro; izahao toetra ny voako sy ny foko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny famindram-ponao no eo anoloan''ny masoko; ary mandeha amin''ny fahamarinanao aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy mba miara-mipetraka amin''ny olon-dratsy aho, na manan-draharaha amin''ny olom-petsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Halako ny fiangonan''ny mpanao ratsy; ary tsy miara-mipetraka amin''ny ratsy fanahy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manasa ny tanako noho ny fahamarinako aho, ka te-hitoetra eo akaikin''ny alitaranao, Jehovah ô, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mba hanao feo fiderana, ka hilaza ny asanao mahagaga rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jehovah ô, tiako ny trano itoeranao, dia ny fonenan''ny voninahitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza mitondra ny fanahiko hiara-maty amin''ny mpanota, na ny aiko amin''ny mpandatsa-drà, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay misy fitaka eny an-tànany, ary feno kolikoly ny tànany ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izaho kosa dia mandeha amin''ny fahamarinako; avoty sy amindrao fo aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny tongotro mijoro eo amin'ny tany marina; eo am-piangonana no isaorako an'i Jehovah.
