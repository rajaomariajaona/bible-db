document_id: ROM.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny nandavan'Andriamanitra ny Jiosy
  - type: text
    content: 'Milaza ny marina ao amin''i Kristy aho, fa tsy mandainga, sady miara-milaza amiko ao amin''ny Fanahy Masina koa ny fieritreretako, '
  '10':
  - type: text
    content: 'Ary tsy izany ihany, fa Rebeka koa dia nanan''anaka tamin''ny anankiray, dia tamin''isaka razantsika; '
  '11':
  - type: text
    content: 'fa raha tsy mbola teraka ireo, ary tsy mbola nanao tsara na ratsy (mba hitoeran''ny fikasan''Andriamanitra araka ny fifidianana, tsy avy amin''ny asa, fa avy amin''izay miantso), '
  '12':
  - type: text
    content: 'dia nolazaina tamin-dravehivavy hoe: Ny zokiny hanompo ny zandriny (Gen. 25. 23); '
  '13':
  - type: text
    content: 'araka ny voasoratra hoe: Jakoba no tiako, fa Esao no halako (Mal. 1. 2, 3). '
  '14':
  - type: text
    content: 'Ahoana ary no holazaintsika? Misy tsi-fahamarinana va amin''Andriamanitra? Sanatria izany! '
  '15':
  - type: text
    content: 'Fa hoy Izy tamin''i Mosesy: Izaho hiantra izay hiantrako, ary hamindra fo amin''izay hamindrako fo (Eks. 33. 19). '
  '16':
  - type: text
    content: 'Koa dia tsy avy amin''izay maniry na amin''izay mihazakazaka izany, fa avy amin''Andriamanitra Izay miantra. '
  '17':
  - type: text
    content: 'Fa hoy ny Soratra Masina tamin''i Farao: Izany no nanandratako anao, mba ho entiko mampiseho ny heriko, ary mba hanambarana ny anarako any amin''ny tany rehetra (Eks. 9. 16). '
  '18':
  - type: text
    content: 'Koa izay tiany hamindrana fo no amindrany fo, ary izay tiany hohamafìna fo no hamafiny fo. '
  '19':
  - type: text
    content: 'Hianao ary dia hanao amiko hoe: Koa nahoana Izy no manome tsiny ihany? Fa iza no manohitra ny sitrapony? '
  '2':
  - type: text
    content: 'fa mafy ny alaheloko, ka tsy mety mitsahatra ny fahorian''ny foko. '
  '20':
  - type: text
    content: 'Tsia, ralehilahy, fa iza moa ianao, no mamaly an''Andriamanitra? Izay zavatra noforonina va hanao amin''izay namorona azy hoe: Nahoana Hianao no nanao ahy toy izao? '
  '21':
  - type: text
    content: 'Ny mpanefy vilany va tsy manam-pahefana amin''ny tanimanga, ka ny vongany iray ihany no anaovany zavatra samy hafa, ny iray hohajaina, ary ny iray hatao tsinontsinona? '
  '22':
  - type: text
    content: 'Sa ahoana kosa raha Andriamanitra, na dia ta-haneho ny fahatezerany sy hampahafantatra ny heriny aza, dia be fahari-po ka nandefitra tamin''izay fanaky ny fahatezerana voavoatra hosimbana, '
  '23':
  - type: text
    content: 'mba hampahafantarina koa ny haren''ny voninahiny amin''izay fanaky ny famindram-po, izay namboariny rahateo hahazo voninahitra, '
  '24':
  - type: text
    content: 'dia isika izay nantsoiny koa, tsy ny avy amin''ny Jiosy ihany, fa ny avy amin''ny jentilisa koa, '
  '25':
  - type: text
    content: 'araka izay lazainy eo amin''i Hosea hoe: Hiantso ny tsy oloko hoe oloko Aho; Ary ilay tsy malala hoe malala (Hos. 2. 25); '
  '26':
  - type: text
    content: 'Ary any amin''ny tany izay nilazana taminy hoe: Tsy oloko ianareo, Dia any no hiantsoana azy hoe zanak''Andriamanitra velona (Hos. 2. 1). '
  '27':
  - type: text
    content: 'Ary Isaia milaza ny amin''ny Isiraely hoe: Na dia toy ny fasika any amin''ny ranomasina aza ny isan''ny Zanak''isiraely, dia izay sisa ihany no hovonjena; '
  '28':
  - type: text
    content: 'fa amin''ny fahatanterahana faingana no hanefan''i Jehovah ny teniny ambonin''ny tany (Isa. 10. 22, 23); '
  '29':
  - type: text
    content: 'ary araka izay nolazain''Isaia fahiny hoe: Raha tsy Jehovah, Tompon''ny maro, no namela taranaka ho antsika, Dia efa tonga tahaka an''i Sodoma sy tonga tahaka an''i Gomora isika (Isa. 1. 9). '
  '3':
  - type: text
    content: Fa efa saiky niriko aza ho voaozona
  - type: note
    content: Gr. anatema
  - type: text
    content: ' ho afaka tamin''i Kristy ny tenako mba hahavonjeko ny rahalahiko, havako araka ny nofo, '
  '30':
  - type: text
    content: 'Ahoana ary no holazaintsika? Ny jentilisa, izay tsy nitady fahamarinana, no nahazo fahamarinana, nefa fahamarinana izay avy amin''ny finoana? '
  '31':
  - type: text
    content: 'fa ny Isiraely, izay nitady lalàn''ny fahamarinana kosa, dia tsy nahatratra izany lalàna izany. '
  '32':
  - type: text
    content: 'Nahoana moa? Satria tsy tamin''ny finoana, fa toa tamin''ny asa, ka tafintohina tamin''ny vato mahatafintohina izy; '
  '33':
  - type: text
    content: 'araka ny voasoratra hoe: Indro Aho mametraka vato mahatafintohina sy vatolampy mahasolafaka ao Ziona; Ary izay mino Azy tsy ho menatra (Isa. 8. 14; 28. 16).'
  '4':
  - type: text
    content: 'izay Isiraelita sady manana ny fananganan''anaka sy ny voninahitra sy ny fanekena sy ny fanomezana ny lalàna sy ny fombam-pivavahana ary ny teny fikasana; '
  '5':
  - type: text
    content: azy koa ny razana, sady avy taminy araka ny nofo Kristy, Izay ambonin'izy rehetra, Andriamanitra isaorana mandrakizay
  - type: note
    content: 'Na: Avy taminy araky ny nofo Kristy. Isaorana mandrakizay anie Andriamanitra, Izay ambonin''izy rehetra'
  - type: text
    content: '. Amena. '
  '6':
  - type: text
    content: 'Kanefa tsy lazaiko fa foana ny tenin''Andriamanitra tsy akory. Fa tsy izay rehetra avy amin''ny Isiraely no Isiraely. '
  '7':
  - type: text
    content: 'Ary na dia taranak''i Abrahama aza ireo, tsy dia ary zanany avokoa; fa avy amin''isaka no hantsoina izay taranaka ho anao (Gen. 21. 12). '
  '8':
  - type: text
    content: 'Izany hoe: Tsy ny zanaky ny nofo no zanak''Andriamanitra; fa ny zanaky ny teny fikasana no isaina ho taranaka. '
  '9':
  - type: text
    content: 'Fa izao no filàzan''ny teny fikasana: Raha avy ny taona toy izao, dia ho avy Aho, ary hanana zazalahy Saraha (Gen. 18. 10). '
