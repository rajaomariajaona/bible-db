document_id: SNG.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Tenin'ny ampakarina, raha nitoetra irery izy
  - type: text
    content: Izaho dia voninkazo eny an-tanety
  - type: note
    content: 'Na: any Sarôna'
  - type: text
    content: ' ihany sy lilia eny an-dohasaha.'
  '10':
  - type: text
    content: 'Niteny ny malalako ka nanao tamiko hoe: Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary! '
  '11':
  - type: text
    content: 'Fa, indro, lasa ny ririnina, ritra tsy misy intsony ny ranonorana; '
  '12':
  - type: text
    content: 'Miposaka eo amin''ny tany ny voninkazo; Tonga ny taona fanaovam-peo fifaliana, ary re atỳ amin''ny tanintsika ny feon''ny domohina. '
  '13':
  - type: text
    content: Ny aviavy
  - type: note
    content: aviavimbazaha
  - type: text
    content: ' mahamanitra ny voany tanora, mamony ny voaloboka ka mamerovero tsara. Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary! '
  '14':
  - type: text
    content: 'E, ry voromailalako ao amin''ny tsefatsefaky ny harambato, dia ao amin''ny fialokalofana amin''ny fiakarana mideza, aoka hahita ny endrikao sy handre ny feonao aho; Fa mamy ny feonao, sady mahafinaritra ny endrikao. '
  '15':
  - type: text
    content: 'Sambory ny amboahaolo, dia ireo amboahaolo madinika izay manimba ny tanim-boaloboka; Fa efa mamony izao ny voalobotsika. '
  '16':
  - type: text
    content: 'Ahy ny malalako, ary azy aho, dia ilay miandry ny ondriny eny amin''ny lilia. '
  '17':
  - type: text
    content: Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro
  - type: note
    content: Heb. mandositra ny aloka
  - type: text
    content: ', mitodiha, ry ilay malalako, ary aoka ho tahaka ny gazela'
  - type: note
    content: Anaram-biby haingan-tongotra
  - type: text
    content: ' na ny diera'
  - type: note
    content: Anaram-biby haingan-tongotra
  - type: text
    content: ' tanora eny an-tendrombohitra be hantsana'
  - type: note
    content: 'Na: tendrombohitra manelanelana'
  - type: text
    content: ' ianao.'
  '2':
  - type: text
    content: Toy ny lilia eo amin'ny tsilo, dia toy izany tompokovavy havako eo amin'ny zazavavy.
  '3':
  - type: text
    content: 'Toy ny hazo poma amin''ny hazo any an''ala, dia toy izany ny malalako eo amin''ny zatovo. Mahafinaritra ahy indrindra ny mipetraka eo ambanin''ny alokalony, sady mamy ao am-bavako ny voany. '
  '4':
  - type: text
    content: 'Nentiny ho ao an-tranon-divay aho, ary ny fanevany eo amboniko dia fitiavana. '
  '5':
  - type: text
    content: 'Hatanjaho amin''ampempam-boaloboka aho, ary velombelomy amin''ny poma aho, fa mararim-pitia. '
  '6':
  - type: text
    content: Aoka ny tànany ankavia hanondana ahy, ary aoka ny tànany ankavanana hanohona ahy.
  '7':
  - type: text
    content: Mampianiana anareo amin'ny gazela
  - type: note
    content: Anaram-biby haingan-tongotra
  - type: text
    content: ' na amin''ny dieravavy any an-tsaha aho, ry zanakavavin''i Jerosalema: Aza manaitra na mamoha ny fitiavana raha tsy efa sitrapony.'
  '8':
  - type: text
    content: 'Injay, ny feon''ilay malalako! Indro, tamy izy ka miantsambotsambotra eny an-tendrombohitra ary mitsambitimbikina eny amin''ny havoana. '
  '9':
  - type: text
    content: Ny malalako dia tahaka ny gazela
  - type: note
    content: Anaram-biby haingan-tongotra
  - type: text
    content: ' na ny diera'
  - type: note
    content: Anaram-biby haingan-tongotra
  - type: text
    content: ' tanora; Indro, mijanona eo ala-tranonay'
  - type: note
    content: Heb. ivelan'ny rindrinay
  - type: text
    content: ' izy, mitsidika eo am-baravarankely, manarangarana eo amin''ny makarakara. '
