document_id: SNG.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tenin'ny ampakarina, raha nitoetra irery izy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho dia voninkazo eny an-tanety
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: any Sarôna'
      marker-yv: yv-n
    - type: text
      text: ' ihany sy lilia eny an-dohasaha.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny ny malalako ka nanao tamiko hoe: Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa, indro, lasa ny ririnina, ritra tsy misy intsony ny ranonorana; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miposaka eo amin''ny tany ny voninkazo; Tonga ny taona fanaovam-peo fifaliana, ary re atỳ amin''ny tanintsika ny feon''ny domohina. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny aviavy
    - type: usfm
      marker: x
      children:
      - type: text
        text: aviavimbazaha
      marker-yv: yv-n
    - type: text
      text: ' mahamanitra ny voany tanora, mamony ny voaloboka ka mamerovero tsara. Mitsangàna, ry tompokovavy havako, ry tsara tarehiko, ka andeha ary! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'E, ry voromailalako ao amin''ny tsefatsefaky ny harambato, dia ao amin''ny fialokalofana amin''ny fiakarana mideza, aoka hahita ny endrikao sy handre ny feonao aho; Fa mamy ny feonao, sady mahafinaritra ny endrikao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sambory ny amboahaolo, dia ireo amboahaolo madinika izay manimba ny tanim-boaloboka; Fa efa mamony izao ny voalobotsika. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahy ny malalako, ary azy aho, dia ilay miandry ny ondriny eny amin''ny lilia. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mandositra ny aloka
      marker-yv: yv-n
    - type: text
      text: ', mitodiha, ry ilay malalako, ary aoka ho tahaka ny gazela'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaram-biby haingan-tongotra
      marker-yv: yv-n
    - type: text
      text: ' na ny diera'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaram-biby haingan-tongotra
      marker-yv: yv-n
    - type: text
      text: ' tanora eny an-tendrombohitra be hantsana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tendrombohitra manelanelana'
      marker-yv: yv-n
    - type: text
      text: ' ianao.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy ny lilia eo amin'ny tsilo, dia toy izany tompokovavy havako eo amin'ny zazavavy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy ny hazo poma amin''ny hazo any an''ala, dia toy izany ny malalako eo amin''ny zatovo. Mahafinaritra ahy indrindra ny mipetraka eo ambanin''ny alokalony, sady mamy ao am-bavako ny voany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nentiny ho ao an-tranon-divay aho, ary ny fanevany eo amboniko dia fitiavana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatanjaho amin''ampempam-boaloboka aho, ary velombelomy amin''ny poma aho, fa mararim-pitia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka ny tànany ankavia hanondana ahy, ary aoka ny tànany ankavanana hanohona ahy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mampianiana anareo amin'ny gazela
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaram-biby haingan-tongotra
      marker-yv: yv-n
    - type: text
      text: ' na amin''ny dieravavy any an-tsaha aho, ry zanakavavin''i Jerosalema: Aza manaitra na mamoha ny fitiavana raha tsy efa sitrapony.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Injay, ny feon''ilay malalako! Indro, tamy izy ka miantsambotsambotra eny an-tendrombohitra ary mitsambitimbikina eny amin''ny havoana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny malalako dia tahaka ny gazela
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaram-biby haingan-tongotra
      marker-yv: yv-n
    - type: text
      text: ' na ny diera'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaram-biby haingan-tongotra
      marker-yv: yv-n
    - type: text
      text: ' tanora; Indro, mijanona eo ala-tranonay'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ivelan'ny rindrinay
      marker-yv: yv-n
    - type: text
      text: ' izy, mitsidika eo am-baravarankely, manarangarana eo amin''ny makarakara. '
