document_id: PRO.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiantsoan'ny fahendrena, sy ny fahatsarany
  - type: text
    content: 'Tsy miantso va ny fahendrena, Ary tsy manandra-peo va ny fahalalana? '
  '10':
  - type: text
    content: 'Aza ny volafotsy no raisina, fa ny anatro, Ary aleo ny fahalalana toy izay ny volamena voafantina. '
  '11':
  - type: text
    content: Fa ny fahendrena dia tsara noho ny voahangy
  - type: note
    content: 'Na: perla'
  - type: text
    content: '; Ary ny zavatra irina rehetra tsy azo ampitahaina aminy. '
  '12':
  - type: text
    content: 'Izaho fahendrena dia miara-monina amin-tsaina, Ary hitan''ny fahalalako ny fisainana mazava. '
  '13':
  - type: text
    content: 'Ny fankahalana ny ratsy no fahatahorana an''i Jehovah. Ny fiavonavonana sy ny fireharehana sy ny lalana ratsy Ary ny vava fandainga dia samy halako avokoa. '
  '14':
  - type: text
    content: Ahy ny fisainana sy ny fanambinana
  - type: note
    content: 'Na: tena fahendrena'
  - type: text
    content: '; Izaho no fahalalana, izaho no manan-kery; '
  '15':
  - type: text
    content: 'Izaho no anjakan''ny mpanjaka Sy andidian''ny mpanapaka araka ny rariny; '
  '16':
  - type: text
    content: 'Izaho no anapahan''ny andriandahy sy ny lehibe, Dia ny mpitsara rehetra amin''ny tany. '
  '17':
  - type: text
    content: 'Tiako izay tia ahy; Ary izay fatra-pitady ahy dia hahita ahy. '
  '18':
  - type: text
    content: 'Ato amiko ny harena sy ny voninahitra, Eny, ny harena mateza sy ny fahamarinana. '
  '19':
  - type: text
    content: 'Ny vokatro dia tsara noho ny volamena, eny, noho ny tena volamena aza, Ary ny fitomboan''ny hareko mihoatra noho ny volafotsy voafantina. '
  '2':
  - type: text
    content: 'Eo an-tampon''ny fitoerana avo amoron-dalana Sy eo an-tsampanan-dalana no ijoroany. '
  '20':
  - type: text
    content: 'Amin''ny alehan''ny fahamarinana no izorako, Dia ao amin''ny lalan''ny fitsarana marina, '
  '21':
  - type: text
    content: 'Mba hampandovako harena izay tia ahy, Sy hamenoako ny firaketany. '
  '22':
  - type: text
    content: Jehovah nahary
  - type: note
    content: 'Na: nahazo'
  - type: text
    content: ' ahy ho fiandohan''ny alehany, Ho voalohany amin''ny asany hatramin''ny taloha. '
  '23':
  - type: text
    content: 'Izaho notendreny hatramin''ny fahagola, Eny, hatramin''ny voalohany indrindra, dia fony tsy mbola ary ny tany. '
  '24':
  - type: text
    content: 'Fony tsy mbola ary ny lalina, no efa teraka aho, Fony tsy mbola ary ny loharano miboiboika be, '
  '25':
  - type: text
    content: 'Fony tsy mbola naorina ny tendrombohitra, Fony tsy mbola nisy havoana, no efa teraka aho, '
  '26':
  - type: text
    content: 'Fony tsy mbola natao ny tany, na ny saha, Na ny voalohan''ny vovo-tany ambonin''izao rehetra izao. '
  '27':
  - type: text
    content: 'Raha namorona ny lanitra Izy, dia tany aho, Raha namaritra ny hababakaka tambonin''ny lalina Izy, '
  '28':
  - type: text
    content: 'Raha nampitoetra ny rahona eny ambony Izy, Raha niboiboika fatratra ny loharanon''ny lalina, '
  '29':
  - type: text
    content: 'Raha nanisy faritra ho an''ny ranomasina Izy, Mba tsy hahazoan''ny rano mihoatra ny fetrany, Ary nandidy ny amin''ny fanorenan''ny tany, '
  '3':
  - type: text
    content: 'Eo anilan''ny vavahady, amin''ny fidirana ho ao an-tanàna, Sy eo anaty vavahady no iantsoany maty hoe: '
  '30':
  - type: text
    content: Dia mpità-marika
  - type: note
    content: 'Na: notezaina'
  - type: text
    content: ' teo anilany aho Sady ravoravo isan''andro isan''andro Ka nilalao mandrakariva teo anatrehany; '
  '31':
  - type: text
    content: 'Eny, nahafaly ahy ny tany nataony honenana, Ary naharavoravo ahy ny zanak''olombelona. '
  '32':
  - type: text
    content: 'Koa mihainoa ahy ianareo, anaka; Fa sambatra izay manaraka ny diako; '
  '33':
  - type: text
    content: 'Minoa anatra, ka hendre, Fa aza mandà. '
  '34':
  - type: text
    content: 'Sambatra izay olona mihaino ahy Ka miari-tory mandrakariva eo am-bavahadiko, Ary miandry eo amin''ny tolam-baravarako. '
  '35':
  - type: text
    content: 'Fa izay mahita ahy dia mahita fiainana Sady mahazo sitraka amin''i Jehovah; '
  '36':
  - type: text
    content: Fa izay diso ahy kosa mampidi-doza amin'ny fanahiny; Ary izay rehetra mankahala ahy tia fahafatesana.
  '4':
  - type: text
    content: 'Hianareo no antsoiko, ry olona; Ary ny feoko ho amin''ny zanak''olombelona. '
  '5':
  - type: text
    content: 'Fantaro ny fahendrena, ry kely saina; Ary fantaro ny fahalalana, ry adala. '
  '6':
  - type: text
    content: 'Henoy, fa hilaza zava-tsoa aho; Ary ny hilaza ny mahitsy no isokafan''ny molotro. '
  '7':
  - type: text
    content: 'Fa ny marina ihany no holazain''ny vavako; Ary ny ratsy dia fahavetavetana, raha amin''ny molotro. '
  '8':
  - type: text
    content: 'Marina ny teny rehetra aloaky ny vavako; Tsy misy fiolakolahana na fitaka ao aminy. '
  '9':
  - type: text
    content: 'Miharihary avokoa izy, raha amin''ny mazava saina, Ary mahitsy, raha amin''ny efa nahazo fahalalana. '
