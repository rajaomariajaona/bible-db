document_id: PRO.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiantsoan'ny fahendrena, sy ny fahatsarany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tsy miantso va ny fahendrena, Ary tsy manandra-peo va ny fahalalana? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aza ny volafotsy no raisina, fa ny anatro, Ary aleo ny fahalalana toy izay ny volamena voafantina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ny fahendrena dia tsara noho ny voahangy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: perla'
      marker-yv: yv-n
    - type: text
      text: '; Ary ny zavatra irina rehetra tsy azo ampitahaina aminy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Izaho fahendrena dia miara-monina amin-tsaina, Ary hitan''ny fahalalako ny fisainana mazava. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny fankahalana ny ratsy no fahatahorana an''i Jehovah. Ny fiavonavonana sy ny fireharehana sy ny lalana ratsy Ary ny vava fandainga dia samy halako avokoa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ahy ny fisainana sy ny fanambinana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tena fahendrena'
      marker-yv: yv-n
    - type: text
      text: '; Izaho no fahalalana, izaho no manan-kery; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izaho no anjakan''ny mpanjaka Sy andidian''ny mpanapaka araka ny rariny; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izaho no anapahan''ny andriandahy sy ny lehibe, Dia ny mpitsara rehetra amin''ny tany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tiako izay tia ahy; Ary izay fatra-pitady ahy dia hahita ahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ato amiko ny harena sy ny voninahitra, Eny, ny harena mateza sy ny fahamarinana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ny vokatro dia tsara noho ny volamena, eny, noho ny tena volamena aza, Ary ny fitomboan''ny hareko mihoatra noho ny volafotsy voafantina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Eo an-tampon''ny fitoerana avo amoron-dalana Sy eo an-tsampanan-dalana no ijoroany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Amin''ny alehan''ny fahamarinana no izorako, Dia ao amin''ny lalan''ny fitsarana marina, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Mba hampandovako harena izay tia ahy, Sy hamenoako ny firaketany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Jehovah nahary
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: nahazo'
      marker-yv: yv-n
    - type: text
      text: ' ahy ho fiandohan''ny alehany, Ho voalohany amin''ny asany hatramin''ny taloha. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izaho notendreny hatramin''ny fahagola, Eny, hatramin''ny voalohany indrindra, dia fony tsy mbola ary ny tany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fony tsy mbola ary ny lalina, no efa teraka aho, Fony tsy mbola ary ny loharano miboiboika be, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fony tsy mbola naorina ny tendrombohitra, Fony tsy mbola nisy havoana, no efa teraka aho, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fony tsy mbola natao ny tany, na ny saha, Na ny voalohan''ny vovo-tany ambonin''izao rehetra izao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Raha namorona ny lanitra Izy, dia tany aho, Raha namaritra ny hababakaka tambonin''ny lalina Izy, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Raha nampitoetra ny rahona eny ambony Izy, Raha niboiboika fatratra ny loharanon''ny lalina, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Raha nanisy faritra ho an''ny ranomasina Izy, Mba tsy hahazoan''ny rano mihoatra ny fetrany, Ary nandidy ny amin''ny fanorenan''ny tany, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Eo anilan''ny vavahady, amin''ny fidirana ho ao an-tanàna, Sy eo anaty vavahady no iantsoany maty hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia mpità-marika
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: notezaina'
      marker-yv: yv-n
    - type: text
      text: ' teo anilany aho Sady ravoravo isan''andro isan''andro Ka nilalao mandrakariva teo anatrehany; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Eny, nahafaly ahy ny tany nataony honenana, Ary naharavoravo ahy ny zanak''olombelona. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Koa mihainoa ahy ianareo, anaka; Fa sambatra izay manaraka ny diako; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Minoa anatra, ka hendre, Fa aza mandà. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Sambatra izay olona mihaino ahy Ka miari-tory mandrakariva eo am-bavahadiko, Ary miandry eo amin''ny tolam-baravarako. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fa izay mahita ahy dia mahita fiainana Sady mahazo sitraka amin''i Jehovah; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Fa izay diso ahy kosa mampidi-doza amin'ny fanahiny; Ary izay rehetra mankahala ahy tia fahafatesana.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hianareo no antsoiko, ry olona; Ary ny feoko ho amin''ny zanak''olombelona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fantaro ny fahendrena, ry kely saina; Ary fantaro ny fahalalana, ry adala. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Henoy, fa hilaza zava-tsoa aho; Ary ny hilaza ny mahitsy no isokafan''ny molotro. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa ny marina ihany no holazain''ny vavako; Ary ny ratsy dia fahavetavetana, raha amin''ny molotro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Marina ny teny rehetra aloaky ny vavako; Tsy misy fiolakolahana na fitaka ao aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Miharihary avokoa izy, raha amin''ny mazava saina, Ary mahitsy, raha amin''ny efa nahazo fahalalana. '
