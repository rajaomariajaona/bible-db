document_id: AMO.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hanjo ny Isiraely noho ny tsi-fetezany hibebaka
  - type: text
    content: Mihainoa izao teny izao, ianareo vantotr'ombivavin'i Basana, izay eny an-tendrombohitr'i Samaria, dia ianareo izay mampahory ny mahantra sy manorotoro ny malahelo ary manao amin'ny vadinareo
  - type: note
    content: 'Na: ny tomponareo: Heb. tompony, na vadiny'
  - type: text
    content: ' hoe: Mitondrà hosotrointsika. '
  '10':
  - type: text
    content: 'Efa naterako areti-mandringana tahaka ny any Egypta ianareo; Novonoiko sabatra ny zatovonareo sady nobaboina koa ny soavalinareo; Ary nampakariko ho eo am-bavoronareo ny hamaimboan''ny tobinareo; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
  '11':
  - type: text
    content: 'Efa nisy noravako teo aminareo tahaka ny nandravan''Andriamanitra an''i Sodoma sy Gomora, ka efa tahaka ny forohana nosarihana tamin''ny afo ianareo; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
  '12':
  - type: text
    content: 'Koa izao no hataoko aminao, sy Isiraely, satria hanao izany aminao Aho, dia miomàna hihaona amin''Andriamanitrao, ry Isiraely ô. '
  '13':
  - type: text
    content: 'Fa indro Ilay mamorona ny tendrombohitra sy manao na rivotra ary mampahafantatra ny olombelona izay heviny, dia Ilay mahatonga ny maraina ho aizina ary mandia ny fitoerana avo amin''ny tany: Jehovah, Andriamanitry ny maro, no anarany.'
  '2':
  - type: text
    content: 'Jehovah Tompo efa nianiana tamin''ny fahamasinany hoe: Indro, ho avy aminareo ny andro hitarihany anareo amin''ny farango sy izay sisa aminareo amin''ny fintana. '
  '3':
  - type: text
    content: Ary avy eo amin'ny banga no hivoahanareo, samy amin'izay hitsiny avy; Ary horoahina ho any Harmona
  - type: note
    content: 'Na: an-tranobe'
  - type: text
    content: ' ianareo'
  - type: note
    content: 'Na: ary harianareo ny fahefana (?)'
  - type: text
    content: ', hoy Jehovah. '
  '4':
  - type: text
    content: 'Mankanesa any Betela, ka manotà, ary any Gilgala, ka manotà fatratra; Ento isa-maraina ny fanatitrareo alatsa-drà ary isan-kateloana ny fahafolon-karenareo; '
  '5':
  - type: text
    content: 'Mandoroa zavatra misy masirasira ho fanati-pisaorana, ary miantsoa fanati-tsitrapo, eny, ambarao izany! Satria ny toy izany no sitrakareo, ry Zanak''Isiraely, hoy Jehovah Tompo. '
  '6':
  - type: text
    content: 'Fa Izaho dia efa nanome anareo ny mahamavovava tao an-tanànanareo rehetra, sy ny tsi-fahampian-kanina tamin''ny fonenanareo rehetra; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
  '7':
  - type: text
    content: 'Ary Izaho koa efa nampihantona ny orana tsy ho aminareo, raha mbola telo volana sisa tsy ho fararano, ka tamin''ny tanàna iray no nampilatsahako orana, ary tamin''ny tanàna iray kosa tsy mba nampilatsahako azy; Ny saha iray nilatsahan''ny orana. Ary ny saha iray kosa tsy mba nilatsahany ka maina. '
  '8':
  - type: text
    content: 'Dia nivembena ny tanàna roa aman-telo nitady rano tany amin''ny tanàna iray, kanjo tsy afa-ketaheta izy; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
  '9':
  - type: text
    content: Efa nasiako tamin'ny vary main'ny rivotra sy maty fotsy ianareo; Ny habetsahan'ny tanimbolinareo sy ny tanim-boalobokareo sy ny aviavinareo sy ny hazo olivanareo dia nohanin'ny valala
  - type: note
    content: Heb. mpikiky
  - type: text
    content: '; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
