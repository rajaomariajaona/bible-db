document_id: AMO.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hanjo ny Isiraely noho ny tsi-fetezany hibebaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mihainoa izao teny izao, ianareo vantotr'ombivavin'i Basana, izay eny an-tendrombohitr'i Samaria, dia ianareo izay mampahory ny mahantra sy manorotoro ny malahelo ary manao amin'ny vadinareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny tomponareo: Heb. tompony, na vadiny'
      marker-yv: yv-n
    - type: text
      text: ' hoe: Mitondrà hosotrointsika. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa naterako areti-mandringana tahaka ny any Egypta ianareo; Novonoiko sabatra ny zatovonareo sady nobaboina koa ny soavalinareo; Ary nampakariko ho eo am-bavoronareo ny hamaimboan''ny tobinareo; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nisy noravako teo aminareo tahaka ny nandravan''Andriamanitra an''i Sodoma sy Gomora, ka efa tahaka ny forohana nosarihana tamin''ny afo ianareo; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no hataoko aminao, sy Isiraely, satria hanao izany aminao Aho, dia miomàna hihaona amin''Andriamanitrao, ry Isiraely ô. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa indro Ilay mamorona ny tendrombohitra sy manao na rivotra ary mampahafantatra ny olombelona izay heviny, dia Ilay mahatonga ny maraina ho aizina ary mandia ny fitoerana avo amin''ny tany: Jehovah, Andriamanitry ny maro, no anarany.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah Tompo efa nianiana tamin''ny fahamasinany hoe: Indro, ho avy aminareo ny andro hitarihany anareo amin''ny farango sy izay sisa aminareo amin''ny fintana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary avy eo amin'ny banga no hivoahanareo, samy amin'izay hitsiny avy; Ary horoahina ho any Harmona
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: an-tranobe'
      marker-yv: yv-n
    - type: text
      text: ' ianareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ary harianareo ny fahefana (?)'
      marker-yv: yv-n
    - type: text
      text: ', hoy Jehovah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mankanesa any Betela, ka manotà, ary any Gilgala, ka manotà fatratra; Ento isa-maraina ny fanatitrareo alatsa-drà ary isan-kateloana ny fahafolon-karenareo; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandoroa zavatra misy masirasira ho fanati-pisaorana, ary miantsoa fanati-tsitrapo, eny, ambarao izany! Satria ny toy izany no sitrakareo, ry Zanak''Isiraely, hoy Jehovah Tompo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Izaho dia efa nanome anareo ny mahamavovava tao an-tanànanareo rehetra, sy ny tsi-fahampian-kanina tamin''ny fonenanareo rehetra; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izaho koa efa nampihantona ny orana tsy ho aminareo, raha mbola telo volana sisa tsy ho fararano, ka tamin''ny tanàna iray no nampilatsahako orana, ary tamin''ny tanàna iray kosa tsy mba nampilatsahako azy; Ny saha iray nilatsahan''ny orana. Ary ny saha iray kosa tsy mba nilatsahany ka maina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivembena ny tanàna roa aman-telo nitady rano tany amin''ny tanàna iray, kanjo tsy afa-ketaheta izy; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nasiako tamin'ny vary main'ny rivotra sy maty fotsy ianareo; Ny habetsahan'ny tanimbolinareo sy ny tanim-boalobokareo sy ny aviavinareo sy ny hazo olivanareo dia nohanin'ny valala
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mpikiky
      marker-yv: yv-n
    - type: text
      text: '; Nefa tsy niverina tamiko ihany ianareo, hoy Jehovah. '
