document_id: ECC.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mety hatao amin'Andriamanitra na amin'ny fivavahana na amin'ny voady
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia hitako koa ny fampahoriana rehetra atao atỳ ambanin''ny masoandro; ary indro ny ranomason''ny ampahorina, sady tsy nisy mpanony azy; ary loza no ataon''ny tanan''ny mpampahory azy, sady tsy nisy mpanony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny maty izay efa maty ela dia nataoko ho sambatra noho ny velona izay mbola velona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: nefa tsara indray noho izy roa tonta aza ny tsy ary, izay tsy nahita ny ratsy atao atỳ ambanin'ny masoandro akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary hitako ny fisasarana rehetra sy ny fahaizan-javatra rehetra, fa avy amin'ny fifampialonan'ny olona izany. Zava-poana sy misambo-drivotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Homan-drivotra'
    marker-yv: yv-n
  - type: text
    text: ' foana koa izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny adala manohon-tanana ka homana ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tsara ny eran-tànan'ila misy fiadanana noho ny eran-tànan-droa misy fisasarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Tsara ny fiadanana eran-tànan''ila noho ny fisasarana,'
    marker-yv: yv-n
  - type: text
    text: ' sady misambo-drivotra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Homan-drivotra'
    marker-yv: yv-n
  - type: text
    text: ' foana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izao koa no zava-poana hitako atỳ ambanin''ny masoandro: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Misy mitoetra irery ka tsy mana-namana, eny, tsy manan-janaka na rahalahy aza, nefa tsy misy farany ny fisasarany rehetra, ary ny masony tsy afa-po amin''ny harena, hanaovany hoe: Ho an''iza no isasarako sy tsy ampananako soa ny fanahiko? Zava-poana sy asa mahareraka koa izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsara ny roa noho ny iray; fa misy valiny tsara ny fisasarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha misy lavo izy, dia arenin''ny namany; fa mahantra ny lavo izay tsy manana namana hanarina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary koa, raha miara-mandry ny roa, dia mafana izy; fa hatao ahoana no hampahafana ny irery? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha misy maharesy ny irery aza, ny roa tsy ho leony tsy akory; ary ny mahazaka telo olana tsy mora tapahina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aleo zatovo malahelo hendry toy izay mpanjaka antitra adala ka tsy laitra anarina intsony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: fa avy ao an-tranomaizina no nivoahany hanjaka, na dia nateraka tamin'alahelo tamin'ny fanjakany aza izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'na: fa na dia nateraka tamin''ny fanjakany aza izy, dia tamin''alahelo ihany'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hitako ny miaina rehetra izay miriaria atỳ ambanin''ny masoandro manotrona ilay zazalahy dia ilay faharoa izay mitsangana handimby ny teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy hita isa ny olona rehetra, dia izay rehetra anjakany; nefa izay any aoriana tsy mba hifaly aminy; fa zava-poana sy misambo-drivotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Homan-drivotra'
    marker-yv: yv-n
  - type: text
    text: ' foana koa izany. Tandremo ny tongotrao, raha mankao an-tranon''Andriamanitra ianao; fa ny manatona hihaino no tsara noho ny fanateran''ny adala fanatitra; fa tsy fantatr''ireny ho manao ratsy izy.'
