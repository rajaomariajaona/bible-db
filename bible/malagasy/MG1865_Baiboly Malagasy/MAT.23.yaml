document_id: MAT.23,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tamin''izany Jesosy dia niteny tamin''ny vahoaka sy tamin''ny mpianany ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary aza mba mety hatao hoe mpitarika ianareo; fa iray ihany no Mpitarika anareo, dia Kristy. '
  '11':
  - type: text
    content: 'Fa izay lehibe aminareo no ho mpanompo anareo. '
  '12':
  - type: text
    content: 'Fa izay manandra-tena no haetry; ary izay manetry tena no hasandratra. '
  '13':
  - type: text
    content: Fa lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa arindrinareo eo anoloan'ny olona ny fanjakan'ny lanitra; fa ianareo tsy miditra, ary izay miditra dia tsy avelanareo hiditra
  - type: note
    content: 'Ampio hoe:'
  - type: text
    content: '. '
  '14':
  - type: text
    content: '(Lozanareo mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! Fa laninareo ny tranon''ny mpitondratena, ary dia manao vavaka lavareny ho fiolahana ianareo; koa izany no hahazoanareo fahamelohana mafimafy kokoa.) '
  '15':
  - type: text
    content: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa mandeha mitety ny ranomasina sy ny tany maina ianareo mba hahazoanareo na dia iray ihany aza ho proselyta; ary rehefa azonareo izy, dia ataonareo zanaky ny helo mihoatra indroa noho ianareo aza. '
  '16':
  - type: text
    content: 'Lozanareo, mpitarika jamba izay manao hoe: Raha misy mianiana amin''ny tempoly, dia tsy mampaninona izany; fa raha misy mianiana amin''ny volamena amin''ny tempoly, dia haningo-tena izy. '
  '17':
  - type: text
    content: 'Ry adala sy jamba! iza no lehibe, ny volamena va, sa ny tempoly izay nahamasina ny volamena? '
  '18':
  - type: text
    content: 'Ary koa: Raha misy mianiana amin''ny alitara, dia tsy mampaninona izany; fa raha misy mianiana amin''ny fanatitra eo amboniny, dia haningo-tena izy. '
  '19':
  - type: text
    content: 'Ry jamba! iza no lehibe, ny fanatitra, sa ny alitara izay mahamasina ny fanatitra? '
  '2':
  - type: text
    content: 'Eo amin''ny fipetrahan''i Mosesy no ipetrahan''ny mpanora-dalàna sy ny Fariseo; '
  '20':
  - type: text
    content: 'Koa amin''izany, izay mianiana amin''ny alitara, dia mianiana aminy mbamin''ny zavatra rehetra izay eo amboniny. '
  '21':
  - type: text
    content: 'Ary izay mianiana amin''ny tempoly dia mianiana aminy mbamin''izay mitoetra ao anatiny. '
  '22':
  - type: text
    content: 'Ary izay mianiana amin''ny lanitra dia mianiana amin''ny seza fiandrianan''Andriamanitra mbamin''izay mipetraka eo amboniny. '
  '23':
  - type: text
    content: Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa mandoa ny fahafolon'ny solila sy ny aneta ary ny komina
  - type: note
    content: Anaran-java-maniry ireo
  - type: text
    content: ' ianareo, nefa navelanareo izay lehibe amin''ny lalàna, dia ny rariny sy ny famindram-po ary ny finoana; ireto tokony ho nataonareo, nefa tsy tokony havelanareo ireroana. '
  '24':
  - type: text
    content: 'Ry mpitarika jamba! tantavaninareo ny moka, nefa atelinareo ny rameva. '
  '25':
  - type: text
    content: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa diovinareo ny vohon''ny kapoaka sy ny lovia, nefa ny ao anatiny dia feno rombaka sy tsi-fahononana. '
  '26':
  - type: text
    content: 'Ry Fariseo jamba! diovy aloha ny atin''ny kapoaka sy ny lovia, mba ho madio koa ny vohony. '
  '27':
  - type: text
    content: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa ianareo dia tahaka ny fasana voalalotra fotsy, izay miseho tsara tarehy eo ivelany, nefa ny ao anatiny dia feno taolan''ny maty mbamin''ny fahalotoana rehetra. '
  '28':
  - type: text
    content: 'Dia tahaka izany koa ianareo: raha amin''ny eo ivelany dia miseho amin''ny olona ho marina, nefa ny ao anatinareo dia feno fihatsaram-belatsihy sy tsi-fankatoavan-dalàna. '
  '29':
  - type: text
    content: 'Lozanareo, mpanora-dalàna sy Fariseo, mpihatsaravelatsihy! fa manao ny fasan''ny mpaminany ianareo sady manisy haingony ny rarivatom-pasan''ny olona marina, '
  '3':
  - type: text
    content: 'koa amin''izany, izay rehetra lazainy dia ataovy ka tandremo; fa aza mba manao araka ny asany, satria miteny ihany izy, nefa tsy manao. '
  '30':
  - type: text
    content: 'ka hoy ianareo: Raha niara-belona tamin''ny razanay izahay, dia tsy mba nikambana taminy handatsa-drà ny mpaminany. '
  '31':
  - type: text
    content: 'Ka dia miampanga tena ianareo fa zanak''izay namono ny mpaminany. '
  '32':
  - type: text
    content: 'Ary ianareo koa dia mamenoa ny famaran''ny razanareo. '
  '33':
  - type: text
    content: 'Ry bibilava, taranaky ny menarana, hataonareo ahoana no fandositra ny fanamelohana ho any amin''ny helo? '
  '34':
  - type: text
    content: 'Ary noho izany, indro, Izaho maniraka mpaminany sy olon-kendry ary mpanora-dalàna ho atỳ aminareo; koa ny sasany hovonoinareo sy hohomboanareo amin''ny hazo fijaliana, ary ny sasany hokapohinareo ao amin''ny synagoganareo sy henjehinareo mitety vohitra,- '
  '35':
  - type: text
    content: 'mba hanody anareo ny rà marina rehetra, izay nalatsaka tambonin''ny tany, hatramin''ny ran''i Abela marina ka hatramin''ny ran''i Zakaria, zanak''i Barakia, izay novonoinareo teo anelanelan''ny tempoly sy ny alitara. '
  '36':
  - type: text
    content: 'Lazaiko aminareo marina tokoa: Hanody ity taranaka ity izany rehetra izany. '
  '37':
  - type: text
    content: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay irahina ho aminao, impiry Aho no ta-hanangona ny zanakao, tahaka ny fanomban''ny akoho ny zanany ao ambanin''ny elany, fa tsy nety ianareo! '
  '38':
  - type: text
    content: 'Indro, avela ho lao ho anareo ny tranonareo. '
  '39':
  - type: text
    content: 'Fa lazaiko aminareo: Hatramin''izao dia tsy hahita Ahy tokoa ianareo mandra-pilazanareo hoe: Isaorana anie Izay avy amin''ny anaran''i Jehovah.'
  '4':
  - type: text
    content: 'Eny, mamehy entana sady mavesatra no sarotra entina izy ka manaingina izany eo amin''ny soroky ny olona, nefa ny tenany tsy mety manetsika izany na dia amin''ny rantsan-tànany anankiray asa. '
  '5':
  - type: text
    content: 'Ary ny asany rehetra dia ataony mba ho hitan''ny. olona; fa ataony lehibe ny fylakiterany, ary ataony vaventy ny somotraviaviny. '
  '6':
  - type: text
    content: 'Ary tia ny fitoerana aloha eo amin''ny fanasana izy, sy ny fipetrahana aloha eo amin''ny synagoga '
  '7':
  - type: text
    content: 'sy ny hoharabain''ny olona eny an-tsena ary ny hataon''ny olona hoe: Raby ô! '
  '8':
  - type: text
    content: 'Fa ianareo kosa aza mba mety hatao hoe: Raby ô; fa iray ihany no mpampianatra anareo, ary ianareo rehetra dia mpirahalahy avokoa. '
  '9':
  - type: text
    content: 'Ary aza milaza olona etỳ an-tany ho rainareo; fa iray ihany no Rainareo, dia Izay any an-danitra. '
