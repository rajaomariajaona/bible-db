document_id: 1CH.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nizarana ny mpisorona ho efatra amby roa-polo toko
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny amin''ny taranak''i Arona dia izao no nizarana azy ho antokony: Ny zanakalahin''i Arona dia Nadaba sy Abiho sy Eleazara ary Itamara; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa Nadaba sy Abiho dia maty talohan-drainy sady samy tsy nanan-janaka, koa dia Eleazara sy Itamara no nanao fisoronana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Davida sy Zadoka, isan''ny taranak''i Eleazara, sy Ahimeleka, isan''ny taranak''Itamara, dia nizara azy araka ny antokony sy ny fanompoany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny lohany tamin''ireo, dia tamin''ny taranak''i Eleazara, no maromaro kokoa noho ny tamin''ny taranak''Itamara, ka dia nozarainy toy izao izy: Tamin''ny taranak''i Eleazara dia enina ambin''ny folo no lohan''ny fianakaviana; ary tamin''ny taranak''Itamara dia valo kosa no lohan''ny fianakaviana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary samy nozarazaraina tamin''ny filokana avokoa izy rehetra; fa samy mpifehy masina, dia mpifehy ho an''Andriamanitra avokoa, na ny avy tamin''ny taranak''i Eleazara, na ny avy tamin''ny taranak''Itamara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Semaia, zanak''i Netanela, mpanoratra anankiray tamin''ny Levita, no nanoratra azy teo anatrehan''ny mpanjaka sy ny mpanapaka sy Zadoka mpisorona sy Ahimeleka, zanak''i Abiatara, sy teo anatrehan''ny lohan''ny fianakaviana tamin''ny mpisorona sy ny Levita: fianakaviana iray no nalaina ho an''i Eleazara, ary iray kosa ho an''Itamara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny loka voalohany dia azon''i Joariba, ny faharoa an''i Jedaia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ny fahatelo an''i Harima, ny fahefatra an''i Seorima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny fahadimy an''i Malkia, ny fahenina an''i Miamina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny fahafito an''i Hakoza, ny fahavalo an''i Abia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny fahasivy an''i Jesoa, ny fahafolo an''i Sekania. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny fahiraika ambin''ny folo an''i Eliasiba, ny faharoa ambin''ny folo an''i Jakima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny fahatelo ambin''ny folo an''i Hopa, ny fahefatra ambin''ny folo an''i Jesebaba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny fahadimy ambin''ny folo an''i Bilga, ny fahenina ambin''ny folo an''Imera, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny fahafito ambin''ny folo an''i Hezira, ny fahavalo ambin''ny folo an''i Hafizeza, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny fahasivy ambin''ny folo an''i Petahia, ny faharoa-polo an''i Jehezekela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny fahiraika amby roa-polo an''i Jakina, ny faharoa amby roa-polo an''i Gamola, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny fahatelo amby roa-polo an''i Delaia, ny fahefatra amby roa-polo an''i Mazia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireo avy no antokony amin'ny fanompoany izay idirany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary ny raharahan''ireo tamin''ny fanompoana dia ny hiditra'
    marker-yv: yv-n
  - type: text
    text: ' ao an-tranon''i Jehovah araka ny fitsipika voatendrin''i Arona rainy, araka ny nandidian''i Jehovah, Andriamanitry ny Isiraely, azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary tamin''ny taranak''i Levy sisa dia izao; Tamin''ny taranak''i Amrama dia Sobaela; tamin''ny zanak''i Sobaela dia Jedala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny amin''i Rehabia: tamin''ny taranak''i Rehabia dia Jisia no voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tamin''ny Jizarita dia Selomota; tamin''ny taranak''i Selomota dia Jahata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny amin''ny taranak''i Sebrona dia Jeria no voalohany, Amaria no faharoa, Jahaziela no fahatelo, Jekameama no fahefatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny zanakalahin''i Oziela dia Mika; tamin''ny taranak''i Mika dia Samira; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny rahalahin''i Mika dia Jisia; tamin''ny taranak''i Jisia dia Zakaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny zanakalahin''i Merary dia Maly sy Mosy; ny zanakalahin''i Jazia dia Beno. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny zanakalahin''i Merary tamin''i Jazia dia Beno sy Sohama sy Zakora ary Ibry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Avy tamin''i Maly no nihavian''i Eleazara, izay tsy nanan-janakalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny amin''i Kisy, ny zananilahy dia Jeramela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny zanakalahin''i Mosy dia Maly sy Edera ary Jerimota. Ireo no taranaky ny Levita araka ny fianakaviany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ireo dia mba niara-niloka tamin''ny rahalahiny, taranak''i Arona, teo anatrehan''i Davida mpanjaka sy Zadota sy Ahimeleka sy ny lohan''ny fianakavian''ny mpisorona sy ny Levita: niara-niloka avokoa na ny zokiny na ny zandriny.'
