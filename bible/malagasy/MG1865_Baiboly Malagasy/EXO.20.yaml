document_id: EXO.20,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanomezan'Andriamanitra ny Didy Folo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nilaza izao teny rehetra izao Andriamanitra ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Sabatan''i Jehovah Andriamanitrao ny andro fahafito; koa aza manao raharaha akory ianao amin''izany, na ny zanakao-lahy, na ny zanakao-vavy, na ny ankizilahinao, na ny ankizivavinao na ny biby fiompinao, na ny vahininao izay tafiditra eo am-bavahadinao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa henemana no nanaovan'i Jehovah ny lanitra sy ny tany sy ny ranomasina mbamin'izay rehetra ao aminy, dia nitsahatra Izy tamin'ny andro fahafito; izany no nitahian'i Jehovah ny andro Sabata sy nanamasinany azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manaja ny rainao sy ny reninao mba ho maro andro ianao ao amin'ny tany izay omen'i Jehovah Andriamanitrao ho anao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mamono olona.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mijangajanga.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mangalatra.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mety ho vavolombelona mandainga hanameloka ny namanao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mitsiriritra ny tranon'ny namanao; aza mitsiriritra ny vadin'ny namanao, na ny ankizilahiny, na ny ankizivaviny, na ny ombiny, na ny borikiny, na izay mety ho an'ny namanao akory aza.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona rehetra nandre ny kotrokorana sy ny feon''ny anjomara ary nahita ny helatra sy ny tendrombohitra nivoa-tsetroka, ary nony nahita izany ny olona, dia toran-kovitra izy ka nijanona teny lavitra eny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamin''i Mosesy: Aoka ihany ianao no hiteny aminay, dia hihaino izahay; fa aza Andriamanitra no miteny aminay, fandrao maty izahay. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Mosesy tamin''ny olona: Aza matahotra; fa tonga Andriamanitra mba hizaha toetra anareo, ary mba ho eo anatrehan''ny tavanareo ny fahatahorana Azy, mba tsy hanotanareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nijanona teny lavitra eny ny olona, fa Mosesy kosa nanakaiky ny aizim-pito, izay nitoeran''Andriamanitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin''i Mosesy: Izao no lazaonao amin''ny Zanak''Isiraely: Hianareo efa nahita fa tany an-danitra no nitenenako taminareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aza manao andriamanitra volafotsy na andriamanitra volamena ho anareo ho fanampiko. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alitara tany no hataonao ho Ahy, ka haterinao eo amboniny ny fanatitra doranao sy ny fanati-pihavananao, dia ny ondry aman''osinao sy ny ombinao; eo amin''ny fitoerana rehetra izay ampahatsiarovako ny anarako no hanatonako anao sy hitahiako anao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha alitara vato no hataonao ho Ahy, dia aza ny vato voapaika no hanaovanao azy; fa raha manainga ny fandrakao ho aminy ianao, dia handoto azy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aza asiana ambaratonga hiakaranao ho eo amin'ny alitarako, mba tsy ho hita eo ny fitanjahanao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manana andriamani-kafa, fa Izaho ihany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manao sarin-javatra voasokitra ho anao, na ny mety ho endriky ny zavatra izay eny amin''ny lanitra ambony, na izay etỳ amin''ny tany ambany, na izay any amin''ny rano ambanin''ny tany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza miankohoka eo anatrehany, ary aza manompo azy; fa Izaho, Jehovah Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin''ny zanaka hatramin''ny zafiafy sy ny zafindohalika, dia amin''izay mankahala Ahy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa kosa mamindra fo amin''ny olona arivo mandimby izay tia Ahy ka mitandrina ny didiko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manonona foana ny anaran''i Jehovah Andriamanitrao; fa tsy hataon''i Jehovah ho tsy manan-tsiny izay manonona foana ny anarany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahatsiarova ny andro Sabata hanamasi­na azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra. '
