document_id: PSA.82,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitsaran'Andriamanitra ny mpitsara etỳ an-tany
  - type: text
    content: Salamo nataon'i Asafa. Andriamanitra dia eo amin'ny fiangonan'Andriamanitra; ary eo amin'ireo andriamanitra no itsarany.
  '2':
  - type: text
    content: 'Mandra-pahoviana no hitsarànareo tsy marina ka ihenaranareo maso ny ratsy fanahy? '
  '3':
  - type: text
    content: 'Alaharo ny tenin''ny mahantra sy ny kamboty; omeo rariny ny ory sy ny malahelo; '
  '4':
  - type: text
    content: Vonjeo ny mahantra sy ny malahelo; afaho amin'ny tanan'ny ratsy fanahy izy.
  '5':
  - type: text
    content: 'Tsy mahalala na mahazo an-tsaina ireny; ao amin''ny maizina no andehanany; mihorohoro ny fanambanin''ny tany rehetra. '
  '6':
  - type: text
    content: 'Hoy izaho: Andriamanitra ianareo, ary zanaky ny Avo Indrindra ianareo rehetra; '
  '7':
  - type: text
    content: Kanjo ho faty tahaka ny olona ihany ianareo, ary samy ho lavo tahaka ny anankiray amin'ny lehibe.
  '8':
  - type: text
    content: Mitsangàna, Andriamanitra ô, tsarao ny tany; fa Hianao no handova ny firenena rehetra.
