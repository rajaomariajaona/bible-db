document_id: PSA.82
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitsaran'Andriamanitra ny mpitsara etỳ an-tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon'i Asafa. Andriamanitra dia eo amin'ny fiangonan'Andriamanitra; ary eo amin'ireo andriamanitra no itsarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandra-pahoviana no hitsarànareo tsy marina ka ihenaranareo maso ny ratsy fanahy? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alaharo ny tenin''ny mahantra sy ny kamboty; omeo rariny ny ory sy ny malahelo; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vonjeo ny mahantra sy ny malahelo; afaho amin'ny tanan'ny ratsy fanahy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy mahalala na mahazo an-tsaina ireny; ao amin''ny maizina no andehanany; mihorohoro ny fanambanin''ny tany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy izaho: Andriamanitra ianareo, ary zanaky ny Avo Indrindra ianareo rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanjo ho faty tahaka ny olona ihany ianareo, ary samy ho lavo tahaka ny anankiray amin'ny lehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mitsangàna, Andriamanitra ô, tsarao ny tany; fa Hianao no handova ny firenena rehetra.
