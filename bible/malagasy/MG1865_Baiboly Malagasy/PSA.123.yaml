document_id: PSA.123,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanantenana an'Andriamanitra hanafaka amin'ny fanebahana sy ny fanamavoana
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: . Aminao no anandratako ny masoko, Ry Mpitoetra any an-danitra ô.
  '2':
  - type: text
    content: 'Indro, toy ny fijerin''ny ankizilahy Ny tanan''ny tompolahiny, Ary toy ny fijerin''ny ankizivavy Ny tanan''ny tompovaviny, No fijerintsika an''i Jehovah Andriamanitsika, Mandra-pamindra fony amintsika. '
  '3':
  - type: text
    content: 'Mamindrà fo aminay, Jehovah ô, mamindrà fo aminay; Fa tototry ny fanamavoana loatra izahay; '
  '4':
  - type: text
    content: Eny, tototry ny famingavingan'ny miadana ny fanahinay, Sy tototry ny fanamavoan'ny mpiavonavona.
