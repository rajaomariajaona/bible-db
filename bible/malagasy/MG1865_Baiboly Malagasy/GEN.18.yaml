document_id: GEN.18,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nifonan'i Abrahama ho an'i Sodoma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Jehovah niseho tamin''i Abrahama teo an-kazo terebintan''i Mamre; ary nipetraka teo am-baravaran''ny lainy izy, raha nafana ny andro; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hoy Izy: Hiverina aminao tokoa Aho raha avy ny taona toy izao; ary, indro hanana zazalahy Saraha vadinao. Ary Saraha nandre izany teo am-baravaran''ny lay, izay teo ivohon''Ilay niteny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary Abrahama sy Saraha dia samy efa zoki-olona ka nandroso fahanterana, ary efa nitsahatra tamin''ny fombam-behivavy Saraha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Saraha dia nihomehy anakampo ka nanao hoe: Moa mbola hanana hafaliana ihany va aho rehefa tratrantitra toy izao, sady efa antitra koa itompokolahy? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy Jehovah tamin''i Abrahama: Nahoana no nihomehy Saraha ka nanao hoe: Hiteraka tokoa va aho, kanefa izao efa antitra izao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa moa misy zavatra mahagaga izay tsy hain''i Jehovah va? Amin''ny fotoan''andro raha avy ny taona toy izao dia hiverina aminao Aho, ary Saraha hanana zazalahy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nandà Saraha satria natahotra izy, ka nanao hoe: Tsy nihomehy aho tsy akory. Fa hoy Ilay niteny: Tsia; fa nihomehy mihitsy ianao.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nitsangana ireny lehilahy ireny ka niala teo, dia nitsinjo an''i Sodoma; ary Abrahama niaraka taminy hanatitra azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary Jehovah nanao hoe: Hafeniko amin''i Abrahama va izay hataoko? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa Abrahama ho tonga firenena lehibe sy mahery tokoa, ary aminy no hitahiana ny firenena rehetra ambonin''ny tany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa efa nifidy azy Aho mba handidy ny zanany sy ny taranany mandimby azy hitandreman''ireo ny lalàn''i Jehovah hanao izay marina sy mahitsy, mba hitondran''i Jehovah amin''i Abrahama izay efa nolazainy taminy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia nanopy ny masony izy ka niery, ary, indreo, nisy telo lahy nijanona teo tandrifiny, ka nony nahita ireo izy, dia niala teo am-baravaran''ny lainy ka nihazakazaka hitsena azy, dia niankohoka tamin''ny tany '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy Jehovah: Ny fitarainan''i Sodoma sy Gomora dia lehibe tokoa, ary ny fahotany dia mavesatra indrindra; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: hidina Aho ka hizaha na efa nahatanteraka izany tokoa izy araka ny fitarainan'ny tany, izay efa tonga atỳ amiko, na tsia; ary raha tsy izany, dia ho fantatro.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nihodina niala teo ireo lehilahy ireo ka nandroso ho any Sodoma; fa Abrahama kosa mbola nijanona teo anatrehan''i Jehovah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nanatona Abrahama ka nanao hoe: Haringanao miaraka amin''ny meloka va ny marina? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Angamba misy olo-marina dimam-polo ao an-tanàna; haringanao koa va, ka tsy hamindranao fo ny tanàna noho ny dimam-polo marina izay ao? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Sanatria Anao raha hanao toy izany ka hamono ny marina miaraka amin''ny meloka, ka ny marina hatao tahaka ny meloka; sanatria Anao izany! tsy hitsara marina va ny Mpitsara ny tany rehetra? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary hoy Jehovah: Raha mahita dimam-polo marina ao an-tanàna Sodoma Aho, dia hamindrako fo ny tanàna rehetra noho ireny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia namaly Abrahama ka nanao hoe: Indro, fa efa sahy niteny tamin''ny Tompo aho nefa vovoka sy lavenona: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Angamba ho latsaka dimy ny dimam-polo marina; moa haringanao va ny tanàna rehetra noho ny dimy? Ary hoy Izy: Tsy handringana Aho, raha mahita dimy amby efa-polo ao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia, mbola niteny taminy indray izy ka nanao hoe: Angamba efa-polo no ho hita ao. Ary hoy Izy: Tsy mba hanao izany Aho noho ny efa-polo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka nanao hoe: Tompo ô, raha mahita fitia eto imasonao aho, masìna ianao, aza dia mandalo ny mpanomponao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary hoy izy: Aoka anie mba tsy ho tezitra ny Tompo, fa mbola hiteny aho: Angamba telo-polo no ho hita ao. Ary hoy Izy: Tsy mba hanao izany Aho, raha mahita telo-polo ao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ArY hoy izy: Indro, fa efa sahy niteny tamin''ny Tompo aho: Angamba roa-polo no ho hita ao. Ary hoy Izy: Tsy mba handringana azy Aho noho ny roa-polo. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary hoy izy: Aoka anie mba tsy ho tezitra Hianao, Tompo, fa hiteny izao indray mandeha izao ihany aho: Angamba folo no ho hita ao. Ary hoy Izy: Tsy mba handringana Aho noho ny folo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Dia lasa nandeha Jehovah, rehefa vita ny teny nataony tamin'i Abrahama; ary Abrahama niverina ho any amin'ny fonenany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka hangalana rano kely ianareo hanasana ny tongotrareo; ary aoka mba hiala sasatra kely eo am-pototry ny hazo ianareo; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'dia haka mofo kely aho hataonareo ody am-bavafo; ary rehefa afaka izany, dia handeha ihany ianareo; fa tonga atỳ amin''ny mpanomponareo ianareo. Ary hoy izy telo lahy: Ataovy ihany araka izay nolazainao.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nandeha faingana Abrahama nankany an-day tany amin''i Saraha ka nanao hoe: Faingana, makà koba tsara toto intelon''ny famarana; dia fetafetao ka ataovy mofo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary Abrahama kosa nihazakazaka nankany amin''ny omby, dia naka zanak''omby tanora sady tsara ka nanolotra azy tamin''ny ankizilahy, dia lasa faingana izy hamboatra azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary Abrahama naka ronono mandry sy ronono ary ilay zanak''omby efa namboariny, dia narosony teo anoloan''izy telo lahy; ary nijanona teo anilany teo ambanin''ny hazo izy, dia nihinana izy telo lahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy izy telo lahy tamin''i Abrahama: Aiza Saraha vadinao? Ary hoy kosa izy: Indro, ao an-day izy. '
