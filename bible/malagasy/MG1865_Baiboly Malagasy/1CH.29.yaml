document_id: 1CH.29,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nisaoran'i Davida an'Andriamanitra sy ny fara-teniny tamin'ny Isiraely, sy ny nanendrena an'i Solomona, ary ny nahafatesan'i Davida
  - type: text
    content: 'Ary hoy Davida mpanjaka tamin''ny fiangonana rehetra: Solomona zanako, ilay nofidin''Andriamanitra, dia mbola zaza sy tanora fanahy; nefa lehibe ny asa, fa tsy lapa ho an''olona, fa ho an''i Jehovah Andriamanitra. '
  '10':
  - type: text
    content: 'Koa dia nisaotra an''i Jehovah teo anatrehan''ny fiangonana rehetra Davida ka nanao hoe: Isaorana anie Hianao, Jehovah ô, Andriamanitr''Isiraely razanay, hatramin''ny taloha indrindra ka ho mandrakizay. '
  '11':
  - type: text
    content: 'Anao, Jehovah ô, ny fahalehibiazana sy ny hery sy ny voninahitra sy ny famirapiratana ary ny fiandrianana, dia izay rehetra any an-danitra sy etỳ an-tany; Anao ny fanjakana, Jehovah ô, ary Anao ny fisandratana ho Lohany ambonin''izy rehetra. '
  '12':
  - type: text
    content: 'Avy aminao ny harena sy ny voninahitra, ary Hianao no manjaka amin''izao rehetra izao; eo an-tananao ny hery sy ny tanjaka, ka eo an-tananao koa ny mampahalehibe sy ny mampahatanjaka izao rehetra izao. '
  '13':
  - type: text
    content: 'Koa ankehitriny misaotra Anao izahay, ry Andriamanitray ô, sy midera ny anaranao be voninahitra. '
  '14':
  - type: text
    content: 'Fa zinona moa aho, ary zinona moa ny oloko, no ahazoanay hery hanatitra toy izao? Fa avy aminao ny zavatra rehetra, ary avy tamin''ny Anao ihany no nanomezanay Anao. '
  '15':
  - type: text
    content: 'Fa vahiny sy mpivahiny eo anatrehanao izahay tahaka ny razanay rehetra; tahaka ny aloka ny andronay etỳ an-tany, ka tsy misy fanantenana. '
  '16':
  - type: text
    content: 'Ry Jehovah Andriamanitray ô, ireto zavatra rehetra novorinay hanaovana ny trano ho an''ny anaranao masina ireto dia avy tamin''ny tananao, ary Anao rahateo izy rehetra. '
  '17':
  - type: text
    content: 'Ary fantatro, ry Andriamanitro ô, fa Hianao no mamantatra ny fo ary mankasitraka izay mahitsy. Ary ny amiko, dia amin''ny hitsim-poko no nahazotoako nanatitra ireto zavatra rehetra ireto; ary ankehitriny efa hitako tamin''ny fifaliana ny olonao, izay vory eto, mazoto mitondra fanatitra ho Anao. '
  '18':
  - type: text
    content: 'Jehovah ô, Andriamanitry ny razanay, dia Abrahama sy Isaka ary Isiraely, mba ampahareto ao am-pon''ny olonao mandrakizay izany fikasan''ny sainy izany, ka ampiomany ho Anao ny fony; '
  '19':
  - type: text
    content: ary omeo fo marina Solomona zanako hitandrina ny didinao sy ny teni-vavolombelonao sy ny lalànao ka hanao izany rehetra izany sady hahavita ny lapa izay efa namoriako ny hanaovana azy.
  '2':
  - type: text
    content: Ary tamin'ny heriko rehetra no namoriako izay hanaovana ny tranon'Andriamanitra, dia ny volamena hanaovana ny fanaka volamena, ary ny volafotsy hanaovana ny fanaka volafotsy, ary ny varahina hanaovana ny fanaka varahina, ary ny vy hanaovana ny fanaka vy, ary ny hazo hanaovana ny fanaka hazo, ary ny vato beryla sy ny vato halatsaka an-tranontranony
  - type: note
    content: 'Na: beryla mbamin''ny tranontranony'
  - type: text
    content: ' ary ny vato alatsaka asiana antimony sy ny vato misoratsoratra'
  - type: note
    content: 'Na: tenona samy hafa soratra'
  - type: text
    content: ' ary ny vato soa samy hafa rehetra ary ny vatosanga'
  - type: note
    content: marmora fotsy
  - type: text
    content: ' betsaka. '
  '20':
  - type: text
    content: 'Ary hoy Davida tamin''ny fiangonana rehetra: Masìna ianareo, misaora an''i Jehovah Andriamanitrareo. Ary ny fiangonana rehetra dia nisaotra an''i Jehovah, Andriamanitry ny razany, sady niondrika ka niankohoka teo anatrehan''i Jehovah sy ny mpanjaka.'
  '21':
  - type: text
    content: 'Ary namono zavatra hatao fanatitra ho an''i Jehovah izy sady nanatitra fanatitra dorana ho an''i Jehovah nony ampitson''iny, dia vantotr''ombilahy arivo sy ondrilahy arivo ary zanak''ondry arivo mbamin''ny fanatitra aidina momba ireo ary fanatitra hafa be dia be ho an''ny Isiraely rehetra. '
  '22':
  - type: text
    content: Ary nihinana sy nisotro tamin'ny fifaliana be teo anatrehan'i Jehovah ny olona tamin'izany andro izany. Ary nampanjakainy fanindroany Solomona, zanak'i Davida, sady nohosorany ho an'i Jehovah ho mpanapaka, ary Zadoka ho mpisorona.
  '23':
  - type: text
    content: 'Ary Solomona dia nipetraka tamin''ny seza fiandrianan''i Jehovah ho mpanjaka handimby an''i Davida rainy, sady nambinina izy, ka nanaiky azy ny Isiraely rehetra. '
  '24':
  - type: text
    content: 'Ary ny mpifehy rehetra sy ny lehilahy mahery ary ny zanak''i Davida rehetra koa dia samy nanaiky an''i Solomona mpanjaka. '
  '25':
  - type: text
    content: Ary Jehovah nanandratra an'i Solomona indrindra teo imason'ny Isiraely rehetra sady nanome azy voninahitry ny fiandrianana mihoatra noho ny mpanjaka rehetra talohany teo amin'ny Isiraely.
  '26':
  - type: text
    content: 'Toy izany no nanjakan''i Davida, zanak''i Jese, tamin''ny Isiraely rehetra. '
  '27':
  - type: text
    content: 'Ary ny andro nanjakany tamin''ny Isiraely dia efa-polo taona; tao Hebrona no nanjakany fito taona, ary tany Jerosalema no nanjakany telo amby telo-polo taona. '
  '28':
  - type: text
    content: Ary maty izy rehefa tratrantitra tsara sady lava andro ary be harena sy voninahitra
  - type: note
    content: Heb. voky andro sy harena ary voninahitra
  - type: text
    content: '; ary Solomona zanany no nanjaka nandimby azy. '
  '29':
  - type: text
    content: 'Ary ny tantaran''i Davida mpanjaka, na ny voalohany na ny farany, indro fa efa voasoratra ao amin''ny bokin''i Samoela mpahita sy ao amin''ny bokin''i Natana mpaminany ary ao amin''ny bokin''i Gada mpahita izany, '
  '3':
  - type: text
    content: 'Ary koa, noho ny fitiavako ny tranon''Andriamanitro dia omeko ho an''ny tranon''Andriamanitra, ho fanampin''ny zavatra rehetra novoriko hanaovana ny tempoly masina, izay volamena sy volafotsy ananako, '
  '30':
  - type: text
    content: mbamin'ny nanjakany rehetra sy ny heriny, ary izay niseho tamin'ny
  - type: note
    content: Heb. ny andro niseho taminy
  - type: text
    content: ' ary tamin''ny Isiraely sy tamin''ny fanjakana rehetra tamin''ny tany.'
  '4':
  - type: text
    content: 'dia talenta volamena telo arivo, volamena avy any Ofira, ary talenta volafotsy voadio fito arivo hapetaka amin''ny rindrin''ny isan-efi-trano, '
  '5':
  - type: text
    content: 'ny volamena hanaovana ny fanaka volamena ary ny volafotsy hanaovana ny fanaka volafotsy sy hanaovana ny fanaka volafotsy sy hanaovana ny asa samy hafa rehetra izay hataon''ny tanan''ny mpiasa mahay tao-zavatra. Iza ary no mazoto hitondra fanatitra ho an''i Jehovah anio? '
  '6':
  - type: text
    content: 'Dia samy nazoto nanatitra zavatra ny lohan''ny fianakaviana sy ny lehiben''ny firenen''Isiraely ary ny mpifehy arivo sy ny mpifehy zato mbamin''ny mpitandrina ny raharahan''ny mpanjaka '
  '7':
  - type: text
    content: ka nanome izay hanaovana ny fanompoana amin'ny tranon'Andriamanitra, dia talenta volamena dimy arivo sy darika
  - type: note
    content: Ny darika dia anaran'ny farantsakely volamena, ary tokony ho ariary dimy sy loso no heviny
  - type: text
    content: ' iray alina sy talenta volafotsy iray alina sy talenta varahina valo arivo amby iray alina ary talenta vy iray hetsy. '
  '8':
  - type: text
    content: 'Ary izay nanana vato soa dia nanome azy no amin''ny rakitry ny tranon''i Jehovah, hotehirizin''i Jehiela Gersonita. '
  '9':
  - type: text
    content: Dia faly ny vahoaka noho ny fahazotoan'ireo, fa tamin'ny fony rehetra no nahazotoany nanatitra ho an'i Jehovah; ary Davida mpanjaka koa faly dia faly.
