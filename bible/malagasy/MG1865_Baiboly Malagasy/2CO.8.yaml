document_id: 2CO.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny famorian-bola ho an'ny Kristiana malahelo tany Jodia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ampahafantarinay anareo, ry rahalahy, ny fahasoavan''Andriamanitra izay nomena tao amin''ny fiangonana any Makedonia; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: fa tamin'ny fahoriana be nizahan-toetra azy no nitomboan'ny hafaliany, ary ny hamafin
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr.halalin'
    marker-yv: yv-n
  - type: text
    text: '''ny fahantrany no nampitombo ny hitsim-pony'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fahafoizany'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa vavolombelona aho fa araka ny zakany, eny, mihoatra noho ny zakany aza, sady araka ny sitrapony ihany, no nanomezany, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sady nangataka mafy taminay koa izy mba havelanay hikambana amin''izany fanompoana ho an''ny olona masina izany; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary tsy araka ny nantenainay, fa ny tenany no natolony ho an''ny Tompo aloha, dia ho anay koa noho ny sitrapon''Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka dia nangataka an''i Titosy izahay mba hahatanteraka izany fahasoavana izany eo aminareo koa, araka ny efa nanombohany azy teo aloha. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa araka ny itomboanareo amin''ny zavatra rehetra, na amin''ny finoana, na amin''ny teny, na amin''ny fahalalana, na amin''ny fahazotoana rehetra, na amin''ny fitiavanareo anay, dia aoka ho araka izany koa no hitomboanareo amin''izao fahasoavana izao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy milaza izany ho didy aho, fa noho ny zotom-pon''ny sasany, mba hizaha toetra ny hamarinan''ny fitiavanareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa fantatrareo ny fahasoavan''i Jesosy Kristy Tompontsika, fa na dia nanan-karena aza Izy, dia tonga malahelo noho ny aminareo, mba hampanan-karena anareo ny alahelony. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary dia ambarako izay hevitro ny amin''izany, fa mahatsara anareo izany, satria tsy ny fanaovana ihany, fa ny fikasana koa aza dia efa natombokareo teo alohan''ny sasany hatry ny taon-itsy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ataovy tanteraka ary izany, ka tahaka ny nahazotoanareo fony nikasa, dia aoka ho tahaka izany koa ny hahatanterahanareo azy araka izay ananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha misy ny fahazotoana, dia araka izay ananany no ankasitrahana, fa tsy araka izay tsy ananany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanefa tsy ny hahatonga fitsaharana amin''ny sasany ary fahoriana aminareo no anaovako izany, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa ny mba hisy fitoviana, ka amin''izao ankehitriny izao ny haben''ny harenareo no hahafaka ny alahelon''ireo, ary ny haben''ny haren''ireo kosa no hahafaka ny alahelonareo, mba hisy fitoviana, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'araka ny voasoratra hoe: Ny nanangona be tsy nanana amby, ary ny nanangona kely tsy nanana ny tsy ampy (Eks. 16. 18). '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa isaorana anie Andriamanitra, Izay manome fahazotoana ho ao am-pon''i Titosy ho anareo mitovy amin''ny ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa nanaiky ny fangatahanay ihany izy, nefa nazoto rahateo, ka sitrapony ihany no nandehanany nankany aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ilay rahalahy izay nalaza amin''ny filazantsara any amin''ny fiangonana rehetra no nirahinay hiaraka aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ary tsy izany ihany, fa efa notendren
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nofidina tamin''ny fananganan-tanana'
    marker-yv: yv-n
  - type: text
    text: '''ny fiangonana koa izy ho namanay hiara-mandeha aminay hitondra izao fahasoavana izao, izay angoninay'
  - type: usfm
    marker: x
    children:
    - type: text
      text: ataonay amin'ny fanompoanay
    marker-yv: yv-n
  - type: text
    text: ' ho voninahitry ny Tompo sy ho vavolombelon''ny fahazotoanay. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary mitandrina izahay mba tsy hisy hanome tsiny anay amin''izao harena be angoninay izao; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'fa miomana hanao izay mahamendrika izahay, tsy eo imason''ny Tompo ihany, fa eny imason''ny olona koa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nirahinay niaraka tamin''ireo ilay rahalahinay izay efa hitanay mazoto matetika amin''ny zavatra maro; fa ankehitriny mazoto kokoa izy noho ny haben''ny fahatokiany anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha ny amin'i Titosy, dia namako izy sady mpiara-miasa amiko ho anareo; ary ireo rahalahinay, dia iraky
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr.apostoly
    marker-yv: yv-n
  - type: text
    text: ' ny fiangonana izy sady voninahitr''i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa amin'izany asehoy aminy eo imason'ny fiangonana ny famantarana mahamarina ny fitiavanareo sy ny reharehanay ny aminareo.
