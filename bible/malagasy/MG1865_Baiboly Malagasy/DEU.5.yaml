document_id: DEU.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny Didy Folo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Mosesy niantso ny Isiraely rehetra ka nanao taminy hoe: Ry Isiraely ô, mihainoa ny didy sy ny fitsipika izay lazaiko eto anatrehanareo anio, ka ianaro ireo, sy mitandrema mba hankatò azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jehovah Andriamanitsika nanao fanekena tamintsika tany Horeba; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy tamin''ny razantsika no nanaovan''i Jehovah izany fanekena izany, fa tamintsika, dia isika rehetra izay samy mbola velona eto anio. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Niteny nifanatrika taminareo Jehovah tao an-tendrombohitra, tao amin''ny afo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izaho nitsangana teo anelanelan''i Jehovah sy ianareo tamin''izany andro izany, hanambara aminareo ny tenin''i Jehovah, fa natahotra noho ny fahitana ny afo ianareo ka tsy niakatra tao amin''ny tendrombohitra, ka hoy Izy: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izaho no Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aza manana andriamani-kafa, fa Izaho ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza manao sarin-javatra voasokitra ho anao, na ny mety ho endriky ny zavatra any amin''ny lanitra ambony, na izay etỳ amin''ny tany ambany, na izay any amin''ny rano ambanin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza miankohoka eo anatrehany, ary aza manompo azy; fa Izaho, Jehovah Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin''ny zanaka hatramin''ny zafiafy sy ny zafindohalika, dia amin''izay mankahala Ahy, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: nefa kosa mamindra fo amin'ny olona arivo mandimby, izay tia Ahy ka mitandrina ny didiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aza manonona foana ny anaran''i Jehovah Andriamanitrao; fa tsy hataon''i Jehovah ho tsy manan-tsiny izay manonona foana ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mitandrema ny andro Sabata hanamasima azy, araka izay nandidian''i Jehovah Andriamanitrao anao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa Sabatan''i Jehovah Andriamanitrao ny andro fahafito; koa aza manao raharaha akory ianao amin''izany, na ny zanakao-lahy, na ny zanakao-vavy, na ny ankizilahinao, na ny ankizivavinao, na ny ombinao, na ny borikinao, na ny biby fiompinao rehetra, na ny vahininao izay tafiditra eo am-bavahadinao; mba hitsaharan''ny ankizilahinao sy ny ankizivavinao tahaka anao koa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tsarovy fa andevo tany amin''ny tany Egypta ianao, ka tanana mahery sy sandry nahinjitra no nitondran''i Jehovah Andriamanitrao anao nivoaka avy tany; izany no nandidian''i Jehovah Andriamanitrao anao hitandrina ny andro Sabata. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manajà ny rainao sy ny reninao, araka izay nandidian'i Jehovah Andriamanitrao anao, mba ho maro andro ianao, ary mba hahita soa any amin'ny tany izay omen'i Jehovah Andriamanitrao ho anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aza mamono olona. Ary aza mijangajanga. Ary aza mangalatra. Ary aza mety ho vavolombelona mandainga hanameloka ny namanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary aza mitsiriritra ny vadin'ny namanao; ary aza mitsiriritra ny tranon'ny namanao, na ny taniny, na ny ankizilahiny, na ny ankizivaviny, na ny ombiny, na ny borikiny, na izay mety ho an'ny namanao akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireo teny ireo no nolazain'i Jehovah tamin'ny feo mahery tao amin'ny afo sy ny rahona ary ny aizim-pito, raha nivory tany an-tendrombohitra ianareo, ka dia tsy nampiany intsony; ary nosoratany tamin'ny vato fisaka roa ireo ka natolony ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary rehefa renareo ny feo avy tao amin'ny aizina, raha nirehitra afo ny tendrombohitra, dia nanatona ahy ianareo, dia ny loham-pirenenareo rehetra sy ny loholonareo,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ka hoy ianareo: Indro, efa nampahitain''i Jehovah Andriamanitsika ny voninahiny sy ny fahalehibiazany isika, ary efa rentsika ny feony avy tao amin''ny afo; koa efa hitantsika androany fa Andriamanitra miteny amin''ny olona, nefa velona ihany izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa ankehitriny, nahoana no ho faty izahay? fa handevona anay io afo lehibe io; raha mbola mandre ny feon''i Jehovah Andriamanitsika indray izahay, dia ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa iza moa tamin''ny nofo rehetra no efa nandre ny feon''Andriamanitra velona niteny tao afovoan''ny afo, tahaka antsika, ka velona ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Manatòna ianao, ka mihainoa izay rehetra holazain''i Jehovah Andriamanitsika; ary ianao no aoka hilaza aminay izay rehetra holazain''i Jehovah Andriamanitsika aminao, dia hohenoinay ka harahinay izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Jehovah nandre ny teninareo, raha niteny tamiko ianareo, ka hoy Izy tamiko: Efa reko ny tenin''ireo olona ireo, izay nolazainy taminao, ka tsara izay rehetra nolazainy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Enga anie ka mba hanana fo toy izany izy hatahorany Ahy sy hitandremany ny didiko rehetra mandrakariva, mba hahita soa izy sy ny taranany mandrakizay '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mandehana, ka lazao aminy hoe: Miverena any an-dainareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa ianao kosa dia mijanòna eto anilako, ka holazaiko aminao ny lalàna rehetra sy ny didy ary ny fitsipika, izay hampianarinao azy mba harahiny any amin''ny tany izay omeko azy ho lovany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa tandremo mba hanao araka izay efa nandidian''i Jehovah Andriamanitrareo anareo; aza mivily, na ho amin''ny ankavanana, na ho amin''ny ankavia; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: fa ny lalana rehetra izay nandidian'i Jehovah Andriamanitrareo anareo no halehanareo, mba ho velona ianareo ka hahita soa, ary ho maro andro any amin'ny tany izay holovanareo.
