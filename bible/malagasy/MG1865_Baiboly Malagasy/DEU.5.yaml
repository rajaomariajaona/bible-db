document_id: DEU.5,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny Didy Folo
  - type: text
    content: 'Ary Mosesy niantso ny Isiraely rehetra ka nanao taminy hoe: Ry Isiraely ô, mihainoa ny didy sy ny fitsipika izay lazaiko eto anatrehanareo anio, ka ianaro ireo, sy mitandrema mba hankatò azy.'
  '10':
  - type: text
    content: nefa kosa mamindra fo amin'ny olona arivo mandimby, izay tia Ahy ka mitandrina ny didiko.
  '11':
  - type: text
    content: 'Aza manonona foana ny anaran''i Jehovah Andriamanitrao; fa tsy hataon''i Jehovah ho tsy manan-tsiny izay manonona foana ny anarany. '
  '12':
  - type: text
    content: 'Mitandrema ny andro Sabata hanamasima azy, araka izay nandidian''i Jehovah Andriamanitrao anao. '
  '13':
  - type: text
    content: 'Henemana no hiasanao sy hanaovanao ny raharahanao rehetra. '
  '14':
  - type: text
    content: 'Fa Sabatan''i Jehovah Andriamanitrao ny andro fahafito; koa aza manao raharaha akory ianao amin''izany, na ny zanakao-lahy, na ny zanakao-vavy, na ny ankizilahinao, na ny ankizivavinao, na ny ombinao, na ny borikinao, na ny biby fiompinao rehetra, na ny vahininao izay tafiditra eo am-bavahadinao; mba hitsaharan''ny ankizilahinao sy ny ankizivavinao tahaka anao koa. '
  '15':
  - type: text
    content: 'Ary tsarovy fa andevo tany amin''ny tany Egypta ianao, ka tanana mahery sy sandry nahinjitra no nitondran''i Jehovah Andriamanitrao anao nivoaka avy tany; izany no nandidian''i Jehovah Andriamanitrao anao hitandrina ny andro Sabata. '
  '16':
  - type: text
    content: Manajà ny rainao sy ny reninao, araka izay nandidian'i Jehovah Andriamanitrao anao, mba ho maro andro ianao, ary mba hahita soa any amin'ny tany izay omen'i Jehovah Andriamanitrao ho anao.
  '17':
  - type: text
    content: Aza mamono olona. Ary aza mijangajanga. Ary aza mangalatra. Ary aza mety ho vavolombelona mandainga hanameloka ny namanao.
  '18':
  - type: text
    content: Ary aza mitsiriritra ny vadin'ny namanao; ary aza mitsiriritra ny tranon'ny namanao, na ny taniny, na ny ankizilahiny, na ny ankizivaviny, na ny ombiny, na ny borikiny, na izay mety ho an'ny namanao akory aza.
  '19':
  - type: text
    content: Ireo teny ireo no nolazain'i Jehovah tamin'ny feo mahery tao amin'ny afo sy ny rahona ary ny aizim-pito, raha nivory tany an-tendrombohitra ianareo, ka dia tsy nampiany intsony; ary nosoratany tamin'ny vato fisaka roa ireo ka natolony ahy.
  '2':
  - type: text
    content: 'Jehovah Andriamanitsika nanao fanekena tamintsika tany Horeba; '
  '20':
  - type: text
    content: Ary rehefa renareo ny feo avy tao amin'ny aizina, raha nirehitra afo ny tendrombohitra, dia nanatona ahy ianareo, dia ny loham-pirenenareo rehetra sy ny loholonareo,
  '21':
  - type: text
    content: 'ka hoy ianareo: Indro, efa nampahitain''i Jehovah Andriamanitsika ny voninahiny sy ny fahalehibiazany isika, ary efa rentsika ny feony avy tao amin''ny afo; koa efa hitantsika androany fa Andriamanitra miteny amin''ny olona, nefa velona ihany izy.'
  '22':
  - type: text
    content: 'Koa ankehitriny, nahoana no ho faty izahay? fa handevona anay io afo lehibe io; raha mbola mandre ny feon''i Jehovah Andriamanitsika indray izahay, dia ho faty. '
  '23':
  - type: text
    content: 'Fa iza moa tamin''ny nofo rehetra no efa nandre ny feon''Andriamanitra velona niteny tao afovoan''ny afo, tahaka antsika, ka velona ihany? '
  '24':
  - type: text
    content: 'Manatòna ianao, ka mihainoa izay rehetra holazain''i Jehovah Andriamanitsika; ary ianao no aoka hilaza aminay izay rehetra holazain''i Jehovah Andriamanitsika aminao, dia hohenoinay ka harahinay izany. '
  '25':
  - type: text
    content: 'Ary Jehovah nandre ny teninareo, raha niteny tamiko ianareo, ka hoy Izy tamiko: Efa reko ny tenin''ireo olona ireo, izay nolazainy taminao, ka tsara izay rehetra nolazainy. '
  '26':
  - type: text
    content: 'Enga anie ka mba hanana fo toy izany izy hatahorany Ahy sy hitandremany ny didiko rehetra mandrakariva, mba hahita soa izy sy ny taranany mandrakizay '
  '27':
  - type: text
    content: 'Mandehana, ka lazao aminy hoe: Miverena any an-dainareo ianareo. '
  '28':
  - type: text
    content: 'Fa ianao kosa dia mijanòna eto anilako, ka holazaiko aminao ny lalàna rehetra sy ny didy ary ny fitsipika, izay hampianarinao azy mba harahiny any amin''ny tany izay omeko azy ho lovany. '
  '29':
  - type: text
    content: 'Koa tandremo mba hanao araka izay efa nandidian''i Jehovah Andriamanitrareo anareo; aza mivily, na ho amin''ny ankavanana, na ho amin''ny ankavia; '
  '3':
  - type: text
    content: 'tsy tamin''ny razantsika no nanaovan''i Jehovah izany fanekena izany, fa tamintsika, dia isika rehetra izay samy mbola velona eto anio. '
  '30':
  - type: text
    content: fa ny lalana rehetra izay nandidian'i Jehovah Andriamanitrareo anareo no halehanareo, mba ho velona ianareo ka hahita soa, ary ho maro andro any amin'ny tany izay holovanareo.
  '4':
  - type: text
    content: 'Niteny nifanatrika taminareo Jehovah tao an-tendrombohitra, tao amin''ny afo. '
  '5':
  - type: text
    content: 'Izaho nitsangana teo anelanelan''i Jehovah sy ianareo tamin''izany andro izany, hanambara aminareo ny tenin''i Jehovah, fa natahotra noho ny fahitana ny afo ianareo ka tsy niakatra tao amin''ny tendrombohitra, ka hoy Izy: '
  '6':
  - type: text
    content: 'Izaho no Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana. '
  '7':
  - type: text
    content: 'Aza manana andriamani-kafa, fa Izaho ihany. '
  '8':
  - type: text
    content: 'Aza manao sarin-javatra voasokitra ho anao, na ny mety ho endriky ny zavatra any amin''ny lanitra ambony, na izay etỳ amin''ny tany ambany, na izay any amin''ny rano ambanin''ny tany. '
  '9':
  - type: text
    content: 'Aza miankohoka eo anatrehany, ary aza manompo azy; fa Izaho, Jehovah Andriamanitrao, dia Andriamanitra saro-piaro ka mamaly ny heloky ny ray amin''ny zanaka hatramin''ny zafiafy sy ny zafindohalika, dia amin''izay mankahala Ahy, '
