document_id: ACT.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitsarana an'i Paoly teo anatrehan'i Feliksa, sy ny nifatorany roa taona tao Kaisaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa afaka hadimiana dia nidina Ananiasy mpisoronabe mbamin''ny loholona sasany sy Tertylo, mpandaha-teny anankiray, izay nanambara tamin''ny mpanapaka ny niampangany an''i Paoly. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa nantsoina izy, dia niampanga azy Tertylo ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hianao no ahazoanay fiadanana lehibe, ary ny fitondranao efa nampandry tsara ity firenena ity; koa raisinay amin''ny fankasitrahana mandrakariva eny tontolo eny izany, ry Feliksa tsara indrindra ô. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa mba tsy hanahirana anao ela loatra aho, trarantitra ianao, henoy kely amin''ny faharetana izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa io lehilahy io dia hitanay fa tena ratsy fanahy sady mpampikomy ny Jiosy rehetra eny tontolo eny, ary izy no tari-dalan''ilay antoko atao hoe Nazarena. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izy io koa nitady handoto ny tempoly; dia nosamborinay izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: ka tianay hotsaraina araka ny lalànay (7) Fa tonga Lysia, mpifehy arivo, dia nanao an-keriny ka naka azy teo an-tananay. Ary nasainy nankaty aminao ny mpiampanga azy'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary rehefa manadina azy ianao, dia ho fantatrao marina izay rehetra iampanganay azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny Jiosy koa dia nanaiky sy nilaza fa izany no izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa notondroin''ny mpanapaka hiteny Paoly, dia namaly ka nanao hoe: Fantatro fa ianao dia efa mpitsara ela tamin''ity firenena ity, ka dia faly aho handaha-teny hanala tsiny ny tenako; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fa azonao fantarina mora fa tsy mba mihoatra noho ny roa ambin''ny folo andro izay no niakarako hivavaka tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tsy nisy nahita ahy niady hevitra tamin''olona teo an-kianjan''ny tempoly na nampitabataba ny vahoaka tao amin''ny synagoga, na tao an-tanàna; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary tsy hainy hamarinina eto anatrehanao izay zavatra iampangany ahy ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa izao no ekeko aminao, fa araka ny fampianarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. lalàna
    marker-yv: yv-n
  - type: text
    text: ' izay ataony hoe fitokoana no anompoako an''Andriamanitry ny razako, sady inoako izay rehetra voasoratra eo amin''ny lalàna sy ny mpaminany, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary manantena amin''Andriamanitra aho, izay antenain''izy ireo koa, fa hisy fitsanganan''ny marina sy ny meloka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary amin''izany dia mikely aina koa aho mba hanana fieritreretana tsy manameloka ahy na amin''Andriamanitra na amin''olombelona mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nony afaka taona maro, dia tonga aho hitondra fiantrana sy fanatitra ho an''ny fireneko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary tamin''izay dia hitany voadio teo an-kianjan''ny tempoly aho, tsy tamin''ny olona maro anefa, na tamin''ny fitabatabana; fa nisy Jiosy sasany avy any Asia, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '- tokony hiseho eto anatrehanao ireo mba hiampanga ahy, raha tàhiny misy izay hiampangany ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Na aoka ireto olona ireto ihany no hilaza izay ratsy hitany raha nitsangana teo anatrehan''ny Synedriona aho, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'afa-tsy izao teny iray loha izao ihany, dia ilay nantsoiko raha nijanona teo afovoany aho hoe: Ny amin''ny fitsanganan''ny maty no itsarana ahy eto anatrehanareo anio. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary satria fantatr'i Feliksa tsaratsara kokoa ny amin'izany fampianarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. lalàna
    marker-yv: yv-n
  - type: text
    text: ' izany, dia nampandeha azy rehetra izy aloha ka nanao hoe: Rehefa tafidinay Lysia, mpifehy arivo, dia hofotorako tsara ny raharahanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izy nandidy ny kapiteny hiambina an''i Paoly sy hamela azy hitsangantsangana ary tsy handrara olona na dia iray akory aza amin''ny sakaizany izay ho avy hanompo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa afaka andro vitsivitsy, dia tonga Feliksa sy Drosila vadiny, vehivavy Jiosy, dia nampaka an''i Paoly izy ka nihaino azy nitory ny finoana an''i Kristy Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha nitory ny amin''ny fahamarinana sy ny fahononana ary ny fitsarana ho avy izy, dia raiki-tahotra Feliksa ka namaly hoe: Mandehana angaloha; fa raha malalaka, dia hampaka anao indray aho. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Sady nanantena koa izy fa homen'i Paoly vola; ka dia nampaka azy matetika izy ka niresaka taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary rehefa afaka roa taona, dia Porsio Festosy no nandimby an'i Feliksa; ary Feliksa ta-hahazo sitraka tamin'ny Jiosy, ka dia mbola navelany ho mpifatotra ihany Paoly.
