document_id: GEN.25,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'i Esao sy Jakoba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abrahama nampaka-bady indray, Ketora no anarany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ilay saha izay novinidin''i Abrahama tamin''ny taranak''i Heta; tao no nandevenana an''i Abrahama sy Saraha vadiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa maty Abrahama, dia notahin'Andriamanitra Isaka zanany; ary Isaka dia nonina teo akaikin'i Bera-lahai-roy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no taranak''Isimaela, zanakalahin''i Abrahama izay naterak''i Hagara, ilay Egyptiana, andevovavin''i Saraha, tamin''i Abrahama : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no anaran''ny zanakalahin''Isimaela, araka ny anarany sy araka ny taranany: Nebaiota, lahimatoan''Isimaela, sy Kedara sy Adbela sy Mibsama '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Misma sy Doma sy Masa '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Hadada sy Tema sy Jetora sy Nafisy ary Kedema. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy ireo no zanakalahin''Isimaela, ary ireo no anarany, araka ny vohiny sy ny tobiny, dia andriana roa ambin''ny folo araka ny fireneny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny andro niainan''Isimaela dia fito amby telo-polo amby zato taona; ary niala aina izy ka maty, dia voangona any amin''ny razany . '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny taranany nonina hatrany Havila ka hatrany Sora, izay tandrifin'i Egypta amin'ny lalana mankany Asyria; nifanandrify tamin'ny rahalahiny rehetra no nitoerany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no taranak''Isaka, zanakalahin''i Abrahama: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteraka an''i Zimrana sy Joksana sy Medana sy Midiana sy Jisbaka ary Soaha tamin''i Abrahama izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abrahama niteraka an''Isaka; ary efa-polo taona Isaka, raha nampakatra an-dRebeka, zanakavavin''i Betoela Syriana, avy tany Mesopotamia, sady anabavin''i Labana Syriana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Isaka nangataka tamin''i Jehovah ho an''ny vadiny, satria momba izy; ary nohenoin''i Jehovah ny fangatahany, dia nanan''anaka Rebeka vadiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifanosika ny zaza kambana tao an-kibony; ary hoy Rebeka: Raha izao, nahoana re aho no dia mbola velona? Dia lasa nanontany tamin''i Jehovah izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah taminy: Firenena roa no ao an-kibonao; ary vahoaka roa toko no hisaraka hatrao am-bohokanao; ary ny vahoaka iray toko hahery noho ny iray toko. Ka ny zokiny hanompo ny zandriny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga ny andro hahaterahany, indreo, nisy zaza kambana tao an-kibony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia teraka ny voalohany ka mena, ary tahaka ny kapôty volom-biby ny tenany rehetra; dia nataony hoe Esao ny anarany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka izany, dia teraka koa ny rahalahiny, ary ny tànany nihazona ny ombelahin-tongotr''i Esao, dia nataony hoe Jakoba ny anarany; ary efa enim-polo taona Isaka tamin''ny niterahana azy mirahalahy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitombo ireo zaza ireo; ary Esao lehilahy nahay nihaza, dia mpianefitra, fa Jakoba kosa lehilahy tsara fanahy sady mpitoetra an-day. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Isaka tia an''i Esao, satria nankafy ny hazany; fa Rebeka kosa tia an''i Jakoba. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nahandro hanina Jakoba; ary sendra avy tany an-tsaha Esao ka reraka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Joksana niteraka an''i Sheba sy Dedana. Ary ny zanakalahin''i Dedana dia Asorima sy Letosima ary Leomima. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Esao tamin''i Jakoba: Mba anomezo ahy hohaniko ny mena, dia io mena io, fa reraka aho (izany no nanaovana ny anarany hoe Edoma). '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jakoba: Amidio amiko ary aloha ny fizokianao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy kosa Esao: Indro, ho faty ihany aho; ka mahasoa inona izay fizokiana? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jakoba: Mianiana ary amiko aloha. Dia nianiana taminy izy; ka dia namidiny tamin''i Jakoba ny fizokiany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jakoba nanome an'i Esao mofo sy voanemba masaka; dia nihinana sy nisotro izy, ary niainga ka lasa nandeha. Izany no nanamavoan'i Esao ny fizokiany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zanakalahin'i Midiana dia Efaha sy Efera sy Hanoka sy Abida ary Eldaha. Ireo rehetra ireo no zanak'i Ketora.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natolotr''i Abrahama an''Isaka izay rehetra nananany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny zanak'ireo vaditsindranony hafa, izay nananan'i Abrahama, dia samy notolorany avy ka nampandehaniny, dieny mbola velona izy, hiala amin'Isaka zanany hiantsinanana ho any amin'ny tany atsinanana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny andro niainan''i Abrahama dia dimy amby fito-polo amby zato taona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niala aina Abrahama ka maty, rehefa fotsy volo tsara sady lahy antitra ela niainana; dia voangona any amin''ny razany izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalevin''Isaka sy Isimaela zanany izy tao amin''ny zohy ao Makpela, tao amin''ny sahan''i Efrona, zanak''i Zohara Hetita, izay tandrifin''i Mamre, '
