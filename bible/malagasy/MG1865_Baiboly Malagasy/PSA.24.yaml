document_id: PSA.24,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiomanana handray ny Mpanjakan'ny voninahitra
  - type: text
    content: 'Salamo nataon''i Davida. An''i Jehovah ny tany sy izay rehetra eo aminy. Izao rehetra izao sy ny mponina eo aminy. '
  '10':
  - type: text
    content: Iza ary izao Mpanjakan'ny voninahitra izao? Jehovah, Tompon'ny maro, Izy no Mpanjakan'ny voninahitra.
  '2':
  - type: text
    content: 'Fa Izy no nanorina azy tambonin''ny ranomasina. Tambonin''ny rano no nampitoerany azy. '
  '3':
  - type: text
    content: 'Iza no hiakatra any an-tendrombohitr''i Jehovah? ary iza no hitoetra ao amin''ny fitoerany masina? '
  '4':
  - type: text
    content: 'Izay madio tanana sy mahitsy fo, izay tsy manandratra ny fanahiny ho amin''ny lainga, na mianiana hamitaka. '
  '5':
  - type: text
    content: 'Handray fitahiana avy amin''i Jehovah izy, ary fahamarinana avy amin''Andriamanitry ny famonjena azy. '
  '6':
  - type: text
    content: Izany no taranaka mitady Azy, izay mitady ny tavanao, dia Jakoba
  - type: note
    content: 'Na: Izay mitady ny tavanao, ry Andriamanitr''i Jakoba'
  - type: text
    content: .
  '7':
  - type: text
    content: Asandrato ny lohanareo, ry vavahady, ary misandrata ianareo, ry varavarana fahagola
  - type: note
    content: 'Na: mandrakizay'
  - type: text
    content: ', mba hidiran''ny mpanjakan''ny voninahitra. '
  '8':
  - type: text
    content: 'Iza izao Mpanjakan''ny voninahitra izao? Jehovah mahery tsitoha, Jehovah mpiady mahery. '
  '9':
  - type: text
    content: 'Asandrato ny lohanareo, ry vavahady; ary manandrata ny lohanareo, ry varavarana fahagola,2 mba hidiran''ny Mpanjakan''ny voninahitra. '
