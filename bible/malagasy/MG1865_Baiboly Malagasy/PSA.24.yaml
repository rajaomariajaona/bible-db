document_id: PSA.24,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiomanana handray ny Mpanjakan'ny voninahitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Salamo nataon''i Davida. An''i Jehovah ny tany sy izay rehetra eo aminy. Izao rehetra izao sy ny mponina eo aminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Iza ary izao Mpanjakan'ny voninahitra izao? Jehovah, Tompon'ny maro, Izy no Mpanjakan'ny voninahitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa Izy no nanorina azy tambonin''ny ranomasina. Tambonin''ny rano no nampitoerany azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Iza no hiakatra any an-tendrombohitr''i Jehovah? ary iza no hitoetra ao amin''ny fitoerany masina? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izay madio tanana sy mahitsy fo, izay tsy manandratra ny fanahiny ho amin''ny lainga, na mianiana hamitaka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Handray fitahiana avy amin''i Jehovah izy, ary fahamarinana avy amin''Andriamanitry ny famonjena azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Izany no taranaka mitady Azy, izay mitady ny tavanao, dia Jakoba
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Izay mitady ny tavanao, ry Andriamanitr''i Jakoba'
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Asandrato ny lohanareo, ry vavahady, ary misandrata ianareo, ry varavarana fahagola
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mandrakizay'
      marker-yv: yv-n
    - type: text
      text: ', mba hidiran''ny mpanjakan''ny voninahitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Iza izao Mpanjakan''ny voninahitra izao? Jehovah mahery tsitoha, Jehovah mpiady mahery. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Asandrato ny lohanareo, ry vavahady; ary manandrata ny lohanareo, ry varavarana fahagola,2 mba hidiran''ny Mpanjakan''ny voninahitra. '
