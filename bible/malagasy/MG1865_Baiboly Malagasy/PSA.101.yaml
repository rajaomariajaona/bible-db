document_id: PSA.101
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fikasan'ny mpanjaka ny amin'ny hitondrany marina ny fanjakany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon'i Davida. Famindram-po sy fitsarana no hankalazaiko; Hianao, Jehovah ô, no hoderaiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hitandrina ny lalana marina aho; Rahoviana no ho tonga atỳ amiko Hianao? Handeha amin''ny fahitsian''ny foko ao anatin''ny tranoko aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy hampitoetra zava-dratsy eo anoloan''ny masoko aho; Halako ny mivadika, Tsy hikambana amiko izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fo maditra hiala amiko; Tsy hankasitraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hahalala
    marker-yv: yv-n
  - type: text
    text: ' iza ratsy aho, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay manendrikendrika ny namany mangingina dia hofongorako; Tsy tohako izay miandranandrana sy miavonavona am-po; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny masoko hijery izay olo-mahatoky amin''ny tany mba hitoerany ato amiko; Izay mandeha amin''ny lalana marina no hanompo ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy mba hitoetra ao anatin''ny tranoko izay manao fitaka; Tsy mba hijanona eo anoloan''ny masoko izay milaza lainga. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Haringako isa-maraina ny ratsy fanahy rehetra amin'ny tany, Mba hofongorako ny mpanao ratsy rehetra tsy ho ao an-tanànan'i Jehovah.
