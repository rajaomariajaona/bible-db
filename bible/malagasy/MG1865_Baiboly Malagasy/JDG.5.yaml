document_id: JDG.5,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fihirana nataon'i Debora noho ny nandresena an'i Sisera
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Debora sy Baraka, zanak''i Abinoama, dia nihira tamin''izany andro izany ka nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hianareo izay mitaingina borikivavy fotsy, ianareo izay mipetraka amin'ny lamba fitoerana, ary ianareo koa izay mandeha amin'ny lalana, samia milaza.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lavitra ny feon'ny mpandefa zana-tsipìka, dia eo amin'ny fantsakan-drano, no hiresahany ny asa marina nataon'i Jehovah, dia ny fahamarinany tamin'ny tany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tamin''ny fitondrany ny'
      marker-yv: yv-n
    - type: text
      text: ' Isily; Tamin''izany dia nidina ny olon''i Jehovah ho any am-bavahady.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifohaza, mifohaza, ry Debora; Mifohaza, mifohaza, ka mihirà! Mitsangana, ry Baraka; ento ny babonao, ry zanakalahin'i Abinoama.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin'izany dia nidina izay olo-malaza sisa mbamin'ny vahoaka, Jehovah nidina homba ahy koa hamely
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho isan'''
      marker-yv: yv-n
    - type: text
      text: ' ny olo-mahery.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny avy amin'i Efraima, izay miorina amin'i Amaleka, dia nomba anao teo amin'ny firenenao, ry Benjamina; Avy tany Makira no nidinan'ny mpanao lalàna, ary avy tamin'i Zebolona ireo mitana ny tehin'ny mpifehy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mpanoratra'
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny andrianan'Isakara niaraka tamin'i Debora, dia Isakara sy Baraka koa; Nampandehanina nanaraka azy any an-dohasaha izy. Lehibe ny fiheverana am-po teny amin'ny sakeli-dranon'i Robena!
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nahoana ianao no nitoetra teo anelanelan'ny vala, hihainoanao ny feon-tsodina any amin'ny ondry? Lehibe ny fiheverana am-po teny amin'ny sakeli-dranon'i Robena!
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gileada nitoetra tany an-dafin'i Jordana; Ary nahoana Dana no nitoetra tany an-tsambo? Asera nitoetra tany amoron-dranomasina, Ary teny amin'ny fitodiany no nipetrahany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zebolona dia firenena nanao tsinontsinona ny ainy, na dia ho faty aza, Ary Naftaly koa teo amin'ny fitoerana avo any an-tsaha.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tonga ireo mpanjaka ka niady, eny, niady tao Tanaka ireo mpanjakan'i Kanana, dia teo anilan'ny ranon'i Megido; Tsy nisy volafotsy azony ho babo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho ny fitarihan
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fitombadahin'''
      marker-yv: yv-n
    - type: text
      text: '''ny lehibe tamin''ny Isiraely sy ny fahazotoan''ny vahoaka nanolotena, dia miderà an''i Jehovah.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tany an-danitra no nisy ady: ny kintana tamin''ny nalehany niady tamin''i Sisera.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny ony Kisona nipaoka azy, Izany ony ela
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ony be ady'
      marker-yv: yv-n
    - type: text
      text: ' izany, dia ny ony Kisona. Mandrosoa amin-kery ianao, ry fanahiko!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin'izany dia nikatrokatroka ny kitron-tsoavaly noho ny fihazakazaka, dia ny fihazakazaky ny maheriny.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ozony Meroza, hoy Ilay Anjelin'i Jehovah, Ozony dia ozòny ny mponina ao, Satria tsy mba tonga hanampy an'i Jehovah izy, eny, tsy nanampy an'i Jehovah hamely
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: isan'''
      marker-yv: yv-n
    - type: text
      text: ' ny mahery.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hotahina mihoatra noho ny vehivavy anie Jaela, vadin'i Hebera Kenita; Eny, hotahina mihoatra noho ny vehivavy mitoetra an-day anie izy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rano no nangatahin-dralehilahy, fa ronono aza no nomeny azy; Teo an-dovian'andriana no nitondrany rononomandry.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tànany nandray ny tsima-day, Ary ny tànany ankavanana nandray ny tantanan'ny mpiasa, dia namely an'i Sisera tamin'ny tantanana izy ka nahavoa ny lohany; Namely mafy izy, dia nahaboroaka ny fihirifany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Teo amin'ny tongo-dravehivavy no niondrehany nahalavoany niamparany, eny, teo amin'ny tongony no niondrehany nahalavoany teo amin'izay niondrehany no niamparan'ny fatiny.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao amin''ny varavarankely no nitsirihan''ny renin''i Sisera ka niantsoantsoany mafy; Eny, niantso tao amin''ny makarakara izy hoe: Nahoana no ela izato kalesiny vao tonga? Nahoana no mitaredretra ny kodian''ny kalesiny?'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay hendry tamin''ny andriambaviny no namaly azy, eny, ny tenany aza namaly hoe:'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandrenesa ianareo, ry mpanjaka, mihainoa ianareo, ry mpanapaka! Izaho indrindra no hihira ho an'i Jehovah; hankalaza an'i Jehovah, Andriamanitry ny Isiraely, aho.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy efa mahita va izy? Tsy mizara babo va izy? Dia zazavavy iray na roa ho an'ny isan-dahy, Ary lamba samy hafa volo ho babon'i Sisera, Lamba roa samy hafa soratra ho eo am-bozon'ny nahazo babo.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho levona tahaka izany anie ny fahavalonao rehetra, Jehovah ô; Fa aoka izay tia Azy kosa ho tahaka ny masoandro, raha miposaka amin'ny heriny izy. Dia nandry ny tany efa-polo taona.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah ô, fony nivoaka avy tany
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. tamin'ny saha
      marker-yv: yv-n
    - type: text
      text: ' Seïra Hianao ary nandeha avy tany amin''ny tany Edoma, dia nihorohoro ny tany, ary ny lanitra koa nitete; Eny, ny rahona matevina nitete rano.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tendrombohitra niempo teo anatrehan'i Jehovah. Eny, na dia iry Sinay iry aza teo anatrehan'i Jehovah, Andriamanitry ny Isiraely.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin'ny andron'i Samgara, zanak'i Anata, sy tamin'ny andron'i Jaela dia tsy nodiavina ny lalambe, fa ny sakeli-dalana mivilivily no nalehan'ny mpandeha.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lao ny tany an-tsaha; eny, lao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Tsy nisy mpanapaka; eny nitsahatra'
      marker-yv: yv-n
    - type: text
      text: ' tamin''ny Isiraely izany, Mandra-pitsangako, izaho Debora, eny, mandra-pitsangako ho reny teo amin''ny Isiraely.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nifidy andriamani-baovao ny olona, Ary tamin'izay dia nisy ady hatrany am-bavahady. Moa nisy ampinga na lefona na dia iray akory aza hita va teo amin'ny olona efatra alina tamin'ny Isiraely?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny foko mankasitraka ny mpanapaka amin'ny Isiraely, izay nazoto nanolo-tena teo amin'ny vahoaka, miderà an'i Jehovah ianareo.
