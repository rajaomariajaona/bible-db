document_id: PSA.96,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fifaliana noho ny hihavian'ny fanjakan'Andriamanitra
  - type: text
    content: 'Mihira fihiram-baovao ho an''i Jehovah; Mihirà ho an''i Jehovah ry tany rehetra. '
  '10':
  - type: text
    content: Lazao any amin'ny jentilisa fa Jehovah no Mpanjaka; Ary izao rehetra izao voaorina ka tsy hihetsika; Hitsara ny olona amin'ny fahamarinana Izy.
  '11':
  - type: text
    content: 'Aoka ho faly ny lanitra ary ho ravoravo ny tany; Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy. '
  '12':
  - type: text
    content: 'Aoka ho faly ny saha sy izay rehetra eo aminy; Dia hihoby amin''izay ny hazo rehetra any an''ala '
  '13':
  - type: text
    content: Eo anatrehan'i Jehovah, fa avy Izy, Eny, avy hitsara ny tany Izy; Hitsara izao tontolo izao araka ny rariny Izy Ary ny firenena amin'ny fahamarinany.
  '2':
  - type: text
    content: 'Mihirà ho an''i Jehovah, misaora ny anarany; Lazao isan''andro isan''andro ny famonjeny mahafaly. '
  '3':
  - type: text
    content: Ambarao any amin'ny jentilisa ny voninahiny Ary any amin'ny firenena rehetra ny fahagagana ataony.
  '4':
  - type: text
    content: 'Fa lehibe Jehovah ka mendrika hoderaina indrindra, Sady mahatahotra, fa ambonin''ny Andriamanitra rehetra. '
  '5':
  - type: text
    content: 'Fa ny andriamanitry ny firenena dia tsinontsinona; Fa Jehovah no nanao ny lanitra. '
  '6':
  - type: text
    content: 'Famirapiratana sy voninahitra no eo anatrehany; Hery sy fahatsaran-tarehy no ao amin''ny fitoerany masina. '
  '7':
  - type: text
    content: 'Ry firenena, manomeza an''i Jehovah, Eny, manomeza voninahitra sy hery ho an i Jehovah. '
  '8':
  - type: text
    content: 'Manomeza an''i Jehovah ny voninahitry ny anarany; Mitondrà fanatitra, ka mankanesa eo an-kianjany. '
  '9':
  - type: text
    content: 'Miankohofa eo anatrehan''i Jehovah amin''ny fihaingoana masina; Mangovita eo anatrehany, ry tany rehetra. '
