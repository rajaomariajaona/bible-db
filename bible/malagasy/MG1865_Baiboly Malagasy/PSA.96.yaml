document_id: PSA.96
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hira fifaliana noho ny hihavian'ny fanjakan'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mihira fihiram-baovao ho an''i Jehovah; Mihirà ho an''i Jehovah ry tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mihirà ho an''i Jehovah, misaora ny anarany; Lazao isan''andro isan''andro ny famonjeny mahafaly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ambarao any amin'ny jentilisa ny voninahiny Ary any amin'ny firenena rehetra ny fahagagana ataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa lehibe Jehovah ka mendrika hoderaina indrindra, Sady mahatahotra, fa ambonin''ny Andriamanitra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny andriamanitry ny firenena dia tsinontsinona; Fa Jehovah no nanao ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Famirapiratana sy voninahitra no eo anatrehany; Hery sy fahatsaran-tarehy no ao amin''ny fitoerany masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ry firenena, manomeza an''i Jehovah, Eny, manomeza voninahitra sy hery ho an i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Manomeza an''i Jehovah ny voninahitry ny anarany; Mitondrà fanatitra, ka mankanesa eo an-kianjany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Miankohofa eo anatrehan''i Jehovah amin''ny fihaingoana masina; Mangovita eo anatrehany, ry tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lazao any amin'ny jentilisa fa Jehovah no Mpanjaka; Ary izao rehetra izao voaorina ka tsy hihetsika; Hitsara ny olona amin'ny fahamarinana Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aoka ho faly ny lanitra ary ho ravoravo ny tany; Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aoka ho faly ny saha sy izay rehetra eo aminy; Dia hihoby amin''izay ny hazo rehetra any an''ala '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eo anatrehan'i Jehovah, fa avy Izy, Eny, avy hitsara ny tany Izy; Hitsara izao tontolo izao araka ny rariny Izy Ary ny firenena amin'ny fahamarinany.
