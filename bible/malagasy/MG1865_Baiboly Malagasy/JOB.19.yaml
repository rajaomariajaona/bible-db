document_id: JOB.19,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin'i Joba
  - type: text
    content: 'Dia namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Efa nandrava ahy manodidina Izy, ka efa ho faty aho; Ary efa nofongorany tahaka ny hazo ny fanantenako.
  '11':
  - type: text
    content: Dia nampirehetiny tamiko ny fahatezerany, ka nataony ho fahavalony aho.
  '12':
  - type: text
    content: Miara-mandroso ny antokon'ny miaramilany ary manandratra tovon-tany hamelezany ahy izy ka mitoby manodidina ny laiko.
  '13':
  - type: text
    content: Ny rahalahiko efa nampanalaviriny ahy; Ary ny olona nahazatra ahy efa nihafahafa tamiko avokoa.
  '14':
  - type: text
    content: Efa tsy misy eto intsony ny havako, ary ny sakaizako efa nanadino ahy.
  '15':
  - type: text
    content: Ny vahiny izay mitoetra ao an-tranoko sy ny ankizivaviko aza samy manao ahy ho olon-kafa; Tonga olon-ko azy eo imasony aho.
  '16':
  - type: text
    content: Antsoiko ny mpanompoko, nefa tsy namaly ahy izy; Mifona aminy amin'ny vavako aho.
  '17':
  - type: text
    content: Ny fofonaiko mahaloiloy ny vadiko, ary maharikoriko ny zanak'ineny aho.
  '18':
  - type: text
    content: Eny, ny ankizilahy madinika aza mamingavinga ahy; Raha te-hitsangana aho, dia miteny mamely ahy ireny.
  '19':
  - type: text
    content: Na dia izay nifankazatra tamiko indrindra aza dia manao ahy ho zava-betaveta, ary izay olon-tiako dia mivadika ho fahavaloko.
  '2':
  - type: text
    content: Mandra-pahoviana no hampalahelovanareo ny fanahiko sy hanorotoroanareo ahy amin'ny fiteny?
  '20':
  - type: text
    content: Ny taolako miraikitra amin'ny hoditro sy ny nofoko, ary ny akanjo-nifiko ihany no hany sisa azoko enti-mandositra.
  '21':
  - type: text
    content: Mamindrà fo amiko, mamindrà fo amiko ianareo, ry sakaizako ô; fa ny tànan'Andriamanitra efa mikasika ahy.
  '22':
  - type: text
    content: Nahoana no manenjika ahy tahaka an'Andriamanitra koa ianareo ka tsy mety afa-po amin'ny nofoko?
  '23':
  - type: text
    content: Enga anie ka ho voasoratra ny teniko! Enga anie ka ho voatomboka eo amin'ny boky ireny!
  '24':
  - type: text
    content: Enga anie ka ho voasoratra amin'ny vy fanoratana sady voasy firaka eo amin'ny vatolampy ho mandrakizay izy!
  '25':
  - type: text
    content: Kanefa raha izaho, dia fantatro fa velona ny Mpanavotra
  - type: note
    content: Heb. Goela
  - type: text
    content: ' ahy, ka hitsangana any am-parany'
  - type: note
    content: 'Na: ho farany'
  - type: text
    content: ' eo ambonin''ny vovoka Izy.'
  '26':
  - type: text
    content: Ary rehefa levona ny hoditro, izao simba izao, sady afaka amin'ny nofoko aho, dia hahita an'Andriamanitra
  - type: note
    content: 'Na: Dia hahita an''Andriamanitra amin''ny nofoko aho'
  - type: text
    content: ;
  '27':
  - type: text
    content: Eny, izaho no hahita Azy, ary ny masoko no hijery, fa tsy olon-kafa. Efa matim-paniriana ny saiko
  - type: note
    content: Heb. voako
  - type: text
    content: ' ato anatiko.'
  '28':
  - type: text
    content: 'Raha hoy ianareo: Andeha hanenjika azy fatratra isika. Fa hita ao anatiny'
  - type: note
    content: Heb. anatiko
  - type: text
    content: ' ny fototry ny mahameloka azy'
  - type: note
    content: Heb. ahy
  - type: text
    content: .
  '29':
  - type: text
    content: Dia matahora ny sabatra ianareo; Fa ny fahatezerana dia heloka mendrika ny hovalian-tsabatra, mba ho fantatrareo fa misy fitsarana.
  '3':
  - type: text
    content: Efa im-polo izay no nanaratsianareo ahy; Tsy misoroka izay hampahory ahy ianareo.
  '4':
  - type: text
    content: Ary raha diso tokoa aho, dia izaho ihany no andrian'ny fa hadisoako.
  '5':
  - type: text
    content: Raha mirehareha amiko kosa ianareo ka mampiaiky ahy ho nanao izay mahamenatra,
  '6':
  - type: text
    content: Dia aoka ho fantatrareo fa Andriamanitra no efa nampitanondrika ahy ka efa naningotra ahy tamin'ny fandrika haratony.
  '7':
  - type: text
    content: 'Indro, miantso mafy aho hoe: Loza! nefa tsy misy mamaly ahy; Mitaraina aho, nefa tsy mahita rariny.'
  '8':
  - type: text
    content: Ny lalako dia nofefeny, ka tsy afa-mandroso aho; ary nasiany maizina teo amin'ny lalana alehako.
  '9':
  - type: text
    content: Ny voninahitro nalany tamiko, ary nesoriny ny satro-boninahitra teo an-dohako.
