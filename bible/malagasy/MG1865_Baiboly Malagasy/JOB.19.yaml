document_id: JOB.19,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny navalin'i Joba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dia namaly Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Efa nandrava ahy manodidina Izy, ka efa ho faty aho; Ary efa nofongorany tahaka ny hazo ny fanantenako.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia nampirehetiny tamiko ny fahatezerany, ka nataony ho fahavalony aho.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Miara-mandroso ny antokon'ny miaramilany ary manandratra tovon-tany hamelezany ahy izy ka mitoby manodidina ny laiko.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny rahalahiko efa nampanalaviriny ahy; Ary ny olona nahazatra ahy efa nihafahafa tamiko avokoa.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Efa tsy misy eto intsony ny havako, ary ny sakaizako efa nanadino ahy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny vahiny izay mitoetra ao an-tranoko sy ny ankizivaviko aza samy manao ahy ho olon-kafa; Tonga olon-ko azy eo imasony aho.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Antsoiko ny mpanompoko, nefa tsy namaly ahy izy; Mifona aminy amin'ny vavako aho.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny fofonaiko mahaloiloy ny vadiko, ary maharikoriko ny zanak'ineny aho.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Eny, ny ankizilahy madinika aza mamingavinga ahy; Raha te-hitsangana aho, dia miteny mamely ahy ireny.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Na dia izay nifankazatra tamiko indrindra aza dia manao ahy ho zava-betaveta, ary izay olon-tiako dia mivadika ho fahavaloko.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mandra-pahoviana no hampalahelovanareo ny fanahiko sy hanorotoroanareo ahy amin'ny fiteny?
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny taolako miraikitra amin'ny hoditro sy ny nofoko, ary ny akanjo-nifiko ihany no hany sisa azoko enti-mandositra.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mamindrà fo amiko, mamindrà fo amiko ianareo, ry sakaizako ô; fa ny tànan'Andriamanitra efa mikasika ahy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nahoana no manenjika ahy tahaka an'Andriamanitra koa ianareo ka tsy mety afa-po amin'ny nofoko?
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Enga anie ka ho voasoratra ny teniko! Enga anie ka ho voatomboka eo amin'ny boky ireny!
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Enga anie ka ho voasoratra amin'ny vy fanoratana sady voasy firaka eo amin'ny vatolampy ho mandrakizay izy!
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Kanefa raha izaho, dia fantatro fa velona ny Mpanavotra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Goela
      marker-yv: yv-n
    - type: text
      text: ' ahy, ka hitsangana any am-parany'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho farany'
      marker-yv: yv-n
    - type: text
      text: ' eo ambonin''ny vovoka Izy.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary rehefa levona ny hoditro, izao simba izao, sady afaka amin'ny nofoko aho, dia hahita an'Andriamanitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Dia hahita an''Andriamanitra amin''ny nofoko aho'
      marker-yv: yv-n
    - type: text
      text: ;
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Eny, izaho no hahita Azy, ary ny masoko no hijery, fa tsy olon-kafa. Efa matim-paniriana ny saiko
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. voako
      marker-yv: yv-n
    - type: text
      text: ' ato anatiko.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Raha hoy ianareo: Andeha hanenjika azy fatratra isika. Fa hita ao anatiny'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. anatiko
      marker-yv: yv-n
    - type: text
      text: ' ny fototry ny mahameloka azy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ahy
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Dia matahora ny sabatra ianareo; Fa ny fahatezerana dia heloka mendrika ny hovalian-tsabatra, mba ho fantatrareo fa misy fitsarana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Efa im-polo izay no nanaratsianareo ahy; Tsy misoroka izay hampahory ahy ianareo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary raha diso tokoa aho, dia izaho ihany no andrian'ny fa hadisoako.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha mirehareha amiko kosa ianareo ka mampiaiky ahy ho nanao izay mahamenatra,
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dia aoka ho fantatrareo fa Andriamanitra no efa nampitanondrika ahy ka efa naningotra ahy tamin'ny fandrika haratony.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Indro, miantso mafy aho hoe: Loza! nefa tsy misy mamaly ahy; Mitaraina aho, nefa tsy mahita rariny.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny lalako dia nofefeny, ka tsy afa-mandroso aho; ary nasiany maizina teo amin'ny lalana alehako.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny voninahitro nalany tamiko, ary nesoriny ny satro-boninahitra teo an-dohako.
