document_id: PSA.133,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mahatsara ny fifankatiavana
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Nataon''i Davida. Endrey, tsara sady mahafinaritra Raha ny mpirahalahy no miara-monina '
  '2':
  - type: text
    content: Tahaka ny diloilo tsara amin'ny loha, Izay mitsororoka amin'ny somotra, dia ny somotr'i Arona, Izay mitsororoka amin'ny moron-tongotr'akanjony
  - type: note
    content: 'Na: vozon''akanjony'
  - type: text
    content: '; '
  '3':
  - type: text
    content: Tahaka ny ando any Hermona, izay milatsaka amin'ny tendrombohitra Ziona; Fa voadidin'i Jehovah ho eo ny fitahiana, Dia fiainana ho mandrakizay.
