  marker: s1
  children:
  - type: text
    text: Ny mahatsara ny fifankatiavana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fihirana misy hevitra ambaratonga'
    marker-yv: yv-n
  - type: text
    text: '. Nataon''i Davida. Endrey, tsara sady mahafinaritra Raha ny mpirahalahy no miara-monina '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tahaka ny diloilo tsara amin'ny loha, Izay mitsororoka amin'ny somotra, dia ny somotr'i Arona, Izay mitsororoka amin'ny moron-tongotr'akanjony
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: vozon''akanjony'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tahaka ny ando any Hermona, izay milatsaka amin'ny tendrombohitra Ziona; Fa voadidin'i Jehovah ho eo ny fitahiana, Dia fiainana ho mandrakizay.
