document_id: AMO.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Moaba, eny, efatra aza, dia tsy havelako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy hahemotro
    marker-yv: yv-n
  - type: text
    text: ' izy, satria nodorany ho sokay ny taolan''ny mpanjakan''i Edoma; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hataoko afo ao Moaba, ka handevona ny tranoben''i Kiriota izany; Ary Moaba ho faty amin''ny tabataba sy amin''ny akora ary ny fanenon''ny anjomara; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary hofoanako tsy hisy mpitsara ao aminy, ary hiaraka hovonoiko izy sy ireo mpanapaka rehetra ao aminy, hoy Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Joda, eny, efatra aza, dia tsy havelako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy hahemotro
    marker-yv: yv-n
  - type: text
    text: ' izy, satria nataony tsinontsinona ny lalàn''i Jehovah, ary ny didiny tsy notandremany, ary nampahadiso azy ny laingany, izay fanaon''ny razany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa haterako afo ao Joda, ka handevona ny tranoben''i Jerosalema izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''Isiraely, eny, efatra aza, dia tsy havelako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy hahemotro
    marker-yv: yv-n
  - type: text
    text: ' izy, satria namidiny volafotsy ny olona marina sy kapa iray lomisy ny malahelo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary mihanahana mitsiriritra ny vovo-tany eo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho eo'
    marker-yv: yv-n
  - type: text
    text: ' an-dohan''ny malahelo izy sady mamily ny alehan''ny mpandefitra, ary olona mianaka dia samy mandry amin''ny zazavavy iray ihany mba handoto ny anarako masina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Amin'ny lamba azony tamin'ny tsatòka izy no mitsilailay eny anilan'ny alitara rehetra, ary misotro divay novidina tamin'ny sazy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. divain'y voasazy
    marker-yv: yv-n
  - type: text
    text: ' ao an-tranon''ireo andriamaniny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa Izaho no nandringana ny Amorita teo anoloany, dia olona izay lava tsanganana toy ny hazo sedera sy natanjaka toy ny ôka; Eny, nosimbako ny voany teny ambony sy ny fatany tao ambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Izaho no nitondra anareo niakatra avy tany amin''ny tany Egypta sady nitari-dalana anareo efa-polo taona tany an-efitra, mba handovanareo ny tanin''ny Amorita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny zanakalahinareo nisy natsangako ho mpaminany, ary ny zatovonareo ho Nazirita. Tsy izany va no izy, ry Zanak''Isiraely? hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanjo nampisotroinareo divay ny Nazirita, ary ny mpaminany noraranareo hoe: Aza maminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, Izaho no hitambesatra aminareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Izaho dia itambesaranareo'
    marker-yv: yv-n
  - type: text
    text: ' toy ny fitambesatry ny sariety feno amboara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa tsy ho afa-mandositra ny faingam-pandeha, ny mahery tsy hampiseho hery, ary ny lehilahy mahery tsy hahavonjy ny ainy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay mitana tsipìka tsy hahajanona, ary ny faingan-tongotra tsy hahavonjy tena, izay mitaingin-tsoavaly tsy hahavonjy ny ainy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary na dia izay sahy ao amin'ny mahery aza dia handositra mitanjaka amin'izany andro izany, hoy Jehovah.
