document_id: AMO.2,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Moaba, eny, efatra aza, dia tsy havelako'
  - type: note
    content: Heb. tsy hahemotro
  - type: text
    content: ' izy, satria nodorany ho sokay ny taolan''ny mpanjakan''i Edoma; '
  '10':
  - type: text
    content: 'Ary Izaho no nitondra anareo niakatra avy tany amin''ny tany Egypta sady nitari-dalana anareo efa-polo taona tany an-efitra, mba handovanareo ny tanin''ny Amorita, '
  '11':
  - type: text
    content: 'Ary ny zanakalahinareo nisy natsangako ho mpaminany, ary ny zatovonareo ho Nazirita. Tsy izany va no izy, ry Zanak''Isiraely? hoy Jehovah. '
  '12':
  - type: text
    content: 'Kanjo nampisotroinareo divay ny Nazirita, ary ny mpaminany noraranareo hoe: Aza maminany. '
  '13':
  - type: text
    content: Indro, Izaho no hitambesatra aminareo
  - type: note
    content: 'Na: Izaho dia itambesaranareo'
  - type: text
    content: ' toy ny fitambesatry ny sariety feno amboara. '
  '14':
  - type: text
    content: 'Koa tsy ho afa-mandositra ny faingam-pandeha, ny mahery tsy hampiseho hery, ary ny lehilahy mahery tsy hahavonjy ny ainy; '
  '15':
  - type: text
    content: 'Izay mitana tsipìka tsy hahajanona, ary ny faingan-tongotra tsy hahavonjy tena, izay mitaingin-tsoavaly tsy hahavonjy ny ainy; '
  '16':
  - type: text
    content: Ary na dia izay sahy ao amin'ny mahery aza dia handositra mitanjaka amin'izany andro izany, hoy Jehovah.
  '2':
  - type: text
    content: 'Fa hataoko afo ao Moaba, ka handevona ny tranoben''i Kiriota izany; Ary Moaba ho faty amin''ny tabataba sy amin''ny akora ary ny fanenon''ny anjomara; '
  '3':
  - type: text
    content: Ary hofoanako tsy hisy mpitsara ao aminy, ary hiaraka hovonoiko izy sy ireo mpanapaka rehetra ao aminy, hoy Jehovah.
  '4':
  - type: text
    content: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Joda, eny, efatra aza, dia tsy havelako'
  - type: note
    content: Heb. tsy hahemotro
  - type: text
    content: ' izy, satria nataony tsinontsinona ny lalàn''i Jehovah, ary ny didiny tsy notandremany, ary nampahadiso azy ny laingany, izay fanaon''ny razany; '
  '5':
  - type: text
    content: 'Fa haterako afo ao Joda, ka handevona ny tranoben''i Jerosalema izany. '
  '6':
  - type: text
    content: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''Isiraely, eny, efatra aza, dia tsy havelako'
  - type: note
    content: Heb. tsy hahemotro
  - type: text
    content: ' izy, satria namidiny volafotsy ny olona marina sy kapa iray lomisy ny malahelo, '
  '7':
  - type: text
    content: Ary mihanahana mitsiriritra ny vovo-tany eo
  - type: note
    content: 'Na: ho eo'
  - type: text
    content: ' an-dohan''ny malahelo izy sady mamily ny alehan''ny mpandefitra, ary olona mianaka dia samy mandry amin''ny zazavavy iray ihany mba handoto ny anarako masina; '
  '8':
  - type: text
    content: Amin'ny lamba azony tamin'ny tsatòka izy no mitsilailay eny anilan'ny alitara rehetra, ary misotro divay novidina tamin'ny sazy
  - type: note
    content: Heb. divain'y voasazy
  - type: text
    content: ' ao an-tranon''ireo andriamaniny izy. '
  '9':
  - type: text
    content: 'Nefa Izaho no nandringana ny Amorita teo anoloany, dia olona izay lava tsanganana toy ny hazo sedera sy natanjaka toy ny ôka; Eny, nosimbako ny voany teny ambony sy ny fatany tao ambany. '
