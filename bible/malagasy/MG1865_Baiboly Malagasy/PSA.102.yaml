document_id: PSA.102,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainan'ny mpanompon'Andriamanitra noho ny fahoriana nahazo azy sy ny naharavan'i Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fivavaky ny ory, raha reraka izy ka mandoatra ny alahelony eo anatrehan''i Jehovah. Jehovah ô, henoy ny fivavako, Ary aoka hankeo aminao ny fitarainako. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho ny fahaviniranao sy ny fahatezeranao; Fa naingainao aho, kanefa natontanao indray.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny androko dia tahaka ny aloka efa mandroso; Ary efa malazo tahaka ny ahitra aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa Hianao, Jehovah ô, mipetraka manjaka mandrakizay; Ary ny fahatsiarovana Anao mihatra amin''ny taranaka fara mandimby. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao hitsangana ka hamindra fo amin''i Ziona; Fa efa andro hamindram-po aminy izao; Eny, tonga ny fotoana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa sitraky ny mpanomponao ny vatony, Sady malahelo ny vovo-taniny izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatahotra ny anaran'i Jehovah ny jentilisa, Ary ny mpanjaka rehetra amin'ny tany hatahotra ny voninahitrao;
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jehovah nanangana an''i Ziona; Niseho tamin''ny voninahiny Izy; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nijery ny fivavaky ny mahantra Izy Ka tsy nanevateva ny fivavany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hosoratana ho an''ny taranaka mandimby izany; Ary izay firenena mbola hoforonina no hidera an''i Jehovah; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Izy nitazana tany amin''ny fitoerany masina any amin''ny avo. Tany an-danitra no nitsinjovan''i Jehovah ny tany, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manafina ny tavanao amiko amin'ny andro fahoriako; Atongilano amiko ny sofinao; Amin'ny andro itarainako dia faingàna hamaly ahy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hihaino ny fisentoan'ny mpifatotra Sy hanafaka izay voatendry ho faty
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. zanaky ny fahafatesana
      marker-yv: yv-n
    - type: text
      text: ', '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mba hotorina any Ziona ny anaran''i Jehovah, Ary ny fiderana Azy any Jerosalema, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehefa tafangona ny firenena Sy ny fanjakana maro hanompo an'i Jehovah.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nahaketraka ny heriko tany an-dalana Izy; Efa nahafohy ny androko Izy; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izaho: Andriamanitro ô; aza maka ahy an-tenatenan''ny androko; Ny taonanao mihatra amin''ny taranaka fara mandimby.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tany aloha no nanorenanao ny tany; Ary asan''ny tananao ny lanitra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo dia ho levona, fa Hianao no maharitra; Izy rehetra ho rovitra toy ny fitafiana; Toy ny lamba no hanovanao azy, ka hovana izy; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Hianao no tsy miova, Ary ny taonanao no tsy ho tapitra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zanaky ny mpanomponao handry fahizay
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia mbola haharitra'
      marker-yv: yv-n
    - type: text
      text: ', Ary ny taranany hampitoerina eo anatrehanao.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa levon-ko setroka ny androko Ary ny taolako mahamay tahaka ny forohana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taninina tahaka ny ahitra ny foko ka malazo; Fa hadinoko na dia ny fihinanan-kanina aza. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny fisentoan''ny foko Ny taolako miraikitra amin''ny hoditro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny sama any an-efitra aho, Ary tahaka ny vorondolo any an-tanànaolo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mahita tory aho Sady tahaka ny tsikirity irery eo an-tampontrano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandatsa ahy mandrakariva ny fahavaloko. Izay misafoaka amiko dia manao ahy ho fiozonana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lavenona no nohaniko tahaka ny mofo; Ary ny zavatra nosotroiko noharoharoiko ny ranomasoko, '
