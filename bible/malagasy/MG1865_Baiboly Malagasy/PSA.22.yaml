document_id: PSA.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana mafy noho ny fahoriana, ary fisaorana noho ny fahafahana, sy filazana ny handrosoan'ny fanjakan'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Alaieleth-hasahara. Salamo nataon''i Davida. Andriamanitra ô, Andriamanitro ô, nahoana no dia mahafoy ahy Hianao? Lavitra ny famonjena ahy ny tenin''ny fitarainako. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Andriamanitro ô, miantso aho nony andro, nefa tsy mamaly Hianao; ary nony alina, nefa tsy mahita fiononana aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa masina Hianao, Ry mipetraka eo ambonin'ny fideran'ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hianao no nitokian''ny razanay; Natoky izy, ka namonjy azy Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hianao no nitarainany, ka afaka izy; Hianao no nitokiany, ka tsy menatra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izaho dia olitra, fa tsy olona, fandatsan''olona sy fanevatevam-bahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izay rehetra mahita ahy dia manaraby ahy; manondro molotra izy sady mihifikifi-doha ka manao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ankino amin'i Jehovah
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Efa niankina tamin''i Jehovah izy'
    marker-yv: yv-n
  - type: text
    text: ', dia aoka Izy hamonjy azy; eny, aoka Izy hanafaka azy, raha mankasitraka azy Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa Hianao no nampivoaka ahy avy tao an-kibo; nampandry ahy fahizay ianao, fony aho mbola nampinonoin''ny reniko; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nankinina taminao hatrany am-bohoka aho; hatrany an-kibon-dreniko dia Andriamanitro Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aza manalavitra ahy Hianao, fa akaiky ny fahoriana, sady tsy misy mpamonjy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mitangorona amiko ireo ombilahy be, ny maherin''i Basana manemitra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Misanasana vava amiko izy; eny, liona mamiravira sy mierona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Efa rano aidina aho, ka mivaha ny taolako rehetra; tahaka ny savoka ny foko: miempo ato anatiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Maina tahaka ny tavim-bilany ny heriko, ary ny lelako miraikitra amin'ny lanilaniko; ao amin'ny vovoky ny fahafatesana no ametrahanao ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa mitangorona amiko ny amboa, ny fiangonan'ny ratsy fanahy manemitra ahy. Manindrona ny tongotro aman-tanako izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Manodidina ny tongotro aman-tanako hoatra ny liona izy'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mahisa ny taolako rehetra aho ireo dia mibanjina sady mangarika ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mizara ny fitafiako ho azy izy; ary ny akanjoko ilokàny. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa Hianao, Jehovah ô, aza manalavitra; ry Heriko ô, faingana hamonjy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vonjeo amin''ny sabatra ny fanahiko, dia ny hany malalako amin''ny herin''ny amboa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Vonjeo amin'ny vavan'ny liona aho; ary valio ho afaka amin'ny tandroky ny ombimanga
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: teo amin''ny tandroky ny ombimanga dia novalianao aho'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hitory ny anaranao amin''ny rahalahiko aho; eo amin''ny fiangonana no hideràko Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hianareo izay matahotra an''i Jehovah, miderà Azy; ry taranak''i Jakoba rehetra, manomeza voninahitra Azy; ary matahora Azy, ry Zanak''Isiraely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa tsy manao tsinontsinona na marikorikon'ny fahorian'ny ory Izy, ary tsy mba manafina ny tavany aminy; fa raha mitaraina aminy ireny, dia mihaino Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avy aminao no ahazoako manao fiderana eo amin''ny fiangonan-dehibe; ny voadiko dia hefaiko eo anatrehan''izay matahotra an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hihinana ny mpandefitra ka ho voky; hidera an'i Jehovah izay mitady azy; ho velona mandrakizay anie ny fonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hahatsiaro ka hiverina ho amin''i Jehovah ny faran''ny tany rehetra; ary hiankohoka eo anatrehanao ny fokon''ny firenen-tsamy hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa an''i Jehovah ny fanjakana; ary manapaka amin''ny firenen-tsamy hafa Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Hihinana sy hiankohoka ny mpanefoefo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: matavy'
    marker-yv: yv-n
  - type: text
    text: ' rehetra ambonin''ny tany, eo anatrehany no hiondrehan''izay rehetra efa hidina any amin''ny vovoka ka tsy mahavelona ny ainy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hisy taranaka hanompo Azy; ary ny Tompo dia holazaina amin''ny taranaka ho avy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Hisy ho avy ka hanambara ny fahamarinany, amin'ny olona izay mbola hateraka, fa Izy no nanao izany.
