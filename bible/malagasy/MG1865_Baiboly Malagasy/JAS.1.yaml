document_id: JAS.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny fakam-panahy, sy ny fandraisana ny tenin'Andriamanitra
  - type: text
    content: 'Jakoba, mpanompon''Andriamanitra sy Jesosy Kristy Tompo, mamangy ny firenena roa ambin''ny folo monina any am-pielezana. '
  '10':
  - type: text
    content: 'fa ny manan-karena kosa ny fietreny, satria ho levona tahaka ny vonin''ny ahitra izy. '
  '11':
  - type: text
    content: 'Fa miposaka ny masoandro mbamin''ny hainandro mahamay, dia mampahalazo ny ahitra, ka mihintsana ny voniny, ary levona ny hatsaran-tarehiny; dia toy izany koa no fahalazon''ny manan-karena amin''ny alehany. '
  '12':
  - type: text
    content: Sambatra izay olona maharitra fakam-panahy; fa rehefa voazaha toetra izy, dia handray ny satro-boninahitra fiainana, izay nolazain'ny Tompo homena izay tia Azy.
  '13':
  - type: text
    content: 'Raha misy alaim-panahy, aoka izy tsy hanao hoe: Andriamanitra no maka fanahy ahy; fa Andriamanitra tsy azon''ny ratsy alaim-panahy, sady tsy mba maka fanahy olona Izy; '
  '14':
  - type: text
    content: 'fa samy alaim-panahy ny olona, raha tarihin''ny filany sy fitahiny izy. '
  '15':
  - type: text
    content: 'Ary ny filàna, rehefa torontoronina, dia miteraka ota; ary ny ota, rehefa tanteraka, dia miteraka fahafatesana. '
  '16':
  - type: text
    content: 'Aza mety hofitahina ianareo, sy rahalahy malalako. '
  '17':
  - type: text
    content: 'Ny fanomezan-tsoa rehetra sy ny fanomezana tanteraka rehetra dia avy any ambony ka midina avy amin''ny Rain''ny fanazavana, Izay tsy misy fiovaovana na aloka avy amin''ny fihodinana. '
  '18':
  - type: text
    content: 'Tamin''ny sitrapony no niterahany antsika tamin''ny teny fahamarinana, mba ho santatry ny zavatra noforoniny isika. '
  '19':
  - type: text
    content: 'Fantatrareo izany, sy rahalahy malalako. Kanefa aoka ny olona rehetra halady hihaino ho malai-miteny, ho malain-ko tezitra; '
  '2':
  - type: text
    content: Ry rahalahiko, ataovy ho fifaliana avokoa, raha iharan'ny fakam-panahy
  - type: note
    content: 'Na: fizahan-toetra'
  - type: text
    content: ' samy hafa ianareo, '
  '20':
  - type: text
    content: 'fa ny fahatezeran''ny olona tsy ahefana izay marina eo imason''Andriamanitra. '
  '21':
  - type: text
    content: 'Koa ario ny fahalotoana sy ny lolompo rehetra, ary ekeo amin''ny fahalemem-panahy ny teny nambolena, izay mahavonjy ny fanahinareo. '
  '22':
  - type: text
    content: 'Fa aoka ho mpankatò ny teny ianareo, fa aza mpihaino fotsiny ihany ka mamitaka ny tenanareo. '
  '23':
  - type: text
    content: 'Fa raha misy mpihaino ny teny, nefa tsy mpankatò, dia toy ny olona mizaha ny tarehiny eo amin''ny fitaratra izy; '
  '24':
  - type: text
    content: 'fa mijery ny tenany izy, dia lasa, ary miaraka amin''izay dia hadinony ny tarehiny. '
  '25':
  - type: text
    content: 'Fa izay mandinika ny lalàna tanteraka, dia ny lalàn''ny fahafahana, ka maharitra amin''izany, raha tsy mpihaino manadino, fa mpanao ny asa, dia ho sambatra amin''ny asany izany olona izany. '
  '26':
  - type: text
    content: 'Raha misy manao azy ho mpivavaka, nefa tsy mamehy ny vavany, fa mamitaka ny fony, dia zava-poana ny fivavahan''izany olona izany. '
  '27':
  - type: text
    content: 'Izao no fivavahana madio sady tsy misy loto eo anatrehan''Andriamanitra Ray: ny mamangy ny kamboty sy ny mpitondratena amin''ny fahoriany, sy ny miaro ny tena tsy hisy pentimpentina avy amin''izao tontolo izao.'
  '3':
  - type: text
    content: 'satria fantatrareo fa ny fizahan-toetra ny finoanareo dia mahatonga faharetana. '
  '4':
  - type: text
    content: 'Ary aoka ny faharetana hisy asa tanteraka, mba ho tanteraka sy tonga ohatra ianareo, ka tsy hisy tsy ampy na inona na inona. '
  '5':
  - type: text
    content: Ary raha misy ianareo tsy manam-pahendrena
  - type: note
    content: 'Na: kely fahendrena'
  - type: text
    content: ', aoka izy hangataka amin''Andriamanitra, Izay manome malalaka ho an''ny olona rehetra sady tsy mandatsa; ary dia homena azy izany. '
  '6':
  - type: text
    content: 'Nefa aoka hangataka amin''ny finoana izy ka tsy hiahanahana akory; fa izay miahanahana dia toy ny alon-dranomasina entin''ny rivotra ka atopatopany. '
  '7':
  - type: text
    content: 'Fa aoka tsy hanampo handray zavatra amin''ny Tompo izany olona izany: '
  '8':
  - type: text
    content: 'olona miroa saina izy, miovaova amin''ny alehany rehetra. '
  '9':
  - type: text
    content: 'Aoka ny rahalahy izay ambany hanao ny fisandratany ho reharehany; '
