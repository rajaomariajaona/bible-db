document_id: EZK.22,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahotan'i Jerosalema sy ny Isiraely
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Ao aminao misy mandry amin-drainy; ao aminao misy misavika izay mararin''ny fadim-bolana. '
  '11':
  - type: text
    content: 'Misy manao fahavetavetana amin''ny vadin''ny namany; misy manao fahavetavetana mandoto ny vinantovaviny; ary misy misavika ny anabaviny zanakavavin-drainy. '
  '12':
  - type: text
    content: 'Ao aminao misy mandray kolikoly handatsa-drà; maka zana-bola sy tombony ianao sady manao an-keriny mandroba ny an''ny namanao ka manadino Ahy, hoy Jehovah Tompo. '
  '13':
  - type: text
    content: 'Koa, indro, manjera tanana Aho noho ny harena azonao tamin''ny tsy marina sy ny latsa-drà tao aminao. '
  '14':
  - type: text
    content: Hahatoha va ny fonao, na hahazaka va ny tananao, amin'ny andro izay hisehoaka
  - type: note
    content: Heb. hanaovako
  - type: text
    content: ' aminao? Izaho Jehovah no nilaza sady hahatanteraka izany. '
  '15':
  - type: text
    content: 'Ary haeliko ho any amin''ny jentilisa sy hahahako ho any amin''ny tany samy hafa ianao, ary holevoniko ho afaka aminao mihitsy ny fahalotoanao. '
  '16':
  - type: text
    content: 'Ary dia ho hitan''ny jentilisa fa ny nataonao ihany no nahaloto anao; ka dia ho fantatrao fa Izaho no Jehovah. '
  '17':
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah anao hoe: '
  '18':
  - type: text
    content: 'Ry zanak''olona, ny taranak''Isiraely dia efa tonga tain-drendrika amiko; izy rehetra dia varahina sy vifotsy sy vy ary firaka ao anatin''ny memy; eny, efa tonga taim-bolafotsy izy. '
  '19':
  - type: text
    content: 'Koa izao no lazain''i Jehovah Tompo: Noho ny nahatongavanareo rehetra ho tain-drendrika, dia, indro, hangoniko ho ao Jerosalema ianareo. '
  '2':
  - type: text
    content: 'Ry zanak''olona, moa tsy hitsara va ianao ? Tsy hitsara ny tanana mpandatsa-drà va ianao ? Ampahafantaro azy ary ny fahavetavetany rehetra, '
  '20':
  - type: text
    content: 'Toy ny anangonana volafotsy sy varahina sy vy sy firaka ary vifotsy ho ao anatin''ny memy ka misy mifofotra azy amin''ny afo ho rendrika, dia toy izany no hanangonako anareo amin''ny fahatezerako sy ny fahavinirako, ary hataoko ao ianareo ka ho voarendrika; '
  '21':
  - type: text
    content: 'eny, nangoniko ianareo, dia hifofotra anareo amin''ny afon''ny fahatezerako Aho, ka ho voarendrika ao anatiny ianareo. '
  '22':
  - type: text
    content: 'Toy ny andrendrika volafotsy ao anatin''ny memy no handrendrehana anareo ao anatiny; ka dia ho fantatrareo fa Izaho Jehovah no nampidina ny fahatezerako aminareo. '
  '23':
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '24':
  - type: text
    content: 'Ry zanak''olona, lazao aminy hoe: Hianao no tany tsy hazavain''ny hainandro'
  - type: note
    content: 'Na: tsy voadio'
  - type: text
    content: ' sady tsy ilatsahan''ny ranonorana amin''ny andro fahatezerana. '
  '25':
  - type: text
    content: 'Mikomy ny mpaminany ao aminy; tahaka ny liona mierona mamiravira haza izy; mihinana olona izy sady mahalasa ny harena sy ny zava-tsoa ary mahamaro ny mpitondratena ao aminy. '
  '26':
  - type: text
    content: 'Ny mpisorona dia mandika ny lalàko sy mandoto ny zavatra masina; tsy manavaka ny masina sy ny tsy masina izy, na mampiseho ny tsi-fitovian''ny maloto sy ny madio, ary mitampi-maso tsy hijery ny Sabatako izy, ary tsiratsiraina ao aminy Aho. '
  '27':
  - type: text
    content: Toy ny amboa-dia
  - type: note
    content: 'Na: lopa'
  - type: text
    content: ' mamiravira haza ny lehibeny ao aminy ka mandatsa-drà sy mahafaty aina ary mahazo harena amin''ny tsy marina. '
  '28':
  - type: text
    content: 'Ary ny mpaminaniny mandalotra azy amin''ny feta tsy madity ka mahita zava-poana sy maminany lainga aminy hoe: Izao no lazain''i Jehovah Tompo; nefa Jehovah tsy niteny tsinona. '
  '29':
  - type: text
    content: 'Ny vahoaka manao an-keriny sy mandroba ka mampahory ny malahelo sy ny mahantra; ary ny vahiny dia ampahoriny tsy andrariny. '
  '3':
  - type: text
    content: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Tanàna mpandatsa-drà ao ampovoany hahatonga ny fotoany sady manao sampy ao aminy hahaloto azy. '
  '30':
  - type: text
    content: 'Ary nitady olona teo aminy Aho hanao manda sy hijanona eo amin''ny banga eo anatrehako hifona ho an''ny tany mba tsy handravako azy, kanjo tsy nahita; '
  '31':
  - type: text
    content: koa dia haidiko eo aminy ny fahatezerako; ny afon'ny fahatezerako no handaniako azy; ary hatsingeriko ho eo an-dohany ihany ny fanaony
  - type: note
    content: Heb lalana
  - type: text
    content: ', hoy Jehovah Tompo.'
  '4':
  - type: text
    content: 'Ny rà izay nalatsakao no nahameloka anao, ary ny sampy izay nataonao no nahaloto anao; ary efa nampanakaiky ny andronao ianao ka efa tonga amin''ny taonanao, koa izany no nanaovako anao ho fandatsan''ny jentilisa sy ho fanakoran''ny tany rehetra, '
  '5':
  - type: text
    content: 'ka na ny akaiky anao na ny lavitra anao dia samy hanakora anao voaloto anarana sy be tabataba. '
  '6':
  - type: text
    content: Indreo ny lehiben'ny Isiraely efa samy ao aminao araka ny heriny
  - type: note
    content: Heb sandriny
  - type: text
    content: ' avy mba handatsa-drà. '
  '7':
  - type: text
    content: 'Ao aminao no anozonana ray aman-dreny; ary ao aminao no anaovana izay sarotra amin''ny vahiny; ary ao aminao no ampahoriana ny kamboty sy ny mpitondratena. '
  '8':
  - type: text
    content: 'Hamavoinao ny zavatra masina. ary lotoinao ny Sabatako. '
  '9':
  - type: text
    content: 'Ao aminao misy olona mandehandeha manaratsy mba handatsa-drà; ary ao aminao misy mihinana eny an-tendrombohitra; ao aminao misy manao fahavetavetana. '
