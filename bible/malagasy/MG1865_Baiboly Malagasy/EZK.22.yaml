document_id: EZK.22,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahotan'i Jerosalema sy ny Isiraely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ao aminao misy mandry amin-drainy; ao aminao misy misavika izay mararin''ny fadim-bolana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Misy manao fahavetavetana amin''ny vadin''ny namany; misy manao fahavetavetana mandoto ny vinantovaviny; ary misy misavika ny anabaviny zanakavavin-drainy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ao aminao misy mandray kolikoly handatsa-drà; maka zana-bola sy tombony ianao sady manao an-keriny mandroba ny an''ny namanao ka manadino Ahy, hoy Jehovah Tompo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa, indro, manjera tanana Aho noho ny harena azonao tamin''ny tsy marina sy ny latsa-drà tao aminao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hahatoha va ny fonao, na hahazaka va ny tananao, amin'ny andro izay hisehoaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hanaovako
      marker-yv: yv-n
    - type: text
      text: ' aminao? Izaho Jehovah no nilaza sady hahatanteraka izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary haeliko ho any amin''ny jentilisa sy hahahako ho any amin''ny tany samy hafa ianao, ary holevoniko ho afaka aminao mihitsy ny fahalotoanao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary dia ho hitan''ny jentilisa fa ny nataonao ihany no nahaloto anao; ka dia ho fantatrao fa Izaho no Jehovah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah anao hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ry zanak''olona, ny taranak''Isiraely dia efa tonga tain-drendrika amiko; izy rehetra dia varahina sy vifotsy sy vy ary firaka ao anatin''ny memy; eny, efa tonga taim-bolafotsy izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Noho ny nahatongavanareo rehetra ho tain-drendrika, dia, indro, hangoniko ho ao Jerosalema ianareo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry zanak''olona, moa tsy hitsara va ianao ? Tsy hitsara ny tanana mpandatsa-drà va ianao ? Ampahafantaro azy ary ny fahavetavetany rehetra, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Toy ny anangonana volafotsy sy varahina sy vy sy firaka ary vifotsy ho ao anatin''ny memy ka misy mifofotra azy amin''ny afo ho rendrika, dia toy izany no hanangonako anareo amin''ny fahatezerako sy ny fahavinirako, ary hataoko ao ianareo ka ho voarendrika; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'eny, nangoniko ianareo, dia hifofotra anareo amin''ny afon''ny fahatezerako Aho, ka ho voarendrika ao anatiny ianareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Toy ny andrendrika volafotsy ao anatin''ny memy no handrendrehana anareo ao anatiny; ka dia ho fantatrareo fa Izaho Jehovah no nampidina ny fahatezerako aminareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ry zanak''olona, lazao aminy hoe: Hianao no tany tsy hazavain''ny hainandro'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsy voadio'
      marker-yv: yv-n
    - type: text
      text: ' sady tsy ilatsahan''ny ranonorana amin''ny andro fahatezerana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mikomy ny mpaminany ao aminy; tahaka ny liona mierona mamiravira haza izy; mihinana olona izy sady mahalasa ny harena sy ny zava-tsoa ary mahamaro ny mpitondratena ao aminy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny mpisorona dia mandika ny lalàko sy mandoto ny zavatra masina; tsy manavaka ny masina sy ny tsy masina izy, na mampiseho ny tsi-fitovian''ny maloto sy ny madio, ary mitampi-maso tsy hijery ny Sabatako izy, ary tsiratsiraina ao aminy Aho. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Toy ny amboa-dia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: lopa'
      marker-yv: yv-n
    - type: text
      text: ' mamiravira haza ny lehibeny ao aminy ka mandatsa-drà sy mahafaty aina ary mahazo harena amin''ny tsy marina. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary ny mpaminaniny mandalotra azy amin''ny feta tsy madity ka mahita zava-poana sy maminany lainga aminy hoe: Izao no lazain''i Jehovah Tompo; nefa Jehovah tsy niteny tsinona. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ny vahoaka manao an-keriny sy mandroba ka mampahory ny malahelo sy ny mahantra; ary ny vahiny dia ampahoriny tsy andrariny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Tanàna mpandatsa-drà ao ampovoany hahatonga ny fotoany sady manao sampy ao aminy hahaloto azy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary nitady olona teo aminy Aho hanao manda sy hijanona eo amin''ny banga eo anatrehako hifona ho an''ny tany mba tsy handravako azy, kanjo tsy nahita; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: koa dia haidiko eo aminy ny fahatezerako; ny afon'ny fahatezerako no handaniako azy; ary hatsingeriko ho eo an-dohany ihany ny fanaony
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb lalana
      marker-yv: yv-n
    - type: text
      text: ', hoy Jehovah Tompo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny rà izay nalatsakao no nahameloka anao, ary ny sampy izay nataonao no nahaloto anao; ary efa nampanakaiky ny andronao ianao ka efa tonga amin''ny taonanao, koa izany no nanaovako anao ho fandatsan''ny jentilisa sy ho fanakoran''ny tany rehetra, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ka na ny akaiky anao na ny lavitra anao dia samy hanakora anao voaloto anarana sy be tabataba. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Indreo ny lehiben'ny Isiraely efa samy ao aminao araka ny heriny
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb sandriny
      marker-yv: yv-n
    - type: text
      text: ' avy mba handatsa-drà. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ao aminao no anozonana ray aman-dreny; ary ao aminao no anaovana izay sarotra amin''ny vahiny; ary ao aminao no ampahoriana ny kamboty sy ny mpitondratena. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hamavoinao ny zavatra masina. ary lotoinao ny Sabatako. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ao aminao misy olona mandehandeha manaratsy mba handatsa-drà; ary ao aminao misy mihinana eny an-tendrombohitra; ao aminao misy manao fahavetavetana. '
