document_id: PSA.58,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny famaliana ny mpanao fitsarana tsy marina
  - type: text
    content: Ho an'ny mpiventy hira. Al-tasheth. Miktama nataon'i Davida. Moa ny tsi-fitenenana va ataonareo ho filazana ny marina
  - type: note
    content: 'Na: Moa milaza ny maraina tokoa va ianareo, ry mahery?'
  - type: text
    content: '? Mitsara mahitsy va ianareo, ry zanak''olombelona? '
  '10':
  - type: text
    content: 'Hifaly ny marina, raha mahita ny famaliana; hanasa ny tongony amin''ny ran''ny ratsy fanahy izy; '
  '11':
  - type: text
    content: 'Dia hiteny ny olona ka hanao hoe: misy valiny'
  - type: note
    content: 'Heb: vokatra'
  - type: text
    content: ' tokoa ho an''ny marina; misy tokoa Andriamanitra Izay mitsara etỳ ambonin''ny tany.'
  '2':
  - type: text
    content: 'Tsy izany, fa ny fonareo no amoronanareo ny ratsy; mandanja ny fandozan''ny tananareo etỳ an-tany ianareo. '
  '3':
  - type: text
    content: 'Mivily hatrany am-bohoka ny ratsy fanahy; mania hatrany an-kibo izy ka miteny lainga. '
  '4':
  - type: text
    content: 'Misy poizina tahaka ny an''ny menarana aminy; eny, tahaka ny vipera marenina izay manentsin-tadiny izy, '
  '5':
  - type: text
    content: Ka tsy mihaino ny feon'ny mpanao ody, na dia izay mpahay ody indrindra aza.
  '6':
  - type: text
    content: 'Andriamanitra ô, torotoroy ny nifiny eo am-bavany; omboty ny vazan''ny liona tanora, Jehovah ô. '
  '7':
  - type: text
    content: 'Aoka ho ritra tahaka ny ranotrambo izy; raha atraniny ny zana-tsipìkany, dia aoka ho tapa-doha ireny; '
  '8':
  - type: text
    content: 'Aoka ho tahaka ny lelosy izay mihalevona eny am-pandehanana izy; Aoka ho tahaka ny zaza-vakimanta izay tsy mahita masoandro izy. '
  '9':
  - type: text
    content: 'Dieny tsy mbola mafanan''ny afon-tsilo ny vilaninareo, aoka ho entin''ny tafio-drivotra ireny, na ny lena na ny maina. '
