document_id: PSA.58,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny famaliana ny mpanao fitsarana tsy marina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an'ny mpiventy hira. Al-tasheth. Miktama nataon'i Davida. Moa ny tsi-fitenenana va ataonareo ho filazana ny marina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Moa milaza ny maraina tokoa va ianareo, ry mahery?'
      marker-yv: yv-n
    - type: text
      text: '? Mitsara mahitsy va ianareo, ry zanak''olombelona? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hifaly ny marina, raha mahita ny famaliana; hanasa ny tongony amin''ny ran''ny ratsy fanahy izy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hiteny ny olona ka hanao hoe: misy valiny'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: vokatra'
      marker-yv: yv-n
    - type: text
      text: ' tokoa ho an''ny marina; misy tokoa Andriamanitra Izay mitsara etỳ ambonin''ny tany.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tsy izany, fa ny fonareo no amoronanareo ny ratsy; mandanja ny fandozan''ny tananareo etỳ an-tany ianareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mivily hatrany am-bohoka ny ratsy fanahy; mania hatrany an-kibo izy ka miteny lainga. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Misy poizina tahaka ny an''ny menarana aminy; eny, tahaka ny vipera marenina izay manentsin-tadiny izy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ka tsy mihaino ny feon'ny mpanao ody, na dia izay mpahay ody indrindra aza.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Andriamanitra ô, torotoroy ny nifiny eo am-bavany; omboty ny vazan''ny liona tanora, Jehovah ô. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aoka ho ritra tahaka ny ranotrambo izy; raha atraniny ny zana-tsipìkany, dia aoka ho tapa-doha ireny; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aoka ho tahaka ny lelosy izay mihalevona eny am-pandehanana izy; Aoka ho tahaka ny zaza-vakimanta izay tsy mahita masoandro izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dieny tsy mbola mafanan''ny afon-tsilo ny vilaninareo, aoka ho entin''ny tafio-drivotra ireny, na ny lena na ny maina. '
