document_id: ROM.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny faharatsian'ny toetry ny jentilisa sy ny mahameloka azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paoly, mpanompon''i Jesosy Kristy, voantso ho Apostoly, voatokana ho amin''ny filazantsaran''Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: izay nampilazainy ny mpaminany rahateo teo amin'ny Soratra Masina
  - type: usfm
    marker: x
    children:
    - type: text
      text: teo amin'izay soratra masina
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ny amin''ny Zanany, Izay nateraka avy tamin''ny taranak''i Davida araka ny nofo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ary naseho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: notendrena'
    marker-yv: yv-n
  - type: text
    text: ' tamin-kery ho Zanak''Andriamanitra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: naseho ho Zanak''Andriamanitra mahery'
    marker-yv: yv-n
  - type: text
    text: ' araka ny fahamasinana tamin''ny fitsanganany tamin''ny maty, - dia Jesosy Kristy Tompontsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay nandraisanay fahasoavana sy ny mah''Apostoly anay hahatonga fanekena ny finoana ho voninahitry ny anarany any amin''ny jentilisa rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary ianareo koa, izay isan''ireny, dia voantso ho an''i Jesosy Kristy, - '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ho an''izay rehetra any Roma, malalan''Andriamanitra sady voantso ho masina; ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesosy Kristy Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voalohany, misaotra an''Andriamanitro amin''ny alalan''i Jesosy Kristy aho noho ny aminareo rehetra, satria efa re eran''izao tontolo izao ny lazan''ny finoanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa Andriamanitra, Izay tompoin''ny fanahiko amin''ny filazantsaran''ny Zanany, no vavolombeloko fa tsy mitsahatra mahatsiaro anareo aho, ka mandrakariva, raha mivavaka aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia mangataka fandrao mba hisy hahafahako amin''izao ho tonga aminareo, raha sitrapon''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa maniry hahita anareo aho hanomezako anareo fahasoavam-panahy ho anareo, mba hampaharezina ianareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'izany dia ny mba hiarahako hamporisihina aminareo amin''ny finoantsika, dia ny anareo sy ny ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tsy tiako tsy ho fantatrareo, ry rahalahy, fa matetika aho no efa nikasa hankatỳ aminareo (saingy azon-tsampona mandraka ankehitriny aho), hananako izay vokatra atỳ aminareo koa, toy ny any amin''ny jentilisa sasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ananan''ny Grika sy ny firenena hafa rehetra, ny hendry sy ny tsy hendry, trosa aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'koa raha izaho, dia mazoto hitory ny filazantsara aminareo izay any Roma koa aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa tsy menatra ny filazantsara aho; fa herin'Andriamanitra ho famonjena izay rehetra mino izany, amin'ny Jiosy aloha, dia vao amin'ny jentilisa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. Grika
    marker-yv: yv-n
  - type: text
    text: ' koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa amin''izany no anehoana fahamarinana avy amin''Andriamanitra avy amin''ny finoana sy ho amin''ny finoana, araka ny voasoratra hoe: Ny marina amin''ny finoana no ho velona'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny marina ho velon''ny finoana'
    marker-yv: yv-n
  - type: text
    text: ' (Hab. 2. 4).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa aseho avy any an-danitra ny fahatezeran''Andriamanitra amin''ny faharatsiana rehetra sy ny tsi-fahamarinan''ny olona izay misakana ny fahamarinana amin''ny fanaovan-dratsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'satria izay fantatra ny amin''Andriamanitra dia miseho ao am-pon''ireny, fa nasehon''Andriamanitra taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa ny fombany tsy hita, dia ny heriny mandrakizay sy ny mah'Andriamanitra Azy, dia miseho hatramin'ny nanaovana izao tontolo izao, fa fantatra amin'ny zavatra nataony; ka dia tsy manan-kalahatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Mba tsy hanan-kalahatra'
    marker-yv: yv-n
  - type: text
    text: ' ireo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'fa na dia nahalala an''Andriamanitra aza izy, dia tsy mba nankalaza Azy toy izay miendrika ho an''Andriamanitra, na nisaotra Azy, fa tonga zava-poana izy tamin''ny fisainany, ary tonga maizina ny fony donto. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nandoka tena ho hendry izy ka tonga adala, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'koa ny voninahitr''Andriamanitra tsy mety lò dia nosoloany zavatra tahaka ny endriky ny olona mety lò sy ny vorona sy ny biby manan-tongotra efatra ary ny zavatra mandady sy mikisaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary izany no nanoloran''Andriamanitra azy tamin''ny filan''ny fony ho amin''ny fahalotoana, dia ny nifanalany voninahitra tamin''ny tenany avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ary ny fahamarinan''Andriamanitra dia nosoloany lainga, ka nanaja sy nanompo ny zavatra natao izy, fa tsy ny Mpanao, Izay isaorana mandrakizay. Amena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izany no nanoloran''Andriamanitra azy ho amin''ny filan-dratsy mahavoafady; fa ny vehivavy tao aminy nanova ny fanaony ho amin''izay tsy fanaony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary tahaka izany koa ny lehilahy, fa namela ny fanao amin''ny vehivavy izy ka maimay tamin''ny fifampilany samy lehilahy nifanao izay mahamenatra, dia nandray tao amin''ny tenany ny valiny izay tokony ho azy noho ny fiviliany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary araka ny nanaovany ny fahalalana marina an''Andriamanitra ho tsy miendrika hotanany, dia araka izany kosa no nanoloran''Andriamanitra azy ho amin''ny fisainana tsy mahamendrika hanao izay zavatra tsy tokony hatao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ka dia feno ny tsi-fahamarinana rehetra, ny faharatsiana, ny fieremana, ny lolompo,- feno fialonana, vonoan-olona, fifandirana, fitaka, otri-po,- '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: mpibitsibitsika, mpanendrikendrika, halan'Andriamanitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mpankahala an''Andriamanitra'
    marker-yv: yv-n
  - type: text
    text: ', mpampahory, mpiavonavona, mpandoka tena, mpamoron-tsain-dratsy, tsy manoa ray sy reny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'tsy manam-pahalalana, tsy mitana fanekena, tsy manam-pitiavana, tsy miantra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: dia olona mahalala tsara ny fitsipika nomen'Andriamanitra fa izay manao izany zavatra izany no miendrika ho faty, nefa tsy manao izany ihany izy, fa mankasitraka ny manao koa.
