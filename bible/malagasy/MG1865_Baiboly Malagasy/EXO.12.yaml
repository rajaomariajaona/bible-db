document_id: EXO.12,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Paska, sy ny loza fahafolo, izay nahafaty ny lahimatoa rehetra teo Egypta
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy sy Arona teo amin''ny tany Egypta ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary aza asianareo sisa ho tra-maraina; fa raha tahìny misy sisa tsy lany ka tra-maraina, dia hodoranareo amin''ny afo. '
  '11':
  - type: text
    content: 'Ary toy izao no hataonareo, raha mihinana azy: ny valahanareo ho voasikina, ny kapanareo ho eo amin''ny tongotrareo, ary ny tehinareo ho eny an-tananareo; dia hohaninareo faingana izy, fa Paskan''i Jehovah. '
  '12':
  - type: text
    content: 'Fa handeha hamaky ny tany Egypta amin''izany alina izany Aho ka hamono ny matoa rehetra amin''ny tany Egypta hatramin''ny olona ka hatramin''ny biby fiompy; ary ny andriamanitry ny Egyptiana dia hotsaraiko avokoa: Izaho no Jehovah. '
  '13':
  - type: text
    content: 'Ary ny rà dia ho famantarana ho anareo eo amin''ny trano izay itoeranareo; ary raha mahita ny rà Aho, dia handalo anareo, ka tsy hisy loza handringana anareo, raha mamely ny tany Egypta Aho. '
  '14':
  - type: text
    content: 'Ary izany andro izany dia ho fahatsiarovana ho anareo ka hotandremanareo ho andro firavoravoana ho an''i Jehovah; hatramin''ny taranakareo fara mandimby no hitandremanareo izany ho andro firavoravoana, ho lalana mandrakizay. '
  '15':
  - type: text
    content: 'Hafitoana no hihinananareo mofo tsy misy masirasira: amin''ny voalohan''andro no hanesoranareo ny masirasira amin''ny tranonareo; fa na iza na iza homana mofo misy masirasira hatramin''ny andro voalohany ka hatramin''ny fahafito dia hofongorana tsy ho amin''ny Isiraely. '
  '16':
  - type: text
    content: 'Ary amin''ny andro voalohany dia hisy fivoriana masina ho anareo ary amin''ny andro fahafito koa hisy fivoriana masina; tsy hanao raharaha akory ianareo amin''izany andro izany, afa-tsy izay hohanin''ny isan-olona, dia izany ihany no hamboarinareo. '
  '17':
  - type: text
    content: 'Ary hitandrina ny andron''ny mofo tsy misy masirasira ianareo, fa izany andro izany indrindra no nitondrako ny antokonareo nivoaka avy tany amin''ny tany Egypta; dia hotandremanareo izany hatramin''ny taranakareo fara mandimby ho lalàna mandrakizay. '
  '18':
  - type: text
    content: 'Amin''ny andro fahefatra ambin''ny folo amin''ny volana voalohany, nony hariva, no hihinananareo mofo tsy misy masirasira ambara-paharivan''ny andro fahiraika amby roa-polo amin''ny volana. '
  '19':
  - type: text
    content: 'Hafitoana no tsy hisiana masirasira ao an-tranonareo; fa na iza na iza homana izay misy masirasira dia hofongorana tsy ho amin''ny fiangonan''ny Isiraely, na vahiny na tompon-tany. '
  '2':
  - type: text
    content: 'Ity volana ity ho voaloham-bolana ho anareo; dia ho voaloham-bolana amin''ny taona ho anareo izy. '
  '20':
  - type: text
    content: 'Tsy hihinana na inona na inona izay misy masirasira ianareo; fa samy hihinana mofo tsy misy masirasira ao amin''izay itoeranareo rehetra avy ianareo. '
  '21':
  - type: text
    content: 'Dia nampanalain''i Mosesy ny loholon''ny Isiraely rehetra, ka hoy izy taminy: Mandehana ianareo ka makà ondry ho anareo araka ny fokom-pirenenareo avy, ka vonoy ny Paska. '
  '22':
  - type: text
    content: 'Dia makà hysopa iray fihina, ka atsobohy amin''ny rà izay ao anatin''ny bakoly ary ny rà izay ao anatin''ny bakoly dia anenteno amin''ny tataom-baravarana sy ny tolana roa; ary aza misy mivoaka eo am-baravaran''ny tranonareo avy ianareo ambara-pahamarain''ny andro. '
  '23':
  - type: text
    content: 'Fa Jehovah handeha hamely ny Egyptiana; ary raha mahita ny rà eo amin''ny tataom-baravarana sy ny tolana roa Jehovah, dia handalo ny varavarana, ka tsy havelany hiditra ao an-tranonareo hamely anareo ny mpandringana. '
  '24':
  - type: text
    content: 'Ary hitandrina izany zavatra izany, ianareo ho lalàna ho anareo sy ho an''ny taranakareo mandrakizay. '
  '25':
  - type: text
    content: 'Ary rehefa tonga any amin''ny tany izay homen''i Jehovah anareo araka izay nolazainy ianareo, dia tandremo izany fanompoana izany. '
  '26':
  - type: text
    content: 'Ary raha hanontany anareo ny zanakareo hoe: Inona no anton''izao fanompoana ataonareo izao? '
  '27':
  - type: text
    content: 'dia holazainareo hoe: Izao dia famonoana ny Paskan''i Jehovah, Izay nandalo ny tranon''ny Zanak''Isiraely tany Egypta, raha namely ny Egyptiana Izy, fa namonjy ny tao an-tranontsika. Dia niondrika ny olona ka nivavaka.'
  '28':
  - type: text
    content: 'Ary dia nandeha ny Zanak''Isiraely ka nanao izany; araka izay nandidian''i Jehovah an''i Mosesy sy Arona no nataony. '
  '29':
  - type: text
    content: 'Ary nony namatonalina Jehovah namono ny lahimatoa rehetra tany amin''ny tany Egypta, hatramin''ny lahimatoan''i Farao izay nipetraka teo ambonin''ny seza fiandrianany ka hatramin''ny lahimatoan''ny babo izay tao amin''ny trano-maizina, mbamin''izay voalohan-teraky ny biby fiompy rehetra. '
  '3':
  - type: text
    content: 'Mitenena ianareo amin''ny fiangonana, dia ny Isiraely rehetra, ka manaova hoe: Amin''ny andro fahafolo amin''ity volana ity dia aoka samy haka zanak''ondry iray avy izy rehetra, araka ny fianakaviany, dia zanak''ondry iray avy no ho an''ny isan-trano; '
  '30':
  - type: text
    content: 'Ary nifoha raha mbola alina Farao, dia izy sy ny mpanompony rehetra ary ny Egyptiana rehetra, fa nisy fidradradradrana mafy tany Egypta, satria tsy nisy trano izay tsy nahafatesana. '
  '31':
  - type: text
    content: 'Dia nampaka an''i Mosesy sy Arona izy, raha mbola alina, ka nanao hoe: Mitsangàna, mialà eto amin''ny vahoakako ianareo sy ny Zanak''Isiraely, ary mandehana ka manompoa an''i Jehovah araka ny nolazainareo. '
  '32':
  - type: text
    content: 'Ary ny ondry aman''osinareo sy ny ombinareo dia ento koa araka izay efa nolazainareo, ka mandehana; fa mba tsofy rano aho. '
  '33':
  - type: text
    content: 'Dia nandodona ny olona ny Egyptiana ka nampandeha azy faingana hiala tamin''ny tany, satria hoy izy: Maty avokoa izahay rehetra. '
  '34':
  - type: text
    content: 'Dia nentin''ny olona ny kobany voalena, raha tsy mbola voaisy masirasira, sy ny viliany fanaova-mofo voafehy ao amin''ny lambany teny an-tsorony. '
  '35':
  - type: text
    content: 'Ary ny Zanak''Isiraely nanao araka ny tenin''i Mosesy ka nangataka firavaka volafotsy sy firavaka volamena ary fitafiana tamin''ny Egyptiana. '
  '36':
  - type: text
    content: Ary nataon'i Jehovah nahita fitia teo imason'ny Egyptiana ny olona, ka nomen'ireo azy izay nangatahiny, ka dia nofoanany ny Egyptiana.
  '37':
  - type: text
    content: 'Dia niainga tao Ramesesa ny Zanak''Isiraely ka nankany Sokota, dia lehilahy mahalia lalana tokony ho enina hetsy, afa-tsy ny zaza amim-behivavy. '
  '38':
  - type: text
    content: 'Ary nisy olona maro samy hafa firenena koa niara-niakatra taminy, ary ondry aman''osy sy omby, dia fananana be indrindra. '
  '39':
  - type: text
    content: 'Dia nanendy mofo tsy nisy masirasira tamin''ny koba voalena izay nentiny avy tany Egypta izy: fa tsy mbola voaisy masirasira izany, satria noroahina tany Egypta izy ka tsy nahazo nijanona sady tsy nahafehy vatsy ho azy.'
  '4':
  - type: text
    content: 'ary raha vitsy loatra ny iray trano ka tsy mahalany zanak''ondry iray, dia aoka izy sy izay namany mifanakaiky trano aminy haka araka izay isan''ny olona; ny olona rehetra samy araka izay tokony ho laniny avy no hanisanareo ny zanak''ondry. '
  '40':
  - type: text
    content: 'Ary ny andro nitoeran''ny Zanak''Isiraely tany Egypta dia telo-polo amby efa-jato taona. '
  '41':
  - type: text
    content: 'Ary rehefa tapitra ny telo-polo amby efa-jato taona, dia tamin''izany andro izany indrindra no nivoahan''ny antokony rehetra izay an''i Jehovah tamin''ny tany Egypta. '
  '42':
  - type: text
    content: 'Alina notandreman''i Jehovah izany, hitondrany azy hivoaka avy tamin''ny tany Egypta; eny, izany alina izany dia an''i Jehovah ka hotandreman''ny Zanak''Isiraely rehetra hatramin''ny taranany fara mandimby. '
  '43':
  - type: text
    content: 'Ary hoy Jehovah tamin''i Mosesy sy Arona: Izao no lalàn''ny Paska: Tsy hisy olona hafa firenena hihinana azy. '
  '44':
  - type: text
    content: 'Ary ny andevolahin''ny olona rehetra izay novidim-bola dia hoforana aloha vao mba hihinana. '
  '45':
  - type: text
    content: 'Ny vahiny sy ny mpikarama tsy mba hihinana azy. '
  '46':
  - type: text
    content: 'Ao an-trano iray no hihinanana azy; tsy hamoahanao eny ala-trano akory ny hena, ary tsy hisy hotapahinareo ny taolany na dia iray aza. '
  '47':
  - type: text
    content: 'Ny fiangonana, dia ny Isiraely rehetra, hitandrina izany. '
  '48':
  - type: text
    content: 'Ary raha misy mivahiny eo aminao ka mba te-hitandrina ny Paskan''i Jehovah, dia aoka hoforana ny lehilahy rehetra eo aminy vao manatona hitandrina izany, ka ho tahaka ny tompon-tany ihany izy; fa ny tsy voafora rehetra kosa dia tsy mahazo mihinana izany. '
  '49':
  - type: text
    content: 'Lalàna iray no ho amin''ny tompon-tany sy ny vahiny izay mitoetra eo aminareo. '
  '5':
  - type: text
    content: 'Zanak''ondry tsy misy kilema, dia lahy izay iray taona, no halainareo; halainareo amin''ny ondry na amin''ny osy izy; '
  '50':
  - type: text
    content: 'Dia nataon''ny Zanak''Isiraely rehetra izany: araka izay nandidian''i Jehovah an''i Mosesy sy Arona no nataony. '
  '51':
  - type: text
    content: Ary tamin'izany andro izany indrindra no nitondran'i Jehovah ny Zanak'Isiraely nivoaka avy tany amin'ny tany Egypta araka ny antokony.
  '6':
  - type: text
    content: 'ary hotehirizinareo izy hatramin''ny andro fahefatra ambin''ny folo amin''ity volana ity; dia hamono azy amin''ny hariva ny fiangonana, dia ny Isiraely rehetra. '
  '7':
  - type: text
    content: 'Ary hanalany ny rà, ka hatentiny amin''ny tolam-baravarana roa sy amin''ny tataom-baravaran''ny trano izay hihinanany azy. '
  '8':
  - type: text
    content: 'Dia hohaniny amin''izany alina izany ny hena; voatsatsika tamin''ny afo no hihinanany azy mbamin''ny mofo tsy misy masirasira sady hampiarahina amin''ny anana mangidy. '
  '9':
  - type: text
    content: 'Aza hanina manta na voahandro amin''ny rano izy, fa atsatsiho amin''ny afo mbamin''ny lohany sy ny tongony ary ny fadiny. '
