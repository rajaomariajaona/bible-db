document_id: EZK.48
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no anaran''ny firenena: Hatramin''ny farany avaratra any amoron-dranomasina amin''ny lalana mankany Hetlona any akaikin''i Hamata sy Hazar-enana, fari-tanin''i Damaskosy eo avaratra, any anilan''i Hamata; izany no ho lafiny atsinanana sy andrefana; anjara iray ho an''i Dana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary mifanolotra amin''ny fari-tanin''i Dana hatrany atsinanana ka hatrany andrefana dia iray koa ho an''i Asera. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary mifanolotra amin''ny fari-tanin''i Asera, hatrany atsinanana ka hatrany andrefana dia iray koa ho an''i Naftaly. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary mifanolotra amin''ny faritanin''i Naftaly, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Manase, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary mifanolotra amin''ny fari-tanin''i Manase, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Efraima. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary mifanolotra amin''ny fari-tanin''i Efraima, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an? i Robena. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary mifanolotra amin'ny fari-tanin'i Robena, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an'i Joda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary mifanolotra amin''ny faritanin''i Joda, hatrany atsinanana ka hatrany andrefana, no hisian''ilay tany hatokanareo, indimy arivo amby roa alin''ny volotara ny sakany, ary ny lavany mitovy amin''ny anjaran''ny sasany hatrany atsinanana ka hatrany andrefana; ary ny fitoerana masina no ho eo afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny tany izay hatokanareo ho an''i Jehovah, dia dimy arivo amby roa alina ny lavany, ary iray alina ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ho an''ny mpisorona izany tany masina voatokana izany, dimy arivo amby roa alina ny lavany avaratra, ary iray alina ny sakany andrefana, ary iray alina ny sakany atsinanana, ary dimy arivo amby roa alina ny lavany atsimo; ary ny fitoerana masin''i Jehovah no ho eo afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ho an''ny mpisorona izay nohamasinina avy amin''ny taranak''i zadota izany, dia ireo nitandrina ny nasaiko notandrenam ka tsy nivily tamin''ny nivilian''ny zanak''Isiraely, tahaka ny nivilian''ny Levita, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: eny, ho azy izany ho tany halaina amin'ilay efa voatokana, dia zavatra masina indrindra, mifanolotra amin'ny faritanin'ny Levita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny Levita koa dia hahazo ny mifanolotra amin''ny fari-tanin''ny mpisorona, dia dimy arivo amby roa alina ny lavany, ary iray alina ny sakany, eny, samy dimy arivo amby roa alina ny lavany, sy iray alina ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary tsy ho azony hamidy izany, na hatakalo, ary tsy hafindrany ny voaloham-bokatra amin'ny tany; fa masina ho an'i Jehovah izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny dimy arivo, ilay navela tamin''ny sakany mifanolotra amin''ny dimy arivo amby roa alina, dia tsy masina, fa ho an''ny tanàna, ho fonenana sy ho tany fiandrasana; ary ny tanàna no ho ao afovoany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izao no ohany: Ny avaratra ho dinan-jato amby efatra arivo, ary ny atsimo ho diman-jato amby efatra arivo, ary ny atsinanana ho diman-jato amby efatra arivo, ary ny andrefana ho diman-jato amby efatra arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny amin''ny tany fiandrasana momba ny tanàna, ny eo amin''ny avaratra dia ho dimam-polo amby roan-jato, ary ny eo amin''ny atsinanana dia ho dimam-polo amby roan-jato, ary ny eo amin''ny andrefana dia ho dimam-polo amby roan-jato. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny lavany sisa mifanolotra amin''ny anjara masina voatokana dia iray alina atsinanana ary iray alina andrefana, ary hifanolotra amin''ny anjara masina voatokana izany; ary ny vokany hohanin''ny mpiasa ao an-tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary izay mpiasa ao an-tanàna avy amin''ny firenen''Isiraely rehetra no hiasa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny tany voatokana rehetra dia dimy arivo amby roa alina sokera; ny ampahefatry ny anjara masina voatokana dia halainareo ho zara-tany momba ny tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ho an''ny mpanjaka ny sisa an-daniny roa amin''ny anjara masina voatokana sy ny zara-tany momba ny tanàna; mifanolotra amin''ny dimy arivo amby roa alina amin''ny anjara voatokana hatramin''ny fari-tany atsinanana, ary mifanolotra amin''ny dimy arivo amby roa alina hatramin''ny fari-tany andrefana, mifanolotra amin''ireo anjaran''ny sasany, ho an''ny mpanjaka izany; ary ny anjara masina voatokana sy ny trano fitoerana masina no ho eo aforoany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary hatramin'ny zara-tanin'ny Levita sy ny zara-tany momba ny tanàna, sy ao ampovoan'ny an'ny mpanjaka, anelanelan'ny fari-tanin'i Jada sy Benjamina, dia ho an'ny mpanjaka izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny amin''ny firenena sisa, dia hatramin''ny lafiny atsinanana ka hatramin''ny andrefana, dia hisy anjara iray ho an''i Benjamina. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary mifanolotra amin''ny faritanin''i Benjamina, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Simeona. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary mifanolotra amin''ny faritanin''i Simeona, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''Isakara. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary mifanolotra amin''ny faritanin''Isakara, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Zebolona. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary mifanolotra amin''ny faritanin''i Zebolona, hatrany atsinanana ka hatrany andrefana, dia iray koa ho an''i Gada. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary mifanolotra amin''ny faritanin''i Gada, amin''ny lafiny atsimo, dia hatrany Tamara sy ny ranon''i Meriba any Kadesy sy ny lohasahan-driaka ka hatramin''ny Ranomasina Lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izany no tany hozarainareo amin'ny filokana ho an'ny firenen'Isiraely ho lovany, ary izany no ho anjarany ary, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary izao no ohatry ny tanàna amin''ny lafiny avaratra: diman-jato amby efatra arivo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny anaran''ny vavahady dia ho toy ny anaran''ny firenen''Isiraely: ny vavahady telo avaratra, dia vavahadin''i Robena ny iray vavahadin''i Joda ny iray, vavahadin''i Levy ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary amin''ny atsinanana dimanjato amby efatra arivo; ary ny vavahady telo, dia vavahadin''i Josefa ny iray, vavahadin''i Benjamina ny iray, ary vavahadin''i Dana ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary amin''ny atsimo diman-jato amby efatra arivo ohatra, ary ny vavahady telo, dia vavahadin''i Simeona ny iray, vavahadin''Isakara ny iray, vavahadin''i Zebolona ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary amin''ny andrefana dimanjato amby efatra arivo sy vavahady telo, dia vavahadin''i Gada ny iray, vavahadin''i Asera ny iray, vavahadin''i Naftaly ny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Valo arivo amby iray alina ny manodidina. Ary ny anaran'ny tanàna hatramin'izay andro izay dia Jehovah no ao.
