document_id: ROM.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitondran-tena mahamendrika ny Kristiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Koa amin'izany mangataka aminareo aho, ry rahalahy, noho ny famindram-pon'Andriamanitra, mba hatolotrareo ny tenanareo ho fanatitra velona, masina, sitrak'Andriamanitra, dia fanompoam-panahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fanompoam-pivavahana'
    marker-yv: yv-n
  - type: text
    text: ' mety hataonareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary aza manaraka ny fanaon'izao tontolo izao; fa miovà amin'ny fanavaozana ny saina, hamantaranareo ny sitrapon'Andriamanitra, dia izay tsara sady ankasitrahana no marina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. tanteraka
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa noho ny fahasoavana nomena ahy dia izao no lazaiko amin''ny olona rehetra izay eo aminareo: Aza mihevitra mihoatra noho izay tokony hoheverina; fa mihevera izay onony araka ny ohatry ny finoana izay nozarain''Andriamanitra ho anareo avy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa toy ny ananantsika zavatra maro momba ny tena iray, nefa tsy mitovy asa izay rehetra momba ny tena, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia toy izany koa isika, na dia maro aza, dia tena iray ihany ao amin''i Kristy, ary samy miara-momba ny tena isika rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary satria samy manana fanomezam-pahasoavana samy hafa isika, araka ny fahasoavana izay nomena antsika: raha faminaniana, dia aoka hatao araka ny ohatry ny finoana; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'raha fanompoana amin''ny fiangonana, dia aoka ho amin''ny fanompoana; raha mampianatra, dia aoka ho amin''ny fampianarana; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'raha mananatra, dia aoka ho amin''ny fananarana; izay manome, dia aoka ho amin''ny fahatsoram-po; izay manapaka, dia aoka ho amin''ny fahazotoana; izay mamindra fo, dia aoka ho amin''ny fifaliana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aoka ny fitiavana ho amin''ny tsi-fihatsaram-belatsihy; mankahalà ny ratsy; mifikira amin''ny tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mifankatiava araka ny fifankatiavan''ny mpirahalahy; mitariha lalana amin''ny fifanomezam-boninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mazotoa, fa aza malaina, ary aoka hafana fo amin''ny fanompoana ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mifalia amin''ny fanantenana; miareta amin''ny fahoriana; mahareta amin''ny fivavahana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Miantrà ny olona masina araka izay ilainy; mazotoa mampiantrano vahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Misaora izay manenjika anareo; misaora, fa aza manozona. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Miaraha mifaly amin''izay mifaly, ary miaraha mitomany amin''izay mitomany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Miraisa saina. Aza mihevitra izay hiavonavonana, fa aoka mba ho zatra amin'ny fietrena ianareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: manetre tena amin''ny malahelo'
    marker-yv: yv-n
  - type: text
    text: '. Aza manao ny tenanareo ho hendry. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza mamaly ratsy na amin''iza na amin''iza. Miomàna hanao izay mahamendrika eo imason''ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha azo atao, dia ataovy izay hihavananareo amin''ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ry malala, aza mamaly ratsy, fa omeo lalana ny fahatezerana; fa voasoratra hoe: Ahy ny famaliana; Izaho no hamaly, hoy Jehovah (Deo. 32. 35). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha noana ny fahavalonao, omeo hanina izy; raha mangetaheta izy, omeo hosotroiny; fa raha manao izany ianao, dia hanambatra vainafo ho eo an-dohany (Oha. 25. 21, 22). '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aza mety ho resin'ny ratsy ianao, fa reseo amin'ny soa ny ratsy.
