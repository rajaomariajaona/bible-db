document_id: MAT.16
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny Fariseo sy ny Sadoseo nankeo aminy, dia naka fanahy Azy ka nangataka Azy haneho famantarana aminy avy any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Izy namaly ka nanao taminy hoe: Nony hariva, dia hoy ianareo: Ho tsara ny andro, fa mena ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony maraina, dia hoy ianareo: Ho ratsy ny andro, fa mena sy manjombona ny lanitra. Fantatrareo ny hamantatra ny tarehin''ny lanitra, fa ny famantarana ny fotoana dia tsy hainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay taranaka ratsy fanahy sy mijangajanga dia fatra-pitady famantarana; nefa tsy misy famantarana homena azy, afa-tsy ny famantarana ny amin''i Jona ihany. Ary nandao azy Jesosy ka lasa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary rehefa tonga teny am-pita ny mpianatra, dia nanadino hitondra mofo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Jesosy taminy: Mihevera, ka mitandrema ianareo, fandrao azon''ny masirasiran''ny Fariseo sy ny Sadoseo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niara-nisaina izy ka nanao hoe: Ny tsy nitondrantsika mofo angaha izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Jesosy nahalala izany, dia nanao hoe: Nahoana ianareo, ry kely finoana, no miara-misaina satria tsy manana mofo? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy mbola mahafantatra va ianareo, ary tsy tsaroanareo va ny mofo dimy ho an''ny dimy arivo, ka firy harona moa no nangoninareo? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'na ny mofo fito ho an''ny efatra arivo, ka firy sobiky moa no nangoninareo? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ahoana no tsy ahafantaranareo fa tsy ny amin''ny mofo no nolazaiko taminareo? Fa tandremo, fandrao azon''ny masirasiran''ny Fariseo sy ny Sadoseo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia fantany fa tsy nasainy hitandrina izy, fandrao azo'ny masirasira fanaovana mofo, fa andrao azon'ny fampianaran'ny Fariseo sy ny Sadoseo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa tonga tany amin''ny faritanin''i Kaisaria-filipo Jesosy, dia nanontany ny mpianany Izy ka nanao hoe: Ataon''ny olona ho iza moa ny Zanak''olona'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Aho)'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy ireo: Hoy ny sasany: Jaona Mpanao-batisa; ary hoy ny sasany: Elia; ary hoy ny sasany: Jeremia, na anankiray amin''ny mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Jesosy taminy: Fa ianareo kosa manao Ahy ho iza? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary namaly Simona Petera ka nanao hoe: Hianao no Kristy, Zanak''Andriamanitra velona. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia namaly Jesosy ka nanao taminy hoe: Sambatra ianao, ry Simona Bar-jona; fa tsy nofo aman-drà no naneho anao izany, fa ny Raiko Izay any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Izaho milaza aminao koa: Hianao no Petera'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Petera = Vato; izahao Jao.1, 42
    marker-yv: yv-n
  - type: text
    text: ', ary ambonin''ity vatolampy ity no haoriko ny fiangonako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ; ary ny vavahadin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. Hadesy
    marker-yv: yv-n
  - type: text
    text: ' tsy haharesy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Homeko anao ny fanalahidin''ny fanjakan''ny lanitra; ka na inona na inona fehezinao eto ambonin''ny tany dia hofehezina any an-danitra; ary na inona na inona vahanao etỳ ambonin''ny tany dia hovahana any an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary tamin''izany dia nandrara ny mpianatra Izy mba tsy hilaza amin''olona akory fa Izy no Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hatramin''izany no vao natoron''i Jesosy ny mpianany fa tsy maintsy hankany Jerosalema Izy ka hampijalin''ny loholona sy ny lohan''ny mpisorona ary ny mpanora-dalàna, dia hovonoina, ary hatsangana amin''ny andro fahatelo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Petera nanohina Azy hitanila kely ka niteny mafy Azy hoe: Sanatria aminao izany, Tompoko! Tsy ho aminao tokoa izany! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa Izy nihodina ka niteny tamin''i Petera hoe: Mankanesa ato ivohoko, ry Satana; fahatafintohinana amiko ianao, satria tsy misaina izay an''Andriamanitra ianao, fa izay an''ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy Jesosy tamin''ny mpianany: Raha misy olona ta-hanaraka Ahy, aoka izy handà ny tenany sy hitondra ny hazo fijaliany ka hanaraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa na iza na iza no ta-hamonjy ny ainy, dia hahavery azy; ary na iza na iza no hahavery ny ainy noho ny amiko, dia hahazo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa inona moa no soa ho azon''ny olona, raha mahazo izao tontolo izao, kanefa very ny ainy? Ary inona no homen''ny olona ho takalon''ny ainy? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa ho avy ny Zanak''olona amin''ny voninahitry ny Rainy, mbamin''ny anjeliny, dia hamaly ny olona rehetra araka ny nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny Zanak''olona avy amin''ny fanjakany.'
