document_id: PRO.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tenin'i Agora
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny teny mavesa-danja nataon'i Agora, zanak'i Jake
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny tenin''i Agora, zanak''i Jake, avy any Masa'
    marker-yv: yv-n
  - type: text
    text: ', dia ny teny nataon-dralehilahy tamin''Itiela, eny, tamin''Itiela sy Okala: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izaho dia biby
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nanasa-tena aho, Andriamanitra ô, nanasa-tena aho, Andriamanitra ô, ka lany ny heriko fa tahaka ny biby aho'
    marker-yv: yv-n
  - type: text
    text: ', fa tsy olona, Ary tsy manan-tsain''olombelona aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy nianatra fahendrena aho, Na nahazo ny fahalalana ny Iray Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza no efa niakatra tany an-danitra sady nidina indray? Iza no nahangona ny rivotra tao an-tànany? Iza no nahafono ny rano tamin'ny lambany? Iza no nahamisy ny faran'ny tany rehetra? Iza no anarany, ary iza no anaran'ny zanany? Fa toa fantatrao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny tenin''Andriamanitra dia voadio avokoa; Ampinga ho an''izay mialoka aminy Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza manampy ny teniny, fandrao hanariny ianao Ka ho hita fa mpandainga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Zavatra roa loha no angatahiko aminao; Ka aza lavinao, dieny tsy mbola maty aho: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ampanalaviro ahy ny zava-poana sy ny lainga; Aza manome ahy alahelo na harena; Fahano aho amin''izay anjara-hanina sahaza ho ahy; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fandrao, raha voky aho, dia handà Ka hanao hoe: Iza moa Jehovah? Ary andrao, raha tonga malahelo aho, dia hangalatra Ka hanamavo ny anaran''Andriamanitro. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza manendrikendrika ny mpanompo amin'ny tompony, Fandrao hozoniny ianao ka hahazo heloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Misy taranaka izay manozona ny rainy Sady tsy misaotra ny reniny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Misy taranaka manao azy ho madio, Kanjo tsy voasasa ho afaka amin''ny fahalotoany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Misy taranaka, endrey ny fiandrandran''ny masony Sy ny fisondrotry ny hodi-masony! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Misy taranaka izay toy ny sabatra ny nifiny, Ary toy ny antsy ny vazany, Hamongotra ny ory tsy ho amin'ny tany Sy ny malahelo tsy ho amin'ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny dinta manan-janakavavy roa, dia ny hoe: Omeo, Omeo. Misy zavatra telo tsy mety voky, Eny, efatra aza no tsy manao hoe: Aoka izay: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: '; sy ny kibo momba, Ny tany izay tsy vonton-drano, Ary ny afo koa no tsy mba manao hoe: Aoka izay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny maso izay miandranandrana amin-dray Sady tsy mety manaja reny Dia hotsaingotsaingohin'ny goaika eny an-dohasahan-driaka Ary hohanin'ny zana-boromahery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Misy zavatra telo mahagaga ka tsy takatro, Eny, efatra aza no tsy fantatro: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny nalehan''ny voromahery teny amin''ny habakabaka, Ny nalehan''ny bibilava teny amin''ny vatolampy, Ny nalehan''ny sambo teny amin''ny ranomasina, Ary ny nalehan''ny lehilahy tamin''ny tovovavy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tahaka izany koa no fanaon''ny vehivavy mpijangajanga: Homana izy, dia mamafa ny vavany, Ka dia manao hoe: Tsy nanao ratsy aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izao fitondrana telo izao no tsy mampandry ny tany, Eny, zavatra efatra aza no tsy zakany; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha ny andevo no tonga mpanjaka, Raha ny adala no voky hanina, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha ny vehivavy lany zara
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ankahalaina
    marker-yv: yv-n
  - type: text
    text: ' no ampakarina, Ary raha ny ankizivavy no mandova'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mandimby'
    marker-yv: yv-n
  - type: text
    text: ' ny tompovaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izao zavatra efatra izao dia kely amin''ny etỳ ambonin''ny tany, Nefa hendry sady mahay: '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny vitsika dia firenena tsy matanjaka, Nefa manangona ny haniny amin''ny fahavaratra izy; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny biby hyraka dia firenena tsy manan-kery, Nefa manao ny tranony ao amin''ny harambato izy; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny valala tsy manana mpanjaka, Nefa izy rehetra miainga manao antokony tsara; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny antsiantsy dia mandady amin'ny tànany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: azonao samborin-tanana'
    marker-yv: yv-n
  - type: text
    text: ', Nefa tonga ao an-tranon''ny mpanjaka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Misy zavatra telo izay tsara famindra, Eny, efatra aza no tsara fandeha; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia ny liona, izay mahery indrindra amin''ny biby Ka tsy mihemotra na amin''inona na amin''inona, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny soavaly voaomana hiady
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. voafehy kibo
    marker-yv: yv-n
  - type: text
    text: ' sy ny osilahy Ary ny mpanjaka tsy azo toherina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: otronin''ny vahoakany'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha adala ka nanandra-tena ianao, Na efa nisaina hanao ratsy, Dia tampeno ny tananao ny vavanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny fanontsankontsanana ny ronono no miteraka rononomandry, Ny fanolanana ny orona no miteraka rà; Ary ny fanetsiketsehana ny fahatezerana no miteraka ady.
