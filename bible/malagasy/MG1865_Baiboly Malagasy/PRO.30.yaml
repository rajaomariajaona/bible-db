document_id: PRO.30,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tenin'i Agora
  - type: text
    content: Ny teny mavesa-danja nataon'i Agora, zanak'i Jake
  - type: note
    content: 'Na: Ny tenin''i Agora, zanak''i Jake, avy any Masa'
  - type: text
    content: ', dia ny teny nataon-dralehilahy tamin''Itiela, eny, tamin''Itiela sy Okala: '
  '10':
  - type: text
    content: Aza manendrikendrika ny mpanompo amin'ny tompony, Fandrao hozoniny ianao ka hahazo heloka.
  '11':
  - type: text
    content: 'Misy taranaka izay manozona ny rainy Sady tsy misaotra ny reniny. '
  '12':
  - type: text
    content: 'Misy taranaka manao azy ho madio, Kanjo tsy voasasa ho afaka amin''ny fahalotoany. '
  '13':
  - type: text
    content: 'Misy taranaka, endrey ny fiandrandran''ny masony Sy ny fisondrotry ny hodi-masony! '
  '14':
  - type: text
    content: Misy taranaka izay toy ny sabatra ny nifiny, Ary toy ny antsy ny vazany, Hamongotra ny ory tsy ho amin'ny tany Sy ny malahelo tsy ho amin'ny olona.
  '15':
  - type: text
    content: 'Ny dinta manan-janakavavy roa, dia ny hoe: Omeo, Omeo. Misy zavatra telo tsy mety voky, Eny, efatra aza no tsy manao hoe: Aoka izay: '
  '16':
  - type: text
    content: Ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: '; sy ny kibo momba, Ny tany izay tsy vonton-drano, Ary ny afo koa no tsy mba manao hoe: Aoka izay.'
  '17':
  - type: text
    content: Ny maso izay miandranandrana amin-dray Sady tsy mety manaja reny Dia hotsaingotsaingohin'ny goaika eny an-dohasahan-driaka Ary hohanin'ny zana-boromahery.
  '18':
  - type: text
    content: 'Misy zavatra telo mahagaga ka tsy takatro, Eny, efatra aza no tsy fantatro: '
  '19':
  - type: text
    content: 'Ny nalehan''ny voromahery teny amin''ny habakabaka, Ny nalehan''ny bibilava teny amin''ny vatolampy, Ny nalehan''ny sambo teny amin''ny ranomasina, Ary ny nalehan''ny lehilahy tamin''ny tovovavy. '
  '2':
  - type: text
    content: Izaho dia biby
  - type: note
    content: 'Na: Nanasa-tena aho, Andriamanitra ô, nanasa-tena aho, Andriamanitra ô, ka lany ny heriko fa tahaka ny biby aho'
  - type: text
    content: ', fa tsy olona, Ary tsy manan-tsain''olombelona aho. '
  '20':
  - type: text
    content: 'Tahaka izany koa no fanaon''ny vehivavy mpijangajanga: Homana izy, dia mamafa ny vavany, Ka dia manao hoe: Tsy nanao ratsy aho.'
  '21':
  - type: text
    content: 'Izao fitondrana telo izao no tsy mampandry ny tany, Eny, zavatra efatra aza no tsy zakany; '
  '22':
  - type: text
    content: 'Raha ny andevo no tonga mpanjaka, Raha ny adala no voky hanina, '
  '23':
  - type: text
    content: Raha ny vehivavy lany zara
  - type: note
    content: Heb. ankahalaina
  - type: text
    content: ' no ampakarina, Ary raha ny ankizivavy no mandova'
  - type: note
    content: 'Na: mandimby'
  - type: text
    content: ' ny tompovaviny. '
  '24':
  - type: text
    content: 'Izao zavatra efatra izao dia kely amin''ny etỳ ambonin''ny tany, Nefa hendry sady mahay: '
  '25':
  - type: text
    content: 'Ny vitsika dia firenena tsy matanjaka, Nefa manangona ny haniny amin''ny fahavaratra izy; '
  '26':
  - type: text
    content: 'Ny biby hyraka dia firenena tsy manan-kery, Nefa manao ny tranony ao amin''ny harambato izy; '
  '27':
  - type: text
    content: 'Ny valala tsy manana mpanjaka, Nefa izy rehetra miainga manao antokony tsara; '
  '28':
  - type: text
    content: Ny antsiantsy dia mandady amin'ny tànany
  - type: note
    content: 'Na: azonao samborin-tanana'
  - type: text
    content: ', Nefa tonga ao an-tranon''ny mpanjaka izy. '
  '29':
  - type: text
    content: 'Misy zavatra telo izay tsara famindra, Eny, efatra aza no tsara fandeha; '
  '3':
  - type: text
    content: 'Tsy nianatra fahendrena aho, Na nahazo ny fahalalana ny Iray Masina. '
  '30':
  - type: text
    content: 'Dia ny liona, izay mahery indrindra amin''ny biby Ka tsy mihemotra na amin''inona na amin''inona, '
  '31':
  - type: text
    content: Ny soavaly voaomana hiady
  - type: note
    content: Heb. voafehy kibo
  - type: text
    content: ' sy ny osilahy Ary ny mpanjaka tsy azo toherina'
  - type: note
    content: 'Na: otronin''ny vahoakany'
  - type: text
    content: .
  '32':
  - type: text
    content: Raha adala ka nanandra-tena ianao, Na efa nisaina hanao ratsy, Dia tampeno ny tananao ny vavanao.
  '33':
  - type: text
    content: Ny fanontsankontsanana ny ronono no miteraka rononomandry, Ny fanolanana ny orona no miteraka rà; Ary ny fanetsiketsehana ny fahatezerana no miteraka ady.
  '4':
  - type: text
    content: Iza no efa niakatra tany an-danitra sady nidina indray? Iza no nahangona ny rivotra tao an-tànany? Iza no nahafono ny rano tamin'ny lambany? Iza no nahamisy ny faran'ny tany rehetra? Iza no anarany, ary iza no anaran'ny zanany? Fa toa fantatrao!
  '5':
  - type: text
    content: 'Ny tenin''Andriamanitra dia voadio avokoa; Ampinga ho an''izay mialoka aminy Izy. '
  '6':
  - type: text
    content: Aza manampy ny teniny, fandrao hanariny ianao Ka ho hita fa mpandainga.
  '7':
  - type: text
    content: 'Zavatra roa loha no angatahiko aminao; Ka aza lavinao, dieny tsy mbola maty aho: '
  '8':
  - type: text
    content: 'Ampanalaviro ahy ny zava-poana sy ny lainga; Aza manome ahy alahelo na harena; Fahano aho amin''izay anjara-hanina sahaza ho ahy; '
  '9':
  - type: text
    content: 'Fandrao, raha voky aho, dia handà Ka hanao hoe: Iza moa Jehovah? Ary andrao, raha tonga malahelo aho, dia hangalatra Ka hanamavo ny anaran''Andriamanitro. '
