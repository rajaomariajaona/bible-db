document_id: PSA.50,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny fivavahana marina sy ny fanatitra sitrak'Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salamo nataon i Asafa. Andriamanitra Andriananahary, dia Jehovah, no miteny ka miantso ny tany hatramin''ny fiposahan''ny masoandro ka hatramin''ny filentehany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Ahy ny biby rehetra any an''ala, sy ny biby fiompy arivoarivo eny an-tendrombohitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatro ny vorona rehetra eny an-tendrombohitra; ary eto amiko ny zava-mihetsiketsika eny an-tsaha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mba noana Aho, dia tsy hilaza aminao; fa Ahy izao tontolo izao sy izay rehetra eo aminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hihinana ny nofon''ombilahy va Aho, na hisotro ny ran''osilahy? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manatera fanati-pisaorana ho an''Andriamanitra; ary efao amin''ny Avo Indrindra ny voadinao; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Antsoy Aho amin''ny andro fahoriana, dia hamonjy anao Aho, ka hanome voninahitra Ahy ianao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin''ny ratsy fanahy kosa dia hoy Andriamanitra: ahoana no itorianao ny lalàko sy itondranao ny fanekeko eo am-bavanao? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianao mankahala fananarana, ary arianao eo ivohonao ny teniko. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mahita mpangalatra ianao, dia faly hikambana aminy, ary miray anjara amin''ny mpijangajanga. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vavanao alefanao hiteny ratsy, ary ny lelanao mamorom-pitaka. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy ao Ziona, izay tena fahatsaran-tarehy, no amirapiratan'Andriamanitra.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mipetraka miteny ratsy ny rahalahinao ianao, sady manendrikendrika
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: manosika'
      marker-yv: yv-n
    - type: text
      text: ' ny zanakalahin-dreninao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no nataonao, nefa nangina ihany Aho, ka dia nataonao fa mitovy aminao ihany Aho! Hananatra anao Aho ka handahatra izany eo imasonao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihevera izany ankehitriny, ianareo izay manadino an''Andriamanitra, fandrao hamiravira Aho, ka tsy hisy hamonjy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manatitra fanati-pisaorana no manome voninahitra Ahy; ary izay mitandrina ny lalany no hanehoako ny famonjen'Andriamanitra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy Andriamanitsika ka tsy hangina; afo no mandevona eo alohany, ary tafio-drivotra mahery no manodidina Azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miantso ny lanitra any ambony Izy, sy ny tany koa, mba hitsaràny ny olony: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Angony etỳ amiko ny oloko masina izay manao fanekena amiko amin''ny fanatitra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hasehon'ny lanitra ny fahamarinany; fa Andriamanitra no Mpitsara.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihainoa, ry oloko, fa hiteny Aho; Ry Isiraely ô, fa hanambara aminao Aho; Izaho no Andriamanitra, dia Andriamanitrao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy ny fanatitrao no ananarako anao, ary efa eo anatrehako mandrakariva ny fanatitra doranao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy maka vantotr''ombilahy amin''ny tranonao Aho, na osilahy amin''ny valanao; '
