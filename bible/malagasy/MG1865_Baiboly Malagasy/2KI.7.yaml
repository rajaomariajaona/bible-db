document_id: 2KI.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa hoy kosa Elisa: Mihainoa ny tenin''i Jehovah ianareo: Izao no lazain''i Jehovah: Rahampitso toy izao dia ho sekely iray ny vidin''ny koba tsara toto eran''ny famarana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. sea
      marker-yv: yv-n
    - type: text
      text: ', ary ho sekely iray koa ny vidin''ny vary hordea indroan''ny famarana ao am-bavahadin''i Samaria. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia avy izy ka niantso ny mpiambina ny vavahadin-tanàna ary nilaza taminy hoe: Tonga tany an-tobin''ny Syriana izahay, ary indro fa tsy misy olona ao, na feon''olona akory aza, fa soavaly mifatotra sy boriky mifatotra, ary ny lay nilaozana fotsiny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary niantso ny mpiambina ny vavahady izy, ary ireo kosa nilaza izany tao an-tranon''ny mpanjaka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny mpanjaka nifoha raha mbola alina ka niteny tamin''ny mpanompony hoe: Aoka hambarako aminareo ange izao ataon''ny Syriana amintsika izao e! Fantany fa mosarena isika, ka dia niala tamin''ny toby izy mba hanotrika any an-tsaha ka nanao hoe: Raha mivoaka avy any an-tanàna izy dia hataontsika sambo-belona, ary dia hidirantsika ny tanàna. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ny mpanompony anankiray namaly hoe: Mifona aminao aho, aoka hangalana soavaly dimy amin''izay sisa ato an-tanàna (indro toy ny hamaroan''ny Isiraely rehetra izay mitoetra ato ireo; eny, tahaka ny hamaroan''ny Isiraely rehetra izay efa lany ritra ireo) ka haniraka hizaha izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nalainy ny soavalin''ny kalesy roa; ary ny mpanjaka naniraka hanaraka ny miaramilan''ny Syriana ka nanao hoe: Mandehana, ka izahao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia nandeha nanaraka azy hatrany Jordana ireo; ary, indreny, ny lalambe rehetra feno fitafiana sy fanaka izay efa narian'ny Syriana, raha nandositra tamin'ny fahatairana izy. Ary ny iraka niverina ka nilaza tamin'ny mpanjaka.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nivoaka ny olona ka namabo ny tobin''ny Syriana. Koa ny koba tsara toto eran''ny famarana, dia sekely iray monja no vidiny, ary ny vary hordea indroan''ny famarana, dia sekely iray ihany koa ny vidiny, araka ny tenin''i Jehovah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ilay mpanafika malaza izay nitehenan''ny mpanjaka tamin''ny tànany dia notendreny hiambina ny vavahady; ary voahitsaka teo am-bavahady izy, ka dia maty araka izay nolazain''ny lehilahin''Andriamanitra, dia ilay nolazainy, raha nidina tany aminy ny mpanjaka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa dia tanteraka ilay teny nolazain''ny lehilahin''Andriamanitra tamin''ny mpanjaka hoe: Raha, maraina toy izao ao am-bavahadin''i Samaria dia sekely iray monja no ho vidin''ny vary hordea indroan''ny famarana, ary ho sekely iray ihany koa ny vidin''ny koba tsara toto eran''ny famarana; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ka izany mpanafika malaza izany no namaly ilay lehilahin''Andriamanitra hoe: Indro, na dia hanao varavarankely amin''ny lanitra aza Jehovah, dia hisy izany zavatra izany va? Fa hoy Elisa: Indro, ho hitan''ny masonao indrindra izany, fa tsy mba hihinananao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa namaly ny lehilahin''Andriamanitra ilay mpanafika malaza izay nitehenan''ny mpanjaka tamin''ny tànany ka nanao hoe: Indro, na dia hanao varavarankely amin''ny lanitra aza Jehovah, dia hisy izany zavatra izany va? Ary hoy Elisa: Indro, ho hitan''ny masonao indrindra izany, nefa tsy mba hihinananao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary dia toy izany no nanjo azy, fa ny olona nanitsaka azy teo am-bavahady, ka dia maty izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nisy boka efa-dahy teo anoloan''ny vavahady nifampiresaka hoe: Ahoana no ipetrahantsika foana eto mandra-pahafatintsika? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Raha hoy isika: Hankato an-tanàna isika, dia misy mosary ao an-tanàna, ka ho faty ao isika; ary raha hipetraka eto isika, dia ho faty ihany koa. Koa andeha isika hankany amin-ny tobin''ny Syriana; ka raha mamelona antsika moa izy, dia ho velona isika; fa raha mamono antsika kosa izy, dia ho faty ihany isika. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia niainga izy rehefa takariva hankany amin''ny tobin''ny Syriana; ary nony tonga teny an-tsisin''ny toby izy, indro, tsy nisy olona akory tao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa Jehovah efa nampandre ny miaramilan''ny Syriana ny fikodiadian-kalesy sy ny fandehan''ny soavaly, dia ny firodondrodon''ny miaramila be; ary niresaka hoe izy: Injao, fa ny mpanjakan''ny Isiraely efa nanamby ny mpanjakan''ny Hetita sy ny mpanjakan''ny Egyptiana hiady amintsika. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia niainga izy ka riatra nandositra tamin''iny takariva iny ihany, ary nilaozany fotsiny ny tobiny, dia ny lainy sy ny soavaliny ary ny borikiny, ka lasa nandositra hamonjy ny ainy izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary rehefa tonga teny an-tsisin''ny toby ireo boka ireo, dia niditra tao amin''ny lay anankiray Izy ka nihinana sy nisotro, dia naka volafotsy sy volamena ary fitafiana, dia nandeha ka nanafina izany; ary nandeha indray izy ka niditra tao amin''ny lay anankiray koa sady naka avy tao, dia nandeha ka nanafina izany koa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nifampilaza hoe izy: Tsy mety izao ataontsika izao; ity andro ity dia andro filazana ny mahafaly, nefa mangina isika; raha hitoetra eto mandra-pahamarain''ny andro isika, dia hanan-keloka; fa andeha isika hilaza ao an-tranon''ny mpanjaka. '
