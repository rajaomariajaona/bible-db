document_id: PRO.20,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mpaniratsira ny divay, ary mpitabataba ny toaka, Koa izay miraikiraiky azon'izany dia tsy hendry.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny vato mizana samy hafa sy ny vata famarana samy hafa Dia samy fahavetavetana eo imason''i Jehovah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Na dia ny zaza aza dia mampiseho amin'ny fanaony Na madio sy mahitsy ny fitondran-tenany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ny sofina mandre sy ny maso mahita Dia samy nataon'i Jehovah avokoa.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aza tia torimaso ianao, fandrao tonga malahelo; Ahirato ny masonao, dia ho voky hanina ianao.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ratsy! ratsy! hoy ny mpividy; Kanjo nony lasa izy, dia mandoka tena.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ao ihany ny volamena sy ny voahangy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: perla'
      marker-yv: yv-n
    - type: text
      text: ' betsaka; Fa ny molotra misy fahalalana no ravaka soa.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Alao ny lambany, fa efa niantoka olon-kafa izy, Ary tano ho solon'ny vahiny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: vahiny janga'
      marker-yv: yv-n
    - type: text
      text: ' niantohany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mamin'ny olona ny hanina azo amin'ny fitaka; Kanjo ho feno fasika ny vavany any am-parany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny hevitra rehetra dia aorin'ny fisainana, Ary ny fahaizana mandamina tsara no entonao miady.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izay mandehandeha manaratsy dia manambara ny hevitra afenina, Koa aza miraharaha amin''izay mibedibedy foana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny fampitahoran'ny mpanjaka dia toy ny fieron'ny liona tanora; Izay mampahatezitra azy dia mankahà-doza hihatra amin'ny ainy,
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Izay manozona ny rainy na ny reniny, Dia ho faty ao amin'ny alim-pito ny jirony.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ny harena malaky azo foana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mahamahimahina'
      marker-yv: yv-n
    - type: text
      text: ' eo am-boalohany Dia tsy hotahina any am-parany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Aza manao hoe: Hamaly ny ratsy nataony aho; Fa andraso Jehovah, fa Izy no hamonjy anao.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fahavetavetana eo imason''i Jehovah ny vato samy hafa, Ary ny mizana mandainga dia tsy tsara. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Avy amin'i Jehovah ny dian'ny olona, Ary hataon'izay olombelona ahoana no hahafantatra ny lalany?
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fandrika amin''ny olona ny malaky manao hoe: Zavatra masina ity; Ka nony vita ny voady, vao mamototra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny mpanjaka hendry mikororoka manaisotra ny ratsy fanahy Sady mitarika ny kodia fivelezana eo amboniny.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jiron''i Jehovah ny fanahin''ny olona, Itsilovana ny efitrefitra rehetra ao am-po. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Famindram-po sy fahamarinana no miaro ny mpanjaka, Ary ampitoeriny amin'ny famindram-po ny seza fiandrianany.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Voninahitry ny zatovo ny fahatanjahany, Ary ravaky ny anti-panahy ny volo fotsy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Voninahitry ny olona ny hanalavitra ny ady; Fa ny adala rehetra kosa misafoaka.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ny fampangirifiriana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ratra avy amin'ny kapoaka
      marker-yv: yv-n
    - type: text
      text: ' dia mahafaka ny faharatsiana, Ary ny kapoka mahadio ny efitrefitra ao an-kibo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny malaina tsy mety miasa amin'ny ririnina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: noho ny ririnina; na: noho ny haben''ny vokatra'
      marker-yv: yv-n
    - type: text
      text: ', Ka dia hangataka izy raha fararano, fa tsy hahazo.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Rano lalina ny hevitra ao am-pon'ny olona; Fa izay manan-tsaina dia mahay manovo azy ihany,
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Maro ny olona samy midera ny soa ataon'ny tenany avy; Fa izay olo-mahatoky, iza moa no mahita azy?
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Izay olona marina mandeha amin''ny fahitsiany Sambatra ny zanany mandimby azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mipetraka eo amin'ny seza fitsarana ny mpanjaka, Ka mikororoka manaisotra ny ratsy rehetra ny masony.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Iza no mahazo manao hoe: Efa nahadio ny foko aho Ka madio tsy manana ota?'
