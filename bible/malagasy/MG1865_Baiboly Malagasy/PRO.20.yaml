document_id: PRO.20,96
type_code: plt
verses:
  '1':
  - type: text
    content: Mpaniratsira ny divay, ary mpitabataba ny toaka, Koa izay miraikiraiky azon'izany dia tsy hendry.
  '10':
  - type: text
    content: 'Ny vato mizana samy hafa sy ny vata famarana samy hafa Dia samy fahavetavetana eo imason''i Jehovah. '
  '11':
  - type: text
    content: Na dia ny zaza aza dia mampiseho amin'ny fanaony Na madio sy mahitsy ny fitondran-tenany.
  '12':
  - type: text
    content: Ny sofina mandre sy ny maso mahita Dia samy nataon'i Jehovah avokoa.
  '13':
  - type: text
    content: Aza tia torimaso ianao, fandrao tonga malahelo; Ahirato ny masonao, dia ho voky hanina ianao.
  '14':
  - type: text
    content: Ratsy! ratsy! hoy ny mpividy; Kanjo nony lasa izy, dia mandoka tena.
  '15':
  - type: text
    content: Ao ihany ny volamena sy ny voahangy
  - type: note
    content: 'Na: perla'
  - type: text
    content: ' betsaka; Fa ny molotra misy fahalalana no ravaka soa.'
  '16':
  - type: text
    content: Alao ny lambany, fa efa niantoka olon-kafa izy, Ary tano ho solon'ny vahiny
  - type: note
    content: 'Na: vahiny janga'
  - type: text
    content: ' niantohany. '
  '17':
  - type: text
    content: Mamin'ny olona ny hanina azo amin'ny fitaka; Kanjo ho feno fasika ny vavany any am-parany.
  '18':
  - type: text
    content: Ny hevitra rehetra dia aorin'ny fisainana, Ary ny fahaizana mandamina tsara no entonao miady.
  '19':
  - type: text
    content: 'Izay mandehandeha manaratsy dia manambara ny hevitra afenina, Koa aza miraharaha amin''izay mibedibedy foana. '
  '2':
  - type: text
    content: Ny fampitahoran'ny mpanjaka dia toy ny fieron'ny liona tanora; Izay mampahatezitra azy dia mankahà-doza hihatra amin'ny ainy,
  '20':
  - type: text
    content: Izay manozona ny rainy na ny reniny, Dia ho faty ao amin'ny alim-pito ny jirony.
  '21':
  - type: text
    content: Ny harena malaky azo foana
  - type: note
    content: 'Na: mahamahimahina'
  - type: text
    content: ' eo am-boalohany Dia tsy hotahina any am-parany. '
  '22':
  - type: text
    content: 'Aza manao hoe: Hamaly ny ratsy nataony aho; Fa andraso Jehovah, fa Izy no hamonjy anao.'
  '23':
  - type: text
    content: 'Fahavetavetana eo imason''i Jehovah ny vato samy hafa, Ary ny mizana mandainga dia tsy tsara. '
  '24':
  - type: text
    content: Avy amin'i Jehovah ny dian'ny olona, Ary hataon'izay olombelona ahoana no hahafantatra ny lalany?
  '25':
  - type: text
    content: 'Fandrika amin''ny olona ny malaky manao hoe: Zavatra masina ity; Ka nony vita ny voady, vao mamototra. '
  '26':
  - type: text
    content: Ny mpanjaka hendry mikororoka manaisotra ny ratsy fanahy Sady mitarika ny kodia fivelezana eo amboniny.
  '27':
  - type: text
    content: 'Jiron''i Jehovah ny fanahin''ny olona, Itsilovana ny efitrefitra rehetra ao am-po. '
  '28':
  - type: text
    content: Famindram-po sy fahamarinana no miaro ny mpanjaka, Ary ampitoeriny amin'ny famindram-po ny seza fiandrianany.
  '29':
  - type: text
    content: Voninahitry ny zatovo ny fahatanjahany, Ary ravaky ny anti-panahy ny volo fotsy.
  '3':
  - type: text
    content: Voninahitry ny olona ny hanalavitra ny ady; Fa ny adala rehetra kosa misafoaka.
  '30':
  - type: text
    content: Ny fampangirifiriana
  - type: note
    content: Heb. ratra avy amin'ny kapoaka
  - type: text
    content: ' dia mahafaka ny faharatsiana, Ary ny kapoka mahadio ny efitrefitra ao an-kibo.'
  '4':
  - type: text
    content: Ny malaina tsy mety miasa amin'ny ririnina
  - type: note
    content: 'Na: noho ny ririnina; na: noho ny haben''ny vokatra'
  - type: text
    content: ', Ka dia hangataka izy raha fararano, fa tsy hahazo.'
  '5':
  - type: text
    content: Rano lalina ny hevitra ao am-pon'ny olona; Fa izay manan-tsaina dia mahay manovo azy ihany,
  '6':
  - type: text
    content: Maro ny olona samy midera ny soa ataon'ny tenany avy; Fa izay olo-mahatoky, iza moa no mahita azy?
  '7':
  - type: text
    content: 'Izay olona marina mandeha amin''ny fahitsiany Sambatra ny zanany mandimby azy. '
  '8':
  - type: text
    content: Mipetraka eo amin'ny seza fitsarana ny mpanjaka, Ka mikororoka manaisotra ny ratsy rehetra ny masony.
  '9':
  - type: text
    content: 'Iza no mahazo manao hoe: Efa nahadio ny foko aho Ka madio tsy manana ota?'
