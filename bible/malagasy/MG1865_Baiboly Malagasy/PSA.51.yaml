document_id: PSA.51,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fifonan'ny manan-keloka mba hahafahan'ny helony sy hodian'ny fifaliany amin'Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida, fony Natana mpaminany nankao aminy rehefa naka an''i Batseba izy. Mamindrà fo amiko, Andriamanitra ô, araka ny fahasoavanao; araka ny haben''ny fiantranao vonoy ny fahadisoako. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amorony fo madio aho, Andriamanitra ô; ary havaozy hiorina marina ny fanahiko ato anatiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza manary ahy hiala eo anatrehanao; ary aza manaisotra ny Fanahinao Masina amiko. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ampodio amiko ny fifaliana amin''ny famonjenao; ary tohàny fanahy mazoto aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hampianatra ny olon-diso ny lalanao aho; ary ny mpanota hampiverenina aminao.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vonjeo ho afaka amin'ny valin-drà aho, Andriamanitra ô, Andriamanitry ny famonjena ahy; hihoby ny fahamarinanao ny vavako
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: ny lelako'
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tompo ô, sokafy ny molotro, dia hanambara ny fiderana Anao ny vavako. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy fanatitra no sitrakao; raha izany dia nomeko ihany; ny fanatitra dorana tsy mahafaly Anao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanatitra ho an''Andriamanitra dia fanahy torotoro; ny fo torotoro sy mangorakoraka, Andriamanitra ô, tsy mba ataonao tsinontsinona. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manaova soa amin''i Ziona araka ny fahasoavanao; ataovy ny mandan''i Jerosalema. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ho sitrakao ny fanati-pahamarinana sy ny fanatitra dorana ary ny fanatitra levonina amin'ny afo; dia hanatitra vantotr'ombilahy eo amin'ny alitaranao ny olona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sasao madio aho mba ho afa-keloka, ary diovy aho mba ho afa-pahotana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsaroako ny fahadisoako, ary eo anatrehako mandrakariva ny fahotako. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taminao dia taminao ihany no nanotako, ary izay ratsy eo imasonao no efa nataoko, mba ho marina Hianao, raha miteny, ary tsy hanan-tsiny Hianao, raha mitsara. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, tamin''ny heloka no niterahana ahy, ary tamin''ny fahotana no torontoronina ahy ny reniko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, fahamarinana ao am-po no sitrakao; ary fahendrena ao amin'ny miafina no ampahafantarinao ahy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Diovy hysopa aho ho afa-pahotana, dia hadio; sasao aho, dia ho fotsy mangatsakatsaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: toy ny oram-panala'
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ampandreneso fifaliana sy faharavoravoana aho, hifalian''ny taolana izay voavakivakinao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afeno ny tavanao ny fahotako ary vonoy ny heloko rehetra. '
