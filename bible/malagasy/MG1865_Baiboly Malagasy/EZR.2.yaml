document_id: EZR.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny anaran'ny Jiosy nentin'i Zerobabela nody
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no olona amin''izany tany izany izay niakatra avy amin''ny fahababoana, izay nobaboin''i Nebokadnezara, mpanjakan''i Babylona, ka nentiny ho any Babylona, ary niverina ho any Jerosalema sy Joda, samy ho any an-tanànany avy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia ny olona izay niaraka tamin''i Zerobabela sy Jesoa sy Nehemia sy Seraia sy Relaia sy Mordekay sy Bilsana sy Mispara sy Bigvay sy Rehoma ary Bana. Ary ny isan''ny lehilahy tamin''ny Isiraely dia izao:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny taranak''i Parosy dia roa amby fito-polo amby zato sy roa arivo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ny taranak''i Sefatia dia roa amby fito-polo amby telon-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ny taranak''i Ara dia dimy amby fito-polo amby fiton-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ny taranak''i Pahatamoaba, avy tamin''ny zanak''i Jesoa sy Joaba, dia roa ambin''ny folo amby valon-jato sy roa arivo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ny taranak''i Eliama dia efatra amby dimam-polo amby roan-jato sy arivo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ny taranak''i Zato dia dimy amby efa-polo amby sivin-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny taranak''i Zakay dia enim-polo amby fiton-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny taranak''i Bany dia roa amby efa-polo amby enin-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny taranak''i Bebay dia telo amby roa-polo amby enin-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny taranak''i Azgada dia roa amby roa-polo amby roan-jato sy arivo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny taranak''i Adonikama dia enina amby enim-polo amby enin-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny taranak''i Bigvay dia enina amby dimam-polo sy roa arivo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny taranak''i Adina dia efatra amby dimam-polo amby efa-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny taranak''i Atera, avy tamin''i Hezekia, dia valo amby sivi-folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny taranak''i Bezay dia telo amby roa-polo amby telon-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny taranak''i Jora dia roa ambin''ny folo amby zato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny taranak''i Hasoma dia telo amby roa-polo amby roan-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny zanak''i Gibara dia dimy amby sivi-folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ny zanak''i Betlehema dia telo amby roa-polo amby zato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ny mponina tany Netofa dia enina amby dimam-polo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ny mponina tany Anatota dia valo amby roa-polo amby zato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ny zanak''i Azmaveta dia roa amby efa-polo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny zanak''i Kiriat-arima sy Kefira ary Berota dia telo amby efa-polo amby fiton-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ny zanak''i Rama sy Gaba dia iraika amby roa-polo amby enin-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ny mponina tany Mikmasy dia roa amby roa-polo amby zato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ny mponina tany Betela sy Ay dia telo amby roa-polo amby roan-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ny zanak''i Nebo dia roa amby dimam-polo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ny taranak i Magbisy dia enina amby dimam-polo amby zato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ny zanak''ilay Elama anankiray dia efatra amby dimam-polo amby roan-jato sy arivo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ny taranak''i Harima dia roa-polo amby telon-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ny zanak''i Loda sy Hadida ary Ono dia dimy amby roa-polo amby fiton-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ny zanak''i Jeriko dia dimy amby efa-polo amby telon-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ny zanak'i Sena dia telo-polo amby enin-jato sy telo arivo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny mpisorona koa dia izao: Ny taranak''i Jedaia, avy tamin''ny mpianakavin''i Jesoa, dia telo amby fito-polo amby sivin-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ny taranak''Imera dia roa amby dimam-polo sy arivo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ny taranak''i Pasora dia fito amby efa-polo amby roan-jato sy arivo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ny taranak'i Harima dia fito ambin'ny folo sy arivo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny Levita koa dia izao: Ny taranak''i Jesoa sy Kadmiela, avy tamin''ny taranak''i Hodavia, dia efatra amby fito-polo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary ny mpihira koa dia izao; Ny taranak'i Asafa dia valo amby roa-polo amby zato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ny taranaky ny mpiandry varavarana koa dia izao: Ny taranak''i Saloma, ny taranak''i Atera, ny taranak''i Talmona, ny taranak''i Akoba, ny taranak''i Hatita, ny taranak''i Sobay, dia sivy amby telo-polo amby zato izy rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary ny Netinima koa dia izao: Ny taranak''i Ziha, ny taranak''i Hasofa, ny taranak''i Tabaota, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'ny taranak''i Kerosa, ny taranak''i Siaha, ny taranak''i Padona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'ny taranak''i Lebana, ny taranak''i Hagabaha, ny taranak''i Akoba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'ny taranak''i Hagaba, ny taranak''i Salmay, ny taranak''i Hanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'ny taranak''i Gidela, ny taranak''i Gahara, ny taranak''i Reaia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ny taranak''i Rezina, ny taranak''i Nekoda, ny taranak''i Gazama, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'ny taranak''i Oza, ny taranak''i Pasea, ny taranak''i Besay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'ny taranak''i Asna, ny taranaky ny Meonita, ny taranaky ny Nefisita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'ny taranak''i Bakboka, ny taranak''i Hakofa, ny taranak''i Harora, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'ny taranak''i Bazlota, ny taranak''i Mehida, ny taranak''i Harsa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'ny taranak''i Barkosa, ny taranak''i Sisera, ny taranak''i Tema, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'ny taranak''i Nezia, ny taranak''i Hatifa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary ny taranaky ny mpanompon''i Solomona koa dia izao: Ny taranak''i Sotahy, ny taranak''i Sofereta, ny taranak''i Peroda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'ny taranak''i Jala, ny taranak''i Darkona, ny taranak''i Gidela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ny taranak'i Sefatia, ny taranak'i Hatila, ny taranak'i Pokereta-hazebaima, ny taranak'i Amy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ny Netinima rehetra sy ny taranaky ny mpanompon'i Solomona dia roa amby sivi-folo amby telon-jato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary izao no niakatra avy tany Tela-mela sy Tela-harsa sy Keroba sy Adana ary Imera (fa tsy nahalaza ny fianakaviany sy ny firazanany izy, na avy tamin''ny Isiraely, na tsia): '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'ny taranak''i Delaia, ny taranak''i Tobia, ny taranak''i Nekoda, dia roa amby dimam-polo amby enin-jato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary ny avy tamin''ny taranaky ny mpisorona dia izao: Ny taranak''i Habaia, ny taranak''i Hakoza, ny taranak''i Barzilay; nampaka-bady avy tamin''ny zanakavavin''i Barzilay Gileadita io, ka dia notononina araka ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ireo no nitady ny soratra filazana ny razany, fa tsy hita izany; dia natao ho tsy madio izy ka nesorina tamin''ny fisoronana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary ny governora nilaza taminy fa tsy mahazo mihinana ny zavatra masina indrindra izy mandra-pitsangan''izay mpisorona anankiray mitondra ny Orima sy Tomima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ny tontalin''ny olona rehetra dia enim-polo amby telon-jato amby roa arivo sy efatra alina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'afa-tsy ny ankizilahiny sy ny ankizivaviny fito amby telo-polo amby telon-jato sy fito arivo; ary nisy mpihiralahy sy mpihiravavy roan-jato teo aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'ny soavaliny dia enina amby telo-polo amby fiton-jato; ny ampondrany dia dimy amby efa-polo amby roan-jato; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: ny ramevany dia dimy amby telo -polo amby efa-jato; ny borikiny dia roa-polo amby fiton-jato sy enina arivo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Ary ny sasany tamin''ny lohan''ny fianakaviana, rehefa tonga tao an-tranon''i Jehovah tany Jerosalema, dia nanatitra tamin''ny sitrapo hananganana ny tranon''Andriamanitra eo amin''ilay efa niorenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Nanome araka izay nananany avy izy hanampy ny vola voavory hanaovana ny asa, dia darika
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao 1 Tan. xxix. 7
    marker-yv: yv-n
  - type: text
    text: ' volamena arivo sy enina alina ary mane volafotsy dimy arivo ary akanjo-mpisorona zato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Ary samy tafapetraka teny an-tanànany avy ny mpisorona sy ny Levita sy ny sasany tamin'ny vahoaka sy ny mpihira sy ny mpiandry varavarana ary ny Netinima, dia ny Isiraely rehetra samy tao an-tanànany avy.
