document_id: EZR.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny anaran'ny Jiosy nentin'i Zerobabela nody
  - type: text
    content: 'Ary izao no olona amin''izany tany izany izay niakatra avy amin''ny fahababoana, izay nobaboin''i Nebokadnezara, mpanjakan''i Babylona, ka nentiny ho any Babylona, ary niverina ho any Jerosalema sy Joda, samy ho any an-tanànany avy, '
  '10':
  - type: text
    content: 'ny taranak''i Bany dia roa amby efa-polo amby enin-jato; '
  '11':
  - type: text
    content: 'ny taranak''i Bebay dia telo amby roa-polo amby enin-jato; '
  '12':
  - type: text
    content: 'ny taranak''i Azgada dia roa amby roa-polo amby roan-jato sy arivo; '
  '13':
  - type: text
    content: 'ny taranak''i Adonikama dia enina amby enim-polo amby enin-jato; '
  '14':
  - type: text
    content: 'ny taranak''i Bigvay dia enina amby dimam-polo sy roa arivo; '
  '15':
  - type: text
    content: 'ny taranak''i Adina dia efatra amby dimam-polo amby efa-jato; '
  '16':
  - type: text
    content: 'ny taranak''i Atera, avy tamin''i Hezekia, dia valo amby sivi-folo; '
  '17':
  - type: text
    content: 'ny taranak''i Bezay dia telo amby roa-polo amby telon-jato; '
  '18':
  - type: text
    content: 'ny taranak''i Jora dia roa ambin''ny folo amby zato; '
  '19':
  - type: text
    content: 'ny taranak''i Hasoma dia telo amby roa-polo amby roan-jato; '
  '2':
  - type: text
    content: 'dia ny olona izay niaraka tamin''i Zerobabela sy Jesoa sy Nehemia sy Seraia sy Relaia sy Mordekay sy Bilsana sy Mispara sy Bigvay sy Rehoma ary Bana. Ary ny isan''ny lehilahy tamin''ny Isiraely dia izao:'
  '20':
  - type: text
    content: 'ny zanak''i Gibara dia dimy amby sivi-folo; '
  '21':
  - type: text
    content: 'ny zanak''i Betlehema dia telo amby roa-polo amby zato; '
  '22':
  - type: text
    content: 'ny mponina tany Netofa dia enina amby dimam-polo; '
  '23':
  - type: text
    content: 'ny mponina tany Anatota dia valo amby roa-polo amby zato; '
  '24':
  - type: text
    content: 'ny zanak''i Azmaveta dia roa amby efa-polo; '
  '25':
  - type: text
    content: 'ny zanak''i Kiriat-arima sy Kefira ary Berota dia telo amby efa-polo amby fiton-jato; '
  '26':
  - type: text
    content: 'ny zanak''i Rama sy Gaba dia iraika amby roa-polo amby enin-jato; '
  '27':
  - type: text
    content: 'ny mponina tany Mikmasy dia roa amby roa-polo amby zato; '
  '28':
  - type: text
    content: 'ny mponina tany Betela sy Ay dia telo amby roa-polo amby roan-jato; '
  '29':
  - type: text
    content: 'ny zanak''i Nebo dia roa amby dimam-polo; '
  '3':
  - type: text
    content: 'Ny taranak''i Parosy dia roa amby fito-polo amby zato sy roa arivo; '
  '30':
  - type: text
    content: 'ny taranak i Magbisy dia enina amby dimam-polo amby zato; '
  '31':
  - type: text
    content: 'ny zanak''ilay Elama anankiray dia efatra amby dimam-polo amby roan-jato sy arivo; '
  '32':
  - type: text
    content: 'ny taranak''i Harima dia roa-polo amby telon-jato; '
  '33':
  - type: text
    content: 'ny zanak''i Loda sy Hadida ary Ono dia dimy amby roa-polo amby fiton-jato; '
  '34':
  - type: text
    content: 'ny zanak''i Jeriko dia dimy amby efa-polo amby telon-jato; '
  '35':
  - type: text
    content: ny zanak'i Sena dia telo-polo amby enin-jato sy telo arivo.
  '36':
  - type: text
    content: 'Ary ny mpisorona koa dia izao: Ny taranak''i Jedaia, avy tamin''ny mpianakavin''i Jesoa, dia telo amby fito-polo amby sivin-jato; '
  '37':
  - type: text
    content: 'ny taranak''Imera dia roa amby dimam-polo sy arivo; '
  '38':
  - type: text
    content: 'ny taranak''i Pasora dia fito amby efa-polo amby roan-jato sy arivo; '
  '39':
  - type: text
    content: ny taranak'i Harima dia fito ambin'ny folo sy arivo.
  '4':
  - type: text
    content: 'ny taranak''i Sefatia dia roa amby fito-polo amby telon-jato; '
  '40':
  - type: text
    content: 'Ary ny Levita koa dia izao: Ny taranak''i Jesoa sy Kadmiela, avy tamin''ny taranak''i Hodavia, dia efatra amby fito-polo.'
  '41':
  - type: text
    content: Ary ny mpihira koa dia izao; Ny taranak'i Asafa dia valo amby roa-polo amby zato.
  '42':
  - type: text
    content: 'Ary ny taranaky ny mpiandry varavarana koa dia izao: Ny taranak''i Saloma, ny taranak''i Atera, ny taranak''i Talmona, ny taranak''i Akoba, ny taranak''i Hatita, ny taranak''i Sobay, dia sivy amby telo-polo amby zato izy rehetra.'
  '43':
  - type: text
    content: 'Ary ny Netinima koa dia izao: Ny taranak''i Ziha, ny taranak''i Hasofa, ny taranak''i Tabaota, '
  '44':
  - type: text
    content: 'ny taranak''i Kerosa, ny taranak''i Siaha, ny taranak''i Padona, '
  '45':
  - type: text
    content: 'ny taranak''i Lebana, ny taranak''i Hagabaha, ny taranak''i Akoba, '
  '46':
  - type: text
    content: 'ny taranak''i Hagaba, ny taranak''i Salmay, ny taranak''i Hanana, '
  '47':
  - type: text
    content: 'ny taranak''i Gidela, ny taranak''i Gahara, ny taranak''i Reaia, '
  '48':
  - type: text
    content: 'ny taranak''i Rezina, ny taranak''i Nekoda, ny taranak''i Gazama, '
  '49':
  - type: text
    content: 'ny taranak''i Oza, ny taranak''i Pasea, ny taranak''i Besay, '
  '5':
  - type: text
    content: 'ny taranak''i Ara dia dimy amby fito-polo amby fiton-jato; '
  '50':
  - type: text
    content: 'ny taranak''i Asna, ny taranaky ny Meonita, ny taranaky ny Nefisita, '
  '51':
  - type: text
    content: 'ny taranak''i Bakboka, ny taranak''i Hakofa, ny taranak''i Harora, '
  '52':
  - type: text
    content: 'ny taranak''i Bazlota, ny taranak''i Mehida, ny taranak''i Harsa, '
  '53':
  - type: text
    content: 'ny taranak''i Barkosa, ny taranak''i Sisera, ny taranak''i Tema, '
  '54':
  - type: text
    content: 'ny taranak''i Nezia, ny taranak''i Hatifa. '
  '55':
  - type: text
    content: 'Ary ny taranaky ny mpanompon''i Solomona koa dia izao: Ny taranak''i Sotahy, ny taranak''i Sofereta, ny taranak''i Peroda, '
  '56':
  - type: text
    content: 'ny taranak''i Jala, ny taranak''i Darkona, ny taranak''i Gidela, '
  '57':
  - type: text
    content: ny taranak'i Sefatia, ny taranak'i Hatila, ny taranak'i Pokereta-hazebaima, ny taranak'i Amy.
  '58':
  - type: text
    content: Ny Netinima rehetra sy ny taranaky ny mpanompon'i Solomona dia roa amby sivi-folo amby telon-jato.
  '59':
  - type: text
    content: 'Ary izao no niakatra avy tany Tela-mela sy Tela-harsa sy Keroba sy Adana ary Imera (fa tsy nahalaza ny fianakaviany sy ny firazanany izy, na avy tamin''ny Isiraely, na tsia): '
  '6':
  - type: text
    content: 'ny taranak''i Pahatamoaba, avy tamin''ny zanak''i Jesoa sy Joaba, dia roa ambin''ny folo amby valon-jato sy roa arivo; '
  '60':
  - type: text
    content: 'ny taranak''i Delaia, ny taranak''i Tobia, ny taranak''i Nekoda, dia roa amby dimam-polo amby enin-jato. '
  '61':
  - type: text
    content: 'Ary ny avy tamin''ny taranaky ny mpisorona dia izao: Ny taranak''i Habaia, ny taranak''i Hakoza, ny taranak''i Barzilay; nampaka-bady avy tamin''ny zanakavavin''i Barzilay Gileadita io, ka dia notononina araka ny anarany. '
  '62':
  - type: text
    content: 'Ireo no nitady ny soratra filazana ny razany, fa tsy hita izany; dia natao ho tsy madio izy ka nesorina tamin''ny fisoronana. '
  '63':
  - type: text
    content: 'Ary ny governora nilaza taminy fa tsy mahazo mihinana ny zavatra masina indrindra izy mandra-pitsangan''izay mpisorona anankiray mitondra ny Orima sy Tomima. '
  '64':
  - type: text
    content: 'Ny tontalin''ny olona rehetra dia enim-polo amby telon-jato amby roa arivo sy efatra alina, '
  '65':
  - type: text
    content: 'afa-tsy ny ankizilahiny sy ny ankizivaviny fito amby telo-polo amby telon-jato sy fito arivo; ary nisy mpihiralahy sy mpihiravavy roan-jato teo aminy; '
  '66':
  - type: text
    content: 'ny soavaliny dia enina amby telo-polo amby fiton-jato; ny ampondrany dia dimy amby efa-polo amby roan-jato; '
  '67':
  - type: text
    content: ny ramevany dia dimy amby telo -polo amby efa-jato; ny borikiny dia roa-polo amby fiton-jato sy enina arivo.
  '68':
  - type: text
    content: 'Ary ny sasany tamin''ny lohan''ny fianakaviana, rehefa tonga tao an-tranon''i Jehovah tany Jerosalema, dia nanatitra tamin''ny sitrapo hananganana ny tranon''Andriamanitra eo amin''ilay efa niorenany. '
  '69':
  - type: text
    content: Nanome araka izay nananany avy izy hanampy ny vola voavory hanaovana ny asa, dia darika
  - type: note
    content: Izahao 1 Tan. xxix. 7
  - type: text
    content: ' volamena arivo sy enina alina ary mane volafotsy dimy arivo ary akanjo-mpisorona zato. '
  '7':
  - type: text
    content: 'ny taranak''i Eliama dia efatra amby dimam-polo amby roan-jato sy arivo; '
  '70':
  - type: text
    content: Ary samy tafapetraka teny an-tanànany avy ny mpisorona sy ny Levita sy ny sasany tamin'ny vahoaka sy ny mpihira sy ny mpiandry varavarana ary ny Netinima, dia ny Isiraely rehetra samy tao an-tanànany avy.
  '8':
  - type: text
    content: 'ny taranak''i Zato dia dimy amby efa-polo amby sivin-jato; '
  '9':
  - type: text
    content: 'ny taranak''i Zakay dia enim-polo amby fiton-jato; '
