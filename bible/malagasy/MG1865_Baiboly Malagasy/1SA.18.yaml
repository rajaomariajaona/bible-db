document_id: 1SA.18,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary rehefa nitsahatra niteny tamin''i Saoly izy, dia raiki-pitia tamin''i Davida ny fanahin''i Jonatana, ka tia azy hoatra ny tenany mihitsy izy. '
  '10':
  - type: text
    content: 'Ary nony ampitson''iny dia nisy fanahy ratsy avy tany amin''Andriamanitra nilatsaka tamin''i Saoly, ka dia maola tao an-trano izy; ary Davida nitendry lokanga tamin''ny tànany tahaka ny fanaony isan''andro ihany, ary nisy lefona teny an-tànan''i Saoly. '
  '11':
  - type: text
    content: 'Dia natorak''i Saoly ny lefona; fa hoy izy: Hamely an''i Davida aho, ka hataoko miboroaka mihatra amin''ny rindrina. Fa Davida nisoroka indroa teo anatrehany. '
  '12':
  - type: text
    content: 'Ary Saoly natahotra an''i Davida, satria Jehovah nomba azy, fa Saoly kosa efa nialany. '
  '13':
  - type: text
    content: 'Koa dia nesorin''i Saoly tsy ho eo aminy Davida, ary nataony mpifehy arivo, dia nitarika ny olona nivoaka sy niditra izy. '
  '14':
  - type: text
    content: 'Ary Davida dia hita fa hendry tamin''izay rehetra nataony, ary Jehovah nomba azy. '
  '15':
  - type: text
    content: 'Ary nony hitan''i Saoly fa hendry dia hendry Davida, dia natahotra azy izy. '
  '16':
  - type: text
    content: 'Fa ny Isiraely sy ny Joda rehetra kosa tia an''i Davida, satria nitondra azy nivoaka sy niditra izy. '
  '17':
  - type: text
    content: 'Ary hoy Saoly tamin''i Davida: Indro homeko ho vadinao Meraba vavimatoako, koa mahereza ho ahy anefa ianao, ary miadia ny adin''i Jehovah. (Fa hoy Saoly: Aoka tsy ny tanako no hamely azy, fa aoka ny tanan''ny Filistina no hamely azy.) '
  '18':
  - type: text
    content: 'Fa hoy Davida tamin''i Saoly: Zinona moa aho, ary manao ahoana no toetry ny mpianakavin''ny raiko ao amin''ny Isiraely, no ho vinanton''ny mpanjaka aho? '
  '19':
  - type: text
    content: 'Kanjo nony tamin''ny andro tokony ho namoahana an''i Meraba, zanakavavin''i Saoly, ho vadin''i Davida, dia nomena ho vadin''i Adriela Meholatita izy. '
  '2':
  - type: text
    content: 'Ary Saoly nandray azy tamin''izany andro izany ka tsy namela azy hody tany amin''ny tranon-drainy intsony. '
  '20':
  - type: text
    content: 'Fa Mikala, zanakavavin''i Saoly kosa tia an''i Davida; ary nisy nanambara izany tamin''i Saoly, ka sitrak''i Saoly izany. '
  '21':
  - type: text
    content: '(Fa hoy Saoly: Homeko azy izy, mba ho fandrika aminy ka hamelezan''ny tanan''ny Filistina azy.) Dia hoy Saoly tamin''i Davida: Fanindroan''ny maha-vinantoko anao izao'
  - type: note
    content: 'Na: Izy roa vavy izao dia samy maha-vinantoko anao avokoa'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ary Saoly nandidy ny mpanompony hoe: Miresaha mangingina amin''i Davida, ka ataovy hoe: Indro, tian''ny mpanjaka ianao, ary ny mpanompony rehetra tia anao; ka dia maneke ihany ho vinanton''ny mpanjaka ianao. '
  '23':
  - type: text
    content: 'Ary ny mpanompon''i Saoly nilaza izany teny izany tamin''i Davida. Fa hoy Davida: Moa ataonareo ho zavatra kely izany ho vinanton''ny mpanjaka? Tsy hitanareo va fa izaho dia olona malahelo sady tsy manan-daza? '
  '24':
  - type: text
    content: 'Ary ny mpanompon''i Saoly nilaza taminy hoe: Izany no navalin''i Davida. '
  '25':
  - type: text
    content: 'Dia hoy Saoly: Izao no holazainareo amin''i Davida: Ny mpanjaka tsy mila harena be ho vodiondry, fa ny mariky ny fahafatesan'
  - type: note
    content: Heb. saron-tsosoka
  - type: text
    content: '''ny Filistina zato lahy ihany, mba ho famaliana ny fahavalony. Kanjo hevitr''i Saoly hahafaty an''i Davida amin''ny tanan''ny Filistina izany. '
  '26':
  - type: text
    content: 'Ary rehefa nambaran''ny mpanompon''i Saoly tamin''i Davida izany teny izany, dia sitrak''i Davida ny ho vinanton''ny mpanjaka. Ary raha tsy mbola tapitra ny fetr''andro, '
  '27':
  - type: text
    content: dia niainga Davida, ary nandeha izy sy ny olony ka nahafaty Filistina roan-jato, lahy ary Davida nitondra ny mariky ny fahafatesany
  - type: note
    content: Heb. saron-tsotsoka
  - type: text
    content: ' ka nanisa azy teo anatrehan''ny mpanjaka mba hahavinanton''ny mpanjaka azy. Dia nomen''i Saoly ho vadin''i Davida Mikala zananivavy. '
  '28':
  - type: text
    content: 'Ary Saoly nahita sy nahalala fa Jehovah nomba an''i Davida; ary Mikala zananivavy tia azy. '
  '29':
  - type: text
    content: 'Ary dia vao mainka natahotra an''i Davida Saoly; ka dia tonga fahavalon''i Davida mandrakariva izy. '
  '3':
  - type: text
    content: 'Ary Davida sy Jonatana nanao fanekena noho ny fitiavan''i Jonatana azy toy ny tenany. '
  '30':
  - type: text
    content: Ary ireo andrianan'ny Filistina dia nanafika; ary isaky ny nanafika izy, dia Davida no hita fa hendry noho ny mpanompon'i Saoly rehetra, ka dia nisandratra ny anarany.
  '4':
  - type: text
    content: 'Ary nesorin''i Jonatana ny akanjony ivelany izay teny aminy ka nomeny an''i Davida mbamin''ny akanjo fiadiany sy ny sabany sy ny tsipìkany ary ny fehin-kibony koa aza. '
  '5':
  - type: text
    content: 'Ary Davida nanafika ka hita fa hendry tamin''izay rehetra nanirahan''i Saoly azy; ka dia nataon''i Saoly mpifehy ny miaramila izy sady nankasitrahan''ny vahoaka rehetra sy ny mpanompon''i Saoly koa. '
  '6':
  - type: text
    content: Ary nony tonga ny olona tamin'ny niverenan'i Davida avy namono ilay Filistina, dia nivoaka ny vehivavy avy tamin'ny tanànan'ny Isiraely rehetra ka nihira sy nandihy nitsena an'i Saoly mpanjaka tamin'ny ampongatapaka sy ny fifaliana ary ny kipantsona
  - type: note
    content: 'Na: varahina telo zoro'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ary ny vehivavy mpandihy dia nihira hoe: Saoly nahafaty arivoarivo; Fa Davida nahafaty alinalina. '
  '8':
  - type: text
    content: 'Dia tezitra indrindra Saoly, fa tsy sitrany izany teny izany, ka hoy izy: Ny an''i Davida nataony alinalina lahy, fa ny ahy kosa nataony arivoarivo ihany; koa ny fanjakana ihany no sisa tsy mbola azony. '
  '9':
  - type: text
    content: Ary Saoly hatramin'izany andro izany dia nangarika an'i Davida.
