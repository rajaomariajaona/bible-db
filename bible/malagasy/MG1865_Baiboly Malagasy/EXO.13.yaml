document_id: EXO.13,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny lalana nitondran'Andriamanitra ny Zanak'Isiraely, sy ny namakiany ny Ranomasina Mena
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'Dia tandremo amin''ny fotoany isan-taona izao lalàna izao. '
  '11':
  - type: text
    content: 'Ary raha hitondra anao Jehovah ho any amin''ny tanin''ny Kananita araka izay nianianany taminao sy ny razanao, ka homeny anao izany, '
  '12':
  - type: text
    content: 'dia hatokanao ho an''i Jehovah izay voalohan-teraka rehetra: ny voalohan-teraky ny biby fiompy rehetra izay anananao, dia ho an''i Jehovah ny lahy rehetra; '
  '13':
  - type: text
    content: 'ary ny voalohan-teraky ny boriky dia hosoloanao zanak''ondry; fa raha tsy hanolo azy ianao, dia hofolahinao ny vozony; ary ny lahimatoa rehetra amin''ny olona eo amin''ny zanakao dia havotanao. '
  '14':
  - type: text
    content: 'Ary raha hanontany anao ny zanakao amin''ny andro ho avy ka hanao hoe: Inona no anton''izao? dia holazainao aminy hoe: Tanana mahery no nitondran''i Jehovah antsika nivoaka avy tany Egypta, tamin''ny trano nahandevozana; '
  '15':
  - type: text
    content: 'ary raha nanamafy ny fony ka tsy nandefa antsika Farao, dia novonoin''i Jehovah ny lahimatoa rehetra tany amin''ny tany Egypta, hatramin''ny lahimatoan''ny olona ka hatramin''ny voalohan-teraky ny biby; koa izany no anaterako ho an''i Jehovah ny lahy voalohan-teraka rehetra, fa ny lahimatoa rehetra amin''ny zanako dia soloako. '
  '16':
  - type: text
    content: Ary ho famantarana eo amin'ny tananao sy ho fehy eo ambonin'ny handrinao izany; fa tanana mahery no nitondran'i Jehovah antsika nivoaka avy tany Egypta.
  '17':
  - type: text
    content: 'Ary rehefa nalefan''i Farao ny olona, dia tsy mba nentin''Andriamanitra tamin''ny lalana nankany amin''ny tanin''ny Filistina izy, na dia akaiky aza izany; fa hoy Andriamanitra: Andrao hanenina ny olona, raha mahita ady, ka hiverina any Egypta. '
  '18':
  - type: text
    content: 'Fa nentin''Andriamanitra nivily ho amin''ny lalana mahazo any an-efitra amoron''ny Ranomasina Mena ny olona; ary voaomana hiady ny fiakatry ny Zanak''Isiraely avy tany amin''ny tany Egypta. '
  '19':
  - type: text
    content: 'Ary nentin''i Mosesy niaraka taminy ny taolan''i Josefa, satria Josefa efa nampianiana dia nampianiana ny Zanak''Isiraely ka nanao hoe: Hamangy anareo tokoa Andriamanitra, dia hitondra ny taolako hiala atỳ miaraka aminareo ianareo. '
  '2':
  - type: text
    content: 'Hamasino ho Ahy ny lahimatoa rehetra, dia izay voalohan-teraka rehetra eo amin''ny Zanak''Isiraely, na olona na biby fiompy: Ahy ireny. '
  '20':
  - type: text
    content: 'Dia nifindra niala tao Sokota izy ka nitoby tao Etama teo an-tsisin''ny efitra. '
  '21':
  - type: text
    content: 'Ary Jehovah nandeha teo alohany tamin''ny andri-rahona raha antoandro hitari-dalana azy, ary tamin''ny andri-afo nony alina ho fahazavana ho azy, handehanany andro aman''alina. '
  '22':
  - type: text
    content: Ny andri-rahona tsy niala teo alohan'ny olona raha antoandro, na ny andri-afo nony alina.
  '3':
  - type: text
    content: 'Dia hoy Mosesy tamin''ny olona: Tsarovy izao andro izao, izay nivoahanareo avy tany Egypta, tamin''ny trano nahandevozana, fa tamin''ny tanana mahery no nitondran''i Jehovah anareo nivoaka avy tany; koa aza misy mihinana izay misy masirasira. '
  '4':
  - type: text
    content: 'Izao andro amin''ny volana Abiba izao no ivoahanareo '
  '5':
  - type: text
    content: 'Ary raha hitondra anao Jehovah ho any amin''ny tanin''ny Kananita sy ny Hetita sy ny Amorita sy ny Hivita ary ny Jebosita, izay nianianany tamin''ny razanao homena anao, dia tany tondra-dronono sy tantely, dia hanao izany fanompoana izany ianao amin''izao volana izao. '
  '6':
  - type: text
    content: 'Hafitoana no hihinananao mofo tsy misy masirasira, ary amin''ny andro fahafito dia hisy andro firavoravoana ho an''i Jehovah. '
  '7':
  - type: text
    content: 'Ny mofo tsy misy masirasira hohanina mandritra ny hafitoana; ary tsy hisy eo aminao izay mofo misy masirasira, ary tsy hisy izay masirasira akory ao aminao eny amin''ny taninao rehetra. '
  '8':
  - type: text
    content: 'Dia hambaranao amin''ny zanakao amin''izany andro izany hoe: Noho ny nataon''i Jehovah tamiko tamin''ny nivoahako avy tany Egypta no anaovako izao. '
  '9':
  - type: text
    content: 'Dia ho famantarana ho anao eo amin''ny tananao ary ho fampahatsiarovana eo ambonin''ny handrinao izany, mba ho ao am-bavanao ny lalàn''i Jehovah: fa tanana mahery no nitondran''i Jehovah anao nivoaka avy tany Egypta. '
