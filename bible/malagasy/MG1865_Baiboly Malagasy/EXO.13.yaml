document_id: EXO.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalana nitondran'Andriamanitra ny Zanak'Isiraely, sy ny namakiany ny Ranomasina Mena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hamasino ho Ahy ny lahimatoa rehetra, dia izay voalohan-teraka rehetra eo amin''ny Zanak''Isiraely, na olona na biby fiompy: Ahy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Mosesy tamin''ny olona: Tsarovy izao andro izao, izay nivoahanareo avy tany Egypta, tamin''ny trano nahandevozana, fa tamin''ny tanana mahery no nitondran''i Jehovah anareo nivoaka avy tany; koa aza misy mihinana izay misy masirasira. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao andro amin''ny volana Abiba izao no ivoahanareo '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha hitondra anao Jehovah ho any amin''ny tanin''ny Kananita sy ny Hetita sy ny Amorita sy ny Hivita ary ny Jebosita, izay nianianany tamin''ny razanao homena anao, dia tany tondra-dronono sy tantely, dia hanao izany fanompoana izany ianao amin''izao volana izao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hafitoana no hihinananao mofo tsy misy masirasira, ary amin''ny andro fahafito dia hisy andro firavoravoana ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny mofo tsy misy masirasira hohanina mandritra ny hafitoana; ary tsy hisy eo aminao izay mofo misy masirasira, ary tsy hisy izay masirasira akory ao aminao eny amin''ny taninao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hambaranao amin''ny zanakao amin''izany andro izany hoe: Noho ny nataon''i Jehovah tamiko tamin''ny nivoahako avy tany Egypta no anaovako izao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia ho famantarana ho anao eo amin''ny tananao ary ho fampahatsiarovana eo ambonin''ny handrinao izany, mba ho ao am-bavanao ny lalàn''i Jehovah: fa tanana mahery no nitondran''i Jehovah anao nivoaka avy tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia tandremo amin''ny fotoany isan-taona izao lalàna izao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha hitondra anao Jehovah ho any amin''ny tanin''ny Kananita araka izay nianianany taminao sy ny razanao, ka homeny anao izany, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia hatokanao ho an''i Jehovah izay voalohan-teraka rehetra: ny voalohan-teraky ny biby fiompy rehetra izay anananao, dia ho an''i Jehovah ny lahy rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary ny voalohan-teraky ny boriky dia hosoloanao zanak''ondry; fa raha tsy hanolo azy ianao, dia hofolahinao ny vozony; ary ny lahimatoa rehetra amin''ny olona eo amin''ny zanakao dia havotanao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha hanontany anao ny zanakao amin''ny andro ho avy ka hanao hoe: Inona no anton''izao? dia holazainao aminy hoe: Tanana mahery no nitondran''i Jehovah antsika nivoaka avy tany Egypta, tamin''ny trano nahandevozana; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary raha nanamafy ny fony ka tsy nandefa antsika Farao, dia novonoin''i Jehovah ny lahimatoa rehetra tany amin''ny tany Egypta, hatramin''ny lahimatoan''ny olona ka hatramin''ny voalohan-teraky ny biby; koa izany no anaterako ho an''i Jehovah ny lahy voalohan-teraka rehetra, fa ny lahimatoa rehetra amin''ny zanako dia soloako. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ho famantarana eo amin'ny tananao sy ho fehy eo ambonin'ny handrinao izany; fa tanana mahery no nitondran'i Jehovah antsika nivoaka avy tany Egypta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa nalefan''i Farao ny olona, dia tsy mba nentin''Andriamanitra tamin''ny lalana nankany amin''ny tanin''ny Filistina izy, na dia akaiky aza izany; fa hoy Andriamanitra: Andrao hanenina ny olona, raha mahita ady, ka hiverina any Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa nentin''Andriamanitra nivily ho amin''ny lalana mahazo any an-efitra amoron''ny Ranomasina Mena ny olona; ary voaomana hiady ny fiakatry ny Zanak''Isiraely avy tany amin''ny tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nentin''i Mosesy niaraka taminy ny taolan''i Josefa, satria Josefa efa nampianiana dia nampianiana ny Zanak''Isiraely ka nanao hoe: Hamangy anareo tokoa Andriamanitra, dia hitondra ny taolako hiala atỳ miaraka aminareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nifindra niala tao Sokota izy ka nitoby tao Etama teo an-tsisin''ny efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Jehovah nandeha teo alohany tamin''ny andri-rahona raha antoandro hitari-dalana azy, ary tamin''ny andri-afo nony alina ho fahazavana ho azy, handehanany andro aman''alina. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny andri-rahona tsy niala teo alohan'ny olona raha antoandro, na ny andri-afo nony alina.
