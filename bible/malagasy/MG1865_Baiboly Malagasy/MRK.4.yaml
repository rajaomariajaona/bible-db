document_id: MRK.4,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nampianatra teo amoron''ny ranomasina indray Jesosy; ary nisy vahoaka betsaka nanatona Azy, dia niditra teo an-tsambokely Izy ka nipetraka teo amin''ny ranomasina; ary ny vahoaka rehetra dia teny an-tanety amoron-dranomasina. '
  '10':
  - type: text
    content: 'Ary raha tao amin''ny mangingina Izy, dia nanontany Azy ny amin''ny fanoharana ireo nomba Azy mbamin''ny roa ambin''ny folo lahy. '
  '11':
  - type: text
    content: 'Ary hoy Izy taminy: Hianareo no efa nomena ny zava-miafina ny amin''ny fanjakan''Andriamanitra; fa amin''ireny izay any ivelany kosa ny zavatra rehetra dia atao amin''ny fanoharana; '
  '12':
  - type: text
    content: 'mba hijery mandrakariva ihany izy, fa tsy hahita; ary mba handre mandrakariva ihany izy, fa tsy hahafantatra; fandrao hibebaka izy, ka havela ny helony (Isa. 6. 9, 10). '
  '13':
  - type: text
    content: 'Ary hoy Izy taminy: Tsy azonareo va ilay fanoharana teo? koa hataonareo ahoana no fahafantatra ny fanoharana rehetra? '
  '14':
  - type: text
    content: 'Ny mpamafy dia mamafy ny teny. '
  '15':
  - type: text
    content: 'Ary ireto no ilay teo amoron-dalana, dia izay amafazana ny teny, fa rehefa nandre izy, dia avy miaraka amin''izay Satana ka manaisotra ny teny izay nafafy tao aminy. '
  '16':
  - type: text
    content: 'Ary tahaka izany koa, ireto no ilay voafafy teny amin''ny tany marivo ambony vatolampy, dia izay mandre ny teny ka malaky mandray izany amin''ny hafaliana; '
  '17':
  - type: text
    content: 'nefa tsy manam-paka ao anatiny ireny, fa maharitra vetivety foana; koa rehefa afaka izany, ka tonga izay fahoriana na fanenjehana noho ny teny, dia tafintohina miaraka amin''izay izy. '
  '18':
  - type: text
    content: 'Ary misy hafa koa izay voafafy teny amin''ny tsilo, dia ireo no ilay nandre ny teny, '
  '19':
  - type: text
    content: 'fa ny fiahiahiana izao fiainana izao sy ny fitaky ny harena ary ny filàna ny zavatra hafa miditra, dia mangeja ny teny, ka tsy mamoa izy. '
  '2':
  - type: text
    content: 'Ary nampianatra azy zavatra maro tamin''ny fanoharana Izy ka nilaza tamin''ny fampianarany azy hoe: '
  '20':
  - type: text
    content: 'Ary ireto no ilay voafafy teny amin''ny tany tsara, dia izay mandre ny teny ka mandray azy dia mamoa: ny sasany avy telo-polo heny, ny sasany avy enim-polo heny, ary ny sasany avy zato heny. '
  '21':
  - type: text
    content: 'Ary hoy Izy taminy: Moa entina'
  - type: note
    content: Gr. avy
  - type: text
    content: ' va ny jiro mba hosaronan''ny vata famarana, na hatao ao ambanin''ny farafara? Tsy hatao amin''ny fanaovan-jiro va izy? '
  '22':
  - type: text
    content: 'Fa tsy misy takona izay tsy ho hita, na miafina izay tsy haseho. '
  '23':
  - type: text
    content: 'Raha misy olona manan-tsofina ho enti-mihaino, aoka izy hihaino. '
  '24':
  - type: text
    content: 'Ary hoy Izy taminy: Diniho izay teny renareo; araka ny ohatra anoharanareo ihany no hanoharana ho anareo, ary homena mihoatra aza ianareo. '
  '25':
  - type: text
    content: 'Fa izay manana no homena; ary ny amin''ny tsy manana, na dia izay ananany aza dia halaina aminy. '
  '26':
  - type: text
    content: 'Ary hoy Izy: Toy izao ny fanjakan''Andriamanitra: tahaka ny lehilahy mamafy voa amin''ny tany '
  '27':
  - type: text
    content: 'ka matory sy mahatsiaro isan''alina sy isan''andro; ary ny voa dia mitsimoka ka maniry, nefa tsy fantany ny faniriny '
  '28':
  - type: text
    content: 'Fa ny tany mahavokatra ho azy: voalohany misy tahony, dia teraka, ary rehefa izany, dia feno voa. '
  '29':
  - type: text
    content: Fa rehefa azo jinjana izy, dia jinjany miaraka amin'izay, fa efa tonga ny fararano.
  '3':
  - type: text
    content: 'Mihainoa: Indro, nivoaka ny mpamafy mba hamafy. '
  '30':
  - type: text
    content: 'Ary hoy Izy: Ahoana no hanoharantsika ny fanjakan''Andriamanitra, ary inona no fanoharana hanoharantsika azy? '
  '31':
  - type: text
    content: 'Tahaka ny voantsinapy izy, izay kely noho ny voa rehetra, raha vao afafy amin''ny tany; '
  '32':
  - type: text
    content: 'Fa rehefa voafafy kosa izy, dia maniry ka tonga lehibe noho ny anana rehetra, ary mandrantsana vaventy, ka azon''ny voro-manidina itoerana ny alokalony. '
  '33':
  - type: text
    content: 'Ary fanoharana maro toy izany no nanambarany ny teny taminy, araka izay hainy hohenoina. '
  '34':
  - type: text
    content: Ary raha tsy tamin'ny fanoharana dia tsy niteny taminy Izy; ary tamin'ny mangingina no nilazany tamin'ny mpianany ny hevitr'ireo rehetra ireo.
  '35':
  - type: text
    content: 'Ary androtrizay ihany, rehefa hariva ny andro, dia hoy Izy taminy: Andeha isika hita ho eny am-pita. '
  '36':
  - type: text
    content: 'Ary rehefa nampodin''ny mpianany ny vahoaka, dia nentiny tamin''io sambokely io tamin''izao ihany Jesosy. Ary nisy sambokely sasany koa niaraka taminy. '
  '37':
  - type: text
    content: 'Ary nisy tafio-drivotra mahery, ary nianjerazeran''ny alondrano ny sambokely ka nila ho feno rano. '
  '38':
  - type: text
    content: 'Ary Jesosy natory teo am-bodin''ny sambokely tambonin''ny ondana; ary namoha Azy izy ireo ka nanao taminy hoe: Mpampianatra ô, tsy mampaninona Anao va izao hahafatesanay izao? '
  '39':
  - type: text
    content: 'Ary nifoha Izy, dia niteny mafy ny rivotra sady nilaza tamin''ny ranomasina hoe: Mangina, mitsahara. Ary dia nitsahatra ny rivotra, ka tony tsara ny andro. '
  '4':
  - type: text
    content: 'Ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana, dia avy ny vorona ka nandany izany. '
  '40':
  - type: text
    content: 'Ary hoy Izy taminy: Nahoana no saro-tahotra ianareo? Tsy mbola manam-pinoana va ianareo? '
  '41':
  - type: text
    content: 'Ary natahotra indrindra izy ireo ka niresaka hoe: Iza moa Ity, fa ny rivotra sy ny ranomasina aza manaiky Azy?'
  '5':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin''ny tany marivo ambony vatolampy; dia nalaky nitrebona ireny, satria tsy nisy tany lalina. '
  '6':
  - type: text
    content: 'Fa rehefa niposaka ny masoandro, dia nalazo ireny; ary satria tsy nanam-paka, dia maty izy. '
  '7':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin''ny tsilo; ary ny tsilo naniry ka nangeja azy, dia tsy namoa izy. '
  '8':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin''ny tany tsara, ary raha naniry sy namoa, dia vokatra, fa namoa: ny sasany avy telo-polo heny, ary ny sasany avy enim-polo heny, ary ny sasany avy zato heny. '
  '9':
  - type: text
    content: 'Ary hoy Izy: Izay manan-tsofina ho enti-mihaino, aoka izy hihaino. '
